[script]
# lines: 460 
# 【双鉄】
# display as 雙鐵
# JP: 「すっかり遅くなってしまったな」
2225 = "「Trễ mất tiêu rồi」"
# 【ポーレット】
# display as 波萊特
# JP: 「お夕飯の時間、ぎりぎりになっちゃいましたね」
2072 = "「Sát giờ ăn tối luôn rồi nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「夕飯の前に一風呂浴びたい気もしたが――\nまぁ、足湯を堪能したしな」
1991 = "「Cũng muốn tắm một cái trước khi ăn tối đấy―― Nhưng thôi, đã ngâm chân thỏa thích rồi mà」"
# monologue
# JP: 夫婦仲良く並ぶ僕らのその前を、\nひかりとれいながとことこ進む。
2461 = "Đi trước cặp vợ chồng tình thương mến thương chúng tôi, là Hikari và Reina đang lẫm chẫm bước đi."
# 【ひかり】
# display as 光
# JP: 「♪こーけし　こけし　れいーなこけし」
1381 = "「♪Kokeshi kokeshi Reina kokeshi」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、なんだか照れちゃいますよぉ」
1802 = "「Ufufu, cảm thấy hơi ngại ngùng nha~」"
# monologue
# JP: 彩色を終え、乾燥させて、ロウをたっぷり塗布してもらい。\n僕らのこけしは、それぞれピカピカに仕上がった。
2622 = "Sau khi tô màu, phơi khô và được phủ một lớp sáp dày. Những con búp bê kokeshi của chúng tôi đều đã hoàn thiện sáng bóng."
# monologue
# JP: 自分で作ったれいなこけしを、\nひかりはずっと抱っこしたまま、何度も頭を撫でている。
2484 = "Búp bê Reina kokeshi tự tay làm, Hikari cứ ôm khư khư mãi, và vuốt ve đầu nó nhiều lần."
# 【ひかり】
# display as 光
# JP: 「…………」
1335 = "「…………」"
# monologue
# JP: 何か、おまじないの類いだろうか？
2813 = "Là một loại bùa chú gì đó chăng?"
# monologue
# JP: れいなこけしの頭を撫でてやるたびに、\nひかりはじっ――と黙り込む。
2471 = "Mỗi lần vuốt đầu búp bê Reina kokeshi, Hikari lại chìm vào im lặng."
# 【れいな】
# display as 玲奈
# JP: 「わ、ちょっと雪がつよくなってきましたねぇ」
1812 = "「Oa, tuyết bắt đầu rơi dày hơn rồi nha~」"
# 【ひかり】
# display as 光
# JP: 「ぬれちゃうぬれちゃう」
2107 = "「Ướt mất ướt mất」"
# monologue
# JP: ひかりは慌てて、\nれいなこけしを自分のリュックにしまい込む。
2465 = "Hikari vội vàng, cất búp bê Reina kokeshi vào ba lô của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ロウ付けをしてあるのだから、\nそう慌てずとも平気だろう」
1685 = "「Đã được phủ sáp rồi nên không cần vội vàng thế cũng không sao đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？　そういう問題じゃないですよ？」
2228 = "「Soutetsu? Không phải vấn đề đó đâu nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1877 = "「Hử?」"
# 【ひかり】
# display as 光
# JP: 「なのー。\nれいなこけし、かぜひいたらかわいそうなのー」
1943 = "「Đúng ớ. Búp bê Reina kokeshi mà bị cảm thì tội nghiệp lắm ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、言われてみればそのとおりだな」
1837 = "「A, nghe con nói cũng đúng nhỉ」"
# monologue
# JP: 昔のことを思い出す。\n路子も、確かにそう扱っていた。
2538 = "Nhớ lại chuyện ngày xưa. Michiko quả thực cũng đối xử với nó như vậy."
# monologue
# JP: 僕には理解しきれぬが、恐らくちいさな子にとって、\n人形やぬいぐるみは、生きているものとおんなじなのだ。
2828 = "Dù tôi không thể hiểu hết được, nhưng có lẽ đối với những đứa trẻ nhỏ, búp bê hay thú nhồi bông cũng giống hệt như sinh vật sống vậy."
# 【れいな】
# display as 玲奈
# JP: 「れいなこけしより、\nひかりちゃんが風邪ひいちゃいますよぉ」
2089 = "「So với búp bê Reina kokeshi, Hikari dễ bị cảm lạnh hơn đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいな、ありがと。\nでも、傘を出すよりも、入っちゃった方が早いから」
2185 = "「Reina, cảm ơn em. Nhưng mà, chạy vào trong còn nhanh hơn là lấy ô ra đấy」"
# monologue
# JP: ポーレットが笑って指さす先には――ああ。
2727 = "Hướng Paulette vừa cười vừa chỉ tay là――a."
# 【れいな】
# display as 玲奈
# JP: 「わ！　もうお宿ついてたんですねぇ」
1808 = "「Oa! Đến nhà trọ rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「夜になると景色ががらりと変わるものだな」
1676 = "「Cảnh sắc thay đổi hoàn toàn khi đêm xuống nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「しゃべってないで、ほら、ほら！」
1771 = "「Đừng đứng đó nói chuyện nữa, mau vào thôi, mau vào thôi!」"
# 【ひかり】
# display as 光
# JP: 「ほらほらなのー！」
1959 = "「Mau vào mau vào ớ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1866 = "「Ừm」"
# 【仲居】
# display as 服務員
# JP: 「お帰りなさいませ。お濡れになりませんでしたか？」
2086 = "「Mừng quý khách đã về. Quý khách có bị ướt không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええ。ちょうどいいタイミングで帰ってこられました」
2090 = "「Vâng. Chúng tôi về rất đúng lúc」"
# monologue
# JP: 宿に入れば、チェックインを受け付けてくれた仲居さんが、\nにこにこ笑顔で迎えてくれる。
2620 = "Vừa bước vào nhà trọ, cô phục vụ lúc nãy làm thủ tục nhận phòng đã tươi cười chào đón chúng tôi."
# monologue
# JP: ……小さな宿だ。\nあるいは、仲居さんではなく若女将なのかもしれないが。
1317 = "……Một nhà trọ nhỏ. Hoặc có thể cô ấy không phải là phục vụ mà là cô chủ nhỏ cũng nên."
# 【仲居】
# display as 服務員
# JP: 「お食事、ちょうどお支度が調うところでした」
2088 = "「Bữa ăn của quý khách vừa chuẩn bị xong ạ」"
# 【ポーレット】
# display as 波萊特
# JP: 「すみません、遅くなってしまって」
1940 = "「Xin lỗi, chúng tôi về trễ quá」"
# 【仲居】
# display as 服務員
# JP: 「それほど[なるこ,1]鳴呼を楽しんでいただけたんですから、\nうれしいことです」
2222 = "「Quý khách đã tận hưởng Naruko đến vậy, đó là niềm vui của chúng tôi ạ」"
# monologue
# JP: 部屋に戻れば、\nポーレットがふわっ、息を吐く。
2621 = "Khi trở về phòng, Paulette thở hắt ra một hơi nhẹ nhõm."
# 【ポーレット】
# display as 波萊特
# JP: 「これぞ[ひのもと,2]日ノ本！ って感じですね～！\n落ち着くお部屋～」
2140 = "「Đúng chuẩn Hinomoto luôn ha~! Căn phòng thật thư giãn~」"
# 【ひかり】
# display as 光
# JP: 「なのー」
1944 = "「Đúng ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ポーレットとひかりは\nさっきは部屋までは来なかったものな」
1840 = "「A, lúc nãy Paulette và Hikari đâu có vào phòng đâu nhỉ」"
# monologue
# JP: 列車が遅れてしまったせいで、\nできるだけ早く観光に――ということとなり。
2542 = "Vì tàu đến trễ, nên chúng tôi quyết định đi tham quan càng sớm càng tốt."
# monologue
# JP: ポーレットが観光情報を聞いている間に、\n僕とれいなと仲居さんとで、大きな荷物を置いたのだ。
2670 = "Trong lúc Paulette hỏi thăm thông tin du lịch, tôi, Reina và cô phục vụ đã mang hành lý lớn vào phòng."
# 【ポーレット】
# display as 波萊特
# JP: 「……いいですね、こういうお部屋。\nいかにも、冬の[とうほく,1]凍北って感じで」
1379 = "「……Căn phòng như thế này thật tuyệt. Đậm chất mùa đông ở Touhoku」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――夏でも冬でも、\nこの部屋の内装は変わらんように思えるが」
1696 = "「Không――tôi nghĩ dù là mùa hè hay mùa đông, thì nội thất căn phòng này cũng chẳng thay đổi đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「もう、そういう意地悪いうんだからー」
2138 = "「Thiệt tình, anh cứ hay bắt bẻ vậy áー」"
# monologue
# JP: ぽかぽか、かわいくぶってくる。
2717 = "Cô ấy đáng yêu đánh yêu vào người tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「意地悪をいったつもりはなかった。\n単なる事実だ」
1993 = "「Tôi không định bắt bẻ đâu.\nĐó chỉ là sự thật thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「だからぁ、それが意地悪ぅ」
2009 = "「Nên em mới bảo anh bắt bẻ á」"
# monologue
# JP: しかしまぁ、ポーレットの言わんとすることはわかる。\n簡素な机に、座布団、座椅子。
2417 = "Nhưng mà, tôi hiểu điều Paulette muốn nói. Chiếc bàn đơn sơ, đệm ngồi, ghế bệt."
# monologue
# JP: 四人ぴったりの手狭感。\n昔ながらの温泉宿――と、そんな言葉が頭に浮かぶ。
2810 = "Cảm giác chật hẹp vừa vặn cho bốn người. Nhà trọ suối nước nóng kiểu xưa――những từ ngữ đó hiện lên trong đầu tôi."
# 【ひかり】
# display as 光
# JP: 「れいなぁ」
2118 = "「Reina~」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、ひかりちゃん。\nお部屋の中に入りましょうねぇ」
1856 = "「Dạ~, Hikari.\nChúng ta vào phòng thôi nha~」"
# monologue
# JP: 二人羽織と、その光景に思ってしまう。
2552 = "Cảnh tượng đó khiến tôi liên tưởng đến Nininbaori."
# monologue
# JP: れいなの陰にしっかり隠れ、よじよじ歩き。\nひかりは部屋の隅へと落ち着き、リュックを下ろす。
2487 = "Hikari nấp kỹ sau lưng Reina, lạch bạch bước đi. Cô bé ngồi yên ở góc phòng và hạ ba lô xuống."
# monologue
# JP: （ごとっ！）
2851 = "（Cộc!）"
# 【ひかり】
# display as 光
# JP: 「やぁん！！」
1792 = "「Á!!」"
# monologue
# JP: はずみで、何かが――ああ、れいなこけしが転がり出す。\nきちんとしまえていなかったのか。
2648 = "Theo đà, một vật gì đó――a, búp bê Reina kokeshi lăn lông lốc ra ngoài. Chắc là do cất không cẩn thận rồi."
# 【ひかり】
# display as 光
# JP: 「れいなこけし、おちちゃった。\nごつんて、いたいの、かわいそうなのぉ」
2121 = "「Búp bê Reina kokeshi, bị rơi mất tiêu rồi. Bị cụng đầu, đau lắm, tội nghiệp lắm ớ」"
# 【仲居】
# display as 服務員
# JP: 「あらあら」
1813 = "「Ây da」"
# monologue
# JP: ころころと、\nれいなこけしは、仲居さんの足下へと転がっていく。
2836 = "Lăn lông lốc, búp bê Reina kokeshi lăn đến chân cô phục vụ."
# monologue
# JP: （ひょいっ）
2853 = "（Thoăn thoắt）"
# 【ひかり】
# display as 光
# JP: 「ひぐっ！！？」
1793 = "「Hức!!?」"
# monologue
# JP: れいなこけしを拾い上げようと動き出してたひかりの体が、\n本物のれいなの陰に素早く引っ込む。
2458 = "Hikari đang định nhặt búp bê Reina kokeshi lên liền vội vàng rụt lại sau lưng Reina hàng thật."
# 【仲居】
# display as 服務員
# JP: 「へーきへーき。\n鳴呼のこけしさ、落ちたくらいじゃ傷もつかんよー」
2091 = "「Không sao không sao. Búp bê kokeshi của Naruko rớt một chút không xước được đâu」"
# monologue
# JP: ひかりをなぐさめようとしてくれてるのだろう。\n仲居さんはおどけた感じに、少し方言を交えてくれる。
2554 = "Chắc cô ấy đang cố an ủi Hikari. Cô phục vụ nói với vẻ bông đùa, pha chút phương ngôn."
# 【ひかり】
# display as 光
# JP: 「ん……ゆ――」
1849 = "「Ưm... hưm――」"
# monologue
# JP: それが功を奏したのだろうか？
2510 = "Điều đó đã có tác dụng sao?"
# monologue
# JP: あるいは仲居さんが年若い――\n日々姫や稀咲と同じくらいなのが良いのだろうか？
2421 = "Hay là vì cô phục vụ còn trẻ―― Tầm tuổi Hibiki hay Kisaki nên mới được nhỉ?"
# 【ひかり】
# display as 光
# JP: 「……ぅ……んっ――」
1360 = "「...Ư... ưm――」"
# monologue
# JP: ひかりは仲居さんの言葉の続きを、\nびくびくしながら、それでも、恐らく待っている。
2475 = "Hikari đang chờ đợi câu tiếp theo của cô phục vụ, dù vẫn còn run rẩy sợ hãi."
# 【仲居】
# display as 服務員
# JP: 「ほーら、こけしさんも」
1748 = "「Này, bạn búp bê kokeshi」"
# monologue
# JP: 仲居さんの手が、れいなこけしの頭へ伸びる。
2690 = "Tay cô phục vụ vươn tới đầu búp bê Reina kokeshi."
# 【ひかり】
# display as 光
# JP: 「あ」
1832 = "「A」"
# monologue
# JP: (キイッ！)
2850 = "(Két!)"
# 【仲居】
# display as 服務員
# JP: 「『平気だよ』って」
1913 = "「Nói là 『Tớ không sao đâu』 này」"
# 【ひかり】
# display as 光
# JP: 「あ――ふぁっ――あっ――あっ――」
1829 = "「A――oa――a――a――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1841 = "「!?」"
# monologue
# JP: 平気だよ、と言ってもらったにもかかわらず、\nひかりは逆にショックを受けている。
2678 = "Mặc dù đã được nói là không sao, nhưng Hikari lại bị sốc."
# monologue
# JP: というか、まずい。\n早くなんとかなだめなければ――
2808 = "Mà khoan, gay go rồi.\nPhải mau chóng dỗ dành con bé――"
# 【ひかり】
# display as 光
# JP: 「ぎゃ－－－－－－－－－－っ！！」
1806 = "「Oaーーーーーーーーーー!!」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「ひかりっ！！？」\n「ひかりちゃん！？」
1761 = "「Hikari!!?」\n「Bé Hikari!?」"
# 【仲居】
# display as 服務員
# JP: 「えっ！！？」
1819 = "「Hả!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのこけしをっ」
2014 = "「Đưa con búp bê đó đây」"
# 【仲居】
# display as 服務員
# JP: 「あっ！！？」
# 1841 = "「啊？！」" 
# monologue
# JP: 呆然とする仲居さんの手かられいなこけしを取り返し、\nすぐにひかりににぎらせる。
2632 = "Tôi giật lại búp bê Reina kokeshi từ tay cô phục vụ đang sững sờ, và đưa ngay cho Hikari cầm."
# 【ひかり】
# display as 光
# JP: 「あああああんっ！　やああああああっ！\nひかりのっ！　ひかりのおおっっっ！！」
1843 = "「Aaaaa! Kkoooong!\nCủa Hikari! Của Hikari màááá!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ごめんね、ごめん。\nびっくりしちゃったね」
2019 = "「Mẹ xin lỗi, xin lỗi con.\nLàm con giật mình rồi nhỉ」"
# 【れいな】
# display as 玲奈
# JP: 「大丈夫ですよぉ。れいなこけし、ほら、\nひかりちゃんのとこに『ただいまぁ』って」
2092 = "「Không sao đâu nha~. Búp bê Reina kokeshi, thấy không, đang nói 『Tớ về rồi nè』 với Hikari đó」"
# 【ひかり】
# display as 光
# JP: 「あーーーん！　ふぁああああんっ！」
1842 = "「Aaaa! Oaaaa!」"
# monologue
# JP: れいなこけしをぎゅっと抱きしめ、\nひかりはいやいやと頭を振る。
2485 = "Ôm chặt búp bê Reina kokeshi, Hikari lắc đầu quầy quậy."
# 【仲居】
# display as 服務員
# JP: 「あの――わ、私っ、ごめんなさいっ！　ついっ」
2217 = "「Dạ――tôi, tôi xin lỗi! Tôi lỡ...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1836 = "「A, không――」"
# monologue
# JP: 仲居さんがこの場にいては、\nひかりの怯えが収まらなくなる。
2506 = "Nếu cô phục vụ vẫn ở đây, Hikari sẽ không hết sợ hãi được."
# 【双鉄】
# display as 雙鐵
# JP: 「廊下に」
1805 = "「Ra hành lang đi」"
# 【仲居】
# display as 服務員
# JP: 「は、はいっ」
1917 = "「V-Vâng」"
# monologue
# JP: 廊下に出して戸を閉めるなり、\n仲居さんは深く頭を下げる。
2623 = "Vừa ra hành lang và đóng cửa lại, cô phục vụ liền cúi đầu thật sâu."
# 【仲居】
# display as 服務員
# JP: 「ごめんなさい！　私、無神経なことを」
1939 = "「Tôi xin lỗi! Tôi vô ý quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、善意でしていただいたことですし。\nあの流れでは……」
2093 = "「Không, cô cũng chỉ có ý tốt thôi mà. Trong tình huống đó thì...」"
# monologue
# JP: 仕方ない、とは、口にしかけて、\nけれどもやはり、呑んでしまう。
2695 = "Định nói là không còn cách nào khác, nhưng rồi tôi lại nuốt lời vào trong."
# monologue
# JP: 例えばベテランの仲居であれば、どんな流れであろうとも、\n客のこけしを勝手に鳴かせたりはせんだろう。
2568 = "Ví dụ như một phục vụ kỳ cựu, dù trong tình huống nào đi nữa, cũng sẽ không tự ý làm kêu búp bê kokeshi của khách."
# 【仲居】
# display as 服務員
# JP: 「お客様のこけしを、私、\n自分の物みたいに扱ってしまって」
1988 = "「Búp bê kokeshi của quý khách, tôi lại coi như đồ của mình mà tùy tiện đụng vào」"
# monologue
# JP: とはいえ、どこが悪い点だったのか、\nすでに自覚もしているようだ。
2785 = "Dù vậy, có vẻ cô ấy cũng đã tự nhận ra điểm sai của mình ở đâu rồi."
# monologue
# JP: ならば重ねて責めるより、\nひかりのために何をすべきかを考えるべきだ。
2822 = "Nếu vậy, thay vì tiếp tục trách móc, tôi nên nghĩ xem phải làm gì cho Hikari thì hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、食事を――ああ、いや」
2161 = "「Dù sao thì, bữa ăn――a, không」"
# monologue
# JP: 泣いたばかりですぐ食事では、ひかりも喉を通るまい。\n気持ちを落ち着け直すには――
2467 = "Vừa mới khóc xong mà ăn ngay thì Hikari cũng nuốt không trôi. Để lấy lại bình tĩnh thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「冷めてしまってもかまいません。\n食事を一時間……いや、二時間後にしてもらえますか？」
2230 = "「Đồ ăn nguội cũng không sao. Cô có thể dời bữa ăn lại một tiếng... à không, hai tiếng sau được không?」"
# 【仲居】
# display as 服務員
# JP: 「承りました。\n[いたちょう,1]板長にお願いして、きちんとしたお食事をご提供します」
2032 = "「Tôi hiểu rồi. Tôi sẽ nhờ bếp trưởng chuẩn bị một bữa ăn đàng hoàng cho quý khách」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かります。\nそれと――もし家族風呂が空いているなら」
1890 = "「Cảm ơn cô.\nVới lại――nếu bồn tắm gia đình đang trống」"
# 【仲居】
# display as 服務員
# JP: 「今の時間は空いてたはずです。\nすぐ、フロントに確認してまいります」
2128 = "「Giờ này chắc là đang trống đấy ạ. Tôi sẽ đi xác nhận với lễ tân ngay」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かります。そのようにお願いします」
1891 = "「Cảm ơn cô. Phiền cô nhé」"
# 【仲居】
# display as 服務員
# JP: 「あの！」
2184 = "「Khoan đã!」"
# monologue
# JP: 部屋に戻ろうとした僕を、\n切羽詰まった声が背後から呼び止める。
2644 = "Tôi đang định quay lại phòng, thì một giọng nói gấp gáp gọi giật lại từ phía sau."
# 【仲居】
# display as 服務員
# JP: 「あのっ――私、お嬢様にお詫びを」
2169 = "「Dạ――tôi, tôi muốn xin lỗi cô bé」"
# 【双鉄】
# display as 雙鐵
# JP: 「今は控えてください。\n人見知りをする子なので、お気持ちだけで」
2127 = "「Bây giờ xin cô hãy khoan. Con bé hay sợ người lạ, cô có lòng là được rồi」"
# 【仲居】
# display as 服務員
# JP: 「あ――」
1827 = "「A――」"
# monologue
# JP: 一瞬、くうっと息を呑み。
2548 = "Trong thoáng chốc, cô ấy nín thở."
# monologue
# JP: それから深々――\n仲居さんは、膝におでこがくっつくほどに頭を下げる。
2746 = "Sau đó cúi thật sâu―― Cô phục vụ cúi gập người đến mức trán gần chạm đầu gối."
# 【仲居】
# display as 服務員
# JP: 「かしこまりました。\nお詫びは、それでは――ひとまずは形で示します」
1990 = "「Tôi hiểu rồi. Vậy thì lời xin lỗi――tạm thời tôi sẽ thể hiện bằng hành động」"
# monologue
# JP: そう言って、思い切ったように顔をあげ。\n早足で、仲居さんは廊下の向こうに消えていく。
2563 = "Nói rồi, cô ngẩng mặt lên đầy quyết tâm. Cô phục vụ rảo bước nhanh rồi khuất dạng phía cuối hành lang."
# 【双鉄】
# display as 雙鐵
# JP: 「若いのに、しっかりしている」
1910 = "「Còn trẻ mà tháo vát thật」"
# monologue
# JP: にもかかわらずの失敗は、\n間が悪かった、としかいいようがない。
2786 = "Mặc dù vậy, sai lầm vừa rồi chỉ có thể nói là do không đúng lúc thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いや今は、分析よりも行動だ」
1699 = "「Không, giờ hành động quan trọng hơn là phân tích」"
# monologue
# JP: 何があっても冷静に対応できるよう、\n深呼吸をして――静かに部屋の中へと戻る。
2624 = "Để có thể bình tĩnh ứng phó với bất cứ chuyện gì xảy ra, tôi hít một hơi thật sâu――rồi lặng lẽ quay vào phòng."
# 【ひかり】
# display as 光
# JP: 「ん……ふっ――ぐずっ――ずっ――」
1850 = "「Ưm... hức――hức――hức――」"
# monologue
# JP: ……ひかりは、いまだ泣いている。\nが、先程までの猛烈なものではなくなっている。
1303 = "……Hikari vẫn đang khóc. Nhưng không còn dữ dội như lúc nãy nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「そっか。\n一番におしゃべりしたかったのね」
2061 = "「Vậy sao. Con là người muốn nói chuyện với bạn ấy nhất nhỉ」"
# 【ひかり】
# display as 光
# JP: 「ひかりっ――ひかりにっ、はっ――れいなっこけしっ\nおしゃべりっ――おしゃべりっ、してくれない、のにっ」
1941 = "「Với Hikari――với Hikari, hức――búp bê Reina kokeshi không chịu nói chuyện――không chịu nói chuyện, thế mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1834 = "「A!」"
# monologue
# JP: そうだったのか。工房からの帰り道、\nずっとこけしを抱いて頭を撫でていたのは――
2501 = "Ra là vậy. Trên đường từ xưởng về, con bé cứ ôm khư khư búp bê kokeshi và vuốt ve đầu nó là vì――"
# monologue
# JP: （あれは首をひねって鳴かせようと、\nれいなこけしと、おしゃべりしようとしていたのか）
2856 = "（Con bé định vặn cổ cho nó kêu, để nói chuyện với búp bê Reina kokeshi sao）"
# monologue
# JP: 幼女の力で、手袋つき。\nあまりに悪い条件に、なかなかそれが果たせぬままに――
2577 = "Sức lực của một bé gái, lại còn đeo găng tay. Điều kiện quá tồi tệ khiến con bé mãi vẫn không làm được――"
# 【ひかり】
# display as 光
# JP: 「なのに、おねーちゃんが、おねーちゃんが、\nひかりっ、ひかりよりさきにぃ」
1730 = "「Thế mà, chị đó, chị đó, lại làm trước Hikari, trước cả Hikari」"
# 【れいな】
# display as 玲奈
# JP: 「ちがいますよぉ、ひかりちゃん」
1690 = "「Không phải đâu nha~, Hikari」"
# monologue
# JP: しっかりと握りしめているこけしごと、\nひかりをれいなは、ふんわりと抱く。
2752 = "Cùng với con búp bê kokeshi đang nắm chặt trong tay, Hikari được Reina nhẹ nhàng ôm lấy."
# monologue
# JP: ぽんぽんぽんと、軽く、かるぅく、\nその後ろ頭をたたいて撫でる。
2565 = "Vỗ vỗ vỗ, nhè nhẹ, thật nhè nhẹ, rồi vuốt ve phía sau đầu con bé."
# 【ひかり】
# display as 光
# JP: 「ちがうっ――なに、がっ」
1691 = "「Không phải――cái gì, cơ」"
# 【れいな】
# display as 玲奈
# JP: 「れいなこけしも、ひかりちゃんとおしゃべりしたくて、\nだから、おねえさんの力を借りたんですよぉ」
2124 = "「Búp bê Reina kokeshi cũng muốn nói chuyện với Hikari, nên mới mượn sức của chị đó nha~」"
# 【ひかり】
# display as 光
# JP: 「ふえっ？」
1816 = "「Hả?」"
# monologue
# JP: ああ、上手い。
2534 = "Chà, giỏi thật."
# monologue
# JP: れいなの見事な説明に、\nすぐさまポーレットも言葉を重ねる。
2760 = "Tiếp nối lời giải thích tuyệt vời của Reina, Paulette cũng ngay lập tức hùa theo."
# 【ポーレット】
# display as 波萊特
# JP: 「そうね。一刻も早くひかりとおしゃべりしたくて。\nだからリュックを抜け出して、お姉さんに力を借りたの」
2039 = "「Đúng vậy. Bạn ấy muốn nói chuyện với Hikari càng sớm càng tốt. Nên mới chui ra khỏi ba lô và mượn sức của chị đó」"
# 【ひかり】
# display as 光
# JP: 「……っく――ひくっ――そう、なの？」
1361 = "「...Hức――hức――vậy, sao?」"
# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。れいなこけしは、\n『ひかりちゃん、心配しないでー』っていってましたぁ」
1942 = "「Đúng vậy đó nha~. Búp bê Reina kokeshi, đã nói là 『Hikari, đừng lo lắng nhé~』 đó」"
# 【ひかり】
# display as 光
# JP: 「……ふっ……く」
1359 = "「...Hức... hức」"
# monologue
# JP: ひかりの声が、かなり落ち着く。\nれいなはそっと、抱きしめている手をほどく。
2481 = "Giọng Hikari đã khá bình tĩnh lại. Reina khẽ buông vòng tay đang ôm con bé ra."
# 【ひかり】
# display as 光
# JP: 「そぉ、なの？　ぱぱぁ」
2066 = "「Vậy, sao? Ba ơi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1871 = "「Ừ, đúng vậy」"
# monologue
# JP: ひかりが、僕を頼ってくれた。\nそう思うだけで、こころが定まる。
2469 = "Hikari đã dựa dẫm vào tôi. Chỉ nghĩ vậy thôi, tâm trí tôi đã trở nên vững vàng."
# monologue
# JP: 演技も嘘も得意ではない。\nゆえに――“本当”を、ただ話そうと。
2609 = "Tôi không giỏi diễn kịch hay nói dối. Vì thế――tôi sẽ chỉ nói \"sự thật\"."
# 【双鉄】
# display as 雙鐵
# JP: 「その証拠に――手を貸してごらん？」
1995 = "「Bằng chứng là đây――Đưa tay cho ba xem nào?」"
# 【ひかり】
# display as 光
# JP: 「んー」
# 1866 = "「嗯」" 
# monologue
# JP: こけしを挟んでもったまま、\nひかりは短い両手を伸ばす。
2490 = "Vẫn ôm chặt búp bê kokeshi, Hikari vươn đôi tay ngắn ngủn ra."
# monologue
# JP: その手のひらをすっぽりと、\n僕の両手で、まるごとくるんで暖める。
2646 = "Tôi dùng hai tay mình bao trọn lấy đôi bàn tay bé xíu ấy, ủ ấm cho chúng."
# 【双鉄】
# display as 雙鐵
# JP: 「今ならもう、\nれいなこけしは、ひかりとお話できる」
2129 = "「Bây giờ thì, búp bê Reina kokeshi đã có thể nói chuyện với Hikari rồi đấy」"
# 【ひかり】
# display as 光
# JP: 「できるのー？」
1787 = "「Được rồi ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは僕じゃなく、\nれいなこけしに直接聞いてみるといい」
1772 = "「Đừng hỏi ba, con thử trực tiếp hỏi búp bê Reina kokeshi xem」"
# 【ひかり】
# display as 光
# JP: 「うぅ……う」
1844 = "「Ư... ưm」"
# monologue
# JP: 包み込んでいた手を緩めれば、\nひかりはおずおず、れいなこけしの首に触れる。
2663 = "Khi tôi nới lỏng tay ra, Hikari rụt rè chạm vào cổ búp bê Reina kokeshi."
# 【双鉄】
# display as 雙鐵
# JP: 「それではダメだ。\nもっとしっかり、力をこめてにぎってやるんだ」
2208 = "「Như thế không được đâu. Con phải nắm thật chặt, dồn sức vào」"
# monologue
# JP: （きゅっ）
2858 = "（Nắm chặt）"
# monologue
# JP: もう一度、ひかりの手の甲に手のひらを重ねる。\nひかりの手ごと、れいなこけしの首をにぎる。
2668 = "Một lần nữa, tôi đặt lòng bàn tay lên mu bàn tay Hikari. Cầm lấy tay con bé, nắm chặt cổ búp bê Reina kokeshi."
# 【ひかり】
# display as 光
# JP: 「こんなにつよく、なの？」
2177 = "「Phải mạnh thế này ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。話を聞くとは、\n聞かせてもらうとは――そういうことだ」
1861 = "「Ừ. Việc lắng nghe người khác nói, được người khác cho nghe――chính là như vậy đó」"
# 【ひかり】
# display as 光
# JP: 「どういうことぉ？」
1961 = "「Là sao ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『君の話を聞きたい』と、相手に伝わるように伝える。\nそう出来なければ、大事な話はしてもらえない」
2175 = "「Phải truyền đạt sao cho đối phương hiểu được rằng 『Tôi muốn nghe bạn nói』. Nếu không làm được như vậy, người ta sẽ không kể cho mình nghe những chuyện quan trọng đâu」"
# 【ひかり】
# display as 光
# JP: 「……あいてに、つたわるように、つたえる」
1375 = "「...Truyền đạt sao cho đối phương hiểu được」"
# monologue
# JP: 涙をいっぱいにためた目で。\nひかりは僕を見――れいなこけしをじっと見る。
2473 = "Với đôi mắt ngấn lệ. Hikari nhìn tôi――rồi nhìn chằm chằm vào búp bê Reina kokeshi."
# 【ひかり】
# display as 光
# JP: 「――うん」
1321 = "「――Vâng」"
# monologue
# JP: ひかりの指先に力がこもる。\nこれなら、僕の手は必要なかろう。
2480 = "Đầu ngón tay Hikari dồn sức. Thế này thì, không cần đến tay tôi nữa rồi."
# monologue
# JP: そうっと、ひかりから手を引けば――
2662 = "Tôi nhẹ nhàng rút tay lại――"
# monologue
# JP: （キュイっ！）
# 2850 = "（吱呀！）" 
# 【ひかり】
# display as 光
# JP: 「おしゃべりしたのー！！」
1914 = "「Bạn ấy nói chuyện rồi kìaー!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。よかったな」
1874 = "「Ừm. Tốt quá rồi nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ね？　今なんていってたの？\nママにもおしえて」
1879 = "「Thấy chưa? Lúc nãy bạn ấy nói gì vậy? Kể cho mẹ nghe với」"
# 【ひかり】
# display as 光
# JP: 「うん、あのねー！」
1870 = "「Dạ, chuyện là vầy nèー!」"
# monologue
# JP: ひかりが笑う。\nあどけなく。
2463 = "Hikari cười.\nThật ngây thơ."
# 【ひかり】
# display as 光
# JP: 「『おしゃべりできてうれしーよー』って、\nいってたのー！！」
1908 = "「Bạn ấy nói là, 『Tớ rất vui vì được nói chuyện với cậu~』 đóー!!」"
# monologue
# JP: （ちゃぽん）
2859 = "（Tõm）"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ……生き返るぅ」
1831 = "「A... sống lại rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「湯船につかると――\n確かに、何かが戻ってくるように感じるな」
2100 = "「Ngâm mình trong bồn tắm―― Đúng là có cảm giác thứ gì đó đang quay trở lại nhỉ」"
# 【ひかり】
# display as 光
# JP: 「なにがもどってくるの、なのー？」
2075 = "「Cái gì quay trở lại ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2206 = "「Cái đó thì...」"
# monologue
# JP: 言葉を止めて考える。\nが――あまりにも直接的な答えだけしか思いつけない。
2654 = "Tôi dừng lời và suy nghĩ. Nhưng――tôi chỉ có thể nghĩ ra một câu trả lời quá đỗi trực tiếp."
# 【双鉄】
# display as 雙鐵
# JP: 「……一番端的なところをいえば、体温などだ」
1377 = "「...Nói một cách thẳng thắn nhất, thì là thân nhiệt chẳng hạn」"
# 【ひかり】
# display as 光
# JP: 「たんてきー？」
2159 = "「Thẳng thắn ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「端的とは、『簡単にいうと』、ということだな」
2158 = "「Thẳng thắn tức là, 『nói một cách đơn giản』 ấy mà」"
# 【ひかり】
# display as 光
# JP: 「ならかんたんにいえばいいのにー」
2216 = "「Vậy thì ba cứ nói đơn giản đi chứー」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？\nああ……確かに、もっともだ」
1825 = "「Ưm!?\nA... quả thực là, con nói rất đúng」"
# 【ポーレット】
# display as 波萊特
# JP: 「あははっ」
1833 = "「Ahaha」"
# monologue
# JP: ポーレットは明るくわらって、\nひかりの頭をやわらかに撫でる。
2731 = "Paulette cười rạng rỡ,\nrồi dịu dàng xoa đầu Hikari."
# 【ポーレット】
# display as 波萊特
# JP: 「簡単なようで、本当は難しいことなの。\n『相手に伝わるように伝える』、って」
1330 = "「Nghe có vẻ đơn giản, nhưng thực ra lại rất khó đấy. Việc 『truyền đạt sao cho đối phương hiểu được』 ấy」"
# 【れいな】
# display as 玲奈
# JP: 「あ――」
# 1827 = "「啊……」" 
# monologue
# JP: れいなが、ちらりと僕を見る。\n確かにそれは、さきほど僕が発した言葉だ。
2751 = "Reina liếc nhìn tôi. Đúng là lúc nãy tôi vừa nói câu đó."
# monologue
# JP: 自分の言葉も守れないでは、親として……\n頭までぶくぶくと、湯につかりたい心持ちになる。
2796 = "Là một người làm cha mà không giữ được lời nói của chính mình... Tôi cảm thấy muốn ngụp lặn chìm nghỉm luôn xuống làn nước nóng."
# 【ひかり】
# display as 光
# JP: 「むつかしーのー？」
2209 = "「Khó lắm ớ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。難しい。ママにも、いつだって難しいし、\nパパだって、さっきにみたいに失敗しちゃうこともある」
1860 = "「Ừ. Khó lắm. Đối với mẹ lúc nào cũng khó, mà ngay cả ba, cũng có lúc thất bại như vừa rồi đó」"
# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ママもパパも、多分、そこはまだ練習中」
1930 = "「Cả mẹ và ba, chắc là vẫn đang trong quá trình luyện tập」"
# monologue
# JP: ポーレットが少しおどけていえば、\nひかりもふにゃり、安心したような笑顔を浮かべる。
2716 = "Nghe Paulette nói với vẻ hơi bông đùa, Hikari cũng thả lỏng, nở một nụ cười như đã yên tâm."
# 【ひかり】
# display as 光
# JP: 「そっかー。\nままとぱぱでも、れんちゅうちゅうなんだー」
2062 = "「Vậy ớ.\nCả mẹ và ba, cũng đang luyện tập haー」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど、ね？」
1721 = "「Nhưng mà, con biết không?」"
# monologue
# JP: ポーレットがちらりと視線を送る。
2726 = "Paulette liếc mắt đưa tình."
# monologue
# JP: 送った相手はそれに気づかず、\nタオルを頭の上にのせ、のんびりと目を細めている。
2777 = "Người được đưa tình lại không hề hay biết, chỉ thong thả nheo mắt với chiếc khăn vắt trên đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「れいなは……とっても上手だと思う。\n『相手に伝わるように伝える』の」
1997 = "「Chị nghĩ... Reina làm việc đó rất giỏi. Việc 『truyền đạt sao cho đối phương hiểu được』 ấy」"
# 【れいな】
# display as 玲奈
# JP: 「そおですかぁ？」
2065 = "「Vậy sao ạ~?」"
# monologue
# JP: 急に振られて、褒められて。\nけれどもれいなは、いつもどおりだ。
2787 = "Đột nhiên bị gọi tên, lại còn được khen ngợi. Nhưng Reina vẫn tỏ ra như mọi khi."
# monologue
# JP: ただにこにことふんわりと、僕らの言葉を受け入れる。\nれいなにとって、恐らくそれはごく当然の――
2562 = "Chỉ mỉm cười dịu dàng và tiếp nhận lời nói của chúng tôi. Đối với Reina, có lẽ đó là điều hết sức hiển nhiên――"
# 【ひかり】
# display as 光
# JP: 「れいなは、むつかしーっておもわないのぉ？」
2120 = "「Reina không thấy khó ớ?」"
# 【れいな】
# display as 玲奈
# JP: 「思いますよぉ。むつかしいって思いますし、\nおしゃべりするの、やっぱりちょっとは怖いですよぉ」
2133 = "「Có chứ nha~. Chị cũng thấy khó, và việc nói chuyện, quả thật cũng hơi sợ một chút đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2149 = "「Thật sao」"
# monologue
# JP: それは――意外だ。
2809 = "Điều này――thật bất ngờ."
# monologue
# JP: 僕は勝手に、れいなは天性の聞き上手、おしゃべり上手と\nはなから思い込んでいた。
2608 = "Tôi cứ tự mặc định ngay từ đầu rằng, Reina bẩm sinh đã giỏi lắng nghe và nói chuyện rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「そう……なの？」
2063 = "「Vậy... sao?」"
# monologue
# JP: いや、僕だけではないらしい。\nポーレットもひかりも、びっくりした顔で固まっている。
2415 = "À không, có vẻ không chỉ mình tôi nghĩ vậy. Cả Paulette và Hikari cũng đang sững sờ với vẻ mặt ngạc nhiên."
# 【れいな】
# display as 玲奈
# JP: 「はぁい、そおですよぉ。\nだってれいな、レイルロオドですからぁ」
2049 = "「Dạ~, đúng vậy đó nha~.\nBởi vì Reina, là Railord mà~」"
# 【ひかり】
# display as 光
# JP: 「どーして、れーるろーどだと」
2196 = "「Tại sao, Railord thì lại...」"
# 【双鉄】
# display as 雙鐵
# JP: 「共感か！」
2035 = "「Là cộng cảm sao!」"
# monologue
# JP: ひらめく、というか理解できる。\n僕も、ふたごだったから。
2650 = "Tôi lóe lên một suy nghĩ, hay đúng hơn là có thể hiểu được. Bởi vì tôi, cũng từng là trẻ sinh đôi."
# monologue
# JP: 共感に近いであろう感覚を――\n僕もかつては、持てる相手を有していたから。
2427 = "Một cảm giác có lẽ gần giống với cộng cảm―― Tôi cũng từng có một người để chia sẻ cảm giác đó."
# 【双鉄】
# display as 雙鐵
# JP: 「共感で、言葉にせずともわかりあえる相手がいる。\nそうであるから、まったくの他者は、恐ろしい」
1887 = "「Có những người mà chỉ cần cộng cảm, không cần dùng lời nói cũng có thể hiểu nhau. Chính vì vậy, những người hoàn toàn xa lạ, lại càng trở nên đáng sợ」"
# 【れいな】
# display as 玲奈
# JP: 「おそろしい、のはちょびっとだけですぅ。\n楽しいのほうがおっきいですよぉ」
1785 = "「Đáng sợ, thì chỉ một chút xíu thôi nha~. Phần vui vẻ mới là phần lớn hơn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1866 = "「嗯」" 
# monologue
# JP: れいならしいなと、素直に思える。
2635 = "Quả đúng là phong cách của Reina, tôi thành thực nghĩ vậy."
# monologue
# JP: そこが僕との――\n少なくとも、かつての僕との、一番大きな違いなのだと。
2819 = "Đó chính là―― Ít nhất là với tôi của ngày xưa, điểm khác biệt lớn nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しい方が大きいから、か。\nれいなが話し上手であり、聞き上手である理由は」
1886 = "「Vì phần vui vẻ lớn hơn, sao. Đó là lý do Reina vừa nói chuyện hay, vừa lắng nghe giỏi à」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、自分ではわかりませんけど――\nうふふぅ、『かもしれない』って思いますぅ」
2126 = "「Reina, tự bản thân cũng không rõ nữa nhưng―― Ufufu, em nghĩ là 『có lẽ vậy』 đó nha~」"
# 【ひかり】
# display as 光
# JP: 「たのしいから、じょうずなの？」
1885 = "「Vì vui, nên mới giỏi ớ?」"
# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。誰かにおはなししてもらうのは、\nとっても、とおっても楽しいですよぉ」
2037 = "「Đúng vậy đó nha~. Được ai đó kể chuyện cho nghe, rất là, rất là vui luôn đó nha~」"
# 【ひかり】
# display as 光
# JP: 「こわいのに？」
2029 = "「Dù sợ ớ?」"
# 【れいな】
# display as 玲奈
# JP: 「怖いのは、おはなしすることじゃなくって、\n『あいてのことがわからない』ことですよぉ」
2186 = "「Điều đáng sợ không phải là việc nói chuyện, mà là việc 『không hiểu được đối phương』 đó nha~」"
# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 
# monologue
# JP: 温泉の中だというのに、ひかりはもじっと、\nどこか居心地悪そうにして、体をよじる。
2680 = "Dù đang ở trong suối nước nóng, Hikari lại khẽ vặn vẹo cơ thể, trông có vẻ hơi khó chịu."
# 【ひかり】
# display as 光
# JP: 「わからないのはこわいから――\nこわかったら、おしゃべりしたくないでしょう？」
2173 = "「Vì không hiểu nên mới sợ―― Nếu sợ, thì sẽ không muốn nói chuyện đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「そうかもですけど、ひかりちゃん」
2005 = "「Có lẽ là vậy, nhưng mà này Hikari」"
# monologue
# JP: れいながほんわり、お湯よりもっと暖かに笑う。
2755 = "Reina cười dịu dàng, một nụ cười còn ấm áp hơn cả nước nóng."
# 【れいな】
# display as 玲奈
# JP: 「わからなくって怖かったのがわかるようになると、\nとってもとーっっても楽しくなれちゃうんですよぉ」
1326 = "「Khi em bắt đầu hiểu được những điều từng khiến em sợ hãi vì không hiểu, thì mọi thứ sẽ trở nên cực kỳ, cực kỳ thú vị đó nha~」"
# 【ひかり】
# display as 光
# JP: 「んゆぅ？\nそれって、どーゆーこと、なのー？」
1881 = "「Hửm?\nNhư vậy, là sao ớ?」"
# 【れいな】
# display as 玲奈
# JP: 「うーんと、ですねぇ、ええっと」
1852 = "「Ưm, để xem nào, à thì」"
# monologue
# JP: れいなはしばし、考え込む。\n僕も自然と考えされられている。
2756 = "Reina chìm vào suy tư một lúc. Tôi cũng tự nhiên bị cuốn theo dòng suy nghĩ."
# monologue
# JP: わからないから楽しいというのは、\nつまりは、知識欲、知的好奇心の類い――なら。
2692 = "Việc thấy vui vì không hiểu, nói cách khác, đó là một dạng của khát khao tri thức, trí tò mò――Nếu vậy thì."
# 【双鉄】
# display as 雙鐵
# JP: 「こういうこと、か？」
2067 = "「Là thế này, chăng?」"
# monologue
# JP: 湯の中で軽く確かめる。
2628 = "Tôi khẽ kiểm tra trong làn nước nóng."
# monologue
# JP: 湯口の近く。常に水面がさざ波だっている。\nこれならば――うむ。上等だ。
2812 = "Gần miệng vòi nước. Mặt nước luôn gợn sóng lăn tăn. Nếu là chỗ này thì――ừm. Hoàn hảo."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、この指は何本だ？」
1760 = "「Hikari, đây là mấy ngón tay?」"
# monologue
# JP: ひかりの鼻先、右手を突き出し尋ねてみる。
2642 = "Tôi đưa tay phải ra trước mũi Hikari và hỏi thử."
# 【ひかり】
# display as 光
# JP: 「いーち、にぃい――さんぼんなのー」
1673 = "「Mộ-t, ha-i――ba ngón ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。では――」
1865 = "「Ừm. Vậy thì――」"
# monologue
# JP: （ちゃぷっ）
2854 = "（Tõm）"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――何本だか、わかるか？」
1747 = "「Còn cái này――là mấy ngón, con biết không?」"
# 【ひかり】
# display as 光
# JP: 「ええええっ、むつかしいのー！」
1815 = "「Ể, khó quá đi ớ!」"
# monologue
# JP: 湯の中に手を沈めただけだ。
2627 = "Tôi chỉ dìm tay xuống nước thôi."
# monologue
# JP: しかしさざ波と屈折が、\n僕の指をうまいぐあいに紛らわせてくれる。
2747 = "Nhưng những gợn sóng lăn tăn và sự khúc xạ, đã ngụy trang khéo léo cho những ngón tay của tôi."
# 【ひかり】
# display as 光
# JP: 「うううー、わからないのー。\nんと……ええっと――れいなぁ」
1845 = "「Ư ư ư, con không biết ớ.\nƯm... để xem nào――Reina~」"
# 【れいな】
# display as 玲奈
# JP: 「え？　うーん、れいなにもわからないですぅ。\nあの……うーんと……ポーレットぉ」
1818 = "「Hả? Ưm, Reina cũng không biết nữa nha~. Ờm... ưm... chị Paulette~」"
# 【ポーレット】
# display as 波萊特
# JP: 「しょうがないなぁ。ママがあててあげる」
2146 = "「Hết cách rồi nhỉ. Để mẹ đoán cho」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、すごい自信だな」
1821 = "「Hô, tự tin gớm nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「あります。自信。\nだって、双鉄くんのすることだから」
2220 = "「Có chứ. Tự tin.\nBởi vì, đây là việc Soutetsu làm mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1824 = "「Hửm」"
# monologue
# JP: 当てられたな。\n直感すると同時に声が飛んでくる。
2544 = "Bị đoán trúng rồi. Ngay khi tôi vừa trực giác được điều đó, một giọng nói đã vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「三本、ですよね？」
1683 = "「Ba ngón, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな」
2137 = "「Tuyệt vời」"
# monologue
# JP: （ざばあっ）
# 2854 = "（嘩啦）" 
# monologue
# JP: 手の形を崩さぬままに持ち上げる。
2619 = "Tôi giữ nguyên hình dáng bàn tay và nhấc lên."
# 【ひかり】
# display as 光
# JP: 「いーち、にぃーい――！！\nさんぼんなのー！！」
1674 = "「Mộ-t, ha-i――!!\nBa ngón ớ!!」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレット、すごいですねぇ。\nよく見えましたねぇ」
2105 = "「Chị Paulette, giỏi quá nha~.\nNhìn rõ ghê nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、目でじゃなくって、\nこころで、だけど」
1867 = "「Ừ, không phải nhìn bằng mắt,\nmà là bằng trái tim cơ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうとは思った」
1984 = "「Tôi cũng đoán vậy」"
# monologue
# JP: 僕の行動を、僕の思考を、\nポーレットは、普段からよく見ている故に、読みきった。
2541 = "Hành động của tôi, suy nghĩ của tôi, Paulette thường ngày vẫn luôn quan sát kỹ nên đã đọc thấu được."
# monologue
# JP: 『わからないことがわかるのは楽しい』と伝えるためには、\n指の形を変えない方が、より好適だという判断を。
2560 = "Rằng để truyền đạt thông điệp 『Biết được những điều mình không biết là một niềm vui』, thì việc không thay đổi hình dáng ngón tay sẽ là một lựa chọn thích hợp hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「こころで見たとは、言い得て妙だ」
2050 = "「Nói là nhìn bằng trái tim, đúng là một cách nói tuyệt diệu」"
# 【ひかり】
# display as 光
# JP: 「こころで、おててがみえるのぉ？」
2131 = "「Dùng trái tim, là nhìn thấy được tay ớ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはもう、ずーっとずーっと見てたから。\n双鉄くんを――わたしの大好きなひとを、ずうっと」
2221 = "「Đó là vì, mẹ đã luôn, luôn dõi theo. Dõi theo Soutetsu――người mà mẹ yêu thương nhất, luôn luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1846 = "「A――」"
# monologue
# JP: ポーレットが、僕につたえてくれた。\n大事なことを、あの時も。――そうして今も。
2729 = "Paulette, đã truyền đạt cho tôi. Những điều quan trọng, lúc đó.――Và cả bây giờ nữa."
# monologue
# JP: ならば、僕にも伝えられる。\nその確信が、そのまま言葉になってあふれる。
2821 = "Nếu vậy, tôi cũng có thể truyền đạt được. Sự xác tín đó, cứ thế trào dâng thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「知らない人とおしゃべりするのは、怖いよな」
2192 = "「Nói chuyện với người lạ, đáng sợ lắm nhỉ」"
# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの場合は、その怖さより、わくわくの方が強い。\nけれど、ひかりの場合は、わくわくよりも、怖さが強い」
1720 = "「Trong trường hợp của Reina, sự háo hức lớn hơn nỗi sợ hãi đó. Nhưng trong trường hợp của Hikari, nỗi sợ hãi lại lớn hơn sự háo hức」"
# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 
# monologue
# JP: その感覚は、恐らく正しい。\nひかりにはまだ、自分の身を守る術がない。
2634 = "Cảm giác đó, có lẽ là đúng. Hikari vẫn chưa có cách nào để tự bảo vệ mình."
# 【双鉄】
# display as 雙鐵
# JP: 「怖いものからは逃げるのがいいし、隠れるのがいい。\nひかりは、その点ではとても正しい」
2212 = "「Thấy thứ gì đáng sợ thì nên bỏ chạy, nên trốn đi. Về điểm đó, Hikari làm rất đúng」"
# 【ポーレット】
# display as 波萊特
# JP: 「！」
# 1834 = "「啊！」" 
# monologue
# JP: ポーレットが張り詰めた息を呑む。\nけれども――呑まれた息は言葉にならない。
2728 = "Paulette căng thẳng nín thở. Nhưng――hơi thở bị nuốt vào trong không bật thành lời."
# monologue
# JP: 僕を信じてくれている。\n沈黙が、なによりも雄弁に伝えてくれる。
2559 = "Cô ấy đang tin tưởng tôi. Sự im lặng ấy, truyền đạt điều đó một cách hùng hồn hơn bất cứ thứ gì."
# 【ひかり】
# display as 光
# JP: 「…………う、ん」
1362 = "「…………Ư, m」"
# 【双鉄】
# display as 雙鐵
# JP: 「けれど、逃げて隠れてを続けていると、\nそれ以外のやりかたがわからなくなってしまう」
1724 = "「Nhưng mà, nếu cứ tiếp tục trốn chạy, thì con sẽ không biết cách làm nào khác nữa đâu」"
# 【ひかり】
# display as 光
# JP: 「っ！！！」
1835 = "「!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「話したい相手に、話したいことを話せないのは……\nとてもイヤだし、さみしいよな」
1945 = "「Muốn nói chuyện với ai đó, nhưng lại không thể nói ra điều mình muốn nói... Cảm giác đó rất khó chịu, và cũng rất buồn đúng không」"
# monologue
# JP: ひかりが頷く。\n無言で、大きく。
2492 = "Hikari gật đầu.\nKhông nói một lời, thật mạnh."
# monologue
# JP: 僕の娘だと強く感じる。\n僕の娘は――僕と同じ部分をもった生き物なのだと。
2630 = "Tôi cảm nhận mạnh mẽ rằng đây chính là con gái mình. Con gái tôi――là một sinh mệnh mang những nét giống hệt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「パパも、同じだ。パパにはふたごの妹がいたから――\n妹とだけ話していれば、ただそれだけで充分だった」
2114 = "「Ba cũng vậy. Vì ba từng có một cô em gái sinh đôi―― Nên chỉ cần nói chuyện với em gái thôi, đối với ba như thế là đủ rồi」"
# monologue
# JP: 事故がなければ――\n僕はどう変化して、成長をしていたのだろうか？
2569 = "Nếu không có vụ tai nạn đó―― Tôi sẽ thay đổi và trưởng thành như thế nào nhỉ?"
# monologue
# JP: けれども、事故は起きてしまい。\n幼いままに、僕はこころを、閉ざしてしまった。
2436 = "Thế nhưng, vụ tai nạn đã xảy ra. Khi còn quá nhỏ, tôi đã khép chặt trái tim mình lại."
# 【双鉄】
# display as 雙鐵
# JP: 「だけどな。ひかり。\n本当に大事なことなら、どんなに怖くても伝えられる」
1723 = "「Nhưng mà nhé. Hikari. Nếu thực sự là chuyện quan trọng, thì dù có sợ hãi đến đâu con cũng sẽ nói ra được」"
# 【ひかり】
# display as 光
# JP: 「！」
# 1834 = "「啊！」" 
# monologue
# JP: まっすぐに、青い瞳が僕を見つめる。
2820 = "Đôi mắt xanh biếc nhìn thẳng vào tôi."
# monologue
# JP: あの夏、あの日、あの線路沿いで。\nポーレットが僕を、まっすぐまっすぐ、見てくれたように。
2582 = "Giống như mùa hè năm ấy, ngày hôm ấy, dọc theo tuyến đường sắt đó. Giống như cách Paulette đã nhìn tôi, nhìn thật thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが――ママが、それを僕に教えてくれた。\n教わったから、僕もそうできるようになった」
2104 = "「Paulette――Mẹ đã dạy cho ba điều đó. Vì được dạy dỗ, nên ba cũng đã có thể làm được như vậy」"
# monologue
# JP: だから、単純な恩返しだ。\n今度は僕が教えよう。
2672 = "Thế nên, đây chỉ là một sự trả ơn đơn giản. Lần này để ba dạy cho con nhé."
# 【双鉄】
# display as 雙鐵
# JP: 「伝えられないのは。逃げて隠れてしまうのは。\nきっと、それが『本当に伝えたいことではない』からだ」
1919 = "「Không thể nói ra. Chỉ biết trốn chạy. Chắc chắn là vì, đó 『không phải là điều con thực sự muốn nói』」"
# 【ひかり】
# display as 光
# JP: 「ほんとうに――つたえたいこと？」
2142 = "「Thực sự――muốn nói ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それを伝えないでいたなら、\nひかりがひかりで無くなってしまう――そういうことだ」
1858 = "「Ừ. Nếu con không nói điều đó ra, Hikari sẽ không còn là Hikari nữa――kiểu như vậy đó」"
# monologue
# JP: 行った途端に、ひかりの眉根がきゅっと寄る。
2655 = "Vừa nói xong, lông mày Hikari nhíu chặt lại."
# 【ひかり】
# display as 光
# JP: 「ひかりが、ひかりじゃなくなっちゃうのー？」
1758 = "「Hikari, sẽ không còn là Hikari nữa ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「むつかしかったか、では、こう言い換えよう。\n言わないままにしまっていると――ひかりの胸に」
1904 = "「Khó hiểu quá hả, vậy để ba đổi cách nói nhé. Nếu con cứ giữ im lặng mãi――thì trong ngực Hikari」"
# monologue
# JP: 心臓の上、そっと手のひらを乗せてみる。\nとくん、とくんと鼓動している。
2661 = "Tôi khẽ đặt lòng bàn tay lên vị trí trái tim con bé. Nó đang đập thình thịch, thình thịch."
# 【双鉄】
# display as 雙鐵
# JP: 「――ひかりの胸に、もやもやしたものが突き刺さる。\n突き刺さるまえとおんなじようには、笑えなくなる」
1744 = "「――Trong ngực Hikari, sẽ có một thứ gì đó vướng víu đâm vào. Con sẽ không thể cười tươi như trước khi bị đâm nữa」"
# 【ひかり】
# display as 光
# JP: 「あ」
# 1832 = "「啊」" 
# monologue
# JP: 幼いなりに、思い当たることがあるのだろう。\nひかりはこくこく、何度も頷く。
2827 = "Tuy còn nhỏ, nhưng chắc con bé cũng nghĩ đến điều gì đó. Hikari gật đầu lia lịa, rất nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「本当に伝えたいこととは、そういうことだ。\n伝えずいれば、きっとずうっと、さみしいことだ」
2144 = "「Điều thực sự muốn nói, chính là như vậy đó. Nếu không nói ra, chắc chắn sẽ mãi mãi cảm thấy cô đơn」"
# 【ひかり】
# display as 光
# JP: 「あのね、ひかりもね、ときどきあるの。\nこわくてもおしゃべりしたい、つたえたいっておもうの」
1768 = "「Ba nè, Hikari cũng vậy, thỉnh thoảng cũng có lúc. Dù sợ nhưng vẫn muốn nói chuyện, vẫn muốn truyền đạt ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 
# 【ひかり】
# display as 光
# JP: 「だけどね、こわいのがどんどんおっきくなっちゃうの。\nそしたらひかり、はなしたいのが、みえなくなるのー」
1732 = "「Nhưng mà nhé, nỗi sợ cứ lớn dần lớn dần lên. Rồi Hikari, sẽ không nhìn thấy điều mình muốn nói nữa ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 
# monologue
# JP: ひかりの言葉に頷くが――\n理解できるが、困ってしまう。
2763 = "Tôi gật đầu trước lời nói của Hikari―― Tôi có thể hiểu được, nhưng lại thấy bối rối."
# monologue
# JP: （自己防衛か、正当化か……\n恐らくそうした心理の働きなのであろうが――）
2863 = "（Là tự vệ, hay là hợp lý hóa... Có lẽ đó là hoạt động tâm lý của con bé, nhưng――）"
# monologue
# JP: ……今の僕の理屈ではひかりの悩みを解いてやれない。
1310 = "……Lý lẽ hiện tại của tôi không thể giải quyết được nỗi phiền muộn của Hikari."
# monologue
# JP: 『本当に伝えたいことは伝えられる』と繰り返すなら、\n気休めにさえならないばかりか、ひかりの願いを否定する。
2611 = "Nếu cứ lặp đi lặp lại 『Điều thực sự muốn nói thì sẽ nói được』, thì không những chẳng an ủi được gì, mà còn phủ nhận mong muốn của con bé."
# 【ポーレット】
# display as 波萊特
# JP: 「ママも、同じ。\nずっとずうっと、そうだった」
1929 = "「Mẹ cũng, giống vậy.\nĐã luôn luôn, như thế đó」"
# 【ひかり】
# display as 光
# JP: 「まま」
1928 = "「Mẹ」"
# monologue
# JP: つまってしまった僕の言葉を、\nポーレットが静かに掬ってくれる。
2606 = "Những lời nói nghẹn lại của tôi, được Paulette nhẹ nhàng nâng đỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「大事なことって思えば思うほど、伝えられなかった。\nわたしの声を、話を、聞いてもらえないって、感じて」
1956 = "「Càng nghĩ là chuyện quan trọng, lại càng không thể nói ra. Mẹ luôn cảm thấy, tiếng nói của mẹ, câu chuyện của mẹ, sẽ không có ai lắng nghe」"
# 【ひかり】
# display as 光
# JP: 「……まぁま？」
1364 = "「...Mẹ ơi?」"
# monologue
# JP: ご両親のことを、ポーレットは思い出しているのだろう。
2512 = "Có lẽ Paulette đang nhớ về bố mẹ của mình."
# monologue
# JP: 普段にはないさみしい響きに、\nひかりが、おどろいたような瞬きをする。
2556 = "Trước âm sắc buồn bã hiếm thấy đó, Hikari chớp mắt như ngạc nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「伝えられないで、しまい込んで。\nしまい込んだら、伝えることがもっともっと怖くなって」
2110 = "「Không thể nói ra, nên đành cất giấu đi. Cất giấu rồi, lại càng thấy sợ hãi việc phải nói ra hơn nữa」"
# 【ひかり】
# display as 光
# JP: 「……うん」
# 1362 = "「……嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「そうするうちに、怖さで、寂しさで一杯になって。\nそんなときにね？　ママは、男の子と出会ったの」
2210 = "「Cứ thế, sự sợ hãi, nỗi cô đơn lấp đầy trong lòng. Và rồi lúc đó nhé? Mẹ đã, gặp được một cậu bé」"
# 【ひかり】
# display as 光
# JP: 「どんなこー？」
2034 = "「Cậu bé như thế nào ớ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
1798 = "「Ufufu」"
# monologue
# JP: ポーレットが微笑む。僕を見る。\n急に、顔面が熱くなる。
2719 = "Paulette mỉm cười. Nhìn tôi. Đột nhiên, mặt tôi nóng ran."
# monologue
# JP: というか、これは――
2656 = "Mà khoan, cái này là――"
# monologue
# JP: （ざばあっ）
# 2854 = "（嘩啦）" 
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、茹だった。僕は先にあがっている」
2017 = "「Xin lỗi, tôi chín rồi. Tôi lên trước đây」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいなもあがりますねぇ」
1801 = "「Ufufu, Reina cũng lên đây nha~」"
# monologue
# JP: ……聞いているのも気恥ずかしいし、\nそれより前に、ふたりっきりで話して欲しいとも思う。
1305 = "……Nghe mấy chuyện này cũng xấu hổ lắm, với lại, tôi cũng muốn để hai mẹ con tâm sự riêng tư với nhau."
# monologue
# JP: 母と娘と、ふたりっきりで。\nひかりが産まれる、きっかけとなったあの日のことを。
2788 = "Chỉ có mẹ và con gái, hai người với nhau. Về ngày hôm ấy, ngày khởi đầu cho sự ra đời của Hikari."
# 【ひかり】
# display as 光
# JP: 「（……すぅ、すぅ、すぅ、すぅ）」
2236 = "「(......Su, su, su, su)」"
# 【れいな】
# display as 玲奈
# JP: 「（すや～――すやぁあ～）」
2238 = "「(Suya~――Suya~a~)」"
# monologue
# JP: ……寝息が聞こえる。
1312 = "……Tiếng thở đều đều vang lên."
# monologue
# JP: ひかりの方が小刻みで規則的、\nれいなの方はゆっくり、いささか不規則だ。
2477 = "Tiếng thở của Hikari thì ngắn và nhịp nhàng, còn của Reina thì chậm rãi, hơi thất thường một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「……こんなところにも、性格が出るものかな」
1371 = "「...Cả những lúc thế này, tính cách cũng bộc lộ ra nhỉ」"
# monologue
# JP: いつもと違う布団の中だが、\nいつもと同じ、川の字プラス1の格好だ。
2829 = "Dù nằm trong tấm chăn khác với mọi khi, nhưng tư thế vẫn giống hệt, kiểu chữ Xuyên cộng 1."
# monologue
# JP: 寝入ってしまえば、ひかりもれいなも、\nほとんど起き出すことはない。
2412 = "Một khi đã ngủ say, cả Hikari và Reina, hầu như sẽ không thức giấc."
# 【ポーレット】
# display as 波萊特
# JP: 「……どんな性格ですか？」
1352 = "「...Tính cách như thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞いたままだ」
2195 = "「Đúng như những gì em nghe thấy đấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ。ですかねー」
1800 = "「Ufufu. Vậy saoー」"
# monologue
# JP: ポーレットの声の調子は明るい。\n僕も、なんとなくほっとする。
2725 = "Giọng điệu của Paulette nghe rất vui vẻ. Tôi cũng bất giác cảm thấy nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりが、わかってくれたのか？」
1693 = "「Hikari, đã hiểu ra chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかったって、何をです？」
2165 = "「Hiểu ra, là hiểu chuyện gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らが、伝えようとしたことをだ」
2166 = "「Những điều mà chúng ta, đã cố gắng truyền đạt ấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「さーて、どうですかねー」
2207 = "「Chà, ai biết được nhỉー」"
# monologue
# JP: もぞりと、布団の中で手が動く。\n僕も、応える。
2774 = "Bàn tay khẽ cựa quậy trong chăn.\nTôi cũng, đáp lại."
# monologue
# JP: いつもそうしているように、布団の中で、\n僕ら夫婦は、むすめふたりごし、手をつなぐ。
2580 = "Như mọi khi, trong tấm chăn ấm áp, vợ chồng chúng tôi, nắm tay nhau qua hai cô con gái."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが伝えようとしてたことって、\nなんです？」
1740 = "「Điều mà Soutetsu định truyền đạt,\nlà gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『焦らずともいい』ということが第一だな」
2233 = "「Điều đầu tiên là 『Không cần phải vội vàng』」"
# monologue
# JP: 行商のおばあさんから教わったこと。\nぼくらが、ともに納得したこと。
2811 = "Điều đã học được từ bà lão bán hàng rong. Điều mà cả hai chúng tôi, đều đồng tình."
# 【双鉄】
# display as 雙鐵
# JP: 「その上で、『本当に大事なことなら、\n伝えたいからがんばれる』と伝えたかった。が」
2112 = "「Thêm vào đó, tôi muốn truyền đạt rằng 『Nếu thực sự là chuyện quan trọng, thì vì muốn nói ra nên sẽ cố gắng được』. Nhưng mà」"
# monologue
# JP: ……どうにも、うまくいかなかった。
1318 = "……Chẳng hiểu sao, lại không suôn sẻ chút nào."
# monologue
# JP: 僕が見つけたつもりの答えは、\nひかりの問いには、あまりに無骨にすぎたようだ。
2638 = "Câu trả lời mà tôi tưởng mình đã tìm ra, dường như quá thô kệch đối với câu hỏi của Hikari."
# 【双鉄】
# display as 雙鐵
# JP: 「……本当にむつかしいものだな。\n伝えたいことを伝える、というだけのことが」
1365 = "「...Thật sự rất khó khăn nhỉ. Chỉ việc truyền đạt điều mình muốn nói thôi mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
2043 = "「Đúng vậy」"
# monologue
# JP: ポーレットの声は柔らかだ。
2723 = "Giọng Paulette rất dịu dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「仲居さんも、そうでしたものね」
2079 = "「Cô phục vụ cũng vậy mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ひかりが、こけしを落としてしまったことを、\n慰めようとしてくれたのだものな」
1863 = "「Ừ. Cô ấy chỉ muốn an ủi Hikari, vì con bé lỡ làm rơi búp bê kokeshi thôi mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「『平気だよ』『何でも無いよ』って、こけしに\nしゃべらせてくれて――それが、裏目に出ちゃった」
2007 = "「Cô ấy giả vờ làm cho búp bê kokeshi nói 『Không sao đâu』, 『Không có gì đâu』――ai ngờ lại phản tác dụng」"
# 【双鉄】
# display as 雙鐵
# JP: 「……仲居さんが意地悪をした、と――\nひかりが、誤解しなければいいのだが」
1355 = "「...Chỉ mong là Hikari, không hiểu lầm rằng―― cô phục vụ đang trêu chọc con bé」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこは、大丈夫ですよ。\nれいなのフォローもありましたし」
2094 = "「Chuyện đó thì, không sao đâu. Cũng nhờ có Reina giúp đỡ nữa mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「嗯」" 
# monologue
# JP: ふうっと、ポーレットが疲れたような、\n困ったような息を吐く。
1293 = "Phù, Paulette thở dài, nghe như mệt mỏi, lại như đang bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり、そこをわかってて。自分が泣いちゃったことで、\n仲居さんを困らせたのも――理解してるみたいです」
1755 = "「Hikari, con bé hiểu điều đó. Cả việc con bé khóc, làm cô phục vụ bối rối――có vẻ con bé cũng hiểu」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ。それを気に病まぬとよいのだが」
1823 = "「Ưm. Mong là con bé không quá bận tâm về chuyện đó」"
# 【ポーレット】
# display as 波萊特
# JP: 「明日になったら忘れてくれてるといいんですけど――\nどうでしょうね？　こどもって……」
1921 = "「Mong là đến ngày mai con bé sẽ quên đi―― Nhưng ai biết được nhỉ? Trẻ con mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「大事なことを忘れたり、妙なことだけ覚えていたり。\n……それは僕達大人も同じなのかもしれんが」
2077 = "「Chuyện quan trọng thì quên béng, chuyện kỳ cục thì lại nhớ dai. ...Có khi người lớn chúng ta cũng vậy thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 2043 = "「是啊」" 
# monologue
# JP: ふっ、と。\nポーレットの今度の息は、微笑に近い。
2730 = "Phì. Tiếng thở hắt ra lần này của Paulette, gần giống như một nụ cười."
# 【ポーレット】
# display as 波萊特
# JP: 「こころの中のことなんて、大人にだって、\n上手に扱うの、難しいことですものね」
1947 = "「Chuyện trong lòng, ngay cả với người lớn, cũng rất khó để xử lý cho khéo léo mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「でも、伝わりますよ。必ず、ひかりに。\nわたしたちが、これほど伝えたいって思ってること」
1728 = "「Nhưng mà, sẽ truyền đạt được thôi. Chắc chắn, đến Hikari. Những điều mà chúng ta, rất muốn truyền đạt cho con bé」"
# monologue
# JP: 励ましや気休めの調子ではない。\nポーレットはそう、こころの底から信じている。
2807 = "Không phải là giọng điệu động viên hay an ủi. Paulette thực sự, tin tưởng điều đó từ tận đáy lòng."
# monologue
# JP: 僕の言葉も、\nだから、どこまでだって素直になれる。
2550 = "Những lời nói của tôi, cũng vì thế mà có thể trở nên chân thành đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「そう願っている。\n願わずとも、いつか自然と、叶うことかもしれんが」
2205 = "「Tôi cũng mong là vậy. Dù không mong ước, thì có lẽ một ngày nào đó, nó cũng sẽ tự nhiên thành hiện thực thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「でも、そのいつかを、少しでも早めてあげたいですよね。\nだって、こんなに素敵なんだから」
1736 = "「Nhưng mà, anh cũng muốn ngày đó đến sớm hơn một chút đúng không. Bởi vì, nó tuyệt vời đến thế cơ mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 
# monologue
# JP: 話し合うこと。\n言葉を単に、交わすこと。
2793 = "Việc trò chuyện cùng nhau. Đơn thuần là trao đổi lời nói."
# monologue
# JP: 思いを、考えを混じらせること。\n会話して、一人の時間をふたりの時間にしてしまうこと。
2602 = "Việc hòa trộn những suy nghĩ, những ý tưởng. Việc trò chuyện, biến thời gian của một người thành thời gian của hai người."
# 【ポーレット】
# display as 波萊特
# JP: 「怖いことも、いやな思いをすることもあったりするけど。\nそれでも、人とかかわることは、とっても素敵」
2227 = "「Dù cũng có lúc gặp chuyện đáng sợ, hay những điều không vui. Nhưng dẫu vậy, việc gắn kết với mọi người, vẫn rất tuyệt vời」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、ひかりに伝えられたか？」
1738 = "「Paulette, em đã truyền đạt được cho Hikari chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「伝わったのかな？\nそこのところを話せてたのかも、わかりません。けど」
2183 = "「Đã truyền đạt được chưa nhỉ? Em cũng không rõ là mình có nói được phần đó không nữa. Nhưng mà」"
# monologue
# JP: くすっと、幸せそうな音が布団の上を転がる。
2718 = "Tiếng cười khúc khích hạnh phúc lăn trên mặt chăn."
# 【ポーレット】
# display as 波萊特
# JP: 「夢中になって、聞いてくれてはいましたよ？\n途中から、パパとママのむかしのことって気づいて」
1718 = "「Con bé đã nghe rất say sưa đó anh biết không? Từ giữa chừng, con bé nhận ra đó là chuyện ngày xưa của ba và mẹ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それはなんとも、嬉しいことだな」
1320 = "「Vậy sao. Thật là một điều đáng mừng nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「どっちかっていうと、わたし達に子供時代があった――\nっていうことに興奮している感じでしたけど」
1686 = "「Nói đúng hơn thì, có vẻ con bé phấn khích vì việc chúng ta cũng từng có thời thơ ấu ấy――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n……そういうものかもしれんなぁ」
1847 = "「À.\n...Chắc là vậy rồi」"
# monologue
# JP: 両親のことを、思い出してみる。\n理屈では当然、父と母にも子供時代はあったのだろうが。
2653 = "Thử nhớ lại về bố mẹ mình. Về lý thuyết thì đương nhiên, bố và mẹ cũng từng có thời thơ ấu."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、父と母は大人だな。\n最初からずっと、大人な生き物なような気がする」
2135 = "「Quả thật, bố và mẹ là người lớn nhỉ. Cứ có cảm giác họ là những sinh vật trưởng thành ngay từ đầu vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「でも、そうじゃないって。\n多分、産まれて初めて実感できたんじゃないかなー」
1726 = "「Nhưng, không phải vậy đâu. Có lẽ, đây là lần đầu tiên từ khi sinh ra con bé cảm nhận được điều đó đấyー」"
# 【双鉄】
# display as 雙鐵
# JP: 「実感したようで――どうだった？」
1911 = "「Có vẻ như đã cảm nhận được――thế nào rồi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「感じることはいろいろあったみたいでしたよ？\n真っ赤になるまで考えてましたから」
1998 = "「Có vẻ con bé đã cảm nhận được rất nhiều điều đấy? Nghĩ ngợi đến đỏ bừng cả mặt mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「元気をすっかり取り戻していたしな」
2163 = "「Con bé đã hoàn toàn lấy lại tinh thần rồi nhỉ」"
# monologue
# JP: 旅館側が気をつかったのか、風呂上がり、\n食事を運んできてくれたのは、ベテランの仲居さんだった。
2507 = "Không biết có phải phía nhà trọ đã lưu tâm hay không, mà sau khi tắm xong, người mang thức ăn đến là một cô phục vụ kỳ cựu."
# monologue
# JP: ひかりはやはり隠れていたが、それ以上気にした風もなく、\n宿泊費には不似合いなほど豪華な食事を楽しんでいた。
2489 = "Hikari vẫn trốn, nhưng có vẻ không bận tâm thêm nữa, con bé đã thưởng thức bữa ăn sang trọng đến mức không tưởng so với tiền phòng."
# 【双鉄】
# display as 雙鐵
# JP: 「……明日は、早い出発だったか」
1368 = "「...Ngày mai, chúng ta khởi hành sớm phải không」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。せっかくここまで来たんですし、\n帰りのストーブ列車に乗るまでにも、やっぱり」
2053 = "「Vâng. Đã cất công đến tận đây rồi, cho đến lúc lên chuyến tàu sưởi ấm để về, thì vẫn phải」"
# 【双鉄】
# display as 雙鐵
# JP: 「始発にのって、[やまがた,1]山縣方面に向かって、折り返して――\nそれで、ちょうどの感じなんだよな」
1754 = "「Bắt chuyến tàu đầu tiên, hướng về phía Yamagata, rồi quay lại―― Như vậy là vừa vặn thời gian nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。エアクラとか、他の交通手段を使った\nエスケープルートも考えてありますから」
2045 = "「Đúng vậy đúng vậy. Em cũng đã nghĩ đến lộ trình thoát hiểm bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; hay các phương tiện giao thông khác rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1866 = "「嗯」" 
# monologue
# JP: となると鍵を置くだけのチェックアウトになるかもしれん。\nあの若い仲居さんとは、恐らくはもう二度と会わない。
2814 = "Vậy thì có khi lúc trả phòng chỉ cần để lại chìa khóa là xong. Có lẽ sẽ không bao giờ gặp lại cô phục vụ trẻ tuổi đó nữa."
# monologue
# JP: ……フォローをきちんとしてくれたことに、\nお礼のひとことも伝えたかったが。
1301 = "……Dù rất muốn gửi lời cảm ơn vì cô ấy đã xử lý tình huống rất chu đáo."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2229 = "「Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1872 = "「À, không có gì」"
# monologue
# JP: ポーレットもまた、特に気にしているふうもない。\n蒸し返すような形になるのも、よろしくなかろう。
2757 = "Paulette cũng không có vẻ gì là bận tâm đặc biệt. Nhắc lại chuyện cũ có lẽ cũng không hay."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりに、風呂で。具体的には――\n僕らの昔の、どんな話をしてやったんだ？」
2226 = "「Lúc nãy trong phòng tắm với Hikari. Cụ thể là―― em đã kể cho con bé nghe chuyện gì về quá khứ của chúng ta vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ただ、あの日のことを、丁寧にです。\n双鉄君の事故のこととかは、話しませんでしたけど」
1981 = "「Chỉ là, kể lại cẩn thận về ngày hôm đó thôi. Em không nói về chuyện tai nạn của anh đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「あの日のわたしが、さみしかったこと。\n双鉄くんが、とってもさみしそうに見えたこと――」
2003 = "「Về việc em ngày hôm đó, đã rất cô đơn. Và Soutetsu trông cũng vô cùng cô đơn――」"
# monologue
# JP: きゅっと、ポーレットの指の力が強くなる。\n僕も応えて、指の力を強くする。
2720 = "Lực ở những ngón tay của Paulette siết chặt hơn. Tôi cũng đáp lại, nắm chặt lấy tay cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「『この男の子と話したいな』って、すごく思って。\nそうしたら話しかけちゃってた――みたいな感じです」
1985 = "「Em đã nghĩ rất nhiều rằng 『Mình muốn nói chuyện với cậu bé này』. Và thế là em đã bắt chuyện luôn――đại loại vậy đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本語も、おぼつかなかったころなのに、な」
2030 = "「Khi đó tiếng Hinomoto của em còn chưa sõi mà nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。いま考えるとすごい勇気です。\n……ひょっとしたら、一目惚れだったのかも」
2042 = "「Đúng vậy. Giờ nghĩ lại thấy dũng cảm thật đấy. ...Biết đâu, đó là tiếng sét ái tình cũng nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「一目惚れ」
1678 = "「Tiếng sét ái tình」"
# monologue
# JP: いきなり出てきた言葉に少し、驚かされる。
2761 = "Tôi hơi ngạc nhiên trước từ ngữ bất ngờ thốt ra đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだが、ポーレットもいっそう子供だったろう。\n一目惚れだなんだというには――」
2132 = "「Anh thì không nói, nhưng Paulette lúc đó còn rất nhỏ mà. Nói là tiếng sét ái tình thì――」"
# 【ポーレット】
# display as 波萊特
# JP: 「女の子には、ふつうにあると思いますよ？\nどんなに小さくても、恋とか、一目惚れとか」
1999 = "「Em nghĩ với con gái thì chuyện đó bình thường mà? Dù có nhỏ tuổi đến đâu, tình yêu hay tiếng sét ái tình gì đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2064 = "「Vậy sao」"
# monologue
# JP: 断言されれば、急にぞわぞわとしたものを感じる。
2762 = "Bị khẳng định chắc nịch như vậy, tôi chợt thấy rùng mình."
# monologue
# JP: ひかりにも、そんな瞬間がくるかと思えば、\nなんとも不安だし落ち着かない。
2410 = "Cứ nghĩ đến việc Hikari cũng sẽ có khoảnh khắc như thế, thật sự thấy bất an và không thể bình tĩnh nổi."
# 【ポーレット】
# display as 波萊特
# JP: 「恋がなにかをわかるのは、きっとずうっと先ですけど。\nわからないなりに、惚れますよ」
1695 = "「Chắc phải rất lâu nữa mới hiểu tình yêu là gì. Nhưng dù không hiểu, thì vẫn biết rung động đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「惚れると、どうなる？」
1679 = "「Rung động rồi thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしの場合は――勇気、出たんだと思います。\nもちろん、全然違うのかもしれませんけど」
1955 = "「Trường hợp của em thì――em nghĩ là có dũng khí hơn. Tất nhiên, có thể hoàn toàn không phải vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「……『悪いのは[ひと,1]人間なんだって、\n一緒に責めて欲しかった』」
1331 = "「...『Mình đã muốn cậu cùng mình đổ lỗi, rằng kẻ xấu xa chính là con người cơ』」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ、覚えてましたか」
1809 = "「Oa, anh vẫn nhớ sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。驚いたからな。\nすれ違いから、僕らは絆を結べたのだと、知って」
1854 = "「Ừ. Vì anh đã rất ngạc nhiên mà. Khi biết rằng, chính từ sự hiểu lầm đó mà chúng ta đã kết nối được với nhau」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですねぇ」
# 2043 = "「是啊」" 
# monologue
# JP: ふたり、結ばれたあの日のように――\nポーレットの指が、僕に甘えて少しうごめく。
2722 = "Giống như ngày hai chúng tôi hòa làm một―― Những ngón tay của Paulette khẽ cựa quậy, nũng nịu với tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも。きっと双鉄くんも。あの線路沿いで。\n話したくって、伝えたくって、一生懸命でしたよね？」
1983 = "「Cả em. Và chắc chắn cả Soutetsu nữa. Dọc theo tuyến đường sắt năm ấy. Chúng ta đã rất muốn nói chuyện, rất muốn truyền đạt, và đã cố gắng hết sức đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だったと思うし、そうがんばった。\nけれどお互い、自分にとって都合がいいよう誤解した」
2048 = "「Anh nghĩ là vậy, và chúng ta đã cố gắng như thế. Nhưng cả hai đều hiểu lầm theo hướng có lợi cho bản thân mình」"
# 【ポーレット】
# display as 波萊特
# JP: 「誤解したから。理想を相手に押しつけたから。\nだから、ずうっと、忘れずにいたのかもしれませんよ？」
2182 = "「Vì đã hiểu lầm. Vì đã áp đặt lý tưởng của mình lên đối phương. Nên có lẽ vì vậy, mà chúng ta mới mãi không thể quên được nhau đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。\n誤解が僕らを、僕らふたりにしたのかもしれん」
1788 = "「Có lẽ vậy. Sự hiểu lầm đã biến chúng ta, thành hai chúng ta của bây giờ cũng nên」"
# monologue
# JP: うふふっ、と、幸せそうな笑いがこぼれる。
2533 = "Ufufu, một nụ cười hạnh phúc khẽ vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「そう考えると、難しいし、面白いですよね、\nコミュニケーションって」
2211 = "「Nghĩ vậy mới thấy, giao tiếp thật sự rất khó, nhưng cũng rất thú vị nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 
# monologue
# JP: ポーレットの手が温かで、なんだかんだで疲れ切ってて、\nじわじわ眠くなってる。
2721 = "Bàn tay Paulette thật ấm áp, và dù sao thì tôi cũng đã kiệt sức rồi, cơn buồn ngủ đang dần kéo đến."
# 【双鉄】
# display as 雙鐵
# JP: 「怖くて、面白くて、難しい。\nけれど、一番大事なことは、ひとつだと思う」
1954 = "「Đáng sợ, thú vị, và khó khăn. Nhưng, anh nghĩ điều quan trọng nhất chỉ có một thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「です、ね」
# 2043 = "「是啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「人とふれあうことは、素敵だ。痛みや誤解に怯えて、\n言葉をしまいこんでしまうことは、とてももったいない」
2167 = "「Việc gắn kết với con người là một điều tuyệt vời. Nếu vì sợ hãi nỗi đau hay sự hiểu lầm, mà cất giấu những lời muốn nói đi, thì thật sự rất lãng phí」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりなりのやり方……伝え方――。\nうまく、見つけてくれるといいんですけど」
1948 = "「Cách làm... cách truyền đạt của riêng Hikari――. Mong là con bé sẽ tìm ra được một cách suôn sẻ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこは、教えなかったのか？」
1742 = "「Em không dạy con bé điều đó sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「教えるもなにも、\n方法、わたしもよくわかってませんもん」
2023 = "「Dạy dỗ gì chứ, chính em cũng chưa hiểu rõ phương pháp mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1866 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「でも、ひとつだけは」
1734 = "「Nhưng, chỉ có một điều là」"
# monologue
# JP: 暗闇の中、視線を感じる。\nポーレットが、僕を見つめてくれている。
2651 = "Trong bóng tối, tôi cảm nhận được ánh nhìn. Paulette đang ngắm nhìn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「『本当に大事ななにかを伝えたいなら、\n相手のことをちゃあんと見る』って」
1328 = "「Đó là 『Nếu muốn truyền đạt một điều gì đó thực sự quan trọng, thì phải nhìn thật kỹ đối phương』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いい教えだな」
1876 = "「Ừ――một lời dạy rất hay」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
# 1798 = "「呵呵呵」" 
# monologue
# JP: ふっと、見られている感じが消える。\n僕も、自然と目を閉じている。
2597 = "Đột nhiên, cảm giác bị nhìn biến mất. Tôi cũng tự nhiên nhắm mắt lại."
# monologue
# JP: 安心できた。満ち足りている。今はこれ以上考えたくない。\nこの暖かさに、ただひたすらにつつまれていたい。
2640 = "Thấy an tâm rồi. Thấy trọn vẹn rồi. Giờ tôi không muốn nghĩ thêm gì nữa. Chỉ muốn đắm mình hoàn toàn trong sự ấm áp này."
# 【ポーレット】
# display as 波萊特
# JP: 「おやすみなさい、双鉄くん」
2071 = "「Chúc ngủ ngon, Soutetsu」"
# monologue
# JP: ポーレットの声が、まろやかだ。\n眠りに半ば、彼女もおちつつあるのだろう。
2724 = "Giọng nói của Paulette thật êm ái. Có lẽ cô ấy cũng đang chìm dần vào giấc ngủ rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、僕のポーレット」
2070 = "「Ngủ ngon nhé, Paulette của anh」"
