# 【双鉄】
# display as 雙鐵
# JP: 「こころで見たとは、言い得て妙だ」
2050 = "「是用心看出來的，你這個形容真妙」" 

# 【ひかり】
# display as 光
# JP: 「こころで、おててがみえるのぉ？」
2131 = "「用心能看到手手嗎？」" 

# 【ポーレット】
# display as 波萊特
