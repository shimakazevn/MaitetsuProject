1885 = "「因為很有趣，所以擅長？」" 

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。誰かにおはなししてもらうのは、\nとっても、とおっても楽しいですよぉ」
2037 = "「是啊。別人跟玲奈說話的時候，玲奈都感到非常非常地開心」" 

# 【ひかり】
# display as 光
