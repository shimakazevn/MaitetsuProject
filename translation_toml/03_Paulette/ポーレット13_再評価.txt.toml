1305 = "「啊」" 

# monologue
# JP: 足音。ぽてぽて近づいてくる。\nまだ眠いのかな？　いつもよりもゆっくりしてる。
1826 = "玲奈發出啪嗒啪嗒的腳步聲向這邊走來。是還有些睏嗎？　她似乎走得比平時要慢。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……おはようございまぁす、ポーレット、\nこんな朝早くからお電話ですかぁ？」
1290 = "「呼啊……早安，波萊特。這麼一大早就在打電話嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おはよう、れいな。\nごめんね？　電話で起こしちゃった？」
1390 = "「早安，玲奈。對不起哦。電話吵醒你了？」" 

# 【れいな】
# display as 玲奈
# JP: 「平気ですよぉ。\nお電話、だれからだったのですかぁ？」
1409 = "「沒有哦。是誰的電話呀？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん、毛利の電車姫様から」
1312 = "「嗯，是毛利的電車公主」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわ。\nお姫様は早起きさんなのですねぇ」
1292 = "「呼啊。公主殿下起得還真是早啊」" 

# monologue
# JP: 屈託の無いれいなの言葉に、\nくすくす笑いが湧いてくる。
1824 = "玲奈天真的話語逗笑了我。" 

# monologue
# JP: あのひとは、まさしく本物のお姫様。\n朝も夜中も、まるで気にしないっていう方でもあるから。
1915 = "那個人簡直就是真正的公主。而她打電話也完全不會顧忌是早上還是深夜。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、早起きさんね。\nでも、おかげでスッキリ起きられた」
1395 = "「是啊，起得好早。不過也多虧這一通電話，讓我完全清醒了」" 

# monologue
# JP: うん――本当に、目が覚めた。覚ましてもらえた。\nわたし、昨夜からずうっとふわふわしちゃってたんだ。
1688 = "嗯——真的是完全清醒了。被弄清醒了。從昨晚開始，我就一直感覺輕飄飄的。" 

# monologue
# JP: 双鉄くんに、やっと――恋を伝えることができたから。\n双鉄くんから――恋を、伝えてもらえたから。
1753 = "我終於向雙鐵君傳達出了自己的感情，而雙鐵君也回應了這份感情。" 

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ、れいなもスッキリですよぉ！\nたぁくさん眠って、機関部駆動部絶好調――あ」
1391 = "「是呀，玲奈也完全清醒了！睡了好久，引擎和驅動部分都狀態良好——啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1301 = "「哎！？」" 

# monologue
# JP: やだ、もしかして、どこかに異常が――
