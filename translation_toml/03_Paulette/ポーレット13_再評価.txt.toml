1397 = "「是的。\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;明天就可以送到御一夜。而且她還說就算議會沒有通過議案，也不用把車廂送回來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――なんとも力強いご応援だな。\n議案がもしも通らなくても、諦めるなということだ」
1163 = "「——這可真是強力的支持啊。她是叫我們就算議案沒能通過也不要放棄呀」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね、やっぱり」
1370 = "「我想也是呢」" 

# monologue
