1917 = "那就只好由我發動攻勢了。這也是雙鐵君告訴我的，讓我回想起來的。" 

# monologue
# JP: わたしたちは――求めることを、許されてるって。
1741 = "我們是可以追求幸福的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1305 = "「啊」" 

# 【ポーレット】
# display as 波萊特
