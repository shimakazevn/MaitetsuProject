# JP: この子の改修にも関わることだ。\nすぐに、伝えてあげなくちゃ。
1929 = "電話內容也與玲奈的改造有關，得趕快告訴她才行。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あのね？　れいな……」
1436 = "「聽我說哦，玲奈……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1313 = "「嚯」" 

# 【双鉄】
# display as 雙鐵
