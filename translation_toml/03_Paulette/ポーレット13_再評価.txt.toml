[script]
# lines: 216 
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか――はい！　ありがとうございます。\nはい――はい――わかりました。それでは、失礼します」
1401 = "「Vậy sao ạ――Vâng! Cháu cảm ơn cô. Vâng――vâng――cháu hiểu rồi ạ. Vậy, cháu xin phép cúp máy ạ.」"
# monologue
# JP: （プッ）
1952 = "（Tít）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぅ」
1293 = "「Phù.」"
# monologue
# JP: “やんごとない”って、日ノ本語、\nニュアンスを、やっとつかめた気がする。
1737 = "“Cao quý”, một từ trong tiếng Hinomoto, có lẽ cuối cùng tôi cũng đã nắm bắt được sắc thái của nó."
# monologue
# JP: 電話越し、普通に、気さくにお話をしてもらってるのに、\nこっちの背筋を伸ばしてなくちゃいけないみたいで――
1768 = "Dù đang nói chuyện qua điện thoại một cách rất đỗi bình thường, cởi mở, nhưng tôi lại có cảm giác như mình phải ngồi thẳng lưng lên vậy――"
# 【れいな】
# display as 玲奈
# JP: 「むにゃあ」
# 1293 = "「呼啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1305 = "「A.」"
# monologue
# JP: 足音。ぽてぽて近づいてくる。\nまだ眠いのかな？　いつもよりもゆっくりしてる。
1826 = "Tiếng bước chân. Lạch bạch tiến lại gần. Vẫn còn buồn ngủ sao? Bước chân chậm hơn mọi khi."
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……おはようございまぁす、ポーレット、\nこんな朝早くからお電話ですかぁ？」
1290 = "「Oa……chào buổi sáng ạ~, chị Paulette, mới sáng sớm mà chị đã gọi điện thoại rồi ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「おはよう、れいな。\nごめんね？　電話で起こしちゃった？」
1390 = "「Chào buổi sáng, Reina. Chị xin lỗi nhé? Tiếng điện thoại làm em thức giấc à?」"
# 【れいな】
# display as 玲奈
# JP: 「平気ですよぉ。\nお電話、だれからだったのですかぁ？」
1409 = "「Không sao đâu ạ~.\nĐiện thoại, từ ai gọi đến vậy ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、毛利の電車姫様から」
1312 = "「Ừm, từ Công chúa Xe điện của nhà Mouri.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわ。\nお姫様は早起きさんなのですねぇ」
1292 = "「Oa.\nCông chúa dậy sớm thật đấy nhỉ~」"
# monologue
# JP: 屈託の無いれいなの言葉に、\nくすくす笑いが湧いてくる。
1824 = "Những lời nói vô tư lự của Reina, khiến tôi bật cười khúc khích."
# monologue
# JP: あのひとは、まさしく本物のお姫様。\n朝も夜中も、まるで気にしないっていう方でもあるから。
1915 = "Người đó, quả thực là một nàng công chúa đích thực. Bởi cô ấy là người chẳng hề bận tâm đến việc lúc này là sáng hay đêm."
# 【ポーレット】
# display as 波萊特
# JP: 「そうね、早起きさんね。\nでも、おかげでスッキリ起きられた」
1395 = "「Đúng vậy nhỉ, dậy sớm thật đấy. Nhưng nhờ vậy mà chị đã tỉnh ngủ hẳn rồi.」"
# monologue
# JP: うん――本当に、目が覚めた。覚ましてもらえた。\nわたし、昨夜からずうっとふわふわしちゃってたんだ。
1688 = "Ừm――thực sự là, tôi đã tỉnh giấc. Được đánh thức. Tôi đã cứ lơ lửng trên mây suốt từ đêm qua đến giờ."
# monologue
# JP: 双鉄くんに、やっと――恋を伝えることができたから。\n双鉄くんから――恋を、伝えてもらえたから。
1753 = "Bởi vì cuối cùng――tôi cũng đã có thể truyền đạt tình cảm của mình đến anh Soutetsu. Bởi vì――anh Soutetsu cũng đã truyền đạt tình cảm của anh ấy đến tôi."
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ、れいなもスッキリですよぉ！\nたぁくさん眠って、機関部駆動部絶好調――あ」
1391 = "「Đúng vậy nhỉ~, Reina cũng tỉnh táo hẳn rồi ạ~! Ngủ một giấc thật đã, động cơ và bộ phận truyền động đều đang ở trạng thái tốt nhất――a.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1301 = "「Hả!?」"
# monologue
# JP: やだ、もしかして、どこかに異常が――
1727 = "Thôi chết, không lẽ, có chỗ nào bất thường――"
# 【れいな】
# display as 玲奈
# JP: 「そうでしたぁ。あのですね、電車姫さまからのお電話、\nどんなお話だったんですかぁ？」
1330 = "「À đúng rồi ạ~. Chuyện là, điện thoại từ Công chúa Xe điện, đã nói về chuyện gì vậy ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ」
# 1305 = "「啊」" 
# monologue
# JP: ホっとする。\nっていうか、そうだ。
1755 = "Tôi thở phào nhẹ nhõm.\nÀ mà, đúng rồi."
# monologue
# JP: この子の改修にも関わることだ。\nすぐに、伝えてあげなくちゃ。
1929 = "Chuyện này cũng liên quan đến việc cải tạo của con bé. Phải báo cho con bé biết ngay mới được."
# 【ポーレット】
# display as 波萊特
# JP: 「あのね？　れいな……」
1436 = "「Chuyện là thế này nhé? Reina……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1313 = "「Hô.」"
# 【双鉄】
# display as 雙鐵
# JP: 「移送も全部、電車姫様がご手配くださったのか」
1482 = "「Ngay cả việc vận chuyển, Công chúa Xe điện cũng sắp xếp toàn bộ sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;、明日にも御一夜に届くそうです。\nしかも、議案通過がならなくても、返却不要ってことで」
1397 = "「Vâng. \\x%lストーブ客車;#00ffc040;Toa xe sưởi ấm%l;#, nghe nói ngày mai sẽ đến Ohimitera. Hơn nữa, cô ấy còn bảo dù nghị án không được thông qua, thì cũng không cần trả lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――なんとも力強いご応援だな。\n議案がもしも通らなくても、諦めるなということだ」
1163 = "「――Quả là một sự ủng hộ vô cùng mạnh mẽ. Ý cô ấy là dù nghị án không được thông qua, thì cũng đừng bỏ cuộc.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね、やっぱり」
1370 = "「Quả nhiên là vậy, anh nhỉ.」"
# monologue
# JP: 双鉄くんは、話が早い。\nいつもきっぱり、物事をすぐに定めてくれる。
1926 = "Anh Soutetsu hiểu chuyện rất nhanh. Lúc nào anh ấy cũng dứt khoát, nhanh chóng định đoạt mọi việc."
# monologue
# JP: それが頼もしくて心強くて、\nだけれど今日は――ほんのちょっとだけ憎らしい。
1924 = "Điều đó thật đáng tin cậy và vững tâm, nhưng hôm nay――tôi lại thấy hơi đáng ghét một chút."
# monologue
# JP: （この人ってば……\nなんでこんなに、いつもと同じなんだろう）
1961 = "（Cái người này thật là…… tại sao lúc nào cũng tỏ ra bình thường như vậy chứ.）"
# monologue
# JP: わたしは、ふわふわまだしてるのに。
1770 = "Trong khi tôi vẫn còn đang lơ lửng trên mây."
# monologue
# JP: 電車姫様に引き締められて、それでも顔を見た瞬間、\nもう全部、双鉄くんにふわふわ引き寄せられそうなのに。
1877 = "Dù đã được Công chúa Xe điện chấn chỉnh tinh thần, nhưng ngay khoảnh khắc nhìn thấy khuôn mặt anh ấy, tôi lại có cảm giác như mọi thứ lại bị hút về phía anh Soutetsu một cách lâng lâng."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、ご無用な気遣いだ。\n議案は――必ず通過出来る」
1264 = "「Nhưng, sự lo lắng đó là thừa thãi rồi. Nghị án――chắc chắn sẽ được thông qua.」"
# monologue
# JP: （ぎゅっ）
1955 = "（Siết chặt）"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1483 = "「!」"
# monologue
# JP: にぎってくれる手が熱い。\nあったかいじゃなく、すごく熱い。
1928 = "Bàn tay đang nắm lấy tay tôi nóng rực. Không phải là ấm áp, mà là rất nóng."
# monologue
# JP: 双鉄くんの体温ふだん、わたしより絶対低いのに。
1773 = "Thân nhiệt bình thường của anh Soutetsu, chắc chắn là thấp hơn tôi mà."
# 【ポーレット】
# display as 波萊特
# JP: 「……うん」
1173 = "「……Vâng.」"
# monologue
# JP: 双鉄くん、いつもと同じじゃ、全然ないんだ。
1650 = "Anh Soutetsu, hoàn toàn không hề giống như mọi khi."
# monologue
# JP: 緊張？　興奮？　熱くなってるだけじゃなく、\n手――ちょっとだけ震えてる。
1883 = "Căng thẳng? Phấn khích? Không chỉ nóng lên, mà tay anh ấy――còn hơi run rẩy."
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。わたしに任せてください」
1407 = "「Không sao đâu. Cứ giao cho tôi.」"
# monologue
# JP: そうわかったら、どん、って落ち着く。
1833 = "Nhận ra điều đó, tôi đột nhiên bình tĩnh lại."
# monologue
# JP: お腹の下の深いところから、\nどんどん勇気が湧いてくる。
1750 = "Từ sâu thẳm dưới bụng,\ndũng khí không ngừng tuôn trào."
# 【ポーレット】
# display as 波萊特
# JP: 「どれほど反対されたって、必ず、議案を通過させる。\nわたしたちには――わたしたちなら、それが出来ます」
1260 = "「Dù có bị phản đối đến mức nào, tôi cũng nhất định sẽ cho thông qua nghị án. Chúng ta――nếu là chúng ta, chắc chắn sẽ làm được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1310 = "「Ừm.」"
# monologue
# JP: わたし、じゃなくて。わたしたち。\n双鉄くんが、こんなに近くにいてくれるから。
1600 = "Không phải là tôi, mà là chúng ta. Bởi vì có anh Soutetsu ở gần bên tôi thế này."
# monologue
# JP: いつもと違う双鉄くんが、\nそれでもやっぱり――いつもと同じに、居てくれるから。
1682 = "Dù anh Soutetsu có khác với mọi khi, nhưng quả nhiên――anh ấy vẫn luôn ở đó, giống như mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「っと――時間になるな」
1299 = "「A――Đến giờ rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1305 = "「啊」" 
# monologue
# JP: 手がほどかれて、代わりに資料を渡される。\nこんなところまで双鉄くん。
1618 = "Bàn tay buông ra, thay vào đó tôi được nhận lấy tập tài liệu. Đến cả những lúc thế này anh ấy vẫn mang đậm chất Soutetsu."
# monologue
# JP: 緊張してても、どんなときでも。\n秘書のお仕事、完璧にこなしてくれている。
1604 = "Dù có căng thẳng, dù trong bất kỳ hoàn cảnh nào. Anh ấy vẫn hoàn thành xuất sắc công việc của một người thư ký."
# 【双鉄】
# display as 雙鐵
# JP: 「これでいいか？\n他に準備することがあったら、いってくれ」
1471 = "「Thế này đã đủ chưa? Nếu cần chuẩn bị gì thêm thì cứ nói với tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「う、ん」
1303 = "「Ư, m.」"
# monologue
# JP: 準備は、十分。\nだけど、足りない。
1705 = "Chuẩn bị, thế là đủ rồi.\nNhưng, vẫn còn thiếu."
# monologue
# JP: わたしたち、だってせっかく、\n恋人同士になったんだから……
1740 = "Chúng tôi, khó khăn lắm mới, trở thành người yêu của nhau mà……"
# 【ポーレット】
# display as 波萊特
# JP: 「……………………」
1168 = "「……………………」"
# monologue
# JP: 待ってみる。けど、なんにもない。\n双鉄くんは、黙ったままで、そのまんま。
1752 = "Tôi thử chờ đợi. Nhưng, chẳng có chuyện gì xảy ra. Anh Soutetsu vẫn cứ im lặng, cứ đứng yên như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……ん？」
1174 = "「……Hửm?」"
# monologue
# JP: ダメこれ。ぜんっぜんわかってない。\n困ったみたいな、戸惑ったみたいな顔になってる。
1605 = "Thế này thì hỏng rồi. Anh ấy hoàn toàn không hiểu gì cả. Khuôn mặt anh ấy lộ rõ vẻ bối rối, lúng túng."
# monologue
# JP: 恋人になったわたしが、これから、議場に――\n議員の戦場に行くっていうのに。
1772 = "Người yêu của anh ấy là tôi, chuẩn bị bước vào hội trường―― bước vào chiến trường của các nghị sĩ cơ mà."
# 【ポーレット】
# display as 波萊特
# JP: 「――忘れ物」
1161 = "「――Anh quên đồ kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1302 = "「Hả?」"
# monologue
# JP: （ちゅっ！）
1951 = "（Chụt!）"
# monologue
# JP: だったら、自分から求めればいい。\n双鉄くんが教えてくれた。わたしに、思い出させてくれた。
1917 = "Nếu vậy, thì tôi tự mình đòi hỏi là được. Anh Soutetsu đã dạy tôi. Đã giúp tôi nhớ lại."
# monologue
# JP: わたしたちは――求めることを、許されてるって。
1741 = "Chúng ta――được phép đòi hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1305 = "「啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「っ！？」
1484 = "「!?」"
# monologue
# JP: 一瞬だけのキスのつもりでほどいた瞬間、\n双鉄くんから、わたしにキスを届けてくれる。
1654 = "Định bụng chỉ là một nụ hôn chớp nhoáng rồi buông ra, nhưng ngay khoảnh khắc đó, anh Soutetsu lại chủ động trao cho tôi một nụ hôn."
# monologue
# JP: 熱い、キス。\n口紅……こっそり直さなくっちゃ。
1919 = "Một nụ hôn, nồng nhiệt. Son môi……chắc phải lén tô lại mất thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……もう、忘れ物はないか？」
1178 = "「……Đã hết, quên đồ chưa?」"
# monologue
# JP: 照れてる。\n双鉄くん、ものすごく。
1927 = "Anh ấy đang xấu hổ.\nAnh Soutetsu, đang vô cùng xấu hổ."
# monologue
# JP: なんだか嬉しい。\n自信、ふつふつわいてくる。
1908 = "Tự dưng tôi thấy thật vui. Sự tự tin, đang tuôn trào mãnh liệt."
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です」
1408 = "「Không sao đâu.」"
# monologue
# JP: だってわたしは、双鉄くんを動揺させられちゃうくらい、\n素敵な女の子になれたんだから。
1690 = "Bởi vì tôi, đã trở thành một cô gái tuyệt vời đến mức có thể làm anh Soutetsu phải bối rối cơ mà."
# monologue
# JP: 双鉄くんほど難攻不落のテゴワイ相手、\n市議会をどれほど探してみたって、いるわけないから！
1712 = "Một đối thủ khó nhằn, bất khả xâm phạm như anh Soutetsu, dù có lục tung cả hội đồng thành phố lên cũng chẳng thể nào tìm thấy đâu!"
# 【ポーレット】
# display as 波萊特
# JP: 「行ってきます！」
1379 = "「Tôi đi đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うむ」
1159 = "「――Ừm.」"
# monologue
# JP: ここまでの答弁は実にいい。\n落ち着き払って、わずかな動揺さえ見られない。
1647 = "Phần biện luận cho đến lúc này thực sự rất tốt. Cô ấy vô cùng bình tĩnh, không hề để lộ một chút dao động nào."
# monologue
# JP: （勇気を、もらえているのかもしれんな）
1956 = "（Có lẽ, cô ấy đã nhận được dũng khí.）"
# monologue
# JP: 傍聴席には、普段は見られない顔がある。
1765 = "Trên hàng ghế dự thính, xuất hiện những gương mặt hiếm khi được nhìn thấy."
# monologue
# JP: ハチロク、日々姫、れいな、ふかみと凪はもちろん、\n真闇姉に蓑笠老人――赤井宮司に、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;の姿まである。
1641 = "Hachiroku, Hibiki, Reina, Fukami và Nagi thì khỏi phải nói, cả chị Mayami, ông lão Minokasa――Đại tư tế Akai, và cả chiếc \\x%l乗務鞄;#00ffc040;cặp lái tàu%l;# cũng có mặt."
# monologue
# JP: （なら、これでいい――赤井阿蘇神社の文化財申請議案の\nように、全会一致は、まず望むべくもなかろうが――）
1962 = "（Vậy thì, thế này là được rồi――dù cho việc nhất trí toàn hội đồng như nghị án xin cấp chứng nhận tài sản văn hóa cho Đền Akai Aso là điều không thể mong đợi――）"
# monologue
# JP: 宝生元忠氏も、傍聴している。\n稀咲の姿は見当たらない。
1699 = "Ông Houshou Mototada cũng đang ngồi dự thính. Không thấy bóng dáng của Kisaki đâu."
# monologue
# JP: 元忠氏の存在は、\x%lエアクラ;#00ffc040;エアクラ%l;#;推進誘致派の議員たちへの、\nおそらくは、強烈な締め付けとして働くだろう。
1637 = "Sự hiện diện của ông Mototada, có lẽ sẽ đóng vai trò như một sự răn đe mạnh mẽ đối với các nghị sĩ thuộc phe ủng hộ mời gọi \\x%lエアクラ;#00ffc040;Aircra%l;#."
# monologue
# JP: （それでも、いける。今日のポーレットの答弁ならば、\n中立派の議員の票を、必ず、根こそぎ獲得できる）
1947 = "（Dù vậy, vẫn có thể thắng. Với phần biện luận của Paulette hôm nay, chắc chắn sẽ giành trọn được phiếu bầu của các nghị sĩ phe trung lập.）"
# 【議長】
# display as 議長
# JP: 「御一夜市民の会、篠原くーん」
1352 = "「Hội công dân Ohimitera, nghị sĩ Shinohara.」"
# 【老議員】
# display as 老議員
# JP: 「はい。市長、よろしくお願いします」
1274 = "「Vâng. Thị trưởng, xin được chỉ giáo.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お願いします」
1456 = "「Xin được chỉ giáo.」"
# monologue
# JP: ……最後の質問者は篠原議員。\n御一夜市議会の生き字引とも言われる、長老議員だ。
1156 = "……Người đặt câu hỏi cuối cùng là nghị sĩ Shinohara. Ông là một nghị sĩ lão làng, được mệnh danh là từ điển sống của Hội đồng thành phố Ohimitera."
# 【老議員】
# display as 老議員
# JP: 「マイントレジャー計画について、\nこれは、助成金を見込まれての事業となられますか？」
1455 = "「Về Kế hoạch Mine Treasure, đây có phải là dự án được kỳ vọng sẽ nhận được tiền trợ cấp không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「『技術継承炭鉱にかかる助成金』の申請を提出しようと\n現時点では予定しております」
1364 = "「Hiện tại, chúng tôi đang dự định nộp đơn xin 『Tiền trợ cấp dành cho Mỏ than kế thừa kỹ thuật』 ạ.」"
# 【老議員】
# display as 老議員
# JP: 「旧術仙炭鉱も、助成金を頼りに運営されていたことを、\n知っておられますか」
1477 = "「Thị trưởng có biết rằng Mỏ than Jussen cũ cũng từng được vận hành dựa vào tiền trợ cấp không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「その点、勉強させていただきました。\n『国内炭保護のための助成金』を、二十二期連続で」
1403 = "「Về điểm đó, tôi đã tìm hiểu qua rồi ạ. 『Tiền trợ cấp bảo hộ than trong nước』, liên tiếp trong 22 kỳ.」"
# 【老議員】
# display as 老議員
# JP: 「石炭需要がのうなったと、そいば打ち切られたとき。\n術仙炭鉱の命脈もまた、尽きたとです」
1422 = "「Khi nhu cầu than đá không còn, nguồn trợ cấp đó bị cắt đứt. Mệnh mạch của Mỏ than Jussen cũng theo đó mà cạn kiệt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「承知しております」
1378 = "「Tôi biết điều đó ạ.」"
# monologue
# JP: 老議員の皺が深くなる。\n真っ白な眉の下の目が、じっとポーレットのことを見る。
1872 = "Những nếp nhăn của vị nghị sĩ lão làng hằn sâu hơn. Đôi mắt dưới hàng lông mày trắng muốt nhìn chằm chằm vào Paulette."
# 【老議員】
# display as 老議員
# JP: 「助成金に頼っての経済復興は、過去の過ちば\n繰り返すだけと――市長は、思われませんとですか？」
1269 = "「Chấn hưng kinh tế dựa vào tiền trợ cấp, chẳng khác nào lặp lại sai lầm trong quá khứ――Thị trưởng không nghĩ vậy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご懸念、ごもっともと存じます。が、助成金が無くとも、\nマイントレジャーは採算を取れる計画となっております」
1356 = "「Sự lo ngại của ngài là hoàn toàn có cơ sở. Nhưng, dù không có tiền trợ cấp, Mine Treasure vẫn là một kế hoạch có thể sinh lời ạ.」"
# monologue
# JP: ポーレットがフリップを前面に出す。
1795 = "Paulette đưa bảng lật ra phía trước."
# 【ポーレット】
# display as 波萊特
# JP: 「初年度の来場者数を２０万人確保でき、年１０％の増加を\n三年継続できれば、四年目からは単体黒字に到達します」
1285 = "「Nếu đảm bảo được 200 nghìn lượt khách trong năm đầu tiên, và duy trì mức tăng trưởng 10% mỗi năm trong vòng 3 năm, thì từ năm thứ 4 trở đi dự án sẽ bắt đầu có lãi độc lập ạ.」"
# monologue
# JP: 昨年度の御一夜市の宿泊観光客数は４０万人。\n宿泊せず、観光施設を利用した客数がその他に３０万人だ。
1593 = "Số lượng khách du lịch lưu trú tại thành phố Ohimitera năm ngoái là 400 nghìn người. Số lượng khách không lưu trú mà chỉ sử dụng các cơ sở du lịch là 300 nghìn người."
# monologue
# JP: ２０万人という利用者予測は、\n決して、過大なものではない。
1966 = "Dự báo 200 nghìn lượt khách, tuyệt đối không phải là một con số quá phóng đại."
# 【老議員】
# display as 老議員
# JP: 「廃炭鉱に、２０万人もの人が訪れるとは思えませんが」
1368 = "「Tôi không nghĩ sẽ có tới 200 nghìn người đến thăm một mỏ than bỏ hoang đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「単なる廃炭鉱なら、そうでしょう。しかし、\nそれを魅力的なものとするための、テーマパーク化です」
1327 = "「Nếu chỉ là một mỏ than bỏ hoang đơn thuần thì đúng là vậy. Tuy nhiên, việc biến nó thành công viên chủ đề chính là để làm cho nó trở nên hấp dẫn hơn ạ.」"
# monologue
# JP: またフリップ。\n今度は、図表ではなく、写真が中心となるものだ。
1794 = "Lại là bảng lật. Lần này không phải là biểu đồ, mà là những bức ảnh."
# 【ポーレット】
# display as 波萊特
# JP: 「これは、[しが,1]歯牙県[ながはま,2]那賀浜市の『[しらかべ,1]白壁スクエア』の写真です。\n町並みそのものをテーマパーク化した成功例です」
1472 = "「Đây là hình ảnh của 『Quảng trường Shirakabe』 ở thành phố Nagahama, tỉnh Shiga. Đây là một ví dụ thành công về việc biến chính cảnh quan đường phố thành công viên chủ đề ạ.」"
# monologue
# JP: 知る人ぞ知る存在に留まっていた白壁づくりの町並みを、\n『歴史とアート』というキーワードによって切り出した。
1651 = "Khu phố với những bức tường trắng vốn chỉ được biết đến bởi một số ít người, nay đã được tái hiện thông qua từ khóa 『Lịch sử và Nghệ thuật』."
# monologue
# JP: その工夫により観光客数は跳ね上がり、\n昨年度には１８０万人にまで到達した。
1648 = "Nhờ sự đổi mới đó, lượng khách du lịch đã tăng vọt, và đạt tới 1,8 triệu người vào năm ngoái."
# 【ポーレット】
# display as 波萊特
# JP: 「地元の人間にとってはありふれた光景であっても、\n観光客には見たことのない景色です」
1331 = "「Dù đối với người dân địa phương, đó chỉ là những cảnh tượng bình thường, nhưng đối với khách du lịch, đó lại là những khung cảnh chưa từng thấy ạ.」"
# 【老議員】
# display as 老議員
# JP: 「ありふれた、では無か。\n“目にしたくない”光景ばい」
1380 = "「Bình thường, thì không nói làm gì. Đó là khung cảnh “không muốn nhìn thấy” đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1483 = "「！」" 
# monologue
# JP: しわがれた――とは、このことか。
1746 = "Khàn đặc――là để chỉ điều này sao."
# monologue
# JP: 篠原議員の声は枯れ切り、\nなのに、悲しみに溢れている。
1853 = "Giọng nói của nghị sĩ Shinohara khàn đặc, nhưng lại tràn ngập sự bi thương."
# monologue
# JP: 絞りだすような一声に、\n多くの議員が大きく頷く。
1876 = "Trước tiếng nói như bị vắt kiệt đó, rất nhiều nghị sĩ đã gật đầu đồng tình."
# monologue
# JP: ああ、これは……稀咲が警告してくれたとおり――\n御一夜市そのものの持つ、傷跡なのだ。
1683 = "A, đây là……đúng như lời Kisaki đã cảnh báo―― là vết sẹo của chính thành phố Ohimitera."
# 【老議員】
# display as 老議員
# JP: 「御一夜が術仙炭鉱にどれほど多くを注ぎ込んだか……\nその誤った判断の、あれは、醜か残りカスたい」
1353 = "「Ohimitera đã đổ bao nhiêu công sức và của cải vào Mỏ than Jussen…… Đó là, tàn dư xấu xí của một quyết định sai lầm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ――いいえ、篠原議員」
1256 = "「Không――Không phải vậy đâu, thưa nghị sĩ Shinohara.」"
# monologue
# JP: けれど、ポーレットは動じない。
1629 = "Nhưng, Paulette không hề nao núng."
# monologue
# JP: 悲しみにも、後悔にも、\n声は、言葉は、いささかたりとも揺れ動かない。
1886 = "Trước sự bi thương, hay sự hối hận, giọng nói, ngôn từ của cô ấy không hề dao động dù chỉ một chút."
# 【ポーレット】
# display as 波萊特
# JP: 「誤った判断だったと――\nそう結論づけるには、まだ早すぎます」
1267 = "「Đó là một quyết định sai lầm―― Để đưa ra kết luận như vậy, thì vẫn còn quá sớm ạ.」"
# 【老議員】
# display as 老議員
# JP: 「なっ！？」
1266 = "「Cái gì!?」"
# monologue
# JP: 何十年も、塩漬けにしてきたのであろう傷跡を。
1721 = "Một vết sẹo đã bị ướp muối suốt mấy chục năm qua."
# monologue
# JP: ポーレットは真正面から、\n“古傷ではない”と否定する。
1793 = "Paulette đã thẳng thừng phủ nhận, rằng đó “không phải là vết thương cũ”."
# 【ポーレット】
# display as 波萊特
# JP: 「技術継承炭鉱としての助成をほぼ確実に受けられると\n――これは、水面下でのお墨付きをいただいてます」
1363 = "「Việc gần như chắc chắn nhận được tiền trợ cấp với tư cách Mỏ than kế thừa kỹ thuật ――điều này, chúng tôi đã nhận được sự đảm bảo ngầm rồi ạ.」"
# 【老議員】
# display as 老議員
# JP: 「じゃけん、助成金に頼るようでは」
1286 = "「Vậy thì, nếu cứ dựa dẫm vào tiền trợ cấp thì」"
# 【ポーレット】
# display as 波萊特
# JP: 「考えてみてください、篠原議員。\n技術継承炭鉱に、どのような炭鉱が選ばれるかを」
1457 = "「Xin ngài hãy suy nghĩ thử xem, thưa nghị sĩ Shinohara. Những mỏ than như thế nào mới được chọn làm Mỏ than kế thừa kỹ thuật.」"
# 【老議員】
# display as 老議員
# JP: 「っ！」
# 1483 = "「！」" 
# monologue
# JP: そう。全国に数多くある廃炭鉱の中から、\n技術継承炭鉱として選ばれるのは、容易ではない。
1784 = "Đúng vậy. Trong số vô vàn mỏ than bỏ hoang trên toàn quốc, việc được chọn làm Mỏ than kế thừa kỹ thuật không phải là điều dễ dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「術仙炭鉱は、廃坑のぎりぎりまで設備投資と\n技術練磨とを惜しまなかった」
1447 = "「Mỏ than Jussen, cho đến tận lúc sắp đóng cửa, vẫn không tiếc công đầu tư thiết bị và mài giũa kỹ thuật.」"
# monologue
# JP: 篠原議員が、誤った判断だったと思い込んでる、\n“見切りの悪さ”。
1851 = "Sự “thiếu quyết đoán”, mà nghị sĩ Shinohara vẫn luôn đinh ninh là một quyết định sai lầm."
# monologue
# JP: しかしそれは、見方を変えれば、\n“最後まで緩まなかった”ということでもあるのだ。
1622 = "Tuy nhiên, nếu thay đổi góc nhìn, điều đó cũng có nghĩa là “không hề lơi lỏng cho đến phút cuối cùng”."
# 【ポーレット】
# display as 波萊特
# JP: 「その設備は放棄されず、再稼働を信じて保存された。\n再開発の手は及ばず、一帯全て欠けるものなく残された」
1335 = "「Những thiết bị đó không bị vứt bỏ, mà được bảo tồn với niềm tin sẽ được tái khởi động. Bàn tay tái thiết không chạm tới, toàn bộ khu vực được giữ lại nguyên vẹn không thiếu thứ gì.」"
# monologue
# JP: だからこそ、生々しすぎる傷跡と、\nきっと、目を背けられ続けてきたのだろう。
1757 = "Chính vì vậy, nó mới trở thành một vết sẹo quá đỗi chân thực, và chắc chắn, đã luôn bị mọi người ngoảnh mặt làm ngơ."
# monologue
# JP: が――それがどれほど希少な価値を持つものか。\n外部からきた僕らの目には、はっきりわかる。
1619 = "Nhưng――nó lại mang một giá trị vô cùng quý hiếm. Trong mắt những người từ bên ngoài đến như chúng tôi, điều đó rất rõ ràng."
# 【ポーレット】
# display as 波萊特
# JP: 「技術継承炭鉱としての再稼働には、\n炭鉱労働者だった方々の再雇用が必須となります」
1434 = "「Để tái khởi động với tư cách Mỏ than kế thừa kỹ thuật, việc tái tuyển dụng những người từng là công nhân mỏ than là điều bắt buộc ạ.」"
# 【老議員】
# display as 老議員
# JP: 「う、む」
1307 = "「Ư, m.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その方々と、テーマパークの従業員となる若者たちとの\n交流は、御一夜に新たな活気を呼ぶはずです」
1376 = "「Sự giao lưu giữa những người đó và những người trẻ tuổi sẽ trở thành nhân viên của công viên chủ đề chắc chắn sẽ mang lại sức sống mới cho Ohimitera ạ.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派と反対派と――\nそれだけでなく、無力感が生んでしまった、世代間の――
1596 = "Phe ủng hộ và phe phản đối mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#―― Không chỉ vậy, còn là sự đứt gãy giữa các thế hệ do cảm giác bất lực sinh ra――"
# monologue
# JP: 御一夜の長い停滞のその一因は、\n確実に、そうした断絶にもあるだろう。
1724 = "Một trong những nguyên nhân khiến Ohimitera trì trệ trong một thời gian dài, chắc chắn cũng là do sự đứt gãy đó."
# 【ポーレット】
# display as 波萊特
# JP: 「術仙炭鉱にはまだ多くの石炭が眠り。\nそれだけにとどまらぬ、無数の価値が眠っているのです」
1446 = "「Mỏ than Jussen vẫn còn rất nhiều than đá đang ngủ yên. Không chỉ dừng lại ở đó, còn vô số giá trị khác đang ngủ yên ở đó ạ.」"
# monologue
# JP: それを、僕らは掘り返す。\n御一夜に淀んでいた力を呼び覚まし、観光客の力も借りて。
1701 = "Chúng tôi sẽ đào xới những thứ đó lên. Đánh thức sức mạnh đang đọng lại ở Ohimitera, mượn cả sức mạnh của khách du lịch."
# 【ポーレット】
# display as 波萊特
# JP: 「術仙炭鉱の再評価は、第三者によって行われるべきです。\n国により、観光客により、若者により」
1448 = "「Việc đánh giá lại Mỏ than Jussen nên được thực hiện bởi bên thứ ba. Bởi quốc gia, bởi khách du lịch, bởi những người trẻ tuổi.」"
# monologue
# JP: マイントレジャーというスポットを当て、\nそこに、多くの目を注がせる。
1910 = "Tập trung sự chú ý vào Mine Treasure, và thu hút ánh nhìn của nhiều người về nơi đó."
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜のかつての判断が、決して過ちではなかったと\n――それが証明されることを、わたしは確信しています」
1372 = "「Quyết định trong quá khứ của Ohimitera tuyệt đối không phải là một sai lầm ――Tôi tin chắc rằng điều đó sẽ được chứng minh ạ.」"
# 【老議員】
# display as 老議員
# JP: 「見てみんふりば――\nわしらぁ、してきよったと言うことか」
1332 = "「Ý cô là――\nchúng ta, đã luôn nhắm mắt làm ngơ sao.」"
# monologue
# JP: それは同じだ。\n昨日までの僕も、ポーレットも。
1692 = "Điều đó thì ai cũng giống nhau thôi. Cả tôi của ngày hôm qua, và cả Paulette cũng vậy."
# monologue
# JP: あまりに深い[くらがり]傷だから、\n再評価など、できるとさえも思えなかった。
1742 = "Bởi vì đó là một vết thương quá sâu, nên chúng tôi thậm chí còn không nghĩ rằng mình có thể đánh giá lại nó."
# 【老議員】
# display as 老議員
# JP: 「いけんの。\nそがいなことでは、いけん」
1262 = "「Không được rồi.\nNhư thế thì, không được rồi.」"
# monologue
# JP: 質疑ではなく、それは嘆息。
1871 = "Đó không phải là chất vấn, mà là một tiếng thở dài."
# 【老議員】
# display as 老議員
# JP: 「術仙炭鉱の再検証なしに\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致して――\n目ぇ瞑ったまま、手ば引いてもらおうとしておったのか」
1366 = "「Mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;# mà không hề kiểm chứng lại Mỏ than Jussen―― Chẳng khác nào nhắm mắt đưa chân để người ta dắt đi sao.」"
# monologue
# JP: ざわ、と動揺の響きが起こる。\nしかし、熱心な誘致賛成派さえ、抗議のヤジを飛ばせない。
1763 = "Cả hội trường xôn xao, vang lên những tiếng động dao động. Tuy nhiên, ngay cả những người thuộc phe ủng hộ nhiệt tình cũng không thể buông lời phản đối."
# monologue
# JP: 老議員のはらわたからにじみでる――\nそれはあまりに、長く、深く、重苦しいほどの嘆息だから。
1907 = "Nó rỉ ra từ tận đáy lòng của vị nghị sĩ lão làng―― Bởi vì đó là một tiếng thở dài quá đỗi dài, quá đỗi sâu, và quá đỗi nặng nề."
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜がもとから持っているもの――\nその再評価を、マイントレジャー計画は望むだけです」
1365 = "「Những gì Ohimitera vốn dĩ đã có―― Kế hoạch Mine Treasure chỉ mong muốn được đánh giá lại những thứ đó thôi ạ.」"
# monologue
# JP: 積み重ねてきた全てを、再び一から見直す。
1743 = "Nhìn nhận lại toàn bộ những gì đã tích lũy được từ đầu."
# monologue
# JP: 本当に傷で過ちと、誰もが思っているのなら――\nポーレットのこの答弁は、むしろ逆効果に働こう。
1694 = "Nếu tất cả mọi người đều thực sự nghĩ đó là một vết thương, một sai lầm―― thì phần biện luận này của Paulette, có lẽ sẽ mang lại tác dụng ngược."
# 【ポーレット】
# display as 波萊特
# JP: 「父の愛した御一夜を、その歴史をわたしは信じています。\n議員の皆さまに於かれましても、それは同様と信じます」
1374 = "「Tôi tin vào Ohimitera mà cha tôi đã yêu thương, tin vào lịch sử của nó. Tôi tin rằng các vị nghị sĩ ở đây cũng có cùng suy nghĩ đó ạ.」"
# monologue
# JP: が――
1625 = "Nhưng――"
# 【老議員】
# display as 老議員
# JP: 「……よかご答弁を、ありがとうございます」
1175 = "「……Cảm ơn cô, vì một phần biện luận tuyệt vời.」"
# monologue
# JP: 深々と。\nポーレットに向け、篠原議員が頭を下げる。
1852 = "Thật sâu. Nghị sĩ Shinohara cúi gập đầu trước Paulette."
# monologue
# JP: 深々と。\nポーレットもまた、篠原議員に答礼する。
1792 = "Thật sâu. Paulette cũng cúi đầu đáp lễ nghị sĩ Shinohara."
# 【老議員】
# display as 老議員
# JP: 「市長。わしの質問ば、これで十分とです」
1337 = "「Thị trưởng. Câu hỏi của tôi, đến đây là đủ rồi.」"
# 【議長】
# display as 議長
# JP: 「篠原議員の質問を終わります。\n他に、質疑のある方はございませんか」
1430 = "「Phần đặt câu hỏi của nghị sĩ Shinohara xin được kết thúc. Còn vị nào có câu hỏi nữa không ạ?」"
# monologue
# JP: 篠原議員は、質問時間を残して終わった。\n慣例上、議長が他の質疑の有無を問いかける。
1854 = "Nghị sĩ Shinohara đã kết thúc dù vẫn còn thời gian đặt câu hỏi. Theo thông lệ, chủ tọa sẽ hỏi xem còn ai có câu hỏi nào khác không."
# monologue
# JP: が、それに応じてあがる手は無い。\n今の質疑で十分と、議場の誰もが感じている。
1626 = "Nhưng, không có cánh tay nào giơ lên đáp lại. Tất cả mọi người trong hội trường đều cảm thấy phần chất vấn vừa rồi là quá đủ."
# 【議長】
# display as 議長
# JP: 「なければ、議決に入ります。\nまず、『赤井阿蘇神社の文化財申請に関する議案』」
1410 = "「Nếu không có ai, chúng ta sẽ bước vào phần biểu quyết. Trước tiên là 『Nghị án về việc xin cấp phép tài sản văn hóa cho đền Akai Aso』.」"
# monologue
# JP: 議長が挙手を求める前から、\nいくつもの手があげられる。
1913 = "Ngay cả trước khi chủ tọa yêu cầu giơ tay, đã có vô số cánh tay giơ lên."
# monologue
# JP: 遅れて議長が賛成議員の挙手を願えば、\n議員席、全てに手のひらの花が咲く。
1830 = "Khi chủ tọa yêu cầu các nghị viên tán thành giơ tay sau đó, khắp hàng ghế nghị viên, những bàn tay nở rộ như hoa."
# 【議長】
# display as 議長
# JP: 「賛成多数と認め、本案を可決いたします。続いて、\n『旧術仙炭鉱の技術継承炭鉱としての助成申請案』」
1319 = "「Đa số tán thành, nghị án này được thông qua. Tiếp theo là, 『Nghị án xin trợ cấp cho mỏ than cũ Jutsusen với tư cách là mỏ than kế thừa kỹ thuật』.」"
# monologue
# JP: 議長の求めた挙手に応じて、\nこれもすぐさま、大多数の手があげられる。
1839 = "Đáp lại yêu cầu giơ tay của chủ tọa, ngay lập tức, đại đa số cánh tay lại được giơ lên."
# 【議長】
# display as 議長
# JP: 「賛成多数と認め、本案を可決いたします。続いて、\n『マイントレジャーによる術仙炭鉱地域再開発』案」
1320 = "「Đa số tán thành, nghị án này được thông qua. Tiếp theo là, Nghị án 『Tái phát triển khu vực mỏ than Jutsusen thông qua Mine Treasure』.」"
# monologue
# JP: ばっと――、一本の手が伸びる。
1686 = "Vút——, một cánh tay giơ lên."
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1305 = "「啊」" 
# monologue
# JP: 篠原議員の手が、まっすぐに。\nそしてぽつぽつ――長老議員たちの挙手が続く。
1678 = "Cánh tay của nghị viên Shinohara giơ thẳng tắp. Và rồi lác đác——các nghị viên lão làng cũng lần lượt giơ tay."
# 【議長】
# display as 議長
# JP: 「賛成の議員の方は、挙手を願います」
1449 = "「Xin mời các nghị viên tán thành giơ tay.」"
# monologue
# JP: ……全会一致、とはとてもいかない。
1157 = "……Không thể nói là nhất trí toàn thể được."
# monologue
# JP: 苦虫を噛み潰したような顔をして、\n腕組みしてる議員も決して、少なくはない。が――
1760 = "Những nghị viên khoanh tay với vẻ mặt như nhai phải sâu đắng, cũng tuyệt đối không hề ít. Nhưng——"
# 【議長】
# display as 議長
# JP: 「賛成多数と認め、本案を可決いたします」
1321 = "「Đa số tán thành, nghị án này được thông qua.」"
# 【れいな】
# display as 玲奈＆凪
# JP: 「わぁい！」\n「やったばいっ！！」
1295 = "「Oa!」\n「Làm được rồi nè!!」"
# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃん」
1306 = "「Khoan đã!? Bé Nagi.」"
# 【議長】
# display as 議長
# JP: 「傍聴席は静粛に願います」
1458 = "「Xin khán đài giữ trật tự.」"
# monologue
# JP: ――ふかみの仕事を、\n今日は議長が代わってくれる。
1146 = "——Công việc của Fukami, hôm nay đã có chủ tọa làm thay."
# monologue
# JP: しまったばい！　と言わんばかりに、\n凪は大きく両手でくちを覆って――っ！？
1831 = "Như muốn nói 'Chết dở rồi nè!', Nagi lấy hai tay bịt chặt miệng lại——っ!?"
# monologue
# JP: （退席している――宝生元忠が）
1954 = "（Ông ta đã rời ghế——Houshou Mototada.）"
# monologue
# JP: いつから退席していたのか、\n全く、僕には気づけなかった。
1616 = "Ông ta đã rời đi từ lúc nào, tôi hoàn toàn không hề nhận ra."
# monologue
# JP: 質疑応答を聞き届け、\n勝負あったと――あるいは、あきらめてくれたのか。
1777 = "Nghe xong phần hỏi đáp, ông ta cho rằng thắng bại đã rõ——hay là, đã chịu bỏ cuộc rồi."
# monologue
# JP: （いや……あきらめていなくとも、変わらんはずだ）
1946 = "（Không……dù ông ta chưa bỏ cuộc, kết quả cũng sẽ không đổi.）"
# monologue
# JP: 議案成立で河川敷利用の専有許可は確保でき、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の余地などなくなった。
1674 = "Với việc nghị án được thông qua, chúng ta đã nắm chắc giấy phép sử dụng độc quyền bãi bồi ven sông, không còn chỗ trống nào để thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; nữa."
# monologue
# JP: こうなった以上マイントレジャーに賛同し成功させるのが、\n御一夜市にも隈銀にも、最善の選択となるのだから。
1608 = "Một khi đã thế này, việc tán thành và giúp Mine Treasure thành công, chính là lựa chọn tốt nhất cho cả thành phố Ohimitera lẫn ngân hàng Kumagin."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ！」
1481 = "「Anh Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1483 = "「！」" 
# monologue
# JP: とても柔らかな衝撃と熱。\n議場を抜け出し、ポーレットが僕に抱きついてくる。
1748 = "Một cú va chạm và hơi ấm vô cùng mềm mại. Paulette lao ra khỏi hội trường, ôm chầm lấy tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――わたし、やりました！」
1357 = "「Em——em, làm được rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。見ていた。\nとても、見事だった」
1309 = "「Ừ. Anh có xem mà.\nEm làm rất xuất sắc.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えへへへへ」
1300 = "「Ehehehehe.」"
# monologue
# JP: 笑顔は、まっすぐ誇らしそうだ。
1693 = "Nụ cười của cô ấy, ánh lên vẻ đầy tự hào."
# monologue
# JP: 野次られるたびにおろおろしていた、\nあのポーレットとはまるで見違えた。
1828 = "Trông khác hẳn với một Paulette luôn luống cuống mỗi khi bị la ó."
# 【双鉄】
# display as 雙鐵
# JP: 「強くなったな。ポーレットは」
1418 = "「Em đã trở nên mạnh mẽ hơn rồi đấy. Paulette à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「違いますよ？　双鉄くん。\nふたりで、強くなったんです」
1258 = "「Không phải đâu nhé? Anh Soutetsu. Là cả hai chúng ta, cùng trở nên mạnh mẽ hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1393 = "「Ừ——」"
# monologue
# JP: ただの偶然で、相性で。
1590 = "Chỉ là sự tình cờ, vì sự đồng điệu."
# monologue
# JP: だけれど僕等は、見事にお互いを支え合えた。\n傷を見せ合いのりこえて――だから、一緒に強くなれた。
1624 = "Nhưng chúng tôi, đã hỗ trợ lẫn nhau một cách tuyệt vời. Cùng phơi bày vết thương và vượt qua nó——nên mới có thể cùng nhau trở nên mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ご褒美をもらえるか？」
1479 = "「Vậy thì, anh có được nhận phần thưởng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1304 = "「A……」"
# monologue
# JP: ふと、気にかかる。\n舞台袖から、僕は覗いて議場の様子を見て取ってたが――
1884 = "Chợt, tôi có chút bận tâm. Tôi đã đứng từ cánh gà nhìn lén tình hình trong hội trường, nhưng——"
# monologue
# JP: あちらから、こちらの様子は果たして\n覗けるものなのだろうか？
1602 = "Liệu từ bên đó, mọi người có thể nhìn lén được tình hình bên này không nhỉ?"
# 【ポーレット】
# display as 波萊特
# JP: 「奇遇ですね。わたしも、ご褒美。\n双鉄くんからもらいたいなって、思ってました」
1424 = "「Thật trùng hợp. Em cũng, đang nghĩ muốn nhận phần thưởng từ anh Soutetsu đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら」
1475 = "「Vậy thì.」"
# monologue
# JP: まぁ、見ていようが見えていまいが、構わない。\nなにひとつ、誰に隠そうとも思わない。
1841 = "Mà, ai nhìn hay không nhìn cũng chẳng sao. Tôi không định giấu giếm ai bất cứ điều gì cả."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1417 = "「Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
1480 = "「Anh Soutetsu.」"
# monologue
# JP: そのまま、軽く抱きしめあって。
1739 = "Cứ thế, chúng tôi nhẹ nhàng ôm lấy nhau."
# monologue
# JP: 僕たちは、お互いにご褒美を与え合う。
1816 = "Chúng tôi, cùng trao cho nhau phần thưởng."
