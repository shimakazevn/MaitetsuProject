# monologue
# JP: わたしは、ふわふわまだしてるのに。
1770 = "明明我腦袋還有點輕飄飄的。" 

# monologue
# JP: 電車姫様に引き締められて、それでも顔を見た瞬間、\nもう全部、双鉄くんにふわふわ引き寄せられそうなのに。
1877 = "與電車公主打完電話，我好不容易變得嚴肅了些。但一看到雙鐵君的臉，就又變得輕飄飄的了。" 

