[script]
# lines: 412 
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。こちらからお話をお願いしたにも関わらず、\nお運びをいただいてしまって」
1625 = "「真對不起。明明是我有事相求，卻還勞您親自前來」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ウチんボロ湯じゃ、\nどこから話が漏れるか知れんけんねぇ」
1668 = "「要是在我那破浴場裡說，也不知道哪面牆會漏出風聲去咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、お上がりください」
1683 = "「請進」" 

# monologue
# JP: 僕の私室に上がってもらえば、\n登呂流湯のご主人は、じろ、と室内を軽く見渡す。
2383 = "登呂流浴場的老闆娘走進我的臥室，稍稍環顧四周。" 

# monologue
# JP: そして座布団に腰を落ち着け、\n抑えめの声で問いかけてくる。
2552 = "隨後坐到坐墊上，小聲問道。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ハチロクは？」
1330 = "「八六呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『他の誰にも聞かれたくない』とのことでしたので、\n真闇姉と日々姫に連れて出てもらっています」
1380 = "「因為您說“不願讓其他人聽到”，我就讓真闇姐和日日姬帶她出去了」" 

# monologue
# JP: 定例の、商店会の会合へ。\nこのタイミングでは、重要な意味も持たせられる。
2125 = "她們是去參加商店協會的例行集會了。而八六在這個時候出面，也具有重要意義。" 

# monologue
# JP: マイントレジャー計画への草の根の支持を固めていく。\nハチロクによるＰＲは無論、そのためのプラスに働く。
2367 = "煤探樂園計劃需要得到草根民眾的支持。八六的宣傳無疑將為此加分。" 

# monologue
# JP: 同時に、この部屋での会談の機密性も高められるなら、\nこれぞまさしく、一石二鳥ということになろう。
2421 = "而同時還能提高我們這次會談的機密性，正可謂是一石二鳥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この部屋までは蔵の人間は来ませんし、\n万が一誰か来ても、足音でそれとわかります」
1758 = "「酒窖的工人不會到我這間房來，就算有人來了，也能聽到腳步聲」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、よかとよ」
1750 = "「那就好咧」" 

# monologue
# JP: まっすぐ視線を向けられる。\nわずかに、気圧されるものを感じる。
2152 = "她直直地看著我。這讓我略微感受到一種威懾力。" 

# monologue
# JP: 年輪――と、これを言うのだろうか、\n瞳の深さに、腹の底までを見通されているような気になる。
2521 = "這或許就是閱歷的差距吧。她深邃的眼眸，彷彿能看透我所有的想法。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「で――」
1680 = "「說吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなの居眠り……処理落ちを防止するための\n対策について、教えていただきたく思っています」
1473 = "「我想向您討教……關於如何防止玲奈打瞌睡導致處理脫節的問題」" 

# monologue
# JP: そうあらためて言葉にすれば、\n小さな頷きが返される。
2430 = "聽到我鄭重地說明了今天的目的，她輕輕點頭道。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「理屈は簡単。\n――けど、実践はかなり難しか話ばい」
1605 = "「理論很簡單——但是，要實踐起來就很困難咧」" 

# monologue
# JP: 電話口で尋ねたときと、\n全く変わらない答え。
2160 = "她給出了與先前電話中一樣的回答。" 

# monologue
# JP: なら、この先が――\n『他の誰にも聞かれたくない』話なのだろう。
2547 = "那麼，接下來的就是“不願讓其他人聽到”的事情吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、まずはその“理屈”の方を\n教えていただけますか？」
1756 = "「那麼，能請您先告訴我那個“理論”嗎？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「過負荷が処理落ちの原因やけん、\n負荷ば減らしてやりゃーよかとよ」
1432 = "「引起處理脫節的原因是超負載，所以只要減輕負載就行咧」" 

# monologue
# JP: なるほど、確かに極めて簡単な理屈だ。
2069 = "原來如此，的確是極為簡單的理論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この場合の負荷は、\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;改造に伴っての\n処理情報量の増加、ですか？」
1728 = "「這裡所說的負載，是指\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;改造所帶來的訊息處理量的增加嗎？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんとは、ごくごく一部に過ぎんとよ」
1749 = "「那只是一小部分原因而已咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと他には――」
1284 = "「也就是說，其它還有——」" 

# monologue
# JP: ん――と、考えこむような声。\n皺が生む影が、いくらか濃くなる。
2170 = "她陷入了沉思。臉上的皺紋看起來又深了幾分。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の制御・演算のプロセッサは、\n人間の脳と近似した処理を行うよう設定されたもんたい」
1017 = "「……\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;用於控制、演算的處理器被設定為使用“近似人類大腦的方式”處理各類訊息」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1375 = "「嗯」" 

# monologue
# JP: 話が飛んだように思えて、一瞬惑う。\nが――内容については、直感的に理解が出来る気がする。
2467 = "話題過於跳躍，我一時間有些茫然。但這句話的含義，似乎能夠憑直覺去理解。" 

# monologue
# JP: ハチロクにせよ、れいなにせよ、与えられた刺激に対し、\n人間とほぼ変わらない反応を、大概は見せてくれるから。
2365 = "無論是八六還是玲奈，她們對於外來刺激所做出的反應與人類幾乎一模一樣。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そんプロセッサと、記憶媒体とは別個たい。\n記憶媒体は、独立して、換装可能となっとるばい」
1641 = "「而這個處理器與存儲介質是分開的。存儲介質是獨立的，可以更換」" 

# monologue
# JP: 換装可能――\nその一言が、僕の認識を一歩すすめる。
2088 = "可以更換——這一句話使我的理解更進了一步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして……それが、\x%lタブレット;#00ffc040;タブレット%l;#;ですか？」
1660 = "「莫非……存儲介質就是\\x%lタブレット;#00ffc040;操作板%l;#;嗎？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん通りと」
1560 = "「沒錯咧」" 

# monologue
# JP: 正解しても、表情はわずかも緩まない。\nいや――
2447 = "見我回答正確，她也依舊緊繃著臉。不僅如此——" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;ば交換すれば、\nどん\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も同一の機能ばできるようになる――」
1349 = "「只要更換\\x%lタブレット;#00ffc040;操作板%l;#;，任何\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;都能夠擁有相同的功能——」" 

# monologue
# JP: 緩まぬどころか、むしろ厳しさを増したようにさえ見える。
2146 = "她的神情反而越來越凝重。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「それこそが、当初の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;構想ったい」
1720 = "「這才是當初\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的設計構想咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では……その当初構想では、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は――経験を完全に共有できた――いや」
1751 = "「那麼……如若按照當初的設計構想，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之間能夠完全共享經驗——不」" 

# monologue
# JP: 違う。\nそれでは恐らく足りない。
1985 = "不對。恐怕還不止如此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、ハチロクの\x%lタブレット;#00ffc040;タブレット%l;#;を\nれいなのボディに換装すると、そのボディは――」
1551 = "「比方說，若將八六的\\x%lタブレット;#00ffc040;操作板%l;#;裝入玲奈的機體，那麼那個機體——」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「完全にハチロクとして機能できる――そうできてこそ、\n最大の効率化が果たせるという計画だったとよ」
1422 = "「就可以完全以八六的身份運作——按照當初的計劃，只有實現這一點才算得上效率最大化」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最大の効率化……」
1502 = "「效率最大化……」" 

# monologue
# JP: ハチロクが機体寿命を迎えたとして、そののち。
2202 = "就算八六的機體壽命到了，之後——" 

# monologue
# JP: 別のボディにその\x%lタブレット;#00ffc040;タブレット%l;#;を換装すれば、\nハチロクは、即座に新しい生を得ることが出来る。
2085 = "只要將\\x%lタブレット;#00ffc040;操作板%l;#;更換到其它機體中，八六便能夠重獲新生。" 

# monologue
# JP: （そうすれば、経験や情報の蓄積が無駄にならない。\n運用効率は、確かに著しく向上しようが――）
2591 = "（如此一來，所積累的經驗與訊息也不會浪費。使用效率的確能得到顯著提升，但是——）" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「じゃっどん、そん計画ば、うまいこと働かんかった」
1360 = "「可是，這個計劃並沒有順利地進行」" 

# monologue
# JP: 苦虫を噛み潰したような表情に、酷い渇きを感じてしまう。\nが、お茶汲みに行ける雰囲気でもない。
2393 = "看著她滿面的苦澀，我不禁感到分外口渴。但在如此沉重的氛圍之下，我也不好去倒茶。" 

# monologue
# JP: 喉が勝手にツバを飲み――\nけれど乾きは、わずかたりとも癒されない。
2241 = "我不由得咽了一口唾沫——但乾渴並沒有紓解半分。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……データとインフォメーションの――\n事実・資料と、情報との違いについては理解しとーと？」
1035 = "「……你了解Ｄａｔａ與Ｉｎｆｏｒｍａｔｉｏｎ之間——事實、數據與訊息之間有什麼差別嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「は？　あ――ええと」
1664 = "「蛤？　啊——那個」" 

# monologue
# JP: またも話が飛んだ気がして面食らう。\nが、とにもかくにも考える。
2253 = "我再次覺得話題突然發生了轉變，有些不知所措。但還是試著去思考。" 

# monologue
# JP: 横文字だけならおそらく混乱していただろうが、\n日ノ本語による補足が思考を助けてくれる。
2171 = "如果只有英語的話，我恐怕會更加混亂。幸好還有日語幫助我理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば御一夜市の人口が、何年に幾人だった、という\n数値や数値群が、データ――事実であり、資料です」
1550 = "「比方說，御一夜市在某一年有多少人口，這樣的一組或多組數值就是Ｄａｔａ——也就是事實、數據」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ん」
# 1375 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それをグラフなり表なりにして、参照し易くしたものが、\n情報――インフォメーションであると理解しています」
1639 = "「而把這些數值圖表化，讓它方便被參照，也就成了訊息——即Ｉｎｆｏｒｍａｔｉｏｎ——我是這樣理解的」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん理解は、理解でよかばい。\nで――」
1726 = "「這樣理解並沒有錯。那麼——」" 

# monologue
# JP: 僕を見る目が、スっと細まる。\nとてもご老人のものとは思えぬ鋭さだ。
2155 = "她眯起眼睛。目光銳利得不像是一位老者。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「言葉として、概念としてではなく――直感で。\nそん二つば、普段からわけて処理ばしとーと？」
1495 = "「拋開釋義、拋開概念——憑你的直覺。你平時一直是將這兩樣東西分開處理的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が……ですか？」
1443 = "「您是說……我？」" 

# monologue
# JP: 考える。\nが、深く考えるより先に、答えは口から出てしまう。
2277 = "我試著思考。但是還不等我多想，答案便已經脫口而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――いえ。特に区別して取り扱ってはいないようです」
1001 = "「——不。我似乎並沒有刻意去區分它們」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんとは、普通のこったい。資料と情報とは、\n“意識ばせんと”別個のものとは処理できんばい」
1723 = "「這是很正常的咧。數據與訊息，“若非刻意”，人們是不會將它們分開處理的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1375 = "「嗯」" 

# monologue
# JP: 意識ばせんと――意識しないと。\n強い語調で言われた意味を、考える。
2437 = "若非刻意——我思考著她在此處加重語調的用意。" 

# monologue
# JP: 資料を情報と処理するためには、意識・思考が必要になる。\nあるいは逆に――
2252 = "我們需要經過刻意的思考，才能將數據處理為訊息。反過來說——" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「人間の脳は、資料と情報を――\n記録と記憶を、そう便利には切り分けて処理できんとよ」
1300 = "「人類的大腦無法高效地將數據與訊息——將記錄與記憶進行分別處理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「記録と記憶……」
1672 = "「記錄與記憶……」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そして、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のプロセッサは――想定以上に、\nあまりに脳に、“似過ぎた”ばい」
1634 = "「而\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的處理器——與人類大腦的“相似度”之高，超出了人們的預計」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ！！？」
1008 = "「——！！？」" 

# monologue
# JP: 言葉が、意味が、一つの線となって繋がる。\n記録と記憶――それはつまり、資料と情報に極めて近しい。
2047 = "先前的對話，如拼圖般一片片歸位。記錄與記憶——極其近似於數據與訊息。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;のプロセッサとやらが、人間の脳と――\n近似しているらしいことと、恐らくはほぼ、同等に。
2428 = "而這恐怕也意味著——\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;所謂的處理器，與人類的大腦極其相似。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他人が作った資料を、人は“記録”として処理できる。\nそれは――“意識的に”そう扱い得るから」
1294 = "「人們能夠將他人所寫下的數據作為“記錄”來處理。是因為能夠“刻意”這樣理解」" 

# monologue
# JP: この場合、紙媒体というクッションが、意識を喚起し、\n混乱を吸収する役割をきっと、果たしてくれてる。
2120 = "在這種情況下，一定是紙媒作為緩衝物喚醒了意識，防止我們陷入混亂。" 

# monologue
# JP: しかし、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の\x%lタブレット;#00ffc040;タブレット%l;#;の場合は、\nどうなのだろう？
2006 = "但如果換成\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的\\x%lタブレット;#00ffc040;操作板%l;#;，又會怎麼樣呢？" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;は……記録と同時に、記憶もしてしまう？\nが、脳に近似しているのなら、恐らくプロセッサも――」
998 = "「\\x%lタブレット;#00ffc040;操作板%l;#;在記錄的同時……還會完成記憶？可是，既然處理器與大腦很相似，那恐怕它也——」" 

# monologue
# JP: こくりと。\n重く、鈍い頷き。
2138 = "她沉重地點了點頭。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「脳に似すぎたがため。処理・演算に特化させた筈の\nプロセッサ自体も、“記憶”を持ってしまったとよ」
1608 = "「由於與大腦太過相似，原本專用於處理、演算的處理器本身，也擁有了“記憶”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、\n他者の\x%lタブレット;#00ffc040;タブレット%l;#;をそこに実装してしまえば――」
1754 = "「那麼，如果為其安裝了他人的\\x%lタブレット;#00ffc040;操作板%l;#;——」" 

# monologue
# JP: ……例えば、昨日――僕は買い物に出かけたとする。
984 = "……比方說，我昨天出門買了東西。" 

# monologue
# JP: その記憶を有したまま、“昨日は家で読書をしていた”\n記録と記憶が、いきなり並列してきたのなら――
2423 = "而如果我在擁有這段記憶的情況下，突然被植入了“昨天在家裡看書”的紀錄與記憶——" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「当然、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、混乱するばい。\n自我を見失い、酷か不安定状態に陥りよるたい」
1439 = "「很顯然，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;會發生混亂。她們會迷失自我，陷入極其不穩定的狀態咧」" 

# monologue
# JP: 断言。\nそれは、過去におきた事実を語る言葉なのだろう。
2164 = "她能夠如此斷言恐怕是因為，這是曾經真實發生過的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「人間には、ありえないその現象が、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には起こりえてしまう」
1717 = "「這一現象絕不會發生在人類身上，但\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;卻有可能」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「記録と記憶ば、都合ようには切り分けられん。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、そこは人間と変わらんとよ」
1673 = "「記錄與記憶是無法隨意切分開來的。即使是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，在這點上也與人類別無二致」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1375 = "「嗯」" 

# monologue
# JP: 僕の同意をどうとったのか、\n年経た瞳が、皺の下へと閉じられる。
1987 = "不知她是如何理解我的這句肯定的，她慢慢闔上了布滿皺紋的眼簾。" 

# monologue
# JP: そのまま、五秒――十五秒。
2205 = "就這樣過了５秒——１５秒。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……ガソリン\x%l気動車;#00ffc040;気動車%l;#;から\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;への改修と、\nそんロールバックとに関する、圧縮情報」
1043 = "「……從汽油\\x%l気動車;#00ffc040;動車%l;#;改造成\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;，以及用於回滾的壓縮訊息」" 

# monologue
# JP: まぶたは閉じたそのままに、沈んだような声が、響く。
2131 = "她就這樣閉著眼睛，用沉重的語調說道。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「れいなを圧迫しとーとは、そればい」
1270 = "「一直壓迫著玲奈的元兇，就是這個咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1775 = "「！！！」" 

# monologue
# JP: 理解――した。
2240 = "我——明白了。" 

# monologue
# JP: 遠回りのような説明が、\n一直線に、僕に理解を運んでくれた。
2545 = "那看似捨近求遠的說明，卻將答案直接攤在了我面前，一覽無遺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ロールバック情報を持っているのなら……\nディーゼル‐ガソリン復旧は、理屈の上では――」
1508 = "「既然她保存著回滾訊息……那麼從理論上來說，要從柴油改回汽油是——」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「容易ばい。\nそぎゃんとすれば、処理面での負荷も軽くはなるとよ」
1435 = "「很方便的咧。如此一來，也能夠減輕她處理量的負載」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それは――れいなの“記憶”に、\nプロセッサそのものに干渉してしまう危険を持っている」
1358 = "「可是那樣的話，會有對玲奈的“記憶”——對處理器本身產生干涉的風險」" 

# monologue
# JP: 記録に、記憶は付随する。その逆もまた、おそらく真だ。\n過去のことを思い出す――それだけならまだ良いだろう。
2460 = "記憶會隨著記錄一道而來，恐怕反之亦是如此。若只是回憶起過去的事情，那倒還算好。" 

# monologue
# JP: だが、容量を保持するために、今度はディーゼルまわりの\n記録を圧縮なり削除なりする必要が出てくるのなら――
2097 = "可是，如果為了維持剩餘容量，這回又必須壓縮甚至刪除有關\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;的紀錄——" 

# 【双鉄】
# display as 雙鐵
# JP: 「最悪……れいなは、ディーゼルとして稼働していた……\n御一夜鉄道で過ごした時間の、記憶を失う危険さえ――」
1538 = "「最壞情況下，玲奈甚至有可能失去作為\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;運行的……關於御一夜鐵路的所有記憶——」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「無いとは、断言できんばい」
1616 = "「的確有可能會這樣咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1019 = "「……」" 

# monologue
# JP: 理屈は簡単。\nけれど実践はひどく難しい。
2378 = "理論很簡單。實踐起來卻極其困難。" 

# monologue
# JP: 言葉の重みが、\n今さらのように腹の底へと溜まっていく。
2391 = "直到現在，我才體會到這句話有多麼沉重。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そのことを、ポーレットは」
1052 = "「……這件事，波萊特她——」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「れいなの負荷軽減について――\nただの一度も、相談ばされたことはなかとよ」
1397 = "「她從沒有來問過我，要如何減輕玲奈的負載咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう――ですか」
1520 = "「是——這樣嗎」" 

# monologue
# JP: ポーレットは知っている。\n他の誰より、知っている。
2358 = "波萊特知道。她比任何人都清楚。" 

# monologue
# JP: 処理落ちを、どれほどれいなが気にしているかを。\nそれが、どんなに安全上のリスクを高めてしまうかを。
2158 = "她知道玲奈有多麼在意處理脫節的問題。也明白這造成了多大的安全隱患。" 

# monologue
# JP: （にもかかわらず――\nポーレットが、この問題と向き合わないのなら……）
2588 = "（可儘管如此——波萊特卻沒有去面對這個問題……）" 

# monologue
# JP: この事実をもまた、ポーレットは知っている。
2540 = "那就代表著，波萊特對這一解決方法也一清二楚。" 

# monologue
# JP: 知っているから――\nれいなの記憶を失くす恐怖に、立ち向かえない。
2312 = "正因她知道——才不敢面對玲奈失去記憶給自己帶來的恐怖。" 

# monologue
# JP: （ああ――）
2590 = "（啊——）" 

# monologue
# JP: 実践は。ひどく。難しい。\nならばこそ、僕はポーレットを助けたい。
2196 = "實踐極其困難。正因如此，我才想要去幫助波萊特。" 

# monologue
# JP: 助けるための最善が――\nなにかを、どうにかして見出したい。
2225 = "必須找出——幫助她的最好辦法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お話を……貴重なお話を、ありがとうございました」
1684 = "「謝謝……謝謝您無比寶貴的一席話」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「じゃったら話ば終わりとね」
1753 = "「那麼談話就到此結束咧」" 

# monologue
# JP: 短く言って、\nさっさと登呂流湯のご主人は立ち上がる。
2403 = "短短說了一句，登呂流浴場老闆乾脆地站起身來。" 

# monologue
# JP: そしてそのまま部屋を去りかけ――\n一瞬、僕へと振り返る。
2136 = "她朝著房門走去——突然回過頭來說道。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「こん話ば聞いてきたとは、\n右田の――ぬしゃが初めてばい」
1315 = "「來找我問這件事的人，右田家的小子——你還是第一個咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのですか」
1048 = "「……是這樣嗎」" 

# monologue
# JP: それはつまりは――\nポーレットの孤立の深さ……いや……
2548 = "那麼，這或許意味著波萊特有多麼地孤立……不……" 

# monologue
# JP: ポーレットが周囲に対して築いてきた、\n心の壁の高さの表れなのかもしれない。だが――
2520 = "這恐怕代表著波萊特對周圍建立的心理屏障有多麼高吧。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「お聞かせいただいたこと。\n決して、無駄にしたくはなく思います」
1445 = "「感謝您的一番貴言，我一定會努力不讓它白費的」" 

# monologue
# JP: ――そうであっても、初めて尋ねたのは僕と聞き、\n心のどこかは、誇らしいように感じている。
961 = "——即便如此，此刻得知我是第一個詢問此事的人，還是在我心中泛起了一種自豪之感。" 

# monologue
# JP: それが幼稚な独占欲でも、他の何でも、\n同情や憐憫よりは、遥かにマシな感情だろう。
2364 = "無論它是出於幼稚的獨占欲還是其它某種感情，都比同情或憐憫好得太多。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の調整ば、\nやるならいつでん、引き受けるけん」
1004 = "「——如果要給\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;做調整，隨時可以來找我咧」" 

# monologue
# JP: どこかサバサバしたような声。\nそれだけ残し、登呂流湯主人は去っていく。
2385 = "登呂流浴場老闆爽朗地留下這一句話，離開了房間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
1763 = "「非常感謝」" 

# monologue
# JP: ――ともかく、前を向くことだ。\n自分自身に、そう言い聞かせる。
2415 = "總之，必須面向前方——我如此告誡自己。" 

# monologue
# JP: 何が出来るか、今は正直わからない。が――\n少なくとも問題の複雑さを知ることだけは出来たのだから。
2264 = "我現在還不清楚自己能做些什麼。但是，至少我已經了解到問題有多麼複雜了。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「\x%l客車;#00ffc040;客車%l;#;の手配が整ったとのことですね。\nまずは、おめでとうございます」
1645 = "「聽說\\x%l客車;#00ffc040;客運車廂%l;#;已經準備妥當了啊。首先要恭喜你們」" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「ありがとうございます」\n「ありがとうございまぁす」
1764 = "「非常感謝」\\n「謝謝您」" 

# monologue
# JP: 赤井宮司との面談は、いたって和やかな雰囲気だ。
2435 = "與赤井宮司的會談在和睦的氛圍中進行著。" 

# monologue
# JP: ポーレットの面差しはただ柔らかで、\nいかなる重荷も暗さも全く覗かせない。
2356 = "波萊特的表情還是和往常一樣的柔和，完全將所有的重負與陰鬱藏起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「すみません、こちらからお尋ねするべきところ、\nわざわざレールショップまで」
1626 = "「真對不起，本該由我們前去拜訪，卻勞您專程來到鐵路商店」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いいえ、なにほどでも無いことです。\nご体調を崩されたともお伺いしましたし」
1282 = "「不，你不必放在心上。而且我還聽說你最近身體不舒服」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ご心配をありがとうございます。\n少し焦りすぎてしまって――けど、もう大丈夫です」
1446 = "「感謝您的關心。是我有些太心急了——不過已經沒關係了」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「焦りすぎた……ですか？」
1313 = "「你說……太過心急了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。実は――」
1525 = "「是的。其實——」" 

# monologue
# JP: ああ、上手い。
2112 = "啊，真聰明。" 

# monologue
# JP: 平凡な挨拶のやりとりを、\nごくごく自然に、ポーレットは本題へとつなげてしまう。
2349 = "波萊特將一句普普通通的問候極其自然地帶向了主題。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「……なるほど。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派が、ですか――」
1036 = "「……原來如此。是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ですので今会期末までに、\n議案をいくつか通過させたいと考えています」
1531 = "「是的，所以在這次議會結束之前，我希望能通過幾份議案」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いくつか、のうちの一つは、\nこの[やしろ]社の文化財申請についてですよね」
1637 = "「而其中之一，就是關於我們神社的文化財產申請吧」" 

# monologue
# JP: ご用意くださっていたのだろう。
2503 = "赤井宮司將看似很重的一捆資料放到桌上，並將清單遞給波萊特。" 

# monologue
# JP: 赤井宮司が、どさっと資料の束を置き、\nポーレットへとリストを渡す。
1978 = "一定是特地為我們準備的吧。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「専門家にも見てもらったのですが――\n新たに出てきたこの辺りも、かなり希少なものだそうです」
1468 = "「我已經請專家看過了——這些新發現的部分，似乎也是現在非常稀少的元素」" 

# 【ポーレット】
# display as 波萊特
# JP: 「拝見します」
1415 = "「容我拜閱」" 

# monologue
# JP: リストへと落ちたポーレットの目が、\nみるみる喜色に満ちていく。
2359 = "波萊特開始閱覽清單，很快便面露喜色。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これは……更なる裏付けとなる資料なのですね。\n木地師文化との深く、古い繋がりがあったということの」
1719 = "「這些資料……是新的證據呀。能夠進一步證明神社與木旋工之間密切而悠久的聯繫」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「とのことだと聞いています。\n使えるようでしたら、どうぞ、ご随意にご活用ください」
1500 = "「據說是這樣。如果能派上用場的話，請隨意使用吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。これだけの裏付けがあれば、\nたぶん全会一致での賛同を得ることができると思います」
1762 = "「非常感謝。有了這麼多的證據，我想議案應該能夠全票通過的」" 

# monologue
# JP: なによりです、と頷いて。\n赤井宮司の落ち着いた目は、僕へ向く。
2506 = "赤井宮司聽罷，高興地點點頭，然後目光柔和地看向我。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「その他の議案、というのは、\nマイントレジャー関連についてですか？」
1332 = "「其它的議案是有關煤探樂園的嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――\n既にご存知くださってましたか？」
1371 = "「啊——您已經知道了啊？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[うじこ,1]氏子さんたちの口の端にも上っていますし、\n双鉄君からも、お電話をいただきましたので」
1629 = "「神社的信徒們有在討論這件事，雙鐵君也在電話裡跟我提起過」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうだったんですか」
1344 = "「原來是這樣」" 

# monologue
# JP: さすが、といわんばかりの眼差し。\nが、それだけが、電話した内容の全てではない。
2348 = "波萊特向我投來欽佩的目光。不過，這還不是那通電話的全部內容。" 

# monologue
# JP: （運転鞄を――よかった、お連れくださっている）
2615 = "（駕駛包——太好了，他帶來了）" 

# monologue
# JP: 元\x%l運転士;#00ffc040;運転士%l;#;である赤井宮司の居室にいつも、\n鎮座ましましている\x%l乗務鞄;#00ffc040;乗務鞄%l;#;。
2511 = "身為前\\x%l運転士;#00ffc040;駕駛員%l;#;的赤井宮司，他的起居室裡一直擺放著一個\\x%l乗務鞄;#00ffc040;乘務包%l;#;。" 

# monologue
# JP: 中身は僕の予想通りで、\nだから、ここにも連れてきてもらった。
2444 = "裡面的物品正是我意料之中的，所以我拜託宮司將它帶來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「マイントレジャー計画の概要につきましては、\n既にお伝えさせていただきましたとおりです」
1759 = "「關於煤探樂園的計劃概要，我先前已經與您說過」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ」
# 1375 = "「嗯」" 

# monologue
# JP: 僕は、知りたい。\n赤井宮司が、そして彼の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――
2256 = "我很想知道——" 

# monologue
# JP: れいなの改修について果たして、\nどんな意見を持つのかを。
2501 = "赤井宮司和他的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;對玲奈的修復究竟持有怎樣的看法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとの相談の結果、マイントレジャー計画案と、\n技術継承炭鉱申請案とは、別個の議案として提出します」
1390 = "「在與波萊特商討之後，我們決定將煤探樂園計劃案與技術繼承煤礦申請案作為兩個獨立議案，分別提出」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど。そうすれば、マイントレジャー計画が\nもし、今回了承されなかったとしても――最低限は」
1343 = "「原來如此。這樣一來，就算煤探樂園計劃這次沒有通過，至少還可以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、技術継承炭鉱としての補助申請の方が賛同を\n得られやすい議案ですので、環境防護は果たせるかと」
1533 = "「是的，這份申請技術繼承煤礦以獲取補助金的議案支持率應該會更高一些，可以實現環保的目標」" 

# monologue
# JP: 知りたいからこそ、焦らない。\nただ、話すべきを話し続ける。
2315 = "正因為想知道答案，我才不能著急。先將目前的話題繼續下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕としては赤井宮司にマイントレジャー計画への\nご賛同を頂きたく思っています」
1472 = "「我希望煤探樂園計劃能夠得到赤井宮司您的支持」" 

# monologue
# JP: ――過去と今。\n心地よい温度と距離感。
963 = "——這是一直以來讓我們感到舒適的溫度與距離。" 

# monologue
# JP: あいまいなままでもよかった全てを、\n踏み壊すかもしれない、一言までを。
2273 = "我繼續說著，即使接下來的話語有可能毀掉目前看似美好的一切。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、現状ではその資格も無い」
1308 = "「但是，目前我們還沒有這個資格」" 

# 【ポーレット】
# display as 波萊特
# JP: 「資格？」
1693 = "「資格？」" 

# monologue
# JP: きょとんとした顔。\nこれを曇らせてしまうと思えば、心が痛む。
2142 = "她滿臉疑惑。我一想到接下來的話語會給她帶來憂愁，心中便陣陣生痛。" 

# monologue
# JP: だが、やるのだ。\n不安定な幸福はきっと、不幸の前兆でしかない。
2014 = "但是，必須這樣。因為不穩定的幸福，一定是不幸的前兆。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなの処理落ち問題を――\n解決せぬまま、マイントレジャー計画は進められない」
1403 = "「如果無法解決玲奈的處理脫節問題，就無法繼續推進煤探樂園計劃」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――あ」
1003 = "「——啊」" 

# monologue
# JP: しかし、表情は曇らない。\n代わりに色が――顔色がス、と青ざめてしまっただけだ。
2094 = "可是，她的臉上並不見愁雲。臉色卻一下子變得煞白。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは……本当にそうなんですよね。\n[ハチロク,3]8620だけを中心にした観光振興ならいざしらず――」
1714 = "「這……的確是這樣呢。如果旅遊業復興是單獨圍繞[八六,3]８６２０展開的，那倒還好——」" 

# monologue
# JP: ああ、と思う。今さら気付く。\nポーレットが幾度も言っていた『8620を中心とした』とは。
2248 = "我事到如今才明白，波萊特先前幾次提起“圍繞８６２０展開”的原因。" 

# monologue
# JP: 観光客を、極力れいなに乗せないようにする――\nその意図の、消極的な表明でもあったのだなということを。
2538 = "那同時也是在消極地表明——她想儘量避免讓遊客乘坐玲奈的列車。" 

# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャー計画を進めるには、れいなにも、\n観光客さんに絡んでもらう必要がどうしても出てくる」
1404 = "「如果要繼續推進煤探樂園計劃，就必須要讓玲奈也來載運遊客才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「現状の湯医線運営は、地元の皆さまのご理解とご寛容に\n支えられてる。が……観光客相手では、そうはいかない」
1618 = "「目前湯醫線能夠正常運營，是因為得到了本地乘客的理解與寬容。但是……面對遊客，這樣可行不通」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1375 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「はぅぅ～っ」
1368 = "「哈嗚～」" 

# monologue
# JP: れいなの顔を、不安げに歪ませてしまった。\nそこにまで気を回せなかった自分を、未熟と感じる。
2278 = "我讓玲奈的表情因為不安而扭曲了。沒能考慮到這一點，我深深為自己的不成熟而懊悔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。れいな。問題なくできるようにするための\n知恵を――解決案を、これから皆で出し合っていくのだ」
1337 = "「別擔心，玲奈。我們接下來會一起出謀劃策，幫你解決這個難題」" 

# monologue
# JP: だから――自分自身にも言いきかせながら、\nれいなの細い髪をぽんぽん叩いて撫でる。
2284 = "所以——我一邊如此激勵著自己，一邊輕輕敲打、撫摸玲奈纖細的頭髮。" 

# monologue
# JP: ただそれだけで、\nれいなはいくらか、安心したように笑ってくれる。
2025 = "僅僅這一個動作，就讓玲奈安心了少許，對我展露笑顏。" 

# monologue
# JP: （この笑顔を……見せてもらえなくなるかもしれんのか）
2600 = "（我有可能……再也看不到這樣的笑容嗎）" 

# monologue
# JP: 短い付き合いの僕ごときでさえ、\nズキリと痛む不安を感じる。
2206 = "就連與她相處時日尚短的我，都被不安的情緒刺痛著胸口。" 

# monologue
# JP: が、ならばこそ、僕は先頭に立たねばならん。\nポーレットの、れいなの負荷を、僅かでも負うそのために。
2012 = "但是正因如此，我才必須站在最前面。為了能夠儘可能地分擔波萊特與玲奈的重負。" 

# 【双鉄】
# display as 雙鐵
# JP: 「理屈の上での解決策は、\n登呂流湯のご主人に聞いてきた」
1465 = "「我向登呂流浴場老闆打聽到了理論上的解決方案」" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「っ！」\n「っ！」
1772 = "「！」\\n「！」" 

# monologue
# JP: 言うと同時に、まるで電流でも流れたように、\nポーレットがれいなを、れいながポーレットを見る。
2432 = "聽我說完，波萊特和玲奈兩人就像觸電了一般面面相覷。" 

# monologue
# JP: ならば、ふたりともこの事実を既に知っていて。\nそしてお互いを思いやり、口に出してはなかったのだろう。
2542 = "那就表明，她們兩人早就都知道了這個事實。卻為了顧慮彼此而沒有說出口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯のご主人は……れいなの中に、\n『ガソリン\x%l気動車;#00ffc040;気動車%l;#;へのロールバック情報』があると」
1611 = "「登呂流浴場老闆說……玲奈的機體內還保留著“復原為汽油\\x%l気動車;#00ffc040;動車%l;#;的回滾訊息”」" 

# monologue
# JP: れいなを見る、じっと見る。\nが、そうしてもまだれいなはポーレットを見たままだ。
2269 = "我目不轉睛地看著玲奈。可是她依舊注視著波萊特。" 

# 【れいな】
# display as 玲奈
# JP: 「あの……」
1744 = "「那個……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……平気よ？　れいな」
1049 = "「……玲奈，沒事的」" 

# monologue
# JP: ややあって、ポーレットは優しい笑顔を浮かべ、\nれいなに向かって頷きかける。
2526 = "過了一會，波萊特溫婉一笑，向玲奈點了點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「聞かせて。わたしも知りたいの」
1679 = "「說來聽聽吧。我也想知道」" 

# 【れいな】
# display as 玲奈
# JP: 「ええと……あります。\nれいな、ロールバック情報、持ってます」
1745 = "「那個……有的。玲奈還保留著回滾訊息」" 

# monologue
# JP: 言ってしまって、何のつかえが取れたのだろうか。\nれいなの言葉は、なめらかになる。
2468 = "說完這一句，就好像掃清了障礙物一般，玲奈的話語變得流暢起來。" 

# 【れいな】
# display as 玲奈
# JP: 「[カタガミ,1]硬上鉱山鉄道を出るとき、全部持たせてもらったんです。\n改修資材も、全部、ぜぇんぶ一緒にです」
1391 = "「在離開片上礦山鐵路的時候，玲奈把所有東西都帶上了。包括改造材料在內，全都帶上了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「改修資材も、というと――」
1730 = "「連改造材料都有，也就是說——」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ガリソン\x%l気動車;#00ffc040;気動車%l;#;へのロールバック、出来ます」
1593 = "「玲奈，可以隨時回滾到汽油\\x%l気動車;#00ffc040;動車%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど――出来るって、いっても――」
1354 = "「可是——雖然說，可以做到——」" 

# monologue
# JP: 決して、大きなものでは無い声。\nけれど、あまりに多くが込められた声。
2148 = "她的聲音不算大，卻包含了太多的情緒。" 

# monologue
# JP: ポーレットは、それを発して唇をぎゅっと引き結び。\nそして――そのまま俯いてしまう。
2470 = "說完，波萊特緊咬著嘴唇，然後慢慢低下了頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「出来るっていっても……それは――」
1761 = "「雖然說可以做到……但那是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「圧縮した情報の展開と、必要次第での別情報の圧縮と。\nそれにも、それぞれリスクがともなうとも聞いている」
1666 = "「要把壓縮訊息展開，有必要的話還要壓縮其它的訊息。並且每個步驟都伴隨著風險」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、そのお話も聞いてます」
1581 = "「玲奈也聽說過這個辦法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1771 = "「！」" 

# monologue
# JP: ポーレットの目がもちあがる。\nれいなは、それをまっすぐ見ながら言葉をつなぐ。
2352 = "波萊特猛然抬頭望向她。玲奈望著波萊特的眼睛，繼續說下去。" 

# 【れいな】
# display as 玲奈
# JP: 「ロールバックは、できる限りはしないようにって。\nれいな、言われて、ここに来ました」
1582 = "「玲奈在來這裡之前被叮囑過——儘可能不要進行回滾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「出来るかぎりは、か――」
1325 = "「儘可能嗎——」" 

# monologue
# JP: だが今は、\nそこを踏み越えるべき時だと思う。
2010 = "但是我認為，現在正是跨過那條線的時候。" 

# monologue
# JP: そう出来ない――いや、そうしないなら――\n僕らはきっと、同じ所をぐるぐる回り続けるだけになる。
2175 = "如果我們做不到——不，如果我們選擇不這麼做——我們一定只會在同一個地方原地打轉。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいな、は」
1590 = "「玲奈，你——」" 

# monologue
# JP: かすれた、絞り出したような声。\n見るからにもう無理をしている、作り笑い。
2353 = "波萊特發出沙啞的聲音，笑容非常僵硬。" 

# monologue
# JP: それでも、ポーレットは微笑んでいる。\nれいなにきっと、遠慮せず語って欲しいから。
2068 = "即便如此，她還是努力保持著微笑。為了讓玲奈能夠說出自己真實的想法。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、今は、どうしたいの？\nロールバックを、復旧改修を――れいなは、受けたい？」
1589 = "「玲奈現在想怎麼做？希望進行回滾——接受復原改造嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなは――」
1579 = "「玲奈——」" 

# monologue
# JP: 初めて、目にするように思う。\nれいなが、言いよどんでいる姿を。
2257 = "我或許是第一次看到玲奈欲言又止的樣子。" 

# monologue
# JP: あどけない唇はぱくぱくと、何度か開いて閉じて、開いて。\nグっと――息が、言葉が。喉の奥へと押し込められる。
2168 = "她那天真無邪的嘴唇張張合合，幾次將空氣、將話語咽回肚裡。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから。\nポーレットのいうことが、れいなのしたいことですよぉ」
1597 = "「玲奈，是波萊特的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。波萊特所說的，就是玲奈想做的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしの、したいこと……」
1455 = "「我、想做的……」" 

# monologue
# JP: ポーレットの顔からもう、作り笑いが落ちてしまう。\nうつむき、黙り――葛藤している。
2059 = "剛才那強擠出來的笑容，此刻已沒了蹤影。波萊特低頭沉默——陷入糾結。" 

# monologue
# JP: ときおり、ちらり、またちらり、\nすがるような目が、僕へ向く。
2121 = "她三不五時地用求助的目光瞟向我。" 

# monologue
# JP: （あるいは、僕が、決断までを――\nまるごと全てを、いっそ引き受けるべきなのか）
2601 = "（或許我應該將最終的決定——甚至所有的一切也一同承擔下來）" 

# monologue
# JP: それは、ひどく容易な道だ。
2534 = "那一定是一條極其平坦的道路。" 

# monologue
# JP: どんな結果が出ようとも、僕が背負い込んでしまうなら、\n傷や後悔が生じたとして、逃げ道のあるものとなるから。
2301 = "既然無論結果如何都由我來承擔責任，那麼她即使受傷、後悔也依然有路可退。" 

# monologue
# JP: （だが、そうしてしまえば――\nポーレットはまた、立ち向かい損ねる）
2583 = "（但是，如果這樣做了——波萊特就會再一次無法勇敢面對）" 

# monologue
# JP: 過去の傷に。\n自らを縛る古い恐怖に。
2565 = "面對過去的傷口。面對長久以來束縛著自己的恐懼。" 

# monologue
# JP: 立ち向かう機会を逃せば逃してしまうほど、\nそれは、大きく深く、黒さを増していくものなのに。
2320 = "每當她錯過勇敢面對的機會，那一團恐懼就會變得更巨大、更幽深、更漆黑。" 

# monologue
# JP: （ましてやこれは――僕のエゴであるかもしれんのだ）
2604 = "（更何況——這有可能只是出於我的私心）" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致阻止という目的がもし僕になければ、\n判断はきっと、遥かに容易だったろう。
2179 = "如若我沒有阻止\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶這一目的，我一定會比現在更容易做出決定。" 

# monologue
# JP: が――誘致阻止のため、マイントレジャー計画を進めたい。\nそうした気持ちがある以上、判断もその分濁る気がする。
2009 = "但是——為了阻止工廠落戶，我想推進煤探樂園計劃。正因我有這樣的想法，我才更難做出判斷。" 

# monologue
# JP: （何が一番……ポーレットにとって、れいなにとって、\n最善となる行動なのか――）
2596 = "（對波萊特而言，對玲奈而言……什麼才是最好的選擇——）" 

# 【ニイロク】
# display as ？？？
# JP: 「それなら、自分と変わってほしい」
1516 = "「既然這樣，請把這個機會讓給我」" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「っ！！？」\n「ひゃわっ！！？」
1777 = "「！！？」\\n「呀！！？」" 

# monologue
# JP: 静かな声。\n冷たい声。
2326 = "沉靜而冰冷的聲音。" 

# monologue
# JP: 赤井宮司の、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;のその内側から。
2524 = "這聲音來自於赤井宮司的\\x%l乗務鞄;#00ffc040;乘務包%l;#;之中。" 

# 【ニイロク】
# display as ？？？
# JP: 「[キヨハル,1]清春、出して」
1570 = "「清春，抱我出來」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ――」
1374 = "「嗯——」" 

# monologue
# JP: 赤井宮司が、鞄の中に両手をそうっと差し入れる。
2504 = "赤井宮司將雙手伸入包中。" 

# monologue
# JP: 宮司の細い手に掻き抱かれて、あまりに異様な――\n異形というべき\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、僕らの前に姿を現す。
2440 = "被他纖細的雙手所抱出來的，是一個外表極為奇怪——可以稱得上是怪異的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……お顔……が――」
1366 = "「哇……她的……臉——」" 

# monologue
# JP: 包帯だ。\n顔中全てを、包帯で覆ってしまっている。
2304 = "是繃帶。她的整張臉，都被繃帶包裹著。" 

# monologue
# JP: その隙間からわずかに覗く黒髪の、悲しい程に見事な艶が、\n痛々しさをいや増させている。
2424 = "而自縫隙處垂下的幾束黑髮，又是那麼烏黑靚麗，叫人看起來更加心痛。" 

# 【ニイロク】
# display as ？？？
# JP: 「自分は、ニイロク。\nクハ[ニイロク,1]26の専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だったものだ」
1481 = "「我是二六。曾經是Ｋｕｈａ２６的專屬\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「クハ、[ニイロク,1]26」
1781 = "「Ｋｕｈａ、２６」" 

# monologue
# JP: 呟きに視線を向ければ、\nそれだけでポーレットは応えてくれる。
2431 = "聽到波萊特的低語，我轉頭朝她看去，她便開始為我解釋。" 

# 【ポーレット】
# display as 波萊特
# JP: 「[かごしま,2]鹿兒島本線で試験運用されてた……\n\x%l電車;#00ffc040;電車%l;#;、だったと思います」
1449 = "「應該是……曾經在鹿兒島幹線試運營的電車」" 

# 【ニイロク】
# display as 二六
# JP: 「そう。\x%lクハ26;#00ffc040;クハ26%l;#;は\x%l電車;#00ffc040;電車%l;#;だった。\n自分が、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であったときには」
1558 = "「沒錯。在我還是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的時候\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;曾經是電車」" 

# monologue
# JP: ……過去形の理由であるなら、僕ごときにも想像できる。
986 = "……為什麼採用過去式，連我都能想像得到。" 

# monologue
# JP: 静かで冷たい言葉はすぐに、\nその想像が正しいものだと、示してしまう。
2544 = "那沉靜而冰冷的聲音，很快便印證了我的猜想。" 

# 【ニイロク】
# display as 二六
# JP: 「けれど、鉄屑に成り果てた。\n自分の、整備ボディとともに」
1304 = "「但是，它最終還是與我的整備體一同變成了廢鐵」" 

# monologue
# JP: 感情が、まるで声から感じられない。\nああ、これは――冷たいではなく、温度が無いのだ。
2147 = "她的聲音不帶有一絲感情。啊，她——並不是冰冷，而是沒有溫度。" 

# monologue
# JP: （まさか……こんな状態の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であったとは）
2607 = "（沒想到……這個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;竟處於這種狀態之下）" 

# monologue
# JP: 残酷なことを、おそらく僕はしてしまっている。
2233 = "恐怕，我正在做一件殘忍的事。" 

# monologue
# JP: ポーレットの傷を癒やすそのため、\nこの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の傷を、おそらく抉っている。
2361 = "為了要治癒波萊特的傷口，而在這個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的傷口上撒著鹽。" 

# 【ニイロク】
# display as 二六
# JP: 「自分は、壊れたくないと思った。\nだから、清春に何とかして欲しいと頼んだ」
1458 = "「我不想就此報廢。於是，便請求清春幫我尋找出路」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「……[かごしま,2]鹿兒島本線の廃線がきまった、あの日。\n試験機は、全て一斉処分されることとなりました」
1041 = "「……在鹿兒島幹線決定廢線的那一天，我們接到了所有試驗車型集體處理的命令」" 

# 【ニイロク】
# display as 二六
# JP: 「それは、ひどく残酷で無意味な指示に思えた。\nだから、自分たちは抗った」
1461 = "「我們認為那是極其殘忍而無意義的命令。所以，我們選擇了反抗」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「……モックアップ――外装模型を運転席に座らせました。\n気づいた者もいたでしょう。しかし、誰も咎めなかった」
1046 = "「……我們將一個全尺寸模型放到了駕駛座上。或許有人看穿了我們的伎倆。但是，沒有人來責怪我們」" 

# monologue
# JP: 赤井宮司の眉間にぎゅっと、後悔にだろうか、皺が寄る。\nニイロクを包む包帯は、もちろん、なんの変化も見せない。
2505 = "赤井宮司緊皺的眉間，透著悔意。而二六臉上的繃帶，自然沒有任何變化。" 

# 【ニイロク】
# display as 二六
# JP: 「結果、自分は成り果てた。\n走ることの出来なくなった――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、残骸に」
1505 = "「於是，我便墮落了。淪落為無法在鐵路上奔跑的——\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的殘骸」" 

# 【ポーレット】
# display as 波萊特
# JP: 「残、骸」
1549 = "「殘、骸」" 

# 【ニイロク】
# display as 二六
# JP: 「上からの指示は残酷なものではなかった。正しかった。\n走れなくなった\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、自ら壊れる」
1273 = "「上級的命令並不殘忍，反而正確。無法在鐵路上奔跑的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;會自行崩潰」" 

# monologue
# JP: れいなを――思わず見てしまう。\nが、ショックを受けたような様子は見られない。
2243 = "我不由得看向玲奈。但是，她似乎並不驚訝。" 

# monologue
# JP: まるで前から知っていることを聞くように――\nただ、悲しげに黙りこくっている。
2198 = "就好像在聽一件原本就知道的事情一般——她只是面帶悲傷地沉默著。" 

# 【ニイロク】
# display as 二六
# JP: 「物は、人の役に立ってこその物。だから自分は、\n清春に仕事を求めた。事務処理、軽作業、計算――」
1578 = "「物品是為了幫助人類而存在的。所以，我向清春要求工作。事務處理、輕體力勞動、計算——」" 

# monologue
# JP: ハチロクのことを、不意に思う。
2245 = "我不禁想起八六。" 

# monologue
# JP: “走りたい”と、\nただひとつだけを僕に求めた、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を。
2207 = "希望在鐵路上奔跑——那個除此之外別無所求的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【ニイロク】
# display as 二六
# JP: 「自動車を入手してもらい、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの真似事もした。\nしかし、全ては虚しかった」
1733 = "「還讓清春購買了汽車，好讓我效仿\\x%lエアクラ;#00ffc040;空凝機%l;#;導航系統。但是，一切都是那麼空虛」" 

# monologue
# JP: ハチロクも、\nあるいはこんな声を出してしまったのかもしれない。
2176 = "如果當初走錯一步，或許八六也會發出如此令人心痛的聲音。" 

# monologue
# JP: 汰斗さんが眠らせず――\n走らせぬまま、幾多の時を重ねさせてしまったのなら。
2022 = "假如汰斗老爺沒有讓她沉睡——而是選擇讓她在那種無法於鐵路上奔跑的狀態下經歷歲月流逝的話……" 

# 【ニイロク】
# display as 二六
# JP: 「そして知った。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は。少なくとも自分は。\n物である以前に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだと」
1503 = "「於是我明白了。對\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;來說，至少對我來說，自己雖然是一件物品，但更是一個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;は君主ではない、単なる線路と同じものだと、\nいつか、ハチロクが聞かせてくれた。
2048 = "八六曾經告訴過我——\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;不是支配者，而是與鐵軌無異。" 

# monologue
# JP: その先へ、さらに先へと――\n人のため、ひたすら伸びゆくことを目指すと。
2124 = "她們只是希望——為了幫助人類，而不斷延伸下去。" 

# 【ニイロク】
# display as 二六
# JP: 「だから、自分は走りたい。自分の全てをゼロにしていい。\nそれでも、もう一度走りたい」
1491 = "「所以，我想要奔跑。即使要抹除我的一切也不要緊。只是希望——再一次奔跑在鐵路上」" 

# 【れいな】
# display as 玲奈
# JP: 「それは」
1286 = "「二六小姐的意思是——」" 

# monologue
# JP: れいなの声は、いつもどおりだ。\n穏やかで甘えた声なのに、包み込むような響きをしている。
2370 = "玲奈的聲音一如往常，平靜而甜美，可其中又多了幾分包容。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなのロールバックデータを、\nニイロクさんにコピーするという意味ですか？」
1534 = "「是說要將玲奈的回滾訊息，複製給你嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「そういう意味。そうして再び走れるのなら、\n自分の\x%lタブレット;#00ffc040;タブレット%l;#;を[イニシャライズ,2]初期化しても構わない」
1528 = "「是的。如果能夠再一次奔跑，就算將我的\\x%lタブレット;#00ffc040;操作板%l;#;初始化也沒關係」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「……」
# 1019 = "「……」" 

# monologue
# JP: それは、\n赤井宮司との記憶の全てを捨て去るということだろう。
2523 = "這樣做，恐怕等同於捨棄與赤井宮司有關的所有記憶。" 

# monologue
# JP: だというのに、赤井宮司は穏やかな、\nむしろ、柔和な笑みにさえ見える表情を湛えてる。
2092 = "可是赤井宮司卻還是平靜如常，甚至還帶著溫暖的微笑。" 

# monologue
# JP: （赤井宮司も……望んでいるということなのか）
2597 = "（就是說……赤井宮司也希望如此嗎）" 

# monologue
# JP: 形がどうあれ、記憶さえもが失われても――\nそれでも、ニイロクが再び走ることだけを。
2363 = "無論以何種方式，即使要失去所有記憶——他還是希望二六能夠再一次，奔跑在鐵路上。" 

# monologue
# JP: そう望むがゆえ、おそらくは……\n僕の浅薄な提案に乗り、ニイロクを連れてきてくれたのだ。
2231 = "恐怕他就是為此，才同意了我那膚淺的提議，將二六帶了過來。" 

# monologue
# JP: （ならば――僕は――）
2614 = "（那麼——我——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「い、え……断言は、できませんけど――\nきっと、そこまでする必要は――」
1278 = "「不……雖然我不敢斷定——但我想，並不需要走到這一步——」" 

# monologue
# JP: 怯えたような、なだめるようなポーレットの声。
2355 = "波萊特的聲音中帶著膽怯，卻又彷彿在撫慰我們。" 

# monologue
# JP: そこに救いを求めるように、\n全員の目が、すがりつく。
2251 = "我們就好像看到了希望一般，向她投去求助的目光。" 

# 【ポーレット】
# display as 波萊特
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の最後――最新鋭の試験機の、トップナンバー機。\nスペック的に余裕がある可能性……低くない気がします」
1340 = "「前\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;最後——最新試驗車型的首車。我覺得在性能方面……很可能還有不少發揮空間」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「すると――こいつを、\nこいつのままで再び走らせてやれる可能性が？」
1423 = "「就是說——說不定可以讓她保留現在的記憶，奔跑在鐵路上？」" 

# monologue
# JP: 赤井宮司の顔に、露骨なまでの感情が出る。\n希望と不安が――入り混じっている表情が。
2507 = "赤井宮司頓時激動起來。他的臉上寫滿了期待與不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のものであれ。\n記録に記憶は付随する――そう聞いています」
1477 = "「我所得知的訊息是——對於\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;而言，記憶會隨著記錄一道而來」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「記録に、記憶が？」
1671 = "「記憶隨記錄而來？」" 

# monologue
# JP: ……僕が望んで、僕が求めて、\n聞いてもらった――聞かせてしまった話だから。
980 = "……在我的期望之下、在我的請求之下——赤井宮司才會得知這一件事。" 

# monologue
# JP: 僕の知っている事実の全てを、\n僕は、伝え切らねばならない。
2285 = "所以，我必須將我所知道的所有事實都告訴他。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ディーゼル改修前、鉱山鉄道で過ごした時代の、\nれいなの記憶。それが、ロールバック情報には付随する」
1386 = "「在接受\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;改造之前，玲奈在礦山鐵路時期的記憶也會隨著回滾訊息一同被植入」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「――ああ」
# 1003 = "「——啊」" 

# monologue
# JP: それがいかに危険なことか。
2522 = "這是一件多麼危險的事情。" 

# monologue
# JP: 経験豊かな元\x%l運転士;#00ffc040;運転士%l;#;の赤井宮司には、\n僕よりおそらく、よほど深く理解できているのだろう。
2412 = "經驗豐富的前\\x%l運転士;#00ffc040;駕駛員%l;#;赤井宮司，一定有著比我更深刻的理解。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうか……冷静に考えれば、れいなくんの\x%lタブレット;#00ffc040;タブレット%l;#;を\nニイロクに実装するのと大差ない」
1724 = "「這樣啊……冷靜下來一想，這基本上等於將玲奈的\\x%lタブレット;#00ffc040;操作板%l;#;安裝到二六體內」" 

# 【ニイロク】
# display as 二六
# JP: 「それが何だ」
1748 = "「那又怎麼樣」" 

# monologue
# JP: 感情なく。躊躇なく。\nニイロクの声は、赤井宮司さえをも打ち付けるようだ。
2327 = "沒有感情，沒有猶豫。二六的聲音，彷彿對赤井宮司都帶有一絲攻擊性。" 

# 【ニイロク】
# display as 二六
# JP: 「自分は、すでに壊れている。\n例え再起不能になっても、今より悪くなることは無い」
1467 = "「我已經壞掉了。即使變得無法再啟動，情況也不會比現在更糟糕」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうだな、ニイロク」
1523 = "「是啊，二六」" 

# monologue
# JP: 宮司が、頷く。\nとても静かに、とても綺麗に。
2195 = "宮司靜靜點了點頭，動作極其儒雅。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「お前が再び走れるのなら。\n他の全てを、引き換えにする価値がある」
1351 = "「只要能讓你再次奔跑，就有犧牲其他一切的價值」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1771 = "「！」" 

# monologue
# JP: これはいけない。\nこれでは、願いに――願いの重さに押しつぶされる。
1983 = "不可以這樣。這樣會被願望的重壓給壓垮的。" 

# monologue
# JP: ポーレットに、そんな判断を強いてはいけない――\n思ったときには、声が出ている。
1989 = "不能將這樣一個決定權強加給波萊特——我想到這裡，馬上開了口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、[ハチロク,3]8620でも構わんでしょう」
1512 = "「既然如此，換成[八六,3]８６２０也一樣吧」" 

# 【ニイロク】
# display as 二六
# JP: 「ハチロク……\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;か。\n自分は、もちろん、それでもいい」
1327 = "「八六……\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;嗎。當然，我沒有意見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;は、れいなよりもさらに、はるかに旧式です。\n取り扱うデータ量も、その分少ないのではないかと」
995 = "「\\x%l8620;#00ffc040;８６２０%l;#;跟玲奈相比，要老舊得多。它的數據量，應該也會相應地減少」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「リスクは、さらに低減できると？」
1424 = "「就是說，可以進一步降低風險？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素人考えではありましょうが……\nその可能性は大いにあるかと思います」
1760 = "「雖然只是外行人的看法……但我覺得有很大的可能性」" 

# monologue
# JP: 僕が望んで、連れてきてもらったニイロクだ。\nならば赤井宮司とニイロクの、強烈なまでの願いは……
2117 = "在我的請求之下，赤井宮司才會將二六帶來。那麼，宮司與二六這一強烈的願望……" 

# monologue
# JP: たとえ、ハチロクを巻き込む形となろうとも、\n僕が、引き受けなければならない。
2066 = "即使要將八六牽扯進來，也必須由我來承擔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですのでその件は、のちほど、\nハチロクと、登呂流湯のご主人とも相談をして――」
1487 = "「所以關於這件事，我之後會跟八六，以及登呂流浴場老闆商量——」" 

# 【れいな】
# display as 玲奈
# JP: 「あの、れいな、ニイロクさんとかわりばんこで走るの、\nおもしろそうって思います」
1746 = "「那個，玲奈覺得如果能和二六小姐交替行駛，一定會很有趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1776 = "「！！？」" 

# monologue
# JP: 思いもかけぬ、れいなの言葉。
2371 = "玲奈的話語超出了我的預料。" 

# monologue
# JP: れいなはいつもと同じ笑顔で、\nにこにこ、気持ちを話してくれる。
2133 = "她帶著與往常一樣的笑容，說出自己的想法。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、もともと姉妹の中のひとりでしたから。\nかわりばんこで走るのも、楽しいんです」
1585 = "「玲奈本身就是姐妹中的一員。所以交替行駛，一定也會很有趣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
1373 = "「啊」" 

# monologue
# JP: ポーレットの喉から声が溢れる。\nけれど、表情が動かない。
2346 = "波萊特不禁發出了聲音。可是表情卻沒有變化。" 

# monologue
# JP: 心のすべてを仮面で隠そうとするかのように、\nポーレットは表情を固めている。
2199 = "就好像要用一副面具遮掩她所有的情緒一般，她沒有做出任何表情。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「かわりばんこで走る“のも”ですか？」
1291 = "「交替行駛“也”很有趣嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。ひとりでのびのび走るのも、\nれいな、やっぱり大好きですからぁ」
1522 = "「是啊。因為，玲奈也非常喜歡一個人慢慢行駛」" 

# monologue
# JP: ぎりぎりの――\nけれど素直な、それはれいなの意思表明だ。
2374 = "玲奈稍有些模稜兩可——卻無比誠實地表明了自己的立場。" 

# monologue
# JP: しかしポーレットは動かない。\n苦しげに、あえぎのような言葉だけしか漏らせない。
2090 = "可是波萊特卻僵在原地。只能如忍受著劇痛般，說出幾個字。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし……わたしは――」
1454 = "「我……我——」" 

# monologue
# JP: 赤井宮司を、ニイロクを見る。
2154 = "她看向赤井宮司，看向二六。" 

# monologue
# JP: ニイロクはまるで動かぬが、\n赤井宮司は、ゆっくり頷き――託してくれる。
2000 = "二六一動不動，而赤井宮司則對她緩緩點了頭——表示將尊重她的選擇。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\nここから先は、君が決断しなければいけないことだ」
1567 = "「波萊特。接下來，必須由你來做決定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！」
1774 = "「！！」" 

# monologue
# JP: 真っ白な顔がギクリと引きつる。
2351 = "波萊特煞白的臉抽搐了一下。" 

# monologue
# JP: その目が激しく彷徨い動き、れいなを、僕を、赤井宮司を\n――果てはニイロクまでをも見つめ、視線で縋ろうとする。
2149 = "她的視線飄蕩不定，看向玲奈、看向我、看向赤井宮司——最後甚至對二六也投去求助的目光。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰かが望むからではダメだ。マイントレジャーのことも、\n鉄道経営や観光振興のことも、気にしなくていい」
1280 = "「不能因為“別人希望”就逃避。無論是煤探樂園，還是鐵路經營或旅遊業復興，你都不必去考慮」" 

# monologue
# JP: 言ってしまえば、余計な全てが剥がれて落ちる。
2469 = "說完這一句，我心中多餘的情緒也開始慢慢剝落。" 

# monologue
# JP: ただひとつ、\n僕の一番奥の望みが、ただそれだけが言葉に変わる。
2272 = "我繼續說出埋藏在我內心最深處的那個願望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは、君とれいなの話だ。\nポーレット、君たちの未来を決める、決断なんだ」
1722 = "「這是你和玲奈兩個人的事情。波萊特，這是影響你們未來的決定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「未来……なんて」
1543 = "「未來……這種事」" 

# monologue
# JP: わなわな、ポーレットの唇が、\nそうしてすぐに、その全身が震えだす。
2354 = "波萊特的嘴唇顫抖著。很快，顫抖便蔓延至全身。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは――今の御一夜を……今のれいなを、\n今のままをただ守りたくって――」
1463 = "「我只是——想守護現在的御一夜……守護現在的玲奈、守護現狀——」" 

# monologue
# JP: レールショップを、小さな城を、\nそこでの暮らしを守るため。
2184 = "守護鐵路商店、守護她那座小小的城堡、守護她在那裡的生活。" 

# monologue
# JP: 確かに、ポーレットが自ら求めたものは、\n“その一点を変えないこと”に終始一貫、帰結していた。
2389 = "的確，波萊特所追求的，始終都是“維持現狀”。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなに、変わってほしくなくって――\nずっとそのままで居てほしくって」
1457 = "「我不希望玲奈發生改變——我希望她一直保持這個樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、変わるぞ」
1306 = "「但是，會改變的」" 

# monologue
# JP: 僕が来たこと。\n僕とポーレットが出会ったこと。
2267 = "我的到來、我與波萊特的相遇——" 

# monologue
# JP: それも、一因であるかもしれない。\nだが、そんなのは、本当に小さなことにすぎない。
2281 = "或許，這也是原因之一。但這些其實都不重要。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを見ろ。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とて不変ではない。\nロールバックがあろうとなかろうと、変わるのだ」
1619 = "「看看八六吧。即使是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也不是永恆不變的。無論是否進行回滾，都會改變」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんな、こと」
1727 = "「這種、事情——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「変わらないものなど、何もない。\n駅も、線路も、僕達自身も、必ず変わる」
1557 = "「沒有什麼是永恆不變的。無論是車站、線路，還是我們自己，都一定會改變」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それでも、れいなはっ」
1428 = "「就算是這樣，玲奈她——」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、大丈夫。変わりませんよぉ。\nずっと、ポーレットのおそばにいますよ」
1586 = "「玲奈沒事的。不會改變的哦。玲奈會一直陪在波萊特身邊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
# 1775 = "「！！！」" 

# monologue
# JP: “言わせてしまった”と――そのことを、\n僕より、おそらく誰よりも、ポーレットこそが痛感してる。
2350 = "波萊特心裡比誰都更明白——她讓玲奈說出了遷就的話語。" 

# monologue
# JP: ……僕の浅薄な思いつきは、ポーレットを、ニイロクを、\nれいなまでをも、苦しめた。
983 = "……我這個膚淺的想法，折磨著波萊特、二六，甚至是玲奈。" 

# monologue
# JP: （受容こそ……許し受け入れることこそが、\nれいなの本質であり、望みなんだ）
2593 = "（容納……接受與包容——才是玲奈的本質，也是她的願望）" 

# monologue
# JP: そうであるから、優しさゆえに苦しんでいる。
2314 = "正因如此，她才會為她的善良所苦。" 

# monologue
# JP: ポーレットの願いと、ニイロクの願い。\nその両方が、ともに切なるものであるから。
2116 = "因為波萊特與二六的願望，都是那麼迫切。" 

# monologue
# JP: （だからこそ――前へと、繋げねば意味が無い）
2606 = "（正因如此——我們才必須邁開腳步）" 

# monologue
# JP: 揺らぐ心を、想いで固める。
2262 = "我暗自下定決心。" 

# monologue
# JP: 自責のすべてを棚に上げ、\n出来る限りに堂々と、ただポーレットだけを見つめ続ける。
2260 = "我拋開心中的自責，用最坦蕩的目光注視著波萊特。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に――“変わらないで”と、望んでいるのか？」
1312 = "「你真的——希望“不要改變”嗎？」" 

# monologue
# JP: 閉ざされた幸福に安住したいなら、それでいい。
2178 = "如若只是希望安居於封閉的幸福之中，我也不會強求。" 

# monologue
# JP: お互いが心の底からそれを望んでいるのなら、\n僕は黙って立ち去るだけだ。が――
2024 = "假如這是她們二人真心期望的生活，那麼我會默默地離開。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「怯え閉じこもる幸福を。れいなをお人形にすることを。\nポーレット、君は本当に望んでいるのか？」
1568 = "「波萊特，你真的希望生活在不安、封閉的幸福之中，希望玲奈變成一個人偶嗎？」" 

# monologue
# JP: 僕には、そうとは思えない。\nもしもそうなら、れいなの言葉を無視すればいい。
2246 = "我並不這麼認為。不然的話，她只要無視玲奈的話語就好。" 

# monologue
# JP: ポーレットもまたれいなを想い――\n想いと恐怖が相反するゆえ、苦しんでいるだけなのだ。
2347 = "波萊特也在為玲奈著想——而正因這份關愛與內心的恐懼相衝突，才使她此刻備受折磨。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし――は……」
1452 = "「我……」" 

# monologue
# JP: 揺れている。
2129 = "她在動搖。" 

# monologue
# JP: いや……\n今振り返ってみるのなら、ポーレットはずっと揺れていた。
1981 = "不……現在回頭想想，她一直都在動搖。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし……けどっ――」
1453 = "「我……可是——」" 

# monologue
# JP: 手が、伸びてくる。\n僕へと向けて。だから、受け取る。
2126 = "她向我伸出了手。所以，我輕輕地接住。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうして……こんな――双鉄くん、\n優しいのに――意地悪な、こと――」
1572 = "「為什麼……要這樣——雙鐵君，明明那麼溫柔——卻要這樣、刁難我——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕の望みだからだ。\n僕は、君を助けたい」
1381 = "「因為，這就是我的心願。我希望能夠幫助你」" 

# monologue
# JP: 今ならばもう確信できる。本当はとっくに確信できてた。\n――幼いころに、僕はポーレットに救われた。
1995 = "事到如今，我已經可以肯定。其實，我早已瞭然於心。——在我小時候，波萊特救過我一次。" 

# monologue
# JP: だが、この気持ちは恩返しじゃない。\n路子を救えなかったことへの、代償行為である筈もない。
2017 = "但是，我現在的這份感情不是報恩。也不是因為沒能拯救路子，而做出的贖罪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕には君の悲鳴が聞こえた。君は悲鳴を届けてくれた。\nこの手を僕に、伸ばしてくれた」
1485 = "「我聽到了你的悲鳴。你將一聲聲悲鳴傳達到了我的心裡。你向我伸出了這隻手」" 

# monologue
# JP: 手を包み込む。\n両手でぎゅうっと。
2266 = "我用雙手將她的手緊緊包裹。" 

# monologue
# JP: ポーレットの体はまだ震えている。\n心の芯が、きっと辛くて震えている。
2357 = "波萊特的身體仍然在顫抖。她的心靈一定正在痛苦地發顫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「向き合わなければ、乗り越えられない。\nそれはポーレット。君が、僕に教えてくれたことだ」
1399 = "「如果不敢面對，就無法跨越過去。波萊特，這是你教會我的道理」" 

# monologue
# JP: 何が原因で事故が起きたか。
1997 = "事故是因何而起——" 

# monologue
# JP: 僕はそれを見つめなおして、少なくとも、\n恨み憎しむだけの日々から、わずかでも顔をあげられた。
2302 = "是你讓我有了新的認識，使我得以在那充滿仇恨的生活之中，稍稍抬起了頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、意地悪だと思われようと、憎まれようと。\n君にも、過去と向き合って欲しいと思っている」
1488 = "「所以，即使被你認為我是刻意刁難，即使被你記恨，我也希望你能勇敢面對過去」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけど……もう、向き合うなんて」
1356 = "「可是……事到如今，要我怎麼去面對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「出来るさ。意志さえあれば、いつでも」
1310 = "「你可以的。只要有這份心，就隨時都可以」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1370 = "「哎！？」" 

# monologue
# JP: 電話を、僕は三人にした。\n登呂流湯主人と、赤井宮司と――
2271 = "我給三個人打了電話。登呂流浴場老闆、赤井宮司，還有——" 

# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんに相談したんだ。\nそうしたら、電話番号を預かった」
1480 = "「我找宮本女士商量過了。然後，她給了我一個電話號碼」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
# 1775 = "「！！！」" 

# monologue
# JP: 誰のものだか、言うまでもなくわかったのだろう。
2306 = "是誰的電話號碼，就算我不說她也知道吧。" 

# monologue
# JP: 青い瞳が揺れに揺れ、\n揺れながら――いっときも僕から外れずいる。
2166 = "她藍色的雙眸搖曳不定，卻始終沒有從我身上移開。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんは、こう言われて番号を預かったそうだ。\n『あの子が恋を知ったなら、伝えて欲しい』と」
1414 = "「宮本女士將電話號碼交給我時，是這樣交代的——“如果那孩子領悟了愛情，就請你把電話號碼轉交給她”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、恋を、知ったなら」
1400 = "「如果我——領悟了愛情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、ポーレット」
1493 = "「所以，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
1377 = "「嗯，雙鐵君」" 

# monologue
# JP: まぶたがきつく閉じられる。\n大つぶの涙がぼろりと溢れる。
2161 = "她緊緊闔上眼簾。大顆的淚珠自她眼角湧出。" 

# monologue
# JP: それを拭いもせぬままに、\n揺らぎを落とした青い瞳は、まっすぐまっすぐ僕を見る。
2139 = "她沒有拭去淚水，用那雙不再搖曳的藍色眼眸，堅定地看著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、恋を――知っています」
1451 = "「我——知道什麼是愛情」" 
