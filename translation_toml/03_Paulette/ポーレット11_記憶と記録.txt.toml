[script]
# lines: 412 
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。こちらからお話をお願いしたにも関わらず、\nお運びをいただいてしまって」
1625 = "「Cháu xin lỗi. Rõ ràng là cháu đã nhờ bà nói chuyện,\nvậy mà lại để bà phải cất công đến tận đây.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ウチんボロ湯じゃ、\nどこから話が漏れるか知れんけんねぇ」
1668 = "「Ở cái nhà tắm xập xệ của bà,\nchẳng biết tin tức sẽ lọt ra ngoài từ chỗ nào đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、お上がりください」
1683 = "「Xin mời bà vào ạ.」"
# monologue
# JP: 僕の私室に上がってもらえば、\n登呂流湯のご主人は、じろ、と室内を軽く見渡す。
2383 = "Sau khi bước vào phòng riêng của tôi,\nChủ nhà tắm Tororyu-yu đưa mắt nhìn quanh căn phòng một lượt."
# monologue
# JP: そして座布団に腰を落ち着け、\n抑えめの声で問いかけてくる。
2552 = "Sau đó bà ngồi xuống tấm nệm,\nvà cất giọng hỏi với âm lượng nhỏ."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ハチロクは？」
1330 = "「Hachiroku đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『他の誰にも聞かれたくない』とのことでしたので、\n真闇姉と日々姫に連れて出てもらっています」
1380 = "「Vì bà bảo là 『không muốn để ai khác nghe thấy』,\nnên cháu đã nhờ chị Mayami và Hibiki đưa em ấy ra ngoài rồi ạ.」"
# monologue
# JP: 定例の、商店会の会合へ。\nこのタイミングでは、重要な意味も持たせられる。
2125 = "Đến buổi họp thường kỳ của hiệp hội thương gia.\nVào thời điểm này, nó cũng mang một ý nghĩa quan trọng."
# monologue
# JP: マイントレジャー計画への草の根の支持を固めていく。\nハチロクによるＰＲは無論、そのためのプラスに働く。
2367 = "Củng cố sự ủng hộ từ cơ sở cho Kế hoạch Mine Treasure.\nViệc Hachiroku làm PR chắc chắn sẽ mang lại tác động tích cực cho việc đó."
# monologue
# JP: 同時に、この部屋での会談の機密性も高められるなら、\nこれぞまさしく、一石二鳥ということになろう。
2421 = "Đồng thời, nếu có thể nâng cao tính bảo mật của cuộc hội đàm trong căn phòng này,\nthì đúng là một mũi tên trúng hai đích."
# 【双鉄】
# display as 雙鐵
# JP: 「この部屋までは蔵の人間は来ませんし、\n万が一誰か来ても、足音でそれとわかります」
1758 = "「Người của nhà xưởng ủ rượu sẽ không đến tận phòng này đâu ạ,\nmà ngộ nhỡ có ai đến thì cũng sẽ nhận ra ngay qua tiếng bước chân thôi.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、よかとよ」
1750 = "「Vậy thì tốt.」"
# monologue
# JP: まっすぐ視線を向けられる。\nわずかに、気圧されるものを感じる。
2152 = "Bà ấy hướng ánh mắt nhìn thẳng vào tôi.\nTôi cảm thấy hơi bị áp đảo một chút."
# monologue
# JP: 年輪――と、これを言うのだろうか、\n瞳の深さに、腹の底までを見通されているような気になる。
2521 = "Dấu ấn thời gian——chắc là dùng để chỉ điều này chăng,\nsự sâu thẳm trong đôi mắt bà ấy khiến tôi có cảm giác như bị nhìn thấu tâm can."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「で――」
1680 = "「Thế——」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの居眠り……処理落ちを防止するための\n対策について、教えていただきたく思っています」
1473 = "「Cháu muốn nhờ bà chỉ bảo cho cháu……về biện pháp\nphòng ngừa việc Reina ngủ gật……hay nói đúng hơn là xử lý quá tải ạ.」"
# monologue
# JP: そうあらためて言葉にすれば、\n小さな頷きが返される。
2430 = "Khi tôi trịnh trọng nói ra những lời đó,\nbà ấy khẽ gật đầu đáp lại."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「理屈は簡単。\n――けど、実践はかなり難しか話ばい」
1605 = "「Lý thuyết thì đơn giản thôi.\n——Nhưng, thực hành lại là một câu chuyện khá khó nhằn đấy.」"
# monologue
# JP: 電話口で尋ねたときと、\n全く変わらない答え。
2160 = "Câu trả lời hoàn toàn giống hệt\nnhư lúc tôi hỏi qua điện thoại."
# monologue
# JP: なら、この先が――\n『他の誰にも聞かれたくない』話なのだろう。
2547 = "Nếu vậy, phần tiếp theo đây――\nchắc hẳn là chuyện 『không muốn để ai khác nghe thấy』 rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、まずはその“理屈”の方を\n教えていただけますか？」
1756 = "「Vậy, bà có thể cho cháu biết\n“lý thuyết” đó trước được không ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「過負荷が処理落ちの原因やけん、\n負荷ば減らしてやりゃーよかとよ」
1432 = "「Nguyên nhân của việc xử lý quá tải là do vượt quá giới hạn chịu đựng,\nnên chỉ cần giảm bớt gánh nặng đi là được.」"
# monologue
# JP: なるほど、確かに極めて簡単な理屈だ。
2069 = "Ra là vậy, đúng là một lý thuyết cực kỳ đơn giản."
# 【双鉄】
# display as 雙鐵
# JP: 「この場合の負荷は、\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;改造に伴っての\n処理情報量の増加、ですか？」
1728 = "「Gánh nặng trong trường hợp này, là sự gia tăng lượng thông tin xử lý\nđi kèm với việc cải tạo thành \\x%lディーゼル気動車;#00ffc040;toa xe diesel tự hành%l;# phải không ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんとは、ごくごく一部に過ぎんとよ」
1749 = "「Cái đó, chỉ là một phần rất rất nhỏ thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと他には――」
1284 = "「Nói vậy thì, ngoài ra còn có——」"
# monologue
# JP: ん――と、考えこむような声。\n皺が生む影が、いくらか濃くなる。
2170 = "Ưm——, bà ấy cất giọng như đang suy nghĩ.\nNhững cái bóng do nếp nhăn tạo ra dường như đậm hơn đôi chút."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の制御・演算のプロセッサは、\n人間の脳と近似した処理を行うよう設定されたもんたい」
1017 = "「……Bộ vi xử lý điều khiển và tính toán của \\x%lレイルロオド;#00ffc040;Railord%l;#,\nđược thiết lập để thực hiện các quá trình xử lý gần giống với bộ não con người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1375 = "「Vâng.」"
# monologue
# JP: 話が飛んだように思えて、一瞬惑う。\nが――内容については、直感的に理解が出来る気がする。
2467 = "Chủ đề dường như bị nhảy cóc khiến tôi thoáng bối rối.\nNhưng——về nội dung thì, tôi cảm giác mình có thể hiểu được bằng trực giác."
# monologue
# JP: ハチロクにせよ、れいなにせよ、与えられた刺激に対し、\n人間とほぼ変わらない反応を、大概は見せてくれるから。
2365 = "Dù là Hachiroku hay Reina, đối với những kích thích được đưa ra,\nđại khái họ đều cho thấy những phản ứng gần như không khác gì con người."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そんプロセッサと、記憶媒体とは別個たい。\n記憶媒体は、独立して、換装可能となっとるばい」
1641 = "「Bộ vi xử lý đó và phương tiện lưu trữ là hai phần riêng biệt.\nPhương tiện lưu trữ hoạt động độc lập và có thể thay thế được.」"
# monologue
# JP: 換装可能――\nその一言が、僕の認識を一歩すすめる。
2088 = "Có thể thay thế——\nMột từ đó đã giúp nhận thức của tôi tiến thêm một bước."
# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして……それが、\x%lタブレット;#00ffc040;タブレット%l;#;ですか？」
1660 = "「Không lẽ……đó chính là, \\x%lタブレット;#00ffc040;thẻ bảng%l;# sao ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん通りと」
1560 = "「Đúng vậy.」"
# monologue
# JP: 正解しても、表情はわずかも緩まない。\nいや――
2447 = "Dù tôi trả lời đúng, nhưng nét mặt bà ấy không hề giãn ra chút nào.\nKhông——"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;ば交換すれば、\nどん\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も同一の機能ばできるようになる――」
1349 = "「Chỉ cần thay đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#,\nthì bất kỳ \\x%lレイルロオド;#00ffc040;Railord%l;# nào cũng có thể thực hiện được chức năng tương tự——」"
# monologue
# JP: 緩まぬどころか、むしろ厳しさを増したようにさえ見える。
2146 = "Chẳng những không giãn ra, mà trông còn có vẻ nghiêm nghị hơn."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「それこそが、当初の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;構想ったい」
1720 = "「Đó mới chính là ý tưởng ban đầu của \\x%lレイルロオド;#00ffc040;Railord%l;#.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では……その当初構想では、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は――経験を完全に共有できた――いや」
1751 = "「Vậy thì……theo ý tưởng ban đầu đó,\n\\x%lレイルロオド;#00ffc040;Railord%l;# có thể——chia sẻ hoàn toàn kinh nghiệm——không.」"
# monologue
# JP: 違う。\nそれでは恐らく足りない。
1985 = "Không đúng.\nNhư vậy có lẽ vẫn chưa đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、ハチロクの\x%lタブレット;#00ffc040;タブレット%l;#;を\nれいなのボディに換装すると、そのボディは――」
1551 = "「Ví dụ, nếu lắp \\x%lタブレット;#00ffc040;thẻ bảng%l;# của Hachiroku\nvào cơ thể của Reina, thì cơ thể đó sẽ——」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「完全にハチロクとして機能できる――そうできてこそ、\n最大の効率化が果たせるという計画だったとよ」
1422 = "「Có thể hoạt động hoàn toàn như Hachiroku——kế hoạch là chỉ khi làm được như vậy,\nmới có thể đạt được hiệu suất tối đa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最大の効率化……」
1502 = "「Hiệu suất tối đa……」"
# monologue
# JP: ハチロクが機体寿命を迎えたとして、そののち。
2202 = "Giả sử tuổi thọ cơ thể của Hachiroku đã hết, sau đó."
# monologue
# JP: 別のボディにその\x%lタブレット;#00ffc040;タブレット%l;#;を換装すれば、\nハチロクは、即座に新しい生を得ることが出来る。
2085 = "Nếu lắp \\x%lタブレット;#00ffc040;thẻ bảng%l;# đó vào một cơ thể khác,\nHachiroku sẽ ngay lập tức có được một cuộc sống mới."
# monologue
# JP: （そうすれば、経験や情報の蓄積が無駄にならない。\n運用効率は、確かに著しく向上しようが――）
2591 = "（Nếu làm vậy, sự tích lũy kinh nghiệm và thông tin sẽ không bị lãng phí.\nHiệu suất vận hành chắc chắn sẽ được cải thiện đáng kể, nhưng——）"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「じゃっどん、そん計画ば、うまいこと働かんかった」
1360 = "「Nhưng mà, kế hoạch đó đã không diễn ra suôn sẻ.」"
# monologue
# JP: 苦虫を噛み潰したような表情に、酷い渇きを感じてしまう。\nが、お茶汲みに行ける雰囲気でもない。
2393 = "Vẻ mặt cau có của bà ấy khiến tôi cảm thấy vô cùng khát nước.\nNhưng đây cũng không phải là lúc có thể đi rót trà."
# monologue
# JP: 喉が勝手にツバを飲み――\nけれど乾きは、わずかたりとも癒されない。
2241 = "Cổ họng tôi tự động nuốt nước bọt――\nnhưng cơn khát chẳng hề thuyên giảm chút nào."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……データとインフォメーションの――\n事実・資料と、情報との違いについては理解しとーと？」
1035 = "「……Sự khác biệt giữa Data và Information——\nSự khác biệt giữa sự thật, tài liệu và thông tin, cậu có hiểu không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「は？　あ――ええと」
1664 = "「Hả? A——Cái đó thì.」"
# monologue
# JP: またも話が飛んだ気がして面食らう。\nが、とにもかくにも考える。
2253 = "Lại một lần nữa tôi cảm thấy chủ đề bị nhảy cóc nên có chút bối rối.\nNhưng dù sao đi nữa, tôi vẫn suy nghĩ."
# monologue
# JP: 横文字だけならおそらく混乱していただろうが、\n日ノ本語による補足が思考を助けてくれる。
2171 = "Nếu chỉ dùng từ ngoại lai thì có lẽ tôi đã bị bối rối,\nnhưng phần bổ sung bằng tiếng Hinomoto đã giúp tôi dễ dàng suy nghĩ hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば御一夜市の人口が、何年に幾人だった、という\n数値や数値群が、データ――事実であり、資料です」
1550 = "「Ví dụ, dân số của thành phố Ohimitera vào năm nào là bao nhiêu người,\nnhững con số hoặc nhóm con số đó chính là Data——sự thật, và là tài liệu.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ん」
# 1375 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「それをグラフなり表なりにして、参照し易くしたものが、\n情報――インフォメーションであると理解しています」
1639 = "「Việc chuyển đổi chúng thành biểu đồ hoặc bảng biểu để dễ tham khảo hơn,\ncháu hiểu đó là thông tin——Information.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん理解は、理解でよかばい。\nで――」
1726 = "「Cách hiểu đó là đúng rồi.\nVậy thì——」"
# monologue
# JP: 僕を見る目が、スっと細まる。\nとてもご老人のものとは思えぬ鋭さだ。
2155 = "Đôi mắt nhìn tôi nheo lại.\nSự sắc sảo đó thật khó tin là của một người già."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「言葉として、概念としてではなく――直感で。\nそん二つば、普段からわけて処理ばしとーと？」
1495 = "「Không phải dưới dạng từ ngữ hay khái niệm——mà bằng trực giác.\nBình thường cậu có phân biệt và xử lý hai thứ đó riêng rẽ không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が……ですか？」
1443 = "「Cháu……sao ạ?」"
# monologue
# JP: 考える。\nが、深く考えるより先に、答えは口から出てしまう。
2277 = "Tôi suy nghĩ.\nNhưng trước khi kịp suy nghĩ sâu xa, câu trả lời đã bật ra khỏi miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「――いえ。特に区別して取り扱ってはいないようです」
1001 = "「——Không ạ. Hình như cháu không có sự phân biệt đặc biệt nào khi xử lý chúng.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんとは、普通のこったい。資料と情報とは、\n“意識ばせんと”別個のものとは処理できんばい」
1723 = "「Đó là chuyện bình thường thôi. Tài liệu và thông tin,\n“nếu không có ý thức” thì không thể xử lý chúng như những thứ riêng biệt được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1375 = "「嗯」" 
# monologue
# JP: 意識ばせんと――意識しないと。\n強い語調で言われた意味を、考える。
2437 = "Nếu không có ý thức――nếu không chủ động nhận thức.\nTôi suy ngẫm về ý nghĩa của câu nói được nhấn mạnh đó."
# monologue
# JP: 資料を情報と処理するためには、意識・思考が必要になる。\nあるいは逆に――
2252 = "Để xử lý tài liệu thành thông tin, cần phải có ý thức và tư duy.\nHoặc ngược lại——"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「人間の脳は、資料と情報を――\n記録と記憶を、そう便利には切り分けて処理できんとよ」
1300 = "「Bộ não con người không thể phân tách và xử lý tài liệu và thông tin——\nghi chép và ký ức, một cách tiện lợi như vậy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「記録と記憶……」
1672 = "「Ghi chép và ký ức……」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そして、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のプロセッサは――想定以上に、\nあまりに脳に、“似過ぎた”ばい」
1634 = "「Và, bộ vi xử lý của \\x%lレイルロオド;#00ffc040;Railord%l;#——đã vượt quá dự kiến,\nnó “quá giống” với não bộ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ！！？」
1008 = "「——!!?」"
# monologue
# JP: 言葉が、意味が、一つの線となって繋がる。\n記録と記憶――それはつまり、資料と情報に極めて近しい。
2047 = "Ngôn từ, ý nghĩa, tất cả kết nối lại thành một đường thẳng.\nGhi chép và ký ức——nói cách khác, nó cực kỳ gần gũi với tài liệu và thông tin."
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;のプロセッサとやらが、人間の脳と――\n近似しているらしいことと、恐らくはほぼ、同等に。
2428 = "Cái gọi là bộ vi xử lý của \\x%lレイルロオド;#00ffc040;Railord%l;#, có vẻ như gần giống với bộ não con người——\nvà có lẽ là gần như tương đương."
# 【双鉄】
# display as 雙鐵
# JP: 「他人が作った資料を、人は“記録”として処理できる。\nそれは――“意識的に”そう扱い得るから」
1294 = "「Con người có thể xử lý tài liệu do người khác tạo ra như một “ghi chép”.\nĐó là bởi vì——họ có thể xử lý nó một cách “có ý thức”.」"
# monologue
# JP: この場合、紙媒体というクッションが、意識を喚起し、\n混乱を吸収する役割をきっと、果たしてくれてる。
2120 = "Trong trường hợp này, bước đệm là phương tiện giấy chắc chắn đã đóng vai trò\nđánh thức ý thức và hấp thụ sự nhầm lẫn."
# monologue
# JP: しかし、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の\x%lタブレット;#00ffc040;タブレット%l;#;の場合は、\nどうなのだろう？
2006 = "Tuy nhiên, trong trường hợp \\x%lタブレット;#00ffc040;thẻ bảng%l;# của \\x%lレイルロオド;#00ffc040;Railord%l;#,\nthì sẽ thế nào?"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;は……記録と同時に、記憶もしてしまう？\nが、脳に近似しているのなら、恐らくプロセッサも――」
998 = "「\\x%lタブレット;#00ffc040;Thẻ bảng%l;#……không chỉ ghi chép mà còn ghi nhớ luôn sao?\nNhưng nếu nó gần giống với não bộ, thì có lẽ bộ vi xử lý cũng——」"
# monologue
# JP: こくりと。\n重く、鈍い頷き。
2138 = "Bà ấy gật đầu.\nMột cái gật đầu nặng nề, chậm chạp."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「脳に似すぎたがため。処理・演算に特化させた筈の\nプロセッサ自体も、“記憶”を持ってしまったとよ」
1608 = "「Vì quá giống não bộ. Nên bộ vi xử lý vốn được chuyên biệt hóa cho việc xử lý và tính toán\ncũng tự mang trong mình “ký ức” luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、\n他者の\x%lタブレット;#00ffc040;タブレット%l;#;をそこに実装してしまえば――」
1754 = "「Nếu vậy,\nnếu cài đặt \\x%lタブレット;#00ffc040;thẻ bảng%l;# của người khác vào đó thì——」"
# monologue
# JP: ……例えば、昨日――僕は買い物に出かけたとする。
984 = "……Ví dụ, hôm qua――tôi đi mua sắm."
# monologue
# JP: その記憶を有したまま、“昨日は家で読書をしていた”\n記録と記憶が、いきなり並列してきたのなら――
2423 = "Trong khi vẫn giữ ký ức đó, nếu những ghi chép và ký ức về việc\n“hôm qua tôi ở nhà đọc sách” đột nhiên xuất hiện song song――"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「当然、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、混乱するばい。\n自我を見失い、酷か不安定状態に陥りよるたい」
1439 = "「Đương nhiên là \\x%lレイルロオド;#00ffc040;Railord%l;# sẽ bị hoảng loạn.\nĐánh mất cái tôi và rơi vào trạng thái cực kỳ bất ổn.」"
# monologue
# JP: 断言。\nそれは、過去におきた事実を語る言葉なのだろう。
2164 = "Một lời khẳng định.\nĐó hẳn là những lời kể về một sự thật đã xảy ra trong quá khứ."
# 【双鉄】
# display as 雙鐵
# JP: 「人間には、ありえないその現象が、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には起こりえてしまう」
1717 = "「Hiện tượng không thể xảy ra ở con người đó,\nlại có thể xảy ra ở \\x%lレイルロオド;#00ffc040;Railord%l;#.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「記録と記憶ば、都合ようには切り分けられん。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、そこは人間と変わらんとよ」
1673 = "「Ghi chép và ký ức, không thể phân tách một cách tiện lợi được.\nNgay cả với \\x%lレイルロオド;#00ffc040;Railord%l;# thì điểm đó cũng không khác gì con người đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1375 = "「嗯」" 
# monologue
# JP: 僕の同意をどうとったのか、\n年経た瞳が、皺の下へと閉じられる。
1987 = "Không rõ bà ấy hiểu sự đồng tình của tôi như thế nào,\nđôi mắt nhuốm màu thời gian khép lại dưới những nếp nhăn."
# monologue
# JP: そのまま、五秒――十五秒。
2205 = "Cứ như vậy, năm giây――mười lăm giây trôi qua."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……ガソリン\x%l気動車;#00ffc040;気動車%l;#;から\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;への改修と、\nそんロールバックとに関する、圧縮情報」
1043 = "「……Thông tin nén liên quan đến việc cải tạo từ \\x%l気動車;#00ffc040;toa xe tự hành%l;# chạy xăng sang \\x%lディーゼル気動車;#00ffc040;toa xe diesel tự hành%l;#,\nvà việc khôi phục lại trạng thái cũ của nó.」"
# monologue
# JP: まぶたは閉じたそのままに、沈んだような声が、響く。
2131 = "Đôi mắt vẫn nhắm nghiền, một giọng nói trầm thấp vang lên."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「れいなを圧迫しとーとは、そればい」
1270 = "「Thứ đang đè nặng lên Reina, chính là nó đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1775 = "「!!!」"
# monologue
# JP: 理解――した。
2240 = "Tôi――đã hiểu."
# monologue
# JP: 遠回りのような説明が、\n一直線に、僕に理解を運んでくれた。
2545 = "Lời giải thích tưởng chừng như đi đường vòng,\nlại đưa tôi đến sự thấu hiểu một cách trực diện."
# 【双鉄】
# display as 雙鐵
# JP: 「ロールバック情報を持っているのなら……\nディーゼル‐ガソリン復旧は、理屈の上では――」
1508 = "「Nếu con bé có thông tin khôi phục trạng thái cũ……\nThì việc khôi phục từ diesel về xăng, về mặt lý thuyết là――」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「容易ばい。\nそぎゃんとすれば、処理面での負荷も軽くはなるとよ」
1435 = "「Dễ dàng thôi.\nNếu làm vậy thì gánh nặng về mặt xử lý cũng sẽ nhẹ đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それは――れいなの“記憶”に、\nプロセッサそのものに干渉してしまう危険を持っている」
1358 = "「Nhưng mà, điều đó――có nguy cơ can thiệp vào “ký ức” của Reina,\nvào chính bản thân bộ vi xử lý.」"
# monologue
# JP: 記録に、記憶は付随する。その逆もまた、おそらく真だ。\n過去のことを思い出す――それだけならまだ良いだろう。
2460 = "Ký ức đi kèm với ghi chép. Ngược lại có lẽ cũng đúng.\nNhớ lại chuyện quá khứ――chỉ vậy thôi thì còn đỡ."
# monologue
# JP: だが、容量を保持するために、今度はディーゼルまわりの\n記録を圧縮なり削除なりする必要が出てくるのなら――
2097 = "Nhưng, để duy trì dung lượng, nếu lần này cần phải nén\nhoặc xóa các ghi chép liên quan đến diesel thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「最悪……れいなは、ディーゼルとして稼働していた……\n御一夜鉄道で過ごした時間の、記憶を失う危険さえ――」
1538 = "「Trường hợp xấu nhất……Reina thậm chí có nguy cơ mất đi ký ức……\nvề khoảng thời gian hoạt động dưới dạng diesel, khoảng thời gian gắn bó với Đường sắt Ohito――」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「無いとは、断言できんばい」
1616 = "「Không thể khẳng định là không có chuyện đó được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1019 = "「……」"
# monologue
# JP: 理屈は簡単。\nけれど実践はひどく難しい。
2378 = "Lý thuyết thì đơn giản.\nNhưng thực hành lại vô cùng khó khăn."
# monologue
# JP: 言葉の重みが、\n今さらのように腹の底へと溜まっていく。
2391 = "Sức nặng của những lời nói đó,\ngiờ đây mới đọng lại tận sâu trong đáy lòng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……そのことを、ポーレットは」
1052 = "「……Chuyện đó, Paulette có」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「れいなの負荷軽減について――\nただの一度も、相談ばされたことはなかとよ」
1397 = "「Về việc giảm bớt gánh nặng cho Reina――\nCô bé chưa từng bàn bạc với tôi dù chỉ một lần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう――ですか」
1520 = "「Vậy――sao ạ.」"
# monologue
# JP: ポーレットは知っている。\n他の誰より、知っている。
2358 = "Paulette biết.\nCô ấy biết rõ hơn bất kỳ ai."
# monologue
# JP: 処理落ちを、どれほどれいなが気にしているかを。\nそれが、どんなに安全上のリスクを高めてしまうかを。
2158 = "Cô ấy biết Reina bận tâm đến việc xử lý quá tải đến mức nào.\nVà điều đó làm tăng rủi ro về mặt an toàn ra sao."
# monologue
# JP: （にもかかわらず――\nポーレットが、この問題と向き合わないのなら……）
2588 = "（Dù vậy――\nNếu Paulette vẫn không đối mặt với vấn đề này thì……）"
# monologue
# JP: この事実をもまた、ポーレットは知っている。
2540 = "Paulette cũng biết sự thật này."
# monologue
# JP: 知っているから――\nれいなの記憶を失くす恐怖に、立ち向かえない。
2312 = "Chính vì biết――\nNên cô ấy không thể đối mặt với nỗi sợ hãi về việc Reina sẽ mất đi ký ức."
# monologue
# JP: （ああ――）
2590 = "（A――）"
# monologue
# JP: 実践は。ひどく。難しい。\nならばこそ、僕はポーレットを助けたい。
2196 = "Thực hành. Vô cùng. Khó khăn.\nChính vì vậy, tôi muốn giúp đỡ Paulette."
# monologue
# JP: 助けるための最善が――\nなにかを、どうにかして見出したい。
2225 = "Cách tốt nhất để giúp đỡ cô ấy――\nTôi muốn bằng cách nào đó tìm ra một giải pháp."
# 【双鉄】
# display as 雙鐵
# JP: 「お話を……貴重なお話を、ありがとうございました」
1684 = "「Cảm ơn bà……vì những chia sẻ quý báu ạ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「じゃったら話ば終わりとね」
1753 = "「Vậy thì câu chuyện kết thúc ở đây nhé.」"
# monologue
# JP: 短く言って、\nさっさと登呂流湯のご主人は立ち上がる。
2403 = "Nói ngắn gọn,\nChủ nhà tắm Tororyu-yu nhanh chóng đứng dậy."
# monologue
# JP: そしてそのまま部屋を去りかけ――\n一瞬、僕へと振り返る。
2136 = "Và cứ thế bước ra khỏi phòng――\nTrong giây lát, bà ấy quay lại nhìn tôi."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「こん話ば聞いてきたとは、\n右田の――ぬしゃが初めてばい」
1315 = "「Đến hỏi tôi chuyện này,\ncậu con trai nhà Migita――cậu là người đầu tiên đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのですか」
1048 = "「……Vậy sao ạ.」"
# monologue
# JP: それはつまりは――\nポーレットの孤立の深さ……いや……
2548 = "Điều đó có nghĩa là――\nSự cô lập sâu sắc của Paulette……không……"
# monologue
# JP: ポーレットが周囲に対して築いてきた、\n心の壁の高さの表れなのかもしれない。だが――
2520 = "Có lẽ nó thể hiện bức tường ngăn cách trong lòng\nmà Paulette đã dựng lên với những người xung quanh. Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「お聞かせいただいたこと。\n決して、無駄にしたくはなく思います」
1445 = "「Những điều bà đã kể cho cháu.\nCháu tuyệt đối sẽ không để chúng trở nên vô ích đâu ạ.」"
# monologue
# JP: ――そうであっても、初めて尋ねたのは僕と聞き、\n心のどこかは、誇らしいように感じている。
961 = "――Dù vậy, khi nghe nói mình là người đầu tiên hỏi chuyện này,\nđâu đó trong thâm tâm tôi lại cảm thấy tự hào."
# monologue
# JP: それが幼稚な独占欲でも、他の何でも、\n同情や憐憫よりは、遥かにマシな感情だろう。
2364 = "Dù đó là sự chiếm hữu trẻ con, hay bất cứ thứ gì khác,\nthì nó vẫn là một cảm xúc tốt hơn nhiều so với sự đồng cảm hay thương hại."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の調整ば、\nやるならいつでん、引き受けるけん」
1004 = "「――Việc điều chỉnh \\x%lレイルロオド;#00ffc040;Railord%l;#,\nnếu muốn làm thì lúc nào tôi cũng sẵn sàng nhận lời.」"
# monologue
# JP: どこかサバサバしたような声。\nそれだけ残し、登呂流湯主人は去っていく。
2385 = "Một giọng nói có phần thẳng thắn.\nChỉ để lại câu nói đó, Chủ nhà tắm Tororyu-yu rời đi."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
1763 = "「Cháu cảm ơn bà ạ.」"
# monologue
# JP: ――ともかく、前を向くことだ。\n自分自身に、そう言い聞かせる。
2415 = "――Dù sao thì, cũng phải hướng về phía trước.\nTôi tự nhủ với bản thân như vậy."
# monologue
# JP: 何が出来るか、今は正直わからない。が――\n少なくとも問題の複雑さを知ることだけは出来たのだから。
2264 = "Thành thật mà nói, hiện tại tôi không biết mình có thể làm gì. Nhưng――\nÍt nhất thì tôi cũng đã biết được sự phức tạp của vấn đề."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「\x%l客車;#00ffc040;客車%l;#;の手配が整ったとのことですね。\nまずは、おめでとうございます」
1645 = "「Nghe nói việc chuẩn bị \\x%l客車;#00ffc040;toa hành khách%l;# đã hoàn tất rồi nhỉ.\nTrước tiên xin chúc mừng mọi người.」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「ありがとうございます」\n「ありがとうございまぁす」
1764 = "「Cảm ơn ông ạ.」\n「Cảm ơn ông ạ~」"
# monologue
# JP: 赤井宮司との面談は、いたって和やかな雰囲気だ。
2435 = "Cuộc gặp gỡ với Đại tư tế Akai diễn ra trong bầu không khí vô cùng hòa nhã."
# monologue
# JP: ポーレットの面差しはただ柔らかで、\nいかなる重荷も暗さも全く覗かせない。
2356 = "Nét mặt của Paulette rất đỗi dịu dàng,\nhoàn toàn không để lộ chút gánh nặng hay u ám nào."
# 【ポーレット】
# display as 波萊特
# JP: 「すみません、こちらからお尋ねするべきところ、\nわざわざレールショップまで」
1626 = "「Cháu xin lỗi, đáng lẽ chúng cháu phải đến thăm ông,\nvậy mà lại phiền ông cất công đến tận cửa hàng đường sắt thế này.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いいえ、なにほどでも無いことです。\nご体調を崩されたともお伺いしましたし」
1282 = "「Không, có đáng gì đâu.\nTôi cũng nghe nói cháu đang không được khỏe mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご心配をありがとうございます。\n少し焦りすぎてしまって――けど、もう大丈夫です」
1446 = "「Cảm ơn ông đã quan tâm ạ.\nChỉ là cháu hơi vội vàng quá thôi――nhưng giờ cháu ổn rồi ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「焦りすぎた……ですか？」
1313 = "「Vội vàng quá……sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。実は――」
1525 = "「Vâng. Thực ra thì――」"
# monologue
# JP: ああ、上手い。
2112 = "Chà, khéo thật đấy."
# monologue
# JP: 平凡な挨拶のやりとりを、\nごくごく自然に、ポーレットは本題へとつなげてしまう。
2349 = "Từ những lời chào hỏi xã giao thông thường,\nPaulette đã dẫn dắt vào chủ đề chính một cách vô cùng tự nhiên."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「……なるほど。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派が、ですか――」
1036 = "「……Ra là vậy.\nPhe ủng hộ mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;# sao――」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、ですので今会期末までに、\n議案をいくつか通過させたいと考えています」
1531 = "「Vâng, vì vậy cháu muốn thông qua\nmột số nghị án trước khi kết thúc kỳ họp này ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いくつか、のうちの一つは、\nこの[やしろ]社の文化財申請についてですよね」
1637 = "「Và một trong số đó,\nlà về việc xin công nhận tài sản văn hóa cho ngôi đền này đúng không?」"
# monologue
# JP: ご用意くださっていたのだろう。
2503 = "Chắc hẳn ông ấy đã chuẩn bị sẵn rồi."
# monologue
# JP: 赤井宮司が、どさっと資料の束を置き、\nポーレットへとリストを渡す。
1978 = "Đại tư tế Akai đặt phịch một xấp tài liệu xuống,\nvà đưa danh sách cho Paulette."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「専門家にも見てもらったのですが――\n新たに出てきたこの辺りも、かなり希少なものだそうです」
1468 = "「Tôi cũng đã nhờ chuyên gia xem qua rồi――\nNhững phần mới được tìm thấy này có vẻ cũng khá hiếm đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「拝見します」
1415 = "「Để cháu xem ạ.」"
# monologue
# JP: リストへと落ちたポーレットの目が、\nみるみる喜色に満ちていく。
2359 = "Đôi mắt Paulette lướt qua danh sách,\nvà nhanh chóng ánh lên vẻ vui mừng."
# 【ポーレット】
# display as 波萊特
# JP: 「これは……更なる裏付けとなる資料なのですね。\n木地師文化との深く、古い繋がりがあったということの」
1719 = "「Đây là……những tài liệu làm bằng chứng củng cố thêm phải không ạ.\nChứng minh mối liên hệ sâu sắc và lâu đời với văn hóa thợ mộc Kijishi.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「とのことだと聞いています。\n使えるようでしたら、どうぞ、ご随意にご活用ください」
1500 = "「Tôi nghe nói là vậy.\nNếu có thể dùng được thì cháu cứ tùy ý sử dụng nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。これだけの裏付けがあれば、\nたぶん全会一致での賛同を得ることができると思います」
1762 = "「Cháu cảm ơn ông ạ. Với chừng này bằng chứng,\ncháu nghĩ có lẽ sẽ nhận được sự đồng thuận nhất trí của toàn hội đồng ạ.」"
# monologue
# JP: なによりです、と頷いて。\n赤井宮司の落ち着いた目は、僕へ向く。
2506 = "Gật đầu nói \"Vậy thì tốt quá rồi\".\nĐôi mắt điềm tĩnh của Đại tư tế Akai hướng về phía tôi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「その他の議案、というのは、\nマイントレジャー関連についてですか？」
1332 = "「Các nghị án khác,\nlà liên quan đến Mine Treasure đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――\n既にご存知くださってましたか？」
1371 = "「A――\nÔng đã biết chuyện đó rồi sao ạ?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「[うじこ,1]氏子さんたちの口の端にも上っていますし、\n双鉄君からも、お電話をいただきましたので」
1629 = "「Chuyện này cũng đã đến tai các tín đồ của đền rồi,\nhơn nữa tôi cũng nhận được điện thoại từ cậu Soutetsu nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうだったんですか」
1344 = "「Thì ra là vậy ạ.」"
# monologue
# JP: さすが、といわんばかりの眼差し。\nが、それだけが、電話した内容の全てではない。
2348 = "Cô ấy nhìn tôi bằng ánh mắt như muốn nói \"Quả không hổ danh là anh\".\nNhưng, đó không phải là tất cả nội dung cuộc điện thoại."
# monologue
# JP: （運転鞄を――よかった、お連れくださっている）
2615 = "（Chiếc cặp lái tàu――may quá, ông ấy có mang theo.）"
# monologue
# JP: 元\x%l運転士;#00ffc040;運転士%l;#;である赤井宮司の居室にいつも、\n鎮座ましましている\x%l乗務鞄;#00ffc040;乗務鞄%l;#;。
2511 = "Chiếc \\x%l乗務鞄;#00ffc040;cặp lái tàu%l;# vẫn luôn chễm chệ\ntrong phòng khách của cựu \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#, Đại tư tế Akai."
# monologue
# JP: 中身は僕の予想通りで、\nだから、ここにも連れてきてもらった。
2444 = "Bên trong nó đúng như những gì tôi dự đoán,\nvì vậy, tôi đã nhờ ông ấy mang đến tận đây."
# 【双鉄】
# display as 雙鐵
# JP: 「マイントレジャー計画の概要につきましては、\n既にお伝えさせていただきましたとおりです」
1759 = "「Về nội dung khái quát của Kế hoạch Mine Treasure,\nnhư cháu đã trình bày với ông trước đó ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ」
# 1375 = "「嗯」" 
# monologue
# JP: 僕は、知りたい。\n赤井宮司が、そして彼の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――
2256 = "Tôi muốn biết.\nĐại tư tế Akai, và \\x%lレイルロオド;#00ffc040;Railord%l;# của ông ấy――"
# monologue
# JP: れいなの改修について果たして、\nどんな意見を持つのかを。
2501 = "Rốt cuộc họ có ý kiến gì,\nvề việc cải tạo của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとの相談の結果、マイントレジャー計画案と、\n技術継承炭鉱申請案とは、別個の議案として提出します」
1390 = "「Sau khi bàn bạc với Paulette, Kế hoạch Mine Treasure và\nđơn xin công nhận Mỏ than kế thừa kỹ thuật sẽ được đệ trình thành hai nghị án riêng biệt ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど。そうすれば、マイントレジャー計画が\nもし、今回了承されなかったとしても――最低限は」
1343 = "「Ra là vậy. Nếu làm thế, giả sử Kế hoạch Mine Treasure\nlần này không được thông qua đi chăng nữa――thì ít nhất」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、技術継承炭鉱としての補助申請の方が賛同を\n得られやすい議案ですので、環境防護は果たせるかと」
1533 = "「Vâng, đơn xin hỗ trợ với tư cách Mỏ than kế thừa kỹ thuật là nghị án dễ\nnhận được sự đồng thuận hơn, nên cháu nghĩ vẫn có thể đạt được mục tiêu bảo vệ môi trường ạ.」"
# monologue
# JP: 知りたいからこそ、焦らない。\nただ、話すべきを話し続ける。
2315 = "Chính vì muốn biết nên tôi mới không vội vàng.\nChỉ tiếp tục nói những điều cần nói."
# 【双鉄】
# display as 雙鐵
# JP: 「僕としては赤井宮司にマイントレジャー計画への\nご賛同を頂きたく思っています」
1472 = "「Về phần cháu, cháu mong muốn nhận được sự đồng thuận\ncủa Đại tư tế Akai đối với Kế hoạch Mine Treasure ạ.」"
# monologue
# JP: ――過去と今。\n心地よい温度と距離感。
963 = "――Quá khứ và hiện tại.\nMột nhiệt độ và khoảng cách thật dễ chịu."
# monologue
# JP: あいまいなままでもよかった全てを、\n踏み壊すかもしれない、一言までを。
2273 = "Cho đến khi tôi nói ra một lời có thể sẽ phá vỡ tất cả những điều\nmà đáng lẽ cứ giữ mơ hồ như vậy cũng tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「が、現状ではその資格も無い」
1308 = "「Nhưng, với tình hình hiện tại thì chúng cháu không có tư cách đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「資格？」
1693 = "「Tư cách?」"
# monologue
# JP: きょとんとした顔。\nこれを曇らせてしまうと思えば、心が痛む。
2142 = "Khuôn mặt ngơ ngác.\nNghĩ đến việc mình sẽ làm khuôn mặt đó u ám đi, tim tôi lại nhói đau."
# monologue
# JP: だが、やるのだ。\n不安定な幸福はきっと、不幸の前兆でしかない。
2014 = "Nhưng, tôi phải làm.\nMột hạnh phúc bấp bênh chắc chắn chỉ là điềm báo cho sự bất hạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの処理落ち問題を――\n解決せぬまま、マイントレジャー計画は進められない」
1403 = "「Vấn đề xử lý quá tải của Reina――\nNếu không giải quyết, thì không thể xúc tiến Kế hoạch Mine Treasure được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――あ」
1003 = "「――A.」"
# monologue
# JP: しかし、表情は曇らない。\n代わりに色が――顔色がス、と青ざめてしまっただけだ。
2094 = "Thế nhưng, biểu cảm của cô ấy không hề u ám.\nThay vào đó――sắc mặt cô ấy bỗng chốc tái nhợt đi."
# 【ポーレット】
# display as 波萊特
# JP: 「それは……本当にそうなんですよね。\n[ハチロク,3]8620だけを中心にした観光振興ならいざしらず――」
1714 = "「Điều đó……đúng là vậy nhỉ.\nNếu chỉ lấy [Hachiroku,3]8620 làm trung tâm để chấn hưng du lịch thì không nói làm gì――」"
# monologue
# JP: ああ、と思う。今さら気付く。\nポーレットが幾度も言っていた『8620を中心とした』とは。
2248 = "A, tôi chợt nhận ra.\nThì ra việc Paulette nhiều lần nói 『lấy 8620 làm trung tâm』 là có ý đó."
# monologue
# JP: 観光客を、極力れいなに乗せないようにする――\nその意図の、消極的な表明でもあったのだなということを。
2538 = "Cố gắng hết sức để không cho hành khách đi tàu của Reina――\nĐó cũng là một cách thể hiện tiêu cực ý định của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャー計画を進めるには、れいなにも、\n観光客さんに絡んでもらう必要がどうしても出てくる」
1404 = "「Để tiến hành Kế hoạch Mine Treasure, dù thế nào đi nữa\ncũng cần phải để Reina chở khách du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「現状の湯医線運営は、地元の皆さまのご理解とご寛容に\n支えられてる。が……観光客相手では、そうはいかない」
1618 = "「Hoạt động của tuyến Yunoi hiện tại được duy trì nhờ sự thấu hiểu và bao dung\ncủa người dân địa phương. Nhưng……với khách du lịch thì không thể như vậy được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1375 = "「嗯」" 
# 【れいな】
# display as 玲奈
# JP: 「はぅぅ～っ」
1368 = "「Hauuu~」"
# monologue
# JP: れいなの顔を、不安げに歪ませてしまった。\nそこにまで気を回せなかった自分を、未熟と感じる。
2278 = "Tôi đã khiến khuôn mặt Reina méo mó vì bất an.\nTôi cảm thấy bản thân thật non nớt khi không lường trước được điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。れいな。問題なくできるようにするための\n知恵を――解決案を、これから皆で出し合っていくのだ」
1337 = "「Không sao đâu. Reina. Từ giờ mọi người sẽ cùng nhau suy nghĩ――\ntìm ra giải pháp để em có thể hoạt động mà không gặp vấn đề gì.」"
# monologue
# JP: だから――自分自身にも言いきかせながら、\nれいなの細い髪をぽんぽん叩いて撫でる。
2284 = "Vì thế――tôi vừa tự nhủ với bản thân,\nvừa vỗ nhẹ và xoa mái tóc mỏng manh của Reina."
# monologue
# JP: ただそれだけで、\nれいなはいくらか、安心したように笑ってくれる。
2025 = "Chỉ với hành động đó,\nReina đã mỉm cười như thể an tâm hơn phần nào."
# monologue
# JP: （この笑顔を……見せてもらえなくなるかもしれんのか）
2600 = "（Liệu mình có thể……không bao giờ được nhìn thấy nụ cười này nữa không.）"
# monologue
# JP: 短い付き合いの僕ごときでさえ、\nズキリと痛む不安を感じる。
2206 = "Dù chỉ mới quen biết một thời gian ngắn,\nnhưng ngay cả tôi cũng cảm thấy nhói đau vì bất an."
# monologue
# JP: が、ならばこそ、僕は先頭に立たねばならん。\nポーレットの、れいなの負荷を、僅かでも負うそのために。
2012 = "Nhưng, chính vì vậy, tôi phải là người đứng mũi chịu sào.\nĐể gánh vác dù chỉ một chút gánh nặng của Paulette và Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「理屈の上での解決策は、\n登呂流湯のご主人に聞いてきた」
1465 = "「Giải pháp về mặt lý thuyết,\ntôi đã hỏi Chủ nhà tắm Tororyu-yu rồi.」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「っ！」\n「っ！」
1772 = "「!」\n「!」"
# monologue
# JP: 言うと同時に、まるで電流でも流れたように、\nポーレットがれいなを、れいながポーレットを見る。
2432 = "Ngay khi tôi vừa dứt lời, như có luồng điện xẹt qua,\nPaulette nhìn Reina, Reina nhìn Paulette."
# monologue
# JP: ならば、ふたりともこの事実を既に知っていて。\nそしてお互いを思いやり、口に出してはなかったのだろう。
2542 = "Vậy là, cả hai người họ đều đã biết sự thật này.\nVà vì nghĩ cho nhau nên họ mới không nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯のご主人は……れいなの中に、\n『ガソリン\x%l気動車;#00ffc040;気動車%l;#;へのロールバック情報』があると」
1611 = "「Chủ nhà tắm Tororyu-yu nói rằng……bên trong Reina,\ncó 『thông tin khôi phục về \\x%l気動車;#00ffc040;toa xe tự hành%l;# chạy xăng』.」"
# monologue
# JP: れいなを見る、じっと見る。\nが、そうしてもまだれいなはポーレットを見たままだ。
2269 = "Tôi nhìn Reina, chằm chằm nhìn.\nNhưng dù vậy, Reina vẫn cứ nhìn Paulette."
# 【れいな】
# display as 玲奈
# JP: 「あの……」
1744 = "「Cái đó……」"
# 【ポーレット】
# display as 波萊特
# JP: 「……平気よ？　れいな」
1049 = "「……Không sao đâu, Reina.」"
# monologue
# JP: ややあって、ポーレットは優しい笑顔を浮かべ、\nれいなに向かって頷きかける。
2526 = "Một lúc sau, Paulette nở nụ cười dịu dàng,\nvà gật đầu với Reina."
# 【ポーレット】
# display as 波萊特
# JP: 「聞かせて。わたしも知りたいの」
1679 = "「Nói cho tôi nghe đi. Tôi cũng muốn biết.」"
# 【れいな】
# display as 玲奈
# JP: 「ええと……あります。\nれいな、ロールバック情報、持ってます」
1745 = "「Ưm……có ạ.\nReina, có thông tin khôi phục ạ.」"
# monologue
# JP: 言ってしまって、何のつかえが取れたのだろうか。\nれいなの言葉は、なめらかになる。
2468 = "Nói ra được rồi, nút thắt nào trong lòng con bé đã được gỡ bỏ chăng.\nGiọng nói của Reina trở nên trôi chảy hơn."
# 【れいな】
# display as 玲奈
# JP: 「[カタガミ,1]硬上鉱山鉄道を出るとき、全部持たせてもらったんです。\n改修資材も、全部、ぜぇんぶ一緒にです」
1391 = "「Khi rời khỏi Đường sắt mỏ Katakami, em đã mang theo toàn bộ ạ.\nCả vật liệu cải tạo, tất cả, tất tần tật đi cùng luôn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「改修資材も、というと――」
1730 = "「Cả vật liệu cải tạo nữa sao, tức là――」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ガリソン\x%l気動車;#00ffc040;気動車%l;#;へのロールバック、出来ます」
1593 = "「Reina, có thể khôi phục lại thành \\x%l気動車;#00ffc040;toa xe tự hành%l;# chạy xăng ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど――出来るって、いっても――」
1354 = "「Nhưng――dù có nói là làm được thì――」"
# monologue
# JP: 決して、大きなものでは無い声。\nけれど、あまりに多くが込められた声。
2148 = "Giọng nói tuyệt đối không hề lớn.\nNhưng lại là một giọng nói chứa đựng quá nhiều cảm xúc."
# monologue
# JP: ポーレットは、それを発して唇をぎゅっと引き結び。\nそして――そのまま俯いてしまう。
2470 = "Nói xong, Paulette mím chặt môi.\nVà――cứ thế cúi gầm mặt xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「出来るっていっても……それは――」
1761 = "「Dù có làm được đi chăng nữa……thì chuyện đó――」"
# 【双鉄】
# display as 雙鐵
# JP: 「圧縮した情報の展開と、必要次第での別情報の圧縮と。\nそれにも、それぞれリスクがともなうとも聞いている」
1666 = "「Việc giải nén thông tin đã nén, và nén các thông tin khác tùy theo nhu cầu.\nTôi nghe nói việc đó cũng đi kèm với những rủi ro riêng.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、そのお話も聞いてます」
1581 = "「Reina, cũng đã nghe chuyện đó rồi ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1771 = "「!」"
# monologue
# JP: ポーレットの目がもちあがる。\nれいなは、それをまっすぐ見ながら言葉をつなぐ。
2352 = "Paulette ngẩng phắt lên.\nReina nhìn thẳng vào mắt cô ấy và tiếp tục nói."
# 【れいな】
# display as 玲奈
# JP: 「ロールバックは、できる限りはしないようにって。\nれいな、言われて、ここに来ました」
1582 = "「Reina được dặn là, cố gắng hết sức đừng thực hiện khôi phục.\nReina đã nghe dặn như vậy rồi mới đến đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「出来るかぎりは、か――」
1325 = "「Cố gắng hết sức sao――」"
# monologue
# JP: だが今は、\nそこを踏み越えるべき時だと思う。
2010 = "Nhưng bây giờ,\ntôi nghĩ đã đến lúc phải vượt qua giới hạn đó."
# monologue
# JP: そう出来ない――いや、そうしないなら――\n僕らはきっと、同じ所をぐるぐる回り続けるだけになる。
2175 = "Nếu không thể làm vậy――không, nếu không làm vậy――\nchúng tôi chắc chắn sẽ chỉ tiếp tục luẩn quẩn ở cùng một chỗ mà thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「れいな、は」
1590 = "「Reina, em」"
# monologue
# JP: かすれた、絞り出したような声。\n見るからにもう無理をしている、作り笑い。
2353 = "Một giọng nói khàn đặc, như thể bị vắt kiệt.\nMột nụ cười gượng gạo, nhìn là biết đang cố gượng ép bản thân."
# monologue
# JP: それでも、ポーレットは微笑んでいる。\nれいなにきっと、遠慮せず語って欲しいから。
2068 = "Dù vậy, Paulette vẫn mỉm cười.\nChắc chắn là vì cô ấy muốn Reina nói ra mà không cần e ngại."
# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、今は、どうしたいの？\nロールバックを、復旧改修を――れいなは、受けたい？」
1589 = "「Reina, bây giờ em muốn làm gì?\nKhôi phục, cải tạo lại trạng thái cũ――Reina, em có muốn nhận không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは――」
1579 = "「Reina thì――」"
# monologue
# JP: 初めて、目にするように思う。\nれいなが、言いよどんでいる姿を。
2257 = "Có lẽ đây là lần đầu tiên tôi nhìn thấy.\nDáng vẻ ngập ngừng, ấp úng của Reina."
# monologue
# JP: あどけない唇はぱくぱくと、何度か開いて閉じて、開いて。\nグっと――息が、言葉が。喉の奥へと押し込められる。
2168 = "Đôi môi ngây thơ mấp máy, mở ra đóng lại vài lần.\nỰc――hơi thở, lời nói. Bị nuốt ngược vào trong cổ họng."
# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから。\nポーレットのいうことが、れいなのしたいことですよぉ」
1597 = "「Reina, là \\x%lレイルロオド;#00ffc040;Railord%l;# của chị Paulette mà.\nNhững gì chị Paulette nói, chính là những gì Reina muốn làm đó ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしの、したいこと……」
1455 = "「Những gì tôi, muốn làm……」"
# monologue
# JP: ポーレットの顔からもう、作り笑いが落ちてしまう。\nうつむき、黙り――葛藤している。
2059 = "Nụ cười gượng gạo đã biến mất khỏi khuôn mặt Paulette.\nCô ấy cúi gầm mặt, im lặng――đang đấu tranh nội tâm."
# monologue
# JP: ときおり、ちらり、またちらり、\nすがるような目が、僕へ向く。
2121 = "Thỉnh thoảng, cô ấy lại liếc nhìn,\nliếc nhìn tôi bằng ánh mắt cầu cứu."
# monologue
# JP: （あるいは、僕が、決断までを――\nまるごと全てを、いっそ引き受けるべきなのか）
2601 = "（Hay là, mình nên đưa ra quyết định――\nthà gánh vác toàn bộ mọi thứ luôn cho rồi.）"
# monologue
# JP: それは、ひどく容易な道だ。
2534 = "Đó là một con đường cực kỳ dễ dàng."
# monologue
# JP: どんな結果が出ようとも、僕が背負い込んでしまうなら、\n傷や後悔が生じたとして、逃げ道のあるものとなるから。
2301 = "Dù kết quả có ra sao, nếu tôi gánh vác tất cả,\nthì dẫu có tổn thương hay hối hận, cô ấy vẫn có đường lui."
# monologue
# JP: （だが、そうしてしまえば――\nポーレットはまた、立ち向かい損ねる）
2583 = "（Nhưng, nếu làm vậy――\nPaulette sẽ lại một lần nữa trốn tránh việc đối mặt.）"
# monologue
# JP: 過去の傷に。\n自らを縛る古い恐怖に。
2565 = "Với vết thương trong quá khứ.\nVới nỗi sợ hãi cũ kỹ đang trói buộc bản thân."
# monologue
# JP: 立ち向かう機会を逃せば逃してしまうほど、\nそれは、大きく深く、黒さを増していくものなのに。
2320 = "Càng bỏ lỡ cơ hội đối mặt,\nnỗi sợ hãi đó sẽ càng lớn hơn, sâu hơn, và đen tối hơn."
# monologue
# JP: （ましてやこれは――僕のエゴであるかもしれんのだ）
2604 = "（Hơn nữa chuyện này――có thể chỉ là sự ích kỷ của tôi.）"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致阻止という目的がもし僕になければ、\n判断はきっと、遥かに容易だったろう。
2179 = "Nếu tôi không có mục đích ngăn chặn việc mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#,\nthì việc đưa ra quyết định chắc chắn sẽ dễ dàng hơn rất nhiều."
# monologue
# JP: が――誘致阻止のため、マイントレジャー計画を進めたい。\nそうした気持ちがある以上、判断もその分濁る気がする。
2009 = "Nhưng――tôi muốn xúc tiến Kế hoạch Mine Treasure để ngăn chặn việc mời gọi.\nChừng nào còn có suy nghĩ đó, tôi cảm thấy phán đoán của mình cũng sẽ bị vẩn đục theo."
# monologue
# JP: （何が一番……ポーレットにとって、れいなにとって、\n最善となる行動なのか――）
2596 = "（Hành động nào là tốt nhất……\nđối với Paulette, đối với Reina――）"
# 【ニイロク】
# display as ？？？
# JP: 「それなら、自分と変わってほしい」
1516 = "「Nếu vậy, xin hãy nhường cơ hội đó cho tôi.」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「っ！！？」\n「ひゃわっ！！？」
1777 = "「!!?」\n「Hyawa!!?」"
# monologue
# JP: 静かな声。\n冷たい声。
2326 = "Một giọng nói tĩnh lặng.\nMột giọng nói lạnh lẽo."
# monologue
# JP: 赤井宮司の、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;のその内側から。
2524 = "Phát ra từ bên trong,\nchiếc \\x%l乗務鞄;#00ffc040;cặp lái tàu%l;# của Đại tư tế Akai."
# 【ニイロク】
# display as ？？？
# JP: 「[キヨハル,1]清春、出して」
1570 = "「Kiyoharu, đưa tôi ra ngoài đi.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ――」
1374 = "「Ừm――」"
# monologue
# JP: 赤井宮司が、鞄の中に両手をそうっと差し入れる。
2504 = "Đại tư tế Akai nhẹ nhàng đưa cả hai tay vào trong cặp."
# monologue
# JP: 宮司の細い手に掻き抱かれて、あまりに異様な――\n異形というべき\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、僕らの前に姿を現す。
2440 = "Được ôm gọn trong đôi tay gầy gò của Đại tư tế, một \\x%lレイルロオド;#00ffc040;Railord%l;# với hình thù vô cùng kỳ dị――\nphải nói là dị dạng, xuất hiện trước mặt chúng tôi."
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……お顔……が――」
1366 = "「Oa……khuôn mặt……của chị ấy――」"
# monologue
# JP: 包帯だ。\n顔中全てを、包帯で覆ってしまっている。
2304 = "Là băng gạt.\nToàn bộ khuôn mặt cô ấy đều bị quấn kín bằng băng gạt."
# monologue
# JP: その隙間からわずかに覗く黒髪の、悲しい程に見事な艶が、\n痛々しさをいや増させている。
2424 = "Mái tóc đen nhánh bóng mượt đến đau lòng lấp ló qua những khe hở,\ncàng làm tăng thêm vẻ đáng thương."
# 【ニイロク】
# display as ？？？
# JP: 「自分は、ニイロク。\nクハ[ニイロク,1]26の専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だったものだ」
1481 = "「Tôi là Niiroku.\nTừng là \\x%lレイルロオド;#00ffc040;Railord%l;# chuyên dụng của Kuha 26.」"
# 【ポーレット】
# display as 波萊特
# JP: 「クハ、[ニイロク,1]26」
1781 = "「Kuha, 26.」"
# monologue
# JP: 呟きに視線を向ければ、\nそれだけでポーレットは応えてくれる。
2431 = "Tôi hướng ánh mắt về phía tiếng lẩm bẩm đó,\nchỉ vậy thôi Paulette đã đáp lời tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「[かごしま,2]鹿兒島本線で試験運用されてた……\n\x%l電車;#00ffc040;電車%l;#;、だったと思います」
1449 = "「Từng được chạy thử nghiệm trên Tuyến chính Kagoshima……\ntôi nghĩ nó là \\x%l電車;#00ffc040;tàu điện%l;#.」"
# 【ニイロク】
# display as 二六
# JP: 「そう。\x%lクハ26;#00ffc040;クハ26%l;#;は\x%l電車;#00ffc040;電車%l;#;だった。\n自分が、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であったときには」
1558 = "「Đúng vậy. \\x%lクハ26;#00ffc040;Kuha 26%l;# từng là \\x%l電車;#00ffc040;tàu điện%l;#.\nKhi tôi còn là \\x%lレイルロオド;#00ffc040;Railord%l;#.」"
# monologue
# JP: ……過去形の理由であるなら、僕ごときにも想像できる。
986 = "……Lý do tại sao lại dùng thì quá khứ, một người như tôi cũng có thể tưởng tượng được."
# monologue
# JP: 静かで冷たい言葉はすぐに、\nその想像が正しいものだと、示してしまう。
2544 = "Những lời nói tĩnh lặng và lạnh lẽo ngay lập tức\nchứng minh rằng sự tưởng tượng đó là đúng."
# 【ニイロク】
# display as 二六
# JP: 「けれど、鉄屑に成り果てた。\n自分の、整備ボディとともに」
1304 = "「Nhưng, nó đã trở thành đống sắt vụn.\nCùng với cơ thể bảo dưỡng của tôi.」"
# monologue
# JP: 感情が、まるで声から感じられない。\nああ、これは――冷たいではなく、温度が無いのだ。
2147 = "Hoàn toàn không cảm nhận được chút cảm xúc nào từ giọng nói ấy.\nA, đây không phải là lạnh lẽo――mà là không có nhiệt độ."
# monologue
# JP: （まさか……こんな状態の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であったとは）
2607 = "（Không ngờ……lại là một \\x%lレイルロオド;#00ffc040;Railord%l;# trong tình trạng thế này.）"
# monologue
# JP: 残酷なことを、おそらく僕はしてしまっている。
2233 = "Có lẽ tôi đang làm một việc tàn nhẫn."
# monologue
# JP: ポーレットの傷を癒やすそのため、\nこの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の傷を、おそらく抉っている。
2361 = "Để chữa lành vết thương của Paulette,\ncó lẽ tôi đang khoét sâu thêm vết thương của \\x%lレイルロオド;#00ffc040;Railord%l;# này."
# 【ニイロク】
# display as 二六
# JP: 「自分は、壊れたくないと思った。\nだから、清春に何とかして欲しいと頼んだ」
1458 = "「Tôi đã nghĩ rằng mình không muốn bị phá hủy.\nVì vậy, tôi đã cầu xin Kiyoharu làm điều gì đó.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「……[かごしま,2]鹿兒島本線の廃線がきまった、あの日。\n試験機は、全て一斉処分されることとなりました」
1041 = "「……Vào cái ngày Tuyến chính Kagoshima quyết định bị bãi bỏ đó.\nTất cả các cỗ máy thử nghiệm đều bị đem đi tiêu hủy đồng loạt.」"
# 【ニイロク】
# display as 二六
# JP: 「それは、ひどく残酷で無意味な指示に思えた。\nだから、自分たちは抗った」
1461 = "「Đó là một chỉ thị vô cùng tàn nhẫn và vô nghĩa.\nVì vậy, chúng tôi đã phản kháng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「……モックアップ――外装模型を運転席に座らせました。\n気づいた者もいたでしょう。しかし、誰も咎めなかった」
1046 = "「……Chúng tôi đã đặt một mô hình giả――mô hình ngoại thất vào ghế lái.\nChắc cũng có người nhận ra. Nhưng không một ai lên tiếng trách cứ.」"
# monologue
# JP: 赤井宮司の眉間にぎゅっと、後悔にだろうか、皺が寄る。\nニイロクを包む包帯は、もちろん、なんの変化も見せない。
2505 = "Giữa hai hàng lông mày của Đại tư tế Akai nhíu chặt lại, có lẽ là do hối hận.\nLớp băng gạt quấn quanh Niiroku, tất nhiên, không cho thấy bất kỳ sự thay đổi nào."
# 【ニイロク】
# display as 二六
# JP: 「結果、自分は成り果てた。\n走ることの出来なくなった――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、残骸に」
1505 = "「Kết quả là, tôi đã trở thành.\nMột tàn tích của \\x%lレイルロオド;#00ffc040;Railord%l;#――không còn khả năng chạy nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「残、骸」
1549 = "「Tàn, tích.」"
# 【ニイロク】
# display as 二六
# JP: 「上からの指示は残酷なものではなかった。正しかった。\n走れなくなった\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、自ら壊れる」
1273 = "「Chỉ thị từ cấp trên không hề tàn nhẫn. Nó đã đúng.\n\\x%lレイルロオド;#00ffc040;Railord%l;# không còn khả năng chạy, sẽ tự mình vỡ vụn.」"
# monologue
# JP: れいなを――思わず見てしまう。\nが、ショックを受けたような様子は見られない。
2243 = "Tôi bất giác――nhìn sang Reina.\nNhưng không thấy con bé có vẻ gì là bị sốc."
# monologue
# JP: まるで前から知っていることを聞くように――\nただ、悲しげに黙りこくっている。
2198 = "Như thể đang nghe một điều đã biết từ trước――\nCon bé chỉ im lặng với vẻ mặt buồn bã."
# 【ニイロク】
# display as 二六
# JP: 「物は、人の役に立ってこその物。だから自分は、\n清春に仕事を求めた。事務処理、軽作業、計算――」
1578 = "「Vật dụng, chỉ khi có ích cho con người mới là vật dụng. Vì vậy, tôi\nđã yêu cầu Kiyoharu giao việc cho mình. Xử lý công việc văn phòng, việc vặt, tính toán――」"
# monologue
# JP: ハチロクのことを、不意に思う。
2245 = "Tôi chợt nghĩ đến Hachiroku."
# monologue
# JP: “走りたい”と、\nただひとつだけを僕に求めた、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を。
2207 = "Một \\x%lレイルロオド;#00ffc040;Railord%l;#,\nchỉ yêu cầu tôi duy nhất một điều, “Muốn được chạy”."
# 【ニイロク】
# display as 二六
# JP: 「自動車を入手してもらい、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの真似事もした。\nしかし、全ては虚しかった」
1733 = "「Tôi nhờ anh ấy mua một chiếc ô tô, và bắt chước làm hệ thống dẫn đường \\x%lエアクラ;#00ffc040;Aircra%l;#.\nNhưng, tất cả đều trống rỗng.」"
# monologue
# JP: ハチロクも、\nあるいはこんな声を出してしまったのかもしれない。
2176 = "Hachiroku,\ncó lẽ cũng sẽ thốt ra những lời như vậy."
# monologue
# JP: 汰斗さんが眠らせず――\n走らせぬまま、幾多の時を重ねさせてしまったのなら。
2022 = "Nếu như ông Taito không cho em ấy ngủ say――\nMà cứ để em ấy trải qua vô số thời gian trong trạng thái không được chạy."
# 【ニイロク】
# display as 二六
# JP: 「そして知った。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は。少なくとも自分は。\n物である以前に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだと」
1503 = "「Và tôi nhận ra. \\x%lレイルロオド;#00ffc040;Railord%l;#. Ít nhất là bản thân tôi.\nTrước khi là một đồ vật, tôi là một \\x%lレイルロオド;#00ffc040;Railord%l;#.」"
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;は君主ではない、単なる線路と同じものだと、\nいつか、ハチロクが聞かせてくれた。
2048 = "Hachiroku từng nói với tôi,\n\\x%lレイルロオド;#00ffc040;Railord%l;# không phải là người cai trị, mà chỉ đơn thuần là một thứ giống như đường ray."
# monologue
# JP: その先へ、さらに先へと――\n人のため、ひたすら伸びゆくことを目指すと。
2124 = "Vươn xa hơn, xa hơn nữa――\nVì con người, mục tiêu là không ngừng vươn xa."
# 【ニイロク】
# display as 二六
# JP: 「だから、自分は走りたい。自分の全てをゼロにしていい。\nそれでも、もう一度走りたい」
1491 = "「Vì vậy, tôi muốn chạy. Có biến mọi thứ của bản thân thành số 0 cũng được.\nDù vậy, tôi vẫn muốn chạy một lần nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「それは」
1286 = "「Đó là」"
# monologue
# JP: れいなの声は、いつもどおりだ。\n穏やかで甘えた声なのに、包み込むような響きをしている。
2370 = "Giọng nói của Reina vẫn như mọi khi.\nMột giọng nói điềm tĩnh, nũng nịu, nhưng lại mang âm hưởng như đang bao bọc lấy mọi thứ."
# 【れいな】
# display as 玲奈
# JP: 「れいなのロールバックデータを、\nニイロクさんにコピーするという意味ですか？」
1534 = "「Ý chị là copy dữ liệu khôi phục của Reina,\nsang cho chị Niiroku sao ạ?」"
# 【ニイロク】
# display as 二六
# JP: 「そういう意味。そうして再び走れるのなら、\n自分の\x%lタブレット;#00ffc040;タブレット%l;#;を[イニシャライズ,2]初期化しても構わない」
1528 = "「Ý tôi là vậy đấy. Nếu làm vậy mà có thể chạy lại được,\nthì có [khởi tạo,2]khởi tạo lại \\x%lタブレット;#00ffc040;thẻ bảng%l;# của tôi cũng không sao.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「……」
# 1019 = "「……」" 
# monologue
# JP: それは、\n赤井宮司との記憶の全てを捨て去るということだろう。
2523 = "Điều đó,\ncó nghĩa là vứt bỏ toàn bộ ký ức với Đại tư tế Akai."
# monologue
# JP: だというのに、赤井宮司は穏やかな、\nむしろ、柔和な笑みにさえ見える表情を湛えてる。
2092 = "Vậy mà, Đại tư tế Akai lại vô cùng bình tĩnh,\nthậm chí trên mặt ông còn nở một nụ cười hiền từ."
# monologue
# JP: （赤井宮司も……望んでいるということなのか）
2597 = "（Đại tư tế Akai cũng……mong muốn điều đó sao.）"
# monologue
# JP: 形がどうあれ、記憶さえもが失われても――\nそれでも、ニイロクが再び走ることだけを。
2363 = "Bất kể dưới hình thức nào, dù cho có mất đi cả ký ức――\nÔng ấy vẫn chỉ mong Niiroku được chạy một lần nữa."
# monologue
# JP: そう望むがゆえ、おそらくは……\n僕の浅薄な提案に乗り、ニイロクを連れてきてくれたのだ。
2231 = "Chính vì mong muốn như vậy, nên có lẽ……\nông ấy mới đồng ý với đề xuất nông cạn của tôi, và mang Niiroku đến đây."
# monologue
# JP: （ならば――僕は――）
2614 = "（Nếu vậy――tôi――）"
# 【ポーレット】
# display as 波萊特
# JP: 「い、え……断言は、できませんけど――\nきっと、そこまでする必要は――」
1278 = "「Kh-Không……Dù tôi không thể khẳng định chắc chắn――\nnhưng chắc chắn, không cần phải làm đến mức đó đâu――」"
# monologue
# JP: 怯えたような、なだめるようなポーレットの声。
2355 = "Giọng nói của Paulette như đang sợ hãi, lại như đang dỗ dành."
# monologue
# JP: そこに救いを求めるように、\n全員の目が、すがりつく。
2251 = "Như thể tìm kiếm sự cứu rỗi ở đó,\nánh mắt của tất cả mọi người đều đổ dồn về phía cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の最後――最新鋭の試験機の、トップナンバー機。\nスペック的に余裕がある可能性……低くない気がします」
1340 = "「Cỗ máy cuối cùng của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;# cũ――cỗ máy số 1 của dòng máy thử nghiệm tân tiến nhất.\nKhả năng vẫn còn dư dả về mặt thông số kỹ thuật……tôi nghĩ là không hề thấp đâu.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「すると――こいつを、\nこいつのままで再び走らせてやれる可能性が？」
1423 = "「Nói vậy là――có khả năng\nđể con bé tiếp tục là chính mình và chạy lại được sao?」"
# monologue
# JP: 赤井宮司の顔に、露骨なまでの感情が出る。\n希望と不安が――入り混じっている表情が。
2507 = "Khuôn mặt của Đại tư tế Akai bộc lộ cảm xúc một cách rõ ràng.\nMột biểu cảm đan xen giữa――hy vọng và bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「それが\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のものであれ。\n記録に記憶は付随する――そう聞いています」
1477 = "「Dù đó là của \\x%lレイルロオド;#00ffc040;Railord%l;#.\nKý ức luôn đi kèm với ghi chép――tôi đã nghe như vậy.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「記録に、記憶が？」
1671 = "「Ký ức, đi kèm với ghi chép sao?」"
# monologue
# JP: ……僕が望んで、僕が求めて、\n聞いてもらった――聞かせてしまった話だから。
980 = "……Bởi vì đây là câu chuyện do tôi mong muốn, do tôi yêu cầu,\nvà đã để cho mọi người nghe thấy――đã bắt mọi người phải nghe."
# monologue
# JP: 僕の知っている事実の全てを、\n僕は、伝え切らねばならない。
2285 = "Tôi phải truyền đạt lại toàn bộ\nnhững sự thật mà tôi biết."
# 【双鉄】
# display as 雙鐵
# JP: 「ディーゼル改修前、鉱山鉄道で過ごした時代の、\nれいなの記憶。それが、ロールバック情報には付随する」
1386 = "「Ký ức của Reina thời còn ở đường sắt mỏ, trước khi được cải tạo thành diesel.\nNó đi kèm với thông tin khôi phục.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「――ああ」
# 1003 = "「——啊」" 
# monologue
# JP: それがいかに危険なことか。
2522 = "Điều đó nguy hiểm đến mức nào."
# monologue
# JP: 経験豊かな元\x%l運転士;#00ffc040;運転士%l;#;の赤井宮司には、\n僕よりおそらく、よほど深く理解できているのだろう。
2412 = "Một cựu \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;# giàu kinh nghiệm như Đại tư tế Akai,\ncó lẽ hiểu rõ điều đó hơn tôi rất nhiều."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうか……冷静に考えれば、れいなくんの\x%lタブレット;#00ffc040;タブレット%l;#;を\nニイロクに実装するのと大差ない」
1724 = "「Vậy sao……Nghĩ kỹ lại thì, việc này chẳng khác gì\ncài đặt \\x%lタブレット;#00ffc040;thẻ bảng%l;# của cô bé Reina cho Niiroku cả.」"
# 【ニイロク】
# display as 二六
# JP: 「それが何だ」
1748 = "「Thì đã sao.」"
# monologue
# JP: 感情なく。躊躇なく。\nニイロクの声は、赤井宮司さえをも打ち付けるようだ。
2327 = "Không cảm xúc. Không do dự.\nGiọng nói của Niiroku như đánh thẳng vào cả Đại tư tế Akai."
# 【ニイロク】
# display as 二六
# JP: 「自分は、すでに壊れている。\n例え再起不能になっても、今より悪くなることは無い」
1467 = "「Tôi, đã hỏng rồi.\nDù có không thể phục hồi được nữa, thì cũng chẳng thể tồi tệ hơn hiện tại được đâu.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうだな、ニイロク」
1523 = "「Đúng vậy, Niiroku.」"
# monologue
# JP: 宮司が、頷く。\nとても静かに、とても綺麗に。
2195 = "Đại tư tế, gật đầu.\nRất nhẹ nhàng, rất đẹp đẽ."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「お前が再び走れるのなら。\n他の全てを、引き換えにする価値がある」
1351 = "「Nếu con có thể chạy lại được.\nThì đánh đổi tất cả những thứ khác cũng đáng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1771 = "「！」" 
# monologue
# JP: これはいけない。\nこれでは、願いに――願いの重さに押しつぶされる。
1983 = "Thế này thì không được.\nThế này thì, sẽ bị đè bẹp bởi ước nguyện――sức nặng của ước nguyện mất."
# monologue
# JP: ポーレットに、そんな判断を強いてはいけない――\n思ったときには、声が出ている。
1989 = "Không thể ép Paulette phải đưa ra quyết định như vậy được――\nKhi tôi nghĩ vậy, giọng nói đã tự động bật ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、[ハチロク,3]8620でも構わんでしょう」
1512 = "「Nếu vậy, dùng [Hachiroku,3]8620 cũng được mà đúng không.」"
# 【ニイロク】
# display as 二六
# JP: 「ハチロク……\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;か。\n自分は、もちろん、それでもいい」
1327 = "「Hachiroku……\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;# sao.\nTất nhiên, tôi thấy thế cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;は、れいなよりもさらに、はるかに旧式です。\n取り扱うデータ量も、その分少ないのではないかと」
995 = "「\\x%l8620;#00ffc040;8620%l;# là mẫu cũ hơn Reina rất, rất nhiều.\nLượng dữ liệu cần xử lý chắc hẳn cũng ít hơn tương ứng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「リスクは、さらに低減できると？」
1424 = "「Ý cậu là có thể giảm thiểu rủi ro hơn nữa sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「素人考えではありましょうが……\nその可能性は大いにあるかと思います」
1760 = "「Dù chỉ là suy nghĩ của một kẻ ngoại đạo……\nNhưng cháu nghĩ khả năng đó là rất lớn.」"
# monologue
# JP: 僕が望んで、連れてきてもらったニイロクだ。\nならば赤井宮司とニイロクの、強烈なまでの願いは……
2117 = "Là do tôi mong muốn, nên ông ấy mới đưa Niiroku đến đây.\nVậy thì ước nguyện mãnh liệt của Đại tư tế Akai và Niiroku……"
# monologue
# JP: たとえ、ハチロクを巻き込む形となろうとも、\n僕が、引き受けなければならない。
2066 = "Dù có phải kéo theo cả Hachiroku vào chuyện này,\ntôi cũng phải đảm nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「ですのでその件は、のちほど、\nハチロクと、登呂流湯のご主人とも相談をして――」
1487 = "「Vì vậy, về chuyện đó, lát nữa cháu sẽ\nbàn bạc với Hachiroku và Chủ nhà tắm Tororyu-yu――」"
# 【れいな】
# display as 玲奈
# JP: 「あの、れいな、ニイロクさんとかわりばんこで走るの、\nおもしろそうって思います」
1746 = "「Cái đó, Reina nghĩ nếu được chạy luân phiên với chị Niiroku,\nchắc sẽ thú vị lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1776 = "「!!?」"
# monologue
# JP: 思いもかけぬ、れいなの言葉。
2371 = "Những lời nói ngoài sức tưởng tượng của Reina."
# monologue
# JP: れいなはいつもと同じ笑顔で、\nにこにこ、気持ちを話してくれる。
2133 = "Reina vẫn với nụ cười như mọi khi,\nvui vẻ nói ra suy nghĩ của mình."
# 【れいな】
# display as 玲奈
# JP: 「れいな、もともと姉妹の中のひとりでしたから。\nかわりばんこで走るのも、楽しいんです」
1585 = "「Reina vốn dĩ cũng là một trong số các chị em mà.\nNên việc chạy luân phiên cũng vui lắm ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
1373 = "「A.」"
# monologue
# JP: ポーレットの喉から声が溢れる。\nけれど、表情が動かない。
2346 = "Một âm thanh tràn ra từ cổ họng Paulette.\nNhưng, biểu cảm của cô ấy không hề thay đổi."
# monologue
# JP: 心のすべてを仮面で隠そうとするかのように、\nポーレットは表情を固めている。
2199 = "Như thể đang cố gắng che giấu mọi thứ trong lòng bằng một chiếc mặt nạ,\nPaulette giữ nguyên vẻ mặt cứng đờ."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「かわりばんこで走る“のも”ですか？」
1291 = "「Chạy luân phiên “cũng” vui sao?」"
# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。ひとりでのびのび走るのも、\nれいな、やっぱり大好きですからぁ」
1522 = "「Đúng vậy ạ~ Việc được thong dong chạy một mình,\nReina quả nhiên cũng rất thích mà~」"
# monologue
# JP: ぎりぎりの――\nけれど素直な、それはれいなの意思表明だ。
2374 = "Sát sao――\nNhưng thành thật, đó là lời bày tỏ ý chí của Reina."
# monologue
# JP: しかしポーレットは動かない。\n苦しげに、あえぎのような言葉だけしか漏らせない。
2090 = "Nhưng Paulette vẫn không nhúc nhích.\nCô ấy chỉ có thể thốt ra những lời nói thoi thóp, đầy đau đớn."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし……わたしは――」
1454 = "「Tôi……tôi――」"
# monologue
# JP: 赤井宮司を、ニイロクを見る。
2154 = "Nhìn Đại tư tế Akai, nhìn Niiroku."
# monologue
# JP: ニイロクはまるで動かぬが、\n赤井宮司は、ゆっくり頷き――託してくれる。
2000 = "Niiroku hoàn toàn không cử động,\nnhưng Đại tư tế Akai thì chậm rãi gật đầu――giao phó lại cho cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\nここから先は、君が決断しなければいけないことだ」
1567 = "「Paulette.\nTừ giờ trở đi, cô phải là người đưa ra quyết định.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！」
1774 = "「!!」"
# monologue
# JP: 真っ白な顔がギクリと引きつる。
2351 = "Khuôn mặt trắng bệch giật nảy mình."
# monologue
# JP: その目が激しく彷徨い動き、れいなを、僕を、赤井宮司を\n――果てはニイロクまでをも見つめ、視線で縋ろうとする。
2149 = "Đôi mắt ấy đảo quanh liên tục, nhìn Reina, nhìn tôi, nhìn Đại tư tế Akai\n――cuối cùng là nhìn chằm chằm cả Niiroku, cố gắng bám víu bằng ánh mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「誰かが望むからではダメだ。マイントレジャーのことも、\n鉄道経営や観光振興のことも、気にしなくていい」
1280 = "「Không thể vì ai đó mong muốn được. Cả chuyện Mine Treasure,\nhay chuyện kinh doanh đường sắt, chấn hưng du lịch, cô cũng không cần phải bận tâm.」"
# monologue
# JP: 言ってしまえば、余計な全てが剥がれて落ちる。
2469 = "Nói ra rồi, mọi thứ thừa thãi đều bị lột bỏ và rơi xuống."
# monologue
# JP: ただひとつ、\n僕の一番奥の望みが、ただそれだけが言葉に変わる。
2272 = "Chỉ có một điều duy nhất,\nước muốn sâu thẳm nhất của tôi, chỉ có điều đó là biến thành lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「これは、君とれいなの話だ。\nポーレット、君たちの未来を決める、決断なんだ」
1722 = "「Đây là chuyện của cô và Reina.\nPaulette, đây là quyết định định đoạt tương lai của hai người đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「未来……なんて」
1543 = "「Tương lai……gì chứ.」"
# monologue
# JP: わなわな、ポーレットの唇が、\nそうしてすぐに、その全身が震えだす。
2354 = "Đôi môi Paulette run rẩy,\nvà ngay sau đó, toàn thân cô ấy bắt đầu run lên."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは――今の御一夜を……今のれいなを、\n今のままをただ守りたくって――」
1463 = "「Tôi――chỉ muốn bảo vệ Ohimitera hiện tại……bảo vệ Reina hiện tại,\nbảo vệ mọi thứ như hiện tại thôi――」"
# monologue
# JP: レールショップを、小さな城を、\nそこでの暮らしを守るため。
2184 = "Để bảo vệ cửa hàng đường sắt, bảo vệ tòa lâu đài nhỏ,\nvà cuộc sống ở nơi đó."
# monologue
# JP: 確かに、ポーレットが自ら求めたものは、\n“その一点を変えないこと”に終始一貫、帰結していた。
2389 = "Đúng vậy, những gì Paulette tự mình mong muốn,\ntừ đầu đến cuối đều quy về \"việc không thay đổi điểm đó\"."
# 【ポーレット】
# display as 波萊特
# JP: 「れいなに、変わってほしくなくって――\nずっとそのままで居てほしくって」
1457 = "「Tôi không muốn Reina thay đổi――\nTôi muốn em ấy cứ mãi như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、変わるぞ」
1306 = "「Nhưng, sẽ thay đổi đấy.」"
# monologue
# JP: 僕が来たこと。\n僕とポーレットが出会ったこと。
2267 = "Việc tôi đến đây.\nViệc tôi và Paulette gặp nhau."
# monologue
# JP: それも、一因であるかもしれない。\nだが、そんなのは、本当に小さなことにすぎない。
2281 = "Đó cũng có thể là một nguyên nhân.\nNhưng, những thứ đó, thực sự chỉ là chuyện nhỏ nhặt mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを見ろ。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とて不変ではない。\nロールバックがあろうとなかろうと、変わるのだ」
1619 = "「Nhìn Hachiroku đi. Ngay cả \\x%lレイルロオド;#00ffc040;Railord%l;# cũng không phải là bất biến.\nDù có khôi phục hay không, thì vẫn sẽ thay đổi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんな、こと」
1727 = "「Chuyện, đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「変わらないものなど、何もない。\n駅も、線路も、僕達自身も、必ず変わる」
1557 = "「Không có gì là không thay đổi cả.\nGa tàu, đường ray, hay chính bản thân chúng ta, chắc chắn đều sẽ thay đổi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それでも、れいなはっ」
1428 = "「Dù vậy, Reina vẫn.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、大丈夫。変わりませんよぉ。\nずっと、ポーレットのおそばにいますよ」
1586 = "「Reina, không sao đâu ạ. Sẽ không thay đổi đâu ạ~.\nSẽ luôn ở bên cạnh chị Paulette mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
# 1775 = "「！！！」" 
# monologue
# JP: “言わせてしまった”と――そのことを、\n僕より、おそらく誰よりも、ポーレットこそが痛感してる。
2350 = "“Đã để con bé phải nói ra câu đó”――điều đó,\ncó lẽ Paulette là người cảm nhận sâu sắc hơn tôi, hơn bất kỳ ai khác."
# monologue
# JP: ……僕の浅薄な思いつきは、ポーレットを、ニイロクを、\nれいなまでをも、苦しめた。
983 = "……Suy nghĩ nông cạn của tôi, đã làm khổ Paulette, làm khổ Niiroku,\nvà làm khổ cả Reina nữa."
# monologue
# JP: （受容こそ……許し受け入れることこそが、\nれいなの本質であり、望みなんだ）
2593 = "（Sự tiếp nhận……việc tha thứ và chấp nhận,\nchính là bản chất và cũng là mong muốn của Reina.）"
# monologue
# JP: そうであるから、優しさゆえに苦しんでいる。
2314 = "Chính vì vậy, con bé mới đau khổ vì sự dịu dàng của mình."
# monologue
# JP: ポーレットの願いと、ニイロクの願い。\nその両方が、ともに切なるものであるから。
2116 = "Mong ước của Paulette, và mong ước của Niiroku.\nCả hai đều là những mong ước tha thiết."
# monologue
# JP: （だからこそ――前へと、繋げねば意味が無い）
2606 = "（Chính vì vậy――nếu không hướng về phía trước, thì chẳng có ý nghĩa gì cả.）"
# monologue
# JP: 揺らぐ心を、想いで固める。
2262 = "Tôi dùng ý chí để củng cố lại trái tim đang dao động."
# monologue
# JP: 自責のすべてを棚に上げ、\n出来る限りに堂々と、ただポーレットだけを見つめ続ける。
2260 = "Gạt bỏ mọi sự tự trách sang một bên,\ntôi cố gắng hết sức đĩnh đạc, chỉ nhìn chằm chằm vào Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「本当に――“変わらないで”と、望んでいるのか？」
1312 = "「Cô thực sự――mong muốn “đừng thay đổi” sao?」"
# monologue
# JP: 閉ざされた幸福に安住したいなら、それでいい。
2178 = "Nếu cô ấy muốn an phận trong một niềm hạnh phúc khép kín, thì cũng được."
# monologue
# JP: お互いが心の底からそれを望んでいるのなら、\n僕は黙って立ち去るだけだ。が――
2024 = "Nếu cả hai người họ đều thực tâm mong muốn điều đó,\ntôi sẽ chỉ im lặng rời đi. Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「怯え閉じこもる幸福を。れいなをお人形にすることを。\nポーレット、君は本当に望んでいるのか？」
1568 = "「Một hạnh phúc sợ hãi và khép kín. Biến Reina thành một con búp bê.\nPaulette, cô thực sự mong muốn điều đó sao?」"
# monologue
# JP: 僕には、そうとは思えない。\nもしもそうなら、れいなの言葉を無視すればいい。
2246 = "Tôi không nghĩ vậy.\nNếu đúng là vậy, cô ấy chỉ cần phớt lờ lời nói của Reina là xong."
# monologue
# JP: ポーレットもまたれいなを想い――\n想いと恐怖が相反するゆえ、苦しんでいるだけなのだ。
2347 = "Paulette cũng đang nghĩ cho Reina――\nChỉ vì tình cảm và nỗi sợ hãi mâu thuẫn với nhau, nên cô ấy mới đau khổ."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――は……」
1452 = "「Tôi――thì……」"
# monologue
# JP: 揺れている。
2129 = "Cô ấy đang dao động."
# monologue
# JP: いや……\n今振り返ってみるのなら、ポーレットはずっと揺れていた。
1981 = "Không……\nBây giờ nhìn lại, Paulette vẫn luôn dao động."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし……けどっ――」
1453 = "「Tôi……nhưng mà――」"
# monologue
# JP: 手が、伸びてくる。\n僕へと向けて。だから、受け取る。
2126 = "Một bàn tay vươn ra.\nHướng về phía tôi. Vì vậy, tôi đón lấy nó."
# 【ポーレット】
# display as 波萊特
# JP: 「どうして……こんな――双鉄くん、\n優しいのに――意地悪な、こと――」
1572 = "「Tại sao……lại như vậy――Anh Soutetsu,\nrõ ràng là rất dịu dàng――vậy mà lại làm chuyện, xấu tính thế này――」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕の望みだからだ。\n僕は、君を助けたい」
1381 = "「Vì đó là mong muốn của tôi.\nTôi, muốn giúp cô.」"
# monologue
# JP: 今ならばもう確信できる。本当はとっくに確信できてた。\n――幼いころに、僕はポーレットに救われた。
1995 = "Bây giờ thì tôi đã có thể chắc chắn. Thực ra tôi đã chắc chắn từ lâu rồi.\n――Thuở nhỏ, tôi đã được Paulette cứu rỗi."
# monologue
# JP: だが、この気持ちは恩返しじゃない。\n路子を救えなかったことへの、代償行為である筈もない。
2017 = "Nhưng, thứ cảm xúc này không phải là để báo ân.\nCũng không thể nào là hành động bù đắp cho việc không cứu được Michiko."
# 【双鉄】
# display as 雙鐵
# JP: 「僕には君の悲鳴が聞こえた。君は悲鳴を届けてくれた。\nこの手を僕に、伸ばしてくれた」
1485 = "「Tôi đã nghe thấy tiếng thét của cô. Cô đã truyền tiếng thét đó đến tôi.\nĐã vươn bàn tay này về phía tôi.」"
# monologue
# JP: 手を包み込む。\n両手でぎゅうっと。
2266 = "Tôi bao bọc lấy bàn tay ấy.\nSiết chặt bằng cả hai tay."
# monologue
# JP: ポーレットの体はまだ震えている。\n心の芯が、きっと辛くて震えている。
2357 = "Cơ thể Paulette vẫn đang run rẩy.\nChắc chắn sâu thẳm trong tim cô ấy đang đau đớn và run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「向き合わなければ、乗り越えられない。\nそれはポーレット。君が、僕に教えてくれたことだ」
1399 = "「Nếu không đối mặt, thì không thể vượt qua.\nĐó là điều mà Paulette, chính cô đã dạy cho tôi.」"
# monologue
# JP: 何が原因で事故が起きたか。
1997 = "Nguyên nhân gây ra vụ tai nạn là gì."
# monologue
# JP: 僕はそれを見つめなおして、少なくとも、\n恨み憎しむだけの日々から、わずかでも顔をあげられた。
2302 = "Tôi đã nhìn nhận lại điều đó, và ít nhất,\ncũng có thể ngẩng mặt lên đôi chút khỏi những tháng ngày chỉ biết oán hận."
# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、意地悪だと思われようと、憎まれようと。\n君にも、過去と向き合って欲しいと思っている」
1488 = "「Vì vậy, dù có bị coi là xấu tính, dù có bị ghét bỏ đi chăng nữa.\nTôi vẫn muốn cô đối mặt với quá khứ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だけど……もう、向き合うなんて」
1356 = "「Nhưng mà……bây giờ, làm sao đối mặt được nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「出来るさ。意志さえあれば、いつでも」
1310 = "「Được chứ. Chỉ cần có ý chí, thì lúc nào cũng được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1370 = "「Hả!?」"
# monologue
# JP: 電話を、僕は三人にした。\n登呂流湯主人と、赤井宮司と――
2271 = "Tôi đã gọi điện cho ba người.\nChủ nhà tắm Tororyu-yu, Đại tư tế Akai và――"
# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんに相談したんだ。\nそうしたら、電話番号を預かった」
1480 = "「Tôi đã bàn chuyện này với cô Miyamoto.\nSau đó, cô ấy đã gửi gắm cho tôi một số điện thoại.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
# 1775 = "「！！！」" 
# monologue
# JP: 誰のものだか、言うまでもなくわかったのだろう。
2306 = "Của ai thì, không cần nói chắc cô ấy cũng biết."
# monologue
# JP: 青い瞳が揺れに揺れ、\n揺れながら――いっときも僕から外れずいる。
2166 = "Đôi mắt xanh biếc dao động dữ dội,\nnhưng dù dao động――vẫn không rời khỏi tôi một giây nào."
# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんは、こう言われて番号を預かったそうだ。\n『あの子が恋を知ったなら、伝えて欲しい』と」
1414 = "「Cô Miyamoto nói rằng cô ấy được dặn dò thế này khi nhận số điện thoại.\n『Nếu đứa trẻ đó biết yêu, xin hãy nói cho nó biết』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、恋を、知ったなら」
1400 = "「Nếu tôi, biết, yêu sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ポーレット」
1493 = "「Vì vậy, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
1377 = "「Vâng, anh Soutetsu.」"
# monologue
# JP: まぶたがきつく閉じられる。\n大つぶの涙がぼろりと溢れる。
2161 = "Đôi mắt cô ấy nhắm nghiền.\nNhững giọt nước mắt to tròn trào ra."
# monologue
# JP: それを拭いもせぬままに、\n揺らぎを落とした青い瞳は、まっすぐまっすぐ僕を見る。
2139 = "Không buồn lau đi những giọt nước mắt đó,\nđôi mắt xanh biếc không còn dao động nữa, nhìn tôi chằm chằm."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、恋を――知っています」
1451 = "「Tôi――đã biết yêu rồi.」"
