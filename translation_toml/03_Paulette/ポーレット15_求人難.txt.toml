# monologue
# JP: 蓑笠老人の言葉は、全く押し付けがましさ無しに、\nそうした事実を示してくれる。
2577 = "蓑笠爺爺闡述著這一事實，而沒有將他的想法強加給其他工匠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとうございます」
1082 = "「——非常感謝」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「礼を言われることじゃなかとです。凪たちのため、\n御一夜の水ば守るのは、私の望みでもありますけん」
1407 = "「不需要道謝。我也想為了孩子們，保住御一夜的水咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1590 = "「嗯」" 

# monologue
# JP: だが――御一夜は長い不況の中にある。
2151 = "但是——御一夜的經濟蕭條持續已久。" 

# monologue
# JP: 蓑笠さんのように、これほど美味しい儲け話を断ってまで、\nマイントレジャーに乗ってくれる人が……どれほどいるか。
2202 = "又會有多少人願意像蓑笠先生這樣，為了煤探樂園計劃而放棄這樣一張大單子呢。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、これ――\n船頭さん達の話にも、影響ば出てくるんじゃなかと？」
1657 = "「小深，這個——是不是還會影響到掌棹們的那件事咧？」" 

# 【ふかみ】
# display as 深美
# JP: 「うん。多分……っていうか、絶対」
1583 = "「嗯。大概會……應該說，一定會」" 

# monologue
# JP: 船頭さん達の話？　と疑問に思えば、\nすぐにふかみが答えてくれる。
2333 = "我一時間沒能理解她們的對話，而深美很快為我解答起來。" 

# 【ふかみ】
# display as 深美
# JP: 「あ、はい。マイントレジャーの話、\nうちの川下り、結構重要な役割を果たすじゃないですか」
1566 = "「啊，是的。在煤探樂園計劃中，我們的漂流不是非常重要的一環嘛」" 

# monologue
# JP: それは客数の増加に繋がり、\n客数の増加は、当然売上の増加につながる。
2467 = "漂流能夠促進客流量，而客流量一增加，盈利也自然會增加。" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、鉄道の方でも忙しくなるし。\n何人かでも復帰を募れないかって――考えてたんです」
1648 = "「小凪在鐵路方面的工作也會越來越忙。所以我在想，能不能多少勸幾個人回來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「離職した船頭さんの、か」
1481 = "「勸回離職的掌棹嗎」" 

# monologue
# JP: 正直、厳しいような気がする。
2604 = "說實話，我覺得很困難。" 

# monologue
# JP: 一度は捨てた職場に戻る……\nその事自体、ハードルが高い気がするし――
2592 = "要重新回到曾經放棄的崗位上……這件事本身就難度很大——" 

# monologue
# JP: （実際……これは、キツイ手を打たれてしまったな）
2650 = "（從實際來看……我們還真是被狠狠擺了一道啊）" 

# monologue
# JP: 鉱山まわり、廃宿舎群、トロッコ線路、発電所――\n整備すべきは無数にあり、人手はいくらあっても足りない。
2521 = "礦山方面、廢棄宿舍區、礦車線路、發電廠——有無數個需要維護的地方，人手再多都嫌不夠。" 

# monologue
# JP: 当然。マイントレジャーのキャストも必要になるし、\nキャストについては、ゼロからの育成もせねばなるまい。
2488 = "當然，還需要招聘煤探樂園的演員。而演員肯定需要從零基礎開始培訓。" 

# 【凪】
# display as 凪
# JP: 「……このまま、やられっぱなしですり潰されっと？」
1111 = "「……難道咱們就毫無還手之力，要被他們單方面擊垮嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1394 = "「不——」" 

# monologue
# JP: いかん。\n僕が沈黙しては、不安を煽ってしまうだけだ。
2132 = "不行。保持沉默，只會讓大家更加不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、すでに動き初めている。\n駅貼りや中吊りで、求人を打つ手配になっている」
1812 = "「波萊特已經開始行動了。她會通過車站海報及懸吊廣告牌的方式進行招聘」" 

# 【凪】
# display as 凪
# JP: 「じゃっどん、\n向こうほどお給料は出せなかとよね？」
1499 = "「可是，咱們開出的工資沒對方高咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じ土俵で勝負をするのは論外だ。\n金と金とで戦えば、こちらに勝ち目はまるで無い」
1400 = "「不能跟他們硬碰硬。如果要跟他們比資金實力，我們完全沒有勝算」" 

# monologue
# JP: 凪の素朴な率直さが、僕の逃げ道を塞いでくれる。
2184 = "凪率直的性格封鎖住了我的退路。" 

# monologue
# JP: 前へ――前へ――と、とにもかくにも出て行く他に、\n打てる手などは[ハナ,1]最初から無いのだ。
2288 = "它促使我不再猶豫，勇往直前——因為留在原地已經找不到任何出路了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、蓑笠さんと同様に、金より未来を選んでくれる\n――そうした人を集める手段を考えるのだ」
1734 = "「所以要想辦法，召集與蓑笠先生一樣——願意犧牲利益選擇未來的人」" 

# 【ふかみ】
# display as 深美
# JP: 「……ん」
1099 = "「……嗯」" 

# monologue
# JP: ふかみの顔が曇ってしまう。
2460 = "深美的神色黯淡下來。" 

# monologue
# JP: 生活に困り、慣れ親しんだ職を捨てた――そうした例を、\n身近にいくつも見てきてしまったせいだろうか。
2617 = "迫於生計，放棄了原本熟悉的工作——或許在她身邊，有很多這樣的例子吧。" 

# 【凪】
# display as 凪
# JP: 「ポスターとかビラとかはそぎゃんと風に作っとね？\nそんほかに、どぎゃん手ばあっとかねぇ」
1891 = "「要在海報和傳單上加入這樣的訊息嗎？其它還有什麼辦法嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「……地道ではありますが口コミばどうでしょうかの。\n理念やらは、面と向かってしか伝わらん気がしますけん」
1108 = "「……要不要試試當面勸說呀，雖然得一個個去跑。我覺得理念這樣的東西，還是面對面講得清楚咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですね。今すぐに出来そうなのは、その辺ですか」
1766 = "「是啊。目前能夠馬上做到的，也就只有這些了」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「じゃったら私はその方面で、\n幾人かでも慰留してみっとです」
1953 = "「那我就去試著儘可能挽留幾個人咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nご無理なければ、よろしくお願いいたします」
1972 = "「非常感謝。如果方便的話，就拜託您了」" 

# 【ふかみ】
# display as 深美
# JP: 「そうです。よね……うん。\n断られると、最初から決まってるわけじゃないし」
1902 = "「說得沒錯呀……嗯。也並不是一定會被拒絕」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、船頭さんだった人たちに声ばかけっと？\nなら、ウチは職人さん達に頼んでみるばい！」
1655 = "「小深要去找以前的掌棹嗎？那咱去找工匠求求情咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
1741 = "「拜託各位了」" 

# 【凪】
# display as 凪
# JP: 「まーかせとけばーい！！」
1482 = "「包在咱身上咧！！」" 

# monologue
# JP: 力を貸してもらえることで、\n少し、希望が見えてきたような気になれる。
2314 = "得到了大家的幫助，我似乎看到了希望的曙光。" 

# monologue
# JP: とにかく一人。まず一人。そうして誘っていけばなんとか、\n事態を打開できるかもしれん。
2130 = "不管怎樣，最起碼先說服一個人。只要這樣一個個積累下去，或許就能夠挽回局面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、動こう。\n立ち止まるのは、動けなくなってからで十分だ」
1870 = "「總而言之，先行動起來吧。要停下腳步的話等到真的無路可走那一刻也不遲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん――うん……そうか、わかった」
1580 = "「嗯——嗯……是嗎，我知道了」" 

# monologue
# JP: ポーレットからの電話を切る。\n切るまでずっと、平静な声を保てたはずだ。
2360 = "我與波萊特通話完，掛斷了電話。我在掛斷之前應該都保持了平靜的口吻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「く――そ」
1496 = "「可——惡」" 

# monologue
# JP: が、そう意識した反動なのか、電話を切ったその途端、\n恨み事の全てが塊となり、胸の奥から湧き出してくる。
2157 = "但是，或許是有意的克制引起了反作用力——在掛斷電話的一瞬間，所有的恨意從我的內心噴湧而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「理念は、金には立ち向かえんのか――\n一週間たってもまだ――六人しか応募が来ていないとは」
1837 = "「理念，還是無法戰勝金錢嗎——過了整整一個星期，竟然只有六個人來應募」" 

# monologue
# JP: 六人で足りるわけがない。\nしかも、その六人は皆、学園を出たてのものだとも聞く。
2178 = "六個人完全不夠。而且我聽說，這六個人都是剛剛從學校畢業。" 

# 【双鉄】
# display as 雙鐵
# JP: 「キャスト志望者が集まったところで、\nその指導をできるものも、まだいない」
1676 = "「就算雇用了演員，我們這邊卻還沒人能夠培訓他們」" 

# monologue
# JP: 押し込まれている。\n危険水域に最早来ている。
2347 = "我們被步步緊逼，已經被逼到了危險區域。" 

# monologue
# JP: だというのに、全く有効な手立てを打てない。\n金の力に――、一方的に僕らは蹂躙されている。
2221 = "可是我們卻完全沒有找到有效的辦法。面對金錢的力量，我們只有被動挨打的份。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は御一夜の滅びに繋がると――\nわかってくれたのではなかったのか」
1610 = "「大家不是都已經明白了——\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶會毀掉御一夜嗎」" 

# 【真闇】
# display as 真闇
# JP: 「わかっとっても流されよるんよ。\n『自分一人くらい』って、ついつい思ってしまうけん」
1672 = "「就算明白，也會隨波逐流的咧。會忍不住想“多我一個不多，少我一個不少”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1977 = "「！！」" 

# monologue
# JP: 全く、気配に気づけなかった。\nどこから話を聞かれていたのか、強い不安が――
2348 = "我完全沒注意到有人來了。強烈的不安感湧上心頭——我的自言自語究竟被聽到了多少？" 

# 【真闇】
# display as 真闇
# JP: 「日々姫はお絵描き、他のみんなは蔵やけん。\nよかとよ？　愚痴も弱音も、ウチ以外には聞こえんけん」
1753 = "「日日姬在畫畫，其他人都在酒窖咧。別擔心，不管是抱怨還是訴苦，都只有我能聽到」" 

# 【双鉄】
# display as 雙鐵
# JP: 「愚痴……と、弱音か」
1739 = "「抱怨……還有訴苦嗎」" 

# monologue
# JP: そうざっくりと言われてしまえば、\n肩肘張っても無意味なのだと、思い知る。
2586 = "被這樣一句話簡簡單單地拆穿，我終於明白逞強是沒有意義的行為。" 

# monologue
# JP: 相手は、なにせ真闇姉だ。\nたとえ一しか聞かれていずとも、そこから百を悟られる。
2486 = "畢竟，我現在面對的是真闇姐。即使只被她聽到一句，她也能猜到我全部的心思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうしたらいいかな、真闇姉。他はともかく、\n秦さんまでもが、金の力に負けてしまった」
1729 = "「我該怎麼辦，真闇姐。不說其他人，就連秦氏都敗給了金錢的力量」" 

# 【真闇】
# display as 真闇
# JP: 「[はた]秦さんて――ボイラ屋さんの？」
1867 = "「秦氏——是開鍋爐店的秦氏嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、他の秦さんに用は無い」
1646 = "「對，我找別的秦氏也沒事啊」" 

# monologue
# JP: 真闇姉ともあろうものが、\nなんでそんな自明のことを問い返すのか。
2550 = "聰明如真闇姐，為何會問出如此淺顯的問題。" 

# monologue
# JP: イラツキを感じてしまい荒いだ声に、\n自分が焦り、短気になってしまっていると知らされる。
2552 = "聽到自己急躁的聲音，我才發現自己已經變得這麼沉不住氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。いささか、動揺した。\nまさかここまで追い込まれるとは思ってなかった」
1103 = "「……抱歉，我有點動搖了。之前沒想過會被逼入這種絕境」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ほんまこつ追い込まれとーと？」
1661 = "「小雙，你真的被逼入絕境了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1530 = "「哎？」" 

# monologue
# JP: あまりに、馬鹿げた質問だ。
2618 = "這個問題太荒唐了。" 

# monologue
# JP: が、真闇姉の目にも声にも態度にも、\n一片たりと、からかいの色を感じない。
2154 = "但是真闇姐目光真摯、態度認真，完全不像是在戲弄我。" 

# 【真闇】
# display as 真闇
# JP: 「ボイラ屋さんに、双ちゃん、\n何ば頼みよるつもりやったと？」
1659 = "「小雙想拜託鍋爐店幹什麼來著？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、[ハチロク,3]8620の――」
1958 = "「那當然是８６２０的——」" 

# monologue
# JP: 言いかけ、気付く。\n\x%l8620;#00ffc040;8620%l;#;のボイラ整備は……
2602 = "說到一半，我突然想到。\\x%l8620;#00ffc040;８６２０%l;#;的鍋爐維護工作……" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、教わっとらんかったと？」
1660 = "「小雙沒有學到嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、教わった――\n一から十まで、丁寧に教えていただいた」
1410 = "「不，學到了——從頭到尾，秦氏都仔細地教會了我」" 

# monologue
# JP: ならば、今の状況下では――
2629 = "那麼，就目前來看——" 

# monologue
# JP: 秦さんは、僕に余力を生じさせるか、\nより安全なバックアップとしてしか、機能しない。
2529 = "秦氏的支持，只會讓我更多一分餘力，以及多一份安全保障。" 

# 【真闇】
# display as 真闇
# JP: 「一から十まで仕込んでもらって――」
1431 = "「人家從頭到尾教會了你——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「済まない。僕が完全に間違えていた。\n口コミの誘いを断られ続け、きっと意固地になっていた」
1641 = "「對不起，是我完全錯了。我想我是因為勸說一直被拒絕，變得有點意氣用事了」" 

# monologue
# JP: 秦さんの職能を、\n今のこの時は、僕は切望していなかった。
2526 = "秦氏的作用，就目前而言並不是最重要的。" 

# monologue
# JP: “秦さんだったら断らない”“きっと協力してくれる”\n――そんな希望に、甘え縋ろうとしただけだった。
1062 = "“秦氏一定不會拒絕”“一定願意幫助我們”——我只是想從這樣一份寄託之中，尋得些許安慰。" 

# 【真闇】
# display as 真闇
# JP: 「報酬が十分で、能力ば使いきらねばこなせん事なら、\nそりゃあ職人の、一番嬉しか仕事よね」
1609 = "「報酬豐厚、挑戰性十足的工作——這是工匠最樂意接受的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 

# monologue
# JP: だから秦さんはその仕事を選んだ。\nそれは当然の判断だ。
2376 = "所以秦氏才選了那份工作。這是理所當然的判斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「申し訳ない。金の誘惑に負けたなど――\n未熟な僕の、逆恨みによる暴言に過ぎなかった」
1640 = "「對不起。所謂敗給了金錢的誘惑——只是幼稚的我遷怒於人的惡言」" 

# monologue
# JP: より良い仕事を選んだ人を逆恨みして、根に持つなどは\n……まったく愚かなことだった。
2242 = "因為對方選擇了更好的工作，就遷怒於人、耿耿於懷……真是愚蠢至極。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は無理でも、更に良い仕事を提示して――\n本当に力が必要ならば、そうして借りれば良いだけだ」
1486 = "「即使現在做不到，等將來真正需要他幫忙的時候，再以更好的工作條件將他請來就是了」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 1590 = "「嗯」" 

# monologue
# JP: 肯定のようにも、問いかけのようにも聞こえる、\n穏やかな声。
2515 = "真闇姐溫和的聲音既似認同又似詢問。" 

# monologue
# JP: 真闇姉だな、と感じれば、\n力みが、更に抜けた気になる。
2430 = "沉浸在無比熟悉的溫馨氛圍中，我的心情變得更加放鬆。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生元忠は……そこまでを準備し、仕掛けて来た。\nそれは――今の僕には及びもつかぬ力量だ」
1631 = "「寶生元忠……做了如此周詳的準備，向我們展開攻勢。他的能力——是現在的我所不可匹敵的」" 

# 【真闇】
# display as 真闇
# JP: 「力量言うなら、双ちゃんは銀行さんに\n決して負けておらんでしょーに」
1895 = "「要說能力的話，小雙明明不會輸給那位銀行家的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 1530 = "「哎？」" 

# monologue
# JP: 気休めなど、真闇姉が僕に対して言うわけがない。\nが――
2509 = "真闇姐不可能為了寬慰我而說些不切實際的話。可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今のこの状況を見ると」
1500 = "「可是，從目前的情況來看——」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなん、力量の問題じゃなかとよ？\n単に、覚悟の問題ばい」
1924 = "「這可不是能力的問題哦？單純只是決心的問題咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「覚悟――\nいや、覚悟なら」
1802 = "「決心——不，要說決心的話——」" 

# monologue
# JP: しているつもりだ。\nベストも、尽くしてきたつもりだ。
2359 = "我當然下定了決心。並且，也在全力以赴。" 

# monologue
# JP: だが、真闇姉にそうと即答できない自分がここにいる。\nそれこそあるいは、僕の覚悟の不足の証なのであろうか。
2156 = "但是，我卻無法立刻回答真闇姐。或許，這就是我不夠堅定的表現吧。" 

# 【真闇】
# display as 真闇
# JP: 「銀行さんは、なりふりも手段もかまっとらんばい。\nけど、双ちゃんはなりふりば気にしとるよね」
1936 = "「那位銀行家放下了身段，而且開始不擇手段咧。可小雙卻還是放不下自己的身段吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――しかし――\n秦さんにも、他の幾人にも、僕は頭を下げ、て…………」
1396 = "「不——可是——不管是對秦氏，還是其他幾個人，我都是低頭去懇、求…………」" 

# monologue
# JP: 違う。\n一番最初に僕が頭を下げるべきは。
2126 = "不對。我最應該低頭懇求的人是——" 

# monologue
# JP: なりふりかまわず勝ちたいのなら、頼るべき人は、\n他の誰であるはずもない。
2273 = "如果我真的不顧一切想要取勝的話，那麼我最應該懇求的人就在我眼前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――まず、真闇姉に助力を願うべきだった」
1702 = "「我——應該最先請求真闇姐的幫助」" 

# monologue
# JP: ポーレットから、真闇姉への依頼があった。\nそんなこと、何の関係もありはしない。
2444 = "波萊特之前請真闇姐幫過忙，但這完全就是兩碼事。" 

# monologue
# JP: 身内の、義弟の僕でなければ頼めない――\nそういうレベルで、真闇姉に甘えきるべきだったのだ。
2217 = "只有我這個家人、我這個義弟才能開口——我應該利用這個身份，向真闇姐請求最鼎力的協助。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉一人の話ではない。蓑笠さんにも、赤井宮司にも\n――頼れる相手がいるのなら、心底頼るべきだった」
1398 = "「不光是真闇姐一個人。還有蓑笠先生、赤井宮司——既然找得到幫手，我就應該誠心誠意地求助」" 

# monologue
# JP: 僕は、格好をつけていた。\n追い込まれてると、これはマズイと自覚しながら。
2547 = "而我卻還在擺架子。明明知道我們正節節敗退，知道這樣下去不是辦法。" 

# monologue
# JP: “ご無理なければ”“無理ない範囲で”そんな言葉で、\n『依頼するものの責任』から、恐らく無意識に逃げていた。
1053 = "“如果您方便的話”“在您可能的範圍內”——我依靠這樣的話語，在無意中逃避著求助者應負的責任。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の甘さが……苦境を深めてしまっていたのか」
1774 = "「是我的天真……加深了此刻的困境嗎」" 

# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんとも一部にはあるろーね」
1599 = "「嗯，這也是一部分原因吧」" 

# monologue
# JP: ひどくあっさり、\n真闇姉が僕の過失を断罪する。
2517 = "真闇姐簡單的一句話，宣判了我的過失。" 

# monologue
# JP: 断罪しながらにこにこと、\n僕にその手を、伸ばしてくれる。
2564 = "與此同時，她卻向我伸出了手。" 

# 【真闇】
# display as 真闇
# JP: 「けど、ウチはおねえちゃんやけんね。\n双ちゃんのこと、おせっかいでも助けよるんよ」
1406 = "「不過，我可是當姐姐的咧。就算是說我多管閒事，我也會幫助小雙哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これ、は？」
1926 = "「這是？」" 

# monologue
# JP: 真闇姉の手には、紙がある。\nペラ紙、ほんの数枚が。
2512 = "真闇姐手裡，拿著幾頁紙張。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの理念が、お金に負けるばかりじゃなかいう、\n証たい」
1925 = "「這是證據。證明小雙的理念，並不總是輸給金錢的證據」" 

# 【双鉄】
# display as 雙鐵
# JP: 「証？　\n……っ！！」
1903 = "「證據？……啊！！」" 

# monologue
# JP: 見た瞬間に、感謝と喜びが沸き起こり、\n同時にストンと、足元が消えたような恐怖を浴びせられる。
2350 = "我定睛一看，心中瞬間泛起感激與喜悅。而同時，又有一種失足墜崖的恐懼感。" 

# monologue
# JP: これほど大きな盲点を――\n僕は、僕らは、放置してしまっていたのかと。
2284 = "如此巨大的盲點——我們竟然忽略至今。" 

# 【真闇】
# display as 真闇
# JP: 「同意書と名簿ばあるばい。細かな条件は、\n双ちゃんたちにしか決められんけん、詰めとらんけど」
1929 = "「這裡有同意書和名單咧。具體條件需要由你們來決定，所以我沒寫」" 

# 【双鉄】
# display as 雙鐵
# JP: 「炭鉱、技術者さんたちの――\nかつて、術仙炭鉱で働いていた」
1796 = "「曾就職於術仙煤礦的技工名單」" 

# 【真闇】
# display as 真闇
# JP: 「代替のきかん人たちやけん。\nおせっかいかと思うたけど、まぁ」
1923 = "「這些都是無可替代的人才。雖然可能是我多管閒事吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おせっかいどころか――」
1689 = "「怎麼可能是多管閒事——」" 

# monologue
# JP: 絶対に手放してはいけない生命線のひとつを、\n僕らは無防備に放置してしまっていた。
2121 = "一條絕不能失去的生命線，被我們毫無防備地擱置在那裡。" 

# monologue
# JP: 真闇姉が事前に動いてくれてなければ、\nそこを向こうに握られていてもおかしくなかった。
2567 = "若不是真闇姐事先採取行動，完全有可能已經被對方控制住了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――本当に助かった。\nありがとう、真闇姉」
1081 = "「——真是幫大忙了。謝謝你，真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「こんなんはねぇ、自分のためよ。\n右田一酒蔵元も出資するけんねぇ」
1732 = "「我這麼做都是為了自己呀。畢竟右田一釀酒廠將來也會出資的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても――やはり、ありがとう」
1674 = "「就算是這樣——還是謝謝你」" 

# monologue
# JP: 深々と頭を下げれば、\nふっ、と小さく鼻が鳴る。
2496 = "看到我深深低下頭，真闇姐輕笑一聲。" 

# 【真闇】
# display as 真闇
# JP: 「感謝の気持ちやったら双ちゃん。\n言葉より、形で示すのが上等よね」
1662 = "「小雙，你要是想表達感謝的話，與其用話語，還是用行動來表達更好呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「形で――どんな形で示せば」
1888 = "「行動——要怎麼行動呢」" 

# 【真闇】
# display as 真闇
# JP: 「それはもちろん、\nマイントレジャーば成功させることたい」
1957 = "「那當然是，把煤探樂園辦成功咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら――」
1959 = "「那麼——」" 

# monologue
# JP: 同じ過ちは繰り返さない。
2335 = "我不會重蹈覆轍。" 

# monologue
# JP: 背伸びなど、余裕があるときにすればいい。\n今は、自分の無知と無力さを認めるべきだ。
2536 = "等渡過了危機，再逞強也不遲。現在，我應該承認自己的無知與無力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「教えてくれ、真闇姉。\n僕は、そうするために何をすればいい？」
1514 = "「告訴我，真闇姐。我要怎麼做才能成功？」" 

# 【真闇】
# display as 真闇
# JP: 「まずは、無いものを欲しがるのをよして、\nあるものを使い切るようにしたほうが良かとね」
1974 = "「首先，別再去強求那些得不到的，而是應該充分利用現在所擁有的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん。そうだな」
1533 = "「啊——嗯。說得對」" 

# monologue
# JP: 6人からしか応募がないと嘆くのではなく、\nこの状況下、6人が応募してくれたことを感謝する。
2124 = "不再為只有六個人來應聘而失望，而是應該感謝在這樣的情況下，還有六個人來應聘。" 

# monologue
# JP: その上で、6人の能力と意志とを\nフルに活かせるようにして――ああ、いや、そうか。
2137 = "並且充分去利用這六個人的能力與意志——啊，原來如此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無いものを欲しがるから……\n実際以上に、僕は追い詰められた気になったのか」
1801 = "「正因我得不到還要去強求……才會覺得情況比實際更糟糕」" 

# 【真闇】
# display as 真闇
# JP: 「そう。まず、自分らの現状を正確に把握せんといけんね。\nそうせんままに相手さんに対応すれば、泥仕合ばい」
1806 = "「沒錯。首先要正確認識自己所處的狀況。如果不對自己有清楚的認識就去與對方相抗衡，就成亂打一氣咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そして泥仕合に持ち込まれれば――\n資本力と組織力に勝る向こうが、勝ってしまうのか」
1107 = "「……而一旦變成亂戰——擁有更強資本實力與組織能力的對方，就會贏得勝利」" 

# monologue
# JP: ならば或いはそれこそが、\n宝生元忠の狙いであったのかもしれん。
2630 = "那麼，或許這才是寶生元忠的目的。" 

# monologue
# JP: こちらが対応したくなるような仕掛けをいくつも、\nほとんど手当たり次第のように、張り巡らせて。
2148 = "他準備了一個又一個，消磨我們鬥志的計謀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらの方が少数なのだ。最初からそれは変わらない。\n同じ土俵でぶつかっていては、勝てんのだ」
1710 = "「我們是人少的那一方，這點從來沒有改變過。如果與他硬碰硬，我們是無法獲勝的」" 

# monologue
# JP: 向こうが受けて立っていようが、\n一転、攻勢をかけてこようが、その根本は変わらない。
2470 = "無論對方採取守勢，還是主動發起進攻，其本質還是不會改變。" 

# monologue
# JP: 防戦に回れば、ジリ貧になり押しつぶされる。\nならば――こちらはこちらの戦いで逃げ切るしか無い。
2272 = "如果我們打成防守戰，就會陷入慢性死亡。所以——我們必須在自己的主場迎敵。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの勝利条件は、最初から何も変わっていない。\n追い詰められてあがいているのは、むしろ向こうだ」
1711 = "「我們的勝利條件從來沒有變過。反而是對方被逼入了絕境，開始垂死掙扎」" 

# monologue
# JP: 無論、そのあがきは猛烈だ。
2487 = "當然，他們的掙扎相當激烈。" 

# monologue
# JP: 死に物狂いのヒグマの如き反撃を、\n無駄なあがきとあざ笑うなら、すぐさま叩き潰されよう。
2570 = "若我們將那猶如垂死巨熊一般的反擊，笑作是無謂的抵抗，那麼我們必將招致毀滅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――大臣視察を、合格点で乗り切ればいい。\nそれだけ出来れば、僕らの勝ちは揺るがなくなる」
1074 = "「——只需要在大臣視察那天，拿到合格分就好。那樣一來，我們就能穩操勝券了」" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんとしたら、合格点で乗りきれっと？」
1894 = "「要怎麼做，才能拿到合格分咧？」" 

# monologue
# JP: 試験するような真闇姉の声。
2510 = "真闇姐如此問道，就好像在考我一般。" 

# monologue
# JP: 真闇姉が試験官なら、\n誤答を恐れる必要などない。
2395 = "既然考官是真闇姐，我就不必害怕答錯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「為すべきことのミニマムをまず洗い出す。\nそして、それに必要な工数をなんとしても確保する」
1469 = "「先計算出能支撐起計劃進行的最小需求。然後拚盡全力，湊齊能滿足這個最小需求的人力」" 

# monologue
# JP: 単純極まる手段ほど、覆すのは難しい。\n必要最低限度の、工数。
2610 = "越單純的手段，越難被推翻。" 

# monologue
# JP: それを埋めれば――\n相手に何人確保されようと、影響されずに勝てるのだ。
2219 = "只要能夠湊齊運營所需的最少人數，無論被對方搶走多少人，都無法阻擋我們取勝。" 

# 【真闇】
# display as 真闇
# JP: 「やったら、頑張ってそぎゃんとせんとね」
1749 = "「既然如此，就要好好努力咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 

# monologue
# JP: 合格点を、与えてもらった。\n背中を、とん、と押して貰えた。
2518 = "真闇姐給出了合格分。她在背後推了我一把。" 

# monologue
# JP: それがなにより、ありがたい。\nここから先は――迷わずに済む。
2620 = "這正是我此刻最需要的。如此一來——我就不會再迷茫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするために。真闇姉。\n僕に、僕らに――力を貸して欲しいんだ」
1819 = "「為了實現這個目標……真闇姐，我希望你能幫助我——借給我們你的力量」" 
