[script]
# lines: 419 
# 【双鉄】
# display as 雙鐵
# JP: 「っと？　早すぎたか？」
1527 = "「哎呀？來得太早了嗎？」" 

# monologue
# JP: 時刻はすでに、午前零時を過ぎている。
2402 = "時間已經過了午夜０點。" 

# monologue
# JP: ポーレットからの電話を受けて飛び出したのだが……
2356 = "我接到波萊特的電話，急匆匆地就趕了過來……" 

# 【双鉄】
# display as 雙鐵
# JP: 「いささか、気が急きすぎてしまったか。\n徒歩の方が良かったかもしれんな」
1772 = "「是我太心急了嗎。或許應該走過來的」" 

# monologue
# JP: 登呂流湯からの\nポーレットたちの移動手段は地上型の\x%lエアクラ;#00ffc040;エアクラ%l;#;だろう。
2446 = "波萊特她們從登呂流浴場回來，應該是乘坐了陸地型\\x%lエアクラ;#00ffc040;空凝機%l;#;。" 

# monologue
# JP: 空を使った、そのために、\n僕はいささか、早く着き過ぎてしまったらしい。
2548 = "而我走了空路，所以到得有些太早了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「合鍵は預かってはいるが――」
1969 = "「雖然我有備用鑰匙——」" 

# monologue
# JP: ……ふたりの城に、勝手に僕が上がりこむのも気が引ける。
1064 = "……但我並不想擅自闖入她們二人的城堡。" 

# monologue
# JP: それに、心地良い夏の夜だ。\n風に吹かれて待ってみるのも悪くない。
2545 = "而且，這麼一個舒適的夏夜，吹著晚風等等她們也不壞。" 

# monologue
# JP: （リ……リ……）
2647 = "（吱……吱……）" 

# monologue
# JP: 黙って立てば、虫の音がそっと押し寄せてくる。
2370 = "我靜下心來，便聽到了周圍的陣陣蟲鳴。" 

# monologue
# JP: そうか、と思う。\nもうすぐ、夏も終わるのだ。
2298 = "對啊。夏天，就要結束了。" 

# 【れいな】
# display as 玲奈
# JP: 「あ、ポーレット！　そうてつさんですぅ」
1568 = "「啊，波萊特！是雙鐵先生」" 

# monologue
# JP: 夜の中からぽてぽて足音。\n歩幅を合わせた軽い足音もそれに重なる。
2641 = "靜夜裡，傳來一陣小巧的腳步聲。相伴而來的是與其步調一致的輕盈腳步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、歩いて帰ってきたのか」
1435 = "「什麼呀，原來你們是走路回來的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「近くですし、気持ちいい夜でしたから」
1603 = "「因為距離挺近的，而且今晚感覺很舒爽」" 

# monologue
# JP: ポーレットの声は晴れやかだ。
2449 = "波萊特的聲音顯得很開朗。" 

# monologue
# JP: 電話で聞くのは違うかと、\nあえて話題に乗せなかったが――
2363 = "我覺得在電話裡問不太合適，所以之前故意沒提起——" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな。改修はどうだった？」
1828 = "「玲奈。改造情況怎麼樣？」" 

# 【れいな】
# display as 玲奈
# JP: 「へいちゃらでした！　あっという間に、\nれいなのロールバック、おわっちゃいましたぁ！」
1647 = "「小事一樁！玲奈的回滾操作，不一會就完成了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。良くがんばったな」
1587 = "「嗯。玲奈這次很努力啊」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ねむってただけですよぉ？」
1833 = "「玲奈，只是睡著了而已哦？」" 

# monologue
# JP: 戸惑いと照れの混じる顔。\n頭を撫でる僕の手に、くすぐったそうな素振りをみせる。
2263 = "她的小臉蛋上，透著困惑與羞澀。我伸手摸摸她的腦袋，她便好像有些怕癢一般，縮了縮脖子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「眠っていても、がんばったのさ」
1669 = "「就算只是在睡覺，你也努力了啊」" 

# monologue
# JP: だから記憶を、きっと手放さずに済んだ。
2414 = "正因如此，她才沒有失去記憶吧。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の記憶が単なるデータに留まらないなら、\nれいなの意志と願いとは、必ず結果に関わろうから。
2279 = "如果說\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的記憶並非只是一串數據，那麼玲奈的意志與願望，必定會影響到結果。" 

# 【ポーレット】
# display as 波萊特
# JP: 「中、入りましょう？\nこんな時間に立ち話もアレですし」
1712 = "「我們進屋吧？這麼晚了，站在外面說話也不合適」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな」
1595 = "「嗯，是啊」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、カギあけますねぇ」
1831 = "「玲奈去開門」" 

# monologue
# JP: 小走りにドアへかけよって、\nがちゃがちゃ、嬉しげにカギを回してドアを開く。
2253 = "她小跑到門前，滿心歡喜地轉動鑰匙，打開了門。" 

# monologue
# JP: ぱ、と電気がともされる。\nそれだけのことで、安堵を感じる。
2474 = "燈光照亮了屋內。僅僅這樣一件平淡無奇的小事，就讓我感到安心。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、お茶いれてきますねぇ」
1830 = "「玲奈去泡茶哦」" 

# monologue
# JP: 改修の成果か、不安から解放された影響か、\nれいなはいつもよりもキビキビしている。
2128 = "不知是得益於改造，還是因為從擔憂中得到了解放，玲奈的動作比往常還要俐落。" 

# monologue
# JP: 自分の体を動かすことが、もう楽しくて仕方ない――\nそんな気持ちが、仕草の端々から溢れるようだ。
2122 = "一舉一動，都彷彿透露著她有多麼樂於活動自己的身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……どうやら、何の支障も生じなかったようだな」
1104 = "「……看來，並沒有出現任何問題啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「まだわからないそうです。不具合の発生確率は、\n[いっとき,1]一時に処理する情報量に比例するそうですから」
1849 = "「目前還不能確定。發生故障的機率，似乎是與瞬時訊息處理量成比例的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか――\nああ、いや、そういうものだろうな、当然に」
1791 = "「是這樣啊——哦，也對啊，當然是這樣了」" 

# monologue
# JP: ロールバックされたのは、\n\x%lキハ07;#00ffc040;キハ07%l;#;の運転操作や保守管理に関する情報と――
2267 = "她這次回滾的是\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的駕駛操作與維護管理訊息，以及——" 

# monologue
# JP: それに付随しているかもしれない、記憶たちとだ。\nレールショップの中で引き出されることは無かろうが……
2198 = "包含在訊息中的那些記憶。雖然這些記憶並不會在鐵路商店被觸發……" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;の改修や、改修後運転のときなどに――」
1451 = "「但是在\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的改造過程中，以及改造完成後的駕駛過程中——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。出ちゃうとしたらそういうときだろうって、\n登呂流湯さんもおっしゃってました」
1784 = "「是的。登呂流浴場老闆說——如果要故障，多半是在這種時候」" 

# monologue
# JP: ポーレットの声は暗くない。
2450 = "波萊特的語調並不低落。" 

# monologue
# JP: 出たとして――それは乗り越えられるものだと、\n僕同様、確信できているのだろう。
2250 = "她也與我一樣，相信就算出了故障，我們也能夠渡過難關。" 

# 【双鉄】
# display as 雙鐵
# JP: 「居眠りを解消できたかの確認もふくめ、\nできるかぎり早期に試験運転をしたいものだな」
1850 = "「真希望能儘早進行試運營，也好確定打瞌睡的問題是不是已經解決了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nあの、双鉄くんの方は――」
1589 = "「嗯。那個，雙鐵君那邊怎麼樣——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その辺も含め、お話ししてきた。\n蓑笠さんも、すぐに動いてくださるそうだ」
1483 = "「包括玲奈的事在內，我已經去談過了。蓑笠先生也表示會立刻做好準備的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「良かった。ありがとうございます」
1615 = "「太好了。非常感謝」" 

# monologue
# JP: ほうっと胸をなでおろし、\nポーレットの体は少し緩んで、椅子にもたれる。
2452 = "波萊特鬆了一口氣，放鬆了身體，靠坐在椅子上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;の復旧改修は、かなり簡単にできそうなんです」
1745 = "「據說\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的復原改造，會非常簡單」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1770 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。鉱山鉄道の技師さんたちは、もともと、\nディーゼル[かんそう,1]換装は無理筋だってわかってたみたいです」
1786 = "「是的。礦山鐵路的技師們似乎原本就知道，柴油化改裝是一個不明智的做法」" 

# monologue
# JP: ならば改修計画自体、経営者側なり何なりに、\n無理に押し付けられたのだろうか？
2627 = "那就是說，是迫於經營方或其它方面的壓力，才不得已進行了那次改造嗎？" 

# 【ポーレット】
# display as 波萊特
# JP: 「足回りやＯＳ周りに過負荷がかかることを承知で、\nそれでも、ディーゼル化を進める必要があって」
1758 = "「明知會造成行駛系統及操作系統方面的過載，還是必須進行柴油化改裝」" 

# monologue
# JP: 僕の想像が恐らく正しいものであると、\nポーレットの落ち着いた声は示してくれる。
2448 = "波萊特用沉穩的聲音，印證了我的猜想。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから……なんだと思いますけど、\n換装は、復旧を前提にされていたんです」
1721 = "「我想……或許就是出於這個原因。柴油改裝是以將來復原為前提進行的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すぐにもとの、ガソリン\x%l気動車;#00ffc040;気動車%l;#;に戻せるようにか？」
1820 = "「為了能夠快速復原到本來的汽油\\x%l気動車;#00ffc040;動車%l;#;嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです。でも、復旧可能にするための各種の機構は、\n\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;として稼働する上では、負荷ですよね」
1777 = "「是的。但是，這些用於復原的各種構造，在作為\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;運行的時候，卻會變成負擔呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その負荷もまた、れいなの、\nあるいは\x%lキハ07;#00ffc040;キハ07%l;#;の不安定さの一因となった？」
1875 = "「而這一負擔，也成為了玲奈或者\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;運行不穩定的原因之一？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「も、あるって。登呂流湯さんは。\nＯＳ面でも、冗長な独自処理が目立ったそうです」
1846 = "「登呂流浴場老闆說，的確有這個原因。在操作系統方面，其冗長的獨立處理方式也造成了很大的問題」" 

# monologue
# JP: 困った顔での、あいまいな頷き。
2270 = "她面露難色，不太確定地點點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、そうしておいてもらえたから――\nわたしたちは今、すごく助かってるわけですし」
1457 = "「但是，正因為技師們當初的這個決定——我們如今才能夠如此順利地進行復原」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。\nそうした全てを含め、僕らは、れいなを託されたんだ」
1764 = "「是啊。他們將玲奈託付給我們，同時還寄託了這方面的希望啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね」
1769 = "「是啊」" 

# monologue
# JP: ほっとした顔。\nだれてた体が、起き直る。
2258 = "她流露出釋然的神情，坐直身子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ロールバックをできたこと、れいなにとって、\n複数の意味で良いことだって、今は素直に思います」
1724 = "「我現在真心認為，完成回滾對玲奈而言，有著多方面的好處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1590 = "「嗯」" 

# monologue
# JP: それがどのような荷であれど、\n受け渡されたものを受け取り、前へ進めて次へと繋ぐ。
2471 = "無論收到的是怎樣一件貨物，我們都要鄭重地收下並向前駛去，並託付給下一個正確的人。" 

# monologue
# JP: 僕らがやっていることは、鉄道輸送と同様で、\nあるいはそれは、人の営み全てと同様なのかもしれん。
2345 = "我們所做的這件事，與鐵路運輸是一個道理。或者說，這就和人生所要做的事情完全一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなが託してもらったものを、フルに活かそう。\nそれがれいなにも僕らにも、きっと御一夜にも一番いい」
1677 = "「就讓我們好好運用技師們託付給玲奈的東西吧。這對於玲奈、我們，對於御一夜而言，一定都是最好的選擇」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1787 = "「是的！」" 

# 【れいな】
# display as 玲奈
# JP: 「お茶です。どうぞぉ」
1878 = "「茶來了。請用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お、すまんな」
1531 = "「哦，謝啦」" 

# monologue
# JP: 一口ふくんだとたんに感じる。\n今日の紅茶は、いつも以上にふくよかだ。
2238 = "喝了一口我馬上感受到——今天的紅茶比平常更加香濃。" 

# 【れいな】
# display as 玲奈
# JP: 「よいしょ」
1600 = "「嘿咻」" 

# monologue
# JP: 嬉しげにポーレットの膝に座って、\nれいなは自分のスキットルから――
2481 = "玲奈高興地坐到波萊特膝上，拿出她的扁酒壺——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはもう既にガソリンなのか」
1644 = "「對了，現在這裡面裝的是汽油啊」" 

# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。\nポーレット、お祝いにハイオクを買ってくれましたぁ」
1761 = "「是哦。波萊特為了慶祝，給玲奈買了高辛烷值汽油哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。どっちがうまい？」
1927 = "「這樣啊。哪種更美味？」" 

# 【れいな】
# display as 玲奈
# JP: 「どっちもおいしいですよぉ？\nコクがあると、キレがあるの違いなのです」
1473 = "「兩種都很美味哦？一種比較濃郁，一種比較清爽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな――っと、おいしいといえば、\n弁当の件もかなり進んだ」
1487 = "「原來如此——啊，說到美味，便當的事也有了很大的進展」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、駅弁ですね」
1573 = "「啊，鐵路便當是吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、献立のアイディアはだいぶ固まった。\n一週間後には、試食品を持ってきてくれるそうだ」
1597 = "「嗯，菜單已經大概定下來了。永山女士說一星期後會帶來試吃品」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ、楽しみです。\n献立って、どんな感じになりそうですか？」
1526 = "「哇，好期待。是什麼樣的便當呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「キジ馬をキーとするお弁当でいってみることとなった。\n主役となるキジ馬は、鮎の甘露煮で作るそうだ」
1709 = "「我們打算嘗試用雉子馬作為便當的主題。作為主角的雉子馬，好像會用香魚甘露煮來做」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　言われると似てるかも」
1550 = "「啊！這麼一說好像挺像的」" 

# monologue
# JP: 永山夫人と日々姫が連鎖しあって決めたメニューを\n聞かせていけば、れいなの目までが輝きを増す。
2553 = "聽我說起永山女士和日日姬一同構想出的菜單，連玲奈都開始兩眼放光起來。" 

# 【れいな】
# display as 玲奈
# JP: 「ふわぁ！\nきっと、かわいくっておいしいお弁当になりますねぇ」
1522 = "「哇！一定會是一份既可愛又美味的便當」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ほんと、楽しみ。\nあ――でも、わたしの分もあるのかなぁ」
1852 = "「真是好期待。啊——但是不知道有沒有我的份呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――試作だし、一つだけかもしれんな。\nその場合は、わけあって食べる形でどうだろう？」
1424 = "「也對——只是試作品而已，說不定只有一份啊。那樣的話，我們就分著吃怎麼樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はいっ！　それ、いいと思います。\nあの――ええとっ……」
1562 = "「啊，好的！這個主意非常棒。那個——嗯……」" 

# monologue
# JP: 箸をにぎるような形でふらふら、\nポーレットの手が彷徨い動く。
2445 = "波萊特做出一個拿筷子的動作，然後彷彿不知該放哪裡一般，她的手漫無目的地遊蕩著。" 

# monologue
# JP: そうして口が開いて、閉じて――\nこほん、とひとつ咳払い。
2240 = "嘴巴先是張開，又合上——最後清了清嗓子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「楽しみですね、お弁当」
1855 = "「真是期待能吃到便當呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1769 = "「是啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか――ありがとうございます。\nわたし、任せきりにしちゃって」
1700 = "「應該說——真是謝謝你。我把這些事全都推給你來辦了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互い様だ。僕も多くを、\nポーレットに任せているわけだしな」
1686 = "「彼此彼此。我也把很多事情交給了波萊特了嘛」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――そうでした」
1536 = "「啊——對了」" 

# monologue
# JP: 思い出した、と言わんばかりの咳払い。
2252 = "她又清了清嗓子，好像想到了什麼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「報告遅れちゃいましたけど、ニイロクちゃんの改修も、\n改修終了時では何の問題もなく成功しました」
1719 = "「我忘記向你匯報了，二六的改造——在改造結束時沒有出現任何問題，成功了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ニイロクはなにか言っていたか？」
1426 = "「二六有說什麼嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「特には……ただ、キハ[レイナナ,1]07が\x%lダイコン;#00ffc040;ダイコン%l;#;だからですかね？\n“思ったよりもややこしい”とかは言ってました」
1804 = "「沒說什麼……只是，或許因為Ｋｉｈａ０７是\\x%lダイコン;#00ffc040;直控%l;#;的吧？她後來說“比想像中還要複雜”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大根？」
1742 = "「指控？」" 

# monologue
# JP: 思わず、れいなの足を見る。
2336 = "我不禁看了看自己的手指。" 

# monologue
# JP: 肉など本当に最小限で、\n大根というより、ごぼうに近いものに見えるが――
2637 = "難道說，玲奈身上還有什麼指控開關——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああ、違いますよ双鉄くん。\x%lダイコン;#00ffc040;ダイコン%l;#;は、\nダイレクトコントロール……直接制御方式のことです」
1553 = "「啊，不是的啦，雙鐵君。所謂\\x%lダイコン;#00ffc040;直控%l;#;，是指ＤｉｒｅｃｔＣｏｎｔｒｏｌ——直接控制方式」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　レイナナの運転装置の話か」
1547 = "「啊！原來是在說０７的駕駛裝置啊」" 

# monologue
# JP: 納得いくが、疑問も感じる。
2368 = "我雖然是想通了，但同時也有一些疑惑。" 

# monologue
# JP: ハチロクの運転装置と比べると、\nあれは随分、すっきりと簡素なものだとしか思えない。
2358 = "我是隻覺得Ｋｉｈａ０７的駕駛裝置與八六的相比已經簡單很多了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「クハ２６は、\x%lマスコン;#00ffc040;マスコン%l;#;搭載車輌だったんで。だから」
1981 = "「Ｋｕｈａ２６是搭載了\\x%lマスコン;#00ffc040;中控%l;#;的車輛。所以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lマスコン;#00ffc040;マスコン%l;#;？」
1073 = "「\\x%lマスコン;#00ffc040;中控%l;#;？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「マスターコントローラーです。電気制御で……\n四輪自動車のオートマチックみたいな運転装置です」
1664 = "「就是中央控制器。通過電力控制……與四輪驅動車的自動變速箱相似的駕駛裝置」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そんな便利なものがあるのか」
1437 = "「什麼，還有這麼方便的東西嗎」" 

# monologue
# JP: ギアの操作を――
2563 = "自動控制檔位——" 

# monologue
# JP: ハチロクでいうなら\x%l逆転機;#00ffc040;逆転機%l;#;ハンドルの細かな操作を、\n蒸気量にあわせオートで制御してもらえるなら……
2275 = "如果用八六來比喻的話，就是可以自動根據蒸汽量對\\x%l逆転機;#00ffc040;回動機%l;#;的手把進行精確控制……" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは楽だな。それと比べれば、\x%l8620;#00ffc040;8620%l;#;や\x%lキハ07;#00ffc040;キハ07%l;#;は、\n旧式のマニュアル操作に感じるわけか」
1947 = "「那可真是方便啊。相比之下，難怪會覺得\\x%l8620;#00ffc040;８６２０%l;#;與\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的手動操作有多舊式了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです。だからちょっととまどったみたいで。\nでも、赤井宮司は\x%lダイコン;#00ffc040;ダイコン%l;#;操作経験もあるそうですから」
1781 = "「是的。所以一開始似乎費了些功夫。不過赤井宮司好像也有\\x%lダイコン;#00ffc040;直控%l;#;的操作經驗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に運転操作を指導するのか？」
1840 = "「由人類來指導\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;如何駕駛嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「よほどの不具合が出ちゃえば――ですよね。でも、\n登呂流湯さんは『問題なさそう』って言ってました」
1797 = "「會讓人覺得\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;出了大問題對吧。不過，登呂流浴場老闆說沒有問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1928 = "「這樣啊」" 

# monologue
# JP: れいなのバックアップデータをまるごと取り込み、\nその上で、全くの不整合を出さないのなら――
2143 = "二六不但能將玲奈的備份數據全部讀入，並且還能完全不出現任何相容性的問題——" 

# monologue
# JP: 最新鋭機種のトップナンバー\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nやはりそれだけの余裕をもって作られたのだろう。
2403 = "最新車型的首車\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，果然還保留了巨大的發揮空間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司とも、もう？」
1459 = "「你還見到赤井宮司了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ニイロクちゃんを迎えにきてくださったんで。\nそのときに」
1788 = "「是的，他來接二六回家。於是我就見到他了」" 

# monologue
# JP: ふふっと、楽しげな笑いが漏れる。
2451 = "波萊特笑得很開心。" 

# 【ポーレット】
# display as 波萊特
# JP: 「赤井宮司さん……すごく喜んでらっしゃいました。\n出来ることがあればなんでも手伝うっていってくれて」
1908 = "「赤井宮司……看起來非常高興。他說如果有什麼能幫上忙的，可以儘管提」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら――というのもアレだが」
1970 = "「雖然這麼說有點厚臉皮，不過——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、大臣視察で市長のわたしが欠席は出来ませんから。\nそのときの\x%lキハ07;#00ffc040;キハ07%l;#;の運転、お願いしてＯＫもらいました」
1591 = "「嗯，在大臣來視察的那天我作為市長不能缺席。所以我拜託宮司在那天代替我駕駛\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;，他同意了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1928 = "「這樣啊」" 

# monologue
# JP: 改修前に頼むのも違う気がして言い出せないでいたことを、\nポーレットはきっちり、頼んでくれた。
2362 = "我覺得在改造開始之前提這件事不太合適，於是便沒開口。結果波萊特也想到了這一點。" 

# monologue
# JP: 以心伝心というのは些か大げさだが、\n実に悪くないチームワークだ。
2590 = "要說心有靈犀或許有些誇張，但我們的團隊配合可真是默契。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、\nそれだとれいなに、少し気の毒をすることになるな」
1405 = "「不過這樣的話，玲奈就有點可憐了呀」" 

# 【れいな】
# display as 玲奈
# JP: 「ふぇっ！？」
1529 = "「哎！？」" 

# monologue
# JP: 急に話をふられたせいで、れいなが驚いた顔になる。
2533 = "突然被我提到名字，玲奈露出很驚訝的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「せっかく改修した\x%lキハ07;#00ffc040;キハ07%l;#;なのに、\n訓練もあるし……れいなは、しばらく動かせそうに」
1071 = "「\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;好不容易改造完，但還要給二六訓練……恐怕玲奈暫時是不能駕駛了」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、そのことだったら平気ですよぉ。\nだって、かわりばんこですからぁ」
1572 = "「啊，這個沒關係的。因為我們今後要交替行駛的嘛」" 

# monologue
# JP: にこにこと、れいなの笑顔に屈託はない。
2478 = "玲奈露出純真的笑容。" 

# 【れいな】
# display as 玲奈
# JP: 「いそがしいのがおわったら、\nれいな思いっきりに動かすのです！」
1869 = "「等忙完這陣子，玲奈會盡情地開動它的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。\nそのときは、僕にも同乗させてくれ」
1943 = "「那可真不錯。到時候，讓我也當一回乘客吧」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　うれしいですぅ！\nなら、約束ですねぇ、ポーレット」
1524 = "「哇！好開心！波萊特，那我們一言為定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1590 = "「嗯」" 

# monologue
# JP: 両手を使い、三人輪になり、ゆびきりげんまん。
2344 = "我們三個人手拉手圍成一圈，彼此拉鉤。" 

# monologue
# JP: それを終えれば満足したのか、れいなはまたももぞもぞと、\nポーレットの膝の上へと戻る。
2473 = "然後玲奈心滿意足地慢慢爬回了波萊特的膝蓋上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。過去に炭鉱で働いてた方々と、テーマパークの\n……キャスト？　だったかの募集については――」
1643 = "「對了。關於那些過去在術仙煤礦工作的前職工，以及煤探樂園的……呃，演員？該如何招聘——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんにお願いしてあります。キャストの方は、\n駅貼りポスターと中吊りとで募集します」
1715 = "「我已經拜託真闇小姐了。演員方面的話，會透過車站海報以及懸吊廣告牌來進行招聘」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、真闇姉なら間違いないな。\nとはいえ」
1555 = "「啊，交給真闇姐就不會有問題了。不過——」" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁあ」
1516 = "「呼啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1978 = "「！？」" 

# monologue
# JP: 完全に不意を突かれて、体がビクリと動いてしまう。\n途端、れいなが僕より遥かに慌てふためく。
2477 = "玲奈出乎意料的一個哈欠，頓時令我渾身都緊張了起來。隨後，玲奈立刻表現得比我還要慌張。" 

# 【れいな】
# display as 玲奈
# JP: 「あ、れいな、処理落ちとかじゃないですよ？\nえとっ」
1569 = "「啊，玲奈，並不是處理脫節哦。那個」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかってる。ごめんね。\nこんなに夜更かしさせちゃうことって、ないもんね」
1726 = "「我知道。抱歉啊。之前從來沒讓你熬夜到這麼晚過呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1762 = "「是啊——」" 

# monologue
# JP: やけに無口だと思ったら、\nれいなは睡魔と戦っていたのか。
2367 = "我還在想玲奈怎麼格外安靜，原來是在與睡意作鬥爭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「長話をしてしまったな。今日はここまでにしよう。\nれいな、ゆっくり休んでくれ」
1389 = "「一不小心聊太久了啊。今天就到這裡吧。玲奈，好好休息」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、おやすみなさい、ポーレット、そうてつさん」
1618 = "「好的。晚安，波萊特，雙鐵先生」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おやすみ、れいな」
1794 = "「晚安，玲奈」" 

# monologue
# JP: ずるずる、足取りまでもが引きずるようで、\n見ているこちらも、どんどん眠くなってくる。
2256 = "她拖著乏困的腳步，慢慢走向裡屋。看到她那個樣子，連我也感覺越來越睏了。" 

# monologue
# JP: れいなの姿が完全に奥へと消えてしまうと、\nなんとも言えぬ……微妙な沈黙が垂れ込める。
2489 = "當玲奈的背影完全消失在裡屋，我們二人陷入到一種難以言喻的沉默當中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……双鉄くん。よければ――\nこのまま、泊まって行きませんか？」
1939 = "「那個……雙鐵君。你看要不——今晚就留下過夜吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1976 = "「！」" 

# monologue
# JP: 甘い誘いを、僕も半ばは期待していた。\nだから言葉は、素直に出てくる。
2180 = "其實在我的心底，同樣也期待著她甜蜜的邀請。所以，我就老老實實地回答道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「明日がなければ、泊まって行きたい。\nが――今は」
1619 = "「如果明天沒有事，我也很想留下過夜。可是，現在這個時期——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー……ですよね。\n少しでも、準備すすめなきゃですもんね」
1540 = "「啊……也是啊。現在必須儘可能多做準備」" 

# monologue
# JP: 僕の返事を、\nポーレットも半ば予想してくれていたのかもしれない。
2371 = "或許波萊特也預料到了我的回答。" 

# monologue
# JP: 残念そうなその声にはけど、\n落ち込むような感じは混じらず、ホっとする。
2264 = "她的聲音雖然有一些遺憾，卻也並不失落，讓我鬆了一口氣。" 

# 【ポーレット】
