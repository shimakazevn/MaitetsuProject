[script]
# lines: 419 
# 【双鉄】
# display as 雙鐵
# JP: 「っと？　早すぎたか？」
1527 = "「Ủa? Mình đến sớm quá sao?」"
# monologue
# JP: 時刻はすでに、午前零時を過ぎている。
2402 = "Thời gian đã qua nửa đêm."
# monologue
# JP: ポーレットからの電話を受けて飛び出したのだが……
2356 = "Nhận được điện thoại từ Paulette, tôi đã vội vã lao ra khỏi nhà nhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「いささか、気が急きすぎてしまったか。\n徒歩の方が良かったかもしれんな」
1772 = "「Có hơi hấp tấp quá rồi chăng. Có khi đi bộ đến lại hay hơn.」"
# monologue
# JP: 登呂流湯からの\nポーレットたちの移動手段は地上型の\x%lエアクラ;#00ffc040;エアクラ%l;#;だろう。
2446 = "Phương tiện di chuyển của nhóm Paulette từ Tororyu-yu về chắc là \\x%lエアクラ;#00ffc040;Aircra%l;#; đường bộ."
# monologue
# JP: 空を使った、そのために、\n僕はいささか、早く着き過ぎてしまったらしい。
2548 = "Vì dùng đường hàng không, nên có vẻ tôi đã đến hơi sớm một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「合鍵は預かってはいるが――」
1969 = "「Dù tôi có giữ chìa khóa dự phòng——」"
# monologue
# JP: ……ふたりの城に、勝手に僕が上がりこむのも気が引ける。
1064 = "……nhưng tôi cũng thấy áy náy nếu tự ý bước vào lâu đài của hai người họ."
# monologue
# JP: それに、心地良い夏の夜だ。\n風に吹かれて待ってみるのも悪くない。
2545 = "Hơn nữa, đêm mùa hè cũng thật dễ chịu. Thử đứng chờ trong gió cũng không tệ."
# monologue
# JP: （リ……リ……）
2647 = "（Ri……ri……）"
# monologue
# JP: 黙って立てば、虫の音がそっと押し寄せてくる。
2370 = "Đứng im lặng, tiếng côn trùng râm ran nhẹ nhàng ùa đến."
# monologue
# JP: そうか、と思う。\nもうすぐ、夏も終わるのだ。
2298 = "Ra là vậy, tôi nghĩ thầm. Mùa hè, cũng sắp kết thúc rồi."
# 【れいな】
# display as 玲奈
# JP: 「あ、ポーレット！　そうてつさんですぅ」
1568 = "「A, Paulette! Là anh Soutetsu đó ạ.」"
# monologue
# JP: 夜の中からぽてぽて足音。\n歩幅を合わせた軽い足音もそれに重なる。
2641 = "Tiếng bước chân lạch bạch vang lên trong đêm. Hòa cùng với đó là tiếng bước chân nhẹ nhàng bắt nhịp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、歩いて帰ってきたのか」
1435 = "「Gì chứ, hai người đi bộ về sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「近くですし、気持ちいい夜でしたから」
1603 = "「Vì cũng gần mà, với lại đêm nay trời rất dễ chịu.」"
# monologue
# JP: ポーレットの声は晴れやかだ。
2449 = "Giọng nói của Paulette thật rạng rỡ."
# monologue
# JP: 電話で聞くのは違うかと、\nあえて話題に乗せなかったが――
2363 = "Nghĩ rằng hỏi qua điện thoại thì không tiện, nên tôi đã cố tình không nhắc đến chủ đề này——"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。改修はどうだった？」
1828 = "「Reina. Việc cải tạo thế nào rồi?」"
# 【れいな】
# display as 玲奈
# JP: 「へいちゃらでした！　あっという間に、\nれいなのロールバック、おわっちゃいましたぁ！」
1647 = "「Không hề hấn gì đâu ạ! Chỉ loáng một cái, việc khôi phục dữ liệu của Reina đã xong xuôi rồi ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。良くがんばったな」
1587 = "「Ừ. Em đã cố gắng lắm rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ねむってただけですよぉ？」
1833 = "「Reina, chỉ ngủ thôi mà ạ?」"
# monologue
# JP: 戸惑いと照れの混じる顔。\n頭を撫でる僕の手に、くすぐったそうな素振りをみせる。
2263 = "Khuôn mặt pha lẫn sự bối rối và ngượng ngùng. Em ấy tỏ vẻ nhột nhạt khi bàn tay tôi xoa đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「眠っていても、がんばったのさ」
1669 = "「Dù là ngủ, thì em cũng đã cố gắng mà.」"
# monologue
# JP: だから記憶を、きっと手放さずに済んだ。
2414 = "Chính vì thế, chắc chắn em ấy mới có thể giữ lại được ký ức."
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の記憶が単なるデータに留まらないなら、\nれいなの意志と願いとは、必ず結果に関わろうから。
2279 = "Nếu ký ức của \\x%lレイルロオド;#00ffc040;Railord%l;#; không chỉ đơn thuần là dữ liệu, thì ý chí và nguyện vọng của Reina, chắc chắn đã tác động đến kết quả."
# 【ポーレット】
# display as 波萊特
# JP: 「中、入りましょう？\nこんな時間に立ち話もアレですし」
1712 = "「Chúng ta vào trong nhé? Đứng nói chuyện giờ này cũng hơi kỳ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな」
1595 = "「À, đúng vậy nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、カギあけますねぇ」
1831 = "「Để Reina mở khóa cho nha.」"
# monologue
# JP: 小走りにドアへかけよって、\nがちゃがちゃ、嬉しげにカギを回してドアを開く。
2253 = "Chạy chậm đến cửa, lạch cạch, vui vẻ xoay chìa khóa và mở cửa ra."
# monologue
# JP: ぱ、と電気がともされる。\nそれだけのことで、安堵を感じる。
2474 = "Bật, đèn được bật sáng. Chỉ với nhiêu đó thôi, cũng khiến tôi cảm thấy an tâm."
# 【れいな】
# display as 玲奈
# JP: 「れいな、お茶いれてきますねぇ」
1830 = "「Reina đi pha trà đây ạ.」"
# monologue
# JP: 改修の成果か、不安から解放された影響か、\nれいなはいつもよりもキビキビしている。
2128 = "Không biết là thành quả của việc cải tạo, hay là ảnh hưởng từ việc được giải phóng khỏi nỗi bất an, Reina hành động nhanh nhẹn hơn hẳn thường ngày."
# monologue
# JP: 自分の体を動かすことが、もう楽しくて仕方ない――\nそんな気持ちが、仕草の端々から溢れるようだ。
2122 = "Việc được cử động cơ thể của mình, đã trở nên vô cùng vui vẻ—— Cảm giác đó như đang tuôn trào qua từng cử chỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「……どうやら、何の支障も生じなかったようだな」
1104 = "「……Có vẻ như, không có trở ngại nào phát sinh nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「まだわからないそうです。不具合の発生確率は、\n[いっとき,1]一時に処理する情報量に比例するそうですから」
1849 = "「Nghe nói là vẫn chưa biết được đâu ạ. Tỷ lệ phát sinh lỗi, có vẻ tỷ lệ thuận với lượng thông tin được xử lý trong \\x%lいっとき;#00ffc040;một lúc%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか――\nああ、いや、そういうものだろうな、当然に」
1791 = "「Là vậy sao—— À, không, chắc là vậy rồi, đương nhiên mà.」"
# monologue
# JP: ロールバックされたのは、\n\x%lキハ07;#00ffc040;キハ07%l;#;の運転操作や保守管理に関する情報と――
2267 = "Những thứ được khôi phục là, thông tin liên quan đến thao tác lái và quản lý bảo trì của \\x%lキハ07;#00ffc040;KiHa 07%l;#; cùng với——"
# monologue
# JP: それに付随しているかもしれない、記憶たちとだ。\nレールショップの中で引き出されることは無かろうが……
2198 = "Những ký ức, có thể đi kèm với chúng. Sẽ không có chuyện chúng được lôi ra khi ở trong Rail Shop nhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;の改修や、改修後運転のときなどに――」
1451 = "「Trong lúc cải tạo \\x%lキハ07;#00ffc040;KiHa 07%l;#;, hay khi lái thử sau cải tạo——」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。出ちゃうとしたらそういうときだろうって、\n登呂流湯さんもおっしゃってました」
1784 = "「Vâng. Nếu có xảy ra lỗi thì chắc là vào những lúc như vậy, ông Tororyu-yu cũng đã nói thế ạ.」"
# monologue
# JP: ポーレットの声は暗くない。
2450 = "Giọng nói của Paulette không hề u ám."
# monologue
# JP: 出たとして――それは乗り越えられるものだと、\n僕同様、確信できているのだろう。
2250 = "Dù có xảy ra lỗi——thì đó cũng là thứ có thể vượt qua được, chắc hẳn cô ấy cũng đang tin tưởng vững chắc như tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「居眠りを解消できたかの確認もふくめ、\nできるかぎり早期に試験運転をしたいものだな」
1850 = "「Bao gồm cả việc xác nhận xem đã giải quyết được tình trạng ngủ gật chưa, tôi cũng muốn chạy thử nghiệm càng sớm càng tốt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nあの、双鉄くんの方は――」
1589 = "「Vâng.\nÀ, còn phía anh Soutetsu thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「その辺も含め、お話ししてきた。\n蓑笠さんも、すぐに動いてくださるそうだ」
1483 = "「Bao gồm cả chuyện đó, anh đã nói chuyện xong rồi. Ông Minokasa cũng bảo sẽ lập tức hành động.」"
# 【ポーレット】
# display as 波萊特
# JP: 「良かった。ありがとうございます」
1615 = "「Tốt quá rồi. Cảm ơn anh.」"
# monologue
# JP: ほうっと胸をなでおろし、\nポーレットの体は少し緩んで、椅子にもたれる。
2452 = "Thở phào nhẹ nhõm, cơ thể Paulette hơi thả lỏng, tựa vào lưng ghế."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;の復旧改修は、かなり簡単にできそうなんです」
1745 = "「Nghe nói việc khôi phục và cải tạo \\x%lキハ07;#00ffc040;KiHa 07%l;#;, có vẻ sẽ khá dễ dàng đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1770 = "「Vậy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。鉱山鉄道の技師さんたちは、もともと、\nディーゼル[かんそう,1]換装は無理筋だってわかってたみたいです」
1786 = "「Vâng. Các kỹ sư của đường sắt khai thác mỏ, dường như ngay từ đầu, đã biết việc \\x%lかんそう;#00ffc040;thay thế%l;#; sang diesel là bất khả thi.」"
# monologue
# JP: ならば改修計画自体、経営者側なり何なりに、\n無理に押し付けられたのだろうか？
2627 = "Nếu vậy thì bản thân kế hoạch cải tạo, là do phía quản lý hay ai đó, đã ép buộc phải thực hiện sao?"
# 【ポーレット】
# display as 波萊特
# JP: 「足回りやＯＳ周りに過負荷がかかることを承知で、\nそれでも、ディーゼル化を進める必要があって」
1758 = "「Dù biết rõ sẽ gây quá tải cho bộ phận chuyển động và hệ điều hành, nhưng vẫn cần phải tiến hành diesel hóa.」"
# monologue
# JP: 僕の想像が恐らく正しいものであると、\nポーレットの落ち着いた声は示してくれる。
2448 = "Giọng nói điềm tĩnh của Paulette, như đang chứng minh rằng suy đoán của tôi có lẽ là chính xác."
# 【ポーレット】
# display as 波萊特
# JP: 「だから……なんだと思いますけど、\n換装は、復旧を前提にされていたんです」
1721 = "「Vì vậy……tôi nghĩ thế, việc thay thế đó, đã được thực hiện với tiền đề là sẽ khôi phục lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すぐにもとの、ガソリン\x%l気動車;#00ffc040;気動車%l;#;に戻せるようにか？」
1820 = "「Để có thể nhanh chóng khôi phục lại thành \\x%l気動車;#00ffc040;toa xe tự hành%l;#; chạy bằng xăng ban đầu sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。でも、復旧可能にするための各種の機構は、\n\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;として稼働する上では、負荷ですよね」
1777 = "「Đúng vậy ạ. Nhưng, các cơ chế các loại để có thể khôi phục, khi hoạt động dưới dạng \\x%lディーゼル気動車;#00ffc040;toa xe diesel tự hành%l;#;, lại trở thành gánh nặng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その負荷もまた、れいなの、\nあるいは\x%lキハ07;#00ffc040;キハ07%l;#;の不安定さの一因となった？」
1875 = "「Và gánh nặng đó, cũng là một trong những nguyên nhân, gây ra sự bất ổn của Reina, hay của \\x%lキハ07;#00ffc040;KiHa 07%l;#; sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「も、あるって。登呂流湯さんは。\nＯＳ面でも、冗長な独自処理が目立ったそうです」
1846 = "「Ông Tororyu-yu cũng nói là có ạ. Về mặt hệ điều hành, những xử lý độc lập dư thừa cũng rất nổi bật.」"
# monologue
# JP: 困った顔での、あいまいな頷き。
2270 = "Khuôn mặt bối rối, cái gật đầu mơ hồ."
# 【ポーレット】
# display as 波萊特
# JP: 「けど、そうしておいてもらえたから――\nわたしたちは今、すごく助かってるわけですし」
1457 = "「Nhưng, nhờ họ đã làm như vậy—— nên bây giờ, chúng ta mới được giúp đỡ rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。\nそうした全てを含め、僕らは、れいなを託されたんだ」
1764 = "「Đúng vậy nhỉ. Bao gồm cả tất cả những điều đó, chúng ta đã được gửi gắm Reina.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね」
1769 = "「Đúng vậy ạ.」"
# monologue
# JP: ほっとした顔。\nだれてた体が、起き直る。
2258 = "Khuôn mặt nhẹ nhõm. Cơ thể đang buông thõng, ngồi thẳng dậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ロールバックをできたこと、れいなにとって、\n複数の意味で良いことだって、今は素直に思います」
1724 = "「Việc có thể khôi phục dữ liệu, đối với Reina, trong nhiều ý nghĩa là một điều tốt, bây giờ tôi thực sự nghĩ như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1590 = "「Ừ.」"
# monologue
# JP: それがどのような荷であれど、\n受け渡されたものを受け取り、前へ進めて次へと繋ぐ。
2471 = "Dù đó là gánh nặng như thế nào đi nữa, nhận lấy thứ được trao, tiến về phía trước và kết nối với điều tiếp theo."
# monologue
# JP: 僕らがやっていることは、鉄道輸送と同様で、\nあるいはそれは、人の営み全てと同様なのかもしれん。
2345 = "Những gì chúng ta đang làm, cũng giống như vận tải đường sắt, hoặc có lẽ, nó giống như tất cả các hoạt động của con người."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなが託してもらったものを、フルに活かそう。\nそれがれいなにも僕らにも、きっと御一夜にも一番いい」
1677 = "「Hãy tận dụng tối đa những gì Reina đã được gửi gắm. Đó chắc chắn là điều tốt nhất cho Reina, cho chúng ta, và cả cho Ohimitera nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1787 = "「Vâng!」"
# 【れいな】
# display as 玲奈
# JP: 「お茶です。どうぞぉ」
1878 = "「Trà đây ạ. Xin mời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お、すまんな」
1531 = "「Ồ, cảm ơn em.」"
# monologue
# JP: 一口ふくんだとたんに感じる。\n今日の紅茶は、いつも以上にふくよかだ。
2238 = "Ngay khi vừa ngậm một ngụm, tôi đã cảm nhận được. Hồng trà hôm nay, đậm đà hơn hẳn mọi khi."
# 【れいな】
# display as 玲奈
# JP: 「よいしょ」
1600 = "「Ây da.」"
# monologue
# JP: 嬉しげにポーレットの膝に座って、\nれいなは自分のスキットルから――
2481 = "Vui vẻ ngồi lên đùi Paulette, Reina từ chiếc bình dẹt của mình——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはもう既にガソリンなのか」
1644 = "「A, thứ đó đã là xăng rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。\nポーレット、お祝いにハイオクを買ってくれましたぁ」
1761 = "「Đúng vậy ạ. Paulette đã mua xăng chỉ số octan cao để chúc mừng đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。どっちがうまい？」
1927 = "「Vậy sao. Cái nào ngon hơn?」"
# 【れいな】
# display as 玲奈
# JP: 「どっちもおいしいですよぉ？\nコクがあると、キレがあるの違いなのです」
1473 = "「Cả hai đều ngon mà ạ? Khác biệt ở chỗ, một bên đậm đà, còn một bên thì thanh mát thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな――っと、おいしいといえば、\n弁当の件もかなり進んだ」
1487 = "「Ra là vậy——à, nhắc đến ngon miệng, thì vụ cơm hộp bento cũng đã tiến triển khá nhiều rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、駅弁ですね」
1573 = "「A, cơm hộp bento nhà ga nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、献立のアイディアはだいぶ固まった。\n一週間後には、試食品を持ってきてくれるそうだ」
1597 = "「Ừ, ý tưởng thực đơn đã khá vững chắc rồi. Nghe nói một tuần sau, họ sẽ mang hàng dùng thử đến cho chúng ta.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ、楽しみです。\n献立って、どんな感じになりそうですか？」
1526 = "「Oa, mong chờ quá đi. Thực đơn, có vẻ sẽ như thế nào vậy anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「キジ馬をキーとするお弁当でいってみることとなった。\n主役となるキジ馬は、鮎の甘露煮で作るそうだ」
1709 = "「Chúng ta quyết định sẽ thử làm một hộp bento với từ khóa chính là Kijiuma. Nhân vật chính Kijiuma, nghe nói sẽ được làm từ cá hương kho ngọt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　言われると似てるかも」
1550 = "「A! Nghe anh nói vậy thì có vẻ giống thật.」"
# monologue
# JP: 永山夫人と日々姫が連鎖しあって決めたメニューを\n聞かせていけば、れいなの目までが輝きを増す。
2553 = "Khi nghe tôi kể về thực đơn mà phu nhân Nagayama và Hibiki đã cùng nhau nghĩ ra, ngay cả đôi mắt của Reina cũng sáng rực lên."
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ！\nきっと、かわいくっておいしいお弁当になりますねぇ」
1522 = "「Oaoa! Chắc chắn, sẽ thành một hộp bento vừa dễ thương vừa ngon miệng đây ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんと、楽しみ。\nあ――でも、わたしの分もあるのかなぁ」
1852 = "「Thật sự, mong chờ quá đi. A——nhưng mà, không biết có phần của em không nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――試作だし、一つだけかもしれんな。\nその場合は、わけあって食べる形でどうだろう？」
1424 = "「Ừ——vì là hàng làm thử, nên có khi chỉ có một phần thôi. Nếu vậy thì, chúng ta chia nhau ăn thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はいっ！　それ、いいと思います。\nあの――ええとっ……」
1562 = "「A, vâng! Em nghĩ, ý đó rất hay.\nCái đó——ờm……」"
# monologue
# JP: 箸をにぎるような形でふらふら、\nポーレットの手が彷徨い動く。
2445 = "Tay Paulette làm điệu bộ như đang cầm đũa, lóng ngóng, bối rối không biết để đâu."
# monologue
# JP: そうして口が開いて、閉じて――\nこほん、とひとつ咳払い。
2240 = "Và rồi miệng mở ra, rồi lại ngậm lại—— e hèm, hắng giọng một cái."
# 【ポーレット】
# display as 波萊特
# JP: 「楽しみですね、お弁当」
1855 = "「Mong chờ quá nhỉ, hộp bento ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1769 = "「是啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「っていうか――ありがとうございます。\nわたし、任せきりにしちゃって」
1700 = "「Hay nói đúng hơn là——cảm ơn anh. Em, cứ giao phó hết mọi việc cho anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お互い様だ。僕も多くを、\nポーレットに任せているわけだしな」
1686 = "「Có qua có lại thôi. Anh cũng, giao phó rất nhiều việc cho Paulette mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――そうでした」
1536 = "「A——đúng rồi.」"
# monologue
# JP: 思い出した、と言わんばかりの咳払い。
2252 = "Lại hắng giọng một cái, như thể vừa nhớ ra điều gì."
# 【ポーレット】
# display as 波萊特
# JP: 「報告遅れちゃいましたけど、ニイロクちゃんの改修も、\n改修終了時では何の問題もなく成功しました」
1719 = "「Em báo cáo hơi trễ, nhưng việc cải tạo Niiroku, lúc kết thúc cải tạo đã thành công mà không có vấn đề gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ニイロクはなにか言っていたか？」
1426 = "「Niiroku có nói gì không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「特には……ただ、キハ[レイナナ,1]07が\x%lダイコン;#00ffc040;ダイコン%l;#;だからですかね？\n“思ったよりもややこしい”とかは言ってました」
1804 = "「Cũng không có gì đặc biệt……chỉ là, có lẽ vì KiHa 07 là \\x%lダイコン;#00ffc040;trực khống%l;#; chăng? Cô bé có nói là “Rắc rối hơn tôi tưởng”.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大根？」
1742 = "「Củ cải (Daikon)?」"
# monologue
# JP: 思わず、れいなの足を見る。
2336 = "Tôi bất giác nhìn xuống chân Reina."
# monologue
# JP: 肉など本当に最小限で、\n大根というより、ごぼうに近いものに見えるが――
2637 = "Phần thịt thực sự rất ít, trông giống rễ ngưu bàng hơn là củ cải nhưng——"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、違いますよ双鉄くん。\x%lダイコン;#00ffc040;ダイコン%l;#;は、\nダイレクトコントロール……直接制御方式のことです」
1553 = "「A, không phải đâu anh Soutetsu. \\x%lダイコン;#00ffc040;Trực khống%l;#; là, Direct Control……tức là phương thức điều khiển trực tiếp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　レイナナの運転装置の話か」
1547 = "「A! Là chuyện về thiết bị lái của 07 sao.」"
# monologue
# JP: 納得いくが、疑問も感じる。
2368 = "Tôi đã hiểu ra, nhưng cũng cảm thấy thắc mắc."
# monologue
# JP: ハチロクの運転装置と比べると、\nあれは随分、すっきりと簡素なものだとしか思えない。
2358 = "So với thiết bị lái của Hachiroku, tôi chỉ nghĩ rằng thứ đó đã gọn gàng và đơn giản hơn rất nhiều."
# 【ポーレット】
# display as 波萊特
# JP: 「クハ２６は、\x%lマスコン;#00ffc040;マスコン%l;#;搭載車輌だったんで。だから」
1981 = "「Kuha 26 là toa xe được trang bị \\x%lマスコン;#00ffc040;bộ điều khiển trung tâm%l;#;. Nên là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lマスコン;#00ffc040;マスコン%l;#;？」
1073 = "「\\x%lマスコン;#00ffc040;Bộ điều khiển trung tâm%l;#;?」"
# 【ポーレット】
# display as 波萊特
# JP: 「マスターコントローラーです。電気制御で……\n四輪自動車のオートマチックみたいな運転装置です」
1664 = "「Là Master Controller. Điều khiển bằng điện…… là một thiết bị lái giống như hộp số tự động của xe bốn bánh vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そんな便利なものがあるのか」
1437 = "「Trời, lại có thứ tiện lợi như vậy sao.」"
# monologue
# JP: ギアの操作を――
2563 = "Thao tác sang số——"
# monologue
# JP: ハチロクでいうなら\x%l逆転機;#00ffc040;逆転機%l;#;ハンドルの細かな操作を、\n蒸気量にあわせオートで制御してもらえるなら……
2275 = "Nếu nói theo kiểu Hachiroku thì là thao tác chi tiết tay quay \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;, nếu được điều khiển tự động phù hợp với lượng hơi nước thì……"
# 【双鉄】
# display as 雙鐵
# JP: 「それは楽だな。それと比べれば、\x%l8620;#00ffc040;8620%l;#;や\x%lキハ07;#00ffc040;キハ07%l;#;は、\n旧式のマニュアル操作に感じるわけか」
1947 = "「Thế thì nhàn quá rồi. So với thứ đó, \\x%l8620;#00ffc040;8620%l;#; hay \\x%lキハ07;#00ffc040;KiHa 07%l;#;, chắc hẳn sẽ có cảm giác như thao tác thủ công kiểu cũ vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。だからちょっととまどったみたいで。\nでも、赤井宮司は\x%lダイコン;#00ffc040;ダイコン%l;#;操作経験もあるそうですから」
1781 = "「Đúng vậy ạ. Nên có vẻ lúc đầu cô bé hơi lúng túng. Nhưng mà, đền chủ Akai nghe nói cũng có kinh nghiệm thao tác \\x%lダイコン;#00ffc040;trực khống%l;#; nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「人が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に運転操作を指導するのか？」
1840 = "「Con người lại đi hướng dẫn thao tác lái cho \\x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「よほどの不具合が出ちゃえば――ですよね。でも、\n登呂流湯さんは『問題なさそう』って言ってました」
1797 = "「Nếu xảy ra lỗi quá nghiêm trọng thì——mới vậy nhỉ. Nhưng mà, ông Tororyu-yu bảo là 『Có vẻ không vấn đề gì』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1928 = "「Vậy sao.」"
# monologue
# JP: れいなのバックアップデータをまるごと取り込み、\nその上で、全くの不整合を出さないのなら――
2143 = "Tiếp nhận toàn bộ dữ liệu sao lưu của Reina, hơn nữa, nếu hoàn toàn không gây ra sự bất tương thích nào thì——"
# monologue
# JP: 最新鋭機種のトップナンバー\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nやはりそれだけの余裕をもって作られたのだろう。
2403 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; số hiệu đầu tiên của dòng máy tân tiến nhất, quả nhiên được chế tạo với một sự dư dả tương xứng như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司とも、もう？」
1459 = "「Em cũng gặp đền chủ Akai rồi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、ニイロクちゃんを迎えにきてくださったんで。\nそのときに」
1788 = "「Vâng, vì ông ấy đến đón Niiroku mà.\nLúc đó ạ.」"
# monologue
# JP: ふふっと、楽しげな笑いが漏れる。
2451 = "Fufu, một tiếng cười vui vẻ bật ra."
# 【ポーレット】
# display as 波萊特
# JP: 「赤井宮司さん……すごく喜んでらっしゃいました。\n出来ることがあればなんでも手伝うっていってくれて」
1908 = "「Đền chủ Akai……ông ấy trông rất vui. Ông ấy bảo nếu có việc gì có thể làm thì ông ấy sẽ giúp bất cứ việc gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら――というのもアレだが」
1970 = "「Nếu vậy——nói thế này thì hơi kỳ nhưng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、大臣視察で市長のわたしが欠席は出来ませんから。\nそのときの\x%lキハ07;#00ffc040;キハ07%l;#;の運転、お願いしてＯＫもらいました」
1591 = "「Vâng, vì lúc bộ trưởng đến thị sát, với tư cách là thị trưởng, em không thể vắng mặt được. Em đã nhờ ông ấy lái \\x%lキハ07;#00ffc040;KiHa 07%l;#; vào lúc đó, và đã được OK rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1928 = "「這樣啊」" 
# monologue
# JP: 改修前に頼むのも違う気がして言い出せないでいたことを、\nポーレットはきっちり、頼んでくれた。
2362 = "Điều mà tôi cảm thấy không nên nói ra trước khi cải tạo, Paulette đã nhờ vả một cách hoàn hảo."
# monologue
# JP: 以心伝心というのは些か大げさだが、\n実に悪くないチームワークだ。
2590 = "Nói là thần giao cách cảm thì hơi quá, nhưng đúng là một sự phối hợp nhóm không tồi chút nào."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、\nそれだとれいなに、少し気の毒をすることになるな」
1405 = "「Nhưng mà, như thế thì có hơi tội nghiệp cho Reina nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぇっ！？」
1529 = "「Hả!?」"
# monologue
# JP: 急に話をふられたせいで、れいなが驚いた顔になる。
2533 = "Bị nhắc đến đột ngột, Reina lộ vẻ mặt ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「せっかく改修した\x%lキハ07;#00ffc040;キハ07%l;#;なのに、\n訓練もあるし……れいなは、しばらく動かせそうに」
1071 = "「Dù đã cất công cải tạo \\x%lキハ07;#00ffc040;KiHa 07%l;#;, nhưng còn phải huấn luyện nữa……có vẻ một thời gian nữa Reina mới được lái.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、そのことだったら平気ですよぉ。\nだって、かわりばんこですからぁ」
1572 = "「A, chuyện đó thì không sao đâu ạ. Vì bọn em, sẽ thay phiên nhau mà.」"
# monologue
# JP: にこにこと、れいなの笑顔に屈託はない。
2478 = "Cười tươi rạng rỡ, nụ cười của Reina không chút gượng gạo."
# 【れいな】
# display as 玲奈
# JP: 「いそがしいのがおわったら、\nれいな思いっきりに動かすのです！」
1869 = "「Đợi xong lúc bận rộn này, Reina sẽ lái thỏa thích luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。\nそのときは、僕にも同乗させてくれ」
1943 = "「Thế thì tốt quá.\nLúc đó, cho anh đi cùng với nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　うれしいですぅ！\nなら、約束ですねぇ、ポーレット」
1524 = "「Oa! Em vui lắm ạ!\nVậy thì, hứa rồi nhé, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1590 = "「嗯」" 
# monologue
# JP: 両手を使い、三人輪になり、ゆびきりげんまん。
2344 = "Dùng cả hai tay, ba người tạo thành một vòng tròn, ngoéo tay thề ước."
# monologue
# JP: それを終えれば満足したのか、れいなはまたももぞもぞと、\nポーレットの膝の上へと戻る。
2473 = "Xong xuôi, có vẻ đã thỏa mãn, Reina lại lạch bạch, trở về trên đùi Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。過去に炭鉱で働いてた方々と、テーマパークの\n……キャスト？　だったかの募集については――」
1643 = "「Thế này. Về việc tuyển dụng những người từng làm việc ở mỏ than trong quá khứ, và ……diễn viên? của công viên giải trí thì——」"
# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんにお願いしてあります。キャストの方は、\n駅貼りポスターと中吊りとで募集します」
1715 = "「Em đã nhờ chị Mayami rồi ạ. Về phần diễn viên, chúng ta sẽ tuyển dụng qua poster dán ở ga và tờ rơi treo trên tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、真闇姉なら間違いないな。\nとはいえ」
1555 = "「A, nếu là chị Mayami thì không sai vào đâu được. Dù vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁあ」
1516 = "「Oáp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1978 = "「!?」"
# monologue
# JP: 完全に不意を突かれて、体がビクリと動いてしまう。\n途端、れいなが僕より遥かに慌てふためく。
2477 = "Hoàn toàn bị bất ngờ, cơ thể tôi giật nảy mình. Ngay lập tức, Reina còn cuống cuồng hơn cả tôi."
# 【れいな】
# display as 玲奈
# JP: 「あ、れいな、処理落ちとかじゃないですよ？\nえとっ」
1569 = "「A, Reina, không phải là bị giật lag đâu ạ?\nCái đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかってる。ごめんね。\nこんなに夜更かしさせちゃうことって、ないもんね」
1726 = "「Chị biết mà. Xin lỗi em nhé. Chị chưa từng để em thức khuya thế này bao giờ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1762 = "「À——」"
# monologue
# JP: やけに無口だと思ったら、\nれいなは睡魔と戦っていたのか。
2367 = "Thấy im lặng khác thường, thì ra Reina đang chiến đấu với cơn buồn ngủ sao."
# 【双鉄】
# display as 雙鐵
# JP: 「長話をしてしまったな。今日はここまでにしよう。\nれいな、ゆっくり休んでくれ」
1389 = "「Nói chuyện hơi dài rồi nhỉ. Hôm nay đến đây thôi. Reina, em nghỉ ngơi cho khỏe nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、おやすみなさい、ポーレット、そうてつさん」
1618 = "「Vâng ạ, chúc ngủ ngon, Paulette, anh Soutetsu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「おやすみ、れいな」
1794 = "「Chúc em ngủ ngon, Reina.」"
# monologue
# JP: ずるずる、足取りまでもが引きずるようで、\n見ているこちらも、どんどん眠くなってくる。
2256 = "Lê bước chân nặng trĩu, nhìn bộ dạng đó, tôi cũng dần cảm thấy buồn ngủ lây."
# monologue
# JP: れいなの姿が完全に奥へと消えてしまうと、\nなんとも言えぬ……微妙な沈黙が垂れ込める。
2489 = "Khi bóng dáng Reina hoàn toàn biến mất vào bên trong, một sự im lặng tế nhị……khó tả bao trùm lấy chúng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あの……双鉄くん。よければ――\nこのまま、泊まって行きませんか？」
1939 = "「Cái đó……anh Soutetsu. Nếu được thì—— Cứ thế này, anh ở lại qua đêm nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1976 = "「!」"
# monologue
# JP: 甘い誘いを、僕も半ばは期待していた。\nだから言葉は、素直に出てくる。
2180 = "Một lời mời ngọt ngào, tôi cũng đã mong đợi được một nửa. Nên những lời nói, cứ thế tuôn ra một cách thành thật."
# 【双鉄】
# display as 雙鐵
# JP: 「明日がなければ、泊まって行きたい。\nが――今は」
1619 = "「Nếu không có ngày mai, anh rất muốn ở lại. Nhưng——bây giờ thì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー……ですよね。\n少しでも、準備すすめなきゃですもんね」
1540 = "「A……cũng phải nhỉ. Dù chỉ một chút, cũng phải tiến hành chuẩn bị mà.」"
# monologue
# JP: 僕の返事を、\nポーレットも半ば予想してくれていたのかもしれない。
2371 = "Về câu trả lời của tôi, có lẽ Paulette cũng đã dự đoán được một nửa."
# monologue
# JP: 残念そうなその声にはけど、\n落ち込むような感じは混じらず、ホっとする。
2264 = "Giọng nói có vẻ tiếc nuối đó, không hề pha lẫn cảm giác chán nản, khiến tôi thở phào."
# 【ポーレット】
# display as 波萊特
# JP: 「すいません、つまらないことで引き止めちゃって」
1642 = "「Xin lỗi anh, vì đã giữ anh lại vì chuyện không đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまらないことなんかじゃないさ」
1736 = "「Không phải là chuyện không đâu đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
1545 = "「A.」"
# monologue
# JP: 抱擁と。\n口づけと。
2346 = "Cái ôm.\nVà nụ hôn."
# monologue
# JP: ただそれだけで、体の中にたまった疲れが、\n暖かにほぐされたような気持ちになれる。
2162 = "Chỉ cần như vậy, sự mệt mỏi tích tụ trong cơ thể, như được sưởi ấm và xoa dịu."
# 【ポーレット】
# display as 波萊特
# JP: 「ん…………」
1581 = "「Ưm…………」"
# 【双鉄】
# display as 雙鐵
# JP: 「引き止めてもらえて、嬉しかった。\nおかげで、明日もがんばれる」
1718 = "「Anh rất vui vì em đã giữ anh lại. Nhờ vậy, ngày mai anh lại có thể cố gắng rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――わたしもです、双鉄くんっ」
1077 = "「——Em cũng vậy, anh Soutetsu.」"
# monologue
# JP: （ちゅっ！）
2648 = "（Chụt!）"
# monologue
# JP: もう何度かのキスを交わして――\n僕らは優しく、体をほどく。
2245 = "Trao nhau nụ hôn không biết bao nhiêu lần nữa—— Chúng tôi dịu dàng, buông nhau ra."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　電話！　にぃに電話」
1968 = "「Anh hai! Điện thoại! Điện thoại của anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「んむっ！？」
1513 = "「Hự!?」"
# 【日々姫】
# display as 日日姬
# JP: 「蓑笠さんから電話。凄い急ぎみたいだったから、\n子機もってきちゃったけど」
1883 = "「Điện thoại từ ông Minokasa. Có vẻ gấp lắm, nên em mang điện thoại con qua luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。構わん――ありがとう」
1559 = "「A, à không. Không sao đâu——cảm ơn em.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん」
1803 = "「Dạ.」"
# monologue
# JP: あまりに寝起きで頭がイマイチまわっていないが、\nともかく、手の中の受話器を耳へと持っていく。
2194 = "Vừa mới ngủ dậy nên đầu óc chưa tỉnh táo lắm, nhưng dù sao, tôi cũng áp ống nghe trên tay vào tai."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、お電話かわりました。双鉄です」
1578 = "「Alo, tôi nghe đây. Tôi là Soutetsu.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、双鉄くん。朝早くから済まんですの。\n昨夜も、何度か連絡とろうとしよったですが」
1576 = "「A, anh Soutetsu. Xin lỗi vì mới sáng sớm nhé. Đêm qua, tôi cũng đã gọi cho anh mấy lần nhưng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すみません。\n昨日は深夜すぎまで戻れずに――」
1564 = "「A, xin lỗi ông.\nHôm qua tôi về nhà lúc quá nửa đêm——」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いや、済まんとはこっちです。\n頼まれとった件、雲行きが怪しくなってしまいました」
1411 = "「Không, người phải xin lỗi là tôi mới đúng. Chuyện anh nhờ tôi, tình hình có vẻ không ổn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え！？」
# 1529 = "「哎！？」" 
# monologue
# JP: 蓑笠さんに頼んでいたこと。
2354 = "Chuyện tôi đã nhờ ông Minokasa."
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;改修や、マイントレジャー関連で必要になる、\n職人さんたちの取りまとめ――
64 = "Cải tạo \\x%lキハ07;#00ffc040;KiHa 07%l;#;, và tập hợp các thợ thủ công cần thiết cho các việc liên quan đến Mine Treasure——"
# 【双鉄】
# display as 雙鐵
# JP: 「皆さん、ご参加くださると伺っておりましたが」
1714 = "「Tôi nghe nói mọi người đều đã đồng ý tham gia rồi mà.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「それが、突然、大口の仕事ば入ってきよったとですよ。\n至急で、納期が二ヶ月後のものば、多かとです」
1501 = "「Nhưng mà, đột nhiên lại có những đơn hàng lớn xuất hiện. Đa số đều là việc gấp, hạn chót là hai tháng sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「二ヶ月後！？」
1472 = "「Hai tháng sau!?」"
# monologue
# JP: 大臣視察までの期間を、まるまる呑み込むスケジュールだ。
2417 = "Đó là một lịch trình nuốt trọn toàn bộ khoảng thời gian cho đến lúc bộ trưởng đến thị sát."
# 【蓑笠】
# display as 蓑笠
# JP: 「それも、納期ぎりぎりまで詰めて間に合うかどうか、\nいう仕事量と質のものばかり言う話で」
1416 = "「Mà toàn là những đơn hàng có khối lượng và chất lượng công việc đòi hỏi phải làm cật lực mới kịp thời hạn không à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「発注元は？」
1899 = "「Bên đặt hàng là ai vậy?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「それぞれ、元からの長い付き合いのある取引先から、\n『どうしても』いうことで頼まれたらしいいうことで」
1961 = "「Nghe nói đều là những đối tác đã làm ăn lâu năm, họ bảo là 『Dù thế nào đi nữa』 nên mới nhờ vả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「複数の、別個の取引先から、このタイミングで、\n納期の同じ仕事を――ですか」
1462 = "「Nhiều đối tác khác nhau, lại cùng giao những công việc có chung thời hạn, vào đúng thời điểm này——sao.」"
# monologue
# JP: そんな偶然、起こりえない。
2619 = "Sự trùng hợp như vậy, không thể nào xảy ra được."
# monologue
# JP: 偶然でない物事ならば、\n何者かの意思が起こした、必然だ。
2394 = "Nếu không phải là ngẫu nhiên, thì đó là tất yếu do ý đồ của một kẻ nào đó gây ra."
# 【双鉄】
# display as 雙鐵
# JP: 「――これから、\nそちらへお邪魔させていただきたいのですが」
1078 = "「——Bây giờ,\ntôi có thể đến chỗ ông được không.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そうしてもらえると助かります。\n電話で済む話ではなさそうですけぇ」
1950 = "「Được vậy thì tốt quá. Chuyện này có vẻ không thể nói xong qua điện thoại được đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、すぐ向かいます」
1955 = "「Vậy, tôi sẽ đến ngay.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、双鉄さん」
1575 = "「A, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ふかみも来ていたのか」
1537 = "「A——Fukami cũng đến sao.」"
# 【ふかみ】
# display as 深美
# JP: 「右田一酒蔵元さんに電話したら、\n双鉄さん、ここに向かったって教えてもらって」
1727 = "「Em gọi điện cho Xưởng rượu Migita Ichi, họ bảo anh Soutetsu đang đến đây nên.」"
# monologue
# JP: ふかみは言いつつ、ポシェットから小さな紙片を取り出し、\n丁寧に折り目を広げていく。
2465 = "Vừa nói, Fukami vừa lấy ra một mảnh giấy nhỏ từ túi xách, cẩn thận mở các nếp gấp ra."
# 【ふかみ】
# display as 深美
# JP: 「あの、双鉄さん。\nこれ――見ましたか？」
1940 = "「Cái đó, anh Soutetsu.\nCái này——anh đã xem chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……新聞の求人チラシか――\nむ、ひょっとしてポーレットがもう――っ！？」
1543 = "「À……tờ rơi tuyển dụng trên báo sao—— Hửm, không lẽ Paulette đã——!?」"
# monologue
# JP: 違う。違った――\n求人広告を出しているのは、ポーレットじゃない。
2134 = "Không. Không phải—— Người đăng quảng cáo tuyển dụng, không phải Paulette."
# monologue
# JP: 全く隠す素振りも見せず、\nあからさまな“意志”を示している。
2299 = "Hoàn toàn không có vẻ gì là che giấu, thể hiện một “ý chí” trắng trợn."
# 【双鉄】
# display as 雙鐵
# JP: 「宝生……元忠――」
1630 = "「Houshou……Mototada——」"
# monologue
# JP: “短期アルバイト大募集！！”\n“安心安全の、エアロクラフテック社関連のお仕事です”
1058 = "“Tuyển gấp việc làm thêm ngắn hạn!!” “Công việc liên quan đến công ty Aero-Craftech, an toàn và an tâm”"
# monologue
# JP: 事務、広報、実測調査――\n募集される職種は多岐で、人数もかなりの大規模だ。
2139 = "Hành chính, quan hệ công chúng, khảo sát đo đạc thực tế—— Các ngành nghề được tuyển dụng rất đa dạng, và số lượng cũng khá lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「時給……1600円、だと」
1793 = "「Lương theo giờ……1600 yên, cơ á.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんとアルバイト、みたことなかばい！」
1930 = "「Công việc làm thêm như vậy, chưa thấy bao giờ nè!」"
# 【ふかみ】
# display as 深美
# JP: 「だよね。御一夜で800円を越える時給なんて……\n深夜帯だって、1000円行くか行かないかなのに」
1666 = "「Đúng vậy. Ở Ohimitera mà lương theo giờ vượt quá 800 yên thì…… Dù là làm đêm, cũng chỉ tầm 1000 yên hoặc không tới thôi.」"
# monologue
# JP: さすがふかみは、\n（株）クマ川下りの実質的な経営者だけのことはある。
2457 = "Quả không hổ danh Fukami, người điều hành thực tế của công ty cổ phần Xuôi dòng sông Kuma."
# monologue
# JP: 実態のある数字を以って、\n“高い”という僕の直観を裏付けてくれる。
2259 = "Bằng những con số thực tế, cô bé đã chứng minh trực giác “cao” của tôi là đúng."
# 【凪】
# display as 凪
# JP: 「倍のお給料もらえるんならよかとよねー」
1622 = "「Nếu nhận được lương gấp đôi thì tốt quá rồi nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかも――くそ、\n大臣視察までの期間だけの雇いきりか」
1872 = "「Hơn nữa——chết tiệt, chỉ thuê trong khoảng thời gian cho đến khi bộ trưởng đến thị sát thôi sao.」"
# monologue
# JP: 思わず蓑笠老人を見れば、\n苦々しげな頷きだけが返される。
2338 = "Bất giác nhìn ông Minokasa, chỉ nhận lại được một cái gật đầu đầy cay đắng."
# monologue
# JP: 目的は、誰の目にだって明らかだ。
2412 = "Mục đích là gì, ai nhìn vào cũng thấy rõ."
# 【双鉄】
# display as 雙鐵
# JP: 「こちらの人集めを、\nなりふり構わず妨害に来ているのか」
1443 = "「Họ đang đến cản trở việc tập hợp người của chúng ta, một cách không từ thủ đoạn sao.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……でも、\nなりふり、構ってる感じかも。です」
1542 = "「A……nhưng mà, có vẻ họ cũng có thủ đoạn đàng hoàng đấy. Dạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1436 = "「Hửm?」"
# monologue
# JP: ふかみのか細い指が差す先、求人先の企業名は、\n（株）御一夜ワークサービス　となっている。
2462 = "Nơi ngón tay thon thả của Fukami chỉ vào, tên doanh nghiệp tuyển dụng là, Công ty cổ phần Ohimitera Work Service."
# 【ふかみ】
# display as 深美
# JP: 「全然、聞いたことのない会社ですから……」
1604 = "「Vì đó là một công ty mà em hoàn toàn chưa từng nghe tên……」"
# 【蓑笠】
# display as 蓑笠
# JP: 「恐らく、こん求人のためだけに作った会社じゃ\nなかろーかと思います」
1696 = "「Tôi e rằng, đây là công ty được lập ra chỉ để phục vụ cho đợt tuyển dụng này thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この求人のためだけに？」
1639 = "「Chỉ vì đợt tuyển dụng này sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あの……うち――クマ川下り、\nそれですごく苦労したから、わかるんです。けど」
1938 = "「Cái đó……chỗ em——Xuôi dòng sông Kuma, đã từng gặp rất nhiều khó khăn vì chuyện đó, nên em hiểu. Nhưng mà.」"
# monologue
# JP: おずおずと、自分が悪いわけでもないのに、\nふかみはなんとも、申し訳無さそうな声を出す。
2459 = "Dè dặt, dù bản thân không làm gì sai, nhưng Fukami lại cất giọng nghe vô cùng áy náy."
# 【ふかみ】
# display as 深美
# JP: 「一度でも、その金額で人を雇うと……\n雇われた方は、その金額を期待する。です。から――」
1393 = "「Dù chỉ một lần, nếu thuê người với mức giá đó thì…… người được thuê sẽ kỳ vọng vào mức giá đó. Dạ. Nên là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1977 = "「!!」"
# monologue
# JP: 言われたことの意味が、深刻さが僕の背骨に突き刺さる。
2551 = "Ý nghĩa của những lời đó, sự nghiêm trọng đâm thẳng vào sống lưng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「前例に――なってしまうということか」
1667 = "「Nói cách khác là——sẽ tạo thành tiền lệ sao.」"
# 【凪】
# display as 凪
# JP: 「それが何ね？\nどぎゃんしてにーさん、そがいに困った顔をしよっと？」
1942 = "「Vậy thì sao nè? Tại sao anh hai lại làm vẻ mặt khó khăn thế kia?」"
# 【双鉄】
# display as 雙鐵
# JP: 「向こうは、臨時に作った会社だ。\n目的を果たして解散すれば、それで済む。が――」
1645 = "「Bên kia là công ty được lập ra tạm thời. Đạt được mục đích rồi giải tán là xong. Nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「マイントレジャーは、これからずうっと、\nやっていこうっていうことだから」
1455 = "「Mine Treasure thì, từ nay về sau vẫn sẽ, tiếp tục hoạt động mà.」"
# 【凪】
# display as 凪
# JP: 「わかったばい！　向こうに対抗して時給2000円とか\nしたら、それが後々までたたりよるばい」
1520 = "「Em hiểu rồi nè! Nếu để đối kháng với bên kia mà đặt lương theo giờ là 2000 yên thì chuyện đó sẽ ám ảnh về sau luôn nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。そのとおりだ」
1585 = "「Ừ. Đúng là vậy.」"
# 【凪】
# display as 凪
# JP: 「なら、こっちも臨時で会社ば作ったらどーと？」
1960 = "「Vậy, bên mình cũng lập một công ty tạm thời thì sao nè?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん、だって――\nわたし達、御一夜でこれからも暮らしていくでしょ？」
1402 = "「Không được, bởi vì—— chúng ta, từ nay về sau vẫn sẽ tiếp tục sống ở Ohimitera mà đúng không?」"
# 【凪】
# display as 凪
# JP: 「あっ！」
1546 = "「A!」"
# monologue
# JP: そう。向こうは外部の人間を使えばそれで済む話だ。
2431 = "Đúng vậy. Bên kia chỉ cần dùng người ngoài là xong chuyện."
# monologue
# JP: 宝生元忠が裏で糸を引いていても、その証拠がなければ、\n『\x%lエアクラ;#00ffc040;エアクラ%l;#;社がやったこと』の一言でたやすく逃げられる。
2305 = "Cho dù Houshou Mototada có giật dây phía sau, nếu không có chứng cứ, ông ta có thể dễ dàng trốn tránh bằng một câu 『Đó là việc do công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; làm』."
# 【双鉄】
# display as 雙鐵
# JP: 「僕たちには便利に使える隠れ蓑は無い。\nあったとて、信頼を失ってしまえば、未来も無くなる」
1708 = "「Chúng ta không có vỏ bọc nào tiện lợi như thế. Dù có, nếu đánh mất lòng tin, thì tương lai cũng không còn.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そん隠れ蓑に――\nいいように御一夜の業者も使われてしまいましたかの」
1694 = "「Cái vỏ bọc đó—— chắc là các nhà thầu ở Ohimitera cũng bị lợi dụng rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1590 = "「嗯」" 
# monologue
# JP: 考えてみれば、当然だ。
2145 = "Nghĩ lại thì, đó là chuyện đương nhiên."
# monologue
# JP: これほどえげつない仕掛けをするのが複数人でないことが\nむしろ幸運とさえ思えてくる。
2190 = "Việc không có nhiều người sử dụng thủ đoạn tàn nhẫn đến mức này, thậm chí có thể coi là may mắn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうですよね。\nお聞かせいただいた、職人さん達への急な仕事も――」
1768 = "「Đúng vậy nhỉ. Những công việc gấp rút giao cho các thợ thủ công mà tôi vừa nghe——」"
# 【蓑笠】
# display as 蓑笠
# JP: 「こん会社が元受けで、それぞれに断りづらい取引先に、\n下請けばさせておるんでしょうな」
1489 = "「Công ty này là nhà thầu chính, và họ đã giao cho các đối tác khó mà từ chối, để họ làm thầu phụ chứ gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「孫請けで……各職人さんたちに仕事を振るようにと\n指示して、ですか」
1446 = "「Bằng cách giao thầu phụ…… chỉ định phân chia công việc cho các thợ thủ công sao.」"
# monologue
# JP: 提示された条件が、どれほど破格のものであるかは、\nバイト求人からも想像が付く。
2300 = "Điều kiện được đưa ra có mức độ phá giá đến mức nào, cũng có thể tưởng tượng được từ việc tuyển dụng làm thêm."
# monologue
# JP: と、いうか、だ――
2601 = "Mà, nói đi cũng phải nói lại——"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんのところにも――ですか？」
1442 = "「Cả chỗ ông Minokasa cũng——sao?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「私んとこは、年寄り二人に孫一人。そん孫も、\n自分の食い扶持ば稼ぎよる出来んいい子ぉですけんね」
1518 = "「Chỗ tôi thì, chỉ có hai ông bà già và một đứa cháu gái. Đứa cháu đó cũng, là một đứa trẻ ngoan ngoãn có thể tự kiếm cơm ăn được rồi.」"
# monologue
# JP: 来た。\nしかし断った。
2159 = "Đã đến.\nNhưng đã từ chối."
# monologue
# JP: 蓑笠老人の言葉は、全く押し付けがましさ無しに、\nそうした事実を示してくれる。
2577 = "Lời nói của ông lão Minokasa, hoàn toàn không mang ý ép buộc, mà chỉ chỉ ra sự thật đó."
# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとうございます」
1082 = "「——Thực sự cảm ơn ông.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「礼を言われることじゃなかとです。凪たちのため、\n御一夜の水ば守るのは、私の望みでもありますけん」
1407 = "「Không cần phải cảm ơn đâu. Vì Nagi và bọn trẻ, bảo vệ nguồn nước của Ohimitera, cũng là mong muốn của tôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1590 = "「嗯」" 
# monologue
# JP: だが――御一夜は長い不況の中にある。
2151 = "Nhưng——Ohimitera đang chìm trong thời kỳ suy thoái kéo dài."
# monologue
# JP: 蓑笠さんのように、これほど美味しい儲け話を断ってまで、\nマイントレジャーに乗ってくれる人が……どれほどいるか。
2202 = "Những người như ông Minokasa, từ chối một mối làm ăn béo bở đến vậy, để tham gia Mine Treasure……liệu có được bao nhiêu người."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、これ――\n船頭さん達の話にも、影響ば出てくるんじゃなかと？」
1657 = "「Fukami, cái này—— chẳng phải cũng sẽ ảnh hưởng đến chuyện của những người chèo thuyền sao?」"
# 【ふかみ】
# display as 深美
# JP: 「うん。多分……っていうか、絶対」
1583 = "「Ừm. Chắc là……hay đúng hơn là, tuyệt đối.」"
# monologue
# JP: 船頭さん達の話？　と疑問に思えば、\nすぐにふかみが答えてくれる。
2333 = "Chuyện của những người chèo thuyền? Khi tôi còn đang thắc mắc, Fukami đã lập tức trả lời."
# 【ふかみ】
# display as 深美
# JP: 「あ、はい。マイントレジャーの話、\nうちの川下り、結構重要な役割を果たすじゃないですか」
1566 = "「A, vâng. Chuyện Mine Treasure, chuyến đi thuyền xuôi dòng của bọn em, đóng vai trò khá quan trọng mà.」"
# monologue
# JP: それは客数の増加に繋がり、\n客数の増加は、当然売上の増加につながる。
2467 = "Điều đó sẽ dẫn đến việc tăng lượng khách, và lượng khách tăng, đương nhiên sẽ dẫn đến tăng doanh thu."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、鉄道の方でも忙しくなるし。\n何人かでも復帰を募れないかって――考えてたんです」
1648 = "「Nagi cũng sẽ bận rộn hơn với công việc bên đường sắt. Nên em đã nghĩ——liệu có thể kêu gọi vài người quay lại làm không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「離職した船頭さんの、か」
1481 = "「Những người chèo thuyền đã nghỉ việc, sao.」"
# monologue
# JP: 正直、厳しいような気がする。
2604 = "Thành thật mà nói, tôi cảm thấy có vẻ khó khăn."
# monologue
# JP: 一度は捨てた職場に戻る……\nその事自体、ハードルが高い気がするし――
2592 = "Quay lại nơi làm việc đã từng vứt bỏ một lần…… Bản thân việc đó đã có rào cản rất cao rồi——"
# monologue
# JP: （実際……これは、キツイ手を打たれてしまったな）
2650 = "（Thực tế thì……chúng ta đã bị giáng một đòn đau thật rồi.）"
# monologue
# JP: 鉱山まわり、廃宿舎群、トロッコ線路、発電所――\n整備すべきは無数にあり、人手はいくらあっても足りない。
2521 = "Xung quanh khu mỏ, khu ký túc xá bỏ hoang, tuyến đường xe goòng, nhà máy điện—— Có vô số thứ cần được bảo trì, và nhân lực thì có bao nhiêu cũng không đủ."
# monologue
# JP: 当然。マイントレジャーのキャストも必要になるし、\nキャストについては、ゼロからの育成もせねばなるまい。
2488 = "Tất nhiên. Cũng cần có cả diễn viên cho Mine Treasure, và về phần diễn viên, chắc chắn sẽ phải đào tạo từ con số không."
# 【凪】
# display as 凪
# JP: 「……このまま、やられっぱなしですり潰されっと？」
1111 = "「……Cứ thế này, chúng ta sẽ bị đánh bại mà không làm được gì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1394 = "「Không——」"
# monologue
# JP: いかん。\n僕が沈黙しては、不安を煽ってしまうだけだ。
2132 = "Không được. Nếu tôi im lặng, sẽ chỉ làm tăng thêm sự bất an thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、すでに動き初めている。\n駅貼りや中吊りで、求人を打つ手配になっている」
1812 = "「Paulette, đã bắt đầu hành động rồi. Cô ấy đang chuẩn bị đăng tuyển dụng qua poster dán ở ga và tờ rơi treo trên tàu.」"
# 【凪】
# display as 凪
# JP: 「じゃっどん、\n向こうほどお給料は出せなかとよね？」
1499 = "「Nhưng mà, chúng ta không thể trả lương cao như bên kia được đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「同じ土俵で勝負をするのは論外だ。\n金と金とで戦えば、こちらに勝ち目はまるで無い」
1400 = "「Cạnh tranh trên cùng một sàn đấu là điều không tưởng. Nếu đấu bằng tiền với tiền, chúng ta hoàn toàn không có cơ hội chiến thắng.」"
# monologue
# JP: 凪の素朴な率直さが、僕の逃げ道を塞いでくれる。
2184 = "Sự thẳng thắn mộc mạc của Nagi, đã chặn đứng lối thoát của tôi."
# monologue
# JP: 前へ――前へ――と、とにもかくにも出て行く他に、\n打てる手などは[ハナ,1]最初から無いのだ。
2288 = "Tiến lên——tiến lên——dù sao thì ngoài việc bước ra ngoài, ngay từ đầu đã chẳng có cách nào để đánh trả cả."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、蓑笠さんと同様に、金より未来を選んでくれる\n――そうした人を集める手段を考えるのだ」
1734 = "「Vì vậy, giống như ông Minokasa, những người chọn tương lai hơn là tiền bạc ——chúng ta phải nghĩ ra cách để tập hợp những người như thế.」"
# 【ふかみ】
# display as 深美
# JP: 「……ん」
1099 = "「……Vâng.」"
# monologue
# JP: ふかみの顔が曇ってしまう。
2460 = "Khuôn mặt Fukami tối sầm lại."
# monologue
# JP: 生活に困り、慣れ親しんだ職を捨てた――そうした例を、\n身近にいくつも見てきてしまったせいだろうか。
2617 = "Gặp khó khăn trong cuộc sống, phải vứt bỏ công việc quen thuộc—— Có lẽ vì em ấy đã chứng kiến vô số ví dụ như vậy ngay bên cạnh mình."
# 【凪】
# display as 凪
# JP: 「ポスターとかビラとかはそぎゃんと風に作っとね？\nそんほかに、どぎゃん手ばあっとかねぇ」
1891 = "「Có nên làm poster hay tờ rơi theo kiểu đó không nè? Ngoài ra, còn cách nào khác không nè.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「……地道ではありますが口コミばどうでしょうかの。\n理念やらは、面と向かってしか伝わらん気がしますけん」
1108 = "「……Tuy hơi tốn công, nhưng truyền miệng thì sao nhỉ. Tôi có cảm giác, những thứ như lý tưởng thì chỉ có thể truyền đạt khi đối mặt trực tiếp thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですね。今すぐに出来そうなのは、その辺ですか」
1766 = "「Đúng vậy nhỉ. Những việc có thể làm ngay lúc này, chỉ quanh quẩn bấy nhiêu thôi.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「じゃったら私はその方面で、\n幾人かでも慰留してみっとです」
1953 = "「Vậy thì về mảng đó, tôi sẽ thử thuyết phục vài người ở lại xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nご無理なければ、よろしくお願いいたします」
1972 = "「Cảm ơn ông.\nNếu không phiền, xin trăm sự nhờ ông.」"
# 【ふかみ】
# display as 深美
# JP: 「そうです。よね……うん。\n断られると、最初から決まってるわけじゃないし」
1902 = "「Đúng vậy. Nhỉ……ừm. Vì ngay từ đầu, đâu có chắc chắn là sẽ bị từ chối đâu.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、船頭さんだった人たちに声ばかけっと？\nなら、ウチは職人さん達に頼んでみるばい！」
1655 = "「Fukami sẽ đi hỏi những người từng là người chèo thuyền đúng không nè? Vậy, em sẽ thử đi nhờ các thợ thủ công xem sao nè!」"
# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
1741 = "「Nhờ mọi người nhé.」"
# 【凪】
# display as 凪
# JP: 「まーかせとけばーい！！」
1482 = "「Cứ giao cho em nè!!」"
# monologue
# JP: 力を貸してもらえることで、\n少し、希望が見えてきたような気になれる。
2314 = "Nhờ được mọi người giúp sức, tôi cảm thấy như đã nhìn thấy một chút tia hy vọng."
# monologue
# JP: とにかく一人。まず一人。そうして誘っていけばなんとか、\n事態を打開できるかもしれん。
2130 = "Dù sao thì cũng phải được một người. Đầu tiên là một người. Cứ thế tiếp tục mời gọi, có lẽ chúng ta sẽ tìm ra cách xoay chuyển tình thế."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、動こう。\n立ち止まるのは、動けなくなってからで十分だ」
1870 = "「Tóm lại, cứ hành động đã. Chuyện dừng lại, đợi đến khi không thể nhúc nhích được nữa cũng chưa muộn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん――うん……そうか、わかった」
1580 = "「Ừ——ừm……vậy sao, anh hiểu rồi.」"
# monologue
# JP: ポーレットからの電話を切る。\n切るまでずっと、平静な声を保てたはずだ。
2360 = "Cúp điện thoại với Paulette. Cho đến lúc cúp máy, tôi chắc chắn đã giữ được giọng điệu bình tĩnh."
# 【双鉄】
# display as 雙鐵
# JP: 「く――そ」
1496 = "「Chết——tiệt.」"
# monologue
# JP: が、そう意識した反動なのか、電話を切ったその途端、\n恨み事の全てが塊となり、胸の奥から湧き出してくる。
2157 = "Nhưng, có lẽ do phản ứng ngược của việc cố ý làm vậy, ngay khi vừa cúp máy, tất cả những lời oán hận kết lại thành một khối, trào dâng từ sâu thẳm trong ngực."
# 【双鉄】
# display as 雙鐵
# JP: 「理念は、金には立ち向かえんのか――\n一週間たってもまだ――六人しか応募が来ていないとは」
1837 = "「Lý tưởng, không thể chống lại tiền bạc sao—— Đã một tuần trôi qua mà——mới chỉ có sáu người đến ứng tuyển.」"
# monologue
# JP: 六人で足りるわけがない。\nしかも、その六人は皆、学園を出たてのものだとも聞く。
2178 = "Sáu người thì làm sao mà đủ được. Hơn nữa, nghe nói cả sáu người đó đều vừa mới ra trường."
# 【双鉄】
# display as 雙鐵
# JP: 「キャスト志望者が集まったところで、\nその指導をできるものも、まだいない」
1676 = "「Dù có tập hợp được những người muốn làm diễn viên, thì vẫn chưa có ai có thể hướng dẫn họ cả.」"
# monologue
# JP: 押し込まれている。\n危険水域に最早来ている。
2347 = "Đang bị dồn ép.\nĐã đến vùng nước nguy hiểm mất rồi."
# monologue
# JP: だというのに、全く有効な手立てを打てない。\n金の力に――、一方的に僕らは蹂躙されている。
2221 = "Vậy mà, lại không thể tung ra một nước đi nào thực sự hiệu quả. Trước sức mạnh của đồng tiền——, chúng tôi đang bị chà đạp một cách đơn phương."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は御一夜の滅びに繋がると――\nわかってくれたのではなかったのか」
1610 = "「Việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sẽ dẫn đến sự diệt vong của Ohimitera—— Chẳng phải mọi người đã hiểu ra rồi sao.」"
# 【真闇】
# display as 真闇
# JP: 「わかっとっても流されよるんよ。\n『自分一人くらい』って、ついつい思ってしまうけん」
1672 = "「Dù có hiểu thì cũng bị cuốn theo thôi. Sẽ bất giác nghĩ rằng 『Chỉ mình mình chắc không sao đâu』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1977 = "「！！」" 
# monologue
# JP: 全く、気配に気づけなかった。\nどこから話を聞かれていたのか、強い不安が――
2348 = "Tôi hoàn toàn, không nhận ra sự hiện diện đó. Đã bị nghe thấy từ lúc nào, một sự bất an mãnh liệt——"
# 【真闇】
# display as 真闇
# JP: 「日々姫はお絵描き、他のみんなは蔵やけん。\nよかとよ？　愚痴も弱音も、ウチ以外には聞こえんけん」
1753 = "「Hibiki đang vẽ vời, những người khác thì ở trong xưởng rượu hết rồi. Không sao đâu. Dù là cằn nhằn hay than vãn, ngoài chị ra không ai nghe thấy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「愚痴……と、弱音か」
1739 = "「Cằn nhằn……với, than vãn sao.」"
# monologue
# JP: そうざっくりと言われてしまえば、\n肩肘張っても無意味なのだと、思い知る。
2586 = "Bị nói thẳng thừng như vậy, tôi nhận ra rằng việc cố tỏ ra cứng cỏi cũng vô nghĩa."
# monologue
# JP: 相手は、なにせ真闇姉だ。\nたとえ一しか聞かれていずとも、そこから百を悟られる。
2486 = "Dù sao thì đối phương cũng là chị Mayami. Dù chỉ nghe được một, chị ấy cũng có thể hiểu được mười."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたらいいかな、真闇姉。他はともかく、\n秦さんまでもが、金の力に負けてしまった」
1729 = "「Em phải làm sao đây, chị Mayami. Chưa nói đến những người khác, ngay cả anh Hata, cũng đã gục ngã trước sức mạnh của đồng tiền.」"
# 【真闇】
# display as 真闇
# JP: 「[はた]秦さんて――ボイラ屋さんの？」
1867 = "「Anh Hata là——chỗ xưởng nồi hơi á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、他の秦さんに用は無い」
1646 = "「Vâng, em đâu có việc gì với anh Hata nào khác đâu.」"
# monologue
# JP: 真闇姉ともあろうものが、\nなんでそんな自明のことを問い返すのか。
2550 = "Với một người như chị Mayami, tại sao lại hỏi ngược lại một điều hiển nhiên như vậy chứ."
# monologue
# JP: イラツキを感じてしまい荒いだ声に、\n自分が焦り、短気になってしまっていると知らされる。
2552 = "Nghe giọng nói cộc cằn vì cảm thấy bực bội của mình, tôi mới nhận ra bản thân đang nôn nóng và mất kiên nhẫn đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。いささか、動揺した。\nまさかここまで追い込まれるとは思ってなかった」
1103 = "「……Xin lỗi chị. Em hơi kích động. Không ngờ lại bị dồn đến mức này.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ほんまこつ追い込まれとーと？」
1661 = "「Sou-chan, em thực sự bị dồn vào đường cùng rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1530 = "「Hả?」"
# monologue
# JP: あまりに、馬鹿げた質問だ。
2618 = "Một câu hỏi quá đỗi ngớ ngẩn."
# monologue
# JP: が、真闇姉の目にも声にも態度にも、\n一片たりと、からかいの色を感じない。
2154 = "Nhưng, cả trong ánh mắt, giọng nói và thái độ của chị Mayami, tôi không hề cảm thấy một chút ý trêu chọc nào."
# 【真闇】
# display as 真闇
# JP: 「ボイラ屋さんに、双ちゃん、\n何ば頼みよるつもりやったと？」
1659 = "「Sou-chan, em định nhờ chỗ xưởng nồi hơi, làm chuyện gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、[ハチロク,3]8620の――」
1958 = "「Tất nhiên là, của \\x%l8620;#00ffc040;8620%l;#;——」"
# monologue
# JP: 言いかけ、気付く。\n\x%l8620;#00ffc040;8620%l;#;のボイラ整備は……
2602 = "Nói đến nửa chừng, tôi chợt nhận ra. Bảo dưỡng nồi hơi của \\x%l8620;#00ffc040;8620%l;#; thì……"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、教わっとらんかったと？」
1660 = "「Sou-chan, em chưa được dạy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、教わった――\n一から十まで、丁寧に教えていただいた」
1410 = "「Không, em đã được dạy rồi—— Được chỉ dạy tận tình từ đầu đến cuối rồi.」"
# monologue
# JP: ならば、今の状況下では――
2629 = "Nếu vậy, trong tình hình hiện tại thì——"
# monologue
# JP: 秦さんは、僕に余力を生じさせるか、\nより安全なバックアップとしてしか、機能しない。
2529 = "Anh Hata, chỉ có tác dụng tạo thêm chút thời gian rảnh rỗi cho tôi, hoặc đóng vai trò như một phương án dự phòng an toàn hơn mà thôi."
# 【真闇】
# display as 真闇
# JP: 「一から十まで仕込んでもらって――」
1431 = "「Được chỉ dạy từ đầu đến cuối rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「済まない。僕が完全に間違えていた。\n口コミの誘いを断られ続け、きっと意固地になっていた」
1641 = "「Em xin lỗi. Là em hoàn toàn sai. Bị từ chối liên tục qua những lời mời truyền miệng, chắc chắn em đã trở nên cố chấp rồi.」"
# monologue
# JP: 秦さんの職能を、\n今のこの時は、僕は切望していなかった。
2526 = "Khả năng chuyên môn của anh Hata, vào thời điểm hiện tại, không phải là thứ tôi khao khát."
# monologue
# JP: “秦さんだったら断らない”“きっと協力してくれる”\n――そんな希望に、甘え縋ろうとしただけだった。
1062 = "“Nếu là anh Hata thì sẽ không từ chối đâu” “Chắc chắn anh ấy sẽ hợp tác” ——Em chỉ định dựa dẫm và bấu víu vào niềm hy vọng đó thôi."
# 【真闇】
# display as 真闇
# JP: 「報酬が十分で、能力ば使いきらねばこなせん事なら、\nそりゃあ職人の、一番嬉しか仕事よね」
1609 = "「Nếu thù lao xứng đáng, và là công việc phải dùng hết khả năng mới hoàn thành được, thì đó chẳng phải là công việc đáng mừng nhất đối với thợ thủ công sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 
# monologue
# JP: だから秦さんはその仕事を選んだ。\nそれは当然の判断だ。
2376 = "Nên anh Hata đã chọn công việc đó. Đó là một phán đoán đương nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「申し訳ない。金の誘惑に負けたなど――\n未熟な僕の、逆恨みによる暴言に過ぎなかった」
1640 = "「Em xin lỗi. Cái gì mà thua trước cám dỗ của đồng tiền chứ—— Đó chỉ là những lời lẽ cay nghiệt do sự oán hận vô lý của một kẻ non nớt như em thôi.」"
# monologue
# JP: より良い仕事を選んだ人を逆恨みして、根に持つなどは\n……まったく愚かなことだった。
2242 = "Oán hận người đã chọn công việc tốt hơn, rồi để bụng chuyện đó ……thật sự là quá ngu ngốc."
# 【双鉄】
# display as 雙鐵
# JP: 「今は無理でも、更に良い仕事を提示して――\n本当に力が必要ならば、そうして借りれば良いだけだ」
1486 = "「Bây giờ không được thì đưa ra một công việc tốt hơn nữa—— Nếu thực sự cần đến sức mạnh của anh ấy, thì cứ làm vậy để mượn sức là được.」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1590 = "「嗯」" 
# monologue
# JP: 肯定のようにも、問いかけのようにも聞こえる、\n穏やかな声。
2515 = "Nghe như đang khẳng định, cũng như đang hỏi han, một giọng nói dịu dàng."
# monologue
# JP: 真闇姉だな、と感じれば、\n力みが、更に抜けた気になる。
2430 = "Cảm nhận được rằng, đây chính là chị Mayami, tôi cảm thấy sự căng thẳng, lại càng được trút bỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「宝生元忠は……そこまでを準備し、仕掛けて来た。\nそれは――今の僕には及びもつかぬ力量だ」
1631 = "「Houshou Mototada……đã chuẩn bị đến mức đó, và ra tay. Đó là——năng lực mà em hiện tại không thể sánh bằng.」"
# 【真闇】
# display as 真闇
# JP: 「力量言うなら、双ちゃんは銀行さんに\n決して負けておらんでしょーに」
1895 = "「Nếu nói về năng lực, Sou-chan tuyệt đối không thua kém gì ông ngân hàng đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 1530 = "「哎？」" 
# monologue
# JP: 気休めなど、真闇姉が僕に対して言うわけがない。\nが――
2509 = "Những lời an ủi, chị Mayami không đời nào nói với tôi. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今のこの状況を見ると」
1500 = "「Nhưng, nhìn vào tình hình hiện tại thì.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなん、力量の問題じゃなかとよ？\n単に、覚悟の問題ばい」
1924 = "「Cái đó, không phải là vấn đề năng lực đâu? Đơn thuần, chỉ là vấn đề quyết tâm thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「覚悟――\nいや、覚悟なら」
1802 = "「Quyết tâm——\nKhông, nếu là quyết tâm thì.」"
# monologue
# JP: しているつもりだ。\nベストも、尽くしてきたつもりだ。
2359 = "Em nghĩ là em đã chuẩn bị tâm lý rồi. Em cũng nghĩ là mình đã cố gắng hết sức."
# monologue
# JP: だが、真闇姉にそうと即答できない自分がここにいる。\nそれこそあるいは、僕の覚悟の不足の証なのであろうか。
2156 = "Nhưng, tôi lại không thể trả lời ngay lập tức với chị Mayami. Chính điều đó, có lẽ là minh chứng cho sự thiếu quyết tâm của tôi."
# 【真闇】
# display as 真闇
# JP: 「銀行さんは、なりふりも手段もかまっとらんばい。\nけど、双ちゃんはなりふりば気にしとるよね」
1936 = "「Ông ngân hàng đó, không thèm để ý đến sĩ diện hay thủ đoạn nữa rồi. Nhưng, Sou-chan vẫn còn để tâm đến sĩ diện nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――しかし――\n秦さんにも、他の幾人にも、僕は頭を下げ、て…………」
1396 = "「Không——nhưng mà—— Cả với anh Hata, và vài người khác nữa, em đã cúi đầu, nhờ vả…………」"
# monologue
# JP: 違う。\n一番最初に僕が頭を下げるべきは。
2126 = "Không đúng.\nNgười đầu tiên tôi nên cúi đầu nhờ vả là."
# monologue
# JP: なりふりかまわず勝ちたいのなら、頼るべき人は、\n他の誰であるはずもない。
2273 = "Nếu muốn chiến thắng bằng mọi giá, người nên nhờ cậy, không thể là ai khác ngoài người đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――まず、真闇姉に助力を願うべきだった」
1702 = "「Em——đáng lẽ phải nhờ chị Mayami giúp đỡ đầu tiên.」"
# monologue
# JP: ポーレットから、真闇姉への依頼があった。\nそんなこと、何の関係もありはしない。
2444 = "Paulette đã từng nhờ chị Mayami. Chuyện đó, hoàn toàn không liên quan gì cả."
# monologue
# JP: 身内の、義弟の僕でなければ頼めない――\nそういうレベルで、真闇姉に甘えきるべきだったのだ。
2217 = "Chỉ có người nhà, người em trai nuôi như tôi mới có thể nhờ vả—— Đáng lẽ tôi phải dựa dẫm vào chị Mayami ở mức độ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉一人の話ではない。蓑笠さんにも、赤井宮司にも\n――頼れる相手がいるのなら、心底頼るべきだった」
1398 = "「Không chỉ một mình chị Mayami. Cả ông Minokasa, cả đền chủ Akai ——nếu có người để dựa dẫm, đáng lẽ em phải dựa dẫm từ tận đáy lòng.」"
# monologue
# JP: 僕は、格好をつけていた。\n追い込まれてると、これはマズイと自覚しながら。
2547 = "Tôi, đã làm bộ làm tịch. Dù tự nhận thức được rằng mình đang bị dồn ép, và thế này thì nguy to."
# monologue
# JP: “ご無理なければ”“無理ない範囲で”そんな言葉で、\n『依頼するものの責任』から、恐らく無意識に逃げていた。
1053 = "Bằng những từ ngữ như “Nếu không phiền”, “Trong phạm vi có thể”, có lẽ trong vô thức, tôi đã trốn tránh 『trách nhiệm của người nhờ vả』."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の甘さが……苦境を深めてしまっていたのか」
1774 = "「Sự ngây thơ của em……đã làm hoàn cảnh thêm khó khăn sao.」"
# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんとも一部にはあるろーね」
1599 = "「Chà, một phần cũng là do vậy nhỉ.」"
# monologue
# JP: ひどくあっさり、\n真闇姉が僕の過失を断罪する。
2517 = "Vô cùng dứt khoát, chị Mayami định tội cho lỗi lầm của tôi."
# monologue
# JP: 断罪しながらにこにこと、\n僕にその手を、伸ばしてくれる。
2564 = "Vừa định tội vừa cười tươi, chị ấy vươn tay về phía tôi."
# 【真闇】
# display as 真闇
# JP: 「けど、ウチはおねえちゃんやけんね。\n双ちゃんのこと、おせっかいでも助けよるんよ」
1406 = "「Nhưng mà, chị là chị gái mà lị. Chuyện của Sou-chan, dù có bị cho là bao đồng thì chị cũng sẽ giúp thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これ、は？」
1926 = "「Cái, này là?」"
# monologue
# JP: 真闇姉の手には、紙がある。\nペラ紙、ほんの数枚が。
2512 = "Trong tay chị Mayami, có giấy. Những tờ giấy mỏng, chỉ vỏn vẹn vài tờ."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの理念が、お金に負けるばかりじゃなかいう、\n証たい」
1925 = "「Đây là minh chứng, cho thấy lý tưởng của Sou-chan, không phải lúc nào cũng thua tiền bạc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「証？　\n……っ！！」
1903 = "「Minh chứng?\n……!!」"
# monologue
# JP: 見た瞬間に、感謝と喜びが沸き起こり、\n同時にストンと、足元が消えたような恐怖を浴びせられる。
2350 = "Ngay khoảnh khắc nhìn thấy, lòng biết ơn và niềm vui sướng trào dâng, đồng thời, một nỗi sợ hãi như thể mất đi chỗ đứng dưới chân ập đến."
# monologue
# JP: これほど大きな盲点を――\n僕は、僕らは、放置してしまっていたのかと。
2284 = "Một điểm mù lớn đến thế này—— Tôi, chúng tôi, đã bỏ sót sao."
# 【真闇】
# display as 真闇
# JP: 「同意書と名簿ばあるばい。細かな条件は、\n双ちゃんたちにしか決められんけん、詰めとらんけど」
1929 = "「Có giấy đồng ý và danh sách nè. Điều kiện chi tiết thì, chỉ có nhóm Sou-chan mới quyết định được, nên chị chưa điền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「炭鉱、技術者さんたちの――\nかつて、術仙炭鉱で働いていた」
1796 = "「Của các kỹ sư mỏ than—— những người từng làm việc ở mỏ than Jutsusen.」"
# 【真闇】
# display as 真闇
# JP: 「代替のきかん人たちやけん。\nおせっかいかと思うたけど、まぁ」
1923 = "「Họ là những người không thể thay thế mà. Chị nghĩ là mình hơi bao đồng, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おせっかいどころか――」
1689 = "「Sao có thể là bao đồng được chứ——」"
# monologue
# JP: 絶対に手放してはいけない生命線のひとつを、\n僕らは無防備に放置してしまっていた。
2121 = "Một trong những sợi dây sinh mệnh tuyệt đối không được buông tay, chúng tôi lại để mặc nó không chút phòng bị."
# monologue
# JP: 真闇姉が事前に動いてくれてなければ、\nそこを向こうに握られていてもおかしくなかった。
2567 = "Nếu chị Mayami không hành động trước, thì việc chỗ đó bị phe kia nắm thóp cũng chẳng có gì lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「――本当に助かった。\nありがとう、真闇姉」
1081 = "「——Thực sự đã được cứu rồi.\nCảm ơn chị, chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「こんなんはねぇ、自分のためよ。\n右田一酒蔵元も出資するけんねぇ」
1732 = "「Mấy việc thế này á, là vì bản thân chị thôi. Vì Xưởng rượu Migita Ichi cũng sẽ đầu tư mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても――やはり、ありがとう」
1674 = "「Dù vậy——vẫn phải cảm ơn chị.」"
# monologue
# JP: 深々と頭を下げれば、\nふっ、と小さく鼻が鳴る。
2496 = "Khi tôi cúi đầu thật sâu,\nchị ấy khẽ khịt mũi cười."
# 【真闇】
# display as 真闇
# JP: 「感謝の気持ちやったら双ちゃん。\n言葉より、形で示すのが上等よね」
1662 = "「Nếu muốn bày tỏ lòng biết ơn thì Sou-chan à. Thể hiện bằng hành động vẫn tốt hơn lời nói nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「形で――どんな形で示せば」
1888 = "「Hành động——thể hiện bằng hành động như thế nào đây.」"
# 【真闇】
# display as 真闇
# JP: 「それはもちろん、\nマイントレジャーば成功させることたい」
1957 = "「Chuyện đó đương nhiên là, làm cho Mine Treasure thành công rực rỡ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら――」
1959 = "「Vậy thì——」"
# monologue
# JP: 同じ過ちは繰り返さない。
2335 = "Tôi sẽ không lặp lại sai lầm tương tự."
# monologue
# JP: 背伸びなど、余裕があるときにすればいい。\n今は、自分の無知と無力さを認めるべきだ。
2536 = "Cố vươn mình, cứ để lúc nào rảnh rỗi rồi làm. Bây giờ, tôi nên thừa nhận sự ngu muội và bất lực của bản thân."
# 【双鉄】
# display as 雙鐵
# JP: 「教えてくれ、真闇姉。\n僕は、そうするために何をすればいい？」
1514 = "「Chỉ cho em với, chị Mayami. Để làm được như vậy, em phải làm gì?」"
# 【真闇】
# display as 真闇
# JP: 「まずは、無いものを欲しがるのをよして、\nあるものを使い切るようにしたほうが良かとね」
1974 = "「Trước tiên, hãy ngừng ham muốn những thứ mình không có, và cố gắng tận dụng hết những thứ mình đang có thì tốt hơn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん。そうだな」
1533 = "「A——ừm. Đúng vậy.」"
# monologue
# JP: 6人からしか応募がないと嘆くのではなく、\nこの状況下、6人が応募してくれたことを感謝する。
2124 = "Đừng than thở rằng chỉ có 6 người ứng tuyển, mà hãy biết ơn vì trong hoàn cảnh này, vẫn có 6 người đến ứng tuyển."
# monologue
# JP: その上で、6人の能力と意志とを\nフルに活かせるようにして――ああ、いや、そうか。
2137 = "Trên cơ sở đó, hãy tận dụng tối đa năng lực và ý chí của 6 người họ——a, không, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「無いものを欲しがるから……\n実際以上に、僕は追い詰められた気になったのか」
1801 = "「Vì cứ ham muốn những thứ không có nên…… em mới cảm thấy mình bị dồn ép hơn cả thực tế sao.」"
# 【真闇】
# display as 真闇
# JP: 「そう。まず、自分らの現状を正確に把握せんといけんね。\nそうせんままに相手さんに対応すれば、泥仕合ばい」
1806 = "「Đúng vậy. Trước tiên, phải nắm bắt chính xác hiện trạng của bản thân đã. Nếu không làm vậy mà cứ đối phó với bên kia, thì sẽ thành một trận ném bùn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そして泥仕合に持ち込まれれば――\n資本力と組織力に勝る向こうが、勝ってしまうのか」
1107 = "「……Và nếu bị kéo vào một trận ném bùn—— thì bên kia, với sức mạnh tư bản và tổ chức vượt trội, sẽ chiến thắng sao.」"
# monologue
# JP: ならば或いはそれこそが、\n宝生元忠の狙いであったのかもしれん。
2630 = "Nếu vậy, có lẽ đó chính là, mục đích của Houshou Mototada cũng nên."
# monologue
# JP: こちらが対応したくなるような仕掛けをいくつも、\nほとんど手当たり次第のように、張り巡らせて。
2148 = "Ông ta giăng ra vô số những cái bẫy khiến chúng ta muốn đối phó, gần như là giăng ra một cách mù quáng."
# 【双鉄】
# display as 雙鐵
# JP: 「こちらの方が少数なのだ。最初からそれは変わらない。\n同じ土俵でぶつかっていては、勝てんのだ」
1710 = "「Bên chúng ta là thiểu số. Điều đó ngay từ đầu đã không thay đổi. Nếu cứ đâm đầu vào cùng một sàn đấu, thì không thể thắng được.」"
# monologue
# JP: 向こうが受けて立っていようが、\n一転、攻勢をかけてこようが、その根本は変わらない。
2470 = "Dù bên kia có đứng ra nghênh chiến, hay xoay chuyển, chủ động tấn công, thì cái gốc đó vẫn không đổi."
# monologue
# JP: 防戦に回れば、ジリ貧になり押しつぶされる。\nならば――こちらはこちらの戦いで逃げ切るしか無い。
2272 = "Nếu chuyển sang phòng ngự, sẽ dần suy kiệt và bị nghiền nát. Nếu vậy——chúng ta chỉ còn cách chạy thoát bằng trận chiến của riêng mình."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの勝利条件は、最初から何も変わっていない。\n追い詰められてあがいているのは、むしろ向こうだ」
1711 = "「Điều kiện chiến thắng của chúng ta, ngay từ đầu không hề thay đổi. Bên bị dồn ép và đang vùng vẫy, ngược lại là bên kia mới đúng.」"
# monologue
# JP: 無論、そのあがきは猛烈だ。
2487 = "Tất nhiên, sự vùng vẫy đó rất mãnh liệt."
# monologue
# JP: 死に物狂いのヒグマの如き反撃を、\n無駄なあがきとあざ笑うなら、すぐさま叩き潰されよう。
2570 = "Sự phản công như một con gấu xám điên cuồng, nếu chỉ cười nhạo là sự vùng vẫy vô ích, thì sẽ bị nghiền nát ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「――大臣視察を、合格点で乗り切ればいい。\nそれだけ出来れば、僕らの勝ちは揺るがなくなる」
1074 = "「——Chỉ cần vượt qua cuộc thị sát của bộ trưởng với điểm số vừa đủ đậu là được. Chỉ cần làm được như vậy, chiến thắng của chúng ta sẽ không bị lay chuyển.」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんとしたら、合格点で乗りきれっと？」
1894 = "「Làm thế nào, để vượt qua với điểm số vừa đủ đậu nè?」"
# monologue
# JP: 試験するような真闇姉の声。
2510 = "Giọng điệu của chị Mayami, như đang kiểm tra tôi."
# monologue
# JP: 真闇姉が試験官なら、\n誤答を恐れる必要などない。
2395 = "Nếu chị Mayami là giám khảo, thì chẳng cần phải sợ trả lời sai."
# 【双鉄】
# display as 雙鐵
# JP: 「為すべきことのミニマムをまず洗い出す。\nそして、それに必要な工数をなんとしても確保する」
1469 = "「Trước tiên phải lọc ra mức tối thiểu những việc cần làm. Sau đó, bằng mọi giá phải đảm bảo số công sức cần thiết cho việc đó.」"
# monologue
# JP: 単純極まる手段ほど、覆すのは難しい。\n必要最低限度の、工数。
2610 = "Phương pháp càng cực kỳ đơn giản, càng khó bị lật đổ. Số công sức tối thiểu cần thiết."
# monologue
# JP: それを埋めれば――\n相手に何人確保されようと、影響されずに勝てるのだ。
2219 = "Chỉ cần lấp đầy nó—— Dù đối phương có giành được bao nhiêu người, chúng ta vẫn có thể chiến thắng mà không bị ảnh hưởng."
# 【真闇】
# display as 真闇
# JP: 「やったら、頑張ってそぎゃんとせんとね」
1749 = "「Nếu vậy thì, phải cố gắng làm thế thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 
# monologue
# JP: 合格点を、与えてもらった。\n背中を、とん、と押して貰えた。
2518 = "Chị ấy đã cho tôi điểm đậu. Chị ấy đã vỗ nhẹ vào lưng tôi."
# monologue
# JP: それがなにより、ありがたい。\nここから先は――迷わずに済む。
2620 = "Đó là điều đáng quý hơn bất cứ thứ gì. Từ đây trở đi——tôi không cần phải do dự nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「そうするために。真闇姉。\n僕に、僕らに――力を貸して欲しいんだ」
1819 = "「Để làm được như vậy. Chị Mayami. Em muốn chị cho em, cho chúng em——mượn sức mạnh của chị.」"
