[script]
# lines: 482 
# 【ひかり】
# display as 光
# JP: 「まぁま、おそいのー」
1812 = "「Mẹ lâu quá ớ」"
# 【れいな】
# display as 玲奈
# JP: 「何かあったんですかねぇ」
1637 = "「Chắc là có chuyện gì rồi nha~」"
# monologue
# JP: ……宿代等は精算済みの早朝発ゆえ、\nチェックアウトは鍵をおいてくるだけの手筈となっている。
1185 = "...Vì chúng tôi xuất phát từ sáng sớm và đã thanh toán xong tiền phòng,\nnên thủ tục trả phòng chỉ cần để lại chìa khóa là xong."
# monologue
# JP: 「ついでにお化粧直していくから先に出ていて下さい」と、\nポーレットに言われてからもう、五分以上が経過した。
2590 = "Kể từ lúc Paulette nói \"Nhân tiện em sẽ dặm lại lớp trang điểm nên mọi người cứ ra trước đi\",\nđã hơn năm phút trôi qua."
# 【ひかり】
# display as 光
# JP: 「なにか、って、なぁにー？」
1918 = "「Chuyện gì, là chuyện gì ớ?」"
# 【れいな】
# display as 玲奈
# JP: 「うーん、なんでしょおねぇ？」
1679 = "「Ưm, chuyện gì được nhỉ~?」"
# monologue
# JP: 何事が起きようも無い状況だが、\nさすがにそろそろ少し不安に――
2743 = "Dù trong tình huống này chẳng thể xảy ra chuyện gì được,\nnhưng đợi mãi thế này cũng bắt đầu thấy hơi lo――"
# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1766 = "「Ồ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ごめんなさい。お待たせしました」
1896 = "「Xin lỗi mọi người. Đã để mọi người phải đợi」"
# monologue
# JP: ポーレットの姿を目にした瞬間、\nひかりの顔がぱっと輝く。
2285 = "Khoảnh khắc nhìn thấy bóng dáng Paulette,\nkhuôn mặt Hikari bừng sáng."
# 【ひかり】
# display as 光
# JP: 「ままなのー！」
1811 = "「Mẹ tới rồi ớ!」"
# 【れいな】
# display as 玲奈
# JP: 「なにかあったんですかぁ？」
1939 = "「Có chuyện gì sao ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっとだけ。\nうふふ、また後でのお楽しみ、ね？」
2023 = "「Một chút thôi.\nUfufu, để lát nữa sẽ có bất ngờ nha?」"
# monologue
# JP: 言いながら、ポーレットはバッグに手早く何かの包みと\n……白い封筒？　をしまい込む。
2697 = "Vừa nói, Paulette vừa nhanh tay nhét một gói đồ gì đó\nvà... một phong bì màu trắng? vào túi xách."
# monologue
# JP: 追加請求を受けるような記憶はないし――\nどこかの施設の無料券あたりであろうか？
2488 = "Tôi không nhớ là có phát sinh khoản phí nào cần thanh toán thêm――\nChắc là vé miễn phí của cơ sở nào đó chăng?"
# 【ポーレット】
# display as 波萊特
# JP: 「それより、駅に向かわないと」
1577 = "「Quan trọng hơn là, chúng ta phải ra ga thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだな」
1671 = "「Ôi, đúng rồi」"
# monologue
# JP: 今話さないということは、こどもには聞かれたくない。\nもしくは、後のお楽しみにということなのだろう。
2414 = "Bây giờ không nói ra, nghĩa là không muốn để bọn trẻ nghe thấy.\nHoặc là, để dành làm niềm vui bất ngờ về sau."
# 【双鉄】
# display as 雙鐵
# JP: 「旅程は、当初と変更なしか？」
1880 = "「Lịch trình vẫn không thay đổi so với dự kiến ban đầu chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そのつもりですけど……\n双鉄くん、もしかして行ってみたいとこが出来たとか？」
1753 = "「Vâng, em định thế... nhưng mà\nSoutetsu, không lẽ anh có chỗ nào muốn đi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや」
1953 = "「Không」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、少しだけ急いでもいいですか？」
2102 = "「Vậy, chúng ta nhanh lên một chút được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。急ぐのだな」
1741 = "「Ừm. Nhanh lên nào」"
# monologue
# JP: 言われた瞬間、反射でれいなに手を差し伸べている。
2476 = "Ngay khoảnh khắc cô ấy nói vậy, tôi đã phản xạ vươn tay về phía Reina."
# monologue
# JP: れいなも当然と抱っこされ――\n抱っこされてから、あれれと小さく首を傾げる？
2622 = "Reina cũng nghiễm nhiên được bế lên――\nSau khi được bế, cô bé hơi nghiêng đầu ngơ ngác?"
# 【れいな】
# display as 玲奈
# JP: 「始発の時間、のぉんびりいっても余裕ですよぉ？」
2000 = "「Giờ tàu chạy chuyến đầu, cứ tà tà đi cũng dư sức mà nha~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね。だけど……もし間に合ったらちょっとだけ、\n寄り道したいっていうか、立ち止まりたいっていうか」
1923 = "「Đúng vậy. Nhưng mà... nếu kịp giờ thì em muốn tạt ngang một chút,\nhay đúng hơn là muốn dừng lại một chút」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　うふふぅ。なるほどですよぉ」
1695 = "「A! Ufufu. Ra là vậy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1681 = "「Hửm?」"
# monologue
# JP: 僕にはいまいちわからぬが、れいなは――
2744 = "Tôi thì không hiểu lắm, nhưng Reina thì――"
# 【ひかり】
# display as 光
# JP: 「わかったのー！」
1585 = "「Biết rồi ớ!」"
# monologue
# JP: それにひかりも、事情を理解したらしい。\nひかりがポーレットに抱きついたなら、いつものごとくだ。
2459 = "Hơn nữa Hikari có vẻ cũng đã hiểu ra vấn đề.\nHikari ôm chầm lấy Paulette, giống như mọi khi."
# monologue
# JP: 僕がれいなを、ポーレットがひかりを抱っこして、\n手早く荷物を分配する。
2495 = "Tôi bế Reina, Paulette bế Hikari,\nvà nhanh chóng phân chia hành lý."
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、足下が怖いからな、そう早足にもなれん」
1553 = "「Nói vậy chứ, đường trơn trượt thế này, cũng không thể đi nhanh được đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「滑らないようにするには、小股がいいって聞きました。\n歩幅を小さくして、足の裏全部で歩く」
1889 = "「Em nghe nói để không bị trượt thì nên đi bước nhỏ.\nThu hẹp bước chân lại, và đi bằng cả lòng bàn chân」"
# 【双鉄】
# display as 雙鐵
# JP: 「足の裏全部？」
2039 = "「Cả lòng bàn chân?」"
# 【ポーレット】
# display as 波萊特
# JP: 「かかとにも、つま先に体重をかけないで、\n全部をひらたく、ぺったりって感じで」
1843 = "「Đừng dồn trọng lượng vào gót chân hay mũi chân,\nmà đặt cả bàn chân phẳng lỳ, kiểu như áp sát xuống ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　――おお、確かにこれは、安定するな」
1756 = "「Hửm? ――Ồ, quả thực cách này giữ thăng bằng tốt đấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、ちょっとだけ急ぎましょう」
2103 = "「Vậy, chúng ta nhanh lên một chút nhé」"
# monologue
# JP: 小股、べた足でぺたぺたと。\nペンギンにでもなったような気持ちがしてくる。
2536 = "Bước nhỏ, bàn chân áp sát lạch bạch lạch bạch.\nCảm giác cứ như mình biến thành chim cánh cụt vậy."
# monologue
# JP: （ペンギンの親子連れ、だな）
2787 = "（Gia đình chim cánh cụt dắt díu nhau, nhỉ）"
# monologue
# JP: 思ってしまえば、れいなにもひかりにも、\nぺたぺたと歩いて欲しいような気もする。
2428 = "Nghĩ vậy, tôi lại muốn nhìn thấy cả Reina và Hikari,\ncũng lạch bạch bước đi như thế."
# monologue
# JP: が、ポーレットの横顔は、真剣だ。\n寄り道とやらを、よほど実現したいのだろう。
2376 = "Nhưng, góc nghiêng của Paulette trông rất nghiêm túc.\nChắc hẳn cô ấy rất muốn thực hiện cái gọi là tạt ngang đó."
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1681 = "「唔？」" 
# monologue
# JP: 何の予告もないままに、\nポーレットが脇道へ入り込んでいく。
2575 = "Không hề báo trước,\nPaulette rẽ vào một con đường phụ."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット？」
1976 = "「Paulette?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、やっぱりばっちり！！」
1706 = "「A, quả nhiên là tuyệt cú mèo!!」"
# monologue
# JP: ポーレットの足がぴたりと止まる。\nひかりは素早く、ポーレットからずり落ちる。
2588 = "Chân Paulette đột ngột dừng lại.\nHikari nhanh chóng tuột xuống khỏi người Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「この時間、ちょうど[じゅんこう,1]順光になるし、よかったぁ！\nここ、昨日のうちから目をつけてたんですよ」
2085 = "「Giờ này, ánh sáng vừa vặn thuận chiều, may quá đi!\nChỗ này, em đã nhắm từ hôm qua rồi đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1619 = "「Ra là vậy」"
# monologue
# JP: 『ここ』と言われた場所に立ち、\nポーレットの視線を追えば、途端に理解が追いついてくる。
2525 = "Đứng ở nơi được gọi là 『chỗ này』,\nnhìn theo hướng mắt của Paulette, tôi lập tức hiểu ra vấn đề."
# 【双鉄】
# display as 雙鐵
# JP: 「撮り鉄、か」
1572 = "「Người thích chụp ảnh tàu, nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。\nこれもやっぱり、旅の記録で、楽しみですから」
1931 = "「Đúng vậy đúng vậy.\nĐây cũng là ghi chép hành trình, và là một niềm vui mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1742 = "「Ừm」"
# monologue
# JP: ポーレットが取り出すカメラは、\nいわゆるデジイチ、デジタル一眼レフという奴だ。
2581 = "Chiếc máy ảnh mà Paulette lấy ra,\nlà loại thường được gọi là DSLR, máy ảnh phản xạ ống kính đơn kỹ thuật số."
# monologue
# JP: 僕が借りているコンパクトとは違い、\n用途に合わせ、レンズを交換することが出来る。
2393 = "Khác với chiếc máy ảnh compact tôi đang mượn,\nnó có thể thay đổi ống kính tùy theo mục đích sử dụng."
# 【双鉄】
# display as 雙鐵
# JP: 「長いレンズを使うのだな」
1566 = "「Em dùng ống kính dài nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「長いっていっても[ちゅう]中望遠です。一両だけのこだし、\n適当に辺りを切り取れれば、それだけで決まるかなって」
2112 = "「Nói là dài nhưng cũng chỉ là ống tele tầm trung thôi. Chỉ có một toa xe,\nnên em nghĩ chỉ cần cắt bớt khung cảnh xung quanh cho phù hợp là được rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1676 = "「Ừm」"
# monologue
# JP: 長いレンズは、対象を遠くから拡大撮影できるものだ。\n拡大をするということは、視野が狭まるということで――
2741 = "Ống kính dài là loại có thể phóng to và chụp đối tượng từ xa.\nPhóng to đồng nghĩa với việc thu hẹp trường nhìn――"
# monologue
# JP: ならば、撮る列車の周りに映り込む景色も狭くなる。\nそれをつまりは“切り取る”と言っているのだろう。
2721 = "Nếu vậy, cảnh vật xung quanh lọt vào khung hình của đoàn tàu cũng sẽ bị thu hẹp lại.\nĐó có lẽ là ý của cô ấy khi nói \"cắt bớt\"."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、撮ってからで間に合うのか？\n確かに駅はすぐ近くではあるが」
1554 = "「Nhưng mà, chụp xong rồi mới ra ga thì có kịp không?\nĐúng là nhà ga ở ngay gần đây thật nhưng mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこはばっちり大丈夫です。[ゆけむり,1]湯煙鉄道線は、\n[こごた,2]小言田から[なるこ,1]鳴呼を挟んで、[しんじょう,1]新荘までの線なんですけど」
2082 = "「Vụ đó thì anh cứ yên tâm. Tuyến Đường sắt Yukemuri,\nlà tuyến chạy từ Kogota qua Naruko, đến tận Shinjou cơ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1742 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ほとんどの列車は、小言田－鳴呼。新荘－鳴呼。\nそれぞれの区間の折り返し運転をしてるんですよ」
1787 = "「Hầu hết các chuyến tàu đều chạy quay đầu,\ntrong các đoạn Kogota - Naruko và Shinjou - Naruko đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。両方から[なるこ,1]鳴呼を目指す客がほとんどで、\n全線乗車のニーズは乏しい……という線なのだな？」
1618 = "「Ra vậy. Hầu hết hành khách từ cả hai phía đều nhắm đến Naruko,\nnên nhu cầu đi toàn tuyến là rất ít... một tuyến đường như vậy nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。でも、\n始発と最終は、上り下りとも、全線を走りきります」
1956 = "「Đúng vậy đúng vậy. Nhưng mà,\nchuyến đầu và chuyến cuối, cả chiều đi lẫn chiều về, đều chạy hết toàn tuyến」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1884 = "「Anh hiểu rồi」"
# monologue
# JP: 僕の目の前に延びる線路が、\nそのまま答えを示している。
2469 = "Tuyến đường sắt trải dài trước mắt tôi,\nchính là câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「単線区間の、行き違い停車。\nそれが、鳴呼駅で発生するのだな」
1770 = "「Dừng tránh tàu trên đoạn đường đơn.\nViệc đó sẽ diễn ra ở ga Naruko nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解です！　それが五分もあるし、先着はこっちの、\n新荘発小言田いきですから、撮ってからでも余裕です！」
1959 = "「Hoàn toàn chính xác! Chuyện đó mất tận năm phút, mà tàu đến trước lại là chuyến này,\ntừ Shinjou đi Kogota, nên chụp xong vẫn dư dả thời gian!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。さすがの下調べだ」
2089 = "「Ra vậy. Quả là đã tìm hiểu kỹ càng có khác」"
# 【ポーレット】
# display as 波萊特
# JP: 「さすがだなんて、全然。\nこのくらいは、当たり前ですよ」
1894 = "「Gì mà kỹ càng chứ, không hề đâu.\nCỡ này là chuyện đương nhiên rồi」"
# monologue
# JP: 言いながら、みるからにもうワクワクと、\nポーレットはカメラをセッティングし始める。
2576 = "Vừa nói, trông Paulette đã vô cùng háo hức,\ncô ấy bắt đầu cài đặt máy ảnh."
# 【ポーレット】
# display as 波萊特
# JP: 「今回、全然撮れて無いですからね～！\nここはちょっと、決めちゃいますよー！」
2091 = "「Lần này, em chưa chụp được bức nào ra hồn cả~!\nChỗ này em nhất định phải bắt trọn khoảnh khắc mới đượcー!」"
# monologue
# JP: いいつつ、ファインダーを覗いては歩くを繰り返す。\nベストポジションを探しているのだろう。
2405 = "Nói rồi, cô ấy liên tục lặp lại động tác vừa nhìn qua ống ngắm vừa bước đi.\nChắc là đang tìm kiếm vị trí đắc địa nhất đây mà."
# monologue
# JP: どれ、僕も――
2736 = "Xem nào, tôi cũng――"
# 【ひかり】
# display as 光
# JP: 「ひかりー、ひかりもとりてつしてみたいのー」
1581 = "「Hikariー, Hikari cũng muốn thử làm người thích chụp ảnh tàu ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それはいいな」
1938 = "「Vậy sao. Ý hay đấy」"
# monologue
# JP: それこそ産まれたときから見慣れまくっているせいか、\n御一夜鉄道の車両たちを、ひかりは撮ろうともしなかった。
2380 = "Có lẽ do đã quá quen mắt từ lúc mới sinh ra,\nnên Hikari chưa bao giờ có ý định chụp lại những toa xe của Đường sắt Ohimitera."
# monologue
# JP: それが一転、カメラに興味を示してくれる――\nこれも旅の効果かと思えば、素直に嬉しくなってくる。
2661 = "Vậy mà giờ đây, con bé lại đột nhiên tỏ ra hứng thú với máy ảnh――\nNghĩ rằng đây cũng là hiệu ứng của chuyến đi, tôi thực sự cảm thấy vui mừng."
# 【れいな】
# display as 玲奈
# JP: 「れいなも、ひかりちゃんの写真みてみたいですぅ」
1999 = "「Reina cũng muốn xem ảnh Hikari chụp đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕のカメラで撮るといい」
1739 = "「Ừm. Con dùng máy ảnh của ba mà chụp」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたしの予備が」
1704 = "「A, em có máy dự phòng nè」"
# 【双鉄】
# display as 雙鐵
# JP: 「重すぎて使えんだろうし、\n僕がひかりに指導できるのは、こいつの使い方だけだ」
2096 = "「Nặng quá con bé không dùng được đâu,\nvới lại, anh chỉ có thể hướng dẫn Hikari cách dùng cái máy này thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね。じゃ、お願いします」
1707 = "「A, cũng đúng nhỉ. Vậy nhờ anh nhé」"
# monologue
# JP: ポーレットはあっさり引き下がり、\nまたベストポジションを探しうろつき始める。
2578 = "Paulette dễ dàng lùi bước,\nvà lại bắt đầu lảng vảng tìm kiếm vị trí đắc địa nhất."
# monologue
# JP: 邪魔をするのも気の毒だ。\nこちらはこちらでしっかりやろう。
2503 = "Làm phiền cô ấy lúc này cũng tội nghiệp.\nBên này thì cứ lo việc bên này cho đàng hoàng vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、まずは手袋を外そう」
1593 = "「Hikari, trước tiên hãy tháo găng tay ra đã」"
# 【ひかり】
# display as 光
# JP: 「はーいなのー」
1791 = "「Dạ ớ」"
# monologue
# JP: もたもた手袋が外された手に、\nポケットカメラを握らせる。
2353 = "Tôi đặt chiếc máy ảnh bỏ túi vào\nbàn tay vừa tháo găng tay một cách lóng ngóng của con bé."
# monologue
# JP: 軽く小さいカメラだけに、\nかえってひかりの手の小ささが際立ってみえる。
2723 = "Chính vì là chiếc máy ảnh nhỏ và nhẹ,\nnên lại càng làm nổi bật sự nhỏ bé của bàn tay Hikari."
# 【双鉄】
# display as 雙鐵
# JP: 「後ろ側の液晶に映ったものを、そのまま撮影できる。\nまずは、れいなをモデルに試してみよう」
2086 = "「Những gì hiển thị trên màn hình LCD phía sau, con có thể chụp lại y như vậy.\nTrước tiên, hãy thử lấy Reina làm người mẫu xem sao」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　れいな、大役ですねぇ」
1662 = "「Oa! Trọng trách lớn nha~」"
# 【ひかり】
# display as 光
# JP: 「ええと、れいなおねーちゃんを……どうするの？」
2047 = "「Ưm, với chị Reina... thì phải làm sao ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まず、カメラをしっかり持つ。\n指は、こう――で、脇を締めて――」
2117 = "「Đầu tiên, cầm máy ảnh thật chắc.\nNgón tay để thế này――rồi khép nách lại――」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ」
1643 = "「Fufu」"
# monologue
# JP: ポーレットの、幸せそうな笑い声。\n僕も、じんわりとうれしくなる。
2653 = "Tiếng cười hạnh phúc của Paulette.\nTôi cũng cảm thấy một niềm vui len lỏi."
# monologue
# JP: 昔ポーレットに習ったことを、こうしてひかりに教えてる。\nなんと幸福な瞬間だろうか。
2506 = "Những điều ngày xưa được Paulette dạy, giờ tôi đang dạy lại cho Hikari.\nThật là một khoảnh khắc hạnh phúc biết bao."
# 【双鉄】
# display as 雙鐵
# JP: 「で、ここに映ったものが写真になるわけだから、\n写したいものを――」
1607 = "「Rồi, vì những gì hiện lên ở đây sẽ trở thành bức ảnh,\nnên con hướng máy vào thứ mình muốn chụp――」"
# 【ひかり】
# display as 光
# JP: 「わかったのー！　れいなおねーちゃんを、\nこのがめんのなかに、いれる、のー」
1914 = "「Biết rồi ớ! Cho chị Reina,\nvào trong màn hình này, ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「大正解だ。カメラを動かしたあとには、また脇を締めて。\n脇をしめたら力まずに、シャッターボタンを軽く押す」
1957 = "「Chính xác. Sau khi di chuyển máy ảnh, con lại khép nách lại.\nKhép nách rồi thì đừng gồng sức, nhẹ nhàng nhấn nút chụp」"
# monologue
# JP: （ぴぴっ！）
2784 = "（Bíp bíp!）"
# 【ひかり】
# display as 光
# JP: 「わ！　かめらさんおしゃべりしたのー！」
1666 = "「Oa! Bạn máy ảnh nói chuyện rồi ớ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「『いまならピントバッチリですよ』と教えてくれたのだ。\n教えてもらえたら、すぐにシャッターをぐっとおす」
2004 = "「Đó là bạn ấy báo cho con biết 『Bây giờ lấy nét chuẩn rồi đấy』.\nKhi được báo như vậy, con lập tức nhấn mạnh nút chụp xuống」"
# 【ひかり】
# display as 光
# JP: 「ぐ！！」
1749 = "「Ư!!」"
# monologue
# JP: （ぱしゃっ！）
2783 = "（Tách!）"
# 【ひかり】
# display as 光
# JP: 「とれたのー！」
1898 = "「Chụp được rồi ớ!」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ、フラッシュ、まぶしいですよぉ」
1657 = "「Oa oa, đèn flash, chói mắt quá nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっといかん。切っておかねば」
1673 = "「Ôi hỏng rồi. Phải tắt đi mới được」"
# 【ひかり】
# display as 光
# JP: 「どおしてー？」
1979 = "「Tại sao ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはな、ひかり」
2087 = "「Đó là vì, Hikari à」"
# monologue
# JP: 実感をもって話せるだけに、\n声に怒りがにじまぬようにと気をつける。
2500 = "Chính vì có thể nói từ kinh nghiệm thực tế,\nnên tôi phải cẩn thận để giọng nói không lộ ra vẻ tức giận."
# 【双鉄】
# display as 雙鐵
# JP: 「前方注視をしているところにフラッシュをたかれると、\n目がくらんでしまい、非常に危険だからだ」
1771 = "「Khi người lái tàu đang tập trung nhìn về phía trước mà bị đèn flash chớp vào,\nsẽ làm họ bị lóa mắt, vô cùng nguy hiểm」"
# 【ひかり】
# display as 光
# JP: 「わ！　じこになっちゃう！！」
1664 = "「Oa! Sẽ gây tai nạn mất!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。だから絶対、何があろうと決して断固、\n運転台や運転席に向けてフラッシュをたいてはいけない」
1958 = "「Đúng vậy. Thế nên tuyệt đối, dù có chuyện gì xảy ra cũng dứt khoát,\nkhông được chớp đèn flash về phía buồng lái hay ghế lái」"
# 【ひかり】
# display as 光
# JP: 「わかったのー。ふらっしゅたかないのー」
1915 = "「Biết rồi ớ. Không chớp đèn flash ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「いい子だ――さて。\nおお、良く撮れているではないか」
2015 = "「Ngoan lắm――Nào.\nỒ, chụp đẹp lắm đấy chứ」"
# 【れいな】
# display as 玲奈
# JP: 「わ、見せてくださーい」
1667 = "「Oa, cho xem với nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほら」
1568 = "「Đây này」"
# monologue
# JP: 瞬間、笑顔ふたつが晴れ渡る。
2408 = "Trong chốc lát, hai nụ cười bừng sáng."
# 【ひかり】
# display as 光
# JP: 「わあ！　とれてるのー！\nひかりがとったれいなおねーちゃんなの！！！」
1660 = "「Oa! Chụp được rồi ớ!\nChị Reina do Hikari chụp đó!!!」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、にっこにっこですねー！\nひかりちゃんが撮ってくれたからですねぇ」
1983 = "「Reina, cười tươi rói luôn nha~!\nChắc là do được Hikari chụp cho đó nha~」"
# 【ひかり】
# display as 光
# JP: 「えへへー！」
1763 = "「Ehehe!」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいぞ、ひかり。れいなもモデルをありがとう。\nいまと同じ感じで、列車が来たら楽しんで撮ればいい」
2092 = "「Tuyệt lắm, Hikari. Cảm ơn Reina đã làm người mẫu nhé.\nCứ giữ cảm giác giống như lúc nãy, khi tàu đến con cứ vui vẻ mà chụp thôi」"
# 【ひかり】
# display as 光
# JP: 「わかったのー！」
1912 = "「Biết rồi ớ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では……っと」
1902 = "「Vậy thì... xem nào」"
# monologue
# JP: ズームだのワイドだのを教えている時間も無い。\nめいっぱいワイドで、失敗の確率を下げて――
2627 = "Không có thời gian để dạy về thu phóng hay góc rộng nữa.\nCứ để góc rộng nhất, giảm tỷ lệ thất bại xuống――"
# 【双鉄】
# display as 雙鐵
# JP: 「これでいい。あとはさっきと同じ手順。\n脇をしめて半押し、ピピっといったらシャッターだ」
1574 = "「Thế này là được rồi. Phần còn lại cứ làm theo các bước lúc nãy.\nKhép nách lại, nhấn nửa nút, nghe bíp bíp thì nhấn nút chụp」"
# 【ひかり】
# display as 光
# JP: 「わかったのー！」
# 1912 = "「明白了！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「来ます、もうすぐ」
2061 = "「Tàu đến rồi, sắp tới rồi」"
# monologue
# JP: カーンカーンカーンと、遠く、踏み切り警報音が聞こえる。
2507 = "Tiếng chuông cảnh báo đường ngang vang lên leng keng leng keng từ xa."
# monologue
# JP: ポーレットがレンズを向けている方を確認し、\nひかりの視線とカメラもそちらに向けてやる。
2350 = "Xác nhận hướng ống kính của Paulette,\ntôi cũng hướng ánh nhìn và máy ảnh của Hikari về phía đó."
# 【双鉄】
# display as 雙鐵
# JP: 「列車をおいかけてはダメだ。するのは、待ち伏せ」
2005 = "「Không được đuổi theo đoàn tàu. Phải làm là, phục kích」"
# 【ひかり】
# display as 光
# JP: 「まちぶせぇ？」
1562 = "「Phục kích ớ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。カメラは構えたまま動かさず、\n列車が画面に入ってくるのを待ち、シャッターを押す」
1731 = "「Ừm. Cứ giữ nguyên máy ảnh không được di chuyển,\nchờ đoàn tàu lọt vào khung hình rồi mới nhấn nút chụp」"
# 【ひかり】
# display as 光
# JP: 「わかったのー！」
# 1912 = "「明白了！」" 
# monologue
# JP: ひかりのカメラの液晶は、線路を上手く捉えている。
2338 = "Màn hình LCD trên máy ảnh của Hikari đã bắt trọn hình ảnh đường ray."
# 【ポーレット】
# display as 波萊特
# JP: 「きたっ！」
2060 = "「Đến rồi!」"
# monologue
# JP: （パシャっ！　パシャっ！　　パシャっ！　パシャっ！）
2781 = "（Tách! Tách! Tách! Tách!）"
# monologue
# JP: 望遠なのでポーレットのシャッタータイミングは、\n僕らのそれよりずっと早い。
2587 = "Vì là ống kính tele nên thời điểm bấm máy của Paulette,\nsớm hơn chúng tôi rất nhiều."
# monologue
# JP: 目に見えてそわそわしはじめるひかりの頭に、\nぽんと手を置き、落ち着かせる。
2640 = "Đặt tay nhẹ lên đầu Hikari đang bắt đầu tỏ rõ sự bồn chồn,\ntôi giúp con bé bình tĩnh lại."
# 【双鉄】
# display as 雙鐵
# JP: 「まだ大丈夫。液晶だけを、良く見るんだ」
2001 = "「Vẫn chưa sao đâu. Chỉ nhìn thật kỹ vào màn hình LCD thôi」"
# 【ひかり】
# display as 光
# JP: 「えきしょうだけを、よく、みる、のー」
1633 = "「Chỉ nhìn, thật kỹ, màn hình LCD, ớ」"
# monologue
# JP: ポーレットがこのポジションを選んだ理由を理解する。\n駅近く、始発、昨晩の雪が被さる線路。
2516 = "Tôi đã hiểu lý do Paulette chọn vị trí này.\nGần ga, chuyến tàu đầu tiên, đường ray phủ đầy tuyết đêm qua."
# monologue
# JP: 列車は、早くから制動をかける。つまりは、遅い。\nこれなら――はじめての撮影のひかりでも――
2360 = "Đoàn tàu sẽ hãm phanh từ sớm. Nói cách khác là, chạy chậm.\nNếu vậy thì――ngay cả với lần đầu tiên chụp ảnh của Hikari――"
# 【ひかり】
# display as 光
# JP: 「れっしゃさん、あのね、とらせてねー」
1610 = "「Bạn tàu hỏa ơi, cho tớ chụp ảnh nhéー」"
# 【双鉄】
# display as 雙鐵
# JP: 「今だ！」
1851 = "「Ngay lúc này!」"
# monologue
# JP: （ぴぴっ！）
# 2784 = "（嗶嗶！）" 
# 【ひかり】
# display as 光
# JP: 「とるのー！」
2045 = "「Chụp đây ớ!」"
# monologue
# JP: （ぱしゃっ！！！）
2782 = "（Tách!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだ！！？」
1872 = "「Thế nào!!?」"
# 【れいな】
# display as 玲奈
# JP: 「とれましたかぁ？」
1901 = "「Chụp được chưa ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「どうでした！？」
1870 = "「Thế nào rồi!?」"
# monologue
# JP: 自分の写真を確認もせず。\nポーレットまでがすっ飛んでくる。
2592 = "Thậm chí không thèm kiểm tra ảnh của mình.\nCả Paulette cũng bay vèo tới."
# 【ひかり】
# display as 光
# JP: 「わかんないのー、パパみて、なのー」
1550 = "「Không biết ớ, ba xem đi, ớ」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん見るが――\nそれは、列車の中でにしよう」
1885 = "「Đương nhiên là ba sẽ xem rồi――\nNhưng mà, để lên tàu rồi xem nhé」"
# 【ポーレット】
# display as 波萊特
# JP: 「始発っ！！」
1825 = "「Chuyến đầu tiên!!」"
# monologue
# JP: 急制動。すかさず逆進。\nポーレットはバッグにとって返してカメラを詰めて――
2591 = "Hãm phanh gấp. Lập tức lùi lại.\nPaulette quay về chỗ túi xách và nhét máy ảnh vào――"
# 【ポーレット】
# display as 波萊特
# JP: 「忘れ物――なしっ！」
1792 = "「Đồ bỏ quên――không có!」"
# monologue
# JP: キビキビとした指差喚呼。\nそしてひかりを抱き上げる。
2295 = "Chỉ tay hô xác nhận dứt khoát.\nRồi cô ấy bế Hikari lên."
# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしました双鉄くん！」
2114 = "「Đã để anh phải đợi rồi Soutetsu!」"
# monologue
# JP: 明るい笑顔で、歩き始める。
2427 = "Nở nụ cười tươi sáng, cô ấy bắt đầu bước đi."
# 【ポーレット】
# display as 波萊特
# JP: 「新荘までの一往復だけ楽しんで。\nそうしたら、帰るための旅をしましょう！」
1881 = "「Cùng tận hưởng một chuyến khứ hồi đến Shinjou thôi.\nSau đó, chúng ta sẽ bắt đầu hành trình trở về!」"
# 【ひかり】
# display as 光
# JP: 「うふふぅう～、うふふぅう～」
1644 = "「Ufufu~, ufufu~」"
# monologue
# JP: ……幼い頃を、思い出す。\n父が存命だったころ。
1192 = "……Nhớ lại thuở nhỏ.\nKhi cha tôi vẫn còn sống."
# monologue
# JP: 父のカメラは、フィルムカメラだったけれども――
2616 = "Dù máy ảnh của cha là máy ảnh dùng phim――"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃん、ごきげんですねぇ」
1830 = "「Hikari, vui vẻ quá nha~」"
# 【ひかり】
# display as 光
# JP: 「ごきげんなのー！」
1849 = "「Vui lắm ớ!」"
# monologue
# JP: けだるい空気が垂れ込める車内。\n小言田を経、仙岱へ戻るストーブ列車。
2494 = "Bầu không khí uể oải bao trùm bên trong toa xe.\nChuyến tàu sưởi ấm đi qua Kogota, quay trở về Sendai."
# 【ひかり】
# display as 光
# JP: 「まぁま！　まぁまぁ！」
1814 = "「Mẹ ơi! Mẹ ơi!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
1720 = "「Ưm...」"
# monologue
# JP: うとうとしてるポーレットまでを揺り起こすひかりの姿は、\nきっと、幼いころの僕と似ている。
2339 = "Hình ảnh Hikari lay gọi Paulette đang gật gù buồn ngủ,\nchắc chắn rất giống tôi lúc nhỏ."
# 【ひかり】
# display as 光
# JP: 「ねぇみてみてみてー」
1815 = "「Nè xem đi xem đi xem điー」"
# 【ポーレット】
# display as 波萊特
# JP: 「んー？　どうしたの？　ひかり」
1758 = "「Hửm? Sao thế? Hikari」"
# monologue
# JP: C12 77。一番最初にひかりが撮った、\n牽引わずか一両の――けれども立派な編成写真。
84 = "C12 77. Bức ảnh đầu tiên Hikari chụp,\ndù chỉ kéo một toa――nhưng là một bức ảnh \x%l編成;#00ffc040;đoàn tàu%l;#; tuyệt đẹp."
# monologue
# JP: 背面液晶に表示したそれを、ひかりは何度も、\n何度も何度も。飽きることなく見続けている。
2322 = "Hiển thị bức ảnh đó trên màn hình LCD phía sau, Hikari xem đi xem lại,\nxem mãi không biết chán."
# monologue
# JP: （僕が……僕らが、\n一番最初に撮ったのは――どんな写真だったんだろうな）
2789 = "（Bức ảnh đầu tiên... mà chúng tôi,\nđã chụp――là bức ảnh như thế nào nhỉ）"
# monologue
# JP: 父のカメラで、路子と交代交代で、\nレンズを回してピントをあわせた。
2537 = "Bằng máy ảnh của cha, tôi và Michiko thay phiên nhau,\nxoay ống kính để lấy nét."
# monologue
# JP: その記憶だけは、ほんのわずかに残っているが……\n何を撮ろうとしていたのかは、完全に忘却の霧の彼方だ。
2691 = "Chỉ có ký ức đó là còn đọng lại một chút xíu...\nNhưng lúc đó định chụp cái gì, thì đã hoàn toàn chìm vào màn sương quên lãng."
# 【ポーレット】
# display as 波萊特
# JP: 「うん。上手。おじいちゃんに似たのね、きっと。\nひかり、ママよりずーっと写真のセンスいい」
1734 = "「Ừm. Giỏi lắm. Chắc là giống ông ngoại rồi.\nHikari, có năng khiếu chụp ảnh hơn mẹ nhiều」"
# 【ひかり】
# display as 光
# JP: 「ママのは？　どんなのー？」
1813 = "「Của mẹ thì sao? Như thế nào ớ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。はい、これ」
1776 = "「Ừm. Đây, cái này」"
# monologue
# JP: さすがに見事だ。\nお手本どおり――教科書通りと言えばいいのか。
2586 = "Quả thực rất đẹp.\nNói là chuẩn như sách mẫu――hay chuẩn như sách giáo khoa nhỉ."
# monologue
# JP: 無駄なく余分を切り取って、\n一両編成、そのかわいらしさをぎゅっと圧縮している。
2418 = "Cắt bỏ những phần thừa thãi một cách hoàn hảo,\ngói gọn sự dễ thương của một đoàn tàu một toa vào khung hình."
# 【ひかり】
# display as 光
# JP: 「ふんふん、なるほどなのー。\nままのもね、なかなかいいのなの！」
1746 = "「Hưm hưm, ra là vậy ớ.\nCủa mẹ cũng, khá đẹp đó ớ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ありがとう」
1645 = "「Ufufu, cảm ơn con」"
# 【れいな】
# display as 玲奈
# JP: 「ふああああぁ」
1652 = "「Oaaaa~」"
# monologue
# JP: 大あくび。
2624 = "Ngáp một cái thật to."
# monologue
# JP: はずかしそうに首をすくめて、\nれいなはちろりと舌を出す。
2610 = "Rụt cổ lại vẻ xấu hổ,\nReina thè lưỡi ra."
# 【れいな】
# display as 玲奈
# JP: 「ごめんなさぁい。ちょっとつかれて、きもちよくって、\nれいな、ねむたくなっちゃいましたぁ」
1823 = "「Xin lỗi nha~. Hơi mệt một chút, lại thấy thoải mái,\nnên Reina, buồn ngủ mất rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「謝るようなことでもないさ。\n周りをみてみても、ほら――」
1536 = "「Không có gì phải xin lỗi đâu.\nEm thử nhìn xung quanh xem, đó――」"
# monologue
# JP: 鳴呼を出て、まだ大してたっていないのに、\n周りの席では、船をこぐひとが続出だ。
2704 = "Rời khỏi Naruko chưa được bao lâu,\nmà các ghế xung quanh đã có rất nhiều người gật gù rồi."
# 【れいな】
# display as 玲奈
# JP: 「いきの列車にのってたひとたちも、\nけっこうのってますねぇ」
2093 = "「Những người đi cùng chuyến tàu lúc đi,\ncũng có khá nhiều người lên chuyến này nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1937 = "「Vậy sao?」"
# monologue
# JP: あいにくと、人の顔を覚えるのは得意ではない。
2471 = "Đáng tiếc là, tôi không giỏi nhớ mặt người khác cho lắm."
# monologue
# JP: だが、言われてみると、見覚えがあるような顔が\nちらほら見えるような気もする。
2291 = "Nhưng, nghe em ấy nói vậy, tôi cũng có cảm giác\nlác đác vài khuôn mặt trông quen quen."
# monologue
# JP: （あたりくじをくれたあのカップルは――乗っていないか。\n行商のおばあさん…………も、いないようだな）
2794 = "（Cặp đôi cho chúng tôi phiếu trúng thưởng――không có trên tàu sao.\nBà lão bán hàng rong............ có vẻ cũng không thấy）"
# 【双鉄】
# display as 雙鐵
# JP: 「行きと違って、ずいぶん静かだ」
1654 = "「Khác với lúc đi, giờ khá yên tĩnh nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「観光列車の、観光地からもどるやつって、\nみんなだいたい、こんな感じですよ？」
1858 = "「Tàu du lịch, lúc trở về từ điểm tham quan,\nmọi người đại khái đều như thế này đó?」"
# monologue
# JP: カメラをまるごとひかりに渡して、\nポーレットが会話に参加してくる。
2580 = "Giao nguyên cái máy ảnh cho Hikari,\nPaulette tham gia vào cuộc trò chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「レンズを交換してやったのか」
1565 = "「Em đổi ống kính rồi à」"
# monologue
# JP: ポーレットが使っていた長いレンズのときよりも、\nカメラはずいぶん小さく見える。
2341 = "So với lúc dùng ống kính dài của Paulette,\nchiếc máy ảnh trông nhỏ hơn hẳn."
# monologue
# JP: それでもひかりの両手には、あまりに大きく重そうだが。
2457 = "Dù vậy, đối với đôi tay của Hikari, nó vẫn có vẻ quá to và nặng."
# 【ポーレット】
# display as 波萊特
# JP: 「ですよ？　ひかりが撮りたがったから」
1925 = "「Đúng vậy? Vì Hikari muốn chụp mà」"
# monologue
# JP: 極端に短い――というよりも、\nぺたりと薄いようなレンズだ。
2589 = "Một ống kính cực kỳ ngắn――hay nói đúng hơn là,\nmột ống kính mỏng dẹt."
# 【双鉄】
# display as 雙鐵
# JP: 「あれは、広角というヤツか？」
2098 = "「Cái đó, là loại góc rộng sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、パンケーキズームっていうレンズです。\nパンケーキみたいに薄くて、軽くて小さいんですけど」
1540 = "「Không, đó là ống kính zoom pancake.\nNó mỏng như bánh pancake, nhẹ và nhỏ gọn nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1677 = "「Ồ!」"
# 【ひかり】
# display as 光
# JP: 「きゃあ」
1640 = "「Kya」"
# monologue
# JP: 操作の仕方を、ポーレットが教えていたのだろうか。\n薄かったレンズがにょっきり、伸びてくる。
2382 = "Có lẽ Paulette đã dạy con bé cách thao tác.\nỐng kính vốn mỏng dẹt bỗng nhô ra, dài thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ズームか」
2090 = "「Ra vậy, nên mới là zoom」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。広角側も撮れますし、\nああ見えて、そこそこ遠くも写せますよ？」
1929 = "「Đúng vậy đúng vậy. Có thể chụp góc rộng,\nvà trông thế thôi chứ chụp xa cũng được đấy?」"
# 【ひかり】
# display as 光
# JP: 「ふわわわ～」
1651 = "「Fuwawawa~」"
# monologue
# JP: 背面液晶を覗いたままに、面白がって、\nひかりがあちこちカメラを向ける。
2326 = "Vẫn dán mắt vào màn hình LCD phía sau, Hikari thích thú\nhướng máy ảnh đi khắp nơi."
# 【双鉄】
# display as 雙鐵
# JP: 「フラッシュは」
2110 = "「Còn đèn flash」"
# 【ポーレット】
# display as 波萊特
# JP: 「切ってありますよ？　もちろん」
1886 = "「Em tắt rồi? Đương nhiên」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすがだな」
2010 = "「Đúng là chu đáo」"
# monologue
# JP: ならば、寝ている方の邪魔をするようなこともあるまい。\n夫婦の会話を再開しよう。
2735 = "Nếu vậy, chắc cũng không làm phiền những người đang ngủ đâu.\nCùng tiếp tục cuộc trò chuyện của hai vợ chồng nào."
# 【双鉄】
# display as 雙鐵
# JP: 「こんなに寝ているものなのか？\n観光地からの帰りの、観光列車の中身は」
1857 = "「Mọi người ngủ nhiều đến thế này sao?\nBên trong chuyến tàu du lịch, trên đường trở về từ điểm tham quan ấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「ストーブだからかな？　今日は寝てる人特に多いですね。\nけど方向性――空気感は、どこでもだいたいこんなです」
1635 = "「Chắc do là tàu sưởi ấm chăng? Hôm nay đặc biệt có nhiều người ngủ nhỉ.\nNhưng về cơ bản――bầu không khí ở đâu cũng đại loại thế này thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「空気感？」
1950 = "「Bầu không khí?」"
# 【ポーレット】
# display as 波萊特
# JP: 「お祭りのあと――っていう空気ですよね。\nざわめいていた反動で、すこし、さみしい」
1853 = "「Là bầu không khí――kiểu như sau lễ hội ấy.\nPhản ứng ngược của sự ồn ào náo nhiệt, nên có chút cô đơn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1676 = "「哦」" 
# monologue
# JP: 言われてみれば、なるほどと思わされる。
2662 = "Nghe cô ấy nói vậy, tôi mới vỡ lẽ."
# monologue
# JP: もうはしゃいでいる者は無く、\n疲労感と満足感とが、優しく辺りを包み込む。
2708 = "Không còn ai nô đùa nữa,\ncảm giác mệt mỏi và thỏa mãn nhẹ nhàng bao trùm xung quanh."
# 【双鉄】
# display as 雙鐵
# JP: 「これもまた、旅の風情か」
2080 = "「Đây cũng là một nét phong vị của chuyến đi nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
1932 = "「Đúng vậy」"
# monologue
# JP: 車窓の外には、またちらちらと粉雪が。\n行きと同じく、降っては止んでを繰り返しているようだ。
2707 = "Ngoài cửa sổ xe, những bông tuyết lất phất lại rơi.\nGiống như lúc đi, có vẻ tuyết cứ rơi rồi lại tạnh liên tục."
# 【双鉄】
# display as 雙鐵
# JP: 「……同じ[とうほく,1]凍北。同じゆけむり沿線でも、\n鳴呼の手前と、鳴呼の先では、まるで違うなぁ」
1217 = "「...Cùng là vùng Touhoku. Cùng nằm trên tuyến Yukemuri,\nnhưng trước và sau Naruko, lại hoàn toàn khác biệt nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですねぇ。\n雪、新荘側では、がんがんに降ってましたもんね」
1927 = "「Đúng vậy ha.\nTuyết ở phía Shinjou, rơi dữ dội lắm mà」"
# monologue
# JP: そのためそちら方面は、ポーレットの言葉を借りるなら、\n『来た。見た。乗った』ただそれだけになってしまった。
2539 = "Do đó, về phương diện kia, mượn lời của Paulette thì\n『Đã đến. Đã thấy. Đã lên tàu』chỉ đơn giản là như vậy."
# monologue
# JP: が、その『乗った』がなかなか上等だった。\nポーレットも思い出したのか、 うっとりとした息を吐く。
2290 = "Nhưng, cái phần 『Đã lên tàu』 đó lại vô cùng tuyệt vời.\nChắc Paulette cũng vừa nhớ lại nên mới thở ra một hơi đầy say sưa."
# 【ポーレット】
# display as 波萊特
# JP: 「……素敵でしたねぇ、湯煙鉄道の[しーじゅうに,2]Ｃ１２。\nデフついてるのは知ってましたけど」
1211 = "「……Tuyệt thật nhỉ, đầu máy \x%lC12;#00ffc040;C12%l;#; của Đường sắt Yukemuri.\nDù em đã biết là có gắn \x%l除煙板;#00ffc040;tấm chắn khói%l;#; rồi nhưng mà」"
# 【れいな】
# display as 玲奈
# JP: 「スノープラウ！　かっこよかったですねぇ！！\nまさかついてるなんて、れいな、びっくりしたですよぉ」
2095 = "「Cả bộ gạt tuyết nữa! Trông ngầu quá trời luôn nha!!\nKhông ngờ lại có gắn cái đó luôn, Reina bất ngờ lắm đó ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ねー、[シゴロク,2]c56が[テンダー,2]炭水車忘れてきたのかな？　って、\n一瞬わたし、思っちゃったし」
1846 = "「Đúng thế, có khoảnh khắc em còn tưởng là\n\x%lC56;#00ffc040;C56%l;#; bỏ quên \x%l炭水車;#00ffc040;toa tiếp than nước%l;#; ở nhà nữa cơ」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、どんなうっかりさんでも、\nテンダーはきっと忘れませんよぉ」
1759 = "「Ư phu phu~, dù có là người đãng trí đến mức nào\nthì chắc chắn cũng không quên \x%l炭水車;#00ffc040;toa tiếp than nước%l;#; đâu ạ~」"
# monologue
# JP: が、来て、見て、乗った、それだけで、\nポーレットもれいなも、大満足であったようだ。
2306 = "Nhưng, đã đến, đã thấy, đã lên tàu, chỉ bấy nhiêu thôi\ncũng đủ khiến cả Paulette và Reina cực kỳ mãn nguyện rồi."
# monologue
# JP: 確かに、スノープラウなる雪かきは、\nハチロクがほしがるだけあり、格好よくあった。
2633 = "Quả thật, cái máy dọn tuyết tên là Snowplow đó\ntrông rất ngầu, hèn chi Hachiroku lại muốn có đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは――」
1579 = "「Hikari thì——」"
# 【ひかり】
# display as 光
# JP: 「ふぁ……うさちゃん」
1656 = "「Oa…… Bé thỏ」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1681 = "「唔？」" 
# monologue
# JP: 話しかけようと思った矢先、\n妙な言葉が聞こえてくる。
2499 = "Ngay lúc tôi định cất lời,\nlại nghe thấy một từ kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「うさちゃん、とは、うさぎか？」
1835 = "「Bé thỏ, ý con là con thỏ à?」"
# 【ひかり】
# display as 光
# JP: 「うん、うさぎさんなのー」
1750 = "「Vâng, là bạn thỏ đó~」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　ウサギ、いたの！！？」
1675 = "「Hả!? Có thỏ ở đây sao!!?」"
# 【れいな】
# display as 玲奈
# JP: 「どこですぅ？　れいなもみてみたいですぅ」
1773 = "「Ở đâu thế ạ? Reina cũng muốn xem nha~」"
# 【ひかり】
# display as 光
# JP: 「あのね、あそこなのー」
1569 = "「Là ở đằng kia kìa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1681 = "「唔？」" 
# monologue
# JP: ひかりがレンズをむけているのは、\n車窓の外では無く車内……ああ。
2371 = "Hướng mà Hikari chĩa ống kính vào\nkhông phải là ngoài cửa sổ mà là bên trong toa xe…… À."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。かわいいうさちゃんですねぇ」
1648 = "「Ư phu phu~. Bé thỏ đáng yêu quá nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか、雪うさぎちゃんか」
1622 = "「Ra vậy, là thỏ tuyết à」"
# monologue
# JP: ボックスシートの、母子連れ。\n身を寄せ合うようにして眠りこけてる。
2283 = "Một cặp mẹ con ở ghế buồng.\nHai người họ đang tựa vào nhau ngủ say sưa."
# monologue
# JP: その窓にぴったりくっついて、小さな雪うさぎがちょこん、\n眠るおさなごを見守っている。
2657 = "Một chú thỏ tuyết nhỏ nhắn dính chặt vào cửa sổ,\nđang trông chừng đứa trẻ say giấc nồng."
# monologue
# JP: （なるほど……窓に接触しているから、\n溶けるスピードがゆるやかなもので済んだのか）
2780 = "（Ra là vậy…… Vì tiếp xúc với cửa sổ\nnên tốc độ tan chảy mới chậm lại nhỉ）"
# monologue
# JP: こどもは、多分、二、三歳。
2732 = "Đứa bé đó chắc khoảng hai, ba tuổi."
# monologue
# JP: 雪うさぎをよほど気に入り、おかあさんにお願いして、\n家に連れ帰ろうとでもしたのだろう。
2302 = "Chắc hẳn đứa bé rất thích chú thỏ tuyết nên đã nài nỉ mẹ\ncho mang về nhà."
# 【ポーレット】
# display as 波萊特
# JP: 「寝てる間に、忘れてくれるといいんですけど」
2049 = "「Giá mà thằng bé có thể quên đi trong lúc ngủ thì tốt biết mấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1932 = "「是啊」" 
# monologue
# JP: ポーレットも、僕と同じことを感じたようだ。
2636 = "Có vẻ Paulette cũng cảm nhận giống tôi."
# 【ひかり】
# display as 光
# JP: 「わすれるって、なにをぉ？」
1865 = "「Quên đi, là quên cái gì cơ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん？　なんでもない」
1952 = "「Hửm? Không có gì đâu」"
# 【ひかり】
# display as 光
# JP: 「ぱぱぁ、なにをわすれるのぉ？」
1993 = "「Ba ơi, quên cái gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、何だろうな。\n僕ではひかりに答えられそうにないし。ポーレット――」
2084 = "「Cái gì nhỉ.\nBa không biết trả lời Hikari sao nữa. Paulette——」"
# monologue
# JP: ひかりの頭をくしゃりと撫でる。
2526 = "Tôi xoa nhẹ đầu Hikari."
# monologue
# JP: うさぎが溶けるということを、\nわざわざひかりに言い聞かせるのも悪趣味だ。
2584 = "Cố tình nói cho Hikari biết thỏ tuyết sẽ tan chảy\nthì đúng là sở thích tai hại."
# 【双鉄】
# display as 雙鐵
# JP: 「――ママもきっと、\n何を話していたかを忘れてしまったのさ」
1197 = "「——Mẹ chắc chắn cũng đã\nquên mất mình vừa nói gì rồi」"
# 【ひかり】
# display as 光
# JP: 「そぉなのー？」
# 1937 = "「是嗎？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「そうそう、ママってばわすれっぽいから――\nって！　わわ、ほんとに忘れてた！？」
1936 = "「Đúng vậy, mẹ hay quên lắm——\nÁ! Oa oa, mẹ quên thật rồi!?」"
# monologue
# JP: 言うなり、ポーレットはカバンをガサゴソやり始める。
2698 = "Vừa dứt lời, Paulette bắt đầu lục lọi túi xách."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、どうした。忘れ物か？」
1871 = "「Sao thế, em quên đồ à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「忘れ物じゃなくて、出し忘れです。\nせっかく作ってもらったのに――」
1542 = "「Không phải quên đồ, mà là quên lấy ra.\nNgười ta đã cất công làm cho vậy mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1765 = "「Ồ」"
# monologue
# JP: ポーレットが取り出したのは、\nアルミホイルの包みを、八つ。
2582 = "Thứ Paulette lấy ra\nlà tám bọc giấy bạc."
# 【れいな】
# display as 玲奈
# JP: 「わ、おにぎりですかぁ？」
1669 = "「Oa, cơm nắm phải không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解！」
1996 = "「Chính xác!」"
# 【双鉄】
# display as 雙鐵
# JP: 「朝、これを受け取っていたのか？」
1617 = "「Sáng nay em đã nhận cái này à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。始発で出るって伝えてたから、\nわざわざ用意してくれたって」
1940 = "「Đúng vậy. Vì em báo trước là sẽ đi chuyến sớm nhất\nnên họ đã cất công chuẩn bị cho đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「あの仲居さんか？」
1943 = "「Là cô phục vụ đó à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。気が利きますよね、お若いのに」
1727 = "「Vâng. Còn trẻ mà chu đáo ghê nhỉ」"
# 【ひかり】
# display as 光
# JP: 「あ」
1691 = "「A」"
# monologue
# JP: ひかりが少し怯えたような声を出す。\n昨日泣いたことを、思い出してしまったのかもしれん。
2346 = "Hikari cất giọng hơi rụt rè.\nCó lẽ con bé nhớ lại chuyện khóc nhè hôm qua."
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ、いただくか！\n一番大きいのがいいかな」
1911 = "「Người ta đã cất công chuẩn bị thì mình ăn thôi!\nLấy cái to nhất vậy」"
# monologue
# JP: 空気を変えてしまおうと、わざと明るく手を伸ばす――
2603 = "Để thay đổi bầu không khí, tôi cố tình tỏ ra vui vẻ vươn tay ra——"
# 【ポーレット】
# display as 波萊特
# JP: 「あああ！　待ってください双鉄くん！\nせっかく気を利かせてくれたのに」
1699 = "「Aaa! Đợi đã anh Soutetsu!\nNgười ta đã cất công chuẩn bị cho mình mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1754 = "「Hửm?」"
# 【れいな】
# display as 玲奈
# JP: 「あああ！　れいな、わかっちゃいましたぁ」
1697 = "「Aaa! Reina hiểu rồi nha~」"
# monologue
# JP: 言って、れいなはおにぎりひとつを両手で包む。
2696 = "Nói rồi, Reina dùng hai tay bọc lấy một nắm cơm."
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃんも、いっしょにしましょおねぇ」
1832 = "「Bé Hikari cũng làm cùng Reina nha~」"
# 【ひかり】
# display as 光
# JP: 「んゆう？」
# 1754 = "「嗯？」" 
# monologue
# JP: ひかりにおにぎりひとつをわたし、\n新しいのをまた手にとって。
2625 = "Reina đưa cho Hikari một nắm cơm,\nrồi lại lấy một nắm khác."
# monologue
# JP: そしてれいなはぽてぽてと、\nストーブの前に移動して――
2541 = "Xong Reina lon ton\nchạy đến trước bếp lò——"
# 【双鉄】
# display as 雙鐵
# JP: 「焼きおにぎりか！　だからホイル包みなのか」
1621 = "「Cơm nắm nướng à! Hèn chi lại bọc giấy bạc」"
# 【ひかり】
# display as 光
# JP: 「ひかりもー！　ひかりやきたいのー！」
1583 = "「Hikari cũng muốn! Hikari muốn nướng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「待て待て、いま抱っこする」
2021 = "「Từ từ đã, ba bế lên nào」"
# monologue
# JP: ひかりが全力で喜んでいる。
2351 = "Hikari vui sướng tột độ."
# monologue
# JP: ああ、本当に――\n“気を利かせる”とは、こういうことだ。
2483 = "A, đúng thật là——\n“Chu đáo” là như thế này đây."
# 【双鉄】
# display as 雙鐵
# JP: 「ん……むっ――」
1725 = "「Ưm…… Hự——」"
# 【れいな】
# display as 玲奈
# JP: 「（すやあぁぁ～、すぅぴぃぃぃ～）」
2120 = "「（Khò khò~, khò khò~）」"
# 【ひかり】
# display as 光
# JP: 「ぅふぅ……んゆぅ～～」
1650 = "「Ư phu phu…… Ưm yuu~~」"
# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄、くん」
1216 = "「……Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1682 = "「Ưm!?」"
# monologue
# JP: 呼ばれた気がして、目を開く。
2535 = "Cảm giác như có ai gọi, tôi mở mắt ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うたた寝をしてしまっていたのか」
1690 = "「A…… Mình ngủ gật mất rồi à」"
# 【ポーレット】
# display as 波萊特
# JP: 「[けいさん,1]経産大臣……おみやげ……せき、たん――」
2029 = "「Bộ trưởng Kinh tế và Công nghiệp…… Quà lưu niệm…… Than, đá——」"
# 【双鉄】
# display as 雙鐵
# JP: 「旅行中の夢の中でまで、\n仕事熱心だな、ポーレットは」
2012 = "「Đến cả trong mơ lúc đi du lịch,\nPaulette cũng tham công tiếc việc thật đấy」"
# monologue
# JP: 呼ばれた気がして、ではなく、\n呼ばれていたのだと確信できる。
2629 = "Không phải là có cảm giác, mà tôi\nchắc chắn là vừa nãy có người gọi mình."
# 【双鉄】
# display as 雙鐵
# JP: 「その上、夢の中でまで甘えっ子だ」
2033 = "「Hơn nữa, trong mơ cũng hay nhõng nhẽo nữa」"
# monologue
# JP: ……マイントレジャーを実現させるため、\n無我夢中で働きまくっていた、あの頃。
1191 = "……Cái thời mà chúng tôi làm việc quên ăn quên ngủ\nđể biến Mine Treasure thành hiện thực."
# monologue
# JP: あの頃と比べ、ポーレットは少し、柔らかになった。\nそうして、ずっと――何百倍も、綺麗になった。
2669 = "So với hồi đó, Paulette đã dịu dàng hơn một chút.\nVà cũng trở nên xinh đẹp hơn gấp trăm lần."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。いつでも、どんなときだって、\n僕は、ポーレットの側にいる」
1548 = "「Không sao đâu. Dù là lúc nào, ở đâu,\nanh cũng sẽ luôn ở bên cạnh Paulette」"
# monologue
# JP: 寝乱れている髪を整え、その感触を指で楽しむ。
2520 = "Tôi vuốt lại mái tóc rối của em, tận hưởng xúc cảm trên đầu ngón tay."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
# 1720 = "「嗯……」" 
# monologue
# JP: 途端にすうすう、ポーレットの寝息が穏やかになる。\nうっすら笑みを浮かべてくれる。
2518 = "Ngay lập tức, tiếng thở của Paulette trở nên êm đềm.\nEm khẽ mỉm cười."
# 【双鉄】
# display as 雙鐵
# JP: 「かわいいな。僕の奥さんは――（ちゅっ）」
1887 = "「Đáng yêu quá. Vợ của anh——（Chụt）」"
# 【ひかり】
# display as 光
# JP: 「ふにゃ」
1653 = "「Phu nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1670 = "「Ái chà」"
# monologue
# JP: 大きな声を出したつもりもなかったが、\nひかりを起こしてしまったらしい。
2522 = "Dù không định nói lớn,\nnhưng có vẻ tôi đã đánh thức Hikari."
# 【ひかり】
# display as 光
# JP: 「んにゃ……いまどこぉ？　おひとよぉ？」
1744 = "「Ưm nha…… Đang ở đâu rồi? Ohitoyo à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜まではまだまだだ。\n[こごた,2]小言田は……多分すぎていると思うが」
2115 = "「Vẫn chưa đến Ohimitera đâu.\nChắc là…… vừa qua Kogota rồi」"
# 【ひかり】
# display as 光
# JP: 「あぅ……そぉだ……すとおぶれっしゃー」
1688 = "「A…… Đúng rồi…… Tàu bếp lò~」"
# monologue
# JP: 寝直すものかと思っていたが、\nひかりはもぞもぞ身を起こす。
2491 = "Cứ tưởng con bé sẽ ngủ tiếp,\nnhưng Hikari lại cựa quậy ngồi dậy."
# 【ひかり】
# display as 光
# JP: 「おのどかわいたのー」
1588 = "「Khát nước quá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがジュースを買っていた。\nバックのポケットに入れていたとおもうが」
1975 = "「Paulette có mua nước trái cây đấy.\nBa nghĩ là để trong túi xách」"
# 【ひかり】
# display as 光
# JP: 「ん……あ――あったのー。\nぱぱ、あけてー」
1723 = "「Ưm…… A—— Thấy rồi~\nBa mở ra đi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――おっと」
1724 = "「Ừm—— Ái chà」"
# monologue
# JP: （ごとっ）
2776 = "「（Cộc）」"
# monologue
# JP: いかん、僕もまだ寝ぼけているらしい。\nひかりからのジュースを受け取り損ねてしまった。
2286 = "Nguy thật, có vẻ tôi vẫn còn ngái ngủ.\nTôi lỡ làm rơi chai nước trái cây Hikari đưa."
# 【ひかり】
# display as 光
# JP: 「ぱぱ、どじなのー」
1987 = "「Ba hậu đậu quá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、かまわん、僕が拾う」
1700 = "「A, không sao, để ba nhặt cho」"
# 【ひかり】
# display as 光
# JP: 「ひかり、ひろえるのー」
1592 = "「Hikari nhặt được mà~」"
# monologue
# JP: 小さな体がひょいっとしずむ。\n……ひかりは靴を脱いだままだが、まぁ仕方ない。
2412 = "Cơ thể nhỏ nhắn thoăn thoắt cúi xuống.\n……Hikari vẫn chưa đi giày, nhưng mà thôi kệ."
# 【ひかり】
# display as 光
# JP: 「はい、ぱぁぱ、じゅうすー」
1988 = "「Đây, ba ơi, nước trái cây~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう」
1736 = "「Ừm. Cảm ơn con」"
# 【ひかり】
# display as 光
# JP: 「あとね、あかいのー」
2094 = "「Với lại, cái màu đỏ này nữa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤いの？」
2024 = "「Màu đỏ?」"
# monologue
# JP: ひかりから手渡されたそれは、確かに赤い。\n木の実――というか、南天の実だ。
2332 = "Thứ Hikari đưa cho tôi quả thực có màu đỏ.\nLà một quả hạch——hay đúng hơn là quả nam thiên trúc."
# 【ひかり】
# display as 光
# JP: 「ぱぱー、すわらせてー」
1992 = "「Ba ơi, cho con ngồi với~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1702 = "「A, ừm」"
# monologue
# JP: 南天の実をポケットにいれ、\nひかりを抱き上げ座席に戻す。
2512 = "Tôi đút quả nam thiên trúc vào túi,\nbế Hikari lên và đặt con bé trở lại ghế."
# monologue
# JP: プルタブを開けて缶を渡せば、リンゴジュースを\nひかりはこくこく、ゆっくり旨そうに飲んでいく。
2510 = "Bật nắp lon rồi đưa cho con bé, Hikari uống từng ngụm\nnước ép táo chầm chậm, trông có vẻ rất ngon lành."
# 【ひかり】
# display as 光
# JP: 「ぱぱにもあげるのー」
1986 = "「Cho ba uống với nè~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では一口だけ。\n……（ごくっ）……これは、旨いな」
1795 = "「Vậy à, thế cho ba xin một ngụm nhé.\n……（Ực）…… Cái này, ngon thật đấy」"
# monologue
# JP: 思わず、缶の能書きを見る。
2487 = "Bất giác, tôi nhìn dòng chữ trên lon."
# 【双鉄】
# display as 雙鐵
# JP: 「[あおもり,1]蒼森産か。行商のおばさんにいただいた\n[いわき,1]岩城りんごも旨かったが、やはり蒼森りんごも旨いな」
1945 = "「Là hàng của Aomori à. Quả táo Iwaki\ncủa bà cụ bán hàng rong cho cũng ngon,\nnhưng quả nhiên táo Aomori vẫn là tuyệt hảo」"
# 【ひかり】
# display as 光
# JP: 「これ、あおもりのりんごのじゅーすなのー？」
2088 = "「Đây là nước ép táo của Aomori hả ba~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そう書いてある」
1934 = "「Ừ, trên này viết vậy đấy」"
# monologue
# JP: 缶を戻せば、ひかりはしかつめらしい顔をして、\n描かれているリンゴを眺める。
2514 = "Khi tôi trả lại lon, Hikari làm vẻ mặt nghiêm túc,\nchăm chú nhìn hình quả táo được vẽ trên đó."
# monologue
# JP: そうして、こくり、またひとくち。
2609 = "Sau đó, ực, lại uống thêm một ngụm."
# 【ひかり】
# display as 光
# JP: 「さすがあおもり、おいしーのー」
1538 = "「Quả không hổ danh Aomori, ngon tuyệt~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。違いがわかるか」
1767 = "「Hô. Con phân biệt được sự khác nhau à」"
# 【ひかり】
# display as 光
# JP: 「わかるのー。みかんじゅーすよりすっぱくないのー」
2036 = "「Được chứ~ Không chua bằng nước ép quýt đâu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに。\nひかりはアレだ。四歳にして、違いのわかる女だな」
1620 = "「Ra là vậy, đúng thật.\nHikari nhà ta ấy à. Mới bốn tuổi mà đã là một quý cô biết phân biệt mùi vị rồi nhỉ」"
# 【ひかり】
# display as 光
# JP: 「うふふぅ！」
1678 = "「Ư phu phu!」"
# monologue
# JP: 誇らしそうな顔をして、ひかりは缶を掲げてみせる。
2324 = "Với vẻ mặt đầy tự hào, Hikari giơ cao lon nước lên."
# 【ひかり】
# display as 光
# JP: 「ちがいがわかるおんななのー」
1586 = "「Là một quý cô biết phân biệt mùi vị đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　素晴らしい！！」
1748 = "「Ừm! Tuyệt vời!!」"
# 【幼子】
# display as 孩子
# JP: 「ぎゃーーーーーーーーーーーーーーんっ！！」
1639 = "「Oaーーーーーーーーーーーーーー!!」"
# 【双鉄】
# display as ４人
# JP: 「っ！？」「ふえっ！？」\n「っ！！？」「わ！？　なんですかあ？」
1715 = "「Hả!?」「Hể!?」\n「Hả!!?」「Oa!? Chuyện gì vậy ạ~?」"
# 【幼子】
# display as 孩子
# JP: 「うさちゃ、ふわあああっん！　まま、ままぁっ」
1839 = "「Bé thỏ, oa oa oa oa! Mẹ, mẹ ơi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1676 = "「哦」" 
# monologue
# JP: 母親が、トイレにいっているのだろう。\nそのタイミングで目覚めてしまって――
2301 = "Chắc là người mẹ đang đi vệ sinh.\nĐúng lúc đó thì thằng bé tỉnh giấc——"
# monologue
# JP: （うさぎ……完全に溶けてしまったか）
2795 = "（Thỏ tuyết…… tan chảy hoàn toàn rồi à）"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。ママ、すぐにかえってくるから」
1960 = "「Không sao đâu. Mẹ sẽ quay lại ngay thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1694 = "「!」"
# monologue
# JP: ぼくがぼんやり眺めている間に、\nポーレットは動き出している。
2400 = "Trong lúc tôi còn đang thẫn thờ nhìn,\nPaulette đã bắt đầu hành động."
# monologue
# JP: 泣いている子の隣に座り、\nいいこいいこと、背中を撫でてなだめている。
2410 = "Em ngồi cạnh đứa bé đang khóc,\nvừa vuốt ve lưng vừa dỗ dành \"ngoan nào ngoan nào\"."
# 【ポーレット】
# display as 波萊特
# JP: 「きっと、トイレにいってるだけだから」
1790 = "「Chắc chắn mẹ chỉ đi vệ sinh thôi mà」"
# 【幼子】
# display as 孩子
# JP: 「ふぁぁああああううぅ～っ！\nまぁま、うさちゃ、うしゃちゃ、ううううっ～」
1719 = "「Oa oa oa oa oa~\nMẹ ơi, bé thỏ, bé thỏ, hu hu hu~」"
# monologue
# JP: 慰められて安心して、\n余計に甘えて泣いてしまう。
2445 = "Được an ủi nên thằng bé yên tâm,\nlại càng làm nũng và khóc to hơn."
# monologue
# JP: ポーレットはただ根気良く、\nいいこいいこと背中を優しくなで続ける。
2577 = "Paulette chỉ kiên nhẫn\ntiếp tục dịu dàng vuốt lưng dỗ dành thằng bé."
# 【ひかり】
# display as 光
# JP: 「ぱぁぱぁ」
1985 = "「Ba ơi」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん」
2113 = "「Anh Soutetsu~」"
# monologue
# JP: 四つの瞳にすがられる。\n助けてあげてとせがまれている。
2357 = "Bốn ánh mắt đang cầu cứu tôi.\nNài nỉ tôi hãy giúp đỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n僕もなんとかしてやりたいのはやまやまなのだが」
1729 = "「Ừm.\nBa cũng rất muốn làm gì đó để giúp thằng bé」"
# monologue
# JP: が、僕も経験から学んでいる。\nうかつに動けば、さらに泣かせる。
2377 = "Nhưng, tôi cũng đã rút ra bài học từ kinh nghiệm.\nNếu hành động khinh suất, thằng bé sẽ khóc to hơn."
# monologue
# JP: 残念なことに、ほとんどの幼児にとって、僕の外観は、\n親しみやすいものではないらしいのだ。
2659 = "Đáng tiếc là, đối với hầu hết trẻ nhỏ, vẻ ngoài của tôi\ncó vẻ không được thân thiện cho lắm."
# monologue
# JP: （たたたっ）
2785 = "（Lạch cạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1694 = "「啊！」" 
# 【若い母親】
# display as 年輕的母親
# JP: 「すみません！　うちのこが」
1824 = "「Xin lỗi mọi người! Con của tôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、よかったです」
1951 = "「Không sao đâu, tốt quá rồi」"
# monologue
# JP: 若い母親がもどってくると、\n幼子はすぐに母に抱きつき、さらに泣く。
2726 = "Khi người mẹ trẻ quay lại,\nđứa bé liền ôm chầm lấy mẹ và khóc to hơn nữa."
# 【幼子】
# display as 孩子
# JP: 「まぁま、まぁま、うしゃちゃ、うしゃちゃ、\nいない、いないぃぃ」
1810 = "「Mẹ ơi, mẹ ơi, bé thỏ, bé thỏ,\nmất rồi, mất rồi」"
# monologue
# JP: 困ったような笑みを浮かべてそろそろと、\nポーレットがもとの席へと戻ってくる。
2579 = "Nở một nụ cười ái ngại, Paulette\ntừ từ quay trở lại chỗ ngồi của mình."
# monologue
# JP: 確かにあとは、あちらの母子の問題だ。
2632 = "Quả thực, phần còn lại là vấn đề của hai mẹ con họ."
# 【若い母親】
# display as 年輕的母親
# JP: 「だから、溶けちゃうっていったじゃない」
1873 = "「Mẹ đã bảo là nó sẽ tan chảy mà」"
# 【幼子】
# display as 孩子
# JP: 「いないの、うしゃちゃ、まいご、まいごなのっ。\nうしゃちゃ、みつえて、みつけてあげゆー」
1954 = "「Mất rồi, bé thỏ, đi lạc, đi lạc rồi.\nBé thỏ, tìm, tìm lại bé thỏ đi~」"
# 【若い母親】
# display as 年輕的母親
# JP: 「だから？　ね？\n雪だから、あったかくなってとけちゃったのよ」
1892 = "「Vậy nên? Nhé?\nVì là tuyết nên gặp chỗ ấm là nó tan chảy mất rồi」"
# 【幼子】
# display as 孩子
# JP: 「うしゃちゃ、さがすぅーー」
1629 = "「Đi tìm, bé thỏ cơ~~」"
# 【ひかり】
# display as 光
# JP: 「――ぱぱ」
# 1985 = "「爸爸」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1713 = "「Hả!?」"
# monologue
# JP: ひかりが、強い――\n今までみたこともないくら、強い瞳で、僕を見ている。
2370 = "Hikari đang nhìn tôi bằng một ánh mắt kiên định——\nkiên định đến mức tôi chưa từng thấy trước đây."
# 【ひかり】
# display as 光
# JP: 「あのね、ぱぱ。さっきの、あかいの」
1991 = "「Này nhé, ba ơi. Cái màu đỏ, lúc nãy ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1677 = "「哦！」" 
# monologue
# JP: そうか、南天――\nあれは。雪うさぎの目だったか。
2439 = "Ra vậy, nam thiên trúc——\nĐó là. Mắt của thỏ tuyết sao."
# 【双鉄】
# display as 雙鐵
# JP: 「これか」
2083 = "「Cái này à」"
# 【ひかり】
# display as 光
# JP: 「うん」
# 1742 = "「嗯」" 
# monologue
# JP: 僕から受け取った南天の実を、\nひかりは、じっと、じっと見る。
2413 = "Nhận lấy quả nam thiên trúc từ tôi,\nHikari cứ chăm chú nhìn mãi."
# monologue
# JP: まるで祈りを、\nそれに捧げてでもいるかのように。
2417 = "Trông như thể con bé\nđang gửi gắm lời cầu nguyện vào đó vậy."
# 【幼子】
# display as 孩子
# JP: 「うさちゃ、うさちゃ、さがしてぇぇ！」
1599 = "「Bé thỏ, bé thỏ, tìm bé thỏ đi!」"
# 【若い母親】
# display as 年輕的母親
# JP: 「だから、ね？　うさちゃんはもう、どこを探しても」
1890 = "「Mẹ đã bảo rồi mà, đúng không? Bé thỏ bây giờ, dù có tìm ở đâu đi chăng nữa」"
# 【ひかり】
# display as 光
# JP: 「――うん！」
1747 = "「——Vâng!」"
# monologue
# JP: ひかりが頷く。\n左手で、僕のコートの袖口をつかむ。
2355 = "Hikari gật đầu.\nTay trái con bé nắm lấy tay áo khoác của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「一緒に行くか？」
2044 = "「Ba đi cùng con nhé?」"
# 【ひかり】
# display as 光
# JP: 「……うん」
1208 = "「……Vâng」"
# monologue
# JP: ひかりが、震える。\nとても小さく。
2329 = "Hikari đang run rẩy.\nRất khẽ."
# monologue
# JP: だから、頭を撫でてやる。\n手のひらを置き、僕の体温をゆったり伝える。
2527 = "Vì thế, tôi xoa đầu con bé.\nĐặt lòng bàn tay lên, từ từ truyền hơi ấm của mình sang."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。\n本当に伝えたいことなら、伝わるものさ」
1547 = "「Không sao đâu.\nNếu đó là điều con thực sự muốn truyền đạt, thì nhất định sẽ truyền đạt được thôi」"
# 【ひかり】
# display as 光
# JP: 「うん――」
# 1742 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりっ！？」
1597 = "「Hikari!?」"
# 【れいな】
# display as 玲奈
# JP: 「ぽーれっとぉ」
1974 = "「Chị Paulette~」"
# monologue
# JP: 立ち上がりかけたポーレットを、\nれいながそっと落ち着ける。
2639 = "Reina nhẹ nhàng ngăn Paulette\nlại khi em định đứng dậy."
# monologue
# JP: 青い瞳が、僕をまっすぐ、まっすぐ見つめる。\nだから、『信じろ』と頷き返す。
2585 = "Đôi mắt xanh biếc nhìn tôi chằm chằm.\nVì vậy, tôi gật đầu đáp lại như muốn nói 『Hãy tin tưởng』."
# 【幼子】
# display as 孩子
# JP: 「うさちゃ、うさちゃあ」
1598 = "「Bé thỏ, bé thỏ」"
# 【ひかり】
# display as 光
# JP: 「あの――ね、みてた、の」
1604 = "「À thì—— này, chị có thấy, đó」"
# 【幼子】
# display as 孩子
# JP: 「うさちゃあああっ」
1600 = "「Bé thỏ ơi」"
# monologue
# JP: 泣きわめいている幼子に、\nひかりの声は届いていない。
2733 = "Đứa bé đang gào khóc\nnên không nghe thấy tiếng của Hikari."
# 【若い母親】
# display as 年輕的母親
# JP: 「しょうくん？　おねえちゃんが」
1841 = "「Shou-kun? Có chị đang gọi con kìa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、お母さん」
1712 = "「À, thưa chị」"
# monologue
# JP: しーっと、唇に指をあてる。\n失礼なことかもしれないが、ここは、ひかりを信じたい。
2528 = "Tôi đưa ngón tay lên môi ra hiệu giữ im lặng.\nCó thể sẽ hơi thất lễ, nhưng lúc này, tôi muốn đặt niềm tin vào Hikari."
# monologue
# JP: お母さんもわかってくれたのか、\n小さくひとつ頷いてくれる。
2731 = "Có vẻ người mẹ cũng đã hiểu,\ncô ấy khẽ gật đầu một cái."
# 【ひかり】
# display as 光
# JP: 「あの、ね？　みてたの――ひかり、うさちゃん」
1605 = "「À thì, này nhé? Chị có thấy——Hikari có thấy, bé thỏ đó」"
# monologue
# JP: ひかりが、また震えだしてしまう。\nそれでも、あきらめずに話しかける。
2328 = "Hikari lại bắt đầu run rẩy.\nDù vậy, con bé vẫn không bỏ cuộc mà tiếp tục bắt chuyện."
# 【ひかり】
# display as 光
# JP: 「あの、ね？　これ――\nおみやげ、うさちゃんの」
2028 = "「À thì, này nhé? Cái này——\nlà quà lưu niệm, của bé thỏ đó」"
# 【幼子】
# display as 孩子
# JP: 「ふあっ――」
1718 = "「Oa——」"
# monologue
# JP: ひかりが差し出した南天の実に、\nようやく幼子の目が止まる。
2451 = "Ánh mắt của đứa bé rốt cuộc cũng dừng lại\nở quả nam thiên trúc mà Hikari đưa ra."
# monologue
# JP: 南天の実をじっと見つめて、ひっくひっくとしゃくりあげ、\nそれから、ひかりをそろそろと、みる。
2299 = "Thằng bé chăm chú nhìn quả nam thiên trúc, nấc lên từng hồi,\nrồi từ từ nhìn sang Hikari."
# 【ひかり】
# display as 光
# JP: 「あのね、ひかり。\nうさちゃん、みてたの」
2035 = "「Này nhé, Hikari.\nĐã nhìn thấy bé thỏ đó」"
# 【幼子】
# display as 孩子
# JP: 「うしゃちゃ、どーこー」
1601 = "「Bé thỏ, ở đâu~」"
# monologue
# JP: 涙まみれのまなざしを、ひかりはまっすぐ受け止める。
2343 = "Hikari nhìn thẳng vào ánh mắt đẫm lệ của thằng bé."
# monologue
# JP: ポーレットがいつもそうするように、\nまっすぐまっすぐ、相手のまなざしをつつみこむ。
2421 = "Giống như cách Paulette vẫn thường làm,\nánh mắt con bé bao bọc lấy ánh nhìn của đối phương một cách chân thành."
# 【ひかり】
# display as 光
# JP: 「ままがね？　むかえにきたのー。\nうさちゃんの、まま」
1590 = "「Mẹ ấy? Đã đến đón rồi~\nMẹ của bé thỏ ấy」"
# 【幼子】
# display as 孩子
# JP: 「まま？」
1817 = "「Mẹ á?」"
# monologue
# JP: 幼子の目が、若い母親へと向けられる、\nやさしい頷きが返される。
2453 = "Đứa bé đưa mắt nhìn người mẹ trẻ,\ncô ấy đáp lại bằng một cái gật đầu hiền từ."
# monologue
# JP: 安心したような母の顔を見、\n幼子の息も、ふわっと、落ち着く。
2474 = "Thấy vẻ mặt an tâm của mẹ,\nnhịp thở của đứa bé cũng nhẹ nhàng bình ổn lại."
# 【幼子】
# display as 孩子
# JP: 「うさちゃの、まぁまー？」
1837 = "「Mẹ của bé thỏ á~?」"
# 【ひかり】
# display as 光
# JP: 「うん。それでね？　おうちにかえったの、うさちゃん。\nそれでね、またあそびにきてね、って」
1733 = "「Ừm. Rồi sao nữa nhỉ? Bé thỏ đã về nhà rồi.\nRồi bạn ấy còn nói là, hẹn lần sau lại đến chơi nhé」"
# 【幼子】
# display as 孩子
# JP: 「まま……\nうさちゃん。おうち？」
1809 = "「Mẹ ơi……\nBé thỏ. Về nhà rồi ạ?」"
# monologue
# JP: それで、納得できたのだろう。\n幼子は、体をくたん、座席の背もたれによりかからせる。
2447 = "Có lẽ thằng bé đã bị thuyết phục.\nNó thả lỏng cơ thể, ngả lưng vào thành ghế."
# 【ひかり】
# display as 光
# JP: 「それでね？　これ、だから……おみやげ」
1981 = "「Rồi sao nữa nhỉ? Cái này, cho nên…… là quà lưu niệm」"
# 【幼子】
# display as 孩子
# JP: 「うさちゃんの、おみあげ」
1833 = "「Quà lưu niệm, của bé thỏ」"
# monologue
# JP: 幼子は、見るからに不器用そうな短く丸いその指で、\nひかりが差し出す南天の実を、大事に大事につまみ上げる。
2449 = "Bằng những ngón tay ngắn cũn tròn xoe trông có vẻ vụng về,\nthằng bé nâng niu cẩn thận cầm lấy quả nam thiên trúc mà Hikari đưa cho."
# 【幼子】
# display as 孩子
# JP: 「あいがと！　おねーちゃ！」
1807 = "「Em cảm ơn! Chị ạ!」"
# 【ひかり】
# display as 光
# JP: 「ふあっ！」
1659 = "「Oa!」"
# monologue
# JP: ひかりが、固まる。
2336 = "Hikari sững người lại."
# monologue
# JP: 頬をバラ色にぱあっと染めて、\nそのまま動けなくなってしまう。
2422 = "Đôi má con bé đỏ bừng lên như hoa hồng,\nvà cứ thế đứng bất động."
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、ひかり？\nありがとうって言われたときは、どうするんだっけ？」
1595 = "「Nào, Hikari?\nKhi được người khác cảm ơn thì con phải nói gì nhỉ?」"
# monologue
# JP: ひかりが、はにかむ。\nはにかみが、すぐにはじける笑顔に変わる！
2334 = "Hikari bẽn lẽn.\nSự bẽn lẽn đó nhanh chóng chuyển thành một nụ cười rạng rỡ!"
# 【ひかり】
# display as 光
# JP: 「どういたしまして！　なのーーーーっ！！」
1544 = "「Không có chi ạ! Là vậy đó~~~~!!」"
# monologue
# JP: 言ってひかりは、あっさり僕を置き去りにする。
2695 = "Nói xong, Hikari dễ dàng bỏ tôi lại phía sau."
# 【ひかり】
# display as 光
# JP: 「ままー、れいなー！\nひかり！　ひかりね、おねーちゃんってーっ！！」
1816 = "「Mẹ ơi~, chị Reina ơi~!\nHikari! Hikari được gọi là chị đó~!!」"
# monologue
# JP: そのままダイブ！　
2611 = "Rồi con bé lao thẳng vào lòng họ!"
# monologue
# JP: ポーレットはひかりを受け止め、\nぎゅっと、ぎゅうっと抱きしめる！
2583 = "Paulette đỡ lấy Hikari,\nôm con bé thật chặt, thật chặt!"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、みてた！\nひかり、えらいね！　ほんとに素敵なお姉ちゃん！」
1751 = "「Ừm, mẹ thấy rồi!\nHikari giỏi lắm! Đúng là một người chị tuyệt vời!」"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃん、かーっこよかったですよぉ！」
1828 = "「Bé Hikari ngầu quá trời luôn nha~」"
# 【ひかり】
# display as 光
# JP: 「えへへぇ～！！」
1764 = "「Ehehe~!!」"
# 【若い母親】
# display as 年輕的母親
# JP: 「あの」
2081 = "「Xin lỗi」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1742 = "「嗯」" 
# monologue
# JP: 小声の呼びかけに振り向けば、\n若い母親が僕に頭を下げている。
2521 = "Quay lại khi nghe tiếng gọi nhỏ,\ntôi thấy người mẹ trẻ đang cúi đầu chào mình."
# 【若い母親】
# display as 年輕的母親
# JP: 「助かりました。本当に」
2008 = "「Nhờ có anh mà tôi được cứu nguy. Thực sự cảm ơn anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いえ――」
1955 = "「À, không có gì——」"
# monologue
# JP: お礼の必要などありません――\nそう言いかけて、けれども喉の奥へと押し込む。
2498 = "Không cần phải cảm ơn đâu——\nTôi định nói vậy, nhưng lại nuốt ngược vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「僕など、なにもしていません。\n礼なら、どうか本人に」
1876 = "「Tôi chẳng làm gì cả.\nNếu muốn cảm ơn, xin cô hãy nói với chính con bé」"
# 【若い母親】
# display as 年輕的母親
# JP: 「あ、そうですよね」
1708 = "「A, đúng rồi nhỉ」"
# monologue
# JP: 若い母親が席を立つ。\n一瞬不安に駆られるが、幼子は気にする風もない。
2722 = "Người mẹ trẻ đứng lên.\nTrong thoáng chốc tôi thấy bất an, nhưng đứa bé có vẻ không bận tâm."
# monologue
# JP: さっきまでの泣き顔を一転、満面の笑顔に変えて、\nころころと、南天の実を手の平に転がし、遊んでる。
2628 = "Khuôn mặt khóc lóc lúc nãy đã hoàn toàn biến mất, thay vào đó là một nụ cười rạng rỡ,\nthằng bé đang lăn qua lăn lại quả nam thiên trúc trong lòng bàn tay để chơi."
# monologue
# JP: （欲張りすぎかもしれんが――しかし――）
2790 = "（Có thể là tôi hơi tham lam——nhưng mà——）"
# 【若い母親】
# display as 年輕的母親
# JP: 「あの、ね？　ひかりちゃん」
2052 = "「Cho cô hỏi này? Bé Hikari」"
# 【ひかり】
# display as 光
# JP: 「はうっ！？」
1693 = "「Hau!?」"
# monologue
# JP: いきなり声をかけられて、\nポーレットに抱かれたままで、ひかりが固まる。
2647 = "Bị gọi tên bất ngờ,\nHikari sững người lại trong vòng tay Paulette."
# monologue
# JP: けれど、逃げない、隠れない。\nさまよってた目がおずおずと、若い母親の方へ向く。
2304 = "Nhưng, con bé không trốn tránh, cũng không nấp đi.\nĐôi mắt lang thang rụt rè hướng về phía người mẹ trẻ."
# 【若い母親】
# display as 年輕的母親
# JP: 「うさちゃんのこと、\nおしえてくれて、ありがとう」
2055 = "「Cảm ơn cháu\nvì đã cho cô biết chuyện của bé thỏ nhé」"
# 【ひかり】
# display as 光
# JP: 「はっ――ひあっ――は、うっ」
1684 = "「Hả—— hia—— ha, ư」"
# monologue
# JP: 顔が、どんどん赤くなる。\nああ、やはり僕は焦りすぎたか。
2348 = "Khuôn mặt con bé dần đỏ bừng lên.\nA, quả nhiên là tôi đã quá nóng vội sao."
# monologue
# JP: さっきのでひかりは目一杯、\n今ある勇気を、恐らく絞りきったのだろう。
2363 = "Với chuyện lúc nãy, có lẽ Hikari đã\nvắt kiệt toàn bộ dũng khí hiện có của mình rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり」
1580 = "「Hikari」"
# 【れいな】
# display as 玲奈
# JP: 「あれあれぇ、ひかりちゃん。\nさっき、そうてつさん言ってましたよぉ？」
2019 = "「Ấy ấy, bé Hikari.\nLúc nãy anh Soutetsu vừa nói gì ấy nhỉ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうよね、ひかり。\nどうするんだっけ？　ありがとうって、いわれたら」
1826 = "「Đúng vậy, Hikari.\nKhi được người khác cảm ơn thì con phải nói gì nhỉ?」"
# 【ひかり】
# display as 光
# JP: 「あ……っ……ふ……あ……\nどう、いたしまして――なのー――きゃあっ！！」
1686 = "「A…… ư…… phu…… a……\nKhông, có chi ạ—— là vậy đó~~~ á!!」"
# monologue
# JP: ぐるり振り向き、ポーレットの胸に隠れてしまう。
2424 = "Con bé quay ngoắt lại, giấu mặt vào ngực Paulette."
# monologue
# JP: 若いお母さんはにこにこと、\n隠れたままのひかりの頭を、優しく撫でる。
2727 = "Người mẹ trẻ mỉm cười,\ndịu dàng xoa đầu Hikari đang trốn biệt."
# 【若い母親】
# display as 年輕的母親
# JP: 「本当に、ありがとうございました」
2013 = "「Thực sự cảm ơn cháu rất nhiều」"
