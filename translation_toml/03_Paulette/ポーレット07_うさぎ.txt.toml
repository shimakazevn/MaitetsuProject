# 【ポーレット】
# display as 波萊特
# JP: 「あああ！　待ってください双鉄くん！\nせっかく気を利かせてくれたのに」
1699 = "「啊！等一下！這可是人家特地為我們準備的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1754 = "「嗯？」" 

# 【れいな】
# display as 玲奈
# JP: 「あああ！　れいな、わかっちゃいましたぁ」
1697 = "「啊！玲奈懂了」" 

# monologue
# JP: 言って、れいなはおにぎりひとつを両手で包む。
2696 = "說完，玲奈用兩隻手捧起一個飯糰。" 

# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃんも、いっしょにしましょおねぇ」
1832 = "「小光，你和玲奈一起過來一下吧」" 

# 【ひかり】
# display as 光
# JP: 「んゆう？」
# 1754 = "「嗯？」" 

# monologue
# JP: ひかりにおにぎりひとつをわたし、\n新しいのをまた手にとって。
2625 = "玲奈把手裡的飯糰遞給光，然後又拿起一個新的飯糰。" 

# monologue
# JP: そしてれいなはぽてぽてと、\nストーブの前に移動して――
2541 = "接著她一蹦一跳地走到暖爐面前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「焼きおにぎりか！　だからホイル包みなのか」
1621 = "「原來是烤飯糰啊！所以才要用鋁箔包起來」" 

# 【ひかり】
# display as 光
# JP: 「ひかりもー！　ひかりやきたいのー！」
1583 = "「光也要！光也要試試！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「待て待て、いま抱っこする」
2021 = "「等一下，我這就抱你起來」" 

# monologue
# JP: ひかりが全力で喜んでいる。
2351 = "光看起來非常開心。" 

# monologue
# JP: ああ、本当に――\n“気を利かせる”とは、こういうことだ。
2483 = "怪不得波萊特說這是服務員小姐“特地為我們準備的”，原來是這個意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……むっ――」
1725 = "「嗯……嗚」" 

# 【れいな】
# display as 玲奈
# JP: 「（すやあぁぁ～、すぅぴぃぃぃ～）」
2120 = "「（呼啊呼啊）」" 

# 【ひかり】
# display as 光
# JP: 「ぅふぅ……んゆぅ～～」
1650 = "「呼……嗯嗚」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄、くん」
1216 = "「……雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1682 = "「唔？！」" 

# monologue
# JP: 呼ばれた気がして、目を開く。
2535 = "我迷迷糊糊聽到有人叫我，便睜開眼睛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うたた寝をしてしまっていたのか」
1690 = "「啊……我不小心睡著了啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[けいさん,1]経産大臣……おみやげ……せき、たん――」
2029 = "「經產大臣……土特產……煤炭……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅行中の夢の中でまで、\n仕事熱心だな、ポーレットは」
2012 = "「真是的，怎麼旅途上的夢裡都是工作，你這人也太敬業了」" 

# monologue
# JP: 呼ばれた気がして、ではなく、\n呼ばれていたのだと確信できる。
2629 = "現在我可以確信她剛才真的叫我名字了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上、夢の中でまで甘えっ子だ」
2033 = "「而且，在夢裡還這麼喜歡撒嬌」" 

# monologue
# JP: ……マイントレジャーを実現させるため、\n無我夢中で働きまくっていた、あの頃。
1191 = "……我想起了幾年前，我們為了建成煤探樂園而拚命工作的時候。" 

# monologue
# JP: あの頃と比べ、ポーレットは少し、柔らかになった。\nそうして、ずっと――何百倍も、綺麗になった。
2669 = "與那時候相比，現在的波萊特為人處世柔和了不少。而且在我眼裡也變得漂亮多了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。いつでも、どんなときだって、\n僕は、ポーレットの側にいる」
1548 = "「不用擔心。無論何時我都會陪在你身邊」" 

# monologue
# JP: 寝乱れている髪を整え、その感触を指で楽しむ。
2520 = "我用手指幫她梳好睡亂的頭髮，享受著指縫間秀髮的觸感。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
# 1720 = "「嗯……」" 

# monologue
# JP: 途端にすうすう、ポーレットの寝息が穏やかになる。\nうっすら笑みを浮かべてくれる。
2518 = "我梳著梳著，發現波萊特的呼吸聲逐漸變得平穩，臉上也浮現出淡淡的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かわいいな。僕の奥さんは――（ちゅっ）」
1887 = "「我老婆真是太可愛了（親）」" 

# 【ひかり】
# display as 光
# JP: 「ふにゃ」
1653 = "「呼喵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1670 = "「哎呀」" 

# monologue
# JP: 大きな声を出したつもりもなかったが、\nひかりを起こしてしまったらしい。
2522 = "我覺得自己的聲音沒那麼大，但看來還是把光給吵醒了。" 

# 【ひかり】
# display as 光
# JP: 「んにゃ……いまどこぉ？　おひとよぉ？」
1744 = "「嗯嗚……現在到哪啦？御一夜？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜まではまだまだだ。\n[こごた,2]小言田は……多分すぎていると思うが」
2115 = "「離御一夜還遠得很呢。我想，應該已經過了小牛田了」" 

# 【ひかり】
# display as 光
# JP: 「あぅ……そぉだ……すとおぶれっしゃー」
1688 = "「啊……對了……暖爐列車」" 

# monologue
# JP: 寝直すものかと思っていたが、\nひかりはもぞもぞ身を起こす。
2491 = "我以為她要繼續睡，結果她卻窸窸窣窣地爬了起來。" 

# 【ひかり】
# display as 光
# JP: 「おのどかわいたのー」
1588 = "「光渴了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがジュースを買っていた。\nバックのポケットに入れていたとおもうが」
1975 = "「波萊特買了果汁。我想她應該放在包的隔袋裡了」" 

# 【ひかり】
# display as 光
# JP: 「ん……あ――あったのー。\nぱぱ、あけてー」
1723 = "「嗯……啊。有了。爸爸幫光開」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――おっと」
1724 = "「嗯……啊」" 

# monologue
# JP: （ごとっ）
2776 = "（咚）" 

# monologue
# JP: いかん、僕もまだ寝ぼけているらしい。\nひかりからのジュースを受け取り損ねてしまった。
2286 = "不好，看來我也睡迷糊了。竟然把光遞給我的果汁掉在地上了。" 

# 【ひかり】
# display as 光
# JP: 「ぱぱ、どじなのー」
1987 = "「爸爸小迷糊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、かまわん、僕が拾う」
1700 = "「啊，你不用管了，我來撿」" 

# 【ひかり】
# display as 光
# JP: 「ひかり、ひろえるのー」
1592 = "「光能撿」" 

# monologue
# JP: 小さな体がひょいっとしずむ。\n……ひかりは靴を脱いだままだが、まぁ仕方ない。
2412 = "她小小的身體一下子沉下去。……她還沒穿鞋呢，算了不管了。" 

# 【ひかり】
# display as 光
# JP: 「はい、ぱぁぱ、じゅうすー」
1988 = "「爸爸給，果汁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう」
1736 = "「嗯。謝謝」" 

# 【ひかり】
# display as 光
# JP: 「あとね、あかいのー」
2094 = "「還有這個紅色的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤いの？」
2024 = "「紅色的？」" 

# monologue
# JP: ひかりから手渡されたそれは、確かに赤い。\n木の実――というか、南天の実だ。
2332 = "光又遞給我一個果實，的確是紅的。這是南天竹的果實。" 

# 【ひかり】
# display as 光
# JP: 「ぱぱー、すわらせてー」
1992 = "「爸爸，光要坐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1702 = "「啊，好」" 

# monologue
# JP: 南天の実をポケットにいれ、\nひかりを抱き上げ座席に戻す。
2512 = "我把南天竹的果實放進口袋，抱起光把她放回座位上。" 

# monologue
# JP: プルタブを開けて缶を渡せば、リンゴジュースを\nひかりはこくこく、ゆっくり旨そうに飲んでいく。
2510 = "我打開易開罐的拉環把蘋果汁遞給光。她慢慢喝下去，一副頗為享受的樣子。" 

# 【ひかり】
# display as 光
# JP: 「ぱぱにもあげるのー」
1986 = "「爸爸也喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では一口だけ。\n……（ごくっ）……これは、旨いな」
1795 = "「好，那我就喝一口。……（喝果汁）……這個真好喝」" 

# monologue
# JP: 思わず、缶の能書きを見る。
2487 = "我不由得看了一眼易開罐上的標籤。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[あおもり,1]蒼森産か。行商のおばさんにいただいた\n[いわき,1]岩城りんごも旨かったが、やはり蒼森りんごも旨いな」
1945 = "「是青森產的啊。雖然行商老奶奶給我們的磐城蘋果也很好吃，不過青森的蘋果也不賴」" 

# 【ひかり】
# display as 光
# JP: 「これ、あおもりのりんごのじゅーすなのー？」
2088 = "「這是青森的蘋果汁？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そう書いてある」
1934 = "「是啊，上面這麼寫的」" 

# monologue
# JP: 缶を戻せば、ひかりはしかつめらしい顔をして、\n描かれているリンゴを眺める。
2514 = "我把果汁還給光，她一本正經地觀察著畫在罐子上的蘋果。" 

# monologue
# JP: そうして、こくり、またひとくち。
2609 = "然後又端起來喝了一口。" 

# 【ひかり】
# display as 光
# JP: 「さすがあおもり、おいしーのー」
1538 = "「不愧是青森的蘋果，真好喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。違いがわかるか」
1767 = "「嚯，你能嘗得出來哪裡不一樣嗎」" 

# 【ひかり】
# display as 光
# JP: 「わかるのー。みかんじゅーすよりすっぱくないのー」
2036 = "「能明白，沒橘子汁那麼酸」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに。\nひかりはアレだ。四歳にして、違いのわかる女だな」
1620 = "「原來如此，的確是這樣。不愧是我們的女兒，四歲就懂得品嘗果汁了」" 

# 【ひかり】
# display as 光
# JP: 「うふふぅ！」
1678 = "「哼哼！」" 

# monologue
# JP: 誇らしそうな顔をして、ひかりは缶を掲げてみせる。
2324 = "光一臉得意地舉起易開罐。" 

# 【ひかり】
# display as 光
# JP: 「ちがいがわかるおんななのー」
1586 = "「光是懂得品嘗果汁的女人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　素晴らしい！！」
1748 = "「嗯！你太棒了！！」" 

# 【幼子】
# display as 孩子
# JP: 「ぎゃーーーーーーーーーーーーーーんっ！！」
1639 = "「呀——嗯！！」" 

# 【双鉄】
# display as ４人
# JP: 「っ！？」「ふえっ！？」\n「っ！！？」「わ！？　なんですかあ？」
1715 = "「啊？！」「哎？！」\\n「啊？！」「哇？！怎麼了？」" 

# 【幼子】
# display as 孩子
# JP: 「うさちゃ、ふわあああっん！　まま、ままぁっ」
1839 = "「小兔子，嗚啊啊啊啊！媽媽、媽媽！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1676 = "「哦」" 

# monologue
# JP: 母親が、トイレにいっているのだろう。\nそのタイミングで目覚めてしまって――
2301 = "他的母親應該是去上廁所了吧。沒想到小孩子會在這種時候醒來。" 

# monologue
# JP: （うさぎ……完全に溶けてしまったか）
2795 = "（雪兔子……完全溶化了）" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。ママ、すぐにかえってくるから」
1960 = "「沒關係。你媽媽一定馬上就回來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1694 = "「啊！」" 

# monologue
# JP: ぼくがぼんやり眺めている間に、\nポーレットは動き出している。
2400 = "在我還迷迷糊糊看著那個孩子的時候，波萊特已經開始行動了。" 

# monologue
# JP: 泣いている子の隣に座り、\nいいこいいこと、背中を撫でてなだめている。
2410 = "她坐在那個哭泣的小孩子身邊，用手輕撫著他的後背安慰他。" 

# 【ポーレット】
# display as 波萊特
# JP: 「きっと、トイレにいってるだけだから」
1790 = "「她一定只是去廁所了」" 

# 【幼子】
# display as 孩子
# JP: 「ふぁぁああああううぅ～っ！\nまぁま、うさちゃ、うしゃちゃ、ううううっ～」
1719 = "「嗚啊啊！媽媽，小兔子，兔兔，嗚嗚嗚」" 

# monologue
# JP: 慰められて安心して、\n余計に甘えて泣いてしまう。
2445 = "小孩子被她安慰了之後放下心來，反倒向她撒嬌，哭得更厲害了。" 

# monologue
# JP: ポーレットはただ根気良く、\nいいこいいこと背中を優しくなで続ける。
2577 = "波萊特一點也不嫌棄，只是耐心地拍著他的後背。" 

# 【ひかり】
# display as 光
# JP: 「ぱぁぱぁ」
1985 = "「爸爸」" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん」
2113 = "「雙鐵先生」" 

# monologue
# JP: 四つの瞳にすがられる。\n助けてあげてとせがまれている。
2357 = "兩雙眼睛向我看來，似乎在向我無聲地求助。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n僕もなんとかしてやりたいのはやまやまなのだが」
1729 = "「嗯。如果可以，我也很想幫上忙」" 

# monologue
# JP: が、僕も経験から学んでいる。\nうかつに動けば、さらに泣かせる。
2377 = "可是經歷了旅館那件事之後我也明白。隨便行動反而會讓小孩子哭得更厲害。" 

# monologue
# JP: 残念なことに、ほとんどの幼児にとって、僕の外観は、\n親しみやすいものではないらしいのだ。
2659 = "而且很遺憾，對於大部分小孩子來說，我的外表並不和藹可親。" 

# monologue
# JP: （たたたっ）
2785 = "（噠噠噠）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1694 = "「啊！」" 

# 【若い母親】
# display as 年輕的母親
# JP: 「すみません！　うちのこが」
1824 = "「對不起，我家孩子給你們添麻煩了！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、よかったです」
1951 = "「沒事，不用介意」" 

# monologue
# JP: 若い母親がもどってくると、\n幼子はすぐに母に抱きつき、さらに泣く。
2726 = "那位年輕的母親一回來，她的孩子馬上就撲到她的懷裡，哭得更厲害了。" 

# 【幼子】
# display as 孩子
# JP: 「まぁま、まぁま、うしゃちゃ、うしゃちゃ、\nいない、いないぃぃ」
1810 = "「媽媽、媽媽，兔子、兔兔……沒有了，沒有了」" 

# monologue
# JP: 困ったような笑みを浮かべてそろそろと、\nポーレットがもとの席へと戻ってくる。
2579 = "波萊特只能露出一個略尷尬的笑容回到我們的座位上。" 

# monologue
# JP: 確かにあとは、あちらの母子の問題だ。
2632 = "的確，接下來就是這對母子自己的問題了。" 

# 【若い母親】
# display as 年輕的母親
# JP: 「だから、溶けちゃうっていったじゃない」
1873 = "「我不是說過會融化的嗎」" 

# 【幼子】
# display as 孩子
# JP: 「いないの、うしゃちゃ、まいご、まいごなのっ。\nうしゃちゃ、みつえて、みつけてあげゆー」
1954 = "「沒有了，小兔兔迷路了。我們去找它吧，找它嘛」" 

# 【若い母親】
# display as 年輕的母親
# JP: 「だから？　ね？\n雪だから、あったかくなってとけちゃったのよ」
1892 = "「所以，我不是說過了嗎？雪在暖和的地方會融化的」" 

# 【幼子】
# display as 孩子
# JP: 「うしゃちゃ、さがすぅーー」
1629 = "「去找兔兔」" 

# 【ひかり】
# display as 光
# JP: 「――ぱぱ」
# 1985 = "「爸爸」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
