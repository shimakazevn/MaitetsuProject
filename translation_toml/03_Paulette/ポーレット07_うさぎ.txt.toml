# monologue
# JP: ポーレットの姿を目にした瞬間、\nひかりの顔がぱっと輝く。
2285 = "一看到波萊特，光馬上就喜笑顏開。" 

# 【ひかり】
# display as 光
# JP: 「ままなのー！」
1811 = "「媽媽來了！」" 

# 【れいな】
# display as 玲奈
