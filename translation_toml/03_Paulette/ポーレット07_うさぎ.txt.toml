2414 = "她沒有直接說，有可能是不想被小孩子知道，或者是給孩子準備了什麼驚喜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅程は、当初と変更なしか？」
1880 = "「我們之後的行程沒有變動吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そのつもりですけど……\n双鉄くん、もしかして行ってみたいとこが出来たとか？」
1753 = "「嗯，確實沒變化……雙鐵君，難道你有什麼想去的地方？」" 

# 【双鉄】
