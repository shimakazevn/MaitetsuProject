2405 = "她一會看看取景器，一會走幾步，不斷調整相機的位置，尋找著最佳角度。" 

# monologue
# JP: どれ、僕も――
2736 = "那我也……" 

# 【ひかり】
# display as 光
# JP: 「ひかりー、ひかりもとりてつしてみたいのー」
1581 = "「光也想試試拍火車」" 

# 【双鉄】
# display as 雙鐵
