# 【ポーレット】
# display as 波萊特
# JP: 「ちょっとだけ。\nうふふ、また後でのお楽しみ、ね？」
2023 = "「算是吧。呵呵，有驚喜哦，你可以期待一下」" 

# monologue
# JP: 言いながら、ポーレットはバッグに手早く何かの包みと\n……白い封筒？　をしまい込む。
2697 = "說著，波萊特迅速把一個包裹和白色的信封裝進包裡。" 

# monologue
# JP: 追加請求を受けるような記憶はないし――\nどこかの施設の無料券あたりであろうか？
2488 = "我不記得有跟旅館要求過什麼別的服務，大概是給我們送了什麼遊樂場所的免費券吧？" 

# 【ポーレット】
# display as 波萊特
# JP: 「それより、駅に向かわないと」
1577 = "「先別管這些，我們得趕緊去車站了」" 

# 【双鉄】
# display as 雙鐵
