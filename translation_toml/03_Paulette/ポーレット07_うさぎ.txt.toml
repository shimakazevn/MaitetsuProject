# JP: 「なるほど。両方から[なるこ,1]鳴呼を目指す客がほとんどで、\n全線乗車のニーズは乏しい……という線なのだな？」
1618 = "「原來如此。也就是說這條線大部分的客人目的地都是鳴子，很少有人整條線坐到頭的？」" 

# 【ポーレット】
# display as 波萊特
