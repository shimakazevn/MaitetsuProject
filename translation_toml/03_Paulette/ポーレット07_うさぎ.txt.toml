1959 = "「沒錯！會讓耗時大約五分鐘，而新城至小牛田的車會先到站。所以拍完再過去也來得及！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。さすがの下調べだ」
2089 = "「這樣哦，你調查得還真充分」" 

# 【ポーレット】
# display as 波萊特
# JP: 「さすがだなんて、全然。\nこのくらいは、当たり前ですよ」
1894 = "「才沒有呢。知道這些是應該的」" 

# monologue
# JP: 言いながら、みるからにもうワクワクと、\nポーレットはカメラをセッティングし始める。
2576 = "波萊特一邊說著，一邊開始興致勃勃地調整相機參數。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今回、全然撮れて無いですからね～！\nここはちょっと、決めちゃいますよー！」
