# display as 波萊特
# JP: 「そこはばっちり大丈夫です。[ゆけむり,1]湯煙鉄道線は、\n[こごた,2]小言田から[なるこ,1]鳴呼を挟んで、[しんじょう,1]新荘までの線なんですけど」
2082 = "「這個你不用擔心。湯煙鐵路是從小牛田、鳴子一直開到新城的鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1742 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
