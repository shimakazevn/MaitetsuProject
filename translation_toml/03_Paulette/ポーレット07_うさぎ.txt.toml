2661 = "而現在她突然對拍照產生了興趣。一想到這也是這次旅途產生的效果，我就難抑心頭的喜悅。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、ひかりちゃんの写真みてみたいですぅ」
1999 = "「玲奈也想看看小光拍的照片」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕のカメラで撮るといい」
1739 = "「嗯。那你就用我的相機拍吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたしの予備が」
1704 = "「啊，我還有一台備機」" 

# 【双鉄】
# display as 雙鐵
# JP: 「重すぎて使えんだろうし、\n僕がひかりに指導できるのは、こいつの使い方だけだ」
2096 = "「那台太重了，小孩子沒辦法用。而且我也只能教光用這台」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね。じゃ、お願いします」
1707 = "「啊，說的也是。那就麻煩了」" 

# monologue
# JP: ポーレットはあっさり引き下がり、\nまたベストポジションを探しうろつき始める。
2578 = "波萊特乾脆地把教光拍照片的任務交給我，又繼續開始尋找最佳攝影位置。" 

