# JP: 同時に、気合を腹に落として、グっと心身を引き締め直す。\nここから先は――
2092 = "同時鼓足氣勢，調整好心態。接下來要面對的是——" 

# 【凪】
# display as 凪
# JP: 「おまたせばいっ！」
1537 = "「大家久等咧！」" 

# monologue
# JP: 凪にもスイッチが入ったようだ。\n櫂を強く漕ぎ、流れに乗るのを早めてくれる。
2041 = "凪也似乎進入了狀態。她用力划著櫓，使船更快地進入急流。" 

# 【凪】
# display as 凪
# JP: 「ここから先こそクマ川たいっ！\n急流くだりの本番ばいっ！！」
1412 = "「前頭才是真正的隈河！急流漂流的重頭戲咧！！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん凪ちゃん、見せて見せて」
1567 = "「小凪小凪，快給我看看」" 

# 【凪】
# display as 凪
# JP: 「もちろんばい！\nふかみちゃんに見せたげたくて撮ったばい！」
1697 = "「當然要給你咧！就是為了給小深看才拍的咧！」" 

# monologue
# JP: 凪の手にはとてもスマートな携帯端末。
2051 = "凪手中拿著一台十分小巧的手機。" 

# monologue
# JP: 覗いたふかみが、みるみる頬をバラ色にする。\n風邪はどうやら、すっかり完治したようだ。
2323 = "深美探頭看著螢幕，臉上漸漸泛起激動的紅暈。看來她的感冒已經完全好了。" 

# 【ふかみ】
# display as 深美
# JP: 「素敵……なに、これ。ちょっと、ずるい。\nわたし、毎日川下りしてるのに……昨日だけとか」
1542 = "「好美……這是什麼呀。真不公平。我明明每天都在漂流……卻偏偏在昨天出現」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、それだ。\nああ、凪、よければ携帯を回してみんなに見せてくれ」
1608 = "「我要說的就是這個。啊，凪，麻煩你把手機傳給每個人看一看」" 

# 【凪】
# display as 凪
# JP: 「よかとよー」
1538 = "「好咧」" 

# monologue
# JP: 見るもの見るもの、みながそれぞれに歓声を上げる。\nあの日の団体客たちも、みな満面の笑顔だった。
2115 = "大家看到照片之後，接連發出歡呼聲。昨天的團體客人們，也是笑容滿面。" 

# monologue
# JP: これほどの大きなヒント、\n見逃すほどにのんきでは無い。
2478 = "這麼明顯的一個提示，我又怎能放過呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「虹は純粋な偶然だが、川下り船の進行にあわせての、\n\x%l列車;#00ffc040;列車%l;#;の鉄橋通過。これは、素晴らしいアイディアだった」
1807 = "「雖然彩虹純粹是偶然出現的，但是讓\\x%l列車;#00ffc040;列車%l;#;配合漂流船一同經過鐵橋——這是一個非常棒的主意」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……わたし」
1787 = "「那個……我——」" 

# monologue
# JP: 称賛に、いまだに慣れてはくれないらしい。\nポーレットは頬を赤くし、うつむいてしまう。
2311 = "波萊特似乎還是不習慣接受誇獎。她通紅著臉，低下了頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「乗務もあるけど、船頭さんな双鉄くんも見てみたくて。\n――ほんとに、それだけだったんです」
1809 = "「雖然正好有乘務工作，但我還是想看看雙鐵君掌棹的樣子。真的只是因為這個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1827 = "「！」" 

# monologue
# JP: 思いもかけぬ発言に、一瞬、思考を止められる。\n嬉しい。嬉しい。嬉しい。嬉しい。
1972 = "一句意料之外的話語，凍結了我的思考能力。好開心、好開心、好開心、好開心。" 

# monologue
# JP: その三文字に脳が塗りつぶされぬよう、\n半ば無理やり舌を動かし、言葉をつなぐ。
2226 = "我為了阻止這三個字繼續攻占我的腦海，強迫自己接著說下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「理由はどうあれ、これだけの満足度を出すイベントを、\n観光振興につなげぬ法はないかと、僕は考えた」
1334 = "「不管出於什麼原因，既然這個活動能收穫這麼好的效果，我認為自然要讓它在復興旅遊業的過程中發揮作用」" 

# 【ハチロク】
# display as 八六
# JP: 「キハ[レイナナエス,2]07sも美しく可愛らしい車輌ですが、\n川下り船から見た時、[ハチロク,3]8620はより絵になるかと存じます」
1810 = "「雖說Ｋｉｈａ０７Ｓ同樣是美麗而又可愛的車輛，但我認為如果乘坐在漂流船上抬頭望見的是８６２０會更美麗」" 

# monologue
# JP: みなが頷く。\nポーレットも、れいなさえもが。
2112 = "大家一齊點頭。包括波萊特，甚至是玲奈。" 

# monologue
# JP: あの鉄橋を煙を吐いて駆け抜けていく\x%l8620;#00ffc040;8620%l;#;――\n水面から見上げる姿は、どれほど勇壮に映るだろう。
2420 = "若能在水面上仰望\\x%l8620;#00ffc040;８６２０%l;#;冒著煙駛過那座鐵橋，該是多麼壯觀呀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「川下りと鉄道との連携。\nこれに、マイントレジャーも絡めていきたい」
1804 = "「除了漂流與鐵路的配合，我還希望能讓煤探樂園也加入其中」" 

# 【ふかみ】
# display as 深美
# JP: 「絡みたい！　です」
1598 = "「我也希望！嗯」" 

# monologue
# JP: ふかみが体を乗り出してくる。
2325 = "深美激動地探出身子。" 

# monologue
# JP: この反応――これを御一夜全市からもしも引き出せたなら、\n観光振興は必ず、成せる。
2424 = "若能讓御一夜全市做出這樣的反應，旅遊業復興必能成功。" 

# 【双鉄】
# display as 雙鐵
# JP: 「術仙炭鉱廃駅と鉱山鉄道とを復活させ、\nまずは、その区間を\x%lキハ07;#00ffc040;キハ07%l;#;に案内してもらう」
1744 = "「讓術仙煤礦廢車站與礦山鐵路復活，然後先讓\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;來跑這一路段」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、お任せされちゃいますよぉ」
1414 = "「包在玲奈身上吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「廃宿舎群で謎解きをしてもらい、しかるのち、\nトロッコ移動で坑道入口へ。採炭体験をしてもらう」
1389 = "「先讓遊客在廢棄宿舍區進行解謎，然後乘坐礦車移動至坑道入口，進行採煤體驗」" 

# monologue
# JP: ここまでは、概ね説明してきたことだ。\n誰からも疑問の声は出ない。
2474 = "這些安排之前都已經說過了。所以沒有人提出疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「掘り返した石炭は宝箱につめ、\x%lキハ07;#00ffc040;キハ07%l;#;には\nそのまま、湯医駅へ向かってもらう」
1628 = "「採到的煤礦裝入寶箱，讓\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;載著遊客前往湯醫站」" 

# 【れいな】
# display as 玲奈
# JP: 「御一夜に戻るんじゃないんですかぁ？」
1331 = "「不是回御一夜嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり、\nそこからは川下りで御一夜までを移動してもらう」
1670 = "「沒錯，讓遊客在那裡乘坐漂流船回到御一夜」" 

# 【日々姫】
# display as 日日姬
# JP: 「けど、強制だと……遠回りでお金取られてるって\n印象もたれちゃうんじゃ――」
1376 = "「但是，強制的話……會給人一種故意繞遠路收錢的印象吧——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1474 = "「唔」" 

# monologue
# JP: 日々姫の指摘はもっともだ。
2272 = "日日姬的意見很正確。" 

# monologue
# JP: 炭鉱には興味があるが、\n川下りにはまるで興味が無い方も――
1985 = "也有些遊客只對煤礦感興趣，對漂流卻興趣全無——" 

# 【凪】
# display as 凪
# JP: 「戻りの線路が使えんことにすればええばい！\n例えば、落盤が起きたとかなんとかで」
1443 = "「只要說返回路線無法使用就行咧！比如說，因為發生了塌方之類的」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、そっか！　全部がひとつのアトラクション――\nストーリー仕立てにしちゃえばいいんだ」
1492 = "「啊，對了！只要將這一切布置成一個娛樂項目——設計一個故事就行了」" 

# monologue
# JP: 凪の言葉にヒントを得たのか、\n日々姫はスケッチブックを広げ――
2252 = "或許是從凪的話語中得到了提示，日日姬翻開素描簿——" 

# monologue
# JP: そこで、ぴたりと止まってしまう。
2339 = "然後又停止了動作。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに。なんかストーリー」
1802 = "「阿哥。快整個故事出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理を言うな。僕は現実しか見ん男だぞ」
1407 = "「別強人所難了。我可是一個只關心現實的男人」" 

# 【ポーレット】
# display as 波萊特
# JP: 「亡霊……廃宿舎群や炭鉱に、\n亡霊が出ることにしたらどうでしょうか？」
1362 = "「亡靈……就說廢棄宿舍區與煤礦裡有亡靈出沒怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「亡霊？」
1365 = "「亡靈？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「炭鉱夫さんたちの亡霊です、隠し坑道から、\n大切な石炭が盗まれたと思って、怒って。暴れる」
1630 = "「採煤工人的亡靈。他們認為隱藏坑道裡寶貴的煤礦被偷走了。於是開始生氣、發狂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「暴れて線路にまで溢れだして――\n\x%lキハ07;#00ffc040;キハ07%l;#;は湯医に退避するしかなくなるのか？」
1363 = "「亡靈們發狂，都湧到鐵路上來了——所以\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;只能撤至湯醫站嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです、そんな感じで」
1656 = "「是的，就是這樣」" 

# 【真闇】
# display as 真闇
# JP: 「亡霊、はマズかとよ」
1610 = "「我覺得亡靈不合適咧」" 

# monologue
# JP: 静かに、だけど確実に、\n僕らの熱気に、真闇姉はあえての冷水を浴びせる。
2364 = "真闇姐安靜卻也準確地給我們的話題潑了一盆冷水。" 

# monologue
# JP: 遊びに夢中になってる子供に、\n『帰る時間』と、指摘をしてくれるかのように。
2167 = "就像是告訴沉迷於遊戲的孩子們“該回家了”一般。" 

# 【真闇】
# display as 真闇
# JP: 「……炭鉱に苦か想い出をもっとる層を、\nいたずらに刺激することになるけんねぇ」
1098 = "「……這樣會無謂地刺激到那些對於煤礦有著痛苦回憶的人們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それは確かに」
1483 = "「啊……的確是這樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「言われてみればそうですね。\nなら、妖精ってことでどうでしょう？」
1735 = "「要這麼說的話，確實沒有錯呢。那麼，改成精靈怎麼樣？」" 

# monologue
# JP: あっさりと、\nポーレットはイメージを180度転換――
2315 = "波萊特輕易地顛覆了原來的形象——" 

# 【ふかみ】
# display as 深美
# JP: 「それ！　素敵。です。\n鉱山妖精、とってもいい。です！」
1768 = "「這個！很不錯。礦山精靈，非常棒。嗯！」" 

# monologue
# JP: ――した途端、ふかみがグイと食いついてくる。
1068 = "——深美立刻對這個主意產生了興趣。" 

# 【ふかみ】
# display as 深美
# JP: 「鉱山妖精は水を渡れないから、\n川下り船、御一夜までの脱出のお役にたつ。です」
1705 = "「礦山精靈不能過河。所以遊客們可以乘坐漂流船撤離至御一夜。嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「川岸に鉱山妖精が押し寄せてくると面白いかも。\n『ボクたちの石炭をどうするつもりだー』って」
1743 = "「讓礦山精靈跑到河岸邊來，應該會很有趣。一邊喊著“你們要對我們的煤礦做什麼——”」" 

# 【ふかみ】
# display as 深美
# JP: 「『ズルいぞー！　もどってこーい！』とか言わせると、\n川に入れないこと、きっと誰にでもわかる。です」
1442 = "「只要它們喊著“太耍賴了！快回來！”，遊客們就會明白，精靈無法過河」" 

# monologue
# JP: ポーレットとふかみが呼応している。
2314 = "波萊特與深美你一言我一語地說著。" 

# monologue
# JP: 空想好きと、読書好き。\n共鳴しあうことにより、アイディアが産まれているようだ。
1970 = "一個想像力豐富，一個熱愛讀書——二者產生共鳴，使得好點子接連湧現。" 

# 【ポーレット】
# display as 波萊特
# JP: 「川下りの途中で、頭上の鉄橋をＳＬが駆け抜けていく。\nだけど、それは幻。もう走れないはずの\x%l8620;#00ffc040;8620%l;#;」
1532 = "「在漂流途中，看到蒸汽機車從鐵橋疾馳而過。但那隻是幻象——其實\\x%l8620;#00ffc040;８６２０%l;#;已經無法開動」" 

# 【ふかみ】
# display as 深美
# JP: 「走れないのは、もちろん、石炭が無いから。です」
1344 = "「之所以無法開動，當然是因為沒有煤礦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど！　『掘った石炭を8620にあげる』という\nオプションに、それならば大きなドラマが加わるわけか」
1418 = "「原來如此！這樣就能為“將採來的煤礦提供給８６２０”這一選項增添一個重要劇情」" 

# monologue
# JP: こくりと、大きくポーレットが頷く。
2317 = "波萊特重重地點頭。" 

# monologue
# JP: 日々姫の手はいつからだろう、\n猛然とスケッチを描きつらねている。
2234 = "我看向日日姬，發現她已經開始在素描簿上快速地畫著些什麼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜に到着できたら、そこで一旦ツアーはおしまい。\nそのあとは、双鉄くんが言ったとおりにオプションで」
1707 = "「等遊客到達御一夜，觀光暫時告一段落。接下來就按照雙鐵君所說的，讓遊客自己選擇」" 

# monologue
# JP: 無論、石炭をおみやげにして、\nそのまま自由行動を取ってくれてもいい。
2481 = "遊客可以選擇自行遊玩，將採到的煤礦作為紀念品帶回家。" 

# monologue
# JP: 掘った石炭をアクセサリーに加工するなどの案内もして、\n職人さんたちのもとへも誘導するようにしてもいいだろう。
1983 = "也可以向遊客介紹一些能夠將煤礦加工成飾品的工匠。" 

# 【ポーレット】
# display as 波萊特
# JP: 「舟から見た、『幻のＳＬ』を気にかけてくれるお客様は、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;に案内し、\x%l8620;#00ffc040;8620%l;#;と出会ってもらいます」
1546 = "「如果有遊客對漂流時看到的“蒸汽機車幻影”感興趣，可以帶他們去\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;，與\\x%l8620;#00ffc040;８６２０%l;#;相遇」" 

# 【ふかみ】
# display as 深美
# JP: 「石炭をあげて、生き返ってくれる\x%l8620;#00ffc040;8620%l;#;に――\n乗れたら、きっとすごくいい、って思う。です」
1548 = "「如果能讓遊客乘上因為他們提供了煤炭才復活的\\x%l8620;#00ffc040;８６２０%l;#;，他們一定會非常高興。嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を走らせて、御一夜――湯医を往復するのか？」
1742 = "「讓\\x%l8620;#00ffc040;８６２０%l;#;在御一夜與湯醫之間往返嗎？」" 

# monologue
# JP: にこりと、笑う。
2312 = "波萊特嫣然一笑。" 

# monologue
# JP: 僕の理解を。通じあったと。\n――ポーレットは喜んでくれている。
2122 = "她在為我們的靈犀相通而感到高興。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。妖精たちにその姿を見せて、\n石炭は、きちんと使われているって安心させてあげる」
1642 = "「是呀。讓精靈們看到\\x%l8620;#00ffc040;８６２０%l;#;，告訴它們——煤礦被用在正途之上。好讓它們安心」" 

# 【ふかみ】
# display as 深美
# JP: 「それで、鉱山妖精は喜んでくれて、\n鉱山に笑顔で帰っていく――と、すごくいい。です」
1554 = "「如此一來，礦山精靈也很高興。它們會帶著笑容返回礦山——這樣非常棒。嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、エキストラを頼む感じになるのかな？」
1773 = "「這樣的話，就需要請一些臨時演員了吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、双鉄くん。エキストラじゃなくてキャスト。\nマイントレジャーのキャストとして募集をかけましょう」
1336 = "「不，雙鐵君。不是臨時演員，而是固定演員。我們來招募煤探樂園的固定演員吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その方が、確かに人は集まりそうか？」
1497 = "「啊，這樣的確能吸引更多人應募」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。職人さんたちや業者さんたちと無関係の、\n『ごく普通の若者たち』に、きっと集まってもらえます」
1652 = "「是的。一定能吸引那些與工匠及其它業內人士無關的“普通青年人”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1473 = "「哦哦！」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。妖精でしたら――\n老人よりも、若者の方が、より雰囲気を出せますか」
1417 = "「原來如此。既然是精靈的話——相比於老年人，還是青年人更能營造出相應的氛圍啊」" 

# monologue
# JP: そのとおり。\nだが、それだけではない。
2451 = "說得沒錯。但是，還不僅於此。" 

# monologue
# JP: （若者層の雇用が、新たに生まれるのだ）
2547 = "（我們還創造了青年人的工作崗位）" 

# monologue
# JP: その意味は、決して小さなものではない。
2475 = "這件事情意義非凡。" 

# monologue
# JP: 『マイントレジャーという仕事場』が、\n御一夜市民、誰にも受け入れられるのならば。
2155 = "如果“煤探樂園”這一職場，能夠接納所有御一夜市民的話——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……線から面、だな」
1095 = "「……線連成了麵啊」" 

# monologue
# JP: 初めは、ハチロクという小さな小さな一点だった。
2459 = "起初，我只有八六這小小的“一點”。" 

# monologue
# JP: それが多くの出会いによって、\nレールに、線路に広がった。
2407 = "而這一點，在一次次相識的過程中，擴展為線路。" 

# monologue
# JP: （そしてポーレットの目が――市長という政治家の目が、\n線を面へと――大きく広げてくれたのだ）
2553 = "（而波萊特運用她那雙眼睛——那雙市長、政治家的眼睛，將線擴展為面）" 

# 【真闇】
# display as 真闇
# JP: 「けどねぇ」
1447 = "「可是呀」" 

# monologue
# JP: ふわりと声が挟まってくる。
1971 = "一個柔和的聲線加入進來。" 

# monologue
# JP: 真闇姉の、とても柔らかで静かな声が、\n大人の役目を果たしてくれる。
2370 = "真闇姐那溫和嫻靜的聲音透著成年人的責任。" 

# 【真闇】
# display as 真闇
# JP: 「まだいくらか、\nなんとかしなきゃいけんことがありよるよねぇ」
1776 = "「還有一些問題有待解決吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いくらか、とは」
1398 = "「具體是指？」" 

# 【真闇】
# display as 真闇
# JP: 「一つ目は、\x%l8620;#00ffc040;8620%l;#;の\x%l客車;#00ffc040;客車%l;#;のこと」
1822 = "「首先是\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、わたしに心当たりが――」
1800 = "「關於這個，其實我有頭緒——」" 

# monologue
# JP: 言いかけ、ふっと、ポーレットの目は凪へ向く。
2450 = "說到一半，波萊特忽然看向凪。" 

# 【ポーレット】
# display as 波萊特
# JP: 「さっきの写真、データもらえる？\nきっと、役に立つと思うから」
1413 = "「剛才的照片，可以傳給我嗎？我想一定會派上用場的」" 

# 【凪】
# display as 凪
# JP: 「良かばい、アドレスくれたら送っとくばい」
1539 = "「好的咧，你把信箱地址給咱就好咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。よろしくね」
1740 = "「謝謝。那就拜託了」" 

# 【真闇】
# display as 真闇
# JP: 「うふふ。\nなんとかなるならそれは良し、よね」
1458 = "「呵呵。既然有辦法，那就再好不過。對吧」" 

# monologue
# JP: 優しく笑い。\n真闇姉の目はじっとハチロクへ注がれる。
2366 = "真闇姐溫柔地笑著，轉而看向八六。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしに、何か？」
1662 = "「有什麼事嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「\x%l8620;#00ffc040;8620%l;#;の運転は、\nハチロクちゃんと双ちゃんが担当すると？」
1077 = "「\\x%l8620;#00ffc040;８６２０%l;#;是由八六和小雙來駕駛嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんです」
1696 = "「當然」" 

# 【真闇】
# display as 真闇
# JP: 「なら」
1792 = "「那麼——」" 

# 【凪】
# display as 凪
# JP: 「あああ！　そうばいっ！\nタイミング合わせ、どぎゃんすっとよ」
1481 = "「啊——！對咧！要怎麼掐準時間咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぬっ」
# 1474 = "「唔」" 

# monologue
# JP: ナビを使って上空から――と一瞬思うが、\nその場合、ナビがフォローするのは僕が乗る\x%l8620;#00ffc040;8620%l;#;だ。
2246 = "我首先想到的是——讓Ｎａｖｉ在空中提供幫助。但這樣的話，Ｎａｖｉ只能向我所駕駛的\\x%l8620;#00ffc040;８６２０%l;#;傳送訊息。" 

# monologue
# JP: かといって、僕がいつでも川下り船に\n乗るというのも……
2405 = "而我也不能一直待在漂流船上吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「えと、それも解決できます。\nれいなが、川下り船に乗れば、それだけで」
1455 = "「呃，這個問題也能解決。只要讓玲奈待在漂流船上就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか――\n\x%lキハ07;#00ffc040;キハ07%l;#;は、ポーレット一人でも動かせるものな」
1490 = "「啊，對了——波萊特一個人也能夠駕駛\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。御一夜までの戻りは無人の回送車輌になるから、\n安全面のリスクも極限までさげられますし」
1654 = "「是的。因為返回御一夜的這段路是無人的空車，安全風險也能夠降到最低」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 1512 = "「嗯」" 

# monologue
# JP: 笑う。\n真闇姉が、いつもとまったく違った笑顔で。
2368 = "真闇姐笑了，但笑容與以往有些不同。" 

# monologue
# JP: 満足そうに――\n同時に、どこか淋しげに。
2143 = "她看起來很滿意——卻又似乎有些落寞。" 

# 【真闇】
# display as 真闇
# JP: 「ポーちゃんに任せて、\nどうやら安心できそうやねぇ」
1700 = "「看來呀，往後把事情交給小波，我就能放心了咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1476 = "「啊——」" 

# monologue
# JP: 驚いたように目が丸くなる。
2318 = "波萊特驚訝地瞪圓了眼睛。" 

# monologue
# JP: その目のままにポーレットは、\nまっすぐまっすぐ、真闇姉へと視線を返す。
2124 = "她將視線移過去，與真闇姐對視。眼神漸漸變得堅定起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし――頑張ります。\n安心して、任せていただけるように」
1597 = "「我——我會繼續努力的。好讓您能放心交給我」" 
