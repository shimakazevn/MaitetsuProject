[script]
# lines: 395 
# 【双鉄】
# display as 雙鐵
# JP: 「ん…………」
1503 = "「嗯…………」" 

# monologue
# JP: いかん。\n頭は目覚めているのに、体がどうにも重く鈍い。
1978 = "不好。明明腦袋已經清醒過來了，身體卻還沉重得很。" 

# monologue
# JP: 端的に言って、起きようという気にならん。
2452 = "說白了，就是不想起床。" 

# monologue
# JP: （体力には、いささかの自信があったのだが――）
2549 = "（我原本對體力還有點自信的——）" 

# monologue
# JP: れいなを抱っこしたままで歩き通した探索と、\nその後の凪の特訓と。
2276 = "昨天先是抱著玲奈進行探索，後來又跟著凪進行特訓。" 

# monologue
# JP: いくらなんでも、昨日は体を酷使しすぎてしまったらしい。\n広い範囲の筋肉に、疼きと痛みが混在している。
2348 = "看來實在是有些勞累過度。身上多處肌肉又酸又痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでも、起きねば無駄にしてしまう。\n昨日の、あれほどの特訓を――」
1446 = "「可就算這樣，要是再不起來，昨天那麼辛苦的特訓就要白費了」" 

# monologue
# JP: 夏とはいえど、夜のクマ川の水は冷たい。
2497 = "雖然是夏季，但夜晚的隈河河水還是很涼。" 

# monologue
# JP: 何度も浴びて飲み込みまでしてわかったことはただひとつ、\n“凪と僕との二人では、とても無理だ”ということのみだ。
2197 = "我一次次地被河水打濕，甚至還嗆了幾口，最後卻只得出“單憑我和凪兩人應付不來”這一結論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川は、思春期の女の子だと――\nいつか、ふかみが話していたが」
1679 = "「深美曾經說過——隈河是正值青春期的少女」" 

# monologue
# JP: 扱いづらい。一瞬にして気分を変える。\n綺麗な水面のその奥に、深い淀みを隠している。
2136 = "她的情緒瞬息萬變，難以捉摸。在那清澈的水面之下，隱藏著深不可測的淤水處。" 

# monologue
# JP: あれが思春期の女の子というものなのであれば、\n僕などには、到底あしらいきれようもない。
2477 = "這種青春期少女可著實不是我能應付得來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、だ。僕にあしらえぬものならば――」
1379 = "「但是，既然我應付不來——」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　起きておいでですか？」
1816 = "「雙鐵少爺？您起床了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1512 = "「嗯」" 

# monologue
# JP: 噂をする前、思っただけでの、ハチロクの影。\nいくらか気分が上向きになる。
2487 = "還沒說曹操，曹操就到了。聽到八六的聲音，我又打起了幾分精神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「二度寝の誘惑と戦っていたところだ」
1600 = "「我剛剛在和睡回籠覺的誘惑作鬥爭呢」" 

# 【ハチロク】
# display as 八六
# JP: 「過去形ならばよろしゅうございました。\n双鉄様にお客様です」
1633 = "「既然打贏了就好。雙鐵少爺，有您的客人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「客？」
1563 = "「客人？」" 

# monologue
# JP: 時計を見る。\nまだ六時半にもなっていない。
2232 = "我看了看時鐘，還沒到六點半。" 

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様です。\n寝ているようなら起こさないでいいとおっしゃって」
1650 = "「是波萊特小姐。她說如果您還睡著，就不要叫醒您」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。五分だけ待ってもらってくれ」
1510 = "「嗯。讓她等我五分鐘」" 

# monologue
# JP: 鈍いの重いの言っている場合ではなさそうだ。\nバリバリと、こわばりを剥がすようにして体を起こす。
2349 = "看來沒時間抱怨這一身的疲倦感了。我直起身子，只聽見關節咯咯作響。" 

# monologue
# JP: 最低限の身支度をして居間へと向かえば、\nポーレットの、やや緊張した面持ちが僕を待っている。
2238 = "我簡單洗漱穿衣一番後來到起居室，看到波萊特正神色有些緊張地等著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、ポーレット。\n今日は、秘書をできずにすまんな」
1636 = "「早安，波萊特。今天沒辦法處理秘書的工作，真抱歉啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ！　事情が事情ですし――\n今日はスケジュール、議会と乗務だけですし」
1668 = "「沒事！畢竟情況特殊——而且今天只有議會和乘務工作」" 

# monologue
# JP: 慌てたような早口でいい、\nさらに慌てた顔になり、ポーレットはぺこり、頭を下げる。
2313 = "波萊特急忙說道，然後表現得更加慌張，向我低下了頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、わたしこそすみません。\nこんな、朝早くから」
1438 = "「反倒是我應該說對不起。這麼早來打擾你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗務前にということならばこの時間になる。\nすまなくなどは全くないが――何かあったか？」
1553 = "「如果要在乘務工作開始前過來，也就只有這時候了。所以你完全不用道歉。不過有什麼事嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その……何もない――何もないといいなって――\nあ！　もちろん、何もないに決まってるんですけど」
1788 = "「那個……我就是——就是希望你平安無事——啊！當然，你一定不會有事的。只是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1475 = "「唔？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの――ですから――えと、念のためっていうかっ！」
1785 = "「那個——所以說——呃、只是以防萬一吧！」" 

# monologue
# JP: ばっと、両手が差し出される。\nその手の中に握られてるのは――
2148 = "她突然將雙手伸到我面前。而她手中握著的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「お守り袋？」
1741 = "「護身符？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　昨日の今日のお話でしたから、その――」
1638 = "「是、是的！畢竟事出突然，所以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「手作りか。これはありがたい」
1640 = "「是你親手做的嗎？真是謝謝啊」" 

# monologue
# JP: 受け取れば、\nポーレットはあからさまなまでの安堵を見せる。
2352 = "看到我收下，波萊特明顯鬆了一口氣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちっちゃいので精一杯だったんですけど」
1439 = "「只來得及做了個小的」" 

# monologue
# JP: 言うとおり、小ぶりなお守り袋だが、\nそれだけに、仕上げの丁寧さが際立って見える。
2289 = "正如她所說，確實是一個比較小的護身符。但也正因如此，才更襯托出它的精緻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「カエルの刺繍――\nなるほど、無事かえるというお守りだな？」
1817 = "「青蛙的刺繡，“青蛙”寓意“歸家”——原來如此，是保佑我平安回家對吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すみません。子供っぽくて」
1566 = "「對不起啊，有點幼稚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――こうしたものはむしろ、\nシンプルなほど、願いが通じそうな気がするよ」
1325 = "「不——我覺得這種東西越是簡單明瞭，就越是靈驗」" 

# monologue
# JP: 刺繍のことにはくわしくないが、\nこの仕上がりの鮮やかさ、誰がどう見ても見事なものだ。
2209 = "我對刺繡雖然不太了解，但這般精良的做工，哪怕再外行的人也看得出來。" 

# monologue
# JP: 地道な作業が得意であると知ってはいたが、\n針仕事までこなすとは、正直思ってもいなかった。
2496 = "雖然我知道她擅長做那些需要耐心的事，但我真沒想到她連針線事都做得這麼好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。これなら僕も事故無く乗務できそう――\nんっ？」
1739 = "「謝謝。這樣一來，我也能平安完成乘務工作了——嗯？」" 

# monologue
# JP: 指先、かさりという感触がある。\nこれは、袋の中――紙包みかなにか入ってるのか？
2263 = "指尖傳來沙沙的觸覺。難道——護身符裡面有包著紙還是什麼東西嗎？" 

# 【ポーレット】
# display as 波萊特
# JP: 「あああ！　中はダメです！　あけちゃダメっ！\nあけたらお守りっ、効果がなくなりますからっ！」
1478 = "「啊——！不能看裡面！不能打開！打開就沒效果了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1493 = "「啊，抱歉」" 

# monologue
# JP: やはり、中に何かが入っているのか。
2283 = "果然裡面裝著什麼東西啊。" 

# monologue
# JP: 開けるつもりもなかったのだが、\n誤解を与え、ポーレットをひどく慌てさせてしまった。
2220 = "我本來也沒打算打開，但我的動作似乎引起了她的誤會，讓她非常著急。" 

# 【ポーレット】
# display as 波萊特
# JP: 「っていうかですね――今日、あの、大丈夫そうですか？\n凪ちゃんとふたりで」
1738 = "「話說呀——那個，你今天不要緊吧？就跟小凪兩個人」" 

# monologue
# JP: やけに早口で問いかけられる。\nそれほどまでに、心配してくれているのだろう。
2120 = "她問得很急切。說明她是真的很擔心我吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪とふたりで――ではとても無理そうだったので、\nフォローを頼むことにした」
1613 = "「我跟凪兩個人實在有些應付不來，所以我找了幫手」" 

# 【ポーレット】
# display as 波萊特
# JP: 「フォロー……って、誰にですか？」
1578 = "「幫手……是誰呀？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしです。わたくしと、ナビと」
1648 = "「是我。雙鐵少爺找了我，還有Ｎａｖｉ」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃん」
1391 = "「八六」" 

# monologue
# JP: 朱色の盆に茶碗を乗せて、\nしずしず、ハチロクが入室してくる。
2017 = "八六端著放有茶碗的紅色托盤，安靜地走了進來。" 

# monologue
# JP: しずしずと――\nけれどどこかに、わずかな不機嫌をにじませて。
2180 = "很安靜——卻也夾雜著一些不愉快。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんがフォローって？」
1392 = "「八六來幫忙？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「より厳密には、フォローを行うのはナビだ。\nハチロクは、ナビとの\x%l共感;#00ffc040;共感%l;#;で僕に情報を伝達する」
1524 = "「嚴格來說，是Ｎａｖｉ來幫忙。八六通過與Ｎａｖｉ進行\\x%l共感;#00ffc040;共鳴%l;#;來向我傳遞情報」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え――あっ！　ああっ！！」
1460 = "「咦——啊！這樣啊！！」" 

# monologue
# JP: ポーレットがぱん、と手を鳴らす。
2350 = "看來波萊特想明白了，她握拳輕敲另一隻手的手心。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました！　ナビちゃん、\nいっつも双鉄くんを上空からモニターしてるから」
1602 = "「我明白了！因為Ｎａｖｉ一直在空中觀察著雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。故にあれには、僕が川下り船に乗った何度かの\nデータも蓄積されている」
1507 = "「嗯。所以它儲存了我幾次乘坐漂流船的數據」" 

# monologue
# JP: 川下りなど、ナビから見れば\n『命の危険』をむやみに増大させるだけの行為だ。
2103 = "在Ｎａｖｉ看來，漂流是一種會無謂增加“生命危險”的行為。" 

# monologue
# JP: ゆえ、データの取り方も詳細で、\n事故可能性についての分析も、徹底的に行われている。
2257 = "所以它在收集漂流的數據時格外仔細，對發生事故的可能性也進行了徹底的分析。" 

# 【ハチロク】
# display as 八六
# JP: 「流れの状況に応じ、最も安全に川を下れる\nコース取りのシミュレートを、ですからナビは行えます」
1528 = "「因此Ｎａｖｉ能夠依照河流狀況，模擬計算出最安全的漂流路線」" 

# monologue
# JP: 口調は、冷静。表情も。\nしかしその目にはまだ、納得しきれぬ色が消えずに残る。
2140 = "她的語氣和神情都十分冷靜，但在眼底還殘留著幾分不甘願。" 

# 【ハチロク】
# display as 八六
# JP: 「それを最高効率で双鉄様に伝達するため、わたくしが\n――このわたくしが――船に乗る、など」
1685 = "「為了在第一時間將路線匯報給雙鐵少爺，我——我也會——一起、乘船的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗るだけではなく、乗りこなすのだ。\n僕とふたりで、船頭の職務をこなさねばならん」
1329 = "「不僅要乘船，還要熟練駕駛船。你必須和我一起，做好掌棹的工作才行」" 

# 【ハチロク】
# display as 八六
# JP: 「わかっております、双鉄様」
1605 = "「我明白，雙鐵少爺」" 

# monologue
# JP: ハチロクがぎゅっと目を閉じる。\n全てを隠し、しまいこもうとするかのように。
2018 = "八六閉上眼睛。彷彿想要將所有情緒隱藏起來一般。" 

# 【ハチロク】
# display as 八六
# JP: 「安全は最大の使命――\nそれは、\x%l舟運;#00ffc040;[しゅううん,1]舟運%l;#;においても同じと存じます」
1561 = "「安全第一——這對於\\x%l舟運;#00ffc040;船運%l;#;而言也是一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理をさせることは申し訳ない」
1623 = "「抱歉，難為你了」" 

# monologue
# JP: ハチロクは、物。\n僕に使われることを良しとする、物だと自ら定義している。
2011 = "八六是物品。她將自己定義為物品，甘願為我所用。" 

# monologue
# JP: が、そうであっても、\nハチロクは確かに、意思と願いとを有してもいる。
1991 = "但即使如此，八六也確確實實擁有自己的意志。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクの不満はわかるつもりだ。僕とても――\n僕とハチロクが揃って、何故舟なのだという気はしてる」
1607 = "「我能理解八六為何心有不滿。其實我也一樣——不明白為什麼我和八六聯手，駕駛的卻是船只」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
1827 = "「！」" 

# monologue
# JP: 開かれた目が僕を見る。\nただそれだけで、僕の推測が正しかったと伝わってくる。
2146 = "她睜大眼睛望著我。僅僅如此，我就確定了我的推測沒有錯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、無人の\x%l客車;#00ffc040;客車%l;#;を引いても[ハチロクニイマル,3]8620は満足すまい。\n本当の意味での復活のため。これは、必要な一歩なのだ」
1374 = "「但是，即使拖運著無人的\\x%l客車;#00ffc040;客運車廂%l;#;，８６２０也不會滿足。為了實現真正意義上的復活，這是必不可少的一步」" 

# 【ハチロク】
# display as 八六
# JP: 「必要な、一歩……なのですね」
1588 = "「必不可少的……一步啊」" 

# monologue
# JP: 小さな頷き。
2151 = "她輕點了頭。" 

# 【ハチロク】
# display as 八六
# JP: 「満員の\x%l客車;#00ffc040;客車%l;#;を――笑顔に満ちたお客様たちを。\nもう一度、あの子に引かせてあげるために」
1686 = "「為了讓那孩子再次拖運滿員的\\x%l客車;#00ffc040;客運車廂%l;#;——再次載上喜笑顏開的乘客們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕はそうだと確信している」
1505 = "「嗯。我相信這是有必要的」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;に満員の\x%l客車;#00ffc040;客車%l;#;を引かせるには観光復権が必要で、\n現状、クマ川下りは御一夜観光の看板だ。
2413 = "若想讓\\x%l8620;#00ffc040;８６２０%l;#;拖運滿員的\\x%l客車;#00ffc040;客運車廂%l;#;，就必須先復興旅遊業。而目前來看，隈河漂流是御一夜旅遊業的招牌。" 

# monologue
# JP: 看板が大きな傷を受けるようでは、\n復権の日は、さらに遠のく。
2418 = "若是招牌砸了，只會離復興的那一天越來越遠。" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしの本望は、双鉄様にお使いいただくこと。\nどのような役割であれ、そこに不満などはございません」
1091 = "「……我的夙願，便是為雙鐵少爺所用。無論要我做什麼，我都不會感到不滿」" 

# monologue
# JP: ――そのことを、きっと理解してくれたのだろう、\nハチロクの目が穏やかになる。
1066 = "——八六一定是明白了這一點，她的眼神恢復了平靜。" 

# 【ハチロク】
# display as 八六
# JP: 「ですが、わたくしが舟に乗ることがあの子の役に立つと。\nそう理解でき、心の棘を抜いて頂けたように思います」
1370 = "「但是您讓我明白了——我來乘船就可以幫助到８６２０那孩子。這樣一想，我感覺心裡好過了許多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった」
1789 = "「那就好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ほんとに――そうですよね。この一歩は、必要な一歩。\n寄り道に見えても本当は、ゴールへ、きっと近づける」
1699 = "「的確——沒有說錯呢。這一步是必不可少的一步。即使看似繞了遠路，也一定能更接近終點」" 

# monologue
# JP: ポーレットからも、力強い声。\nつられて見れば、目と目が合う。
2310 = "波萊特也朗聲應道。我朝聲音的方向望去，與她交會視線。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。団体のお客様のご予約をいただいているのは、\n16:00だ」
1509 = "「嗯。旅遊團預約的時間是１６點整」" 

# monologue
# JP: 続けて、今日のスケジュールを伝える。
2215 = "我接著開始說明今天的日程表。" 

# monologue
# JP: 安全装備や、\n着船所からの交通案内などなどの各種説明に三十分――
2453 = "講解救生衣的使用方法、介紹到達泊船點後的交通路線等等，大約需要３０分鐘——" 

# monologue
# JP: 病床のふかみとみどりさんとから聞いた流れを、\nそのまま伝える。
2208 = "我將躺在病床上的深美與翠小姐告訴我的內容轉述了一遍。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか。それなら――うん」
1772 = "「這樣啊。既然如此——嗯」" 

# monologue
# JP: 呟いて、\nポーレットはスと立ち上がる。
2316 = "波萊特輕聲說道，然後站了起來。" 

# monologue
# JP: お邪魔しましたと一礼し、\n持ち上げた顔で、もう一度僕に問いかけてくる。
2119 = "她向我們行禮告辭，又抬起頭來詢問我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それと、少しだけ――\nナビちゃんと、話させてもらっていいですか？」
1777 = "「還有，我能不能——稍微跟Ｎａｖｉ說幾句話呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。通信をするならすぐに」
1695 = "「當然。現在就能與它通訊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　いえ、直接。\nええと、どこか着水してるところで」
1486 = "「啊！不，我想當面說——那個，在它降落的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならば……レールショップへ戻る途中の……\nうむ。[おしろばし,2]押城橋のあたりに着水するよう指示しよう」
1646 = "「是嗎？那麼……就在返回鐵路商店的途中……嗯。我讓它降落在押城橋附近的水面上吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、助かります。お願いします」
1499 = "「啊，那太好了。拜託了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その程度はお安い御用だ。\nが――ナビと、いったい何を話すのだ？」
1715 = "「舉手之勞而已。不過——你要跟Ｎａｖｉ說什麼啊？」" 

# monologue
# JP: 問えば、はにかむ。\n困ったように、そして同時に、いたずらっぽく。
2409 = "聽到我這樣問，她羞澀起來。看起來有些為難，卻又帶著惡作劇般的笑意。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……ナイショ、でいいですか？\n失敗したら、ちょっと恥ずかしいですから」
1786 = "「那個……可以保密嗎？因為萬一失敗了，會有些難為情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　なにかに挑戦するのか」
1519 = "「嗯？要進行什麼挑戰嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「挑戦……っていうとおおげさな気もしますけど。\nでも、はい。そうなります」
1732 = "「要說挑戰……感覺有些小題大做。不過，是這樣沒錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばお互い、一刻たりとも無駄にはできんな」
1794 = "「那麼我們都要抓緊時間了啊」" 

# monologue
# JP: 背筋を伸ばし立ち上がる。
2235 = "我站了起來。" 

# monologue
# JP: 胸ポケットへとお守りをしまい、\nしまった右手をそのまま差し出す。
2161 = "將護身符放入胸前口袋，然後向波萊特伸出了右手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それぞれ、最善の準備を尽くし、良い挑戦を行おう」
1569 = "「就讓我們做好萬全的準備，完成各自的挑戰吧」" 

# monologue
# JP: ふわりと、笑顔。\nひだまりに入ったような気になる。
2150 = "她莞爾一笑，就如冬日裡的暖陽。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1513 = "「嗯！」" 

# monologue
# JP: 重なる手と手はぬくもりと、勇気をきっと、伝えあうから。
2202 = "我們重合的手心，傳遞著溫暖與勇氣。" 

# monologue
# JP: 短い握手で十分で――\n僕らはそれぞれ、寄り道先へと踏み出していく。
2375 = "短暫的握手已然足夠——我們朝著各自的“遠路”，邁開步伐。" 

# monologue
# JP: （シャアアアアアアアッ）
2540 = "（嘩——）" 

# monologue
# JP: さほどに熱い湯では無い。
2298 = "水溫並不太燙。" 

# monologue
# JP: が、ぎりぎりまでの特訓による落水で、\n冷えきり疲れた体には、痛いくらいに染みてくる。
1996 = "但是經過昨天高強度的特訓以及數次落水，身體又冷又疲憊。此刻熱水沖上來，感覺有些刺痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1543 = "「好！」" 

# monologue
# JP: 水気を拭き取り、着替えた上に法被をまとえば、\n残すところは、本番だけだ。
2218 = "我擦乾身子，穿上衣服，在外面披上號衣，準備去迎接真正的挑戰。" 

# monologue
# JP: 満ちる気合いが、体の重さを払ってくれる。
2342 = "熊熊燃燒的鬥志，驅散了疲憊。" 

# 【凪】
# display as 凪
# JP: 「おっそいばーい！　男のくせに長風呂ばいっ！」
1383 = "「你好慢咧！一個大男人洗澡那麼慢！」" 

# monologue
# JP: シャワーを浴びていた時間など、\nものの五分も無かったはずだ。
2225 = "我淋浴應該只用了５分鐘不到的時間。" 

# monologue
# JP: が、凪の勢いを損ねたくない。\n奥の部屋で寝てるふかみに、余計な心配をかけたくもない。
1993 = "但我不想澆滅凪的幹勁。也不想讓在裡屋休息的深美擔心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気合を入れなおしていた」
1620 = "「抱歉。我在給自己打氣呢」" 

# 【凪】
# display as 凪
# JP: 「ん～っ？」
1520 = "「嗯～？」" 

# monologue
# JP: 凪が僕のまわりを回る。\nじろじろ見ながら、ふんふん、鼻を鳴らしまでする。
2043 = "凪圍著我打轉。她上下打量著我，三不五時還哼哼幾聲。" 

# monologue
# JP: 身体検査をされてるようで、\n思わず、背筋を伸ばしてしまう。
2212 = "我感覺就好像在接受體檢一般，不禁直起了腰桿。" 

# 【凪】
# display as 凪
# JP: 「うんっ！　気合ば、姿に出とるばいっ！\nにーさんの着こなし、なかなか良かとよ」
1517 = "「嗯！能看得出大哥哥你確實充滿了鬥志！大哥哥的這身打扮很不錯咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お褒めに預り光栄だ」
1534 = "「多謝誇獎」" 

# 【凪】
# display as 凪
# JP: 「身なりば、\nお客さんに与える影響、大きかとからね～っ！」
1529 = "「因為咱們的穿著會直接影響到乘客的情緒咧！」" 

# monologue
# JP: いつもよりさらに張った声。それで、ようやく理解する。\n奥の部屋へと、会話をきっと届かせたいのだ。
2138 = "她的聲音比往常還要響亮。我終於明白過來，她是希望裡屋能夠聽到。" 

# monologue
# JP: 今日一日は安静に――医師からの指示に従うふかみの、\n不安をほんの少しでも、減らしてあげるそのために。
2334 = "為了讓遵照醫囑在床休養的深美，能夠安心養病。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お客様が感じる不安は、そのまま舟のリスクになる。\n経験が浅いなどと思われぬよう、常に、堂々と振る舞う」
1351 = "「乘客的不安情緒，會直接影響行船安全。所以我要時刻表現得底氣十足，好不讓乘客覺得我是新手」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　それが大事ばいっ！」
1669 = "「沒錯！這個很重要咧！」" 

# monologue
# JP: にやりと笑った凪とふたり、\n声を張りつつ、各種事項を確認していく。
2054 = "凪有些調皮地笑了。我們兩人繼續提著嗓門，確認各類事項。" 

# monologue
# JP: 奥の部屋からの反応はない。\nそれはおそらく、ふかみの安心のあらわれと――
2433 = "裡屋沒有動靜。看來深美沒有不放心——" 

# 【ハチロク】
# display as 八六
# JP: 「ふかみ様。\nお体、だいぶん楽になったご様子でした」
1677 = "「深美小姐的臉色看起來好了許多」" 

# monologue
# JP: 浮かんだ想像が正しかったと、\n奥から出てきたハチロクの声が教えてくれる。
2009 = "八六從裡屋走出來，驗證了我的猜測。" 

# monologue
# JP: 小さなマスクと手袋と、防護服代わりのビニールを脱ぎ、\nこちらへと来る足取りも、晴れやかで軽やかな印象だ。
2128 = "她摘下那小小的口罩與手套，脫下充當防護服的塑膠罩，邁著輕盈的步伐朝我們走來。" 

# 【ハチロク】
# display as 八六
# JP: 「おかゆも、全て綺麗におあがりになられて。\n凪様に『おいしかった、ごちそうさま』とのことでした」
1709 = "「粥也喝完了。還託我轉告凪小姐“很美味，多謝款待”」" 

# 【凪】
# display as 凪
# JP: 「……よかったばい」
1089 = "「……太好咧」" 

# monologue
# JP: 大きく、凪の両膝が折れる。\n背中もまるまり、ほおっと長い息が吐かれる。
2053 = "凪整個人都放鬆了下來，長長地舒了一口氣。" 

# 【凪】
# display as 凪
# JP: 「ならっ！」
1793 = "「那麼——！」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「おいっ！」\n「凪様っ！？」
1500 = "「喂！」\\n「凪小姐！？」" 

# monologue
# JP: (がしっ）
31 = "(抓住）" 

# monologue
# JP: 一転素早く動いた凪の、\n襟のところをぎりぎりどうにか捕まえる。
2044 = "凪如脫兔一般朝裡屋跑去，我勉強抓住她的衣領。" 

# 【凪】
# display as 凪
# JP: 「なにするばーい！」
1385 = "「你幹什麼咧！」" 

# monologue
# JP: じたばたと、\nいたずらざかりの子猫のような身もだえだ。
2126 = "她就像一隻愛惡作劇的小貓一般拚命掙扎。" 

# monologue
# JP: 気持ちはわかる。\nしかし、この手を離したのなら――
2241 = "我能理解她的心情。但是，我如果放開了手——" 

# 【ハチロク】
# display as 八六
# JP: 「なんのため、\nわたくし一人がお見舞いにいったのですか」
1387 = "「你忘了我為什麼獨自去探望她了嗎？」" 

# monologue
# JP: ハチロクの声は、あきれている。\nあきれているが、どこか優しい。
2014 = "八六的聲音中帶著無奈，同時也有幾分溫柔。" 

# 【ハチロク】
# display as 八六
# JP: 「凪様までもが風邪を引いたら、\n明日以降も、川下り船の営業に支障が出てしまいます」
1731 = "「要是連凪小姐都感冒了，那可就連明天以後的漂流船營業都要受到影響了」" 

# 【凪】
# display as 凪
# JP: 「大丈夫ばい！　風邪とか引いたことなかけんっ！」
1667 = "「沒事的咧！咱從來沒得過感冒咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても。『うつしちゃってたらどうしよう』と、\nふかみは余計な不安を抱えることとなるぞ？」
1416 = "「即使如此，深美還是會想著“萬一傳染給你該怎麼辦”，讓她多一份擔憂哦？」" 

# 【凪】
# display as 凪
# JP: 「っ！！」
1828 = "「！！」" 

# monologue
# JP: 硬直。尻尾を強く握られたかのように。\n瞬時に凪はおとなしくなる。
2047 = "凪就像被人用力抓住了尾巴一樣僵在原地，頓時變老實了。" 

# 【凪】
# display as 凪
# JP: 「ううう……わかったばい。\nふかみちゃんに会うの、今日のところは我慢しとくばい」
1502 = "「嗚嗚嗚……咱懂咧。今天就忍耐一下，不去見小深了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それがいい。明日になれば、\n快癒したふかみと、心おきなく話せよう」
1769 = "「這就對了。等到了明天，你就能跟痊癒之後的深美愉快地聊天了」" 

# 【ハチロク】
# display as 八六
# JP: 「そうして、その席で報告すればよいのです」
1410 = "「到時候，你再向她匯報吧」" 

# monologue
# JP: 包み込むようなハチロクの声。
2015 = "八六的聲音之中透著包容。" 

# monologue
# JP: 小さな小さなハチロクが、\nまるで凪の、姉のようにも、母のようにも見えてくる。
2463 = "身材如此嬌小的八六，此刻看起來卻像是凪的姐姐，甚至是母親。" 

# 【ハチロク】
# display as 八六
# JP: 「今日のこと。どれほど、見事に川下りをし、\nいかに、お客様たちにご満足いただけたかを」
1450 = "「向她匯報今天的事——匯報你划船划得多麼出色、乘客們是多麼滿意」" 

# 【凪】
# display as 凪
# JP: 「うん！　わかったばい！　そーするばい！！」
1515 = "「嗯！知道啦！會的咧！！」" 

# 【観光客Ａ】
# display as ？？？
# JP: 「ごめんなんしょー、\n予約しとった田所いうもんだがねー」
1618 = "「打擾一下，我是之前來預約過的田所」" 

# 【ハチロク】
# display as 八六＆凪
# JP: 「お待ちして――」\n「お待ちしておりました。ようこそいらっしゃいませ」
1593 = "「恭候您——」\\n「恭候您多時了。歡迎光臨」" 

# monologue
# JP: おそらくは、\nふかみそのままの言葉と行動なのだろう。
2049 = "凪應該是完全模仿了深美的遣詞與行動吧。" 

# monologue
# JP: 凪は普段の動きと隈元弁とを抑え、\n流れるように、団体客を誘導していく。
2129 = "她改掉了平日裡的舉止與隈元話，嫻熟地接待著旅遊團。" 

# 【ハチロク】
# display as 八六
# JP: 「……凪様、頑張っておられますね」
1085 = "「……凪小姐還真努力呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1484 = "「啊…」" 

# monologue
