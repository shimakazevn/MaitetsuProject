[script]
# lines: 395 
# 【双鉄】
# display as 雙鐵
# JP: 「ん…………」
1503 = "「Ưm…………」"
# monologue
# JP: いかん。\n頭は目覚めているのに、体がどうにも重く鈍い。
1978 = "Không ổn rồi. Đầu óc đã tỉnh táo, nhưng cơ thể lại nặng nề và chậm chạp đến lạ."
# monologue
# JP: 端的に言って、起きようという気にならん。
2452 = "Nói thẳng ra là, chẳng có chút hứng thú nào để thức dậy cả."
# monologue
# JP: （体力には、いささかの自信があったのだが――）
2549 = "（Mình vốn cũng khá tự tin vào thể lực của bản thân cơ mà――）"
# monologue
# JP: れいなを抱っこしたままで歩き通した探索と、\nその後の凪の特訓と。
2276 = "Cuộc tìm kiếm mà tôi đã đi bộ suốt trong khi vẫn bế Reina, và sau đó là buổi huấn luyện đặc biệt của Nagi."
# monologue
# JP: いくらなんでも、昨日は体を酷使しすぎてしまったらしい。\n広い範囲の筋肉に、疼きと痛みが混在している。
2348 = "Dù nói thế nào đi nữa, hôm qua có vẻ như tôi đã vắt kiệt sức lực quá mức rồi. Một vùng cơ bắp rộng lớn đang xen lẫn cảm giác nhức nhối và đau đớn."
# 【双鉄】
# display as 雙鐵
# JP: 「それでも、起きねば無駄にしてしまう。\n昨日の、あれほどの特訓を――」
1446 = "「Dù vậy, nếu không thức dậy thì sẽ uổng phí mất. Buổi huấn luyện khắc nghiệt ngày hôm qua――」"
# monologue
# JP: 夏とはいえど、夜のクマ川の水は冷たい。
2497 = "Mặc dù đang là mùa hè, nhưng nước sông Kuma vào ban đêm lại rất lạnh."
# monologue
# JP: 何度も浴びて飲み込みまでしてわかったことはただひとつ、\n“凪と僕との二人では、とても無理だ”ということのみだ。
2197 = "Sau nhiều lần bị ướt sũng và thậm chí là uống nước sông, điều duy nhất tôi hiểu ra là, “Chỉ với Nagi và tôi thì, tuyệt đối không thể làm được”."
# 【双鉄】
# display as 雙鐵
# JP: 「クマ川は、思春期の女の子だと――\nいつか、ふかみが話していたが」
1679 = "「Sông Kuma, giống như một thiếu nữ tuổi dậy thì―― Fukami đã từng nói như vậy」"
# monologue
# JP: 扱いづらい。一瞬にして気分を変える。\n綺麗な水面のその奥に、深い淀みを隠している。
2136 = "Khó chiều. Tâm trạng thay đổi chỉ trong chớp mắt. Sâu bên dưới mặt nước trong veo ấy, ẩn giấu những vũng bùn lầy sâu thẳm."
# monologue
# JP: あれが思春期の女の子というものなのであれば、\n僕などには、到底あしらいきれようもない。
2477 = "Nếu đó thực sự là một thiếu nữ tuổi dậy thì, thì một người như tôi, hoàn toàn không thể đối phó nổi."
# 【双鉄】
# display as 雙鐵
# JP: 「が、だ。僕にあしらえぬものならば――」
1379 = "「Nhưng mà. Nếu đó là thứ tôi không thể đối phó được thì――」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　起きておいでですか？」
1816 = "「Ngài Soutetsu? Ngài đã dậy chưa ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1512 = "「Ừ」"
# monologue
# JP: 噂をする前、思っただけでの、ハチロクの影。\nいくらか気分が上向きになる。
2487 = "Còn chưa kịp nhắc tới, chỉ vừa mới nghĩ đến thôi, bóng dáng Hachiroku đã xuất hiện. Tâm trạng tôi cũng phấn chấn lên đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「二度寝の誘惑と戦っていたところだ」
1600 = "「Tôi đang chiến đấu với cám dỗ ngủ nướng đây」"
# 【ハチロク】
# display as 八六
# JP: 「過去形ならばよろしゅうございました。\n双鉄様にお客様です」
1633 = "「Thì quá khứ nghĩa là ngài đã chiến thắng rồi nhỉ. Có khách tìm ngài Soutetsu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「客？」
1563 = "「Khách?」"
# monologue
# JP: 時計を見る。\nまだ六時半にもなっていない。
2232 = "Tôi nhìn đồng hồ.\nVẫn chưa tới sáu rưỡi."
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様です。\n寝ているようなら起こさないでいいとおっしゃって」
1650 = "「Là Thị trưởng Paulette ạ. Cô ấy dặn nếu ngài còn ngủ thì không cần đánh thức đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。五分だけ待ってもらってくれ」
1510 = "「Hừm. Bảo cô ấy đợi năm phút nhé.」"
# monologue
# JP: 鈍いの重いの言っている場合ではなさそうだ。\nバリバリと、こわばりを剥がすようにして体を起こす。
2349 = "Có vẻ không phải lúc để than vãn về sự nặng nề hay chậm chạp nữa rồi. Tôi ngồi dậy, cố gắng xua đi sự căng cứng của cơ thể, các khớp xương kêu rắc rắc."
# monologue
# JP: 最低限の身支度をして居間へと向かえば、\nポーレットの、やや緊張した面持ちが僕を待っている。
2238 = "Sau khi chuẩn bị qua loa và bước vào phòng khách, tôi thấy Paulette đang đợi với vẻ mặt hơi căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、ポーレット。\n今日は、秘書をできずにすまんな」
1636 = "「Chào buổi sáng, Paulette. Hôm nay tôi không thể làm thư ký cho cô được, xin lỗi nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ！　事情が事情ですし――\n今日はスケジュール、議会と乗務だけですし」
1668 = "「Không sao đâu! Hoàn cảnh bắt buộc mà―― Hơn nữa lịch trình hôm nay cũng chỉ có cuộc họp nghị viện và nhiệm vụ trên tàu thôi.」"
# monologue
# JP: 慌てたような早口でいい、\nさらに慌てた顔になり、ポーレットはぺこり、頭を下げる。
2313 = "Paulette nói nhanh như thể đang luống cuống, rồi với khuôn mặt càng thêm hoảng hốt, cô ấy cúi đầu cái rụp."
# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、わたしこそすみません。\nこんな、朝早くから」
1438 = "「Mà phải nói là, em mới là người phải xin lỗi. Đến làm phiền anh từ sáng sớm thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗務前にということならばこの時間になる。\nすまなくなどは全くないが――何かあったか？」
1553 = "「Nếu muốn gặp trước giờ làm nhiệm vụ thì chỉ có thời gian này thôi. Cô hoàn toàn không cần phải xin lỗi đâu――có chuyện gì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「その……何もない――何もないといいなって――\nあ！　もちろん、何もないに決まってるんですけど」
1788 = "「Chuyện là... không có gì――em chỉ mong là không có chuyện gì thôi―― A! Đương nhiên là, chắc chắn sẽ không có chuyện gì rồi, nhưng mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1475 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの――ですから――えと、念のためっていうかっ！」
1785 = "「À thì――cho nên là――ừm, coi như để phòng hờ ấy mà!」"
# monologue
# JP: ばっと、両手が差し出される。\nその手の中に握られてるのは――
2148 = "Cô ấy vội vàng chìa cả hai tay ra. Thứ được nắm chặt trong đôi tay ấy là――"
# 【双鉄】
# display as 雙鐵
# JP: 「お守り袋？」
1741 = "「Túi bùa hộ mệnh sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　昨日の今日のお話でしたから、その――」
1638 = "「V-vâng! Chuyện xảy ra quá gấp gáp từ hôm qua đến hôm nay, nên là――」"
# 【双鉄】
# display as 雙鐵
# JP: 「手作りか。これはありがたい」
1640 = "「Đồ tự làm à. Thật đáng quý.」"
# monologue
# JP: 受け取れば、\nポーレットはあからさまなまでの安堵を見せる。
2352 = "Khi tôi nhận lấy,\nPaulette lộ rõ vẻ nhẹ nhõm ra mặt."
# 【ポーレット】
# display as 波萊特
# JP: 「ちっちゃいので精一杯だったんですけど」
1439 = "「Làm được cái nhỏ xíu thế này là em đã cố hết sức rồi đấy.」"
# monologue
# JP: 言うとおり、小ぶりなお守り袋だが、\nそれだけに、仕上げの丁寧さが際立って見える。
2289 = "Đúng như cô ấy nói, đó là một chiếc túi bùa hộ mệnh nhỏ bé, nhưng chính vì vậy, sự tỉ mỉ trong từng đường nét lại càng trở nên nổi bật."
# 【双鉄】
# display as 雙鐵
# JP: 「カエルの刺繍――\nなるほど、無事かえるというお守りだな？」
1817 = "「Hình thêu con ếch―― Ra vậy, bùa hộ mệnh cầu bình an trở về nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「すみません。子供っぽくて」
1566 = "「Xin lỗi anh. Trông hơi trẻ con nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――こうしたものはむしろ、\nシンプルなほど、願いが通じそうな気がするよ」
1325 = "「Không đâu――những thứ như thế này, càng đơn giản thì lời cầu nguyện càng dễ linh ứng đấy.」"
# monologue
# JP: 刺繍のことにはくわしくないが、\nこの仕上がりの鮮やかさ、誰がどう見ても見事なものだ。
2209 = "Tuy tôi không am hiểu về thêu thùa, nhưng màu sắc sống động của thành phẩm này, ai nhìn vào cũng phải trầm trồ khen ngợi."
# monologue
# JP: 地道な作業が得意であると知ってはいたが、\n針仕事までこなすとは、正直思ってもいなかった。
2496 = "Dù biết cô ấy giỏi những công việc đòi hỏi sự kiên nhẫn, nhưng thú thật, tôi không ngờ cô ấy lại khéo tay thêu thùa đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。これなら僕も事故無く乗務できそう――\nんっ？」
1739 = "「Cảm ơn cô. Có cái này thì tôi có thể thực hiện nhiệm vụ mà không gặp tai nạn nào rồi―― Hửm?」"
# monologue
# JP: 指先、かさりという感触がある。\nこれは、袋の中――紙包みかなにか入ってるのか？
2263 = "Đầu ngón tay cảm nhận được tiếng sột soạt. Cái này, bên trong túi――có gói giấy hay thứ gì đó sao?"
# 【ポーレット】
# display as 波萊特
# JP: 「あああ！　中はダメです！　あけちゃダメっ！\nあけたらお守りっ、効果がなくなりますからっ！」
1478 = "「Aaa! Không được xem bên trong đâu! Không được mở ra đâu! Mở ra là bùa hộ mệnh sẽ mất tác dụng đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1493 = "「À, xin lỗi.」"
# monologue
# JP: やはり、中に何かが入っているのか。
2283 = "Quả nhiên là có thứ gì đó bên trong."
# monologue
# JP: 開けるつもりもなかったのだが、\n誤解を与え、ポーレットをひどく慌てさせてしまった。
2220 = "Dù không có ý định mở ra, nhưng hành động của tôi đã gây hiểu lầm, khiến Paulette vô cùng hoảng hốt."
# 【ポーレット】
# display as 波萊特
# JP: 「っていうかですね――今日、あの、大丈夫そうですか？\n凪ちゃんとふたりで」
1738 = "「Mà nói chứ――hôm nay, ừm, anh có ổn không? Chỉ có anh và bé Nagi thôi.」"
# monologue
# JP: やけに早口で問いかけられる。\nそれほどまでに、心配してくれているのだろう。
2120 = "Cô ấy hỏi với giọng điệu dồn dập lạ thường. Chắc hẳn cô ấy đang rất lo lắng cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪とふたりで――ではとても無理そうだったので、\nフォローを頼むことにした」
1613 = "「Chỉ với Nagi và tôi thì――có vẻ là không thể làm được, nên tôi đã nhờ người hỗ trợ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「フォロー……って、誰にですか？」
1578 = "「Hỗ trợ... là nhờ ai vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしです。わたくしと、ナビと」
1648 = "「Là tôi ạ. Tôi và Navi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃん」
1391 = "「Hachiroku.」"
# monologue
# JP: 朱色の盆に茶碗を乗せて、\nしずしず、ハチロクが入室してくる。
2017 = "Bưng chiếc khay màu đỏ son có đặt chén trà, Hachiroku lặng lẽ bước vào phòng."
# monologue
# JP: しずしずと――\nけれどどこかに、わずかな不機嫌をにじませて。
2180 = "Lặng lẽ――\nnhưng đâu đó vẫn phảng phất chút không vui."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんがフォローって？」
1392 = "「Hachiroku hỗ trợ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「より厳密には、フォローを行うのはナビだ。\nハチロクは、ナビとの\x%l共感;#00ffc040;共感%l;#;で僕に情報を伝達する」
1524 = "「Nói chính xác hơn thì, người thực hiện hỗ trợ là Navi. Hachiroku sẽ truyền đạt thông tin cho tôi thông qua việc \\x%l共感;#00ffc040;cộng cảm%l;#; với Navi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え――あっ！　ああっ！！」
1460 = "「Hả――A! Aaa!!」"
# monologue
# JP: ポーレットがぱん、と手を鳴らす。
2350 = "Paulette vỗ tay một cái bốp."
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました！　ナビちゃん、\nいっつも双鉄くんを上空からモニターしてるから」
1602 = "「Em hiểu rồi! Vì Navi lúc nào cũng theo dõi anh Soutetsu từ trên không mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。故にあれには、僕が川下り船に乗った何度かの\nデータも蓄積されている」
1507 = "「Ừm. Do đó, trong hệ thống của nó cũng đã tích lũy được dữ liệu từ vài lần tôi đi thuyền xuôi dòng sông.」"
# monologue
# JP: 川下りなど、ナビから見れば\n『命の危険』をむやみに増大させるだけの行為だ。
2103 = "Đối với Navi, việc xuôi dòng sông Kuma chỉ là một hành động làm tăng thêm 『nguy hiểm đến tính mạng』 một cách vô ích."
# monologue
# JP: ゆえ、データの取り方も詳細で、\n事故可能性についての分析も、徹底的に行われている。
2257 = "Chính vì thế, cách thu thập dữ liệu của nó cũng rất chi tiết, và việc phân tích khả năng xảy ra tai nạn cũng được thực hiện một cách triệt để."
# 【ハチロク】
# display as 八六
# JP: 「流れの状況に応じ、最も安全に川を下れる\nコース取りのシミュレートを、ですからナビは行えます」
1528 = "「Do đó, Navi có thể mô phỏng lộ trình xuôi dòng an toàn nhất tùy theo tình hình dòng chảy ạ.」"
# monologue
# JP: 口調は、冷静。表情も。\nしかしその目にはまだ、納得しきれぬ色が消えずに残る。
2140 = "Giọng điệu điềm tĩnh. Vẻ mặt cũng vậy. Tuy nhiên, trong đôi mắt ấy vẫn còn đọng lại vẻ không hoàn toàn cam tâm."
# 【ハチロク】
# display as 八六
# JP: 「それを最高効率で双鉄様に伝達するため、わたくしが\n――このわたくしが――船に乗る、など」
1685 = "「Và để truyền đạt điều đó đến ngài Soutetsu với hiệu suất cao nhất, tôi ――chính tôi đây――lại phải lên thuyền, thật là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗るだけではなく、乗りこなすのだ。\n僕とふたりで、船頭の職務をこなさねばならん」
1329 = "「Không chỉ lên thuyền, mà còn phải thành thạo việc chèo lái nữa. Cô phải cùng tôi hoàn thành nhiệm vụ của người chèo thuyền.」"
# 【ハチロク】
# display as 八六
# JP: 「わかっております、双鉄様」
1605 = "「Tôi hiểu rồi thưa ngài Soutetsu.」"
# monologue
# JP: ハチロクがぎゅっと目を閉じる。\n全てを隠し、しまいこもうとするかのように。
2018 = "Hachiroku nhắm nghiền mắt lại. Như thể đang cố gắng che giấu và kìm nén mọi thứ."
# 【ハチロク】
# display as 八六
# JP: 「安全は最大の使命――\nそれは、\x%l舟運;#00ffc040;[しゅううん,1]舟運%l;#;においても同じと存じます」
1561 = "「An toàn là sứ mệnh lớn nhất―― Tôi tin rằng điều đó cũng đúng với \\x%l舟運;#00ffc040;vận tải đường thủy%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理をさせることは申し訳ない」
1623 = "「Xin lỗi vì đã bắt ép cô.」"
# monologue
# JP: ハチロクは、物。\n僕に使われることを良しとする、物だと自ら定義している。
2011 = "Hachiroku là một món đồ. Cô ấy tự định nghĩa mình là một món đồ, chấp nhận việc bị tôi sử dụng."
# monologue
# JP: が、そうであっても、\nハチロクは確かに、意思と願いとを有してもいる。
1991 = "Nhưng dẫu vậy, Hachiroku thực sự vẫn có ý chí và nguyện vọng của riêng mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクの不満はわかるつもりだ。僕とても――\n僕とハチロクが揃って、何故舟なのだという気はしてる」
1607 = "「Tôi hiểu sự bất mãn của Hachiroku. Bản thân tôi cũng―― Cũng thắc mắc tại sao tôi và Hachiroku lại phải cùng nhau chèo thuyền.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
1827 = "「!」"
# monologue
# JP: 開かれた目が僕を見る。\nただそれだけで、僕の推測が正しかったと伝わってくる。
2146 = "Đôi mắt mở to nhìn tôi. Chỉ bấy nhiêu thôi cũng đủ cho thấy suy đoán của tôi là chính xác."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、無人の\x%l客車;#00ffc040;客車%l;#;を引いても[ハチロクニイマル,3]8620は満足すまい。\n本当の意味での復活のため。これは、必要な一歩なのだ」
1374 = "「Nhưng mà, dẫu có kéo theo một \\x%l客車;#00ffc040;toa hành khách%l;#; không người thì 8620 cũng sẽ không thỏa mãn đâu. Để hồi sinh theo đúng nghĩa thực sự. Đây là một bước đi cần thiết.」"
# 【ハチロク】
# display as 八六
# JP: 「必要な、一歩……なのですね」
1588 = "「Một bước đi, cần thiết... nhỉ.」"
# monologue
# JP: 小さな頷き。
2151 = "Cái gật đầu nhè nhẹ."
# 【ハチロク】
# display as 八六
# JP: 「満員の\x%l客車;#00ffc040;客車%l;#;を――笑顔に満ちたお客様たちを。\nもう一度、あの子に引かせてあげるために」
1686 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; chật kín người――những vị khách tràn ngập nụ cười. Để cho đứa trẻ đó được kéo thêm một lần nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕はそうだと確信している」
1505 = "「Ừm. Tôi tin chắc là như vậy.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;に満員の\x%l客車;#00ffc040;客車%l;#;を引かせるには観光復権が必要で、\n現状、クマ川下りは御一夜観光の看板だ。
2413 = "Để \\x%l8620;#00ffc040;8620%l;#; có thể kéo \\x%l客車;#00ffc040;toa hành khách%l;#; chật kín người thì việc phục hồi du lịch là cần thiết, và hiện tại, tuyến xuôi dòng sông Kuma chính là bộ mặt của du lịch Ohimitera."
# monologue
# JP: 看板が大きな傷を受けるようでは、\n復権の日は、さらに遠のく。
2418 = "Nếu bộ mặt đó bị tổn hại nặng nề, thì ngày phục hồi sẽ càng trở nên xa vời."
# 【ハチロク】
# display as 八六
# JP: 「……わたくしの本望は、双鉄様にお使いいただくこと。\nどのような役割であれ、そこに不満などはございません」
1091 = "「...Tâm nguyện của tôi là được ngài Soutetsu sử dụng. Dù là vai trò gì đi chăng nữa, tôi cũng không có bất mãn gì đâu ạ.」"
# monologue
# JP: ――そのことを、きっと理解してくれたのだろう、\nハチロクの目が穏やかになる。
1066 = "――Chắc hẳn cô ấy đã hiểu được điều đó, ánh mắt Hachiroku trở nên dịu dàng hơn."
# 【ハチロク】
# display as 八六
# JP: 「ですが、わたくしが舟に乗ることがあの子の役に立つと。\nそう理解でき、心の棘を抜いて頂けたように思います」
1370 = "「Nhưng mà, việc tôi lên thuyền sẽ giúp ích cho đứa trẻ đó. Tôi đã hiểu được điều đó, và cảm thấy như cái gai trong lòng đã được nhổ bỏ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった」
1789 = "「Vậy thì tốt rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんとに――そうですよね。この一歩は、必要な一歩。\n寄り道に見えても本当は、ゴールへ、きっと近づける」
1699 = "「Thật sự――đúng là như vậy nhỉ. Bước đi này là một bước đi cần thiết. Dù có vẻ như đang đi đường vòng, nhưng thực ra, chắc chắn sẽ tiến gần hơn đến đích.」"
# monologue
# JP: ポーレットからも、力強い声。\nつられて見れば、目と目が合う。
2310 = "Paulette cũng cất lên một giọng nói mạnh mẽ. Bị thu hút bởi điều đó, tôi nhìn sang và hai ánh mắt chạm nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。団体のお客様のご予約をいただいているのは、\n16:00だ」
1509 = "「Ừm. Lịch đặt trước của khách đoàn là vào lúc\n16:00.」"
# monologue
# JP: 続けて、今日のスケジュールを伝える。
2215 = "Tôi tiếp tục truyền đạt lịch trình ngày hôm nay."
# monologue
# JP: 安全装備や、\n着船所からの交通案内などなどの各種説明に三十分――
2453 = "Ba mươi phút cho các giải thích khác nhau như trang thiết bị an toàn, và hướng dẫn giao thông từ bến thuyền――"
# monologue
# JP: 病床のふかみとみどりさんとから聞いた流れを、\nそのまま伝える。
2208 = "Tôi truyền đạt lại y hệt trình tự mà tôi đã nghe từ Fukami và cô Midori trên giường bệnh."
# 【ポーレット】
# display as 波萊特
# JP: 「そっか。それなら――うん」
1772 = "「Vậy sao. Nếu vậy thì――ừm.」"
# monologue
# JP: 呟いて、\nポーレットはスと立ち上がる。
2316 = "Thì thầm,\nPaulette nhẹ nhàng đứng dậy."
# monologue
# JP: お邪魔しましたと一礼し、\n持ち上げた顔で、もう一度僕に問いかけてくる。
2119 = "Cúi chào và nói 'Xin lỗi vì đã làm phiền', rồi ngẩng mặt lên, cô ấy lại hỏi tôi một lần nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「それと、少しだけ――\nナビちゃんと、話させてもらっていいですか？」
1777 = "「Với lại, một chút thôi―― Em có thể nói chuyện với Navi được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。通信をするならすぐに」
1695 = "「Đương nhiên rồi. Nếu muốn liên lạc thì làm ngay đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　いえ、直接。\nええと、どこか着水してるところで」
1486 = "「A! Không, em muốn nói chuyện trực tiếp cơ. Ừm, ở một chỗ nào đó mà nó hạ cánh trên mặt nước ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならば……レールショップへ戻る途中の……\nうむ。[おしろばし,2]押城橋のあたりに着水するよう指示しよう」
1646 = "「Vậy sao? Nếu thế thì... trên đường về cửa hàng đường sắt... Ừm. Tôi sẽ chỉ thị cho nó hạ cánh xuống nước quanh khu vực cầu Oshiro.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、助かります。お願いします」
1499 = "「A, may quá. Nhờ anh nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その程度はお安い御用だ。\nが――ナビと、いったい何を話すのだ？」
1715 = "「Chuyện nhỏ thôi. Nhưng mà――cô định nói gì với Navi vậy?」"
# monologue
# JP: 問えば、はにかむ。\n困ったように、そして同時に、いたずらっぽく。
2409 = "Khi tôi hỏi, cô ấy bẽn lẽn. Trông có vẻ bối rối, và đồng thời, cũng có chút tinh nghịch."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……ナイショ、でいいですか？\n失敗したら、ちょっと恥ずかしいですから」
1786 = "「Ừm... giữ bí mật, được không anh? Vì nếu thất bại thì sẽ hơi xấu hổ một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　なにかに挑戦するのか」
1519 = "「Hửm? Định thử thách bản thân với cái gì à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「挑戦……っていうとおおげさな気もしますけど。\nでも、はい。そうなります」
1732 = "「Thử thách... nói thế thì có vẻ hơi quá. Nhưng mà, vâng. Đại loại là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばお互い、一刻たりとも無駄にはできんな」
1794 = "「Nếu vậy thì cả hai chúng ta, không thể lãng phí dù chỉ một giây nào đâu nhỉ.」"
# monologue
# JP: 背筋を伸ばし立ち上がる。
2235 = "Tôi vươn vai đứng dậy."
# monologue
# JP: 胸ポケットへとお守りをしまい、\nしまった右手をそのまま差し出す。
2161 = "Cất bùa hộ mệnh vào túi ngực, rồi tôi đưa luôn cánh tay phải vừa cất bùa ra."
# 【双鉄】
# display as 雙鐵
# JP: 「それぞれ、最善の準備を尽くし、良い挑戦を行おう」
1569 = "「Mỗi người hãy chuẩn bị tốt nhất có thể, và thực hiện một thử thách tuyệt vời nhé.」"
# monologue
# JP: ふわりと、笑顔。\nひだまりに入ったような気になる。
2150 = "Một nụ cười rạng rỡ. Cảm giác như đang bước vào một vệt nắng ấm áp."
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1513 = "「Vâng!」"
# monologue
# JP: 重なる手と手はぬくもりと、勇気をきっと、伝えあうから。
2202 = "Bởi vì những bàn tay đan vào nhau chắc chắn sẽ truyền tải hơi ấm và lòng dũng cảm cho nhau."
# monologue
# JP: 短い握手で十分で――\n僕らはそれぞれ、寄り道先へと踏み出していく。
2375 = "Một cái bắt tay ngắn gọn là đủ―― Chúng tôi mỗi người bước đi về phía con đường vòng của riêng mình."
# monologue
# JP: （シャアアアアアアアッ）
2540 = "（Rào rào rào rào）"
# monologue
# JP: さほどに熱い湯では無い。
2298 = "Nước không quá nóng."
# monologue
# JP: が、ぎりぎりまでの特訓による落水で、\n冷えきり疲れた体には、痛いくらいに染みてくる。
1996 = "Nhưng đối với cơ thể lạnh lẽo và mệt mỏi do rơi xuống nước trong đợt huấn luyện đặc biệt kéo dài đến sát nút, nó thấm vào đến mức đau nhói."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1543 = "「Được rồi!」"
# monologue
# JP: 水気を拭き取り、着替えた上に法被をまとえば、\n残すところは、本番だけだ。
2218 = "Lau khô người, thay quần áo và khoác áo Happi lên, những gì còn lại chỉ là phần trình diễn chính thức thôi."
# monologue
# JP: 満ちる気合いが、体の重さを払ってくれる。
2342 = "Khí thế sục sôi xua tan đi sự nặng nề của cơ thể."
# 【凪】
# display as 凪
# JP: 「おっそいばーい！　男のくせに長風呂ばいっ！」
1383 = "「Chậm quá đi nè! Đàn ông con trai gì mà tắm lâu thế á!」"
# monologue
# JP: シャワーを浴びていた時間など、\nものの五分も無かったはずだ。
2225 = "Thời gian tôi tắm vòi sen, chắc chắn chưa đến năm phút."
# monologue
# JP: が、凪の勢いを損ねたくない。\n奥の部屋で寝てるふかみに、余計な心配をかけたくもない。
1993 = "Nhưng tôi không muốn làm giảm khí thế của Nagi. Cũng không muốn làm Fukami đang ngủ ở phòng trong phải lo lắng thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気合を入れなおしていた」
1620 = "「Xin lỗi. Anh đang lấy lại tinh thần.」"
# 【凪】
# display as 凪
# JP: 「ん～っ？」
1520 = "「Hửm~?」"
# monologue
# JP: 凪が僕のまわりを回る。\nじろじろ見ながら、ふんふん、鼻を鳴らしまでする。
2043 = "Nagi đi vòng quanh tôi. Vừa nhìn chằm chằm, vừa khịt khịt mũi."
# monologue
# JP: 身体検査をされてるようで、\n思わず、背筋を伸ばしてしまう。
2212 = "Cảm giác như đang bị kiểm tra sức khỏe, khiến tôi bất giác đứng thẳng lưng lên."
# 【凪】
# display as 凪
# JP: 「うんっ！　気合ば、姿に出とるばいっ！\nにーさんの着こなし、なかなか良かとよ」
1517 = "「Ừm! Khí thế thể hiện hết ra ngoài rồi nè! Cách ăn mặc của anh hai cũng khá lắm á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お褒めに預り光栄だ」
1534 = "「Rất vinh hạnh được em khen.」"
# 【凪】
# display as 凪
# JP: 「身なりば、\nお客さんに与える影響、大きかとからね～っ！」
1529 = "「Vẻ bề ngoài, ảnh hưởng lớn đến khách hàng lắm đó nha~!」"
# monologue
# JP: いつもよりさらに張った声。それで、ようやく理解する。\n奥の部屋へと、会話をきっと届かせたいのだ。
2138 = "Giọng nói còn vang hơn bình thường. Nhờ vậy, cuối cùng tôi cũng hiểu ra. Chắc chắn em ấy muốn cuộc trò chuyện lọt vào căn phòng bên trong."
# monologue
# JP: 今日一日は安静に――医師からの指示に従うふかみの、\n不安をほんの少しでも、減らしてあげるそのために。
2334 = "Hôm nay phải nghỉ ngơi cả ngày――để giảm bớt phần nào sự bất an của Fukami, người đang tuân theo chỉ định của bác sĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「お客様が感じる不安は、そのまま舟のリスクになる。\n経験が浅いなどと思われぬよう、常に、堂々と振る舞う」
1351 = "「Sự bất an của khách hàng sẽ trực tiếp trở thành rủi ro cho con thuyền. Để không bị coi là thiếu kinh nghiệm, phải luôn cư xử thật đường hoàng.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　それが大事ばいっ！」
1669 = "「Đúng vậy nè! Điều đó quan trọng lắm á!」"
# monologue
# JP: にやりと笑った凪とふたり、\n声を張りつつ、各種事項を確認していく。
2054 = "Cùng với Nagi đang cười ranh mãnh, chúng tôi vừa lớn giọng, vừa xác nhận lại các hạng mục khác nhau."
# monologue
# JP: 奥の部屋からの反応はない。\nそれはおそらく、ふかみの安心のあらわれと――
2433 = "「Không có phản ứng gì từ căn phòng bên trong. Đó có lẽ là biểu hiện cho sự an tâm của Fukami――」"
# 【ハチロク】
# display as 八六
# JP: 「ふかみ様。\nお体、だいぶん楽になったご様子でした」
1677 = "「Fukami. Có vẻ như cơ thể em ấy đã đỡ hơn nhiều rồi ạ.」"
# monologue
# JP: 浮かんだ想像が正しかったと、\n奥から出てきたハチロクの声が教えてくれる。
2009 = "Giọng nói của Hachiroku từ trong phòng vọng ra đã chứng minh suy đoán của tôi là chính xác."
# monologue
# JP: 小さなマスクと手袋と、防護服代わりのビニールを脱ぎ、\nこちらへと来る足取りも、晴れやかで軽やかな印象だ。
2128 = "Cởi bỏ chiếc khẩu trang và găng tay nhỏ xíu cùng tấm ni lông dùng thay cho đồ bảo hộ, bước chân cô ấy tiến về phía này cũng mang lại ấn tượng tươi sáng và nhẹ nhàng."
# 【ハチロク】
# display as 八六
# JP: 「おかゆも、全て綺麗におあがりになられて。\n凪様に『おいしかった、ごちそうさま』とのことでした」
1709 = "「Cháo cũng đã ăn hết sạch rồi ạ. Em ấy nhờ gửi lời đến Nagi là 『Ngon lắm, cảm ơn cậu vì bữa ăn』 ạ.」"
# 【凪】
# display as 凪
# JP: 「……よかったばい」
1089 = "「...May quá nè.」"
# monologue
# JP: 大きく、凪の両膝が折れる。\n背中もまるまり、ほおっと長い息が吐かれる。
2053 = "Nagi khuỵu hẳn hai đầu gối xuống. Lưng cũng khom lại, thở ra một hơi dài nhẹ nhõm."
# 【凪】
# display as 凪
# JP: 「ならっ！」
1793 = "「Vậy thì!」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「おいっ！」\n「凪様っ！？」
1500 = "「Này!」\n「Nagi!?」"
# monologue
# JP: (がしっ）
31 = "（Chụp）"
# monologue
# JP: 一転素早く動いた凪の、\n襟のところをぎりぎりどうにか捕まえる。
2044 = "Tôi suýt soát túm được cổ áo của Nagi, khi con bé bất ngờ chuyển động chớp nhoáng."
# 【凪】
# display as 凪
# JP: 「なにするばーい！」
1385 = "「Làm gì vậy á!」"
# monologue
# JP: じたばたと、\nいたずらざかりの子猫のような身もだえだ。
2126 = "Con bé vùng vẫy loạn xạ, như một chú mèo con đang tuổi nghịch ngợm."
# monologue
# JP: 気持ちはわかる。\nしかし、この手を離したのなら――
2241 = "Tôi hiểu cảm giác đó.\nNhưng mà, nếu buông tay ra thì――"
# 【ハチロク】
# display as 八六
# JP: 「なんのため、\nわたくし一人がお見舞いにいったのですか」
1387 = "「Vì cớ gì mà, chỉ có một mình tôi vào thăm bệnh chứ ạ?」"
# monologue
# JP: ハチロクの声は、あきれている。\nあきれているが、どこか優しい。
2014 = "Giọng của Hachiroku đầy vẻ cạn lời. Cạn lời, nhưng đâu đó vẫn rất dịu dàng."
# 【ハチロク】
# display as 八六
# JP: 「凪様までもが風邪を引いたら、\n明日以降も、川下り船の営業に支障が出てしまいます」
1731 = "「Nếu đến cả Nagi cũng bị cảm, thì từ ngày mai trở đi, việc kinh doanh thuyền xuôi dòng sẽ gặp trở ngại đấy ạ.」"
# 【凪】
# display as 凪
# JP: 「大丈夫ばい！　風邪とか引いたことなかけんっ！」
1667 = "「Không sao đâu nè! Em chưa từng bị cảm bao giờ á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても。『うつしちゃってたらどうしよう』と、\nふかみは余計な不安を抱えることとなるぞ？」
1416 = "「Dù vậy đi nữa. Fukami sẽ lại phải mang thêm nỗi bất an thừa thãi rằng, 『Lỡ lây cho cậu ấy thì phải làm sao đây』 đó?」"
# 【凪】
# display as 凪
# JP: 「っ！！」
1828 = "「!!」"
# monologue
# JP: 硬直。尻尾を強く握られたかのように。\n瞬時に凪はおとなしくなる。
2047 = "Cứng đờ. Giống như bị túm chặt lấy đuôi vậy. Nagi ngay lập tức ngoan ngoãn hẳn."
# 【凪】
# display as 凪
# JP: 「ううう……わかったばい。\nふかみちゃんに会うの、今日のところは我慢しとくばい」
1502 = "「Ư ư ư... Em hiểu rồi nè. Chuyện đi gặp bé Fukami, hôm nay em sẽ cố nhịn vậy á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それがいい。明日になれば、\n快癒したふかみと、心おきなく話せよう」
1769 = "「Thế là tốt nhất. Đến ngày mai, em có thể thoải mái trò chuyện với Fukami đã hoàn toàn bình phục rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「そうして、その席で報告すればよいのです」
1410 = "「Và rồi, lúc đó hãy báo cáo lại là được ạ.」"
# monologue
# JP: 包み込むようなハチロクの声。
2015 = "Giọng nói của Hachiroku như đang bao bọc lấy con bé."
# monologue
# JP: 小さな小さなハチロクが、\nまるで凪の、姉のようにも、母のようにも見えてくる。
2463 = "Hachiroku vô cùng nhỏ bé, nhưng lại trông giống như một người chị, hay thậm chí là một người mẹ của Nagi vậy."
# 【ハチロク】
# display as 八六
# JP: 「今日のこと。どれほど、見事に川下りをし、\nいかに、お客様たちにご満足いただけたかを」
1450 = "「Về chuyện hôm nay. Rằng chuyến xuôi dòng đã diễn ra tuyệt vời thế nào, và làm sao để khiến các vị khách hài lòng đến vậy.」"
# 【凪】
# display as 凪
# JP: 「うん！　わかったばい！　そーするばい！！」
1515 = "「Vâng! Em hiểu rồi nè! Em sẽ làm vậy á!!」"
# 【観光客Ａ】
# display as ？？？
# JP: 「ごめんなんしょー、\n予約しとった田所いうもんだがねー」
1618 = "「Xin lỗi cho hỏi――\nTôi là Tadokoro đã đặt trước đây――」"
# 【ハチロク】
# display as 八六＆凪
# JP: 「お待ちして――」\n「お待ちしておりました。ようこそいらっしゃいませ」
1593 = "「Đang đợi――」 「Chúng tôi đang đợi quý khách đây ạ. Chào mừng quý khách đã đến.」"
# monologue
# JP: おそらくは、\nふかみそのままの言葉と行動なのだろう。
2049 = "Có lẽ,\nđó là lời nói và hành động y hệt như Fukami."
# monologue
# JP: 凪は普段の動きと隈元弁とを抑え、\n流れるように、団体客を誘導していく。
2129 = "Nagi kiềm chế những cử chỉ thường ngày và giọng Kumamoto-ben, chỉ dẫn cho khách đoàn một cách trôi chảy."
# 【ハチロク】
# display as 八六
# JP: 「……凪様、頑張っておられますね」
1085 = "「...Nagi, đang cố gắng hết sức nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1484 = "「Ừ...」"
# monologue
# JP: かけがえのない友のため、\n凪の姿は、まるで自らを投げうつようだ。
2056 = "Vì người bạn không thể thay thế, dáng vẻ của Nagi như thể đang vứt bỏ cả bản thân mình vậy."
# 【凪】
# display as 凪
# JP: 「まず、みなさんに救命胴衣をお配りすっ――します。\n前と後ろに、気をつけてくださいね」
1820 = "「Đầu tiên, xin phát áo phao cứu sinh cho mọi ngườ――mọi người ạ. Xin hãy chú ý mặt trước và mặt sau nhé.」"
# monologue
# JP: ときおり、つかえる。\nけれども決して止まらない。
1976 = "Thỉnh thoảng lại vấp váp. Nhưng tuyệt đối không dừng lại."
# monologue
# JP: 言葉に態度に、思いがそのままにじみ出ていて、\n美しいな、と素直に感じる。
2139 = "Tâm ý bộc lộ rõ ràng qua từng lời nói và thái độ, khiến tôi thành thật cảm thấy, thật đẹp đẽ."
# monologue
# JP: （僕にも、まだまだあるはずだ。\nポーレットのため、僕の力を尽くせることが）
2545 = "（Chắc chắn vẫn còn những việc mình có thể làm. Dốc hết sức mình vì Paulette.）"
# monologue
# JP: 思えばすぐに、これもまたその一つなのだと理解する。
2476 = "Nghĩ vậy, tôi liền hiểu ra rằng đây cũng là một trong số đó."
# monologue
# JP: 御一夜を笑顔で満たすことこそ、\nポーレットの笑顔を呼ぶことなのだと。
2423 = "Làm cho Ohimitera ngập tràn nụ cười, chính là mang lại nụ cười cho Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、行くぞ。\n舟の準備をしておこう」
1395 = "「Hachiroku, đi thôi.\nChuẩn bị thuyền nào.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
1658 = "「Vâng thưa ngài Soutetsu.」"
# monologue
# JP: （ザァァァァァァッ）
# 2540 = "（嘩——）" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、進路を一時。瀬に入ってください」
1814 = "「Ngài Soutetsu, hướng một giờ. Xin hãy tiến vào bãi cạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
# 1512 = "「嗯」" 
# monologue
# JP: 水棹は、足と腰とで扱う。
2288 = "Sào đẩy nước được điều khiển bằng chân và hông."
# monologue
# JP: ひかがみを、ぎゅっと張りつめさせて、\n腰から水棹を回転させて、手には力を入れず、繰る。
2160 = "Căng chặt nhượng chân, xoay sào từ hông, điều khiển mà không dùng lực ở tay."
# monologue
# JP: （くっ――ざばあっ！）
2543 = "（Hự――ào ào!）"
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「おおおおおっ！？」
1523 = "「Oooooo!?」"
# monologue
# JP: 練習通り、のつもりだったが、\nやはり疲労の影響か、操船がいささか荒くなってしまった。
2242 = "Định bụng sẽ làm y như lúc tập, nhưng có lẽ do ảnh hưởng của sự mệt mỏi, việc chèo lái đã trở nên hơi thô bạo."
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「水かぶったっぺよー」
1729 = "「Bị hắt nước vào người rồi này.」"
# 【凪】
# display as 凪
# JP: 「そりゃお客さん、ラッキーばいっ！」
1791 = "「Vậy là quý khách may mắn lắm á!」"
# monologue
# JP: 川の上では、ネコをかぶってる余裕がないのか。\nあるいは単に、お客さんたちにつられたのか。
2250 = "Trên sông thì không có thời gian để giả vờ ngoan ngoãn sao. Hay đơn giản chỉ là bị khách hàng cuốn theo."
# monologue
# JP: 凪の言葉はすっかり普段どおりに戻り、\nいつもの調子で、場の雰囲気を盛りあげている。
2059 = "Lời nói của Nagi đã hoàn toàn trở lại như bình thường, làm khuấy động bầu không khí với phong thái quen thuộc."
# 【凪】
# display as 凪
# JP: 「クマ川の水ば、健康によかとよ？\n源流の方じゃ、『[ちょうめいすい,2]長命水』ば言われとるばい」
1806 = "「Nước sông Kuma tốt cho sức khỏe lắm nha? Phía thượng nguồn còn được gọi là 『Nước trường thọ』 nữa đó nè.」"
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「ありゃ、それじゃ頭からかぶらんと損だっぺ」
1468 = "「Chà, thế thì không dội từ đầu xuống là lỗ to rồi.」"
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「兄さん、もっとざぶざぶ波立てておくれよし」
1404 = "「Cậu thanh niên, làm thêm vài con sóng to nữa đi.」"
# monologue
# JP: 返事をしている余裕など無い。
2222 = "Tôi không có tâm trí đâu mà trả lời."
# monologue
# JP: それでも呼びかけられたのならば、\nなんとか言葉を絞る他無い。
1995 = "Nhưng nếu đã bị gọi, thì đành phải cố nặn ra vài lời thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ご期待――くださいっ！」
1631 = "「Xin hãy――chờ đợi!」"
# 【凪】
# display as 凪
# JP: 「あのにーさんは有名やけんねー。\n思いもよらんとこで、きっと大波たてよるばいっ」
1767 = "「Ông anh đó nổi tiếng lắm nha. Chắc chắn sẽ tạo ra sóng lớn ở chỗ không ai ngờ tới á.」"
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「ほー、そりゃあ楽しみだっぺ」
1472 = "「Hô, thế thì đáng mong chờ lắm đây.」"
# monologue
# JP: 棒きれのようだった僕の言葉が、\n凪のフォローで彩りを得る。
2058 = "Lời nói khô khốc như khúc gỗ của tôi, nhờ Nagi đỡ lời mà trở nên có hồn hơn."
# monologue
# JP: と、いうか――大した機転だ。\n僕の未熟な操船を、言葉ひとつで期待に変えてる。
2195 = "Mà phải nói là――sự nhanh trí tuyệt vời. Chỉ bằng một lời nói, con bé đã biến kỹ năng chèo thuyền non nớt của tôi thành sự kỳ vọng."
# monologue
# JP: （この先、難所だ。\n頼まれずとも、まず大波を立ててしまう）
2530 = "（Phía trước là chỗ khó đi. Không cần nhờ vả, tôi cũng sẽ tự tạo ra sóng lớn thôi.）"
# monologue
# JP: 霧雨がまとわりつくせいで、\n視界を制限されている。
2340 = "Mưa phùn giăng mắc,\nlàm hạn chế tầm nhìn."
# monologue
# JP: ハチロクの指示を聞き逃さぬよう、\nわずかな異変も見逃さぬよう、力まず、しかし研ぎ澄ます。
2199 = "Để không bỏ sót chỉ thị của Hachiroku, để không bỏ qua bất kỳ biến động nhỏ nào, tôi thả lỏng, nhưng vẫn tập trung cao độ."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、十時方向に大きく迂回してください\n二時――右前方の岩の下は広く浅瀬です」
1813 = "「Ngài Soutetsu, xin hãy đi vòng rộng sang hướng mười giờ. Hướng hai giờ――dưới tảng đá phía trước bên phải là một vùng bãi cạn rộng lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1512 = "「嗯」" 
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「おっ、とっとー」
1470 = "「Ố, ồ ồ.」"
# monologue
# JP: 大きな岩をぐるりとかわせば、\n涼しい風がサアっと抜ける。
2486 = "Vòng qua một tảng đá lớn, một cơn gió mát lạnh lướt qua."
# monologue
# JP: それが雨霧を飛ばしたか、\n川のふち、目に見える緑の色がいくらか濃くなる。
2251 = "Có lẽ nó đã thổi bay lớp mưa mù, màu xanh của cây cối ven bờ sông trông có vẻ đậm đà hơn."
# 【凪】
# display as 凪
# JP: 「あ、釣り人ばい！　おーーーいっ！」
1494 = "「A, người câu cá kìa! Nàyyyyyy!」"
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「おーおー、手ぇ振り返してくれっぺか。\n嬢ちゃん、ここらじゃ何がつれるんかね」
1522 = "「Ồ ồ, vẫy tay lại với chúng ta kìa. Cô bé ơi, quanh đây câu được cá gì thế?」"
# 【凪】
# display as 凪
# JP: 「アユばい！　[しゃく]尺アユっていって、\nこぎゃんとおっきかとが釣れるとよー」
1825 = "「Cá Ayu á! Gọi là cá Ayu cỡ Shaku, câu được con to cỡ này luôn á~.」"
# monologue
# JP: （ぐらっ）
2550 = "（Lảo đảo）"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
1452 = "「Úi.」"
# monologue
# JP: 凪が恐らく櫂を離し、\n“こぎゃんと”と、両手をいっぱいに広げたのだろう。
2228 = "Chắc hẳn Nagi đã buông mái chèo ra, vừa nói “cỡ này” vừa dang rộng hai tay."
# monologue
# JP: あわてて竿を水に入れれば、思うより浅い底を突き、\n反動で、大きな飛沫があがってしまう。
2245 = "Tôi vội vàng cắm sào xuống nước, nhưng lại chạm đáy nông hơn dự tính, phản lực khiến bọt nước bắn lên tung tóe."
# monologue
# JP: （さばあっ！）
2541 = "（Ào ào!）"
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「うおっぷっ！？」
1466 = "「U oáp!?」"
# 【凪】
# display as 凪
# JP: 「ほおら！　こぎゃんとタイミングでやりよるばーい！」
1381 = "「Thấy chưa! Ổng toàn làm mấy trò bất ngờ cỡ này thôi á!」"
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「くぁー、こら参ったっぺー！」
1464 = "「Khà, bó tay thật luôn!」"
# monologue
# JP: 笑いを交えたほがらかな声。\n凪のフォローは、大きな仕事をしてくれた。
1969 = "Giọng nói vui vẻ xen lẫn tiếng cười. Sự hỗ trợ của Nagi đã làm được một việc lớn."
# monologue
# JP: 今の飛沫は、対応一つを間違えてたら、\nクレームになりかねないほどに、乗船客の服を濡らした。
2067 = "Bọt nước vừa rồi làm ướt sũng quần áo hành khách, nếu xử lý sai một li, rất có thể sẽ dẫn đến khiếu nại."
# 【凪】
# display as 凪
# JP: 「って――わっ！？」
1453 = "「Mà khoan――oái!?」"
# monologue
# JP: 凪の声。\nゆっくり、あがっていく手先。
2239 = "Giọng của Nagi.\nĐầu ngón tay từ từ đưa lên."
# monologue
# JP: 乗船客を見てしまっていた視線を僕も、\nあわてて前方へと向け直――っ！
2073 = "Tôi đang mải nhìn hành khách, cũng vội vàng hướng mắt về phía trước――!"
# 【双鉄】
# display as 雙鐵
# JP: 「これはっ！」
1771 = "「Đây là!」"
# 【凪】
# display as 凪
# JP: 「虹っ！　虹ばいっ！」
1584 = "「Cầu vồng! Cầu vồng kìa!」"
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「おあ……あ――こりゃあ見事な――」
1463 = "「Oa... a――thật là ngoạn mục――」"
# monologue
# JP: （カシャっ！　カシャカシャッ！！）
2537 = "（Tách! Tách tách!!）"
# monologue
# JP: 絶句で生まれた沈黙を、\nいくつものシャッター音が埋めていく。
2102 = "Sự im lặng do không thốt nên lời, được lấp đầy bởi vô số tiếng màn trập máy ảnh."
# monologue
# JP: ややあり、溜息のような声。
2484 = "Một lúc sau, một giọng nói vang lên như tiếng thở dài."
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「……はぁぁ。\n[おひとよ,2]御一夜じゃ、こげーな虹さ、よう見れっぺか？」
1087 = "「...Hàà. Ở Ohimitera, thường thấy cầu vồng thế này lắm hả?」"
# 【凪】
# display as 凪
# JP: 「無い、ばい。見るの初めてばい。\nこぎゃんと、丸ぅくかかった――虹」
1332 = "「Không có á. Lần đầu tiên em thấy luôn. Cầu vồng cong tròn vành vạnh――cỡ này á.」"
# monologue
# JP: 確かに、これほどのものは見たことがない。\n丸く――どこにも欠けひとつない、鮮やかな虹。
2347 = "Quả thực, tôi chưa từng thấy cái nào như thế này. Tròn trịa――không khuyết một góc nào, một cầu vồng rực rỡ."
# monologue
# JP: （いやっ）
2525 = "（Không được）"
# monologue
# JP: 見とれてしまえば危険度が増す。
2354 = "Nếu mải mê ngắm nhìn thì mức độ nguy hiểm sẽ tăng lên."
# monologue
# JP: 慌てないよう自分自身に言い聞かせ、\n水面へ静かに目を落とす。
2204 = "Tôi tự nhủ bản thân không được luống cuống, và lặng lẽ hạ tầm mắt xuống mặt nước."
# 【ハチロク】
# display as 八六
# JP: 「え？」
1461 = "「Hả?」"
# monologue
# JP: ほとんど同時、\nなぜかハチロクの顔が天へと向けられる。
2173 = "Gần như cùng lúc đó, không hiểu sao khuôn mặt của Hachiroku lại ngước lên trời."
# monologue
# JP: 虹の頂点より高く、\n空へ、真上へ視線を送る。
2134 = "Cao hơn cả đỉnh cầu vồng, cô ấy hướng ánh mắt lên bầu trời, ngay phía trên đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク」
1591 = "「Sao vậy, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、二時。空のではなく、時計の二時。\n[よど]淀みに舟を進めてください」
1815 = "「Ngài Soutetsu, hướng hai giờ. Không phải trên trời, mà là hướng hai giờ của đồng hồ. Xin hãy điều khiển thuyền vào vùng nước đọng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1512 = "「嗯」" 
# monologue
# JP: なるほど、そうか。\n淀みに進めば、船足は当然大いに鈍る。
2071 = "Ra vậy, hiểu rồi. Nếu đi vào vùng nước đọng, tốc độ thuyền đương nhiên sẽ chậm lại đáng kể."
# monologue
# JP: そうして虹を、\nじっくりと見てもらおうという腹なのだろう。
2132 = "Chắc hẳn cô ấy có ý định, để mọi người có thể thong thả ngắm nhìn cầu vồng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　今です！\n淀みを出、元の流れに戻ってください」
1812 = "「Ngài Soutetsu! Ngay bây giờ ạ! Hãy ra khỏi vùng nước đọng và quay lại dòng chảy ban đầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　もうかっ！？」
1367 = "「Cái gì! Nhanh vậy sao!?」"
# monologue
# JP: 頭の疑問をさておいて、\n体はすぐさま、ハチロクの指示に従っている。
2230 = "Gác lại những thắc mắc trong đầu, cơ thể tôi lập tức làm theo chỉ thị của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「みなさま、前方、虹の中央をご覧ください」
1448 = "「Thưa quý khách, xin hãy nhìn về phía trước, ngay giữa cầu vồng ạ.」"
# 【凪】
# display as 凪
# JP: 「へっ！？」
1471 = "「Hả!?」"
# monologue
# JP: 突然のハチロクによるアナウンスに、\n凪までがすっとんきょうな声を出す。
2408 = "Trước thông báo bất ngờ của Hachiroku, ngay cả Nagi cũng phải thốt lên kinh ngạc."
# 【ハチロク】
# display as 八六
# JP: 「朱色の鉄橋、\nクマ川第四[きょうりょう,1]橋梁をご覧いただけますでしょうか？」
1713 = "「Cây cầu sắt màu đỏ son, cầu số 4 bắc qua sông Kuma, quý khách có nhìn thấy không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！」
1477 = "「A!」"
# monologue
# JP: 僕の喉から、勝手に声が出てしまう。
2211 = "Giọng nói tự nhiên bật ra từ cổ họng tôi."
# monologue
# JP: というか、まさか――今の淀みでの時間調整――\nそして今朝、ポーレットがナビと話をしたのは――
2404 = "Mà khoan, không lẽ nào――việc điều chỉnh thời gian ở vùng nước đọng vừa rồi―― Và sáng nay, chuyện Paulette nói chuyện với Navi là――"
# monologue
# JP: （プォンっ！）
2539 = "（Tuuuuu!）"
# monologue
# JP: \x%lタイフォン;#00ffc040;タイフォン%l;#;の音。\nごとごとという\x%l列車;#00ffc040;列車%l;#;の響きも、川面の静寂をかき乱す。
81 = "Tiếng \\x%lタイフォン;#00ffc040;còi hơi%l;#;. Tiếng xình xịch của \\x%l列車;#00ffc040;đoàn tàu%l;#; vang vọng, phá vỡ sự tĩnh lặng của mặt sông."
# 【観光客Ａ】
# display as 遊客Ａ
# JP: 「おわぁぁぁ」
1462 = "「Oaaaaa」"
# 【観光客Ｂ】
# display as 遊客Ｂ
# JP: 「こりゃあ」
1770 = "「Trời ơi.」"
# monologue
# JP: （パシャっ！　パシャっ！　パシャっ！　パシャッ！）
2538 = "（Tách! Tách! Tách! Tách!）"
# monologue
# JP: 虹の橋。鉄の橋。いまだわずかにけぶる霧。\nその中央を、\x%lキハ07;#00ffc040;キハ07%l;#;が穏やかな速度でくぐりぬけてく。
2177 = "Cây cầu vồng. Cây cầu sắt. Làn sương mù vẫn còn lảng bảng. Ngay chính giữa, \\x%lキハ07;#00ffc040;KiHa 07%l;#; lướt qua với tốc độ êm ái."
# monologue
# JP: 絵本の中に紛れ込んでしまったかと思うほど――\nその光景は幻想的で、ごく単純に美しい。
2473 = "Cứ ngỡ như mình đã lạc vào trong một cuốn truyện tranh―― Khung cảnh ấy thật huyền ảo, và đẹp đẽ một cách thuần túy."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1827 = "「！」" 
# monologue
# JP: しかし、僕は見とれられない。\nあっという間に橋脚が来る。
1999 = "Nhưng mà, tôi không thể mải mê ngắm nhìn được. Trụ cầu sẽ lao đến trong nháy mắt."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。十一時。流れに舟を」
1811 = "「Ngài Soutetsu. Hướng mười một giờ. Đưa thuyền vào dòng chảy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている！」
1603 = "「Tôi biết rồi!」"
# monologue
# JP: （ごんっ！）
2534 = "（Cốp!）"
# monologue
# JP: 水棹を突いて、舳先から一気に泡立つ流れへ。
2216 = "Tôi cắm sào xuống nước, đưa mũi thuyền lao thẳng vào dòng chảy sủi bọt."
# monologue
# JP: 同時に、気合を腹に落として、グっと心身を引き締め直す。\nここから先は――
2092 = "Đồng thời, dồn khí lực xuống bụng, xốc lại tinh thần và thể xác. Từ đây trở đi là――"
# 【凪】
# display as 凪
# JP: 「おまたせばいっ！」
1537 = "「Mọi người đợi lâu rồi á!」"
# monologue
# JP: 凪にもスイッチが入ったようだ。\n櫂を強く漕ぎ、流れに乗るのを早めてくれる。
2041 = "Có vẻ như Nagi cũng đã bật công tắc rồi. Con bé chèo mạnh mái chèo, giúp thuyền nhanh chóng hòa vào dòng chảy."
# 【凪】
# display as 凪
# JP: 「ここから先こそクマ川たいっ！\n急流くだりの本番ばいっ！！」
1412 = "「Từ đây trở đi mới là sông Kuma nè! Phần chính của màn xuôi dòng nước xiết á!!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん凪ちゃん、見せて見せて」
1567 = "「Nagi, Nagi, cho mình xem với.」"
# 【凪】
# display as 凪
# JP: 「もちろんばい！\nふかみちゃんに見せたげたくて撮ったばい！」
1697 = "「Tất nhiên rồi nè! Mình chụp là để cho Fukami xem mà á!」"
# monologue
# JP: 凪の手にはとてもスマートな携帯端末。
2051 = "Trong tay Nagi là một thiết bị di động rất thông minh."
# monologue
# JP: 覗いたふかみが、みるみる頬をバラ色にする。\n風邪はどうやら、すっかり完治したようだ。
2323 = "Fukami nhìn vào, đôi má nhanh chóng ửng hồng. Có vẻ như bệnh cảm đã hoàn toàn khỏi hẳn rồi."
# 【ふかみ】
# display as 深美
# JP: 「素敵……なに、これ。ちょっと、ずるい。\nわたし、毎日川下りしてるのに……昨日だけとか」
1542 = "「Tuyệt quá... gì thế này. Hơi ăn gian đó. Mình ngày nào cũng đi thuyền xuôi dòng mà... lại chỉ có mỗi hôm qua là thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、それだ。\nああ、凪、よければ携帯を回してみんなに見せてくれ」
1608 = "「Vậy thì, về chuyện đó. À, Nagi, nếu được thì em chuyển điện thoại cho mọi người xem với nhé.」"
# 【凪】
# display as 凪
# JP: 「よかとよー」
1538 = "「Được á~」"
# monologue
# JP: 見るもの見るもの、みながそれぞれに歓声を上げる。\nあの日の団体客たちも、みな満面の笑顔だった。
2115 = "Bất cứ ai nhìn thấy đều cất lên tiếng reo hò. Những vị khách đoàn hôm đó, tất cả đều nở nụ cười rạng rỡ trên môi."
# monologue
# JP: これほどの大きなヒント、\n見逃すほどにのんきでは無い。
2478 = "Một gợi ý lớn đến nhường này, tôi không thảnh thơi đến mức bỏ qua nó đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「虹は純粋な偶然だが、川下り船の進行にあわせての、\n\x%l列車;#00ffc040;列車%l;#;の鉄橋通過。これは、素晴らしいアイディアだった」
1807 = "「Cầu vồng chỉ là sự trùng hợp ngẫu nhiên, nhưng việc để \\x%l列車;#00ffc040;đoàn tàu%l;#; chạy qua cầu sắt cùng lúc với thuyền xuôi dòng. Đây quả là một ý tưởng tuyệt vời.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの……わたし」
1787 = "「Dạ... em」"
# monologue
# JP: 称賛に、いまだに慣れてはくれないらしい。\nポーレットは頬を赤くし、うつむいてしまう。
2311 = "Có vẻ như cô ấy vẫn chưa quen với những lời khen ngợi. Paulette đỏ bừng mặt, cúi gầm xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「乗務もあるけど、船頭さんな双鉄くんも見てみたくて。\n――ほんとに、それだけだったんです」
1809 = "「Tuy cũng là vì nhiệm vụ, nhưng em cũng muốn xem anh Soutetsu chèo thuyền nữa. ――Thật sự, chỉ có vậy thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1827 = "「！」" 
# monologue
# JP: 思いもかけぬ発言に、一瞬、思考を止められる。\n嬉しい。嬉しい。嬉しい。嬉しい。
1972 = "Một phát ngôn không ngờ tới, khiến suy nghĩ của tôi bị đình trệ trong giây lát. Vui quá. Vui quá. Vui quá. Vui quá."
# monologue
# JP: その三文字に脳が塗りつぶされぬよう、\n半ば無理やり舌を動かし、言葉をつなぐ。
2226 = "Để não bộ không bị nhuộm kín bởi hai chữ đó, tôi nửa gượng ép uốn lưỡi, tiếp tục nói."
# 【双鉄】
# display as 雙鐵
# JP: 「理由はどうあれ、これだけの満足度を出すイベントを、\n観光振興につなげぬ法はないかと、僕は考えた」
1334 = "「Dù lý do là gì đi nữa, một sự kiện mang lại mức độ hài lòng nhường này, tôi nghĩ không có lý do gì lại không kết nối nó với việc xúc tiến du lịch.」"
# 【ハチロク】
# display as 八六
# JP: 「キハ[レイナナエス,2]07sも美しく可愛らしい車輌ですが、\n川下り船から見た時、[ハチロク,3]8620はより絵になるかと存じます」
1810 = "「KiHa 07S cũng là một phương tiện đẹp và đáng yêu, nhưng khi nhìn từ thuyền xuôi dòng, tôi tin rằng 8620 sẽ đẹp như một bức tranh hơn ạ.」"
# monologue
# JP: みなが頷く。\nポーレットも、れいなさえもが。
2112 = "Mọi người đều gật đầu.\nPaulette, và cả Reina cũng vậy."
# monologue
# JP: あの鉄橋を煙を吐いて駆け抜けていく\x%l8620;#00ffc040;8620%l;#;――\n水面から見上げる姿は、どれほど勇壮に映るだろう。
2420 = "\\x%l8620;#00ffc040;8620%l;#; nhả khói chạy băng qua cây cầu sắt đó―― Hình ảnh ngước nhìn từ mặt nước sẽ tráng lệ đến nhường nào chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「川下りと鉄道との連携。\nこれに、マイントレジャーも絡めていきたい」
1804 = "「Sự liên kết giữa thuyền xuôi dòng và đường sắt. Tôi muốn kết hợp cả Mine Treasure vào việc này nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「絡みたい！　です」
1598 = "「Em muốn kết hợp! Ạ.」"
# monologue
# JP: ふかみが体を乗り出してくる。
2325 = "Fukami rướn người tới trước."
# monologue
# JP: この反応――これを御一夜全市からもしも引き出せたなら、\n観光振興は必ず、成せる。
2424 = "Phản ứng này――nếu có thể khơi gợi được điều này từ toàn thành phố Ohimitera, thì việc chấn hưng du lịch chắc chắn sẽ thành công."
# 【双鉄】
# display as 雙鐵
# JP: 「術仙炭鉱廃駅と鉱山鉄道とを復活させ、\nまずは、その区間を\x%lキハ07;#00ffc040;キハ07%l;#;に案内してもらう」
1744 = "「Phục sinh nhà ga bỏ hoang mỏ than Jussen và tuyến đường sắt mỏ, trước tiên, hãy để \\x%lキハ07;#00ffc040;KiHa 07%l;#; dẫn đường trong khu vực đó.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、お任せされちゃいますよぉ」
1414 = "「Reina, xin nhận nhiệm vụ đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「廃宿舎群で謎解きをしてもらい、しかるのち、\nトロッコ移動で坑道入口へ。採炭体験をしてもらう」
1389 = "「Cho họ giải đố ở khu ký túc xá bỏ hoang, sau đó, di chuyển bằng xe goòng đến lối vào hầm mỏ. Cho họ trải nghiệm khai thác than.」"
# monologue
# JP: ここまでは、概ね説明してきたことだ。\n誰からも疑問の声は出ない。
2474 = "Đến đây thì nhìn chung tôi đã giải thích xong. Không có ai lên tiếng thắc mắc gì."
# 【双鉄】
# display as 雙鐵
# JP: 「掘り返した石炭は宝箱につめ、\x%lキハ07;#00ffc040;キハ07%l;#;には\nそのまま、湯医駅へ向かってもらう」
1628 = "「Than đá đào được sẽ nhét vào rương báu, và để \\x%lキハ07;#00ffc040;KiHa 07%l;#; cứ thế hướng thẳng đến ga Yui.」"
# 【れいな】
# display as 玲奈
# JP: 「御一夜に戻るんじゃないんですかぁ？」
1331 = "「Không phải quay lại Ohimitera sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり、\nそこからは川下りで御一夜までを移動してもらう」
1670 = "「Đúng vậy, từ đó sẽ cho họ đi thuyền xuôi dòng về Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、強制だと……遠回りでお金取られてるって\n印象もたれちゃうんじゃ――」
1376 = "「Nhưng mà, nếu bắt buộc thì... sẽ gây ấn tượng là cố tình đi đường vòng để lấy tiền đó――」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1474 = "「Hừm」"
# monologue
# JP: 日々姫の指摘はもっともだ。
2272 = "Hibiki nói rất có lý."
# monologue
# JP: 炭鉱には興味があるが、\n川下りにはまるで興味が無い方も――
1985 = "Cũng có những người quan tâm đến mỏ than, nhưng lại chẳng hứng thú gì với việc đi thuyền xuôi dòng――"
# 【凪】
# display as 凪
# JP: 「戻りの線路が使えんことにすればええばい！\n例えば、落盤が起きたとかなんとかで」
1443 = "「Cứ coi như là đường ray chiều về không dùng được là xong á! Ví dụ như, xảy ra sập hầm hay gì đó nè.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そっか！　全部がひとつのアトラクション――\nストーリー仕立てにしちゃえばいいんだ」
1492 = "「A, đúng rồi! Tất cả gộp chung thành một trò chơi―― Cứ dựng thành một câu chuyện là được mà.」"
# monologue
# JP: 凪の言葉にヒントを得たのか、\n日々姫はスケッチブックを広げ――
2252 = "Có lẽ lấy được gợi ý từ lời của Nagi, Hibiki mở cuốn sổ phác thảo ra――"
# monologue
# JP: そこで、ぴたりと止まってしまう。
2339 = "Đến đó, con bé dừng bặt lại."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。なんかストーリー」
1802 = "「Anh hai. Nghĩ ra câu chuyện gì đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理を言うな。僕は現実しか見ん男だぞ」
1407 = "「Đừng làm khó anh. Anh là kiểu đàn ông chỉ nhìn vào thực tế thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「亡霊……廃宿舎群や炭鉱に、\n亡霊が出ることにしたらどうでしょうか？」
1362 = "「Vong linh... giả sử có vong linh xuất hiện ở khu ký túc xá bỏ hoang hay mỏ than thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「亡霊？」
1365 = "「Vong linh?」"
# 【ポーレット】
# display as 波萊特
# JP: 「炭鉱夫さんたちの亡霊です、隠し坑道から、\n大切な石炭が盗まれたと思って、怒って。暴れる」
1630 = "「Là vong linh của những người thợ mỏ ạ. Họ tưởng rằng than đá quý giá trong hầm mỏ bí mật đã bị đánh cắp, nên tức giận. Và nổi điên lên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「暴れて線路にまで溢れだして――\n\x%lキハ07;#00ffc040;キハ07%l;#;は湯医に退避するしかなくなるのか？」
1363 = "「Họ nổi điên và tràn cả ra đường ray―― Nên \\x%lキハ07;#00ffc040;KiHa 07%l;#; không còn cách nào khác đành phải sơ tán đến Yui sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです、そんな感じで」
1656 = "「Đúng vậy ạ, kiểu như thế.」"
# 【真闇】
# display as 真闇
# JP: 「亡霊、はマズかとよ」
1610 = "「Vong linh, thì không ổn đâu á.」"
# monologue
# JP: 静かに、だけど確実に、\n僕らの熱気に、真闇姉はあえての冷水を浴びせる。
2364 = "Một cách tĩnh lặng, nhưng vô cùng dứt khoát, chị Mayami cố tình dội một gáo nước lạnh vào sự nhiệt tình của chúng tôi."
# monologue
# JP: 遊びに夢中になってる子供に、\n『帰る時間』と、指摘をしてくれるかのように。
2167 = "Giống như đang nhắc nhở đám trẻ mải mê chơi đùa rằng 『Đến giờ về nhà rồi』 vậy."
# 【真闇】
# display as 真闇
# JP: 「……炭鉱に苦か想い出をもっとる層を、\nいたずらに刺激することになるけんねぇ」
1098 = "「...Sẽ vô tình kích động đến những người có những ký ức đau buồn về mỏ than đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それは確かに」
1483 = "「À... điều đó cũng đúng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「言われてみればそうですね。\nなら、妖精ってことでどうでしょう？」
1735 = "「Nghe chị nói mới thấy đúng thật. Vậy, đổi thành tinh linh thì sao ạ?」"
# monologue
# JP: あっさりと、\nポーレットはイメージを180度転換――
2315 = "Rất nhẹ nhàng, Paulette xoay chuyển hình tượng 180 độ――"
# 【ふかみ】
# display as 深美
# JP: 「それ！　素敵。です。\n鉱山妖精、とってもいい。です！」
1768 = "「Cái đó! Tuyệt lắm. Ạ. Tinh linh mỏ quặng, nghe rất hay. Ạ!」"
# monologue
# JP: ――した途端、ふかみがグイと食いついてくる。
1068 = "――Ngay lập tức, Fukami chộp lấy ý tưởng đó."
# 【ふかみ】
# display as 深美
# JP: 「鉱山妖精は水を渡れないから、\n川下り船、御一夜までの脱出のお役にたつ。です」
1705 = "「Tinh linh mỏ quặng không thể qua nước được, nên thuyền xuôi dòng sẽ có ích cho việc trốn thoát đến Ohimitera. Ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「川岸に鉱山妖精が押し寄せてくると面白いかも。\n『ボクたちの石炭をどうするつもりだー』って」
1743 = "「Sẽ thú vị lắm nếu tinh linh mỏ quặng kéo đến bờ sông. Kiểu như 『Các người định làm gì với than đá của chúng ta hả~』」"
# 【ふかみ】
# display as 深美
# JP: 「『ズルいぞー！　もどってこーい！』とか言わせると、\n川に入れないこと、きっと誰にでもわかる。です」
1442 = "「Cho chúng nói 『Ăn gian quá! Quay lại đây!』, thì chắc chắn ai cũng sẽ hiểu là chúng không thể xuống sông. Ạ.」"
# monologue
# JP: ポーレットとふかみが呼応している。
2314 = "Paulette và Fukami đang tung hứng nhịp nhàng."
# monologue
# JP: 空想好きと、読書好き。\n共鳴しあうことにより、アイディアが産まれているようだ。
1970 = "Một người thích mộng mơ, và một người thích đọc sách. Sự cộng hưởng giữa họ dường như đang sản sinh ra những ý tưởng."
# 【ポーレット】
# display as 波萊特
# JP: 「川下りの途中で、頭上の鉄橋をＳＬが駆け抜けていく。\nだけど、それは幻。もう走れないはずの\x%l8620;#00ffc040;8620%l;#;」
1532 = "「Giữa chừng chuyến đi xuôi dòng, một chiếc SL chạy lướt qua cây cầu sắt trên đầu. Nhưng, đó chỉ là ảo ảnh. Một chiếc \\x%l8620;#00ffc040;8620%l;#; lẽ ra không thể chạy được nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「走れないのは、もちろん、石炭が無いから。です」
1344 = "「Không thể chạy được, tất nhiên là vì không có than đá. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど！　『掘った石炭を8620にあげる』という\nオプションに、それならば大きなドラマが加わるわけか」
1418 = "「Ra vậy! Lựa chọn 『Tặng than đá vừa đào được cho 8620』 nếu thế thì sẽ thêm phần kịch tính lớn đây.」"
# monologue
# JP: こくりと、大きくポーレットが頷く。
2317 = "Paulette gật đầu thật mạnh."
# monologue
# JP: 日々姫の手はいつからだろう、\n猛然とスケッチを描きつらねている。
2234 = "Không biết từ lúc nào, tay của Hibiki đã phác họa liên tục một cách điên cuồng."
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜に到着できたら、そこで一旦ツアーはおしまい。\nそのあとは、双鉄くんが言ったとおりにオプションで」
1707 = "「Khi đến được Ohimitera, chuyến tham quan sẽ tạm thời kết thúc ở đó. Sau đó, sẽ là các lựa chọn như anh Soutetsu đã nói.」"
# monologue
# JP: 無論、石炭をおみやげにして、\nそのまま自由行動を取ってくれてもいい。
2481 = "Tất nhiên, khách có thể giữ than đá làm quà lưu niệm, và cứ thế tự do hoạt động cũng được."
# monologue
# JP: 掘った石炭をアクセサリーに加工するなどの案内もして、\n職人さんたちのもとへも誘導するようにしてもいいだろう。
1983 = "Chúng ta cũng có thể hướng dẫn họ gia công than đá vừa đào thành đồ trang sức, và dẫn họ đến chỗ các nghệ nhân."
# 【ポーレット】
# display as 波萊特
# JP: 「舟から見た、『幻のＳＬ』を気にかけてくれるお客様は、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;に案内し、\x%l8620;#00ffc040;8620%l;#;と出会ってもらいます」
1546 = "「Những vị khách quan tâm đến 『SL ảo ảnh』 nhìn thấy từ thuyền, chúng ta sẽ hướng dẫn họ đến \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; và cho họ gặp \\x%l8620;#00ffc040;8620%l;#;.」"
# 【ふかみ】
# display as 深美
# JP: 「石炭をあげて、生き返ってくれる\x%l8620;#00ffc040;8620%l;#;に――\n乗れたら、きっとすごくいい、って思う。です」
1548 = "「Nếu có thể lên chuyến tàu \\x%l8620;#00ffc040;8620%l;#; đã sống lại nhờ được tặng than đá―― thì chắc chắn sẽ tuyệt lắm, em nghĩ vậy. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を走らせて、御一夜――湯医を往復するのか？」
1742 = "「Cho \\x%l8620;#00ffc040;8620%l;#; chạy khứ hồi giữa Ohimitera――và Yui sao?」"
# monologue
# JP: にこりと、笑う。
2312 = "Paulette mỉm cười."
# monologue
# JP: 僕の理解を。通じあったと。\n――ポーレットは喜んでくれている。
2122 = "Sự thấu hiểu của tôi. Rằng chúng tôi đã hiểu ý nhau. ――Paulette đang cảm thấy rất vui vì điều đó."
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。妖精たちにその姿を見せて、\n石炭は、きちんと使われているって安心させてあげる」
1642 = "「Đúng vậy ạ. Cho các tinh linh thấy hình ảnh đó, để chúng yên tâm rằng than đá đang được sử dụng đúng cách.」"
# 【ふかみ】
# display as 深美
# JP: 「それで、鉱山妖精は喜んでくれて、\n鉱山に笑顔で帰っていく――と、すごくいい。です」
1554 = "「Thế là, các tinh linh mỏ quặng sẽ rất vui, và quay trở về mỏ với nụ cười trên môi――thì tuyệt lắm. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、エキストラを頼む感じになるのかな？」
1773 = "「Nếu vậy thì, có cần phải nhờ đến diễn viên quần chúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、双鉄くん。エキストラじゃなくてキャスト。\nマイントレジャーのキャストとして募集をかけましょう」
1336 = "「Không đâu, anh Soutetsu. Không phải diễn viên quần chúng mà là diễn viên cố định. Chúng ta hãy tuyển dụng họ làm diễn viên cho Mine Treasure luôn đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その方が、確かに人は集まりそうか？」
1497 = "「À, đúng là làm vậy sẽ thu hút được nhiều người hơn nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。職人さんたちや業者さんたちと無関係の、\n『ごく普通の若者たち』に、きっと集まってもらえます」
1652 = "「Vâng. Chắc chắn chúng ta sẽ thu hút được những 『người trẻ tuổi hoàn toàn bình thường』, không liên quan gì đến các nghệ nhân hay nhà thầu đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1473 = "「Ồ!」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど。妖精でしたら――\n老人よりも、若者の方が、より雰囲気を出せますか」
1417 = "「Ra vậy. Nếu là tinh linh thì―― So với người già, người trẻ sẽ tạo ra bầu không khí phù hợp hơn nhỉ.」"
# monologue
# JP: そのとおり。\nだが、それだけではない。
2451 = "Đúng là vậy.\nNhưng, không chỉ có thế."
# monologue
# JP: （若者層の雇用が、新たに生まれるのだ）
2547 = "（Việc làm cho giới trẻ, sẽ được tạo ra mới.）"
# monologue
# JP: その意味は、決して小さなものではない。
2475 = "Ý nghĩa của việc này, tuyệt đối không hề nhỏ."
# monologue
# JP: 『マイントレジャーという仕事場』が、\n御一夜市民、誰にも受け入れられるのならば。
2155 = "Nếu 『Nơi làm việc mang tên Mine Treasure』, được tất cả người dân Ohimitera chấp nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「……線から面、だな」
1095 = "「...Từ điểm nối thành đường, rồi mở rộng thành mặt nhỉ.」"
# monologue
# JP: 初めは、ハチロクという小さな小さな一点だった。
2459 = "Ban đầu, chỉ là một điểm vô cùng nhỏ bé mang tên Hachiroku."
# monologue
# JP: それが多くの出会いによって、\nレールに、線路に広がった。
2407 = "Thông qua nhiều cuộc gặp gỡ, điểm ấy đã vươn dài thành đường ray, thành tuyến đường sắt."
# monologue
# JP: （そしてポーレットの目が――市長という政治家の目が、\n線を面へと――大きく広げてくれたのだ）
2553 = "（Và đôi mắt của Paulette――đôi mắt của một chính trị gia mang danh thị trưởng, đã mở rộng từ đường thành mặt――một cách mạnh mẽ.）"
# 【真闇】
# display as 真闇
# JP: 「けどねぇ」
1447 = "「Nhưng mà nha~」"
# monologue
# JP: ふわりと声が挟まってくる。
1971 = "Một giọng nói nhẹ nhàng chen vào."
# monologue
# JP: 真闇姉の、とても柔らかで静かな声が、\n大人の役目を果たしてくれる。
2370 = "Giọng nói vô cùng mềm mỏng và tĩnh lặng của chị Mayami, đã làm tròn bổn phận của một người lớn."
# 【真闇】
# display as 真闇
# JP: 「まだいくらか、\nなんとかしなきゃいけんことがありよるよねぇ」
1776 = "「Vẫn còn vài chuyện, chúng ta phải giải quyết cho xong mới được á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いくらか、とは」
1398 = "「Vài chuyện, là gì vậy chị?」"
# 【真闇】
# display as 真闇
# JP: 「一つ目は、\x%l8620;#00ffc040;8620%l;#;の\x%l客車;#00ffc040;客車%l;#;のこと」
1822 = "「Thứ nhất là, chuyện về \\x%l客車;#00ffc040;toa hành khách%l;#; của \\x%l8620;#00ffc040;8620%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、わたしに心当たりが――」
1800 = "「Chuyện đó, em có manh mối――」"
# monologue
# JP: 言いかけ、ふっと、ポーレットの目は凪へ向く。
2450 = "Đang nói dở, ánh mắt Paulette chợt hướng về phía Nagi."
# 【ポーレット】
# display as 波萊特
# JP: 「さっきの写真、データもらえる？\nきっと、役に立つと思うから」
1413 = "「Bức ảnh lúc nãy, cho chị xin file được không? Chắc chắn nó sẽ có ích đấy.」"
# 【凪】
# display as 凪
# JP: 「良かばい、アドレスくれたら送っとくばい」
1539 = "「Được á, chị cho địa chỉ đi rồi em gửi qua cho nè.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。よろしくね」
1740 = "「Cảm ơn em. Nhờ em nhé.」"
# 【真闇】
# display as 真闇
# JP: 「うふふ。\nなんとかなるならそれは良し、よね」
1458 = "「Ufufu. Nếu có thể giải quyết được thì tốt quá rồi nhỉ.」"
# monologue
# JP: 優しく笑い。\n真闇姉の目はじっとハチロクへ注がれる。
2366 = "Mỉm cười dịu dàng. Ánh mắt chị Mayami chăm chú hướng về phía Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「わたくしに、何か？」
1662 = "「Chị có chuyện gì với tôi sao?」"
# 【真闇】
# display as 真闇
# JP: 「\x%l8620;#00ffc040;8620%l;#;の運転は、\nハチロクちゃんと双ちゃんが担当すると？」
1077 = "「Việc lái \\x%l8620;#00ffc040;8620%l;#;, sẽ do Hachiroku và Sou-chan đảm nhận sao?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです」
1696 = "「Tất nhiên rồi ạ.」"
# 【真闇】
# display as 真闇
# JP: 「なら」
1792 = "「Vậy thì.」"
# 【凪】
# display as 凪
# JP: 「あああ！　そうばいっ！\nタイミング合わせ、どぎゃんすっとよ」
1481 = "「Aaa! Đúng rồi á! Căn thời gian thì phải làm sao đây nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬっ」
# 1474 = "「唔」" 
# monologue
# JP: ナビを使って上空から――と一瞬思うが、\nその場合、ナビがフォローするのは僕が乗る\x%l8620;#00ffc040;8620%l;#;だ。
2246 = "Dùng Navi từ trên không――tôi thoáng nghĩ vậy, nhưng trong trường hợp đó, Navi sẽ hỗ trợ cho chiếc \\x%l8620;#00ffc040;8620%l;#; mà tôi đang lái."
# monologue
# JP: かといって、僕がいつでも川下り船に\n乗るというのも……
2405 = "Nhưng nếu bảo tôi lúc nào cũng phải ngồi trên thuyền xuôi dòng thì..."
# 【ポーレット】
# display as 波萊特
# JP: 「えと、それも解決できます。\nれいなが、川下り船に乗れば、それだけで」
1455 = "「À, chuyện đó cũng giải quyết được ạ. Chỉ cần để Reina lên thuyền xuôi dòng là xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか――\n\x%lキハ07;#00ffc040;キハ07%l;#;は、ポーレット一人でも動かせるものな」
1490 = "「A, đúng rồi nhỉ―― \\x%lキハ07;#00ffc040;KiHa 07%l;#; thì một mình Paulette cũng có thể điều khiển được mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。御一夜までの戻りは無人の回送車輌になるから、\n安全面のリスクも極限までさげられますし」
1654 = "「Vâng ạ. Chuyến về Ohimitera sẽ là chuyến xe trống không có khách, nên rủi ro về mặt an toàn cũng sẽ được giảm xuống mức tối đa.」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1512 = "「嗯」" 
# monologue
# JP: 笑う。\n真闇姉が、いつもとまったく違った笑顔で。
2368 = "Mỉm cười. Chị Mayami cười, một nụ cười hoàn toàn khác với thường ngày."
# monologue
# JP: 満足そうに――\n同時に、どこか淋しげに。
2143 = "Trông có vẻ hài lòng―― Đồng thời, cũng có chút gì đó cô đơn."
# 【真闇】
# display as 真闇
# JP: 「ポーちゃんに任せて、\nどうやら安心できそうやねぇ」
1700 = "「Giao phó cho Po-chan, có vẻ chị có thể yên tâm được rồi nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1476 = "「A.」"
# monologue
# JP: 驚いたように目が丸くなる。
2318 = "Cô ấy tròn mắt ngạc nhiên."
# monologue
# JP: その目のままにポーレットは、\nまっすぐまっすぐ、真闇姉へと視線を返す。
2124 = "Vẫn với ánh mắt đó, Paulette nhìn thẳng, nhìn thẳng đáp lại ánh mắt của chị Mayami."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――頑張ります。\n安心して、任せていただけるように」
1597 = "「Em――sẽ cố gắng ạ. Để chị có thể yên tâm giao phó cho em.」"
