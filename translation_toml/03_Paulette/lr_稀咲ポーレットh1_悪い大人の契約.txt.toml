2306 = "Bằng động tác thuần thục, Kisaki kéo quần lót của tôi xuống và lấy dương vật đang cương cứng ra.\nCô ấy dùng bàn tay mềm mại, không chút sức lực sục sạo lên xuống một cách vô cùng chậm rãi."
# 【稀咲】
# display as 稀咲
