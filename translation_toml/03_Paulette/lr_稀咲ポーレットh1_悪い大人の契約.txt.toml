2507 = "（Su ryu! Zu ryu! Ryu bu! Pu ryu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～っ！！」
1908 = "「～～～～～!!」"
# 【稀咲】
# display as 稀咲
# JP: 「ね？　ポーレット、\nボクに、正直に聞かせてほしい」
1831 = "「Nè? Paulette,\nhãy nói thật cho tôi biết đi.」"
# monologue
# JP: （しこっ！　しゅこっ！　しゅっ！　しゅこっ！）
2586 = "（Sục! Sục! Shu! Sục!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！！！！」
1592 = "「Ua!!!!」"
# monologue
# JP: 急に来た、縦全体の、稀咲の本気のストローク。\nいくらなんでもこの状況で射精はできず歯を食いしばる。
2330 = "Kisaki đột nhiên dùng sức vuốt dọc toàn bộ thân dương vật.\nDù thế nào thì trong tình huống này tôi cũng không thể xuất tinh được, đành nghiến răng chịu đựng."
# 【稀咲】
# display as 稀咲
# JP: 「こんな正直な双鉄を見て。ペニスのたてる水音を聞いて。\n雄の匂いを胸いっぱいに吸い込んで―ポーレットは」
1802 = "「Nhìn dáng vẻ thành thật này của anh Soutetsu đi. Nghe tiếng nước nhóp nhép từ dương vật đi.\nHít đầy lồng ngực mùi hương của giống đực đi——Paulette, cô」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、は」
1671 = "「Em, thì.」"
# 【稀咲】
# display as 稀咲
# JP: 「れるううううううううううううっ―ぺちゅうう！」
1822 = "「Rê ru uu uu uu uu uu uu uu uu uu uu uu uu——pê chuu u!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あああああっ」
1563 = "「A a a a a」"
# monologue
# JP: このタイミングでべっとり乳首を舐めしゃぶられる。\n乳首から来る快感が、腰を通って勃起に直接突き刺さる。
2378 = "Ngay lúc này, cô ấy lại liếm mút nhũ hoa của tôi.\nKhoái cảm từ nhũ hoa truyền qua eo, đâm thẳng vào dương vật đang cương cứng."
# 【稀咲】
# display as 稀咲
# JP: 「ね？　何をしたい？　思ったままを、感じるままを。\nボクに、正直に、どうか聞かせて？」
1830 = "「Nè? Cô muốn làm gì? Cứ nói ra những gì cô nghĩ, những gì cô cảm nhận.\nHãy nói thật cho tôi biết đi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし―わたしは―双鉄くん―双鉄くんの\nおちんちんを、乳首を、稀咲がいじめてるのを見て」
1668 = "「Em——em muốn——nhìn Kisaki bắt nạt dương vật,\nvà nhũ hoa của anh Soutetsu——của anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1892 = "「！」" 
# monologue
# JP: いじめてる、とポーレットは今確かにいった。\nゆえに、感じる。ポーレットも僕の同類なのだと。
2228 = "Bắt nạt, Paulette vừa mới nói vậy.\nDo đó, tôi cảm nhận được. Paulette cũng là đồng loại của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんのおちんちん、かわいいかわいいって、\nいいこいいこって、わたしもできたら嬉しいなって」
1683 = "「Em cũng muốn được khen dương vật của anh Soutetsu thật dễ thương,\nđược vuốt ve nó như một đứa bé ngoan.」"
# monologue
# JP: （しゅこっ！！！！）
2588 = "（Sục!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「あうっ」
1566 = "「A u」"
# 【稀咲】
# display as 稀咲
# JP: 「だって？　それで、双鉄はどう思うの？\n何を望むの？　今のポーレットの言葉を聞いて」
1815 = "「Nghe thấy chưa? Vậy anh Soutetsu nghĩ sao?\nAnh muốn thế nào? Sau khi nghe những lời vừa rồi của Paulette.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕―は、僕、はっ」
1666 = "「Anh——thì, anh, thì.」"
# monologue
# JP: ポーレットの視線をひしひし感じる。\nその呼吸音を聞いているだけで、僕の息まで苦しくなる。
2170 = "Tôi cảm nhận rõ rệt ánh mắt của Paulette.\nChỉ nghe tiếng thở của cô ấy thôi cũng đủ khiến tôi khó thở theo."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の望みは、いつでも同じで変わらない。\n稀咲を傷つけなるようなことだけは」
1708 = "「Mong muốn của anh, lúc nào cũng vậy, không hề thay đổi.\nĐó là không bao giờ làm tổn thương Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクはね？　双鉄」
1864 = "「Em thì sao? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1561 = "「啊」" 
# monologue
# JP: 稀咲の手指の動きが止まる。\nその目は静かに、まっすぐ僕へと注がれる。
2301 = "Các ngón tay của Kisaki dừng lại.\nĐôi mắt ấy lặng lẽ, nhìn thẳng vào tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクに責任を押し付けるようにもとれる言動を、\nボクの大好きな双鉄にされるのは少し、悲しいかな」
1800 = "「Thấy người em yêu thương nhất là anh Soutetsu lại có những lời nói và hành động\nnhư muốn đùn đẩy trách nhiệm cho em, em thấy hơi buồn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1894 = "「!!!!」"
# monologue
# JP: 突かれて初めて図星と気づき、ひたすら恥じ入り考える。\n稀咲の望みを、僕の望みを―自分のこととし、懸命に。
2356 = "Bị vạch trần tôi mới nhận ra mình đã bị nói trúng tim đen, tôi vô cùng xấu hổ và suy ngẫm.\nBiến mong muốn của Kisaki, mong muốn của tôi——thành việc của chính mình, một cách nghiêm túc."
# monologue
# JP: （稀咲が、これを最善手と考えたのだ。ならば僕は―\nポーレットを拒み得ないし……稀咲が、許している以上）
2617 = "（Kisaki đã coi đây là phương án tốt nhất. Vậy thì tôi——\nkhông thể từ chối Paulette……một khi Kisaki đã cho phép.）"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は稀咲を愛しているし、稀咲とずっと一緒にいたい。\nが、今は。ポーレットへの性欲を抱かずにもいられない」
1694 = "「Anh yêu Kisaki, và muốn ở bên Kisaki mãi mãi.\nNhưng hiện tại, anh cũng không thể kìm nén được dục vọng với Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
# 1574 = "「啊！」" 
# monologue
# JP: 最初のひとこと。\nそれが口から出てしまえばもう、言葉は自然と流れていく。
2054 = "Lời đầu tiên.\nMột khi đã nói ra được, những lời tiếp theo cứ thế tự nhiên tuôn trào."
# 【双鉄】
# display as 雙鐵
# JP: 「この状況をお膳立てしたのが稀咲だということも、\n僕の欲望に言い訳を与えている。流されてもいいか、と」
1415 = "「Việc Kisaki sắp đặt tình huống này\ncũng là một cái cớ cho dục vọng của anh. Rằng anh cứ thuận theo cũng được.」"
# 【稀咲】
# display as 稀咲
# JP: 「……」
985 = "「……」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、流されることで稀咲に責任を負わせたくもない。\nならば僕は、僕自身の意思で、こうと望もう」
1379 = "「Nhưng, anh không muốn đổ trách nhiệm cho Kisaki vì anh đã thuận theo.\nVậy nên, bằng chính ý chí của mình, anh mong muốn điều này.」"
# monologue
# JP: 正解が何かわからない。\nならば僕は……なるべく誰も傷つけぬことを選択したい。
2140 = "Tôi không biết đâu là câu trả lời đúng.\nVậy thì tôi……muốn chọn cách không làm tổn thương ai hết mức có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はポーレットともセックスしたい。その上できっと、\n稀咲とより深く親密で強固な関係を築いていきたい」
1681 = "「Anh cũng muốn làm tình với Paulette. Và hơn thế nữa,\nanh muốn xây dựng một mối quan hệ sâu sắc, thân mật và bền chặt hơn với Kisaki.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1574 = "「啊！」" 
# 【稀咲】
# display as 稀咲
# JP: 「双鉄の発言の方向性は、ボクの希望とも合致している。\nボクも双鉄を最優先で、ポーレットともセックスしたい」
1879 = "「Định hướng trong lời nói của anh Soutetsu cũng phù hợp với nguyện vọng của em.\nEm cũng đặt anh Soutetsu lên hàng đầu, và muốn làm tình với cả Paulette nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！　―（ごくっ）」
1596 = "「!! ——（Ực）」"
# monologue
# JP: なるほど。ようやく稀咲の解が見えた。\nポーレットの無意識の性欲が、露見するようになっていた。
2042 = "Ra là vậy. Cuối cùng tôi cũng hiểu được cách giải quyết của Kisaki.\nDục vọng vô thức của Paulette đã bắt đầu bộc lộ."
# monologue
# JP: （その状況は言うまでもなく危険だし、浮気・不倫を―\n誰にとっても不幸な事態を偶発的に招きかねない）
2612 = "（Tình huống đó hiển nhiên là rất nguy hiểm, có thể dẫn đến ngoại tình, lừa dối——\nmột sự cố đáng tiếc cho tất cả mọi người một cách ngẫu nhiên.）"
# monologue
# JP: ゆえに、稀咲は選択肢を作った。僕ら夫婦がともに、\n同時にポーレットとセックスすれば、それは、プレイだ。
2063 = "Do đó, Kisaki đã tạo ra một lựa chọn. Nếu vợ chồng tôi cùng lúc\nlàm tình với Paulette, thì đó chỉ là một trò chơi tình dục."
# 【稀咲】
# display as 稀咲
# JP: 「だから、この先ボクたちがどうするかを決めるのは。\nポーレット、キミが何を」
1716 = "「Thế nên, việc quyết định chúng ta sẽ làm gì tiếp theo.\nLà phụ thuộc vào cô, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも強く望みます。わたしは―\n双鉄くんと、稀咲と。ふたりとセックス、したいです」
1678 = "「Em cũng rất khao khát điều đó. Em——\nmuốn làm tình với cả anh Soutetsu và Kisaki. Cùng với cả hai người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1892 = "「！」" 
# monologue
# JP: 照れもせず、ワタつきもせず。\nポーレットの明瞭な宣告からは、強い意思が伝わってくる。
2083 = "Không chút ngại ngùng, không chút do dự.\nTừ lời tuyên bố rành mạch của Paulette, tôi cảm nhận được một ý chí mạnh mẽ."
# 【稀咲】
# display as 稀咲
# JP: 「関係は誰にも秘密になるよ？　ハチロクやれいなにさえ。\nそれはきっと、また別の精神的な重荷に」
1688 = "「Mối quan hệ này sẽ là bí mật với tất cả mọi người đấy? Ngay cả với Hachiroku hay Reina.\nĐiều đó chắc chắn sẽ trở thành một gánh nặng tinh thần khác.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは平気、稀咲。\nれいなはだって、わたしの妹か、娘みたいな存在だから」
1865 = "「Chuyện đó không sao đâu, Kisaki.\nBởi vì Reina đối với em giống như em gái, hay con gái vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。妹や娘に自分のセックスのことを、\n普通はなかなか、つまびらかにはしないものか」
1698 = "「Ra là vậy. Chuyện giường chiếu của bản thân,\nbình thường đâu dễ gì kể lể chi tiết cho em gái hay con gái nghe nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それに、ね？　稀咲。わたしだって―いい年をして\nまだ処女だけど……だけど女だから、わかるの、そこは」
1426 = "「Hơn nữa nhé? Kisaki. Dù em——đã đến tuổi này\nmà vẫn còn là trinh nữ……nhưng em cũng là phụ nữ mà, em hiểu chứ.」"
# monologue
# JP: （びくんっ！）
2625 = "（Giật thót!）"
# 【稀咲】
# display as 稀咲
# JP: 「おや」
1525 = "「Ồ.」"
# monologue
# JP: 処女という不意打ちの宣告に、勃起が反応してしまう。\nポーレットは気づいていないようだが、稀咲には―
2100 = "Lời tuyên bố vẫn còn trinh bất ngờ ấy khiến dương vật của tôi phản ứng.\nCó vẻ Paulette không nhận ra, nhưng với Kisaki thì——"
# monologue
# JP: （いや、しかし仕方なかろう。これだけのいい女が……\nこの年になるまで誰にも抱かれず成熟してきたとか）
2494 = "（Không, nhưng cũng hết cách thôi. Một người phụ nữ tuyệt vời thế này……\nmà đến tuổi này vẫn chưa từng được ai ôm ấp, cứ thế trưởng thành sao.）"
# monologue
# JP: 女の肉の貪欲さを、僕は稀咲に教えてもらった。\nゆえに、わかる。それがどれほど奇跡的なことっ！！？
2303 = "Sự tham lam của xác thịt phụ nữ, tôi đã được Kisaki dạy cho.\nVì vậy, tôi hiểu. Điều đó thật sự là một phép màu kỳ diệu đến nhường nào!!?"
# monologue
# JP: （しこっ―しゅこっ―しゅるっ―くにっ）
2581 = "（Sục——sục——trượt——miết）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1897 = "「!!!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「こんな関係のこと知られちゃったら。\n完全に収集がつなかくなっちゃう―でしょ？」
1646 = "「Nếu để mọi người biết về mối quan hệ này.\nThì sẽ hoàn toàn không thể thu xếp ổn thỏa được nữa——đúng không?」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。そこがわかってるなら契約しよう。\n絶対秘密の。悪い大人の。欲望と打算に塗れた、契約を」
1734 = "「Đúng vậy. Nếu cô đã hiểu điều đó thì chúng ta hãy ký hợp đồng đi.\nMột bản hợp đồng tuyệt mật. Của những người lớn hư hỏng. Đầy rẫy dục vọng và toan tính.」"
# 【ポーレット】
# display as 波萊特
# JP: 「契約の、具体的な内容は？」
1431 = "「Nội dung cụ thể của hợp đồng là gì?」"
# 【稀咲】
# display as 稀咲
# JP: 「まず第一条項は、前述のとおりの守秘だ。\nボクら三人以外の誰にも、この関係のことを漏らさない」
1889 = "「Đầu tiên, điều khoản thứ nhất là bảo mật như đã nói ở trên.\nTuyệt đối không tiết lộ mối quan hệ này cho bất kỳ ai ngoài ba chúng ta.」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん了解。絶対に」
1790 = "「Tất nhiên là em hiểu. Tuyệt đối không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も―ぁっっ―くっ―んふっ―了解だ」
1677 = "「Anh cũng——a——ku——ưm fu——hiểu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　双鉄く―あっ！！？　なっ、稀咲っ！\nちょっ！！」
1531 = "「Ế!? Anh Soutetsu——a!!? Này, Kisaki!\nKhoan đã!!」"
# monologue
# JP: （しこっ！　しゅこっ！　しにゅっ！　しゅっ！！）
2585 = "（Sục! Sục! Trượt! Sục!!）"
# 【稀咲】
# display as 稀咲
# JP: 「これは準備さ。とても重要で必要不可欠な、ね。\nいざ契約締結のとき、双鉄が萎え萎えじゃ困るだろ？」
1845 = "「Đây là bước chuẩn bị. Rất quan trọng và không thể thiếu đấy.\nĐến lúc ký kết hợp đồng mà anh Soutetsu lại ỉu xìu thì phiền lắm đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「こ、こまっ―あうっ―えと、あの！\nとにかく続き！　続きを、はやくっ！」
1891 = "「Ph-Phiền——au——ưm, cái đó!\nNói chung là tiếp tục đi! Tiếp tục nhanh lên!」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、いいよ？\nっていっても、合意すべき条項は、あとふたつだけ」
1533 = "「Fufu, được thôi?\nNói vậy chứ, các điều khoản cần thỏa thuận chỉ còn lại hai cái thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「残りのひとつめは？」
1413 = "「Cái đầu tiên trong phần còn lại là gì?」"
# 【稀咲】
# display as 稀咲
# JP: 「ポーレットが加わるときは、必ず三人のセックスで。\n双鉄とポーレットだけ、或いはポーレットとボクは禁止」
1772 = "「Khi Paulette tham gia, nhất định phải là làm tình ba người.\nNghiêm cấm chỉ có anh Soutetsu và Paulette, hoặc Paulette và tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
# 1574 = "「啊！」" 
# monologue
# JP: ポーレットが僕を見、それから稀咲をじっと見て、\nじわじわじわじわ赤くなる。
2237 = "Paulette nhìn tôi, rồi lại nhìn chằm chằm vào Kisaki,\nkhuôn mặt dần dần đỏ bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「同意だ。なんの意義もない」
1434 = "「Anh đồng ý. Không có ý kiến gì.」"
# monologue
# JP: 余計な言葉を一切入れずにそう答えれば、\nポーレットはハっとした顔になり、ぶんぶん頷く。
2167 = "Khi tôi trả lời dứt khoát không thừa một chữ nào,\nPaulette liền giật mình và gật đầu lia lịa."
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん、それでわたしは承諾、もちろんします。\nわたしが混ぜて貰うので、二人の妨げになりたくないし」
1791 = "「Tất nhiên, em chấp nhận điều đó, tất nhiên rồi.\nVì em là người được tham gia cùng, nên em không muốn cản trở hai người.」"
# monologue
# JP: （しゅこんっ！）
2589 = "（Sục!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！」
1620 = "「Ưm ku!」"
# monologue
# JP: まるで正解の合図のような、一しごき。というか―\n稀咲が指を止めててくれたおかげで冷静にっ―！！？
2082 = "Một cú sục như thể ra hiệu trả lời đúng. Hay đúng hơn là——\nNhờ Kisaki dừng ngón tay lại mà tôi mới có thể bình tĩnh——!!?"
# monologue
# JP: （しゅこっ！　しこっ！　しゅこっ！　しゅこっ！！）
2587 = "（Sục! Sục! Sục! Sục!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぅぁ……あ―双鉄くん―クチュクチュ、なんか―\n先っぽから出て―ぁぅ、これ―射精？」
1591 = "「Ua……a——anh Soutetsu——nhóp nhép, có gì đó——\nchảy ra từ đầu kìa——au, đây là——xuất tinh sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「いいや。これは尿道球腺液。\nより一般的な呼称では、カウパー氏腺液とか」
1366 = "「Không đâu. Đây là dịch tuyến hành niệu đạo.\nHay gọi phổ biến hơn là dịch Cowper.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ！？　これが本物のカウパー！？\nえと、ガマン汁って、本には書いてあったけど―えと」
1507 = "「Oa!? Đây là dịch Cowper thật sao!?\nƯm, trong sách có viết là nước nhờn——ưm.」"
# monologue
# JP: ポーレットがちら、と稀咲を見る。\n稀咲は優しく微笑み、頷く。
2238 = "Paulette khẽ liếc nhìn Kisaki.\nKisaki mỉm cười dịu dàng và gật đầu."
# 【稀咲】
# display as 稀咲
# JP: 「質問すればいいんじゃないかな？　さすがにボクも、\n実際のところ双鉄がどうなのかは、わからないから」
1389 = "「Cô cứ hỏi trực tiếp đi chẳng phải tốt hơn sao? Quả thực tôi cũng\nkhông biết tình trạng thực tế của anh Soutetsu thế nào đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あのね？　双鉄くん！　ガマン汁って、本当に、その\n―えと……ｼｬｾｲ……を我慢してると、出てくるの？」
1858 = "「Này nhé? Anh Soutetsu! Nước nhờn ấy, thật sự là, cái đó\n——ưm……nếu nhịn XUẤT TINH……thì nó sẽ chảy ra sao?」"
# monologue
# JP: （しこっ！　しゅこっ！　しにゅっ！　ぐちゅっ！）
2584 = "（Sục! Sục! Trượt! Nhóp nhép!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ」
# 1561 = "「啊」" 
# monologue
# JP: 稀咲に許可をもらった途端、実に嬉しげな質問がくる。\n尻尾がもしもあったなら、ちぎれんばかりに振っていよう。
2076 = "Ngay khi được Kisaki cho phép, cô ấy liền hỏi với vẻ vô cùng thích thú.\nNếu có đuôi, chắc chắn cô ấy đang vẫy nó mừng rỡ đến mức sắp đứt ra rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「我慢、している―しきれぬほどだ。\nだから……だから、頼む―お願いだ、稀咲」
1689 = "「Anh đang nhịn——đến mức không thể nhịn được nữa rồi.\nVì thế……vì thế, xin em——anh xin em đấy, Kisaki.」"
# monologue
# JP: ゆえ、理解する。ポーレットも僕と同様、マゾヒストで。\n稀咲の言葉を許しを許可を、無意識に望んでいるのだと。
2061 = "Nhờ vậy, tôi đã hiểu. Paulette cũng giống như tôi, là một người có máu M.\nVô thức khao khát lời nói, sự tha thứ, sự cho phép của Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「頼む、稀咲―最後の条項を―\n僕らの契約に必要な、最後の条項を教えてほしい」
1724 = "「Xin em đấy, Kisaki——điều khoản cuối cùng——\nhãy cho anh biết điều khoản cuối cùng cần thiết cho hợp đồng của chúng ta đi.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだったね。うっかりしてた」
1630 = "「A, đúng rồi nhỉ. Em lỡ quên mất.」"
# monologue
# JP: （しこっ―しゅこっ―くにっ―くりゅっ―）
2582 = "（Sục——sục——miết——xoay——）"
# 【双鉄】
# display as 雙鐵
# JP: 「うぅっ」
# 1595 = "「嗚！」" 
# monologue
# JP: 稀咲の手指がまた緩む。僕の精液を嵩上げさせつつ、\n決して放出できないように、制御している。
2311 = "Các ngón tay của Kisaki lại nới lỏng ra. Vừa làm tăng lượng tinh dịch của tôi,\nvừa kiểm soát để tôi tuyệt đối không thể giải phóng ra được."
# 【稀咲】
# display as 稀咲
# JP: 「最後の条項は、これ―『本契約の解消は、\n三人のうちの誰か一名の申請により、随時行われる』」
1751 = "「Điều khoản cuối cùng là thế này——『Việc chấm dứt hợp đồng này,\nsẽ được thực hiện bất cứ lúc nào theo yêu cầu của một trong ba người』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……誰か一人が嫌がる時点で、関係終了ということか。\n了解だ、僕にはもちろん、なんの異論もない」
999 = "「……Nghĩa là chỉ cần một người không muốn nữa, mối quan hệ sẽ kết thúc sao.\nAnh hiểu rồi, tất nhiên anh không có ý kiến gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ……」
1550 = "「A……」"
# monologue
# JP: 湿っぽい息。戸惑ってしまっているような、さみしげな、\nけれどもどこか―わずかに安堵も感じるような。
2229 = "Hơi thở ẩm ướt. Có vẻ như cô ấy đang bối rối, thoáng chút buồn bã,\nnhưng đâu đó——cũng có vẻ như đang cảm thấy nhẹ nhõm đôi chút."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも―です。\n異論、あるはずありません」
1684 = "「Em cũng——vậy.\nChắc chắn là không có ý kiến gì rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「フフ、それじゃあ契約、成立だ―ちゅっ！」
1463 = "「Fufu, vậy thì hợp đồng, đã được thành lập——chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1893 = "「！！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「成立。成立なら―\nなら、わたしも……その―」
1663 = "「Thành lập rồi. Nếu đã thành lập——\nVậy thì, em cũng……cái đó——」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん？　お好きに？　今ボクたちは、\n契約で許されている、三人のセックスの最中なんだから」
1788 = "「Tất nhiên rồi? Cứ tự nhiên đi? Bây giờ chúng ta,\nđang trong quá trình làm tình ba người được hợp đồng cho phép mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「セックス―セックス。双鉄くんと、稀咲と、セックス。\n三人で……ふぁっ―ちゅむっ―ちゅぅぅっ―」
1397 = "「Làm tình——làm tình. Làm tình với anh Soutetsu và Kisaki.\nBa người cùng nhau……pha——chu mu——chuu u——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ―あっ」
1541 = "「A——a」"
# monologue
# JP: それが儀式であるかのように、僕は乳首にキスされる。
2091 = "Như thể đó là một nghi thức, nhũ hoa của tôi được trao một nụ hôn."
# monologue
# JP: （舌と唇の感触が―これほど違うものなのか―）
2621 = "（Cảm giác của lưỡi và môi——lại khác biệt đến vậy sao——）"
# monologue
# JP: 稀咲の舌と唇は、貼りと弾力をぷりぷり感じる。\nポーレットのはただひたすらに柔らかく、ゼリーのようで。
2320 = "Lưỡi và môi của Kisaki mang lại cảm giác căng mọng và đàn hồi.\nCòn của Paulette thì chỉ đơn thuần là sự mềm mại, tựa như thạch jelly vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅううっ―ん……ちゅぱっ。ふぁ……\nえと、稀咲…………。あの、ね？　―ありがとう」
1584 = "「Chuu u——ưm……chu pa. Pha……\nƯm, Kisaki………… Nè? ——Cảm ơn em.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、そんなに真剣な瞳でお礼をいわれるなんて。\nポーレットは、よほど双鉄のおちんちんが欲しいんだね」
1459 = "「Fufu, không ngờ lại được cảm ơn bằng ánh mắt nghiêm túc thế kia.\nCó vẻ Paulette rất khao khát dương vật của anh Soutetsu nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ちょっ！　混ぜっ返さないでっ！\n今のありがとうは」
1530 = "「Ế!? Khoan! Đừng có đánh trống lảng!\nTiếng cảm ơn vừa rồi là vì」"
# monologue
# JP: （しゅこんっ！！！）
2555 = "（Sục!!!）"
# 【ポーレット】
# display as 雙鐵＆波萊特
# JP: 「くうっ！！！」\n「ぁっ！？」
1484 = "「Kuu u!!!」\n「A!?」"
# 【稀咲】
# display as 稀咲
# JP: 「混ぜっ返してなんていないさ。ボクらがたったいま\n締結した契約は、この一点に集約される契約。だろう？」
1701 = "「Tôi đâu có đánh trống lảng. Hợp đồng mà chúng ta\nvừa mới ký kết, chẳng phải đều quy về một điểm này sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……うん」
1559 = "「A……ừm.」"
# 【稀咲】
# display as 稀咲
# JP: 「だからポーレット。今はなんの遠慮をすることもない。\n触れたい部分に触れて、舐めたい部分を舐めていい」
1720 = "「Vậy nên Paulette. Bây giờ không cần phải ngại ngùng gì cả.\nMuốn chạm vào đâu thì cứ chạm, muốn liếm chỗ nào thì cứ liếm đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……。うん、稀咲。\n―えと―んっ！　―ちゅむっ―（さわっ）」
993 = "「……Ừm, Kisaki.\n——Ưm——ưm! ——Chu mu——（Chạm nhẹ）」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！！？」
1575 = "「A!!?」"
# monologue
# JP: ポーレットが、言葉の途中で僕の乳首にキスをする。\n同時にその手をそっとそうっと、僕の勃起に―
2230 = "Đang nói dở, Paulette bỗng hôn lên nhũ hoa của tôi.\nĐồng thời, bàn tay cô ấy nhẹ nhàng, khẽ khàng đặt lên dương vật đang cương cứng của tôi——"
# 【稀咲】
# display as 稀咲
# JP: 「ちゅっ―れるっ―ちゅうっ―ちゅむっ―\nちゅぱっ―ちゅうっ！　ちゅぶっ！　ちゅううっ！」
1585 = "「Chụt——rê ru——chuu u——chu mu——\nchu pa——chuu u! Chu bu! Chuu u!」"
# monologue
# JP: （さすっ―さわっ―なぜっ―さすっ―）
2569 = "（Miết——chạm——vuốt——miết——）"
# monologue
# JP: 稀咲がすぐに呼応する。僕の乳首を舐めながら、\nポーレットの手に手を重ね、勃起をやさしく撫でさする。
2324 = "Kisaki lập tức hưởng ứng. Vừa liếm nhũ hoa của tôi,\ncô ấy vừa đặt tay lên tay Paulette, dịu dàng vuốt ve dương vật."
# 【ポーレット】
# display as 波萊特
# JP: 「れるっ―れろっ―れりゅっ―りゅっ―\nちゅうっ―ちゅっ―ぺろっっ―ぺちゅっ―」
1821 = "「Rê ru——rê ro——rê ryu——ryu——\nchuu u——chụt——pê ro——pê chu——」"
# monologue
# JP: （さすっ―さわっ―なぜっ―くにっ―）
2568 = "（Miết——chạm——vuốt——nắn——）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ、ぁ、ぁ―」
1560 = "「A, a, a——」"
# monologue
# JP: 重なり合ってるゆえに手のひらの方はわからぬが―\n乳首の舐め方一つをとっても、これほど違う。
2064 = "Vì hai bàn tay xếp chồng lên nhau nên tôi không phân biệt được rõ ràng——\nNhưng chỉ riêng cách liếm nhũ hoa thôi, cũng đã khác biệt đến nhường này."
# 【稀咲】
# display as 稀咲
# JP: 「ちゅ！　ちゅぶっ！　ちゅぱっ！―はむっ、くぷっ、\nちゅむっ―れろっ―れりゅうっ―ちゅむっっ」
1589 = "「Chụt! Chu bu! Chu pa! ——Ha mu, ku pu,\nchu mu——rê ro——rê ryu u——chu mu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！　あっ！　あっ！　あっ！！！」
1571 = "「A! A! A! A!!!」"
# monologue
# JP: 稀咲は僕の乳首を完全に性器として、僕に快感を送り込む、\nその道具として舐めて舐って咥えて緩急をつけてくる。
2298 = "Kisaki hoàn toàn coi nhũ hoa của tôi như một cơ quan sinh dục, một công cụ\nđể truyền khoái cảm cho tôi, cô ấy liếm láp, mút mát, ngậm lấy với nhịp độ lúc nhanh lúc chậm."
# 【ポーレット】
# display as 波萊特
# JP: 「れりゅっ―ちゅっ―ちゅうううっ―れるっ―\nれるっ―ぺろおおっ―ちゅっ―ちゅううううっ」
1820 = "「Rê ryu——chụt——chuu u uu——rê ru——\nrê ru——pê ro oo——chụt——chuu u uu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅうっ―くっ―あっ―はっ―」
1593 = "「U u——ku——a——ha——」"
# monologue
# JP: ポーレットは完全に授乳を求める舌と唇との使い方だ。\n母乳が欲しくて舌で刺激し、唇で必死に吸い付いてくる。
2239 = "Cách dùng lưỡi và môi của Paulette hoàn toàn giống như đang đòi bú sữa.\nCô ấy dùng lưỡi kích thích vì muốn có sữa mẹ, và dùng môi liều mạng mút lấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅううっ、ちゅっ―んっ―れるっ―れりゅっ、\nちゅううううっ―ずちゅううっ―れるっ、れりゅっ」
1587 = "「Chuu u, chụt——ưm——rê ru——rê ryu,\nchuu u uu——zu chuu u——rê ru, rê ryu」"
# monologue
# JP: 母乳など出るはずもない―出ないと無論知っていように、\nそれでもしつこくポーレットはっ
2085 = "Làm gì có chuyện ra sữa mẹ được——Tất nhiên cô ấy biết là không thể ra,\nnhưng Paulette vẫn cứ dai dẳng mút lấy."
# monologue
# JP: （きゅうううううっっ！！）
2607 = "（Mút mạnh!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んぐっ！！！！！」
1617 = "「Ưm gu!!!!!」"
# monologue
# JP: 不意に睾丸を掴まれて、それだけで危うく射精しかける。\n僕のビクつきにポーレットも気づき、その視線を―
2256 = "Bất ngờ bị tóm lấy tinh hoàn, chỉ thế thôi cũng khiến tôi suýt chút nữa thì xuất tinh.\nPaulette cũng nhận ra sự giật mình của tôi, cô ấy hướng ánh mắt——"
# 【ポーレット】
# display as 波萊特
# JP: 「わっ！？　えっ！！？　おちん、ちんの―その、タマ\n―えと……そんなに、ワシって―掴んでも……」
1502 = "「Oa!? Ế!!? Của dương, vật——cái đó, bi\n——ưm……túm chặt, như thế——có sao không……」"
# 【双鉄】
# display as 雙鐵
# JP: 「痛くはない、痛くはない―がっ」
1376 = "「Không đau, không đau đâu——nhưng」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1457 = "「Fufu.」"
# monologue
# JP: （ころっ―こにゅっ―ふにゅっ―もみゅっ―）
2563 = "（Lăn——nắn——bóp——vò——）"
# monologue
# JP: 稀咲の指はゆるく蠢き、僕の睾丸をじわじわやわやわ\nもみあげ続ける。精液がじわじわ亀頭へ押し出されて行く。
2314 = "Các ngón tay của Kisaki chậm rãi chuyển động, tiếp tục nắn bóp tinh hoàn của tôi\nmột cách từ tốn, mềm mại. Tinh dịch đang dần dần bị ép về phía quy đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「このまま―され、たら―射精……するっ―ぁっ」
1781 = "「Cứ thế này——thì——anh sẽ……xuất tinh mất——a」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！―射精っ！？　射精って―射精って……はぅ」
1567 = "「A! ——Xuất tinh!? Xuất tinh——xuất tinh là……hau」"
# 【稀咲】
# display as 稀咲
# JP: 「さて、ポーレット。\nここでキミは、選ばなくっちゃいけない」
1785 = "「Nào, Paulette.\nĐến đây cô phải đưa ra lựa chọn rồi.」"
# monologue
# JP: （ぴたっ）
2496 = "（Dừng lại）"
# monologue
# JP: 手が止まる。止まってしまえば僕の勃起が勝手にビクビク\nヒクつきまくる動きが際立ち目立ってしまう。
2193 = "Bàn tay cô ấy dừng lại. Khi đã dừng lại, chuyển động giật nảy liên hồi\ncủa dương vật đang cương cứng của tôi càng trở nên rõ rệt và nổi bật."
# 【ポーレット】
# display as 波萊特
# JP: 「え、らぶの？　わたし、が？―（ごくっ）」
1848 = "「Lựa, chọn sao? Em, á? ——（Ực）」"
# monologue
# JP: 当然に、ポーレットは勃起を凝視している。\nその視線を追うことなく、稀咲は静かに言葉をつなぐ。
2249 = "Đương nhiên, Paulette đang nhìn chằm chằm vào dương vật của tôi.\nKhông chạy theo ánh mắt đó, Kisaki bình tĩnh tiếp lời."
# 【稀咲】
# display as 稀咲
# JP: 「選ばせてあげる。だって今日のため、\n一ヶ月近くも飲み続けてきているんだからさ」
1392 = "「Tôi sẽ cho cô chọn. Bởi vì để chuẩn bị cho ngày hôm nay,\ncô đã uống thuốc liên tục gần một tháng trời rồi mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
# 1561 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「飲み続けているとは―なにをだ？」
1430 = "「Uống liên tục sao——uống cái gì cơ?」"
# 【稀咲】
# display as 稀咲
# JP: 「低用量ピル。排卵抑制剤。\nコンドームより高い避妊効果がある、経口避妊薬」
1382 = "「Thuốc tránh thai liều thấp. Thuốc ức chế rụng trứng.\nLoại thuốc tránh thai đường uống có hiệu quả cao hơn cả bao cao su.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
# 1897 = "「！！！？」" 
# 【稀咲】
# display as 稀咲
# JP: 「処女を、コンドームに奪われたくないんだって。\nけど、妊娠はマズすぎるだろ？　だから―」
1637 = "「Cô ấy nói không muốn bị bao cao su cướp đi cái ngàn vàng.\nNhưng mang thai thì rắc rối quá đúng không? Thế nên——」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。稀咲に問い詰められて、自分の欲望を吐露して\n……双鉄くんがオーケーならって、稀咲の同意を貰って」
1740 = "「Vâng ạ. Bị Kisaki gặng hỏi, em đã thổ lộ dục vọng của mình\n……và được Kisaki đồng ý, với điều kiện là anh Soutetsu cũng OK.」"
# monologue
# JP: 背筋が、僅かにゾクリとする。重いし、怖い。\nけれど怖さの何倍も―射精欲求も膨らんでくる。
2174 = "Sống lưng tôi hơi rùng mình. Thật nặng nề, và cũng thật đáng sợ.\nNhưng khao khát xuất tinh còn phình to gấp nhiều lần nỗi sợ hãi ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしどうしても初めては―叶うのならば、直接……\nセックスしてほしくって。だから飲んでるんです、ピル」
1703 = "「Lần đầu tiên, em nhất định muốn——nếu được, em muốn làm tình……\ntrực tiếp. Thế nên em mới uống thuốc tránh thai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、それなら……\nいま、ポーレットが選択を求められているのは」
1377 = "「Nói tóm lại, nếu vậy thì……\nLựa chọn mà Paulette đang được yêu cầu đưa ra bây giờ là」"
# 【稀咲】
# display as 稀咲
# JP: 「射精も見たがっていたからね？　このまま一度、\nボクたちの手で、双鉄が射精するところを見るのか」
1632 = "「Vì cô ấy cũng muốn xem cảnh xuất tinh mà? Cứ thế này một lần,\ncô có muốn tận mắt chứng kiến cảnh anh Soutetsu xuất tinh dưới bàn tay chúng ta không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううんっ、選んだ！　決めました！　わたし、射精―\n射精見るのは―今じゃなくって、いいです。それより」
1374 = "「Không, em chọn rồi! Em quyết định rồi! Em, xem xuất tinh——\nxem xuất tinh——không phải bây giờ cũng được. Thay vì thế」"
# 【稀咲】
# display as 稀咲
# JP: 「それより？」
1758 = "「Thay vì thế?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それ……より……」
1756 = "「Thay……vì thế……」"
# monologue
# JP: はぁはぁと、ポーレットの息は全力疾走の直後のようだ。\n真っ赤な顔はぶわぶわと、汗を無数に浮き上がらせてる。
2234 = "Paulette thở hổn hển như vừa chạy nước rút xong.\nKhuôn mặt đỏ bừng của cô ấy đang túa ra vô vàn giọt mồ hôi."
# 【ポーレット】
# display as 波萊特
# JP: 「……大丈夫、なら―双鉄くんが、オーケーなら、\nセックス。凄く、してほしいです。双鉄、くんの―」
997 = "「……Nếu, không sao——nếu anh Soutetsu, OK,\nthì em rất muốn, làm tình. Của anh, Soutetsu——」"
# monologue
# JP: （さわっ）
2571 = "（Chạm）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！」
1622 = "「Ưm ku!!!」"
# monologue
# JP: 固まっていたポーレットの手が、ふたたびゆるく動き出す。\n稀咲に導かれることなしに、ポーレット自身の意思により。
2036 = "Bàn tay nãy giờ vẫn cứng đờ của Paulette lại bắt đầu nhẹ nhàng chuyển động.\nKhông phải do Kisaki dẫn dắt, mà là theo ý chí của chính Paulette."
# monologue
# JP: （ひんやり冷たい―\nいや―あるいは、緊張のせいなのか？）
2596 = "（Lạnh ngắt——\nKhông——hay là do căng thẳng?）"
# monologue
# JP: ポーレットの手指は震えている。\nその震えさえ、射精の引き金に成りかねない故引き締める。
2235 = "Các ngón tay của Paulette đang run rẩy.\nNgay cả sự run rẩy đó cũng có thể trở thành ngòi nổ cho việc xuất tinh, nên tôi cố kìm nén lại."
# monologue
# JP: （さわっ―さすっ―つうううっ……さすっ）
2567 = "（Chạm——miết——vuốt……miết）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ぁ―あ―双鉄、くんの、おちん、ちん―\n（ごくっ）―とってもあつくて―あつくて、固くて」
1554 = "「A……a——a——dương, vật, của anh Soutetsu——\n（ực）——rất nóng——vừa nóng, vừa cứng.」"
# monologue
# JP: （さすっ―つう―なぜっ―さわわっ）
# 2569 = "（摩擦——撫摸——撫摸——摩擦——）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1892 = "「！」" 
# monologue
# JP: ポーレットは二本の指の先端だけで、僕の勃起をなぞる。\n丁寧に、形を、長さを測ろうとでもするかのように。
2225 = "Paulette chỉ dùng đầu của hai ngón tay vuốt ve dương vật của tôi.\nMột cách cẩn thận, như thể đang muốn đo hình dáng và chiều dài của nó vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ねばねば、しずく―先走り液―は、ぁ―\nあふれ、だしてて―すごい、匂いで、ビクビクしてて」
1775 = "「Nhớp nháp, rỏ giọt——nước nhờn——ha, a——\ntrào ra, rồi——mùi, nồng quá, lại còn giật giật nữa.」"
# monologue
# JP: （にちゃ―）
2628 = "（Nhóp nhép——）"
# monologue
# JP: ポーレットが指をひろげて、その間にかかる\n先走り液の橋を眺める。これは―物凄く恥ずかしい。
2226 = "Paulette dang rộng các ngón tay ra, ngắm nhìn\nnhững sợi nước nhờn kéo dài giữa chúng. Cảnh tượng này——thật sự vô cùng xấu hổ."
# 【ポーレット】
# display as 波萊特
# JP: 「―うん」
967 = "「——Ừm.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ？　ひとりでじっくり触ってみても、\n結論は、やっぱりかわらない？」
1461 = "「Fufu? Tự mình cẩn thận sờ thử rồi,\nkết luận vẫn không thay đổi chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もっとたくさん触りたいけど、握ったり撫でたりもして、\n双鉄くんの精液びゅうびゅう、させてみたいけど」
1692 = "「Dù em muốn sờ nhiều hơn nữa, cũng muốn nắm lấy và vuốt ve,\nmuốn làm cho tinh dịch của anh Soutetsu bắn ra tung tóe, nhưng mà.」"
# monologue
# JP: ポーレットの手が僕から離れる。離れて―っ！\nぺろりと小さく、赤い舌先で先走り汁の味をみる。
2236 = "Tay Paulette rời khỏi người tôi. Rời khỏi——!\nCô ấy thè chiếc lưỡi đỏ chót nhỏ xíu ra nếm thử mùi vị của nước nhờn."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ。けど、それよりもやっぱり、やっぱりわたし―\n双鉄くんのおちんちん……その……挿れて、ほしくて」
1609 = "「Ưm. Nhưng mà, hơn thế nữa, quả nhiên em vẫn——\nmuốn dương vật của anh Soutetsu……cái đó……đâm vào trong.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうなんだね」
1744 = "「Vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうんっ！！？」
1443 = "「Hya un!!?」"
# monologue
# JP: (どさっ）
2528 = "（Phịch）"
# monologue
# JP: 稀咲がポーレットともつれ合うようにして布団に倒れる。\n素早く胸元の布を引き下げ、自らのものも露出させる。
2297 = "Kisaki ngã xuống nệm như thể quấn lấy Paulette.\nCô ấy nhanh chóng kéo lớp vải trước ngực xuống, phơi bày cả ngực của mình ra."
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ！？　あっ、やだ、わたし、おっぱい」
1578 = "「A!? A, không chịu đâu, ngực, của em.」"
# 【稀咲】
# display as 稀咲
# JP: 「隠さない。足も閉じない。\nもしも、セックスしたいなら」
1371 = "「Không được che. Cũng không được khép chân lại.\nNếu như cô muốn làm tình.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
1597 = "「!!!」"
# monologue
# JP: 立ち上がる。\n僕の勃起を、ポーレットはうっとり見上げ見つめる。
2337 = "Tôi đứng dậy.\nPaulette say đắm ngước nhìn dương vật đang cương cứng của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ―あ……セックス―。\nセックス―わたし……したい…………んっ」
1464 = "「Pha——a……Làm tình——\nLàm tình——em……muốn làm…………ưm.」"
# monologue
# JP: 銀と金とのふたりがそろって、大きく足を拡げている。\n僕に―おまんこを差し出している。
2391 = "Hai người con gái tóc bạc và tóc vàng cùng lúc dang rộng hai chân.\nPhơi bày âm đạo——trước mặt tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ほら、ポーレット？　双鉄が固まっちゃってるよ？」
1804 = "「Thấy chưa, Paulette? Anh Soutetsu cứng đờ người ra rồi kìa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1892 = "「！」" 
# 【稀咲】
# display as 稀咲
# JP: 「なにを、どこに、どうしてほしいのか。\n具体的にお願いしないと、誤解が生じるかもしれない」
1394 = "「Cô muốn anh ấy làm gì, ở đâu, và như thế nào.\nNếu không yêu cầu cụ thể thì có thể sẽ xảy ra hiểu lầm đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたっ、わた―あうっ―わた、わたし、わたしは。\nそうてつくんに―双鉄くんと、セックス！　したくて」
1675 = "「E, e——au——e, em, em muốn.\nAnh Soutetsu——muốn làm tình! Với anh Soutetsu.」"
# monologue
# JP: その言葉だけで十分すぎる。\n勃起がビクリと反応し、すぐにやろうとせっついてくる。
2021 = "Chỉ câu nói đó thôi đã là quá đủ rồi.\nDương vật giật nảy phản ứng, hối thúc tôi hãy làm ngay lập tức."
# 【ポーレット】
# display as 波萊特
# JP: 「だから―おちんちん、双鉄くんのおちんちん、を、\nわたし―わたしの……はぅ……ぅ……わたしのっ」
1713 = "「Vì thế——dương vật, dương vật của anh Soutetsu,\nvào em——của em……hau……u……của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1610 = "「Ừ.」"
# monologue
# JP: これは、浮気だ。肉体だけの関係だ。混乱しそうな関係を\n整理できるよう―妻公認で、僕は浮気を、これからする。
2377 = "Đây là ngoại tình. Một mối quan hệ chỉ có thể xác. Để có thể dọn dẹp\nmối quan hệ dễ gây nhầm lẫn này——tôi sẽ ngoại tình, dưới sự chấp thuận của vợ."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし―の……ぁ……ぅ……ぉ……おまん、こ……\nわたし、わたしの―おまんこ、にっ」
1669 = "「Của——em……a……u……o……âm, đạo……\nCủa em, vào âm đạo——của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここだな」
1745 = "「Chỗ này nhỉ.」"
# monologue
# JP: （くちっ）
2519 = "（Nhóp nhép）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅうううううううううっ！！！！！？」
1619 = "「Ưm kyuu uu uu uu uu uu uu uu!!!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1599 = "「Ư!!?」"
# monologue
# JP: いまポーレットはイったのか？\n膣口めがけ指を伸ばして、僅かに触れたそれだけで。
2227 = "Vừa rồi Paulette đã lên đỉnh sao?\nTôi chỉ mới đưa ngón tay hướng về phía cửa mình và khẽ chạm vào một chút thôi mà."
# 【ポーレット】
# display as 波萊特
# JP: 「は、はうっ―しゅご―すご―夢、みたい―\n双鉄、くんが―わたしの、おまんこ、触って、くれて」
1515 = "「Ha, hau——sướn——sướng quá——như một, giấc mơ vậy——\nAnh Soutetsu——đang chạm vào, âm đạo, của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1892 = "「！」" 
# monologue
# JP: （くちいっ）
2498 = "（Lún vào）"
# 【稀咲】
# display as 稀咲
# JP: 「ぁっ―んふ、ふっ―ありがと、双鉄。ボクとも\nちゃんと―ちゃんと―セックス、してくれて」
1542 = "「A——ưm fu, fu——cảm ơn anh, anh Soutetsu. Vì đã\nđàng hoàng——đàng hoàng——làm tình, với em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然だ」
1789 = "「Tất nhiên rồi.」"
# monologue
# JP: 口を開けば、どこかで地雷を踏み抜きそうで怖くって。\n誰かが口を開くにならば、なにかが飛んできそうで怖くて。
2144 = "Tôi sợ rằng nếu mở miệng, mình sẽ giẫm phải bãi mìn nào đó.\nTôi sợ rằng nếu có ai đó mở miệng, sẽ có thứ gì đó bay đến."
# monologue
# JP: （くち、ちゅっ―くちゅっ―くにゅっ―くぢゅっ）
2517 = "（Lún, chụt——nhóp nhép——nhào nặn——nhóp nhép）"
# monologue
# JP: だから言葉の代わりに今は、だから黙ってほしくて今は、\nただひたすらに指を動かす。
2189 = "Vì thế thay cho lời nói lúc này, vì thế muốn các cô ấy im lặng lúc này,\ntôi chỉ biết mải miết cử động ngón tay."
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ!　んっ！　はっ！ あっ―あっ―指、\nやさし―おまんこ、やさしく、ノックっ―してっ」
1489 = "「Hyau! Ưm! Ha! A——a——ngón tay,\ndịu dàng——âm đạo, đang gõ cửa, thật dịu dàng.」"
# monologue
# JP: （ふにゅっ―ちゅるっ！　ちゅぶっ！　ぢゅぶっ！）
2560 = "（Nhào nặn——chu ru! Chu bu! Ju bu!）"
# 【稀咲】
# display as 稀咲
# JP: 「ん……ふふっ―どおお、双鉄？　おまんこの感触―\nんっ―ボクと、ポーレットで、結構違う？」
1604 = "「Ưm……fufu——sao nào, anh Soutetsu? Cảm giác của âm đạo——\nưm——của em, và của Paulette, có khác nhau nhiều không?」"
# monologue
# JP: 結構どころか、大きく違う。これほど異なるものなのか。\n感動はすぐ、強い性欲と混じり乱れる。
2011 = "Không chỉ nhiều, mà là khác biệt một trời một vực. Lại có thể khác nhau đến mức này sao.\nSự cảm động nhanh chóng hòa lẫn với nhục dục mãnh liệt."
# monologue
# JP: （くちゅっ―さすっ―くりゅっ―つぷっ―）
2516 = "（Nhóp nhép——miết——xoay——ấn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　あ、双鉄くんの、指の、おなか―ふぁっ、\nわたしの、おまんこ―入り口の、とこ―アウッ―」
1495 = "「Hya!? A, phần bụng, ngón tay, của anh Soutetsu——pha,\nđang ở, cửa mình——âm đạo, của em——au——」"
# monologue
# JP: 処女の膣内。怖くて指は突っ込めないが先端の腹を膣口に\nちゅぷちゅぷと吸われるだけでも、伝わってくる。
2368 = "Bên trong âm đạo của trinh nữ. Tôi sợ không dám chọc ngón tay vào, nhưng chỉ cần\nphần bụng ở đầu ngón tay bị cửa mình mút mát chùn chụt thôi cũng đủ cảm nhận được rồi."
# monologue
# JP: （ポーレットは、おまんこの肉もみっちりしていて、\nアツアツで―ゼリーというか、プディングというか）
2595 = "（Thịt âm đạo của Paulette cũng rất khít khao,\nnóng hổi——như thạch jelly, hay pudding vậy.）"
# monologue
# JP: 初めての感触に興奮しつつも、安心感が欲しくなる。\n慣れ親しんだ、いつもの肉の感触が―
2173 = "Dù hưng phấn trước cảm giác mới lạ, nhưng tôi lại khao khát cảm giác an toàn.\nCảm giác da thịt quen thuộc, thường ngày——"
# 【稀咲】
# display as 稀咲
# JP: 「んっ！！？」
1628 = "「Ưm!!?」"
# monologue
# JP: （じゅぼっ！　じゅっ！　くりゅっ！　こしゅっ！）
2549 = "（Ju bo! Ju! Ku ryu! Ko shu!）"
# monologue
# JP: これだ、これ。ぷりゅぷりゅしつつ甘く蕩かすだけでなく、\nしっかりとした反発感と弾力もある、バランスの良さ。
2203 = "Đây rồi, chính là nó. Không chỉ mềm mại ngọt ngào tan chảy,\nmà còn có độ nảy và đàn hồi chắc chắn, một sự cân bằng hoàn hảo."
# 【稀咲】
# display as 稀咲
# JP: 「んっ―はっ！　あっ！　双鉄、双鉄―ボクは―\n次で―二番目で、今日は、いいから―ポーレットを」
1601 = "「Ưm——ha! A! Anh Soutetsu, anh Soutetsu——em thì——\nlần sau——hôm nay, em là người thứ hai, cũng được——hãy làm với Paulette đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1892 = "「！」" 
# monologue
# JP: 稀咲の膣に、慣れ親しんだむっちり窮屈な膣内に、\nゆっくり指を―こころを落ち着けてほしかった―が。
2153 = "Tôi muốn từ từ đưa ngón tay vào âm đạo của Kisaki,\nvào cái âm đạo chật hẹp đầy đặn quen thuộc ấy——để làm dịu tâm trí——nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1771 = "「Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あ―はい、です。双鉄、くん」
1556 = "「A……a——vâng, ạ. Anh Soutetsu.」"
# monologue
# JP: 真正面から、ようやく向き合う。\n自分の責任で自分の欲で、ポーレットを女にするために。
2180 = "Cuối cùng cũng đối mặt trực diện.\nBằng chính trách nhiệm và dục vọng của mình, để biến Paulette thành một người phụ nữ."
# 【双鉄】
# display as 雙鐵
# JP: 「見てくれ。これが、僕の勃起だ。\nいまからこれで―僕は、ポーレットのことを貫く」
1396 = "「Nhìn đi. Đây là dương vật đang cương cứng của anh.\nTừ giờ trở đi——anh sẽ dùng nó, để xuyên thấu Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。……えとっ！　あの―\n不慣れですけど、がんばりますから、わたし―だから」
1739 = "「Vâng. ……Ưm! Cái đó——\nDù chưa quen, nhưng em sẽ cố gắng, em——vì thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1610 = "「嗯」" 
# monologue
# JP: ポーレットは逃げない。\n稀咲は何も―言葉も行動も与えてくれない。
2224 = "Paulette không hề trốn tránh.\nKisaki cũng không làm gì——không nói một lời, không một hành động."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは―慣らして、ほぐしていこう」
1887 = "「Trước tiên——phải làm quen, và nới lỏng ra đã.」"
# monologue
# JP: （ぴとっ）
2561 = "（Chạm nhẹ）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1574 = "「啊！」" 
# monologue
# JP: 勃起を性器に押し当てる。\n大陰唇で挟みこむように、膣前庭に亀頭を添わせて―
2159 = "Tôi ép dương vật vào bộ phận sinh dục của cô ấy.\nÁp quy đầu vào tiền đình âm đạo, như thể đang kẹp nó giữa hai môi lớn——"
# monologue
# JP: （しにゅっ―くちゅっ―くっ―くにゅっ―）
2513 = "（Trượt——nhóp nhép——cọ——nhào nặn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　あっ―うそっ―ふわっ―すごっ―\n双鉄くんのおちんちんが―わたしも、おまんこ―」
1576 = "「A!? A——không thể nào——bồng bềnh——tuyệt quá——\nDương vật của anh Soutetsu——âm đạo, của em cũng——」"
# monologue
# JP: （しっっ―ちゅくっ―ちゅぶっ―ぢゅるっ―）
2547 = "（Cọ——chu ku——chu bu——ju ru——）"
# monologue
# JP: こぽりと音がしそうな程に、一気に愛液の量が増す。\n未使用の膣口が貪欲に、勃起を呑もうと貼り付いてくる。
2134 = "Lượng ái dịch bất ngờ tăng vọt, nhiều đến mức như sắp phát ra tiếng \"ục\".\nCửa mình chưa từng được sử dụng đang tham lam bám chặt lấy, chực nuốt chửng lấy dương vật."
# monologue
# JP: （ちゅぶっ―ちゅるっ―ちゅぢゅっ―ちゅくっ）
2537 = "（Chu bu——chu ru——chu ju——chu ku）"
# 【ポーレット】
# display as 波萊特
# JP: 「おまんこ―わたしの―喜んじゃってる―んっ―\n双鉄くんの―おちんちんに、ずりずりっ、されてっ」
1706 = "「Âm đạo——của em——đang sướng rơn lên kìa——ưm——\nBị dương vật——của anh Soutetsu, cọ xát, liên tục.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、な」
1728 = "「Đúng, nhỉ.」"
# monologue
# JP: （ずりゅうっ！　くりゅっ！　こしゅううっ！　くりっ）
2508 = "（Zu ryuu! Ku ryu! Ko shuu u! Ku ri）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっっ！？　あっ―ああっ！　くり、トリス―\nわたしの―クリ―が―おちん、ちんにっっ」
1493 = "「Hya!? A——aa! Âm, vật——\nÂm vật——của em——bị dương, vật.」"
# monologue
# JP: お試しだった腰の動きを、長いものへと切り替える。\nカリを使って意図的に、大きなクリトリスを撫ぜつぶす。
2158 = "Tôi chuyển những chuyển động eo thăm dò ban đầu thành những nhịp dài hơn.\nCố ý dùng rãnh quy đầu để miết mạnh lên hạt âm vật lớn của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　あっ！　あっ！　あっ！　またっ―\nやぁっ！　おねがい、おねがいっ―双鉄くぅんっ！」
1472 = "「Pha! A! A! A! Lại nữa——\nNhá! Xin anh, xin anh đấy——anh Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………ぁあ」
981 = "「…………Aa.」"
# monologue
# JP: これは―いける。処女であろうがなんであろうが、\nこれだけどろどろにほぐれているゆえ、挿入できる。
2379 = "Thế này thì——được rồi. Dù có là trinh nữ hay gì đi nữa,\nvới độ nhầy nhụa và lỏng lẻo thế này thì có thể đâm vào được."
# monologue
# JP: （稀咲、は―）
2614 = "（Kisaki, thì——）"
# monologue
# JP: 視線を、言葉を向けたくて、けれどもぐっと耐え忍ぶ。\n責任は全て僕が負う。稀咲は決して押し付けない。
2151 = "Tôi muốn hướng ánh mắt, muốn nói vài lời với cô ấy, nhưng lại cố kìm nén.\nTôi sẽ chịu mọi trách nhiệm. Tuyệt đối không đùn đẩy cho Kisaki."
# 【ポーレット】
# display as 波萊特
# JP: 「はぁっ―はぁっ―はぁっ―はあっ―（ごくっ）\n―そうてつ、くん？」
1825 = "「Ha——ha——ha——ha——（Ực）\n——Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1610 = "「嗯」" 
# monologue
# JP: ならば、抱こう。ポーレットを、僕が女にしよう。\n体がこれほど求める故に―僕の欲望で、彼女を穢そう。
2384 = "Vậy thì, ôm thôi. Tôi sẽ biến Paulette thành một người phụ nữ.\nVì cơ thể tôi đang khao khát đến nhường này——tôi sẽ dùng dục vọng của mình để vấy bẩn cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり進む。痛んだり嫌だったりしたらすぐ止める。\nそのときは―そうだな、右手を上にあげてくれ」
1700 = "「Anh sẽ vào từ từ. Nếu thấy đau hay khó chịu thì anh sẽ dừng lại ngay.\nLúc đó——xem nào, em hãy giơ tay phải lên nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「―はい」
968 = "「——Vâng.」"
# monologue
# JP: きゅっと。ポーレットの右手がシーツをつかむ―っ！
2349 = "Siết chặt. Bàn tay phải của Paulette túm chặt lấy ga giường——!"
# 【ポーレット】
# display as 波萊特
# JP: 「……ありがと、稀咲」
1006 = "「……Cảm ơn em, Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「どういたしまして」
1368 = "「Không có chi.」"
# monologue
# JP: いきどころがなく不安げに揺れていたポーレットの左手が、\n稀咲の右手と、恋人つなぎに繋がれる。
2233 = "Bàn tay trái của Paulette đang run rẩy bất an không biết bấu víu vào đâu,\nđã được bàn tay phải của Kisaki đan chặt vào nhau như những người đang yêu."
# monologue
# JP: （なるほど、これが―\n三人でセックスするということか―っ！！？）
2501 = "（Ra là vậy, đây chính là——\nlàm tình ba người sao——!!?）"
# monologue
# JP: 体が、勃起がいきなりビクンと跳ね上がる。\n鼓動が強く激しくなって、かーっと全身が熱くなる。
2177 = "Cơ thể tôi, dương vật của tôi đột nhiên giật nảy lên.\nNhịp tim đập mạnh mẽ, mãnh liệt, toàn thân nóng bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。稀咲」
1770 = "「Paulette. Kisaki.」"
# monologue
# JP: 僕はポーレットを抱くと同時に、稀咲のことも抱いて貫く。\nそう思いつつ、ポーレットの膣口に亀頭を当てる。
2142 = "Tôi ôm Paulette, đồng thời cũng ôm và xuyên thấu cả Kisaki.\nNghĩ vậy, tôi áp quy đầu vào cửa mình của Paulette."
# monologue
# JP: （ちゅくうううっっ）
2534 = "（Chu ku uu u）"
# monologue
# JP: どろどろしている。ヒクついている。吸い付いてくる。\nポーレットの処女おまんこは、僕の勃起を求めてくれてる。
2380 = "Nhầy nhụa. Giật giật. Mút chặt lấy.\nÂm đạo trinh nữ của Paulette đang khao khát dương vật của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「―順番に、抱く。\n気持ちの上では、ふたり同時に―三人一緒に」
970 = "「——Anh sẽ lần lượt ôm hai người.\nVề mặt cảm xúc, anh sẽ làm với cả hai cùng lúc——ba chúng ta cùng nhau.」"
# 【稀咲】
# display as 稀咲＆波萊特
# JP: 「うん」\n「はい」
1611 = "「Ừm.」\n「Vâng.」"
# monologue
# JP: 重なる返事が鼓膜を揺らし、瞬時に楔がほどかれる。\n思いっきりに挿入したい―欲を、理性で必死に止める。
2074 = "Tiếng trả lời đồng thanh làm rung động màng nhĩ, chốt chặn trong tôi tức khắc bung ra.\nTôi muốn đâm phập vào hết cỡ——nhưng lý trí đã liều mạng ngăn cản dục vọng đó lại."
# monologue
# JP: （ずっ―ぐっ―）
2544 = "（Xuyên——lún——）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ―あっ―はいって、くるっ―わたし―\nわたしの、おまんこ、に―双鉄、くん、がっ―」
1509 = "「Ha——a! A! A!! Vào rồi!\nNóng quá——vừa nóng vừa to——đang ở bên trong, em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ」
1605 = "「Ưm……ku.」"
# monologue
# JP: 初めての雄を、勃起を、ポーレットの処女おまんこは、\n噛みつくように締め付けて、ギリギリギリと受け入れる。
2340 = "Âm đạo trinh nữ của Paulette siết chặt như cắn lấy,\nkhó nhọc tiếp nhận sinh vật đực đầu tiên, dương vật cương cứng đầu tiên."
# monologue
# JP: （ぐっ―！）
2512 = "（Lún——!）"
# monologue
# JP: 先端になにかあたる感覚に、腰を留める。\n最奥まではまだ随分と―
2155 = "Cảm giác phần đầu chạm vào thứ gì đó khiến tôi khựng eo lại.\nVẫn còn khá xa mới tới tận cùng——"
# 【稀咲】
# display as 稀咲
# JP: 「処女膜？」
1823 = "「Màng trinh à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「～～～っ///」
1902 = "「～～～///」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………構わないか？　ポーレット」
980 = "「…………Không sao chứ? Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っっ！！！！！」
1598 = "「Ư!!!!!」"
# monologue
# JP: 真っ赤になって歯を食いしばり、目尻に涙を一杯ためて、\nポーレットはそれでもはっきり、僕の目を見て何度も頷く。
2232 = "Đỏ bừng mặt, nghiến chặt răng, khóえ mắt đẫm lệ,\nnhưng Paulette vẫn nhìn thẳng vào mắt tôi và gật đầu dứt khoát nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「―」
964 = "「——」"
# monologue
# JP: ならば、進もう。\nゆっくり、ゆっくり、決して獣欲に身を任せずに―
2382 = "Vậy thì, tiến tới thôi.\nChậm rãi, chậm rãi, tuyệt đối không phó mặc cho thú tính——"
# monologue
# JP: （ぷつっ）
2624 = "（Phụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ！！！！！」
1627 = "「Ưm!!!!!」"
# monologue
# JP: 糸を切ってしまった感覚。ついでじわりと―
1997 = "Cảm giác như vừa làm đứt một sợi chỉ. Tiếp đó là cảm giác râm ran——"
# 【双鉄】
# display as 雙鐵
# JP: 「血、だ」
1729 = "「Máu, kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁっ―ぁっ―平気―ンッ―わたし―\nおまんこ、平気―です―だから―そうてつ、くん」
1824 = "「Ha——a——không sao——ưm——em——\nâm đạo, không sao——đâu——nên là——anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1610 = "「嗯」" 
# monologue
# JP: 出血量は、さほど酷くは無いようだ。\nならいっそ、愛液に融かしてしまいたく、腰を進める。
2028 = "Lượng máu chảy ra có vẻ không nhiều lắm.\nVậy thì tôi sẽ đâm eo tới, muốn hòa tan nó vào trong ái dịch."
# monologue
# JP: （ずっ―ずぶっ―じゅぶっ―じゅびゅっ―）
2597 = "（Thọc——lún——ju bu——ju byu——）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ―あっ！　あっ！　あっっ！！　はいって！\nあつい―あつくてふといの―わたしの―なか、に」
1511 = "「Ha——a! A! A!! Vào rồi!\nNóng quá——vừa nóng vừa to——đang ở bên trong, em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「痛むか？」
1796 = "「Đau không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「へい、っ―き―ぁ―ぅんっ―ふっ―\nおもってたより―全然―ただ―っ―おなかっ」
1760 = "「Khôn, ng——sao——a——ưm——phu——\nHoàn toàn——không như em nghĩ——chỉ là——bụng em.」"
# 【稀咲】
# display as 稀咲
# JP: 「おなか？」
1818 = "「Bụng sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「おな、か―下、はら―おまん、こ―きつ、くて\n―ぎゅうぎゅう―わたし、いっぱい、でっ―っ！」
1816 = "「Bụ, ng——bụng, dưới——âm, đạo——chật, quá\n——chật ních——em, bị nhét đầy, mất——!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな……僕にも―余裕が、ない」
1731 = "「Chắc vậy rồi……Anh cũng——không còn, dư dả gì.」"
# 【稀咲】
# display as 稀咲
# JP: 「はじめてのときに膣内で感じるとかって無理だから。\nね？　双鉄―クリトリス、もしも出来たら」
1814 = "「Lần đầu tiên mà đòi có cảm giác bên trong âm đạo thì khó lắm.\nNè? Anh Soutetsu——nếu được thì kích thích âm vật đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのか。わかった」
1737 = "「Vậy sao. Anh hiểu rồi.」"
# monologue
# JP: （ぐいっ！！！）
2611 = "（Đâm mạnh!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっっ！！！！！」
1481 = "「Pha!!!!!」"
# monologue
# JP: 腰を折り曲げ、下腹部で意図的にクリトリスをこすれば、\nいままでよりも遥かに甘い声がする。
2150 = "Tôi gập eo lại, cố ý dùng bụng dưới cọ xát vào âm vật,\ncô ấy liền phát ra giọng rên ngọt ngào hơn hẳn từ nãy đến giờ."
# monologue
# JP: （ぐっっ―ぐじゅっ―みゅっ―ズリュッ―）
2511 = "（Miết——gu ju——myu——zu ryu——）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　あっ！？　やっ―うそっ―ふあっ―\nいっぱい、なのに―みちみち、してて、きつい、のに」
1523 = "「Ha! A!? A——không thể nào——pha——\nĐầy ắp, rồi mà——căng cứng, chật chội, thế mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1597 = "「嗚！！！」" 
# monologue
# JP: じゅぶじゅぶできゅうきゅうでキツキツだった―\nそれだけだった膣内も、ほぐれたように蠢きはじめる。
2037 = "Bên trong âm đạo vốn dĩ chỉ nhầy nhụa, chật chội và khít khao——\ngiờ cũng bắt đầu ngọ nguậy như đã được nới lỏng."
# monologue
# JP: （ずりゅっ―ぐいいいっ―こしゅんっ―じゅぶぅ）
2505 = "（Trượt——đâm sâu——cọ xát——ju bu）"
# 【ポーレット】
# display as 波萊特
# JP: 「すご、いっ―やぁ―はずかしっ―わたし、だって、\n―処女なのに―はじめてなのに―こんな、ふぁ」
1641 = "「Tuyệt, quá——a——xấu hổ quá——em, rõ ràng,\n——vẫn còn trinh——là lần đầu tiên——vậy mà, pha.」"
# 【稀咲】
# display as 稀咲
# JP: 「恥ずかしいなんて少しもないよ？　ただ単純に、\nそれだけ―体の、セックス相性がいいってことさ」
1362 = "「Không có gì phải xấu hổ cả đâu? Đơn giản chỉ là,\ncơ thể hai người, rất hợp nhau trong chuyện giường chiếu thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「相性―体の―セックスの―わたし、双鉄くんと\n―稀咲、とっ―」
1837 = "「Độ hợp nhau——của cơ thể——chuyện giường chiếu——em, với anh Soutetsu\n——và Kisaki——」"
# monologue
# JP: （きゅううううっ）
2590 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1597 = "「嗚！！！」" 
# monologue
# JP: 急に甘やかに絞られて、危うく吐精しそうになる。\nというか、やばい。動けば、馴染めば、その度ごとに―
2089 = "Đột nhiên bị siết chặt một cách ngọt ngào, tôi suýt chút nữa thì phụt tinh.\nHay đúng hơn là, tiêu rồi. Cứ mỗi lần tôi cử động, mỗi lần quen dần thì——"
# monologue
# JP: （じゅぶっ！　ずりゅうっ！　ぐちゅっ！　じゅぶう！）
2538 = "（Ju bu! Zu ryuu! Gu chu! Ju buu!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！！　いい、いいよぉ！　相性、いいのっ―\nふあっ！　うれし―嬉しいっ―嬉しい、嬉しいっ！」
1480 = "「Pha!! Thích, thích lắm! Hợp nhau, lắm——\nPha! Vui——vui quá——vui quá, vui quá đi!」"
# monologue
# JP: 馴染む、ほぐれる、急速に僕にフィットしてくれている。\n稀咲のと全く違った感触なのに、同じくらいに安心できて
2196 = "Thích ứng, thả lỏng, cô ấy nhanh chóng hòa hợp với tôi.\nDù cảm giác hoàn toàn khác với Kisaki, nhưng lại mang đến sự an tâm tương đương."
# monologue
# JP: （じゅばっ！　ばちゅっ！　ずぶっ！　ぱつっ！！！）
2535 = "（Ju ba! Ba chu! Zu bu! Pa tsu!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！？　あっ！　あっ！　あっ！　あっ！\nおちん、ちん！　んっ―双鉄、くんの―はげ、し」
1490 = "「Hyau!? A! A! A! A!\nDương, vật! Ưm——của anh Soutetsu——mãnh liệt, quá」"
# monologue
# JP: （ずびゅ！　じゅぶっ！　ばちゅっ！　ぢゅぼっ！）
2604 = "（Zu byu! Ju bu! Ba chu! Ju bo!）"
# monologue
# JP: 加速していく。何も考えられなくなる。\nただただただただこのおまんこにその最奥に射精したくて。
2187 = "Tôi tăng tốc. Chẳng còn suy nghĩ được gì nữa.\nChỉ muốn, chỉ muốn bắn tinh vào tận cùng sâu thẳm của cái âm đạo này."
# monologue
# JP: （ぶぢゅっ！　ぱんっ！　ぢゅぶっ！　ずぱんっ！！）
2548 = "（Bu ju! Pan! Ju bu! Zu pan!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　んっ！　おまんこ、おまんこっ！\nわたしの、なに、これっ―ぎゅううって、して、ふあ」
1477 = "「Pha! Ưm! Âm đạo, âm đạo!\nCủa em, gì thế, này——đang siết chặt, lấy, pha」"
# monologue
# JP: （ずぶっ！　ずばっ！　ばちゅっ！　ずぱんっ！！！）
2605 = "（Zu bu! Zu ba! Ba chu! Zu pan!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　あっ！　あっ！　あっ！　ごちゅって―\nおくっ、がっ！　いちばん、奥に―あちゅいの、がっ」
1522 = "「Ha! A! A! A! Chạm kịch——\nbên trong, rồi! Nơi sâu, nhất——nóng hổi, quá」"
# monologue
# JP: 解る。感じる。ポーレットの子宮口も僕の精液を求めてる。\n一番奥を突く度に、控えめに甘く吸い付いてきて―っ！
2178 = "Tôi biết. Tôi cảm nhận được. Cửa tử cung của Paulette cũng đang khao khát tinh dịch của tôi.\nMỗi lần đâm vào nơi sâu nhất, nó lại khẽ khàng mút lấy một cách ngọt ngào——!"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット―ポーレット……僕は、もう」
1773 = "「Paulette——Paulette……Anh, sắp」"
# 【ポーレット】
# display as 波萊特
# JP: 「わらひっ！　わたしも、双鉄くん―んあっ！！\nあっ！　だから―きて、きて、きてっ！　きてっ！！」
1712 = "「E! Em cũng vậy, anh Soutetsu——ưm a!!\nA! Nên là——vào đi, vào đi, vào đi! Vào đi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1892 = "「！」" 
# monologue
# JP: （ずばっ！　ばちゅっ！　ずびゅっ！　ごちゅっ！！！）
2531 = "（Zu ba! Ba chu! Zu byu! Go chu!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ほし、い、のっ―や、ぁ―そうてつ、く―の―\nせいえき、せいえき―わたしの、おく、にっ！！」
1644 = "「Muốn, quá——ya, a——của anh, Soutetsu——\ntinh dịch, tinh dịch——vào sâu, bên trong, em!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっ」
# 1574 = "「啊！」" 
# monologue
# JP: どれほどに食いしばっても、声が、欲が零れてしまう。\n最悪感が快感と混じり膨れ上がって、息苦しくて―
2003 = "Dù có cắn chặt răng đến đâu, giọng nói và dục vọng vẫn cứ trào ra.\nCảm giác tội lỗi hòa quyện cùng khoái cảm phình to lên, khiến tôi nghẹt thở——"
# 【ポーレット】
# display as 波萊特
# JP: 「そうてつくんの！　精液、たくさん！　おまんこ―\nおくっに！　一番、奥、にっ！　ぴゅっぴゅ、してぇ！」
1878 = "「Của anh Soutetsu! Tinh dịch, thật nhiều! Vào trong——\nâm đạo! Nơi sâu, nhất! Hãy bắn, vào đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！」
1895 = "「!!!!!!!」"
# monologue
# JP: （ずぶううううううううううううううっ！　ごちゅっ！）
2540 = "（Zu buu uu uu uu uu uu uu uu uu uu uu uu uu uu! Go chu!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゅぁぁぁっぁぁぁぁあああああああああああんっ！」
1440 = "「Kyua a a a a a a a a a a a a a a a a a a n!」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！！！」
1906 = "「～～～～!!!」"
# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるっ！　ぶびゅっ！）
2522 = "（Byu bu! Byu! Byu ru! Bu byu!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ―あっ！　あっ！　あああっ！　精液、きてる！\nあついの、たくさん―双鉄くんの―精液、がっ」
1539 = "「A——a! A! Aaa! Tinh dịch, đang trào vào!\nNóng hổi, rất nhiều——tinh dịch, của anh Soutetsu——」"
# monologue
# JP: 射精している。ポーレットの―稀咲ではない女の子宮に。\n避妊をいくらしているとはいえ、生で、直接、そのままに。
2166 = "Tôi đang xuất tinh. Vào tử cung của Paulette——một người con gái không phải Kisaki.\nDù có dùng biện pháp tránh thai đi chăng nữa, thì vẫn là đâm trần, trực tiếp, cứ thế bắn vào."
# monologue
# JP: （びゅっ！　びゅう！！　びゅるっ！　びゅっ！）
2542 = "（Byu! Byuu!! Byu ru! Byu!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ―しゅごい―しあわせっ―ゆめ、みたい―\nあっ―わたし、ほんとに、―おまんこ、にっ」
1545 = "「Ha——tuyệt quá——hạnh phúc quá——như một, giấc mơ——\nA——em, thật sự——trong âm đạo, rồi」"
# monologue
# JP: 罪悪感が、肉の快感が凄すぎて、吐き気がしてくる。\n汗がぶわぶわ吹き出して、止まるものともおもえない。
2353 = "Cảm giác tội lỗi, khoái cảm thể xác quá mãnh liệt, khiến tôi có cảm giác buồn nôn.\nMồ hôi túa ra như tắm, tưởng chừng không thể nào ngừng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……あ―ぁ……ん―（ごくっ）―いっぱい、\nせい、えき―双鉄、くんの……溢れ、そう……」
1467 = "「Pha……a——a……ưm——（Ực）——đầy ắp,\ntinh, dịch——của anh, Soutetsu……sắp tràn, ra rồi……」"
# monologue
# JP: （びゅう！　びゅっ―びゅるっ―びゅう―）
2551 = "（Byuu! Byu——byu ru——byuu——）"
# monologue
# JP: 射精が長い。焦らされていた分、溜まっていた分―\nそれをどくどく、ポーレットの子宮に注いでしまって―
2146 = "Quá trình xuất tinh kéo dài. Bao nhiêu phần bị dồn nén, bao nhiêu phần bị tích tụ——\ntôi trút hết từng đợt, từng đợt vào tử cung của Paulette——"
# monologue
# JP: （びゅっ―ぴゅっ―ぴゅう…………ぴるっ）
2520 = "（Byu——pyu——pyuu…………pi ru）"
# 【ポーレット】
# display as 波萊特
# JP: 「すごい……わたし―ほんとに、セックス―\nセックス―双鉄くん、と……稀咲、と」
1635 = "「Tuyệt quá……em——thật sự, đã làm tình——\nlàm tình——với anh Soutetsu……và, Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。したね。セックスを」
1736 = "「Đúng vậy. Chúng ta đã làm. Làm tình.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1610 = "「嗯」" 
# monologue
# JP: ―稀咲とポーレットの手は未だ、繋がれている。\nそうと気づけば、たまらなくって止まらなくなる。
959 = "——Tay của Kisaki và Paulette vẫn đang đan vào nhau.\nNhận ra điều đó, tôi không thể kìm nén được nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲っ」
1808 = "「Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。―来て？　双鉄」
1606 = "「Ừm. ——Vào đi? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！！！！！」
1896 = "「!!!!!!!!!!!」"
# monologue
# JP: （ずぶううううううううっっっっっっっっっ！！！！）
2599 = "（Zu buu uu uu uu uu uu uu uu uu uu uu uu uu uu!!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「かはっ！　ちょっ―双鉄っ―んっ―\nこんな―いき、なりっ―あんっ―あっ」
1573 = "「A! Khoan——anh Soutetsu——ưm——\nthế này——đột, ngột quá——a ưm——a」"
# monologue
# JP: （ずぶっ！　ばちゅっ！　じゅばっ！　ごちゅっ！！）
2602 = "（Zu bu! Ba chu! Ju ba! Go chu!!）"
# monologue
# JP: 受け入れられてる。愛撫もなにもまったくなしで、\nそれでも稀咲は、僕の全部を迎えてくれるっ。
2079 = "Cô ấy đang tiếp nhận tôi. Dù không hề có màn dạo đầu hay vuốt ve gì cả,\nKisaki vẫn đón nhận toàn bộ con người tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「っ―きさ、きっ―～～～っ！　きもち……いい」
1590 = "「Ư——Kisa, ki——～～～! Sướng……quá」"
# monologue
# JP: （ずぶっ！　ばちゅっ！　ぢゅぶっ！　ずびゅっつ！！）
2603 = "（Zu bu! Ba chu! Ju bu! Zu byu tsu!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ボク……も、だ―双鉄……んっ―はっ―あっ―\n今日は―なん、だかっ―いっつも、より、もっ―」
1673 = "「Em……cũng, vậy——anh Soutetsu……ưm——ha——a——\nHôm nay——sao, nhỉ——cảm giác, hơn hẳn, mọi khi——」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ―」
# 964 = "「——」" 
# monologue
# JP: 目の端、きゅっと小さな動き。\nつなぎあってるふたりの手が、いっそう強く結ばれる。
2087 = "Khóe mắt cô ấy khẽ giật. Hai bàn tay đang đan vào nhau siết chặt hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「当然、だろう―」
1787 = "「Tất nhiên, rồi——」"
# monologue
# JP: （ずばっ！　ばちゅっ！　じゅぶっ！　ごりゅっ！！）
2530 = "（Zu ba! Ba chu! Ju bu! Go ryu!!）"
# monologue
# JP: たくさん、だした。射精した。\nけれど決して―決してあれで全部ではない。
2148 = "Tôi đã bắn rất nhiều. Đã xuất tinh.\nNhưng tuyệt đối——tuyệt đối đó chưa phải là tất cả."
# monologue
# JP: （ずっ―ぴたっ。―じゅぶうううっっ―くりゅっ）
2558 = "（Rút——dừng lại. ——Ju buu uu u——ku ryu）"
# 【稀咲】
# display as 稀咲
# JP: 「きゃふっ！！！？　あ―やだっ―双鉄っ―んっ。\nそんな―急に―急に―こんなのっ―」
1442 = "「Kya fu!!!? A——đừng——anh Soutetsu——ưm.\nThế này——đột nhiên——đột nhiên——thế này——」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　どうしたの？　稀咲、平気っ！？」
1580 = "「Ế!? Sao thế? Kisaki, cậu không sao chứ!?」"
# 【稀咲】
# display as 稀咲
# JP: 「あ―平気―あのっ―んふっ―あっ！！！」
1546 = "「A——không sao——cái đó——ưm fu——a!!!」"
# monologue
# JP: （ぞりゅう―くりゅっ―こりゅっ―しにゅっ！）
