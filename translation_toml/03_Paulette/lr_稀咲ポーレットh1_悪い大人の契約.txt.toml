# 【ポーレット】
# display as 波萊特
# JP: 「ひうっ！？」
1595 = "「Hiu!?」"
# 【稀咲】
# display as 稀咲
# JP: 「……なにを今さらカマトトぶってるのかな？\nポーレットが望んで、仕掛けてきての結果じゃないか」
991 = "「……Đến giờ còn giả vờ ngây thơ làm gì nữa?\nChẳng phải đây là kết quả do chính Paulette mong muốn và sắp đặt sao.」"
