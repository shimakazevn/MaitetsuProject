1549 = "Quả thực là một nụ hôn. Cơ quan sinh dục với cơ quan sinh dục, da thịt với da thịt, thậm chí cả tóc và móng tay.\nTất cả những phần chạm vào nhau đều đang níu kéo, quấn quýt lấy nhau. Vì thế――"
