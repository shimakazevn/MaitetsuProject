1174 = "「Vâng. Và chắc chắn là, dù ở gia đình nào,\nnhững người làm cha, làm mẹ nào cũng vậy」"
# monologue
# JP: （すりっ）
# 1725 = "（磨蹭）" 
# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 1094 = "「嗯」" 
# monologue
