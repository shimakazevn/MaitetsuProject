1088 = "「Ưm――fufu――Anh Soutetsu cũng, phát ra......\ntiếng――rên rỉ rồi, còn, gì――ưm」"
# monologue
# JP: （くっ――ぷっ――ずっ――）
1666 = "（Hự——Phụt——Phập——）"
# monologue
