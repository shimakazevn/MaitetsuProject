# JP: （グッ――ぐくっ――ずくっ――じゅむっ）
1743 = "（輕插——滑動——磨蹭——重捅）" 

# 【ポーレット】
# display as 波萊特
# JP: 「っっ～～！　っ――チュッ――ちゅうっ――はっ――\nジュルっ――チュッ――っ～～チュズッ――（ごくっ）」
1042 = "「唔唔～～！——啾——啾唔——哈——啾嚕——啾——唔～～啾茲——（吞嚥）」" 

# monologue
# JP: （くぐっ――ちぷっ――コッ――ずちゅっ）
1718 = "（滑動——捅入——蹭進——蹭出）" 

# monologue
# JP: キスをしながら、密着しながら、\n小刻みに小刻みに腰を動かす。
1437 = "我們全身都緊貼在一起，我在與波萊特熱吻的同時，也不忘小幅度地扭動腰部。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ンッ――チュッ――っ――はっ――チュむっ――\nちゅうっ――れりゅ――れろっ――れろっ――ちゅぶっ」
1089 = "「嗯——啾——唔——哈——啾唔——啾——滋溜——滋溜——滋溜——啾噗」" 

# monologue
# JP: 腰をわずかにゆするたび、肌の全てがぬらつき擦れる。\nポーレットの豊かなおっぱいが、僕の胸板で形を変える。
1500 = "每次輕輕擺腰，兩人的全身皮膚就會互相滑蹭。波萊特豐滿的乳房都在我的胸膛上壓得變了形。" 

# monologue
# JP: （グッ――コッ――ズブッ――ヴゅぶっ――）
1741 = "（蹭進——蹭出——擠進——擠出）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぢゅるるうっ――（こくっ）――チュッ――ちゅむっ、\nちゅるっ――チュッ――れるるうっ――ちゅずっ」
1085 = "「啾嚕嚕嚕——（吞嚥）——啾——啾嗯，啾嚕——啾——滋嚕嚕——啾茲」" 

# monologue
# JP: お互い何度も飲み下し、それでも唾液がぼとぼと落ちる。\n落ちた唾液が汗と混じって、結合部にまでたれ注ぐ。
1438 = "我們吞嚥了一次又一次，然而唾液還是不斷往下滴。滴落的唾液與汗水混在一起，流注於兩人的結合部。" 

# monologue
# JP: （にゅぶっ――こちゅんっ――じゅじゅう――ぐにっ）
1696 = "（插入——抽出——蹭入——搗弄）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はああっ！　あっ！　――んムッ！？　ちゅっ――\nれるっ――れりゅっ――ジュルっ――チュッ――ちゅう」
1220 = "「蛤啊啊！啊！——嗯唔！？啾——滋溜——滋嚕——啾嚕——啾——啾唔」" 

# monologue
# JP: 息継ぎをするポーレットを何度も捕まえまたキスをして。\nただただ小さく、ひたすら腰を動かし続ける。
1427 = "我一次次抓住鬆口喘氣的波萊特，把她拖入再度的長吻中，同時腰部依然保持著小幅度的扭擺。" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ――～～～っ――っ！　ぁっ――んむっ――\nチュッ――ちゅうううっ――ヂュルッ――（ごくっ）」
1040 = "「唔——嗯～～～唔——！啊——嗯唔——啾——啾唔唔唔——啾嚕——（吞嚥）」" 

# monologue
# JP: いつもと違う射精感が、ぞわぞわじくじくこみ上げてくる。\n潮が満ちていくように、ただじわじわと、ゆっくりと。
1335 = "不同於以往的射精感一點一滴地湧了上來。這感覺就像漲潮，不緊不慢穩步升高。" 

# monologue
# JP: （グッ――こぢゅっ――ヂュぶっ――ぐぢゅうっ）
1678 = "（戳入——蹭出——蹭進——蹭出）" 

# monologue
# JP: 子供が寝てる襖一枚隔てた横で、その母親に膣出しをする。\n旅先ゆえの背徳感と緊張感が、精液水位をさらに嵩ます。
1386 = "孩子就在隔扇門的另一邊熟睡，而我卻要在這裡內射她的母親。旅途中特有的背德感和緊張感，更是讓精液水漲船高。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れりゅっ――りゅっ！　じゅるるるるっ――（ごくっ）\nぷあっ――ね、双鉄くん――ンッ――ちゅ、ちゅむっ！」
1201 = "「滋嚕——嚕！滋嚕嚕嚕嚕——（吞嚥）噗啊——雙鐵君——嗯——啾、啾唔！」" 

# monologue
# JP: キスをほどいて名を呼ばれ。それが無くとも伝わっている。\nポーレットの膣の収縮が、射精を強要してくるゆえに。
1531 = "波萊特鬆開嘴巴呼喚我的名字。然而一切盡在不言中。因為她的肉穴的收縮就是在催促我射精。" 

# monologue
# JP: （じゅっ――ごつゅっ！　――じゅるっ――ぐにゅっ！）
1742 = "（蹭進——蹭出！　—蹭進——蹭出！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「っぁっ――ンッ――れるっ――ちゅむっ！\nちゅっ！　ちゅうう！　ちゅっ！　れりゅっ！！」
1060 = "「啊——嗯——滋溜——啾嗯！啾！啾唔唔！啾！滋嚕！！」" 

# monologue
# JP: 狭い範囲で、極力強く。\nその単純な運動が、僕らのこころを更に重ねる。
1465 = "我用盡全力進行小幅度的抽插。而這種單純的運動更加拉近我倆的內心。" 

# monologue
# JP: （ジュルっ――こっ！　にゅぶっ――こんっ！）
1735 = "（蹭動——收緊！攪弄——收縮！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！　っ！　っ！　～～～～～っ！！！」
1044 = "「唔！唔！唔！唔～～～～～！！！」" 

# monologue
# JP: 勃起がぶくぶく膨らんでいる。膣がキチキチ締めている。\n密着感が極限にまで高まって、今までと同じ動きでも――
1545 = "硬物越脹越大。而肉穴越收越緊。貼合感爬升到了極限，雖然做的動作跟之前沒兩樣——" 

# monologue
# JP: （みちゅっっ――ぶぢゅっ！　ぬちいいっっ――ごっ！）
1732 = "（裹緊——抽插！磨蹭——收緊！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――チュむっ――ちゅ！　れりゅうううっ！\nりゅっ！　にゅる！　チュルルっ――ちゅむううっ！」
1056 = "「啊——啾唔——啾！滋嚕嚕嚕嚕！嚕！啾嚕！啾嚕嚕——啾嗯嗯嗯！」" 

# monologue
# JP: キスが必死なものになる。\n絶頂の声を決して立てないように。僕も、同じくっ――
1441 = "我們開始拚命激吻。為的是不在高潮時叫出聲來。我也一樣——" 

# monologue
# JP: （みぢゅっ――ごっ！　んにヂュウウッ――ごちゅっ！）
1740 = "（蹭進——收緊！蹭出——收縮！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！」
1046 = "「唔～～～～～～～！！！」" 

# monologue
# JP: （きゅううううううっっっ！！！）
1662 = "（劇烈收縮！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1016 = "「呃！！！！」" 

# monologue
# JP: （ぶびゅっ！　びゅぶっ！　ぶっ！　びゅううう！！）
1676 = "（噗咻！咻噗！噗！咻嚕嚕嚕！！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！　～～～っ！！　っ――ぁっ――っ！！！」
1045 = "「唔！！！唔～～～！！唔——啊——唔！！！」" 

# monologue
# JP: （ぶりゅ！　びゅうっ　みびゅっ！　びゅぶるっ！）
1674 = "（噗咻！咻唔！噗咻！噗咻嚕！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
705 = "「——」" 

# monologue
# JP: 溜まりに溜まって粘度をました精液が、\nポーレットの膣にぶつかりこびりついていってる。
1551 = "積攢已久的黏稠精液，不斷澆灌在波萊特的肉穴裡。" 

# monologue
# JP: （びゅうっ――ぶっ――ビュルっ――ぶぴゅっ――）
1671 = "（咻唔——噗——咻嚕——噗咻——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぷあっ！　あっ――はっ――あっ――しゅごっ――\nおまんこ――しきゅう――すごい――こい、のっ」
1113 = "「噗啊！啊——哈——啊——好厲害——小穴——子宮——好多——濃濃的」" 

# monologue
# JP: （びゅ――ぶ、びゅっ――ビュルっ――ぷ……ぴ――）
1669 = "（咻——噗，咻——咻嚕——噗……咻——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「……こくて、あつくて――んっ――どろどろ、の……\nぁ――そうてつ、くんの――おまんこ、いっぱい……」
730 = "「……又濃又燙——嗯——黏糊糊的……啊——雙鐵君的——小穴，填得滿滿的……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1094 = "「嗯」" 

# monologue
# JP: 体力的にきつくあり、射精自体もすごすぎた。\n喪失感にも似た脱力が、僕の全身をいきなり包む。が――
1588 = "體力上消耗甚大，加之過度激烈的射精。讓整個身體突然被一種空落落的脫力感所包圍。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「素敵だった。最高だった。\nポーレット――好きだ。愛してる――んっ」
1122 = "「太美妙太完美了。波萊特——我喜歡你。我愛你——嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……チュッ――ちゅっ――んっ――ふぁっ。\nん……えへへっ――わたしも、愛しています。双鉄くん」
1062 = "「啊……啾——啾——嗯——呼啊。嗯……哎嘿嘿——我也愛你。雙鐵君」" 

# monologue
# JP: （ぎゅうううううっ）
1728 = "（緊緊抱住）" 

# monologue
# JP: そうしたいから、喘ぎを抑えるためにではないキスをして。\n体を隠すためにではないハグをする。
1442 = "我們順從本心深情擁吻，再也不是為了壓低呻吟聲，或者為了遮掩身體。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……できましたかね？\nひかりとれいなの、弟くんか、妹ちゃん」
726 = "「……也不知道能不能懷上光和玲奈的，弟弟或妹妹」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さぁ。どうだろうな。\nそれは僕にはわからない」
1223 = "「誰知道呢。這種事我也不知道」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え～～！　それはそうなんでしょうけど」
1036 = "「哎～～！話是這麼說啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「声」
1215 = "「聲音」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1078 = "「啊！」" 

# monologue
# JP: ぷくりふくれて、慌ててしぼんで、照れて赤らむ。\nほっぺひとつを取るだけで、こんなにかわいく愛おしい。
1522 = "波萊特慌慌張張地縮起腦袋，鼓著臉頰滿臉通紅。只不過是鼓起臉頰，她就變得這麼可愛動人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、な？　ポーレット――」
958 = "「不過呢？波萊特——」" 

# monologue
# JP: 息をひそめる。様子を伺う。……………………。大丈夫。\n襖の向こうに満ちているのは、ただ熟睡の気配のみ、だ。
1439 = "我們安靜下來探聽對面的動靜…………沒問題。隔扇門的另一頭沒有絲毫要醒來的跡象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでもひとつだけはわかる」
984 = "「即便如此，有件事我可以肯定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1078 = "「啊！」" 

# monologue
# JP: ゆえに勃起は、すぐに硬度を取り戻す。\nいわずもがなの言葉をけれど、あえて伝えることにする。
1479 = "所以硬物很快恢復了硬度。此時我特地強調了一個特別簡單的道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「膣内射精の数を重ねれば重ねるほどに」
994 = "「只要不斷增加內射的次數」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　それならね、双鉄くぅん」
1156 = "「我說啊。既然如此呢，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お」
1038 = "「哦」" 

# monologue
# JP: ポーレットが再びころんとねころがる。\n大きく大きく股を開いて、射精をされたばかりの膣を――
1521 = "波萊特再度躺下身子。她把大腿完全敞開，把剛被內射的肉穴——" 

# monologue
# JP: （くぱあっ）
# 1682 = "（扒開）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ニ回目ですから。動きも声も、\nずっと落ち着けるんじゃないかって、思うんですけど」
1208 = "「畢竟是第二回了。我想動靜和聲音，應該會比第一次小得多吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうだろう」
1232 = "「這可很難說」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええ～～っ」
1035 = "「哎～～」" 

# monologue
# JP: 正常位では、腰を思い切り打ち付ける衝動を抑えきれずに、\n肉と肉とのぶつかる音を、恐らく大きく立ててしまおう。
1541 = "用正常體位的話，我會無法控制自己盡情挺腰衝撞的衝動，肉與肉的碰撞聲，恐怕只會更加響亮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫。僕に上等な代案がある」
1190 = "「沒關係。我有個更好的方案」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
# 1068 = "「啊」" 

# monologue
# JP: ポーレットの目がきらきら輝く。きらきら――淫靡に。\n今なら恐らくどんな体位も受け入れてくれることだろう。
1525 = "波萊特的眼睛閃著淫靡的光彩。此時此刻的她大概無論什麼體位都能接受吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その代案とは」
1157 = "「我說的方案是指」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1068 = "「啊」" 

# monologue
# JP: 体を寄せて、足をしっかりつかまえる。\n家族旅行の夜をまだまだ――終わらせぬため。
1459 = "我探過身子，把她的雙腳穩穩抓住。為了讓家庭旅行的夜晚——長久地延續下去。" 
