1072 = "「A――chụt――chùn chụt――nyumuru――\nNyu――chụt――jurururu~――（ực）」"
# monologue
# JP: ぷぁ、と小さな吐息とともにキスがはがれる。\nおでこを軽く擦り付けられれば、髪の香りが鼻をくすぐる。
1578 = "Cùng với một tiếng thở hắt ra nhỏ bé, nụ hôn tách rời.\nKhi trán chúng tôi khẽ chạm vào nhau, hương thơm từ mái tóc em ấy làm sống mũi tôi ngưa ngứa."
# 【双鉄】
# display as 雙鐵
