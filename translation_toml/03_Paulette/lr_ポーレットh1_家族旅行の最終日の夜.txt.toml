1440 = "Vừa hôn nhau, vừa ôm nhau, hông của Paulette\náp sát vào cơ quan sinh dục của tôi, và chầm chậm chuyển động."
# monologue
# JP: （ニュルッ――にゅっ――プチュッ――こしゅっっ）
1715 = "（Trơn tuột——Trượt——Nhóp nhép——Cọ xát）"
# 【ポーレット】
# display as 波萊特
