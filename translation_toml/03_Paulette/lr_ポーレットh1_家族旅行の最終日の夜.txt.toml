# display as 波萊特
# JP: 「あっ――はぁっ――あっ――ンッ――角度――\nもっと――ねっ――深くっ――縦、にっ――っ」
1061 = "「A——ha——a——ưm——Góc độ——\nNữa đi——sâu hơn nữa——dựng thẳng lên——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1094 = "「嗯」" 
# monologue
# JP: （じゅぶっ――ぐうううっ――――ごちゅっ！！！）
1684 = "（Rút ra——đẩy vào――――lút cán!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ――ふぁっ――あっ、これ――しゅきっ――\nっっ――ふっ――ねっ――このまま――もっと」
1096 = "「Ưm——pha——a, thế này——thích quá——\nư——phu——nè——cứ thế này——nữa đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1094 = "「嗯」" 
# monologue
# JP: （ぐっ――くうっっ――ごちゅっ！！\nじゅぶっ――にゅるうっっ――ぶちゅんっ！）
1745 = "（Thọc——thọc——lút cán!!\nRút ra——đẩy vào——lút cán!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――っ――ふあ――あっ――おくっ――おちんちん\n――きとう――あたると――頭も、ごちゅっって――」
1049 = "「A——ư——pha——a——bên trong——dương vật\n——quy đầu——chạm vào——đầu em cũng, như muốn nổ tung——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そのたびに――僕も強烈に絞られている」
1169 = "「Đúng vậy. Mỗi lần chạm vào đó——anh cũng bị siết chặt dữ dội.」"
# monologue
# JP: 体を持ち上げ落とす動きに、腕がじわじわキツくなる。\nが、その何倍も――断続的にくる締め付けがキツすぎる。
1485 = "Động tác nâng lên hạ xuống cơ thể khiến cánh tay tôi dần trở nên nhức mỏi.\nNhưng, gấp nhiều lần thế nữa——là những cơn co thắt ngắt quãng quá mức mãnh liệt."
# 【双鉄】
# display as 雙鐵
# JP: 「勃起全部を根本から先に順番に――っ――\nおまんこ肉で、みっちり――乳搾りされてるような――」
1129 = "「Toàn bộ dương vật từ gốc đến ngọn đều bị——\nLớp thịt âm đạo siết chặt——cứ như đang vắt sữa vậy——」"
# 【ポーレット】
# display as 波萊特
# JP: 「やぁんんっ」
1008 = "「Á ưm」"
# monologue
# JP: （きゅっ――くきゅうううっっっんっ！！）
1729 = "（Siết chặt——co thắt kịch liệt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っあっ！」
# 1078 = "「啊！」" 
# monologue
# JP: 思いっきりに腰をふれない。ふたりで息を合わせなければ、\n大きな動きさえもできない。
1504 = "Không thể thoải mái lắc eo. Nếu hai người không phối hợp nhịp nhàng,\nthì ngay cả những cử động lớn cũng không thể làm được."
# monologue
# JP: （ぐちゅっ――ぶっ――ごちゅっ！\nぐくっ――じゅぶううっ――どちゅっ！！）
1694 = "（Đâm vào——rút ra——đâm vào!\nCọ xát——rút ra——đâm vào!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　あっ！　あっ！　あっ！！！　いいっ――\nんっ！　これ――もっと――そうてつくん――もっとっ」
1032 = "「Ha! A! A! A!!! Tuyệt quá——\nƯm! Thế này——nữa đi——anh Soutetsu——nữa đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1094 = "「嗯」" 
# monologue
# JP: ゆえにただ同じ動きを、一番の気持ちいい動きを繰り返す。\n単調に、ただ単調に。それが却って、一体感を強くする。
1477 = "Do đó, tôi chỉ có thể lặp đi lặp lại cùng một động tác, động tác mang lại khoái cảm nhất.\nThật đơn điệu, vô cùng đơn điệu. Nhưng điều đó lại càng làm tăng thêm cảm giác hòa làm một."
# monologue
# JP: （じゅっ――ろろおおおおっ――ごちゅっ！\nぷっ――ぢゅううううううっっ――ばちゅっ！）
1699 = "（Đâm vào——đẩy tới——lút cán!\nRút ra——đẩy tới——lút cán!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――ねっ――ふあっ――もっと――\nそうてつ、くんっ――おまんこ――もっと――」
1020 = "「Pha——a——nè——pha——nữa đi——\nAnh Soutetsu——âm đạo——nữa đi——」"
# monologue
# JP: 一度も射精していないのに、一度も絶頂させてないのに、\n性の匂いが、むせ返るほど濃くなっている。
1495 = "Dù tôi chưa xuất tinh lần nào, dù chưa để em lên đỉnh lần nào,\nnhưng mùi hương nhục dục đã trở nên nồng nặc đến mức nghẹt thở."
# monologue
# JP: （じゅっ――ぶうううじゅっ――ばちゅっ！\nぶじゅっ――ずろおろおおおおっ――ごちゅっ！！）
# 1699 = "（插入——推進——到底！抽出——推進——到底！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あっ！！　これっ！　しゅきっ！」
1007 = "「Hya! A!! Thế này! Em thích lắm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット――っ！」
1196 = "「Paulette——!」"
# 【ポーレット】
# display as 波萊特
# JP: 「んむっ！？！　んっ――ちゅっ――じゅりゅっ――\nりゅっ――れるっ――ちゅぷっ――ちゅむっ――ぷぁ」
1043 = "「Ưm!?! Ưm——chụt——chu ryu——\nryu——rê ru——chu pu——chu mu——pha」"
# 【双鉄】
# display as 雙鐵
# JP: 「声が、大きい。起こしてしまって、\nここで中断などとなったら、やりきれなかろう」
972 = "「Tiếng em lớn quá. Lỡ đánh thức mọi người dậy,\nrồi phải dừng lại giữa chừng thì chịu sao nổi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――うんっ――けどっ――ふあっ、あっ――\nけど、ね？　そうてつくぅん」
1058 = "「A——ưm——nhưng mà——pha, a——\nnhưng mà, anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1094 = "「嗯」" 
# monologue
# JP: （じゅっ――ジュルルうう――ごちゅっ！\nじゅぶっ――グヂュううううっ――ぶちゅっ！）
# 1699 = "（插入——推進——到底！抽出——推進——到底！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　ぁ――うっ――～～～～～っ！\nけどっ――これっ――ごちゅってなると――声、勝手に」
1005 = "「Hya! A——ư——～～～～～!\nNhưng mà——thế này——cứ đâm lút cán là——em lại không kiềm được tiếng rên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――ほら、もう一度だ――ちゅっ」
1165 = "「Vậy thì——này, thêm lần nữa nhé——chụt」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ――んっ――ちゅうっ――チュッ――れるっ――\nリュッ――じゅるっ――じゅろっ――ちゅむ――っ！？」
1083 = "「Chụt——ưm——chụt——chụt——rê ru——\nryu——chu ru——chu ro——chu mu——!?」"
# monologue
# JP: （グッ――ぐくっ――ずくっ――じゅむっ）
1743 = "（Đâm nhẹ——trượt——cọ xát——đâm mạnh）"
# 【ポーレット】
# display as 波萊特
# JP: 「っっ～～！　っ――チュッ――ちゅうっ――はっ――\nジュルっ――チュッ――っ～～チュズッ――（ごくっ）」
1042 = "「Ư～～! Ư——chụt——chụt——ha——\nchu ru——chụt——ư～～chu zu——（Ực）」"
# monologue
# JP: （くぐっ――ちぷっ――コッ――ずちゅっ）
1718 = "（Trượt——đâm vào——cọ——rút ra）"
# monologue
# JP: キスをしながら、密着しながら、\n小刻みに小刻みに腰を動かす。
1437 = "Vừa hôn nhau, vừa áp sát vào nhau,\ntôi liên tục lắc eo từng nhịp nhỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「ンッ――チュッ――っ――はっ――チュむっ――\nちゅうっ――れりゅ――れろっ――れろっ――ちゅぶっ」
1089 = "「Ưm——chụt——ư——ha——chu mu——\nchụt——rê ryu——rê ro——rê ro——chu bu」"
# monologue
# JP: 腰をわずかにゆするたび、肌の全てがぬらつき擦れる。\nポーレットの豊かなおっぱいが、僕の胸板で形を変える。
1500 = "Mỗi lần tôi khẽ lắc eo, toàn bộ da thịt trơn trượt lại cọ xát vào nhau.\nĐôi gò bồng đảo căng mọng của Paulette ép chặt lên lồng ngực tôi đến biến dạng."
# monologue
# JP: （グッ――コッ――ズブッ――ヴゅぶっ――）
1741 = "（Cọ vào——cọ ra——đâm vào——rút ra——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぢゅるるうっ――（こくっ）――チュッ――ちゅむっ、\nちゅるっ――チュッ――れるるうっ――ちゅずっ」
1085 = "「Chu ru ru——（Ực）——chụt——chu mu,\nchu ru——chụt——rê ru ru——chu zu」"
# monologue
# JP: お互い何度も飲み下し、それでも唾液がぼとぼと落ちる。\n落ちた唾液が汗と混じって、結合部にまでたれ注ぐ。
1438 = "Dù cả hai đã nuốt xuống không biết bao nhiêu lần, nước bọt vẫn không ngừng nhỏ giọt.\nNước bọt rơi xuống hòa quyện cùng mồ hôi, chảy ròng ròng xuống tận nơi giao hợp."
# monologue
# JP: （にゅぶっ――こちゅんっ――じゅじゅう――ぐにっ）
1696 = "（Đâm vào——rút ra——cọ xát——nhào nặn）"
# 【ポーレット】
# display as 波萊特
# JP: 「はああっ！　あっ！　――んムッ！？　ちゅっ――\nれるっ――れりゅっ――ジュルっ――チュッ――ちゅう」
1220 = "「Haaa! A! ——Ưm!? Chụt——\nrê ru——rê ryu——chu ru——chụt——chụt」"
# monologue
# JP: 息継ぎをするポーレットを何度も捕まえまたキスをして。\nただただ小さく、ひたすら腰を動かし続ける。
1427 = "Tôi liên tục bắt lấy Paulette mỗi khi cô ấy dừng lại để thở và tiếp tục hôn.\nĐồng thời vẫn không ngừng duy trì những nhịp lắc eo nhỏ nhặt."
# 【ポーレット】
# display as 波萊特
# JP: 「っ――～～～っ――っ！　ぁっ――んむっ――\nチュッ――ちゅうううっ――ヂュルッ――（ごくっ）」
1040 = "「Ư——～～～——! A——ưm——\nchụt——chụt——chu ru——（Ực）」"
# monologue
# JP: いつもと違う射精感が、ぞわぞわじくじくこみ上げてくる。\n潮が満ちていくように、ただじわじわと、ゆっくりと。
1335 = "Cảm giác muốn xuất tinh khác hẳn mọi khi râm ran, râm ran dâng trào.\nNhư thủy triều dâng, chầm chậm, từ từ dâng lên."
# monologue
# JP: （グッ――こぢゅっ――ヂュぶっ――ぐぢゅうっ）
1678 = "（Đâm vào——cọ ra——cọ vào——cọ ra）"
# monologue
# JP: 子供が寝てる襖一枚隔てた横で、その母親に膣出しをする。\n旅先ゆえの背徳感と緊張感が、精液水位をさらに嵩ます。
1386 = "Bắn tinh vào trong người mẹ, ngay bên cạnh đứa con đang ngủ say chỉ cách một cánh cửa kéo.\nCảm giác tội lỗi và căng thẳng khi đi du lịch càng làm mực tinh dịch dâng cao."
# 【ポーレット】
# display as 波萊特
# JP: 「れりゅっ――りゅっ！　じゅるるるるっ――（ごくっ）\nぷあっ――ね、双鉄くん――ンッ――ちゅ、ちゅむっ！」
1201 = "「Rê ryu——ryu! Chu ru ru ru——（Ực）\nPha——nè, anh Soutetsu——ưm——chu, chu mu!」"
# monologue
# JP: キスをほどいて名を呼ばれ。それが無くとも伝わっている。\nポーレットの膣の収縮が、射精を強要してくるゆえに。
1531 = "Cô ấy buông nụ hôn và gọi tên tôi. Dù không nói ra thì tôi cũng hiểu.\nBởi vì sự co thắt từ âm đạo của Paulette đang thúc giục tôi xuất tinh."
# monologue
# JP: （じゅっ――ごつゅっ！　――じゅるっ――ぐにゅっ！）
1742 = "（Cọ vào——cọ ra! ——Cọ vào——cọ ra!）"
# 【ポーレット】
# display as 波萊特
# JP: 「っぁっ――ンッ――れるっ――ちゅむっ！\nちゅっ！　ちゅうう！　ちゅっ！　れりゅっ！！」
1060 = "「A——ưm——rê ru——chu mu!\nChụt! Chụt! Chụt! Rê ryu!!」"
# monologue
# JP: 狭い範囲で、極力強く。\nその単純な運動が、僕らのこころを更に重ねる。
1465 = "Trong một phạm vi hẹp, tôi dùng sức mạnh nhất có thể.\nChuyển động đơn giản đó càng khiến trái tim chúng tôi hòa nhịp."
# monologue
# JP: （ジュルっ――こっ！　にゅぶっ――こんっ！）
1735 = "（Cọ xát——siết chặt! Đâm vào——co thắt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！　っ！　っ！　～～～～～っ！！！」
1044 = "「Ư! Ư! Ư! ～～～～～!!!」"
# monologue
# JP: 勃起がぶくぶく膨らんでいる。膣がキチキチ締めている。\n密着感が極限にまで高まって、今までと同じ動きでも――
1545 = "Dương vật đang phình to ra. Âm đạo thì siết chặt lại.\nCảm giác áp sát tăng lên đến tột độ, dù vẫn là những chuyển động như lúc nãy——"
# monologue
# JP: （みちゅっっ――ぶぢゅっ！　ぬちいいっっ――ごっ！）
1732 = "（Quấn lấy——đâm vào! Cọ xát——siết chặt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――チュむっ――ちゅ！　れりゅうううっ！\nりゅっ！　にゅる！　チュルルっ――ちゅむううっ！」
1056 = "「A——chu mu——chụt! Rê ryu uu!\nRyu! Nyu ru! Chu ru ru——chu mu uu!」"
# monologue
# JP: キスが必死なものになる。\n絶頂の声を決して立てないように。僕も、同じくっ――
1441 = "Nụ hôn trở nên cuồng nhiệt hơn.\nĐể không phát ra tiếng rên rỉ khi lên đỉnh. Tôi cũng vậy——"
# monologue
# JP: （みぢゅっ――ごっ！　んにヂュウウッ――ごちゅっ！）
1740 = "（Cọ vào——siết chặt! Cọ ra——co thắt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！」
1046 = "「～～～～～～～～～～～～～～～～～～!!!」"
# monologue
# JP: （きゅううううううっっっ！！！）
1662 = "（Co thắt dữ dội!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1016 = "「Ư!!!!」"
# monologue
# JP: （ぶびゅっ！　びゅぶっ！　ぶっ！　びゅううう！！）
1676 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！　～～～っ！！　っ――ぁっ――っ！！！」
1045 = "「Ư!!! ～～～!! Ư——a——ư!!!」"
# monologue
# JP: （ぶりゅ！　びゅうっ　みびゅっ！　びゅぶるっ！）
1674 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
705 = "「——」"
# monologue
# JP: 溜まりに溜まって粘度をました精液が、\nポーレットの膣にぶつかりこびりついていってる。
1551 = "Tinh dịch đặc quánh tích tụ bấy lâu nay\nđang bắn ra và dính chặt vào thành âm đạo của Paulette."
# monologue
# JP: （びゅうっ――ぶっ――ビュルっ――ぶぴゅっ――）
1671 = "（Phụt——phụt——phụt——phụt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぷあっ！　あっ――はっ――あっ――しゅごっ――\nおまんこ――しきゅう――すごい――こい、のっ」
1113 = "「Pha! A——ha——a——tuyệt quá——\nâm đạo——tử cung——nhiều quá——đặc quá」"
# monologue
# JP: （びゅ――ぶ、びゅっ――ビュルっ――ぷ……ぴ――）
1669 = "（Phụt——phụt, phụt——phụt——phụt......phụt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「……こくて、あつくて――んっ――どろどろ、の……\nぁ――そうてつ、くんの――おまんこ、いっぱい……」
730 = "「......Vừa đặc, vừa nóng——ưm——nhơm nhớp......\nA——của anh Soutetsu——đầy ắp, trong âm đạo rồi......」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1094 = "「嗯」" 
# monologue
# JP: 体力的にきつくあり、射精自体もすごすぎた。\n喪失感にも似た脱力が、僕の全身をいきなり包む。が――
1588 = "Thể lực đã cạn kiệt, lần xuất tinh này cũng quá mãnh liệt.\nSự suy nhược tựa như cảm giác mất mát đột ngột bao trùm toàn thân tôi. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「素敵だった。最高だった。\nポーレット――好きだ。愛してる――んっ」
1122 = "「Tuyệt lắm. Hoàn hảo lắm.\nPaulette——Anh thích em. Anh yêu em——ưm」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……チュッ――ちゅっ――んっ――ふぁっ。\nん……えへへっ――わたしも、愛しています。双鉄くん」
1062 = "「A......chụt——chụt——ưm——pha.\nƯm......ehehe——em cũng yêu anh. Anh Soutetsu」"
# monologue
# JP: （ぎゅうううううっ）
1728 = "（Ôm chặt）"
# monologue
# JP: そうしたいから、喘ぎを抑えるためにではないキスをして。\n体を隠すためにではないハグをする。
1442 = "Chúng tôi trao nhau nụ hôn không phải để kiềm nén tiếng rên rỉ, mà vì muốn làm thế.\nÔm nhau không phải để che giấu cơ thể, mà vì muốn ôm lấy nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「……できましたかね？\nひかりとれいなの、弟くんか、妹ちゃん」
726 = "「......Liệu có thụ thai không nhỉ?\nEm trai, hoặc em gái của Hikari và Reina ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「さぁ。どうだろうな。\nそれは僕にはわからない」
1223 = "「Chà. Ai mà biết được.\nChuyện đó thì anh chịu thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え～～！　それはそうなんでしょうけど」
1036 = "「Ế～～! Dù biết là vậy nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「声」
1215 = "「Giọng em kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1078 = "「啊！」" 
# monologue
# JP: ぷくりふくれて、慌ててしぼんで、照れて赤らむ。\nほっぺひとつを取るだけで、こんなにかわいく愛おしい。
1522 = "Cô ấy phồng má, rồi vội xẹp xuống, mặt đỏ bừng vì ngượng.\nChỉ một cái phồng má thôi cũng đáng yêu và chọc người thương đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「が、な？　ポーレット――」
958 = "「Nhưng mà nhé? Paulette——」"
# monologue
# JP: 息をひそめる。様子を伺う。……………………。大丈夫。\n襖の向こうに満ちているのは、ただ熟睡の気配のみ、だ。
1439 = "Tôi nín thở. Nghe ngóng tình hình. ......................... Ổn rồi.\nBên kia cánh cửa kéo chỉ có hơi thở đều đều của người đang say giấc nồng."
# 【双鉄】
# display as 雙鐵
# JP: 「それでもひとつだけはわかる」
984 = "「Nhưng có một điều anh chắc chắn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1078 = "「啊！」" 
# monologue
# JP: ゆえに勃起は、すぐに硬度を取り戻す。\nいわずもがなの言葉をけれど、あえて伝えることにする。
1479 = "Nhờ vậy mà dương vật nhanh chóng lấy lại độ cương cứng.\nDù là điều hiển nhiên, tôi vẫn cố tình nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「膣内射精の数を重ねれば重ねるほどに」
994 = "「Càng xuất tinh vào trong nhiều lần」"
# 【ポーレット】
# display as 波萊特
# JP: 「ね？　それならね、双鉄くぅん」
1156 = "「Nhỉ? Nếu vậy thì, anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「お」
1038 = "「Ồ」"
# monologue
# JP: ポーレットが再びころんとねころがる。\n大きく大きく股を開いて、射精をされたばかりの膣を――
1521 = "Paulette lại nằm lăn ra.\nDang rộng hai chân, phơi bày âm đạo vừa mới bị bắn tinh vào——"
# monologue
# JP: （くぱあっ）
# 1682 = "（扒開）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ニ回目ですから。動きも声も、\nずっと落ち着けるんじゃないかって、思うんですけど」
1208 = "「Lần thứ hai rồi mà. Chuyển động hay âm thanh,\nem nghĩ mình sẽ kiềm chế tốt hơn nhiều đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうだろう」
1232 = "「Chà, khó nói lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええ～～っ」
1035 = "「Ế～～」"
# monologue
# JP: 正常位では、腰を思い切り打ち付ける衝動を抑えきれずに、\n肉と肉とのぶつかる音を、恐らく大きく立ててしまおう。
1541 = "Ở tư thế truyền thống, tôi sẽ không thể kiềm chế được xung động muốn đâm rút hết cỡ,\nâm thanh va chạm của da thịt chắc chắn sẽ rất lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫。僕に上等な代案がある」
1190 = "「Không sao. Anh có một phương án thay thế tuyệt vời.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
# 1068 = "「啊」" 
# monologue
# JP: ポーレットの目がきらきら輝く。きらきら――淫靡に。\n今なら恐らくどんな体位も受け入れてくれることだろう。
1525 = "Đôi mắt Paulette lấp lánh. Lấp lánh——một cách dâm đãng.\nBây giờ có lẽ cô ấy sẽ chấp nhận bất kỳ tư thế nào."
# 【双鉄】
# display as 雙鐵
# JP: 「その代案とは」
1157 = "「Phương án đó là」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1068 = "「啊」" 
# monologue
# JP: 体を寄せて、足をしっかりつかまえる。\n家族旅行の夜をまだまだ――終わらせぬため。
1459 = "Tôi nhoài người tới, nắm chặt lấy đôi chân của cô ấy.\nĐể đêm du lịch gia đình này——vẫn chưa thể kết thúc."
