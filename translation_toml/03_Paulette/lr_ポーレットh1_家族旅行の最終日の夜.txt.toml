# lines: 332 
# 【ポーレット】
# display as 波萊特
# JP: 「……ひかりもれいなも、寝かしつけるまでもありません\nでした。もう、お布団に入った瞬間ばたんきゅ～って」
728 = "「......Cả Hikari và Reina, em còn chưa kịp dỗ ngủ\nnữa. Vừa chui vào chăn là hai đứa ngủ khò khò luôn rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1177 = "「Vậy sao」"
# 【ポーレット】
# display as 波萊特
# JP: 「お風呂いれてからって思ってたんですけど、\nどうみても限界でしたから。浴衣にだけ着替えさせて」
1185 = "「Em định cho hai đứa đi tắm trước cơ,\nnhưng trông có vẻ kiệt sức lắm rồi. Nên em chỉ thay yukata cho hai đứa thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1177 = "「是嗎」" 
# monologue
# JP: 寝入ったこどもら。ふすまで仕切れる大きな和室。\n布団を離してふすまを閉めての、“夫婦の寝室”。
1385 = "Lũ trẻ đã ngủ say. Căn phòng kiểu Nhật rộng lớn được ngăn cách bằng cửa kéo fusuma.\nTrải đệm riêng ra và đóng cửa kéo lại, thế là thành \"Phòng ngủ của vợ chồng\"."
# 【双鉄】
# display as 雙鐵
# JP: 「その、だ。ポーレット」
1236 = "「Chuyện đó, ừm. Paulette」"
# monologue
# JP: 家族旅行でつくづく知った。あらためて思い知らされた。\n僕の妻は、極めて愛情豊かな母で、最高の女性なのだ、と。
1573 = "Qua chuyến du lịch gia đình này, tôi đã nhận ra sâu sắc. Lại một lần nữa được khắc sâu vào tâm trí.\nRằng vợ tôi, là một người mẹ vô cùng chan chứa tình yêu thương, và là một người phụ nữ tuyệt vời nhất."
# 【ポーレット】
# display as 波萊特
# JP: 「はい、なんですか？　双鉄くん」
1105 = "「Vâng, chuyện gì vậy? Anh Soutetsu」"
# monologue
# JP: ゆえに、抱きたい。けれどもふすまの向こうが気になり、\nいつものように、自然に誘うことができない。
1570 = "Vì thế, tôi muốn ôm em. Nhưng lại bận tâm phía bên kia cánh cửa kéo,\nnên không thể mở lời mời gọi một cách tự nhiên như mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「………………。悪いことをするわけでもないのに、\nどうにも緊張してしまうな」
738 = "「................... Dù chẳng làm chuyện gì xấu,\nnhưng không hiểu sao lại cứ thấy căng thẳng thế này」"
# 【ポーレット】
# display as 波萊特
# JP: 「してるの、緊張だけですか？」
992 = "「Anh chỉ thấy, căng thẳng thôi sao?」"
# monologue
# JP: （さすっ）
1725 = "（Vuốt ve）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1080 = "「!!!」"
# monologue
# JP: 股間をそっと撫ぜられて、全ての段取りが弾けとぶ。
1333 = "Bị vuốt ve nhè nhẹ nơi đũng quần, mọi sự chuẩn bị trong đầu tôi bay sạch."
# 【ポーレット】
# display as 波萊特
# JP: 「あんっ」
1073 = "「A」"
# monologue
# JP: (とさっ）
1706 = "(Đè xuống)"
# monologue
# JP: 布団の上へと押し倒すなら、歓迎の声が迎えてくれる。\n極めて甘い熱気と吐息が、湿度をもってくすぐってくる。
1565 = "Khi tôi đè em ấy xuống đệm, một giọng nói chào đón vang lên.\nHơi nóng và nhịp thở vô cùng ngọt ngào, mang theo chút ẩm ướt trêu chọc tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「興奮ならば、緊張の何倍もしているさ」
1210 = "「Nếu nói về hưng phấn, thì còn gấp mấy lần căng thẳng cơ」"
# monologue
# JP: いいながら髪にキスをして、\n耳、まぶた、頬と近づいて――
1475 = "Vừa nói tôi vừa đặt nụ hôn lên mái tóc em ấy,\nrồi tiến dần đến tai, mí mắt, và gò má――"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……。ん――ちゅっ――ちゅむっ――ちゅっ、\nちゅぶっ――ちゅぱっ――ぷぁ――れろっ――にゅるっ」
1065 = "「A....... Ưm――chụt――chùn chụt――chụt,\nchụt――chụt――phù――liếm――trơn tuột」"
# monologue
# JP: ごく当然と、柔らかな舌が唇を割り侵入してくる。\nとろとろ蕩けるポーレット・タンが僕の口内を舐め尽くす。
1377 = "Rất tự nhiên, chiếc lưỡi mềm mại tách đôi môi tôi ra và xâm nhập vào trong.\nChiếc lưỡi Paulette tan chảy ngọt ngào liếm sạch mọi ngóc ngách trong khoang miệng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「れるっ――れろっ――りゅううっ――ニュルッ――\nちゅっ――ちゅむっ――ずじゅ――ずゅ――（こくっ）」
1203 = "「Liếm――liếm――liếm――trơn tuột――\nChụt――chùn chụt――zuju――zu――（ực）」"
# monologue
# JP: 口のすべてを――歯の裏までを蹂躙し、溢れた唾液も\nすべてすすって飲み干して、キスがほどける。
1373 = "Chà đạp toàn bộ khoang miệng――đến tận mặt trong của răng, và hút sạch,\nnuốt trọn toàn bộ lượng nước bọt tràn ra, nụ hôn kết thúc."
# 【双鉄】
# display as 雙鐵
# JP: 「風呂に誘って浴衣に着替えて……\nなどとも考えていたのだがな」
1151 = "「Anh đã định rủ em đi tắm rồi thay yukata......\nvà vài chuyện khác nữa cơ」"
# 【ポーレット】
# display as 波萊特
# JP: 「浴衣、だと……」
1163 = "「Nếu mặc, yukata......」"
# monologue
# JP: 青い瞳がちら、とふすまの方へ向く。
1375 = "Đôi mắt xanh biếc khẽ liếc nhìn về phía cánh cửa kéo."
# 【ポーレット】
# display as 波萊特
# JP: 「はだけちゃったら――\nいざっていうとき、ごまかすの難しそうかなぁって」
1199 = "「Nếu lỡ bị tuột ra――\nĐến lúc có chuyện gì, có vẻ khó mà che giấu được」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
985 = "「Ra là vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
1068 = "「A」"
# monologue
# JP: セーターをまくった瞬間、むわりと女の匂いが漂う。\n一日家族旅行をしてきた“母”の香りの、何倍も濃く。
1555 = "Khoảnh khắc vén chiếc áo len lên, mùi hương phụ nữ thoang thoảng bay tới.\nNồng đậm gấp mấy lần hương thơm của một \"người mẹ\" sau chuyến du lịch gia đình dài một ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、着たまましてほしいということか」
961 = "「Nói cách khác, em muốn làm trong lúc vẫn đang mặc đồ sao」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっっ、えと、\nしてほしいっていうんじゃなくて、そのっ」
959 = "「A, ừm,\nkhông phải là em muốn anh làm, mà là」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1109 = "「Hửm?」"
# monologue
# JP: （むにっ）
1688 = "（Bóp nhẹ）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！――うんっ」
1009 = "「Hya!――ưm」"
# monologue
# JP: ブラをずらして胸を弄れば出かけた嬌声がすぐに呑まれる。\n完全に勃起している乳首の周りを指で、ゆるぅくなぞる。
1471 = "Kéo áo lót xuống và trêu đùa bầu ngực, tiếng rên rỉ vừa cất lên đã lập tức bị nuốt ngược vào trong.\nTôi dùng ngón tay chậm rãi vuốt ve quanh núm vú đang cương cứng hoàn toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「してほしいのではないなら――なんだ？」
953 = "「Nếu không phải là muốn anh làm――thì là gì?」"
# monologue
# JP: （さすっ――さわっ――スリッ――すりっ――）
1722 = "（Vuốt ve——Sờ nhẹ——Cọ xát——Cọ xát——）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――やっ――はっ――んっ――ふっ」
1086 = "「Ưm――a――hà――ưm――phù」"
# monologue
# JP: ひかりを産んで、ポーレットの胸は明らかに大きくなった。\n出産直後は、誰でもそうなるという話も聞いた。が――
1539 = "Sau khi sinh Hikari, ngực của Paulette rõ ràng đã to lên.\nTôi cũng từng nghe nói ai sinh xong cũng vậy. Nhưng――"
# monologue
# JP: （ゆりゅっ――すリュッ――さすうっ――そわっ――）
1733 = "（Trượt nhẹ——Trượt——Vuốt ve——Sờ nhẹ——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……や、ぁ――じらしちゃ、やぁだぁ」
1090 = "「Ưm......a, a――Đừng trêu em, nữa mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、言われてもな。\n“してほしいのではない”とのことでもあるし」
979 = "「Dù em có nói vậy.\nEm bảo là \"không phải là muốn anh làm\" mà」"
# monologue
# JP: ポーレットの乳房は、産後何年経ってもまるで萎まない。\nどころかいっそう艶を増し、ことに乳首に至っては――
1524 = "Bầu ngực của Paulette, dù đã qua bao nhiêu năm sau khi sinh, vẫn không hề xẹp đi chút nào.\nThậm chí còn trở nên căng mọng hơn, đặc biệt là phần núm vú――"
# monologue
# JP: （さすっ――そろぉぉっ――すわっ――そわぁぁぁっ）
# 1733 = "（蹭來——蹭去——打轉——畫圈——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――してほし、してほしい、ですぅっ――んっ、\nそうてつ、くんに――わたしの大好きな、旦那さま、に」
995 = "「A――em muốn, em muốn anh làm, cho em――ưm,\nBởi anh Soutetsu――bởi người chồng, mà em yêu nhất」"
# monologue
# JP: ――ぷくりと前より大きくふくらみ、瑞々しささえ漂わせ、\n噛んでほしいとつまんでほしいと、僕を妖しく誘い続ける。
700 = "――Phồng to hơn trước, thậm chí còn tỏa ra vẻ tươi tắn,\nkhông ngừng quyến rũ tôi một cách ma mị, như thể muốn được cắn, được véo."
# 【双鉄】
# display as 雙鐵
# JP: 「なにを、してほしいんだ？」
967 = "「Em muốn, anh làm gì?」"
# monologue
# JP: だからこそ、一方通行では触らない。\nお互い気持ちが一致するまで、もどかしくとも耐え忍ぶ。
1497 = "Chính vì vậy, tôi không thể chỉ chạm vào một phía.\nCho đến khi cảm xúc của cả hai hòa hợp, dù có bức bối đến đâu tôi cũng sẽ chịu đựng."
# 【ポーレット】
# display as 波萊特
# JP: 「およ、ふく――きた、ままっ――おっぱい、ちくびも\n――おまんこ、もっ……っ――たくさん、さわっ」
1115 = "「Quần áo――vẫn mặc, nguyên――ngực, núm vú\n――âm đạo, nữa......ưm――hãy chạm vào, thật nhiều đi」"
# monologue
# JP: （むにっ）
# 1688 = "（捏住）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっっ――～～っ！！！！！」
997 = "「Hya――~~!!!!!」"
# monologue
# JP: 大きく出かけた声を必死で噛み殺す。\nそれがかわいくて健気であんまり愛しくて――
1403 = "Em ấy liều mạng cắn răng kìm lại tiếng rên suýt bật ra.\nDáng vẻ ấy thật đáng yêu, thật kiên cường và quá đỗi khiến tôi yêu thương――"
# monologue
# JP: （もに――ぷにゅっ――ぷりゅっ！　ぷちゅっん）
1689 = "（Nắn bóp——Mềm mại——Mềm mại! Phụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ぁっ――うれしい――ちくびっ――っ――\nちくび、おっぱい――たくさん、えっち、にっ――」
1052 = "「A――a――Sướng quá――núm vú――ưm――\nNúm vú, ngực――thật nhiều, thật dâm, đãng――」"
# monologue
# JP: （こりゅっ！　もみゅっ！　こしゅっ！　くりゅっ！）
1690 = "（Cọ xát! Xoa nắn! Cọ xát! Xoa nắn!）"
# monologue
# JP: 押して潰して擦ってまわして擦って摘んで撫でて弄って。\n思いつくまま思いつく限りの手管で乳首を愛撫する。
1493 = "Ấn, đè bẹp, cọ xát, xoay tròn, cọ xát, véo, vuốt ve, trêu đùa.\nTôi dùng mọi kỹ năng có thể nghĩ ra để âu yếm núm vú em ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あっ――きもちい――きもちい、よぉ――\nん――そうてつくんの、指――わたし――乳首――あっ」
1011 = "「Hyaa! A――Sướng quá――sướng quá, đi――\nƯm――Ngón tay, của anh Soutetsu――núm vú――của em――a」"
# monologue
# JP: （ぐっ）
1667 = "（Ép sát）"
# monologue
# JP: ズボンを脱ぎもしないまま、股間を押し付け擦り付ける。\n僕と同様、蒸れているであろう、ストッキングの股間へと。
1469 = "Chưa thèm cởi quần, tôi ép đũng quần mình vào cọ xát.\nVào đũng quần đang mặc quần tất của em ấy, chắc hẳn cũng đang nóng hầm hập giống như tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「はぁ――あっ――双鉄、くん――わたしっ――\nうずうずっ――うずうずっ、しちゃ、って」
1218 = "「Hà――a――Anh, Soutetsu――em――\nRâm ran――râm ran, mất, rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1094 = "「Ừ」"
# monologue
# JP: 言われなくともわかっている。\nポーレットは股を大きく開き、ストッキングの中央を――
1370 = "Dù không nói ra tôi cũng hiểu.\nPaulette mở rộng hai chân, và ở giữa chiếc quần tất――"
# 【双鉄】
# display as 雙鐵
# JP: 「『着たままする』、が、確かオーダーであったよな」
971 = "「『Làm trong lúc vẫn mặc đồ』, chắc chắn là yêu cầu của em rồi nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……うん。だって、その方がいざっていうとき」
1067 = "「A......vâng. Bởi vì, như thế đến lúc có chuyện gì」"
# 【双鉄】
# display as 雙鐵
# JP: 「『ごまかしやすい』。だな？　心得た」
712 = "「『Dễ che giấu hơn』. Đúng không? Anh hiểu rồi」"
# monologue
# JP: メモ用のペンをポケットから出し、その先端を引っ掛ける。
1453 = "Tôi lấy cây bút dùng để ghi chú ra khỏi túi, rồi dùng đầu bút móc vào đó."
# monologue
# JP: （くっ）
# 1667 = "（咕）" 
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　ちょっ！？　そうてつくっ」
1034 = "「Hả!? Khoan đã!? Anh Soutetsu」"
# monologue
# JP: （ぴりっ――ぺりりりりりっ）
1730 = "（Xoẹt——Roạtttt）"
# 【ポーレット】
# display as 波萊特
# JP: 「やぁ、もうっ、破いちゃうとか――\n旅行中ですよ？　余分なんてもってきてないのに」
1221 = "「A, thiệt tình, xé rách thế này thì――\nĐang đi du lịch đấy nhé? Em đâu có mang theo đồ dự phòng đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「む。そうなのか。\n――一度履いたものをまた履くというのは」
1093 = "「Hửm. Vậy sao.\n――Việc mặc lại đồ đã mặc rồi thì」"
# 【ポーレット】
# display as 波萊特
# JP: 「寒いとこだからあったかいの履いてて――\nだから汗、わたし、結構かいちゃって」
1234 = "「Vì chỗ này lạnh nên em mặc đồ ấm――\nThế nên em, đổ mồ hôi, khá nhiều」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それをまた履くのはイヤなものだろうな。\nすまん。着たままするにはこれが一番良いかと思って」
1108 = "「À, vậy thì mặc lại cũng khó chịu thật nhỉ.\nXin lỗi em. Anh cứ nghĩ làm trong lúc mặc đồ thì cách này là tốt nhất」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1068 = "「啊」" 
# monologue
# JP: 尖りかけていた口を閉ざして、\nポーレットが視線を上へと向ける。僕の股間を凝視する。
1530 = "Khép lại đôi môi đang định chu lên hờn dỗi,\nPaulette ngước ánh nhìn lên trên. Chăm chú nhìn vào đũng quần tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「よく考えたら大したことじゃないですよね、２度履き。\nコンビニまで我慢したら、トイレですぐに新品履けるし」
963 = "「Nghĩ kỹ thì việc mặc lại lần hai cũng chẳng có gì to tát đâu nhỉ.\nChỉ cần chịu khó đến cửa hàng tiện lợi, thì có thể vào nhà vệ sinh thay đồ mới ngay mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それならばなによりだ」
1176 = "「Vậy sao. Nếu thế thì tốt quá rồi」"
# 【ポーレット】
# display as 波萊特
# JP: 「それよりずっと大切なことは」
1209 = "「Có chuyện còn quan trọng hơn thế nhiều」"
# monologue
# JP: （すうっ）
1702 = "（Vạch ra）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1079 = "「!!」"
# monologue
# JP: ポーレットの真白い指が、自らの秘所へとゆっくり伸びる。\nストッキンングの破れ目の下、ピンクのパンツを――
1526 = "Những ngón tay trắng ngần của Paulette, chầm chậm đưa xuống vùng kín của chính mình.\nBên dưới vết rách của quần tất, chiếc quần lót màu hồng――"
# 【ポーレット】
# display as 波萊特
# JP: 「めったにこれない家族旅行の。\nせっかくの、こどもたちが寝入ってくれてる時間を」
1207 = "「Hiếm lắm mới có chuyến du lịch gia đình.\nKhó khăn lắm, bọn trẻ mới chịu ngủ say」"
# monologue
# JP: （くちっ）
1705 = "（Nhóp nhép）"
# monologue
# JP: ――ずらして、わずかに拡げてくれる。\nてらてらに潤うおまんこへ、僕を釘付けにしてくれる。
697 = "――Được kéo lệch sang một bên, khẽ mở rộng ra.\nÂm đạo ướt át bóng loáng, khiến tôi dán chặt mắt vào không thể rời đi."
# 【ポーレット】
# display as 波萊特
# JP: 「一秒だって無駄にしないで。\n双鉄くんと、味わい尽くすことですよね？」
1233 = "「Không được lãng phí dù chỉ một giây.\nPhải tận hưởng trọn vẹn cùng anh Soutetsu, đúng không nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。その上――いざ起こしてしまったときには」
1189 = "「Đúng vậy. Hơn nữa――lỡ như đánh thức bọn trẻ dậy」"
# monologue
# JP: （くにっっ）
# 1688 = "（捏住）" 
# 【ポーレット】
# display as 波萊特
# JP: 「んゅっ！」
1099 = "「Ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ごまかしやすい体勢で、だ」
1136 = "「Thì phải ở trong một tư thế dễ che giấu」"
# monologue
# JP: ふすまがもしも開いたら、着衣の僕が覆いかぶさり\nそのまま寝たふりをすれば良い。ゆえ――
1380 = "Nếu cánh cửa kéo bị mở ra, tôi vẫn đang mặc quần áo che lên người em ấy\nvà cứ thế giả vờ ngủ là xong. Vì vậy――"
# monologue
# JP: （くぱああっっっ）
1682 = "（Tách ra）"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁっ」
1219 = "「Hà」"
# 【双鉄】
# display as 雙鐵
# JP: 「……綺麗だ」
733 = "「......Đẹp quá」"
# monologue
# JP: 大陰唇を開いたならば、思考のすべてが塗りつぶされる。\n出産経験があるとは思えぬ、まるで新品のときと変わらぬ
1481 = "Khi hai môi lớn mở ra, mọi suy nghĩ trong tôi như bị xóa nhòa.\nChẳng thể tin được là đã từng sinh nở, trông nó chẳng khác gì như lúc ban sơ."
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、しかし、膣口はやはり変わっているか」
1070 = "「À không, nhưng mà, cửa mình quả nhiên là có thay đổi nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？」
1098 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ダメだ。せっかく美しいのに」
956 = "「Không được. Đẹp thế này cơ mà」"
# monologue
# JP: 隠そうとするポーレットの手を声を制して、\n中指と人差し指とをひとまとめにし――
1444 = "Tôi lên tiếng ngăn lại bàn tay đang định che giấu của Paulette,\nchụm ngón giữa và ngón trỏ lại với nhau――"
# monologue
# JP: （くぷっ）
1707 = "（Đút vào）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ！　――ふぁっっ――やぁんっ――指っ――んっ！\nいきなりっ――に、ほんっ――ひ――ぁっ――」
1100 = "「Ưm! ――Phù――A――Ngón tay――ưm!\nĐột nhiên――hai, ngón――hi――a――」"
# monologue
# JP: むちむちきゅうきゅう締め付けられる。\n全方位からみっちりと、肉壁に指が包みこまれる。
1407 = "Bị siết chặt một cách mềm mại và khít khao.\nNhững ngón tay bị bức tường thịt bao bọc chặt chẽ từ mọi phía."
# 【双鉄】
# display as 雙鐵
# JP: 「ここ、なのだよな」
1134 = "「Chính là chỗ này, nhỉ」"
# monologue
# JP: （くっ――くっ――）
1663 = "（Cử động——Cử động——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？　やっ――双鉄くんっ――だめっ――\nお指っ――んっ――おまんのこ、中で――ひろげちゃっ」
1018 = "「Hả!? A――Anh Soutetsu――không được――\nNgón tay――ưm――trong, âm đạo――đang mở rộng ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理に広げるつもりはないさ。\nただ――」
1140 = "「Anh không định mở rộng nó ra bằng sức mạnh đâu.\nChỉ là――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あんっ！！」
1075 = "「A!!」"
# monologue
# JP: ふうっと、息を吹きかける。\nポーレットの体がふるふる悶える。
1520 = "Tôi khẽ thổi một hơi.\nCơ thể Paulette run rẩy quằn quại."
# 【双鉄】
# display as 雙鐵
# JP: 「ここからなのだ、と思ってな。\nひかりの生命のすべてがここから産まれたのだと」
1144 = "「Anh chỉ nghĩ, là từ nơi này.\nToàn bộ sinh mệnh của Hikari đã được sinh ra từ nơi này」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
# 1068 = "「啊」" 
# monologue
# JP: 瞬間、ポーレットの膣がわななく。\nその影響か、こぽりと蜜もこぼれだす
1466 = "Khoảnh khắc đó, âm đạo của Paulette run rẩy.\nCó lẽ do ảnh hưởng từ đó, mật dịch cũng trào ra"
# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですけど――んっ――わたし、ひとりだけじゃ\n――絶対、できない、こと、ですし」
1222 = "「Đúng là......như vậy――ưm――nhưng chỉ một mình em\n――thì tuyệt đối, không thể, làm được, mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、たしかに――」
1231 = "「Điều đó, thì chắc chắn rồi――」"
# monologue
# JP: （つぷっ――ずっ――）
1712 = "（Đâm——Sâu——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――あっ！　ぁっ――はぁっ――」
1054 = "「A――a! A――hà――」"
# monologue
# JP: 指二本。無論、勃起よりも遥かに細い。\nそうであるのにちぎられそうに、熱い柔肉に締められる。
1355 = "Hai ngón tay. Tất nhiên là nhỏ hơn rất nhiều so với dương vật đang cương cứng.\nDù vậy, chúng vẫn bị lớp thịt mềm mại nóng hổi siết chặt đến mức tưởng chừng như sắp đứt lìa."
# monologue
# JP: （じゅっ――じゅぶっ――ぷにゅっ――ぐりゅっ）
1686 = "（Ngoáy——Móc——Nắn bóp——Cọ xát）"
# monologue
# JP: とても不思議で、崇高で。神秘的なことだと今さら思う。\nゆえ、丁寧に確かめたくなる。
1463 = "Đến giờ tôi mới nhận ra, đó là một điều vô cùng kỳ diệu, cao cả. Và đầy bí ẩn.\nVì thế, tôi muốn kiểm chứng nó một cách thật cẩn thận."
# 【双鉄】
# display as 雙鐵
# JP: 「おまんこだけでは、膣道だけでは、子宮だけでは、\n決して、子供は為せんのだよな」
976 = "「Nếu chỉ có âm đạo, chỉ có đường âm đạo, hay chỉ có tử cung,\nthì tuyệt đối không thể nào tạo ra một đứa trẻ được nhỉ」"
# monologue
# JP: （ぐっ――くくっ――くむっ――くちゅんっ！）
1664 = "（Ép——Ngoáy——Bóp——Chụt!）"
# monologue
# JP: 指を少しずつ折り曲げて、角度をかえて当ててはこする。\nどうあがこうと膣肉が、みっちり押し寄せてくるのだが。
1452 = "Tôi từ từ gập các ngón tay lại, thay đổi góc độ rồi ấn và cọ xát.\nDù có vùng vẫy thế nào thì lớp thịt âm đạo vẫn cứ dồn dập ép sát vào."
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　あっ！　きもちい、きもち、いい――\n指で、こしゅこしゅ――ぐちゅぐちゅ、されるのっ」
1013 = "「Hya! A! Sướng quá, sướng, quá――\nBị ngón tay, cọ xát――ngoáy sâu, vào trong」"
# monologue
# JP: （こりゅ――プニッ――こしゅっ――ぐちゅっ）
1724 = "（Cọ xát——Mút——Cọ xát——Ngoáy sâu）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ――んっ――ふあっ――ふっ――\n指、かたいとこ――かんせつ――こしゅ、れてっ」
1000 = "「Hya――ưm――phù――phù――\nChỗ cứng của, ngón tay――khớp xương――đang cọ, xát」"
# monologue
# JP: それでも、少しずつは膣内のつくりを感じ取れる。\nどこに触れれば、ポーレットの反応がよくなるのかも。
1337 = "Mặc dù vậy, tôi vẫn dần dần cảm nhận được cấu trúc bên trong âm đạo.\nCả việc chạm vào đâu thì phản ứng của Paulette sẽ mãnh liệt hơn nữa."
# monologue
# JP: （ぞりっ――こしゅっ！　ぐちゅっ――ぞりゅっ！）
1679 = "（Chọc——Cọ xát! Ngoáy sâu——Cọ xát!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ――あっ――指より――わた、しっ――んっ――\nおちん、ちん――そうてつくん、の、ほしい、のにっっ」
1022 = "「Phù――a――Hơn cả ngón tay――em――ưm――\nMuốn, chim――của anh Soutetsu, cơ」"
# monologue
# JP: 天井にあるざらつく部分を、第二関節の背で撫ぜる。\nヘの字に曲げた指先は、膣床を押しつつ擦って叩く。
1451 = "Tôi dùng mặt lưng của đốt ngón tay thứ hai vuốt ve phần thô ráp ở phía trên.\nĐầu ngón tay gập lại thành hình chữ V ngược, vừa ấn vừa cọ xát và vỗ nhẹ vào đáy âm đạo."
# monologue
# JP: （ぐにっ、こしゅっ、くちゅっ、ぷにゅんっ）
1701 = "（Ngoáy, cọ xát, nhóp nhép, mút）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！！　けどっ―きもちいっ――んっ――\nそうてつ、くっ――んっ――しょこっ――そこっ」
1002 = "「Hya!! Nhưng mà――sướng quá――ưm――\nAnh Soutetsu――ưm――chỗ đó――chỗ đó」"
# monologue
# JP: そこ、がどこかを判別しがたい。\nゆえ単純に、同じ動きを同じペースで繰り返す。
1461 = "Rất khó để xác định \"chỗ đó\" là chỗ nào.\nVì vậy, tôi chỉ đơn thuần lặp lại cùng một động tác với cùng một nhịp điệu."
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ！　あっ！　あっ！\nはっ！　あっ――んうっ――くふっ――あっ！」
1023 = "「Phù――a! A! A!\nHà! A――ưm――kufu――a!」"
# monologue
# JP: （きゅ！　きゅっ！　きゅううううううううっっ）
1709 = "（Siết! Siết! Siết chặt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1078 = "「!」"
# monologue
# JP: ポーレットの壁がせばまり蠢き、\n僕の指から精子を絞り出そうとしてくる。
1527 = "Bức tường thịt của Paulette thu hẹp lại và uốn lượn,\nnhư muốn vắt kiệt tinh trùng từ những ngón tay của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……指では届かぬ、この奥を」
736 = "「......Nơi sâu thẳm này, ngón tay không thể chạm tới được」"
# monologue
# JP: （ぐ――くくっ）
1665 = "（Ép——Ngoáy）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ！！！！」
1103 = "「Ưm!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の勃起が、えぐって、こすって、ノックして。\n精子をびゅうびゅう、溢れるほどに注ぎ込んで」
1137 = "「Dương vật của anh, sẽ khoét sâu, cọ xát, và gõ cửa.\nRót tinh trùng vào tràn trề, ồ ạt」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい……っ――ふあっ――たくさん、たくさん――\n精子、わたし――そうてつくんから――受け取って」
1124 = "「Vâng......ưm――phù――Thật nhiều, thật nhiều――\nTinh trùng, em――sẽ nhận lấy――từ anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
716 = "「............」"
# monologue
# JP: （じゅぶっ）
1672 = "（Đâm sâu）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ！！？」
1097 = "「Ưm kyu!!?」"
# monologue
# JP: 思いもかけぬ強い感情。過去の自身への嫉妬と称賛。\nこの美しいポーレットに、膣内射精し妊娠させて――
1455 = "Một cảm xúc mạnh mẽ bất ngờ ập đến. Sự ghen tị và tán dương dành cho chính bản thân mình trong quá khứ.\nĐã xuất tinh vào trong và làm cho Paulette xinh đẹp này mang thai――"
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりで、一緒に。\nおかあさんとおとうさんになった」
1142 = "「Hai chúng ta, cùng nhau.\nĐã trở thành một người mẹ và một người cha」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、です。そうてつ、くんっ」
1179 = "「Vâng, đúng vậy. Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1078 = "「啊！」" 
# monologue
# JP: 性器を指に抉られて、真っ赤に染まった顔が、笑う。\n開き始めた花の如くに、ふわり、可憐に。
1421 = "Bị những ngón tay khoét sâu vào cơ quan sinh dục, khuôn mặt nhuốm màu đỏ ửng ấy, mỉm cười.\nNhẹ nhàng, đáng yêu, hệt như một nụ hoa chớm nở."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが――わたしを……\nわたしを――おかあさんに――してくれたんです」
1182 = "「Anh Soutetsu――đã biến em......\nBiến em――trở thành――một người mẹ」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　――ポーレット」
1077 = "「! ――Paulette」"
# monologue
# JP: （ちゅっ――ぽっ）
1592 = "（Chụt——Phụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――」
1047 = "「A――」"
# monologue
# JP: 焦りを抑えてそおっと引き抜く。\n指など入れている場合ではない。
1448 = "Tôi kìm nén sự nôn nóng và từ từ rút tay ra.\nGiờ không phải là lúc để cho ngón tay vào nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「そうてつくぅん」
1237 = "「Anh Soutetsu」"
# monologue
# JP: ポーレットの声がうわずっている。\n呼吸が浅く早くなり、瞳もとろんと蕩けきってる。
1523 = "Giọng Paulette the thé vang lên.\nNhịp thở trở nên nông và gấp gáp, đôi mắt cũng đờ đẫn tan chảy."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、旅行中、ずっと、ずうっと我慢してたから。\n双鉄くんも、きっと同じだと思うから」
1145 = "「Em, trong suốt chuyến du lịch, đã luôn, luôn cố nhịn.\nEm nghĩ anh Soutetsu, chắc chắn cũng vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1094 = "「嗯」" 
# monologue
# JP: ポーレットも僕と同じ気持ちだ。単なる雄と雌になり、\n覆いかぶさり貫いて、思いっきりに腰を振りたい。
1529 = "Paulette cũng có chung cảm xúc với tôi. Trở thành một con đực và một con cái đơn thuần,\nmuốn đè lên nhau, đâm xuyên qua nhau, và thỏa sức lắc hông."
# 【ポーレット】
# display as 波萊特
# JP: 「指で愛してくれてるときも、双鉄くん、ズボンの前が\nぎちぎちで、すっごく苦しそうだったから。だから」
1238 = "「Ngay cả lúc anh dùng ngón tay yêu thương em, phía trước quần của anh Soutetsu\ncũng căng cứng, trông có vẻ rất khổ sở. Thế nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている、ポーレット。溜まりに溜まった精液を、\n注ぎ込みたい先ならば、ただ一箇所しかありえない」
1149 = "「Anh biết mà, Paulette. Nơi duy nhất anh muốn rót trào\nlượng tinh dịch đã dồn nén bấy lâu nay, chỉ có thể là một chỗ mà thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1068 = "「啊」" 
# monologue
# JP: けれどこのまましてしまうならどうしようもなく音が立つ。\n声も恐らく、抑えきれないほどとなろう。ゆえ――
1347 = "Nhưng nếu cứ thế này mà làm thì kiểu gì cũng sẽ phát ra âm thanh.\nGiọng nói có lẽ cũng sẽ không thể nào kìm nén được nữa. Vì thế――"
# monologue
# JP: （ぐいっ）
1610 = "（Nhấc bổng）"
# 【ポーレット】
# display as 波萊特
# JP: 「あんっ！」
1074 = "「A!」"
# monologue
# JP: かかえあげ、ポーレット全部を膝へと乗せる。\n抱きあいながら、すぐそこにある綺麗な顔に囁きかける。
1457 = "Tôi nhấc bổng Paulette lên và đặt em ấy ngồi trọn vào lòng mình.\nVừa ôm nhau, tôi vừa thì thầm vào khuôn mặt xinh đẹp ngay sát bên cạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。もう一度――もう何度でも。\n僕らは、おとうさんとおかあさんになろう」
1195 = "「Paulette. Một lần nữa――bao nhiêu lần cũng được.\nChúng ta, hãy cùng nhau làm cha làm mẹ nhé」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　はいっ――そうてつくん――んっ」
1126 = "「Vâng! Vâng――Anh Soutetsu――ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1015 = "「Ưm」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ――ちゅむっ――ぢゅるるうっ――りゅっ――\nにゅぶっ――ちゅくっ――ちゅううっ――ちゅぶっつ」
1082 = "「Chụt――chùn chụt――jururuu――ryu――\nNhóp nhép――chụt――chùn chụt――chụt」"
# monologue
# JP: ポーレットが唇を重ねてすぐに割ってくる。\nブラから零れるぷりぷり乳首が僕の胸板をくすぐってくる。
1342 = "Paulette áp môi vào và lập tức hé mở.\nNhững núm vú căng mọng tràn ra khỏi áo lót đang cọ xát nhột nhạt vào vòm ngực tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ――ンッ――（こくっ）――チュむっ――ちゅ\nれるっ――れりゅううっ――ぢゅるっ――ちゅううっ」
1025 = "「Phù――ưm――（ực）――chùn chụt――chụt\nLiếm――liếm――chùn chụt――chùn chụt」"
# monologue
