2870 = "Chính là lúc này.\\nKhi tôi đưa tay ra, Nagi cũng lẳng lặng đưa cho tôi một xẻng than."

# 【ハチロク】
# display as 八六
# JP: 「今は、まだ、吸気も排気もありませんので」
2192 = "「Vì hiện tại vẫn chưa có cả lực hút lẫn lực đẩy khí đâu ạ.」"

# 【双鉄】
