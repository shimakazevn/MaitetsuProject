[script]
# lines: 513 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3435 = "（Cọc cạch, cọc cạch, xình xịch, xình xịch——）"
# monologue
# JP: 走行音だ。\n思った瞬間、路子を探して駆け出している。
3053 = "Là tiếng tàu chạy. Ngay khoảnh khắc nghĩ vậy, tôi lao đi tìm Michiko."
# 【双鉄】
# display as 雙鐵
# JP: 「路子！　路子！！」
2287 = "「Michiko! Michiko!!」"
# monologue
# JP: しばらく、この夢を見なかった。
2841 = "Đã một thời gian rồi, tôi không gặp giấc mơ này."
# monologue
# JP: 疲れ切り、倒れるように眠る日々が、\n幾週も幾月も、重なり続けてしまったせいだ。
3163 = "Có lẽ là do những ngày tháng mệt mỏi rã rời, cứ đặt lưng xuống là ngủ thiếp đi đã kéo dài suốt mấy tuần, mấy tháng qua."
# 【双鉄】
# display as 雙鐵
# JP: 「路子！　どこだ！」
2286 = "「Michiko! Em ở đâu!」"
# 【路子】
# display as 路子
# JP: 「ここだよ。そーちゃん」
2054 = "「Em ở đây nè. Sou-chan.」"
# monologue
# JP: ――声がする。\nいつものように、路子は座席に座っている。
1430 = "——Có tiếng nói. Như mọi khi, Michiko đang ngồi trên ghế."
# 【路子】
# display as 路子
# JP: 「へんなの。そーちゃん、おっきなこえ出して」
2210 = "「Kỳ ghê. Sou-chan tự nhiên nói lớn tiếng quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。\nなんだろう、少し、焦ってしまっていたようだ」
1936 = "「Ừ...... đúng vậy. Sao thế nhỉ, có vẻ như anh đã hơi vội vàng.」"
# monologue
# JP: 僕の答えがおかしなものに聞こえたのだろうか？\n路子はくすりと小さく笑う。
3051 = "Có lẽ câu trả lời của tôi nghe hơi kỳ quặc chăng? Michiko cười khúc khích."
# monologue
# JP: 最初からそうしていたかのように……\n僕もまた、向い合せに着席している。
2864 = "Cứ như thể tôi đã làm vậy ngay từ đầu...... Tôi cũng ngồi xuống đối diện con bé."
# 【路子】
# display as 路子
# JP: 「ね？　そーちゃん。\nきず。あのきかんしゃの」
2066 = "「Nè? Sou-chan. Vết thương. Của cái đầu máy xe lửa đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1916 = "「Ừm.」"
# 【路子】
# display as 路子
# JP: 「そーちゃん、本当になおしたんだね」
2012 = "「Sou-chan, anh đã thực sự sửa được nó rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1508 = "「——Ừ.」"
# monologue
# JP: 直したではなく、\n直せたであり、直してもらった――いただいた。
2653 = "Không phải là tôi sửa, mà là có thể sửa được, và được người khác sửa cho——được giúp đỡ."
# monologue
# JP: そうした言葉を選んだ方がより正確に、\n個人としての僕の心情は表せよう。が――
2656 = "Có lẽ chọn những từ ngữ như vậy sẽ thể hiện chính xác hơn tâm trạng của cá nhân tôi. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。直した」
2119 = "「Đúng vậy. Anh đã sửa nó.」"
# monologue
# JP: 赤井宮司が招いてくれた粉蔵時代の技師さんは、\nさらに仲間の技師たちに、御一夜へ来るよう誘ってくれた。
3307 = "Kỹ sư thời ở nhà máy bột mà đền chủ Akai mời đến, lại tiếp tục rủ thêm các kỹ sư đồng nghiệp đến Ohimitera."
# monologue
# JP: ポーレットとつながりのある鉄道事業者のいくつかは、\n研修扱いとして、整備の社員を派遣してくれた。
2888 = "Một vài doanh nghiệp đường sắt có mối liên hệ với Paulette, đã cử nhân viên bảo dưỡng đến dưới hình thức thực tập."
# 【双鉄】
# display as 雙鐵
# JP: 「まだ、[みち]路なかばのことではあるが――」
2348 = "「Dù vẫn còn đang dang dở——」"
# monologue
# JP: 展示会から自然発生した募金には、個人としてだが、\n稀咲や浦上さん、元忠さんまでが協力をして下さった。
2884 = "Đối với quỹ quyên góp tự phát từ buổi triển lãm, dù là với tư cách cá nhân, nhưng Kisaki, anh Uragami, và cả ông Mototada cũng đã giúp đỡ."
# monologue
# JP: 学園生たちやご老人たち、町の人々もボランティアとして、\n無数に出てくる細かな仕事を、それぞれこなして下さった。
2850 = "Các học sinh, những người lớn tuổi, và cả người dân trong thị trấn cũng tham gia tình nguyện, mỗi người một tay giải quyết vô số những công việc lặt vặt."
# 【双鉄】
# display as 雙鐵
# JP: 「つながりの力で、御一夜の力で。\n――みんなで、8620の傷を、直したんだ」
1795 = "「Bằng sức mạnh của sự kết nối, bằng sức mạnh của Ohimitera. ——Tất cả mọi người, đã cùng nhau sửa chữa vết thương của 8620.」"
# monologue
# JP: みんなの中には、僕もいる。\n僕とともに、路子もいてくれたのだと信じる。
3354 = "Trong số mọi người, cũng có tôi. Tôi tin rằng, cùng với tôi, Michiko cũng đã ở đó."
# monologue
# JP: だから、言葉を弄りはしない。\n堂々と胸を張るべき、これは成果に違いないから。
2978 = "Vì vậy, tôi không chơi chữ nữa. Đây chắc chắn là một thành quả đáng để ngẩng cao đầu tự hào."
# 【路子】
# display as 路子
# JP: 「きずがなおって――\nあのきかんしゃは、また、はしれるの？」
1797 = "「Vết thương đã được sửa chữa—— Đầu máy đó, có thể chạy lại được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……正直、わからん。\nそのために整備修復してきたことは、確かだが」
1541 = "「......Thành thật mà nói, anh không biết. Dù mục đích của việc bảo dưỡng và phục hồi là để nó chạy được.」"
# monologue
# JP: 予算も、時間も、不足したとしかいいようが無い。
3396 = "Chỉ có thể nói là thiếu thốn cả về ngân sách lẫn thời gian."
# monologue
# JP: ひどく恥ずべきことではあるが、足りない部分は各人の、\n“個人の善意と努力”とに、頼ってしまう他になかった。
2674 = "Thật đáng xấu hổ, nhưng đối với những phần còn thiếu, chúng tôi không còn cách nào khác ngoài việc dựa vào “thiện chí và nỗ lực cá nhân” của mỗi người."
# 【双鉄】
# display as 雙鐵
# JP: 「理屈の上では走れるはずだが――\nこればかりはどうにも、実際試してみないことには」
2196 = "「Về mặt lý thuyết thì chắc chắn nó sẽ chạy được—— Nhưng điều này thì, nếu không thực sự chạy thử thì không thể biết được.」"
# 【路子】
# display as 路子
# JP: 「きずがきれいに、見えなくなっても――\nきかんしゃなのに、はしれないかもしれないの？」
2022 = "「Dù vết thương đã biến mất, trông thật đẹp đẽ—— Nhưng dù là đầu máy xe lửa, cũng có thể không chạy được sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1916 = "「唔？」" 
# monologue
# JP: 今度は慎重に言葉を探す。\nもう二度と不用意な発言で、路子を怯えさせたくはない。
3364 = "Lần này tôi cẩn thận lựa chọn từ ngữ. Tôi không muốn một lần nữa làm Michiko sợ hãi bởi những lời nói thiếu suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「目に見える傷を直しても、\n見えない傷が、残り続けているかもしれないから」
2021 = "「Vì ngay cả khi những vết thương có thể nhìn thấy được sửa chữa, những vết thương vô hình vẫn có thể còn tồn tại.」"
# 【路子】
# display as 路子
# JP: 「あ――」
1917 = "「A——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、慎重に試験するんだ。少しずつ、少しずつ。\nゆっくり、ゆっくり、あせらずに」
2071 = "「Vì vậy, chúng ta phải thử nghiệm cẩn thận. Từng chút, từng chút một. Chậm rãi, từ từ, không được vội vã.」"
# 【路子】
# display as 路子
# JP: 「……そうなんだ」
1529 = "「......Ra là vậy.」"
# monologue
# JP: 路子が、小さく頷いてくれる。\n――ほっとする。
3325 = "Michiko khẽ gật đầu. ——Tôi thở phào nhẹ nhõm."
# monologue
# JP: 僕が伝えようとしていることを、\n大丈夫、路子は怯えず、そのまま受け取ってくれている。
3096 = "Những điều tôi đang cố gắng truyền đạt, không sao cả, Michiko không hề sợ hãi mà đã đón nhận chúng."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり試せば、もしも見えない傷が悪さをしても、\nすぐに気づいて、手当をできる可能性をあげられるから」
1873 = "「Nếu thử nghiệm từ từ, dù những vết thương vô hình có gây rắc rối, chúng ta cũng có thể nhận ra ngay lập tức và tăng khả năng xử lý chúng.」"
# 【路子】
# display as 路子
# JP: 「……たいへんなんだね」
1532 = "「......Vất vả lắm nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大変だ」
1950 = "「Ừ, vất vả lắm.」"
# monologue
# JP: その大変さを、\n僕も路子も、文字通りに体で知っている。
3222 = "Sự vất vả đó, cả tôi và Michiko đều hiểu rõ bằng chính cơ thể mình theo đúng nghĩa đen."
# monologue
# JP: 知っているゆえ――\n僕は、決して弱音を吐かない。
3085 = "Vì hiểu rõ điều đó—— Nên tôi tuyệt đối sẽ không than vãn."
# 【双鉄】
# display as 雙鐵
# JP: 「大変だけれど、そうやって、ひとつずつを回復させる。\nそれが叶えば――」
2347 = "「Tuy vất vả, nhưng chúng ta sẽ phục hồi từng thứ một như vậy. Nếu điều đó thành hiện thực——」"
# monologue
# JP: ああ。そうだ。\n僕も、路子も、それが叶えば。
2797 = "A. Đúng vậy. Cả tôi và Michiko, nếu điều đó thành hiện thực."
# monologue
# JP: こうして焦らずひとつずつ、\n見えない傷を癒やしていければ――
2770 = "Cứ như thế, không vội vã, từng chút một, nếu chúng ta có thể chữa lành những vết thương vô hình——"
# 【双鉄】
# display as 雙鐵
# JP: 「必ず、もう一度走れるさ」
2239 = "「Nhất định, nó sẽ chạy lại được một lần nữa.」"
# 【路子】
# display as 路子
# JP: 「そうなんだ」
2116 = "「Vậy sao.」"
# monologue
# JP: 路子が光に溶けていく。\n朝の光が、路子に、僕に、射しこんでくる。
3323 = "Michiko tan dần vào ánh sáng. Ánh sáng buổi sáng chiếu rọi vào Michiko, và cả tôi."
# 【路子】
# display as 路子
# JP: 「それなら、ね？\nがんばってね、そーちゃん」
2328 = "「Nếu vậy thì, nhé? Cố lên nha, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1918 = "「Ừ.」"
# monologue
# JP: 心地よい目覚めになると確信できる。\n目覚めたときにこの夢を、例え忘れてしまったとても。
2955 = "Tôi tin chắc rằng mình sẽ có một buổi sáng thức dậy thật sảng khoái. Cho dù khi thức dậy, tôi có quên mất giấc mơ này đi chăng nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「がんばるからさ、見ててくれ。\n必ず――走らせてみせるから」
2055 = "「Anh sẽ cố gắng, hãy dõi theo anh nhé. Nhất định——anh sẽ làm cho nó chạy lại.」"
# 【れいな】
# display as 玲奈
# JP: 「こぼれた油は\\x%lウェス;#00ffc040;ウェス%l;#;でていねいにふきとるんですよぉ」
2266 = "「Dầu bị tràn ra phải dùng \\x%lウェス;#00ffc040;vải lau máy%l;#; lau cẩn thận đó nha~」"
# 【ふかみ】
# display as 深美
# JP: 「ん……。\n手入れとか、楽しい。こういうの、好き。です」
1934 = "「Ưm....... Bảo dưỡng máy móc, vui thật. Em thích, những việc thế này. ạ......」"
# monologue
# JP: れいなとふかみと。声はすれども、姿は見えない。\n機関庫内のレールとレールの間にある溝――
3056 = "Là Reina và Fukami. Có tiếng nói nhưng không thấy bóng dáng đâu. Cái rãnh nằm giữa các đường ray trong xưởng đầu máy——"
# monologue
# JP: \\x%lピット;#00ffc040;ピット%l;#;と呼ばれる空間の中にすっぽり入り、\n\\x%l8620;#00ffc040;8620%l;#;の各部へと、真下からの注油をしているからだ。
2829 = "Bởi vì hai em ấy đang chui lọt thỏm trong không gian gọi là \\x%lピット;#00ffc040;hố kiểm tra%l;#;, và đang tra dầu vào các bộ phận của \\x%l8620;#00ffc040;8620%l;#; từ ngay bên dưới."
# 【ハチロク】
# display as 八六
# JP: 「油を拭いた\\x%lウェス;#00ffc040;ウェス%l;#;は火入れの時に使います。\n間違って捨てないで下さいね」
2086 = "「\\x%lウェス;#00ffc040;Vải lau máy%l;#; đã lau dầu sẽ được dùng khi nhóm lửa. Đừng vứt nhầm nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「了解でーす、ハチロクさぁん」
2216 = "「Rõ rồi ạ~, chị Hachiroku~」"
# monologue
# JP: 声のあがった場所にはすぐさま、\nハチロクが駆け寄りチェックしていく。
2603 = "Ngay lập tức, Hachiroku chạy đến nơi phát ra tiếng nói và tiến hành kiểm tra."
# monologue
# JP: その足取りは、軽やかを越し、飛ぶようだ。
2836 = "Bước chân của em ấy, vượt qua cả sự nhẹ nhàng, cứ như đang bay vậy."
# monologue
# JP: （無理もない。\nようやく――ここまで来れたのだからな）
3457 = "（Cũng phải thôi. Cuối cùng——cũng đã đến được bước này rồi mà.）"
# monologue
# JP: \\x%l動輪;#00ffc040;動輪%l;#;、車軸、車体、ボイラ。\n深刻なものから軽微なものまで、修復すべき数多の部品。
99 = "\\x%l動輪;#00ffc040;Bánh xe chủ động%l;#;, trục xe, thân xe, lò hơi. Từ những thứ nghiêm trọng đến những thứ nhỏ nhặt, vô số bộ phận cần phải sửa chữa."
# monologue
# JP: それら全てが、ひとまずではあるが整った。\nいや――整えていただけた。
3351 = "Tất cả những thứ đó, tạm thời đã được chuẩn bị xong. Không——đã được chuẩn bị giúp."
# 【蓑笠】
# display as 蓑笠
# JP: 「……御一夜の職人たちの、誇りば感じる仕事ですな。\n新旧部品すり合わせ良し、ぴたりハマっておりますばい」
1544 = "「......Quả là một công việc mang đầy niềm tự hào của những người thợ thủ công Ohimitera nhỉ. Việc mài khớp các bộ phận cũ và mới rất tốt, vừa khít luôn.」"
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます、蓑笠様。\n引き続き、各所の点検をお願いいたします」
2275 = "「Cảm ơn ông, ông Minokasa. Xin ông tiếp tục kiểm tra các bộ phận khác ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「よかですよ」
1941 = "「Được thôi.」"
# monologue
# JP: 蓑笠老人をはじめとする、職人有志のみなさんから。\nたくさんの市民ボランティアの方々から。
2644 = "Từ những người thợ thủ công tình nguyện, đứng đầu là ông lão Minokasa. Từ vô số những tình nguyện viên là người dân trong thành phố."
# monologue
# JP: 御一夜周辺――湯医線沿線やクマ川流域の広くからも、\n数えきれぬほどの応援と励ましと手とを、いただいた。
2903 = "Xung quanh Ohimitera——dọc theo tuyến Yui và trên một khu vực rộng lớn của lưu vực sông Kuma, chúng tôi đã nhận được vô số sự ủng hộ, động viên và giúp đỡ."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんおまたせ。頼まれた分と余分の蒸留水、\n入口前に、タンク横付けで持ってきとーとよ」
1782 = "「Sou-chan đợi lâu chưa. Lượng nước cất em nhờ và cả phần dư thêm, chị đã mang đến và đặt bồn nước ở ngay trước lối vào rồi đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、真闇姉。\nおかげで、これで注水に入れる。ハチロク？」
2273 = "「Cảm ơn chị Mayami. Nhờ có chị, bây giờ chúng ta có thể bắt đầu bơm nước. Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「では、注水の監督はポーレットさんにお願いします。\nマニュアルどおりで、大丈夫でしょうか？」
2171 = "「Vậy thì, việc giám sát bơm nước xin nhờ Thị trưởng Paulette ạ. Cứ làm theo hướng dẫn, chị làm được chứ ạ?」"
# monologue
# JP: ハチロクの声に、\nポーレットの顔がハっとしたように持ち上がる。
3236 = "Nghe tiếng Hachiroku, Paulette ngẩng mặt lên như chợt bừng tỉnh."
# monologue
# JP: その手には、ハチロクお手製のメンテナンスマニュアル。\nぎりぎりまで、読み込んでくれていたようだ。
2834 = "Trên tay cô ấy là cuốn sổ tay bảo dưỡng do chính Hachiroku làm. Có vẻ như cô ấy đã đọc nó cho đến tận phút chót."
# 【ポーレット】
# display as 波萊特
# JP: 「マニュアルしっかりしてるから大丈夫とは思うけど……\n完全に未経験のことだから、少しだけは不安、かも」
2082 = "「Tôi nghĩ là sẽ ổn vì sổ tay hướng dẫn rất rõ ràng...... Nhưng vì hoàn toàn chưa có kinh nghiệm, nên tôi có chút bất an.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、でしたら大宮さんについてもらえばいいですよ。\n大宮さん、大宮さん！　よろしいですか？」
1960 = "「A, nếu vậy thì nhờ anh Omiya đi cùng là được thôi. Anh Omiya, anh Omiya! Có được không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、助かります。\nどうぞ、よろしくお願いします」
1929 = "「A, vậy thì tốt quá. Xin nhờ anh giúp đỡ ạ.」"
# monologue
# JP: ポーレットの\\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間や、赤井宮司の人脈から\n集まってくれた旧\\x%l帝鉄;#00ffc040;帝鉄%l;#;の技師さんや職員さんたち。
3108 = "Những người bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#; của Paulette, cùng với các kỹ sư và nhân viên của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ được tập hợp lại thông qua mạng lưới quan hệ của đền chủ Akai."
# monologue
# JP: ――そうした全ての人たちの力も、想いも。\n新生\\x%l8620;#00ffc040;8620%l;#;の体の中には、きっと等しくこめられている。
2641 = "——Sức mạnh và tâm tư của tất cả những con người đó. Chắc chắn đều được gửi gắm một cách bình đẳng vào trong cơ thể của chiếc \\x%l8620;#00ffc040;8620%l;#; mới sinh này."
# monologue
# JP: （たくさんの手が、運んでくれた。\nおかげでようやく、走行試験までこぎつけたのだ）
3441 = "（Rất nhiều bàn tay đã chung sức. Nhờ đó, cuối cùng chúng tôi cũng đã tiến đến bước chạy thử nghiệm.）"
# monologue
# JP: \\x%l石造機関庫;#00ffc040;石造機関庫%l;#;から御一夜駅ホームまで。\n全行程で１キロも無い、新生\\x%l8620;#00ffc040;8620%l;#;、初めての旅。
2895 = "Từ \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; đến sân ga Ohimitera. Toàn bộ hành trình chưa đến 1 km, chuyến đi đầu tiên của \\x%l8620;#00ffc040;8620%l;#; mới sinh."
# monologue
# JP: けれどもこの小さな一歩を踏み出せなければ――\n僕たちは、ここからどこへも動けはしない。
2648 = "Thế nhưng, nếu không thể bước đi bước chân nhỏ bé này—— Chúng tôi sẽ chẳng thể tiến thêm được bước nào nữa từ đây."
# 【双鉄】
# display as 雙鐵
# JP: 「……力むな。気負うな。\nひとつひとつを、ただ正確にやればいいのだ」
1522 = "「......Đừng căng thẳng. Đừng tạo áp lực cho bản thân. Chỉ cần làm chính xác từng việc một là được.」"
# monologue
# JP: [キャブ,2]運転台の窓から乗り出していた体を戻し、\n\\x%l火室;#00ffc040;火室%l;#;の正面へと戻る。
2991 = "Tôi thu người lại từ cửa sổ buồng lái, và quay lại đối diện với \\x%l火室;#00ffc040;buồng đốt%l;#;."
# monologue
# JP: 途端に凪が、手にしたワンスコで投げ込みの真似。
2736 = "Ngay lập tức, Nagi cầm chiếc xẻng xúc than trên tay làm động tác như đang ném vào."
# 【凪】
# display as 凪
# JP: 「にーさん！\nいよいよ石炭ば投げ込むと？」
1988 = "「Anh hai! Cuối cùng cũng đến lúc xúc than vào rồi hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだだ。注油と水張りとが終わるのを待たねば」
2316 = "「Vẫn chưa. Phải đợi tra dầu và bơm nước xong đã.」"
# 【凪】
# display as 凪
# JP: 「もう待つのは飽きたばい！\n早く石炭、投げ込みたいばい！！」
1886 = "「Em chán chờ đợi lắm rồi! Em muốn mau chóng xúc than vào cơ!!」"
# monologue
# JP: \\x%l火室;#00ffc040;火室%l;#;の床――\\x%l火格子;#00ffc040;[ひごうし,2]火格子%l;#;と呼ばれる場所がスカスカなのが、\n凪にはどうにも落ち着かんらしい。
3184 = "Mặt sàn của \\x%l火室;#00ffc040;buồng đốt%l;#;——nơi được gọi là \\x%l火格子;#00ffc040;ghi lò%l;#; đang trống rỗng, có vẻ làm Nagi không sao yên tâm được."
# monologue
# JP: その上で石炭をあかあか燃やしてみたい――\n気持ちは僕も同じだが、まだまだ時は満ちていない。
2976 = "Muốn thử đốt than cháy rực đỏ trên đó—— Tôi cũng có chung cảm giác ấy, nhưng thời cơ vẫn chưa đến."
# 【双鉄】
# display as 雙鐵
# JP: 「ダメだ、我慢だ。\nいきなり石炭は燃えん。全ては順番だ」
1773 = "「Không được, phải kiên nhẫn. Than không thể tự nhiên bốc cháy được. Mọi thứ đều phải theo thứ tự.」"
# 【凪】
# display as 凪
# JP: 「ぐぎぎぎぎぎぎ」
2378 = "「Gừ gừ gừ gừ gừ」"
# 【日々姫】
# display as ？？？
# JP: 「良かったー！　間に合ったばっ――んんっ、\nどうやら、なんとか間に合いましたね」
1993 = "「May quá! Vẫn kịp lúc——ưm, Có vẻ như, em đã đến kịp lúc nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か」
2118 = "「Hibiki à.」"
# monologue
# JP: \\x%l石造機関庫;#00ffc040;石造機関庫%l;#;の入り口から、\n逆光を背負い日々姫がこちらに近づいてくる。
2803 = "Từ lối vào \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, Hibiki ngược sáng bước lại gần chỗ chúng tôi."
# monologue
# JP: 『私は私に出来る手伝い』などと言い、\n部屋にこもって、なにやらごそごそしていたが――
2611 = "Con bé bảo 『Em sẽ giúp những gì em có thể làm』, rồi nhốt mình trong phòng, lục đục làm gì đó——"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、ハチロク。ちょっといい？」
1807 = "「Hachiroku, Hachiroku. Em có rảnh chút không?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです、日々姫」
2157 = "「Tất nhiên rồi ạ, chị Hibiki.」"
# monologue
# JP: ハチロクが日々姫に近づく。
2682 = "Hachiroku bước lại gần Hibiki."
# monologue
# JP: 機関庫内の無数の視線が、\nふたりの方へと向けられる。
3070 = "Vô số ánh mắt trong xưởng đầu máy đều hướng về phía hai người họ."
# 【日々姫】
# display as 日日姬
# JP: 「見学会のチラシのときに、資料、いろいろ調べて。\nそれで、記念の時にはあった方がいいかと思ったの」
1843 = "「Lúc làm tờ rơi cho buổi tham quan, chị đã tìm hiểu rất nhiều tài liệu. Nên chị nghĩ, vào những dịp kỷ niệm thì có cái này sẽ tốt hơn.」"
# monologue
# JP: 抱えている、なにか、かなり大きな丸いもの。\nそれを「はい」っと、日々姫はハチロクへと渡す。
3035 = "Con bé đang ôm một thứ gì đó hình tròn khá lớn. Hibiki nói 「Đây」 rồi đưa nó cho Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「決まりとかあるなら違っちゃってるかもしれないし、\nプラバンに油絵の具だから、強度も正直わかんないけど」
2132 = "「Nếu có quy định gì đó thì có thể chị đã làm sai, và vì chị vẽ bằng sơn dầu trên tấm nhựa dẻo nên thú thật chị cũng không rõ độ bền của nó đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「これは――」
2309 = "「Đây là——」"
# monologue
# JP: 破顔一笑。\nハチロクは、もうくしゃくしゃの笑顔になる。
2702 = "Khuôn mặt rạng rỡ hẳn lên. Hachiroku nở một nụ cười rạng rỡ đến mức tít cả mắt."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　双鉄様！\n取付け！　取付けをお願いします！」
2351 = "「Ngài Soutetsu! Ngài Soutetsu! Gắn lên đi ạ! Xin ngài hãy gắn nó lên!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1525 = "「Ừm.」"
# monologue
# JP: 一体、何の取付けなのか――
3278 = "Rốt cuộc là gắn cái gì lên cơ chứ——"
# monologue
# JP: キャブから下りて近くによれば、すぐさま僕も理解する。\nハチロクの笑顔の、その[わけ,1]理由も。
2963 = "Khi bước xuống khỏi buồng lái và tiến lại gần, tôi ngay lập tức hiểu ra. Cũng hiểu luôn lý do cho nụ cười của Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「僕ひとりでは無理かもしれんな。\n蓑笠さん、お手伝いをいただけますか」
2047 = "「Chắc một mình tôi không làm được rồi. Ông Minokasa, ông có thể giúp tôi một tay được không?」"
# 【凪】
# display as 凪
# JP: 「任せろばいっ！」
1791 = "「Cứ giao cho em!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪も確かに蓑笠さんだが」
1923 = "「À không, Nagi cũng họ Minokasa thật nhưng mà.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ワシの方ですな。よかですよ」
1874 = "「Cậu gọi lão phải không. Được thôi.」"
# monologue
# JP: 手伝いたがる凪もくわえて、\n蓑笠老人と僕と三人、\\x%l8620;#00ffc040;8620%l;#;前面へ。
3269 = "Thêm cả Nagi đang rất háo hức muốn giúp đỡ, ba người chúng tôi cùng ông lão Minokasa đi về phía trước \\x%l8620;#00ffc040;8620%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？　ハチロク」
2039 = "「Thế nào? Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「少しだけ一時の方向に傾いて――あ！　そうです！\nそうそう！　それできっちり真っ直ぐです」
1877 = "「Nghiêng về hướng một giờ một chút——A! Đúng rồi! Đúng đúng! Vậy là thẳng tắp rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1916 = "「唔？」" 
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「わぁっ！」\n「かぁわいいですぅ～」
1891 = "「Oa!」 「Đáng yêu quá đi mất~」"
# monologue
# JP: 弾ける歓声、背後から。
3328 = "Tiếng reo hò vui sướng vang lên từ phía sau."
# monologue
# JP: いつの間に、僕のすぐ後ろ、\nポーレットとれいなとが立っている。
2597 = "Từ lúc nào, ngay phía sau tôi, Paulette và Reina đang đứng đó."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。良く似合っている。\nこれは――\\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;でいいのか？」
1947 = "「Ừm. Rất hợp đấy. Cái này——gọi là \\x%lヘッドマーク;#00ffc040;biểu trưng đầu tàu%l;#; đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです、双鉄くん。\n\\x%l列車;#00ffc040;列車%l;#;先頭の\\x%lトレインマーク;#00ffc040;トレインマーク%l;#;は、\\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;です」
2126 = "「Đúng vậy, anh Soutetsu. \\x%lトレインマーク;#00ffc040;Biểu trưng tàu%l;#; gắn ở đầu \\x%l列車;#00ffc040;tàu%l;#; được gọi là \\x%lヘッドマーク;#00ffc040;biểu trưng đầu tàu%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『運転試験　ハチロク』か。単純であるがかわいらしい。\nこのマンガは、運転[ボディ]体のハチロクだな？」
1516 = "「『Chạy thử nghiệm Hachiroku』 à. Đơn giản nhưng đáng yêu thật. Hình vẽ manga này là cơ thể lái tàu của Hachiroku nhỉ?」"
# monologue
# JP: チビキャラというものらしいが、\n以前、日々姫が苦手だと言っていた覚えがある。
2961 = "Hình như đây là kiểu vẽ chibi, tôi nhớ trước đây Hibiki từng nói con bé không giỏi vẽ kiểu này."
# 【双鉄】
# display as 雙鐵
# JP: 「専門用語はよくわからんが、苦手とはとても思えんな。\n非常に可愛らしくて、よいと思う」
2049 = "「Anh không rành về thuật ngữ chuyên môn lắm, nhưng anh không nghĩ là em vẽ tệ đâu. Anh thấy nó cực kỳ đáng yêu, rất đẹp.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「そ、そう？」\n「双鉄様……」
2103 = "「V-vậy sao?」 「Ngài Soutetsu......」"
# monologue
# JP: 日々姫だけにとどまらず、\nハチロクまでが照れたのか、うっとりと頬を赤くする。
3028 = "Không chỉ Hibiki, mà cả Hachiroku cũng xấu hổ, đôi má ửng hồng đầy vẻ say sưa."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、報告が遅れましたけど、双鉄くん」
1927 = "「A, tôi báo cáo hơi trễ, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「んむ？」
1954 = "「Hửm?」"
# monologue
# JP: ポーレットの締まった声に背筋が伸びる。
3239 = "Nghe giọng điệu nghiêm túc của Paulette, tôi thẳng lưng lên."
# monologue
# JP: というか、そうだ。\nポーレットがここにいるということは――
2860 = "Mà khoan, đúng rồi. Paulette đang ở đây, điều đó có nghĩa là——"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l8620;#00ffc040;8620%l;#;ボイラへの注水、\nさきほど規定通りに終わりました」
1462 = "「Việc bơm nước vào lò hơi \\x%l8620;#00ffc040;8620%l;#;, vừa nãy đã hoàn thành đúng theo quy định rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、そうでしたそうでした」
1909 = "「A, đúng rồi đúng rồi.」"
# monologue
# JP: \\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;に、まだ見とれ続けていたのだろう。\nぽ～っとしていたれいなも慌てて、姿勢を正す。
3155 = "Chắc hẳn con bé vẫn đang mải mê ngắm nhìn \\x%lヘッドマーク;#00ffc040;biểu trưng đầu tàu%l;#;. Reina đang ngẩn ngơ cũng vội vàng chỉnh đốn lại tư thế."
# 【れいな】
# display as 玲奈
# JP: 「全注油かしょ！　\n注油して、ダブルチェックも完了でぇす！」
2073 = "「Tất cả các vị trí cần tra dầu! Đã tra dầu và hoàn tất kiểm tra chéo rồi ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「ご苦労様です！」
2288 = "「Mọi người vất vả rồi!」"
# monologue
# JP: 明るい声。\nびしりと伸びた背筋で敬礼。
2693 = "Một giọng nói vui vẻ. Cùng cái chào nghiêm trang với sống lưng thẳng tắp."
# monologue
# JP: そしてハチロクは油の染みた\\x%lウェス;#00ffc040;ウェス%l;#;をれいなから回収し、\n僕に向け、芝居がかった一礼をする。
3138 = "Sau đó, Hachiroku thu lại miếng \\x%lウェス;#00ffc040;vải lau máy%l;#; thấm đẫm dầu từ Reina, và cúi chào tôi một cách đầy kịch tính."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2350 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1525 = "「……唔」" 
# monologue
# JP: \\x%l機関士;#00ffc040;機関士%l;#;鞄を大きく開き、\n中から\\x%l運転体;#00ffc040;運転体%l;#;のハチロクを取り出す。
2938 = "Tôi mở rộng chiếc cặp \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;, lấy Hachiroku \\x%l運転体;#00ffc040;thân chính%l;#; từ bên trong ra."
# 【ハチロク】
# display as 八六
# JP: 「ん……」
1912 = "「Ưm......」"
# monologue
# JP: かちり、\\x%lタブレット;#00ffc040;タブレット%l;#;が交換される。\nぱちり、\\x%l運転体;#00ffc040;運転体%l;#;のハチロクの目が開く。
2619 = "Cạch, \\x%lタブレット;#00ffc040;thẻ bảng%l;#; được hoán đổi. Chớp chớp, đôi mắt của Hachiroku \\x%l運転体;#00ffc040;thân chính%l;#; mở ra."
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1905 = "「Ây da.」"
# monologue
# JP: そのまま崩れる\\x%l整備体;#00ffc040;整備体%l;#;のハチロクを、\n機関庫内にしつらえた、専用席へと座らせる。
3140 = "Tôi đỡ lấy Hachiroku \\x%l整備体;#00ffc040;thân chính%l;#; đang đổ gục xuống, và đặt em ấy ngồi vào chiếc ghế chuyên dụng được chuẩn bị sẵn trong xưởng đầu máy."
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。双鉄様」
2274 = "「Cảm ơn ngài, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだまだ、礼には早過ぎる」
2191 = "「Vẫn còn quá sớm để cảm ơn đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ、そうですね」
1959 = "「Fufu, ngài nói đúng.」"
# 【凪】
# display as 凪
# JP: 「早すぎんばい！　おそすぎばいっ！\n早く石炭、投げ込みたいばいっ！！」
1771 = "「Sớm gì mà sớm! Quá trễ rồi á! Em muốn nhanh chóng ném than vào cơ!!」"
# 【ハチロク】
# display as 八六
# JP: 「もうすぐですよ。凪様。\nもうすぐ、“これから”が始まるのです」
2366 = "「Sắp rồi, Nagi. Sắp rồi, “từ bây giờ” sẽ bắt đầu.」"
# monologue
# JP: 凪にというより、\nハチロク自身に言い聞かせているかのようにも聞こえる。
2710 = "Thay vì nói với Nagi, nghe có vẻ như Hachiroku đang tự nhủ với chính mình hơn."
# 【ハチロク】
# display as 八六
# JP: 「ですよね？　双鉄様」
2008 = "「Đúng không ạ? Ngài Soutetsu.」"
# monologue
# JP: 僕へとまっすぐ向く笑顔。\nけれどもその目の奥底に、不安の色を僕は見る。
2705 = "Nụ cười hướng thẳng về phía tôi. Nhưng tận sâu trong đôi mắt ấy, tôi nhìn thấy nét bất an."
# monologue
# JP: あるいはハチロクの目を鏡とし、\n僕の不安を、映してしまっているだけなのかもしれないが。
2613 = "Hoặc có lẽ, đôi mắt của Hachiroku như một tấm gương, chỉ đang phản chiếu lại sự bất an của chính tôi mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nこちらも、言われた準備はすでに万端、整えてある」
2198 = "「Tất nhiên rồi. Phía tôi cũng đã chuẩn bị mọi thứ chu toàn theo như lời em nói.」"
# 【凪】
# display as 凪
# JP: 「だったらやるばい！　さっさとやるばい！！」
2326 = "「Vậy thì làm thôi! Nhanh làm thôi!!」"
# monologue
# JP: 真っ先に凪。\n続いて僕も、ハチロクを抱いてキャブへとあがる。
2743 = "Nagi đi trước tiên. Tiếp theo, tôi ôm Hachiroku bước lên buồng lái."
# monologue
# JP: ――まったく、凪の言うとおりだ。\n何がどうあれ、やるべきことをやる他にない。
1427 = "——Thật tình, đúng như Nagi nói. Dù thế nào đi nữa, chúng ta không còn cách nào khác ngoài việc làm những gì cần làm."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。\\x%lウェス;#00ffc040;ウェス%l;#;を」
1808 = "「Hachiroku. \\x%lウェス;#00ffc040;Vải lau máy%l;#;.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2231 = "「Vâng, thưa ngài Soutetsu.」"
# monologue
# JP: 受け取る\\x%lウェス;#00ffc040;ウェス%l;#;は、ずっしりしている。
2945 = "Miếng \\x%lウェス;#00ffc040;vải lau máy%l;#; tôi nhận lấy nặng trĩu."
# monologue
# JP: こぼれた油をたっぷり吸い込んだそれを、\n空っぽだった\\x%l火格子;#00ffc040;火格子%l;#;の上に順々に並べる。
3005 = "Tôi lần lượt xếp những miếng vải đã thấm đẫm dầu loang lổ đó, lên trên \\x%l火格子;#00ffc040;ghi lò%l;#; đang trống rỗng."
# 【双鉄】
# display as 雙鐵
# JP: 「秦さん、ボイラ準備どうでしょうか？」
2225 = "「Ông Hata, lò hơi chuẩn bị thế nào rồi ạ?」"
# monologue
# JP: ボイラと言っても、\\x%l8620;#00ffc040;8620%l;#;についているそれではない。
3355 = "Nói là lò hơi, nhưng không phải là cái gắn trên \\x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: ボイラ屋の秦さんにお願いして運び込んでいただいた、\n緊急時用の移動式中型ボイラだ。
3232 = "Mà là lò hơi hạng trung di động dùng cho trường hợp khẩn cấp, đã được nhờ ông Hata ở cửa hàng lò hơi mang đến."
# 【蓑笠】
# display as 蓑笠
# JP: 「よかと？　よかよか。\n双鉄君！　秦さんはよかって言うとりますばい」
2158 = "「Được chưa? Tốt rồi tốt rồi. Soutetsu! Ông Hata nói là xong rồi đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2272 = "「Cảm ơn ông.」"
# monologue
# JP: ならば、準備は整った。\nハチロクを見れば、小さな頷き。
2582 = "Vậy thì, mọi thứ đã sẵn sàng. Nhìn sang Hachiroku, em ấy khẽ gật đầu."
# monologue
# JP: そしてハチロクはポケットから、\nごくありきたりな、どこにでもあるマッチを取り出す。
3137 = "Rồi Hachiroku lấy từ trong túi ra, một hộp diêm hết sức bình thường, có thể tìm thấy ở bất cứ đâu."
# 【ハチロク】
# display as 八六
# JP: 「火入れを。どうか、[ハチロク,3]8620に」
2184 = "「Xin ngài hãy châm lửa. Cho 8620.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1525 = "「……唔」" 
# monologue
# JP: 神聖、静謐――\nそんな言葉が、不意に脳裏に浮いてくる。
3210 = "Thiêng liêng, tĩnh lặng—— Những từ ngữ như vậy bất chợt hiện lên trong tâm trí tôi."
# monologue
# JP: やりたがりやの凪でさえ、口も手も全く出さず、\n息を呑み、じっと僕らを見守っている。
2876 = "Ngay cả Nagi vốn luôn háo hức muốn làm mọi thứ, cũng không hề hé môi hay động tay, chỉ nín thở, lặng lẽ dõi theo chúng tôi."
# monologue
# JP: （ただのマッチだ。\nそれだけなのにな――）
3458 = "（Chỉ là một que diêm thôi mà. Chỉ có vậy thôi sao——）"
# monologue
# JP: 指先が震えそうな気がして、力を入れる。\n擦れば、火がつく。
2988 = "Cảm giác như đầu ngón tay sắp run rẩy, tôi dồn lực vào. Quẹt một cái, ngọn lửa bùng lên."
# monologue
# JP: \\x%l火格子;#00ffc040;火格子%l;#;に並べた\\x%lウェス;#00ffc040;ウェス%l;#;の上へとそのまま投げれば、\n油を吸った\\x%lウェス;#00ffc040;ウェス%l;#;が勢い良く燃え始める。
3007 = "Tôi ném nó thẳng lên lớp \\x%lウェス;#00ffc040;vải lau máy%l;#; được xếp trên \\x%l火格子;#00ffc040;ghi lò%l;#;, những miếng \\x%lウェス;#00ffc040;vải lau máy%l;#; ngấm dầu bắt đầu bốc cháy dữ dội."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、[まき]薪を」
1824 = "「Nagi, củi.」"
# 【凪】
# display as 凪
# JP: 「薪ばいっ！」
2138 = "「Củi đây!」"
# monologue
# JP: 乾燥しきった、上質の薪。
3359 = "Những thanh củi chất lượng cao, khô khốc."
# monologue
# JP: 点火材として使うにはもったいないほどのそれは、\n御一夜森林組合の皆様からの寄付品だ。
3358 = "Dùng chúng làm mồi lửa thì thật lãng phí, đây là món đồ được quyên góp từ mọi người trong Hiệp hội Lâm nghiệp Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「さすがによく燃える」
1770 = "「Quả nhiên là cháy rất đượm.」"
# monologue
# JP: 差し入れられた薪はすぐさま炎をまとい、\n\\x%l火格子;#00ffc040;火格子%l;#;上は、文字通りの\\x%l火床;#00ffc040;火床%l;#;へと変わり始める。
3352 = "Những thanh củi được đưa vào lập tức chìm trong ngọn lửa, phía trên \\x%l火格子;#00ffc040;ghi lò%l;#; bắt đầu biến thành một \\x%l火床;#00ffc040;buồng lửa%l;#; đúng nghĩa."
# monologue
# JP: このタイミング。\n手を出せば、凪も無言で僕にワンスコを渡してくれる。
2870 = "Đúng lúc này. Khi tôi đưa tay ra, Nagi cũng im lặng đưa cho tôi chiếc xẻng xúc than."
# 【ハチロク】
# display as 八六
# JP: 「今は、まだ、吸気も排気もありませんので」
2192 = "「Hiện tại, vẫn chưa có khí nạp hay khí xả đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。ゆっくり、少しずつ、まんべんなくだ」
2063 = "「Anh biết rồi. Phải từ từ, từng chút một, và trải đều ra.」"
# monologue
# JP: スコップを伏せず、投げ込まず、\n流し込むように少しずつ、石炭を\\x%l火床;#00ffc040;火床%l;#;にしきつめていく。
2584 = "Không úp xẻng, không ném vào, tôi rải than từng chút một lên \\x%l火床;#00ffc040;buồng lửa%l;#; như thể đang rót xuống."
# monologue
# JP: ……石炭は全く、燃えてくれない。\n\\x%lウェス;#00ffc040;ウェス%l;#;と薪の燃える火が、石炭に潰され弱まっていく。
1448 = "......Than hoàn toàn không chịu cháy. Ngọn lửa từ \\x%lウェス;#00ffc040;vải lau máy%l;#; và củi đang bị than đè bẹp và yếu dần đi."
# 【ハチロク】
# display as 八六
# JP: 「着火準備良し！」
2375 = "「Chuẩn bị đánh lửa tốt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「着火準備良し！」
2374 = "「Chuẩn bị đánh lửa tốt!」"
# monologue
# JP: ――だが、これでいい。\n今までの全ては準備にすぎない。
1424 = "——Nhưng, thế này là được rồi. Tất cả những gì từ nãy đến giờ chỉ là bước chuẩn bị mà thôi."
# monologue
# JP: この瞬間――ここから先が、本番だ！
2898 = "Khoảnh khắc này——từ đây trở đi, mới là phần chính!"
# 【ハチロク】
# display as 八六
# JP: 「ブロワ！」
2313 = "「Thổi gió!」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lブロワー;#00ffc040;ブロワー%l;#;っ！！」
1474 = "「\\x%lブロワー;#00ffc040;Thiết bị thổi gió%l;#;!!」"
# monologue
# JP: （ポーーーーーーーーーーーーっ！！！）
3438 = "（Tuúúúúúúúúúúú!!!）"
# monologue
# JP: 轟く\\x%l汽笛;#00ffc040;汽笛%l;#;！\n\\x%lブロワー;#00ffc040;ブロワー%l;#;バルブを開くと同時、高らかに！！
2867 = "\\x%l汽笛;#00ffc040;Còi hơi nước%l;#; vang rền! Ngay khi van \\x%lブロワー;#00ffc040;thiết bị thổi gió%l;#; được mở, âm thanh cất lên thật cao!!"
# 【日々姫】
# display as 日日姬＆波萊特
# JP: 「わあっ！」\n「うんっ！！」
1890 = "「Oa!」 「Tuyệt quá!!」"
# monologue
# JP: 秦さんの移動式ボイラがくれた蒸気が、\n\\x%l煙管;#00ffc040;煙管%l;#;を抜け、煙突へと一気に抜けていく。
3215 = "Hơi nước từ lò hơi di động của ông Hata cung cấp, đi qua \\x%l煙管;#00ffc040;ống lò hơi%l;#; và thoát thẳng ra ống khói."
# monologue
# JP: 急激な排気にともない、\n\\x%l火室;#00ffc040;火室%l;#;内へと、空気が一気に雪崩れ込む！
3393 = "Cùng với sự xả khí đột ngột, không khí ùa vào bên trong \\x%l火室;#00ffc040;buồng đốt%l;#; như tuyết lở!"
# 【凪】
# display as 凪
# JP: 「あっ！　石炭、燃え始めたばいっ！」
1920 = "「A! Than bắt đầu cháy rồi kìa!」"
# monologue
# JP: 黒から赤に。\nそしてみるみる、顔を焼くほどの炎へと！！
3401 = "Từ đen chuyển sang đỏ. Và chỉ trong chớp mắt, biến thành ngọn lửa nóng hừng hực táp vào mặt!!"
# 【ハチロク】
# display as 八六
# JP: 「着火良し！」
2376 = "「Đánh lửa tốt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「着火良し！」
2373 = "「Đánh lửa tốt!」"
# 【凪】
# display as 凪
# JP: 「着火良しばいっ！」
2372 = "「Đánh lửa tốt!」"
# monologue
# JP: これでいい。\nこれでそのうち、自前の蒸気でやりくりできるようになる。
3097 = "Thế này là ổn rồi. Cứ thế này thì chẳng mấy chốc, nó sẽ có thể tự vận hành bằng hơi nước của chính mình."
# monologue
# JP: 適宜のブロワと給炭で、\n吸気-燃焼-排気のサイクルを回していける。
2910 = "Bằng cách sử dụng thiết bị thổi gió và cấp than hợp lý, chu trình hút khí - đốt cháy - xả khí có thể được vận hành trơn tru."
# 【凪】
# display as 凪
# JP: 「よーやっと、これで[ハチロク,3]8620、走れるとよね！」
1996 = "「Cuối cùng thì, 8620 cũng có thể chạy được rồi nhỉ!」"
# monologue
# JP: やる気に満ち満ちた凪の声。
2741 = "Giọng nói tràn đầy quyết tâm của Nagi."
# monologue
# JP: 否定するのは気の毒だが、\n僕に動かせる事実でもない。
3395 = "Thật đáng thương khi phải phủ nhận điều đó, nhưng đây cũng không phải là sự thật mà tôi có thể thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、まだだ。まだまだだ」
1777 = "「Không, vẫn chưa đâu. Vẫn còn lâu lắm.」"
# 【凪】
# display as 凪
# JP: 「まだまだばいっ！？　なんでばいっ！」
2317 = "「Còn lâu lắm á!? Tại sao vậy!」"
# monologue
# JP: ……走行試験の内容説明の席には確かに、凪もいた。\nが、今更そんなヤボを言ってもしかたあるまい。
1446 = "......Lúc giải thích nội dung chạy thử nghiệm, Nagi chắc chắn cũng có mặt ở đó. Nhưng giờ có trách móc chuyện đó thì cũng chẳng ích gì."
# 【双鉄】
# display as 雙鐵
# JP: 「走れるようになるまでは、\n軽くあと四～五時間はかかる」
1983 = "「Cho đến khi có thể chạy được, cũng phải mất nhẹ nhàng bốn đến năm tiếng nữa.」"
# 【凪】
# display as 凪
# JP: 「四、五時間！？\nどぎゃんしてそぎゃんかかると！！？」
1965 = "「Bốn, năm tiếng á!? Làm sao mà mất nhiều thời gian dữ vậy!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「説明をじっくりやってもいいが――\n別に、しばらく外していても構わんぞ？」
2051 = "「Anh có thể giải thích cặn kẽ cho em nghe—— Nhưng em có ra ngoài một lát cũng không sao đâu?」"
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;のボイラの水が沸騰し、蒸気が各部に行き渡るまで。
2800 = "Cho đến khi nước trong lò hơi của \\x%l8620;#00ffc040;8620%l;#; sôi lên, và hơi nước lan tỏa đến mọi bộ phận."
# monologue
# JP: 石炭は、適度に投げればいいだけだから、\n僕ひとりでも、まったく困ることはない。
3143 = "Chỉ cần ném than vào ở mức độ vừa phải là được, nên dù chỉ có một mình tôi cũng chẳng có vấn đề gì."
# 【凪】
# display as 凪
# JP: 「冗談よすばい！　\nここまで来て、途中で抜けるほど間抜けじゃなかばい」
1832 = "「Đừng có đùa nha! Đã đến tận bước này rồi, em không ngốc đến mức bỏ cuộc giữa chừng đâu.」"
# monologue
# JP: いって、どっかり。\n\\x%l機関助士;#00ffc040;機関助士%l;#;側の席へと凪は、軽そうなその腰を据える。
3294 = "Nói rồi, Nagi ngồi phịch xuống. Con bé đặt cái dáng vẻ nhẹ tênh ấy xuống ghế bên phía \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;."
# 【凪】
# display as 凪
# JP: 「説明きくばい！\n四時間でも五時間でも、どーんと来いばいっ！」
1887 = "「Anh giải thích đi! Dù là bốn tiếng hay năm tiếng, em cũng sẵn sàng nghe hết!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……蒸気が、行き渡ってきたようだな」
1533 = "「......Có vẻ như hơi nước đã lan tỏa khắp nơi rồi.」"
# monologue
# JP: ぴくりとも動かなかった圧力計の針はようやく、\n常圧にまで達してくれた。
3186 = "Kim đồng hồ đo áp suất vốn dĩ không hề nhúc nhích, cuối cùng cũng đã đạt đến mức áp suất bình thường."
# 【双鉄】
# display as 雙鐵
# JP: 「もう間もなくか」
2365 = "「Sắp được rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、随分とおまたせしてしまいましたが――」
1952 = "「Vâng, tuy đã để mọi người phải đợi khá lâu——」"
# monologue
# JP: 目で求められ、\nハチロクを持ち上げキャブの窓から外へと覗かせる。
2692 = "Nhận được ánh mắt khẩn cầu, tôi bế Hachiroku lên để em ấy nhìn ra ngoài qua cửa sổ buồng lái."
# 【ハチロク】
# display as 八六
# JP: 「凪様のお言葉をお借りするなら、\n『間抜け』は一人も、いらっしゃらなかったようですね」
1798 = "「Mượn lời của Nagi thì, có vẻ như không có ai là 『kẻ ngốc』 cả nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2110 = "「Đúng vậy.」"
# monologue
# JP: 機関庫に集った人たちは、一人も欠けずに待ち続けている。\nそこにふんわり、あたたかな匂いがまだ残っている。
3235 = "Những người tập trung trong xưởng đầu máy vẫn đang tiếp tục chờ đợi, không thiếu một ai. Một mùi hương thoang thoảng, ấm áp vẫn còn vương vấn quanh đây."
# monologue
# JP: おにぎりと、味噌汁と。\n真闇姉が炊き出しをしてくれたのだ。
3058 = "Là cơm nắm và súp miso. Chị Mayami đã nấu ăn phát cho mọi người."
# 【ハチロク】
# display as 八六
# JP: 「みなさんそれだけ、\n\\x%l8620;#00ffc040;8620%l;#;に期待してくださっているのですね」
2203 = "「Mọi người đều đang đặt rất nhiều kỳ vọng vào \\x%l8620;#00ffc040;8620%l;#; nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもあろうし、責任感もあるのだろうな」
2305 = "「Chắc cũng có phần vì điều đó, và cũng vì tinh thần trách nhiệm nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1940 = "「Ừm.」"
# monologue
# JP: こくり、ハチロクが深く頷く。
2689 = "Hachiroku gật đầu thật mạnh."
# monologue
# JP: 完璧に修復をしたつもりでも、\n動かすとなれば何がおこるかわからない。
2601 = "Cho dù nghĩ rằng đã phục hồi hoàn hảo, nhưng khi thực sự vận hành thì không biết chuyện gì sẽ xảy ra."
# 【ハチロク】
# display as 八六
# JP: 「なにか、異常が起きてしまった、そのときのため」
2182 = "「Để phòng hờ trường hợp có sự cố bất thường xảy ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。備えてくれているのだ。\n走行試験を、僕らが全うできるよう」
2121 = "「Đúng vậy. Mọi người đang chuẩn bị sẵn sàng. Để chúng ta có thể hoàn thành tốt buổi chạy thử nghiệm này.」"
# 【ハチロク】
# display as 八六
# JP: 「本当にありがたい話です。\n過分なほどに――ここまでをしていただけて」
2212 = "「Thật sự rất biết ơn ạ. Được mọi người giúp đỡ đến mức này——thật sự là quá đỗi ưu ái.」"
# monologue
# JP: 石炭は、元から上等の九洲炭でも、\nさらに一際をよりすぐったもの。
3145 = "Than đá, vốn dĩ đã là loại than Kyushu thượng hạng, nay lại càng được tuyển chọn kỹ lưỡng hơn."
# monologue
# JP: 蒸留水も薪も蒸気も――全て同じだ。\nそこまで上質でなくとも、この試験には十分だった。
3261 = "Nước cất, củi, và cả hơi nước——tất cả đều như vậy. Dù không cần chất lượng cao đến thế, cũng đã quá đủ cho buổi thử nghiệm này."
# 【ハチロク】
# display as 八六
# JP: 「この子の負荷をほんの少しでも減らせるようにと――\nこれほど多くを、みなさまに分けていただけて」
2183 = "「Để giảm bớt gánh nặng cho đứa trẻ này dù chỉ một chút—— Mọi người đã chia sẻ cho chúng ta nhiều đến vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがたいな」
1997 = "「Biết ơn thật đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、本当に」
1951 = "「Vâng, thật sự rất biết ơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。\n次は、僕らが分ける側になろう」
2338 = "「Nếu vậy thì Hachiroku. Tiếp theo, hãy để chúng ta trở thành người chia sẻ.」"
# 【ハチロク】
# display as 八六
# JP: 「！」
2377 = "「!」"
# monologue
# JP: 自然な思いが言葉となる。\n言葉となった思いは思考に連鎖していく。
2959 = "Những suy nghĩ tự nhiên hóa thành lời nói. Những suy nghĩ đã thành lời ấy tiếp tục kéo theo những dòng suy tưởng khác."
# 【双鉄】
# display as 雙鐵
# JP: 「いま復活する\\x%l8620;#00ffc040;8620%l;#;の火を。熱を、蒸気をわけてやるのだ。\n眠っているお前の仲間の――目覚めのために」
2076 = "「Hãy chia sẻ ngọn lửa, sức nóng và hơi nước của \\x%l8620;#00ffc040;8620%l;#; vừa mới hồi sinh này. Để đánh thức——những người đồng đội đang say giấc của em.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。\nはい！　双鉄様」
2123 = "「Vâng. Vâng! Ngài Soutetsu.」"
# monologue
# JP: 強い頷き。
3064 = "Một cái gật đầu mạnh mẽ."
# monologue
# JP: ハチロクは僕を振り返り、\nまっすぐまっすぐ見つめてくる。
2832 = "Hachiroku quay lại nhìn tôi, ánh mắt nhìn thẳng, thật thẳng vào tôi."
# 【ハチロク】
# display as 八六
# JP: 「皆様から分けていただいた全てを――\n必ずやわたくしの妹たちへも」
1991 = "「Tất cả những gì mọi người đã chia sẻ cho chúng ta—— Em nhất định sẽ truyền lại cho các em gái của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 
# 【コン】
# display as 空
# JP: 「ケン！　ケンっ！　ケンっ！！！」
1878 = "「Keng! Keng! Keng!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、コンっ？」
2036 = "「Chuyện gì vậy, Kon?」"
# 【日々姫】
# display as 日日姬＆玲奈
# JP: 「どぎゃんしたと？」\n「どうしたんですかぁ？」
2037 = "「Bị sao vậy?」 「Có chuyện gì vậy ạ~?」"
# monologue
# JP: 外から響いた鳴き声に、\n日々姫とれいなとが駆け出していく。
3237 = "Nghe tiếng kêu từ bên ngoài vọng vào, Hibiki và Reina vội vàng chạy ra."
# 【日々姫】
# display as 日日姬
# JP: 「コン、どぎゃんしたと？　何をそんなに騒いで――\nわああっ！？」
2230 = "「Kon, bị sao vậy? Có chuyện gì mà ồn ào thế—— Oa!?」"
# 【れいな】
# display as 玲奈
# JP: 「わ――わ――わ、すごいです！\nすごい！　鈴なりのスズメさんですぅ」
1889 = "「Oa——oa——oa, tuyệt quá! Tuyệt quá! Một bầy chim sẻ đông đúc luôn ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「スズメ？」
2371 = "「Chim sẻ?」"
# 【ハチロク】
# display as 八六
# JP: 「機関庫も、生き返ったということです」
2310 = "「Điều đó có nghĩa là xưởng đầu máy cũng đã sống lại rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1916 = "「唔？」" 
# monologue
# JP: 落ち着き払った微笑みと。\n隠せぬほどに弾んだ声と。
2699 = "Một nụ cười điềm tĩnh. Cùng một giọng nói rộn ràng không thể giấu giếm."
# 【ハチロク】
# display as 八六
# JP: 「蒸気の熱を、スズメたちはことに好むのです。\n生きた機関庫のスズメたちは、炭で真っ黒に染まります」
2370 = "「Lũ chim sẻ đặc biệt thích sức nóng của hơi nước. Những con chim sẻ ở một xưởng đầu máy còn hoạt động sẽ bị nhuộm đen kịt bởi bụi than.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ならば、やつらの望み通りに、\n真っ黒スズメにしてやろう！」
2115 = "「Hô. Vậy thì, đúng như mong muốn của chúng, hãy biến chúng thành những con chim sẻ đen kịt nào!」"
# monologue
# JP: （ポーーーーーーーーーーーーーーーっ！）
3437 = "（Tuúúúúúúúúúúú!）"
# monologue
# JP: \\x%l汽笛;#00ffc040;汽笛%l;#;一声。\n最初のものより、よほど高らかで誇らしい。
104 = "Một tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#; vang lên. So với âm thanh ban đầu, nó cao vút và đầy kiêu hãnh hơn hẳn."
# 【凪】
# display as 凪
# JP: 「ふんがっ！？」
1921 = "「Á!?」"
# monologue
# JP: 同時に、凪が目を覚ます。\n説明開始の五分後からの、長く静かな眠りから。
3361 = "Đồng thời, Nagi cũng tỉnh giấc. Từ giấc ngủ dài và yên tĩnh kể từ năm phút sau khi bắt đầu giải thích."
# 【凪】
# display as 凪
# JP: 「もう走れるとっ！？」
2025 = "「Đã chạy được rồi á!?」"
# monologue
# JP: 目覚めてすぐにその質問。\n答える代わり、ワンスコをその手に渡す。
3376 = "Vừa thức dậy đã hỏi ngay câu đó. Thay vì trả lời, tôi đưa chiếc xẻng xúc than vào tay con bé."
# 【ハチロク】
# display as 八六
# JP: 「ひとまずは、２０秒に一杯のペースで。\n頼みましたよ、蓑笠凪\\x%l機関助士;#00ffc040;機関助士%l;#;」
1767 = "「Trước mắt thì cứ theo nhịp độ 20 giây một xẻng. Trông cậy vào em đấy, \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; Minokasa Nagi.」"
# 【凪】
# display as 凪
# JP: 「２０秒に一杯、了解ばいっ！」
2381 = "「20 giây một xẻng, rõ rồi!」"
# monologue
# JP: 凪が跳ね上げ扉を開く。\n赤と熱とがキャブ内をさっと染め上げる。
2744 = "Nagi mở tung cánh cửa bật lên. Sắc đỏ và sức nóng ngay lập tức nhuộm kín bên trong buồng lái."
# 【ハチロク】
# display as 八六
# JP: 「オイル、\\x%l走行部;#00ffc040;走行部%l;#;点検良し。\n\\x%l溶栓;#00ffc040;[とけせん,1]溶栓%l;#;正常。ボイラ水位良し」
2165 = "「Dầu máy, \\x%l走行部;#00ffc040;bộ phận chuyển động%l;#; kiểm tra tốt. \\x%l溶栓;#00ffc040;Nút chảy an toàn%l;#; bình thường. Mực nước lò hơi tốt.」"
# monologue
# JP: 前触れもなく、ハチロクが\\x%l喚呼;#00ffc040;喚呼%l;#;を開始する。
2686 = "Không báo trước, Hachiroku bắt đầu \\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;."
# monologue
# JP: 訓練を受けたとおりに体が、\\x%l喚呼;#00ffc040;喚呼%l;#;に応じる。
2931 = "Cơ thể tôi phản xạ lại tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; đúng như những gì đã được huấn luyện."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;正常。\n\\x%lブレーキ;#00ffc040;ブレーキ%l;#;テスト――\\x%l自弁;#00ffc040;自弁%l;#;良し。\\x%l単弁;#00ffc040;単弁%l;#;良し」
1482 = "「\\x%l空気圧縮機;#00ffc040;Máy nén khí%l;#; bình thường. Kiểm tra \\x%lブレーキ;#00ffc040;phanh%l;#;——\\x%l自弁;#00ffc040;van hãm tự động%l;#; tốt. \\x%l単弁;#00ffc040;van hãm đơn%l;#; tốt.」"
# monologue
# JP: ――各部正常。計器類、全て異常無し。
1422 = "——Các bộ phận bình thường. Các loại đồng hồ đo, tất cả đều không có bất thường."
# monologue
# JP: ハチロクとともに確認を終えれば、\nハチロクは一瞬僕を見、正面窓から進行方向へと向き直る。
2708 = "Khi kết thúc việc xác nhận cùng Hachiroku, em ấy nhìn tôi một thoáng, rồi quay lại nhìn về hướng di chuyển qua cửa sổ phía trước."
# 【ハチロク】
# display as 八六
# JP: 「\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;、\\x%lドレンコック;#00ffc040;ドレンコック%l;#;、開放」
1467 = "「\\x%lバイパス弁;#00ffc040;Van bypass%l;#;, \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#;, mở.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;、\\x%lドレンコック;#00ffc040;ドレンコック%l;#;、開く。良し」
1469 = "「\\x%lバイパス弁;#00ffc040;Van bypass%l;#;, \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#;, đã mở. Tốt.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l単弁;#00ffc040;単弁%l;#;、位置、『運転』」
1489 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l単弁;#00ffc040;van hãm đơn%l;#;, vị trí, 『Chạy tàu』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l単弁;#00ffc040;単弁%l;#;、\\x%l運転位置;#00ffc040;運転位置%l;#;――良し」
1488 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l単弁;#00ffc040;van hãm đơn%l;#;, \\x%l運転位置;#00ffc040;vị trí chạy tàu%l;#;——tốt.」"
# monologue
# JP: 自動ブレーキと単独ブレーキ、\nその両方を解除した。
2934 = "Van hãm tự động và van hãm đơn, tôi đã nhả cả hai."
# monologue
# JP: あとはギア――\\x%l逆転機;#00ffc040;逆転機%l;#;を入れ、\n蒸気をシリンダーへと流せば\\x%l8620;#00ffc040;8620%l;#;は走りだす！
2995 = "Còn lại là hộp số——vào \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;, chỉ cần cho hơi nước chảy vào xi lanh, \\x%l8620;#00ffc040;8620%l;#; sẽ bắt đầu chạy!"
# 【ハチロク】
# display as 八六
# JP: 「逆転機、\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;！」
1977 = "「Cần đảo chiều, \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;!」"
# 【双鉄】
# display as 雙鐵
# JP: 「逆転機、\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;良しっ！」
1973 = "「Cần đảo chiều, \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#; tốt!」"
# 【ハチロク】
# display as 八六
# JP: 「出発――」
1829 = "「Xuất phát——」"
# monologue
# JP: 僕の目も、ここでようやく窓から前へと。\n出発信号の表示は緑――“進行”だ！
3360 = "Mắt tôi lúc này cũng đã nhìn ra phía trước qua cửa sổ. Tín hiệu xuất phát đang hiển thị màu xanh——“Tiến lên”!"
# 【ハチロク】
# display as 八六
# JP: 「進行っ！」
1835 = "「Tiến lên!」"
# 【双鉄】
# display as 雙鐵
# JP: 「出発！　進行！」
1830 = "「Xuất phát! Tiến lên!」"
# monologue
# JP: 声と同時に、\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;と\\x%lドレンコック;#00ffc040;ドレンコック%l;#;とを封鎖。\n注意喚起の\\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らす！
3253 = "Cùng lúc hô lên, tôi khóa \\x%lバイパス弁;#00ffc040;van bypass%l;#; và \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#; lại. Kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; để cảnh báo!"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\\x%l加減弁;#00ffc040;加減弁%l;#;を。\nゆっくりと、どこまでもどこまでもゆっくりと」
2354 = "「Ngài Soutetsu. \\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;. Thật chậm rãi, chậm rãi đến mức tối đa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 
# monologue
# JP: シリンダーへと流れる蒸気量を調節する弁、\\x%l加減弁;#00ffc040;加減弁%l;#;。\nそれと連動しているテコをじわじわじわじわ、引き開く。
95 = "Van điều chỉnh lượng hơi nước chảy vào xi lanh, \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;. Tôi kéo mở đòn bẩy liên kết với nó một cách thật từ từ, từ từ."
# 【ハチロク】
# display as 八六
# JP: 「水、たまります」
2170 = "「Nước, sẽ đọng lại đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 
# monologue
# JP: 冷えきったシリンダーへと流れた蒸気が水になるから\n\\x%lドレンコック;#00ffc040;ドレンコック%l;#;を開いてまた閉じ、排水をする。
3117 = "Hơi nước chảy vào xi lanh lạnh ngắt sẽ biến thành nước, nên tôi mở rồi lại đóng \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#; để thoát nước."
# 【凪】
# display as 凪
# JP: 「お？」
# 1954 = "「嗯？」" 
# monologue
# JP: しゅ、しゅ、しゅ、しゅと音がする。
2774 = "Có tiếng xình, xịch, xình, xịch."
# monologue
# JP: シリンダーからピストンへ、そしてゆっくり、\\x%l動輪;#00ffc040;動輪%l;#;へ――\n蒸気が、力を与え始める。
2896 = "Từ xi lanh đến piston, và rồi từ từ, truyền đến \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;—— Hơi nước bắt đầu truyền lực."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l逆転機;#00ffc040;逆転機%l;#;を６５に」
1502 = "「Để \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; ở mức 65.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l逆転機;#00ffc040;逆転機%l;#;６５、よし」
1503 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#; 65, tốt.」"
# monologue
# JP: 最大トルクを得るための、\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;――\n開口率が８０％の状態から、６５へと絞り込む。
94 = "\\x%l前進フルギア;#00ffc040;Cài hết số tiến%l;#; để đạt mô-men xoắn cực đại—— Từ trạng thái độ mở 80%, tôi siết lại còn 65."
# monologue
# JP: 絞り込むことでロスを減らして、\n蒸気の力をトルクから加速へと振り向ける。
2810 = "Việc siết lại sẽ làm giảm thất thoát, chuyển hướng lực của hơi nước từ mô-men xoắn sang gia tốc."
# monologue
# JP: (しゅん、しゅん、しゅん、しゅんっ）
31 = "(Xình, xịch, xình, xịch)"
# 【凪】
# display as 凪
# JP: 「動いてる！　動いてるばいっ！！！」
1839 = "「Đang chạy kìa! Đang chạy kìa!!!」"
# monologue
# JP: 当然だ。\n動輪のはじめの一回転目に、凪は気づけていなかったのか。
3164 = "Đương nhiên rồi. Bộ Nagi không nhận ra vòng quay đầu tiên của bánh xe chủ động sao."
# monologue
# JP: それほどゆっくり――\n\\x%l8620;#00ffc040;8620%l;#;は長い静止から引き出されていく。
2874 = "Chậm rãi đến mức ấy—— \\x%l8620;#00ffc040;8620%l;#; đang dần được kéo ra khỏi sự tĩnh lặng kéo dài."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l加減弁;#00ffc040;加減弁%l;#;、徐々に開いて、\\x%l逆転機;#00ffc040;逆転機%l;#;もあわせるように」
2233 = "「\\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;, từ từ mở ra, điều chỉnh \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; cho phù hợp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1940 = "「嗯」" 
# monologue
# JP: しゅ、しゅ、しゅ、しゅ――\n\\x%lブラスト;#00ffc040;ブラスト%l;#;の音は、\\x%l動輪;#00ffc040;動輪%l;#;の回転を知る目安となる。
2792 = "Xình, xịch, xình, xịch—— Tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#; chính là thước đo để nhận biết chuyển động quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;."
# monologue
# JP: ハチロクに教示されたとおりに、一回転ごと、\n\\x%l加減弁;#00ffc040;加減弁%l;#;テコの引きを増し、逆転ハンドルは絞っていく。
2919 = "Đúng như Hachiroku đã chỉ dạy, cứ mỗi vòng quay, tôi lại tăng lực kéo đòn bẩy \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;, và siết tay gạt đảo chiều lại."
# 【ハチロク】
# display as 八六
# JP: 「御一夜温泉駅入線。一番ホーム。停止準備を」
2173 = "「Tiến vào ga suối nước nóng Ohimitera. Sân ga số 1. Chuẩn bị dừng lại.」"
# monologue
# JP: もう着いたのかと一瞬ギョっとさせられる。\nが、訓練された体は自然と動いてくれる。
3098 = "Tôi giật mình thon thót trong tích tắc vì không ngờ đã đến nơi. Nhưng cơ thể đã được huấn luyện tự động cử động."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l逆転機;#00ffc040;逆転機%l;\\x%lミッドギア;#;#00ffc040;ミッドギア%l;#;。\\x%l加減弁;#00ffc040;加減弁%l;#;――閉じ」
1501 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#; về \\x%lミッドギア;#00ffc040;tầm trung%l;#;. \\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;——đóng.」"
# monologue
# JP: \\x%l逆転機;#00ffc040;逆転機%l;#;を、前進でも後進でもない\\x%lミッドギア;#00ffc040;ミッドギア%l;\n#;いわばニュートラルの状態にする。
2858 = "Chuyển \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về \\x%lミッドギア;#00ffc040;tầm trung%l;#;, không tiến cũng không lùi, nói cách khác là về trạng thái số 0."
# monologue
# JP: そして\\x%l加減弁;#00ffc040;加減弁%l;#;も閉じたなら、動輪を押す蒸気もなくなり、\n\\x%l8620;#00ffc040;8620%l;#;は\\x%l絶気運転;#00ffc040;絶気運転%l;#;――惰力のみで走る状態になる。
2771 = "Và khi \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; cũng được đóng lại, hơi nước đẩy bánh xe chủ động sẽ không còn nữa, \\x%l8620;#00ffc040;8620%l;#; sẽ rơi vào trạng thái \\x%l絶気運転;#00ffc040;chạy cắt hơi%l;#;——chỉ chạy bằng lực quán tính."
# 【ハチロク】
# display as 八六
# JP: 「シリンダー圧良し。\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;・\\x%lドレンコック;#00ffc040;ドレンコック%l;#;開け」
2155 = "「Áp suất xi lanh tốt. Mở \\x%lバイパス弁;#00ffc040;van bypass%l;#; và \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;・\\x%lドレンコック;#00ffc040;ドレンコック%l;#;開け、良し」
1468 = "「Mở \\x%lバイパス弁;#00ffc040;van bypass%l;#; và \\x%lドレンコック;#00ffc040;van xả nước ngưng%l;#;, tốt.」"
# 【ハチロク】
# display as 八六
# JP: 「まだですよ、双鉄様――まだ、まだ――もう少しです」
2318 = "「Vẫn chưa đâu ạ, ngài Soutetsu——chưa đâu, chưa đâu——một chút nữa thôi.」"
# monologue
# JP: “列車はなかなか止まれないもの”\nその頭がある僕の焦りを、ハチロクの声がなだめてくれる。
1445 = "“Tàu hỏa là thứ rất khó dừng lại” Giọng nói của Hachiroku đã xoa dịu sự nôn nóng trong đầu tôi."
# 【ハチロク】
# display as 八六
# JP: 「機関車単機。\\x%l炭水車;#00ffc040;[テンダー,2]炭水車%l;#;も空。\nこれほど軽く、遅いのですから、すぐ止まります」
1870 = "「Đầu máy chạy đơn độc. \\x%l炭水車;#00ffc040;Toa tiếp than nước%l;#; cũng trống rỗng. Nhẹ và chậm như thế này, sẽ dừng lại ngay thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1517 = "「............」"
# monologue
# JP: 返事ができない。\n停止目標はどんどん近づいてきてしまう。
2950 = "Tôi không thể trả lời. Mục tiêu dừng đang ngày càng tiến lại gần."
# monologue
# JP: まだかまだかと――\nその言葉だけが頭をぐるぐる回り始める。
3373 = "Vẫn chưa sao, vẫn chưa sao—— Những lời đó bắt đầu cứ luẩn quẩn trong đầu tôi."
# 【ハチロク】
# display as 八六
# JP: 「今です！　\\x%l自弁;#00ffc040;自弁%l;#;、『\\x%l常用;#00ffc040;常用%l;#;』！」
2017 = "「Bây giờ ạ! \\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 『\\x%l常用;#00ffc040;Phanh thường%l;#;』!」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、『\\x%l常用;#00ffc040;常用%l;#;』――」
1490 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 『\\x%l常用;#00ffc040;Phanh thường%l;#;』——」"
# monologue
# JP: 機関車自体と、引っ張っている\\x%l貨車;#00ffc040;貨車%l;#;や\\x%l客車;#00ffc040;客車%l;#;――\n\\x%l列車;#00ffc040;列車%l;#;全体に連動でかかる、自動\\x%lブレーキ;#00ffc040;ブレーキ%l;#;。
3244 = "Tác động liên kết lên chính bản thân đầu máy, và các \\x%l貨車;#00ffc040;toa chở hàng%l;#; hay \\x%l客車;#00ffc040;toa hành khách%l;#; đang kéo theo—— \\x%lブレーキ;#00ffc040;Phanh%l;#; tự động tác động lên toàn bộ \\x%l列車;#00ffc040;đoàn tàu%l;#;."
# monologue
# JP: ハンドルを焦らず動かし、それを\\x%l常用;#00ffc040;常用%l;#;――\n穏やかに\\x%lブレーキ;#00ffc040;ブレーキ%l;\\x%l圧;#;#00ffc040;圧%l;#;がかかる位置へと落ち着ける。
2927 = "Tôi không vội vã di chuyển tay gạt, đưa nó về \\x%l常用;#00ffc040;phanh thường%l;#;—— Đặt nó vào vị trí mà \\x%l圧;#00ffc040;áp lực%l;#; \\x%lブレーキ;#00ffc040;phanh%l;#; được tác động một cách nhẹ nhàng."
# 【双鉄】
# display as 雙鐵
# JP: 「良し！」
1998 = "「Tốt!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。ハンドル、もっと柔らかに握って大丈夫です」
2353 = "「Ngài Soutetsu. Ngài có thể nắm tay gạt mềm mại hơn một chút cũng không sao đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？　あ、ああ」
1942 = "「Hả!? À, ừ.」"
# monologue
# JP: 言われて気付く。\nガチガチだ。
2967 = "Nghe nói vậy tôi mới nhận ra. Tay tôi đang cứng đờ."
# monologue
# JP: ハンドルを握る手をゆるめれば、\nつまらぬことにも気が回る。
2650 = "Khi nới lỏng bàn tay đang nắm chặt tay gạt, tôi bắt đầu để ý đến cả những điều vớ vẩn."
# monologue
# JP: （機関車単機であれば、自動\\x%lブレーキ;#00ffc040;ブレーキ%l;#;も\n単独\\x%lブレーキ;#00ffc040;ブレーキ%l;#;もかわりないのか）
3445 = "（Nếu chỉ có một đầu máy đơn độc, thì \\x%lブレーキ;#00ffc040;phanh%l;#; tự động hay \\x%lブレーキ;#00ffc040;phanh%l;#; đơn độc cũng chẳng khác gì nhau sao.）"
# monologue
# JP: そうであるのに、全体にかかる自動\\x%lブレーキ;#00ffc040;ブレーキ%l;#;を、\nハチロクが指示してくれたのは……
2670 = "Mặc dù vậy, Hachiroku lại chỉ định sử dụng \\x%lブレーキ;#00ffc040;phanh%l;#; tự động tác động lên toàn bộ đoàn tàu là vì......"
# monologue
# JP: いずれ\\x%l客車;#00ffc040;客車%l;#;を引くそのときを、\nいまから想定しているからかと、ふと思う。
2971 = "Tôi chợt nghĩ, có lẽ là vì em ấy đang giả định cho lúc kéo \\x%l客車;#00ffc040;toa hành khách%l;#; sau này chăng."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、『運転』」
1491 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 『Chạy tàu』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、『運転』　良し！」
1492 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 『Chạy tàu』 tốt!」"
# monologue
# JP: いけない、一瞬、気がゆるんでいた。
2589 = "Không được, trong chốc lát, tôi đã lơ đễnh."
# monologue
# JP: いや！？　\\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置を運転に――\nつまり、\\x%lブレーキ;#00ffc040;ブレーキ%l;\\x%l圧;#;#00ffc040;圧%l;#;をかけない状態にしたのなら！
2594 = "Khoan đã!? Nếu đưa vị trí \\x%lブレーキ;#00ffc040;phanh%l;#; về chạy tàu—— Tức là, nếu để ở trạng thái không tác dụng \\x%l圧;#00ffc040;áp lực%l;#; \\x%lブレーキ;#00ffc040;phanh%l;#; thì!"
# 【凪】
# display as 凪
# JP: 「止まったばーーーいっ！」
1800 = "「Dừng lại rồi!」"
# monologue
# JP: なんの衝撃も発生しない。\n\\x%lブレーキ;#00ffc040;ブレーキ%l;#;ではなく、摩擦と自重で静止したから。
3071 = "Không có một chấn động nào xảy ra. Bởi vì nó đã dừng lại nhờ ma sát và trọng lượng bản thân, chứ không phải do \\x%lブレーキ;#00ffc040;phanh%l;#;."
# monologue
# JP: （……見事だ。それ以外に言葉がない）
3407 = "（......Tuyệt vời. Không còn lời nào khác để diễn tả.）"
# monologue
# JP: 停止位置、まさしくぴたりに停止している。
3069 = "Vị trí dừng, nó đã dừng lại chính xác ngay tại đó."
# monologue
# JP: 声をかけようと視線を向ければ、\nハチロクはきびきびと僕の手元を指差しする。
2949 = "Khi tôi hướng ánh mắt định cất tiếng gọi, Hachiroku nhanh nhẹn chỉ tay vào tay tôi."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l単弁;#00ffc040;単弁%l;#;、『緩ブレーキ』。\n逆転機、\\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
1479 = "「\\x%l単弁;#00ffc040;Van hãm đơn%l;#;, 『Phanh nhẹ』. Cần đảo chiều, \\x%lミッドギア;#00ffc040;tầm trung%l;#;.」"
# monologue
# JP: と、いかん、そうだ。
2590 = "Ái chà, không xong rồi, đúng thế."
# monologue
# JP: この\\x%l列車;#00ffc040;列車%l;#;は、次の駅へと進行しない。\nここに止まって、各所の点検を受けるのだ。
91 = "\\x%l列車;#00ffc040;Đoàn tàu%l;#; này sẽ không đi tiếp đến ga tiếp theo. Nó sẽ dừng lại ở đây và được kiểm tra các bộ phận."
# monologue
# JP: 外部からの衝撃などで勝手に走りださないように、\n機関車に緩い\\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかける。
3128 = "Để tránh việc nó tự chạy do tác động từ bên ngoài, phải tác dụng \\x%lブレーキ;#00ffc040;phanh%l;#; nhẹ lên đầu máy."
# monologue
# JP: そうしてギアをニュートラルへと戻してやれば、\n僕はようやく、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルから手を離せる。
2989 = "Và sau khi đưa số về 0, cuối cùng tôi cũng có thể rời tay khỏi tay gạt \\x%lブレーキ;#00ffc040;phanh%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お疲れ様でした」
2352 = "「Ngài Soutetsu, ngài vất vả rồi ạ.」"
# 【凪】
# display as 凪
# JP: 「確かにそーばい！　おつかればーい！！」
2112 = "「Đúng vậy đó! Vất vả rồi nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うむ」
1937 = "「À...... ừm.」"
# monologue
# JP: 運転時間は、恐らく五分もなかっただろう。\nだというのに――
3399 = "Thời gian lái tàu, có lẽ chưa đầy năm phút. Vậy mà——"
# monologue
# JP: （これが……緊張というものか――\nそれとも、僕は恐怖したのか？）
3456 = "（Đây là...... cái gọi là căng thẳng sao—— Hay là, tôi đã sợ hãi?）"
# monologue
# JP: 全身がべっとりした汗にまみれている。\nしかし何故、それほど汗をかいたかさえもわからない。
2953 = "Toàn thân tôi ướt đẫm mồ hôi dính dớp. Nhưng tôi thậm chí không hiểu tại sao mình lại đổ nhiều mồ hôi đến vậy."
# monologue
# JP: 今感じるのは、ただ猛烈な開放感と、\nそしてわずかな――
3158 = "Cảm giác lúc này, chỉ là một sự giải thoát mãnh liệt, và một chút——"
# 【凪】
# display as 凪
# JP: 「わああ！？　なんか、なんかホームが凄いばいっ！」
1901 = "「Oa!? Sao, sao sân ga nhìn ghê vậy!」"
# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「まぁ」\n「っ！」
1906 = "「Chà.」 「!」"
# monologue
# JP: ポーレットだろうか、日々姫だろうか。
2599 = "Là Paulette, hay là Hibiki đây."
# monologue
# JP: いや、おそらくは、ふたりで――みんなで、\n準備していてくれたのだろう。
2605 = "Không, có lẽ là, cả hai người họ——tất cả mọi người, đã cùng nhau chuẩn bị."
# 【凪】
# display as 凪
# JP: 「綺麗ばーい、おもしろかばーい！」
1999 = "「Đẹp quá đi, thú vị quá đi!」"
# monologue
# JP: モールで彩られた大きなボードを、\nたくさんの手が――みんなの笑顔が、掲げてる。
2822 = "Một tấm bảng lớn được trang trí bằng ruy băng, được giương lên bởi rất nhiều cánh tay——cùng những nụ cười của mọi người."
# monologue
# JP: ボードの上に、色とりどりの元気な文字で――
3147 = "Trên tấm bảng, những dòng chữ đầy màu sắc và tràn đầy sức sống——"
# 【凪】
# display as 凪
# JP: 「『試験成功おめでとう！　おかえりなさい8620』\n――これ、お祝いのメッセージばいっ！！」
1513 = "「『Chúc mừng thử nghiệm thành công! Chào mừng trở lại 8620』 ——Đây là, lời nhắn chúc mừng đó!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1918 = "「啊！」" 
# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1509 = "「——Ngài Soutetsu.」"
# monologue
# JP: ハチロクの目がうるんでいる。
2697 = "Đôi mắt của Hachiroku đang ngấn lệ."
# monologue
# JP: \\x%l蒸気排水;#00ffc040;蒸気排水%l;#;と口では言いつつ、素直に泣けるハチロクを、\n今日という日は少しだけ、うらやましくも感じてしまう。
2626 = "Hachiroku ngoài miệng thì nói là \\x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#;, nhưng lại có thể khóc một cách thành thật, hôm nay, tôi cảm thấy có chút ghen tị với em ấy."
# 【ハチロク】
# display as 八六
# JP: 「これが、御一夜――\n双鉄様が守ろうとしている、町と人たちなのですね」
2307 = "「Đây là, Ohimitera—— Là thị trấn và những con người mà ngài Soutetsu đang cố gắng bảo vệ đúng không ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これが御一夜、僕を育ててくれた町だ。\n守ろうなどとはおこがましいが――」
2308 = "「Đây là Ohimitera, thị trấn đã nuôi dưỡng anh khôn lớn. Nói là bảo vệ thì có vẻ hơi kiêu ngạo nhưng——」"
# 【凪】
# display as 凪
# JP: 「おうわっ！？　空からなんか降ってきたばい！」
1899 = "「Oái!? Có cái gì rơi từ trên trời xuống kìa!」"
# 【ハチロク】
# display as 八六
# JP: 「雪！！？――\nあ、違います、紙ふぶきです」
2360 = "「Tuyết!!?—— A, không phải ạ, là hoa giấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1902 = "「Fufu.」"
# monologue
# JP: キャブの窓から身を乗り出して、\n凪が大きく空を見上げる。
2738 = "Nhoài người ra khỏi cửa sổ buồng lái, Nagi ngước nhìn lên bầu trời rộng lớn."
# monologue
# JP: が――見ずとも答えは、わかりきってる。
1426 = "Nhưng——không cần nhìn cũng biết rõ câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビのやつも、僕らを祝福してくれているのだな」
2205 = "「Navi cũng đang chúc mừng chúng ta đấy nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ふ――くっ」
1881 = "「Phù——kuku.」"
# monologue
# JP: 感極まるものがあったのか、\nハチロクが僕の胸へと顔をうずめて、肩をふるわす。
2681 = "Có lẽ vì quá xúc động, Hachiroku vùi mặt vào ngực tôi, đôi vai run rẩy."
# monologue
# JP: 胸を貸し髪を撫でながら、\nふっと持ち上げた視線の先に――見つけてしまう。
2840 = "Cho em ấy mượn bờ ngực và vuốt ve mái tóc, tôi chợt ngước mắt lên và——nhìn thấy."
# monologue
# JP: （宝生稀咲と浦上か）
3448 = "（Houshou Kisaki và Uragami sao.）"
# monologue
# JP: 日々姫も気付いていないようだが――\nいつから、どこから見ていたのだろう。
3033 = "Có vẻ như Hibiki cũng chưa nhận ra—— Họ đã đứng xem từ bao giờ, và từ đâu vậy."
# monologue
# JP: 祝福ではなく、視察をしに来た。\nビジネスライクな佇まいがそう、告げている。
2640 = "Họ không đến để chúc mừng, mà là để thị sát. Dáng vẻ đậm chất công sở của họ đang nói lên điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1916 = "「唔？」" 
# monologue
# JP: 視線があったような気がする――いや、あっている。\n宝生稀咲はにやりと笑い、大きく大きく口を動かす。
2754 = "Tôi có cảm giác như ánh mắt chúng tôi vừa chạm nhau——không, đúng là vậy. Houshou Kisaki cười nhếch mép, khẩu hình miệng mở thật to."
# monologue
# JP: （『お、ん、あ、お、お、あ、い』――\n「こんなものかい？」と言っているのか？）
3406 = "（『O, n, a, o, o, a, i』—— Đang nói là 「Chỉ đến mức này thôi sao?」 à?）"
# monologue
# JP: 稀咲は無論、答えを示さず、\nくるり背を向け、浦上とともに立ち去っていく。
3219 = "Kisaki dĩ nhiên không đưa ra câu trả lời, cô quay lưng lại và rời đi cùng với Uragami."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな」
2114 = "「Ra vậy. Đúng vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄、様？」
2356 = "「Ngài, Soutetsu?」"
# monologue
# JP: 僕らは、\\x%l動輪;#00ffc040;動輪%l;#;を回しただけだ。\nそれは確かに、確かに偉大なことではあるが――
2923 = "Chúng tôi, mới chỉ làm cho \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; quay được mà thôi. Đó quả thực, quả thực là một điều vĩ đại nhưng——"
# monologue
# JP: 観光振興につなげるどころか、\nただのひとりの観光客さえ、今はまだ運べていないのだ。
2645 = "Đừng nói đến việc kết nối với chấn hưng du lịch, ngay lúc này, chúng tôi thậm chí còn chưa chở được một vị khách du lịch nào."
# 【双鉄】
# display as 雙鐵
# JP: 「我に返って気付いただけだ。\n僕たちはまだ、始発ホームを出てもいないとな」
2069 = "「Anh chỉ vừa tỉnh mộng và nhận ra thôi. Chúng ta vẫn chưa hề rời khỏi sân ga xuất phát.」"
# 【ハチロク】
# display as 八六
# JP: 「そう。ですね」
# 2110 = "「是啊」" 
# monologue
# JP: ポケットから小さなハンカチをとりだして、\nハチロクはそっと目元をぬぐう。
2683 = "Lấy từ trong túi ra một chiếc khăn tay nhỏ, Hachiroku nhẹ nhàng lau khóe mắt."
# 【ハチロク】
# display as 八六
# JP: 「まだまだ、泣くにも早すぎましたね」
2190 = "「Vẫn còn quá sớm để khóc nhỉ.」"
# monologue
# JP: \\x%l蒸気排水;#00ffc040;蒸気排水%l;#;うんぬんではなく、\n『泣く』とはっきりハチロクは言う。
3362 = "Không phải là \\x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#; hay gì nữa, Hachiroku nói rõ ràng là 『khóc』."
# monologue
# JP: そして笑顔で、\n僕にこっそり耳打ちをする。
3004 = "Rồi với một nụ cười, em ấy thì thầm vào tai tôi."
# 【ハチロク】
# display as 八六
# JP: 「ファンサービスも、\\x%l機関士;#00ffc040;機関士%l;#;の大事なお仕事ですよ？\n双鉄様」
2136 = "「Phục vụ người hâm mộ cũng là một công việc quan trọng của \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; đấy ạ? Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばっ！」
2113 = "「Vậy sao. Nếu thế thì!」"
# monologue
# JP: （ポーーーーーーーーーーーーーーーーーーっ！）
# 3437 = "（嗚——！）" 
# monologue
# JP: \\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らす。\nホームの、御一夜の人たちに、心の限りの感謝を込めて。
2942 = "Tôi kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#;. Gửi gắm vào đó tất cả lòng biết ơn chân thành nhất đến những người dân Ohimitera trên sân ga."
# monologue
# JP: そして同時に、\nここから先に――さらに先へと、旅立つために。
2783 = "Và đồng thời, để khởi hành từ đây——tiến xa hơn nữa."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さん、背中、流してあげようか？」
2344 = "「Anh hai——anh trai, để em chà lưng cho anh nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、まだ顔がお疲れな感じですから。\nもう少し、ゆっくり湯船につかったほうがいいですよ」
2349 = "「Anh Soutetsu, trông mặt anh vẫn còn vẻ mệt mỏi lắm. Anh nên ngâm mình trong bồn tắm từ từ thêm một lúc nữa đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1913 = "「Hừm.」"
# monologue
# JP: 右と左と。
2777 = "Bên phải và bên trái."
# monologue
# JP: すぐ近くから、日々姫とポーレットとが、\nあれこれ話しかけてくる。
3031 = "Từ ngay sát bên cạnh, Hibiki và Paulette đang bắt chuyện đủ thứ."
# monologue
# JP: （まぁ、今日の僕は我ながらよく頑張った。\n労ってくれるつもりではあるのだろうがな）
3431 = "（Mà, hôm nay mình cũng đã cố gắng hết sức rồi. Chắc là họ định an ủi mình đây mà.）"
# monologue
# JP: しかし、それならばもう少しだけ、\n静かにゆったり、風呂を楽しませてもらいたい。
2651 = "Nhưng nếu vậy thì, tôi muốn được tận hưởng việc tắm rửa một cách yên tĩnh và thư thái thêm một chút nữa."
# monologue
# JP: ん？　ああ。
2798 = "Hửm? À."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、凪！　少しいいか？」
1823 = "「Nagi, Nagi! Rảnh chút không?」"
# 【凪】
# display as 凪
# JP: 「んー？　いーばい。なんね、にーさん」
1958 = "「Hửm? Được nè. Gì vậy, anh hai.」"
# monologue
# JP: ふかみとふたり、\n仲良く背中を流し合っていたのが終わったようだ。
2838 = "Có vẻ như việc chà lưng qua lại thân thiết với Fukami đã xong."
# monologue
# JP: 僕の呼び声に応えて凪は、\nスタスタこちらへ近づいてくる。
3238 = "Đáp lại tiếng gọi của tôi, Nagi bước nhanh thoăn thoắt về phía này."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1932 = "「Hô.」"
# monologue
# JP: 動きづらそうな格好で、\nなんと軽やかな歩調であろう。
3365 = "Với một dáng vẻ có vẻ khó di chuyển, mà sao bước chân lại nhẹ nhàng đến vậy."
# monologue
# JP: 小柄で筋肉も薄いというのに、\n一体どこに、この運動能力の秘密があるのか――
3050 = "Dù nhỏ bé và cơ bắp cũng mỏng manh, nhưng bí mật về khả năng vận động này rốt cuộc nằm ở đâu cơ chứ——"
# 【ふかみ】
# display as 深美
# JP: 「はぅっ！？……双鉄おにいさん、ってば、\n『ほう』って！　それに凪ちゃんのこと、熱い視線で！」
1897 = "「Hau!?...... Anh Soutetsu này, sao lại 『Hô』 chứ! Lại còn nhìn Nagi bằng ánh mắt nóng bỏng nữa!」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　いくらバスタオルまいとったって、\n女の子のこと、そぎゃんとじろじろ見るもんじゃなか！」
2346 = "「Anh hai! Dù có quấn khăn tắm đi nữa, anh cũng không được nhìn chằm chằm con gái người ta như thế!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああうむ。それはそうだな」
1925 = "「À ừm. Đúng là vậy.」"
# monologue
# JP: 凪から大きく視線を外せば、凪とふかみに触発されて、\n仲良く背中を流し合ってる、ハチロクとれいなとが見える。
2958 = "Rời mắt hẳn khỏi Nagi, tôi nhìn thấy Hachiroku và Reina, được truyền cảm hứng từ Nagi và Fukami, cũng đang thân thiết chà lưng cho nhau."
# 【れいな】
# display as 玲奈
# JP: 「あははははっ！　\nくすぐったいですぅ、ハチロクさぁん」
1904 = "「Ahahahaha! Nhột quá đi ạ~, chị Hachiroku~」"
# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？　ちょっと、そんなに暴れてはいけません。\nああ、こらっ！　どうして逃げるのですか」
1880 = "「Á!? Này, không được quậy như thế. Aa, này! Sao em lại chạy trốn chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1913 = "「唔」" 
# monologue
# JP: 邪気無く、和やか。\n良いことだ。
2823 = "Ngây thơ, hòa thuận. Thật tốt."
# monologue
# JP: れいなの穏やかな温かさは、ハチロクの中の頑ななものを、\nわずかずつ、溶かしてくれるような気がする。
2913 = "Sự ấm áp dịu dàng của Reina, dường như đang từng chút một làm tan chảy những điều cứng nhắc bên trong Hachiroku."
# 【凪】
# display as 凪
# JP: 「で？　にーさん、ウチになんのよーと？」
2091 = "「Rồi sao? Anh hai, anh gọi em có chuyện gì nè?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1926 = "「À, ừm.」"
# monologue
# JP: 試験走行成功のお祝いムードにどやどや流され、\nここまで話しそびれていたが――
3313 = "Bị cuốn theo bầu không khí ăn mừng thành công của buổi chạy thử nghiệm, đến tận bây giờ tôi mới có dịp nói chuyện này——"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l8620;#00ffc040;8620%l;#;の\\x%l機関助士;#00ffc040;機関助士%l;#;を、これからも凪に頼みたいのだ」
1461 = "「Anh muốn từ giờ trở đi, Nagi vẫn tiếp tục làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; cho \\x%l8620;#00ffc040;8620%l;#;.」"
# 【凪】
# display as 凪
# JP: 「夏休みが終わったあとも？　そら無理ばい。\nウチ、放課後は川下りのお仕事があるけんね」
2128 = "「Kể cả sau khi kỳ nghỉ hè kết thúc á? Vậy thì không được đâu nha. Sau giờ học em còn có công việc chèo thuyền xuôi dòng nữa nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 1918 = "「啊！」" 
# monologue
# JP: 盲点、だった。\n完全にそのことを失念していた。
2970 = "Một điểm mù. Tôi hoàn toàn quên mất chuyện đó."
# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1517 = "「…………」" 
# monologue
# JP: ふかみがじっと、不安そうな目で僕らを見ている。
3116 = "Fukami đang chằm chằm nhìn chúng tôi với đôi mắt đầy vẻ bất an."
# monologue
# JP: 無論、凪が川下りに必要な人材とも理解している。\n横取りする気など毛頭ない。ここは潔く撤回しよう。
2954 = "Tất nhiên, tôi cũng hiểu Nagi là nhân tài cần thiết cho việc chèo thuyền xuôi dòng. Tôi hoàn toàn không có ý định cướp người. Tốt nhất là nên rút lui một cách dứt khoát ở đây."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ついついうっかりしていた。\n凪の\\x%l投炭;#00ffc040;投炭%l;#;が余りに早く上達するので、目が眩んでな」
2078 = "「Xin lỗi em. Anh lỡ quên mất. Tại kỹ năng \\x%l投炭;#00ffc040;xúc than%l;#; của Nagi tiến bộ quá nhanh, làm anh mờ cả mắt.」"
# 【凪】
# display as 凪
# JP: 「ふっふーん、ま、それは仕方のなかことばい？」
1910 = "「Fuffuun, mà, chuyện đó cũng hết cách ha?」"
# monologue
# JP: 自慢気を、形にしたような声と顔。\n凪がまっ平らな胸を張る。
3160 = "Giọng nói và khuôn mặt như hiện thân của sự tự mãn. Nagi ưỡn bộ ngực phẳng lì của mình ra."
# 【凪】
# display as 凪
# JP: 「川が増水で舟出せんときとかは、\nもちろん手伝ってあげるばい！」
2161 = "「Những lúc nước sông dâng cao không thể chèo thuyền được, tất nhiên em sẽ đến giúp anh nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。本当に」
2336 = "「Vậy thì tốt quá. Thật sự cảm ơn em.」"
# monologue
# JP: 今の僕は、駆け出しも駆け出し、\nほとんど素人の\\x%l機関士;#00ffc040;機関士%l;#;だ。
3161 = "Tôi bây giờ, chỉ mới là một người mới bắt đầu, một \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; gần như nghiệp dư."
# monologue
# JP: 試験走行距離を伸ばして、営業運転につなげていくには、\n\\x%l機関助士;#00ffc040;機関助士%l;#;のフォローが絶対に必要となる。
2845 = "Để kéo dài cự ly chạy thử nghiệm và tiến tới vận hành thương mại, sự hỗ trợ của \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; là tuyệt đối cần thiết."
# monologue
# JP: （しかし……正直、困ったな）
3429 = "（Tuy nhiên...... thành thật mà nói, rắc rối thật.）"
# 【日々姫】
# display as 日日姬
# JP: 「あの、にぃ――んんっ、兄さん？\n\\x%l機関助士;#00ffc040;機関助士%l;#;って、兄さんがいつも練習している――」
2324 = "「Dạ, anh ha——ưm, anh trai? \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#; là công việc mà anh vẫn luôn luyện tập——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\\x%l投炭;#00ffc040;投炭%l;#;だな。\nそう。あれをメインに、機関車の走行を助ける仕事だ」
2009 = "「À, là \\x%l投炭;#00ffc040;xúc than%l;#;. Đúng vậy. Công việc chính là đó, ngoài ra còn giúp đỡ việc vận hành đầu máy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……練習すれば、どうでしょう？\nあれは、私にも出来ますか？」
1536 = "「......Nếu luyện tập thì sao ạ? Việc đó, em có làm được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「できるな」
2238 = "「Được chứ.」"
# monologue
# JP: そこは考えるまでもない。\n日々姫は文武両道なうえ、努力を惜しまぬ性格だから。
3357 = "Chuyện đó thì khỏi phải bàn. Hibiki vốn dĩ văn võ song toàn, tính cách lại không ngừng nỗ lực mà."
# monologue
# JP: いや――これこそ本当の盲点か？\n体格的にも、日々姫なら十分に小柄なのだし――
2794 = "Không——đây mới thực sự là điểm mù sao? Về thể hình, Hibiki cũng đủ nhỏ nhắn——"
# 【日々姫】
# display as 日日姬
# JP: 「なら、私。練習してみて、できそうだったら、\nにぃに――んんっ――兄さんの、\\x%l機関助士;#00ffc040;機関助士%l;#;になります」
2332 = "「Vậy thì, em. Em sẽ thử luyện tập, nếu thấy làm được, em sẽ trở thành \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; của anh ha——ưm——anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは助かる」
2117 = "「Vậy sao, thế thì giúp anh nhiều lắm.」"
# monologue
# JP: “僕の”ではなく、“8620の”というのがより正しいが、\nそこまで細かなことを気にしても仕方がない。
3119 = "Nói đúng hơn là “của 8620” chứ không phải “của anh”, nhưng giờ để tâm đến những chi tiết nhỏ nhặt đó cũng chẳng ích gì."
# monologue
# JP: 重要なのは、これで\\x%l8620;#00ffc040;8620%l;#;の安全な営業運転へ、\n更に一歩、大きく近づけたということだ。
3382 = "Điều quan trọng là, với việc này, chúng ta đã tiến thêm một bước lớn đến việc vận hành thương mại an toàn cho \\x%l8620;#00ffc040;8620%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「ただ……ええと。\n条件づけとか、そういうのじゃ全然ないんだけど」
1867 = "「Chỉ là...... ừm. Đây không phải là ra điều kiện hay gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？　何だ。\n希望があるなら、遠慮したりせず言ってくれ」
1956 = "「Hửm? Gì vậy. Nếu có mong muốn gì thì cứ nói ra, đừng ngại.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええと、手段と目的が、少し混ざっちゃってるみたいに、\n今の兄さん、見えるかもって」
2042 = "「À thì, em thấy anh trai hiện tại, có vẻ như đang nhầm lẫn một chút giữa phương tiện và mục đích.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1913 = "「唔」" 
# monologue
# JP: 言われてみれば、その傾向はあるかもしれぬ。
3296 = "Nghe em ấy nói vậy, có lẽ tôi cũng có xu hướng đó thật."
# monologue
# JP: 鉄道復権は、観光振興の、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回のための\n手段のひとつにすぎぬはず。だが――
3386 = "Việc khôi phục đường sắt đáng lẽ chỉ là một trong những phương tiện để chấn hưng du lịch, nhằm rút lại việc mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;. Nhưng——"
# 【日々姫】
# display as 日日姬
# JP: 「もっと御一夜のことを良く知ったほうがいいと思うの。\n兄さんが、御一夜を本当に復興させたいんなら」
2064 = "「Em nghĩ anh nên tìm hiểu thêm về Ohimitera. Nếu anh thực sự muốn phục hưng Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「具体的には、どうすればいい？」
2331 = "「Cụ thể thì anh nên làm gì?」"
# 【日々姫】
# display as 日日姬
# JP: 「酒蔵のことも、私の看板描きやなにもかも、\n御一夜の人と密接するお仕事でしょ？　だから――」
2339 = "「Chuyện xưởng rượu, chuyện vẽ biển hiệu của em và mọi thứ khác, đều là những công việc gắn liền với người dân Ohimitera đúng không? Vì vậy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「家事やお前の手伝いに、もう少し目を向ければ、\nよりバランスがとれるかもしれぬというわけか」
2041 = "「Ý em là nếu anh chú ý hơn đến việc nhà và giúp đỡ em, thì mọi thứ sẽ cân bằng hơn sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1940 = "「嗯」" 
# monologue
# JP: ほっとしたような日々姫の笑顔。
3040 = "Nụ cười nhẹ nhõm của Hibiki."
# monologue
# JP: 言い出したくて言い出せない、\nいつもの日々姫が出ていたのかと、今さら気付く。
2968 = "Đến tận bây giờ tôi mới nhận ra, Hibiki vẫn luôn là Hibiki, muốn nói mà không thể nói ra."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、それだったら希望っていうか、\n意見っていうか――」
2323 = "「À này! Nếu vậy thì tôi cũng có một mong muốn, hay đúng hơn là một ý kiến——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。言ってみてくれ」
1943 = "「Ừm. Cô cứ nói đi.」"
# monologue
# JP: 走行試験の成功で、テンションがみなあがっている。\n僕は弱いが、酒を飲んでいるのと似たような状態だろう。
3312 = "Thành công của cuộc chạy thử nghiệm đã làm tâm trạng mọi người phấn khích. Tôi tuy tửu lượng kém, nhưng chắc cũng đang ở trạng thái tương tự như say rượu."
# monologue
# JP: こういうときこそ、忌憚の無い意見が飛び出してくる。\n今はともかく、聞くことに集中してみよう。
3088 = "Chính những lúc thế này, những ý kiến chân thật nhất mới được thốt ra. Tạm thời gác lại mọi chuyện, hãy tập trung lắng nghe xem sao."
# 【ポーレット】
# display as 波萊特
# JP: 「基本線は日々姫ちゃんと同じなんですけど、\nアプローチ、別のやりかたの方がもっといいかなぁって」
2057 = "「Hướng đi cơ bản của tôi cũng giống với Hibiki, nhưng tôi nghĩ có lẽ một cách tiếp cận khác sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「別のやり方？」
2130 = "「Cách tiếp cận khác?」"
# 【ポーレット】
# display as 波萊特
# JP: 「例えばですけど、双鉄くんに政策秘書に入ってもらって、\n市政のレベルで観光振興に力を注いで欲しいなぁ、って」
2148 = "「Ví dụ như, tôi muốn anh Soutetsu trở thành thư ký chính sách, và tập trung nỗ lực chấn hưng du lịch ở cấp độ chính quyền thành phố.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2116 = "「是嗎」" 
# monologue
# JP: 日々姫は地道なボトムアップ。\nポーレットは一気のトップダウン。
3037 = "Hibiki là phương pháp đi từ dưới lên một cách chậm rãi. Paulette là phương pháp đi từ trên xuống một cách dứt khoát."
# monologue
# JP: 同じく観光振興、御一夜再生を目的として、\nしかし手段は１８０度異なっている。
2673 = "Cùng có chung mục đích là chấn hưng du lịch, tái thiết Ohimitera, nhưng phương tiện lại khác nhau 180 độ."
# 【ポーレット】
# display as 波萊特
# JP: 「今回の試験走行までで、御一夜のキーマンが何人も、\n双鉄くんを信頼してくれたと思いますし、その人脈も」
2312 = "「Cho đến cuộc chạy thử nghiệm lần này, tôi nghĩ đã có rất nhiều nhân vật chủ chốt của Ohimitera tin tưởng anh Soutetsu, và cả những mối quan hệ đó nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、市政という長いテコを使えば、作用も大きい。\nポーレットのいうこともまた、理解はできるな」
1914 = "「Hừm, nếu sử dụng đòn bẩy dài là chính quyền thành phố, tác động sẽ rất lớn. Những gì Paulette nói, tôi cũng có thể hiểu được.」"
# monologue
# JP: ぷっと、ポーレットの頬が膨れる。
3110 = "Paulette phụng phịu phồng má."
# monologue
# JP: こんなに飾らぬ表情は、\n初めて見る気がして何故かしら、少しドキっとさせられる。
3225 = "Hình như đây là lần đầu tiên tôi thấy cô ấy có biểu cảm tự nhiên đến vậy, không hiểu sao lại khiến tim tôi đập thình thịch."
# 【ポーレット】
# display as 波萊特
# JP: 「理解“は”、ですか？」
1512 = "「“Có thể” hiểu được sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n日々姫の意見も、同様に理解できるからな」
1938 = "「Ừm. Bởi vì ý kiến của Hibiki, tôi cũng có thể hiểu được.」"
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃ」
1545 = "「......Anh hai.」"
# monologue
# JP: 安心したような日々姫の声。\nそこにぽちゃん、と、密やかな水音が重なってくる。
3039 = "Giọng nói như đã an tâm của Hibiki. Hòa cùng với đó là tiếng nước khẽ khàng róc rách."
# 【ハチロク】
# display as 八六
# JP: 「確かに、お二方のご意見はともに、\n一理も二理もあるものですね」
2222 = "「Quả thực, ý kiến của cả hai người đều có những cái lý riêng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1805 = "「Hachiroku.」"
# monologue
# JP: れいなをようやく洗ってやり終わったらしい。
2706 = "Có vẻ như em ấy đã tắm rửa xong cho Reina."
# monologue
# JP: ハチロクは、達成感を顔に出し、\n風呂にしずしず入ると同時、僕の膝の上へと座る。
2826 = "Hachiroku bước vào bồn tắm với vẻ mặt đầy tự hào, và đồng thời ngồi lên đùi tôi."
# 【ハチロク】
# display as 八六
# JP: 「けれど、地道なご縁づくりは日々姫の、\n市政はそれこそ、ポーレットさんの得意分野かと存じます」
1775 = "「Tuy nhiên, việc xây dựng các mối quan hệ một cách chậm rãi là sở trường của chị Hibiki, còn chính quyền thành phố lại chính là lĩnh vực chuyên môn của Thị trưởng Paulette.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
2133 = "「Đúng vậy.」"
# monologue
# JP: 地道に縁を築くこと。\n市政という道具を振り回すこと。
3229 = "Việc xây dựng các mối quan hệ một cách chậm rãi. Việc sử dụng công cụ là chính quyền thành phố."
# monologue
# JP: それは日々姫とポーレット、それぞれの積み重ねの技。\n僕がいきなり学べるほどに、容易いものとも思えない。
2747 = "Đó là những kỹ năng được tích lũy của riêng Hibiki và Paulette. Tôi không nghĩ nó dễ dàng đến mức tôi có thể học được ngay lập tức."
# 【ハチロク】
# display as 八六
# JP: 「餅は餅屋、汽車は汽車屋です、双鉄様。\n双鉄様の\\x%l機関士;#00ffc040;機関士%l;#;としての適正は、明快に示されています」
2029 = "「Bánh giầy có thợ làm bánh giầy, tàu hỏa có thợ làm tàu hỏa, ngài Soutetsu. Năng lực của ngài Soutetsu với tư cách là một \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; đã được thể hiện rất rõ ràng.」"
# monologue
# JP: ハチロクの言葉は、依頼ではない。\nただ単に、己の信じる事実を述べているだけだ。
2701 = "Lời của Hachiroku không phải là một lời nhờ vả. Chỉ đơn giản là đang trình bày một sự thật mà em ấy tin tưởng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様でしたら、ほんの半年もあれば、清美機関士同様、\n\\x%l機関助士;#00ffc040;機関助士%l;#;なしでの機関車運用をこなせるようになります」
2060 = "「Nếu là ngài Soutetsu, chỉ cần nửa năm, ngài sẽ có thể vận hành đầu máy xe lửa mà không cần \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; giống như Lái tàu Kiyomi.」"
# monologue
# JP: きっぱりとそう言い切って、\nハチロクは僕、日々姫、ポーレットと順々に見渡す。
3297 = "Nói một cách dứt khoát như vậy, Hachiroku lần lượt nhìn quanh tôi, Hibiki và Paulette."
# 【ハチロク】
# display as 八六
# JP: 「故に、双鉄様は今のレールを[まいしん,1]邁進くださればいいのです。\n双鉄様が道を開けば、必ずみながその正しさに続きます」
1981 = "「Do đó, ngài Soutetsu chỉ cần dũng cảm tiến bước trên con đường hiện tại là được. Nếu ngài Soutetsu mở đường, mọi người chắc chắn sẽ đi theo sự đúng đắn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「極端な意見ではあるが、しかし、理もある」
2306 = "「Một ý kiến cực đoan, nhưng cũng có lý.」"
# monologue
# JP: ハチロクが言っているのは、一点突破で高いところ、\n誰の目にでも留まるところに、旗を掲げろということだ。
2695 = "Điều Hachiroku đang nói là, hãy đột phá ở một điểm và giương cao ngọn cờ ở một nơi thật cao, nơi mà ai cũng có thể nhìn thấy."
# monologue
# JP: それが正しき道筋を示す旗であるなら、目にしたものは、\n必ずそこを目指して後に続いてくれるはずだ、と。
3010 = "Nếu đó là ngọn cờ chỉ ra con đường đúng đắn, thì những người nhìn thấy nó chắc chắn sẽ lấy đó làm mục tiêu và đi theo sau."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1913 = "「唔」" 
# monologue
# JP: 日々姫、ポーレット、ハチロク。
3046 = "Hibiki, Paulette, Hachiroku."
# monologue
# JP: それぞれの意見を、そのまま汲むことはせぬにせよ、\nこれからの方針の参考とすることは大いに有用だろう。
2672 = "Dù không hoàn toàn tiếp thu từng ý kiến một, nhưng việc dùng chúng làm tài liệu tham khảo cho phương hướng sắp tới sẽ rất hữu ích."
# monologue
# JP: （さて、誰の意見が一番僕に合いそうか――）
3460 = "（Vậy thì, ý kiến của ai có vẻ phù hợp với mình nhất đây——）"
# monologue
# JP: 選択に悩むものであるなら、時間を掛けて悩むのより、\n決めて行動、ダメなら修正をすればいい。
3252 = "Nếu phải đau đầu lựa chọn, thay vì dành thời gian để suy nghĩ, tốt hơn hết là quyết định và hành động, nếu không được thì sửa chữa."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2000 = "「Được rồi!」"
# monologue
# JP: （ざばぁ）
3439 = "（Rào）"
# monologue
# JP: 心を決めて湯から出る。
2916 = "Tôi hạ quyết tâm và bước ra khỏi bồn tắm."
# monologue
# JP: 今はひとまず――
3159 = "Bây giờ tạm thời——"
