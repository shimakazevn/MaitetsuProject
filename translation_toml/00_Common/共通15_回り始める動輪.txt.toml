1959 = "「Phù phù, đúng là vậy nhỉ」"

# 【凪】
# display as 凪
# JP: 「早すぎんばい！　おそすぎばいっ！\n早く石炭、投げ込みたいばいっ！！」
1771 = "「Quá sớm cái gì chứ! Trễ lắm rồi á! \\nEm muốn nhanh chóng xúc than vào lò lắm rồi đây nè!!」"

# 【ハチロク】
# display as 八六
# JP: 「もうすぐですよ。凪様。\nもうすぐ、“これから”が始まるのです」
2366 = "「Sắp sửa rồi ạ, Nagi-sama. \\nSắp sửa, \"chuyến hành trình từ nay về sau\" sẽ bắt đầu rồi」"

# monologue
# JP: 凪にというより、\nハチロク自身に言い聞かせているかのようにも聞こえる。
2710 = "Lời nói đó nghe như thể cô ấy đang tự nhủ với chính mình hơn là đang nói với Nagi."

# 【ハチロク】
# display as 八六
# JP: 「ですよね？　双鉄様」
2008 = "「Phải không ạ? Soutetsu-sama」"

# monologue
# JP: 僕へとまっすぐ向く笑顔。\nけれどもその目の奥底に、不安の色を僕は見る。
2705 = "Một nụ cười hướng thẳng về phía tôi. \\nThế nhưng, sâu thẳm trong đôi mắt ấy, tôi có thể nhìn thấy một thoáng lo âu."

# monologue
# JP: あるいはハチロクの目を鏡とし、\n僕の不安を、映してしまっているだけなのかもしれないが。
2613 = "Hoặc cũng có thể, đôi mắt của Hachiroku chỉ như một tấm gương phản chiếu chính sự bất an của bản thân tôi mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nこちらも、言われた準備はすでに万端、整えてある」
2198 = "「Dĩ nhiên rồi. \\nBên này cũng đã hoàn tất mọi khâu chuẩn bị như đã dặn rồi」"

# 【凪】
# display as 凪
# JP: 「だったらやるばい！　さっさとやるばい！！」
2326 = "「Thế thì làm thôi nào! Mau mau làm thôi!!」"

# monologue
# JP: 真っ先に凪。\n続いて僕も、ハチロクを抱いてキャブへとあがる。
2743 = "Đầu tiên là Nagi.\\nNgay sau đó, tôi cũng ôm lấy Hachiroku rồi bước lên buồng lái."

# monologue
