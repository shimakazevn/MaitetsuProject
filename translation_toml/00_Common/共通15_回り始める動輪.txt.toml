3005 = "Tôi xếp từng chiếc đẫm dầu loang lổ ấy lên trên vỉ lò \\x%lhỏa sàng;#00ffc040;hỏa sàng%l;#; vốn đang trống rỗng."

# 【双鉄】
# display as 雙鐵
