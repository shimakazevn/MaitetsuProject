1448 = "……Than hoàn toàn không chịu cháy.\\nNgọn lửa đang cháy từ \\x%lウェス;#00ffc040;giẻ lau%l;#; và củi bị than đè lên nên yếu dần đi."

# 【ハチロク】
# display as 八六
# JP: 「着火準備良し！」
2375 = "「Chuẩn bị đánh lửa hoàn tất!」"

# 【双鉄】
# display as 雙鐵
# JP: 「着火準備良し！」
2374 = "「Chuẩn bị đánh lửa hoàn tất!」"

# monologue
# JP: ――だが、これでいい。\n今までの全ては準備にすぎない。
1424 = "――Nhưng thế này là được rồi.\\nTất cả mọi thứ từ trước đến giờ đều chỉ là bước chuẩn bị."

# monologue
# JP: この瞬間――ここから先が、本番だ！
2898 = "Chính khoảnh khắc này――kể từ đây về sau, mới thực sự là lúc bắt đầu!"

# 【ハチロク】
# display as 八六
# JP: 「ブロワ！」
2313 = "「Quạt hút!」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lブロワー;#00ffc040;ブロワー%l;#;っ！！」
1474 = "「\\x%lQuạt hút;#00ffc040;Quạt hút%l;#;っ！！」"

# monologue
# JP: （ポーーーーーーーーーーーーっ！！！）
3438 = "（Pòòòòòòòòòòòòòòòòòòò!!!）"

# monologue
# JP: 轟く\x%l汽笛;#00ffc040;汽笛%l;#;！\n\x%lブロワー;#00ffc040;ブロワー%l;#;バルブを開くと同時、高らかに！！
2867 = "Tiếng \\x%lCòi hơi nước;#00ffc040;còi hơi nước%l;#; vang rền!\\nNgay khi van \\x%lquạt hút;#00ffc040;quạt hút%l;#; được mở ra, tiếng còi cũng vút cao vang dội!!"

# 【日々姫】
# display as 日日姬＆波萊特
# JP: 「わあっ！」\n「うんっ！！」
1890 = "「Oa!」\\n「Vâng!!」"

# monologue
# JP: 秦さんの移動式ボイラがくれた蒸気が、\n\x%l煙管;#00ffc040;煙管%l;#;を抜け、煙突へと一気に抜けていく。
3215 = "Lượng hơi nước từ lò hơi di động của chị Hada cung cấp\\nđang xuyên qua \\x%lống lò hơi;#00ffc040;ống lò hơi%l;#;, rồi thoát thẳng một mạch ra ngoài ống khói."

# monologue
# JP: 急激な排気にともない、\n\x%l火室;#00ffc040;火室%l;#;内へと、空気が一気に雪崩れ込む！
3393 = "Theo sau luồng khí thải dồn dập,\\nkhông khí lập tức tràn ồ ạt vào trong \\x%lbuồng đốt;#00ffc040;buồng đốt%l;#;!"

# 【凪】
# display as 凪
# JP: 「あっ！　石炭、燃え始めたばいっ！」
1920 = "「A! Than đá bắt đầu cháy rồi kìa!」"

# monologue
# JP: 黒から赤に。\nそしてみるみる、顔を焼くほどの炎へと！！
3401 = "Từ đen chuyển sang đỏ.\\nVà rồi trong nháy mắt, nó bùng lên thành ngọn lửa rực cháy đến mức bỏng rát cả mặt!!"

# 【ハチロク】
# display as 八六
# JP: 「着火良し！」
2376 = "「Đã lên lửa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「着火良し！」
2373 = "「Đã lên lửa!」"

# 【凪】
# display as 凪
# JP: 「着火良しばいっ！」
2372 = "「Châm lửa tốt rồi bấy!」"

# monologue
# JP: これでいい。\nこれでそのうち、自前の蒸気でやりくりできるようになる。
3097 = "Thế này là được. \\nThế này thì chẳng mấy chốc, nó sẽ có thể tự vận hành bằng chính hơi nước của mình."

# monologue
# JP: 適宜のブロワと給炭で、\n吸気-燃焼-排気のサイクルを回していける。
2910 = "Bằng cách điều chỉnh quạt hút và tiếp than hợp lý, \\nvòng tuần hoàn hút khí - đốt cháy - xả khí có thể duy trì hoạt động."

# 【凪】
# display as 凪
# JP: 「よーやっと、これで[ハチロク,3]8620、走れるとよね！」
1996 = "「Cuối cùng thì thế này là 8620 có thể chạy được rồi đúng không!」"

# monologue
# JP: やる気に満ち満ちた凪の声。
2741 = "Giọng nói của Nagi tràn đầy nhiệt huyết."

# monologue
# JP: 否定するのは気の毒だが、\n僕に動かせる事実でもない。
3395 = "Dù phủ nhận thì thật đáng thương cho cô bé, \\nnhưng đây cũng chẳng phải là sự thật mà tôi có thể thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、まだだ。まだまだだ」
1777 = "「Chưa đâu, vẫn chưa được. Còn lâu mới được」"

# 【凪】
# display as 凪
# JP: 「まだまだばいっ！？　なんでばいっ！」
2317 = "「Vẫn chưa được á!? Tại sao chứ bấy!」"

# monologue
# JP: ……走行試験の内容説明の席には確かに、凪もいた。\nが、今更そんなヤボを言ってもしかたあるまい。
1446 = "……Trong buổi giải thích về nội dung chạy thử nghiệm, rõ ràng Nagi cũng có mặt. \\nNhưng giờ này mà lôi chuyện đó ra nói thì thật là vô duyên."

# 【双鉄】
# display as 雙鐵
# JP: 「走れるようになるまでは、\n軽くあと四～五時間はかかる」
1983 = "「Cho đến khi có thể chạy được, \\nnhẹ nhàng cũng phải mất thêm bốn đến năm tiếng nữa」"

# 【凪】
# display as 凪
# JP: 「四、五時間！？\nどぎゃんしてそぎゃんかかると！！？」
1965 = "「Bốn, năm tiếng!? \\nLàm sao mà lại tốn thời gian đến mức đó chứ!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「説明をじっくりやってもいいが――\n別に、しばらく外していても構わんぞ？」
2051 = "「Anh có thể giải thích cặn kẽ cho em nghe―― \\nnhưng nếu muốn, em lánh mặt đi một lát cũng không sao đâu?」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のボイラの水が沸騰し、蒸気が各部に行き渡るまで。
2800 = "Cho đến khi nước trong nồi hơi của \\x%l8620;#00ffc040;8620%l;#; sôi lên, và hơi nước được dẫn đi khắp các bộ phận."

# monologue
# JP: 石炭は、適度に投げればいいだけだから、\n僕ひとりでも、まったく困ることはない。
3143 = "Than đá thì chỉ cần xúc vào vừa phải là được, \\nnên một mình tôi làm cũng hoàn toàn không có vấn đề gì."

# 【凪】
# display as 凪
# JP: 「冗談よすばい！　\nここまで来て、途中で抜けるほど間抜けじゃなかばい」
1832 = "「Đừng có đùa chứ bấy! \\nĐã đến tận nước này rồi, em không có ngốc đến mức bỏ dở giữa chừng đâu bấy」"

# monologue
# JP: いって、どっかり。\n\x%l機関助士;#00ffc040;機関助士%l;#;側の席へと凪は、軽そうなその腰を据える。
3294 = "Ngồi xuống một cách nặng nề.\\n\\x%lPhụ lái;#00ffc040;Phụ lái%l;#; Nagi đặt vòng eo trông có vẻ nhẹ nhàng của mình xuống chiếc ghế bên cạnh."

# 【凪】
# display as 凪
# JP: 「説明きくばい！\n四時間でも五時間でも、どーんと来いばいっ！」
1887 = "「Nghe giải thích thôi nào!\\nCho dù là bốn tiếng hay năm tiếng, cứ tới luôn đi nào!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……蒸気が、行き渡ってきたようだな」
1533 = "「...Có vẻ như hơi nước đã lan tỏa khắp nơi rồi nhỉ」"

# monologue
# JP: ぴくりとも動かなかった圧力計の針はようやく、\n常圧にまで達してくれた。
3186 = "Kim của đồng hồ áp suất vốn chẳng hề dịch chuyển một chút nào, cuối cùng\\ncũng đã đạt đến mức áp suất bình thường."

# 【双鉄】
# display as 雙鐵
# JP: 「もう間もなくか」
2365 = "「Sắp đến lúc rồi sao」"

# 【ハチロク】
# display as 八六
# JP: 「ええ、随分とおまたせしてしまいましたが――」
1952 = "「Vâng, dù đã bắt đầu để mọi người phải chờ đợi lâu nhưng mà――」"

# monologue
# JP: 目で求められ、\nハチロクを持ち上げキャブの窓から外へと覗かせる。
2692 = "Hiểu được qua ánh mắt,\\ntôi bế Hachiroku lên và để cô ấy nhìn ra ngoài từ cửa sổ buồng lái."

# 【ハチロク】
# display as 八六
# JP: 「凪様のお言葉をお借りするなら、\n『間抜け』は一人も、いらっしゃらなかったようですね」
1798 = "「Nếu mượn lời của Nagi-sama thì,\\ncó vẻ như chẳng có một ai là 『kẻ ngốc』 ở đây cả nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2110 = "「Phải vậy rồi」"

# monologue
# JP: 機関庫に集った人たちは、一人も欠けずに待ち続けている。\nそこにふんわり、あたたかな匂いがまだ残っている。
3235 = "Những người tập trung tại nhà ga xe lửa vẫn tiếp tục chờ đợi, không thiếu một ai.\\nNơi đó vẫn còn lưu lại thoang thoảng một mùi hương ấm áp."

# monologue
# JP: おにぎりと、味噌汁と。\n真闇姉が炊き出しをしてくれたのだ。
3058 = "Là cơm nắm và súp miso.\\nChị Mayami đã nấu và chuẩn bị cho mọi người."

# 【ハチロク】
# display as 八六
# JP: 「みなさんそれだけ、\n\x%l8620;#00ffc040;8620%l;#;に期待してくださっているのですね」
2203 = "「Mọi người đều kỳ vọng vào\\n\\x%l8620;#00ffc040;8620%l;#; đến mức đó sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもあろうし、責任感もあるのだろうな」
2305 = "「Chắc hẳn là vậy, và có lẽ một phần cũng là vì tinh thần trách nhiệm nữa」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1940 = "「Vâng」"

# monologue
# JP: こくり、ハチロクが深く頷く。
2689 = "Hachiroku gật đầu một cách sâu sắc."

# monologue
# JP: 完璧に修復をしたつもりでも、\n動かすとなれば何がおこるかわからない。
2601 = "Dẫu cho nghĩ rằng bản thân đã phục chế hoàn hảo đến thế nào,\\ntrên thực tế khi cho vận hành, chẳng ai biết trước được điều gì sẽ xảy ra."

# 【ハチロク】
# display as 八六
# JP: 「なにか、異常が起きてしまった、そのときのため」
2182 = "「\"Nhỡ đâu có sự cố gì xảy ra, thì đây chính là để phòng hờ cho lúc đó\"」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。備えてくれているのだ。\n走行試験を、僕らが全うできるよう」
2121 = "「Phải rồi. Mọi người chuẩn bị chu đáo thế này,\\nlà để chúng ta có thể hoàn thành trọn vẹn buổi chạy thử nghiệm.」"

# 【ハチロク】
# display as 八六
# JP: 「本当にありがたい話です。\n過分なほどに――ここまでをしていただけて」
2212 = "「Thật sự là một điều đáng quý.\\nĐược chuẩn bị chu đáo đến nhường này――quá đỗi ưu ái cho chúng ta rồi.」"

# monologue
# JP: 石炭は、元から上等の九洲炭でも、\nさらに一際をよりすぐったもの。
3145 = "Than đá, dẫu vốn là loại than Kyushu thượng hạng,\\nnhưng đây lại còn là loại được tuyển chọn kỹ lưỡng hơn cả."

# monologue
# JP: 蒸留水も薪も蒸気も――全て同じだ。\nそこまで上質でなくとも、この試験には十分だった。
3261 = "Nước cất, củi lửa, hay hơi nước cũng vậy――tất cả đều thế.\\nDù không đến mức thượng hạng như vậy, thì đối với buổi thử nghiệm này cũng đã là quá đủ rồi."

# 【ハチロク】
# display as 八六
# JP: 「この子の負荷をほんの少しでも減らせるようにと――\nこれほど多くを、みなさまに分けていただけて」
2183 = "「Để có thể giảm bớt dù chỉ một chút gánh nặng cho cô bé này――\\nmọi người đã chia sẻ cho chúng ta nhiều đến nhường này đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたいな」
1997 = "「Thật đáng trân trọng biết bao.」"

# 【ハチロク】
# display as 八六
# JP: 「ええ、本当に」
1951 = "「Vâng, thật sự là như vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。\n次は、僕らが分ける側になろう」
2338 = "「Vậy thì Hachiroku.\\nTiếp theo, chúng ta hãy trở thành những người đi chia sẻ nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「！」
2377 = "「！」"

# monologue
# JP: 自然な思いが言葉となる。\n言葉となった思いは思考に連鎖していく。
2959 = "Suy nghĩ tự nhiên hóa thành lời nói.\\nLời nói ấy lại tiếp tục dẫn lối cho những suy tư."

# 【双鉄】
# display as 雙鐵
# JP: 「いま復活する\x%l8620;#00ffc040;8620%l;#;の火を。熱を、蒸気をわけてやるのだ。\n眠っているお前の仲間の――目覚めのために」
2076 = "「Hãy chia sẻ ngọn lửa, hơi ấm và làn hơi nước của \\x%l8620;#00ffc040;8620%l;#; sắp sửa hồi sinh ngay lúc này.\\nCho sự thức tỉnh――của những người đồng đội vẫn còn đang say ngủ của em.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。\nはい！　双鉄様」
2123 = "「Vâng.\\nVâng! Thưa ngài Soutetsu.」"

# monologue
# JP: 強い頷き。
3064 = "Một cái gật đầu mạnh mẽ."

# monologue
# JP: ハチロクは僕を振り返り、\nまっすぐまっすぐ見つめてくる。
2832 = "Hachiroku quay lại nhìn tôi,\\nvà hướng ánh mắt thẳng tắp về phía tôi."

# 【ハチロク】
# display as 八六
# JP: 「皆様から分けていただいた全てを――\n必ずやわたくしの妹たちへも」
1991 = "「Tất cả những gì mọi người đã sẻ chia cho tôi――\\nnhất định tôi cũng sẽ truyền lại cho các em gái của mình」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 

# 【コン】
# display as 空
# JP: 「ケン！　ケンっ！　ケンっ！！！」
1878 = "「Ken! Ken! Kennn!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、コンっ？」
2036 = "「Gì thế, Kon?」"

# 【日々姫】
# display as 日日姬＆玲奈
# JP: 「どぎゃんしたと？」\n「どうしたんですかぁ？」
2037 = "「Có chuyện chi rứa?」\\n「Có chuyện gì thế ạ?」"

# monologue
# JP: 外から響いた鳴き声に、\n日々姫とれいなとが駆け出していく。
3237 = "Nghe thấy tiếng kêu vang lên từ bên ngoài,\\nHibiki và Reina liền vội vàng chạy ra."

# 【日々姫】
# display as 日日姬
# JP: 「コン、どぎゃんしたと？　何をそんなに騒いで――\nわああっ！？」
2230 = "「Kon, có chuyện chi rứa? Sao em lại làm ầm lên thế――\\nOa á a!?」"

# 【れいな】
# display as 玲奈
# JP: 「わ――わ――わ、すごいです！\nすごい！　鈴なりのスズメさんですぅ」
1889 = "「Oa――oa――oa, tuyệt quá đi mất!\\nTuyệt quá! Đàn chim sẻ đậu kín kịt luôn kìa」"

# 【双鉄】
# display as 雙鐵
# JP: 「スズメ？」
2371 = "「Chim sẻ sao?」"

# 【ハチロク】
# display as 八六
# JP: 「機関庫も、生き返ったということです」
2310 = "「Nghĩa là nhà ga của chúng ta đã thực sự hồi sinh rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1916 = "「唔？」" 

# monologue
# JP: 落ち着き払った微笑みと。\n隠せぬほどに弾んだ声と。
2699 = "Nụ cười mỉm đầy điềm tĩnh.\\nCùng với chất giọng hào hứng chẳng thể giấu nổi."

# 【ハチロク】
# display as 八六
# JP: 「蒸気の熱を、スズメたちはことに好むのです。\n生きた機関庫のスズメたちは、炭で真っ黒に染まります」
2370 = "「Lũ chim sẻ đặc biệt thích hơi ấm từ hơi nước.\\nChim sẻ sống quanh nhà ga còn hoạt động sẽ bị nhuộm đen nhẻm bởi muội than」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ならば、やつらの望み通りに、\n真っ黒スズメにしてやろう！」
2115 = "「Ồ. Vậy thì cứ chiều theo ý chúng, \\nbiến chúng thành những chú chim sẻ đen nhẻm luôn nào!」"

# monologue
# JP: （ポーーーーーーーーーーーーーーーっ！）
3437 = "（Póóóóóóóóóóóóóóóóóóó!）"

# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;一声。\n最初のものより、よほど高らかで誇らしい。
104 = "\\x%lCòi hơi nước;#00ffc040;Còi hơi nước%l;#; vang lên một hồi.\\nSo với tiếng đầu tiên, tiếng này cao vút và đầy kiêu hãnh hơn nhiều."

# 【凪】
# display as 凪
# JP: 「ふんがっ！？」
1921 = "「Hửm!?」"

# monologue
# JP: 同時に、凪が目を覚ます。\n説明開始の五分後からの、長く静かな眠りから。
3361 = "Cùng lúc đó, Nagi cũng tỉnh giấc.\\nTừ một giấc ngủ dài và yên tĩnh, bắt đầu sau khi tôi giải thích được năm phút."

# 【凪】
# display as 凪
# JP: 「もう走れるとっ！？」
2025 = "「Đã chạy lại được rồi sao ạ!?」"

# monologue
# JP: 目覚めてすぐにその質問。\n答える代わり、ワンスコをその手に渡す。
3376 = "Vừa tỉnh dậy là đã hỏi ngay câu đó.\\nThay cho câu trả lời, tôi trao chiếc xẻng xúc than vào tay cô ấy."

# 【ハチロク】
# display as 八六
# JP: 「ひとまずは、２０秒に一杯のペースで。\n頼みましたよ、蓑笠凪\x%l機関助士;#00ffc040;機関助士%l;#;」
1767 = "「Trước mắt, cứ duy trì nhịp độ 20 giây một xẻng.\\nNhờ cả vào em đấy, trợ lý cơ khí \\x%lMinokasa Nagi;#00ffc040;trợ lý cơ khí%l;#;」"

# 【凪】
# display as 凪
# JP: 「２０秒に一杯、了解ばいっ！」
2381 = "「20 giây một xẻng, em rõ rồi ạ!」"

# monologue
# JP: 凪が跳ね上げ扉を開く。\n赤と熱とがキャブ内をさっと染め上げる。
2744 = "Nagi đẩy tung cánh cửa lò.\\nSắc đỏ cùng hơi nóng lập tức nhuộm rực cả cabin buồng lái."

# 【ハチロク】
# display as 八六
# JP: 「オイル、\x%l走行部;#00ffc040;走行部%l;#;点検良し。\n\x%l溶栓;#00ffc040;[とけせん,1]溶栓%l;#;正常。ボイラ水位良し」
2165 = "「Dầu bôi trơn, kiểm tra \\x%lbộ phận chuyển động;#00ffc040;bộ phận chuyển động%l;#; tốt.\\n\\x%lNút chảy an toàn;#00ffc040;Nút chảy an toàn%l;#; bình thường. Mực nước nồi hơi tốt」"

# monologue
# JP: 前触れもなく、ハチロクが\x%l喚呼;#00ffc040;喚呼%l;#;を開始する。
2686 = "Không một lời báo trước, Hachiroku bắt đầu hô \\x%lxác nhận;#00ffc040;xác nhận%l;#;."

# monologue
# JP: 訓練を受けたとおりに体が、\x%l喚呼;#00ffc040;喚呼%l;#;に応じる。
2931 = "Theo đúng những gì đã được huấn luyện, cơ thể tôi tự động phản xạ, đáp lại tiếng \\x%lhô xác nhận;#00ffc040;hô xác nhận%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;正常。\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;テスト――\x%l自弁;#00ffc040;自弁%l;#;良し。\x%l単弁;#00ffc040;単弁%l;#;良し」
1482 = "「\\x%lMáy nén khí;#00ffc040;Máy nén khí%l;#; bình thường.\\nThử \\x%lhãm;#00ffc040;hãm%l;#;――\\x%lVan hãm tự động;#00ffc040;Van hãm tự động%l;#; tốt. \\x%lVan hãm độc lập;#00ffc040;Van hãm độc lập%l;#; tốt」"

# monologue
# JP: ――各部正常。計器類、全て異常無し。
1422 = "――Các bộ phận đều bình thường. Đồng hồ đo, toàn bộ không có gì bất thường."

# monologue
# JP: ハチロクとともに確認を終えれば、\nハチロクは一瞬僕を見、正面窓から進行方向へと向き直る。
2708 = "Khi hoàn tất việc kiểm tra cùng Hachiroku,\\nHachiroku liếc nhìn tôi trong thoáng chốc, rồi hướng mắt qua cửa sổ phía trước về phía hướng chạy của tàu."

# 【ハチロク】
# display as 八六
# JP: 「\x%lバイパス弁;#00ffc040;バイパス弁%l;#;、\x%lドレンコック;#00ffc040;ドレンコック%l;#;、開放」
1467 = "「Mở \\x%lvan nhánh;#00ffc040;van nhánh%l;#;, \\x%lvan xả nước ngưng;#00ffc040;van xả nước ngưng%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lバイパス弁;#00ffc040;バイパス弁%l;#;、\x%lドレンコック;#00ffc040;ドレンコック%l;#;、開く。良し」
1469 = "「\\x%lVan nhánh;#00ffc040;Van nhánh%l;#;, \\x%lvan xả nước ngưng;#00ffc040;van xả nước ngưng%l;#;, mở. Tốt」"

# 【ハチロク】
# display as 八六
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、\x%l単弁;#00ffc040;単弁%l;#;、位置、『運転』」
1489 = "「\\x%lVan hãm tự động;#00ffc040;Van hãm tự động%l;#;, \\x%lvan hãm độc lập;#00ffc040;van hãm độc lập%l;#;, vị trí, 『Vận hành』」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、\x%l単弁;#00ffc040;単弁%l;#;、\x%l運転位置;#00ffc040;運転位置%l;#;――良し」
1488 = "「\\x%lVan tự động;#00ffc040;Van tự động%l;#;、\\x%lVan đơn;#00ffc040;Van đơn%l;#;、\\x%lVị trí vận hành;#00ffc040;Vị trí vận hành%l;#;――Tốt」"

# monologue
# JP: 自動ブレーキと単独ブレーキ、\nその両方を解除した。
2934 = "Cả phanh tự động và phanh độc lập,\\ntôi đều đã nhả ra."

# monologue
# JP: あとはギア――\x%l逆転機;#00ffc040;逆転機%l;#;を入れ、\n蒸気をシリンダーへと流せば\x%l8620;#00ffc040;8620%l;#;は走りだす！
2995 = "Còn lại là cần gạt――gạt \\x%lTay số đảo chiều;#00ffc040;Tay số đảo chiều%l;#; vào,\\nrồi dẫn hơi nước vào xi lanh là \\x%l8620;#00ffc040;8620%l;#; sẽ chuyển bánh!"

# 【ハチロク】
# display as 八六
# JP: 「逆転機、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;！」
1977 = "「Tay số đảo chiều、\\x%lTiến hết số;#00ffc040;Tiến hết số%l;#;！」"

# 【双鉄】
# display as 雙鐵
# JP: 「逆転機、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;良しっ！」
1973 = "「Tay số đảo chiều、\\x%lTiến hết số;#00ffc040;Tiến hết số%l;#; Tốt！」"

# 【ハチロク】
# display as 八六
# JP: 「出発――」
1829 = "「Xuất phát――」"

# monologue
# JP: 僕の目も、ここでようやく窓から前へと。\n出発信号の表示は緑――“進行”だ！
3360 = "Mắt tôi cuối cùng cũng hướng từ cửa sổ ra phía trước.\\nTín hiệu xuất phát hiển thị màu xanh――\"Tiến lên\"!"

# 【ハチロク】
# display as 八六
# JP: 「進行っ！」
1835 = "「Tiến lên！」"

# 【双鉄】
# display as 雙鐵
# JP: 「出発！　進行！」
1830 = "「Xuất phát！ Tiến lên！」"

# monologue
# JP: 声と同時に、\x%lバイパス弁;#00ffc040;バイパス弁%l;#;と\x%lドレンコック;#00ffc040;ドレンコック%l;#;とを封鎖。\n注意喚起の\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らす！
3253 = "Đồng thời với tiếng hô, khóa \\x%lVan phụ;#00ffc040;Van phụ%l;#; và \\x%lVan xả nước;#00ffc040;Van xả nước%l;#; lại.\\nRung một hồi \\x%lCòi hơi nước;#00ffc040;Còi hơi nước%l;#; để cảnh báo!"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\x%l加減弁;#00ffc040;加減弁%l;#;を。\nゆっくりと、どこまでもどこまでもゆっくりと」
2354 = "「Soutetsu-sama. Xin hãy điều khiển \\x%lVan tiết lưu;#00ffc040;Van tiết lưu%l;#;.\\nThật chậm, thật chậm rãi, từ từ thôi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 

# monologue
# JP: シリンダーへと流れる蒸気量を調節する弁、\x%l加減弁;#00ffc040;加減弁%l;#;。\nそれと連動しているテコをじわじわじわじわ、引き開く。
95 = "\\x%lVan tiết lưu;#00ffc040;Van tiết lưu%l;#; là van điều chỉnh lượng hơi nước dẫn vào xi lanh.\\nTôi từ từ, từ từ kéo chiếc cần liên kết với nó ra."

# 【ハチロク】
# display as 八六
# JP: 「水、たまります」
2170 = "「Nước đang tích lại ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1940 = "「嗯」" 

# monologue
# JP: 冷えきったシリンダーへと流れた蒸気が水になるから\n\x%lドレンコック;#00ffc040;ドレンコック%l;#;を開いてまた閉じ、排水をする。
3117 = "Vì hơi nước dẫn vào xi lanh đang nguội lạnh sẽ hóa thành nước,\\nnên tôi mở rồi lại đóng \\x%lVan xả nước;#00ffc040;Van xả nước%l;#; để thoát nước ra ngoài."

# 【凪】
# display as 凪
# JP: 「お？」
# 1954 = "「嗯？」" 

# monologue
# JP: しゅ、しゅ、しゅ、しゅと音がする。
2774 = "Tiếng xình, xịch, xình, xịch vang lên."

# monologue
# JP: シリンダーからピストンへ、そしてゆっくり、\x%l動輪;#00ffc040;動輪%l;#;へ――\n蒸気が、力を与え始める。
2896 = "Từ xi-lanh đến pít-tông, rồi chậm rãi, hướng về \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;――\\nHơi nước bắt đầu truyền đi sức mạnh."

# 【ハチロク】
# display as 八六
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;を６５に」
1502 = "「Chuyển \\x%l逆転機;#00ffc040;cơ cấu đảo chiều%l;#; sang 65」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;６５、よし」
1503 = "「\\x%l逆転機;#00ffc040;Cơ cấu đảo chiều%l;#; 65, rõ」"

# monologue
# JP: 最大トルクを得るための、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;――\n開口率が８０％の状態から、６５へと絞り込む。
94 = "Để đạt được mô-men xoắn cực đại, từ trạng thái \\x%l前進フルギア;#00ffc040;vào hết số tiến%l;#;――\\nvới tỷ lệ mở 80%, nay được siết giảm xuống còn 65%."

# monologue
# JP: 絞り込むことでロスを減らして、\n蒸気の力をトルクから加速へと振り向ける。
2810 = "Việc siết giảm này giúp giảm thiểu hao tổn,\\nchuyển hóa sức mạnh hơi nước từ mô-men xoắn thành gia tốc."

# monologue
# JP: (しゅん、しゅん、しゅん、しゅんっ）
31 = "(Xình, xịch, xình, xịch...)"

# 【凪】
# display as 凪
# JP: 「動いてる！　動いてるばいっ！！！」
1839 = "「Chuyển động rồi! Chuyển động rồi kìa!!!」"

# monologue
# JP: 当然だ。\n動輪のはじめの一回転目に、凪は気づけていなかったのか。
3164 = "Dĩ nhiên rồi.\\nChẳng lẽ Nagi lại không nhận ra vòng quay đầu tiên của bánh xe chủ động sao?"

# monologue
# JP: それほどゆっくり――\n\x%l8620;#00ffc040;8620%l;#;は長い静止から引き出されていく。
2874 = "Chậm rãi đến nhường ấy――\\nđầu máy \\x%l8620;#00ffc040;8620%l;#; được kéo ra khỏi khoảng lặng tĩnh mịch kéo dài."

# 【ハチロク】
# display as 八六
# JP: 「\x%l加減弁;#00ffc040;加減弁%l;#;、徐々に開いて、\x%l逆転機;#00ffc040;逆転機%l;#;もあわせるように」
2233 = "「\\x%l加減弁;#00ffc040;Van điều tiết%l;#;, mở từ từ, đồng thời điều chỉnh cả \\x%l逆転機;#00ffc040;cơ cấu đảo chiều%l;#; sao cho khớp」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1940 = "「嗯」" 

# monologue
# JP: しゅ、しゅ、しゅ、しゅ――\n\x%lブラスト;#00ffc040;ブラスト%l;#;の音は、\x%l動輪;#00ffc040;動輪%l;#;の回転を知る目安となる。
2792 = "Xịch, xịch, xịch, xịch――\\nÂm thanh từ \\x%lブラスト;#00ffc040;ống xả hơi%l;#; chính là thước đo để nhận biết vòng quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#."

# monologue
# JP: ハチロクに教示されたとおりに、一回転ごと、\n\x%l加減弁;#00ffc040;加減弁%l;#;テコの引きを増し、逆転ハンドルは絞っていく。
2919 = "Đúng như những gì Hachiroku đã chỉ dẫn, cứ sau mỗi vòng quay,\\nlực kéo cần \\x%l加減弁;#00ffc040;van điều tiết%l;#; lại tăng lên, còn tay quay đảo chiều thì được siết lại."

# 【ハチロク】
# display as 八六
# JP: 「御一夜温泉駅入線。一番ホーム。停止準備を」
2173 = "「Tiến vào ga Onsen Ohito. Sân ga số 1. Chuẩn bị dừng tàu」"

# monologue
# JP: もう着いたのかと一瞬ギョっとさせられる。\nが、訓練された体は自然と動いてくれる。
3098 = "Tôi giật mình thảng thốt một thoáng, ngỡ ngàng vì đã đến nơi rồi sao.\\nNhưng cơ thể được huấn luyện kỹ càng vẫn tự động phản xạ theo bản năng."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;\x%lミッドギア;#;#00ffc040;ミッドギア%l;#;。\x%l加減弁;#00ffc040;加減弁%l;#;――閉じ」
1501 = "「\\x%l逆転機;#00ffc040;Cơ cấu đảo chiều%l;\\x%lミッドギア;#;#00ffc040;về số trung gian%l;#;. \\x%l加減弁;#00ffc040;Van điều tiết%l;#;――đóng」"

# monologue
# JP: \x%l逆転機;#00ffc040;逆転機%l;#;を、前進でも後進でもない\x%lミッドギア;#00ffc040;ミッドギア%l;\n#;いわばニュートラルの状態にする。
2858 = "Đặt \\x%l逆転機;#00ffc040;bộ đảo chiều%l;#; về vị trí \\x%lミッドギア;#00ffc040;số trung gian%l;\\n#;— hay có thể gọi là số mo, không tiến cũng không lùi."

# monologue
# JP: そして\x%l加減弁;#00ffc040;加減弁%l;#;も閉じたなら、動輪を押す蒸気もなくなり、\n\x%l8620;#00ffc040;8620%l;#;は\x%l絶気運転;#00ffc040;絶気運転%l;#;――惰力のみで走る状態になる。
2771 = "Và khi \\x%l加減弁;#00ffc040;van tiết lưu%l;#; cũng được đóng lại, hơi nước đẩy bánh xe chủ động sẽ không còn nữa,\\n\\x%l8620;#00ffc040;8620%l;#; sẽ chuyển sang trạng thái \\x%l絶気運転;#00ffc040;chạy đà%l;#; —— tức là chạy hoàn toàn bằng quán tính."

# 【ハチロク】
# display as 八六
# JP: 「シリンダー圧良し。\x%lバイパス弁;#00ffc040;バイパス弁%l;#;・\x%lドレンコック;#00ffc040;ドレンコック%l;#;開け」
2155 = "「Áp suất xi-lanh tốt. Mở \\x%lバイパス弁;#00ffc040;van nhánh%l;#; và \\x%lドレンコック;#00ffc040;vòi xả nước ngưng%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lバイパス弁;#00ffc040;バイパス弁%l;#;・\x%lドレンコック;#00ffc040;ドレンコック%l;#;開け、良し」
1468 = "「Mở \\x%lバイパス弁;#00ffc040;van nhánh%l;#; và \\x%lドレンコック;#00ffc040;vòi xả nước ngưng%l;#;, tốt」"

# 【ハチロク】
# display as 八六
# JP: 「まだですよ、双鉄様――まだ、まだ――もう少しです」
2318 = "「Vẫn chưa được đâu, ngài Soutetsu —— vẫn chưa, vẫn chưa —— một chút nữa thôi ạ」"

# monologue
# JP: “列車はなかなか止まれないもの”\nその頭がある僕の焦りを、ハチロクの声がなだめてくれる。
1445 = "“Tàu hỏa vốn dĩ không thể dừng lại ngay được”\\nSự nôn nóng hiện rõ trong tâm trí tôi đã được xoa dịu bởi giọng nói của Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「機関車単機。\x%l炭水車;#00ffc040;[テンダー,2]炭水車%l;#;も空。\nこれほど軽く、遅いのですから、すぐ止まります」
1870 = "「Đầu máy đơn độc. \\x%l炭水車;#00ffc040;Toa chứa than nước%l;#; cũng trống rỗng.\\nVới một cơ thể nhẹ và chậm thế này, xe sẽ dừng lại ngay thôi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1517 = "「…………」"

# monologue
# JP: 返事ができない。\n停止目標はどんどん近づいてきてしまう。
2950 = "Tôi không thể trả lời.\\nVạch đích dừng xe cứ thế tiến lại gần với tốc độ chóng mặt."

# monologue
# JP: まだかまだかと――\nその言葉だけが頭をぐるぐる回り始める。
3373 = "Đã được chưa, đã được chưa ——\\nChỉ bấy nhiêu từ cứ bắt đầu xoáy vòng liên tục trong đầu tôi."

# 【ハチロク】
# display as 八六
# JP: 「今です！　\x%l自弁;#00ffc040;自弁%l;#;、『\x%l常用;#00ffc040;常用%l;#;』！」
2017 = "「Ngay bây giờ ạ! \\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 『\\x%l常用;#00ffc040;phanh thường%l;#;』!」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、『\x%l常用;#00ffc040;常用%l;#;』――」
1490 = "「\\\\x%l自弁;#00ffc040;自剎%l;#;，“\\\\x%l常用;#00ffc040;常用%l;#;”——」"

# monologue
# JP: 機関車自体と、引っ張っている\x%l貨車;#00ffc040;貨車%l;#;や\x%l客車;#00ffc040;客車%l;#;――\n\x%l列車;#00ffc040;列車%l;#;全体に連動でかかる、自動\x%lブレーキ;#00ffc040;ブレーキ%l;#;。
3244 = "Hệ thống \\x%lブレーキ;#00ffc040;phanh%l;#; tự động, hoạt động liên động trên toàn bộ \\x%l列車;#00ffc040;đoàn tàu%l;#; ——\\nbao gồm bản thân đầu máy và cả các \\x%l貨車;#00ffc040;toa chở hàng%l;#; hay \\x%l客車;#00ffc040;toa chở khách%l;#; được kéo theo."

# monologue
# JP: ハンドルを焦らず動かし、それを\x%l常用;#00ffc040;常用%l;#;――\n穏やかに\x%lブレーキ;#00ffc040;ブレーキ%l;\x%l圧;#;#00ffc040;圧%l;#;がかかる位置へと落ち着ける。
2927 = "Không được vội vã, tôi di chuyển tay gạt và đưa nó về vị trí \\x%l常用;#00ffc040;phanh thường%l;#; ——\\nnơi \\x%l圧;#;#00ffc040;áp lực%l;\\x%lブレーキ;#00ffc040;phanh%l;#; được siết vào một cách êm ái."

# 【双鉄】
# display as 雙鐵
# JP: 「良し！」
1998 = "「Tốt!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。ハンドル、もっと柔らかに握って大丈夫です」
2353 = "「Ngài Soutetsu. Ngài có thể nắm tay gạt nhẹ nhàng hơn nữa cũng không sao đâu ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？　あ、ああ」
1942 = "「A!? À, ừm」"

# monologue
# JP: 言われて気付く。\nガチガチだ。
2967 = "Nghe vậy tôi mới nhận ra.\\nNgười mình đang cứng đờ như đá."

# monologue
# JP: ハンドルを握る手をゆるめれば、\nつまらぬことにも気が回る。
2650 = "Nới lỏng đôi tay đang siết chặt tay quay,\\nnhững suy nghĩ vẩn vơ lại bắt đầu len lỏi vào tâm trí."

# monologue
# JP: （機関車単機であれば、自動\x%lブレーキ;#00ffc040;ブレーキ%l;#;も\n単独\x%lブレーキ;#00ffc040;ブレーキ%l;#;もかわりないのか）
3445 = "（Nếu đầu máy chạy đơn độc, thì \\x%lphanh tự động;#00ffc040;phanh%l;#;\\nhay \\x%lphanh độc lập;#00ffc040;phanh%l;#; cũng không có gì khác biệt sao?）"

# monologue
# JP: そうであるのに、全体にかかる自動\x%lブレーキ;#00ffc040;ブレーキ%l;#;を、\nハチロクが指示してくれたのは……
2670 = "Dẫu vậy, việc Hachiroku vẫn chỉ dẫn tôi sử dụng \\x%lphanh tự động;#00ffc040;phanh%l;#; tác động lên toàn bộ hệ thống là vì..."

# monologue
# JP: いずれ\x%l客車;#00ffc040;客車%l;#;を引くそのときを、\nいまから想定しているからかと、ふと思う。
2971 = "Bất chợt tôi nghĩ, có lẽ cô ấy đang muốn tôi chuẩn bị sẵn sàng\\ncho những lúc kéo theo các \\x%ltoa hành khách;#00ffc040;toa xe%l;#; sau này."

# 【ハチロク】
# display as 八六
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、『運転』」
1491 = "「\\x%lVan tự động;#00ffc040;Van tự động%l;#;, 『Vận hành』」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、『運転』　良し！」
1492 = "「\\x%lVan tự động;#00ffc040;Van tự động%l;#;, 『Vận hành』, tốt!」"

# monologue
# JP: いけない、一瞬、気がゆるんでいた。
2589 = "Không được rồi, một khoảnh khắc sơ hở, tôi đã lơ là cảnh giác."

# monologue
# JP: いや！？　\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置を運転に――\nつまり、\x%lブレーキ;#00ffc040;ブレーキ%l;\x%l圧;#;#00ffc040;圧%l;#;をかけない状態にしたのなら！
2594 = "Khoan đã!? Nếu đưa vị trí \\x%lphanh;#00ffc040;phanh%l;#; về chế độ vận hành――\\nnghĩa là, trạng thái không hề áp dụng \\x%lápt lực;#00ffc040;áp lực%l;\\x%lphanh;#;#00ffc040;%l;#; nữa!"

# 【凪】
# display as 凪
# JP: 「止まったばーーーいっ！」
1800 = "「Dừng hẳn rồi bấy nhaーーー!」"

# monologue
# JP: なんの衝撃も発生しない。\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;ではなく、摩擦と自重で静止したから。
3071 = "Không hề có một cú giật hay chấn động nào xảy ra.\\nBởi lẽ tàu dừng lại không phải do tác dụng của \\x%lphanh;#00ffc040;phanh%l;#;, mà là nhờ lực ma sát và tự trọng của chính nó."

# monologue
# JP: （……見事だ。それ以外に言葉がない）
3407 = "（...Tuyệt vời làm sao. Chẳng còn từ ngữ nào khác để diễn tả nữa）"

# monologue
# JP: 停止位置、まさしくぴたりに停止している。
3069 = "Vị trí dừng, chính xác đến từng milimet."

# monologue
# JP: 声をかけようと視線を向ければ、\nハチロクはきびきびと僕の手元を指差しする。
2949 = "Định cất tiếng gọi thì khi hướng mắt nhìn sang,\\ntôi đã thấy Hachiroku đang nhanh nhẹn chỉ tay vào phía tay tôi."

# 【ハチロク】
# display as 八六
# JP: 「\x%l単弁;#00ffc040;単弁%l;#;、『緩ブレーキ』。\n逆転機、\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
1479 = "「\\x%lVan độc lập;#00ffc040;Van độc lập%l;#;, 『Phanh nhẹ』.\\nBộ đảo chiều, \\x%lsố trung gian;#00ffc040;mid-gear%l;#;」"

# monologue
# JP: と、いかん、そうだ。
2590 = "À, không được, phải rồi."

# monologue
# JP: この\x%l列車;#00ffc040;列車%l;#;は、次の駅へと進行しない。\nここに止まって、各所の点検を受けるのだ。
91 = "Chuyến \\x%ltàu;#00ffc040;tàu%l;#; này sẽ không đi tiếp đến nhà ga tiếp theo.\\nNó sẽ dừng ở đây để được kiểm tra toàn diện."

# monologue
# JP: 外部からの衝撃などで勝手に走りださないように、\n機関車に緩い\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかける。
3128 = "Để tránh việc đầu máy tự chạy đi do chấn động từ bên ngoài,\\ntôi kéo nhẹ \\x%lphanh;#00ffc040;phanh%l;#; lại."

# monologue
# JP: そうしてギアをニュートラルへと戻してやれば、\n僕はようやく、\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルから手を離せる。
2989 = "Sau khi gạt cần số về trạng thái trung gian,\\ncuối cùng tôi cũng có thể rút tay ra khỏi cần \\x%lphanh;#00ffc040;phanh%l;#;."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お疲れ様でした」
2352 = "「Soutetsu-sama, ngài vất vả rồi」"

# 【凪】
# display as 凪
# JP: 「確かにそーばい！　おつかればーい！！」
2112 = "「Đúng là vậy đó! Anh vất vả rồi nha!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うむ」
1937 = "「À…… ừm」"

# monologue
# JP: 運転時間は、恐らく五分もなかっただろう。\nだというのに――
3399 = "Thời gian lái có lẽ còn chưa tới năm phút.\\nVậy mà――"

# monologue
# JP: （これが……緊張というものか――\nそれとも、僕は恐怖したのか？）
3456 = "（Đây là…… sự căng thẳng sao――\\nHay là, mình đã thấy sợ hãi?）"

# monologue
# JP: 全身がべっとりした汗にまみれている。\nしかし何故、それほど汗をかいたかさえもわからない。
2953 = "Cả cơ thể tôi ướt đẫm mồ hôi nhễ nhại.\\nNhưng tôi lại chẳng hiểu tại sao mình lại đổ nhiều mồ hôi đến thế."

# monologue
# JP: 今感じるのは、ただ猛烈な開放感と、\nそしてわずかな――
3158 = "Điều tôi cảm nhận được bây giờ chỉ là một sự giải thoát mãnh liệt,\\nvà một chút――"

# 【凪】
# display as 凪
# JP: 「わああ！？　なんか、なんかホームが凄いばいっ！」
1901 = "「Oáaa!? Sân, sân ga đỉnh quá đi mất!」"

# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「まぁ」\n「っ！」
1906 = "「Ôi chà」\\n「Á!」"

# monologue
# JP: ポーレットだろうか、日々姫だろうか。
2599 = "Là do Paulette, hay là do Hibiki nhỉ."

# monologue
# JP: いや、おそらくは、ふたりで――みんなで、\n準備していてくれたのだろう。
2605 = "Không, có lẽ cả hai người―― mà là tất cả mọi người,\\nđã cùng nhau chuẩn bị chúng."

# 【凪】
# display as 凪
# JP: 「綺麗ばーい、おもしろかばーい！」
1999 = "“Đẹp ghê á, thú vị quá đi hà!”"

# monologue
# JP: モールで彩られた大きなボードを、\nたくさんの手が――みんなの笑顔が、掲げてる。
2822 = "Rất nhiều cánh tay―― và những nụ cười của mọi người, đang giơ cao chiếc bảng lớn được trang hoàng bằng dây kim tuyến rực rỡ.\\n"

# monologue
# JP: ボードの上に、色とりどりの元気な文字で――
3147 = "Trên chiếc bảng ấy, những dòng chữ tràn đầy sức sống với đủ sắc màu viết rằng――"

# 【凪】
# display as 凪
# JP: 「『試験成功おめでとう！　おかえりなさい8620』\n――これ、お祝いのメッセージばいっ！！」
1513 = "“‘Chúc mừng buổi chạy thử nghiệm thành công! Chào mừng 8620 trở về’\\n――Cái này là thông điệp chúc mừng đó nha!!”"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1918 = "「啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1509 = "“――Soutetsu-sama”"

# monologue
# JP: ハチロクの目がうるんでいる。
2697 = "Đôi mắt của Hachiroku đang nhạt nhòa lệ."

# monologue
# JP: \x%l蒸気排水;#00ffc040;蒸気排水%l;#;と口では言いつつ、素直に泣けるハチロクを、\n今日という日は少しだけ、うらやましくも感じてしまう。
2626 = "Dẫu miệng thì nói là \\x%lXả hơi nước;#00ffc040;xả hơi nước%l;#;, nhưng nhìn một Hachiroku có thể thành thật khóc như vậy,\\nvào một ngày như hôm nay, tôi chợt cảm thấy có chút ghen tị với cô ấy."

# 【ハチロク】
# display as 八六
# JP: 「これが、御一夜――\n双鉄様が守ろうとしている、町と人たちなのですね」
2307 = "“Đây chính là Ohitoyo――\\nLà thị trấn và những con người mà Soutetsu-sama đang cố gắng bảo vệ đúng không ạ?”"

# 【双鉄】
# display as 雙鐵
# JP: 「これが御一夜、僕を育ててくれた町だ。\n守ろうなどとはおこがましいが――」
2308 = "“Đây chính là Ohitoyo, thị trấn đã nuôi nấng tôi lớn khôn.\\nNói là bảo vệ thì thật quá kiêu ngạo, nhưng mà――”"

# 【凪】
# display as 凪
# JP: 「おうわっ！？　空からなんか降ってきたばい！」
1899 = "“Ối oa!? Có cái gì đó từ trên trời rơi xuống kìa!”"

# 【ハチロク】
# display as 八六
# JP: 「雪！！？――\nあ、違います、紙ふぶきです」
2360 = "“Tuyết ạ!!?――\\nÀ không phải, là pháo giấy ạ”"

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1902 = "“Hì hì”"

# monologue
# JP: キャブの窓から身を乗り出して、\n凪が大きく空を見上げる。
2738 = "Nhoài người ra khỏi cửa sổ cabin,\\nNagi ngửa cổ lên nhìn bầu trời bao la."

# monologue
# JP: が――見ずとも答えは、わかりきってる。
1426 = "Nhưng mà―― dẫu không nhìn, câu trả lời cũng đã quá rõ ràng."

# 【双鉄】
# display as 雙鐵
# JP: 「ナビのやつも、僕らを祝福してくれているのだな」
2205 = "“Ngay cả Navi cũng đang chúc phúc cho chúng ta nhỉ”"

# 【ハチロク】
# display as 八六
# JP: 「ふ――くっ」
1881 = "「Hư―― ưm...」"

# monologue
# JP: 感極まるものがあったのか、\nハチロクが僕の胸へと顔をうずめて、肩をふるわす。
2681 = "Có lẽ vì không kìm nén được cảm xúc,\\nHachiroku vùi mặt vào ngực tôi, bờ vai khẽ rung lên."

# monologue
# JP: 胸を貸し髪を撫でながら、\nふっと持ち上げた視線の先に――見つけてしまう。
2840 = "Vừa cho em ấy mượn bờ ngực vừa vuốt ve mái tóc, Tôi khẽ ngước mắt lên nhìn về phía trước―― và chợt nhận ra."

# monologue
# JP: （宝生稀咲と浦上か）
3448 = "（Là Houshou Kisaki và Uragami sao?）"

# monologue
# JP: 日々姫も気付いていないようだが――\nいつから、どこから見ていたのだろう。
3033 = "Có vẻ như Hibiki cũng chưa nhận ra――\\nHọ đã đứng quan sát từ khi nào, và từ đâu thế nhỉ?"

# monologue
# JP: 祝福ではなく、視察をしに来た。\nビジネスライクな佇まいがそう、告げている。
2640 = "Họ đến không phải để chúc mừng, mà là để thị sát.\\nDáng vẻ đầy tính công việc của họ đã nói lên điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1916 = "「唔？」" 

# monologue
# JP: 視線があったような気がする――いや、あっている。\n宝生稀咲はにやりと笑い、大きく大きく口を動かす。
2754 = "Tôi cảm giác như ánh mắt hai bên đã chạm nhau―― không, đúng là chạm nhau rồi.\\nHoushou Kisaki nở nụ cười ẩn ý, mấp máy khẩu hình miệng thật rộng."

# monologue
# JP: （『お、ん、あ、お、お、あ、い』――\n「こんなものかい？」と言っているのか？）
3406 = "（『O, n, a, o, o, a, i』――\\nLà đang nói \"Chỉ thế này thôi sao?\" ư?）"

# monologue
# JP: 稀咲は無論、答えを示さず、\nくるり背を向け、浦上とともに立ち去っていく。
3219 = "Tất nhiên là Kisaki không đưa ra câu trả lời,\\ncô ấy xoay lưng lại rồi cùng Uragami rời đi."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな」
2114 = "「Ra vậy. Đúng thế thật」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄、様？」
2356 = "「Soutetsu-sama?」"

# monologue
# JP: 僕らは、\x%l動輪;#00ffc040;動輪%l;#;を回しただけだ。\nそれは確かに、確かに偉大なことではあるが――
2923 = "Chúng ta chỉ mới xoay chuyển được \\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; mà thôi.\\nĐiều đó quả thực, quả thực rất vĩ đại, nhưng――"

# monologue
# JP: 観光振興につなげるどころか、\nただのひとりの観光客さえ、今はまだ運べていないのだ。
2645 = "Đừng nói đến việc thúc đẩy du lịch,\\nngay cả một người khách du lịch đơn thuần, lúc này chúng ta vẫn chưa thể chở nổi."

# 【双鉄】
# display as 雙鐵
# JP: 「我に返って気付いただけだ。\n僕たちはまだ、始発ホームを出てもいないとな」
2069 = "「Tôi chỉ vừa bừng tỉnh và nhận ra thôi.\\nChúng ta thậm chí còn chưa rời khỏi sân ga xuất phát nữa mà」"

# 【ハチロク】
# display as 八六
# JP: 「そう。ですね」
# 2110 = "「是啊」" 

# monologue
# JP: ポケットから小さなハンカチをとりだして、\nハチロクはそっと目元をぬぐう。
2683 = "Lấy chiếc khăn tay nhỏ từ trong túi áo ra,\\nHachiroku khẽ lau đi những giọt nước mắt nơi khoé mắt."

# 【ハチロク】
# display as 八六
# JP: 「まだまだ、泣くにも早すぎましたね」
2190 = "「Vẫn còn quá sớm để khóc mà anh」"

# monologue
# JP: \x%l蒸気排水;#00ffc040;蒸気排水%l;#;うんぬんではなく、\n『泣く』とはっきりハチロクは言う。
3362 = "\\x%lXả hơi nước;#00ffc040;Xả hơi nước%l;#;gì tầm này nữa, \\nHachiroku đã nói thẳng thừng từ 『Khóc』 ra như thế."

# monologue
# JP: そして笑顔で、\n僕にこっそり耳打ちをする。
3004 = "Rồi cô ấy mỉm cười, \\nthì thầm vào tai tôi một cách tinh nghịch."

# 【ハチロク】
# display as 八六
# JP: 「ファンサービスも、\x%l機関士;#00ffc040;機関士%l;#;の大事なお仕事ですよ？\n双鉄様」
2136 = "「Dịch vụ chiều lòng người hâm mộ cũng là một công việc rất quan trọng của \\x%lTài xế;#00ffc040;Tài xế%l;#; đấy chứ? \\nSoutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばっ！」
2113 = "「Ra vậy. Thế thì...!」"

# monologue
# JP: （ポーーーーーーーーーーーーーーーーーーっ！）
# 3437 = "（嗚——！）" 

# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;を鳴らす。\nホームの、御一夜の人たちに、心の限りの感謝を込めて。
2942 = "Tôi kéo còi \\x%lCòi hơi nước;#00ffc040;Còi hơi nước%l;#;. Gửi gắm toàn bộ lòng biết ơn sâu sắc nhất từ tận đáy lòng đến những người dân Ohitoyo đang đứng trên sân ga."

# monologue
# JP: そして同時に、\nここから先に――さらに先へと、旅立つために。
2783 = "Vòn đồng thời, \\nlà để chuẩn bị khởi hành cho chuyến đi tiếp theo từ đây――và xa hơn thế nữa."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さん、背中、流してあげようか？」
2344 = "「Nii-ni――Anh hai, để em kỳ lưng cho anh nhé?」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、まだ顔がお疲れな感じですから。\nもう少し、ゆっくり湯船につかったほうがいいですよ」
2349 = "「Soutetsu-kun, trông mặt anh vẫn còn mệt mỏi lắm. \\nAnh nên ngâm mình trong bồn tắm lâu hơn một chút nữa đi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1913 = "「Hửm」"

# monologue
# JP: 右と左と。
2777 = "Hết bên phải rồi lại bên trái."

# monologue
# JP: すぐ近くから、日々姫とポーレットとが、\nあれこれ話しかけてくる。
3031 = "Ngay sát bên cạnh, Hibiki và Paulette \\ncứ ríu rít trò chuyện hết chuyện này đến chuyện khác với tôi."

# monologue
# JP: （まぁ、今日の僕は我ながらよく頑張った。\n労ってくれるつもりではあるのだろうがな）
3431 = "（Mà, hôm nay chính bản thân mình cũng thấy mình đã cố gắng rất nhiều rồi. \\nChắc là họ cũng chỉ muốn bày tỏ sự quan tâm, chăm sóc cho mình thôi）"

# monologue
# JP: しかし、それならばもう少しだけ、\n静かにゆったり、風呂を楽しませてもらいたい。
2651 = "Nhưng nếu đã vậy, tôi muốn họ để tôi \\ntĩnh lặng và thư thả tận hưởng bồn tắm thêm một chút nữa thôi."

# monologue
# JP: ん？　ああ。
2798 = "Hửm? À."

# 【双鉄】
# display as 雙鐵
# JP: 「凪、凪！　少しいいか？」
1823 = "「Nagi, Nagi! Anh nói chuyện một chút được không?」"

# 【凪】
# display as 凪
# JP: 「んー？　いーばい。なんね、にーさん」
1958 = "「Hử~? Được chứ ạ. Có chuyện gì vậy, anh hai?」"

# monologue
# JP: ふかみとふたり、\n仲良く背中を流し合っていたのが終わったようだ。
2838 = "Có vẻ như việc cô bé cùng với Fukami\\ntắm rửa, kỳ cọ lưng cho nhau một cách thân thiết đã xong."

# monologue
# JP: 僕の呼び声に応えて凪は、\nスタスタこちらへ近づいてくる。
3238 = "Đáp lại tiếng gọi của tôi, Nagi\\nbước thoăn thoắt tiến lại gần đây."

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1932 = "「Chà.」"

# monologue
# JP: 動きづらそうな格好で、\nなんと軽やかな歩調であろう。
3365 = "Trong một bộ trang phục có vẻ vướng víu khó cử động,\\nsao bước đi của con bé lại có thể nhẹ nhàng đến thế nhỉ."

# monologue
# JP: 小柄で筋肉も薄いというのに、\n一体どこに、この運動能力の秘密があるのか――
3050 = "Dù vóc dáng nhỏ nhắn và cơ bắp cũng mỏng manh,\\nnhưng rốt cuộc bí mật của năng lực vận động này nằm ở đâu chứ――"

# 【ふかみ】
# display as 深美
# JP: 「はぅっ！？……双鉄おにいさん、ってば、\n『ほう』って！　それに凪ちゃんのこと、熱い視線で！」
1897 = "「Hạu!?... Anh Soutetsu, anh\\nvừa 'Chà' cái gì thế hả! Lại còn nhìn bé Nagi bằng ánh mắt nóng bỏng đó nữa chứ!」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　いくらバスタオルまいとったって、\n女の子のこと、そぎゃんとじろじろ見るもんじゃなか！」
2346 = "「Anh hai! Cho dù có quấn khăn tắm đi nữa,\\nanh cũng không được nhìn chằm chằm con gái nhà người ta như thế chứ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああうむ。それはそうだな」
1925 = "「À, ừm. Đúng là vậy thật.」"

# monologue
# JP: 凪から大きく視線を外せば、凪とふかみに触発されて、\n仲良く背中を流し合ってる、ハチロクとれいなとが見える。
2958 = "Khi tôi dời hẳn tầm mắt khỏi Nagi, tôi có thể nhìn thấy Hachiroku và Reina\\ncũng đang vui vẻ kỳ lưng cho nhau, như thể được truyền cảm hứng từ Nagi và Fukami."

# 【れいな】
# display as 玲奈
# JP: 「あははははっ！　\nくすぐったいですぅ、ハチロクさぁん」
1904 = "「A ha ha ha!\\nNhột quá đi mất, chị Hachiroku ơi.」"

# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？　ちょっと、そんなに暴れてはいけません。\nああ、こらっ！　どうして逃げるのですか」
1880 = "「Kìa!? Nào, em không được nghịch ngợm như thế chứ.\\nA, kìa! Sao em lại chạy trốn vậy hả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1913 = "「唔」" 

# monologue
# JP: 邪気無く、和やか。\n良いことだ。
2823 = "Thật ngây thơ và hòa nhã.\\nMột điều thật tốt đẹp."

# monologue
# JP: れいなの穏やかな温かさは、ハチロクの中の頑ななものを、\nわずかずつ、溶かしてくれるような気がする。
2913 = "Tôi có cảm giác rằng sự ấm áp dịu dàng của Reina\\nđang từng chút một làm tan chảy đi những gì cứng nhắc sâu trong lòng Hachiroku."

# 【凪】
# display as 凪
# JP: 「で？　にーさん、ウチになんのよーと？」
2091 = "「Thế? Ni-san, anh tìm em có việc gì à?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1926 = "「À, ừm」"

# monologue
# JP: 試験走行成功のお祝いムードにどやどや流され、\nここまで話しそびれていたが――
3313 = "Bị cuốn theo bầu không khí ăn mừng chuyến chạy thử nghiệm thành công náo nhiệt,\\nđến tận bây giờ tôi mới có cơ hội để nói――"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の\x%l機関助士;#00ffc040;機関助士%l;#;を、これからも凪に頼みたいのだ」
1461 = "「Anh muốn nhờ Nagi tiếp tục làm \\x%l8620;#00ffc040;nhân viên phụ lái%l;#; cho \\x%l8620;#00ffc040;8620%l;#; từ nay về sau」"

# 【凪】
# display as 凪
# JP: 「夏休みが終わったあとも？　そら無理ばい。\nウチ、放課後は川下りのお仕事があるけんね」
2128 = "「Kể cả sau khi kỳ nghỉ hè kết thúc á? Thế thì chịu rồi.\\nSau giờ học em còn có công việc chèo thuyền vượt thác nữa mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 1918 = "「啊！」" 

# monologue
# JP: 盲点、だった。\n完全にそのことを失念していた。
2970 = "Một điểm mù.\\nTôi đã hoàn toàn quên bẵng đi chuyện đó."

# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1517 = "「…………」" 

# monologue
# JP: ふかみがじっと、不安そうな目で僕らを見ている。
3116 = "Fukami đang nhìn chúng tôi chăm chú với ánh mắt đầy lo lắng."

# monologue
# JP: 無論、凪が川下りに必要な人材とも理解している。\n横取りする気など毛頭ない。ここは潔く撤回しよう。
2954 = "Dĩ nhiên, tôi hiểu Nagi là nhân lực không thể thiếu cho công việc chèo thuyền.\\nTôi hoàn toàn không có ý định giành người. Đến đây thì nên dứt khoát rút lui thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ついついうっかりしていた。\n凪の\x%l投炭;#00ffc040;投炭%l;#;が余りに早く上達するので、目が眩んでな」
2078 = "「Xin lỗi. Anh lỡ quên mất.\\nTại Nagi tiến bộ trong việc \\x%lđút than;#00ffc040;đút than%l;#; nhanh quá, làm anh bị mờ mắt mất rồi」"

# 【凪】
# display as 凪
# JP: 「ふっふーん、ま、それは仕方のなかことばい？」
1910 = "「Hửm hừm, mà, chuyện đó thì cũng không trách được nhỉ?」"

# monologue
# JP: 自慢気を、形にしたような声と顔。\n凪がまっ平らな胸を張る。
3160 = "Giọng nói và khuôn mặt như thể hiện rõ sự tự mãn.\\nNagi ưỡn cái lồng ngực phẳng lì của mình lên."

# 【凪】
# display as 凪
# JP: 「川が増水で舟出せんときとかは、\nもちろん手伝ってあげるばい！」
2161 = "「Những lúc nước sông dâng cao không chèo thuyền được,\\ntất nhiên là em sẽ giúp một tay rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。本当に」
2336 = "「Thế thì cứu cánh quá. Thật sự đấy」"

# monologue
# JP: 今の僕は、駆け出しも駆け出し、\nほとんど素人の\x%l機関士;#00ffc040;機関士%l;#;だ。
3161 = "Tôi của hiện tại chỉ là một \\x%ltài xế;#00ffc040;tài xế%l;#; mới vào nghề,\\nhầu như chẳng khác gì một kẻ nghiệp dư."

# monologue
# JP: 試験走行距離を伸ばして、営業運転につなげていくには、\n\x%l機関助士;#00ffc040;機関助士%l;#;のフォローが絶対に必要となる。
2845 = "Để kéo dài quãng đường chạy thử nghiệm và hướng tới việc vận hành thương mại,\\nsự hỗ trợ của \\x%lnhân viên phụ lái;#00ffc040;nhân viên phụ lái%l;#; là điều tuyệt đối cần thiết."

# monologue
# JP: （しかし……正直、困ったな）
3429 = "（Nhưng mà…… thật lòng thì, rắc rối rồi đây）"

# 【日々姫】
# display as 日日姬
# JP: 「あの、にぃ――んんっ、兄さん？\n\x%l機関助士;#00ffc040;機関助士%l;#;って、兄さんがいつも練習している――」
2324 = "「Ơ kìa, anh ha―― hửm, anh hai?\\n\\x%lPhụ lái;#00ffc040;Phụ lái%l;#; có phải là việc anh vẫn thường hay luyện tập――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\x%l投炭;#00ffc040;投炭%l;#;だな。\nそう。あれをメインに、機関車の走行を助ける仕事だ」
2009 = "「À, là \\x%lXúc than;#00ffc040;Xúc than%l;#; đấy.\\nPhải. Đó là công việc chính để hỗ trợ đầu máy vận hành」"

# 【日々姫】
# display as 日日姬
# JP: 「……練習すれば、どうでしょう？\nあれは、私にも出来ますか？」
1536 = "「……Nếu luyện tập thì sao ạ?\\nViệc đó em có làm được không？」"

# 【双鉄】
# display as 雙鐵
# JP: 「できるな」
2238 = "「Làm được chứ」"

# monologue
# JP: そこは考えるまでもない。\n日々姫は文武両道なうえ、努力を惜しまぬ性格だから。
3357 = "Chuyện đó chẳng cần phải suy nghĩ.\\nBởi vì Hibiki không chỉ văn võ song toàn, mà còn là một cô bé không bao giờ tiếc nuối công sức nỗ lực."

# monologue
# JP: いや――これこそ本当の盲点か？\n体格的にも、日々姫なら十分に小柄なのだし――
2794 = "Không―― đây mới chính là điểm mù thực sự sao?\\nVề mặt thể hình, Hibiki cũng đủ nhỏ nhắn, và――"

# 【日々姫】
# display as 日日姬
# JP: 「なら、私。練習してみて、できそうだったら、\nにぃに――んんっ――兄さんの、\x%l機関助士;#00ffc040;機関助士%l;#;になります」
2332 = "「Vậy thì, em. Để em luyện tập thử xem, nếu cảm thấy có thể làm được,\\nanh ha―― hửm―― em sẽ làm \\x%lPhụ lái;#00ffc040;Phụ lái%l;#; cho anh hai」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは助かる」
2117 = "「Vậy sao, thế thì giúp ích cho anh nhiều lắm」"

# monologue
# JP: “僕の”ではなく、“8620の”というのがより正しいが、\nそこまで細かなことを気にしても仕方がない。
3119 = "Thay vì \"của tôi\", nói là \"của đầu máy 8620\" thì chính xác hơn,\\nnhưng để tâm đến chi tiết nhỏ nhặt như vậy cũng chẳng ích gì."

# monologue
# JP: 重要なのは、これで\x%l8620;#00ffc040;8620%l;#;の安全な営業運転へ、\n更に一歩、大きく近づけたということだ。
3382 = "Điều quan trọng là, nhờ vậy mà việc vận hành thương mại an toàn cho đầu máy \\x%l8620;#00ffc040;8620%l;#;\\nđã tiến gần hơn một bước lớn."

# 【日々姫】
# display as 日日姬
# JP: 「ただ……ええと。\n条件づけとか、そういうのじゃ全然ないんだけど」
1867 = "「Có điều…… ừm.\\nHoàn toàn không phải là em muốn ra điều kiện hay gì đâu nhé」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん？　何だ。\n希望があるなら、遠慮したりせず言ってくれ」
1956 = "「Hửm? Gì thế.\\nNếu có mong muốn gì, em cứ tự nhiên nói ra, đừng ngại」"

# 【日々姫】
# display as 日日姬
# JP: 「ええと、手段と目的が、少し混ざっちゃってるみたいに、\n今の兄さん、見えるかもって」
2042 = "「Ừm, dường như phương tiện và mục đích đang bị lẫn lộn vào nhau một chút,\\nem cảm thấy anh hai hiện giờ có vẻ như vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1913 = "「唔」" 

# monologue
# JP: 言われてみれば、その傾向はあるかもしれぬ。
3296 = "Nghe cô ấy nói vậy, quả thực bản thân có xu hướng đó thật."

# monologue
# JP: 鉄道復権は、観光振興の、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回のための\n手段のひとつにすぎぬはず。だが――
3386 = "Phục hưng đường sắt vốn dĩ chỉ nên là một trong những phương thức để thúc đẩy du lịch và hủy bỏ dự án xây dựng nhà máy \\x%lAircra;#00ffc040;Aircra%l;#;. Thế nhưng――"

# 【日々姫】
# display as 日日姬
# JP: 「もっと御一夜のことを良く知ったほうがいいと思うの。\n兄さんが、御一夜を本当に復興させたいんなら」
2064 = "「Em nghĩ anh nên tìm hiểu kỹ hơn về Ohitoyo.\\nNếu anh thực sự muốn phục hưng Ohitoyo, anh trai ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「具体的には、どうすればいい？」
2331 = "「Cụ thể thì anh nên làm thế nào?」"

# 【日々姫】
# display as 日日姬
# JP: 「酒蔵のことも、私の看板描きやなにもかも、\n御一夜の人と密接するお仕事でしょ？　だから――」
2339 = "「Chuyện của xưởng rượu này, hay công việc vẽ biển hiệu của em, tất cả đều là những công việc gắn kết chặt chẽ với người dân Ohitoyo đúng không? Cho nên là――」"

# 【双鉄】
# display as 雙鐵
# JP: 「家事やお前の手伝いに、もう少し目を向ければ、\nよりバランスがとれるかもしれぬというわけか」
2041 = "「Ý em là nếu anh để tâm hơn một chút đến việc nhà hay việc phụ giúp em, thì có lẽ mọi thứ sẽ trở nên cân bằng hơn đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1940 = "「嗯」" 

# monologue
# JP: ほっとしたような日々姫の笑顔。
3040 = "Nụ cười như trút được gánh nặng của Hibiki."

# monologue
# JP: 言い出したくて言い出せない、\nいつもの日々姫が出ていたのかと、今さら気付く。
2968 = "Đến tận bây giờ tôi mới nhận ra, dáng vẻ ngập ngừng muốn nói lại thôi quen thuộc ấy của Hibiki vừa mới xuất hiện."

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、それだったら希望っていうか、\n意見っていうか――」
2323 = "「Kìa...! Nếu là chuyện đó thì em cũng có nguyện vọng, à không, có ý kiến muốn nói――」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。言ってみてくれ」
1943 = "「Ừm. Em cứ nói ra xem nào」"

# monologue
# JP: 走行試験の成功で、テンションがみなあがっている。\n僕は弱いが、酒を飲んでいるのと似たような状態だろう。
3312 = "Thành công của chuyến chạy thử nghiệm khiến tâm trạng của mọi người đều phấn chấn hẳn lên.\\nTuy tửu lượng của tôi kém, nhưng trạng thái lúc này chắc cũng tương tự như khi uống say vậy."

# monologue
# JP: こういうときこそ、忌憚の無い意見が飛び出してくる。\n今はともかく、聞くことに集中してみよう。
3088 = "Chính những lúc thế này, những ý kiến thẳng thắn không kiêng dè mới được nói ra.\\nTạm thời bây giờ, cứ tập trung lắng nghe đã."

# 【ポーレット】
# display as 波萊特
# JP: 「基本線は日々姫ちゃんと同じなんですけど、\nアプローチ、別のやりかたの方がもっといいかなぁって」
2057 = "「Về cơ bản thì cũng giống như Hibiki-chan thôi, nhưng em nghĩ nếu tiếp cận theo một cách khác thì sẽ tốt hơn đấy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「別のやり方？」
2130 = "「Cách khác sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「例えばですけど、双鉄くんに政策秘書に入ってもらって、\n市政のレベルで観光振興に力を注いで欲しいなぁ、って」
2148 = "「Ví dụ như, em muốn Soutetsu-kun tham gia vào đội ngũ thư ký chính sách, để tập trung thúc đẩy du lịch ở cấp độ quản lý đô thị xem sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2116 = "「是嗎」" 

# monologue
# JP: 日々姫は地道なボトムアップ。\nポーレットは一気のトップダウン。
3037 = "Hibiki chọn cách tiếp cận từ dưới lên đầy vững chắc.\\nCòn Paulette lại muốn thúc đẩy nhanh chóng từ trên xuống."

# monologue
# JP: 同じく観光振興、御一夜再生を目的として、\nしかし手段は１８０度異なっている。
2673 = "Cùng hướng tới mục tiêu thúc đẩy du lịch và phục hưng Ohitoyo,\\nnhưng phương thức thực hiện lại hoàn toàn trái ngược 180 độ."

# 【ポーレット】
# display as 波萊特
# JP: 「今回の試験走行までで、御一夜のキーマンが何人も、\n双鉄くんを信頼してくれたと思いますし、その人脈も」
2312 = "「Tôi nghĩ qua các chuyến chạy thử nghiệm vừa rồi, nhiều nhân vật chủ chốt của Ohitoyo đã\\ntrao gửi niềm tin cho Soutetsu-kun, và cả mạng lưới quan hệ đó nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、市政という長いテコを使えば、作用も大きい。\nポーレットのいうこともまた、理解はできるな」
1914 = "「Hửm, nếu sử dụng đòn bẩy dài hạn là chính quyền thành phố thì tác động tạo ra cũng sẽ rất lớn.\\nTa cũng có thể hiểu được những gì Paulette nói」"

# monologue
# JP: ぷっと、ポーレットの頬が膨れる。
3110 = "Paulette khẽ phồng má lên bướng bỉnh."

# monologue
# JP: こんなに飾らぬ表情は、\n初めて見る気がして何故かしら、少しドキっとさせられる。
3225 = "Cảm giác đây là lần đầu tiên tôi được nhìn thấy\\nbiểu cảm tự nhiên không chút phòng bị này của cô ấy, khiến tim tôi bất giác lệch đi một nhịp."

# 【ポーレット】
# display as 波萊特
# JP: 「理解“は”、ですか？」
1512 = "「Chỉ là \"có thể hiểu\" thôi sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n日々姫の意見も、同様に理解できるからな」
1938 = "「Ừm.\\nBởi vì ta cũng hiểu được ý kiến của Hibiki tương tự như vậy」"

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃ」
1545 = "「...Anh hai」"

# monologue
# JP: 安心したような日々姫の声。\nそこにぽちゃん、と、密やかな水音が重なってくる。
3039 = "Giọng nói của Hibiki nghe như vừa trút được gánh nặng.\\nNgay sau đó, một tiếng nước vỗ nhè nhẹ, kín đáo vang lên hòa vào."

# 【ハチロク】
# display as 八六
# JP: 「確かに、お二方のご意見はともに、\n一理も二理もあるものですね」
2222 = "「Quả thực, ý kiến của cả hai vị đây đều\\ncó những điểm vô cùng hợp lý ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1805 = "「Hachiroku」"

# monologue
# JP: れいなをようやく洗ってやり終わったらしい。
2706 = "Có vẻ như cô ấy rốt cuộc đã tắm rửa xong cho Reina."

# monologue
# JP: ハチロクは、達成感を顔に出し、\n風呂にしずしず入ると同時、僕の膝の上へと座る。
2826 = "Hachiroku lộ rõ vẻ mãn nguyện trên gương mặt,\\ncô chậm rãi bước vào bồn tắm rồi ngồi tót ngay lên đùi tôi."

# 【ハチロク】
# display as 八六
# JP: 「けれど、地道なご縁づくりは日々姫の、\n市政はそれこそ、ポーレットさんの得意分野かと存じます」
1775 = "「Thế nhưng, việc kiên trì xây dựng các mối nhân duyên vốn là sở trường của Hibiki,\\ncòn chính sự thì đó chính xác là thế mạnh của chị Paulette ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
2133 = "「Đúng là như vậy thật」"

# monologue
# JP: 地道に縁を築くこと。\n市政という道具を振り回すこと。
3229 = "Kiên trì tạo dựng các mối quan hệ.\\nHay là vung vẩy công cụ gọi là chính quyền thành phố."

# monologue
# JP: それは日々姫とポーレット、それぞれの積み重ねの技。\n僕がいきなり学べるほどに、容易いものとも思えない。
2747 = "Đó là những kỹ năng được tích lũy ngày qua ngày của cả Hibiki và Paulette.\\nTôi không nghĩ nó dễ dàng đến mức bản thân có thể học được ngay lập tức."

# 【ハチロク】
# display as 八六
# JP: 「餅は餅屋、汽車は汽車屋です、双鉄様。\n双鉄様の\x%l機関士;#00ffc040;機関士%l;#;としての適正は、明快に示されています」
2029 = "「Việc nào ra việc nấy, xe lửa cứ để người trong ngành lo, thưa ngài Soutetsu.\\nSự phù hợp của ngài Soutetsu với tư cách là một \\x%lnhân viên lái tàu;#00ffc040;nhân viên lái tàu%l;#; đã được thể hiện rõ ràng rồi ạ」"

# monologue
# JP: ハチロクの言葉は、依頼ではない。\nただ単に、己の信じる事実を述べているだけだ。
2701 = "Những lời của Hachiroku không phải là một lời yêu cầu.\\nCô ấy chỉ đơn thuần là đang phát biểu một sự thật mà bản thân tin tưởng."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様でしたら、ほんの半年もあれば、清美機関士同様、\n\x%l機関助士;#00ffc040;機関助士%l;#;なしでの機関車運用をこなせるようになります」
2060 = "「Nếu là ngài Soutetsu, chỉ cần nửa năm thôi là ngài đã có thể vận hành đầu máy mà không cần đến \\x%lphụ lái tàu;#00ffc040;phụ lái tàu%l;#;, giống như nhân viên lái tàu Kiyomi vậy ạ」"

# monologue
# JP: きっぱりとそう言い切って、\nハチロクは僕、日々姫、ポーレットと順々に見渡す。
3297 = "Khẳng định một cách dứt khoát như thế,\\nHachiroku lần lượt nhìn qua tôi, Hibiki, rồi đến Paulette."

# 【ハチロク】
# display as 八六
# JP: 「故に、双鉄様は今のレールを[まいしん,1]邁進くださればいいのです。\n双鉄様が道を開けば、必ずみながその正しさに続きます」
1981 = "「Vì vậy, ngài Soutetsu chỉ cần vững bước tiến lên trên đường ray hiện tại là được.\\nChỉ cần ngài Soutetsu khai phá con đường, mọi người chắc chắn sẽ nối bước theo sự đúng đắn đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「極端な意見ではあるが、しかし、理もある」
2306 = "「Tuy là một ý kiến có phần cực đoan, nhưng quả thực cũng có lý」"

# monologue
# JP: ハチロクが言っているのは、一点突破で高いところ、\n誰の目にでも留まるところに、旗を掲げろということだ。
2695 = "Điều Hachiroku đang nói là hãy tạo ra một bước đột phá đơn điểm để cắm một lá cờ ở nơi thật cao,\\nnơi mà bất kỳ ai cũng có thể trông thấy."

# monologue
# JP: それが正しき道筋を示す旗であるなら、目にしたものは、\n必ずそこを目指して後に続いてくれるはずだ、と。
3010 = "Nếu đó là lá cờ chỉ ra con đường đúng đắn, thì những ai nhìn thấy nó\\nchắc chắn sẽ lấy đó làm mục tiêu mà tiến bước theo sau."

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1913 = "「唔」" 

# monologue
# JP: 日々姫、ポーレット、ハチロク。
3046 = "Hibiki, Paulette, Hachiroku."

# monologue
# JP: それぞれの意見を、そのまま汲むことはせぬにせよ、\nこれからの方針の参考とすることは大いに有用だろう。
2672 = "Dù không tiếp thu hoàn toàn ý kiến của từng người, nhưng\\nviệc dùng chúng làm tài liệu tham khảo cho phương hướng sắp tới chắc chắn sẽ vô cùng hữu ích."

# monologue
# JP: （さて、誰の意見が一番僕に合いそうか――）
3460 = "（Nào, ý kiến của ai là phù hợp với mình nhất đây――）"

# monologue
# JP: 選択に悩むものであるなら、時間を掛けて悩むのより、\n決めて行動、ダメなら修正をすればいい。
3252 = "Nếu đã là một sự lựa chọn gây đau đầu, thì thay vì tốn thời gian trăn trở,\\ncứ quyết định rồi hành động, nếu không ổn thì sửa sai sau."

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2000 = "「Được rồi!」"

# monologue
# JP: （ざばぁ）
3439 = "(Ào...)"

# monologue
# JP: 心を決めて湯から出る。
2916 = "Hạ quyết tâm, tôi bước ra khỏi bồn tắm."

# monologue
# JP: 今はひとまず――
3159 = "Trước mắt thì cứ――"
