1427 = "——Thật tình, đúng như Nagi nói.\\nDù chuyện gì xảy ra đi nữa, không còn cách nào khác ngoài việc tập trung vào những gì cần phải làm."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。\x%lウェス;#00ffc040;ウェス%l;#;を」
1808 = "「Hachiroku.\\x%lGiẻ lau;#00ffc040;Giẻ lau%l;#;」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2231 = "「Vâng, thưa cậu Soutetsu」"

# monologue
# JP: 受け取る\x%lウェス;#00ffc040;ウェス%l;#;は、ずっしりしている。
2945 = "Tấm \\x%lgiẻ lau;#00ffc040;giẻ lau%l;#; tôi nhận lấy có cảm giác nặng trịch."

# monologue
