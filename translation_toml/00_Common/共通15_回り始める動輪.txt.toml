3210 = "Thiêng liêng và tĩnh lặng——\\nNhững từ ngữ ấy chợt thoáng qua trong tâm trí tôi."

# monologue
# JP: やりたがりやの凪でさえ、口も手も全く出さず、\n息を呑み、じっと僕らを見守っている。
2876 = "Ngay cả Nagi, một người vốn hay lăng xăng, lúc này cũng không hề mở miệng hay động tay động chân,\\ncô bé chỉ nín thở, lặng im dõi theo chúng tôi."

# monologue
# JP: （ただのマッチだ。\nそれだけなのにな――）
3458 = "(Chỉ là một que diêm.\\nChỉ có thế thôi, vậy mà...)"

# monologue
