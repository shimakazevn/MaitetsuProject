3352 = "Những thanh củi được đưa vào lập tức bắt lửa, và phía trên \\x%l火格子;#00ffc040;vỉ lò%l;#; bắt đầu biến thành một \\x%l火床;#00ffc040;buồng lửa%l;#; đúng nghĩa."

# monologue
