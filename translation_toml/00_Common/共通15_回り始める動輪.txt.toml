3007 = "Nếu cứ thế ném lên trên \\x%l火格子;#00ffc040;vỉ lò%l;#; đã xếp sẵn \\x%lウェス;#00ffc040;giẻ lau%l;#;,\\nnhững chiếc \\x%lウェス;#00ffc040;giẻ lau%l;#; thấm đẫm dầu sẽ bùng cháy dữ dội."

