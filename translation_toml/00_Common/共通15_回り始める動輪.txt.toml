2063 = "「Anh biết rồi. Phải thật chậm rãi, từng chút một, và thật đều tay.」"

# monologue
# JP: スコップを伏せず、投げ込まず、\n流し込むように少しずつ、石炭を\x%l火床;#00ffc040;火床%l;#;にしきつめていく。
2584 = "Không úp xẻng, cũng không xúc ném vào,\\ntôi rải đều từng chút một, như đang rót than phủ kín khắp \\x%l火床;#00ffc040;buồng lửa%l;#;."

# monologue
