3232 = "Đó là một nồi hơi di động cỡ trung dùng cho trường hợp khẩn cấp, được đem tới nhờ sự giúp đỡ của chú Hata bên xưởng nồi hơi."

# 【蓑笠】
# display as 蓑笠
# JP: 「よかと？　よかよか。\n双鉄君！　秦さんはよかって言うとりますばい」
2158 = "「Được chưa hả? Được rồi, được rồi.\\nCậu Soutetsu! Chú Hata bảo được rồi đấy nhé」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2272 = "「Cháu cảm ơn chú」"

# monologue
