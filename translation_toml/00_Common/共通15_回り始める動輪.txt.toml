3358 = "Chúng tốt đến mức nếu chỉ dùng làm mồi nhóm lửa thì thật là phí phạm, đó chính là đồ quyên góp từ mọi người trong Hiệp hội Lâm nghiệp Ohitoyo."

# 【双鉄】
# display as 雙鐵
# JP: 「さすがによく燃える」
1770 = "「Đúng là cháy đượm thật.」"

# monologue
