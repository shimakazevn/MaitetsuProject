# lines: 513 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3435 = "（Kịch kịch, cộc cộc,\\nloảng xoảng, loảng xoảng――）"

# monologue
# JP: 走行音だ。\n思った瞬間、路子を探して駆け出している。
3053 = "Là âm thanh tàu chạy.\\nNgay khi vừa nhận ra, tôi đã vội chạy đi tìm Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「路子！　路子！！」
2287 = "「Michiko! Michiko!!」"

# monologue
# JP: しばらく、この夢を見なかった。
2841 = "Đã lâu rồi, tôi không còn mơ thấy giấc mơ này nữa."

# monologue
# JP: 疲れ切り、倒れるように眠る日々が、\n幾週も幾月も、重なり続けてしまったせいだ。
3163 = "Có lẽ là vì chuỗi ngày mệt nhoài, cứ đặt lưng xuống là ngủ thiếp đi\\ncứ thế tiếp diễn, tháng này qua tháng khác."

# 【双鉄】
# display as 雙鐵
# JP: 「路子！　どこだ！」
2286 = "「Michiko! Em ở đâu!」"

# 【路子】
# display as 路子
# JP: 「ここだよ。そーちゃん」
2054 = "「Ở đây này. So-chan」"

# monologue
# JP: ――声がする。\nいつものように、路子は座席に座っている。
1430 = "――Có tiếng nói vang lên.\\nNhư mọi khi, Michiko đang ngồi trên ghế."

# 【路子】
# display as 路子
# JP: 「へんなの。そーちゃん、おっきなこえ出して」
2210 = "「Lạ thật đó. Tự dưng So-chan lại nói lớn tiếng thế」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。\nなんだろう、少し、焦ってしまっていたようだ」
1936 = "「Ừ... phải rồi.\\nSao thế nhỉ, dường như tớ có hơi cuống lên một chút」"

# monologue
# JP: 僕の答えがおかしなものに聞こえたのだろうか？\n路子はくすりと小さく笑う。
3051 = "Câu trả lời của tôi nghe kỳ lắm sao?\\nMichiko khẽ mỉm cười khúc khích."

# monologue
# JP: 最初からそうしていたかのように……\n僕もまた、向い合せに着席している。
2864 = "Như thể vốn dĩ ngay từ đầu đã luôn như vậy...\\nTôi cũng đang ngồi ở phía đối diện cô ấy."

# 【路子】
# display as 路子
# JP: 「ね？　そーちゃん。\nきず。あのきかんしゃの」
2066 = "「Nè? So-chan.\\nVết xước. Của đầu máy hơi nước đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1916 = "「Ừm」"

# 【路子】
# display as 路子
# JP: 「そーちゃん、本当になおしたんだね」
2012 = "「So-chan thực sự đã sửa được nó rồi nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1508 = "「――Ừ」"

# monologue
# JP: 直したではなく、\n直せたであり、直してもらった――いただいた。
2653 = "Không phải là tự mình sửa,\\nmà là đã có thể sửa, đã được mọi người giúp đỡ sửa giùm――và trao cho cơ hội sửa."

# monologue
# JP: そうした言葉を選んだ方がより正確に、\n個人としての僕の心情は表せよう。が――
2656 = "Chọn những từ ngữ ấy sẽ lột tả chính xác hơn\\ntâm trạng của cá nhân tôi lúc này. Nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。直した」
2119 = "「Phải rồi. Tớ đã sửa nó」"

# monologue
# JP: 赤井宮司が招いてくれた粉蔵時代の技師さんは、\nさらに仲間の技師たちに、御一夜へ来るよう誘ってくれた。
3307 = "Người kỹ sư thời Kokura mà Thầy tế Akai mời đến\\nđã kêu gọi thêm những người bạn kỹ sư của ông ấy tới Ohitoyo."

# monologue
# JP: ポーレットとつながりのある鉄道事業者のいくつかは、\n研修扱いとして、整備の社員を派遣してくれた。
2888 = "Một vài doanh nghiệp đường sắt có mối liên kết với Paulette\\ncũng đã cử nhân viên bảo trì đến dưới dạng đi tu nghiệp."

# 【双鉄】
# display as 雙鐵
# JP: 「まだ、[みち]路なかばのことではあるが――」
2348 = "「Dẫu đây mới chỉ là nửa chừng chặng đường――」"

# monologue
# JP: 展示会から自然発生した募金には、個人としてだが、\n稀咲や浦上さん、元忠さんまでが協力をして下さった。
2884 = "Dù chỉ là trên danh nghĩa cá nhân, nhưng Kisaki, anh Urakami, và cả bác Mototada đều đã đóng góp vào quỹ quyên góp tự phát từ buổi triển lãm."

# monologue
# JP: 学園生たちやご老人たち、町の人々もボランティアとして、\n無数に出てくる細かな仕事を、それぞれこなして下さった。
2850 = "Các học sinh, những người lớn tuổi, và cả người dân trong thị trấn cũng tình nguyện giúp đỡ, mỗi người một tay hoàn thành vô số công việc lặt vặt phát sinh."

# 【双鉄】
# display as 雙鐵
# JP: 「つながりの力で、御一夜の力で。\n――みんなで、8620の傷を、直したんだ」
1795 = "「Bằng sức mạnh của sự kết nối, bằng sức mạnh của Ohitoyo.\\n――Tất cả chúng ta đã cùng nhau chữa lành những vết thương cho 8620」"

# monologue
# JP: みんなの中には、僕もいる。\n僕とともに、路子もいてくれたのだと信じる。
3354 = "Trong số mọi người đó, có cả tôi.\\nVà tôi tin rằng, đồng hành cùng tôi, còn có cả Michiko nữa."

# monologue
# JP: だから、言葉を弄りはしない。\n堂々と胸を張るべき、これは成果に違いないから。
2978 = "Vì vậy, tôi không cần phải dùng những lời lẽ hoa mỹ.\\nTôi hoàn toàn có thể tự hào ngẩng cao đầu, bởi đây chắc chắn là một thành quả xứng đáng."

# 【路子】
# display as 路子
# JP: 「きずがなおって――\nあのきかんしゃは、また、はしれるの？」
1797 = "「Vết thương lành rồi――\\nĐầu máy đó sẽ lại có thể chạy được sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……正直、わからん。\nそのために整備修復してきたことは、確かだが」
1541 = "「……Thú thật thì, anh cũng không rõ.\\nNhưng chắc chắn một điều rằng, chúng ta đã bảo trì và phục chế nó vì mục tiêu đó」"

# monologue
# JP: 予算も、時間も、不足したとしかいいようが無い。
3396 = "Chỉ có thể nói rằng cả ngân sách lẫn thời gian đều vô cùng eo hẹp."

# monologue
# JP: ひどく恥ずべきことではあるが、足りない部分は各人の、\n“個人の善意と努力”とに、頼ってしまう他になかった。
2674 = "Dù là một điều khá đáng xấu hổ, nhưng đối với những phần còn thiếu sót, chúng tôi không còn cách nào khác ngoài việc trông cậy vào “thiện chí và nỗ lực cá nhân” của mỗi người."

# 【双鉄】
# display as 雙鐵
# JP: 「理屈の上では走れるはずだが――\nこればかりはどうにも、実際試してみないことには」
2196 = "「Về mặt lý thuyết thì đáng lẽ nó phải chạy được――\\nNhưng chuyện này thì quả thực, nếu không chạy thử trên thực tế thì không thể biết chắc được」"

# 【路子】
# display as 路子
# JP: 「きずがきれいに、見えなくなっても――\nきかんしゃなのに、はしれないかもしれないの？」
2022 = "「Ngay cả khi vết thương đã lành hẳn và không còn nhìn thấy nữa――\\nNó là một đầu máy xe lửa, vậy mà vẫn có thể không chạy được sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1916 = "「唔？」" 

# monologue
# JP: 今度は慎重に言葉を探す。\nもう二度と不用意な発言で、路子を怯えさせたくはない。
3364 = "Lần này, tôi cẩn trọng lựa chọn từng lời nói.\\nTôi không muốn làm Michiko phải sợ hãi bởi những phát ngôn bất cẩn thêm một lần nào nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「目に見える傷を直しても、\n見えない傷が、残り続けているかもしれないから」
2021 = "「Bởi vì ngay cả khi chúng ta đã chữa lành những tổn thương có thể nhìn thấy bằng mắt thường,\\nthì những tổn thương vô hình vẫn có thể còn sót lại」"

# 【路子】
# display as 路子
# JP: 「あ――」
1917 = "「A――」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、慎重に試験するんだ。少しずつ、少しずつ。\nゆっくり、ゆっくり、あせらずに」
2071 = "「Thế nên chúng ta mới phải thử nghiệm thật thận trọng. Từng chút một, từng chút một.\\nThật chậm rãi, thật thong thả, tuyệt đối không được nôn nóng」"

# 【路子】
# display as 路子
# JP: 「……そうなんだ」
1529 = "「...Ra là vậy」"

# monologue
# JP: 路子が、小さく頷いてくれる。\n――ほっとする。
3325 = "Michiko khẽ gật đầu.\\n——Tôi thở phào nhẹ nhõm."

# monologue
# JP: 僕が伝えようとしていることを、\n大丈夫、路子は怯えず、そのまま受け取ってくれている。
3096 = "Những điều tôi đang cố truyền đạt,\\nmay mắn thay, Michiko không hề sợ hãi mà đón nhận chúng một cách tự nhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり試せば、もしも見えない傷が悪さをしても、\nすぐに気づいて、手当をできる可能性をあげられるから」
1873 = "「Bởi vì nếu thử nghiệm một cách chậm rãi, ngay cả khi những vết xước vô hình kia có dở chứng,\\nta vẫn có thể nhận ra ngay và tăng khả năng xử lý kịp thời」"

# 【路子】
# display as 路子
# JP: 「……たいへんなんだね」
1532 = "「...Vất vả thật đấy nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大変だ」
1950 = "「Ừ, vất vả lắm chứ」"

# monologue
# JP: その大変さを、\n僕も路子も、文字通りに体で知っている。
3222 = "Sự vất vả đó,\\ncả tôi và Michiko đều thấu hiểu sâu sắc bằng chính cơ thể mình theo đúng nghĩa đen."

# monologue
# JP: 知っているゆえ――\n僕は、決して弱音を吐かない。
3085 = "Chính vì đã biết rõ——\\ntôi tuyệt đối sẽ không bao giờ than vãn."

# 【双鉄】
# display as 雙鐵
# JP: 「大変だけれど、そうやって、ひとつずつを回復させる。\nそれが叶えば――」
2347 = "「Dù vất vả, nhưng cứ như thế, chúng ta sẽ phục hồi từng thứ một.\\nNếu điều đó thành hiện thực——」"

# monologue
# JP: ああ。そうだ。\n僕も、路子も、それが叶えば。
2797 = "Chao ôi. Đúng vậy.\\nCả tôi và Michiko, nếu điều đó thành hiện thực."

# monologue
# JP: こうして焦らずひとつずつ、\n見えない傷を癒やしていければ――
2770 = "Cứ không vội vã thế này và tiến bước từng chút một,\\nxoa dịu đi những tổn thương vô hình——"

# 【双鉄】
# display as 雙鐵
# JP: 「必ず、もう一度走れるさ」
2239 = "「Nhất định, chúng ta sẽ lại có thể chạy được một lần nữa」"

# 【路子】
# display as 路子
# JP: 「そうなんだ」
2116 = "「Đúng vậy nhỉ」"

# monologue
# JP: 路子が光に溶けていく。\n朝の光が、路子に、僕に、射しこんでくる。
3323 = "Hình bóng Michiko dần hòa vào ánh sáng.\\nÁnh ban mai dịu dàng chiếu rọi lên Michiko, và lên cả tôi."

# 【路子】
# display as 路子
# JP: 「それなら、ね？\nがんばってね、そーちゃん」
2328 = "「Thế nên là, nhé?\\nCố lên nhé, So-chan」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1918 = "「Ừ」"

# monologue
# JP: 心地よい目覚めになると確信できる。\n目覚めたときにこの夢を、例え忘れてしまったとても。
2955 = "Tôi tin chắc rằng đây sẽ là một giấc thức giấc thật dễ chịu.\\nDù cho khi tỉnh dậy, tôi có lỡ quên đi giấc mơ này đi chăng nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「がんばるからさ、見ててくれ。\n必ず――走らせてみせるから」
2055 = "「Anh sẽ cố gắng hết sức, nên hãy dõi theo anh nhé.\\nNhất định―― anh sẽ khiến nó lăn bánh cho xem」"

# 【れいな】
# display as 玲奈
# JP: 「こぼれた油は\x%lウェス;#00ffc040;ウェス%l;#;でていねいにふきとるんですよぉ」
2266 = "「Dầu tràn ra thì phải dùng \\x%lウェス;#00ffc040;vải lau%l;#; lau thật cẩn thận đấy nhéee」"

# 【ふかみ】
# display as 深美
# JP: 「ん……。\n手入れとか、楽しい。こういうの、好き。です」
1934 = "「Vâng…….\\nBảo dưỡng thế này, vui thật. Em thích cảm giác thế này. Thật đấy ạ」"

# monologue
# JP: れいなとふかみと。声はすれども、姿は見えない。\n機関庫内のレールとレールの間にある溝――
3056 = "Tiếng của Reina và Fukami vang lên, nhưng không thấy bóng dáng hai người đâu cả.\\nBởi họ đang chui tọt vào bên trong cái rãnh nằm giữa hai đường ray trong nhà ga――"

# monologue
# JP: \x%lピット;#00ffc040;ピット%l;#;と呼ばれる空間の中にすっぽり入り、\n\x%l8620;#00ffc040;8620%l;#;の各部へと、真下からの注油をしているからだ。
2829 = "Khoảng không gian được gọi là \\x%lピット;#00ffc040;hố kiểm tra%l;#;,\\nvà đang tiến hành tra dầu vào các bộ phận của \\x%l8620;#00ffc040;8620%l;#; từ ngay phía bên dưới."

# 【ハチロク】
# display as 八六
# JP: 「油を拭いた\x%lウェス;#00ffc040;ウェス%l;#;は火入れの時に使います。\n間違って捨てないで下さいね」
2086 = "「\\x%lウェス;#00ffc040;Vải lau%l;#; đã thấm dầu sẽ được dùng lúc nhóm lửa.\\nNên mọi người đừng vứt nhầm đi nhé」"

# 【れいな】
# display as 玲奈
# JP: 「了解でーす、ハチロクさぁん」
2216 = "「Rõ rồi ạaa, chị Hachiroku ơi」"

# monologue
# JP: 声のあがった場所にはすぐさま、\nハチロクが駆け寄りチェックしていく。
2603 = "Nơi nào vừa có tiếng nói cất lên là ngay lập tức,\\nHachiroku sẽ chạy xộc tới để kiểm tra."

# monologue
# JP: その足取りは、軽やかを越し、飛ぶようだ。
2836 = "Bước chân của cô ấy không chỉ dừng lại ở mức nhẹ nhàng nữa, mà tựa như đang bay vậy."

# monologue
# JP: （無理もない。\nようやく――ここまで来れたのだからな）
3457 = "（Cũng phải thôi.\\nBởi vì cuối cùng―― chúng ta cũng đã đi được đến bước này rồi mà）"

# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;、車軸、車体、ボイラ。\n深刻なものから軽微なものまで、修復すべき数多の部品。
99 = "Từ \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;, trục bánh xe, thân tàu cho đến nồi hơi.\\nRất nhiều bộ phận cần được phục hồi, từ những hỏng hóc nghiêm trọng cho đến những lỗi gọn nhẹ."

# monologue
# JP: それら全てが、ひとまずではあるが整った。\nいや――整えていただけた。
3351 = "Tất cả những thứ đó, dù mới chỉ là bước đầu, nhưng đã được hoàn thiện.\\nKhông―― chính xác là đã được mọi người giúp hoàn thiện."

# 【蓑笠】
# display as 蓑笠
# JP: 「……御一夜の職人たちの、誇りば感じる仕事ですな。\n新旧部品すり合わせ良し、ぴたりハマっておりますばい」
1544 = "「……Quả là một công trình đáng tự hào của những người thợ thủ công Ohitoyo.\\nSự mài giũa và lắp ráp các linh kiện cũ mới thật tuyệt vời, khớp nhau khít khịt luôn rồi bái」"

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます、蓑笠様。\n引き続き、各所の点検をお願いいたします」
2275 = "「Cảm ơn ông, ngài Minogasa.\\nXin ông tiếp tục hỗ trợ kiểm tra các bộ phận khác giúp cháu nhé」"

# 【蓑笠】
# display as 蓑笠
# JP: 「よかですよ」
1941 = "「Được chứ, cứ để đó cho ta」"

# monologue
# JP: 蓑笠老人をはじめとする、職人有志のみなさんから。\nたくさんの市民ボランティアの方々から。
2644 = "Từ cụ già Minogasa cùng những người thợ thủ công tình nguyện.\\nCho đến vô số người dân tình nguyện giúp đỡ."

# monologue
# JP: 御一夜周辺――湯医線沿線やクマ川流域の広くからも、\n数えきれぬほどの応援と励ましと手とを、いただいた。
2903 = "Từ khắp các khu vực lân cận Ohitoyo――dọc tuyến đường sắt Yui và lưu vực sông Kuma,\\nhọ đã gửi gắm đến đây biết bao sự hỗ trợ, lời động viên cùng những đôi tay chung sức."

# 【真闇】
# display as 真闇
# JP: 「双ちゃんおまたせ。頼まれた分と余分の蒸留水、\n入口前に、タンク横付けで持ってきとーとよ」
1782 = "「Sou-chan, để em chờ lâu rồi. Lượng nước cất anh nhờ với cả phần dư thêm,\\nem đã chở xe bồn đến đỗ ngay trước lối vào rồi đó nha」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、真闇姉。\nおかげで、これで注水に入れる。ハチロク？」
2273 = "「Cảm ơn chị, chị Mayami.\\nNhờ có chị mà giờ chúng ta có thể bắt đầu bơm nước vào rồi. Hachiroku?」"

# 【ハチロク】
# display as 八六
# JP: 「では、注水の監督はポーレットさんにお願いします。\nマニュアルどおりで、大丈夫でしょうか？」
2171 = "「Vậy thì, việc giám sát bơm nước xin được giao lại cho chị Paulette nhé.\\nCứ làm theo đúng hướng dẫn trong sách hướng dẫn thì chắc là ổn chứ ạ?」"

# monologue
# JP: ハチロクの声に、\nポーレットの顔がハっとしたように持ち上がる。
3236 = "Tiếng của Hachiroku vang lên,\\nkhiến Paulette như sực tỉnh và ngẩng mặt lên."

# monologue
# JP: その手には、ハチロクお手製のメンテナンスマニュアル。\nぎりぎりまで、読み込んでくれていたようだ。
2834 = "Trên tay cô ấy là cuốn sách hướng dẫn bảo trì do chính tay Hachiroku soạn ra.\\nCó vẻ cô ấy đã chăm chú đọc nó cho đến tận những giây phút cuối cùng."

# 【ポーレット】
# display as 波萊特
# JP: 「マニュアルしっかりしてるから大丈夫とは思うけど……\n完全に未経験のことだから、少しだけは不安、かも」
2082 = "「Sách hướng dẫn chi tiết lắm nên chị nghĩ là sẽ ổn thôi……\\nNhưng vì đây là việc chị hoàn toàn chưa có kinh nghiệm, nên cũng có chút lo lắng」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、でしたら大宮さんについてもらえばいいですよ。\n大宮さん、大宮さん！　よろしいですか？」
1960 = "「À, nếu vậy thì cứ nhờ anh Oomiya đi cùng là được rồi.\\nAnh Oomiya, anh Oomiya! Anh giúp một tay được không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、助かります。\nどうぞ、よろしくお願いします」
1929 = "「A, vậy thì tốt quá.\\nTrăm sự nhờ anh giúp đỡ ạ」"

# monologue
# JP: ポーレットの\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間や、赤井宮司の人脈から\n集まってくれた旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の技師さんや職員さんたち。
3108 = "Những người đồng hành \\x%lまいてつ;#00ffc040;Maitetsu%l;#; của Paulette, hay các kỹ sư và cựu nhân viên của \\x%l帝鉄;#00ffc040;Đế Thiết%l;#; cũ\\nđược tập hợp lại từ những mối quan hệ của vị tư tế Akai."

# monologue
# JP: ――そうした全ての人たちの力も、想いも。\n新生\x%l8620;#00ffc040;8620%l;#;の体の中には、きっと等しくこめられている。
2641 = "――Sức lực và cả tâm tư của tất cả những con người ấy.\\nChắc chắn đều được gửi gắm một cách trọn vẹn bên trong cơ thể của chiếc \\x%l8620;#00ffc040;8620%l;#; tái sinh."

# monologue
# JP: （たくさんの手が、運んでくれた。\nおかげでようやく、走行試験までこぎつけたのだ）
3441 = "（Biết bao nhiêu bàn tay đã cùng nhau chung sức nâng đỡ.\\nNhờ vậy mà cuối cùng, chúng tôi cũng đã chạm tới được bước thử nghiệm vận hành này）"

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;から御一夜駅ホームまで。\n全行程で１キロも無い、新生\x%l8620;#00ffc040;8620%l;#;、初めての旅。
2895 = "Từ \\x%l石造機関庫;#00ffc040;nhà ga gạch đá%l;#; cho đến sân ga Oniyo.\\nTổng quãng đường chưa đầy 1 km, chuyến hành trình đầu tiên của đầu máy \\x%l8620;#00ffc040;8620%l;#; mới tái sinh."

# monologue
# JP: けれどもこの小さな一歩を踏み出せなければ――\n僕たちは、ここからどこへも動けはしない。
2648 = "Nhưng nếu không thể tiến lên một bước nhỏ bé này――\\nChúng tôi sẽ chẳng thể di chuyển đi bất cứ đâu từ nơi đây cả."

# 【双鉄】
# display as 雙鐵
# JP: 「……力むな。気負うな。\nひとつひとつを、ただ正確にやればいいのだ」
1522 = "「……Đừng căng thẳng. Đừng tự tạo áp lực.\\nCứ thực hiện từng bước một, thật chính xác là được」"

# monologue
# JP: [キャブ,2]運転台の窓から乗り出していた体を戻し、\n\x%l火室;#00ffc040;火室%l;#;の正面へと戻る。
2991 = "Thu mình lại sau khi rướn người ra khỏi cửa sổ buồng lái,\\ntôi quay trở lại vị trí đối diện với \\x%l火室;#00ffc040;buồng đốt%l;#;."

# monologue
# JP: 途端に凪が、手にしたワンスコで投げ込みの真似。
2736 = "Ngay lập tức, Nagi liền làm động tác giả xúc than bằng chiếc xẻng xúc than cầm trên tay."

# 【凪】
# display as 凪
# JP: 「にーさん！\nいよいよ石炭ば投げ込むと？」
1988 = "「Anh hai!\\nĐã đến lúc xúc than bỏ vào chưa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まだだ。注油と水張りとが終わるのを待たねば」
2316 = "「Chưa đâu. Phải đợi tra dầu và bơm nước xong đã」"

# 【凪】
# display as 凪
# JP: 「もう待つのは飽きたばい！\n早く石炭、投げ込みたいばい！！」
1886 = "「Em chờ chán lắm rồi!\\nMuốn nhanh xúc than bỏ vào lắm rồi nè!!」"

# monologue
# JP: \x%l火室;#00ffc040;火室%l;#;の床――\x%l火格子;#00ffc040;[ひごうし,2]火格子%l;#;と呼ばれる場所がスカスカなのが、\n凪にはどうにも落ち着かんらしい。
3184 = "Sàn của \\x%l火室;#00ffc040;buồng đốt%l;#;――nơi được gọi là \\x%l火格子;#00ffc040;vỉ ghi%l;#; vẫn còn trống trơn,\\ncó vẻ điều đó làm Nagi không thể nào ngồi yên được."

# monologue
# JP: その上で石炭をあかあか燃やしてみたい――\n気持ちは僕も同じだが、まだまだ時は満ちていない。
2976 = "Muốn được nhìn thấy than cháy đỏ rực trên đó――\\nTôi cũng có cùng cảm giác ấy, nhưng thời điểm thích hợp vẫn chưa tới."

# 【双鉄】
# display as 雙鐵
# JP: 「ダメだ、我慢だ。\nいきなり石炭は燃えん。全ては順番だ」
1773 = "「Không được, phải kiên nhẫn.\\nThan không thể tự nhiên cháy ngay được. Mọi thứ đều phải theo thứ tự」"

# 【凪】
# display as 凪
# JP: 「ぐぎぎぎぎぎぎ」
2378 = "「Ư ư ư ư ư gừ」"

# 【日々姫】
# display as ？？？
# JP: 「良かったー！　間に合ったばっ――んんっ、\nどうやら、なんとか間に合いましたね」
1993 = "「May quá đi mất! Kịp rồ――à hèm,\\ncó vẻ như tôi đã kịp thời đến nơi rồi nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か」
2118 = "「Là Hibiki đấy à」"

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の入り口から、\n逆光を背負い日々姫がこちらに近づいてくる。
2803 = "\\x%lNhà kho đầu máy bằng đá;#00ffc040;Nhà kho đầu máy bằng đá%l;#; từ phía lối vào,\\nHibiki đang tiến lại gần phía này, bóng cô ngược sáng."

# monologue
# JP: 『私は私に出来る手伝い』などと言い、\n部屋にこもって、なにやらごそごそしていたが――
2611 = "Nói là 『Em sẽ giúp những gì em có thể』,\\nrồi tự nhốt mình trong phòng làm cái gì đó lục đục suốt, nhưng mà――"

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、ハチロク。ちょっといい？」
1807 = "「Hachiroku, Hachiroku. Tớ phiền cậu một lát được không?」"

# 【ハチロク】
# display as 八六
# JP: 「もちろんです、日々姫」
2157 = "「Tất nhiên là được rồi, thưa Hibiki」"

# monologue
# JP: ハチロクが日々姫に近づく。
2682 = "Hachiroku tiến lại gần Hibiki."

# monologue
# JP: 機関庫内の無数の視線が、\nふたりの方へと向けられる。
3070 = "Vô số ánh mắt trong nhà kho đầu máy\\nđều đổ dồn về phía hai người."

# 【日々姫】
# display as 日日姬
# JP: 「見学会のチラシのときに、資料、いろいろ調べて。\nそれで、記念の時にはあった方がいいかと思ったの」
1843 = "「Lúc làm tờ rơi cho buổi tham quan, tớ đã tra cứu rất nhiều tài liệu.\\nThế nên tớ nghĩ là vào dịp kỷ niệm thì nên có cái này」"

# monologue
# JP: 抱えている、なにか、かなり大きな丸いもの。\nそれを「はい」っと、日々姫はハチロクへと渡す。
3035 = "Một vật gì đó hình tròn khá lớn đang được ôm trong tay.\\nHibiki đưa nó cho Hachiroku và nói 「Đây nè」."

# 【日々姫】
# display as 日日姬
# JP: 「決まりとかあるなら違っちゃってるかもしれないし、\nプラバンに油絵の具だから、強度も正直わかんないけど」
2132 = "「Nếu có quy định gì đó thì có thể tớ làm hơi sai lệch một chút,\\nvới lại vẽ sơn dầu trên tấm nhựa nên độ bền thực sự tớ cũng không rõ nữa」"

# 【ハチロク】
# display as 八六
# JP: 「これは――」
2309 = "「Cái này là――」"

# monologue
# JP: 破顔一笑。\nハチロクは、もうくしゃくしゃの笑顔になる。
2702 = "Rạng rỡ hẳn lên.\\nHachiroku nở một nụ cười rạng ngời, hạnh phúc tột cùng."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　双鉄様！\n取付け！　取付けをお願いします！」
2351 = "「Soutetsu-sama! Soutetsu-sama!\\nLắp vào! Xin hãy lắp nó vào đi ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1525 = "「Ừm」"

# monologue
# JP: 一体、何の取付けなのか――
3278 = "Rốt cuộc là lắp cái gì cơ chứ――"

# monologue
# JP: キャブから下りて近くによれば、すぐさま僕も理解する。\nハチロクの笑顔の、その[わけ,1]理由も。
2963 = "Bước xuống từ cabin và tiến lại gần, tôi lập tức hiểu ra ngay.\\nCả lý do đằng sau nụ cười của Hachiroku nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「僕ひとりでは無理かもしれんな。\n蓑笠さん、お手伝いをいただけますか」
2047 = "「Một mình tôi thì có lẽ không xuể rồi.\\nBác Minokasa, bác có thể giúp tôi một tay được không?」"

# 【凪】
# display as 凪
# JP: 「任せろばいっ！」
1791 = "「Cứ giao cho cháu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪も確かに蓑笠さんだが」
1923 = "「Không, Nagi cũng đúng là họ Minokasa thật, nhưng mà...」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ワシの方ですな。よかですよ」
1874 = "「Là lão đây mà. Được chứ, không thành vấn đề」"

# monologue
# JP: 手伝いたがる凪もくわえて、\n蓑笠老人と僕と三人、\x%l8620;#00ffc040;8620%l;#;前面へ。
3269 = "Kéo theo cả Nagi đang hăng hái muốn giúp,\\nlão Minokasa, tôi và cả ba người cùng tiến về phía trước \\x%l8620;#00ffc040;8620%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？　ハチロク」
2039 = "「Thế nào rồi? Hachiroku」"

# 【ハチロク】
# display as 八六
# JP: 「少しだけ一時の方向に傾いて――あ！　そうです！\nそうそう！　それできっちり真っ直ぐです」
1877 = "「Hơi lệch về hướng một giờ một chút―― A! Đúng rồi ạ!\\nChuẩn rồi ạ! Như vậy là hoàn toàn thẳng thớm rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1916 = "「唔？」" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「わぁっ！」\n「かぁわいいですぅ～」
1891 = "「Oa!」\\n「Đáng yêu quá đi mất thôi~」"

# monologue
# JP: 弾ける歓声、背後から。
3328 = "Tiếng reo hò rộn rã vang lên từ phía sau."

# monologue
# JP: いつの間に、僕のすぐ後ろ、\nポーレットとれいなとが立っている。
2597 = "Từ lúc nào không hay, ngay sau lưng tôi,\\nPaulette và Reina đã đứng đó tự bao giờ."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。良く似合っている。\nこれは――\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;でいいのか？」
1947 = "「Ừm. Trông rất hợp đấy.\\nCái này―― gọi là \\x%lヘッドマーク;#00ffc040;biển đầu tàu%l;#; có đúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうです、双鉄くん。\n\x%l列車;#00ffc040;列車%l;#;先頭の\x%lトレインマーク;#00ffc040;トレインマーク%l;#;は、\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;です」
2126 = "「Đúng vậy đó, Soutetsu-kun.\\n\\x%l列車;#00ffc040;Biển hiệu%l;#; ở đầu \\x%lトレインマーク;#00ffc040;tàu%l;#; được gọi là \\x%lヘッドマーク;#00ffc040;biển đầu tàu%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「『運転試験　ハチロク』か。単純であるがかわいらしい。\nこのマンガは、運転[ボディ]体のハチロクだな？」
1516 = "「『Chạy thử nghiệm Hachiroku』sao. Đơn giản nhưng mà dễ thương thật đấy.\\nHình vẽ chibi này là Hachiroku ở dạng điều khiển tàu đúng không?」"

# monologue
# JP: チビキャラというものらしいが、\n以前、日々姫が苦手だと言っていた覚えがある。
2961 = "Hình như người ta gọi đó là nhân vật Chibi,\\ntôi nhớ mang máng trước đây Hibiki từng bảo là cô ấy vẽ không được tốt lắm."

# 【双鉄】
# display as 雙鐵
# JP: 「専門用語はよくわからんが、苦手とはとても思えんな。\n非常に可愛らしくて、よいと思う」
2049 = "「Tôi không rành mấy thuật ngữ chuyên môn lắm, nhưng nhìn thế này thì chẳng giống là không tốt chút nào cả.\\nTrông vô cùng đáng yêu, tôi thấy rất tuyệt」"

# 【日々姫】
# display as 日日姬＆八六
# JP: 「そ、そう？」\n「双鉄様……」
2103 = "「Th-thế sao?」\\n「Soutetsu-sama……」"

# monologue
# JP: 日々姫だけにとどまらず、\nハチロクまでが照れたのか、うっとりと頬を赤くする。
3028 = "Không chỉ có mỗi Hibiki,\\nngay cả Hachiroku dường như cũng ngượng ngùng, đôi má đỏ ửng lên đầy say đắm."

# 【ポーレット】
# display as 波萊特
# JP: 「あ、報告が遅れましたけど、双鉄くん」
1927 = "「A, tớ báo cáo hơi muộn một chút, Soutetsu-kun」"

# 【双鉄】
# display as 雙鐵
# JP: 「んむ？」
1954 = "「Hửm?」"

# monologue
# JP: ポーレットの締まった声に背筋が伸びる。
3239 = "Giọng nói nghiêm túc của Paulette khiến tôi thẳng lưng lên."

# monologue
# JP: というか、そうだ。\nポーレットがここにいるということは――
2860 = "Mà khoan, đúng rồi.\\nPaulette đang ở đây thì có nghĩa là――"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;ボイラへの注水、\nさきほど規定通りに終わりました」
1462 = "「Việc bơm nước vào nồi hơi của \\x%l8620;#00ffc040;8620%l;#;,\\nvừa rồi đã hoàn thành theo đúng quy định ạ」"

# 【れいな】
# display as 玲奈
# JP: 「あ、そうでしたそうでした」
1909 = "「A, phải rồi, phải rồi ha」"

# monologue
# JP: \x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;に、まだ見とれ続けていたのだろう。\nぽ～っとしていたれいなも慌てて、姿勢を正す。
3155 = "Có lẽ vẫn còn đang mải ngắm nhìn \\x%lヘッドマーク;#00ffc040;biển hiệu đầu tàu%l;#;.\\nReina vốn đang ngơ ngẩn cũng vội vàng chấn chỉnh lại tư thế."

# 【れいな】
# display as 玲奈
# JP: 「全注油かしょ！　\n注油して、ダブルチェックも完了でぇす！」
2073 = "「Toàn bộ các vị trí tra dầu!\\nĐã tra dầu xong và cũng đã hoàn thành kiểm tra chéo rồi ạ!」"

# 【ハチロク】
# display as 八六
# JP: 「ご苦労様です！」
2288 = "「Vất vả cho mọi người rồi!」"

# monologue
# JP: 明るい声。\nびしりと伸びた背筋で敬礼。
2693 = "Giọng nói tươi vui.\\nTấm lưng vươn thẳng tắp, cô ấy chào theo nghi thức quân đội."

# monologue
# JP: そしてハチロクは油の染みた\x%lウェス;#00ffc040;ウェス%l;#;をれいなから回収し、\n僕に向け、芝居がかった一礼をする。
3138 = "Rồi Hachiroku thu lại tấm \\x%lウェス;#00ffc040;giẻ lau%l;#; đẫm dầu từ tay Reina,\\nhướng về phía tôi và cúi đầu chào đầy trang trọng."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2350 = "「Soutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1525 = "「……唔」" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;鞄を大きく開き、\n中から\x%l運転体;#00ffc040;運転体%l;#;のハチロクを取り出す。
2938 = "Mở rộng chiếc túi \\x%l機関士;#00ffc040;nhân viên đầu máy%l;#;,\\nrồi lấy \\x%l運転体;#00ffc040;thân thể vận hành%l;#; của Hachiroku từ bên trong ra."

# 【ハチロク】
# display as 八六
# JP: 「ん……」
1912 = "「Ư...」"

# monologue
# JP: かちり、\x%lタブレット;#00ffc040;タブレット%l;#;が交換される。\nぱちり、\x%l運転体;#00ffc040;運転体%l;#;のハチロクの目が開く。
2619 = "Cạch, \\x%lthẻ bài thông hành;#00ffc040;thẻ bài thông hành%l;#; đã được trao đổi. \\nChớp mắt, \\x%lcơ thể vận hành;#00ffc040;cơ thể vận hành%l;#; của Hachiroku khẽ mở mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1905 = "「Ôi chao」"

# monologue
# JP: そのまま崩れる\x%l整備体;#00ffc040;整備体%l;#;のハチロクを、\n機関庫内にしつらえた、専用席へと座らせる。
3140 = "Tôi đỡ lấy cơ thể của Hachiroku đang dần mất đi lực lượng khi chuyển giao sang \\x%lcơ thể bảo trì;#00ffc040;cơ thể bảo trì%l;#;, \\nvà đặt cô ấy ngồi vào chiếc ghế chuyên dụng đã được chuẩn bị sẵn trong nhà ga xe lửa."

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。双鉄様」
2274 = "「Cảm ơn ngài rất nhiều. Soutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「まだまだ、礼には早過ぎる」
2191 = "「Vẫn còn quá sớm để nói lời cảm ơn đấy」"

# 【ハチロク】
# display as 八六
