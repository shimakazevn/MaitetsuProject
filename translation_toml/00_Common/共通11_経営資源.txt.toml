2294 = "「Đúng là không dễ dàng như vậy nhỉ.」"

# monologue
# JP: 口では言うが、気が向いてくる。
3891 = "Miệng thì nói vậy, nhưng tôi lại bắt đầu thấy hứng thú."

# monologue
