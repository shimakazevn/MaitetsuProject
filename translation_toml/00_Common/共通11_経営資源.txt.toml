[info]

[characters]
3200 = "Paulette"
3349 = "Soutetsu"
3180 = "Hachiroku"
3817 = "Trưởng tư tế Akai"
3691 = "Makura"

[character_subs]
3640 = "Paulette"
3894 = "Soutetsu"
