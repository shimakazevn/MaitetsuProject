2236 = "「Không. Phải gọi là... uy dung mới đúng.\\nDù hiện tại chỉ là một vật không thể chuyển động, nó vẫn thật đẹp, thậm chí còn đáng tin cậy.」"

# monologue
# JP: 言えばにこっと、ポーレットは微笑む。\nまるで自分を、褒めてもらえでもしたかのように。
3748 = "Nghe tôi nói, Paulette mỉm cười rạng rỡ.\\nCứ như thể chính cô ấy là người vừa được khen vậy."

# 【ポーレット】
# display as 波萊特
