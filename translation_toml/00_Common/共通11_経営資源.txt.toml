[script]
# lines: 582 
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ、\n赤井宮司さんにも会ってきたんですか」
3002 = "「Vậy là anh đã\\nđến gặp Trưởng tư tế Akai rồi ạ?」"

# monologue
# JP: 明けて翌日。レールショップ。\n乗務を終えたポーレットに、昨日のことを報告する。
3736 = "Sáng hôm sau. Tại Cửa hàng Đường sắt.\\nSau khi Paulette kết thúc ca làm việc, tôi kể lại cho cô ấy nghe chuyện hôm qua."

# 【双鉄】
# display as 雙鐵
# JP: 「会った、といえるほどでもない。\n改めての面会の約束を取付けただけだ」
2317 = "「Cũng không hẳn là đã gặp.\\nAnh chỉ mới hẹn một buổi gặp mặt khác thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「お忙しいんですね、宮司さんも」
2814 = "「Ngài Trưởng tư tế bận rộn thật nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「の、ようだったな」
2831 = "「Ừm, có vẻ là vậy.」"

# monologue
# JP: 頷くと同時、僕の傍ら、ハチロクが小さく肩を震わす。\n気付きはするが、構わずそのまま話を続ける。
3568 = "Cùng lúc tôi gật đầu, Hachiroku đang đứng cạnh khẽ run vai.\\nTôi có để ý, nhưng vẫn mặc kệ và tiếp tục câu chuyện."

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲という娘を知っているか？」
2308 = "「Em có biết cô gái tên Houshou Kisaki không?」"

# monologue
# JP: 小さな頷き。\nポーレットの顔がわずかに曇る。
3658 = "Một cái gật đầu nhẹ.\\nNét mặt Paulette thoáng chút u ám."

# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです。銀行さん――\n[くまもと,1]隈元銀行御一夜支店の支店長さんで、つまり……」
2817 = "「Dĩ nhiên rồi ạ. Người của ngân hàng――\\nLà giám đốc chi nhánh Ohitoyo của Ngân hàng Kumamoto, nói cách khác……」"

# 【双鉄】
# display as 雙鐵
# JP: 「エアクラ工場誘致派の、中心人物で間違いないか？」
2853 = "「Là nhân vật trung tâm của phe ủng hộ mời gọi nhà máy Aircra, không sai chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。計画の主導者は多分、隈元銀行頭取で、\n[きさき,1]稀咲さんのお父様である、[ほうしょうもとただ,3]宝生元忠さんですけど」
2696 = "「Vâng ạ. Người chủ mưu kế hoạch có lẽ là tổng giám đốc Ngân hàng Kumamoto,\\nlà cha của cô Kisaki, ông Houshou Mototada, nhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2996 = "「Ồ.」"

# monologue
# JP: 宝生元忠。あの娘の父にして、大銀行の頭取か。\nどのような人物なのか、一度会いたい気もしてくる。
3448 = "Houshou Mototada. Cha của cô gái đó, lại còn là tổng giám đốc một ngân hàng lớn sao.\\nMình cũng muốn gặp thử một lần xem ông ta là người thế nào."

# 【ポーレット】
# display as 波萊特
# JP: 「市内で一番活発に動いてるのは間違いなく稀咲さんです。\nより正確には、動いて、結果を出している――ですね」
2826 = "「Người hoạt động tích cực nhất trong thành phố chắc chắn là cô Kisaki ạ.\\nChính xác hơn thì, cô ấy vừa hành động, vừa tạo ra kết quả―― ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。やはり有能なのか」
2351 = "「Ra là vậy. Quả nhiên là một người có năng lực.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……」
1816 = "「……」"

# monologue
# JP: ポーレットが珍しく、口惜しそうな表情をして無言で頷く。
3645 = "Paulette hiếm khi lộ vẻ mặt cay cú, cô im lặng gật đầu."

# monologue
# JP: 誘致賛成の稀咲が結果を出しているのなら、\nポーレットはその分、してやられているのかもしれない。
3587 = "Nếu Kisaki phe tán thành đang tạo ra kết quả,\\nthì có lẽ Paulette đang bị cô ta qua mặt cũng chừng."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、その稀咲が訪ねていったそうなのだ。\n僕らが訪問する前に、赤井宮司のところへと」
2886 = "「Dù sao thì, nghe nói Kisaki đó đã đến thăm.\\nĐến chỗ Trưởng đền Akai, trước cả chúng ta」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　赤井さん――\n神社さんにまで切り崩し工作を？」
2406 = "「Hả!? Ông Akai――\\nNgay cả đền thờ mà cô ta cũng định lôi kéo sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「の、つもりらしかったがな。\n赤井宮司は、切り崩されずになんとか追い返したらしい」
2293 = "「Có vẻ đó là ý định của cô ta.\\nNhưng nghe nói Trưởng đền Akai đã không bị thuyết phục và xoay xở đuổi được cô ta về」"

# 【ポーレット】
# display as 波萊特
# JP: 「なんとか？」
2888 = "「Xoay xở?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ご本人がそう言っていた。\n稀咲は――相当な粘り腰らしいな」
2448 = "「Ừ. Chính ông ấy đã nói vậy.\\nKisaki―― có vẻ là một người cực kỳ dai dẳng nhỉ」"

# monologue
# JP: 稀咲が時間を使ったという、『実りの無い議論』。
3265 = "Cái gọi là 'cuộc tranh luận vô ích' mà Kisaki đã tốn thời gian vào."

# monologue
# JP: 僕らが訪ねた赤井宮司は、論戦によほど疲れたらしく、\n……率直にいってヘロヘロだった。
3529 = "Trưởng tư tế Akai mà chúng tôi đến thăm, có vẻ như đã vô cùng mệt mỏi sau cuộc tranh luận,\n...nói thẳng ra là ngài ấy đã rã rời."

# 【ハチロク】
# display as 八六
# JP: 「…………っ」
1811 = "「…………」"

# monologue
# JP: ハチロクが必死になって思い出し笑いをこらえるほど――
3679 = "Đến mức Hachiroku phải cố hết sức để nhịn cười khi nhớ lại――"

# monologue
# JP: 僕らの応対に出てくださった、優しい顔のおでこの上に、\n冷却シートが貼りついてるのを失念される、それほどに。
3680 = "Đến mức ngài ấy, người đã ra tiếp chúng tôi với một gương mặt hiền hậu, lại quên mất trên trán mình\nđang dán một miếng dán hạ sốt."

# 【双鉄】
# display as 雙鐵
# JP: 「たいそうお疲れのご様子だったのでな。\nその時はご辞退申し上げ、今日の約束をいただいたのだ」
2287 = "「Vì trông ngài ấy có vẻ mệt mỏi lắm.\nLúc đó tôi đã xin phép cáo từ, và nhận được một cuộc hẹn cho ngày hôm nay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はぁ～、そうだったんですか。\nさすがですねぇ、双鉄くん」
2355 = "「Hà~, ra là vậy sao ạ.\nQuả không hổ danh là anh Soutetsu nhỉ.」"

# monologue
# JP: 感心顔のポーレット。\n僕には意味がわからない。
3641 = "Paulette tỏ vẻ thán phục.\nCòn tôi thì chẳng hiểu gì cả."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の、いったい何がさすがだ？」
2596 = "「Tôi... có gì đáng để 'không hổ danh' chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「赤井宮司さんに自力でたどり着いたことですよ。\nもう少しあとにご紹介しよう、って思ってたんですけど」
2782 = "「Là việc anh đã tự mình tìm được đến Trưởng tư tế Akai đó ạ.\nEm đã định sẽ giới thiệu anh với ngài ấy sau một chút nữa cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2713 = "「Ồ.」"

# monologue
# JP: 丁度いい。面会をいただくその前に、\n赤井宮司の人となりにつき、聞いておければありがたい。
3611 = "Vừa hay. Trước khi diện kiến ngài ấy,\nsẽ thật tốt nếu mình có thể hỏi trước về con người của Trưởng tư tế Akai."

# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、もう少しあとなのだ？」
2795 = "「Tại sao lại là 'sau một chút nữa'?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ご自身が物事に影響を与えてしまうことに凄く慎重――、\nそういう方なので、足固め段階だと早いかなぁって」
2286 = "「Vì ngài ấy là một người rất thận trọng trong việc gây ảnh hưởng đến sự vật sự việc――,\nnên em nghĩ ở giai đoạn củng cố nền tảng này thì vẫn còn hơi sớm ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「影響を与えることに慎重、とは？」
2326 = "「Thận trọng trong việc gây ảnh hưởng, là sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「赤井阿蘇神社は、御一夜最大最古の神社で、\n当然、[うじこ,1]氏子さんもすごく多くて、影響力があるんです」
2960 = "「Đền Akai Aso là ngôi đền lớn nhất và cổ xưa nhất ở Ohitoyo,\nnên tất nhiên là có rất nhiều giáo dân, và có sức ảnh hưởng rất lớn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほど。極端な例えでいえば、\n[ヒノモトノミカド,4]日ノ本乃帝が政治的な発言をせぬようなものか」
2413 = "「À. Ra là vậy. Lấy một ví dụ cực đoan thì,\\nchắc cũng giống như việc Thiên hoàng của Hinomoto không đưa ra phát ngôn chính trị nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。\nまさしくそんな感じだと思います」
2785 = "「Vâng, đúng vậy ạ.\\nEm nghĩ chính xác là cảm giác như vậy.」"

# monologue
# JP: 同意の言葉をすぐさま返し、\nけれど、ポーレットの顔色はすぐれない。
3426 = "Cô ấy ngay lập tức đáp lại lời đồng tình,\\nnhưng sắc mặt của Paulette lại không được tốt."

# monologue
# JP: 何故だ？　と問うより一足早く、\nポーレットは答えを継ぎ足してくる。
3667 = "Còn chưa kịp hỏi tại sao,\\nPaulette đã tiếp lời."

# 【ポーレット】
# display as 波萊特
# JP: 「市の職員さんに、宮司さんの叔母さんがいるんですけど。\nわざわざ帝鉄に勤めに出たのも、おなじ理由らしいです」
2522 = "「Trong số các nhân viên của thành phố, có dì của cô Trưởng đền ạ.\\nNghe nói lý do bà ấy cất công đi làm cho Teitetsu cũng là vì như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな。\nでは、勤務地も御一夜ではなかった？」
1828 = "「……Ra là vậy.\\nVậy thì, nơi làm việc của bà ấy cũng không phải ở Ohitoyo à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「[こくら,1]粉蔵だったって話です」
2656 = "「Em nghe nói là ở Konakura ạ.」"

# monologue
# JP: そこまで言ってポーレットは、\n何気ないように腰をとんとん叩く。
3659 = "Nói đến đó, Paulette\\nvỗ nhẹ vào lưng mình một cách bâng quơ."

# monologue
# JP: 少し、顔色がよくなったようだ。
3421 = "Sắc mặt cô ấy có vẻ đã khá hơn một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「粉蔵……蓑笠老人の話にも出てきたな。\n帝鉄の工場があったというところで間違いないか？」
2529 = "「Konakura…… Cái tên này cũng xuất hiện trong câu chuyện của lão Minokasa.\\nĐó là nơi có nhà máy của Teitetsu, không nhầm chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも知ってたんですね。\nけど、赤井宮司さんは工場勤務じゃなかったそうですよ」
2302 = "「Anh Soutetsu cũng biết chuyện đó sao.\\nNhưng mà, nghe nói cô Trưởng đền Akai không làm việc ở nhà máy đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば何を？」
3025 = "「Vậy bà ấy làm gì?」"

# 【ポーレット】
# display as 波萊特
# JP: 「さすがにそこまでは……わたしも、\n宮司さんご本人と踏み込んだお話はしませんし」
2578 = "「Cái đó thì em chịu…… Em cũng\\nchưa nói chuyện sâu với chính cô Trưởng đền bao giờ cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 2996 = "「這樣啊」" 

# monologue
# JP: 話し込むうち、ティーカップが空になってしまった。\nそのタイミングで、ハチロクが控えめな声を出す。
3798 = "Trong lúc mải mê trò chuyện, tách trà đã cạn tự lúc nào.\\nĐúng lúc đó, Hachiroku dè dặt cất tiếng."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。そろそろお時間をお気にされるべきかと」
3052 = "「Soutetsu-sama. Có lẽ đã đến lúc ngài nên để tâm tới thời gian rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、もうか。\n話していると、時間が経つのが早いものだな」
2410 = "「Ồ, đã đến lúc rồi sao.\\nCứ mải nói chuyện là thời gian lại trôi nhanh thật đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当ですね」
2681 = "「Đúng thật ạ.」"

# monologue
# JP: 頬をわずかに染めて微笑み。
3647 = "Gò má cô khẽ ửng hồng, nở một nụ cười."

# monologue
# JP: ポーレットも椅子から腰を、浮かせ――\nなんとも、中途半端な姿勢で、止まる。
3416 = "Paulette cũng nhấc người khỏi ghế, rồi――\\nchợt dừng lại ở một tư thế lửng lơ, khó tả."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、\nあまり役に立つお話できなかった気もしますけど」
2624 = "「Em...\\nEm có cảm giác mình chẳng nói được điều gì có ích cho lắm.」"

# monologue
# JP: その姿勢のまま、言葉を発す。\n顔色のすぐれぬわけを、ようやく理解できた気がする。
3412 = "Cô cất lời trong khi vẫn giữ nguyên tư thế đó.\\nTôi có cảm giác mình đã hiểu ra lý do sắc mặt cô không được tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今の話だけでも十分参考になった。\nありがとう」
2253 = "「Đâu có, chỉ riêng câu chuyện vừa rồi thôi cũng đã giúp ích rất nhiều rồi.\\nCảm ơn em.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうでしたか？　なら、嬉しいです」
2684 = "「Vậy ạ? Nếu thế thì em vui lắm.」"

# monologue
# JP: ポーレットはまだ動かない。\nこのまま放置もしておけないが、さて――
3642 = "Paulette vẫn không nhúc nhích.\\nKhông thể cứ để cô ấy như vậy mãi được, nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「今日のれいなは、\n随分と整備に時間をかけているのだな」
2277 = "「Hôm nay Reina có vẻ\\ndành nhiều thời gian cho việc bảo dưỡng nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「今は整備じゃないんです。日々姫ちゃんと一緒になって\n……覚えてます？　この前の子猫」
2315 = "「Giờ không phải là bảo dưỡng đâu ạ. Em đang cùng với Hibiki-chan\\n...Chị còn nhớ không? Con mèo con lần trước ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの子犬か」
2415 = "「À, con chó con đó à.」"

# 【ハチロク】
# display as 八六
# JP: 「犬でもネコでも無い気がするのですが」
2621 = "「Tôi lại thấy nó chẳng phải chó cũng chẳng phải mèo.」"

# 【ポーレット】
# display as 波萊特
# JP: 「とにかくあのコ。\nなんか、餌付けして慣らそうってしてるみたいで」
2887 = "「Tóm lại là con bé đó ạ.\\nHình như hai người họ đang cho nó ăn để dụ nó quen người thì phải.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2416 = "「Ồ.」"

# monologue
# JP: 日々姫のやつ、朝早くからバタバタと出かけていったが、\nなんだ、目的地は同じだったか。
3593 = "Hibiki, con bé đó, sáng sớm đã vội vã đi đâu mất,\\nra là, điểm đến của chúng ta giống nhau à."

# 【双鉄】
# display as 雙鐵
# JP: 「うまくいくだろうな、それは。\n僕の知る限り、日々姫は動物にたいそう好かれる」
2572 = "「Chắc là sẽ ổn thôi.\\nTheo như tớ biết thì Hibiki rất được động vật yêu quý」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいなもですよ？　だからわたし、\n気が早いですけど、準備はじめようかと思ってて」
2805 = "「Reina cũng vậy đó? Nên là em,\\ndù hơi sớm nhưng đang định bắt đầu chuẩn bị đây ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「この前聞いた、駅長犬のか？」
2299 = "「Là chuyện về chú chó trưởng ga mà lần trước em nói à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよ？　駅長ネコの」
2679 = "「Vâng ạ? Là cô mèo trưởng ga chứ.」"

# 【ハチロク】
# display as 八六
# JP: 「…………駅長……アレはなんなのでしょう」
1813 = "「…………Trưởng ga…… Đó là gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「面白そうだな。手伝えることがあったら言ってくれ。\n観光振興の、それも一助となるかもしれん」
2238 = "「Nghe thú vị đấy. Nếu có gì cần tớ giúp thì cứ nói nhé.\\nBiết đâu cũng sẽ góp phần thúc đẩy du lịch nữa」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、そのときにはお願いしますね、双鉄くん」
2459 = "「Ufufu, đến lúc đó nhờ cả vào anh nhé, Soutetsu.」"

# 【ハチロク】
# display as 八六
# JP: 「餌付けがうまくいくなら――ですか」
2247 = "「Nếu việc cho ăn diễn ra thuận lợi―― thì sao ạ?」"

# monologue
# JP: 気になるのだろう。\nハチロクの視線がしきりにドアへ向く。
3322 = "Chắc là em ấy tò mò lắm.\\nÁnh mắt của Hachiroku liên tục hướng về phía cửa."

# monologue
# JP: ならば、方針を変更しよう。\nれいなが戻るのを待つよりも、今はともかく――
3871 = "Vậy thì, đổi kế hoạch thôi.\\nThay vì đợi Reina quay lại, bây giờ cứ――"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、先に外に出ていてくれ。\n少し、ポーレットと話がある」
2337 = "「Hachiroku, em ra ngoài trước đi.\\nTớ có chút chuyện muốn nói với Paulette」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですか、双鉄様。\nそれでは、わたくしこの辺りをぶらついています」
2505 = "「Vậy ạ, thưa ngài Soutetsu.\\nVậy thì, em sẽ đi dạo quanh đây ạ」"

# monologue
# JP: ぶらつく、と――まったくらしくも無いことを言い、\nハチロクはそそくさと外へ出る。
3887 = "Đi dạo, ư―― em ấy nói một từ hoàn toàn không giống mình chút nào,\\nrồi Hachiroku vội vàng đi ra ngoài."

# 【双鉄】
# display as 雙鐵
# JP: 「さて」
3030 = "「Được rồi,」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい双鉄くん。\nお話、着替えながらでもいいですか？」
2433 = "「A, xin lỗi cậu Soutetsu.\\nMình vừa thay đồ vừa nói chuyện được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2457 = "「Hửm?」"

# monologue
# JP: ポーレットが立ち、こちらを見ている。\n不自然な姿勢で止まっていない。
3656 = "Paulette đứng dậy, nhìn về phía tôi.\\nDáng đứng của cô ấy không có gì bất thường."

# 【双鉄】
# display as 雙鐵
# JP: 「いや、動けるのならば、今これ以上の話は無い。\n腰を痛めでもしているのではないかと心配したのだが」
2250 = "「Không, nếu cậu vẫn cử động được thì không cần nói thêm gì nữa.\\nTôi chỉ lo là cậu bị đau lưng thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり気づいちゃいますか。\nさすがは双鉄くんですね」
2749 = "「Quả nhiên là cậu nhận ra nhỉ.\\nĐúng là Soutetsu-kun có khác.」"

# 【ポーレット】
# display as 波萊特
# JP: 「腰、少し疲れがたまりやすいだけなんです。\nお医者さんにも行きましたけど、問題ないって」
2601 = "「Chỉ là lưng mình hơi dễ bị mỏi thôi.\\nMình cũng đã đi khám bác sĩ rồi, họ bảo không có vấn đề gì cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2453 = "「Ừm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ただ、わたし臆病だから。ちょっと怖いかな？　って、\nそういうとき、慎重にしてるだけなんです」
2246 = "「Chỉ là, mình hơi nhát gan một chút. Cảm giác hơi sợ một chút ấy mà,\\nNên những lúc như vậy, mình chỉ cẩn thận hơn thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば安心した」
2995 = "「Vậy à. Thế thì tôi yên tâm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、僕はお先に失礼する」
3023 = "「Vậy thì, tôi xin phép đi trước đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。いってらっしゃい。\nわたしもこれから市議会なんです」
2437 = "「A, vâng. Cậu đi nhé.\\nBây giờ mình cũng phải đến hội đồng thành phố đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば、夜にでも電話で報告しよう」
2998 = "「Vậy à, thế thì tối nay tôi sẽ gọi điện báo cáo cho cậu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2617 = "「Mình hiểu rồi.」"

# monologue
# JP: ほっとした息。\nほっとした声。
3424 = "Hơi thở nhẹ nhõm.\\nGiọng nói nhẹ nhõm."

# monologue
# JP: けれども――少しさみしげな。
3273 = "Thế nhưng――cũng có chút cô đơn."

# 【ポーレット】
# display as 波萊特
# JP: 「電話、楽しみに待ってますね」
2610 = "「Tôi sẽ mong chờ cuộc gọi của cậu nhé.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いや……先日は失礼しました」
2399 = "「Không ạ... Hôm trước cháu đã thất lễ rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とんでもないことです。\nこちらこそ、突然にお伺いして」
2931 = "「Không có gì đâu ạ.\\nNgược lại là tôi mới phải, đã đột ngột đến thăm cậu.」"

# monologue
# JP: 赤井宮司は、疲れが抜けたご様子だ。
3835 = "Trưởng tế Akai trông có vẻ đã hết mệt mỏi."

# monologue
# JP: おでこにはもちろん冷却シートの姿は無く、\nハチロクは、密やかに安堵の息を吐く。
3681 = "Trên trán ngài dĩ nhiên không còn miếng dán hạ sốt nữa,\\nHachiroku khẽ thở phào nhẹ nhõm."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「お話をされたい、とのことでしたが」
3032 = "「Tôi nghe nói cậu có chuyện muốn bàn bạc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。今日は、鉄道についてのご助言をいただきたく、\nお伺いさせていただきました」
2715 = "「Vâng ạ. Hôm nay, cháu ghé qua là để xin ngài lời khuyên về chuyện đường sắt ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「鉄道、ですか」
3044 = "「Đường sắt, sao?」"

# monologue
# JP: 単刀直入に切り出せば、\nゆっくりと、赤井宮司が振り返る。
3559 = "Khi tôi đi thẳng vào vấn đề,\\nTrưởng tế Akai chậm rãi quay người lại."

# monologue
# JP: その目線の先、部屋の奥、\n僕のとよく似た、革の鞄が置かれている。
3546 = "Nơi ánh mắt ngài hướng đến, sâu trong góc phòng,\\ncó một chiếc cặp da trông rất giống của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄にお勤めだったと人に聞きましたが――\n宮司は、機関士でいらっしゃったのですか？」
2620 = "「Cháu có nghe người ta nói rằng ngài từng làm việc cho Cựu Đường sắt Đế quốc――\\nThưa ngài, có phải ngài từng là một kỹ sư đầu máy không ạ?」"

# monologue
# JP: たずねた途端、宮司の表情が柔らかみを増す。\n「わかってらっしゃる」――顔が、言葉を発してる。
3792 = "Ngay khi tôi vừa hỏi, vẻ mặt của ngài Trưởng tế liền dịu đi.\\n\"Ra là cậu cũng am hiểu đấy\"――gương mặt ngài như đang nói lên điều đó."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「機関士も経験しましたが、最後は運転士でした。\n[こくら,1]粉蔵の試験区間で、\x%l電車;#00ffc040;電車%l;#;運転を」
2580 = "「Tôi cũng có kinh nghiệm làm kỹ sư đầu máy, nhưng cuối cùng thì là lái tàu.\\nTại khu thử nghiệm Kuranokura, tôi đã lái \\x%l...;#00ffc040;tàu điện%l;#;.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2714 = "「Ồ!」"

# monologue
# JP: ハチロクの素直な感嘆の声。
3305 = "Giọng Hachiroku không giấu nổi vẻ thán phục."

# 【ハチロク】
# display as 八六
# JP: 「わたくし、存じ上げませんでした。\n[こくら,1]粉蔵の機関区でも、\x%l電車;#00ffc040;電車%l;#;の運用を試験していたのですね」
3004 = "「Tôi không hề hay biết.\\nVậy là ở khu đầu máy Konakura, họ cũng đã thử nghiệm vận hành \\x%lđàu điện;#00ffc040;tàu điện%l;#; ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ。[ホッカイドウ,2]北開道、[シコク,1]四國、[キュウシュウ,1]九洲――[ヒノモト,2]日ノ本全土で。\n帝鉄は\x%l電車;#00ffc040;電車%l;#;こそを復活の切り札にと、必死でした」
2693 = "「Vâng. Ở Hokkaidou, Shikoku, Kyuushuu... trên khắp toàn cõi Hinomoto.\\nTeitetsu đã dốc toàn lực, coi \\x%lđàu điện;#00ffc040;tàu điện%l;#; chính là con át chủ bài để hồi sinh.」"

# monologue
# JP: 元帝鉄のレイルロオドのハチロクに、\n赤井宮司は、まるで１から教えるような話しぶりだ。
3834 = "Thầy tư tế Akai nói chuyện với Hachiroku, một Railord của cựu Teitetsu,\\nvới giọng điệu như thể đang dạy lại cô từ đầu."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「最晩年の帝鉄は、経営資源の全てを電化に投資し、\nしかしリターンを得ることが出来ず、滅んだのです」
2546 = "「Vào những năm cuối cùng, Teitetsu đã đầu tư toàn bộ tài nguyên của mình vào việc điện khí hóa,\\nnhưng không thể thu lại lợi nhuận, và rồi sụp đổ.」"

# 【ハチロク】
# display as 八六
# JP: 「そうでしたか……」
2712 = "「Ra là vậy ạ...」"

# monologue
# JP: 感慨深げな長嘆息。\nそれで、僕もようやく気づく。
3309 = "Một tiếng thở dài đầy xúc cảm.\\nNhờ vậy, tôi cuối cùng cũng nhận ra."

# monologue
# JP: 帝鉄の末期を知れどハチロクは、事故で眠ったそのために、\n最晩年の姿を恐らく、知らないのだと。
3321 = "Rằng dù Hachiroku biết về thời kỳ suy tàn của Teitetsu, nhưng vì đã ngủ say do tai nạn,\\nnên có lẽ cô ấy không biết được bộ dạng của nó vào những năm cuối cùng."

# 【ハチロク】
# display as 八六
# JP: 「しかし、その投資は完全なる徒花とは終わらず、\n形を変えて、のちの[ひろしま,1]廣島で花開いたのですね？」
2248 = "「Tuy nhiên, khoản đầu tư đó đã không hoàn toàn là công cốc,\\nmà đã thay đổi hình dạng và sau này đơm hoa kết trái ở Hiroshima, phải không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ヒロデン,5]廣島電気鉄道のことですか。\nなるほど――そう考えれば、我々も多少は報われますか」
2689 = "「Cô đang nói về tuyến Đường sắt Điện Hiroshima sao?\\nRa vậy... nếu nghĩ theo hướng đó, thì có lẽ chúng tôi cũng được đền đáp phần nào.」"

# monologue
# JP: しみじみと、赤井宮司は目を閉じる。
3830 = "Thầy tư tế Akai trầm ngâm nhắm mắt lại."

# monologue
# JP: 旧帝鉄の残影を、\nまぶたの裏に、まるで描いているかのように。
3487 = "Như thể đang vẽ lại tàn ảnh của cựu Teitetsu\\nphía sau mí mắt của mình."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「と。自己紹介もせずに昔話を失礼しました。\n私はこの[やしろ]社の宮司、赤井[きよはる,1]清春です」
2401 = "「À. Thật thất lễ khi cứ mãi kể chuyện xưa mà chưa tự giới thiệu.\\nTôi là tư tế của ngôi đền này, Akai Kiyoharu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、こちらこそいきなりの失礼を。\n僕は――」
2591 = "「A, không, chính cháu mới là người thất lễ vì đã đường đột đến đây.\\nCháu là...」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「存じてますよ。右田双鉄君」
2619 = "「Tôi biết chứ. Cậu Migita Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
3068 = "「！？」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そしてお連れは、8620形のトップナンバーレイルロオド。\nつまりは、“ハチロク”さんで間違いないですか？」
2898 = "「Và người đi cùng cậu là Railord mang số hiệu đầu tiên của dòng 8620.\\nNói cách khác, là cô “Hachiroku”, tôi nói có đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「ご慧眼恐れいります、赤井運転士」
2961 = "「Ngài thật tinh tường, Lái tàu Akai」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「元・運転士ですよ。今は、ただの宮司です」
2672 = "「Là cựu lái tàu thôi. Giờ tôi chỉ là một thầy đền bình thường」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、赤井宮司」
2503 = "「Đã rõ, Thầy đền Akai」"

# monologue
# JP: 当然のように宮司の言葉を受けるハチロク。\nだが、僕は――疑問の方が先に立つ。
3307 = "Hachiroku tiếp nhận lời của thầy đền một cách hiển nhiên.\\nNhưng tôi thì――lại có một thắc mắc."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と、ハチロクのことまでご存じいただいていたのは\n一体何故です？」
2571 = "「Làm thế nào mà ngài lại biết về cả cháu và Hachiroku\\nvậy ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ハチロクさんは、[ハチロクニイマル,3]8620形蒸気機関車のレイルロオドです。\nそして、8620形は、非常に数多く作られたのですよ」
2335 = "「Cô Hachiroku là Railord của đầu máy hơi nước loại 8620.\\nVà loại 8620 đã được sản xuất với số lượng rất lớn đấy」"

# 【ハチロク】
# display as 八六
# JP: 「『鉄路あるところ、ハチロクの機影見えざるは無し』\nとまで讃えられたものです」
2811 = "「Người ta còn ca ngợi rằng,\\n『Nơi nào có đường sắt, nơi đó có bóng dáng Hachiroku』」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク？　8620形の総称、いや愛称というべきか？\nそれも、お前と同じハチロクなのか？」
2339 = "「Hachiroku? Là tên gọi chung cho loại 8620, hay phải nói là biệt danh nhỉ?\\nĐó cũng là Hachiroku, giống như cậu sao?」"

# 【ハチロク】
# display as 八六
# JP: 「そうです。レイルロオド・ハチロクは、\nトップナンバー機であるわたくしのみの呼称です」
2784 = "「Đúng vậy. Railord Hachiroku là danh xưng\\ndành riêng cho tôi, đầu máy mang số hiệu đầu tiên」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2996 = "「這樣啊」" 

# monologue
# JP: だいぶ話が見えてきた。
3538 = "Tôi bắt đầu hiểu ra vấn đề rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「粉蔵の機関区にも、[ハチロクニイマル,3]8620形は配備されていた。ゆえ、\n8620形レイルロオドの姿を赤井宮司は見知っていた」
2530 = "「Ở khu đầu máy Konkura cũng có biên chế loại 8620. Do đó,\\nThầy đền Akai đã biết trước dáng vẻ của một Railord loại 8620」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「姿、というか共通した特徴ですな。\nそれ以外の個体差は、かなりありますので」
2485 = "「Dáng vẻ, hay nói đúng hơn là những đặc điểm chung thôi.\\nNgoài ra thì vẫn có khá nhiều khác biệt cá nhân đấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2352 = "「Ra là vậy」"

# monologue
# JP: そこまでの事実は確定できた。\nならば、その先は一直線だ。
3471 = "Sự thật đến đó đã được xác định.\\nVậy thì, phần còn lại rất đơn giản."

# 【双鉄】
# display as 雙鐵
# JP: 「その上でハチロクには、トップナンバー機たる\n目印か何かがあるのですね？」
2900 = "「Vậy thì Hachiroku hẳn phải có một dấu hiệu nào đó\\nđể nhận biết là đầu máy số hiệu đầu tiên, đúng không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「一般的な一人称を使うのです。\nトップナンバーレイルロオドは」
3063 = "「Các Railord Số Hiệu Đầu\\nphải sử dụng đại từ nhân xưng thông thường ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一般的な一人称？」
2723 = "「Đại từ nhân xưng thông thường?」"

# monologue
# JP: ハチロクは、自らのことを“わたくし”と呼ぶ。
3314 = "Hachiroku tự xưng là “tôi”."

# monologue
# JP: 僕が他に知る唯一のレイルロオドのれいなは、\n自らのことを、確か、“れいな”と――ああ！
3884 = "Reina, Railord duy nhất khác mà mình biết,\\nhình như tự xưng là “Reina” thì phải―― A!"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。トップナンバー以外のレイルロオドは、\n自らのことを、固有の機体愛称で呼ぶのですね？」
2354 = "「Ra là vậy. Những Railord không phải Số Hiệu Đầu,\\nsẽ tự gọi mình bằng biệt danh riêng, có phải không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そのとおりです」
2698 = "「Đúng vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、お話を聞く限り、例えばハチロクの妹たちは、\nかなりの数がいそうに思えますが……」
2249 = "「Nhưng theo như cô nói, ví dụ như các em gái của Hachiroku,\\ndường như có số lượng rất đông...」"

# 【ハチロク】
# display as 八六
# JP: 「直系の妹でしたら６７１人です」
2829 = "「Nếu là các em gái cùng dòng trực hệ thì có 671 người ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ろっぴゃくななじゅういち」
2340 = "「Sáu trăm bảy mươi mốt.」"

# monologue
# JP: ハチロクも合わせれば総勢672人か。\nそれは、さぞかし華やかだろうが――
3336 = "Tính cả Hachiroku nữa là tổng cộng 672 người à.\\nChắc hẳn là một cảnh tượng lộng lẫy lắm, nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「それだけのレイルロオドに別々の愛称とは……\nつける方も、困ったりせぬものですか？」
2922 = "「Đặt biệt danh riêng cho từng ấy Railord...\\nNgười đặt tên không thấy phiền phức sao ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「一箇所に集まるものでも、\n[いっとき,1]一時に全員が可動していたわけでもございませんし――」
2813 = "「Họ không tập trung ở cùng một nơi,\\ncũng không phải tất cả đều hoạt động cùng một lúc ạ――」"

# monologue
# JP: 妹たちのことでも思い出したのだろうか、\nハチロクのまなざしが柔らかくなる。
3258 = "Có lẽ cô ấy đang nhớ về các em gái của mình,\\nánh mắt của Hachiroku trở nên dịu dàng."

# 【ハチロク】
# display as 八六
# JP: 「トップナンバー以降のレイルロオド愛称は、\nその機関区によってつけかたが大きく異なりますから」
3047 = "「Biệt danh của các Railord sau Số Hiệu Đầu,\\ncách đặt tên sẽ rất khác nhau tùy thuộc vào từng phân khu đầu máy ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「粉蔵では相棒の機関士が名づけて登録をしていましたね。\n[ヤエ,1]八重、[リッカ,1]六花、[フタバ,1]二葉など、８６２の何れかを[ハチロク,3]8620形では」
2768 = "「Ở Kokura, các kỹ sư lái tàu cộng sự đã đặt tên và đăng ký cho họ ạ.\\nVới dòng 8620, họ sẽ dùng một trong các chữ số của 862 để đặt tên, như là Yae, Rikka, Futaba.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、雅ですこと。[ていおう,1]帝央では、\nハロ１号、ハロ２号の連番呼称でしたのに」
2989 = "「Chà, thật là tao nhã. Ở Teiō,\\nchúng chỉ được gọi theo số thứ tự là Halo số 1, Halo số 2 thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはあまりにも無味乾燥だな――\nではなく」
3000 = "「Cách đó thì đúng là khô khan thật――\\nà không, không phải chuyện đó.」"

# monologue
# JP: 危うい。\n話が盛大に脱線――ではなく、寄り道していた。
3231 = "Nguy thật.\\nCâu chuyện suýt nữa đã trật đường ray một cách ngoạn mục―― không, chỉ là đi đường vòng một chút thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕のことをご存知いただいていたのは、それでは？」
3021 = "「Vậy ra đó là cách ngài biết đến cháu ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「来てくださったではないですか。\nご一家でご参拝に」
2304 = "「Chẳng phải cậu đã đến đây rồi sao?\\nCả gia đình đã cùng tới viếng đền.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは――記憶しておりますが」
2986 = "「Chuyện đó thì―― cháu có nhớ, nhưng mà...」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「その折、頼まれたのです。右田さん――\nあなたの祖父の、汰斗さんから」
3026 = "「Vào lúc đó, tôi đã được nhờ vả. Bởi Migita-san――\\nông của cậu, Taito-san.」"

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんが……僕のことを？」
2781 = "「Taito-san... đã nói về cháu sao?」"

# monologue
# JP: 赤井宮司は静かに頷き、僕の目を見る。
3838 = "Trưởng tư tế Akai lặng lẽ gật đầu, rồi nhìn vào mắt tôi."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「『この子はもう一生分の不幸を負った。\nこの先は幸せだけを得られるように見守ってくれ』、と」
1810 = "「Ông ấy nói: 'Đứa trẻ này đã gánh chịu đủ bất hạnh cho cả một đời rồi.\\nHãy trông chừng nó để từ nay về sau nó sẽ chỉ có được hạnh phúc thôi'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――そうだったんですか」
1798 = "「――Thì ra là vậy ạ.」"

# monologue
# JP: 幸せが何で、それを得るのはどうすればいいのか、\n僕には全くわからない。
3893 = "Hạnh phúc là gì, và làm sao để có được nó,\\ntôi hoàn toàn không biết."

# monologue
# JP: けれども遺された言葉を伝えてもらえたことが、\nそれだけでもう、幸せであるようにも素直に思える。
3271 = "Thế nhưng, chỉ riêng việc được nghe lại những lời ông để lại,\\ntôi đã có thể thành thật cảm thấy rằng, đó dường như cũng là một niềm hạnh phúc."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1811 = "「…………」" 

# monologue
# JP: 感謝を、伝えたいのだけれど。\n言葉を上手く見つけられない。
3543 = "Tôi muốn bày tỏ lòng biết ơn, nhưng lại\\nchẳng thể tìm được lời nào cho phải."

# monologue
# JP: 赤井宮司はごく穏やかに微笑んで、\nハチロクを見て、また僕を見る。
3445 = "Trưởng tư tế Akai mỉm cười thật hiền hậu,\\nnhìn Hachiroku, rồi lại nhìn tôi."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「さて、鉄道の話でしたね。\nご助言ということでしたが、具体的には、何についてを」
2495 = "「À, là chuyện về đường sắt nhỉ.\\nCậu nói muốn xin lời khuyên, nhưng cụ thể là về vấn đề gì?」"

# monologue
# JP: 背筋が伸びる。
3551 = "Lưng tôi bất giác thẳng lại."

# monologue
# JP: 授けていただけた機会なら、\nそれを活かさねば恩知らずになる。
3583 = "Nếu đã được ban cho cơ hội này,\\nkhông tận dụng nó thì thật là vô ơn."

# 【双鉄】
# display as 雙鐵
# JP: 「蒸気機関車の修復について、お伺いできればと。\n僕達はそれを観光復権のきっかけにしたいと考えてます」
2590 = "「Cháu muốn hỏi về việc phục chế đầu máy hơi nước ạ.\\nChúng cháu đang định dùng nó làm khởi đầu để phục hưng du lịch.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ＳＬで観光復権ですか」
3056 = "「Dùng tàu hơi nước để phục hưng du lịch sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はじめは、ぼんやりと出来そうに思っていました。が、\nクマ川下りを経験し、容易ではないとも理解しました」
2576 = "「Ban đầu, cháu đã nghĩ chuyện đó có vẻ khả thi. Nhưng,\\nsau khi trải nghiệm chuyến đi trên sông Kuma, cháu đã hiểu rằng nó không hề dễ dàng.」"

# monologue
# JP: 蓑笠老人が見せようとした、“今の御一夜観光の実態”。\n――収益不足による人材流失と、空洞化が産む悪循環と。
3758 = "Điều mà ông lão nón lá muốn cho tôi thấy, “thực trạng của ngành du lịch Ohitoyo hiện tại”.\\n――Vòng luẩn quẩn do thiếu hụt lợi nhuận dẫn đến chảy máu nhân lực, và sự trống rỗng mà nó gây ra."

# monologue
# JP: 見たまま感じたままを、素直に、\n自分の言葉になおして伝える。
3541 = "Tôi thành thật truyền đạt lại những gì mình đã thấy, đã cảm nhận,\\nbằng chính lời lẽ của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「ですから、今は考えをもう一歩進めました。\n8620の修復自体を、ある種の見本としていきたい、と」
2636 = "「Vì vậy, giờ cháu đã suy nghĩ sâu hơn một bước.\\nCháu muốn biến chính việc phục chế 8620 thành một hình mẫu.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「見本」
2858 = "「Hình mẫu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、モデルケースといってもいいかもしれません。\n復活は無理ではないと示し、ひとつの旗印としたい」
2633 = "「Hoặc có thể gọi là một trường hợp kiểu mẫu ạ.\\nCháu muốn chứng minh rằng việc phục hưng không phải là bất khả thi, và biến nó thành một ngọn cờ đầu.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「無理ではない、と、どのように示されますか？」
2257 = "「Cậu sẽ chứng minh rằng 'không phải là bất khả thi' bằng cách nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、8620の復活と走行をもってです。\nそうするために必要な作業を、できるだけ御一夜でと」
2818 = "「Dĩ nhiên là bằng việc phục sinh và cho 8620 chạy trở lại ạ.\\nĐể làm được điều đó, chúng cháu muốn thực hiện các công đoạn cần thiết tại Ohitoyo nhiều nhất có thể.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「御一夜に、\n人と技術とを集める、というお考えでしょうか」
2937 = "「Ý cậu là,\\ntập hợp nhân lực và kỹ thuật về Ohitoyo sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのようにできればと思っています。\nそのため、今は協力者を探している段階です」
2906 = "「Vâng, chúng cháu đang hy vọng có thể làm được như vậy.\\nVì thế, hiện tại chúng cháu đang trong giai đoạn tìm kiếm người hợp tác.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですか」
# 2996 = "「這樣啊」" 

# monologue
# JP: 小さく頷き、\n赤井宮司は今度はハチロクへと向きなおる。
3837 = "Gật đầu nhẹ,\nAkai Guuji lần này quay sang Hachiroku."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ハチロクニイマル,3]8620修復のための計画は？\nどの程度まで進んでいますか？」
3033 = "「Kế hoạch phục hồi 8620 thế nào rồi?\nĐã tiến triển đến đâu rồi?」"

# 【ハチロク】
# display as 八六
# JP: 「それは――その」
3009 = "「Chuyện đó――là」"

# 【双鉄】
# display as 雙鐵
# JP: 「現状版の、要修復事項のリストが、これです」
2993 = "「Đây là danh sách các hạng mục cần sửa chữa ở tình trạng hiện tại ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「拝見しましょう」
2616 = "「Để tôi xem nào.」"

# monologue
# JP: 赤井宮司の視線がリストの上へと落ちる。\nハチロクも緊張するのか、唇をきゅっと引き結んでいる。
3833 = "Ánh mắt của Akai Guuji dán vào danh sách.\nCó lẽ vì căng thẳng, Hachiroku mím chặt môi."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「……いくつか、基本的なデータが抜けているようですが、\nそれは――」
1842 = "「...Có vẻ như thiếu một vài dữ liệu cơ bản,\nchuyện này là――」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしの、機能低下に伴うものです。\nデータを上手く引き出せていないように思えます」
2687 = "「Đó là do chức năng của tôi bị suy giảm ạ.\nDường như tôi không thể truy xuất dữ liệu một cách trơn tru được.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それは」
2992 = "「Chuyện đó là...」"

# 【ハチロク】
# display as 八六
# JP: 「おそらく、事故の影響によるものではないかと」
2569 = "「Có lẽ, là do ảnh hưởng từ vụ tai nạn ạ.」"

# monologue
# JP: 赤井宮司の言葉を遮るような、ハチロクの声。\nしかし宮司は、それさえ穏やかに受け入れる。
3313 = "Giọng Hachiroku như cắt ngang lời của Akai Guuji.\nThế nhưng, vị trưởng tư tế vẫn bình thản chấp nhận điều đó."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ハチロク,3]8620形トップナンバー機……\nあの事故の、ですか」
2718 = "「Cỗ máy đầu tiên của dòng 8620...\nLà của 'vụ tai nạn đó' sao?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――そのように考えております」
2574 = "「Tôi――cũng nghĩ như vậy ạ.」"

# monologue
# JP: 遠く、粉蔵の機関区づとめだったという赤井宮司。\nその人が、“あの事故”として承知している。
3589 = "Akai Guuji, người từng làm việc tại khu đầu máy Kuranokura xa xôi.\nNgay cả ngài ấy cũng biết đến nó với cái tên \"vụ tai nạn đó\"."

# monologue
# JP: ……ハチロクの経験した事故もまた、\nあるいは帝鉄史に残るほど、苛烈なものであったのだろう。
1777 = "...Vụ tai nạn mà Hachiroku đã trải qua,\ncó lẽ cũng thảm khốc đến mức được ghi lại trong lịch sử của Teitetsu."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ふぅ」
2396 = "「Phù.」"

# monologue
# JP: とんとんと、几帳面にリストの書類をまとめなおし、\n僕に手渡し戻してくれる。
3831 = "Cộc cộc, ngài ấy tỉ mỉ sắp xếp lại chồng tài liệu,\n rồi đưa trả lại cho tôi."

# monologue
# JP: そうして赤井宮司はじっと、\n僕を、ハチロクを順々に、見据える。
3253 = "Sau đó, Trưởng tư tế Akai nhìn chăm chú,\n lần lượt nhìn thẳng vào tôi, rồi đến Hachiroku."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご助言を、させていただけば良いのですか？」
2273 = "「Vậy là, cậu muốn tôi đưa ra lời khuyên sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、そう願えればと」
2701 = "「Vâng, con rất mong là như vậy.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「未来のことなどわかりませんし、\nあなたにとっての正解が、幸せが何かもわかりません」
2613 = "「Ta không thể biết trước được tương lai,\n cũng không biết đâu là câu trả lời đúng, đâu là hạnh phúc dành cho cậu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2606 = "「Vâng ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「その上で行う助言ですから、恐らく何も示しはしません。\nその程度でもよろしいでしょうか？」
2663 = "「Vì là lời khuyên được đưa ra dựa trên những điều đó, nên có lẽ nó sẽ chẳng chỉ ra được điều gì cụ thể.\n Chỉ đến mức đó thôi, liệu có được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「むしろ、望むところです」
2999 = "「Ngược lại, đó mới là điều con mong muốn.」"

# monologue
# JP: ポーレットが教えてくれたように、\n赤井宮司は影響を与えたがらない人物らしい。
3390 = "Đúng như lời Paulette đã nói,\n Trưởng tư tế Akai dường như là một người không muốn gây ảnh hưởng đến người khác."

# monologue
# JP: が、僕とても、\n自分の為すべき決断を、誰に委ねたいとも思わない。
3245 = "Nhưng, bản thân tôi cũng không hề muốn\n phó thác quyết định mà mình phải tự đưa ra cho bất kỳ ai."

# 【双鉄】
# display as 雙鐵
# JP: 「いただいたご助言を判断の材料とし、\n自分自身で決断したいと思っています」
2609 = "「Con sẽ dùng những lời khuyên của ngài làm tư liệu để phán đoán,\n và muốn tự mình đưa ra quyết định cuối cùng.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですか。では、まずはハチロクさんについて」
2683 = "「Vậy sao. Vậy thì, trước hết là về cô Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2500 = "「Vâng ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご不調とのこと。\n登呂流湯のご主人に相談されると良いかと思います」
2758 = "「Ta nghe nói cô ấy đang không được khỏe.\n Ta nghĩ cậu nên đến hỏi ý kiến chủ nhân của Tororo-yu thì hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「登呂流湯、の？」
2821 = "「Ở Tororyuu-tou, ạ?」"

# monologue
# JP: 思いもかけぬ名前を聞かされ、ハチロクと顔を見合わせる。\nハチロクの口は、ぽかんと開いてしまっている。
3746 = "Nghe thấy một cái tên không thể ngờ tới, tôi và Hachiroku nhìn nhau.\\nMiệng Hachiroku đang há hốc vì kinh ngạc."

# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯のご主人というと、\nあの……ご年配のご婦人ですか？」
2822 = "「Nếu nói là chủ nhân của Tororyuu-tou,\\nliệu có phải là... vị phu nhân lớn tuổi đó không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「あの方は、一流のレイルロオド職人です。現役の。\n今も、れいなさんを定期的に診てらっしゃいますし――」
2489 = "「Vị đó là một nghệ nhân Railord hạng nhất. Vẫn còn tại vị.\\nBây giờ người đó vẫn thường xuyên kiểm tra cho Reina-san――」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2835 = "「Ôi chà.」"

# monologue
# JP: ハチロクの驚きを見て、\nもったいぶるように、赤井宮司はひといきを置く。
3829 = "Thấy Hachiroku kinh ngạc,\\nnhư thể đang cố tình tỏ ra quan trọng, Trưởng đền Akai dừng lại một nhịp."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「九洲最後の……最新のトップナンバー・レイルロオドを\n手がけた方でもあります。腕に間違いはありません」
2264 = "「Bà ấy cũng là người đã chế tạo ra Railord số hiệu hàng đầu cuối cùng... và mới nhất của Kyushu.\\nTay nghề của bà ấy không có gì phải bàn cãi cả.」"

# 【ハチロク】
# display as 八六
# JP: 「トップナンバー機のご製造まで！\nああ、そんな素晴らしい方がまさかこんな近くに」
2857 = "「Đến cả việc chế tạo một đầu máy số hiệu hàng đầu cũng!\\nÔi, không ngờ một người tuyệt vời như vậy lại ở gần đây đến thế.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「エアロ＝クラフテック社からの好条件での勧誘も、\n鉄道への愛ゆえ、断り続けてらした方です」
2855 = "「Bà ấy cũng là người đã liên tục từ chối những lời mời với điều kiện hậu hĩnh từ công ty Aero-Craftech,\\ntất cả cũng vì tình yêu dành cho đường sắt.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、是非！\n是非ともわたくし、見ていただきます」
2661 = "「Nếu vậy thì, nhất định ạ!\\nXin hãy để tôi được người đó kiểm tra.」"

# monologue
# JP: ならば安心というように、\n赤井宮司は穏やかな目でハチロクを見る。
3832 = "Như thể đã yên tâm,\\nTrưởng đền Akai nhìn Hachiroku với ánh mắt hiền hậu."

# monologue
# JP: そして一転――\n僕へと向く目は、厳しい光を宿している。
3670 = "Và rồi đột ngột――\\nÁnh mắt ông ấy hướng về phía tôi lại ẩn chứa một tia nhìn nghiêm khắc."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「次に、[ハチロクニイマル,3]8620改修についてですが」
2652 = "「Tiếp theo, về việc cải tạo 8620.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2933 = "「Vâng ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「順番が、大きく違うように思います」
2623 = "「Tôi nghĩ trình tự đã sai lệch rất nhiều.」"

# monologue
# JP: 長い沈黙。\n僕は、答えを発せない。
3521 = "Một sự im lặng kéo dài.\\nTôi không thể đưa ra câu trả lời."

# monologue
# JP: やがて深く息が吐かれて、\nやむなしとでもいわんばかりに、宮司が重そうに口を開く。
3444 = "Lát sau, một tiếng thở dài não nề vang lên,\\nnhư thể muốn nói rằng chẳng còn cách nào khác, vị trưởng đền nặng nề cất lời."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「まっさきに集めるべきは、協力者より――\nお金かと」
3062 = "「Thứ cần tập hợp đầu tiên, không phải là người hợp tác――\\nmà là tiền bạc thì phải.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2419 = "「Hừm...」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
3053 = "「Ngài Soutetsu?」"

# monologue
# JP: 僕の逡巡を悟ってか、\nハチロクは、いたわるような声をだす。
3268 = "Có lẽ đã nhận ra sự do dự của tôi,\\nHachiroku cất lên một giọng đầy quan tâm."

# 【ハチロク】
# display as 八六
# JP: 「随分と現実的な方でしたね、赤井宮司は」
2783 = "「Trưởng đền Akai quả là một người thực tế nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「現実的……だな。\nそれ故、自分の見込みの甘さを思い知らされた」
2848 = "「Thực tế... thật đấy.\\nCũng vì thế mà tôi nhận ra mình đã đánh giá mọi chuyện quá dễ dàng.」"

# monologue
# JP: 帝鉄の末路を知る赤井宮司。\n衰退に、まさに晒されている御一夜の人たち。
3836 = "Trưởng đền Akai, người biết rõ kết cục của Teitetsu.\\nNgười dân Ohitoyo, những người đang phải đối mặt với sự suy tàn."

# monologue
# JP: 帝都帰りの気楽な僕の目とは、\n見えているもの、見るべきものが、まるで違う。
3388 = "So với con mắt vô tư của tôi, một kẻ vừa từ Đế Đô trở về,\\nnhững gì họ thấy, và những gì họ phải thấy, hoàn toàn khác biệt."

# 【双鉄】
# display as 雙鐵
# JP: 「理想で飯が食えるのならば、鉄道も川下りも衰退しない。\nまず示すべきは、『飯を食えるという事実』か」
2909 = "「Nếu lý tưởng có thể nuôi sống con người, thì cả đường sắt lẫn thuyền du lịch trên sông đã không suy tàn.\\nĐiều đầu tiên cần chứng minh, có lẽ là 'sự thật rằng nó có thể nuôi sống người ta'.」"

# monologue
# JP: 8620の改修には、当然、かなりの時間がかかる。
3280 = "Việc sửa chữa 8620, tất nhiên, sẽ tốn một khoảng thời gian đáng kể."

# monologue
# JP: ボランティアに、集まってくれる人がいたとして、\n熱意だけでは……恐らく半月も保たないだろう。
3364 = "Kể cả khi có người tập hợp lại để làm tình nguyện,\\nchỉ với lòng nhiệt huyết... thì có lẽ cũng không trụ được nửa tháng."

# 【双鉄】
# display as 雙鐵
# JP: 「協力者を集めるより先、\n作業が始まった場合にそれを維持できるだけの準備を」
2773 = "「Trước khi tập hợp người hợp tác,\\ncần chuẩn bị đủ để có thể duy trì công việc một khi nó bắt đầu.」"

# 【ハチロク】
# display as 八六
# JP: 「そして、準備とはおおむね、金策。\nおっしゃられること、ごもっともではあるのですけど」
2637 = "「Và, sự chuẩn bị đó, phần lớn chính là gây quỹ.\\nNhững gì ngài ấy nói vô cùng có lý, nhưng mà...」"

# monologue
# JP: ハチロクはハチロクで、\n僕とは違った部分に引っかかっている。
3452 = "Hachiroku, về phần mình,\\nlại đang vướng mắc ở một điểm khác với tôi."

# monologue
# JP: 赤井宮司がくれた助言の中にあった、\n『銀行への相談』が、まず間違いなくそれだろう。
3332 = "Trong số những lời khuyên mà Trưởng tế Akai đã cho,\\n'bàn bạc với ngân hàng' gần như chắc chắn là chuyện đó."

# 【双鉄】
# display as 雙鐵
# JP: 「……案ずるより産むが易し、か」
1849 = "「...Lo bò trắng răng, nhỉ.」"

# monologue
# JP: どの選択肢も気がすすまない。\nそうした時には、最も早く取り掛かれるものを選ぶ。
3668 = "Chẳng có lựa chọn nào khiến tôi hứng thú cả.\\nNhững lúc như thế này, tôi sẽ chọn việc có thể bắt đầu nhanh nhất."

# monologue
# JP: 今までやってきた方法を、今回も取ることにする。
3530 = "Lần này, tôi cũng sẽ làm theo cách mà mình vẫn luôn làm."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。蔵にむかうぞ。\nまずは、真闇姉に相談してみよう」
2333 = "「Hachiroku. Chúng ta đến nhà kho thôi.\\nTrước hết, hãy thử bàn với chị Makura xem sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様がそれでよろしいのでしたら、\nハチロクはお供いたします」
2499 = "「Vâng. Nếu ngài Soutetsu thấy như vậy là được,\\nthì Hachiroku xin được đi cùng ngài.」"

# monologue
# JP: ……それで良いのか。\n自分でもどうにも判断できず、だから無言で蔵へと向かう。
1780 = "...Như vậy có ổn không đây.\\nChính tôi cũng không thể tự mình phán đoán, nên đành im lặng đi về phía nhà kho."

# 【真闇】
# display as 真闇
# JP: 「あら、双ちゃんにハチロクちゃん。\n[じょうぞうぐら,2]醸造蔵に来るとは、めずらしかとねぇ」
2404 = "「Ôi chà, Sou-chan và Hachiroku-chan.\\nHai đứa đến xưởng rượu, đúng là chuyện hiếm có đó nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に、相談したいことがあってきた」
2592 = "「Em đến đây vì có chuyện muốn bàn với chị Makura.」"

# 【真闇】
# display as 真闇
# JP: 「相談ごと？　なら、居間にあがると？」
2734 = "「Chuyện cần bàn à? Vậy thì, vào phòng khách nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。ここで――ここの方がいい」
2234 = "「Không ạ. Ở đây... ở đây thì tốt hơn.」"

# monologue
# JP: 時間を置けば、どんどん話しづらくなる。\nそれに丁度、日々姫の姿も見当たらない。
3574 = "Càng để lâu, sẽ càng khó nói.\\nHơn nữa, cũng vừa hay không thấy bóng dáng Hibiki đâu cả."

# 【真闇】
# display as 真闇
# JP: 「なんねぇ、おっかない顔して」
2560 = "「Sao lại làm cái vẻ mặt đáng sợ thế kia.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今、ポーレットたちと計画していることがある」
2612 = "「Hiện tại, em đang có một kế hoạch với Paulette và mọi người.」"

# monologue
# JP: 8620発見のこと、改修計画のこと。\n蓑笠老人、凪とふかみ、赤井宮司から教わったこと。
3542 = "Chuyện tìm thấy 8620, chuyện về kế hoạch sửa chữa.\\nNhững điều tôi học được từ lão nhân Minokasa, Nagi và Fukami, và từ Trưởng đền Akai."

# monologue
# JP: できるかぎりに短くまとめて伝えれば、\nただそれだけで真闇姉は、僕の言葉を先取りしてくる。
3344 = "Tôi cố gắng tóm tắt và kể lại một cách ngắn gọn nhất có thể,\\nthế nhưng chỉ với từng đó thôi, chị Mayami đã đoán trước được lời tôi định nói."

# 【真闇】
# display as 真闇
# JP: 「そんなら、双ちゃんは経営資源が欲しいんね？\n右田に頼らず、双ちゃんだけで賄える資源が」
2267 = "「Vậy thì, Sou-chan đang cần nguồn lực kinh doanh nhỉ?\\nNguồn lực mà em có thể tự mình xoay sở, không cần dựa vào nhà Migita ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2420 = "「Ư, ừm...」"

# monologue
# JP: だからだ。\nだから真闇姉には、できれば相談したくなかった。
3608 = "Chính vì vậy đó.\\nChính vì vậy mà nếu có thể, tôi đã không muốn bàn bạc với chị Mayami."

# monologue
# JP: この人に頼る楽さを覚えてしまえば、\n僕の努力する能力は、きっと腐ってしまうだろうから。
3432 = "Bởi vì nếu tôi quen với sự thoải mái khi dựa dẫm vào chị ấy,\\nthì năng lực cố gắng của tôi chắc chắn sẽ thui chột mất."

# 【ハチロク】
# display as 八六
# JP: 「経営資源とは何でしょう？」
2881 = "「Nguồn lực kinh doanh là gì ạ?」"

# monologue
# JP: 予想外の言葉過ぎたのだろう。
3862 = "Có lẽ đó là một cụm từ quá bất ngờ với em ấy."

# monologue
# JP: 思わずといった感じで疑問を漏らしたハチロクに、\n真闇姉はごくあっさりと問い返す。
3902 = "Trước câu hỏi buột miệng của Hachiroku,\\nchị Mayami hỏi lại một cách hết sức thản nhiên."

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんにとって、\nお金って、どぎゃんもんかね？」
2526 = "「Đối với Hachiroku-chan,\\ntiền bạc là thứ như thế nào nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「お金……お金は、固定費を削り、\n運賃収入を増やせば、黒字化していくものです」
3043 = "「Tiền bạc... Tiền bạc là thứ mà nếu cắt giảm chi phí cố định,\\nvà tăng doanh thu từ vé tàu, thì sẽ có thể sinh lời ạ.」"

# 【真闇】
# display as 真闇
# JP: 「うんうん」
2454 = "「Ừm ừm.」"

# 【ハチロク】
# display as 八六
# JP: 「しかし、それでも赤字な場合は、周辺事業で\nお金を稼がねばなりません」
2802 = "「Tuy nhiên, trong trường hợp vẫn bị thua lỗ, thì phải dùng các hoạt động kinh doanh phụ trợ\\nđể kiếm tiền ạ.」"

# 【真闇】
# display as 真闇
# JP: 「周辺事業」
2391 = "「Hoạt động kinh doanh phụ trợ.」"

# 【ハチロク】
# display as 八六
# JP: 「鉄道会社の広大な敷地面積と集客力を活かしての、\nホテル、観光、商業施設の運営などが代表的なものです」
2312 = "「Đó là việc tận dụng diện tích đất đai rộng lớn và khả năng thu hút khách hàng của công ty đường sắt,\\nđể vận hành các cơ sở như khách sạn, du lịch, và trung tâm thương mại là những ví dụ tiêu biểu ạ.」"

# monologue
# JP: 感心感心、\nそんな風情で真闇姉はおっとり頷く。
3702 = "Đáng khen, đáng khen thật,\\nChị Mayami điềm tĩnh gật đầu."

# 【真闇】
# display as 真闇
# JP: 「そんなら、鉄道会社の経営資源は、敷地面積、集客力、\n運賃収入をかせげる列車と人員、ということになると」
3028 = "「Vậy thì, tài sản kinh doanh của một công ty đường sắt sẽ là diện tích đất, khả năng thu hút khách hàng,\\nvà các đoàn tàu cùng nhân viên có thể kiếm ra doanh thu từ tiền vé, đúng chứ.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
2409 = "「Ừm.」"

# monologue
# JP: それで、ハチロクも理解する。
3865 = "Nhờ vậy, Hachiroku cũng đã hiểu ra."

# monologue
# JP: いや、最小手数でハチロクにきちんと理解できるよう、\n真闇姉がハチロクを導いたのだ。
3248 = "Không, đúng hơn là chị Mayami đã dẫn dắt Hachiroku để cô bé có thể hiểu được một cách tường tận\\nvới ít công sức nhất."

# 【ハチロク】
# display as 八六
# JP: 「経営資源とは、でしたら――\nそれを使えばお金を稼ぐことができる素材、でしょうか」
2638 = "「Tài sản kinh doanh, vậy thì――\\nđó là những nguyên liệu có thể dùng để kiếm ra tiền, phải không ạ?」"

# 【真闇】
# display as 真闇
# JP: 「そーねえ。普通に使えば普通に稼げて、\n上手に組み合わせれば、どーんと稼げる、そーゆー素材」
2678 = "「Đúng rồi đó. Nếu dùng một cách bình thường thì sẽ kiếm được tiền một cách bình thường,\\ncòn nếu kết hợp chúng một cách khéo léo, thì sẽ kiếm được cả một mớ, đó là loại nguyên liệu như vậy đó.」"

# 【ハチロク】
# display as 八六
# JP: 「普通と……上手な組み合わせですか？」
2446 = "「Bình thường và... kết hợp khéo léo ạ?」"

# 【真闇】
# display as 真闇
# JP: 「例えばねぇ、ハチロクちゃん。\n見てみぃ？　あの子」
2769 = "「Ví dụ nhé, Hachiroku-chan.\\nEm thấy cô bé kia không?」"

# monologue
# JP: 真闇姉が指差すその先、\n見覚えの無い従業員が、一生懸命に掃除をしている。
3706 = "Nơi chị Mayami chỉ tay,\\nmột nhân viên không quen mặt đang miệt mài dọn dẹp."

# 【真闇】
# display as 真闇
# JP: 「あの子の経営資源は、丁寧さと根気、\nよく動く手足と、注意深い目、ゆーとこなんよ」
2288 = "「Tài sản kinh doanh của cô bé đó là sự cẩn thận và tính kiên trì,\\nđôi chân tay lanh lẹ, và một đôi mắt tinh tường, kiểu vậy đó.」"

# 【ハチロク】
# display as 八六
# JP: 「すばらしい美徳だと思います」
2347 = "「Em nghĩ đó là những đức tính tuyệt vời ạ.」"

# 【真闇】
# display as 真闇
# JP: 「それを普通に使うて、\n掃除番の時給の750円を稼ぐたい」
2283 = "「Dùng những thứ đó một cách bình thường,\\nthì sẽ kiếm được 750 yên mỗi giờ cho công việc dọn dẹp.」"

# monologue
# JP: 掃除番は、\n蔵に入った新入りがまずまっさきに任される仕事。
3876 = "Công việc dọn dẹp là nhiệm vụ đầu tiên\\nmà những người mới vào xưởng rượu được giao phó."

# monologue
# JP: 短くて一年、長くて――ずっと。\nそこを越えねば、焼酎造りに携われない。
3716 = "Nhanh thì một năm, còn lâu thì――mãi mãi.\\nNếu không vượt qua được giai đoạn đó, họ sẽ không được tham gia vào việc sản xuất rượu shochu."

# 【真闇】
# display as 真闇
# JP: 「こっちの子は同じ資源に加えて、鼻の良さと経験を\n持ちよるけん、麹番のお仕事をしてもろうとるばい」
3001 = "「Cô bé này, ngoài những nguồn lực tương tự, còn có thêm một cái mũi thính và kinh nghiệm,\\nnên tụi chú giao cho cổ công việc của một Koji-ban đó.」"

# monologue
# JP: 麹やもろみの温度を一定に保つよう、\n微妙かつ繊細な調整を加え続ける仕事――
3257 = "Một công việc đòi hỏi phải liên tục thực hiện những điều chỉnh tinh vi và nhạy bén,\\nđể giữ cho nhiệt độ của koji và moromi luôn ổn định――"

# monologue
# JP: 麹番をしている女性には見覚えがある。\n僕が御一夜を発ったころには、まだ掃除番だった人だ。
3562 = "Tôi có quen mặt người phụ nữ đang làm Koji-ban.\\nLúc tôi rời khỏi Ohitoyo, cô ấy vẫn còn là người phụ trách dọn dẹp."

# 【真闇】
# display as 真闇
# JP: 「それが出来るようになると、\n時給は一気に1500円にあがるたい」
2904 = "「Một khi làm được việc đó,\\nlương theo giờ sẽ tăng vọt lên 1500 yên liền đó.」"

# 【ハチロク】
# display as 八六
# JP: 「お鼻の良さと経験とが、\nお給料を二倍に跳ね上げるのですか」
2345 = "「Một cái mũi thính và kinh nghiệm,\\ncó thể làm cho tiền lương tăng gấp đôi sao ạ?」"

# 【真闇】
# display as 真闇
# JP: 「で、あそこにいるおばちゃんは、今までのものに加え、\nアイディアいう経営資源を持っとるばい」
2800 = "「Rồi, còn cô ở đằng kia, ngoài những thứ vừa kể,\\ncô ấy còn sở hữu một nguồn lực kinh doanh gọi là 'ý tưởng' nữa đó.」"

# monologue
# JP: ここまで来ると、僕あたりでも名前と顔が一致する。\n桃井さん――右田一酒造元をささえるベテラン蔵人だ。
3465 = "Đến người này thì ngay cả tôi cũng nhận ra mặt và nhớ tên.\\nCô Momoi――một nghệ nhân nấu rượu kỳ cựu, trụ cột của xưởng rượu Migitaichi."

# 【真闇】
# display as 真闇
# JP: 「豆乳を使ぉて焼酎ばつくる、『豆乳焼酎』いう\n大ヒット商品の産みの親たい」
2487 = "「Cô ấy chính là người đã khai sinh ra 'Shochu Sữa Đậu Nành', một sản phẩm cực kỳ ăn khách,\\nbằng cách dùng sữa đậu nành để làm shochu đó.」"

# 【ハチロク】
# display as 八六
# JP: 「それだと、時給はいくらになるのですか？」
3019 = "「Vậy thì, lương theo giờ sẽ là bao nhiêu ạ?」"

# 【真闇】
# display as 真闇
# JP: 「固定給の方は、一日八時間、週六日の労働として――\n時給換算で3000円くらいにはなるたいねぇ」
2490 = "「Về phần lương cứng, nếu tính làm việc tám tiếng một ngày, sáu ngày một tuần――\\nthì quy ra lương giờ cũng được khoảng 3000 yên đó.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、さらに倍ですね」
2436 = "「Chà, lại gấp đôi nữa nhỉ.」"

# 【真闇】
# display as 真闇
# JP: 「その上で、うちは新商品の開発者には、利益の１０％の\nインセンティブ――利益報酬を支払うとるばい」
2894 = "「Hơn nữa, ở chỗ chú, người phát triển sản phẩm mới còn được trả thêm tiền thưởng――\\tức là hoa hồng lợi nhuận, bằng 10% lợi nhuận thu được đó.」"

# 【ハチロク】
# display as 八六
# JP: 「１０％の利益報酬」
3072 = "「Hoa hồng lợi nhuận 10%.」"

# 【真闇】
# display as 真闇
# JP: 「豆乳焼酎が昨年一年間に稼ぎだした利益は、\n実に九千四百万円たい」
2951 = "「Lợi nhuận mà Shochu Sữa Đậu Nành kiếm được trong năm ngoái,\\nlên tới chín mươi tư triệu yên lận đó.」"

# 【ハチロク】
# display as 八六
# JP: 「その十パーセントは、つまり九百四十万円」
3071 = "「Mười phần trăm của số đó, tức là chín triệu bốn trăm ngàn yên.」"

# monologue
# JP: 一秒たらずの短い沈黙。
3236 = "Một khoảng lặng ngắn ngủi, chưa đầy một giây."

# 【ハチロク】
# display as 八六
# JP: 「お掃除番さんの一万二千五百三十四時間分――\n一日八時間労働として、約四年分のお金です！」
2537 = "「Là số tiền tương đương với một vạn hai nghìn năm trăm ba mươi tư giờ làm việc của một người dọn dẹp――\\nNếu tính một ngày làm việc tám tiếng, thì đó là khoảng bốn năm tiền lương đó ạ!」"

# 【真闇】
# display as 真闇
# JP: 「経験にアイディアを組み合わせるだけで、\nそれだけの不労所得を稼げるゆー実例たい」
2991 = "「Chỉ cần kết hợp kinh nghiệm với ý tưởng thôi,\\nlà có thể kiếm được chừng đó thu nhập thụ động rồi đó. Đây là một ví dụ thực tế đó nghen.」"

# 【ハチロク】
# display as 八六
# JP: 「……経営資源を上手に組み合わせることで、\n生み出せる利益は大きく膨らむ」
1833 = "「……Bằng cách kết hợp khéo léo các nguồn lực kinh doanh,\\nlợi nhuận tạo ra sẽ tăng lên đáng kể.」"

# monologue
# JP: 大きく、強く、ハチロクは頷く。
3317 = "Hachiroku gật đầu một cái thật mạnh."

# 【ハチロク】
# display as 八六
# JP: 「酒蔵でのお仕事も、鉄道会社でのお仕事も、\nその点は、まったくかわらないのですね」
3034 = "「Công việc ở xưởng rượu cũng như công việc ở công ty đường sắt,\\nvề điểm đó, hoàn toàn không có gì khác nhau cả ạ.」"

# 【真闇】
# display as 真闇
# JP: 「うんうん、そこはよーわかってくれたみたいやねぇ」
2455 = "「Ừm ừm, coi bộ em hiểu rõ chỗ đó rồi đó nghen.」"

# monologue
# JP: かいぐりかいぐり、大げさにハチロクの頭をなでて、\n真闇姉は、優しい視線と穏やかな問いとを投げかける。
3708 = "Xoa xoa đầu Hachiroku một cách cường điệu,\\nchị Mayami nhìn em bằng ánh mắt dịu dàng và cất lên một câu hỏi ôn tồn."

# 【真闇】
# display as 真闇
# JP: 「その他んとこはどーとや？　\nわからんかったことやら、気になったことやらは」
3007 = "「Còn những chỗ khác thì sao nào? \\nCó điều gì em không hiểu, hay có gì thắc mắc không?」"

# 【ハチロク】
# display as 八六
# JP: 「あのっ！」
3016 = "「À!」"

# monologue
# JP: ビっと挙手。\n真闇姉が頷くのを待ち、ハチロクは早口の言葉を重ねる。
3311 = "Em giơ thẳng tay lên.\\nChờ chị Mayami gật đầu, Hachiroku liền nói một tràng nhanh nhảu."

# 【ハチロク】
# display as 八六
# JP: 「蒸気が、この蔵には立ち込めています。\nそれに、パイプが……いくつもいくつも走っていますが」
2615 = "「Hơi nước đang bao trùm khắp xưởng ạ.\\nVới lại, còn có những đường ống... rất, rất nhiều đường ống chạy dọc ngang khắp nơi...」"

# 【真闇】
# display as 真闇
# JP: 「温度管理が、\n焼酎造りにはいっとう重要なところばい」
3039 = "「Việc quản lý nhiệt độ,\\nlà khâu quan trọng bậc nhất trong việc nấu rượu shochu đó nghen.」"

# monologue
# JP: 言いながら、もろみを寝かせるタンクの横に移動する。
3712 = "Vừa nói, chị vừa di chuyển đến bên cạnh bồn ủ moromi."

# monologue
# JP: その脇に走る二本のパイプにはそれぞれ、\n赤と青とのバルブがついている。
3580 = "Trên hai đường ống chạy dọc bên hông, một cái có van màu đỏ, một cái có van màu xanh."

# 【真闇】
# display as 真闇
# JP: 「赤かバルブのパイプにはお湯。\n青かバルブのパイプには水が走っとるたい」
2868 = "「Ống có van màu đỏ là nước nóng.\\nCòn ống có van màu xanh là nước lạnh đang chảy đó.」"

# monologue
# JP: くん、と真闇姉の鼻先が動く。\n長い指が伸び、青のバルブをわずかに緩める。
3704 = "Khịt, mũi chị Mayami khẽ động.\\nNgón tay dài vươn ra, nới lỏng van màu xanh một chút."

# 【真闇】
# display as 真闇
# JP: 「バルブば緩めれば勢いよー出て、閉めれば止まる。\n単純にそぎゃんして、温度管理ばしとーとね」
2657 = "「Nới van ra thì nước sẽ chảy mạnh, còn đóng lại thì nó ngừng.\\nChỉ đơn giản như vậy thôi, bọn chị quản lý nhiệt độ bằng cách đó đó.」"

# 【ハチロク】
# display as 八六
# JP: 「お湯は、お湯はどうやって沸かしているのです？」
2932 = "「Nước nóng thì, nước nóng thì được đun sôi bằng cách nào ạ?」"

# 【真闇】
# display as 真闇
# JP: 「そりゃあ、当然ボイラばい」
3027 = "「Cái đó thì, đương nhiên là bằng nồi hơi rồi.」"

# monologue
# JP: しかし石炭ボイラではなく、軽油が燃料であるらしい。\nそう聞かされて、ハチロクは静かに微笑み返す。
3243 = "Nhưng đó không phải là nồi hơi đốt than, mà dường như dùng dầu diesel làm nhiên liệu.\\nNghe vậy, Hachiroku chỉ lặng lẽ mỉm cười đáp lại."

# 【ハチロク】
# display as 八六
# JP: 「そこは少しだけ残念ですが、それでもとても嬉しいです。\n焼酎造りと蒸気機関車と似たところもあるとわかって」
3050 = "「Điểm đó có hơi đáng tiếc một chút, nhưng em vẫn rất vui ạ.\\nVì biết được rằng việc làm rượu shochu và đầu máy hơi nước cũng có điểm tương đồng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2427 = "「A!」"

# monologue
# JP: そうだ。そうだ。そうだった。
3451 = "Phải rồi. Phải rồi. Đúng là vậy mà."

# monologue
# JP: 腹を空かせたハチロクの石炭を探していたとき――\n真闇姉は、確か、話していたはずだ。
3318 = "Khi đang tìm than cho Hachiroku đang đói bụng――\\nChị Mayami, mình nhớ chắc chắn là, chị ấy đã từng nói."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、使われていない石炭ボイラが、\nまだこの家にはあると聞いたと記憶しているが」
2839 = "「Chị Mayami, em nhớ là mình từng nghe nói trong nhà này vẫn còn một nồi hơi đốt than không dùng đến thì phải.」"

# 【真闇】
# display as 真闇
# JP: 「あるたい。もっとも、\n使うなら相当に手ばいれんといけんシロモノやけんど」
2738 = "「Có đó. Mà nói trước,\\nnếu muốn dùng thì nó là thứ cần phải sửa sang lại kha khá đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「手をいれれば――\n整備修復をすれば使えるということか」
2377 = "「Nếu sửa sang lại――\\nTức là nếu bảo trì và phục hồi thì có thể dùng được đúng không ạ?」"

# 【真闇】
# display as 真闇
# JP: 「保障ば出来んばってん、可能性はあるたい」
2988 = "「Chị không đảm bảo được đâu, nhưng mà khả năng là có đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ」
2667 = "「Nếu vậy thì,」"

# monologue
# JP: まずは石炭ボイラの整備・修復を行おう。
3459 = "Trước hết, hãy tiến hành bảo dưỡng và sửa chữa nồi hơi than đá."

# monologue
# JP: それは当然、\n8620のボイラの整備修復にも、繋がっていく経験となる。
3520 = "Đương nhiên, đó cũng sẽ là kinh nghiệm\\nđể áp dụng vào việc bảo dưỡng và sửa chữa nồi hơi của 8620."

# 【双鉄】
# display as 雙鐵
# JP: 「そして、石炭ボイラの修復が叶ったときには、\nそれをもって焼酎を作るのだ」
2799 = "「Và rồi, khi việc sửa chữa nồi hơi than đá hoàn tất,\\nchúng ta sẽ dùng nó để nấu rượu shochu.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ！　石炭ボイラということは」
2431 = "「A! Nồi hơi than đá, vậy có nghĩa là...」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう。8620が使うものとまったく同じ石炭を使い、\n水をつかっての焼酎だ」
2786 = "「Đúng vậy. Chúng ta sẽ dùng loại than đá y hệt loại 8620 vẫn dùng,\\nvà dùng nước để nấu ra loại rượu shochu đó.」"

# 【ハチロク】
# display as 八六
# JP: 「蒸気機関車の動力源と、\n同じ材料でつくられる焼酎、ということになるのですね」
2268 = "「Vậy có nghĩa là, đây sẽ là loại rượu shochu được làm từ\\nnguyên liệu giống hệt với nguồn năng lượng của đầu máy hơi nước, phải không ạ?」"

# monologue
# JP: その言い方はかなり良い。\n飲むだけで、力が湧いて来そうな印象を与えてくれる。
3863 = "Cách nói đó nghe hay thật đấy.\\nNó tạo ấn tượng rằng chỉ cần uống thôi là đã cảm thấy sức mạnh trào dâng rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「名付けるなら、そう――\n『蒸気焼酎・おひとよしのハチロク』でどうだろう」
2535 = "「Nếu phải đặt tên, thì――\\n『Rượu Hơi Nước - Hachiroku Tốt Bụng』, nghe thế nào?」"

# monologue
# JP: 言った瞬間、\nぴょん！　とハチロクが大きく弾む。
3747 = "Ngay khoảnh khắc tôi vừa dứt lời,\\nHachiroku liền nhảy cẫng lên một cái, pyon!"

# monologue
# JP: 乙女らしさと遠くはなれた仕草が、けれど、\nなんともしとやかにさえ見える。
3599 = "Một cử chỉ chẳng hề có chút nữ tính nào, vậy mà,\\nnhìn thế nào cũng lại thấy thật duyên dáng."

# 【ハチロク】
# display as 八六
# JP: 「素敵です！　わたくし、それでしたら\n異常燃焼を起こしたとしても是非とも飲みたく思います」
2475 = "「Tuyệt vời quá ạ! Nếu vậy thì, thưa ngài,\\ndù có phải bị đốt cháy bất thường, em cũng nhất định muốn được uống thử.」"

# 【真闇】
# display as 真闇
# JP: 「いける……かもしれんねぇ。\nその[ハチロクニイマル,3]8620やらの修復、とうぜん、公開でやるったい？」
2930 = "「Có khi... lại được việc đấy chứ.\\nCái vụ sửa chữa 8620 gì đó, đương nhiên là mấy người sẽ làm công khai, phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2453 = "「嗯」" 

# monologue
# JP: 感心のあまりこぼれた「ああ」を、\n真闇姉は、同意のそれと受け取ってしまう。
3536 = "Tiếng \"À\" tôi thốt ra vì quá đỗi thán phục,\\nđã bị chị Mayami hiểu lầm thành một lời đồng ý."

# 【真闇】
# display as 真闇
# JP: 「じゃったら、そんときに試作品を売ってみるとよかとね。\n行けそうなら、8620復活とともに本格展開たい」
2668 = "「Vậy thì, nhân lúc đó bán thử sản phẩm mẫu xem sao đi.\\nNếu có vẻ ổn, thì mình sẽ triển khai chính thức cùng lúc với sự hồi sinh của 8620 luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうしてもらえるなら、助かる」
2921 = "「Nếu chị giúp được như vậy thì tốt quá.」"

# 【真闇】
# display as 真闇
# JP: 「双ちゃん？　ここの杜氏はうちやけんねぇ。\n杜氏の決めよることならそらあ、絶対ばい」
2532 = "「Sou-chan? Chị là người nấu rượu ở đây mà.\\nNếu là chuyện người nấu rượu đã quyết thì chắc chắn là vậy rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――真闇姉」
2935 = "「Cảm ơn――chị Mayami.」"

# monologue
# JP: 深く――自然と頭が下がる。
3555 = "Sâu sắc――tôi bất giác cúi đầu."

# monologue
# JP: 真闇姉はこんなにもわずかな時間と言葉で、\n僕に答えを示し、気づかせてくれたから。
3396 = "Bởi vì chỉ trong một khoảng thời gian và bằng vài lời ngắn ngủi như vậy,\\nchị Mayami đã cho tôi thấy câu trả lời và giúp tôi nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「経営資源を組み合わせる。\nそれにより、利益を何倍にもふくらませる」
2647 = "「Kết hợp các nguồn lực kinh doanh.\\nQua đó, làm lợi nhuận tăng lên gấp nhiều lần.」"

# monologue
# JP: 個人レベルで、これほど大きな効果があるのだ。\nならばさらにと――広げていかぬ法は無い。
3283 = "Ở cấp độ cá nhân mà đã có hiệu quả lớn đến thế.\\nVậy thì không có lý do gì――lại không mở rộng nó ra hơn nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、ハチロクのオーナーだ」
1840 = "「…Tôi là chủ nhân của Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしと[ハチロクニイマル,3]8620とは、\nまぎれもない双鉄様の経営資源です」
2695 = "「Vâng. Em và 8620,\\nchính là nguồn lực kinh doanh không thể chối cãi của ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そして、ポーレットにも、日々姫にも、蓑笠老人にも\n凪・ふかみにも、それぞれの経営資源がある」
2896 = "「Và, Paulette, Hibiki, Lão Minokasa,\\ncả Nagi và Fukami, mỗi người đều có nguồn lực kinh doanh của riêng mình.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
# 2427 = "「啊！」" 

# monologue
# JP: ラベルデザインは日々姫に頼む。瓶の形状を工夫するなら、\n蓑笠老人にガラスか陶器の職人を紹介してもらえばいい。
3874 = "Thiết kế nhãn thì nhờ Hibiki. Nếu muốn sáng tạo hình dáng chai lọ,\\nthì có thể nhờ Lão Minokasa giới thiệu cho một nghệ nhân làm gốm hoặc thủy tinh."

# monologue
# JP: レールショップ、駅、クマ川下りの発船所――\n観光客を狙った販路も、新たに確保できるはずだ。
3878 = "Cửa hàng đường sắt, nhà ga, bến thuyền du ngoạn sông Kuma――\\nmình cũng có thể đảm bảo được những kênh bán hàng mới nhắm vào khách du lịch."

# 【双鉄】
# display as 雙鐵
# JP: 「8620修復自体を、御一夜全体の経営資源として共有する。\nその活用で利益を産めると、皆に考えてもらえるように」
2525 = "「Chia sẻ chính việc phục chế 8620 như một nguồn lực kinh doanh chung của toàn bộ Ohitoyo.\\nĐể mọi người cùng nghĩ rằng có thể tạo ra lợi nhuận từ việc tận dụng nó.」"

# 【真闇】
# display as 真闇
# JP: 「うふふっ。双ちゃん、よー気づいたねぇ」
2393 = "「Ufufu. Sou-chan, em nhận ra nhanh ghê đó.」"

# monologue
# JP: 真闇姉が笑う。\n満足そうに、嬉しげに。
3710 = "Chị Mayami mỉm cười.\\nTrông có vẻ hài lòng và vui sướng."

# 【真闇】
# display as 真闇
# JP: 「稼ぎたければ、稼がせる。\nそれは、[あきない,1]商売の基本たい」
1804 = "「Muốn kiếm tiền thì phải để người khác cùng kiếm.\\nĐó là nguyên tắc cơ bản của kinh doanh đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん、真闇姉」
2682 = "「Vâng, chị Makura.」"

# monologue
# JP: そしてもうひとつ、僕は経営資源を得た。\n赤井宮司の助言が、どれほど的確か――
3470 = "Và còn một điều nữa, tôi đã có được nguồn lực để vận hành.\\nLời khuyên của thầy chủ đền Akai, chính xác đến nhường nào――"

# monologue
# JP: 理解を出来た今だからこそ、その活用に失敗せぬよう、\nまずは一歩、今立つここを、踏み固めよう。
3584 = "Chính vì bây giờ đã hiểu ra, để không thất bại trong việc tận dụng nó,\\nđầu tiên, mình phải củng cố vững chắc nền móng ngay tại nơi đây."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく石炭ボイラだ。\n修復出来ねば、全ては絵に描いた餅に終わってしまう」
2885 = "「Dù sao đi nữa, vấn đề là nồi hơi đốt than.\\nNếu không sửa được nó, tất cả sẽ chỉ là bánh vẽ mà thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしを是非お役立てください。\nボイラ構造については、記憶が鮮明である気がします」
2934 = "「Xin hãy để tôi được giúp sức.\\nVề cấu trúc của nồi hơi, tôi cảm thấy ký ức của mình vẫn còn rất rõ ràng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もちろん役に立ってもらうぞ」
2452 = "「Ừm. Dĩ nhiên là tôi sẽ nhờ cô giúp rồi.」"

# monologue
# JP: だが、それだけではまだ足りない。\n足りたとしても、それではいけない。
3244 = "Nhưng, chỉ vậy thôi thì vẫn chưa đủ.\\nKể cả có đủ đi nữa, thì cũng không được."

# monologue
# JP: 御一夜全体を巻き込むため、利益共有をはかるため、\n真闇姉のアドバイスどおり、『稼がせる』ことが必要だ。
3434 = "Để lôi kéo cả thị trấn Ohitoyo, để cùng nhau chia sẻ lợi nhuận,\\nnhư lời khuyên của chị Makura, cần phải『để họ kiếm được tiền』."

# 【双鉄】
# display as 雙鐵
# JP: 「その上で真闇姉、ひとつ、教えて欲しいことがある」
2842 = "「Và cũng vì thế, chị Makura, có một chuyện em muốn hỏi chị.」"

# 【真闇】
# display as 真闇
# JP: 「ボイラ屋さんの電話番号と？」
2704 = "「Là số điện thoại của thợ sửa nồi hơi chứ gì?」"

# monologue
# JP: 先回り。\n今までだったら、きっと内心、反発を覚えていただろう。
3347 = "Chị ấy đã đi trước một bước.\\nNếu là trước đây, chắc hẳn trong lòng mình đã cảm thấy bực bội rồi."

# monologue
# JP: が――それがくだらない意地と今なら、はっきりわかる。\n真闇姉こそ誰よりも、巻き込み、活用するべき人だ。
3242 = "Nhưng――bây giờ thì mình đã hiểu rõ, đó chỉ là sự cố chấp vớ vẩn.\\nChị Makura mới chính là người mà mình nên lôi kéo và tận dụng hơn bất kỳ ai khác."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ。お願いしたい」
2450 = "「Ừm. Đúng vậy. Nhờ chị cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「繋がらん、か――」
2644 = "「Không gọi được, à――」"

# monologue
# JP: 真闇姉とあれこれ打ち合わせるうち、\n時計は九時を回ってしまった。
3392 = "Trong lúc bàn bạc chuyện này chuyện kia với chị Makura,\\nđồng hồ đã điểm qua chín giờ mất rồi."

# monologue
# JP: 夕食前にも一度電話を入れはしたのだが――\nこれは、今日はもう諦めた方が良さそうだ。
3602 = "Mình đã thử gọi một lần trước bữa tối rồi, nhưng mà――\\nXem ra hôm nay nên bỏ cuộc thì hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「……外でも歩くか」
1832 = "「……Hay là ra ngoài đi dạo một chút nhỉ.」"

# monologue
# JP: 寝るには早いし、\n何かするには、頭が疲れすぎている。
3897 = "Giờ mà đi ngủ thì còn sớm quá,\\ncòn làm gì khác thì đầu óc lại mệt mỏi quá rồi."

# monologue
# JP: 体だけ軽く動かして――\nああ、そうだ。投炭練習を４００杯だけするのも良い。
3462 = "Chỉ cần vận động cơ thể nhẹ nhàng một chút――\\nÀ, phải rồi. Luyện tập xúc than 400 lần cũng là một ý hay."

# 【双鉄】
# display as 雙鐵
# JP: 「少し出てくる」
2597 = "「Anh ra ngoài một lát.」"

# monologue
# JP: ハチロクには資料作成を頼んでいるし、\nこの時間、日々姫も恐らくは勉強だろう。
3550 = "Mình đã nhờ Hachiroku chuẩn bị tài liệu rồi,\\ngiờ này thì có lẽ Hibiki cũng đang học bài."

# monologue
# JP: 邪魔せぬようにとそっと玄関から外にでる。
3666 = "Để không làm phiền ai, mình rón rén đi ra ngoài từ cửa trước."

# 【双鉄】
# display as 雙鐵
# JP: 「おや」
2402 = "「Ồ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2426 = "「A.」"

# monologue
# JP: ウワサをすれば影、でもないが、\n電話をかけたばかりの相手だ。
3797 = "Chưa đến mức nhắc Tào Tháo thì Tào Tháo đến,\\nnhưng đây đúng là người mình vừa mới gọi điện."

# monologue
# JP: いささか、びっくりさせられる。
3528 = "Quả là có hơi bất ngờ."

# 【双鉄】
# display as 雙鐵
# JP: 「さっき、電話をしたのだが」
2599 = "「Lúc nãy, anh có gọi cho em, nhưng mà...」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ！　あっ！！」
2407 = "「Ể? A! A!!」"

# monologue
# JP: ポーレットは慌てた様子で、\nポーチの中の自分の携帯を確かめる。
3648 = "Paulette luống cuống,\\nlục tìm điện thoại di động của mình trong túi."

# 【ポーレット】
# display as 波萊特
# JP: 「わ、ほんとさっき。\nごめんなさい、急いで歩いてて、気が付かなくて」
2398 = "「A, đúng là vừa nãy thật.\\nEm xin lỗi, em đi vội quá nên không để ý.」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。というか、急ぎなら」
2239 = "「Không sao đâu. Mà nếu em đang vội thì...」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえっ！　ここを目指して、\n双鉄くんと話せるかなって、急いでたんです」
2435 = "「A, không ạ! Em vội đến đây...\\nchỉ là để xem có thể nói chuyện với anh Soutetsu không thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕と？」
2645 = "「Với tôi sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「七時頃の電話でられなくて、\nそのまま時間遅くなっちゃったから、かけ直すのも」
2298 = "「Lúc khoảng bảy giờ anh gọi em không nghe máy được,\\nsau đó lại muộn quá rồi nên em cũng ngại gọi lại...」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は携帯を持たんからな」
2466 = "「Tôi không mang theo điện thoại di động mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、ナビちゃんに禁止されてるのは知ってますし」
2255 = "「À không, em biết là Navi-chan cấm anh dùng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「携帯の電波が、\n飛行関連機器に悪影響をもたらす危険を気に病むらしい」
2516 = "「Cô ấy có vẻ lo rằng sóng di động\\nsẽ gây ảnh hưởng xấu đến các thiết bị hàng không.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの命が最優先なんですもん。\n当然、そういう判断になっちゃいますよね」
2812 = "「Vì tính mạng của anh Soutetsu là trên hết mà.\\nĐương nhiên là chị ấy phải quyết định như vậy rồi.」"

# monologue
# JP: 意識を向ければ、上空には当然のようにエアクラの飛行音。
3286 = "Nếu để ý, có thể nghe thấy tiếng động cơ của Aircra trên bầu trời, một âm thanh đã quá đỗi quen thuộc."

# monologue
# JP: 離水のときに、\nさぞや多くの水鳥たちの眠りを妨げてしまっただろう。
3438 = "Lúc cất cánh khỏi mặt nước,\\nchắc hẳn nó đã phá vỡ giấc ngủ của biết bao loài thủy cầm."

# 【双鉄】
# display as 雙鐵
# JP: 「話すなら、どうだ、このまま歩かんか？\n丁度、僕も駅の方へと向かおうかと思っていた」
3031 = "「Nếu muốn nói chuyện, chúng ta cứ đi bộ thế này được không?\\nVừa hay tôi cũng đang định ra ga.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んでお供します」
2507 = "「Vâng, em rất sẵn lòng đi cùng anh ạ.」"

# monologue
