[script]
# lines: 582 
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ、\n赤井宮司さんにも会ってきたんですか」
3002 = "「Vậy ra, hai người cũng đã đi gặp cung tư tế Akai rồi sao.」"
# monologue
# JP: 明けて翌日。レールショップ。\n乗務を終えたポーレットに、昨日のことを報告する。
3736 = "Sáng hôm sau. Tại cửa hàng đường sắt. Tôi báo cáo lại chuyện hôm qua cho Paulette, người vừa kết thúc ca trực."
# 【双鉄】
# display as 雙鐵
# JP: 「会った、といえるほどでもない。\n改めての面会の約束を取付けただけだ」
2317 = "「Cũng không hẳn là đã gặp. Chỉ là hẹn lại một cuộc gặp khác thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お忙しいんですね、宮司さんも」
2814 = "「Cung tư tế cũng bận rộn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「の、ようだったな」
2831 = "「Có vẻ là vậy.」"
# monologue
# JP: 頷くと同時、僕の傍ら、ハチロクが小さく肩を震わす。\n気付きはするが、構わずそのまま話を続ける。
3568 = "Cùng lúc gật đầu, bên cạnh tôi, Hachiroku khẽ rung vai. Tôi nhận ra nhưng không bận tâm, cứ thế tiếp tục câu chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲という娘を知っているか？」
2308 = "「Cô có biết cô gái tên Houshou Kisaki không?」"
# monologue
# JP: 小さな頷き。\nポーレットの顔がわずかに曇る。
3658 = "Cái gật đầu nhẹ. Sắc mặt Paulette hơi chùng xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです。銀行さん――\n[くまもと,1]隈元銀行御一夜支店の支店長さんで、つまり……」
2817 = "「Tất nhiên rồi. Ngân hàng―― Là giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto, nghĩa là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「エアクラ工場誘致派の、中心人物で間違いないか？」
2853 = "「Có chắc cô ta là nhân vật trung tâm của phe ủng hộ thu hút nhà máy Aircra không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。計画の主導者は多分、隈元銀行頭取で、\n[きさき,1]稀咲さんのお父様である、[ほうしょうもとただ,3]宝生元忠さんですけど」
2696 = "「Vâng. Người chủ đạo kế hoạch có lẽ là tổng giám đốc Ngân hàng Kumamoto, cha của cô Kisaki, ông Houshou Mototada.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2996 = "「Ồ.」"
# monologue
# JP: 宝生元忠。あの娘の父にして、大銀行の頭取か。\nどのような人物なのか、一度会いたい気もしてくる。
3448 = "Houshou Mototada. Cha của cô gái đó, và là tổng giám đốc của một ngân hàng lớn sao. Tự nhiên tôi cũng muốn gặp một lần xem ông ta là người thế nào."
# 【ポーレット】
# display as 波萊特
# JP: 「市内で一番活発に動いてるのは間違いなく稀咲さんです。\nより正確には、動いて、結果を出している――ですね」
2826 = "「Người hoạt động tích cực nhất trong thành phố chắc chắn là cô Kisaki. Nói chính xác hơn là, cô ấy hành động, và mang lại kết quả――đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。やはり有能なのか」
2351 = "「Ra là vậy. Quả nhiên là người có năng lực sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……」
1816 = "「......」"
# monologue
# JP: ポーレットが珍しく、口惜しそうな表情をして無言で頷く。
3645 = "Paulette hiếm khi lộ vẻ mặt cam chịu và gật đầu trong im lặng."
# monologue
# JP: 誘致賛成の稀咲が結果を出しているのなら、\nポーレットはその分、してやられているのかもしれない。
3587 = "Nếu Kisaki của phe ủng hộ thu hút đang mang lại kết quả, thì Paulette có lẽ cũng đang phải chịu tổn thất tương ứng."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、その稀咲が訪ねていったそうなのだ。\n僕らが訪問する前に、赤井宮司のところへと」
2886 = "「Dù sao thì, nghe nói Kisaki đó đã đến thăm. Trước khi chúng tôi đến thăm chỗ cung tư tế Akai.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　赤井さん――\n神社さんにまで切り崩し工作を？」
2406 = "「Hả!? Anh Akai―― Cô ta định lung lạc cả đền thờ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「の、つもりらしかったがな。\n赤井宮司は、切り崩されずになんとか追い返したらしい」
2293 = "「Có vẻ là định như vậy. Nhưng cung tư tế Akai không bị lung lạc mà đã tìm cách đuổi về được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんとか？」
2888 = "「Tìm cách?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ご本人がそう言っていた。\n稀咲は――相当な粘り腰らしいな」
2448 = "「Ừ. Chính ngài ấy nói vậy. Kisaki――có vẻ khá là dai dẳng đấy.」"
# monologue
# JP: 稀咲が時間を使ったという、『実りの無い議論』。
3265 = "『Cuộc tranh luận vô bổ』 mà Kisaki đã tốn thời gian."
# monologue
# JP: 僕らが訪ねた赤井宮司は、論戦によほど疲れたらしく、\n……率直にいってヘロヘロだった。
3529 = "Cung tư tế Akai mà chúng tôi đến thăm có vẻ rất mệt mỏi vì cuộc tranh luận, ......nói thẳng ra là bơ phờ."
# 【ハチロク】
# display as 八六
# JP: 「…………っ」
1811 = "「............っ」"
# monologue
# JP: ハチロクが必死になって思い出し笑いをこらえるほど――
3679 = "Đến mức Hachiroku phải tuyệt vọng nhịn cười khi nhớ lại――"
# monologue
# JP: 僕らの応対に出てくださった、優しい顔のおでこの上に、\n冷却シートが貼りついてるのを失念される、それほどに。
3680 = "Đến mức ngài ấy quên mất miếng dán hạ sốt dán trên trán khi ra tiếp đón chúng tôi với khuôn mặt hiền hậu."
# 【双鉄】
# display as 雙鐵
# JP: 「たいそうお疲れのご様子だったのでな。\nその時はご辞退申し上げ、今日の約束をいただいたのだ」
2287 = "「Vì ngài ấy có vẻ rất mệt mỏi. Nên lúc đó chúng tôi đã xin phép cáo lui, và hẹn lại vào hôm nay.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁ～、そうだったんですか。\nさすがですねぇ、双鉄くん」
2355 = "「Hà~, ra là vậy. Quả không hổ danh là anh Soutetsu.」"
# monologue
# JP: 感心顔のポーレット。\n僕には意味がわからない。
3641 = "Khuôn mặt khâm phục của Paulette. Tôi không hiểu ý cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、いったい何がさすがだ？」
2596 = "「Tôi thì có gì mà không hổ danh?」"
# 【ポーレット】
# display as 波萊特
# JP: 「赤井宮司さんに自力でたどり着いたことですよ。\nもう少しあとにご紹介しよう、って思ってたんですけど」
2782 = "「Là việc anh tự mình tìm đến được chỗ cung tư tế Akai đấy. Tôi vốn định để một thời gian nữa mới giới thiệu cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2713 = "「Ồ.」"
# monologue
# JP: 丁度いい。面会をいただくその前に、\n赤井宮司の人となりにつき、聞いておければありがたい。
3611 = "Vừa hay. Trước khi có cuộc gặp, nếu được nghe kể về tính cách của cung tư tế Akai thì thật tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、もう少しあとなのだ？」
2795 = "「Tại sao lại để một thời gian nữa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご自身が物事に影響を与えてしまうことに凄く慎重――、\nそういう方なので、足固め段階だと早いかなぁって」
2286 = "「Ngài ấy rất thận trọng trong việc bản thân gây ảnh hưởng đến sự việc――, là người như vậy, nên tôi nghĩ trong giai đoạn củng cố nền tảng thì hơi sớm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「影響を与えることに慎重、とは？」
2326 = "「Thận trọng trong việc gây ảnh hưởng, nghĩa là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「赤井阿蘇神社は、御一夜最大最古の神社で、\n当然、[うじこ,1]氏子さんもすごく多くて、影響力があるんです」
2960 = "「Đền Akai Aso là ngôi đền lớn nhất và lâu đời nhất ở Ohimitera, tất nhiên, số lượng giáo dân cũng rất đông, nên có sức ảnh hưởng lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほど。極端な例えでいえば、\n[ヒノモトノミカド,4]日ノ本乃帝が政治的な発言をせぬようなものか」
2413 = "「À. Ra là vậy. Lấy một ví dụ cực đoan, giống như việc Thiên hoàng Hinomoto không phát ngôn về chính trị sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。\nまさしくそんな感じだと思います」
2785 = "「Đúng vậy. Tôi nghĩ chính xác là cảm giác đó.」"
# monologue
# JP: 同意の言葉をすぐさま返し、\nけれど、ポーレットの顔色はすぐれない。
3426 = "Tôi lập tức đáp lại lời đồng tình, nhưng sắc mặt Paulette không được tốt."
# monologue
# JP: 何故だ？　と問うより一足早く、\nポーレットは答えを継ぎ足してくる。
3667 = "Tại sao? Nhanh hơn cả lúc tôi định hỏi, Paulette đã nói tiếp."
# 【ポーレット】
# display as 波萊特
# JP: 「市の職員さんに、宮司さんの叔母さんがいるんですけど。\nわざわざ帝鉄に勤めに出たのも、おなじ理由らしいです」
2522 = "「Trong số các nhân viên tòa thị chính, có dì của cung tư tế. Nghe nói việc ngài ấy cất công đi làm ở Đường sắt Hoàng gia cũng vì lý do tương tự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな。\nでは、勤務地も御一夜ではなかった？」
1828 = "「......Ra là vậy. Vậy, nơi làm việc cũng không phải ở Ohimitera?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[こくら,1]粉蔵だったって話です」
2656 = "「Nghe nói là ở Kokura.」"
# monologue
# JP: そこまで言ってポーレットは、\n何気ないように腰をとんとん叩く。
3659 = "Nói đến đó, Paulette tỏ vẻ tự nhiên đưa tay đấm đấm vào eo."
# monologue
# JP: 少し、顔色がよくなったようだ。
3421 = "Sắc mặt có vẻ đã khá hơn một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「粉蔵……蓑笠老人の話にも出てきたな。\n帝鉄の工場があったというところで間違いないか？」
2529 = "「Kokura......Cũng từng được nhắc đến trong câu chuyện của ông lão Minokasa. Chắc chắn là nơi từng có nhà máy của Đường sắt Hoàng gia đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも知ってたんですね。\nけど、赤井宮司さんは工場勤務じゃなかったそうですよ」
2302 = "「Anh Soutetsu cũng biết nhỉ. Nhưng nghe nói cung tư tế Akai không làm việc ở nhà máy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば何を？」
3025 = "「Nếu vậy thì làm gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「さすがにそこまでは……わたしも、\n宮司さんご本人と踏み込んだお話はしませんし」
2578 = "「Đến mức đó thì......tôi cũng, chưa nói chuyện sâu với bản thân cung tư tế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 2996 = "「這樣啊」" 
# monologue
# JP: 話し込むうち、ティーカップが空になってしまった。\nそのタイミングで、ハチロクが控えめな声を出す。
3798 = "Trong lúc mải nói chuyện, tách trà đã cạn. Đúng lúc đó, Hachiroku cất giọng e dè."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。そろそろお時間をお気にされるべきかと」
3052 = "「Ngài Soutetsu. Đã đến lúc ngài nên để ý thời gian rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、もうか。\n話していると、時間が経つのが早いものだな」
2410 = "「Ồ, đã đến giờ rồi sao. Nói chuyện thì thời gian trôi qua nhanh thật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当ですね」
2681 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 頬をわずかに染めて微笑み。
3647 = "Mỉm cười với đôi má hơi ửng hồng."
# monologue
# JP: ポーレットも椅子から腰を、浮かせ――\nなんとも、中途半端な姿勢で、止まる。
3416 = "Paulette cũng nhấc hông lên khỏi ghế―― Rồi dừng lại ở một tư thế thật sự lấp lửng."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、\nあまり役に立つお話できなかった気もしますけど」
2624 = "「Tôi có cảm giác, mình chưa kể được chuyện gì có ích cho lắm.」"
# monologue
# JP: その姿勢のまま、言葉を発す。\n顔色のすぐれぬわけを、ようやく理解できた気がする。
3412 = "Cô ấy lên tiếng trong tư thế đó. Tôi cảm thấy cuối cùng mình đã hiểu lý do tại sao sắc mặt cô ấy không tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、今の話だけでも十分参考になった。\nありがとう」
2253 = "「Không, chỉ những chuyện vừa rồi cũng đủ để tham khảo rồi. Cảm ơn cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうでしたか？　なら、嬉しいです」
2684 = "「Vậy sao? Nếu thế thì tôi vui lắm.」"
# monologue
# JP: ポーレットはまだ動かない。\nこのまま放置もしておけないが、さて――
3642 = "Paulette vẫn không nhúc nhích. Cũng không thể cứ để mặc cô ấy thế này, nhưng mà――"
# 【双鉄】
# display as 雙鐵
# JP: 「今日のれいなは、\n随分と整備に時間をかけているのだな」
2277 = "「Reina hôm nay, dành khá nhiều thời gian cho việc bảo dưỡng nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「今は整備じゃないんです。日々姫ちゃんと一緒になって\n……覚えてます？　この前の子猫」
2315 = "「Bây giờ không phải là bảo dưỡng đâu. Em ấy đang cùng với Hibiki ......Anh nhớ không? Chú mèo con hôm trước ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの子犬か」
2415 = "「À, chú chó con đó à.」"
# 【ハチロク】
# display as 八六
# JP: 「犬でもネコでも無い気がするのですが」
2621 = "「Tôi có cảm giác nó không phải chó cũng chẳng phải mèo đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「とにかくあのコ。\nなんか、餌付けして慣らそうってしてるみたいで」
2887 = "「Nói chung là đứa bé đó. Có vẻ hai đứa đang định cho ăn để làm quen.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2416 = "「Ồ.」"
# monologue
# JP: 日々姫のやつ、朝早くからバタバタと出かけていったが、\nなんだ、目的地は同じだったか。
3593 = "Con bé Hibiki đó, sáng sớm đã tất tả chạy đi, ra là đích đến cũng giống nhau à."
# 【双鉄】
# display as 雙鐵
# JP: 「うまくいくだろうな、それは。\n僕の知る限り、日々姫は動物にたいそう好かれる」
2572 = "「Chắc sẽ suôn sẻ thôi. Theo như tôi biết, Hibiki rất được động vật yêu quý.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなもですよ？　だからわたし、\n気が早いですけど、準備はじめようかと思ってて」
2805 = "「Reina cũng vậy mà? Thế nên tôi, dù hơi sớm nhưng đang định bắt đầu chuẩn bị đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この前聞いた、駅長犬のか？」
2299 = "「Vụ chó trưởng ga mà cô nói hôm trước à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですよ？　駅長ネコの」
2679 = "「Đúng vậy đó? Mèo trưởng ga.」"
# 【ハチロク】
# display as 八六
# JP: 「…………駅長……アレはなんなのでしょう」
1813 = "「............Trưởng ga......Cái đó rốt cuộc là con gì nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「面白そうだな。手伝えることがあったら言ってくれ。\n観光振興の、それも一助となるかもしれん」
2238 = "「Có vẻ thú vị đấy. Nếu có gì cần giúp thì cứ nói với tôi. Có thể nó cũng sẽ góp phần vào việc chấn hưng du lịch đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、そのときにはお願いしますね、双鉄くん」
2459 = "「Ufufu, lúc đó sẽ nhờ anh nhé, anh Soutetsu.」"
# 【ハチロク】
# display as 八六
# JP: 「餌付けがうまくいくなら――ですか」
2247 = "「Nếu việc cho ăn suôn sẻ――nhỉ.」"
# monologue
# JP: 気になるのだろう。\nハチロクの視線がしきりにドアへ向く。
3322 = "Chắc là đang tò mò. Ánh mắt Hachiroku liên tục hướng về phía cửa."
# monologue
# JP: ならば、方針を変更しよう。\nれいなが戻るのを待つよりも、今はともかく――
3871 = "Nếu vậy, hãy thay đổi phương châm. Thay vì đợi Reina quay lại, bây giờ dù sao thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、先に外に出ていてくれ。\n少し、ポーレットと話がある」
2337 = "「Hachiroku, em ra ngoài trước đi. Tôi có chuyện muốn nói với Paulette một chút.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですか、双鉄様。\nそれでは、わたくしこの辺りをぶらついています」
2505 = "「Vậy sao, ngài Soutetsu. Thế thì, tôi sẽ đi loanh quanh khu vực này.」"
# monologue
# JP: ぶらつく、と――まったくらしくも無いことを言い、\nハチロクはそそくさと外へ出る。
3887 = "Đi loanh quanh――nói một câu hoàn toàn không giống em ấy chút nào, Hachiroku vội vã đi ra ngoài."
# 【双鉄】
# display as 雙鐵
# JP: 「さて」
3030 = "「Nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい双鉄くん。\nお話、着替えながらでもいいですか？」
2433 = "「A, xin lỗi anh Soutetsu. Nói chuyện, trong lúc tôi thay đồ được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2457 = "「Hửm?」"
# monologue
# JP: ポーレットが立ち、こちらを見ている。\n不自然な姿勢で止まっていない。
3656 = "Paulette đứng dậy, nhìn về phía này. Không còn dừng lại ở tư thế thiếu tự nhiên nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、動けるのならば、今これ以上の話は無い。\n腰を痛めでもしているのではないかと心配したのだが」
2250 = "「Không, nếu cô cử động được thì bây giờ không còn chuyện gì để nói nữa. Tôi đã lo lắng không biết có phải cô bị đau lưng không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり気づいちゃいますか。\nさすがは双鉄くんですね」
2749 = "「Quả nhiên là anh nhận ra sao. Không hổ danh là anh Soutetsu nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「腰、少し疲れがたまりやすいだけなんです。\nお医者さんにも行きましたけど、問題ないって」
2601 = "「Lưng tôi, chỉ là hơi dễ bị mỏi thôi. Tôi cũng đi khám bác sĩ rồi, nhưng họ bảo không có vấn đề gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2453 = "「Hừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ただ、わたし臆病だから。ちょっと怖いかな？　って、\nそういうとき、慎重にしてるだけなんです」
2246 = "「Chỉ là, tôi nhát gan thôi. Liệu có nguy hiểm không nhỉ? Nghĩ vậy, những lúc đó, tôi chỉ cẩn thận một chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば安心した」
2995 = "「Vậy sao. Nếu thế thì tôi yên tâm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、僕はお先に失礼する」
3023 = "「Vậy, tôi xin phép đi trước.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。いってらっしゃい。\nわたしもこれから市議会なんです」
2437 = "「A, vâng. Đi đường cẩn thận. Tôi cũng sắp phải đi họp hội đồng thành phố rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば、夜にでも電話で報告しよう」
2998 = "「Vậy sao, nếu thế, tối nay tôi sẽ gọi điện thoại báo cáo.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2617 = "「Tôi hiểu rồi.」"
# monologue
# JP: ほっとした息。\nほっとした声。
3424 = "Tiếng thở phào nhẹ nhõm. Giọng nói nhẹ nhõm."
# monologue
# JP: けれども――少しさみしげな。
3273 = "Nhưng――có chút gì đó cô cô đơn."
# 【ポーレット】
# display as 波萊特
# JP: 「電話、楽しみに待ってますね」
2610 = "「Điện thoại, tôi sẽ mong đợi nhé.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いや……先日は失礼しました」
2399 = "「Chà......hôm nọ thật thất lễ quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とんでもないことです。\nこちらこそ、突然にお伺いして」
2931 = "「Không có gì đâu ạ. Chúng tôi mới là người đột nhiên đến thăm.」"
# monologue
# JP: 赤井宮司は、疲れが抜けたご様子だ。
3835 = "Cung tư tế Akai có vẻ đã hết mệt mỏi."
# monologue
# JP: おでこにはもちろん冷却シートの姿は無く、\nハチロクは、密やかに安堵の息を吐く。
3681 = "Tất nhiên trên trán không còn miếng dán hạ sốt, Hachiroku, khẽ thở phào nhẹ nhõm."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「お話をされたい、とのことでしたが」
3032 = "「Hai người nói là muốn nói chuyện, vậy...」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。今日は、鉄道についてのご助言をいただきたく、\nお伺いさせていただきました」
2715 = "「Vâng. Hôm nay, chúng tôi đến thăm để xin ngài lời khuyên về đường sắt.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「鉄道、ですか」
3044 = "「Đường sắt, sao.」"
# monologue
# JP: 単刀直入に切り出せば、\nゆっくりと、赤井宮司が振り返る。
3559 = "Mở lời trực tiếp, cung tư tế Akai từ từ quay lại."
# monologue
# JP: その目線の先、部屋の奥、\n僕のとよく似た、革の鞄が置かれている。
3546 = "Nơi ánh mắt ngài ấy hướng đến, ở góc phòng, có đặt một chiếc cặp da rất giống của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄にお勤めだったと人に聞きましたが――\n宮司は、機関士でいらっしゃったのですか？」
2620 = "「Tôi nghe người ta nói ngài từng làm việc ở Đường sắt Hoàng gia cũ―― Cung tư tế, ngài từng là lái tàu sao?」"
# monologue
# JP: たずねた途端、宮司の表情が柔らかみを増す。\n「わかってらっしゃる」――顔が、言葉を発してる。
3792 = "Ngay khi tôi vừa hỏi, nét mặt cung tư tế trở nên hiền hòa hơn. 『Cậu hiểu rõ đấy』――Khuôn mặt ngài ấy đang nói như vậy."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「機関士も経験しましたが、最後は運転士でした。\n[こくら,1]粉蔵の試験区間で、\\x%l電車;#00ffc040;電車%l;#;運転を」
2580 = "「Tôi cũng từng trải qua vị trí lái tàu (kikanshi), nhưng cuối cùng thì tôi là người điều khiển tàu (untenshi). Ở đoạn đường thử nghiệm Kokura, tôi đã điều khiển \\x%l電車;#00ffc040;tàu điện%l;#;.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2714 = "「Chà!」"
# monologue
# JP: ハチロクの素直な感嘆の声。
3305 = "Tiếng cảm thán chân thành của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、存じ上げませんでした。\n[こくら,1]粉蔵の機関区でも、\\x%l電車;#00ffc040;電車%l;#;の運用を試験していたのですね」
3004 = "「Tôi không hề biết đấy. Ngay cả ở khu đầu máy Kokura, cũng đã thử nghiệm vận hành \\x%l電車;#00ffc040;tàu điện%l;#; sao.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ。[ホッカイドウ,2]北開道、[シコク,1]四國、[キュウシュウ,1]九洲――[ヒノモト,2]日ノ本全土で。\n帝鉄は\\x%l電車;#00ffc040;電車%l;#;こそを復活の切り札にと、必死でした」
2693 = "「Vâng. Hokkaido, Shikoku, Kyushu――Trên toàn cõi Hinomoto. Đường sắt Hoàng gia đã tuyệt vọng coi \\x%l電車;#00ffc040;tàu điện%l;#; chính là con bài tẩy để phục sinh.」"
# monologue
# JP: 元帝鉄のレイルロオドのハチロクに、\n赤井宮司は、まるで１から教えるような話しぶりだ。
3834 = "Đối với Hachiroku, một Railord của Đường sắt Hoàng gia cũ, cung tư tế Akai nói chuyện như thể đang dạy lại từ đầu."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「最晩年の帝鉄は、経営資源の全てを電化に投資し、\nしかしリターンを得ることが出来ず、滅んだのです」
2546 = "「Đường sắt Hoàng gia những năm cuối đời đã đầu tư toàn bộ nguồn lực kinh doanh vào việc điện khí hóa, nhưng không thu được lợi nhuận, và đã sụp đổ.」"
# 【ハチロク】
# display as 八六
# JP: 「そうでしたか……」
2712 = "「Ra là vậy sao......」"
# monologue
# JP: 感慨深げな長嘆息。\nそれで、僕もようやく気づく。
3309 = "Tiếng thở dài đầy cảm xúc. Nhờ đó, tôi cũng chợt nhận ra."
# monologue
# JP: 帝鉄の末期を知れどハチロクは、事故で眠ったそのために、\n最晩年の姿を恐らく、知らないのだと。
3321 = "Dù biết về sự kết thúc của Đường sắt Hoàng gia, nhưng Hachiroku, vì đã ngủ say sau vụ tai nạn, có lẽ không biết về bộ dạng của nó trong những năm tháng cuối cùng."
# 【ハチロク】
# display as 八六
# JP: 「しかし、その投資は完全なる徒花とは終わらず、\n形を変えて、のちの[ひろしま,1]廣島で花開いたのですね？」
2248 = "「Nhưng, khoản đầu tư đó không hoàn toàn là hoa nở không kết trái, mà đã thay đổi hình thức, và nở rộ ở Hiroshima sau này đúng không ạ?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ヒロデン,5]廣島電気鉄道のことですか。\nなるほど――そう考えれば、我々も多少は報われますか」
2689 = "「Ý cô là Đường sắt Điện lực Hiroshima sao. Ra là vậy――nếu nghĩ như thế, thì chúng tôi cũng được đền đáp phần nào nhỉ.」"
# monologue
# JP: しみじみと、赤井宮司は目を閉じる。
3830 = "Cung tư tế Akai nhắm mắt lại đầy thấm thía."
# monologue
# JP: 旧帝鉄の残影を、\nまぶたの裏に、まるで描いているかのように。
3487 = "Như thể đang vẽ lại tàn ảnh của Đường sắt Hoàng gia cũ bên trong mí mắt."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「と。自己紹介もせずに昔話を失礼しました。\n私はこの[やしろ]社の宮司、赤井[きよはる,1]清春です」
2401 = "「Ái chà. Thật thất lễ khi chưa tự giới thiệu mà đã kể chuyện xưa. Tôi là cung tư tế của đền này, Akai Kiyoharu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、こちらこそいきなりの失礼を。\n僕は――」
2591 = "「A, chúng tôi mới là người thất lễ vì đột ngột đến. Tôi là――」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「存じてますよ。右田双鉄君」
2619 = "「Tôi biết cậu. Cậu Migita Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
3068 = "「!?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そしてお連れは、8620形のトップナンバーレイルロオド。\nつまりは、“ハチロク”さんで間違いないですか？」
2898 = "「Và người đi cùng là Railord cỗ máy chuyên dụng số hiệu đầu tiên của dòng 8620. Nói cách khác, cô chắc chắn là cô “Hachiroku” đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「ご慧眼恐れいります、赤井運転士」
2961 = "「Ngài thật tinh tường, lái tàu Akai.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「元・運転士ですよ。今は、ただの宮司です」
2672 = "「Là cựu lái tàu thôi. Bây giờ, tôi chỉ là một cung tư tế.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、赤井宮司」
2503 = "「Tôi đã hiểu, cung tư tế Akai.」"
# monologue
# JP: 当然のように宮司の言葉を受けるハチロク。\nだが、僕は――疑問の方が先に立つ。
3307 = "Hachiroku đón nhận lời của cung tư tế như một lẽ đương nhiên. Nhưng tôi thì――câu hỏi lại xuất hiện trước."
# 【双鉄】
# display as 雙鐵
# JP: 「僕と、ハチロクのことまでご存じいただいていたのは\n一体何故です？」
2571 = "「Rốt cuộc tại sao ngài lại biết cả về tôi và Hachiroku vậy?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ハチロクさんは、[ハチロクニイマル,3]8620形蒸気機関車のレイルロオドです。\nそして、8620形は、非常に数多く作られたのですよ」
2335 = "「Cô Hachiroku là Railord của đầu máy hơi nước dòng 8620. Và, dòng 8620 được chế tạo với số lượng rất lớn đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「『鉄路あるところ、ハチロクの機影見えざるは無し』\nとまで讃えられたものです」
2811 = "「Đã từng được ca ngợi đến mức, 『Nơi nào có đường sắt, nơi đó không thể không thấy bóng dáng Hachiroku』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク？　8620形の総称、いや愛称というべきか？\nそれも、お前と同じハチロクなのか？」
2339 = "「Hachiroku? Tổng danh xưng của dòng 8620, à không, phải gọi là tên thân mật sao? Cái đó, cũng là Hachiroku giống em sao?」"
# 【ハチロク】
# display as 八六
# JP: 「そうです。レイルロオド・ハチロクは、\nトップナンバー機であるわたくしのみの呼称です」
2784 = "「Đúng vậy. Railord Hachiroku, là danh xưng chỉ dành riêng cho tôi, cỗ máy số hiệu đầu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2996 = "「這樣啊」" 
# monologue
# JP: だいぶ話が見えてきた。
3538 = "Tôi đã hiểu ra được phần lớn câu chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「粉蔵の機関区にも、[ハチロクニイマル,3]8620形は配備されていた。ゆえ、\n8620形レイルロオドの姿を赤井宮司は見知っていた」
2530 = "「Khu đầu máy Kokura cũng được trang bị dòng 8620. Do đó, cung tư tế Akai đã biết đến hình dáng của Railord dòng 8620.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「姿、というか共通した特徴ですな。\nそれ以外の個体差は、かなりありますので」
2485 = "「Hình dáng, hay nói đúng hơn là đặc điểm chung. Vì ngoài những cái đó ra thì sự khác biệt giữa các cá thể là khá lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2352 = "「Ra là vậy.」"
# monologue
# JP: そこまでの事実は確定できた。\nならば、その先は一直線だ。
3471 = "Sự thật đến đó đã được xác định. Vậy thì, phần tiếp theo sẽ đi thẳng vào vấn đề."
# 【双鉄】
# display as 雙鐵
# JP: 「その上でハチロクには、トップナンバー機たる\n目印か何かがあるのですね？」
2900 = "「Dựa vào đó, Hachiroku có dấu hiệu hay gì đó để nhận biết là cỗ máy số hiệu đầu tiên đúng không?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「一般的な一人称を使うのです。\nトップナンバーレイルロオドは」
3063 = "「Cô ấy sử dụng đại từ nhân xưng ngôi thứ nhất thông thường. Đối với Railord cỗ máy số hiệu đầu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一般的な一人称？」
2723 = "「Đại từ nhân xưng ngôi thứ nhất thông thường?」"
# monologue
# JP: ハチロクは、自らのことを“わたくし”と呼ぶ。
3314 = "Hachiroku tự xưng mình là “Watashi”."
# monologue
# JP: 僕が他に知る唯一のレイルロオドのれいなは、\n自らのことを、確か、“れいな”と――ああ！
3884 = "Railord duy nhất khác mà tôi biết là Reina, chắc chắn em ấy tự xưng là, “Reina”――À!"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。トップナンバー以外のレイルロオドは、\n自らのことを、固有の機体愛称で呼ぶのですね？」
2354 = "「Vậy sao. Các Railord không phải cỗ máy số hiệu đầu tiên, sẽ tự gọi mình bằng tên thân mật của cỗ máy đó đúng không?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そのとおりです」
2698 = "「Đúng là như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、お話を聞く限り、例えばハチロクの妹たちは、\nかなりの数がいそうに思えますが……」
2249 = "「Nhưng, theo như những gì tôi nghe được, ví dụ như các em gái của Hachiroku, tôi nghĩ số lượng có vẻ khá lớn......」"
# 【ハチロク】
# display as 八六
# JP: 「直系の妹でしたら６７１人です」
2829 = "「Nếu là em gái trực hệ thì có 671 người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ろっぴゃくななじゅういち」
2340 = "「Sáu trăm bảy mươi mốt.」"
# monologue
# JP: ハチロクも合わせれば総勢672人か。\nそれは、さぞかし華やかだろうが――
3336 = "Nếu tính cả Hachiroku thì tổng cộng là 672 người sao. Như thế thì, hẳn là lộng lẫy lắm nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけのレイルロオドに別々の愛称とは……\nつける方も、困ったりせぬものですか？」
2922 = "「Từng đó Railord với những tên thân mật khác nhau...... Người đặt tên không thấy khó khăn sao?」"
# 【ハチロク】
# display as 八六
# JP: 「一箇所に集まるものでも、\n[いっとき,1]一時に全員が可動していたわけでもございませんし――」
2813 = "「Cũng không phải tập trung ở một chỗ, hay tất cả mọi người đều hoạt động cùng một lúc――」"
# monologue
# JP: 妹たちのことでも思い出したのだろうか、\nハチロクのまなざしが柔らかくなる。
3258 = "Có lẽ là nhớ đến các em gái, ánh mắt Hachiroku trở nên dịu dàng."
# 【ハチロク】
# display as 八六
# JP: 「トップナンバー以降のレイルロオド愛称は、\nその機関区によってつけかたが大きく異なりますから」
3047 = "「Tên thân mật của các Railord từ sau cỗ máy số hiệu đầu tiên, cách đặt tên khác nhau rất nhiều tùy thuộc vào khu đầu máy đó.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「粉蔵では相棒の機関士が名づけて登録をしていましたね。\n[ヤエ,1]八重、[リッカ,1]六花、[フタバ,1]二葉など、８６２の何れかを[ハチロク,3]8620形では」
2768 = "「Ở Kokura thì lái tàu cộng sự sẽ đặt tên và đăng ký. Như Yae, Rikka, Futaba, chọn bất kỳ số nào liên quan đến 862 cho dòng 8620.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、雅ですこと。[ていおう,1]帝央では、\nハロ１号、ハロ２号の連番呼称でしたのに」
2989 = "「Chà, thật thanh tao. Ở Teio, lại là tên gọi theo số thứ tự Haro 1, Haro 2 cơ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはあまりにも無味乾燥だな――\nではなく」
3000 = "「Như thế thì quá nhạt nhẽo rồi―― À không.」"
# monologue
# JP: 危うい。\n話が盛大に脱線――ではなく、寄り道していた。
3231 = "Nguy hiểm thật. Câu chuyện đang trật bánh nghiêm trọng――à không, đang đi chệch hướng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕のことをご存知いただいていたのは、それでは？」
3021 = "「Vậy việc ngài biết về tôi, là vì sao?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「来てくださったではないですか。\nご一家でご参拝に」
2304 = "「Cậu đã từng đến đây mà. Cùng gia đình đến lễ bái.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――記憶しておりますが」
2986 = "「Chuyện đó――tôi có nhớ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「その折、頼まれたのです。右田さん――\nあなたの祖父の、汰斗さんから」
3026 = "「Lúc đó, tôi đã được nhờ cậy. Từ ông Migita―― Ông nội của cậu, ông Taito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんが……僕のことを？」
2781 = "「Ông Taito......nhờ cậy về tôi sao?」"
# monologue
# JP: 赤井宮司は静かに頷き、僕の目を見る。
3838 = "Cung tư tế Akai lặng lẽ gật đầu, nhìn vào mắt tôi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「『この子はもう一生分の不幸を負った。\nこの先は幸せだけを得られるように見守ってくれ』、と」
1810 = "「『Đứa bé này đã gánh chịu bất hạnh của cả một đời người rồi. Từ nay về sau, xin hãy dõi theo để nó chỉ nhận được hạnh phúc thôi』, ông ấy đã nói vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――そうだったんですか」
1798 = "「――Ra là vậy sao.」"
# monologue
# JP: 幸せが何で、それを得るのはどうすればいいのか、\n僕には全くわからない。
3893 = "Hạnh phúc là gì, và làm thế nào để có được nó, tôi hoàn toàn không biết."
# monologue
# JP: けれども遺された言葉を伝えてもらえたことが、\nそれだけでもう、幸せであるようにも素直に思える。
3271 = "Nhưng được truyền đạt lại những lời nhắn gửi cuối cùng đó, chỉ vậy thôi tôi cũng đã thành thực cảm thấy hạnh phúc rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1811 = "「…………」" 
# monologue
# JP: 感謝を、伝えたいのだけれど。\n言葉を上手く見つけられない。
3543 = "Tôi muốn bày tỏ lòng biết ơn. Nhưng lại không tìm được từ ngữ thích hợp."
# monologue
# JP: 赤井宮司はごく穏やかに微笑んで、\nハチロクを見て、また僕を見る。
3445 = "Cung tư tế Akai mỉm cười thật hiền từ, nhìn Hachiroku, rồi lại nhìn tôi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「さて、鉄道の話でしたね。\nご助言ということでしたが、具体的には、何についてを」
2495 = "「Nào, là chuyện về đường sắt nhỉ. Cậu nói là muốn xin lời khuyên, cụ thể là về việc gì.」"
# monologue
# JP: 背筋が伸びる。
3551 = "Tôi thẳng lưng lên."
# monologue
# JP: 授けていただけた機会なら、\nそれを活かさねば恩知らずになる。
3583 = "Nếu đã được trao cơ hội, mà không tận dụng nó thì thật là vô ơn."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸気機関車の修復について、お伺いできればと。\n僕達はそれを観光復権のきっかけにしたいと考えてます」
2590 = "「Tôi muốn hỏi về việc phục hồi đầu máy hơi nước. Chúng tôi đang suy nghĩ muốn lấy đó làm cơ hội để chấn hưng du lịch.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ＳＬで観光復権ですか」
3056 = "「Chấn hưng du lịch bằng SL sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はじめは、ぼんやりと出来そうに思っていました。が、\nクマ川下りを経験し、容易ではないとも理解しました」
2576 = "「Lúc đầu, tôi cứ mơ hồ nghĩ là có thể làm được. Nhưng, sau khi trải nghiệm đi thuyền xuôi dòng Kuma, tôi cũng hiểu ra là không hề dễ dàng.」"
# monologue
# JP: 蓑笠老人が見せようとした、“今の御一夜観光の実態”。\n――収益不足による人材流失と、空洞化が産む悪循環と。
3758 = "“Thực trạng du lịch Ohimitera hiện nay” mà ông lão Minokasa muốn cho tôi thấy. ――Chảy máu chất xám do thiếu hụt lợi nhuận, và vòng luẩn quẩn do sự trống rỗng tạo ra."
# monologue
# JP: 見たまま感じたままを、素直に、\n自分の言葉になおして伝える。
3541 = "Những gì nhìn thấy, cảm nhận được, tôi thành thật chuyển thành lời nói của mình và truyền đạt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ですから、今は考えをもう一歩進めました。\n8620の修復自体を、ある種の見本としていきたい、と」
2636 = "「Chính vì vậy, bây giờ tôi đã tiến thêm một bước trong suy nghĩ. Muốn biến bản thân việc phục hồi 8620 thành một loại hình mẫu.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「見本」
2858 = "「Hình mẫu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、モデルケースといってもいいかもしれません。\n復活は無理ではないと示し、ひとつの旗印としたい」
2633 = "「Hoặc có thể gọi là trường hợp kiểu mẫu cũng được. Tôi muốn cho thấy sự phục sinh không phải là không thể, và biến nó thành một ngọn cờ đầu.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「無理ではない、と、どのように示されますか？」
2257 = "「Không phải là không thể, cậu định chứng minh điều đó như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、8620の復活と走行をもってです。\nそうするために必要な作業を、できるだけ御一夜でと」
2818 = "「Tất nhiên là bằng sự phục sinh và lăn bánh của 8620. Để làm được điều đó, tôi muốn thực hiện các công việc cần thiết ở Ohimitera càng nhiều càng tốt.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「御一夜に、\n人と技術とを集める、というお考えでしょうか」
2937 = "「Ý cậu là, tập trung con người và công nghệ ở Ohimitera sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのようにできればと思っています。\nそのため、今は協力者を探している段階です」
2906 = "「Tôi đang mong muốn có thể làm như vậy. Vì thế, hiện tại chúng tôi đang trong giai đoạn tìm kiếm người hợp tác.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですか」
# 2996 = "「這樣啊」" 
# monologue
# JP: 小さく頷き、\n赤井宮司は今度はハチロクへと向きなおる。
3837 = "Khẽ gật đầu, cung tư tế Akai lần này quay sang Hachiroku."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ハチロクニイマル,3]8620修復のための計画は？\nどの程度まで進んでいますか？」
3033 = "「Kế hoạch phục hồi 8620 thì sao? Đã tiến triển đến mức độ nào rồi?」"
# 【ハチロク】
# display as 八六
# JP: 「それは――その」
3009 = "「Chuyện đó――ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「現状版の、要修復事項のリストが、これです」
2993 = "「Đây là danh sách các hạng mục cần phục hồi phiên bản hiện tại.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「拝見しましょう」
2616 = "「Để tôi xem.」"
# monologue
# JP: 赤井宮司の視線がリストの上へと落ちる。\nハチロクも緊張するのか、唇をきゅっと引き結んでいる。
3833 = "Ánh mắt của cung tư tế Akai lướt trên danh sách. Hachiroku có lẽ cũng căng thẳng, mím chặt môi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「……いくつか、基本的なデータが抜けているようですが、\nそれは――」
1842 = "「......Có vẻ như thiếu một vài dữ liệu cơ bản, cái đó là――」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしの、機能低下に伴うものです。\nデータを上手く引き出せていないように思えます」
2687 = "「Là do sự suy giảm chức năng của tôi. Có vẻ như tôi không thể trích xuất dữ liệu một cách trơn tru.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「それは」
2992 = "「Đó là」"
# 【ハチロク】
# display as 八六
# JP: 「おそらく、事故の影響によるものではないかと」
2569 = "「Có lẽ, là do ảnh hưởng của vụ tai nạn.」"
# monologue
# JP: 赤井宮司の言葉を遮るような、ハチロクの声。\nしかし宮司は、それさえ穏やかに受け入れる。
3313 = "Giọng của Hachiroku như muốn ngắt lời cung tư tế Akai. Nhưng cung tư tế, thậm chí còn điềm tĩnh đón nhận điều đó."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「[ハチロク,3]8620形トップナンバー機……\nあの事故の、ですか」
2718 = "「Cỗ máy chuyên dụng số hiệu đầu tiên của dòng 8620...... Là của vụ tai nạn đó, sao.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――そのように考えております」
2574 = "「Tôi――đang nghĩ như vậy.」"
# monologue
# JP: 遠く、粉蔵の機関区づとめだったという赤井宮司。\nその人が、“あの事故”として承知している。
3589 = "Cung tư tế Akai, người từng làm việc ở khu đầu máy Kokura xa xôi. Người đó, biết về nó như là “vụ tai nạn đó”."
# monologue
# JP: ……ハチロクの経験した事故もまた、\nあるいは帝鉄史に残るほど、苛烈なものであったのだろう。
1777 = "......Vụ tai nạn mà Hachiroku trải qua, có lẽ thảm khốc đến mức lưu danh trong lịch sử Đường sắt Hoàng gia."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ふぅ」
2396 = "「Phù」"
# monologue
# JP: とんとんと、几帳面にリストの書類をまとめなおし、\n僕に手渡し戻してくれる。
3831 = "Gõ gõ, sắp xếp lại tập tài liệu danh sách một cách ngăn nắp, và trao lại cho tôi."
# monologue
# JP: そうして赤井宮司はじっと、\n僕を、ハチロクを順々に、見据える。
3253 = "Rồi cung tư tế Akai chăm chú, nhìn thẳng vào tôi, rồi lần lượt nhìn sang Hachiroku."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご助言を、させていただけば良いのですか？」
2273 = "「Tôi đưa ra lời khuyên, là được chứ gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、そう願えればと」
2701 = "「Vâng, tôi mong ngài sẽ làm vậy.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「未来のことなどわかりませんし、\nあなたにとっての正解が、幸せが何かもわかりません」
2613 = "「Tôi không biết những chuyện của tương lai, cũng không biết câu trả lời đúng đắn, hay hạnh phúc đối với cậu là gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2606 = "「Vâng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「その上で行う助言ですから、恐らく何も示しはしません。\nその程度でもよろしいでしょうか？」
2663 = "「Vì là lời khuyên được đưa ra dựa trên điều đó, nên có lẽ sẽ không chỉ ra được điều gì cả. Như vậy cũng được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「むしろ、望むところです」
2999 = "「Thậm chí, đó chính là điều tôi mong muốn.」"
# monologue
# JP: ポーレットが教えてくれたように、\n赤井宮司は影響を与えたがらない人物らしい。
3390 = "Giống như những gì Paulette đã nói cho tôi biết, cung tư tế Akai có vẻ là người không thích gây ảnh hưởng."
# monologue
# JP: が、僕とても、\n自分の為すべき決断を、誰に委ねたいとも思わない。
3245 = "Nhưng, tôi cũng vậy, tôi không muốn giao phó quyết định mình phải làm cho bất kỳ ai."
# 【双鉄】
# display as 雙鐵
# JP: 「いただいたご助言を判断の材料とし、\n自分自身で決断したいと思っています」
2609 = "「Tôi muốn dùng lời khuyên ngài ban cho làm tư liệu phán đoán, và tự mình đưa ra quyết định.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですか。では、まずはハチロクさんについて」
2683 = "「Vậy sao. Vậy thì, trước tiên là về cô Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2500 = "「Vâng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご不調とのこと。\n登呂流湯のご主人に相談されると良いかと思います」
2758 = "「Về việc cô không khỏe. Tôi nghĩ cô nên đến thảo luận với chủ nhà tắm Tororyu-yu.」"
# 【ハチロク】
# display as 八六
# JP: 「登呂流湯、の？」
2821 = "「Nhà tắm Tororyu-yu, sao ạ?」"
# monologue
# JP: 思いもかけぬ名前を聞かされ、ハチロクと顔を見合わせる。\nハチロクの口は、ぽかんと開いてしまっている。
3746 = "Được nghe một cái tên không ngờ tới, tôi và Hachiroku nhìn nhau. Miệng Hachiroku há hốc ra."
# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯のご主人というと、\nあの……ご年配のご婦人ですか？」
2822 = "「Chủ nhà tắm Tororyu-yu mà ngài nói, là......bà cụ lớn tuổi đó sao ạ?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「あの方は、一流のレイルロオド職人です。現役の。\n今も、れいなさんを定期的に診てらっしゃいますし――」
2489 = "「Bà ấy là một nghệ nhân chế tác Railord bậc thầy. Vẫn đang tại vị. Bây giờ, bà ấy vẫn đang khám định kỳ cho cô Reina――」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2835 = "「Trời ạ.」"
# monologue
# JP: ハチロクの驚きを見て、\nもったいぶるように、赤井宮司はひといきを置く。
3829 = "Nhìn thấy sự ngạc nhiên của Hachiroku, như thể đang làm ra vẻ quan trọng, cung tư tế Akai dừng lại một nhịp."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「九洲最後の……最新のトップナンバー・レイルロオドを\n手がけた方でもあります。腕に間違いはありません」
2264 = "「Bà ấy cũng là người đã chế tác......Railord cỗ máy chuyên dụng số hiệu đầu tiên mới nhất, cuối cùng của Kyushu. Tay nghề của bà ấy thì không phải bàn cãi.」"
# 【ハチロク】
# display as 八六
# JP: 「トップナンバー機のご製造まで！\nああ、そんな素晴らしい方がまさかこんな近くに」
2857 = "「Đến mức chế tác cả cỗ máy chuyên dụng số hiệu đầu tiên cơ ạ! Ôi, không ngờ một người tuyệt vời như vậy lại ở ngay gần đây.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「エアロ＝クラフテック社からの好条件での勧誘も、\n鉄道への愛ゆえ、断り続けてらした方です」
2855 = "「Lời mời với điều kiện hấp dẫn từ công ty Aero-Craftech, bà ấy cũng liên tục từ chối vì tình yêu dành cho đường sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、是非！\n是非ともわたくし、見ていただきます」
2661 = "「Nếu vậy thì, nhất định! Nhất định tôi phải nhờ bà ấy xem giúp.」"
# monologue
# JP: ならば安心というように、\n赤井宮司は穏やかな目でハチロクを見る。
3832 = "Như muốn nói vậy thì yên tâm rồi, cung tư tế Akai nhìn Hachiroku bằng ánh mắt hiền từ."
# monologue
# JP: そして一転――\n僕へと向く目は、厳しい光を宿している。
3670 = "Và rồi quay ngoắt lại―― Ánh mắt hướng về phía tôi, mang theo tia sáng nghiêm khắc."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「次に、[ハチロクニイマル,3]8620改修についてですが」
2652 = "「Tiếp theo, về việc phục hồi 8620.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2933 = "「Vâng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「順番が、大きく違うように思います」
2623 = "「Tôi nghĩ, thứ tự của các cậu đang sai lầm nghiêm trọng.」"
# monologue
# JP: 長い沈黙。\n僕は、答えを発せない。
3521 = "Sự im lặng kéo dài. Tôi không thốt nên lời."
# monologue
# JP: やがて深く息が吐かれて、\nやむなしとでもいわんばかりに、宮司が重そうに口を開く。
3444 = "Một lúc sau, cung tư tế thở dài thườn thượt, như thể nói hết cách rồi, ngài ấy nặng nề mở lời."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「まっさきに集めるべきは、協力者より――\nお金かと」
3062 = "「Thứ cần thu thập đầu tiên, không phải là người hợp tác―― Mà là tiền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2419 = "「Hừm.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
3053 = "「Ngài Soutetsu?」"
# monologue
# JP: 僕の逡巡を悟ってか、\nハチロクは、いたわるような声をだす。
3268 = "Có lẽ nhận ra sự do dự của tôi, Hachiroku cất giọng như muốn an ủi."
# 【ハチロク】
# display as 八六
# JP: 「随分と現実的な方でしたね、赤井宮司は」
2783 = "「Ngài ấy là một người khá thực tế nhỉ, cung tư tế Akai ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「現実的……だな。\nそれ故、自分の見込みの甘さを思い知らされた」
2848 = "「Thực tế......nhỉ. Vì thế, tôi mới nhận ra sự suy tính non nớt của bản thân.」"
# monologue
# JP: 帝鉄の末路を知る赤井宮司。\n衰退に、まさに晒されている御一夜の人たち。
3836 = "Cung tư tế Akai biết về kết cục của Đường sắt Hoàng gia. Những người dân Ohimitera đang thực sự phơi mình trước sự suy thoái."
# monologue
# JP: 帝都帰りの気楽な僕の目とは、\n見えているもの、見るべきものが、まるで違う。
3388 = "So với con mắt vô tư của một kẻ từ Đế đô trở về như tôi, những gì họ đang thấy, những gì họ phải thấy, hoàn toàn khác biệt."
# 【双鉄】
# display as 雙鐵
# JP: 「理想で飯が食えるのならば、鉄道も川下りも衰退しない。\nまず示すべきは、『飯を食えるという事実』か」
2909 = "「Nếu lý tưởng có thể mài ra ăn được, thì đường sắt hay chèo thuyền xuôi dòng đã chẳng suy thoái. Điều cần thể hiện trước tiên, là 『sự thật có thể mài ra ăn được』 sao.」"
# monologue
# JP: 8620の改修には、当然、かなりの時間がかかる。
3280 = "Việc phục hồi 8620, tất nhiên, sẽ tốn khá nhiều thời gian."
# monologue
# JP: ボランティアに、集まってくれる人がいたとして、\n熱意だけでは……恐らく半月も保たないだろう。
3364 = "Giả sử có người tập hợp lại làm tình nguyện viên, thì chỉ với lòng nhiệt huyết......có lẽ sẽ không trụ nổi nửa tháng."
# 【双鉄】
# display as 雙鐵
# JP: 「協力者を集めるより先、\n作業が始まった場合にそれを維持できるだけの準備を」
2773 = "「Trước khi tập hợp người hợp tác, phải chuẩn bị đủ để duy trì công việc khi nó bắt đầu.」"
# 【ハチロク】
# display as 八六
# JP: 「そして、準備とはおおむね、金策。\nおっしゃられること、ごもっともではあるのですけど」
2637 = "「Và, chuẩn bị ở đây đại khái là, xoay sở tiền bạc. Những gì ngài ấy nói, tuy là rất có lý nhưng mà.」"
# monologue
# JP: ハチロクはハチロクで、\n僕とは違った部分に引っかかっている。
3452 = "Hachiroku có vẻ như, đang vướng mắc ở một điểm khác với tôi."
# monologue
# JP: 赤井宮司がくれた助言の中にあった、\n『銀行への相談』が、まず間違いなくそれだろう。
3332 = "Trong số những lời khuyên mà cung tư tế Akai đưa ra, 『Thảo luận với ngân hàng』, chắc chắn là điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……案ずるより産むが易し、か」
1849 = "「......Cứ bắt tay vào làm mới thấy dễ hơn là ngồi lo lắng, sao.」"
# monologue
# JP: どの選択肢も気がすすまない。\nそうした時には、最も早く取り掛かれるものを選ぶ。
3668 = "Lựa chọn nào cũng không muốn làm. Những lúc như thế, hãy chọn việc có thể bắt tay vào làm nhanh nhất."
# monologue
# JP: 今までやってきた方法を、今回も取ることにする。
3530 = "Phương pháp tôi đã làm từ trước đến nay, lần này tôi cũng sẽ chọn nó."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。蔵にむかうぞ。\nまずは、真闇姉に相談してみよう」
2333 = "「Hachiroku. Chúng ta đến nhà xưởng ủ rượu thôi. Trước tiên, hãy thử thảo luận với chị Mayami xem sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様がそれでよろしいのでしたら、\nハチロクはお供いたします」
2499 = "「Vâng. Nếu ngài Soutetsu thấy vậy là ổn, thì Hachiroku sẽ đi cùng ngài.」"
# monologue
# JP: ……それで良いのか。\n自分でもどうにも判断できず、だから無言で蔵へと向かう。
1780 = "......Như vậy có ổn không. Bản thân tôi cũng không thể phán đoán được, nên tôi lặng lẽ hướng đến nhà xưởng ủ rượu."
# 【真闇】
# display as 真闇
# JP: 「あら、双ちゃんにハチロクちゃん。\n[じょうぞうぐら,2]醸造蔵に来るとは、めずらしかとねぇ」
2404 = "「Ây da, bé Sou và bé Hachiroku. Đến \\x%l醸造蔵;#00ffc040;nhà xưởng ủ rượu%l;#; thế này, hiếm thấy ghê nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に、相談したいことがあってきた」
2592 = "「Bọn em có chuyện muốn thảo luận với chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「相談ごと？　なら、居間にあがると？」
2734 = "「Chuyện cần thảo luận? Vậy thì, lên phòng khách nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。ここで――ここの方がいい」
2234 = "「Không. Ở đây――ở đây tốt hơn.」"
# monologue
# JP: 時間を置けば、どんどん話しづらくなる。\nそれに丁度、日々姫の姿も見当たらない。
3574 = "Cứ để lâu, sẽ càng khó nói hơn. Hơn nữa, đúng lúc cũng không thấy bóng dáng Hibiki đâu."
# 【真闇】
# display as 真闇
# JP: 「なんねぇ、おっかない顔して」
2560 = "「Sao thế, mặt mũi đáng sợ quá vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今、ポーレットたちと計画していることがある」
2612 = "「Hiện tại, em đang lên kế hoạch cho một việc cùng với nhóm Paulette.」"
# monologue
# JP: 8620発見のこと、改修計画のこと。\n蓑笠老人、凪とふかみ、赤井宮司から教わったこと。
3542 = "Tôi đã kể lại chuyện phát hiện ra 8620, chuyện kế hoạch phục hồi. Những gì được ông lão Minokasa, Nagi và Fukami, cung tư tế Akai chỉ dạy."
# monologue
# JP: できるかぎりに短くまとめて伝えれば、\nただそれだけで真闇姉は、僕の言葉を先取りしてくる。
3344 = "Chỉ cần tôi tóm tắt và truyền đạt ngắn gọn nhất có thể, chỉ vậy thôi chị Mayami đã đón trước lời của tôi."
# 【真闇】
# display as 真闇
# JP: 「そんなら、双ちゃんは経営資源が欲しいんね？\n右田に頼らず、双ちゃんだけで賄える資源が」
2267 = "「Vậy ra, bé Sou muốn có tài nguyên kinh doanh nhỉ? Tài nguyên mà bé Sou có thể tự mình trang trải, không cần dựa dẫm vào nhà Migita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2420 = "「Ư, ừm.」"
# monologue
# JP: だからだ。\nだから真闇姉には、できれば相談したくなかった。
3608 = "Chính là vì thế. Nên nếu có thể, tôi đã không muốn thảo luận với chị Mayami."
# monologue
# JP: この人に頼る楽さを覚えてしまえば、\n僕の努力する能力は、きっと腐ってしまうだろうから。
3432 = "Bởi vì nếu quen với sự thoải mái khi dựa dẫm vào người này, năng lực nỗ lực của tôi, chắc chắn sẽ bị thui chột."
# 【ハチロク】
# display as 八六
# JP: 「経営資源とは何でしょう？」
2881 = "「Tài nguyên kinh doanh là gì vậy ạ?」"
# monologue
# JP: 予想外の言葉過ぎたのだろう。
3862 = "Có lẽ đó là một từ quá đỗi bất ngờ."
# monologue
# JP: 思わずといった感じで疑問を漏らしたハチロクに、\n真闇姉はごくあっさりと問い返す。
3902 = "Đối với Hachiroku vừa buột miệng thắc mắc như thể vô thức, chị Mayami hỏi ngược lại một cách rất nhẹ nhàng."
# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんにとって、\nお金って、どぎゃんもんかね？」
2526 = "「Đối với bé Hachiroku, tiền bạc, là thứ như thế nào nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「お金……お金は、固定費を削り、\n運賃収入を増やせば、黒字化していくものです」
3043 = "「Tiền bạc......Tiền bạc là thứ sẽ chuyển sang có lãi, nếu cắt giảm chi phí cố định và tăng thu nhập từ giá vé ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うんうん」
2454 = "「Ừm ừm.」"
# 【ハチロク】
# display as 八六
# JP: 「しかし、それでも赤字な場合は、周辺事業で\nお金を稼がねばなりません」
2802 = "「Nhưng, nếu vẫn bị lỗ, thì phải kiếm tiền từ các hoạt động kinh doanh phụ trợ ạ.」"
# 【真闇】
# display as 真闇
# JP: 「周辺事業」
2391 = "「Kinh doanh phụ trợ.」"
# 【ハチロク】
# display as 八六
# JP: 「鉄道会社の広大な敷地面積と集客力を活かしての、\nホテル、観光、商業施設の運営などが代表的なものです」
2312 = "「Tiêu biểu là việc tận dụng diện tích mặt bằng rộng lớn và sức thu hút khách hàng của công ty đường sắt, để vận hành khách sạn, du lịch, cơ sở thương mại và những thứ tương tự ạ.」"
# monologue
# JP: 感心感心、\nそんな風情で真闇姉はおっとり頷く。
3702 = "Đáng khâm phục, đáng khâm phục, Với dáng vẻ đó, chị Mayami điềm đạm gật đầu."
# 【真闇】
# display as 真闇
# JP: 「そんなら、鉄道会社の経営資源は、敷地面積、集客力、\n運賃収入をかせげる列車と人員、ということになると」
3028 = "「Nếu vậy thì, tài nguyên kinh doanh của công ty đường sắt sẽ là, diện tích mặt bằng, sức thu hút khách hàng, đoàn tàu và nhân sự có thể kiếm được thu nhập từ giá vé, nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
2409 = "「A.」"
# monologue
# JP: それで、ハチロクも理解する。
3865 = "Nghe vậy, Hachiroku cũng đã hiểu."
# monologue
# JP: いや、最小手数でハチロクにきちんと理解できるよう、\n真闇姉がハチロクを導いたのだ。
3248 = "Không, để Hachiroku có thể hiểu chính xác với số bước ít nhất, chị Mayami đã dẫn dắt Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「経営資源とは、でしたら――\nそれを使えばお金を稼ぐことができる素材、でしょうか」
2638 = "「Nếu vậy, tài nguyên kinh doanh là―― Là những chất liệu có thể dùng để kiếm tiền, phải không ạ.」"
# 【真闇】
# display as 真闇
# JP: 「そーねえ。普通に使えば普通に稼げて、\n上手に組み合わせれば、どーんと稼げる、そーゆー素材」
2678 = "「Đúng vậy nha. Nếu sử dụng bình thường thì kiếm được bình thường, nếu kết hợp khéo léo thì sẽ kiếm được bộn tiền, là loại chất liệu như vậy đó.」"
# 【ハチロク】
# display as 八六
# JP: 「普通と……上手な組み合わせですか？」
2446 = "「Bình thường và......kết hợp khéo léo sao ạ?」"
# 【真闇】
# display as 真闇
# JP: 「例えばねぇ、ハチロクちゃん。\n見てみぃ？　あの子」
2769 = "「Ví dụ nha, bé Hachiroku. Nhìn xem? Đứa trẻ đó.」"
# monologue
# JP: 真闇姉が指差すその先、\n見覚えの無い従業員が、一生懸命に掃除をしている。
3706 = "Nơi chị Mayami chỉ tay đến, có một nhân viên tôi không quen mặt, đang dọn dẹp rất chăm chỉ."
# 【真闇】
# display as 真闇
# JP: 「あの子の経営資源は、丁寧さと根気、\nよく動く手足と、注意深い目、ゆーとこなんよ」
2288 = "「Tài nguyên kinh doanh của đứa trẻ đó là, sự cẩn thận và kiên nhẫn, tay chân lanh lẹ, và đôi mắt cẩn trọng, là những thứ đó đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「すばらしい美徳だと思います」
2347 = "「Tôi nghĩ đó là những đức tính tuyệt vời.」"
# 【真闇】
# display as 真闇
# JP: 「それを普通に使うて、\n掃除番の時給の750円を稼ぐたい」
2283 = "「Sử dụng nó một cách bình thường, thì sẽ kiếm được mức lương theo giờ của người dọn dẹp là 750 yên nha.」"
# monologue
# JP: 掃除番は、\n蔵に入った新入りがまずまっさきに任される仕事。
3876 = "Dọn dẹp là công việc mà người mới vào xưởng ủ rượu sẽ được giao phó đầu tiên."
# monologue
# JP: 短くて一年、長くて――ずっと。\nそこを越えねば、焼酎造りに携われない。
3716 = "Ngắn thì một năm, dài thì――mãi mãi. Nếu không vượt qua được bước đó, sẽ không thể tham gia vào việc nấu rượu shochu."
# 【真闇】
# display as 真闇
# JP: 「こっちの子は同じ資源に加えて、鼻の良さと経験を\n持ちよるけん、麹番のお仕事をしてもろうとるばい」
3001 = "「Đứa trẻ bên này, ngoài những tài nguyên giống vậy, còn mang theo cái mũi thính và kinh nghiệm, nên được giao làm công việc trông coi men kōji nha.」"
# monologue
# JP: 麹やもろみの温度を一定に保つよう、\n微妙かつ繊細な調整を加え続ける仕事――
3257 = "Công việc liên tục điều chỉnh tinh tế và vi tế, để giữ nhiệt độ của men kōji và cơm rượu luôn ổn định――"
# monologue
# JP: 麹番をしている女性には見覚えがある。\n僕が御一夜を発ったころには、まだ掃除番だった人だ。
3562 = "Tôi có biết người phụ nữ đang làm công việc trông coi men kōji. Khi tôi rời Ohimitera, cô ấy vẫn còn là người dọn dẹp."
# 【真闇】
# display as 真闇
# JP: 「それが出来るようになると、\n時給は一気に1500円にあがるたい」
2904 = "「Khi có thể làm được việc đó, lương theo giờ sẽ tăng vọt lên 1500 yên nha.」"
# 【ハチロク】
# display as 八六
# JP: 「お鼻の良さと経験とが、\nお給料を二倍に跳ね上げるのですか」
2345 = "「Cái mũi thính và kinh nghiệm, đã làm cho tiền lương tăng vọt lên gấp đôi sao ạ.」"
# 【真闇】
# display as 真闇
# JP: 「で、あそこにいるおばちゃんは、今までのものに加え、\nアイディアいう経営資源を持っとるばい」
2800 = "「Và, cô bác ở đằng kia, ngoài những thứ từ trước đến nay, còn sở hữu tài nguyên kinh doanh gọi là ý tưởng nha.」"
# monologue
# JP: ここまで来ると、僕あたりでも名前と顔が一致する。\n桃井さん――右田一酒造元をささえるベテラン蔵人だ。
3465 = "Đến mức này, thì ngay cả tôi cũng có thể ghép tên với khuôn mặt. Cô Momoi――một người thợ nấu rượu kỳ cựu chống đỡ cho nhà sản xuất rượu Migita Ichi."
# 【真闇】
# display as 真闇
# JP: 「豆乳を使ぉて焼酎ばつくる、『豆乳焼酎』いう\n大ヒット商品の産みの親たい」
2487 = "「Là mẹ đẻ của sản phẩm cực kỳ ăn khách tên là 『Shochu Sữa Đậu Nành』, sử dụng sữa đậu nành để nấu rượu shochu nha.」"
# 【ハチロク】
# display as 八六
# JP: 「それだと、時給はいくらになるのですか？」
3019 = "「Nếu vậy, lương theo giờ sẽ là bao nhiêu ạ?」"
# 【真闇】
# display as 真闇
# JP: 「固定給の方は、一日八時間、週六日の労働として――\n時給換算で3000円くらいにはなるたいねぇ」
2490 = "「Về phần lương cố định, làm việc tám tiếng một ngày, sáu ngày một tuần―― Quy ra lương theo giờ thì khoảng 3000 yên nha.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、さらに倍ですね」
2436 = "「Chà, lại gấp đôi nữa nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「その上で、うちは新商品の開発者には、利益の１０％の\nインセンティブ――利益報酬を支払うとるばい」
2894 = "「Hơn nữa, chỗ chúng ta sẽ trả cho người phát triển sản phẩm mới, một khoản tiền thưởng khích lệ――thù lao lợi nhuận bằng 10% lợi nhuận nha.」"
# 【ハチロク】
# display as 八六
# JP: 「１０％の利益報酬」
3072 = "「Thù lao lợi nhuận 10%.」"
# 【真闇】
# display as 真闇
# JP: 「豆乳焼酎が昨年一年間に稼ぎだした利益は、\n実に九千四百万円たい」
2951 = "「Lợi nhuận mà Shochu Sữa Đậu Nành kiếm được trong vòng một năm ngoái, thực sự là chín mươi tư triệu yên nha.」"
# 【ハチロク】
# display as 八六
# JP: 「その十パーセントは、つまり九百四十万円」
3071 = "「Mười phần trăm của số đó, tức là chín triệu bốn trăm nghìn yên.」"
# monologue
# JP: 一秒たらずの短い沈黙。
3236 = "Sự im lặng ngắn ngủi chưa đầy một giây."
# 【ハチロク】
# display as 八六
# JP: 「お掃除番さんの一万二千五百三十四時間分――\n一日八時間労働として、約四年分のお金です！」
2537 = "「Bằng một vạn hai ngàn năm trăm ba mươi tư giờ của người dọn dẹp―― Tính là lao động tám tiếng một ngày, thì là số tiền của khoảng bốn năm!」"
# 【真闇】
# display as 真闇
# JP: 「経験にアイディアを組み合わせるだけで、\nそれだけの不労所得を稼げるゆー実例たい」
2991 = "「Chỉ cần kết hợp kinh nghiệm với ý tưởng, là có thể kiếm được chừng đó thu nhập thụ động, là một ví dụ thực tế nha.」"
# 【ハチロク】
# display as 八六
# JP: 「……経営資源を上手に組み合わせることで、\n生み出せる利益は大きく膨らむ」
1833 = "「......Bằng cách kết hợp khéo léo các tài nguyên kinh doanh, lợi nhuận tạo ra sẽ phình to lên rất nhiều.」"
# monologue
# JP: 大きく、強く、ハチロクは頷く。
3317 = "Hachiroku gật đầu mạnh mẽ, quả quyết."
# 【ハチロク】
# display as 八六
# JP: 「酒蔵でのお仕事も、鉄道会社でのお仕事も、\nその点は、まったくかわらないのですね」
3034 = "「Công việc ở xưởng ủ rượu, hay công việc ở công ty đường sắt, về điểm đó, hoàn toàn không có gì khác biệt nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「うんうん、そこはよーわかってくれたみたいやねぇ」
2455 = "「Ừm ừm, có vẻ em đã hiểu rõ chỗ đó rồi nhỉ.」"
# monologue
# JP: かいぐりかいぐり、大げさにハチロクの頭をなでて、\n真闇姉は、優しい視線と穏やかな問いとを投げかける。
3708 = "Xoa xoa xoa xoa, vuốt ve đầu Hachiroku một cách cường điệu, chị Mayami trao cho em ấy một ánh nhìn dịu dàng và một câu hỏi êm ái."
# 【真闇】
# display as 真闇
# JP: 「その他んとこはどーとや？　\nわからんかったことやら、気になったことやらは」
3007 = "「Còn những chỗ khác thì sao? Có điều gì không hiểu, hay có điều gì bận tâm không?」"
# 【ハチロク】
# display as 八六
# JP: 「あのっ！」
3016 = "「Chỗ này ạ!」"
# monologue
# JP: ビっと挙手。\n真闇姉が頷くのを待ち、ハチロクは早口の言葉を重ねる。
3311 = "Giơ tay cái vút. Đợi chị Mayami gật đầu, Hachiroku tuôn ra một tràng nói nhanh."
# 【ハチロク】
# display as 八六
# JP: 「蒸気が、この蔵には立ち込めています。\nそれに、パイプが……いくつもいくつも走っていますが」
2615 = "「Hơi nước đang bao trùm khắp xưởng ủ rượu này. Hơn nữa, có rất nhiều, rất nhiều đường ống chạy quanh nhưng mà.」"
# 【真闇】
# display as 真闇
# JP: 「温度管理が、\n焼酎造りにはいっとう重要なところばい」
3039 = "「Kiểm soát nhiệt độ, là phần quan trọng nhất trong việc nấu rượu shochu nha.」"
# monologue
# JP: 言いながら、もろみを寝かせるタンクの横に移動する。
3712 = "Vừa nói, chị ấy vừa di chuyển đến bên cạnh bồn chứa ủ cơm rượu."
# monologue
# JP: その脇に走る二本のパイプにはそれぞれ、\n赤と青とのバルブがついている。
3580 = "Trên hai đường ống chạy dọc bên cạnh đó, có gắn van màu đỏ và màu xanh tương ứng."
# 【真闇】
# display as 真闇
# JP: 「赤かバルブのパイプにはお湯。\n青かバルブのパイプには水が走っとるたい」
2868 = "「Đường ống van màu đỏ là nước nóng. Đường ống van màu xanh là nước lạnh chạy qua nha.」"
# monologue
# JP: くん、と真闇姉の鼻先が動く。\n長い指が伸び、青のバルブをわずかに緩める。
3704 = "Chóp mũi chị Mayami khẽ động đậy. Ngón tay dài vươn ra, hơi nới lỏng van màu xanh."
# 【真闇】
# display as 真闇
# JP: 「バルブば緩めれば勢いよー出て、閉めれば止まる。\n単純にそぎゃんして、温度管理ばしとーとね」
2657 = "「Nới lỏng van thì nước sẽ tuôn ra mạnh, đóng lại thì nước sẽ ngừng. Chỉ đơn giản làm như vậy, để kiểm soát nhiệt độ nha.」"
# 【ハチロク】
# display as 八六
# JP: 「お湯は、お湯はどうやって沸かしているのです？」
2932 = "「Nước nóng, nước nóng được đun sôi bằng cách nào vậy ạ?」"
# 【真闇】
# display as 真闇
# JP: 「そりゃあ、当然ボイラばい」
3027 = "「Chuyện đó, đương nhiên là bằng lò hơi rồi.」"
# monologue
# JP: しかし石炭ボイラではなく、軽油が燃料であるらしい。\nそう聞かされて、ハチロクは静かに微笑み返す。
3243 = "Nhưng có vẻ không phải lò hơi than, mà nhiên liệu là dầu diesel. Nghe vậy, Hachiroku khẽ mỉm cười đáp lại."
# 【ハチロク】
# display as 八六
# JP: 「そこは少しだけ残念ですが、それでもとても嬉しいです。\n焼酎造りと蒸気機関車と似たところもあるとわかって」
3050 = "「Điểm đó có hơi đáng tiếc một chút, nhưng tôi vẫn rất vui. Khi biết được việc nấu rượu shochu và đầu máy hơi nước cũng có điểm tương đồng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2427 = "「A!」"
# monologue
# JP: そうだ。そうだ。そうだった。
3451 = "Đúng rồi. Đúng rồi. Đúng là vậy."
# monologue
# JP: 腹を空かせたハチロクの石炭を探していたとき――\n真闇姉は、確か、話していたはずだ。
3318 = "Khi tôi đang tìm kiếm than cho Hachiroku đang đói bụng―― Chắc chắn chị Mayami đã từng nói chuyện này."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、使われていない石炭ボイラが、\nまだこの家にはあると聞いたと記憶しているが」
2839 = "「Chị Mayami, em nhớ chị từng nói là trong nhà này vẫn còn một cái lò hơi than không dùng đến.」"
# 【真闇】
# display as 真闇
# JP: 「あるたい。もっとも、\n使うなら相当に手ばいれんといけんシロモノやけんど」
2738 = "「Có nha. Tuy nhiên, nếu muốn dùng thì phải sửa chữa lại khá nhiều đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「手をいれれば――\n整備修復をすれば使えるということか」
2377 = "「Nếu sửa chữa lại―― Nghĩa là nếu bảo dưỡng phục hồi thì có thể dùng được sao.」"
# 【真闇】
# display as 真闇
# JP: 「保障ば出来んばってん、可能性はあるたい」
2988 = "「Không thể đảm bảo được, nhưng có khả năng nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ」
2667 = "「Nếu vậy thì.」"
# monologue
# JP: まずは石炭ボイラの整備・修復を行おう。
3459 = "Trước tiên hãy tiến hành bảo dưỡng, phục hồi lò hơi than."
# monologue
# JP: それは当然、\n8620のボイラの整備修復にも、繋がっていく経験となる。
3520 = "Đương nhiên, điều đó cũng sẽ trở thành kinh nghiệm dẫn đến việc bảo dưỡng phục hồi lò hơi của 8620."
# 【双鉄】
# display as 雙鐵
# JP: 「そして、石炭ボイラの修復が叶ったときには、\nそれをもって焼酎を作るのだ」
2799 = "「Và, khi việc phục hồi lò hơi than thành công, chúng ta sẽ dùng nó để nấu rượu shochu.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！　石炭ボイラということは」
2431 = "「A! Lò hơi than có nghĩa là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。8620が使うものとまったく同じ石炭を使い、\n水をつかっての焼酎だ」
2786 = "「Đúng vậy. Dùng chính xác cùng loại than mà 8620 sử dụng, và dùng nước đó để nấu rượu shochu.」"
# 【ハチロク】
# display as 八六
# JP: 「蒸気機関車の動力源と、\n同じ材料でつくられる焼酎、ということになるのですね」
2268 = "「Nghĩa là rượu shochu được tạo ra từ cùng một loại vật liệu, với nguồn động lực của đầu máy hơi nước nhỉ.」"
# monologue
# JP: その言い方はかなり良い。\n飲むだけで、力が湧いて来そうな印象を与えてくれる。
3863 = "Cách nói đó khá hay. Mang lại ấn tượng là chỉ cần uống vào, sức mạnh sẽ tuôn trào."
# 【双鉄】
# display as 雙鐵
# JP: 「名付けるなら、そう――\n『蒸気焼酎・おひとよしのハチロク』でどうだろう」
2535 = "「Nếu đặt tên, thì sao nhỉ―― 『Shochu Hơi Nước・Hachiroku Ohimitera』 thì thế nào.」"
# monologue
# JP: 言った瞬間、\nぴょん！　とハチロクが大きく弾む。
3747 = "Khoảnh khắc tôi vừa nói ra, Pyon! Hachiroku nhảy cẫng lên."
# monologue
# JP: 乙女らしさと遠くはなれた仕草が、けれど、\nなんともしとやかにさえ見える。
3599 = "Dù là một cử chỉ khác xa với sự nữ tính, nhưng trông lại có vẻ gì đó thật duyên dáng."
# 【ハチロク】
# display as 八六
# JP: 「素敵です！　わたくし、それでしたら\n異常燃焼を起こしたとしても是非とも飲みたく思います」
2475 = "「Tuyệt quá! Nếu là loại rượu đó thì dù có gây ra hiện tượng cháy bất thường tôi cũng nhất định muốn uống thử.」"
# 【真闇】
# display as 真闇
# JP: 「いける……かもしれんねぇ。\nその[ハチロクニイマル,3]8620やらの修復、とうぜん、公開でやるったい？」
2930 = "「Có thể......làm được đấy nha. Việc phục hồi chiếc 8620 đó, đương nhiên là sẽ làm công khai chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2453 = "「嗯」" 
# monologue
# JP: 感心のあまりこぼれた「ああ」を、\n真闇姉は、同意のそれと受け取ってしまう。
3536 = "Tiếng 「A」 buột miệng thốt ra vì quá khâm phục của tôi, đã bị chị Mayami hiểu nhầm thành sự đồng tình."
# 【真闇】
# display as 真闇
# JP: 「じゃったら、そんときに試作品を売ってみるとよかとね。\n行けそうなら、8620復活とともに本格展開たい」
2668 = "「Vậy thì, lúc đó thử bán sản phẩm dùng thử xem sao nha. Nếu thấy ổn, thì sẽ triển khai chính thức cùng với sự phục sinh của 8620.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしてもらえるなら、助かる」
2921 = "「Nếu được chị làm vậy, thì tốt quá.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん？　ここの杜氏はうちやけんねぇ。\n杜氏の決めよることならそらあ、絶対ばい」
2532 = "「Bé Sou? Trưởng hầm rượu ở đây là chị nha. Nếu là quyết định của trưởng hầm rượu thì đương nhiên là tuyệt đối rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――真闇姉」
2935 = "「Cảm ơn chị――chị Mayami.」"
# monologue
# JP: 深く――自然と頭が下がる。
3555 = "Sâu sắc――tự nhiên cúi đầu."
# monologue
# JP: 真闇姉はこんなにもわずかな時間と言葉で、\n僕に答えを示し、気づかせてくれたから。
3396 = "Bởi vì chỉ với một chút thời gian và lời nói ngắn ngủi như vậy, chị Mayami đã chỉ ra câu trả lời và giúp tôi nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「経営資源を組み合わせる。\nそれにより、利益を何倍にもふくらませる」
2647 = "「Kết hợp các tài nguyên kinh doanh. Nhờ đó, lợi nhuận sẽ tăng lên gấp nhiều lần.」"
# monologue
# JP: 個人レベルで、これほど大きな効果があるのだ。\nならばさらにと――広げていかぬ法は無い。
3283 = "Ở cấp độ cá nhân, đã có hiệu quả lớn đến thế. Nếu vậy thì――không có lý do gì lại không mở rộng nó ra thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、ハチロクのオーナーだ」
1840 = "「......Tôi, là chủ sở hữu của Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしと[ハチロクニイマル,3]8620とは、\nまぎれもない双鉄様の経営資源です」
2695 = "「Vâng. Tôi và 8620, chắc chắn là tài nguyên kinh doanh của ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そして、ポーレットにも、日々姫にも、蓑笠老人にも\n凪・ふかみにも、それぞれの経営資源がある」
2896 = "「Và, cả Paulette, Hibiki, ông lão Minokasa, Nagi, Fukami, mỗi người đều có tài nguyên kinh doanh riêng.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ！」
# 2427 = "「啊！」" 
# monologue
# JP: ラベルデザインは日々姫に頼む。瓶の形状を工夫するなら、\n蓑笠老人にガラスか陶器の職人を紹介してもらえばいい。
3874 = "Thiết kế nhãn hiệu sẽ nhờ Hibiki. Nếu muốn thay đổi hình dáng chai, thì nhờ ông lão Minokasa giới thiệu cho thợ làm thủy tinh hoặc gốm sứ là được."
# monologue
# JP: レールショップ、駅、クマ川下りの発船所――\n観光客を狙った販路も、新たに確保できるはずだ。
3878 = "Cửa hàng đường sắt, nhà ga, bến xuất phát của thuyền xuôi dòng Kuma―― Chắc chắn cũng có thể đảm bảo được các kênh bán hàng mới nhắm đến khách du lịch."
# 【双鉄】
# display as 雙鐵
# JP: 「8620修復自体を、御一夜全体の経営資源として共有する。\nその活用で利益を産めると、皆に考えてもらえるように」
2525 = "「Chia sẻ bản thân việc phục hồi 8620 như một tài nguyên kinh doanh của toàn bộ Ohimitera. Để mọi người nghĩ rằng, có thể sinh ra lợi nhuận từ việc tận dụng nó.」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ。双ちゃん、よー気づいたねぇ」
2393 = "「Ufufu. Bé Sou, em nhận ra tốt lắm nha.」"
# monologue
# JP: 真闇姉が笑う。\n満足そうに、嬉しげに。
3710 = "Chị Mayami cười. Trông thật mãn nguyện, thật vui vẻ."
# 【真闇】
# display as 真闇
# JP: 「稼ぎたければ、稼がせる。\nそれは、[あきない,1]商売の基本たい」
1804 = "「Nếu muốn kiếm tiền, thì phải cho người khác kiếm tiền. Đó là nguyên tắc cơ bản của kinh doanh nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、真闇姉」
2682 = "「Vâng, chị Mayami.」"
# monologue
# JP: そしてもうひとつ、僕は経営資源を得た。\n赤井宮司の助言が、どれほど的確か――
3470 = "Và một điều nữa, tôi đã có được một tài nguyên kinh doanh. Lời khuyên của cung tư tế Akai, xác đáng đến nhường nào――"
# monologue
# JP: 理解を出来た今だからこそ、その活用に失敗せぬよう、\nまずは一歩、今立つここを、踏み固めよう。
3584 = "Chính vì bây giờ đã hiểu, nên để không thất bại trong việc tận dụng nó, trước tiên hãy củng cố vững chắc bước đi đầu tiên, nơi chúng ta đang đứng ngay lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく石炭ボイラだ。\n修復出来ねば、全ては絵に描いた餅に終わってしまう」
2885 = "「Dù sao thì cũng là lò hơi than. Nếu không thể phục hồi, thì mọi thứ sẽ chỉ là chiếc bánh vẽ mà thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしを是非お役立てください。\nボイラ構造については、記憶が鮮明である気がします」
2934 = "「Nhất định hãy để tôi giúp một tay. Về cấu tạo của lò hơi, tôi cảm thấy ký nhớ của mình rất rõ ràng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もちろん役に立ってもらうぞ」
2452 = "「Ừm. Tất nhiên là sẽ nhờ em giúp rồi.」"
# monologue
# JP: だが、それだけではまだ足りない。\n足りたとしても、それではいけない。
3244 = "Nhưng, chỉ thế thôi thì vẫn chưa đủ. Dù có đủ, thì như thế cũng không được."
# monologue
# JP: 御一夜全体を巻き込むため、利益共有をはかるため、\n真闇姉のアドバイスどおり、『稼がせる』ことが必要だ。
3434 = "Để lôi kéo toàn bộ Ohimitera, để chia sẻ lợi nhuận, đúng như lời khuyên của chị Mayami, cần phải 『cho người khác kiếm tiền』."
# 【双鉄】
# display as 雙鐵
# JP: 「その上で真闇姉、ひとつ、教えて欲しいことがある」
2842 = "「Dựa trên điều đó, chị Mayami, có một chuyện em muốn chị chỉ cho em.」"
# 【真闇】
# display as 真闇
# JP: 「ボイラ屋さんの電話番号と？」
2704 = "「Số điện thoại của thợ sửa lò hơi phải không?」"
# monologue
# JP: 先回り。\n今までだったら、きっと内心、反発を覚えていただろう。
3347 = "Đón đầu. Nếu là trước đây, chắc chắn trong lòng tôi sẽ cảm thấy phản kháng."
# monologue
# JP: が――それがくだらない意地と今なら、はっきりわかる。\n真闇姉こそ誰よりも、巻き込み、活用するべき人だ。
3242 = "Nhưng――bây giờ tôi hiểu rõ ràng rằng đó chỉ là sự bướng bỉnh vô vị. Chị Mayami mới là người cần được lôi kéo và tận dụng hơn bất kỳ ai khác."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ。お願いしたい」
2450 = "「Ừm. Đúng là vậy. Em muốn nhờ chị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「繋がらん、か――」
2644 = "「Không gọi được, sao――」"
# monologue
# JP: 真闇姉とあれこれ打ち合わせるうち、\n時計は九時を回ってしまった。
3392 = "Trong lúc bàn bạc đủ thứ chuyện với chị Mayami, đồng hồ đã điểm qua chín giờ."
# monologue
# JP: 夕食前にも一度電話を入れはしたのだが――\nこれは、今日はもう諦めた方が良さそうだ。
3602 = "Trước bữa tối tôi cũng đã gọi điện thoại một lần nhưng―― Có vẻ hôm nay nên bỏ cuộc thì hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……外でも歩くか」
1832 = "「......Ra ngoài đi dạo một chút vậy.」"
# monologue
# JP: 寝るには早いし、\n何かするには、頭が疲れすぎている。
3897 = "Còn quá sớm để ngủ, và đầu óc đã quá mệt mỏi để làm bất cứ việc gì."
# monologue
# JP: 体だけ軽く動かして――\nああ、そうだ。投炭練習を４００杯だけするのも良い。
3462 = "Chỉ vận động cơ thể nhẹ nhàng một chút―― À, đúng rồi. Tập xúc 400 xẻng than cũng tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「少し出てくる」
2597 = "「Tôi ra ngoài một chút.」"
# monologue
# JP: ハチロクには資料作成を頼んでいるし、\nこの時間、日々姫も恐らくは勉強だろう。
3550 = "Tôi đã nhờ Hachiroku chuẩn bị tài liệu, giờ này, có lẽ Hibiki cũng đang học bài."
# monologue
# JP: 邪魔せぬようにとそっと玄関から外にでる。
3666 = "Để không làm phiền, tôi nhẹ nhàng đi ra ngoài từ cửa chính."
# 【双鉄】
# display as 雙鐵
# JP: 「おや」
2402 = "「Ô kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2426 = "「A.」"
# monologue
# JP: ウワサをすれば影、でもないが、\n電話をかけたばかりの相手だ。
3797 = "Vừa nhắc Tào Tháo thì Tào Tháo đến, cũng không hẳn là vậy, nhưng là người tôi vừa mới gọi điện thoại."
# monologue
# JP: いささか、びっくりさせられる。
3528 = "Tôi có vẻ làm cô ấy hơi giật mình."
# 【双鉄】
# display as 雙鐵
# JP: 「さっき、電話をしたのだが」
2599 = "「Vừa nãy, tôi có gọi điện thoại.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ！　あっ！！」
2407 = "「Hả? A! A!!」"
# monologue
# JP: ポーレットは慌てた様子で、\nポーチの中の自分の携帯を確かめる。
3648 = "Paulette có vẻ hoảng hốt, kiểm tra điện thoại của mình trong túi nhỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「わ、ほんとさっき。\nごめんなさい、急いで歩いてて、気が付かなくて」
2398 = "「Oa, đúng là vừa nãy thật. Xin lỗi anh, tôi đi vội quá nên không để ý.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。というか、急ぎなら」
2239 = "「Không sao. Nếu cô đang vội thì――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえっ！　ここを目指して、\n双鉄くんと話せるかなって、急いでたんです」
2435 = "「A, không phải! Tôi đang vội đến đây xem có gặp được anh Soutetsu không ấy mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕と？」
2645 = "「Gặp tôi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「七時頃の電話でられなくて、\nそのまま時間遅くなっちゃったから、かけ直すのも」
2298 = "「Khoảng bảy giờ tôi không nghe máy được, rồi cứ thế trễ mất, gọi lại thì cũng...」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は携帯を持たんからな」
2466 = "「Tôi không mang điện thoại mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、ナビちゃんに禁止されてるのは知ってますし」
2255 = "「Vâng, tôi biết anh bị Navi cấm mang theo mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「携帯の電波が、\n飛行関連機器に悪影響をもたらす危険を気に病むらしい」
2516 = "「Có vẻ em ấy lo lắng sóng điện thoại sẽ gây ảnh hưởng xấu đến các thiết bị liên quan đến bay.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの命が最優先なんですもん。\n当然、そういう判断になっちゃいますよね」
2812 = "「Mạng sống của anh Soutetsu là ưu tiên hàng đầu mà. Đương nhiên là em ấy sẽ quyết định như vậy rồi.」"
# monologue
# JP: 意識を向ければ、上空には当然のようにエアクラの飛行音。
3286 = "Chú ý lắng nghe, trên không trung quả nhiên có tiếng bay của Aircra."
# monologue
# JP: 離水のときに、\nさぞや多くの水鳥たちの眠りを妨げてしまっただろう。
3438 = "Lúc cất cánh khỏi mặt nước, chắc hẳn nó đã đánh thức rất nhiều loài chim nước đang ngủ."
# 【双鉄】
# display as 雙鐵
# JP: 「話すなら、どうだ、このまま歩かんか？\n丁度、僕も駅の方へと向かおうかと思っていた」
3031 = "「Nếu muốn nói chuyện, hay là chúng ta cứ vừa đi vừa nói nhé? Đúng lúc tôi cũng đang định đi về phía nhà ga.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んでお供します」
2507 = "「Vâng, tôi rất sẵn lòng đi cùng.」"
# monologue
# JP: ……ポーレットの歩幅は意外に大きい。\n姿勢良く、大股でスタスタ歩くからだ。
1783 = "......Sải bước của Paulette lớn hơn tôi nghĩ. Vì cô ấy đi với tư thế thẳng tắp, sải bước dài thoăn thoắt."
# monologue
# JP: 特にペースをあわせなくても同じリズムで歩けることが、\nなんとも地味に心地よい。
3234 = "Không cần cố tình bắt nhịp mà vẫn có thể đi cùng một nhịp độ, thật sự mang lại một cảm giác thoải mái khó tả."
# 【ポーレット】
# display as 波萊特
# JP: 「……なるほどですね、面白い」
1829 = "「......Ra là vậy, thú vị thật đấy.」"
# monologue
# JP: 歩きながら、赤井宮司との会話について報告する。\nもちろん、真闇姉との会話の内容も。
3567 = "Vừa đi, tôi vừa báo cáo về cuộc nói chuyện với cung tư tế Akai. Tất nhiên là cả nội dung cuộc nói chuyện với chị Mayami nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「――そっか、そういう見方も出来るんですね」
1801 = "「――Ra vậy, cũng có thể nhìn nhận theo cách đó nhỉ.」"
# monologue
# JP: ポーレットは、ただ相槌を打つ。\nじっくり耳を傾けて、本当に興味深そうに。
3643 = "Paulette chỉ gật gù đồng tình. Cô ấy chăm chú lắng nghe, có vẻ thực sự rất hứng thú."
# monologue
# JP: そうしてときおり水を向ければ、\nとても素直な意見を聞かせてくれもする。
3532 = "Và thỉnh thoảng khi tôi gợi chuyện, cô ấy cũng cho tôi nghe những ý kiến rất thẳng thắn."
# 【ポーレット】
# display as 波萊特
# JP: 「経営資源……その組み合わせによる活用。\nうまくできれば、理想的って思うんですけど」
2880 = "「Tài nguyên kinh doanh......Việc tận dụng sự kết hợp của chúng. Nếu làm tốt được thì thật là lý tưởng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう容易にはいかんよな」
2294 = "「Cũng không dễ dàng như vậy đâu nhỉ.」"
# monologue
# JP: 口では言うが、気が向いてくる。
3891 = "Miệng thì nói vậy, nhưng tôi đang thấy hứng thú."
# monologue
# JP: せっかくポーレットと一緒なのだし、\n投炭練習をするよりも――
3898 = "Hiếm khi được đi cùng Paulette, thay vì tập xúc than――"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の経営資源を確認しても構わんか？」
2380 = "「Cô có phiền cùng tôi đi xác nhận tài nguyên kinh doanh của tôi không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ハチロクニイマル,3]8620ですね、もちろんです！」
3076 = "「Là \\x%l8620;#00ffc040;8620%l;#; nhỉ, tất nhiên rồi!」"
# monologue
# JP: いやに弾んだ声を出し、ポーレットは僕の前へと回る。
3657 = "Cất giọng phấn khích đến lạ, Paulette vòng lên đi trước tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「石造機関庫に入るなら、\nこっちから行く方が近いです」
2364 = "「Nếu vào xưởng đầu máy bằng đá, thì đi đường này sẽ gần hơn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2352 = "「原來如此」" 
# monologue
# JP: レールショップへの最短の道を外れて、\nさっさと踏切を渡ってしまう。
3531 = "Rời khỏi con đường ngắn nhất dẫn đến cửa hàng đường sắt, chúng tôi nhanh chóng băng qua đường ngang."
# monologue
# JP: そのまま駅方向へと線路沿いを――
3618 = "Cứ thế dọc theo đường ray hướng về phía nhà ga――"
# 【ポーレット】
# display as 波萊特
# JP: 「ね？　近いでしょ？」
2307 = "「Thấy chưa? Gần hơn đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2464 = "「Hừm.」"
# monologue
# JP: 確かに、いくらかは近かった。
3688 = "Đúng là có gần hơn đôi chút."
# monologue
# JP: が、そのこと以上に景色の方が、\n『こちらから来てよかった』と僕に思わせる。
3246 = "Nhưng, hơn cả điều đó, chính cảnh sắc nơi đây đã khiến tôi cảm thấy 『thật tốt vì đã đi đường này』."
# 【双鉄】
# display as 雙鐵
# JP: 「また表情が変わるものだな。\nホーム方向から見るときと」
2774 = "「Biểu cảm lại thay đổi nữa nhỉ. So với lúc nhìn từ hướng sân ga.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、この角度、わたし結構お気に入りなんです」
2395 = "「Ufufu, góc độ này, tôi khá là thích đấy.」"
# monologue
# JP: 言いながら、ポーレットは指を伸ばして教えてくれる。
3799 = "Vừa nói, Paulette vừa đưa tay chỉ cho tôi xem."
# 【ポーレット】
# display as 波萊特
# JP: 「“御一夜温泉駅史”によると、この機関庫は、\n[めいじ,1]明智四十一年、\\x%l本屋;#00ffc040;[ほんおく,1]本屋%l;#;とともに作られたそうです」
2753 = "「Theo “Lịch sử ga suối nước nóng Ohimitera”, xưởng đầu máy này, được xây dựng cùng với \\x%l本屋;#00ffc040;tòa nhà chính%l;#; vào năm Minh Trí thứ 41 đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほんおく？」
2260 = "「Tòa nhà chính?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、駅舎の、メインの建物のことです。\n駅長室とかがある」
2439 = "「A, là tòa nhà chính của nhà ga ấy. Nơi có phòng trưởng ga các thứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2352 = "「原來如此」" 
# 【ポーレット】
# display as 波萊特
# JP: 「本を売るお店やさんの本屋と同じ字で、“ほんおく”。\nややこしいですよね、漢字、少しだけ」
2755 = "「Chữ Hán giống với chữ “nhà sách” bán sách, đọc là “hon-oku”. Hơi rắc rối một chút nhỉ, chữ Hán ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、[ヒノモト,2]日ノ本人の僕にも少し難しい」
2987 = "「Đúng vậy, đối với một người Hinomoto như tôi cũng hơi khó.」"
# monologue
# JP: 言えばクスっと、ポーレットが笑う。
3752 = "Nghe tôi nói vậy, Paulette bật cười khúc khích."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしだって[ヒノモト,2]日ノ本人ですよ？\n育ちは、結構長い間フランクでしたけど」
2582 = "「Tôi cũng là người Hinomoto mà? Dù thời gian lớn lên ở Frank (Pháp) khá dài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ハーフというヤツか？\nああ、今どきはダブルの方が良いのだったか？」
2353 = "「Ra là vậy, kiểu gọi là con lai sao? À, thời buổi này gọi là mang hai dòng máu thì tốt hơn nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんなの、どっちでも気にしませんけど？」
2594 = "「Chuyện đó, tôi không bận tâm gọi thế nào đâu?」"
# monologue
# JP: すまして笑って。\nポーレットは自分の鼻をちょこん、とつつく。
3655 = "Cười tủm tỉm. Paulette khẽ chạm vào mũi mình."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、四分の一です。クォーター。\n母方の祖父が、フランク人」
2608 = "「Tôi mang một phần tư dòng máu. Là quarter. Ông ngoại tôi là người Frank.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2994 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょうど、この機関庫とお揃いです。\nもともとはこれも、四分の一くらいだったそうです」
2766 = "「Vừa vặn, giống với xưởng đầu máy này. Nghe nói ban đầu nó cũng chỉ bằng khoảng một phần tư thế này thôi.」"
# monologue
# JP: 言われて、改めて眺め渡す。
3751 = "Nghe cô ấy nói, tôi lại đưa mắt nhìn bao quát một lần nữa."
# monologue
# JP: 注意してよく見てみれば、\nなるほど、この機関庫にはいくつもつぎはぎの跡が見える。
3794 = "Chú ý nhìn kỹ lại, quả nhiên, xưởng đầu máy này có thể thấy được rất nhiều dấu vết chắp vá."
# 【双鉄】
# display as 雙鐵
# JP: 「何度か、増築があったのか？」
2725 = "「Đã từng được cơi nới vài lần sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「だ、そうですよ？」
2497 = "「Nghe nói là vậy đó?」"
# monologue
# JP: 言って、指先はまた機関庫へと。
3422 = "Nói rồi, đầu ngón tay cô ấy lại hướng về phía xưởng đầu máy."
# 【ポーレット】
# display as 波萊特
# JP: 「一番手前、灰捨て小屋の近く、\nトタンで、むき出しな部分が、一番最後の増築部」
2728 = "「Phần gần nhất, gần chỗ đổ tro, phần lợp tôn lộ ra ngoài ấy, là phần được cơi nới cuối cùng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一番最後……\nならば、\\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;などのための増築か？」
2730 = "「Phần cuối cùng...... Vậy, là cơi nới cho \\x%lディーゼル機関車;#00ffc040;đầu máy diesel%l;#; hay sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、書いてありました。\n石造機関庫自体、一番最初は青屋根のとこの分だけとも」
2724 = "「Thấy viết như vậy đấy. Nghe nói bản thân xưởng đầu máy bằng đá, ban đầu cũng chỉ có phần mái xanh kia thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かに途中から屋根の色が変わる部分があるな。\nそのさらに後ろは――あからさまな増築部分か」
2444 = "「À, đúng là có phần màu mái bị thay đổi từ giữa chừng nhỉ. Phía sau đó nữa là――phần cơi nới lộ liễu sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「全盛期には、機関車が入りきらなくなって増築して。\nそれにあわせて、[きゃっかしゃく,3]客貨車区の分も増築したそうです」
2902 = "「Nghe nói vào thời hoàng kim, đầu máy không chứa hết nên phải cơi nới thêm. Cùng với đó, họ cũng cơi nới thêm phần khu toa khách toa hàng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「キャッカシャク？」
2518 = "「Khu toa khách toa hàng?」"
# 【ポーレット】
# display as 波萊特
# JP: 「客車と貨車の区域だから、客貨車区」
2378 = "「Vì là khu vực dành cho toa hành khách và toa chở hàng, nên gọi là khu toa khách toa hàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その字か。なるほど、理解できた」
2711 = "「Là chữ đó sao. Ra là vậy, tôi hiểu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、駅とかは詳しくなくて、\nここのことだけ、少し調べただけなんですけど」
2604 = "「Tôi không rành về nhà ga lắm đâu, chỉ tìm hiểu một chút về nơi này thôi.」"
# monologue
# JP: 謙遜とは思えぬ口調でそういいながら。
3892 = "Vừa nói bằng giọng điệu không có vẻ gì là khiêm tốn."
# monologue
# JP: ポーレットはぐるり、機関庫からホーム、\n駅\\x%l本屋;#00ffc040;本屋%l;#;までをいとおしそうに眺め渡す。
3651 = "Paulette vừa nhìn bao quát một vòng từ xưởng đầu máy đến sân ga, đến \\x%l本屋;#00ffc040;tòa nhà chính%l;#; của nhà ga với ánh mắt đầy yêu thương."
# 【ポーレット】
# display as 波萊特
# JP: 「駅もやっぱり面白いですよね。\n鉄道の歴史と一緒に、ずっと歴史を刻んでて」
2963 = "「Nhà ga quả nhiên cũng thú vị nhỉ. Cùng với lịch sử của đường sắt, nó đã khắc ghi lịch sử suốt một thời gian dài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットは、本当に鉄道が好きなのだな」
1826 = "「......Paulette, thật sự rất thích đường sắt nhỉ.」"
# monologue
# JP: 言った瞬間、\nポーレットはわたわたと両手を振り回す。
3749 = "Khoảnh khắc tôi vừa nói ra, Paulette cuống cuồng xua cả hai tay."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしっ！？　わたしとか、浅いですよ、そんな、\n知識も全然っ――けほっ、こほっ！」
2631 = "「Tôi á!? Tôi á, kiến thức còn nông cạn lắm, mấy thứ đó, hoàn toàn không――khụ, khụ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
2561 = "「Sao thế?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、すみませ――けほっ――んんっ。\n今日、議会でもなんかっ、答弁――んっ――長くて」
2425 = "「A, xin l――khụ――ưm. Hôm nay, ở hội đồng thành phố, lúc trả lời chất vấn――ưm――hơi dài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喉が疲れているのか。\nちょっと待て」
2997 = "「À, cổ họng cô bị mệt sao. Đợi một chút.」"
# monologue
# JP: 駅舎近くだ。自動販売機には困らない。
3867 = "Gần nhà ga. Không thiếu máy bán hàng tự động."
# monologue
# JP: 喉には、確かはちみつがいいと聞いたことがある。\n紅茶は、ポーレットにこだわりがあるようだし――うむ。
3561 = "Hình như tôi từng nghe nói mật ong rất tốt cho cổ họng. Hồng trà thì, có vẻ Paulette khá kén chọn――hừm."
# 【双鉄】
# display as 雙鐵
# JP: 「これを飲むといい」
2445 = "「Cô uống cái này đi.」"
# monologue
# JP: “ゆずとはちみつのドリンク”\n受け取ると、ポーレットはホっとしたような笑顔になる。
3649 = "“Đồ uống yuzu mật ong” Khi nhận lấy, Paulette nở nụ cười như trút được gánh nặng."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、双鉄くん！\nええと、お金」
2936 = "「Cảm ơn anh, anh Soutetsu! Ừm, tiền thì...」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのくらいはおごらせてくれ。\nそれが嫌なら、授業料ということで処理してくれ」
3003 = "「Chút đó cứ để tôi mời đi. Nếu cô ngại, thì cứ coi như là học phí đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「授業料？」
2512 = "「Học phí?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l本屋;#00ffc040;[ほんおく,1]本屋%l;#;に[きゃっかしゃく,3]客貨車区。二つも専門用語を習った。\nハチロクを驚かすくらいの役には立とう」
1797 = "「\\x%l本屋;#00ffc040;Tòa nhà chính%l;#; và khu toa khách toa hàng. Tôi đã học được hai thuật ngữ chuyên ngành. Chắc cũng đủ để làm Hachiroku ngạc nhiên đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふっ。そっか。\nなら、授業料、いただきますねー」
2461 = "「Ufufu. Vậy sao. Thế thì, tôi xin nhận học phí nhé~.」"
# monologue
# JP: とっ、とポーレットは駆け出して、\n機関庫脇のホームに腰掛け、ちょいちょい僕を手招きする。
3733 = "Tót một cái, Paulette chạy đi, ngồi xuống sân ga bên hông xưởng đầu máy, rồi vẫy vẫy tay gọi tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ここからなら、もっと景色いいです。\n8620も良く見えますよー」
2555 = "「Từ đây nhìn cảnh sắc còn đẹp hơn nữa. Cũng có thể nhìn rõ 8620 lắm đó~.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2453 = "「嗯」" 
# monologue
# JP: 機関庫の中。\n8620は静かに静かに眠っている。
3605 = "Bên trong xưởng đầu máy. 8620 đang ngủ thật yên bình, thật tĩnh lặng."
# monologue
# JP: 大きく、黒く、重々しく――\n止まっていても、全てを擦り潰してしまいそうだ。
3912 = "To lớn, đen tuyền, uy nghi―― Dù đang dừng lại, cũng có cảm giác như nó sắp nghiền nát tất cả."
# monologue
# JP: （怖い、な……やはり）
3918 = "（Đáng sợ, thật......quả nhiên là vậy.）"
# monologue
# JP: 血の臭い。\n鉄が軋んでネジ切れる音。
3768 = "Mùi máu tanh. Tiếng kim loại nghiến vào nhau và tiếng ốc vít đứt gãy."
# monologue
# JP: 夜の中だと、\nそれがひときわ鮮明に浮き上がってきそうで、震える。
3398 = "Trong màn đêm, những thứ đó dường như lại càng nổi lên rõ nét hơn, khiến tôi run rẩy."
# 【ポーレット】
# display as 波萊特
# JP: 「綺麗ですよね、8620。\n夜より、もっと黒いみたいで」
3074 = "「Đẹp thật nhỉ, 8620. Trông còn đen hơn cả màn đêm nữa.」"
# monologue
# JP: 温かな声。\n体に、心に、じわりと染みこむ。
3650 = "Giọng nói ấm áp. Từ từ thấm vào cơ thể, vào trái tim."
# 【双鉄】
# display as 雙鐵
# JP: 「綺麗――――ああ」
2794 = "「Đẹp――――ừm.」"
# monologue
# JP: 言われれば、そのとおりだとも素直に思える。\n夜よりも、闇よりもなお、黒い、黒。
3750 = "Nghe cô ấy nói vậy, tôi cũng thành thật nghĩ đúng là như thế. Đen hơn cả màn đêm, hơn cả bóng tối, một màu đen thăm thẳm."
# monologue
# JP: じっと見つめていると全てを――\n僕の不安の全部もスッと、吸われていきそうな気にもなる。
3302 = "Cứ nhìn chằm chằm vào nó, dường như mọi thứ―― Ngay cả toàn bộ sự bất an của tôi cũng sẽ bị nó hút sạch đi."
# 【双鉄】
# display as 雙鐵
# JP: 「……威厳」
1839 = "「......Uy nghiêm.」"
# monologue
# JP: 恐ろしさ。厳しさ。\nけれども、それだけではない。
3508 = "Đáng sợ. Khắc nghiệt. Nhưng, không chỉ có vậy."
# monologue
# JP: 8620の黒い体は、もっと多くを包んでいる。
3920 = "Cơ thể đen tuyền của 8620, còn bao bọc nhiều thứ hơn thế."
# 【双鉄】
# display as 雙鐵
# JP: 「否。威容……というのだろうな、こういうものを。\n今は動かぬものであるのに、美しく、頼もしくさえある」
2236 = "「Không. Phải gọi là......uy dung mới đúng, với những thứ như thế này. Dù bây giờ không thể chuyển động, nhưng nó vẫn đẹp đẽ, và thậm chí còn đáng tin cậy.」"
# monologue
# JP: 言えばにこっと、ポーレットは微笑む。\nまるで自分を、褒めてもらえでもしたかのように。
3748 = "Khi tôi nói vậy, Paulette mỉm cười rạng rỡ. Cứ như thể chính bản thân cô ấy vừa được khen ngợi vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「誇りが、きっとまだあるんです。\nたくさんの人達を運んだ誇りが――錆びつかないまま」
2514 = "「Chắc chắn niềm tự hào vẫn còn đó. Niềm tự hào vì đã chuyên chở biết bao nhiêu người――vẫn chưa hề hoen gỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誇り、か」
2756 = "「Niềm tự hào, sao.」"
# monologue
# JP: 物にも誇りがあるのなら、\n事故とはそれさえ、砕いてしまう無残極まる出来事だ。
3430 = "Nếu vạn vật cũng có niềm tự hào, thì tai nạn chính là một sự kiện tàn khốc tột cùng, đập nát cả điều đó."
# monologue
# JP: だから……なら……\nああ、ハチロクが、仮にそれを望まなくとも――
3570 = "Vì thế......nếu vậy...... À, giả sử Hachiroku không mong muốn điều đó đi chăng nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「救いたいものだな」
2833 = "「Thật muốn cứu lấy nó nhỉ.」"
# monologue
# JP: ストンと、自然にそう思う。
3547 = "Thịch một cái, tôi tự nhiên nghĩ như vậy."
# monologue
# JP: 事故から未だ立ち直れない僕の代わりに、ではないが。\nせめて8620を、再び立ち上がらせてやりたいと。
3889 = "Dù không phải là thay thế cho tôi, người vẫn chưa thể gượng dậy sau tai nạn. Nhưng ít nhất, tôi cũng muốn 8620 có thể đứng lên một lần nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「救えますよ。双鉄くんなら。\nううん――わたしたち、みんななら」
3051 = "「Cứu được mà. Nếu là anh Soutetsu. Không――nếu là tất cả chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2453 = "「嗯」" 
# monologue
# JP: 確かに、そうだ。\nみんななら。
3687 = "Đúng là như vậy. Nếu là mọi người."
# monologue
# JP: ポーレットが、この夜に僕を導かなければ、\nこんな単純なことにさえ、ずっと気づけぬままだった。
3428 = "Nếu đêm nay Paulette không dẫn dắt tôi, thì có lẽ tôi đã mãi mãi không nhận ra một điều giản đơn đến thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットは、\nいつから鉄道を好きになったのだ？」
1845 = "「......Paulette này, cô bắt đầu thích đường sắt từ khi nào vậy?」"
# monologue
# JP: だから、単純に知りたくなる。\nポーレットのこと、鉄道のことを、もう少しでも。
3572 = "Chính vì thế, tôi chỉ đơn thuần muốn biết. Về Paulette, về đường sắt, dù chỉ một chút thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「きっかけは、いくつかありますけど」
2477 = "「Cơ duyên thì, có vài cái cơ.」"
# monologue
# JP: 青い瞳が、懐かしそうに細められ――\nそうして、僕へと向けられる。
3654 = "Đôi mắt xanh biếc nheo lại như đang hoài niệm―― Rồi, hướng về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「大事なきっかけは、いくつもあって。\nけど、一番最初ならおばあちゃんです」
2736 = "「Cơ duyên quan trọng thì có rất nhiều. Nhưng, nếu nói về cái đầu tiên nhất thì là bà nội tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おばあちゃん？」
2483 = "「Bà nội?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、[かつこ,1]勝子おばあちゃん。\n昔、機関士をやってたって話を聞いて」
2699 = "「Vâng, bà nội Katsuko. Nghe chuyện ngày xưa bà từng làm lái tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「女性機関士か？　珍しかったとハチロクに聞いたが」
2479 = "「Nữ lái tàu sao? Tôi nghe Hachiroku nói là hiếm lắm mà.」"
# monologue
# JP: 確か、ハチロクの機関士さんも、\n帝央機関区で長いこと一人だけの女性とのことだった。
3563 = "Chắc chắn, người lái tàu của Hachiroku, cũng là nữ lái tàu duy nhất ở khu đầu máy Teio trong một thời gian dài."
# 【双鉄】
# display as 雙鐵
# JP: 「どこの機関区にいらしたんだ？」
2492 = "「Bà ấy từng làm ở khu đầu máy nào vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「知らないんです。どこでいつまで働いていて、\nどんな機関車に乗ってたのか、とか」
2990 = "「Tôi không biết. Bà đã làm việc ở đâu, đến khi nào, và đã lái loại đầu máy nào, mấy chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご自分のことは、話されないタイプの方だったのか？」
2306 = "「Bà ấy là kiểu người không hay nói về bản thân sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうでした。けど――これ。\nこれのことだけは、聞かせてくれて」
2691 = "「Đúng vậy. Nhưng――cái này. Chỉ riêng chuyện về cái này, thì bà đã kể cho tôi nghe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお……」
2408 = "「Ồ......」"
# monologue
# JP: ポケットの中から大切そうに、\nポーレットは鉄道懐中時計を取り出す。
3644 = "Paulette lấy ra từ trong túi áo một chiếc đồng hồ bỏ túi đường sắt, với vẻ mặt vô cùng trân trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「前にも少し見たことがあるが、見事なものだな」
2583 = "「Trước đây tôi cũng từng nhìn thấy một chút rồi, thật là một món đồ tuyệt đẹp.」"
# monologue
# JP: 金で、精緻で、とても見やすく、美しい。
3864 = "Bằng vàng, tinh xảo, rất dễ nhìn, và tuyệt đẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「メーカーが違うのだな。\nハチロクのものは、[テイコー,4]TEIKO社のものだったが」
2703 = "「Hãng sản xuất khác nhau nhỉ. Của Hachiroku là của hãng TEIKO cơ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「国産じゃないんですよ。\n[めいこく,1]冥国製です。[ウォールサム,7]WALLTHAM」
2628 = "「Không phải hàng nội địa đâu. Là hàng sản xuất tại Meikoku (Mỹ) đấy. WALLTHAM.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？　この位古い時代のものだと、\n相当珍しいのではないか？」
2418 = "「Ồ? Một món đồ từ thời đại cũ thế này, chẳng phải là cực kỳ hiếm sao?」"
# monologue
# JP: 誇らしそうな、深い頷き。
3660 = "Cái gật đầu sâu, đầy tự hào."
# 【ポーレット】
# display as 波萊特
# JP: 「冥国の大統領が来た時、\n移動に、お召し列車を使ってもらったそうなんです」
2901 = "「Khi tổng thống Meikoku đến thăm, nghe nói họ đã dùng tàu ngự dụng để ông ấy di chuyển.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。帝が直々に饗応したのか」
2462 = "「Ồ. Đích thân Thiên hoàng chiêu đãi sao.」"
# monologue
# JP: お召し列車の名くらいは、僕でも知っている。\n帝をお乗せするために、特別に準備される列車だ。
3467 = "Cái tên tàu ngự dụng thì đến cả tôi cũng biết. Là chuyến tàu được chuẩn bị đặc biệt để chở Thiên hoàng."
# 【ポーレット】
# display as 波萊特
# JP: 「そのお召し列車の機関士、おばあちゃんが務めたそうで。\nこれ、そのときに大統領から頂いた品なんだそうです」
2815 = "「Nghe nói bà nội tôi đã đảm nhận vị trí lái tàu của chuyến tàu ngự dụng đó. Đây là món quà mà bà nhận được từ tổng thống lúc bấy giờ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「道理で、見事な品の筈だ」
2563 = "「Hèn chi, đúng là một món đồ tuyệt mỹ.」"
# monologue
# JP: おそらくは純金であろう鎖は、\nしっかりと、ポーレットのボタンホールを通っている。
3737 = "Sợi dây xích có lẽ là vàng nguyên chất, được luồn chắc chắn qua khuy áo của Paulette."
# monologue
# JP: 絶対に落としたり失くしたりしないよう、備えつつ――\nポーレットはこれを、今も実用し、生かしている。
3284 = "Luôn phòng bị để tuyệt đối không đánh rơi hay làm mất―― Paulette hiện tại vẫn đang sử dụng và giữ gìn nó."
# 【ポーレット】
# display as 波萊特
# JP: 「その話を聞いて、わたしも機関士さんになりたいなって。\nそれで、鉄道のこと、がんばって勉強とかして――けど」
2816 = "「Nghe câu chuyện đó, tôi cũng muốn trở thành lái tàu. Thế là, tôi đã cố gắng học hỏi về đường sắt――nhưng mà.」"
# monologue
# JP: 大廃線時代が、鉄道そのものを滅ぼしていった。
3408 = "Thời đại Đại bãi bỏ tuyến đã hủy diệt chính bản thân ngành đường sắt."
# monologue
# JP: ……そのときのポーレットの悲嘆は、\nどれほど大きなものだったのだろう。
1782 = "......Sự đau buồn của Paulette lúc bấy giờ, lớn lao đến nhường nào cơ chứ."
# 【ポーレット】
# display as 波萊特
# JP: 「おばあちゃん、わたしのことをかわいそうがって。\n形見にって、これ、くれたんです」
2482 = "「Bà nội, thấy thương cho tôi. Nên đã tặng tôi cái này làm kỷ vật.」"
# monologue
# JP: 少し、ポーレットが鼻声だ。
3653 = "Giọng Paulette hơi nghèn nghẹn."
# monologue
# JP: それを落ち着けようとしたのか、\nジュースの缶を傾け喉をこくこく動かす。
3414 = "Có lẽ để trấn tĩnh lại, cô ấy nghiêng lon nước ép, ừng ực uống."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、残念。なくなっちゃいました」
2442 = "「A, tiếc quá. Hết mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　なら、これもどうだ？」
2685 = "「Vậy sao? Thế, cái này thì sao?」"
# monologue
# JP: 僕の喉は傷んでいない。\nお付き合いで、一口二口を飲んだだけだ。
3558 = "Cổ họng tôi không bị đau. Tôi chỉ uống một hai ngụm cho có lệ thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ…………う――うん。\nいただき、ます」
2421 = "「A............ư――ừm. Tôi xin nhận, nhé.」"
# monologue
# JP: 今度は、こくり。
3866 = "Lần này là, ực."
# monologue
# JP: 缶をほとんど傾けず、\nちびちびと、静かに静かに飲んでいく。
3418 = "Hầu như không nghiêng lon, cô ấy uống từng ngụm nhỏ, thật im lặng, thật tĩnh lặng."
# 【ポーレット】
# display as 波萊特
# JP: 「……甘い」
1836 = "「......Ngọt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「同じものだろう？　味など同じではないのか？」
2331 = "「Cùng một loại mà? Chẳng phải vị giống nhau sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！　そっ、そうっ、そうっ――\nそうなんです、けどっ！」
2429 = "「A! Đú, đúng, đúng vậy―― Đúng là thế, nhưng mà!」"
# monologue
# JP: 闇の中でもわかるほど、\nポーレットの頬が真っ赤に染まる。
3464 = "Đỏ bừng đến mức trong bóng tối cũng có thể nhận ra, hai má Paulette đỏ lựng lên."
# monologue
# JP: なぜそんな？\n思った瞬間、僕もいささか――恥ずかしくなる。
3553 = "Tại sao lại thế? Khoảnh khắc vừa nghĩ vậy, tôi cũng có chút――xấu hổ."
# monologue
# JP: （これは――いわゆる――間接キスというヤツか）
3917 = "（Cái này――chẳng lẽ là――thứ gọi là hôn gián tiếp sao.）"
# monologue
# JP: 初等部生徒でもあるまいに、\nこんなことで恥ずかしがるなど、ありえない。
3346 = "Cũng chẳng phải là học sinh tiểu học, chuyện xấu hổ vì ba cái chuyện này, thật không thể tin nổi."
# monologue
# JP: そう考えれば考えるほど、\nなんだかどんどん、むずがゆいような焦燥が増す。
3853 = "Càng nghĩ như vậy, sự bồn chồn như ngứa ngáy lại càng tăng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「あの！　わたし！　あのっ！\n明日も、朝から、乗務ですからっ！　えとっ」
3017 = "「À này! Tôi! À này! Ngày mai, từ sáng sớm, tôi cũng có ca trực! Nên là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、ああ。そうだな。早く休んだ方がいい」
2423 = "「A, à. Đúng vậy nhỉ. Cô nên nghỉ ngơi sớm đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
2501 = "「Vâng!」"
# monologue
# JP: ポーレットがぺこんと頭を下げる。
3646 = "Paulette cúi gập người chào."
# monologue
# JP: 見れば不意に、今朝の出来事が頭をよぎる。
3690 = "Nhìn thấy vậy, chuyện sáng nay bất chợt xẹt qua đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、焦らず帰るんだぞ。\n腰など、痛めてはたいへんだ」
2245 = "「Mặc dù vậy, cũng đừng vội vàng chạy về đấy. Nhỡ đau lưng thì khổ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　あの、双鉄くん、ありがとう！」
2717 = "「Vâng! À, anh Soutetsu, cảm ơn anh!」"
# monologue
# JP: 言ってわたわた、\nポーレットはレールショップの方へと足を進めかけ。
3410 = "Nói rồi cuống cuồng, Paulette bước vội về phía cửa hàng đường sắt."
# monologue
# JP: そこでぴたりと、\n一瞬とまって、僕をふりむく。
3672 = "Đến đó thì khựng lại, dừng lại một khoảnh khắc, rồi ngoái nhìn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あと、ゆずはちみつ！\nごちそうさまっ――あのっ――甘かったです！」
3006 = "「Còn nữa, yuzu mật ong! Cảm ơn anh đã đãi――à này――ngọt lắm ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
3067 = "「!!!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「おやすみなさぁぁぁぁぃ」
2720 = "「Chúc ngủ ngooooooooon.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、焦るなと言っているのに」
2629 = "「Đã bảo là, đừng có vội vàng mà.」"
# monologue
# JP: 言いざま、苦笑してしまう。
3523 = "Vừa nói, tôi vừa bất giác cười khổ."
# monologue
# JP: 路子が読んでいた少女マンガを、\n昔の僕は、鼻で笑っていたものだったが――
3890 = "Cuốn truyện tranh thiếu nữ mà Michiko từng đọc, tôi ngày xưa từng cười khẩy chế nhạo nó, nhưng mà――"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに焦るものだな。\n間接キッスというヤツは」
2356 = "「Ra là vậy, đúng là khiến người ta cuống quýt thật. Cái thứ gọi là hôn gián tiếp ấy.」"
