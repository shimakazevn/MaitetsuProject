3508 = "Sự đáng sợ. Sự nghiêm khắc.\\nNhưng, không chỉ có vậy."

# monologue
# JP: 8620の黒い体は、もっと多くを包んでいる。
3920 = "Thân hình đen tuyền của 8620 còn bao hàm nhiều điều hơn thế."

# 【双鉄】
