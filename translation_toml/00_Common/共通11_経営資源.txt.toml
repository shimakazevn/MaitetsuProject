1797 = "「\\x%lHiệu sách;#00ffc040;Hiệu sách%l;#; và khu toa tàu khách hàng. Tớ đã học được hai thuật ngữ chuyên ngành rồi đấy.\\nChắc cũng đủ để làm Hachiroku bất ngờ」"

