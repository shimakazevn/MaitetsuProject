3567 = "Vừa đi, tôi vừa kể lại cuộc nói chuyện với thầy Akai Guuji.\\n Dĩ nhiên, cả nội dung cuộc trò chuyện với chị Maamu nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「――そっか、そういう見方も出来るんですね」
1801 = "「――Ra là vậy, cũng có thể nhìn nhận theo hướng đó nhỉ.」"

# monologue
# JP: ポーレットは、ただ相槌を打つ。\nじっくり耳を傾けて、本当に興味深そうに。
3643 = "Paulette chỉ gật gù hưởng ứng.\\nEm chăm chú lắng nghe, với vẻ thực sự hứng thú."

# monologue
# JP: そうしてときおり水を向ければ、\nとても素直な意見を聞かせてくれもする。
3532 = "Và rồi mỗi khi tôi gợi chuyện,\\nem cũng cho tôi nghe những ý kiến rất thẳng thắn."

# 【ポーレット】
# display as 波萊特
# JP: 「経営資源……その組み合わせによる活用。\nうまくできれば、理想的って思うんですけど」
2880 = "「Tài nguyên kinh doanh... tận dụng chúng bằng cách kết hợp lại với nhau.\\nNếu làm được thì em nghĩ sẽ rất lý tưởng, nhưng mà...」"

# 【双鉄】
# display as 雙鐵
