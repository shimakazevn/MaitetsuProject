3912 = "To lớn, đen kịt, nặng nề――\\nDù đang đứng yên, nó dường như vẫn có thể nghiền nát mọi thứ."

# monologue
# JP: （怖い、な……やはり）
3918 = "（Đáng sợ thật... quả nhiên là vậy）"

# monologue
