3768 = "Mùi máu tanh.\\nTiếng sắt thép kẽo kẹt, oằn mình gãy vụn."

# monologue
# JP: 夜の中だと、\nそれがひときわ鮮明に浮き上がってきそうで、震える。
3398 = "Giữa màn đêm,\\nnhững điều đó dường như hiện lên rõ mồn một, khiến tôi run rẩy."

# 【ポーレット】
# display as 波萊特
