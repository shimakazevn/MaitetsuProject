2514 = "「Chắc chắn là nó vẫn còn niềm kiêu hãnh của mình.\\nNiềm kiêu hãnh vì đã chuyên chở biết bao nhiêu người... vẫn còn đó, không hề rỉ sét.」"

# 【双鉄】
# display as 雙鐵
