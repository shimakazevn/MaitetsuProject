2245 = "「Dù vậy, cứ về từ từ thôi nhé.\\nLỡ đau lưng thì phiền lắm đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　あの、双鉄くん、ありがとう！」
2717 = "「Vâng! À, Soutetsu-kun, cảm ơn anh!」"

# monologue
# JP: 言ってわたわた、\nポーレットはレールショップの方へと足を進めかけ。
3410 = "Nói rồi, trong lúc còn luống cuống,\\nPaulette bắt đầu bước về phía Rail Shop."

# monologue
# JP: そこでぴたりと、\n一瞬とまって、僕をふりむく。
3672 = "Rồi em bỗng khựng lại,\\ndừng một thoáng, rồi quay đầu nhìn tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「あと、ゆずはちみつ！\nごちそうさまっ――あのっ――甘かったです！」
3006 = "「À, còn món chanh mật ong nữa!\\nEm cảm ơn ạ――ừm――ngọt lắm ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
3067 = "「！！！！」"

# 【ポーレット】
# display as 波萊特
# JP: 「おやすみなさぁぁぁぁぃ」
2720 = "「Chúc ngủ ngooonnnnn ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、焦るなと言っているのに」
2629 = "「Đã bảo là đừng có cuống lên rồi mà.」"

# monologue
# JP: 言いざま、苦笑してしまう。
3523 = "Vừa dứt lời, tôi bất giác cười khổ."

# monologue
# JP: 路子が読んでいた少女マンガを、\n昔の僕は、鼻で笑っていたものだったが――
3890 = "Mấy cuốn shoujo manga mà Rokuko hay đọc,\\nngày xưa tôi đã từng cười khẩy, nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに焦るものだな。\n間接キッスというヤツは」
2356 = "「Hóa ra là vậy, đúng là khiến người ta bối rối thật.\\nCái trò gọi là 'hôn gián tiếp' này.」"
