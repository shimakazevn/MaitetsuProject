# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;は答えない。\nただただ巨体を、無造作にさらけ出してるだけだ。
88 = "\\x%l8620;#00ffc040;8620%l;#; không trả lời.\\nNó chỉ phơi bày thân hình đồ sộ của mình một cách vô tư lự."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが壊してしまったせいで――おまえは、ずっと\n――こんな気持ちで――おいてけぼりで」
2612 = "「Chỉ vì bị tôi làm hỏng――mà ngươi đã, suốt thời gian qua\\n――với tâm trạng này――bị bỏ lại một mình」"

# monologue
# JP: 一粒――\nすぐに、雨の如くに。
2820 = "Một giọt――\\nRồi ngay lập tức, như một cơn mưa."

# monologue
# JP: ぼろぼろと、大粒の涙が床に当たって砕ける。
3041 = "Những giọt lệ lớn lã chã rơi, vỡ tan trên sàn nhà."

# 【ハチロク】
# display as 八六
# JP: 「なのに――わたくしは――わたくしはっ」
2489 = "「Vậy mà――tôi lại――tôi lại――!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1570 = "「……」"

# monologue
# JP: ハチロクの小さな肩に手のひらを置く。\n何もいわずに、ぽんと置く。
3205 = "Tôi đặt lòng bàn tay lên bờ vai nhỏ bé của Hachiroku.\\nKhông nói một lời, chỉ nhẹ nhàng đặt lên."

# monologue
# JP: 震えの全てが静まるまで。\n涙の全てが、落ちていくまで。
3373 = "Cho đến khi những run rẩy kia ngừng lại.\\nCho đến khi những giọt lệ kia thôi rơi."

# 【ハチロク】
# display as 八六
# JP: 「双、鉄……様」
2618 = "「Ngài... Soutetsu...」"

# monologue
# JP: けれど、震えがとまりきらぬうち、\nハチロクは声を絞り出す。
3483 = "Nhưng, khi cơn run rẩy còn chưa dứt hẳn,\nHachiroku đã khó nhọc cất lời."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは……浅ましい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です……この子に\n……たくさんの人に、取り返しのつかぬ傷を与えて――」
2267 = "「Tôi... là một \\x%lRailord;#00ffc040;Railord%l;#; đáng khinh... đã gây ra cho cô bé này\n...cho biết bao nhiêu người, những vết thương không thể nào hàn gắn――」"

# monologue
# JP: ハチロクの指が、いたわるように\x%l8620;#00ffc040;8620%l;#;の傷を撫でる。
2925 = "Ngón tay Hachiroku, như thể đang vỗ về, vuốt ve những vết sẹo của \\x%l8620;#00ffc040;8620%l;#;."

# monologue
# JP: 巧みに覆い隠された、擦過痕を、打痕を、亀裂を、\n手袋を外した指先で、なんどもやさしく、撫でてやる。
3077 = "Những vết trầy, vết móp, những đường nứt được che giấu một cách khéo léo,\ncô dùng đầu ngón tay trần dịu dàng vuốt ve chúng, hết lần này đến lần khác."

# 【ハチロク】
# display as 八六
# JP: 「だのに――浅ましくも欲に渇くのです。\nあの、たくさんの……人の賑わいと笑顔とに触れ」
2431 = "「Vậy mà――tôi lại hèn mọn khát khao đến thế.\nĐược chạm vào... sự náo nhiệt và nụ cười của... biết bao nhiêu con người ấy――」"

# monologue
# JP: ハチロクの震えが大きくなる。\n激しい痛みが、後悔が、僕の傷にまで伝わってくる。
2916 = "Hachiroku càng run rẩy dữ dội hơn.\nNỗi đau đớn tột cùng, niềm hối hận của cô, truyền đến cả những vết sẹo trong tôi."

# monologue
# JP: だから、背中から抱きしめる。\n強く抱きしめ――傷を重ねて、痛みを抑える。
3177 = "Vì vậy, tôi ôm lấy cô từ phía sau.\nSiết chặt vòng tay――để những vết sẹo của chúng tôi chồng lên nhau, để kìm nén nỗi đau này."

# 【ハチロク】
# display as 八六
# JP: 「浅ましくも――わたくしは願ってしまうのです――\nもう一度……あの日の前に、帰りたいと――」
2422 = "「Dù biết là hèn mọn――tôi vẫn không thể không ước rằng――\nGiá như... có thể quay trở lại một lần nữa... về trước cái ngày hôm đó――」"

# monologue
# JP: わかりすぎるほど、わかってしまう。\n僕も、願った。何度も何度も何度も何度も。
3169 = "Tôi hiểu. Tôi hiểu rõ hơn bất cứ ai.\nBởi tôi, cũng đã từng ước. Rất nhiều, rất nhiều, rất nhiều, rất nhiều lần."

# monologue
# JP: 傷の全てを無かったことに――\n事故の一日前の暮らしに、なにをしたって戻りたいと。
3161 = "Ước cho tất cả những vết sẹo này chưa từng tồn tại――\nƯớc rằng dù phải đánh đổi bất cứ thứ gì, cũng được quay về cuộc sống của một ngày trước vụ tai nạn."

# 【ハチロク】
# display as 八六
# JP: 「罪の深さに[おのの]慄きながら、それでも求めてしまうのです。\nもう一度――ただもう一度……人と笑顔を運びたいと」
2031 = "「Dù run sợ trước tội lỗi sâu nặng của mình, tôi vẫn không thể không khao khát.\nĐược một lần nữa――chỉ một lần nữa thôi... được chuyên chở con người và những nụ cười của họ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「やっと言ったな。お前の望みを」
1973 = "「Cuối cùng em cũng nói ra rồi. Mong muốn của em.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2089 = "「啊」" 

# monologue
# JP: 怖い、僕が。痛い、僕が。\nハチロクの事故の記憶が、僕の古傷から生血を絞る。
3151 = "Tôi sợ hãi. Tôi đau đớn.\nKý ức về vụ tai nạn của Hachiroku như đang vắt kiệt máu tươi từ những vết sẹo cũ của tôi."

# monologue
# JP: だから背中から抱きしめたまま――\n大丈夫、声だけならば。震えさせずにきっと、通せる。
3210 = "Vì vậy, tôi vẫn ôm cô ấy từ phía sau――\nKhông sao đâu, nếu chỉ là giọng nói. Chắc chắn mình có thể truyền đạt được mà không để nó run rẩy."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前のオーナーだ。\n僕は、お前に約束をした」
2266 = "「Ta là chủ nhân của em.\\nTa đã hứa với em.」"

# monologue
# JP: 言い聞かせる。\nもう一度。もう何度でも、自分自身に。
3184 = "Tự nhủ với lòng.\\nMột lần nữa. Thêm bao nhiêu lần nữa, với chính bản thân mình."

# monologue
# JP: ここを乗り越えられないのなら、\n御一夜を――そして路子を――救えはしない。
3447 = "Nếu không thể vượt qua được chuyện này,\\nsẽ không thể cứu được Ohitoyo――và cả Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前の望みを叶える」
2269 = "「Ta sẽ thực hiện nguyện vọng của em.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
# 2618 = "「雙鐵……少爺」" 

# monologue
# JP: 小さな手のひらが重なってくる。\n抱きしめている僕の手を、ハチロクがきゅっと掴んでくる。
3075 = "Một bàn tay nhỏ nhắn đặt chồng lên.\\nHachiroku siết chặt lấy bàn tay tôi đang ôm lấy em."

# 【双鉄】
# display as 雙鐵
# JP: 「故にハチロク、お前を再び走らせよう。\nお前と[ハチロクニイマル,3]8620に、人と、笑顔とを運ばせよう」
2300 = "「Vì vậy Hachiroku, ta sẽ để em được chạy một lần nữa.\\nTa sẽ để em và 8620 chuyên chở con người và những nụ cười.」"

# monologue
# JP: いや、そうか。\nこれこそ救いなのかもしれない。
3261 = "Không, phải rồi.\\nĐây có lẽ chính là sự cứu rỗi."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を湯医にたどり着かせたのなら、\nあの\x%l列車;#00ffc040;列車%l;#;から――路子も、降りられるのかもしれない。
3391 = "Nếu có thể đưa \\x%l8620;#00ffc040;8620%l;#; đến được Yui,\\nthì có lẽ Michiko cũng có thể bước xuống――khỏi \\x%lchuyến tàu;#00ffc040;chuyến tàu%l;#; đó."

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます……双鉄、様」
2526 = "「Em xin cảm tạ... thưa ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「礼には、まだまだ早すぎる」
1922 = "「Còn quá sớm để cảm ơn.」"

# monologue
# JP: 極めて大きな一歩だが、\nこれも所詮は、一歩にすぎん。
3477 = "Đây là một bước tiến cực kỳ lớn, nhưng\\nsau cùng nó cũng chỉ là một bước mà thôi."

# monologue
# JP: たどりつくまで――\nそれまで、全ては途中経過にすぎんのだ。
3025 = "Cho đến khi tới được đích――\\nThì cho đến lúc đó, tất cả cũng chỉ là quá trình mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「走るぞハチロク。お前の望みをかなえるために。\nそうするために――お前も走れ。全力で」
2538 = "「Chạy thôi nào, Hachiroku. Để thực hiện nguyện vọng của em.\\nĐể làm được điều đó――em cũng phải chạy. Bằng tất cả sức lực của mình.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。わたくしは、必ず全力で。\n浅ましくとも、見苦しくとも――」
2371 = "「Vâng, thưa ngài Soutetsu. Em nhất định sẽ dốc toàn lực.\\nDù cho có hèn mọn, dù cho có khó coi――」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そうだな。\n浅ましくとも、見苦しくとも」
2400 = "「Phải. Đúng vậy.\\nDù cho có hèn mọn, dù cho có khó coi.」"

# monologue
# JP: そうしていつか、走れなくなり、\n無様に地べたを這いずろうとも――
2982 = "Rồi một ngày, dẫu không còn có thể lăn bánh,\\ndẫu phải trườn mình thảm hại trên mặt đất――"

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅に――かならず僕らは、辿り着くのだ」
2241 = "「Đến ga cuối――nhất định chúng ta sẽ đến được nơi đó」"
