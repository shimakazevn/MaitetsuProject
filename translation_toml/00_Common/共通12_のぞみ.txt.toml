[script]
# lines: 539 
# monologue
# JP: ――腰から体を真っ二つに折る。
1521 = "――Gập người làm đôi từ thắt lưng."
# monologue
# JP: ふかみのお辞儀は、長身と礼儀正しさとが交じり合い、\nなかなかの迫力をもっている。
3315 = "Cái cúi chào của Fukami, là sự hòa quyện giữa dáng người cao ráo và sự lễ phép, mang một sức hút khá mạnh mẽ."
# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。凪ちゃんも誘ったんですけど、\n剣術修行をするって、どっか行っちゃった――です」
1911 = "「Em xin lỗi. Em cũng đã rủ Nagi rồi, nhưng em ấy bảo đi tu luyện kiếm thuật, rồi chạy đi đâu mất tiêu――rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。ふかみが来てくれただけでも有り難い」
2404 = "「Không sao. Chỉ cần Fukami đến là tôi đã biết ơn lắm rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「が、がんばりました。です」
2232 = "「Em, em đã cố gắng. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2110 = "「Ừm.」"
# monologue
# JP: 褒めてほしそうな顔につられて、\n思わず腕を伸ばしてしまう。
3191 = "Bị thu hút bởi khuôn mặt như đang mong được khen ngợi, tôi bất giác vươn tay ra."
# monologue
# JP: かなり位置の高い頭を撫でれば、ふかみは一瞬びくりとし、\nけれどすぐに心地よさそうに目を細める。
3186 = "Khi tôi xoa lên mái đầu ở vị trí khá cao, Fukami giật mình một thoáng, nhưng ngay lập tức nheo mắt lại vẻ thoải mái."
# 【日々姫】
# display as 日日姬
# JP: 「うおっほん、えへん！　えへんえへん！！」
2066 = "「E hèm, e hèm! E hèm e hèm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2118 = "「Ôi chà.」"
# monologue
# JP: 妹でもないものに、馴れ馴れしいことをしてしまったか。
3166 = "Không phải em gái mình, mà lại có hành động suồng sã mất rồi."
# monologue
# JP: が、満足そうなふかみを見れば、\n謝罪するのもおかしいような気もしてくる。
2881 = "Nhưng, nhìn Fukami có vẻ mãn nguyện, tôi lại cảm thấy xin lỗi thì cũng hơi kỳ."
# 【日々姫】
# display as 日日姬
# JP: 「で？　にぃに――んんっ、\n兄さんは、なんでみんなを呼び集めたんですか？」
2610 = "「Thế? Anh hai――ưm, anh trai, tại sao lại gọi mọi người tập trung lại vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。その話だ。ハチロク」
2172 = "「À đúng rồi. Là chuyện đó. Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2155 = "「Vâng, ngài Soutetsu.」"
# monologue
# JP: ――『8620改修公開と、蒸気焼酎製造販売に関する私案』。
1513 = "――『Bản đề xuất cá nhân về việc công khai phục hồi 8620 và sản xuất, bán Shochu Hơi Nước』."
# monologue
# JP: 真闇姉の助言によって思い浮かんだ全てをひとまず\n書類にまとめたものを、ハチロクが順に配っていく。
3349 = "Những ý tưởng nảy ra từ lời khuyên của chị Mayami tạm thời được tổng hợp thành tài liệu, Hachiroku lần lượt phát cho mọi người."
# 【ふかみ】
# display as 深美
# JP: 「あ……これ、面白そう。です」
2088 = "「A......Cái này, có vẻ thú vị. Ạ.」"
# monologue
# JP: 真っ先に賛意を示すふかみと、\nその隣、難しい顔をしている日々姫。
3310 = "Fukami là người đầu tiên tỏ ý tán thành, còn bên cạnh, Hibiki đang nhăn mặt suy nghĩ."
# 【れいな】
# display as 玲奈
# JP: 「ポーレット、この字はなんて読むですかぁ？」
2416 = "「Paulette, chữ này đọc là gì vậy ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[こうじ]麹よ、れいな。\n焼酎づくりの……うーんと、原料のひとつ。かなぁ？」
2443 = "「Là men kōji đó, Reina. Của việc nấu rượu shochu......ừm, là một trong những nguyên liệu. Chắc vậy?」"
# monologue
# JP: 字をひとつひとつ追っているれいなと、\nそれ以上に慎重に読み込んでくれているポーレット。
3334 = "Reina đang dò dẫm từng chữ một, còn Paulette thì đang đọc tài liệu cẩn thận hơn thế nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「うんっ」
# 2110 = "「嗯」" 
# monologue
# JP: やがてポーレットは顔をあげ、\nきらきらした目で僕を見て――
2823 = "Một lúc sau, Paulette ngẩng mặt lên, nhìn tôi bằng đôi mắt lấp lánh――"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
2059 = "「Hau!!?」"
# monologue
# JP: いきなり頬を真っ赤に染めて、ぶんぶんぶん、と首を振り。
3219 = "Đột nhiên mặt đỏ bừng, rồi lắc đầu nguầy nguậy."
# monologue
# JP: 深呼吸して、書類を見直し、\n水を一口飲んでゆっくり、言葉をつなぐ。
3050 = "Hít một hơi thật sâu, xem lại tài liệu, uống một ngụm nước rồi từ từ tiếp lời."
# 【ポーレット】
# display as 波萊特
# JP: 「これはいい案。素晴らしくありだと思います。\n\\x%l8620;#00ffc040;8620%l;#;改修の時点から、これなら、半ば公共事業的に――」
2571 = "「Đây là một ý tưởng hay. Tôi nghĩ là hoàn toàn tuyệt vời. Từ thời điểm phục hồi \\x%l8620;#00ffc040;8620%l;#;, nếu làm thế này, có thể coi như một nửa là dự án công cộng――」"
# monologue
# JP: そこまでいって、また口を閉じ。\nもう一度書類を確認してから、こくりと頷く。
3291 = "Nói đến đó, cô ấy lại ngậm miệng. Sau khi xác nhận lại tài liệu một lần nữa, cô ấy gật đầu cái rụp."
# 【ポーレット】
# display as 波萊特
# JP: 「うん。この案でしたら改修の方については、\n市から、既存の補助金、多分、つけられる枠があります」
2109 = "「Ừm. Nếu là phương án này thì về phần phục hồi, có lẽ, có thể xin được trợ cấp từ các khoản hiện có của thành phố.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。そうなればありがたい」
2358 = "「Ồ. Nếu được vậy thì tốt quá.」"
# monologue
# JP: 仮に補助金が低額でも、“市の協賛”的な看板がつけば、\n信用度が格段にあがり、より参加して貰い易くなるはずだ。
3133 = "Giả sử tiền trợ cấp có ít đi chăng nữa, nhưng nếu có được danh nghĩa “thành phố tài trợ”, thì độ tin cậy sẽ tăng lên đáng kể, và chắc chắn sẽ dễ dàng kêu gọi người tham gia hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、周知。認知度の向上。ひいては、できる限り\n多くの市民に、改修に関わってもらうことが最重要だ」
2482 = "「Dù sao thì, cũng phải thông báo rộng rãi. Nâng cao độ nhận diện. Hơn nữa, quan trọng nhất là phải thu hút càng nhiều người dân tham gia vào việc phục hồi càng tốt.」"
# monologue
# JP: この計画の要点をあらためて言葉に直し、伝える。
3167 = "Tôi tóm tắt lại những điểm chính của kế hoạch này bằng lời và truyền đạt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「『御一夜のSL』として[ハチロクニイマル,3]8620を認識してもらう。\nそれができれば、\\x%l8620;#00ffc040;8620%l;#;を観光復権の旗印と出来よう」
2169 = "「Phải làm cho mọi người nhận thức 8620 là 『SL của Ohimitera』. Nếu làm được điều đó, chúng ta có thể biến \\x%l8620;#00ffc040;8620%l;#; thành ngọn cờ đầu cho việc chấn hưng du lịch.」"
# 【日々姫】
# display as 日日姬
# JP: 「御一夜市の……私たちの町の、ＳＬ」
2211 = "「SL của thành phố Ohimitera......của thị trấn chúng ta.」"
# monologue
# JP: 厳しい顔のままで日々姫が、そっと呟く。
2885 = "Vẫn giữ vẻ mặt nghiêm trọng, Hibiki khẽ lầm bầm."
# 【日々姫】
# display as 日日姬
# JP: 「だからにぃに――兄さんは、工場誘致賛成派の私に、\n蒸気焼酎のラベルを描けとおっしゃっているのですか？」
2305 = "「Vậy nên anh hai――anh trai, mới bảo em, một người thuộc phe ủng hộ thu hút nhà máy, vẽ nhãn hiệu cho Shochu Hơi Nước sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「別に、切り崩そうとたくらんでいるわけではない。\n日々姫が、賛成派のままでも僕は一向に構わない」
2233 = "「Không phải là anh đang âm mưu lung lạc em đâu. Dù Hibiki có tiếp tục thuộc phe ủng hộ, anh cũng hoàn toàn không bận tâm.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2072 = "「Hả?」"
# monologue
# JP: 驚いたような、どこかさみしげにも見える顔。
3256 = "Khuôn mặt có vẻ ngạc nhiên, xen lẫn chút gì đó cô đơn."
# monologue
# JP: 言葉の不足を感じさせられ、\nひとつひとつを、自分の中でも噛み砕く。
3072 = "Cảm thấy lời nói của mình còn thiếu sót, tôi tự ngẫm lại từng chút một trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「銀行主導で作ったという、日々姫のイラストマップを\n見て思った。御一夜の再生を願う気持ちは同じだと」
2458 = "「Anh đã nghĩ vậy khi xem bản đồ minh họa do ngân hàng chủ đạo mà Hibiki vẽ. Rằng mong muốn tái thiết Ohimitera của chúng ta là giống nhau.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
2363 = "「Vâng, đúng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「同じ目的であるのなら、力を貸して貰えるかとも考えた。\n……日々姫の目的は、工場誘致そのものではなかろう？」
2243 = "「Nếu cùng chung mục đích, anh nghĩ liệu em có thể cho anh mượn sức không. ......Mục đích của Hibiki, không phải là bản thân việc thu hút nhà máy đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致は、もちろん、\n御一夜の経済再生のための手段と考えています」
2569 = "「Chuyện đó......việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, tất nhiên, em coi đó là phương tiện để tái thiết kinh tế Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2083 = "「Ừm.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですから……工場誘致無しに、よりリスクの少ない形で、\n経済再生ができるなら……理想的です、けど……」
2298 = "「Vì thế......nếu có thể tái thiết kinh tế mà không cần thu hút nhà máy, với hình thức ít rủi ro hơn......thì thật lý tưởng, nhưng mà......」"
# monologue
# JP: 理想的と認めてもなお、“けど”と言葉が濁ってしまう。\nなるほど。日々姫の逡巡の理由に見当がついてきた。
3213 = "Dù đã thừa nhận là lý tưởng, nhưng vẫn ngập ngừng với từ “nhưng mà”. Ra là vậy. Tôi đã lờ mờ đoán được lý do cho sự do dự của Hibiki."
# monologue
# JP: 小さなころから、日々姫はある面でひどく潔癖だった。\n別の言い方をするのなら、世渡りがひどく、不器用だった。
3059 = "Từ khi còn nhỏ, Hibiki đã cực kỳ mắc chứng sạch sẽ ở một khía cạnh nào đó. Nói cách khác, em ấy cực kỳ vụng về trong cách xử thế."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、手段は道具だ」
2333 = "「Hibiki, phương tiện chỉ là công cụ thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2072 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「最初にこれと選んだ道具に愛着を持つのは良いことだ。\n鉄道を愛する気持ちは、確かに尊い」
2174 = "「Việc có tình cảm với công cụ mình chọn đầu tiên là một điều tốt. Tình yêu dành cho đường sắt, quả thực rất đáng quý.」"
# monologue
# JP: ポーレット、れいな、ハチロクの視線が集中する中で、\n日々姫がうなずく。あいまいに。
3288 = "Dưới sự tập trung ánh nhìn của Paulette, Reina, Hachiroku, Hibiki gật đầu. Một cách mơ hồ."
# 【双鉄】
# display as 雙鐵
# JP: 「が、それに固執し、その他を頭から否定するのでは、\n最初に出会ったあの時のわがままなハチロクと同じだぞ」
1960 = "「Nhưng, nếu cứ cố chấp với nó, và phủ nhận những thứ khác ngay từ đầu, thì em cũng giống hệt Hachiroku bướng bỉnh lúc chúng ta mới gặp nhau thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
1569 = "「............」"
# monologue
# JP: 恥ずかしそうに、あるいは少しスネたのか、\nハチロクの視線が他所へ向く。
2834 = "Có vẻ xấu hổ, hoặc có lẽ hơi dỗi, ánh mắt Hachiroku hướng đi chỗ khác."
# monologue
# JP: 対して日々姫は、そういうことか、と\n今度ははっきり、強く頷く。
3380 = "Ngược lại, Hibiki thì như thể đã hiểu ra, lần này em ấy gật đầu mạnh mẽ và dứt khoát."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;を[おんてき,1]怨敵とまで言っていたハチロクは、しかし\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の利便性を認め、共存を考えるようになった」
2003 = "「Hachiroku từng gọi \\x%lエアクラ;#00ffc040;Aircra%l;#; là kẻ thù không đội trời chung, nhưng em ấy đã công nhận sự tiện lợi của \\x%lエアクラ;#00ffc040;Aircra%l;#;, và bắt đầu suy nghĩ đến việc chung sống.」"
# monologue
# JP: それどころか実際、\nひとりで僕の飛行\\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗るようにさえなった。
3069 = "Thậm chí trên thực tế, em ấy còn tự mình ngồi lên chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; bay của tôi nữa."
# monologue
# JP: その事実を知る日々姫にならば、\nきっと、誤解なく伝わろう。
3239 = "Nếu là Hibiki, người biết được sự thật đó, chắc chắn sẽ hiểu được mà không có sự hiểu lầm nào."
# 【双鉄】
# display as 雙鐵
# JP: 「手段は道具だ。結果を出すのに最適なものを選べばいい。\nもし、どれが最適かすぐには判断がつかぬものなら――」
2312 = "「Phương tiện chỉ là công cụ. Chỉ cần chọn cái tối ưu nhất để mang lại kết quả là được. Nếu không thể đánh giá ngay cái nào là tối ưu nhất thì――」"
# 【ハチロク】
# display as 八六
# JP: 「使い比べれば良いのです」
2521 = "「Thì cứ dùng thử rồi so sánh là được ạ.」"
# monologue
# JP: 静かに、そしてきっぱりと、\nハチロクが僕の言葉をつなぐ。
2914 = "Bình tĩnh, và dứt khoát, Hachiroku tiếp nối lời của tôi."
# 【ハチロク】
# display as 八六
# JP: 「[マスター,1]主人に不便をかけてまで使い続けられることを、\n道具は、手段は――決して望みはいたしません」
2307 = "「Việc tiếp tục bị sử dụng đến mức gây bất tiện cho chủ nhân, công cụ, phương tiện――tuyệt đối không hề mong muốn điều đó.」"
# monologue
# JP: ハチロクの言葉にれいなも頷く。\nごく当然と、そんな風情で。
3381 = "Reina cũng gật đầu trước lời của Hachiroku. Với một phong thái như thể đó là điều hiển nhiên."
# 【ハチロク】
# display as 八六
# JP: 「輸送のお役に立てぬなら、観光のお役に立てばいい。\n溶かされ素材に戻っても、形を変えて役立てばいい」
2196 = "「Nếu không thể giúp ích cho việc vận chuyển, thì giúp ích cho du lịch cũng được. Dù có bị nung chảy trở lại thành nguyên liệu, chỉ cần thay đổi hình dạng và giúp ích được là được.」"
# monologue
# JP: ごく淡々とした声に、\nハチロクは物だ、と、改めて痛感させられる。
2936 = "Giọng nói vô cùng bình thản, lại một lần nữa khiến tôi thấm thía nhận ra rằng, Hachiroku là một đồ vật."
# monologue
# JP: 人と変わらぬ知性を有していても、なお――\nいや、それどころか……知性のゆえ、ひときわに。
3125 = "Dù có trí tuệ không khác gì con người, nhưng vẫn―― Không, chính vì......có trí tuệ, nên mới càng nổi bật."
# 【ハチロク】
# display as 八六
# JP: 「使い比べられ試されることは、わたくしたちの宿命です。\nその上で選ばれるのなら、それこそまさに誇りなのです」
2511 = "「Bị dùng thử và so sánh, là số mệnh của chúng tôi. Nếu sau đó mà được chọn, thì đó mới chính là niềm tự hào.」"
# 【日々姫】
# display as 日日姬
# JP: 「……[くら]比ぶることは……\nズルかことじゃなかと？」
1577 = "「......Việc so sánh...... Không phải là gian xảo sao?」"
# monologue
# JP: ああ、やはり。\n日々姫はそこに引っ掛かり苦しんでしまっていたのだ。
3272 = "À, quả nhiên là vậy. Hibiki đã bị vướng mắc và đau khổ ở điểm đó."
# monologue
# JP: その引っ掛かりは確かに、潔癖さの現れだ。\nが、日々姫の成長を阻む潔癖さなど、美徳と僕は認めない。
3478 = "Sự vướng mắc đó chắc chắn là biểu hiện của chứng sạch sẽ. Nhưng, tôi không công nhận thứ chứng sạch sẽ cản trở sự trưởng thành của Hibiki là một mỹ đức."
# 【双鉄】
# display as 雙鐵
# JP: 「比べることを、ズルいと考える気持ちもわかる。\nだが、それを言うなら、比べぬことも、またズルい」
1975 = "「Anh cũng hiểu cảm giác coi việc so sánh là gian xảo. Nhưng, nếu nói vậy thì, việc không so sánh, cũng là một sự gian xảo.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2089 = "「A.」"
# monologue
# JP: 日々姫は、聡い。\nこの先はもう、いわずとも伝わっていることだろう。
3244 = "Hibiki rất thông minh. Phần sau chắc không cần nói em ấy cũng đã hiểu rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「比べないのは、最初から機会を奪うことであり――\n同時に、思考の放棄に等しいと僕は考える」
1909 = "「Không so sánh, tức là tước đoạt cơ hội ngay từ đầu―― Đồng thời, anh nghĩ nó cũng tương đương với việc từ bỏ suy nghĩ.」"
# 【日々姫】
# display as 日日姬
# JP: 「思考の、放棄……」
2322 = "「Từ bỏ, suy nghĩ......」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はこの案を、銀行に――\n宝生稀咲のところにも持ち込むつもりだ」
2270 = "「Anh dự định sẽ mang phương án này đến ngân hàng―― Đến chỗ Houshou Kisaki.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2632 = "「!」"
# monologue
# JP: 日々姫がびくりと顔を跳ね上げる。\nその反応に、確信が深まる。
3241 = "Hibiki giật nảy mình ngẩng mặt lên. Phản ứng đó càng làm tôi thêm 확 tín."
# monologue
# JP: 日々姫の\\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成の理論的な支柱、のみならず、\n精神的な支柱ともなっているのは、宝生稀咲なのだと。
3028 = "Người không chỉ là chỗ dựa lý luận cho việc ủng hộ thu hút \\x%lエアクラ;#00ffc040;Aircra%l;#; của Hibiki, mà còn là chỗ dựa tinh thần, chính là Houshou Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして、僕は確信している。宝生稀咲は間違いなく。\n工場誘致の手を緩めずに、僕らの案にも協力する――と」
2487 = "「Và, anh tin chắc. Houshou Kisaki chắc chắn. Sẽ không nới lỏng tay trong việc thu hút nhà máy, mà vẫn sẽ hợp tác với phương án của chúng ta――」"
# 【日々姫】
# display as 日日姬
# JP: 「そう、ですね。\n稀咲センパイなら、絶対、間違いなくそうします」
2362 = "「Đúng, vậy nhỉ. Nếu là tiền bối Kisaki, tuyệt đối, chắc chắn chị ấy sẽ làm vậy.」"
# monologue
# JP: 戸惑ってた瞳から、曇りの全てが消え去っている。\n日々姫らしい、快活な光が戻っている。
3250 = "Mọi sự u ám đã biến mất khỏi đôi mắt từng bối rối. Ánh sáng hoạt bát, đặc trưng của Hibiki đã quay trở lại."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん。私、描きます。蒸気焼酎のラベル。\n私に描ける、一番いい絵で仕上げてみせます」
2081 = "「Anh hai. Em sẽ vẽ. Nhãn hiệu cho Shochu Hơi Nước. Em sẽ hoàn thành nó bằng bức tranh đẹp nhất mà em có thể vẽ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、助かる」
2360 = "「Vậy sao, giúp anh nhiều lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「やめてください、お礼だなんて。\n兄妹ですよ？　水臭い」
2020 = "「Đừng có cảm ơn em nữa. Chúng ta là anh em mà? Khách sáo quá đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな」
1976 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 義理だとはいえ、兄妹だ。\n日々姫の求めるものが何かを、遅ればせながら理解する。
3126 = "Dù là trên danh nghĩa, nhưng chúng tôi là anh em. Dù hơi muộn màng, nhưng tôi đã hiểu được điều Hibiki mong muốn là gì."
# 【双鉄】
# display as 雙鐵
# JP: 「頼りにしてるぞ、日々姫」
2601 = "「Trông cậy vào em đấy, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
2058 = "「A.」"
# monologue
# JP: わし、わし、わし。\n日々姫の頭を、掻くようにして豪快に撫でる。
3173 = "Xoa, xoa, xoa. Tôi xoa đầu Hibiki một cách hào sảng như đang gãi."
# 【日々姫】
# display as 日日姬
# JP: 「に、兄さん――もう、髪がくしゃくしゃになっちゃう」
2080 = "「A, anh hai――thật tình, tóc em rối hết rồi này.」"
# monologue
# JP: だが、やめろとは口にしない。\nこういうところは、小さなころと変わっていない。
3000 = "Nhưng, em ấy không bảo tôi dừng lại. Điểm này thì, vẫn chẳng khác gì hồi còn nhỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「それでですね、双鉄くん」
2314 = "「Vậy thì, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2084 = "「Ừm.」"
# monologue
# JP: 社長モードの鋭い声に、\n手を止め姿勢を整えなおす。
3289 = "Giọng nói sắc sảo của chế độ giám đốc, khiến tôi dừng tay và chỉnh lại tư thế."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l8620;#00ffc040;8620%l;#;がどんな機関車か、数字だけだと普通の人は、\n実感、できないとわたし思います」
2280 = "「Tôi nghĩ, nếu chỉ dựa vào những con số thì người bình thường sẽ không thể cảm nhận được thực tế \\x%l8620;#00ffc040;8620%l;#; là một chiếc đầu máy như thế nào đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだな。僕とて、大きさと凄さを実感したのは、\n目の当たりにして、ようやっとだった」
2524 = "「Đúng là vậy. Ngay cả tôi, cũng chỉ thực sự cảm nhận được độ lớn và sự tuyệt vời của nó, khi tận mắt chứng kiến.」"
# 【ポーレット】
# display as 波萊特
# JP: 「計画がどんなに優れたものに思えても、\n実感がないと、人はなかなか動き出せないとも思います」
1927 = "「Dù kế hoạch có vẻ xuất sắc đến đâu, nhưng nếu không có cảm nhận thực tế, tôi nghĩ mọi người sẽ rất khó để bắt tay vào hành động.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それも、確かに」
2473 = "「Chuyện đó, cũng đúng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですから、考えたんですけど――修復にかかる前に、\n[ハチロクニイマル,3]8620、一度公開展示したらどうでしょう？」
2302 = "「Vì vậy, tôi đã nghĩ――trước khi bắt tay vào phục hồi, hay là chúng ta tổ chức trưng bày công khai 8620 một lần xem sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、見てみたい！　見てみたい、です」
2098 = "「A, em muốn xem thử! Em muốn xem thử, ạ.」"
# monologue
# JP: 真っ先に、思わぬところから声が来る。
3371 = "Đầu tiên, một giọng nói vang lên từ nơi không ngờ tới."
# 【ふかみ】
# display as 深美
# JP: 「\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;って、本物見たことないから。\nあの、興味とか……結構、ある。です」
2257 = "「Vì em chưa từng thấy \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; thật bao giờ. Nên, em khá là......có hứng thú. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ふかみ達にはそうだろうな。\n僕世代でも、子供の頃にかろうじてだから」
2424 = "「Đúng là với thế hệ của Fukami thì là vậy nhỉ. Ngay cả thế hệ của tôi, cũng chỉ may mắn được thấy hồi còn nhỏ thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんも、実物見れるんだったら来ると思うし。\n凪ちゃん凄く人気あるから、たくさん来て、親御さんも」
2260 = "「Em nghĩ Nagi cũng sẽ đến nếu được xem tận mắt. Nagi rất được yêu mến, nên chắc sẽ có nhiều người đến, cả phụ huynh nữa.」"
# monologue
# JP: 真っ赤になっていっぱいいっぱいのふかみの言葉は、\nけれどもストンと、僕に理解を与えてくれる。
3309 = "Khuôn mặt đỏ bừng và những lời nói đầy nỗ lực của Fukami, lại khiến tôi dễ dàng hiểu ra vấn đề."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。人気があるという凪に学友を誘ってもらえば、\nその保護者達にも自然、周知が出来るというわけか」
2032 = "「Ra là vậy. Nếu nhờ Nagi, người rất được yêu mến, rủ rê bạn học, thì tự nhiên cũng sẽ thông báo được cho cả phụ huynh của các em ấy nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「です。です」
2364 = "「Vâng. Vâng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「口コミは、効果ありますからね。\nことに、御一夜のような古い町では」
2184 = "「Truyền miệng có hiệu quả lắm đấy. Đặc biệt là ở một thị trấn cổ như Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「保護者にも様々な世代の方がいるだろうし、な」
2455 = "「Trong số phụ huynh chắc cũng có nhiều thế hệ khác nhau nhỉ.」"
# monologue
# JP: 凪・ふかみ世代には、見たことがなく目新しいもの。\n蓑笠老人の世代には、間違いなく懐かしいものだろう。
2955 = "Đối với thế hệ của Nagi và Fukami, đó là một thứ mới mẻ chưa từng thấy. Đối với thế hệ của ông lão Minokasa, chắc chắn đó sẽ là một thứ đầy hoài niệm."
# monologue
# JP: 二世代どころか三世代――\n家族全てを、巻き込めるようになるかもしれぬ。
2883 = "Không chỉ hai thế hệ mà là ba thế hệ―― Có lẽ chúng ta sẽ có thể lôi kéo được cả gia đình."
# 【双鉄】
# display as 雙鐵
# JP: 「町全体を巻き込むという目的には、確かに、\n学園生からの口コミは、大きな効果を示せそうに思う」
2244 = "「Đúng là, với mục đích lôi kéo toàn bộ thị trấn, tôi nghĩ truyền miệng từ học sinh sẽ mang lại hiệu quả lớn.」"
# 【ふかみ】
# display as 深美
# JP: 「あと、ポスターとかビラとかあれば、\n発船所でも配る。です。それで、そしたらっ」
2453 = "「Ngoài ra, nếu có áp phích hay tờ rơi, thì ở bến xuất phát cũng sẽ phát. Ạ. Thế thì, lúc đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、観光客にもアピールしておけば、\nいざ\\x%l8620;#00ffc040;8620%l;#;が走ったときにリピートを望めるかもしれんな」
2353 = "「Ra là vậy, nếu chúng ta quảng bá cho cả khách du lịch, thì khi \\x%l8620;#00ffc040;8620%l;#; thực sự chạy, có thể hy vọng họ sẽ quay lại nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、展示会場には来場者アンケートも用意して、\n案内が必要な人には連絡をできるようにしましょう」
2603 = "「Vậy thì, chúng ta hãy chuẩn bị cả phiếu khảo sát khách tham quan tại địa điểm trưng bày, để có thể liên lạc với những người cần hướng dẫn nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「写真もたくさんかざるときっといいですよぉ。\nパパさんのとか、ポーレットの\\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間さんのとか」
2590 = "「Chắc chắn sẽ rất tuyệt nếu trang trí thật nhiều ảnh đấy ạ. Ảnh của chú, hay ảnh của các bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#; của Paulette chẳng hạn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな。すごく素敵な考えね。\n[ハチロク,3]8620形なら、走ってる写真もたくさんあるはず」
2348 = "「Đúng vậy nhỉ, Reina. Một ý tưởng rất tuyệt vời. Nếu là dòng 8620, chắc chắn sẽ có rất nhiều ảnh chụp lúc đang chạy.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへ～。\nれいな、ほめられちゃいましたぁ」
2115 = "「Ehehe~. Reina, được khen rồi ạ.」"
# monologue
# JP: アイディアが次のアイディアを呼び、\nそれで議論が活性化する。
3509 = "Ý tưởng này gọi ý tưởng khác, nhờ đó cuộc thảo luận trở nên sôi nổi."
# monologue
# JP: ――良い循環が産まれてきている。
1519 = "――Một vòng tuần hoàn tốt đẹp đang được sinh ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ポスターとビラも、負担的に大丈夫であれば、\n日々姫に頼めると嬉しいのだが」
2516 = "「Về áp phích và tờ rơi, nếu không quá sức, anh rất vui nếu có thể nhờ Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「キービジュアルを描いて、ラベル、ポスター、ビラに、\nバリエーションやレイアウトを変えて活用する」
2449 = "「Em sẽ vẽ hình ảnh chủ đạo, rồi thay đổi các biến thể và bố cục để tận dụng cho nhãn hiệu, áp phích, tờ rơi.」"
# monologue
# JP: 間髪入れぬ日々姫の答え。
3251 = "Câu trả lời không chút chần chừ của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「そうすれば、負担の増加は最小限で済みますから。\n私、兄さんの期待に答えてみせます」
2582 = "「Làm như vậy, sự gia tăng gánh nặng sẽ được giữ ở mức tối thiểu. Em sẽ chứng minh cho anh thấy em có thể đáp lại kỳ vọng của anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな」
2583 = "「Đáng tin cậy thật đấy.」"
# monologue
# JP: 心の底から、その言葉が出る。
3476 = "Những lời đó thốt ra từ tận đáy lòng."
# monologue
# JP: 日々姫は僕の知らない間に、\nプロの仕事をこなすようになっている。
2831 = "Trong lúc tôi không hay biết, Hibiki đã có thể hoàn thành công việc của một chuyên gia."
# monologue
# JP: （いや――）
3517 = "（Không――）"
# monologue
# JP: 日々姫一人だけではない。ポーレットも、ふかみも、\n一見たよりないれいなまでもが、正真正銘のプロなのだ。
2826 = "Không chỉ riêng Hibiki. Cả Paulette, Fukami, thậm chí cả Reina trông có vẻ yếu ớt, cũng là những chuyên gia đích thực."
# monologue
# JP: 普段から自分の仕事を、工夫し考えているからこそ、\nこうも次々、有用なアイディアも出てくるのだろう。
3278 = "Chính vì bình thường họ luôn suy nghĩ và tìm tòi cho công việc của mình, nên mới có thể liên tục đưa ra những ý tưởng hữu ích như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2525 = "「Cảm ơn mọi người.」"
# monologue
# JP: 頭が下がる。\nとても自然に。
3179 = "Tôi cúi đầu. Một cách rất tự nhiên."
# monologue
# JP: やがて再びあげた頭を、\n静かに、ハチロクへと向ける。
2824 = "Một lúc sau, tôi ngẩng đầu lên, lặng lẽ hướng về phía Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。ハチロク。お前も望んでくれるなら、\n修復前の\\x%l8620;#00ffc040;8620%l;#;の展示を行いたい」
2193 = "「Chuyện là như vậy đấy. Hachiroku. Nếu em cũng mong muốn, anh muốn tổ chức trưng bày \\x%l8620;#00ffc040;8620%l;#; trước khi phục hồi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、すでに申しております」
2252 = "「Tôi, đã nói rồi mà.」"
# monologue
# JP: ハチロクの声は落ち着いている。\n顔色にも様子にも、特段の変化は見られない。
2930 = "Giọng Hachiroku rất bình tĩnh. Sắc mặt hay dáng vẻ, không có sự thay đổi nào đặc biệt."
# monologue
# JP: だが――僕ははっきり、理解できている。\n修復前を公開するとはつまり、事故痕を晒すことなのだと。
2877 = "Nhưng――tôi có thể hiểu rõ. Công khai trước khi phục hồi, nghĩa là phơi bày những vết tích của vụ tai nạn."
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、[ハチロクニイマル,3]8620も、\n双鉄様の所有物で、経営資源です。ですので当然――」
2250 = "「Cả tôi, và 8620, đều là tài sản của ngài Soutetsu, là tài nguyên kinh doanh. Vì vậy đương nhiên――」"
# 【双鉄】
# display as 雙鐵
# JP: 「故に、僕の望みに従う。\n物としてのお前たちの本懐がそれと、理解している」
2626 = "「Nên, em sẽ tuân theo mong muốn của tôi. Anh hiểu đó là tâm nguyện của các em với tư cách là một đồ vật.」"
# monologue
# JP: ならば、それでいいではないか。\n僕の理性はそう言っている。
1536 = "Nếu vậy, thì tốt quá rồi còn gì. Lý trí của tôi đang nói như vậy."
# monologue
# JP: だが感情は――僕だけではない、\nハチロクにだって、存在するのだ。
2879 = "Nhưng cảm xúc thì――không chỉ riêng tôi, mà cả Hachiroku, cũng có."
# 【双鉄】
# display as 雙鐵
# JP: 「その上で問おう。\nお前は、修復前の\\x%l8620;#00ffc040;8620%l;#;の公開を果たして、望むのか？」
2132 = "「Dựa trên điều đó, anh muốn hỏi. Rốt cuộc em, có mong muốn công khai \\x%l8620;#00ffc040;8620%l;#; trước khi phục hồi không?」"
# monologue
# JP: ……事故の傷跡。その深さ。\nある程度なら、僕にも共感できるつもりだ。
1545 = "......Vết sẹo của vụ tai nạn. Sự sâu sắc của nó. Ở một mức độ nào đó, tôi nghĩ mình có thể đồng cảm được."
# monologue
# JP: 公開が、ハチロクの傷をどうしようもなく抉るのならば、\nそれはかえって、復活を遠ざけることにしかならんだろう。
2942 = "Nếu việc công khai, đào xới vết thương của Hachiroku một cách tàn nhẫn, thì điều đó ngược lại, sẽ chỉ làm cho sự phục sinh ngày càng xa vời."
# 【ハチロク】
# display as 八六
# JP: 「ですから……\nわたくしは、双鉄様の所有物として――」
2292 = "「Vì vậy...... Tôi, với tư cách là tài sản của ngài Soutetsu――」"
# 【双鉄】
# display as 雙鐵
# JP: 「物を超えた部分の。お前をお前たらしめる知性の。\nお前自身の――お前の望みはどうであるかと聞いている」
2251 = "「Anh đang hỏi về phần vượt lên trên một đồ vật. Về trí tuệ làm nên con người em. Về chính bản thân em――anh đang hỏi mong muốn của em là gì.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、自身……\nわたくしの、望み――」
2279 = "「Bản thân, tôi...... Mong muốn, của tôi――」"
# monologue
# JP: 声が、震える。
3076 = "Giọng nói, run rẩy."
# monologue
# JP: それこそが、その迷いこそが\n物以上な部分、ハチロクな部分なのだと強く感じる。
3188 = "Chính điều đó, chính sự do dự đó tôi cảm nhận mạnh mẽ rằng đó là phần vượt lên trên đồ vật, là phần của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「以前に、お尋ねいただいたときと――\n変わらぬことしか、まだわたくしには言えません」
2246 = "「Giống như lúc ngài hỏi tôi trước đây―― Tôi vẫn chỉ có thể nói những điều không thay đổi.」"
# monologue
# JP: 力なく、ハチロクはその唇から言葉を零す。
2920 = "Hachiroku yếu ớt thốt ra những lời từ đôi môi."
# 【ハチロク】
# display as 八六
# JP: 「自分の望みが何であるのか……答える以前に、\n考えようとすることが――わたくしには難しいようです」
2278 = "「Mong muốn của mình là gì......trước khi trả lời, việc cố gắng suy nghĩ――có vẻ như rất khó đối với tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2577 = "「Vậy sao.」"
# monologue
# JP: 僕と同じだ。かつての僕と。\nそう直感する。
3192 = "Giống như tôi. Giống như tôi của quá khứ. Tôi trực giác cảm thấy như vậy."
# monologue
# JP: かけがえの無い存在を、事故に巻き込んでしまった罪悪感。\nそれがあるゆえ、望むそのことが、恐ろしいのだ。
3108 = "Cảm giác tội lỗi vì đã cuốn những người không thể thay thế vào vụ tai nạn. Chính vì có nó, nên việc mong muốn điều đó, mới thật đáng sợ."
# 【ハチロク】
# display as 八六
# JP: 「ですが、これだけはわかります。\n[ハチロクニイマル,3]8620の望みでしたら――わかります」
1962 = "「Nhưng, chỉ điều này là tôi hiểu. Nếu là mong muốn của 8620――thì tôi hiểu.」"
# monologue
# JP: それでも、ハチロクは前を向く。
2895 = "Dù vậy, Hachiroku vẫn hướng về phía trước."
# 【ハチロク】
# display as 八六
# JP: 「あの子は、間違いなく望みます。\nどれほどの傷を晒そうと、どれほど苦痛を味わおうとも」
2159 = "「Đứa trẻ đó, chắc chắn sẽ mong muốn. Dù có phải phơi bày bao nhiêu vết thương, dù có phải nếm trải bao nhiêu đau đớn đi chăng nữa.」"
# monologue
# JP: うつむいていた顔をあげ、とても静かに、言葉をつなぐ。
3062 = "Ngẩng khuôn mặt đang cúi gầm lên, thật tĩnh lặng, em ấy tiếp lời."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l客車;#00ffc040;客車%l;#;を引いて、もう一度――お客様とともに走ること。\nただそれだけを、必ず、あの子は望みます」
2317 = "「Kéo \\x%l客車;#00ffc040;toa hành khách%l;#;, một lần nữa――chạy cùng với hành khách. Chỉ điều đó thôi, chắc chắn, đứa trẻ đó sẽ mong muốn.」"
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3522 = "（Cọc cạch, cọc cạch, xình xịch, xình xịch――）"
# monologue
# JP: 列車の音に揺られて、気づく。\nいつの間に、僕は眠ってしまっていたのだと。
3008 = "Lắc lư theo tiếng tàu chạy, tôi chợt nhận ra. Từ lúc nào, tôi đã ngủ thiếp đi mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ここしばらく、無理を重ねすぎてしまっていたか。\n思ったよりも、やるべきも、準備すべきも多すぎて」
2459 = "「Dạo gần đây, mình đã cố gắng quá sức rồi sao. Những việc phải làm, những việc phải chuẩn bị, nhiều hơn mình nghĩ quá.」"
# 【路子】
# display as 路子
# JP: 「そーちゃん……」
2185 = "「Bé Sou......」"
# 【双鉄】
# display as 雙鐵
# JP: 「路子？」
2545 = "「Michiko?」"
# monologue
# JP: 少し震える、たよりない声。\nなぜだろう。路子はおびえているようだ。
3412 = "Giọng nói hơi run rẩy, yếu ớt. Tại sao chứ. Michiko có vẻ đang sợ hãi."
# 【路子】
# display as 路子
# JP: 「あのきかんしゃ。人に見せるの？」
2606 = "「Chiếc đầu máy đó. Anh định cho mọi người xem sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2085 = "「A――」"
# monologue
# JP: 事故の傷。\n僕でさえ、僕らの事故を連想し、気分がひどく落ち込んだ。
2856 = "Vết thương của vụ tai nạn. Ngay cả tôi, cũng liên tưởng đến vụ tai nạn của chúng tôi, và cảm thấy vô cùng tồi tệ."
# monologue
# JP: 路子にも、あるいはあの傷が、\n僕を通じて見えたのだろうか？
3460 = "Có lẽ Michiko cũng vậy, thông qua tôi, đã nhìn thấy những vết thương đó sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「……うむ。見せる」
1581 = "「......Ừm. Sẽ cho xem.」"
# monologue
# JP: 路子の怯えを、確かに感じる。\nけれど、事実をそのまま伝える。
3197 = "Tôi thực sự cảm nhận được sự sợ hãi của Michiko. Nhưng, tôi vẫn truyền đạt sự thật như nó vốn có."
# monologue
# JP: 終着駅へ路子を届けるそのために、\n公開展示も、きっと必要となる行為であると思うから。
3330 = "Bởi vì để đưa Michiko đến ga cuối, tôi nghĩ việc trưng bày công khai, chắc chắn cũng là một hành động cần thiết."
# 【路子】
# display as 路子
# JP: 「きずは、こわいよ。あんなのみえたら、きっとみんな、てつどう事故のことをおもって、こわがるよ」
1989 = "「Vết thương, đáng sợ lắm. Nếu thấy những thứ như thế, chắc chắn mọi người, sẽ nhớ đến tai nạn đường sắt, và sẽ sợ hãi đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心配してくれているのか」
1972 = "「Em đang lo lắng cho anh sao.」"
# 【路子】
# display as 路子
# JP: 「だってそーちゃん。そーしたいんでしょ？」
2125 = "「Bởi vì bé Sou. Anh muốn làm vậy mà đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……優しいな。路子は」
1584 = "「......Michiko, thật tốt bụng.」"
# monologue
# JP: ――僕ひとりだけが大きくなってしまっても。
1515 = "――Cho dù chỉ có mình tôi lớn lên."
# monologue
# JP: あの頃のまま変わらない、とても小さなてのひらで、\nそれでも僕を、懸命に守ろうとしてくれる。
3082 = "Bằng bàn tay nhỏ bé không hề thay đổi từ hồi đó, em ấy vẫn đang, liều mạng cố gắng bảo vệ tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、そこは大丈夫。大丈夫になったんだ。\nやはり、議論になってしまってな」
1930 = "「Nhưng, chuyện đó thì không sao đâu. Đã không sao rồi. Quả nhiên là, đã xảy ra tranh luận mà.」"
# monologue
# JP: 赤井宮司が率直に意見してくれた。
3436 = "Cung tư tế Akai đã thẳng thắn đưa ra ý kiến."
# monologue
# JP: 事故の傷を見せつけることは、大廃線末期の鉄道不信――\nそれを想い出させてしまう結果を呼びかねないと。
3137 = "Rằng việc phơi bày vết thương của vụ tai nạn, có thể dẫn đến kết quả gợi nhớ lại sự mất lòng tin vào đường sắt thời kỳ cuối của Đại bãi bỏ tuyến."
# 【双鉄】
# display as 雙鐵
# JP: 「かといって、今は十分な修復をできる状況にもない。\nゆえ傷を、上手に隠して展示をすることとなった」
2617 = "「Mặc dù vậy, hiện tại cũng không có điều kiện để phục hồi đầy đủ. Do đó, chúng ta đã quyết định khéo léo che giấu những vết thương để trưng bày.」"
# 【路子】
# display as 路子
# JP: 「じょうずにかくす？」
2204 = "「Khéo léo che giấu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。[てすう,1]手数は相当にかかったがな。\n今日で、なんとか形にできたかと思う」
2106 = "「Ừm. Mặc dù tốn khá nhiều công sức. Nhưng hôm nay, anh nghĩ là đã tạm định hình được rồi.」"
# monologue
# JP: ――ダメージの無い機関士側に公開展示の導線を引き、\n傷の激しい助士側への一般客の立ち入りはご遠慮いただく。
1517 = "――Kéo dây hướng dẫn khách tham quan công khai về phía ghế lái không bị hư hại, và từ chối khách tham quan thông thường bước vào phía ghế phụ lái bị hư hỏng nặng."
# monologue
# JP: 日々姫と蓑笠老人によるカモフラージュも加えたゆえに、\n素人の目に8620は、『綺麗なSL』としか見えなくなった。
3280 = "Nhờ có thêm sự ngụy trang của Hibiki và ông lão Minokasa, trong mắt những người nghiệp dư, 8620 giờ chỉ còn là một 『SL tuyệt đẹp』."
# 【双鉄】
# display as 雙鐵
# JP: 「修復が必要なことなどは、パネル展示で説明する。\nお祭り気分の人たちに、傷を見せても仕方がないゆえ」
2623 = "「Những việc cần phục hồi, sẽ được giải thích trên bảng trưng bày. Vì có cho những người đang có tâm trạng lễ hội xem vết thương cũng chẳng để làm gì.」"
# 【路子】
# display as 路子
# JP: 「しかたない、の？」
2399 = "「Chẳng để làm gì, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、見てほしいのは、鉄道復活という希望だからな。\n大廃線の記憶のことは、興味あるものだけが見ればいい」
2401 = "「Ừ, bởi vì thứ anh muốn mọi người thấy, là hy vọng về sự phục sinh của đường sắt mà. Còn ký ức về Đại bãi bỏ tuyến, chỉ những ai quan tâm thì xem là được.」"
# 【路子】
# display as 路子
# JP: 「……そーなんだ」
1586 = "「......Ra là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2633 = "「!?」"
# 【路子】
# display as 路子
# JP: 「じょうずにかくして、みえなくなったら。\n事故のこと――みんな、わすれちゃうんだ」
2203 = "「Nếu khéo léo che giấu, và không ai nhìn thấy nữa. Chuyện về vụ tai nạn――mọi người, sẽ quên mất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「路子――」
2540 = "「Michiko――」"
# monologue
# JP: 胸がざわつく。\n僕のうかつな一言が、路子を悲しい思いにさせた。
3388 = "Lồng ngực xôn xao. Một lời nói vô ý của tôi, đã khiến Michiko cảm thấy buồn bã."
# monologue
# JP: “忘れられてしまう”恐怖を、\n恐らく、路子に与えてしまった。
3182 = "Nỗi sợ hãi “bị lãng quên”, có lẽ, tôi đã gieo rắc nó cho Michiko mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「路子、それとこれとは――」
2544 = "「Michiko, chuyện đó và chuyện này là――」"
# monologue
# JP: 違うといいたい。否定したい。\nけれど、なにが違うのか説明できない。
3180 = "Tôi muốn nói là khác nhau. Tôi muốn phủ nhận. Nhưng, tôi không thể giải thích được là khác nhau ở chỗ nào."
# monologue
# JP: 大きくなにかが違うのだけれど、\n焦る頭は、言葉をうまく見つけ出せない。
2901 = "Có một sự khác biệt rất lớn, nhưng đầu óc đang rối bời, không thể tìm ra từ ngữ thích hợp."
# 【路子】
# display as 路子
# JP: 「そー、ちゃん？」
2186 = "「Bé, Sou?」"
# monologue
# JP: 路子がゆらぐ。\n路子が見ている僕もおそらく、ゆらいでいよう。
3457 = "Michiko đang dao động. Tôi trong mắt Michiko có lẽ cũng đang, dao động."
# monologue
# JP: 路子の不安な眼差しを、せめて笑顔に変えたくて――\n果たせないまま、僕は、目覚める。
3195 = "Ít nhất tôi muốn biến ánh mắt bất an của Michiko thành nụ cười―― Nhưng chưa kịp làm được điều đó, tôi đã, tỉnh giấc."
# 【凪】
# display as 凪
# JP: 「にーぎやっかばーーいっ！！」
2152 = "「Náo nhiệt quá đi thôiiii!!」"
# monologue
# JP: ――　8620復活準備展示会　――
1523 = "――　Triển lãm chuẩn bị phục hồi 8620　――"
# monologue
# JP: その会場、\nつまりは\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内に、明るい声がかぁんと響く。
3269 = "Tại hội trường đó, tức là bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, một giọng nói lanh lảnh vang lên."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが一番にぎやかだよぉ。\nね？　もう少し声、抑えよう？」
2375 = "「Nagi là ồn ào nhất đấy. Nhé? Nhỏ giọng xuống một chút nào?」"
# 【凪】
# display as 凪
# JP: 「やにわにだごばい！　[ゆべし,2]柚餅子ばい！\nあ、かき氷も食べたかばいっ！」
2385 = "「Tự nhiên đói bụng quá! Yubeshi! (Bánh nếp yuzu) A, cũng muốn ăn cả đá bào nữa!」"
# monologue
# JP: 恥ずかしそうなふかみの制止を、凪は聞かない。\nまさしく文字通り、聞いてない。
3321 = "Nagi không nghe lời can ngăn đầy xấu hổ của Fukami. Đúng nghĩa đen là, không thèm nghe."
# monologue
# JP: \\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内部の出店を、\n次から次へ、覗きこんでははしゃいでいる。
3087 = "Cứ hết ngó vào gian hàng này đến gian hàng khác bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, và đang rất phấn khích."
# 【凪】
# display as 凪
# JP: 「なに食べようか悩むばい！\nなやんだ時は全部いけってじいちゃん――がっ！？」
2023 = "「Đau đầu không biết nên ăn gì đây! Ông nội bảo lúc nào đau đầu thì cứ quất hết――hả!?」"
# monologue
# JP: ぴたりと止まる。\n動きが、声が。
2973 = "Khựng lại. Cả hành động, lẫn giọng nói."
# monologue
# JP: そうして凪の視線は上ヘ、上へ上へとゆっくり動く。
3220 = "Và rồi ánh mắt Nagi từ từ di chuyển lên trên, lên trên, lên trên nữa."
# 【凪】
# display as 凪
# JP: 「……でっかかぁ～」
1583 = "「......To quá~」"
# 【ふかみ】
# display as 深美
# JP: 「うん、おっきいよね」
2111 = "「Ừm, to thật đấy nhỉ.」"
# monologue
# JP: 対象が予想以上に大きすぎ、\n接近するまで、それと気づけなかったのだろうか。
3040 = "Đối tượng quá to lớn so với tưởng tượng, có lẽ phải đến gần, mới nhận ra được điều đó."
# monologue
# JP: 凪はぽかんと口を開け、\nすがるような目で僕らの方へと振り返る。
2965 = "Nagi há hốc miệng, quay lại nhìn về phía chúng tôi với ánh mắt như cầu cứu."
# 【凪】
# display as 凪
# JP: 「これが、今日見に来た汽車ぽっぽばい？」
1946 = "「Đây là, chiếc xe lửa xình xịch hôm nay chúng ta đến xem sao?」"
# 【ふかみ】
# display as 深美
# JP: 「そうだよ。ＳＬ。\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の、はちろく――にい、まる？」
2175 = "「Đúng vậy đó. SL. \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;, Hachiroku――ni, maru?」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1569 = "「…………」" 
# monologue
# JP: 僕の傍ら、ハチロクは口を閉ざしている。
2908 = "Bên cạnh tôi, Hachiroku đang im lặng."
# monologue
# JP: だから代わりに、普段のハチロクがするように、\n自信満々、芝居気たっぷりに声を張る。
3209 = "Vì vậy thay vào đó, giống như Hachiroku thường làm, tôi cất giọng đầy tự tin và đậm chất kịch."
# 【双鉄】
# display as 雙鐵
# JP: 「そう、これこそが国産蒸気第一号。\n栄光の[ハチロク,3]8620形トップナンバー機、[ハチロクニイマル,3]8620だ」
2403 = "「Đúng vậy, đây chính là chiếc máy hơi nước quốc sản đầu tiên. Cỗ máy chuyên dụng số hiệu đầu tiên đầy vinh quang của dòng 8620, 8620.」"
# 【凪】
# display as 凪
# JP: 「トップナンバー！　言葉の意味はわからんばってん、\nなんだかすごく、すごかたいっ！！」
2628 = "「Số hiệu đầu tiên! Dù không hiểu ý nghĩa của từ đó, nhưng cảm giác rất là, rất là tuyệt vời!!」"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「なになに凪ちゃん、どぎゃんしたと？」
1942 = "「Gì vậy gì vậy Nagi, sao thế?」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「機関車見とるの？　おっきかよね、これ」
2129 = "「Đang xem đầu máy sao? To thật đấy nhỉ, cái này.」"
# 【ふかみ】
# display as 深美
# JP: 「ぁ」
# 2089 = "「啊」" 
# monologue
# JP: ふかみの背中がみるみる丸まり、\n僕の後ろへと隠れてしまう。
3319 = "Lưng Fukami nhanh chóng cong lại, và trốn ra phía sau tôi."
# monologue
# JP: 凪は気づいてか気づかぬままか、\n学園生たちの方へと近づきエヘンと胸を張る。
2850 = "Nagi không biết là có nhận ra hay không, tiến lại gần đám học sinh và ưỡn ngực tự hào."
# 【凪】
# display as 凪
# JP: 「ただの機関車じゃなかとよ？　栄光のトップナンバー、\nこれぞハチロクニイマルたいっ！」
2573 = "「Không phải là đầu máy bình thường đâu nhé? Số hiệu đầu tiên đầy vinh quang, đây chính là Hachirokuniimaru đó!」"
# monologue
# JP: 見事なまでの受け売りだ。\n僕が張りあげた声よりも、よほど威勢が増している。
3346 = "Học mót một cách xuất sắc. Còn hùng hồn hơn cả giọng nói tôi vừa cất lên."
# monologue
# JP: いわば受け売りのたたき売り――\nその勢いに、学友と思しき少女たちは感染する。
3337 = "Có thể nói là bán rẻ kiến thức học mót―― Với khí thế đó, những thiếu nữ có vẻ là bạn học cũng bị lây nhiễm."
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「なにそれなにそれ、なんかすごそお！」
2496 = "「Gì vậy gì vậy, nghe có vẻ tuyệt quá!」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「トップナンバーって、いったいなんね！？」
1944 = "「Số hiệu đầu tiên, rốt cuộc là cái gì vậy!?」"
# 【凪】
# display as 凪
# JP: 「それは――それは！\nふかみちゃんが説明するばいっ！」
2627 = "「Cái đó――cái đó! Fukami sẽ giải thích cho!」"
# monologue
# JP: 瞬間、ふかみが凍りつく。
3316 = "Khoảnh khắc đó, Fukami cứng đờ người."
# 【ふかみ】
# display as 深美
# JP: 「ぇ――わ、わたし――とか、無理」
2061 = "「Hả――mi, mình――sao, không làm được đâu.」"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「早瀬さんが説明～？」
2337 = "「Bạn Hayase giải thích sao~?」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「なんでなんで？　凪ちゃんやって～」
2177 = "「Sao vậy sao vậy? Nagi làm đi~」"
# monologue
# JP: ふかみがますます小さくなる。\n声もほとんど、消え入らんばかりだ。
3313 = "Fukami càng lúc càng thu mình lại. Giọng nói cũng gần như, sắp tắt lịm."
# monologue
# JP: 学園でのふかみの姿は、きっといつでもこうなのだろう。\nが――であるのならば、こここそふかみの頑張りどころだ。
3305 = "Hình ảnh của Fukami ở trường, chắc chắn lúc nào cũng như thế này. Nhưng――nếu vậy, đây chính là lúc Fukami phải cố gắng."
# 【双鉄】
# display as 雙鐵
# JP: 「いいのか？　ふかみ。\n見捨てれば、凪が困るぞ」
2581 = "「Có ổn không? Fukami. Nếu em bỏ mặc, Nagi sẽ gặp rắc rối đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「ぅっ」
2100 = "「Ư」"
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;のことを凪はもとより、説明できない。\n展示会場内ではずっと、ハチロクは無言のままでいる。
2968 = "Về 8620 thì Nagi vốn dĩ đã không thể giải thích được rồi. Bên trong hội trường trưng bày, Hachiroku vẫn luôn giữ im lặng."
# monologue
# JP: ポーレットとれいなは出ているし、\n日々姫は日々姫で、自分の役割を全うしている。
3290 = "Paulette và Reina thì đang ở ngoài, còn Hibiki thì đang hoàn thành trọn vẹn vai trò của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。落ち着け。\n落ち着いて――『商売のことだけを考えろ』」
2425 = "「Fukami. Bình tĩnh lại. Bình tĩnh lại――『Chỉ nghĩ đến chuyện kinh doanh thôi』.」"
# 【ふかみ】
# display as 深美
# JP: 「ぁっ」
# 2089 = "「啊」" 
# monologue
# JP: 一度、伝えてある言葉。\n一度はふかみも受け入れたこと。
3472 = "Những lời đã từng truyền đạt một lần. Một lần Fukami cũng đã tiếp nhận."
# monologue
# JP: それをもう一度繰り返す。
3336 = "Tôi lặp lại điều đó một lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「これも、接客で宣伝だ。\n学園生が客に来たならお前はどうする。逃げるのか？」
2576 = "「Đây cũng là, tiếp khách để quảng cáo đấy. Nếu học sinh đến làm khách thì em sẽ làm gì. Bỏ chạy sao?」"
# 【ふかみ】
# display as 深美
# JP: 「に、に――にげない。です」
1904 = "「Kh, kh――không bỏ chạy. Ạ.」"
# monologue
# JP: きゅっと。拳がにぎられる。
3064 = "Nắm chặt. Nắm đấm siết lại."
# 【ふかみ】
# display as 深美
# JP: 「お、おうちのことだけ。お母さんのことだけ。\nお仕事のこと――クマ川くだりを、つぶさない、ため」
2428 = "「Ch, chỉ vì chuyện của nhà thôi. Chỉ vì chuyện của mẹ thôi. Chuyện công việc――để không làm sập, thuyền xuôi dòng Kuma.」"
# monologue
# JP: ごくり、ツバを飲み込む音。
3303 = "Ực, tiếng nuốt nước bọt."
# monologue
# JP: ふかみが、僕の背中から出る。
3060 = "Fukami, bước ra khỏi lưng tôi."
# 【ふかみ】
# display as 深美
# JP: 「あのっ！」
2284 = "「À này!」"
# monologue
# JP: 震える一歩――\nけれどもとても、大きな一歩で。
3085 = "Một bước chân run rẩy―― Nhưng lại là một bước tiến rất, rất lớn."
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「えっ！？」
2071 = "「Hả!?」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「早瀬……さん？」
2336 = "「Bạn Hayase......?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、あの、そんなに凄くはくわしくないけど。\n\\x%l8620;#00ffc040;8620%l;#;の展示会、企画から、ええと、かかわってる、から」
2597 = "「Mình cũng, à ừm, không rành lắm đâu. Vì mình tham gia, ừm, từ lúc lên kế hoạch, triển lãm 8620, nên là.」"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「え？　なんね、企画からって」
2074 = "「Hả? Cái gì cơ, từ lúc lên kế hoạch á.」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「展示会ってさ。これ、そもそも何のお祭と？」
2199 = "「Triển lãm á. Cái này, rốt cuộc là lễ hội gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「う、うん。あの、ね？」
2063 = "「Ư, ừm. À, ừm, các cậu biết không?」"
# monologue
# JP: ……真っ赤な顔から、一言絞り出す度に、\nふかみの背筋が伸びていく。
1551 = "......Từ khuôn mặt đỏ bừng, mỗi khi nặn ra được một lời, lưng Fukami lại thẳng lên một chút."
# monologue
# JP: 凪も見ている。嬉しげに。\nこれなら、ふかみは大丈夫だろう。
2967 = "Nagi cũng đang nhìn. Trông rất vui vẻ. Thế này thì, Fukami chắc sẽ ổn thôi."
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、ここにおったとですか。双鉄君」
2093 = "「A, cậu ở đây sao. Cậu Soutetsu.」"
# monologue
# JP: 落ち着いた声。\nけれども、少しだけ浮き立つような。
2871 = "Giọng nói điềm tĩnh. Nhưng, có vẻ hơi phấn khích một chút."
# monologue
# JP: 蓑笠老人が、\n“好々爺”という文字そのままに、立っている。
3410 = "Ông lão Minokasa, đang đứng đó, đúng với cụm từ “ông lão hiền hậu”."
# 【双鉄】
# display as 雙鐵
# JP: 「これは、蓑笠さん。\nお運び、ありがとうございます」
2366 = "「Đây là, ông Minokasa. Cảm ơn ông đã cất công đến đây.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いえいえ」
1924 = "「Không có gì không có gì.」"
# monologue
# JP: 蓑笠老人は柔和に微笑み、\nぐるりと大きくあたりを見渡す。
3400 = "Ông lão Minokasa mỉm cười hiền hòa, và đưa mắt nhìn bao quát xung quanh một vòng lớn."
# 【蓑笠】
# display as 蓑笠
# JP: 「先だってのお会合には行かれんでしたが、\n今日はなんとか、時間ば作って寄らせてもらいました」
2025 = "「Lần họp mặt trước tôi không đi được, nhưng hôm nay tôi đã cố gắng, sắp xếp thời gian để ghé qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見ていただけて光栄です。\nと、いっても\\x%l8620;#00ffc040;8620%l;#;のことは既に」
2226 = "「Thật vinh hạnh khi được ông đến xem. Tuy nói vậy, nhưng chuyện về \\x%l8620;#00ffc040;8620%l;#; thì ông đã」"
# 【蓑笠】
# display as 蓑笠
# JP: 「何度か見せてもろうとりますがの。\n人の中におるとやはり、違ぉて見えるもんですなぁ」
2463 = "「Tôi đã được xem vài lần rồi mà. Nhưng khi đứng giữa đám đông thì quả nhiên, nhìn cũng thấy khác hẳn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当にそうですね」
2357 = "「A, đúng là như vậy thật.」"
# monologue
# JP: １００人――いや、２００人はいるだろうか。
3526 = "100 người――không, có lẽ phải đến 200 người."
# monologue
# JP: \\x%l石造機関庫;#00ffc040;石造機関庫%l;#;は人と声とで埋め尽くされ、\n\\x%l8620;#00ffc040;8620%l;#;がその中心になっている。
96 = "\\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; tràn ngập người và tiếng nói, \\x%l8620;#00ffc040;8620%l;#; đang trở thành trung tâm của nơi này."
# 【蓑笠】
# display as 蓑笠
# JP: 「人の中におるとこうして見るとですなぁ。\n走らせてやりたいいう気に、ワシなんぞでもなりますな」
2127 = "「Đứng giữa đám đông mà nhìn thế này nhỉ. Ngay cả lão già như tôi, cũng có cảm giác muốn cho nó chạy lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お気持ち、大変に心強いです。\nいえ、お気持ちどころの話ではありませんが」
2222 = "「Tấm lòng của ông, thật sự rất đáng quý. Không, không chỉ dừng lại ở tấm lòng đâu ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なんもなんも、ワシなんぞ」
2291 = "「Không có gì không có gì, lão già như tôi.」"
# monologue
# JP: 蓑笠老人は謙遜するが、今の時点で、\nその貢献度は間違いなく極めて大だ。
3495 = "Ông lão Minokasa khiêm tốn, nhưng tính đến thời điểm hiện tại, mức độ cống hiến của ông ấy chắc chắn là cực kỳ lớn."
# monologue
# JP: \\x%l動輪;#00ffc040;動輪%l;#;まわりの修復の目処を完全に立ててもらった上、\n蒸気焼酎関連を含め、どれほどの紹介をして貰えたか――
3022 = "Không chỉ giúp hoàn toàn định hướng cho việc phục hồi khu vực \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;, mà ông ấy còn giới thiệu cho chúng tôi biết bao nhiêu người, bao gồm cả những việc liên quan đến Shochu Hơi Nước――"
# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄君の働きに刺激されて、\nこの年寄りも少し張り切っただけとですよ」
2290 = "「Bị kích thích bởi sự nỗ lực của cậu Soutetsu, lão già này cũng chỉ cố gắng thêm một chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕なぞ、皆の足をひっぱるばかりで」
2276 = "「Cháu á, chỉ toàn kéo chân mọi người thôi.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いやご謙遜。ボイラ屋の[はた]秦さんがほめとりましたですよ。\n双鉄君ば、後継ぎにしたいくらいの熱心さやいうて」
1977 = "「Không, cậu khiêm tốn quá. Anh Hata thợ sửa lò hơi đã khen ngợi cậu đấy. Bảo là cậu Soutetsu, nhiệt tình đến mức anh ấy muốn nhận làm người kế vị luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「過分なお褒めのお言葉ですが――\nとても嬉しく感じます」
2587 = "「Đó là những lời khen ngợi quá lời rồi―― Nhưng cháu cảm thấy rất vui.」"
# monologue
# JP: 実際に、ボイラのことは死ぬ気で学んだ。頑張った。\n\\x%l8620;#00ffc040;8620%l;#;――\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の心臓を少しでも深く、理解したくて。
3110 = "Thực tế, tôi đã học về lò hơi với quyết tâm muốn chết. Tôi đã rất cố gắng. \\x%l8620;#00ffc040;8620%l;#;――Vì tôi muốn hiểu sâu hơn, dù chỉ một chút, về trái tim của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;."
# 【蓑笠】
# display as 蓑笠
# JP: 「蒸気焼酎も、試作段階でこの旨さとですし。\nいやいや、石炭ボイラもなかなかに良かもんですなぁ」
2507 = "「Shochu Hơi Nước, mới ở giai đoạn thử nghiệm mà đã ngon thế này rồi. Chà chà, lò hơi than cũng khá là tốt đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
1920 = "「Cháu thật ngại quá.」"
# monologue
# JP: ああ、今日はいつになく能弁だと思ったが、\nすでに一杯、きこしめしてらっしゃったのか。
3264 = "À, tôi cứ nghĩ hôm nay ông ấy nói nhiều hơn thường lệ, ra là ông ấy đã nhâm nhi một ly rồi sao."
# monologue
# JP: 炉の火に焼けていらっしゃるから、\nお顔が赤いのに気付かなかった。
3019 = "Vì ông ấy bị cháy nắng bởi ngọn lửa lò, nên tôi đã không nhận ra khuôn mặt ông ấy đang đỏ lên."
# 【蓑笠】
# display as 蓑笠
# JP: 「そういや、市長さんはどこにいらっしゃいますかな。\n一言、ご挨拶ばしたかとですが」
2173 = "「Nói mới nhớ, thị trưởng đang ở đâu vậy nhỉ. Tôi muốn đến chào hỏi một câu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、臨時増発を出しているんです。\n[ゆのい,1]湯医からも、この見学会への参加希望者が多いそうで」
2143 = "「Hôm nay, cô ấy đang chạy thêm chuyến tăng cường. Nghe nói từ Yunoi, cũng có rất nhiều người muốn tham gia buổi tham quan này.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、\\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;の運転とですか。\n市長さんも、まっことお忙しかですなぁ」
2578 = "「À, là lái \\x%l気動車;#00ffc040;toa xe tự hành%l;#; sao. Thị trưởng, quả thật là rất bận rộn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当ですね」
# 2473 = "「確實」" 
# monologue
# JP: 乗務中の姿があまりに楽しげでうっかりしたが\nなるほど、確かにポーレットは働き詰めだ。
3057 = "Vì dáng vẻ khi làm nhiệm vụ của cô ấy quá vui vẻ nên tôi đã vô ý không để tâm, nhưng quả thực, Paulette đang làm việc không ngừng nghỉ."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;の修復・稼働を果たせれば、\n負担をいくらか、僕とハチロクとで請け負えるのだが――
91 = "Nếu có thể hoàn thành việc phục hồi và vận hành \\x%l8620;#00ffc040;8620%l;#;, tôi và Hachiroku có thể gánh vác phần nào gánh nặng đó, nhưng mà――"
# 【凪】
# display as 凪
# JP: 「じいちゃん！　ラムネ！　ラムネ買うて、四本！！」
2437 = "「Ông nội! Ramune! Mua Ramune đi, bốn chai!!」"
# monologue
# JP: 人混みをするり抜けるやいなや、\n凪が蓑笠老人の手を取り同時に、ぐいぐい引っ張る。
3140 = "Ngay khi vừa lách qua đám đông, Nagi nắm lấy tay ông lão Minokasa và đồng thời, kéo mạnh."
# 【蓑笠】
# display as 蓑笠
# JP: 「おうおうよかばい、ラムネば、どこで売っとーと？」
2510 = "「Được rồi được rồi, Ramune à, bán ở đâu thế?」"
# 【凪】
# display as 凪
# JP: 「焼酎屋さんの出店ばい！\n蒸気ラムネっていうが美味しかって聞いたばい！」
2434 = "「Gian hàng của tiệm rượu ấy! Nghe nói Ramune Hơi Nước ngon lắm!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「よかよか」
2150 = "「Được rồi được rồi.」"
# monologue
# JP: 軽い会釈を一つ残して、\n凪に引かれて、蓑笠老人は\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;の奥へと消える。
3401 = "Chỉ để lại một cái gật đầu chào nhẹ, bị Nagi kéo đi, ông lão Minokasa biến mất vào sâu bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;."
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「で？　早瀬さん。\nその双鉄おにいさんって、あん人ばい？」
2285 = "「Thế? Bạn Hayase. Cái anh Soutetsu đó, là người đó sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ぅ……ぅん」
2103 = "「Ư......ừm.」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「そっか～そうなんだ～、だったら、納得。\n大納得ばい！」
2580 = "「Vậy sao~ ra là vậy~, nếu thế thì, hiểu rồi. Hoàn toàn hiểu rồi!」"
# monologue
# JP: ふかみだ。さきほどの学園生達と。\n僕の方をちらちら見ながら、凪の背中を追いかけていく。
3302 = "Là Fukami. Cùng với đám học sinh lúc nãy. Vừa liếc nhìn về phía tôi, vừa đuổi theo bóng lưng của Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ラムネ四本か」
2304 = "「Ra là vậy, bốn chai Ramune sao.」"
# monologue
# JP: これならば、良い。\n四本のうちの一本を、さぞやふかみは美味しく飲もう。
3484 = "Nếu vậy thì, tốt rồi. Một trong bốn chai đó, chắc chắn Fukami sẽ uống rất ngon lành."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
2620 = "「Ngài Soutetsu!?」"
# monologue
# JP: （どんっ）
3520 = "（Bịch）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと。\nすみません、よそ見をしてしまって」
2117 = "「Ôi chà. Xin lỗi, tôi mải nhìn đi chỗ khác.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、こちらこそ撮影に――おや、双鉄君」
2397 = "「Không không, tôi cũng mải chụp ảnh――ô kìa, cậu Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これはこれは、\n赤井宮司に足をお運びいただけるとは、光栄です」
2069 = "「Ái chà ái chà, Được cung tư tế Akai cất công đến đây, thật là vinh hạnh.」"
# monologue
# JP: 手にカメラ。
2869 = "Máy ảnh trên tay."
# monologue
# JP: やはりこの人の鉄道好きも、\n単なる仕事を、大きく越えているようだ。
3274 = "Quả nhiên niềm yêu thích đường sắt của người này, cũng đã vượt xa một công việc đơn thuần."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「来ますとも。\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;の内部を、\nこれほどにじっくり見られる機会は希少ですから」
2271 = "「Tất nhiên là tôi phải đến rồi. Bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, cơ hội được nhìn ngắm kỹ lưỡng thế này là rất hiếm có.」"
# monologue
# JP: 言いながら、ぱしゃり。\n何故か天井、それから柱――
3015 = "Vừa nói, tách. Không hiểu sao lại chụp trần nhà, rồi đến cột――"
# monologue
# JP: 全てを記録しようかとでもしているのか、\n赤井宮司は機関庫内の細部の写真を次々と撮る。
3433 = "Cứ như thể đang định ghi lại tất cả mọi thứ, cung tư tế Akai liên tục chụp ảnh các chi tiết bên trong xưởng đầu máy."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l8620;#00ffc040;8620%l;#;は撮らんのですか？」
1916 = "「Ngài không chụp \\x%l8620;#00ffc040;8620%l;#; sao?」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「真っ先にですよ。３００カットは撮りましたか」
1903 = "「Tôi đã chụp đầu tiên rồi. Chắc cũng phải 300 kiểu rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはすごい」
2465 = "「Thật là ấn tượng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、普通のことです――というか、\n双鉄君は、カメラをやらないのですか？」
1908 = "「Không không, chuyện bình thường thôi――mà này, cậu Soutetsu, không chơi máy ảnh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、全く」
2355 = "「Vâng, hoàn toàn không.」"
# monologue
# JP: 写真を撮る。\n記録を、記憶を、あるいは記念を形に残す。
3216 = "Chụp ảnh. Lưu giữ kỷ lục, ký ức, hoặc kỷ niệm thành hình hài."
# monologue
# JP: そうしたことに興味があまり持てないのは……\nああ、そうか。事故の後からか。
3174 = "Lý do tôi không có hứng thú với những việc như vậy là...... À, ra là vậy. Là từ sau vụ tai nạn sao."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「それはいけない。\\x%l機関士;#00ffc040;機関士%l;#;になるのでしたら、\nカメラに慣れておいたほうがいい」
2574 = "「Thế này không được rồi. Nếu cậu định trở thành \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;, thì nên làm quen với máy ảnh từ sớm đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほど、理屈ですね」
2094 = "「A. Ra là vậy, cũng có lý.」"
# monologue
# JP: それが何故かを即時に理解出来る程度には、\nハチロクによる\\x%l機関士;#00ffc040;機関士%l;#;教育も身についてきている。
2911 = "Ở mức độ có thể hiểu ngay lập tức lý do tại sao, sự giáo dục \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; của Hachiroku cũng đã ngấm vào người tôi."
# monologue
# JP: もっとも……\\x%l8620;#00ffc040;8620%l;#;発見の後のハチロクは、\n教師役にも、いまひとつ身が入らんようだが。
2841 = "Tuy nhiên...... sau khi phát hiện ra \\x%l8620;#00ffc040;8620%l;#;, Hachiroku có vẻ không còn chú tâm vào vai trò giáo viên cho lắm."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「\\x%l電車;#00ffc040;電車%l;#;であれ、機関車であれ、経験でしか運転できない。\n周辺状況の記録は、習熟訓練段階では非常に効果的です」
1926 = "「Dù là \\x%l電車;#00ffc040;tàu điện%l;#; hay đầu máy, đều chỉ có thể lái bằng kinh nghiệm. Việc ghi chép tình hình xung quanh rất có hiệu quả trong giai đoạn huấn luyện làm quen.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2228 = "「Vâng ạ.」"
# monologue
# JP: それも習った。\\x%l列車;#00ffc040;列車%l;#;には、極めて大きな慣性が働く。\n\\x%l列車;#00ffc040;列車%l;#;重量、速度、線路状況等にもよるが――
3473 = "Tôi cũng đã học điều đó. Một lực quán tính cực lớn sẽ tác động lên \\x%l列車;#00ffc040;tàu%l;#;. Dù còn tùy thuộc vào trọng lượng \\x%l列車;#00ffc040;tàu%l;#;, tốc độ, tình trạng đường ray, v.v.——"
# monologue
# JP: 最大\\x%l制動;#00ffc040;制動%l;#;の\\x%l非常;#00ffc040;非常%l;\\x%lブレーキ;#;#00ffc040;ブレーキ%l;#;をかけてもなお、\n一キロ以上止まれないこともあるとのことだ。ゆえ。
3129 = "Dù có dùng \\x%l非常;#00ffc040;phanh khẩn cấp%l;\\x%lブレーキ;#;#00ffc040;phanh%l;#; để \\x%l制動;#00ffc040;hãm phanh%l;#; tối đa đi nữa, cũng có khi chạy hơn một cây số mới dừng lại được. Do đó."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置、加速減速のポイント等を、実際に目で\n見て学び、体で覚えこむことが全て、だからですよね」
2522 = "「Vị trí \\x%lブレーキ;#00ffc040;phanh%l;#;, các điểm tăng giảm tốc, v.v. đều phải học bằng cách tận mắt nhìn thấy và ghi nhớ bằng cơ thể, là vì vậy đúng không ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「そのとおりです」
2402 = "「Đúng là như vậy.」"
# monologue
# JP: 赤井宮司が満足そうに頷いてくれる。\n周辺記録の必要性は、僕にも大いに理解できた。
3445 = "Thầy Akai gật đầu vẻ hài lòng. Tôi cũng đã rất hiểu tầm quan trọng của việc ghi chép tình hình xung quanh."
# monologue
# JP: しかし、カメラか――\n修復費用のこともある。出費はできるだけ避けたいのだが。
3002 = "Nhưng mà, máy ảnh sao—— Còn cả chi phí sửa chữa nữa. Tôi muốn tránh phát sinh thêm chi phí hết mức có thể."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「前市長の[ひない,1]雛衣さん。\nポーレットさんのお父様は、正真正銘の[と]撮り[テツ]鉄でした」
2415 = "「Ngài Hinai, cựu thị trưởng. Cha của cô Paulette là một Tori-tetsu chân chính đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2359 = "「Ra là vậy.」"
# monologue
# JP: 写真展示云々のとき、れいなが言っていた“パパさん”は\nポーレットのパパ――前市長のことだったのか。
2986 = "\"Chú\" mà Reina nhắc đến lúc bàn về việc trưng bày ảnh là cha của Paulette——cựu thị trưởng sao."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ポーレットさんは、\\x%l乗り鉄;#00ffc040;乗り鉄%l;#;の\\x%l車両鉄;#00ffc040;[シャリョウテツ,2]車両鉄%l;#;ですからね。\n殆どカメラは使わず、そのまま眠らせているようです」
2492 = "「Cô Paulette là một Sharyo-tetsu thuộc phái \\x%l乗り鉄;#00ffc040;người thích đi tàu%l;#; mà. Cô ấy hầu như không dùng máy ảnh, có vẻ cứ để nó nằm im lìm như vậy thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、いちど相談してみます。\nご助言、本当にありがとうございます」
2604 = "「Nếu vậy, tôi sẽ thử bàn với cô ấy một lần xem sao. Thực sự cảm ơn thầy vì lời khuyên.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「いささか、話しすぎました。\n趣味のことでは、どうにも口が軽くなります」
2273 = "「Tôi hơi lỡ lời quá rồi. Cứ nhắc đến sở thích là cái miệng lại không kìm lại được.」"
# monologue
# JP: “答えを押し付けたつもりでは無い”。
1531 = "\"Tôi không có ý định áp đặt câu trả lời đâu\"."
# monologue
# JP: いわんばかりに指先でつくったＸの字を口の前にあて、\n赤井宮司は僕らの前から去っていく。
3435 = "Thầy Akai đưa ngón tay tạo thành hình chữ X trước miệng như muốn nói vậy, rồi quay lưng rời đi."
# monologue
# JP: （カシャ――カシャっ）
3524 = "（Tách——tách）"
# monologue
# JP: ……今度は、古びた備品と壁か。\nカメラというのも、なかなかに業が深そうだ。と！
1549 = "......Lần này lại chụp thiết bị cũ kỹ và bức tường sao. Máy ảnh quả thực là một sở thích khá sâu sắc. Á!"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2332 = "「Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　にいさ――にぃに――兄さん」
2090 = "「A! Anh tra——anh hai——anh trai.」"
# monologue
# JP: よほどテンションがあがっているのか、\n僕の呼称で日々姫は何度も行き来する。
3247 = "Chắc là do đang phấn khích quá mức hay sao, mà Hibiki cứ lúng túng thay đổi cách gọi tôi liên tục."
# 【コン】
# display as 野狗？
# JP: 「ケンっ！」
2057 = "「Ẳng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、コン。お前も日々姫と一緒だったか」
2365 = "「Ồ, Kon. Mày cũng đi cùng Hibiki à.」"
# 【日々姫】
# display as 日日姬
# JP: 「私が、このコと一緒なんです」
2248 = "「Em đang đi cùng bé này ạ.」"
# monologue
# JP: 日々姫は優しくしゃがみこみ、\n駅長服を着込んだ毛玉をつかまえる。
3252 = "Hibiki nhẹ nhàng ngồi xổm xuống, ôm lấy cục bông đang mặc bộ đồng phục trưởng ga."
# 【双鉄】
# display as 雙鐵
# JP: 「ほほう、極めて似合っているな。\nなかなか立派な駅長犬だ」
2480 = "「Hô hô, hợp lắm đấy chứ. Ra dáng một chú chó trưởng ga phết.」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 
# 【日々姫】
# display as 日日姬
# JP: 「違いますよ、兄さん。\nコンは、キツネ。ですから駅長キツネです」
1914 = "「Không phải đâu anh trai. Kon là cáo. Nên phải là cáo trưởng ga chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、そうだったな」
2171 = "「À, ra là vậy.」"
# monologue
# JP: 駅長にする準備といって、\nポーレット自らが採寸をしてミシンで作った駅長服。
3292 = "Paulette bảo là để chuẩn bị cho chức trưởng ga, cô ấy đã tự tay đo kích thước và dùng máy khâu may bộ đồng phục này."
# monologue
# JP: その間に確認された各種身体特徴により、\n“このコはキツネ。名前はコン”と、確定したのだ。
3033 = "Nhờ xác nhận các đặc điểm cơ thể trong quá trình đó, mà đã chắc chắn được rằng \"Bé này là cáo. Tên là Kon\"."
# 【双鉄】
# display as 雙鐵
# JP: 「そのキツネであるコンが主で、\n人間様のお前が従か？」
2584 = "「Chú cáo Kon đó đóng vai chính, còn con người là em đóng vai phụ sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃそうばい。\n駅長様と、やとわれイラストレイターやけん」
2451 = "「Tất nhiên rồi ạ. Ngài trưởng ga và cô họa sĩ làm thuê mà.」"
# monologue
# JP: ふざけて言って少し笑って、\n日々姫はコンを床へと下ろす。
3254 = "Hibiki nói đùa rồi khẽ cười, đặt Kon xuống sàn."
# 【日々姫】
# display as 日日姬
# JP: 「本当は、賑やかすぎてコンが全然落ち着かなくて。\nですから、散歩を少しさせようと出てきただけです」
2009 = "「Thật ra là do ồn ào quá nên Kon hoàn toàn không thể bình tĩnh được. Thế nên em mới đưa bé ra ngoài đi dạo một chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、レールショップの出店の番は――っと！？」
2608 = "「Nếu vậy, quầy hàng của cửa hàng đường sắt ai trông——á!?」"
# monologue
# JP: 少し慌てて時計を見る。\n日々姫がすぐに、クスっと笑う。
3201 = "Tôi hơi luống cuống nhìn đồng hồ. Hibiki lập tức cười khúc khích."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんたちの自由時間は、まだ一時間以上ありますよ？\nいまは、ふかみちゃんに交代してもらってるんです」
1968 = "「Thời gian tự do của bọn anh vẫn còn hơn một tiếng nữa mà? Hiện tại, em đang nhờ bé Fukami đổi ca trông giúp rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみに？」
2427 = "「Fukami sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「すっごくにこにこしてるのに、なんかぐったり疲れてて。\n『よかったらしばらく店番させてください。です』って」
2450 = "「Dù cười rất tươi nhưng trông em ấy có vẻ mệt mỏi rã rời. Em ấy bảo 『Nếu được thì xin hãy để em trông quán một lúc ạ. Vâng』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。かなり頑張ったのだな」
2033 = "「Ra là vậy. Em ấy đã rất cố gắng nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「がんばった？　って、きゃっ！？」
2029 = "「Đã cố gắng? Á, á!?」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 
# monologue
# JP: 立ち話を待っているのに飽きたのか、\nコンが引き綱をグイグイとやる。
3366 = "Chắc là chán việc phải chờ đợi chúng tôi đứng nói chuyện, Kon cứ kéo giật sợi dây dắt."
# 【双鉄】
# display as 雙鐵
# JP: 「引き止めてすまなかったな、コン。\n日々姫、話はまたあとでだ」
2478 = "「Xin lỗi vì đã giữ mày lại nhé, Kon. Hibiki, chuyện này để nói sau nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。行こう、コン。\nあ、そうだ、兄さん、ハチロク！」
2147 = "「Vâng. Đi thôi, Kon. À, đúng rồi, anh trai, Hachiroku!」"
# monologue
# JP: 行きざま、日々姫が振り返る。
3245 = "Vừa bước đi, Hibiki bỗng quay đầu lại."
# 【日々姫】
# display as 日日姬
# JP: 「レールショップの出店。\n今いくとちょっと面白いですよ？」
2444 = "「Quầy hàng của cửa hàng đường sắt. Bây giờ đến đó sẽ thấy cảnh hơi bị thú vị đấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おもしろい、とはどういう」
1943 = "「Thú vị, là ý gì cơ?」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 
# 【日々姫】
# display as 日日姬
# JP: 「けんけんいわんと！　行くけん行くけんっ」
2148 = "「Thôi đừng cằn nhằn nữa! Cứ đi đi, đi đi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……お前もけんけん言っているではないか」
1579 = "「......Em cũng đang cằn nhằn đấy thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「あはっ」
2065 = "「Hơ hơ.」"
# monologue
# JP: 思わず漏れた僕のくだらん感想に、\nハチロクが小さな笑いをこぼす。
3162 = "Trước lời cảm thán vô vị lỡ buột miệng của tôi, Hachiroku khẽ bật cười."
# monologue
# JP: 今日はじめての、明るい声だ。\nひどく強張っていたようだが、少しはほぐれてきたらしい。
3046 = "Giọng điệu tươi sáng đầu tiên trong ngày hôm nay. Có vẻ như sự căng thẳng tột độ của cô ấy đã được thả lỏng đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「どうするハチロク。レールショップの出店に行くか？\nそれとも、他も覗いてみるか？」
2217 = "「Tính sao đây Hachiroku. Đến quầy hàng của cửa hàng đường sắt nhé? Hay là đi ngó nghiêng những chỗ khác?」"
# monologue
# JP: 問えばすぐさま。\nハチロクは悩ましげな目であたりを見回す。
3203 = "Vừa hỏi xong. Hachiroku đưa mắt nhìn quanh với vẻ bối rối."
# 【ハチロク】
# display as 八六
# JP: 「他には何……あ、双鉄様、あちら」
2007 = "「Những chỗ khác thì có gì...... a, ngài Soutetsu, đằng kia.」"
# monologue
# JP: ハチロクが指差す人混みの中。\n一目でわかる、周囲と違った雰囲気の――
2918 = "Giữa đám đông mà Hachiroku chỉ tay vào. Có thể nhận ra ngay lập tức, một bầu không khí khác biệt với xung quanh——"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、宝生稀咲と……\n隣は、連れか？」
2121 = "「Ồ, Houshou Kisaki và...... Người bên cạnh, là người đi cùng sao?」"
# 【ハチロク】
# display as 八六
# JP: 「銀行の方……なのでしょうかね？\nスーツで、メガネがよくお似合いで」
2368 = "「Là người của ngân hàng...... phải không nhỉ? Mặc vest, lại còn rất hợp với cặp kính nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の右腕、といった雰囲気だな」
2461 = "「Mang dáng dấp như cánh tay phải của Kisaki vậy.」"
# monologue
# JP: 遠目だし、何も聞こえて来はしないが、\nそれだけに、かえって見えてくるものもある。
2896 = "Dù ở khoảng cách xa, chẳng nghe thấy gì cả, nhưng chính vì thế, lại có những thứ nhìn rõ hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「あれが、他所行きではない宝生稀咲か。\nあの目の鋭さ――値踏みするバイヤーにも負けんぞ」
2600 = "「Đó là bộ dạng không phải để ra ngoài của Houshou Kisaki sao. Ánh mắt sắc bén đó——không hề thua kém những người mua hàng đang định giá đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「メガネの[かた]方は秘書さん、かもしれませんね。\n稀咲様が何かを言うたび、それをメモしているようです」
2295 = "「Người đeo kính có lẽ là thư ký đấy ạ. Mỗi khi cô Kisaki nói gì đó, người ấy có vẻ đều ghi chép lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。熱心に視察する対象くらいにはなれたらしいな。\n招待状を出した甲斐があった」
2104 = "「Hừm. Có vẻ như chúng ta đã trở thành đối tượng đáng để cô ta nhiệt tình thị sát rồi. Bỏ công gửi thiệp mời cũng đáng giá.」"
# 【ハチロク】
# display as 八六
# JP: 「どうします？　一応はご挨拶されますか？」
2218 = "「Tính sao đây ạ? Ngài có muốn qua chào hỏi một tiếng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。やめておこう。\n稀咲がどうこう、誘致がどうこうという話ではなく」
1906 = "「Không. Bỏ đi. Giờ không phải lúc nói chuyện Kisaki thế nào, hay thu hút đầu tư ra sao.」"
# 【ハチロク】
# display as 八六
# JP: 「え？　でしたら、どういうお話ですか？」
2078 = "「Hả? Nếu vậy thì là chuyện gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「男と女、その二人連れでここに来ているという話でだ」
1955 = "「Là chuyện một nam một nữ, hai người họ đang đi cùng nhau đến đây.」"
# 【ハチロク】
# display as 八六
# JP: 「はぁ」
# 2359 = "「是嗎」" 
# monologue
# JP: ハチロクが稀咲達へと目を凝らし、\nそれからきょとんと、僕を見る。
2921 = "Hachiroku nheo mắt nhìn về phía nhóm Kisaki, rồi lại ngơ ngác nhìn tôi."
# 【ハチロク】
# display as 八六
# JP: 「どうみても、あのお二人、単なる仕事仲間ですが。\nいわゆる恋人同士のような、甘い雰囲気には見えませぬ」
2052 = "「Dù nhìn thế nào thì hai người họ cũng chỉ là đồng nghiệp thôi mà. Không hề thấy bầu không khí ngọt ngào kiểu như những cặp đôi yêu nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それこそ甘いな。考えが」
1970 = "「Suy nghĩ của cô ngây thơ quá đấy.」"
# monologue
# JP: どれほど豊かな知性を持てど、\nハチロクは物――\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2837 = "Dù sở hữu trí tuệ phong phú đến đâu, Hachiroku vẫn là một đồ vật——một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: 僕ごときよりももう一回り、\n色恋の機微とやらには疎いらしい。
3027 = "Có vẻ như cô ấy còn mù mờ về những tinh tế trong tình yêu hơn cả tôi một bậc."
# 【双鉄】
# display as 雙鐵
# JP: 「若い男女の二人連れに挨拶に行くとだな。\n必ず、男の方が僕に対してイヤな顔をするんだ」
2513 = "「Nếu đến chào hỏi một đôi nam nữ trẻ tuổi đang đi cùng nhau. Chắc chắn người nam sẽ tỏ thái độ khó chịu với tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 2577 = "「這樣啊」" 
# monologue
# JP: 僕を見つめるハチロクの目が、\n“きょとん”から“まじまじ”へと変わる。
2934 = "Ánh mắt Hachiroku nhìn tôi từ \"ngơ ngác\" chuyển sang \"chăm chú\"."
# 【ハチロク】
# display as 八六
# JP: 「確かにそうなりましょうね。双鉄様なら。\nなるほど、納得いたしました」
2619 = "「Quả thực là sẽ thành ra như vậy nhỉ. Nếu là ngài Soutetsu. Ra là vậy, em hiểu rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前が行っても、誰が行っても同じだろうさ。\n男女の機微とは、どうやらそうしたものらしいからな」
2320 = "「Dù là cô đi, hay ai đi thì cũng thế thôi. Những tinh tế giữa nam và nữ, có vẻ là như vậy đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「はてさて、そうなりますでしょうか？\nハチロクには、少し難しすぎるようです」
2068 = "「Chà chà, liệu có đúng là như vậy không nhỉ? Đối với Hachiroku thì có vẻ hơi quá khó hiểu rồi.」"
# monologue
# JP: くすくすと、笑いに軽やかさがもどる。
2929 = "Tiếng cười khúc khích nhẹ nhàng đã quay trở lại."
# monologue
# JP: いい傾向だ。\n僕まで、嬉しくなってくる。
3475 = "Một dấu hiệu tốt. Đến cả tôi cũng cảm thấy vui lây."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、トラブル回避のためにも、\nレールショップの出店に一度戻っておこう」
2188 = "「Nếu vậy, để tránh rắc rối, chúng ta cứ quay lại quầy hàng của cửa hàng đường sắt một chuyến xem sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。お供いたします双鉄様」
2153 = "「Vâng. Em xin đi cùng ngài Soutetsu.」"
# monologue
# JP: ……しかし、なんともすごい人だ。\n時間の経過につれてどんどん、増えてるようだが――
1541 = "......Tuy nhiên, người đông thật đấy. Càng về sau có vẻ như càng tăng lên thì phải——"
# 【ハチロク】
# display as 八六
# JP: 「イベントのときのようですね」
2190 = "「Giống như lúc có sự kiện vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「イベント？」
2139 = "「Sự kiện?」"
# monologue
# JP: 問えばふわりと、ハチロクの目がやわらかくなる。
3382 = "Vừa hỏi xong, ánh mắt Hachiroku bỗng trở nên dịu dàng."
# 【ハチロク】
# display as 八六
# JP: 「新線開通のときや、逆に\\x%l列車;#00ffc040;列車%l;#;が廃止されるときなどには、\nホームがマニ――鉄道ファンで、埋め尽くされたのです」
2393 = "「Vào lúc khai trương tuyến mới, hay ngược lại là khi \\x%l列車;#00ffc040;tàu%l;#; bị ngừng hoạt động, sân ga sẽ chật kín những người đam——những người hâm mộ đường sắt ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そうした日がイベントか。\nん？　ならば、今日もそうではないか？　鉄道イベント」
2034 = "「Ra là vậy. Những ngày như thế gọi là sự kiện sao. Hửm? Nếu vậy, hôm nay chẳng phải cũng thế sao? Sự kiện đường sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「え？　あ……そう、ですよね。そう。\nわたくし、どうして……いえ……そう……そうね」
2075 = "「Hả? À...... đúng, nhỉ. Đúng vậy. Tại sao em lại...... không...... đúng vậy...... đúng rồi.」"
# monologue
# JP: いかん、地雷を――\nいや、置き石でも踏んでしまったのかもしれない。
2829 = "Không xong rồi, đạp trúng mìn rồi—— Không, có khi là giẫm phải đá chèn trên đường ray cũng nên."
# monologue
# JP: ハチロクの高まっていたテンションが、\n目に見えて沈んでいってしまう。
3351 = "Sự phấn khích vừa dâng cao của Hachiroku lại xìu xuống trông thấy."
# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様。ふかみ様です」
2099 = "「A, ngài Soutetsu. Là cô Fukami ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん――おお！　なかなかどうして、\n立派にやっているではないか」
2102 = "「Ừ——ồ! Chẳng phải em ấy, dang làm rất tốt hay sao.」"
# monologue
# JP: きびきびテキパキ、ふかみの手先は動いている。
3307 = "Đôi tay Fukami thoăn thoắt, dứt khoát di chuyển."
# monologue
# JP: 記念きっぷにオリジナルグッズ――\n売りさばく様は、僕よりよほど洗練されてる。
3079 = "Từ vé kỷ niệm đến hàng hóa độc quyền—— Phong thái bán hàng của em ấy còn sành sỏi hơn tôi nhiều."
# 【ハチロク】
# display as 八六
# JP: 「発船所のお仕事で、きっと、慣れてらっしゃるのです」
2145 = "「Chắc chắn là cô ấy đã quen với công việc ở bến thuyền rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2349 = "「Ừ.」"
# monologue
# JP: そういえば、発船所にも売店があった。\n今はガラガラ、閑古鳥が鳴く有り様だったが――
3430 = "Nhắc mới nhớ, ở bến thuyền cũng có quầy bán hàng. Dù bây giờ thì vắng tanh, ế ẩm đến mức quạ kêu——"
# monologue
# JP: 全盛期から売店を手伝っていたのなら、\nなるほど、習熟もしている筈だ。
3090 = "Nếu em ấy đã phụ giúp bán hàng từ thời kỳ hoàng kim, thì ra là vậy, quen tay cũng là điều dễ hiểu."
# 【ふかみ】
# display as 深美
# JP: 「あ！　おーーーい！　です」
2091 = "「A! Nàyyyy! Ạ.」"
# monologue
# JP: こちらに気付いたふかみが手を振り、\n恥ずかしそうにすぐ引っ込める。
3066 = "Fukami nhận ra chúng tôi liền vẫy tay, nhưng rồi lại ngượng ngùng rụt lại ngay."
# 【双鉄】
# display as 雙鐵
# JP: 「大したものだな。見とれたぞ」
2141 = "「Giỏi thật đấy. Anh nhìn mà mê mẩn luôn.」"
# 【ふかみ】
# display as 深美
# JP: 「そ、そんな――こんなこと、単なる、慣れ、です」
1901 = "「Kh, không đâu ạ——chuyện này, chỉ đơn giản là, quen tay thôi, ạ.」"
# 【早瀬流】
# display as ？？？
# JP: 「ほーーーお？\nこれね？　『双鉄おにいさん』とやらは」
2122 = "「Hôố? Đây hả? Cái cậu 'anh Soutetsu' gì đó.」"
# 【ふかみ】
# display as 深美
# JP: 「[ながれ]流おじいちゃんっ」
2419 = "「Ông Nagare!」"
# monologue
# JP: 長テーブルの下からぬうっと、\nおおきな固まりがせり上がってくる。
3490 = "Từ dưới chiếc bàn dài, một khối khổng lồ lù lù nhô lên."
# monologue
# JP: 太った白髪の――サンタのような老人だ。\nこの厚み、一度目にしたら忘れられない。
3384 = "Một ông lão béo tốt, tóc bạc trắng——trông như ông già Noel vậy. Độ dày này, nhìn một lần là không thể nào quên."
# 【双鉄】
# display as 雙鐵
# JP: 「お久しぶりです、[せき]堰さん。\n川下りのときは、トラックでありがとうございました」
1936 = "「Đã lâu không gặp, ông Seki. Lúc xuôi dòng trên sông, cảm ơn ông vì chuyến xe tải ạ.」"
# 【早瀬流】
# display as 早賴流
# JP: 「[せき]堰？　いいや、わしは[ながれ]流よ。\n川下りうんぬんも、まったくしらんで」
2135 = "「Seki? Không, ta là Nagare. Ba cái chuyện xuôi dòng gì đó, ta hoàn toàn không biết đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 2072 = "「哎？」" 
# 【ふかみ】
# display as 深美
# JP: 「おじいちゃん、そういう意地悪やめてよ」
2438 = "「Ông ơi, đừng có trêu ác ý như thế nữa đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「意地悪？　ああ」
1985 = "「Trêu ác ý? À.」"
# monologue
# JP: なるほど、全てが繋がった。\n『ちょっと面白い』と日々姫がはしゃいだはずだ。
2983 = "Ra là vậy, mọi chuyện đã xâu chuỗi lại rồi. Hèn chi Hibiki lại hào hứng bảo 'hơi bị thú vị đấy'."
# 【双鉄】
# display as 雙鐵
# JP: 「ふたごの方たちなのですね？\nふかみちゃんのおじいさんたち堰さんと流さんとは」
2182 = "「Hai người là anh em sinh đôi nhỉ? Ông nội của Fukami, ông Seki và ông Nagare ấy.」"
# 【早瀬流】
# display as 早賴流
# JP: 「いいや、違う」
1932 = "「Không, nhầm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええっ？」
# 2072 = "「哎？」" 
# 【ふかみ】
# display as 深美
# JP: 「もう、だから意地悪はやめてってばぁ」
2466 = "「Thật tình, đã bảo ông đừng có trêu nữa mà.」"
# 【早瀬流】
# display as 早賴流
# JP: 「いじわるなんぞしとらんばい」
2261 = "「Ta có trêu chọc ác ý gì đâu chứ.」"
# monologue
# JP: （ぽむっ）
3523 = "（Bộp）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉぅっ！？」
2119 = "「Ối!?」"
# monologue
# JP: おかしな声が出てしまった。\n分厚く大きな手のひらで、頭をぐしゃぐしゃ撫でられて。
3199 = "Tôi lỡ buột miệng phát ra một âm thanh kỳ quặc. Bị một bàn tay to lớn, dày cộp vò rối tung cả đầu."
# monologue
# JP: まるっきりの子供扱い。\nこんな風にされたのは、何年――十何年ぶりのことだろう。
3175 = "Bị đối xử hệt như một đứa trẻ. Bị làm như thế này, đã mấy năm——mười mấy năm rồi nhỉ."
# 【早瀬流】
# display as 早賴流
# JP: 「ふかみが世話になっとるけんね。\nなんぞあったら遠慮のう言い」
2527 = "「Cảm ơn cậu đã chăm sóc con bé Fukami. Có chuyện gì cứ nói, đừng có ngại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
2097 = "「A, vâng ạ.」"
# 【早瀬流】
# display as 早賴流
# JP: 「水と土とのことならよ。\nわしら、人よりゃ、少しは詳しかけん」
2242 = "「Nếu là chuyện về nước và đất ấy mà. Bọn ta, so với người thường thì, cũng rành hơn một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その……ありがとうございます」
2596 = "「Chuyện đó...... cháu cảm ơn ạ.」"
# 【早瀬流】
# display as 早賴流
# JP: 「おっと」
2113 = "「Hây dô.」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃあっ！？」
2060 = "「Hyaa!?」"
# monologue
# JP: 流さんが、ふかみを軽々抱き上げ肩の上へと乗せる。
3294 = "Ông Nagare bế bổng Fukami lên một cách nhẹ nhàng rồi đặt lên vai."
# monologue
# JP: 乗せるやいなやでのしのしと、\nホームの方へと歩き出す。
3494 = "Vừa đặt lên xong là ông ấy bước đi huỳnh huỵch, tiến về phía sân ga."
# 【早瀬流】
# display as 早賴流
# JP: 「仕事のようばい。\nまたの、双鉄」
2038 = "「Đến giờ làm việc rồi. Gặp lại sau nhé, Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……ぅ――はい、また」
2086 = "「A...... ừm——vâng, hẹn gặp lại.」"
# monologue
# JP: いかん、どうにも圧倒された。\nああいう類の押しの強さは、今まで経験したことがない。
2828 = "Không xong rồi, tôi hoàn toàn bị áp đảo. Sự lấn lướt kiểu như vậy, tôi chưa từng trải nghiệm bao giờ."
# 【ハチロク】
# display as 八六
# JP: 「仕事……」
2200 = "「Công việc......」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2112 = "「Hửm?」"
# monologue
# JP: ハチロクが背中をじっと見ている。\n分厚く丸い、肉の背中を。
2932 = "Hachiroku đang nhìn chằm chằm vào bóng lưng ông ấy. Một tấm lưng thịt dày cộp, tròn xoe."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
2216 = "「Sao thế? Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――ひょっとして、\nあの方にも聞こえているのかと」
2398 = "「Không ạ——em chỉ đang nghĩ, không biết người đó có nghe thấy không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞こえる？　何がだ」
2495 = "「Nghe thấy? Cái gì cơ.」"
# monologue
# JP: （プォンっ！！！！）
3525 = "（Poooon!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2118 = "「噢」" 
# monologue
# JP: なるほど、これか、\\x%lタイフォン;#00ffc040;タイフォン%l;#;か。
2984 = "Ra là vậy, cái này sao, là \\x%lタイフォン;#00ffc040;còi hơi%l;#; à."
# monologue
# JP: \\x%lキハ07;#00ffc040;キハ07%l;#;が帰還してきたレールの響きが、\nハチロクにはすでに聞こえていたのか。
3158 = "Âm thanh của đường ray khi \\x%lキハ07;#00ffc040;KiHa 07%l;#; quay về, Hachiroku đã nghe thấy từ trước rồi sao."
# 【凪】
# display as 凪
# JP: 「なんか来たばい！　楽しそうばい！」
2377 = "「Có cái gì đến kìa! Trông vui quá!」"
# 【ざわめきＢ】
# display as 嘈雜聲
# JP: 「\\x%l列車;#00ffc040;列車%l;#;ばい。市長さんのが戻ってきたと」
2340 = "「Là \\x%l列車;#00ffc040;tàu%l;#; đấy. Xe của ngài thị trưởng đã quay về rồi.」"
# 【ざわめきＣ】
# display as 嘈雜聲
# JP: 「走っとるのがあっと？　見に行くばい！」
2497 = "「Có tàu đang chạy à? Đi xem thôi!」"
# monologue
# JP: どどどと、人の大きな流れ。\nそうして、すぐに静まりかえる。
3011 = "Dòng người ồ ạt kéo đi rầm rập. Rồi sau đó, xung quanh lập tức trở nên vắng lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「これ……は。見事においてけぼりだな」
2568 = "「Thế này...... thì. Đúng là bị bỏ lại chỏng chơ rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「おいてけぼり……」
2157 = "「Bị bỏ lại......」"
# monologue
# JP: ガランとしている。\n\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;が果てなく広い。人気がまるで消えている。
97 = "Vắng tanh vắng ngắt. \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; rộng thênh thang. Bóng người như biến mất hoàn toàn."
# monologue
# JP: ポーレットを迎えにいったのだろう。\n赤井宮司、蓑笠老人――日々姫さえもが残っていない。
3038 = "Chắc là đi đón Paulette hết rồi. Thầy Akai, ông lão Minokasa——ngay cả Hibiki cũng không còn ở lại."
# 【ハチロク】
# display as 八六
# JP: 「おいてけ……ぼりっ――」
2156 = "「Bị bỏ...... lại——」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2632 = "「！」" 
# monologue
# JP: ハチロクが駆ける。まっすぐに。\n堪え溜め込んでいた全てが一気に、はじけたように。
2937 = "Hachiroku chạy đi. Chạy thẳng một mạch. Như thể tất cả những gì cô ấy kìm nén, tích tụ nãy giờ đã đồng loạt vỡ tung."
# monologue
# JP: 今日一日、一度たりとも近づかなかった、\n\\x%l8620;#00ffc040;8620%l;#;の車体めがけて、一直線に。
3053 = "Suốt cả ngày hôm nay, cô ấy chưa một lần bước đến gần, thế mà giờ lại lao thẳng về phía thân xe \\x%l8620;#00ffc040;8620%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2632 = "「！」" 
# monologue
# JP: ハチロクが、\\x%l8620;#00ffc040;8620%l;#;を呼ぶ。
2905 = "Hachiroku, gọi tên \\x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: 同じ名前を持つ相棒を――\nいや、恐らくは、半身を。
3056 = "Gọi người bạn đồng hành mang cùng tên với mình—— Không, có lẽ là, gọi một nửa sinh mệnh của mình."
# 【ハチロク】
# display as 八六
# JP: 「おまえは、ずっと――\nこんな気持ちで、ずうっとここに止まっていたの？」
1966 = "「Mày đã, luôn—— mang tâm trạng thế này, và đỗ ở đây suốt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1569 = "「…………」" 
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;は答えない。\nただただ巨体を、無造作にさらけ出してるだけだ。
88 = "\\x%l8620;#00ffc040;8620%l;#; không trả lời. Chỉ im lìm phơi bày thân hình khổng lồ một cách thô kệch."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが壊してしまったせいで――おまえは、ずっと\n――こんな気持ちで――おいてけぼりで」
2612 = "「Chỉ vì tao đã phá hỏng mọi thứ——mà mày, đã luôn ——mang tâm trạng thế này——bị bỏ lại chỏng chơ」"
# monologue
# JP: 一粒――\nすぐに、雨の如くに。
2820 = "Một giọt—— Rồi ngay lập tức, tuôn rơi như mưa."
# monologue
# JP: ぼろぼろと、大粒の涙が床に当たって砕ける。
3041 = "Những giọt nước mắt to tướng lã chã rơi xuống sàn vỡ tan."
# 【ハチロク】
# display as 八六
# JP: 「なのに――わたくしは――わたくしはっ」
2489 = "「Vậy mà——tao thì——tao thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1570 = "「......」"
# monologue
# JP: ハチロクの小さな肩に手のひらを置く。\n何もいわずに、ぽんと置く。
3205 = "Tôi đặt tay lên bờ vai nhỏ bé của Hachiroku. Không nói lời nào, chỉ khẽ đặt lên."
# monologue
# JP: 震えの全てが静まるまで。\n涙の全てが、落ちていくまで。
3373 = "Cho đến khi cô ấy ngừng run rẩy. Cho đến khi những giọt nước mắt rơi cạn."
# 【ハチロク】
# display as 八六
# JP: 「双、鉄……様」
2618 = "「Ngài, Soutetsu......」"
# monologue
# JP: けれど、震えがとまりきらぬうち、\nハチロクは声を絞り出す。
3483 = "Thế nhưng, khi vẫn chưa hết run rẩy, Hachiroku đã cố vắt kiệt giọng nói."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは……浅ましい\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です……この子に\n……たくさんの人に、取り返しのつかぬ傷を与えて――」
2267 = "「Em là...... một \\x%lレイルロオド;#00ffc040;Railord%l;#; đáng khinh...... đã gây ra cho đứa trẻ này ......và rất nhiều người, những tổn thương không thể nào cứu vãn——」"
# monologue
# JP: ハチロクの指が、いたわるように\\x%l8620;#00ffc040;8620%l;#;の傷を撫でる。
2925 = "Những ngón tay của Hachiroku, vuốt ve vết thương của \\x%l8620;#00ffc040;8620%l;#; như để xoa dịu."
# monologue
# JP: 巧みに覆い隠された、擦過痕を、打痕を、亀裂を、\n手袋を外した指先で、なんどもやさしく、撫でてやる。
3077 = "Những vết xước, vết móp, vết nứt được che đậy khéo léo, cô ấy tháo găng tay ra, dùng đầu ngón tay nhẹ nhàng vuốt ve hết lần này đến lần khác."
# 【ハチロク】
# display as 八六
# JP: 「だのに――浅ましくも欲に渇くのです。\nあの、たくさんの……人の賑わいと笑顔とに触れ」
2431 = "「Vậy mà——em lại khao khát một cách hèn hạ. Khi được chạm vào sự náo nhiệt và những nụ cười...... của rất nhiều người」"
# monologue
# JP: ハチロクの震えが大きくなる。\n激しい痛みが、後悔が、僕の傷にまで伝わってくる。
2916 = "Hachiroku càng run rẩy mạnh hơn. Nỗi đau đớn dữ dội, sự hối hận tột cùng, truyền đến tận vết thương của tôi."
# monologue
# JP: だから、背中から抱きしめる。\n強く抱きしめ――傷を重ねて、痛みを抑える。
3177 = "Thế nên, tôi ôm chầm lấy cô ấy từ phía sau. Ôm thật chặt——áp sát vết thương của cả hai, để kìm nén nỗi đau."
# 【ハチロク】
# display as 八六
# JP: 「浅ましくも――わたくしは願ってしまうのです――\nもう一度……あの日の前に、帰りたいと――」
2422 = "「Dù thật hèn hạ——nhưng em vẫn không ngừng ước ao—— Được một lần nữa...... quay trở lại những ngày trước hôm đó——」"
# monologue
# JP: わかりすぎるほど、わかってしまう。\n僕も、願った。何度も何度も何度も何度も。
3169 = "Tôi hiểu, hiểu đến mức quá rõ. Tôi cũng từng ước như vậy. Rất nhiều, rất nhiều lần."
# monologue
# JP: 傷の全てを無かったことに――\n事故の一日前の暮らしに、なにをしたって戻りたいと。
3161 = "Ước gì mọi vết thương đều chưa từng tồn tại—— Ước gì có thể làm bất cứ giá nào để quay về cuộc sống một ngày trước vụ tai nạn."
# 【ハチロク】
# display as 八六
# JP: 「罪の深さに[おのの]慄きながら、それでも求めてしまうのです。\nもう一度――ただもう一度……人と笑顔を運びたいと」
2031 = "「Dù run rẩy trước tội lỗi sâu nặng, nhưng em vẫn khao khát. Một lần nữa——chỉ một lần nữa thôi...... em muốn được chở mọi người và những nụ cười」"
# 【双鉄】
# display as 雙鐵
# JP: 「やっと言ったな。お前の望みを」
1973 = "「Cuối cùng cô cũng chịu nói ra rồi. Mong muốn của cô.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2089 = "「啊」" 
# monologue
# JP: 怖い、僕が。痛い、僕が。\nハチロクの事故の記憶が、僕の古傷から生血を絞る。
3151 = "Nỗi sợ hãi, trong tôi. Nỗi đau đớn, trong tôi. Ký ức về vụ tai nạn của Hachiroku đang vắt kiệt máu tươi từ vết thương cũ của tôi."
# monologue
# JP: だから背中から抱きしめたまま――\n大丈夫、声だけならば。震えさせずにきっと、通せる。
3210 = "Vì vậy, tôi vẫn cứ ôm cô ấy từ phía sau—— Không sao, nếu chỉ là giọng nói. Tôi chắc chắn sẽ giữ cho nó không run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前のオーナーだ。\n僕は、お前に約束をした」
2266 = "「Tôi là chủ sở hữu của cô. Tôi đã hứa với cô rồi.」"
# monologue
# JP: 言い聞かせる。\nもう一度。もう何度でも、自分自身に。
3184 = "Tự nhủ với lòng mình. Một lần nữa. Bao nhiêu lần cũng được, tự nhủ với chính mình."
# monologue
# JP: ここを乗り越えられないのなら、\n御一夜を――そして路子を――救えはしない。
3447 = "Nếu không thể vượt qua được chướng ngại này, thì sẽ không thể cứu được Ohimitera——và cả Michiko nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前の望みを叶える」
2269 = "「Tôi sẽ biến mong muốn của cô thành hiện thực.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
# 2618 = "「雙鐵……少爺」" 
# monologue
# JP: 小さな手のひらが重なってくる。\n抱きしめている僕の手を、ハチロクがきゅっと掴んでくる。
3075 = "Bàn tay nhỏ bé của cô ấy đặt lên. Hachiroku nắm chặt lấy bàn tay đang ôm cô ấy của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「故にハチロク、お前を再び走らせよう。\nお前と[ハチロクニイマル,3]8620に、人と、笑顔とを運ばせよう」
2300 = "「Vì vậy Hachiroku, tôi sẽ làm cho cô chạy lại một lần nữa. Sẽ làm cho cô và \\x%l8620;#00ffc040;8620%l;#; lại được chở mọi người, và những nụ cười.」"
# monologue
# JP: いや、そうか。\nこれこそ救いなのかもしれない。
3261 = "Không, ra là vậy. Có lẽ đây mới chính là sự cứu rỗi."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;を湯医にたどり着かせたのなら、\nあの\\x%l列車;#00ffc040;列車%l;#;から――路子も、降りられるのかもしれない。
3391 = "Nếu có thể đưa \\x%l8620;#00ffc040;8620%l;#; đến được Yui, thì có lẽ——Michiko cũng có thể bước xuống từ chuyến \\x%l列車;#00ffc040;tàu%l;#; đó."
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます……双鉄、様」
2526 = "「Cảm ơn ngài...... ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「礼には、まだまだ早すぎる」
1922 = "「Cảm ơn lúc này vẫn còn quá sớm.」"
# monologue
# JP: 極めて大きな一歩だが、\nこれも所詮は、一歩にすぎん。
3477 = "Dù là một bước tiến vô cùng lớn, nhưng suy cho cùng, đây cũng chỉ mới là một bước."
# monologue
# JP: たどりつくまで――\nそれまで、全ては途中経過にすぎんのだ。
3025 = "Cho đến khi chạm tới đích—— Cho đến lúc đó, tất cả chỉ là quá trình mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「走るぞハチロク。お前の望みをかなえるために。\nそうするために――お前も走れ。全力で」
2538 = "「Chạy thôi Hachiroku. Để biến mong muốn của cô thành hiện thực. Để làm được điều đó——cô cũng phải chạy đi. Bằng toàn bộ sức lực.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。わたくしは、必ず全力で。\n浅ましくとも、見苦しくとも――」
2371 = "「Vâng, thưa ngài Soutetsu. Em nhất định sẽ dốc toàn lực. Dù có hèn hạ, dù có khó coi đến đâu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そうだな。\n浅ましくとも、見苦しくとも」
2400 = "「Đúng vậy. Phải thế chứ. Dù có hèn hạ, dù có khó coi đến đâu.」"
# monologue
# JP: そうしていつか、走れなくなり、\n無様に地べたを這いずろうとも――
2982 = "Và rồi một ngày nào đó, dù không thể chạy được nữa, dù có phải bò trườn trên mặt đất một cách thảm hại đi chăng nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「終着駅に――かならず僕らは、辿り着くのだ」
2241 = "「Chúng ta——chắc chắn sẽ đến được ga cuối cùng.」"
