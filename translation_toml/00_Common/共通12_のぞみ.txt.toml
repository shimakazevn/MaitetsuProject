[script]
# lines: 539 
# monologue
# JP: ――腰から体を真っ二つに折る。
1521 = "――Gập người làm đôi từ thắt lưng."

# monologue
# JP: ふかみのお辞儀は、長身と礼儀正しさとが交じり合い、\nなかなかの迫力をもっている。
3315 = "Cái cúi chào của Fukami, là sự hòa quyện\ngiữa dáng người cao ráo và sự lễ phép,\nmang một sức hút khá mạnh mẽ."

# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。凪ちゃんも誘ったんですけど、\n剣術修行をするって、どっか行っちゃった――です」
1911 = "「Em xin lỗi. Em cũng đã rủ Nagi rồi,\nnhưng em ấy bảo đi tu luyện kiếm thuật,\nrồi chạy đi đâu mất tiêu――rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。ふかみが来てくれただけでも有り難い」
2404 = "「Không sao. Chỉ cần Fukami đến là tôi đã\nbiết ơn lắm rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「が、がんばりました。です」
2232 = "「Em, em đã cố gắng. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2110 = "「Ừm.」"

# monologue
# JP: 褒めてほしそうな顔につられて、\n思わず腕を伸ばしてしまう。
3191 = "Bị thu hút bởi khuôn mặt như đang mong\nđược khen ngợi,\ntôi bất giác vươn tay ra."

# monologue
# JP: かなり位置の高い頭を撫でれば、ふかみは一瞬びくりとし、\nけれどすぐに心地よさそうに目を細める。
3186 = "Khi tôi xoa lên mái đầu ở vị trí khá cao,\nFukami giật mình một thoáng,\nnhưng ngay lập tức nheo mắt lại vẻ thoải\nmái."

# 【日々姫】
# display as 日日姬
# JP: 「うおっほん、えへん！　えへんえへん！！」
2066 = "「E hèm, e hèm! E hèm e hèm!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2118 = "「Ôi chà.」"

# monologue
# JP: 妹でもないものに、馴れ馴れしいことをしてしまったか。
3166 = "Không phải em gái mình, mà lại có hành\nđộng suồng sã mất rồi."

# monologue
# JP: が、満足そうなふかみを見れば、\n謝罪するのもおかしいような気もしてくる。
2881 = "Nhưng, nhìn Fukami có vẻ mãn nguyện,\ntôi lại cảm thấy xin lỗi thì cũng hơi kỳ."

# 【日々姫】
# display as 日日姬
# JP: 「で？　にぃに――んんっ、\n兄さんは、なんでみんなを呼び集めたんですか？」
2610 = "「Thế? Anh hai――ưm,\nanh trai, tại sao lại gọi mọi người tập\ntrung lại vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。その話だ。ハチロク」
2172 = "「À đúng rồi. Là chuyện đó. Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2155 = "「Vâng, ngài Soutetsu.」"

# monologue
# JP: ――『8620改修公開と、蒸気焼酎製造販売に関する私案』。
1513 = "――『Bản đề xuất cá nhân về việc công khai\nphục hồi 8620 và sản xuất, bán Shochu Hơi\nNước』."

# monologue
# JP: 真闇姉の助言によって思い浮かんだ全てをひとまず\n書類にまとめたものを、ハチロクが順に配っていく。
3349 = "Những ý tưởng nảy ra từ lời khuyên của chị\nMayami tạm thời\nđược tổng hợp thành tài liệu, Hachiroku\nlần lượt phát cho mọi người."

# 【ふかみ】
# display as 深美
# JP: 「あ……これ、面白そう。です」
2088 = "「A……Cái này, có vẻ thú vị. Ạ.」"

# monologue
# JP: 真っ先に賛意を示すふかみと、\nその隣、難しい顔をしている日々姫。
3310 = "Fukami là người đầu tiên tỏ ý tán thành,\ncòn bên cạnh, Hibiki đang nhăn mặt suy\nnghĩ."

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、この字はなんて読むですかぁ？」
2416 = "「Paulette, chữ này đọc là gì vậy ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「[こうじ]麹よ、れいな。\n焼酎づくりの……うーんと、原料のひとつ。かなぁ？」
2443 = "「Là men kōji đó, Reina.\nCủa việc nấu rượu shochu……ừm, là một trong\nnhững nguyên liệu. Chắc vậy?」"

# monologue
# JP: 字をひとつひとつ追っているれいなと、\nそれ以上に慎重に読み込んでくれているポーレット。
3334 = "Reina đang dò dẫm từng chữ một,\ncòn Paulette thì đang đọc tài liệu cẩn\nthận hơn thế nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「うんっ」
# 2110 = "「嗯」" 

# monologue
# JP: やがてポーレットは顔をあげ、\nきらきらした目で僕を見て――
2823 = "Một lúc sau, Paulette ngẩng mặt lên,\nnhìn tôi bằng đôi mắt lấp lánh――"

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
2059 = "「Hau!!?」"

# monologue
# JP: いきなり頬を真っ赤に染めて、ぶんぶんぶん、と首を振り。
3219 = "Đột nhiên mặt đỏ bừng, rồi lắc đầu nguầy\nnguậy."

# monologue
# JP: 深呼吸して、書類を見直し、\n水を一口飲んでゆっくり、言葉をつなぐ。
3050 = "Hít một hơi thật sâu, xem lại tài liệu,\nuống một ngụm nước rồi từ từ tiếp lời."

# 【ポーレット】
# display as 波萊特
# JP: 「これはいい案。素晴らしくありだと思います。\n\x%l8620;#00ffc040;8620%l;#;改修の時点から、これなら、半ば公共事業的に――」
2571 = "「Đây là một ý tưởng hay. Tôi nghĩ là hoàn\ntoàn tuyệt vời.\nTừ thời điểm phục hồi \\x%l8620;#00ffc040;8620%l;#;, nếu làm thế\nnày, có thể coi như một nửa là dự án công\ncộng――」"

# monologue
# JP: そこまでいって、また口を閉じ。\nもう一度書類を確認してから、こくりと頷く。
3291 = "Nói đến đó, cô ấy lại ngậm miệng.\nSau khi xác nhận lại tài liệu một lần nữa,\ncô ấy gật đầu cái rụp."

# 【ポーレット】
# display as 波萊特
# JP: 「うん。この案でしたら改修の方については、\n市から、既存の補助金、多分、つけられる枠があります」
2109 = "「Ừm. Nếu là phương án này thì về phần phục\nhồi,\ncó lẽ, có thể xin được trợ cấp từ các\nkhoản hiện có của thành phố.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。そうなればありがたい」
2358 = "「Ồ. Nếu được vậy thì tốt quá.」"

# monologue
# JP: 仮に補助金が低額でも、“市の協賛”的な看板がつけば、\n信用度が格段にあがり、より参加して貰い易くなるはずだ。
3133 = "Giả sử tiền trợ cấp có ít đi chăng nữa,\nnhưng nếu có được danh nghĩa “thành phố\ntài trợ”,\nthì độ tin cậy sẽ tăng lên đáng kể, và\nchắc chắn sẽ dễ dàng kêu gọi người tham\ngia hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、周知。認知度の向上。ひいては、できる限り\n多くの市民に、改修に関わってもらうことが最重要だ」
2482 = "「Dù sao thì, cũng phải thông báo rộng rãi.\nNâng cao độ nhận diện. Hơn nữa, quan trọng\nnhất là\nphải thu hút càng nhiều người dân tham gia\nvào việc phục hồi càng tốt.」"

# monologue
# JP: この計画の要点をあらためて言葉に直し、伝える。
3167 = "Tôi tóm tắt lại những điểm chính của kế\nhoạch này bằng lời và truyền đạt lại."

# 【双鉄】
# display as 雙鐵
# JP: 「『御一夜のSL』として[ハチロクニイマル,3]8620を認識してもらう。\nそれができれば、\x%l8620;#00ffc040;8620%l;#;を観光復権の旗印と出来よう」
2169 = "「Phải làm cho mọi người nhận thức 8620 là\n『SL của Ohimitera』.\nNếu làm được điều đó, chúng ta có thể biến\n\\x%l8620;#00ffc040;8620%l;#; thành ngọn cờ đầu cho việc chấn hưng\ndu lịch.」"

# 【日々姫】
# display as 日日姬
# JP: 「御一夜市の……私たちの町の、ＳＬ」
2211 = "「SL của thành phố Ohimitera……của thị trấn\nchúng ta.」"

# monologue
# JP: 厳しい顔のままで日々姫が、そっと呟く。
2885 = "Vẫn giữ vẻ mặt nghiêm trọng, Hibiki khẽ\nlầm bầm."

# 【日々姫】
# display as 日日姬
# JP: 「だからにぃに――兄さんは、工場誘致賛成派の私に、\n蒸気焼酎のラベルを描けとおっしゃっているのですか？」
2305 = "「Vậy nên anh hai――anh trai, mới bảo em,\nmột người thuộc phe ủng hộ thu hút nhà\nmáy,\nvẽ nhãn hiệu cho Shochu Hơi Nước sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「別に、切り崩そうとたくらんでいるわけではない。\n日々姫が、賛成派のままでも僕は一向に構わない」
2233 = "「Không phải là anh đang âm mưu lung lạc em\nđâu.\nDù Hibiki có tiếp tục thuộc phe ủng hộ,\nanh cũng hoàn toàn không bận tâm.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
2072 = "「Hả?」"

# monologue
# JP: 驚いたような、どこかさみしげにも見える顔。
3256 = "Khuôn mặt có vẻ ngạc nhiên, xen lẫn chút\ngì đó cô đơn."

# monologue
# JP: 言葉の不足を感じさせられ、\nひとつひとつを、自分の中でも噛み砕く。
3072 = "Cảm thấy lời nói của mình còn thiếu sót,\ntôi tự ngẫm lại từng chút một trong đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「銀行主導で作ったという、日々姫のイラストマップを\n見て思った。御一夜の再生を願う気持ちは同じだと」
2458 = "「Anh đã nghĩ vậy khi xem bản đồ minh họa\ndo ngân hàng chủ đạo mà Hibiki vẽ.\nRằng mong muốn tái thiết Ohimitera của\nchúng ta là giống nhau.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい」
2363 = "「Vâng, đúng vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「同じ目的であるのなら、力を貸して貰えるかとも考えた。\n……日々姫の目的は、工場誘致そのものではなかろう？」
2243 = "「Nếu cùng chung mục đích, anh nghĩ liệu em\ncó thể cho anh mượn sức không.\n……Mục đích của Hibiki, không phải là bản\nthân việc thu hút nhà máy đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「それは……\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致は、もちろん、\n御一夜の経済再生のための手段と考えています」
2569 = "「Chuyện đó……việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\ntất nhiên,\nem coi đó là phương tiện để tái thiết kinh\ntế Ohimitera.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2083 = "「Ừm.」"

# 【日々姫】
# display as 日日姬
# JP: 「ですから……工場誘致無しに、よりリスクの少ない形で、\n経済再生ができるなら……理想的です、けど……」
2298 = "「Vì thế……nếu có thể tái thiết kinh tế\nmà không cần thu hút nhà máy, với hình\nthức ít rủi ro hơn……thì thật lý tưởng,\nnhưng mà……」"

# monologue
# JP: 理想的と認めてもなお、“けど”と言葉が濁ってしまう。\nなるほど。日々姫の逡巡の理由に見当がついてきた。
3213 = "Dù đã thừa nhận là lý tưởng, nhưng vẫn\nngập ngừng với từ “nhưng mà”.\nRa là vậy. Tôi đã lờ mờ đoán được lý do\ncho sự do dự của Hibiki."

# monologue
# JP: 小さなころから、日々姫はある面でひどく潔癖だった。\n別の言い方をするのなら、世渡りがひどく、不器用だった。
3059 = "Từ khi còn nhỏ, Hibiki đã cực kỳ mắc chứng\nsạch sẽ ở một khía cạnh nào đó.\nNói cách khác, em ấy cực kỳ vụng về trong\ncách xử thế."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、手段は道具だ」
2333 = "「Hibiki, phương tiện chỉ là công cụ thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2072 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最初にこれと選んだ道具に愛着を持つのは良いことだ。\n鉄道を愛する気持ちは、確かに尊い」
2174 = "「Việc có tình cảm với công cụ mình chọn\nđầu tiên là một điều tốt.\nTình yêu dành cho đường sắt, quả thực rất\nđáng quý.」"

# monologue
# JP: ポーレット、れいな、ハチロクの視線が集中する中で、\n日々姫がうなずく。あいまいに。
3288 = "Dưới sự tập trung ánh nhìn của Paulette,\nReina, Hachiroku,\nHibiki gật đầu. Một cách mơ hồ."

# 【双鉄】
# display as 雙鐵
# JP: 「が、それに固執し、その他を頭から否定するのでは、\n最初に出会ったあの時のわがままなハチロクと同じだぞ」
1960 = "「Nhưng, nếu cứ cố chấp với nó, và phủ nhận\nnhững thứ khác ngay từ đầu,\nthì em cũng giống hệt Hachiroku bướng bỉnh\nlúc chúng ta mới gặp nhau thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1569 = "「…………」"

# monologue
# JP: 恥ずかしそうに、あるいは少しスネたのか、\nハチロクの視線が他所へ向く。
2834 = "Có vẻ xấu hổ, hoặc có lẽ hơi dỗi,\nánh mắt Hachiroku hướng đi chỗ khác."

# monologue
# JP: 対して日々姫は、そういうことか、と\n今度ははっきり、強く頷く。
3380 = "Ngược lại, Hibiki thì như thể đã hiểu ra,\nlần này em ấy gật đầu mạnh mẽ và dứt\nkhoát."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;を[おんてき,1]怨敵とまで言っていたハチロクは、しかし\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の利便性を認め、共存を考えるようになった」
2003 = "「Hachiroku từng gọi \\x%lエアクラ;#00ffc040;Aircra%l;#; là kẻ thù không\nđội trời chung, nhưng\nem ấy đã công nhận sự tiện lợi của \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nvà bắt đầu suy nghĩ đến việc chung sống.」"

# monologue
# JP: それどころか実際、\nひとりで僕の飛行\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗るようにさえなった。
3069 = "Thậm chí trên thực tế,\nem ấy còn tự mình ngồi lên chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#;\nbay của tôi nữa."

# monologue
# JP: その事実を知る日々姫にならば、\nきっと、誤解なく伝わろう。
3239 = "Nếu là Hibiki, người biết được sự thật đó,\nchắc chắn sẽ hiểu được mà không có sự hiểu\nlầm nào."

# 【双鉄】
# display as 雙鐵
# JP: 「手段は道具だ。結果を出すのに最適なものを選べばいい。\nもし、どれが最適かすぐには判断がつかぬものなら――」
2312 = "「Phương tiện chỉ là công cụ. Chỉ cần chọn\ncái tối ưu nhất để mang lại kết quả là\nđược.\nNếu không thể đánh giá ngay cái nào là tối\nưu nhất thì――」"

# 【ハチロク】
# display as 八六
# JP: 「使い比べれば良いのです」
2521 = "「Thì cứ dùng thử rồi so sánh là được ạ.」"

# monologue
# JP: 静かに、そしてきっぱりと、\nハチロクが僕の言葉をつなぐ。
2914 = "Bình tĩnh, và dứt khoát,\nHachiroku tiếp nối lời của tôi."

# 【ハチロク】
# display as 八六
# JP: 「[マスター,1]主人に不便をかけてまで使い続けられることを、\n道具は、手段は――決して望みはいたしません」
2307 = "「Việc tiếp tục bị sử dụng đến mức gây bất\ntiện cho chủ nhân,\ncông cụ, phương tiện――tuyệt đối không hề\nmong muốn điều đó.」"

# monologue
# JP: ハチロクの言葉にれいなも頷く。\nごく当然と、そんな風情で。
3381 = "Reina cũng gật đầu trước lời của\nHachiroku.\nVới một phong thái như thể đó là điều hiển\nnhiên."

# 【ハチロク】
# display as 八六
# JP: 「輸送のお役に立てぬなら、観光のお役に立てばいい。\n溶かされ素材に戻っても、形を変えて役立てばいい」
2196 = "「Nếu không thể giúp ích cho việc vận\nchuyển, thì giúp ích cho du lịch cũng\nđược.\nDù có bị nung chảy trở lại thành nguyên\nliệu, chỉ cần thay đổi hình dạng và giúp\ních được là được.」"

# monologue
# JP: ごく淡々とした声に、\nハチロクは物だ、と、改めて痛感させられる。
2936 = "Giọng nói vô cùng bình thản,\nlại một lần nữa khiến tôi thấm thía nhận\nra rằng, Hachiroku là một đồ vật."

# monologue
# JP: 人と変わらぬ知性を有していても、なお――\nいや、それどころか……知性のゆえ、ひときわに。
3125 = "Dù có trí tuệ không khác gì con người,\nnhưng vẫn――\nKhông, chính vì……có trí tuệ, nên mới càng\nnổi bật."

# 【ハチロク】
# display as 八六
# JP: 「使い比べられ試されることは、わたくしたちの宿命です。\nその上で選ばれるのなら、それこそまさに誇りなのです」
2511 = "「Bị dùng thử và so sánh, là số mệnh của\nchúng tôi.\nNếu sau đó mà được chọn, thì đó mới chính\nlà niềm tự hào.」"

# 【日々姫】
# display as 日日姬
# JP: 「……[くら]比ぶることは……\nズルかことじゃなかと？」
1577 = "「……Việc so sánh……\nKhông phải là gian xảo sao?」"

# monologue
# JP: ああ、やはり。\n日々姫はそこに引っ掛かり苦しんでしまっていたのだ。
3272 = "À, quả nhiên là vậy.\nHibiki đã bị vướng mắc và đau khổ ở điểm\nđó."

# monologue
# JP: その引っ掛かりは確かに、潔癖さの現れだ。\nが、日々姫の成長を阻む潔癖さなど、美徳と僕は認めない。
3478 = "Sự vướng mắc đó chắc chắn là biểu hiện của\nchứng sạch sẽ.\nNhưng, tôi không công nhận thứ chứng sạch\nsẽ cản trở sự trưởng thành của Hibiki là\nmột mỹ đức."

# 【双鉄】
# display as 雙鐵
# JP: 「比べることを、ズルいと考える気持ちもわかる。\nだが、それを言うなら、比べぬことも、またズルい」
1975 = "「Anh cũng hiểu cảm giác coi việc so sánh\nlà gian xảo.\nNhưng, nếu nói vậy thì, việc không so\nsánh, cũng là một sự gian xảo.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
2089 = "「A.」"

# monologue
# JP: 日々姫は、聡い。\nこの先はもう、いわずとも伝わっていることだろう。
3244 = "Hibiki rất thông minh.\nPhần sau chắc không cần nói em ấy cũng đã\nhiểu rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「比べないのは、最初から機会を奪うことであり――\n同時に、思考の放棄に等しいと僕は考える」
1909 = "「Không so sánh, tức là tước đoạt cơ hội\nngay từ đầu――\nĐồng thời, anh nghĩ nó cũng tương đương\nvới việc từ bỏ suy nghĩ.」"

# 【日々姫】
# display as 日日姬
# JP: 「思考の、放棄……」
2322 = "「Từ bỏ, suy nghĩ……」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はこの案を、銀行に――\n宝生稀咲のところにも持ち込むつもりだ」
2270 = "「Anh dự định sẽ mang phương án này đến\nngân hàng――\nĐến chỗ Houshou Kisaki.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2632 = "「!」"

# monologue
# JP: 日々姫がびくりと顔を跳ね上げる。\nその反応に、確信が深まる。
3241 = "Hibiki giật nảy mình ngẩng mặt lên.\nPhản ứng đó càng làm tôi thêm 확 tín."

# monologue
# JP: 日々姫の\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成の理論的な支柱、のみならず、\n精神的な支柱ともなっているのは、宝生稀咲なのだと。
3028 = "Người không chỉ là chỗ dựa lý luận cho\nviệc ủng hộ thu hút \\x%lエアクラ;#00ffc040;Aircra%l;#; của Hibiki,\nmà còn là chỗ dựa tinh thần, chính là\nHoushou Kisaki."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして、僕は確信している。宝生稀咲は間違いなく。\n工場誘致の手を緩めずに、僕らの案にも協力する――と」
2487 = "「Và, anh tin chắc. Houshou Kisaki chắc\nchắn.\nSẽ không nới lỏng tay trong việc thu hút\nnhà máy, mà vẫn sẽ hợp tác với phương án\ncủa chúng ta――」"

# 【日々姫】
# display as 日日姬
# JP: 「そう、ですね。\n稀咲センパイなら、絶対、間違いなくそうします」
2362 = "「Đúng, vậy nhỉ.\nNếu là tiền bối Kisaki, tuyệt đối, chắc\nchắn chị ấy sẽ làm vậy.」"

# monologue
# JP: 戸惑ってた瞳から、曇りの全てが消え去っている。\n日々姫らしい、快活な光が戻っている。
3250 = "Mọi sự u ám đã biến mất khỏi đôi mắt từng\nbối rối.\nÁnh sáng hoạt bát, đặc trưng của Hibiki đã\nquay trở lại."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。私、描きます。蒸気焼酎のラベル。\n私に描ける、一番いい絵で仕上げてみせます」
2081 = "「Anh hai. Em sẽ vẽ. Nhãn hiệu cho Shochu\nHơi Nước.\nEm sẽ hoàn thành nó bằng bức tranh đẹp\nnhất mà em có thể vẽ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、助かる」
2360 = "「Vậy sao, giúp anh nhiều lắm.」"

# 【日々姫】
# display as 日日姬
# JP: 「やめてください、お礼だなんて。\n兄妹ですよ？　水臭い」
2020 = "「Đừng có cảm ơn em nữa.\nChúng ta là anh em mà? Khách sáo quá đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな」
1976 = "「Đúng vậy nhỉ.」"

# monologue
# JP: 義理だとはいえ、兄妹だ。\n日々姫の求めるものが何かを、遅ればせながら理解する。
3126 = "Dù là trên danh nghĩa, nhưng chúng tôi là\nanh em.\nDù hơi muộn màng, nhưng tôi đã hiểu được\nđiều Hibiki mong muốn là gì."

# 【双鉄】
# display as 雙鐵
# JP: 「頼りにしてるぞ、日々姫」
2601 = "「Trông cậy vào em đấy, Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
2058 = "「A.」"

# monologue
# JP: わし、わし、わし。\n日々姫の頭を、掻くようにして豪快に撫でる。
3173 = "Xoa, xoa, xoa.\nTôi xoa đầu Hibiki một cách hào sảng như\nđang gãi."

# 【日々姫】
# display as 日日姬
# JP: 「に、兄さん――もう、髪がくしゃくしゃになっちゃう」
2080 = "「A, anh hai――thật tình, tóc em rối hết rồi\nnày.」"

# monologue
# JP: だが、やめろとは口にしない。\nこういうところは、小さなころと変わっていない。
3000 = "Nhưng, em ấy không bảo tôi dừng lại.\nĐiểm này thì, vẫn chẳng khác gì hồi còn\nnhỏ."

# 【ポーレット】
# display as 波萊特
# JP: 「それでですね、双鉄くん」
2314 = "「Vậy thì, anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2084 = "「Ừm.」"

# monologue
# JP: 社長モードの鋭い声に、\n手を止め姿勢を整えなおす。
3289 = "Giọng nói sắc sảo của chế độ giám đốc,\nkhiến tôi dừng tay và chỉnh lại tư thế."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;がどんな機関車か、数字だけだと普通の人は、\n実感、できないとわたし思います」
2280 = "「Tôi nghĩ, nếu chỉ dựa vào những con số\nthì người bình thường sẽ không thể\ncảm nhận được thực tế \\x%l8620;#00ffc040;8620%l;#; là một chiếc\nđầu máy như thế nào đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだな。僕とて、大きさと凄さを実感したのは、\n目の当たりにして、ようやっとだった」
2524 = "「Đúng là vậy. Ngay cả tôi, cũng chỉ thực\nsự cảm nhận được độ lớn và sự tuyệt vời\ncủa nó,\nkhi tận mắt chứng kiến.」"

# 【ポーレット】
# display as 波萊特
# JP: 「計画がどんなに優れたものに思えても、\n実感がないと、人はなかなか動き出せないとも思います」
1927 = "「Dù kế hoạch có vẻ xuất sắc đến đâu,\nnhưng nếu không có cảm nhận thực tế, tôi\nnghĩ mọi người sẽ rất khó để bắt tay vào\nhành động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それも、確かに」
2473 = "「Chuyện đó, cũng đúng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですから、考えたんですけど――修復にかかる前に、\n[ハチロクニイマル,3]8620、一度公開展示したらどうでしょう？」
2302 = "「Vì vậy, tôi đã nghĩ――trước khi bắt tay\nvào phục hồi,\nhay là chúng ta tổ chức trưng bày công\nkhai 8620 một lần xem sao?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、見てみたい！　見てみたい、です」
2098 = "「A, em muốn xem thử! Em muốn xem thử, ạ.」"

# monologue
# JP: 真っ先に、思わぬところから声が来る。
3371 = "Đầu tiên, một giọng nói vang lên từ nơi\nkhông ngờ tới."

# 【ふかみ】
# display as 深美
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;って、本物見たことないから。\nあの、興味とか……結構、ある。です」
2257 = "「Vì em chưa từng thấy \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\nthật bao giờ.\nNên, em khá là……có hứng thú. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ふかみ達にはそうだろうな。\n僕世代でも、子供の頃にかろうじてだから」
2424 = "「Đúng là với thế hệ của Fukami thì là vậy\nnhỉ.\nNgay cả thế hệ của tôi, cũng chỉ may mắn\nđược thấy hồi còn nhỏ thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんも、実物見れるんだったら来ると思うし。\n凪ちゃん凄く人気あるから、たくさん来て、親御さんも」
2260 = "「Em nghĩ Nagi cũng sẽ đến nếu được xem tận\nmắt.\nNagi rất được yêu mến, nên chắc sẽ có\nnhiều người đến, cả phụ huynh nữa.」"

# monologue
# JP: 真っ赤になっていっぱいいっぱいのふかみの言葉は、\nけれどもストンと、僕に理解を与えてくれる。
3309 = "Khuôn mặt đỏ bừng và những lời nói đầy nỗ\nlực của Fukami,\nlại khiến tôi dễ dàng hiểu ra vấn đề."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。人気があるという凪に学友を誘ってもらえば、\nその保護者達にも自然、周知が出来るというわけか」
2032 = "「Ra là vậy. Nếu nhờ Nagi, người rất được\nyêu mến, rủ rê bạn học,\nthì tự nhiên cũng sẽ thông báo được cho cả\nphụ huynh của các em ấy nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「です。です」
2364 = "「Vâng. Vâng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「口コミは、効果ありますからね。\nことに、御一夜のような古い町では」
2184 = "「Truyền miệng có hiệu quả lắm đấy.\nĐặc biệt là ở một thị trấn cổ như\nOhimitera.」"

# 【双鉄】
# display as 雙鐵
# JP: 「保護者にも様々な世代の方がいるだろうし、な」
2455 = "「Trong số phụ huynh chắc cũng có nhiều thế\nhệ khác nhau nhỉ.」"

# monologue
# JP: 凪・ふかみ世代には、見たことがなく目新しいもの。\n蓑笠老人の世代には、間違いなく懐かしいものだろう。
2955 = "Đối với thế hệ của Nagi và Fukami, đó là\nmột thứ mới mẻ chưa từng thấy.\nĐối với thế hệ của ông lão Minokasa, chắc\nchắn đó sẽ là một thứ đầy hoài niệm."

# monologue
# JP: 二世代どころか三世代――\n家族全てを、巻き込めるようになるかもしれぬ。
2883 = "Không chỉ hai thế hệ mà là ba thế hệ――\nCó lẽ chúng ta sẽ có thể lôi kéo được cả\ngia đình."

# 【双鉄】
# display as 雙鐵
# JP: 「町全体を巻き込むという目的には、確かに、\n学園生からの口コミは、大きな効果を示せそうに思う」
2244 = "「Đúng là, với mục đích lôi kéo toàn bộ thị\ntrấn,\ntôi nghĩ truyền miệng từ học sinh sẽ mang\nlại hiệu quả lớn.」"

# 【ふかみ】
# display as 深美
# JP: 「あと、ポスターとかビラとかあれば、\n発船所でも配る。です。それで、そしたらっ」
2453 = "「Ngoài ra, nếu có áp phích hay tờ rơi,\nthì ở bến xuất phát cũng sẽ phát. Ạ. Thế\nthì, lúc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、観光客にもアピールしておけば、\nいざ\x%l8620;#00ffc040;8620%l;#;が走ったときにリピートを望めるかもしれんな」
2353 = "「Ra là vậy, nếu chúng ta quảng bá cho cả\nkhách du lịch,\nthì khi \\x%l8620;#00ffc040;8620%l;#; thực sự chạy, có thể hy vọng\nhọ sẽ quay lại nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら、展示会場には来場者アンケートも用意して、\n案内が必要な人には連絡をできるようにしましょう」
2603 = "「Vậy thì, chúng ta hãy chuẩn bị cả phiếu\nkhảo sát khách tham quan tại địa điểm\ntrưng bày,\nđể có thể liên lạc với những người cần\nhướng dẫn nhé.」"

# 【れいな】
# display as 玲奈
# JP: 「写真もたくさんかざるときっといいですよぉ。\nパパさんのとか、ポーレットの\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間さんのとか」
2590 = "「Chắc chắn sẽ rất tuyệt nếu trang trí thật\nnhiều ảnh đấy ạ.\nẢnh của chú, hay ảnh của các bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#;\ncủa Paulette chẳng hạn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな。すごく素敵な考えね。\n[ハチロク,3]8620形なら、走ってる写真もたくさんあるはず」
2348 = "「Đúng vậy nhỉ, Reina. Một ý tưởng rất\ntuyệt vời.\nNếu là dòng 8620, chắc chắn sẽ có rất\nnhiều ảnh chụp lúc đang chạy.」"

# 【れいな】
# display as 玲奈
# JP: 「えへへ～。\nれいな、ほめられちゃいましたぁ」
2115 = "「Ehehe~.\nReina, được khen rồi ạ.」"

# monologue
# JP: アイディアが次のアイディアを呼び、\nそれで議論が活性化する。
3509 = "Ý tưởng này gọi ý tưởng khác,\nnhờ đó cuộc thảo luận trở nên sôi nổi."

# monologue
# JP: ――良い循環が産まれてきている。
1519 = "――Một vòng tuần hoàn tốt đẹp đang được\nsinh ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ポスターとビラも、負担的に大丈夫であれば、\n日々姫に頼めると嬉しいのだが」
2516 = "「Về áp phích và tờ rơi, nếu không quá sức,\nanh rất vui nếu có thể nhờ Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「キービジュアルを描いて、ラベル、ポスター、ビラに、\nバリエーションやレイアウトを変えて活用する」
2449 = "「Em sẽ vẽ hình ảnh chủ đạo, rồi thay đổi\ncác biến thể và bố cục\nđể tận dụng cho nhãn hiệu, áp phích, tờ\nrơi.」"

# monologue
# JP: 間髪入れぬ日々姫の答え。
3251 = "Câu trả lời không chút chần chừ của\nHibiki."

# 【日々姫】
# display as 日日姬
# JP: 「そうすれば、負担の増加は最小限で済みますから。\n私、兄さんの期待に答えてみせます」
2582 = "「Làm như vậy, sự gia tăng gánh nặng sẽ\nđược giữ ở mức tối thiểu.\nEm sẽ chứng minh cho anh thấy em có thể\nđáp lại kỳ vọng của anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな」
2583 = "「Đáng tin cậy thật đấy.」"

# monologue
# JP: 心の底から、その言葉が出る。
3476 = "Những lời đó thốt ra từ tận đáy lòng."

# monologue
# JP: 日々姫は僕の知らない間に、\nプロの仕事をこなすようになっている。
2831 = "Trong lúc tôi không hay biết,\nHibiki đã có thể hoàn thành công việc của\nmột chuyên gia."

# monologue
# JP: （いや――）
3517 = "（Không――）"

# monologue
# JP: 日々姫一人だけではない。ポーレットも、ふかみも、\n一見たよりないれいなまでもが、正真正銘のプロなのだ。
2826 = "Không chỉ riêng Hibiki. Cả Paulette,\nFukami,\nthậm chí cả Reina trông có vẻ yếu ớt, cũng\nlà những chuyên gia đích thực."

# monologue
# JP: 普段から自分の仕事を、工夫し考えているからこそ、\nこうも次々、有用なアイディアも出てくるのだろう。
3278 = "Chính vì bình thường họ luôn suy nghĩ và\ntìm tòi cho công việc của mình,\nnên mới có thể liên tục đưa ra những ý\ntưởng hữu ích như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2525 = "「Cảm ơn mọi người.」"

# monologue
# JP: 頭が下がる。\nとても自然に。
3179 = "Tôi cúi đầu.\nMột cách rất tự nhiên."

# monologue
# JP: やがて再びあげた頭を、\n静かに、ハチロクへと向ける。
2824 = "Một lúc sau, tôi ngẩng đầu lên,\nlặng lẽ hướng về phía Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。ハチロク。お前も望んでくれるなら、\n修復前の\x%l8620;#00ffc040;8620%l;#;の展示を行いたい」
2193 = "「Chuyện là như vậy đấy. Hachiroku. Nếu em\ncũng mong muốn,\nanh muốn tổ chức trưng bày \\x%l8620;#00ffc040;8620%l;#; trước khi\nphục hồi.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、すでに申しております」
2252 = "「Tôi, đã nói rồi mà.」"

# monologue
# JP: ハチロクの声は落ち着いている。\n顔色にも様子にも、特段の変化は見られない。
2930 = "Giọng Hachiroku rất bình tĩnh.\nSắc mặt hay dáng vẻ, không có sự thay đổi\nnào đặc biệt."

# monologue
# JP: だが――僕ははっきり、理解できている。\n修復前を公開するとはつまり、事故痕を晒すことなのだと。
2877 = "Nhưng――tôi có thể hiểu rõ.\nCông khai trước khi phục hồi, nghĩa là\nphơi bày những vết tích của vụ tai nạn."

# 【ハチロク】
# display as 八六
# JP: 「わたくしも、[ハチロクニイマル,3]8620も、\n双鉄様の所有物で、経営資源です。ですので当然――」
2250 = "「Cả tôi, và 8620,\nđều là tài sản của ngài Soutetsu, là tài\nnguyên kinh doanh. Vì vậy đương nhiên――」"

# 【双鉄】
# display as 雙鐵
# JP: 「故に、僕の望みに従う。\n物としてのお前たちの本懐がそれと、理解している」
2626 = "「Nên, em sẽ tuân theo mong muốn của tôi.\nAnh hiểu đó là tâm nguyện của các em với\ntư cách là một đồ vật.」"

# monologue
# JP: ならば、それでいいではないか。\n僕の理性はそう言っている。
1536 = "Nếu vậy, thì tốt quá rồi còn gì.\nLý trí của tôi đang nói như vậy."

# monologue
# JP: だが感情は――僕だけではない、\nハチロクにだって、存在するのだ。
2879 = "Nhưng cảm xúc thì――không chỉ riêng tôi,\nmà cả Hachiroku, cũng có."

# 【双鉄】
# display as 雙鐵
# JP: 「その上で問おう。\nお前は、修復前の\x%l8620;#00ffc040;8620%l;#;の公開を果たして、望むのか？」
2132 = "「Dựa trên điều đó, anh muốn hỏi.\nRốt cuộc em, có mong muốn công khai \\x%l8620;#00ffc040;8620%l;#;\ntrước khi phục hồi không?」"

# monologue
# JP: ……事故の傷跡。その深さ。\nある程度なら、僕にも共感できるつもりだ。
1545 = "……Vết sẹo của vụ tai nạn. Sự sâu sắc của\nnó.\nỞ một mức độ nào đó, tôi nghĩ mình có thể\nđồng cảm được."

# monologue
# JP: 公開が、ハチロクの傷をどうしようもなく抉るのならば、\nそれはかえって、復活を遠ざけることにしかならんだろう。
2942 = "Nếu việc công khai, đào xới vết thương của\nHachiroku một cách tàn nhẫn,\nthì điều đó ngược lại, sẽ chỉ làm cho sự\nphục sinh ngày càng xa vời."

# 【ハチロク】
# display as 八六
# JP: 「ですから……\nわたくしは、双鉄様の所有物として――」
2292 = "「Vì vậy……\nTôi, với tư cách là tài sản của ngài\nSoutetsu――」"

# 【双鉄】
# display as 雙鐵
# JP: 「物を超えた部分の。お前をお前たらしめる知性の。\nお前自身の――お前の望みはどうであるかと聞いている」
2251 = "「Anh đang hỏi về phần vượt lên trên một đồ\nvật. Về trí tuệ làm nên con người em.\nVề chính bản thân em――anh đang hỏi mong\nmuốn của em là gì.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、自身……\nわたくしの、望み――」
2279 = "「Bản thân, tôi……\nMong muốn, của tôi――」"

# monologue
# JP: 声が、震える。
3076 = "Giọng nói, run rẩy."

# monologue
# JP: それこそが、その迷いこそが\n物以上な部分、ハチロクな部分なのだと強く感じる。
3188 = "Chính điều đó, chính sự do dự đó\ntôi cảm nhận mạnh mẽ rằng đó là phần vượt\nlên trên đồ vật, là phần của Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「以前に、お尋ねいただいたときと――\n変わらぬことしか、まだわたくしには言えません」
2246 = "「Giống như lúc ngài hỏi tôi trước đây――\nTôi vẫn chỉ có thể nói những điều không\nthay đổi.」"

# monologue
# JP: 力なく、ハチロクはその唇から言葉を零す。
2920 = "Hachiroku yếu ớt thốt ra những lời từ đôi\nmôi."

# 【ハチロク】
# display as 八六
# JP: 「自分の望みが何であるのか……答える以前に、\n考えようとすることが――わたくしには難しいようです」
2278 = "「Mong muốn của mình là gì……trước khi trả\nlời,\nviệc cố gắng suy nghĩ――có vẻ như rất khó\nđối với tôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2577 = "「Vậy sao.」"

# monologue
# JP: 僕と同じだ。かつての僕と。\nそう直感する。
3192 = "Giống như tôi. Giống như tôi của quá khứ.\nTôi trực giác cảm thấy như vậy."

# monologue
# JP: かけがえの無い存在を、事故に巻き込んでしまった罪悪感。\nそれがあるゆえ、望むそのことが、恐ろしいのだ。
3108 = "Cảm giác tội lỗi vì đã cuốn những người\nkhông thể thay thế vào vụ tai nạn.\nChính vì có nó, nên việc mong muốn điều\nđó, mới thật đáng sợ."

# 【ハチロク】
# display as 八六
# JP: 「ですが、これだけはわかります。\n[ハチロクニイマル,3]8620の望みでしたら――わかります」
1962 = "「Nhưng, chỉ điều này là tôi hiểu.\nNếu là mong muốn của 8620――thì tôi hiểu.」"

# monologue
# JP: それでも、ハチロクは前を向く。
2895 = "Dù vậy, Hachiroku vẫn hướng về phía trước."

# 【ハチロク】
# display as 八六
# JP: 「あの子は、間違いなく望みます。\nどれほどの傷を晒そうと、どれほど苦痛を味わおうとも」
2159 = "「Đứa trẻ đó, chắc chắn sẽ mong muốn.\nDù có phải phơi bày bao nhiêu vết thương,\ndù có phải nếm trải bao nhiêu đau đớn đi\nchăng nữa.」"

# monologue
# JP: うつむいていた顔をあげ、とても静かに、言葉をつなぐ。
3062 = "Ngẩng khuôn mặt đang cúi gầm lên, thật\ntĩnh lặng, em ấy tiếp lời."

# 【ハチロク】
# display as 八六
# JP: 「\x%l客車;#00ffc040;客車%l;#;を引いて、もう一度――お客様とともに走ること。\nただそれだけを、必ず、あの子は望みます」
2317 = "「Kéo \\x%l客車;#00ffc040;toa hành khách%l;#;, một lần nữa――chạy\ncùng với hành khách.\nChỉ điều đó thôi, chắc chắn, đứa trẻ đó sẽ\nmong muốn.」"

# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3522 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch――）"

# monologue
# JP: 列車の音に揺られて、気づく。\nいつの間に、僕は眠ってしまっていたのだと。
3008 = "Lắc lư theo tiếng tàu chạy, tôi chợt nhận\nra.\nTừ lúc nào, tôi đã ngủ thiếp đi mất rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「ここしばらく、無理を重ねすぎてしまっていたか。\n思ったよりも、やるべきも、準備すべきも多すぎて」
2459 = "「Dạo gần đây, mình đã cố gắng quá sức rồi\nsao.\nNhững việc phải làm, những việc phải chuẩn\nbị, nhiều hơn mình nghĩ quá.」"

# 【路子】
# display as 路子
# JP: 「そーちゃん……」
2185 = "「Bé Sou……」"

# 【双鉄】
# display as 雙鐵
# JP: 「路子？」
2545 = "「Michiko?」"

# monologue
# JP: 少し震える、たよりない声。\nなぜだろう。路子はおびえているようだ。
3412 = "Giọng nói hơi run rẩy, yếu ớt.\nTại sao chứ. Michiko có vẻ đang sợ hãi."

# 【路子】
# display as 路子
# JP: 「あのきかんしゃ。人に見せるの？」
2606 = "「Chiếc đầu máy đó. Anh định cho mọi người\nxem sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2085 = "「A――」"

# monologue
# JP: 事故の傷。\n僕でさえ、僕らの事故を連想し、気分がひどく落ち込んだ。
2856 = "Vết thương của vụ tai nạn.\nNgay cả tôi, cũng liên tưởng đến vụ tai\nnạn của chúng tôi, và cảm thấy vô cùng tồi\ntệ."

# monologue
# JP: 路子にも、あるいはあの傷が、\n僕を通じて見えたのだろうか？
3460 = "Có lẽ Michiko cũng vậy,\nthông qua tôi, đã nhìn thấy những vết\nthương đó sao?"

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ。見せる」
1581 = "「……Ừm. Sẽ cho xem.」"

# monologue
# JP: 路子の怯えを、確かに感じる。\nけれど、事実をそのまま伝える。
3197 = "Tôi thực sự cảm nhận được sự sợ hãi của\nMichiko.\nNhưng, tôi vẫn truyền đạt sự thật như nó\nvốn có."

# monologue
# JP: 終着駅へ路子を届けるそのために、\n公開展示も、きっと必要となる行為であると思うから。
3330 = "Bởi vì để đưa Michiko đến ga cuối,\ntôi nghĩ việc trưng bày công khai, chắc\nchắn cũng là một hành động cần thiết."

# 【路子】
# display as 路子
# JP: 「きずは、こわいよ。あんなのみえたら、きっとみんな、てつどう事故のことをおもって、こわがるよ」
1989 = "「Vết thương, đáng sợ lắm. Nếu thấy những\nthứ như thế, chắc chắn mọi người, sẽ nhớ\nđến tai nạn đường sắt, và sẽ sợ hãi đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「心配してくれているのか」
1972 = "「Em đang lo lắng cho anh sao.」"

# 【路子】
# display as 路子
# JP: 「だってそーちゃん。そーしたいんでしょ？」
2125 = "「Bởi vì bé Sou. Anh muốn làm vậy mà đúng\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……優しいな。路子は」
1584 = "「……Michiko, thật tốt bụng.」"

# monologue
# JP: ――僕ひとりだけが大きくなってしまっても。
1515 = "――Cho dù chỉ có mình tôi lớn lên."

# monologue
# JP: あの頃のまま変わらない、とても小さなてのひらで、\nそれでも僕を、懸命に守ろうとしてくれる。
3082 = "Bằng bàn tay nhỏ bé không hề thay đổi từ\nhồi đó,\nem ấy vẫn đang, liều mạng cố gắng bảo vệ\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、そこは大丈夫。大丈夫になったんだ。\nやはり、議論になってしまってな」
1930 = "「Nhưng, chuyện đó thì không sao đâu. Đã\nkhông sao rồi.\nQuả nhiên là, đã xảy ra tranh luận mà.」"

# monologue
# JP: 赤井宮司が率直に意見してくれた。
3436 = "Cung tư tế Akai đã thẳng thắn đưa ra ý\nkiến."

# monologue
# JP: 事故の傷を見せつけることは、大廃線末期の鉄道不信――\nそれを想い出させてしまう結果を呼びかねないと。
3137 = "Rằng việc phơi bày vết thương của vụ tai\nnạn, có thể dẫn đến kết quả\ngợi nhớ lại sự mất lòng tin vào đường sắt\nthời kỳ cuối của Đại bãi bỏ tuyến."

# 【双鉄】
# display as 雙鐵
# JP: 「かといって、今は十分な修復をできる状況にもない。\nゆえ傷を、上手に隠して展示をすることとなった」
2617 = "「Mặc dù vậy, hiện tại cũng không có điều\nkiện để phục hồi đầy đủ.\nDo đó, chúng ta đã quyết định khéo léo che\ngiấu những vết thương để trưng bày.」"

# 【路子】
# display as 路子
# JP: 「じょうずにかくす？」
2204 = "「Khéo léo che giấu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。[てすう,1]手数は相当にかかったがな。\n今日で、なんとか形にできたかと思う」
2106 = "「Ừm. Mặc dù tốn khá nhiều công sức.\nNhưng hôm nay, anh nghĩ là đã tạm định\nhình được rồi.」"

# monologue
# JP: ――ダメージの無い機関士側に公開展示の導線を引き、\n傷の激しい助士側への一般客の立ち入りはご遠慮いただく。
1517 = "――Kéo dây hướng dẫn khách tham quan công\nkhai về phía ghế lái không bị hư hại,\nvà từ chối khách tham quan thông thường\nbước vào phía ghế phụ lái bị hư hỏng nặng."

# monologue
# JP: 日々姫と蓑笠老人によるカモフラージュも加えたゆえに、\n素人の目に8620は、『綺麗なSL』としか見えなくなった。
3280 = "Nhờ có thêm sự ngụy trang của Hibiki và\nông lão Minokasa,\ntrong mắt những người nghiệp dư, 8620 giờ\nchỉ còn là một 『SL tuyệt đẹp』."

# 【双鉄】
# display as 雙鐵
# JP: 「修復が必要なことなどは、パネル展示で説明する。\nお祭り気分の人たちに、傷を見せても仕方がないゆえ」
2623 = "「Những việc cần phục hồi, sẽ được giải\nthích trên bảng trưng bày.\nVì có cho những người đang có tâm trạng lễ\nhội xem vết thương cũng chẳng để làm gì.」"

# 【路子】
# display as 路子
# JP: 「しかたない、の？」
2399 = "「Chẳng để làm gì, sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、見てほしいのは、鉄道復活という希望だからな。\n大廃線の記憶のことは、興味あるものだけが見ればいい」
2401 = "「Ừ, bởi vì thứ anh muốn mọi người thấy, là\nhy vọng về sự phục sinh của đường sắt mà.\nCòn ký ức về Đại bãi bỏ tuyến, chỉ những\nai quan tâm thì xem là được.」"

# 【路子】
# display as 路子
# JP: 「……そーなんだ」
1586 = "「……Ra là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2633 = "「!?」"

# 【路子】
# display as 路子
# JP: 「じょうずにかくして、みえなくなったら。\n事故のこと――みんな、わすれちゃうんだ」
2203 = "「Nếu khéo léo che giấu, và không ai nhìn\nthấy nữa.\nChuyện về vụ tai nạn――mọi người, sẽ quên\nmất thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「路子――」
2540 = "「Michiko――」"

# monologue
# JP: 胸がざわつく。\n僕のうかつな一言が、路子を悲しい思いにさせた。
3388 = "Lồng ngực xôn xao.\nMột lời nói vô ý của tôi, đã khiến Michiko\ncảm thấy buồn bã."

# monologue
# JP: “忘れられてしまう”恐怖を、\n恐らく、路子に与えてしまった。
3182 = "Nỗi sợ hãi “bị lãng quên”,\ncó lẽ, tôi đã gieo rắc nó cho Michiko mất\nrồi."

# 【双鉄】
# display as 雙鐵
# JP: 「路子、それとこれとは――」
2544 = "「Michiko, chuyện đó và chuyện này là――」"

# monologue
# JP: 違うといいたい。否定したい。\nけれど、なにが違うのか説明できない。
3180 = "Tôi muốn nói là khác nhau. Tôi muốn phủ\nnhận.\nNhưng, tôi không thể giải thích được là\nkhác nhau ở chỗ nào."

# monologue
# JP: 大きくなにかが違うのだけれど、\n焦る頭は、言葉をうまく見つけ出せない。
2901 = "Có một sự khác biệt rất lớn, nhưng\nđầu óc đang rối bời, không thể tìm ra từ\nngữ thích hợp."

# 【路子】
# display as 路子
# JP: 「そー、ちゃん？」
2186 = "「Bé, Sou?」"

# monologue
# JP: 路子がゆらぐ。\n路子が見ている僕もおそらく、ゆらいでいよう。
3457 = "Michiko đang dao động.\nTôi trong mắt Michiko có lẽ cũng đang, dao\nđộng."

# monologue
# JP: 路子の不安な眼差しを、せめて笑顔に変えたくて――\n果たせないまま、僕は、目覚める。
3195 = "Ít nhất tôi muốn biến ánh mắt bất an của\nMichiko thành nụ cười――\nNhưng chưa kịp làm được điều đó, tôi đã,\ntỉnh giấc."

# 【凪】
# display as 凪
# JP: 「にーぎやっかばーーいっ！！」
2152 = "「Náo nhiệt quá đi thôiiii!!」"

# monologue
# JP: ――　8620復活準備展示会　――
1523 = "――　Triển lãm chuẩn bị phục hồi 8620　――"

# monologue
# JP: その会場、\nつまりは\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内に、明るい声がかぁんと響く。
3269 = "Tại hội trường đó,\ntức là bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;,\nmột giọng nói lanh lảnh vang lên."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが一番にぎやかだよぉ。\nね？　もう少し声、抑えよう？」
2375 = "「Nagi là ồn ào nhất đấy.\nNhé? Nhỏ giọng xuống một chút nào?」"

# 【凪】
# display as 凪
# JP: 「やにわにだごばい！　[ゆべし,2]柚餅子ばい！\nあ、かき氷も食べたかばいっ！」
2385 = "「Tự nhiên đói bụng quá! Yubeshi! (Bánh nếp\nyuzu)\nA, cũng muốn ăn cả đá bào nữa!」"

# monologue
# JP: 恥ずかしそうなふかみの制止を、凪は聞かない。\nまさしく文字通り、聞いてない。
3321 = "Nagi không nghe lời can ngăn đầy xấu hổ\ncủa Fukami.\nĐúng nghĩa đen là, không thèm nghe."

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;内部の出店を、\n次から次へ、覗きこんでははしゃいでいる。
3087 = "Cứ hết ngó vào gian hàng này đến gian hàng\nkhác bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;,\nvà đang rất phấn khích."

# 【凪】
# display as 凪
# JP: 「なに食べようか悩むばい！\nなやんだ時は全部いけってじいちゃん――がっ！？」
2023 = "「Đau đầu không biết nên ăn gì đây!\nÔng nội bảo lúc nào đau đầu thì cứ quất\nhết――hả!?」"

# monologue
# JP: ぴたりと止まる。\n動きが、声が。
2973 = "Khựng lại.\nCả hành động, lẫn giọng nói."

# monologue
# JP: そうして凪の視線は上ヘ、上へ上へとゆっくり動く。
3220 = "Và rồi ánh mắt Nagi từ từ di chuyển lên\ntrên, lên trên, lên trên nữa."

# 【凪】
# display as 凪
# JP: 「……でっかかぁ～」
1583 = "「……To quá~」"

# 【ふかみ】
# display as 深美
# JP: 「うん、おっきいよね」
2111 = "「Ừm, to thật đấy nhỉ.」"

# monologue
# JP: 対象が予想以上に大きすぎ、\n接近するまで、それと気づけなかったのだろうか。
3040 = "Đối tượng quá to lớn so với tưởng tượng,\ncó lẽ phải đến gần, mới nhận ra được điều\nđó."

# monologue
# JP: 凪はぽかんと口を開け、\nすがるような目で僕らの方へと振り返る。
2965 = "Nagi há hốc miệng,\nquay lại nhìn về phía chúng tôi với ánh\nmắt như cầu cứu."

# 【凪】
# display as 凪
# JP: 「これが、今日見に来た汽車ぽっぽばい？」
1946 = "「Đây là, chiếc xe lửa xình xịch hôm nay\nchúng ta đến xem sao?」"

# 【ふかみ】
# display as 深美
# JP: 「そうだよ。ＳＬ。\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の、はちろく――にい、まる？」
2175 = "「Đúng vậy đó. SL.\n\\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;, Hachiroku――ni, maru?」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1569 = "「…………」" 

# monologue
# JP: 僕の傍ら、ハチロクは口を閉ざしている。
2908 = "Bên cạnh tôi, Hachiroku đang im lặng."

# monologue
# JP: だから代わりに、普段のハチロクがするように、\n自信満々、芝居気たっぷりに声を張る。
3209 = "Vì vậy thay vào đó, giống như Hachiroku\nthường làm,\ntôi cất giọng đầy tự tin và đậm chất kịch."

# 【双鉄】
# display as 雙鐵
# JP: 「そう、これこそが国産蒸気第一号。\n栄光の[ハチロク,3]8620形トップナンバー機、[ハチロクニイマル,3]8620だ」
2403 = "「Đúng vậy, đây chính là chiếc máy hơi nước\nquốc sản đầu tiên.\nCỗ máy chuyên dụng số hiệu đầu tiên đầy\nvinh quang của dòng 8620, 8620.」"

# 【凪】
# display as 凪
# JP: 「トップナンバー！　言葉の意味はわからんばってん、\nなんだかすごく、すごかたいっ！！」
2628 = "「Số hiệu đầu tiên! Dù không hiểu ý nghĩa\ncủa từ đó,\nnhưng cảm giác rất là, rất là tuyệt vời!!」"

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「なになに凪ちゃん、どぎゃんしたと？」
1942 = "「Gì vậy gì vậy Nagi, sao thế?」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「機関車見とるの？　おっきかよね、これ」
2129 = "「Đang xem đầu máy sao? To thật đấy nhỉ,\ncái này.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁ」
# 2089 = "「啊」" 

# monologue
# JP: ふかみの背中がみるみる丸まり、\n僕の後ろへと隠れてしまう。
3319 = "Lưng Fukami nhanh chóng cong lại,\nvà trốn ra phía sau tôi."

# monologue
# JP: 凪は気づいてか気づかぬままか、\n学園生たちの方へと近づきエヘンと胸を張る。
2850 = "Nagi không biết là có nhận ra hay không,\ntiến lại gần đám học sinh và ưỡn ngực tự\nhào."

# 【凪】
# display as 凪
# JP: 「ただの機関車じゃなかとよ？　栄光のトップナンバー、\nこれぞハチロクニイマルたいっ！」
2573 = "「Không phải là đầu máy bình thường đâu\nnhé? Số hiệu đầu tiên đầy vinh quang,\nđây chính là Hachirokuniimaru đó!」"

# monologue
# JP: 見事なまでの受け売りだ。\n僕が張りあげた声よりも、よほど威勢が増している。
3346 = "Học mót một cách xuất sắc.\nCòn hùng hồn hơn cả giọng nói tôi vừa cất\nlên."

# monologue
# JP: いわば受け売りのたたき売り――\nその勢いに、学友と思しき少女たちは感染する。
3337 = "Có thể nói là bán rẻ kiến thức học mót――\nVới khí thế đó, những thiếu nữ có vẻ là\nbạn học cũng bị lây nhiễm."

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「なにそれなにそれ、なんかすごそお！」
2496 = "「Gì vậy gì vậy, nghe có vẻ tuyệt quá!」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「トップナンバーって、いったいなんね！？」
1944 = "「Số hiệu đầu tiên, rốt cuộc là cái gì\nvậy!?」"

# 【凪】
# display as 凪
# JP: 「それは――それは！\nふかみちゃんが説明するばいっ！」
2627 = "「Cái đó――cái đó!\nFukami sẽ giải thích cho!」"

# monologue
# JP: 瞬間、ふかみが凍りつく。
3316 = "Khoảnh khắc đó, Fukami cứng đờ người."

# 【ふかみ】
# display as 深美
# JP: 「ぇ――わ、わたし――とか、無理」
2061 = "「Hả――mi, mình――sao, không làm được đâu.」"

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「早瀬さんが説明～？」
2337 = "「Bạn Hayase giải thích sao~?」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「なんでなんで？　凪ちゃんやって～」
2177 = "「Sao vậy sao vậy? Nagi làm đi~」"

# monologue
# JP: ふかみがますます小さくなる。\n声もほとんど、消え入らんばかりだ。
3313 = "Fukami càng lúc càng thu mình lại.\nGiọng nói cũng gần như, sắp tắt lịm."

# monologue
# JP: 学園でのふかみの姿は、きっといつでもこうなのだろう。\nが――であるのならば、こここそふかみの頑張りどころだ。
3305 = "Hình ảnh của Fukami ở trường, chắc chắn\nlúc nào cũng như thế này.\nNhưng――nếu vậy, đây chính là lúc Fukami\nphải cố gắng."

# 【双鉄】
# display as 雙鐵
# JP: 「いいのか？　ふかみ。\n見捨てれば、凪が困るぞ」
2581 = "「Có ổn không? Fukami.\nNếu em bỏ mặc, Nagi sẽ gặp rắc rối đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「ぅっ」
2100 = "「Ư」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のことを凪はもとより、説明できない。\n展示会場内ではずっと、ハチロクは無言のままでいる。
2968 = "Về 8620 thì Nagi vốn dĩ đã không thể giải\nthích được rồi.\nBên trong hội trường trưng bày, Hachiroku\nvẫn luôn giữ im lặng."

# monologue
# JP: ポーレットとれいなは出ているし、\n日々姫は日々姫で、自分の役割を全うしている。
3290 = "Paulette và Reina thì đang ở ngoài,\ncòn Hibiki thì đang hoàn thành trọn vẹn\nvai trò của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。落ち着け。\n落ち着いて――『商売のことだけを考えろ』」
2425 = "「Fukami. Bình tĩnh lại.\nBình tĩnh lại――『Chỉ nghĩ đến chuyện kinh\ndoanh thôi』.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁっ」
# 2089 = "「啊」" 

# monologue
# JP: 一度、伝えてある言葉。\n一度はふかみも受け入れたこと。
3472 = "Những lời đã từng truyền đạt một lần.\nMột lần Fukami cũng đã tiếp nhận."

# monologue
# JP: それをもう一度繰り返す。
3336 = "Tôi lặp lại điều đó một lần nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「これも、接客で宣伝だ。\n学園生が客に来たならお前はどうする。逃げるのか？」
2576 = "「Đây cũng là, tiếp khách để quảng cáo đấy.\nNếu học sinh đến làm khách thì em sẽ làm\ngì. Bỏ chạy sao?」"

# 【ふかみ】
# display as 深美
# JP: 「に、に――にげない。です」
1904 = "「Kh, kh――không bỏ chạy. Ạ.」"

# monologue
# JP: きゅっと。拳がにぎられる。
3064 = "Nắm chặt. Nắm đấm siết lại."

# 【ふかみ】
# display as 深美
# JP: 「お、おうちのことだけ。お母さんのことだけ。\nお仕事のこと――クマ川くだりを、つぶさない、ため」
2428 = "「Ch, chỉ vì chuyện của nhà thôi. Chỉ vì\nchuyện của mẹ thôi.\nChuyện công việc――để không làm sập, thuyền\nxuôi dòng Kuma.」"

# monologue
# JP: ごくり、ツバを飲み込む音。
3303 = "Ực, tiếng nuốt nước bọt."

# monologue
# JP: ふかみが、僕の背中から出る。
3060 = "Fukami, bước ra khỏi lưng tôi."

# 【ふかみ】
# display as 深美
# JP: 「あのっ！」
2284 = "「À này!」"

# monologue
# JP: 震える一歩――\nけれどもとても、大きな一歩で。
3085 = "Một bước chân run rẩy――\nNhưng lại là một bước tiến rất, rất lớn."

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「えっ！？」
2071 = "「Hả!?」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「早瀬……さん？」
2336 = "「Bạn Hayase……?」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、あの、そんなに凄くはくわしくないけど。\n\x%l8620;#00ffc040;8620%l;#;の展示会、企画から、ええと、かかわってる、から」
2597 = "「Mình cũng, à ừm, không rành lắm đâu.\nVì mình tham gia, ừm, từ lúc lên kế hoạch,\ntriển lãm 8620, nên là.」"

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「え？　なんね、企画からって」
2074 = "「Hả? Cái gì cơ, từ lúc lên kế hoạch á.」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「展示会ってさ。これ、そもそも何のお祭と？」
2199 = "「Triển lãm á. Cái này, rốt cuộc là lễ hội\ngì vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「う、うん。あの、ね？」
2063 = "「Ư, ừm. À, ừm, các cậu biết không?」"

# monologue
# JP: ……真っ赤な顔から、一言絞り出す度に、\nふかみの背筋が伸びていく。
1551 = "……Từ khuôn mặt đỏ bừng, mỗi khi nặn ra\nđược một lời,\nlưng Fukami lại thẳng lên một chút."

# monologue
# JP: 凪も見ている。嬉しげに。\nこれなら、ふかみは大丈夫だろう。
2967 = "Nagi cũng đang nhìn. Trông rất vui vẻ.\nThế này thì, Fukami chắc sẽ ổn thôi."

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、ここにおったとですか。双鉄君」
2093 = "「A, cậu ở đây sao. Cậu Soutetsu.」"

# monologue
# JP: 落ち着いた声。\nけれども、少しだけ浮き立つような。
2871 = "Giọng nói điềm tĩnh.\nNhưng, có vẻ hơi phấn khích một chút."

# monologue
# JP: 蓑笠老人が、\n“好々爺”という文字そのままに、立っている。
3410 = "Ông lão Minokasa,\nđang đứng đó, đúng với cụm từ “ông lão\nhiền hậu”."

# 【双鉄】
# display as 雙鐵
# JP: 「これは、蓑笠さん。\nお運び、ありがとうございます」
2366 = "「Đây là, ông Minokasa.\nCảm ơn ông đã cất công đến đây.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「いえいえ」
1924 = "「Không có gì không có gì.」"

# monologue
# JP: 蓑笠老人は柔和に微笑み、\nぐるりと大きくあたりを見渡す。
3400 = "Ông lão Minokasa mỉm cười hiền hòa,\nvà đưa mắt nhìn bao quát xung quanh một\nvòng lớn."

# 【蓑笠】
# display as 蓑笠
# JP: 「先だってのお会合には行かれんでしたが、\n今日はなんとか、時間ば作って寄らせてもらいました」
2025 = "「Lần họp mặt trước tôi không đi được,\nnhưng hôm nay tôi đã cố gắng, sắp xếp thời\ngian để ghé qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見ていただけて光栄です。\nと、いっても\x%l8620;#00ffc040;8620%l;#;のことは既に」
2226 = "「Thật vinh hạnh khi được ông đến xem.\nTuy nói vậy, nhưng chuyện về \\x%l8620;#00ffc040;8620%l;#; thì ông\nđã」"

# 【蓑笠】
# display as 蓑笠
# JP: 「何度か見せてもろうとりますがの。\n人の中におるとやはり、違ぉて見えるもんですなぁ」
2463 = "「Tôi đã được xem vài lần rồi mà.\nNhưng khi đứng giữa đám đông thì quả\nnhiên, nhìn cũng thấy khác hẳn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当にそうですね」
2357 = "「A, đúng là như vậy thật.」"

# monologue
# JP: １００人――いや、２００人はいるだろうか。
3526 = "100 người――không, có lẽ phải đến 200\nngười."

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;は人と声とで埋め尽くされ、\n\x%l8620;#00ffc040;8620%l;#;がその中心になっている。
96 = "\\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; tràn ngập người và\ntiếng nói,\n\\x%l8620;#00ffc040;8620%l;#; đang trở thành trung tâm của nơi này."

# 【蓑笠】
# display as 蓑笠
# JP: 「人の中におるとこうして見るとですなぁ。\n走らせてやりたいいう気に、ワシなんぞでもなりますな」
2127 = "「Đứng giữa đám đông mà nhìn thế này nhỉ.\nNgay cả lão già như tôi, cũng có cảm giác\nmuốn cho nó chạy lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お気持ち、大変に心強いです。\nいえ、お気持ちどころの話ではありませんが」
2222 = "「Tấm lòng của ông, thật sự rất đáng quý.\nKhông, không chỉ dừng lại ở tấm lòng đâu\nạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「なんもなんも、ワシなんぞ」
2291 = "「Không có gì không có gì, lão già như\ntôi.」"

# monologue
# JP: 蓑笠老人は謙遜するが、今の時点で、\nその貢献度は間違いなく極めて大だ。
3495 = "Ông lão Minokasa khiêm tốn, nhưng tính đến\nthời điểm hiện tại,\nmức độ cống hiến của ông ấy chắc chắn là\ncực kỳ lớn."

# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;まわりの修復の目処を完全に立ててもらった上、\n蒸気焼酎関連を含め、どれほどの紹介をして貰えたか――
3022 = "Không chỉ giúp hoàn toàn định hướng cho\nviệc phục hồi khu vực \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;,\nmà ông ấy còn giới thiệu cho chúng tôi\nbiết bao nhiêu người, bao gồm cả những\nviệc liên quan đến Shochu Hơi Nước――"

# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄君の働きに刺激されて、\nこの年寄りも少し張り切っただけとですよ」
2290 = "「Bị kích thích bởi sự nỗ lực của cậu\nSoutetsu,\nlão già này cũng chỉ cố gắng thêm một chút\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕なぞ、皆の足をひっぱるばかりで」
2276 = "「Cháu á, chỉ toàn kéo chân mọi người\nthôi.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「いやご謙遜。ボイラ屋の[はた]秦さんがほめとりましたですよ。\n双鉄君ば、後継ぎにしたいくらいの熱心さやいうて」
1977 = "「Không, cậu khiêm tốn quá. Anh Hata thợ\nsửa lò hơi đã khen ngợi cậu đấy.\nBảo là cậu Soutetsu, nhiệt tình đến mức\nanh ấy muốn nhận làm người kế vị luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「過分なお褒めのお言葉ですが――\nとても嬉しく感じます」
2587 = "「Đó là những lời khen ngợi quá lời rồi――\nNhưng cháu cảm thấy rất vui.」"

# monologue
# JP: 実際に、ボイラのことは死ぬ気で学んだ。頑張った。\n\x%l8620;#00ffc040;8620%l;#;――\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の心臓を少しでも深く、理解したくて。
3110 = "Thực tế, tôi đã học về lò hơi với quyết\ntâm muốn chết. Tôi đã rất cố gắng.\n\\x%l8620;#00ffc040;8620%l;#;――Vì tôi muốn hiểu sâu hơn, dù chỉ một\nchút, về trái tim của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;."

# 【蓑笠】
# display as 蓑笠
# JP: 「蒸気焼酎も、試作段階でこの旨さとですし。\nいやいや、石炭ボイラもなかなかに良かもんですなぁ」
2507 = "「Shochu Hơi Nước, mới ở giai đoạn thử\nnghiệm mà đã ngon thế này rồi.\nChà chà, lò hơi than cũng khá là tốt đấy\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
1920 = "「Cháu thật ngại quá.」"

# monologue
# JP: ああ、今日はいつになく能弁だと思ったが、\nすでに一杯、きこしめしてらっしゃったのか。
3264 = "À, tôi cứ nghĩ hôm nay ông ấy nói nhiều\nhơn thường lệ,\nra là ông ấy đã nhâm nhi một ly rồi sao."

# monologue
# JP: 炉の火に焼けていらっしゃるから、\nお顔が赤いのに気付かなかった。
3019 = "Vì ông ấy bị cháy nắng bởi ngọn lửa lò,\nnên tôi đã không nhận ra khuôn mặt ông ấy\nđang đỏ lên."

# 【蓑笠】
# display as 蓑笠
# JP: 「そういや、市長さんはどこにいらっしゃいますかな。\n一言、ご挨拶ばしたかとですが」
2173 = "「Nói mới nhớ, thị trưởng đang ở đâu vậy\nnhỉ.\nTôi muốn đến chào hỏi một câu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今日は、臨時増発を出しているんです。\n[ゆのい,1]湯医からも、この見学会への参加希望者が多いそうで」
2143 = "「Hôm nay, cô ấy đang chạy thêm chuyến tăng\ncường.\nNghe nói từ Yunoi, cũng có rất nhiều người\nmuốn tham gia buổi tham quan này.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;の運転とですか。\n市長さんも、まっことお忙しかですなぁ」
2578 = "「À, là lái \\x%l気動車;#00ffc040;toa xe tự hành%l;#; sao.\nThị trưởng, quả thật là rất bận rộn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「本当ですね」
# 2473 = "「確實」" 

# monologue
# JP: 乗務中の姿があまりに楽しげでうっかりしたが\nなるほど、確かにポーレットは働き詰めだ。
3057 = "Vì dáng vẻ khi làm nhiệm vụ của cô ấy quá\nvui vẻ nên tôi đã vô ý không để tâm,\nnhưng quả thực, Paulette đang làm việc\nkhông ngừng nghỉ."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の修復・稼働を果たせれば、\n負担をいくらか、僕とハチロクとで請け負えるのだが――
91 = "Nếu có thể hoàn thành việc phục hồi và vận\nhành \\x%l8620;#00ffc040;8620%l;#;,\ntôi và Hachiroku có thể gánh vác phần nào\ngánh nặng đó, nhưng mà――"

# 【凪】
# display as 凪
# JP: 「じいちゃん！　ラムネ！　ラムネ買うて、四本！！」
2437 = "「Ông nội! Ramune! Mua Ramune đi, bốn\nchai!!」"

# monologue
# JP: 人混みをするり抜けるやいなや、\n凪が蓑笠老人の手を取り同時に、ぐいぐい引っ張る。
3140 = "Ngay khi vừa lách qua đám đông,\nNagi nắm lấy tay ông lão Minokasa và đồng\nthời, kéo mạnh."

# 【蓑笠】
# display as 蓑笠
# JP: 「おうおうよかばい、ラムネば、どこで売っとーと？」
2510 = "「Được rồi được rồi, Ramune à, bán ở đâu\nthế?」"

# 【凪】
# display as 凪
# JP: 「焼酎屋さんの出店ばい！\n蒸気ラムネっていうが美味しかって聞いたばい！」
2434 = "「Gian hàng của tiệm rượu ấy!\nNghe nói Ramune Hơi Nước ngon lắm!」"

# 【蓑笠】
# display as 蓑笠
# JP: 「よかよか」
2150 = "「Được rồi được rồi.」"

# monologue
# JP: 軽い会釈を一つ残して、\n凪に引かれて、蓑笠老人は\x%l石造機関庫;#00ffc040;石造機関庫%l;#;の奥へと消える。
3401 = "Chỉ để lại một cái gật đầu chào nhẹ,\nbị Nagi kéo đi, ông lão Minokasa biến mất\nvào sâu bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;."

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「で？　早瀬さん。\nその双鉄おにいさんって、あん人ばい？」
2285 = "「Thế? Bạn Hayase.\nCái anh Soutetsu đó, là người đó sao?」"

# 【ふかみ】
# display as 深美
# JP: 「ぅ……ぅん」
2103 = "「Ư……ừm.」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「そっか～そうなんだ～、だったら、納得。\n大納得ばい！」
2580 = "「Vậy sao~ ra là vậy~, nếu thế thì, hiểu\nrồi.\nHoàn toàn hiểu rồi!」"

# monologue
# JP: ふかみだ。さきほどの学園生達と。\n僕の方をちらちら見ながら、凪の背中を追いかけていく。
3302 = "Là Fukami. Cùng với đám học sinh lúc nãy.\nVừa liếc nhìn về phía tôi, vừa đuổi theo\nbóng lưng của Nagi."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ラムネ四本か」
2304 = "「Ra là vậy, bốn chai Ramune sao.」"

# monologue
# JP: これならば、良い。\n四本のうちの一本を、さぞやふかみは美味しく飲もう。
3484 = "Nếu vậy thì, tốt rồi.\nMột trong bốn chai đó, chắc chắn Fukami sẽ\nuống rất ngon lành."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
2620 = "「Ngài Soutetsu!?」"

# monologue
# JP: （どんっ）
3520 = "（Bịch）"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと。\nすみません、よそ見をしてしまって」
2117 = "「Ôi chà.\nXin lỗi, tôi mải nhìn đi chỗ khác.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、こちらこそ撮影に――おや、双鉄君」
2397 = "「Không không, tôi cũng mải chụp ảnh――ô\nkìa, cậu Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「これはこれは、\n赤井宮司に足をお運びいただけるとは、光栄です」
2069 = "「Ái chà ái chà,\nĐược cung tư tế Akai cất công đến đây,\nthật là vinh hạnh.」"

# monologue
# JP: 手にカメラ。
2869 = "Máy ảnh trên tay."

# monologue
# JP: やはりこの人の鉄道好きも、\n単なる仕事を、大きく越えているようだ。
3274 = "Quả nhiên niềm yêu thích đường sắt của\nngười này,\ncũng đã vượt xa một công việc đơn thuần."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「来ますとも。\x%l石造機関庫;#00ffc040;石造機関庫%l;#;の内部を、\nこれほどにじっくり見られる機会は希少ですから」
2271 = "「Tất nhiên là tôi phải đến rồi. Bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;\n,\ncơ hội được nhìn ngắm kỹ lưỡng thế này là\nrất hiếm có.」"

# monologue
# JP: 言いながら、ぱしゃり。\n何故か天井、それから柱――
3015 = "Vừa nói, tách.\nKhông hiểu sao lại chụp trần nhà, rồi đến\ncột――"

# monologue
# JP: 全てを記録しようかとでもしているのか、\n赤井宮司は機関庫内の細部の写真を次々と撮る。
3433 = "Cứ như thể đang định ghi lại tất cả mọi\nthứ,\ncung tư tế Akai liên tục chụp ảnh các chi\ntiết bên trong xưởng đầu máy."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;は撮らんのですか？」
1916 = "「Ngài không chụp \\x%l8620;#00ffc040;8620%l;#; sao?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「真っ先にですよ。３００カットは撮りましたか」
1903 = "「Tôi đã chụp đầu tiên rồi. Chắc cũng phải\n300 kiểu rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはすごい」
2465 = "「Thật là ấn tượng.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、普通のことです――というか、\n双鉄君は、カメラをやらないのですか？」
1908 = "「Không không, chuyện bình thường thôi――mà\nnày,\ncậu Soutetsu, không chơi máy ảnh sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、全く」
2355 = "「Vâng, hoàn toàn không.」"

# monologue
# JP: 写真を撮る。\n記録を、記憶を、あるいは記念を形に残す。
3216 = "Chụp ảnh.\nLưu giữ kỷ lục, ký ức, hoặc kỷ niệm thành\nhình hài."

# monologue
# JP: そうしたことに興味があまり持てないのは……\nああ、そうか。事故の後からか。
3174 = "Lý do tôi không có hứng thú với những việc\nnhư vậy là……\nÀ, ra là vậy. Là từ sau vụ tai nạn sao."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それはいけない。\x%l機関士;#00ffc040;機関士%l;#;になるのでしたら、\nカメラに慣れておいたほうがいい」
2574 = "「Thế này không được rồi. Nếu cậu định trở\nthành \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;,\nthì nên làm quen với máy ảnh từ sớm đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほど、理屈ですね」
2094 = "「A. Ra là vậy, cũng có lý.」"

# monologue
# JP: それが何故かを即時に理解出来る程度には、\nハチロクによる\x%l機関士;#00ffc040;機関士%l;#;教育も身についてきている。
2911 = "Ở mức độ có thể hiểu ngay lập tức lý do\ntại sao,\nsự giáo dục \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; của Hachiroku\ncũng đã ngấm vào người tôi."

# monologue
# JP: もっとも……\x%l8620;#00ffc040;8620%l;#;発見の後のハチロクは、\n教師役にも、いまひとつ身が入らんようだが。
2841 = "Tuy nhiên…… sau khi phát hiện ra \\x%l8620;#00ffc040;8620%l;#;,\nHachiroku\ncó vẻ không còn chú tâm vào vai trò giáo\nviên cho lắm."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「\x%l電車;#00ffc040;電車%l;#;であれ、機関車であれ、経験でしか運転できない。\n周辺状況の記録は、習熟訓練段階では非常に効果的です」
1926 = "「Dù là \\x%l電車;#00ffc040;tàu điện%l;#; hay đầu máy, đều chỉ có\nthể lái bằng kinh nghiệm.\nViệc ghi chép tình hình xung quanh rất có\nhiệu quả trong giai đoạn huấn luyện làm\nquen.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2228 = "「Vâng ạ.」"

# monologue
# JP: それも習った。\x%l列車;#00ffc040;列車%l;#;には、極めて大きな慣性が働く。\n\x%l列車;#00ffc040;列車%l;#;重量、速度、線路状況等にもよるが――
3473 = "Tôi cũng đã học điều đó. Một lực quán tính\ncực lớn sẽ tác động lên \\x%l列車;#00ffc040;tàu%l;#;.\nDù còn tùy thuộc vào trọng lượng \\x%l列車;#00ffc040;tàu%l;#;, tốc\nđộ, tình trạng đường ray, v.v.——"

# monologue
# JP: 最大\x%l制動;#00ffc040;制動%l;#;の\x%l非常;#00ffc040;非常%l;\x%lブレーキ;#;#00ffc040;ブレーキ%l;#;をかけてもなお、\n一キロ以上止まれないこともあるとのことだ。ゆえ。
3129 = "Dù có dùng \\x%l非常;#00ffc040;phanh khẩn cấp%l;#;\\x%lブレーキ;#;#00ffc040;phanh%l;#;\nđể \\x%l制動;#00ffc040;hãm phanh%l;#; tối đa đi nữa,\ncũng có khi chạy hơn một cây số mới dừng\nlại được. Do đó."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置、加速減速のポイント等を、実際に目で\n見て学び、体で覚えこむことが全て、だからですよね」
2522 = "「Vị trí \\x%lブレーキ;#00ffc040;phanh%l;#;, các điểm tăng giảm tốc,\nv.v. đều phải học bằng cách\ntận mắt nhìn thấy và ghi nhớ bằng cơ thể,\nlà vì vậy đúng không ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そのとおりです」
2402 = "「Đúng là như vậy.」"

# monologue
# JP: 赤井宮司が満足そうに頷いてくれる。\n周辺記録の必要性は、僕にも大いに理解できた。
3445 = "Thầy Akai gật đầu vẻ hài lòng.\nTôi cũng đã rất hiểu tầm quan trọng của\nviệc ghi chép tình hình xung quanh."

# monologue
# JP: しかし、カメラか――\n修復費用のこともある。出費はできるだけ避けたいのだが。
3002 = "Nhưng mà, máy ảnh sao——\nCòn cả chi phí sửa chữa nữa. Tôi muốn\ntránh phát sinh thêm chi phí hết mức có\nthể."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「前市長の[ひない,1]雛衣さん。\nポーレットさんのお父様は、正真正銘の[と]撮り[テツ]鉄でした」
2415 = "「Ngài Hinai, cựu thị trưởng.\nCha của cô Paulette là một Tori-tetsu chân\nchính đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2359 = "「Ra là vậy.」"

# monologue
# JP: 写真展示云々のとき、れいなが言っていた“パパさん”は\nポーレットのパパ――前市長のことだったのか。
2986 = "\"Chú\" mà Reina nhắc đến lúc bàn về việc\ntrưng bày ảnh\nlà cha của Paulette——cựu thị trưởng sao."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ポーレットさんは、\x%l乗り鉄;#00ffc040;乗り鉄%l;#;の\x%l車両鉄;#00ffc040;[シャリョウテツ,2]車両鉄%l;#;ですからね。\n殆どカメラは使わず、そのまま眠らせているようです」
2492 = "「Cô Paulette là một Sharyo-tetsu thuộc\nphái \\x%l乗り鉄;#00ffc040;người thích đi tàu%l;#; mà.\nCô ấy hầu như không dùng máy ảnh, có vẻ cứ\nđể nó nằm im lìm như vậy thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、いちど相談してみます。\nご助言、本当にありがとうございます」
2604 = "「Nếu vậy, tôi sẽ thử bàn với cô ấy một lần\nxem sao.\nThực sự cảm ơn thầy vì lời khuyên.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いささか、話しすぎました。\n趣味のことでは、どうにも口が軽くなります」
2273 = "「Tôi hơi lỡ lời quá rồi.\nCứ nhắc đến sở thích là cái miệng lại\nkhông kìm lại được.」"

# monologue
# JP: “答えを押し付けたつもりでは無い”。
1531 = "\"Tôi không có ý định áp đặt câu trả lời\nđâu\"."

# monologue
# JP: いわんばかりに指先でつくったＸの字を口の前にあて、\n赤井宮司は僕らの前から去っていく。
3435 = "Thầy Akai đưa ngón tay tạo thành hình chữ\nX trước miệng như muốn nói vậy,\nrồi quay lưng rời đi."

# monologue
# JP: （カシャ――カシャっ）
3524 = "（Tách——tách）"

# monologue
# JP: ……今度は、古びた備品と壁か。\nカメラというのも、なかなかに業が深そうだ。と！
1549 = "……Lần này lại chụp thiết bị cũ kỹ và bức\ntường sao.\nMáy ảnh quả thực là một sở thích khá sâu\nsắc. Á!"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2332 = "「Hibiki!」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　にいさ――にぃに――兄さん」
2090 = "「A! Anh tra——anh hai——anh trai.」"

# monologue
# JP: よほどテンションがあがっているのか、\n僕の呼称で日々姫は何度も行き来する。
3247 = "Chắc là do đang phấn khích quá mức hay\nsao,\nmà Hibiki cứ lúng túng thay đổi cách gọi\ntôi liên tục."

# 【コン】
# display as 野狗？
# JP: 「ケンっ！」
2057 = "「Ẳng!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、コン。お前も日々姫と一緒だったか」
2365 = "「Ồ, Kon. Mày cũng đi cùng Hibiki à.」"

# 【日々姫】
# display as 日日姬
# JP: 「私が、このコと一緒なんです」
2248 = "「Em đang đi cùng bé này ạ.」"

# monologue
# JP: 日々姫は優しくしゃがみこみ、\n駅長服を着込んだ毛玉をつかまえる。
3252 = "Hibiki nhẹ nhàng ngồi xổm xuống,\nôm lấy cục bông đang mặc bộ đồng phục\ntrưởng ga."

# 【双鉄】
# display as 雙鐵
# JP: 「ほほう、極めて似合っているな。\nなかなか立派な駅長犬だ」
2480 = "「Hô hô, hợp lắm đấy chứ.\nRa dáng một chú chó trưởng ga phết.」"

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 

# 【日々姫】
# display as 日日姬
# JP: 「違いますよ、兄さん。\nコンは、キツネ。ですから駅長キツネです」
1914 = "「Không phải đâu anh trai.\nKon là cáo. Nên phải là cáo trưởng ga\nchứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、そうだったな」
2171 = "「À, ra là vậy.」"

# monologue
# JP: 駅長にする準備といって、\nポーレット自らが採寸をしてミシンで作った駅長服。
3292 = "Paulette bảo là để chuẩn bị cho chức\ntrưởng ga,\ncô ấy đã tự tay đo kích thước và dùng máy\nkhâu may bộ đồng phục này."

# monologue
# JP: その間に確認された各種身体特徴により、\n“このコはキツネ。名前はコン”と、確定したのだ。
3033 = "Nhờ xác nhận các đặc điểm cơ thể trong quá\ntrình đó,\nmà đã chắc chắn được rằng \"Bé này là cáo.\nTên là Kon\"."

# 【双鉄】
# display as 雙鐵
# JP: 「そのキツネであるコンが主で、\n人間様のお前が従か？」
2584 = "「Chú cáo Kon đó đóng vai chính,\ncòn con người là em đóng vai phụ sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そりゃそうばい。\n駅長様と、やとわれイラストレイターやけん」
2451 = "「Tất nhiên rồi ạ.\nNgài trưởng ga và cô họa sĩ làm thuê mà.」"

# monologue
# JP: ふざけて言って少し笑って、\n日々姫はコンを床へと下ろす。
3254 = "Hibiki nói đùa rồi khẽ cười,\nđặt Kon xuống sàn."

# 【日々姫】
# display as 日日姬
# JP: 「本当は、賑やかすぎてコンが全然落ち着かなくて。\nですから、散歩を少しさせようと出てきただけです」
2009 = "「Thật ra là do ồn ào quá nên Kon hoàn toàn\nkhông thể bình tĩnh được.\nThế nên em mới đưa bé ra ngoài đi dạo một\nchút thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、レールショップの出店の番は――っと！？」
2608 = "「Nếu vậy, quầy hàng của cửa hàng đường sắt\nai trông——á!?」"

# monologue
# JP: 少し慌てて時計を見る。\n日々姫がすぐに、クスっと笑う。
3201 = "Tôi hơi luống cuống nhìn đồng hồ.\nHibiki lập tức cười khúc khích."

# 【日々姫】
# display as 日日姬
# JP: 「兄さんたちの自由時間は、まだ一時間以上ありますよ？\nいまは、ふかみちゃんに交代してもらってるんです」
1968 = "「Thời gian tự do của bọn anh vẫn còn hơn\nmột tiếng nữa mà?\nHiện tại, em đang nhờ bé Fukami đổi ca\ntrông giúp rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみに？」
2427 = "「Fukami sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「すっごくにこにこしてるのに、なんかぐったり疲れてて。\n『よかったらしばらく店番させてください。です』って」
2450 = "「Dù cười rất tươi nhưng trông em ấy có vẻ\nmệt mỏi rã rời.\nEm ấy bảo 『Nếu được thì xin hãy để em\ntrông quán một lúc ạ. Vâng』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。かなり頑張ったのだな」
2033 = "「Ra là vậy. Em ấy đã rất cố gắng nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「がんばった？　って、きゃっ！？」
2029 = "「Đã cố gắng? Á, á!?」"

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 

# monologue
# JP: 立ち話を待っているのに飽きたのか、\nコンが引き綱をグイグイとやる。
3366 = "Chắc là chán việc phải chờ đợi chúng tôi\nđứng nói chuyện,\nKon cứ kéo giật sợi dây dắt."

# 【双鉄】
# display as 雙鐵
# JP: 「引き止めてすまなかったな、コン。\n日々姫、話はまたあとでだ」
2478 = "「Xin lỗi vì đã giữ mày lại nhé, Kon.\nHibiki, chuyện này để nói sau nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい。行こう、コン。\nあ、そうだ、兄さん、ハチロク！」
2147 = "「Vâng. Đi thôi, Kon.\nÀ, đúng rồi, anh trai, Hachiroku!」"

# monologue
# JP: 行きざま、日々姫が振り返る。
3245 = "Vừa bước đi, Hibiki bỗng quay đầu lại."

# 【日々姫】
# display as 日日姬
# JP: 「レールショップの出店。\n今いくとちょっと面白いですよ？」
2444 = "「Quầy hàng của cửa hàng đường sắt.\nBây giờ đến đó sẽ thấy cảnh hơi bị thú vị\nđấy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おもしろい、とはどういう」
1943 = "「Thú vị, là ý gì cơ?」"

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 2057 = "「吭！」" 

# 【日々姫】
# display as 日日姬
# JP: 「けんけんいわんと！　行くけん行くけんっ」
2148 = "「Thôi đừng cằn nhằn nữa! Cứ đi đi, đi đi\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……お前もけんけん言っているではないか」
1579 = "「……Em cũng đang cằn nhằn đấy thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「あはっ」
2065 = "「Hơ hơ.」"

# monologue
# JP: 思わず漏れた僕のくだらん感想に、\nハチロクが小さな笑いをこぼす。
3162 = "Trước lời cảm thán vô vị lỡ buột miệng của\ntôi,\nHachiroku khẽ bật cười."

# monologue
# JP: 今日はじめての、明るい声だ。\nひどく強張っていたようだが、少しはほぐれてきたらしい。
3046 = "Giọng điệu tươi sáng đầu tiên trong ngày\nhôm nay.\nCó vẻ như sự căng thẳng tột độ của cô ấy\nđã được thả lỏng đôi chút."

# 【双鉄】
# display as 雙鐵
# JP: 「どうするハチロク。レールショップの出店に行くか？\nそれとも、他も覗いてみるか？」
2217 = "「Tính sao đây Hachiroku. Đến quầy hàng của\ncửa hàng đường sắt nhé?\nHay là đi ngó nghiêng những chỗ khác?」"

# monologue
# JP: 問えばすぐさま。\nハチロクは悩ましげな目であたりを見回す。
3203 = "Vừa hỏi xong.\nHachiroku đưa mắt nhìn quanh với vẻ bối\nrối."

# 【ハチロク】
# display as 八六
# JP: 「他には何……あ、双鉄様、あちら」
2007 = "「Những chỗ khác thì có gì…… a, ngài\nSoutetsu, đằng kia.」"

# monologue
# JP: ハチロクが指差す人混みの中。\n一目でわかる、周囲と違った雰囲気の――
2918 = "Giữa đám đông mà Hachiroku chỉ tay vào.\nCó thể nhận ra ngay lập tức, một bầu không\nkhí khác biệt với xung quanh——"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、宝生稀咲と……\n隣は、連れか？」
2121 = "「Ồ, Houshou Kisaki và……\nNgười bên cạnh, là người đi cùng sao?」"

# 【ハチロク】
# display as 八六
# JP: 「銀行の方……なのでしょうかね？\nスーツで、メガネがよくお似合いで」
2368 = "「Là người của ngân hàng…… phải không nhỉ?\nMặc vest, lại còn rất hợp với cặp kính\nnữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の右腕、といった雰囲気だな」
2461 = "「Mang dáng dấp như cánh tay phải của\nKisaki vậy.」"

# monologue
# JP: 遠目だし、何も聞こえて来はしないが、\nそれだけに、かえって見えてくるものもある。
2896 = "Dù ở khoảng cách xa, chẳng nghe thấy gì\ncả,\nnhưng chính vì thế, lại có những thứ nhìn\nrõ hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「あれが、他所行きではない宝生稀咲か。\nあの目の鋭さ――値踏みするバイヤーにも負けんぞ」
2600 = "「Đó là bộ dạng không phải để ra ngoài của\nHoushou Kisaki sao.\nÁnh mắt sắc bén đó——không hề thua kém\nnhững người mua hàng đang định giá đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「メガネの[かた]方は秘書さん、かもしれませんね。\n稀咲様が何かを言うたび、それをメモしているようです」
2295 = "「Người đeo kính có lẽ là thư ký đấy ạ.\nMỗi khi cô Kisaki nói gì đó, người ấy có\nvẻ đều ghi chép lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。熱心に視察する対象くらいにはなれたらしいな。\n招待状を出した甲斐があった」
2104 = "「Hừm. Có vẻ như chúng ta đã trở thành đối\ntượng đáng để cô ta nhiệt tình thị sát\nrồi.\nBỏ công gửi thiệp mời cũng đáng giá.」"

# 【ハチロク】
# display as 八六
# JP: 「どうします？　一応はご挨拶されますか？」
2218 = "「Tính sao đây ạ? Ngài có muốn qua chào hỏi\nmột tiếng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。やめておこう。\n稀咲がどうこう、誘致がどうこうという話ではなく」
1906 = "「Không. Bỏ đi.\nGiờ không phải lúc nói chuyện Kisaki thế\nnào, hay thu hút đầu tư ra sao.」"

# 【ハチロク】
# display as 八六
# JP: 「え？　でしたら、どういうお話ですか？」
2078 = "「Hả? Nếu vậy thì là chuyện gì ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「男と女、その二人連れでここに来ているという話でだ」
1955 = "「Là chuyện một nam một nữ, hai người họ\nđang đi cùng nhau đến đây.」"

# 【ハチロク】
# display as 八六
# JP: 「はぁ」
# 2359 = "「是嗎」" 

# monologue
# JP: ハチロクが稀咲達へと目を凝らし、\nそれからきょとんと、僕を見る。
2921 = "Hachiroku nheo mắt nhìn về phía nhóm\nKisaki,\nrồi lại ngơ ngác nhìn tôi."

# 【ハチロク】
# display as 八六
# JP: 「どうみても、あのお二人、単なる仕事仲間ですが。\nいわゆる恋人同士のような、甘い雰囲気には見えませぬ」
2052 = "「Dù nhìn thế nào thì hai người họ cũng chỉ\nlà đồng nghiệp thôi mà.\nKhông hề thấy bầu không khí ngọt ngào kiểu\nnhư những cặp đôi yêu nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それこそ甘いな。考えが」
1970 = "「Suy nghĩ của cô ngây thơ quá đấy.」"

# monologue
# JP: どれほど豊かな知性を持てど、\nハチロクは物――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2837 = "Dù sở hữu trí tuệ phong phú đến đâu,\nHachiroku vẫn là một đồ vật——một \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# monologue
# JP: 僕ごときよりももう一回り、\n色恋の機微とやらには疎いらしい。
3027 = "Có vẻ như cô ấy còn mù mờ về những tinh tế\ntrong tình yêu\nhơn cả tôi một bậc."

# 【双鉄】
# display as 雙鐵
# JP: 「若い男女の二人連れに挨拶に行くとだな。\n必ず、男の方が僕に対してイヤな顔をするんだ」
2513 = "「Nếu đến chào hỏi một đôi nam nữ trẻ tuổi\nđang đi cùng nhau.\nChắc chắn người nam sẽ tỏ thái độ khó chịu\nvới tôi.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 2577 = "「這樣啊」" 

# monologue
# JP: 僕を見つめるハチロクの目が、\n“きょとん”から“まじまじ”へと変わる。
2934 = "Ánh mắt Hachiroku nhìn tôi\ntừ \"ngơ ngác\" chuyển sang \"chăm chú\"."

# 【ハチロク】
# display as 八六
# JP: 「確かにそうなりましょうね。双鉄様なら。\nなるほど、納得いたしました」
2619 = "「Quả thực là sẽ thành ra như vậy nhỉ. Nếu\nlà ngài Soutetsu.\nRa là vậy, em hiểu rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前が行っても、誰が行っても同じだろうさ。\n男女の機微とは、どうやらそうしたものらしいからな」
2320 = "「Dù là cô đi, hay ai đi thì cũng thế thôi.\nNhững tinh tế giữa nam và nữ, có vẻ là như\nvậy đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はてさて、そうなりますでしょうか？\nハチロクには、少し難しすぎるようです」
2068 = "「Chà chà, liệu có đúng là như vậy không\nnhỉ?\nĐối với Hachiroku thì có vẻ hơi quá khó\nhiểu rồi.」"

# monologue
# JP: くすくすと、笑いに軽やかさがもどる。
2929 = "Tiếng cười khúc khích nhẹ nhàng đã quay\ntrở lại."

# monologue
# JP: いい傾向だ。\n僕まで、嬉しくなってくる。
3475 = "Một dấu hiệu tốt.\nĐến cả tôi cũng cảm thấy vui lây."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、トラブル回避のためにも、\nレールショップの出店に一度戻っておこう」
2188 = "「Nếu vậy, để tránh rắc rối,\nchúng ta cứ quay lại quầy hàng của cửa\nhàng đường sắt một chuyến xem sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。お供いたします双鉄様」
2153 = "「Vâng. Em xin đi cùng ngài Soutetsu.」"

# monologue
# JP: ……しかし、なんともすごい人だ。\n時間の経過につれてどんどん、増えてるようだが――
1541 = "……Tuy nhiên, người đông thật đấy.\nCàng về sau có vẻ như càng tăng lên thì\nphải——"

# 【ハチロク】
# display as 八六
# JP: 「イベントのときのようですね」
2190 = "「Giống như lúc có sự kiện vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「イベント？」
2139 = "「Sự kiện?」"

# monologue
# JP: 問えばふわりと、ハチロクの目がやわらかくなる。
3382 = "Vừa hỏi xong, ánh mắt Hachiroku bỗng trở\nnên dịu dàng."

# 【ハチロク】
# display as 八六
# JP: 「新線開通のときや、逆に\x%l列車;#00ffc040;列車%l;#;が廃止されるときなどには、\nホームがマニ――鉄道ファンで、埋め尽くされたのです」
2393 = "「Vào lúc khai trương tuyến mới, hay ngược\nlại là khi \\x%l列車;#00ffc040;tàu%l;#; bị ngừng hoạt động,\nsân ga sẽ chật kín những người đam——những\nngười hâm mộ đường sắt ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そうした日がイベントか。\nん？　ならば、今日もそうではないか？　鉄道イベント」
2034 = "「Ra là vậy. Những ngày như thế gọi là sự\nkiện sao.\nHửm? Nếu vậy, hôm nay chẳng phải cũng thế\nsao? Sự kiện đường sắt.」"

# 【ハチロク】
# display as 八六
# JP: 「え？　あ……そう、ですよね。そう。\nわたくし、どうして……いえ……そう……そうね」
2075 = "「Hả? À…… đúng, nhỉ. Đúng vậy.\nTại sao em lại…… không…… đúng vậy…… đúng\nrồi.」"

# monologue
# JP: いかん、地雷を――\nいや、置き石でも踏んでしまったのかもしれない。
2829 = "Không xong rồi, đạp trúng mìn rồi——\nKhông, có khi là giẫm phải đá chèn trên\nđường ray cũng nên."

# monologue
# JP: ハチロクの高まっていたテンションが、\n目に見えて沈んでいってしまう。
3351 = "Sự phấn khích vừa dâng cao của Hachiroku\nlại xìu xuống trông thấy."

# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様。ふかみ様です」
2099 = "「A, ngài Soutetsu. Là cô Fukami ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん――おお！　なかなかどうして、\n立派にやっているではないか」
2102 = "「Ừ——ồ! Chẳng phải em ấy,\ndang làm rất tốt hay sao.」"

# monologue
# JP: きびきびテキパキ、ふかみの手先は動いている。
3307 = "Đôi tay Fukami thoăn thoắt, dứt khoát di\nchuyển."

# monologue
# JP: 記念きっぷにオリジナルグッズ――\n売りさばく様は、僕よりよほど洗練されてる。
3079 = "Từ vé kỷ niệm đến hàng hóa độc quyền——\nPhong thái bán hàng của em ấy còn sành sỏi\nhơn tôi nhiều."

# 【ハチロク】
# display as 八六
# JP: 「発船所のお仕事で、きっと、慣れてらっしゃるのです」
2145 = "「Chắc chắn là cô ấy đã quen với công việc\nở bến thuyền rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2349 = "「Ừ.」"

# monologue
# JP: そういえば、発船所にも売店があった。\n今はガラガラ、閑古鳥が鳴く有り様だったが――
3430 = "Nhắc mới nhớ, ở bến thuyền cũng có quầy\nbán hàng.\nDù bây giờ thì vắng tanh, ế ẩm đến mức quạ\nkêu——"

# monologue
# JP: 全盛期から売店を手伝っていたのなら、\nなるほど、習熟もしている筈だ。
3090 = "Nếu em ấy đã phụ giúp bán hàng từ thời kỳ\nhoàng kim,\nthì ra là vậy, quen tay cũng là điều dễ\nhiểu."

# 【ふかみ】
# display as 深美
# JP: 「あ！　おーーーい！　です」
2091 = "「A! Nàyyyy! Ạ.」"

# monologue
# JP: こちらに気付いたふかみが手を振り、\n恥ずかしそうにすぐ引っ込める。
3066 = "Fukami nhận ra chúng tôi liền vẫy tay,\nnhưng rồi lại ngượng ngùng rụt lại ngay."

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだな。見とれたぞ」
2141 = "「Giỏi thật đấy. Anh nhìn mà mê mẩn luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「そ、そんな――こんなこと、単なる、慣れ、です」
1901 = "「Kh, không đâu ạ——chuyện này, chỉ đơn giản\nlà, quen tay thôi, ạ.」"

# 【早瀬流】
# display as ？？？
# JP: 「ほーーーお？\nこれね？　『双鉄おにいさん』とやらは」
2122 = "「Hôố? Đây hả? Cái cậu 'anh Soutetsu' gì\nđó.」"

# 【ふかみ】
# display as 深美
# JP: 「[ながれ]流おじいちゃんっ」
2419 = "「Ông Nagare!」"

# monologue
# JP: 長テーブルの下からぬうっと、\nおおきな固まりがせり上がってくる。
3490 = "Từ dưới chiếc bàn dài,\nmột khối khổng lồ lù lù nhô lên."

# monologue
# JP: 太った白髪の――サンタのような老人だ。\nこの厚み、一度目にしたら忘れられない。
3384 = "Một ông lão béo tốt, tóc bạc trắng——trông\nnhư ông già Noel vậy.\nĐộ dày này, nhìn một lần là không thể nào\nquên."

# 【双鉄】
# display as 雙鐵
# JP: 「お久しぶりです、[せき]堰さん。\n川下りのときは、トラックでありがとうございました」
1936 = "「Đã lâu không gặp, ông Seki.\nLúc xuôi dòng trên sông, cảm ơn ông vì\nchuyến xe tải ạ.」"

# 【早瀬流】
# display as 早賴流
# JP: 「[せき]堰？　いいや、わしは[ながれ]流よ。\n川下りうんぬんも、まったくしらんで」
2135 = "「Seki? Không, ta là Nagare.\nBa cái chuyện xuôi dòng gì đó, ta hoàn\ntoàn không biết đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 2072 = "「哎？」" 

# 【ふかみ】
# display as 深美
# JP: 「おじいちゃん、そういう意地悪やめてよ」
2438 = "「Ông ơi, đừng có trêu ác ý như thế nữa\nđi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「意地悪？　ああ」
1985 = "「Trêu ác ý? À.」"

# monologue
# JP: なるほど、全てが繋がった。\n『ちょっと面白い』と日々姫がはしゃいだはずだ。
2983 = "Ra là vậy, mọi chuyện đã xâu chuỗi lại\nrồi.\nHèn chi Hibiki lại hào hứng bảo 'hơi bị\nthú vị đấy'."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたごの方たちなのですね？\nふかみちゃんのおじいさんたち堰さんと流さんとは」
2182 = "「Hai người là anh em sinh đôi nhỉ?\nÔng nội của Fukami, ông Seki và ông Nagare\nấy.」"

# 【早瀬流】
# display as 早賴流
# JP: 「いいや、違う」
1932 = "「Không, nhầm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ええっ？」
# 2072 = "「哎？」" 

# 【ふかみ】
# display as 深美
# JP: 「もう、だから意地悪はやめてってばぁ」
2466 = "「Thật tình, đã bảo ông đừng có trêu nữa\nmà.」"

# 【早瀬流】
# display as 早賴流
# JP: 「いじわるなんぞしとらんばい」
2261 = "「Ta có trêu chọc ác ý gì đâu chứ.」"

# monologue
# JP: （ぽむっ）
3523 = "（Bộp）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぉぅっ！？」
2119 = "「Ối!?」"

# monologue
# JP: おかしな声が出てしまった。\n分厚く大きな手のひらで、頭をぐしゃぐしゃ撫でられて。
3199 = "Tôi lỡ buột miệng phát ra một âm thanh kỳ\nquặc.\nBị một bàn tay to lớn, dày cộp vò rối tung\ncả đầu."

# monologue
# JP: まるっきりの子供扱い。\nこんな風にされたのは、何年――十何年ぶりのことだろう。
3175 = "Bị đối xử hệt như một đứa trẻ.\nBị làm như thế này, đã mấy năm——mười mấy\nnăm rồi nhỉ."

# 【早瀬流】
# display as 早賴流
# JP: 「ふかみが世話になっとるけんね。\nなんぞあったら遠慮のう言い」
2527 = "「Cảm ơn cậu đã chăm sóc con bé Fukami.\nCó chuyện gì cứ nói, đừng có ngại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
2097 = "「A, vâng ạ.」"

# 【早瀬流】
# display as 早賴流
# JP: 「水と土とのことならよ。\nわしら、人よりゃ、少しは詳しかけん」
2242 = "「Nếu là chuyện về nước và đất ấy mà.\nBọn ta, so với người thường thì, cũng rành\nhơn một chút.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その……ありがとうございます」
2596 = "「Chuyện đó…… cháu cảm ơn ạ.」"

# 【早瀬流】
# display as 早賴流
# JP: 「おっと」
2113 = "「Hây dô.」"

# 【ふかみ】
# display as 深美
# JP: 「ひゃあっ！？」
2060 = "「Hyaa!?」"

# monologue
# JP: 流さんが、ふかみを軽々抱き上げ肩の上へと乗せる。
3294 = "Ông Nagare bế bổng Fukami lên một cách nhẹ\nnhàng rồi đặt lên vai."

# monologue
# JP: 乗せるやいなやでのしのしと、\nホームの方へと歩き出す。
3494 = "Vừa đặt lên xong là ông ấy bước đi huỳnh\nhuỵch,\ntiến về phía sân ga."

# 【早瀬流】
# display as 早賴流
# JP: 「仕事のようばい。\nまたの、双鉄」
2038 = "「Đến giờ làm việc rồi.\nGặp lại sau nhé, Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ……ぅ――はい、また」
2086 = "「A…… ừm——vâng, hẹn gặp lại.」"

# monologue
# JP: いかん、どうにも圧倒された。\nああいう類の押しの強さは、今まで経験したことがない。
2828 = "Không xong rồi, tôi hoàn toàn bị áp đảo.\nSự lấn lướt kiểu như vậy, tôi chưa từng\ntrải nghiệm bao giờ."

# 【ハチロク】
# display as 八六
# JP: 「仕事……」
2200 = "「Công việc……」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2112 = "「Hửm?」"

# monologue
# JP: ハチロクが背中をじっと見ている。\n分厚く丸い、肉の背中を。
2932 = "Hachiroku đang nhìn chằm chằm vào bóng\nlưng ông ấy.\nMột tấm lưng thịt dày cộp, tròn xoe."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
2216 = "「Sao thế? Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「いえ――ひょっとして、\nあの方にも聞こえているのかと」
2398 = "「Không ạ——em chỉ đang nghĩ,\nkhông biết người đó có nghe thấy không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「聞こえる？　何がだ」
2495 = "「Nghe thấy? Cái gì cơ.」"

# monologue
# JP: （プォンっ！！！！）
3525 = "（Poooon!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2118 = "「噢」" 

# monologue
# JP: なるほど、これか、\x%lタイフォン;#00ffc040;タイフォン%l;#;か。
2984 = "Ra là vậy, cái này sao, là \\x%lタイフォン;#00ffc040;còi hơi%l;#; à."

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;が帰還してきたレールの響きが、\nハチロクにはすでに聞こえていたのか。
3158 = "Âm thanh của đường ray khi \\x%lキハ07;#00ffc040;KiHa 07%l;#; quay\nvề,\nHachiroku đã nghe thấy từ trước rồi sao."

# 【凪】
# display as 凪
# JP: 「なんか来たばい！　楽しそうばい！」
2377 = "「Có cái gì đến kìa! Trông vui quá!」"

# 【ざわめきＢ】
# display as 嘈雜聲
# JP: 「\x%l列車;#00ffc040;列車%l;#;ばい。市長さんのが戻ってきたと」
2340 = "「Là \\x%l列車;#00ffc040;tàu%l;#; đấy. Xe của ngài thị trưởng đã\nquay\nvề rồi.」"

# 【ざわめきＣ】
# display as 嘈雜聲
# JP: 「走っとるのがあっと？　見に行くばい！」
2497 = "「Có tàu đang chạy à? Đi xem thôi!」"

# monologue
# JP: どどどと、人の大きな流れ。\nそうして、すぐに静まりかえる。
3011 = "Dòng người ồ ạt kéo đi rầm rập.\nRồi sau đó, xung quanh lập tức trở nên\nvắng lặng."

# 【双鉄】
# display as 雙鐵
# JP: 「これ……は。見事においてけぼりだな」
2568 = "「Thế này…… thì. Đúng là bị bỏ lại chỏng\nchơ rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「おいてけぼり……」
2157 = "「Bị bỏ lại……」"

# monologue
# JP: ガランとしている。\n\x%l石造機関庫;#00ffc040;石造機関庫%l;#;が果てなく広い。人気がまるで消えている。
97 = "Vắng tanh vắng ngắt.\n\\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; rộng thênh thang.\nBóng người như biến mất hoàn toàn."

# monologue
# JP: ポーレットを迎えにいったのだろう。\n赤井宮司、蓑笠老人――日々姫さえもが残っていない。
3038 = "Chắc là đi đón Paulette hết rồi.\nThầy Akai, ông lão Minokasa——ngay cả\nHibiki cũng không còn ở lại."

# 【ハチロク】
# display as 八六
# JP: 「おいてけ……ぼりっ――」
2156 = "「Bị bỏ…… lại——」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2632 = "「！」" 

# monologue
# JP: ハチロクが駆ける。まっすぐに。\n堪え溜め込んでいた全てが一気に、はじけたように。
2937 = "Hachiroku chạy đi. Chạy thẳng một mạch.\nNhư thể tất cả những gì cô ấy kìm nén,\ntích tụ nãy giờ đã đồng loạt vỡ tung."

# monologue
# JP: 今日一日、一度たりとも近づかなかった、\n\x%l8620;#00ffc040;8620%l;#;の車体めがけて、一直線に。
3053 = "Suốt cả ngày hôm nay, cô ấy chưa một lần\nbước đến gần,\nthế mà giờ lại lao thẳng về phía thân xe \\x%l8620;#00ffc040;8620%l;#;\n."

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2632 = "「！」" 

# monologue
# JP: ハチロクが、\x%l8620;#00ffc040;8620%l;#;を呼ぶ。
2905 = "Hachiroku, gọi tên \\x%l8620;#00ffc040;8620%l;#;."

# monologue
# JP: 同じ名前を持つ相棒を――\nいや、恐らくは、半身を。
3056 = "Gọi người bạn đồng hành mang cùng tên với\nmình——\nKhông, có lẽ là, gọi một nửa sinh mệnh của\nmình."

# 【ハチロク】
# display as 八六
# JP: 「おまえは、ずっと――\nこんな気持ちで、ずうっとここに止まっていたの？」
1966 = "「Mày đã, luôn——\nmang tâm trạng thế này, và đỗ ở đây suốt\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1569 = "「…………」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;は答えない。\nただただ巨体を、無造作にさらけ出してるだけだ。
88 = "\\x%l8620;#00ffc040;8620%l;#; không trả lời.\nChỉ im lìm phơi bày thân hình khổng lồ một\ncách thô kệch."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが壊してしまったせいで――おまえは、ずっと\n――こんな気持ちで――おいてけぼりで」
2612 = "「Chỉ vì tao đã phá hỏng mọi thứ——mà mày,\nđã luôn\n——mang tâm trạng thế này——bị bỏ lại chỏng\nchơ」"

# monologue
# JP: 一粒――\nすぐに、雨の如くに。
2820 = "Một giọt——\nRồi ngay lập tức, tuôn rơi như mưa."

# monologue
# JP: ぼろぼろと、大粒の涙が床に当たって砕ける。
3041 = "Những giọt nước mắt to tướng lã chã rơi\nxuống sàn vỡ tan."

# 【ハチロク】
# display as 八六
# JP: 「なのに――わたくしは――わたくしはっ」
2489 = "「Vậy mà——tao thì——tao thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1570 = "「……」"

# monologue
# JP: ハチロクの小さな肩に手のひらを置く。\n何もいわずに、ぽんと置く。
3205 = "Tôi đặt tay lên bờ vai nhỏ bé của\nHachiroku.\nKhông nói lời nào, chỉ khẽ đặt lên."

# monologue
# JP: 震えの全てが静まるまで。\n涙の全てが、落ちていくまで。
3373 = "Cho đến khi cô ấy ngừng run rẩy.\nCho đến khi những giọt nước mắt rơi cạn."

# 【ハチロク】
# display as 八六
# JP: 「双、鉄……様」
2618 = "「Ngài, Soutetsu……」"

# monologue
# JP: けれど、震えがとまりきらぬうち、\nハチロクは声を絞り出す。
3483 = "Thế nhưng, khi vẫn chưa hết run rẩy,\nHachiroku đã cố vắt kiệt giọng nói."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは……浅ましい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です……この子に\n……たくさんの人に、取り返しのつかぬ傷を与えて――」
2267 = "「Em là…… một \\x%lレイルロオド;#00ffc040;Railord%l;#; đáng khinh…… đã gây\nra cho đứa trẻ này\n……và rất nhiều người, những tổn thương\nkhông thể nào cứu vãn——」"

# monologue
# JP: ハチロクの指が、いたわるように\x%l8620;#00ffc040;8620%l;#;の傷を撫でる。
2925 = "Những ngón tay của Hachiroku, vuốt ve vết\nthương của \\x%l8620;#00ffc040;8620%l;#; như để xoa dịu."

# monologue
# JP: 巧みに覆い隠された、擦過痕を、打痕を、亀裂を、\n手袋を外した指先で、なんどもやさしく、撫でてやる。
3077 = "Những vết xước, vết móp, vết nứt được che\nđậy khéo léo,\ncô ấy tháo găng tay ra, dùng đầu ngón tay\nnhẹ nhàng vuốt ve hết lần này đến lần\nkhác."

# 【ハチロク】
# display as 八六
# JP: 「だのに――浅ましくも欲に渇くのです。\nあの、たくさんの……人の賑わいと笑顔とに触れ」
2431 = "「Vậy mà——em lại khao khát một cách hèn hạ.\nKhi được chạm vào sự náo nhiệt và những nụ\ncười…… của rất nhiều người」"

# monologue
# JP: ハチロクの震えが大きくなる。\n激しい痛みが、後悔が、僕の傷にまで伝わってくる。
2916 = "Hachiroku càng run rẩy mạnh hơn.\nNỗi đau đớn dữ dội, sự hối hận tột cùng,\ntruyền đến tận vết thương của tôi."

# monologue
# JP: だから、背中から抱きしめる。\n強く抱きしめ――傷を重ねて、痛みを抑える。
3177 = "Thế nên, tôi ôm chầm lấy cô ấy từ phía\nsau.\nÔm thật chặt——áp sát vết thương của cả\nhai, để kìm nén nỗi đau."

# 【ハチロク】
# display as 八六
# JP: 「浅ましくも――わたくしは願ってしまうのです――\nもう一度……あの日の前に、帰りたいと――」
2422 = "「Dù thật hèn hạ——nhưng em vẫn không ngừng\nước ao——\nĐược một lần nữa…… quay trở lại những ngày\ntrước hôm đó——」"

# monologue
# JP: わかりすぎるほど、わかってしまう。\n僕も、願った。何度も何度も何度も何度も。
3169 = "Tôi hiểu, hiểu đến mức quá rõ.\nTôi cũng từng ước như vậy. Rất nhiều, rất\nnhiều lần."

# monologue
# JP: 傷の全てを無かったことに――\n事故の一日前の暮らしに、なにをしたって戻りたいと。
3161 = "Ước gì mọi vết thương đều chưa từng tồn\ntại——\nƯớc gì có thể làm bất cứ giá nào để quay\nvề cuộc sống một ngày trước vụ tai nạn."

# 【ハチロク】
# display as 八六
# JP: 「罪の深さに[おのの]慄きながら、それでも求めてしまうのです。\nもう一度――ただもう一度……人と笑顔を運びたいと」
2031 = "「Dù run rẩy trước tội lỗi sâu nặng, nhưng\nem vẫn khao khát.\nMột lần nữa——chỉ một lần nữa thôi…… em\nmuốn được chở mọi người và những nụ cười」"

# 【双鉄】
# display as 雙鐵
# JP: 「やっと言ったな。お前の望みを」
1973 = "「Cuối cùng cô cũng chịu nói ra rồi. Mong\nmuốn của cô.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2089 = "「啊」" 

# monologue
# JP: 怖い、僕が。痛い、僕が。\nハチロクの事故の記憶が、僕の古傷から生血を絞る。
3151 = "Nỗi sợ hãi, trong tôi. Nỗi đau đớn, trong\ntôi.\nKý ức về vụ tai nạn của Hachiroku đang vắt\nkiệt máu tươi từ vết thương cũ của tôi."

# monologue
# JP: だから背中から抱きしめたまま――\n大丈夫、声だけならば。震えさせずにきっと、通せる。
3210 = "Vì vậy, tôi vẫn cứ ôm cô ấy từ phía sau——\nKhông sao, nếu chỉ là giọng nói. Tôi chắc\nchắn sẽ giữ cho nó không run rẩy."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前のオーナーだ。\n僕は、お前に約束をした」
2266 = "「Tôi là chủ sở hữu của cô.\nTôi đã hứa với cô rồi.」"

# monologue
# JP: 言い聞かせる。\nもう一度。もう何度でも、自分自身に。
3184 = "Tự nhủ với lòng mình.\nMột lần nữa. Bao nhiêu lần cũng được, tự\nnhủ với chính mình."

# monologue
# JP: ここを乗り越えられないのなら、\n御一夜を――そして路子を――救えはしない。
3447 = "Nếu không thể vượt qua được chướng ngại\nnày,\nthì sẽ không thể cứu được Ohimitera——và cả\nMichiko nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前の望みを叶える」
2269 = "「Tôi sẽ biến mong muốn của cô thành hiện\nthực.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
# 2618 = "「雙鐵……少爺」" 

# monologue
# JP: 小さな手のひらが重なってくる。\n抱きしめている僕の手を、ハチロクがきゅっと掴んでくる。
3075 = "Bàn tay nhỏ bé của cô ấy đặt lên.\nHachiroku nắm chặt lấy bàn tay đang ôm cô\nấy của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「故にハチロク、お前を再び走らせよう。\nお前と[ハチロクニイマル,3]8620に、人と、笑顔とを運ばせよう」
2300 = "「Vì vậy Hachiroku, tôi sẽ làm cho cô chạy\nlại một lần nữa.\nSẽ làm cho cô và \\x%l8620;#00ffc040;8620%l;#; lại được chở mọi\nngười, và những nụ cười.」"

# monologue
# JP: いや、そうか。\nこれこそ救いなのかもしれない。
3261 = "Không, ra là vậy.\nCó lẽ đây mới chính là sự cứu rỗi."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を湯医にたどり着かせたのなら、\nあの\x%l列車;#00ffc040;列車%l;#;から――路子も、降りられるのかもしれない。
3391 = "Nếu có thể đưa \\x%l8620;#00ffc040;8620%l;#; đến được Yui,\nthì có lẽ——Michiko cũng có thể bước xuống\ntừ chuyến \\x%l列車;#00ffc040;tàu%l;#; đó."

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます……双鉄、様」
2526 = "「Cảm ơn ngài…… ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「礼には、まだまだ早すぎる」
1922 = "「Cảm ơn lúc này vẫn còn quá sớm.」"

# monologue
# JP: 極めて大きな一歩だが、\nこれも所詮は、一歩にすぎん。
3477 = "Dù là một bước tiến vô cùng lớn,\nnhưng suy cho cùng, đây cũng chỉ mới là\nmột bước."

# monologue
# JP: たどりつくまで――\nそれまで、全ては途中経過にすぎんのだ。
3025 = "Cho đến khi chạm tới đích——\nCho đến lúc đó, tất cả chỉ là quá trình mà\nthôi."

# 【双鉄】
# display as 雙鐵
# JP: 「走るぞハチロク。お前の望みをかなえるために。\nそうするために――お前も走れ。全力で」
2538 = "「Chạy thôi Hachiroku. Để biến mong muốn\ncủa cô thành hiện thực.\nĐể làm được điều đó——cô cũng phải chạy đi.\nBằng toàn bộ sức lực.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。わたくしは、必ず全力で。\n浅ましくとも、見苦しくとも――」
2371 = "「Vâng, thưa ngài Soutetsu. Em nhất định sẽ\ndốc toàn lực.\nDù có hèn hạ, dù có khó coi đến đâu——」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そうだな。\n浅ましくとも、見苦しくとも」
2400 = "「Đúng vậy. Phải thế chứ.\nDù có hèn hạ, dù có khó coi đến đâu.」"

# monologue
# JP: そうしていつか、走れなくなり、\n無様に地べたを這いずろうとも――
2982 = "Và rồi một ngày nào đó, dù không thể chạy\nđược nữa,\ndù có phải bò trườn trên mặt đất một cách\nthảm hại đi chăng nữa——"

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅に――かならず僕らは、辿り着くのだ」
2241 = "「Chúng ta——chắc chắn sẽ đến được ga cuối\ncùng.」"
