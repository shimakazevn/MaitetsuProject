# display as 鐵路人偶
# JP: 「お客様、ご着席大丈夫でしょうか」
1166 = "「Hành khách, không biết đã ngồi vững hết chưa.」"
# 【清美勝子】
# display as 司機
# JP: 「\x%l車掌;#00ffc040;車掌%l;#;・[せき]関、\x%l車販;#00ffc040;車販%l;#;・[まゆずみ]黛のコンビでしょ？\nやってるわ。きちんと、彼女たちの仕事を」
