# display as 鐵路人偶
# JP: 「9642\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は『鉄橋崩落』と――断末魔の\x%l共感;#00ffc040;共感%l;#;で。\n……[ふじがわ,2]冨士川[きょうりょう,1]橋梁が崩落したと」
1457 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; 9642 truyền đạt qua \\x%l共感;#00ffc040;cộng cảm%l;#; lúc hấp hối rằng 『Cầu sắt sập』.\n……Nội dung là cầu sắt Fujikawa đã sập.」"
# 【清美勝子】
# display as 司機
# JP: 「[ふじがわ,2]冨士川っ！？\nまさかそんなっ！　近すぎるっ！！」
1271 = "「Fujikawa!?\nKhông thể nào! Gần quá rồi!!」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「当機に停止の手段無し。\x%l制動;#00ffc040;制動%l;#;力を最大限適正にとっても……七五秒後、止まりきれずに――」
1337 = "「Chuyến tàu này đã không còn cách dừng lại. Dù có dùng lực \\x%l制動;#00ffc040;hãm phanh%l;#; tối đa đi chăng nữa…… thì 75 giây sau, cũng không thể dừng hẳn lại mà——」"
