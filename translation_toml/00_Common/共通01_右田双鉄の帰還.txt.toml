# display as 司機
# JP: 「[ま]撒いた瞬間流されるのがオチでしょうけど。\nま、やらないよりはね――っと」
1317 = "「Chắc rắc xuống cái là bị cuốn trôi đi ngay thôi.\nNhưng mà, có làm còn hơn không——っ」"
# 【ハチロク】
# display as 鐵路人偶
