# JP: ……声、誰かの声が聞こえる。\n……感じる……手……誰かが、僕を……ゆすってる。
1012 = "……Tiếng nói, tôi nghe thấy tiếng ai đó.\n……Cảm nhận được……bàn tay……ai đó, đang……lay tôi."
# monologue
# JP: なら、僕……生きてる……\n僕だけ……僕の、はんぶんは――
1647 = "Vậy ra, mình……vẫn còn sống……\nChỉ có mình……còn, một nửa của mình——"
# 【双鉄】
# display as 倖存者
# JP: 「み……ち……」
1403 = "「Mi……chi……」"
# 【帝鉄職員Ｃ】
# display as 帝鐵職員Ｃ
# JP: 「いました！　生存者！\n呼吸ありますが――重症ですっ」
1309 = "「Có người! Người sống sót!\nVẫn còn thở nhưng——bị thương nặng lắm.」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「子供じゃないか！　おいっ、君！」
1432 = "「Vẫn còn là một đứa trẻ mà! Này, nhóc!」"
# 【帝鉄職員Ｃ】
# display as 帝鐵職員Ｃ
# JP: 「ダメです！　動かさないで！　頭から出血しています」
1152 = "「Không được! Đừng động vào thằng bé! Đầu đang chảy máu kìa.」"
# monologue
# JP: ……出血、僕の、頭……から。\nなら、このまま――けど……………………
1004 = "……Chảy máu, từ……đầu, của mình.\nVậy thì, cứ thế này——nhưng mà……………………"
# monologue
# JP: それじゃあ、みちが――\n僕を、突き飛ばしてくれた[いもうと,1]路子が――
1652 = "Như thế thì, Michi——\nMichiko, đứa em gái đã đẩy mình ra sẽ——"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「止血しろ！　助けるんだ！　早くっ！」
1189 = "「Cầm máu đi! Phải cứu thằng bé! Nhanh lên!」"
# 【帝鉄職員Ｃ】
# display as 帝鐵職員Ｃ
# JP: 「もちろんです！　\nですが――、一刻も早く病院につれていかないとっ」
1440 = "「Tất nhiên rồi!\nNhưng mà——, phải đưa đến bệnh viện càng sớm càng tốt.」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「どう移送する！？　救援車は一番近くて[こうづ,2]国兎津だぞ！\n徒歩で\x%l保線;#00ffc040;保線%l;#;基地まで戻った方がまだ早い！」
1300 = "「Chuyển đi bằng cách nào!? Xe cứu hộ gần nhất cũng ở tận Kozu đấy!\nĐi bộ về căn cứ \\x%l保線;#00ffc040;bảo trì đường ray%l;#; còn nhanh hơn!」"
# 【帝鉄職員Ｃ】
# display as 帝鐵職員Ｃ
# JP: 「無理です！　それではとても保たないっ」
1150 = "「Không được đâu! Như thế thì thằng bé không trụ nổi mất.」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「ならどうしろとっ！！」
1434 = "「Vậy cậu bảo phải làm sao!!」"
# monologue
# JP: ……ダメ、だ。\n聞いてること、意味、わからない。
1000 = "……Không, được rồi.\nNhững gì mình nghe thấy, chẳng, hiểu gì cả."
# monologue
# JP: …………なんで、こんなに眠いんだ――\nさっきまで、僕……寝てた、の、に…………
996 = "…………Tại sao, lại buồn ngủ thế này——\nRõ ràng, lúc nãy mình……vẫn còn đang……ngủ, cơ, mà…………"
# 【右田泰斗】
# display as 帝鐵職員Ｂ
# JP: 「支社に\x%lエアクラ;#00ffc040;エアクラ%l;#;――飛ぶ奴、試作機があるだろう。\nあれを要請しろ」
1208 = "「Ở chi nhánh có \\x%lエアクラ;#00ffc040;Aircra%l;#;——loại bay được, có máy thử nghiệm đúng không.\nYêu cầu điều động nó đi.」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「あの試作機か！　いや、だが――この風雨だぞっ！？」
1437 = "「Cái máy thử nghiệm đó á! Không, nhưng mà——mưa to gió lớn thế này cơ mà!?」"
# 【右田泰斗】
# display as 帝鐵職員Ｂ
# JP: 「無人で飛ばせ。たとえ落ちても誰も死なん。\n放っておけばこの子は死ぬ。考える余地があるか？」
1155 = "「Cứ cho bay không người lái. Dù có rơi thì cũng chẳng ai chết.\nCứ bỏ mặc thì đứa bé này sẽ chết. Còn thời gian để mà do dự sao?」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「わかった！　この子の命が最優先だと要請しよう。\nおいキミ、頑張れ。試作機が来るまで死ぬんじゃないぞ」
1268 = "「Hiểu rồi! Tôi sẽ yêu cầu với ưu tiên hàng đầu là mạng sống của đứa bé này.\nNày nhóc, cố lên. Cho đến khi máy thử nghiệm tới thì không được chết đâu đấy.」"
# 【帝鉄職員Ｃ】
# display as 帝鐵職員Ｃ
# JP: 「死なせませんよ！　死なせませんともっ！！」
1151 = "「Sẽ không để thằng bé chết đâu! Tuyệt đối không để chết đâu!!」"
# 【右田泰斗】
# display as 帝鐵職員Ｂ
# JP: 「飛ばせ、飛ばすんだ、飛行型をっ。\nこの子の命が最優先だ、なにを置いても飛ばさせろ！」
1401 = "「Cho bay đi, cho loại bay được cất cánh đi.\nMạng sống của đứa bé này là ưu tiên hàng đầu, dù thế nào cũng phải cho cất cánh!」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様。問題なく雨雲を抜けました」
1448 = "「Ngài Soutetsu. Chúng ta đã an toàn vượt qua mây mưa rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1033 = "「…………」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「が、雨雲を突っ切れとのご命令は今後お控えください。\nナビは、双鉄様の命を最優先として判断します」
1157 = "「Tuy nhiên, xin ngài từ nay về sau đừng ra lệnh xuyên qua mây mưa nữa.\nNavi luôn đưa ra quyết định với ưu tiên hàng đầu là mạng sống của ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1033 = "「…………」" 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様の『急ぎなので、無理をしても』とのご命令と、\n双鉄様の命を最優先することとには、矛盾があります」
1447 = "「Mệnh lệnh 『Đang vội, nên dù có phải gắng sức』 của ngài Soutetsu, và\nviệc ưu tiên mạng sống của ngài Soutetsu lên hàng đầu, có sự mâu thuẫn với nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1033 = "「…………」" 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「矛盾の判断には大きな演算能力を必要とし、\nその負荷が双鉄様の安全を脅かすという……双鉄様？」
1260 = "「Việc đưa ra quyết định trong sự mâu thuẫn đòi hỏi năng lực tính toán lớn,\nvà khối lượng công việc đó sẽ đe dọa đến sự an toàn của ngài Soutetsu…… Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。すまない。少し寝ていた」
1252 = "「Ừm. Xin lỗi. Tôi vừa chợp mắt một chút.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「これはこれは。\n起こしてしまいましたか。すみません」
1234 = "「Chà chà.\nTôi đã đánh thức ngài sao. Xin lỗi ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「意図的だろう？\n僕は、うなされていたのだろうな」
1184 = "「Cô cố tình đúng không?\nChắc là tôi lại gặp ác mộng rồi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「意図的などと、ご冗談を。ナビは物です。物品です。\n何を意図することもございません」
1236 = "「Ngài đùa rồi, làm gì có chuyện cố tình. Navi chỉ là đồ vật. Là vật phẩm.\nHoàn toàn không có chủ đích làm bất cứ điều gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、そうか。\nお前がそういうのなら、そうなのだろうな」
1256 = "「Ừm, vậy sao.\nNếu cô đã nói vậy thì chắc là thế rồi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい、左様です。\nナビは単なる[ドライバー,3]操縦機器ですので」
1332 = "「Vâng, chính xác là vậy.\nNavi chỉ đơn thuần là thiết bị điều khiển thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「訂正しておけ。お前は――ナビは、\n“単なる”ではなく、最上級のドライバーだ」
1425 = "「Đính chính lại đi. Cô——Navi,\nkhông phải \"đơn thuần\", mà là thiết bị điều khiển cao cấp nhất.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました。\nナビは、双鉄様の基準においては最上級の[ドライバー,3]操縦機器です」
1288 = "「Đã rõ mệnh lệnh.\nNavi, theo tiêu chuẩn của ngài Soutetsu, là thiết bị điều khiển cao cấp nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かわいくないな」
1363 = "「Đúng là chẳng đáng yêu chút nào.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「物品ですので」
1258 = "「Vì tôi là vật phẩm mà.」"
# monologue
# JP: ……物との会話。\nあるいは、ただの独り言。
1009 = "……Trò chuyện với đồ vật.\nHay có lẽ, chỉ là độc thoại."
# monologue
# JP: だとしても、\n鈍り、曇り、沈みかけていた心が少し、浮き上がる。
1521 = "Dù là vậy,\ntrái tim đang dần trở nên chai sạn, u ám và chìm nghỉm của tôi cũng được vực dậy đôi chút."
# monologue
# JP: （夢から覚めて……\n現実もまた、夢の続きか）
1671 = "（Tỉnh giấc từ cơn mơ……\nLiệu hiện thực, cũng là sự tiếp nối của giấc mơ chăng）"
# monologue
# JP: あの事故のときと同様に、\nナビに、救い上げられている。
1562 = "Cũng giống như lúc xảy ra tai nạn năm đó,\ntôi lại được Navi cứu vớt."
# monologue
# JP: そうして、[おひとよ,2]御一夜――\n眼下に広がるこの町も、僕を間違いなく救ってくれた。
1628 = "Và lúc này, Ohimitera——\nthành phố trải dài dưới tầm mắt kia, cũng đã từng cứu rỗi tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……何年ぶりになるか」
1045 = "「……Đã bao nhiêu năm rồi nhỉ.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「六年四ヶ月ぶりです、双鉄様」　
1195 = "「Đã sáu năm bốn tháng rồi, ngài Soutetsu.」"
# monologue
# JP: 上空から見下ろす御一夜の町並みは、\n出て行ったときと、何も変わっていないように見える。
1592 = "Nhìn từ trên cao, quang cảnh thành phố Ohimitera\ncó vẻ như chẳng hề thay đổi so với lúc tôi rời đi."
# 【双鉄】
# display as 雙鐵
# JP: 「六年四ヶ月」
1194 = "「Sáu năm bốn tháng.」"
# monologue
# JP: だが――その内側は変わりつつある。\n僕の帰還を余儀なくするほど。
1610 = "Nhưng——bên trong nó đang dần thay đổi.\nĐến mức buộc tôi phải trở về."
# 【双鉄】
# display as 雙鐵
# JP: 「何かが変わるには十分な時間――いや。\n変わらずにいるには、長すぎる時間なのかもしれない」
1429 = "「Là khoảng thời gian đủ để một điều gì đó thay đổi——không.\nCó lẽ là quá dài để mọi thứ vẫn giữ nguyên như cũ.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました。\n同期間における御一夜市の変化をご報告します」
1278 = "「Đã rõ mệnh lệnh.\nXin báo cáo những thay đổi của thành phố Ohimitera trong cùng khoảng thời gian.」"
# monologue
# JP: 感傷的にすぎてしまったかもしれない呟きを――\n“意図的”に、ナビは曲解して返す。
1674 = "Những lời lẩm bẩm có lẽ quá đỗi đa cảm của tôi——\nđã bị Navi \"cố tình\" hiểu sai và đáp lại."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「行政に関しての最大の変化は、市長です。\n現在の市長には[ひない,1]雛衣・ポーレットが就任しています」
1390 = "「Sự thay đổi lớn nhất về mặt hành chính, chính là thị trưởng.\nThị trưởng hiện tại do Hinai Paulette đảm nhiệm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[ひない,1]雛衣というと、前の市長の？」
1450 = "「Hinai à, là của thị trưởng tiền nhiệm sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。ご息女です。\nしかし、行政手腕は遺伝しなかったとの評判です」
1329 = "「Vâng. Là con gái của ngài ấy.\nTuy nhiên, có nhiều đánh giá cho rằng năng lực hành chính không được di truyền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「世評が無能と断じているのは、前職か？　現職か？」
1391 = "「Dư luận đánh giá là vô năng, là người tiền nhiệm? Hay người hiện tại?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「後者のようです、双鉄様」
1176 = "「Có vẻ là người sau, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それゆえ、御一夜は衰退し、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致話が持ち上がったわけか？」
1224 = "「Ra là vậy. Vì thế nên Ohimitera mới suy thoái,\nvà câu chuyện thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; mới được đưa ra bàn tán sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その詳細まではわかりかねます」
1196 = "「Chi tiết về việc đó thì tôi không rõ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1238 = "「Ối chà.」"
# monologue
# JP: 声の調子は変わらない。
1641 = "Giọng điệu không hề thay đổi."
# monologue
# JP: が――少し怒って聞こえるのは、\n僕の気のせいだけなのだろうか。
1514 = "Nhưng——nghe có vẻ hơi tức giận,\nkhông biết có phải do tôi tưởng tượng không."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビ。お前も\x%lエアクラ;#00ffc040;エアクラ%l;#;の仲間だったな。\n気を悪くしたか？」
1461 = "「Navi. Cô cũng là đồng loại của \\x%lエアクラ;#00ffc040;Aircra%l;#; mà nhỉ.\nCó thấy phật ý không?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「まさか。ナビは物品ですので」
1394 = "「Làm gì có chuyện đó. Navi chỉ là vật phẩm thôi.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;――正式名称をエアロクラフテック機関。\nエアロ＝クラフテック社による“世界を変えた”発明品。
78 = "\\x%lエアクラ;#00ffc040;Aircra%l;#;——tên chính thức là Động cơ Aero-Craftech.\nLà phát minh \"thay đổi thế giới\" của công ty Aero-Craftech."
# monologue
# JP: 地磁気と太陽光とを利用する超高効率のその発動機は、\n化石燃料エンジンをほぼ、駆逐した。
1533 = "Loại động cơ siêu hiệu suất sử dụng địa từ và ánh sáng mặt trời đó,\ngần như đã loại bỏ hoàn toàn động cơ nhiên liệu hóa thạch."
# 【双鉄】
# display as 雙鐵
# JP: 「怒ってないなら良かったさ」
1344 = "「Không giận thì tốt rồi.」"
# monologue
# JP: 地上を行くもの、水面を行くもの、空を行くもの――
1554 = "Phương tiện di chuyển trên mặt đất, trên mặt nước, hay trên bầu trời——"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;機関を使う乗り物全ても、機関同様、\n単に“\x%lエアクラ;#00ffc040;エアクラ%l;#;”と総称される。
1516 = "Tất cả các phương tiện sử dụng động cơ \\x%lエアクラ;#00ffc040;Aircra%l;#;, cũng giống như động cơ,\nđều được gọi chung là \"\\x%lエアクラ;#00ffc040;Aircra%l;#;\"."
# 【双鉄】
# display as 雙鐵
# JP: 「お前のように優秀なナビを、\n敵に回したくはないからな」
1308 = "「Bởi vì tôi không muốn đối đầu\nvới một hệ thống dẫn đường xuất sắc như cô đâu.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「敵も味方も、双鉄様のご命令のままに。\nナビはあくまで物品ですので」
1350 = "「Địch hay bạn, đều tùy thuộc vào mệnh lệnh của ngài Soutetsu.\nNavi suy cho cùng chỉ là vật phẩm thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1239 = "「Hừm.」"
# monologue
# JP: ナビという物品。\x%lエアクラ;#00ffc040;エアクラ%l;#;・ナビ。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;とともに急発展し、一般にまで普及した擬似知能。
1637 = "Vật phẩm mang tên Navi. \\x%lエアクラ;#00ffc040;Aircra%l;#; Navi.\nTrí tuệ nhân tạo phát triển nhanh chóng cùng với \\x%lエアクラ;#00ffc040;Aircra%l;#;, và đã trở nên phổ biến trong đại chúng."
# monologue
# JP: “\x%l共感;#00ffc040;共感%l;#;運用”というその最大の特徴は、\n交通渋滞という概念を過去のものとした。
1589 = "Đặc điểm lớn nhất của nó là \"vận hành \\x%l共感;#00ffc040;cộng cảm%l;#;\",\nđã biến khái niệm tắc nghẽn giao thông trở thành dĩ vãng."
# 【双鉄】
# display as 雙鐵
# JP: 「お前たちは確かに便利な物品だよ。\nナビと\x%lエアクラ;#00ffc040;エアクラ%l;#;なしでは、移動一つさえ大騒動だ」
1181 = "「Các cô quả thực là những vật phẩm tiện lợi.\nNếu không có Navi và \\x%lエアクラ;#00ffc040;Aircra%l;#;, chỉ di chuyển thôi cũng là cả một vấn đề lớn.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その便利な物品を作る工場を、双鉄様は、\n御一夜に誘致してほしくはないとおっしゃっています」
1352 = "「Thế mà ngài Soutetsu lại nói,\nkhông muốn thu hút nhà máy sản xuất những vật phẩm tiện lợi đó về Ohimitera.」"
# monologue
# JP: 事実確認。\nの皮をかぶった、詰問としか聞こえない。
1621 = "Xác nhận sự thật.\nĐội lốt dưới lớp vỏ bọc đó, nghe chẳng khác gì một lời chất vấn."
# monologue
# JP: 世間一般のナビよりも、\nうちのはどうにも人間臭く思えてならない。
1614 = "So với những hệ thống Navi thông thường ngoài kia,\ncủa tôi cứ có cảm giác sặc mùi con người thế nào ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「エゴだがな。\nこの光景を目にしてしまえば――」
1422 = "「Đúng là ích kỷ thật.\nNhưng một khi đã chứng kiến khung cảnh này thì——」"
# monologue
# JP: 僕の意を酌み、ナビが機体を傾ける。
1623 = "Hiểu được ý tôi, Navi nghiêng thân máy bay."
# monologue
# JP: だから視線はすぐに捉える――眼下を流れる光の帯を。\n太陽の煌きを豊かに返す、御一夜の象徴、クマ川を。
1551 = "Nên ánh mắt tôi lập tức bắt lấy——dải sáng lấp lánh chảy dưới tầm mắt.\nCon sông Kuma, biểu tượng của Ohimitera, phản chiếu rực rỡ ánh mặt trời."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜以外に作って欲しいと思わずにはいられんのだ。\nここは、僕のもうひとつの故郷なのだから」
1359 = "「Không thể không mong muốn họ xây dựng nó ở nơi khác ngoài Ohimitera.\nBởi vì nơi này, là quê hương thứ hai của tôi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「承知しています。まもなく、目的地の[みぎたいちしゅぞうもと,5]右田一酒造元です。\n上空を一度通過しますか？」
1170 = "「Tôi hiểu rồi. Sắp tới điểm đến là xưởng rượu Migita System.\nNgài có muốn bay qua không phận một lần không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、着水前に一度上から見ておこう」
1168 = "「Cũng được, trước khi hạ cánh xuống nước thì nhìn từ trên cao một chút vậy.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました」
1289 = "「Đã rõ mệnh lệnh.」"
# monologue
# JP: 機体姿勢を即座に戻し、けれど航路は変更しない。
1601 = "Ngay lập tức điều chỉnh lại tư thế máy bay, nhưng không thay đổi đường bay."
# monologue
# JP: どうやら僕の“ご命令”は、\nあらかじめ予測されていたらしい。
1616 = "Có vẻ như \"mệnh lệnh\" của tôi,\nđã được dự đoán từ trước rồi."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「目的地上空です」
1213 = "「Đã đến không phận điểm đến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われずともだ」
1426 = "「Không cần cô nói tôi cũng biết.」"
# monologue
# JP: 見間違えようはずもない。\n古ぼけた瓦屋根、庭にずらりと並んだタンク。
1593 = "Không thể nào nhìn nhầm được.\nMái ngói cũ kỹ, những chiếc bồn chứa xếp hàng dài trong sân."
# monologue
# JP: 生家という言葉に習うのならば、僕の育家である\n――右田一酒造元の、その姿を。
1634 = "Nếu dùng từ nhà đẻ, thì đây chính là nhà nuôi của tôi\n——hình dáng của xưởng rượu Migita System."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「高度を下げた方がよろしいでしょうか？」
1452 = "「Ngài có muốn hạ độ cao xuống không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、仕事の邪魔になっては――おや？」
1163 = "「Không, lỡ làm phiền công việc của họ thì——ồ?」"
# monologue
# JP: はるか眼下に、豆粒のような人影が、\nなのに大きく動いている。
1648 = "Tít dưới tầm mắt, có một bóng người bé như hạt đậu,\nthế nhưng lại đang chuyển động rất mạnh."
# monologue
# JP: ぴょこぴょこ飛び跳ね、\nそれからダっ、と、蔵の中へと駆け込んでいく。
1560 = "Nhảy cẫng lên liên tục,\nrồi vút một cái, lao thẳng vào trong nhà xưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「[ひびき,2]日々姫か。相変わらずの様子だな。\n少しは大人になったかと想像していたのだが」
1326 = "「Hibiki à. Vẫn y như xưa nhỉ.\nTôi còn tưởng con bé đã trưởng thành hơn chút rồi chứ.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「明確な変化が見られます。\n以前の日々姫様には無い行動です」
1433 = "「Có thể thấy rõ sự thay đổi.\nĐây là hành động mà trước kia Hibiki không hề có.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――なるほど、確かに」
1240 = "「A——ra là vậy, đúng thật.」"
# monologue
# JP: 以前のままの日々姫ならば、\n“蔵へ駆け込み報告をする”などと決してしなかったろう。
1632 = "Nếu là Hibiki của trước kia,\nchắc chắn sẽ không bao giờ có chuyện \"lao vào xưởng để báo cáo\"."
# monologue
# JP: 良くて、機影をそのまま追ったか……\n虫の居所が悪ければ、知らん顔さえしたかもしれない。
1584 = "Cùng lắm là cứ thế đuổi theo bóng máy bay……\nCòn nếu tâm trạng không tốt, có khi con bé còn làm ngơ luôn ấy chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、実地で確かめるとしよう。\nナビ、最適地点に着水してくれ」
1323 = "「Vậy thì, hãy tự mình xác nhận xem sao.\nNavi, hạ cánh xuống nước tại địa điểm tối ưu đi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました。\n着水地点をサーチします」
1282 = "「Đã rõ mệnh lệnh.\nĐang tìm kiếm địa điểm hạ cánh.」"
# monologue
# JP: “試作機”だった\x%lエアクラ;#00ffc040;エアクラ%l;#;は、静かに高度を下げていく。
1597 = "Chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; từng là \"máy thử nghiệm\", lặng lẽ hạ độ cao."
# monologue
# JP: 十数年前の技術の粋は、\nいまだ、わずかな錆さえ見せない。
1535 = "Tinh hoa công nghệ từ mười mấy năm trước,\nđến nay vẫn không hề có lấy một vết rỉ sét."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「あと120秒で着水します。\n着水後は\x%l駐機;#00ffc040;駐機%l;#;モードに移行してよろしいですか？」
1275 = "「Còn 120 giây nữa sẽ hạ cánh xuống nước.\nSau khi hạ cánh, chuyển sang chế độ \\x%l駐機;#00ffc040;đỗ tàu bay%l;#; có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。頼む」
1254 = "「Ừm. Nhờ cô.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました。\n着水後、\x%l駐機;#00ffc040;駐機%l;#;モードに移行します」
1285 = "「Đã rõ mệnh lệnh.\nSau khi hạ cánh, sẽ chuyển sang chế độ \\x%l駐機;#00ffc040;đỗ tàu bay%l;#;.」"
# monologue
# JP: クマ川の水が近くなる。\n上から青に見えていたのが、深い緑に見えてくる。
1662 = "Nước sông Kuma ngày càng gần.\nTừ trên cao nhìn xuống màu xanh dương, giờ lại hiện ra màu xanh lục đậm."
# monologue
# JP: 着水し、ナビの\x%l翼端;#00ffc040;翼端%l;#;を歩いて渡り岸に下りれば――\n御一夜だ。
1659 = "Hạ cánh xuống nước, đi bộ qua \\x%l翼端;#00ffc040;đầu cánh%l;#; của Navi rồi bước lên bờ——\nlà Ohimitera."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「着水します。\n双鉄様――」
1223 = "「Hạ cánh xuống nước.\nNgài Soutetsu——」"
# monologue
# JP: 沈黙。\nナビにはありえないほど、長い沈黙。
1606 = "Im lặng.\nMột sự im lặng kéo dài đến khó tin đối với Navi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ナビ？」
1299 = "「Sao thế, Navi?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「『お疲れ様でした』と『いってらっしゃいませ』。\nどちらが適正なご挨拶でしょうか？」
1032 = "「『Ngài đã vất vả rồi』 và 『Chúc ngài đi đường bình an』.\nCâu chào nào mới là phù hợp?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1242 = "「À.」"
# monologue
# JP: 帰宅したときは『お疲れ様』。\n目的地についたときには『いってらっしゃい』。
1550 = "Khi về đến nhà thì là 『Ngài đã vất vả rồi』.\nKhi đến đích thì là 『Chúc ngài đi đường bình an』."
# monologue
# JP: それが、ナビのデフォルトの挨拶だ。
1646 = "Đó là câu chào mặc định của Navi."
# 【双鉄】
# display as 雙鐵
# JP: 「お前に任せる。\nどちらでもそう大差はないさ」
1445 = "「Tùy cô chọn.\nCâu nào cũng chẳng khác biệt mấy đâu.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令を了解しました。\nそれでは、双鉄様」
1280 = "「Đã rõ mệnh lệnh.\nVậy thì, ngài Soutetsu.」"
# monologue
# JP: そして、着水。\n立ったであろう水音は、川の流れにかき消される。
1677 = "Và rồi, hạ cánh xuống nước.\nTiếng nước bắn lên có lẽ đã bị dòng chảy của con sông nhấn chìm."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「『どうぞ、お気をつけていってらっしゃいませ』」
1029 = "「『Xin ngài hãy bảo trọng, đi đường bình an』」"
