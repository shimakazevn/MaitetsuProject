1371 = "「Xác nhận \\x%l砂撒き;#00ffc040;phun cát%l;#;. ……Không thấy \\x%l粘着力;#00ffc040;lực bám đường%l;#; tăng lên.\nCó nguy cơ trật bánh. Đề xuất giảm tốc độ.」"
# 【清美勝子】
# display as 司機
# JP: 「……やむなしね。\n[しずおか,1]靜岡での\x%l接続;#00ffc040;接続%l;#;は遅らせたくなかったんだけど」
1047 = "「……Hết cách rồi.\nTôi không muốn làm chậm trễ việc \\x%l接続;#00ffc040;kết nối chuyển tàu%l;#; ở Shizuoka đâu.」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「すぐに先方の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;へ\x%l共感;#00ffc040;共感%l;#;をつなぎ遅延連絡\n――っ！？　なっ！？　え？　もう一度っ！？」
1375 = "「Tôi sẽ lập tức kết nối \\x%l共感;#00ffc040;cộng cảm%l;#; với \\x%lレイルロオド;#00ffc040;Railord%l;#; phía trước để thông báo việc chậm trễ\n——っ!? Gì cơ!? Hả? Xin hãy nhắc lại!?」"
# 【清美勝子】
# display as 司機
# JP: 「なにかあったの？　報告を」
1207 = "「Có chuyện gì vậy? Báo cáo đi.」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「続報を――続報を速やかに送りなさい！\n沈黙は許しませんっ！　早く、早く続報をっ！」
1292 = "「Thông tin tiếp theo——Hãy gửi thông tin tiếp theo ngay lập tức!\nKhông được phép im lặng! Nhanh lên, mau gửi thông tin tiếp theo đi!」"
# 【清美勝子】
# display as 司機
# JP: 「冷静になり報告しなさいっ！」
1204 = "「Bình tĩnh lại và báo cáo đi!」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「っ！　――最大限の\x%l制動;#00ffc040;制動%l;#;をください。\n\x%l滑走;#00ffc040;滑走%l;#;せぬよう補助します」
1247 = "「っ! ——Xin hãy dùng \\x%l制動;#00ffc040;hãm phanh%l;#; tối đa.\nTôi sẽ hỗ trợ để không bị \\x%l滑走;#00ffc040;trượt bánh%l;#;.」"
# 【清美勝子】
# display as 司機
# JP: 「\x%l制動;#00ffc040;制動%l;#;了解。この速度から\x%l非常;#00ffc040;非常%l;#;は無理――よね」
1023 = "「Đã rõ \\x%l制動;#00ffc040;hãm phanh%l;#;. Với tốc độ này thì \\x%l非常;#00ffc040;phanh khẩn cấp%l;#; là không thể——rồi.」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「……これ以上は\x%l滑走;#00ffc040;滑走%l;#;します。\n限界です。制動力は足りません」
1041 = "「……Hơn nữa sẽ bị \\x%l滑走;#00ffc040;trượt bánh%l;#; mất.\nĐến giới hạn rồi. Lực hãm phanh không đủ.」"
# 【清美勝子】
# display as 司機
# JP: 「これでも\x%lロック;#00ffc040;ロック%l;#;？　どれだけ\x%l粘着力;#00ffc040;粘着力%l;#;落ちてるのよ」
1427 = "「Thế này mà cũng bị \\x%lロック;#00ffc040;bó bánh%l;#; á? \\x%l粘着力;#00ffc040;Lực bám đường%l;#; rốt cuộc đã giảm đến mức nào rồi.」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「これは……もう方法が」
1421 = "「Thế này thì……hết cách rồi.」"
# 【清美勝子】
# display as 司機
# JP: 「報告なさい。何の方法？　報告が一秒遅れるだけで、\n危険が何メートル近づくかわかってるでしょうに」
1398 = "「Báo cáo đi. Hết cách gì? Báo cáo chậm một giây thôi là\nnguy hiểm sẽ tiến gần thêm bao nhiêu mét, cô biết rõ mà.」"
# 【ハチロク】
# display as 鐵路人偶
# JP: 「状況未確定の事故報告。\x%l発報;#00ffc040;発報%l;#;は[キュウロクヨンニイ,3]9642\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n\x%l帝鉄貨物;#00ffc040;帝鉄貨物%l;#;。十五両\x%l編成;#00ffc040;編成%l;#;。全車両喪失の可能性あり」
1335 = "「Báo cáo sự cố tình trạng chưa xác định. \\x%l発報;#00ffc040;Phát tín hiệu báo động%l;#; từ \\x%lレイルロオド;#00ffc040;Railord%l;#; 9642.\n\\x%l帝鉄貨物;#00ffc040;Vận tải hàng hóa Đường sắt Hoàng gia%l;#;. \\x%l編成;#00ffc040;Đoàn tàu%l;#; mười lăm toa. Có khả năng toàn bộ toa xe đã bị tổn thất.」"
# 【清美勝子】
# display as 司機
# JP: 「十五両全部！？　って、詳細！」
1219 = "「Toàn bộ mười lăm toa!? Báo cáo chi tiết đi!」"
