# display as 司機
# JP: 「やってやるわよ。一世一代の仕事をね！」
1185 = "「Làm thôi. Đánh cược cả đời vào lần này!」"
# 【清美勝子】
# display as 司機
# JP: 「南無三っ！！！」
1443 = "「A Di Đà Phật!!!」"
