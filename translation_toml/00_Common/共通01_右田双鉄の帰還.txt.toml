# display as 帝鐵職員Ａ
# JP: 「ここだ！　落ちてない！　落ちてないぞっ！」
1262 = "「Ở đây! Không bị rơi! Không bị rơi xuống sông!」"
# 【右田泰斗】
# display as 帝鐵職員Ｂ
# JP: 「奇跡だな。止まってくれたというのか」
1266 = "「Đúng là kỳ tích. Dừng lại được rồi sao.」"
# 【帝鉄職員Ａ】
# display as 帝鐵職員Ａ
# JP: 「いや、転覆だ！　\x%l脱線転覆;#00ffc040;脱線転覆%l;#;！！\nだが、全滅よりはよほどマシだっ！！」
1160 = "「Không, lật rồi! \\x%l脱線転覆;#00ffc040;Trật bánh lật tàu%l;#;!!\nNhưng thế này vẫn còn tốt chán so với bị diệt vong toàn bộ!!」"
# 【右田泰斗】
# display as 帝鐵職員Ｂ
# JP: 「ぅ……む――これは――先頭\x%l客車;#00ffc040;客車%l;#;、特にひどいな――\nおい、探すんだ。生存者を探して救助しろ」
1423 = "「Ư……ừm——Đây là——\\x%l客車;#00ffc040;toa hành khách%l;#; dẫn đầu, tình trạng tồi tệ quá——\nNày, mau tìm đi. Tìm xem có người sống sót không rồi cứu hộ.」"
