3523 = "Khi \\x%l列車;#00ffc040;đoàn tàu%l;#; bắt đầu chuyển động với một\nrung động nhẹ, bên trong toa xe ngay lập\ntức\nngập tràn tiếng xì xào của hành khách."

# monologue
# JP: （学園生がほとんど、だな――\n通園の足としての需要がある、ということか）
3546 = "（Hầu hết đều là học sinh nhỉ——\nNghĩa là có nhu cầu sử dụng làm phương\ntiện đi học sao.）"

# monologue
# JP: \x%l列車;#00ffc040;列車%l;#;は、御一夜へと戻っている。
