3293 = "Có lẽ vì sự thoải mái trên đường về nhà,\ncác học sinh đang trò chuyện với nhau rất\nvô tư."

# 【女子Ａ】
# display as 女性Ａ
# JP: 「要救助者ってあん人？　ちょっとかっこよくない？」
