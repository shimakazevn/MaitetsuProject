# lines: 429 
# 【ポーレット】
# display as 波萊特
# JP: 「お客様にお知らせします。お急ぎのところ、\n非常停止へのご協力をありがとうございました」
2690 = "「Xin thông báo đến quý hành khách. Cảm ơn\nquý vị đã hợp tác\ntrong việc dừng khẩn cấp dù đang vội.」"

# monologue
# JP: 乗客に向け、ポーレットは声を響かせる。
3363 = "Hướng về phía hành khách, giọng của\nPaulette vang lên."

# monologue
# JP: 僕と話していたときと、ガラリと人が変わったような、\n明瞭で、堂々とした物言いで。
3330 = "Như thể hoàn toàn biến thành một người\nkhác so với lúc nói chuyện với tôi,\ncách nói chuyện của cô ấy rõ ràng và đầy\nuy nghiêm."

# 【ポーレット】
# display as 波萊特
# JP: 「ただいま、要救助機の回復を確認しました。\n要救助者を収容し、この\x%l列車;#00ffc040;列車%l;#;はまもなく発車いたします」
2597 = "「Hiện tại, chúng tôi đã xác nhận thiết bị\ncần cứu hộ đã phục hồi.\nSau khi tiếp nhận người cần cứu hộ, \\x%l列車;#00ffc040;đoàn tàu%l;#;\nnày sẽ khởi hành ngay.」"

# monologue
# JP: アナウンスを終え、浅く一礼。\nポーレットはすぐ車両最前部の運転席へ。
2993 = "Kết thúc thông báo, cô ấy khẽ cúi chào.\nPaulette lập tức tiến về ghế lái ở phía\nđầu toa xe."

# monologue
# JP: その着席を待ってれいなが指差し確認、\x%l喚呼;#00ffc040;喚呼%l;#;する。
3452 = "Chờ cô ấy ngồi xuống, Reina chỉ tay xác\nnhận, rồi \\x%l喚呼;#00ffc040;hô xác nhận%l;#;."

# 【れいな】
# display as 玲奈
# JP: 「出発。進行！」
2204 = "「Xuất phát. Tiến lên!」"

# monologue
