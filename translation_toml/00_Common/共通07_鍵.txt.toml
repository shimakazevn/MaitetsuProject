[script]
# lines: 338 
# 【日々姫】
# display as 日日姬
# JP: 「兄さん。箸が進まれてないようですが」
1770 = "「Anh trai. Có vẻ anh không đụng đũa mấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――ああ、うん」
1667 = "「Không——a, ừm.」"
# monologue
# JP: 明白すぎる事実に対して、否定をしても仕方ない。
2569 = "Đối với một sự thật quá rõ ràng, có phủ nhận cũng vô ích."
# monologue
# JP: ウソをつかず。角も立てぬ。\nそうした言葉を、ゆっくり選ぶ。
2419 = "Không nói dối. Cũng không làm mất lòng.\nTôi cẩn thận lựa chọn những từ ngữ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「夢を見たせいで眠りが浅かったようでな。\n少し、寝不足ぎみなのだと思う」
1709 = "「Hình như anh ngủ không sâu giấc vì mơ thấy gì đó.\nChắc là hơi thiếu ngủ một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さんが寝不足ですか？　珍しい。\n今までの疲れが出たのかもしれませんね」
1768 = "「Anh trai mà cũng thiếu ngủ sao? Hiếm thấy thật.\nCó lẽ là do những mệt mỏi từ trước đến giờ đã bộc phát ra đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「んっ」
1775 = "「Ưm.」"
# monologue
# JP: ぼりぼりと、石炭を噛み砕いていた音が止む。
2340 = "Tiếng nhai than đá rào rạo dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「旅疲れという奴か？\nそれほどヤワでは無いつもりだ」
1935 = "「Là do đi đường xa mệt mỏi sao?\nAnh không nghĩ mình yếu ớt đến vậy đâu.」"
# monologue
# JP: 疲れがあるなどといってしまえば、\n昨夜の\x%l投炭;#00ffc040;投炭%l;#;練習をハチロクは必ず気にするだろう。
2593 = "Nếu nói là do mệt mỏi,\nchắc chắn Hachiroku sẽ để tâm đến buổi tập \\x%l投炭;#00ffc040;ném than%l;#; đêm qua."
# monologue
# JP: そして疲れは精神的なものだと言えば――\n日々姫はあれこれ、考えすぎてしまうのだ。
2255 = "Còn nếu nói là do mệt mỏi tinh thần——\nthì Hibiki lại suy nghĩ quá nhiều mất."
# 【双鉄】
# display as 雙鐵
# JP: 「足りないのはただ、睡眠時間だ。\n今夜はぐっすり眠るためにも、しっかり食べて頑張るさ」
1922 = "「Thứ anh thiếu chỉ là thời gian ngủ thôi.\nĐể đêm nay ngủ ngon, anh sẽ ăn thật no và cố gắng.」"
# monologue
# JP: 半ば無理やり箸を動かし、胃へと食事を落としこむ。
2408 = "Tôi gần như ép buộc bản thân cầm đũa lên, và đưa thức ăn vào dạ dày."
# monologue
# JP: つられたようにまたボリボリ、\nハチロクも石炭を砕き始める。
2276 = "Như bị cuốn theo, Hachiroku cũng bắt đầu\nnhai than rào rạo trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、うまい」
1805 = "「Ừm, ngon thật.」"
# monologue
# JP: 酒蔵の育ちだからというわけでもなかろうが、\n真闇姉も日々姫も、僕なぞより遥かに舌が鋭敏だ。
2273 = "Không hẳn là vì lớn lên ở xưởng rượu,\nnhưng vị giác của chị Mayami và Hibiki nhạy bén hơn tôi rất nhiều."
# monologue
# JP: この家の食卓で、ただの一度も、\nまずいと思う食事を、僕はいただいたことが無い。
2348 = "Trên bàn ăn của gia đình này, chưa một lần nào,\ntôi phải ăn một bữa ăn mà mình cảm thấy dở tệ."
# 【双鉄】
# display as 雙鐵
# JP: 「だご汁はいいな。\n『ああ、御一夜だ』という気がするよ」
1830 = "「Canh Dago ngon thật đấy.\nCảm giác đúng kiểu 'A, Ohimitera đây rồi'.」"
# monologue
# JP: 言った途端に、ぱあっと日々姫が笑顔を咲かす。
2612 = "Tôi vừa dứt lời, khuôn mặt Hibiki liền nở một nụ cười rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「私が作ったと！　今日のだご汁」
1693 = "「Là em nấu đó! Canh Dago hôm nay ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか。うん――（ずずっ――）\n懐かしい味だな。右田の味だ」
1963 = "「Vậy sao. Ừm——(sụp sụp——)\nHương vị hoài niệm thật. Đúng là hương vị của nhà Migita.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ～！　ね、にぃにぃ、良かよ？　おかわり。\nたくさん作ってあるけんね」
1812 = "「Hì hì~! Nè, anh hai, ăn thêm không? Em lấy thêm cho nhé.\nEm làm nhiều lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だごは案外、腹にたまる。\nそうたくさんは食べれんさ」
1829 = "「Dago ăn vào no lâu lắm.\nAnh không ăn được nhiều thế đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「だご？　とは何でしょう。お魚ですか？」
1832 = "「Dago? Là gì vậy ạ. Là cá sao?」"
# monologue
# JP: ハチロクの素朴な疑問に、\n日々姫はニコっと、誇らしげな笑みを輝かす。
2579 = "Trước thắc mắc ngây ngô của Hachiroku,\nHibiki mỉm cười, nụ cười rạng rỡ đầy tự hào."
# 【日々姫】
# display as 日日姬
# JP: 「だごは、お団子。小麦粉で作るお団子のこと。\nそれをお味噌とお野菜と鶏でお汁にしたのが、だご汁」
1831 = "「Dago là bánh Dango. Là bánh Dango làm từ bột mì ấy.\nNấu thành canh cùng với tương miso, rau củ và thịt gà thì gọi là canh Dago.」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど、“だご”はお団子ですか。\n甘いお団子も、だごなのですか？」
1815 = "「Ra là vậy, \"Dago\" là bánh Dango sao.\nVậy bánh Dango ngọt cũng là Dago ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。いわれてみれば――」
1787 = "「À, không. Nhắc mới nhớ——」"
# monologue
# JP: 産まれこそは帝都だが、育ちのいくらかは御一夜だ。\n問われればすぐに思い当たる。
2636 = "Dù sinh ra ở Đế đô, nhưng tôi cũng lớn lên ở Ohimitera một thời gian.\nNên khi được hỏi, tôi liền nhớ ra ngay."
# 【双鉄】
# display as 雙鐵
# JP: 「隈元では『やにわに団子』というのを売っているな。\n芋で作った甘いヤツだが、あれは“だんご”と発音する」
2130 = "「Ở Kumamoto có bán loại bánh tên là 'Yaniwani Dango' nhỉ.\nLà loại bánh ngọt làm từ khoai lang, nhưng cái đó lại phát âm là \"Dango\".」"
# 【日々姫】
# display as 日日姬
# JP: 「土産物屋さんではそう言ってますね。\nけど、地元ではあれも、『やにわにだご』です」
2031 = "「Ở các cửa hàng lưu niệm thì người ta gọi thế ạ.\nNhưng ở địa phương thì cái đó cũng gọi là 'Yaniwani Dago' luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
1737 = "「Ra là vậy.」"
# monologue
# JP: やはりネイティブにはかなわない。
2298 = "Quả nhiên là không thể sánh bằng dân bản địa được."
# 【ハチロク】
# display as 八六
# JP: 「やにわに、とはヘンな名前のお団子ですね？\nヤニとワニで作るお団子ですか？」
1719 = "「Yaniwani, tên bánh Dango gì kỳ lạ vậy ạ?\nLà bánh Dango làm từ nhựa cây (Yani) và cá sấu (Wani) sao?」"
# monologue
# JP: ……味覚や食材の感覚が人間とは違うのだろう。\nハチロクの顔は至って真面目だ。
1403 = "……Có lẽ vị giác và cảm nhận về nguyên liệu của em ấy khác với con người.\nKhuôn mặt Hachiroku vô cùng nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「そうではない。たしか、\n『やにわに来客があってもすぐ出せる団子』の意の筈だ」
1670 = "「Không phải đâu. Nếu anh nhớ không nhầm,\nnghĩa của nó là 'loại bánh Dango có thể mang ra tiếp đãi ngay cả khi có khách đến bất chợt (yaniwani)' thì phải.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ。パッと作れてパッと出せるから、やにわにだご」
1866 = "「Đúng rồi. Vì làm nhanh gọn, dọn ra cũng nhanh gọn, nên gọi là Yaniwani Dago.」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど。お手軽なお団子というわけですか」
1954 = "「Ra là vậy. Nghĩa là loại bánh Dango tiện lợi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、味の方も、やにわになりだ。好みもあるだろうが、\n僕としては、このだご汁の足元にも及ばんと――む」
1673 = "「Chà, hương vị thì cũng chỉ ở mức 'yaniwani' thôi. Tùy khẩu vị mỗi người,\nnhưng với anh thì nó còn xách dép cho món canh Dago này——hửm.」"
# monologue
# JP: いつの間にか、汁椀も飯碗も空になっている。
2243 = "Không biết từ lúc nào, cả bát canh lẫn bát cơm đều đã trống trơn."
# monologue
# JP: 夢に気持ちを沈められ、\n食欲も減じていたのだが――
2411 = "Tâm trạng bị chùng xuống vì giấc mơ,\nthực sự tôi cũng chẳng có cảm giác thèm ăn——"
# 【日々姫】
# display as 日日姬
# JP: 「な、なんね？　にぃに――んんっ、\n何ですか兄さん、じっと見たりして」
1893 = "「Ủa, gì vậy anh hai... ý em là,\ncó chuyện gì thế anh Soutetsu, sao cứ nhìn chằm chằm em vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　わたくしの顔、\nまさか、石炭クズがついているのですか？」
2136 = "「Ngài Soutetsu? Trên mặt em,\nkhông lẽ bị dính vụn than sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや」
2003 = "「Không không.」"
# monologue
# JP: “現実は夢よりよほど強い”と思っただけだ。
2316 = "Tôi chỉ nghĩ là \"Hiện thực mạnh mẽ hơn giấc mơ rất nhiều\" thôi."
# monologue
# JP: が、それを口にしたなら、\n日々姫は何かを察してしまうかもしれん。
2245 = "Nhưng nếu tôi nói ra điều đó,\nHibiki có thể sẽ lờ mờ đoán ra được chuyện gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ごちそうさまでした」
1923 = "「Cảm ơn vì bữa ăn.」"
# monologue
# JP: 食事を終えて会話も同時に断ち切れば、\nハチロクも、ごくごく自然にその後を追う。
2335 = "Kết thúc bữa ăn và đồng thời cắt đứt cuộc trò chuyện,\nHachiroku cũng vô cùng tự nhiên hùa theo."
# 【ハチロク】
# display as 八六
# JP: 「御馳走様でございました」
1835 = "「Cảm ơn vì bữa ăn ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、お粗末様」
1857 = "「Vâng, không có gì.」"
# 【真闇】
# display as 真闇
# JP: 「お客さんばい」
1984 = "「Có khách đến kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1762 = "「Ối.」"
# monologue
# JP: あまりにもタイミングの良い真闇姉の声――\nいや、食事が終わるのを待っていてくれたということか。
2560 = "Giọng nói của chị Mayami vang lên quá đỗi đúng lúc——\nKhông, có lẽ chị ấy đã đợi chúng tôi ăn xong mới lên tiếng."
# monologue
# JP: 日々姫はすぐさま立ち上がり、\n「手伝う」というハチロクを制して食器を下げる。
2483 = "Hibiki lập tức đứng dậy,\nngăn Hachiroku đang định \"giúp một tay\" lại rồi dọn dẹp bát đĩa."
# 【双鉄】
# display as 雙鐵
# JP: 「客とは？」
1690 = "「Khách nào vậy chị?」"
# 【真闇】
# display as 真闇
# JP: 「市長さん。\n雛衣さんとこのポーちゃんたい」
1967 = "「Thị trưởng.\nBé Po nhà Hinai ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーちゃん」
1868 = "「Bé Po.」"
# 【真闇】
# display as 真闇
# JP: 「なんね、不思議そうな声。知っとっとよね？　\n双ちゃんとハチロクちゃんに会いに来よるし」
1898 = "「Sao thế, giọng điệu nghe có vẻ ngạc nhiên vậy. Em biết con bé mà đúng không?\nCon bé đến tìm Sou-chan và bé Hachiroku đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。今行く」
1777 = "「À, vâng. Em ra ngay đây.」"
# 【真闇】
# display as 真闇
# JP: 「よかよ。あがってもらうけんね」
2068 = "「Được rồi. Chị bảo con bé vào nhà nhé.」"
# monologue
# JP: 真闇姉の足音はとても静かだ。
2564 = "Tiếng bước chân của chị Mayami rất khẽ."
# monologue
# JP: それに混じってとたとたと、\n食器を下げる日々姫の足音。
2356 = "Lẫn trong đó là tiếng bước chân lạch cạch,\ncủa Hibiki đang dọn dẹp bát đĩa."
# 【ハチロク】
# display as 八六
# JP: 「……昨日のお話、の続きでしょうね」
1445 = "「……Chắc là tiếp tục, câu chuyện ngày hôm qua nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
1906 = "「Chắc là vậy.」"
# monologue
# JP: ハチロクの声に交じる緊張。
2286 = "Sự căng thẳng pha lẫn trong giọng nói của Hachiroku."
# monologue
# JP: 必要無い、と伝えるために、\n小さな頭をぽんっ、と撫ぜる。
2425 = "Để nói với em ấy rằng không cần phải căng thẳng,\ntôi xoa nhẹ lên cái đầu nhỏ bé đó một cái."
# 【双鉄】
# display as 雙鐵
# JP: 「むしろ助かる、とでも思っておけ。\n探しものなら、目と手は多い方がいい」
1702 = "「Cứ coi như là có người đến giúp đi.\nTìm đồ thì càng có nhiều mắt nhiều tay càng tốt mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「全長が16.7[メートル]m、全高が3.8m。\n機関車だけでも、\x%l運転整備重量;#00ffc040;運転整備重量%l;#;が39.8[トン]tもあるんです」
1723 = "「Tổng chiều dài là 16.7m, tổng chiều cao là 3.8m.\nChỉ tính riêng đầu máy thôi, \\x%l運転整備重量;#00ffc040;khối lượng chỉnh bị vận hành%l;#; đã lên tới 39.8 tấn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1810 = "「Hừm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「これに目一杯に積載した\x%l炭水車;#00ffc040;[たんすいしゃ,2]炭水車%l;#;を加えると、\nその総重量は、83.3tにも及びます」
1735 = "「Nếu cộng thêm \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; chở đầy tải nữa,\nthì tổng trọng lượng của nó lên tới 83.3 tấn lận.」"
# monologue
# JP: 整備ボディのれいなにじいっと見守られる中、\nポーレットがなにやら真剣に説明している。
2525 = "Dưới ánh mắt chăm chú theo dõi của Reina trong \\x%l整備体;#00ffc040;thân chính%l;#;,\nPaulette đang nghiêm túc giải thích điều gì đó."
# monologue
# JP: ……真剣なのは伝わるのだが、\n話の中身が、僕には今ひとつ理解しがたい。
1413 = "……Tôi cảm nhận được sự nghiêm túc của cô ấy,\nnhưng nội dung câu chuyện thì tôi lại không hiểu lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。僕は\x%l8620;#00ffc040;8620%l;#;の所在が不明だという話を\nしたつもりだったんだが」
1941 = "「Xin lỗi. Tôi tưởng chúng ta đang nói về chuyện\n\\x%l8620;#00ffc040;8620%l;#; bị mất tích chứ.」"
# monologue
# JP: 素直に問えば、\nポーレットは一瞬にしてわたわたとした顔になる。
2580 = "Khi tôi hỏi thẳng,\nkhuôn mặt Paulette ngay lập tức trở nên lúng túng."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ですから、そのっ……大きさと重さの説明を」
1783 = "「A……vậy nên, cái đó……tôi đang giải thích về kích thước và trọng lượng của nó.」"
# 【れいな】
# display as 玲奈
# JP: 「重たいんですよぉ、\x%l8620;#00ffc040;8620%l;#;は。\nれいなのキハ[レイナナエス,3]07-sが全長19.7mで総重量27.2tですからぁ」
1417 = "「\\x%l8620;#00ffc040;8620%l;#; nặng lắm đó nha~.\nKiha 07S của Reina tổng chiều dài 19.7m mà tổng trọng lượng cũng chỉ có 27.2 tấn thôi đó~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1965 = "「Ra là vậy.」"
# monologue
# JP: ふんわりとした助け舟。\nおかげで理解が繋がった。
2346 = "Một lời giải vây nhẹ nhàng.\nNhờ đó mà tôi đã xâu chuỗi được vấn đề."
# 【双鉄】
# display as 雙鐵
# JP: 「それほどに大きく重い物であれば、\nそう簡単に格納も移動も出来ない、ということになるか」
1711 = "「Một thứ to lớn và nặng nề như vậy,\nthì không thể dễ dàng cất giấu hay di chuyển được, ý cô là vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。大廃線以降は特に……\n路線網、ずたずたに分断されちゃいましたから」
1974 = "「Vâng. Đặc biệt là sau cuộc Đại bãi bỏ……\nMạng lưới đường sắt đã bị chia cắt tan nát rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1727 = "「Hachiroku.」"
# monologue
# JP: 僕のとなりで座布団の上、正座しているハチロクは、\n唇を固く結んだままに、呼びかけに応じ顔をもたげる。
2288 = "Hachiroku đang ngồi seiza trên tấm đệm bên cạnh tôi,\nmím chặt môi, ngẩng mặt lên đáp lại tiếng gọi."
# 【双鉄】
# display as 雙鐵
# JP: 「思い出せないか？　自分がいつごろ、\n汰斗さんに連れられ、この御一夜にやってきたのか」
1700 = "「Em không nhớ được sao? Khoảng thời gian nào,\nem được ông Taito đưa đến Ohimitera này.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1977 = "「Vâng.」"
# monologue
# JP: すでに試したことなのだろう。\n淡々としたハチロクの声は、かえって、どこか悲しく響く。
2280 = "Có lẽ em ấy đã thử nhớ lại rồi.\nGiọng nói đều đều của Hachiroku, ngược lại, nghe có chút gì đó buồn bã."
# 【ハチロク】
# display as 八六
# JP: 「申し訳ないことなのですが――\n汰斗様とご一緒であったかどうかさえ、定かでは」
2137 = "「Thật sự rất xin lỗi ngài——\nNhưng ngay cả việc em có đi cùng ông Taito hay không, em cũng không chắc nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「タイト……右田汰斗」
1992 = "「Taito……Migita Taito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知っている――のだよな。\n右田のことは」
1753 = "「Cô biết——đúng không.\nChuyện của nhà Migita ấy.」"
# monologue
# JP: 市長であるから。右田は高額納税者だから。\nポーレットはそう言っていた。
2531 = "Vì cô ấy là thị trưởng. Vì nhà Migita là người nộp thuế nhiều nhất.\nPaulette đã nói như vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、あの……鉄道にかかわる人間として、\nええと……パパから」
2099 = "「Nói đúng hơn thì, à ừm……với tư cách là một người liên quan đến đường sắt,\nà thì……từ bố tôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「注意されとーと？」
2082 = "「Được dặn dò phải cẩn thận sao?」"
# monologue
# JP: 澄まし顔して黙って話を聞いてた日々姫が、\n興味津々に質問してくる。
2486 = "Hibiki nãy giờ vẫn giữ vẻ mặt tỉnh bơ im lặng lắng nghe,\nbỗng nhiên tò mò đặt câu hỏi."
# monologue
# JP: ポーレットが困ったように僕を見るから、頷き返す。\n汰斗さんの評価が割れていることならば、承知している。
2527 = "Thấy Paulette nhìn tôi với vẻ bối rối, tôi gật đầu đáp lại.\nChuyện đánh giá về ông Taito có nhiều ý kiến trái chiều, tôi cũng biết mà."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……鉄道にかまけて右田の酒蔵を傾けた……\nそういう人だから、その……反面教師にするようにって」
2025 = "「À ừm……bố tôi bảo ông ấy là người vì quá đắm chìm vào đường sắt mà làm khuynh gia bại sản xưởng rượu Migita……\nlà một người như vậy, nên……hãy lấy đó làm tấm gương xấu.」"
# 【日々姫】
# display as 日日姬
# JP: 「良か教えばいっ！　――んんっ！　ええと、兄さん？\nそのあたりが世間の評価なようですよ？」
2073 = "「Dạy chí lý lắm! ——Hừm! À ừm, anh trai?\nCó vẻ như đó là đánh giá của người đời đấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「らしいな」
2041 = "「Có vẻ vậy nhỉ.」"
# monologue
# JP: 僕が引き取られ右田の子となり、\nしばらくして汰斗さんが亡くなってのち――
2376 = "Sau khi tôi được nhận nuôi và trở thành con cái nhà Migita,\nmột thời gian sau ông Taito qua đời——"
# monologue
# JP: 右田には、ものすごい数の借金取りが押し寄せてきた。\n汰斗さんが引き取ってきた僕は、針の筵に追いやられた。
2539 = "Một lượng lớn những kẻ đòi nợ đã ập đến nhà Migita.\nTôi, người được ông Taito nhận nuôi, đã bị đẩy vào tình thế như ngồi trên đống lửa."
# monologue
# JP: （日々姫と真闇姉とが必死にかばってくれなかったら――\n僕はとうに、右田の姓も失ってしまっていたのだろうな）
2655 = "（Nếu Hibiki và chị Mayami không liều mạng bảo vệ tôi——\nthì có lẽ tôi đã đánh mất cái họ Migita từ lâu rồi.）"
# monologue
# JP: 膨大な借金。遠慮のかけらも無い催促。\n己の利益だけを求める者達が口々にする要求、要求。
2384 = "Khoản nợ khổng lồ. Những lời hối thúc không chút kiêng dè.\nNhững kẻ chỉ mưu cầu lợi ích cá nhân liên tục đưa ra những yêu cầu, yêu sách."
# monologue
# JP: 真闇姉がそれにどれほど苦しめられたか――\n僕も、日々姫も、目の当たりにして知っている。
2562 = "Chị Mayami đã phải khổ sở đến nhường nào vì chuyện đó——\nCả tôi và Hibiki đều tận mắt chứng kiến và thấu hiểu."
# 【日々姫】
# display as 日日姬
# JP: 「らしいなって、そんな他人ごとみたいに、にぃにぃ～」
1691 = "「Có vẻ vậy nhỉ, anh nói cứ như chuyện của ai khác ấy, anh hai~」"
# monologue
# JP: だから、日々姫の汰斗さんへの点は辛い。\nけれど――僕の感謝は、むしろだからこそ深いのだ。
2443 = "Chính vì vậy, Hibiki đánh giá rất khắt khe về ông Taito.\nNhưng——sự biết ơn của tôi đối với ông ấy, ngược lại, càng sâu sắc hơn chính vì lẽ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「他人ごととは思わんさ。僕と日々姫を、真闇姉を――\n家族にしてくれた人が、汰斗さんだと思っているから」
2040 = "「Anh không nghĩ đó là chuyện của người khác đâu. Bởi vì anh nghĩ người đã biến anh, Hibiki, và chị Mayami——\nthành một gia đình, chính là ông Taito mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ……」
1793 = "「Ưm……」"
# monologue
# JP: ふくらみかけてた日々姫の頬が、すうっとへこむ。
2476 = "Đôi má vừa mới phồng lên của Hibiki liền xẹp xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が言う立場でもなかろうが――人間万事塞翁が馬だ。\nなにが幸いで災いかなど、生きてる間には定まらんさ」
2132 = "「Tuy anh không có tư cách để nói điều này——nhưng nhân gian vạn sự tái ông thất mã.\nChuyện gì là phúc, chuyện gì là họa, khi còn sống chẳng thể nào định đoạt được đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「言う立場たい！　私、にぃにぃの妹やけん」
2074 = "「Có tư cách chứ! Em là em gái của anh hai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。ありがとう」
1808 = "「Ừ, đúng vậy nhỉ. Cảm ơn em.」"
# monologue
# JP: 日々姫の気持ちが素直に嬉しく頭を下げる。
2416 = "Tôi thực sự rất vui trước tấm lòng của Hibiki, khẽ cúi đầu cảm ơn con bé."
# monologue
# JP: 日々姫は顔を真っ赤にそめて、\nそれからぶんぶん首を振り、こほん、とひとつ咳払いする。
2487 = "Khuôn mặt Hibiki đỏ bừng lên,\nrồi con bé lắc đầu nguầy nguậy, hắng giọng một cái."
# 【日々姫】
# display as 日日姬
# JP: 「すみません。[きょうだい,1]兄妹ゲンカなんてお見せしてしまって」
1937 = "「Xin lỗi. Lại để cô thấy cảnh anh em cãi nhau rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、そんな。\nわたしが余計なこといってしまったせいで」
1676 = "「Không, đâu có.\nLà do tôi đã lỡ lời nói chuyện bao đồng thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「余計じゃなかっ！　正しかことばいっ！！」
1669 = "「Không bao đồng chút nào! Cô nói đúng mà!!」"
# monologue
# JP: また方言を丸出しにして、日々姫はあっ！　と口を抑える。
2479 = "Lại lỡ thốt ra tiếng địa phương, Hibiki khẽ kêu lên một tiếng \"A!\" rồi bịt miệng lại."
# monologue
# JP: やがて小さく、どちらからともなく吹出せば、\nくすくす、あはははと、笑いはふくらみ重なっていく。
2249 = "Một lúc sau, không biết từ ai, một tiếng cười nhỏ bật ra,\nrồi những tiếng cười khúc khích, ha ha ha cứ thế lớn dần và hòa quyện vào nhau."
# 【ハチロク】
# display as 八六
# JP: 「まぁ。\nまさしく塞翁が馬ですね、双鉄様」
1799 = "「Chà.\nĐúng là tái ông thất mã ngài nhỉ, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1962 = "「Đúng vậy.」"
# monologue
# JP: なまじ顔見知りであるためか、日々姫とポーレットとは、\n妙に意識しあってたようだが、これでほぐれることだろう。
2439 = "Có lẽ vì đã từng gặp mặt nên Hibiki và Paulette\ncó vẻ hơi dè chừng nhau một cách kỳ lạ, nhưng qua chuyện này chắc sẽ thoải mái hơn thôi."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の所在不明を己の恥と思い込み、\n頑なだったハチロクさえもが――――ああ、いや、そうか。
2381 = "Ngay cả Hachiroku, người luôn coi việc không rõ tung tích của \\x%l8620;#00ffc040;8620%l;#; là nỗi nhục nhã của bản thân\nvà tỏ ra bướng bỉnh――――à, không, ra là vậy."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2135 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだ。\n何が幸いするかなど、その時にならねば全くわからん」
2004 = "「Đúng là vậy.\nĐiều gì sẽ mang lại may mắn, nếu chưa đến lúc thì hoàn toàn không thể biết trước được.」"
# monologue
# JP: 借金問題が発覚したとき、真闇姉は既に右田一酒造の\x%l杜氏;#00ffc040;杜氏%l;\n#;――右田家の実質的な当主だった。
2547 = "Khi vấn đề nợ nần bị vỡ lở, chị Mayami đã là \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; của xưởng rượu Migita\n——tức là đương gia thực sự của nhà Migita."
# monologue
# JP: その真闇姉に、右田に連なる者の多くは、\n「汰斗がらみのものの全てを処分しろ」と詰め寄ったのだ。
2444 = "Rất nhiều người có liên quan đến nhà Migita đã dồn ép chị Mayami,\nyêu cầu \"hãy thanh lý toàn bộ những thứ liên quan đến Taito đi\"."
# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクがここで眠りつづけていたことも、\n汰斗さんと真闇姉とのおかげだ」
1442 = "「……Việc Hachiroku có thể tiếp tục an giấc ở đây,\ncũng là nhờ có ông Taito và chị Mayami.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1977 = "「是的」" 
# monologue
# JP: “汰斗がらみのものの全て”には当然、僕も含まれる。
1400 = "\"Toàn bộ những thứ liên quan đến Taito\", tất nhiên, cũng bao gồm cả tôi."
# monologue
# JP: そして真闇姉は――\nその要求を真正面から突っぱねてくれたのだ。
2578 = "Và chị Mayami——\nđã thẳng thừng từ chối yêu cầu đó."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、汰斗さんに関する全てを放置した。\n全てはそのまま、僕の部屋の次の間に押し込められてる」
2052 = "「Chị Mayami đã giữ lại toàn bộ những thứ liên quan đến ông Taito.\nTất cả vẫn còn nguyên vẹn, được cất giữ trong phòng bên cạnh phòng của tôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
1786 = "「A!」"
# monologue
# JP: 掃除を熱心に手伝ってくれ、それゆえ多くの荷物に触れた、\n日々姫がパン！　と手を鳴らす。
2435 = "Hibiki, người đã nhiệt tình giúp tôi dọn dẹp và nhờ đó chạm vào rất nhiều đồ đạc,\nvỗ tay một cái bốp!"
# 【日々姫】
# display as 日日姬
# JP: 「書類とか本とか、山のようにありましたよね、確かに。\nなら兄さん、あの中に――」
1931 = "「Đúng là có cả núi tài liệu với sách vở nhỉ.\nVậy thì anh trai, trong đống đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ハチロクと\x%l8620;#00ffc040;8620%l;#;の移送に関する記録もあるいは、\n手付かずで残っているかも」
1796 = "「Ừ. Có thể những ghi chép liên quan đến việc vận chuyển Hachiroku và \\x%l8620;#00ffc040;8620%l;#;,\nvẫn còn được lưu giữ nguyên vẹn ở đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしもお手伝いします。\nううん、させてください」
1911 = "「Tôi cũng sẽ giúp một tay.\nKhông, xin hãy để tôi giúp.」"
# monologue
# JP: ポーレットのおどおどが消えている。
2532 = "Vẻ rụt rè của Paulette đã biến mất."
# monologue
# JP: 御一夜鉄道社長として、御一夜市長として――\n\x%l8620;#00ffc040;8620%l;#;を発見し、そこに未来を見出したいのだろう。
2543 = "Với tư cách là giám đốc Đường sắt Ohimitera, với tư cách là thị trưởng Ohimitera——\nCó lẽ cô ấy muốn tìm thấy \\x%l8620;#00ffc040;8620%l;#; và nhìn thấy tương lai ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ポーレットにも、もし良ければれいなにも、\n資料探しを手伝ってもらいたいと思っている」
2037 = "「Đương nhiên rồi. Tôi cũng muốn nhờ Paulette, và nếu được thì cả Reina nữa,\ngiúp tôi tìm kiếm tài liệu.」"
# 【れいな】
# display as 玲奈
# JP: 「もちろんですよぉ。\nれいな、ポーレットとそうてつさんのお手伝いしますぅ」
2039 = "「Tất nhiên rồi ạ~.\nReina sẽ giúp Paulette và anh Soutetsu một tay nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「感謝する。\nなら、ついてきてくれ」
2081 = "「Cảm ơn mọi người.\nVậy thì, đi theo tôi.」"
# monologue
# JP: 方針が決まったのなら、動くまでだ。\n念のため、ポーレットたちに言い添える。
2371 = "Phương hướng đã quyết định xong thì cứ thế mà hành động thôi.\nĐể chắc ăn, tôi nói thêm với nhóm Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「それから、覚悟をいくらかは」
2109 = "「Với lại, mọi người chuẩn bị tinh thần một chút nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「覚悟」
1886 = "「Chuẩn bị tinh thần?」"
# 【れいな】
# display as 玲奈
# JP: 「ですかぁ？」
2015 = "「Sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、覚悟を――」
1807 = "「Ừ, chuẩn bị tinh thần——」"
# monologue
# JP: 言いながら部屋へと入り、\nすぐに次の間へと続くふすまを開く。
2613 = "Vừa nói tôi vừa bước vào phòng,\nvà ngay lập tức mở cánh cửa kéo dẫn sang phòng bên cạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんのためこんだ資料はハンパな量じゃない」
1998 = "「Số lượng tài liệu mà ông Taito tích trữ không phải dạng vừa đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ～」
1760 = "「Oa~」"
# 【ポーレット】
# display as 波萊特
# JP: 「――すごい」
1423 = "「——Khủng khiếp quá.」"
# monologue
# JP: ……僕の部屋を埋め尽くしていた、\n汰斗さんの溜め込んだもの。
1409 = "……Những thứ ông Taito tích trữ,\nđã từng lấp đầy căn phòng của tôi."
# monologue
# JP: そのうちハチロク以外の全てを、ただただひたすら、\n元の部屋より二畳ほど狭くなる次の間へと押し込んだ。
2248 = "Trong số đó, tôi đã nhét toàn bộ, ngoại trừ Hachiroku,\nvào căn phòng bên cạnh hẹp hơn phòng cũ khoảng hai chiếu tatami."
# 【れいな】
# display as 玲奈
# JP: 「みっちりしてますぅ。\nれいな、こんなの初めてみましたよぉ」
2017 = "「Chật cứng luôn nha~.\nLần đầu tiên Reina thấy cảnh này đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
1961 = "「Chắc là vậy rồi.」"
# monologue
# JP: 結果が、これだ。\n床を抜きそうな本の、資料の、物品の山。
2501 = "Và kết quả là đây.\nMột núi sách, tài liệu, vật dụng chất đống như muốn làm sập cả sàn nhà."
# monologue
# JP: 小さなれいなは気圧されて、\nポーレットに至っては、声さえ発することも出来ずに――
2567 = "Reina bé nhỏ thì bị áp đảo,\ncòn Paulette thì thậm chí không thốt nên lời——"
# 【ポーレット】
# display as 波萊特
# JP: 「…………んっ」
1435 = "「…………Ưm.」"
# monologue
# JP: ポーレットの目が鋭く細まる。
2533 = "Ánh mắt Paulette sắc bén nheo lại."
# monologue
# JP: 慎重に、慎重に――\n本の背表紙を、積まれた物を、迷わぬ視線で確かめていく。
2360 = "Cẩn trọng, vô cùng cẩn trọng——\nCô ấy dùng ánh mắt kiên định kiểm tra từng gáy sách, từng món đồ được chất đống."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？　何かわかりそうか」
1894 = "「Sao rồi? Có phát hiện ra gì không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「貴重な資料が山積みなのは、一目瞭然です」
1879 = "「Chỉ cần nhìn thoáng qua cũng biết đây là cả một núi tài liệu quý giá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1810 = "「嗯？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「稀覯本や鉄道グッズはもちろんのこと、残っているのが\n信じられないような現場の資料も、いくつもあります」
2033 = "「Sách hiếm và các vật dụng đường sắt thì khỏi phải nói, ở đây còn có vô số\ntài liệu hiện trường mà tôi không thể tin là vẫn còn tồn tại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1965 = "「是嗎」" 
# monologue
# JP: そう言いつつも、ポーレットの目は、\n決して一箇所にはとどまらない。
2524 = "Mặc dù nói vậy, nhưng ánh mắt của Paulette\ntuyệt đối không dừng lại ở một chỗ."
# monologue
# JP: 希少性にも趣味性にも捕えられることなく、\nただひたすらに、\x%l8620;#00ffc040;8620%l;#;へ繋がる手がかりだけを探し続ける。
2628 = "Không bị thu hút bởi sự quý hiếm hay tính giải trí,\ncô ấy chỉ chăm chăm tìm kiếm manh mối dẫn đến \\x%l8620;#00ffc040;8620%l;#;."
# 【ポーレット】
# display as 波萊特
# JP: 「――あのファイル類が気になります。\nわたし、あそこから探してみてもかまいませんか？」
1425 = "「——Tôi khá tò mò về đống hồ sơ kia.\nTôi bắt đầu tìm từ đó được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。好きに探してくれ」
2036 = "「Đương nhiên rồi. Cứ tự nhiên tìm đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。でしたら……すみません、ええと――あっ！」
1852 = "「Vâng. Nếu vậy thì……xin lỗi, à ừm——A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1810 = "「嗯？」" 
# monologue
# JP: 何を求めてか、きょろきょろ動いてたポーレットの目が、\n一点を見つめ止まっている。
2526 = "Không biết đang tìm kiếm điều gì, đôi mắt ngó nghiêng của Paulette\nbỗng dừng lại ở một điểm."
# 【ポーレット】
# display as 波萊特
# JP: 「……やっぱり」
1443 = "「……Quả nhiên.」"
# monologue
# JP: つぶやいて、僕へと振り向き、\nそれから再び、同じ一点を凝視する。
2365 = "Cô ấy lẩm bẩm, quay lại nhìn tôi,\nrồi lại tiếp tục nhìn chằm chằm vào điểm đó."
# monologue
# JP: 視線の先には――\nなんだろう、あれは写真立てだろうか？
2358 = "Nơi ánh mắt cô ấy hướng đến——\nLà gì nhỉ, một khung ảnh sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　手がかりがあったのか？」
1899 = "「Sao vậy? Có manh mối gì à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、いえ。脚立かなにかないかなぁ、って」
1789 = "「À, không. Tôi đang tự hỏi không biết có cái thang gấp hay gì không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった、すぐに持ってくる」
1859 = "「Hiểu rồi, tôi sẽ mang đến ngay.」"
# monologue
# JP: 脚立を立てれば、見かけによらずするすると、\nポーレットは段を登って、脚立の上を椅子にする。
2429 = "Vừa dựng thang gấp lên, trái với vẻ bề ngoài, Paulette\nnhanh nhẹn leo lên từng bậc, rồi lấy bậc trên cùng làm ghế ngồi."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。あとは一人で平気です」
2080 = "「Cảm ơn anh. Phần còn lại tôi tự lo được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば任せる」
1964 = "「Vậy sao. Thế thì giao cho cô đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はいっ」
1839 = "「V-Vâng.」"
# monologue
# JP: 上ずりかけた声を飲み込み。\nポーレットは静かに息を整える。
2530 = "Nuốt ngược giọng nói có phần hưng phấn xuống.\nPaulette lặng lẽ điều hòa nhịp thở."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、きっとお役に立ちます――双鉄さん……\nいいえ、双鉄くんの」
1910 = "「Tôi, chắc chắn sẽ giúp ích được cho anh——anh Soutetsu……\nKhông, là Soutetsu-kun.」"
# monologue
# JP: ん？　呼び方が、“さん”から“くん”に変わったか。\n仲間意識の現れならば、心強い。
2342 = "Hử? Cách xưng hô đổi từ \"anh\" sang \"kun\" rồi sao.\nNếu đó là biểu hiện của tinh thần đồng đội thì thật đáng mừng."
# 【ポーレット】
# display as 波萊特
# JP: 「期待してくださいね。\n探し物とか事務仕事とか、こつこつやるの得意ですから」
2078 = "「Hãy cứ kỳ vọng vào tôi nhé.\nTôi rất giỏi những việc cần sự tỉ mỉ như tìm kiếm đồ đạc hay công việc giấy tờ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな」
2047 = "「Đáng tin cậy thật đấy.」"
# monologue
# JP: 声にも視線にも、力を感じる。\n完全にスイッチが入った様子だ。
2362 = "Tôi có thể cảm nhận được sức mạnh từ cả giọng nói lẫn ánh mắt của cô ấy.\nCó vẻ như cô ấy đã hoàn toàn bật công tắc rồi."
# monologue
# JP: お世辞抜きで、期待は自然とふくらむが、\nこちらもこちらで、出来るかぎりはやっておきたい。
2550 = "Không phải nịnh bợ đâu, nhưng sự kỳ vọng trong tôi tự nhiên lớn dần lên,\nmặc dù vậy, tôi cũng muốn làm hết sức mình trong khả năng có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「残りは――チームわけが必要だな。\n人間には鉄道知識が、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には背丈が足りない」
1945 = "「Phần còn lại——chắc phải chia đội thôi.\nCon người thì thiếu kiến thức đường sắt, còn \\x%lレイルロオド;#00ffc040;Railord%l;#; thì thiếu chiều cao.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたらわたくしと」
2114 = "「Nếu vậy thì em với」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロクハチロク！　わたしと組むばいっ！」
1728 = "「Hachiroku Hachiroku! Lập đội với chị nha!」"
# monologue
# JP: 何か言いかけたところを遮り、\n日々姫がハチロクを抱き上げる。
2482 = "Cắt ngang lời Hachiroku định nói,\nHibiki bế bổng em ấy lên."
# 【日々姫】
# display as 日日姬
# JP: 「わたしがいっとう鉄道のこと[うと]疎かけん。\nハチロクと組むのがバランスよかとよ」
1927 = "「Chị là người mù tịt về đường sắt nhất mà.\nNên lập đội với Hachiroku là cân bằng nhất đó.」"
# 【ハチロク】
# display as 八六
# JP: 「そうですか？」
1966 = "「Vậy sao ạ?」"
# monologue
# JP: ハチロクの目は、包み込むように穏やかだ。
2285 = "Ánh mắt Hachiroku dịu dàng như muốn bao bọc lấy vạn vật."
# monologue
# JP: 日々姫のことを、“仕方の無い甘えっ子”とでも\n思ってくれているのかもしれん。
2438 = "Có lẽ em ấy đang nghĩ Hibiki\nlà một \"đứa trẻ làm nũng hết thuốc chữa\" cũng nên."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様さえよろしければ、\nわたくしと日々姫とで一組を」
2113 = "「Nếu vậy, chỉ cần ngài Soutetsu đồng ý,\nthì em và chị Hibiki sẽ thành một đội ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はかまわん。れいなはどうだ？　それで良いか？」
2002 = "「Anh thì không sao. Reina thấy thế nào? Vậy được chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。\nれいな、がんばりますよぉ」
1848 = "「Vâng ạ.\nReina sẽ cố gắng hết sức nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。それでは手分けして開始しよう。\n探すべきは、\x%l8620;#00ffc040;8620%l;#;、およびハチロクに関する記録全般だ」
2045 = "「Đáng tin cậy thật đấy. Vậy thì chúng ta chia nhau ra bắt đầu thôi.\nThứ cần tìm là toàn bộ ghi chép liên quan đến \\x%l8620;#00ffc040;8620%l;#; và Hachiroku.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「はい！」
1853 = "「Rõ!」"
# monologue
# JP: 返事をするやで、\n日々姫とハチロクは大ぶりの棚にとりかかる。
2610 = "Vừa trả lời xong,\nHibiki và Hachiroku liền bắt tay vào tìm kiếm ở cái kệ lớn."
# 【日々姫】
# display as 日日姬
# JP: 「どうする？　どこから手をつける？」
1897 = "「Làm sao đây? Bắt đầu từ đâu?」"
# 【ハチロク】
# display as 八六
# JP: 「上の右端と下の左端から――\n[しらみつぶ,1]虱潰しでどうでしょう？」
1731 = "「Từ góc trên cùng bên phải và góc dưới cùng bên trái——\nchúng ta cứ tìm kỹ từng ngóc ngách thì sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「了解！　それじゃ、また真ん中で」
1855 = "「Đã rõ! Vậy thì, hẹn gặp lại ở giữa nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「そうですね。後ほど、再び真ん中で」
1841 = "「Vâng. Lát nữa, hẹn gặp lại ở giữa ạ.」"
# monologue
# JP: 日々姫とハチロク。\n意外なことに、なかなか息があってる様子だ。
2508 = "Hibiki và Hachiroku.\nThật bất ngờ, hai người có vẻ khá ăn ý với nhau."
# monologue
# JP: ならばこちらは、こちらのことに集中しよう。
2630 = "Nếu vậy thì bên này, tôi cũng phải tập trung vào việc của mình thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクたちに[なら]倣おう。\nれいなは下、僕は上からで構わんか？」
1918 = "「Bắt chước Hachiroku vậy.\nReina tìm ở dưới, còn tôi tìm từ trên xuống được chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな、かまわんですよぉ」
1849 = "「Vâng ạ. Reina không sao đâu nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「良し。ならばやるぞ」
1843 = "「Tốt. Vậy thì bắt đầu thôi.」"
# monologue
# JP: 口を結んで手と目を動かす。\n部屋の散らかり具合からして、汰斗さんは雑な性格だろう。
2436 = "Tôi mím môi, bắt đầu di chuyển tay và mắt.\nNhìn căn phòng bừa bộn thế này, chắc hẳn ông Taito là người có tính cách cẩu thả."
# monologue
# JP: 本の間にメモなど挟んでいるかもしれん。\n一冊一冊、ざっとでも中身を改めていく。
2499 = "Có thể ông ấy kẹp ghi chú vào giữa những cuốn sách.\nTôi lướt qua nội dung từng cuốn một, dù chỉ là xem lướt."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1433 = "「…………」"
# 【れいな】
# display as 玲奈
# JP: 「…………」
# 1433 = "「…………」" 
# monologue
# JP: 黙々とやる。ひたすらにやる。\nやれば必ず、何らかの結論にたどり着く。
2407 = "Lặng lẽ làm. Cứ mải miết làm.\nCứ làm thì chắc chắn sẽ đi đến một kết luận nào đó."
# monologue
# JP: それが\x%l8620;#00ffc040;8620%l;#;につながり、ひいては観光振興に、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回につながれば最善なのだが――
2369 = "Nếu điều đó dẫn đến \\x%l8620;#00ffc040;8620%l;#;, rồi từ đó thúc đẩy du lịch,\nvà dẫn đến việc hủy bỏ thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; thì là tốt nhất——"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！」
2133 = "「Soutetsu-kun!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1775 = "「唔」" 
# monologue
# JP: 不意の一声に振り返る。
2396 = "Tôi ngoảnh lại trước tiếng gọi bất ngờ."
# monologue
# JP: ポーレットだ。\n大きく手を振ってまでいる。
2498 = "Là Paulette.\nCô ấy còn vẫy tay ra hiệu nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。集中していた」
1940 = "「Xin lỗi. Tôi đang tập trung quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、脚立、伸ばしてもらえますか？\nもっと上の方も確かめたくて」
2111 = "「À ừm, anh kéo dài cái thang gấp ra giúp tôi được không?\nTôi muốn kiểm tra cả những chỗ cao hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。いったん下りてくれ」
1845 = "「Hiểu rồi. Cô xuống trước đi đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1844 = "「Vâng.」"
# monologue
# JP: 脚立を伸ばし、梯子状に。
2420 = "Kéo dài cái thang gấp ra, biến nó thành hình dạng cái thang dài."
# monologue
# JP: それを書棚に立てかければ、\nポーレットは待ちわびていたかのようにすぐ動く。
2299 = "Vừa dựa nó vào kệ sách,\nPaulette đã lập tức hành động như thể chờ đợi từ lâu."
# 【ポーレット】
# display as 波萊特
# JP: 「しっかり支えててくださいね」
2143 = "「Anh giữ cho chắc vào nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1804 = "「Ừm.」"
# monologue
# JP: 返事にうなずき、するすると、\nポーレットははしごを登っていく。
2535 = "Gật đầu đáp lại, Paulette\nnhanh nhẹn leo lên thang."
# monologue
# JP: 思いがけぬほど早い動きだ。\n万が一にも倒さぬように、両手で支える。
2572 = "Động tác nhanh đến không ngờ.\nĐể phòng trường hợp vạn nhất thang bị đổ, tôi dùng hai tay giữ chặt."
# 【日々姫】
# display as 日日姬
# JP: 「きゃっ――」
1754 = "「Á——」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ――」
1761 = "「Chà——」"
# monologue
# JP: 日々姫が、ハチロクが、\n悲鳴のような声をあげかけ、けれどもぐっと抑える。
2478 = "Hibiki, và Hachiroku,\nsuýt thốt lên tiếng hét, nhưng rồi lại cố kìm nén lại."
# monologue
# JP: なぜだ、と顔を動かせば、\n頭上近くに答えは見つかる。
2538 = "Tại sao vậy, tôi vừa ngước mặt lên,\nđã tìm thấy câu trả lời ngay gần đỉnh đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「ああ……やっぱり…………。\nあ！？　この年からは――」
1814 = "「A……quả nhiên là vậy………….\nHả!? Từ năm nay thì——」"
# monologue
# JP: （なるほど、下着が見えそうなのか）
2651 = "（Ra là vậy, sắp lộ đồ lót sao.）"
# monologue
# JP: 見えたからどうというものでもない。が、\n女性はそれをひどく恥じらう。故に見ることは失礼になる。
2295 = "Có nhìn thấy thì cũng chẳng sao. Nhưng mà,\nphụ nữ lại rất xấu hổ vì điều đó. Nên nếu nhìn thì sẽ rất thất lễ."
# monologue
# JP: 視線をそらし、震える脚立をとにかく抑え。\n抑えるうちに――ハチロクと日々姫の対応の真意に気づく。
2423 = "Tôi quay mặt đi, cố gắng giữ chặt chiếc thang gấp đang rung rinh.\nTrong lúc giữ chặt nó——tôi nhận ra ý nghĩa thực sự trong phản ứng của Hachiroku và Hibiki."
# monologue
# JP: （そうか、うかつに指摘をすれば、\nポーレットはきっとあわてふためき――）
2650 = "（Ra vậy, nếu bất cẩn nhắc nhở,\nchắc chắn Paulette sẽ hoảng hốt——）"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！？　ポーレット！\nぱんつ！　ぱんつが見えちゃいますよぉ！」
1759 = "「Oa!? Paulette!\nQuần lót! Quần lót bị lộ kìa nha~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええっ!?」
1765 = "「Hả!?」"
# monologue
# JP: 驚き、反射で振り向こうとする。\n当然、バランスは大きく崩れる。
2643 = "Bất ngờ, cô ấy định quay lại theo phản xạ.\nĐương nhiên, thăng bằng sẽ bị mất đi đáng kể."
# 【双鉄】
# display as 雙鐵
# JP: 「いかんっ！」
1664 = "「Nguy rồi!」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃああっ！？」
1755 = "「Á á á!?」"
# monologue
# JP: ポーレットはもう崩れるしかない。\nはしごを捨てて両手を伸ばしっ――
2534 = "Paulette chỉ còn cách ngã xuống.\nTôi buông chiếc thang ra, vươn cả hai tay tới——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2144 = "「!」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「にぃに！？」\n「双鉄様っ！？」
2121 = "「Anh hai!?」\n「Ngài Soutetsu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なんとか、だ。\nなんとか、うまくつかまえた」
1448 = "「……Cũng tàm tạm.\nMay mà đỡ kịp.」"
# monologue
# JP: 予測をもしも出来てなければ、際どかった。
2587 = "Nếu không dự đoán được từ trước thì nguy to rồi."
# monologue
# JP: 僕の両手にすっぽりと、\nポーレットの体をぎりぎり収めた。
2427 = "Vừa vặn trọn trong vòng tay tôi,\ncơ thể Paulette nằm gọn gàng một cách suýt soát."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、大丈夫か怪我はないか？」
2012 = "「Paulette, cô không sao chứ, có bị thương ở đâu không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、あのっ！　あのっ――わたしっ！　わたし、\nだ、だ、だいじょうぶ、だいじょぶ、ごめんなさいっ！」
2105 = "「A, à ừm! À ừm——tôi! Tôi,\nkh-kh-không sao, không sao đâu, xin lỗi anh!」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当に平気か？　痛むのではないか？\n顔が赤く呼吸が荒いぞ？」
2048 = "「Cô thực sự không sao chứ? Có đau ở đâu không?\nMặt cô đỏ bừng, hơi thở cũng gấp gáp lắm đấy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いた、いた、いたまないですっ。けど――あのっ、\nわたしっ、はず、はずかしい――その――いろいろっ」
1908 = "「Kh-Kh-Không đau đâu ạ. Nhưng mà——à ừm,\ntôi, x-xấu hổ quá——chuyện đó——nhiều thứ lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。すまん」
1772 = "「À, ra vậy. Xin lỗi nhé.」"
# monologue
# JP: そっと、ポーレットの両足を床へと下ろす。
2432 = "Tôi nhẹ nhàng đặt hai chân Paulette xuống sàn."
# monologue
# JP: ゆっくりポーレットは立ち上がり、\nそれからくしゃん、と、ほとんど泣きそうな顔になる。
2363 = "Paulette từ từ đứng lên,\nrồi nhăn mặt, trông như sắp khóc đến nơi."
# 【ポーレット】
# display as 波萊特
# JP: 「あああ……わ、わたしのせいで、ごめんなさい」
1785 = "「Aaa……t-tất cả là tại tôi, xin lỗi anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ――」
1811 = "「Hử? À——」"
# monologue
# JP: はしごだ。\n僕が放り出した以上は、倒れずにすむ筈もない。
2496 = "Là cái thang.\nMột khi tôi đã buông tay ra thì làm sao mà không đổ cho được."
# monologue
# JP: 倒したはずみに、\n何かを割ってしまったらしい。
2378 = "Có vẻ như lúc đổ xuống,\nnó đã làm vỡ thứ gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「誰の責任かといえば、僕のだろう。\n慌てさせたのもはしごを手放したのも、僕だからな」
1863 = "「Nếu nói là lỗi của ai, thì chắc là của tôi rồi.\nNgười làm cô hoảng hốt và buông tay khỏi cái thang đều là tôi mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんなっ！　双鉄くんの責任なんて」
1674 = "「Không, đâu có! Sao lại là lỗi của Soutetsu-kun được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無いというなら、ポーレットにはもっと無い。\nそれより、後処理だ。怪我などないか？」
1665 = "「Nếu tôi không có lỗi, thì Paulette lại càng không.\nQuan trọng hơn là dọn dẹp hậu quả đã. Cô có bị thương không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。\n庇ってもらったおかげで、わたし、平気です」
2000 = "「V-Vâng.\nNhờ anh che chắn nên tôi không sao cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「こっちも大したことなかと。\n写真立てのガラスが割れただけばい」
2102 = "「Bên này cũng không có gì to tát đâu.\nChỉ là vỡ kính khung ảnh thôi.」"
# monologue
# JP: 言いながら日々姫はさっさと立って、\nホウキとチリトリを持ってくる。
2614 = "Vừa nói Hibiki vừa nhanh chóng đứng dậy,\nmang chổi và hót rác đến."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お気をつけを。\nこのあたり、硝子片が散っております――あら？」
2134 = "「Ngài Soutetsu, xin hãy cẩn thận.\nQuanh đây mảnh kính vương vãi khắp nơi——ủa?」"
# monologue
# JP: ハチロクの手がぴたりととまり、\nガラスの割れた写真立てをひょいと持ち上げる。
2282 = "Bàn tay Hachiroku khựng lại,\nrồi em ấy nhẹ nhàng nhấc chiếc khung ảnh bị vỡ kính lên."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……ですよね？　このお写真。\n少年のころの双鉄様」
2024 = "「Là ngài Soutetsu……đúng không ạ? Bức ảnh này.\nNgài Soutetsu hồi còn thiếu niên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当だな」
1822 = "「À, đúng thật.」"
# monologue
# JP: ……我ながらひどい目つきをしている。\n人間不信と絶望を混ぜ、恨みでぐつぐつ煮込んだような。
1411 = "……Ngay cả bản thân tôi cũng thấy ánh mắt đó thật tồi tệ.\nNhư thể được nấu sôi sùng sục bằng sự oán hận, pha lẫn với sự mất niềm tin vào con người và nỗi tuyệt vọng."
# monologue
# JP: 汰斗さんが僕の写真を飾っておいてくれたことは光栄だが、\nこの頃の写真はなんというか――些かご容赦願いたい。
2417 = "Việc ông Taito trang trọng lồng khung bức ảnh của tôi là một vinh dự, nhưng\nbức ảnh thời đó thì nói sao nhỉ——tôi thực sự không muốn nhìn lại chút nào."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　――片付け、手伝いっ」
2110 = "「À ừm! ——Để tôi giúp dọn dẹp.」"
# 【ハチロク】
# display as 八六
# JP: 「お任せください、ポーレットさん。\n人間の指は、硝子で切れてしまいますでしょう？」
2077 = "「Xin cứ giao cho em, cô Paulette.\nNgón tay con người sẽ bị kính cắt đứt mất, đúng không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……そう、です――けど、\nあの、ハチロクさん」
1781 = "「A……đúng, là vậy——nhưng mà,\nà ừm, chị Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「お任せください。そうしてよろしければ双鉄様に、\nそのお手にあるファイルを、どうぞお見せください」
1683 = "「Xin cứ giao cho em. Và nếu được, xin cô hãy đưa\ntập hồ sơ trên tay cho ngài Soutetsu xem giúp em ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ええと――はい」
1779 = "「A……à ừm——vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「随分と熱心に見ていたようだが――」
1930 = "「Lúc nãy thấy cô xem chăm chú lắm mà——」"
# monologue
# JP: 落下してもなお手放さず、\nその胸のなか、書類ファイルを一束ポーレットは抱えてる。
2529 = "Dù bị ngã nhưng vẫn không buông tay,\nPaulette đang ôm khư khư một xấp hồ sơ trước ngực."
# 【双鉄】
# display as 雙鐵
# JP: 「なにか手がかりがあったのか？」
1956 = "「Có manh mối gì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい――これ、見てください双鉄くん。\n背表紙……ほら、『会計記録』ってあります」
1970 = "「Vâng——Soutetsu-kun, anh xem cái này đi.\nGáy sách này……anh thấy không, có ghi 'Hồ sơ kế toán'.」"
# monologue
# JP: なるほど。\n任せて正解だった。
2493 = "Ra là vậy.\nGiao cho cô ấy quả là một quyết định đúng đắn."
# 【双鉄】
# display as 雙鐵
# JP: 「物の流れは、金の流れでもあるということか」
2029 = "「Dòng chảy của vật chất, cũng chính là dòng chảy của tiền bạc sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしもそう思って。\nそれで、あたってみたらですね。えと、この年です」
1913 = "「Tôi cũng nghĩ vậy.\nNên tôi thử tìm xem. À ừm, là năm này đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――お、おおっ……これ、は――」
1774 = "「Hừm——ồ, ồ……cái, này là——」"
# monologue
# JP: なるほど、酒造が傾くわけだ。\nポーレットが指差し示す、その年だけの異常な支出。
2492 = "Ra là vậy, hèn chi xưởng rượu suýt phá sản.\nKhoản chi tiêu bất thường chỉ trong một năm đó, nơi ngón tay Paulette đang chỉ vào."
# 【れいな】
# display as 玲奈
# JP: 「『中古\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、機関車一式』――\nはわわ、これ、ハチロクさんたちのことですねぇ」
1431 = "「'Trọn bộ \\x%lレイルロオド;#00ffc040;Railord%l;#; và đầu máy cũ'——\nOa, cái này, là nói về nhóm chị Hachiroku đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、れいな。わたしもそれしか無いと思う。\nだってね？　ほら、その次の年から――」
1867 = "「Ừ, Reina. Chị cũng nghĩ chỉ có thể là cái đó thôi.\nBởi vì nhé? Em xem, từ năm tiếp theo——」"
# 【双鉄】
# display as 雙鐵
# JP: 「倉庫使用料、倉庫使用料、倉庫使用料、倉庫使用料……\n記録の最後の年までずっと、払い続けているな」
1705 = "「Tiền thuê kho, tiền thuê kho, tiền thuê kho, tiền thuê kho……\nCứ trả liên tục cho đến tận năm cuối cùng của hồ sơ này.」"
# 【日々姫】
# display as 日日姬
# JP: 「それって！　にぃにぃ」
1680 = "「Nghĩa là! Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。当たりの可能性が高く思える。\n倉庫の所在に関する記載はないのか？」
1795 = "「Ừm. Khả năng trúng phóc là rất cao.\nCó ghi chép gì về địa chỉ của nhà kho không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1778 = "「A……」"
# monologue
# JP: 急にもじもじ、\nポーレットは足を動かし始め、居心地悪そうな顔になる。
2528 = "Đột nhiên Paulette trở nên lúng túng,\nnhấp nhổm bước chân, vẻ mặt trông rất khó xử."
# 【ポーレット】
# display as 波萊特
# JP: 「あの、旧\x%l帝鉄;#00ffc040;帝鉄%l;#;から施設の譲り渡しを受けたとき……\n個人に貸与している物だから手を触れるなって言われて」
1895 = "「À ừm, lúc nhận bàn giao cơ sở vật chất từ \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ……\nhọ có dặn là những thứ đang cho cá nhân thuê thì đừng có động vào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心当たりの倉庫があるのか」
1704 = "「Cô biết nhà kho đó ở đâu sao?」"
# 【れいな】
# display as 玲奈
# JP: 「あああ、れいな、わかりましたぁ。\n\x%l石造機関庫;#00ffc040;[せきぞうきかんこ,4]石造機関庫%l;#;のことですねぇ」
1818 = "「A a a, Reina biết rồi nha~.\nLà \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l石造機関庫;#00ffc040;石造機関庫%l;#;？」
1420 = "「\\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#;?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2144 = "「！」" 
# monologue
# JP: ハチロクがハっと息を呑む。\n顔が、視線が引き締まっている。
2279 = "Hachiroku khẽ nín thở.\nKhuôn mặt và ánh mắt em ấy trở nên căng thẳng."
# 【れいな】
# display as 玲奈
# JP: 「はぁい、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;は、れんがでできた機関庫ですよぉ。\nれいなとポーレット、はいっちゃだめなところなんです」
1979 = "「Vâng ạ, \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; là nhà kho làm bằng gạch đỏ đó nha~.\nLà nơi mà Reina và Paulette không được phép vào ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「引渡し時の注意をずっと、守り続けてきたわけか」
1949 = "「Nghĩa là cô vẫn luôn tuân thủ lời dặn lúc bàn giao sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、だって。そう約束しましたから。\nでも、わたし、気になって気になって気になって」
1976 = "「Vâng, thì. Vì đã hứa như vậy mà.\nNhưng mà, tôi cứ bứt rứt, tò mò, tò mò mãi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかる気がする。意識の外へと追いやったんだな？\n気にすれば、何もかもが手につかなくなってしまうから」
1926 = "「Tôi hiểu mà. Cô đã cố gạt nó ra khỏi tâm trí đúng không?\nVì nếu cứ bận tâm, cô sẽ chẳng làm nên trò trống gì cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。\n双鉄くんの言うとおりな感じで、だから」
1972 = "「Đúng vậy ạ.\nCảm giác đúng như Soutetsu-kun nói, thế nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、盲点を作ってしまった」
1934 = "「Thế nên mới tạo ra điểm mù.」"
# monologue
# JP: 単純にそれは事実の確認。
2413 = "Đó chỉ đơn thuần là xác nhận lại sự thật."
# monologue
# JP: が、ポーレットは恥じ入るように、\nがっくり深くうなだれてしまう。
2254 = "Nhưng Paulette lại cúi gằm mặt xuống,\ntrông có vẻ vô cùng xấu hổ."
# 【ポーレット】
# display as 波萊特
# JP: 「うう、わたし、恥ずかしいです。\n冷静になれば、あそこが一番の候補だったのに」
1792 = "「Ư ư, tôi thấy xấu hổ quá.\nNếu bình tĩnh lại thì nơi đó rõ ràng là khả nghi nhất mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、盲点といえば僕も同じだ」
1679 = "「Không, nói về điểm mù thì tôi cũng vậy thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1766 = "「Hả?」"
# monologue
# JP: 自分の部屋に駆け込み、すぐに戻ってくる。
2430 = "Tôi chạy ùa vào phòng mình, rồi lập tức quay lại."
# 【双鉄】
# display as 雙鐵
# JP: 「一揃い、汰斗さんから頂いた鍵だ。\n僕が使う立場ではないと、そのまましまいこんでいた」
2101 = "「Đây là chùm chìa khóa tôi nhận được từ ông Taito.\nNghĩ mình không có tư cách sử dụng nên tôi cứ cất kỹ mãi.」"
# 【ハチロク】
# display as 八六
# JP: 「汰斗様の鍵束……ですか。\nでしたら、この中に？」
1999 = "「Chùm chìa khóa của ông Taito……sao ạ.\nNếu vậy thì, ở trong này có?」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らく。総当りでやれば、\nその\x%l石造機関庫;#00ffc040;石造機関庫%l;#;とやらの錠も」
1882 = "「Có lẽ vậy. Cứ thử từng chìa một,\nthì cái ổ khóa của \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; gì đó chắc cũng sẽ mở được thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あら兄さん。総当りの必要なんてありませんよ？\nねぇね――んんっ――姉さん、姉さん！　ちょっと！」
1763 = "「Ôi anh trai. Đâu cần phải thử từng cái một đâu?\nChị hai——hừm——chị ơi, chị ơi! Ra đây một chút!」"
# 【真闇】
# display as 真闇
# JP: 「なんねぇ、仕事中に」
1689 = "「Chuyện gì vậy, đang lúc làm việc mà.」"
# monologue
# JP: そう言いながらも、すぐさま真闇姉は来てくれる。
2344 = "Dù nói vậy, nhưng chị Mayami vẫn lập tức đi tới."
# 【真闇】
# display as 真闇
# JP: 「ああ、あん倉庫費！　賄賂の[たぐい]類のもんと思うて、\nいじらんよー、ずっとそのまま払ろおとったんよ」
1824 = "「À, cái tiền kho bãi đó á! Chị cứ tưởng là tiền hối lộ hay gì đó,\nnên không dám đụng vào, cứ để nguyên thế mà trả suốt thôi.」"
# monologue
# JP: これで経費をぐっと減らせるとにこにこしながら、\n真闇姉は僕の鍵束を一瞥する。
2237 = "Vừa cười tươi rói vì từ giờ có thể cắt giảm được một khoản chi phí đáng kể,\nchị Mayami vừa liếc nhìn chùm chìa khóa của tôi."
# 【真闇】
# display as 真闇
# JP: 「右田家のもんと違う鍵はひとつだけたい。\nはい――これね、双ちゃん」
2070 = "「Chỉ có một chiếc chìa khóa không phải của nhà Migita thôi.\nĐây——cái này này, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、真闇姉」
2079 = "「Cảm ơn chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「こんなん。手間でもなんでもないけんねぇ」
2001 = "「Có gì đâu. Chút chuyện vặt vãnh này nhằm nhò gì.」"
# monologue
# JP: 言ってひらひら手を振って、\nもう酒蔵へと戻りかけ――
2611 = "Nói xong chị ấy xua tay nhẹ,\nrồi định quay lại xưởng rượu——"
# monologue
# JP: 真闇姉は不意にいたずらな笑みを浮かべて、\n鍵を一本、もう一本と鍵束から抜き僕の手に置く。
2398 = "Bỗng nhiên chị Mayami nở một nụ cười tinh nghịch,\nrút một chiếc, rồi thêm một chiếc chìa khóa nữa từ chùm chìa khóa ra đặt vào tay tôi."
# 【真闇】
# display as 真闇
# JP: 「うちん部屋の鍵がこれで、\nひーちゃんの部屋の鍵がこれね」
2100 = "「Chìa khóa phòng chị là cái này,\ncòn chìa khóa phòng bé Hi là cái này nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねっ、ねぇねぇっ！！？」
2119 = "「Chị, chị hai!!?」"
# 【真闇】
# display as 真闇
# JP: 「じーさまが双ちゃんにあげた鍵やけん。\nいつでん、好きにつかってよかよ？」
2103 = "「Chìa khóa ông nội cho Sou-chan mà.\nBất cứ lúc nào, muốn dùng thế nào cũng được nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇっ！」
2126 = "「Chị hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ならばその時には」
1801 = "「Hừm. Vậy thì khi nào cần em sẽ dùng.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ！？　そ、そのときって！！！」
2125 = "「Anh hai!? K-Khi nào cần là sao!!!」"
# monologue
# JP: 真闇姉にせよ日々姫にせよ、\n例えば夜中、腹痛で動けんようなことがあるかもしれん。
2261 = "Dù là chị Mayami hay Hibiki,\nbiết đâu nửa đêm có lúc đau bụng không cử động nổi thì sao."
# monologue
# JP: 教わった以上、そのような時、これらの鍵も活用しよう。\nが――今はひとまず、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;とやらの鍵だ。
2455 = "Đã được chỉ cho rồi thì lúc đó cứ thế mà dùng thôi.\nNhưng——trước mắt thì, chìa khóa của cái \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; gì đó mới quan trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、れいな。\nすまんが案内してもらえるか？」
2013 = "「Paulette, Reina.\nPhiền hai người dẫn đường được không?」"
# 【れいな】
# display as 玲奈
# JP: 「もちろんですよぉ」
2038 = "「Tất nhiên rồi ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「任せてください。双鉄くん」
1684 = "「Cứ giao cho tôi. Soutetsu-kun.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、日々姫。そしてハチロク」
1860 = "「Vậy thì, Hibiki. Và Hachiroku nữa.」"
# monologue
# JP: 誰からともなく頷き合う。\nそれだけのことが、心強い。
2353 = "Không ai bảo ai, tất cả cùng gật đầu.\nChỉ vậy thôi cũng đủ khiến tôi thấy an tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ。\x%l8620;#00ffc040;8620%l;#;とご対面だ」
1919 = "「Đi thôi. Đến gặp \\x%l8620;#00ffc040;8620%l;#; nào.」"
