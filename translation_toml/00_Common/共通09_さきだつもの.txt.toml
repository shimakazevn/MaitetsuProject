2758 = "「Vậy thì, không còn cách nào khác ngoài việc kết hợp chúng lại.\\nSẽ dùng việc phục hồi \\x%l8620;#00ffc040;8620%l;#; làm ngọn cờ đầu cho việc phản đối xây dựng nhà máy \\x%lAircra;#00ffc040;Aircra%l;#;.」"

# 【ポーレット】
# display as 波萊特
# JP: 「旗印、ですか？」
2512 = "「Ngọn cờ đầu, ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「水汚染が起きれば、御一夜はゆるやかに死んでいく――\nそうと理解しているものは、決して少なくないはずだ」
2221 = "「Nếu ô nhiễm nguồn nước xảy ra, Ohitoyo sẽ chết dần chết mòn――\\nChắc chắn không ít người hiểu được điều đó đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは、はい。そうですよね」
2711 = "「Chuyện đó thì, vâng. Đúng là vậy ạ.」"

# monologue
# JP: 右手の人差し指をそっと、ポーレットは自らの唇に当てる。
3366 = "Paulette nhẹ nhàng đặt ngón trỏ tay phải lên môi mình."

# 【ポーレット】
# display as 波萊特
# JP: 「潜在的には、多くの人が疑問や不安を持ってるはずです。\n銀行さんと対立したくなくて様子見をしているだけで」
2419 = "「Về mặt tiềm ẩn, chắc hẳn có rất nhiều người đang mang trong mình thắc mắc và lo lắng.\\nChẳng qua họ không muốn đối đầu với phía ngân hàng nên chỉ đang đứng ngoài quan sát thôi ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「んんっ――」
2279 = "「Khụ――」"

# monologue
# JP: 咳払い。\nそして日々姫は立ち上がる。
3307 = "Một tiếng hắng giọng.\\nRồi Hibiki đứng dậy."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、なんだか難しいお話みたいですから。\nちょっと、外の空気を吸ってきます」
2308 = "「Anh hai, câu chuyện có vẻ khó khăn quá.\\nEm ra ngoài hít thở không khí một chút đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2409 = "「Ừm.」"

# 【日々姫】
# display as 日日姬
# JP: 「それじゃあ、少し失礼します」
2754 = "「Vậy thì, tôi xin phép một lát.」"

# 【れいな】
# display as 玲奈
# JP: 「あ、れいなも、\nそろそろ始業準備をすすめておきますぅ」
2332 = "「A, Reina cũng...\\nphải đi chuẩn bị bắt đầu công việc đây ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、お願いね、れいな」
2362 = "「Ừm, nhờ cả vào em nhé, Reina.」"

# monologue
# JP: 後から立ったれいながぽてぽて、レールショップを出る。\n礼儀正しく頭を下げて、日々姫も静かにれいなに続く。
3188 = "Reina đứng dậy sau, lững thững rời khỏi Rail Shop.\\nLễ phép cúi đầu, Hibiki cũng lặng lẽ đi theo Reina."

# 【双鉄】
# display as 雙鐵
# JP: （議論になるのを嫌ったか、影響されるのを嫌ったか――\nいずれにしても、誘致賛成の立場は変えんわけか）
3677 = "（Là vì không muốn tranh luận, hay không muốn bị ảnh hưởng đây...\\nDù sao đi nữa, có vẻ cô ấy cũng không định thay đổi lập trường ủng hộ việc mời gọi du lịch nhỉ.）"

# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんでしょう？　日々姫ちゃん、急に」
2518 = "「Có chuyện gì vậy nhỉ? Tự nhiên Hibiki-chan lại...」"

# 【双鉄】
# display as 雙鐵
# JP: 「あれはあれで、大人だということだ」
2439 = "「Như vậy cũng có thể coi là một cách hành xử của người lớn rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はぁ」
2311 = "「Dạ...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、さっきの話だが――」
2643 = "「Dù sao thì, về chuyện lúc nãy...」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;を復活させての観光誘致を、水資源の保護と……\nその先にまで関連付ける――ってことですよね？」
2558 = "「Nghĩa là chúng ta sẽ liên kết việc mời gọi du lịch bằng cách phục hồi \\x%l8620;#00ffc040;8620%l;#; với việc bảo vệ tài nguyên nước...\\nvà cả những thứ xa hơn nữa――có phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
2588 = "「Chính xác.」"

# monologue
# JP: 話が早い。
3159 = "Cô ấy hiểu nhanh thật."

# monologue
# JP: 何が目的で何が手段か、\nその点を、ポーレットも整頓できてるようだ。
3408 = "Đâu là mục đích, đâu là phương tiện,\\ncó vẻ như Paulette cũng đã sắp xếp rõ ràng được điểm đó."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川の町、水の町、温泉と焼酎の町――\n御一夜のイメージが広く定着すれば、誘致も頓挫しよう」
2782 = "「Thị trấn của sông Kuma, thị trấn của nước, thị trấn của suối nước nóng và rượu shochu――\\nNếu hình ảnh đó của Ohitoyo được lan rộng và củng cố, kế hoạch mời gọi du lịch chắc chắn sẽ thất bại.」"

# 【ポーレット】
# display as 波萊特
