2230 = "「Không tệ... không, phải nói là rất tốt ạ.\\nĐầu máy hơi nước không thể hoạt động nếu không có nước, và――」"

# monologue
# JP: ポーレットの言葉に、\n我が意を得たりといわんばかりにハチロクが頷く。
3036 = "Trước lời của Paulette,\\nHachiroku gật đầu đầy tâm đắc."

# 【ポーレット】
# display as 波萊特
# JP: 「この町は、そもそもクマ川の町ですから。\n関連付けのポイント、いくらでもあるって思います」
2715 = "「Thị trấn này, vốn dĩ là thị trấn của sông Kuma mà.\\nEm nghĩ có vô số điểm để liên kết chúng lại với nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、その方向でまずは動くか」
2515 = "「Vậy thì, trước hết cứ hành động theo hướng đó xem sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　即決ですか？」
2301 = "「Ể!? Anh quyết định ngay lập tức sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「何か問題でも？」
2566 = "「Có vấn đề gì sao?」"

# monologue
# JP: 素直に問えば、\nポーレットの頬が赤くなる。
3271 = "Anh vừa thẳng thắn hỏi,\\nmá của Paulette đã ửng đỏ."

# 【ポーレット】
# display as 波萊特
# JP: 「問題っていうか……あの、もう少し検討しても……\nその……うまくいかなかったときのこととか」
2164 = "「Vấn đề thì không hẳn... nhưng mà... à thì, chúng ta nên cân nhắc thêm một chút...\\nvề... chuyện lỡ như không thành công chẳng hạn...」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、あげてくれ。\nうまくいかないと何が困る？」
2737 = "「Vậy thì, em cứ nêu ra đi.\\nNếu không thành công thì có gì phiền phức nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの……」
2275 = "「Ể? À thì...」"

# monologue
# JP: おずおずと、ポーレットの真っ白な指が折られていく。
3369 = "Một cách rụt rè, Paulette bắt đầu đếm trên những ngón tay trắng ngần của mình."

# 【ポーレット】
# display as 波萊特
# JP: 「失敗したら、改修の目処がたたなくて、\n\x%l8620;#00ffc040;8620%l;#;は走れなくて、工場の誘致反対が盛り上がらない」
2572 = "「Nếu thất bại, việc sửa chữa sẽ không có tiến triển,\\n\\x%l8620;#00ffc040;8620%l;#; sẽ không thể chạy được, và phong trào phản đối thu hút nhà máy sẽ không lớn mạnh được.」"

# 【双鉄】
# display as 雙鐵
