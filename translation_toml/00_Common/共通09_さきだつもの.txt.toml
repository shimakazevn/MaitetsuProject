2537 = "「Đúng vậy ạ. Dân số của thành phố bây giờ\\nđã xuống dưới ba mươi lăm ngàn người rồi.」"

# monologue
# JP: 苦笑を浮かべるポーレット。\n日々姫は頭を抱え込む。
3618 = "Paulette nở một nụ cười gượng.\\nHibiki ôm đầu."

