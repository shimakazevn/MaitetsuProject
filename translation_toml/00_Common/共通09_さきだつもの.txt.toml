[script]
# lines: 516 
# monologue
# JP: くり返される同じリズムが、\n体のいちばん深いところで、ひびく。
3061 = "Nhịp điệu lặp đi lặp lại,\nvang vọng nơi sâu thẳm nhất của cơ thể."
# 【路子】
# display as ？？？
# JP: 「……ふみゅっ」
1841 = "「……Ưm.」"
# monologue
# JP: べたりと。何かが張り付いてくる。\n汗じみて、あまったるくてやわらかで。
3321 = "Bết dính. Thứ gì đó đang bám chặt lấy tôi.\nĐẫm mồ hôi, ngọt ngào và mềm mại."
# monologue
# JP: こどうも呼吸もぴったり僕と重なって――\nなんて存在、世界にたったひとつしか無い。
3207 = "Nhịp tim và hơi thở cũng hoàn toàn trùng khớp với tôi——\nMột sự tồn tại như vậy, trên thế giới này chỉ có duy nhất một mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「む……ぅぁっ……暑いよ、路子」
2339 = "「Ưm……ư……nóng quá, Michiko.」"
# 【路子】
# display as 路子
# JP: 「んゆぅぅぅ～～っ」
2359 = "「Ưm~~」"
# monologue
# JP: 貼り付いてくる路子をはがす。\nそうするために、まだ眠りたがる体に無理やり力を込める。
3376 = "Gỡ Michiko đang bám dính lấy tôi ra.\nĐể làm được điều đó, tôi phải miễn cưỡng dùng sức lên cơ thể vẫn còn đang ngái ngủ của mình."
# monologue
# JP: ふたごなせいか、貼り付く力がハンパじゃないから、\nいつものように、一気に両手に力を込める！
2972 = "Chắc do là sinh đôi nên sức bám dính của con bé không phải dạng vừa đâu,\nnhư mọi khi, tôi dồn toàn bộ sức lực vào hai tay trong một lần!"
# monologue
# JP: （どすんっ！）
3665 = "（Bịch!）"
# 【路子】
# display as 路子
# JP: 「ぐぎゅっ！！？」
2274 = "「Oái!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うわっ！？」
2340 = "「Oa!?」"
# monologue
# JP: 目が覚めた。\n僕にも痛みが伝わってきて。
3400 = "Tỉnh ngủ luôn.\nNỗi đau cũng truyền sang cả tôi."
# 【路子】
# display as 路子
# JP: 「いたいよぅ～！　そーちゃん、ひどいよぅ～」
2404 = "「Đau quá đi~! Sou-chan, ác quá à~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ごめん。寝ぼけて、ここがどこかを忘れちゃってた」
2503 = "「Xin lỗi. Anh ngái ngủ, quên béng mất đây là đâu.」"
# 【路子】
# display as 路子
# JP: 「みち。おイスからおっこっちゃったよぅ～」
2428 = "「Michi. Bị rớt khỏi ghế rồi nè~」"
# monologue
# JP: 貼り付く路子を引きはがし、布団からズリ落とさせて\nしまったとしても、普段であれば畳に着地でコトは済む。
3176 = "Dù có gỡ Michiko đang bám dính lấy tôi ra và đẩy con bé rơi khỏi nệm,\nthì bình thường con bé cũng chỉ hạ cánh xuống chiếu Tatami là xong chuyện."
# monologue
# JP: けど、今日は――
2988 = "Nhưng mà, hôm nay thì——"
# 【路子】
# display as 路子
# JP: 「れっしゃのゆか、木の板だからいたいよぉ」
2182 = "「Sàn \x%l列車;#00ffc040;tàu%l;#; làm bằng gỗ nên đau lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかる。僕にも来ちゃうくらいに痛かった。\nごめんな、みち。コブになったりしてないか？」
2487 = "「Anh biết. Đau đến mức truyền sang cả anh mà.\nXin lỗi nhé, Michi. Có bị u cục nào không?」"
# monologue
# JP: 路子を引き上げ、髪をかきあげおでこを見つめる。\n赤くなってる……けど、コブとかには――
3243 = "Tôi kéo Michiko dậy, vén tóc lên và nhìn chằm chằm vào trán con bé.\nHơi đỏ……nhưng mà, không bị sưng u lên——"
# 【路子】
# display as 路子
# JP: 「へーき！　ちょっとびっくりしただけ。\nそれよりそーちゃん、パパとママ」
2584 = "「Không sao! Chỉ hơi giật mình chút thôi.\nQuan trọng hơn nè Sou-chan, bố với mẹ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。二人ともぐっすりだね」
2350 = "「Ừ. Cả hai đều ngủ say sưa nhỉ.」"
# monologue
# JP: 母さんはお弁当の準備とかで早起きだろうし……
3154 = "Mẹ chắc phải dậy sớm chuẩn bị cơm hộp các kiểu……"
# monologue
# JP: 父さんは、案外僕とおんなじで、\nわくわくで寝不足なのかもしれない。
3396 = "Bố thì, biết đâu lại giống tôi,\nháo hức quá nên thiếu ngủ cũng nên."
# 【路子】
# display as 路子
# JP: 「ねぇ、そーちゃん、いま何時？\nれっしゃ、どの辺を走ってるの？」
2740 = "「Này, Sou-chan, bây giờ là mấy giờ rồi?\n\x%l列車;#00ffc040;Tàu%l;#; đang chạy đến đoạn nào rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからない。――窓の外、真っ暗だし。\n時計は、父さんがしてるけど」
2123 = "「Anh không biết. ——Bên ngoài cửa sổ tối om à.\nĐồng hồ thì bố đang đeo.」"
# 【路子】
# display as 路子
# JP: 「そっか、見ちゃお！」
2721 = "「Vậy sao, để em xem thử!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、こら！　そんなことしたら」
2330 = "「A, này! Em làm thế thì」"
# monologue
# JP: 止める間もなく、路子が父さんの手をつかむ。\nとたんにゆるゆる、落ちてたまぶたが持ち上がる。
3349 = "Chưa kịp ngăn lại, Michiko đã nắm lấy tay bố.\nNgay lập tức, đôi mí mắt đang nhắm nghiền từ từ mở ra."
# 【父】
# display as 父親
# JP: 「ん……ああ、眠ってしまっていたか」
2346 = "「Ưm……à, bố ngủ quên mất à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから言ったのに」
2494 = "「Anh đã bảo rồi mà.」"
# 【路子】
# display as 路子
# JP: 「はぅぅ～……ごめんなさい～」
2287 = "「Hau~……con xin lỗi~」"
# 【父】
# display as 父親
# JP: 「いや、丁度いいところで起こしてくれた。\nほら、お前も、寝ていると絶景を見逃すぞ？」
2134 = "「Không sao, con gọi bố dậy đúng lúc lắm.\nKìa, em cũng dậy đi, ngủ là bỏ lỡ cảnh đẹp đấy?」"
# 【母】
# display as 母親
# JP: 「あら……やだ、わたしったら居眠りなんて」
2289 = "「Ôi……chết thật, mẹ lại ngủ gật mất.」"
# monologue
# JP: 結局みんな起きちゃった。\nけど、絶景なんていったって――
3436 = "Cuối cùng thì mọi người đều dậy hết.\nNhưng mà, bảo là cảnh đẹp thì——"
# 【路子】
# display as 路子
# JP: 「お外、まっくらだよ？」
2233 = "「Bên ngoài, tối om mà bố?」"
# 【父】
# display as 父親
# JP: 「はは、真っ暗なのは――ほら！」
2286 = "「Haha, tối om là vì——đó!」"
# 【路子】
# display as 路子
# JP: 「わ！？」
2281 = "「Oa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そっか、トンネルだったのか」
2202 = "「Ra là vậy, vừa nãy là đường hầm sao.」"
# monologue
# JP: 真っ黒だった世界に色が戻ってくる。
3374 = "Thế giới đen kịt đã lấy lại được màu sắc."
# monologue
# JP: ……だけれど、それは鈍くあせてる。
1797 = "……Nhưng mà, màu sắc ấy lại xỉn đi và nhạt nhòa."
# 【路子】
# display as 路子
# JP: 「やだやだ、大雨になっちゃってる」
2120 = "「Chán ghê, trời mưa to mất rồi.」"
# monologue
# JP: そう言って、\n次の瞬間、路子は丸い目で僕を見上げる。
3553 = "Nói xong,\nngay giây tiếp theo, Michiko ngước nhìn tôi bằng đôi mắt tròn xoe."
# 【路子】
# display as 路子
# JP: 「だいじょうぶ！？　\nじょうききかんしゃの火、消えちゃわない？」
2580 = "「Không sao chứ!?\nLửa của \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; có bị tắt không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……お前は\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;をどんなものだと思ってるんだ」
1836 = "「……Em nghĩ \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; là cái gì vậy.」"
# 【路子】
# display as 路子
# JP: 「しらない。だって、見てないもん」
2138 = "「Em không biết. Tại em chưa được thấy mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ねぼうするから見れなかったんだろう」
2730 = "「Tại em ngủ nướng nên mới không được xem đấy.」"
# monologue
# JP: 言えば路子は、てへっと笑って舌を出す。\nねぼうした上、この服じゃヤダのあの帽子がいいの――
3546 = "Nghe tôi nói vậy, Michiko cười hì hì rồi thè lưỡi.\nĐã ngủ nướng rồi, lại còn chê bộ này không thích, cái mũ kia mới chịu cơ——"
# monologue
# JP: あんなにバタバタしなければ、\n乗り込む前に、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の鉄の体を見ておけたのに。
3491 = "Nếu không lề mề như vậy,\nthì trước khi lên tàu, chúng tôi đã có thể chiêm ngưỡng cỗ máy bằng sắt của \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; rồi."
# 【路子】
# display as 路子
# JP: 「そーちゃんは知ってるの？」
2437 = "「Sou-chan có biết không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。旅行の前にずかんで調べた」
2353 = "「Ừ. Trước chuyến du lịch anh có tra từ điển bách khoa rồi.」"
# monologue
# JP: だからこそ、実物を見て確かめたかった。\nだけどあんまり悔やんでいたら、路子に伝わる。
3276 = "Chính vì vậy, tôi rất muốn được tận mắt chứng kiến.\nNhưng nếu tôi tỏ ra quá tiếc nuối, Michiko sẽ nhận ra mất."
# monologue
# JP: せっかくの旅行でケンカもヤだから、\n切り替えて、ちゃんと説明してあげる。
3614 = "Đi du lịch mà cãi nhau thì chán lắm,\nnên tôi thay đổi thái độ, giải thích cặn kẽ cho con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄のぶ厚い体の中に、ボイラっていう釜がある。\nその中で石炭を燃やしてるから、雨が降っても消えない」
2376 = "「Bên trong cơ thể bằng sắt dày cộp đó, có một cái nồi gọi là nồi hơi.\nThan được đốt bên trong đó nên dù trời mưa cũng không bị tắt đâu.」"
# 【路子】
# display as 路子
# JP: 「そっかぁ、なら安心だねぇ」
2722 = "「Vậy sao, thế thì yên tâm rồi nhỉ.」"
# monologue
# JP: 路子がほーっと息を吐く。\nけど母さんは、路子と逆に不安げだ。
3555 = "Michiko thở phào nhẹ nhõm.\nNhưng mẹ thì ngược lại, trông có vẻ bất an."
# 【母】
# display as 母親
# JP: 「台風、[そ]逸れてくれなかったんでしょうか？」
2793 = "「Bão, không đổi hướng sao anh?」"
# 【父】
# display as 父親
# JP: 「……そのようだな。\nこれではせっかくの冨士も拝めないか」
1842 = "「……Có vẻ là vậy.\nThế này thì uổng công chẳng ngắm được núi Phú Sĩ rồi.」"
# 【路子】
# display as 路子
# JP: 「ふじさん！？」
2418 = "「Núi Phú Sĩ ạ!?」"
# 【父】
# display as 父親
# JP: 「ああ。しばらくいくと、この\x%l列車;#00ffc040;列車%l;#;は\n冨士川[きょうりょう,1]橋梁という鉄橋を抜ける」
2540 = "「Ừ. Đi thêm một lát nữa, \x%l列車;#00ffc040;chuyến tàu%l;#; này\nsẽ đi qua một cây cầu sắt tên là cầu Fujikawa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄橋。\nなら、その上から冨士山が？」
2772 = "「Cầu sắt.\nVậy là từ trên đó có thể thấy núi Phú Sĩ sao?」"
# 【父】
# display as 父親
# JP: 「晴れていればな。見事な冨士が拝めるのだが……\nまぁ、台風を抜けてさえしまえば――うおっ！？」
2666 = "「Nếu trời nắng thì có thể ngắm được cảnh núi Phú Sĩ tuyệt đẹp đấy……\nNhưng mà, chỉ cần thoát khỏi cơn bão thì——oái!?」"
# monologue
# JP: （グラっ！）
3670 = "（Lắc!）"
# 【路子】
# display as 路子
# JP: 「きゃあっ！？」
2266 = "「Á!?」"
# monologue
# JP: \x%l列車;#00ffc040;列車%l;#;が横に大きくゆれて、路子が僕に貼りついてくる。\n母さんも、父さんにギュっとしがみついてる。
106 = "\x%l列車;#00ffc040;Tàu%l;#; lắc mạnh sang một bên, Michiko bám chặt lấy tôi.\nMẹ cũng ôm chầm lấy bố."
# 【双鉄】
# display as 雙鐵
# JP: 「今、ずいぶんゆれたけど」
2194 = "「Vừa nãy, lắc mạnh quá nhỉ.」"
# 【父】
# display as 父親
# JP: 「……[そ]逸れなかったどころか、\n直撃コースに入ってしまったのかもしれないな」
1839 = "「……Đâu chỉ là không đổi hướng,\ncó khi chúng ta đã lọt vào vùng tâm bão rồi cũng nên.」"
# monologue
# JP: 「台風のせい？」と聞くより先に、\n父さんが早口で答えてくれる。
3348 = "Chưa kịp hỏi \"Là do bão sao?\",\nbố đã trả lời một cách nhanh nhảu."
# 【路子】
# display as 路子
# JP: 「ちょくげきコースに入っちゃうと、どうなるの？」
2686 = "「Lọt vào vùng tâm bão thì sẽ thế nào ạ?」"
# monologue
# JP: （ガトンっ！）
3666 = "（Kịch!）"
# 【路子】
# display as 路子＆雙鐵
# JP: 「きゃあああああああっ！？」\n「うわあっ！？」
2258 = "「Á á á á á á á!?」\n「Oái!?」"
# monologue
# JP: 体、浮くっ！
3493 = "Cơ thể, lơ lửng!"
# monologue
# JP: 強すぎるゆれに、\n体、路子ごと持ってかれ――っ！？
3284 = "Cú lắc quá mạnh khiến\ncả cơ thể tôi và Michiko đều bị hất văng——!?"
# 【父】
# display as 父親＆母親
# JP: 「双鉄っ！」\n「路子っ！」
2787 = "「Soutetsu!」\n「Michiko!」"
# monologue
# JP: （ぐいっ！！）
3683 = "（Kéo!!）"
# monologue
# JP: のびてきた手につかまえられて、\n浮きかけていた体を強く引き戻される。
2939 = "Bị một bàn tay vươn tới tóm lấy,\ncơ thể đang lơ lửng của tôi bị kéo mạnh trở lại."
# monologue
# JP: 僕の手の中、\n路子は小さくふるえちゃってる。
3544 = "Trong vòng tay tôi,\nMichiko đang run rẩy nhè nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か、みち――っ！？」
2581 = "「Không sao chứ, Michi——!?」"
# monologue
# JP: (グンっ！)
34 = "(Kịch!)"
# 【路子】
# display as 路子
# JP: 「やっ！？」
# 2266 = "「呀！？」" 
# monologue
# JP: 席へともどった体が今度は、\n背もたれにギュっと押し付けられる。
3149 = "Cơ thể vừa trở lại ghế lần này,\nlại bị ép chặt vào lưng ghế."
# monologue
# JP: \x%l列車;#00ffc040;列車%l;#;――これ、加速してっ！？
105 = "\x%l列車;#00ffc040;Tàu%l;#;——đang tăng tốc sao!?"
# 【双鉄】
# display as 雙鐵
# JP: 「父さん」
2616 = "「Bố ơi.」"
# 【父】
# display as 父親
# JP: 「バカな。こんな悪天候で加速などしたら、\n最悪の場合脱線も」
2462 = "「Vô lý. Thời tiết xấu thế này mà còn tăng tốc,\ntệ nhất có thể bị trật bánh mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2796 = "「!」"
# 【路子】
# display as 路子
# JP: 「ぃやぁだぁっ！！」
2128 = "「Không chịu đâu!!」"
# monologue
# JP: 僕の怯えが路子に伝わり、\nそれが路子に膨らまされて、僕のお腹の底へと戻る。
3538 = "Nỗi sợ hãi của tôi truyền sang Michiko,\nrồi bị con bé phóng đại lên và dội ngược lại vào tận đáy lòng tôi."
# monologue
# JP: これ、ダメだ。\nこのままだったら、路子は絶対、大泣きしちゃう。
2953 = "Không ổn rồi.\nCứ thế này, Michiko chắc chắn sẽ khóc ré lên mất."
# 【乗客Ｂ】
# display as 乘客Ｂ
# JP: 「\x%l車掌;#00ffc040;車掌%l;#;をよんで！　ちょっと、誰か！\n\x%l車掌;#00ffc040;車掌%l;#;をよんでっていってるの！」
2225 = "「Gọi \x%l車掌;#00ffc040;trưởng tàu%l;#; đi! Này, có ai không!\nTôi bảo gọi \x%l車掌;#00ffc040;trưởng tàu%l;#; đi mà!」"
# 【路子】
# display as 路子
# JP: 「やだっ――やだ――やだよぉ」
2127 = "「Không đâu——không chịu đâu——sợ lắm.」"
# monologue
# JP: 一人が大きな声をあげたら、みんなつられて大声を出す。\n路子は体をますます固くし、震えてしまう。
3097 = "Một người hét lên, những người khác cũng bị cuốn theo mà hét lớn.\nMichiko càng lúc càng co rúm người lại, run lẩy bẩy."
# monologue
# JP: なんとか、なだめる方法は――そうだ！
3322 = "Phải tìm cách dỗ dành con bé——đúng rồi!"
# 【双鉄】
# display as 雙鐵
# JP: 「みち。前の方がどうなってるか、興味ない？」
2425 = "「Michi. Em có tò mò phía trước đang như thế nào không?」"
# monologue
# JP: 顔を両手ではさみこみ、\n涙でもうぬれ始めてる目を無理やり僕に向けさせる。
3257 = "Tôi áp hai tay vào má con bé,\nbuộc đôi mắt đã rơm rớm nước mắt kia phải nhìn về phía tôi."
# 【路子】
# display as 路子
# JP: 「ま、前の方？」
2191 = "「Ph-Phía trước á?」"
# monologue
# JP: 僕は興味ある、僕は興味ある、僕は興味ある――\n僕のふたごに伝わるように、心で何度も繰り返す。
3238 = "Anh tò mò lắm, anh tò mò lắm, anh tò mò lắm——\nTôi nhẩm đi nhẩm lại trong lòng, hy vọng nó sẽ truyền đến người em sinh đôi của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「この\x%l列車;#00ffc040;列車%l;#;、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が引っ張ってるでしょ？\nだから、前の方に行ってみたら」
2530 = "「\x%l列車;#00ffc040;Chuyến tàu%l;#; này, do \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; kéo đúng không?\nNên nếu lên phía trước xem thử.」"
# 【双鉄】
# display as 雙鐵＆路子
# JP: 「！」\n「んっ――」
2798 = "「!」\n「Ưm——」"
# monologue
# JP: 横に大きくゆすられて、それでも路子が悲鳴を飲み込む。
3060 = "Bị lắc mạnh sang một bên, nhưng Michiko vẫn cố nuốt tiếng hét vào trong."
# monologue
# JP: 僕の気持ちがつたわっている。路子の恐怖が薄れてる。\nそう感じるから、立ち上がりながら小さな手を取る。
3407 = "Tâm trạng của tôi đã truyền đến con bé. Nỗi sợ hãi của Michiko đang vơi dần.\nCảm nhận được điều đó, tôi vừa đứng lên vừa nắm lấy bàn tay nhỏ bé kia."
# 【双鉄】
# display as 雙鐵
# JP: 「前の方の窓からなら、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が見えるかもしれない。\nきっと力強くて格好良くって、頼もしいよ」
2450 = "「Nếu nhìn từ cửa sổ phía trước, biết đâu sẽ thấy được \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; đấy.\nChắc chắn là nó rất mạnh mẽ, rất ngầu và đáng tin cậy lắm.」"
# monologue
# JP: “だから、見れたら安心できる”と、\nそんな気持ちも言葉に込める。
3229 = "\"Vì vậy, nếu nhìn thấy nó, em sẽ an tâm thôi\",\ntôi gửi gắm cả tâm tư đó vào lời nói."
# monologue
# JP: ガタガタゆれてさらに加速する\x%l列車;#00ffc040;列車%l;#;に怖じず、\nしっかりと僕の手を取って、路子は笑顔で立ち上がる。
3551 = "Không hề sợ hãi trước \x%l列車;#00ffc040;chuyến tàu%l;#; đang rung lắc dữ dội và tiếp tục tăng tốc,\nMichiko nắm chặt tay tôi, mỉm cười đứng dậy."
# 【路子】
# display as 路子
# JP: 「それなら、みちも見に行きたい！」
2749 = "「Nếu vậy, Michi cũng muốn đi xem!」"
# 【双鉄】
# display as 雙鐵
# JP: 「よし、決まりだ」
2413 = "「Được, quyết định vậy đi.」"
# 【父】
# display as 父親
# JP: 「いや、ちょっと待て！」
2132 = "「Không, đợi đã hai đứa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ。ちゃんとついてこいよ」
2664 = "「Đi thôi. Bám sát anh nhé.」"
# monologue
# JP: 僕らを止める父さんの声に追いつかれぬよう、\n素早く路子の手を引き、進む。
3255 = "Để không bị tiếng gọi của bố đuổi kịp,\ntôi nhanh chóng kéo tay Michiko đi về phía trước."
# monologue
# JP: 僕だって本当はわかってる。\nこんなときには席で動かず、じっとしているべきだと。
3221 = "Thực ra tôi cũng biết chứ.\nNhững lúc thế này đáng lẽ phải ngồi yên một chỗ, không được chạy lung tung."
# monologue
# JP: （けど、そうしたらみちが泣いちゃう）
3658 = "（Nhưng mà, làm vậy thì Michi sẽ khóc mất.）"
# monologue
# JP: 思えば、どうしても体が動く。
2935 = "Nghĩ vậy, cơ thể tôi bất giác hành động."
# monologue
# JP: （泣かせちゃダメだ――僕は、おにいちゃんなんだから）
3681 = "（Không được để em ấy khóc——vì mình, là anh trai mà.）"
# 【路子】
# display as 路子
# JP: 「きゃっ」
2256 = "「Á.」"
# monologue
# JP: 路子を支える。\nそう思うから、僕は泣かずに頑張れる。
3252 = "Phải bảo vệ Michiko.\nNghĩ vậy nên tôi mới có thể cố gắng mà không khóc."
# monologue
# JP: 本当に赤ちゃんだったころから、\nずっとずうっとしてきたことだ。
3189 = "Kể từ khi còn là những đứa trẻ sơ sinh,\ntôi đã luôn luôn làm như vậy rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ね、みち。こんなにすごいスピードだ。前に行ったら、\n\x%l客車;#00ffc040;客車%l;#;の中まで煙もくもくかもしれないぞ？」
2432 = "「Nè, Michi. Tốc độ kinh khủng thế này. Nếu lên phía trước,\nbiết đâu khói sẽ mù mịt cả trong \x%l客車;#00ffc040;toa hành khách%l;#; đấy?」"
# 【路子】
# display as 路子
# JP: 「やぁだぁ、そんなのぉ。\nお洋服、けむくなっちゃう」
2141 = "「Không chịu đâu, thế thì.\nQuần áo sẽ bị ám mùi khói mất.」"
# monologue
# JP: そういいながらも、路子の顔には赤みが戻る。\nつないでる手も、もうふるえてない。
3554 = "Dù nói vậy, nhưng khuôn mặt Michiko đã hồng hào trở lại.\nBàn tay đang nắm lấy tôi cũng không còn run nữa."
# monologue
# JP: いつもだったらじゃまくさいだけの“ふたご同士”が、\nこういうときには、ときだけは、心強いし、ありがたい。
3177 = "Cái \"tình anh em sinh đôi\" bình thường chỉ thấy phiền phức,\nnhưng trong những lúc thế này, chỉ những lúc thế này thôi, lại mang đến sự an tâm và đáng quý."
# 【双鉄】
# display as 雙鐵
# JP: 「このドアの向こうが、一番まえの\x%l客車;#00ffc040;客車%l;#;だ」
2716 = "「Sau cánh cửa này, là \x%l客車;#00ffc040;toa hành khách%l;#; đầu tiên đấy.」"
# 【路子】
# display as 路子
# JP: 「うん！」
2360 = "「Vâng!」"
# monologue
# JP: （席、結構空きが多いや。\nお客さん、二両目にはたくさんだったのに）
3689 = "（Chỗ ngồi trống nhiều quá.\nHành khách ở toa thứ hai đông lắm cơ mà.）"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「ねぇ、このスピードって普通なの？\nなんで、こんなに揺れてるの？」
2713 = "「Này, tốc độ này là bình thường sao?\nSao lại lắc dữ dội thế này?」"
# monologue
# JP: だけれど、ひどくざわついている。
2957 = "Tuy nhiên, bầu không khí lại vô cùng ồn ào, xôn xao."
# 【車内販売】
# display as 車内商店
# JP: 「大丈夫です。\n悪天候で、揺れが大きくなってるだけです」
2589 = "「Không sao đâu ạ.\nChỉ là do thời tiết xấu nên mới bị rung lắc mạnh thôi.」"
# monologue
# JP: 車内販売のお姉さんが、\nなんとかみんなを落ち着かせようと頑張っている。
3519 = "Chị \x%l車販;#00ffc040;nhân viên bán hàng%l;#; trên tàu,\nđang cố gắng hết sức để trấn an mọi người."
# 【路子】
# display as 路子
# JP: 「まどから前の方見えるかなぁ？」
2647 = "「Từ cửa sổ có nhìn thấy phía trước không nhỉ?」"
# monologue
# JP: その光景から逃げるみたいに路子が窓にべったり貼り付き、\nとたんにくるりと、泣きそうな顔で僕を見る。
3541 = "Như muốn trốn chạy khỏi cảnh tượng đó, Michiko áp sát mặt vào cửa sổ,\nrồi đột nhiên quay phắt lại, nhìn tôi với khuôn mặt như sắp khóc."
# 【路子】
# display as 路子
# JP: 「そーちゃぁん」
2436 = "「Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん……なんだ、これ……\nちょっと、ひどいね。何も見えない」
2348 = "「Ừm……cái gì thế này……\nHơi tệ nhỉ. Chẳng nhìn thấy gì cả.」"
# monologue
# JP: 真っ白だ。
2938 = "Trắng xóa."
# monologue
# JP: 映画の中の銃弾みたいに、雨粒が強く叩きつけられ、\n次々と割れては真っ白に、ガラス全部を塗りつぶしてる。
3167 = "Những hạt mưa đập mạnh vào cửa kính như những viên đạn trong phim,\nliên tiếp vỡ tan, nhuộm trắng xóa toàn bộ tấm kính."
# 【路子】
# display as 路子
# JP: 「雨って……こんなにこわくなるんだ」
2201 = "「Mưa……lại đáng sợ đến thế này sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、怖いね。けど、雨は雨だ。\nガラスを越えて、なにが出来るってものでもないよ」
2545 = "「Đúng là đáng sợ thật. Nhưng mưa thì vẫn là mưa thôi.\nNó chẳng thể xuyên qua lớp kính này mà làm gì được đâu.」"
# monologue
# JP: 路子に言って、\n言うことで、自分でもそう信じようと――っ！？
3270 = "Tôi nói với Michiko,\ncũng là để tự nhủ với bản thân mình như vậy——!?"
# 【路子】
# display as 路子
# JP: 「きゃあっ！？」
2265 = "「Á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「みちっ！」
2429 = "「Michi!」"
# monologue
# JP: 横ゆれ！　足が跳ね上げられるっ！
3568 = "Lắc ngang! Chân bị hất tung lên!"
# monologue
# JP: 路子をかばう体がそのまま、\n踏ん張りきれずに崩れてしまっ――――！
3254 = "Cơ thể đang che chở cho Michiko,\nkhông thể trụ vững mà ngã nhào――――!"
# monologue
# JP: （どすっ！）
# 3665 = "（咚！）" 
# monologue
# JP: 衝撃。\nなのに、温かい。
3287 = "Cú va đập.\nVậy mà, lại thấy ấm áp."
# 【父】
# display as 父親
# JP: 「双鉄！　路子っ！　もとの席にもどるんだっ」
2789 = "「Soutetsu! Michiko! Quay lại chỗ ngồi ngay.」"
# monologue
# JP: 父さんだ。\n僕らを支えたそのかたわらに、母さんの優しい目も見える。
3318 = "Là bố.\nBên cạnh bố đang đỡ lấy chúng tôi, tôi cũng nhìn thấy ánh mắt dịu dàng của mẹ."
# 【母】
# display as 母親
# JP: 「大丈夫よ、みち、双鉄。\nお母さんたちがついてますから」
2582 = "「Không sao đâu, Michi, Soutetsu.\nCó bố mẹ ở đây rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2357 = "「Vâng.」"
# 【路子】
# display as 路子
# JP: 「パパ！　ママ！」
2615 = "「Bố! Mẹ!」"
# monologue
# JP: （ポォーーーーーーーーーーーーーーーーーーっ！）
3673 = "（Tuuuuuuuuuuuu!）"
# 【路子】
# display as 路子＆雙鐵
# JP: 「きゃああっ！？」\n「なんだっ！？」
2262 = "「Á á!?」\n「Cái gì vậy!?」"
# monologue
# JP: （ポ！　ポオォッ！　ポッ！　ポーーーーーーーーッ！）
3675 = "（Tu! Tuuu! Tu! Tuúúúúúúúúúúú!）"
# 【父】
# display as 父親
# JP: 「緊急事態だ、ただごとじゃっ――うわあああっ！！？」
2642 = "「Tình trạng khẩn cấp rồi, không phải chuyện đùa đâu——oái!!?」"
# monologue
# JP: けたたましすぎる\x%l汽笛;#00ffc040;汽笛%l;#;に重なる、\nさっきより更に強い横揺れ！
2984 = "Tiếng \x%l汽笛;#00ffc040;còi hơi nước%l;#; inh ỏi vang lên,\nkèm theo cú lắc ngang còn mạnh hơn lúc nãy!"
# monologue
# JP: 父さんが姿勢を大きく崩し、\n僕らのことを巻き込まぬようその手を離して！
3395 = "Bố mất thăng bằng nghiêm trọng,\nvà để không kéo theo chúng tôi, bố đã buông tay ra!"
# 【母】
# display as 母親
# JP: 「みちっ！　双鉄っ！」
2431 = "「Michi! Soutetsu!」"
# 【路子】
# display as 路子
# JP: 「ママぁ！」
2415 = "「Mẹ ơi!」"
# monologue
# JP: （ガシャンッ！！！！！！）
3669 = "（Rầm!!!!!!）"
# monologue
# JP: 母さんの体にかばってもらったその瞬間、\n視界の端に飛び込んでくる。
3155 = "Khoảnh khắc được cơ thể mẹ che chở,\nmột hình ảnh lọt vào khóe mắt tôi."
# 【車内販売】
# display as 車内商店
# JP: 「ああっ！！？」
2325 = "「Á!!?」"
# monologue
# JP: \x%l車販;#00ffc040;車販%l;#;のおねえさんまでもがワゴンごと、\nあまりの揺れに耐え切れないで、転んじゃって――っ！？
109 = "Ngay cả chị \x%l車販;#00ffc040;nhân viên bán hàng%l;#; cũng không trụ nổi trước cú rung lắc dữ dội,\nngã nhào cùng với chiếc xe đẩy——!?"
# monologue
# JP: （ポーーーーーーーーーーーーーーーーーーーーーーー）
3674 = "（Tuuuuuuuuuuuu）"
# 【路子】
# display as 路子
# JP: 「っ！！？　これダメっ！\nにげてっ！　にげてそーちゃんっ！！」
2802 = "「!!? Không được rồi!\nChạy đi! Chạy đi Sou-chan!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「えっ！？」
2297 = "「Hả!?」"
# monologue
# JP: （ドンっ！）
# 3665 = "（咚！）" 
# monologue
# JP: 突き飛ばされる。\n路子に、僕が、両手で力いっぱいに。
3540 = "Bị đẩy mạnh.\nMichiko dùng hai tay đẩy tôi ra bằng tất cả sức lực."
# monologue
# JP: あまりのことに対応できず、\nそのまま\x%l列車;#00ffc040;列車%l;#;の揺れに弾かれっ――
2998 = "Quá bất ngờ nên tôi không kịp phản ứng,\ncứ thế bị chấn động của \x%l列車;#00ffc040;tàu%l;#; hất văng đi——"
# monologue
# JP: (ズガガガガガガっ！！！！！！！！）
33 = "(Rầm rầm rầm rầm rầm rầm!!!!!!!!)"
# 【双鉄】
# display as 雙鐵＆路子
# JP: 「うわっ！？」\n「きゃあああああああああああああっ！！！」
2341 = "「Oái!?」\n「Á á á á á á á á á á á á á!!!」"
# monologue
# JP: 体全部が浮いてしまって、遅れて激しい痛みを感じる。
3247 = "Cả cơ thể tôi bay bổng lên không trung, một lúc sau cơn đau dữ dội mới ập đến."
# 【双鉄】
# display as 雙鐵
# JP: 「ぐあっ！！！」
2343 = "「Hự!!!」"
# monologue
# JP: 肺がつぶれる！\n体の空気全部が強引に搾り出される！！
3259 = "Phổi như bị dập nát!\nToàn bộ không khí trong cơ thể bị ép mạnh ra ngoài!!"
# monologue
# JP: （ガツンっ！）
# 3665 = "（咚！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「あぐっ！」
2326 = "「Á!」"
# monologue
# JP: たたきつけられる衝撃、痛み。\n悲鳴がこぼれ、自分が息を吐いたと気づき――
3456 = "Cú va đập kinh hoàng, sự đau đớn tột cùng.\nMột tiếng hét bật ra, và tôi nhận ra mình vừa thở hắt ra——"
# monologue
# JP: 瞬間、全身の血が落ちる。
3418 = "Khoảnh khắc đó, máu toàn thân như rút hết xuống."
# monologue
# JP: （だったら――さっきの――\n肺がぐしゃりと潰れる痛みは――っ）
3655 = "（Nếu vậy thì——cơn đau——\nnhư thể phổi bị nghiền nát lúc nãy là——）"
# monologue
# JP: ……何も見えない。\n……体が全く動かない。
1799 = "……Không nhìn thấy gì cả.\n……Cơ thể hoàn toàn không thể cử động."
# monologue
# JP: 雨音混じりに、パチパチという音が聞こえる。\nむせ返るような生臭さ、それから焦げたにおいを感じる。
2987 = "Lẫn trong tiếng mưa, tôi nghe thấy âm thanh lách tách.\nMùi tanh tưởi đến nghẹt thở, rồi cả mùi khét lẹt xộc vào mũi."
# 【双鉄】
# display as 雙鐵
# JP: 「あ――――ぐっ――路……子っ」
2321 = "「A――――ư——Michi……ko.」"
# monologue
# JP: 声が出る。\n右手は動く。
3231 = "Tôi có thể phát ra tiếng.\nTay phải có thể cử động."
# monologue
# JP: 精一杯に右手を伸ばして。\n指の先まで伸ばし伸ばして、手当たりしだいに周囲を探る。
3244 = "Tôi cố gắng vươn tay phải ra hết mức có thể.\nVươn dài đến tận đầu ngón tay, quờ quạng tìm kiếm xung quanh."
# monologue
# JP: （路子――路子っ！！！）
3692 = "（Michiko——Michiko!!!）"
# monologue
# JP: さっきは出せた声が出ない。\nにおいはどんどん強くなるのに、他の全てがかすれ始める。
3218 = "Tôi không thể phát ra âm thanh như lúc nãy nữa.\nMùi hôi ngày càng nồng nặc, nhưng mọi thứ khác bắt đầu mờ nhạt dần."
# monologue
# JP: それでも、手だけは伸ばし続ける。\nなにも見えなくたって感じる、僕のふたごのいる方に――
3169 = "Dù vậy, tôi vẫn tiếp tục vươn tay ra.\nHướng về phía người em sinh đôi mà dù không nhìn thấy tôi vẫn có thể cảm nhận được——"
# monologue
# JP: （ぐにっ）
3685 = "（Mềm nhũn）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2324 = "「A……」"
# monologue
# JP: 触れた瞬間。だから。わかってしまう。\n見えてなくても、指先がこれほど鈍っていても。
3072 = "Khoảnh khắc chạm vào. Chính vì thế. Tôi hiểu ra ngay.\nDù không nhìn thấy, dù đầu ngón tay có tê dại đến nhường này."
# monologue
# JP: いや、本当は――\n触れなくたって、わかってた。
2959 = "Không, thực ra——\nDù không chạm vào, tôi cũng đã biết rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「……っ……み……ち……」
1825 = "「……Mi……chi……」"
# 【ハチロク】
# display as ？？？
# JP: 「――様っ！　双鉄様っ！！」
1822 = "「——Ngài! Ngài Soutetsu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2796 = "「！」" 
# monologue
# JP: 見ずとも、聞かずともわかる。\nそれほどまでに、繰り返している。
3071 = "Không cần nhìn, không cần nghe cũng biết.\nGiấc mơ này đã lặp lại quá nhiều lần rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「夢か」
2543 = "「Là mơ sao.」"
# 【ハチロク】
# display as 八六
# JP: 「汗、お拭きしますね。\nひどくうなされてらっしゃいましたが――」
2472 = "「Em lau mồ hôi cho ngài nhé.\nNgài gặp ác mộng dữ dội lắm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「大事ない。ただの夢だ」
2585 = "「Không sao đâu. Chỉ là mơ thôi.」"
# monologue
# JP: そう、ただの夢。\n何度も何度も見ている、夢だ。
3351 = "Đúng vậy, chỉ là một giấc mơ.\nMột giấc mơ mà tôi đã thấy vô số lần."
# 【双鉄】
# display as 雙鐵
# JP: （ここまで鮮明なものは――\nもう何年も見ていなかったがな）
3654 = "（Nhưng một giấc mơ sống động đến mức này——\nđã nhiều năm rồi tôi không gặp lại.）"
# monologue
# JP: ……ここ何日も、破損状況確認のため、\n\x%l8620;#00ffc040;8620%l;#;にかかりきりなのが、恐らく影響してるのだろう。
1810 = "……Mấy ngày nay, tôi cứ bận rộn với việc xác nhận tình trạng hư hỏng của \x%l8620;#00ffc040;8620%l;#;,\ncó lẽ điều đó đã ảnh hưởng đến tôi."
# monologue
# JP: いや、ああ――そうか。\n今日は確か――
2961 = "À không——đúng rồi.\nHôm nay hình như là——"
# 【双鉄】
# display as 雙鐵
# JP: 「レールショップに行く約束か」
2678 = "「Đã hẹn đến cửa hàng đường sắt nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「そうですね。\n\x%l8620;#00ffc040;8620%l;#;修復に関しての所見をくださるとのことです」
2549 = "「Vâng ạ.\nCô ấy nói sẽ đưa ra ý kiến về việc phục hồi \x%l8620;#00ffc040;8620%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を細かに調べれば調べるほどに、\n破損状況のひどさと同じく、明確になる事実があった。
3607 = "Càng kiểm tra kỹ \x%l8620;#00ffc040;8620%l;#;,\ncùng với mức độ hư hỏng nghiêm trọng, có một sự thật càng trở nên rõ ràng."
# monologue
# JP: 修復に関し、自ら見解を出せないほどの――\nハチロクの、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての機能低下だ。
3033 = "Sự suy giảm chức năng của Hachiroku với tư cách là một \x%lレイルロオド;#00ffc040;Railord%l;#;——\nđến mức không thể tự mình đưa ra ý kiến về việc phục hồi."
# 【ハチロク】
# display as 八六
# JP: 「……わたくしが十全であれば、余計なお手間を\nポーレットさんにおかけしないで済みましたのに」
1845 = "「……Nếu em hoàn hảo, thì đã không phải làm phiền\ncô Paulette thêm nữa rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「余計な手間などとは微塵も思っていなかろう。\n嬉々として作業にかかっていたではないか」
2421 = "「Cô ấy chắc chắn không nghĩ đó là phiền phức đâu.\nChẳng phải cô ấy đã rất vui vẻ bắt tay vào việc sao.」"
# 【ハチロク】
# display as 八六
# JP: 「それは、確かにそうですが――」
2784 = "「Chuyện đó, thì đúng là vậy nhưng——」"
# monologue
# JP: ぱたぱた、小走りの足音が来る。\nふすまの向こうから、少し焦ったような声。
3118 = "Tiếng bước chân lạch cạch chạy tới.\nTừ bên kia cánh cửa kéo, một giọng nói có vẻ hơi sốt ruột vang lên."
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク？　にぃにぃまだ起きない？」
2174 = "「Hachiroku? Anh hai chưa dậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「あっ、丁度いま」
2328 = "「A, vừa mới dậy xong ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「起きたぞ」
2492 = "「Anh dậy rồi đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃあっ！？　あ、にぃに――兄さん、\nおはようございます」
2294 = "「Oái!? A, anh hai——anh trai,\nchào buổi sáng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう――とは言いがたいか。\nすまんな、寝過ごして迷惑をかけた」
2525 = "「Chào buổi sáng——có vẻ không đúng lắm nhỉ.\nXin lỗi nhé, anh ngủ quên mất, làm phiền em rồi.」"
# monologue
# JP: 頭を下げれば、ふすまが小さく開かれる。\n僕をちらと見、日々姫は元気な笑顔を浮かべる。
3445 = "Tôi vừa cúi đầu, cánh cửa kéo liền hé mở một chút.\nHibiki liếc nhìn tôi, rồi nở một nụ cười rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「迷惑なんて。\n大丈夫ですよ、兄さん。まだ間に合います」
2498 = "「Phiền phức gì chứ.\nKhông sao đâu anh trai. Vẫn còn kịp mà.」"
# monologue
# JP: 時計を見れば、約束時間まで十五分。
3260 = "Nhìn đồng hồ, còn mười lăm phút nữa là đến giờ hẹn."
# monologue
# JP: なるほど、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;を使えば、まだギリギリ間に合いそうだ。
3583 = "Ra là vậy,\nnếu dùng \x%lエアクラ;#00ffc040;Aircra%l;#; thì có vẻ vẫn vừa kịp lúc."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、良しっ」
2542 = "「Đúng vậy nhỉ, tốt rồi.」"
# monologue
# JP: 汗を流している時間も無い。\n濡れたパジャマをともかく脱ぎ捨て――
2970 = "Không có cả thời gian để tắm rửa nữa.\nTôi đành vội vàng cởi bỏ bộ đồ ngủ ướt đẫm mồ hôi——"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　にぃにっ！\nわ、私、先行っとるけん～～っ！！」　
2634 = "「Khoan!? Anh hai!\nE-Em đi trước đây~~!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「見積不能？」
2608 = "「Không thể ước tính sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
2551 = "「Vâng.」"
# monologue
# JP: 几帳面にファイリングされた書類を僕に差し出しながら、\nポーレットは申し訳無さそうな声をだす。
3367 = "Vừa đưa cho tôi tập tài liệu được sắp xếp gọn gàng,\nPaulette vừa cất giọng đầy vẻ áy náy."
# 【双鉄】
# display as 雙鐵
# JP: 「市場がなければ相場も無い、か」
2440 = "「Không có thị trường thì cũng chẳng có giá cả thị trường nhỉ.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;復活のため、ここ数日間かかりきりになって洗い出し、\nポーレットがまとめてくれた、必要改修内容リスト。
3222 = "Để hồi sinh \x%l8620;#00ffc040;8620%l;#;, suốt mấy ngày qua chúng tôi đã dồn toàn lực để rà soát,\nvà Paulette đã tổng hợp lại thành danh sách các hạng mục cần sửa chữa."
# monologue
# JP: 精緻にして明瞭なそれの、“見積もり”の項だけに\nずらりと並ぶ空白は、なかなかの威圧感を発している。
3579 = "Bản danh sách chi tiết và rõ ràng đó, chỉ riêng mục \"Ước tính\"\nlại là một hàng trống trơn, tạo ra một cảm giác áp đảo không hề nhỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「改修費、この状況だと……\n正直……億を超える可能性もあると思います」
2163 = "「Chi phí sửa chữa, với tình hình này thì……\nThành thật mà nói……tôi nghĩ có khả năng sẽ vượt quá hàng trăm triệu yên.」"
# 【日々姫】
# display as 日日姬
# JP: 「億！？　億って――」
2167 = "「Hàng trăm triệu yên!? Hàng trăm triệu yên thì——」"
# monologue
# JP: 日々姫の視線が、レールショップの壁へと走る。\nそこにあるのは、御一夜鉄道クマ川線の運賃表だ。
3303 = "Ánh mắt Hibiki hướng về phía bức tường của cửa hàng đường sắt.\nNơi đó có dán bảng giá vé tuyến Kumagawa của Đường sắt Ohimitera."
# 【日々姫】
# display as 日日姬
# JP: 「御一夜から湯医までが大人６９０円でしょう？\nだったら、ええっと……、一億円だとして――」
2452 = "「Từ Ohimitera đến Yunoi, vé người lớn là 690 yên đúng không?\nVậy thì, à ừm……, giả sử là một trăm triệu yên thì——」"
# 【れいな】
# display as 玲奈
# JP: 「１４４９２８人のお客さんを運べば、\n３２０円の利益がでますぅ」
2224 = "「Chỉ cần chở 144,928 hành khách,\nlà sẽ có lãi 320 yên đó nha~」"
# monologue
# JP: さすがは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;といったところか。\nれいなの計算は一瞬だ。
2942 = "Quả không hổ danh là \x%lレイルロオド;#00ffc040;Railord%l;#;.\nReina tính toán chỉ trong nháy mắt."
# monologue
# JP: その傍らで、ハチロクは一瞬開けかけた口を閉じ、\n日々姫は逆に、ぽかんと大きく口を開ける。
2937 = "Bên cạnh đó, Hachiroku khép lại cái miệng vừa định mở ra,\ncòn Hibiki thì ngược lại, há hốc mồm ngạc nhiên."
# 【日々姫】
# display as 日日姬
# JP: 「え？　じゅうよん……え？」
2303 = "「Hả? Mười bốn……hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「十四万四千九百二十八人、と聞いたぞ」
2397 = "「Mười bốn vạn bốn ngàn chín trăm hai mươi tám người, anh nghe vậy đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「十四万五千って！\n御一夜の人口よりずっとずううっと多いばいっ！！」
2199 = "「Mười bốn vạn năm ngàn người cơ á!\nNhiều hơn dân số của Ohimitera rất rất nhiều luôn đó!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。今、市の人口は\n三万五千を割り込んでますから」
2537 = "「Đúng vậy nhỉ. Hiện tại, dân số của thành phố\nđã giảm xuống dưới mức 35.000 người rồi.」"
# monologue
# JP: 苦笑を浮かべるポーレット。\n日々姫は頭を抱え込む。
3618 = "Paulette nở nụ cười gượng gạo.\nHibiki thì ôm đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「まともにいけば、\n採算は極めて厳しいわけか」
2651 = "「Nếu cứ làm theo cách thông thường,\nthì việc sinh lời là cực kỳ khó khăn nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l客車;#00ffc040;客車%l;#;のこととか、固定費とかを考えないでソレですから。\n観光\x%l列車;#00ffc040;列車%l;#;ですから指定席券でやれるとしても……」
2726 = "「Đó là còn chưa tính đến chuyện \x%l客車;#00ffc040;toa hành khách%l;#; hay chi phí cố định đấy ạ.\nDù là \x%l列車;#00ffc040;tàu%l;#; du lịch nên có thể bán vé ghế chỉ định đi chăng nữa thì……」"
# monologue
# JP: 結論までは口にせず、ポーレットは静かにうなだれる。
3350 = "Không nói ra kết luận, Paulette lặng lẽ cúi gằm mặt."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、絡めていく他無いな。\n\x%l8620;#00ffc040;8620%l;#;復活を、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対のための旗印とする」
2758 = "「Nếu vậy, chỉ còn cách liên kết chúng lại với nhau thôi.\nLấy việc hồi sinh \x%l8620;#00ffc040;8620%l;#; làm ngọn cờ đầu để phản đối việc thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「旗印、ですか？」
2512 = "「Ngọn cờ đầu, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「水汚染が起きれば、御一夜はゆるやかに死んでいく――\nそうと理解しているものは、決して少なくないはずだ」
2221 = "「Nếu ô nhiễm nguồn nước xảy ra, Ohimitera sẽ chết mòn——\nNhững người hiểu được điều đó chắc chắn không hề ít đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、はい。そうですよね」
2711 = "「Chuyện đó thì, vâng. Đúng là vậy.」"
# monologue
# JP: 右手の人差し指をそっと、ポーレットは自らの唇に当てる。
3366 = "Paulette nhẹ nhàng đặt ngón trỏ tay phải lên môi mình."
# 【ポーレット】
# display as 波萊特
# JP: 「潜在的には、多くの人が疑問や不安を持ってるはずです。\n銀行さんと対立したくなくて様子見をしているだけで」
2419 = "「Chắc chắn có rất nhiều người đang ngấm ngầm hoài nghi và bất an.\nChỉ là họ không muốn đối đầu với ngân hàng nên mới đứng ngoài quan sát thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「んんっ――」
2279 = "「Hừm——」"
# monologue
# JP: 咳払い。\nそして日々姫は立ち上がる。
3307 = "Hắng giọng.\nRồi Hibiki đứng dậy."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、なんだか難しいお話みたいですから。\nちょっと、外の空気を吸ってきます」
2308 = "「Anh trai, có vẻ câu chuyện hơi phức tạp rồi.\nEm ra ngoài hít thở không khí một chút nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2409 = "「Ừ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それじゃあ、少し失礼します」
2754 = "「Vậy thì, em xin phép một lát.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、れいなも、\nそろそろ始業準備をすすめておきますぅ」
2332 = "「A, Reina cũng,\nchuẩn bị bắt đầu công việc đây nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、お願いね、れいな」
2362 = "「Ừm, nhờ em nhé, Reina.」"
# monologue
# JP: 後から立ったれいながぽてぽて、レールショップを出る。\n礼儀正しく頭を下げて、日々姫も静かにれいなに続く。
3188 = "Reina đứng dậy sau lạch bạch bước ra khỏi cửa hàng đường sắt.\nHibiki cũng lễ phép cúi chào rồi lặng lẽ đi theo Reina."
# 【双鉄】
# display as 雙鐵
# JP: （議論になるのを嫌ったか、影響されるのを嫌ったか――\nいずれにしても、誘致賛成の立場は変えんわけか）
3677 = "（Không muốn tranh luận, hay không muốn bị ảnh hưởng đây——\nDù sao thì, con bé vẫn không thay đổi lập trường ủng hộ thu hút nhà máy sao.）"
# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんでしょう？　日々姫ちゃん、急に」
2518 = "「Sao vậy nhỉ? Bé Hibiki tự nhiên lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれはあれで、大人だということだ」
2439 = "「Con bé làm vậy cũng là vì nó đã trưởng thành rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁ」
2311 = "「Dạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、さっきの話だが――」
2643 = "「Tóm lại là, tiếp tục câu chuyện lúc nãy nhé——」"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;を復活させての観光誘致を、水資源の保護と……\nその先にまで関連付ける――ってことですよね？」
2558 = "「Tức là liên kết việc thu hút du lịch bằng cách hồi sinh \x%l8620;#00ffc040;8620%l;#;, với việc bảo vệ tài nguyên nước và……\ncả những mục tiêu xa hơn nữa——đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
2588 = "「Chính xác.」"
# monologue
# JP: 話が早い。
3159 = "Nói chuyện với người thông minh thật dễ."
# monologue
# JP: 何が目的で何が手段か、\nその点を、ポーレットも整頓できてるようだ。
3408 = "Đâu là mục đích, đâu là phương tiện,\ncó vẻ Paulette cũng đã phân định rõ ràng được điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「クマ川の町、水の町、温泉と焼酎の町――\n御一夜のイメージが広く定着すれば、誘致も頓挫しよう」
2782 = "「Thành phố của sông Kuma, thành phố của nước, thành phố của suối nước nóng và shochu——\nNếu hình ảnh của Ohimitera được khẳng định rộng rãi, thì kế hoạch thu hút nhà máy cũng sẽ bị cản trở thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「悪くない……ううん、とてもいいです。\nＳＬは、水がなければ動けませんし――」
2230 = "「Không tệ……à không, rất tuyệt vời ạ.\nSL thì không thể chạy nếu thiếu nước mà——」"
# monologue
# JP: ポーレットの言葉に、\n我が意を得たりといわんばかりにハチロクが頷く。
3036 = "Nghe những lời của Paulette,\nHachiroku gật đầu như thể đã tìm được người đồng điệu."
# 【ポーレット】
# display as 波萊特
# JP: 「この町は、そもそもクマ川の町ですから。\n関連付けのポイント、いくらでもあるって思います」
2715 = "「Thành phố này vốn dĩ đã là thành phố của sông Kuma rồi.\nNên tôi nghĩ có vô số điểm có thể liên kết lại với nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、その方向でまずは動くか」
2515 = "「Vậy thì, trước mắt cứ tiến hành theo hướng đó nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　即決ですか？」
2301 = "「Hả!? Quyết định ngay lập tức luôn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「何か問題でも？」
2566 = "「Có vấn đề gì à?」"
# monologue
# JP: 素直に問えば、\nポーレットの頬が赤くなる。
3271 = "Bị tôi hỏi thẳng,\nđôi má Paulette chợt ửng đỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「問題っていうか……あの、もう少し検討しても……\nその……うまくいかなかったときのこととか」
2164 = "「Cũng không hẳn là vấn đề……à ừm, tôi nghĩ nên cân nhắc thêm một chút……\nvề……trường hợp mọi chuyện không suôn sẻ chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、あげてくれ。\nうまくいかないと何が困る？」
2737 = "「Vậy cô cứ nói đi.\nNếu không suôn sẻ thì có gì đáng lo ngại?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの……」
2275 = "「Hả? À ừm……」"
# monologue
# JP: おずおずと、ポーレットの真っ白な指が折られていく。
3369 = "Rụt rè, Paulette bắt đầu bẻ từng ngón tay trắng muốt của mình."
# 【ポーレット】
# display as 波萊特
# JP: 「失敗したら、改修の目処がたたなくて、\n\x%l8620;#00ffc040;8620%l;#;は走れなくて、工場の誘致反対が盛り上がらない」
2572 = "「Nếu thất bại, sẽ không có triển vọng sửa chữa,\n\x%l8620;#00ffc040;8620%l;#; không thể chạy được, và phong trào phản đối thu hút nhà máy cũng không thể sôi nổi lên được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。つまりは失敗しても現状維持な上、\n時間と労力を支払うだけで、誤った選択を潰せるわけだ」
2587 = "「Đúng vậy. Tức là dù thất bại thì vẫn duy trì được hiện trạng,\nchỉ tốn chút thời gian và công sức, nhưng lại có thể loại bỏ được một lựa chọn sai lầm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2322 = "「A.」"
# monologue
# JP: 目を丸くして、ゆっくり頷き。\nそしてうふふと、ポーレットは楽しげに笑い出す。
3368 = "Tròn xoe mắt, cô ấy từ từ gật đầu.\nRồi Paulette bật cười vui vẻ."
# 【ポーレット】
# display as 波萊特
# JP: 「ほんとだ。双鉄くんの言うとおり。\nそれなら、やらないと損ですね」
2632 = "「Đúng thật. Đúng như Soutetsu-kun nói.\nNếu vậy thì không làm mới là thiệt thòi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。だからやるさ。\nついては、知恵を貸して欲しい」
2355 = "「Ừm. Nên mới phải làm chứ.\nNhân tiện, tôi muốn nhờ cô cho tôi chút ý kiến.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ええと……協力者候補ですか？」
2408 = "「Vâng. À ừm……về ứng cử viên cho vị trí cộng tác viên sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、まずは一人。\n我々以外に、意見をくれる味方が欲しい」
2553 = "「Đúng vậy, trước mắt là một người.\nTôi muốn có một đồng minh có thể đưa ra ý kiến, ngoài chúng ta ra.」"
# 【ポーレット】
# display as 波萊特
# JP: 「どういう人がいいでしょう？」
2792 = "「Anh muốn một người như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2480 = "「Để xem nào.」"
# monologue
# JP: 整理する。
3233 = "Tôi bắt đầu sắp xếp lại suy nghĩ."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修は現状、妨害に耐えられるような計画ではない。\nであるのならば、堅いところから始めるべきだ。
102 = "Kế hoạch sửa chữa \x%l8620;#00ffc040;8620%l;#; hiện tại chưa đủ vững chắc để chống chọi lại những hành động phá hoại.\nNếu vậy, chúng ta nên bắt đầu từ những nơi an toàn nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道や観光関連の知識や技術を持つ者。\nその上で、工場誘致に表立って反対していると有り難い」
2507 = "「Một người có kiến thức và kỹ thuật liên quan đến đường sắt hoặc du lịch.\nHơn nữa, nếu người đó công khai phản đối việc thu hút nhà máy thì càng tốt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら……こことかはどうでしょう？」
2757 = "「Nếu vậy……chỗ này thì sao?」"
# monologue
# JP: ポーレットがラックから一枚の紙を引き抜いて、\nその一点を指さしながら渡してくれる。
3365 = "Paulette rút một tờ giấy từ trên giá xuống,\nvừa chỉ vào một điểm trên đó vừa đưa cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「地図か。ん？　んんっ！？」
2380 = "「Bản đồ sao. Hử? Hửm!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんですか？　双鉄くん」
2461 = "「Sao vậy? Soutetsu-kun.」"
# monologue
# JP: 渡されたのは、\n『御一夜観光イラストマップ』。
3138 = "Thứ cô ấy đưa cho tôi,\nlà \"Bản đồ minh họa du lịch Ohimitera\"."
# monologue
# JP: そのイラストの絵柄に見覚えがありすぎる。
3580 = "Nét vẽ của những hình minh họa đó quá đỗi quen thuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の絵だぞ。これは」
2714 = "「Đây là tranh của Hibiki mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええっ！？　そうだったんですか？」
2299 = "「Hả!? Là vậy sao?」"
# monologue
# JP: 日々姫が小さかったころから、\nずうっと見続けてきたものだ。
3126 = "Tôi đã nhìn những bức tranh này\ntừ khi Hibiki còn bé xíu."
# monologue
# JP: 技術がどれほど洗練されても、\nその根幹を、見間違えるなどありえない。
2951 = "Dù kỹ thuật có trau chuốt đến đâu,\nthì cái hồn của nó, tôi không thể nào nhìn nhầm được."
# 【双鉄】
# display as 雙鐵
# JP: 「ははぁ、登呂流湯も書いてある。\nなるほど――これが、日々姫の“仕事”か」
2284 = "「Haha, có vẽ cả Tororyu-yu nữa này.\nRa là vậy——đây là \"công việc\" của Hibiki sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「このイラストマップ、\n銀行さんが主体で作ってくれたものなんですけど」
2712 = "「Tấm bản đồ minh họa này,\nlà do phía ngân hàng chủ trì làm ra đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2319 = "「Hừm.」"
# monologue
# JP: よく出来ている。
3128 = "Làm tốt lắm."
# monologue
# JP: 観光客では無い僕も、\nイラストに描かれたポイントを、尋ねてみたくなるほどに。
3171 = "Đến mức một người không phải là khách du lịch như tôi,\ncũng muốn đến thử những địa điểm được vẽ trên đó."
# 【双鉄】
# display as 雙鐵
# JP: 「銀行サイド……\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派もまた、\n御一夜の復興を真摯に願っていることは確からしいな」
2770 = "「Phía ngân hàng……những người ủng hộ việc thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;,\ncó vẻ như cũng đang thực tâm mong muốn sự phục hưng của Ohimitera nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう、ですよね。その思いは同じ。\nどこを最優先すべきかが、わたし達とは違うだけで」
2535 = "「Đúng vậy nhỉ. Mong muốn đó là giống nhau.\nChỉ là ưu tiên hàng đầu của họ khác với chúng ta thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 
# monologue
# JP: 水汚染。\n一企業への過度の依存。
3342 = "Ô nhiễm nguồn nước.\nSự phụ thuộc quá mức vào một doanh nghiệp."
# monologue
# JP: ――その危険度を軽視するなら、確かに、\n工場誘致こそ復興への最短ルートに見えるだろう。
1783 = "——Nếu xem nhẹ mức độ nguy hiểm đó, thì quả thực,\nviệc thu hút nhà máy có vẻ là con đường ngắn nhất dẫn đến sự phục hưng."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、このイラストマップは良いものだ。\n日々姫を褒めてやらねばな」
2126 = "「Dù sao thì, tấm bản đồ minh họa này cũng rất tuyệt.\nPhải khen ngợi Hibiki mới được.」"
# monologue
# JP: 言えばちらりと、\nポーレットはポケットから懐中時計を取り出し、覗く。
3582 = "Nghe tôi nói vậy,\nPaulette lấy chiếc đồng hồ bỏ túi từ trong túi ra xem."
# monologue
# JP: 金の外張り、精緻な細工。\n質素極まるハチロクの鉄道時計とは、随分と違った印象だ。
3595 = "Vỏ ngoài mạ vàng, chạm khắc tinh xảo.\nMang lại ấn tượng khác hẳn với chiếc đồng hồ đường sắt vô cùng giản dị của Hachiroku."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしもそろそろ、乗務の準備にかかります」
2469 = "「Tôi cũng phải chuẩn bị cho ca trực đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\n朝方の貴重な時間を、ありがとう」
2363 = "「À, xin lỗi nhé.\nCảm ơn cô đã dành thời gian quý báu buổi sáng cho tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんな。だって、もうわたしたちチームじゃないですか。\n\x%l8620;#00ffc040;8620%l;#;の復活は、わたしにとっても希望ですから」
2185 = "「Đừng nói vậy. Chúng ta đã là một đội rồi mà.\nSự hồi sinh của \x%l8620;#00ffc040;8620%l;#;, cũng là niềm hy vọng của tôi nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえればありがたい」
2161 = "「Cô nói vậy tôi thấy rất biết ơn.」"
# monologue
# JP: 僕の傍ら、\nハチロクも深々、頭を下げる。
3267 = "Bên cạnh tôi,\nHachiroku cũng cúi đầu thật sâu."
# monologue
# JP: ……奥ゆかしいというか、遠慮深いというか。\n\x%l8620;#00ffc040;8620%l;#;関連では、自分からは口出しせぬつもりらしい。
1792 = "……Nói là thùy mị, hay là e dè đây.\nCó vẻ như em ấy không định tự mình lên tiếng về những việc liên quan đến \x%l8620;#00ffc040;8620%l;#;."
# 【ポーレット】
# display as 波萊特
# JP: 「制服でしたし……\n日々姫ちゃんも今日は登園ですよね？」
2520 = "「Hibiki mặc đồng phục mà……\nHôm nay em ấy cũng phải đi học đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。登園日だと聞いている」
2356 = "「Ừ. Anh nghe nói hôm nay là ngày đi học.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だったら、もうホームに行ってるかも――あら」
2747 = "「Vậy thì, có lẽ em ấy đã ra sân ga rồi——ơ kìa.」"
# monologue
# JP: 角を曲がろうとしたところで、ポーレットの足が止まる。\nそして体を引っ込めながら、僕とハチロクとを手招きする。
3364 = "Chuẩn bị rẽ ở góc đường, Paulette chợt dừng bước.\nRồi cô ấy vừa rụt người lại, vừa vẫy tay gọi tôi và Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2316 = "「Ồ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふっふーん、よかばい、よかばい。\nお腹いっぱいになるまで食べてかまわんけんね」
2370 = "「Hừ hừm, ăn đi, ăn đi.\nCứ ăn cho đến khi no bụng cũng không sao đâu.」"
# monologue
# JP: みすぼらしい犬に、\n日々姫が弁当をわけてやってる。
3306 = "Hibiki đang chia cơm hộp của mình,\ncho một chú chó tồi tàn."
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2290 = "「Chà.」"
# 【コン】
# display as 小狗
# JP: 「きゅん……きゅん」
2371 = "「Ư ử……ư ử.」"
# 【日々姫】
# display as 日日姬
# JP: 「んー？　そんなん気にせんとよかよ。\n私、いまダイエット中やけんねぇ」
2367 = "「Hửm? Đừng bận tâm mấy chuyện đó.\nChị đang ăn kiêng mà lị.」"
# 【コン】
# display as 小狗
# JP: 「けんっ！」
2255 = "「Gâu!」"
# monologue
# JP: 日々姫の声をまるで理解したかのように、\n子犬がガツガツ、弁当の分前を食べ始める。
3164 = "Như thể hiểu được lời của Hibiki,\nchú cún con bắt đầu ngấu nghiến phần cơm hộp được chia."
# monologue
# JP: 見守る日々姫の瞳は優しい。\nその行為、気持ち的には理解できる、が――
3412 = "Ánh mắt Hibiki dõi theo chú cún thật dịu dàng.\nHành động đó, về mặt tình cảm thì tôi có thể hiểu được, nhưng mà——"
# 【ポーレット】
# display as 波萊特
# JP: 「いいんです、双鉄くん」
2583 = "「Không sao đâu, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2796 = "「！」" 
# monologue
# JP: 日々姫に注意しようと踏み出す一歩はその寸前、\nポーレットの声にとめられる。
3123 = "Ngay trước khi tôi bước tới định nhắc nhở Hibiki,\ngiọng nói của Paulette đã cản tôi lại."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、駅だぞ？\n野良が味を占めて居付きでもしたら」
2152 = "「Nhưng đây là nhà ga đấy?\nNhỡ đâu con chó hoang này quen mùi rồi ở lỳ đây thì sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えと……それはそれでいいかな、って」
2739 = "「Ưm…… Thế cũng tốt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ」
2606 = "「Tại sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「駅長ネコって、むかしはたくさんいたそうなんです。\n観光\x%l列車;#00ffc040;列車%l;#;の拠点駅とかに」
2488 = "「Nghe nói ngày xưa có rất nhiều mèo trạm trưởng đấy.\nỞ các ga trung tâm của \x%l列車;#00ffc040;tàu%l;#; du lịch chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2720 = "「Hô.」"
# monologue
# JP: なるほど、そういうものもあるのか。\n駅長ネコ――ねこ？
3075 = "Ra là vậy, còn có chuyện đó nữa sao.\nMèo trạm trưởng——mèo ư?"
# 【双鉄】
# display as 雙鐵
# JP: 「犬だろう、あれは」
2235 = "「Con đó là chó mà nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　子猫ちゃんですよ。やせっぽっちの」
2306 = "「Hả? Là một bé mèo con mà. Tuy hơi gầy gò một chút.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしには……犬にもネコにも見えませんが」
2474 = "「Với em thì…… trông chẳng giống chó cũng chẳng giống mèo.」"
# 【コン】
# display as 小狗？
# JP: 「ケンっ！」
# 2255 = "「吭！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2319 = "「唔」" 
# monologue
# JP: 満腹したのか、\n子犬（？）は軽やかに日々姫の元から駆け去っていく。
3136 = "Chắc là đã no bụng,\ncon cún con (?) nhẹ nhàng chạy đi khỏi chỗ Hibiki."
# monologue
# JP: ならば、こうしてはいられない。
3590 = "Nếu vậy thì không thể cứ đứng đây mãi được."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、すまんがここで解散だ。\n日々姫に見つからぬよう、行ってくれ」
2601 = "「Paulette, xin lỗi nhưng chúng ta giải tán ở đây nhé.\nCô hãy đi đi kẻo Hibiki phát hiện.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ――はい。けど……」
2304 = "「Hả? A——vâng. Nhưng mà……」"
# monologue
# JP: どうして？　と、\nポーレットが目で問いかけてくる。
3378 = "Tại sao? \nPaulette dùng ánh mắt để hỏi tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだか恥じてしまうのだ、日々姫は。\n自分の成果や善意を人に見られることを」
2522 = "「Không hiểu sao Hibiki lại hay xấu hổ\nkhi bị người khác nhìn thấy thành quả hay lòng tốt của mình.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
2561 = "「Vậy sao ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、短いお付き合いですが。\n日々姫のそうしたところは何度か目にしています」
2783 = "「Tuy thời gian tiếp xúc còn ngắn.\nNhưng em cũng đã vài lần thấy khía cạnh đó của Hibiki rồi ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんだ」
# 2720 = "「這樣啊」" 
# monologue
# JP: ハチロクのフォローで納得したのか、\nポーレットはこくり頷いて、抜き足、差し足、後ずさる。
3442 = "Có lẽ đã bị thuyết phục bởi lời đỡ lời của Hachiroku,\nPaulette gật đầu cái rụp, rồi rón rén lùi lại phía sau."
# 【ポーレット】
# display as 波萊特
# JP: 「それなら、わたしはこっそり乗務に。\n双鉄くん、ハチロクちゃん、がんばってね！」
2756 = "「Nếu vậy thì tôi sẽ lẻn đi làm nhiệm vụ đây.\nAnh Soutetsu, Hachiroku, cố lên nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくの日々姫の地図だ。歩くとしよう」
2571 = "「Bản đồ Hibiki cất công vẽ mà. Chúng ta đi bộ thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2411 = "「Vâng, ngài Soutetsu.」"
# monologue
# JP: 地方都市の駅前、メインの通りというものは、\nどうしてこうも似たり寄ったりになるのだろうか。
3591 = "Phía trước nhà ga của một thành phố tỉnh lẻ, hay những con phố chính,\ntại sao lại cứ na ná nhau như vậy nhỉ."
# monologue
# JP: 道を一本外れるだけで、\n景色ががらりと変わるものでもあるのだが――
3310 = "Dù chỉ cần rẽ sang một con đường khác,\nlà cảnh sắc đã thay đổi hoàn toàn rồi——"
# 【ハチロク】
# display as 八六
# JP: 「あら」
# 2290 = "「哎呀」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2365 = "「Hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「ステンドグラスの時計塔ですか。\n随分と目立つものですね」
2773 = "「Tháp đồng hồ kính màu sao ạ.\nTrông nổi bật quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行御一夜支店。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派の、いわば総本山だな」
2741 = "「Chi nhánh Ohimitera của Ngân hàng Kumamoto.\nCó thể nói đây là tổng hành dinh của phe thúc đẩy thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ。ここがそうでしたか」
2313 = "「A. Ra là ở đây ạ.」"
# monologue
# JP: 納得した――そんな雰囲気で小さく頷き、\nハチロクは口をつぐんでしまう。
3029 = "Hachiroku khẽ gật đầu với vẻ đã hiểu ra,\nrồi im bặt."
# monologue
# JP: 待つことしばし。やはりハチロクは語らないので、\n沈黙の意味が逆に気になる。
3585 = "Đợi một lúc. Thấy Hachiroku vẫn không nói gì,\ntôi đành thắc mắc về sự im lặng đó."
# 【双鉄】
# display as 雙鐵
# JP: 「この建物だが」
2778 = "「Về tòa nhà này.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2460 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、どのように感じているのだ？」
2172 = "「Hachiroku thấy thế nào?」"
# 【ハチロク】
# display as 八六
# JP: 「よろしいのではないかと思いますよ」
2490 = "「Em nghĩ là cũng tốt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どのように？」
2177 = "「Tốt như thế nào?」"
# 【ハチロク】
# display as 八六
# JP: 「古きガラスの積み重ねを足場に、新しい時を刻む。\n主張がそのまま、明快に形と示されていますので」
2147 = "「Lấy những lớp kính cổ kính làm nền tảng để khắc ghi thời đại mới.\nChủ trương của họ đã được thể hiện một cách rõ ràng qua hình dáng của nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。面白いな」
2337 = "「Hô. Thú vị đấy.」"
# monologue
# JP: 穿ち過ぎであるような気もするが、\nハチロクの指摘通りであるようにも思える。
3610 = "Dù có cảm giác hơi gượng ép,\nnhưng ngẫm lại thì đúng như Hachiroku đã chỉ ra."
# monologue
# JP: 隈元銀行御一夜支店の、目指すところがそこであるなら、\nやはり僕らの目的地とは、些か異なってくるようだ。
3005 = "Nếu mục tiêu của chi nhánh Ohimitera của Ngân hàng Kumamoto là như vậy,\nthì quả nhiên đích đến của chúng tôi có chút khác biệt."
# 【双鉄】
# display as 雙鐵
# JP: 「ここを曲がってしばらく行けば、\n鍛冶屋横丁という通りに入る」
2505 = "「Rẽ ở đây rồi đi một đoạn nữa,\nchúng ta sẽ vào con phố có tên là Hẻm Thợ rèn.」"
# monologue
# JP: 言いながら、少し早足になる。
3216 = "Vừa nói, tôi vừa rảo bước nhanh hơn một chút."
# monologue
# JP: 古き時間をそのまま熟成させている――\n僕の知る御一夜の町並みを、ハチロクに見せてやりたくて。
3001 = "Lưu giữ trọn vẹn những tháng năm cổ kính――\nTôi muốn cho Hachiroku thấy dãy phố Ohimitera mà tôi từng biết."
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2280 = "「Chà.」"
# monologue
# JP: さっきより、ずっと華やいだ声。\nハチロクは、うれしげにきょろきょろ辺りを見回す。
3038 = "Giọng nói rạng rỡ hơn lúc nãy rất nhiều.\nHachiroku vui vẻ nhìn quanh quất khắp nơi."
# 【ハチロク】
# display as 八六
# JP: 「良いですね。こちらの方がずうっと良いです。\n双鉄様を育ててくれた――そんな空気を感じるようです」
2626 = "「Tuyệt quá ạ. Chỗ này tuyệt hơn rất nhiều.\nEm như cảm nhận được bầu không khí――nơi đã nuôi dưỡng ngài Soutetsu vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nそう言われると、なんとも誇らしい気持ちを感じる」
2719 = "「Vậy sao.\nNghe em nói vậy, tôi bỗng cảm thấy thật tự hào.」"
# monologue
# JP: 味噌蔵、焼酎蔵、醤油蔵、お茶屋。
3227 = "Kho miso, kho shochu, kho nước tương, quán trà."
# monologue
# JP: 僕の暮らしていたころと、まるで変わらぬ町並みを行く。
3481 = "Dãy phố vẫn y hệt như hồi tôi còn sống ở đây."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、ここのようですね」
2786 = "「Ngài Soutetsu, có vẻ là ở đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 
# monologue
# JP: 年季の入った店構え。\n見るからに上質な刃物がずらり、ケースに並べられている。
3581 = "Một cửa tiệm nhuốm màu thời gian.\nNhững con dao nhìn là biết hàng cao cấp được xếp ngay ngắn trong tủ kính."
# monologue
# JP: しかし無人だ――ああ、いや。
2956 = "Nhưng lại chẳng có ai――A, không."
# 【双鉄】
# display as 雙鐵
# JP: 「奥が工場になっているのかな？」
2662 = "「Bên trong là xưởng à?」"
# 【ハチロク】
# display as 八六
# JP: 「そのようですね――\nあの、ごめんくださいまし」
2150 = "「Có vẻ là vậy ạ――\nXin lỗi, có ai ở nhà không ạ.」"
# monologue
# JP: ハチロクの呼びかけでは届かないのか、反応がない。\nならばと声を張り上げる。
2949 = "Chắc là tiếng gọi của Hachiroku chưa tới, không thấy phản hồi.\nThế nên tôi đành lên tiếng gọi to."
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。雛衣ポーレットさんの紹介で来ました。\n右田双鉄と申すものです」
2501 = "「Xin lỗi. Chúng cháu được cô Hinai Paulette giới thiệu tới đây.\nCháu tên là Migita Soutetsu.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、今、市長さんから電話もろうておりました」
2318 = "「A, vừa nãy tôi có nhận được điện thoại từ thị trưởng rồi.」"
# monologue
# JP: 良く日焼けした老人だ。\nにこにことこちらに近づいてくる。
3181 = "Một ông lão với làn da rám nắng.\nÔng tươi cười tiến lại gần chúng tôi."
# 【蓑笠】
# display as 蓑笠
# JP: 「蓑笠ですたい」
2476 = "「Tôi là Minokasa.」"
# monologue
# JP: 手袋の下から出てきた手のひらと握手する。\n親指の根元が分厚く、硬い。職人の手だと、強く感じる。
3440 = "Tôi bắt lấy bàn tay vừa tháo găng tay ra của ông.\nPhần gốc ngón cái dày cộp và thô ráp. Tôi cảm nhận rõ đây là bàn tay của một người thợ lành nghề."
# monologue
# JP: 僕の腕の中ハチロクも、身を乗り出して手を重ねる。
3241 = "Hachiroku trong vòng tay tôi cũng rướn người tới và đặt tay lên."
# 【ハチロク】
# display as 八六
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;\x%l8620;#;#00ffc040;8620%l;#;形トップナンバー\x%l8620;#00ffc040;8620%l;#;専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\nハチロクともうします」
2482 = "「Em là \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của đầu máy số hiệu đầu tiên thuộc dòng \x%l8620;#00ffc040;8620%l;#; của \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ,\ntên là Hachiroku ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「こらぁご丁寧に」
2445 = "「Chà, cháu khách sáo quá.」"
# monologue
# JP: ポーレットが最初の一人に推薦してくれた理由がわかる。\nとても気さくで、柔和な人だ。
3240 = "Tôi đã hiểu lý do tại sao Paulette lại tiến cử ông ấy đầu tiên.\nÔng ấy là một người rất cởi mở và hiền hòa."
# 【蓑笠】
# display as 蓑笠
# JP: 「話ば、ざっとは聞きました。\n事故で壊れた蒸気を修復したいゆー話でしたが」
2479 = "「Tôi đã nghe qua câu chuyện rồi.\nThấy bảo là muốn phục chế đầu máy hơi nước bị hỏng do tai nạn phải không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2551 = "「是的」" 
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の破損状況をまず伝え、\x%l8620;#00ffc040;8620%l;#;の復活と観光振興、\nそうしてそれを工場誘致反対に繋げたいとも伝える。
3628 = "Tôi bắt đầu kể về tình trạng hư hỏng của \x%l8620;#00ffc040;8620%l;#;, rồi đến việc hồi sinh \x%l8620;#00ffc040;8620%l;#; để chấn hưng du lịch,\nvà từ đó kết nối với việc phản đối thu hút nhà máy."
# monologue
# JP: ひと通り聞き終えた蓑笠老人は、\nふぅむと穏やかな声をだす。
3446 = "Nghe xong toàn bộ câu chuyện, ông lão Minokasa\ncất giọng trầm ngâm."
# 【蓑笠】
# display as 蓑笠
# JP: 「そがいに運べばよろしかとですが――\nまぁ、難しか話でしょうなぁ」
2668 = "「Nếu mọi chuyện suôn sẻ như vậy thì tốt quá――\nNhưng mà, chắc là khó khăn lắm đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「困難なことはわかっています。\nですので、一つずつでも、成果を出していきたいのです」
2473 = "「Cháu biết là sẽ rất khó khăn.\nVì vậy, cháu muốn đạt được từng thành quả một, dù là nhỏ nhất.」"
# monologue
# JP: 僕の傍ら、ハチロクも深々頭を下げる。
3561 = "Hachiroku bên cạnh tôi cũng cúi đầu thật sâu."
# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、そげなことせんで下さい。\nワシなんぞ、何にもできんと思いますけんね」
2291 = "「Ấy ấy, xin đừng làm vậy.\nLão già này cũng chẳng giúp được gì nhiều đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、僕に部品作りをご指導ください。\n体力にはいささか、自信があります」
2760 = "「Nếu vậy, xin ông hãy chỉ dạy cháu cách chế tạo phụ tùng.\nCháu cũng khá tự tin vào thể lực của mình.」"
# monologue
# JP: 即答すれば、真っ白な眉がひくりと動く。
3444 = "Thấy tôi đáp ngay tắp lự, hàng lông mày trắng muốt của ông giật giật."
# 【蓑笠】
# display as 蓑笠
# JP: 「右田の長男さんいうたら、\n帝都にいかれたいう話でしょう」
2669 = "「Nghe nói con cả nhà Migita,\nđã lên Đế Đô rồi cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2551 = "「是的」" 
# monologue
# JP: 小さな町の、大きな家だ。\n右田の内情などは、全て知れ渡っているのだろう。
3105 = "Nhà lớn ở thị trấn nhỏ mà.\nNội tình nhà Migita chắc hẳn ai cũng biết."
# 【蓑笠】
# display as 蓑笠
# JP: 「そんお人が、どぎゃんなわけでそこまで」
2157 = "「Cớ sao cậu lại phải làm đến mức này?」"
# 【双鉄】
# display as 雙鐵
# JP: 「この町に、僕は救われたからです」
2373 = "「Bởi vì thị trấn này đã cứu mạng cháu.」"
# monologue
# JP: 右田に迎えられることがなければ、\n御一夜でたくさんを学ばなければ、僕は腐って死んでいた。
3150 = "Nếu không được nhà Migita nhận nuôi,\nnếu không được học hỏi nhiều điều ở Ohimitera, thì cháu đã mục nát và chết từ lâu rồi."
# monologue
# JP: そうと確信できているから、答えに迷うことなど無い。
3120 = "Vì đã tin chắc như vậy nên tôi không hề do dự khi trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、御一夜を。\nクマ川と焼酎と温泉の――この水の町を救いたいんです」
2497 = "「Vì thế, cháu muốn cứu lấy Ohimitera.\nCứu lấy dòng sông Kuma, shochu và suối nước nóng――cứu lấy thị trấn của nước này.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ふぅむ」
# 2319 = "「唔」" 
# monologue
# JP: 蓑笠老人はしばらくぎゅっと目を閉じて、\nそれからぽりっと、白髪頭を軽く掻く。
3470 = "Ông lão Minokasa nhắm chặt mắt một lúc,\nrồi gãi gãi mái đầu bạc trắng."
# 【蓑笠】
# display as 蓑笠
# JP: 「右田の酒は旨かとですからねぇ。クマ川の水ば汚れて、\nあん酒が飲めんようになるのは、辛かとですなぁ」
2251 = "「Rượu nhà Migita ngon lắm mà. Nước sông Kuma mà bị bẩn,\nthì chẳng còn được uống thứ rượu ngon ấy nữa, thật là khổ tâm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは」
2752 = "「Vậy thì.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ゆうても、こん爺に何ができるか。\n蒸気の部品ば、作ったこともなかですけんねぇ」
2232 = "「Dù nói vậy, nhưng lão già này thì làm được gì cơ chứ.\nTôi chưa từng làm phụ tùng cho đầu máy hơi nước bao giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
2723 = "「Vậy sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「キハ[レイナナ,1]07の車軸ばようけ壊れますけん。\nあれだきゃあ、何度も何度も作りなおしておりますがの」
2805 = "「Trục bánh xe của KiHa 07 hay hỏng lắm.\nChỉ có cái đó là tôi đã làm đi làm lại không biết bao nhiêu lần rồi.」"
# monologue
# JP: 蓑笠老人は静かに聞かせてくれる。\n蓑笠鍛冶店は、代々、鍛造専門の農民鍛冶だったこと。
3288 = "Ông lão Minokasa điềm tĩnh kể cho chúng tôi nghe.\nRằng tiệm rèn Minokasa bao đời nay vốn là tiệm rèn chuyên rèn nông cụ cho nông dân."
# monologue
# JP: 大廃線時代以前は、鉄道部品を手がけるなどとは、\n夢にも思っていなかったとのことを。
3406 = "Trước thời Đại bãi bỏ các tuyến đường sắt, việc chế tạo phụ tùng đường sắt,\nlà điều mà ông chưa từng mơ tới."
# 【蓑笠】
# display as 蓑笠
# JP: 「[こくら,1]粉蔵の辺りに、\x%l帝鉄;#00ffc040;帝鉄%l;#;の車両工場ばあったそうですたい。\nそこがのうなって、ま、やむなく言うところでしょうの」
2644 = "「Nghe nói quanh khu vực Kokura từng có nhà máy chế tạo toa xe của \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;.\nChỗ đó không còn nữa, nên chắc là bất đắc dĩ mới phải nhờ đến tôi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を」
2464 = "「Ông khiêm tốn quá.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、本当にご謙遜だと感じます」
2562 = "「Vâng, em cũng thấy ông khiêm tốn quá ạ.」"
# monologue
# JP: 言ってうっとり、\nハチロクは店先の方を振り返る。
3517 = "Nói rồi Hachiroku ngoái nhìn về phía trước cửa tiệm\nvới vẻ mặt say sưa."
# 【ハチロク】
# display as 八六
# JP: 「ここの刃物は、みな、命を持っているようです。\n命を持った部品など、\x%l帝鉄;#00ffc040;帝鉄%l;#;でもほとんど見ませんでした」
2724 = "「Dao kéo ở đây, trông cái nào cũng như có sinh mệnh vậy.\nNhững phụ tùng có sinh mệnh như thế này, ngay cả ở \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; em cũng hiếm khi thấy.」"
# monologue
# JP: ハチロクの素直な感嘆に、\n蓑笠老人は目を細める。
3443 = "Trước lời cảm thán chân thành của Hachiroku,\nông lão Minokasa nheo mắt lại."
# monologue
# JP: そうして、預けた図面を広げ、\nそれをじっくり眺め下ろす。
3380 = "Sau đó, ông trải bản vẽ mà chúng tôi đưa ra,\nrồi chăm chú nhìn xuống."
# 【蓑笠】
# display as 蓑笠
# JP: 「この[ハチロクニイマル,3]8620やらの車軸は、\nどぎゃん素材でできとりますかの」
2728 = "「Cái trục bánh xe của 8620 này,\nđược làm bằng vật liệu gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2170 = "「Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2531 = "「Vâng.」"
# monologue
# JP: 胸を張り、意気揚々と答えを発し――\nようとして、けれどハチロクは止まってしまう。
3141 = "Hachiroku ưỡn ngực, định hăng hái trả lời――\nnhưng rồi lại khựng lại."
# monologue
# JP: 口をぱくぱく動かすけれど、\n言葉が、なかなか出てこない。
3095 = "Đôi môi cô bé mấp máy,\nnhưng mãi chẳng thốt nên lời."
# 【双鉄】
# display as 雙鐵
# JP: （ド忘れか？）
3661 = "（Quên mất rồi sao?）"
# monologue
# JP: 反射で思ってしまうがしかし、\nハチロクに、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に恐らくド忘れは発生しまい。
3264 = "Phản xạ tự nhiên khiến tôi nghĩ vậy, nhưng\nHachiroku là \x%lレイルロオド;#00ffc040;Railord%l;#; cơ mà, có lẽ không có chuyện tự dưng quên béng đi được."
# monologue
# JP: 可能性があるのなら、データを欠損してしまったか、\nあるのにうまく引きだせない――そこら辺りの障害だろう。
3589 = "Nếu có khả năng, thì là do mất dữ liệu,\nhoặc có dữ liệu nhưng không thể trích xuất được――chắc là trục trặc ở chỗ nào đó."
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。事故があったゆー話でしたの」
2314 = "「À. Cháu có nói là bị tai nạn nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2796 = "「！」" 
# monologue
# JP: 僕と同じ結論に辿り着いたのだろうか。\n蓑笠老人はハチロクに、いたわるような目を向ける。
3466 = "Có lẽ ông ấy cũng đi đến kết luận giống tôi.\nÔng lão Minokasa nhìn Hachiroku với ánh mắt đầy cảm thông."
# 【蓑笠】
# display as 蓑笠
# JP: 「なら、一番太か車軸の目方を教えてくれればよかですよ。\n寸法と目方がわかりゃあ、素材の見当もつきますけん」
2750 = "「Nếu vậy thì cứ cho tôi biết trọng lượng của trục bánh xe dày nhất là được.\nBiết được kích thước và trọng lượng thì tôi sẽ đoán được vật liệu thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「目方――重量ですね――\n\x%l動輪;#00ffc040;動輪%l;#;車軸の、重量……は――」
2179 = "「Trọng lượng――cân nặng phải không ạ――\nTrọng lượng của trục \x%l動輪;#00ffc040;bánh xe chủ động%l;#;……là――」"
# monologue
# JP: ごく、基本的なデータだろうに、\nそこから先が出てこない。
3312 = "Rõ ràng là dữ liệu rất cơ bản,\nnhưng cô bé lại không thể nói tiếp được."
# monologue
# JP: ハチロクの唇だけが、ぱくぱくと、\n空気を求める金魚のように、何度も何度も動き続ける。
3144 = "Chỉ có đôi môi của Hachiroku cứ mấp máy,\nnhư chú cá vàng đang đớp bọt khí, lặp đi lặp lại không ngừng."
# 【蓑笠】
# display as 蓑笠
# JP: 「ああああ。よかです。よかですたい。\n駅まで、実物を見せてもらいにいきますけん」
2399 = "「A a a a. Không sao đâu. Không sao đâu.\nĐể tôi ra tận ga xem tận mắt là được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お手数を、ありがとうございます」
2628 = "「Làm phiền ông quá, cảm ơn ông.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なんのなんの、乗りかかった舟――\nじゃあなかですね、機関車ですけん」
2586 = "「Có gì đâu, đã trót leo lên thuyền rồi thì――\nÀ không phải, là leo lên đầu máy xe lửa chứ.」"
# monologue
# JP: 気を使ってくださったのだろう。\n蓑笠老人の軽口に、当然、僕も笑いで答える。
3377 = "Có lẽ ông ấy đang cố ý nói đùa để xoa dịu bầu không khí.\nTrước câu nói đùa của ông lão Minokasa, đương nhiên tôi cũng đáp lại bằng một nụ cười."
# 【ハチロク】
# display as 八六
# JP: 「んっ――ぐっ――」
2344 = "「Ưm――hự――」"
# monologue
# JP: けれどもハチロクは笑えない。
2991 = "Thế nhưng Hachiroku lại không thể cười được."
# monologue
# JP: 恐らく自らを恥じるあまりに浮いた涙を、\nこぼさぬように抑えるだけで、精一杯だ。
3212 = "Chắc là vì quá xấu hổ nên nước mắt cô bé chực trào ra,\nchỉ riêng việc kìm nén không để nước mắt rơi thôi cũng đã tốn hết sức lực rồi."
# 【双鉄】
# display as 雙鐵
# JP: （こらえろ、ハチロク。\n泣けば、蓑笠老人を責めるようになってしまうぞ）
3659 = "（Cố nhịn đi, Hachiroku.\nNếu em khóc, chẳng khác nào đang trách móc ông lão Minokasa đâu.）"
# monologue
# JP: いや――\nハチロクはそのことを、重々承知しているのだ。
2947 = "Không――\nHachiroku hiểu rất rõ điều đó."
# monologue
# JP: だからこそ、必死で涙をこらえようとし――\nけれどもこらえることが出来ずに……ああ、いや、そうか。
3273 = "Chính vì thế, cô bé mới tuyệt vọng cố kìm nén nước mắt――\nNhưng lại không thể kìm nén được…… A, không, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「不調なようだな。\x%l蒸気排水;#00ffc040;蒸気排水%l;#;のシステムが」
2393 = "「Có vẻ như đang bị trục trặc nhỉ. Hệ thống \x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#; ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ひっ――んっ――ンッ――はい、その、ようです」
2338 = "「Hức――ưm――ưm――vâng, có vẻ, là vậy ạ.」"
# monologue
# JP: ああ、いかん、喋らせたのは失策だったか。
3115 = "A, hỏng rồi, bắt cô bé nói là một sai lầm sao."
# monologue
# JP: 言葉の上で“涙ではない”と主張をしても、\n声がまるきり、泣き声だ。
3611 = "Dù lời nói đang khẳng định là \"không phải nước mắt\",\nnhưng giọng điệu thì hoàn toàn là tiếng khóc."
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2319 = "「唔」" 
# 【凪】
# display as ？？？
# JP: 「女の子ば泣かせるヤツは、ゆるせんばーーーーいっ！」
2533 = "「Cái kẻ làm con gái khóc, tuyệt đối không thể tha thứ được nhaaaaa!」"
# monologue
# JP: 鋭い気迫。背後から。
3190 = "Khí thế sắc bén. Từ phía sau."
# monologue
# JP: 感じた瞬間、体が動き、\n躱すと同時に捕まえている。
3121 = "Ngay khoảnh khắc cảm nhận được, cơ thể tôi tự động di chuyển,\nvừa né tránh vừa tóm gọn lấy kẻ tấn công."
# 【双鉄】
# display as 雙鐵
# JP: 「無手か」
2683 = "「Tay không à.」"
# monologue
# JP: 真剣か、木刀か――\nそれほどの威圧を確かに感じたのだが。
3250 = "Kiếm thật, hay kiếm gỗ đây――\nTôi thực sự đã cảm nhận được sức ép cỡ đó cơ mà."
# monologue
# JP: 僕の手の中に捕まえている細い手首は、\nその先に何も持ってはいない。
2989 = "Thế nhưng cổ tay gầy guộc đang nằm gọn trong tay tôi,\nlại chẳng cầm theo thứ vũ khí nào cả."
# 【凪】
# display as ？？？
# JP: 「そんなん、無手でとうぜんばいっ！\nいきもの相手に剣をふるうは、ご法度たいっ！」
2620 = "「Cái đó, tất nhiên là phải dùng tay không rồi!\nDùng kiếm đánh sinh vật sống là cấm kỵ đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、剣道を習っているのか？\nいい師に恵まれているようだな」
2309 = "「Hô, cô bé học kiếm đạo sao?\nCó vẻ cô bé có một người thầy rất tốt đấy.」"
# 【凪】
# display as ？？？
# JP: 「当然ばい！　うちのお師さんは[ひのもと,2]日ノ本一\n――って！　なんで悪党にそげなこつ」
2718 = "「Đương nhiên rồi! Thầy của em là giỏi nhất Hinomoto\n――ơ kìa! Sao em lại phải nói với tên ác ôn như anh chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、悪党などではございませんっ！！！」
2785 = "「Ngài Soutetsu không phải là kẻ ác ôn!!!」"
# monologue
# JP: 一喝！\nハチロクは自らの怒声で涙を飛ばす。
3077 = "Một tiếng hét lớn!\nHachiroku dùng tiếng quát tháo giận dữ của mình đánh bay đi những giọt nước mắt."
# 【凪】
# display as ？？？
# JP: 「えっ！？」
# 2297 = "「哎！？」" 
# 【蓑笠】
# display as 蓑笠
# JP: 「こおれ凪！　まぁた早とちりばしくさって」
2336 = "「Cái con bé Nagi này! Lại hấp tấp vội vàng nữa rồi.」"
# 【凪】
# display as 凪
# JP: 「えええっ！？　じいちゃん、こらどぎゃんこつね？」
2296 = "「Ể!? Ông ơi, chuyện này là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「誤解をさせてしまったらしいね。\nひとまず、落ち着いて説明をさせてもらえるか」
2623 = "「Có vẻ như tôi đã gây ra hiểu lầm rồi.\nTrước mắt, hãy bình tĩnh nghe tôi giải thích được không.」"
# monologue
# JP: 捕まえていた手を離し、\n目線の高さをあわせてゆっくり話しかける。
3272 = "Tôi buông bàn tay đang nắm lấy,\nhạ thấp tầm mắt ngang với cô bé và từ tốn cất lời."
# monologue
# JP: 昔の日々姫がパニックを起こしてしまっていたとき、\nしばしば、こうして落ち着かせたものだ。
2981 = "Hồi trước mỗi khi Hibiki hoảng loạn,\ntôi vẫn thường làm thế này để trấn an con bé."
# monologue
# JP: （だだだだだっ！）
3676 = "（Bịch bịch bịch bịch bịch!）"
# 【凪】
# display as 凪
# JP: 「じいちゃん、こん人だれと？」
2618 = "「Ông ơi, người này là ai vậy?」"
# monologue
# JP: ……日々姫相手のようにはいかず、\n凪と呼ばれた少女はぱっと、蓑笠老人の後ろに隠れる。
1806 = "……Có vẻ không hiệu quả như với Hibiki,\ncô bé tên Nagi vội vàng nấp ra sau lưng ông lão Minokasa."
# 【蓑笠】
# display as 蓑笠
# JP: 「右田の――ほれ、御一夜でいっとう古か焼酎蔵さんの、\n息子さんよ」
2710 = "「Của nhà Migita đấy――cháu biết mà, con trai của xưởng shochu lâu đời nhất Ohimitera đó.」"
# 【凪】
# display as 凪
# JP: 「焼酎屋さんが何しに来たと？\nなんで女の子ば泣かせとー――――っ！」
2681 = "「Nhà bán shochu tới đây làm gì?\nTại sao lại làm con gái nhà người ta khóc chứ ――――!」"
# monologue
# JP: 不意に、凪の目つきが鋭く細まる。\n薄くて小さな体にどん、と強い気迫が満ち満ちる。
3054 = "Đột nhiên, ánh mắt Nagi sắc lại.\nMột luồng khí thế mạnh mẽ tỏa ra từ cơ thể nhỏ bé mỏng manh ấy."
# 【凪】
# display as 凪
# JP: 「わかったばい！　こん女の子、焼酎屋さんのツレとや。\nで、じいちゃんがツケば払ろぉてやらんけん」
2278 = "「Em hiểu rồi nha! Cô gái này là người đi cùng anh bán shochu.\nRồi ông không chịu trả tiền nợ chứ gì.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「あほう」
2677 = "「Con ngốc này.」"
# monologue
# JP: （パチンっ！）
3672 = "（Bốp!）"
# 【凪】
# display as 凪
# JP: 「あいたっ！」
2403 = "「Ái da!」"
# monologue
# JP: おでこを指で軽く弾かれ、\n凪の勢いがようやく落ちる。
3621 = "Bị búng nhẹ một cái vào trán,\nkhí thế của Nagi rốt cuộc cũng xẹp xuống."
# 【凪】
# display as 凪
# JP: 「違うと？　謎ばい。さっぱり事情がわからんばい」
2122 = "「Không phải ạ? Khó hiểu quá nha. Chẳng hiểu chuyện gì đang xảy ra cả.」"
# monologue
# JP: それは聞こうとせんからだ――
2996 = "Đó là do cô bé có chịu nghe đâu cơ chứ――"
# monologue
# JP: 言いたい気持ちを飲み込んで、\n代わりに穏やかな言葉をつなぐ。
3234 = "Nuốt lại những lời muốn nói vào trong,\nthay vào đó tôi tiếp tục bằng những lời lẽ ôn hòa."
# 【双鉄】
# display as 雙鐵
# JP: 「かいつまめば、僕らは君のお祖父様に協力を願いに来た。\n何の協力かといえば、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の修復だ」
2637 = "「Tóm lại là, bọn tôi tới đây để nhờ ông của em giúp đỡ.\nGiúp chuyện gì ư, đó là phục chế \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.」"
# 【凪】
# display as 凪
# JP: 「じょーききかんしゃ？」
2653 = "「Đầu - máy - hơi - nước?」"
# monologue
# JP: はて、と大きく首をかしげて。\nそれから「ああ」、と心あたった声が出る。
3143 = "Hả, cô bé nghiêng đầu vẻ khó hiểu.\nRồi sau đó thốt lên \"A\" một tiếng như đã nhớ ra."
# 【凪】
# display as 凪
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;って、絵本とかに出てくる汽車ぽっぽとや？\nなんのために、そげなもん直すと？」
1819 = "「\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; là mấy cái xe lửa xình xịch hay xuất hiện trong truyện tranh á?\nSửa mấy thứ đó để làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を軸にした観光誘致を行い、\nそれを\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回へとつなげていくためだ」
2604 = "「Để thu hút du lịch với \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; làm trọng tâm,\ntừ đó dẫn đến việc hủy bỏ thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【凪】
# display as 凪
# JP: 「ゆーちてっかい！」
2216 = "「Hủy bỏ thu hút!」"
# monologue
# JP: いきなり、凪の声音が変わる。
3052 = "Đột nhiên, giọng điệu của Nagi thay đổi."
# monologue
# JP: ぱあっと明るい笑顔を浮かべ、\n僕のそばへと駆け寄ってくる。
3147 = "Cô bé nở nụ cười rạng rỡ,\nrồi chạy ùa tới bên tôi."
# 【凪】
# display as 凪
# JP: 「じゃったらにーさん、良かひとばい。\n誤解しとって、悪かったばい」
2746 = "「Vậy thì anh là người tốt nha.\nXin lỗi vì đã hiểu lầm anh nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誤解が解けたならなによりだ」
2219 = "「Giải tỏa được hiểu lầm là tốt rồi.」"
# monologue
# JP: （ぐいっ！）
3684 = "（Giật mạnh!）"
# monologue
# JP: 袖がいきなり捕まえられる。\n凪はグイグイ僕をひっぱり、動かそうとする。
3057 = "Tay áo tôi đột nhiên bị tóm lấy.\nNagi kéo tôi đi xềnh xệch, cố gắng lôi tôi đi."
# 【凪】
# display as 凪
# JP: 「じーちゃん、このにーさんら、\nふかみちゃんとこ案内してあげても良かと？」
2617 = "「Ông ơi, em dẫn mấy anh chị này\nđến chỗ bé Fukami có được không?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「早瀬さんとこ――ああ、そら良かとねぇ」
2527 = "「Chỗ nhà Hayase à――À, thế cũng được.」"
# monologue
# JP: 大きく頷き、蓑笠老人は僕へと向き直る。
3472 = "Ông lão Minokasa gật đầu cái rụp, rồi quay sang tôi."
# 【蓑笠】
# display as 蓑笠
# JP: 「右田さん。二時間ほど、時間ばもらえませんかいね」
2250 = "「Cậu Migita. Cho tôi xin khoảng hai tiếng đồng hồ được không.」"
# monologue
# JP: ちょうどいい。
3332 = "Vừa hay."
# monologue
# JP: 二時間ならば、\nポーレットたちが湯医まで行き御一夜に戻るほどの時間だ。
3027 = "Hai tiếng đồng hồ,\nvừa đủ để nhóm Paulette đi đến Yui rồi quay lại Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫です。何をすれば？」
2406 = "「Được ạ. Cháu cần làm gì?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そんなら、\nうちトコの孫娘に、ついていってやってください」
2159 = "「Nếu vậy,\ncậu cứ đi theo cháu gái tôi đi.」"
# monologue
# JP: 蓑笠老人は笑みを浮かべる。\nけれども瞳が、笑っていない。
3468 = "Ông lão Minokasa nở nụ cười.\nThế nhưng ánh mắt ông lại không hề cười."
# 【蓑笠】
# display as 蓑笠
# JP: 「御一夜の観光の実情がどぎゃんもんか、\nほーで少しは、わかってもらえると思いますけん」
2569 = "「Để cậu có thể hiểu được phần nào,\nthực trạng du lịch ở Ohimitera là như thế nào.」"
