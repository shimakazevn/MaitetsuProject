1783 = "――Nếu xem nhẹ mức độ nguy hiểm đó, thì quả thật,\\nviệc mời gọi nhà máy sẽ trông như con đường ngắn nhất để phục hưng."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、このイラストマップは良いものだ。\n日々姫を褒めてやらねばな」
2126 = "「Dù sao thì, tấm bản đồ minh họa này rất tốt.\\nPhải khen Hibiki một tiếng mới được.」"

# monologue
# JP: 言えばちらりと、\nポーレットはポケットから懐中時計を取り出し、覗く。
3582 = "Nghe tôi nói, Paulette thoáng nhìn,\\nrồi lấy chiếc đồng hồ quả quýt từ trong túi ra xem."

# monologue
