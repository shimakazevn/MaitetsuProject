3580 = "Nét vẽ của những hình minh họa này trông quá đỗi quen thuộc."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の絵だぞ。これは」
2714 = "「Tranh của Hibiki đây mà.」"

# 【ポーレット】
# display as 波萊特
