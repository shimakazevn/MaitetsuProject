2553 = "「Ừ, trước mắt là một người.\\nNgoài chúng ta ra, tôi muốn có một đồng minh có thể cho ý kiến」"

# 【ポーレット】
# display as 波萊特
# JP: 「どういう人がいいでしょう？」
2792 = "「Một người như thế nào thì sẽ phù hợp ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2480 = "「Để xem nào」"

# monologue
