3595 = "Vỏ ngoài bằng vàng, chế tác tinh xảo.\\nTrông khác một trời một vực so với chiếc đồng hồ đường sắt vô cùng giản dị của Hachiroku."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしもそろそろ、乗務の準備にかかります」
2469 = "「Tôi cũng đến lúc phải đi chuẩn bị cho công việc đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\n朝方の貴重な時間を、ありがとう」
2363 = "「À, xin lỗi em.\\nCảm ơn em vì khoảng thời gian quý báu buổi sáng nay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんな。だって、もうわたしたちチームじゃないですか。\n\x%l8620;#00ffc040;8620%l;#;の復活は、わたしにとっても希望ですから」
2185 = "「Đâu có gì đâu ạ. Chẳng phải chúng ta đã là một đội rồi sao?\\nViệc phục hồi \\x%l8620;#00ffc040;8620%l;#; cũng là niềm hy vọng của em mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえればありがたい」
2161 = "「Em nói vậy thì anh mừng lắm.」"

# monologue
# JP: 僕の傍ら、\nハチロクも深々、頭を下げる。
3267 = "Bên cạnh tôi,\\nHachiroku cũng cúi đầu thật sâu."

# monologue
# JP: ……奥ゆかしいというか、遠慮深いというか。\n\x%l8620;#00ffc040;8620%l;#;関連では、自分からは口出しせぬつもりらしい。
1792 = "…Nên nói là cô ấy kín đáo, hay là quá dè dặt đây nhỉ.\\nHình như trong những chuyện liên quan đến \\x%l8620;#00ffc040;8620%l;#;, cô ấy không định tự mình xen vào."

# 【ポーレット】
# display as 波萊特
# JP: 「制服でしたし……\n日々姫ちゃんも今日は登園ですよね？」
2520 = "「Con bé mặc đồng phục mà…\\nVới lại, bé Hibiki hôm nay cũng đến trường mầm non, phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。登園日だと聞いている」
2356 = "「Ừ. Anh nghe nói hôm nay là ngày con bé phải đến trường.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だったら、もうホームに行ってるかも――あら」
2747 = "「Nếu vậy thì có lẽ con bé đã ra sân ga rồi cũng nên――A.」"

# monologue
# JP: 角を曲がろうとしたところで、ポーレットの足が止まる。\nそして体を引っ込めながら、僕とハチロクとを手招きする。
3364 = "Ngay khi vừa định rẽ ở góc đường, Paulette bỗng dừng chân.\\nRồi cô ấy rụt người lại, vẫy tay ra hiệu cho tôi và Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2316 = "「Ồ.」"

# 【日々姫】
# display as 日日姬
# JP: 「ふっふーん、よかばい、よかばい。\nお腹いっぱいになるまで食べてかまわんけんね」
2370 = "「Hì hì~, được rồi, được rồi.\\nCứ ăn cho no căng bụng vào nhé.」"

# monologue
# JP: みすぼらしい犬に、\n日々姫が弁当をわけてやってる。
3306 = "Hibiki đang chia hộp cơm của mình\\ncho một chú chó trông thật tội nghiệp."

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2290 = "「Ôi...」"

# 【コン】
# display as 小狗
# JP: 「きゅん……きゅん」
2371 = "「Ư... ư...」"

# 【日々姫】
# display as 日日姬
# JP: 「んー？　そんなん気にせんとよかよ。\n私、いまダイエット中やけんねぇ」
2367 = "「Hửm? Em không cần bận tâm đâu.\\nChị đang ăn kiêng mà.」"

# 【コン】
# display as 小狗
# JP: 「けんっ！」
2255 = "「Gâu!」"

# monologue
# JP: 日々姫の声をまるで理解したかのように、\n子犬がガツガツ、弁当の分前を食べ始める。
3164 = "Như thể đã hiểu được lời của Hibiki,\\nchú chó con bắt đầu ngấu nghiến ăn phần cơm hộp của mình."

# monologue
# JP: 見守る日々姫の瞳は優しい。\nその行為、気持ち的には理解できる、が――
3412 = "Ánh mắt Hibiki nhìn nó thật dịu dàng.\\nHành động đó, về mặt tình cảm thì tôi có thể hiểu được, nhưng mà--"

# 【ポーレット】
# display as 波萊特
# JP: 「いいんです、双鉄くん」
2583 = "「Không sao đâu ạ, Soutetsu-kun.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2796 = "「！」" 

# monologue
# JP: 日々姫に注意しようと踏み出す一歩はその寸前、\nポーレットの声にとめられる。
3123 = "Ngay khoảnh khắc tôi định bước tới nhắc nhở Hibiki,\\ngiọng nói của Paulette đã ngăn tôi lại."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、駅だぞ？\n野良が味を占めて居付きでもしたら」
2152 = "「Nhưng đây là nhà ga mà?\\nNếu nó quen mui rồi ở lì đây thì sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「えと……それはそれでいいかな、って」
2739 = "「Ừm... em nghĩ... như vậy cũng tốt mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ」
2606 = "「Tại sao chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「駅長ネコって、むかしはたくさんいたそうなんです。\n観光\x%l列車;#00ffc040;列車%l;#;の拠点駅とかに」
2488 = "「Mèo trưởng ga ấy ạ, em nghe nói ngày xưa có rất nhiều.\\nỞ những ga trung tâm của các tuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch ấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2720 = "「Ồ.」"

# monologue
# JP: なるほど、そういうものもあるのか。\n駅長ネコ――ねこ？
3075 = "Ra là vậy, cũng có chuyện như thế sao.\\nMèo trưởng ga-- mèo ư?"

# 【双鉄】
# display as 雙鐵
# JP: 「犬だろう、あれは」
2235 = "「Đó là một con chó mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　子猫ちゃんですよ。やせっぽっちの」
2306 = "「Ể? Là một bé mèo con mà. Một bé mèo gầy nhom.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしには……犬にもネコにも見えませんが」
2474 = "「Em thì... chẳng thấy nó giống chó hay mèo gì cả.」"

# 【コン】
# display as 小狗？
# JP: 「ケンっ！」
# 2255 = "「吭！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2319 = "「唔」" 

# monologue
# JP: 満腹したのか、\n子犬（？）は軽やかに日々姫の元から駆け去っていく。
3136 = "Có lẽ đã no bụng,\\nchú chó con (?) nhẹ nhàng chạy đi khỏi chỗ Hibiki."

# monologue
# JP: ならば、こうしてはいられない。
3590 = "Nếu vậy thì không thể đứng yên thế này được."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、すまんがここで解散だ。\n日々姫に見つからぬよう、行ってくれ」
2601 = "「Paulette, xin lỗi nhưng chúng ta giải tán ở đây thôi.\\nEm hãy đi đi, đừng để Hibiki phát hiện ra nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ――はい。けど……」
2304 = "「Ể? A... vâng. Nhưng mà...」"

# monologue
# JP: どうして？　と、\nポーレットが目で問いかけてくる。
3378 = "Tại sao chứ? \\nPaulette như đang hỏi bằng ánh mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「なぜだか恥じてしまうのだ、日々姫は。\n自分の成果や善意を人に見られることを」
2522 = "「Không hiểu sao Hibiki lại thấy ngượng ngùng.\\nKhi bị người khác thấy được thành quả hay lòng tốt của mình.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
2561 = "「Vậy ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、短いお付き合いですが。\n日々姫のそうしたところは何度か目にしています」
2783 = "「Tuy em mới quen cô ấy chưa lâu.\\nNhưng em đã thấy Hibiki có những lúc như vậy vài lần rồi ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんだ」
# 2720 = "「這樣啊」" 

# monologue
# JP: ハチロクのフォローで納得したのか、\nポーレットはこくり頷いて、抜き足、差し足、後ずさる。
3442 = "Có lẽ đã bị lời giải thích của Hachiroku thuyết phục,\\nPaulette gật đầu, rồi rón rén nhón chân lùi lại."

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、わたしはこっそり乗務に。\n双鉄くん、ハチロクちゃん、がんばってね！」
2756 = "「Vậy thì, em sẽ lén quay lại làm việc đây.\\nAnh Soutetsu, chị Hachiroku, hai người cố lên nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくの日々姫の地図だ。歩くとしよう」
2571 = "「Tấm bản đồ này là do Hibiki cất công làm mà. Chúng ta đi bộ thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2411 = "「Vâng, thưa Soutetsu-sama.」"

# monologue
# JP: 地方都市の駅前、メインの通りというものは、\nどうしてこうも似たり寄ったりになるのだろうか。
3591 = "Những con đường chính trước nhà ga ở các thành phố địa phương,\\nsao mà chúng cứ na ná giống nhau thế nhỉ."

# monologue
# JP: 道を一本外れるだけで、\n景色ががらりと変わるものでもあるのだが――
3310 = "Dù chỉ cần rẽ vào một con đường khác thôi,\\nlà khung cảnh đã có thể thay đổi hoàn toàn rồi, vậy mà――"

# 【ハチロク】
# display as 八六
# JP: 「あら」
# 2290 = "「哎呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2365 = "「Hửm?」"

# 【ハチロク】
# display as 八六
# JP: 「ステンドグラスの時計塔ですか。\n随分と目立つものですね」
2773 = "「Là tháp đồng hồ kính màu sao ạ?\\nTrông nổi bật thật đấy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行御一夜支店。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派の、いわば総本山だな」
2741 = "「Ngân hàng Kumamoto, chi nhánh Ohitoyo.\\nCó thể nói đây là đại bản doanh của phe ủng hộ mời gọi nhà máy \\x%lAirCura;#00ffc040;AirCura%l;#;.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ。ここがそうでしたか」
2313 = "「À à. Thì ra đây là nơi đó ạ.」"

# monologue
# JP: 納得した――そんな雰囲気で小さく頷き、\nハチロクは口をつぐんでしまう。
3029 = "Tỏ vẻ đã hiểu――Hachiroku khẽ gật đầu với dáng điệu đó,\\nrồi im bặt."

# monologue
# JP: 待つことしばし。やはりハチロクは語らないので、\n沈黙の意味が逆に気になる。
3585 = "Tôi chờ một lúc. Quả nhiên Hachiroku vẫn không nói gì,\\nnên ngược lại tôi lại càng tò mò về sự im lặng của cô."

# 【双鉄】
# display as 雙鐵
# JP: 「この建物だが」
2778 = "「Về tòa nhà này...」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2460 = "「Vâng ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、どのように感じているのだ？」
2172 = "「Hachiroku, em cảm thấy nó thế nào?」"

# 【ハチロク】
# display as 八六
# JP: 「よろしいのではないかと思いますよ」
2490 = "「Em nghĩ là nó rất được đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どのように？」
2177 = "「Được ở điểm nào?」"

# 【ハチロク】
# display as 八六
# JP: 「古きガラスの積み重ねを足場に、新しい時を刻む。\n主張がそのまま、明快に形と示されていますので」
2147 = "「Lấy những lớp kính cũ làm nền tảng để khắc nên một thời đại mới.\\nVì tuyên ngôn đó đã được thể hiện một cách rõ ràng qua chính hình dáng của nó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。面白いな」
2337 = "「Ồ. Thú vị thật.」"

# monologue
# JP: 穿ち過ぎであるような気もするが、\nハチロクの指摘通りであるようにも思える。
3610 = "Tôi có cảm giác cô ấy đang suy diễn hơi xa,\\nnhưng cũng lại thấy đúng như lời Hachiroku chỉ ra."

# monologue
# JP: 隈元銀行御一夜支店の、目指すところがそこであるなら、\nやはり僕らの目的地とは、些か異なってくるようだ。
3005 = "Nếu đó là mục tiêu mà Ngân hàng Kumamoto chi nhánh Ohitoyo nhắm tới,\\nthì xem ra nó có phần khác biệt với đích đến của chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ここを曲がってしばらく行けば、\n鍛冶屋横丁という通りに入る」
2505 = "「Rẽ ở đây rồi đi một đoạn nữa là\\nsẽ vào một con phố tên là Phố Thợ Rèn.」"

# monologue
# JP: 言いながら、少し早足になる。
3216 = "Vừa nói, tôi vừa rảo bước nhanh hơn một chút."

# monologue
# JP: 古き時間をそのまま熟成させている――\n僕の知る御一夜の町並みを、ハチロクに見せてやりたくて。
3001 = "Như thể thời gian xưa cũ vẫn được ủ mình nơi đây――\\nTôi muốn cho Hachiroku thấy những dãy phố Ohitoyo mà tôi hằng quen thuộc."

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2280 = "「Chà.」"

# monologue
# JP: さっきより、ずっと華やいだ声。\nハチロクは、うれしげにきょろきょろ辺りを見回す。
3038 = "Giọng cô ấy rạng rỡ hơn hẳn lúc nãy.\\nHachiroku vui vẻ nhìn ngó xung quanh."

# 【ハチロク】
# display as 八六
# JP: 「良いですね。こちらの方がずうっと良いです。\n双鉄様を育ててくれた――そんな空気を感じるようです」
2626 = "「Thật tuyệt. Nơi này tuyệt hơn nhiều.\\nEm như cảm nhận được cả bầu không khí đã nuôi dưỡng ngài Soutetsu vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nそう言われると、なんとも誇らしい気持ちを感じる」
2719 = "「Vậy sao.\\nĐược em nói vậy, tôi lại thấy tự hào đến lạ.」"

# monologue
# JP: 味噌蔵、焼酎蔵、醤油蔵、お茶屋。
3227 = "Xưởng miso, xưởng rượu shochu, xưởng nước tương, tiệm trà."

# monologue
# JP: 僕の暮らしていたころと、まるで変わらぬ町並みを行く。
3481 = "Chúng tôi đi qua những dãy phố chẳng hề đổi thay so với thời tôi còn sống ở đây."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、ここのようですね」
2786 = "「Ngài Soutetsu, có vẻ là ở đây rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 

# monologue
# JP: 年季の入った店構え。\n見るからに上質な刃物がずらり、ケースに並べられている。
3581 = "Một mặt tiền trông đã có tuổi đời.\\nHàng loạt những lưỡi dao trông có vẻ cao cấp được xếp ngay ngắn trong tủ kính."

# monologue
# JP: しかし無人だ――ああ、いや。
2956 = "Nhưng không có một bóng người―― À, không phải."

# 【双鉄】
# display as 雙鐵
# JP: 「奥が工場になっているのかな？」
2662 = "「Phía trong là xưởng rèn thì phải?」"

# 【ハチロク】
# display as 八六
# JP: 「そのようですね――\nあの、ごめんくださいまし」
2150 = "「Có vẻ là vậy ạ――\\nXin hỏi, có ai ở đây không ạ?」"

# monologue
# JP: ハチロクの呼びかけでは届かないのか、反応がない。\nならばと声を張り上げる。
2949 = "Tiếng gọi của Hachiroku có lẽ không vọng tới nơi, chẳng có ai đáp lại.\\nVậy nên, tôi cất cao giọng hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。雛衣ポーレットさんの紹介で来ました。\n右田双鉄と申すものです」
2501 = "Xin lỗi. Tôi đến đây theo lời giới thiệu của cô Hibiki Paulette.\\nTên tôi là Migita Soutetsu."

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、今、市長さんから電話もろうておりました」
2318 = "À, tôi vừa nhận được điện thoại từ ngài thị trưởng rồi."

# monologue
# JP: 良く日焼けした老人だ。\nにこにことこちらに近づいてくる。
3181 = "Đó là một ông lão có làn da rám nắng.\\nÔng ấy mỉm cười và tiến lại gần đây."

# 【蓑笠】
# display as 蓑笠
# JP: 「蓑笠ですたい」
2476 = "Tôi là Minokasa đây."

# monologue
# JP: 手袋の下から出てきた手のひらと握手する。\n親指の根元が分厚く、硬い。職人の手だと、強く感じる。
3440 = "Tôi bắt lấy bàn tay chìa ra từ bên dưới đôi găng tay.\\nPhần gốc ngón cái của ông dày và chai cứng. Tôi cảm nhận rõ đây là bàn tay của một người thợ."

# monologue
# JP: 僕の腕の中ハチロクも、身を乗り出して手を重ねる。
3241 = "Hachiroku trong vòng tay tôi cũng rướn người tới và đặt tay mình lên."

# 【ハチロク】
# display as 八六
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;\x%l8620;#;#00ffc040;8620%l;#;形トップナンバー\x%l8620;#00ffc040;8620%l;#;専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\nハチロクともうします」
2482 = "「Tôi là \\x%lRailord;#00ffc040;Railord%l;#; chuyên dụng cho đầu máy \\x%l8620;#00ffc040;8620%l;#;, chiếc đầu tiên của dòng \\x%l8620;#;#00ffc040;8620%l;#; thuộc Cựu \\x%lĐường sắt Đế quốc;#00ffc040;Đường sắt Đế quốc%l;.\\nTên tôi là Hachiroku.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「こらぁご丁寧に」
2445 = "Chà, cô bé lễ phép quá nhỉ."

# monologue
# JP: ポーレットが最初の一人に推薦してくれた理由がわかる。\nとても気さくで、柔和な人だ。
3240 = "Giờ thì tôi đã hiểu vì sao Paulette lại giới thiệu ông ấy là người đầu tiên.\\nÔng là một người rất cởi mở và hòa nhã."

# 【蓑笠】
# display as 蓑笠
# JP: 「話ば、ざっとは聞きました。\n事故で壊れた蒸気を修復したいゆー話でしたが」
2479 = "Ta đã nghe sơ qua câu chuyện rồi.\\nLà về việc cậu muốn phục hồi đầu máy hơi nước bị hỏng do tai nạn, phải không?"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2551 = "「是的」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の破損状況をまず伝え、\x%l8620;#00ffc040;8620%l;#;の復活と観光振興、\nそうしてそれを工場誘致反対に繋げたいとも伝える。
3628 = "Tôi trình bày về tình trạng hư hỏng của \\x%l8620;#00ffc040;8620%l;#;, về kế hoạch phục hồi nó để thúc đẩy du lịch,\\nvà cả việc muốn dùng chuyện này để phản đối việc xây dựng nhà máy."

# monologue
# JP: ひと通り聞き終えた蓑笠老人は、\nふぅむと穏やかな声をだす。
3446 = "Sau khi nghe xong đầu đuôi câu chuyện, ông Minokasa\\nkhẽ cất một tiếng \"hừm\" trầm ngâm."

# 【蓑笠】
# display as 蓑笠
# JP: 「そがいに運べばよろしかとですが――\nまぁ、難しか話でしょうなぁ」
2668 = "Nếu mọi chuyện có thể tiến triển như vậy thì tốt quá, nhưng mà...\\nMà, e là chuyện khó lắm đây."

# 【双鉄】
# display as 雙鐵
# JP: 「困難なことはわかっています。\nですので、一つずつでも、成果を出していきたいのです」
2473 = "Cháu biết đây là việc khó khăn.\\nVì vậy, cháu muốn bắt đầu tạo ra thành quả, dù chỉ là từng chút một."

# monologue
# JP: 僕の傍ら、ハチロクも深々頭を下げる。
3561 = "Bên cạnh tôi, Hachiroku cũng cúi đầu thật sâu."

# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、そげなことせんで下さい。\nワシなんぞ、何にもできんと思いますけんね」
2291 = "「Ấy ấy, xin cậu đừng làm vậy.\\nLão đây có làm được gì đâu mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、僕に部品作りをご指導ください。\n体力にはいささか、自信があります」
2760 = "「Vậy thì, xin hãy chỉ dạy cho cháu cách chế tạo linh kiện.\\nCháu khá tự tin vào thể lực của mình ạ.」"

# monologue
# JP: 即答すれば、真っ白な眉がひくりと動く。
3444 = "Cậu trả lời ngay tức khắc, khiến cặp lông mày trắng muốt khẽ giật một cái."

# 【蓑笠】
# display as 蓑笠
# JP: 「右田の長男さんいうたら、\n帝都にいかれたいう話でしょう」
2669 = "「Nhắc đến cậu cả nhà Migita thì,\\nchẳng phải nghe nói đã lên tận Đế đô rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2551 = "「是的」" 

# monologue
# JP: 小さな町の、大きな家だ。\n右田の内情などは、全て知れ渡っているのだろう。
3105 = "Một gia tộc lớn trong một thị trấn nhỏ.\\nChắc hẳn mọi chuyện nội bộ của nhà Migita đều đã lan truyền khắp nơi."

# 【蓑笠】
# display as 蓑笠
# JP: 「そんお人が、どぎゃんなわけでそこまで」
2157 = "「Một người như cậu, vì cớ gì mà lại phải làm đến mức đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「この町に、僕は救われたからです」
2373 = "「Bởi vì... chính thị trấn này đã cứu rỗi cháu.」"

# monologue
# JP: 右田に迎えられることがなければ、\n御一夜でたくさんを学ばなければ、僕は腐って死んでいた。
3150 = "Nếu không được nhà Migita đón nhận,\\nnếu không được học hỏi bao điều ở Ohitoyo, thì có lẽ tôi đã mục rữa mà chết rồi."

# monologue
# JP: そうと確信できているから、答えに迷うことなど無い。
3120 = "Vì tôi có thể tin chắc vào điều đó, nên trong câu trả lời không hề có chút do dự nào."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、御一夜を。\nクマ川と焼酎と温泉の――この水の町を救いたいんです」
2497 = "「Vì vậy, cháu muốn cứu lấy Ohitoyo.\\nCháu muốn cứu lấy thị trấn của nước này――thị trấn của sông Kuma, của rượu shochu và của suối nước nóng.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ふぅむ」
# 2319 = "「唔」" 

# monologue
# JP: 蓑笠老人はしばらくぎゅっと目を閉じて、\nそれからぽりっと、白髪頭を軽く掻く。
3470 = "Ông lão áo tơi nón lá nhắm nghiền mắt một lúc,\\nsau đó mới khẽ đưa tay lên gãi mái đầu bạc trắng."

# 【蓑笠】
# display as 蓑笠
# JP: 「右田の酒は旨かとですからねぇ。クマ川の水ば汚れて、\nあん酒が飲めんようになるのは、辛かとですなぁ」
2251 = "「Rượu nhà Migita ngon lắm mà. Nếu nước sông Kuma bị ô nhiễm,\\nmà không được uống thứ rượu đó nữa thì... đau lòng lắm chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それでは」
2752 = "「Vậy thì...」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ゆうても、こん爺に何ができるか。\n蒸気の部品ば、作ったこともなかですけんねぇ」
2232 = "「Cậu nói vậy chứ, lão già này thì làm được gì đây.\\nLão còn chưa từng chế tạo linh kiện hơi nước bao giờ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
2723 = "「Thật vậy sao ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「キハ[レイナナ,1]07の車軸ばようけ壊れますけん。\nあれだきゃあ、何度も何度も作りなおしておりますがの」
2805 = "Trục bánh xe của Kiha 07 hay hỏng hóc lắm. \\nRiêng cái đó thôi mà tôi đã phải làm đi làm lại không biết bao nhiêu lần rồi đó."

# monologue
# JP: 蓑笠老人は静かに聞かせてくれる。\n蓑笠鍛冶店は、代々、鍛造専門の農民鍛冶だったこと。
3288 = "Ông lão Minokasa lặng lẽ kể cho chúng tôi nghe. \\nRằng lò rèn Minokasa đã nhiều đời là một lò rèn nông dân chuyên về rèn đúc."

# monologue
# JP: 大廃線時代以前は、鉄道部品を手がけるなどとは、\n夢にも思っていなかったとのことを。
3406 = "Rằng trước thời Đại Phế Tuyến, họ chưa từng \\nmơ đến việc sẽ chế tạo linh kiện đường sắt."

# 【蓑笠】
# display as 蓑笠
# JP: 「[こくら,1]粉蔵の辺りに、\x%l帝鉄;#00ffc040;帝鉄%l;#;の車両工場ばあったそうですたい。\nそこがのうなって、ま、やむなく言うところでしょうの」
2644 = "Nghe nói quanh khu Konagura, từng có một nhà máy toa xe của \\x%lTeitetsu;#00ffc040;Teitetsu%l;#; đó. \\nSau khi nơi đó không còn nữa, thì, ừm, có thể nói là chúng tôi đành phải làm thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を」
2464 = "Ông khiêm tốn quá."

# 【ハチロク】
# display as 八六
# JP: 「ええ、本当にご謙遜だと感じます」
2562 = "Vâng, em thực sự cảm thấy ông đang khiêm tốn ạ."

# monologue
# JP: 言ってうっとり、\nハチロクは店先の方を振り返る。
3517 = "Nói rồi, với vẻ mặt mê đắm, \\nHachiroku ngoảnh lại nhìn về phía trước cửa tiệm."

# 【ハチロク】
# display as 八六
# JP: 「ここの刃物は、みな、命を持っているようです。\n命を持った部品など、\x%l帝鉄;#00ffc040;帝鉄%l;#;でもほとんど見ませんでした」
2724 = "Những món dao kéo ở đây, tất cả dường như đều có sinh mệnh của riêng mình. \\nNgay cả ở \\x%lTeitetsu;#00ffc040;Teitetsu%l;#;, em cũng gần như chưa từng thấy linh kiện nào có sinh mệnh như vậy."

# monologue
# JP: ハチロクの素直な感嘆に、\n蓑笠老人は目を細める。
3443 = "Trước lời cảm thán chân thành của Hachiroku, \\nông lão Minokasa nheo mắt mỉm cười."

# monologue
# JP: そうして、預けた図面を広げ、\nそれをじっくり眺め下ろす。
3380 = "Rồi ông trải bản vẽ đã được giao ra, \\nvà cẩn thận nhìn xuống xem xét."

# 【蓑笠】
# display as 蓑笠
# JP: 「この[ハチロクニイマル,3]8620やらの車軸は、\nどぎゃん素材でできとりますかの」
2728 = "Cái trục bánh xe của 8620 này, \\nđược làm từ vật liệu như thế nào vậy?"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2170 = "Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「はい」
2531 = "Dạ."

# monologue
# JP: 胸を張り、意気揚々と答えを発し――\nようとして、けれどハチロクは止まってしまう。
3141 = "Cô ưỡn ngực, hăng hái định cất tiếng trả lời―― \\nnhưng rồi, Hachiroku lại khựng lại."

# monologue
# JP: 口をぱくぱく動かすけれど、\n言葉が、なかなか出てこない。
3095 = "Miệng cô cứ mấp máy, \\nnhưng lời nói mãi chẳng thể thốt ra."

# 【双鉄】
# display as 雙鐵
# JP: （ド忘れか？）
3661 = "（Chợt quên à?）"

# monologue
# JP: 反射で思ってしまうがしかし、\nハチロクに、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に恐らくド忘れは発生しまい。
3264 = "Đó là suy nghĩ bột phát của tôi, nhưng mà...\\nvới Hachiroku, một \\x%lRailord;#00ffc040;Railord%l;#;, có lẽ chuyện 'chợt quên' sẽ không xảy ra đâu."

# monologue
# JP: 可能性があるのなら、データを欠損してしまったか、\nあるのにうまく引きだせない――そこら辺りの障害だろう。
3589 = "Nếu có khả năng nào đó, thì hoặc là dữ liệu đã bị tổn thất,\\nhoặc là tuy vẫn còn đó nhưng không thể truy xuất được――chắc là một dạng sự cố quanh đó."

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。事故があったゆー話でしたの」
2314 = "「Àà. Tôi nghe kể là đã có một vụ tai nạn.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2796 = "「！」" 

# monologue
# JP: 僕と同じ結論に辿り着いたのだろうか。\n蓑笠老人はハチロクに、いたわるような目を向ける。
3466 = "Phải chăng ông cũng đã đi đến kết luận giống tôi?\\nLão nông nhìn Hachiroku với ánh mắt đầy thương cảm."

# 【蓑笠】
# display as 蓑笠
# JP: 「なら、一番太か車軸の目方を教えてくれればよかですよ。\n寸法と目方がわかりゃあ、素材の見当もつきますけん」
2750 = "「Vậy thì, cô cứ cho tui biết trọng lượng của cái trục bánh xe dày nhất là được.\\nCứ có kích thước với trọng lượng là tui sẽ đoán ra được vật liệu làm ra nó thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「目方――重量ですね――\n\x%l動輪;#00ffc040;動輪%l;#;車軸の、重量……は――」
2179 = "「Trọng lượng――ý ngài là khối lượng――\\nkhối lượng của trục \\x%lBánh xe dẫn động;#00ffc040;Bánh xe dẫn động%l;#;... là――」"

# monologue
# JP: ごく、基本的なデータだろうに、\nそこから先が出てこない。
3312 = "Dù đó hẳn là một dữ liệu rất cơ bản,\\nnhưng cô ấy không thể nói tiếp được."

# monologue
# JP: ハチロクの唇だけが、ぱくぱくと、\n空気を求める金魚のように、何度も何度も動き続ける。
3144 = "Chỉ có đôi môi của Hachiroku, như một chú cá vàng đang ngớp khí,\\ncứ mấp máy hết lần này đến lần khác."

# 【蓑笠】
# display as 蓑笠
# JP: 「ああああ。よかです。よかですたい。\n駅まで、実物を見せてもらいにいきますけん」
2399 = "「À à à à. Được rồi. Được rồi mà.\\nĐể tui đến ga xem tận mắt vật thật là được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お手数を、ありがとうございます」
2628 = "「Làm phiền ngài quá, cảm ơn ngài rất nhiều.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「なんのなんの、乗りかかった舟――\nじゃあなかですね、機関車ですけん」
2586 = "「Không có gì, không có gì đâu, đã trót leo lên thuyền――\\nà không phải nhỉ, phải là đầu máy xe lửa mới đúng.」"

# monologue
# JP: 気を使ってくださったのだろう。\n蓑笠老人の軽口に、当然、僕も笑いで答える。
3377 = "Chắc hẳn ông ấy đang cố ý nói vậy để làm dịu không khí.\\nĐương nhiên, tôi cũng đáp lại câu nói đùa của lão nông bằng một nụ cười."

# 【ハチロク】
# display as 八六
# JP: 「んっ――ぐっ――」
2344 = "「Ưm――ực――」"

# monologue
# JP: けれどもハチロクは笑えない。
2991 = "Thế nhưng, Hachiroku lại không thể cười nổi."

# monologue
# JP: 恐らく自らを恥じるあまりに浮いた涙を、\nこぼさぬように抑えるだけで、精一杯だ。
3212 = "Có lẽ cô ấy đang dồn hết sức mình chỉ để kìm nén những giọt lệ trào ra vì xấu hổ,\\nđể chúng không tuôn rơi."

# 【双鉄】
# display as 雙鐵
# JP: （こらえろ、ハチロク。\n泣けば、蓑笠老人を責めるようになってしまうぞ）
3659 = "（Cố nén đi, Hachiroku.\\nNếu em khóc, sẽ thành ra em đang trách móc lão nhân Minokasa đó.）"

# monologue
# JP: いや――\nハチロクはそのことを、重々承知しているのだ。
2947 = "Không phải――\\nHachiroku đã nhận thức rất rõ điều đó rồi."

# monologue
# JP: だからこそ、必死で涙をこらえようとし――\nけれどもこらえることが出来ずに……ああ、いや、そうか。
3273 = "Chính vì thế, cô ấy mới cố gắng hết sức để kìm nén nước mắt――\\nnhưng lại không thể kìm nén được…… À, không, ra là vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「不調なようだな。\x%l蒸気排水;#00ffc040;蒸気排水%l;#;のシステムが」
2393 = "「Có vẻ đang trục trặc rồi. Hệ thống \\x%lThoát hơi nước;#00ffc040;Thoát hơi nước%l;#; của cô.」"

# 【ハチロク】
# display as 八六
# JP: 「ひっ――んっ――ンッ――はい、その、ようです」
2338 = "「Hức――ưm――Ực――V-vâng, có, có lẽ là vậy ạ.」"

# monologue
# JP: ああ、いかん、喋らせたのは失策だったか。
3115 = "A, không ổn rồi, bắt cô ấy nói đúng là sai lầm mà."

# monologue
# JP: 言葉の上で“涙ではない”と主張をしても、\n声がまるきり、泣き声だ。
3611 = "Dù lời nói có khẳng định rằng “đây không phải là nước mắt”,\\ngiọng cô ấy vẫn hoàn toàn là tiếng khóc."

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2319 = "「唔」" 

# 【凪】
# display as ？？？
# JP: 「女の子ば泣かせるヤツは、ゆるせんばーーーーいっ！」
2533 = "「Tên nào làm con gái phải khóc, ta không tha thứ đââââââu!」"

# monologue
# JP: 鋭い気迫。背後から。
3190 = "Một luồng sát khí sắc bén. Từ phía sau."

# monologue
# JP: 感じた瞬間、体が動き、\n躱すと同時に捕まえている。
3121 = "Ngay khoảnh khắc cảm nhận được, cơ thể tôi đã di chuyển,\\nné đòn và tóm lấy đối phương ngay cùng lúc."

# 【双鉄】
# display as 雙鐵
# JP: 「無手か」
2683 = "「Tay không sao?」"

# monologue
# JP: 真剣か、木刀か――\nそれほどの威圧を確かに感じたのだが。
3250 = "Kiếm thật, hay kiếm gỗ――\\nrõ ràng mình đã cảm nhận được một áp lực lớn đến thế cơ mà."

# monologue
# JP: 僕の手の中に捕まえている細い手首は、\nその先に何も持ってはいない。
2989 = "Cổ tay mảnh khảnh đang bị tôi giữ chặt trong tay,\\nhoàn toàn không cầm theo thứ gì cả."

# 【凪】
# display as ？？？
# JP: 「そんなん、無手でとうぜんばいっ！\nいきもの相手に剣をふるうは、ご法度たいっ！」
2620 = "「Đương nhiên là tay không rồi chứ!\\nDùng kiếm với sinh vật sống là điều đại cấm kỵ đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、剣道を習っているのか？\nいい師に恵まれているようだな」
2309 = "「Ồ, cháu đang học Kendo à?\\nXem ra cháu đã gặp được một sư phụ giỏi.」"

# 【凪】
# display as ？？？
# JP: 「当然ばい！　うちのお師さんは[ひのもと,2]日ノ本一\n――って！　なんで悪党にそげなこつ」
2718 = "「Đương nhiên rồi! Sư phụ của con là nhất Nhật Bản\\n――Khoan đã! Tại sao con lại đi nói chuyện đó với một tên xấu xa chứ.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、悪党などではございませんっ！！！」
2785 = "「Ngài Soutetsu không phải là người xấu đâu ạ!!!」"

# monologue
# JP: 一喝！\nハチロクは自らの怒声で涙を飛ばす。
3077 = "Một tiếng quát lớn!\\nHachiroku dùng chính tiếng thét giận dữ của mình để thổi bay đi những giọt nước mắt."

# 【凪】
# display as ？？？
# JP: 「えっ！？」
# 2297 = "「哎！？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こおれ凪！　まぁた早とちりばしくさって」
2336 = "「Này Nagi! Lại hấp tấp vội kết luận rồi.」"

# 【凪】
# display as 凪
# JP: 「えええっ！？　じいちゃん、こらどぎゃんこつね？」
2296 = "「Ểểể!? Ông ơi, chuyện này là sao vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「誤解をさせてしまったらしいね。\nひとまず、落ち着いて説明をさせてもらえるか」
2623 = "「Xem ra tôi đã gây ra hiểu lầm rồi.\\nTrước mắt, cháu có thể bình tĩnh lại và để tôi giải thích được không?」"

# monologue
# JP: 捕まえていた手を離し、\n目線の高さをあわせてゆっくり話しかける。
3272 = "Anh buông bàn tay đang nắm ra,\\nhạ tầm mắt xuống ngang bằng với cô bé và từ tốn bắt chuyện."

# monologue
# JP: 昔の日々姫がパニックを起こしてしまっていたとき、\nしばしば、こうして落ち着かせたものだ。
2981 = "Ngày xưa, mỗi khi Hibiki hoảng loạn,\\nanh cũng thường dỗ dành cô bé bình tĩnh lại theo cách này."

# monologue
# JP: （だだだだだっ！）
3676 = "（Bịch bịch bịch bịch bịch!）"

# 【凪】
# display as 凪
# JP: 「じいちゃん、こん人だれと？」
2618 = "「Ông ơi, người này là ai vậy ạ?」"

# monologue
# JP: ……日々姫相手のようにはいかず、\n凪と呼ばれた少女はぱっと、蓑笠老人の後ろに隠れる。
1806 = "……Không giống như với Hibiki,\\ncô bé tên Nagi đột nhiên nấp sau lưng ông lão mặc áo tơi đội nón."

# 【蓑笠】
# display as 蓑笠
# JP: 「右田の――ほれ、御一夜でいっとう古か焼酎蔵さんの、\n息子さんよ」
2710 = "「Là nhà Migita――đó, con trai của xưởng rượu shochu lâu đời nhất ở Ohitoyo đó con.」"

# 【凪】
# display as 凪
# JP: 「焼酎屋さんが何しに来たと？\nなんで女の子ば泣かせとー――――っ！」
2681 = "「Người của xưởng rượu đến đây làm gì chứ?\\nTại sao lại làm một cô gái phải khóc chứ――――っ！」"

# monologue
# JP: 不意に、凪の目つきが鋭く細まる。\n薄くて小さな体にどん、と強い気迫が満ち満ちる。
3054 = "Bất chợt, ánh mắt của Nagi trở nên sắc lẻm.\\nMột luồng khí thế mạnh mẽ bỗng tràn ngập cơ thể nhỏ bé, mảnh khảnh của cô."

# 【凪】
# display as 凪
# JP: 「わかったばい！　こん女の子、焼酎屋さんのツレとや。\nで、じいちゃんがツケば払ろぉてやらんけん」
2278 = "「Con hiểu rồi! Cô gái này là người của quán rượu shochu.\\nLà do ông không chịu trả nợ cho họ chứ gì!」"

# 【蓑笠】
# display as 蓑笠
# JP: 「あほう」
2677 = "「Đồ ngốc.」"

# monologue
# JP: （パチンっ！）
3672 = "（Búng!）"

# 【凪】
# display as 凪
# JP: 「あいたっ！」
2403 = "「Ui da!」"

# monologue
# JP: おでこを指で軽く弾かれ、\n凪の勢いがようやく落ちる。
3621 = "Bị búng nhẹ vào trán,\\nNagi cuối cùng cũng dịu lại."

# 【凪】
# display as 凪
# JP: 「違うと？　謎ばい。さっぱり事情がわからんばい」
2122 = "「Sai à? Lạ thật. Con chẳng hiểu đầu đuôi ra sao cả.」"

# monologue
# JP: それは聞こうとせんからだ――
2996 = "Đó là vì cô bé không chịu lắng nghe――"

# monologue
# JP: 言いたい気持ちを飲み込んで、\n代わりに穏やかな言葉をつなぐ。
3234 = "Nuốt lại những lời muốn nói,\\ntôi dùng những lời lẽ ôn hòa hơn để thay thế."

# 【双鉄】
# display as 雙鐵
# JP: 「かいつまめば、僕らは君のお祖父様に協力を願いに来た。\n何の協力かといえば、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の修復だ」
2637 = "「Tóm lại là, bọn anh đến đây để nhờ ông của em hợp tác.\\nNội dung hợp tác là sửa chữa một chiếc \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#;.」"

# 【凪】
# display as 凪
# JP: 「じょーききかんしゃ？」
2653 = "「Đầu máy hơi nước ạ?」"

# monologue
# JP: はて、と大きく首をかしげて。\nそれから「ああ」、と心あたった声が出る。
3143 = "Cô bé nghiêng đầu, vẻ mặt đầy thắc mắc.\\nRồi kêu lên một tiếng \"A\" như đã sực nhớ ra điều gì."

# 【凪】
# display as 凪
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;って、絵本とかに出てくる汽車ぽっぽとや？\nなんのために、そげなもん直すと？」
1819 = "「\\x%lĐầu máy hơi nước;#00ffc040;Đầu máy hơi nước%l;#;... ý anh là cái tàu hỏa xình xịch trong truyện tranh ạ?\\nMà tại sao lại phải sửa một thứ như vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を軸にした観光誘致を行い、\nそれを\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回へとつなげていくためだ」
2604 = "「Là để tiến hành thu hút khách du lịch, lấy \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; làm trọng tâm,\\nvà từ đó dẫn đến việc rút lại lời mời xây dựng nhà máy \\x%lAircra;#00ffc040;Aircra%l;#;.」"

# 【凪】
# display as 凪
# JP: 「ゆーちてっかい！」
2216 = "「Rút lại lời mời!」"

# monologue
# JP: いきなり、凪の声音が変わる。
3052 = "Đột nhiên, giọng của Nagi thay đổi hẳn."

# monologue
# JP: ぱあっと明るい笑顔を浮かべ、\n僕のそばへと駆け寄ってくる。
3147 = "Nở một nụ cười rạng rỡ,\\ncô bé chạy đến bên cạnh tôi."

# 【凪】
# display as 凪
# JP: 「じゃったらにーさん、良かひとばい。\n誤解しとって、悪かったばい」
2746 = "「Vậy ra anh là người tốt mà.\\nEm đã hiểu lầm anh, em xin lỗi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「誤解が解けたならなによりだ」
2219 = "「Hiểu lầm được hóa giải là tốt rồi.」"

# monologue
# JP: （ぐいっ！）
3684 = "（Giật!）"

# monologue
# JP: 袖がいきなり捕まえられる。\n凪はグイグイ僕をひっぱり、動かそうとする。
3057 = "Tay áo tôi đột nhiên bị túm lấy.\\nNagi cứ kéo tôi đi xềnh xệch, cố gắng lôi tôi đi."

# 【凪】
# display as 凪
# JP: 「じーちゃん、このにーさんら、\nふかみちゃんとこ案内してあげても良かと？」
2617 = "「Ông ơi, con dẫn mấy anh này\\nđến chỗ chị Fukami được không ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「早瀬さんとこ――ああ、そら良かとねぇ」
2527 = "「Đến chỗ nhà Hayase à... À, vậy thì tốt quá.」"

# monologue
# JP: 大きく頷き、蓑笠老人は僕へと向き直る。
3472 = "Gật đầu một cái thật mạnh, ông lão đội nón lá quay lại phía tôi."

# 【蓑笠】
# display as 蓑笠
# JP: 「右田さん。二時間ほど、時間ばもらえませんかいね」
2250 = "「Cậu Migita. Cậu có thể cho tôi xin khoảng hai tiếng được không?」"

# monologue
# JP: ちょうどいい。
3332 = "Vừa hay."

# monologue
# JP: 二時間ならば、\nポーレットたちが湯医まで行き御一夜に戻るほどの時間だ。
3027 = "Hai tiếng là đủ thời gian để\\nPaulette và mọi người đi đến Yui rồi quay lại Ohitoyo."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫です。何をすれば？」
2406 = "「Được ạ. Cháu cần làm gì ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「そんなら、\nうちトコの孫娘に、ついていってやってください」
2159 = "「Vậy thì,\\ncậu hãy đi cùng cháu gái của tôi nhé.」"

# monologue
# JP: 蓑笠老人は笑みを浮かべる。\nけれども瞳が、笑っていない。
3468 = "Ông lão đội nón lá mỉm cười.\\nNhưng đôi mắt ông lại không cười."

# 【蓑笠】
# display as 蓑笠
# JP: 「御一夜の観光の実情がどぎゃんもんか、\nほーで少しは、わかってもらえると思いますけん」
2569 = "「Tôi tin rằng làm vậy sẽ giúp cậu hiểu được phần nào\\nthực trạng du lịch ở Ohitoyo là như thế nào.」"
