3233 = "Tôi sắp xếp lại suy nghĩ."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修は現状、妨害に耐えられるような計画ではない。\nであるのならば、堅いところから始めるべきだ。
102 = "\\x%l8620;#00ffc040;8620%l;#;Kế hoạch cải tạo hiện tại không đủ sức chống lại sự cản trở.\\nNếu đã vậy, chúng ta nên bắt đầu từ những điểm vững chắc nhất."

# 【双鉄】
# display as 雙鐵
