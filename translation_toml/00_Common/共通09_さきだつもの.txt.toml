2507 = "「Một người có kiến thức và kỹ thuật liên quan đến đường sắt hoặc du lịch.\\nTrên hết, sẽ rất tốt nếu họ là người công khai phản đối việc xây dựng nhà máy」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら……こことかはどうでしょう？」
2757 = "「Vậy thì... chỗ này thì sao ạ?」"

# monologue
