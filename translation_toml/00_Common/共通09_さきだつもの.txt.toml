2651 = "「Nếu cứ làm theo cách thông thường,\\nthì khả năng sinh lời sẽ cực kỳ khó khăn nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l客車;#00ffc040;客車%l;#;のこととか、固定費とかを考えないでソレですから。\n観光\x%l列車;#00ffc040;列車%l;#;ですから指定席券でやれるとしても……」
2726 = "「Đó là còn chưa tính đến những thứ như \\x%ltoa tàu khách;#00ffc040;toa tàu khách%l;#; hay chi phí cố định đâu ạ.\\nDù đây là \\x%lchuyến tàu;#00ffc040;chuyến tàu%l;#; du lịch nên có thể bán vé chỉ định chỗ ngồi nhưng mà……」"

# monologue
