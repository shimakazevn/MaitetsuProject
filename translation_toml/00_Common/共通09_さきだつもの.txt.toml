# lines: 516 
# monologue
# JP: くり返される同じリズムが、\n体のいちばん深いところで、ひびく。
3061 = "Nhịp điệu lặp đi lặp lại ấy,\\n vang vọng từ nơi sâu thẳm nhất trong cơ thể."

# 【路子】
# display as ？？？
# JP: 「……ふみゅっ」
1841 = "「……Phưm...」"

# monologue
# JP: べたりと。何かが張り付いてくる。\n汗じみて、あまったるくてやわらかで。
3321 = "Bẹp dí. Có thứ gì đó đang dính chặt vào người mình.\\nƯớt đẫm mồ hôi, vừa ngọt ngào vừa mềm mại."

# monologue
# JP: こどうも呼吸もぴったり僕と重なって――\nなんて存在、世界にたったひとつしか無い。
3207 = "Nhịp tim và cả hơi thở cũng hoàn toàn trùng khớp với mình――\\nMột sự tồn tại như thế, trên đời này chỉ có duy nhất một người mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「む……ぅぁっ……暑いよ、路子」
2339 = "「Ưm... oá... Nóng quá, Michiko.」"

# 【路子】
# display as 路子
# JP: 「んゆぅぅぅ～～っ」
2359 = "「Nhyuuuuu~~」"

# monologue
# JP: 貼り付いてくる路子をはがす。\nそうするために、まだ眠りたがる体に無理やり力を込める。
3376 = "Tôi gỡ Michiko đang dính chặt ra.\\nĐể làm vậy, tôi phải gắng gượng dồn sức vào cơ thể vẫn còn đang muốn ngủ này."

# monologue
# JP: ふたごなせいか、貼り付く力がハンパじゃないから、\nいつものように、一気に両手に力を込める！
2972 = "Chắc vì là sinh đôi nên lực bám của em ấy chẳng phải dạng vừa đâu,\\nnên như mọi khi, tôi dồn hết sức vào cả hai tay cùng một lúc!"

# monologue
# JP: （どすんっ！）
3665 = "（Rầm!）"

# 【路子】
# display as 路子
# JP: 「ぐぎゅっ！！？」
2274 = "「Gự!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うわっ！？」
2340 = "「Oái!?」"

# monologue
# JP: 目が覚めた。\n僕にも痛みが伝わってきて。
3400 = "Tôi choàng tỉnh.\\nCơn đau cũng truyền cả sang người tôi."

# 【路子】
# display as 路子
# JP: 「いたいよぅ～！　そーちゃん、ひどいよぅ～」
2404 = "「Đau quá đi~! Sou-chan quá đáng lắm~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ごめん。寝ぼけて、ここがどこかを忘れちゃってた」
2503 = "「Anh xin lỗi. Anh vẫn còn ngái ngủ nên quên mất mình đang ở đâu.」"

# 【路子】
# display as 路子
# JP: 「みち。おイスからおっこっちゃったよぅ～」
2428 = "「Michi... bị ngã khỏi ghế rồi nè~」"

# monologue
# JP: 貼り付く路子を引きはがし、布団からズリ落とさせて\nしまったとしても、普段であれば畳に着地でコトは済む。
3176 = "Dù có gỡ Michiko đang dính chặt ra và khiến em ấy trượt khỏi futon,\\nthì bình thường em ấy cũng chỉ đáp xuống chiếu tatami là cùng."

# monologue
# JP: けど、今日は――
2988 = "Nhưng hôm nay thì――"

# 【路子】
# display as 路子
# JP: 「れっしゃのゆか、木の板だからいたいよぉ」
2182 = "「Sàn tàu bằng ván gỗ nên đau lắm đó~」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかる。僕にも来ちゃうくらいに痛かった。\nごめんな、みち。コブになったりしてないか？」
2487 = "「Anh hiểu mà. Đau đến mức anh cũng thấy nhói luôn.\\nXin lỗi nhé, Michi. Em có bị sưng u lên không đấy?」"

# monologue
# JP: 路子を引き上げ、髪をかきあげおでこを見つめる。\n赤くなってる……けど、コブとかには――
3243 = "Tôi đỡ Michi dậy, vén tóc cô bé lên và nhìn vào trán.\\nChỗ đó đỏ ửng lên... nhưng, có vẻ không bị sưng u――"

# 【路子】
# display as 路子
# JP: 「へーき！　ちょっとびっくりしただけ。\nそれよりそーちゃん、パパとママ」
2584 = "「Em không sao đâu! Chỉ là hơi giật mình chút thôi.\\nMà nè anh So, bố với mẹ kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。二人ともぐっすりだね」
2350 = "「Ừm. Cả hai người đều ngủ say nhỉ.」"

# monologue
# JP: 母さんはお弁当の準備とかで早起きだろうし……
3154 = "Mẹ chắc đã phải dậy sớm để chuẩn bị cơm hộp..."

# monologue
# JP: 父さんは、案外僕とおんなじで、\nわくわくで寝不足なのかもしれない。
3396 = "Còn bố, có khi lại giống hệt mình,\\nháo hức đến mức mất ngủ cũng nên."

# 【路子】
# display as 路子
# JP: 「ねぇ、そーちゃん、いま何時？\nれっしゃ、どの辺を走ってるの？」
2740 = "「Nè anh So, bây giờ là mấy giờ rồi ạ?\\nTàu mình đang chạy ở đâu vậy anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わからない。――窓の外、真っ暗だし。\n時計は、父さんがしてるけど」
2123 = "「Anh không biết.――Ngoài cửa sổ tối đen như mực.\\nNhưng mà đồng hồ thì bố đang đeo đó.」"

# 【路子】
# display as 路子
# JP: 「そっか、見ちゃお！」
2721 = "「Thế à, để em xem!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、こら！　そんなことしたら」
2330 = "「A, này! Em mà làm thế thì...」"

# monologue
# JP: 止める間もなく、路子が父さんの手をつかむ。\nとたんにゆるゆる、落ちてたまぶたが持ち上がる。
3349 = "Chẳng kịp ngăn lại, Michi đã nắm lấy tay bố.\\nNgay lập tức, đôi mi đang trĩu xuống từ từ nhấc lên."

# 【父】
# display as 父親
# JP: 「ん……ああ、眠ってしまっていたか」
2346 = "「Ưm... à à, bố ngủ quên mất à.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから言ったのに」
2494 = "「Đã bảo mà.」"

# 【路子】
# display as 路子
# JP: 「はぅぅ～……ごめんなさい～」
2287 = "「Hauu~... Em xin lỗi ạ~」"

# 【父】
# display as 父親
# JP: 「いや、丁度いいところで起こしてくれた。\nほら、お前も、寝ていると絶景を見逃すぞ？」
2134 = "「Không đâu, em gọi anh dậy đúng lúc lắm.\\nNày, em cũng thế, cứ ngủ là bỏ lỡ cảnh đẹp bây giờ đấy?」"

# 【母】
# display as 母親
# JP: 「あら……やだ、わたしったら居眠りなんて」
2289 = "「Ara... Chết thật, mình lại ngủ gật mất rồi.」"

# monologue
# JP: 結局みんな起きちゃった。\nけど、絶景なんていったって――
3436 = "Rốt cuộc thì mọi người đều thức dậy cả.\\nNhưng mà, dù có nói là cảnh đẹp tuyệt vời đi nữa thì--"

# 【路子】
# display as 路子
# JP: 「お外、まっくらだよ？」
2233 = "「Bên ngoài tối om mà?」"

# 【父】
# display as 父親
# JP: 「はは、真っ暗なのは――ほら！」
2286 = "「Haha, trời tối là vì-- Nhìn kìa!」"

# 【路子】
# display as 路子
# JP: 「わ！？」
2281 = "「Oa!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そっか、トンネルだったのか」
2202 = "「Thì ra là đường hầm à.」"

# monologue
# JP: 真っ黒だった世界に色が戻ってくる。
3374 = "Sắc màu trở lại với thế giới vốn đang chìm trong bóng tối."

# monologue
# JP: ……だけれど、それは鈍くあせてる。
1797 = "...Thế nhưng, sắc màu ấy lại thật ảm đạm và phai nhạt."

# 【路子】
# display as 路子
# JP: 「やだやだ、大雨になっちゃってる」
2120 = "「Chán quá, lại mưa to rồi.」"

# monologue
# JP: そう言って、\n次の瞬間、路子は丸い目で僕を見上げる。
3553 = "Vừa nói dứt lời,\\nkhoảnh khắc tiếp theo, Rokuko liền ngước nhìn tôi với đôi mắt tròn xoe."

# 【路子】
# display as 路子
# JP: 「だいじょうぶ！？　\nじょうききかんしゃの火、消えちゃわない？」
2580 = "「Có sao không ạ!?\\nLửa của đầu máy hơi nước sẽ không bị dập tắt chứ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……お前は\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;をどんなものだと思ってるんだ」
1836 = "「...Em nghĩ \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; là cái thứ gì vậy hả.」"

# 【路子】
# display as 路子
# JP: 「しらない。だって、見てないもん」
2138 = "「Em không biết. Tại em có thấy bao giờ đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ねぼうするから見れなかったんだろう」
2730 = "Chắc là do cậu ngủ nướng nên mới không xem được chứ gì."

# monologue
# JP: 言えば路子は、てへっと笑って舌を出す。\nねぼうした上、この服じゃヤダのあの帽子がいいの――
3546 = "Nghe tôi nói vậy, Michiko cười ngượng nghịu rồi lè lưỡi.\\nĐã ngủ nướng rồi còn mè nheo không chịu mặc bộ này, đòi đội cái mũ kia――"

# monologue
# JP: あんなにバタバタしなければ、\n乗り込む前に、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の鉄の体を見ておけたのに。
3491 = "Nếu không phải vội vàng cuống cuồng như thế,\\nthì mình đã có thể ngắm nhìn thân hình bằng sắt của \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; trước khi lên tàu rồi."

# 【路子】
# display as 路子
# JP: 「そーちゃんは知ってるの？」
2437 = "So-chan biết à?"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。旅行の前にずかんで調べた」
2353 = "Ừm. Tớ đã tra trong sách ảnh trước chuyến đi rồi."

# monologue
# JP: だからこそ、実物を見て確かめたかった。\nだけどあんまり悔やんでいたら、路子に伝わる。
3276 = "Chính vì thế, mình mới muốn tận mắt nhìn thấy nó.\\nNhưng nếu cứ tiếc nuối mãi, Michiko sẽ nhận ra."

# monologue
# JP: せっかくの旅行でケンカもヤだから、\n切り替えて、ちゃんと説明してあげる。
3614 = "Chuyến đi hiếm có này mà cãi nhau thì chán lắm,\\nnên mình quyết định gạt chuyện đó qua và giải thích cặn kẽ cho cậu ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄のぶ厚い体の中に、ボイラっていう釜がある。\nその中で石炭を燃やしてるから、雨が降っても消えない」
2376 = "Bên trong thân hình dày cộp bằng sắt của nó có một cái nồi gọi là nồi hơi.\\nVì người ta đốt than đá ở trong đó nên dù trời có mưa cũng không bị dập tắt."

# 【路子】
# display as 路子
# JP: 「そっかぁ、なら安心だねぇ」
2722 = "Ra vậy à, thế thì yên tâm rồi nhỉ."

# monologue
# JP: 路子がほーっと息を吐く。\nけど母さんは、路子と逆に不安げだ。
3555 = "Michiko thở phào nhẹ nhõm.\\nNhưng mẹ thì ngược lại với Michiko, trông có vẻ lo lắng."

# 【母】
# display as 母親
# JP: 「台風、[そ]逸れてくれなかったんでしょうか？」
2793 = "Cơn bão, có lẽ nó đã không đổi hướng đi phải không ạ?"

# 【父】
# display as 父親
# JP: 「……そのようだな。\nこれではせっかくの冨士も拝めないか」
1842 = "…Có vẻ là vậy rồi.\\nCứ thế này thì e là chúng ta sẽ không được chiêm ngưỡng núi Phú Sĩ mất."

# 【路子】
# display as 路子
# JP: 「ふじさん！？」
2418 = "Núi Phú Sĩ ạ!?"

# 【父】
# display as 父親
# JP: 「ああ。しばらくいくと、この\x%l列車;#00ffc040;列車%l;#;は\n冨士川[きょうりょう,1]橋梁という鉄橋を抜ける」
2540 = "Ừ. Đi một lúc nữa, \\x%lchuyến tàu;#00ffc040;chuyến tàu%l;#; này sẽ\\nbăng qua một cây cầu sắt tên là cầu Fujigawa."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄橋。\nなら、その上から冨士山が？」
2772 = "Cầu sắt.\\nVậy thì, từ trên đó có thể thấy núi Phú Sĩ ạ?"

# 【父】
# display as 父親
# JP: 「晴れていればな。見事な冨士が拝めるのだが……\nまぁ、台風を抜けてさえしまえば――うおっ！？」
2666 = "Nếu trời quang mây tạnh thì chúng ta đã có thể chiêm ngưỡng núi Phú Sĩ hùng vĩ rồi...\\nMà, chỉ cần vượt qua cơn bão này là――Uô!?"

# monologue
# JP: （グラっ！）
3670 = "（Chao đảo!）"

# 【路子】
# display as 路子
# JP: 「きゃあっ！？」
2266 = "Á!?"

# monologue
# JP: \x%l列車;#00ffc040;列車%l;#;が横に大きくゆれて、路子が僕に貼りついてくる。\n母さんも、父さんにギュっとしがみついてる。
106 = "\\x%lCon tàu;#00ffc040;Con tàu%l;#; chao đảo dữ dội sang ngang, Michiko dán chặt vào người tôi.\\nMẹ cũng đang ôm chặt lấy bố."

# 【双鉄】
# display as 雙鐵
# JP: 「今、ずいぶんゆれたけど」
2194 = "Vừa rồi rung lắc dữ quá."

# 【父】
# display as 父親
# JP: 「……[そ]逸れなかったどころか、\n直撃コースに入ってしまったのかもしれないな」
1839 = "…Chẳng những không tránh được,\\ncó lẽ chúng ta đã đi thẳng vào tâm bão rồi."

# monologue
# JP: 「台風のせい？」と聞くより先に、\n父さんが早口で答えてくれる。
3348 = "Còn chưa kịp hỏi \"Là do bão ạ?\",\\nbố đã nhanh miệng trả lời."

# 【路子】
# display as 路子
# JP: 「ちょくげきコースに入っちゃうと、どうなるの？」
2686 = "Nếu đi thẳng vào tâm bão thì sẽ thế nào ạ?"

# monologue
# JP: （ガトンっ！）
3666 = "（RẦM!）"

# 【路子】
# display as 路子＆雙鐵
# JP: 「きゃあああああああっ！？」\n「うわあっ！？」
2258 = "Áaaaaaaaaaaa!?"

# monologue
# JP: 体、浮くっ！
3493 = "Người như bay lên!"

# monologue
# JP: 強すぎるゆれに、\n体、路子ごと持ってかれ――っ！？
3284 = "Cú rung lắc quá mạnh,\\nkhiến cơ thể tôi và cả Michiko bị hất văng đi――!?"

# 【父】
# display as 父親＆母親
# JP: 「双鉄っ！」\n「路子っ！」
2787 = "Soutetsu!\\nMichiko!"

# monologue
# JP: （ぐいっ！！）
3683 = "（Kéo giật!!）"

# monologue
# JP: のびてきた手につかまえられて、\n浮きかけていた体を強く引き戻される。
2939 = "Một bàn tay vươn tới tóm lấy tôi,\\nkéo mạnh cơ thể đang chực bay lên của tôi lại."

# monologue
# JP: 僕の手の中、\n路子は小さくふるえちゃってる。
3544 = "Trong vòng tay tôi,\\nMichiko đang run rẩy."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か、みち――っ！？」
2581 = "「Em có sao không, Michi――!?」"

# monologue
# JP: (グンっ！)
34 = "(Giật!)"

# 【路子】
# display as 路子
# JP: 「やっ！？」
# 2266 = "「呀！？」" 

# monologue
# JP: 席へともどった体が今度は、\n背もたれにギュっと押し付けられる。
3149 = "Cơ thể vừa ngả lại vào ghế, giờ lại bị ép chặt vào lưng ghế."

# monologue
# JP: \x%l列車;#00ffc040;列車%l;#;――これ、加速してっ！？
105 = "\\x%lTàu hỏa;#00ffc040;Tàu hỏa%l;#;――Nó, nó đang tăng tốc sao!?"

# 【双鉄】
# display as 雙鐵
# JP: 「父さん」
2616 = "「Bố.」"

# 【父】
# display as 父親
