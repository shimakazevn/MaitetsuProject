2587 = "「Đúng vậy. Nói cách khác, dù thất bại thì cũng chỉ là giữ nguyên hiện trạng,\\nchúng ta chỉ tốn thời gian và công sức để loại bỏ một lựa chọn sai lầm mà thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2322 = "「A.」"

# monologue
