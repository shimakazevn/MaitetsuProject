3244 = "Tôi cố hết sức vươn tay phải ra.\\nCăng duỗi đến tận đầu ngón tay, quờ quạng tìm kiếm xung quanh."

# monologue
# JP: （路子――路子っ！！！）
3692 = "(Michiko-- Michiko!!!)"

# monologue
# JP: さっきは出せた声が出ない。\nにおいはどんどん強くなるのに、他の全てがかすれ始める。
3218 = "Giọng nói ban nãy giờ không thể cất lên được nữa.\\nMùi tanh khét ngày một nồng nặc, trong khi mọi thứ khác lại bắt đầu phai mờ."

# monologue
# JP: それでも、手だけは伸ばし続ける。\nなにも見えなくたって感じる、僕のふたごのいる方に――
3169 = "Dù vậy, tôi vẫn không ngừng vươn tay.\\nDù chẳng nhìn thấy gì, tôi vẫn cảm nhận được, hướng về phía người chị em song sinh của mình--"

# monologue
# JP: （ぐにっ）
3685 = "(Mềm oặt)"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2324 = "「A a...」"

# monologue
# JP: 触れた瞬間。だから。わかってしまう。\n見えてなくても、指先がこれほど鈍っていても。
3072 = "Ngay khoảnh khắc chạm vào. Nên là. Tôi đã hiểu ra tất cả.\\nDù không thể nhìn thấy, dù đầu ngón tay đã tê dại đến thế này."

# monologue
# JP: いや、本当は――\n触れなくたって、わかってた。
2959 = "Không, thực ra thì--\\nDù không cần chạm vào, tôi cũng đã biết rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「……っ……み……ち……」
1825 = "「…Ư… Mi… chi…」"

# 【ハチロク】
