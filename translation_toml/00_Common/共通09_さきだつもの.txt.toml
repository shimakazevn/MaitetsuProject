3579 = "Bản danh sách đó vô cùng tinh xảo và rõ ràng, nhưng chỉ riêng mục “Ước tính chi phí” lại là một dãy khoảng trống nối dài,\\ntạo ra một áp lực không hề nhỏ."

# 【ポーレット】
# display as 波萊特
