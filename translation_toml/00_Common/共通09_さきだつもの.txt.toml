3365 = "Paulette rút một tờ giấy từ trên kệ,\\nvừa chỉ vào một điểm trên đó vừa đưa cho tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「地図か。ん？　んんっ！？」
2380 = "「Là bản đồ à. Hử? Hửử!?」"

# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんですか？　双鉄くん」
2461 = "「Có chuyện gì vậy ạ? Anh Soutetsu」"

# monologue
# JP: 渡されたのは、\n『御一夜観光イラストマップ』。
3138 = "Thứ được đưa cho tôi là,\\n『Bản đồ du lịch minh họa Ohitoyo』."

# monologue
