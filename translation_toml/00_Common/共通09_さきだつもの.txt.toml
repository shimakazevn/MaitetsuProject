1810 = "…Chắc là do mấy ngày nay, để kiểm tra tình trạng hư hỏng,\\nmình đã dành toàn bộ thời gian cho \\x%l8620;#00ffc040;8620%l;#; nên mới bị ảnh hưởng thế này."

# monologue
