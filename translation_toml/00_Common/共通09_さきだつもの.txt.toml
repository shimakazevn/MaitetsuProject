2284 = "「Haha, suối nước nóng Tororu cũng được vẽ ở đây.\\nRa là vậy――đây là “công việc” của Hibiki à.」"

# 【ポーレット】
# display as 波萊特
# JP: 「このイラストマップ、\n銀行さんが主体で作ってくれたものなんですけど」
2712 = "「Tấm bản đồ minh họa này,\\nlà do bên ngân hàng chủ trì thực hiện giúp chúng tôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2319 = "「Hừm.」"

# monologue
# JP: よく出来ている。
3128 = "Làm tốt thật."

# monologue
# JP: 観光客では無い僕も、\nイラストに描かれたポイントを、尋ねてみたくなるほどに。
3171 = "Đến cả một người không phải khách du lịch như mình,\\ncũng muốn thử ghé thăm những địa điểm được vẽ trên bản đồ."

# 【双鉄】
# display as 雙鐵
# JP: 「銀行サイド……\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派もまた、\n御一夜の復興を真摯に願っていることは確からしいな」
2770 = "「Phía ngân hàng...\\x%lAir Kura;#00ffc040;Air Kura%l;#; phe ủng hộ mời gọi nhà máy, xem ra họ cũng\\nthực lòng mong muốn Ohitoyo được phục hưng nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう、ですよね。その思いは同じ。\nどこを最優先すべきかが、わたし達とは違うだけで」
2535 = "「Vâng, đúng vậy ạ. Tấm lòng đó thì giống nhau.\\nChỉ là thứ mà chúng tôi cho là cần ưu tiên hàng đầu lại khác với họ thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 

# monologue
