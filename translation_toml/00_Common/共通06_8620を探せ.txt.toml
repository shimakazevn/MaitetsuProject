2415 = "「Hả?」"
# 【日々姫】
# display as 日日姬
# JP: 「確かに、それは」
2380 = "「Nếu được tận mắt chứng kiến sự hấp dẫn, người ta sẽ muốn tìm hiểu về nó.\nSự chuyển biến tâm lý đó có lẽ là một trong những nhu cầu căn bản của con người.」"
# monologue
# JP: 頷いて。\nそのまま日々姫は、首をことんと傾ける。
3070 = "「Quả thực, điều đó thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、それほどの魅力が――\nはちろくにい……まるけい？　でしたっけ？」
1904 = "Gật đầu.\nSau đó, Hibiki khẽ nghiêng đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\\x%l8620;#00ffc040;8620%l;#;形にその、『誰の目にもわかる魅力』\nがある可能性は、決して低くはないと思う」
2099 = "「Nhưng, sức hấp dẫn đến mức đó——\nở dòng 8620......phải không ạ?」"
# monologue
# JP: なぜなら、あの汰斗さんが、\nハチロクを連れてきたということなのだから。
3184 = "「Ừm. Khả năng dòng \\x%l8620;#00ffc040;8620%l;#; có được 『sức hấp dẫn mà ai cũng thấy rõ』\nlà không hề thấp đâu.」"
# monologue
# JP: そう伝えれば、日々姫はなんとも微妙な表情になる。\n汰斗さんに関する評価が、僕のそれとは違うらしい。
2943 = "Bởi vì, chính ông Taito đó,\nđã đưa Hachiroku đến đây."
# 【日々姫】
# display as 日日姬
# JP: 「まぁ、ここで話すより、実物見た方が早いですよね。\nどこにあるんです？　それ」
2403 = "Khi tôi nói vậy, Hibiki lộ ra một biểu cảm rất khó tả.\nCó vẻ đánh giá của em ấy về ông Taito khác với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくハチロクしか知らん。確かめねばならんのだが\n……この格好だ。店を汚すわけにもいかんだろう」
2192 = "「Chà, thay vì nói ở đây thì xem tận mắt sẽ nhanh hơn nhỉ.\nNó ở đâu vậy ạ? Cái đó ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そんで私ば呼びよったと」
2086 = "「Có lẽ chỉ có Hachiroku biết. Dù tôi cũng muốn xác nhận xem sao\n......Nhưng với bộ dạng này thì. Không thể làm bẩn cửa hàng được.」"
# monologue
# JP: ようやく、話を起点に戻せた。\nいや、起点に戻ったのではないか。
3196 = "「A! Vì vậy nên anh mới gọi em ra sao.」"
# monologue
# JP: 戻ったようで、螺旋階段1つ分――\n積み重ねることができた何かも、あるはずだ。
3146 = "Cuối cùng cũng đưa câu chuyện quay lại điểm xuất phát.\nKhông, có lẽ không phải là quay lại điểm xuất phát."
# 【日々姫】
# display as 日日姬
# JP: 「汚れもひどいですけど、粉まみれってことなら……\n確かに、兄さんがそのまま家に入るのは難しいですね」
2432 = "Tưởng như quay lại, nhưng thực chất đã tiến thêm một bậc thang xoắn ốc——\nChắc chắn đã tích lũy được điều gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「万が一にも、炭塵が焼酎にまぎれてしまえば、\n取り返しがつかんことになりかねんからな」
2407 = "「Vết bẩn thì cũng kinh khủng thật, nhưng nếu là dính đầy bụi phấn thì......\nĐúng là anh khó mà vào nhà với bộ dạng này được.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、外のお風呂で綺麗にするしかないですよね。\nまってて下さい。私、兄さんの着替え取ってきます」
2017 = "「Ngộ nhỡ bụi than lẫn vào rượu shochu,\nthì hậu quả sẽ không thể cứu vãn được đâu.」"
# monologue
# JP: パタパタ日々姫が家に飛び込み、駆け上がる。
3028 = "「Vậy thì chỉ còn cách ra nhà tắm công cộng để tắm rửa thôi nhỉ.\nAnh đợi chút nhé. Em đi lấy đồ thay cho anh.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。戻りました。\n少し遅れて、すみません」
2501 = "Hibiki lạch cạch chạy vào nhà, rồi chạy lên lầu."
# monologue
# JP: 入れ替わるようなハチロクの声。
2874 = "「Ngài Soutetsu. Tôi về rồi đây.\nXin lỗi vì đã về hơi muộn.」"
# monologue
# JP: ふりむけば、走りでもしたのか、\nハチロクの頬は上気し、肌には汗まで浮いている。
2682 = "Giọng nói của Hachiroku vang lên như thể hoán đổi vị trí."
# 【双鉄】
# display as 雙鐵
# JP: 「かまわんが、なにかあったか？」
2339 = "Quay lại nhìn, có vẻ như cô ấy vừa chạy,\nđôi má Hachiroku ửng đỏ, trên da còn lấm tấm mồ hôi."
# 【ハチロク】
# display as 八六
# JP: 「この体ですと――\n\\x%l翼端;#00ffc040;[よくたん,1]翼端%l;#;から地上に下りるのが大変で」
2235 = "「Không sao, nhưng có chuyện gì à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。それは盲点だったな、すまん」
2080 = "「Với cơ thể này thì——\nviệc leo từ \\x%l翼端;#00ffc040;đầu cánh%l;#; xuống mặt đất khá là vất vả.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ。\nわたくし自身さえ気づかずにいたことですから」
1907 = "「A, ra là vậy. Tôi đã không để ý đến điểm đó, xin lỗi nhé.」"
# monologue
# JP: ナビは上空、二度ほど回転してからクン、っと\n高度をあげて視界を外れる。
3275 = "「Không đâu.\nĐến cả bản thân tôi cũng không nhận ra mà.」"
# monologue
# JP: 僕が風呂屋に移動することを、\n予測したのか、聞いていたのか――っと、そうだ。
2957 = "Navi ở trên không trung lượn hai vòng rồi vút một cái,\ntăng độ cao và bay khuất khỏi tầm mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「これから風呂にいく。この汚れでは家にあがれん」
2244 = "Việc tôi sẽ di chuyển đến nhà tắm công cộng,\ncô ấy đã dự đoán được, hay là đã nghe thấy——à, đúng rồi."
# 【ハチロク】
# display as 八六
# JP: 「銭湯も嫌いますよ？　石炭汚れは」
2353 = "「Bây giờ tôi sẽ đi tắm. Với vết bẩn này thì không thể vào nhà được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫に心あたりがあるようだ。\nお前はどうする？　一緒に行くか？」
2286 = "「Nhà tắm công cộng cũng ghét vết bẩn than đá lắm đó?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです」
2368 = "「Có vẻ Hibiki biết chỗ nào đó.\nCô tính sao? Có đi cùng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、おまたせ！　って、ハチロク――ちゃん」
2060 = "「Tất nhiên rồi ạ.」"
# monologue
# JP: 日々姫の、少し戸惑った声。
3053 = "「Anh trai, để anh đợi lâu! Ủa, chị——Hachiroku.」"
# monologue
# JP: ハチロクは優雅に笑い、日々姫の緊張をほぐそうとする。
2753 = "Giọng nói có chút bối rối của Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「呼び捨てで結構ですよ、日々姫様。\nわたくし、双鉄様の所有物ですので」
2225 = "Hachiroku mỉm cười thanh lịch, cố gắng xoa dịu sự căng thẳng của Hibiki."
# monologue
# JP: むっと、日々姫の眉根が寄る。\nぷっと、その頬がふくれはじめる。
3057 = "「Cứ gọi tên trống không cũng được ạ, tiểu thư Hibiki.\nVì tôi là vật sở hữu của ngài Soutetsu mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「やったら、私んことも日々姫でよかよ。\n妹やもん、にぃにぃの所有物も同然やけんね」
2460 = "Hibiki cau mày lại.\nĐôi má phồng lên."
# 【ハチロク】
# display as 八六
# JP: 「はぁ」
2296 = "「Nếu vậy, chị cứ gọi em là Hibiki đi.\nLà em gái, thì cũng giống như vật sở hữu của anh hai thôi.」"
# monologue
# JP: 困ったように、ハチロクが僕を見上げてくる。
2748 = "「Hả.」"
# monologue
# JP: 日々姫を所有した記憶なぞまるで無いのだが……\nそれが日々姫の希望であれば、僕は当然、従うまでだ。
2914 = "Hachiroku ngước nhìn tôi với vẻ bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「お互いに呼び捨てあうがよかろう。\nお前たち、どうやら似たところがあるようだしな」
2475 = "Tôi hoàn toàn không có ký ức gì về việc sở hữu Hibiki cả......\nNhưng nếu đó là mong muốn của Hibiki, thì đương nhiên tôi sẽ làm theo."
# 【日々姫】
# display as 日日姬＆八六
# JP: 「どこがと！？」\n「どこがですか？」
2066 = "「Hai người cứ gọi tên nhau là được rồi.\nHai người có vẻ cũng có điểm giống nhau đấy.」"
# monologue
# JP: 声が重なる。
2746 = "「Giống ở chỗ nào!?」\n「Giống ở chỗ nào ạ?」"
# monologue
# JP: そして同時に、いささか気まずそうな顔で視線をそらし、\nそれからプっと、笑いをもらす。
2980 = "Hai giọng nói vang lên cùng lúc."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことで風呂にしよう。\n日々姫、案内を頼む」
2278 = "Và đồng thời, họ quay đi với vẻ mặt hơi ngượng ngùng,\nrồi phì cười."
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん。おまかせください！」
2144 = "「Vậy thì đi tắm thôi.\nHibiki, nhờ em dẫn đường nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2109 = "「噢」" 
# monologue
# JP: 見事なものだ。\n余裕で戦前――\\x%l大詔;#00ffc040;大詔%l;#;どころか、\\x%l明智;#00ffc040;明智%l;#;の建築かもしれん。
2676 = "「Vâng, anh trai. Cứ giao cho em!」"
# monologue
# JP: 湯に満ち満ちた場所だというのに、\nなにもかもが枯れ切っている味わいだ。
3236 = "Tuyệt thật đấy.\nChắc chắn là từ trước chiến tranh——không chừng là kiến trúc thời \\x%l大詔;#00ffc040;Taisho%l;#;, hay thậm chí là thời \\x%l明智;#00ffc040;Meiji%l;#; cũng nên."
# 【双鉄】
# display as 雙鐵
# JP: 「良いな。風情のある銭湯だ」
1905 = "Dù là một nơi tràn ngập nước nóng,\nnhưng mọi thứ lại mang một vẻ hoài cổ đậm nét."
# 【日々姫】
# display as 日日姬
# JP: 「そのうえ天然温泉たい！\n[きゅうしゅう,1]九洲に名高か温泉地、御一夜のお風呂やけんね」
2395 = "「Đẹp thật. Một nhà tắm công cộng rất có phong vị.」"
# 【ハチロク】
# display as 八六
# JP: 「わたしが現役だったころの駅舎のようです。\nいいですね、とても落ち着きます」
2172 = "「Hơn nữa còn là suối nước nóng tự nhiên đó!\nLà nhà tắm của Ohimitera, khu suối nước nóng nổi tiếng ở Kyushu mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1600 = "「…………」" 
# monologue
# JP: また赤くなって下を向く。\n日々姫が直接ほめられたわけでもないのだが――
3023 = "「Giống như nhà ga hồi tôi còn đương nhiệm vậy.\nTuyệt quá, cảm giác rất bình yên.」"
# monologue
# JP: あるいはここは、よほどお気に入りの場所なのかもしれん。
2958 = "Lại đỏ mặt và cúi gằm xuống.\nDù Hibiki không phải là người trực tiếp được khen ngợi——"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、よくこんな銭湯を知っていたな。\n僕が帝都に出ていた間に、風呂が壊れでもしたのか？」
1940 = "Có lẽ đây là nơi mà em ấy rất yêu thích."
# 【日々姫】
# display as 日日姬
# JP: 「え？　[ちご]違ぉて――ううん、あの――\nちょっと――えと、その、お仕事で……あって」
2051 = "「Nhưng mà, sao em lại biết nhà tắm công cộng này vậy.\nTrong lúc anh ở Đế đô, bồn tắm ở nhà bị hỏng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「焼酎か？　湯上がりに飲むのは危険だと思うが」
2360 = "「Hả? Không phải——không, cái đó——\nMột chút——ừm, là do công việc......」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そうじゃないんですけど――その――　\n兄さん、ハチロク、とにかく行きましょう！！」
2088 = "「Rượu shochu sao? Uống sau khi tắm xong nguy hiểm lắm đấy.」"
# monologue
# JP: ごまかすように話を打ち切り、\n日々姫は女湯ののれんをくぐる。
3034 = "「A, không phải vậy đâu——cái đó——\nAnh trai, Hachiroku, tóm lại là đi thôi!!」"
# monologue
# JP: 僕は男湯。\nわかれわかれだ。
2922 = "Kết thúc câu chuyện như để lảng tránh,\nHibiki chui qua tấm rèm của phòng tắm nữ."
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃにぃ！\nハチロクはこっちばい」
2241 = "Tôi thì vào phòng tắm nam.\nĐường ai nấy đi."
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。背中を流してくれるそうだからな」
2338 = "「Ủa, anh hai!\nHachiroku phải qua bên này chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「は？　背中って」
1924 = "「Không sao đâu. Cô ấy nói sẽ kỳ lưng cho anh mà.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしのため、双鉄様は石炭にまみれてくれました。\nその汚れを落とすのは、わたくしの当然の務めです」
2474 = "「Hả? Kỳ lưng á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。\n出るときは、なにか合図をしてく……む？」
2158 = "「Vì tôi mà ngài Soutetsu đã phải dính đầy bụi than.\nViệc rửa sạch vết bẩn đó là nhiệm vụ đương nhiên của tôi.」"
# monologue
# JP: 日々姫の頬がふくれている。\n目に涙まで滲み始める。
3042 = "「Là vậy đó.\nLúc nào ra thì nhớ ra hiệu nhé......hửm?」"
# monologue
# JP: ご不満だ。著しく。\n不満をうまく外へ出せない、その点も変わってないらしい。
2672 = "Má Hibiki phồng lên.\nNước mắt bắt đầu ứa ra."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2284 = "Rất bất mãn. Cực kỳ bất mãn.\nCái tính không giỏi bộc lộ sự bất mãn ra ngoài, có vẻ vẫn không hề thay đổi."
# monologue
# JP: しゃがみこみ、日々姫の高さに視線をあわせる。
2953 = "「Hibiki.」"
# monologue
# JP: 鼻と鼻とが触れ合う近さ――\nからバっと大きく日々姫が離れる。
2835 = "Tôi ngồi xổm xuống, điều chỉnh ánh mắt ngang tầm với Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「こ、子供扱いしたらいかんばいっ」
1883 = "Gần đến mức mũi chạm mũi——\nHibiki vội vàng lùi lại một khoảng lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\nそんなつもりはなかったのだが」
2269 = "「Đ, đừng có đối xử với em như trẻ con chứ.」"
# monologue
# JP: が、怪我の功名という奴だ。\n日々姫が素直な言葉を聞かせてくれてる。
2687 = "「A, xin lỗi.\nAnh không cố ý làm vậy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが僕の背中を流すのが、イヤか？」
1946 = "Nhưng, đúng là trong cái rủi có cái may.\nHibiki đã nói ra những lời thật lòng."
# 【日々姫】
# display as 日日姬
# JP: 「背中……っていうか。\nええと、一緒にお風呂に入るのが、なんか――」
1881 = "「Em không thích Hachiroku kỳ lưng cho anh sao?」"
# 【ハチロク】
# display as 八六
# JP: 「慎み無いこととお感じになられても仕方ありません。\n嫁入り前の娘が、殿方と一緒にですからね」
2150 = "「Kỳ lưng......hay đúng hơn là.\nỪm, việc tắm chung, có hơi——」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: こくん、と、日々姫が頷いている。\nその頷きに、優しくハチロクは言葉を乗せる。
3067 = "「Cô cảm thấy thiếu ý tứ cũng là điều dễ hiểu.\nMột cô gái chưa chồng mà lại tắm chung với đàn ông mà.」"
# 【ハチロク】
# display as 八六
# JP: 「けれどわたくしは、仕事仲間として、お疲れ様、と\n――双鉄様の石炭汚れを流してさしあげたいのです」
1938 = "「Ừm.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
# 2040 = "「呃……」" 
# 【ハチロク】
# display as 八六
# JP: 「それに、ね？　日々姫」
2393 = "Gật đầu, Hibiki đồng tình.\nTrước cái gật đầu đó, Hachiroku nhẹ nhàng tiếp lời."
# monologue
# JP: 呼び捨てた。\n日々姫がさっき求めたとおりに、ハチロクが。
2763 = "「Nhưng với tư cách là đồng nghiệp, tôi muốn nói lời cảm ơn vì sự vất vả,\n——và muốn rửa sạch vết than đá cho ngài Soutetsu.」"
# monologue
# JP: そうして小さなその口を、\n日々姫の耳元に近づける。
2979 = "「Hơn nữa, nhỉ? Hibiki.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、このちいささでしょう？　深いお風呂では、\n誰かと一緒に入らないと、立ち通しになってしまうの」
1954 = "Gọi tên trống không rồi.\nĐúng như Hibiki yêu cầu lúc nãy, Hachiroku đã làm vậy."
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
2081 = "Rồi cô ấy ghé sát cái miệng nhỏ xíu,\nvào tai Hibiki."
# monologue
# JP: ハチロクが何と言ったのか。\n日々姫はこくん、と大きくうなずく。
2679 = "「Tôi nhỏ bé thế này mà? Ở những bồn tắm sâu,\nnếu không tắm chung với ai đó, tôi sẽ phải đứng suốt mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、私、\nハチロクのお風呂いすになってあげます」
2061 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「風呂いす？」
2349 = "Hachiroku đã nói gì nhỉ.\nHibiki gật đầu thật mạnh."
# monologue
# JP: なぜそんな――\n思った途端に、答えは見つかる。
2913 = "「Anh trai, em,\nsẽ làm ghế tắm cho Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、湯船が深ければ、\nハチロクは座って風呂にも入れんわけか」
2004 = "「Ghế tắm?」"
# 【ハチロク】
# display as 八六
# JP: 「さすが。ご明察です、双鉄様」
2500 = "Tại sao lại——\nVừa nghĩ vậy, tôi đã tìm ra câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうなるとどうするか。\nまさか僕が女湯にも入れんし」
1942 = "「Ra là vậy, nếu bồn tắm sâu,\nthì Hachiroku không thể ngồi tắm được sao.」"
# 【登呂流湯主人】
# display as ？？？
# JP: 「なんね、人ん店前で長々と」
2319 = "「Quả không hổ danh. Ngài thật tinh ý, ngài Soutetsu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、すみません」
2092 = "「Nhưng, nếu vậy thì phải làm sao.\nKhông lẽ tôi lại vào phòng tắm nữ.」"
# monologue
# JP: 不意に背後から響いた声に、\nしかし日々姫は動じない。
3178 = "「Cái gì đây, đứng trước cửa tiệm người ta lâu vậy.」"
# monologue
# JP: それどころか、ほわり嬉しげな、\nほっとしたような笑みを浮かべる。
2847 = "「A, cháu xin lỗi.」"
# 【日々姫】
# display as 日日姬
# JP: 「登呂流湯のおば様、おひさしぶりです」
2371 = "Giọng nói bất ngờ vang lên từ phía sau,\nnhưng Hibiki không hề nao núng."
# 【登呂流湯主人】
# display as ？？？
# JP: 「おお、日々姫ちゃんかい。ひさしかぶりねぇ」
2445 = "Trái lại, em ấy còn nở một nụ cười vui vẻ,\nnhư thể cảm thấy nhẹ nhõm."
# 【日々姫】
# display as 日日姬
# JP: 「はい、少しバタバタしていて、\nご無沙汰してしまいました」
2308 = "「Dì chủ nhà tắm Tororyu-yu, lâu rồi không gặp dì ạ.」"
# monologue
# JP: 登呂流湯の――ということは、\nこのご老女が登呂流湯のご主人か。
3126 = "「Ồ, bé Hibiki đó hả. Lâu rồi không gặp nhỉ.」"
# monologue
# JP: 建物同様、見事なまでの年季と枯れだ。\nおば様と日々姫は呼んでるが、どこをどうみても婆様だ。
2853 = "「Vâng, dạo này cháu hơi bận rộn,\nnên không ghé thăm dì được.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なんね。さっさと入りゃあよかとに。\n一体全体、どぎゃんしたと？」
2274 = "Nhà tắm Tororyu-yu——nghĩa là,\nbà lão này là chủ nhân của nhà tắm Tororyu-yu sao."
# 【日々姫】
# display as 日日姬
# JP: 「はい。実は……少し困ってしまって」
1982 = "Giống như tòa nhà, bà ấy toát lên vẻ hoài cổ và từng trải đáng kinh ngạc.\nDù Hibiki gọi là dì, nhưng nhìn kiểu gì cũng thấy là một bà lão."
# monologue
# JP: いささか驚く。\n僕と話しているときよりずっと、大人びている。
2938 = "「Sao thế. Cứ vào nhanh đi là được mà.\nRốt cuộc là có chuyện gì vậy?」"
# monologue
# JP: 僕を兄だと紹介するそのなめらかさは、\n内気で絵ばかり描いていた、あの日々姫とは思えぬほどだ。
2705 = "「Vâng. Thực ra......bọn cháu đang hơi gặp khó khăn chút.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「はーあ、これが右田の。\n良か男ばいねぇ。中身はどうかしれんけど」
1952 = "Tôi hơi ngạc nhiên.\nEm ấy trông trưởng thành hơn hẳn so với lúc nói chuyện với tôi."
# monologue
# JP: 右田の、と呼ばれた途端、背筋が伸びる。
1564 = "Sự trôi chảy khi giới thiệu tôi là anh trai,\nkhiến tôi không thể tin được đó là Hibiki nhút nhát chỉ biết vẽ tranh ngày nào."
# monologue
# JP: そのように認識されるのならば、\nいつも以上に立居振舞いには気をつけよう。
2990 = "「Hà, đây là người nhà Migita sao.\nĐẹp trai đấy. Dù không biết bên trong thế nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お目にかかれて光栄です。\n僕は、右田双鉄ともうします」
2176 = "Vừa được gọi là người nhà Migita, tôi lập tức đứng thẳng lưng."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です。\nどうぞ、ハチロクとお呼びください」
2231 = "Nếu đã được nhận diện như vậy,\nthì tôi phải cẩn thận hơn nữa trong từng cử chỉ hành động."
# monologue
# JP: 名乗り返さず。\n登呂流湯主人はわかったわかったと手を軽く振る。
3128 = "「Rất hân hạnh được gặp bà.\nCháu tên là Migita Soutetsu.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「はぁーあ、釜屋に\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n湯ぅ汚されんのも何十年ぶりになりよっとかねぇ」
2070 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu.\nXin hãy gọi tôi là Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことは。\nお風呂に入らせていただけるのですか？」
2198 = "Không xưng tên lại.\nChủ nhà tắm Tororyu-yu chỉ phẩy tay nhẹ như muốn nói đã hiểu."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「次からは２３時にならんといれんよ。\n他の客がいるときゃ、とてもいれられんけんね」
2174 = "「Hà, thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nCũng mấy chục năm rồi nước tắm mới lại bị làm bẩn nhỉ.」"
# monologue
# JP: 入り口の看板に書いてある。\n終業時刻が……なるほど、２３時になるのか。
2745 = "「Nghĩa là.\nChúng cháu có thể vào tắm được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、今日も２３時過ぎに」
2458 = "「Lần sau thì phải đến lúc 23 giờ mới được vào đấy.\nLúc có khách khác thì không thể cho vào được đâu.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「今日はよかよ。貸し切り。\n客が来んけん、閉めようと思っとったとことや」
1926 = "Trên biển hiệu trước cửa có ghi.\nGiờ đóng cửa là......ra là vậy, là 23 giờ sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nでは、お風呂に入らせていただきたいのですが――」
2001 = "「Vậy thì, hôm nay chúng cháu cũng sẽ đến sau 23 giờ.」"
# monologue
# JP: 男湯と、女湯と。\n僕と日々姫とハチロクと。
3118 = "「Hôm nay thì được. Bao trọn gói luôn.\nKhách không đến nên ta cũng đang định đóng cửa đây.」"
# monologue
# JP: どうしたものかと少し悩めば、\n登呂流湯主人はその手を伸ばし、女湯の方を指し示す。
3078 = "「Cảm ơn bà ạ.\nVậy, chúng cháu muốn vào tắm, nhưng mà——」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「釜屋と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は女湯。\n広い男湯ば汚されよったら、たまらんけんね」
2482 = "Phòng tắm nam, và phòng tắm nữ.\nTôi, Hibiki và Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「あの……私は」
2461 = "Đang lúc phân vân không biết nên làm thế nào,\nchủ nhà tắm Tororyu-yu đưa tay ra, chỉ về phía phòng tắm nữ."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「貸しきりやけん。\n日々姫ちゃんはどっちでんよかとよ」
2477 = "「Thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#; thì vào phòng tắm nữ.\nLàm bẩn phòng tắm nam rộng lớn thì ta chịu không nổi đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですか？　それなら――」
2449 = "「Dạ......còn cháu thì sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ……いい湯だ」
2046 = "「Bao trọn gói rồi mà.\nBé Hibiki muốn vào bên nào cũng được hết.」"
# monologue
# JP: かけ湯をし、さんざんハチロクに洗ってもらい、\n自分自身でもしつこく洗い。
2934 = "「Vậy sao ạ? Nếu vậy thì——」"
# monologue
# JP: それでも黒い粉粒がぽつぽつ浮かんでしまいはするが、\n湯船に浸かれば疲れの全てが、溶けて流れていくようだ。
3179 = "「Phù......nước tắm tuyệt thật.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。おつかれですか？」
2499 = "Dội nước lên người, được Hachiroku tắm rửa cho kỹ càng,\nrồi tự mình cũng tắm đi tắm lại nhiều lần."
# monologue
# JP: ハチロクだ。
3072 = "Dù vậy vẫn còn lấm tấm vài hạt bụi đen nổi lên,\nnhưng khi ngâm mình trong bồn tắm, dường như mọi mệt mỏi đều tan biến hết.」"
# monologue
# JP: 足を伸ばした日々姫の両ももをいすにして、\n湯船にすっぽり浸かっている。
2855 = "「Ngài Soutetsu. Ngài mệt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、な。いくらかは」
2385 = "Là Hachiroku."
# monologue
# JP: 日々姫は僕と離れた隅で、湯に浸かってる。
3038 = "Lấy hai bắp đùi đang duỗi thẳng của Hibiki làm ghế,\ncô ấy đang ngâm mình ngập trong bồn tắm."
# monologue
# JP: 当然、ハチロクもその距離だ。\nいくらか声を張り上げる。
2772 = "「À, ừ. Một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、心地良い疲れでもある。\n明日の朝の筋肉痛はひどそうだがな」
1936 = "Hibiki đang ngâm mình ở một góc xa tôi."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、湯上がりには体をお揉みになると良いです。\n翌朝の疲れの抜け方がまるで違いますから」
2472 = "Tất nhiên, Hachiroku cũng ở khoảng cách đó.\nTôi hơi cao giọng lên một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。あんまの類にはまるで心得が無いのだが」
2077 = "「Nhưng mà, cũng là một sự mệt mỏi dễ chịu.\nDù có vẻ sáng mai sẽ bị đau cơ dữ dội đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「それこそ、ツボを抑えてしまえばいいだけの話です」
2019 = "「Nếu vậy, sau khi tắm xong ngài nên xoa bóp cơ thể.\nCảm giác mệt mỏi tan biến vào sáng hôm sau sẽ hoàn toàn khác biệt đấy ạ.」"
# monologue
# JP: ちゃぷりと波立つ。
3085 = "「Hừm. Nhưng tôi hoàn toàn không biết gì về mấy trò xoa bóp cả.」"
# monologue
# JP: ハチロクが湯船のふちをつたって歩き、\nこちらにゆっくり近づいてくる。
2767 = "「Chỉ cần ấn đúng huyệt là được thôi ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　おせなを」
2502 = "Nước gợn sóng nhẹ."
# monologue
# JP: おせな――背中か。\n求められるまま、背中をハチロクへと差し出す。
3182 = "Hachiroku đi men theo thành bồn tắm,\ntừ từ tiến lại gần tôi."
# 【ハチロク】
# display as 八六
# JP: 「例えば、ここを――ね？　どうです？」
2328 = "「Ngài Soutetsu? Cho tôi mượn lưng nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――おっ――これはっ」
2108 = "Lưng——sao.\nTôi chìa lưng về phía Hachiroku theo như yêu cầu."
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
2511 = "「Ví dụ như, chỗ này——nhé? Thế nào ạ?」"
# monologue
# JP: 背中の、ツボとやらを押されたのだろう。\n押される端から、体が勝手に動いてしまう。
2752 = "「Hừm——ồ——cái này.」"
# 【ハチロク】
# display as 八六
# JP: 「良さそうですね。こんなにビクビク暴れてしまって。\nうふふ、それなら――これはいかがです？」
2016 = "「!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……あっ――効く――な」
2096 = "Có lẽ cô ấy đã ấn vào huyệt đạo nào đó trên lưng.\nNgay khi bị ấn, cơ thể tôi tự động di chuyển."
# monologue
# JP: 二の腕を伸ばされ、もみほぐされる。
2940 = "「Có vẻ tốt nhỉ. Ngài cứ giật nảy lên thế này.\nƯ hừ hừ, vậy thì——thế này thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「もっと――もっと強く、頼めるか？」
2366 = "「Ư......a——hiệu quả——thật.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、双鉄様はおねだり上手な方ですね」
2045 = "Bắp tay được kéo căng ra, rồi xoa bóp."
# 【日々姫】
# display as 日日姬
# JP: 「てえええっ！！！\nにぃにぃ！　ハチロク！　なにしとるばーーーいっ！」
2095 = "「Mạnh hơn——có thể mạnh hơn chút nữa không?」"
# monologue
# JP: 広い湯船の逆の端から、日々姫が大きな声を出す。
3051 = "「Ư hừ hừ, ngài Soutetsu đúng là người giỏi vòi vĩnh nhỉ.」"
# monologue
# JP: 絵の描きすぎか、すこし近視のきらいがあり、\nしかも湯気越し――こちらの様子は見えていないのだろう。
2809 = "「Á á á!!!\nAnh hai! Hachiroku! Hai người đang làm gì vậyyyyy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大したことではない。体の揉み方を習っていただけだ」
2335 = "Từ phía bên kia của bồn tắm rộng lớn, Hibiki hét lớn."
# 【日々姫】
# display as 日日姬
# JP: 「か、からだのっ！？　\nもみっ――もみっ――かたっ！？」
2273 = "Có lẽ do vẽ tranh quá nhiều nên em ấy hơi bị cận thị,\nhơn nữa lại còn bị hơi nước che khuất——chắc hẳn không nhìn rõ tình hình bên này."
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか気持ちの良いものだぞ。\nどうだ、日々姫も習ってみては」
2036 = "「Không có gì to tát đâu. Anh chỉ đang học cách xoa bóp cơ thể thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなっ！　そんなんっ！\n私にはまだまだ早かけんっ！」
1900 = "「C, cơ thể!?\nCách——xoa——bóp!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2312 = "「Cảm giác khá là dễ chịu đấy.\nSao hả, Hibiki cũng thử học xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そーゆーもんばいっ！」
2021 = "「Chuyện đó! Chuyện đó!\nVới em thì vẫn còn quá sớm!」"
# monologue
# JP: ……腕の揉み方を教わるのに、\n早いも遅いもあるものだろうか？
1576 = "「Là vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……どうも食い違っている気がするな。\n日々姫。もう少しこちらに来ないか？」
1617 = "「Là vậy đó!」"
# 【日々姫】
# display as 日日姬
# JP: 「無理無理無理無理！　\nわたしもにぃにぃも、こぎゃん格好やけんっ！」
1898 = "......Học cách xoa bóp cánh tay,\nmà cũng có chuyện sớm hay muộn sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう。一緒の風呂に入っているのだ」
2217 = "「......Có vẻ như chúng ta đang hiểu lầm nhau thì phải.\nHibiki. Lại gần đây một chút được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「これが限界！　近ぉなったら恥ずかしゅうてわたし、\nにぃにぃを見れんよーになるばい」
2447 = "「Không được không được không được!\nCả em và anh hai, đều đang trong bộ dạng này mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2074 = "「Thì đúng là vậy rồi. Đang tắm chung mà.」"
# monologue
# JP: 義理だなんだを口にせぬよう、\n言葉を選んでゆっくり話す。
2932 = "「Đây là giới hạn rồi! Lại gần nữa em xấu hổ chết mất,\nkhông dám nhìn mặt anh hai luôn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恥ずかしいものか？　兄妹で」
1975 = "「Hừm.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 2081 = "「啊」" 
# monologue
# JP: こほんと、ひとつ咳払い。
1565 = "Để không thốt ra những lời như anh em nuôi hay gì đó,\ntôi cẩn thận lựa lời và nói chậm rãi."
# monologue
# JP: そして日々姫はゆっくりと、\nまるで言い聞かせるような口調で言葉を紡ぎだす。
2981 = "「Xấu hổ sao? Anh em với nhau mà.」"
# monologue
# JP: だから、ですよ、と。
2860 = "Em ấy hắng giọng một cái."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2311 = "Rồi Hibiki từ từ,\ncất lời với giọng điệu như đang giảng giải."
# monologue
# JP: そうか、そういうものか。
2787 = "Vì vậy, đó."
# monologue
# JP: 路子とは、風呂でもなんでも、\nふたごらしく一緒に過ごしたものだが……
2927 = "Ra là vậy, là vậy sao."
# 【双鉄】
# display as 雙鐵
# JP: 「年頃になると、恥ずかしくなるものか」
1992 = "Với Michiko, dù là tắm hay làm gì,\nchúng tôi cũng đều làm cùng nhau như những cặp sinh đôi khác......"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2510 = "「Đến tuổi trưởng thành thì sẽ thấy xấu hổ sao.」"
# monologue
# JP: しまった。\n思いをそのままぽろりと漏らしてしまった。
3153 = "「!」"
# monologue
# JP: 日々姫は聡い。\n小さく息を呑んだのは、察してしまったからだろう。
3040 = "Tiêu rồi.\nTôi lỡ buột miệng thốt ra suy nghĩ của mình mất rồi."
# 【ハチロク】
# display as 八六
# JP: 「慣れ……なのでしょうか？\nわたくしは、まったく恥ずかしくありませんけれども」
2390 = "Hibiki rất thông minh.\nEm ấy khẽ nín thở, có lẽ là vì đã nhận ra điều đó."
# monologue
# JP: 聞こえよがしなハチロクの声。
2765 = "「Là do quen......sao?\nTôi thì hoàn toàn không thấy xấu hổ chút nào.」"
# monologue
# JP: イヤな感じになりかけた空気をサっと飛ばしてくれる。\nここは素直に乗らせてもらおう。
2859 = "Giọng nói cố tình cho tôi nghe thấy của Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「よくあることなのか？\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とマスターとで風呂に入るのは」
1592 = "Xua tan đi bầu không khí sắp trở nên tồi tệ.\nTôi đành ngoan ngoãn nương theo vậy."
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは双鉄様の前、ひとりのマスターと\n長くお付き合いをしていましたが、その方とはいつも」
2300 = "「Chuyện này thường xuyên xảy ra sao?\nViệc \\x%lレイルロオド;#00ffc040;Railord%l;#; tắm chung với Master ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2075 = "「Vâng. Trước ngài Soutetsu, tôi đã gắn bó với một Master\ntrong một thời gian dài, và tôi luôn tắm cùng người đó.」"
# 【ハチロク】
# display as 八六
# JP: 「乗務のあとは、\\x%l機関区;#00ffc040;機関区%l;#;の大きなお風呂にふたりきり。\nそれはそれは、とても贅沢な時間でございました」
1983 = "「Hừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2076 = "「Sau giờ làm việc, chỉ có hai chúng tôi trong bồn tắm lớn của \\x%l機関区;#00ffc040;kho đầu máy%l;#;.\nĐó quả thực là một khoảng thời gian vô cùng xa xỉ.」"
# monologue
# JP: ハチロクが現役だったころは、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;ばかりが走っていたころなのではなかろうか。
2754 = "「Hửm?」"
# monologue
# JP: それならば\\x%l機関士;#00ffc040;機関士%l;#;も\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、\n相当な数がいそうなものだが……
73 = "Hồi Hachiroku còn đương nhiệm,\nchẳng phải là thời kỳ chỉ toàn \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; chạy sao."
# 【ハチロク】
# display as 八六
# JP: 「ですが、[きよみ,1]清美機関士と双鉄様では随分お体が違います。\n双鉄様のお胸は平らで、お喉がぽこんとされていますね」
1903 = "Nếu vậy thì chắc hẳn số lượng \\x%l機関士;#00ffc040;người lái tàu%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#;\ncũng phải khá đông đảo chứ......"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2228 = "「Nhưng mà, cơ thể của người lái tàu Kiyomi và ngài Soutetsu khác nhau rất nhiều.\nNgực ngài Soutetsu phẳng lì, còn yết hầu thì nhô ra nhỉ.」"
# monologue
# JP: これほどに明快な謎であるなら、僕にも解ける。
3237 = "Một bí ẩn rõ ràng đến mức này thì tôi cũng có thể giải được."
# 【双鉄】
# display as 雙鐵
# JP: 「女性か。[きよみ,1]清美機関士という方は」
2351 = "「Là phụ nữ sao. Người lái tàu tên Kiyomi đó.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。女性です」
2301 = "「Vâng. Là phụ nữ ạ.」"
# monologue
# JP: ちゃぷん、と水音。\n日々姫が身を乗り出したようだ。
3084 = "Tiếng nước róc rách.\nCó vẻ Hibiki đã rướn người về phía trước."
# 【日々姫】
# display as 日日姬
# JP: 「女性……\\x%l機関士;#00ffc040;機関士%l;#;さんって、機関車の\\x%l運転士;#00ffc040;運転士%l;#;さんよね。\n昔はそげな人おったと？」
2129 = "「Phụ nữ......\\x%l機関士;#00ffc040;người lái tàu%l;#;, là \\x%l運転士;#00ffc040;người lái%l;#; đầu máy xe lửa nhỉ.\nNgày xưa cũng có người như vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「[ていおう,1]帝央\\x%l機関区;#00ffc040;機関区%l;#;では、長いこと清美機関士お一人だけでした。\nもっとも、戦中には女性\\x%l機関士;#00ffc040;機関士%l;#;の方が多くなりましたが」
2112 = "「Ở \\x%l機関区;#00ffc040;kho đầu máy%l;#; Teiou, trong một thời gian dài chỉ có một mình người lái tàu Kiyomi thôi.\nMặc dù, trong thời chiến thì số lượng nữ \\x%l機関士;#00ffc040;người lái tàu%l;#; đã tăng lên rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2448 = "Thời chiến——tức là trong cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#; sao.\nHachiroku, thực sự biết về cuộc chiến tranh đó sao."
# monologue
# JP: 戦中――つまりは\\x%l大戦;#00ffc040;大戦%l;#;中か。\nハチロクは、あの戦争を実際に知っているのか。
2964 = "「Các \\x%l機関士;#00ffc040;người lái tàu%l;#; được trưng dụng trong thời chiến rất sợ người lái tàu Kiyomi.\nVì vậy nên lúc nào nhà tắm cũng chỉ có hai chúng tôi bao trọn thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「戦時徴用の\\x%l機関士;#00ffc040;機関士%l;#;さん達は清美機関士をおっかながって。\nですからずっと、お風呂はわたくし達ふたりじめでした」
2257 = "Đôi mắt nheo lại đầy hoài niệm,\nrồi Hachiroku khẽ mỉm cười hạnh phúc."
# monologue
# JP: 懐かしそうに目を細め、\nそれからふふ、と、ハチロクは幸せそうに微笑む。
2760 = "「Nghĩ lại thì,\nđây là lần đầu tiên tôi tắm chung với nam giới nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「考えてみたらわたくし、\n男性の方と一緒のお風呂は、これが初めてになりますね」
1930 = "「Vậy sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「お相手が双鉄様でよかったです」
2454 = "「Thật may khi người đó là ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄様？」
2462 = "「À ừm......ngài Soutetsu?」"
# monologue
# JP: 見上げる。\n僕を、ハチロクが。
2762 = "Ngước nhìn.\nHachiroku, ngước nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「はいはいはいはい、そこまで！　そこまでばいっ！」
2142 = "「Rồi rồi rồi rồi, dừng lại! Dừng lại ngay!」"
# monologue
# JP: 大きな声を出しながら、\nざぶざぶお湯を蹴散らして、日々姫が僕らに近づいてくる。
3019 = "Vừa lớn tiếng,\nHibiki vừa hất tung nước, tiến lại gần chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした。恥ずかしいのは消えたのか」
2187 = "「Sao vậy. Hết thấy xấu hổ rồi à.」"
# 【日々姫】
# display as 日日姬
# JP: 「ほんなん消えるわけなか！\n恥ずかしかよ！　恥ずかしかけど――」
2186 = "「Làm sao mà hết được!\nXấu hổ chứ! Xấu hổ lắm nhưng mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
2032 = "「Nhưng mà?」"
# monologue
# JP: すっと、日々姫は息を呑む。
3032 = "Hibiki khẽ nín thở."
# monologue
# JP: そして静かに、ひとつずつ、\nゆっくりゆっくり、言葉を紡ぐ。
2982 = "Rồi tĩnh lặng, từng chữ một,\ntừ từ, từ từ thốt lên."
# 【日々姫】
# display as 日日姬
# JP: 「恥ずかしがっていたら、私。\n――負けてしまいますから」
2416 = "「Nếu cứ xấu hổ mãi, thì em.\n——Sẽ thua mất.」"
# monologue
# JP: 誰に、か。何で、か。\nそれを日々姫は語らない。だから僕にはわからない。
3022 = "Thua ai. Về điều gì.\nHibiki không nói rõ. Nên tôi cũng không biết."
# monologue
# JP: けれども強い決意が満ちていることだけは、\n言葉から態度から伝わってくる。
2719 = "Nhưng chỉ riêng việc em ấy tràn đầy quyết tâm mạnh mẽ,\nthì đã được truyền đạt rõ qua lời nói và thái độ."
# 【日々姫】
# display as 日日姬
# JP: 「ですから兄さん。\n今度は私が、お背中流してさしあげます」
2262 = "「Vì vậy, anh trai.\nLần này để em kỳ lưng cho anh nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# monologue
# JP: 正直、ハチロクは小さすぎ、あまりに時間がかかりすぎ、\n背中をタオルでごしごしされても、爽快感には乏しかった。
3198 = "Thú thực, Hachiroku quá nhỏ bé, lại tốn quá nhiều thời gian,\ndù có được chà lưng bằng khăn đi nữa thì cũng chẳng thấy sảng khoái mấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、強めで頼めるか」
2468 = "「Nếu vậy, có thể mạnh tay chút được không.」"
# monologue
# JP: （ざばあっ）
3268 = "（Ào!）"
# 【日々姫】
# display as 日日姬
# JP: 「！！？」
# 2511 = "「！！？」" 
# monologue
# JP: （ざぶんっ！）
3269 = "「!!?」"
# monologue
# JP: 立った瞬間、\n日々姫が両手で顔をおおって、湯船に潜る。
2925 = "（Ùm!）"
# 【日々姫】
# display as 日日姬
# JP: 「もががっ！　もがごぶがぶごぶっ！　ごぶぶ～っ！！」
2043 = "Khoảnh khắc tôi đứng lên,\nHibiki lấy hai tay ôm mặt, rồi lặn xuống bồn tắm."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2106 = "「嗯？」" 
# monologue
# JP: 意味がわからん。
3173 = "「Moga ga! Moga gobu gabu gobu! Gobu bu~!!」"
# monologue
# JP: けれどハチロクは「ああ、そうですね」とクスクス笑う。
3167 = "Không hiểu gì luôn."
# 【ハチロク】
# display as 八六
# JP: 「多分、ですけれど日々姫は、\n双鉄様に、お体を隠してほしいのでしょう」
2127 = "Nhưng Hachiroku lại cười khúc khích và nói \"A, ra là vậy\"."
# 【日々姫】
# display as 日日姬
# JP: 「ががぼっ！」
2042 = "「Có lẽ, Hibiki muốn\nngài Soutetsu che cơ thể lại đấy ạ.」"
# monologue
# JP: ハチロクの声が聞こえているのか、\n湯船の中で目をつむったまま、日々姫が頷く。
3025 = "「Ga ga bo!」"
# monologue
# JP: そうだった。\n年頃の兄妹だから恥ずかしいのだと、聞かされていた。
2871 = "Không biết có nghe thấy giọng của Hachiroku không,\nnhưng Hibiki vẫn nhắm nghiền mắt dưới nước và gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。すっかり失念していた」
2270 = "Đúng rồi.\nTôi đã được nghe kể rằng anh em đến tuổi này thì sẽ thấy xấu hổ."
# monologue
# JP: 前を隠して立ち上がる。\n湯船を出れば、背後でざばぁと音がする。
2946 = "「Xin lỗi nhé. Anh quên béng mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「前は隠した。\n日々姫、安心して背中を頼む」
2248 = "Tôi che phần trước lại rồi đứng lên.\nKhi ra khỏi bồn tắm, có tiếng nước ào lên từ phía sau."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2104 = "「嗯」" 
# monologue
# JP: 綺麗になって家に戻って食事を終えれば、\nどっと眠気に襲われる。
3094 = "「Anh che phía trước rồi.\nHibiki, yên tâm kỳ lưng cho anh đi.」"
# monologue
# JP: が、やるべきはまだ残っている。\nまずは、布団を敷くことからだが。
2688 = "Tắm rửa sạch sẽ, về nhà và ăn xong bữa tối,\ncơn buồn ngủ ập đến."
# 【ハチロク】
# display as 八六
# JP: 「綺麗に片付きましたね、このお部屋」
2453 = "Nhưng, vẫn còn việc phải làm.\nTrước tiên là trải nệm ra đã."
# 【双鉄】
# display as 雙鐵
# JP: 「片付いたとは言わんだろう。\n荷物を全部、ただ次の間に押し込んだだけだ」
1895 = "「Căn phòng này được dọn dẹp sạch sẽ quá nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは、この部屋が片付いて、\n次の間が片付いていないというだけですよ」
2446 = "「Không thể gọi là dọn dẹp được.\nChỉ là nhét hết đồ đạc sang phòng bên cạnh thôi.」"
# monologue
# JP: 敷いた布団のシーツをちょこちょこ、\nハチロクの小さな手が整える。
2771 = "「Thế thì chỉ là phòng này đã được dọn dẹp,\ncòn phòng bên cạnh thì chưa thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ときに、ハチロク」
2153 = "Đôi tay nhỏ bé của Hachiroku\nvỗ vỗ chỉnh lại ga trải giường."
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2184 = "「Nhân tiện, Hachiroku.」"
# monologue
# JP: 日々姫も真闇姉もそれぞれの部屋。\nここには、僕とハチロクふたりきり。
3026 = "「Vâng, ngài Soutetsu.」"
# monologue
# JP: ようやく訪れたこの機会、\n逃すほど僕も間抜けではない。
2948 = "Hibiki và chị Mayami đều đã về phòng riêng.\nỞ đây chỉ còn lại tôi và Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l8620;#00ffc040;8620%l;#;だが。お前――失くしたのか？」
1587 = "Cơ hội mãi mới đến này,\ntôi không ngốc đến mức để tuột mất đâu."
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。\nふたりきりになるまで、お話を待っていただいて」
2199 = "「Về chiếc \\x%l8620;#00ffc040;8620%l;#;. Cô——đã đánh mất nó sao?」"
# monologue
# JP: ハチロクが深々下げた頭は、\nもうそれだけで僕の問いかけを肯定している。
2769 = "「Cảm ơn ngài.\nVì đã đợi đến khi chỉ còn hai chúng ta mới hỏi chuyện này.」"
# monologue
# JP: だから焦らず、\nハチロクが語る言葉を待って、じっと聞く。
2970 = "Cái cúi đầu thật sâu của Hachiroku,\nchỉ vậy thôi cũng đủ để khẳng định câu hỏi của tôi."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたち\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とその\\x%l列車;#00ffc040;列車%l;#;とは、\nいわば、血を分けたきょうだいです」
2216 = "Vì vậy tôi không vội vàng,\nmà kiên nhẫn chờ đợi và lắng nghe những lời Hachiroku sắp nói."
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2104 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「本来であれば、わたくしは\\x%l8620;#00ffc040;8620%l;#;の居場所をつかめます。\nどんなに離れていようとも、どんな状態にあろうとも」
2313 = "「Chúng tôi, những \\x%lレイルロオド;#00ffc040;Railord%l;#; và \\x%l列車;#00ffc040;đoàn tàu%l;#; của mình,\ncó thể nói là anh em ruột thịt.」"
# monologue
# JP: ……それは単なるきょうだいではなく、\nむしろ双子に近かろう。
1582 = "「Đáng lý ra, tôi có thể nắm được vị trí của \\x%l8620;#00ffc040;8620%l;#;.\nDù cách xa đến đâu, dù ở trong trạng thái nào đi chăng nữa.」"
# monologue
# JP: 僕と路子も、そうだった。\nお互い、全てを――本当に全てをわけあえた。
2929 = "......Đó không chỉ là anh em ruột thịt đơn thuần,\nmà giống như sinh đôi hơn."
# 【ハチロク】
# display as 八六
# JP: 「ですからわたくしは、目覚めてすぐに\\x%l8620;#00ffc040;8620%l;#;を求めました。\nけれど……それが――全く感じられないのです」
2251 = "Tôi và Michiko cũng vậy.\nChúng tôi đã chia sẻ mọi thứ——thực sự là mọi thứ với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば探そう」
2470 = "「Vì vậy, ngay khi thức dậy, tôi đã tìm kiếm \\x%l8620;#00ffc040;8620%l;#;.\nNhưng......tôi——hoàn toàn không cảm nhận được gì cả.」"
# 【ハチロク】
# display as 八六
# JP: 「！」
# 2510 = "「！」" 
# monologue
# JP: それしかない。\nわかりきっている。
3254 = "「Vậy thì đi tìm thôi.」"
# monologue
# JP: なのにハチロクは大きく目を開け、\n雷にでも打たれたかのような顔をする。
3107 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「離れすぎたゆえ、一時的に感じられないだけかもしれん。\n探して近くで触れ合えば、また感覚も戻るだろうさ」
2034 = "Chỉ còn cách đó thôi.\nĐiều đó là quá rõ ràng."
# 【ハチロク】
# display as 八六
# JP: 「そう……でしょうか。\nそうなら、本当に嬉しいのですが」
2293 = "Vậy mà Hachiroku lại mở to mắt,\nnhư thể vừa bị sét đánh trúng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうならなければ、なるまで色々試せばいい」
2147 = "「Có lẽ do cách nhau quá xa nên tạm thời không cảm nhận được thôi.\nTìm thấy rồi chạm vào nhau ở cự ly gần, cảm giác sẽ quay lại thôi.」"
# monologue
# JP: しかし――それでももしも戻らなければ、\nハチロクはいよいよ故障品ということになりそうだ。
2721 = "「Là vậy......sao.\nNếu được vậy thì tôi thực sự rất vui.」"
# monologue
# JP: その点がはっきりするのなら、次はハチロクを修理する。\nそうして手順を正しく積めば、物事は必ず解決できる。
2984 = "「Nếu không được thì cứ thử nhiều cách cho đến khi được thì thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに、焦るな。明けぬ夜は無い」
1987 = "Nhưng——nếu làm vậy mà vẫn không trở lại bình thường,\nthì Hachiroku sẽ thực sự trở thành đồ hỏng mất."
# monologue
# JP: 生きながら死んでいたあの時期にも、\n僕は毎日を送っていた。
2839 = "Nếu xác định rõ được điểm đó, tiếp theo sẽ là sửa chữa Hachiroku.\nChỉ cần làm đúng theo trình tự, mọi chuyện nhất định sẽ được giải quyết."
# monologue
# JP: だから、知ってる。\n生きてさえいれば、朝は来る。
2968 = "「Không có gì phải vội. Không có đêm nào là không có bình minh.」"
# 【ハチロク】
# display as 八六
# JP: 「そうですね。\nありがとうございます、双鉄様」
2419 = "Ngay cả trong cái khoảng thời gian sống không bằng chết đó,\ntôi vẫn phải trải qua từng ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「礼も焦っていうことはない。\n\\x%l8620;#00ffc040;8620%l;#;を見つけたあとでも――更に先にでも、十分だ」
1888 = "Vì vậy, tôi biết.\nChỉ cần còn sống, bình minh sẽ đến."
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2104 = "「嗯」" 
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;を無事見つけたとして、\nハチロクは、その先何を望むのだろうか？
2725 = "「Ngài nói đúng.\nCảm ơn ngài, ngài Soutetsu.」"
# monologue
# JP: 僕はどこまで、ハチロクの望みに応えられるのだろうか。\n考えようとするけれど――頭も、体も、どうにも重い。
2942 = "「Cũng không cần phải vội vàng cảm ơn đâu.\nĐợi tìm thấy \\x%l8620;#00ffc040;8620%l;#; rồi——hay xa hơn nữa cũng chưa muộn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「疲れた。寝るぞ」
2387 = "Giả sử tìm thấy \\x%l8620;#00ffc040;8620%l;#; an toàn,\nthì sau đó Hachiroku sẽ mong muốn điều gì?"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2146 = "Tôi có thể đáp ứng mong muốn của Hachiroku đến mức nào đây.\nTôi cố suy nghĩ——nhưng cả đầu óc lẫn cơ thể đều nặng trĩu."
# monologue
# JP: 布団にもぐれば、離れたすみに、\nハチロクはちょこんと、ひどく遠慮がちにもぐりこむ。
2955 = "「Mệt rồi. Ngủ thôi.」"
# monologue
# JP: ああ、いや、そうか。そういえば――\nハチロクは乙女と、自らのことを言っていた、か。
2828 = "Khi tôi chui vào chăn, ở một góc xa,\nHachiroku cũng chui vào một cách đầy e dè."
# 【双鉄】
# display as 雙鐵
# JP: 「もしも、ここで眠るのが嫌なら」
2410 = "A, không, ra là vậy. Nhắc mới nhớ——\nHachiroku từng tự nhận mình là một thiếu nữ nhỉ."
# monologue
# JP: 言えば途端にハチロクは、\n体を起こし、静かに首を横に振る。
2923 = "「Nếu như cô không thích ngủ ở đây.」"
# 【ハチロク】
# display as 八六
# JP: 「イヤなことなどありません。双鉄様のお近くが――\nこの距離がわたくしには良いのです」
2336 = "Vừa nói xong, Hachiroku liền\nngồi dậy và nhẹ nhàng lắc đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「はい、おやすみなさいませ、双鉄様」
2303 = "「Không có chuyện không thích đâu ạ. Được ở gần ngài Soutetsu——\nKhoảng cách này là rất tốt với tôi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。お休み、ハチロク」
2103 = "「Vâng, chúc ngài ngủ ngon, ngài Soutetsu.」"
# monologue
# JP: これ以上何もいうことはない。
2901 = "「Ừm. Ngủ ngon, Hachiroku.」"
# monologue
# JP: 目を閉じ眠りに――\n引き込まれれば、それでいい。
3243 = "Không còn gì để nói thêm nữa."
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3265 = "Nhắm mắt lại và chìm vào giấc ngủ——\nNhư vậy là đủ rồi."
# monologue
# JP: ……ああ、この音か。\n\\x%l列車;#00ffc040;列車%l;#;の音か。
1573 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# monologue
# JP: 目を開け、\n自分が夢の中にいると知る。
2888 = "......A, là âm thanh này sao.\nÂm thanh của \\x%l列車;#00ffc040;đoàn tàu%l;#; sao."
# 【双鉄】
# display as 雙鐵
# JP: 「まだこの\\x%l列車;#00ffc040;列車%l;#;に乗っているのか」
1957 = "Mở mắt ra,\nvà nhận ra mình đang ở trong mơ."
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 妹、路子がそこにいるから。
2832 = "「Mình vẫn còn ở trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này sao.」"
# monologue
# JP: 事故のときと少しも変わらぬ小さな姿で。\nけれども全く、笑うことなく。
2851 = "Bởi vì em gái tôi, Michiko đang ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか、たどり着けんものだな」
1923 = "Với dáng vẻ nhỏ bé không hề thay đổi so với lúc xảy ra tai nạn.\nNhưng lại hoàn toàn không có nụ cười."
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 路子から、ふたごの僕は、今はもう何も感じられない。
2893 = "「Mãi mà vẫn chưa đến nơi nhỉ.」"
# monologue
# JP: 死の瞬間に、僕まで引きずり込まないように――\n路子が、僕を断ち切ったから。
2837 = "Từ Michiko, người anh sinh đôi là tôi đây, giờ đã không còn cảm nhận được gì nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「この\\x%l列車;#00ffc040;列車%l;#;は……どこへ向かっているのかな」
2451 = "Để không kéo tôi theo vào khoảnh khắc cái chết cận kề——\nMichiko đã cắt đứt liên kết với tôi."
# 【路子】
# display as 路子
# JP: 「知らない」
1890 = "「Chuyến \\x%l列車;#00ffc040;tàu%l;#; này......đang đi về đâu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2207 = "「Không biết.」"
# monologue
# JP: 本当は知っているはずだった。
2780 = "「Anh cũng vậy.」"
# monologue
# JP: この\\x%l列車;#00ffc040;列車%l;#;にのり、最後になってしまった旅を――\n路子と父さんと母さんと、そうして僕は、したのだから。
2694 = "Đáng lẽ ra tôi phải biết chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「思い出せなくなるものだな。\nいろいろと、きっと――大事なことも」
2226 = "Lên chuyến \\x%l列車;#00ffc040;tàu%l;#; này, chuyến đi cuối cùng——\nTôi đã đi cùng Michiko, bố và mẹ mà."
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 車窓の景色は変わらない。\n流れてもすぐ、同じ景色が訪れる。
3225 = "「Nhiều thứ không thể nhớ lại được nữa nhỉ.\nRất nhiều thứ, chắc chắn là——cả những điều quan trọng.」"
# monologue
# JP: 黄昏色で、単調で――\nひどく、寂しい光景だ。
2829 = "Cảnh vật ngoài cửa sổ không hề thay đổi.\nDù có trôi qua, cảnh vật y hệt lại xuất hiện ngay lập tức."
# 【路子】
# display as 路子
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1591 = "Một màu hoàng hôn, đơn điệu——\nMột khung cảnh vô cùng cô đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。奇妙なものだがな」
2090 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# monologue
# JP: 伝わっているのか、いないのか。\n路子はそれを教えてくれない。
2683 = "「A, ừm. Là một thứ kỳ lạ nhỉ.」"
# monologue
# JP: わからないことが、とても不安だ。
2704 = "Có truyền đạt được hay không.\nMichiko không nói cho tôi biết."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、僕は汰斗さんに教わったんだ。\n助けられなかった分、助けろと」
2334 = "Không biết được điều đó, khiến tôi vô cùng bất an."
# monologue
# JP: 後悔に凍り腐っていくより、\nそうする方がずっとマシだと。
2709 = "「Nhưng, anh đã được ông Taito dạy.\nRằng hãy giúp đỡ người khác để bù đắp cho những gì mình không thể cứu vãn.」"
# monologue
# JP: 誰かを助けた分きっと、\n自分が救われることもあろうと。
3238 = "Thay vì chết dần chết mòn trong sự hối hận,\nthì làm như vậy vẫn tốt hơn nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らはふたごだ。僕が誰かを助ければ、\n路子が救われるかもしれないって。そう思うからさ」
2220 = "Chắc chắn khi giúp đỡ ai đó,\nbản thân mình cũng sẽ được cứu rỗi."
# 【路子】
# display as 路子
# JP: 「だれかを助ける」
2260 = "「Chúng ta là sinh đôi mà. Nếu anh giúp đỡ ai đó,\nthì có thể Michiko cũng sẽ được cứu rỗi. Anh nghĩ vậy đấy.」"
# monologue
# JP: 父さんと母さんは乗ってない。\n路子はひとり、ずっと\\x%l列車;#00ffc040;列車%l;#;に乗り続けている。
3112 = "「Giúp đỡ ai đó.」"
# monologue
# JP: だったら僕は路子を必ず、\n父さんと母さんの安らぐ場所へ、送ってあげたい。
2972 = "Bố và mẹ không có trên tàu.\nMichiko vẫn đang một mình đi trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này."
# 【路子】
# display as 路子
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも？」
1997 = "Nếu vậy, anh nhất định sẽ đưa Michiko,\nđến nơi bình yên có bố và mẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、義理の家族でも。\n見知らぬ他の誰であろうと、おんなじさ」
1891 = "「Cả \\x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# monologue
# JP: 縁があり、この手がとどく範囲のことなら、\n僕は力を惜しまない。
2806 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#;, hay gia đình nuôi.\nHay bất cứ người xa lạ nào khác, đều giống nhau cả thôi.」"
# monologue
# JP: 惜しんだところで、\n他にやりたい事も何一つない。
2876 = "Chỉ cần có duyên, và nằm trong khả năng của đôi tay này,\ntôi sẽ không tiếc sức mình."
# 【双鉄】
# display as 雙鐵
# JP: 「何が正解かはわからない。どれが繋がるかもわからない。\nだったら全部を、正解と信じてやるしかないんだ」
2206 = "Dù có tiếc,\nthì tôi cũng chẳng còn việc gì khác muốn làm cả."
# monologue
# JP: 諦めたら僕は路子を殺す。\n事故ではなく、僕の意思により殺してしまう。
2668 = "「Anh không biết đâu là câu trả lời đúng. Cũng không biết điều gì sẽ kết nối với nhau.\nVậy thì chỉ còn cách tin rằng tất cả đều là câu trả lời đúng và cứ thế làm thôi.」"
# monologue
# JP: そうしないため、僕は生きる。\n生きて必ず、路子を安らかな場所へ届ける。
3105 = "Nếu từ bỏ, anh sẽ giết chết Michiko.\nKhông phải do tai nạn, mà là do chính ý chí của anh giết chết em."
# 【路子】
# display as 路子
# JP: 「そーちゃん」
2156 = "Để không làm vậy, anh sẽ sống.\nSống để nhất định đưa Michiko đến một nơi bình yên."
# 【双鉄】
# display as 雙鐵
# JP: 「うん、路子」
2105 = "「Sou-chan.」"
# monologue
# JP: 路子が、僕の名前を呼ぶ。\n路子が、僕に手を伸ばす。
2849 = "「Ừm, Michiko.」"
# monologue
# JP: けれどその手は、届かない。\n僕は――目覚めてしまうから。
2722 = "Michiko gọi tên tôi.\nMichiko đưa tay về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「早く――終着駅につけるといいな」
2168 = "Nhưng bàn tay ấy, không thể chạm tới.\nBởi vì tôi——sẽ tỉnh giấc mất."
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 声だけ、聞こえる。
3169 = "「Giá mà——nhanh chóng đến được ga cuối nhỉ.」"
# monologue
# JP: けれどもう、何も見えない。\nそうして――声も聞こえなくなる。
2716 = "Chỉ nghe thấy giọng nói."
