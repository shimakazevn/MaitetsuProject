2477 = "「Cậu chủ Kamaya và \\x%lレイルロオド;#00ffc040;Railord%l;#; thì qua bồn nữ đi.\\nĐể cái bồn tắm nam rộng rãi kia bị bôi bẩn thì tôi chịu không thấu đâu」"

