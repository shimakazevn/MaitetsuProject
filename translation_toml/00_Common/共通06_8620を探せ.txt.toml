2165 = "「Nghe nói thị trưởng nói về đường sắt rất hay.\nNhưng, mỗi khi đang nói hăng say thì lại bị la ó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うろたえるか」
2358 = "「Nên bị bối rối sao.」"
# 【日々姫】
# display as 日日姬
