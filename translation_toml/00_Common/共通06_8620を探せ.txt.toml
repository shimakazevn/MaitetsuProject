2021 = "「Chuyện đó! Chuyện đó!\\nVới em thì vẫn còn quá sớm mà!」"

# 【双鉄】
# JP: 「そういうものか？」
1576 = "「Là vậy sao?」"

# 【日々姫】
# JP: 「そーゆーもんばいっ！」
1617 = "「Chính là vậy đó!」"

# (独白)
