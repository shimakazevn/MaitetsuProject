3044 = "Hibiki ngơ ngác nghiêng đầu."
# monologue
# JP: “そのこと”を僕に気づかせてくれたのは、\n当の日々姫であるというのに。
3207 = "Dù người giúp tôi nhận ra “điều đó”,\nlại chính là Hibiki."
# 【双鉄】
# display as 雙鐵
