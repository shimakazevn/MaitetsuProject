[script]
# lines: 466 
# monologue
# JP: ……ようやく、帰宅だ。
1577 = "……Cuối cùng, cũng về đến nhà."
# monologue
# JP: 普段であれば、「ただいま」と一言いって、\nそのままあがっていけるのだが――
2985 = "Bình thường thì chỉ cần nói một câu 'Con về rồi',\nlà có thể cứ thế đi thẳng vào nhà, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「今戻った！　すまんが、誰かいないか？」
2222 = "「Anh về rồi đây! Xin lỗi, có ai ở nhà không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あら、兄さん。お帰りなさいませ」
2064 = "「A, anh trai. Mừng anh đã về.」"
# monologue
# JP: 日々姫が二階にいたようだ。
3031 = "Có vẻ Hibiki đang ở trên tầng hai."
# monologue
# JP: 取り澄ました声。\nとととと軽やかな駆け下り音。
2674 = "Một giọng nói điệu đà.\nCùng với tiếng bước chân lạch cạch chạy xuống cầu thang nhẹ nhàng."
# 【日々姫】
# display as 日日姬
# JP: 「どうしたんですか？　玄関先で――って、え！？\n何があったと？　にぃにぃ、真っ黒ばい」
2185 = "「Có chuyện gì vậy? Sao lại đứng ở cửa——ơ, hả!?\nCó chuyện gì thế? Anh hai, người anh đen thui luôn kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはりか。そんなにひどいか」
2322 = "「Quả nhiên là vậy. Tệ đến mức đó sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「待っとって！　今、拭くもん」
2384 = "「Đợi em chút! Em lau cho anh ngay đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。この汚れは石炭だ。\n拭いたところでタオルをダメにするだけだろうさ」
1885 = "「Không sao đâu. Vết bẩn này là than đá đấy.\nLau thì chỉ tổ làm hỏng khăn thôi.」"
# monologue
# JP: 百杯の後、四百杯。つまりは合計500キロ。\n一升瓶で数えるのなら、277本と少し。
2669 = "Sau 100 xẻng, là 400 xẻng nữa. Tức là tổng cộng 500kg.\nNếu đong bằng chai một thăng (1.8 lít), thì khoảng hơn 277 chai."
# monologue
# JP: そう考えれば大した数とも思えないのだが、\n姿勢のとり方が良くないらしく、腰の負担が些かキツい。
3235 = "Nghĩ vậy thì con số đó cũng không lớn lắm,\nnhưng có vẻ do tư thế của tôi không đúng, nên lưng hơi bị quá sức."
# 【双鉄】
# display as 雙鐵
# JP: 「顔にも随分と粉を浴びた気がしたが真っ黒とはな。\nナビが僕を乗せてくれなかったのはそういう理由か」
2402 = "「Anh cũng cảm thấy mặt mình dính khá nhiều bụi, nhưng không ngờ lại đen thui thế này.\nThảo nào Navi không cho anh lên xe.」"
# monologue
# JP: 言えばむうっと、日々姫の眉根が寄せられる。
3174 = "Nghe tôi nói vậy, Hibiki nhíu mày vẻ bất mãn."
# 【日々姫】
# display as 日日姬
# JP: 「あんの――んんっ、結構わがままですよねあの\x%lエアクラ;#00ffc040;エアクラ%l;#;。\n兄さんの命を守るだなんて偉そうに言ってるくせに」
2463 = "「Cái con——ưm, chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; đó cũng ích kỷ phết nhỉ.\nRõ ràng mạnh miệng bảo vệ mạng sống của anh cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。ナビの言動に矛盾はないよ」
1909 = "「Không đâu. Lời nói và hành động của Navi không hề mâu thuẫn.」"
# monologue
# JP: 頭上を指さす。\n日々姫の眉根のシワがいっそう深くなる。
2936 = "Tôi chỉ tay lên trên đầu.\nNếp nhăn trên trán Hibiki càng hằn sâu hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は[たんじん,1]炭塵にまみれすぎ、精密機器であるナビに\n悪影響を与えてしまう可能性があるそうだ」
2246 = "「Anh bị dính quá nhiều bụi than, có thể sẽ gây ảnh hưởng xấu\nđến một thiết bị tinh vi như Navi.」"
# monologue
# JP: “シートを汚されるのがイヤという理由ではありません。\n決して”
3240 = "\"Không phải vì tôi sợ làm bẩn ghế đâu.\nTuyệt đối không phải.\""
# monologue
# JP: ナビはそう言い、僕を乗せないその代わり、\n上空からずっとフォローしてきた。
3247 = "Navi đã nói vậy, và thay vì chở tôi,\ncô ấy đã luôn theo sát tôi từ trên cao."
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
2082 = "「A!」"
# monologue
# JP: 僕の視線を追った日々姫がナビを見つける。\nナビは小さく旋回し、酒造上空から飛び去っていく。
3066 = "Nhìn theo hướng mắt của tôi, Hibiki cũng phát hiện ra Navi.\nNavi lượn một vòng nhỏ, rồi bay vút đi khỏi bầu trời xưởng rượu."
# 【日々姫】
# display as 日日姬
# JP: 「……逃げましたね」
1607 = "「……Trốn mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「逃げんさ。僕が帰宅し安全になったと見ただけだ。\n着水して、ハチロクを下ろしてくるのだろうよ」
1879 = "「Không trốn đâu. Chỉ là thấy anh đã về nhà an toàn thôi.\nChắc giờ cô ấy đang hạ cánh trên mặt nước để đưa Hachiroku xuống đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク……さん。\nあの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗っているのですか？」
1979 = "「Chị……Hachiroku.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đó, đang đi \\x%lエアクラ;#00ffc040;Aircra%l;#; sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。汚れづらい表面処理がされているとかなんとかだ。\nが――技術だろうな。僕との汚れ具合の違いは」
2097 = "「Ừ. Nghe bảo bề mặt của em ấy được xử lý chống bám bẩn hay gì đó.\nNhưng mà——chắc là do kỹ thuật thôi. Sự khác biệt về độ bẩn giữa anh và em ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「技術？　なんの技術ですか？」
2265 = "「Kỹ thuật? Kỹ thuật gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;だ。石炭を\x%l火室;#00ffc040;[かしつ,1]火室%l;#;に投げ込む技術だ」
1596 = "「\\x%l投炭;#00ffc040;Xúc than%l;#;. Kỹ thuật ném than vào \\x%l火室;#00ffc040;buồng lửa%l;#; ấy.」"
# monologue
# JP: 手振りを交え、\x%l投炭;#00ffc040;投炭%l;#;について説明していく。
2951 = "Tôi vừa dùng cử chỉ tay, vừa giải thích về việc \\x%l投炭;#00ffc040;xúc than%l;#;."
# monologue
# JP: うんうん頷く日々姫の顔が、\n緩く炙られた石炭のように、じわじわと赤みを増していく。
3021 = "Khuôn mặt Hibiki liên tục gật gù,\ndần dần ửng đỏ lên như một hòn than đang được nung nóng."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃを\x%l機関士;#00ffc040;機関士%l;#;に！？　そんなん！\n家におってくれる時間が減って――じゃなくて！」
2422 = "「Bắt anh hai làm \\x%l機関士;#00ffc040;người lái tàu%l;#; á!? Sao có thể!\nThời gian anh ở nhà sẽ ít đi mất——à không phải!」"
# monologue
# JP: 慌てて口をつぐんできょろきょろ。\nそれからぽんっと手をたたき、日々姫は偉そうな顔をする。
3062 = "Em ấy vội vã ngậm miệng lại và ngó nghiêng xung quanh.\nSau đó vỗ tay bộp một cái, Hibiki làm ra vẻ mặt tự mãn."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対のために帰ってきたのに、\nそのための活動時間が減ってしまうじゃないですか」
2058 = "「Anh về đây là để phản đối việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ mà,\nnhư vậy thì thời gian dành cho hoạt động đó sẽ bị giảm đi mất còn gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誘致賛成派ではなかったのか？　日々姫は」
1947 = "「Không phải em thuộc phe tán thành thu hút nhà máy sao? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「それはそれ、これはこれです」
2450 = "「Chuyện nào ra chuyện đó chứ.」"
# monologue
# JP: それ、で両手をそろえて右に。\nこれ、で両手をそろえて左に。
2857 = "Nói 'Chuyện nào', em ấy chắp hai tay đưa sang phải.\nNói 'ra chuyện đó', em ấy chắp hai tay đưa sang trái."
# monologue
# JP: こんな細かなところでも、日々姫は真面目で懸命だ。
2878 = "Ngay cả trong những cử chỉ nhỏ nhặt như vậy, Hibiki vẫn luôn nghiêm túc và hết mình."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんの優しさにつけこんで、\n兄さんの時間を奪うだなんて、少し良くないと思います」
1989 = "「Lợi dụng sự tốt bụng của anh,\nđể cướp đi thời gian của anh, em thấy như vậy là không được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに僕も、\n無関係なことに時間を奪われてはかなわん」
2240 = "「Quả thực tôi cũng,\nkhông muốn bị lãng phí thời gian vào những việc không liên quan.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですよね！」
2154 = "「Đúng thế nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、\x%l機関士;#00ffc040;機関士%l;#;云々も実は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対運動に繋げられるかもしれんのだ」
2027 = "「Nhưng mà, chuyện \\x%l機関士;#00ffc040;người lái tàu%l;#; này nọ thực ra,\ncũng có thể liên quan đến phong trào phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　それってどういう意味ですか？」
2055 = "「Hả? Ý anh là sao ạ?」"
# monologue
# JP: たとえ賛成・反対両派にわかれていても、\n日々姫は僕の[いもうと,1]義妹だ。
2740 = "Cho dù chúng tôi có thuộc hai phe tán thành và phản đối đi chăng nữa,\nnhưng Hibiki vẫn là em gái nuôi của tôi."
# monologue
# JP: 隠し立てする事もなく、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;による観光振興云々の案を、まるまる伝える。
2908 = "Không có gì phải giấu giếm,\ntôi đem toàn bộ kế hoạch thúc đẩy du lịch bằng \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; kể lại cho em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「まだぼんやりとした案でしかないがな。\n観光振興は、環境保全意識の高まりへも繋がるだろう」
2364 = "「Dù vẫn chỉ là một kế hoạch mơ hồ thôi.\nNhưng việc thúc đẩy du lịch cũng sẽ góp phần nâng cao ý thức bảo vệ môi trường.」"
# 【日々姫】
# display as 日日姬
# JP: 「……確かに、観光と誘致反対とは繋がりそうですね。\nもし、観光振興をうまくできれば――ですけど」
1610 = "「……Đúng là du lịch và phản đối thu hút nhà máy có vẻ liên quan đến nhau nhỉ.\nNếu như việc thúc đẩy du lịch diễn ra suôn sẻ——thì là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さてそこだ」
2093 = "「Vấn đề chính là ở đó.」"
# monologue
# JP: この案には大きな不安要素がある。\n思考でか、直感でか、日々姫はそれに気付いているようだ。
3233 = "Kế hoạch này có một yếu tố bất ổn lớn.\nKhông biết là do suy nghĩ hay trực giác, nhưng có vẻ Hibiki đã nhận ra điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクの[ハチロクニイマル,3]8620形は、\n観光客誘致の大きな目玉になるという話らしいが」
2396 = "「Nghe nói đầu máy loại 8620 của Hachiroku,\nsẽ là điểm nhấn lớn để thu hút khách du lịch.」"
# 【日々姫】
# display as 日日姬
# JP: 「はちろくにいまるけい……ですか？\nそれは、そんなに魅力的な機関車なんですか？」
2513 = "「Loại 8620……sao ạ?\nĐó là một đầu máy xe lửa hấp dẫn đến thế cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからん」
1882 = "「Tôi không biết.」"
# 【日々姫】
# display as 日日姬
# JP: 「わからんて！　んんっ、\n本当に、まだふわふわしたお話なんですね」
1950 = "「Không biết á! Ưm,\nquả thật, vẫn chỉ là một câu chuyện viển vông nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も実物を見ていないからな。\n大変に美しいとポーレットは言っていたが」
2209 = "「Vì tôi cũng chưa nhìn thấy thực tế mà.\nMặc dù Paulette đã nói là nó rất đẹp.」"
# monologue
# JP: 言えば途端、\n日々姫は小さく息を飲み込む。
2924 = "Ngay khi tôi vừa dứt lời,\nHibiki khẽ nuốt nước bọt."
# 【日々姫】
# display as 日日姬
# JP: 「……ポーレットって、市長さん？」
1612 = "「……Paulette, là ngài thị trưởng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2295 = "「Ừ.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さん、\nいつの間に市長とお知り合いに？」
2494 = "「Anh hai——Anh trai,\nanh quen biết thị trưởng từ lúc nào vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前からの知り合いのような気もしたのだが――\n実際のところは、つい先程が初対面らしい」
2498 = "「Anh cũng có cảm giác như đã quen biết từ trước——\nNhưng thực tế thì, có vẻ như vừa nãy mới là lần đầu gặp mặt.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　えっ……ええっと――」
2053 = "「Hả? Ơ……ờm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは市長であるだけでなく、\n御一夜鉄道の社長でもあり、\x%l運転士;#00ffc040;運転士%l;#;まで兼任している」
2347 = "「Paulette không chỉ là thị trưởng,\nmà còn là giám đốc của Đường sắt Ohimitera, kiêm luôn cả chức \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#;.」"
# monologue
# JP: すぐさま日々姫はこくりと頷く。
3059 = "Hibiki lập tức gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「はい、それは知ってます。\n私だって[ゆのい,1]湯医の学園に通ってますから」
2306 = "「Vâng, chuyện đó thì em biết.\nEm cũng đang theo học ở học viện Yunoi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな」
# 2295 = "「是啊」" 
# monologue
# JP: 湯医は、御一夜鉄道湯医線の終着駅だ。\n学園の他には、温泉医療施設がある。
3102 = "Yunoi là ga cuối của tuyến Yunoi thuộc Đường sắt Ohimitera.\nNgoài học viện ra, ở đó còn có cơ sở y tế suối nước nóng."
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;可動不能区域である旧術仙炭鉱近辺を抜け、\n御一夜-湯医の往復客を、主に湯医線は運んでいるらしい。
3103 = "Tuyến Yunoi đi qua khu vực mỏ than cũ Jutsusen, nơi \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động,\nvà chủ yếu vận chuyển hành khách qua lại giữa Ohimitera và Yunoi."
# 【双鉄】
# display as 雙鐵
# JP: 「知り合いになったきっかけは、\n僕の\x%lエアクラ;#00ffc040;エアクラ%l;#;の不時着だ」
2218 = "「Cơ duyên chúng tôi quen biết nhau,\nlà do chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; của tôi phải hạ cánh khẩn cấp.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！\nそれで市長さんとれいなちゃんに助けられたと？」
2084 = "「A!\nVậy là anh được ngài thị trưởng và bé Reina giúp đỡ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなるな」
2023 = "「Đúng là vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふんふん」
2069 = "「Hừm hừm.」"
# monologue
# JP: 納得しました。\nそんな風情で日々姫は深くうなずく。
3046 = "Ra là vậy.\nVới vẻ mặt đã hiểu, Hibiki gật đầu thật sâu."
# 【日々姫】
# display as 日日姬
# JP: 「それで、市長さんが主張したんですね？　その……\nはちろくにいまる形？　が、すごくいいものだって」
2297 = "「Vậy ra, ngài thị trưởng đã khẳng định sao? Rằng cái……\nloại 8620 đó? Là một thứ vô cùng tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その通りだ」
2337 = "「Đúng vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……いつもですよ？　それ」
1606 = "「……Lúc nào cũng vậy nhỉ? Chuyện đó.」"
# monologue
# JP: ため息、苦笑。
2830 = "Thở dài, cười khổ."
# monologue
# JP: 日々姫のあきれたような声には、\nけれどいくらかの、優しい響きが混じっている。
3052 = "Trong giọng điệu như thể cạn lời của Hibiki,\nnhưng lại pha lẫn chút gì đó dịu dàng."
# 【日々姫】
# display as 日日姬
# JP: 「どこからどう見てもガラクタのボロ\x%l列車;#00ffc040;列車%l;#;でも、\n“素晴らしい歴史的価値”って、市議会とかで」
2137 = "「Dù nhìn từ góc độ nào thì cũng chỉ là một đoàn \\x%l列車;#00ffc040;tàu%l;#; rách nát như đống sắt vụn,\nnhưng ở hội đồng thành phố lại bảo là \"có giá trị lịch sử tuyệt vời\"」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2109 = "「Ừ」"
# monologue
# JP: わかる気がする。
2930 = "Tôi cảm thấy mình có thể hiểu được."
# monologue
# JP: ポーレットのあの鉄道愛に、僕は直に触れているから。
2917 = "Bởi vì tôi đã trực tiếp cảm nhận được tình yêu đường sắt đó của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、ポーレットには真実なんだろうな。\n真実すぎて、説明の必要があるとわからんのだ」
2125 = "「Điều đó đối với Paulette có lẽ là sự thật.\nMột sự thật quá đỗi hiển nhiên đến mức cô ấy không nhận ra cần phải giải thích.」"
# 【日々姫】
# display as 日日姬
# JP: 「どういうこと？」
1922 = "「Ý anh là sao?」"
# monologue
# JP: きょとんと、日々姫が首を傾げる。
3044 = "Hibiki ngơ ngác nghiêng đầu."
# monologue
# JP: “そのこと”を僕に気づかせてくれたのは、\n当の日々姫であるというのに。
3207 = "Dù rằng người đã khiến tôi nhận ra \"điều đó\",\nlại chính là Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「“赤は赤い”ということを、\n日々姫は説明する必要を感じるか？」
2287 = "「Hibiki có cảm thấy cần phải giải thích rằng\n\"màu đỏ là màu đỏ\" không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2079 = "「A——」"
# monologue
# JP: 日々姫の頬がぽっと赤くなる。
3055 = "Đôi má Hibiki ửng đỏ."
# monologue
# JP: 日々姫も覚えていたらしい。\n赤は赤いと、僕に教えてくれたあの日を――
2845 = "Có vẻ Hibiki cũng nhớ ra.\nCái ngày em ấy đã dạy cho tôi biết rằng màu đỏ là màu đỏ——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、にぃにー！」
2495 = "「Anh hai, anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、日々姫」
2183 = "「Sao vậy, Hibiki?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　赤って赤かとねー！」
2496 = "「Anh hai! Màu đỏ là màu đỏ đó nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
2106 = "「Hửm?」"
# monologue
# JP: 赤は赤い。
3154 = "Màu đỏ là màu đỏ."
# monologue
# JP: そんなことは至極当然だ。\nなんと返事をすればいいのか、いささか迷う。
3234 = "Chuyện đó là quá đỗi hiển nhiên.\nNên tôi có hơi bối rối không biết phải trả lời thế nào."
# 【日々姫】
# display as 日日姬
# JP: 「お山、葉っぱが真っ赤やったと、\n絵ぇ描いとったら、おひさん、もっと赤かけんっ！」
2160 = "「Ngọn núi, lá cây đỏ rực,\nnhưng khi em vẽ tranh, ông mặt trời còn đỏ hơn nữa cơ!」"
# monologue
# JP: （ばっ！）
3267 = "（Xoè!）"
# monologue
# JP: 日々姫が両手をぱっと広げる。\n一枚の画用紙がつられ、広がる。
3065 = "Hibiki dang rộng hai tay.\nKéo theo một tờ giấy vẽ mở ra."
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2109 = "「噢」" 
# monologue
# JP: 赤い。赤だ。
3122 = "Đỏ. Là màu đỏ."
# monologue
# JP: なるほど――僕は見逃していた。\n赤は……これほどに赤いのだ――――
2786 = "Ra là vậy——Tôi đã bỏ lỡ mất.\nMàu đỏ…… lại đỏ đến mức này sao――――"
# 【双鉄】
# display as 雙鐵
# JP: 「赤は赤だ。それはあまりに真実すぎて、\n言葉ではうまく説明できん。その必要も感じない」
2386 = "「Màu đỏ là màu đỏ. Điều đó quá đỗi chân thực,\nđến mức không thể giải thích rõ ràng bằng lời. Và cũng không cảm thấy cần thiết phải làm thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
2304 = "「Vâng」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、日々姫の目は僕が見逃していた赤を見ていた。\n日々姫の絵で――赤は赤いと、僕は本当に理解できた」
2030 = "「Nhưng đôi mắt của Hibiki đã nhìn thấy màu đỏ mà tôi bỏ lỡ.\nQua bức tranh của Hibiki——tôi đã thực sự hiểu được rằng màu đỏ là màu đỏ.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1600 = "「…………」"
# monologue
# JP: 赤い頬をして黙ってしまう。
3060 = "Em ấy im lặng với đôi má ửng đỏ."
# monologue
# JP: 日々姫は変わらず、褒められる――いや、\n自分が正当な評価を受ける、そのことさえも苦手らしい。
2863 = "Hibiki vẫn không thay đổi, việc được khen ngợi——không,\nngay cả việc bản thân nhận được đánh giá xứng đáng, em ấy cũng có vẻ không quen."
# 【双鉄】
# display as 雙鐵
# JP: 「間違いなくポーレットの目も、そうした“赤”を、\n日々姫の目にはボロな\x%l列車;#00ffc040;列車%l;#;に見ているのだ」
2119 = "「Chắc chắn đôi mắt của Paulette cũng đang nhìn thấy \"màu đỏ\" như vậy,\nở đoàn \\x%l列車;#00ffc040;tàu%l;#; mà trong mắt Hibiki chỉ là đống sắt vụn.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
2040 = "「Ưm……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットにもし、日々姫と同じ絵心があれば、\nたちどころにそれが皆に伝わるのかもしれんな」
2412 = "「Nếu Paulette cũng có tâm hồn hội họa như Hibiki,\nthì có lẽ điều đó sẽ lập tức truyền đạt được đến mọi người.」"
# 【日々姫】
# display as 日日姬
# JP: 「だとすると――\n市長さん、ちょっと気の毒かもしれませんね」
2414 = "「Nếu vậy thì——\nThị trưởng Paulette có chút đáng thương nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「気の毒？」
2025 = "「Đáng thương?」"
# 【日々姫】
# display as 日日姬
# JP: 「市議会の様子、\n私の先輩が良く教えてくれるんですけど」
2238 = "「Tình hình ở hội đồng thành phố,\ntiền bối của em thường hay kể cho em nghe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2110 = "「Hô」"
# monologue
# JP: 議会傍聴を好む学園生とは――\n日々姫の先輩とやらは、なかなかに珍しい人物らしい。
3151 = "Một học sinh thích đến dự thính ở hội đồng thành phố sao——\nTiền bối của Hibiki có vẻ là một người khá hiếm thấy."
# 【日々姫】
# display as 日日姬
# JP: 「ヤジ、すごいそうなんですよ。\n市議会で市長さんが登壇すると」
2397 = "「Nghe nói những tiếng la ó phản đối dữ dội lắm.\nMỗi khi Thị trưởng Paulette bước lên bục phát biểu ở hội đồng thành phố.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2104 = "「Ừ」"
# monologue
# JP: まだ会って間もない僕にさえ、“あがり症か”と\n思わせるような言動をポーレットはしばしば見せている。
3092 = "Ngay cả với một người mới gặp chưa lâu như tôi, Paulette cũng thường xuyên có những hành động\nvà lời nói khiến tôi nghĩ cô ấy \"mắc chứng sợ đám đông\"."
# monologue
# JP: もしも緊張が体質ならば、張り詰めてもなお補えぬのなら、\nヤジという単純極まる妨害も、大きな効果を示すだろう。
2865 = "Nếu sự căng thẳng là do thể chất, và dù có gồng mình cũng không thể bù đắp được,\nthì một sự cản trở cực kỳ đơn giản như tiếng la ó cũng sẽ mang lại hiệu quả lớn."
# 【日々姫】
# display as 日日姬
# JP: 「市長さん、鉄道のことは特に上手に喋るんですって。\nでも、それが乗ってきたときにヤジを飛ばされて――」
2165 = "「Nghe nói Thị trưởng Paulette nói về đường sắt rất hay.\nNhưng đúng lúc đang cao trào thì lại bị la ó phản đối——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うろたえるか」
2358 = "「Cô ấy bối rối sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「だ、そうです。しどろもどろになっちゃって……\nそれで、市長さんの主張は一度も通らずじまいだそうで」
2398 = "「V-Vâng, nghe nói vậy. Cô ấy trở nên ấp úng……\nThế là ý kiến của Thị trưởng Paulette chưa bao giờ được thông qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2003 = "「Ra là vậy.」"
# monologue
# JP: それがつまりは、\n市長としてのポーレットの世評が低い一因なのだろう。
2696 = "Nói cách khác,\nđó chính là một nguyên nhân khiến đánh giá của công chúng về Thị trưởng Paulette lại thấp như vậy."
# monologue
# JP: ヤジ程度で動揺を見せてしまうようなリーダーに、\n市の将来を預けたいとは、なかなか思えるものではない。
2702 = "Khó ai có thể muốn giao phó tương lai của thành phố\ncho một người lãnh đạo dễ dàng dao động chỉ vì vài tiếng la ó."
# 【双鉄】
# display as 雙鐵
# JP: 「かくて、悪循環は転がりふくらんでいくわけか」
2276 = "「Thế là vòng luẩn quẩn cứ thế tiếp diễn và ngày càng lớn hơn sao.」"
# monologue
# JP: 帝都の僕にまで話が伝わってくるほどだ。\n誘致賛成派は、既に議会の過半数を占めていよう。
3115 = "Chuyện này lan truyền đến tận tai tôi ở Đế đô.\nPhe ủng hộ thu hút đầu tư chắc hẳn đã chiếm đa số trong hội đồng."
# monologue
# JP: 海千山千の議員達の手にかかってしまえば、\nポーレットの一途な熱情など、逆に与し易いものだろう。
2872 = "Nếu rơi vào tay những nghị viên lão làng xảo quyệt,\nthì sự nhiệt huyết một lòng một dạ của Paulette lại càng dễ bị lợi dụng."
# monologue
# JP: （議場では、れいなも助けてはくれんだろうしな）
3271 = "（Ở hội trường thì Reina cũng chẳng thể giúp gì được.）"
# monologue
# JP: 職業意識でいっぱいに満ちた――\nある意味では、張り詰めきっているポーレットの姿。
3093 = "Một hình ảnh tràn đầy ý thức nghề nghiệp——\nnhưng ở một góc độ nào đó, lại là một Paulette đang căng như dây đàn."
# monologue
# JP: 鉄道会社の社長として、\x%l運転士;#00ffc040;運転士%l;#;としてと同じように、\n市長としてもその強さを保てるものか、正直、疑問だ。
2714 = "Thành thật mà nói, tôi nghi ngờ liệu cô ấy có thể giữ được sự mạnh mẽ đó với tư cách là Thị trưởng,\ngiống như khi làm Giám đốc công ty đường sắt hay \\x%l運転士;#00ffc040;người lái tàu%l;#; hay không."
# 【日々姫】
# display as 日日姬
# JP: 「誰も邪魔をしないで、思う存分に話せれば――\n“赤は赤い”って、あの人、伝えられると思います」
2115 = "「Nếu không có ai quấy rầy, và cô ấy có thể nói thỏa thích——\nThì em nghĩ người đó có thể truyền đạt được \"màu đỏ là màu đỏ\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫がそう見るのなら、そうなのかもしれんな。\nが、邪魔がなくなることなど、あるまい」
2290 = "「Nếu Hibiki thấy vậy thì có lẽ là thế thật.\nNhưng chuyện không bị quấy rầy là không thể nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「それはそうですよね。\n効果大って、はっきりわかっているんですから」
1915 = "「Đúng là vậy nhỉ.\nVì họ biết rõ là nó mang lại hiệu quả lớn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2104 = "「嗯」" 
# monologue
# JP: ならばどうする。\nどうすればポーレットは、邪魔されず自らを主張できるか。
3197 = "Vậy phải làm sao.\nLàm thế nào để Paulette có thể đưa ra chủ trương của mình mà không bị quấy rầy."
# 【双鉄】
# display as 雙鐵
# JP: 「……結局のところは、『見せる』ことに尽きるのか」
1616 = "「……Rốt cuộc thì, chỉ còn cách là 『cho họ thấy』 thôi sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2049 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「魅力を目の当たりにすれば、それについて知りたく思う。\nそうした心の動きは恐らく、人の根源的な欲求の一つだ」
2415 = "「Nếu tận mắt chứng kiến sức hấp dẫn, người ta sẽ muốn tìm hiểu về nó.\nSự chuyển biến tâm lý đó có lẽ là một trong những nhu cầu căn bản của con người.」"
# 【日々姫】
# display as 日日姬
# JP: 「確かに、それは」
2380 = "「Quả thực là vậy.」"
# monologue
# JP: 頷いて。\nそのまま日々姫は、首をことんと傾ける。
3070 = "Gật đầu.\nSau đó Hibiki lại nghiêng đầu."
# 【日々姫】
# display as 日日姬
# JP: 「けど、それほどの魅力が――\nはちろくにい……まるけい？　でしたっけ？」
1904 = "「Nhưng mà, sức hấp dẫn cỡ đó——\nHachirokunii…… marukei? Phải không nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\x%l8620;#00ffc040;8620%l;#;形にその、『誰の目にもわかる魅力』\nがある可能性は、決して低くはないと思う」
2099 = "「Ừ. Khả năng mẫu \\x%l8620;#00ffc040;8620%l;#; sở hữu 『sức hấp dẫn mà ai cũng có thể thấy』 đó,\ntôi nghĩ tuyệt đối không hề thấp.」"
# monologue
# JP: なぜなら、あの汰斗さんが、\nハチロクを連れてきたということなのだから。
3184 = "Bởi vì, chính ông Taito,\nđã mang Hachiroku đến đây."
# monologue
# JP: そう伝えれば、日々姫はなんとも微妙な表情になる。\n汰斗さんに関する評価が、僕のそれとは違うらしい。
2943 = "Nghe tôi nói vậy, vẻ mặt của Hibiki trở nên rất kỳ lạ.\nCó vẻ đánh giá của em ấy về ông Taito khác với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「まぁ、ここで話すより、実物見た方が早いですよね。\nどこにあるんです？　それ」
2403 = "「Chà, nói ở đây thì thà đi xem tận mắt còn nhanh hơn nhỉ.\nNó ở đâu vậy anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくハチロクしか知らん。確かめねばならんのだが\n……この格好だ。店を汚すわけにもいかんだろう」
2192 = "「Có lẽ chỉ Hachiroku mới biết. Dù phải xác nhận lại nhưng\n……với bộ dạng này. Chắc không thể làm bẩn quán được đâu nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そんで私ば呼びよったと」
2086 = "「A! Vậy nên anh mới gọi em ra đây.」"
# monologue
# JP: ようやく、話を起点に戻せた。\nいや、起点に戻ったのではないか。
3196 = "Cuối cùng cũng đưa câu chuyện quay về điểm xuất phát.\nKhông, có lẽ không phải là quay về điểm xuất phát."
# monologue
# JP: 戻ったようで、螺旋階段1つ分――\n積み重ねることができた何かも、あるはずだ。
3146 = "Giống như đã quay lại, nhưng lại tiến thêm một bậc cầu thang xoắn ốc——\nChắc chắn phải có điều gì đó đã được tích lũy thêm."
# 【日々姫】
# display as 日日姬
# JP: 「汚れもひどいですけど、粉まみれってことなら……\n確かに、兄さんがそのまま家に入るのは難しいですね」
2432 = "「Bẩn thì bẩn thật, nhưng nếu là dính đầy bụi phấn thế này thì……\nĐúng là anh khó mà vào nhà với bộ dạng này được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「万が一にも、炭塵が焼酎にまぎれてしまえば、\n取り返しがつかんことになりかねんからな」
2407 = "「Ngộ nhỡ bụi than lọt vào rượu shochu,\nthì hậu quả sẽ không thể cứu vãn được.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、外のお風呂で綺麗にするしかないですよね。\nまってて下さい。私、兄さんの着替え取ってきます」
2017 = "「Vậy thì chỉ còn cách đi tắm ở ngoài cho sạch sẽ thôi.\nAnh đợi chút nhé. Em đi lấy quần áo thay cho anh.」"
# monologue
# JP: パタパタ日々姫が家に飛び込み、駆け上がる。
3028 = "Lạch cạch, Hibiki chạy ùa vào nhà và phóng lên lầu."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。戻りました。\n少し遅れて、すみません」
2501 = "「Ngài Soutetsu. Em đã quay lại.\nXin lỗi vì hơi chậm trễ.」"
# monologue
# JP: 入れ替わるようなハチロクの声。
2874 = "Giọng của Hachiroku vang lên như thể vừa thay chỗ cho Hibiki."
# monologue
# JP: ふりむけば、走りでもしたのか、\nハチロクの頬は上気し、肌には汗まで浮いている。
2682 = "Ngoảnh lại nhìn, không biết có phải vừa chạy không,\nnhưng hai má Hachiroku ửng đỏ, trên da còn lấm tấm mồ hôi."
# 【双鉄】
# display as 雙鐵
# JP: 「かまわんが、なにかあったか？」
2339 = "「Không sao, nhưng có chuyện gì à?」"
# 【ハチロク】
# display as 八六
# JP: 「この体ですと――\n\x%l翼端;#00ffc040;[よくたん,1]翼端%l;#;から地上に下りるのが大変で」
2235 = "「Với cơ thể này thì——\nviệc leo từ \\x%l翼端;#00ffc040;đầu cánh%l;#; xuống mặt đất hơi khó khăn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。それは盲点だったな、すまん」
2080 = "「À, ra vậy. Tôi không nghĩ đến chuyện đó, xin lỗi nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ。\nわたくし自身さえ気づかずにいたことですから」
1907 = "「Không đâu ạ.\nNgay cả bản thân em cũng không nhận ra điều đó mà.」"
# monologue
# JP: ナビは上空、二度ほど回転してからクン、っと\n高度をあげて視界を外れる。
3275 = "Navi xoay hai vòng trên không rồi vụt một cái\ntăng độ cao và biến mất khỏi tầm nhìn."
# monologue
# JP: 僕が風呂屋に移動することを、\n予測したのか、聞いていたのか――っと、そうだ。
2957 = "Không biết cô ấy dự đoán được việc tôi sẽ đi đến nhà tắm công cộng,\nhay là đã nghe thấy——à, đúng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「これから風呂にいく。この汚れでは家にあがれん」
2244 = "「Bây giờ tôi sẽ đi tắm. Bẩn thế này thì không vào nhà được.」"
# 【ハチロク】
# display as 八六
# JP: 「銭湯も嫌いますよ？　石炭汚れは」
2353 = "「Nhà tắm công cộng cũng ghét vết bẩn than đá lắm đấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫に心あたりがあるようだ。\nお前はどうする？　一緒に行くか？」
2286 = "「Có vẻ Hibiki biết chỗ nào đó.\nCô thì sao? Có đi cùng không?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです」
2368 = "「Tất nhiên rồi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、おまたせ！　って、ハチロク――ちゃん」
2060 = "「Anh hai, để anh đợi lâu! Ơ, Hachiroku——chan.」"
# monologue
# JP: 日々姫の、少し戸惑った声。
3053 = "Giọng Hibiki có chút bối rối."
# monologue
# JP: ハチロクは優雅に笑い、日々姫の緊張をほぐそうとする。
2753 = "Hachiroku mỉm cười tao nhã, cố gắng xoa dịu sự căng thẳng của Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「呼び捨てで結構ですよ、日々姫様。\nわたくし、双鉄様の所有物ですので」
2225 = "「Cô cứ gọi trống không là được rồi, tiểu thư Hibiki.\nVì em là vật sở hữu của ngài Soutetsu mà.」"
# monologue
# JP: むっと、日々姫の眉根が寄る。\nぷっと、その頬がふくれはじめる。
3057 = "Hibiki nhíu mày khó chịu.\nHai má em ấy phồng lên."
# 【日々姫】
# display as 日日姬
# JP: 「やったら、私んことも日々姫でよかよ。\n妹やもん、にぃにぃの所有物も同然やけんね」
2460 = "「Nếu vậy thì cô cứ gọi tôi là Hibiki đi.\nTôi là em gái, cũng giống như vật sở hữu của anh hai thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はぁ」
2296 = "「Hả.」"
# monologue
# JP: 困ったように、ハチロクが僕を見上げてくる。
2748 = "Hachiroku ngước nhìn tôi với vẻ bối rối."
# monologue
# JP: 日々姫を所有した記憶なぞまるで無いのだが……\nそれが日々姫の希望であれば、僕は当然、従うまでだ。
2914 = "Tôi hoàn toàn không có ký ức gì về việc sở hữu Hibiki cả……\nNhưng nếu đó là mong muốn của Hibiki, thì đương nhiên tôi sẽ chiều theo."
# 【双鉄】
# display as 雙鐵
# JP: 「お互いに呼び捨てあうがよかろう。\nお前たち、どうやら似たところがあるようだしな」
2475 = "「Hai người cứ gọi trống không với nhau đi.\nCó vẻ như hai người cũng có điểm giống nhau đấy.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「どこがと！？」\n「どこがですか？」
2066 = "「Giống ở chỗ nào cơ!?」\n「Giống ở điểm nào ạ?」"
# monologue
# JP: 声が重なる。
2746 = "Hai giọng nói vang lên cùng lúc."
# monologue
# JP: そして同時に、いささか気まずそうな顔で視線をそらし、\nそれからプっと、笑いをもらす。
2980 = "Rồi cả hai cùng lảng mắt đi với vẻ hơi ngượng ngùng,\nsau đó phì cười."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことで風呂にしよう。\n日々姫、案内を頼む」
2278 = "「Quyết định vậy đi, giờ đi tắm thôi.\nHibiki, nhờ em dẫn đường nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん。おまかせください！」
2144 = "「Vâng, anh hai. Cứ giao cho em!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2109 = "「噢」" 
# monologue
# JP: 見事なものだ。\n余裕で戦前――\x%l大詔;#00ffc040;大詔%l;#;どころか、\x%l明智;#00ffc040;明智%l;#;の建築かもしれん。
2676 = "Thật tuyệt vời.\nChắc chắn là trước chiến tranh——thậm chí không phải thời \\x%l大詔;#00ffc040;Taisho%l;#; mà có khi là kiến trúc thời \\x%l明智;#00ffc040;Meiji%l;#; cũng nên."
# monologue
# JP: 湯に満ち満ちた場所だというのに、\nなにもかもが枯れ切っている味わいだ。
3236 = "Dù là nơi tràn ngập nước nóng,\nnhưng mọi thứ lại mang một vẻ hoài cổ mộc mạc."
# 【双鉄】
# display as 雙鐵
# JP: 「良いな。風情のある銭湯だ」
1905 = "「Tuyệt thật. Một nhà tắm công cộng đầy phong vị.」"
# 【日々姫】
# display as 日日姬
# JP: 「そのうえ天然温泉たい！\n[きゅうしゅう,1]九洲に名高か温泉地、御一夜のお風呂やけんね」
2395 = "「Hơn nữa còn là suối nước nóng tự nhiên đó nha!\nLà nhà tắm của Ohimitera, khu suối nước nóng nổi tiếng ở Kyushu mà lị.」"
# 【ハチロク】
# display as 八六
# JP: 「わたしが現役だったころの駅舎のようです。\nいいですね、とても落ち着きます」
2172 = "「Trông giống như nhà ga hồi em còn hoạt động vậy.\nThích thật đấy, cảm giác rất bình yên.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1600 = "「…………」" 
# monologue
# JP: また赤くなって下を向く。\n日々姫が直接ほめられたわけでもないのだが――
3023 = "Em ấy lại đỏ mặt và cúi gầm xuống.\nDù Hibiki không trực tiếp được khen ngợi——"
# monologue
# JP: あるいはここは、よほどお気に入りの場所なのかもしれん。
2958 = "Hoặc có lẽ đây là nơi mà em ấy cực kỳ yêu thích."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、よくこんな銭湯を知っていたな。\n僕が帝都に出ていた間に、風呂が壊れでもしたのか？」
1940 = "「Nhưng sao em lại biết nhà tắm này hay vậy.\nTrong lúc tôi ở Đế đô, nhà tắm nhà mình bị hỏng hay sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　[ちご]違ぉて――ううん、あの――\nちょっと――えと、その、お仕事で……あって」
2051 = "「Hả? Không phải——ưm, cái đó——\nMột chút——ờm, chuyện, công việc…… thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「焼酎か？　湯上がりに飲むのは危険だと思うが」
2360 = "「Shochu à? Uống sau khi tắm xong thì nguy hiểm lắm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そうじゃないんですけど――その――　\n兄さん、ハチロク、とにかく行きましょう！！」
2088 = "「A, không phải vậy đâu——cái đó——\nAnh hai, Hachiroku, tóm lại là đi thôi!!」"
# monologue
# JP: ごまかすように話を打ち切り、\n日々姫は女湯ののれんをくぐる。
3034 = "Hibiki cắt ngang câu chuyện như muốn lấp liếm,\nrồi chui qua tấm rèm cửa phòng tắm nữ."
# monologue
# JP: 僕は男湯。\nわかれわかれだ。
2922 = "Tôi vào phòng tắm nam.\nChia hai ngả."
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃにぃ！\nハチロクはこっちばい」
2241 = "「Ơ kìa, anh hai!\nHachiroku phải sang bên này chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。背中を流してくれるそうだからな」
2338 = "「Không sao. Cô ấy bảo sẽ chà lưng cho tôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「は？　背中って」
1924 = "「Hả? Chà lưng á?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしのため、双鉄様は石炭にまみれてくれました。\nその汚れを落とすのは、わたくしの当然の務めです」
2474 = "「Vì em mà ngài Soutetsu đã phải lấm lem than đá.\nViệc tẩy sạch những vết bẩn đó là nghĩa vụ hiển nhiên của em ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。\n出るときは、なにか合図をしてく……む？」
2158 = "「Là vậy đó.\nLúc nào ra thì ra hiệu nhé…… hửm?」"
# monologue
# JP: 日々姫の頬がふくれている。\n目に涙まで滲み始める。
3042 = "Hai má Hibiki phồng lên.\nNước mắt cũng bắt đầu ứa ra."
# monologue
# JP: ご不満だ。著しく。\n不満をうまく外へ出せない、その点も変わってないらしい。
2672 = "Rất bất mãn. Cực kỳ bất mãn.\nCái tính không giỏi bộc lộ sự bất mãn ra ngoài, có vẻ cũng không hề thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2284 = "「Hibiki.」"
# monologue
# JP: しゃがみこみ、日々姫の高さに視線をあわせる。
2953 = "Tôi ngồi xổm xuống, để tầm mắt ngang với Hibiki."
# monologue
# JP: 鼻と鼻とが触れ合う近さ――\nからバっと大きく日々姫が離れる。
2835 = "Khoảng cách gần đến mức mũi chạm mũi——\nRồi Hibiki giật mình lùi lại thật xa."
# 【日々姫】
# display as 日日姬
# JP: 「こ、子供扱いしたらいかんばいっ」
1883 = "「Đ-Đừng có đối xử với em như trẻ con chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\nそんなつもりはなかったのだが」
2269 = "「À, xin lỗi.\nTôi không có ý đó đâu.」"
# monologue
# JP: が、怪我の功名という奴だ。\n日々姫が素直な言葉を聞かせてくれてる。
2687 = "Nhưng, đúng là trong cái rủi có cái may.\nHibiki đã nói ra những lời thật lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが僕の背中を流すのが、イヤか？」
1946 = "「Em ghét việc Hachiroku chà lưng cho tôi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「背中……っていうか。\nええと、一緒にお風呂に入るのが、なんか――」
1881 = "「Chà lưng…… hay đúng hơn là.\nỜm, việc hai người tắm chung với nhau, cảm giác cứ sao sao ấy——」"
# 【ハチロク】
# display as 八六
# JP: 「慎み無いこととお感じになられても仕方ありません。\n嫁入り前の娘が、殿方と一緒にですからね」
2150 = "「Cô cảm thấy thiếu ý tứ cũng là chuyện đương nhiên thôi.\nVì một thiếu nữ chưa chồng lại đi tắm cùng với đàn ông mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: こくん、と、日々姫が頷いている。\nその頷きに、優しくハチロクは言葉を乗せる。
3067 = "Hibiki gật đầu cái rụp.\nTheo cái gật đầu đó, Hachiroku nhẹ nhàng tiếp lời."
# 【ハチロク】
# display as 八六
# JP: 「けれどわたくしは、仕事仲間として、お疲れ様、と\n――双鉄様の石炭汚れを流してさしあげたいのです」
1938 = "「Nhưng với tư cách là đồng nghiệp, em muốn nói lời cảm ơn vì sự vất vả của ngài ấy\n——và muốn tẩy sạch vết bẩn than đá cho ngài Soutetsu.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
# 2040 = "「呃……」" 
# 【ハチロク】
# display as 八六
# JP: 「それに、ね？　日々姫」
2393 = "「Hơn nữa, cô biết không? Hibiki.」"
# monologue
# JP: 呼び捨てた。\n日々姫がさっき求めたとおりに、ハチロクが。
2763 = "Cô ấy gọi trống không rồi.\nĐúng như những gì Hibiki vừa yêu cầu ban nãy, Hachiroku đã làm vậy."
# monologue
# JP: そうして小さなその口を、\n日々姫の耳元に近づける。
2979 = "Rồi cô ấy ghé chiếc miệng nhỏ nhắn của mình,\nlại gần tai Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、このちいささでしょう？　深いお風呂では、\n誰かと一緒に入らないと、立ち通しになってしまうの」
1954 = "「Cô xem, em nhỏ bé thế này mà? Nếu vào bồn tắm sâu,\nmà không tắm cùng ai đó thì em sẽ phải đứng suốt mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
2081 = "「A.」"
# monologue
# JP: ハチロクが何と言ったのか。\n日々姫はこくん、と大きくうなずく。
2679 = "Không biết Hachiroku đã nói gì.\nNhưng Hibiki gật đầu thật mạnh."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、私、\nハチロクのお風呂いすになってあげます」
2061 = "「Anh hai, em sẽ\nlàm ghế ngồi tắm cho Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「風呂いす？」
2349 = "「Ghế ngồi tắm?」"
# monologue
# JP: なぜそんな――\n思った途端に、答えは見つかる。
2913 = "Sao lại——\nNgay khi vừa thắc mắc, tôi đã tìm ra câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、湯船が深ければ、\nハチロクは座って風呂にも入れんわけか」
2004 = "「Ra là vậy, nếu bồn tắm sâu quá,\nthì Hachiroku không thể ngồi ngâm mình được.」"
# 【ハチロク】
# display as 八六
# JP: 「さすが。ご明察です、双鉄様」
2500 = "「Quả không hổ danh. Ngài thật tinh ý, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうなるとどうするか。\nまさか僕が女湯にも入れんし」
1942 = "「Nhưng, nếu vậy thì phải làm sao.\nKhông lẽ tôi lại vào phòng tắm nữ.」"
# 【登呂流湯主人】
# display as ？？？
# JP: 「なんね、人ん店前で長々と」
2319 = "「Cái gì thế này, đứng lù lù trước cửa quán người ta mãi thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、すみません」
2092 = "「A, cháu xin lỗi.」"
# monologue
# JP: 不意に背後から響いた声に、\nしかし日々姫は動じない。
3178 = "Bất chợt có giọng nói vang lên từ phía sau,\nnhưng Hibiki không hề nao núng."
# monologue
# JP: それどころか、ほわり嬉しげな、\nほっとしたような笑みを浮かべる。
2847 = "Trái lại, em ấy còn nở một nụ cười rạng rỡ,\nnhư thể vừa thở phào nhẹ nhõm."
# 【日々姫】
# display as 日日姬
# JP: 「登呂流湯のおば様、おひさしぶりです」
2371 = "「Bà chủ Tororyu-yu ơi, lâu rồi không gặp bà ạ.」"
# 【登呂流湯主人】
# display as ？？？
# JP: 「おお、日々姫ちゃんかい。ひさしかぶりねぇ」
2445 = "「Ồ, bé Hibiki đấy à. Lâu lắm rồi mới thấy cháu nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、少しバタバタしていて、\nご無沙汰してしまいました」
2308 = "「Vâng, dạo này cháu hơi bận rộn một chút,\nnên lâu rồi không đến thăm bà được.」"
# monologue
# JP: 登呂流湯の――ということは、\nこのご老女が登呂流湯のご主人か。
3126 = "Tororyu-yu——vậy có nghĩa là,\nbà lão này là chủ nhân của nhà tắm Tororyu-yu sao."
# monologue
# JP: 建物同様、見事なまでの年季と枯れだ。\nおば様と日々姫は呼んでるが、どこをどうみても婆様だ。
2853 = "Cũng giống như tòa nhà này, bà ấy toát lên một vẻ già nua và từng trải đáng kinh ngạc.\nHibiki gọi là \"bác\", nhưng nhìn thế nào cũng thấy là một \"bà lão\"."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なんね。さっさと入りゃあよかとに。\n一体全体、どぎゃんしたと？」
2274 = "「Sao thế. Cứ vào nhanh đi là được mà.\nRốt cuộc là có chuyện gì vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。実は……少し困ってしまって」
1982 = "「Vâng. Thật ra…… tụi cháu đang hơi gặp rắc rối một chút.」"
# monologue
# JP: いささか驚く。\n僕と話しているときよりずっと、大人びている。
2938 = "Tôi hơi ngạc nhiên.\nEm ấy trông trưởng thành hơn hẳn lúc nói chuyện với tôi."
# monologue
# JP: 僕を兄だと紹介するそのなめらかさは、\n内気で絵ばかり描いていた、あの日々姫とは思えぬほどだ。
2705 = "Cách em ấy giới thiệu tôi là anh trai một cách trôi chảy,\nkhác hẳn với một Hibiki nhút nhát chỉ biết cắm cúi vẽ tranh ngày xưa."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「はーあ、これが右田の。\n良か男ばいねぇ。中身はどうかしれんけど」
1952 = "「Hà, ra đây là người nhà Migita sao.\nĐẹp trai phết nhỉ. Còn bên trong thế nào thì không biết.」"
# monologue
# JP: 右田の、と呼ばれた途端、背筋が伸びる。
1564 = "Ngay khi bị gọi là \"người nhà Migita\", tôi lập tức thẳng lưng lên."
# monologue
# JP: そのように認識されるのならば、\nいつも以上に立居振舞いには気をつけよう。
2990 = "Nếu đã được nhận diện như vậy,\nthì tôi càng phải cẩn trọng trong từng hành động và cử chỉ hơn bình thường."
# 【双鉄】
# display as 雙鐵
# JP: 「お目にかかれて光栄です。\n僕は、右田双鉄ともうします」
2176 = "「Rất hân hạnh được gặp bà.\nCháu là Migita Soutetsu.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です。\nどうぞ、ハチロクとお呼びください」
2231 = "「Cháu là \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu.\nXin hãy gọi cháu là Hachiroku.」"
# monologue
# JP: 名乗り返さず。\n登呂流湯主人はわかったわかったと手を軽く振る。
3128 = "Không thèm xưng tên lại.\nBà chủ Tororyu-yu chỉ phẩy tay nhẹ như thể đã hiểu."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「はぁーあ、釜屋に\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n湯ぅ汚されんのも何十年ぶりになりよっとかねぇ」
2070 = "「Hà, thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nCũng mấy chục năm rồi mới có người làm bẩn nước tắm của ta đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことは。\nお風呂に入らせていただけるのですか？」
2198 = "「Nói vậy tức là.\nChúng cháu được phép vào tắm sao ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「次からは２３時にならんといれんよ。\n他の客がいるときゃ、とてもいれられんけんね」
2174 = "「Từ lần sau thì phải sau 23 giờ mới được vào đấy nhé.\nLúc có khách khác thì ta không thể cho vào được đâu.」"
# monologue
# JP: 入り口の看板に書いてある。\n終業時刻が……なるほど、２３時になるのか。
2745 = "Trên bảng hiệu trước cửa có ghi.\nGiờ đóng cửa là…… ra vậy, 23 giờ sao."
# 【双鉄】
# display as 雙鐵
# JP: 「では、今日も２３時過ぎに」
2458 = "「Vậy thì, hôm nay chúng cháu cũng sẽ đến sau 23 giờ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「今日はよかよ。貸し切り。\n客が来んけん、閉めようと思っとったとことや」
1926 = "「Hôm nay thì được. Cho bao trọn gói luôn.\nKhông có khách nên ta cũng đang định đóng cửa đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nでは、お風呂に入らせていただきたいのですが――」
2001 = "「Cháu cảm ơn bà.\nVậy thì, chúng cháu xin phép được vào tắm ạ——」"
# monologue
# JP: 男湯と、女湯と。\n僕と日々姫とハチロクと。
3118 = "Phòng tắm nam, và phòng tắm nữ.\nTôi, Hibiki và Hachiroku."
# monologue
# JP: どうしたものかと少し悩めば、\n登呂流湯主人はその手を伸ばし、女湯の方を指し示す。
3078 = "Đang phân vân không biết phải làm sao,\nthì bà chủ Tororyu-yu đưa tay chỉ về phía phòng tắm nữ."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「釜屋と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は女湯。\n広い男湯ば汚されよったら、たまらんけんね」
2482 = "「Thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#; thì vào phòng tắm nữ.\nChứ để làm bẩn cái phòng tắm nam rộng thênh thang thì ta chịu không thấu đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あの……私は」
2461 = "「Dạ…… còn cháu thì sao ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「貸しきりやけん。\n日々姫ちゃんはどっちでんよかとよ」
2477 = "「Bao trọn gói rồi mà.\nBé Hibiki muốn vào bên nào cũng được hết.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですか？　それなら――」
2449 = "「Vậy ạ? Thế thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ……いい湯だ」
2046 = "「Phù…… nước tắm thích thật.」"
# monologue
# JP: かけ湯をし、さんざんハチロクに洗ってもらい、\n自分自身でもしつこく洗い。
2934 = "Sau khi dội nước, được Hachiroku chà rửa cẩn thận,\nvà tự mình kỳ cọ kỹ lưỡng."
# monologue
# JP: それでも黒い粉粒がぽつぽつ浮かんでしまいはするが、\n湯船に浸かれば疲れの全てが、溶けて流れていくようだ。
3179 = "Dù vẫn còn vài hạt bụi đen lấm tấm nổi lên,\nnhưng khi ngâm mình trong bồn tắm, mọi mệt mỏi dường như đều tan biến và trôi đi mất."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。おつかれですか？」
2499 = "「Ngài Soutetsu. Ngài mệt lắm ạ?」"
# monologue
# JP: ハチロクだ。
3072 = "Là Hachiroku."
# monologue
# JP: 足を伸ばした日々姫の両ももをいすにして、\n湯船にすっぽり浸かっている。
2855 = "Cô ấy đang ngồi trên hai đùi duỗi thẳng của Hibiki như một chiếc ghế,\nvà ngâm mình hoàn toàn trong bồn tắm."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、な。いくらかは」
2385 = "「À, ừ. Cũng hơi mệt một chút.」"
# monologue
# JP: 日々姫は僕と離れた隅で、湯に浸かってる。
3038 = "Hibiki đang ngâm mình ở một góc xa tôi."
# monologue
# JP: 当然、ハチロクもその距離だ。\nいくらか声を張り上げる。
2772 = "Đương nhiên, Hachiroku cũng ở khoảng cách đó.\nTôi hơi cao giọng lên một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、心地良い疲れでもある。\n明日の朝の筋肉痛はひどそうだがな」
1936 = "「Nhưng, đây cũng là một sự mệt mỏi dễ chịu.\nDù sáng mai chắc chắn sẽ đau nhức cơ bắp dữ dội lắm đây.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、湯上がりには体をお揉みになると良いです。\n翌朝の疲れの抜け方がまるで違いますから」
2472 = "「Nếu vậy thì sau khi tắm xong ngài nên xoa bóp cơ thể ạ.\nSáng hôm sau cảm giác mệt mỏi sẽ tan biến hoàn toàn khác biệt đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。あんまの類にはまるで心得が無いのだが」
2077 = "「Hừm. Nhưng tôi lại hoàn toàn không biết gì về mấy trò xoa bóp này cả.」"
# 【ハチロク】
# display as 八六
# JP: 「それこそ、ツボを抑えてしまえばいいだけの話です」
2019 = "「Chỉ cần ấn đúng huyệt là được thôi ạ.」"
# monologue
# JP: ちゃぷりと波立つ。
3085 = "Nước gợn sóng lép bép."
# monologue
# JP: ハチロクが湯船のふちをつたって歩き、\nこちらにゆっくり近づいてくる。
2767 = "Hachiroku men theo thành bồn tắm,\nchậm rãi tiến về phía này."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　おせなを」
2502 = "「Ngài Soutetsu? Cho em mượn tấm lưng ạ.」"
# monologue
# JP: おせな――背中か。\n求められるまま、背中をハチロクへと差し出す。
3182 = "Tấm lưng——lưng sao.\nTôi chìa lưng về phía Hachiroku theo yêu cầu."
# 【ハチロク】
# display as 八六
# JP: 「例えば、ここを――ね？　どうです？」
2328 = "「Ví dụ như, chỗ này——nhỉ? Ngài thấy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――おっ――これはっ」
2108 = "「Ư——ồ——cái này.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
2511 = "「!!?」"
# monologue
# JP: 背中の、ツボとやらを押されたのだろう。\n押される端から、体が勝手に動いてしまう。
2752 = "Chắc là cô ấy vừa ấn vào cái gọi là huyệt đạo trên lưng tôi.\nNgay khi vừa bị ấn, cơ thể tôi đã tự động giật nảy lên."
# 【ハチロク】
# display as 八六
# JP: 「良さそうですね。こんなにビクビク暴れてしまって。\nうふふ、それなら――これはいかがです？」
2016 = "「Có vẻ hiệu quả tốt đấy ạ. Ngài giật nảy người lên thế này cơ mà.\nUfufu, vậy thì——thế này thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……あっ――効く――な」
2096 = "「Ư…… a——hiệu quả——thật.」"
# monologue
# JP: 二の腕を伸ばされ、もみほぐされる。
2940 = "Bắp tay tôi được kéo giãn ra và xoa bóp."
# 【双鉄】
# display as 雙鐵
# JP: 「もっと――もっと強く、頼めるか？」
2366 = "「Có thể——mạnh hơn chút nữa, được không?」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、双鉄様はおねだり上手な方ですね」
2045 = "「Ufufu, ngài Soutetsu đúng là giỏi vòi vĩnh quá nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「てえええっ！！！\nにぃにぃ！　ハチロク！　なにしとるばーーーいっ！」
2095 = "「Trờiiii ơiiii!!!\nAnh hai! Hachiroku! Hai người đang làm cái trò gì vậyyyyy!」"
# monologue
# JP: 広い湯船の逆の端から、日々姫が大きな声を出す。
3051 = "Từ đầu bên kia của bồn tắm rộng lớn, Hibiki hét toáng lên."
# monologue
# JP: 絵の描きすぎか、すこし近視のきらいがあり、\nしかも湯気越し――こちらの様子は見えていないのだろう。
2809 = "Có lẽ do vẽ tranh quá nhiều nên em ấy hơi bị cận thị,\nhơn nữa lại còn bị hơi nước che khuất——chắc hẳn em ấy không nhìn rõ tình hình bên này."
# 【双鉄】
# display as 雙鐵
# JP: 「大したことではない。体の揉み方を習っていただけだ」
2335 = "「Không có gì to tát đâu. Tôi chỉ đang học cách xoa bóp cơ thể thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「か、からだのっ！？　\nもみっ――もみっ――かたっ！？」
2273 = "「C-Cơ thể á!?\nC-Cách——xoa bóp——cơ thể á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか気持ちの良いものだぞ。\nどうだ、日々姫も習ってみては」
2036 = "「Cảm giác khá là dễ chịu đấy.\nThế nào, Hibiki cũng thử học xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなっ！　そんなんっ！\n私にはまだまだ早かけんっ！」
1900 = "「Không đời nào! Chuyện đó!\nVới em thì vẫn còn quá sớm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2312 = "「Vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そーゆーもんばいっ！」
2021 = "「Chính là vậy đó!」"
# monologue
# JP: ……腕の揉み方を教わるのに、\n早いも遅いもあるものだろうか？
1576 = "……Việc học cách xoa bóp cánh tay,\nthì có phân biệt sớm hay muộn sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「……どうも食い違っている気がするな。\n日々姫。もう少しこちらに来ないか？」
1617 = "「……Cảm giác như chúng ta đang không hiểu ý nhau thì phải.\nHibiki. Lại gần đây một chút được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「無理無理無理無理！　\nわたしもにぃにぃも、こぎゃん格好やけんっ！」
1898 = "「Không được không được không được! \nCả em và anh hai đều đang trong bộ dạng thế này mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう。一緒の風呂に入っているのだ」
2217 = "「Đương nhiên là vậy rồi. Chúng ta đang tắm chung mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「これが限界！　近ぉなったら恥ずかしゅうてわたし、\nにぃにぃを見れんよーになるばい」
2447 = "「Đây là giới hạn rồi! Lại gần nữa em sẽ xấu hổ chết mất,\nem không dám nhìn anh hai nữa đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2074 = "「Hừm.」"
# monologue
# JP: 義理だなんだを口にせぬよう、\n言葉を選んでゆっくり話す。
2932 = "Để tránh nhắc đến chuyện là anh em nuôi,\ntôi chọn lọc từ ngữ và chậm rãi nói."
# 【双鉄】
# display as 雙鐵
# JP: 「恥ずかしいものか？　兄妹で」
1975 = "「Xấu hổ sao? Anh em với nhau mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 2081 = "「啊」" 
# monologue
# JP: こほんと、ひとつ咳払い。
1565 = "Em ấy hắng giọng một cái."
# monologue
# JP: そして日々姫はゆっくりと、\nまるで言い聞かせるような口調で言葉を紡ぎだす。
2981 = "Sau đó Hibiki chậm rãi,\ncất lời với giọng điệu như đang giảng giải."
# monologue
# JP: だから、ですよ、と。
2860 = "Là bởi vì thế đó, em ấy nói."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2311 = "「Ừ.」"
# monologue
# JP: そうか、そういうものか。
2787 = "Ra vậy, là như thế sao."
# monologue
# JP: 路子とは、風呂でもなんでも、\nふたごらしく一緒に過ごしたものだが……
2927 = "Hồi trước với Michiko, dù là đi tắm hay làm gì,\nchúng tôi cũng luôn ở cạnh nhau đúng chuẩn sinh đôi, nhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「年頃になると、恥ずかしくなるものか」
1992 = "「Đến tuổi trưởng thành thì sẽ trở nên xấu hổ sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2510 = "「!」"
# monologue
# JP: しまった。\n思いをそのままぽろりと漏らしてしまった。
3153 = "Chết thật.\nTôi lỡ buột miệng nói ra suy nghĩ của mình mất rồi."
# monologue
# JP: 日々姫は聡い。\n小さく息を呑んだのは、察してしまったからだろう。
3040 = "Hibiki rất nhạy bén.\nEm ấy khẽ nín thở, chắc hẳn là đã nhận ra rồi."
# 【ハチロク】
# display as 八六
# JP: 「慣れ……なのでしょうか？\nわたくしは、まったく恥ずかしくありませんけれども」
2390 = "「Chắc là do…… chưa quen chăng?\nBản thân em thì hoàn toàn không thấy xấu hổ chút nào.」"
# monologue
# JP: 聞こえよがしなハチロクの声。
2765 = "Giọng nói của Hachiroku vang lên như cố tình để cho tôi nghe thấy."
# monologue
# JP: イヤな感じになりかけた空気をサっと飛ばしてくれる。\nここは素直に乗らせてもらおう。
2859 = "Cô ấy đã nhanh chóng xua tan bầu không khí sắp trở nên gượng gạo.\nChỗ này cứ ngoan ngoãn nương theo cô ấy vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「よくあることなのか？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とマスターとで風呂に入るのは」
1592 = "「Chuyện này thường xuyên xảy ra sao?\nViệc \\x%lレイルロオド;#00ffc040;Railord%l;#; và Master tắm chung ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは双鉄様の前、ひとりのマスターと\n長くお付き合いをしていましたが、その方とはいつも」
2300 = "「Vâng. Trước khi gặp ngài Soutetsu, em đã từng đồng hành\nrất lâu với một vị Master, và với người đó thì lúc nào cũng vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2075 = "「Hừm.」"
# 【ハチロク】
# display as 八六
# JP: 「乗務のあとは、\x%l機関区;#00ffc040;機関区%l;#;の大きなお風呂にふたりきり。\nそれはそれは、とても贅沢な時間でございました」
1983 = "「Sau mỗi chuyến đi, hai chúng em lại ngâm mình trong bồn tắm lớn ở \\x%l機関区;#00ffc040;kho đầu máy%l;#;.\nĐó thực sự là những khoảng thời gian vô cùng xa xỉ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2076 = "「Hừm?」"
# monologue
# JP: ハチロクが現役だったころは、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;ばかりが走っていたころなのではなかろうか。
2754 = "Hồi Hachiroku còn hoạt động,\nchẳng phải là thời kỳ mà \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; chạy nhan nhản khắp nơi sao."
# monologue
# JP: それならば\x%l機関士;#00ffc040;機関士%l;#;も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、\n相当な数がいそうなものだが……
73 = "Nếu vậy thì số lượng \\x%l機関士;#00ffc040;người lái tàu%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nchắc hẳn cũng phải rất đông đảo mới đúng……"
# 【ハチロク】
# display as 八六
# JP: 「ですが、[きよみ,1]清美機関士と双鉄様では随分お体が違います。\n双鉄様のお胸は平らで、お喉がぽこんとされていますね」
1903 = "「Nhưng mà, cơ thể của người lái tàu Kiyomi và ngài Soutetsu khác nhau nhiều quá.\nNgực của ngài Soutetsu phẳng lỳ, còn cổ họng thì lại nhô ra cục yết hầu này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2228 = "「À.」"
# monologue
# JP: これほどに明快な謎であるなら、僕にも解ける。
3237 = "Một bí ẩn rõ ràng đến mức này thì tôi cũng có thể giải được."
# 【双鉄】
# display as 雙鐵
# JP: 「女性か。[きよみ,1]清美機関士という方は」
2351 = "「Là phụ nữ sao. Người lái tàu tên Kiyomi ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。女性です」
2301 = "「Vâng. Là phụ nữ ạ.」"
# monologue
# JP: ちゃぷん、と水音。\n日々姫が身を乗り出したようだ。
3084 = "Tùm một tiếng nước vang lên.\nHibiki có vẻ vừa rướn người tới."
# 【日々姫】
# display as 日日姬
# JP: 「女性……\x%l機関士;#00ffc040;機関士%l;#;さんって、機関車の\x%l運転士;#00ffc040;運転士%l;#;さんよね。\n昔はそげな人おったと？」
2129 = "「Phụ nữ…… \\x%l機関士;#00ffc040;Người lái tàu%l;#; là \\x%l運転士;#00ffc040;nhân viên điều khiển%l;#; đầu máy xe lửa nhỉ.\nNgày xưa cũng có người như vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「[ていおう,1]帝央\x%l機関区;#00ffc040;機関区%l;#;では、長いこと清美機関士お一人だけでした。\nもっとも、戦中には女性\x%l機関士;#00ffc040;機関士%l;#;の方が多くなりましたが」
2112 = "「Ở \\x%l機関区;#00ffc040;kho đầu máy%l;#; Teiou, trong một thời gian dài chỉ có một mình cô Kiyomi là người lái tàu thôi ạ.\nTuy nhiên, trong thời chiến thì số lượng nữ \\x%l機関士;#00ffc040;người lái tàu%l;#; đã tăng lên rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2448 = "「Ra vậy.」"
# monologue
# JP: 戦中――つまりは\x%l大戦;#00ffc040;大戦%l;#;中か。\nハチロクは、あの戦争を実際に知っているのか。
2964 = "Thời chiến——tức là trong cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#; sao.\nHachiroku thực sự biết về cuộc chiến tranh đó ư."
# 【ハチロク】
# display as 八六
# JP: 「戦時徴用の\x%l機関士;#00ffc040;機関士%l;#;さん達は清美機関士をおっかながって。\nですからずっと、お風呂はわたくし達ふたりじめでした」
2257 = "「Các \\x%l機関士;#00ffc040;người lái tàu%l;#; bị trưng dụng thời chiến rất sợ cô Kiyomi.\nThế nên bồn tắm lúc nào cũng chỉ có hai chúng em độc chiếm thôi ạ.」"
# monologue
# JP: 懐かしそうに目を細め、\nそれからふふ、と、ハチロクは幸せそうに微笑む。
2760 = "Cô ấy nheo mắt lại đầy hoài niệm,\nrồi ufufu mỉm cười hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「考えてみたらわたくし、\n男性の方と一緒のお風呂は、これが初めてになりますね」
1930 = "「Nghĩ lại thì,\nđây là lần đầu tiên em tắm chung với đàn ông đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「お相手が双鉄様でよかったです」
2454 = "「Thật may vì người đó là ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄様？」
2462 = "「Dạ…… ngài Soutetsu?」"
# monologue
# JP: 見上げる。\n僕を、ハチロクが。
2762 = "Ngước lên.\nHachiroku đang nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「はいはいはいはい、そこまで！　そこまでばいっ！」
2142 = "「Rồi rồi rồi rồi, tới đó thôi! Tới đó thôi!」"
# monologue
# JP: 大きな声を出しながら、\nざぶざぶお湯を蹴散らして、日々姫が僕らに近づいてくる。
3019 = "Vừa nói lớn,\nHibiki vừa rẽ nước đi về phía chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした。恥ずかしいのは消えたのか」
2187 = "「Sao thế. Hết thấy xấu hổ rồi à?」"
# 【日々姫】
# display as 日日姬
# JP: 「ほんなん消えるわけなか！\n恥ずかしかよ！　恥ずかしかけど――」
2186 = "「Làm gì có chuyện hết được chứ!\nXấu hổ lắm chứ! Xấu hổ lắm nhưng mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
2032 = "「Nhưng mà?」"
# monologue
# JP: すっと、日々姫は息を呑む。
3032 = "Hibiki khẽ nuốt nước bọt."
# monologue
# JP: そして静かに、ひとつずつ、\nゆっくりゆっくり、言葉を紡ぐ。
2982 = "Sau đó, em ấy lặng lẽ, chậm rãi,\ntừng lời từng lời cất lên."
# 【日々姫】
# display as 日日姬
# JP: 「恥ずかしがっていたら、私。\n――負けてしまいますから」
2416 = "「Nếu cứ mãi xấu hổ.\n——Em sẽ thua mất.」"
# monologue
# JP: 誰に、か。何で、か。\nそれを日々姫は語らない。だから僕にはわからない。
3022 = "Thua ai. Thua vì cái gì.\nHibiki không nói rõ. Nên tôi cũng không hiểu được."
# monologue
# JP: けれども強い決意が満ちていることだけは、\n言葉から態度から伝わってくる。
2719 = "Nhưng tôi có thể cảm nhận được quyết tâm mạnh mẽ tràn ngập,\nqua từng lời nói và thái độ của em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「ですから兄さん。\n今度は私が、お背中流してさしあげます」
2262 = "「Vì vậy anh hai à.\nLần này để em chà lưng cho anh nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# monologue
# JP: 正直、ハチロクは小さすぎ、あまりに時間がかかりすぎ、\n背中をタオルでごしごしされても、爽快感には乏しかった。
3198 = "Thành thật mà nói, Hachiroku quá nhỏ bé, làm tốn quá nhiều thời gian,\ndù có dùng khăn chà xát lên lưng cũng không mang lại cảm giác sảng khoái cho lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、強めで頼めるか」
2468 = "「Vậy thì, chà mạnh tay chút nhé.」"
# monologue
# JP: （ざばあっ）
3268 = "（Ào!）"
# 【日々姫】
# display as 日日姬
# JP: 「！！？」
# 2511 = "「！！？」" 
# monologue
# JP: （ざぶんっ！）
3269 = "（Ùm!）"
# monologue
# JP: 立った瞬間、\n日々姫が両手で顔をおおって、湯船に潜る。
2925 = "Ngay khoảnh khắc tôi đứng dậy,\nHibiki lấy hai tay ôm mặt rồi lặn ngụp xuống bồn tắm."
# 【日々姫】
# display as 日日姬
# JP: 「もががっ！　もがごぶがぶごぶっ！　ごぶぶ～っ！！」
2043 = "「Mogaga! Mogagobugabugobu! Gobubuuu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2106 = "「嗯？」" 
# monologue
# JP: 意味がわからん。
3173 = "Chẳng hiểu gì cả."
# monologue
# JP: けれどハチロクは「ああ、そうですね」とクスクス笑う。
3167 = "Nhưng Hachiroku lại cười khúc khích: \"À, ra là vậy.\""
# 【ハチロク】
# display as 八六
# JP: 「多分、ですけれど日々姫は、\n双鉄様に、お体を隠してほしいのでしょう」
2127 = "「Có lẽ là Hibiki muốn\nngài Soutetsu che cơ thể lại đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ががぼっ！」
2042 = "「Gagabo!」"
# monologue
# JP: ハチロクの声が聞こえているのか、\n湯船の中で目をつむったまま、日々姫が頷く。
3025 = "Không biết có nghe thấy lời Hachiroku không,\nnhưng Hibiki gật đầu trong khi vẫn nhắm chặt mắt dưới nước."
# monologue
# JP: そうだった。\n年頃の兄妹だから恥ずかしいのだと、聞かされていた。
2871 = "Đúng rồi nhỉ.\nTôi đã nghe em ấy nói là vì anh em đang tuổi mới lớn nên mới thấy xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。すっかり失念していた」
2270 = "「Xin lỗi nhé. Tôi quên khuấy mất.」"
# monologue
# JP: 前を隠して立ち上がる。\n湯船を出れば、背後でざばぁと音がする。
2946 = "Tôi che phía trước lại rồi đứng lên.\nKhi bước ra khỏi bồn tắm, phía sau vang lên tiếng nước đổ ào ào."
# 【双鉄】
# display as 雙鐵
# JP: 「前は隠した。\n日々姫、安心して背中を頼む」
2248 = "「Che phía trước rồi đấy.\nHibiki, yên tâm chà lưng cho tôi đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2104 = "「嗯」" 
# monologue
# JP: 綺麗になって家に戻って食事を終えれば、\nどっと眠気に襲われる。
3094 = "Sau khi tắm rửa sạch sẽ, trở về nhà và ăn xong bữa tối,\ncơn buồn ngủ ập đến dữ dội."
# monologue
# JP: が、やるべきはまだ残っている。\nまずは、布団を敷くことからだが。
2688 = "Nhưng vẫn còn việc phải làm.\nTrước tiên là phải trải nệm ra đã."
# 【ハチロク】
# display as 八六
# JP: 「綺麗に片付きましたね、このお部屋」
2453 = "「Căn phòng này được dọn dẹp gọn gàng quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「片付いたとは言わんだろう。\n荷物を全部、ただ次の間に押し込んだだけだ」
1895 = "「Như thế này thì không gọi là gọn gàng đâu.\nChỉ là tống hết đồ đạc sang phòng bên cạnh thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「それは、この部屋が片付いて、\n次の間が片付いていないというだけですよ」
2446 = "「Đó là do căn phòng này đã được dọn dẹp,\ncòn phòng bên cạnh thì chưa thôi ạ.」"
# monologue
# JP: 敷いた布団のシーツをちょこちょこ、\nハチロクの小さな手が整える。
2771 = "Đôi bàn tay nhỏ bé của Hachiroku\ntỉ mẩn vuốt lại ga trải giường."
# 【双鉄】
# display as 雙鐵
# JP: 「ときに、ハチロク」
2153 = "「Nhân tiện, Hachiroku này.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2184 = "「Vâng, thưa ngài Soutetsu.」"
# monologue
# JP: 日々姫も真闇姉もそれぞれの部屋。\nここには、僕とハチロクふたりきり。
3026 = "Hibiki và chị Mayami đều ở phòng riêng.\nỞ đây chỉ có tôi và Hachiroku."
# monologue
# JP: ようやく訪れたこの機会、\n逃すほど僕も間抜けではない。
2948 = "Cơ hội mãi mới đến này,\ntôi không ngốc đến mức để vuột mất."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;だが。お前――失くしたのか？」
1587 = "「Về chiếc \\x%l8620;#00ffc040;8620%l;#; đó. Cô——đã làm mất nó rồi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。\nふたりきりになるまで、お話を待っていただいて」
2199 = "「Cảm ơn ngài.\nVì đã đợi đến lúc chỉ còn hai chúng ta mới hỏi chuyện này.」"
# monologue
# JP: ハチロクが深々下げた頭は、\nもうそれだけで僕の問いかけを肯定している。
2769 = "Cái cúi đầu thật sâu của Hachiroku,\nđã đủ để khẳng định cho câu hỏi của tôi."
# monologue
# JP: だから焦らず、\nハチロクが語る言葉を待って、じっと聞く。
2970 = "Vì vậy tôi không vội vàng,\nmà lẳng lặng chờ đợi và lắng nghe những lời Hachiroku sắp nói."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とその\x%l列車;#00ffc040;列車%l;#;とは、\nいわば、血を分けたきょうだいです」
2216 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em và đoàn \\x%l列車;#00ffc040;tàu%l;#; của mình,\ncó thể nói là anh em ruột thịt cùng chung dòng máu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2104 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「本来であれば、わたくしは\x%l8620;#00ffc040;8620%l;#;の居場所をつかめます。\nどんなに離れていようとも、どんな状態にあろうとも」
2313 = "「Lẽ ra, em phải nắm được vị trí của \\x%l8620;#00ffc040;8620%l;#;.\nDù có cách xa đến đâu, hay ở trong bất kỳ trạng thái nào đi chăng nữa.」"
# monologue
# JP: ……それは単なるきょうだいではなく、\nむしろ双子に近かろう。
1582 = "……Vậy thì không đơn thuần chỉ là anh em,\nmà giống như sinh đôi hơn."
# monologue
# JP: 僕と路子も、そうだった。\nお互い、全てを――本当に全てをわけあえた。
2929 = "Tôi và Michiko cũng vậy.\nChúng tôi đã chia sẻ mọi thứ——thực sự là mọi thứ với nhau."
# 【ハチロク】
# display as 八六
# JP: 「ですからわたくしは、目覚めてすぐに\x%l8620;#00ffc040;8620%l;#;を求めました。\nけれど……それが――全く感じられないのです」
2251 = "「Vì vậy, ngay khi tỉnh dậy em đã tìm kiếm \\x%l8620;#00ffc040;8620%l;#;.\nNhưng…… em lại——không thể cảm nhận được nó một chút nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば探そう」
2470 = "「Vậy thì đi tìm thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「！」
# 2510 = "「！」" 
# monologue
# JP: それしかない。\nわかりきっている。
3254 = "Chỉ còn cách đó thôi.\nChuyện đã quá rõ ràng rồi."
# monologue
# JP: なのにハチロクは大きく目を開け、\n雷にでも打たれたかのような顔をする。
3107 = "Thế nhưng Hachiroku lại mở to hai mắt,\nkhuôn mặt sững sờ như thể vừa bị sét đánh trúng."
# 【双鉄】
# display as 雙鐵
# JP: 「離れすぎたゆえ、一時的に感じられないだけかもしれん。\n探して近くで触れ合えば、また感覚も戻るだろうさ」
2034 = "「Có lẽ do khoảng cách quá xa nên tạm thời cô không cảm nhận được thôi.\nNếu tìm thấy và tiếp xúc gần gũi, cảm giác đó sẽ quay lại thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「そう……でしょうか。\nそうなら、本当に嬉しいのですが」
2293 = "「Thật…… vậy sao ạ.\nNếu được như thế thì em thực sự rất vui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうならなければ、なるまで色々試せばいい」
2147 = "「Nếu không được thì cứ thử nhiều cách cho đến khi được mới thôi.」"
# monologue
# JP: しかし――それでももしも戻らなければ、\nハチロクはいよいよ故障品ということになりそうだ。
2721 = "Nhưng——nếu dù vậy mà vẫn không khôi phục lại được,\nthì có lẽ Hachiroku thực sự là một sản phẩm lỗi rồi."
# monologue
# JP: その点がはっきりするのなら、次はハチロクを修理する。\nそうして手順を正しく積めば、物事は必ず解決できる。
2984 = "Nếu điểm đó đã rõ ràng, thì tiếp theo sẽ sửa chữa Hachiroku.\nChỉ cần thực hiện đúng các bước, mọi chuyện chắc chắn sẽ được giải quyết."
# 【双鉄】
# display as 雙鐵
# JP: 「なに、焦るな。明けぬ夜は無い」
1987 = "「Không có gì phải vội. Không có đêm nào là không sáng.」"
# monologue
# JP: 生きながら死んでいたあの時期にも、\n僕は毎日を送っていた。
2839 = "Ngay cả trong khoảng thời gian sống không bằng chết đó,\ntôi vẫn trải qua mỗi ngày."
# monologue
# JP: だから、知ってる。\n生きてさえいれば、朝は来る。
2968 = "Nên tôi biết.\nChỉ cần còn sống, bình minh sẽ đến."
# 【ハチロク】
# display as 八六
# JP: 「そうですね。\nありがとうございます、双鉄様」
2419 = "「Vâng ạ.\nCảm ơn ngài rất nhiều, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「礼も焦っていうことはない。\n\x%l8620;#00ffc040;8620%l;#;を見つけたあとでも――更に先にでも、十分だ」
1888 = "「Không cần phải vội vàng cảm ơn đâu.\nSau khi tìm thấy \\x%l8620;#00ffc040;8620%l;#;——hay thậm chí là sau đó nữa, cũng chưa muộn.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2104 = "「嗯」" 
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を無事見つけたとして、\nハチロクは、その先何を望むのだろうか？
2725 = "Giả sử tìm thấy \\x%l8620;#00ffc040;8620%l;#; an toàn,\nthì Hachiroku sẽ mong muốn điều gì tiếp theo?"
# monologue
# JP: 僕はどこまで、ハチロクの望みに応えられるのだろうか。\n考えようとするけれど――頭も、体も、どうにも重い。
2942 = "Tôi có thể đáp ứng mong muốn của Hachiroku đến mức nào.\nTôi cố gắng suy nghĩ——nhưng cả đầu óc lẫn cơ thể đều nặng trĩu."
# 【双鉄】
# display as 雙鐵
# JP: 「疲れた。寝るぞ」
2387 = "「Mệt rồi. Đi ngủ thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2146 = "「Vâng, thưa ngài Soutetsu.」"
# monologue
# JP: 布団にもぐれば、離れたすみに、\nハチロクはちょこんと、ひどく遠慮がちにもぐりこむ。
2955 = "Khi tôi chui vào trong chăn, ở một góc xa,\nHachiroku cũng thu mình chui vào với vẻ vô cùng e dè."
# monologue
# JP: ああ、いや、そうか。そういえば――\nハチロクは乙女と、自らのことを言っていた、か。
2828 = "À, không, ra là vậy. Nhắc mới nhớ——\nHachiroku từng nói bản thân mình là một thiếu nữ nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「もしも、ここで眠るのが嫌なら」
2410 = "「Nếu cô không thích ngủ ở đây thì」"
# monologue
# JP: 言えば途端にハチロクは、\n体を起こし、静かに首を横に振る。
2923 = "Vừa dứt lời, Hachiroku liền\nngồi dậy và khẽ lắc đầu."
# 【ハチロク】
# display as 八六
# JP: 「イヤなことなどありません。双鉄様のお近くが――\nこの距離がわたくしには良いのです」
2336 = "「Không có chuyện em không thích đâu ạ. Ở gần ngài Soutetsu——\nKhoảng cách này là tốt nhất với em rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2448 = "「這樣啊」" 
# 【ハチロク】
# display as 八六
# JP: 「はい、おやすみなさいませ、双鉄様」
2303 = "「Vâng, chúc ngài ngủ ngon, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。お休み、ハチロク」
2103 = "「Ừ. Ngủ ngon nhé, Hachiroku.」"
# monologue
# JP: これ以上何もいうことはない。
2901 = "Chẳng còn gì để nói thêm nữa."
# monologue
# JP: 目を閉じ眠りに――\n引き込まれれば、それでいい。
3243 = "Chỉ cần nhắm mắt lại và chìm vào giấc ngủ——\nthế là đủ rồi."
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3265 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# monologue
# JP: ……ああ、この音か。\n\x%l列車;#00ffc040;列車%l;#;の音か。
1573 = "……A, âm thanh này.\nLà tiếng \\x%l列車;#00ffc040;tàu%l;#; chạy sao."
# monologue
# JP: 目を開け、\n自分が夢の中にいると知る。
2888 = "Mở mắt ra,\ntôi nhận ra mình đang ở trong một giấc mơ."
# 【双鉄】
# display as 雙鐵
# JP: 「まだこの\x%l列車;#00ffc040;列車%l;#;に乗っているのか」
1957 = "「Mình vẫn đang ở trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này sao.」"
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 妹、路子がそこにいるから。
2832 = "Bởi vì em gái tôi, Michiko đang ở đó."
# monologue
# JP: 事故のときと少しも変わらぬ小さな姿で。\nけれども全く、笑うことなく。
2851 = "Vẫn là dáng vẻ nhỏ bé không hề thay đổi so với lúc xảy ra tai nạn.\nNhưng lại không hề nở một nụ cười nào."
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか、たどり着けんものだな」
1923 = "「Mãi mà vẫn chưa đến nơi nhỉ.」"
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 路子から、ふたごの僕は、今はもう何も感じられない。
2893 = "Là anh em sinh đôi, nhưng giờ đây tôi không còn cảm nhận được gì từ Michiko nữa."
# monologue
# JP: 死の瞬間に、僕まで引きずり込まないように――\n路子が、僕を断ち切ったから。
2837 = "Để không kéo tôi theo vào khoảnh khắc cái chết ập đến——\nMichiko đã cắt đứt mối liên kết với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「この\x%l列車;#00ffc040;列車%l;#;は……どこへ向かっているのかな」
2451 = "「Chuyến \\x%l列車;#00ffc040;tàu%l;#; này…… đang đi về đâu vậy nhỉ.」"
# 【路子】
# display as 路子
# JP: 「知らない」
1890 = "「Em không biết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2207 = "「Anh cũng vậy.」"
# monologue
# JP: 本当は知っているはずだった。
2780 = "Đáng lẽ ra tôi phải biết."
# monologue
# JP: この\x%l列車;#00ffc040;列車%l;#;にのり、最後になってしまった旅を――\n路子と父さんと母さんと、そうして僕は、したのだから。
2694 = "Bởi vì chuyến hành trình cuối cùng trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này——\ntôi đã đi cùng Michiko, bố và mẹ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「思い出せなくなるものだな。\nいろいろと、きっと――大事なことも」
2226 = "「Cũng có những chuyện không thể nhớ ra được nhỉ.\nNhiều thứ, chắc chắn là——cả những chuyện quan trọng nữa.」"
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 車窓の景色は変わらない。\n流れてもすぐ、同じ景色が訪れる。
3225 = "Cảnh vật ngoài cửa sổ không hề thay đổi.\nDù có trôi qua thì ngay lập tức, cảnh vật tương tự lại hiện ra."
# monologue
# JP: 黄昏色で、単調で――\nひどく、寂しい光景だ。
2829 = "Sắc hoàng hôn, đơn điệu——\nMột khung cảnh vô cùng cô đơn."
# 【路子】
# display as 路子
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1591 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。奇妙なものだがな」
2090 = "「À, ừ. Một thứ kỳ lạ nhỉ.」"
# monologue
# JP: 伝わっているのか、いないのか。\n路子はそれを教えてくれない。
2683 = "Có truyền đạt được hay không.\nMichiko không nói cho tôi biết điều đó."
# monologue
# JP: わからないことが、とても不安だ。
2704 = "Việc không biết gì cả khiến tôi rất bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、僕は汰斗さんに教わったんだ。\n助けられなかった分、助けろと」
2334 = "「Nhưng, anh đã được ông Taito dạy bảo.\nHãy cứu giúp người khác để bù đắp cho những người mình không thể cứu.」"
# monologue
# JP: 後悔に凍り腐っていくより、\nそうする方がずっとマシだと。
2709 = "Thay vì cứ đóng băng và mục nát trong sự hối hận,\nthì làm như vậy sẽ tốt hơn nhiều."
# monologue
# JP: 誰かを助けた分きっと、\n自分が救われることもあろうと。
3238 = "Chắc chắn khi cứu giúp ai đó,\nbản thân mình cũng sẽ được cứu rỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らはふたごだ。僕が誰かを助ければ、\n路子が救われるかもしれないって。そう思うからさ」
2220 = "「Chúng ta là anh em sinh đôi. Nếu anh cứu giúp một ai đó,\nthì có lẽ Michiko cũng sẽ được cứu rỗi. Anh nghĩ vậy đấy.」"
# 【路子】
# display as 路子
# JP: 「だれかを助ける」
2260 = "「Cứu giúp ai đó.」"
# monologue
# JP: 父さんと母さんは乗ってない。\n路子はひとり、ずっと\x%l列車;#00ffc040;列車%l;#;に乗り続けている。
3112 = "Bố và mẹ không có trên tàu.\nMichiko vẫn luôn đi trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này một mình."
# monologue
# JP: だったら僕は路子を必ず、\n父さんと母さんの安らぐ場所へ、送ってあげたい。
2972 = "Nếu vậy thì tôi nhất định phải đưa Michiko,\nđến nơi bình yên có bố và mẹ."
# 【路子】
# display as 路子
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも？」
1997 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、義理の家族でも。\n見知らぬ他の誰であろうと、おんなじさ」
1891 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#;, hay gia đình nuôi.\nHay bất kỳ một người xa lạ nào khác, cũng đều giống nhau cả.」"
# monologue
# JP: 縁があり、この手がとどく範囲のことなら、\n僕は力を惜しまない。
2806 = "Nếu có duyên và nằm trong khả năng của mình,\ntôi sẽ không tiếc sức lực."
# monologue
# JP: 惜しんだところで、\n他にやりたい事も何一つない。
2876 = "Dù có tiếc thì,\ntôi cũng chẳng có việc gì khác muốn làm."
# 【双鉄】
# display as 雙鐵
# JP: 「何が正解かはわからない。どれが繋がるかもわからない。\nだったら全部を、正解と信じてやるしかないんだ」
2206 = "「Anh không biết đâu là câu trả lời đúng. Cũng không biết điều gì sẽ kết nối với nhau.\nVậy thì chỉ còn cách tin rằng tất cả đều là câu trả lời đúng và làm thôi.」"
# monologue
# JP: 諦めたら僕は路子を殺す。\n事故ではなく、僕の意思により殺してしまう。
2668 = "Nếu bỏ cuộc, tôi sẽ giết chết Michiko.\nKhông phải do tai nạn, mà là do chính ý chí của tôi."
# monologue
# JP: そうしないため、僕は生きる。\n生きて必ず、路子を安らかな場所へ届ける。
3105 = "Để không làm điều đó, tôi sẽ sống.\nSống để nhất định đưa Michiko đến một nơi bình yên."
# 【路子】
# display as 路子
# JP: 「そーちゃん」
2156 = "「Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、路子」
2105 = "「Ừ, Michiko.」"
# monologue
# JP: 路子が、僕の名前を呼ぶ。\n路子が、僕に手を伸ばす。
2849 = "Michiko gọi tên tôi.\nMichiko vươn tay về phía tôi."
# monologue
# JP: けれどその手は、届かない。\n僕は――目覚めてしまうから。
2722 = "Nhưng bàn tay ấy không thể chạm tới.\nBởi vì tôi——sẽ tỉnh giấc."
# 【双鉄】
# display as 雙鐵
# JP: 「早く――終着駅につけるといいな」
2168 = "「Mong sao——nhanh chóng đến được ga cuối.」"
# 【路子】
# display as 路子
# JP: 「うん」
# 2104 = "「嗯」" 
# monologue
# JP: 声だけ、聞こえる。
3169 = "Chỉ nghe thấy tiếng nói."
# monologue
# JP: けれどもう、何も見えない。\nそうして――声も聞こえなくなる。
2716 = "Nhưng không còn nhìn thấy gì nữa.\nRồi sau đó——tiếng nói cũng biến mất."
