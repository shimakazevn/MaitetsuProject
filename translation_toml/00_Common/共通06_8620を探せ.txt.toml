2183 = "「Sao vậy, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　赤って赤かとねー！」
2496 = "「Anh hai! Màu đỏ là màu đỏ nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
2106 = "「Hửm?」"
# monologue
# JP: 赤は赤い。
3154 = "Màu đỏ là màu đỏ."
# monologue
# JP: そんなことは至極当然だ。\nなんと返事をすればいいのか、いささか迷う。
3234 = "Đó là điều hiển nhiên.\nTôi hơi bối rối không biết nên trả lời thế nào."
# 【日々姫】
# display as 日日姬
# JP: 「お山、葉っぱが真っ赤やったと、\n絵ぇ描いとったら、おひさん、もっと赤かけんっ！」
2160 = "「Núi nè, lá cây đỏ rực luôn nè,\nlúc em vẽ tranh á, ông mặt trời còn đỏ hơn nữa cơ!」"
# monologue
# JP: （ばっ！）
3267 = "（Xòe!）"
# monologue
# JP: 日々姫が両手をぱっと広げる。\n一枚の画用紙がつられ、広がる。
