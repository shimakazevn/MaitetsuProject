2397 = "Học sinh mà lại thích dự thính hội đồng thành phố sao——\nTiền bối của Hibiki có vẻ là một người khá hiếm có."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2104 = "「Nghe nói bị la ó dữ lắm đó.\nMỗi khi thị trưởng lên bục phát biểu ở hội đồng thành phố.」"
# monologue
