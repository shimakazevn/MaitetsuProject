2174 = "「Hà sang, nồi hơi rồi lại cả \\x%lレイルロオド;#00ffc040;Railord%l;#;.\\nKhông biết đã bao nhiêu thập kỷ rồi nước tắm mới lại bị làm bẩn đây nhỉ」"

