2137 = "Trong giọng nói có vẻ ngán ngẩm của Hibiki,\nlại pha lẫn chút gì đó dịu dàng."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2109 = "「Dù nhìn từ góc độ nào cũng chỉ là một \\x%l列車;#00ffc040;đoàn tàu%l;#; rách nát như đống phế liệu,\nnhưng cô ấy cứ khăng khăng là “có giá trị lịch sử tuyệt vời” ở hội đồng thành phố hay gì đó.」"
# monologue
# JP: わかる気がする。
2930 = "Tôi có thể hiểu được."
# monologue
# JP: ポーレットのあの鉄道愛に、僕は直に触れているから。
2917 = "Bởi vì tôi đã trực tiếp cảm nhận được tình yêu đường sắt đó của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、ポーレットには真実なんだろうな。\n真実すぎて、説明の必要があるとわからんのだ」
2125 = "「Đối với Paulette, đó có lẽ là sự thật.\nSự thật đến mức cô ấy không nhận ra là cần phải giải thích.」"
# 【日々姫】
# display as 日日姬
