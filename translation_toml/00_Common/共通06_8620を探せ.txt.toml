2308 = "「Bác chủ nhà tắm Tororu-yu, đã lâu không gặp bác ạ」"

# 【登呂流湯主人】(？？？)
# JP: 「おお、日々姫ちゃんかい。ひさしかぶりねぇ」
3126 = "「Ồ, Hibiki-chan đấy à. Lâu quá rồi không gặp cháu nha」"

# 【日々姫】
# JP: 「はい、少しバタバタしていて、\nご無沙汰してしまいました」
2853 = "「Vâng ạ, thời gian qua cháu có chút bận rộn nên\\nđã lâu không tới thăm bác được」"

# (独白)
