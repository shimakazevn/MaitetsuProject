1982 = "Cũng như tòa nhà này, bà cụ toát lên một vẻ sương gió và già cỗi rõ rệt.\\nHibiki gọi là bác, nhưng nhìn kiểu gì thì nhìn, rõ ràng là một bà lão."

# 【登呂流湯主人】
# JP: 「なんね。さっさと入りゃあよかとに。\n一体全体、どぎゃんしたと？」
2938 = "「Gì thế. Mau vào đi cho rảnh.\\nRốt cuộc là có chuyện chi vậy?」"

# 【日々姫】
