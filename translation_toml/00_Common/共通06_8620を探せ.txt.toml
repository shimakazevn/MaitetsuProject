2845 = "Có vẻ Hibiki cũng nhớ ra.\nCái ngày em ấy dạy cho tôi biết rằng màu đỏ là màu đỏ——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、にぃにー！」
2495 = "「Anh hai, anh hai!」"
# 【双鉄】
# display as 雙鐵
