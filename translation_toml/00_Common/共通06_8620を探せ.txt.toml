# 【双鉄】
# display as 雙鐵
# JP: 「赤は赤だ。それはあまりに真実すぎて、\n言葉ではうまく説明できん。その必要も感じない」
2386 = "Ra là vậy——tôi đã bỏ lỡ nó.\nMàu đỏ......lại đỏ đến mức này sao――――"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
2304 = "「Màu đỏ là màu đỏ. Đó là một sự thật hiển nhiên,\nđến mức không thể dùng lời để giải thích. Và cũng không cảm thấy cần thiết phải làm vậy.」"
# 【双鉄】
# display as 雙鐵
