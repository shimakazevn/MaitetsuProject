[script]
# lines: 466 
# monologue
# JP: ……ようやく、帰宅だ。
1577 = "......Cuối cùng cũng về đến nhà."
# monologue
# JP: 普段であれば、「ただいま」と一言いって、\nそのままあがっていけるのだが――
2985 = "Bình thường thì chỉ cần nói một câu “Anh về rồi đây”,\nrồi cứ thế bước vào nhà là xong, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「今戻った！　すまんが、誰かいないか？」
2222 = "「Anh mới về! Xin lỗi, có ai ở nhà không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あら、兄さん。お帰りなさいませ」
2064 = "「A, anh trai. Mừng anh đã về.」"
# monologue
# JP: 日々姫が二階にいたようだ。
3031 = "Có vẻ Hibiki đang ở trên lầu."
# monologue
# JP: 取り澄ました声。\nとととと軽やかな駆け下り音。
2674 = "Một giọng nói trong trẻo.\nCùng tiếng bước chân chạy xuống cầu thang nhẹ nhàng lạch cạch."
# 【日々姫】
# display as 日日姬
# JP: 「どうしたんですか？　玄関先で――って、え！？\n何があったと？　にぃにぃ、真っ黒ばい」
2185 = "「Có chuyện gì vậy ạ? Sao anh lại đứng ngoài cửa——ủa, hả!?\nCó chuyện gì vậy? Anh hai, đen thui thùi lùi luôn rồi nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはりか。そんなにひどいか」
2322 = "「Quả nhiên là vậy. Tệ đến mức đó sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「待っとって！　今、拭くもん」
2384 = "「Anh đợi chút! Em lấy đồ lau cho.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。この汚れは石炭だ。\n拭いたところでタオルをダメにするだけだろうさ」
1885 = "「Không cần đâu. Vết bẩn này là do than đá.\nCó lau thì cũng chỉ làm hỏng khăn thôi.」"
# monologue
# JP: 百杯の後、四百杯。つまりは合計500キロ。\n一升瓶で数えるのなら、277本と少し。
2669 = "Sau 100 xẻng là 400 xẻng nữa. Tóm lại là tổng cộng 500 kg.\nNếu tính bằng chai 1 lít thì là hơn 277 chai một chút."
# monologue
# JP: そう考えれば大した数とも思えないのだが、\n姿勢のとり方が良くないらしく、腰の負担が些かキツい。
3235 = "Nghĩ vậy thì cũng không thấy nhiều lắm,\nnhưng có vẻ do tư thế của tôi không đúng, nên eo hơi bị mỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「顔にも随分と粉を浴びた気がしたが真っ黒とはな。\nナビが僕を乗せてくれなかったのはそういう理由か」
2402 = "「Cứ tưởng mặt chỉ dính chút bụi thôi, ai ngờ lại đen thui thế này.\nĐó là lý do Navi không chịu chở tôi sao.」"
# monologue
# JP: 言えばむうっと、日々姫の眉根が寄せられる。
3174 = "Nghe tôi nói vậy, Hibiki cau mày lại."
# 【日々姫】
# display as 日日姬
# JP: 「あんの――んんっ、結構わがままですよねあの\\x%lエアクラ;#00ffc040;エアクラ%l;#;。\n兄さんの命を守るだなんて偉そうに言ってるくせに」
2463 = "「Cái đồ——hừm, chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; đó cũng ích kỷ ghê nhỉ.\nMiệng thì cứ leo lẻo là bảo vệ mạng sống của anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。ナビの言動に矛盾はないよ」
1909 = "「Không đâu. Lời nói và hành động của Navi không hề mâu thuẫn.」"
# monologue
# JP: 頭上を指さす。\n日々姫の眉根のシワがいっそう深くなる。
2936 = "Tôi chỉ tay lên trời.\nNếp nhăn trên trán Hibiki càng hằn sâu hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は[たんじん,1]炭塵にまみれすぎ、精密機器であるナビに\n悪影響を与えてしまう可能性があるそうだ」
2246 = "「Tôi bị dính quá nhiều bụi than, có khả năng sẽ gây ảnh hưởng xấu\nđến một thiết bị tinh vi như Navi.」"
# monologue
# JP: “シートを汚されるのがイヤという理由ではありません。\n決して”
3240 = "“Không phải vì tôi ghét việc ghế bị bẩn đâu.\nTuyệt đối không phải vậy.”"
# monologue
# JP: ナビはそう言い、僕を乗せないその代わり、\n上空からずっとフォローしてきた。
3247 = "Navi đã nói vậy, và thay vì chở tôi,\ncô ấy đã luôn theo dõi tôi từ trên cao."
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
2082 = "「A!」"
# monologue
# JP: 僕の視線を追った日々姫がナビを見つける。\nナビは小さく旋回し、酒造上空から飛び去っていく。
3066 = "Nhìn theo ánh mắt của tôi, Hibiki đã phát hiện ra Navi.\nNavi lượn một vòng nhỏ, rồi bay đi khỏi bầu trời phía trên xưởng rượu."
# 【日々姫】
# display as 日日姬
# JP: 「……逃げましたね」
1607 = "「......Chạy mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「逃げんさ。僕が帰宅し安全になったと見ただけだ。\n着水して、ハチロクを下ろしてくるのだろうよ」
1879 = "「Không chạy đâu. Chắc cô ấy thấy tôi về đến nhà an toàn rồi thôi.\nGiờ chắc đang hạ cánh xuống nước để thả Hachiroku xuống đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク……さん。\nあの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗っているのですか？」
1979 = "「Chị......Hachiroku.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đó, đang ngồi trên \\x%lエアクラ;#00ffc040;Aircra%l;#; sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。汚れづらい表面処理がされているとかなんとかだ。\nが――技術だろうな。僕との汚れ具合の違いは」
2097 = "「Ừm. Nghe bảo là bề mặt được xử lý chống bám bẩn hay gì đó.\nNhưng mà——chắc là do kỹ thuật thôi. Sự khác biệt về mức độ bám bẩn giữa tôi và cô ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「技術？　なんの技術ですか？」
2265 = "「Kỹ thuật? Kỹ thuật gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l投炭;#00ffc040;投炭%l;#;だ。石炭を\\x%l火室;#00ffc040;[かしつ,1]火室%l;#;に投げ込む技術だ」
1596 = "「\\x%l投炭;#00ffc040;Ném than%l;#;. Là kỹ thuật ném than vào \\x%l火室;#00ffc040;buồng lửa%l;#; đấy.」"
# monologue
# JP: 手振りを交え、\\x%l投炭;#00ffc040;投炭%l;#;について説明していく。
2951 = "Vừa làm điệu bộ bằng tay, tôi vừa giải thích về việc \\x%l投炭;#00ffc040;ném than%l;#;."
# monologue
# JP: うんうん頷く日々姫の顔が、\n緩く炙られた石炭のように、じわじわと赤みを増していく。
3021 = "Khuôn mặt đang gật gù của Hibiki,\ndần dần đỏ lên như hòn than đang được nướng nhẹ."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃを\\x%l機関士;#00ffc040;機関士%l;#;に！？　そんなん！\n家におってくれる時間が減って――じゃなくて！」
2422 = "「Để anh hai làm \\x%l機関士;#00ffc040;người lái tàu%l;#;!? Chuyện đó!\nThời gian anh ở nhà sẽ bị giảm đi mất——à không phải!」"
# monologue
# JP: 慌てて口をつぐんできょろきょろ。\nそれからぽんっと手をたたき、日々姫は偉そうな顔をする。
3062 = "Em ấy vội vàng ngậm miệng lại và nhìn quanh quất.\nSau đó vỗ tay một cái \"bốp\", Hibiki làm ra vẻ mặt tự mãn."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対のために帰ってきたのに、\nそのための活動時間が減ってしまうじゃないですか」
2058 = "「Anh trai trở về là để phản đối việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; mà,\nthời gian hoạt động cho việc đó sẽ bị giảm đi chẳng phải sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誘致賛成派ではなかったのか？　日々姫は」
1947 = "「Chẳng phải Hibiki thuộc phe ủng hộ sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それはそれ、これはこれです」
2450 = "「Chuyện nào ra chuyện đó chứ.」"
# monologue
# JP: それ、で両手をそろえて右に。\nこれ、で両手をそろえて左に。
2857 = "Chuyện nào, em ấy đưa hai tay sang phải.\nChuyện đó, em ấy đưa hai tay sang trái."
# monologue
# JP: こんな細かなところでも、日々姫は真面目で懸命だ。
2878 = "Ngay cả trong những chi tiết nhỏ nhặt thế này, Hibiki cũng rất nghiêm túc và nỗ lực."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんの優しさにつけこんで、\n兄さんの時間を奪うだなんて、少し良くないと思います」
1989 = "「Lợi dụng lòng tốt của anh trai,\nđể cướp đi thời gian của anh, em nghĩ như vậy là không tốt chút nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに僕も、\n無関係なことに時間を奪われてはかなわん」
2240 = "「Quả thực, tôi cũng\nkhông thể để mất thời gian vào những việc không liên quan được.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですよね！」
2154 = "「Đúng vậy nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、\\x%l機関士;#00ffc040;機関士%l;#;云々も実は、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対運動に繋げられるかもしれんのだ」
2027 = "「Nhưng mà, thực ra chuyện \\x%l機関士;#00ffc040;người lái tàu%l;#; gì đó,\ncó lẽ cũng có thể liên kết với phong trào phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　それってどういう意味ですか？」
2055 = "「Hả? Ý anh là sao?」"
# monologue
# JP: たとえ賛成・反対両派にわかれていても、\n日々姫は僕の[いもうと,1]義妹だ。
2740 = "Cho dù có bị chia rẽ thành hai phe ủng hộ và phản đối,\nthì Hibiki vẫn là em gái nuôi của tôi."
# monologue
# JP: 隠し立てする事もなく、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;による観光振興云々の案を、まるまる伝える。
2908 = "Không giấu giếm điều gì,\ntôi kể lại toàn bộ kế hoạch chấn hưng du lịch bằng \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「まだぼんやりとした案でしかないがな。\n観光振興は、環境保全意識の高まりへも繋がるだろう」
2364 = "「Dù chỉ mới là một kế hoạch mơ hồ thôi.\nNhưng chấn hưng du lịch cũng sẽ dẫn đến việc nâng cao ý thức bảo vệ môi trường.」"
# 【日々姫】
# display as 日日姬
# JP: 「……確かに、観光と誘致反対とは繋がりそうですね。\nもし、観光振興をうまくできれば――ですけど」
1610 = "「......Đúng là, du lịch và việc phản đối thu hút nhà máy có vẻ liên quan đến nhau nhỉ.\nNếu, có thể chấn hưng du lịch thành công——thì là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さてそこだ」
2093 = "「Vấn đề là ở chỗ đó.」"
# monologue
# JP: この案には大きな不安要素がある。\n思考でか、直感でか、日々姫はそれに気付いているようだ。
3233 = "Kế hoạch này có một yếu tố bất ổn lớn.\nDù là do suy luận hay trực giác, có vẻ Hibiki cũng đã nhận ra điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクの[ハチロクニイマル,3]8620形は、\n観光客誘致の大きな目玉になるという話らしいが」
2396 = "「Dòng 8620 của Hachiroku,\nnghe nói sẽ trở thành điểm nhấn lớn để thu hút khách du lịch.」"
# 【日々姫】
# display as 日日姬
# JP: 「はちろくにいまるけい……ですか？\nそれは、そんなに魅力的な機関車なんですか？」
2513 = "「Dòng 8620......sao ạ?\nĐó là một chiếc đầu máy hấp dẫn đến vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからん」
1882 = "「Tôi cũng không biết.」"
# 【日々姫】
# display as 日日姬
# JP: 「わからんて！　んんっ、\n本当に、まだふわふわしたお話なんですね」
1950 = "「Anh không biết á! Hừm,\nđúng là, câu chuyện vẫn còn mơ hồ quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も実物を見ていないからな。\n大変に美しいとポーレットは言っていたが」
2209 = "「Vì tôi cũng chưa được nhìn tận mắt mà.\nMặc dù Paulette nói là nó vô cùng đẹp.」"
# monologue
# JP: 言えば途端、\n日々姫は小さく息を飲み込む。
2924 = "Vừa nói xong,\nHibiki khẽ nín thở."
# 【日々姫】
# display as 日日姬
# JP: 「……ポーレットって、市長さん？」
1612 = "「......Paulette, là thị trưởng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2295 = "「Ừ.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さん、\nいつの間に市長とお知り合いに？」
2494 = "「Anh hai——anh trai,\nquen biết với thị trưởng từ khi nào vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前からの知り合いのような気もしたのだが――\n実際のところは、つい先程が初対面らしい」
2498 = "「Cứ có cảm giác như đã quen biết từ trước rồi——\nNhưng thực tế thì, có vẻ lúc nãy mới là lần gặp đầu tiên.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　えっ……ええっと――」
2053 = "「Hả? Hả......ừm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは市長であるだけでなく、\n御一夜鉄道の社長でもあり、\\x%l運転士;#00ffc040;運転士%l;#;まで兼任している」
2347 = "「Paulette không chỉ là thị trưởng,\nmà còn là giám đốc của Đường sắt Ohimitera, kiêm luôn cả \\x%l運転士;#00ffc040;người lái tàu%l;#; nữa.」"
# monologue
# JP: すぐさま日々姫はこくりと頷く。
3059 = "Hibiki lập tức gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「はい、それは知ってます。\n私だって[ゆのい,1]湯医の学園に通ってますから」
2306 = "「Vâng, chuyện đó thì em biết.\nVì em cũng đang học ở trường Yunoi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな」
# 2295 = "「是啊」" 
# monologue
# JP: 湯医は、御一夜鉄道湯医線の終着駅だ。\n学園の他には、温泉医療施設がある。
3102 = "「Ra là vậy.」"
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;可動不能区域である旧術仙炭鉱近辺を抜け、\n御一夜-湯医の往復客を、主に湯医線は運んでいるらしい。
3103 = "Yunoi là ga cuối của tuyến Yunoi thuộc Đường sắt Ohimitera.\nNgoài trường học ra, còn có cơ sở y tế suối nước nóng."
# 【双鉄】
# display as 雙鐵
# JP: 「知り合いになったきっかけは、\n僕の\\x%lエアクラ;#00ffc040;エアクラ%l;#;の不時着だ」
2218 = "Đi qua khu vực mỏ than cũ Jutsusen, nơi \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động,\ntuyến Yunoi chủ yếu chuyên chở hành khách khứ hồi giữa Ohimitera và Yunoi."
# 【日々姫】
# display as 日日姬
# JP: 「ああ！\nそれで市長さんとれいなちゃんに助けられたと？」
2084 = "「Cơ duyên quen biết là do\nchiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; của tôi phải hạ cánh khẩn cấp.」"
# 【双鉄】
# display as 雙鐵
