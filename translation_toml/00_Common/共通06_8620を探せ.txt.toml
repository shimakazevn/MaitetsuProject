2030 = "「Vâng.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1600 = "「Nhưng, đôi mắt của Hibiki đã nhìn thấy màu đỏ mà tôi bỏ lỡ.\nQua bức tranh của Hibiki——tôi đã thực sự hiểu được rằng màu đỏ là màu đỏ.」"
# monologue
# JP: 赤い頬をして黙ってしまう。
3060 = "「............」"
# monologue
