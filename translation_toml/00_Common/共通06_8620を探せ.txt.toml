2398 = "「Nghe nói là vậy. Nói năng lộn xộn hết cả lên......\nVì thế, những đề xuất của thị trưởng chưa bao giờ được thông qua cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2003 = "「Ra là vậy.」"
# monologue
