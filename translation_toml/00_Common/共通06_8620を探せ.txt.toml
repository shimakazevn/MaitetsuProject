2019 = "「Nếu vậy, sau khi tắm xong ngài nên xoa bóp cơ thể.\\nCảm giác mệt mỏi vào sáng hôm sau sẽ vơi đi rõ rệt đấy ạ」"

# 【双鉄】
# JP: 「ふむ。あんまの類にはまるで心得が無いのだが」
3085 = "「Hửm. Nhưng ta hoàn toàn không biết gì về mấy việc đấm bóp này cả」"

# 【ハチロク】
