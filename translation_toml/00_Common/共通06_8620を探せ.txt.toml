2216 = "Vì vậy, tôi không vội vã,\\nchỉ lặng lẽ lắng nghe, chờ đợi những lời tiếp theo từ Hachiroku."

# 【ハチロク】
# JP: 「わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とその\x%l列車;#00ffc040;列車%l;#;とは、\nいわば、血を分けたきょうだいです」
2313 = "「Giữa các \\x%lレイルロオド;#00ffc040;Railord%l;#; và \\x%l列車;#00ffc040;tàu%l;#; của mình,\\ncó thể coi như là anh chị em ruột thịt chia chung một dòng máu vậy」"

# 【双鉄】
# JP: 「本来であれば、わたくしは\x%l8620;#00ffc040;8620%l;#;の居場所をつかめます。\nどんなに離れていようとも、どんな状態にあろうとも」
1582 = "「Nếu như bình thường, em hoàn toàn có thể cảm nhận được vị trí của \\x%l8620;#00ffc040;8620%l;#;.\\nDù cho có cách xa đến đâu, hay đang ở trong tình trạng nào đi chăng nữa」"

# (独白)
# JP: ……それは単なるきょうだいではなく、\nむしろ双子に近かろう。
2929 = "……Đó không chỉ đơn thuần là anh chị em,\\nmà có lẽ phải gần như một cặp song sinh mới đúng."

# (独白)
# JP: 僕と路子も、そうだった。\nお互い、全てを――本当に全てをわけあえた。
2251 = "Tôi và Michiko cũng đã từng như vậy.\\nCả hai có thể chia sẻ cùng nhau mọi thứ――thật sự là tất cả mọi thứ."

# 【ハチロク】
# JP: 「ですからわたくしは、目覚めてすぐに\x%l8620;#00ffc040;8620%l;#;を求めました。\nけれど……それが――全く感じられないのです」
2470 = "「Chính vì thế, ngay khi vừa tỉnh giấc, em đã tìm kiếm \\x%l8620;#00ffc040;8620%l;#; ngay lập tức.\\nNhưng mà…… em lại――chẳng cảm nhận được một chút gì cả」"

# 【双鉄】
# JP: 「ならば探そう」
3254 = "「Nếu vậy thì cùng đi tìm thôi」"

# 【ハチロク】
# JP: 「！」
3107 = "「！」"

# (独白)
# JP: それしかない。\nわかりきっている。
2034 = "Chỉ có thể làm vậy.\\nĐiều đó quá đỗi rõ ràng rồi."

# (独白)
# JP: なのにハチロクは大きく目を開け、\n雷にでも打たれたかのような顔をする。
2293 = "Thế nhưng Hachiroku lại mở to hai mắt,\\ngương mặt sững sờ như thể vừa bị sét đánh ngang tai."

# 【双鉄】
# JP: 「離れすぎたゆえ、一時的に感じられないだけかもしれん。\n探して近くで触れ合えば、また感覚も戻るだろうさ」
2147 = "「Có lẽ vì khoảng cách quá xa nên tạm thời không cảm nhận được thôi.\\nCứ đi tìm rồi đến gần chạm vào nó, biết đâu cảm giác ấy sẽ quay trở lại」"

# 【ハチロク】
# JP: 「そう……でしょうか。\nそうなら、本当に嬉しいのですが」
2721 = "「Có thật là…… như vậy không anh.\\nNếu được như thế, em thực sự sẽ hạnh phúc lắm」"

# 【双鉄】
# JP: 「そうならなければ、なるまで色々試せばいい」
2984 = "「Nếu không được như thế, thì cứ thử đủ mọi cách cho đến khi được mới thôi」"

# (独白)
# JP: しかし――それでももしも戻らなければ、\nハチロクはいよいよ故障品ということになりそうだ。
1987 = "Thế nhưng――dù vậy, nếu cô ấy vẫn không hồi phục được,\\nhữu danh vô thực, Hachiroku rốt cuộc sẽ thực sự trở thành một món hàng lỗi."

# (独白)
# JP: その点がはっきりするのなら、次はハチロクを修理する。\nそうして手順を正しく積めば、物事は必ず解決できる。
2839 = "Nếu điểm đó đã được làm sáng tỏ, bước tiếp theo sẽ là sửa chữa Hachiroku.\\nCứ tiến hành từng bước chuẩn xác như thế, mọi chuyện chắc chắn sẽ được giải quyết."

# 【双鉄】
# JP: 「なに、焦るな。明けぬ夜は無い」
2968 = "「Không có gì phải vội cả. Đêm tối rồi cũng sẽ qua, ngày mai rồi cũng sẽ đến」"

# (独白)
# JP: 生きながら死んでいたあの時期にも、\n僕は毎日を送っていた。
2419 = "Ngay cả trong khoảng thời gian sống dở chết dở đó,\\ntôi vẫn trải qua những chuỗi ngày tẻ nhạt thường nhật."

# (独白)
# JP: だから、知ってる。\n生きてさえいれば、朝は来る。
1888 = "Thế nên, tôi hiểu rõ.\\nChỉ cần còn sống, bình minh chắc chắn sẽ tới."

# 【ハチロク】
# JP: 「そうですね。\nありがとうございます、双鉄様」
2725 = "「Đúng vậy nhỉ.\\nEm xin cảm ơn anh, anh Soutetsu」"

# 【双鉄】
# JP: 「礼も焦っていうことはない。\n\x%l8620;#00ffc040;8620%l;#;を見つけたあとでも――更に先にでも、十分だ」
2942 = "「Lời cảm ơn cũng không cần phải vội vã.\\nSau khi tìm thấy \\x%l8620;#00ffc040;8620%l;#;――hoặc thậm chí sau đó nữa, vẫn chưa muộn mà」"

# (独白)
# JP: \x%l8620;#00ffc040;8620%l;#;を無事見つけたとして、\nハチロクは、その先何を望むのだろうか？
2387 = "Ngay cả khi tìm thấy \\x%l8620;#00ffc040;8620%l;#; một cách an toàn,\\nliệu sau đó, Hachiroku sẽ mong muốn điều gì tiếp theo đây?"

# (独白)
# JP: 僕はどこまで、ハチロクの望みに応えられるのだろうか。\n考えようとするけれど――頭も、体も、どうにも重い。
2146 = "Tôi có thể đáp lại nguyện vọng của Hachiroku đến nhường nào?\\nTôi cố gắng suy nghĩ――nhưng cả đầu óc lẫn cơ thể đều nặng trĩu."

# 【双鉄】
# JP: 「疲れた。寝るぞ」
2955 = "「Mệt rồi. Đi ngủ thôi」"

# (独白)
# JP: 布団にもぐれば、離れたすみに、\nハチロクはちょこんと、ひどく遠慮がちにもぐりこむ。
2828 = "Khi tôi chui vào chăn, ở một góc xa xôi,\\nHachiroku cũng rụt rè, khép nép chui vào một cách đầy e dè."

# (独白)
# JP: ああ、いや、そうか。そういえば――\nハチロクは乙女と、自らのことを言っていた、か。
2410 = "À, không, ra là vậy. Nhắc mới nhớ――\\nHachiroku từng tự xưng mình là một thiếu nữ cơ mà."

# 【双鉄】
# JP: 「もしも、ここで眠るのが嫌なら」
2923 = "「Nếu như cô không thích ngủ ở đây...」"

# (独白)
# JP: 言えば途端にハチロクは、\n体を起こし、静かに首を横に振る。
2336 = "Vừa dứt lời, Hachiroku lập tức\\nngồi dậy, khẽ lắc đầu từ chối."

# 【ハチロク】
# JP: 「イヤなことなどありません。双鉄様のお近くが――\nこの距離がわたくしには良いのです」
2303 = "「Không có chuyện em thấy khó chịu đâu ạ. Ở bên cạnh Soutetsu-sama―― khoảng cách thế này là tuyệt vời nhất với em rồi」"

# 【双鉄】
# JP: 「はい、おやすみなさいませ、双鉄様」
2103 = "「Vâng, chúc Soutetsu-sama ngủ ngon ạ」"

# 【双鉄】
# JP: 「うん。お休み、ハチロク」
2901 = "「Ừ. Ngủ ngon nhé, Hachiroku」"

# (独白)
# JP: これ以上何もいうことはない。
3243 = "Đến đây thì chẳng còn gì để nói thêm nữa."

# (独白)
# JP: 目を閉じ眠りに――\n引き込まれれば、それでいい。
3265 = "Chỉ cần nhắm mắt lại và để bản thân―― chìm sâu vào giấc ngủ là được rồi."

# (独白)
# JP: （カトン、トトン、\nタタン、タタン――）
1573 = "(Kịch túc, kịch túc,\\n kịch tặc, kịch tặc――)"

# (独白)
# JP: ……ああ、この音か。\n\x%l列車;#00ffc040;列車%l;#;の音か。
2888 = "……A, ra là tiếng động này sao.\\nLà tiếng của \\x%l列車;#00ffc040;tàu%l;#; chạy ư."

# (独白)
# JP: 目を開け、\n自分が夢の中にいると知る。
1957 = "Mở mắt ra,\\n tôi nhận thức được mình đang ở trong một giấc mơ."

# 【双鉄】
# JP: 「まだこの\x%l列車;#00ffc040;列車%l;#;に乗っているのか」
2832 = "「Mình vẫn còn đang trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này sao」"

# (独白)
# JP: 妹、路子がそこにいるから。
2851 = "Bởi vì Michiko, em gái tôi, đang ở ngay kia."

# (独白)
# JP: 事故のときと少しも変わらぬ小さな姿で。\nけれども全く、笑うことなく。
1923 = "Vẫn là dáng người nhỏ bé không chút thay đổi so với thời điểm xảy ra tai nạn.\\nNhưng em ấy hoàn toàn, không hề mỉm cười."

# 【双鉄】
# JP: 「なかなか、たどり着けんものだな」
2893 = "「Mãi mà vẫn chưa đến nơi được nhỉ」"

# (独白)
# JP: 路子から、ふたごの僕は、今はもう何も感じられない。
2837 = "Từ Michiko, tôi của hiện tại - người anh em song sinh của em ấy - đã chẳng còn cảm nhận được bất cứ điều gì nữa."

# (独白)
# JP: 死の瞬間に、僕まで引きずり込まないように――\n路子が、僕を断ち切ったから。
2451 = "Để không kéo cả tôi vào thời khắc cận kề cái chết――\\nMichiko đã chủ động cắt đứt mối liên kết với tôi."

# 【双鉄】
# JP: 「この\x%l列車;#00ffc040;列車%l;#;は……どこへ向かっているのかな」
1890 = "「Chuyến \\x%l列車;#00ffc040;tàu%l;#; này…… rốt cuộc là đang hướng về nơi đâu đây」"

# 【路子】
# JP: 「知らない」
2207 = "「Em không biết」"

# 【双鉄】
# JP: 「僕もだ」
2780 = "「Anh cũng vậy」"

# (独白)
# JP: 本当は知っているはずだった。
2694 = "Thật ra, đáng lẽ tôi phải biết rõ."

# (独白)
# JP: この\x%l列車;#00ffc040;列車%l;#;にのり、最後になってしまった旅を――\n路子と父さんと母さんと、そうして僕は、したのだから。
2226 = "Bởi vì chuyến đi cuối cùng trên đoàn \\x%l列車;#00ffc040;tàu%l;#; này――tôi đã đi cùng Michiko, cùng cha và mẹ."

# 【双鉄】
# JP: 「思い出せなくなるものだな。\nいろいろと、きっと――大事なことも」
3225 = "「Đúng là ký ức rồi cũng sẽ phai nhòa nhỉ.\\nChắc chắn là... bao gồm cả những điều rất quan trọng nữa」"

# (独白)
# JP: 車窓の景色は変わらない。\n流れてもすぐ、同じ景色が訪れる。
2829 = "Khung cảnh bên ngoài ô cửa sổ xe chẳng hề thay đổi.\\nCứ trôi qua rồi, một cảnh tượng y hệt lại hiện ra."

# (独白)
# JP: 黄昏色で、単調で――\nひどく、寂しい光景だ。
1591 = "Một khung cảnh ngập sắc hoàng hôn, đơn điệu――\\nvà cô quạnh đến ngút ngàn."

# 【路子】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
2090 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;」"

# 【双鉄】
# JP: 「ああ、うん。奇妙なものだがな」
2683 = "「Ừ, đúng thế. Dù chuyện đó có hơi kỳ lạ thật」"

# (独白)
# JP: 伝わっているのか、いないのか。\n路子はそれを教えてくれない。
2704 = "Không rõ cô ấy có hiểu được hay không.\\nMichiko không hề cho tôi biết câu trả lời."

# (独白)
# JP: わからないことが、とても不安だ。
2334 = "Việc không thể thấu hiểu khiến lòng tôi ngập tràn bất an."

# 【双鉄】
# JP: 「だが、僕は汰斗さんに教わったんだ。\n助けられなかった分、助けろと」
2709 = "「Nhưng anh đã được chú Taito chỉ dạy rồi.\\nHãy ra tay giúp đỡ người khác, để bù đắp cho những phần mà mình đã không thể cứu vãn」"

# (独白)
# JP: 後悔に凍り腐っていくより、\nそうする方がずっとマシだと。
3238 = "Rằng việc làm như thế sẽ tốt hơn nhiều,\\nso với cứ để bản thân mục rữa và đóng băng trong hối hận."

# (独白)
# JP: 誰かを助けた分きっと、\n自分が救われることもあろうと。
2220 = "Rằng mỗi khi ta giúp đỡ được một ai đó,\\nchắc hẳn bản thân ta cũng sẽ tìm thấy sự cứu rỗi."

# 【双鉄】
# JP: 「僕らはふたごだ。僕が誰かを助ければ、\n路子が救われるかもしれないって。そう思うからさ」
2260 = "「Chúng ta là hai anh em sinh đôi. Anh nghĩ rằng nếu anh giúp đỡ ai đó, biết đâu Michiko cũng sẽ được cứu rỗi. Anh luôn tin là như vậy」"

# 【路子】
# JP: 「だれかを助ける」
3112 = "「Giúp đỡ một ai đó」"

# (独白)
# JP: 父さんと母さんは乗ってない。\n路子はひとり、ずっと\x%l列車;#00ffc040;列車%l;#;に乗り続けている。
2972 = "Bố và mẹ không có trên tàu.\\nMichiko chỉ có một mình, suốt bấy nhiêu lâu vẫn cứ tiếp tục đi trên chuyến \\x%l列車;#00ffc040;tàu%l;#;."

# (独白)
# JP: だったら僕は路子を必ず、\n父さんと母さんの安らぐ場所へ、送ってあげたい。
1997 = "Nếu đã vậy, nhất định anh phải đưa Michiko\\nđến được nơi mà bố mẹ đang yên nghỉ."

# 【路子】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも？」
1891 = "「Dù có là \\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa?」"

# 【双鉄】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、義理の家族でも。\n見知らぬ他の誰であろうと、おんなじさ」
2806 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#;, hay là gia đình không cùng dòng máu.\\nHay bất kỳ một ai khác xa lạ đi nữa, thì cũng như nhau cả thôi」"

# (独白)
# JP: 縁があり、この手がとどく範囲のことなら、\n僕は力を惜しまない。
2876 = "Nếu đã có duyên, và trong tầm tay này có thể chạm tới,\\nanh sẽ không tiếc công tiếc sức."

# (独白)
# JP: 惜しんだところで、\n他にやりたい事も何一つない。
2206 = "Mà cho dù có tiếc nuối giữ lại,\\nanh cũng chẳng còn việc gì khác muốn làm nữa."

# 【双鉄】
# JP: 「何が正解かはわからない。どれが繋がるかもわからない。\nだったら全部を、正解と信じてやるしかないんだ」
2668 = "「Anh không biết đâu mới là câu trả lời đúng. Cũng không biết lựa chọn nào mới dẫn tới đích.\\nNếu vậy thì chỉ còn cách tin tưởng rằng tất cả mọi lựa chọn đều là đúng đắn thôi」"

# (独白)
# JP: 諦めたら僕は路子を殺す。\n事故ではなく、僕の意思により殺してしまう。
3105 = "Nếu từ bỏ, chính anh sẽ là người giết chết Michiko.\\nKhông phải do tai nạn, mà chính ý chí của anh sẽ giết chết em."

# (独白)
# JP: そうしないため、僕は生きる。\n生きて必ず、路子を安らかな場所へ届ける。
2156 = "Để chuyện đó không xảy ra, anh sẽ sống.\\nSẽ sống và nhất định đưa Michiko đến được nơi bình yên."

# 【路子】
# JP: 「そーちゃん」
2105 = "「So-chan」"

# 【双鉄】
# JP: 「うん、路子」
2849 = "「Ừm, Michiko」"

# (独白)
# JP: 路子が、僕の名前を呼ぶ。\n路子が、僕に手を伸ばす。
2722 = "Michiko đang gọi tên anh.\\nMichiko đang đưa tay về phía anh."

# (独白)
# JP: けれどその手は、届かない。\n僕は――目覚めてしまうから。
2168 = "Nhưng bàn tay ấy lại không thể chạm tới.\\nBởi vì anh――sắp phải tỉnh giấc rồi."

# 【双鉄】
# JP: 「早く――終着駅につけるといいな」
3169 = "「Ước gì――chuyến tàu sớm tới được ga cuối cùng nhỉ」"

# (独白)
# JP: 声だけ、聞こえる。
2716 = "Chỉ có âm thanh là tôi nghe thấy được."

