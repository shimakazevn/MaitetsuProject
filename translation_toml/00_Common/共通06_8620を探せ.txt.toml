2863 = "Đôi má ửng đỏ, em ấy im lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「間違いなくポーレットの目も、そうした“赤”を、\n日々姫の目にはボロな\\x%l列車;#00ffc040;列車%l;#;に見ているのだ」
2119 = "Hibiki vẫn không thay đổi, việc được khen ngợi——không,\nviệc nhận được đánh giá đúng đắn về bản thân, có vẻ em ấy vẫn chưa quen với điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
2040 = "「Chắc chắn đôi mắt của Paulette cũng đang nhìn thấy “màu đỏ” đó,\ntrong chiếc \\x%l列車;#00ffc040;đoàn tàu%l;#; rách nát dưới con mắt của Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットにもし、日々姫と同じ絵心があれば、\nたちどころにそれが皆に伝わるのかもしれんな」
2412 = "「Ưm......」"
# 【日々姫】
# display as 日日姬
# JP: 「だとすると――\n市長さん、ちょっと気の毒かもしれませんね」
2414 = "「Nếu Paulette cũng có tâm hồn nghệ sĩ như Hibiki,\nthì có lẽ điều đó đã được truyền đạt đến mọi người ngay lập tức rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「気の毒？」
2025 = "「Nếu vậy thì——\nThị trưởng có vẻ hơi đáng thương nhỉ.」"
