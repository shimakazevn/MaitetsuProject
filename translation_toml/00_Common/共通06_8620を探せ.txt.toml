2500 = "Tại sao lại như thế――\\nVừa nghĩ vậy, câu trả lời đã lập tức hiện ra."

# 【双鉄】
# JP: 「なるほど、湯船が深ければ、\nハチロクは座って風呂にも入れんわけか」
1942 = "「Ra là vậy, nếu bồn tắm sâu quá,\\nHachiroku sẽ không thể ngồi tắm được đúng không」"

# 【ハチロク】
