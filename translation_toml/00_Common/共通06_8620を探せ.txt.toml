2086 = "「Có lẽ chỉ mình Hachiroku biết. Tuy phải đi xác nhận lại nhưng\\n…… với bộ dạng này, ta không thể làm bẩn cửa hàng được.」"

# 【日々姫】
# JP: 「ああ！　そんで私ば呼びよったと」
3196 = "「À! Ra là vậy nên anh mới gọi em đến đúng không.」"

# (独白)
# JP: ようやく、話を起点に戻せた。\nいや、起点に戻ったのではないか。
3146 = "Cuối cùng, câu chuyện cũng quay trở lại điểm xuất phát.\\nKhông, có lẽ không hẳn là quay về vạch xuất phát."

# (独白)
# JP: 戻ったようで、螺旋階段1つ分――\n積み重ねることができた何かも、あるはずだ。
2432 = "Dẫu có vẻ như đã quay lại, nhưng giống như một nấc thang xoắn ốc――\\nchắc chắn đã có thứ gì đó được tích lũy thêm."

# 【日々姫】
# JP: 「汚れもひどいですけど、粉まみれってことなら……\n確かに、兄さんがそのまま家に入るのは難しいですね」
2407 = "「Người anh lấm lem hết cả rồi, lại còn bám đầy bụi phấn thế kia nữa……\\nĐúng là nếu anh cứ thế mà vào nhà thì không ổn chút nào.」"

# 【双鉄】
# JP: 「万が一にも、炭塵が焼酎にまぎれてしまえば、\n取り返しがつかんことになりかねんからな」
2017 = "「Vì chỉ cần một chút sơ suất nhỏ, để bụi than lẫn vào rượu Shochu thì\\nhậu quả sẽ khôn lường.」"

# 【日々姫】
# JP: 「なら、外のお風呂で綺麗にするしかないですよね。\nまってて下さい。私、兄さんの着替え取ってきます」
3028 = "「Vậy thì chỉ còn cách ra buồng tắm ngoài trời gột rửa cho sạch sẽ thôi nhỉ.\\nAnh đợi một chút nhé. Để em đi lấy quần áo thay cho anh.」"

# (独白)
# JP: パタパタ日々姫が家に飛び込み、駆け上がる。
2501 = "Hibiki lạch bạch chạy nhanh vào trong nhà, rồi lao vội lên lầu."

# 【ハチロク】
# JP: 「双鉄様。戻りました。\n少し遅れて、すみません」
2874 = "「Soutetsu-sama. Em đã về rồi ạ.\\nEm xin lỗi vì đã đến hơi muộn một chút.」"

# (独白)
# JP: 入れ替わるようなハチロクの声。
2682 = "Giọng nói của Hachiroku vang lên như để thế chỗ."

# (独白)
# JP: ふりむけば、走りでもしたのか、\nハチロクの頬は上気し、肌には汗まで浮いている。
2339 = "Khi tôi ngoảnh lại, chẳng biết có phải vì vừa chạy hay không mà\\nđôi má Hachiroku ửng hồng, trên làn da còn rịn vài giọt mồ hôi."

# 【双鉄】
# JP: 「かまわんが、なにかあったか？」
2235 = "「Không sao đâu, nhưng có chuyện gì trắc trở à?」"

# 【ハチロク】
# JP: 「この体ですと――\n\x%l翼端;#00ffc040;[よくたん,1]翼端%l;#;から地上に下りるのが大変で」
2080 = "「Với cơ thể này thì――\\nviệc từ \\x%l翼端;#00ffc040;đầu cánh%l;#; bước xuống mặt đất có chút khó khăn ạ.」"

# 【双鉄】
# JP: 「ああ、そうか。それは盲点だったな、すまん」
1907 = "「À, ra vậy. Đó đúng là một điểm mù mà ta không nghĩ tới, xin lỗi em nhé.」"

# 【ハチロク】
# JP: 「いえ。\nわたくし自身さえ気づかずにいたことですから」
3275 = "「Không đâu.\\nBởi chínhわたくしcũng không hề nhận ra điều đó」"

# (独白)
# JP: ナビは上空、二度ほど回転してからクン、っと\n高度をあげて視界を外れる。
2957 = "Nabi đảo hai vòng trên bầu trời rồi vút một cái,\\nbay cao lên và khuất khỏi tầm mắt."

# (独白)
# JP: 僕が風呂屋に移動することを、\n予測したのか、聞いていたのか――っと、そうだ。
2244 = "Cô ấy đoán được tôi sẽ ra nhà tắm công cộng, hay là đã nghe ai nói rồi nhỉ―― À, đúng rồi."

# 【双鉄】
# JP: 「これから風呂にいく。この汚れでは家にあがれん」
2353 = "「Giờ tôi đi tắm đây. Người ngợm bẩn thỉu thế này thì không vào nhà được」"

# 【ハチロク】
# JP: 「銭湯も嫌いますよ？　石炭汚れは」
2286 = "「Nhà tắm công cộng cũng không thích bụi than bám đầy người đâu đấy nhé?」"

# 【双鉄】
# JP: 「日々姫に心あたりがあるようだ。\nお前はどうする？　一緒に行くか？」
2368 = "「Hình như Hibiki biết chỗ đấy.\\nCòn cô thì sao? Có muốn đi cùng không?」"

# 【ハチロク】
# JP: 「もちろんです」
2060 = "「Tất nhiên rồi ạ」"

# 【日々姫】
# JP: 「兄さん、おまたせ！　って、ハチロク――ちゃん」
3053 = "「Anh hai, em bắt anh đợi lâu chưa! Ủa, Hachiroku――chan」"

# (独白)
# JP: 日々姫の、少し戸惑った声。
2753 = "Giọng Hibiki có chút bối rối."

# (独白)
# JP: ハチロクは優雅に笑い、日々姫の緊張をほぐそうとする。
2225 = "Hachiroku mỉm cười tao nhã, cố gắng làm giảm bớt sự căng thẳng của Hibiki."

# 【ハチロク】
# JP: 「呼び捨てで結構ですよ、日々姫様。\nわたくし、双鉄様の所有物ですので」
3057 = "「Cứ gọi thẳng tênわたくしlà được rồi, thưa tiểu thư Hibiki.\\nVìわたくしlà vật sở hữu của ngài Soutetsu mà」"

# (独白)
# JP: むっと、日々姫の眉根が寄る。\nぷっと、その頬がふくれはじめる。
2460 = "Chân mày Hibiki khẽ nhíu lại vì phụng phịu.\\nĐôi má em ấy bắt đầu phồng lên giận dỗi."

# 【日々姫】
# JP: 「やったら、私んことも日々姫でよかよ。\n妹やもん、にぃにぃの所有物も同然やけんね」
2296 = "「Thế thì cứ gọi trực tiếp em là Hibiki là được rồi.\\nVì là em gái mà, nên cũng chẳng khác nào vật sở hữu của hai hai cả đâu」"

# 【ハチロク】
# JP: 「はぁ」
2748 = "「Hả...」"

# (独白)
# JP: 困ったように、ハチロクが僕を見上げてくる。
2914 = "Hachiroku ngước lên nhìn tôi với vẻ bối rối."

# (独白)
# JP: 日々姫を所有した記憶なぞまるで無いのだが……\nそれが日々姫の希望であれば、僕は当然、従うまでだ。
2475 = "Ta chẳng hề có chút ký ức nào về việc sở hữu Hibiki cả……\\nNhưng nếu đó là nguyện vọng của em ấy, ta đương nhiên sẽ làm theo thôi."

# 【双鉄】
# JP: 「お互いに呼び捨てあうがよかろう。\nお前たち、どうやら似たところがあるようだしな」
2066 = "「Cứ gọi thẳng tên nhau là được rồi.\\nDù sao hai đứa cũng có vẻ có nhiều điểm tương đồng mà」"

# 【日々姫】(日々姫・ハチロク)
# JP: 「どこがと！？」\n「どこがですか？」
2746 = "「Giống chỗ nào cơ ạ!?」\\n「Giống chỗ nào cơ chứ?」"

# (独白)
# JP: 声が重なる。
2980 = "Hai giọng nói đồng thanh vang lên."

# (独白)
# JP: そして同時に、いささか気まずそうな顔で視線をそらし、\nそれからプっと、笑いをもらす。
2278 = "Và rồi cùng lúc, cả hai hơi bối rối tránh né ánh mắt của nhau,\\nđể rồi sau đó bật cười khúc khích."

# 【双鉄】
# JP: 「そういうことで風呂にしよう。\n日々姫、案内を頼む」
2144 = "「Thế nhé, đi tắm thôi nào.\\nHibiki, nhờ em dẫn đường nhé」"

# 【日々姫】
# JP: 「はい、兄さん。おまかせください！」
2676 = "「Vâng ạ, anh hai. Cứ giao cho em!」"

# (独白)
# JP: 見事なものだ。\n余裕で戦前――\x%l大詔;#00ffc040;大詔%l;#;どころか、\x%l明智;#00ffc040;明智%l;#;の建築かもしれん。
3236 = "Thật là một tuyệt tác.\\nDư sức từ thời trước chiến tranh――\\x%l大詔;#00ffc040;Đại Chiếu%l;#;không chừng, thậm chí có khi là kiến trúc từ thời\\x%l明智;#00ffc040;Minh Trị%l;#;ấy chứ."

# (独白)
# JP: 湯に満ち満ちた場所だというのに、\nなにもかもが枯れ切っている味わいだ。
1905 = "Dẫu là một nơi tràn ngập trong làn nước nóng,\\nnhưng mọi thứ lại mang một phong vị cổ kính, mộc mạc vô cùng."

# 【双鉄】
# JP: 「良いな。風情のある銭湯だ」
2395 = "「Tuyệt thật. Một nhà tắm công cộng đầy hoài cổ」"

# 【日々姫】
# JP: 「そのうえ天然温泉たい！\n[きゅうしゅう,1]九洲に名高か温泉地、御一夜のお風呂やけんね」
2172 = "「Đã vậy còn là suối nước nóng tự nhiên nữa đó nha!\\nLà nhà tắm của Onoyo, vùng suối nước nóng danh tiếng khắp vùng Kyushu mà lị」"

# 【ハチロク】
# JP: 「わたしが現役だったころの駅舎のようです。\nいいですね、とても落ち着きます」
3023 = "「Nơi này trông giống như nhà ga vào thời em còn hoạt động vậy.\\nThật tuyệt vời, mang lại cảm giác vô cùng bình yên」"

# (独白)
# JP: また赤くなって下を向く。\n日々姫が直接ほめられたわけでもないのだが――
2958 = "Em ấy lại đỏ mặt rồi cúi gầm mặt xuống.\\nDù cho Hibiki chẳng phải là người trực tiếp được khen ngợi――"

# (独白)
# JP: あるいはここは、よほどお気に入りの場所なのかもしれん。
1940 = "Hoặc có lẽ nơi này là một địa điểm mà em ấy cực kỳ yêu thích chăng."

# 【双鉄】
# JP: 「しかし、よくこんな銭湯を知っていたな。\n僕が帝都に出ていた間に、風呂が壊れでもしたのか？」
2051 = "「Nhưng mà, sao em lại biết rõ một nhà tắm công cộng như thế này thế?\\nTrong thời gian ta lên Đế Đô, phòng tắm ở nhà bị hỏng rồi à?」"

# 【日々姫】
# JP: 「え？　[ちご]違ぉて――ううん、あの――\nちょっと――えと、その、お仕事で……あって」
2360 = "「Ủa? Không phải đâu—— Ứ, à thì——\\nCó chút—— Dà, chuyện đó, là do công việc…… thôi ạ」"

# 【双鉄】
# JP: 「焼酎か？　湯上がりに飲むのは危険だと思うが」
2088 = "「Rượu Shochu à? Tôi nghĩ uống ngay sau khi vừa tắm bồn xong hơi nguy hiểm đấy」"

# 【日々姫】
# JP: 「あ、そうじゃないんですけど――その――　\n兄さん、ハチロク、とにかく行きましょう！！」
3034 = "「À, không phải thế đâu ạ—— Mà——\\nAnh trai, Hachiroku, tóm lại chúng ta đi thôi nào!!」"

# (独白)
# JP: ごまかすように話を打ち切り、\n日々姫は女湯ののれんをくぐる。
2922 = "Đánh trống lảng cắt ngang câu chuyện,\\nHibiki bước qua tấm rèm che của phòng tắm nữ."

# (独白)
# JP: 僕は男湯。\nわかれわかれだ。
2241 = "Còn tôi vào phòng tắm nam.\\nĐường ai nấy đi."

# 【日々姫】
# JP: 「って、にぃにぃ！\nハチロクはこっちばい」
2338 = "「Ơ kìa, Nii-nii!\\nHachiroku là đi bên này cơ mà」"

# 【双鉄】
# JP: 「構わん。背中を流してくれるそうだからな」
1924 = "「Không sao đâu. Cô ấy bảo sẽ kỳ lưng giúp tôi.」"

# 【日々姫】
# JP: 「は？　背中って」
2474 = "「Hả? Kỳ lưng á?」"

# 【ハチロク】
# JP: 「わたくしのため、双鉄様は石炭にまみれてくれました。\nその汚れを落とすのは、わたくしの当然の務めです」
2158 = "「Vì hiền thê, Soutetsu-sama đã phải lấm lem trong than bụi.\\nViệc gột rửa lớp bùn đất đó là nghĩa vụ đương nhiên của hiền thê ạ」"

# 【双鉄】
# JP: 「と、いうことだ。\n出るときは、なにか合図をしてく……む？」
3042 = "「Chuyện là như vậy đấy.\\nLúc nào ra, em nhớ ra hiệu cho…… Hửm?」"

# (独白)
# JP: 日々姫の頬がふくれている。\n目に涙まで滲み始める。
2672 = "Đôi má của Hibiki đang phồng lên.\\nNước mắt thậm chí đã bắt đầu rớm nơi khóe mắt."

# (独白)
# JP: ご不満だ。著しく。\n不満をうまく外へ出せない、その点も変わってないらしい。
2284 = "Em ấy đang giận dỗi. Một sự bất mãn cực kỳ lớn.\\nKhông thể bộc lộ sự ấm ức ra ngoài một cách suôn sẻ, điểm này xem ra em ấy vẫn chẳng hề thay đổi."

# 【双鉄】
# JP: 「日々姫」
2953 = "「Hibiki」"

# (独白)
# JP: しゃがみこみ、日々姫の高さに視線をあわせる。
2835 = "Tôi ngồi xổm xuống, điều chỉnh tầm mắt sao cho ngang bằng với Hibiki."

# (独白)
# JP: 鼻と鼻とが触れ合う近さ――\nからバっと大きく日々姫が離れる。
1883 = "Ở khoảng cách gần đến mức mũi hai đứa suýt chút nữa đã chạm nhau——\\nHibiki giật bắn mình rồi lùi phắt ra xa."

# 【日々姫】
# JP: 「こ、子供扱いしたらいかんばいっ」
2269 = "「K-Không được coi người ta là trẻ con đâu đấy!」"

# 【双鉄】
# JP: 「ああ、すまん。\nそんなつもりはなかったのだが」
2687 = "「À, anh xin lỗi.\\nAnh không có ý đó đâu」"

# (独白)
# JP: が、怪我の功名という奴だ。\n日々姫が素直な言葉を聞かせてくれてる。
1946 = "Nhưng đúng là trong cái rủi lại có cái may.\\nHibiki đang để tôi được nghe những lời bộc bạch hết sức thật lòng."

# 【双鉄】
# JP: 「ハチロクが僕の背中を流すのが、イヤか？」
1881 = "「Hachiroku ghét việc kỳ lưng cho chủ nhân lắm sao?」"

# 【日々姫】
# JP: 「背中……っていうか。\nええと、一緒にお風呂に入るのが、なんか――」
2150 = "「Kỳ lưng... hay nói đúng hơn là.\\nÀ thì, tắm chung bồn thế này, cứ thấy――」"

# 【ハチロク】
# JP: 「慎み無いこととお感じになられても仕方ありません。\n嫁入り前の娘が、殿方と一緒にですからね」
3067 = "「Ngài có cảm thấy chuyện này thật thiếu đứng đắn cũng là lẽ thường tình.\\nBởi một thiếu nữ chưa chồng lại đi tắm chung với một đấng nam nhi mà」"

# 【日々姫】
# JP: 「うん」
1938 = "「Ừm」"

# (独白)
# JP: こくん、と、日々姫が頷いている。\nその頷きに、優しくハチロクは言葉を乗せる。
2393 = "Hibiki khẽ gật đầu đồng tình.\\nHachiroku nhìn cái gật đầu ấy rồi dịu dàng tiếp lời."

# 【ハチロク】
# JP: 「けれどわたくしは、仕事仲間として、お疲れ様、と\n――双鉄様の石炭汚れを流してさしあげたいのです」
2763 = "「Thế nhưng, với tư cách là một người cộng sự, em chỉ muốn gửi lời cảm ơn vì sự vất vả của ngài\\n――và muốn gột rửa sạch những vết bụi than trên người Sōtetsu-sama mà thôi」"

# 【日々姫】
# JP: 「それに、ね？　日々姫」
2979 = "「Với lại, đúng không nào? Hibiki」"

# (独白)
# JP: 呼び捨てた。\n日々姫がさっき求めたとおりに、ハチロクが。
1954 = "Cô ấy đã gọi thẳng tên rồi.\\nĐúng như những gì Hibiki vừa ao ước lúc nãy, Hachiroku đã làm vậy."

# (独白)
# JP: そうして小さなその口を、\n日々姫の耳元に近づける。
2081 = "Nói rồi, cô ấy ghé đôi môi nhỏ nhắn của mình\\nlại gần sát tai của Hibiki."

# 【ハチロク】
# JP: 「わたくし、このちいささでしょう？　深いお風呂では、\n誰かと一緒に入らないと、立ち通しになってしまうの」
2679 = "「Em nhỏ bé thế này cơ mà? Ở những bồn tắm sâu,\\nnếu không vào tắm cùng ai đó thì em sẽ phải đứng suốt cả buổi mất」"

# 【日々姫】
# JP: 「あっ」
2061 = "「Á」"

# (独白)
# JP: ハチロクが何と言ったのか。\n日々姫はこくん、と大きくうなずく。
2349 = "Hiểu ra ẩn ý trong lời nói của Hachiroku.\\nHibiki gật đầu thật mạnh một cái."

# 【日々姫】
