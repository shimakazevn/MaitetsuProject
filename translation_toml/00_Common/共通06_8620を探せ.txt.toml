2096 = "Chắc là cô ấy vừa ấn vào huyệt đạo nào đó trên lưng rồi.\\nCứ mỗi chỗ được ấn vào, cơ thể tôi lại tự động giật nảy lên."

# 【ハチロク】
# JP: 「良さそうですね。こんなにビクビク暴れてしまって。\nうふふ、それなら――これはいかがです？」
2940 = "「Có vẻ hiệu quả đấy chứ ạ. Ngài cứ run bần bật lên thế kia mà.\\nUfufu, vậy thì――thế này thì sao ạ?」"

# 【双鉄】
# JP: 「う……あっ――効く――な」
2366 = "「Ư... Á――Thấm――Thật đấy」"

# (独白)
