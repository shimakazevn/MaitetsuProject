2287 = "「Hibiki có cảm thấy cần phải giải thích rằng\n“Màu đỏ là màu đỏ” không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2079 = "「A——」"
# monologue
# JP: 日々姫の頬がぽっと赤くなる。
3055 = "Đôi má Hibiki ửng đỏ."
