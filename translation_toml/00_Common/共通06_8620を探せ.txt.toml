# monologue
# JP: （議場では、れいなも助けてはくれんだろうしな）
3271 = "（Trong phòng họp hội đồng, Reina cũng không thể giúp được gì.）"
# monologue
# JP: 職業意識でいっぱいに満ちた――\nある意味では、張り詰めきっているポーレットの姿。
3093 = "Một hình ảnh Paulette tràn đầy ý thức nghề nghiệp——\ntheo một nghĩa nào đó, là đang vô cùng căng thẳng."
# monologue
# JP: 鉄道会社の社長として、\\x%l運転士;#00ffc040;運転士%l;#;としてと同じように、\n市長としてもその強さを保てるものか、正直、疑問だ。
2714 = "Giống như tư cách giám đốc công ty đường sắt hay \\x%l運転士;#00ffc040;người lái tàu%l;#;,\nliệu cô ấy có thể giữ được sự mạnh mẽ đó với tư cách thị trưởng hay không, thú thật, tôi rất nghi ngờ."
# 【日々姫】
# display as 日日姬
# JP: 「誰も邪魔をしないで、思う存分に話せれば――\n“赤は赤い”って、あの人、伝えられると思います」
2115 = "「Nếu không có ai làm phiền, và cô ấy có thể nói thỏa thích——\nThì em nghĩ, người đó có thể truyền đạt được rằng “Màu đỏ là màu đỏ”.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫がそう見るのなら、そうなのかもしれんな。\nが、邪魔がなくなることなど、あるまい」
2290 = "「Nếu Hibiki thấy vậy, thì có lẽ là thế thật.\nNhưng, chuyện không bị làm phiền là không thể nào xảy ra được.」"
# 【日々姫】
# display as 日日姬
# JP: 「それはそうですよね。\n効果大って、はっきりわかっているんですから」
1915 = "「Chuyện đó thì đúng là vậy nhỉ.\nVì họ biết rõ là nó có hiệu quả lớn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2104 = "「嗯」" 
# monologue
# JP: ならばどうする。\nどうすればポーレットは、邪魔されず自らを主張できるか。
3197 = "「Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……結局のところは、『見せる』ことに尽きるのか」
1616 = "Vậy thì phải làm sao.\nLàm thế nào để Paulette có thể tự do bày tỏ quan điểm mà không bị làm phiền."
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2049 = "「......Rốt cuộc thì, chỉ còn cách là 『cho xem』 thôi sao.」"
# 【双鉄】
# display as 雙鐵
