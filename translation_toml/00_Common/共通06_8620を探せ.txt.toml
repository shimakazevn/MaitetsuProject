2045 = "Cánh tay trên của tôi được duỗi ra và xoa bóp."

# 【双鉄】
# JP: 「もっと――もっと強く、頼めるか？」
2095 = "「Mạnh hơn――mạnh hơn chút nữa, được không em?」"

# 【ハチロク】
