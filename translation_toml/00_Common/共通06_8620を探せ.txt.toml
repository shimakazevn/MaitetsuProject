2865 = "Nếu sự căng thẳng là do thể trạng, và dù có cố gắng đến mấy cũng không thể bù đắp được,\nthì sự cản trở đơn giản như la ó cũng sẽ mang lại hiệu quả lớn."
# 【日々姫】
# display as 日日姬
