# display as 雙鐵
# JP: 「その通りだ」
2337 = "「Vậy là, thị trưởng đã khẳng định nhỉ? Rằng cái......\ndòng 8620 đó? Rất là tuyệt vời.」"
# 【日々姫】
# display as 日日姬
# JP: 「……いつもですよ？　それ」
1606 = "「Đúng vậy.」"
# monologue
# JP: ため息、苦笑。
2830 = "「......Lúc nào cô ấy cũng vậy đó?」"
# monologue
# JP: 日々姫のあきれたような声には、\nけれどいくらかの、優しい響きが混じっている。
3052 = "Thở dài, cười gượng."
