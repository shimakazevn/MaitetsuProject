2002 = "「Một nhà chứa đầu máy thật hoành tráng.\\nVới nơi này, cả \\x%l8620;#00ffc040;8620%l;#; và \\x%l客車;#00ffc040;客車%l;#; đều có thể nghỉ ngơi thoải mái.」"

