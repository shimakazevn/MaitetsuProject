2778 = "Dù đó không phải câu trả lời cho câu hỏi,\\nnhưng có lẽ đó cũng là một cách trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、もうしばらくだけ待ってくれ」
2071 = "「Vậy thì, đợi tôi thêm một lát nữa nhé.」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいなは待ってますよぉ」
1842 = "「Vâng ạ~ Reina sẽ đợi mà~」"

