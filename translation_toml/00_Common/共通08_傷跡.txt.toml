# monologue
# JP: 長年放置されていたという話にもかかわらず、\nひどくあっさり回転し、その戒めを解いてくれる。
2777 = "Dù nghe nói đã bị bỏ hoang nhiều năm,\\n nó vẫn quay một cách nhẹ tênh, phá vỡ sự giam hãm bấy lâu."

# 【双鉄】
# display as 雙鐵
