# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;などというから、重い掛け金と錠前とが\n付いているのかと思ってしまっていた。
2425 = "Vì nghe nói đây là \\x%l石造機関庫;#00ffc040;Kho đầu máy bằng đá%l;#;, nên tôi đã nghĩ nó sẽ có\\nmột cái then cài và ổ khóa nặng trịch."

# monologue
# JP: 酒蔵の物より数段巨大なシャッターだが、\n基本的な構造は変わらなそうだ。
2745 = "Cửa cuốn này lớn hơn nhiều so với cái ở hầm rượu sake,\\nnhưng cấu trúc cơ bản dường như không có gì khác biệt."

# monologue
# JP: （……これで鍵が違っていたら、さぞ気まずかろうな）
2803 = "（...Nếu chìa khóa này mà sai thì chắc sẽ khó xử lắm đây.）"

# monologue
