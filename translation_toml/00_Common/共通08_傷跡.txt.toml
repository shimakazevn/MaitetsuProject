2464 = "Giọng nói ấy đã giải thoát tôi khỏi lời nguyền.\\nTôi lắc cái đầu đang rối bời, cố gắng điều hòa lại nhịp thở hỗn loạn."

# 【双鉄】
# display as 雙鐵
# JP: 「おかしいとは、どういうことだ」
1708 = "「Kỳ lạ là sao chứ?」"

# 【れいな】
# display as 玲奈
# JP: 「だって、おかしいんですよぉ。ほら」
1847 = "「Tại vì, nó kỳ lạ lắm đó. Nhìn kìa」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1490 = "「——」"

# monologue
