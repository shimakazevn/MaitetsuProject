2507 = "Có lẽ do tôi cũng đang căng thẳng, nên một suy nghĩ vớ vẩn lướt qua trong đầu."

# monologue
# JP: が――
2298 = "Nhưng――"

# monologue
# JP: （カチリっ）
2821 = "（Cạch）"

# monologue
# JP: よほど上等のシャッターなのか。
