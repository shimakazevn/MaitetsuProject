1846 = "「Nếu anh Soutetsu ở lại một mình,\\n thì sẽ buồn chán lắm phải không ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1831 = "「Hừm.」"

# monologue
