# lines: 376 
# monologue
# JP: ポーレットとれいなに案内されて、\n御一夜駅のホームを通り、敷地の更に奥へと進む。
2547 = "Được Paulette và Reina dẫn đường,\\ntôi đi qua sân ga của ga Ohitoyo, tiến sâu hơn vào bên trong khu đất."

