1470 = "……Két két, xoành xoạch.\\nChỉ còn lại tiếng xích rít lên và tiếng cửa cuốn được kéo lên."

# monologue
# JP: れいなは何の話もしないが、\n誰かが見ているというだけで、不思議と退屈しないものだ。
2647 = "Reina không nói gì cả,\\nnhưng chỉ cần có người đang dõi theo thôi, lạ thay lại chẳng thấy chán chút nào."

# monologue
# JP: （カチン）
# 2821 = "（喀嚓）" 

