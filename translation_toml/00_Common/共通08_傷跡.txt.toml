2635 = "Và rồi, một hình ảnh mờ ảo dần hiện ra.\\nMột chiếc \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; khổng lồ, với lớp vỏ đen tuyền sắc lạnh đang tỏa ra thứ ánh sáng mờ đục."

# 【双鉄】
# display as 雙鐵
