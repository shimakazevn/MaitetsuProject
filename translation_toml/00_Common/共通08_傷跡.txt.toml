2790 = "Cạnh bánh xe khổng lồ của đầu máy xe lửa đen ngòm lạnh lẽo,\\nHachiroku đang ngồi thụp xuống đó."

# 【日々姫】
# display as 日日姬
# JP: 「ちょっと、ハチロク。\nねぇ、ポーレットさんも！」
1823 = "「Này, Hachiroku.\\nChị Paulette nữa!」"

# monologue
# JP: ポーレットは棒立ちになり機関車をただ見つめ続けて、\n日々姫がなんとか二人を立ち直らせようとしているのが。
2612 = "Paulette thì đứng chết trân, chỉ mải miết nhìn đầu máy xe lửa,\\ncòn Hibiki thì đang cố gắng vực dậy tinh thần cho cả hai."

# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2059 = "「Đây là――」"

# monologue
# JP: 自分の声が震えているのか、\nかすれているのかもわからない。
2555 = "Tôi không biết giọng mình đang run rẩy,\\nhay là đã khản đặc đi nữa."

# monologue
# JP: 見えているのに、情報を処理しきれていない。\n脳のどこかが、きっと拒んでしまっている。
2586 = "Dù đang nhìn thấy, nhưng tôi không thể xử lý hết thông tin.\\nMột phần nào đó trong não bộ chắc chắn đang chối bỏ nó."

# 【双鉄】
# display as 雙鐵
# JP: 「――壊れている……の、か？」
1492 = "「――Nó bị... hỏng... rồi sao?」"

# monologue
# JP: だから、確認するしかない。
2751 = "Vì vậy, chỉ còn cách xác nhận mà thôi."

# monologue
# JP: ハチロクの記憶の欠落の、ハチロク達が汰斗さんに買われ、\nそして放棄されてしまった……その共通であろう、原因を。
2742 = "Nguyên nhân gây ra sự thiếu hụt ký ức của Hachiroku, lý do Hachiroku và những người khác được anh Taito mua lại,\\nrồi sau đó bị bỏ rơi... nguyên nhân chung cho tất cả những điều đó."

# 【れいな】
# display as 玲奈
# JP: 「はぁい、ちょっと見てみますねぇ」
1839 = "「Vâng ạ, để em xem qua một chút nhé.」"

# monologue
# JP: ぽてぽてと、れいなが歩く。\nぽてぽてと、力みも怯えも見せずに歩く。
2643 = "Lép nhép, Reina bước đi.\\nLép nhép, cô bé bước đi mà không hề gắng gượng hay sợ hãi."

# monologue
# JP: それを見ていれば少し落ち着く。\n日常とこの機関庫とは地続きなのだと思い出せる。
2662 = "Nhìn nó, tôi thấy lòng dịu lại đôi chút.\\nNó nhắc tôi nhớ rằng cuộc sống thường ngày và nhà ga đầu máy này vẫn nối liền với nhau."

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、この子は、[ハチロクニイマル,3]8620ですよぉ。\nトップナンバー。ハチロクさんの車輌ですぅ」
2086 = "「Anh Soutetsu, đứa trẻ này là 8620 đó ạ.\\nLà đầu máy số một. Toa tàu của chị Hachiroku đó ạ.」"

# monologue
# JP: 車体をぐるりと一周しながら、\nれいなは順々に、伝えてくれる。
2646 = "Trong lúc đi một vòng quanh thân tàu,\\nReina tuần tự giải thích cho tôi nghe."

# 【れいな】
# display as 玲奈
# JP: 「それでですねぇ、大破してますぅ。\n自走は、ちょっとれいなには無理に見えますねぇ」
1977 = "「Và rồi, nó bị hư hỏng nặng lắm ạ.\\nViệc tự chạy thì... Reina thấy có hơi bất khả thi đó ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「自走どころか――」
1754 = "「Đừng nói là tự chạy――」"

# monologue
# JP: ぽつりと、ハチロクが言葉をもらす。
2347 = "Hachiroku buông một câu lẩm bẩm."

# monologue
# JP: 今まで一度も聞いたことのない、\n尊厳全てを、すり減らしきってしまったような声で。
2755 = "Bằng một giọng nói mà tôi chưa từng nghe thấy bao giờ,\\nmột giọng nói như thể đã bào mòn đi tất cả sự tôn nghiêm."

# 【ハチロク】
# display as 八六
# JP: 「\x%l動輪;#00ffc040;動輪%l;#;も、なにも……歪んでる、のに……\nなんで――ここまで――牽引なんて――」
1489 = "「\\x%l動輪;#00ffc040;Bánh chủ động%l;#;... với cả mọi thứ... đều đã méo mó... vậy mà...\\nTại sao―― lại kéo nó―― đến tận đây――」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1494 = "「…………」"

# monologue
# JP: ハチロクの嘆きが僕の視線を動かす。\n目に映っている光景に、意味をようやく感じ始める。
2357 = "Lời than thở của Hachiroku khiến tôi phải đưa mắt nhìn theo.\\nTôi cuối cùng cũng bắt đầu hiểu được ý nghĩa của cảnh tượng trước mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「これは……ひどいな」
2057 = "「Cái này... kinh khủng thật.」"

# monologue
# JP: 事故車輌。鉄道事故。\n文字がぐるぐる頭で回る。
2285 = "Toa tàu tai nạn. Tai nạn đường sắt.\\nNhững từ ngữ đó cứ xoay vòng trong đầu tôi."

# monologue
# JP: 血の臭い。金属が軋みネジ切れる音。\n自分の底から、それをまざまざ感じてしまう。
2700 = "Mùi máu tanh. Tiếng kim loại kẽo kẹt, tiếng ốc vít gãy lìa.\\nTôi cảm nhận được những điều đó một cách sống động từ tận sâu thẳm trong mình."

# 【双鉄】
# display as 雙鐵
# JP: 「これを……御一夜まで引っ張ってきたのか」
1881 = "「Họ đã kéo cái này... về tận Ohitoyo sao?」"

# 【ハチロク】
# display as 八六
# JP: 「大廃線末期でなければ、誰も、許さなかったでしょう。\n線路まで……これでは、傷めてしまいます」
2021 = "「Nếu không phải thời kỳ cuối của Đại Phế Tuyến, chắc không ai cho phép chuyện này đâu ạ.\\nCả đường ray... cũng sẽ bị hư hại mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1806 = "「唔」" 

# monologue
# JP: 車輪――いや、ハチロクは動輪と呼んでいたか。\nそれがぐにゃりとひん曲がっている。
2723 = "Bánh xe―― không, Hachiroku đã gọi chúng là bánh chủ động thì phải.\\nChúng đã bị uốn cong một cách xiêu vẹo."

# monologue
# JP: これではとても、まともに回転できないだろう。\n回転できないものを引くならそれは、“引きずる”だ。
2744 = "Thế này thì khó mà quay cho tử tế được.\\nKéo một thứ không thể quay, thì đó gọi là “lê lết”."

# 【れいな】
# display as 玲奈
# JP: 「破損部分は多数ですぅ。\n機関車、右側面にひどい[だこん,1]打痕と[さっかこん,2]擦過痕がありますよぉ」
1963 = "「Có nhiều chỗ bị hư hỏng lắm ạ.\\nĐầu máy xe lửa, bên hông phải có nhiều vết va đập và trầy xước nghiêm trọng đó ạ.」"

# monologue
# JP: 巨大な車体の向こうから、変わらぬれいなの声が響く。\nけれどギクリと、ハチロクの動きは止まってしまう。
2482 = "Từ phía bên kia thân xe khổng lồ, giọng nói không đổi của Reina vang lên.\\nNhưng Hachiroku giật mình, mọi cử động đều khựng lại."

# monologue
# JP: そしてガタガタ――\n音がたつほどガタガタと、その全身が震え始める。
2632 = "Và rồi lập cập――\\nToàn thân cô bé bắt đầu run lên bần bật, đến mức phát ra tiếng."

# 【れいな】
# display as 玲奈
# JP: 「傷、\x%lフランジ;#00ffc040;フランジ%l;#;にまで及んでいますぅ。\nだから、間違いないですよぉ」
1738 = "「Vết xước, đã lan đến cả \\x%lgờ bánh xe;#00ffc040;gờ bánh xe%l;#; rồi ạ.\\nThế nên, không thể nhầm được đâu ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「あ――あっ――」
1809 = "「A―― á...」"

# 【れいな】
# display as 玲奈
# JP: 「この機関車。\x%l脱線転覆;#00ffc040;脱線転覆%l;#;しちゃったんですぅ」
2063 = "「Đầu máy này... đã bị \\x%ltrật bánh và lật nhào;#00ffc040;trật bánh và lật nhào%l;#; đó ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「いやああああぁぁぁぁぁぁぁぁぁぁぁぁっっ！！！？」
1755 = "「KHÔNGGGGGGGGGGGGGGGGGGGGGGGGGGG!!!?」"

# 【れいな】
# display as 玲奈
# JP: 「ひゃあうっ！？」
1792 = "「Oái!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！　落ち着けハチロクっ！！」
1750 = "「Hachiroku! Bình tĩnh lại đi, Hachiroku!!」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしのせいっ！\nわたくしのせいでっ――わたくしのっ」
1917 = "「Là tại tôi!\\nLà tại tôi mà―― là tại...」"

# 【双鉄】
# display as 雙鐵
# JP: 「事故など！　誰かひとりの責任ではないっ！！」
1993 = "「Tai nạn! Không phải là trách nhiệm của riêng một người nào cả!!」"

# monologue
# JP: 強く抱きしめ言葉をぶつける。
2540 = "Cậu ôm chặt lấy cô, dồn dập nói."

# 【ハチロク】
# display as 八六
# JP: 「けれどっ！　けれど、わたくしは\x%l8620;#00ffc040;8620%l;#;をっ」
1719 = "「Nhưng mà! Nhưng mà, tôi đã... \\x%l8620;#00ffc040;8620%l;#;...」"

# monologue
# JP: 事故の傷跡からあふれだす血で、\nそれでも刻んだ文字をぶつける。
2509 = "Dòng máu từ vết sẹo tai nạn tuôn trào,\\nvậy mà cô vẫn buông ra những lời đã khắc sâu trong tâm khảm."

# 【双鉄】
# display as 雙鐵
# JP: 「お前が自責に苛まれたとて、\nそれで\x%l8620;#00ffc040;8620%l;#;が救われるのかっ！！！」
1885 = "「Cô có dằn vặt bản thân đến mấy đi nữa,\\n thì cũng cứu được \\x%l8620;#00ffc040;8620%l;#; chắc?!!!」"

# 【ハチロク】
# display as 八六
# JP: 「っ！！」
2099 = "「！！」"

# monologue
# JP: ぎくりと、ハチロクの声が止む。\n体はなおも震え続けて、涙も流れ続けている。
2360 = "Giật mình, giọng Hachiroku tắt lịm.\\nCơ thể em vẫn không ngừng run rẩy, và nước mắt vẫn không ngừng tuôn rơi."

# 【双鉄】
# display as 雙鐵
# JP: 「どんな事故でも、どんな被害でも変わらない」
1691 = "「Bất kể là tai nạn nào, bất kể thiệt hại ra sao, cũng không có gì thay đổi cả.」"

# monologue
# JP: ハチロクに発する言葉を、\n自分の心の奥にもそのまま染み込ませてく。
2549 = "Những lời nói với Hachiroku,\\ntôi cũng để chúng thấm sâu vào tận đáy lòng mình."

# monologue
# JP: 何度でも何度でも、言い聞かせねば、\nこんな弾みで、“割り切った”つもりが崩れてしまう。
2471 = "Phải tự nhủ hết lần này đến lần khác,\\n nếu không thì chỉ cần một khoảnh khắc thế này, cái quyết tâm mà tôi tưởng mình đã có sẽ sụp đổ mất."

# 【双鉄】
# display as 雙鐵
# JP: 「法的責任を負わされたのなら、もちろんそれを償う。\n法的責任が無いのなら、果たすべきはただ、回復だ」
1879 = "「Nếu phải chịu trách nhiệm pháp lý, dĩ nhiên chúng ta sẽ bồi thường.\\nCòn nếu không có trách nhiệm pháp lý, thì việc duy nhất cần làm là phục hồi.」"

# 【ハチロク】
# display as 八六
# JP: 「回、復……」
1735 = "「Phục, hồi……」"

# monologue
# JP: 一音一音、噛み砕く。
2254 = "Em nghiền ngẫm từng âm, từng tiếng."

# monologue
# JP: そうしなければ、\nとても理解ができないとでも言わんばかりに。
2486 = "Như thể nếu không làm vậy,\\nem sẽ chẳng thể nào hiểu nổi."

# 【ハチロク】
# display as 八六
# JP: 「けれど……\x%l8620;#00ffc040;8620%l;#;はこんなにも」
1715 = "「Nhưng mà…… \\x%l8620;#00ffc040;8620%l;#; đã bị đến mức này…」"

# 【双鉄】
# display as 雙鐵
# JP: 「諦めるのか？」
1730 = "「Cô định bỏ cuộc sao?」"

# monologue
# JP: 何度も自らに問うたこと。\nそれをそのまま、ハチロクの小さな体に投げかける。
2513 = "Câu hỏi mà tôi đã tự vấn bản thân không biết bao nhiêu lần.\\nGiờ đây tôi ném thẳng nó vào tấm thân nhỏ bé của Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「諦めるなら、反対はせん。\n僕はお前の望みに従い――\x%l8620;#00ffc040;8620%l;#;を殺してしまおう」
1876 = "「Nếu cô bỏ cuộc, tôi sẽ không phản đối.\\nTôi sẽ làm theo mong muốn của cô――và kết liễu \\x%l8620;#00ffc040;8620%l;#;.」"

# 【ハチロク】
# display as 八六
# JP: 「ダメっ！　ダメですっ！！　それは駄目っ！」
1692 = "「Không! Không được!! Tuyệt đối không được!」"

# 【双鉄】
# display as 雙鐵
# JP: 「諦めぬなら――やるしかない。\nどれほど傷んでいようとも」
1873 = "「Nếu không bỏ cuộc――thì chỉ có một con đường thôi.\\nDù cho nó có hư hỏng đến mức nào đi nữa.」"

# monologue
# JP: 言い切り、ハチロクの反応を待つ。
2548 = "Tôi dứt lời, chờ đợi phản ứng của Hachiroku."

# monologue
# JP: うなだれきったハチロクは、\n小さく小さく首を振り――そうして、言葉を絞り出す。
2390 = "Hachiroku, người vẫn đang gục đầu, \\nlắc nhẹ, thật nhẹ đầu mình――rồi, nặn ra từng chữ."

# 【ハチロク】
# display as 八六
# JP: 「……はい、そうですね。\n双鉄様の、おっしゃるとおりと思います」
1508 = "「...Vâng, đúng vậy ạ.\\nEm nghĩ mọi chuyện đều như lời ngài Soutetsu nói.」"

# monologue
# JP: 涙のベールの向こうで、けれど、\nハチロクの目に光が戻る。
2458 = "Phía sau bức màn lệ, thế nhưng, \\nánh sáng đã trở lại trong đôi mắt Hachiroku."

# monologue
# JP: 力なく垂れ下がってた腕の先、\n拳が、かすかに握られる。
2389 = "Nơi cánh tay đang buông thõng vô lực, \\nnắm đấm khẽ siết chặt lại."

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。僕は、今一度だけ問おう。\nお前は、\x%l8620;#00ffc040;8620%l;#;を助けるものか？　見捨てるものか？」
2076 = "「Vậy thì Hachiroku. Tôi sẽ hỏi em một lần nữa.\\nEm sẽ cứu lấy \\x%l8620;#00ffc040;8620%l;#;? Hay sẽ bỏ mặc nó?」"

# 【ハチロク】
# display as 八六
# JP: 「助けます。必ず」
1931 = "「Em sẽ cứu. Nhất định ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1957 = "「Vậy sao.」"

# monologue
# JP: どれほどの金がかかるか、どれほどの労力が要求されるか。\n諦めてしまうための言い訳なら無数にある。
2703 = "Sẽ tốn bao nhiêu tiền, sẽ đòi hỏi bao nhiêu công sức.\\nNếu muốn tìm cớ để từ bỏ, thì có vô số."

# monologue
# JP: けれど諦めないのなら――\n進める道は、いつでもたったひとつしかない。
2306 = "Nhưng nếu không từ bỏ――\\ncon đường tiến bước, lúc nào cũng chỉ có một mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を助けるための、初めの一歩だ」
2060 = "「Đây là bước đầu tiên, để cứu lấy \\x%l8620;#00ffc040;8620%l;#;.」"

# monologue
# JP: まだしゃがみこむハチロクから、大きく退き距離をとる。
2514 = "Tôi lùi một bước lớn, tạo khoảng cách với Hachiroku vẫn đang ngồi thụp xuống."

# monologue
# JP: 何かを指示するまでもなく、\n見守っていた日々姫も僕にならってくれる。
2262 = "Chẳng cần tôi phải ra hiệu, \\nHibiki đang đứng nhìn cũng bắt chước làm theo."

# 【双鉄】
# display as 雙鐵
# JP: 「手は貸さん。\nハチロク、お前は、お前の足だけで立ち上がれ」
1901 = "「Tôi sẽ không giúp đâu.\\nHachiroku, em hãy tự đứng dậy bằng chính đôi chân của mình.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様」
1871 = "「Vâng. Thưa ngài Soutetsu.」"

# monologue
# JP: がくがくと、ハチロクの膝が震えている。\n涙は、止まる気配を見せない。
2363 = "Đầu gối Hachiroku run lên bần bật.\\nNước mắt cô không có dấu hiệu nào là sẽ ngừng rơi."

# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
1795 = "「Á!?」"

# monologue
# JP: 立ち上がろうとして転び、\nハチロクは床に顔をしたたかうちつける。
2447 = "Cố gắng đứng dậy rồi ngã nhào,\\nHachiroku đập mạnh mặt xuống sàn."

# 【日々姫】
# display as 日日姬
# JP: 「…………」
1495 = "「……」"

# monologue
# JP: ぎり、と歯噛みする音がする。\n日々姫は、それでもこらえてくれる。
2542 = "Tiếng nghiến răng ken két vang lên.\\nDù vậy, Hibiki vẫn cố gắng kìm nén."

# monologue
# JP: ハチロクを助けたい気持ちをぐっと抑えて、\nハチロクを――僕を、信じてくれる。
2455 = "Cô ấy nén chặt mong muốn được giúp đỡ Hachiroku,\\ntin tưởng vào Hachiroku――và vào tôi."

# 【ハチロク】
# display as 八六
# JP: 「見苦しいところを――お見せ――しまっ――あっ！？」
2039 = "「Để ngài... phải thấy... cảnh tượng... khó coi... Á!?」"

# monologue
# JP: また転ぶ。\n震えるヒザが、全くその用を為していないのだ。
2449 = "Cô lại ngã.\\nĐôi đầu gối run rẩy của cô hoàn toàn không thể chống đỡ nổi nữa."

# monologue
# JP: 何度も転び、また立とうとし――\nやがてようやくハチロクは、両膝を両手で抑え、立つ。
2437 = "Ngã xuống rồi lại cố đứng lên không biết bao nhiêu lần――\\ncuối cùng Hachiroku cũng đứng dậy được, hai tay chống lên đầu gối."

# 【ハチロク】
# display as 八六
# JP: 「んっ……くっ！」
1826 = "「Ư... hự!」"

# monologue
# JP: ぎく、しゃくと。\nそのままの姿勢でハチロクが歩く。
2343 = "Loạng choạng, khập khiễng.\\nCứ thế, Hachiroku bước đi trong tư thế đó."

# monologue
# JP: いつもの優美な立ち姿、歩き姿とはまるで違った、\n無様な姿で、それでもハチロクは休まず歩く。
2338 = "Hoàn toàn khác với dáng đứng, dáng đi thanh tao thường ngày,\\ndù trong bộ dạng thảm hại, Hachiroku vẫn không ngừng bước."

# 【ハチロク】
# display as 八六
# JP: 「おま……たせ……しました……\n双鉄、様っ」
2038 = "「Đã... để... ngài... phải đợi...\\nSoutetsu-sama!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや？　予想よりもずっと早かった」
1688 = "「Đâu có? Em còn đến nhanh hơn tôi tưởng nhiều.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1798 = "「Chà.」"

# monologue
# JP: ハチロクが笑う。
2368 = "Hachiroku mỉm cười."

# monologue
# JP: まだ全身を震わせたまま。涙を流し続けるままに。
2333 = "Cả người em vẫn run lên bần bật. Nước mắt vẫn không ngừng tuôn rơi."

# 【双鉄】
# display as 雙鐵
# JP: 「予想よりもずっと早く、はるかに見事な歩みだった」
1725 = "「Nhanh hơn dự đoán rất nhiều, một bước tiến vô cùng ngoạn mục.」"

# monologue
# JP: ハチロクは自ら一歩を踏み出し、\nその進むべき道を示した。
2370 = "Hachiroku đã tự mình bước một bước về phía trước,\nchỉ ra con đường mà em ấy nên đi."

# monologue
# JP: ならば僕も所有者として、\nハチロクの望みをできうる限りに助けよう。
2753 = "Vậy thì, với tư cách là chủ nhân,\ntôi sẽ làm tất cả những gì có thể để giúp Hachiroku thực hiện mong muốn của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「ここから先は僕も一緒だ。\nハチロク、まずは何から始める？」
1937 = "「Từ giờ trở đi, anh sẽ luôn ở bên em.\nHachiroku, đầu tiên chúng ta nên bắt đầu từ đâu?」"

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。双鉄様」
2036 = "「Cảm ơn ngài rất nhiều. Soutetsu-sama.」"

# monologue
# JP: くたり、ハチロクが僕の腕の中へと崩れてくる。
2355 = "Rũ người, Hachiroku ngã vào vòng tay tôi."

# monologue
# JP: 抱きかかえれば、冷たさを感じる。\n普段のハチロクは暖かなのだと、今更逆に思い知る。
2522 = "Bế em lên, tôi cảm nhận được một sự lạnh lẽo.\nGiờ tôi mới nhận ra, Hachiroku bình thường vốn rất ấm áp."

# 【ハチロク】
# display as 八六
# JP: 「キャブへ……\nわたくしを\x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;へと連れていってください」
2091 = "「Đến buồng lái...\nHãy đưa em đến \\x%lbuồng lái;#00ffc040;buồng lái%l;#; của \\x%l8620;#00ffc040;8620%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1831 = "「嗯」" 

# monologue
# JP: ハチロクを抱き、\x%l運転台;#00ffc040;運転台%l;#;へとあがるステップに足をかける。
2523 = "Ôm Hachiroku, tôi đặt chân lên bậc thang dẫn tới \\x%lbuồng lái;#00ffc040;buồng lái%l;#;."

# monologue
# JP: つれて視界が広がれば、困ったような顔のれいなと、\nその傍らに寄り添うポーレットとが見える。
2776 = "Khi tầm nhìn được mở rộng, tôi thấy Reina với vẻ mặt bối rối,\nvà Paulette đang đứng sát bên cạnh an ủi."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1905 = "「Không sao đâu.」"

# monologue
# JP: ハチロクに、日々姫に、ポーレットに、れいなに。\nそして僕自身へと伝えるために、それだけつぶやく。
2664 = "Gửi đến Hachiroku, đến Hibiki, đến Paulette, và Reina.\nVà cũng là để tự trấn an bản thân, tôi chỉ thì thầm như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そら、ハチロク。入ったぞ――っ！？」
1996 = "「Nào, Hachiroku. Vào được rồi――Hả!?」"

# monologue
# JP: 初めて入る、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;。
2672 = "Lần đầu tiên bước vào \\x%lbuồng lái;#00ffc040;buồng lái%l;#; của \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; \\x%l8620;#00ffc040;8620%l;#;."

# monologue
# JP: その床、ごろりと――\n少女が倒れ伏している。
2253 = "Trên sàn nhà, loảng xoảng――\\nmột cô gái đang nằm sõng soài."

# 【ハチロク】
# display as 八六
# JP: 「ああ……よかった。\nわたくしです――わたくしの整備[ボディ]体です」
1810 = "「A a... may quá.\\nLà tôi đây―― là Thể Bảo Trì của tôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。これがか」
1821 = "「À. Thì ra là nó.」"

# monologue
# JP: 安堵と、理解と。\nそれが同時にじわり広がる。
2475 = "Sự nhẹ nhõm, và cả thấu hiểu.\\nCả hai cảm xúc đồng thời lan tỏa chậm rãi."

# monologue
# JP: ハチロクの求めるままに\x%l運転体;#00ffc040;運転体%l;#;を床へと下ろせば、\n小さな体は倒れる体に、静かに静かに歩み寄る。
2529 = "Theo lời Hachiroku, tôi đặt \\x%lThể Điều Khiển;#00ffc040;Thể Điều Khiển%l;#; xuống sàn,\\nthân hình nhỏ bé ấy lặng lẽ, lặng lẽ tiến lại gần cơ thể đang nằm."

# 【ハチロク】
# display as 八六
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を交換します。\n驚かないでくださいましね？」
1929 = "「Tôi sẽ thay đổi \\x%lBảng Điều Khiển;#00ffc040;Bảng Điều Khiển%l;#;.\\nNgài đừng ngạc nhiên nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1831 = "「嗯」" 

# monologue
# JP: 僕の返事に、安堵したような笑みが浮かぶ。
2465 = "Nghe câu trả lời của tôi, một nụ cười nhẹ nhõm hiện lên trên môi cô."

# monologue
# JP: そしてハチロクは祈りの姿勢で両膝をつき、\n一枚の、大きな円盤を服の下から引きずり出す。
2633 = "Rồi Hachiroku quỳ cả hai gối xuống trong tư thế cầu nguyện,\\nvà lôi ra một chiếc đĩa tròn lớn từ bên dưới lớp áo."

# monologue
# JP: （あれが\x%lタブレット;#00ffc040;タブレット%l;#;とやらか？\n交換、とハチロクは言っていたが……）
2836 = "（Kia là cái gọi là \\x%lBảng Điều Khiển;#00ffc040;Bảng Điều Khiển%l;#; sao?\\nHachiroku nói là sẽ 'thay đổi', nhưng mà...）"

# monologue
# JP: ハチロクの手は動き続ける。
2351 = "Đôi tay Hachiroku vẫn tiếp tục chuyển động."

# monologue
# JP: 倒れている\x%l整備体;#00ffc040;整備体%l;#;の服の胸元を開け、\nそこから何か、ネックレスのようなものを引き出して――
2453 = "Cô mở phần ngực áo của \\x%lThể Bảo Trì;#00ffc040;Thể Bảo Trì%l;#; đang nằm,\\nrồi lôi ra từ đó một vật gì đó trông như vòng cổ――"

# monologue
# JP: （カチリ）
# 2821 = "（喀嚓）" 

# monologue
# JP: ――音がする。それと同時に\x%l運転体;#00ffc040;運転体%l;#;のハチロクが、\nぜんまい切れを起こしたように崩れてしまう。
1456 = "――Một âm thanh vang lên. Cùng lúc đó, Hachiroku của \\x%lThể Điều Khiển;#00ffc040;Thể Điều Khiển%l;#;,\\nđổ gục xuống như một con búp bê hết dây cót."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！？」
1751 = "「Hachiroku!?」"

# 【ハチロク】
# display as 八六
# JP: 「驚かないでくださいましと、お願いいたしましたのに」
1900 = "「Tôi đã xin ngài đừng ngạc nhiên rồi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2098 = "「！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……なのか」
1724 = "「Hachiroku... là em sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしです、双鉄様」
1961 = "「Vâng. Là em đây, Soutetsu-sama」"

# monologue
# JP: 答えた少女――
2476 = "Cô gái đã trả lời――"

# monologue
# JP: \x%l整備体;#00ffc040;整備体%l;#;のハチロクは、\n運転席とおぼしき場所に置いてある、黒い鞄を僕に示す。
77 = "Hachiroku trong \\x%l整備体;#00ffc040;Thân thể Bảo trì%l;#; của mình,\\nchỉ cho tôi chiếc cặp đen đặt ở nơi dường như là ghế lái."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、これを。\n\x%l乗務鞄;#00ffc040;[じょうむかばん,2]乗務鞄%l;#;と呼ばれるものです」
2088 = "「Soutetsu-sama, ngài hãy cầm lấy cái này.\\nNó được gọi là \\x%l乗務鞄;#00ffc040;Cặp Lái tàu%l;#; ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1831 = "「嗯」" 

# monologue
# JP: 黒の本革。\nずしりと重い。
2792 = "Da thật màu đen.\\nNặng trịch."

# 【ハチロク】
# display as 八六
# JP: 「\x%l乗務鞄;#00ffc040;乗務鞄%l;#;の中には、運転[ボディ]体が収まるようになっています」
1486 = "「Bên trong \\x%l乗務鞄;#00ffc040;Cặp Lái tàu%l;#; được thiết kế để chứa vừa Module Điều khiển ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1959 = "「Ồ」"

# monologue
# JP: 鞄を開けば、ハチロクが僕に\x%l運転体;#00ffc040;運転体%l;#;をそっと手渡す。\n鞄の中へ――ああ、これは見事にきっちり収まるものだ。
2517 = "Khi tôi mở chiếc cặp, Hachiroku nhẹ nhàng trao cho tôi \\x%l運転体;#00ffc040;Module Điều khiển%l;#;.\\nĐặt vào bên trong――A, nó vừa vặn một cách hoàn hảo."

# 【ハチロク】
# display as 八六
# JP: 「\x%l乗務鞄;#00ffc040;乗務鞄%l;#;は、わたくしの寝台にして家のようなもの。\n双鉄様に肌身離さずお持ち頂けましたら嬉しく思います」
1485 = "「\\x%l乗務鞄;#00ffc040;Cặp Lái tàu%l;#; vừa là giường ngủ, vừa như là nhà của em vậy.\\nEm sẽ rất vui nếu Soutetsu-sama có thể luôn mang nó bên mình ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。責任をもって預かろう」
1923 = "「Anh hiểu rồi. Anh sẽ có trách nhiệm giữ gìn nó」"

# monologue
# JP: \x%l乗務鞄;#00ffc040;乗務鞄%l;#;のずっしりとした重さに比べ、\nあまりに軽かった\x%l運転体;#00ffc040;運転体%l;#;。
2692 = "So với sức nặng của \\x%l乗務鞄;#00ffc040;Cặp Lái tàu%l;#;,\\n\\x%l運転体;#00ffc040;Module Điều khiển%l;#; lại nhẹ đến không ngờ."

# monologue
# JP: その手触りを思えば不意に、\nひとつの疑問がわきおこってくる。
2422 = "Bất chợt nghĩ về cảm giác khi chạm vào nó,\\nmột câu hỏi nảy ra trong đầu tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;は……お前の、魂なのか？」
1480 = "「Cái \\x%lタブレット;#00ffc040;tablet%l;#; này... là linh hồn của em sao?」"

# monologue
# JP: 魂を抜き、別の体に入れ込んだ。
2782 = "Rút linh hồn ra, rồi đặt vào một cơ thể khác."

# monologue
# JP: 感じた印象のままを言葉に収めてみれば、\nハチロクは、けれど静かに首をふる。
2519 = "Khi tôi thử nói ra thành lời những gì mình cảm nhận,\\nthì Hachiroku lại lặng lẽ lắc đầu."

# 【ハチロク】
# display as 八六
# JP: 「魂などは持ちませぬ。\nわたくしたち、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は物ですから」
1913 = "Bọn em không có thứ gọi là linh hồn.\\nBởi vì bọn em, những \\x%lRailord;#00ffc040;Railord%l;#;, chỉ là đồ vật mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いや。\nそれはそうだが――」
1955 = "À... không.\\nChuyện đó thì đúng là vậy, nhưng mà--"

# 【ハチロク】
# display as 八六
# JP: 「人間の体に例えるのなら、\n\x%lタブレット;#00ffc040;タブレット%l;#;は、脳に近いかとわたくしは」
1991 = "Nếu ví với cơ thể con người,\\nthì em nghĩ \\x%ltablet;#00ffc040;tablet%l;#; gần giống như bộ não ạ."

# 【双鉄】
# display as 雙鐵
# JP: 「脳、か」
1854 = "Bộ não, à."

# monologue
# JP: 運転、整備。それぞれの行動に適した体へ、\n脳をまるごと入れ替える。
2786 = "Vận hành, bảo trì. Toàn bộ bộ não được hoán đổi\\nsang một cơ thể phù hợp với từng hành động."

# monologue
# JP: それは確かに、\n物にしか出来ようもないことではあるが……
2740 = "Đó quả thực là một việc\\nmà chỉ có đồ vật mới làm được, nhưng mà..."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　なにかお気がかりでも？」
2090 = "Ngài Soutetsu? Có chuyện gì khiến ngài bận tâm sao ạ?"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1818 = "À, không có gì."

# monologue
# JP: つまらんことに因われていても仕方がない。\nそれより今はハチロクの――うむ？
2335 = "Cứ mãi vướng bận vào mấy chuyện vớ vẩn này cũng chẳng được gì.\\nQuan trọng hơn là chuyện của Hachiroku bây giờ... Hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、随分と落ち着いたのだな」
1744 = "Hachiroku, trông em đã bình tĩnh hơn nhiều rồi nhỉ."

# 【ハチロク】
# display as 八六
# JP: 「……この体は、今はからからに乾ききっていますから」
1510 = "…Bởi vì cơ thể này, bây giờ đã khô khốc cả rồi ạ."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1812 = "Ừ."

# monologue
# JP: だから、涙が流れないだけ――
2558 = "Chỉ là vì thế, nên nước mắt không thể rơi được mà thôi..."

# monologue
# JP: それを証明するように、\n体の方は替わってもなお、わずかな震えを消せていない。
2487 = "Như để chứng minh cho điều đó,\\ndù đã đổi sang cơ thể khác, cô vẫn không thể giấu đi những run rẩy khẽ khàng."

# 【双鉄】
# display as 雙鐵
# JP: 「水と石炭を持ってくるか？」
2023 = "Để anh đi lấy nước và than đá nhé?"

# 【ハチロク】
# display as 八六
# JP: 「いえ、適宜に非常動力――\n鉄道時計のゼンマイをお巻きくださればそれで」
1695 = "「Không cần đâu ạ, chỉ cần ngài lên dây cót cho nguồn năng lượng dự phòng――\\nchiếc đồng hồ đường sắt này một cách thích hợp là được rồi ạ」"

# 【ハチロク】
# display as 八六
# JP: 「今は、\x%l蒸気排水;#00ffc040;蒸気排水%l;#;さえも、\n作業の邪魔になってしまいますので」
1987 = "「Bởi vì bây giờ, ngay cả việc \\x%lxả hơi nước;#00ffc040;xả hơi nước%l;#; cũng\\nsẽ cản trở công việc mất ạ」"

# monologue
# JP: すっくと、ハチロクは立ち上がる。
2346 = "Hachiroku dứt khoát đứng dậy."

# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;の各所を指さし点検し、\nそしてそのまま自分の足で、外へと降り立つ。
2442 = "Cô chỉ tay kiểm tra từng bộ phận trong \\x%lbuồng lái;#00ffc040;buồng lái%l;#;,\\nrồi cứ thế dùng chính đôi chân mình để bước ra ngoài."

# 【れいな】
# display as 玲奈
# JP: 「あの、れいな。あの、ハチロクさんをびっくりさせる\nつもりじゃなくって」
2069 = "「À, Reina... Reina không có ý làm chị Hachiroku\\ngiật mình đâu ạ」"

# 【ハチロク】
# display as 八六
# JP: 「大丈夫。わかっています」
1966 = "「Không sao đâu. Chị hiểu mà」"

# monologue
# JP: キャブから機関庫に下りるやいなや、\nれいながぽてぽて一生懸命ハチロクに駆け寄り頭を下げる。
2446 = "Vừa bước từ buồng lái xuống xưởng máy,\\nReina đã lon ton chạy tới cúi đầu trước Hachiroku."

# monologue
# JP: ハチロクはそれをふんわりと、\n大人びた笑顔で包み込む。
2345 = "Hachiroku dịu dàng đáp lại bằng\\nmột nụ cười trưởng thành."

# 【ハチロク】
# display as 八六
# JP: 「わたくしの方こそ、\n取り乱して驚かせてしまって、ごめんなさいね」
1912 = "「Chị mới là người phải xin lỗi vì đã mất bình tĩnh\\nlàm em giật mình. Chị xin lỗi nhé」"

# 【れいな】
# display as 玲奈
# JP: 「ううん、れいなは、れいなは全然平気ですぅ」
1967 = "「Dạ không, Reina, Reina không sao chút nào hết á」"

# 【ハチロク】
# display as 八六
# JP: 「同じよ。わたくしも全然平気。\nだから、ね？　これで仲直り」
1903 = "「Chị cũng vậy. Chị cũng không sao hết.\\nVậy nên, nhé? Chúng ta làm hòa nào」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
1864 = "「Vâng ạ!」"

# monologue
# JP: 固く握手。
2340 = "Họ siết chặt tay nhau."

# monologue
# JP: そこでようやく気づいたらしく、\nれいなが「はわぁ」と、どこか間延びした声をだす。
2640 = "Dường như lúc này mới để ý,\\nReina thốt lên một tiếng \"Hawaa\" kéo dài."

# 【れいな】
# display as 玲奈
# JP: 「ハチロクさん、整備[ボディ]体ですねぇ。\nすてきですぅ、とっても、とってもきれいですぅ」
1747 = "「Chị Hachiroku, đây là hình thái bảo trì của chị ạ.\\nTuyệt vời quá đi, rất, rất là đẹp luôn đó ạ」"

# monologue
# JP: ほわ、と大きなためいきをつき。
2716 = "Cô thở hắt ra một hơi thật dài."

# monologue
# JP: それかられいなは握手していた手を離し、\nぱん、と明るくうちならす。
2638 = "Sau đó, Reina buông tay đang bắt ra,\\nvà vỗ tay một cái thật tươi."

# 【れいな】
# display as 玲奈
# JP: 「れいなも、\x%l整備体;#00ffc040;整備体%l;#;で来てよかったですぅ。\nがんばってハチロクさんのお手伝いをしちゃいますねぇ」
1982 = "「Reina cũng thấy may mắn khi đến đây trong \\x%lDạng Bảo Trì;#00ffc040;Dạng Bảo Trì%l;#; lắm ạ.\\nEm sẽ cố gắng hết sức để giúp đỡ chị Hachiroku nhé ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1812 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな。\nもしよければ、それは明日から頼めるか？」
1980 = "「Reina này.\\nNếu được, tôi có thể nhờ cô việc đó bắt đầu từ ngày mai không?」"

# 【れいな】
# display as 玲奈
# JP: 「明日からですかぁ？\nれいなは、明日からでも大丈夫ですぅ」
1891 = "「Bắt đầu từ ngày mai ạ?\\nReina thì bắt đầu từ mai cũng không sao đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それなら、明日から頼む」
1956 = "「Vậy à. Thế thì, nhờ cô từ ngày mai nhé.」"

# monologue
# JP: 言い切れば、れいなに聞こえぬようにそうっと、\nハチロクは長い息を吐く。
2505 = "Dứt lời, Hachiroku khẽ thở ra một hơi dài, đủ nhỏ để Reina không nghe thấy."

# monologue
# JP: （やはり、か）
2830 = "（Quả nhiên là vậy sao.）"

# monologue
# JP: 恐らく、今のハチロクは――
2495 = "Có lẽ, Hachiroku của bây giờ――"

# monologue
# JP: 事故に関する冷静な評価にも、単なる事実確認にさえ、\n深く、深く傷ついてしまう。
2387 = "Dù chỉ là một lời đánh giá bình tĩnh về vụ tai nạn, hay thậm chí là việc xác nhận sự thật đơn thuần,\\ncũng sẽ khiến cô tổn thương vô cùng sâu sắc."

# 【ポーレット】
# display as 波萊特
# JP: 「さ、それなられいな。\nわたしたちは、わたしたちのお仕事に戻りましょう？」
1861 = "「Nào, vậy thì Reina.\\nChúng ta quay lại với công việc của mình thôi nhỉ?」"

# 【れいな】
# display as 玲奈
# JP: 「はあい」
# 1857 = "「好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なにか、お手伝いできることができたら。\nそのときはいつでも、遠慮なく声をかけてくださいね」
2025 = "「Nếu có bất cứ điều gì chúng tôi có thể giúp đỡ được.\\nLúc đó, xin chị cứ tự nhiên gọi chúng tôi bất cứ lúc nào nhé.」"

# monologue
# JP: “できたら”と、その一言に安堵する。
2617 = "Tôi thấy nhẹ nhõm trước hai chữ \"nếu được\"."

# monologue
# JP: ポーレットもまた、今のハチロクを理解して――\n急かさず待ってくれると示してくれているから。
2616 = "Bởi vì Paulette cũng đã thấu hiểu cho tình trạng của Hachiroku lúc này――\\nvà cho thấy rằng cô ấy sẽ chờ đợi chứ không hề hối thúc."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい。\nその時には、遠慮をしている余裕など無くなろうからな」
1855 = "「Tôi rất biết ơn.\\nVì đến lúc đó, có lẽ tôi cũng chẳng còn tâm trí đâu mà khách sáo nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「かもしれませんね」
2028 = "「Có lẽ vậy ạ.」"

# monologue
# JP: 僕へ、そうしてハチロク、日々姫へ。
2613 = "Nói với tôi, rồi đến Hachiroku và Hibihime."

# monologue
# JP: 軽く頭を下げてから、\nれいなを連れて、ポーレットは機関庫を出て行く。
2775 = "Sau khi khẽ cúi đầu chào,\\nPaulette dẫn Reina rời khỏi nhà ga đầu máy."

# 【日々姫】
# display as 日日姬
# JP: 「にい――さん。私はどうします？\nハチロクに、石炭と水を持ってきましょうか？」
2080 = "「Anh――hai. Em nên làm gì đây ạ?\\nEm mang than đá và nước đến cho Hachiroku nhé?」"

# monologue
# JP: 日々姫の言葉に、内心驚く。
2687 = "Tôi thầm ngạc nhiên trước lời nói của Hibihime."

# monologue
# JP: 聡明なことは理解していたつもりだったが……\nここまで気遣いできるほど、大人になっていたのかと。
2556 = "Tôi cứ ngỡ mình đã hiểu em ấy thông minh đến mức nào...\\nnhưng không ngờ em ấy đã trưởng thành đến độ có thể chu đáo đến vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな……ハチロク。\n修復すべき点をざっと洗い出すに、どの位かかる？」
1910 = "「Để xem nào... Hachiroku.\\nĐể kiểm tra sơ bộ các điểm cần sửa chữa thì sẽ mất bao lâu?」"

# 【ハチロク】
# display as 八六
# JP: 「……ざっと、でしたら――日付が変わる前には、\nなんとかといったところでしょうか」
1512 = "「...Nếu chỉ kiểm tra sơ bộ――thì có lẽ sẽ xong trước khi sang ngày mới ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そうだな――午後七時」
2078 = "「Vậy thì, để xem nào――bảy giờ tối nhé.」"

# monologue
# JP: それまで経てば、\nハチロクの動揺も少しは落ち着いてくれるだろう。
2749 = "Đến lúc đó,\\nchắc sự bối rối của Hachiroku cũng sẽ dịu đi phần nào."

# 【双鉄】
# display as 雙鐵
# JP: 「午後七時になったら、ハチロクの石炭と水、\nそれから」
2010 = "「Khi nào đến bảy giờ tối, em mang than đá và nước cho Hachiroku,\\nrồi còn...」"

# 【日々姫】
# display as 日日姬
# JP: 「わかりました。兄さんの夕食と、\nそれから着替えも、用意してここに戻ってきます」
1926 = "「Em hiểu rồi ạ. Em sẽ chuẩn bị bữa tối cho anh hai,\\ncả quần áo để thay nữa, rồi quay lại đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい」
2035 = "「Cảm ơn em nhiều lắm.」"

# monologue
# JP: 心の底から出てきた言葉を、\n明るい笑顔で受け止めて。
2460 = "Em ấy đón nhận những lời từ tận đáy lòng tôi,\\nbằng một nụ cười rạng rỡ."

# monologue
# JP: そして日々姫は大股で、\n振り向くことなく、機関庫を出る。
2637 = "Và rồi Hibihime sải bước dài,\\nrời khỏi nhà ga đầu máy mà không hề ngoảnh lại."

# 【双鉄】
# display as 雙鐵
# JP: 「さてと、ハチロク。指示してくれ。\n２３：００には終わらせたい」
1858 = "「Được rồi, Hachiroku. Em chỉ dẫn cho anh đi.\\nAnh muốn chúng ta xong việc trước 23:00」"

# 【ハチロク】
# display as 八六
# JP: 「少し、忙しくなりますが」
2073 = "「Sẽ hơi bận rộn một chút ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕とお前だ。\n集中すれば、こなせよう」
1897 = "「Có anh và em đây mà.\\nChỉ cần tập trung, chúng ta sẽ làm được thôi」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。\nご信頼にお応えできますよう、つくします」
1869 = "「Vâng, thưa ngài Soutetsu.\\nEm sẽ cố hết sức để đáp lại sự tin tưởng của ngài」"

# monologue
# JP: これでいい。\nキツめの時間を設定すれば、目の前だけに集中できる。
2743 = "Thế này là được rồi.\\nNếu đặt ra một mốc thời gian sít sao, mình có thể chỉ tập trung vào công việc trước mắt."

# monologue
# JP: （……ハチロクの事故とは無関係な僕にさえ――\nこの生々しい事故痕は、吐き気を催させるのだからな）
2802 = "（...Ngay cả mình, một người không liên quan đến vụ tai nạn của Hachiroku――\\nmà những dấu vết tai nạn rành rành thế này còn khiến mình buồn nôn.）"

# monologue
# JP: ならば、当事者であるハチロクは、\nどれほど苦しく、心乱していることか。
2757 = "Vậy thì, Hachiroku, người trong cuộc,\\ncòn đau khổ và rối bời đến mức nào nữa chứ."

# 【双鉄】
# display as 雙鐵
# JP: 「さて、やるぞ」
1733 = "「Nào, bắt đầu thôi」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。\nそれではまずは、わたくし、四面図を起こします」
1870 = "「Vâng, thưa ngài Soutetsu.\\nVậy thì trước hết, em sẽ vẽ bản vẽ bốn mặt ạ」"

# monologue
# JP: ハチロクがキャブの中へと消えて、\n書類挟と紙とペンを手にしてすぐに戻ってくる。
2365 = "Hachiroku biến mất vào trong khoang lái,\\nrồi nhanh chóng quay lại với một tấm bìa kẹp hồ sơ, giấy và bút trên tay."

# monologue
# JP: そんな些細なものまで全て、\n手付かずのまま、放置をされていたのだろう。
2478 = "Ngay cả những thứ nhỏ nhặt như vậy,\\ncũng đều bị bỏ mặc, không ai đụng đến."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、その四面図に、\n目で見える破損箇所を残らずマークしていってください」
2029 = "「Ngài Soutetsu, trên bản vẽ bốn mặt đó,\\nxin hãy đánh dấu lại tất cả những chỗ hư hỏng có thể nhìn thấy bằng mắt thường ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「マークの仕方は？」
2027 = "「Đánh dấu như thế nào?」"

# 【ハチロク】
# display as 八六
# JP: 「図を起こしたら、数カ所はご一緒させていただきます」
1933 = "「Sau khi em vẽ xong, em sẽ cùng ngài đánh dấu vài chỗ đầu tiên ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。そのときにハチロクのやり方を見て学ぼう」
1921 = "「Anh hiểu rồi. Lúc đó anh sẽ xem cách làm của Hachiroku rồi học theo」"

# 【ハチロク】
# display as 八六
# JP: 「はい。そのようにお願いいたします」
1837 = "「Vâng. Xin hãy làm như vậy ạ.」"

# monologue
# JP: そしてハチロクは書類挟に紙を敷き、\nフリーハンドで見事な直線をひといきに引く。
2634 = "Và rồi Hachiroku đặt một tờ giấy lên kẹp tài liệu,\\nvà chỉ bằng tay không, cô ấy liền một mạch vẽ nên một đường thẳng tuyệt đẹp."

# monologue
# JP: （うむ。そうだ。それでいい）
2823 = "（Ừm. Đúng vậy. Cứ thế là được.）"

# monologue
# JP: 手と頭を、目一杯にまで使っていれば、\n余計な全てを追い払える。
2406 = "Chỉ cần dồn hết tâm trí và đôi tay vào công việc,\\nthì sẽ có thể xua đi mọi suy nghĩ thừa thãi."

# monologue
# JP: （逃げるのならば、真正面にだ。\nそうしなければ、傷の深さに飲み込まれる）
2826 = "（Nếu có chạy trốn, thì hãy chạy thẳng về phía trước.\\nNếu không làm vậy, ta sẽ bị chính chiều sâu của vết thương nuốt chửng.）"

# 【ハチロク】
# display as 八六
# JP: 「……ずっと使ってなかったせいでしょうか。\nこちらのわたくしも、なんだかひどく不器用です」
1504 = "「……Có lẽ là do đã lâu không sử dụng chăng.\\nCơ thể này của tôi, cũng trở nên vụng về quá đỗi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　綺麗な図面に見えるが」
1958 = "「Vậy sao? Anh thấy bản vẽ này đẹp mà.」"

# 【ハチロク】
# display as 八六
# JP: 「いまひとつ――精度が――」
2012 = "「Chỉ là―― độ chính xác――」"

# monologue
# JP: 言われてみれば、\nわずかにだけれど線のふるえを見て取れる。
2678 = "Nghe cô ấy nói vậy,\\ntôi mới nhận ra một sự run rẩy nhẹ trong đường kẻ."

# monologue
# JP: が、今大事なのは精度ではなく、\n目の前に集中すること、そのことだけだ。
2270 = "Nhưng, điều quan trọng lúc này không phải là độ chính xác,\\nmà là việc tập trung vào công việc trước mắt, chỉ vậy mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「徐々にならしていけばいいさ」
1784 = "「Cứ từ từ rồi sẽ quen lại thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1812 = "「啊」" 

# monologue
# JP: 不満顔のハチロクが破こうとした図面を\nひょいと取り上げる。
2536 = "Tôi nhanh tay giật lấy bản vẽ mà Hachiroku đang định xé đi với vẻ mặt không hài lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「破損箇所のマークにだったら十分すぎるだろう。\n始めたい。ハチロク。どうか指導を頼む」
1782 = "「Để đánh dấu những chỗ hư hỏng thì thế này là quá đủ rồi.\\nAnh muốn bắt đầu ngay. Hachiroku. Xin hãy chỉ dẫn cho anh.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様」
# 1871 = "「好的，雙鐵少爺」" 

# monologue
# JP: （かぽーん）
2820 = "（Kapo~n）"

# monologue
# JP: ……にぃにぃが怖いくらいに真剣な顔しとったけん、\n私も夢中になっておてつだいしたばってん――
1474 = "…Thấy Nii-nii làm vẻ mặt nghiêm túc đến đáng sợ, nên em cũng đã mải mê giúp một tay, nhưng mà――"

# 【日々姫】
# display as 日日姬
# JP: 「巻き込まれたばい、まっくろばーーーい」
2037 = "「Bị lôi vào vụ này, đen như nhọ nồi luôn rồi~」"

# monologue
# JP: いくらなんでも、これは無か！\n髪の毛、黒いの、粉とれんかったらどぎゃんしよう～。
2381 = "Thế này thì quá đáng lắm rồi!\\nTóc tai này, mấy vệt đen này, nếu không gột sạch được lớp bột này thì em biết làm sao đây~."

# 【双鉄】
# display as 雙鐵
# JP: 「すまなかったな。だが、助かった」
1999 = "「Xin lỗi em nhé. Nhưng, cũng nhờ em mà anh được cứu.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、この貸しは高ぉつくけんね～」
2083 = "「Anh hai, món nợ lần này sẽ không rẻ đâu đấy nhé~」"

# monologue
# JP: (ぱしゃんっ！）
32 = "(Phá!)"

# 【双鉄】
# display as 雙鐵
# JP: 「うゎ、日々姫。行儀が悪いぞ」
1797 = "「Oái, Hibiki. Hư quá đi đấy.」"

# monologue
# JP: お行儀悪いの百も承知で、はしゃぐ、はしゃぐ。
2538 = "Biết tỏng là mình đang hư, nhưng cô bé vẫn cứ nô đùa, nô đùa."

# monologue
# JP: にぃにぃもハチロクも、\nお風呂のお湯につかっても、真っ黒な顔のままやけん。
2770 = "Cả anh hai và Hachiroku,\\ndù đã ngâm mình trong bồn nước nóng, mặt mũi vẫn cứ đen nhẻm như vậy."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nご負債、わたくしが半分負わせていただきます」
2087 = "「Soutetsu-sama.\\nMón nợ này, tôi xin phép được gánh một nửa.」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなん当然ばい。にぃにぃの分はにぃにぃの分、\nハチロクの分は最初からハチロクの分やもん」
2062 = "「Chuyện đó là đương nhiên rồi. Phần của anh hai là của anh hai,\\nphần của Hachiroku thì ngay từ đầu đã là của Hachiroku mà.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1799 = "「Trời ạ.」"

# monologue
# JP: 作ったような呆れ顔。\nけど、ハチロクは笑ってない。
2354 = "Một vẻ mặt sững sờ như được đúc ra từ khuôn.\\nNhưng, Hachiroku không hề cười."

# monologue
# JP: 昔のにぃにを見てるみたいで、\n私まで引きずられそうでそれが、ヤだ。
2663 = "Cứ như đang nhìn thấy anh hai của ngày xưa vậy,\\nkhiến em cũng sắp bị cuốn theo, và em... ghét điều đó."

# 【日々姫】
# display as 日日姬
# JP: 「ハチロクには、背中、流してもらうばい。\nにぃにぃには――んーと、どぎゃんしよかなぁ」
1745 = "「Em sẽ nhờ Hachiroku kỳ lưng cho.\\nCòn anh hai thì――ừm, nên bắt anh làm gì đây ta~」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしがおせなでしたら、\n双鉄様は、前を流されてはいかがですか？」
1942 = "「Nếu tôi kỳ lưng cho cô ấy,\\nthì Soutetsu-sama, ngài có thể kỳ phần trước cho cô ấy được không ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「みゃっ！？　みゃえっ！？」
1800 = "「Á!? O-Oái!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日々姫が良ければそうしよう」
1829 = "「Ừm. Nếu Hibiki thấy ổn thì cứ làm vậy đi.」"

# 【日々姫】
# display as 日日姬
# JP: 「いーわけなかけんねっ！\nそんなんダメばい！　ダメダメばいっ！！」
1785 = "「Lý do lý trấu gì chứ!\\nNhư vậy là không được! Không được không được đâu!!」"

# monologue
# JP: （ばしゃんっ！）
2824 = "（Soạt!）"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「うぉぷっ！？」\n「きゃっ！」
1824 = "「Ặc!?」\\n「Á!」"

# monologue
# JP: からかわれるなら、まだやり過ごせるけど、\nにぃに――兄さんもハチロクも、本気の本気だから怖い。
2405 = "Nếu chỉ bị trêu thì mình vẫn bỏ qua được, nhưng\\nNii-ni――anh hai và cả Hachiroku đều đang cực kỳ nghiêm túc, nên mình thấy sợ."

# monologue
# JP: ……やっぱり兄さん、“そういうこと”に、\nほんとに全然、これっぽっちも興味ない、みたいだし。
1472 = "…Quả nhiên, anh hai dường như\\nhoàn toàn không có, dù chỉ một chút hứng thú nào với 'chuyện đó' cả."

# 【ハチロク】
# display as 八六
# JP: 「わたくし、ひとまず髪を流します。\n髪の汚れを、日々姫につけてはいけませんから」
1907 = "「Tôi xin phép xả tóc trước ạ.\\nVì tôi không thể để tóc bẩn của mình dính vào người Hibiki được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1831 = "「嗯」" 

# monologue
# JP: \x%l整備体;#00ffc040;整備体%l;#;……私より少し小さいハチロクは、\nぱっと見だったら、人間の女の子そのものだ。
76 = "\\x%l整備体;#00ffc040;Thân thể bảo trì%l;#;……Hachiroku nhỏ hơn mình một chút,\\nnhìn thoáng qua thì trông y hệt một cô gái loài người."

# 【ハチロク】
# display as 八六
# JP: 「ん……」
1805 = "「Ưm...」"

# monologue
# JP: ハチロクの体。兄さんのいる場所からだったら、\nきっと、綺麗に見えるはず。
2367 = "Cơ thể của Hachiroku. Từ vị trí của anh hai,\\nchắc chắn sẽ trông rất đẹp."

# monologue
# JP: けど、兄さんは見ていない。\nハチロクのことも……私のことも。
2300 = "Nhưng, anh hai không hề nhìn.\\nCả Hachiroku... và cả mình nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1494 = "「…………」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2098 = "「！」" 

# monologue
# JP: 無言で、兄さんも洗い場に。\n隠さないから体が全部見えてしまう。
2417 = "Anh hai cũng lặng lẽ đi tới khu tắm gội.\\nAnh không hề che giấu, nên mình thấy hết toàn bộ cơ thể anh."

# monologue
# JP: 筋肉質の薄いお腹も、胸板も、\nそこに残る……事故の大きな、傷跡も。
2603 = "Cơ bụng săn chắc, lồng ngực vạm vỡ,\\nvà cả... vết sẹo lớn từ vụ tai nạn còn hằn lại trên đó."

# monologue
# JP: （あ……）
2819 = "（A...）"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の傷も自然に「治る」のか、\nハチロクにも傷跡があるのに気付いちゃう。
71 = "Vết thương của \\x%lRailord;#00ffc040;Railord%l;#; cũng có thể tự 'lành' sao,\\nmình chợt nhận ra Hachiroku cũng có một vết sẹo."

# monologue
# JP: 右肩下から肘あたりまで――\n\x%l8620;#00ffc040;8620%l;#;って機関車と、そっくりおんなじような傷。
2488 = "Từ dưới vai phải cho đến gần khuỷu tay――\\nmột vết sẹo y hệt như của đầu máy \\x%l8620;#00ffc040;8620%l;#;."

# 【日々姫】
# display as 日日姬
# JP: 「……あるわけなか、そぎゃんこつ」
1511 = "「...Làm gì có chuyện đó chứ.」"

# monologue
# JP: 重なって見えてゾっとして、振り払いたくて顔を洗う。\n――傷跡。兄さんのと、ハチロクの。
2419 = "Hình ảnh chúng chồng lên nhau khiến mình rùng mình, mình vốc nước rửa mặt để xua đi ý nghĩ đó.\\n――Vết sẹo. Của anh hai, và của Hachiroku."

# monologue
# JP: 大廃線時代の末期には、鉄道事故も頻発したって、\nハチロクから私、聞いとるし……
2541 = "Mình cũng nghe Hachiroku kể rằng vào cuối thời Đại Phế Tuyến,\\ntai nạn đường sắt xảy ra rất thường xuyên mà..."

# 【ハチロク】
# display as 八六
# JP: 「日々姫。おまたせしました。\nわたくし、髪を綺麗にしました」
1946 = "「Hibihime. Đã để ngài phải đợi.\\nTôi đã sửa soạn lại tóc tai cho gọn gàng rồi ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「わかった。今行くばい」
1925 = "「Biết rồi. Tớ ra ngay đây.」"

# monologue
# JP: 背中、流してくれるなら、\nついでに話、少し聞いてもおかしいことない。
2572 = "Nếu cậu ấy đã kỳ lưng cho mình,\\nthì nhân tiện hỏi một chút chuyện cũng không có gì là lạ cả."

# monologue
# JP: 事故。にぃにぃのと。ハチロクの。\n別々だって、同じじゃないって、すぐに確かめられるはず。
2278 = "Vụ tai nạn. Của anh hai. Của Hachiroku.\\nChắc chắn mình có thể xác nhận ngay rằng chúng là hai chuyện khác nhau, không hề giống nhau."

# 【日々姫】
# display as 日日姬
# JP: 「あんね、ハチロク」
1908 = "「Nè, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。なんでしょう、日々姫」
1828 = "「Vâng. Có chuyện gì vậy ạ, Hibihime?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん、えと――」
1832 = "「Ừm, thì là――」"

# 【れいな】
# display as 玲奈
# JP: 「わああ、日々姫さんとハチロクさんですぅ」
1791 = "「Oaaa, là chị Hibihime và chị Hachiroku đóoo.」"

# 【日々姫】
# display as 日日姬
# JP: 「れいなちゃん！？」
1986 = "「Bé Reina!?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、れいな」
1817 = "「Ôi chà, Reina.」"

# monologue
# JP: れいなちゃんの後ろからはポーレットさん。
2429 = "Đi sau Reina-chan là chị Paulette."

# monologue
# JP: スラリと綺麗な体は同性の私でも――\nって！！！！？
2467 = "Thân hình mảnh mai xinh đẹp đó, ngay cả một đứa con gái như mình cũng――\\nhả!!!!?"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。奇遇だなふたりとも」
1863 = "「Ồ. Thật trùng hợp, cả hai em cũng ở đây à.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　そうてつさんですぅ」
1794 = "「Oa! Anh Soutetsu ạ~」"

# 【ポーレット】
# display as 波萊特
# JP: 「そ、双鉄くんっ！？」
2084 = "「A-anh Soutetsu!?」"

# monologue
# JP: 慌てふためきポーレットさんは真っ赤になって。
2614 = "Chị Paulette luống cuống, mặt đỏ bừng lên."

# monologue
# JP: けど、にぃにぃは――\nにぃにぃはまるきり何ぁんも変わらん。
2302 = "Nhưng mà, anh hai thì――\\nAnh hai thì hoàn toàn chẳng có phản ứng gì sất."

# 【双鉄】
# display as 雙鐵
# JP: 「今夜は賑やかな湯になるな」
1994 = "「Tối nay nhà tắm có vẻ náo nhiệt nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ……あ……はい」
1801 = "「Ể? À... à... vâng.」"

# monologue
# JP: にぃにぃはそのまま顔を戻して、\n体洗いを再開しちゃう。
2772 = "Anh hai cứ thế quay mặt đi,\\nrồi tiếp tục kỳ cọ cơ thể."

# monologue
# JP: よかった、ポーレットさんが相手でも、\nにぃにぃの反応が同じで――ううん……
2435 = "May quá, dù đối phương là chị Paulette,\\nphản ứng của anh hai vẫn y như vậy―― không, khoan đã..."

# 【日々姫】
# display as 日日姬
# JP: （良かことないばい、ほんとは、絶対。\n私、学園で習ったけん。――性は生、そのものやって）
2828 = "（Không tốt chút nào hết, thật sự là vậy, tuyệt đối không.\\nMình đã được học ở trường rồi mà.――Tính là Sinh, là bản chất của sự sống.）"

# 【ハチロク】
# display as 八六
# JP: 「日々姫？　ええと……」
1948 = "「Hibiki? Ờm...」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ！？　ごめ――んっ、\nごめんなさい、ちょっと湯あたりしちゃったのかも」
1814 = "「A!? Xin―― lỗi,\\nxin lỗi chị, chắc em hơi choáng vì ngâm nước nóng rồi.」"

# monologue
# JP: 人がこんなにいたら、聞けない。
2648 = "Có nhiều người ở đây thế này, mình không hỏi được."

# monologue
# JP: 聞けなくなって、\n私、正直ほっとしている。
2267 = "Không còn nghe được nữa,\\nThật lòng mà nói, tôi cảm thấy nhẹ nhõm."

# 【日々姫】
# display as 日日姬
# JP: 「背中、少し強めに流してもらえる？」
1728 = "「Em chà lưng cho chị mạnh hơn một chút được không?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。ご要望どおりにいたしましょう」
1835 = "「Vâng ạ. Em sẽ làm theo yêu cầu của chị.」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1804 = "「Ưm――」"

# monologue
# JP: 気持ちいい。\n汚れも、垢も、全部を綺麗に流してしまえる。
2469 = "Dễ chịu quá.\\nCả bụi bẩn, cả ghét đất, tất cả đều được gột rửa sạch sẽ."

# monologue
# JP: なのに、どうして傷跡だけは、\nいつまでたっても――流れて消えてくれないんだろう？
2304 = "Vậy mà, tại sao chỉ riêng vết sẹo,\\ndù cho bao lâu đi nữa――vẫn không thể gột rửa cho phai mờ đi được chứ?"
