[script]
# lines: 392 
# monologue
# JP: 夏の線路。\n言葉だけなら実にさわやかな印象だ。が――
2999 = "Đường sắt mùa hè.\nChỉ nghe qua từ ngữ thì quả là một ấn tượng sảng khoái. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「随分と汚れているな」
2504 = "「Bẩn quá nhỉ.」"
# monologue
# JP: 赤錆だらけの泥まみれ。\n全くもって爽やかではない。どころか、正直見苦しい。
3158 = "Đầy rỉ sét và bùn lầy.\nChẳng có chút sảng khoái nào. Thậm chí, nói thẳng ra là khó coi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は良く知らんのだが。\n鉄道の線路というのは、こんなものなのか？」
2353 = "「Tôi thì không rành lắm.\nĐường ray xe lửa vốn là như thế này sao?」"
# 【ハチロク】
# display as 八六
# JP: 「実用品の最たるものです。汚れ、痛むのは当然ですが\n……これは、そう。いささか手入れが悪すぎますね」
2635 = "「Nó là thứ đồ thực dụng nhất mà. Bị bẩn, bị hỏng là điều đương nhiên, nhưng\n……cái này thì, đúng vậy. Có vẻ được bảo trì hơi tệ quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふうむ」
2227 = "「Hừm.」"
# monologue
# JP: 空疎な期待は好きではない。\n自分のものでも、他者のものでも。
3078 = "Tôi không thích những kỳ vọng hão huyền.\nDù là của bản thân, hay của người khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばナビの周辺情報とやらは古かったのかもしれん。\nこの路線は、既に廃線されているのではないか？」
2364 = "「Nếu vậy, có thể thông tin xung quanh của Navi đã cũ rồi.\nTuyến đường này, chẳng phải đã bị bãi bỏ rồi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。確かに、傷み、くたびれてはいますが\n――このレイルは、生きています」
2109 = "「Không đâu, ngài Soutetsu. Đúng là nó có bị hư hỏng, cũ nát\n——Nhưng đường ray này, vẫn còn sống.」"
# monologue
# JP: 即時の断定。\n事実を、単に告げているだけの言葉の強さ。
3025 = "Một lời khẳng định tức thì.\nSức mạnh của ngôn từ chỉ đơn thuần đang thông báo một sự thật."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？　なぜわかる」
2404 = "「Ồ? Sao cô biết?」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l踏面;#00ffc040;[とうめん,1]踏面%l;#;です」
2494 = "「Là nhờ \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「トウメン？」
2591 = "「Mặt lăn bánh xe?」"
# 【ハチロク】
# display as 八六
# JP: 「踏む面、と書いてとうめんと読みます。\n双鉄様にでしたら、これだけで十分なのでは？」
2586 = "「Viết là mặt giẫm lên, đọc là mặt lăn bánh xe.\nNếu là ngài Soutetsu, thì chỉ cần nói thế này là đủ hiểu rồi chứ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2180 = "「Ra là vậy.」"
# monologue
# JP: 漫然と目に映していただけの線路に、\nハチロクのヒントが“意味”を与える。
2951 = "Những đường ray chỉ lọt vào mắt một cách lơ đãng,\nnay được gợi ý của Hachiroku thổi vào đó một \"ý nghĩa\"."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l列車;#00ffc040;列車%l;#;が踏む――車輪で削る面であるから、\x%l踏面;#00ffc040;踏面%l;#;か。\nゆえに、そこだけは錆びつかない」
1814 = "「\x%l列車;#00ffc040;Đoàn tàu%l;#; giẫm lên——là bề mặt bị bánh xe mài mòn, nên gọi là \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; sao.\nVì vậy, chỉ có chỗ đó là không bị rỉ sét.」"
# monologue
# JP: 線路――レールの錆と汚れは、\x%l踏面;#00ffc040;踏面%l;#;だけには届いていない。\nヤスリがけでもされたように、鈍い銀色を輝かせている。
2991 = "Rỉ sét và bụi bẩn của đường sắt——đường ray, chỉ không chạm tới được \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;.\nNó tỏa ra ánh bạc xỉn màu, như thể vừa được chà nhám."
# 【双鉄】
# display as 雙鐵
# JP: 「もしも廃線されていれば、\n当然、\x%l列車;#00ffc040;列車%l;#;は走らず、ゆえにレールも削られはせず」
2292 = "「Nếu tuyến đường đã bị bãi bỏ,\nthì đương nhiên \x%l列車;#00ffc040;đoàn tàu%l;#; sẽ không chạy, và đường ray cũng không bị mài mòn.」"
# 【ハチロク】
# display as 八六
# JP: 「そのとおり。\x%l踏面;#00ffc040;踏面%l;#;までもが錆と汚れに覆われるのです。\nそうして、全ては朽ちていきます」
2425 = "「Đúng vậy. Ngay cả \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; cũng sẽ bị bao phủ bởi rỉ sét và bụi bẩn.\nVà rồi, mọi thứ sẽ dần mục nát.」"
# monologue
# JP: さく、さくと。\n線路に敷かれた小石をハチロクは自分の足で踏み、歩く。
2923 = "Lạo xạo, lạo xạo.\nHachiroku dùng chính đôi chân của mình giẫm lên những viên sỏi rải trên đường ray, bước đi."
# monologue
# JP: じゃりと音さえ立たぬほど、軽い足取り、小さな歩幅。\nあまりに小さく、歩調をあわせることにいささか苦労する。
3016 = "Bước chân nhẹ nhàng, sải bước nhỏ nhắn đến mức không hề phát ra tiếng sỏi cọ xát.\nVì quá nhỏ, nên tôi khá chật vật để bắt nhịp bước cùng cô ấy."
# 【ハチロク】
# display as 八六
# JP: 「……生きてはいますが、残念ながら、\n上空で双鉄様が言われたとおりの状況のようですね」
1831 = "「……Tuy vẫn còn sống, nhưng thật đáng tiếc,\ntình hình có vẻ đúng như những gì ngài Soutetsu đã nói lúc ở trên trời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が？」
2361 = "「Tôi á?」"
# 【ハチロク】
# display as 八六
# JP: 「青息吐息と――\n実際、この\x%lバラスト;#00ffc040;バラスト%l;#;はもう限界を超えています」
1820 = "「Là thoi thóp ấy ạ——\nThực tế, \x%lバラスト;#00ffc040;đá ba-lát%l;#; này đã vượt quá giới hạn rồi.」"
# monologue
# JP: ハチロクは不意にしゃがみこみ、\n線路の下から小石――いや、砂をその手にすくう。
2907 = "Hachiroku bất chợt ngồi xổm xuống,\ndùng tay vớt lên những viên sỏi——không, là cát từ dưới đường ray."
# 【双鉄】
# display as 雙鐵
# JP: 「それが\x%lバラスト;#00ffc040;バラスト%l;#;か？」
2605 = "「Đó là \x%lバラスト;#00ffc040;đá ba-lát%l;#; sao?」"
# 【ハチロク】
# display as 八六
# JP: 「『\x%lバラスト;#00ffc040;バラスト%l;#;であったもの』、です。双鉄様。\nこうなってはもう、\x%lバラスト;#00ffc040;バラスト%l;#;としての用を為しません」
2433 = "「Là 『thứ từng là \x%lバラスト;#00ffc040;đá ba-lát%l;#;』 ạ. Ngài Soutetsu.\nĐã thành ra thế này thì không còn tác dụng của \x%lバラスト;#00ffc040;đá ba-lát%l;#; nữa rồi.」"
# monologue
# JP: ……ハチロクが簡潔に説明してくれる。\n\x%lバラスト;#00ffc040;バラスト%l;#;とはすなわち線路と\x%l枕木;#00ffc040;枕木%l;#;とを支える敷石だと。
1791 = "……Hachiroku giải thích ngắn gọn cho tôi.\n\x%lバラスト;#00ffc040;Đá ba-lát%l;#; chính là lớp đá rải dùng để nâng đỡ đường ray và \x%l枕木;#00ffc040;tà vẹt đường ray%l;#;."
# monologue
# JP: その役割は、自らが砕けることにより、\n\x%l列車;#00ffc040;列車%l;#;が与える衝撃を、線路に代わって受けることだと。
3037 = "Vai trò của nó là tự vỡ vụn ra,\nđể hứng chịu thay đường ray những chấn động do \x%l列車;#00ffc040;đoàn tàu%l;#; gây ra."
# 【双鉄】
# display as 雙鐵
# JP: 「砂にまで砕けてしまっては、\n\x%lバラスト;#00ffc040;バラスト%l;#;としての役割はもう果たせんわけか」
2510 = "「Đã vỡ vụn thành cát thế này,\nthì không thể hoàn thành vai trò của \x%lバラスト;#00ffc040;đá ba-lát%l;#; nữa sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ですので普通はもっと早い段階で\n\x%lバラスト;#00ffc040;バラスト%l;#;を敷き直すのですが」
2413 = "「Vâng. Vì vậy, thông thường người ta sẽ rải lại \x%lバラスト;#00ffc040;đá ba-lát%l;#;\ntừ giai đoạn sớm hơn cơ, nhưng mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「予算が無いか、人員がないか、その両方か。\nいずれ、十全ではない状況にあるのは変わらんか」
2406 = "「Không có ngân sách, thiếu nhân lực, hoặc cả hai.\nDù sao thì, tình trạng không được hoàn hảo cũng chẳng có gì thay đổi.」"
# 【ハチロク】
# display as 八六
# JP: 「と、思われます。レイルも[かるいもの,3]３０キロですから……\nこの状態では、振動がかなりひどくなりましょうし」
2455 = "「Tôi nghĩ là vậy ạ. Đường ray cũng là loại 30kg……\nTrong tình trạng này, độ rung lắc chắc sẽ khá tồi tệ đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2243 = "「Hừm?」"
# 【ハチロク】
# display as 八六
# JP: 「振動は車体や貨物に悪影響を与えます。\n乗客がいるのなら、苦情もきっと出てきましょう」
2382 = "「Rung lắc sẽ gây ảnh hưởng xấu đến thân xe và hàng hóa.\nNếu có hành khách, chắc chắn họ cũng sẽ phàn nàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗客か」
2114 = "「Hành khách sao.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;全盛。\n一人一台とまで言われているこの時代。
2987 = "Thời kỳ hoàng kim của \x%lエアクラ;#00ffc040;Aircra%l;#;.\nThời đại mà người ta còn nói rằng mỗi người sở hữu một chiếc."
# monologue
# JP: それでもあえて鉄道を使う乗客には、\nいったいいかなる事情があるのだろうか。
3210 = "Dù vậy, những hành khách vẫn cố tình chọn đi đường sắt,\nrốt cuộc là vì lý do gì nhỉ."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが整備[ボディ]体なら、\n\x%lバラスト;#00ffc040;バラスト%l;#;敷きのお手伝いくらいは出来るのですが――」
2558 = "「Nếu tôi dùng \x%l整備体;#00ffc040;thân chính%l;#;,\nthì ít ra cũng có thể giúp rải \x%lバラスト;#00ffc040;đá ba-lát%l;#; được, nhưng mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「整備ボディ？」
2388 = "「\x%l整備体;#00ffc040;Thân chính%l;#;?」"
# 【ハチロク】
# display as 八六
# JP: 「自分の車両の整備もまた、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の仕事なのです。\nとはいえ、この体では力仕事がこなせません」
2531 = "「Việc bảo dưỡng phương tiện của mình cũng là công việc của \x%lレイルロオド;#00ffc040;Railord%l;#; ạ.\nTuy nhiên, với cơ thể này thì tôi không thể làm những việc nặng nhọc được.」"
# monologue
# JP: いって、ハチロクはか細い腕を曲げて力んでみてみせる。\n力こぶなど、全く出ない。
2926 = "Nói rồi, Hachiroku gập cánh tay mỏng manh lại và gồng thử cho tôi xem.\nChẳng thấy chút cơ bắp nào nổi lên cả."
# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n運行管理[ボディ]体と\x%l整備体;#00ffc040;整備体%l;#;の二種の体を使い分けるのです」
2254 = "「Vì vậy, \x%lレイルロオド;#00ffc040;Railord%l;#; chúng tôi\nsử dụng linh hoạt hai loại cơ thể là cơ thể quản lý vận hành và \x%l整備体;#00ffc040;thân chính%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、器用なものだな」
2249 = "「Ồ, khéo léo thật đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「器用……いえ、人間でいえば適切な工具を使うとか、\n場に合う服に着替えるような感じではないか、と」
2540 = "「Khéo léo……dạ không, nếu so với con người thì giống như sử dụng công cụ thích hợp,\nhay thay quần áo cho phù hợp với hoàn cảnh thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなものか――うむ？」
2401 = "「Vậy sao——Hừm?」"
# monologue
# JP: 目路遠く。\n地面の熱気に霞む何かが、ぼんやりと浮き上がってくる。
3290 = "Nhìn xa xăm.\nMột thứ gì đó mờ ảo hiện lên giữa làn hơi nóng bốc lên từ mặt đất."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、来い」
2157 = "「Hachiroku, lại đây.」"
# 【ハチロク】
# display as 八六
# JP: 「なんでしょう双鉄様――きゃっ！？」
2334 = "「Có chuyện gì vậy ngài Soutetsu——á!?」"
# monologue
# JP: 来るやいなやで脇をつかまえ持ち上げる。\n僕の顔より、なお高くまで。
2882 = "Cô ấy vừa bước tới, tôi liền tóm lấy nách và nhấc bổng lên.\nCao hơn cả mặt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「見えるか？　あれだ」
2546 = "「Nhìn thấy không? Kia kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「駅です！」
2429 = "「Là nhà ga ạ!」"
# monologue
# JP: 即答。\nそうして中空の足がじたじた動く。
3024 = "Trả lời ngay lập tức.\nRồi đôi chân lơ lửng trên không trung quẫy đạp liên hồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば行くぞ。落ちるなよ？」
2627 = "「Vậy thì đi thôi. Đừng để ngã đấy nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ、双鉄様っ」
2221 = "「Hả!? A, ngài Soutetsu.」"
# monologue
# JP: ハチロクをそのまま胸にかかえて、\n大足、早足で、ぐんぐんと駅へ近づいていく。
3085 = "Tôi cứ thế ôm Hachiroku trước ngực,\nsải bước dài, rảo bước nhanh, tiến thẳng về phía nhà ga."
# 【ハチロク】
# display as 八六
# JP: 「あ――」
2228 = "「A——」"
# monologue
# JP: あと、おそらくは数十メートル。
3001 = "Có lẽ chỉ còn khoảng vài chục mét nữa."
# monologue
# JP: 駅の細部が見え始めれば、\n僕の胸元にしがみつくハチロクの手から力が抜ける。
2941 = "Khi bắt đầu nhìn rõ từng chi tiết của nhà ga,\nđôi tay đang bám chặt trước ngực tôi của Hachiroku bỗng buông thõng."
# 【ハチロク】
# display as 八六
# JP: 「……双鉄様。\nこれは……廃駅です」
1849 = "「……Ngài Soutetsu.\nĐây là……nhà ga bỏ hoang ạ.」"
# monologue
# JP: 踏み入れば、ハチロクの言葉の正しさを知る。
2843 = "Vừa bước vào, tôi nhận ra lời Hachiroku nói là đúng."
# monologue
# JP: 緑の草が、ホームにまでも生い茂ってる。\n赤錆は、脇へと逸れる線路の全面――\x%l踏面;#00ffc040;踏面%l;#;までを覆ってる。
3299 = "Cỏ xanh mọc um tùm ngay cả trên sân ga.\nRỉ sét đỏ ối bao phủ toàn bộ nhánh đường ray rẽ sang một bên——kể cả \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――こちらの線路は生きていないな」
2181 = "「Ra là vậy——đường ray bên này không còn sống nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「生きていないのは、\x%l待避線;#00ffc040;[たいひせん,2]待避線%l;#;だけではありません」
2142 = "「Thứ không còn sống, không chỉ có \x%l待避線;#00ffc040;đường tránh tàu%l;#; đâu ạ.」"
# monologue
# JP: ハチロクが服の胸元を引っ張り、せがむ。
2910 = "Hachiroku kéo kéo áo trước ngực tôi, vòi vĩnh."
# monologue
# JP: せがまれるまま歩をすすめれば、\nホーム上には、朽ち果てた四角い木板が立っている。
2958 = "Chiều ý cô ấy bước tới,\ntrên sân ga, có một tấm ván gỗ hình vuông mục nát đang cắm ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……これはあれか。“なんとか駅”という立て看板か」
1845 = "「……Đây là cái đó sao. Biển báo ghi \"Nhà ga gì gì đó\" ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。\x%l駅名標;#00ffc040;[えきめいひょう,2]駅名標%l;#;――の名残ですね。\nこうも傷んでしまっては、もはやその役も果たせません」
2419 = "「Vâng. Là tàn tích của——\x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#; ạ.\nĐã hư hỏng đến mức này thì không thể hoàn thành vai trò của nó nữa rồi.」"
# monologue
# JP: 白いペンキはぼろぼろに剥げ、\n赤い下地や木肌までもが、無残なまでに露出している。
2844 = "Lớp sơn trắng bong tróc nham nhở,\nlớp sơn lót màu đỏ và cả thớ gỗ cũng lộ ra một cách thảm hại."
# 【ハチロク】
# display as 八六
# JP: 「\x%l列車;#00ffc040;列車%l;#;や\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と同じく――\n駅さえ……死んでしまうものなのですね」
2086 = "「Cũng giống như \x%l列車;#00ffc040;đoàn tàu%l;#; hay \x%lレイルロオド;#00ffc040;Railord%l;#;——\nNgay cả nhà ga……cũng sẽ chết đi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2242 = "「Hừm.」"
# monologue
# JP: ならばこの\x%l駅名標;#00ffc040;駅名標%l;#;は、\nそのまま墓標と変わったわけか。
3293 = "Nếu vậy \x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#; này,\ncứ thế biến thành bia mộ rồi sao."
# monologue
# JP: 記されていた文字もほとんどが消え落ちて、\nかろうじて、ただ一文字が読み取れるのみだ。
3174 = "Những dòng chữ ghi trên đó cũng đã phai mờ gần hết,\nchỉ miễn cưỡng đọc được một chữ duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「“[フク]福”か――\n名は体を表してはくれなかったのだな」
1824 = "「Chữ \"Phúc\" sao——\nCái tên đã không phản ánh đúng thực tế rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「どうでしょう。\n[カフク,1]禍福や[メイフク,1]冥福という駅名であったのかもしれません」
2437 = "「Chưa chắc đâu ạ.\nBiết đâu tên ga là Họa Phúc hay Minh Phúc thì sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか」
2097 = "「Không thể nào.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、ありえる話なのです」
2607 = "「Không đâu, chuyện đó hoàn toàn có thể xảy ra ạ.」"
# monologue
# JP: 微笑にも見える表情を浮かべ、\n力なく、ハチロクは顔を持ち上げる。
2901 = "Thoáng hiện một biểu cảm trông như đang mỉm cười,\nHachiroku yếu ớt ngẩng mặt lên."
# 【ハチロク】
# display as 八六
# JP: 「駅名は地名由来が多いですから。\n“ケガ”“フコウダ”という駅名もあります」
2523 = "「Tên ga phần lớn bắt nguồn từ địa danh mà.\nCũng có những ga tên là \"Bị Thương\" hay \"Bất Hạnh\" đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……世の中は広いものだな」
1830 = "「……Thế giới này quả là rộng lớn.」"
# 【ハチロク】
# display as 八六
# JP: 「そう、ですね」
2400 = "「Đúng……vậy nhỉ.」"
# monologue
# JP: ハチロクの手が、朽ちた\x%l駅名標;#00ffc040;駅名標%l;#;へと伸びる。
2915 = "Tay Hachiroku vươn tới \x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#; mục nát."
# 【ハチロク】
# display as 八六
# JP: 「広い世の中を、少しでも狭くするお手伝いを、\nわたくしたちは懸命に果たしてきたつもりでしたが――」
2344 = "「Chúng tôi vẫn luôn tự nhủ đã dốc hết sức mình,\nđể giúp thế giới rộng lớn này xích lại gần nhau hơn dù chỉ một chút——」"
# monologue
# JP: 続く言葉を――ハチロクは出せないのか出さないのか。
3017 = "Lời tiếp theo——là Hachiroku không thể nói ra hay không muốn nói ra."
# monologue
# JP: いずれであっても僕が言うべきは変わらない。
2853 = "Dù là gì đi nữa thì điều tôi nên nói cũng không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「物は滅びる、人は死ぬ。\n決まっている。それは、どうあっても不可避のことだ」
2121 = "「Vật rồi sẽ hỏng, người rồi sẽ chết.\nĐã được định sẵn rồi. Đó là điều không thể tránh khỏi dù thế nào đi nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
2676 = "「!」"
# monologue
# JP: ハチロクが先ほどタイヒセンと呼んだ、\n分岐して、ホームの後ろに回り込む線。
3148 = "Tuyến đường mà lúc nãy Hachiroku gọi là đường tránh tàu,\nrẽ nhánh và vòng ra phía sau sân ga."
# monologue
# JP: それは確かに\x%l踏面;#00ffc040;踏面%l;#;までもが赤錆びて、\n死者の様相を呈している、が――
3296 = "Đường ray đó quả thực đã rỉ đỏ đến tận \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;,\ntrông hệt như một kẻ đã chết, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし今、僕とハチロクは生き延びている。\nこの線路にしても、生き延びているものはある」
2351 = "「Nhưng bây giờ, tôi và Hachiroku vẫn đang sống.\nNgay cả tuyến đường sắt này, cũng có phần vẫn còn sống.」"
# monologue
# JP: ホームの前を直進する線を、まっすぐ指差す。\nその\x%l踏面;#00ffc040;踏面%l;#;は銀色だ。
3091 = "Tôi chỉ thẳng vào tuyến đường chạy thẳng trước sân ga.\n\x%l踏面;#00ffc040;Mặt lăn bánh xe%l;#; của nó vẫn màu bạc."
# 【双鉄】
# display as 雙鐵
# JP: 「違うか？」
2360 = "「Sai sao?」"
# 【ハチロク】
# display as 八六
# JP: 「違いません。双鉄様のおっしゃるとおり――\n\x%l待避線;#00ffc040;待避線%l;#;は死んでいても、本線はまだ生きている」
2460 = "「Không sai ạ. Đúng như lời ngài Soutetsu nói——\nDù \x%l待避線;#00ffc040;đường tránh tàu%l;#; đã chết, nhưng đường chính vẫn còn sống.」"
# monologue
# JP: ハチロクの指がそっと、\x%l駅名標;#00ffc040;駅名標%l;#;を撫ぜて離れる。
3184 = "Ngón tay Hachiroku khẽ vuốt ve \x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#; rồi rời đi."
# monologue
# JP: その目はまっすぐ、僕の指差す点を超え、\nさらに先へと向けられる。
3021 = "Đôi mắt ấy nhìn thẳng, vượt qua điểm tôi đang chỉ,\nhướng xa hơn nữa về phía trước."
# 【ハチロク】
# display as 八六
# JP: 「でしたらどこかに、まだ生きている駅もありましょう。\nそこにはきっと、生きている\x%l列車;#00ffc040;列車%l;#;と鉄道員も」
2366 = "「Nếu vậy chắc chắn đâu đó vẫn còn nhà ga đang sống.\nỞ đó nhất định cũng sẽ có \x%l列車;#00ffc040;đoàn tàu%l;#; và nhân viên đường sắt đang sống.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2242 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、その方たちにお会いいたしたく思います。\nそうして何か、小さくてもお手伝いできること――」
2354 = "「Ừm.」"
# monologue
# JP: （ぐ～～っ）
3343 = "「Tôi rất muốn được gặp những người đó.\nVà rồi, dù chỉ là một chút, tôi muốn giúp đỡ họ việc gì đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。時計とぜんまいカギを」
2154 = "（Rột~~~）"
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます、双鉄様」
2665 = "「Hachiroku. Cho tôi đồng hồ và chìa khóa lên dây cót.」"
# monologue
# JP: ……ハチロクの燃費効率は、どうやらかなり悪い様子だ。\nゼンマイでの対症療法を繰り返してもラチが明かない。
1799 = "「Xin cảm ơn ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「手順に戻ろう。\n寄り道をしてしまったが、まずはなにより腹ごしらえだ」
2577 = "……Có vẻ như hiệu suất nhiên liệu của Hachiroku khá tệ.\nCứ chữa cháy tạm thời bằng dây cót thế này thì không ổn."
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。どうぞお願いいたします」
2287 = "「Quay lại kế hoạch ban đầu thôi.\nTuy có hơi vòng vèo, nhưng trước hết phải lấp đầy cái bụng đã.」"
# 【双鉄】
# display as 雙鐵
# JP: 「任せろ。――ナビ」
2126 = "「Vâng thưa ngài Soutetsu. Trăm sự nhờ ngài ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――！」
2229 = "「Cứ giao cho tôi. ——Navi.」"
# monologue
# JP: 呼ぶや否やで、機影が僕らの頭上をすぎる。
3255 = "「A——!」"
# monologue
# JP: そこでゆっくり旋回し、\n尻を二、三度振ってから、一方向へと飛び去っていく。
2981 = "Vừa dứt lời, bóng máy bay lướt qua đỉnh đầu chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ。あの先にナビが着水して待っている」
2579 = "Tại đó nó từ từ lượn vòng,\nlắc đuôi hai ba cái, rồi bay đi mất hút về một hướng."
# 【ハチロク】
# display as 八六
# JP: 「ナビは――\n双鉄様を上空からフォローしていたのですか？」
2683 = "「Đi thôi. Navi đang đáp trên mặt nước đợi chúng ta ở phía trước.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……あれはいささかおせっかいでな。\n僕の身に危機が及ばぬよう、見張りするのが趣味らしい」
1846 = "「Navi——\nvẫn luôn theo sát ngài Soutetsu từ trên cao sao ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「見張りが趣味、ですか」
2237 = "「……Cái đó có hơi bao đồng một chút.\nCó vẻ sở thích của cô ta là canh chừng để tôi không gặp nguy hiểm.」"
# monologue
# JP: 冗談めかして語りはしたが、ウソではない。
3319 = "「Sở thích là canh chừng, sao ạ.」"
# monologue
# JP: “僕の命を救うことが最優先――”\n試作機だったナビには、その命令がくだされたそうだ。
3271 = "Tuy nói bằng giọng đùa cợt, nhưng đó không phải là nói dối."
# 【双鉄】
# display as 雙鐵
# JP: 「飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;が処理すべき情報の量は、\n地上型のそれとは段違いらしくてな」
2554 = "\"Cứu mạng tôi là ưu tiên hàng đầu——\"\nNghe nói mệnh lệnh đó đã được ban xuống cho Navi, một cỗ máy thử nghiệm."
# 【ハチロク】
# display as 八六
# JP: 「それは当然のことでしょうね。\nどれほどの情報量か……わたくしには想像もつきません」
2608 = "「Lượng thông tin mà \x%lエアクラ;#00ffc040;Aircra%l;#; bay cần xử lý,\ncó vẻ khác một trời một vực so với loại đi trên mặt đất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「故に、飛行型の\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビは調整が難しい物らしい。\n一度固まったところを弄ろうとすれば壊れるほどに」
2257 = "「Đó là điều đương nhiên nhỉ.\nKhối lượng thông tin khổng lồ đến mức nào……tôi không thể tưởng tượng nổi.」"
# monologue
# JP: だから、当時は日ノ本に数機の試作機であり、\n今もってその希少性はほとんど変わらぬ飛行型が――
3190 = "「Vì vậy, Navi \x%lエアクラ;#00ffc040;Aircra%l;#; bay có vẻ rất khó điều chỉnh.\nĐến mức nếu cố gắng táy máy vào những phần đã cố định thì sẽ hỏng luôn.」"
# monologue
# JP: 賠償金と相殺、という形式をとり、\n僕個人の所有物となった……ならざるを得なかったのだ。
3034 = "Do đó, vào thời điểm đó ở Hinomoto chỉ có vài cỗ máy thử nghiệm,\nvà cho đến nay độ hiếm của loại bay vẫn gần như không thay đổi——"
# 【ハチロク】
# display as 八六
# JP: 「そうなのですか」
2432 = "Dưới hình thức cấn trừ tiền bồi thường,\nnó đã trở thành tài sản cá nhân của tôi……đành phải như vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「何をしても直せぬものなら、こちらが慣れる他に無い。\n見張られるのも、慣れればなかなか便利なものだ」
2391 = "「Vậy sao ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「ですね。わたくし――」
2399 = "「Nếu làm gì cũng không sửa được, thì đành phải làm quen thôi.\nBị canh chừng, quen rồi thì cũng thấy khá tiện lợi.」"
# monologue
# JP: そこで言葉を飲み込む。\n長い沈黙。
3253 = "「Vâng. Tôi——」"
# monologue
# JP: そうして僕の腕の中。\nハチロクはぐっと唇を結び、そのまま沈黙に沈んでしまう。
2899 = "Cô ấy nuốt lời vào trong.\nMột khoảng lặng kéo dài."
# monologue
# JP: 風が流れる音がする。\n風が流れる音しかしない。
2961 = "Cứ thế trong vòng tay tôi.\nHachiroku mím chặt môi, rồi chìm vào im lặng."
# monologue
# JP: ハチロクはあれからずっと黙りこみ、\nひとことたりとも発しはしない。
2990 = "Tiếng gió thổi.\nChỉ có tiếng gió thổi."
# monologue
# JP: （空腹のあまり……ということもあるまいが）
3347 = "Từ lúc đó Hachiroku cứ im bặt,\nkhông nói thêm một lời nào."
# monologue
# JP: 心配になって観察すれば、\n“人形”と言った自分がいかに軽率だったかを痛感する。
3083 = "（Cũng không hẳn là vì quá đói đâu nhỉ...）"
# monologue
# JP: 瞬きもするし、汗も浮く、呼吸もしているように見える。\n人間的な数多の挙動が、ハチロクの全てを覆っている。
3134 = "Thấy lo lắng và quan sát cô ấy,\ntôi mới thấm thía mình đã khinh suất nhường nào khi gọi cô ấy là \"búp bê\"."
# monologue
# JP: （動けない、という風でもなし。\nならば、放置すべきか）
3340 = "Cô ấy chớp mắt, đổ mồ hôi, và dường như cũng đang thở.\nVô vàn cử chỉ mang tính người bao phủ lấy toàn bộ con người Hachiroku."
# monologue
# JP: 構われたくない物を構えば、\nお互いにわずらわしさを感じるだけとなり易い。
2977 = "（Cũng không có vẻ gì là không cử động được.\nVậy thì, cứ mặc kệ sao）"
# monologue
# JP: 人相手でも物相手でも、\n踏み込まぬことは、踏み込むことと同じ位に重要だ。
3166 = "Nếu cứ để tâm đến thứ không muốn bị để tâm,\nthì chỉ dễ làm cho cả hai cảm thấy phiền phức mà thôi."
# 【ハチロク】
# display as 八六
# JP: 「……双鉄様。お伺いしてよろしいでしょうか」
1848 = "Dù đối phương là người hay là vật,\nviệc không can thiệp sâu cũng quan trọng ngang với việc can thiệp sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「構わん」
2151 = "「……Ngài Soutetsu. Tôi có thể hỏi một chuyện được không ạ.」"
# monologue
# JP: やがて沈黙に飽いたのか、ハチロクはその唇を解く。\n声の響きは、力強い。
2851 = "「Cứ hỏi đi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、[いささ]些か……いまどきの\x%lエアクラ;#00ffc040;エアクラ%l;#;の便利さを\n[あなど]侮ってしまっていたようです」
2495 = "Chẳng mấy chốc, như đã chán sự im lặng, Hachiroku hé môi.\nGiọng nói vang lên đầy mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2402 = "「Tôi, có đôi chút……dường như đã đánh giá thấp\nsự tiện lợi của \x%lエアクラ;#00ffc040;Aircra%l;#; thời nay rồi ạ.」"
# monologue
# JP: うちのナビは特例中の特例だ。\nが――
3101 = "「Vậy sao.」"
# monologue
# JP: 市販・普及品の地上型でも、自動運転の最適ルート選択だ。\n“\x%lエアクラ;#00ffc040;エアクラ%l;#;の便利さ”は、断じて過小評価すべきではない。
3297 = "Navi nhà tôi là trường hợp ngoại lệ trong số các ngoại lệ.\nNhưng——"
# 【ハチロク】
# display as 八六
# JP: 「鉄道が青息吐息にまで追いやられたのも、\n人間の選択を超えた、ある種、必然かとさえ感じました」
2636 = "Dù là loại đi trên mặt đất phổ biến trên thị trường, cũng có chế độ tự lái và chọn đường tối ưu.\nTuyệt đối không nên đánh giá thấp \"sự tiện lợi của \x%lエアクラ;#00ffc040;Aircra%l;#;\"."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
2224 = "「Việc đường sắt bị đẩy đến mức thoi thóp,\ntôi thậm chí cảm thấy đó là một loại tất yếu, vượt qua cả sự lựa chọn của con người.」"
# monologue
# JP: 鉄道の劣位を認めることは、姉妹たちを侮蔑すること――
3111 = "「Ồ?」"
# monologue
# JP: そうまで言っていたハチロクが、けれど素直に、\nそして自嘲の色を交えず、“現実”をただ、追認している。
3130 = "Thừa nhận vị thế yếu kém của đường sắt, cũng đồng nghĩa với việc sỉ nhục các chị em——"
# 【ハチロク】
# display as 八六
# JP: 「けれど、鉄道は青息吐息でも生き延びています。\nならば、そこにも必然があるとわたくしは思うのです」
2104 = "Hachiroku, người đã từng nói như vậy, nay lại ngoan ngoãn,\nvà không hề pha lẫn chút tự trào nào, chỉ đơn thuần chấp nhận \"thực tế\"."
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2242 = "「嗯」" 
# monologue
# JP: 頷いている。\nハチロクの言葉だけでなく、態度にも。
3104 = "「Tuy nhiên, đường sắt dù thoi thóp nhưng vẫn còn sống.\nNếu vậy, tôi nghĩ ở đó cũng có sự tất yếu.」"
# monologue
# JP: ハチロクの目は、過去方向ではなく未来へと――\n見つめる先を、この短時間に大きく変えた。
3204 = "Tôi gật đầu.\nKhông chỉ với lời nói, mà cả thái độ của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「ですので、\x%lエアクラ;#00ffc040;エアクラ%l;#;のオーナーでもある双鉄様に、\n是非とも教えていただきたいのです」
2370 = "Đôi mắt Hachiroku không hướng về quá khứ mà là tương lai——\nChỉ trong một thời gian ngắn, hướng nhìn của cô ấy đã thay đổi lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「何をだ？」
2569 = "「Vì vậy, tôi rất mong ngài Soutetsu, người cũng là chủ sở hữu của \x%lエアクラ;#00ffc040;Aircra%l;#;,\nhãy chỉ dạy cho tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;に出来ないことを――\n彼女たちが、苦手にしていることが何かということを」
2542 = "「Chỉ dạy điều gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「よかろう」
2279 = "「Những điều mà \x%lエアクラ;#00ffc040;Aircra%l;#; không thể làm được——\nNhững điểm yếu của chúng là gì ạ.」"
# monologue
# JP: ナビも沈黙をつづけている。
3360 = "「Được thôi.」"
# monologue
# JP: 当初は、ハチロクの沈黙を尊重し。\nそうして今は、その意志を尊重してのものと感じる。
3133 = "Navi cũng tiếp tục giữ im lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「エアロ＝クラフテック機関の心臓部は、\nキルクイティウムという宝石状の化合物だ」
2520 = "Ban đầu là để tôn trọng sự im lặng của Hachiroku.\nCòn bây giờ, tôi cảm thấy cô ấy đang tôn trọng ý chí của Hachiroku."
# monologue
# JP: 工場誘致の情報に触れ、まず真っ先に重ねた勉強。\nその成果を、そのままハチロクへと伝えていく。
3094 = "「Trái tim của động cơ Aero-Craftech,\nlà một hợp chất dạng đá quý gọi là Kirukuitium.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これに、制御された地磁気と太陽光との影響が加わると、\n回転運動が開始される」
2297 = "Ngay khi biết thông tin về việc mời gọi nhà máy, điều đầu tiên tôi làm là vùi đầu vào học hỏi.\nTôi truyền đạt lại y nguyên thành quả đó cho Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「その回転運動が――例えば、ピストンなどを動かす\n動力となっているのですか？」
2612 = "「Khi chịu thêm tác động từ từ trường Trái Đất và ánh sáng mặt trời đã được kiểm soát,\nnó sẽ bắt đầu chuyển động xoay tròn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「極めて省略して考えれば、そのとおり。\n故に、\x%lエアクラ;#00ffc040;エアクラ%l;#;は非常なローコストによる運用が可能だ」
2527 = "「Chuyển động xoay tròn đó——ví dụ như, trở thành động lực\nđể làm piston chuyển động sao ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「はい……太陽光と地磁気……\nほぼ無尽蔵に得られそうな動力源ですものね」
2408 = "「Nghĩ một cách tối giản nhất thì đúng là vậy.\nVì thế, \x%lエアクラ;#00ffc040;Aircra%l;#; có thể vận hành với chi phí cực thấp.」"
# monologue
# JP: 頷く。\nそこはハチロクの言葉のとおりだ。
3108 = "「Vâng……ánh sáng mặt trời và từ trường Trái Đất……\nQuả là nguồn động lực gần như vô tận nhỉ.」"
# monologue
# JP: 消耗部品が仮になければ、エアロ＝クラフテック機関は\n永久機関とさえなれるとも言われている。
3135 = "Tôi gật đầu.\nĐúng như lời Hachiroku nói."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、キルクイティウムには弱点がある。\nそれは“共振崩壊”という現象だ」
2105 = "Giả sử không có linh kiện hao mòn, người ta còn nói rằng động cơ Aero-Craftech\nthậm chí có thể trở thành động cơ vĩnh cửu."
# 【ハチロク】
# display as 八六
# JP: 「キョウシンホウカイ……\n共振して――崩壊する？　その共振と崩壊ですか？」
2159 = "「Tuy nhiên, Kirukuitium có một điểm yếu.\nĐó là hiện tượng \"Cộng hưởng sụp đổ\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。キルクイティウム同士を近づけ過ぎると、\nその双方の回転が制御不能となり、崩壊にいたる」
2304 = "「Cộng hưởng sụp đổ……\nCộng hưởng——rồi sụp đổ? Là cộng hưởng và sụp đổ đó sao ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら……“キルクイティウムを集中しての運用”は、\n不可能ということになりますね？」
2629 = "「Ừ. Nếu để các Kirukuitium ở quá gần nhau,\nchuyển động xoay của cả hai sẽ mất kiểm soát, dẫn đến sụp đổ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして、キルクイティウムの製造コストは、\n体積が二倍で二乗、三倍で三乗になると言われている」
2240 = "「Nếu vậy……\"vận hành tập trung Kirukuitium\",\nlà điều không thể đúng không ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「二倍で二乗……仮に、\n100立方センチの化合物の製造コストが100円だとすると」
2675 = "「Đúng thế. Hơn nữa, chi phí sản xuất Kirukuitium được cho là,\nthể tích gấp đôi thì chi phí bình phương, gấp ba thì lập phương.」"
# 【双鉄】
# display as 雙鐵
# JP: 「200のコストは一万円。300のコストは百万円になる。\nそして、ある程度を超える大きさの物の製造は不可能だ」
2680 = "「Gấp đôi thì bình phương……Giả sử,\nchi phí sản xuất 100 cm khối hợp chất là 100 yên thì」"
# monologue
# JP: ああ、とハチロクが深く頷く。
2928 = "「Chi phí cho 200 sẽ là mười ngàn yên. 300 sẽ là một triệu yên.\nVà không thể sản xuất những khối có kích thước vượt quá một mức độ nhất định.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら……鉄道車両のように、\n車体そのものが何十トンもあるようなものには――」
2630 = "A, Hachiroku gật đầu sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。エアロ＝クラフテック機関は実装できない。\nまた、分割できない巨大物の運搬も不得手だ」
2459 = "「Nếu vậy……như phương tiện đường sắt,\nbản thân thân xe đã nặng hàng chục tấn thì——」"
# monologue
# JP: たくさんの\x%lエアクラ;#00ffc040;エアクラ%l;#;で吊っての輸送、など、\nできなくはないらしいが、そうすると速度が出せない。
3181 = "「Đúng vậy. Không thể trang bị động cơ Aero-Craftech được.\nNgoài ra, nó cũng không giỏi trong việc vận chuyển những vật thể khổng lồ không thể chia nhỏ.」"
# monologue
# JP: そのため、シャチなどの巨大動物を移送するときには、\nいまだガソリンエンジン車が用いられているとも聞く。
2974 = "Dùng nhiều \x%lエアクラ;#00ffc040;Aircra%l;#; để cẩu đi vận chuyển, v.v.\nkhông phải là không làm được, nhưng làm vậy thì không thể bay nhanh được."
# 【ハチロク】
# display as 八六
# JP: 「と、いうことは――」
2115 = "Vì vậy, nghe nói khi vận chuyển những động vật khổng lồ như cá voi sát thủ,\nngười ta vẫn sử dụng xe chạy bằng động cơ xăng."
# monologue
# JP: まっすぐ、強く。\nハチロクの目が僕へ向く。
2920 = "「Nói vậy tức là——」"
# 【ハチロク】
# display as 八六
# JP: 「そのあたりの、“\x%lエアクラ;#00ffc040;エアクラ%l;#;にできないこと”を、\n鉄道がうまく果たせることを、世間一般に認めさせれば」
2205 = "Nhìn thẳng, đầy mạnh mẽ.\nÁnh mắt Hachiroku hướng về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。共存も共栄も十分に可能だろう。\n実際、\x%lエアクラ;#00ffc040;エアクラ%l;#;[ぜん]前交通機関が活躍している地域では――」
2462 = "「Nếu có thể khiến công chúng thừa nhận rằng, đường sắt có thể hoàn thành tốt\nnhững \"\x%lエアクラ;#00ffc040;điều mà Aircra không thể làm%l;#;\" đó.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様。警告です。\n当機は、飛行回避空域に接近しているとのことです」
2650 = "「Đúng vậy. Việc cùng tồn tại và cùng phát triển là hoàn toàn có thể.\nThực tế, ở những khu vực mà các phương tiện giao thông thời kỳ tiền \x%lエアクラ;#00ffc040;Aircra%l;#; đang hoạt động tích cực——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 2243 = "「嗯？」" 
# monologue
# JP: 話の途中に割り込まれ、一瞬、意味が掴めない。
3254 = "「Ngài Soutetsu. Cảnh báo.\nPhương tiện đang tiến gần đến vùng không phận cấm bay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　その回避空域というのは」
2670 = "「Hửm?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「エアロ＝クラフテック社が設定している\n飛行を回避すべき空域です」
2521 = "Bị chen ngang giữa chừng, tôi nhất thời không hiểu ý."
# 【双鉄】
# display as 雙鐵
# JP: 「それはまぁそうだろうが――\n回避すべき理由は？」
2359 = "「Cái gì cơ? Vùng không phận cấm bay đó là sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「明示されていません」
2458 = "「Là vùng không phận cần tránh bay\ndo công ty Aero-Craftech thiết lập.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？　ああ、いや――」
2473 = "「Thì hẳn là vậy rồi——\nNhưng lý do phải tránh là gì?」"
# monologue
# JP: エアロ＝クラフテック社の“設定”ならば、\n通常は、ナビにより最優先で自動処理されるものだろう。
3364 = "「Không được nêu rõ.」"
# monologue
# JP: そこに理由説明など必要ない。\nそもそも問われる筈さえないから。が――
3149 = "「Tại sao? À, không——」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前の場合は、\x%lエアクラ;#00ffc040;エアクラ%l;#;社の設定より、\n僕の命令の方が優先順位において勝るのだな」
2449 = "Nếu là \"thiết lập\" của công ty Aero-Craftech,\nthì thông thường Navi sẽ tự động xử lý với mức ưu tiên cao nhất."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「当然のことです。そして、それより優先すべき、\n“双鉄様のお命を守る”を果たすため、不時着します」
2493 = "Không cần phải giải thích lý do.\nBởi vì vốn dĩ sẽ chẳng ai hỏi đến. Nhưng——"
# 【ハチロク】
# display as 八六
# JP: 「は？　不時着？」
2129 = "「Trong trường hợp của cô, so với thiết lập của công ty \x%lエアクラ;#00ffc040;Aircra%l;#;,\nthì mệnh lệnh của tôi có mức độ ưu tiên cao hơn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。これは僕のミスだ」
2179 = "「Đó là điều hiển nhiên. Và để thực hiện mệnh lệnh cần ưu tiên hơn cả,\n\"Bảo vệ mạng sống của ngài Soutetsu\", tôi sẽ hạ cánh khẩn cấp.」"
# monologue
# JP: 僕がすべきは、理由を問うことではなく、\n“回避指示に従うように”と命令を下すことだった。
3106 = "「Hả? Hạ cánh khẩn cấp?」"
# monologue
# JP: それがなければ、ナビは僕の当初の命令を、\n“僕の命に危険が発生しない限り”、守り続けるのだから。
2849 = "「Ra là vậy. Đây là lỗi của tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、あの、大丈夫なのですか？\nどんどんと高度が落ちているようですが」
2566 = "Điều tôi nên làm không phải là hỏi lý do,\nmà là ra lệnh \"Hãy tuân theo chỉ thị tránh bay\"."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、ハチロク。\n僕の命を安全に保つための不時着であるのだから」
2457 = "Bởi nếu không có lệnh đó, Navi sẽ tiếp tục tuân theo mệnh lệnh ban đầu của tôi,\n\"Miễn là tính mạng của tôi không gặp nguy hiểm\"."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様のおっしゃるとおりです。本機の\x%l機関推力;#00ffc040;機関推力%l;#;は、\n安全な不時着のため、まだ大幅な余力を残しています」
2653 = "「Không, ơ, có sao không vậy ạ?\nĐộ cao dường như đang giảm dần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「余力を残す？」
2492 = "「Không sao đâu, Hachiroku.\nĐây là cuộc hạ cánh khẩn cấp để giữ an toàn cho tính mạng của tôi mà.」"
# monologue
# JP: ナビからは初めて聞く文言だ。
3326 = "「Đúng như ngài Soutetsu nói. \x%l機関推力;#00ffc040;Lực đẩy động cơ%l;#; của phương tiện này\nvẫn còn dư dả rất nhiều để đảm bảo hạ cánh khẩn cấp an toàn.」"
# monologue
# JP: 余力――など、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;機関とは無縁に思える単語だが。
1781 = "「Còn dư dả?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「当機は、磁場異常に巻き込まれています。\n機関、このまま進めば停止が予想されます」
2442 = "Đây là lần đầu tiên tôi nghe Navi dùng từ này."
# 【双鉄】
# display as 雙鐵
# JP: 「磁場異常」
2517 = "Dư dả——một từ\ncó vẻ không liên quan gì đến động cơ \x%lエアクラ;#00ffc040;Aircra%l;#;."
# monologue
# JP: 思い出す。
3087 = "「Phương tiện này đang bị cuốn vào vùng từ trường bất thường.\nNếu tiếp tục tiến lên, dự kiến động cơ sẽ ngừng hoạt động.」"
# monologue
# JP: 僕が\x%lエアクラ;#00ffc040;エアクラ%l;#;で術仙炭鉱跡へ行こうとしたときに、\n日々姫の声が、なにやら追いかけていたことを。
3097 = "「Từ trường bất thường.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2182 = "Tôi nhớ lại."
# monologue
# JP: 磁場が安定しない地域では、\x%lエアクラ;#00ffc040;エアクラ%l;#;機関は作動できない。
76 = "Lúc tôi định dùng \x%lエアクラ;#00ffc040;Aircra%l;#; đi đến Di tích mỏ than Jutsusen,\ntiếng Hibiki gọi với theo dường như muốn nói điều gì đó."
# monologue
# JP: だから、日々姫は僕が\x%lエアクラ;#00ffc040;エアクラ%l;#;で行くことを止めようとし、\nこの鉄道は、いまだ生き延び続けているのだろう。
3110 = "Ở những khu vực từ trường không ổn định, động cơ \x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động."
# 【双鉄】
# display as 雙鐵
# JP: 「なにごとにも理由があるものだな」
2500 = "Vì thế, Hibiki mới cố ngăn cản tôi đi bằng \x%lエアクラ;#00ffc040;Aircra%l;#;,\nvà tuyến đường sắt này có lẽ vẫn còn tồn tại."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？　なにをのんきな――えっ？」
2655 = "「Đúng là chuyện gì cũng có lý do của nó nhỉ.」"
# monologue
# JP: 機体は、なだらかな曲線を描き降下していく。\nやがて地上に、銀の光が見えてくる。
3146 = "「Ngài Soutetsu!? Sao ngài còn thong thả thế——hả?」"
# 【ハチロク】
# display as 八六
# JP: 「不時着って――まさかっ！！？」
2535 = "Phương tiện vẽ một đường cong thoai thoải và hạ thấp độ cao.\nChẳng mấy chốc, trên mặt đất hiện ra một ánh sáng màu bạc."
# 【双鉄】
# display as 雙鐵
# JP: 「線路上か」
2640 = "「Hạ cánh khẩn cấp——không lẽ nào!!?」"
# monologue
# JP: ざわざわと茂る森の中、\nそこだけがぽっかり、滑走路のように開かれている。
2984 = "「Trên đường ray sao.」"
# monologue
# JP: 近くに水が見えない以上、\n確かにそれがもっとも安全になる選択だろう。
2996 = "Giữa khu rừng rậm rạp xào xạc,\nchỉ có chỗ đó mở ra trống trải như một đường băng."
# 【ハチロク】
# display as 八六
# JP: 「だめだめだめだめやめてやめてやめてやめて！\n\x%l踏面;#00ffc040;踏面%l;#;削れて\x%l枕木;#00ffc040;枕木%l;#;傷み\x%lバラスト;#00ffc040;バラスト%l;#;くだけてしまいます！」
2098 = "Trong khi không thấy nguồn nước nào gần đây,\nthì đó chắc chắn là lựa chọn an toàn nhất."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「不時着します。\n念のため、耐衝撃姿勢をおとりください」
2176 = "「Không được không được không được không được, dừng lại dừng lại dừng lại dừng lại đi!\nSẽ làm mòn \x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;, làm hỏng \x%l枕木;#00ffc040;tà vẹt đường ray%l;#;, làm vỡ \x%lバラスト;#00ffc040;đá ba-lát%l;#; mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だそうだ。ハチロク」
2541 = "「Chuẩn bị hạ cánh khẩn cấp.\nĐể đảm bảo an toàn, vui lòng thực hiện tư thế chống va đập.」"
# 【ハチロク】
# display as 八六
# JP: 「そっ、双鉄様っ！？　――んっ」
2647 = "「Nghe rồi chứ. Hachiroku.」"
# monologue
# JP: ハチロクを強く抱きしめ、体でかばう。
3103 = "「N-Ngài Soutetsu!? ——Ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビ、可能か？\n僕らの安全と、レールの状態を共に守ることが」
2685 = "Tôi ôm chặt Hachiroku, dùng cơ thể che chở cho cô ấy."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご命令がなくとも。双鉄様」
2549 = "「Navi, có thể không?\nBảo vệ cả sự an toàn của chúng ta và tình trạng của đường ray.」"
# monologue
# JP: ふわりと、一瞬。\n機体が浮いて、重力が消えたような気になる。
3216 = "「Ngay cả khi không có mệnh lệnh, thưa ngài Soutetsu.」"
# monologue
# JP: そして、着陸。\nフロートは、見事に線路を滑って――止まる。
3316 = "Bồng bềnh, trong chốc lát.\nPhương tiện nổi lên, cảm giác như trọng lực đã biến mất."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「当機の機体重量では、“レールを痛めろ”という方が\nより困難なご命令ですので」
2307 = "Và rồi, hạ cánh.\nPhao nổi trượt hoàn hảo trên đường ray——rồi dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだ。どうだ？　ハチロク」
2299 = "「Với trọng lượng của phương tiện này, mệnh lệnh \"làm hỏng đường ray\"\ncòn khó thực hiện hơn đấy ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「え？　あ、はい！　あの――失礼します、双鉄様っ」
2223 = "「Là vậy đấy. Thấy sao? Hachiroku.」"
# monologue
# JP: 抱きしめる僕の手からもがきのがれて、\nそのまま体を、機体をつたい、ハチロクは線路へと下りる。
2906 = "「Hả? A, vâng! Cái đó——xin thất lễ, thưa ngài Soutetsu.」"
# monologue
# JP: そしてほうっ、と小さな口から、\n安堵と恐らく感嘆と、ふたつを交えた息がこぼれる。
3124 = "Vùng vẫy thoát khỏi vòng tay đang ôm chặt của tôi,\nHachiroku men theo thân phương tiện, trèo xuống đường ray."
# 【ハチロク】
# display as 八六
# JP: 「本当……素晴らしいですね。ここまでと、ここから先と。\nレイルの状態に、観測できる差異はほとんどありません」
2502 = "Rồi một tiếng thở hắt ra từ khuôn miệng nhỏ nhắn,\nmang theo cả sự an tâm và có lẽ là thán phục."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何故そのように表情が冴えぬのだ？」
2624 = "「Thật sự……tuyệt vời quá. Tình trạng đường ray từ đây về trước và từ đây về sau,\ngần như không có sự khác biệt nào có thể quan sát được.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、いえ――」
2233 = "「Nếu vậy, sao trông cô vẫn kém vui thế?」"
# monologue
# JP: きょろきょろ、ハチロクは辺りを見回す。
2897 = "「À, không phải——」"
# 【ハチロク】
# display as 八六
# JP: 「この辺りは、さらに\x%l保線;#00ffc040;保線%l;#;が悪いなぁ、と。\nあの木など、線路にかかってしまいそうです」
2346 = "Hachiroku ngó nghiêng nhìn quanh."
# monologue
# JP: ハチロクが指差す先には、\n確かに、かなり張り出している大木がある。
3095 = "「Khu vực này, công tác \x%l保線;#00ffc040;bảo trì đường ray%l;#; còn tệ hơn nữa.\nNhư cái cây kia, sắp rũ xuống cả đường ray rồi.」"
# monologue
# JP: が、今はともかく僕たち自身だ。\n自分達の面倒も見れず、線路の心配もなにもなかろう。
2857 = "Nhìn theo hướng Hachiroku chỉ,\nquả thực có một cây cổ thụ vươn cành ra khá xa."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは移動が最優先だな。\nこのままでは、僕らこそが線路障害だ――よっと」
2345 = "Nhưng hiện tại, quan trọng nhất vẫn là bản thân chúng tôi.\nThân mình lo chưa xong, còn tâm trí đâu mà lo cho đường ray nữa."
# 【ハチロク】
# display as 八六
# JP: 「持ち上げっ！？　双鉄様お一人でっ！？」
2376 = "「Trước hết phải ưu tiên di chuyển đã.\nCứ thế này thì chúng ta mới là chướng ngại vật trên đường ray đấy——hây da.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いったろう。\x%lエアクラ;#00ffc040;エアクラ%l;#;は重量に弱い。\nゆえに、機体もギリギリ軽く作られるのだ」
2338 = "「Nhấc lên sao!? Một mình ngài Soutetsu á!?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「……機関、15秒後に停止します。\nセーフモードに移行します」
1839 = "「Tôi đã nói rồi mà. \x%lエアクラ;#00ffc040;Aircra%l;#; rất yếu trước trọng lượng.\nDo đó, phương tiện cũng được chế tạo nhẹ đến mức tối đa.」"
# monologue
# JP: ナビは沈黙。\nだからといって、重みに一切の変化は無い。
3361 = "「……Động cơ sẽ dừng sau 15 giây nữa.\nChuyển sang chế độ an toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2217 = "Navi chìm vào im lặng.\nDù vậy, sức nặng vẫn không hề thay đổi."
# monologue
# JP: これで線路からひとまず外れた。\nならば次は、どちらに向かって動くかなのだが――
3029 = "「Phù.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いったんは戻るべきか。\n飛行可能な区域に出て、ナビを再起動。そこから迂回で」
2331 = "Vậy là tạm thời đã dời khỏi đường ray.\nTiếp theo là nên di chuyển về hướng nào đây——"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。その必要はございません」
2108 = "「Chắc phải quay lại một chút.\nĐến khu vực có thể bay được, khởi động lại Navi. Rồi từ đó bay vòng qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2224 = "「哦？」" 
# monologue
# JP: ハチロクが、低木の広く茂った箇所を指す。
2912 = "「Không đâu, thưa ngài Soutetsu. Không cần phải làm vậy.」"
# monologue
# JP: 線路を大きく外れているし、\nその上になら、確かに機体を置けそうだ――よし。
3312 = "「Ồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？　なぜ戻らずに済む？」
2474 = "Hachiroku chỉ vào một bụi cây rậm rạp."
# 【ハチロク】
# display as 八六
# JP: 「この路線の\x%l列車;#00ffc040;列車%l;#;の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\n規則に忠実な子であるからです、双鉄様」
2260 = "Chỗ đó cách xa đường ray,\nnếu đặt phương tiện lên trên đó thì có vẻ ổn đấy——được."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――\x%l共感;#00ffc040;共感%l;#;か」
1807 = "「Tại sao? Sao lại không cần quay lại?」"
# monologue
# JP: こくりと、誇らしそうな頷き。
2922 = "「Bởi vì \x%lレイルロオド;#00ffc040;Railord%l;#; phụ trách \x%l列車;#00ffc040;đoàn tàu%l;#; trên tuyến đường này\nlà một đứa trẻ rất tuân thủ quy tắc, thưa ngài Soutetsu.」"
# 【ハチロク】
# display as 八六
# JP: 「とても立派です。\nきちんと\x%l喚呼;#00ffc040;[カンコ,1]喚呼%l;#;をしています」
2275 = "「\x%lレイルロオド;#00ffc040;Railord%l;#;——\x%l共感;#00ffc040;cộng cảm%l;#; sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「カンコ？」
2332 = "Cô ấy gật đầu, vẻ đầy tự hào."
# 【ハチロク】
# display as 八六
# JP: 「出発信号機を確認しての『出発・進行！』、\n速度制限を確認しての、『\x%l制限;#00ffc040;制限%l;#;50！』」
2514 = "「Rất đáng khen ngợi.\nCô bé đang \x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; rất đàng hoàng.」"
# monologue
# JP: なるほど、これが“\x%l喚呼;#00ffc040;喚呼%l;#;”か、と。\n問わずとも伝わってくる、ハチロクの口調と指差し。
3067 = "「Chỉ tay hô xác nhận?」"
# 【ハチロク】
# display as 八六
# JP: 「そうした全てを、いちいち怠らずに行っています。\nやけにゆったりとした\x%l喚呼;#00ffc040;喚呼%l;#;ではありますが――立派です」
2273 = "「Xác nhận tín hiệu xuất phát rồi hô 『Xuất phát, tiến lên!』,\nxác nhận giới hạn tốc độ rồi hô 『\x%l制限;#00ffc040;Giới hạn%l;#; 50!』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2611 = "Ra là vậy, đây là \"\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;\" sao.\nKhông cần hỏi cũng có thể hiểu được qua giọng điệu và cử chỉ chỉ tay của Hachiroku."
# monologue
# JP: ならば、ここで待っていれば、\n\x%l列車;#00ffc040;列車%l;#;がいずれ来てくれるということなのだろう。
3307 = "「Tất cả những việc đó, cô bé đều thực hiện không hề chểnh mảng.\nDù cách \x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; có phần hơi rề rà——nhưng rất đáng khen ngợi.」"
# monologue
# JP: 安心すれば、すぐに疑問が沸き起こる。
2838 = "Nếu vậy, cứ đợi ở đây,\nchắc chắn lát nữa \x%l列車;#00ffc040;đoàn tàu%l;#; sẽ đến."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、なにゆえ立派なのだ？\nその\x%l喚呼;#00ffc040;喚呼%l;#;を行うことは、規則であるのだろう？」
2211 = "Vừa an tâm được một chút, thắc mắc lại nảy sinh."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの現役最後の時代……\n旧\x%l帝鉄;#00ffc040;帝鉄%l;#;では、それが守られなくなっていたからです」
2262 = "「Nhưng tại sao lại đáng khen ngợi?\nViệc thực hiện \x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; đó, là quy định mà đúng không?」"
# monologue
# JP: ハチロクは静かに教えてくれる。\n\x%l喚呼;#00ffc040;喚呼%l;#;は、危険予知・事故防止をその目的とするものだと。
2904 = "「Vì trong khoảng thời gian cuối cùng tôi còn hoạt động……\nỞ \x%l帝鉄;#00ffc040;Teitetsu%l;#; cũ, điều đó đã không còn được tuân thủ nữa.」"
# monologue
# JP: しかし、\x%l列車;#00ffc040;列車%l;#;本数の激減につれ、\nルールは徐々に、守られなくなっていったのだと。
3171 = "Hachiroku nhẹ nhàng giải thích cho tôi.\n\x%l喚呼;#00ffc040;Chỉ tay hô xác nhận%l;#; có mục đích là dự báo nguy hiểm và phòng ngừa tai nạn."
# 【ハチロク】
# display as 八六
# JP: 「この路線は\x%l単線;#00ffc040;単線%l;#;であり、\nにもかかわらず、\x%l待避線;#00ffc040;待避線%l;#;が死んでいます」
2609 = "Thế nhưng, cùng với sự sụt giảm nghiêm trọng số lượng các chuyến \x%l列車;#00ffc040;đoàn tàu%l;#;,\nquy định đó dần dần không còn được tuân thủ nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、さっきから何度もいっていたな。\nそのタイヒセンとやらいう言葉を」
2321 = "「Tuyến đường này là \x%l単線;#00ffc040;đường đơn%l;#;,\nvậy mà \x%l待避線;#00ffc040;đường tránh tàu%l;#; lại chết rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、双鉄様。\nおわかりになっていらっしゃらなかったんですか？」
2232 = "「À, từ nãy đến giờ cô đã nhắc đến mấy lần rồi nhỉ.\nCái từ đường tránh tàu gì đó ấy.」"
# monologue
# JP: ハチロクは、重ねて言葉を噛み砕く。\n\x%l単線;#00ffc040;単線%l;#;とは、上りでも下りでも共用される、一本だけの線路。
2890 = "「Ô kìa, ngài Soutetsu.\nNgài vẫn chưa hiểu sao ạ?」"
# monologue
# JP: 退避線とは、\x%l単線;#00ffc040;単線%l;#;上で\x%l列車;#00ffc040;列車%l;#;を行き違いさせるため、\n迂回をさせる目的で、駅などに設けられる線路だと。
3061 = "Đường tránh tàu, là đường ray được thiết lập ở nhà ga với mục đích cho \x%l列車;#00ffc040;đoàn tàu%l;#; đi vòng,\nđể có thể đi tránh nhau trên \x%l単線;#00ffc040;đường đơn%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%l待避線;#00ffc040;待避線%l;#;が死ぬに至るまで使われない理由は、\n“\x%l列車;#00ffc040;列車%l;#;の行き違いが全く発生しないから”、となるか」
1811 = "「Nếu vậy, lý do \x%l待避線;#00ffc040;đường tránh tàu%l;#; bị bỏ hoang không được sử dụng là vì,\n“Hoàn toàn không có sự đi tránh nhau của các \x%l列車;#00ffc040;đoàn tàu%l;#;”, phải không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。そしてそのような状況下では――\n\x%l喚呼;#00ffc040;喚呼%l;#;の重要性は薄れたように感じるものも、あるのです」
2417 = "「Vâng. Và trong hoàn cảnh như vậy——\nCũng có những người cảm thấy tầm quan trọng của việc \x%l喚呼;#00ffc040;hô xác nhận%l;#; đã bị phai nhạt đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2117 = "「Cũng phải thôi.」"
# monologue
# JP: 失望は怠惰を呼び、怠惰は準備不足を――事故を呼ぶ。\n“坂道を転げるような衰退”の、それは典型的な連鎖だ。
3006 = "Sự thất vọng kéo theo sự lười biếng, sự lười biếng dẫn đến thiếu chuẩn bị——rồi gây ra tai nạn.\nĐó là một chuỗi liên kết điển hình của “sự suy thoái như lăn xuống dốc”."
# 【ハチロク】
# display as 八六
# JP: 「規則とは、そうした状況下でこそ厳守すべきもの。\nそれを知るこの路線の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、立派です」
2582 = "「Quy tắc là thứ cần phải được tuân thủ nghiêm ngặt, đặc biệt là trong những hoàn cảnh như vậy.\n\x%lレイルロオド;#00ffc040;Railord%l;#; của tuyến đường này hiểu được điều đó, thật đáng khen ngợi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。おかげで納得できた。\n会いたいものだな。その\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\x%l運転士;#00ffc040;運転士%l;#;とに」
2177 = "「Ra là vậy. Nhờ cô mà tôi đã hiểu ra rồi.\nThật muốn gặp mặt họ quá. \x%lレイルロオド;#00ffc040;Railord%l;#; và \x%l運転士;#00ffc040;người lái tàu%l;#; đó.」"
# monologue
# JP: 言えばふわりと、ハチロクは笑う。
3234 = "Nghe tôi nói vậy, Hachiroku khẽ mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「まもなくですよ、双鉄様。\n\x%l共感;#00ffc040;共感%l;#;、向こうも受信してくれました」
2326 = "「Sắp được gặp rồi đó, ngài Soutetsu.\nPhía bên kia cũng đã nhận được \x%l共感;#00ffc040;cộng cảm%l;#; rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。なんと？」
2403 = "「Vậy sao. Họ nói gì?」"
# 【ハチロク】
# display as 八六
# JP: 「非常停止し、拾ってくださるとのことです。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がいることに、大変驚いてらっしゃいます」
2471 = "「Họ nói sẽ dừng khẩn cấp và đón chúng ta.\nHọ đang rất ngạc nhiên khi biết có \x%lレイルロオド;#00ffc040;Railord%l;#; ở đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「救助してくれるのはありがたい。\nっと、ハチロク。僕の身なりは乱れていないか？」
2667 = "「Được họ cứu giúp thì thật biết ơn.\nÀ này, Hachiroku. Quần áo của tôi có bị xộc xệch không?」"
# 【ハチロク】
# display as 八六
# JP: 「いささかも。双鉄様。\n大変に紳士的でいらっしゃいます」
2153 = "「Không hề ạ. Ngài Soutetsu.\nNgài trông vô cùng lịch lãm.」"
# monologue
# JP: いって、ハチロクは自分の前髪を指でいじり、\nちら、とねだるように僕を見る。
3256 = "Nói rồi, Hachiroku dùng ngón tay nghịch phần tóc mái của mình,\nkhẽ liếc nhìn tôi như đang mong chờ điều gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「お前も凛としているぞ、ハチロク。\nこれなら失礼には当たるまい――む」
2138 = "「Cô trông cũng rất uy nghiêm đó, Hachiroku.\nThế này thì sẽ không bị coi là thất lễ đâu——ừm.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様もお気づきになられましたか」
2428 = "「Vâng. Ngài Soutetsu cũng nhận ra rồi sao.」"
# monologue
# JP: 嬉しげな、とても誇らしげなハチロクの声。\nそこに、響きが近づいてくる。
2917 = "Giọng nói của Hachiroku nghe thật vui vẻ và vô cùng tự hào.\nCùng lúc đó, có tiếng vang đang tiến lại gần."
# monologue
# JP: ガタン、ゴトン、\nガタン、ゴトン――
2966 = "（Xình xịch, xình xịch,\nxình xịch, xình xịch——）"
# monologue
# JP: ああ、これは――\nそうだ。これが\x%l列車;#00ffc040;列車%l;#;の音だ。
2967 = "A, đây là——\nĐúng rồi. Đây là âm thanh của \x%l列車;#00ffc040;đoàn tàu%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　お寒いのですか？」
2656 = "「Ngài Soutetsu? Ngài thấy lạnh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。\n寒くはない。少し、興奮したかな」
2093 = "「À, không.\nKhông lạnh đâu. Chỉ là hơi hưng phấn chút thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「武者震いですか？　光栄ですね」
2552 = "「Là sự rùng mình vì phấn khích sao? Thật vinh hạnh.」"
# monologue
# JP: “\x%l列車;#00ffc040;列車%l;#;の音”と感じた瞬間、\nそれを思い出した瞬間に――
3188 = "Ngay khoảnh khắc cảm nhận được “âm thanh của \x%l列車;#00ffc040;đoàn tàu%l;#;”,\nngay khoảnh khắc nhớ lại điều đó——"
# monologue
# JP: 目眩するほどの郷愁と、\n沸き立つ恐怖を同時に感じて。
3053 = "Tôi đồng thời cảm nhận được nỗi nhớ nhà đến hoa mắt,\nvà nỗi sợ hãi đang sục sôi."
# monologue
# JP: （情けない男だな、僕は。頭は割り切ったつもりでも……\n事故は過去だと、体は思いきれないらしい）
3348 = "（Mình đúng là một gã thảm hại. Dù lý trí đã cố gắng dứt bỏ……\nnhưng cơ thể có vẻ vẫn chưa thể coi tai nạn đó là quá khứ.）"
# monologue
# JP: ……僕は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の持ち主となり、責任を負った。\n鉄道を恐れていては、果たすべきなに事も果たせないだろう。
1795 = "……Tôi đã trở thành chủ nhân của \x%lレイルロオド;#00ffc040;Railord%l;#;, và phải gánh vác trách nhiệm.\nNếu cứ sợ hãi đường sắt, tôi sẽ chẳng thể hoàn thành được việc gì cả."
# monologue
# JP: ならばこの、粟立ち震える弱い体が慣れるまで――\nひたすらに乗り、鉄道に親しんでいくしかあるまい。
3126 = "Vậy thì cho đến khi cơ thể yếu ớt đang run rẩy sởn gai ốc này quen dần——\nTôi chỉ còn cách không ngừng lên tàu, và làm quen với đường sắt."
# 【ハチロク】
# display as 八六
# JP: 「来ます。ああ――これは――\x%l気動車;#00ffc040;気動車%l;#;――\nかわいらしい\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;ですね」
2140 = "「Đến rồi. A——đây là——\x%l気動車;#00ffc040;động cơ%l;#;——\nMột chiếc \x%lディーゼル気動車;#00ffc040;toa xe diesel tự hành%l;#; thật đáng yêu.」"
# monologue
# JP: 丸い。それが第一印象。\n丸くて、確かに可愛らしい。
2976 = "Tròn trịa. Đó là ấn tượng đầu tiên.\nTròn trịa, và quả thực rất đáng yêu."
# monologue
# JP: ベージュとエンジに塗装された車体の前方が、\n柔らかな丸みを帯びてまるきり、おもちゃのようだ。
3039 = "Phần đầu của thân xe được sơn màu be và màu đỏ sẫm,\nmang một độ cong mềm mại, trông cứ như một món đồ chơi vậy."
# 【ポーレット】
# display as ？？？
# JP: 「非常停止よし。要救助者を確認」
2534 = "「Dừng khẩn cấp, tốt. Xác nhận người cần cứu hộ.」"
# 【れいな】
# display as ？？？
# JP: 「前よし。後ろよし。足元よし。\nポーレット、おりて大丈夫ですよ～」
2174 = "「Phía trước tốt. Phía sau tốt. Dưới chân tốt.\nChị Paulette, xuống được rồi đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、れいな。一緒に来てくれる？」
2570 = "「Cảm ơn em, Reina. Cùng đi với chị chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、ポーレット。\nれいな、ごいっしょしますねぇ」
2284 = "「Vâng ạ, chị Paulette.\nReina sẽ đi cùng chị nha.」"
# monologue
# JP: 車体側面のドアが開く。\n金の光が、そこから溢れる。
3274 = "Cánh cửa bên hông thân xe mở ra.\nÁnh sáng vàng kim tràn ra từ đó."
# 【ハチロク】
# display as 八六
# JP: 「綺麗――外国の方でしょうか？」
2281 = "「Đẹp quá——Là người nước ngoài sao?」"
# monologue
# JP: 細く降る雨のような金の髪。\n真っ白な肌。深い、深い、黒くさえ見える蒼い瞳。
3028 = "Mái tóc vàng kim như những hạt mưa phùn mỏng manh.\nLàn da trắng muốt. Đôi mắt xanh sâu thẳm, sâu đến mức trông như màu đen."
# 【双鉄】
# display as 雙鐵
# JP: 「まさ、か……」
2659 = "「Không, thể nào……」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわ！　すごいですぅ！」
2219 = "「Oa! Tuyệt quá đi ạ!」"
# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「っ！」\n「あ」
2677 = "「っ!」\n「A」"
# monologue
# JP: 一瞬の硬直を打ち破る声。\nけれどまだ、意識は引かれ続けている。
3020 = "Giọng nói phá vỡ sự cứng đờ trong chốc lát.\nNhưng ý thức của tôi vẫn tiếp tục bị thu hút."
# monologue
# JP: （この金髪と――青い瞳と――）
3354 = "（Mái tóc vàng này——đôi mắt xanh này——）"
# monologue
# JP: 単なる偶然なのかもしれない。\nけれど、ポーレットと呼ばれたその人に重ねてしまう。
2879 = "Có lẽ chỉ là sự tình cờ.\nNhưng tôi lại không tự chủ được mà liên tưởng người được gọi là Paulette đó với cô ấy."
# monologue
# JP: 遠い夏の日、僕を助けて、大事なことを教えてくれた――\n優しい少女の面影を。
3302 = "Hình bóng của cô thiếu nữ dịu dàng——\nngười đã cứu tôi vào một ngày hè xa xôi, và dạy cho tôi những điều quan trọng."
# 【れいな】
# display as 玲奈
# JP: 「れいな、\nれいなよりおねえさんの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;初めてみましたぁ」
2483 = "「Reina,\nđây là lần đầu tiên Reina thấy một \x%lレイルロオド;#00ffc040;Railord%l;#; lớn tuổi hơn Reina đó nha.」"
# monologue
# JP: れいなと名乗る\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、\nひどくのんびりとした歓声。
3240 = "Tiếng reo hò cực kỳ thong thả,\ncủa \x%lレイルロオド;#00ffc040;Railord%l;#; tự xưng là Reina."
# monologue
# JP: それに答えて、ハチロクは優雅に上体を折り曲げる。
2887 = "Đáp lại điều đó, Hachiroku thanh lịch cúi gập nửa thân trên."
# 【ハチロク】
# display as 八六
# JP: 「はじめまして、れいなさん？\nわたくし、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・ハチロクと申します」
2167 = "「Rất vui được gặp em, Reina?\nTôi là \x%lレイルロオド;#00ffc040;Railord%l;#; Hachiroku.」"
# 【れいな】
# display as 玲奈
# JP: 「あえてうれしいです、ハチロクさん」
2329 = "「Reina rất vui được gặp chị, chị Hachiroku.」"
# monologue
# JP: もたり、とお辞儀。\nれいなのそれから感じるものは、不器用ながらの懸命さだ。
3236 = "Một cái cúi chào chậm chạp.\nĐiều tôi cảm nhận được từ Reina là sự nỗ lực hết mình dù còn vụng về."
# 【れいな】
# display as 玲奈
# JP: 「れいな、キハ[れいななえす,3]07-s専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のれいなです。\nふるさとは[カタカミ,1]硬上鉱山鉄道ですよぉ」
2477 = "「Reina là Reina, \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của KiHa 07S.\nQuê hương của Reina là Đường sắt mỏ Katakami đó nha.」"
# 【ハチロク】
# display as 八六
# JP: 「鉱山鉄道？　それでは、貨物を？」
2518 = "「Đường sắt mỏ? Vậy là, vận chuyển hàng hóa sao?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな、こう見えても力持ちなんですよぉ」
2409 = "「Vâng ạ. Trông Reina thế này thôi chứ khỏe lắm đó nha.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
# 2402 = "「是嗎」" 
# monologue
# JP: ハチロクと、れいなという\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と。\n言葉をひとつ交わし合うごと、お互いの距離を詰めている。
2892 = "「Chà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1825 = "Hachiroku và \x%lレイルロオド;#00ffc040;Railord%l;#; tên Reina.\nMỗi khi trao đổi một lời, khoảng cách giữa hai người lại xích lại gần nhau hơn."
# monologue
# JP: それに引き換え、人間ときたら――
3228 = "「…………」"
# 【双鉄】
# display as 雙鐵
# JP: 「んんっ」
2218 = "Ngược lại, con người thì——"
# monologue
# JP: いかんな。呆けている場合ではない。
2847 = "「Hừm.」"
# monologue
# JP: まずはハチロクの腹を満たす。\nそうするために、僕は最善を尽くさねばならんのだから。
3065 = "Không được. Đây không phải lúc để thẫn thờ."
# 【双鉄】
# display as 雙鐵
# JP: 「停車いただき感謝します。同時に、\nそれを強いてしまったことを心よりお詫び申し上げます」
2335 = "Trước hết phải lấp đầy bụng cho Hachiroku đã.\nĐể làm được điều đó, tôi phải cố gắng hết sức."
# 【ハチロク】
# display as 八六
# JP: 「あ」
2230 = "「Cảm ơn hai người đã dừng xe. Đồng thời,\ntôi cũng xin chân thành xin lỗi vì đã buộc hai người phải làm vậy.」"
# monologue
# JP: 我に返ったといわんばかりに、\nハチロクは口をきゅっと閉じ、僕の隣にかけ戻ってくる。
2885 = "「A.」"
# monologue
# JP: そして深々、\nれいななる\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、その\x%l運転士;#00ffc040;運転士%l;#;へと頭を下げる。
3122 = "Như thể vừa bừng tỉnh,\nHachiroku mím chặt môi, chạy vội về bên cạnh tôi."
# 【ハチロク】
# display as 八六
# JP: 「ご紹介が遅れました。\nこちら、わたくしのオーナー、右田双鉄様です」
2618 = "Rồi cúi đầu thật sâu,\nchào \x%lレイルロオド;#00ffc040;Railord%l;#; tên Reina và \x%l運転士;#00ffc040;người lái tàu%l;#; của em ấy."
# monologue
# JP: しきたりがまるでわからない。\nが、紹介された以上は流れに乗る他なかろう。
3079 = "「Tôi giới thiệu hơi muộn.\nĐây là chủ nhân của tôi, ngài Migita Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「遅ればせながら、はじめまして。\nこのハチロクのオーナーの、右田双鉄と申します」
2123 = "Tôi hoàn toàn không biết phép tắc.\nNhưng đã được giới thiệu rồi thì đành phải nương theo thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ミギタ……ソウテツ……\n双鉄――――さん」
2214 = "「Tuy hơi muộn, nhưng rất vui được gặp hai người.\nTôi là chủ nhân của Hachiroku, tên là Migita Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、こんにちは。\nれいなも、しょうかいしますねぇ」
2649 = "「Migita……Soutetsu……\nAnh Soutetsu――――」"
# monologue
# JP: ハチロクの足音がスタスタならば、\nれいなの足音はぽてぽてだ。
2964 = "「Chào anh Soutetsu.\nReina cũng xin tự giới thiệu nha.」"
# monologue
# JP: 言葉だけでなく、動作もいちいちゆったりしている。
3011 = "Nếu tiếng bước chân của Hachiroku là lạch cạch nhanh nhẹn,\nthì tiếng bước chân của Reina lại là lạch bạch lạch bạch."
# 【れいな】
# display as 玲奈
# JP: 「れいなのマスターのポーレットです。\nポーレットは、ひないポーレットなんですよぉ」
2604 = "Không chỉ lời nói, mà từng cử chỉ cũng rất thong thả."
# monologue
# JP: 雛衣。
3322 = "「Đây là chị Paulette, Master của Reina đó nha.\nChị Paulette tên đầy đủ là Hinai Paulette đó ạ~」"
# monologue
# JP: 聞き覚えのある名がすぐさま記憶とつながる。\n確か――そうだ、ナビが上空で言っていた。
3231 = "Hinai."
# 【双鉄】
# display as 雙鐵
# JP: 「雛衣ポーレット……というと、御一夜市長？」
2658 = "Cái tên nghe quen thuộc lập tức kết nối với ký ức.\nHình như——đúng rồi, Navi đã nói khi ở trên trời."
# monologue
# JP: 途端、びくっと、\n雛衣ポーレットが体全体をすくませる。
3323 = "「Hinai Paulette……Vậy cô là thị trưởng Ohimitera sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、すみません。驚いてしまって。\nあの、わたしのこと、ご存知だなんて思わなくって」
2235 = "Ngay lập tức, Hinai Paulette giật mình,\nco rúm toàn thân lại."
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、こちらこそ。\n突然[すいか,1]誰何のような真似、失礼しました」
2356 = "「A, xin lỗi anh. Tôi ngạc nhiên quá.\nTại tôi không nghĩ là anh lại biết tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんな、驚くようなことじゃないのに、\nわたしが少し……その、驚きすぎてしまっただけです」
2225 = "「Không, tôi mới phải xin lỗi.\nĐột nhiên lại tra hỏi như vậy, thật thất lễ.」"
# monologue
# JP: 確かに、と。\nまさか口には出せないし、態度で示すこともできない。
3196 = "「Không đâu, chuyện đó cũng chẳng có gì đáng ngạc nhiên,\nchỉ là tôi hơi……ừm, phản ứng thái quá thôi.」"
# monologue
# JP: 市長ともあろう公人が“ご存知とは思わなかった”など\n僕の感覚の“普通”では、ありえない発言と思いはするが。
3261 = "Đúng vậy thật.\nNhưng tôi không thể nói ra, cũng không thể thể hiện qua thái độ được."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1825 = "「…………」" 
# monologue
# JP: 自分の言葉に縛られる。
2871 = "Một người của công chúng như thị trưởng mà lại nói “không nghĩ là anh lại biết tôi”\nTheo “lẽ thường” của tôi, thì đó là một phát ngôn không thể nào tưởng tượng được."
# monologue
# JP: “誰何のような失礼”をわびてしまったからには、\n僕の方から向こうの事情を尋ねることができなくなった。
3128 = "Tôi bị trói buộc bởi chính lời nói của mình."
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 1825 = "「…………」" 
# monologue
# JP: そして向こうも、赤い顔をして沈黙している。
3044 = "Đã xin lỗi vì “tra hỏi thất lễ” rồi,\nthì tôi không thể chủ động hỏi han tình hình của đối phương được nữa."
# monologue
# JP: まるで何かを探りでもしているかのように、\nちら、ちら、と、僕を見て視線を逸らしてを繰り返す。
3060 = "Và bên kia cũng đang đỏ mặt im lặng."
# monologue
# JP: （お見合い、というヤツだな、これは）
3352 = "Như thể đang dò xét điều gì đó,\ncô ấy cứ liên tục liếc nhìn tôi rồi lại đảo mắt đi."
# monologue
# JP: ……性に合わない。\n……あと十秒。
1802 = "（Cái này, giống như xem mắt ấy nhỉ.）"
# monologue
# JP: それだけ待って動きが無いなら、\n失礼を承知で僕から動こう。
3246 = "……Không hợp với tính cách của mình chút nào.\n……Mười giây nữa."
# 【れいな】
# display as 玲奈
# JP: 「あのぉ、れいな、すこぉしだけふしぎなんですけどぉ」
2625 = "Đợi chừng đó mà vẫn không có động tĩnh gì,\nthì tôi đành phải thất lễ mà chủ động vậy."
# monologue
# JP: 助け舟、というわけでもなさそうだ。
3010 = "「À ừm, Reina, thấy hơi kỳ lạ một chút nha.」"
# monologue
# JP: 本当に不思議そうに首を傾げるれいなに、\nハチロクはほっとしたような、そして温かな視線を返す。
3325 = "Có vẻ cũng không hẳn là một lời giải vây."
# 【ハチロク】
# display as 八六
# JP: 「なんですか？　れいなさん」
2480 = "Hachiroku nhìn Reina đang thực sự nghiêng đầu tò mò,\nbằng một ánh mắt ấm áp và có vẻ nhẹ nhõm."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんは、ハチロクさんの、[オーナー,2]所有者？\nどうして、[マスター,2]運転士じゃないのですかぁ？」
2648 = "「Chuyện gì vậy? Reina.」"
# 【ハチロク】
# display as 八六
# JP: 「そ、それは――」
2603 = "「Anh Soutetsu là chủ sở hữu của chị Hachiroku sao?\nTại sao không phải là người lái tàu vậy ạ?」"
# monologue
# JP: 今度はハチロク。\nちらちら、僕を見て視線を逸らすを繰り返す。
3295 = "「Chuyện, chuyện đó là——」"
# 【ハチロク】
# display as 八六
# JP: 「いずれ必ず。双鉄さまはきっとわたくしの\x%l機関士;#00ffc040;[マスター,2]機関士%l;#;に……\nでも、今は少しだけ事情があって」
2651 = "Lần này đến lượt Hachiroku.\nCô ấy cứ liên tục liếc nhìn tôi rồi lại đảo mắt đi."
# 【れいな】
# display as 玲奈
# JP: 「じじょお？　じじょおって、なんですかぁ？」
2644 = "「Rồi sẽ đến lúc đó thôi. Ngài Soutetsu chắc chắn sẽ trở thành \x%l機関士;#00ffc040;Master%l;#; của tôi……\nNhưng mà, hiện tại thì có chút lý do.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいな？」
2487 = "「Lý do? Lý do là gì vậy ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「きゃあ」
2216 = "「Reina?」"
# monologue
# JP: ポーレットの手に抱きかかえられ、\nれいながうれしげな悲鳴を上げる。
3179 = "「Á.」"
# monologue
# JP: 無邪気な子犬と、優しい飼い主。\nそんな空気で、ポーレットはれいなをたしなめる。
3154 = "Bị Paulette ôm chầm lấy,\nReina phát ra tiếng kêu vui vẻ."
# 【ポーレット】
# display as 波萊特
# JP: 「今は、こんな時代でしょう？　だから、\n\x%lまいてつ;#00ffc040;まいてつ%l;#;にもそれぞれ、きっといろいろな事情があるの」
2290 = "Một chú cún con ngây thơ, và một người chủ dịu dàng.\nTrong bầu không khí đó, Paulette nhắc nhở Reina."
# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;？\n\x%lまいてつ;#00ffc040;まいてつ%l;#;とは何だ？
72 = "「Thời đại bây giờ là vậy mà, đúng không? Vì thế,\nmỗi \x%lまいてつ;#00ffc040;người sành toa xe%l;#; chắc chắn đều có những lý do riêng của mình.」"
# 【ハチロク】
# display as 八六
# JP: 「？？？」
2681 = "\x%lまいてつ;#00ffc040;Maitetsu%l;#;?\n\x%lまいてつ;#00ffc040;Maitetsu%l;#; là gì vậy?"
# monologue
# JP: 視線が合う。
2972 = "「???」"
# monologue
# JP: ハチロクも知らない言葉なのだと、\n僕に聞こうとしていると、ただそれだけで伝わってくる。
3069 = "Ánh mắt chạm nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「それは、踏み込んで聞いてはいけないことなの。\n知りたくても、向こうから話してくれるまで我慢、ね？」
2091 = "Chỉ cần nhìn là tôi hiểu ngay,\nđó cũng là một từ mà Hachiroku không biết, và cô ấy đang định hỏi tôi."
# monologue
# JP: こっっっく、り――と。\n時間をかけてれいなが頷く。
3177 = "「Đó là chuyện không được phép tọc mạch hỏi han.\nDù có muốn biết thì cũng phải cố nhịn cho đến khi người ta tự nói ra, nhớ chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな。\nじじょおは、れいなから聞いちゃだめって覚えましたぁ」
2393 = "Gật, gù——\nReina từ từ gật đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「うん。れいなはいい子ね」
2239 = "「Vâng ạ. Reina nhớ rồi.\nReina không được hỏi về lý do của người khác nha.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへ、れいな。ほめてもらっちゃいましたぁ」
2245 = "「Ừm. Reina ngoan lắm.」"
# monologue
# JP: 抱きしめ、注意し、撫で回す。\nいい教育だ。
3009 = "「Hì hì, Reina được khen rồi nha.」"
# monologue
# JP: ――疑問には、すぐに解消すべきものと、\nそうしてはならぬものがある。
3192 = "Ôm ấp, nhắc nhở, rồi lại vuốt ve.\nMột cách giáo dục rất tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。ポーレット市長」
2305 = "——Đối với những thắc mắc, có những điều cần phải được giải đáp ngay,\nvà cũng có những điều không nên làm vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「市長は……少し、庁舎の外だと恥ずかしいです。\nもしよければ、その、ポーレット、って。それだけで」
2267 = "「Xin lỗi. Thị trưởng Paulette.」"
# monologue
# JP: 儀礼的なのは好まないのか？\nそれでは、ざっくり行くとしよう。
3014 = "「Gọi là thị trưởng……ở ngoài tòa thị chính thì hơi ngại ạ.\nNếu được, ừm, cứ gọi tôi là Paulette. Vậy là đủ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならポーレット。\nすまんが、ひとつ教えて欲しい」
2628 = "Không thích những thứ nghi thức sao?\nVậy thì cứ gọi một cách thoải mái đi."
# monologue
# JP: 尋ねたいことは、本当は他にももう一つある。
2938 = "「Vậy thì Paulette.\nXin lỗi, tôi muốn hỏi một điều.」"
# monologue
# JP: だがまずは、『すぐに解消すべきである』と、\n確信を持てる方だけを、ぶつけてみよう。
2856 = "Thật ra vẫn còn một điều nữa tôi muốn hỏi."
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄さん。\nわたしにお返事できることなら、なんでも聞いて下さい」
2285 = "Nhưng trước tiên, tôi sẽ chỉ hỏi điều mà tôi tin chắc là\n“cần phải được giải đáp ngay”."
# monologue
# JP: ポーレットの返事を受けてハチロクは、\n僕へと期待の視線を向ける。
2980 = "「Vâng, anh Soutetsu.\nNếu là chuyện tôi có thể trả lời, anh cứ hỏi đi ạ.」"
# monologue
# JP: ならば。問おう――
3306 = "Nghe câu trả lời của Paulette, Hachiroku\nnhìn tôi với ánh mắt đầy kỳ vọng."
# 【双鉄】
# display as 雙鐵
# JP: 「その、『\x%lまいてつ;#00ffc040;まいてつ%l;#;』とは、いったいなんだ？」
2567 = "Vậy thì. Tôi sẽ hỏi——"
