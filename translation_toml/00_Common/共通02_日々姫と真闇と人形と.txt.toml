2492 = "「Thì đúng là vậy mà—— Nói cách khác, người đó cũng là sinh viên Đế Đại đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「勉強うんぬんという話ではない。\n一を聞いて百を知るというか――うむ。これでどうだ」
1953 = "「Không phải chuyện học hành này nọ đâu. Kiểu như nghe một hiểu mười ấy——ừm. Thế này được chưa.」"
# 【日々姫】
# display as 日日姬
