2903 = "Tôi cúi đầu.\nCúi thật sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「物にも二種類があることを、僕は確かに知っている。\nお前にはナビと同様――本物の知性があるのだな？」
2193 = "「Tôi quả thực biết rằng đồ vật cũng có hai loại. Cô cũng giống như Navi——sở hữu trí tuệ thực sự nhỉ?」"
# 【ハチロク】
# display as ？？？
# JP: 「そのナビ様がどこのどなたかは存じませぬが――\nわたくしに知性があることは確かです」
2581 = "「Tôi không biết Navi mà ngài nói là ai—— Nhưng việc tôi có trí tuệ là sự thật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばお前は、意志をもち誇りを持つものだ。\nそうして僕は、愚かにもそれを傷つけた」
2550 = "「Vậy thì cô là một cá thể có ý chí và lòng tự trọng. Và tôi đã ngu ngốc làm tổn thương điều đó.」"
# monologue
# JP: ナビは頑なに否定する。\nが、ナビには意志も誇りもある。
3251 = "Navi thì ngoan cố phủ nhận. Nhưng Navi cũng có ý chí và lòng tự trọng."
# monologue
# JP: そう信じ、それに救われてさえいる僕が、\n物の持つ意志を、誇りを――否定するなどしてはならない。
2846 = "Là một người tin vào điều đó và thậm chí đã được nó cứu rỗi, tôi tuyệt đối không được phép phủ nhận ý chí và lòng tự trọng——của đồ vật."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は自分が間違っていたことを全面的に謝罪する。\nもし可能なら、やりなおさせて欲しいとも願う」
2170 = "「Tôi xin hoàn toàn nhận lỗi về sự sai trái của mình. Nếu có thể, tôi mong được làm lại từ đầu.」"
# 【ハチロク】
# display as ？？？
# JP: 「やりなおす――何を、でしょうか？」
2564 = "「Làm lại——chuyện gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「最初から……そうだな、お前……君の怒りを、\n僕が躱してしまった過ち、そこからを」
2133 = "「Từ lúc bắt đầu……phải rồi, cô……Từ sai lầm của tôi, khi đã né tránh cơn giận của cô.」"
# 【ハチロク】
# display as ？？？
# JP: 「そうですか。でしたら、頬を下げてください」
2490 = "「Vậy sao. Nếu vậy, xin hãy cúi mặt xuống.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2065 = "「嗯」" 
# monologue
# JP: 言われるままに顔を下げれば、\n目と目が、至近距離からぶつかる。
2910 = "Làm theo lời cô ấy mà cúi mặt xuống, ánh mắt chúng tôi chạm nhau ở khoảng cách cực gần."
# monologue
# JP: （ああ……美しいのは顔のつくりだけでは無いのか）
3241 = "（A……hóa ra sự xinh đẹp không chỉ nằm ở cấu trúc khuôn mặt sao.）"
# monologue
# JP: 意志をもつものだけが放ち得る、強い輝き。
2790 = "Một ánh sáng rực rỡ mạnh mẽ mà chỉ những cá thể có ý chí mới có thể tỏa ra."
# monologue
# JP: 最初からこれを認めていれば、\n“人形”として扱うなどと、できようもなかった。
2836 = "Nếu ngay từ đầu tôi nhận ra điều này, thì đã không đối xử với cô ấy như một \"con búp bê\" rồi."
# monologue
# JP: （パンっ！）
3242 = "（Bốp!）"
# monologue
# JP: 大きな音。小さな痛み。
3211 = "Âm thanh lớn. Cơn đau nhỏ."
# monologue
# JP: 真っ赤になった手を抑え、\n意志もつ物はわずかに頷き、そしてふふふと笑いをこぼす。
2937 = "Ôm lấy bàn tay đỏ ửng, đồ vật có ý chí khẽ gật đầu, rồi bật cười khúc khích."
# 【ハチロク】
# display as ？？？
# JP: 「奇妙な方ですね、あなたは。\n奇妙ですが、どうやら話は通じそうです」
2150 = "「Ngài thật kỳ lạ. Kỳ lạ, nhưng có vẻ chúng ta nói chuyện được với nhau.」"
# monologue
# JP: コホン、と控えめな咳払い。\n日々姫がすっと近づいてきて、小さな耳へと唇を寄せる。
3156 = "Khụ, một tiếng hắng giọng e dè. Hibiki khẽ bước tới, kề môi sát vào tai cô bé."
# 【日々姫】
# display as 日日姬
# JP: 「あの……あなた――服、整えなおした方がよかばい」
2514 = "「À ừm……cậu——chỉnh lại quần áo thì hơn đó.」"
# 【ハチロク】
# display as ？？？
# JP: 「左様ですね。ご助言、ありがとうございます。\n――すみませんが、後ろを向いていていただけますか？」
2443 = "「Đúng vậy nhỉ. Cảm ơn cô đã nhắc nhở. ——Xin lỗi, ngài có thể quay lưng lại được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2352 = "「Tất nhiên rồi.」"
# monologue
# JP: シュ、シュと小気味良い衣擦れの音。
3119 = "Xột xoạt, tiếng quần áo cọ xát nghe thật vui tai."
# monologue
# JP: もたもた着替えた路子のことが思い出されて、\n“着慣れているな”と、そんな言葉が浮き上がってくる。
2896 = "Nhớ lại cảnh Michiko thay quần áo lề mề, những từ như \"quen mặc rồi nhỉ\" chợt hiện lên trong đầu tôi."
# 【ハチロク】
# display as ？？？
# JP: 「すみません。お待たせいたしました」
2212 = "「Xin lỗi. Đã để ngài phải đợi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、待ったというほど――おお」
2325 = "「Không, cũng không lâu lắm——oa.」"
# 【日々姫】
# display as 日日姬
# JP: 「わぁ！　似合う～～　綺麗～～」
2027 = "「Oa! Hợp quá~~ Đẹp quá đi~~」"
# 【ハチロク】
# display as ？？？
# JP: 「左様でしょうね。\nそのように、わたくしは作られておりますから」
2544 = "「Đương nhiên rồi.\nVì tôi được tạo ra như vậy mà.」"
# monologue
# JP: （ピっ）
3239 = "（Vút）"
# monologue
# JP: 整った服で見事な敬礼。
2942 = "Bộ trang phục chỉnh tề cùng kiểu chào nghiêm trang."
# monologue
# JP: 見よう見まねで答礼すれば、日々姫も慌てて僕に倣う。
2936 = "Tôi bắt chước đáp lễ, Hibiki cũng cuống quýt làm theo."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは\x%l帝鉄;#00ffc040;帝鉄%l;#;[ハチロクニイマル,3]8620形\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、トップナンバー・\n\x%l8620;#00ffc040;8620%l;#;号専用レイルロオド、ハチロクと申します」
2182 = "「Tôi là Hachiroku, Railord chuyên dụng cho chiếc đầu tiên mang số hiệu \\x%l8620;#00ffc040;8620%l;#; thuộc dòng \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; loại 8620 của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;っ！？」
1560 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;!?」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2037 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2234 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2591 = "「！」" 
