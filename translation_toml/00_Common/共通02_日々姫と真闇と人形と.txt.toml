# JP: 「にぃにぃ、また氷食べよっ――こほん。\n兄さん、また氷なんてお食べになって」
2573 = "「Niinii, lại ăn đá nữa kìa―― khụ. \nAnh hai, anh lại ăn đá nữa rồi」"

# 【真闇】
# JP: 「おいしかもんねぇ。うちん蔵の水は、\nぜぇんぶクマ川のいっとうよかもんやけん」
2020 = "「Ngon mà heng. Nước trong kho nhà mình, \nđều là thứ hảo hạng nhất của sông Kuma đó nghen」"

# 【双鉄】
# JP: 「うん」
2065 = "「Ừm」"

# (独白)
# JP: そう、御一夜に、この家にもらわれて来て、初めて知った。\n水が、氷が、これほどうまいということを。
3009 = "Phải rồi, từ khi được nhận nuôi về ngôi nhà này ở Ohitoyo, lần đầu tiên tôi biết được rằng. \nNước, và cả đá nữa, lại có thể ngon đến nhường này."

# (独白)
# JP: なら、やはり――\nこの水を守ることもまた、僕の果たすべき義務だろう。
3190 = "Nếu vậy thì quả nhiên―― \nViệc bảo vệ nguồn nước này cũng chính là nghĩa vụ mà tôi phải hoàn thành."

# 【双鉄】
# JP: 「それで、真闇姉」
2441 = "「Mà này, chị Mayami」"

# (独白)
# JP: ならば、果たすべきを早く果たそう。\n懐かしむなど、そのあといくらでも堪能できる。
3191 = "Nếu đã thế, hãy mau chóng hoàn thành điều cần làm thôi. \nChuyện hoài niệm thì sau đó muốn tận hưởng bao lâu mà chẳng được."

# 【双鉄】
# JP: 「御一夜に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致するという話。\n今、どの程度のものになってる？」
2495 = "「Chuyện hoài nghi về việc thu hút \\\\x%lnhà máy Aircra;#00ffc040;nhà máy Aircra%l;#; về Ohitoyo. \nHiện tại tiến độ đã đến mức nào rồi?」"

# 【真闇】
# JP: 「なんねぇ、双ちゃん。\n夏休みで帰ってきたんじゃなかと？」
2143 = "「Cái gì vậy nè, Sou-chan. \nKhông phải em về nhà là để nghỉ hè sao?」"

# 【双鉄】
# JP: 「うん。大学は休学してきた」
2064 = "「Vâng. Em đã xin bảo lưu học tập ở đại học để về đây」"

# 【日々姫】
# JP: 「休学っ！？」
1926 = "「Bảo lưu học tập á!?」"

# (独白)
# JP: 驚き顔の日々姫に頷く。
2986 = "Tôi gật đầu trước khuôn mặt đầy kinh ngạc của Hibiki."

# 【双鉄】
# JP: 「勉学よりも、この件の方が遥かに大事と思ったからな」
2078 = "「Bởi vì em nghĩ việc này còn quan trọng hơn chuyện học hành nhiều」"

# (独白)
# JP: 無論、休学にあたってはいろいろあった。
3037 = "Dĩ nhiên, để xin được bảo lưu thì cũng đã có rất nhiều chuyện xảy ra."

# (独白)
# JP: 義父さんから、何だかんだと条件をつきつけられもしたが、\nその辺りのことはまぁ、折を見て話せばよいだろう。
3217 = "Dù bị cha nuôi đưa ra đủ thứ điều kiện này nọ, \nnhưng mấy chuyện đó thôi để khi nào có dịp rồi nói sau cũng được."

# 【日々姫】
# JP: 「そいたら、にぃに――んんっ――\nと、いうことは、兄さんも工場誘致を推進に？」
2109 = "「Vậy thì, anh hai―― ưm, hửm―― \nnghĩa là, anh cũng muốn thúc đẩy việc thu hút xây dựng nhà máy ạ?」"

# 【双鉄】
# JP: 「ああ――うん？　いや」
2060 = "「À―― ừm? À không」"

# (独白)
# JP: 聞き違えたか？\n言葉の意味を取り損なって、曖昧な返事を返してしまった。
3008 = "Mình nghe nhầm sao? \nVì chưa nắm rõ ý tứ trong lời nói đó, tôi đành đưa ra một câu trả lời mơ hồ."

# 【双鉄】
# JP: 「日々姫は、今なんと？」
2241 = "「Hibiki, vừa nãy em nói gì cơ?」"

# 【日々姫】
# JP: 「え？　ですから――兄さんも、\n工場誘致を推進しに戻ってきてくださったのか――と」
2038 = "「Dạ? Thì em bảo là―― anh cũng \nquay về để thúc đẩy việc thu hút xây dựng nhà máy đúng không ạ――」"

# 【双鉄】
# JP: 「推進」
2215 = "「Thúc đẩy sao」"

# (独白)
# JP: 聞き違いではなかったようだ。\nが――
3020 = "Có vẻ như tôi không nghe nhầm. \nNhưng mà――"

# (独白)
# JP: 信じられずに真闇姉へと視線を送れば、\n笑顔と小さくすくめた肩とに受け止められる。
2909 = "Không thể tin nổi, tôi đưa mắt nhìn sang chị Mayami, \nnhưng chỉ nhận lại một nụ cười mỉm cùng cái nhún vai nhẹ nhàng của chị."

# 【双鉄】
# JP: 「ふむ」
2048 = "「Hửm」"

# (独白)
# JP: ならば、“推進”は、日々姫ひとりの意見であるのか。
3189 = "Nếu vậy, việc “thúc đẩy” hoàn toàn là ý kiến cá nhân của riêng Hibiki sao."

# 【双鉄】
# JP: 「推進などと。どこでどう、\nそのような考えを吹きこまれたんだ？」
2442 = "「Thúc đẩy gì chứ. Ở đâu và bằng cách nào, \nai đã nhồi nhét suy nghĩ đó vào đầu em thế?」"

# 【日々姫】
# JP: 「え？」
2037 = "「Dạ?」"

# (独白)
# JP: また驚いた顔になり。\n次いでみるみる、日々姫の頬が朱に染まっていく。
2988 = "Hibiki lại tỏ vẻ ngạc nhiên. \nRồi ngay sau đó, hai má cô bé nhanh chóng đỏ ửng lên vì giận dỗi."

# 【日々姫】
# JP: 「『吹きこまれた』なんていう言い方はやめてください」
2446 = "「Xin anh đừng dùng những từ ngữ như là 『nhồi nhét』 chứ」"

# 【双鉄】
# JP: 「そうか、すまん。では言い直そう。\n誘致の推進という考えに、日々姫はなぜ思い至った？」
2265 = "「Thế à, anh xin lỗi. Vậy anh hỏi lại nhé. \nTại sao Hibiki lại hướng đến suy nghĩ muốn thúc đẩy việc thu hút nhà máy đó?」"

# 【日々姫】
# JP: 「それは――」
2487 = "「Chuyện đó là――」"

# (独白)
# JP: 口を閉じ。\n日々姫は目線を左右に揺らす。
2984 = "Ngậm chặt miệng. \nÁnh mắt Hibiki dao động qua lại."

# (独白)
# JP: そして僕へと顔を戻さず、\nそのままで、けれども強い声をだす。
2832 = "Rồi cô ấy chẳng hề quay mặt về phía tôi, \nnguyên trạng thế kia, nhưng vẫn cất giọng nói kiên định."

# 【日々姫】
# JP: 「御一夜の衰退を考えれば、当然の結論だというだけです。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の工場誘致は、安定的な発展をもたらします」
2413 = "「Nếu nghĩ đến sự suy thoái của Ohito, thì đó chỉ đơn thuần là kết luận hiển nhiên mà thôi. \nViệc kêu gọi đầu tư nhà máy của \\\\x%lPhi cơ;#00ffc040;Aircra%l;#; sẽ đem lại sự phát triển ổn định」"

# 【双鉄】
# JP: 「確かに、それは一面の真実だ。\nだが、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致が呼びこむものは他にもある」
2394 = "「Đúng là điều đó phản ánh một phần sự thật. \nThế nhưng, thứ mà việc kêu gọi đầu tư nhà máy \\\\x%lPhi cơ;#00ffc040;Aircra%l;#; kéo theo còn có những thứ khác nữa」"

# (独白)
# JP: 日々姫を見、真闇姉を見る。\n沈黙と、強い頷きと。
2918 = "Tôi nhìn Hibiki, rồi lại nhìn chị Mayami. \nMột sự im lặng, cùng cái gật đầu quả quyết."

# 【双鉄】
# JP: 「“水質汚染”――そのことを日々姫は」
2235 = "「“Ô nhiễm nguồn nước”――chuyện đó Hibiki...」"

# 【日々姫】
# JP: 「知っています、もちろん！」
2353 = "「Em biết chứ, dĩ nhiên rồi!」"

# (独白)
# JP: 大声。\nそして日々姫の瞳は、僕より先に真闇姉へ向く。
2870 = "Một tiếng hét lớn. \nVà rồi đôi mắt Hibiki hướng về phía chị Mayami trước cả khi nhìn tôi."

# 【日々姫】
# JP: 「“姉さん”も、\n兄さんと同じことを言っていましたから」
2076 = "「Bởi vì “Chị” \ncũng đã nói y hệt như anh vậy」"

# (独白)
# JP: ねぇねぇではなく、あえて姉さん。\n姉妹喧嘩、と。その四文字が頭に浮かぶ。
2695 = "Không gọi là Chị hai, mà cố tình gọi là Chị. \nChiến tranh chị em, cụm từ bốn chữ đó chợt thoáng qua đầu tôi."

# 【日々姫】
# JP: 「ですが、汚染などという言葉は大げさです。排水は、\n国の環境基準内に余裕をもって収まるよう処理されます」
1931 = "「Thế nhưng, dùng từ ô nhiễm như vậy là phóng đại rồi. Nước thải sẽ được xử lý để đảm bảo nằm trong quy chuẩn môi trường của quốc gia một cách dư dả」"

# (独白)
# JP: 日々姫はかなり感情的だ。\nいたずらに刺激せぬよう、言葉を選ぶ。
2995 = "Hibiki đang khá là cảm tính. \nTôi chọn lựa lời hay ý đẹp để tránh kích động cô ấy một cách vô ích."

# 【双鉄】
# JP: 「それは確かに。が、“国の基準”は、いわば最大公約数。\n地方地方の特色までを考慮してあるものとは言えない」
2391 = "「Điều đó quả thực không sai. Có điều, “tiêu chuẩn quốc gia” có thể nói là mẫu số chung lớn nhất. Chứ không thể xem là đã tính đến những đặc trưng của từng địa phương cụ thể được」"

# (独白)
# JP: クっと日々姫が唇を噛む。\n口惜しそうに下を向き、上目遣いで僕を見てくる。
2978 = "Hibiki khẽ cắn môi. \nCô ấy cúi mặt xuống vẻ đầy ấm ức, rồi ngước mắt lên nhìn tôi."

# 【日々姫】
# JP: 「にぃにぃまでねぇねぇと同じこと～っ」
2570 = "「Anh hai cũng nói y chang như chị hai luôn~!」"

# 【双鉄】
# JP: 「ふむ。やはりか」
2300 = "「Hửm. Quả nhiên là vậy sao.」"

# 【日々姫】
# JP: 「やはりってなんね！　どぎゃん意味で」
1912 = "「Ý anh 'quả nhiên' là sao hả! Có nghĩa là thế nào cơ!」"

# (独白)
# JP: （ぽんっ）
3243 = "（Bốp）"

# (独白)
# JP: 勢いこんだ日々姫が腰を跳ね上げて――\nその瞬間、ひどく間の抜けた音が立つ。
3023 = "Hibiki đang lúc hăng máu bèn nhảy dựng lên―― \nvào đúng khoảnh khắc đó, một âm thanh cực kỳ ngớ ngẩn vang lên."

# (独白)
# JP: 真闇姉だ。\n両手を柔らかに打ち鳴らし、困ったような笑みを浮かべる。
3011 = "Là chị Mayami. \nChị ấy nhẹ nhàng vỗ hai tay vào nhau, nở một nụ cười có chút bối rối."

# 【真闇】
# JP: 「ああ、いけん。蔵の仕事の途中やったけん。\n双ちゃん、ひーちゃんと仲よぉね」
2059 = "「Chết chưa, không được rồi. Em đang làm dở việc trong kho mất rồi. \nSou-chan, nhớ hòa thuận với Hi-chan nha.」"

# 【日々姫】
# JP: 「いややけん！　にぃにぃと仲良ぉなんて」
2440 = "「Em không chịu đâu! Ai thèm hòa thuận với anh hai chứ.」"

# 【双鉄】
# JP: 「そうなのか？」
2264 = "「Thật vậy sao?」"

# (独白)
# JP: 豆鉄砲を食らう鳩。
2992 = "Như chim bồ câu ăn phải đạn đậu."

# (独白)
# JP: それを見事に顔面だけで表現しながら、\n日々姫は顔を赤くして、すぐその色を青ざめさせる。
2831 = "Chỉ bằng các biểu cảm trên khuôn mặt đã thể hiện xuất sắc điều đó, \nHibiki đỏ bừng mặt lên, rồi ngay lập tức sắc mặt lại chuyển sang tái mét."

# 【日々姫】
# JP: 「あ――う……い、イヤゆうたんは、その――\nその、ですね、ええと、そういう意味ではなくて」
2052 = "「A――ư…… K-Không chịu, ý em là―― \nLà, chuyện đó, à thì, không phải theo nghĩa đó đâu ạ.」"

# 【双鉄】
# JP: 「無くて？」
1887 = "「Không phải?」"

# 【日々姫】
# JP: 「イヤというほどイヤじゃ無い、っていうか――\nええと、仲良くしたく無いことは無いんですけど、その」
2198 = "「Không phải là ghét đến mức không chịu nổi, ý em là―― \nÀ thì, không phải là em không muốn hòa thuận đâu, nhưng mà chuyện đó...」"

# 【双鉄】
# JP: 「イヤだけど、イヤじゃない」
2584 = "「Không chịu, nhưng không phải là không chịu.」"

# (独白)
# JP: 謎かけの類は全く不得手だ。
2807 = "Mình hoàn toàn không có khiếu với mấy trò đố mẹo kiểu này."

# (独白)
# JP: が、日々姫の切羽詰まっての言葉なら、\nその意味を、なんとか汲み取るのが僕の義務だろう。
2728 = "Nhưng nếu Hibiki đã nói ra trong lúc bối rối như thế, \nthì trách nhiệm của mình là phải cố mà hiểu được ý nghĩa ẩn sau đó."

# 【双鉄】
# JP: 「イヤだけど、イヤじゃ――ふむ？　もしかして……\nそれはアレか？　俗にいう、『イヤよイヤよも』」
2583 = "「Ghét nhưng không hẳn là ghét――Hửm? Chẳng lẽ... \nCái đó là cái người ta thường gọi là 『Ghét của nào trời trao của nấy』 à?」"

# 【日々姫】
# JP: 「好かんっ！　にぃにぃのアホーーーーーっ！」
2205 = "「Ghét lắm! Anh hai đồ ngốốcーーーーー!」"

# 【双鉄】
# JP: 「おっと」
2026 = "「Úi chà.」"

# (独白)
# JP: 投げつけられた座布団を躱すその間に素早く、\n日々姫は居間を飛び出して、二階の自室にこもってしまう。
3148 = "Trong lúc mình kịp né chiếc đệm ngồi vừa bị ném tới, Khinh khí nhanh chóng lao khỏi phòng khách, chạy tót lên lầu rồi tự nhốt mình trong phòng riêng."

# 【双鉄】
# JP: 「残念。間違えたか」
2006 = "「Tiếc thật. Mình đoán sai rồi sao?」"

# 【真闇】
# JP: 「残念なんは確かばい。\n間違ごーとらんけど、間違ごーとるけんねぇ」
2393 = "「Tiếc thì đúng là tiếc thật. \nKhông sai chút nào, nhưng mà lại sai rành rành ra đấy chứ.」"

# 【双鉄】
# JP: 「真闇姉まで謎かけか」
2373 = "「Đến cả chị Mayami cũng chơi trò đố mẹo nữa à.」"

# (独白)
# JP: 降参だ。
2901 = "Đầu hàng luôn."

# (独白)
# JP: 考えようとするより先に、\n両手が“お手上げ”を示してる。
3108 = "Chưa kịp nghĩ ngợi gì thêm, \nhai tay mình đã giơ lên biểu thị sự “bó tay” rồi."

# 【双鉄】
# JP: 「今度はいったいどういう意味――」
2482 = "「Lần này thì rốt cuộc có nghĩa là gì――」"

# (独白)
# JP: 問えばすぐさま真闇姉は、\n人差し指をその口元に運び唇をいったん閉ざす。
2922 = "Vừa dứt câu hỏi, chị Mayami liền đưa ngón trỏ lên miệng làm dấu giữ im lặng."

# 【真闇】
# JP: 「――言えんね、双ちゃん。\n言うたらうちが、ひーちゃんに一生うらまれったい」
2484 = "「――Không nói được đâu, Sou-chan. \nNói ra là chị bị Hi-chan oán hận cả đời mất thôi.」"

# 【双鉄】
# JP: 「一生。それはたまらんな。\nならば聞くまい。自分で、おいおい考えてみよう」
1872 = "「Cả đời luôn sao. Thế thì chịu rồi. \nNếu vậy em sẽ không hỏi nữa. Để tự mình từ từ suy nghĩ xem sao.」"

# 【真闇】
# JP: 「そーね、それが良かったい」
2069 = "「Phải ha, vậy là tốt nhất rồi」"

# (独白)
# JP: 微笑んで。視線を階段の上に送って、\n真闇姉は大げさなほどのため息をつく。
2827 = "Nở nụ cười mỉm, chị Mayami hướng mắt lên phía trên cầu thang, rồi thở dài một hơi thật thườn thượt. \n"

# 【真闇】
# JP: 「けぇど、こーなると困ってしまうねぇ。双ちゃんには、\nひーちゃんの部屋にひとまず落ち着いてもらおうと」
1934 = "「Nhưng mà, tình cảnh thế này thì cũng rắc rối thật đấy nhỉ. Chị vốn định bảo Sou-chan \ntạm thời vào phòng của Hi-chan để ổn định chỗ ở trước đã」"

# 【日々姫】
# JP: 「無理ばい無理無理！　そぎゃんかこつは無理ったい！\nにぃにぃと同じ部屋なんてどぎゃんしても暮らせんけん」
1891 = "「Không được đâu, tuyệt đối không được! Chuyện đó là không thể nào! \nLàm sao mà em có thể sống chung phòng với hai-ni được chứ」"

# 【真闇】
# JP: 「ゆーても、昔は一緒の部屋で暮らしておったでしょお」
1927 = "「Nói thế chứ hồi xưa hai đứa chẳng sống chung phòng là gì」"

# 【日々姫】
# JP: 「昔は昔、今は今！\nそぎゃんこつ、言うまでもなかろーもんっ！」
1923 = "「Xưa là xưa, nay là nay! \nChuyện như vậy còn cần phải nói nữa sao ạ!」"

# (独白)
# JP: ……十秒、二十秒、三十秒。
1550 = "……Mười giây, hai mươi giây, rồi ba mươi giây trôi qua."

# (独白)
# JP: 続く言葉がないとゆったり確かめてから、\n真闇姉はくるりと僕を向く。
3087 = "Chờ cho đến khi chắc chắn rằng không còn lời nào được thốt ra nữa, \nchị Mayami mới khẽ xoay người lại phía tôi."

# 【真闇】
# JP: 「ゆーことらしか。\nどぎゃんすっとね？　双ちゃん」
2090 = "「Nó nói thế đấy. \nTính sao đây hả? Sou-chan」"

# 【双鉄】
# JP: 「どうもこうも」
2530 = "「Tính thế nào thì tính chứ」"

# (独白)
# JP: 日々姫が無理だといっていることを、\n覆すなど、僕には出来ない。
3126 = "Hibiki đã bảo là không thể, \nthì tôi làm sao có thể bắt em ấy thay đổi ý định được."

# (独白)
# JP: いや、出来たとしても無理強いなどはしたくない。\n結論などはハナから一つだ。
2701 = "Mà cho dù có thể, tôi cũng chẳng muốn ép buộc em ấy làm gì. \nKết luận ngay từ đầu vốn dĩ chỉ có một."

# 【双鉄】
# JP: 「僕の部屋など物置でも押入れでも構わない。\nああ、酒の倉庫は……できれば、勘弁して欲しいが」
2209 = "「Phòng của em là nhà kho hay tủ âm tường cũng được. \nÀ, còn kho rượu thì…… nếu có thể, xin hãy tha cho em」"

# 【真闇】
# JP: 「帝都でも、お酒つようならんかったと？」
2079 = "「Ở Đế Đô mà tửu lượng của em vẫn không khá lên được chút nào sao?」"

# 【双鉄】
# JP: 「飲まされはしたが、一向に。\nどうも[きゅうしゅう,1]九洲男児とは、体質からして異なるようだ」
2433 = "「Có bị ép uống thật, nhưng em vẫn không uống nổi. \nXem ra thể chất của em hoàn toàn khác hẳn với đàn ông vùng Kyushu rồi」"

# 【真闇】
# JP: 「なんね、つまらん。\nほんなら、[さかぐら,1]酒蔵まわりはよしとかんとねぇ」
1913 = "「Gì vậy nè, chán chết. \nThế thì, đành phải bỏ qua chuyện đi dạo quanh xưởng rượu thôi nhỉ」"

# (独白)
# JP: そうつぶやいて、真闇姉は長い指を一本一本折っていく。
3053 = "Vừa lẩm bẩm như thế, chị Mayami vừa cụp từng ngón tay dài lại."

# (独白)
# JP: そしてぽおんと、\nまた間の抜けた音をたてつつ、両手を鳴らす。
3035 = "Và rồi, vỗ hai bàn tay vào nhau \nphát ra một tiếng bép ngây ngô."

# 【真闇】
# JP: 「[じい,1]祖父様の部屋がよかったい」
1936 = "「Căn phòng của ông nội là tốt nhất đấy」"

# 【双鉄】
# JP: 「[たいと,1]汰斗さんの？」
2321 = "「Của ông Taito ạ?」"

# (独白)
# JP: 義祖父――汰斗さん――僕をこの家に引き取ってくれ、\n僕の生きる目的を定めてくれた、大恩人。
3218 = "Ông nội nuôi――ông Taito――đại ân nhân đã nhận nuôi tôi vào gia đình này, \nvà định hướng cho mục đích sống của tôi."

# (独白)
# JP: その方の部屋に？　とこぼしてしまった驚きを、\n真闇姉は申し訳無さそうな顔で受け止める。
3125 = "Đến phòng của người đó sao? Chị Mayami đón nhận sự ngạc nhiên mà tôi lỡ thốt lên bằng một khuôn mặt có chút áy náy."

# 【真闇】
# JP: 「開かずの部屋になっとるけん。\n空気は悪かろうもんけど、ホントの物置よりはマシとや」
2537 = "「Vì nó đang trở thành căn phòng không bao giờ mở mà. \nKhông khí tuy có lẽ sẽ hơi tệ, nhưng vẫn tốt hơn là một cái kho chứa đồ thực sự」"

# 【双鉄】
# JP: 「汰斗さんの部屋なら光栄だ。\nよければ、案内して欲しい」
2418 = "「Nếu là phòng của ông Taito thì em rất vinh hạnh. \nNếu được, mong chị dẫn đường cho em」"

# 【真闇】
# JP: 「そーね？　そんなら」
2256 = "「Vậy sao? Thế thì đi nào」"

# (独白)
# JP: 右田の家は、何代も続くクマ焼酎の蔵元だ。\n屋敷も庭もどこもかしこも、全てが古くとても広い。
2806 = "Nhà Migita là một chủ xưởng rượu Kuma-shochu đã qua nhiều thế hệ. \nCả dinh thự lẫn sân vườn, bất cứ nơi nào cũng đều cổ kính và vô cùng rộng lớn."

# (独白)
# JP: 引き取られ世話になっていた僕でも、\n足を踏み入れたことのない場所は、いくらでもある。
2779 = "Ngay cả một người được nhận nuôi và chăm sóc như tôi, \ncũng có vô số nơi chưa từng đặt chân tới."

# (独白)
# JP: （……真闇姉の部屋のさらに先――\n一番、奥まった部屋になるのか）
3220 = "（……Còn ở phía xa hơn cả phòng của chị Mayami―― \nĐó là căn phòng nằm sâu hoắm nhất sao）"

# (独白)
# JP: 長い廊下の突き当り。
3195 = "Nơi tận cùng của hành lang dài."

# (独白)
# JP: 重そうな錠をガチリと開き、\nごく無造作に、真闇姉は木の引き戸を開ける。
3057 = "Mở ổ khóa trông có vẻ nặng nề ra một tiếng cạch, \nchị Mayami mở cánh cửa lùa bằng gỗ một cách vô cùng tự nhiên."

# 【双鉄】
# JP: 「む――これは」
2485 = "「Hử―― cái này là...」"

# (独白)
# JP: 蒸し暑い。ひどく。\nそうして、物で埋め尽くされてる。
3202 = "Nóng nực và ẩm ướt. Một cảm giác vô cùng khó chịu. \nĐã thế, căn phòng còn chất đầy đồ đạc."

# 【真闇】
# JP: 「なんね、物置と変わらんばい。\n祖父様は、整理整頓せん人やったとやねぇ」
2359 = "「Gì thế này, chẳng khác nào cái nhà kho cả. \nÔng nội đúng là một người không biết sắp xếp ngăn nắp mà」"

# 【双鉄】
# JP: 「いや――」
2286 = "「Không hẳn thế đâu――」"

# (独白)
# JP: 荷物は山積み。だが、物置とはやはり違う。\n部屋に重なる物たちには、なにやら統一感がある。
3199 = "Hành lý chất cao như núi. Nhưng, nơi này rõ ràng khác với nhà kho. \nNhững món đồ xếp chồng lên nhau trong phòng dường như có một sự đồng điệu nào đó."

# (独白)
# JP: 家人全てが思い思いに詰め込んでいったガラクタには、\nこの雰囲気は到底出せないものだろう。
2839 = "Mớ ve chai mà mọi người trong nhà tùy ý nhét vào \nhoàn toàn không thể tạo ra bầu không khí như thế này được."

# 【双鉄】
# JP: 「時間をかけて整頓すれば、かなり面白くなりそうだ。\nとはいえ……ひとまずは荷物を下ろす場所を作らねばな」
2422 = "「Nếu dành thời gian dọn dẹp, nơi này chắc chắn sẽ trở nên rất thú vị đây. \nDù vậy... trước mắt phải tạo ra một khoảng trống để đặt hành lý xuống đã」"

# 【真闇】
# JP: 「確かに、こいじゃ窓も開けれんねぇ。\nああ、エアコンば手配せんとね」
2005 = "「Đúng thế thật, cứ thế này thì ngay cả cửa sổ cũng không mở được nữa. \nÀ, phải đặt mua cả máy điều hòa nữa nhỉ」"

# 【双鉄】
# JP: 「いや」
1888 = "「Không cần đâu」"

# 【真闇】
# JP: 「双ちゃんのためだけじゃなかとよ？\nこん部屋ば整えば、他にも使いようはあるけん」
2003 = "「Không phải chỉ vì Song-chan thôi đâu nhé? \nNếu dọn dẹp căn phòng này xong thì vẫn còn nhiều việc khác để dùng đến nó mà」"

# 【双鉄】
# JP: 「うむ」
1574 = "「Ừm」"

# (独白)
# JP: 完全に先回りされてしまった。
2715 = "Hoàn toàn bị đi trước một bước rồi."

# (独白)
# JP: さすがは、右田家の現当主――\n“クマの右田の女杜氏”だ。
2693 = "Quả không hổ danh là đương chủ hiện tại của nhà Migita―― \n“Nữ đầu bếp nấu rượu của nhà Migita vùng Kuma”."

# 【双鉄】
# JP: 「ならば、そのときのため、今は汗をかくとしよう」
2555 = "「Nếu vậy, vì mục tiêu đó, giờ chúng ta cứ đổ mồ hôi một chút đi nào」"

# (独白)
# JP: ともかく、廊下にものを出すか。
3091 = "Dù sao thì, cứ mang bớt đồ ra ngoài hành lang trước đã."

# (独白)
# JP: 方針を固め手を動かせば、途端、\n真闇姉が笑いを含んだ声を出す。
2913 = "Khi tôi đã định sẵn phương hướng và bắt đầu bắt tay vào việc, lập tức, \nchị Mayami cất tiếng cười xen lẫn chút châm chọc."

# 【真闇】
# JP: 「双ちゃん、片付けの手が足りんと？」
2103 = "「Sou-chan, thiếu người dọn dẹp phụ à?」"

# 【双鉄】
# JP: 「いや。　一人でも夜……\n明日の朝までにはなんとか出来るようには思う」
2324 = "「Không ạ. Cho dù có một mình thì trong đêm nay…… \nhoặc trễ nhất là trước sáng mai em nghĩ mình vẫn lo liệu được」"

# 【真闇】
# JP: 「ほーたら、手伝いはいらんと？」
2154 = "「Hửm, thế là không cần phụ giúp sao?」"

# 【双鉄】
# JP: 「いらんとまでは。\nいてくれれば助かることは間違いない」
1904 = "「Cũng không hẳn là không cần. \nNếu có chị ở đây giúp thì chắc chắn là tốt quá rồi」"

# (独白)
# JP: 瞬間、にやりといたずらな笑み。\nそして真闇姉は、ことさらな大声を張り上げる。
3062 = "Ngay lập tức, một nụ cười tinh nghịch thoáng qua. \nRồi chị Mayami cất giọng thật to cốt để người khác nghe thấy."

# 【真闇】
# JP: 「『ふーん、双ちゃんは片付けの手伝いを探しとるんねー、\n誰かおるかねぇ、双ちゃんの荷解き手伝ぉて』」
1569 = "「『Hơờ, Sou-chan đang tìm người dọn dẹp phụ nè—, \ncó ai ở đó không ta, vào đỡ đần một tay dỡ hành lý cho Sou-chan với』」"

# (独白)
# JP: （トトトトトト）
3237 = "（Bạch bạch bạch bạch bạch）"

# (独白)
# JP: 軽やかな音。
3155 = "Một âm thanh nhẹ nhàng vang lên."

# (独白)
# JP: 軽やかすぎて一瞬そうとは気づけ無かった、\nそれは階段を駆け下りる音。
3188 = "Vì quá nhẹ nhàng nên trong thoáng chốc tôi đã không kịp nhận ra, \nđó là tiếng bước chân đang lao nhanh xuống cầu thang."

# 【日々姫】
# JP: 「にぃにぃ、手伝おて欲しかと？」
2575 = "「Anh hai, anh muốn em phụ một tay không?」"

# (独白)
# JP: 手伝いの手はもちろん欲しいし、\n日々姫と妙にこじれることを望みもしない。
3036 = "Người giúp đỡ thì dĩ nhiên là tôi muốn rồi, \nvà tôi cũng chẳng dại gì mà muốn làm cho mối quan hệ với Hibiki trở nên gượng gạo một cách kỳ cục."

# 【双鉄】
# JP: 「手伝ってもらえれば助かる」
1949 = "「Nếu được em phụ giúp thì tốt quá」"

# (独白)
# JP: だからそこまで素直に言えば、\n出した言葉が、記憶をも引きずり出してくる。
3027 = "Chính vì vậy, khi tôi thật lòng nói ra câu đó, \nnhững lời vừa thốt ra lại kéo theo cả những ký ức ùa về."

# 【双鉄】
# JP: 「昔から日々姫は、こうしたセンスに優れているからな。\n居心地良い部屋に整えなおしてくれれば嬉しい」
2207 = "「Từ xưa đến nay Hibiki luôn có mắt thẩm mỹ tuyệt vời trong mấy chuyện này mà. \nNếu em có thể sắp xếp lại để căn phòng trở nên ấm cúng, thoải mái hơn thì anh vui lắm」"

# (独白)
# JP: 弾ける笑顔。\n胸が張られる。
2999 = "Nụ cười rạng rỡ. \nLồng ngực căng tràn tự hào."

# 【日々姫】
# JP: 「まかせんしゃ――ん、ん、ん。\n兄さん、わたしにお任せください」
2223 = "「Cứ giao cho――ưm, ưm, ừm. \nAnh hai, cứ giao phó việc này cho em」"

# (独白)
# JP: コホンと小さく咳払い。\nそして日々姫は、前のめりになってた姿勢を整える。
3154 = "Khẽ ho một tiếng nhỏ. \nRồi Hibiki chỉnh lại tư thế, thu người về từ dáng vẻ rướn tới trước ban nãy."

# 【日々姫】
# JP: 「わたしもいろいろあれから成長したんですから。\n兄さんのお部屋、素敵に仕上げてみせます」
2134 = "「Em cũng đã trưởng thành hơn nhiều kể từ hồi đó rồi mà. \nEm sẽ hoàn thiện căn phòng của anh hai thật tuyệt vời cho xem」"

# 【真闇】
# JP: 「ほんならね、うちは\x%l醸造蔵;#00ffc040;[じょうぞうぐら,2]醸造蔵%l;#;にもどるけん」
2444 = "「Vậy nhé, chị phải quay lại \\\\x%l醸造蔵;#00ffc040;nhà ủ rượu%l;#; đây」"

# (独白)
# JP: ひらり手を振り立ち去りかけて、\n真闇姉はまた手を打ち鳴らし、僕らへ一度振り返る。
3058 = "Vừa vẫy tay nhẹ nhàng vừa định bước đi, \nchị Mayami lại vỗ tay bộp một cái rồi ngoảnh đầu nhìn lại hai chúng tôi."

# 【真闇】
# JP: 「祖父様の部屋は[ふたま,1]二間続きになっとるけんねぇ。\nどっちも双ちゃんの好きにつこうてもろうてよかったい」
2346 = "「Phòng của ông nội có hai gian thông nhau đấy nhé. \nCả hai gian Soutetsu cứ tự nhiên sử dụng theo ý thích nha」"

# (独白)
# JP: 目の前に本。\n圧倒的な本の山。
3066 = "Trước mắt là sách. \nMột núi sách đồ sộ đến choáng ngợp."

# (独白)
# JP: とにかくこれを片付けなければ、足の踏み場にも苦労する。
3090 = "Dù sao thì nếu không dọn dẹp đống này trước, đến chỗ đặt chân cũng khó khăn."

# 【双鉄】
# JP: 「よ……っと。うむ。\n次はこれだな――日々姫、すまんが廊下に頼む」
2478 = "「Nào…… lên. Được rồi. \nTiếp theo là cuốn này――Hibiki, phiền em mang ra hành lang giúp anh」"

# 【日々姫】
# JP: 「はい……う――ん、\n本って、ほんとに重いですねぇ――ん」
2093 = "「Vâng…… ư――chà, \nSách đúng là nặng thật đấy ạ――ưm」"

# 【双鉄】
# JP: 「頑張れ頑張れ。\n成長したところを見せてくれるんだろう？」
1981 = "「Cố lên, cố lên. \nChẳng phải em bảo muốn cho anh thấy phần trưởng thành của mình sao?」"

# 【日々姫】
# JP: 「それは……まぁ……体力的にも――\nさすがに――成長……してますけど――んっ」
2518 = "「Chuyện đó…… thì…… về mặt thể lực―― \nquả thực――em có…… trưởng thành…… rồi mà――hự」"

# (独白)
# JP: “磨いたセンスを見せたいのに”と、\n口ではぼやいてみせつつやはり、日々姫は日々姫だ。
3200 = "Dù miệng càu nhàu “Rõ ràng mình muốn thể hiện gu thẩm mỹ đã được mài giũa cơ mà”, \nnhưng quả nhiên Hibiki vẫn cứ là Hibiki thôi."

# (独白)
# JP: こつこつ地道にひとつずつ、投げ出すことなく、\n僕から受けとる段ボールを、廊下に綺麗に詰み並べてく。
2825 = "Cần mẫn làm từng chút một mà không hề bỏ cuộc, \nem xếp những hộp carton nhận từ tay tôi thành từng chồng gọn gàng, đẹp đẽ dọc ngoài hành lang."

# 【双鉄】
# JP: 「よし――これで。\nうむ、どうやら畳が見えるようになったな」
2491 = "「Được rồi―― Thế này là. \nỪm, có vẻ như đã thấy được chiếu tatami rồi nhỉ」"

# 【日々姫】
# JP: 「ですね。なら次はこの[かざ]飾り[だんす,1]箪笥。それから押入れです。\n開けて不要品をどかせば、本をしまえるようになります」
2260 = "「Vâng ạ. Vậy tiếp theo là chiếc tủ trà này. Sau đó là tủ âm tường. \nMở ra rồi dọn dẹp hết đồ dùng không cần thiết đi là có thể cất sách vào được rồi ạ」"

# 【双鉄】
# JP: 「よし。ならばまずは――うおっ！」
2528 = "「Được. Vậy thì trước tiên là―― Ối kìa!」"

# 【日々姫】
# JP: 「な、なにしてるんですか、兄さんっ――\nこほっ！　けほっ！」
1951 = "「A, anh đang làm cái gì thế hả anh hai―― \nKhụ! Khụ!」"

# (独白)
# JP: ホコリが舞う、などという言葉は全く足りない。\nホコリが固まり“面”を構成するに至った――
1539 = "Bụi bay mù mịt, cụm từ ấy hoàn toàn không đủ để lột tả. \nBụi bặm đã đóng bánh lại thành từng \\\"mảng\\\" mất rồi――"

# (独白)
# JP: その“面”が飾り箪笥の上から垂れ込めて、\n僕と日々姫を頭からすっぽり飲み込んでいく。
3175 = "Cái \\\"mảng\\\" ấy từ trên chiếc tủ trà ụp xuống, \nnuốt chửng cả tôi lẫn Hibiki từ đầu đến chân."

# 【双鉄】
# JP: 「これは――これは、たまらんっ！」
2486 = "「Cái này―― Cái này, không chịu nổi mất!」"

# 【日々姫】
# JP: 「ハタキです！　\nハタキを使って、ひとまずホコリを散らしましょう！」
2219 = "「Chổi phất trần đây ạ! \nDùng chổi phất trần để tạm thời xua bớt bụi đi đã anh!」"

# (独白)
# JP: 目も開けられぬが気配は感じる。
3068 = "Dù mắt không mở ra nổi nhưng tôi vẫn cảm nhận được sự hiện diện."

# (独白)
# JP: 日々姫はなにやらじたばたと、\nかなり大きく動いて空気をかき乱――
2982 = "Hibiki đang loay hoay làm gì đó, \nđộng tác khá mạnh bạo xé toạc không khí――"

# (独白)
# JP: （ガシャンっ！！！！！！！）
3247 = "（Xoảngっ！！！！！！！）"

# 【日々姫】
# JP: 「きゃあああっ！？」
2017 = "「Áaaaaっ！？」"

# 【双鉄】
# JP: 「日々姫っ！？　――っと」
2239 = "「Hibikiっ！？―― Khoan đã」"

# (独白)
# JP: ――美しい――\nその言葉だけが、目から脳へと突き抜けていく。
2822 = "――Đẹp quá―― \nChỉ duy nhất từ ngữ ấy là lao thẳng từ đôi mắt lên đến đại não."

# 【日々姫】
# JP: 「どぎゃんして……\nどぎゃんして、じぃじの部屋にお[にんぎょ,1]人形なんて」
2332 = "「Sao lại…… \nSao lại có búp bê ở trong phòng của ông nội thế này」"

# 【双鉄】
# JP: 「ああ」
2054 = "「Ừ...」"

# (独白)
# JP: 泣きそうな声。\nやるべきことを、それでどうにか思い出す。
3186 = "Một giọng nói như chực khóc. \nNhờ vậy, tôi mới cố nhớ lại những việc mình cần phải làm."

# 【双鉄】
# JP: 「日々姫、無事か？　怪我はないか？」
2244 = "「Hibiki, em có sao không? Có bị thương ở đâu không?」"

# (独白)
# JP: 両手を両手でつかみ、ながめる。\n手から腕には、どうやら傷などない様子だが――
2924 = "Tôi nắm lấy đôi bàn tay em bằng cả hai tay mình rồi quan sát. \nTừ bàn tay lên đến cánh tay, có vẻ như không có vết thương nào cả, nhưng――"

# 【日々姫】
# JP: 「ひゃうっ！？　ひゃ、あっ――平気！　平気ったい！\nあ！　その、無事です、怪我はありません」
2018 = "「Hyaụ!? Hya, a――Em bình thường! Không sao đâu ạ! \nA! K-Khoan đã, em vô sự, em không bị thương đâu ạ」"

