2077 = "「Ngày xưa anh có anh em sinh đôi mà. Nên không biết từ lúc nào, sở thích cũng trở nên giống nhau.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2050 = "「A——」"
# 【双鉄】
# display as 雙鐵
