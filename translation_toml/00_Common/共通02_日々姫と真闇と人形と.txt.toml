2287 = "「Thì đúng là vậy——nhưng con búp bê trông y hệt con người mà. Nên em mới thấy có hơi, mờ ám một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。寝入っている女性の服をはだけているなら、\nいかがわしいにもほどがある。が――」
1986 = "「Ra là vậy. Nếu là vạch áo của một người phụ nữ đang ngủ, thì đúng là mờ ám hết sức. Nhưng——」"
