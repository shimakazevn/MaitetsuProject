# 【双鉄】
# JP: 「それは――そうかと思います。\n[とう,1]義父さんは、帝都でも僕によくしてくださいまして」
2563 = "「Chuyện đó―― em nghĩ cũng phải ạ. \n Cha nuôi ở Đế đô cũng đối xử với em rất tốt」"

# 【真闇】
# JP: 「他人行儀は好かんよ？　\n右田の人間言うなら、\x%l杜氏;#00ffc040;[とうじ,1]杜氏%l;#;の言うことば聞かんと」
1947 = "「Chị không thích kiểu khách sáo thế đâu nhé? \n Đã là người nhà Migita thì phải nghe lời của %l杜氏;#00ffc040;Đỗ thị%l;#; chứ」"

