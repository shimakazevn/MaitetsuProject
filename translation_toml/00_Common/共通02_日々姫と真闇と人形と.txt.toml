2041 = "「Chẳng thay đổi chút nào chính là anh hai đấy chứ. \nKiểu như 『Việc chưa làm được thì cứ làm cho bằng được mới thôi』 ấy――」"

# (独白)
# JP: 日々姫はなおも笑いつづける。\nクスクスくすくす――楽しげに。
2994 = "Hibiki vẫn tiếp tục cười không ngớt. \nKhúc khích khúc khích――trông thật vui vẻ."

# 【日々姫】
# JP: 「全く変わっていないとは夢にも思いませんでした。\nお勉強にお仕事に、さぞご苦労をされたでしょうに」
1955 = "「Em nằm mơ cũng không nghĩ là anh lại chẳng thay đổi chút nào đấy. \nVừa học vừa làm, chắc là anh đã vất vả lắm nhỉ」"

# 【双鉄】
# JP: 「変わらんか？　僕は」
2188 = "「Không thay đổi sao? Anh ấy à」"

