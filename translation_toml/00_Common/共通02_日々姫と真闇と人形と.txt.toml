2351 = "「Em làm hậu bối của anh sao. Nếu được thế thì tuyệt vời biết mấy \n... nhưng với học lực hiện tại của em thì hoàn toàn không thể nào」"

# 【双鉄】
# JP: 「ならば成績をあげればいい」
2539 = "「Vậy thì cứ đạt thành tích tốt là được chứ gì」"

# 【日々姫】
# JP: 「あはっ」
2036 = "「A ha」"

# (独白)
# JP: 今日、はじめての日々姫の笑顔。\n余計な感情の混じらぬ笑顔。
3177 = "Hôm nay, lần đầu tiên được thấy nụ cười của Hibiki. \nMột nụ cười thuần khiết không chút gợn lòng."

# 【双鉄】
# JP: 「その笑顔は変わっていないな。\n良いことだ」
1939 = "「Nụ cười đó chẳng thay đổi gì cả. \nTốt lắm」"

