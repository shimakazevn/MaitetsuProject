2903 = "「Tự tiện cởi áo của thiếu nữ, rồi còn gọi là búp bê này nọ để trêu cợt. Đã thế, còn né tránh cơn thịnh nộ của người ta rồi cười nhạo nữa chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「物にも二種類があることを、僕は確かに知っている。\nお前にはナビと同様――本物の知性があるのだな？」
2193 = "「Xin lỗi. Tôi đã hiểu lầm tai hại.」"
# 【ハチロク】
# display as ？？？
# JP: 「そのナビ様がどこのどなたかは存じませぬが――\nわたくしに知性があることは確かです」
2581 = "Tôi cúi đầu. Cúi thật sâu, thật sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばお前は、意志をもち誇りを持つものだ。\nそうして僕は、愚かにもそれを傷つけた」
2550 = "「Tôi quả thực biết rằng đồ vật cũng có hai loại. Cô cũng giống như Navi——sở hữu trí tuệ thực sự nhỉ?」"
# monologue
# JP: ナビは頑なに否定する。\nが、ナビには意志も誇りもある。
3251 = "「Tuy tôi không biết ngài Navi đó là vị nào ở đâu—— Nhưng việc tôi có trí tuệ là sự thật.」"
# monologue
# JP: そう信じ、それに救われてさえいる僕が、\n物の持つ意志を、誇りを――否定するなどしてはならない。
2846 = "「Nếu vậy, cô là một thực thể có ý chí và lòng kiêu hãnh. Và tôi đã ngu ngốc làm tổn thương điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は自分が間違っていたことを全面的に謝罪する。\nもし可能なら、やりなおさせて欲しいとも願う」
2170 = "Navi luôn ngoan cố phủ nhận. Nhưng, Navi cũng có ý chí và lòng kiêu hãnh."
# 【ハチロク】
# display as ？？？
# JP: 「やりなおす――何を、でしょうか？」
2564 = "Là một người tin vào điều đó, và thậm chí còn được cứu rỗi bởi điều đó, tôi tuyệt đối không được phủ nhận ý chí, lòng kiêu hãnh——mà đồ vật sở hữu."
# 【双鉄】
# display as 雙鐵
# JP: 「最初から……そうだな、お前……君の怒りを、\n僕が躱してしまった過ち、そこからを」
2133 = "「Tôi thành thật xin lỗi vì những sai lầm của mình. Nếu có thể, tôi mong cô cho phép tôi được làm lại.」"
# 【ハチロク】
# display as ？？？
# JP: 「そうですか。でしたら、頬を下げてください」
2490 = "「Từ lúc đầu......Phải rồi, sai lầm khi tôi né tránh cơn thịnh nộ của cô......bắt đầu từ đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2065 = "「嗯」" 
# monologue
# JP: 言われるままに顔を下げれば、\n目と目が、至近距離からぶつかる。
2910 = "「Vậy sao. Nếu vậy, xin hãy hạ má xuống.」"
# monologue
# JP: （ああ……美しいのは顔のつくりだけでは無いのか）
3241 = "Làm theo lời cô ấy hạ mặt xuống, ánh mắt chúng tôi chạm nhau ở cự ly cực gần."
# monologue
# JP: 意志をもつものだけが放ち得る、強い輝き。
2790 = "（A......vẻ đẹp không chỉ nằm ở cấu tạo khuôn mặt sao）"
# monologue
# JP: 最初からこれを認めていれば、\n“人形”として扱うなどと、できようもなかった。
2836 = "Ánh sáng rực rỡ mãnh liệt, thứ chỉ có những thực thể mang ý chí mới có thể tỏa ra."
# monologue
# JP: （パンっ！）
3242 = "Nếu ngay từ đầu tôi nhận ra điều này, thì đã không đối xử với cô ấy như một \"con búp bê\"."
# monologue
# JP: 大きな音。小さな痛み。
3211 = "（Bốp!）"
# monologue
# JP: 真っ赤になった手を抑え、\n意志もつ物はわずかに頷き、そしてふふふと笑いをこぼす。
2937 = "Âm thanh lớn. Cơn đau nhỏ."
# 【ハチロク】
# display as ？？？
# JP: 「奇妙な方ですね、あなたは。\n奇妙ですが、どうやら話は通じそうです」
2150 = "Ôm lấy bàn tay đỏ ửng, thực thể mang ý chí ấy khẽ gật đầu, rồi bật cười khúc khích."
# monologue
# JP: コホン、と控えめな咳払い。\n日々姫がすっと近づいてきて、小さな耳へと唇を寄せる。
3156 = "「Anh thật kỳ lạ. Kỳ lạ, nhưng có vẻ là người hiểu chuyện.」"
# 【日々姫】
# display as 日日姬
# JP: 「あの……あなた――服、整えなおした方がよかばい」
2514 = "E hèm, một tiếng hắng giọng nhè nhẹ. Hibiki tiến lại gần, ghé môi vào đôi tai nhỏ bé ấy."
# 【ハチロク】
# display as ？？？
# JP: 「左様ですね。ご助言、ありがとうございます。\n――すみませんが、後ろを向いていていただけますか？」
2443 = "「Này......cô――tốt nhất là nên chỉnh đốn lại quần áo đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2352 = "「Đúng vậy nhỉ. Cảm ơn cô đã nhắc nhở. ——Xin lỗi, anh có thể quay lưng lại được không?」"
# monologue
# JP: シュ、シュと小気味良い衣擦れの音。
3119 = "「Tất nhiên rồi.」"
# monologue
# JP: もたもた着替えた路子のことが思い出されて、\n“着慣れているな”と、そんな言葉が浮き上がってくる。
2896 = "Tiếng sột soạt vui tai của quần áo cọ xát vào nhau."
# 【ハチロク】
# display as ？？？
# JP: 「すみません。お待たせいたしました」
2212 = "Nhớ lại bộ dạng lóng ngóng thay đồ của Michiko, những từ như \"quen mặc quá nhỉ\" chợt nảy ra trong đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、待ったというほど――おお」
2325 = "「Xin lỗi. Đã để anh phải đợi.」"
# 【日々姫】
# display as 日日姬
# JP: 「わぁ！　似合う～～　綺麗～～」
2027 = "「Không, cũng không tới mức chờ đợi lâu――Ồ.」"
# 【ハチロク】
# display as ？？？
# JP: 「左様でしょうね。\nそのように、わたくしは作られておりますから」
2544 = "「Oa! Hợp quá~~ Đẹp quá~~」"
# monologue
# JP: （ピっ）
3239 = "「Đúng vậy nhỉ. Bởi vì tôi được tạo ra như thế mà.」"
# monologue
# JP: 整った服で見事な敬礼。
2942 = "（Bíp!）"
# monologue
# JP: 見よう見まねで答礼すれば、日々姫も慌てて僕に倣う。
2936 = "Chào theo đúng nghi thức trong bộ trang phục chỉnh tề."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは\\x%l帝鉄;#00ffc040;帝鉄%l;#;[ハチロクニイマル,3]8620形\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、トップナンバー・\n\\x%l8620;#00ffc040;8620%l;#;号専用レイルロオド、ハチロクと申します」
2182 = "Thấy tôi bắt chước chào đáp lễ, Hibiki cũng vội vàng làm theo."
# 【日々姫】
# display as 日日姬
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;っ！？」
1560 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; \\x%l帝鉄;#00ffc040;Teitetsu%l;#; dòng 8620, số hiệu đầu tiên \\x%l8620;#00ffc040;8620%l;#;, tên là Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2037 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2234 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; á!?」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2591 = "「！」" 
# monologue
# JP: 日々姫の気持ちはよくわかる。\nだが、坊主と袈裟とは別物だ。
2894 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; á!?」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であろうとも、目の前にいるこの\n“ハチロク”と、今はまっすぐ向き合うべきだ。
2696 = "「Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「丁寧なご挨拶いたみいる。僕は双鉄。\n右田双鉄という学生――休学したての学生だ」
1942 = "「!」"
# 【日々姫】
# display as 日日姬
# JP: 「わ、わたしは右田日々姫。\n[おひとよ,2]御一夜の学園の学園生です」
2201 = "Tôi rất hiểu cảm giác của Hibiki. Nhưng nhà sư và chiếc áo cà sa là hai thứ khác nhau."
# 【ハチロク】
# display as 八六
# JP: 「[おひとよ,2]御一夜……右田」
2135 = "Dù có là \\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa, thì bây giờ tôi cũng phải đối diện thẳng thắn với \"Hachiroku\" đang đứng trước mặt này."
# monologue
# JP: 人間とまったく変わらぬ動きで、\n考えこむように、ハチロクがその短い指を口元にあてる。
2744 = "「Cảm ơn lời chào trang trọng của cô. Tôi là Soutetsu. Một sinh viên tên Migita Soutetsu——vừa mới bảo lưu kết quả học tập.」"
# 【ハチロク】
# display as 八六
# JP: 「思い出しました。右田[たいと,1]汰斗様はどちらですか？」
2171 = "「T-Tôi là Migita Hibiki. Là học sinh của trường học Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「じぃじ――んんっ、お祖父様は……その」
2344 = "「Ohimitera......Migita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なくなった、とうの昔に」
2128 = "Với cử chỉ không khác gì con người, Hachiroku đưa những ngón tay ngắn ngủn lên miệng vẻ trầm ngâm."
# 【ハチロク】
# display as 八六
# JP: 「そうでしたか。随分と長いこと……\nわたくしは眠ってしまっていたようですね」
2488 = "「Tôi nhớ ra rồi. Xin hỏi ngài Migita Taito đang ở đâu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクさんは」
1972 = "「Ông nội——ưm, ông nội thì......cái đó.」"
# 【ハチロク】
# display as 八六
# JP: 「呼び捨てで結構ですよ？　双鉄様」
1890 = "「Ông ấy mất rồi, từ lâu lắm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばそうしよう。ハチロクはここ、右田汰斗の部屋の、\nその飾り箪笥で、ガラスケースの中にしまわれていた」
2533 = "「Vậy sao. Có vẻ như tôi đã ngủ quên...... một thời gian khá dài rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ガラスケース……そう、ですか」
2350 = "「Hachiroku này.」"
# monologue
# JP: ゾっとするような冷たい微笑。
2734 = "「Cứ gọi trống không cũng được ạ, ngài Soutetsu.」"
# monologue
# JP: 知恵を超え、感情を超え――\n“人間らしさ"を人間以上に感じるほどの。
3179 = "「Vậy thì tôi sẽ làm thế. Hachiroku được cất giữ trong tủ trang trí kia, bên trong một lồng kính ở căn phòng này, phòng của Migita Taito.」"
# 【ハチロク】
# display as 八六
# JP: 「……うまく思い出せませんが、わたくしは……\n汰斗様のご期待を、大きく裏切ってしまったようですね」
2582 = "「Lồng kính......Vậy, sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんの期待？」
2322 = "Một nụ cười lạnh lẽo đến sởn gai ốc."
# 【ハチロク】
# display as 八六
# JP: 「ええ。……あの、失礼ながらお伺いいたしますが、\n双鉄様は、汰斗様のご相続人でいらっしゃいますか？」
2268 = "Vượt lên trên trí tuệ, vượt lên trên cảm xúc—— Thứ \"nhân tính\" mạnh mẽ đến mức khiến người ta cảm thấy nó còn hơn cả con người."
# 【日々姫】
# display as 日日姬
# JP: 「そうたい！」
2274 = "「......Dù không thể nhớ rõ, nhưng có vẻ như tôi...... đã phụ sự kỳ vọng của ngài Taito rất nhiều thì phải.」"
# monologue
# JP: 微妙に思えた質問に、\n僕より先に日々姫が答える。
3207 = "「Sự kỳ vọng của ông Taito?」"
# monologue
# JP: 気持ちは嬉しい。\nだが、こうしたことはより正確を期すべきだ。
3106 = "「Vâng. ......À, xin thứ lỗi cho tôi được hỏi, ngài Soutetsu có phải là người thừa kế của ngài Taito không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も相続人のはしくれではある。が、一番の相続人。\n右田家の現当主ということであれば、真闇姉だ」
2163 = "「Đúng vậy!」"
# 【ハチロク】
# display as 八六
# JP: 「マクラネエ――様でございますか？」
2374 = "Trước một câu hỏi có vẻ tế nhị, Hibiki đã nhanh nhảu đáp thay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。真なる闇とかいて“まくら”と読む」
2278 = "Dù rất vui vì tấm lòng của em ấy. Nhưng những chuyện thế này cần phải chính xác hơn."
# 【ハチロク】
# display as 八六
# JP: 「素敵なお名前。長いトンネルを思わせますね」
2130 = "「Tôi cũng là một trong những người thừa kế. Nhưng người thừa kế chính. Đương gia hiện tại của nhà Migita, là chị Mayami.」"
# monologue
# JP: 言って、ハチロクはハっとした顔で\n僕を、日々姫を順々に見る。
3140 = "「Ngài——Mayaminee sao ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、真闇様はきっと“\\x%l枕木;#00ffc040;枕木%l;#;”のまくらですね。\n双鉄様は、その上に敷かれる双鉄、レール」
1884 = "「Ừm. Viết là 'Chân Ám', đọc là \"Mayami\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
# 2264 = "「是嗎？」" 
# 【ハチロク】
# display as 八六
# JP: 「そして、日々姫様はレールと\\x%l列車;#00ffc040;列車%l;#;とのたてる響き。\n汰斗様は、お孫様達に素敵なお名前をつけられましたね」
2339 = "「Một cái tên thật đẹp. Gợi liên tưởng đến một đường hầm dài dằng dặc nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうならよかったのだが、僕は」
2162 = "Nói rồi, Hachiroku bỗng giật mình lần lượt nhìn tôi, rồi nhìn sang Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「わたし、ねぇねぇ呼んでくるばいっ！」
2166 = "「Không, ngài Mayami chắc chắn là chữ 'Makura' trong \"\\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;\". Ngài Soutetsu là cặp đường ray bằng sắt (Song Thiết) trải trên đó.」"
# monologue
# JP: 逃げ出すように、日々姫が酒蔵へとすっ飛んでいく。\nいや、実際に逃げ出したのか。
2976 = "「Ồ?」"
# monologue
# JP: 日々姫は、僕が養子だという話をひどく嫌う。\n知ってはいたが、ついハチロクにつられてしまった。
3000 = "「Còn ngài Hibiki là âm vang giữa đường ray và \\x%l列車;#00ffc040;đoàn tàu%l;#;. Ngài Taito đã đặt cho các cháu những cái tên thật tuyệt vời.」"
# 【ハチロク】
# display as 八六
# JP: 「軽やかですね、日々姫さまの足音は」
2131 = "「Nếu được vậy thì tốt, nhưng tôi thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ああ見えて文武両道だ。\nそのうえ、たいそう絵がうまい」
2258 = "「Em, đi gọi chị Mayami đây!」"
# 【ハチロク】
# display as 八六
# JP: 「それは素敵です」
2526 = "Hibiki phóng vụt về phía xưởng ủ rượu như thể chạy trốn. À không, thực ra là em ấy đang chạy trốn thật."
# 【双鉄】
# display as 雙鐵
# JP: 「だろう。ハチロクもその美しさだ。\n少し慣れれば、きっと日々姫が描きたがると思うぞ？」
2100 = "Hibiki rất ghét nghe chuyện tôi là con nuôi. Tôi biết điều đó, nhưng lại vô tình bị cuốn theo lời của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「それはそれは、とても光栄に存じます」
2523 = "「Bước chân của ngài Hibiki nhẹ nhàng thật đấy.」"
# 【真闇】
# display as 真闇
# JP: 「はいはい、なんねなんね」
1952 = "「Đúng vậy. Trông thế thôi chứ em ấy văn võ song toàn đấy. Hơn nữa, còn vẽ rất đẹp.」"
# monologue
# JP: 真闇姉がおっとりゆったりやってくる。
3055 = "「Thật tuyệt vời.」"
# monologue
# JP: その後ろに、日々姫。\n真闇姉の体を盾にしているように、隠れてる。
2980 = "「Phải không. Hachiroku cũng xinh đẹp thế này mà. Khi quen thân hơn một chút, chắc chắn Hibiki sẽ muốn vẽ cô cho xem.」"
# 【真闇】
# display as 真闇
# JP: 「おやまぁ、この子が。\nはじめまして、ハチロクさん」
2033 = "「Chà chà, tôi thấy vô cùng vinh hạnh.」"
# 【ハチロク】
# display as 八六
# JP: 「はじめまして、真闇様。\nわたくしのことは、どうぞハチロクとお呼びください」
1974 = "「Có mặt, chuyện gì chuyện gì đây.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ハチロクちゃんね。\nウチんことも真闇でよかたい」
2558 = "Chị Mayami từ tốn thong thả bước tới."
# 【ハチロク】
# display as 八六
# JP: 「お気持ちだけ頂戴します、真闇様。\nそこは、人と物との[ぶん]分とわきまえておりますので」
2147 = "Phía sau chị là Hibiki. Em ấy nấp sau lưng chị Mayami như thể dùng chị làm lá chắn."
# 【真闇】
# display as 真闇
# JP: 「おやまぁ、これは随分と」
2035 = "「Ái chà, là cô bé này sao. Rất vui được gặp, cô Hachiroku.」"
# monologue
# JP: そこで言葉を切ってしまって、ちらりと真闇姉が僕を見る。
3139 = "「Rất vui được gặp ngài, ngài Mayami. Xin cứ gọi tôi là Hachiroku.」"
# 【真闇】
# display as 真闇
# JP: 「そんで？　ハチロクちゃんは何のご用と？」
2557 = "「Vậy thì gọi là Hachiroku-chan nhé. Cứ gọi chị là Mayami là được rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。実は――」
2276 = "「Tôi xin nhận tấm lòng của ngài, ngài Mayami. Nhưng tôi vẫn luôn ý thức rõ ranh giới giữa con người và đồ vật ạ.」"
# monologue
# JP: ……ハチロクの言葉は装飾的だが、無駄がない。\n聞けばすぐ、話の要点を理解出来る。
1546 = "「Ái chà, cô bé này khách sáo quá.」"
# 【真闇】
# display as 真闇
# JP: 「ほんならハチロクちゃんは、\n身の振り方をうちに決めてほしかと？」
2551 = "Ngừng lời ở đó, chị Mayami liếc nhìn tôi."
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは汰斗様に買い取られた物ですので。\n筆頭相続人たる真闇様が今の[オーナー,2]所有者であるかと」
2270 = "「Vậy sao? Hachiroku-chan tìm chị có việc gì nào?」"
# 【真闇】
# display as 真闇
# JP: 「そらぁ違ごとるね、ハチロクちゃん」
2521 = "「Vâng. Thực ra là——」"
# monologue
# JP: パチ、とハチロクがまばたきする。
2746 = "......Lời nói của Hachiroku tuy có chút hoa mỹ, nhưng không hề thừa thãi. Chỉ cần nghe qua là có thể hiểu ngay trọng tâm câu chuyện."
# 【ハチロク】
# display as 八六
# JP: 「なにが、でございますか？」
2448 = "「Vậy ý Hachiroku-chan là, muốn chị quyết định nơi chốn cho em sao?」"
# 【真闇】
# display as 真闇
# JP: 「祖父様の部屋とその所有物は、全部双ちゃんが相続人たい。\nじゃっけん、ハチロクちゃんのオーナーは」
2345 = "「Vâng. Tôi là món đồ được ngài Taito mua lại. Nên tôi nghĩ người thừa kế chính là ngài Mayami sẽ là chủ sở hữu hiện tại ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「了解しました。\n……双鉄様が、わたくしの現オーナーなのですね」
2180 = "「Chỗ đó thì sai rồi nha, Hachiroku-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうらしいな」
2089 = "Hachiroku chớp chớp mắt."
# monologue
# JP: それが真闇姉の決定ならば、僕に異論のあるはずもない。\n与えられた義務ならもちろん、ただ全力で果たすのみだ。
2844 = "「Sai ở đâu cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「身の処し方と言っていたが――\nハチロクに、なにか希望はあるのか？」
2224 = "「Phòng của ông nội và các vật dụng trong đó, tất cả đều do Sou-chan thừa kế. Thế nên, chủ sở hữu của Hachiroku-chan là...」"
# 【ハチロク】
# display as 八六
# JP: 「希望……ですか？　わたくしの？」
2152 = "「Tôi hiểu rồi. ......Ngài Soutetsu chính là chủ sở hữu hiện tại của tôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「他の者の希望を聞いても仕方あるまい。\n知性があるなら、無論、希望もわくだろう」
1969 = "「Có vẻ là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
2515 = "Nếu đó là quyết định của chị Mayami thì tôi cũng chẳng có lý do gì để phản đối. Nếu đã là nghĩa vụ được giao, tôi chỉ biết dốc toàn lực hoàn thành thôi."
# monologue
# JP: 戸惑っている。\nそうとしか見えない。
3041 = "「Cô vừa nhắc đến nơi chốn—— Hachiroku có nguyện vọng gì không?」"
# 【ハチロク】
# display as 八六
# JP: 「少し……しばらくお待ちください。\nそのようなこと……初めて問われましたので――」
2407 = "「Nguyện vọng......sao ạ? Của tôi?」"
# monologue
# JP: 俯き。沈黙。\nやがてその顔がわずかに上がり、唇が静かに開かれ――
2733 = "「Nghe nguyện vọng của người khác thì có ích gì. Nếu có trí tuệ, hẳn nhiên cũng sẽ có nguyện vọng chứ.」"
# monologue
# JP: （く～～～っ）
3236 = "Bối rối. Chỉ có thể thấy vậy thôi."
# 【真闇】
# display as 真闇
# JP: 「あら」
2031 = "「Xin hãy......chờ một chút. Những chuyện thế này......đây là lần đầu tiên tôi được hỏi——」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇっ！　あらとか言うたらかわいそーばいっ！」
2580 = "Cúi gằm mặt. Im lặng. Một lúc sau, khuôn mặt ấy hơi ngẩng lên, đôi môi lặng lẽ hé mở——"
# 【ハチロク】
# display as 八六
# JP: 「//////」
2592 = "（Rột~~~）"
# monologue
# JP: 日々姫の善意の追い打ちに、\nハチロクはうつむき赤くなる。
2857 = "「Ối chà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぜんまいでは足りんのか？」
1967 = "「Chị Mayami! Kêu ối chà như thế tội nghiệp người ta lắm!」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2271 = "「//////」"
# monologue
# JP: 単刀直入にそう尋ねれば、\nほっとしたような目が僕を向く。
2888 = "Bị đòn bồi thiện ý của Hibiki giáng xuống, Hachiroku cúi gằm mặt, đỏ bừng."
# 【ハチロク】
# display as 八六
# JP: 「あれは……単なる非常動力ですので」
2516 = "「Dây cót không đủ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「非常ではない動力源は？」
2556 = "「Vâng.」"
# 【ハチロク】
# display as 八六
# JP: 「蒸気です。\nですから、水と石炭をもしいただければ」
2281 = "Nghe tôi hỏi thẳng thừng như vậy, đôi mắt như trút được gánh nặng hướng về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。水なら」
2489 = "「Đó chỉ là......động lực khẩn cấp đơn thuần thôi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃにぃ！　わたし行くけんっ！」
2061 = "「Thế nguồn động lực không khẩn cấp là gì?」"
# monologue
# JP: 恥をかかせた汚名返上。\n気持ちを体全部で示し、日々姫がまた走って、戻る。
2871 = "「Là hơi nước ạ. Thế nên, nếu có thể cho tôi xin chút nước và than đá thì...」"
# 【日々姫】
# display as 日日姬
# JP: 「これ、お酒づくりに使う上等な水たい」
2481 = "「Vậy sao. Nếu là nước thì...」"
# 【ハチロク】
# display as 八六
# JP: 「澄み切っていますね。頂戴します」
2356 = "「A, anh hai! Để em đi lấy cho!」"
# monologue
# JP: 小さなコップを両手いっぱい持ちながら、\nこくこくこくと、ハチロクは喉を鳴らす。
2829 = "Rửa sạch nỗi nhục nhã vừa rồi. Thể hiện quyết tâm bằng toàn bộ cơ thể, Hibiki lại chạy đi, rồi quay lại."
# 【ハチロク】
# display as 八六
# JP: 「ふぅ」
2030 = "「Đây là loại nước hảo hạng dùng để ủ rượu đó.」"
# monologue
# JP: 見る間にコップが空になる。\n真闇姉の目が細くなる。
2691 = "「Nước trong vắt nhỉ. Tôi xin phép.」"
# 【真闇】
# display as 真闇
# JP: 「よか飲みっぷりたい！\n今度、飲みっくらせん？」
2368 = "Hai tay ôm trọn chiếc cốc nhỏ, Hachiroku ực ực uống cạn."
# 【ハチロク】
# display as 八六
# JP: 「真水でよければ、よろこんで。\nアルコールは異常燃焼の原因となってしまいますので」
2000 = "「Phù.」"
# 【真闇】
# display as 真闇
# JP: 「真水ば、うちがよー飲まん」
2025 = "Chớp mắt chiếc cốc đã cạn sạch. Chị Mayami nheo mắt lại."
# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
2070 = "「Uống sảng khoái ghê! Hôm nào tụi mình nhậu một bữa thi xem ai hơn không?」"
# monologue
# JP: 機嫌良さそうな微笑み。
2834 = "「Nếu là nước lọc thì tôi rất sẵn lòng. Cồn sẽ là nguyên nhân gây cháy bất thường đấy ạ.」"
# monologue
# JP: 自分の飲みくちをハンカチでぬぐい、\nハチロクは日々姫にコップを返す。
2748 = "「Nước lọc thì chị không uống được nhiều đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「大変に上等なお水でした。\nお酒づくりとおっしゃってましたが」
2355 = "「Fufu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2051 = "Một nụ cười đầy vẻ thích thú."
# monologue
# JP: 日々姫の視線がそっぽを向く。\nコップの水は、お酒造りに――クマ焼酎に使う水。
2989 = "Dùng khăn tay lau miệng cốc của mình, Hachiroku trả lại chiếc cốc cho Hibiki."
# monologue
# JP: クマ川の源流の話をすれば、なるほど、\nさっきのいさかいの蒸し返しになりかねない。
2782 = "「Một loại nước vô cùng hảo hạng. Cô vừa nói là dùng để ủ rượu nhỉ...」"
# 【双鉄】
# display as 雙鐵
# JP: 「水が満ちたなら次は石炭だな。\n真闇姉、この家に石炭は？」
2313 = "「A......」"
# 【真闇】
# display as 真闇
# JP: 「うちにも石炭ボイラがあるにはあるばってん、\nもう長いこと使ことらんけんねぇ」
2097 = "Hibiki ngoảnh mặt đi chỗ khác. Nước trong cốc là nước dùng để ủ rượu——ủ rượu shochu Kuma."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、近所に石炭を売っている店などは？」
2561 = "Nếu nhắc đến thượng nguồn sông Kuma thì quả thật, rất có thể sẽ khơi mào lại cuộc cãi vã lúc nãy."
# 【日々姫】
# display as 日日姬
# JP: 「なか……んっ、無いと思います、兄さん。\nですが、ひょっとすると[じゅつせんどう,2]術仙洞に」
2323 = "「Nước đủ rồi thì tiếp theo là than đá nhỉ. Chị Mayami, nhà mình có than đá không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、あそこは廃炭鉱だったな――っと」
1988 = "「Nhà mình thì cũng có nồi hơi chạy bằng than đá đấy, nhưng lâu lắm rồi không dùng đến nữa.」"
# monologue
# JP: ハチロクを無造作につかもうとして、\n危ういところで、さっきの失敗を思い出す。
3018 = "「Vậy quanh đây có cửa hàng nào bán than đá không?」"
# monologue
# JP: 乙女――だと、この知性ある物は言っていた。\nならば乙女に対するように、僕もふるまうべきであろう。
3174 = "「Khô......ưm, em nghĩ là không có đâu, anh trai. Nhưng mà, biết đâu ở hang Jutsusen lại có.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこへ案内したいのだが。\nハチロク、僕はどのように君をエスコートすれば良いか」
2536 = "「Ra là vậy, chỗ đó từng là mỏ than bỏ hoang mà nhỉ——suýt nữa thì.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、そんな――\nそこまでのことをしていただくわけには」
1898 = "Vừa định tiện tay tóm lấy Hachiroku, thì may thay tôi sực nhớ lại thất bại lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「行くさ。僕は君のオーナーとなったのだからな。\n君を大切に扱う義務がある」
2435 = "Thiếu nữ——thực thể mang trí tuệ này đã nói vậy. Thế thì tôi cũng nên cư xử với cô ấy như với một thiếu nữ mới phải."
# 【ハチロク】
# display as 八六
# JP: 「左様でございますか」
2285 = "「Tôi muốn đưa cô đến đó. Hachiroku, tôi nên hộ tống cô như thế nào đây?」"
# monologue
# JP: ごくさり気なく、ハチロクは髪を整える。
2742 = "「Không, chuyện đó—— Đâu thể phiền ngài làm đến mức đó được ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「それではお伺いいたしますが――双鉄様の利き腕は？」
2554 = "「Cứ đi thôi. Dù sao thì tôi cũng đã trở thành chủ sở hữu của cô rồi. Tôi có nghĩa vụ phải đối xử trân trọng với cô chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「右だ」
2015 = "「Là vậy sao ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、\n左手をわたくしのイスにして頂いてよろしいですか？」
2559 = "Một cách vô cùng tự nhiên, Hachiroku vuốt lại mái tóc."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、こうか？」
1987 = "「Vậy cho tôi mạn phép hỏi——tay thuận của ngài Soutetsu là tay nào ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、上等です」
2277 = "「Tay phải.」"
# monologue
# JP: 左手を曲げ腰を落とせば、\nハチロクの尻が腕に乗る。
2892 = "「Nếu vậy, ngài có thể cho tôi dùng tay trái làm ghế ngồi được không ạ?」"
# monologue
# JP: 見た目よりかなりずっしりしている。\nなるほど、蒸気機関というのも納得だ。
3025 = "「Ra là vậy, thế này hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば行こう」
2552 = "「Vâng, hoàn hảo ạ.」"
# monologue
# JP: 立ち上がれば、自然とハチロクは寄りかかってくる。\n胸板と腕に分散されれば、なかなか心地よい重さと感じる。
2916 = "Gập tay trái lại và hơi khom lưng xuống, Hachiroku liền ngồi lên cánh tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、日々姫。\n片付けの途中にすまんが、ちょっと行ってくる」
2377 = "Nặng hơn nhiều so với vẻ bề ngoài. Ra là vậy, động cơ hơi nước thì cũng phải thôi."
# 【真闇】
# display as 真闇
# JP: 「はい、いってらっしゃい」
2094 = "「Vậy đi thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん？　そんな、簡単に行くと言っても」
2046 = "Khi tôi đứng thẳng lên, Hachiroku tự nhiên tựa hẳn vào người tôi. Trọng lượng phân tán đều lên lồng ngực và cánh tay, tạo thành một sức nặng khá dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「なに、実際に簡単だ。\n僕の\\x%lエアクラ;#00ffc040;エアクラ%l;#;は優秀だからな」
1976 = "「Chị Mayami, Hibiki. Xin lỗi vì đang dọn dở, nhưng anh đi đây một lát nhé.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「じゃけん、そん\\x%lエアクラ;#00ffc040;エアクラ%l;#;が」\n「\\x%lエアクラ;#00ffc040;エアクラ%l;#;っ！！？」
2009 = "「Ừm, đi cẩn thận nhé.」"
# monologue
# JP: 手の中、いきなりの大音声。\nハチロクはそしてもがき始める。
2900 = "「Anh trai? Anh nói đi một lát dễ nghe thế, nhưng mà...」"
# 【双鉄】
