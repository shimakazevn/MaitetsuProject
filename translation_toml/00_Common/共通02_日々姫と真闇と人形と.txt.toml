2220 = "Nhìn vào ánh mắt ngước lên ấy, lồng ngực tôi chợt nghẹn lại."

# (独白)
# JP: \x%l蒸気排水;#00ffc040;蒸気排水%l;#;などでは、無い。\nこれは、涙だ。まぎれなく。この人形は――泣いている。
2211 = "Không đời nào có chuyện \\\\x%l蒸気排水;#00ffc040;xả nước ngưng tụ%l;#; gì ở đây cả. \nĐây rõ ràng là nước mắt. Không sai vào đâu được. Cô búp bê này―― đang khóc. "

# 【ハチロク】(？？？)
# JP: 「乙女の服を勝手に脱がし、人形だなんだと愚弄して。\nおまけに、その怒りまでを躱して笑いっ」
2903 = "「Tự tiện cởi y phục của thiếu nữ, rồi còn lăng mạ là búp bê này nọ. \nĐã thế, còn né được cả cơn thịnh nộ ấy rồi cười cợt nữa chứ」"

# 【双鉄】
# JP: 「すまん。大きな誤解をしていた」
2193 = "「Xin lỗi. Ta đã hiểu lầm rất lớn」"

# (独白)
# JP: 頭を下げる。\n深く、深くに。
2581 = "Tôi cúi đầu. \nThật sâu, thật sâu."

# 【双鉄】
# JP: 「物にも二種類があることを、僕は確かに知っている。\nお前にはナビと同様――本物の知性があるのだな？」
2550 = "「Tôi biết chắc rằng đồ vật cũng được chia làm hai loại. \nEm cũng giống như Navi vậy――thực sự có trí tuệ đúng không?」"

# 【ハチロク】(？？？)
# JP: 「そのナビ様がどこのどなたかは存じませぬが――\nわたくしに知性があることは確かです」
3251 = "「Tuyわたくし không biết vị Navi-sama đó là phương nào―― \nnhưng chắc chắn làわたくし có trí tuệ」"

# 【双鉄】
# JP: 「ならばお前は、意志をもち誇りを持つものだ。\nそうして僕は、愚かにもそれを傷つけた」
2846 = "「Nếu vậy thì em là một thực thể có ý chí và có lòng kiêu hãnh. \nVậy mà tôi, một kẻ ngu muội, lại đi làm tổn thương điều đó」"

# (独白)
# JP: ナビは頑なに否定する。\nが、ナビには意志も誇りもある。
2170 = "Navi luôn ngoan cố phủ nhận. \nNhưng, Navi quả thực có cả ý chí lẫn lòng kiêu hãnh."

# (独白)
# JP: そう信じ、それに救われてさえいる僕が、\n物の持つ意志を、誇りを――否定するなどしてはならない。
2564 = "Một kẻ luôn tin tưởng và thậm chí được cứu rỗi bởi điều đó như tôi, \nkhông bao giờ được phép phủ nhận ý chí, kiêu hãnh của vạn vật."

# 【双鉄】
# JP: 「僕は自分が間違っていたことを全面的に謝罪する。\nもし可能なら、やりなおさせて欲しいとも願う」
2133 = "「Tôi hoàn toàn xin lỗi vì sai lầm của mình. \nNếu có thể, tôi cũng mong được làm lại từ đầu」"

# 【ハチロク】(？？？)
# JP: 「やりなおす――何を、でしょうか？」
2490 = "「Làm lại――từ việc gì cơ ạ?」"

# 【双鉄】
# JP: 「最初から……そうだな、お前……君の怒りを、\n僕が躱してしまった過ち、そこからを」
2910 = "「Từ lúc bắt đầu…… Phải rồi, từ lỗi lầm né tránh \ncơn giận của em…… của cô, từ chỗ đó」"

# 【ハチロク】(？？？)
# JP: 「そうですか。でしたら、頬を下げてください」
3241 = "「Vậy sao ạ. Nếu thế thì, xin hãy ghé má xuống đây」"

# (独白)
# JP: 言われるままに顔を下げれば、\n目と目が、至近距離からぶつかる。
2790 = "Làm theo lời bảo mà cúi mặt xuống, \nánh mắt hai bên liền chạm nhau ở cự ly cực gần."

# (独白)
# JP: （ああ……美しいのは顔のつくりだけでは無いのか）
2836 = "（A…… Hóa ra nét đẹp không chỉ nằm ở khuôn mặt thôi sao）"

# (独白)
# JP: 意志をもつものだけが放ち得る、強い輝き。
3242 = "Một luồng sáng mãnh liệt, thứ ánh sáng chỉ có ở những thực thể sở hữu ý chí."

# (独白)
# JP: 最初からこれを認めていれば、\n“人形”として扱うなどと、できようもなかった。
3211 = "Nếu ngay từ đầu đã thừa nhận điều này, \nthì làm sao có thể đối xử như một \\\"con búp bê\\\" được nữa."

# (独白)
# JP: （パンっ！）
2937 = "（Bép！）"

# (独白)
# JP: 大きな音。小さな痛み。
2150 = "Một tiếng động lớn. Một cơn đau khẽ."

# (独白)
# JP: 真っ赤になった手を抑え、\n意志もつ物はわずかに頷き、そしてふふふと笑いをこぼす。
3156 = "Giữ lấy bàn tay đã đỏ ửng, \nThứ có ý chí khẽ gật đầu, rồi bật ra tiếng cười khúc khích."

# 【ハチロク】(？？？)
# JP: 「奇妙な方ですね、あなたは。\n奇妙ですが、どうやら話は通じそうです」
2514 = "「Cậu là một người kỳ lạ thật đấy. \nKỳ lạ thật, nhưng có vẻ chúng ta có thể nói chuyện được với nhau rồi」"

# (独白)
# JP: コホン、と控えめな咳払い。\n日々姫がすっと近づいてきて、小さな耳へと唇を寄せる。
2443 = "Khẽ hắng giọng một tiếng. \nHibiki nhẹ nhàng tiến lại gần, ghé sát môi vào vành tai nhỏ nhắn."

# 【日々姫】
# JP: 「あの……あなた――服、整えなおした方がよかばい」
2352 = "「Kìa…… cậu―― nên chỉnh đốn lại trang phục chút đi kìa」"

# 【ハチロク】(？？？)
# JP: 「左様ですね。ご助言、ありがとうございます。\n――すみませんが、後ろを向いていていただけますか？」
3119 = "「Đúng vậy nhỉ. Xin cảm ơn lời khuyên của cô. \n――Xin lỗi, nhưng cậu có thể quay lưng đi được không?」"

# 【双鉄】
# JP: 「無論だ」
2896 = "「Dĩ nhiên rồi」"

# (独白)
# JP: シュ、シュと小気味良い衣擦れの音。
2212 = "Xoạt, xoạt, tiếng sột soạt của vải vóc nghe thật vui tai."

# (独白)
# JP: もたもた着替えた路子のことが思い出されて、\n“着慣れているな”と、そんな言葉が浮き上がってくる。
2325 = "Hình ảnh Michiko thay đồ một cách lóng ngóng chợt ùa về, \ntrong đầu tôi bỗng thoáng qua suy nghĩ \\\"cô ấy mặc đồ quen tay thật đấy\\\"."

# 【ハチロク】(？？？)
# JP: 「すみません。お待たせいたしました」
2027 = "「Xin lỗi. Đã để mọi người phải đợi lâu」"

# 【双鉄】
# JP: 「いや、待ったというほど――おお」
2544 = "「Không, cũng chẳng gọi là đợi―― Ồ」"

# 【日々姫】
# JP: 「わぁ！　似合う～～　綺麗～～」
3239 = "「Oa！ Hợp lắm luôn～～ Đẹp quá đi～～」"

# 【ハチロク】(？？？)
# JP: 「左様でしょうね。\nそのように、わたくしは作られておりますから」
2942 = "「Chắc chắn là vậy rồi. \nBởi vì, tôi được chế tạo ra để trông như thế này mà」"

# (独白)
# JP: （ピっ）
2936 = "（Píp）"

# (独白)
# JP: 整った服で見事な敬礼。
2182 = "Trong bộ trang phục chỉnh tề, cô ấy thực hiện một cái chào điều lệnh tuyệt đẹp."

# (独白)
# JP: 見よう見まねで答礼すれば、日々姫も慌てて僕に倣う。
1560 = "Tôi vội vàng chào đáp lễ theo bản năng, và Hibiki cũng luống cuống bắt chước theo tôi."

# 【ハチロク】
# JP: 「わたくしは\x%l帝鉄;#00ffc040;帝鉄%l;#;[ハチロクニイマル,3]8620形\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、トップナンバー・\n\x%l8620;#00ffc040;8620%l;#;号専用レイルロオド、ハチロクと申します」
2234 = "「わたくしは\\x%l帝鉄;#00ffc040;帝鉄%l;#;8620形\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、トップナンバー・\\n\\x%l8620;#00ffc040;8620%l;#;号専用レイルロオド、ハチロクと申します」"

# 【日々姫】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;っ！？」
2894 = "「\\\\x%lレイルロオド;#00ffc040;Railord%l;#; ư!?」"

# 【ハチロク】
# JP: 「日々姫」
2696 = "「Hibiki」"

# 【日々姫】
# JP: 「っ！」
1942 = "「A!」"

# (独白)
# JP: 日々姫の気持ちはよくわかる。\nだが、坊主と袈裟とは別物だ。
2201 = "Tôi rất hiểu cảm giác của Hibiki. \nNhưng người nào việc nấy, không thể đánh đồng tất cả được."

# (独白)
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;であろうとも、目の前にいるこの\n“ハチロク”と、今はまっすぐ向き合うべきだ。
2135 = "Dẫu cô ấy có là một \\\\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa, thì lúc này, chúng tôi cần phải đối mặt một cách thẳng thắn với \\\"Hachiroku\\\" đang đứng trước mắt."

# 【双鉄】
# JP: 「丁寧なご挨拶いたみいる。僕は双鉄。\n右田双鉄という学生――休学したての学生だ」
2744 = "「Rất cảm ơn lời chào lịch thiệp của cô. Tôi là Soutetsu. \nMigita Soutetsu, một học sinh——à, một học sinh vừa mới bảo lưu học tập.」"

# 【日々姫】
# JP: 「わ、わたしは右田日々姫。\n[おひとよ,2]御一夜の学園の学園生です」
2171 = "「T-Tôi là Migita Hibiki. \nHọc sinh của học viện tại Ohitoyo.」"

# 【ハチロク】
# JP: 「[おひとよ,2]御一夜……右田」
2344 = "「Ohitoyo... Migita」"

# (独白)
# JP: 人間とまったく変わらぬ動きで、\n考えこむように、ハチロクがその短い指を口元にあてる。
2128 = "Với những cử động tự nhiên không khác gì con người, \nHachiroku đưa ngón tay ngắn nhắn lên chạm khẽ vào bờ môi như đang suy ngẫm điều gì."

# 【ハチロク】
# JP: 「思い出しました。右田[たいと,1]汰斗様はどちらですか？」
2488 = "「Tôi nhớ ra rồi. Cho hỏi ngài Migita Taito hiện đang ở đâu ạ?」"

# 【日々姫】
# JP: 「じぃじ――んんっ、お祖父様は……その」
1972 = "「Ông nội——à, ông của chúng tôi... thì...」"

# 【双鉄】
# JP: 「なくなった、とうの昔に」
1890 = "「Mất rồi, từ lâu lắm rồi」"

# 【ハチロク】
# JP: 「そうでしたか。随分と長いこと……\nわたくしは眠ってしまっていたようですね」
2533 = "「Ra là vậy ạ. Có vẻ như... \nvì ngủ say quá lâu nênわたくし đã không hề hay biết gì cả」"

# 【双鉄】
# JP: 「ハチロクさんは」
2350 = "「Hachiroku-san...」"

# 【ハチロク】
# JP: 「呼び捨てで結構ですよ？　双鉄様」
2734 = "「Cứ gọi thẳng tên là được rồi ạ? Soshu-sama」"

# 【双鉄】
# JP: 「ならばそうしよう。ハチロクはここ、右田汰斗の部屋の、\nその飾り箪笥で、ガラスケースの中にしまわれていた」
3179 = "「Nếu vậy thì ta sẽ gọi thế. Hachiroku đã được cất trong một chiếc tủ kính trưng bày, ngay tại căn phòng này, phòng của Migita Taito」"

# 【ハチロク】
# JP: 「ガラスケース……そう、ですか」
2582 = "「Tủ kính... ra là, vậy sao ạ」"

# (独白)
# JP: ゾっとするような冷たい微笑。
2322 = "Một nụ cười mỉm lạnh ngắt đến rợn người."

# (独白)
# JP: 知恵を超え、感情を超え――\n“人間らしさ"を人間以上に感じるほどの。\n2268 = "Vượt lên cả trí tuệ, vượt lên cả xúc cảm―― \nđến mức ta cảm nhận được \\\"sự nhân bản\\\" ấy còn rõ rệt hơn cả con người thực thụ."

# 【ハチロク】
# JP: 「……うまく思い出せませんが、わたくしは……\n汰斗様のご期待を、大きく裏切ってしまったようですね」
2274 = "「...Dù không thể nhớ rõ lắm, nhưng có vẻ như... \nvàわたくし đã phụ lòng mong mỏi của Taito-sama rất nhiều rồi」"

# 【双鉄】
# JP: 「汰斗さんの期待？」
3207 = "「Kỳ vọng của Taito-san sao?」"

# 【ハチロク】
# JP: 「ええ。……あの、失礼ながらお伺いいたしますが、\n双鉄様は、汰斗様のご相続人でいらっしゃいますか？」
3106 = "「Vâng. ...À, xin thất lễ choわたくし được mạo muội hỏi, \nSoshu-sama có phải là người thừa kế của Taito-sama không ạ?」"

# 【日々姫】
# JP: 「そうたい！」
2163 = "「Đúng thế đó!」"

# (独白)
# JP: 微妙に思えた質問に、\n僕より先に日々姫が答える。
2374 = "Trước câu hỏi có phần nhạy cảm ấy, \nHibiki đã nhanh nhảu trả lời trước cả tôi."

# (独白)
# JP: 気持ちは嬉しい。\nだが、こうしたことはより正確を期すべきだ。
2278 = "Tôi rất vui vì lòng tốt của em ấy. \nThế nhưng, những chuyện thế này cần phải được làm rõ một cách chính xác nhất."

# 【双鉄】
# JP: 「僕も相続人のはしくれではある。が、一番の相続人。\n右田家の現当主ということであれば、真闇姉だ」
2130 = "「Tôi cũng là một trong những người thừa kế. Nhưng nếu nói về người thừa kế lớn nhất, đồng thời là đương chủ hiện tại của nhà Migita, thì đó là chị Mayami」"

# 【ハチロク】
# JP: 「マクラネエ――様でございますか？」
3140 = "「Là... Makuranee-sama phải không ạ?」"

# 【双鉄】
# JP: 「うむ。真なる闇とかいて“まくら”と読む」
1884 = "「Ừm. Viết là Chân Ám (Bóng tối đích thực) nhưng đọc là “Makura”」"

# 【ハチロク】
# JP: 「素敵なお名前。長いトンネルを思わせますね」
2339 = "「Một cái tên thật tuyệt. Nó làm em liên tưởng đến những đường hầm dài hun hút」"

# (独白)
# JP: 言って、ハチロクはハっとした顔で\n僕を、日々姫を順々に見る。
2162 = "Nói rồi, Hachiroku chợt thoáng giật mình \nliếc nhìn tôi rồi lại nhìn Hibiki."

# 【ハチロク】
# JP: 「いいえ、真闇様はきっと“\x%l枕木;#00ffc040;枕木%l;#;”のまくらですね。\n双鉄様は、その上に敷かれる双鉄、レール」
2166 = "「Không, Makura-sama chắc chắn là “Makura” trong “\\\\x%l枕木;#00ffc040;tà vẹt%l;#;”. \nCòn Soutetsu-sama chính là thanh ray, đường ray được đặt lên trên đó」"

# 【双鉄】
# JP: 「ほう？」
2976 = "「Ồ?」"

# 【ハチロク】
# JP: 「そして、日々姫様はレールと\x%l列車;#00ffc040;列車%l;#;とのたてる響き。\n汰斗様は、お孫様達に素敵なお名前をつけられましたね」
3000 = "「Và Hibiki-sama chính là tiếng vang vọng lên giữa đường ray và \\\\x%l列車;#00ffc040;đoàn tàu%l;#;. \nTaito-sama quả thực đã đặt cho các cháu của mình những cái tên thật tuyệt vời」"

# 【双鉄】
# JP: 「そうならよかったのだが、僕は」
2131 = "「Được như vậy thì tốt quá, nhưng tôi...」"

# 【日々姫】
# JP: 「わたし、ねぇねぇ呼んでくるばいっ！」
2258 = "「Để em đi gọi chị Hai qua đây nhé!」"

# (独白)
# JP: 逃げ出すように、日々姫が酒蔵へとすっ飛んでいく。\nいや、実際に逃げ出したのか。
2526 = "Như để trốn chạy, Hibiki phóng vụt thẳng về phía kho ủ rượu. \nKhông, có lẽ là cô ấy đang chạy trốn thật."

# (独白)
# JP: 日々姫は、僕が養子だという話をひどく嫌う。\n知ってはいたが、ついハチロクにつられてしまった。
2100 = "Hibiki cực kỳ ghét chuyện tôi là con nuôi. \nTôi biết rõ điều đó, vậy mà vừa rồi lại lỡ miệng hùa theo Hachiroku."

# 【ハチロク】
# JP: 「軽やかですね、日々姫さまの足音は」
2523 = "「Tiếng bước chân của Hibiki-sama thật nhẹ nhàng thanh thoát làm sao」"

# 【双鉄】
# JP: 「だな。ああ見えて文武両道だ。\nそのうえ、たいそう絵がうまい」
1952 = "「Ừ. Trông thế thôi chứ con bé văn võ song toàn đấy. \nHơn nữa, em ấy còn vẽ tranh rất đẹp」"

# 【ハチロク】
# JP: 「それは素敵です」
3055 = "「Tuyệt vời quá ạ」"

