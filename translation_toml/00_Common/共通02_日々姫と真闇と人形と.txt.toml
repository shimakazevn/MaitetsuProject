2731 = "Chỉ một âm thanh ngắn ngủi ấy thôi, mà cứ như thể vừa tháo tung một chiếc nút thắt, làm sống lại những ngày xưa cũ ta từng trò chuyện dưới mái nhà này―― những lời nói mộc mạc cứ thế tự nhiên tuôn ra."

# 【双鉄】
# JP: 「ただいま、真闇姉。ただいま、日々姫」
2167 = "「Em về rồi đây, chị Mayami. Anh về rồi đây, Hibiki.」"

# 【真闇】
# JP: 「ん。お帰り」
2067 = "「Ừm. Mừng em đã về」"

# 【日々姫】
# JP: 「おかえり、にぃにぃ」
2304 = "「Mừng anh đã về, Nii-nii」"

# (独白)
