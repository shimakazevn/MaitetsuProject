2696 = "Dù có là \\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa, thì bây giờ, chúng tôi cũng nên thẳng thắn đối diện với \"Hachiroku\" đang đứng trước mặt này."
# 【双鉄】
# display as 雙鐵
# JP: 「丁寧なご挨拶いたみいる。僕は双鉄。\n右田双鉄という学生――休学したての学生だ」
1942 = "「Cảm ơn cô đã chào hỏi tử tế. Tôi là Soutetsu. Một sinh viên tên là Migita Soutetsu——sinh viên vừa mới bảo lưu.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ、わたしは右田日々姫。\n[おひとよ,2]御一夜の学園の学園生です」
2201 = "「T, tôi là Migita Hibiki. Là học sinh của học viện Ohimitera.」"
# 【ハチロク】
# display as 八六
# JP: 「[おひとよ,2]御一夜……右田」
2135 = "「Ohimitera……Migita.」"
# monologue
# JP: 人間とまったく変わらぬ動きで、\n考えこむように、ハチロクがその短い指を口元にあてる。
2744 = "Với những cử chỉ hệt như con người, Hachiroku đặt những ngón tay ngắn ngủn lên miệng như đang suy nghĩ."
# 【ハチロク】
# display as 八六
# JP: 「思い出しました。右田[たいと,1]汰斗様はどちらですか？」
2171 = "「Tôi nhớ ra rồi. Ngài Migita Taito đang ở đâu ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「じぃじ――んんっ、お祖父様は……その」
2344 = "「Ông nội——ưm, ông nội đã……chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なくなった、とうの昔に」
2128 = "「Đã mất từ lâu rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「そうでしたか。随分と長いこと……\nわたくしは眠ってしまっていたようですね」
2488 = "「Vậy sao. Có vẻ như tôi…… đã ngủ một giấc khá dài rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクさんは」
1972 = "「Cô Hachiroku này.」"
# 【ハチロク】
# display as 八六
# JP: 「呼び捨てで結構ですよ？　双鉄様」
1890 = "「Ngài cứ gọi trống không cũng được ạ? Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばそうしよう。ハチロクはここ、右田汰斗の部屋の、\nその飾り箪笥で、ガラスケースの中にしまわれていた」
2533 = "「Vậy tôi sẽ làm thế. Hachiroku đã ở đây, trong phòng của Migita Taito, bên trong tủ kính trang trí kia.」"
# 【ハチロク】
# display as 八六
# JP: 「ガラスケース……そう、ですか」
2350 = "「Tủ kính sao……Ra, là vậy.」"
# monologue
# JP: ゾっとするような冷たい微笑。
2734 = "Một nụ cười lạnh lẽo đến rợn người."
# monologue
# JP: 知恵を超え、感情を超え――\n“人間らしさ"を人間以上に感じるほどの。
3179 = "Vượt xa cả trí tuệ, vượt xa cả cảm xúc—— Đến mức cảm nhận được \"tính người\" còn hơn cả con người."
# 【ハチロク】
# display as 八六
# JP: 「……うまく思い出せませんが、わたくしは……\n汰斗様のご期待を、大きく裏切ってしまったようですね」
2582 = "「……Tôi không nhớ rõ lắm, nhưng có vẻ như tôi…… đã phụ sự kỳ vọng của ngài Taito rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんの期待？」
2322 = "「Sự kỳ vọng của ông Taito?」"
# 【ハチロク】
# display as 八六
