[script]
# (独白)
# JP: 分厚い、一枚板の座卓。\nこの大きさだというのに欠けも無く傷ひとつさえも無い。
2781 = "Bàn trà thấp, dày dặn, làm từ một tấm ván\nnguyên khối.\nLớn đến thế này mà không hề sứt mẻ hay có\nlấy một vết xước."
# (独白)
# JP: その見事さに威圧感さえ感じれば――\n右田家に、戻ってきたと実感できる。
2848 = "Sự hoàn hảo đó thậm chí còn mang lại cảm\ngiác uy nghiêm——\nLàm tôi thực sự cảm nhận được rằng, mình\nđã trở về nhà Migita."
# 【日々姫】
# JP: 「…………」
1571 = "「…………」"
# (独白)
# JP: 僕の右手で、日々姫がちらちらこちらの様子を伺っている。
2887 = "Ở bên tay phải tôi, Hibiki đang thỉnh\nthoảng lại lén nhìn sang thăm dò."
# (独白)
# JP: 初めて日々姫に会った時――\n僕がこの家に引き取られてきた、あの遠い日と全く同じに。
3176 = "Giống hệt như lần đầu tiên tôi gặp\nHibiki——\nvào cái ngày xa xôi ấy, khi tôi được nhận\nnuôi vào gia đình này."
# 【双鉄】
# JP: 「この家は変わらないな。なにもかもが懐かしい」
2480 = "「Ngôi nhà này chẳng thay đổi gì cả. Mọi\nthứ đều thật hoài niệm.」"
# 【日々姫】
# JP: 「そうですか！？　兄さん、懐かしいですか？」
2366 = "「Vậy sao!? Anh trai, thấy hoài niệm sao?」"
# (独白)
# JP: ぱあっと、日々姫が顔をあげ、やけに華やいだ声を出す。
3212 = "Hibiki bừng sáng ngẩng mặt lên, cất giọng\nvô cùng rạng rỡ."
# 【双鉄】
# JP: 「うん、懐かしい。\nここまで何も変わらないとは、夢にも思っていなかった」
2263 = "「Ừ, hoài niệm lắm.\nKhông ngờ lại chẳng có gì thay đổi đến mức\nnày, đúng là nằm mơ cũng không nghĩ tới.」"
# 【日々姫】
# JP: 「む……」
2047 = "「Hứ……」"
# (独白)
# JP: 一転、眉根がきゅっと寄る。\n声のトーンも低くなる。
3080 = "Đột ngột, đôi lông mày nhíu chặt lại.\nGiọng nói cũng trầm xuống."
# 【日々姫】
# JP: 「私もですか？　変わらない？\n兄さんが帝都へ旅立っていったあのときと？」
2494 = "「Cả em cũng vậy sao? Không thay đổi gì ư?\nGiống như lúc anh trai lên đường đến Đế Đô\nsao?」"
# 【双鉄】
# JP: 「ああ、いや。変わったな。\n[ひびき,2]日々姫は確かに、大きく変わった」
1895 = "「À, không. Có thay đổi chứ.\nHibiki quả thực, đã thay đổi rất nhiều.」"
# (独白)
# JP: ナビも指摘をしていたが、\n確かに、日々姫の変化は顕著だ。
3198 = "Navi cũng đã chỉ ra rồi,\nquả thật, sự thay đổi của Hibiki rất rõ\nrệt."
# (独白)
# JP: それを素直に認めれば、\n寄ってた眉根がふわりとゆるむ。
2889 = "Khi tôi thành thật thừa nhận điều đó,\nđôi lông mày đang nhíu lại của con bé liền\ngiãn ra nhẹ nhõm."
# 【日々姫】
# JP: 「どの辺が変わって見えます？\n兄さんの目には」
2542 = "「Anh thấy em thay đổi ở điểm nào?\nTrong mắt anh trai ấy.」"
# 【双鉄】
# JP: 「なにより口調だ。綺麗な標準語で話している」
2295 = "「Trước hết là giọng điệu. Em đang nói\ntiếng phổ thông rất chuẩn.」"
# 【日々姫】
# JP: 「そこですか！？」
2112 = "「Là chỗ đó sao!?」"
# 【双鉄】
# JP: 「気づくなという方が無理な変化だ。\n僕が出たときは、こてこての[くまもと,1]隈元弁を使っていたのに」
2493 = "「Một sự thay đổi không thể không nhận ra.\nLúc anh đi, em vẫn còn nói giọng Kumamoto\nđặc sệt mà.」"
# (独白)
# JP: 怒ったような呆れ顔。\n日々姫に張り付いていたその表情が、ゆるゆる解ける。
2997 = "Khuôn mặt tỏ vẻ tức giận như cạn lời.\nBiểu cảm đang bám chặt trên khuôn mặt\nHibiki dần dần tan biến."
# 【日々姫】
# JP: 「それは……私だって帝都に出て行くつもりですから。\nきちんとした先生について、練習を重ねたんです」
2549 = "「Chuyện đó……vì em cũng định sẽ lên Đế Đô\nmà.\nEm đã theo học một giáo viên đàng hoàng và\nluyện tập rất nhiều đó.」"
# 【双鉄】
# JP: 「ほう。日々姫も帝都にか。\n帝大にでも進むつもりか？」
2266 = "「Ồ. Hibiki cũng muốn lên Đế Đô à.\nĐịnh thi vào trường Đế Đại sao?」"
# 【日々姫】
# JP: 「私が兄さんの後輩ですか。そうできたら素敵ですけど\n……今の成績では、とても無理です」
2351 = "「Em làm hậu bối của anh trai sao. Được thế\nthì tuyệt quá\n……nhưng với thành tích hiện tại, thì hoàn\ntoàn không thể đâu.」"
# 【双鉄】
# JP: 「ならば成績をあげればいい」
2539 = "「Vậy thì nâng cao thành tích lên là được.」"
# 【日々姫】
# JP: 「あはっ」
2036 = "「Aha.」"
# (独白)
# JP: 今日、はじめての日々姫の笑顔。\n余計な感情の混じらぬ笑顔。
3177 = "Nụ cười đầu tiên của Hibiki trong ngày hôm\nnay.\nMột nụ cười không pha lẫn bất kỳ cảm xúc\nthừa thãi nào."
# 【双鉄】
# JP: 「その笑顔は変わっていないな。\n良いことだ」
1939 = "「Nụ cười đó thì không thay đổi nhỉ.\nTốt lắm.」"
# 【日々姫】
# JP: 「少しも変わってらっしゃらないのは兄さんですよ。\n『出来ないことは出来るまでやればいい』――って」
2041 = "「Người không thay đổi chút nào là anh trai\nmới đúng.\n『Chuyện không làm được thì cứ làm cho đến\nkhi được mới thôi』——kiểu vậy.」"
# (独白)
# JP: 日々姫はなおも笑いつづける。\nクスクスくすくす――楽しげに。
2994 = "Hibiki vẫn tiếp tục cười.\nKhúc khích khúc khích——đầy vẻ thích thú."
# 【日々姫】
# JP: 「全く変わっていないとは夢にも思いませんでした。\nお勉強にお仕事に、さぞご苦労をされたでしょうに」
1955 = "「Nằm mơ em cũng không nghĩ là anh hoàn\ntoàn chẳng thay đổi gì.\nDù cho việc học và công việc chắc hẳn đã\nkhiến anh vất vả lắm.」"
# 【双鉄】
# JP: 「変わらんか？　僕は」
2188 = "「Không thay đổi sao? Anh ấy.」"
# 【日々姫】
# JP: 「細かなところはまだわかりません。\nけれど、兄さんの一番兄さんらしいところは、同じです」
2436 = "「Những chi tiết nhỏ thì em chưa rõ.\nNhưng mà, điểm giống anh trai nhất của anh\ntrai, thì vẫn y như cũ.」"
# 【双鉄】
# JP: 「自分のことはよくわからんが――\nふむ、日々姫が言うならそうなのかもしれん」
2160 = "「Anh không hiểu rõ bản thân mình lắm——\nHừm, nếu Hibiki đã nói vậy thì chắc là thế\nrồi.」"
# (独白)
# JP: 今度はぽん、と赤くなる。\n今日の日々姫は、昔以上の百面相だ。
3178 = "Lần này mặt con bé bỗng đỏ bừng lên.\nHibiki của ngày hôm nay, biểu cảm còn\nphong phú hơn cả ngày xưa."
# 【日々姫】
# JP: 「わ、私が言うなら――って」
2158 = "「N-nếu em đã nói vậy——sao.」"
# 【真闇】(？？？)
# JP: 「そら確かばい。ひーちゃんは昔から、\n双ちゃんのことばよー見ゆうけんねぇ」
2519 = "「Chắc chắn rồi. Hi-chan từ ngày xưa,\nđã luôn dõi theo Sou-chan mà.」"
# 【日々姫】
# JP: 「ねぇねぇっ！」
2578 = "「Chị hai!」"
# (独白)
# JP: ああ、“ねぇねぇ”は“ねぇねぇ”なのか――\n昔と変わらぬ日々姫の声に迎えられ。
2811 = "A, \"Chị hai\" thì vẫn gọi là \"Chị hai\" à——\nĐược chào đón bởi giọng nói không đổi từ\nngày xưa của Hibiki."
# (独白)
# JP: 音も立てずにふすまを開き、\n氷水の乗ったお盆を持った[まくら,1]真闇[ねぇ]姉が入ってくる。
3085 = "Kéo cánh cửa trượt ra mà không gây tiếng\nđộng,\nchị Mayami bước vào, bưng theo khay nước\nđá."
# 【真闇】
# JP: 「双ちゃん、おかえり。\n六年の[ま]間に、ずいぶん大きゅうなったねぇ」
2104 = "「Sou-chan, mừng em về nhà.\nTrong sáu năm qua, em đã lớn bổng lên\nnhiều rồi nhỉ.」"
# (独白)
# JP: 真闇姉の笑いは、ゆったりだ。\n上空から見たクマ川をふと思い出す。
3061 = "Nụ cười của chị Mayami thật thư thái.\nLàm tôi chợt nhớ đến con sông Kuma nhìn từ\ntrên cao."
# (独白)
# JP: 豊かで、とても美しく――\nけれど一度荒れたならば、他の何より恐ろしい。
3204 = "Trù phú, và vô cùng xinh đẹp——\nNhưng một khi đã nổi giận, thì đáng sợ hơn\nbất cứ thứ gì khác."
# 【双鉄】
# JP: 「それは――そうかと思います。\n[とう,1]義父さんは、帝都でも僕によくしてくださいまして」
2563 = "「Điều đó——em nghĩ là vậy.\nCha nuôi, ở Đế Đô cũng đối xử rất tốt với\nem.」"
# 【真闇】
# JP: 「他人行儀は好かんよ？　\n右田の人間言うなら、\x%l杜氏;#00ffc040;[とうじ,1]杜氏%l;#;の言うことば聞かんと」
1947 = "「Chị không thích khách sáo đâu nha?\nĐã là người nhà Migita thì phải nghe lời \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#;\nchứ.」"
# 【双鉄】
# JP: 「はい――いや、『うん』」
2252 = "「Vâng——à không, 『Dạ』」"
# (独白)
# JP: うん、などという相槌は、\nそれこそこの家を出たとき以来だ。
1538 = "Những tiếng đáp lời như \"Ừm\",\ncó lẽ từ lúc rời khỏi căn nhà này tôi mới\nlại dùng đến."
# (独白)
# JP: ただそれだけの短い音が、まるで栓でもしてたかのように、\nこの家で昔話してた――そのままの言葉がつながってくる。
2731 = "Chỉ một âm thanh ngắn ngủi đó thôi, nhưng\nnhư thể đã mở tung một chiếc nút bần,\nnhững lời tôi từng nói ở căn nhà này ngày\nxưa——cứ thế tuôn trào ra."
# 【双鉄】
# JP: 「ただいま、真闇姉。ただいま、日々姫」
2167 = "「Anh về rồi đây, chị Mayami. Anh về rồi\nđây, Hibiki.」"
# 【真闇】
# JP: 「ん。お帰り」
2067 = "「Ừm. Mừng em về nhà.」"
# 【日々姫】
# JP: 「おかえり、にぃにぃ」
2304 = "「Mừng anh hai về nhà.」"
# (独白)
# JP: 透き通ったコップが差し出される。\n飲み干せば、遠い夏がさらに近づいてくる。
3013 = "Một chiếc cốc trong suốt được đưa ra.\nUống cạn nó, mùa hè xa xăm ấy như càng đến\ngần hơn."
# (独白)
# JP: そうだ、いつだってそうだった。\n外から帰れば、この氷水が僕を迎えてくれた。
3003 = "Đúng rồi, lúc nào cũng vậy.\nMỗi khi từ ngoài về, cốc nước đá này luôn\nchào đón tôi."
# (独白)
# JP: （バリっ、ボリっ、バリン）
3244 = "（Rộp, rộp, rộp）"
# 【日々姫】
# JP: 「にぃにぃ、また氷食べよっ――こほん。\n兄さん、また氷なんてお食べになって」
2573 = "「Anh hai, anh lại nhai đá nữa rồi——e hèm.\nAnh trai, anh lại nhai đá nữa rồi.」"
# 【真闇】
# JP: 「おいしかもんねぇ。うちん蔵の水は、\nぜぇんぶクマ川のいっとうよかもんやけん」
2020 = "「Ngon lắm phải không. Nước ở xưởng ủ rượu\nnhà mình,\ntất cả đều là loại nước tuyệt hảo nhất của\nsông Kuma mà.」"
# 【双鉄】
# JP: 「うん」
2065 = "「Vâng.」"
# (独白)
# JP: そう、御一夜に、この家にもらわれて来て、初めて知った。\n水が、氷が、これほどうまいということを。
3009 = "Đúng vậy, kể từ khi được nhận nuôi và đến\ncăn nhà này ở Ohimitera, tôi mới biết\nđược.\nRằng nước, và đá, lại có thể ngon đến thế\nnày."
# (独白)
# JP: なら、やはり――\nこの水を守ることもまた、僕の果たすべき義務だろう。
3190 = "Nếu vậy, quả nhiên——\nViệc bảo vệ nguồn nước này cũng là nghĩa\nvụ mà tôi phải hoàn thành."
# 【双鉄】
# JP: 「それで、真闇姉」
2441 = "「Chuyện là, chị Mayami.」"
# (独白)
# JP: ならば、果たすべきを早く果たそう。\n懐かしむなど、そのあといくらでも堪能できる。
3191 = "Nếu vậy, hãy mau chóng hoàn thành những gì\ncần làm thôi.\nViệc ôn lại kỷ niệm, sau đó tận hưởng bao\nnhiêu cũng được."
# 【双鉄】
# JP: 「御一夜に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致するという話。\n今、どの程度のものになってる？」
2495 = "「Chuyện mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về\nOhimitera ấy.\nBây giờ tiến triển đến đâu rồi?」"
# 【真闇】
# JP: 「なんねぇ、双ちゃん。\n夏休みで帰ってきたんじゃなかと？」
2143 = "「Sao vậy, Sou-chan.\nKhông phải em về nghỉ hè sao?」"
# 【双鉄】
# JP: 「うん。大学は休学してきた」
2064 = "「Vâng. Em đã xin bảo lưu ở đại học rồi.」"
# 【日々姫】
# JP: 「休学っ！？」
1926 = "「Bảo lưu á!?」"
# (独白)
# JP: 驚き顔の日々姫に頷く。
2986 = "Tôi gật đầu với vẻ mặt kinh ngạc của\nHibiki."
# 【双鉄】
# JP: 「勉学よりも、この件の方が遥かに大事と思ったからな」
2078 = "「Bởi vì anh nghĩ chuyện này quan trọng hơn\nviệc học nhiều.」"
# (独白)
# JP: 無論、休学にあたってはいろいろあった。
3037 = "Tất nhiên, cũng có nhiều chuyện xảy ra khi\nxin bảo lưu."
# (独白)
# JP: 義父さんから、何だかんだと条件をつきつけられもしたが、\nその辺りのことはまぁ、折を見て話せばよいだろう。
3217 = "Cha nuôi cũng đưa ra đủ loại điều kiện này\nnọ,\nnhưng chuyện đó thì cứ để khi nào có dịp\nrồi kể sau cũng được."
# 【日々姫】
# JP: 「そいたら、にぃに――んんっ――\nと、いうことは、兄さんも工場誘致を推進に？」
2109 = "「Vậy ra, anh hai——ưm——\nNói vậy tức là, anh trai cũng ủng hộ việc\nmời gọi nhà máy sao?」"
# 【双鉄】
# JP: 「ああ――うん？　いや」
2060 = "「À——hả? Không.」"
# (独白)
# JP: 聞き違えたか？\n言葉の意味を取り損なって、曖昧な返事を返してしまった。
3008 = "Tôi nghe nhầm sao?\nChưa kịp hiểu ý nghĩa câu nói, tôi đã lỡ\nđáp lại một cách mơ hồ."
# 【双鉄】
# JP: 「日々姫は、今なんと？」
2241 = "「Hibiki, em vừa nói gì cơ?」"
# 【日々姫】
# JP: 「え？　ですから――兄さんも、\n工場誘致を推進しに戻ってきてくださったのか――と」
2038 = "「Hả? Thì là——anh trai cũng,\nquay về để ủng hộ việc mời gọi nhà máy\nsao——ạ.」"
# 【双鉄】
# JP: 「推進」
2215 = "「Ủng hộ.」"
# (独白)
# JP: 聞き違いではなかったようだ。\nが――
3020 = "Có vẻ tôi không nghe nhầm.\nNhưng mà——"
# (独白)
# JP: 信じられずに真闇姉へと視線を送れば、\n笑顔と小さくすくめた肩とに受け止められる。
2909 = "Tôi nhìn sang chị Mayami với vẻ không thể\ntin nổi,\nđáp lại tôi là một nụ cười và cái nhún vai\nnhè nhẹ."
# 【双鉄】
# JP: 「ふむ」
2048 = "「Hừm.」"
# (独白)
# JP: ならば、“推進”は、日々姫ひとりの意見であるのか。
3189 = "Nếu vậy, \"ủng hộ\" chỉ là ý kiến của riêng\nHibiki thôi sao."
# 【双鉄】
# JP: 「推進などと。どこでどう、\nそのような考えを吹きこまれたんだ？」
2442 = "「Cái gì mà ủng hộ chứ. Em bị tiêm nhiễm\nsuy nghĩ đó\ntừ ai, ở đâu vậy?」"
# 【日々姫】
# JP: 「え？」
2037 = "「Hả?」"
# (独白)
# JP: また驚いた顔になり。\n次いでみるみる、日々姫の頬が朱に染まっていく。
2988 = "Khuôn mặt em ấy lại lộ vẻ ngạc nhiên.\nRồi ngay sau đó, đôi má Hibiki đỏ bừng lên\ntrông thấy."
# 【日々姫】
# JP: 「『吹きこまれた』なんていう言い方はやめてください」
2446 = "「Xin anh đừng dùng từ 『tiêm nhiễm』 như\nthế.」"
# 【双鉄】
# JP: 「そうか、すまん。では言い直そう。\n誘致の推進という考えに、日々姫はなぜ思い至った？」
2265 = "「Vậy sao, xin lỗi. Để anh nói lại.\nTại sao Hibiki lại có suy nghĩ ủng hộ việc\nmời gọi nhà máy?」"
# 【日々姫】
# JP: 「それは――」
2487 = "「Chuyện đó là——」"
# (独白)
# JP: 口を閉じ。\n日々姫は目線を左右に揺らす。
2984 = "Ngậm miệng lại.\nHibiki đưa mắt nhìn quanh quất."
# (独白)
# JP: そして僕へと顔を戻さず、\nそのままで、けれども強い声をだす。
2832 = "Và rồi, không thèm ngoảnh mặt lại nhìn\ntôi,\nem ấy cứ thế cất lên một giọng điệu mạnh\nmẽ."
# 【日々姫】
# JP: 「御一夜の衰退を考えれば、当然の結論だというだけです。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の工場誘致は、安定的な発展をもたらします」
2413 = "「Nghĩ đến sự suy thoái của Ohimitera thì\nđó là kết luận đương nhiên thôi.\nMời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về sẽ mang lại sự\nphát triển ổn định.」"
# 【双鉄】
# JP: 「確かに、それは一面の真実だ。\nだが、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致が呼びこむものは他にもある」
2394 = "「Quả thật, đó cũng là một mặt của sự thật.\nNhưng việc mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về còn\nkéo theo những thứ khác nữa.」"
# (独白)
# JP: 日々姫を見、真闇姉を見る。\n沈黙と、強い頷きと。
2918 = "Nhìn Hibiki, rồi lại nhìn chị Mayami.\nMột sự im lặng, và một cái gật đầu dứt\nkhoát."
# 【双鉄】
# JP: 「“水質汚染”――そのことを日々姫は」
2235 = "「\"Ô nhiễm nguồn nước\"——Chuyện đó Hibiki\ncó...」"
# 【日々姫】
# JP: 「知っています、もちろん！」
2353 = "「Em biết chứ, tất nhiên rồi!」"
# (独白)
# JP: 大声。\nそして日々姫の瞳は、僕より先に真闇姉へ向く。
2870 = "Lớn tiếng.\nVà rồi ánh mắt của Hibiki hướng về phía\nchị Mayami trước cả tôi."
# 【日々姫】
# JP: 「“姉さん”も、\n兄さんと同じことを言っていましたから」
2076 = "「Bởi vì \"chị gái\" cũng,\nđã nói những điều y hệt như anh trai vậy.」"
# (独白)
# JP: ねぇねぇではなく、あえて姉さん。\n姉妹喧嘩、と。その四文字が頭に浮かぶ。
2695 = "Không phải gọi là chị Mayami, mà lại cố\ntình gọi là \"chị gái\".\nBốn chữ \"Chị em cãi nhau\" xẹt qua đầu tôi."
# 【日々姫】
# JP: 「ですが、汚染などという言葉は大げさです。排水は、\n国の環境基準内に余裕をもって収まるよう処理されます」
1931 = "「Nhưng mà, dùng từ ô nhiễm thì làm quá\nrồi. Nước thải sẽ được\nxử lý để đảm bảo nằm trong mức an toàn của\ntiêu chuẩn môi trường quốc gia.」"
# (独白)
# JP: 日々姫はかなり感情的だ。\nいたずらに刺激せぬよう、言葉を選ぶ。
2995 = "Hibiki đang khá xúc động.\nTôi lựa lời để tránh kích động em ấy một\ncách vô ích."
# 【双鉄】
# JP: 「それは確かに。が、“国の基準”は、いわば最大公約数。\n地方地方の特色までを考慮してあるものとは言えない」
2391 = "「Điều đó thì đúng. Nhưng \"tiêu chuẩn quốc\ngia\" nói cho cùng cũng chỉ là ước số chung\nlớn nhất.\nKhông thể nói là nó đã cân nhắc đến đặc\nthù của từng địa phương được.」"
# (独白)
# JP: クっと日々姫が唇を噛む。\n口惜しそうに下を向き、上目遣いで僕を見てくる。
2978 = "Hibiki cắn chặt môi.\nEm ấy cúi gằm mặt xuống vẻ ấm ức, rồi\nngước mắt lên nhìn tôi."
# 【日々姫】
# JP: 「にぃにぃまでねぇねぇと同じこと～っ」
2570 = "「Ngay cả anh hai cũng nói y chang chị\nMayami~」"
# 【双鉄】
# JP: 「ふむ。やはりか」
2300 = "「Hừm. Quả nhiên là vậy.」"
# 【日々姫】
# JP: 「やはりってなんね！　どぎゃん意味で」
1912 = "「Quả nhiên là sao chứ! Anh có ý gì hả!」"
# (独白)
# JP: （ぽんっ）
3243 = "（Bộp）"
# (独白)
# JP: 勢いこんだ日々姫が腰を跳ね上げて――\nその瞬間、ひどく間の抜けた音が立つ。
3023 = "Hibiki hầm hầm định đứng bật dậy——\nĐúng lúc đó, một âm thanh vô cùng lạc lõng\nvang lên."
# (独白)
# JP: 真闇姉だ。\n両手を柔らかに打ち鳴らし、困ったような笑みを浮かべる。
3011 = "Là chị Mayami.\nChị ấy vỗ nhẹ hai tay vào nhau, nở nụ cười\nnhư đang bối rối."
# 【真闇】
# JP: 「ああ、いけん。蔵の仕事の途中やったけん。\n双ちゃん、ひーちゃんと仲よぉね」
2059 = "「A, không được rồi. Chị đang làm dở việc ở\nxưởng ủ rượu.\nSou-chan, nhớ hòa thuận với Hii-chan nhé.」"
# 【日々姫】
# JP: 「いややけん！　にぃにぃと仲良ぉなんて」
2440 = "「Em không chịu đâu! Ai thèm hòa thuận với\nanh hai chứ.」"
# 【双鉄】
# JP: 「そうなのか？」
2264 = "「Vậy sao?」"
# (独白)
# JP: 豆鉄砲を食らう鳩。
2992 = "Giống hệt như chú chim bồ câu bị trúng đạn\nđậu."
# (独白)
# JP: それを見事に顔面だけで表現しながら、\n日々姫は顔を赤くして、すぐその色を青ざめさせる。
2831 = "Hibiki thể hiện xuất sắc điều đó qua nét\nmặt,\nđôi má em đỏ bừng lên, rồi lại tái nhợt đi\nngay lập tức."
# 【日々姫】
# JP: 「あ――う……い、イヤゆうたんは、その――\nその、ですね、ええと、そういう意味ではなくて」
2052 = "「A——ư……k-không chịu là, cái đó——\ncái đó, là, ừm, không phải ý đó đâu.」"
# 【双鉄】
# JP: 「無くて？」
1887 = "「Không phải ý đó?」"
# 【日々姫】
# JP: 「イヤというほどイヤじゃ無い、っていうか――\nええと、仲良くしたく無いことは無いんですけど、その」
2198 = "「Cũng không hẳn là không chịu, ý em là——\nừm, không phải là em không muốn hòa thuận,\nmà là...」"
# 【双鉄】
# JP: 「イヤだけど、イヤじゃない」
2584 = "「Không chịu, nhưng cũng không phải là\nkhông chịu.」"
# (独白)
# JP: 謎かけの類は全く不得手だ。
2807 = "Tôi hoàn toàn mù tịt mấy trò giải đố kiểu\nnày."
# (独白)
# JP: が、日々姫の切羽詰まっての言葉なら、\nその意味を、なんとか汲み取るのが僕の義務だろう。
2728 = "Nhưng nếu là những lời nói trong lúc cuống\nquýt của Hibiki,\nthì việc cố gắng thấu hiểu ý nghĩa của nó\nhẳn là nghĩa vụ của tôi."
# 【双鉄】
# JP: 「イヤだけど、イヤじゃ――ふむ？　もしかして……\nそれはアレか？　俗にいう、『イヤよイヤよも』」
2583 = "「Không chịu, nhưng cũng không phải là\nkhông chịu——Hừm? Lẽ nào……\nLà cái đó sao? Tục ngữ có câu, 『Miệng nói\nghét nhưng trong lòng lại』」"
# 【日々姫】
# JP: 「好かんっ！　にぃにぃのアホーーーーーっ！」
2205 = "「Ghét lắm! Anh hai đồ ngốcccc!」"
# 【双鉄】
# JP: 「おっと」
2026 = "「Ối chà.」"
# (独白)
# JP: 投げつけられた座布団を躱すその間に素早く、\n日々姫は居間を飛び出して、二階の自室にこもってしまう。
3148 = "Trong lúc tôi nhanh nhẹn né tấm nệm ngồi\nbị ném tới,\nHibiki đã lao ra khỏi phòng khách và nhốt\nmình trong phòng riêng trên tầng hai."
# 【双鉄】
# JP: 「残念。間違えたか」
2006 = "「Tiếc thật. Mình đoán sai rồi sao.」"
# 【真闇】
# JP: 「残念なんは確かばい。\n間違ごーとらんけど、間違ごーとるけんねぇ」
2393 = "「Tiếc thật đấy.\nSai thì không sai, nhưng mà sai rồi nha.」"
# 【双鉄】
# JP: 「真闇姉まで謎かけか」
2373 = "「Đến cả chị Mayami cũng chơi trò giải đố\nsao.」"
# (独白)
# JP: 降参だ。
2901 = "Đầu hàng thôi."
# (独白)
# JP: 考えようとするより先に、\n両手が“お手上げ”を示してる。
3108 = "Chưa kịp suy nghĩ,\nhai tay tôi đã giơ lên \"đầu hàng\" rồi."
# 【双鉄】
# JP: 「今度はいったいどういう意味――」
2482 = "「Lần này rốt cuộc là có ý gì vậy——」"
# (独白)
# JP: 問えばすぐさま真闇姉は、\n人差し指をその口元に運び唇をいったん閉ざす。
2922 = "Vừa hỏi xong, chị Mayami liền\nđưa ngón trỏ lên miệng, ra hiệu im lặng."
# 【真闇】
# JP: 「――言えんね、双ちゃん。\n言うたらうちが、ひーちゃんに一生うらまれったい」
2484 = "「——Không nói được đâu, Sou-chan.\nNói ra thì chị sẽ bị Hii-chan hận cả đời\nmất.」"
# 【双鉄】
# JP: 「一生。それはたまらんな。\nならば聞くまい。自分で、おいおい考えてみよう」
1872 = "「Cả đời cơ à. Thế thì gay go thật.\nVậy em không hỏi nữa. Để em tự từ từ suy\nnghĩ xem sao.」"
# 【真闇】
# JP: 「そーね、それが良かったい」
2069 = "「Đúng rồi, thế là tốt nhất.」"
# (独白)
# JP: 微笑んで。視線を階段の上に送って、\n真闇姉は大げさなほどのため息をつく。
2827 = "Chị mỉm cười. Đưa mắt nhìn lên cầu thang,\nrồi chị Mayami thở dài một cách cường\nđiệu."
# 【真闇】
# JP: 「けぇど、こーなると困ってしまうねぇ。双ちゃんには、\nひーちゃんの部屋にひとまず落ち着いてもらおうと」
1934 = "「Nhưng mà, thành ra thế này thì kẹt thật.\nĐang định cho Sou-chan tạm thời ở phòng\ncủa Hii-chan cơ.」"
# 【日々姫】
# JP: 「無理ばい無理無理！　そぎゃんかこつは無理ったい！\nにぃにぃと同じ部屋なんてどぎゃんしても暮らせんけん」
1891 = "「Không được đâu, không được, không được!\nChuyện đó là không thể nào!\nỞ chung phòng với anh hai thì kiểu gì em\ncũng không sống nổi đâu.」"
# 【真闇】
# JP: 「ゆーても、昔は一緒の部屋で暮らしておったでしょお」
1927 = "「Nhưng mà, ngày xưa hai đứa từng ở chung\nphòng cơ mà.」"
# 【日々姫】
# JP: 「昔は昔、今は今！\nそぎゃんこつ、言うまでもなかろーもんっ！」
1923 = "「Ngày xưa là ngày xưa, bây giờ là bây giờ!\nChuyện đó không cần nói cũng biết mà!」"
# (独白)
# JP: ……十秒、二十秒、三十秒。
1550 = "……Mười giây, hai mươi giây, ba mươi giây."
# (独白)
# JP: 続く言葉がないとゆったり確かめてから、\n真闇姉はくるりと僕を向く。
3087 = "Sau khi từ tốn xác nhận không còn tiếng\nđáp lại nào nữa,\nchị Mayami quay ngoắt sang nhìn tôi."
# 【真闇】
# JP: 「ゆーことらしか。\nどぎゃんすっとね？　双ちゃん」
2090 = "「Có vẻ không được rồi.\nTính sao đây? Sou-chan.」"
# 【双鉄】
# JP: 「どうもこうも」
2530 = "「Chứ còn sao nữa.」"
# (独白)
# JP: 日々姫が無理だといっていることを、\n覆すなど、僕には出来ない。
3126 = "Chuyện Hibiki đã nói là không được,\ntôi không thể nào làm trái ý em ấy được."
# (独白)
# JP: いや、出来たとしても無理強いなどはしたくない。\n結論などはハナから一つだ。
2701 = "Không, dù có làm được tôi cũng không muốn\nép buộc em ấy.\nKết luận ngay từ đầu chỉ có một."
# 【双鉄】
# JP: 「僕の部屋など物置でも押入れでも構わない。\nああ、酒の倉庫は……できれば、勘弁して欲しいが」
2209 = "「Phòng của em thì nhà kho hay tủ âm tường\ncũng được.\nÀ, nhưng kho rượu thì……nếu được, xin hãy\ntha cho em.」"
# 【真闇】
# JP: 「帝都でも、お酒つようならんかったと？」
2079 = "「Lên Đế đô rồi mà tửu lượng vẫn không khá\nlên sao?」"
# 【双鉄】
# JP: 「飲まされはしたが、一向に。\nどうも[きゅうしゅう,1]九洲男児とは、体質からして異なるようだ」
2433 = "「Tuy bị ép uống, nhưng chẳng khá lên chút\nnào.\nCó vẻ như thể chất của em vốn đã khác với\nnam nhi Kyushu rồi.」"
# 【真闇】
# JP: 「なんね、つまらん。\nほんなら、[さかぐら,1]酒蔵まわりはよしとかんとねぇ」
1913 = "「Gì chứ, chán thế.\nVậy thì đành bỏ qua mấy chỗ quanh xưởng ủ\nrượu thôi.」"
# (独白)
# JP: そうつぶやいて、真闇姉は長い指を一本一本折っていく。
3053 = "Vừa lẩm bẩm, chị Mayami vừa gập từng ngón\ntay thon dài lại."
# (独白)
# JP: そしてぽおんと、\nまた間の抜けた音をたてつつ、両手を鳴らす。
3035 = "Rồi chị vỗ hai tay vào nhau,\nlại phát ra một âm thanh lạc lõng."
# 【真闇】
# JP: 「[じい,1]祖父様の部屋がよかったい」
1936 = "「Phòng của ông nội là hợp lý nhất đấy.」"
# 【双鉄】
# JP: 「[たいと,1]汰斗さんの？」
2321 = "「Phòng của ông Taito ạ?」"
# (独白)
# JP: 義祖父――汰斗さん――僕をこの家に引き取ってくれ、\n僕の生きる目的を定めてくれた、大恩人。
3218 = "Ông nội nuôi——ông Taito——đã nhận nuôi tôi\nvào căn nhà này,\nđịnh hình mục đích sống cho tôi, là một\nđại ân nhân."
# (独白)
# JP: その方の部屋に？　とこぼしてしまった驚きを、\n真闇姉は申し訳無さそうな顔で受け止める。
3125 = "Chị Mayami đón nhận vẻ ngạc nhiên thốt ra\ntừ tôi\nkhi nghe nói đến phòng của ông ấy bằng một\nvẻ mặt áy náy."
# 【真闇】
# JP: 「開かずの部屋になっとるけん。\n空気は悪かろうもんけど、ホントの物置よりはマシとや」
2537 = "「Căn phòng đó giờ thành phòng đóng kín\nrồi.\nKhông khí chắc sẽ tệ lắm, nhưng vẫn còn\nhơn nhà kho thực sự.」"
# 【双鉄】
# JP: 「汰斗さんの部屋なら光栄だ。\nよければ、案内して欲しい」
2418 = "「Được ở phòng của ông Taito thì thật vinh\nhạnh.\nNếu được, mong chị dẫn đường cho em.」"
# 【真闇】
# JP: 「そーね？　そんなら」
2256 = "「Vậy sao? Thế thì đi thôi.」"
# (独白)
# JP: 右田の家は、何代も続くクマ焼酎の蔵元だ。\n屋敷も庭もどこもかしこも、全てが古くとても広い。
2806 = "Nhà Migita là một xưởng ủ rượu shochu Kuma\ntruyền đời.\nCả dinh thự lẫn khu vườn, bất cứ đâu cũng\nđều rất cổ kính và vô cùng rộng lớn."
# (独白)
# JP: 引き取られ世話になっていた僕でも、\n足を踏み入れたことのない場所は、いくらでもある。
2779 = "Dù đã được nhận nuôi và chăm sóc ở đây,\nnhưng vẫn còn vô số nơi tôi chưa từng đặt\nchân đến."
# (独白)
# JP: （……真闇姉の部屋のさらに先――\n一番、奥まった部屋になるのか）
3220 = "（……Còn đi xa hơn cả phòng của chị Mayami\nnữa——\nLà căn phòng nằm tít trong cùng sao）"
# (独白)
# JP: 長い廊下の突き当り。
3195 = "Tận cùng của hành lang dài."
# (独白)
# JP: 重そうな錠をガチリと開き、\nごく無造作に、真闇姉は木の引き戸を開ける。
3057 = "Tiếng khóa nặng nề lạch cạch mở ra,\nchị Mayami cứ thế thản nhiên kéo cánh cửa\nlùa bằng gỗ."
# 【双鉄】
# JP: 「む――これは」
2485 = "「Hừm——Thế này thì」"
# (独白)
# JP: 蒸し暑い。ひどく。\nそうして、物で埋め尽くされてる。
3202 = "Nóng bức. Kinh khủng.\nVà còn ngập ngụa toàn là đồ đạc."
# 【真闇】
# JP: 「なんね、物置と変わらんばい。\n祖父様は、整理整頓せん人やったとやねぇ」
2359 = "「Trời ạ, chẳng khác gì nhà kho.\nÔng nội đúng là người không biết sắp xếp\ngọn gàng mà.」"
# 【双鉄】
# JP: 「いや――」
2286 = "「Không——」"
# (独白)
# JP: 荷物は山積み。だが、物置とはやはり違う。\n部屋に重なる物たちには、なにやら統一感がある。
3199 = "Đồ đạc chất thành núi. Nhưng quả thực vẫn\nkhác với nhà kho.\nNhững món đồ chồng chất trong phòng toát\nlên một sự đồng nhất khó tả."
# (独白)
# JP: 家人全てが思い思いに詰め込んでいったガラクタには、\nこの雰囲気は到底出せないものだろう。
2839 = "Những mớ hỗn độn do mọi người trong nhà\ntùy ý nhét vào,\nchắc chắn không thể tạo ra được bầu không\nkhí thế này."
# 【双鉄】
# JP: 「時間をかけて整頓すれば、かなり面白くなりそうだ。\nとはいえ……ひとまずは荷物を下ろす場所を作らねばな」
2422 = "「Nếu dành thời gian dọn dẹp lại, chắc sẽ\nthú vị lắm đây.\nTuy nói vậy……nhưng trước mắt phải tạo ra\nmột chỗ để hạ hành lý xuống đã.」"
# 【真闇】
# JP: 「確かに、こいじゃ窓も開けれんねぇ。\nああ、エアコンば手配せんとね」
2005 = "「Đúng thật, thế này thì cửa sổ cũng chẳng\nmở được.\nÀ, phải sắp xếp lắp máy lạnh nữa chứ.」"
# 【双鉄】
# JP: 「いや」
1888 = "「Không cần đâu.」"
# 【真闇】
# JP: 「双ちゃんのためだけじゃなかとよ？\nこん部屋ば整えば、他にも使いようはあるけん」
2003 = "「Đâu phải chỉ vì Sou-chan thôi đâu?\nDọn dẹp xong phòng này, còn có thể dùng\nvào việc khác nữa mà.」"
# 【双鉄】
# JP: 「うむ」
1574 = "「Ừm.」"
# (独白)
# JP: 完全に先回りされてしまった。
2715 = "Chị ấy đã hoàn toàn đi trước một bước."
# (独白)
# JP: さすがは、右田家の現当主――\n“クマの右田の女杜氏”だ。
2693 = "Không hổ danh là đương gia hiện tại của\nnhà Migita——\n\"Nữ trưởng hầm rượu nhà Migita xứ Kuma\"."
# 【双鉄】
# JP: 「ならば、そのときのため、今は汗をかくとしよう」
2555 = "「Vậy thì, vì lúc đó, bây giờ đành đổ mồ\nhôi vậy.」"
# (独白)
# JP: ともかく、廊下にものを出すか。
3091 = "Tóm lại, cứ mang đồ ra hành lang đã."
# (独白)
# JP: 方針を固め手を動かせば、途端、\n真闇姉が笑いを含んだ声を出す。
2913 = "Vừa định hình phương hướng và bắt tay vào\nlàm, ngay lập tức,\nchị Mayami cất giọng mang theo ý cười."
# 【真闇】
# JP: 「双ちゃん、片付けの手が足りんと？」
2103 = "「Sou-chan, thiếu người phụ dọn dẹp hả?」"
# 【双鉄】
# JP: 「いや。　一人でも夜……\n明日の朝までにはなんとか出来るようには思う」
2324 = "「Không. Dù chỉ một mình thì đến đêm……\ntừ giờ đến sáng mai chắc cũng lo liệu xong\nthôi.」"
# 【真闇】
# JP: 「ほーたら、手伝いはいらんと？」
2154 = "「Thế là, không cần người giúp sao?」"
# 【双鉄】
# JP: 「いらんとまでは。\nいてくれれば助かることは間違いない」
1904 = "「Cũng không đến mức không cần.\nCó người giúp thì chắc chắn sẽ đỡ hơn\nnhiều.」"
# (独白)
# JP: 瞬間、にやりといたずらな笑み。\nそして真闇姉は、ことさらな大声を張り上げる。
3062 = "Ngay lập tức, một nụ cười tinh quái thoáng\nqua.\nRồi chị Mayami cố tình cất giọng thật lớn."
# 【真闇】
# JP: 「『ふーん、双ちゃんは片付けの手伝いを探しとるんねー、\n誰かおるかねぇ、双ちゃんの荷解き手伝ぉて』」
1569 = "「『Hừm, Sou-chan đang tìm người phụ dọn dẹp\nnè,\ncó ai ở đó không, giúp Sou-chan dỡ hành lý\nvới』」"
# (独白)
# JP: （トトトトトト）
3237 = "（Bịch bịch bịch bịch bịch bịch）"
# (独白)
# JP: 軽やかな音。
3155 = "Một âm thanh nhẹ nhàng."
# (独白)
# JP: 軽やかすぎて一瞬そうとは気づけ無かった、\nそれは階段を駆け下りる音。
3188 = "Quá đỗi nhẹ nhàng khiến tôi nhất thời\nkhông nhận ra,\nđó là tiếng bước chân chạy vội xuống cầu\nthang."
# 【日々姫】
# JP: 「にぃにぃ、手伝おて欲しかと？」
2575 = "「Anh hai, cần người giúp không?」"
# (独白)
# JP: 手伝いの手はもちろん欲しいし、\n日々姫と妙にこじれることを望みもしない。
3036 = "Đương nhiên là tôi cần người giúp,\nvà tôi cũng không muốn quan hệ với Hibiki\ntrở nên rắc rối một cách kỳ cục."
# 【双鉄】
# JP: 「手伝ってもらえれば助かる」
1949 = "「Em giúp thì đỡ cho anh quá.」"
# (独白)
# JP: だからそこまで素直に言えば、\n出した言葉が、記憶をも引きずり出してくる。
3027 = "Thế nên khi tôi thành thật nói ra điều đó,\nchính những lời ấy đã gợi lại cả những ký\nức xưa."
# 【双鉄】
# JP: 「昔から日々姫は、こうしたセンスに優れているからな。\n居心地良い部屋に整えなおしてくれれば嬉しい」
2207 = "「Từ xưa Hibiki đã có khiếu trong mấy việc\nnày rồi mà.\nNếu em có thể dọn dẹp lại thành một căn\nphòng thoải mái thì anh vui lắm.」"
# (独白)
# JP: 弾ける笑顔。\n胸が張られる。
2999 = "Một nụ cười rạng rỡ.\nLồng ngực ưỡn lên đầy tự hào."
# 【日々姫】
# JP: 「まかせんしゃ――ん、ん、ん。\n兄さん、わたしにお任せください」
2223 = "「Cứ giao cho e——ưm, ưm, ưm.\nAnh trai, cứ giao cho em đi ạ.」"
# (独白)
# JP: コホンと小さく咳払い。\nそして日々姫は、前のめりになってた姿勢を整える。
3154 = "Khẽ hắng giọng.\nRồi Hibiki chỉnh lại tư thế đang rướn\nngười về phía trước."
# 【日々姫】
# JP: 「わたしもいろいろあれから成長したんですから。\n兄さんのお部屋、素敵に仕上げてみせます」
2134 = "「Từ dạo ấy em cũng đã trưởng thành nhiều\nmặt rồi.\nPhòng của anh trai, em sẽ trang hoàng lại\nthật tuyệt cho xem.」"
# 【真闇】
# JP: 「ほんならね、うちは\x%l醸造蔵;#00ffc040;[じょうぞうぐら,2]醸造蔵%l;#;にもどるけん」
2444 = "「Vậy nha, chị quay lại \\x%l醸造蔵;#00ffc040;nhà xưởng ủ rượu%l;#;\nđây.」"
# (独白)
# JP: ひらり手を振り立ち去りかけて、\n真闇姉はまた手を打ち鳴らし、僕らへ一度振り返る。
3058 = "Vừa phẩy tay định rời đi,\nchị Mayami lại vỗ tay một cái, quay lại\nnhìn chúng tôi."
# 【真闇】
# JP: 「祖父様の部屋は[ふたま,1]二間続きになっとるけんねぇ。\nどっちも双ちゃんの好きにつこうてもろうてよかったい」
2346 = "「Phòng của ông nội gồm hai gian liền nhau\nđấy.\nSou-chan cứ dùng cả hai gian theo ý thích\nnhé.」"
# (独白)
# JP: 目の前に本。\n圧倒的な本の山。
3066 = "Sách ở ngay trước mắt.\nMột núi sách đồ sộ."
# (独白)
# JP: とにかくこれを片付けなければ、足の踏み場にも苦労する。
3090 = "Dù sao thì nếu không dọn dẹp đống này, đến\nchỗ đặt chân cũng khó."
# 【双鉄】
# JP: 「よ……っと。うむ。\n次はこれだな――日々姫、すまんが廊下に頼む」
2478 = "「Xong……một món. Ừm.\nTiếp theo là cái này——Hibiki, phiền em\nmang ra hành lang nhé.」"
# 【日々姫】
# JP: 「はい……う――ん、\n本って、ほんとに重いですねぇ――ん」
2093 = "「Vâng……ư——m,\nSách đúng là nặng thật đấy nhỉ——ưm.」"
# 【双鉄】
# JP: 「頑張れ頑張れ。\n成長したところを見せてくれるんだろう？」
1981 = "「Cố lên cố lên.\nChẳng phải em định cho anh thấy sự trưởng\nthành của mình sao?」"
# 【日々姫】
# JP: 「それは……まぁ……体力的にも――\nさすがに――成長……してますけど――んっ」
2518 = "「Chuyện đó thì……ừm……về mặt thể lực——\nQuả thực——cũng có trưởng thành……thật\nđấy——ưm.」"
# (独白)
# JP: “磨いたセンスを見せたいのに”と、\n口ではぼやいてみせつつやはり、日々姫は日々姫だ。
3200 = "「Chuyện đó thì……ừm……về mặt thể lực——\nQuả thực——cũng có trưởng thành……thật\nđấy——ưm.」"
# (独白)
# JP: こつこつ地道にひとつずつ、投げ出すことなく、\n僕から受けとる段ボールを、廊下に綺麗に詰み並べてく。
2825 = "Dù ngoài miệng càu nhàu \"Rõ ràng là muốn\ncho anh thấy gu thẩm mỹ đã được rèn giũa\ncơ mà\",\nnhưng quả nhiên, Hibiki vẫn là Hibiki."
# 【双鉄】
# JP: 「よし――これで。\nうむ、どうやら畳が見えるようになったな」
2491 = "「Tốt——thế này là xong.\nỪm, có vẻ như đã nhìn thấy chiếu tatami\nrồi.」"
# 【日々姫】
# JP: 「ですね。なら次はこの[かざ]飾り[だんす,1]箪笥。それから押入れです。\n開けて不要品をどかせば、本をしまえるようになります」
2260 = "「Đúng vậy. Tiếp theo là chiếc tủ trang trí\nnày. Sau đó là tủ âm tường.\nMở ra và dọn bớt đồ không cần thiết đi, là\ncó thể cất sách vào được rồi.」"
# 【双鉄】
# JP: 「よし。ならばまずは――うおっ！」
2528 = "「Được. Vậy thì trước tiên——uây!」"
# 【日々姫】
# JP: 「な、なにしてるんですか、兄さんっ――\nこほっ！　けほっ！」
1951 = "「A-Anh đang làm gì vậy hả, anh trai——\nKhụ! Khụ!」"
# (独白)
# JP: ホコリが舞う、などという言葉は全く足りない。\nホコリが固まり“面”を構成するに至った――
1539 = "Bụi bay mù mịt, dùng từ đó thôi thì hoàn\ntoàn không đủ.\nBụi đã đóng cục lại tạo thành một \"mảng\"\nluôn rồi——"
# (独白)
# JP: その“面”が飾り箪笥の上から垂れ込めて、\n僕と日々姫を頭からすっぽり飲み込んでいく。
3175 = "Bụi bay mù mịt, dùng từ đó thôi thì hoàn\ntoàn không đủ.\nBụi đã đóng cục lại tạo thành một \"mảng\"\nluôn rồi——"
# 【双鉄】
# JP: 「これは――これは、たまらんっ！」
2486 = "\"Mảng\" bụi đó rơi xuống từ nóc tủ trang\ntrí,\nnuốt chửng lấy tôi và Hibiki từ đầu đến\nchân."
# 【日々姫】
# JP: 「ハタキです！　\nハタキを使って、ひとまずホコリを散らしましょう！」
2219 = "「Thế này thì——thế này thì, chịu sao thấu!」"
# (独白)
# JP: 目も開けられぬが気配は感じる。
3068 = "Dù không mở nổi mắt nhưng tôi vẫn cảm nhận\nđược động tĩnh."
# (独白)
# JP: 日々姫はなにやらじたばたと、\nかなり大きく動いて空気をかき乱――
2982 = "Hibiki đang cuống cuồng làm gì đó,\ncử động khá mạnh làm không khí xáo trộ——"
# (独白)
# JP: （ガシャンっ！！！！！！！）
3247 = "（Choang!!!!!!!）"
# 【日々姫】
# JP: 「きゃあああっ！？」
2017 = "「Á á á!?」"
# 【双鉄】
# JP: 「日々姫っ！？　――っと」
2239 = "「Hibiki!? ——Khoan đã.」"
# (独白)
# JP: ――美しい――\nその言葉だけが、目から脳へと突き抜けていく。
2822 = "——Đẹp quá——\nChỉ từ đó thôi đã xuyên thẳng từ mắt lên\nnão tôi."
# 【日々姫】
# JP: 「どぎゃんして……\nどぎゃんして、じぃじの部屋にお[にんぎょ,1]人形なんて」
2332 = "「Tại sao……\nTại sao trong phòng ông nội lại có búp bê\nchứ.」"
# 【双鉄】
# JP: 「ああ」
2054 = "「A.」"
# (独白)
# JP: 泣きそうな声。\nやるべきことを、それでどうにか思い出す。
3186 = "Giọng nói như sắp khóc.\nNhờ đó tôi mới sực nhớ ra việc mình cần\nlàm."
# 【双鉄】
# JP: 「日々姫、無事か？　怪我はないか？」
2244 = "「Hibiki, em không sao chứ? Có bị thương\nkhông?」"
# (独白)
# JP: 両手を両手でつかみ、ながめる。\n手から腕には、どうやら傷などない様子だが――
2924 = "Tôi dùng hai tay nắm lấy hai tay em ấy,\nxem xét cẩn thận.\nTừ bàn tay đến cánh tay có vẻ không có vết\nthương nào, nhưng——"
# 【日々姫】
# JP: 「ひゃうっ！？　ひゃ、あっ――平気！　平気ったい！\nあ！　その、無事です、怪我はありません」
2018 = "「Hyaa!? Hya, á——Không sao! Không sao đâu!\nA! Ý em là, em không sao, không bị thương\nđâu ạ.」"
# 【双鉄】
# JP: 「ならなによりだ」
2531 = "「Vậy thì tốt rồi.」"
# (独白)
# JP: 無事だというなら見るべきものは変わってくる。
3078 = "Nếu em ấy không sao thì thứ cần nhìn sẽ\nthay đổi."
# (独白)
# JP: 日々姫の手から指を離して、\nホウキとチリトリに持ち換える。
2907 = "Tôi buông ngón tay khỏi tay Hibiki,\nđổi sang cầm chổi và hót rác."
# 【双鉄】
# JP: 「日々姫は少し離れていろ。\nなに、割れ物の処理になら慣れている」
2238 = "「Hibiki lùi ra xa một chút đi.\nKhông sao đâu, anh quen xử lý đồ dễ vỡ\nrồi.」"
# 【日々姫】
# JP: 「そうなんですか？　\nって、兄さん。割っちゃダメじゃないですか」
2273 = "「Vậy ạ?\nMà này, anh trai. Đâu có được làm vỡ đồ\nchứ.」"
# (独白)
# JP: これは言葉が足りなかったか。
3006 = "Do tôi nói chưa rõ ý sao."
# (独白)
# JP: 仕事の――酒問屋の方の手伝いで、\nそうした失敗を重ねていると思わせてしまったらしい。
2815 = "Có vẻ em ấy tưởng tôi thường xuyên làm vỡ\nđồ\ntrong lúc phụ giúp công việc ở đại lý\nrượu."
# 【双鉄】
# JP: 「いや、僕ではない。無論、[ちち,1]義父でも。\n仕事ではなく、大学で――な」
1894 = "「Không, không phải anh. Tất nhiên cũng\nkhông phải cha nuôi.\nKhông phải trong công việc, mà là ở trường\nđại học——cơ.」"
# 【日々姫】
# JP: 「帝大で？」
2123 = "「Ở Đại học Đế quốc ạ?」"
# 【双鉄】
# JP: 「[そこつもの,2]粗忽者の友人がいるのだ。\n粗忽ですぐにものを壊すが、驚くほどに賢い男だ」
2186 = "「Anh có một cậu bạn khá hậu đậu.\nCậu ta hậu đậu nên hay làm hỏng đồ, nhưng\nlại là một gã thông minh đến đáng kinh\nngạc.」"
# 【日々姫】
# JP: 「それはそうなのでは――\nその方もつまり、帝大生なんですよね？」
2492 = "「Thì cũng phải thôi——\nNgười đó tóm lại cũng là sinh viên Đại học\nĐế quốc mà nhỉ?」"
# 【双鉄】
# JP: 「勉強うんぬんという話ではない。\n一を聞いて百を知るというか――うむ。これでどうだ」
1953 = "「Không phải chuyện học hành đâu.\nPhải nói là nghe một hiểu mười ấy——Ừm. Thế\nnày là được rồi.」"
# 【日々姫】
# JP: 「わ、本当に手早いですね。見事です」
2029 = "「Oa, anh dọn nhanh thật đấy. Tuyệt quá.」"
# 【双鉄】
# JP: 「確かに、見事だ」
2396 = "「Đúng là tuyệt thật.」"
# (独白)
# JP: ……割れ散らばったガラスを除ければ、\n視界をわずらわすものが無くなる。
1552 = "……Sau khi dọn sạch những mảnh kính vỡ vụn,\nkhông còn gì cản trở tầm nhìn nữa."
# 【双鉄】
# JP: 「まるで生きているような人形だな。\n精巧で……魅入られそうに美しい」
2479 = "「Một con búp bê cứ như đang sống vậy.\nTinh xảo……và đẹp đến mê hồn.」"
# 【日々姫】
# JP: 「兄さん、人形に興味があるんですか？」
2043 = "「Anh trai, anh có hứng thú với búp bê\nsao?」"
# 【双鉄】
# JP: 「昔はふたごだったからな。\n興味も、いつしか共有するようになってしまった」
2077 = "「Ngày xưa anh có một đứa em sinh đôi mà.\nNên không biết từ lúc nào, sở thích cũng\ntrở nên giống nhau.」"
# 【日々姫】
# JP: 「あ――」
2050 = "「A——」"
# 【双鉄】
# JP: 「しかし、見事だ。\nこれほどの人形は見たことが――いや？」
2013 = "「Nhưng mà, tuyệt thật.\nAnh chưa từng thấy con búp bê nào như thế\nnày——khoan đã?」"
# 【日々姫】
# JP: 「兄さん？」
2044 = "「Anh trai?」"
# (独白)
# JP: 似ているものを、\n確かに昔、どこかで見たことがあるような気がする。
3092 = "Hình như ngày xưa,\ntôi đã từng thấy thứ gì đó tương tự ở đâu\nrồi thì phải."
# (独白)
# JP: あれは――果たしてどこでだったか――\nおや？
3184 = "Đó là——rốt cuộc là ở đâu nhỉ——\nỦa?"
# 【双鉄】
# JP: 「手、なにかにぎりこんでいるな」
2096 = "「Tay nó đang nắm chặt thứ gì đó thì phải.」"
# 【日々姫】
# JP: 「本当ですね。これは――鍵？」
2365 = "「Đúng thật. Đây là——chìa khóa sao?」"
# 【双鉄】
# JP: 「どれ」
2187 = "「Để anh xem.」"
# (独白)
# JP: ちいさなちいさな手を開く。\nその中に、鈍く輝く金色の――
2905 = "Tôi mở bàn tay nhỏ xíu ấy ra.\nBên trong, một vật màu vàng xỉn đang phát\nsáng——"
# 【双鉄】
# JP: 「確かに鍵だ。ゼンマイ鍵のようだが」
2392 = "「Đúng là chìa khóa. Có vẻ là chìa khóa lên\ndây cót.」"
# 【日々姫】
# JP: 「ほーたら！　この子動くと？　ゼンマイ人形とや？」
2548 = "「Thế thì! Đứa bé này cử động được sao? Là\nbúp bê lên dây cót à?」"
# 【双鉄】
# JP: 「ならば鍵穴があるはずだ」
2547 = "「Nếu vậy chắc chắn phải có lỗ cắm chìa.」"
# 【日々姫】
# JP: 「ぴゃあああっ！？」
2921 = "「Hyaaaa!?」"
# (独白)
# JP: 人形の服をはだけた瞬間、\n日々姫が妙な声をだす。
2297 = "Khoảnh khắc tôi cởi áo búp bê ra,\nHibiki thốt lên một âm thanh kỳ quặc."
# 【双鉄】
# JP: 「そこまで驚くようなことか？　ああ――確かに、\nここまで緻密に作り込まれた人形は珍しいかもしれんが」
1900 = "「Có đáng ngạc nhiên đến vậy không? À——Đúng\nlà,\nmột con búp bê được chế tác tỉ mỉ đến mức\nnày có lẽ rất hiếm thấy.」"
# 【日々姫】
# JP: 「いえ、そこではなく」
2553 = "「Không, không phải chuyện đó.」"
# 【双鉄】
# JP: 「ならばこれか？\nこちらも変わった首飾りだが」
2056 = "「Vậy là cái này sao?\nĐây cũng là một sợi dây chuyền kỳ lạ.」"
# 【日々姫】
# JP: 「あああっ！　いけんっ！！\nそぎゃん、舐め回すみたいに見たら！」
1879 = "「Á á á! Không được!!\nĐừng có nhìn kiểu liếm láp khắp người như\nthế chứ!」"
# 【双鉄】
# JP: 「いかんのか？\nしかし、じっくり見ねば鍵穴を見つけられんだろう」
2287 = "「Không được sao?\nNhưng nếu không nhìn kỹ thì sao tìm thấy\nlỗ cắm chìa được.」"
# 【日々姫】
# JP: 「それはそう――ですけど、人形がまるで人間みたいで。\nだから、いかがわしい感じに、少しだけ見えてしまって」
1986 = "「Đúng là vậy——nhưng mà, con búp bê này\ntrông hệt như con người vậy.\nThế nên, trông có chút... hơi mờ ám.」"
# 【双鉄】
# JP: 「なるほど。寝入っている女性の服をはだけているなら、\nいかがわしいにもほどがある。が――」
2725 = "「Ra là vậy. Nếu cởi áo một người phụ nữ\nđang ngủ say,\nthì đúng là mờ ám không còn gì để nói.\nNhưng mà——」"
# (独白)
# JP: 手を止めず、人形のスカートを外してしまう。\n今度は、日々姫も声を出さない。
2769 = "Tay không dừng lại, tôi cởi luôn chiếc váy\ncủa búp bê.\nLần này, Hibiki cũng không thốt lên tiếng\nnào nữa."
# (独白)
# JP: 前側、それから後ろ側……\nじっくり見ても、どこにも鍵穴が見当たらない。
1909 = "Phía trước, rồi đến phía sau……\nDù có nhìn kỹ thế nào cũng không thấy lỗ\ncắm chìa đâu."
# 【双鉄】
# JP: 「――人形は人形、物は物だ。\nどれほど人に似せていようと、人とは異なる」
2289 = "「——Búp bê là búp bê, đồ vật là đồ vật.\nDù có làm giống người đến đâu thì vẫn khác\nvới con người.」"
# 【日々姫】
# JP: 「はい、それはわかっているのですが」
2302 = "「Vâng, em hiểu điều đó chứ.」"
# 【双鉄】
# JP: 「人形に思い入れるものだな。女の子というものは」
3149 = "「Con gái đúng là dễ nảy sinh tình cảm với\nbúp bê nhỉ.」"
# (独白)
# JP: 路子も――妹もそうだった。
2792 = "Michiko——em gái tôi cũng vậy."
# (独白)
# JP: 人形を少し手荒にあつかうと、\nムキになって、泣き出さんばかりに怒ったものだ。
1930 = "Chỉ cần đối xử với búp bê hơi thô bạo một\nchút,\ncon bé sẽ làm ầm lên, tức giận đến mức\nphát khóc."
# 【双鉄】
# JP: 「しかしどこにも鍵穴が無いな。\nいや――そうか、もしかしてこの下」
2016 = "「Nhưng mà chẳng thấy lỗ cắm chìa ở đâu cả.\nKhoan đã——đúng rồi, lẽ nào là ở bên dưới\ncái này.」"
# 【日々姫】
# JP: 「ぴゃああああああっ！！！」
2898 = "「Hyaaaaaa!!!」"
# (独白)
# JP: 下着に指をかけた瞬間、日々姫の悲鳴。
2914 = "Khoảnh khắc tôi chạm ngón tay vào đồ lót,\nHibiki hét lên thảm thiết."
# (独白)
# JP: 耳が一瞬キンとなる。\n日々姫が素早く、僕から人形を奪い取る。
1876 = "Tai tôi ù đi trong chốc lát.\nHibiki nhanh như chớp giật lấy con búp bê\ntừ tay tôi."
# 【日々姫】
# JP: 「イケンばいイケンばいっ！\nそこば見るなら、うちが見ったい」
2841 = "「Không được không được!\nNếu phải xem chỗ đó, thì để em xem.」"
# 【双鉄】
# JP: 「そうか？」
2560 = "「Vậy sao?」"
# (独白)
# JP: そこまで日々姫が主張するなら、\n僕は手を引き、任せよう。
2190 = "Nếu Hibiki đã nằng nặc đòi như vậy,\ntôi đành buông tay và giao cho em ấy vậy."
# 【双鉄】
# JP: 「なら、頼む。\nくれぐれも鍵穴を見落とさんようにな」
2856 = "「Vậy thì nhờ em.\nNhớ đừng có bỏ sót lỗ cắm chìa đấy nhé.」"
# 【日々姫】
# JP: 「わかっとるけん！　向こうむいとって――ん？」
1999 = "「Em biết rồi! Anh quay mặt đi chỗ khác\nđi——hửm?」"
# (独白)
# JP: 剥がした服を集めなおして――\n瞬間、日々姫が指を止め僕の顔を見る。
2156 = "Thu gom đống quần áo vừa bị cởi ra——\nKhoảnh khắc ấy, Hibiki dừng tay và nhìn\nmặt tôi."
# 【日々姫】
# JP: 「ポケット？　なにか――あっ！？\nにぃに――兄さんっ、これじゃないですか？」
2816 = "「Túi áo? Có thứ gì——A!?\nAnh hai——anh trai, có phải cái này không?」"
# 【双鉄】
# JP: 「懐中時計か！　なるほど、でかしたぞ日々姫」
2794 = "「Đồng hồ quả quýt sao! Ra là vậy, làm tốt\nlắm Hibiki.」"
# (独白)
# JP: 人形の上着の胸ポケットの、\nこれまた小さな懐中時計。
3245 = "Nằm trong túi ngực áo khoác của búp bê,\nlại là một chiếc đồng hồ quả quýt vô cùng\nnhỏ bé."
# (独白)
# JP: そこにゼンマイの鍵を当てれば――
1980 = "Nếu tra chìa khóa lên dây cót vào đó——"
# (独白)
# JP: （かちり）
3246 = "（Lạch cạch）"
# 【双鉄】
# JP: 「はまる、な。しかし……小さすぎて、これは……\n壊してしまいそうで……んっ」
2084 = "「Khớp rồi. Nhưng mà……nhỏ quá, thế này……\nCảm giác như sắp làm hỏng nó vậy……ưm.」"
# (独白)
# JP: （キチチチチ……キチチチチ……）
2447 = "（Kích kịch kịch kịch……Kích kịch kịch\nkịch……）"
# 【双鉄】
# JP: 「よし！　回った！　イケるっ！」
2049 = "「Tốt! Xoay được rồi! Được rồi!」"
# 【ハチロク】(？？？)
# JP: 「何が、いけるのでございましょうか？」
1946 = "「Cái gì được cơ ạ?」"
# 【双鉄】
# JP: 「ん？」
2072 = "「Hửm?」"
# 【ハチロク】(？？？)
# JP: 「それでも[ヒノモトダンジ,4]日ノ本男子ですか！\n恥じ入りなさいっ！！」
3248 = "「Thế mà cũng tự xưng là nam nhi Hinomoto\nsao!\nHãy biết xấu hổ đi!!」"
# 【双鉄】
# JP: 「おお、すごいな」
2057 = "「Ồ, tuyệt thật.」"
# (独白)
# JP: （スカっ！）
1880 = "（Vút!）"
# 【ハチロク】(？？？)
# JP: 「きゃあっ！」
2439 = "「Á!」"
# 【双鉄】
# JP: 「おっと、転ぶぞ？　動きには気をつけろ」
2939 = "「Ối chà, ngã bây giờ? Cử động phải cẩn\nthận chứ.」"
# 【ハチロク】(？？？)
# JP: 「あ、あなたが平手打ちを躱さなければっ！」
2243 = "「Tại, tại anh né cái tát của tôi đấy chứ!」"
# (独白)
# JP: 小さな体を受け止め大きく驚かされる。
2577 = "Đỡ lấy cơ thể nhỏ bé ấy, tôi vô cùng kinh\nngạc."
# 【双鉄】
# JP: 「日々姫、すごいぞ。\nこの人形、体温があるし、震えてまでいる」
2114 = "「Hibiki, tuyệt quá.\nCon búp bê này có cả thân nhiệt, lại còn\nđang run rẩy nữa.」"
# 【日々姫】
# JP: 「にぃに、その震え、怒っとーから――って、え！？」
2850 = "「Anh hai, run rẩy là vì nó đang tức giận\nđó——ủa, hả!?」"
# 【双鉄】
# JP: 「なんと、泣きまでするのか」
2175 = "「Trời ạ, nó còn biết khóc nữa cơ à.」"
# (独白)
# JP: ぽろぽろぼたぼた、熱い雫をこぼし、\n人形は、けれど大きく首を振る。
2425 = "Những giọt nước nóng hổi lã chã tuôn rơi,\nnhưng con búp bê lại lắc đầu nguầy nguậy."
# 【ハチロク】(？？？)
# JP: 「泣いてなどおりませぬ！\nこれは、単なる\x%l蒸気排水;#00ffc040;蒸気排水%l;#;です！！」
2840 = "「Tôi không có khóc!\nĐây chỉ đơn thuần là \\x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#;\nthôi!!」"
# 【双鉄】
# JP: 「ジョウキハイスイ？」
2730 = "「Xả nước ngưng hơi nước?」"
# (独白)
# JP: 言葉の意味を一番単純に考えるなら、\n蒸気の排水ということになろうが……
2483 = "Nếu suy nghĩ ý nghĩa từ ngữ một cách đơn\ngiản nhất,\nthì là xả nước ngưng tụ từ hơi nước ra……"
# (独白)
# JP: この人形は、ゼンマイ動力で動いているし――
2173 = "Nhưng con búp bê này đang chạy bằng dây\ncót mà——"
# 【双鉄】
# JP: 「どういうことだ、それは？」
2591 = "「Thế nghĩa là sao?」"
# 【ハチロク】(？？？)
# JP: 「それをお聞きしたいのはこちらです！\nいったい、これはどういうことなのですか！」
3121 = "「Đó là điều tôi muốn hỏi anh mới đúng!\nRốt cuộc chuyện này là sao hả!」"
# 【双鉄】
# JP: 「！」
3172 = "「!」"
# (独白)
# JP: 見上げられ、肺が、勝手に息を飲む。
2220 = "Bị ngước lên nhìn, phổi tôi tự động nín\nthở."
# (独白)
# JP: \x%l蒸気排水;#00ffc040;蒸気排水%l;#;などでは、無い。\nこれは、涙だ。まぎれなく。この人形は――泣いている。
2211 = "Không phải là \\x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#; gì\ncả.\nĐây là nước mắt. Không thể nhầm lẫn được.\nCon búp bê này——đang khóc."
# 【ハチロク】(？？？)
# JP: 「乙女の服を勝手に脱がし、人形だなんだと愚弄して。\nおまけに、その怒りまでを躱して笑いっ」
2903 = "「Tự tiện cởi áo của thiếu nữ, rồi còn gọi\nlà búp bê này nọ để trêu cợt.\nĐã thế, còn né tránh cơn thịnh nộ của\nngười ta rồi cười nhạo nữa chứ.」"
# 【双鉄】
# JP: 「すまん。大きな誤解をしていた」
2193 = "「Xin lỗi. Tôi đã hiểu lầm tai hại.」"
# (独白)
# JP: 頭を下げる。\n深く、深くに。
2581 = "Tôi cúi đầu.\nCúi thật sâu, thật sâu."
# 【双鉄】
# JP: 「物にも二種類があることを、僕は確かに知っている。\nお前にはナビと同様――本物の知性があるのだな？」
2550 = "「Tôi quả thực biết rằng đồ vật cũng có hai\nloại.\nCô cũng giống như Navi——sở hữu trí tuệ\nthực sự nhỉ?」"
# 【ハチロク】(？？？)
# JP: 「そのナビ様がどこのどなたかは存じませぬが――\nわたくしに知性があることは確かです」
3251 = "「Tuy tôi không biết ngài Navi đó là vị nào\nở đâu——\nNhưng việc tôi có trí tuệ là sự thật.」"
# 【双鉄】
# JP: 「ならばお前は、意志をもち誇りを持つものだ。\nそうして僕は、愚かにもそれを傷つけた」
2846 = "「Nếu vậy, cô là một thực thể có ý chí và\nlòng kiêu hãnh.\nVà tôi đã ngu ngốc làm tổn thương điều\nđó.」"
# (独白)
# JP: ナビは頑なに否定する。\nが、ナビには意志も誇りもある。
2170 = "Navi luôn ngoan cố phủ nhận.\nNhưng, Navi cũng có ý chí và lòng kiêu\nhãnh."
# (独白)
# JP: そう信じ、それに救われてさえいる僕が、\n物の持つ意志を、誇りを――否定するなどしてはならない。
2564 = "Là một người tin vào điều đó, và thậm chí\ncòn được cứu rỗi bởi điều đó,\ntôi tuyệt đối không được phủ nhận ý chí,\nlòng kiêu hãnh——mà đồ vật sở hữu."
# 【双鉄】
# JP: 「僕は自分が間違っていたことを全面的に謝罪する。\nもし可能なら、やりなおさせて欲しいとも願う」
2133 = "「Tôi thành thật xin lỗi vì những sai lầm\ncủa mình.\nNếu có thể, tôi mong cô cho phép tôi được\nlàm lại.」"
# 【ハチロク】(？？？)
# JP: 「やりなおす――何を、でしょうか？」
2490 = "「Làm lại——Làm lại cái gì cơ ạ?」"
# 【双鉄】
# JP: 「最初から……そうだな、お前……君の怒りを、\n僕が躱してしまった過ち、そこからを」
2910 = "「Từ lúc đầu……Phải rồi, sai lầm khi tôi né\ntránh\ncơn thịnh nộ của cô……bắt đầu từ đó.」"
# 【ハチロク】(？？？)
# JP: 「そうですか。でしたら、頬を下げてください」
3241 = "「Vậy sao. Nếu vậy, xin hãy hạ má xuống.」"
# (独白)
# JP: 言われるままに顔を下げれば、\n目と目が、至近距離からぶつかる。
2790 = "Làm theo lời cô ấy hạ mặt xuống,\nánh mắt chúng tôi chạm nhau ở cự ly cực\ngần."
# (独白)
# JP: （ああ……美しいのは顔のつくりだけでは無いのか）
2836 = "（A……vẻ đẹp không chỉ nằm ở cấu tạo khuôn\nmặt sao）"
# (独白)
# JP: 意志をもつものだけが放ち得る、強い輝き。
3242 = "Ánh sáng rực rỡ mãnh liệt, thứ chỉ có\nnhững thực thể mang ý chí mới có thể tỏa\nra."
# (独白)
# JP: 最初からこれを認めていれば、\n“人形”として扱うなどと、できようもなかった。
3211 = "Nếu ngay từ đầu tôi nhận ra điều này,\nthì đã không đối xử với cô ấy như một \"con\nbúp bê\"."
# (独白)
# JP: （パンっ！）
2937 = "（Bốp!）"
# (独白)
# JP: 大きな音。小さな痛み。
2150 = "Âm thanh lớn. Cơn đau nhỏ."
# (独白)
# JP: 真っ赤になった手を抑え、\n意志もつ物はわずかに頷き、そしてふふふと笑いをこぼす。
3156 = "Ôm lấy bàn tay đỏ ửng,\nthực thể mang ý chí ấy khẽ gật đầu, rồi\nbật cười khúc khích."
# 【ハチロク】(？？？)
# JP: 「奇妙な方ですね、あなたは。\n奇妙ですが、どうやら話は通じそうです」
2514 = "「Anh thật kỳ lạ.\nKỳ lạ, nhưng có vẻ là người hiểu chuyện.」"
# (独白)
# JP: コホン、と控えめな咳払い。\n日々姫がすっと近づいてきて、小さな耳へと唇を寄せる。
2443 = "E hèm, một tiếng hắng giọng nhè nhẹ.\nHibiki tiến lại gần, ghé môi vào đôi tai\nnhỏ bé ấy."
# 【日々姫】
# JP: 「あの……あなた――服、整えなおした方がよかばい」
2352 = "「Này……cô——tốt nhất là nên chỉnh đốn lại\nquần áo đi.」"
# 【ハチロク】(？？？)
# JP: 「左様ですね。ご助言、ありがとうございます。\n――すみませんが、後ろを向いていていただけますか？」
3119 = "「Đúng vậy nhỉ. Cảm ơn cô đã nhắc nhở.\n——Xin lỗi, anh có thể quay lưng lại được\nkhông?」"
# 【双鉄】
# JP: 「無論だ」
2896 = "「Tất nhiên rồi.」"
# (独白)
# JP: シュ、シュと小気味良い衣擦れの音。
2212 = "Tiếng sột soạt vui tai của quần áo cọ xát\nvào nhau."
# (独白)
# JP: もたもた着替えた路子のことが思い出されて、\n“着慣れているな”と、そんな言葉が浮き上がってくる。
2325 = "Nhớ lại bộ dạng lóng ngóng thay đồ của\nMichiko,\nnhững từ như \"quen mặc quá nhỉ\" chợt nảy\nra trong đầu tôi."
# 【ハチロク】(？？？)
# JP: 「すみません。お待たせいたしました」
2027 = "「Xin lỗi. Đã để anh phải đợi.」"
# 【双鉄】
# JP: 「いや、待ったというほど――おお」
2544 = "「Không, cũng chưa lâu lắm——ồ.」"
# 【日々姫】
# JP: 「わぁ！　似合う～～　綺麗～～」
3239 = "「Oa! Hợp quá~~ Đẹp quá~~」"
# 【ハチロク】(？？？)
# JP: 「左様でしょうね。\nそのように、わたくしは作られておりますから」
2942 = "「Đúng vậy nhỉ.\nBởi vì tôi được tạo ra như thế mà.」"
# (独白)
# JP: （ピっ）
2936 = "（Bật）"
# (独白)
# JP: 整った服で見事な敬礼。
2182 = "Trang phục chỉnh tề cùng tư thế chào hoàn\nhảo."
# (独白)
# JP: 見よう見まねで答礼すれば、日々姫も慌てて僕に倣う。
1560 = "Thấy tôi bắt chước chào đáp lễ, Hibiki\ncũng vội vàng làm theo."
# 【ハチロク】
# JP: 「わたくしは\x%l帝鉄;#00ffc040;帝鉄%l;#;[ハチロクニイマル,3]8620形\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、トップナンバー・\n\x%l8620;#00ffc040;8620%l;#;号専用レイルロオド、ハチロクと申します」
2234 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\n\\x%l帝鉄;#00ffc040;Teitetsu%l;#; dòng 8620, số\nhiệu đầu tiên \\x%l8620;#00ffc040;8620%l;#;, tên là Hachiroku.」"
# 【日々姫】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;っ！？」
2894 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; á!?」"
# 【ハチロク】
# JP: 「日々姫」
2696 = "「Hibiki.」"
# 【日々姫】
# JP: 「っ！」
1942 = "「!」"
# (独白)
# JP: 日々姫の気持ちはよくわかる。\nだが、坊主と袈裟とは別物だ。
2201 = "Tôi rất hiểu cảm giác của Hibiki.\nNhưng nhà sư và chiếc áo cà sa là hai thứ\nkhác nhau."
# (独白)
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;であろうとも、目の前にいるこの\n“ハチロク”と、今はまっすぐ向き合うべきだ。
2135 = "Dù có là \\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa, thì bây giờ\ntôi cũng phải\nđối diện thẳng thắn với \"Hachiroku\" đang\nđứng trước mặt này."
# 【双鉄】
# JP: 「丁寧なご挨拶いたみいる。僕は双鉄。\n右田双鉄という学生――休学したての学生だ」
2744 = "「Cảm ơn lời chào trang trọng của cô. Tôi\nlà Soutetsu.\nMột sinh viên tên Migita Soutetsu——vừa mới\nbảo lưu kết quả học tập.」"
# 【日々姫】
# JP: 「わ、わたしは右田日々姫。\n[おひとよ,2]御一夜の学園の学園生です」
2171 = "「T-Tôi là Migita Hibiki.\nLà học sinh của trường học Ohimitera.」"
# 【ハチロク】
# JP: 「[おひとよ,2]御一夜……右田」
2344 = "「Ohimitera……Migita.」"
# (独白)
# JP: 人間とまったく変わらぬ動きで、\n考えこむように、ハチロクがその短い指を口元にあてる。
2128 = "Với cử chỉ không khác gì con người,\nHachiroku đưa những ngón tay ngắn ngủn lên\nmiệng vẻ trầm ngâm."
# 【ハチロク】
# JP: 「思い出しました。右田[たいと,1]汰斗様はどちらですか？」
2488 = "「Tôi nhớ ra rồi. Xin hỏi ngài Migita Taito\nđang ở đâu ạ?」"
# 【日々姫】
# JP: 「じぃじ――んんっ、お祖父様は……その」
1972 = "「Ông nội——ưm, ông nội thì……cái đó.」"
# 【双鉄】
# JP: 「なくなった、とうの昔に」
1890 = "「Ông ấy mất rồi, từ lâu lắm rồi.」"
# 【ハチロク】
# JP: 「そうでしたか。随分と長いこと……\nわたくしは眠ってしまっていたようですね」
2533 = "「Vậy sao. Có vẻ như tôi đã ngủ quên……\nmột thời gian khá dài rồi nhỉ.」"
# 【双鉄】
# JP: 「ハチロクさんは」
2350 = "「Hachiroku này.」"
# 【ハチロク】
# JP: 「呼び捨てで結構ですよ？　双鉄様」
2734 = "「Cứ gọi trống không cũng được ạ, ngài\nSoutetsu.」"
# 【双鉄】
# JP: 「ならばそうしよう。ハチロクはここ、右田汰斗の部屋の、\nその飾り箪笥で、ガラスケースの中にしまわれていた」
3179 = "「Vậy thì tôi sẽ làm thế. Hachiroku được\ncất giữ trong tủ trang trí kia,\nbên trong một lồng kính ở căn phòng này,\nphòng của Migita Taito.」"
# 【ハチロク】
# JP: 「ガラスケース……そう、ですか」
2582 = "「Lồng kính……Vậy, sao.」"
# (独白)
# JP: ゾっとするような冷たい微笑。
2322 = "Một nụ cười lạnh lẽo đến sởn gai ốc."
# (独白)
# JP: 知恵を超え、感情を超え――\n“人間らしさ"を人間以上に感じるほどの。\n2268 = "Vượt lên cả trí tuệ, vượt lên cả xúc cảm―― \nđến mức ta cảm nhận được \\"sự nhân bản\\" ấy còn rõ rệt hơn cả con người thực thụ."

# 【ハチロク】
# JP: 「……うまく思い出せませんが、わたくしは……\n汰斗様のご期待を、大きく裏切ってしまったようですね」
2274 = "「……Dù không thể nhớ rõ, nhưng có vẻ như\ntôi……\nđã phụ sự kỳ vọng của ngài Taito rất nhiều\nthì phải.」"
# 【双鉄】
# JP: 「汰斗さんの期待？」
3207 = "「Sự kỳ vọng của ông Taito?」"
# 【ハチロク】
# JP: 「ええ。……あの、失礼ながらお伺いいたしますが、\n双鉄様は、汰斗様のご相続人でいらっしゃいますか？」
3106 = "「Vâng. ……À, xin thứ lỗi cho tôi được hỏi,\nngài Soutetsu có phải là người thừa kế của\nngài Taito không ạ?」"
# 【日々姫】
# JP: 「そうたい！」
2163 = "「Đúng vậy!」"
# (独白)
# JP: 微妙に思えた質問に、\n僕より先に日々姫が答える。
2374 = "Trước một câu hỏi có vẻ tế nhị,\nHibiki đã nhanh nhảu đáp thay tôi."
# (独白)
# JP: 気持ちは嬉しい。\nだが、こうしたことはより正確を期すべきだ。
2278 = "Dù rất vui vì tấm lòng của em ấy.\nNhưng những chuyện thế này cần phải chính\nxác hơn."
# 【双鉄】
# JP: 「僕も相続人のはしくれではある。が、一番の相続人。\n右田家の現当主ということであれば、真闇姉だ」
2130 = "「Tôi cũng là một trong những người thừa\nkế. Nhưng người thừa kế chính.\nĐương gia hiện tại của nhà Migita, là chị\nMayami.」"
# 【ハチロク】
# JP: 「マクラネエ――様でございますか？」
3140 = "「Ngài——Mayaminee sao ạ?」"
# 【双鉄】
# JP: 「うむ。真なる闇とかいて“まくら”と読む」
1884 = "「Ừm. Viết là 'Chân Ám', đọc là \"Mayami\".」"
# 【ハチロク】
# JP: 「素敵なお名前。長いトンネルを思わせますね」
2339 = "「Một cái tên thật đẹp. Gợi liên tưởng đến\nmột đường hầm dài dằng dặc nhỉ.」"
# (独白)
# JP: 言って、ハチロクはハっとした顔で\n僕を、日々姫を順々に見る。
2162 = "Nói rồi, Hachiroku bỗng giật mình\nlần lượt nhìn tôi, rồi nhìn sang Hibiki."
# 【ハチロク】
# JP: 「いいえ、真闇様はきっと“\x%l枕木;#00ffc040;枕木%l;#;”のまくらですね。\n双鉄様は、その上に敷かれる双鉄、レール」
2166 = "「Không, ngài Mayami chắc chắn là chữ\n'Makura' trong \"\\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;\".\nNgài Soutetsu là cặp đường ray bằng sắt\n(Song Thiết) trải trên đó.」"
# 【双鉄】
# JP: 「ほう？」
2976 = "「Ồ?」"
# 【ハチロク】
# JP: 「そして、日々姫様はレールと\x%l列車;#00ffc040;列車%l;#;とのたてる響き。\n汰斗様は、お孫様達に素敵なお名前をつけられましたね」
3000 = "「Còn ngài Hibiki là âm vang giữa đường ray\nvà \\x%l列車;#00ffc040;đoàn tàu%l;#;.\nNgài Taito đã đặt cho các cháu những cái\ntên thật tuyệt vời.」"
# 【双鉄】
# JP: 「そうならよかったのだが、僕は」
2131 = "「Nếu được vậy thì tốt, nhưng tôi thì」"
# 【日々姫】
# JP: 「わたし、ねぇねぇ呼んでくるばいっ！」
2258 = "「Em, đi gọi chị Mayami đây!」"
# (独白)
# JP: 逃げ出すように、日々姫が酒蔵へとすっ飛んでいく。\nいや、実際に逃げ出したのか。
2526 = "Hibiki phóng vụt về phía xưởng ủ rượu như\nthể chạy trốn.\nÀ không, thực ra là em ấy đang chạy trốn\nthật."
# (独白)
# JP: 日々姫は、僕が養子だという話をひどく嫌う。\n知ってはいたが、ついハチロクにつられてしまった。
2100 = "Hibiki rất ghét nghe chuyện tôi là con\nnuôi.\nTôi biết điều đó, nhưng lại vô tình bị\ncuốn theo lời của Hachiroku."
# 【ハチロク】
# JP: 「軽やかですね、日々姫さまの足音は」
2523 = "「Bước chân của ngài Hibiki nhẹ nhàng thật\nđấy.」"
# 【双鉄】
# JP: 「だな。ああ見えて文武両道だ。\nそのうえ、たいそう絵がうまい」
1952 = "「Đúng vậy. Trông thế thôi chứ em ấy văn võ\nsong toàn đấy.\nHơn nữa, còn vẽ rất đẹp.」"
# 【ハチロク】
# JP: 「それは素敵です」
3055 = "「Thật tuyệt vời.」"
# 【双鉄】
# JP: 「だろう。ハチロクもその美しさだ。\n少し慣れれば、きっと日々姫が描きたがると思うぞ？」
2980 = "「Phải không. Hachiroku cũng xinh đẹp thế\nnày mà.\nKhi quen thân hơn một chút, chắc chắn\nHibiki sẽ muốn vẽ cô cho xem.」"
# 【ハチロク】
# JP: 「それはそれは、とても光栄に存じます」
2033 = "「Chà chà, tôi thấy vô cùng vinh hạnh.」"
# 【真闇】
# JP: 「はいはい、なんねなんね」
1974 = "「Có mặt, chuyện gì chuyện gì đây.」"
# (独白)
# JP: 真闇姉がおっとりゆったりやってくる。
2558 = "Chị Mayami từ tốn thong thả bước tới."
# (独白)
# JP: その後ろに、日々姫。\n真闇姉の体を盾にしているように、隠れてる。
2147 = "Phía sau chị là Hibiki.\nEm ấy nấp sau lưng chị Mayami như thể dùng\nchị làm lá chắn."
# 【真闇】
# JP: 「おやまぁ、この子が。\nはじめまして、ハチロクさん」
2035 = "「Ái chà, là cô bé này sao.\nRất vui được gặp, cô Hachiroku.」"
# 【ハチロク】
# JP: 「はじめまして、真闇様。\nわたくしのことは、どうぞハチロクとお呼びください」
3139 = "「Rất vui được gặp ngài, ngài Mayami.\nXin cứ gọi tôi là Hachiroku.」"
# 【真闇】
# JP: 「ほんなら、ハチロクちゃんね。\nウチんことも真闇でよかたい」
2557 = "「Vậy thì gọi là Hachiroku-chan nhé.\nCứ gọi chị là Mayami là được rồi.」"
# 【ハチロク】
# JP: 「お気持ちだけ頂戴します、真闇様。\nそこは、人と物との[ぶん]分とわきまえておりますので」
2276 = "「Tôi xin nhận tấm lòng của ngài, ngài\nMayami.\nNhưng tôi vẫn luôn ý thức rõ ranh giới\ngiữa con người và đồ vật ạ.」"
# 【真闇】
# JP: 「おやまぁ、これは随分と」
1546 = "「Ái chà, cô bé này khách sáo quá.」"
# (独白)
# JP: そこで言葉を切ってしまって、ちらりと真闇姉が僕を見る。
2551 = "Ngừng lời ở đó, chị Mayami liếc nhìn tôi."
# 【真闇】
# JP: 「そんで？　ハチロクちゃんは何のご用と？」
2270 = "「Vậy sao? Hachiroku-chan tìm chị có việc\ngì nào?」"
# 【ハチロク】
# JP: 「はい。実は――」
2521 = "「Vâng. Thực ra là——」"
# (独白)
# JP: ……ハチロクの言葉は装飾的だが、無駄がない。\n聞けばすぐ、話の要点を理解出来る。
2746 = "……Lời nói của Hachiroku tuy có chút hoa\nmỹ, nhưng không hề thừa thãi.\nChỉ cần nghe qua là có thể hiểu ngay trọng\ntâm câu chuyện."
# 【真闇】
# JP: 「ほんならハチロクちゃんは、\n身の振り方をうちに決めてほしかと？」
2448 = "「Vậy ý Hachiroku-chan là,\nmuốn chị quyết định nơi chốn cho em sao?」"
# 【ハチロク】
# JP: 「はい。わたくしは汰斗様に買い取られた物ですので。\n筆頭相続人たる真闇様が今の[オーナー,2]所有者であるかと」
2345 = "「Vâng. Tôi là món đồ được ngài Taito mua\nlại.\nNên tôi nghĩ người thừa kế chính là ngài\nMayami sẽ là chủ sở hữu hiện tại ạ.」"
# 【真闇】
# JP: 「そらぁ違ごとるね、ハチロクちゃん」
2180 = "「Chỗ đó thì sai rồi nha, Hachiroku-chan.」"
# (独白)
# JP: パチ、とハチロクがまばたきする。
2089 = "Hachiroku chớp chớp mắt."
# 【ハチロク】
# JP: 「なにが、でございますか？」
2844 = "「Sai ở đâu cơ ạ?」"
# 【真闇】
# JP: 「祖父様の部屋とその所有物は、全部双ちゃんが相続人たい。\nじゃっけん、ハチロクちゃんのオーナーは」
2224 = "「Phòng của ông nội và các vật dụng trong\nđó, tất cả đều do Sou-chan thừa kế.\nThế nên, chủ sở hữu của Hachiroku-chan\nlà...」"
# 【ハチロク】
# JP: 「了解しました。\n……双鉄様が、わたくしの現オーナーなのですね」
2152 = "「Tôi hiểu rồi.\n……Ngài Soutetsu chính là chủ sở hữu hiện\ntại của tôi nhỉ.」"
# 【双鉄】
# JP: 「そうらしいな」
1969 = "「Có vẻ là vậy.」"
# (独白)
# JP: それが真闇姉の決定ならば、僕に異論のあるはずもない。\n与えられた義務ならもちろん、ただ全力で果たすのみだ。
2515 = "Nếu đó là quyết định của chị Mayami thì\ntôi cũng chẳng có lý do gì để phản đối.\nNếu đã là nghĩa vụ được giao, tôi chỉ biết\ndốc toàn lực hoàn thành thôi."
# 【双鉄】
# JP: 「身の処し方と言っていたが――\nハチロクに、なにか希望はあるのか？」
3041 = "「Cô vừa nhắc đến nơi chốn——\nHachiroku có nguyện vọng gì không?」"
# 【ハチロク】
# JP: 「希望……ですか？　わたくしの？」
2407 = "「Nguyện vọng……sao ạ? Của tôi?」"
# 【双鉄】
# JP: 「他の者の希望を聞いても仕方あるまい。\n知性があるなら、無論、希望もわくだろう」
2733 = "「Nghe nguyện vọng của người khác thì có\ních gì.\nNếu có trí tuệ, hẳn nhiên cũng sẽ có\nnguyện vọng chứ.」"
# (独白)
# JP: 戸惑っている。\nそうとしか見えない。
3236 = "Bối rối.\nChỉ có thể thấy vậy thôi."
# 【ハチロク】
# JP: 「少し……しばらくお待ちください。\nそのようなこと……初めて問われましたので――」
2031 = "「Xin hãy……chờ một chút.\nNhững chuyện thế này……đây là lần đầu tiên\ntôi được hỏi——」"
# (独白)
# JP: 俯き。沈黙。\nやがてその顔がわずかに上がり、唇が静かに開かれ――
2580 = "Cúi gằm mặt. Im lặng.\nMột lúc sau, khuôn mặt ấy hơi ngẩng lên,\nđôi môi lặng lẽ hé mở——"
# (独白)
# JP: （く～～～っ）
2592 = "（Rột~~~）"
# 【真闇】
# JP: 「あら」
2857 = "「Ối chà.」"
# 【日々姫】
# JP: 「ねぇねぇっ！　あらとか言うたらかわいそーばいっ！」
1967 = "「Chị Mayami! Kêu ối chà như thế tội nghiệp\nngười ta lắm!」"
# 【ハチロク】
# JP: 「//////」
2271 = "「//////」"
# (独白)
# JP: 日々姫の善意の追い打ちに、\nハチロクはうつむき赤くなる。
2888 = "Bị đòn bồi thiện ý của Hibiki giáng xuống,\nHachiroku cúi gằm mặt, đỏ bừng."
# 【双鉄】
# JP: 「ぜんまいでは足りんのか？」
2516 = "「Dây cót không đủ sao?」"
# 【ハチロク】
# JP: 「はい」
2556 = "「Vâng.」"
# (独白)
# JP: 単刀直入にそう尋ねれば、\nほっとしたような目が僕を向く。
2281 = "Nghe tôi hỏi thẳng thừng như vậy,\nđôi mắt như trút được gánh nặng hướng về\nphía tôi."
# 【ハチロク】
# JP: 「あれは……単なる非常動力ですので」
2489 = "「Đó chỉ là……động lực khẩn cấp đơn thuần\nthôi ạ.」"
# 【双鉄】
# JP: 「非常ではない動力源は？」
2061 = "「Thế nguồn động lực không khẩn cấp là gì?」"
# 【ハチロク】
# JP: 「蒸気です。\nですから、水と石炭をもしいただければ」
2871 = "「Là hơi nước ạ.\nThế nên, nếu có thể cho tôi xin chút nước\nvà than đá thì...」"
# 【双鉄】
# JP: 「そうか。水なら」
2481 = "「Vậy sao. Nếu là nước thì...」"
# 【日々姫】
# JP: 「あ、にぃにぃ！　わたし行くけんっ！」
2356 = "「A, anh hai! Để em đi lấy cho!」"
# (独白)
# JP: 恥をかかせた汚名返上。\n気持ちを体全部で示し、日々姫がまた走って、戻る。
2829 = "Rửa sạch nỗi nhục nhã vừa rồi.\nThể hiện quyết tâm bằng toàn bộ cơ thể,\nHibiki lại chạy đi, rồi quay lại."
# 【日々姫】
# JP: 「これ、お酒づくりに使う上等な水たい」
2030 = "「Đây là loại nước hảo hạng dùng để ủ rượu\nđó.」"
# 【ハチロク】
# JP: 「澄み切っていますね。頂戴します」
2691 = "「Nước trong vắt nhỉ. Tôi xin phép.」"
# (独白)
# JP: 小さなコップを両手いっぱい持ちながら、\nこくこくこくと、ハチロクは喉を鳴らす。
2368 = "Hai tay ôm trọn chiếc cốc nhỏ,\nHachiroku ực ực uống cạn."
# 【ハチロク】
# JP: 「ふぅ」
2000 = "「Phù.」"
# (独白)
# JP: 見る間にコップが空になる。\n真闇姉の目が細くなる。
2025 = "Chớp mắt chiếc cốc đã cạn sạch.\nChị Mayami nheo mắt lại."
# 【真闇】
# JP: 「よか飲みっぷりたい！\n今度、飲みっくらせん？」
2070 = "「Uống sảng khoái ghê!\nHôm nào tụi mình nhậu một bữa thi xem ai\nhơn không?」"
# 【ハチロク】
# JP: 「真水でよければ、よろこんで。\nアルコールは異常燃焼の原因となってしまいますので」
2834 = "「Nếu là nước lọc thì tôi rất sẵn lòng.\nCồn sẽ là nguyên nhân gây cháy bất thường\nđấy ạ.」"
# 【真闇】
# JP: 「真水ば、うちがよー飲まん」
2748 = "「Nước lọc thì chị không uống được nhiều\nđâu.」"
# 【ハチロク】
# JP: 「ふふっ」
2355 = "「Fufu.」"
# (独白)
# JP: 機嫌良さそうな微笑み。
2051 = "Một nụ cười đầy vẻ thích thú."
# (独白)
# JP: 自分の飲みくちをハンカチでぬぐい、\nハチロクは日々姫にコップを返す。
2989 = "Dùng khăn tay lau miệng cốc của mình,\nHachiroku trả lại chiếc cốc cho Hibiki."
# 【ハチロク】
# JP: 「大変に上等なお水でした。\nお酒づくりとおっしゃってましたが」
2782 = "「Một loại nước vô cùng hảo hạng.\nCô vừa nói là dùng để ủ rượu nhỉ...」"
# 【日々姫】
# JP: 「あ……」
2313 = "「A……」"
# (独白)
# JP: 日々姫の視線がそっぽを向く。\nコップの水は、お酒造りに――クマ焼酎に使う水。
2097 = "Hibiki ngoảnh mặt đi chỗ khác.\nNước trong cốc là nước dùng để ủ rượu——ủ\nrượu shochu Kuma."
# (独白)
# JP: クマ川の源流の話をすれば、なるほど、\nさっきのいさかいの蒸し返しになりかねない。
2561 = "Nếu nhắc đến thượng nguồn sông Kuma thì\nquả thật,\nrất có thể sẽ khơi mào lại cuộc cãi vã lúc\nnãy."
# 【双鉄】
# JP: 「水が満ちたなら次は石炭だな。\n真闇姉、この家に石炭は？」
2323 = "「Nước đủ rồi thì tiếp theo là than đá nhỉ.\nChị Mayami, nhà mình có than đá không?」"
# 【真闇】
# JP: 「うちにも石炭ボイラがあるにはあるばってん、\nもう長いこと使ことらんけんねぇ」
1988 = "「Nhà mình thì cũng có nồi hơi chạy bằng\nthan đá đấy,\nnhưng lâu lắm rồi không dùng đến nữa.」"
# 【双鉄】
# JP: 「ならば、近所に石炭を売っている店などは？」
3018 = "「Vậy quanh đây có cửa hàng nào bán than đá\nkhông?」"
# 【日々姫】
# JP: 「なか……んっ、無いと思います、兄さん。\nですが、ひょっとすると[じゅつせんどう,2]術仙洞に」
3174 = "「Khô……ưm, em nghĩ là không có đâu, anh\ntrai.\nNhưng mà, biết đâu ở hang Jutsusen lại\ncó.」"
# 【双鉄】
# JP: 「なるほど、あそこは廃炭鉱だったな――っと」
2536 = "「Ra là vậy, chỗ đó từng là mỏ than bỏ\nhoang mà nhỉ——suýt nữa thì.」"
# (独白)
# JP: ハチロクを無造作につかもうとして、\n危ういところで、さっきの失敗を思い出す。
1898 = "Vừa định tiện tay tóm lấy Hachiroku,\nthì may thay tôi sực nhớ lại thất bại lúc\nnãy."
# (独白)
# JP: 乙女――だと、この知性ある物は言っていた。\nならば乙女に対するように、僕もふるまうべきであろう。
2435 = "Thiếu nữ——thực thể mang trí tuệ này đã nói\nvậy.\nThế thì tôi cũng nên cư xử với cô ấy như\nvới một thiếu nữ mới phải."
# 【双鉄】
# JP: 「そこへ案内したいのだが。\nハチロク、僕はどのように君をエスコートすれば良いか」
2285 = "「Tôi muốn đưa cô đến đó.\nHachiroku, tôi nên hộ tống cô như thế nào\nđây?」"
# 【ハチロク】
# JP: 「いえ、そんな――\nそこまでのことをしていただくわけには」
2742 = "「Không, chuyện đó——\nĐâu thể phiền ngài làm đến mức đó được ạ.」"
# 【双鉄】
# JP: 「行くさ。僕は君のオーナーとなったのだからな。\n君を大切に扱う義務がある」
2554 = "「Cứ đi thôi. Dù sao thì tôi cũng đã trở\nthành chủ sở hữu của cô rồi.\nTôi có nghĩa vụ phải đối xử trân trọng với\ncô chứ.」"
# 【ハチロク】
# JP: 「左様でございますか」
2015 = "「Là vậy sao ạ.」"
# (独白)
# JP: ごくさり気なく、ハチロクは髪を整える。
2559 = "Một cách vô cùng tự nhiên, Hachiroku vuốt\nlại mái tóc."
# 【ハチロク】
# JP: 「それではお伺いいたしますが――双鉄様の利き腕は？」
1987 = "「Vậy cho tôi mạn phép hỏi——tay thuận của\nngài Soutetsu là tay nào ạ?」"
# 【双鉄】
# JP: 「右だ」
2277 = "「Tay phải.」"
# 【ハチロク】
# JP: 「でしたら、\n左手をわたくしのイスにして頂いてよろしいですか？」
2892 = "「Nếu vậy,\nngài có thể cho tôi dùng tay trái làm ghế\nngồi được không ạ?」"
# 【双鉄】
# JP: 「なるほど、こうか？」
3025 = "「Ra là vậy, thế này hả?」"
# 【ハチロク】
# JP: 「はい、上等です」
2552 = "「Vâng, hoàn hảo ạ.」"
# (独白)
# JP: 左手を曲げ腰を落とせば、\nハチロクの尻が腕に乗る。
2916 = "Gập tay trái lại và hơi khom lưng xuống,\nHachiroku liền ngồi lên cánh tay tôi."
# (独白)
# JP: 見た目よりかなりずっしりしている。\nなるほど、蒸気機関というのも納得だ。
2377 = "Nặng hơn nhiều so với vẻ bề ngoài.\nRa là vậy, động cơ hơi nước thì cũng phải\nthôi."
# 【双鉄】
# JP: 「ならば行こう」
2094 = "「Vậy đi thôi.」"
# (独白)
# JP: 立ち上がれば、自然とハチロクは寄りかかってくる。\n胸板と腕に分散されれば、なかなか心地よい重さと感じる。
2046 = "Khi tôi đứng thẳng lên, Hachiroku tự nhiên\ntựa hẳn vào người tôi.\nTrọng lượng phân tán đều lên lồng ngực và\ncánh tay, tạo thành một sức nặng khá dễ\nchịu."
# 【双鉄】
# JP: 「真闇姉、日々姫。\n片付けの途中にすまんが、ちょっと行ってくる」
1976 = "「Chị Mayami, Hibiki.\nXin lỗi vì đang dọn dở, nhưng anh đi đây\nmột lát nhé.」"
# 【真闇】
# JP: 「はい、いってらっしゃい」
2009 = "「Ừm, đi cẩn thận nhé.」"
# 【日々姫】
# JP: 「兄さん？　そんな、簡単に行くと言っても」
2900 = "「Anh trai? Anh nói đi một lát dễ nghe thế,\nnhưng mà...」"
# 【双鉄】
# JP: 「なに、実際に簡単だ。\n僕の\x%lエアクラ;#00ffc040;エアクラ%l;#;は優秀だからな」
2142 = "「Không sao, thực tế là đi dễ ợt mà.\nChiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; của anh xịn lắm đấy.」"
# 【日々姫】(日々姫・ハチロク)
# JP: 「じゃけん、そん\x%lエアクラ;#00ffc040;エアクラ%l;#;が」\n「\x%lエアクラ;#00ffc040;エアクラ%l;#;っ！！？」
2194 = "「Bởi vậy nên cái chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; đó mới」\n「\\x%lエアクラ;#00ffc040;Aircra%l;#; á!!?」"
