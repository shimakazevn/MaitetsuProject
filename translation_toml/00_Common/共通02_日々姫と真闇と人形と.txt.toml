1909 = "「——Búp bê là búp bê, đồ vật là đồ vật. Dù có làm giống người đến mức nào đi chăng nữa, thì nó vẫn khác con người.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、それはわかっているのですが」
2289 = "「Vâng, chuyện đó thì em hiểu.」"
