2238 = "「Hibiki, em lùi ra xa một chút đi. \nKhông sao, anh quen với việc xử lý mấy đồ dễ vỡ rồi.」"

# 【日々姫】
# JP: 「そうなんですか？　\nって、兄さん。割っちゃダメじゃないですか」
2273 = "「Thật thế ạ? \nƠ mà, anh hai. Chẳng phải anh không được làm vỡ đồ sao.」"

# (独白)
# JP: これは言葉が足りなかったか。
3006 = "Cái này là do mình nói chưa đủ ý rồi sao."

# (独白)
