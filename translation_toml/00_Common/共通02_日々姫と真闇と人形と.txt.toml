3172 = "Chẳng có \\x%l蒸気排水;#00ffc040;xả nước ngưng hơi nước%l;#; nào ở đây cả. Đây là nước mắt. Không thể nhầm được. Con búp bê này——đang khóc."
# 【ハチロク】
# display as ？？？
