2077 = "「Vì ngày xưa chúng ta là một cặp song sinh mà. \nNiềm hứng thú từ lúc nào cũng đã được sẻ chia mất rồi」"

# 【日々姫】
# JP: 「あ――」
2050 = "「A――」"

