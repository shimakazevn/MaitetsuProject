1552 = "……Dọn dẹp xong đống kính vỡ vụn, thì không còn gì cản trở tầm nhìn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「まるで生きているような人形だな。\n精巧で……魅入られそうに美しい」
2479 = "「Trông cứ như một con búp bê đang sống vậy. Thật tinh xảo……và đẹp đến mê hồn.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、人形に興味があるんですか？」
2043 = "「Anh trai có hứng thú với búp bê sao?」"
# 【双鉄】
# display as 雙鐵
