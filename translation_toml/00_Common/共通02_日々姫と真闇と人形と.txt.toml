3013 = "Một chiếc ly thủy tinh trong suốt được đưa ra. \n Khi uống cạn, mùa hè xa xăm ấy dường như lại càng đến gần hơn."

# (独白)
# JP: そうだ、いつだってそうだった。\n外から帰れば、この氷水が僕を迎えてくれた。
