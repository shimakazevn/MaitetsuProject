3176 = "Cứ như lần đầu tiên tôi gặp Hibiki vậy―― \nhoàn toàn giống hệt cái ngày xa xưa ấy, khi tôi được nhận nuôi vào ngôi nhà này."

# 【双鉄】
# JP: 「この家は変わらないな。なにもかもが懐かしい」
2480 = "「Ngôi nhà này chẳng thay đổi gì cả. Mọi thứ thật hoài niệm làm sao.」"

# 【日々姫】
# JP: 「そうですか！？　兄さん、懐かしいですか？」
2366 = "「Thật thế sao ạ!? Anh hai, anh thấy hoài niệm lắm sao?」"

# (独白)
# JP: ぱあっと、日々姫が顔をあげ、やけに華やいだ声を出す。
3212 = "Hibiki bừng sáng, ngước mặt lên rồi cất tiếng nói rạng rỡ đến lạ."

# 【双鉄】
# JP: 「うん、懐かしい。\nここまで何も変わらないとは、夢にも思っていなかった」
2263 = "「Ừm, hoài niệm thật đấy. \nĐến mức anh chưa từng mơ rằng nơi đây lại chẳng hề thay đổi chút nào」"

# 【日々姫】
# JP: 「む……」
2047 = "「Ư...」"

# (独白)
# JP: 一転、眉根がきゅっと寄る。\n声のトーンも低くなる。
3080 = "Bất chợt, đôi chân mày em ấy khẽ nhíu lại. \nTông giọng cũng trầm xuống hẳn."

# 【日々姫】
# JP: 「私もですか？　変わらない？\n兄さんが帝都へ旅立っていったあのときと？」
2494 = "「Cả em nữa ạ? Vẫn không thay đổi sao? \nNhư hồi anh lên Đế Đô ngày đó ư?」"

# 【双鉄】
# JP: 「ああ、いや。変わったな。\n[ひびき,2]日々姫は確かに、大きく変わった」
1895 = "「À, không. Khác chứ. \nHibiki chắc chắn đã thay đổi rất nhiều rồi」"

