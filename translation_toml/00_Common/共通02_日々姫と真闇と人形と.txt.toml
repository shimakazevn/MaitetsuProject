[script]
# lines: 475 
# monologue
# JP: 分厚い、一枚板の座卓。\nこの大きさだというのに欠けも無く傷ひとつさえも無い。
2781 = "Bàn trà thấp, dày dặn, làm từ một tấm ván nguyên khối. Lớn đến thế này mà không hề sứt mẻ hay có lấy một vết xước."
# monologue
# JP: その見事さに威圧感さえ感じれば――\n右田家に、戻ってきたと実感できる。
2848 = "Sự hoàn hảo đó thậm chí còn mang lại cảm giác uy nghiêm—— Làm tôi thực sự cảm nhận được rằng, mình đã trở về nhà Migita."
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1571 = "「............」"
# monologue
# JP: 僕の右手で、日々姫がちらちらこちらの様子を伺っている。
2887 = "Ở bên tay phải tôi, Hibiki đang thỉnh thoảng lại lén nhìn sang thăm dò."
# monologue
# JP: 初めて日々姫に会った時――\n僕がこの家に引き取られてきた、あの遠い日と全く同じに。
3176 = "Giống hệt như lần đầu tiên tôi gặp Hibiki—— vào cái ngày xa xôi ấy, khi tôi được nhận nuôi vào gia đình này."
# 【双鉄】
# display as 雙鐵
# JP: 「この家は変わらないな。なにもかもが懐かしい」
2480 = "「Ngôi nhà này chẳng thay đổi gì cả. Mọi thứ đều thật hoài niệm.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですか！？　兄さん、懐かしいですか？」
2366 = "「Vậy sao!? Anh trai, thấy hoài niệm sao?」"
# monologue
# JP: ぱあっと、日々姫が顔をあげ、やけに華やいだ声を出す。
3212 = "Hibiki bừng sáng ngẩng mặt lên, cất giọng vô cùng rạng rỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「うん、懐かしい。\nここまで何も変わらないとは、夢にも思っていなかった」
2263 = "「Ừ, hoài niệm lắm. Không ngờ lại chẳng có gì thay đổi đến mức này, đúng là nằm mơ cũng không nghĩ tới.」"
# 【日々姫】
# display as 日日姬
# JP: 「む……」
2047 = "「Hứ......」"
# monologue
# JP: 一転、眉根がきゅっと寄る。\n声のトーンも低くなる。
3080 = "Đột ngột, đôi lông mày nhíu chặt lại. Giọng nói cũng trầm xuống."
# 【日々姫】
# display as 日日姬
# JP: 「私もですか？　変わらない？\n兄さんが帝都へ旅立っていったあのときと？」
2494 = "「Cả em cũng vậy sao? Không thay đổi gì ư? Giống như lúc anh trai lên đường đến Đế Đô sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。変わったな。\n[ひびき,2]日々姫は確かに、大きく変わった」
1895 = "「À, không. Có thay đổi chứ. Hibiki quả thực, đã thay đổi rất nhiều.」"
# monologue
# JP: ナビも指摘をしていたが、\n確かに、日々姫の変化は顕著だ。
3198 = "Navi cũng đã chỉ ra rồi, quả thật, sự thay đổi của Hibiki rất rõ rệt."
# monologue
# JP: それを素直に認めれば、\n寄ってた眉根がふわりとゆるむ。
2889 = "Khi tôi thành thật thừa nhận điều đó, đôi lông mày đang nhíu lại của con bé liền giãn ra nhẹ nhõm."
# 【日々姫】
# display as 日日姬
# JP: 「どの辺が変わって見えます？\n兄さんの目には」
2542 = "「Anh thấy em thay đổi ở điểm nào? Trong mắt anh trai ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにより口調だ。綺麗な標準語で話している」
2295 = "「Trước hết là giọng điệu. Em đang nói tiếng phổ thông rất chuẩn.」"
# 【日々姫】
# display as 日日姬
# JP: 「そこですか！？」
2112 = "「Là chỗ đó sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「気づくなという方が無理な変化だ。\n僕が出たときは、こてこての[くまもと,1]隈元弁を使っていたのに」
2493 = "「Một sự thay đổi không thể không nhận ra. Lúc anh đi, em vẫn còn nói giọng Kumamoto đặc sệt mà.」"
# monologue
# JP: 怒ったような呆れ顔。\n日々姫に張り付いていたその表情が、ゆるゆる解ける。
2997 = "Khuôn mặt tỏ vẻ tức giận như cạn lời. Biểu cảm đang bám chặt trên khuôn mặt Hibiki dần dần tan biến."
# 【日々姫】
# display as 日日姬
# JP: 「それは……私だって帝都に出て行くつもりですから。\nきちんとした先生について、練習を重ねたんです」
2549 = "「Chuyện đó......vì em cũng định sẽ lên Đế Đô mà. Em đã theo học một giáo viên đàng hoàng và luyện tập rất nhiều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。日々姫も帝都にか。\n帝大にでも進むつもりか？」
2266 = "「Ồ. Hibiki cũng muốn lên Đế Đô à. Định thi vào trường Đế Đại sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「私が兄さんの後輩ですか。そうできたら素敵ですけど\n……今の成績では、とても無理です」
2351 = "「Em làm hậu bối của anh trai sao. Được thế thì tuyệt quá ......nhưng với thành tích hiện tại, thì hoàn toàn không thể đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば成績をあげればいい」
2539 = "「Vậy thì nâng cao thành tích lên là được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
2036 = "「Aha.」"
# monologue
# JP: 今日、はじめての日々姫の笑顔。\n余計な感情の混じらぬ笑顔。
3177 = "Nụ cười đầu tiên của Hibiki trong ngày hôm nay. Một nụ cười không pha lẫn bất kỳ cảm xúc thừa thãi nào."
# 【双鉄】
# display as 雙鐵
# JP: 「その笑顔は変わっていないな。\n良いことだ」
1939 = "「Nụ cười đó thì không thay đổi nhỉ. Tốt lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「少しも変わってらっしゃらないのは兄さんですよ。\n『出来ないことは出来るまでやればいい』――って」
2041 = "「Người không thay đổi chút nào là anh trai mới đúng. 『Chuyện không làm được thì cứ làm cho đến khi được mới thôi』——kiểu vậy.」"
# monologue
# JP: 日々姫はなおも笑いつづける。\nクスクスくすくす――楽しげに。
2994 = "Hibiki vẫn tiếp tục cười. Khúc khích khúc khích——đầy vẻ thích thú."
# 【日々姫】
# display as 日日姬
# JP: 「全く変わっていないとは夢にも思いませんでした。\nお勉強にお仕事に、さぞご苦労をされたでしょうに」
1955 = "「Nằm mơ em cũng không nghĩ là anh hoàn toàn chẳng thay đổi gì. Dù cho việc học và công việc chắc hẳn đã khiến anh vất vả lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「変わらんか？　僕は」
2188 = "「Không thay đổi sao? Anh ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「細かなところはまだわかりません。\nけれど、兄さんの一番兄さんらしいところは、同じです」
2436 = "「Những chi tiết nhỏ thì em chưa rõ. Nhưng mà, điểm giống anh trai nhất của anh trai, thì vẫn y như cũ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「自分のことはよくわからんが――\nふむ、日々姫が言うならそうなのかもしれん」
2160 = "「Anh không hiểu rõ bản thân mình lắm—— Hừm, nếu Hibiki đã nói vậy thì chắc là thế rồi.」"
# monologue
# JP: 今度はぽん、と赤くなる。\n今日の日々姫は、昔以上の百面相だ。
3178 = "Lần này mặt con bé bỗng đỏ bừng lên. Hibiki của ngày hôm nay, biểu cảm còn phong phú hơn cả ngày xưa."
# 【日々姫】
# display as 日日姬
# JP: 「わ、私が言うなら――って」
2158 = "「N-nếu em đã nói vậy——sao.」"
# 【真闇】
# display as ？？？
# JP: 「そら確かばい。ひーちゃんは昔から、\n双ちゃんのことばよー見ゆうけんねぇ」
2519 = "「Chắc chắn rồi. Hi-chan từ ngày xưa, đã luôn dõi theo Sou-chan mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇっ！」
2578 = "「Chị hai!」"
# monologue
# JP: ああ、“ねぇねぇ”は“ねぇねぇ”なのか――\n昔と変わらぬ日々姫の声に迎えられ。
2811 = "A, \"Chị hai\" thì vẫn gọi là \"Chị hai\" à—— Được chào đón bởi giọng nói không đổi từ ngày xưa của Hibiki."
# monologue
# JP: 音も立てずにふすまを開き、\n氷水の乗ったお盆を持った[まくら,1]真闇[ねぇ]姉が入ってくる。
3085 = "Kéo cánh cửa trượt ra mà không gây tiếng động, chị Mayami bước vào, bưng theo khay nước đá."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、おかえり。\n六年の[ま]間に、ずいぶん大きゅうなったねぇ」
2104 = "「Sou-chan, mừng em về nhà. Trong sáu năm qua, em đã lớn bổng lên nhiều rồi nhỉ.」"
# monologue
# JP: 真闇姉の笑いは、ゆったりだ。\n上空から見たクマ川をふと思い出す。
3061 = "Nụ cười của chị Mayami thật thư thái. Làm tôi chợt nhớ đến con sông Kuma nhìn từ trên cao."
# monologue
# JP: 豊かで、とても美しく――\nけれど一度荒れたならば、他の何より恐ろしい。
3204 = "Trù phú, và vô cùng xinh đẹp—— Nhưng một khi đã nổi giận, thì đáng sợ hơn bất cứ thứ gì khác."
# 【双鉄】
# display as 雙鐵
# JP: 「それは――そうかと思います。\n[とう,1]義父さんは、帝都でも僕によくしてくださいまして」
2563 = "「Điều đó——em nghĩ là vậy. Cha nuôi, ở Đế Đô cũng đối xử rất tốt với em.」"
# 【真闇】
# display as 真闇
# JP: 「他人行儀は好かんよ？　\n右田の人間言うなら、\\x%l杜氏;#00ffc040;[とうじ,1]杜氏%l;#;の言うことば聞かんと」
1947 = "「Chị không thích khách sáo đâu nha? Đã là người nhà Migita thì phải nghe lời \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい――いや、『うん』」
2252 = "「Vâng——à không, 『Dạ』」"
# monologue
# JP: うん、などという相槌は、\nそれこそこの家を出たとき以来だ。
1538 = "Những tiếng đáp lời như \"Ừm\", có lẽ từ lúc rời khỏi căn nhà này tôi mới lại dùng đến."
# monologue
# JP: ただそれだけの短い音が、まるで栓でもしてたかのように、\nこの家で昔話してた――そのままの言葉がつながってくる。
2731 = "Chỉ một âm thanh ngắn ngủi đó thôi, nhưng như thể đã mở tung một chiếc nút bần, những lời tôi từng nói ở căn nhà này ngày xưa——cứ thế tuôn trào ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ただいま、真闇姉。ただいま、日々姫」
2167 = "「Anh về rồi đây, chị Mayami. Anh về rồi đây, Hibiki.」"
# 【真闇】
# display as 真闇
# JP: 「ん。お帰り」
2067 = "「Ừm. Mừng em về nhà.」"
# 【日々姫】
# display as 日日姬
# JP: 「おかえり、にぃにぃ」
2304 = "「Mừng anh hai về nhà.」"
# monologue
# JP: 透き通ったコップが差し出される。\n飲み干せば、遠い夏がさらに近づいてくる。
3013 = "Một chiếc cốc trong suốt được đưa ra. Uống cạn nó, mùa hè xa xăm ấy như càng đến gần hơn."
# monologue
# JP: そうだ、いつだってそうだった。\n外から帰れば、この氷水が僕を迎えてくれた。
3003 = "Đúng rồi, lúc nào cũng vậy. Mỗi khi từ ngoài về, cốc nước đá này luôn chào đón tôi."
# monologue
# JP: （バリっ、ボリっ、バリン）
3244 = "（Rộp, rộp, rộp）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ、また氷食べよっ――こほん。\n兄さん、また氷なんてお食べになって」
2573 = "「Anh hai, anh lại nhai đá nữa rồi——e hèm. Anh trai, anh lại nhai đá nữa rồi.」"
# 【真闇】
# display as 真闇
# JP: 「おいしかもんねぇ。うちん蔵の水は、\nぜぇんぶクマ川のいっとうよかもんやけん」
2020 = "「Ngon lắm phải không. Nước ở xưởng ủ rượu nhà mình, tất cả đều là loại nước tuyệt hảo nhất của sông Kuma mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2065 = "「Vâng.」"
# monologue
# JP: そう、御一夜に、この家にもらわれて来て、初めて知った。\n水が、氷が、これほどうまいということを。
3009 = "Đúng vậy, kể từ khi được nhận nuôi và đến căn nhà này ở Ohimitera, tôi mới biết được. Rằng nước, và đá, lại có thể ngon đến thế này."
# monologue
# JP: なら、やはり――\nこの水を守ることもまた、僕の果たすべき義務だろう。
3190 = "Nếu vậy, quả nhiên—— Việc bảo vệ nguồn nước này cũng là nghĩa vụ mà tôi phải hoàn thành."
# 【双鉄】
# display as 雙鐵
# JP: 「それで、真闇姉」
2441 = "「Chuyện là, chị Mayami.」"
# monologue
# JP: ならば、果たすべきを早く果たそう。\n懐かしむなど、そのあといくらでも堪能できる。
3191 = "Nếu vậy, hãy mau chóng hoàn thành những gì cần làm thôi. Việc ôn lại kỷ niệm, sau đó tận hưởng bao nhiêu cũng được."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜に\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致するという話。\n今、どの程度のものになってる？」
2495 = "「Chuyện mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về Ohimitera ấy. Bây giờ tiến triển đến đâu rồi?」"
# 【真闇】
# display as 真闇
# JP: 「なんねぇ、双ちゃん。\n夏休みで帰ってきたんじゃなかと？」
2143 = "「Sao vậy, Sou-chan. Không phải em về nghỉ hè sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。大学は休学してきた」
2064 = "「Vâng. Em đã xin bảo lưu ở đại học rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「休学っ！？」
1926 = "「Bảo lưu á!?」"
# monologue
# JP: 驚き顔の日々姫に頷く。
2986 = "Tôi gật đầu với vẻ mặt kinh ngạc của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「勉学よりも、この件の方が遥かに大事と思ったからな」
2078 = "「Bởi vì anh nghĩ chuyện này quan trọng hơn việc học nhiều.」"
# monologue
# JP: 無論、休学にあたってはいろいろあった。
3037 = "Tất nhiên, cũng có nhiều chuyện xảy ra khi xin bảo lưu."
# monologue
# JP: 義父さんから、何だかんだと条件をつきつけられもしたが、\nその辺りのことはまぁ、折を見て話せばよいだろう。
3217 = "Cha nuôi cũng đưa ra đủ loại điều kiện này nọ, nhưng chuyện đó thì cứ để khi nào có dịp rồi kể sau cũng được."
# 【日々姫】
# display as 日日姬
# JP: 「そいたら、にぃに――んんっ――\nと、いうことは、兄さんも工場誘致を推進に？」
2109 = "「Vậy ra, anh hai——ưm—— Nói vậy tức là, anh trai cũng ủng hộ việc mời gọi nhà máy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん？　いや」
2060 = "「À——hả? Không.」"
# monologue
# JP: 聞き違えたか？\n言葉の意味を取り損なって、曖昧な返事を返してしまった。
3008 = "Tôi nghe nhầm sao? Chưa kịp hiểu ý nghĩa câu nói, tôi đã lỡ đáp lại một cách mơ hồ."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、今なんと？」
2241 = "「Hibiki, em vừa nói gì cơ?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　ですから――兄さんも、\n工場誘致を推進しに戻ってきてくださったのか――と」
2038 = "「Hả? Thì là——anh trai cũng, quay về để ủng hộ việc mời gọi nhà máy sao——ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「推進」
2215 = "「Ủng hộ.」"
# monologue
# JP: 聞き違いではなかったようだ。\nが――
3020 = "Có vẻ tôi không nghe nhầm. Nhưng mà——"
# monologue
# JP: 信じられずに真闇姉へと視線を送れば、\n笑顔と小さくすくめた肩とに受け止められる。
2909 = "Tôi nhìn sang chị Mayami với vẻ không thể tin nổi, đáp lại tôi là một nụ cười và cái nhún vai nhè nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2048 = "「Hừm.」"
# monologue
# JP: ならば、“推進”は、日々姫ひとりの意見であるのか。
3189 = "Nếu vậy, \"ủng hộ\" chỉ là ý kiến của riêng Hibiki thôi sao."
# 【双鉄】
# display as 雙鐵
# JP: 「推進などと。どこでどう、\nそのような考えを吹きこまれたんだ？」
2442 = "「Cái gì mà ủng hộ chứ. Em bị tiêm nhiễm suy nghĩ đó từ ai, ở đâu vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2037 = "「Hả?」"
# monologue
# JP: また驚いた顔になり。\n次いでみるみる、日々姫の頬が朱に染まっていく。
2988 = "Khuôn mặt em ấy lại lộ vẻ ngạc nhiên. Rồi ngay sau đó, đôi má Hibiki đỏ bừng lên trông thấy."
# 【日々姫】
# display as 日日姬
# JP: 「『吹きこまれた』なんていう言い方はやめてください」
2446 = "「Xin anh đừng dùng từ 『tiêm nhiễm』 như thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、すまん。では言い直そう。\n誘致の推進という考えに、日々姫はなぜ思い至った？」
2265 = "「Vậy sao, xin lỗi. Để anh nói lại. Tại sao Hibiki lại có suy nghĩ ủng hộ việc mời gọi nhà máy?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは――」
2487 = "「Chuyện đó là——」"
# monologue
# JP: 口を閉じ。\n日々姫は目線を左右に揺らす。
2984 = "Ngậm miệng lại. Hibiki đưa mắt nhìn quanh quất."
# monologue
# JP: そして僕へと顔を戻さず、\nそのままで、けれども強い声をだす。
2832 = "Và rồi, không thèm ngoảnh mặt lại nhìn tôi, em ấy cứ thế cất lên một giọng điệu mạnh mẽ."
# 【日々姫】
# display as 日日姬
# JP: 「御一夜の衰退を考えれば、当然の結論だというだけです。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の工場誘致は、安定的な発展をもたらします」
2413 = "「Nghĩ đến sự suy thoái của Ohimitera thì đó là kết luận đương nhiên thôi. Mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về sẽ mang lại sự phát triển ổn định.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、それは一面の真実だ。\nだが、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致が呼びこむものは他にもある」
2394 = "「Quả thật, đó cũng là một mặt của sự thật. Nhưng việc mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; về còn kéo theo những thứ khác nữa.」"
# monologue
# JP: 日々姫を見、真闇姉を見る。\n沈黙と、強い頷きと。
2918 = "Nhìn Hibiki, rồi lại nhìn chị Mayami. Một sự im lặng, và một cái gật đầu dứt khoát."
# 【双鉄】
# display as 雙鐵
# JP: 「“水質汚染”――そのことを日々姫は」
2235 = "「\"Ô nhiễm nguồn nước\"——Chuyện đó Hibiki có...」"
# 【日々姫】
# display as 日日姬
# JP: 「知っています、もちろん！」
2353 = "「Em biết chứ, tất nhiên rồi!」"
# monologue
# JP: 大声。\nそして日々姫の瞳は、僕より先に真闇姉へ向く。
2870 = "Lớn tiếng. Và rồi ánh mắt của Hibiki hướng về phía chị Mayami trước cả tôi."
# 【日々姫】
# display as 日日姬
# JP: 「“姉さん”も、\n兄さんと同じことを言っていましたから」
2076 = "「Bởi vì \"chị gái\" cũng, đã nói những điều y hệt như anh trai vậy.」"
# monologue
# JP: ねぇねぇではなく、あえて姉さん。\n姉妹喧嘩、と。その四文字が頭に浮かぶ。
2695 = "Không phải gọi là chị Mayami, mà lại cố tình gọi là \"chị gái\". Bốn chữ \"Chị em cãi nhau\" xẹt qua đầu tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ですが、汚染などという言葉は大げさです。排水は、\n国の環境基準内に余裕をもって収まるよう処理されます」
1931 = "「Nhưng mà, dùng từ ô nhiễm thì làm quá rồi. Nước thải sẽ được xử lý để đảm bảo nằm trong mức an toàn của tiêu chuẩn môi trường quốc gia.」"
# monologue
# JP: 日々姫はかなり感情的だ。\nいたずらに刺激せぬよう、言葉を選ぶ。
2995 = "Hibiki đang khá xúc động. Tôi lựa lời để tránh kích động em ấy một cách vô ích."
# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに。が、“国の基準”は、いわば最大公約数。\n地方地方の特色までを考慮してあるものとは言えない」
2391 = "「Điều đó thì đúng. Nhưng \"tiêu chuẩn quốc gia\" nói cho cùng cũng chỉ là ước số chung lớn nhất. Không thể nói là nó đã cân nhắc đến đặc thù của từng địa phương được.」"
# monologue
# JP: クっと日々姫が唇を噛む。\n口惜しそうに下を向き、上目遣いで僕を見てくる。
2978 = "Hibiki cắn chặt môi. Em ấy cúi gằm mặt xuống vẻ ấm ức, rồi ngước mắt lên nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃまでねぇねぇと同じこと～っ」
2570 = "「Ngay cả anh hai cũng nói y chang chị Mayami~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。やはりか」
2300 = "「Hừm. Quả nhiên là vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「やはりってなんね！　どぎゃん意味で」
1912 = "「Quả nhiên là sao chứ! Anh có ý gì hả!」"
# monologue
# JP: （ぽんっ）
3243 = "（Bộp）"
# monologue
# JP: 勢いこんだ日々姫が腰を跳ね上げて――\nその瞬間、ひどく間の抜けた音が立つ。
3023 = "Hibiki hầm hầm định đứng bật dậy—— Đúng lúc đó, một âm thanh vô cùng lạc lõng vang lên."
# monologue
# JP: 真闇姉だ。\n両手を柔らかに打ち鳴らし、困ったような笑みを浮かべる。
3011 = "Là chị Mayami. Chị ấy vỗ nhẹ hai tay vào nhau, nở nụ cười như đang bối rối."
# 【真闇】
# display as 真闇
# JP: 「ああ、いけん。蔵の仕事の途中やったけん。\n双ちゃん、ひーちゃんと仲よぉね」
2059 = "「A, không được rồi. Chị đang làm dở việc ở xưởng ủ rượu. Sou-chan, nhớ hòa thuận với Hii-chan nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「いややけん！　にぃにぃと仲良ぉなんて」
2440 = "「Em không chịu đâu! Ai thèm hòa thuận với anh hai chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2264 = "「Vậy sao?」"
# monologue
# JP: 豆鉄砲を食らう鳩。
2992 = "Giống hệt như chú chim bồ câu bị trúng đạn đậu."
# monologue
# JP: それを見事に顔面だけで表現しながら、\n日々姫は顔を赤くして、すぐその色を青ざめさせる。
2831 = "Hibiki thể hiện xuất sắc điều đó qua nét mặt, đôi má em đỏ bừng lên, rồi lại tái nhợt đi ngay lập tức."
# 【日々姫】
# display as 日日姬
# JP: 「あ――う……い、イヤゆうたんは、その――\nその、ですね、ええと、そういう意味ではなくて」
2052 = "「A——ư......k-không chịu là, cái đó—— cái đó, là, ừm, không phải ý đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無くて？」
1887 = "「Không phải ý đó?」"
# 【日々姫】
# display as 日日姬
# JP: 「イヤというほどイヤじゃ無い、っていうか――\nええと、仲良くしたく無いことは無いんですけど、その」
2198 = "「Cũng không hẳn là không chịu, ý em là—— ừm, không phải là em không muốn hòa thuận, mà là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「イヤだけど、イヤじゃない」
2584 = "「Không chịu, nhưng cũng không phải là không chịu.」"
# monologue
# JP: 謎かけの類は全く不得手だ。
2807 = "Tôi hoàn toàn mù tịt mấy trò giải đố kiểu này."
# monologue
# JP: が、日々姫の切羽詰まっての言葉なら、\nその意味を、なんとか汲み取るのが僕の義務だろう。
2728 = "Nhưng nếu là những lời nói trong lúc cuống quýt của Hibiki, thì việc cố gắng thấu hiểu ý nghĩa của nó hẳn là nghĩa vụ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「イヤだけど、イヤじゃ――ふむ？　もしかして……\nそれはアレか？　俗にいう、『イヤよイヤよも』」
2583 = "「Không chịu, nhưng cũng không phải là không chịu——Hừm? Lẽ nào...... Là cái đó sao? Tục ngữ có câu, 『Miệng nói ghét nhưng trong lòng lại』」"
# 【日々姫】
# display as 日日姬
# JP: 「好かんっ！　にぃにぃのアホーーーーーっ！」
2205 = "「Ghét lắm! Anh hai đồ ngốcccc!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2026 = "「Ối chà.」"
# monologue
# JP: 投げつけられた座布団を躱すその間に素早く、\n日々姫は居間を飛び出して、二階の自室にこもってしまう。
3148 = "Trong lúc tôi nhanh nhẹn né tấm nệm ngồi bị ném tới, Hibiki đã lao ra khỏi phòng khách và nhốt mình trong phòng riêng trên tầng hai."
# 【双鉄】
# display as 雙鐵
# JP: 「残念。間違えたか」
2006 = "「Tiếc thật. Mình đoán sai rồi sao.」"
# 【真闇】
# display as 真闇
# JP: 「残念なんは確かばい。\n間違ごーとらんけど、間違ごーとるけんねぇ」
2393 = "「Tiếc thật đấy. Sai thì không sai, nhưng mà sai rồi nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉まで謎かけか」
2373 = "「Đến cả chị Mayami cũng chơi trò giải đố sao.」"
# monologue
# JP: 降参だ。
2901 = "Đầu hàng thôi."
# monologue
# JP: 考えようとするより先に、\n両手が“お手上げ”を示してる。
3108 = "Chưa kịp suy nghĩ, hai tay tôi đã giơ lên \"đầu hàng\" rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「今度はいったいどういう意味――」
2482 = "「Lần này rốt cuộc là có ý gì vậy——」"
# monologue
# JP: 問えばすぐさま真闇姉は、\n人差し指をその口元に運び唇をいったん閉ざす。
2922 = "Vừa hỏi xong, chị Mayami liền đưa ngón trỏ lên miệng, ra hiệu im lặng."
# 【真闇】
# display as 真闇
# JP: 「――言えんね、双ちゃん。\n言うたらうちが、ひーちゃんに一生うらまれったい」
2484 = "「——Không nói được đâu, Sou-chan. Nói ra thì chị sẽ bị Hii-chan hận cả đời mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一生。それはたまらんな。\nならば聞くまい。自分で、おいおい考えてみよう」
1872 = "「Cả đời cơ à. Thế thì gay go thật. Vậy em không hỏi nữa. Để em tự từ từ suy nghĩ xem sao.」"
# 【真闇】
# display as 真闇
# JP: 「そーね、それが良かったい」
2069 = "「Đúng rồi, thế là tốt nhất.」"
# monologue
# JP: 微笑んで。視線を階段の上に送って、\n真闇姉は大げさなほどのため息をつく。
2827 = "Chị mỉm cười. Đưa mắt nhìn lên cầu thang, rồi chị Mayami thở dài một cách cường điệu."
# 【真闇】
# display as 真闇
# JP: 「けぇど、こーなると困ってしまうねぇ。双ちゃんには、\nひーちゃんの部屋にひとまず落ち着いてもらおうと」
1934 = "「Nhưng mà, thành ra thế này thì kẹt thật. Đang định cho Sou-chan tạm thời ở phòng của Hii-chan cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「無理ばい無理無理！　そぎゃんかこつは無理ったい！\nにぃにぃと同じ部屋なんてどぎゃんしても暮らせんけん」
1891 = "「Không được đâu, không được, không được! Chuyện đó là không thể nào! Ở chung phòng với anh hai thì kiểu gì em cũng không sống nổi đâu.」"
# 【真闇】
# display as 真闇
# JP: 「ゆーても、昔は一緒の部屋で暮らしておったでしょお」
1927 = "「Nhưng mà, ngày xưa hai đứa từng ở chung phòng cơ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「昔は昔、今は今！\nそぎゃんこつ、言うまでもなかろーもんっ！」
1923 = "「Ngày xưa là ngày xưa, bây giờ là bây giờ! Chuyện đó không cần nói cũng biết mà!」"
# monologue
# JP: ……十秒、二十秒、三十秒。
1550 = "......Mười giây, hai mươi giây, ba mươi giây."
# monologue
# JP: 続く言葉がないとゆったり確かめてから、\n真闇姉はくるりと僕を向く。
3087 = "Sau khi từ tốn xác nhận không còn tiếng đáp lại nào nữa, chị Mayami quay ngoắt sang nhìn tôi."
# 【真闇】
# display as 真闇
# JP: 「ゆーことらしか。\nどぎゃんすっとね？　双ちゃん」
2090 = "「Có vẻ không được rồi. Tính sao đây? Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうもこうも」
2530 = "「Chứ còn sao nữa.」"
# monologue
# JP: 日々姫が無理だといっていることを、\n覆すなど、僕には出来ない。
3126 = "Chuyện Hibiki đã nói là không được, tôi không thể nào làm trái ý em ấy được."
# monologue
# JP: いや、出来たとしても無理強いなどはしたくない。\n結論などはハナから一つだ。
2701 = "Không, dù có làm được tôi cũng không muốn ép buộc em ấy. Kết luận ngay từ đầu chỉ có một."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の部屋など物置でも押入れでも構わない。\nああ、酒の倉庫は……できれば、勘弁して欲しいが」
2209 = "「Phòng của em thì nhà kho hay tủ âm tường cũng được. À, nhưng kho rượu thì......nếu được, xin hãy tha cho em.」"
# 【真闇】
# display as 真闇
# JP: 「帝都でも、お酒つようならんかったと？」
2079 = "「Lên Đế đô rồi mà tửu lượng vẫn không khá lên sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「飲まされはしたが、一向に。\nどうも[きゅうしゅう,1]九洲男児とは、体質からして異なるようだ」
2433 = "「Tuy bị ép uống, nhưng chẳng khá lên chút nào. Có vẻ như thể chất của em vốn đã khác với nam nhi Kyushu rồi.」"
# 【真闇】
# display as 真闇
# JP: 「なんね、つまらん。\nほんなら、[さかぐら,1]酒蔵まわりはよしとかんとねぇ」
1913 = "「Gì chứ, chán thế. Vậy thì đành bỏ qua mấy chỗ quanh xưởng ủ rượu thôi.」"
# monologue
# JP: そうつぶやいて、真闇姉は長い指を一本一本折っていく。
3053 = "Vừa lẩm bẩm, chị Mayami vừa gập từng ngón tay thon dài lại."
# monologue
# JP: そしてぽおんと、\nまた間の抜けた音をたてつつ、両手を鳴らす。
3035 = "Rồi chị vỗ hai tay vào nhau, lại phát ra một âm thanh lạc lõng."
# 【真闇】
# display as 真闇
# JP: 「[じい,1]祖父様の部屋がよかったい」
1936 = "「Phòng của ông nội là hợp lý nhất đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[たいと,1]汰斗さんの？」
2321 = "「Phòng của ông Taito ạ?」"
# monologue
# JP: 義祖父――汰斗さん――僕をこの家に引き取ってくれ、\n僕の生きる目的を定めてくれた、大恩人。
3218 = "Ông nội nuôi——ông Taito——đã nhận nuôi tôi vào căn nhà này, định hình mục đích sống cho tôi, là một đại ân nhân."
# monologue
# JP: その方の部屋に？　とこぼしてしまった驚きを、\n真闇姉は申し訳無さそうな顔で受け止める。
3125 = "Chị Mayami đón nhận vẻ ngạc nhiên thốt ra từ tôi khi nghe nói đến phòng của ông ấy bằng một vẻ mặt áy náy."
# 【真闇】
# display as 真闇
# JP: 「開かずの部屋になっとるけん。\n空気は悪かろうもんけど、ホントの物置よりはマシとや」
2537 = "「Căn phòng đó giờ thành phòng đóng kín rồi. Không khí chắc sẽ tệ lắm, nhưng vẫn còn hơn nhà kho thực sự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんの部屋なら光栄だ。\nよければ、案内して欲しい」
2418 = "「Được ở phòng của ông Taito thì thật vinh hạnh. Nếu được, mong chị dẫn đường cho em.」"
# 【真闇】
# display as 真闇
# JP: 「そーね？　そんなら」
2256 = "「Vậy sao? Thế thì đi thôi.」"
# monologue
# JP: 右田の家は、何代も続くクマ焼酎の蔵元だ。\n屋敷も庭もどこもかしこも、全てが古くとても広い。
2806 = "Nhà Migita là một xưởng ủ rượu shochu Kuma truyền đời. Cả dinh thự lẫn khu vườn, bất cứ đâu cũng đều rất cổ kính và vô cùng rộng lớn."
# monologue
# JP: 引き取られ世話になっていた僕でも、\n足を踏み入れたことのない場所は、いくらでもある。
2779 = "Dù đã được nhận nuôi và chăm sóc ở đây, nhưng vẫn còn vô số nơi tôi chưa từng đặt chân đến."
# monologue
# JP: （……真闇姉の部屋のさらに先――\n一番、奥まった部屋になるのか）
3220 = "（......Còn đi xa hơn cả phòng của chị Mayami nữa—— Là căn phòng nằm tít trong cùng sao）"
# monologue
# JP: 長い廊下の突き当り。
3195 = "Tận cùng của hành lang dài."
# monologue
# JP: 重そうな錠をガチリと開き、\nごく無造作に、真闇姉は木の引き戸を開ける。
3057 = "Tiếng khóa nặng nề lạch cạch mở ra, chị Mayami cứ thế thản nhiên kéo cánh cửa lùa bằng gỗ."
# 【双鉄】
# display as 雙鐵
# JP: 「む――これは」
2485 = "「Hừm——Thế này thì」"
# monologue
# JP: 蒸し暑い。ひどく。\nそうして、物で埋め尽くされてる。
3202 = "Nóng bức. Kinh khủng. Và còn ngập ngụa toàn là đồ đạc."
# 【真闇】
# display as 真闇
# JP: 「なんね、物置と変わらんばい。\n祖父様は、整理整頓せん人やったとやねぇ」
2359 = "「Trời ạ, chẳng khác gì nhà kho. Ông nội đúng là người không biết sắp xếp gọn gàng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2286 = "「Không——」"
# monologue
# JP: 荷物は山積み。だが、物置とはやはり違う。\n部屋に重なる物たちには、なにやら統一感がある。
3199 = "Đồ đạc chất thành núi. Nhưng quả thực vẫn khác với nhà kho. Những món đồ chồng chất trong phòng toát lên một sự đồng nhất khó tả."
# monologue
# JP: 家人全てが思い思いに詰め込んでいったガラクタには、\nこの雰囲気は到底出せないものだろう。
2839 = "Những mớ hỗn độn do mọi người trong nhà tùy ý nhét vào, chắc chắn không thể tạo ra được bầu không khí thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「時間をかけて整頓すれば、かなり面白くなりそうだ。\nとはいえ……ひとまずは荷物を下ろす場所を作らねばな」
2422 = "「Nếu dành thời gian dọn dẹp lại, chắc sẽ thú vị lắm đây. Tuy nói vậy......nhưng trước mắt phải tạo ra một chỗ để hạ hành lý xuống đã.」"
# 【真闇】
# display as 真闇
# JP: 「確かに、こいじゃ窓も開けれんねぇ。\nああ、エアコンば手配せんとね」
2005 = "「Đúng thật, thế này thì cửa sổ cũng chẳng mở được. À, phải sắp xếp lắp máy lạnh nữa chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1888 = "「Không cần đâu.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんのためだけじゃなかとよ？\nこん部屋ば整えば、他にも使いようはあるけん」
2003 = "「Đâu phải chỉ vì Sou-chan thôi đâu? Dọn dẹp xong phòng này, còn có thể dùng vào việc khác nữa mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1574 = "「Ừm.」"
# monologue
# JP: 完全に先回りされてしまった。
2715 = "Chị ấy đã hoàn toàn đi trước một bước."
# monologue
# JP: さすがは、右田家の現当主――\n“クマの右田の女杜氏”だ。
2693 = "Không hổ danh là đương gia hiện tại của nhà Migita—— \"Nữ trưởng hầm rượu nhà Migita xứ Kuma\"."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのときのため、今は汗をかくとしよう」
2555 = "「Vậy thì, vì lúc đó, bây giờ đành đổ mồ hôi vậy.」"
# monologue
# JP: ともかく、廊下にものを出すか。
3091 = "Tóm lại, cứ mang đồ ra hành lang đã."
# monologue
# JP: 方針を固め手を動かせば、途端、\n真闇姉が笑いを含んだ声を出す。
2913 = "Vừa định hình phương hướng và bắt tay vào làm, ngay lập tức, chị Mayami cất giọng mang theo ý cười."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、片付けの手が足りんと？」
2103 = "「Sou-chan, thiếu người phụ dọn dẹp hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。　一人でも夜……\n明日の朝までにはなんとか出来るようには思う」
2324 = "「Không. Dù chỉ một mình thì đến đêm...... từ giờ đến sáng mai chắc cũng lo liệu xong thôi.」"
# 【真闇】
# display as 真闇
# JP: 「ほーたら、手伝いはいらんと？」
2154 = "「Thế là, không cần người giúp sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いらんとまでは。\nいてくれれば助かることは間違いない」
1904 = "「Cũng không đến mức không cần. Có người giúp thì chắc chắn sẽ đỡ hơn nhiều.」"
# monologue
# JP: 瞬間、にやりといたずらな笑み。\nそして真闇姉は、ことさらな大声を張り上げる。
3062 = "Ngay lập tức, một nụ cười tinh quái thoáng qua. Rồi chị Mayami cố tình cất giọng thật lớn."
# 【真闇】
# display as 真闇
# JP: 「『ふーん、双ちゃんは片付けの手伝いを探しとるんねー、\n誰かおるかねぇ、双ちゃんの荷解き手伝ぉて』」
1569 = "「『Hừm, Sou-chan đang tìm người phụ dọn dẹp nè, có ai ở đó không, giúp Sou-chan dỡ hành lý với』」"
# monologue
# JP: （トトトトトト）
3237 = "（Bịch bịch bịch bịch bịch bịch）"
# monologue
# JP: 軽やかな音。
3155 = "Một âm thanh nhẹ nhàng."
# monologue
# JP: 軽やかすぎて一瞬そうとは気づけ無かった、\nそれは階段を駆け下りる音。
3188 = "Quá đỗi nhẹ nhàng khiến tôi nhất thời không nhận ra, đó là tiếng bước chân chạy vội xuống cầu thang."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ、手伝おて欲しかと？」
2575 = "「Anh hai, cần người giúp không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2048 = "「唔」" 
# monologue
# JP: 手伝いの手はもちろん欲しいし、\n日々姫と妙にこじれることを望みもしない。
3036 = "Đương nhiên là tôi cần người giúp, và tôi cũng không muốn quan hệ với Hibiki trở nên rắc rối một cách kỳ cục."
# 【双鉄】
# display as 雙鐵
# JP: 「手伝ってもらえれば助かる」
1949 = "「Em giúp thì đỡ cho anh quá.」"
# monologue
# JP: だからそこまで素直に言えば、\n出した言葉が、記憶をも引きずり出してくる。
3027 = "Thế nên khi tôi thành thật nói ra điều đó, chính những lời ấy đã gợi lại cả những ký ức xưa."
# 【双鉄】
# display as 雙鐵
# JP: 「昔から日々姫は、こうしたセンスに優れているからな。\n居心地良い部屋に整えなおしてくれれば嬉しい」
2207 = "「Từ xưa Hibiki đã có khiếu trong mấy việc này rồi mà. Nếu em có thể dọn dẹp lại thành một căn phòng thoải mái thì anh vui lắm.」"
# monologue
# JP: 弾ける笑顔。\n胸が張られる。
2999 = "Một nụ cười rạng rỡ. Lồng ngực ưỡn lên đầy tự hào."
# 【日々姫】
# display as 日日姬
# JP: 「まかせんしゃ――ん、ん、ん。\n兄さん、わたしにお任せください」
2223 = "「Cứ giao cho e——ưm, ưm, ưm. Anh trai, cứ giao cho em đi ạ.」"
# monologue
# JP: コホンと小さく咳払い。\nそして日々姫は、前のめりになってた姿勢を整える。
3154 = "Khẽ hắng giọng. Rồi Hibiki chỉnh lại tư thế đang rướn người về phía trước."
# 【日々姫】
# display as 日日姬
# JP: 「わたしもいろいろあれから成長したんですから。\n兄さんのお部屋、素敵に仕上げてみせます」
2134 = "「Từ dạo ấy em cũng đã trưởng thành nhiều mặt rồi. Phòng của anh trai, em sẽ trang hoàng lại thật tuyệt cho xem.」"
# 【真闇】
# display as 真闇
# JP: 「ほんならね、うちは\\x%l醸造蔵;#00ffc040;[じょうぞうぐら,2]醸造蔵%l;#;にもどるけん」
2444 = "「Vậy nha, chị quay lại \\x%l醸造蔵;#00ffc040;nhà xưởng ủ rượu%l;#; đây.」"
# monologue
# JP: ひらり手を振り立ち去りかけて、\n真闇姉はまた手を打ち鳴らし、僕らへ一度振り返る。
3058 = "Vừa phẩy tay định rời đi, chị Mayami lại vỗ tay một cái, quay lại nhìn chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「祖父様の部屋は[ふたま,1]二間続きになっとるけんねぇ。\nどっちも双ちゃんの好きにつこうてもろうてよかったい」
2346 = "「Phòng của ông nội gồm hai gian liền nhau đấy. Sou-chan cứ dùng cả hai gian theo ý thích nhé.」"
# monologue
# JP: 目の前に本。\n圧倒的な本の山。
3066 = "Sách ở ngay trước mắt. Một núi sách đồ sộ."
# monologue
# JP: とにかくこれを片付けなければ、足の踏み場にも苦労する。
3090 = "Dù sao thì nếu không dọn dẹp đống này, đến chỗ đặt chân cũng khó."
# 【双鉄】
# display as 雙鐵
# JP: 「よ……っと。うむ。\n次はこれだな――日々姫、すまんが廊下に頼む」
2478 = "「Xong......một món. Ừm. Tiếp theo là cái này——Hibiki, phiền em mang ra hành lang nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい……う――ん、\n本って、ほんとに重いですねぇ――ん」
2093 = "「Vâng......ư——m, Sách đúng là nặng thật đấy nhỉ——ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頑張れ頑張れ。\n成長したところを見せてくれるんだろう？」
1981 = "「Cố lên cố lên. Chẳng phải em định cho anh thấy sự trưởng thành của mình sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……まぁ……体力的にも――\nさすがに――成長……してますけど――んっ」
2518 = "「Chuyện đó thì......ừm......về mặt thể lực—— Quả thực——cũng có trưởng thành......thật đấy——ưm.」"
# monologue
# JP: “磨いたセンスを見せたいのに”と、\n口ではぼやいてみせつつやはり、日々姫は日々姫だ。
3200 = "Dù ngoài miệng càu nhàu \"Rõ ràng là muốn cho anh thấy gu thẩm mỹ đã được rèn giũa cơ mà\", nhưng quả nhiên, Hibiki vẫn là Hibiki."
# monologue
# JP: こつこつ地道にひとつずつ、投げ出すことなく、\n僕から受けとる段ボールを、廊下に綺麗に詰み並べてく。
2825 = "Cần mẫn bê từng thùng carton nhận từ tay tôi, không hề bỏ cuộc, xếp ngay ngắn ra ngoài hành lang."
# 【双鉄】
# display as 雙鐵
# JP: 「よし――これで。\nうむ、どうやら畳が見えるようになったな」
2491 = "「Tốt——thế này là xong. Ừm, có vẻ như đã nhìn thấy chiếu tatami rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですね。なら次はこの[かざ]飾り[だんす,1]箪笥。それから押入れです。\n開けて不要品をどかせば、本をしまえるようになります」
2260 = "「Đúng vậy. Tiếp theo là chiếc tủ trang trí này. Sau đó là tủ âm tường. Mở ra và dọn bớt đồ không cần thiết đi, là có thể cất sách vào được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よし。ならばまずは――うおっ！」
2528 = "「Được. Vậy thì trước tiên——uây!」"
# 【日々姫】
# display as 日日姬
# JP: 「な、なにしてるんですか、兄さんっ――\nこほっ！　けほっ！」
1951 = "「A-Anh đang làm gì vậy hả, anh trai—— Khụ! Khụ!」"
# monologue
# JP: ホコリが舞う、などという言葉は全く足りない。\nホコリが固まり“面”を構成するに至った――
1539 = "Bụi bay mù mịt, dùng từ đó thôi thì hoàn toàn không đủ. Bụi đã đóng cục lại tạo thành một \"mảng\" luôn rồi——"
# monologue
# JP: その“面”が飾り箪笥の上から垂れ込めて、\n僕と日々姫を頭からすっぽり飲み込んでいく。
3175 = "\"Mảng\" bụi đó rơi xuống từ nóc tủ trang trí, nuốt chửng lấy tôi và Hibiki từ đầu đến chân."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――これは、たまらんっ！」
2486 = "「Thế này thì——thế này thì, chịu sao thấu!」"
# 【日々姫】
# display as 日日姬
# JP: 「ハタキです！　\nハタキを使って、ひとまずホコリを散らしましょう！」
2219 = "「Chổi lông gà! Dùng chổi lông gà để phủi bớt bụi đi đã!」"
# monologue
# JP: 目も開けられぬが気配は感じる。
3068 = "Dù không mở nổi mắt nhưng tôi vẫn cảm nhận được động tĩnh."
# monologue
# JP: 日々姫はなにやらじたばたと、\nかなり大きく動いて空気をかき乱――
2982 = "Hibiki đang cuống cuồng làm gì đó, cử động khá mạnh làm không khí xáo trộ——"
# monologue
# JP: （ガシャンっ！！！！！！！）
3247 = "（Choang!!!!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃあああっ！？」
2017 = "「Á á á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！？　――っと」
2239 = "「Hibiki!? ——Khoan đã.」"
# monologue
# JP: ――美しい――\nその言葉だけが、目から脳へと突き抜けていく。
2822 = "——Đẹp quá—— Chỉ từ đó thôi đã xuyên thẳng từ mắt lên não tôi."
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんして……\nどぎゃんして、じぃじの部屋にお[にんぎょ,1]人形なんて」
2332 = "「Tại sao...... Tại sao trong phòng ông nội lại có búp bê chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2054 = "「A.」"
# monologue
# JP: 泣きそうな声。\nやるべきことを、それでどうにか思い出す。
3186 = "Giọng nói như sắp khóc. Nhờ đó tôi mới sực nhớ ra việc mình cần làm."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、無事か？　怪我はないか？」
2244 = "「Hibiki, em không sao chứ? Có bị thương không?」"
# monologue
# JP: 両手を両手でつかみ、ながめる。\n手から腕には、どうやら傷などない様子だが――
2924 = "Tôi dùng hai tay nắm lấy hai tay em ấy, xem xét cẩn thận. Từ bàn tay đến cánh tay có vẻ không có vết thương nào, nhưng——"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！？　ひゃ、あっ――平気！　平気ったい！\nあ！　その、無事です、怪我はありません」
2018 = "「Hyaa!? Hya, á——Không sao! Không sao đâu! A! Ý em là, em không sao, không bị thương đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならなによりだ」
2531 = "「Vậy thì tốt rồi.」"
# monologue
# JP: 無事だというなら見るべきものは変わってくる。
3078 = "Nếu em ấy không sao thì thứ cần nhìn sẽ thay đổi."
# monologue
# JP: 日々姫の手から指を離して、\nホウキとチリトリに持ち換える。
2907 = "Tôi buông ngón tay khỏi tay Hibiki, đổi sang cầm chổi và hót rác."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は少し離れていろ。\nなに、割れ物の処理になら慣れている」
2238 = "「Hibiki lùi ra xa một chút đi. Không sao đâu, anh quen xử lý đồ dễ vỡ rồi.」"
