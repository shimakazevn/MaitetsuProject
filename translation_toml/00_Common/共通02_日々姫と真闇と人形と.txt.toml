2186 = "「Anh có một người bạn khá là hậu đậu. \nCậu ta cẩu thả nên hở ra là làm hỏng đồ đạc, nhưng lại là một người đàn ông thông minh đến kinh ngạc.」"

# 【日々姫】
# JP: 「それはそうなのでは――\nその方もつまり、帝大生なんですよね？」
2492 = "「Chuyện đó chẳng phải rõ ràng rồi sao―― \nNgười đó rốt cuộc cũng là sinh viên Đế Đại đúng không?」"

# 【双鉄】
# JP: 「勉強うんぬんという話ではない。\n一を聞いて百を知るというか――うむ。これでどうだ」
1953 = "「Đây không phải là chuyện học hành gì nữa rồi. \nGiống như là nghe một hiểu mười vậy―― Ừm. Thế này thì sao?」"

# 【日々姫】
# JP: 「わ、本当に手早いですね。見事です」
2029 = "「Oa, thực sự nhanh tay quá ạ. Thật tuyệt vời」"

# 【双鉄】
# JP: 「確かに、見事だ」
2396 = "「Quả thực, rất tuyệt vời」"

# (独白)
