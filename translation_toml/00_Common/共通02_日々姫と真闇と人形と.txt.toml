2549 = "「Chuyện đó... là vì em cũng dự định lên Đế Đô mà. \nNên em đã theo học một giáo viên đàng hoàng và luyện tập rất nhiều đấy」"

# 【双鉄】
# JP: 「ほう。日々姫も帝都にか。\n帝大にでも進むつもりか？」
2266 = "「Ồ. Hibiki cũng muốn lên Đế Đô sao. \nEm tính thi vào Đại học Đế Quốc à?」"

# 【日々姫】
