2100 = "「Đúng không. Hachiroku cũng xinh đẹp thế này mà. Đợi quen hơn chút nữa, chắc chắn Hibiki sẽ muốn vẽ cô cho xem.」"
# 【ハチロク】
# display as 八六
# JP: 「それはそれは、とても光栄に存じます」
2523 = "「Được vậy thì, quả là vinh hạnh cho tôi.」"
# 【真闇】
# display as 真闇
# JP: 「はいはい、なんねなんね」
1952 = "「Rồi rồi, chuyện gì chuyện gì.」"
# monologue
# JP: 真闇姉がおっとりゆったりやってくる。
3055 = "Chị Mayami thong thả bước tới."
# monologue
# JP: その後ろに、日々姫。\n真闇姉の体を盾にしているように、隠れてる。
2980 = "Theo sau là Hibiki. Đang trốn sau lưng chị Mayami như lấy chị ấy làm lá chắn."
# 【真闇】
# display as 真闇
# JP: 「おやまぁ、この子が。\nはじめまして、ハチロクさん」
2033 = "「Ây da, là đứa bé này sao. Rất vui được gặp em, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はじめまして、真闇様。\nわたくしのことは、どうぞハチロクとお呼びください」
1974 = "「Rất vui được gặp ngài, ngài Mayami. Xin hãy cứ gọi tôi là Hachiroku.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ハチロクちゃんね。\nウチんことも真闇でよかたい」
2558 = "「Vậy thì là Hachiroku nhỉ. Em cứ gọi chị là Mayami cũng được.」"
# 【ハチロク】
# display as 八六
# JP: 「お気持ちだけ頂戴します、真闇様。\nそこは、人と物との[ぶん]分とわきまえておりますので」
2147 = "「Tôi xin ghi nhận tấm lòng của ngài, ngài Mayami. Nhưng tôi biết rõ ranh giới giữa con người và đồ vật ạ.」"
# 【真闇】
# display as 真闇
# JP: 「おやまぁ、これは随分と」
2035 = "「Ây da, em khách sáo quá.」"
# monologue
# JP: そこで言葉を切ってしまって、ちらりと真闇姉が僕を見る。
3139 = "Nói đến đó rồi ngưng bặt, chị Mayami liếc nhìn tôi."
# 【真闇】
# display as 真闇
# JP: 「そんで？　ハチロクちゃんは何のご用と？」
2557 = "「Vậy sao? Hachiroku có việc gì thế?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。実は――」
2276 = "「Vâng. Thực ra là——」"
# monologue
# JP: ……ハチロクの言葉は装飾的だが、無駄がない。\n聞けばすぐ、話の要点を理解出来る。
1546 = "……Lời nói của Hachiroku tuy có phần hoa mỹ, nhưng không hề dư thừa. Chỉ cần nghe là có thể hiểu ngay trọng tâm câu chuyện."
# 【真闇】
# display as 真闇
# JP: 「ほんならハチロクちゃんは、\n身の振り方をうちに決めてほしかと？」
2551 = "「Thế là Hachiroku, muốn chị quyết định nơi ăn chốn ở cho em sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは汰斗様に買い取られた物ですので。\n筆頭相続人たる真闇様が今の[オーナー,2]所有者であるかと」
2270 = "「Vâng. Vì tôi là vật được ngài Taito mua về. Nên tôi nghĩ người thừa kế hàng đầu là ngài Mayami chính là chủ sở hữu hiện tại.」"
# 【真闇】
# display as 真闇
# JP: 「そらぁ違ごとるね、ハチロクちゃん」
2521 = "「Cái đó thì sai rồi, Hachiroku.」"
# monologue
# JP: パチ、とハチロクがまばたきする。
2746 = "Chớp, Hachiroku chớp mắt."
# 【ハチロク】
# display as 八六
# JP: 「なにが、でございますか？」
2448 = "「Sai ở đâu cơ ạ?」"
# 【真闇】
# display as 真闇
# JP: 「祖父様の部屋とその所有物は、全部双ちゃんが相続人たい。\nじゃっけん、ハチロクちゃんのオーナーは」
2345 = "「Phòng của ông nội và các vật dụng trong đó, tất cả đều do Sou-chan thừa kế. Thế nên, chủ sở hữu của Hachiroku là...」"
# 【ハチロク】
# display as 八六
# JP: 「了解しました。\n……双鉄様が、わたくしの現オーナーなのですね」
2180 = "「Tôi hiểu rồi. ……Ngài Soutetsu chính là chủ sở hữu hiện tại của tôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうらしいな」
2089 = "「Có vẻ là vậy.」"
# monologue
# JP: それが真闇姉の決定ならば、僕に異論のあるはずもない。\n与えられた義務ならもちろん、ただ全力で果たすのみだ。
2844 = "Nếu đó là quyết định của chị Mayami, tôi cũng không có lý do gì để phản đối. Nếu đã là nghĩa vụ được giao, tất nhiên tôi sẽ dốc toàn lực để hoàn thành."
# 【双鉄】
# display as 雙鐵
# JP: 「身の処し方と言っていたが――\nハチロクに、なにか希望はあるのか？」
2224 = "「Cô vừa nói đến chuyện nơi ăn chốn ở—— Hachiroku có nguyện vọng gì không?」"
# 【ハチロク】
# display as 八六
# JP: 「希望……ですか？　わたくしの？」
2152 = "「Nguyện vọng……sao ạ? Của tôi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「他の者の希望を聞いても仕方あるまい。\n知性があるなら、無論、希望もわくだろう」
1969 = "「Nghe nguyện vọng của người khác thì cũng đâu giải quyết được gì. Nếu đã có trí tuệ, thì đương nhiên cũng sẽ có nguyện vọng chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
2515 = "「Chuyện đó——」"
# monologue
# JP: 戸惑っている。\nそうとしか見えない。
3041 = "Cô ấy đang bối rối.\nChỉ có thể thấy là như vậy."
# 【ハチロク】
# display as 八六
# JP: 「少し……しばらくお待ちください。\nそのようなこと……初めて問われましたので――」
2407 = "「Xin ngài……đợi một lát. Những chuyện thế này……đây là lần đầu tiên tôi được hỏi——」"
# monologue
# JP: 俯き。沈黙。\nやがてその顔がわずかに上がり、唇が静かに開かれ――
2733 = "Cúi đầu. Im lặng. Một lúc sau, khuôn mặt ấy hơi ngẩng lên, đôi môi khẽ hé mở——"
# monologue
# JP: （く～～～っ）
3236 = "（Rột~~~）"
# 【真闇】
# display as 真闇
# JP: 「あら」
2031 = "「Ây da.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇっ！　あらとか言うたらかわいそーばいっ！」
2580 = "「Chị hai! Chị kêu 'ây da' như thế tội nghiệp người ta lắm!」"
# 【ハチロク】
# display as 八六
# JP: 「//////」
2592 = "「//////」"
# monologue
# JP: 日々姫の善意の追い打ちに、\nハチロクはうつむき赤くなる。
2857 = "Trước đòn bồi thêm đầy thiện ý của Hibiki, Hachiroku cúi gằm mặt, đỏ bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ぜんまいでは足りんのか？」
1967 = "「Chỉ lên dây cót thôi thì không đủ sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2271 = "「Vâng.」"
# monologue
# JP: 単刀直入にそう尋ねれば、\nほっとしたような目が僕を向く。
2888 = "Khi tôi hỏi thẳng thừng như vậy, cô ấy nhìn tôi với ánh mắt như trút được gánh nặng."
# 【ハチロク】
# display as 八六
# JP: 「あれは……単なる非常動力ですので」
2516 = "「Cái đó……chỉ đơn thuần là nguồn động lực khẩn cấp thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「非常ではない動力源は？」
2556 = "「Vậy nguồn động lực không khẩn cấp là gì?」"
# 【ハチロク】
# display as 八六
# JP: 「蒸気です。\nですから、水と石炭をもしいただければ」
2281 = "「Là hơi nước ạ. Thế nên, nếu ngài có thể cho tôi xin nước và than thì...」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。水なら」
2489 = "「Vậy sao. Nước thì...」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃにぃ！　わたし行くけんっ！」
2061 = "「A, anh hai! Để em đi lấy cho!」"
# monologue
# JP: 恥をかかせた汚名返上。\n気持ちを体全部で示し、日々姫がまた走って、戻る。
2871 = "Như muốn chuộc lại lỗi lầm vừa gây ra. Hibiki thể hiện điều đó bằng cả cơ thể, em ấy lại chạy đi rồi nhanh chóng quay lại."
# 【日々姫】
# display as 日日姬
# JP: 「これ、お酒づくりに使う上等な水たい」
2481 = "「Đây là nước thượng hạng dùng để ủ rượu đó.」"
# 【ハチロク】
# display as 八六
# JP: 「澄み切っていますね。頂戴します」
2356 = "「Nước trong vắt luôn nhỉ. Tôi xin nhận ạ.」"
# monologue
# JP: 小さなコップを両手いっぱい持ちながら、\nこくこくこくと、ハチロクは喉を鳴らす。
2829 = "Ôm chặt chiếc cốc nhỏ bằng cả hai tay, Hachiroku ừng ực nuốt từng ngụm nước."
# 【ハチロク】
# display as 八六
# JP: 「ふぅ」
2030 = "「Phù.」"
# monologue
# JP: 見る間にコップが空になる。\n真闇姉の目が細くなる。
2691 = "Thoáng chốc chiếc cốc đã cạn sạch. Đôi mắt chị Mayami nheo lại."
# 【真闇】
# display as 真闇
# JP: 「よか飲みっぷりたい！\n今度、飲みっくらせん？」
2368 = "「Uống sảng khoái ghê! Hôm nào tụi mình thi uống rượu không?」"
# 【ハチロク】
# display as 八六
# JP: 「真水でよければ、よろこんで。\nアルコールは異常燃焼の原因となってしまいますので」
2000 = "「Nếu là nước lọc thì tôi rất sẵn lòng. Chứ cồn sẽ là nguyên nhân gây ra cháy bất thường mất.」"
# 【真闇】
# display as 真闇
# JP: 「真水ば、うちがよー飲まん」
2025 = "「Nước lọc thì, chị lại không hay uống.」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
2070 = "「Fufu.」"
# monologue
# JP: 機嫌良さそうな微笑み。
2834 = "Một nụ cười trông có vẻ vui vẻ."
# monologue
# JP: 自分の飲みくちをハンカチでぬぐい、\nハチロクは日々姫にコップを返す。
2748 = "Dùng khăn tay lau miệng, Hachiroku trả lại chiếc cốc cho Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「大変に上等なお水でした。\nお酒づくりとおっしゃってましたが」
2355 = "「Nước thực sự rất hảo hạng. Lúc nãy cô nói là dùng để ủ rượu nhỉ...」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2051 = "「A……」"
# monologue
# JP: 日々姫の視線がそっぽを向く。\nコップの水は、お酒造りに――クマ焼酎に使う水。
2989 = "Ánh mắt Hibiki lảng đi chỗ khác. Nước trong cốc là nước dùng để ủ rượu——nước dùng cho shochu Kuma."
# monologue
# JP: クマ川の源流の話をすれば、なるほど、\nさっきのいさかいの蒸し返しになりかねない。
2782 = "Nếu nhắc đến ngọn nguồn sông Kuma, thì ra là vậy, rất có thể sẽ lại khơi mào cho cuộc cãi vã lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「水が満ちたなら次は石炭だな。\n真闇姉、この家に石炭は？」
2313 = "「Nếu đã đủ nước rồi thì tiếp theo là than nhỉ. Chị Mayami, nhà mình có than không?」"
# 【真闇】
# display as 真闇
# JP: 「うちにも石炭ボイラがあるにはあるばってん、\nもう長いこと使ことらんけんねぇ」
2097 = "「Nhà mình có nồi hơi đốt than thì cũng có đấy, nhưng lâu lắm rồi không dùng đến nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、近所に石炭を売っている店などは？」
2561 = "「Vậy thì, quanh đây có cửa hàng nào bán than không?」"
# 【日々姫】
# display as 日日姬
# JP: 「なか……んっ、無いと思います、兄さん。\nですが、ひょっとすると[じゅつせんどう,2]術仙洞に」
2323 = "「Khôn……ưm, em nghĩ là không có đâu, anh trai. Nhưng mà, biết đâu ở Jussendo lại có.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、あそこは廃炭鉱だったな――っと」
1988 = "「Ra là vậy, chỗ đó từng là mỏ than bỏ hoang mà nhỉ——ái chà.」"
# monologue
# JP: ハチロクを無造作につかもうとして、\n危ういところで、さっきの失敗を思い出す。
3018 = "Định tiện tay túm lấy Hachiroku, nhưng trong khoảnh khắc nguy hiểm, tôi sực nhớ lại sai lầm lúc nãy."
# monologue
# JP: 乙女――だと、この知性ある物は言っていた。\nならば乙女に対するように、僕もふるまうべきであろう。
3174 = "Thiếu nữ——vật có trí tuệ này đã nói như vậy. Thế thì tôi cũng phải cư xử như đối với một thiếu nữ mới phải."
# 【双鉄】
# display as 雙鐵
# JP: 「そこへ案内したいのだが。\nハチロク、僕はどのように君をエスコートすれば良いか」
2536 = "「Tôi muốn dẫn cô đến đó. Hachiroku, tôi nên hộ tống cô như thế nào đây?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、そんな――\nそこまでのことをしていただくわけには」
1898 = "「Không, chuyện đó—— Tôi không thể để ngài làm đến mức ấy được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「行くさ。僕は君のオーナーとなったのだからな。\n君を大切に扱う義務がある」
2435 = "「Phải đi chứ. Tôi đã trở thành chủ sở hữu của cô rồi mà. Tôi có nghĩa vụ phải trân trọng cô.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございますか」
2285 = "「Là vậy sao ạ.」"
# monologue
# JP: ごくさり気なく、ハチロクは髪を整える。
2742 = "Một cách vô cùng tự nhiên, Hachiroku vuốt lại mái tóc."
# 【ハチロク】
# display as 八六
# JP: 「それではお伺いいたしますが――双鉄様の利き腕は？」
2554 = "「Vậy thì cho phép tôi được hỏi——Ngài Soutetsu thuận tay nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「右だ」
2015 = "「Tay phải.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、\n左手をわたくしのイスにして頂いてよろしいですか？」
2559 = "「Nếu vậy, ngài có thể cho tôi dùng tay trái làm ghế ngồi được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、こうか？」
1987 = "「Ra là vậy, thế này sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、上等です」
2277 = "「Vâng, rất tuyệt ạ.」"
# monologue
# JP: 左手を曲げ腰を落とせば、\nハチロクの尻が腕に乗る。
2892 = "Gập tay trái lại và hạ thấp người xuống, mông Hachiroku đặt gọn lên cánh tay tôi."
# monologue
# JP: 見た目よりかなりずっしりしている。\nなるほど、蒸気機関というのも納得だ。
3025 = "Nặng hơn vẻ bề ngoài khá nhiều. Ra là vậy, đúng là động cơ hơi nước có khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば行こう」
2552 = "「Vậy đi thôi.」"
# monologue
# JP: 立ち上がれば、自然とハチロクは寄りかかってくる。\n胸板と腕に分散されれば、なかなか心地よい重さと感じる。
2916 = "Khi tôi đứng dậy, Hachiroku tự nhiên tựa vào người tôi. Trọng lượng phân tán đều lên ngực và cánh tay, tạo thành một sức nặng khá dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、日々姫。\n片付けの途中にすまんが、ちょっと行ってくる」
2377 = "「Chị Mayami, Hibiki. Xin lỗi vì đang dọn dẹp dở dang, nhưng anh đi một lát nhé.」"
# 【真闇】
# display as 真闇
# JP: 「はい、いってらっしゃい」
2094 = "「Ừm, em đi cẩn thận.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん？　そんな、簡単に行くと言っても」
2046 = "「Anh trai? Anh nói đi là đi đơn giản vậy sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに、実際に簡単だ。\n僕の\x%lエアクラ;#00ffc040;エアクラ%l;#;は優秀だからな」
1976 = "「Có gì đâu, thực sự rất đơn giản mà. \\x%lエアクラ;#00ffc040;Aircra%l;#; của anh xuất sắc lắm đấy.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「じゃけん、そん\x%lエアクラ;#00ffc040;エアクラ%l;#;が」\n「\x%lエアクラ;#00ffc040;エアクラ%l;#;っ！！？」
2009 = "「Thì thế, cái \\x%lエアクラ;#00ffc040;Aircra%l;#; đó...」 「\\x%lエアクラ;#00ffc040;Aircra%l;#;!!?」"
# monologue
# JP: 手の中、いきなりの大音声。\nハチロクはそしてもがき始める。
2900 = "Một tiếng hét lớn bất ngờ vang lên trong vòng tay tôi. Và rồi Hachiroku bắt đầu giãy giụa."
# 【双鉄】
