# (独白)
# JP: 音も立てずにふすまを開き、\n氷水の乗ったお盆を持った[まくら,1]真闇[ねぇ]姉が入ってくる。
3085 = "Chị Mayami mở cửa lùa mà không hề gây ra một tiếng động, \n bưng vào một chiếc khay có đặt ly nước đá."

# 【真闇】
# JP: 「双ちゃん、おかえり。\n六年の[ま]間に、ずいぶん大きゅうなったねぇ」
2104 = "「Sô-chan, mừng em đã về. \n Trong sáu năm qua, em lớn tướng lên nhiều quá nhỉ」"

# (独白)
# JP: 真闇姉の笑いは、ゆったりだ。\n上空から見たクマ川をふと思い出す。
