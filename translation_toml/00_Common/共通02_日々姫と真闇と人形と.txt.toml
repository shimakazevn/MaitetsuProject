2345 = "「Vâng. Vì tôi là vật sở hữu do ngài Taito mua lại. \nNên tôi nghĩ Mayami-sama, với tư cách là người thừa kế hợp pháp đầu tiên, chính là chủ nhân hiện tại của tôi ạ」"

