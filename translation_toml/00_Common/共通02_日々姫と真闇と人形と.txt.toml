3000 = "Hibiki cực kỳ ghét việc tôi nhắc đến chuyện mình là con nuôi. Tôi biết điều đó, nhưng lại lỡ buột miệng theo lời Hachiroku mất rồi."
# 【ハチロク】
# display as 八六
# JP: 「軽やかですね、日々姫さまの足音は」
2131 = "「Thật nhẹ nhàng, tiếng bước chân của ngài Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ああ見えて文武両道だ。\nそのうえ、たいそう絵がうまい」
2258 = "「Đúng vậy. Nhìn thế thôi chứ con bé văn võ song toàn đấy. Hơn nữa, vẽ tranh cũng rất giỏi.」"
# 【ハチロク】
# display as 八六
# JP: 「それは素敵です」
2526 = "「Thật tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
