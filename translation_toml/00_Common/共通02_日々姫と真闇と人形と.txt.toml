3198 = "Đến cả Navi cũng từng chỉ ra điều đó, \nvà quả thực, sự thay đổi của Hibiki là vô cùng rõ rệt."

# (独白)
# JP: それを素直に認めれば、\n寄ってた眉根がふわりとゆるむ。
2889 = "Khi tôi thành thật thừa nhận điều đó, \nđôi lông mày đang nhíu lại của em ấy liền giãn ra nhẹ nhõm."

# 【日々姫】
