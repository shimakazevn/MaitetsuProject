# JP: 「細かなところはまだわかりません。\nけれど、兄さんの一番兄さんらしいところは、同じです」
2436 = "「Những chi tiết nhỏ thì em chưa biết. \nNhưng phần giống anh hai nhất của anh, vẫn y như vậy」"

# 【双鉄】
# JP: 「自分のことはよくわからんが――\nふむ、日々姫が言うならそうなのかもしれん」
2160 = "「Anh thì không rõ bản thân mình thế nào nữa―― \nHừm, nhưng nếu Hibiki đã nói vậy thì chắc là thế rồi」"

# (独白)
# JP: 今度はぽん、と赤くなる。\n今日の日々姫は、昔以上の百面相だ。
3178 = "Lần này thì \\\"phừng\\\" một cái, mặt em ấy đỏ bừng lên. \nHibiki của ngày hôm nay còn biểu cảm phong phú hơn cả ngày xưa nữa."

# 【日々姫】
# JP: 「わ、私が言うなら――って」
