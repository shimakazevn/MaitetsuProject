3140 = "Nói rồi, Hachiroku với vẻ mặt sực tỉnh, lần lượt nhìn tôi, rồi nhìn Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「いいえ、真闇様はきっと“\x%l枕木;#00ffc040;枕木%l;#;”のまくらですね。\n双鉄様は、その上に敷かれる双鉄、レール」
1884 = "「Không phải, ngài Mayami chắc chắn là chữ 'Mayami' (Makura) trong \"\\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;\" (Makuragi). Còn ngài Soutetsu là cặp đường sắt (Soutetsu) được đặt lên trên đó, tức là đường ray.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
# 2264 = "「是嗎？」" 
# 【ハチロク】
# display as 八六
# JP: 「そして、日々姫様はレールと\x%l列車;#00ffc040;列車%l;#;とのたてる響き。\n汰斗様は、お孫様達に素敵なお名前をつけられましたね」
2339 = "「Và, ngài Hibiki là âm vang (Hibiki) được tạo ra giữa đường ray và \\x%l列車;#00ffc040;tàu%l;#;. Ngài Taito đã đặt cho các cháu của mình những cái tên thật tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうならよかったのだが、僕は」
2162 = "「Nếu được vậy thì tốt quá, nhưng tôi thì...」"
# 【日々姫】
# display as 日日姬
# JP: 「わたし、ねぇねぇ呼んでくるばいっ！」
2166 = "「Em, em đi gọi chị hai đây!」"
# monologue
