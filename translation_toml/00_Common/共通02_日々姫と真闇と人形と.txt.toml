# JP: 「そら確かばい。ひーちゃんは昔から、\n双ちゃんのことばよー見ゆうけんねぇ」
2519 = "「Chuyện đó là cái chắc rồi. Bác Hi-chan từ xưa tới giờ \nlúc nào cũng để mắt tới bác Sou-chan mà nè」"

