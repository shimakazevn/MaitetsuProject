# (独白)
# JP: 分厚い、一枚板の座卓。\nこの大きさだというのに欠けも無く傷ひとつさえも無い。
2781 = "Một chiếc bàn trà bằng tấm gỗ nguyên khối dày cộp. \nKích thước lớn đến nhường này vậy mà không một vết sứt, chẳng một vết trầy."

