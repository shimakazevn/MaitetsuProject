1552 = "……Sau khi gạt bỏ những mảnh kính vỡ vụn đi, \nkhông còn điều gì làm vướng bận tầm mắt nữa."

# 【双鉄】
# JP: 「まるで生きているような人形だな。\n精巧で……魅入られそうに美しい」
2479 = "「Quả là một búp bê sống động như thật vậy. \nTinh xảo tới mức…… đẹp đến mê hồn」"

# 【日々姫】
# JP: 「兄さん、人形に興味があるんですか？」
2043 = "「Anh hai, anh cũng có hứng thú với búp bê à?」"

