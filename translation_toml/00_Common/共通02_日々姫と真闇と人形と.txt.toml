2268 = "「Vâng. ……À ừm, thất lễ cho tôi được hỏi, Ngài Soutetsu có phải là người thừa kế của ngài Taito không ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうたい！」
2274 = "「Đúng vậy!」"
# monologue
# JP: 微妙に思えた質問に、\n僕より先に日々姫が答える。
3207 = "Với một câu hỏi có vẻ tế nhị, Hibiki đã trả lời trước cả tôi."
# monologue
# JP: 気持ちは嬉しい。\nだが、こうしたことはより正確を期すべきだ。
3106 = "Tấm lòng đó làm tôi rất vui. Nhưng, những chuyện thế này cần phải chính xác hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も相続人のはしくれではある。が、一番の相続人。\n右田家の現当主ということであれば、真闇姉だ」
2163 = "「Tôi cũng là một trong những người thừa kế. Nhưng người thừa kế số một, đương kim gia chủ nhà Migita hiện tại, là chị Mayami.」"
# 【ハチロク】
# display as 八六
# JP: 「マクラネエ――様でございますか？」
2374 = "「Ngài——Chị Mayami sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。真なる闇とかいて“まくら”と読む」
2278 = "「Ừm. Chữ 'Chân' trong chân thực ghép với chữ 'Ám' trong bóng tối, đọc là \"Mayami\".」"
# 【ハチロク】
# display as 八六
# JP: 「素敵なお名前。長いトンネルを思わせますね」
2130 = "「Một cái tên thật đẹp. Làm tôi liên tưởng đến một đường hầm dài.」"
# monologue
