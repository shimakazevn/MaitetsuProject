# JP: 「ならなによりだ」
2531 = "「Thế thì tốt quá rồi.」"

# (独白)
# JP: 無事だというなら見るべきものは変わってくる。
3078 = "Nếu em ấy đã vô sự, thì điều tôi cần chú ý bây giờ sẽ khác."

# (独白)
