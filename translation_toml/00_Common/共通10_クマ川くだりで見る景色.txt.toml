[script]
# lines: 445 
# monologue
# JP: 記憶のままの道を行くと\n記憶と異なる景色にやがて、たどり着く。
3211 = "Đi theo con đường trong ký ức,\nchẳng mấy chốc tôi đã đến một khung cảnh\nkhác xa với những gì mình nhớ."

# 【双鉄】
# display as 雙鐵
# JP: 「ここは――」
2738 = "「Đây là――」"

# 【凪】
# display as 凪
# JP: 「クマ川下りの発船所ばい。見りゃわかるばい」
2799 = "「Là bến thuyền đi dọc sông Kuma nha. Nhìn\nlà biết liền nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。それはそうなのだが――」
2312 = "「Không. Chuyện đó thì đúng là vậy nhưng――」"

# monologue
# JP: 今は八月。\n夏休みの真っ最中。
3307 = "Bây giờ là tháng Tám.\nĐang giữa kỳ nghỉ hè."

# monologue
# JP: そうしてここは、御一夜有数の観光スポット。\nだというのに……まるで人の気配がない。
3356 = "Vậy mà nơi đây, một trong những địa điểm\ndu lịch nổi tiếng của Ohimitera.\nLại vắng tanh vắng ngắt... chẳng có lấy\nmột bóng người."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。定休日とか、そういうことか？」
2365 = "「A. Là ngày nghỉ định kỳ hay gì đó sao?」"

# 【凪】
# display as 凪
# JP: 「定休日なら閉まってるばい。営業日ばい」
2737 = "「Ngày nghỉ định kỳ thì đóng cửa rồi nha.\nHôm nay là ngày làm việc nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうだな」
2764 = "「Cũng đúng.」"

# monologue
# JP: 剣の修行の成果なわけでもあるまいが、\n凪の言葉は切れ味がいい。
3105 = "Chắc không phải là thành quả của việc tu\nhành kiếm đạo đâu,\nnhưng lời nói của Nagi sắc bén thật đấy."

# monologue
# JP: あまりに良すぎ、話の接穂を見つけあぐねる。
3116 = "Sắc bén đến mức, tôi chẳng biết phải tiếp\nlời thế nào."

# 【ふかみ】
# display as ？？？
# JP: 「凪ちゃん」
2425 = "「Bé Nagi.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2815 = "「!?」"

# monologue
# JP: 不意打ち気味の暗い声。\nハチロクがびくりと体を竦ませる。
3200 = "Một giọng nói u ám vang lên đầy bất ngờ.\nHachiroku giật bắn mình, co rúm người lại."

# monologue
# JP: 視線を向ければ――\nけれども姿が見あたらない。
3221 = "Đưa mắt nhìn theo hướng đó――\nnhưng lại chẳng thấy bóng dáng ai."

# 【ふかみ】
# display as ？？？
# JP: 「お客さんにそんな言い方、失礼」
2715 = "「Nói chuyện với khách như vậy là bất lịch\nsự đó.」"

# 【凪】
# display as 凪
# JP: 「営業時間にこそこそ本読んどるほーが失礼ばいっ！」
2397 = "「Đang trong giờ làm việc mà đọc sách lén\nlút mới là bất lịch sự nha!」"

# monologue
# JP: 凪が飛ぶ。
3076 = "Nagi nhảy vọt lên."

# monologue
# JP: 受付カウンターの中へと入り、\n柱の影から、何かずりずり引きずり出す。
3174 = "Cô bé chui tọt vào trong quầy lễ tân,\nvà lôi xềnh xệch một thứ gì đó từ sau bóng\ncột ra."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、\nそんなんじゃお客さん来ても帰っちゃうばい」
2436 = "「Bé Fukami,\nnhư vậy thì khách có đến cũng bỏ về mất\nthôi nha.」"

# 【ふかみ】
# display as 深美
# JP: 「やめて凪ちゃん。しおり、せめて挟ませて」
2254 = "「Thôi đi bé Nagi. Ít nhất cũng để chị kẹp\nthẻ đánh dấu sách vào đã chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2378 = "「Hừm.」"

# monologue
# JP: おとなしそうな女の子だ。\n椅子に座っていてもなお、背の高さをはっきり感じる。
3249 = "Một cô bé trông có vẻ hiền lành.\nDù đang ngồi trên ghế, tôi vẫn cảm nhận rõ\ncô bé khá cao."

# monologue
# JP: 凪よりも随分大柄なのに、凪に手も無くあしらわれている。\n座っている椅子をひっぱられ、それに抵抗しようとし――
3158 = "Tuy to con hơn Nagi rất nhiều, nhưng cô bé\nlại bị Nagi xoay như chong chóng.\nBị Nagi kéo cả chiếc ghế đang ngồi đi, cô\nbé cố gắng chống cự――"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2802 = "「Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っと、そうだな」
2342 = "「À, đúng rồi.」"

# monologue
# JP: ぼーっと見ている場合ではない。
3101 = "Giờ không phải lúc đứng nhìn thẫn thờ."

# 【双鉄】
# display as 雙鐵
# JP: 「凪。お前の師匠は、\n力をもって、人に何かを強いることを教えたのか」
2251 = "「Nagi. Sư phụ của em,\ndạy em dùng vũ lực để ép buộc người khác\nsao.」"

# 【凪】
# display as 凪
# JP: 「そぎゃんかこつ教わるわけなか！\n『力とは、弱き者を守るためにこそふるう』――おうっ」
2457 = "「Làm gì có chuyện dạy mấy cái đó nha!\n『Sức mạnh, là để bảo vệ kẻ yếu』――Á.」"

# monologue
# JP: 言行不一致。
3397 = "Lời nói không đi đôi với việc làm."

# monologue
# JP: 気づいたらしく、凪はいきなり、\nふかみちゃんとやらを引いていた手を引っ込める。
3147 = "Có vẻ đã nhận ra, Nagi đột nhiên\nrút bàn tay đang kéo cô bé Fukami gì đó\nlại."

# 【ふかみ】
# display as 深美
# JP: 「わ」
2326 = "「Oái.」"

# monologue
# JP: 当然ふかみは大きくぐらつき、\nそこを凪の手がまた支える。
2980 = "Đương nhiên Fukami loạng choạng suýt ngã,\nvà bàn tay của Nagi lại đưa ra đỡ lấy."

# 【ふかみ】
# display as 深美
# JP: 「あぶなかった。\n凪ちゃん、助けてくれてありがとう」
2415 = "「Nguy hiểm quá.\nBé Nagi, cảm ơn em đã cứu chị.」"

# 【凪】
# display as 凪
# JP: 「水くさかとよ、ふかみちゃん。\n困った時はお互いさまばいっ！」
2218 = "「Khách sáo quá nha, bé Fukami.\nLúc khó khăn thì phải giúp đỡ lẫn nhau chứ\nnha!」"

# monologue
# JP: マッチポンプだ。ふかみを困らせた原因が自分であると、\nすっかり忘れてしまったような、凪のくったくない笑顔。
3358 = "Vừa ăn cướp vừa la làng. Nụ cười vô tư của\nNagi,\nnhư thể đã quên béng mất chính mình là\nnguyên nhân khiến Fukami gặp rắc rối vậy."

# monologue
# JP: ふかみも安堵のためなのか、\n手にした本を開いたままに、微笑んでいる。
3353 = "Chắc vì đã thở phào nhẹ nhõm,\nFukami cũng mỉm cười, tay vẫn cầm cuốn\nsách đang mở."

# 【双鉄】
# display as 雙鐵
# JP: 「突然の来訪で、読書の邪魔をしてしまったようだね」
2633 = "「Chúng tôi đến đường đột quá, có vẻ như đã\nlàm phiền việc đọc sách của em rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「あ……別に。邪魔とかじゃ」
2353 = "「A…… Không đâu. Không có phiền gì đâu ạ……」"

# monologue
# JP: ぎゅうっと。手の中の本が、開かれたまま、\n僕とふかみを遮るように持ち上げられる。
3172 = "Cuốn sách trên tay vẫn đang mở,\nđược cô bé nắm chặt và nâng lên như để che\nchắn giữa tôi và cô bé."

# monologue
# JP: “盾なのだな”と、その仕草を見て自然と感じる。
3195 = "「『Quy hoạch đô thị ở địa phương ~Phục hồi\nbằng du lịch~』 à,\nem chăm học thật đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「『地方における都市計画　～観光による活性化～』か、\nずいぶんと勉強熱心なのだな」
1888 = "「Á ư.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁうっ」
2358 = "「Á ư.」"

# monologue
# JP: ぱたんと、本が閉じられる。\n視線がほんの一瞬合って、けれどもすぐにそらされる。
1843 = "Phập một tiếng, cuốn sách bị đóng lại.\nÁnh mắt chạm nhau trong tích tắc, nhưng\nrồi cô bé lại lảng đi ngay."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、ちょっと人見知りばい。\n慣れれば仲良くなれったい」
2432 = "「Bé Fukami hơi nhút nhát một chút nha.\nQuen rồi thì sẽ thân thiết thôi nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば無理なく慣れてくれ」
2735 = "「Vậy sao. Nếu vậy thì cứ từ từ làm quen\nnhé, không cần gượng ép đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――ぅ」
2348 = "「A――ư.」"

# monologue
# JP: まぁ、このふかみという子のことは――\nこういってはなんだが、どうでもいい。
3435 = "Chà, về cô bé tên Fukami này thì――\nNói thế này thì hơi kỳ, nhưng sao cũng\nđược."

# monologue
# JP: 蓑笠老人がおっしゃってくださったように、\n御一夜における観光の実態を学ぶことこそが最優先だ。
3254 = "Như lời ông lão Minokasa đã nói,\nviệc tìm hiểu thực trạng du lịch ở\nOhimitera mới là ưu tiên hàng đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみちゃん――でいいのかな？」
2490 = "「Gọi là bé Fukami――được không nhỉ?」"

# 【ふかみ】
# display as 深美
# JP: 「う……はぅ……」
2369 = "「Ư…… Vâng……」"

# monologue
# JP: 閉じた本をまた盾にして、こくこく頷く。
3149 = "Lại dùng cuốn sách đã đóng làm khiên, cô\nbé gật đầu lia lịa."

# 【双鉄】
# display as 雙鐵
# JP: 「受付に座っていたようだが、君は、ここの人なのか？」
2513 = "「Thấy em ngồi ở quầy lễ tân, em là người ở\nđây à?」"

# 【ふかみ】
# display as 深美
# JP: 「えうっ……そっ」
2310 = "「Ư…… Vâng……」"

# 【凪】
# display as 凪
# JP: 「そうばい。ここのオーナーのみどりおばちゃんの、\n一人娘がふかみちゃんばい」
2563 = "「Đúng nha. Bé Fukami là con gái một\ncủa dì Midori, chủ bến thuyền này nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それならばすまないが、オーナーの\nみどりさんをお呼びいただけないかな――っと」
2277 = "「Ra là vậy. Nếu thế thì xin lỗi, em có thể\ngọi cô Midori,\nchủ bến thuyền ra đây được không――à.」"

# monologue
# JP: いかん。いささか急ぎすぎだ。\n自己紹介もすませずに、紹介を乞うなどありえんことだ。
3345 = "Không được. Tôi hơi vội vàng quá rồi.\nChưa kịp tự giới thiệu mà đã nhờ người ta\ngiới thiệu thì thật là vô lý."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の名は右田双鉄。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対のために\n帰郷し、縁あって、このハチロクのオーナーになった」
2493 = "「Tôi tên là Migita Soutetsu. Trở về quê\nhương để phản đối việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\n,\nvà có duyên trở thành chủ nhân của\nHachiroku đây.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様からご紹介にあずかりました、旧\x%l帝鉄;#00ffc040;帝鉄%l;\x%l8620;#;#00ffc040;8620%l;#;形\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\x%l8620;#00ffc040;8620%l;#;専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、ハチロクです」
2508 = "「Em là Hachiroku, \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\n\\x%l8620;#00ffc040;8620%l;#;,\nthuộc dòng \\x%l8620;#00ffc040;8620%l;#; của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\ncũ, như ngài Soutetsu vừa giới thiệu ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「工場誘致……反、対」
2294 = "「Phản, đối…… thu hút nhà máy.」"

# monologue
# JP: 落ち着いたのか、\nようやっと、僕にも聞き取れる声が来る。
3145 = "Chắc là đã bình tĩnh lại,\ncuối cùng cô bé cũng cất giọng đủ lớn để\ntôi có thể nghe thấy."

# 【凪】
# display as 凪
# JP: 「そうばい！　このにーさんらは、うちたちの味方ばい！\nじゃっけーん、ふかみちゃんとこ、連れてきたばいっ！」
2604 = "「Đúng nha! Mấy anh chị này là đồng minh\ncủa chúng ta nha!\nThế nên, em mới dẫn đến chỗ bé Fukami\nnha!」"

# 【ふかみ】
# display as 深美
# JP: 「う……ん」
2373 = "「Ư……m.」"

# monologue
# JP: こくりと頷く。\n盾となっていた本がゆるゆる、下がり始める。
3175 = "Cô bé khẽ gật đầu.\nCuốn sách làm khiên bắt đầu từ từ hạ\nxuống."

# 【ふかみ】
# display as 深美
# JP: 「ええと……私、早瀬ふかみ――です。\nこの発船所の、オーナー代理――です、一応」
2761 = "「Ưm…… Em là Hayase Fukami――ạ.\nLà người đại diện chủ bến thuyền này――tạm\nthời là vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「オーナー代理？」
2211 = "「Người đại diện chủ bến thuyền?」"

# 【凪】
# display as 凪
# JP: 「みどりおばちゃん、体ば弱くて、\n入院したり退院したりの繰り返しばい」
2673 = "「Dì Midori sức khỏe yếu lắm,\ncứ nhập viện rồi lại xuất viện suốt nha.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……今日も……病院――で。だから、\nお話、なら――わたし――聞き、ます」
2760 = "「Dạ…… Hôm nay dì ấy cũng…… ở bệnh viện――ạ.\nNên là,\nnếu có chuyện gì――thì em――sẽ nghe ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2278 = "「Ra là vậy.」"

# monologue
# JP: 相手が誰でもやるべきことは変わらない。\nやるべきことには、常に全力を尽くすことも。
3299 = "Dù đối phương là ai thì những việc cần làm\nvẫn không thay đổi.\nVà tôi luôn dốc hết sức mình cho những\nviệc cần làm."

# monologue
# JP: だからともかく、凪と出会ったいきさつや、\nそのままここに連れてこられたことなど、話す。
3236 = "Thế nên trước hết, tôi kể lại chuyện gặp\nNagi,\nvà việc bị dẫn đến đây như thế nào."

# 【ふかみ】
# display as 深美
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;で、観光振興――」
2256 = "「Chấn hưng du lịch, bằng \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\n――」"

# monologue
# JP: ふかみがようやく、わずかに顔を持ち上げる。\n慎重そうな――どこか怯えたような瞳だ。
3348 = "Fukami rốt cuộc cũng hơi ngẩng mặt lên.\nÁnh mắt thận trọng――có chút gì đó sợ sệt."

# monologue
# JP: 僕とハチロクを数秒ずつ見て、\nすぐにまた、うつむき視線を逸らしてしまう。
3162 = "Cô bé nhìn tôi và Hachiroku mỗi người vài\ngiây,\nrồi lại nhanh chóng cúi gằm mặt lảng đi."

# 【ふかみ】
# display as 深美
# JP: 「わたし、オーナー代理で、がんばってるんですけど。\nだけどやっぱり、毎日、全然、お客さん来てくれなくて」
2523 = "「Em, với tư cách là đại diện chủ bến\nthuyền, cũng đang cố gắng lắm.\nNhưng mà, ngày nào cũng vậy, chẳng có\nkhách nào tới cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2571 = "「Vậy sao.」"

# monologue
# JP: “そうだろうな”とはさすがにいえない。
1845 = "\"Chắc là vậy rồi\" câu này tôi không thể\nnào nói ra được."

# monologue
# JP: が――今日がたまたま、ということでなく、\n“毎日これ”なら、経営は、恐らく危機的な状況だろう。
3000 = "Nhưng――nếu hôm nay không phải là tình cờ,\nmà \"ngày nào cũng vậy\", thì có lẽ tình\nhình kinh doanh đang trong tình trạng\nkhủng hoảng rồi."

# 【ふかみ】
# display as 深美
# JP: 「だから、観光振興、やってくれるならすごく助かります。\n手伝えること、出来ることだったらやりたい――です」
2531 = "「Thế nên, nếu mọi người làm chấn hưng du\nlịch thì tốt quá.\nNếu có gì em giúp được, có gì em làm được\nthì em muốn làm――ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2705 = "「Cảm ơn em.」"

# monologue
# JP: しかし……接客がこの有り様では、\n観光客が増えたとて、先の見通しは暗かろう。
3103 = "Cơ mà…… Với cách tiếp khách thế này,\nthì dù lượng khách du lịch có tăng lên,\ntương lai vẫn mờ mịt lắm."

# monologue
# JP: ああいや、そう判断するのは性急すぎるか。\nともかく、“観光の実態”を確かめさせてもらうとしよう。
3111 = "À không, phán đoán như vậy có quá vội vàng\nkhông nhỉ.\nDù sao thì, cứ để tôi xác nhận \"thực trạng\ndu lịch\" xem sao đã."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕とハチロクにクマ川下りを経験させてくれ。\n料金は、無論、大人二人分を払う」
2779 = "「Nếu vậy, hãy cho tôi và Hachiroku trải\nnghiệm đi thuyền xuôi dòng Kuma đi.\nĐương nhiên là tôi sẽ trả tiền vé cho hai\nngười lớn.」"

# 【ふかみ】
# display as 深美
# JP: 「え、あ――はい、ありがとう、ございます。\n大人二人で、税込み、７５６０円になります」
2319 = "「Dạ, a――vâng, cảm ơn, quý khách.\nHai người lớn, đã bao gồm thuế, tổng cộng\nlà 7560 yên ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2378 = "「嗯」" 

# monologue
# JP: 一万円を出して二千円と少しのお釣り。\n案外高いな、というのが率直な感想だ。
2993 = "Tôi đưa một vạn yên và nhận lại hai ngàn\nlẻ mấy yên tiền thừa.\nKhá là đắt đỏ, đó là cảm nhận chân thực\ncủa tôi."

# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、ライフジャケットの着け方から\nご説明しま――あ」
2780 = "「Vậy thì, em xin phép hướng dẫn\ncách mặc áo phao――a.」"

# monologue
# JP: やけに古風なベルを模した電話の着信音。
3440 = "Tiếng chuông điện thoại reo lên, mô phỏng\ntheo tiếng chuông cổ điển."

# monologue
# JP: 一瞬あわてたふかみはけれど、\nすぐに凪へと手にしたライフジャケットを渡す。
3275 = "Dù có chút luống cuống trong chốc lát,\nnhưng Fukami nhanh chóng đưa chiếc áo phao\ntrên tay cho Nagi."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お願い」
2429 = "「Bé Nagi, nhờ em nhé.」"

# 【凪】
# display as 凪
# JP: 「まかせとくばい！」
2262 = "「Cứ giao cho em nha!」"

# 【ふかみ】
# display as 深美
# JP: 「ちょっと……ええと、失礼します」
2762 = "「Xin chờ một chút…… ưm, xin lỗi ạ.」"

# monologue
# JP: ふかみはそのまま電話機へ。
3277 = "Fukami đi thẳng tới chỗ chiếc điện thoại."

# 【ふかみ】
# display as 深美
# JP: 「おまたせいたしました。御一夜クマ川くだり発船所、\n受付の早瀬でございます」
2708 = "「Xin lỗi vì đã để quý khách phải đợi. Đây\nlà bến thuyền xuôi dòng Kuma Ohimitera,\nnhân viên tiếp tân Hayase xin nghe.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2334 = "「Chà.」"

# monologue
# JP: ハチロクが思わず漏らした感嘆の声に頷いている。
3035 = "Hachiroku bất giác thốt lên một tiếng cảm\nthán rồi gật gù."

# monologue
# JP: 僕らと会話していたときと電話とで、\nまるきり、人が変わったようだ。
3238 = "Lúc nói chuyện với chúng tôi và lúc nghe\nđiện thoại,\ncô bé như biến thành một người hoàn toàn\nkhác."

# 【凪】
# display as 凪
# JP: 「よそ見しとったらいかんばい！」
2189 = "「Không được nhìn ngang ngó dọc nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すまん」
2359 = "「A, xin lỗi.」"

# 【凪】
# display as 凪
# JP: 「ライフジャケットのつけかたば、\nちゃあんと聞いとかんと、死ぬたい」
2183 = "「Cách mặc áo phao ấy nha,\nkhông nghe cho kỹ là chết đó nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうだな。\n申し訳ないが、もう一度説明を頼めるか？」
2730 = "「Cũng đúng nhỉ.\nXin lỗi, em có thể giải thích lại một lần\nnữa được không?」"

# 【凪】
# display as 凪
# JP: 「よかばい」
2413 = "「Được thôi nha.」"

# monologue
# JP: あっさり言って、凪はてきぱき、\n見やすい動きでライフジャケットを身につける。
3075 = "Nagi đáp lời dễ dàng, rồi nhanh nhẹn\nmặc chiếc áo phao vào với những động tác\nrất dễ nhìn."

# 【凪】
# display as 凪
# JP: 「オモテウラ前後ろ気ぃつけて着れば、そいでよか。\n水におちたら、勝手にふくらみよるけんね」
2301 = "「Chỉ cần chú ý mặt trước mặt sau rồi mặc\nvào là được nha.\nRơi xuống nước thì nó sẽ tự phồng lên\nnha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2373 = "「嗯……」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは……ジュニアサイズなのですか」
2504 = "「Của em là…… size trẻ em sao ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「単に、背丈の問題だろう」
2367 = "「Đơn giản là do vấn đề chiều cao thôi mà.」"

# 【ハチロク】
# display as 八六
# JP: 「それはそうなのでしょうけれど」
2728 = "「Chuyện đó thì đúng là vậy nhưng mà……」"

# 【凪】
# display as 凪
# JP: 「サイズば合えば、どれでんよかたい。\n合わんのつけたら、水に落ちたとき死ぬだけばい」
2299 = "「Size vừa là được nha.\nMặc cái không vừa, lúc rơi xuống nước chỉ\ncó nước chết thôi nha.」"

# 【ハチロク】
# display as 八六
# JP: 「ぅぅっ……」
2372 = "「Ư ư……」"

# monologue
# JP: しぶしぶといった表情で、\nハチロクはジュニアサイズの救命胴衣を身につける。
3029 = "Với vẻ mặt miễn cưỡng,\nHachiroku mặc chiếc áo phao size trẻ em\nvào."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2373 = "「嗯……」" 

# monologue
# JP: ハチロクの依頼どおり、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;は肌身離さず扱っている。\n中にはもちろん、\x%l運転体;#00ffc040;運転体%l;#;だ。
3005 = "Theo lời nhờ vả của Hachiroku, tôi luôn\ngiữ \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#; khư khư bên mình.\nBên trong tất nhiên là \\x%l運転体;#00ffc040;kíp lái%l;#; rồi."

# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;を換装すればジュニアサイズも大きくなるが\nさてその場合、救命胴衣はどう扱われる――おや。
3376 = "Nếu đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#; thì size trẻ em cũng sẽ\nthành to thôi,\nnhưng trong trường hợp đó thì xử lý áo\nphao thế nào đây――ủa."

# 【ふかみ】
# display as 深美
# JP: 「あの――おまたせ、しました」
2759 = "「Dạ――đã để mọi người, phải đợi rồi.」"

# monologue
# JP: 電話を終えて、ふかみがこちらにやってくる。\n恐縮してるのかなんなのか、背中を丸め身を縮めている。
3283 = "Gọi điện thoại xong, Fukami tiến về phía\nnày.\nKhông biết có phải đang thu mình lại vì áy\nnáy hay không mà cô bé cứ khom lưng co rúm\nngười lại."

# monologue
# JP: なまじ背丈があるだけに、ひどく窮屈な印象だ。
3117 = "Chính vì cô bé khá cao nên trông lại càng\ngò bó hơn."

# monologue
# JP: もりあがりかけた観光気分も、\nつられて押し込められてしまう。
3082 = "Tâm trạng đi du lịch vừa mới nhen nhóm,\ncũng bị kéo theo mà xẹp xuống."

# 【ふかみ】
# display as 深美
# JP: 「舟の方に、ご案内します。ええと、水しぶき――\nかからないよう、気をつけてください」
2500 = "「Em sẽ dẫn mọi người, ra thuyền. Ưm, nước\nbắn――\nxin hãy cẩn thận, đừng để bị ướt ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――これが、クマ川だ」
2240 = "「Hachiroku――đây là, sông Kuma đấy.」"

# monologue
# JP: 言いながら大きくぐるり、と体をひねる。
3227 = "Vừa nói tôi vừa vặn mình xoay một vòng\nlớn."

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;のときと変わらず僕のヒザに乗るハチロクも、\nそのまま動きにつられ、揺られる。
3359 = "Hachiroku vẫn ngồi trên đùi tôi y như lúc\ndùng \\x%l運転体;#00ffc040;kíp lái%l;#;,\ncũng bị chuyển động đó làm cho đung đưa\ntheo."

# 【ハチロク】
# display as 八六
# JP: 「大きいですね、大きく広く――\nまるで包まれているようです」
2636 = "「Lớn quá ạ, vừa lớn vừa rộng――\nCảm giác như đang được bao bọc vậy.」"

# monologue
# JP: 川を挟む森の緑と、川そのものの蒼碧。\n水鳥たちの声と羽音と、水の匂いをふくんだ風と。
3264 = "Màu xanh của khu rừng ôm lấy dòng sông, và\nmàu xanh biếc của chính dòng sông.\nTiếng kêu và tiếng vỗ cánh của lũ chim\nnước, cùng với làn gió mang theo mùi hương\ncủa nước."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――包み込まれて、\n同時に、開放されてるような気に僕はなる」
2565 = "「Đúng vậy――vừa được bao bọc,\nđồng thời, tôi cũng có cảm giác như được\ngiải phóng.」"

# 【ハチロク】
# display as 八六
# JP: 「開放――」
2703 = "「Giải phóng――」"

# monologue
# JP: 両手を広げ、大きく大きく伸びをして――
3041 = "Dang rộng hai tay, vươn vai thật lớn――"

# 【ハチロク】
# display as 八六
# JP: 「本当ですね、双鉄様。\nまるで反対の気持ちなのに、両方一度に感じます」
2645 = "「Đúng thật vậy, ngài Soutetsu.\nCảm giác như hai thứ trái ngược nhau,\nnhưng lại cảm nhận được cả hai cùng một\nlúc.」"

# monologue
# JP: ――それからすっぽり行儀よく、\nハチロクはまた僕のヒザの上、心地よさげに体を収める。
1834 = "――Rồi sau đó, Hachiroku lại ngoan ngoãn\nthu mình ngồi lại trên đùi tôi với vẻ đầy\nthoải mái."

# monologue
# JP: （こんっ）
3451 = "（Cộc）"

# monologue
# JP: 軽い衝撃。
2978 = "Một cú va chạm nhẹ."

# monologue
# JP: なにかと思い視線を向ければ、\n舟の舳先に立ったふかみが、水棹で岩を叩いたようだ。
3222 = "Đang tự hỏi là gì thì tôi nhìn về hướng\nđó,\ncó vẻ như Fukami đang đứng ở mũi thuyền\nvừa dùng sào gõ vào tảng đá."

# monologue
# JP: （なんだ、背筋が伸びているではないか）
3449 = "（Gì chứ, lưng cô bé đang thẳng tắp kia\nkìa）"

# monologue
# JP: 舟の上。陸よりずっと安定しない場所なのに、\nふかみは堂々、長身をいかし水棹を操っている。
3367 = "Trên thuyền. Rõ ràng là nơi kém ổn định\nhơn trên bờ rất nhiều,\nthế nhưng Fukami lại đang ung dung tận\ndụng lợi thế chiều cao của mình để điều\nkhiển sào chống thuyền."

# 【ハチロク】
# display as 八六
# JP: 「川こそが――\nふかみ様にとっての線路なのですね」
2610 = "「Dòng sông này――\nchính là tuyến đường sắt đối với cô Fukami\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2570 = "「Ừ.」"

# monologue
# JP: ハチロクの声に頷かされる。\nまさしくこれこそ、水を得た魚ということなのだろう。
3208 = "Lời của Hachiroku khiến tôi gật gù đồng\ntình.\nĐây đích thị là cá gặp nước rồi."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
# 2425 = "「小凪」" 

# 【凪】
# display as 凪
# JP: 「まかせとくばいっ！\nお客さん、水しぶき、気をつけた方がよかとよ」
2263 = "「Cứ giao cho em nha!\nKhách ơi, cẩn thận nước bắn đó nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！？　おおっ！」
2379 = "「Hửm!? Ô ô!」"

# 【ハチロク】
# display as 八六
# JP: 「あははっ、双鉄様っ、\n冷たくて心地良いですね！」
2333 = "「A ha ha, ngài Soutetsu,\nmát lạnh dễ chịu quá nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、だなっ」
2554 = "「Đúng, vậy thật.」"

# monologue
# JP: 流れの速いところにかかり、\n川の表情ががらりと変わる。
3080 = "Tới đoạn nước chảy xiết,\nbiểu cảm của dòng sông bỗng chốc thay đổi\nhoàn toàn."

# monologue
# JP: 思うさま舟を弄び、\n頭の上から、夕立のような飛沫を降らせる。
3266 = "Nó đùa giỡn với con thuyền thỏa thích,\nlàm những giọt nước bắn lên tung tóe rơi\nxuống đầu chúng tôi như một trận mưa rào."

# 【ふかみ】
# display as 深美
# JP: 「よ――――っと」
2386 = "「Dô――――ta.」"

# 【凪】
# display as 凪
# JP: 「うんとこよいしょっ！　どっこいしょぉっ！！」
2388 = "「Dô ta nào! Dô ta nào!!」"

# monologue
# JP: 水棹で軽く岩を、あるいは川を突き、\n舳先のふかみが舟の進路を決定する。
3371 = "Dùng sào chống thuyền đẩy nhẹ vào đá, hay\ncắm xuống sông,\nFukami đứng ở mũi thuyền quyết định hướng\nđi của con thuyền."

# monologue
# JP: 僕らの真後ろ、[とも]艫に立つ凪は櫂を取り、\n右に左に大きく動かし、ふかみの決断に力を与える。
3352 = "Ngay phía sau chúng tôi, Nagi đứng ở đuôi\nthuyền cầm mái chèo,\nđung đưa mạnh sang trái sang phải, tiếp\nthêm sức mạnh cho quyết định của Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだな」
2641 = "「Giỏi thật đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。こんなにお舟が揺れているのに、\nわたくし、少しも恐ろしくありません」
2557 = "「Vâng. Dù thuyền lắc lư dữ dội thế này,\nnhưng em chẳng thấy sợ chút nào cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに」
2655 = "「Đúng vậy.」"

# monologue
# JP: ふかみと凪との自信に満ちた動作は見ているそれだけで、\n安心感を与えてくれる。
3007 = "Những động tác tràn đầy tự tin của Fukami\nvà Nagi chỉ nhìn thôi\ncũng đủ mang lại cảm giác an tâm."

# monologue
# JP: やがて飛沫と揺れは収まり、\n舟はまた、ゆるやかな流れの中に包まれる。
3252 = "Chẳng mấy chốc, nước không còn bắn nữa và\nthuyền cũng ngừng lắc lư,\ncon thuyền lại được bao bọc trong dòng\nchảy êm đềm."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりは、この仕事は長いのか？」
2215 = "「Hai em làm công việc này lâu chưa?」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃんは、それこそ子供のころからばい。\nうちは、まだ始めて二年目たい」
2434 = "「Bé Fukami thì làm từ hồi nhỏ luôn nha.\nCòn em thì mới bắt đầu năm thứ hai thôi\nnha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「二年目」
2238 = "「Năm thứ hai.」"

# 【ハチロク】
# display as 八六
# JP: 「二年目でその落ち着きなのですか！？」
2535 = "「Mới năm thứ hai mà đã bình tĩnh được như\nvậy sao!?」"

# 【凪】
# display as 凪
# JP: 「ともはりは、船頭よりも覚えることが少ないけんね。\n船頭にまわったら、うちはまだまるでダメダメたい」
2542 = "「Chèo lái thì ít thứ phải nhớ hơn là cầm\nlái nha.\nBảo em lên cầm lái thì em vẫn còn kém lắm\nnha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2337 = "「Hô.」"

# monologue
# JP: 舳先にたって水先案内するのが船頭。\n[とも]艫にたち、櫂を操り船頭をフォローするのがともはり。
3338 = "Đứng ở mũi thuyền dẫn đường là người cầm\nlái.\nĐứng ở đuôi thuyền, điều khiển mái chèo hỗ\ntrợ người cầm lái là người chèo lái."

# monologue
# JP: そうと解説したあとで、凪は大きく肩をすくめる。
3121 = "Sau khi giải thích như vậy, Nagi nhún vai\nmột cái rõ mạnh."

# 【凪】
# display as 凪
# JP: 「クマ川くだりはお客さんが減りすぎて、船頭さん達が\nやめてっちゃったって、ふかみちゃん困っとったばい」
2228 = "「Khách đi thuyền trên sông Kuma giảm đi\nnhiều quá, các bác cầm lái\nnghỉ việc hết trơn, bé Fukami đang gặp khó\nkhăn lắm nha.」"

# 【ハチロク】
# display as 八六
# JP: 「それで、凪さんもともはりのお仕事に？」
2529 = "「Thế nên Nagi mới làm công việc chèo lái\nsao?」"

# 【凪】
# display as 凪
# JP: 「ま、簡単にいえばそういうこったい。\nこれも、剣術修行ばい！」
2385 = "「À, nói đơn giản thì là vậy nha.\nĐây cũng là tu hành kiếm thuật nha!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
# 2425 = "「小凪」" 

# 【凪】
# display as 凪
# JP: 「っと、船頭交代ばい。\nここから先には、もう瀬がないけんね」
2343 = "「Đến lúc đổi chỗ cho người cầm lái rồi\nnha.\nTừ đây trở đi không còn đoạn nước cạn nào\nnữa nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。気をつけてな」
2734 = "「Vậy sao. Cẩn thận nhé.」"

# 【凪】
# display as 凪
# JP: 「気をつけるのはにーさん達ばい。\nライフジャケット、ひも締め直しといたほうがよかよ？」
2698 = "「Người cần cẩn thận là mấy anh chị mới\nđúng nha.\nÁo phao ấy, nên thắt chặt lại dây đi nha?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい」
2366 = "「Này này.」"

# monologue
# JP: 洒落にならない洒落をいい、\n凪は軽やかに船首へと向かう。
3073 = "Vừa nói một câu đùa không thể nào cười\nnổi,\nNagi vừa nhẹ nhàng bước về phía mũi\nthuyền."

# monologue
# JP: 凪に水棹を手渡し、何言か注意して、\n今度はふかみが、慎重に船尾へとやってくる。
3120 = "Đưa sào chống thuyền cho Nagi, dặn dò vài\ncâu,\nlần này đến lượt Fukami cẩn thận bước về\nphía đuôi thuyền."

# 【双鉄】
# display as 雙鐵
# JP: 「見事な手際だったな。\n凪が、『ふかみちゃんは小さな頃から』と言っていたが」
2642 = "「Tay nghề điêu luyện thật đấy.\nNagi có nói là 『bé Fukami làm từ hồi nhỏ』\nnhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「そう、ですね。赤ちゃんのころから、ゆりかごがわりに\nわたし、舟に揺られていたそうですから」
2567 = "「Đúng, vậy ạ. Từ hồi còn đỏ hỏn, thay vì\nnằm nôi\nthì em đã được đung đưa trên thuyền rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2337 = "「哦——」" 

# monologue
# JP: 艫に回って、櫂をもってもふかみの背筋は丸くならない。\nすっくと立って、舳先の凪の様子を注意深く見守っている。
3088 = "Dù có chuyển ra đuôi thuyền cầm mái chèo,\nlưng Fukami cũng không hề gù xuống.\nCô bé đứng thẳng tắp, chăm chú theo dõi\ntình hình của Nagi ở mũi thuyền."

# 【ふかみ】
# display as 深美
# JP: 「だから、舟の上のお仕事だったら平気なんです。\nけど、経営とか、宣伝とかそういうの、わからなくって」
2532 = "「Nên là, nếu là công việc trên thuyền thì\nem không sao cả.\nNhưng mà, kinh doanh hay quảng cáo các\nthứ, em chẳng hiểu gì sất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「みどりさんといったか？\nご病気の前はその方が？」
2200 = "「Cô Midori nhỉ?\nTrước khi bị bệnh thì cô ấy là người lo\nviệc đó à?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。母と父が。その頃は、すごく繁盛していたんです。\n父が、過労で倒れちゃうくらいに」
2580 = "「Vâng. Cả mẹ và bố em nữa. Hồi đó, làm ăn\nphát đạt lắm ạ.\nĐến mức bố em, đổ bệnh vì làm việc quá sức\nluôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……乗ったことがある。そのころの川下り船に」
1881 = "「……Anh từng đi rồi. Đi thuyền xuôi dòng\nhồi đó ấy.」"

# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
# 2571 = "「是嗎」" 

# monologue
# JP: ふかみの口元がふわっと緩む。\nそして視線は、遠く、遠く――川の彼方を見続ける。
3288 = "Khóe miệng Fukami khẽ nở nụ cười.\nVà ánh mắt cô bé cứ hướng về phía xa, thật\nxa――nơi cuối dòng sông."

# 【双鉄】
# display as 雙鐵
# JP: 「右田の家の養子になって、ほどないころだ。\n汰斗さんと、義父と、義母と、真闇姉と日々姫と」
2573 = "「Đó là lúc anh vừa mới trở thành con nuôi\ncủa nhà Migita.\nĐi cùng với ông Taito, bố nuôi, mẹ nuôi,\nchị Mayami và Hibiki.」"

# 【ハチロク】
# display as 八六
# JP: 「いかがでしたか？」
2473 = "「Cảm giác thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まだ慣れなくてな。緊張して、舟の外ばかりを見ていた。\n季節は、丁度いま頃で――」
2629 = "「Hồi đó anh vẫn chưa quen. Căng thẳng quá\nnên chỉ toàn nhìn ra ngoài thuyền.\nMùa đó, cũng trạc thời điểm này bây giờ――」"

# monologue
# JP: 賑やかだった。舟は何艘もつらなって、その全てに\nぎゅうぎゅうにお客がつめこまれていた。
3308 = "Nhộn nhịp lắm. Mấy chiếc thuyền nối đuôi\nnhau, chiếc nào chiếc nấy\nkhách khứa chen chúc chật ních."

# monologue
# JP: その賑やかさに温められて、舟から降りる頃には僕らも、\nいくらか自然に、会話できるようになっていた。
3387 = "Nhờ được sưởi ấm bởi sự nhộn nhịp ấy, mà\nđến lúc xuống thuyền, chúng tôi\ncũng đã có thể nói chuyện với nhau tự\nnhiên hơn một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「景色は、変わっていないような気がするよ。\n夏のクマ川の、穏やかなところも、荒いところも」
2520 = "「Anh có cảm giác cảnh sắc chẳng hề thay\nđổi.\nCả những đoạn êm đềm, lẫn những đoạn chảy\nxiết của dòng sông Kuma mùa hè.」"

# 【ふかみ】
# display as 深美
# JP: 「川は、毎日が別の表情で。\nだけどずうっと、おんなじ顔をしてるんです」
2613 = "「Dòng sông, mỗi ngày mang một biểu cảm\nkhác nhau.\nNhưng vẫn luôn giữ mãi một khuôn mặt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「表情と、顔か」
2696 = "「Biểu cảm và khuôn mặt sao.」"

# monologue
# JP: 水面、とは、水の[おもて]面と書くのだと不意に思い当たる。
3214 = "Chợt nhận ra chữ \"mặt nước\", cũng được\nviết là \"khuôn mặt\" của nước."

# monologue
# JP: 川の顔だの表情だのを、まるで考えたこともないが、\n毎日見ているものには、少し興味が湧いてくる。
3268 = "Chưa bao giờ tôi nghĩ về khuôn mặt hay\nbiểu cảm của dòng sông,\nnhưng nghe những điều người ta thấy hàng\nngày, tôi bỗng thấy hơi tò mò."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川はどうだ？　男か女か？　\nどんな顔をしているのだ？」
2797 = "「Sông Kuma thì sao? Nam hay nữ?\nKhuôn mặt trông như thế nào?」"

# 【ふかみ】
# display as 深美
# JP: 「女性……女の子、です。思春期の」
2575 = "「Nữ giới…… là một cô gái, ạ. Đang tuổi dậy\nthì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2337 = "「哦——」" 

# 【ふかみ】
# display as 深美
# JP: 「お姉さんな感じで、表情ゆたかで、可愛らしくて。\nだけどたまに怒ると……すごく、ものすごく、荒れる」
2663 = "「Mang cảm giác của một người chị, biểu cảm\nphong phú, đáng yêu.\nNhưng thỉnh thoảng nổi giận thì…… rất, rất\nlà dữ dội.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……情が深い、といった感じか？」
1870 = "「……Cảm giác như, rất sâu đậm sao?」"

# 【ふかみ】
# display as 深美
# JP: 「そう、です。そういう」
2577 = "「Đúng, vậy ạ. Kiểu như vậy.」"

# monologue
# JP: 言って、\nふかみはいとおしそうにぐるりと大きく川を見渡す。
3405 = "Nói rồi,\nFukami đưa mắt nhìn quanh dòng sông một\nvòng lớn với vẻ trìu mến."

# 【ふかみ】
# display as 深美
# JP: 「底しれなくて、激しくて、知ろうとしてもわからない。\nとても面倒な女の子だから、その分、とても魅力的」
2615 = "「Sâu thẳm khôn lường, mãnh liệt, dù có cố\ntìm hiểu cũng chẳng thể hiểu nổi.\nVì là một cô gái rất phiền phức, nên bù\nlại, cũng rất đỗi quyến rũ.」"

# monologue
# JP: ふかみの瞳が、僕を捉える。
3291 = "Ánh mắt Fukami bắt lấy tôi."

# monologue
# JP: なにひとつ隠すものの無い川の上。\n背筋を伸ばしたふかみがまっすぐ、僕を見る。
3126 = "Trên dòng sông chẳng có gì để che giấu.\nFukami vươn thẳng lưng, nhìn thẳng vào\ntôi."

# 【ふかみ】
# display as 深美
# JP: 「わかりやすくて簡単なものは、浅くて薄い、です。\nそれはきっと長くは保たず、とても大きなゴミになる」
2758 = "「Những thứ dễ hiểu và đơn giản, thường\nnông cạn và hời hợt, ạ.\nChắc chắn chúng sẽ chẳng tồn tại được lâu,\nrồi sẽ trở thành một đống rác khổng lồ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2278 = "「原來如此」" 

# monologue
# JP: 評価が、変わる。\nどうでもいいと思っていたが、名こそが体を表している。
3150 = "Đánh giá của tôi đã thay đổi.\nCứ tưởng sao cũng được, nhưng đúng là cái\ntên nói lên tất cả."

# monologue
# JP: ふかみは、深みを持っている。\n引き出せたなら、恐らくは、御一夜を支える力になる。
3296 = "Fukami có chiều sâu.\nNếu có thể khơi gợi nó ra, có lẽ cô bé sẽ\ntrở thành sức mạnh chống đỡ cho Ohimitera."

# 【双鉄】
# display as 雙鐵
# JP: 「それが、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に反対する理由か」
2732 = "「Đó là lý do em phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\nsao.」"

# 【ふかみ】
# display as 深美
# JP: 「そう。です」
2578 = "「Đúng. Vậy ạ.」"

# monologue
# JP: ほ、っとしたような息がはかれる。
3156 = "Một tiếng thở phào nhẹ nhõm cất lên."

# 【ふかみ】
# display as 深美
# JP: 「わたしは、クマ川が好きだから」
2392 = "「Bởi vì em, thích dòng sông Kuma.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、だ」
2304 = "「Nhưng mà.」"

# monologue
# JP: この聡明さと芯の強さだ。\n子供扱いする必要は、もはやあるまい。
3160 = "Sự thông minh và ý chí kiên cường này.\nKhông cần thiết phải coi cô bé là trẻ con\nnữa."

# 【双鉄】
# display as 雙鐵
# JP: 「環境を守れたところで、\n生活が守れねば、人と住処は滅びるぞ」
2273 = "「Dù có bảo vệ được môi trường,\nmà không bảo vệ được cuộc sống, thì con\nngười và nơi ở cũng sẽ diệt vong thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「うっ」
2370 = "「Ư.」"

# 【ハチロク】
# display as 八六
# JP: 「そうして、人の手が絶えてしまえば……\n自然に還る、といえば言葉は綺麗ですけれど」
2688 = "「Và nếu như bàn tay con người không còn\nnữa……\nNói là trở về với tự nhiên thì nghe hay\nđấy nhưng mà.」"

# monologue
# JP: ふかみの視線が僕から逸れて、さまよい始める。\n背筋がどんどんまるまり縮こまっていく。
3290 = "Ánh mắt Fukami lảng tránh tôi và bắt đầu\nđảo quanh.\nLưng cô bé cứ gù dần, gù dần rồi co rúm\nlại."

# 【双鉄】
# display as 雙鐵
# JP: 「ＳＬによる観光振興が成功したとて、\nこの有り様では、川下り観光は復活できまい」
2275 = "「Dù chấn hưng du lịch bằng đầu máy hơi\nnước có thành công,\nthì với tình trạng này, du lịch xuôi dòng\nsông cũng chẳng thể nào vực dậy được.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……その……だから……がんばって」
2741 = "「Dạ…… cái đó…… nên là…… em sẽ cố gắng.」"

# monologue
# JP: （ガンっ）
3450 = "（Rầm）"

# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ！？」
2371 = "「Uầy!?」"

# monologue
# JP: 硬い音がして舟が揺れ――
3185 = "Một tiếng động cứng ngắc vang lên, con\nthuyền chao đảo――"

# 【ふかみ】
# display as 深美
# JP: 「あ。平気です。\n凪ちゃんが、ちょっとヘタなだけ。です」
2360 = "「A. Không sao đâu ạ.\nChỉ là bé Nagi hơi vụng về một chút thôi.\nẠ.」"

# monologue
# JP: ――なにかと慌てるより先に、\nふかみがそうと教えてくれる。
1832 = "――Trước khi tôi kịp hoảng hốt,\nFukami đã giải thích như vậy."

# monologue
# JP: ……今の会話をしながらでも、凪の様子を確かめてたのか。\n予想以上だ。これはまさしく、磨けば光ろう。
1853 = "……Ngay cả khi đang nói chuyện, cô bé vẫn\nđể mắt đến tình hình của Nagi sao.\nHơn cả mong đợi. Đúng là ngọc càng mài\ncàng sáng."

# 【双鉄】
# display as 雙鐵
# JP: 「特別にがんばろうとするから、\x%l空転;#00ffc040;空転%l;#;するのだ。\nおそらくはな」
2524 = "「Chính vì cố gắng một cách đặc biệt nên\nmới bị \\x%l空転;#00ffc040;quay trơn%l;#; đấy.\nCó lẽ là vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「ぇ？」
2321 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、舟の上と同じように、陸の上でもやればよい。\nそれだけで接客だの宣伝だのの問題はあらかた消えるぞ」
2217 = "「Chỉ cần làm trên bờ giống y như lúc trên\nthuyền là được.\nChỉ vậy thôi là mấy vấn đề như tiếp khách\nhay quảng cáo sẽ biến mất phần lớn đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「ええっ？」
2317 = "「Hảả?」"

# monologue
# JP: ふかみは驚き――いやむしろ、怯えたような顔になり、\nまたぞろ背筋を縮め始める。
3281 = "Fukami kinh ngạc――à không, đúng hơn là\nkhuôn mặt như đang sợ hãi,\nlại bắt đầu thu mình lại."

# 【双鉄】
# display as 雙鐵
# JP: 「自分では気付いていないのか？\nそれだ。それが、陸の上でのお前の姿だ」
2226 = "「Bản thân em không nhận ra sao?\nĐó. Đó chính là bộ dạng của em khi ở trên\nbờ đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　あの……どう……違……」
2325 = "「Hả? Dạ…… có gì…… khác……」"

# 【ハチロク】
# display as 八六
# JP: 「背筋です。身を守ろうとでもしているように丸まって\n――せっかくの美しい立ち姿が、台無しではないですか」
2560 = "「Lưng của em đấy. Cứ còng xuống như thể\nđang cố tự bảo vệ mình\n――Chẳng phải là uổng phí tư thế đứng xinh\nđẹp đó sao.」"

# 【ふかみ】
# display as 深美
# JP: 「うつくしい……立ち姿……です？」
2672 = "「Tư thế đứng…… xinh đẹp…… ạ?」"

# monologue
# JP: ふかみの視線が舳先へと。
3285 = "Ánh mắt Fukami hướng về phía mũi thuyền."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんのこと？」
2221 = "「Chị nói bé Nagi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どういう解釈でそうなるか。お前だ、ふかみ。\n舟の上でのお前の姿は、堂々として美しくあるぞ」
2261 = "「Sao em lại hiểu ra thế được vậy. Là em\nđấy, Fukami.\nBộ dạng của em khi ở trên thuyền, trông\nrất đường hoàng và xinh đẹp.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　やだ――ない、ない、そんなこと」
2322 = "「Hả? Thôi đi――không có, không có chuyện đó\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2336 = "「Ối chà.」"

# monologue
# JP: 照れたあまりなのであろうか、\n腕をぶんぶんふるように、櫂でざばざば水を掻く。
3231 = "Không biết có phải vì quá xấu hổ hay\nkhông,\nmà cô bé vung vẩy hai tay, dùng mái chèo\nkhua nước rào rào."

# 【ハチロク】
# display as 八六
# JP: 「なぜ無いのですか？　単なる事実だと思うのですが」
2616 = "「Tại sao lại không có ạ? Chị nghĩ đó chỉ\nlà sự thật thôi mà.」"

# 【ふかみ】
# display as 深美
# JP: 「だって――だって――だって、学園で……」
2391 = "「Nhưng mà――nhưng mà――nhưng mà, ở trường……」"

# monologue
# JP: 体がますます縮こまる。\n顔も真下に向いてしまい、目つきはひどい上目遣いだ。
3171 = "Cơ thể cô bé ngày càng co rúm lại.\nKhuôn mặt cũng cúi gằm xuống, ánh mắt\nngước lên nhìn một cách dè dặt."

# 【ふかみ】
# display as 深美
# JP: 「わたし、おっきいからかわいくないって……クラスの子。\n男の子なんて、『でか子』とか、わたしのこと」
2622 = "「Mấy bạn trong lớp bảo…… em to xác nên\nchẳng dễ thương chút nào.\nMấy bạn nam thì gọi em là, 『con nhỏ khổng\nlồ』.」"

# 【ハチロク】
# display as 八六
# JP: 「女子のそれは、妬みでしょう。\n男子のそれは、照れ隠しというものでしょう」
2412 = "「Mấy bạn nữ nói vậy chắc là do ghen tị\nthôi.\nCòn mấy bạn nam thì là đang che giấu sự\nxấu hổ đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「でも……でも……わたし、ほんとに――\nこんな、おっきい、から……かわいい、わけ、ない」
2303 = "「Nhưng mà…… nhưng mà…… em, thật sự――\nto xác thế này, mà…… sao có thể, dễ\nthương, được chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そこは認めよう。\nふかみ、お前はかわいくない。その理由は大きいからだ」
2781 = "「Nếu vậy, anh sẽ công nhận điều đó.\nFukami, em không dễ thương. Lý do là vì em\nto xác.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁぅっ」
2357 = "「Á ư.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！？」
2803 = "「Ngài Soutetsu!?」"

# monologue
# JP: ふかみがそうと決めているのだ。\nかわいいのかわいくないのの主観を、覆せようはずもない。
3278 = "Fukami đã tự cho là như vậy rồi.\nQuan điểm chủ quan về việc dễ thương hay\nkhông dễ thương, không thể nào lật ngược\nđược."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、『かわいい』と『美しい』は別物だ」
2212 = "「Nhưng mà, 『dễ thương』 và 『xinh đẹp』 là\nhai chuyện khác nhau.」"

# 【ふかみ】
# display as 深美
# JP: 「ぇ」
2318 = "「Hả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おまえをかわいくなくする大きさゆえに、\n背筋を伸ばし自信に満ちたお前は、ひときわ美しい」
2224 = "「Chính vì sự to lớn khiến em không còn dễ\nthương,\nmà một khi em vươn thẳng lưng và tràn đầy\ntự tin, em sẽ trở nên xinh đẹp hơn bao giờ\nhết.」"

# 【ハチロク】
# display as 八六
# JP: 「それに、凛々しく、頼もしくもあります」
2197 = "「Hơn nữa, còn rất oai phong và đáng tin\ncậy nữa.」"

# monologue
# JP: ハチロクの声。\n僕も感じていたことを、真っ直ぐな言葉に直してくれる。
3251 = "Giọng của Hachiroku.\nĐã diễn đạt lại những gì tôi cũng đang cảm\nnhận bằng những lời lẽ thẳng thắn."

# 【ハチロク】
# display as 八六
# JP: 「ふかみ様の凛としたお姿のおかげで、\n不慣れな舟の上でもわたくし、とても安心できました」
2597 = "「Nhờ có dáng vẻ oai phong của cô Fukami,\nmà dù ở trên con thuyền không quen thuộc\nnày, em cũng cảm thấy rất an tâm.」"

# monologue
# JP: （ぐらっ）
3452 = "（Lắc lư）"

# 【凪】
# display as 凪
# JP: 「わっ！？　とっ、よっ！」
2327 = "「Oái!? Á, dô!」"

# monologue
# JP: ……自らが言っていたように、船頭にまわった凪は、\nまさしくダメのダメダメだ。
1854 = "……Đúng như cô bé tự nhận, Nagi khi chuyển\nsang làm người cầm lái,\nquả thực là dở tệ của dở tệ."

# monologue
# JP: だというのに、少しも怖さを感じないのは、\nふかみの瞳が、凪をとらえているためだ。
3247 = "Vậy mà, tôi chẳng hề cảm thấy sợ hãi chút\nnào,\nđó là bởi ánh mắt của Fukami vẫn luôn dõi\ntheo Nagi."

# 【双鉄】
# display as 雙鐵
# JP: 「商売のことだけを考えろ。\n接客と、宣伝のことだけでいい」
2296 = "「Chỉ cần nghĩ đến chuyện buôn bán thôi.\nChỉ cần tiếp khách và quảng cáo là đủ\nrồi.」"

# 【ふかみ】
# display as 深美
# JP: 「………………うん」
1872 = "「………………Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かわいいだけの船頭と、美しく凛々しく頼もしい船頭と。\nお前が客なら、どちらの舟に乗りたく思うか」
2467 = "「Một người cầm lái chỉ có vẻ ngoài dễ\nthương, và một người cầm lái xinh đẹp, oai\nphong, đáng tin cậy.\nNếu em là khách, em muốn đi thuyền của ai\nhơn?」"

# 【ふかみ】
# display as 深美
# JP: 「あとの方。です。\nだって、川は……とても危ない場所だから」
2511 = "「Người sau. Ạ.\nBởi vì, sông nước…… là nơi rất nguy hiểm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。仕事場は学園ではない。\n学園での評価を引きずる意味も理由も存在しない」
2603 = "「Đúng vậy. Nơi làm việc không phải là\ntrường học.\nChẳng có ý nghĩa hay lý do gì để kéo theo\nnhững đánh giá ở trường học vào cả.」"

# monologue
# JP: ふかみが頷く。
3294 = "Fukami gật đầu."

# monologue
# JP: そうしようと望んだのだろう。\n背筋が、力みを帯びて伸びる。
2998 = "Chắc là cô bé đã muốn làm như vậy.\nSống lưng vươn thẳng lên, mang theo sức\nmạnh."

# 【双鉄】
# display as 雙鐵
# JP: 「大きいお前が自然なお前だ。歪めれば無理が出て崩れる。\nおそらくそれは、川でも同じことであろう？」
2809 = "「Sự to lớn đó mới là con người tự nhiên\ncủa em. Nếu cố tình bóp méo, em sẽ trở nên\nkhiên cưỡng và sụp đổ.\nCó lẽ điều đó, với dòng sông cũng giống\nnhau phải không?」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2378 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、少しずつ慣れろ。自分を伸びやかに扱うことに。\nそうすれば自然と背筋も伸び、問題も解消されていくさ」
2777 = "「Nếu vậy, hãy dần làm quen đi. Việc đối xử\nvới bản thân một cách thoải mái.\nNhư thế thì lưng em sẽ tự nhiên thẳng lên,\nvà vấn đề cũng sẽ được giải quyết thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「……わかった。と思う。頭では。だから、ちょっと――そうする方も。がんばってみる。です」
1880 = "「……Em hiểu rồi. Chắc vậy. Ở trong đầu. Thế\nnên, một chút thôi――việc làm như thế. Em\nsẽ cố gắng thử xem. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうしてくれるなら僕も嬉しい」
2375 = "「Ừm. Nếu em làm được vậy thì anh cũng rất\nvui.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです。美しいものが歪んでいるのを、\nこれ以上みたくはありませんから」
2483 = "「Em cũng vậy. Vì em không muốn thấy những\nthứ xinh đẹp bị bóp méo\nthêm nữa đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「ありがとう。双鉄おにいさん。ハチロクさん」
2706 = "「Cảm ơn hai người. Anh Soutetsu. Chị\nHachiroku.」"

# monologue
# JP: ふかみが少し背伸びして、凪に視線で合図を送る。\n凪は頷き、ホっとしたような顔になる。
3293 = "Fukami hơi rướn người lên, dùng ánh mắt ra\nhiệu cho Nagi.\nNagi gật đầu, khuôn mặt lộ vẻ nhẹ nhõm."

# 【ふかみ】
# display as 深美
# JP: 「もうすぐ、着船。です。\n船がついたら、ふたりは、どうします？」
2806 = "「Sắp, cập bến rồi. Ạ.\nThuyền cập bến rồi, hai người, định làm gì\ntiếp theo?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、御一夜の駅まで戻ろうと思うが」
2486 = "「Trước mắt, bọn anh định quay lại ga\nOhimitera.」"

# 【ふかみ】
# display as 深美
# JP: 「なら、\n一緒におじいちゃんのトラックに乗ってください」
2783 = "「Vậy thì,\nhãy cùng đi xe tải của ông em nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おじいちゃんのトラック？」
2618 = "「Xe tải của ông em?」"

# 【ハチロク】
# display as 八六
# JP: 「トラック――\x%lエアクラ;#00ffc040;エアクラ%l;#;のトラックですか？」
2268 = "「Xe tải――xe tải chạy bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; sao ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「ううん、ガソリンの。\n排気ガスとか出るヤツ。です」
2195 = "「Dạ không, xe chạy xăng cơ.\nCái loại xả ra khí thải ấy. Ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、ガソリンエンジン車！」
2328 = "「Chà, xe động cơ xăng!」"

# monologue
# JP: ハチロクが目で問うてくる。\nうなずきながら、言葉を受ける。
3042 = "Hachiroku dùng ánh mắt dò hỏi tôi.\nVừa gật đầu, tôi vừa tiếp lời."

# 【双鉄】
# display as 雙鐵
# JP: 「いまどき、随分めずらしいな。\nなにか理由が？」
2394 = "「Thời buổi này, hiếm thấy thật đấy.\nCó lý do gì sao?」"

# 【ふかみ】
# display as 深美
# JP: 「発船所――[ゆのい,1]湯医にもあるから。\nもっと上流からの、もっと急流のヤツ」
2396 = "「Bến thuyền――ở Yui cũng có ạ.\nỞ đoạn thượng nguồn xa hơn, nước chảy xiết\nhơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。湯医-御一夜間なら」
2276 = "「Ra là vậy. Nếu là đoạn giữa Yui và\nOhimitera thì.」"

# 【ハチロク】
# display as 八六
# JP: 「[じゅつせんはいたんこう,4]術仙廃炭鉱でしたか。あの近く――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;が使えなくなる場所を通るのですね？」
2771 = "「Mỏ than bỏ hoang Jussen phải không ạ. Gần\nđó――\nlà đi qua khu vực không thể sử dụng \\x%lエアクラ;#00ffc040;Aircra%l;#;\nđúng không ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「そう。だからトラック。です。\n今は、湯医の発船場、人が足りなくて使ってないけど」
2605 = "「Đúng vậy. Thế nên mới cần xe tải. Ạ.\nBây giờ bến thuyền ở Yui thiếu người nên\nkhông dùng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ともに頑張ろう。\n御一夜の観光復権で、湯医発船場も復活だ」
2778 = "「Nếu vậy, chúng ta cùng cố gắng nhé.\nPhục hưng du lịch Ohimitera, cũng là hồi\nsinh bến thuyền Yui.」"

# 【ふかみ】
# display as 深美
# JP: 「うん。がんばる。です」
2381 = "「Vâng. Em sẽ cố gắng. Ạ.」"

# monologue
# JP: いって、ふかみはまじまじ僕の顔を見る。
3406 = "Nói rồi, Fukami nhìn chằm chằm vào mặt\ntôi."

# 【ふかみ】
# display as 深美
# JP: 「あの。なんでも言ってください。です。\n手伝えることあったら、わたし、がんばってやります」
2763 = "「Dạ. Có chuyện gì anh cứ nói nhé. Ạ.\nNếu có gì giúp được, em sẽ cố gắng hết\nsức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、人だ。\nだれか、人を紹介してもらえないか？」
2782 = "「Nếu vậy, anh cần tìm người.\nEm có thể giới thiệu ai đó cho anh được\nkhông?」"

# 【ふかみ】
# display as 深美
# JP: 「人です？　どんな人がいいですか？」
2537 = "「Người ạ? Anh cần người như thế nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「観光か鉄道のどちらか、できれば両方に詳しいひと。\nそして、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対を明確にしている人だ」
2203 = "「Người am hiểu về du lịch hoặc đường sắt,\nnếu được thì cả hai càng tốt.\nVà là người phản đối rõ ràng việc thu hút\nnhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"

# 【ふかみ】
# display as 深美
# JP: 「だったら、丁度いい――\nえっと、\x%l帝鉄;#00ffc040;帝鉄%l;#;？　とかいうので働いてたっていう人が」
2767 = "「Vậy thì, vừa hay――\nƯm, có một người từng làm việc ở \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\n? hay gì đó ạ.」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃーーん！」
2430 = "「Bé Fukami ơiii!」"

# monologue
# JP: 凪の声。\nふかみは目線を僕から外し、続きは後でと短くことわる。
3370 = "Tiếng của Nagi.\nFukami rời mắt khỏi tôi, nói ngắn gọn rằng\nsẽ nói tiếp sau."

# 【凪】
# display as 凪
# JP: 「いいかげんこっち変わって～！\nうちじゃ、着船は無理無理ばいっ！」
2450 = "「Mau ra đổi chỗ cho em đi~!\nEm không biết cập bến đâu nha!」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2378 = "「嗯」" 

# monologue
# JP: うなずくより先、もうスタスタと、\n舳先に向かい、ふかみは歩き出している。
3432 = "Chưa kịp gật đầu, Fukami đã thoăn thoắt\nbước về phía mũi thuyền."

# monologue
# JP: そして途中でふりかえり――\n控えめな、けれど確かな笑顔を見せる。
3420 = "Rồi giữa chừng cô bé quay lại――\nnở một nụ cười rụt rè nhưng chân thật."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、ちょっと焦りすぎ。です。\nまだ、四十秒は余裕あるのに」
2427 = "「Bé Nagi, vội vàng quá rồi. Ạ.\nRõ ràng vẫn còn tận bốn mươi giây cơ mà.」"

# monologue
# JP: 境内に一歩踏み込めば、がぁがぁ、コケコケ、\nガチョウと鶏たちとが、大騒ぎして道を空ける。
3421 = "Vừa bước chân vào khuôn viên, đám ngỗng và\ngà\nkêu quang quác, cục tác ầm ĩ rồi nhường\nđường."

# 【双鉄】
# display as 雙鐵
# JP: 「ここも、昔と変わっていないな」
2736 = "「Chỗ này cũng chẳng khác gì ngày xưa nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「とても綺麗な神社ですね」
2640 = "「Một ngôi đền rất đẹp ạ.」"

# monologue
# JP: 静かに呟く、ハチロクはスっと吸気する。
3053 = "Khẽ lẩm bẩm, Hachiroku hít một hơi thật\nsâu."

# 【ハチロク】
# display as 八六
# JP: 「御一夜は、水の匂いのする町ですが……\nここの空気は、ひときわ澄み切っているようです」
2801 = "「Ohimitera là một thị trấn thoang thoảng\nmùi nước……\nNhưng không khí ở đây dường như lại trong\nlành hơn hẳn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。澄み切っている感じを受ける。\nここは、昔も今も変わらず」
2656 = "「Đúng vậy. Anh cũng cảm thấy rất trong\nlành.\nNơi này, xưa nay vẫn không hề thay đổi.」"

# monologue
# JP: お参りをした。\n汰斗さんと、日々姫と真闇姉とに連れられて。
3217 = "Anh từng đến đây viếng đền rồi.\nĐược ông Taito, Hibiki và chị Mayami dẫn\nđi."

# monologue
# JP: ああ、そういえば、\nあのとき、確か、汰斗さんに――
3113 = "A, nhắc mới nhớ,\nlúc đó, hình như ông Taito đã――"

# 【双鉄】
# display as 雙鐵
# JP: 「そら、見てみろハチロク」
2229 = "「Kìa, nhìn thử xem Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
2308 = "「Á!?」"

# monologue
# JP: ハチロクの脇に手をいれて、\n見やすいように高く掲げる。
3225 = "Tôi luồn tay vào nách Hachiroku,\nnâng cô bé lên cao để dễ nhìn hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「入り口の門の屋根の付け根――\n丁度、角になってるあたりだ」
2235 = "「Phần gốc mái của cổng vào――\nNgay đoạn góc vuông ấy.」"

# monologue
# JP: 見つけた途端、ハチロクの目が丸くなる。
3046 = "Vừa nhìn thấy, Hachiroku liền tròn xoe\nmắt."

# monologue
# JP: 無理もない。\n神社の門にこんなもの、誰もあるとは思わんだろう。
2987 = "Cũng phải thôi.\nChẳng ai nghĩ trên cổng đền lại có thứ như\nvậy."

# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんですかこれは――\nあ！　神様の、お顔？」
2331 = "「Chà, cái gì thế này ạ――\nA! Là khuôn mặt của, thần linh sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、鬼の顔らしい。\n“[きめん,1]鬼面づくり”と呼ばれるそうだ」
2193 = "「Không, hình như là mặt quỷ đấy.\nNghe nói người ta gọi nó là \"Kiến trúc mặt\nquỷ\".」"

# 【ハチロク】
# display as 八六
# JP: 「神社に鬼の面ですか？\nどうして、そんな」
2399 = "「Mặt quỷ ở đền thờ sao ạ?\nTại sao lại, như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは誰にもわからんらしい。\n[ひのもと,2]日ノ本中でも、ほとんど見ないものだと聞いた」
2280 = "「Chuyện đó hình như không ai biết cả.\nNghe nói trên khắp Hinomoto cũng hiếm khi\nthấy thứ này.」"

# 【ハチロク】
# display as 八六
# JP: 「門の中に、\n鬼が、封じられているのでしょうか？」
2690 = "「Bên trong cổng,\ncó quỷ bị phong ấn sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。\nこの近くには、幽霊寺という寺もある」
2588 = "「Cũng có thể.\nGần đây còn có một ngôi chùa tên là chùa\nMa nữa.」"

# monologue
# JP: 言えばふうっと、ハチロクの声と視線が落ちる。
3403 = "Vừa dứt lời, giọng nói và ánh mắt của\nHachiroku chùng xuống."

# 【ハチロク】
# display as 八六
# JP: 「鬼に、幽霊。\n御一夜は、意外と恐ろしい土地なのですね」
2813 = "「Quỷ, rồi lại ma.\nOhimitera là một vùng đất đáng sợ ngoài\nsức tưởng tượng nhỉ.」"

# monologue
# JP: ハチロクの声音と表情に、少し意外なものを感じる。
3213 = "Tôi cảm thấy hơi bất ngờ trước giọng điệu\nvà biểu cảm của Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、幽霊だの鬼だのを――」
1863 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; mà cũng sợ ma với quỷ sao――」"

# monologue
# JP: 失言だ。\n言うより先に、深く考えておけばよかった。
3139 = "Lỡ lời rồi.\nĐáng lẽ tôi nên suy nghĩ kỹ trước khi nói."

# monologue
# JP: 『ハチロクは事故を起こしている』\n……その意味ならば、僕も知っている筈だというのに。
1840 = "『Hachiroku đã từng gây ra tai nạn』\n……Rõ ràng tôi phải biết ý nghĩa của điều\nđó chứ."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2804 = "「Ngài Soutetsu?」"

# monologue
# JP: 僕の心を知ってか知らずかハチロクは穏やかに首を傾げる。\n――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で無くてよかった。
3032 = "Không biết có hiểu thấu tâm can tôi hay\nkhông, Hachiroku chỉ nhẹ nhàng nghiêng\nđầu.\n――May mà tôi không phải là \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# monologue
# JP: もし“\x%l共感;#00ffc040;共感%l;#;”などがあったら、\nお互いに、どうしようも無く傷ついた。
3180 = "Nếu có \"\\x%l共感;#00ffc040;cộng cảm%l;#;\" gì đó,\nthì cả hai đã làm tổn thương nhau một cách\nvô phương cứu chữa rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――」
2475 = "「Anh――」"

# monologue
# JP: だけれど僕は人間だ。伝えたことしか伝えられない。\n伝えきれないことすらもある。
3302 = "Nhưng tôi là con người. Chỉ có thể truyền\nđạt những gì mình nói ra.\nThậm chí có những điều không thể truyền\nđạt hết được."

# monologue
# JP: だから、言う。\n誤魔化しではなく、自分の本当を。
3234 = "Thế nên, tôi phải nói.\nKhông phải là lấp liếm, mà là sự thật của\nchính mình."

# 【双鉄】
# display as 雙鐵
# JP: 「幽霊も鬼も恐れはしない。\n現実は常に、そうしたものを駆逐するから」
2479 = "「Anh không sợ ma hay quỷ.\nVì thực tế luôn xua đuổi những thứ đó.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様は――」
2784 = "「Nếu vậy, ngài Soutetsu――」"

# monologue
# JP: ハチロクが言う。\n僕の言葉を、受けとめてその上問うてくる。
3052 = "Hachiroku nói.\nTiếp nhận lời tôi, rồi hỏi lại."

# 【ハチロク】
# display as 八六
# JP: 「現実こそを、\nもっとも恐れていらっしゃるのですか？」
2626 = "「Thực tế, mới là điều ngài e sợ nhất sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どう……だろうな」
2477 = "「Chắc……là vậy rồi.」"

# monologue
# JP: 答えきれない。自分自身でも分からない。
3226 = "Không thể trả lời. Ngay cả bản thân tôi\ncũng không hiểu."

# monologue
# JP: 恐れるほどに、現実と――\n僕は果たして。
3224 = "Càng e sợ, thì đối với thực tế――\nQuả nhiên tôi vẫn..."

# 【稀咲】
# display as ？？？
# JP: 「まったく！　まるでお話にならないじゃないか。\nどうかしてる。少し考えればわかることだろうに」
2647 = "「Thật tình! Thật không nói lý lẽ được mà.\nLẩm cẩm quá rồi. Rõ ràng là chuyện đơn\ngiản dễ hiểu thế kia——」"

# 【日々姫】
# display as 日日姬
# JP: 「待ってください、[きさき,1]稀咲先輩！」
2704 = "「Xin đợi đã, tiền bối Kisaki!」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
# 2334 = "「哎呀」" 

# monologue
# JP: ハチロクが僕の顔を見る。\n日々姫の声だ。
3045 = "Hachiroku nhìn tôi.\nLà giọng của Hibiki."

# monologue
# JP: 境内の奥、本社の方から、\n足音とともに近づいてくる。
3169 = "Từ sâu trong khuôn viên, hướng đền chính,\nCó tiếng bước chân vội vã tiến lại gần."

# 【稀咲】
# display as ？？？
# JP: 「『損得の話じゃない』なんてまるきり妄言じゃないか。\n得がなければ、この神社だって維持できまい――っ！」
2209 = "「Cái gì mà 『Không phải chuyện lợi ích』\nchứ, toàn là nói xằng nói bậy. Nếu không\ncó lợi ích, thì ngay cả ngôi đền này cũng\nchẳng duy trì nổi đâu――っ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1873 = "「…………」"

# monologue
# JP: すごい勢いで歩いてきたのは、制服姿の学園生だ。
3191 = "Người đang hầm hầm bước tới là một nữ sinh\nmặc đồng phục."

# monologue
# JP: 僕らに気付き、気まずそうな顔をするので、\n道を譲って、ほんのすこしだけ会釈する。
3164 = "Cô ấy chú ý thấy chúng tôi, có vẻ hơi bối\nrối,\nnên chúng tôi nhường đường và khẽ gật đầu\nchào."

# 【日々姫】
# display as 日日姬
# JP: 「もう、待ってくださいっていってるじゃ――\nって、にぃにぃ！！？」
2648 = "「Thật tình, em đã bảo chị đợi đã mà――\nƠ, anh hai!!?」"

# 【稀咲】
# display as ？？？
# JP: 「にぃにぃ？」
2795 = "「Anh hai?」"

# 【日々姫】
# display as 日日姬
# JP: 「じゃなくてっ！　んんっ――\n『奇遇ですね兄さん。こんなところでお会いするとは』」
2187 = "「Không phải! Ưm――\n『Thật tình cờ quá anh trai. Không ngờ lại\ngặp anh ở đây』」"

# 【双鉄】
# display as 雙鐵
# JP: 「全くだな。ここで会えるとは思わなかった」
2437 = "「Đúng vậy. Không ngờ lại gặp em ở đây.」"

# monologue
# JP: 日々姫の声が、完全に他所行きのものになっている。
3245 = "Giọng điệu của Hibiki đã hoàn toàn chuyển\nsang kiểu cách khách sáo."

# monologue
# JP: この学園生の前では、きっと、\n良いところを見せておきたいのだろう。
3141 = "Chắc hẳn trước mặt nữ sinh này,\nem ấy muốn thể hiện mặt tốt của mình."

# 【稀咲】
# display as ？？？
# JP: 「日々姫さんのお兄さん？\nなら、ボクに自己紹介させてください」
2472 = "「Anh là anh trai của Hibiki sao?\nVậy thì, xin cho phép tôi tự giới thiệu.」"

# monologue
# JP: 優雅に一礼。
3026 = "Cúi chào thanh lịch."

# monologue
# JP: こちらに向かって猛進していたトゲトゲ感を、\n綺麗さっぱり消しさっている。
3083 = "Sự gai góc khi nãy lao về phía này\nđã hoàn toàn biến mất."

# 【稀咲】
# display as 稀咲
# JP: 「はじめまして。ボクは[ほうしょうきさき,3]宝生稀咲。\n学園では、日々姫さんとは同じクラブに所属してます」
2252 = "「Rất vui được gặp anh. Tôi là Houshou\nKisaki.\nỞ trường, tôi và Hibiki cùng tham gia một\ncâu lạc bộ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご丁寧な自己紹介をありがとう。僕は右田双鉄。\n縁あって、日々姫の兄になったものだ」
2707 = "「Cảm ơn vì lời giới thiệu chu đáo. Tôi là\nMigita Soutetsu.\nVì cơ duyên mà trở thành anh trai của\nHibiki.」"

# 【稀咲】
# display as 稀咲
# JP: 「縁あって？\nふふ、随分と変わった物言いですね」
2595 = "「Vì cơ duyên sao?\nFufu, cách nói chuyện của anh lạ thật\nđấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうかな」
# 2571 = "「是嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「それじゃあ、その子も？\n縁あってのお連れさんなんですか？」
2739 = "「Vậy còn cô bé đó?\nCũng là người đồng hành vì cơ duyên sao?」"

# monologue
# JP: 僕の傍らのハチロクを見て、\n稀咲なる少女は興味深げに笑ってみせる。
3108 = "Nhìn Hachiroku bên cạnh tôi,\nthiếu nữ tên Kisaki mỉm cười đầy hứng thú."

# 【稀咲】
# display as 稀咲
# JP: 「綺麗な子ですね。\nこれほど見事な黒髪は、初めて見るかもしれないな」
2638 = "「Một cô bé xinh đẹp nhỉ.\nMái tóc đen tuyệt đẹp thế này, có lẽ là\nlần đầu tiên tôi thấy.」"

# 【ハチロク】
# display as 八六
# JP: 「お褒めいただき、光栄ですわ、稀咲様」
2539 = "「Được ngài khen ngợi là vinh hạnh của tôi,\ncô Kisaki.」"

# monologue
# JP: ハチロクの優美な一礼に、\n稀咲も軽い一礼を返す。
3037 = "Đáp lại cái cúi chào tao nhã của\nHachiroku,\nKisaki cũng khẽ cúi chào đáp lễ."

# monologue
# JP: 軽やかながら洗練された――\nそんな言葉が脳裏に浮かぶ、美しい礼を。
3434 = "Nhẹ nhàng mà tinh tế――\nMột cái cúi chào đẹp đẽ khiến những từ đó\nhiện lên trong tâm trí."

# 【稀咲】
# display as 稀咲
# JP: 「その上、礼儀もしっかりしてる。\nはじめまして、お嬢さん。お名前は？」
2185 = "「Hơn nữa, lại còn rất hiểu lễ nghĩa.\nRất vui được gặp em, cô bé. Em tên là gì?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、縁あって双鉄様のお世話になっております、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のハチロク、ともうします」
2497 = "「Vì cơ duyên, tôi đang được ngài Soutetsu\nchiếu cố,\nlà \\x%lレイルロオド;#00ffc040;Railord%l;#; tên Hachiroku.」"

# 【稀咲】
# display as 稀咲
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ああ、[ゆのい,1]湯医線のれいなみたいな」
1862 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;――À, giống như Reina của tuyến\nYunoi.」"

# 【ハチロク】
# display as 八六
# JP: 「れいなさんとは、いわば姉妹のようなものです。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;同士ですから」
2518 = "「Tôi và Reina có thể nói là giống như chị\nem vậy.\nVì chúng tôi đều là \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうなのか、なるほどね」
2583 = "「Vậy sao, ra là thế.」"

# monologue
# JP: 軽く浮きかけた驚きを、\n稀咲はすぐに収めてまじまじ、ハチロクを改めて眺め回す。
3322 = "Nhanh chóng giấu đi vẻ ngạc nhiên vừa\nthoáng hiện,\nKisaki lại chăm chú nhìn Hachiroku một lần\nnữa."

# 【稀咲】
# display as 稀咲
# JP: 「キミはれいなよりクラシカルだね。\nそれに全体が、とても上等に作られているようだ」
2223 = "「Em mang nét cổ điển hơn Reina nhỉ.\nHơn nữa, tổng thể có vẻ được chế tác rất\ncao cấp.」"

# 【ハチロク】
# display as 八六
# JP: 「実際、そう作っていただきました。\nわたくしは、\x%l8620;#00ffc040;8620%l;#;形トップナンバーの専用機ですから」
2516 = "「Quả thực là tôi được chế tác như vậy.\nBởi vì tôi là cỗ máy chuyên dụng số hiệu\nđầu tiên của dòng \\x%l8620;#00ffc040;8620%l;#;.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
2338 = "「Ồ?」"

# monologue
# JP: 納得したように頷いて、\n稀咲はくるっと、背後の日々姫へ視線を移す。
3320 = "Gật đầu như đã hiểu,\nKisaki quay ngoắt lại, chuyển ánh nhìn\nsang Hibiki ở phía sau."

# 【稀咲】
# display as 稀咲
# JP: 「それにしても日々姫。随分と冷たいじゃないか。\nあのお兄さんが帰ってきてると教えてくれないなんて」
2191 = "「Nói mới nhớ, Hibiki này. Em lạnh nhạt quá\nđấy.\nAnh trai em về rồi mà cũng chẳng thèm nói\ncho tôi biết.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは、ええと――事情が」
2729 = "「Chuyện đó, ừm――là có lý do ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「“あのお兄さん”？」
1868 = "「『Anh trai đó』?」"

# monologue
# JP: それこそ、変わった物言いだ。\n“あの”などと、まるで以前から知ってたような――
3430 = "Đó mới đúng là cách nói chuyện kỳ lạ.\nDùng từ 『đó』, cứ như thể đã biết từ\ntrước――"

# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして、日々姫から聞いていたのか？\n僕の話を」
2805 = "「Không lẽ, cô đã nghe Hibiki kể sao?\nChuyện của tôi ấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ぴゃわっ！？　ちょっ！　にぃにっ」
2307 = "「Pyawa!? Khoan! Anh hai!」"

# 【稀咲】
# display as 稀咲
# JP: 「それはもう。\n部活のある日は、いつも何らかの形でね」
2766 = "「Đương nhiên rồi.\nNhững ngày có câu lạc bộ, em ấy luôn nhắc\nđến anh dưới một hình thức nào đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「きっ、きっ、きさっ、センパっ」
2661 = "「Tiền, tiền, tiền bối Kisa――」"

# 【稀咲】
# display as 稀咲
# JP: 「帝大生ということも、家業をお手伝いされてることも\n――と、そうだ」
2264 = "「Chuyện anh là sinh viên Đại học Hoàng\ngia, chuyện anh đang giúp đỡ công việc gia\nđình\n――À, phải rồi.」"

# monologue
# JP: 稀咲が不意に、胸の内ポケットに手を入れる。
3326 = "Bất chợt, Kisaki thò tay vào túi trong\ntrước ngực."

# monologue
# JP: 稀咲が不意に、鞄へと手を差し入れる。
3325 = "Bất chợt, Kisaki thò tay vào trong cặp."

# monologue
# JP: 慣れた手つきで取り出した名刺入れから、\n流れるように、一枚の名刺を僕へと差し出す。
3153 = "Từ hộp đựng danh thiếp lấy ra với động tác\nthuần thục,\ncô ấy trơn tru đưa cho tôi một tấm danh\nthiếp."

# 【稀咲】
# display as 稀咲
# JP: 「あらためまして。これを機会にご親交を。\nボク、宝生稀咲は、銀行づとめをしているもので」
2241 = "「Xin giới thiệu lại. Mong được kết giao\nqua cơ hội này.\nTôi, Houshou Kisaki, đang làm việc tại\nngân hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「銀行づとめ」
2786 = "「Làm việc tại ngân hàng.」"

# monologue
# JP: 御一夜に銀行といえば、ひとつしかない。
3404 = "Nói đến ngân hàng ở Ohimitera, thì chỉ có\nmột."

# monologue
# JP: 念のため、名刺を受け取り仔細に見れば、そこにはやはり、\n『隈元銀行　御一夜支店長』の文字列――っ！？
2995 = "Để chắc chắn, tôi nhận lấy tấm danh thiếp\nvà nhìn kỹ, quả nhiên trên đó ghi,\n『Giám đốc chi nhánh Ohimitera, Ngân hàng\nKumamoto』――っ!?"

# 【双鉄】
# display as 雙鐵
# JP: 「支店長。\nその若さ――学園生で支店長、とは」
2546 = "「Giám đốc chi nhánh.\nCòn trẻ thế này――vừa là học sinh vừa là\ngiám đốc chi nhánh sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「おや」
# 2334 = "「哎呀」" 

# monologue
# JP: 僕が驚いてしまったことに驚いた――\nそんな感じの、どこかいたずらっぽい微笑。
3166 = "Cô ấy ngạc nhiên vì tôi ngạc nhiên――\nMột nụ cười có phần tinh nghịch mang cảm\ngiác như vậy."

# 【稀咲】
# display as 稀咲
# JP: 「帝都あたりだと、ワーキング・スタディ制度の活用は、\n活発なものと聞いていますが？」
2543 = "「Tôi nghe nói ở khu vực Đế đô, việc tận\ndụng chế độ vừa học vừa làm\nđang rất sôi nổi mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――それはもちろん。いやそういう点で、\n御一夜を田舎扱いして驚いたのではなくて」
2352 = "「À――chuyện đó thì tất nhiên. Không, không\nphải tôi ngạc nhiên vì coi Ohimitera là\nvùng quê ở điểm đó.」"

# monologue
# JP: ワーキング・スタディ。主として都市部を中心に、\n近年急速に広まった、日ノ本の新・教育制度。
3183 = "Vừa học vừa làm. Chế độ giáo dục mới của\nHinomoto,\nđang lan rộng nhanh chóng trong những năm\ngần đây, chủ yếu ở các khu vực đô thị."

# monologue
# JP: 端的にいえば、天職・適職と認められた職務における\n労働時間を、そのまま単位に充当できるといった制度だ。
3343 = "Nói ngắn gọn, đây là chế độ cho phép thời\ngian lao động\ntrong các công việc được công nhận là\nthiên hướng, phù hợp với năng lực, được\ntính trực tiếp thành tín chỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「学園生兼銀行員なら、驚きもしなかったろうが――\n支店長となるとやはり、そうあることではなかろう」
2686 = "「Nếu là học sinh kiêm nhân viên ngân hàng\nthì tôi đã chẳng ngạc nhiên――\nNhưng nếu là giám đốc chi nhánh thì quả\nthực không phải chuyện thường thấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「それは、そうです。隈元銀行の全支店を通じても、\n学園生の支店長は、ボクひとりだけですね」
2657 = "「Đúng vậy. Ngay cả trên toàn bộ các chi\nnhánh của Ngân hàng Kumamoto,\nhọc sinh làm giám đốc chi nhánh cũng chỉ\ncó mình tôi thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな――\nいやっ」
2502 = "「Chắc là vậy rồi――\nKhông.」"

# monologue
# JP: 頷いて――その瞬間にそうかと気付く。\n『隈元銀行御一夜支店』の、支店長。
3129 = "Gật đầu――và ngay khoảnh khắc đó tôi chợt\nnhận ra.\nGiám đốc chi nhánh của 『Ngân hàng Kumamoto\nchi nhánh Ohimitera』."

# monologue
# JP: で、あるのなら。\nこの銀髪の少女こそが――
3176 = "Nếu vậy.\nThiếu nữ tóc bạc này chính là――"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――キミが\n工場誘致賛成派の中核なのか？」
2775 = "「Vậy ra――cô chính là\nnhân vật cốt cán của phe ủng hộ thu hút\nnhà máy sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「工場誘致のお話ですか？\nええと……日々姫さんのお兄さんは――」
2449 = "「Anh đang nói chuyện thu hút nhà máy sao?\nÀ ừm……anh trai của Hibiki là――」"

# 【双鉄】
# display as 雙鐵
# JP: 「工場誘致を撤回させようと御一夜に戻ってきた者だ。\nせっかくなので、少し話をさせてもらえるかな？」
2510 = "「Tôi là người trở về Ohimitera để yêu cầu\nhủy bỏ việc thu hút nhà máy.\nNhân cơ hội này, chúng ta có thể nói\nchuyện một chút được không?」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、だから」
2339 = "「À, ra là vậy.」"

# monologue
# JP: 稀咲が日々姫をちら、と見る。
3331 = "Kisaki liếc nhìn Hibiki."

# monologue
# JP: なるほど、『だから』、\n日々姫は稀咲に、僕の帰還を伝えなかったのか。
3090 = "Ra là vậy, 『ra là vậy』,\nHibiki đã không nói cho Kisaki biết việc\ntôi trở về."

# 【稀咲】
# display as 稀咲
# JP: 「ごめんなさい、お兄さん。\nボクも、じっくりお話をしたいのは山々なのだけれど」
2424 = "「Xin lỗi anh.\nTôi cũng rất muốn nói chuyện cặn kẽ với\nanh.」"

# monologue
# JP: 夏服の、むき出しの手首にはまる時計を、\n稀咲の視線がサラリと撫ぜる。
3329 = "Ánh mắt Kisaki lướt nhẹ qua\nchiếc đồng hồ đeo trên cổ tay trần trong\nbộ đồng phục mùa hè."

# 【稀咲】
# display as 稀咲
# JP: 「つい先程、実りの無い議論に時間を使ってしまってね。\nこの後は、いろいろ予定が立て込んでいるんだ」
2488 = "「Vừa nãy tôi lỡ dành thời gian cho một\ncuộc tranh luận vô bổ mất rồi.\nSau đây tôi còn có rất nhiều lịch trình\nphải làm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。君の都合も考えず唐突に。\n申し訳なかった」
2584 = "「Vậy sao. Đột ngột đưa ra yêu cầu mà không\nsuy xét đến lịch trình của cô.\nThật xin lỗi.」"

# 【稀咲】
# display as 稀咲
# JP: 「いやいや、こちらこそお断りしてしまって。\nけど、“せっかくなので”という気持ちはボクにもある」
2181 = "「Không không, chính tôi mới phải xin lỗi\nvì đã từ chối.\nNhưng, tôi cũng có chung suy nghĩ 'nhân cơ\nhội này'.」"

# monologue
# JP: 名刺入れをしまったその手で、今度は手帳が取り出される。
3155 = "Bằng bàn tay vừa cất hộp danh thiếp, lần\nnày cô ấy lấy ra một cuốn sổ tay."

# 【稀咲】
# display as 稀咲
# JP: 「夏休み期間だったら、朝方の時間帯は比較的自由だから。\n日をあらためて、アポイントメントを取ってくれれば」
2683 = "「Vì đang trong kỳ nghỉ hè nên thời gian\nbuổi sáng của tôi tương đối tự do.\nNếu anh có thể sắp xếp một ngày khác và\nđặt lịch hẹn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば、後日あらためてよろしく頼む」
2377 = "「Ừm. Vậy thì, hôm khác xin được nhờ cô.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。立場は正反対みたいだけれども」
2569 = "「Đúng vậy nhỉ. Dù lập trường của chúng ta\ncó vẻ hoàn toàn trái ngược.」"

# monologue
# JP: すっと、右手が差し出される。\n稀咲と短い握手をかわす。
3333 = "Cô ấy nhẹ nhàng đưa tay phải ra.\nTôi và Kisaki có một cái bắt tay ngắn."

# 【稀咲】
# display as 稀咲
# JP: 「そのときには」
2548 = "「Hẹn gặp lại anh khi đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのときには」
2382 = "「Ừm, hẹn gặp lại khi đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、稀咲センパイっ！？」
2363 = "「A, tiền bối Kisaki!?」"

# monologue
# JP: さっと立ち去る稀咲のあとを、慌てた顔で日々姫が追う。\n追いながら、一度ふりむき、あかんべぇ。
3334 = "Hibiki với vẻ mặt hốt hoảng vội vã đuổi\ntheo Kisaki đang nhanh chóng rời đi.\nĐang đuổi theo, em ấy quay lại một lần,\nthè lưỡi lêu lêu."

# monologue
# JP: ……何故だ？\n特段日々姫を怒らせたつもりもないのだが。
1856 = "……Tại sao chứ?\nTôi đâu có định chọc giận Hibiki."

# 【ハチロク】
# display as 八六
# JP: 「……あの方が、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派の総大将なのですか？」
1884 = "「……Vị đó,\nlà tổng tư lệnh của phe ủng hộ thu hút nhà\nmáy \\x%lエアクラ;#00ffc040;Aircra%l;#; sao?」"

# monologue
# JP: 稀咲と日々姫の姿が消えるのをゆっくりと待ち、\nハチロクが静かに問いかけてくる。
3049 = "Từ tốn đợi bóng dáng Kisaki và Hibiki\nkhuất hẳn,\nHachiroku mới khẽ lên tiếng hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「総大将でなければ、怖いな。\nあの上に、さらに人物がいることになる」
2682 = "「Nếu không phải tổng tư lệnh thì đáng sợ\nthật đấy.\nĐiều đó có nghĩa là trên cô ta vẫn còn\nnhân vật tầm cỡ hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1873 = "「…………」" 

# monologue
# JP: あいまいな笑みを浮かべて、ハチロクは何も答えない。\nならば、ハチロクもわかっているのだ。
3039 = "Nở một nụ cười mơ hồ, Hachiroku không đáp\nlời.\nNếu vậy, Hachiroku cũng đã hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、\nああも見事に自分の未熟を思い知らされるとはな」
2602 = "「Không ngờ,\nlại bị nhắc nhở về sự non nớt của bản thân\nmột cách ngoạn mục đến thế.」"

# monologue
# JP: あそこで、議論を交わしてしまえば、\n日々姫にはもう、立つ瀬がなかった。
3379 = "Nếu lúc đó, chúng tôi tranh luận với nhau,\nthì Hibiki đã chẳng còn mặt mũi nào đứng\nđó nữa."

# monologue
# JP: それを理解し、先送りを提案することで鮮やかに、\n稀咲は日々姫と、僕の立場とを重んじたのだ。
3328 = "Hiểu được điều đó, và khéo léo đề xuất lùi\nlại ngày khác,\nKisaki đã tôn trọng lập trường của Hibiki\nvà của tôi."

# 【ハチロク】
# display as 八六
# JP: 「未熟であれば、熟成させれば良いだけのこと」
2551 = "「Nếu còn non nớt, thì chỉ cần để cho nó\nchín mùi là được thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2814 = "「!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、教えてくださったことですよ？」
2731 = "「Đó là điều ngài Soutetsu đã dạy tôi mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだな。そうだった」
2349 = "「À――đúng vậy. Đúng là thế.」"

# monologue
# JP: この半日で、ひといきに、\nさまざまな人と立場とに触れ、いささか混乱したようだ。
3125 = "Trong nửa ngày qua, liên tục\ntiếp xúc với nhiều người và lập trường\nkhác nhau, có vẻ tôi đã hơi bối rối."

# monologue
# JP: 僕は、どこまでいっても僕でしかない。\n自分の信じるやり方で、ダメなら修正していけばいい。
3300 = "Dù có đi đến đâu, tôi cũng chỉ là tôi.\nCứ làm theo cách mình tin tưởng, nếu không\nđược thì sửa đổi là xong."

# 【双鉄】
# display as 雙鐵
# JP: 「よし、行くぞハチロク。仕切り直しだ」
2416 = "「Được rồi, đi thôi Hachiroku. Làm lại từ\nđầu nào.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。お供します、双鉄様」
2556 = "「Vâng. Tôi sẽ đi cùng ngài, ngài\nSoutetsu.」"

# monologue
# JP: 玉石を踏み、まっすぐ進む。
3230 = "Đạp lên sỏi đá, bước thẳng về phía trước."

# monologue
# JP: ふかみが僕に教えてくれた、旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の元職員――\n赤井神社の宮司に会うため。
3092 = "Để gặp cựu nhân viên của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\ncũ mà Fukami đã cho tôi biết――\nCung tư tế của đền Akai."
