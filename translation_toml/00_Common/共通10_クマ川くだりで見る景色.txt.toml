[script]
# lines: 445 
# monologue
# JP: 記憶のままの道を行くと\n記憶と異なる景色にやがて、たどり着く。
3211 = "Men theo con đường của ký ức,\\nđể rồi sẽ đến một nơi có khung cảnh khác xa với những gì ta nhớ."

# 【双鉄】
# display as 雙鐵
# JP: 「ここは――」
2738 = "「Đây là――」"

# 【凪】
# display as 凪
# JP: 「クマ川下りの発船所ばい。見りゃわかるばい」
2799 = "「Bến thuyền đi xuôi dòng sông Kuma đó. Nhìn là biết mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。それはそうなのだが――」
2312 = "「À thì... đúng là vậy, nhưng mà――」"

# monologue
# JP: 今は八月。\n夏休みの真っ最中。
3307 = "Bây giờ là tháng Tám.\\nĐang là giữa kỳ nghỉ hè."

# monologue
# JP: そうしてここは、御一夜有数の観光スポット。\nだというのに……まるで人の気配がない。
3356 = "Và thế là, chúng tôi đã đến một trong những điểm du lịch hàng đầu của Ohitoyo.\\nẤy vậy mà... lại chẳng có lấy một bóng người."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。定休日とか、そういうことか？」
2365 = "「À. Hôm nay là ngày nghỉ định kỳ, hay sao vậy?」"

# 【凪】
# display as 凪
# JP: 「定休日なら閉まってるばい。営業日ばい」
2737 = "「Nếu là ngày nghỉ thì đã đóng cửa rồi. Hôm nay là ngày làm việc mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうだな」
2764 = "「Cũng đúng nhỉ.」"

# monologue
# JP: 剣の修行の成果なわけでもあるまいが、\n凪の言葉は切れ味がいい。
3105 = "Chắc không phải là thành quả của việc luyện kiếm đâu,\\nnhưng lời nói của Nagi thật sắc bén."

# monologue
# JP: あまりに良すぎ、話の接穂を見つけあぐねる。
3116 = "Sắc bén đến mức, tôi không tài nào tìm được cách để bắt chuyện tiếp."

# 【ふかみ】
# display as ？？？
# JP: 「凪ちゃん」
2425 = "「Nagi-chan.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2815 = "「！？」"

# monologue
# JP: 不意打ち気味の暗い声。\nハチロクがびくりと体を竦ませる。
3200 = "Một giọng nói u tối vang lên đầy bất ngờ.\\nHachiroku giật nảy mình."

# monologue
# JP: 視線を向ければ――\nけれども姿が見あたらない。
3221 = "Nhìn về phía đó――\\nnhưng lại chẳng thấy bóng dáng ai cả."

# 【ふかみ】
# display as ？？？
# JP: 「お客さんにそんな言い方、失礼」
2715 = "「Nói chuyện với khách hàng như vậy là thất lễ đó.」"

# 【凪】
# display as 凪
# JP: 「営業時間にこそこそ本読んどるほーが失礼ばいっ！」
2397 = "「Lén lút đọc sách trong giờ làm việc mới là thất lễ đó!」"

# monologue
# JP: 凪が飛ぶ。
3076 = "Nagi lao tới."

# monologue
# JP: 受付カウンターの中へと入り、\n柱の影から、何かずりずり引きずり出す。
3174 = "Cô bé đi vào trong quầy lễ tân,\\nvà từ sau một cây cột, lôi sền sệt thứ gì đó ra."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、\nそんなんじゃお客さん来ても帰っちゃうばい」
2436 = "「Fukami-chan,\\ncậu mà như vậy thì khách có đến rồi cũng bỏ về hết đó.」"

# 【ふかみ】
# display as 深美
# JP: 「やめて凪ちゃん。しおり、せめて挟ませて」
2254 = "「Dừng lại đi Nagi-chan. Ít nhất cũng để tớ kẹp cái đánh dấu sách vào đã.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2378 = "「Mư」"

# monologue
# JP: おとなしそうな女の子だ。\n椅子に座っていてもなお、背の高さをはっきり感じる。
3249 = "Một cô bé trông có vẻ trầm tính.\\nDù đang ngồi trên ghế, vẫn có thể cảm nhận rõ được vóc người cao lớn của em ấy."

# monologue
# JP: 凪よりも随分大柄なのに、凪に手も無くあしらわれている。\n座っている椅子をひっぱられ、それに抵抗しようとし――
3158 = "Dù to con hơn Nagi rất nhiều, em ấy lại bị Nagi dễ dàng áp đảo.\\nChiếc ghế em ấy đang ngồi bị kéo đi, và em ấy đang cố chống cự lại――"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2802 = "「Anh Soutetsu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っと、そうだな」
2342 = "「À, phải rồi nhỉ.」"

# monologue
# JP: ぼーっと見ている場合ではない。
3101 = "Không phải lúc để đứng ngây ra nhìn."

# 【双鉄】
# display as 雙鐵
# JP: 「凪。お前の師匠は、\n力をもって、人に何かを強いることを教えたのか」
2251 = "「Nagi này. Sư phụ của em,\\nđã dạy em dùng sức mạnh để ép buộc người khác hay sao?」"

# 【凪】
# display as 凪
# JP: 「そぎゃんかこつ教わるわけなか！\n『力とは、弱き者を守るためにこそふるう』――おうっ」
2457 = "「Làm gì có chuyện sư phụ dạy em mấy cái đó!\\n『Sức mạnh là để bảo vệ kẻ yếu』―― Ối.」"

# monologue
# JP: 言行不一致。
3397 = "Nói một đằng, làm một nẻo."

# monologue
# JP: 気づいたらしく、凪はいきなり、\nふかみちゃんとやらを引いていた手を引っ込める。
3147 = "Dường như đã nhận ra, Nagi đột nhiên\\nrụt tay đang kéo Fukami lại."

# 【ふかみ】
# display as 深美
# JP: 「わ」
2326 = "「Á!」"

# monologue
# JP: 当然ふかみは大きくぐらつき、\nそこを凪の手がまた支える。
2980 = "Đương nhiên là Fukami lảo đảo mạnh,\\nvà tay của Nagi lại đỡ lấy em ấy."

# 【ふかみ】
# display as 深美
# JP: 「あぶなかった。\n凪ちゃん、助けてくれてありがとう」
2415 = "「Nguy hiểm quá.\\nNagi-chan, cảm ơn vì đã giúp mình nhé.」"

# 【凪】
# display as 凪
# JP: 「水くさかとよ、ふかみちゃん。\n困った時はお互いさまばいっ！」
2218 = "「Khách sáo quá đó, Fukami-chan.\\nLúc khó khăn thì phải giúp đỡ nhau chứ!」"

# monologue
# JP: マッチポンプだ。ふかみを困らせた原因が自分であると、\nすっかり忘れてしまったような、凪のくったくない笑顔。
3358 = "Đúng là vừa đấm vừa xoa. Nụ cười của Nagi thật hồn nhiên,\\ncứ như thể cô bé đã quên béng mất rằng chính mình là người đã gây rắc rối cho Fukami."

# monologue
# JP: ふかみも安堵のためなのか、\n手にした本を開いたままに、微笑んでいる。
3353 = "Fukami cũng mỉm cười, có lẽ là vì đã an tâm,\ntrong khi vẫn giữ quyển sách đang mở trên tay."

# 【双鉄】
# display as 雙鐵
# JP: 「突然の来訪で、読書の邪魔をしてしまったようだね」
2633 = "「Chuyến viếng thăm đột ngột này, có vẻ như đã làm phiền em đọc sách rồi nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ……別に。邪魔とかじゃ」
2353 = "「A... Không hẳn ạ. Cũng không phải là làm phiền gì đâu...」"

# monologue
# JP: ぎゅうっと。手の中の本が、開かれたまま、\n僕とふかみを遮るように持ち上げられる。
3172 = "Cô siết chặt tay. Quyển sách vẫn đang mở được giơ lên,\nnhư thể để che chắn giữa tôi và Fukami."

# monologue
# JP: “盾なのだな”と、その仕草を見て自然と感じる。
3195 = "“Đó là một tấm khiên nhỉ”, tôi bất giác nghĩ khi thấy cử chỉ đó."

# 【双鉄】
# display as 雙鐵
# JP: 「『地方における都市計画　～観光による活性化～』か、\nずいぶんと勉強熱心なのだな」
1888 = "「『Quy hoạch Đô thị tại các Địa phương ~Tái sinh nhờ Du lịch~』 à,\nem chăm học thật đấy nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁうっ」
2358 = "「Áu...」"

# monologue
# JP: ぱたんと、本が閉じられる。\n視線がほんの一瞬合って、けれどもすぐにそらされる。
1843 = "Rụp, quyển sách đóng lại.\nÁnh mắt chúng tôi chạm nhau trong thoáng chốc, nhưng rồi cô lập tức nhìn đi chỗ khác."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、ちょっと人見知りばい。\n慣れれば仲良くなれったい」
2432 = "「Bé Fukami hơi nhát người lạ đó con.\nQuen rồi thì sẽ thân được thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば無理なく慣れてくれ」
2735 = "「Vậy à. Vậy thì cứ từ từ làm quen nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――ぅ」
2348 = "「A... ư...」"

# monologue
# JP: まぁ、このふかみという子のことは――\nこういってはなんだが、どうでもいい。
3435 = "Mà, chuyện về cô bé tên Fukami này――\nnói ra thì cũng phũ phàng, nhưng tôi không quan tâm lắm."

# monologue
# JP: 蓑笠老人がおっしゃってくださったように、\n御一夜における観光の実態を学ぶことこそが最優先だ。
3254 = "Như lời ông lão mặc áo tơi nón lá đã nói,\nviệc tìm hiểu thực trạng du lịch ở Ohitoyo mới là ưu tiên hàng đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみちゃん――でいいのかな？」
2490 = "「Fukami-chan――gọi vậy được không nhỉ?」"

# 【ふかみ】
# display as 深美
# JP: 「う……はぅ……」
2369 = "「Ư... haư...」"

# monologue
# JP: 閉じた本をまた盾にして、こくこく頷く。
3149 = "Cô bé lại dùng cuốn sách đã gấp làm lá chắn, gật gật đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「受付に座っていたようだが、君は、ここの人なのか？」
2513 = "「Anh thấy em ngồi ở quầy tiếp tân, em là người ở đây à?」"

# 【ふかみ】
# display as 深美
# JP: 「えうっ……そっ」
2310 = "「E-ư... đ-đúng...」"

# 【凪】
# display as 凪
# JP: 「そうばい。ここのオーナーのみどりおばちゃんの、\n一人娘がふかみちゃんばい」
2563 = "「Đúng rồi đó. Con bé là Fukami-chan, con gái một\\ncủa cô Midori, chủ ở đây đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それならばすまないが、オーナーの\nみどりさんをお呼びいただけないかな――っと」
2277 = "「Ra là vậy. Thế thì, xin lỗi nhưng em có thể gọi giúp anh\\nchủ ở đây, cô Midori, được không... à mà.」"

# monologue
# JP: いかん。いささか急ぎすぎだ。\n自己紹介もすませずに、紹介を乞うなどありえんことだ。
3345 = "Không được. Mình hơi vội vàng quá rồi.\\nChưa tự giới thiệu mà đã nhờ người ta gọi giúp thì thật là thất lễ."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の名は右田双鉄。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対のために\n帰郷し、縁あって、このハチロクのオーナーになった」
2493 = "「Anh là Migita Soutetsu. Anh về quê để phản đối việc\\nxây dựng nhà máy \\x%lエアクラ;#00ffc040;AirCra%l;#;, và nhờ duyên phận mà trở thành chủ nhân của Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様からご紹介にあずかりました、旧\x%l帝鉄;#00ffc040;帝鉄%l;\x%l8620;#;#00ffc040;8620%l;#;形\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\x%l8620;#00ffc040;8620%l;#;専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、ハチロクです」
2508 = "「Như ngài Soutetsu-sama vừa giới thiệu, tôi là Hachiroku, \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; \\x%l8620;#00ffc040;8620%l;#; thuộc dòng \\x%l8620;#;#00ffc040;8620%l;#; của Cựu \\x%l帝鉄;#00ffc040;Đường sắt Đế quốc%l;#;.」"

# 【ふかみ】
# display as 深美
# JP: 「工場誘致……反、対」
2294 = "「Xây dựng nhà máy... phản, đối...」"

# monologue
# JP: 落ち着いたのか、\nようやっと、僕にも聞き取れる声が来る。
3145 = "Có lẽ cô bé đã bình tĩnh lại,\\ncuối cùng tôi cũng nghe được giọng nói của em ấy."

# 【凪】
# display as 凪
# JP: 「そうばい！　このにーさんらは、うちたちの味方ばい！\nじゃっけーん、ふかみちゃんとこ、連れてきたばいっ！」
2604 = "「Đúng rồi đó! Mấy anh chị này là đồng minh của tụi mình đó!\\nBởi vậy nên tui mới dẫn họ tới chỗ Fukami-chan đó!」"

# 【ふかみ】
# display as 深美
# JP: 「う……ん」
2373 = "「Ư...m.」"

# monologue
# JP: こくりと頷く。\n盾となっていた本がゆるゆる、下がり始める。
3175 = "Cô bé khẽ gật đầu.\\nCuốn sách làm lá chắn từ từ hạ xuống."

# 【ふかみ】
# display as 深美
# JP: 「ええと……私、早瀬ふかみ――です。\nこの発船所の、オーナー代理――です、一応」
2761 = "「Ừm... Em là Hayase Fukami... ạ.\\nEm là... người đại diện chủ sở hữu của bến tàu này... ạ, tạm thời là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「オーナー代理？」
2211 = "「Người đại diện chủ sở hữu?」"

# 【凪】
# display as 凪
# JP: 「みどりおばちゃん、体ば弱くて、\n入院したり退院したりの繰り返しばい」
2673 = "「Dì Midori, sức khỏe của dì ấy yếu lắm ạ,\\nCứ nhập viện rồi lại xuất viện liên tục thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……今日も……病院――で。だから、\nお話、なら――わたし――聞き、ます」
2760 = "「Ừm…… hôm nay…… dì ấy cũng ở bệnh viện―― ạ. Cho nên,\\nchuyện đó, thì―― em―― sẽ, nghe ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2278 = "「Ra là vậy.」"

# monologue
# JP: 相手が誰でもやるべきことは変わらない。\nやるべきことには、常に全力を尽くすことも。
3299 = "Đối phương là ai cũng không quan trọng, việc cần làm vẫn không hề thay đổi.\\nVà mình cũng sẽ luôn dốc toàn lực cho những việc cần làm đó."

# monologue
# JP: だからともかく、凪と出会ったいきさつや、\nそのままここに連れてこられたことなど、話す。
3236 = "Vậy nên, tôi bắt đầu kể lại đầu đuôi câu chuyện mình đã gặp Nagi như thế nào,\\nvà cả việc bị cô ấy dẫn thẳng đến đây nữa."

# 【ふかみ】
# display as 深美
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;で、観光振興――」
2256 = "「Dùng \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; để, chấn hưng du lịch――」"

# monologue
# JP: ふかみがようやく、わずかに顔を持ち上げる。\n慎重そうな――どこか怯えたような瞳だ。
3348 = "Fukami cuối cùng cũng khẽ ngẩng mặt lên.\\nĐó là một đôi mắt thận trọng―― và có phần nào đó sợ sệt."

# monologue
# JP: 僕とハチロクを数秒ずつ見て、\nすぐにまた、うつむき視線を逸らしてしまう。
3162 = "Cô bé nhìn tôi và Hachiroku mỗi người vài giây,\\nrồi lại lập tức cúi gằm mặt, lảng tránh ánh mắt."

# 【ふかみ】
# display as 深美
# JP: 「わたし、オーナー代理で、がんばってるんですけど。\nだけどやっぱり、毎日、全然、お客さん来てくれなくて」
2523 = "「Em, với tư cách là chủ quán tạm thời, cũng đã cố gắng rất nhiều rồi ạ.\\nNhưng mà, ngày nào cũng vậy, chẳng có một người khách nào đến cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2571 = "「Vậy à.」"

# monologue
# JP: “そうだろうな”とはさすがにいえない。
1845 = "Quả nhiên mình không thể nói ra câu “Tôi cũng nghĩ vậy” được."

# monologue
# JP: が――今日がたまたま、ということでなく、\n“毎日これ”なら、経営は、恐らく危機的な状況だろう。
3000 = "Nhưng―― nếu đây không phải là chuyện ngẫu nhiên của hôm nay,\\nmà là “ngày nào cũng thế này” thì, tình hình kinh doanh có lẽ đang ở mức báo động rồi."

# 【ふかみ】
# display as 深美
# JP: 「だから、観光振興、やってくれるならすごく助かります。\n手伝えること、出来ることだったらやりたい――です」
2531 = "「Cho nên, nếu anh có thể thực hiện việc chấn hưng du lịch, thì thật sự là giúp em rất nhiều ạ.\\nNếu có bất cứ điều gì em có thể giúp, có thể làm, em đều muốn làm―― ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2705 = "「Cảm ơn em.」"

# monologue
# JP: しかし……接客がこの有り様では、\n観光客が増えたとて、先の見通しは暗かろう。
3103 = "Tuy nhiên…… với thái độ tiếp khách thế này,\\ndù cho lượng du khách có tăng lên, thì tương lai phía trước e rằng cũng thật mờ mịt."

# monologue
# JP: ああいや、そう判断するのは性急すぎるか。\nともかく、“観光の実態”を確かめさせてもらうとしよう。
3111 = "À không, phán xét như vậy thì hơi vội vàng.\\nDù sao thì, cứ để mình xác nhận “thực trạng du lịch” ở đây đã."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕とハチロクにクマ川下りを経験させてくれ。\n料金は、無論、大人二人分を払う」
2779 = "「Vậy thì, hãy cho tôi và Hachiroku trải nghiệm chuyến đi thuyền xuôi dòng sông Kuma.\\nChi phí, dĩ nhiên, tôi sẽ trả cho hai người lớn.」"

# 【ふかみ】
# display as 深美
# JP: 「え、あ――はい、ありがとう、ございます。\n大人二人で、税込み、７５６０円になります」
2319 = "「Ể, à... vâng, xin cảm ơn ạ.\\nHai người lớn, đã bao gồm thuế, là 7560 yên ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2378 = "「嗯」" 

# monologue
# JP: 一万円を出して二千円と少しのお釣り。\n案外高いな、というのが率直な感想だ。
2993 = "Đưa ra một vạn yên và nhận lại hơn hai nghìn yên tiền thừa.\\nCảm nhận thẳng thắn của tôi là, đắt hơn mình tưởng."

# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、ライフジャケットの着け方から\nご説明しま――あ」
2780 = "「Vậy thì, để tôi hướng dẫn cách mặc áo phao...\\nà.」"

# monologue
# JP: やけに古風なベルを模した電話の着信音。
3440 = "Tiếng chuông điện thoại, mô phỏng lại tiếng chuông kiểu cũ một cách kỳ lạ."

# monologue
# JP: 一瞬あわてたふかみはけれど、\nすぐに凪へと手にしたライフジャケットを渡す。
3275 = "Fukami thoáng chút bối rối, nhưng rồi cô liền đưa chiếc áo phao đang cầm trong tay cho Nagi."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お願い」
2429 = "「Nagi-chan, nhờ em nhé.」"

# 【凪】
# display as 凪
# JP: 「まかせとくばい！」
2262 = "「Cứ giao cho em!」"

# 【ふかみ】
# display as 深美
# JP: 「ちょっと……ええと、失礼します」
2762 = "「Xin chờ một chút... à, tôi xin phép.」"

# monologue
# JP: ふかみはそのまま電話機へ。
3277 = "Fukami cứ thế đi thẳng tới chỗ điện thoại."

# 【ふかみ】
# display as 深美
# JP: 「おまたせいたしました。御一夜クマ川くだり発船所、\n受付の早瀬でございます」
2708 = "「Xin lỗi đã để quý khách phải chờ. Đây là bến thuyền du lịch xuôi dòng sông Kuma ở Ohitoyo,\\nHayase tại quầy tiếp tân xin nghe ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2334 = "「Chà...」"

# monologue
# JP: ハチロクが思わず漏らした感嘆の声に頷いている。
3035 = "Tôi gật đầu đồng tình với tiếng thán phục mà Hachiroku bất giác thốt lên."

# monologue
# JP: 僕らと会話していたときと電話とで、\nまるきり、人が変わったようだ。
3238 = "So với lúc nói chuyện với chúng tôi, khi nghe điện thoại,\\ncô ấy cứ như biến thành một người hoàn toàn khác."

# 【凪】
# display as 凪
# JP: 「よそ見しとったらいかんばい！」
2189 = "「Đừng có lơ đễnh coi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すまん」
2359 = "「À, anh xin lỗi.」"

# 【凪】
# display as 凪
# JP: 「ライフジャケットのつけかたば、\nちゃあんと聞いとかんと、死ぬたい」
2183 = "「Cách mặc áo phao đó,\\nphải nghe cho kỹ vào, không là chết thật đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうだな。\n申し訳ないが、もう一度説明を頼めるか？」
2730 = "「Em nói cũng phải.\\nPhiền em quá, nhưng em giải thích lại một lần nữa được không?」"

# 【凪】
# display as 凪
# JP: 「よかばい」
2413 = "「Được thôi.」"

# monologue
# JP: あっさり言って、凪はてきぱき、\n見やすい動きでライフジャケットを身につける。
3075 = "Nói rồi, Nagi nhanh nhẹn\\nmặc chiếc áo phao cứu sinh với những động tác dễ nhìn."

# 【凪】
# display as 凪
# JP: 「オモテウラ前後ろ気ぃつけて着れば、そいでよか。\n水におちたら、勝手にふくらみよるけんね」
2301 = "「Cứ chú ý mặt trong mặt ngoài, trước sau rồi mặc vào là được à.\\nRớt xuống nước là nó tự phồng lên thôi hà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2373 = "「嗯……」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは……ジュニアサイズなのですか」
2504 = "「Tôi... phải dùng cỡ trẻ em sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「単に、背丈の問題だろう」
2367 = "「Chắc chỉ đơn giản là vấn đề chiều cao thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「それはそうなのでしょうけれど」
2728 = "「Chuyện đó thì đúng là vậy, nhưng mà...」"

# 【凪】
# display as 凪
# JP: 「サイズば合えば、どれでんよかたい。\n合わんのつけたら、水に落ちたとき死ぬだけばい」
2299 = "「Miễn vừa cỡ là cái nào cũng được hết á.\\nMà mặc cái không vừa, lỡ rớt xuống nước là chết thôi đó.」"

# 【ハチロク】
# display as 八六
# JP: 「ぅぅっ……」
2372 = "「Ưưư...」"

# monologue
# JP: しぶしぶといった表情で、\nハチロクはジュニアサイズの救命胴衣を身につける。
3029 = "Với vẻ mặt đầy miễn cưỡng,\\nHachiroku mặc vào người chiếc áo phao cứu sinh cỡ trẻ em."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2373 = "「嗯……」" 

# monologue
# JP: ハチロクの依頼どおり、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;は肌身離さず扱っている。\n中にはもちろん、\x%l運転体;#00ffc040;運転体%l;#;だ。
3005 = "Theo như yêu cầu của Hachiroku, tôi luôn giữ chiếc \\x%l乗務鞄;#00ffc040;túi công tác%l;#; bên mình.\\nBên trong tất nhiên là \\x%l運転体;#00ffc040;thân điều khiển%l;#;."

# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;を換装すればジュニアサイズも大きくなるが\nさてその場合、救命胴衣はどう扱われる――おや。
3376 = "Nếu thay \\x%lタブレット;#00ffc040;tablet%l;#; thì cơ thể cỡ trẻ em của em ấy cũng sẽ lớn lên, nhưng mà\\nvậy thì, chiếc áo phao cứu sinh sẽ được xử lý thế nào―― Khoan đã."

# 【ふかみ】
# display as 深美
# JP: 「あの――おまたせ、しました」
2759 = "「À... xin lỗi vì đã để anh chờ ạ.」"

# monologue
# JP: 電話を終えて、ふかみがこちらにやってくる。\n恐縮してるのかなんなのか、背中を丸め身を縮めている。
3283 = "Nghe điện thoại xong, Fukami đi về phía này.\\nKhông biết có phải do thấy áy náy hay gì không, mà cô ấy còng lưng, co rúm người lại."

# monologue
# JP: なまじ背丈があるだけに、ひどく窮屈な印象だ。
3117 = "Vốn dĩ đã cao người, nên trông cô ấy lại càng thêm gò bó."

# monologue
# JP: もりあがりかけた観光気分も、\nつられて押し込められてしまう。
3082 = "Cái tâm trạng du lịch đang dâng trào,\\ncũng bị kéo theo mà lắng xuống."

# 【ふかみ】
# display as 深美
# JP: 「舟の方に、ご案内します。ええと、水しぶき――\nかからないよう、気をつけてください」
2500 = "「Tôi sẽ dẫn anh ra thuyền. À ừm, nước bắn lên――\\nxin hãy cẩn thận để không bị ướt ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――これが、クマ川だ」
2240 = "「Hachiroku――đây là sông Kuma đó.」"

# monologue
# JP: 言いながら大きくぐるり、と体をひねる。
3227 = "Vừa nói, tôi vừa xoay người một vòng lớn."

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;のときと変わらず僕のヒザに乗るハチロクも、\nそのまま動きにつられ、揺られる。
3359 = "Hachiroku, vẫn ngồi trên đùi tôi như lúc ở trong \\x%l運転体;#00ffc040;Buồng Lái%l;#;,\\ncũng bị cuốn theo chuyển động đó mà lắc lư."

# 【ハチロク】
# display as 八六
# JP: 「大きいですね、大きく広く――\nまるで包まれているようです」
2636 = "「Lớn thật đấy ạ, vừa lớn vừa rộng――\\ncứ như thể đang được bao bọc vậy.」"

# monologue
# JP: 川を挟む森の緑と、川そのものの蒼碧。\n水鳥たちの声と羽音と、水の匂いをふくんだ風と。
3264 = "Màu xanh của khu rừng ôm lấy đôi bờ, và sắc xanh biếc của chính dòng sông.\\nTiếng chim nước ríu rít, tiếng vỗ cánh xôn xao, và cơn gió mang theo hương vị của nước."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――包み込まれて、\n同時に、開放されてるような気に僕はなる」
2565 = "「Đúng vậy nhỉ――vừa cảm thấy như được bao bọc,\\nđồng thời, anh lại có cảm giác như được giải phóng.」"

# 【ハチロク】
# display as 八六
# JP: 「開放――」
2703 = "「Giải phóng――」"

# monologue
# JP: 両手を広げ、大きく大きく伸びをして――
3041 = "Cô ấy dang rộng hai tay, vươn vai một cái thật dài――"

# 【ハチロク】
# display as 八六
# JP: 「本当ですね、双鉄様。\nまるで反対の気持ちなのに、両方一度に感じます」
2645 = "「Đúng thật ạ, thưa ngài Soutetsu.\\nDù là hai cảm giác hoàn toàn trái ngược, em lại cảm nhận được cả hai cùng một lúc.」"

# monologue
# JP: ――それからすっぽり行儀よく、\nハチロクはまた僕のヒザの上、心地よさげに体を収める。
1834 = "――Rồi, một cách gọn gàng và ngoan ngoãn,\\nHachiroku lại yên vị trên đùi tôi, thu mình lại trông thật thoải mái."

# monologue
# JP: （こんっ）
3451 = "(Cốc)"

# monologue
# JP: 軽い衝撃。
2978 = "Một chấn động nhẹ."

# monologue
# JP: なにかと思い視線を向ければ、\n舟の舳先に立ったふかみが、水棹で岩を叩いたようだ。
3222 = "Tôi nhìn sang xem có chuyện gì, thì ra Fukami đang đứng ở mũi thuyền, dường như đã dùng sào gõ vào một tảng đá."

# monologue
# JP: （なんだ、背筋が伸びているではないか）
3449 = "(Gì đây, lưng cô ấy thẳng tắp thế kia.)"

# monologue
# JP: 舟の上。陸よりずっと安定しない場所なのに、\nふかみは堂々、長身をいかし水棹を操っている。
3367 = "Trên thuyền. Dù là một nơi kém vững chãi hơn đất liền rất nhiều,\\nFukami vẫn đầy tự tin, tận dụng vóc người cao ráo của mình để điều khiển cây sào."

# 【ハチロク】
# display as 八六
# JP: 「川こそが――\nふかみ様にとっての線路なのですね」
2610 = "「Dòng sông này chính là――\\nđường ray dành cho ngài Fukami nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2570 = "「Ừ.」"

# monologue
# JP: ハチロクの声に頷かされる。\nまさしくこれこそ、水を得た魚ということなのだろう。
3208 = "Tôi bất giác gật đầu trước lời của Hachiroku.\\nĐúng là thế này mới gọi là cá gặp nước."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
# 2425 = "「小凪」" 

# 【凪】
# display as 凪
# JP: 「まかせとくばいっ！\nお客さん、水しぶき、気をつけた方がよかとよ」
2263 = "「Cứ để đó cho tôi!\\nQuý khách, cẩn thận nước văng vào người đấy nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！？　おおっ！」
2379 = "「Hự!? Oa!」"

# 【ハチロク】
# display as 八六
# JP: 「あははっ、双鉄様っ、\n冷たくて心地良いですね！」
2333 = "「Aha ha, ngài Soutetsu,\\nmát mà dễ chịu ghê nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、だなっ」
2554 = "「Ừm, cũng phải...」"

# monologue
# JP: 流れの速いところにかかり、\n川の表情ががらりと変わる。
3080 = "Thuyền đi vào khúc sông chảy xiết,\\nvà diện mạo của dòng sông thay đổi hoàn toàn."

# monologue
# JP: 思うさま舟を弄び、\n頭の上から、夕立のような飛沫を降らせる。
3266 = "Cô ấy đùa nghịch với con thuyền theo ý muốn,\\nkhiến những giọt nước bắn lên từ trên đầu như một cơn mưa rào buổi chiều."

# 【ふかみ】
# display as 深美
# JP: 「よ――――っと」
2386 = "「Hầy―――― da!」"

# 【凪】
# display as 凪
# JP: 「うんとこよいしょっ！　どっこいしょぉっ！！」
2388 = "「Hò... dô ta! Dô... ta nào!!」"

# monologue
# JP: 水棹で軽く岩を、あるいは川を突き、\n舳先のふかみが舟の進路を決定する。
3371 = "Dùng sào nhẹ nhàng chống vào đá, hoặc vào lòng sông,\\nFukami ở mũi thuyền quyết định hướng đi cho con thuyền."

# monologue
# JP: 僕らの真後ろ、[とも]艫に立つ凪は櫂を取り、\n右に左に大きく動かし、ふかみの決断に力を与える。
3352 = "Ngay sau lưng chúng tôi, Nagi đứng ở đuôi thuyền cầm lấy mái chèo,\\nkhua mạnh sang phải rồi sang trái, tiếp thêm sức cho quyết định của Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだな」
2641 = "「Giỏi thật đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。こんなにお舟が揺れているのに、\nわたくし、少しも恐ろしくありません」
2557 = "「Vâng ạ. Dù thuyền có lắc lư nhiều thế này,\\nem cũng không thấy sợ chút nào cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに」
2655 = "「Đúng là vậy.」"

# monologue
# JP: ふかみと凪との自信に満ちた動作は見ているそれだけで、\n安心感を与えてくれる。
3007 = "Chỉ cần nhìn những động tác đầy tự tin của Fukami và Nagi thôi,\\ncũng đủ để cảm thấy an tâm rồi."

# monologue
# JP: やがて飛沫と揺れは収まり、\n舟はまた、ゆるやかな流れの中に包まれる。
3252 = "Chẳng mấy chốc, bọt nước và sự rung lắc cũng dịu đi,\\ncon thuyền lại được bao bọc trong dòng nước êm đềm."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりは、この仕事は長いのか？」
2215 = "「Hai người làm công việc này lâu chưa?」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃんは、それこそ子供のころからばい。\nうちは、まだ始めて二年目たい」
2434 = "「Fukami-chan thì làm từ hồi còn nhỏ xíu lận.\\nEm thì mới làm được năm thứ hai thôi à.」"

# 【双鉄】
# display as 雙鐵
# JP: 「二年目」
2238 = "「Năm thứ hai.」"

# 【ハチロク】
# display as 八六
# JP: 「二年目でその落ち着きなのですか！？」
2535 = "「Mới năm thứ hai mà đã điềm tĩnh được như vậy sao!?」"

# 【凪】
# display as 凪
# JP: 「ともはりは、船頭よりも覚えることが少ないけんね。\n船頭にまわったら、うちはまだまるでダメダメたい」
2542 = "「Làm Tomohari thì có ít việc phải học hơn Sendou mà.\\nChứ để em làm Sendou thì còn kém xa lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2337 = "「Ồ.」"

# monologue
# JP: 舳先にたって水先案内するのが船頭。\n[とも]艫にたち、櫂を操り船頭をフォローするのがともはり。
3338 = "Người đứng ở mũi thuyền dẫn đường gọi là Sendou.\\nNgười đứng ở đuôi thuyền, dùng mái chèo hỗ trợ cho Sendou gọi là Tomohari."

# monologue
# JP: そうと解説したあとで、凪は大きく肩をすくめる。
3121 = "Giải thích xong, Nagi nhún vai một cái thật mạnh."

# 【凪】
# display as 凪
# JP: 「クマ川くだりはお客さんが減りすぎて、船頭さん達が\nやめてっちゃったって、ふかみちゃん困っとったばい」
2228 = "「Chuyến du ngoạn sông Kuma này vắng khách quá, nên mấy người lái thuyền\\ncũng nghỉ việc hết cả, làm Fukami-chan khổ sở lắm đó.」"

# 【ハチロク】
# display as 八六
# JP: 「それで、凪さんもともはりのお仕事に？」
2529 = "「Vậy nên chị Nagi cũng làm công việc lái thuyền luôn ạ?」"

# 【凪】
# display as 凪
# JP: 「ま、簡単にいえばそういうこったい。\nこれも、剣術修行ばい！」
2385 = "「Ừm, nói đơn giản thì là vậy đó.\\nCái này cũng là một phần của luyện tập kiếm thuật mà!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
# 2425 = "「小凪」" 

# 【凪】
# display as 凪
# JP: 「っと、船頭交代ばい。\nここから先には、もう瀬がないけんね」
2343 = "「À, đến lúc đổi người lái thuyền rồi.\\nTừ đoạn này trở đi không còn ghềnh đá nữa đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。気をつけてな」
2734 = "「Vậy à. Chị cẩn thận nhé.」"

# 【凪】
# display as 凪
# JP: 「気をつけるのはにーさん達ばい。\nライフジャケット、ひも締め直しといたほうがよかよ？」
2698 = "「Người cần cẩn thận là mấy anh đó.\\nÁo phao cứu sinh, không siết lại dây cho chặt hơn à?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい」
2366 = "「Này này.」"

# monologue
# JP: 洒落にならない洒落をいい、\n凪は軽やかに船首へと向かう。
3073 = "Nói một câu đùa chẳng vui chút nào,\\nNagi nhẹ nhàng đi về phía mũi thuyền."

# monologue
# JP: 凪に水棹を手渡し、何言か注意して、\n今度はふかみが、慎重に船尾へとやってくる。
3120 = "Nagi trao lại cây sào, dặn dò vài câu,\\nrồi đến lượt Fukami cẩn trọng đi về phía đuôi thuyền."

# 【双鉄】
# display as 雙鐵
# JP: 「見事な手際だったな。\n凪が、『ふかみちゃんは小さな頃から』と言っていたが」
2642 = "「Kỹ năng của chị thật đáng nể.\\nNagi có nói là ‘Fukami-chan đã làm việc này từ nhỏ’ rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「そう、ですね。赤ちゃんのころから、ゆりかごがわりに\nわたし、舟に揺られていたそうですから」
2567 = "「Vâng, đúng vậy ạ. Nghe nói là từ lúc còn bé tí, thay vì nằm nôi,\\ntôi đã được dập dìu trên chiếc thuyền này rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2337 = "「哦——」" 

# monologue
# JP: 艫に回って、櫂をもってもふかみの背筋は丸くならない。\nすっくと立って、舳先の凪の様子を注意深く見守っている。
3088 = "Dù đã ra sau lái và cầm lấy mái chèo, lưng của Fukami vẫn không hề còng xuống.\\nCô đứng thẳng người, chăm chú quan sát Nagi ở phía mũi thuyền."

# 【ふかみ】
# display as 深美
# JP: 「だから、舟の上のお仕事だったら平気なんです。\nけど、経営とか、宣伝とかそういうの、わからなくって」
2532 = "「Vì vậy, với những công việc trên thuyền thì tôi không sao cả.\\nNhưng mà, mấy chuyện như kinh doanh hay quảng bá, tôi lại không biết gì hết...」"

# 【双鉄】
# display as 雙鐵
# JP: 「みどりさんといったか？\nご病気の前はその方が？」
2200 = "「Chị ấy tên là Midori-san phải không ạ?\\nTrước khi lâm bệnh, có phải là chị ấy lo liệu không?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。母と父が。その頃は、すごく繁盛していたんです。\n父が、過労で倒れちゃうくらいに」
2580 = "「Vâng. Là ba và mẹ em. Hồi đó, công việc kinh doanh rất phát đạt.\\nĐến mức ba em đã gục ngã vì làm việc quá sức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……乗ったことがある。そのころの川下り船に」
1881 = "「...Tôi đã từng đi rồi. Chuyến thuyền xuôi dòng hồi đó.」"

# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
# 2571 = "「是嗎」" 

# monologue
# JP: ふかみの口元がふわっと緩む。\nそして視線は、遠く、遠く――川の彼方を見続ける。
3288 = "Khóe môi Fukami khẽ giãn ra.\\nVà ánh mắt cô, vẫn hướng về phía xa, thật xa――phía bên kia bờ sông."

# 【双鉄】
# display as 雙鐵
# JP: 「右田の家の養子になって、ほどないころだ。\n汰斗さんと、義父と、義母と、真闇姉と日々姫と」
2573 = "「Đó là không lâu sau khi tôi trở thành con nuôi của nhà Migita.\\nCùng với anh Taito, cha nuôi, mẹ nuôi, chị Maan và Hibiki.」"

# 【ハチロク】
# display as 八六
# JP: 「いかがでしたか？」
2473 = "「Chuyến đi thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まだ慣れなくてな。緊張して、舟の外ばかりを見ていた。\n季節は、丁度いま頃で――」
2629 = "「Lúc đó tôi vẫn chưa quen. Tôi đã rất căng thẳng, và chỉ toàn nhìn ra bên ngoài thuyền.\\nMùa lúc đó, cũng vào khoảng thời gian này――」"

# monologue
# JP: 賑やかだった。舟は何艘もつらなって、その全てに\nぎゅうぎゅうにお客がつめこまれていた。
3308 = "Thật là náo nhiệt. Nhiều chiếc thuyền nối đuôi nhau, và chiếc nào cũng\\nchật ních khách."

# monologue
# JP: その賑やかさに温められて、舟から降りる頃には僕らも、\nいくらか自然に、会話できるようになっていた。
3387 = "Được sưởi ấm bởi sự náo nhiệt đó, đến lúc xuống thuyền, chúng tôi cũng đã\\ncó thể trò chuyện với nhau tự nhiên hơn một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「景色は、変わっていないような気がするよ。\n夏のクマ川の、穏やかなところも、荒いところも」
2520 = "「Tôi có cảm giác như cảnh vật không hề thay đổi.\\nCả những đoạn êm đềm, lẫn những khúc dữ dội của sông Kuma vào mùa hè.」"

# 【ふかみ】
# display as 深美
# JP: 「川は、毎日が別の表情で。\nだけどずうっと、おんなじ顔をしてるんです」
2613 = "「Dòng sông, mỗi ngày lại mang một sắc thái khác nhau.\\nNhưng nó vẫn luôn giữ nguyên một gương mặt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「表情と、顔か」
2696 = "「Sắc thái và... gương mặt à.」"

# monologue
# JP: 水面、とは、水の[おもて]面と書くのだと不意に思い当たる。
3214 = "Tôi chợt nhận ra, 'mặt nước' cũng có nghĩa là 'gương mặt của nước'."

# monologue
# JP: 川の顔だの表情だのを、まるで考えたこともないが、\n毎日見ているものには、少し興味が湧いてくる。
3268 = "Tôi chưa từng nghĩ đến chuyện dòng sông có gương mặt hay sắc thái bao giờ,\\nnhưng khi nghe vậy, tôi bắt đầu thấy hơi hứng thú."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川はどうだ？　男か女か？　\nどんな顔をしているのだ？」
2797 = "「Vậy sông Kuma thì sao? Là nam hay nữ?\\nNó có gương mặt như thế nào?」"

# 【ふかみ】
# display as 深美
# JP: 「女性……女の子、です。思春期の」
2575 = "「Là một người phụ nữ... à không, một cô gái ạ. Một cô gái đang ở tuổi dậy thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2337 = "「哦——」" 

# 【ふかみ】
# display as 深美
# JP: 「お姉さんな感じで、表情ゆたかで、可愛らしくて。\nだけどたまに怒ると……すごく、ものすごく、荒れる」
2663 = "Trông ra dáng một người chị, biểu cảm phong phú, và rất đáng yêu.\\nNhưng thỉnh thoảng lúc nổi giận... lại trở nên vô cùng, vô cùng dữ dội."

# 【双鉄】
# display as 雙鐵
# JP: 「……情が深い、といった感じか？」
1870 = "......Ý em là... một người sâu sắc, phải không?"

# 【ふかみ】
# display as 深美
# JP: 「そう、です。そういう」
2577 = "Vâng, đúng vậy. Chính là như thế."

# monologue
# JP: 言って、\nふかみはいとおしそうにぐるりと大きく川を見渡す。
3405 = "Nói rồi,\\nFukami trìu mến đưa mắt nhìn một vòng khắp con sông rộng lớn."

# 【ふかみ】
# display as 深美
# JP: 「底しれなくて、激しくて、知ろうとしてもわからない。\nとても面倒な女の子だから、その分、とても魅力的」
2615 = "Sâu không lường được, lại dữ dội, dù cố gắng cũng không thể nào thấu hiểu.\\nVì là một cô gái phiền phức như vậy, nên lại càng thêm quyến rũ."

# monologue
# JP: ふかみの瞳が、僕を捉える。
3291 = "Ánh mắt của Fukami nhìn thẳng vào tôi."

# monologue
# JP: なにひとつ隠すものの無い川の上。\n背筋を伸ばしたふかみがまっすぐ、僕を見る。
3126 = "Trên mặt sông không có gì để che giấu.\\nFukami thẳng lưng, nhìn thẳng vào tôi."

# 【ふかみ】
# display as 深美
# JP: 「わかりやすくて簡単なものは、浅くて薄い、です。\nそれはきっと長くは保たず、とても大きなゴミになる」
2758 = "Những thứ dễ hiểu và đơn giản thì đều nông cạn và hời hợt, thưa anh.\\nChúng chắc chắn sẽ không tồn tại được lâu, và rồi sẽ trở thành một đống rác khổng lồ."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2278 = "「原來如此」" 

# monologue
# JP: 評価が、変わる。\nどうでもいいと思っていたが、名こそが体を表している。
3150 = "Đánh giá của tôi đã thay đổi.\\nTôi đã từng nghĩ cô ấy là người thế nào cũng được, nhưng cái tên quả thật đã nói lên bản chất con người."

# monologue
# JP: ふかみは、深みを持っている。\n引き出せたなら、恐らくは、御一夜を支える力になる。
3296 = "Fukami có một chiều sâu nhất định.\\nNếu có thể khai thác được, có lẽ cô ấy sẽ trở thành một sức mạnh chống đỡ cho Ohitoyo."

# 【双鉄】
# display as 雙鐵
# JP: 「それが、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に反対する理由か」
2732 = "Đó là lý do em phản đối việc mời gọi nhà máy \\x%lAir Kura;#00ffc040;Air Kura%l;#; sao?"

# 【ふかみ】
# display as 深美
# JP: 「そう。です」
2578 = "Vâng. Đúng vậy."

# monologue
# JP: ほ、っとしたような息がはかれる。
3156 = "Một tiếng thở phào như trút được gánh nặng vang lên."

# 【ふかみ】
# display as 深美
# JP: 「わたしは、クマ川が好きだから」
2392 = "Vì tôi... yêu quý con sông Kuma này."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、だ」
2304 = "Nhưng mà,"

# monologue
# JP: この聡明さと芯の強さだ。\n子供扱いする必要は、もはやあるまい。
3160 = "Sự thông minh và cốt cách mạnh mẽ này.\\nCó lẽ không cần phải đối xử với em ấy như trẻ con nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「環境を守れたところで、\n生活が守れねば、人と住処は滅びるぞ」
2273 = "「Dù có bảo vệ được môi trường,\\nmà không bảo vệ được cuộc sống, thì con người và nơi ở cũng sẽ diệt vong thôi」"

# 【ふかみ】
# display as 深美
# JP: 「うっ」
2370 = "「Ực」"

# 【ハチロク】
# display as 八六
# JP: 「そうして、人の手が絶えてしまえば……\n自然に還る、といえば言葉は綺麗ですけれど」
2688 = "「Và rồi, nếu bàn tay con người biến mất...\\n'Trở về với tự nhiên', nói thì nghe hay đấy, nhưng mà」"

# monologue
# JP: ふかみの視線が僕から逸れて、さまよい始める。\n背筋がどんどんまるまり縮こまっていく。
3290 = "Ánh mắt của Fukami rời khỏi tôi, bắt đầu nhìn vẩn vơ.\\nLưng em ấy ngày càng co rúm lại."

# 【双鉄】
# display as 雙鐵
# JP: 「ＳＬによる観光振興が成功したとて、\nこの有り様では、川下り観光は復活できまい」
2275 = "「Dù cho việc xúc tiến du lịch bằng tàu hơi nước có thành công,\\nvới tình trạng này, du lịch thuyền xuôi dòng khó mà phục hồi được」"

# 【ふかみ】
# display as 深美
# JP: 「あの……その……だから……がんばって」
2741 = "「À... ừm... cho nên là... cố gắng lên nhé」"

# monologue
# JP: （ガンっ）
3450 = "（CỘP）"

# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ！？」
2371 = "「Oái!?」"

# monologue
# JP: 硬い音がして舟が揺れ――
3185 = "Một tiếng động khô khốc vang lên, con thuyền chao đảo――"

# 【ふかみ】
# display as 深美
# JP: 「あ。平気です。\n凪ちゃんが、ちょっとヘタなだけ。です」
2360 = "「A. Không sao đâu ạ.\\nChỉ là Nagi-chan hơi vụng về một chút. Thôi ạ」"

# monologue
# JP: ――なにかと慌てるより先に、\nふかみがそうと教えてくれる。
1832 = "――Trước khi tôi kịp hoảng hốt,\\nFukami đã giải thích cho tôi."

# monologue
# JP: ……今の会話をしながらでも、凪の様子を確かめてたのか。\n予想以上だ。これはまさしく、磨けば光ろう。
1853 = "...Dù đang nói chuyện, em ấy vẫn để ý đến tình hình của Nagi sao.\\nĐúng là ngoài sức tưởng tượng. Đây chính xác là viên ngọc thô, mài giũa rồi sẽ sáng."

# 【双鉄】
# display as 雙鐵
# JP: 「特別にがんばろうとするから、\x%l空転;#00ffc040;空転%l;#;するのだ。\nおそらくはな」
2524 = "「Chính vì cố gắng một cách đặc biệt, nên mới \\x%l空転;#00ffc040;công cốc%l;#; đó.\\nCó lẽ là vậy」"

# 【ふかみ】
# display as 深美
# JP: 「ぇ？」
2321 = "「Ể?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、舟の上と同じように、陸の上でもやればよい。\nそれだけで接客だの宣伝だのの問題はあらかた消えるぞ」
2217 = "「Cứ làm y như lúc ở trên thuyền là được.\\nChỉ cần vậy thôi là hầu hết các vấn đề về tiếp khách hay quảng bá đều sẽ biến mất hết.」"

# 【ふかみ】
# display as 深美
# JP: 「ええっ？」
2317 = "「Ểể?」"

# monologue
# JP: ふかみは驚き――いやむしろ、怯えたような顔になり、\nまたぞろ背筋を縮め始める。
3281 = "Fukami ngạc nhiên――không, phải nói là cô bé lộ ra vẻ mặt sợ sệt,\\nvà lại bắt đầu co rúm người lại."

# 【双鉄】
# display as 雙鐵
# JP: 「自分では気付いていないのか？\nそれだ。それが、陸の上でのお前の姿だ」
2226 = "「Em không tự nhận ra sao?\\nChính nó đó. Đó chính là dáng vẻ của em khi ở trên cạn.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　あの……どう……違……」
2325 = "「Ể? Ờm... khác... thế nào ạ...」"

# 【ハチロク】
# display as 八六
# JP: 「背筋です。身を守ろうとでもしているように丸まって\n――せっかくの美しい立ち姿が、台無しではないですか」
2560 = "「Là lưng của em đó. Em cứ khom người lại như thể đang cố tự vệ vậy\\n――dáng đứng xinh đẹp vốn có, chẳng phải là đang bị phí hoài hay sao.」"

# 【ふかみ】
# display as 深美
# JP: 「うつくしい……立ち姿……です？」
2672 = "「Dáng đứng... xinh đẹp... ạ?」"

# monologue
# JP: ふかみの視線が舳先へと。
3285 = "Ánh mắt Fukami hướng về phía mũi thuyền."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんのこと？」
2221 = "「Chị đang nói Nagi-chan ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どういう解釈でそうなるか。お前だ、ふかみ。\n舟の上でのお前の姿は、堂々として美しくあるぞ」
2261 = "「Sao em lại diễn giải ra như vậy chứ. Là em đó, Fukami.\\nDáng vẻ của em khi ở trên thuyền, vừa đĩnh đạc lại vừa xinh đẹp.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　やだ――ない、ない、そんなこと」
2322 = "「Ể? Thôi mà――không, không, làm gì có chuyện đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2336 = "「Ối.」"

# monologue
# JP: 照れたあまりなのであろうか、\n腕をぶんぶんふるように、櫂でざばざば水を掻く。
3231 = "Có lẽ vì quá ngượng ngùng,\\ncô bé vung mái chèo khoắng nước loạn xạ, như thể đang vung vẩy cánh tay."

# 【ハチロク】
# display as 八六
# JP: 「なぜ無いのですか？　単なる事実だと思うのですが」
2616 = "「Tại sao lại không có chứ ạ? Tôi nghĩ đó chỉ đơn thuần là sự thật thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「だって――だって――だって、学園で……」
2391 = "「Tại vì――tại vì――tại vì, ở trường...」"

# monologue
# JP: 体がますます縮こまる。\n顔も真下に向いてしまい、目つきはひどい上目遣いだ。
3171 = "Cơ thể em ấy càng lúc càng co rúm lại.\\nGương mặt cũng cúi gằm xuống đất, ánh mắt ngước lên trông thật tội nghiệp."

# 【ふかみ】
# display as 深美
# JP: 「わたし、おっきいからかわいくないって……クラスの子。\n男の子なんて、『でか子』とか、わたしのこと」
2622 = "「Em... vì em cao to nên không dễ thương... mấy bạn trong lớp nói vậy.\\nMấy bạn nam còn gọi em là... 'đồ kều' nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「女子のそれは、妬みでしょう。\n男子のそれは、照れ隠しというものでしょう」
2412 = "「Lời của con gái, đó hẳn là ghen tị.\\nCòn lời của con trai, đó hẳn là để che giấu sự ngượng ngùng thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「でも……でも……わたし、ほんとに――\nこんな、おっきい、から……かわいい、わけ、ない」
2303 = "「Nhưng... nhưng mà... em, thật sự――\\nvì... cao to thế này... nên... không thể nào... dễ thương được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そこは認めよう。\nふかみ、お前はかわいくない。その理由は大きいからだ」
2781 = "「Vậy thì, tôi sẽ thừa nhận điều đó.\\nFukami, em không dễ thương. Lý do là vì em cao to.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁぅっ」
2357 = "「Hự...」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！？」
2803 = "「Ngài Soutetsu!?」"

# monologue
# JP: ふかみがそうと決めているのだ。\nかわいいのかわいくないのの主観を、覆せようはずもない。
3278 = "Fukami đã quyết định như vậy rồi.\\nKhông có cách nào lật ngược được quan điểm chủ quan của em ấy về việc mình có dễ thương hay không."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、『かわいい』と『美しい』は別物だ」
2212 = "「Nhưng, 'dễ thương' và 'xinh đẹp' là hai chuyện khác nhau.」"

# 【ふかみ】
# display as 深美
# JP: 「ぇ」
2318 = "「Ể?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おまえをかわいくなくする大きさゆえに、\n背筋を伸ばし自信に満ちたお前は、ひときわ美しい」
2224 = "「Chính vì vóc dáng cao lớn khiến em không dễ thương,\\nmà một khi em ưỡn thẳng lưng và tràn đầy tự tin, em sẽ đẹp một cách nổi bật.」"

# 【ハチロク】
# display as 八六
# JP: 「それに、凛々しく、頼もしくもあります」
2197 = "「Hơn nữa, trông ngài còn oai phong và đáng tin cậy nữa.」"

# monologue
# JP: ハチロクの声。\n僕も感じていたことを、真っ直ぐな言葉に直してくれる。
3251 = "Giọng của Hachiroku.\\nEm ấy đã nói thẳng ra những điều mà tôi cũng đang cảm nhận."

# 【ハチロク】
# display as 八六
# JP: 「ふかみ様の凛としたお姿のおかげで、\n不慣れな舟の上でもわたくし、とても安心できました」
2597 = "「Nhờ có dáng vẻ oai nghiêm của ngài Fukami,\\nmà dù ở trên một con thuyền không quen thuộc, tôi vẫn cảm thấy rất an tâm.」"

# monologue
# JP: （ぐらっ）
3452 = "(Chao đảo)"

# 【凪】
# display as 凪
# JP: 「わっ！？　とっ、よっ！」
2327 = "「Oái!? Hự... nào!」"

# monologue
# JP: ……自らが言っていたように、船頭にまわった凪は、\nまさしくダメのダメダメだ。
1854 = "…Đúng như chính cô bé đã nói, Nagi trong vai trò người chèo thuyền,\\nquả thực là tệ không thể tả nổi."

# monologue
# JP: だというのに、少しも怖さを感じないのは、\nふかみの瞳が、凪をとらえているためだ。
3247 = "Dù vậy nhưng, tôi không cảm thấy sợ chút nào là vì\\nđôi mắt của Fukami đang dõi theo Nagi."

# 【双鉄】
# display as 雙鐵
# JP: 「商売のことだけを考えろ。\n接客と、宣伝のことだけでいい」
2296 = "「Hãy chỉ nghĩ đến chuyện kinh doanh thôi.\\nChỉ cần tiếp khách và quảng bá là được rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「………………うん」
1872 = "「………………Ừm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かわいいだけの船頭と、美しく凛々しく頼もしい船頭と。\nお前が客なら、どちらの舟に乗りたく思うか」
2467 = "「Một người lái đò chỉ dễ thương, và một người lái đò xinh đẹp, đĩnh đạc và đáng tin cậy.\\nNếu em là khách, em sẽ muốn lên con thuyền nào hơn?」"

# 【ふかみ】
# display as 深美
# JP: 「あとの方。です。\nだって、川は……とても危ない場所だから」
2511 = "「Người sau ạ.\\nBởi vì, con sông... là một nơi rất nguy hiểm ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。仕事場は学園ではない。\n学園での評価を引きずる意味も理由も存在しない」
2603 = "「Đúng vậy. Nơi làm việc không phải là trường học.\\nChẳng có ý nghĩa hay lý do gì để kéo theo những đánh giá ở trường vào đây cả.」"

# monologue
# JP: ふかみが頷く。
3294 = "Fukami gật đầu."

# monologue
# JP: そうしようと望んだのだろう。\n背筋が、力みを帯びて伸びる。
2998 = "Có lẽ cô bé đã mong muốn làm như vậy.\\nLưng cô bé căng ra, gắng sức thẳng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「大きいお前が自然なお前だ。歪めれば無理が出て崩れる。\nおそらくそれは、川でも同じことであろう？」
2809 = "「Cứ đường hoàng là chính mình mới là con người tự nhiên của em. Nếu gò ép bản thân, em sẽ kiệt sức và sụp đổ thôi.\\nCó lẽ trên sông nước cũng vậy, phải không?」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2378 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、少しずつ慣れろ。自分を伸びやかに扱うことに。\nそうすれば自然と背筋も伸び、問題も解消されていくさ」
2777 = "「Vậy thì, hãy tập quen dần đi. Quen với việc thể hiện bản thân một cách thoải mái.\\nLàm được vậy thì lưng em sẽ tự nhiên thẳng lên, và các vấn đề cũng sẽ được giải quyết thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「……わかった。と思う。頭では。だから、ちょっと――そうする方も。がんばってみる。です」
1880 = "「……Em hiểu rồi. Em nghĩ là vậy. Về mặt lý thuyết ạ. Cho nên, em sẽ... thử cố gắng... cả cách đó nữa. ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうしてくれるなら僕も嬉しい」
2375 = "「Ừm. Nếu em làm vậy thì tôi cũng vui.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです。美しいものが歪んでいるのを、\nこれ以上みたくはありませんから」
2483 = "「Tôi cũng vậy. Vì tôi không muốn phải nhìn một thứ xinh đẹp bị bóp méo,\\nthêm chút nào nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「ありがとう。双鉄おにいさん。ハチロクさん」
2706 = "「Cảm ơn anh Soutetsu. Cả chị Hachiroku nữa.」"

# monologue
# JP: ふかみが少し背伸びして、凪に視線で合図を送る。\n凪は頷き、ホっとしたような顔になる。
3293 = "Fukami hơi nhón chân, ra hiệu bằng mắt cho Nagi.\\nNagi gật đầu, vẻ mặt trông như đã thở phào nhẹ nhõm."

# 【ふかみ】
# display as 深美
# JP: 「もうすぐ、着船。です。\n船がついたら、ふたりは、どうします？」
2806 = "「Sắp... cập bến. Rồi ạ.\\nKhi thuyền cập bến rồi, hai người sẽ làm gì ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、御一夜の駅まで戻ろうと思うが」
2486 = "「Trước mắt thì, tôi định quay về ga Ohitoyo...」"

# 【ふかみ】
# display as 深美
# JP: 「なら、\n一緒におじいちゃんのトラックに乗ってください」
2783 = "「Vậy thì,\\nhai người hãy đi chung xe tải của ông cháu đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おじいちゃんのトラック？」
2618 = "「Xe tải của ông cháu ư?」"

# 【ハチロク】
# display as 八六
# JP: 「トラック――\x%lエアクラ;#00ffc040;エアクラ%l;#;のトラックですか？」
2268 = "「Xe tải... là xe tải \\x%lエアクラ;#00ffc040;エアクラ%l;#; sao ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「ううん、ガソリンの。\n排気ガスとか出るヤツ。です」
2195 = "「Dạ không, là xe chạy xăng ạ.\\nLà loại có xả khói thải ra ấy ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、ガソリンエンジン車！」
2328 = "「Ôi, xe động cơ xăng ư!」"

# monologue
# JP: ハチロクが目で問うてくる。\nうなずきながら、言葉を受ける。
3042 = "Hachiroku nhìn tôi như muốn hỏi.\\nTôi vừa gật đầu, vừa đáp lời."

# 【双鉄】
# display as 雙鐵
# JP: 「いまどき、随分めずらしいな。\nなにか理由が？」
2394 = "「Thời buổi này mà vẫn còn thì hiếm thật đấy.\\nCó lý do gì đặc biệt sao cháu?」"

# 【ふかみ】
# display as 深美
# JP: 「発船所――[ゆのい,1]湯医にもあるから。\nもっと上流からの、もっと急流のヤツ」
2396 = "「Bến tàu... ở Yui cũng có một cái ạ.\\nLà loại ở tít trên thượng nguồn, chỗ dòng nước chảy xiết hơn nữa cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。湯医-御一夜間なら」
2276 = "「Ra là vậy. Nếu là đoạn đường giữa Yui và Ohitoyo thì...」"

# 【ハチロク】
# display as 八六
# JP: 「[じゅつせんはいたんこう,4]術仙廃炭鉱でしたか。あの近く――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;が使えなくなる場所を通るのですね？」
2771 = "「Là mỏ than bỏ hoang Jissen thì phải. Gần đó――\\nphải đi qua nơi mà \\x%lエアクラ;#00ffc040;エアクラ%l;#; không thể hoạt động, đúng không ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「そう。だからトラック。です。\n今は、湯医の発船場、人が足りなくて使ってないけど」
2605 = "「Vâng ạ. Vì vậy nên mới là xe tải. ạ.\\nBây giờ thì, bến tàu ở Yui không đủ người nên không dùng nữa, nhưng mà...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ともに頑張ろう。\n御一夜の観光復権で、湯医発船場も復活だ」
2778 = "「Vậy thì, cùng nhau cố gắng nào.\\nKhi du lịch của Ohitoyo được phục hồi, bến tàu Yui Hatsusenba cũng sẽ được khôi phục.」"

# 【ふかみ】
# display as 深美
# JP: 「うん。がんばる。です」
2381 = "「Ừm. Em sẽ cố gắng. ạ.」"

# monologue
# JP: いって、ふかみはまじまじ僕の顔を見る。
3406 = "Nói rồi, Fukami chăm chú nhìn vào mặt tôi."

# 【ふかみ】
# display as 深美
# JP: 「あの。なんでも言ってください。です。\n手伝えることあったら、わたし、がんばってやります」
2763 = "「À này. Anh cứ nói bất cứ điều gì nhé. ạ.\\nNếu có gì em có thể giúp, em sẽ cố gắng hết sức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、人だ。\nだれか、人を紹介してもらえないか？」
2782 = "「Vậy thì, là người.\\nEm có thể giới thiệu cho anh ai đó được không?」"

# 【ふかみ】
# display as 深美
# JP: 「人です？　どんな人がいいですか？」
2537 = "「Người ạ? Anh cần người như thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「観光か鉄道のどちらか、できれば両方に詳しいひと。\nそして、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対を明確にしている人だ」
2203 = "「Một người am hiểu về du lịch hoặc đường sắt, tốt nhất là cả hai.\\nVà, là người thể hiện rõ lập trường phản đối việc mời gọi nhà máy \\x%lAirCura;#00ffc040;AirCura%l;#;.」"

# 【ふかみ】
# display as 深美
# JP: 「だったら、丁度いい――\nえっと、\x%l帝鉄;#00ffc040;帝鉄%l;#;？　とかいうので働いてたっていう人が」
2767 = "「Vậy thì, vừa hay có một người――\\nỪm thì, có một người nói là đã từng làm ở nơi gọi là \\x%lTeitetsu;#00ffc040;Teitetsu%l;#;? ạ.」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃーーん！」
2430 = "「Fukami ơiiiiii!」"

# monologue
# JP: 凪の声。\nふかみは目線を僕から外し、続きは後でと短くことわる。
3370 = "Là giọng của Nagi.\\nFukami rời mắt khỏi tôi, và nói ngắn gọn rằng lát nữa sẽ nói tiếp."

# 【凪】
# display as 凪
# JP: 「いいかげんこっち変わって～！\nうちじゃ、着船は無理無理ばいっ！」
2450 = "「Mau đổi chỗ cho tớ đi~!\\nTớ thì, không thể nào cập bến được đâu!」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2378 = "「嗯」" 

# monologue
# JP: うなずくより先、もうスタスタと、\n舳先に向かい、ふかみは歩き出している。
3432 = "Còn chưa kịp gật đầu, Fukami đã thoăn thoắt\\nbước về phía mũi thuyền."

# monologue
# JP: そして途中でふりかえり――\n控えめな、けれど確かな笑顔を見せる。
3420 = "Rồi giữa đường, em quay lại――\\nvà nở một nụ cười dè dặt, nhưng chân thật."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、ちょっと焦りすぎ。です。\nまだ、四十秒は余裕あるのに」
2427 = "「Nagi-chan, cậu hơi vội vàng quá rồi. ạ.\\nMình vẫn còn dư tới bốn mươi giây mà.」"

# monologue
# JP: 境内に一歩踏み込めば、がぁがぁ、コケコケ、\nガチョウと鶏たちとが、大騒ぎして道を空ける。
3421 = "Vừa đặt một chân vào khuôn viên đền, tiếng quạc quạc, cục ta cục tác,\\nlũ ngỗng và gà đã làm ầm lên rồi nhường đường."

# 【双鉄】
# display as 雙鐵
# JP: 「ここも、昔と変わっていないな」
2736 = "「Nơi này cũng chẳng thay đổi gì so với ngày xưa nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「とても綺麗な神社ですね」
2640 = "「Ngôi đền đẹp quá nhỉ.」"

# monologue
# JP: 静かに呟く、ハチロクはスっと吸気する。
3053 = "Thì thầm khe khẽ, Hachiroku hít một hơi thật sâu."

# 【ハチロク】
# display as 八六
# JP: 「御一夜は、水の匂いのする町ですが……\nここの空気は、ひときわ澄み切っているようです」
2801 = "「Thị trấn Ohitoyo vốn là một nơi mang hương của nước, nhưng mà...\\nkhông khí ở đây dường như trong lành hơn hẳn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。澄み切っている感じを受ける。\nここは、昔も今も変わらず」
2656 = "「Đúng thật. Anh cũng cảm thấy không khí rất trong lành.\\nNơi này, dù là xưa hay nay, vẫn không hề thay đổi.」"

# monologue
# JP: お参りをした。\n汰斗さんと、日々姫と真闇姉とに連れられて。
3217 = "Mình đã đến viếng đền.\\nĐược anh Taito, Hibiki và chị Makura dẫn đi."

# monologue
# JP: ああ、そういえば、\nあのとき、確か、汰斗さんに――
3113 = "A, mà nhắc mới nhớ,\\nlúc đó, hình như, anh Taito đã--"

# 【双鉄】
# display as 雙鐵
# JP: 「そら、見てみろハチロク」
2229 = "「Này, nhìn xem Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
2308 = "「Kya!?」"

# monologue
# JP: ハチロクの脇に手をいれて、\n見やすいように高く掲げる。
3225 = "Anh luồn tay vào dưới nách Hachiroku,\\nrồi nhấc bổng cô bé lên cao để nhìn cho rõ."

# 【双鉄】
# display as 雙鐵
# JP: 「入り口の門の屋根の付け根――\n丁度、角になってるあたりだ」
2235 = "「Chỗ chân mái của cổng vào ấy--\\nNgay chỗ tạo thành góc ấy.」"

# monologue
# JP: 見つけた途端、ハチロクの目が丸くなる。
3046 = "Ngay khi tìm thấy, đôi mắt Hachiroku tròn xoe."

# monologue
# JP: 無理もない。\n神社の門にこんなもの、誰もあるとは思わんだろう。
2987 = "Cũng phải thôi.\\nChắc chẳng ai ngờ trên cổng đền lại có thứ như thế này."

# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんですかこれは――\nあ！　神様の、お顔？」
2331 = "「Chà, cái gì đây ạ--\\nA! Là... khuôn mặt của thần linh sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、鬼の顔らしい。\n“[きめん,1]鬼面づくり”と呼ばれるそうだ」
2193 = "「Không, hình như là mặt quỷ đấy.\\nNghe nói nó được gọi là “Onimen-zukuri”.」"

# 【ハチロク】
# display as 八六
# JP: 「神社に鬼の面ですか？\nどうして、そんな」
2399 = "「Mặt nạ quỷ ở đền thờ ạ?\\nTại sao lại có thứ như vậy chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは誰にもわからんらしい。\n[ひのもと,2]日ノ本中でも、ほとんど見ないものだと聞いた」
2280 = "「Hình như không ai biết lý do cả.\\nAnh nghe nói đó là thứ cực kỳ hiếm gặp, kể cả trên toàn cõi Hinomoto.」"

# 【ハチロク】
# display as 八六
# JP: 「門の中に、\n鬼が、封じられているのでしょうか？」
2690 = "「Bên trong cánh cổng...\\nliệu có một con quỷ đang bị phong ấn không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。\nこの近くには、幽霊寺という寺もある」
2588 = "「Có lẽ vậy.\\nGần đây còn có một ngôi chùa tên là Chùa Ma nữa.」"

# monologue
# JP: 言えばふうっと、ハチロクの声と視線が落ちる。
3403 = "Vừa dứt lời, giọng nói và ánh mắt của Hachiroku chợt chùng xuống."

# 【ハチロク】
# display as 八六
# JP: 「鬼に、幽霊。\n御一夜は、意外と恐ろしい土地なのですね」
2813 = "「Quỷ, rồi lại ma.\\nThị trấn Ohitoyo này, không ngờ lại là một nơi đáng sợ đến vậy nhỉ.」"

# monologue
# JP: ハチロクの声音と表情に、少し意外なものを感じる。
3213 = "Tôi cảm thấy có gì đó hơi bất ngờ trong giọng điệu và vẻ mặt của Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、幽霊だの鬼だのを――」
1863 = "「Một \\x%lRailord;#00ffc040;Railord%l;#; mà lại đi sợ ma quỷ――」"

# monologue
# JP: 失言だ。\n言うより先に、深く考えておけばよかった。
3139 = "Lỡ lời rồi.\\nLẽ ra mình nên suy nghĩ kỹ hơn trước khi nói."

# monologue
# JP: 『ハチロクは事故を起こしている』\n……その意味ならば、僕も知っている筈だというのに。
1840 = "『Hachiroku đã từng gây ra tai nạn』\\n...Nếu ý là vậy, thì lẽ ra tôi cũng phải biết chứ."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2804 = "「Soutetsu-sama?」"

# monologue
# JP: 僕の心を知ってか知らずかハチロクは穏やかに首を傾げる。\n――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で無くてよかった。
3032 = "Chẳng biết có hay lòng tôi, Hachiroku chỉ dịu dàng nghiêng đầu.\\n――Thật may vì cô ấy không phải là \\x%lRailord;#00ffc040;Railord%l;#;."

# monologue
# JP: もし“\x%l共感;#00ffc040;共感%l;#;”などがあったら、\nお互いに、どうしようも無く傷ついた。
3180 = "Nếu có thứ như “\\x%lĐồng cảm;#00ffc040;Đồng cảm%l;#;”, \\ncả hai hẳn đã làm tổn thương nhau đến mức không thể cứu vãn."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――」
2475 = "「Anh――」"

# monologue
# JP: だけれど僕は人間だ。伝えたことしか伝えられない。\n伝えきれないことすらもある。
3302 = "Nhưng tôi là con người. Chỉ có thể truyền đạt những gì mình nói ra.\\nThậm chí có cả những điều không tài nào diễn tả hết được."

# monologue
# JP: だから、言う。\n誤魔化しではなく、自分の本当を。
3234 = "Thế nên, tôi sẽ nói ra.\\nKhông phải là lời lấp liếm, mà là sự thật lòng mình."

# 【双鉄】
# display as 雙鐵
# JP: 「幽霊も鬼も恐れはしない。\n現実は常に、そうしたものを駆逐するから」
2479 = "「Tôi không sợ ma quỷ.\\nBởi vì thực tại sẽ luôn xua tan những thứ đó.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様は――」
2784 = "「Vậy thì, ngài Soutetsu――」"

# monologue
# JP: ハチロクが言う。\n僕の言葉を、受けとめてその上問うてくる。
3052 = "Hachiroku nói.\\nEm ấy tiếp nhận lời tôi, rồi hỏi ngược lại."

# 【ハチロク】
# display as 八六
# JP: 「現実こそを、\nもっとも恐れていらっしゃるのですか？」
2626 = "「Phải chăng chính thực tại,\\nlà thứ mà ngài sợ hãi nhất sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どう……だろうな」
2477 = "「Không biết... nữa.」"

# monologue
# JP: 答えきれない。自分自身でも分からない。
3226 = "Tôi không thể trả lời dứt khoát. Chính bản thân tôi cũng không rõ."

# monologue
# JP: 恐れるほどに、現実と――\n僕は果たして。
3224 = "Đến mức phải sợ hãi, thực tại và――\\nLiệu tôi có thật sự."

# 【稀咲】
# display as ？？？
# JP: 「まったく！　まるでお話にならないじゃないか。\nどうかしてる。少し考えればわかることだろうに」
2647 = "「Thiệt tình! Hoàn toàn không thể nói chuyện được mà.\\nBị làm sao vậy. Chỉ cần suy nghĩ một chút là hiểu ra ngay thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「待ってください、[きさき,1]稀咲先輩！」
2704 = "「Xin hãy đợi đã, chị Kisaki!」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
# 2334 = "「哎呀」" 

# monologue
# JP: ハチロクが僕の顔を見る。\n日々姫の声だ。
3045 = "Hachiroku nhìn mặt tôi.\\nLà giọng của Hibiki."

# monologue
# JP: 境内の奥、本社の方から、\n足音とともに近づいてくる。
3169 = "Từ sâu bên trong khuôn viên, phía chánh điện,\\ntiếng bước chân đang tiến lại gần."

# 【稀咲】
# display as ？？？
# JP: 「『損得の話じゃない』なんてまるきり妄言じゃないか。\n得がなければ、この神社だって維持できまい――っ！」
2209 = "「Cái gì mà 'Đây không phải là chuyện được mất' chứ, hoàn toàn là lời nói viển vông!\\nNếu không có lợi ích, thì ngôi đền này cũng chẳng thể duy trì được đâu――!」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1873 = "「…………」"

# monologue
# JP: すごい勢いで歩いてきたのは、制服姿の学園生だ。
3191 = "Người đang bước tới một cách hùng hổ là một học sinh trong bộ đồng phục."

# monologue
# JP: 僕らに気付き、気まずそうな顔をするので、\n道を譲って、ほんのすこしだけ会釈する。
3164 = "Khi nhận ra chúng tôi, cô ấy lộ vẻ khó xử, nên tôi\\nnhường đường và chỉ khẽ cúi đầu chào."

# 【日々姫】
# display as 日日姬
# JP: 「もう、待ってくださいっていってるじゃ――\nって、にぃにぃ！！？」
2648 = "Em đã bảo là đợi đã mà--\nKhoan, Anh hai!!?"

# 【稀咲】
# display as ？？？
# JP: 「にぃにぃ？」
2795 = "Anh hai?"

# 【日々姫】
# display as 日日姬
# JP: 「じゃなくてっ！　んんっ――\n『奇遇ですね兄さん。こんなところでお会いするとは』」
2187 = "À không! Hừm--\n“Thật là trùng hợp, Anh. Không ngờ lại gặp anh ở một nơi như thế này.”"

# 【双鉄】
# display as 雙鐵
# JP: 「全くだな。ここで会えるとは思わなかった」
2437 = "Đúng là vậy. Anh không ngờ lại gặp em ở đây."

# monologue
# JP: 日々姫の声が、完全に他所行きのものになっている。
3245 = "Giọng của Hibihime đã hoàn toàn chuyển sang tông khách sáo."

# monologue
# JP: この学園生の前では、きっと、\n良いところを見せておきたいのだろう。
3141 = "Trước mặt cô bạn học này, chắc hẳn,\nem ấy muốn thể hiện mặt tốt của mình."

# 【稀咲】
# display as ？？？
# JP: 「日々姫さんのお兄さん？\nなら、ボクに自己紹介させてください」
2472 = "Anh là anh trai của chị Hibihime ạ?\nVậy thì, cho phép em được tự giới thiệu."

# monologue
# JP: 優雅に一礼。
3026 = "Cô bé cúi chào một cách tao nhã."

# monologue
# JP: こちらに向かって猛進していたトゲトゲ感を、\n綺麗さっぱり消しさっている。
3083 = "Cái vẻ gai góc khi lao sầm sập về phía này,\nđã hoàn toàn biến mất không một dấu vết."

# 【稀咲】
# display as 稀咲
# JP: 「はじめまして。ボクは[ほうしょうきさき,3]宝生稀咲。\n学園では、日々姫さんとは同じクラブに所属してます」
2252 = "Rất vui được gặp anh. Em là Houshou Kisaki.\nỞ trường, em và chị Hibihime cùng sinh hoạt trong một câu lạc bộ."

# 【双鉄】
# display as 雙鐵
# JP: 「ご丁寧な自己紹介をありがとう。僕は右田双鉄。\n縁あって、日々姫の兄になったものだ」
2707 = "Cảm ơn em đã giới thiệu rất lịch sự. Anh là Migita Soutetsu.\nDo một chữ duyên, anh đã trở thành anh trai của Hibihime."

# 【稀咲】
# display as 稀咲
# JP: 「縁あって？\nふふ、随分と変わった物言いですね」
2595 = "Do một chữ duyên ạ?\nHi hi, cách nói của anh thật là lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「そうかな」
# 2571 = "「是嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「それじゃあ、その子も？\n縁あってのお連れさんなんですか？」
2739 = "Vậy thì, cô bé kia cũng vậy sao?\nCũng là người đi cùng anh do một chữ duyên ạ?"

# monologue
# JP: 僕の傍らのハチロクを見て、\n稀咲なる少女は興味深げに笑ってみせる。
3108 = "Nhìn Hachiroku đang đứng cạnh tôi,\ncô gái tên Kisaki mỉm cười đầy hứng thú."

# 【稀咲】
# display as 稀咲
# JP: 「綺麗な子ですね。\nこれほど見事な黒髪は、初めて見るかもしれないな」
2638 = "Là một cô bé xinh đẹp nhỉ.\nMái tóc đen tuyệt đẹp thế này, có lẽ đây là lần đầu em được thấy đó."

# 【ハチロク】
# display as 八六
# JP: 「お褒めいただき、光栄ですわ、稀咲様」
2539 = "「Được ngài Kisaki khen ngợi, thật là vinh hạnh cho tôi ạ.」"

# monologue
# JP: ハチロクの優美な一礼に、\n稀咲も軽い一礼を返す。
3037 = "Đáp lại cái cúi chào duyên dáng của Hachiroku,\\nKisaki cũng khẽ cúi đầu chào lại."

# monologue
# JP: 軽やかながら洗練された――\nそんな言葉が脳裏に浮かぶ、美しい礼を。
3434 = "Nhẹ nhàng mà lại tinh tế――\\nMột cái cúi chào đẹp đẽ, khiến những từ ngữ ấy chợt hiện lên trong tâm trí."

# 【稀咲】
# display as 稀咲
# JP: 「その上、礼儀もしっかりしてる。\nはじめまして、お嬢さん。お名前は？」
2185 = "「Hơn nữa, lễ nghi cũng rất chuẩn mực.\\nRất vui được gặp em, tiểu thư. Tên em là gì?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、縁あって双鉄様のお世話になっております、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のハチロク、ともうします」
2497 = "「Tôi là Hachiroku, một \\x%lレイルロオド;#00ffc040;Railord%l;#;, người may mắn có duyên được chăm sóc cho ngài Soutetsu ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ああ、[ゆのい,1]湯医線のれいなみたいな」
1862 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;―― À, giống như Reina ở tuyến Yui nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「れいなさんとは、いわば姉妹のようなものです。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;同士ですから」
2518 = "「Có thể nói tôi và cô Reina như chị em vậy ạ.\\nBởi vì chúng tôi đều là \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうなのか、なるほどね」
2583 = "「Vậy à, ra là thế.」"

# monologue
# JP: 軽く浮きかけた驚きを、\n稀咲はすぐに収めてまじまじ、ハチロクを改めて眺め回す。
3322 = "Nhanh chóng nén lại sự ngạc nhiên vừa thoáng qua,\\nKisaki lại một lần nữa nhìn Hachiroku chăm chú từ đầu đến chân."

# 【稀咲】
# display as 稀咲
# JP: 「キミはれいなよりクラシカルだね。\nそれに全体が、とても上等に作られているようだ」
2223 = "「Trông em cổ điển hơn Reina nhỉ.\\nHơn nữa, có vẻ như toàn bộ cơ thể em đều được chế tác rất cao cấp.」"

# 【ハチロク】
# display as 八六
# JP: 「実際、そう作っていただきました。\nわたくしは、\x%l8620;#00ffc040;8620%l;#;形トップナンバーの専用機ですから」
2516 = "「Thực tế đúng là tôi đã được chế tạo như vậy ạ.\\nBởi vì tôi là cỗ máy chuyên dụng cho đầu máy số một của dòng \\x%l8620;#00ffc040;8620%l;#;.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
2338 = "「Hửm?」"

# monologue
# JP: 納得したように頷いて、\n稀咲はくるっと、背後の日々姫へ視線を移す。
3320 = "Gật đầu như đã hiểu,\\nKisaki nhanh chóng quay lại, chuyển ánh mắt sang Hibiki đang ở phía sau."

# 【稀咲】
# display as 稀咲
# JP: 「それにしても日々姫。随分と冷たいじゃないか。\nあのお兄さんが帰ってきてると教えてくれないなんて」
2191 = "「Mà này Hibiki. Em lạnh lùng quá đấy nhé.\\nAnh trai kia đã trở về mà em lại chẳng nói cho chị một lời.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは、ええと――事情が」
2729 = "「Cái đó, ừm thì――có chút chuyện khó nói ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「“あのお兄さん”？」
1868 = "「“Anh trai đó” sao?」"

# monologue
# JP: それこそ、変わった物言いだ。\n“あの”などと、まるで以前から知ってたような――
3430 = "Đúng là một cách nói lạ lùng.\\nCứ như thể đã biết mình từ trước khi dùng từ “đó”――"

# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして、日々姫から聞いていたのか？\n僕の話を」
2805 = "「Chẳng lẽ, chị đã nghe từ Hibiki sao?\\nChuyện về tôi ấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ぴゃわっ！？　ちょっ！　にぃにっ」
2307 = "「Pyawa!? Ch-chờ đã! Anh hai!」"

# 【稀咲】
# display as 稀咲
# JP: 「それはもう。\n部活のある日は、いつも何らかの形でね」
2766 = "「Đương nhiên rồi.\\nVào những ngày có hoạt động câu lạc bộ, lúc nào em ấy cũng nhắc tới cậu bằng cách này hay cách khác.」"

# 【日々姫】
# display as 日日姬
# JP: 「きっ、きっ、きさっ、センパっ」
2661 = "「K-K-Kisa... Tiền bối!」"

# 【稀咲】
# display as 稀咲
# JP: 「帝大生ということも、家業をお手伝いされてることも\n――と、そうだ」
2264 = "「Cả chuyện cậu là sinh viên Đại học Đế quốc, lẫn chuyện cậu đang phụ giúp việc nhà\\n――À, phải rồi.」"

# monologue
# JP: 稀咲が不意に、胸の内ポケットに手を入れる。
3326 = "Kisaki đột nhiên đưa tay vào túi áo trong ngực."

# monologue
# JP: 稀咲が不意に、鞄へと手を差し入れる。
3325 = "Kisaki đột nhiên đưa tay vào trong cặp."

# monologue
# JP: 慣れた手つきで取り出した名刺入れから、\n流れるように、一枚の名刺を僕へと差し出す。
3153 = "Từ chiếc hộp danh thiếp được lấy ra bằng một động tác thuần thục,\\ncô ấy liền mạch đưa cho tôi một tấm danh thiếp."

# 【稀咲】
# display as 稀咲
# JP: 「あらためまして。これを機会にご親交を。\nボク、宝生稀咲は、銀行づとめをしているもので」
2241 = "「Xin được chính thức giới thiệu lại. Mong rằng đây sẽ là cơ hội để chúng ta thân thiết hơn.\\nTôi, Houshou Kisaki, hiện đang làm việc tại ngân hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「銀行づとめ」
2786 = "「Làm việc tại ngân hàng.」"

# monologue
# JP: 御一夜に銀行といえば、ひとつしかない。
3404 = "Nếu nói đến ngân hàng ở Ohitoyo thì chỉ có một mà thôi."

# monologue
# JP: 念のため、名刺を受け取り仔細に見れば、そこにはやはり、\n『隈元銀行　御一夜支店長』の文字列――っ！？
2995 = "Để chắc chắn, tôi nhận lấy danh thiếp và nhìn kỹ, quả nhiên trên đó là dòng chữ,\\n『Ngân hàng Kumamoto - Chi nhánh trưởng Ohitoyo』――Hả!?"

# 【双鉄】
# display as 雙鐵
# JP: 「支店長。\nその若さ――学園生で支店長、とは」
2546 = "「Chi nhánh trưởng.\\nCòn trẻ như vậy――vẫn còn là học sinh mà đã là chi nhánh trưởng...」"

# 【稀咲】
# display as 稀咲
# JP: 「おや」
# 2334 = "「哎呀」" 

# monologue
# JP: 僕が驚いてしまったことに驚いた――\nそんな感じの、どこかいたずらっぽい微笑。
3166 = "Cô ấy ngạc nhiên vì tôi đã ngạc nhiên――\\nMột nụ cười có phần tinh nghịch, như thể đang trêu chọc tôi."

# 【稀咲】
# display as 稀咲
# JP: 「帝都あたりだと、ワーキング・スタディ制度の活用は、\n活発なものと聞いていますが？」
2543 = "「Tôi nghe nói ở quanh Đế Đô, việc áp dụng chế độ Vừa học vừa làm\\nrất là sôi nổi, phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――それはもちろん。いやそういう点で、\n御一夜を田舎扱いして驚いたのではなくて」
2352 = "「À――đúng là vậy. Không, tôi ngạc nhiên không phải vì xem Ohitoyo là một vùng quê\\nở phương diện đó đâu.」"

# monologue
# JP: ワーキング・スタディ。主として都市部を中心に、\n近年急速に広まった、日ノ本の新・教育制度。
3183 = "Vừa học vừa làm. Một chế độ giáo dục mới của Hinomoto, chủ yếu tập trung ở các khu vực thành thị\\nvà đã lan rộng nhanh chóng trong những năm gần đây."

# monologue
# JP: 端的にいえば、天職・適職と認められた職務における\n労働時間を、そのまま単位に充当できるといった制度だ。
3343 = "Nói một cách đơn giản, đó là một chế độ cho phép quy đổi thẳng thời gian lao động\\ntrong các công việc được công nhận là thiên chức hoặc phù hợp với bản thân thành tín chỉ học tập."

# 【双鉄】
# display as 雙鐵
# JP: 「学園生兼銀行員なら、驚きもしなかったろうが――\n支店長となるとやはり、そうあることではなかろう」
2686 = "「Nếu là một học sinh kiêm nhân viên ngân hàng thì tôi đã chẳng ngạc nhiên――\\nnhưng là một chi nhánh trưởng thì quả thật, chuyện đó không thường thấy đâu nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「それは、そうです。隈元銀行の全支店を通じても、\n学園生の支店長は、ボクひとりだけですね」
2657 = "「Vâng, đúng là vậy. Trong tất cả các chi nhánh của Ngân hàng Kumamoto,\\nchi nhánh trưởng còn là học sinh thì chỉ có một mình tôi thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな――\nいやっ」
2502 = "「Đúng vậy nhỉ――\\nKhoan đã」"

# monologue
# JP: 頷いて――その瞬間にそうかと気付く。\n『隈元銀行御一夜支店』の、支店長。
3129 = "Tôi gật đầu――và ngay khoảnh khắc đó, tôi nhận ra.\\nChi nhánh trưởng của 『Ngân hàng Kumamoto chi nhánh Ohitoyo』."

# monologue
# JP: で、あるのなら。\nこの銀髪の少女こそが――
3176 = "Nếu vậy thì.\\nCô gái tóc bạc này chính là――"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――キミが\n工場誘致賛成派の中核なのか？」
2775 = "「Vậy thì――cô chính là\\nnhân vật trung tâm của phe ủng hộ mời gọi nhà máy sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「工場誘致のお話ですか？\nええと……日々姫さんのお兄さんは――」
2449 = "「Anh đang nói về chuyện mời gọi nhà máy ạ?\\nỪm... Anh trai của Hibiki-san là――」"

# 【双鉄】
# display as 雙鐵
# JP: 「工場誘致を撤回させようと御一夜に戻ってきた者だ。\nせっかくなので、少し話をさせてもらえるかな？」
2510 = "「Tôi là người trở về Ohitoyo để hủy bỏ kế hoạch mời gọi nhà máy.\\nNhân tiện đây, tôi có thể nói chuyện với cô một chút được không?」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、だから」
2339 = "「À, ra là vậy.」"

# monologue
# JP: 稀咲が日々姫をちら、と見る。
3331 = "Kisaki liếc nhìn Hibiki."

# monologue
# JP: なるほど、『だから』、\n日々姫は稀咲に、僕の帰還を伝えなかったのか。
3090 = "Ra là vậy, 'thế nên' là...\\nHibihime đã không báo cho Kisaki biết chuyện tôi trở về."

# 【稀咲】
# display as 稀咲
# JP: 「ごめんなさい、お兄さん。\nボクも、じっくりお話をしたいのは山々なのだけれど」
2424 = "「Xin lỗi anh nhé.\\nTôi cũng rất muốn được nói chuyện lâu hơn, nhưng mà...」"

# monologue
# JP: 夏服の、むき出しの手首にはまる時計を、\n稀咲の視線がサラリと撫ぜる。
3329 = "Ánh mắt Kisaki lướt nhẹ qua chiếc đồng hồ trên cổ tay trần của cô, không bị tay áo mùa hè che khuất."

# 【稀咲】
# display as 稀咲
# JP: 「つい先程、実りの無い議論に時間を使ってしまってね。\nこの後は、いろいろ予定が立て込んでいるんだ」
2488 = "「Mới vừa rồi, tôi đã lỡ tốn thời gian vào một cuộc tranh luận vô ích.\\nSau đây lịch trình của tôi lại khá dày đặc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。君の都合も考えず唐突に。\n申し訳なかった」
2584 = "「Vậy à. Tôi đã đến đường đột mà không nghĩ đến lịch trình của cô.\\nThật xin lỗi.」"

# 【稀咲】
# display as 稀咲
# JP: 「いやいや、こちらこそお断りしてしまって。\nけど、“せっかくなので”という気持ちはボクにもある」
2181 = "「Không không, tôi mới là người phải xin lỗi vì đã từ chối.\\nNhưng tôi cũng hiểu cảm giác “đã cất công đến rồi thì...”」"

# monologue
# JP: 名刺入れをしまったその手で、今度は手帳が取り出される。
3155 = "Bằng bàn tay vừa cất hộp danh thiếp đi, cô lại rút ra một cuốn sổ tay."

# 【稀咲】
# display as 稀咲
# JP: 「夏休み期間だったら、朝方の時間帯は比較的自由だから。\n日をあらためて、アポイントメントを取ってくれれば」
2683 = "「Nếu là trong kỳ nghỉ hè thì buổi sáng tôi tương đối rảnh.\\nAnh cứ chọn ngày khác rồi đặt lịch hẹn trước là được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば、後日あらためてよろしく頼む」
2377 = "「Ừm. Vậy thì, hôm khác xin lại làm phiền cô.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。立場は正反対みたいだけれども」
2569 = "「Phải nhỉ. Dù lập trường của chúng ta có vẻ hoàn toàn đối lập.」"

# monologue
# JP: すっと、右手が差し出される。\n稀咲と短い握手をかわす。
3333 = "Một bàn tay phải nhẹ nhàng đưa ra.\\nTôi và Kisaki trao nhau một cái bắt tay ngắn gọn."

# 【稀咲】
# display as 稀咲
# JP: 「そのときには」
2548 = "「Đến lúc đó...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのときには」
2382 = "「Ừ, đến lúc đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、稀咲センパイっ！？」
2363 = "「A, chị Kisaki!?」"

# monologue
# JP: さっと立ち去る稀咲のあとを、慌てた顔で日々姫が追う。\n追いながら、一度ふりむき、あかんべぇ。
3334 = "Hibihime hốt hoảng đuổi theo Kisaki đang vội vã rời đi.\\nVừa đuổi theo, cô bé vừa quay lại một lần rồi lè lưỡi trêu."

# monologue
# JP: ……何故だ？\n特段日々姫を怒らせたつもりもないのだが。
1856 = "…Tại sao vậy nhỉ?\\nMình cũng đâu có cố tình làm Hibiki nổi giận đâu."

# 【ハチロク】
# display as 八六
# JP: 「……あの方が、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派の総大将なのですか？」
1884 = "「…Vị đó là…\\n\\x%lAir Kura;#00ffc040;Air Kura%l;#;… tổng chỉ huy của phe ủng hộ mời gọi nhà máy sao ạ?」"

# monologue
# JP: 稀咲と日々姫の姿が消えるのをゆっくりと待ち、\nハチロクが静かに問いかけてくる。
3049 = "Chờ cho bóng dáng của Kisaki và Hibiki khuất hẳn,\\nHachiroku mới lặng lẽ cất tiếng hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「総大将でなければ、怖いな。\nあの上に、さらに人物がいることになる」
2682 = "「Nếu cô ta không phải tổng chỉ huy thì còn đáng sợ hơn.\\nBởi vậy nghĩa là trên cô ta vẫn còn người khác nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1873 = "「…………」" 

# monologue
# JP: あいまいな笑みを浮かべて、ハチロクは何も答えない。\nならば、ハチロクもわかっているのだ。
3039 = "Nở một nụ cười mơ hồ, Hachiroku không đáp lại gì cả.\\nVậy là, Hachiroku cũng đã hiểu ra rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、\nああも見事に自分の未熟を思い知らされるとはな」
2602 = "「Không ngờ là…\\nmình lại được cho thấy sự non nớt của bản thân một cách ngoạn mục đến thế này.」"

# monologue
# JP: あそこで、議論を交わしてしまえば、\n日々姫にはもう、立つ瀬がなかった。
3379 = "Nếu lúc đó mà đôi bên tranh luận với nhau,\\nthì Hibiki đã chẳng còn chỗ đứng nữa rồi."

# monologue
# JP: それを理解し、先送りを提案することで鮮やかに、\n稀咲は日々姫と、僕の立場とを重んじたのだ。
3328 = "Hiểu được điều đó, bằng việc khéo léo đề nghị hoãn lại,\\nKisaki đã tôn trọng lập trường của cả Hibiki và tôi."

# 【ハチロク】
# display as 八六
# JP: 「未熟であれば、熟成させれば良いだけのこと」
2551 = "「Nếu còn non nớt, thì chỉ cần tôi luyện cho trưởng thành là được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2814 = "「！」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、教えてくださったことですよ？」
2731 = "「Đó là điều mà ngài Soutetsu đã dạy cho em mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだな。そうだった」
2349 = "「À… đúng vậy. Phải rồi.」"

# monologue
# JP: この半日で、ひといきに、\nさまざまな人と立場とに触れ、いささか混乱したようだ。
3125 = "Chỉ trong nửa ngày, liên tiếp tiếp xúc với\\nbiết bao nhiêu người và lập trường khác nhau, dường như tôi đã có chút bối rối."

# monologue
# JP: 僕は、どこまでいっても僕でしかない。\n自分の信じるやり方で、ダメなら修正していけばいい。
3300 = "Tôi, dù có thế nào, vẫn chỉ là tôi mà thôi.\\nCứ làm theo cách mình tin tưởng, nếu không được thì sửa đổi là được."

# 【双鉄】
# display as 雙鐵
# JP: 「よし、行くぞハチロク。仕切り直しだ」
2416 = "「Được rồi, đi thôi Hachiroku. Làm lại từ đầu nào.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。お供します、双鉄様」
2556 = "「Vâng. Em sẽ theo ngài, thưa ngài Soutetsu.」"

# monologue
# JP: 玉石を踏み、まっすぐ進む。
3230 = "Tôi bước trên con đường sỏi đá, thẳng tiến về phía trước."

# monologue
# JP: ふかみが僕に教えてくれた、旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の元職員――\n赤井神社の宮司に会うため。
3092 = "Để gặp cựu nhân viên của \\x%lĐường sắt Hoàng gia;#00ffc040;Đường sắt Hoàng gia%l;#; cũ mà Fukami đã giới thiệu――\\nvị trưởng đền của Đền Akai."
