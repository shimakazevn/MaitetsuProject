[script]
# lines: 417 
# 【れいな】
# display as 玲奈
# JP: 「本当に――本当にごめんなさいでした」
1836 = "「Thực sự——thực sự em xin lỗi ạ.」"
# monologue
# JP: レールショップに着くやいなやで、\nれいなに頭を下げられる。
2393 = "Ngay khi vừa đến cửa hàng đường sắt, Reina đã cúi đầu xin lỗi."
# monologue
# JP: 一生懸命――そんな言葉しか浮かんでこない、\n不器用で誠実な一礼だ。
2443 = "Cố gắng hết sức——chỉ có từ đó mới hiện lên trong đầu, một cái cúi chào vụng về nhưng đầy chân thành."
# 【双鉄】
# display as 雙鐵
# JP: 「気に病むな。れいなの機能面のことは、\nれいな自身にもどうにもできんことなのだから」
1491 = "「Đừng bận tâm. Vấn đề về chức năng của Reina, chính bản thân Reina cũng chẳng thể làm gì được mà.」"
# monologue
# JP: 出力アップ改造にともなう、安定性の低下。\nそのため発生してしまう居眠り。
2446 = "Việc nâng cấp công suất kéo theo sự suy giảm về độ ổn định. Do đó mới dẫn đến việc ngủ gật."
# monologue
# JP: それは全て、いうなればれいなにとっては、\n「押し付けられた負担」でしかないはずだ。
2666 = "Tất cả những điều đó, nói cách khác đối với Reina, chắc chắn chỉ là \"gánh nặng bị ép buộc\" mà thôi."
# 【れいな】
# display as 玲奈
# JP: 「けど、そうてつさんと、ハチロクさんがいなかったら、\nれいな……」
1523 = "「Nhưng mà, nếu không có anh Soutetsu và chị Hachiroku, Reina……」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕らはいた。事故は最低限のもので済んだ。\n逆に僕らがいなければ事故は発生しなかったかもしれん」
1463 = "「Nhưng mà, chúng tôi đã ở đó. Tai nạn đã được hạn chế ở mức tối thiểu. Ngược lại, nếu không có chúng tôi thì có khi tai nạn đã chẳng xảy ra.」"
# 【れいな】
# display as 玲奈
# JP: 「そんなこと」
1643 = "「Làm gì có chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるかもしれんのだ。凪の修行熱に火をつけたのは、\nほかならぬ僕だったという話だしな」
1838 = "「Cũng có thể lắm chứ. Người đã châm ngòi cho ngọn lửa tu hành của Nagi, không ai khác chính là anh mà.」"
# 【れいな】
# display as 玲奈
# JP: 「…………」
1116 = "「…………」"
# monologue
# JP: 納得している顔ではない。
2321 = "Khuôn mặt không có vẻ gì là đồng tình."
# monologue
# JP: が、僕の言葉を否定するなら、\n凪の責任を問うことになると、恐らくれいなも理解する。
2207 = "Nhưng mà, nếu phủ nhận lời tôi nói, thì đồng nghĩa với việc truy cứu trách nhiệm của Nagi, có lẽ Reina cũng hiểu điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「あるいはこうとも考えられる。\n『この事故が起きなければ、後に大事故が起きていた』」
1965 = "「Hoặc là cũng có thể nghĩ thế này. 『Nếu vụ tai nạn này không xảy ra, thì sau này sẽ có một tai nạn lớn hơn xảy ra』.」"
# 【れいな】
# display as 玲奈
# JP: 「あっ！」
1540 = "「A!」"
# monologue
# JP: こく、こく、こく。\nれいなが何度も何度も頷く。
2549 = "Gật, gật, gật.\nReina gật đầu hết lần này đến lần khác."
# monologue
# JP: あの後、緊急で行われた\x%l保線;#00ffc040;保線%l;#;点検――\nそれで出てきた問題点は、優に二千を超えたのだから。
2297 = "Sau đó, cuộc kiểm tra \\x%l保線;#00ffc040;bảo trì đường ray%l;#; khẩn cấp đã được tiến hành—— Và những vấn đề được phát hiện qua đó, đã vượt qua con số hai nghìn."
# 【双鉄】
# display as 雙鐵
# JP: 「このタイミングで、警告に近い形の事故を経験できた。\nこれはむしろ、本当に幸運なことだと僕は考える」
1586 = "「Việc trải qua một tai nạn mang tính chất cảnh báo vào thời điểm này. Tôi nghĩ đây ngược lại lại là một điều thực sự may mắn.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおっしゃるとおりかと思います」
1650 = "「Em nghĩ đúng như những gì ngài Soutetsu nói ạ.」"
# monologue
# JP: しかつめらしく、ハチロクも同意の声を重ねる。
2221 = "Hachiroku cũng lên tiếng đồng tình với vẻ mặt nghiêm trang."
# 【ハチロク】
# display as 八六
# JP: 「もし、観光が盛りあがってからの事故でしたら、\n被害も、影響も、致命的なものとなったかもしれません」
1877 = "「Nếu tai nạn xảy ra sau khi du lịch đã phát triển, thì cả thiệt hại lẫn ảnh hưởng, có lẽ sẽ mang tính chí mạng.」"
# monologue
# JP: またこっくりと、\nれいなは、さきほどより更に強く頷く。
2547 = "Reina lại gật đầu một cái, lần này còn mạnh hơn lúc nãy."
# monologue
# JP: ポーレットは曖昧な表情のまま、それでも小さく頷いて、\n日々姫は動かず……難しい顔をし続けている。
2507 = "Paulette vẫn giữ vẻ mặt khó hiểu, nhưng cũng khẽ gật đầu, Hibiki thì không nhúc nhích…… tiếp tục giữ khuôn mặt đăm chiêu."
# 【双鉄】
# display as 雙鐵
# JP: 「今は、それが許される状況だ。悪いところは直せばいい。\n責任をもし感じるのなら――改善をもって果たせばいい」
1870 = "「Bây giờ, tình hình vẫn cho phép điều đó. Chỗ nào hỏng thì sửa là được. Nếu cảm thấy có trách nhiệm——thì hãy bù đắp bằng cách cải thiện nó.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、そうてつさん、ハチロクさん。\nれいな、わかりましたぁ！」
1752 = "「Vâng ạ, anh Soutetsu, chị Hachiroku. Reina, hiểu rồi ạ!」"
# monologue
# JP: 明るい返事だ。\nれいなは切り替え、どうやら前を向けたらしい。
2161 = "Một câu trả lời tươi sáng. Reina đã thay đổi tâm trạng, có vẻ như em ấy đã có thể hướng về phía trước."
# monologue
# JP: が……ポーレットは――どうにも冴えぬ表情のまま、\nのろのろ、鞄から書類を取り出す。
2204 = "Nhưng mà…… Paulette thì——vẫn giữ vẻ mặt ủ rũ, chậm chạp lấy tài liệu ra khỏi cặp."
# 【ポーレット】
# display as 波萊特
# JP: 「……これ、\x%l保線;#00ffc040;保線%l;#;の……\nこれで……最低限の見積もりです」
1134 = "「……Đây là, của \\x%l保線;#00ffc040;bảo trì đường ray%l;#;…… Đây là…… bản dự toán ở mức tối thiểu.」"
# monologue
# JP: 手にも声にも、力が無い。\n引きずられぬよう、ハキハキ答える。
2540 = "Cả bàn tay và giọng nói đều không có chút sức lực nào. Để không bị kéo theo tâm trạng đó, tôi đáp lại một cách dõng dạc."
# 【双鉄】
# display as 雙鐵
# JP: 「この短期間で、良く出してくれたな」
1858 = "「Trong thời gian ngắn như vậy mà cô đã đưa ra được bản dự toán này, làm tốt lắm.」"
# monologue
# JP: A4数枚の見積もりを受け取る。\n要整備とされた項目数に、まずまっさきに圧倒される。
2413 = "Tôi nhận lấy vài tờ dự toán khổ A4. Số lượng các hạng mục cần bảo dưỡng, ngay lập tức khiến tôi choáng ngợp."
# monologue
# JP: 本線および引き込み線、\x%l枕木;#00ffc040;枕木%l;#;や\x%lバラスト;#00ffc040;バラスト%l;#;はもちろんのこと\n障害物除去、\x%lポイント;#00ffc040;ポイント%l;#;や信号の整備等、数えきれない程だ。
2356 = "Tuyến chính và tuyến nhánh, \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; và \\x%lバラスト;#00ffc040;đá ba-lát%l;#; thì khỏi phải nói, dọn dẹp chướng ngại vật, bảo dưỡng \\x%lポイント;#00ffc040;công tắc%l;#; và tín hiệu, v.v., nhiều không đếm xuể."
# 【双鉄】
# display as 雙鐵
# JP: 「む？\nこの、『湯医駅[さんかくせん,2]三角線新造』とはなんだ？」
1571 = "「Hửm? Cái 'Xây mới \\x%l三角線;#00ffc040;đường tam giác%l;#; ga Yui' này là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……\nキハ[レイナナ,1]07は、\x%l運転台;#00ffc040;運転台%l;#;がどちらの面にもついてますよね？」
1957 = "「À ừm…… KiHa 07 thì, có \\x%l運転台;#00ffc040;buồng lái%l;#; ở cả hai mặt đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1535 = "「Ừm.」"
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;は、真横から見れば左右対称――\n左側の先端にも、右側の先端にも、\x%l運転台;#00ffc040;運転台%l;#;がついている。
2328 = "\\x%lキハ07;#00ffc040;KiHa 07%l;#; nhìn từ bên hông thì đối xứng hai bên—— Cả đầu bên trái và đầu bên phải, đều có \\x%l運転台;#00ffc040;buồng lái%l;#;."
# monologue
# JP: そう説明して、スイッチが入ってくれたのか、\nポーレットの声には力が戻る。
2332 = "Có lẽ nhờ giải thích như vậy mà đã bật được công tắc nào đó, giọng nói của Paulette đã có sức lực trở lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ですから、特別な整備とかなしでも、\n簡単に方向転換できます」
1688 = "「Vì thế nên, dù không có thiết bị bảo dưỡng đặc biệt nào, vẫn có thể dễ dàng đổi hướng được ạ.」"
# monologue
# JP: それはそうだ。\x%l自弁;#00ffc040;自弁%l;#;・\x%l単弁;#00ffc040;単弁%l;#;――\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルを外して歩けば、それでいい。
2686 = "Chuyện đó là đương nhiên. \\x%l自弁;#00ffc040;Van hãm tự động%l;#;・\\x%l単弁;#00ffc040;van hãm đơn%l;#;—— Chỉ cần tháo tay gạt \\x%lブレーキ;#00ffc040;phanh%l;#; ra rồi mang sang đầu kia là được."
# monologue
# JP: 進行方向の\x%l運転台;#00ffc040;運転台%l;#;から、反対方向の\x%l運転台;#00ffc040;運転台%l;#;へと、\nポーレット達が移動すれば、移動した先を「前」にできる。
2276 = "Từ \\x%l運転台;#00ffc040;buồng lái%l;#; ở hướng đang đi, chuyển sang \\x%l運転台;#00ffc040;buồng lái%l;#; ở hướng ngược lại, chỉ cần Paulette và mọi người di chuyển, thì hướng di chuyển đó sẽ trở thành \"phía trước\"."
# 【ハチロク】
# display as 八六
# JP: 「対して、[ハチロク,3]8620には\x%l運転台;#00ffc040;運転台%l;#;がひとつだけ。\nつまり――\x%l8620;#00ffc040;8620%l;#;には、明確な前後があるのです」
1872 = "「Ngược lại, 8620 chỉ có một \\x%l運転台;#00ffc040;buồng lái%l;#; duy nhất. Tức là——\\x%l8620;#00ffc040;8620%l;#; có phân biệt trước sau rõ ràng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうなるな。\n[ハチロクニイマル,3]8620には前後があり、キハ[レイナナ,1]07は、いわば両面が前方だ」
1548 = "「À. Đúng là vậy nhỉ. \\x%l8620;#00ffc040;8620%l;#; có phân biệt trước sau, còn KiHa 07 thì có thể nói là hai mặt đều là phía trước.」"
# monologue
# JP: ハチロクとポーレット、ふたりがほとんど同時に頷く。
2223 = "Hachiroku và Paulette, cả hai gần như gật đầu cùng một lúc."
# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;でもバック走行――逆進を出来なくはないのですが、\nいかんせん極端に見通しが悪く、危ないのです、単純に」
1105 = "「\\x%l8620;#00ffc040;8620%l;#; cũng không phải là không thể chạy lùi——tức là đi lùi, nhưng mà tầm nhìn sẽ cực kỳ tệ, đơn giản là rất nguy hiểm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nそれで、御一夜駅には\x%l転車台;#00ffc040;[ターンテーブル,2]転車台%l;#;があるのだな？]
1499 = "「Ra là vậy. Vì thế nên ga Ohimitera mới có \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#; nhỉ?」"
# monologue
# JP: 見学会のときに動かしているのを、僕も見た。\n線路の敷かれた、巨大な丸い回転テーブル。
2301 = "Lúc tham quan, tôi cũng đã thấy nó hoạt động. Một chiếc bàn quay tròn khổng lồ được lắp đặt trên đường ray."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;をあの上に乗せ、乗せたままぐるり回転させれば、\n望む方へと、\x%l運転台;#00ffc040;運転台%l;#;のある「前」を向けることが出来る。
2272 = "Chỉ cần đưa \\x%l8620;#00ffc040;8620%l;#; lên đó, rồi cứ thế xoay một vòng, là có thể đưa phần \"phía trước\" có \\x%l運転台;#00ffc040;buồng lái%l;#; hướng về phía mong muốn."
# 【ポーレット】
# display as 波萊特
# JP: 「逆に……多分、ターンテーブルがあったから、\n御一夜-湯医間に[ハチロクニイマル,3]8620を引いてきたんだと思います」
1671 = "「Ngược lại…… có lẽ chính vì có bàn quay đầu máy, người ta mới đưa 8620 vào chạy tuyến Ohimitera - Yui đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1535 = "「唔」" 
# monologue
# JP: あった、は過去形。\n御一夜駅には、ターンテーブルは現存している。
1082 = "Đã từng có, là thì quá khứ. Bàn quay đầu máy ở ga Ohimitera hiện tại vẫn còn tồn tại."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、かつては湯医にもターンテーブルがあり、\nしかし、それは失われてしまったのだな？」
1435 = "「Nghĩa là, trước đây ở Yui cũng từng có bàn quay đầu máy, nhưng mà, nó đã bị mất rồi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。でも、ターンテーブルの設置なんて、\n見積もりさえも出せないような額になりますから」
1734 = "「Đúng vậy ạ. Nhưng mà, việc lắp đặt bàn quay đầu máy, sẽ tốn một khoản tiền lớn đến mức không thể nào lập dự toán nổi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「理解した。ターンテーブルの代わりとなるのが、\nこの、『\x%l三角線;#00ffc040;三角線%l;#;』というものなのだな？」
1674 = "「Tôi hiểu rồi. Thứ thay thế cho bàn quay đầu máy, chính là cái gọi là '\\x%l三角線;#00ffc040;đường tam giác%l;#;' này đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。双鉄様」
1775 = "「Đúng vậy ạ. Ngài Soutetsu.」"
# monologue
# JP: 言ってハチロクは、単純極まる図を描き始める。
2646 = "Nói xong, Hachiroku bắt đầu vẽ một sơ đồ cực kỳ đơn giản."
# 【ハチロク】
# display as 八六
# JP: 「矢印方向に進んだ\x%l列車;#00ffc040;列車%l;#;は、\nまず、[サンカク]△の底辺を進み切ります」
1759 = "「\\x%l列車;#00ffc040;Tàu%l;#; di chuyển theo hướng mũi tên, trước tiên sẽ đi hết cạnh đáy của hình tam giác △.」"
# 【ハチロク】
# display as 八六
# JP: 「そうなりましたら、そのまま左斜辺に逆進で進入、\n△の頂点を通り越すまで逆進を継続します」
1822 = "「Sau khi đến đó, cứ thế lùi lại tiến vào cạnh huyền bên trái, tiếp tục lùi cho đến khi vượt qua đỉnh của hình tam giác △.」"
# 【双鉄】
# display as 雙鐵
# JP: 「行って、戻って――そうか、そうすれば、\n右辺から元の線路には、前進で向きを変え復帰できる」
1935 = "「Đi rồi lại lùi——ra là vậy, làm thế thì, từ cạnh bên phải có thể đổi hướng tiến lên để quay lại đường ray cũ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、こうなるわけですね」
1746 = "「Vâng, chính là như vậy ạ.」"
# monologue
# JP: 最後に描かれた図を見れば、\n自分の理解が間違っていなかったことを確認できる。
2559 = "Nhìn vào hình vẽ cuối cùng, tôi có thể xác nhận rằng mình đã hiểu đúng."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これならば元の線路に二本を増設するだけで、\n\x%l8620;#00ffc040;8620%l;#;を方向転換させられるようになるわけだな」
1502 = "「Ra là vậy, nếu làm thế này thì chỉ cần xây thêm hai đoạn vào đường ray cũ, là có thể giúp \\x%l8620;#00ffc040;8620%l;#; đổi hướng được rồi nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「基本、そうですね。\n……元からの線路にも、延伸は必要となっちゃいますが」
1589 = "「Về cơ bản là vậy ạ. ……Mặc dù đường ray cũ cũng cần phải kéo dài thêm.」"
# monologue
# JP: すぐさまポーレットが答える声には、\nしかし、さきほどまでの明快さは無い。
2512 = "Tuy nhiên, trong giọng nói đáp lại ngay lập tức của Paulette, lại không còn sự rành mạch như lúc nãy nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「湯医駅の周辺広くが御一夜鉄道の社有地ですから、\nターンテーブルより、グっと安く済みます……けど」
1805 = "「Khu vực rộng lớn quanh ga Yui đều là đất của Đường sắt Ohimitera, nên so với bàn quay đầu máy thì sẽ rẻ hơn rất nhiều…… nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l三角線;#00ffc040;三角線%l;#;でグっと安くと抑えても――\nなお、総額ではここまでかかるものなのか」
1495 = "「Dù đã dùng \\x%l三角線;#00ffc040;đường tam giác%l;#; để ép giá xuống rất nhiều rồi—— mà tổng chi phí vẫn lên đến mức này sao.」"
# monologue
# JP: 数字を見ればすぐさまに、\nポーレットの声が暗い理由に共感できる。
2424 = "Chỉ cần nhìn vào những con số, lập tức có thể đồng cảm với lý do tại sao giọng Paulette lại chùng xuống."
# monologue
# JP: この額は――\n予想を遥かに、圧倒的に上回っている。
2673 = "Số tiền này—— đã vượt xa, vượt một cách áp đảo so với dự tính."
# 【ポーレット】
# display as 波萊特
# JP: 「あの、でも、その額……\n全部を用立てなくちゃいけないわけでもないんです」
1960 = "「À, nhưng mà, số tiền đó…… không có nghĩa là chúng ta phải tự lo toàn bộ đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　御一夜鉄道は赤字と聞いた気がしたが。\n市から、補助金でも引っ張れるのか？」
1569 = "「Hửm? Hình như tôi nghe nói Đường sắt Ohimitera đang chịu lỗ mà. Có thể xin được tiền trợ cấp từ thành phố sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、議会を通して臨時予算を編成できればです。\n――鉄道は公共性が高いですけど、それでも、やっぱり」
1927 = "「Đó là nếu có thể thông qua hội đồng để lập ngân sách tạm thời ạ. ——Đường sắt tuy có tính công cộng cao, nhưng mà, quả nhiên là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、議会にきちんと諮るべきだと考える。\n公私混同を疑われ、痛くも無い腹を探られてもな」
1655 = "「Tôi cũng nghĩ là nên đưa ra bàn bạc đàng hoàng trước hội đồng. Dù có bị nghi ngờ là công tư lẫn lộn, hay bị soi mói những chuyện không đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですよね」
1750 = "「Vâng. Đúng vậy nhỉ.」"
# monologue
# JP: ほっとした息。
2322 = "Một tiếng thở phào nhẹ nhõm."
# monologue
# JP: ポーレットにかかる負担の範囲と仕事の重さとが、\nいかに厳しいものかがじんわり、伝わってくる。
2426 = "Phạm vi gánh nặng và sức ép công việc đè lên vai Paulette, khắc nghiệt đến nhường nào, tôi đang dần cảm nhận được điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうなると――\n何故、見積もり全額を用立てずに済むのかがわからんな」
1465 = "「Nhưng mà, nếu vậy thì—— Tôi không hiểu tại sao lại không cần phải tự lo toàn bộ số tiền dự toán.」"
# 【ポーレット】
# display as 波萊特
# JP: 「倉庫費です。真闇さんが長年払ってくれていた」
1725 = "「Là phí kho bãi ạ. Chị Mayami đã trả giúp chúng ta trong nhiều năm qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか！　真闇姉は、\n『ずっと市に支払っていた』と言っていたが――」
1543 = "「À, ra là vậy! Chị Mayami đã từng nói, 『Vẫn luôn trả tiền cho thành phố』 mà——」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、\x%l帝鉄;#00ffc040;帝鉄%l;#;が解体されて以降は、そのお金、\n支払先不明で市が預かる形になってたみたいです」
1717 = "「Vâng, kể từ sau khi \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; giải thể, số tiền đó, thành phố có vẻ đã giữ lại dưới dạng khoản thu không rõ người nhận.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、現在の倉庫の所有者――つまり御一夜鉄道が、\n正当な受取先であると認められたのだな？」
1461 = "「Nhưng mà, chủ sở hữu hiện tại của nhà kho——tức là Đường sắt Ohimitera, đã được công nhận là người nhận hợp pháp rồi đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです、ですから、株式会社化してからの分は、\nその全額を、時効もなしに受け取れます」
1744 = "「Đúng vậy ạ, vì thế, phần tiền kể từ khi trở thành công ty cổ phần, chúng ta có thể nhận lại toàn bộ mà không bị tính thời hiệu.」"
# monologue
# JP: ポーレットの声にほんのわずかな張りが戻る。
2509 = "Giọng nói của Paulette đã lấy lại được chút sức sống."
# monologue
# JP: いや――違う、恐らくは、\n覚悟が声を、張り詰めさせた。
2168 = "Không——không phải, có lẽ là, sự quyết tâm đã khiến giọng nói cô ấy trở nên mạnh mẽ."
# 【ポーレット】
# display as 波萊特
# JP: 「奇跡的に軽傷者一名で済み、クレームも出ませんでした。\nけど、先日の事故は――あってはならないものでした」
1594 = "「Kỳ diệu thay chỉ có một người bị thương nhẹ, cũng không có khiếu nại nào. Nhưng mà, vụ tai nạn hôm nọ——là điều không bao giờ được phép xảy ra.」"
# monologue
# JP: 全員が、無言のままに同意する。\n否定するなら――鉄道に係る資格など無い。
2431 = "Tất cả mọi người đều im lặng đồng tình. Nếu phủ nhận điều đó——thì không có tư cách làm việc liên quan đến đường sắt."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので当然、\x%l保線;#00ffc040;保線%l;#;にかかる費用の全てを、\n御一夜鉄道株式会社が支払うつもりです。けど――」
1686 = "「Vì thế nên đương nhiên, toàn bộ chi phí liên quan đến \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, Công ty Cổ phần Đường sắt Ohimitera dự định sẽ chi trả toàn bộ. Nhưng mà——」"
# monologue
# JP: ……累積された倉庫費を、\n\x%l保線;#00ffc040;保線%l;#;にかかる見積もり経費にそっくりあてる。
1095 = "……Toàn bộ phí kho bãi tích lũy từ trước đến nay, sẽ được dùng để đắp vào chi phí dự toán cho \\x%l保線;#00ffc040;bảo trì đường ray%l;#;."
# monologue
# JP: それでも、\x%l保線;#00ffc040;保線%l;#;にかかる費用は、まだ大幅に不足する。
2242 = "Dù vậy, chi phí cho \\x%l保線;#00ffc040;bảo trì đường ray%l;#; vẫn còn thiếu một khoản rất lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「ざっと、四億といったところか」
1617 = "「Sơ sơ thì, cũng phải tầm 400 triệu nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「四億――ですか」
1573 = "「400 triệu——sao ạ.」"
# monologue
# JP: ハチロクの顔までもが曇りはじめる。
2675 = "Đến cả khuôn mặt của Hachiroku cũng bắt đầu xầm xì."
# monologue
# JP: レールショップや酒蔵の手伝い、見学会などの経験から、\nどうやら現在の貨幣価値を理解するようになったらしい。
2310 = "Qua những kinh nghiệm từ việc phụ giúp cửa hàng đường sắt, xưởng rượu, hay các buổi tham quan, có vẻ cô ấy đã phần nào hiểu được giá trị đồng tiền hiện tại."
# 【ハチロク】
# display as 八六
# JP: 「用立てるのは、かなり厳しそうな額ですね」
1721 = "「Để lo liệu được số tiền đó, có vẻ sẽ cực kỳ khó khăn đấy ạ.」"
# monologue
# JP: ハチロクの言葉に頷き返し、ポーレットの目は僕へ向く。
2508 = "Gật đầu đáp lại lời Hachiroku, ánh mắt Paulette hướng về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「その額になると、もう借り入れるしかありません。\nですから、御一夜鉄道の設備の一部を担保にすることを」
1896 = "「Với số tiền đó, thì chỉ còn cách đi vay thôi. Vì vậy, việc dùng một phần cơ sở vật chất của Đường sắt Ohimitera làm tài sản thế chấp thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはダメだ。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派たる銀行に、\n反対派の本丸である御一夜鉄道の生命線を握らせるのは」
1928 = "「Không được. Để cho ngân hàng, thuộc phe ủng hộ nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, nắm giữ huyết mạch của Đường sắt Ohimitera - thành trì của phe phản đối thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなんっ！　稀咲センパイは、借金を盾に\n無理難題を押し付けるような人じゃなかっ！」
1644 = "「Làm gì có chuyện đó! Tiền bối Kisaki không phải là người dùng nợ nần làm lá chắn để ép buộc những yêu cầu vô lý đâu!」"
# monologue
# JP: ほとんど反射で飛び出たような強い声。\n日々姫の純粋な思いを感じる。
2597 = "Một giọng nói mạnh mẽ thốt ra gần như phản xạ. Tôi có thể cảm nhận được suy nghĩ thuần túy của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が言うなら、稀咲個人はそうだろう。\nが、組織としての銀行となれば、話は別だ」
1705 = "「Nếu Hibiki đã nói vậy, thì cá nhân Kisaki có lẽ là thế thật. Nhưng mà, nếu là ngân hàng với tư cách một tổ chức, thì câu chuyện lại khác.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1117 = "「…………」"
# monologue
# JP: 怒声一転。また不機嫌に日々姫がむっつりと黙りこむ。\nこういう話になることを、恐らく察していたのだろう。
2376 = "Giọng điệu tức giận chợt thay đổi. Hibiki lại xị mặt im lặng một cách khó chịu. Có lẽ em ấy cũng đã lờ mờ đoán được câu chuyện sẽ đi theo hướng này."
# monologue
# JP: そうでありながら、離席もせずに話を聞いていてくれる。\nその誠実さを、僕とて無為にするつもりはない。
2482 = "Dù vậy, em ấy vẫn không rời khỏi ghế mà tiếp tục lắng nghe. Sự chân thành đó, tôi cũng không định bỏ qua."
# 【ポーレット】
# display as 波萊特
# JP: 「でも――御一夜鉄道の資産以外で、\nそんなに大きな担保になるようなものなんて」
1520 = "「Nhưng mà——ngoài tài sản của Đường sắt Ohimitera ra, thì làm gì còn thứ gì có thể làm tài sản thế chấp lớn đến vậy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ある。僕の\x%lエアクラ;#00ffc040;エアクラ%l;#;だ」
1754 = "「Có chứ. Chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; của tôi.」"
# 【日々姫】
# display as 日日姬＆波萊特
# JP: 「にぃにっ！？」\n「ええっ！？」
1984 = "「Anh hai!?」\n「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビならば、すでに了解済みだ。\nあれは僕を信じている。担保になると言ってくれている」
2004 = "「Navi thì, đã đồng ý rồi. Nó tin tưởng tôi. Nó bảo sẵn sàng làm tài sản thế chấp.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ、でも――それって、そんな」
1959 = "「Nhưng, nhưng mà——như thế thì, chuyện đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「線路を悪いまま放っておいたのは御一夜鉄道ばいっ！\nなんでにぃにが、そこまでするとっ！？」
1731 = "「Việc bỏ mặc đường ray xuống cấp là lỗi của Đường sắt Ohimitera mà! Tại sao anh hai lại phải làm đến mức đó chứ!?」"
# monologue
# JP: 怒りのあまりか、日々姫は立ち上がってまで抗議してくる。
2299 = "Có lẽ vì quá tức giận, Hibiki thậm chí còn đứng bật dậy để phản đối."
# monologue
# JP: 痛烈な批判の筈なのに、ポーレットもまた、\n日々姫の声に同意するように頷いている。
2479 = "Mặc dù đó là một lời chỉ trích gay gắt, nhưng Paulette cũng gật đầu như đồng tình với lời của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫は、ナビを嫌っていたのではなかったか？」
1130 = "「……Hibiki, chẳng phải em ghét Navi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「好かんよ。にぃにの保護者づらしよるけん。\nけど！　それとこれとは話が別ばいっ！」
1723 = "「Ghét chứ. Tại nó cứ ra vẻ người giám hộ của anh hai. Nhưng mà! Chuyện đó và chuyện này là hai chuyện khác nhau!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1728 = "「Vậy sao.」"
# monologue
# JP: 優しく公正に育ったものだと、\n義理の兄として嬉しく感じる。
2317 = "Thấy em ấy lớn lên trở thành một người tốt bụng và công bằng, với tư cách là anh trai nuôi, tôi cảm thấy rất vui."
# 【双鉄】
# display as 雙鐵
# JP: 「だがな日々姫。ナビは――\nあれは、僕がここに戻った目的を忘れてはおらんのだ」
1456 = "「Nhưng mà Hibiki này. Navi—— nó không hề quên mục đích tôi quay lại đây đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「戻った目的って……\nそんなん、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の反対」
1575 = "「Mục đích quay lại…… Đó chẳng phải là, phản đối việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではない。御一夜という、僕の第二の故郷を。\nその水資源と環境を穢させない――それが、僕の目的だ」
1411 = "「Không phải. Ohimitera là quê hương thứ hai của tôi. Bảo vệ nguồn nước và môi trường nơi đây không bị ô nhiễm——đó mới là mục đích của tôi.」"
# monologue
# JP: 汰斗さんが僕を引き取ってくれなければ、\n僕はこの町で育てなかった。
2335 = "Nếu ông Taito không nhận nuôi tôi, tôi đã không thể lớn lên ở thị trấn này."
# monologue
# JP: この町に来て、優しいひとたちに出会えなければ、\n行き所の無い憎しみが、僕の心をきっと腐らせ殺していた。
2336 = "Nếu không đến thị trấn này, không gặp được những con người tốt bụng, thì sự thù hận không lối thoát chắc chắn đã ăn mòn và giết chết trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビは、そのことを理解している。\n故に、僕を守るため、担保となることを了解したのだ」
2007 = "「Navi hiểu rõ điều đó. Vì vậy, để bảo vệ tôi, nó đã đồng ý làm tài sản thế chấp.」"
# 【れいな】
# display as 玲奈
# JP: 「どうしてそれが、\nそうてつさんを守るってことになるんですかあ？」
1808 = "「Tại sao làm vậy,\nlại là bảo vệ anh Soutetsu ạ?」"
# monologue
# JP: 思いもかけぬ、れいなの問い。
2237 = "Một câu hỏi bất ngờ từ Reina."
# monologue
# JP: 思っていても、口から出せずにいたことなのだろうか。\nポーレットと日々姫とは、つられたように小さく頷く。
2511 = "Dù có nghĩ đến, nhưng chắc mọi người không thể nói ra thành lời. Paulette và Hibiki cũng khẽ gật đầu như bị kéo theo."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、仮に工場誘致が強行され、クマ川が汚染され、\n御一夜の町が損なわれても、僕が死ぬようなことはない」
1834 = "「Tất nhiên, giả sử việc thu hút nhà máy bị cưỡng chế tiến hành, sông Kuma bị ô nhiễm, thị trấn Ohimitera bị tàn phá, thì tôi cũng chẳng chết được.」"
# monologue
# JP: そうですよねぇ、とれいなが頷く。
1079 = "Đúng là vậy nhỉ, Reina gật gù."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、ナビは――僕が一番ダメだった時期からずっと、\n僕のことを見続け――見守り続けているのだ」
1469 = "「Nhưng mà, Navi——từ những lúc tôi tồi tệ nhất, nó đã luôn dõi theo tôi——luôn bảo vệ tôi.」"
# monologue
# JP: 確信している。\n断言できる。
2407 = "Tôi tin chắc.\nTôi có thể khẳng định điều đó."
# monologue
# JP: ある意味では、あの知恵ある機械は僕自身より、\n僕のことをよく知っていると。
2363 = "Ở một khía cạnh nào đó, cỗ máy có trí tuệ ấy, còn hiểu rõ tôi hơn cả chính bản thân tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「あれの言う“僕の命”は、単に生命にとどまらぬ。\n僕を僕たらしめていると、あれが判断する全てが、命だ」
1608 = "「\"Mạng sống của tôi\" mà nó nói, không đơn thuần chỉ là sinh mạng. Tất cả những gì nó đánh giá là làm nên con người tôi, đều là mạng sống.」"
# 【日々姫】
# display as 日日姬
# JP: 「それならナビは……にぃに――ううん、兄さんが――\n工場誘致反対に、もしも失敗してしまったら――」
1973 = "「Nếu vậy thì Navi…… anh hai——không, anh trai—— Nếu như, thất bại trong việc phản đối nhà máy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、\nナビの認める僕でなくなると判断したのだろうな」
2003 = "「Nó sẽ phán đoán rằng, tôi không còn là tôi mà nó công nhận nữa.」"
# monologue
# JP: 無論、それは杞憂にすぎない。\nだから意図的に苦笑して、肩をすくめてまで見せる。
2552 = "Tất nhiên, đó chỉ là sự lo lắng thái quá. Vì vậy tôi cố tình cười khổ, thậm chí còn nhún vai cho họ thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「あれがどれほど心配性で過保護かならば、\n日々姫も知っているだろう？」
1979 = "「Nó hay lo lắng và bảo vệ quá mức đến nhường nào, chắc Hibiki cũng biết mà đúng không?」"
# monologue
# JP: 笑わせるつもりでそういえば、\n日々姫はしかし、神妙極まる顔になる。
2416 = "Định bụng chọc cười nên tôi mới nói vậy, nhưng Hibiki lại tỏ ra vô cùng nghiêm túc."
# 【日々姫】
# display as 日日姬
# JP: 「うん。知ってる――知ってます。\nナビがどれだけ、兄さんのことを見てきたかなら」
1566 = "「Vâng. Em biết——em biết chứ. Navi đã dõi theo anh trai suốt bao lâu nay mà.」"
# monologue
# JP: 日々姫は、そのまま黙り込む。\nそこに静かに、ポーレットの声が滑りこんでくる。
2469 = "Hibiki cứ thế im lặng. Và rồi, giọng nói của Paulette nhẹ nhàng vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、あの――話を巻き戻しちゃいますけど、\nこれは日々姫ちゃんも言ったとおりに御一夜鉄道の問題で」
1467 = "「Nhưng mà, ừm——em xin phép quay lại chủ đề chính một chút, đúng như Hibiki đã nói, đây là vấn đề của Đường sắt Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「同時に、僕の問題でもあるのだよ。ポーレット。\nゆえに、折衷案を、僕は提案しているつもりだ」
1527 = "「Đồng thời, nó cũng là vấn đề của tôi. Paulette. Vì vậy, tôi mới định đề xuất một phương án thỏa hiệp.」"
# 【ポーレット】
# display as 波萊特
# JP: 「折衷案ですか？」
1695 = "「Phương án thỏa hiệp sao ạ?」"
# monologue
# JP: 話が前後してしまったか。
2414 = "Câu chuyện bị đảo lộn thứ tự mất rồi sao."
# monologue
# JP: 最初からこうきりだしておけば、\n余計な話を聞かせずに済んだのかもしれん。
2325 = "Nếu tôi mở lời thế này ngay từ đầu, thì có lẽ đã không phải để họ nghe những chuyện thừa thãi rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ナビを担保に稀咲から四億を借り受けよう。\nそしてそのままの条件で、僕から御一夜鉄道に貸付ける」
1662 = "「Tôi sẽ dùng Navi làm tài sản thế chấp để vay 400 triệu từ Kisaki. Sau đó, với cùng điều kiện đó, tôi sẽ cho Đường sắt Ohimitera vay lại.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1540 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「個々の取引を、それぞれに行う。\nただそれだけで、御一夜鉄道の独立性を維持できる」
1487 = "「Các giao dịch cá nhân sẽ được thực hiện riêng biệt. Chỉ cần như vậy, Đường sắt Ohimitera có thể duy trì được tính độc lập của mình.」"
# monologue
# JP: 僕の言葉に、ポーレットは軽々には頷かない。
2510 = "Trước lời nói của tôi, Paulette không dễ dàng gật đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「でも……あの――」
1451 = "「Nhưng mà…… cái đó——」"
# monologue
# JP: 顔がどんどん、不安の色を濃くしていく。
2319 = "Nét bất an trên khuôn mặt cô ấy ngày càng đậm hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「返済を滞らせた場合のことなら、僕は厳しくとりたてる。\n間に僕がいようとも、ポーレットの責任は変わらんぞ？」
1599 = "「Nếu để chậm trễ việc trả nợ, tôi sẽ đòi gắt gao đấy. Cho dù có tôi ở giữa, thì trách nhiệm của Paulette vẫn không thay đổi đâu nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！　そうか、そうですよね！！　最悪の場合、\nわたしが、御一夜鉄道を担保に新規にお金を借りれば」
1529 = "「Hả? A! Ra là vậy, đúng vậy nhỉ!! Trong trường hợp xấu nhất, mình chỉ cần lấy Đường sắt Ohimitera làm tài sản thế chấp để vay một khoản tiền mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、僕への返済はその資金を以って行われ、\n僕は銀行へ、無事の返済を果たせることとなるのだから」
1784 = "「Đúng vậy, việc trả nợ cho tôi sẽ được thực hiện bằng nguồn tiền đó, và tôi sẽ có thể hoàn tất việc trả nợ cho ngân hàng một cách suôn sẻ.」"
# monologue
# JP: 自分に負担があることを、まるで安堵するかのように、ほーっとポーレットが息を吐く。
2360 = "Như thể cảm thấy an tâm vì bản thân phải gánh vác trách nhiệm, Paulette thở phào một hơi."
# 【双鉄】
# display as 雙鐵
# JP: 「むろん。返済を滞らせなどはしない。\n全てを上手く運ばせて、何一つさえ損なわせはせぬ」
1835 = "「Tất nhiên. Tôi sẽ không để việc trả nợ bị chậm trễ đâu. Tôi sẽ khiến mọi chuyện diễn ra suôn sẻ, không để tổn thất bất cứ thứ gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。わたしも、最初からそのつもりです」
1564 = "「Vâng. Từ đầu em cũng đã định như vậy rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、もっとがんばりますよぉ」
1824 = "「Reina cũng sẽ, cố gắng hơn nữa nha~」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、常に、双鉄様とともに」
1665 = "「Em sẽ, luôn luôn, sát cánh cùng ngài Soutetsu.」"
# monologue
# JP: 次々、賛同してくれる声。
2652 = "Những tiếng nói tán thành liên tiếp vang lên."
# monologue
# JP: それに一拍――二拍遅れて、\nほんのすこしだけスネたような声。
2706 = "Chậm hơn một nhịp——hai nhịp, một giọng nói có vẻ hờn dỗi vang lên."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにの好きにすればいいばい。\n御一夜が栄えることは、みんなの共通の希望やもん」
1137 = "「……Anh hai cứ làm theo ý mình đi. Ohimitera phồn vinh, là hy vọng chung của tất cả mọi người mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、この案で行かせてもらう」
1969 = "「Nếu vậy, tôi xin phép tiến hành theo phương án này.」"
# monologue
# JP: 僕らの活動に口出しさせずに融資を得る。
2303 = "Đạt được khoản vay mà không để họ can thiệp vào hoạt động của chúng tôi."
# monologue
# JP: 銀行も利子収入を得るのであるから、\nあとはその辺の折り合いをつければ、ことはなる。
2456 = "Ngân hàng cũng thu được tiền lãi, nên chỉ cần thỏa hiệp được phần đó, mọi chuyện sẽ ổn thỏa."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、銀行との付き合いは」
1791 = "「Paulette thì, mối quan hệ với ngân hàng thế nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん、普通にはありますけど」
1833 = "「Tất nhiên là, có giao dịch bình thường ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが良ければ、\nわたしから稀咲センパイに連絡とるばい」
1516 = "「Nếu anh hai thấy được, thì để em liên lạc với tiền bối Kisaki cho.」"
# monologue
# JP: きっぱり言い切る、まだスネた声。\n不機嫌にふくれ、赤らんだ頬。
2308 = "Em ấy nói một cách dứt khoát, với giọng điệu vẫn còn hờn dỗi. Hai má đỏ ửng phồng lên vì không vui."
# monologue
# JP: それでも日々姫は、“頼む”といえばすぐさまに、\n携帯を取り出し電話をかける。
2245 = "Dù vậy, ngay khi tôi vừa nói \"Nhờ em nhé\", Hibiki lập tức lấy điện thoại ra gọi."
# 【日々姫】
# display as 日日姬
# JP: 「……これが一番、話の早かことになるけん」
1126 = "「……Làm thế này là nhanh nhất mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1116 = "「…………」" 
# monologue
# JP: 受付嬢が持ってきてくれたコーヒーを飲む。
2400 = "Tôi uống ngụm cà phê mà cô tiếp tân vừa mang ra."
# monologue
# JP: 隈元銀行御一夜支店長室――\n宝生稀咲の仕事部屋は、広々として日当たりがいい。
2674 = "Phòng giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto—— Phòng làm việc của Houshou Kisaki, rất rộng rãi và nhiều ánh sáng."
# monologue
# JP: （計算なのか、そういう趣味か――）
2733 = "（Là có tính toán, hay là sở thích của cô ta nhỉ——）"
# monologue
# JP: 三角形のセンターテーブル。装飾性の高い照明。\nサイドボードの上にはしかし、古びた大黒様の像。
2166 = "Bàn trà hình tam giác. Hệ thống đèn chiếu sáng mang tính trang trí cao. Thế nhưng trên tủ búp phê, lại đặt một bức tượng thần Daikoku cũ kỹ."
# monologue
# JP: ひどくミスマッチのようにも思えるし、\n『銀行らしい』といえば、いかにもなようにも思える。
2669 = "Trông có vẻ vô cùng lạc quẻ, nhưng nếu nói là \"đậm chất ngân hàng\", thì lại thấy cũng khá hợp lý."
# 【浦上】
# display as ？？？
# JP: 「失礼します」
1693 = "「Xin thất lễ.」"
# monologue
# JP: 先ほどの受付嬢の声ではないが、\n宝生稀咲の声とも違う。
2173 = "Không phải giọng của cô tiếp tân lúc nãy, cũng không phải giọng của Houshou Kisaki."
# monologue
# JP: 男性のものか女性のものか、\nそれすら判断つきかねる。
2352 = "Là giọng nam hay giọng nữ, đến việc đó cũng khó mà phán đoán."
# 【浦上】
# display as ？？？
# JP: 「お約束をいただきながら、\nお待たせしてしまい申し訳ございません」
1618 = "「Đã hẹn trước rồi, mà còn để anh phải chờ đợi, thật vô cùng xin lỗi.」"
# monologue
# JP: スーツ姿の、ひどく細身でメガネをかけた……\nというか、どこかで――
2194 = "Mặc vest, thân hình cực kỳ gầy gò và đeo kính…… Nói đúng hơn là, tôi đã gặp ở đâu đó——"
# monologue
# JP: ああ、そうだ。見学会の日、\n宝生稀咲と連れ立っていた男性だ。
2292 = "À, đúng rồi. Vào ngày diễn ra buổi tham quan, người đàn ông đi cùng Houshou Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「とんでもない、こんなに早く、\nご面会のお約束を頂けたこと、心より感謝しています」
1781 = "「Không đâu, anh đã sắp xếp lịch hẹn nhanh chóng thế này, tôi thực sự rất biết ơn.」"
# 【浦上】
# display as ？？？
# JP: 「[ほうしょう,1]宝生も、ご面会を楽しみにしていたのですが、\nあいにく、緊急の支店長会議が入ってしまいまして」
1612 = "「Cô Houshou cũng rất mong chờ cuộc gặp này, nhưng không may, lại có cuộc họp giám đốc chi nhánh khẩn cấp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、後日に改めたほうが？」
1970 = "「Nếu vậy, tôi nên đổi sang ngày khác chăng?」"
# 【浦上】
# display as ？？？
# JP: 「いえ、私が宝生の代理として、\nお話をお伺いするよう申し付けられております」
1423 = "「Không, tôi đã được chỉ thị làm người đại diện cho cô Houshou, để lắng nghe câu chuyện của anh.」"
# monologue
# JP: 言って、男は手慣れた様子で、礼儀正しく名刺を差し出す。
2647 = "Nói rồi, người đàn ông lịch sự đưa danh thiếp ra với phong thái thành thạo."
# 【浦上】
# display as 浦上
# JP: 「私、宝生の秘書を務めております、[うらかみ,1]浦上と申します」
1679 = "「Tôi là Urakami, hiện đang làm thư ký cho cô Houshou.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頂戴いたします」
1673 = "「Tôi xin nhận.」"
# monologue
# JP: 両手で受けとり、確認する。
2425 = "Tôi nhận lấy bằng hai tay và xem qua."
# monologue
# JP: 浦上香月――香る月と書いてかづきと読むのか。\nんんっ？　――いや、待て。
2532 = "Urakami Kazuki——viết là \"Hương Nguyệt\" mà đọc là Kazuki sao. Hửm? ——Không, đợi đã."
# 【双鉄】
# display as 雙鐵
# JP: 「浦上様は、\nエアロ=クラフテック社の方でいらっしゃるのですね」
1801 = "「Anh Urakami đây, là người của công ty Aero-Craftech nhỉ.」"
# monologue
# JP: エアロ＝クラフテック社極東支局\n用地担当シニアマネージャー
2595 = "Chi nhánh Viễn Đông Công ty Aero-Craftech Quản lý cấp cao phụ trách mặt bằng"
# monologue
# JP: ――名刺の肩には、間違いなくそう書かれている。
1075 = "——Chức danh trên danh thiếp, rõ ràng được viết như vậy."
# 【浦上】
# display as 浦上
# JP: 「ええ、エアロ＝クラフテック社から出向し、\n宝生稀咲の秘書として勤務させていただいております」
1742 = "「Vâng, tôi được công ty Aero-Craftech phái cử đến, và hiện đang làm thư ký cho cô Houshou Kisaki.」"
# monologue
# JP: なるほど、つまりは、\n工場誘致推進のための、\x%lエアクラ;#00ffc040;エアクラ%l;#;社側の人間か。
2248 = "Ra là vậy, nói tóm lại, là người phía công ty \\x%lエアクラ;#00ffc040;Aircra%l;#;, đến để thúc đẩy việc thu hút nhà máy."
# monologue
# JP: まして、御一夜外の人間となると、\n稀咲より厳しい交渉相手なのかもしれん。
2488 = "Huống hồ, lại còn là người ngoài Ohimitera, có lẽ đây là một đối tác đàm phán khó nhằn hơn cả Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「申し遅れました。わたくしは、右田一[さけてん,1]酒店の\n右田双鉄と申す者です」
1697 = "「Xin lỗi vì giới thiệu chậm trễ. Tôi là Migita Soutetsu, người của tửu điếm Migita Ichi.」"
# monologue
# JP: 名刺は、義父の酒問屋での物しか持ち合わせがない。\n差し出し、受け取ってもらうのを待ち、言葉を継ぎ足す。
2695 = "Danh thiếp thì tôi chỉ mang theo danh thiếp của xưởng rượu nhà cha nuôi. Tôi đưa ra, đợi anh ta nhận lấy rồi nói tiếp."
# 【双鉄】
# display as 雙鐵
# JP: 「本日は、酒問屋の従業員としてではなく、\n御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;部長としてご相談に伺いました」
1657 = "「Hôm nay, tôi đến không phải với tư cách là nhân viên xưởng rượu, mà là để bàn bạc với tư cách Trưởng bộ phận \\x%l保線;#00ffc040;bảo trì đường ray%l;#; của Đường sắt Ohimitera.」"
# 【浦上】
# display as 浦上
# JP: 「御一夜鉄道に\x%l保線;#00ffc040;保線%l;#;部が出来たのですか。\nそれは、先日のアクシデントの影響で？」
1637 = "「Đường sắt Ohimitera đã thành lập bộ phận \\x%l保線;#00ffc040;bảo trì đường ray%l;#; rồi sao. Đó là do ảnh hưởng từ sự cố hôm nọ à?」"
# monologue
# JP: 情報が早い。\nならば話も、早く済むものと考えよう。
2188 = "Cập nhật thông tin nhanh thật. Nếu vậy thì câu chuyện cũng sẽ được giải quyết nhanh chóng thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「はい。現在の御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;体制は、\n率直にいって十分なものではないと判断してのことです」
1735 = "「Vâng. Thẳng thắn mà nói thì, là do tôi đánh giá hệ thống \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hiện tại của Đường sắt Ohimitera vẫn chưa đủ tốt.」"
# 【浦上】
# display as 浦上
# JP: 「そうですか」
1748 = "「Ra là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「より市民の皆様のお役に立つため、\n\x%l保線;#00ffc040;保線%l;#;強化、安全性の確保は必須と考えております」
1806 = "「Để phục vụ người dân tốt hơn, tôi cho rằng việc tăng cường \\x%l保線;#00ffc040;bảo trì đường ray%l;#; và đảm bảo an toàn là điều bắt buộc.」"
# 【浦上】
# display as 浦上
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯を抱える御一夜では、\n鉄道の公共性は高いものと当行も評価しています」
1766 = "「Tại Ohimitera, nơi có khu vực \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động, ngân hàng chúng tôi cũng đánh giá cao tính công cộng của đường sắt.」"
# monologue
# JP: 淡々とした浦上の声。
2525 = "Giọng nói điềm đạm của Urakami."
# monologue
# JP: 意図が読みきれぬものならば、\n小細工を弄しても仕方あるまい。
2455 = "Nếu đã không thể đọc thấu ý đồ của đối phương, thì có giở trò tiểu xảo cũng vô ích."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。つきましては、\x%l保線;#00ffc040;保線%l;#;費用の\n一部をご融資いただきたく、ご相談にあがった次第です」
1990 = "「Cảm ơn anh. Do đó, tôi đến đây để bàn bạc về việc xin vay một phần chi phí \\x%l保線;#00ffc040;bảo trì đường ray%l;#;.」"
# 【浦上】
# display as 浦上
# JP: 「おおまかなことは、宝生から私も伺っております。\n事前にお預かりさせていただいていた資料も拝見しました」
1669 = "「Tôi cũng đã nghe qua khái quát từ cô Houshou rồi. Tài liệu anh gửi trước tôi cũng đã xem qua.」"
# monologue
# JP: 浦上はメガネを一度外して、\n神経質そうに布で拭き取り、またかけ直す。
2524 = "Urakami tháo kính ra một lần, lau chùi bằng khăn một cách đầy lo lắng, rồi đeo lại."
# 【浦上】
# display as 浦上
# JP: 「双鉄様の飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;ですが、\n担保価値は二億が妥当と判断します」
1980 = "「Về chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; bay của ngài Soutetsu, tôi đánh giá giá trị thế chấp là 200 triệu là hợp lý.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビ――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの換装が必要となるからですか？」
1583 = "「Có phải vì Navi—— buộc phải thay thế Navi của \\x%lエアクラ;#00ffc040;Aircra%l;#; không?」"
# 【浦上】
# display as 浦上
# JP: 「その通りです。飛行型ナビの換装は最新技術ですので、\n相当なコストが掛かります」
1740 = "「Đúng vậy. Việc thay thế Navi bay là công nghệ mới nhất, nên sẽ tốn một khoản chi phí khá lớn.」"
# monologue
# JP: わかっているなら話が早いと言わんばかりの短い答え。
2190 = "Một câu trả lời ngắn gọn như muốn nói: \"Nếu anh đã hiểu thì mọi chuyện sẽ nhanh thôi\"."
# monologue
# JP: 確かに、飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;のコストのほとんどが\n\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビのものと聞く。が――
2421 = "Quả thực, nghe nói hầu hết chi phí của \\x%lエアクラ;#00ffc040;Aircra%l;#; bay đều nằm ở Navi của \\x%lエアクラ;#00ffc040;Aircra%l;#;. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「機体そのものの価値とて、\nかなりあるかとは思うのですが」
1682 = "「Tôi nghĩ giá trị của bản thân thân máy, cũng khá lớn đấy chứ.」"
# 【浦上】
# display as 浦上
# JP: 「確かに。が、年式が経ちすぎています。\nくわえ、総飛行距離も、相当なものです」
1782 = "「Đúng vậy. Nhưng mà, đời máy đã quá cũ rồi. Thêm vào đó, tổng quãng đường bay cũng khá lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1535 = "「唔」" 
# monologue
# JP: そうか。ナビは自主的に、ひっきりなしに飛んでいる。\nが――それはもちろん、本来有り得ぬ運用方法なのだろう。
2349 = "Ra là vậy. Navi vẫn luôn tự động bay liên tục không ngừng nghỉ. Nhưng mà——đó tất nhiên là cách vận hành vốn dĩ không thể xảy ra rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことでしたら、納得できます。\nでは、仮に二億をお借しいただくとして、金利の方は」
1931 = "「Nếu là vậy thì tôi có thể hiểu được. Vậy, giả sử tôi vay 200 triệu, thì lãi suất sẽ là.」"
# 【稀咲】
# display as 稀咲
# JP: 「すみません右田さん、お待たせしてしまいました」
1631 = "「Xin lỗi anh Migita, để anh phải đợi lâu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、お忙しいところお時間をありがとうございます」
1533 = "「Không sao, cảm ơn cô đã dành thời gian dù đang bận rộn.」"
# monologue
# JP: 宝生稀咲だ。会議とやらが終わったのか――\nそれとも、タイミングを見ていたのか。
2486 = "Là Houshou Kisaki. Cuộc họp gì đó đã kết thúc rồi sao—— Hay là, cô ta đang canh thời gian."
# 【稀咲】
# display as 稀咲
# JP: 「浦上と、どこまでのお話をされましたか？」
1645 = "「Anh đã bàn với Urakami đến đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、融資上限が二億と――」
1546 = "「Vâng, hạn mức cho vay là 200 triệu và——」"
# 【元忠】
# display as ？？？
# JP: 「なにを[かしこ]畏まっている。\n二人とも、知らない仲でもあるまいし」
1473 = "「Làm gì mà phải khách sáo thế. Hai người đâu phải người dưng nước lã.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1999 = "「!?」"
# monologue
# JP: おっさんだ。\nいきなり、おっさんが支店長室に入り込んできた。
2484 = "Là một ông chú. Đột nhiên, một ông chú bước vào phòng giám đốc chi nhánh."
# 【浦上】
# display as 浦上＆稀咲
# JP: 「これは頭取」\n「仕事の邪魔はやめてくれないかな」
1882 = "「Kính chào ngài chủ tịch.」 「Xin ông đừng làm phiền công việc của tôi được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頭取？」
1884 = "「Chủ tịch?」"
# monologue
# JP: 驚いた。\nならばこのおっさんが、宝生元忠、その人なのか。
2668 = "Thật đáng ngạc nhiên. Nếu vậy thì ông chú này, chính là Houshou Mototada sao."
# monologue
# JP: ……いや、確かに言われて見てみれば、\n身なりも容姿も整い、物腰も落ち着いてはいるのだが――
1087 = "……Không, quả thực nếu nhìn kỹ lại, ăn mặc và ngoại hình đều chỉnh tề, phong thái cũng rất điềm tĩnh——"
# 【元忠】
# display as 元忠
# JP: 「おいおい御一夜支店長。\n頭取に対し、『やめてくれないかな』は無いだろう」
1551 = "「Này này giám đốc chi nhánh Ohimitera. Nói với chủ tịch mà lại dùng từ 'được không' sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「知らない仲でないなら畏まるな――と、\nそうおっしゃったのは頭取ご自身ですが？」
1112 = "「'Nếu không phải người dưng thì đừng có khách sáo'—— Chẳng phải chính ngài chủ tịch đã nói vậy sao?」"
# 【元忠】
# display as 元忠
# JP: 「そうか！\nはっは、これは一本取られたな」
1930 = "「Vậy sao!\nHa ha, bị chiếu tướng mất rồi.」"
# monologue
# JP: かんらと笑って、おでこをパシン。
2184 = "Ông ấy cười lớn sảng khoái, rồi vỗ đét một cái lên trán."
# monologue
# JP: 立場で人の何をはかれるわけでもないが――\nそれにしたって、頭取がこれはあまりにも気さくにすぎる。
2708 = "Dù không thể đánh giá con người qua địa vị—— Nhưng mà, một chủ tịch như thế này thì lại thân thiện quá mức rồi."
# 【元忠】
# display as 元忠
# JP: 「では、ざっくばらんに行こう。\n双鉄君も、そのようにしてくれ」
1966 = "「Vậy thì, cứ thẳng thắn đi. Soutetsu cũng làm thế nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。しかし――」
1715 = "「Vâng. Nhưng mà——」"
# 【元忠】
# display as 元忠
# JP: 「ざっくばらんに。\n知らん言葉ではないだろう？」
1114 = "「Cứ thẳng thắn đi. Không phải là từ cậu không biết chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あー」
1537 = "「À——」"
# monologue
# JP: そういわれても、かなり困る。
2671 = "Dù bị nói vậy, tôi vẫn khá bối rối."
# monologue
# JP: 目上、年上の人間に、敬語以外で話すことなど、\nほとんど経験が無いのだが――ああ、いや、そうか。
2350 = "Việc nói chuyện với người bề trên, người lớn tuổi hơn mà không dùng kính ngữ, tôi hầu như chưa từng trải qua——à, không, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうは言うけど、“知らないも同然の仲"だと思うんだ。\n僕と、稀咲――稀咲さんは」
1899 = "「Ông nói vậy, nhưng tôi nghĩ chúng tôi 'cũng chẳng khác gì người dưng' đâu. Tôi và Kisaki——cô Kisaki ấy.」"
# monologue
# JP: 遠い昔に、父さんと話していたあの感じ。
2362 = "Cảm giác giống như khi nói chuyện với bố ngày xưa."
# monologue
# JP: それをなんとか引張りだして、\n“ざっくばらん”を試みてみる。
2397 = "Cố gắng lôi cảm giác đó ra, tôi thử \"thẳng thắn\" xem sao."
# 【元忠】
# display as 元忠
# JP: 「なんだ、双鉄君は覚えてないのか。\n君が引き取られてすぐの頃、何度か会わせているのだが」
1442 = "「Sao thế, Soutetsu không nhớ à. Hồi cậu mới được nhận nuôi, ta đã cho hai đứa gặp nhau mấy lần rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「引き取られてすぐの頃――なら――」
1889 = "「Hồi mới được nhận nuôi——nếu vậy thì——」"
# monologue
# JP: 覚えていない。\nというか恐らく、僕は“会った”と認識してない。
2170 = "Không nhớ. Nói đúng hơn là, có lẽ tôi không hề nhận thức được việc \"đã gặp\"."
# monologue
# JP: あのころの僕は全てを憎み、全てを妬み――\nけれどもそれを発散できず、ただただ内に籠っていたから。
2683 = "Tôi của lúc đó căm ghét tất cả, đố kỵ với tất cả—— Nhưng lại không thể phát tiết ra ngoài, chỉ biết thu mình lại."
# 【元忠】
# display as 元忠
# JP: 「覚えていなくて当然か？　まぁ、そうだろう。\n私とて思ったものだ、『この子は無理だ』と、正直、な」
1420 = "「Không nhớ cũng là lẽ đương nhiên sao? Mà, chắc là vậy rồi. Thành thật mà nói, ngay cả ta cũng từng nghĩ 'Thằng bé này hết cách rồi'.」"
# monologue
# JP: 事情を知って、会っている。
2192 = "Ông ấy biết chuyện, và đã gặp tôi."
# monologue
# JP: そう暗示する――けれども明るいその声に、\n事情を少し、照らしだされたような気になる。
2182 = "Lời ám chỉ đó——nhưng với giọng nói tươi sáng ấy, tôi có cảm giác như sự việc đã được soi sáng đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「なら――頭取――\n元忠さんは、汰斗さんの？」
1972 = "「Vậy thì——chủ tịch—— Ông Mototada, có quan hệ thế nào với ông Taito?」"
# 【元忠】
# display as 元忠
# JP: 「[たいと,1]汰斗さんともお会いはしていた。\n私と[けんぞう,1]謙三とは、仲の良い学友だったからな」
1653 = "「Ta cũng đã từng gặp ông Taito. Ta và Kenzo, từng là bạn học rất thân với nhau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……[ちち,1]義父の」
1539 = "「À…… của cha nuôi tôi.」"
# monologue
# JP: 思いもかけぬところでの、思いもかけぬ縁と感じる。
2563 = "Tôi cảm thấy đây là một mối duyên bất ngờ, ở một nơi không ngờ tới."
# 【双鉄】
# display as 雙鐵
# JP: 「ということは、\n稀咲さんと日々姫も、昔からの仲なのか？」
1971 = "「Nói vậy tức là, cô Kisaki và Hibiki cũng là bạn bè từ ngày xưa sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「稀咲でいいよ。\nボクも、双鉄と呼ばせてもらうから」
1519 = "「Gọi Kisaki là được rồi. Tôi cũng sẽ gọi cậu là Soutetsu.」"
# monologue
# JP: 口調はざっくばらんながらも、\nどこか突き放すように響く声。
2710 = "Dù giọng điệu thẳng thắn, nhưng lại vang lên một cách xa cách."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫とボクは、学園からさ。\n幼少期には会っていないね」
1664 = "「Tôi và Hibiki quen nhau từ trường học. Hồi nhỏ chúng tôi chưa từng gặp nhau.」"
# monologue
# JP: 言い切って、\nそれから稀咲は、眉根と瞳を少し顰める。
2591 = "Nói dứt lời,\nKisaki khẽ nhíu mày và nheo mắt lại."
# 【稀咲】
# display as 稀咲
# JP: 「だけど、ね、双鉄。ボクもようやく思い出した。\nボクとキミとは、幼いころに三度、会ってる」
1453 = "「Nhưng mà, này Soutetsu. Cuối cùng tôi cũng nhớ ra rồi. Tôi và cậu, hồi nhỏ đã từng gặp nhau ba lần.」"
# monologue
# JP: 再会を喜んでいる口調ではない。
2680 = "Không phải là giọng điệu vui mừng vì được gặp lại."
# 【稀咲】
# display as 稀咲
# JP: 「三度とも、キミは一言も口をきかなかった。\n忘れないものだね。そういうことをされると、逆に」
1404 = "「Cả ba lần, cậu đều không hé môi lấy một lời. Thật khó quên nhỉ. Bị đối xử như vậy, ngược lại càng nhớ rõ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……昔のこととはいえ、失礼をした」
1932 = "「Chuyện đó…… dù là chuyện ngày xưa, nhưng tôi đã thất lễ rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、いいんだ。あまりに気になって調べて知ったから。\nキミが、大きな鉄道事故の被害者だということを」
1424 = "「Không, không sao. Vì quá tò mò nên tôi đã điều tra và biết được. Rằng cậu, là nạn nhân của một vụ tai nạn đường sắt nghiêm trọng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1561 = "「Ừm.」"
# monologue
# JP: 再会を喜ぶ口調ではないが、稀咲の言葉は小気味いい。\n妙な遠慮が全くないから、こちらも構えず話ができる。
2707 = "Dù không phải giọng điệu vui mừng khi gặp lại, nhưng lời nói của Kisaki rất sảng khoái. Hoàn toàn không có sự e dè kỳ quặc nào, nên tôi cũng có thể thoải mái nói chuyện."
# 【稀咲】
# display as 稀咲
# JP: 「それで、ボクは思ったんだよ。\n『余りに傷が深いと、人は生きたまま死ぬんだ』ってね」
1821 = "「Thế là, tôi đã nghĩ thế này. 『Nếu vết thương quá sâu, con người ta sẽ sống không bằng chết』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1727 = "「Đúng vậy.」"
# monologue
# JP: 頷きながら、驚いている。
2721 = "Tôi vừa gật đầu, vừa cảm thấy ngạc nhiên."
# monologue
# JP: 宝生稀咲は、その頃から――今よりずっと幼いころから、\nそこまで人を、理解していたものなのか、と。
2346 = "Houshou Kisaki, từ lúc đó——từ khi còn nhỏ hơn bây giờ rất nhiều, đã có thể thấu hiểu con người đến mức đó sao."
# 【稀咲】
# display as 稀咲
# JP: 「そう感じて、ボクはキミへの興味を完全に失った。\nだから、今、ひどく驚いているんだ」
1648 = "「Cảm nhận được điều đó, tôi hoàn toàn mất hứng thú với cậu. Vì thế, bây giờ, tôi đang vô cùng ngạc nhiên đây.」"
# monologue
# JP: 物怖じを全くせぬ瞳。\n離れたままに、距離を詰められた感じを受ける。
2162 = "Ánh mắt không hề e sợ. Dù vẫn giữ khoảng cách, nhưng tôi lại có cảm giác như bị áp sát."
# 【稀咲】
# display as 稀咲
# JP: 「人を見る目には自信がある。けれどね、双鉄。\n赤井阿蘇神社でボクは、キミをキミとは気づけなかった」
1681 = "「Tôi rất tự tin vào mắt nhìn người của mình. Nhưng mà này, Soutetsu. Ở đền Akai Aso, tôi đã không nhận ra cậu là cậu.」"
# monologue
# JP: ふっと、\n稀咲が力の抜けた笑みを浮かべる。
2371 = "Phù,\nKisaki nở một nụ cười nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫から、飽きるほどキミの話を聞いてたからかな？\n“日々姫の兄さん”が、まさかあの無愛想な少年だとも」
1730 = "「Có lẽ do đã nghe Hibiki kể về cậu đến phát chán rồi chăng? Không ngờ 'anh trai của Hibiki', lại chính là cậu thiếu niên lầm lì đó.」"
# monologue
# JP: ならば日々姫は、僕を褒めてくれていたのか。
2199 = "Nếu vậy thì Hibiki, đã luôn khen ngợi tôi sao."
# monologue
# JP: じんわり感じる嬉しさが、僕の言葉をより素直にする。
2366 = "Niềm vui âm ỉ dâng lên, khiến lời nói của tôi trở nên chân thành hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「いくらかは、僕も成長した――\nいや、違う。成長を、させてもらえたおかげだろうな」
1924 = "「Tôi cũng đã trưởng thành hơn đôi chút—— Không, không phải. Có lẽ là nhờ được mọi người giúp đỡ để trưởng thành.」"
# 【稀咲】
# display as 稀咲
# JP: 「させてもらえた？」
1474 = "「Được giúp đỡ để trưởng thành?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1561 = "「嗯」" 
# monologue
# JP: 話す。飾らず、なにも構えず。\n御一夜での沢山の出会いが、僕を成長させてくれたこと。
2404 = "Tôi kể lại. Không tô vẽ, không e dè. Rằng những cuộc gặp gỡ ở Ohimitera đã giúp tôi trưởng thành."
# monologue
# JP: だから、僕は御一夜を――\nこの町の水と人とを、損ねたくないと思っていることを。
2642 = "Chính vì vậy, tôi muốn bảo vệ Ohimitera—— Bảo vệ nguồn nước và con người của thị trấn này, không muốn chúng bị tổn hại."
# 【稀咲】
# display as 稀咲
# JP: 「……ボクも御一夜の生まれだ。キミの主張もわかる。\nわかるからこそ、ボクも融資の許諾を出した」
1128 = "「……Tôi cũng sinh ra ở Ohimitera. Tôi hiểu lập trường của cậu. Chính vì hiểu, nên tôi mới chấp thuận khoản vay này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ありがとう」
1559 = "「Ừm. Cảm ơn cô.」"
# 【稀咲】
# display as 稀咲
# JP: 「だけどね、双鉄。二億円以上は無理なんだ。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;関連の査定なら、浦上に任せて間違いないから」
1458 = "「Nhưng mà này, Soutetsu. Vượt quá 200 triệu là không thể đâu. Vì nếu là thẩm định liên quan đến \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì giao cho Urakami là không sai vào đâu được.」"
# monologue
# JP: 恐縮です、と言わんばかりに浦上が軽く頭を下げる。\n終始、変化を見せぬ態度に、小さな疑問が湧いてくる。
2359 = "Như muốn nói \"Quá khen\", Urakami khẽ cúi đầu. Thái độ từ đầu đến cuối không hề thay đổi của anh ta, khiến tôi nảy sinh một thắc mắc nhỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんは、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を御一夜に建てるために、\nここに出向してきているのですよね？」
1797 = "「Anh Urakami, anh được phái cử đến đây, là để xây dựng nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ở Ohimitera đúng không?」"
# 【浦上】
# display as 浦上
# JP: 「違いますよ、右田さん。私の仕事は、\n『適地に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を建てる』ことです」
1414 = "「Không phải đâu, anh Migita. Công việc của tôi là, 『Xây dựng nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ở một địa điểm phù hợp』.」"
# monologue
# JP: ざっくばらんに、という頭取指示に、\nある程度、浦上も寄せるつもりなのだろうか。
2200 = "Chỉ thị \"cứ thẳng thắn đi\" của chủ tịch, phải chăng Urakami cũng định tuân theo ở một mức độ nào đó."
# monologue
# JP: か細い指が、細いネクタイを左右に動かし、\nわずかに緩める。
2185 = "Những ngón tay thon gầy kéo chiếc cà vạt mảnh sang hai bên, nới lỏng ra một chút."
# 【浦上】
# display as 浦上
# JP: 「長期間安定的に、効率良く稼働できる工場というのは、\nそう簡単に建つものではありませんので、その調査を」
1975 = "「Một nhà máy có thể hoạt động ổn định, hiệu quả trong thời gian dài, không phải là thứ dễ dàng xây dựng được, nên tôi phải điều tra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「適地かどうか、\n判断するのがお仕事だということですか？」
1434 = "「Ý anh là, công việc của anh là phán đoán xem, đó có phải là địa điểm phù hợp hay không sao?」"
# 【浦上】
# display as 浦上
# JP: 「その通りです。不適と判断できるなら、そこから\n撤退することもまた、私の仕事の成果となります」
1773 = "「Đúng vậy. Nếu có thể phán đoán là không phù hợp, thì việc rút lui khỏi đó cũng là một thành quả trong công việc của tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1501 = "「Ra là vậy.」"
# 【浦上】
# display as 浦上
# JP: 「御一夜は、非常に有力な候補地として、\n現地コーディネーターからの推薦を受けています。が」
1831 = "「Ohimitera đã nhận được sự tiến cử từ điều phối viên địa phương, như một ứng cử viên vô cùng tiềm năng. Nhưng mà.」"
# monologue
# JP: 浦上が、メガネの向こうから僕を見る。
2530 = "Urakami nhìn tôi qua lăng kính."
# 【浦上】
# display as 浦上
# JP: 「はたして実際に適地であるのか、見極めるため――\n右田さん達の動きはむしろ、ありがたいですね、正直」
1893 = "「Để xác định xem nơi đây có thực sự phù hợp hay không—— Thành thật mà nói, động thái của nhóm anh Migita lại là một điều đáng mừng đấy.」"
# monologue
# JP: ……融資を行わぬようにすれば、\n工場誘致反対派を、いとも簡単に追い込めるのに――
1089 = "……Nếu không cho vay, thì có thể dễ dàng dồn phe phản đối thu hút nhà máy vào đường cùng——"
# monologue
# JP: 浦上がくれた答えのおかげで、\nその単純な疑問は綺麗に、解消できた。
2528 = "Nhờ câu trả lời của Urakami, thắc mắc đơn giản đó đã được giải đáp một cách trọn vẹn."
# 【双鉄】
# display as 雙鐵
# JP: 「非常に納得がいきました。\n率直なお答え、ありがとうございます」
1667 = "「Tôi đã hoàn toàn bị thuyết phục. Cảm ơn anh vì câu trả lời thẳng thắn.」"
# 【浦上】
# display as 浦上
# JP: 「いえいえ」
1416 = "「Không có gì.」"
# 【元忠】
# display as 元忠
# JP: 「はっはは、すっかり打ち解けた空気になったな」
1531 = "「Ha ha ha, bầu không khí đã trở nên cởi mở hẳn rồi nhỉ.」"
# monologue
# JP: 言われて、気付く。\n支店長室に入った時の警戒感を、僕は完全に失くしている。
2196 = "Được ông ấy nói, tôi mới nhận ra. Sự cảnh giác khi bước vào phòng giám đốc chi nhánh, tôi đã hoàn toàn đánh mất."
# monologue
# JP: これがいわゆる交渉術であるのなら、\n完全に、その術中に陥っている。
2331 = "Nếu đây là cái gọi là nghệ thuật đàm phán, thì tôi đã hoàn toàn rơi vào bẫy của nó rồi."
# 【元忠】
# display as 元忠
# JP: 「そこで提案なのだがね」
1963 = "「Thế nên ta có một đề nghị thế này.」"
# monologue
# JP: ぱらぱらと、事前に渡しておいた資料を、\n宝生元忠の指が繰る。
2345 = "Những ngón tay của Houshou Mototada lật lật xấp tài liệu tôi đã đưa trước đó."
# monologue
# JP: そうして、にやりと元忠は、\n僕の目の前、口を開いたライオンのような笑顔を浮かべる。
2542 = "Và rồi, ông Mototada nở một nụ cười nhếch mép, như một con sư tử há to miệng ngay trước mắt tôi."
# 【元忠】
# display as 元忠
# JP: 「担保を、ひとつ追加してみないかね？\nそうすれば満額四億――最低金利で貸してあげよう」
1890 = "「Cậu có muốn thêm một tài sản thế chấp nữa không? Nếu làm vậy, ta sẽ cho vay đủ 400 triệu——với lãi suất thấp nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ自身が担保って！！？」
1983 = "「Bản thân anh hai làm tài sản thế chấp á!!?」"
# monologue
# JP: 聞きつけられた。\nケチケチせずに、部屋からかければよかった。
2628 = "Bị nghe thấy mất rồi. Biết thế không nên keo kiệt, gọi điện từ phòng mình thì hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「すみません、[とう,1]義父さん。またかけ直します」
1700 = "「Xin lỗi cha. Con sẽ gọi lại sau ạ.」"
# monologue
# JP: 電話を切れば、\nぱたぱたという足音が近づいてくる。
2411 = "Vừa cúp máy, đã nghe thấy tiếng bước chân lạch bạch đang tiến lại gần."
# 【真闇】
# display as 真闇
# JP: 「なんねぇ、ひーちゃん、とんでもない声」
1624 = "「Gì thế bé Hi, tự dưng hét toáng lên.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇね！　にぃにぃが、なんか、\nにぃにぃが借金の担保でどうこうって」
1986 = "「Chị ơi! Anh hai, hình như, anh hai bảo sẽ làm tài sản thế chấp để vay tiền hay sao ấy.」"
# 【真闇】
# display as 真闇
# JP: 「んん？」
1567 = "「Hửm?」"
# monologue
# JP: 真闇姉までが来てしまった。\nしかも腰を下ろしてしまった。
2676 = "Đến cả chị Mayami cũng tới rồi. Hơn nữa còn ngồi xuống luôn."
# monologue
# JP: これは……このまま家族会議だ。\n抵抗をする余地などはない。
2557 = "Thế này là…… họp gia đình luôn rồi. Không có chỗ nào để phản kháng nữa."
# 【日々姫】
# display as 日日姬
# JP: 「で、で！？　にぃに！\nにぃにぃ自身が担保っていったいどぎゃんこつ！？」
1819 = "「Th, thế!? Anh hai! Bản thân anh hai làm tài sản thế chấp rốt cuộc là sao hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう大げさに心配するな。\n人身売買というような話ではない」
1492 = "「Đừng có lo lắng thái quá như vậy. Không phải là chuyện buôn bán người đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あったりまえばいっ！」
1934 = "「Đương nhiên rồi!」"
# monologue
# JP: 大いに怒る日々姫にむけて、\nとにもかくにも話のあらましを説明する。
2395 = "Trước sự tức giận tột độ của Hibiki, tôi đành phải giải thích sơ lược lại câu chuyện."
# monologue
# JP: と、真闇姉が、にこにこ僕に問うてくる。
2670 = "Khi đó, chị Mayami mỉm cười hỏi tôi."
# 【真闇】
# display as 真闇
# JP: 「ほんなら双ちゃん。\n双ちゃんいう担保は、どぎゃんして換金されると？」
1968 = "「Vậy Soutetsu này. Tài sản thế chấp là em thì sẽ được quy đổi thành tiền như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん」
1926 = "「À——ừm.」"
# monologue
# JP: 換金という直接的にすぎる言葉に、気付かされる。
1084 = "Một từ quá đỗi trực tiếp là \"quy đổi thành tiền\", khiến tôi nhận ra."
# monologue
# JP: 担保というのはつまるところ、\n処分価値という四文字と、変わらぬ意味であるのだと。
2433 = "Tài sản thế chấp suy cho cùng, cũng chẳng khác gì bốn chữ \"giá trị thanh lý\"."
# 【双鉄】
# display as 雙鐵
# JP: 「借金返済を滞らせた場合、隈元銀行に入行し、\n元忠さんのもとで経営を勉強するように――と」
1879 = "「Trong trường hợp chậm trễ trả nợ, tôi sẽ phải vào làm ở Ngân hàng Kumamoto, và học hỏi về quản lý kinh doanh dưới trướng ông Mototada——ông ấy bảo vậy.」"
# 【真闇】
# display as 真闇
# JP: 「無期限で？」
1811 = "「Vô thời hạn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「期限は特に言われなかった。\n“給料は、規定のとおりに払う”ということは伺った」
1780 = "「Ông ấy không nói rõ thời hạn. Chỉ bảo là \"Lương sẽ được trả đúng theo quy định\".」"
# 【真闇】
# display as 真闇
# JP: 「ふぅん？」
1532 = "「Hừm?」"
# monologue
# JP: 手元も体も表情も、\n真闇姉は少しも動かしてみせてくれはしない。
2582 = "Cả tay, cơ thể lẫn nét mặt, chị Mayami không hề cử động dù chỉ một chút."
# monologue
# JP: ただ、にこにこと――\n表情が見えぬ笑みの形に、顔を整えきっている。
2604 = "Chỉ cười mỉm—— Giữ nguyên một khuôn mặt cười không thể đoán được cảm xúc."
# 【真闇】
# display as 真闇
# JP: 「で？　双ちゃんはその申し出にどう答えたと？」
1820 = "「Vậy sao? Thế em đã trả lời lời đề nghị đó thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。その話はお受け出来んと、断った」
1555 = "「Vâng. Em đã từ chối, bảo là không thể nhận lời được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、なんねぇ、断ったんね」
1542 = "「A, gì vậy, anh từ chối rồi à.」"
# monologue
# JP: ほーっと、日々姫が長い息を吐き胸を撫で下ろす。\n真闇姉は、まったく表情を崩さない。
2471 = "Phù, Hibiki thở phào một hơi dài nhẹ nhõm. Chị Mayami thì vẫn không hề thay đổi nét mặt."
# 【真闇】
# display as 真闇
# JP: 「どぎゃんなわけで、そん話をお受けできんと？」
1809 = "「Vì lý do gì, mà em lại không thể nhận lời đề nghị đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。いや、これは、\nもっと早くに伝えておくべきことだったんだが――」
1554 = "「Vâng. À không, chuyện này, lẽ ra em nên nói cho mọi người biết sớm hơn mới phải——」"
# monologue
# JP: 折を見てなどとぼやぼやしてたら、\nすっかりと、伝える機会を逃してしまった。
2160 = "Cứ chần chừ đợi thời cơ, thế là để lỡ mất cơ hội nói ra lúc nào không hay."
# 【双鉄】
# display as 雙鐵
# JP: 「帝大を休学し、酒問屋の方も休ませてもらう条件として、\n僕は、[とう,1]義父さんといくつか約束をしているんだ」
1471 = "「Với điều kiện là bảo lưu kết quả học tập ở Đại học Đế quốc, và xin nghỉ việc ở xưởng rượu, em đã hứa với cha nuôi vài điều.」"
# 【日々姫】
# display as 日日姬
# JP: 「約束？」
1894 = "「Hứa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとつは期限。二年以内に結果を出すこと」
1997 = "「Thứ nhất là thời hạn. Trong vòng hai năm phải có kết quả.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふんふん」
1562 = "「Ừm ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その期限内に工場誘致を撤回できれば、\n見習い期間を終了し、独立を許すとも約束してもらった」
1874 = "「Nếu trong thời hạn đó có thể hủy bỏ việc thu hút nhà máy, cha hứa sẽ kết thúc thời gian học việc và cho phép em tự lập.」"
# 【日々姫】
# display as 日日姬
# JP: 「それは良か約束ばいっ！」
1933 = "「Đó là một lời hứa tuyệt vời đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。もったいないほど有り難いお話だ」
1558 = "「Ừm. Quả là một lời đề nghị đáng quý đến mức lãng phí.」"
# 【真闇】
# display as 真闇
# JP: 「で？」
1941 = "「Rồi sao nữa?」"
# monologue
# JP: 笑顔のままでの問いが重なる。
2314 = "Chị ấy vẫn giữ nụ cười trên môi và tiếp tục hỏi."
# 【真闇】
# display as 真闇
# JP: 「[さけてん,1]酒店さんは双ちゃんに、\nその他に何を約束させたと？」
1955 = "「Ông chủ tiệm rượu đó, đã bắt Sou-chan hứa thêm điều gì nữa?」"
# monologue
# JP: 酒店さん。\n父さんではなく、酒店さん。
2690 = "Ông chủ tiệm rượu. Không phải là bố, mà là ông chủ tiệm rượu."
# monologue
# JP: 真闇姉は、怒っている。\nその事実だけで、僕の背筋まで薄寒くなる。
2579 = "Chị Mayami đang tức giận. Chỉ riêng sự thật đó thôi cũng đủ làm sống lưng tôi lạnh toát."
# 【双鉄】
# display as 雙鐵
# JP: 「もうひとつだけ――\n期限内に、結果を出せなかった場合の条件を」
1940 = "「Chỉ còn một điều nữa thôi—— Đó là điều kiện trong trường hợp không đạt được kết quả đúng thời hạn.」"
# 【日々姫】
# display as 日日姬
# JP: 「結果を出せんかったらにぃにぃ、どうなると？」
1602 = "「Nếu không đạt được kết quả thì anh hai sẽ ra sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「結果を出せた場合の反対。僕の見習い期間は継続。\nくわえて、義父さんの選んだ相手との結婚をする」
1871 = "「Ngược lại với trường hợp đạt được kết quả. Thời gian thực tập của anh sẽ tiếp tục. Thêm vào đó, anh sẽ phải kết hôn với người mà bố nuôi chọn.」"
# 【日々姫】
# display as 日日姬
# JP: 「結婚っ！？　結婚って、それって――誰とっ！？\n父さんの選んだ相手って、誰ねっ！？」
1862 = "「Kết hôn á!? Kết hôn, ý anh là——với ai cơ!? Người mà bố chọn là ai vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからん。失敗するつもりは全く無いので、\n確認しようとも思わなかった」
1418 = "「Anh không biết. Vì anh hoàn toàn không có ý định thất bại, nên cũng không nghĩ đến việc xác nhận lại.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……あー……あ～～っ」
1549 = "「Aー……aー……a～～っ」"
# monologue
# JP: 安堵のような、あきれたような、あるいは失望したような。
2453 = "Giống như an tâm, giống như cạn lời, hoặc cũng giống như thất vọng."
# monologue
# JP: なんとも判断しがたい声を出しながら、\n日々姫はくるり、すがりつくように真闇姉を見る。
2472 = "Phát ra một âm thanh khó mà phán đoán được, Hibiki quay ngoắt lại, nhìn chị Mayami như thể muốn bám víu."
# 【真闇】
# display as 真闇
# JP: 「そいやけん、双ちゃんは断ったんね？　ゆーたらすでに、\n双ちゃんの身は抵当に入れられてしまっとりよるけん」
1582 = "「Vì vậy nên Sou-chan đã từ chối đúng không? Nói trắng ra thì, bản thân Sou-chan đã bị đem ra làm tài sản thế chấp mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
1783 = "「Đúng là vậy.」"
# 【真闇】
# display as 真闇
# JP: 「そしたら、なんて？　[もとただ,1]元忠さんは」
1967 = "「Vậy thì, ông Mototada nói sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「かんらかんらと大笑いして――\n『ならば私が、[けんぞう,1]謙三と話をつけておこう』と」
1447 = "「Ông ấy cười lớn ha hả—— 『Nếu vậy thì tôi sẽ đi nói chuyện với Kenzo』」"
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃん話ばつけるつもりねっ！？」
1448 = "「Ông ta định nói chuyện kiểu gì chứ!?」"
# monologue
# JP: また怒声。\n今日の日々姫は、ひさびさの百面相を披露してくれている。
2255 = "Lại là tiếng quát tháo. Hibiki hôm nay đang thể hiện lại màn biểu cảm muôn màu muôn vẻ đã lâu không thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「その説明はなかったな。ただ、\n話をつけるから安心して担保になれ、とそればかりで」
1925 = "「Ông ấy không giải thích gì thêm. Chỉ bảo là sẽ đi nói chuyện nên cứ yên tâm mà làm tài sản thế chấp đi, chỉ vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「なんね！　父さんも、その元忠いうおっさんも、\nにぃにぃのこと、まるっきりモノ扱いしよって～っ」
1443 = "「Gì chứ! Cả bố lẫn cái ông chú Mototada đó, hoàn toàn coi anh hai như đồ vật vậy～っ」"
# monologue
# JP: （モノ扱い……そうか、モノ扱いか）
2734 = "（Coi như đồ vật…… Ra vậy, coi như đồ vật sao.）"
# monologue
# JP: そうされている自覚がなかった。\n特段の怒りも感じなかった。
2418 = "Tôi không hề có tự giác rằng mình đang bị đối xử như vậy. Cũng chẳng cảm thấy tức giận gì đặc biệt."
# monologue
# JP: 日々姫が僕のため怒ってくれているのをみれば、\n自分自身の感覚が、どこかずれているのか少し不安になる。
2562 = "Nhìn Hibiki đang tức giận thay cho mình, tôi hơi lo lắng không biết có phải cảm giác của bản thân có chỗ nào đó bị lệch lạc rồi không."
# 【真闇】
# display as 真闇
# JP: 「稀咲ちゃんは、なんか言いよったと？」
1855 = "「Bé Kisaki có nói gì không?」"
# 【日々姫】
# display as 日日姬
# JP: 「！！！」
1998 = "「!!!」"
# monologue
# JP: びょん、と日々姫が身を硬くする。
2474 = "Hibiki giật nảy mình, cơ thể cứng đờ lại."
# monologue
# JP: なんで稀咲の話をここで？　と思いはするが、\n記憶と口とは疑問に止まらず、素直な答えを折り返す。
2709 = "Tại sao lại nhắc đến chuyện của Kisaki ở đây? Dù nghĩ vậy, nhưng ký ức và khuôn miệng tôi không dừng lại ở sự nghi ngờ, mà thẳng thắn đưa ra câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「いいや……特には何も。\n何も、言ってなかったかと思う」
1407 = "「Không…… Không có gì đặc biệt cả. Anh nghĩ là em ấy không nói gì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ～～っ」
1550 = "「A～～っ」"
# monologue
# JP: また妙な声。長い息。\nそれに重なる、ぽんという音。
2312 = "Lại là một âm thanh kỳ lạ. Một tiếng thở dài. Hòa cùng với đó là một tiếng bộp."
# 【真闇】
# display as 真闇
# JP: 「ほんならね、双ちゃん」
1707 = "「Nếu vậy thì, Sou-chan à.」"
# monologue
# JP: 真闇姉だ。\n自らの正座の膝を、叩いた音だ。
2250 = "Là chị Mayami. Đó là tiếng chị ấy vỗ vào đầu gối khi đang ngồi quỳ."
# 【真闇】
# display as 真闇
# JP: 「もうひとつ。\n双ちゃんにお姉ちゃんから、選択肢をあげよーねぇ」
1606 = "「Còn một điều nữa. Chị sẽ cho Sou-chan một lựa chọn nhé.」"
# monologue
# JP: 筆と墨、それから半紙。
2607 = "Bút lông, mực, và giấy bán chỉ."
# monologue
# JP: 流れるように用意を整え、\n真闇姉は、さらさらと何かを書きつける。
2576 = "Chị Mayami chuẩn bị mọi thứ một cách trôi chảy, và nhanh thoăn thoắt viết thứ gì đó."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんがここにサインをしたら、二億円、\nうちから双ちゃんに、無利子無担保で貸したげますけん」
1515 = "「Nếu Sou-chan ký vào đây, hai trăm triệu yên, chị sẽ cho Sou-chan vay không lãi suất, không cần thế chấp.」"
# monologue
# JP: あまりに気前の良い申し出に――
2715 = "Trước lời đề nghị quá đỗi hào phóng này——"
# monologue
# JP: いや、汰斗さんの相続のときのあの騒動の苦い記憶に、\n声が、ぎくしゃくと詰まってしまう。
2409 = "Không, vì ký ức cay đắng về vụ lùm xùm khi thừa kế tài sản của ông Taito, giọng nói của tôi trở nên lắp bắp, nghẹn lại."
# 【双鉄】
# display as 雙鐵
# JP: 「それは――助かる。助かる、が――」
1923 = "「Thế thì——giúp ích được nhiều lắm. Giúp được nhiều lắm, nhưng——」"
# 【真闇】
# display as 真闇
# JP: 「『が』、なんね？」
1111 = "「『Nhưng』, gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1409 = "「Không——」"
# monologue
# JP: とても言えない。\n『そんな迷惑はかけられない』、など。
2402 = "Tôi không thể nào thốt nên lời. Những câu như 『Em không thể gây rắc rối như vậy được』."
# monologue
# JP: すでにして、迷惑をかけすぎるほどかけている上――\nそうした意地を張れる余裕も、まるで無いから。
2390 = "Tôi vốn dĩ đã gây ra quá nhiều rắc rối rồi—— Hơn nữa, tôi cũng chẳng còn dư dả để mà cố chấp như vậy."
# 【真闇】
# display as 真闇
# JP: 「『いや』、なんね？」
1109 = "「『Không』, gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1116 = "「…………」" 
# monologue
# JP: そして聞けない。『何故か』とも。\n聞けば、真闇姉にとんでもない失礼を働くことになる。
2616 = "Và tôi cũng không thể hỏi. Rằng 『Tại sao』. Nếu hỏi, tôi sẽ vô cùng thất lễ với chị Mayami."
# monologue
# JP: だけれど、疑問は否めない。\nだって――僕は――義理の弟にすぎないのだから。
2206 = "Thế nhưng, tôi không thể phủ nhận sự hoài nghi. Bởi vì——tôi——chỉ là một đứa em trai nuôi mà thôi."
# monologue
# JP: （二億となると――真闇姉にとってでも、\n右から左にぽんと出る額であるはずがない）
2729 = "（Hai trăm triệu yên——ngay cả với chị Mayami, đó cũng không phải là số tiền có thể dễ dàng lấy ra được.）"
# monologue
# JP: から、躊躇する。\n身動きを、判断をまるで出来なくなる。
2428 = "Vì vậy, tôi do dự. Tôi hoàn toàn không thể nhúc nhích, cũng không thể đưa ra phán đoán."
# 【真闇】
# display as 真闇
# JP: 「ね、双ちゃん？」
1954 = "「Nè, Sou-chan?」"
# monologue
# JP: 硬直する僕へ、\n落ち着いた声が問いかけてくる。
2150 = "Một giọng nói điềm tĩnh cất lên hỏi tôi, người đang cứng đờ."
# monologue
# JP: にこにことした笑顔を消して、\n真闇姉は、ごく穏やかな表情だ。
2581 = "Nụ cười tươi tắn thường ngày biến mất, chị Mayami mang một vẻ mặt vô cùng bình thản."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんが困っとったら、\n双ちゃん、おねーちゃんのこと助けてくれると？」
1601 = "「Nếu chị gặp khó khăn, Sou-chan, em có giúp chị không?」"
# monologue
# JP: 不意の質問。
2387 = "Một câu hỏi bất ngờ."
# monologue
# JP: 答えに迷う余地すらもない、\n真闇姉の問いとも思えぬほど単純な。
2667 = "Thậm chí chẳng có chỗ cho sự do dự trong câu trả lời, đơn giản đến mức không giống một câu hỏi của chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。全力を尽くし助けるとも」
1832 = "「Đương nhiên rồi. Em sẽ dốc toàn lực để giúp đỡ.」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、同じ。\nそれだけのこと」
1605 = "「Chị cũng vậy.\nChỉ vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「私も！　私も絶対絶対助けるけんっ！」
1652 = "「Em cũng vậy! Em cũng tuyệt đối tuyệt đối sẽ giúp!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1536 = "「A——」"
# monologue
# JP: なんだ、と肩から力が抜ける。\n僕は馬鹿だと、今更ながら理解する。
2369 = "Ra là vậy, sức lực trên vai tôi chợt buông lỏng. Bây giờ tôi mới nhận ra, mình đúng là một kẻ ngốc."
# monologue
# JP: 義理だなんだにこだわっていた、\nそれを一番嫌っていたのは――僕だったのかと。
2611 = "Cứ mãi để tâm đến chuyện nghĩa lý này nọ, người ghét điều đó nhất——hóa ra lại là tôi sao."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、日々姫――」
1840 = "「Chị Mayami, Hibiki——」"
# monologue
# JP: だから、自然と。\nそこに置かれた――差し出されない、筆を取る。
2429 = "Vì thế, một cách tự nhiên. Tôi cầm lấy cây bút được đặt ở đó——dù không ai đưa cho tôi."
# monologue
# JP: “必ず、全額を返すから”\n言いかけて、けれども、口には出さずに呑み込む。
2152 = "“Em nhất định sẽ trả lại toàn bộ” Tôi định nói vậy, nhưng lại nuốt vào trong, không thốt ra thành lời."
# monologue
# JP: （妙に飾るな。素直になれ。\n今、僕に満ちているのは、金の心配などではなかろう？）
2724 = "（Đừng tô vẽ kỳ cục nữa. Hãy thành thật đi. Điều lấp đầy tâm trí tôi lúc này, đâu phải là nỗi lo về tiền bạc cơ chứ?）"
# monologue
# JP: 自覚をすれば、\n余計な全てが削げ落ちて、気持ちひとつが綺麗に残る。
2155 = "Khi đã nhận ra, mọi thứ thừa thãi đều rơi rụng, chỉ còn lại một cảm xúc duy nhất thật đẹp đẽ."
# monologue
# JP: 残った気持ちが、自然と、口から溢れ出る。
2672 = "Cảm xúc còn lại ấy, tự nhiên tuôn trào khỏi khóe môi."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
1900 = "「Cảm ơn mọi người.」"
# monologue
# JP: 真闇姉が作ってくれた選択肢へと。\n真闇姉の墨痕が見事に残る半紙へとサインする。
2305 = "Vào lựa chọn mà chị Mayami đã tạo ra cho tôi. Tôi ký tên lên tờ giấy bán chỉ còn lưu lại nét mực tuyệt đẹp của chị Mayami."
# monologue
# JP: 右田双鉄――その四文字の、\n右田、双鉄――それぞれにいっぱいの思いを込めて。
2280 = "Migita Soutetsu——bốn chữ ấy, Migita, Soutetsu——tôi dồn hết tâm tư vào từng chữ một."
