[script]
# lines: 417 
# 【れいな】
# display as 玲奈
# JP: 「本当に――本当にごめんなさいでした」
1836 = "「Thực sự―― thực sự em vô cùng xin lỗi ạ」"

# monologue
# JP: レールショップに着くやいなやで、\nれいなに頭を下げられる。
2393 = "Ngay khi vừa đến Rail Shop,\\ntôi đã thấy Reina cúi đầu xin lỗi."

# monologue
# JP: 一生懸命――そんな言葉しか浮かんでこない、\n不器用で誠実な一礼だ。
2443 = "Một cái cúi đầu vụng về nhưng đầy chân thành,\\nkhiến tôi chẳng thể nghĩ ra từ nào khác ngoài \"hết lòng\"."

# 【双鉄】
# display as 雙鐵
# JP: 「気に病むな。れいなの機能面のことは、\nれいな自身にもどうにもできんことなのだから」
1491 = "「Đừng bận tâm nữa. Những vấn đề về mặt chức năng của Reina,\\nngay cả bản thân Reina cũng đâu thể tự mình làm gì được」"

# monologue
# JP: 出力アップ改造にともなう、安定性の低下。\nそのため発生してしまう居眠り。
2446 = "Sự giảm sút tính ổn định đi kèm với việc nâng cấp công suất.\\nĐó là nguyên nhân dẫn đến những cơn buồn ngủ đột ngột."

# monologue
# JP: それは全て、いうなればれいなにとっては、\n「押し付けられた負担」でしかないはずだ。
2666 = "Tất cả những điều đó, nói cách khác,\\nchẳng qua chỉ là \"gánh nặng bị áp đặt\" lên vai Reina mà thôi."

# 【れいな】
# display as 玲奈
# JP: 「けど、そうてつさんと、ハチロクさんがいなかったら、\nれいな……」
1523 = "「Nhưng mà, nếu không có anh Soutetsu và chị Hachiroku ở đó,\\nem……」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕らはいた。事故は最低限のもので済んだ。\n逆に僕らがいなければ事故は発生しなかったかもしれん」
1463 = "「Nhưng thực tế là bọn anh đã ở đó. Tai nạn đã được giảm thiểu đến mức tối đa.\\nNgược lại, nếu không có bọn anh ở đó, biết đâu tai nạn đã chẳng xảy ra」"

# 【れいな】
# display as 玲奈
# JP: 「そんなこと」
1643 = "「Chuyện đó làm sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「あるかもしれんのだ。凪の修行熱に火をつけたのは、\nほかならぬ僕だったという話だしな」
1838 = "「Có thể xảy ra lắm chứ. Dù sao thì người châm ngòi cho ngọn lửa nhiệt huyết tập luyện của Nagi\\nkhông ai khác chính là anh mà」"

# 【れいな】
# display as 玲奈
# JP: 「…………」
1116 = "「…………」"

# monologue
# JP: 納得している顔ではない。
2321 = "Vẻ mặt của em ấy trông vẫn chưa hề phục."

# monologue
# JP: が、僕の言葉を否定するなら、\n凪の責任を問うことになると、恐らくれいなも理解する。
2207 = "Nhưng nếu phủ nhận lời tôi nói, nghĩa là sẽ phải truy cứu trách nhiệm của Nagi,\\ncó lẽ Reina cũng hiểu rõ điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「あるいはこうとも考えられる。\n『この事故が起きなければ、後に大事故が起きていた』」
1965 = "「Hoặc chúng ta cũng có thể nghĩ thế này.\\n『Nếu tai nạn này không xảy ra lúc đó, thì sau này có thể đã có một tai nạn lớn hơn ập đến』」"

# 【れいな】
# display as 玲奈
# JP: 「あっ！」
1540 = "「A!」"

# monologue
# JP: こく、こく、こく。\nれいなが何度も何度も頷く。
2549 = "Gật, gật, gật.\\nReina gật đầu lia lịa hết lần này đến lần khác."

# monologue
# JP: あの後、緊急で行われた\x%l保線;#00ffc040;保線%l;#;点検――\nそれで出てきた問題点は、優に二千を超えたのだから。
2297 = "Sau đó, một cuộc kiểm tra\\x%l保線;#00ffc040;bảo trì đường ray%l;#; khẩn cấp đã được tiến hành――\\nvà số lượng sự cố được phát hiện ra đã vượt quá con số hai nghìn."

# 【双鉄】
# display as 雙鐵
# JP: 「このタイミングで、警告に近い形の事故を経験できた。\nこれはむしろ、本当に幸運なことだと僕は考える」
1586 = "「Tôi nghĩ việc chúng ta trải qua một vụ tai nạn mang tính cảnh báo vào đúng thời điểm này...\\nngược lại lại là một điều vô cùng may mắn」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおっしゃるとおりかと思います」
1650 = "「Tôi cũng nghĩ đúng như những gì Soutetsu-sama nói ạ」"

# monologue
# JP: しかつめらしく、ハチロクも同意の声を重ねる。
2221 = "Hachiroku nghiêm nghị lên tiếng đồng tình."

# 【ハチロク】
# display as 八六
# JP: 「もし、観光が盛りあがってからの事故でしたら、\n被害も、影響も、致命的なものとなったかもしれません」
1877 = "「Nếu tai nạn xảy ra sau khi hoạt động du lịch đã đi vào cao điểm,\\nthì thiệt hại và tầm ảnh hưởng của nó có lẽ sẽ là một đòn chí mạng」"

# monologue
# JP: またこっくりと、\nれいなは、さきほどより更に強く頷く。
2547 = "Reina lại gật đầu một cái,\\nlần này còn mạnh mẽ hơn cả lúc nãy."

# monologue
# JP: ポーレットは曖昧な表情のまま、それでも小さく頷いて、\n日々姫は動かず……難しい顔をし続けている。
2507 = "Paulette vẫn giữ vẻ mặt mơ hồ, nhưng rồi cũng khẽ gật đầu,\\ncòn Hibiki thì bất động... gương mặt cô ấy vẫn không giấu nổi sự trăn trở."

# 【双鉄】
# display as 雙鐵
# JP: 「今は、それが許される状況だ。悪いところは直せばいい。\n責任をもし感じるのなら――改善をもって果たせばいい」
1870 = "「Hiện tại, hoàn cảnh vẫn cho phép chúng ta làm điều đó. Chỗ nào hỏng thì sửa là được.\\nNếu em cảm thấy có trách nhiệm――thì hãy dùng hành động cải thiện để bù đắp lại」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、そうてつさん、ハチロクさん。\nれいな、わかりましたぁ！」
1752 = "「Dạ vâng, anh Soutetsu, chị Hachiroku.\\nReina hiểu rồi ạ!」"

# monologue
# JP: 明るい返事だ。\nれいなは切り替え、どうやら前を向けたらしい。
2161 = "Một câu trả lời đầy hoạt bát.\\nReina đã vực dậy tinh thần, có vẻ như cô bé đã có thể hướng về phía trước."

# monologue
# JP: が……ポーレットは――どうにも冴えぬ表情のまま、\nのろのろ、鞄から書類を取り出す。
2204 = "Nhưng... Paulette――với gương mặt vẫn không tài nào khá lên nổi,\\nchầm chậm lấy tập tài liệu từ trong túi xách ra."

# 【ポーレット】
# display as 波萊特
# JP: 「……これ、\x%l保線;#00ffc040;保線%l;#;の……\nこれで……最低限の見積もりです」
1134 = "「……Cái này là... về việc\\x%l保線;#00ffc040;bảo trì đường ray%l;#;...\\nĐây là... bản dự toán chi phí tối thiểu ạ」"

# monologue
# JP: 手にも声にも、力が無い。\n引きずられぬよう、ハキハキ答える。
2540 = "Cả bàn tay lẫn giọng nói của cô ấy đều không chút sức lực.\\nĐể không bị kéo theo bầu không khí đó, tôi dứt khoát trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「この短期間で、良く出してくれたな」
1858 = "「Trong khoảng thời gian ngắn thế này mà em đã chuẩn bị xong rồi, tốt lắm」"

# monologue
# JP: A4数枚の見積もりを受け取る。\n要整備とされた項目数に、まずまっさきに圧倒される。
2413 = "Tôi nhận lấy vài tờ báo giá A4.\\nSố lượng hạng mục cần bảo trì ngay lập tức khiến tôi bị choáng ngợp."

# monologue
# JP: 本線および引き込み線、\x%l枕木;#00ffc040;枕木%l;#;や\x%lバラスト;#00ffc040;バラスト%l;#;はもちろんのこと\n障害物除去、\x%lポイント;#00ffc040;ポイント%l;#;や信号の整備等、数えきれない程だ。
2356 = "Từ tuyến chính, đường tránh, cho đến \\x%l枕木;#00ffc040;tà vẹt%l;#; hay \\x%lバラスト;#00ffc040;đá ba-lát%l;#; là lẽ dĩ nhiên,\\ncho đến dọn dẹp chướng ngại vật, bảo trì \\x%lポイント;#00ffc040;ghi sắt%l;#; hay hệ thống tín hiệu... nhiều không kể xiết."

# 【双鉄】
# display as 雙鐵
# JP: 「む？\nこの、『湯医駅[さんかくせん,2]三角線新造』とはなんだ？」
1571 = "「Hử?\\nHạng mục 『Xây mới đường tam giác ga Yui』 này là sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……\nキハ[レイナナ,1]07は、\x%l運転台;#00ffc040;運転台%l;#;がどちらの面にもついてますよね？」
1957 = "「Dạ là...\\nKiha 07 có \\x%l運転台;#00ffc040;buồng lái%l;#; ở cả hai đầu đúng không anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1535 = "「Ừm」"

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;は、真横から見れば左右対称――\n左側の先端にも、右側の先端にも、\x%l運転台;#00ffc040;運転台%l;#;がついている。
2328 = "\\x%lキハ07;#00ffc040;Kiha 07%l;#; nếu nhìn từ bên hông thì sẽ thấy đối xứng trái phải ——\\ncả đầu bên trái lẫn đầu bên phải đều có \\x%l運転台;#00ffc040;buồng lái%l;#;."

# monologue
# JP: そう説明して、スイッチが入ってくれたのか、\nポーレットの声には力が戻る。
2332 = "Giải thích đến đó, dường như đã bắt được nhịp,\\ngiọng nói của Paulette đã lấy lại được sự tự tin."

# 【ポーレット】
# display as 波萊特
# JP: 「ですから、特別な整備とかなしでも、\n簡単に方向転換できます」
1688 = "「Thế nên, không cần chuẩn bị gì đặc biệt,\\nnó vẫn có thể đổi hướng một cách dễ dàng」"

# monologue
# JP: それはそうだ。\x%l自弁;#00ffc040;自弁%l;#;・\x%l単弁;#00ffc040;単弁%l;#;――\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルを外して歩けば、それでいい。
2686 = "Đúng là vậy. Chỉ cần tháo tay hãm \\x%l自弁;#00ffc040;hãm tự động%l;#; và \\x%l単弁;#00ffc040;hãm độc lập%l;#; ——\\ntức tay hãm \\x%lブレーキ;#00ffc040;phanh%l;#; rồi mang sang đầu bên kia là xong."

# monologue
# JP: 進行方向の\x%l運転台;#00ffc040;運転台%l;#;から、反対方向の\x%l運転台;#00ffc040;運転台%l;#;へと、\nポーレット達が移動すれば、移動した先を「前」にできる。
2276 = "Chỉ cần nhóm Paulette di chuyển từ \\x%l運転台;#00ffc040;buồng lái%l;#; hướng đi cũ sang \\x%l運転台;#00ffc040;buồng lái%l;#; ở hướng ngược lại,\\nnơi họ vừa chuyển đến sẽ trở thành phía \"trước\"."

# 【ハチロク】
# display as 八六
# JP: 「対して、[ハチロク,3]8620には\x%l運転台;#00ffc040;運転台%l;#;がひとつだけ。\nつまり――\x%l8620;#00ffc040;8620%l;#;には、明確な前後があるのです」
1872 = "「Ngược lại, đầu máy 8620 chỉ có duy nhất một \\x%l運転台;#00ffc040;buồng lái%l;#;.\\nNói cách khác —— \\x%l8620;#00ffc040;8620%l;#; phân biệt đầu đuôi rất rõ ràng」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうなるな。\n[ハチロクニイマル,3]8620には前後があり、キハ[レイナナ,1]07は、いわば両面が前方だ」
1548 = "「À. Ra là vậy.\\n8620 có trước sau rõ rệt, còn Kiha 07 thì nói cách cả hai đầu đều là phía trước」"

# monologue
# JP: ハチロクとポーレット、ふたりがほとんど同時に頷く。
2223 = "Hachiroku và Paulette, cả hai gần như đồng thời gật đầu."

# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;でもバック走行――逆進を出来なくはないのですが、\nいかんせん極端に見通しが悪く、危ないのです、単純に」
1105 = "「Mặc dù \\x%l8620;#00ffc040;8620%l;#; vẫn có thể chạy lùi —— tức là đi ngược hướng, nhưng tầm nhìn sẽ cực kỳ kém, nói đơn giản là rất nguy hiểm」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nそれで、御一夜駅には\x%l転車台;#00ffc040;[ターンテーブル,2]転車台%l;#;があるのだな？]
1499 = "「Ra thế.\\nĐó là lý do ga Onoyo có \\x%l転車台;#00ffc040;bàn quay toa xe%l;#; đúng không?」"

# monologue
# JP: 見学会のときに動かしているのを、僕も見た。\n線路の敷かれた、巨大な丸い回転テーブル。
2301 = "Tớ cũng từng nhìn thấy nó hoạt động trong buổi tham quan.\\nMột chiếc bàn xoay tròn khổng lồ có đặt sẵn đường ray."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;をあの上に乗せ、乗せたままぐるり回転させれば、\n望む方へと、\x%l運転台;#00ffc040;運転台%l;#;のある「前」を向けることが出来る。
2272 = "Đặt \\x%l8620;#00ffc040;8620%l;#; lên trên đó, rồi cứ thế xoay tròn một vòng,\\nlà có thể hướng \"phần đầu\" nơi có \\x%l運転台;#00ffc040;buồng lái%l;#; về phía mong muốn."

# 【ポーレット】
# display as 波萊特
# JP: 「逆に……多分、ターンテーブルがあったから、\n御一夜-湯医間に[ハチロクニイマル,3]8620を引いてきたんだと思います」
1671 = "「Ngược lại... Em nghĩ có lẽ chính vì có bàn xoay,\\nnên người ta mới dẫn con 8620 chạy tuyến Ohitoyo - Yui」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1535 = "「唔」" 

# monologue
# JP: あった、は過去形。\n御一夜駅には、ターンテーブルは現存している。
1082 = "\"Từng có\" là thì quá khứ.\\nỞ ga Ohitoyo, bàn xoay hiện vẫn còn tồn tại."

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、かつては湯医にもターンテーブルがあり、\nしかし、それは失われてしまったのだな？」
1435 = "「Nói cách khác, ngày xưa ở Yui cũng từng có bàn xoay,\\nnhưng giờ nó đã biến mất rồi đúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうです。でも、ターンテーブルの設置なんて、\n見積もりさえも出せないような額になりますから」
1734 = "「Đúng vậy ạ. Nhưng việc lắp đặt một bàn xoay mới\\nsẽ tốn một khoản chi phí lớn đến mức thậm chí không thể ước tính nổi」"

# 【双鉄】
# display as 雙鐵
# JP: 「理解した。ターンテーブルの代わりとなるのが、\nこの、『\x%l三角線;#00ffc040;三角線%l;#;』というものなのだな？」
1674 = "「Anh hiểu rồi. Vậy thứ thay thế cho bàn xoay\\nchính là cái gọi là 『\\x%l三角線;#00ffc040;đường tam giác%l;#;』 này phải không?」"

# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。双鉄様」
1775 = "「Chính xác là như vậy, thưa ngài Soutetsu」"

# monologue
# JP: 言ってハチロクは、単純極まる図を描き始める。
2646 = "Nói rồi, Hachiroku bắt đầu vẽ một sơ đồ vô cùng đơn giản."

# 【ハチロク】
# display as 八六
# JP: 「矢印方向に進んだ\x%l列車;#00ffc040;列車%l;#;は、\nまず、[サンカク]△の底辺を進み切ります」
1759 = "「\\x%l列車;#00ffc040;Đoàn tàu%l;#; di chuyển theo hướng mũi tên,\\ntrước tiên sẽ đi hết cạnh đáy của hình tam giác △」"

# 【ハチロク】
# display as 八六
# JP: 「そうなりましたら、そのまま左斜辺に逆進で進入、\n△の頂点を通り越すまで逆進を継続します」
1822 = "「Sau khi đi hết, tàu sẽ tiếp tục đi lùi thẳng vào cạnh bên trái,\\nvà duy trì đi lùi cho đến khi vượt qua đỉnh của hình tam giác △」"

# 【双鉄】
# display as 雙鐵
# JP: 「行って、戻って――そうか、そうすれば、\n右辺から元の線路には、前進で向きを変え復帰できる」
1935 = "「Đi tới rồi đi lui―― Ra vậy, nếu làm thế,\\ntàu có thể đổi hướng và quay trở lại đường ray cũ bằng cách tiến lên từ cạnh bên phải」"

# 【ハチロク】
# display as 八六
# JP: 「はい、こうなるわけですね」
1746 = "「Vâng, nó sẽ diễn ra như thế này đây ạ」"

# monologue
# JP: 最後に描かれた図を見れば、\n自分の理解が間違っていなかったことを確認できる。
2559 = "Nhìn vào sơ đồ được vẽ cuối cùng,\\ntôi có thể xác nhận rằng sự thấu hiểu của mình là không hề sai sót."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これならば元の線路に二本を増設するだけで、\n\x%l8620;#00ffc040;8620%l;#;を方向転換させられるようになるわけだな」
1502 = "「Ra là vậy, nếu thế này thì chỉ cần lắp thêm hai đường ray vào tuyến đường cũ,\\nlà đã có thể đổi hướng cho \\x%l8620;#00ffc040;8620%l;#; rồi」"

# 【ポーレット】
# display as 波萊特
# JP: 「基本、そうですね。\n……元からの線路にも、延伸は必要となっちゃいますが」
1589 = "「Về cơ bản thì đúng là vậy ạ.\\n……Tuy nhiên, đối với các tuyến đường ray cũ thì việc mở rộng cũng là cần thiết」"

# monologue
# JP: すぐさまポーレットが答える声には、\nしかし、さきほどまでの明快さは無い。
2512 = "Thế nhưng, trong giọng nói đáp lại ngay sau đó của Paulette,\\nkhông còn sự rõ ràng, dứt khoát như lúc nãy nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「湯医駅の周辺広くが御一夜鉄道の社有地ですから、\nターンテーブルより、グっと安く済みます……けど」
1805 = "「Khu vực xung quanh ga Yui phần lớn là đất thuộc sở hữu của Đường sắt Ohityo,\\nnên chi phí sẽ rẻ hơn rất nhiều so với việc làm bàn quay…… thế nhưng」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l三角線;#00ffc040;三角線%l;#;でグっと安くと抑えても――\nなお、総額ではここまでかかるものなのか」
1495 = "「Dù có tiết kiệm được một khoản lớn nhờ \\x%lđường tam giác;#00ffc040;đường tam giác%l;#; đi chăng nữa――\\nthì tổng chi phí rốt cuộc vẫn lên đến mức này sao」"

# monologue
# JP: 数字を見ればすぐさまに、\nポーレットの声が暗い理由に共感できる。
2424 = "Chỉ cần nhìn vào những con số, tôi đã lập tức\\nthấu hiểu được lý do đằng sau giọng điệu trầm xuống của Paulette."

# monologue
# JP: この額は――\n予想を遥かに、圧倒的に上回っている。
2673 = "Con số này――\\nvượt xa, áp đảo hoàn toàn so với những gì dự tính."

# 【ポーレット】
# display as 波萊特
# JP: 「あの、でも、その額……\n全部を用立てなくちゃいけないわけでもないんです」
1960 = "「À, nhưng mà, số tiền đó……\\nkhông có nghĩa là chúng ta phải tự mình chuẩn bị toàn bộ đâu ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　御一夜鉄道は赤字と聞いた気がしたが。\n市から、補助金でも引っ張れるのか？」
1569 = "「Hửm? Ta nhớ là đã nghe nói Đường sắt Ohityo đang thua lỗ mà.\\nCô định xin tiền hỗ trợ từ thành phố sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは、議会を通して臨時予算を編成できればです。\n――鉄道は公共性が高いですけど、それでも、やっぱり」
1927 = "「Chuyện đó chỉ khả thi nếu được thông qua hội đồng để lập ngân sách tạm thời.\\n――Đúng là đường sắt mang tính công cộng cao, nhưng dù vậy, quả nhiên vẫn……」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、議会にきちんと諮るべきだと考える。\n公私混同を疑われ、痛くも無い腹を探られてもな」
1655 = "「Tôi cũng nghĩ là chuyện này cần phải được thảo luận kỹ lưỡng tại hội đồng.\\nTránh để bị nghi ngờ tư lợi rồi chuốc lấy những lời đồn đoán vô căn cứ」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですよね」
1750 = "「Vâng. Đúng vậy ạ」"

# monologue
# JP: ほっとした息。
2322 = "Một tiếng thở phào nhẹ nhõm."

# monologue
# JP: ポーレットにかかる負担の範囲と仕事の重さとが、\nいかに厳しいものかがじんわり、伝わってくる。
2426 = "Tôi có thể cảm nhận được sâu sắc\\nphạm vi gánh nặng và áp lực công việc đang đè nặng lên vai Paulette khắc nghiệt đến nhường nào."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうなると――\n何故、見積もり全額を用立てずに済むのかがわからんな」
1465 = "「Nhưng nếu thế thì――\\nta vẫn chưa hiểu tại sao lại không cần phải chuẩn bị toàn bộ số tiền theo bảng báo giá」"

# 【ポーレット】
# display as 波萊特
# JP: 「倉庫費です。真闇さんが長年払ってくれていた」
1725 = "「Là chi phí kho bãi ạ. Chị Mayami đã chi trả khoản đó suốt nhiều năm qua」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか！　真闇姉は、\n『ずっと市に支払っていた』と言っていたが――」
1543 = "「À, ra vậy! Chị Mayami đã nói là\\n『vẫn luôn chi trả cho thành phố』, nhưng mà――」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、\x%l帝鉄;#00ffc040;帝鉄%l;#;が解体されて以降は、そのお金、\n支払先不明で市が預かる形になってたみたいです」
1717 = "「Vâng, từ sau khi \\x%l帝鉄;#00ffc040;Đế Thiết%l;#; bị giải thể, số tiền đó dường như\\nvẫn được thành phố tạm giữ dưới dạng chưa rõ bên tiếp nhận」"

# 【双鉄】
# display as 雙鐵
# JP: 「が、現在の倉庫の所有者――つまり御一夜鉄道が、\n正当な受取先であると認められたのだな？」
1461 = "「Nhưng giờ đây, chủ sở hữu hiện tại của nhà kho――tức là Đường sắt Oniyo,\\nđã được công nhận là bên tiếp nhận hợp pháp rồi phải không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです、ですから、株式会社化してからの分は、\nその全額を、時効もなしに受け取れます」
1744 = "「Đúng vậy ạ. Thế nên, phần tích lũy từ sau khi chúng ta cổ phần hóa\\nsẽ được nhận lại toàn bộ mà không bị áp dụng thời hiệu khởi kiện」"

# monologue
# JP: ポーレットの声にほんのわずかな張りが戻る。
2509 = "Giọng của Paulette đã lấy lại chút sinh khí."

# monologue
# JP: いや――違う、恐らくは、\n覚悟が声を、張り詰めさせた。
2168 = "Không――không phải, có lẽ chính\\nsự quyết tâm đã khiến giọng cô ấy trở nên đanh thép."

# 【ポーレット】
# display as 波萊特
# JP: 「奇跡的に軽傷者一名で済み、クレームも出ませんでした。\nけど、先日の事故は――あってはならないものでした」
1594 = "「Thật kỳ diệu là chỉ có một người bị thương nhẹ và không hề có khiếu nại nào.\\nThế nhưng, tai nạn hôm trước――là điều tuyệt đối không được phép xảy ra」"

# monologue
# JP: 全員が、無言のままに同意する。\n否定するなら――鉄道に係る資格など無い。
2431 = "Tất cả mọi người đều lặng im đồng ý.\\nNếu phủ nhận điều đó――thì không còn tư cách để làm việc liên quan đến đường sắt nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「ですので当然、\x%l保線;#00ffc040;保線%l;#;にかかる費用の全てを、\n御一夜鉄道株式会社が支払うつもりです。けど――」
1686 = "「Vì vậy, lẽ đương nhiên là Công ty Cổ phần Đường sắt Oniyo\\nsẽ chi trả toàn bộ chi phí dành cho việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Thế nhưng――」"

# monologue
# JP: ……累積された倉庫費を、\n\x%l保線;#00ffc040;保線%l;#;にかかる見積もり経費にそっくりあてる。
1095 = "……Dùng toàn bộ tiền thuê nhà kho tích lũy được\\nđể bù đắp vào khoản kinh phí dự tính cho việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#;."

# monologue
# JP: それでも、\x%l保線;#00ffc040;保線%l;#;にかかる費用は、まだ大幅に不足する。
2242 = "Dù vậy, chi phí cần thiết cho việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; vẫn còn thiếu một khoảng rất lớn."

# 【双鉄】
# display as 雙鐵
# JP: 「ざっと、四億といったところか」
1617 = "「Sơ bộ thì... khoảng bốn trăm triệu yên nhỉ」"

# 【ハチロク】
# display as 八六
# JP: 「四億――ですか」
1573 = "「Bốn trăm triệu――yên sao ạ?」"

# monologue
# JP: ハチロクの顔までもが曇りはじめる。
2675 = "Đến cả gương mặt của Hachiroku cũng bắt đầu u ám đi."

# monologue
# JP: レールショップや酒蔵の手伝い、見学会などの経験から、\nどうやら現在の貨幣価値を理解するようになったらしい。
2310 = "Từ những kinh nghiệm khi phụ giúp ở cửa hàng lưu niệm, xưởng rượu, hay các buổi tham quan,\\ncó vẻ như cô ấy đã phần nào hiểu được giá trị tiền tệ thời nay."

# 【ハチロク】
# display as 八六
# JP: 「用立てるのは、かなり厳しそうな額ですね」
1721 = "「Số tiền cần chuẩn bị có vẻ là một con số vô cùng lớn đấy ạ」"

# monologue
# JP: ハチロクの言葉に頷き返し、ポーレットの目は僕へ向く。
2508 = "Gật đầu đồng ý với những lời của Hachiroku, ánh mắt của Paulette hướng về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「その額になると、もう借り入れるしかありません。\nですから、御一夜鉄道の設備の一部を担保にすることを」
1896 = "「Với số tiền lớn đến mức đó, chúng ta không còn cách nào khác ngoài đi vay.\\nVì vậy, việc dùng một phần trang thiết bị của Đường sắt Onight làm tài sản thế chấp...」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはダメだ。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派たる銀行に、\n反対派の本丸である御一夜鉄道の生命線を握らせるのは」
1928 = "「Không được làm thế.\\x%lエアクラ;#00ffc040;Hãng hàng không%l;#; là bên ngân hàng ủng hộ việc thu hút nhà máy,\\nnếu để họ nắm giữ huyết mạch của Đường sắt Onight — thành trì của phe phản đối — thì nguy to」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなんっ！　稀咲センパイは、借金を盾に\n無理難題を押し付けるような人じゃなかっ！」
1644 = "「Không có chuyện đó đâu! Senpai Kisaki không phải là người\\nsẽ dùng nợ nần làm lá chắn để ép buộc người khác làm những việc vô lý đâu ạ!」"

# monologue
# JP: ほとんど反射で飛び出たような強い声。\n日々姫の純粋な思いを感じる。
2597 = "Một giọng nói mạnh mẽ thốt ra gần như là phản xạ tự nhiên.\\nTôi có thể cảm nhận được những suy nghĩ thuần khiết của Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が言うなら、稀咲個人はそうだろう。\nが、組織としての銀行となれば、話は別だ」
1705 = "「Nếu Hibiki đã nói vậy thì cá nhân Kisaki có lẽ là người như thế.\\nNhưng một khi đã là ngân hàng với tư cách một tổ chức, câu chuyện sẽ hoàn toàn khác」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
1117 = "「……」"

# monologue
# JP: 怒声一転。また不機嫌に日々姫がむっつりと黙りこむ。\nこういう話になることを、恐らく察していたのだろう。
2376 = "Tiếng quát tháo vừa dứt. Hibiki lại lầm lì im lặng đầy vẻ khó chịu.\\nCó lẽ cô ấy đã lờ mờ đoán trước được cuộc trò chuyện sẽ đi theo hướng này."

# monologue
# JP: そうでありながら、離席もせずに話を聞いていてくれる。\nその誠実さを、僕とて無為にするつもりはない。
2482 = "Dù vậy, cô ấy vẫn không rời đi mà vẫn ở lại lắng nghe.\\nSự chân thành đó, tôi không hề có ý định lãng phí nó."

# 【ポーレット】
# display as 波萊特
# JP: 「でも――御一夜鉄道の資産以外で、\nそんなに大きな担保になるようなものなんて」
1520 = "「Nhưng mà―― ngoài tài sản của Đường sắt Onight ra,\\nlàm gì còn thứ gì có giá trị lớn đến thế để làm tài sản thế chấp chứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ある。僕の\x%lエアクラ;#00ffc040;エアクラ%l;#;だ」
1754 = "「Có đấy. Là %lエアクラ;#00ffc040;tàu bay%l;#; của anh」"

# 【日々姫】
# display as 日日姬＆波萊特
# JP: 「にぃにっ！？」\n「ええっ！？」
1984 = "「Anh hai!?」\\n「Hả!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビならば、すでに了解済みだ。\nあれは僕を信じている。担保になると言ってくれている」
2004 = "「Nếu là Navi thì cô ấy đã đồng ý rồi.\\nCô ấy tin tưởng anh. Cô ấy nói rằng có thể dùng nó làm tài sản thế chấp」"

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ、でも――それって、そんな」
1959 = "「Nhưng mà, chuyện đó―― sao có thể như thế được」"

# 【日々姫】
# display as 日日姬
# JP: 「線路を悪いまま放っておいたのは御一夜鉄道ばいっ！\nなんでにぃにが、そこまでするとっ！？」
1731 = "「Để đường ray xuống cấp như thế là lỗi của Đường sắt Onight mà!\\nTại sao anh hai lại phải làm đến mức đó chứ!?」"

# monologue
# JP: 怒りのあまりか、日々姫は立ち上がってまで抗議してくる。
2299 = "Vì quá tức giận, Hibiki thậm chí đã đứng phắt dậy để phản đối."

# monologue
# JP: 痛烈な批判の筈なのに、ポーレットもまた、\n日々姫の声に同意するように頷いている。
2479 = "Dù đó là một lời chỉ trích gay gắt, Paulette vẫn gật đầu như thể đồng tình với tiếng nói của Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫は、ナビを嫌っていたのではなかったか？」
1130 = "「……Chẳng phải Hibiki từng ghét Navi lắm sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「好かんよ。にぃにの保護者づらしよるけん。\nけど！　それとこれとは話が別ばいっ！」
1723 = "「Không thích đâu. Vì cô ta cứ làm như thể là người giám hộ của hai-ni vậy.\\nNhưng mà! Chuyện đó với chuyện này là hai việc hoàn toàn khác nhau!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1728 = "「Vậy sao」"

# monologue
# JP: 優しく公正に育ったものだと、\n義理の兄として嬉しく感じる。
2317 = "Với tư cách là một người anh nuôi, tôi cảm thấy thật vui mừng khi thấy em ấy trưởng thành một cách dịu dàng và công minh như thế."

# 【双鉄】
# display as 雙鐵
# JP: 「だがな日々姫。ナビは――\nあれは、僕がここに戻った目的を忘れてはおらんのだ」
1456 = "「Nhưng mà Hibiki này. Navi thì――\\nCô ấy không hề quên mục đích quay trở lại nơi đây của anh đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「戻った目的って……\nそんなん、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の反対」
1575 = "「Mục đích quay lại sao……\\nChuyện đó,\\x%lエアクラ;#00ffc040;chẳng phải là phản đối%l;#; việc thu hút nhà máy máy bay sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「ではない。御一夜という、僕の第二の故郷を。\nその水資源と環境を穢させない――それが、僕の目的だ」
1411 = "「Không phải. Giữ cho Ohitoyo, quê hương thứ hai của anh, không bị vấy bẩn nguồn nước và môi trường―― Đó mới là mục đích của anh.」"

# monologue
# JP: 汰斗さんが僕を引き取ってくれなければ、\n僕はこの町で育てなかった。
2335 = "Nếu chú Taito không nhận nuôi tôi,\\ntôi đã không thể lớn lên ở thị trấn này."

# monologue
# JP: この町に来て、優しいひとたちに出会えなければ、\n行き所の無い憎しみが、僕の心をきっと腐らせ殺していた。
2336 = "Nếu không đến thị trấn này và gặp gỡ những con người nhân hậu nơi đây, sự thù hận không lối thoát chắc chắn đã làm thối rữa và giết chết con tim tôi rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「ナビは、そのことを理解している。\n故に、僕を守るため、担保となることを了解したのだ」
2007 = "「Navi hiểu rõ điều đó.\\nVì vậy, để bảo vệ anh, cô ấy đã chấp nhận biến mình thành tài sản thế chấp.」"

# 【れいな】
# display as 玲奈
# JP: 「どうしてそれが、\nそうてつさんを守るってことになるんですかあ？」
1808 = "「Tại sao chuyện đó\\nlại là bảo vệ anh Soutetsu cơ chứ ạ?」"

# monologue
# JP: 思いもかけぬ、れいなの問い。
2237 = "Câu hỏi của Reina vang lên đầy bất ngờ."

# monologue
# JP: 思っていても、口から出せずにいたことなのだろうか。\nポーレットと日々姫とは、つられたように小さく頷く。
2511 = "Có lẽ đó là điều họ luôn thắc mắc nhưng không thể thốt ra thành lời. Cả Paulette và Hibiki đều khẽ gật đầu như bị cuốn theo câu hỏi đó."

# 【双鉄】
# display as 雙鐵
# JP: 「無論、仮に工場誘致が強行され、クマ川が汚染され、\n御一夜の町が損なわれても、僕が死ぬようなことはない」
1834 = "「Dĩ nhiên, ngay cả khi việc thu hút nhà máy bị ép buộc thực hiện, sông Kuma bị ô nhiễm, \\nvà thị trấn Ohitoyo bị tổn hại, thì tôi cũng chẳng thể chết được」"

# monologue
# JP: そうですよねぇ、とれいなが頷く。
1079 = "Đúng vậy nhỉ, Reina gật đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、ナビは――僕が一番ダメだった時期からずっと、\n僕のことを見続け――見守り続けているのだ」
1469 = "「Nhưng Navi thì――từ khoảng thời gian tôi tồi tệ nhất cho đến tận bây giờ, \\ncô ấy vẫn luôn dõi theo――và bảo vệ tôi」"

# monologue
# JP: 確信している。\n断言できる。
2407 = "Tôi tin chắc là vậy. \\nCó thể khẳng định như thế."

# monologue
# JP: ある意味では、あの知恵ある機械は僕自身より、\n僕のことをよく知っていると。
2363 = "Theo một nghĩa nào đó, cỗ máy có trí tuệ ấy còn hiểu rõ về tôi \\nhơn cả chính bản thân tôi nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「あれの言う“僕の命”は、単に生命にとどまらぬ。\n僕を僕たらしめていると、あれが判断する全てが、命だ」
1608 = "「“Mạng sống của tôi” mà cô ấy nói không đơn thuần chỉ là sinh mạng. \\nTất cả những gì cô ấy phán đoán rằng đã tạo nên tôi của chính mình, đều là mạng sống」"

# 【日々姫】
# display as 日日姬
# JP: 「それならナビは……にぃに――ううん、兄さんが――\n工場誘致反対に、もしも失敗してしまったら――」
1973 = "「Nếu vậy thì Navi…… Niini――không, nếu như anh――\\nthất bại trong việc phản đối thu hút nhà máy thì――」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、\nナビの認める僕でなくなると判断したのだろうな」
2003 = "「Chắc cô ấy đã phán đoán rằng tôi \\nsẽ không còn là người mà Navi công nhận nữa rồi」"

# monologue
# JP: 無論、それは杞憂にすぎない。\nだから意図的に苦笑して、肩をすくめてまで見せる。
2552 = "Dĩ nhiên, đó chỉ là lo xa mà thôi. \\nVì vậy tôi cố ý cười trừ, thậm chí còn nhún vai cho em ấy xem."

# 【双鉄】
# display as 雙鐵
# JP: 「あれがどれほど心配性で過保護かならば、\n日々姫も知っているだろう？」
1979 = "「Cô ấy lo lắng và bảo bọc đến mức nào, \\nchẳng phải Hibiki cũng biết rõ rồi sao?」"

# monologue
# JP: 笑わせるつもりでそういえば、\n日々姫はしかし、神妙極まる顔になる。
2416 = "Cứ ngỡ nói vậy sẽ làm em ấy cười, \\nnhưng Hibiki lại lộ ra vẻ mặt vô cùng nghiêm túc."

# 【日々姫】
# display as 日日姬
# JP: 「うん。知ってる――知ってます。\nナビがどれだけ、兄さんのことを見てきたかなら」
1566 = "「Vâng. Em biết――em biết chứ. \\nBiết Navi đã dõi theo anh nhiều đến nhường nào」"

# monologue
# JP: 日々姫は、そのまま黙り込む。\nそこに静かに、ポーレットの声が滑りこんでくる。
2469 = "Hibiki cứ thế im lặng. \\nGiữa không gian đó, giọng nói của Paulette khẽ vang lên."

# 【ポーレット】
# display as 波萊特
# JP: 「でも、あの――話を巻き戻しちゃいますけど、\nこれは日々姫ちゃんも言ったとおりに御一夜鉄道の問題で」
1467 = "「Nhưng mà, xin lỗi――cho em quay lại chuyện lúc nãy một chút, \\nnhư Hibiki-chan đã nói, đây là vấn đề của đường sắt Ohitoyo」"

# 【双鉄】
# display as 雙鐵
# JP: 「同時に、僕の問題でもあるのだよ。ポーレット。\nゆえに、折衷案を、僕は提案しているつもりだ」
1527 = "「Đồng thời, đó cũng là vấn đề của tôi nữa, Paulette. \\nVì vậy, tôi mới đang đưa ra một phương án dung hòa đây」"

# 【ポーレット】
# display as 波萊特
# JP: 「折衷案ですか？」
1695 = "「Một phương án dung hòa sao ạ?」"

# monologue
# JP: 話が前後してしまったか。
2414 = "Câu chuyện có hơi lộn xộn trước sau rồi nhỉ."

# monologue
# JP: 最初からこうきりだしておけば、\n余計な話を聞かせずに済んだのかもしれん。
2325 = "Nếu ngay từ đầu ta đề xuất thế này,\\ncó lẽ đã không cần phải bắt cô nghe những chuyện dông dài rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ナビを担保に稀咲から四億を借り受けよう。\nそしてそのままの条件で、僕から御一夜鉄道に貸付ける」
1662 = "「Ta sẽ thế chấp Navi để vay Kisaki bốn trăm triệu.\\nSau đó, ta sẽ cho Đường sắt Onight vay lại với đúng các điều khoản đó」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1540 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「個々の取引を、それぞれに行う。\nただそれだけで、御一夜鉄道の独立性を維持できる」
1487 = "「Từng giao dịch sẽ được thực hiện riêng biệt.\\nChỉ cần như vậy thôi, tính độc lập của Đường sắt Onight sẽ được duy trì」"

# monologue
# JP: 僕の言葉に、ポーレットは軽々には頷かない。
2510 = "Trước những lời của tôi, Paulette không dễ dàng gật đầu ngay."

# 【ポーレット】
# display as 波萊特
# JP: 「でも……あの――」
1451 = "「Nhưng mà…… chuyện đó――」"

# monologue
# JP: 顔がどんどん、不安の色を濃くしていく。
2319 = "Gương mặt cô ấy ngày càng lộ rõ vẻ bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「返済を滞らせた場合のことなら、僕は厳しくとりたてる。\n間に僕がいようとも、ポーレットの責任は変わらんぞ？」
1599 = "「Nếu chậm trễ việc hoàn trả, ta sẽ đòi nợ rất gắt đấy.\\nDù có ta đứng giữa, trách nhiệm của Paulette cũng không thay đổi đâu?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！　そうか、そうですよね！！　最悪の場合、\nわたしが、御一夜鉄道を担保に新規にお金を借りれば」
1529 = "「Ơ? A! Phải rồi, đúng như vậy nhỉ!! Trong trường hợp xấu nhất,\\nem có thể dùng Đường sắt Onight làm tài sản thế chấp để vay một khoản mới」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、僕への返済はその資金を以って行われ、\n僕は銀行へ、無事の返済を果たせることとなるのだから」
1784 = "「Đúng vậy, khoản nợ của ta sẽ được thanh toán bằng nguồn vốn đó,\\nvà ta sẽ có thể hoàn trả cho ngân hàng một cách suôn sẻ」"

# monologue
# JP: 自分に負担があることを、まるで安堵するかのように、ほーっとポーレットが息を吐く。
2360 = "Như thể trút được gánh nặng khi bản thân cũng phải chịu trách nhiệm, Paulette thở phào nhẹ nhõm."

# 【双鉄】
# display as 雙鐵
# JP: 「むろん。返済を滞らせなどはしない。\n全てを上手く運ばせて、何一つさえ損なわせはせぬ」
1835 = "「Dĩ nhiên rồi. Ta sẽ không để việc hoàn trả bị trì trệ đâu.\\nTa sẽ vận hành mọi thứ thật trơn tru, không để tổn hại dù chỉ một chút」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。わたしも、最初からそのつもりです」
1564 = "「Vâng. Ngay từ đầu em cũng đã định như vậy rồi ạ」"

# 【れいな】
# display as 玲奈
# JP: 「れいなも、もっとがんばりますよぉ」
1824 = "「Reina cũng sẽ cố gắng nhiều hơn nữa đóぉ」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、常に、双鉄様とともに」
1665 = "「Và tôi, sẽ luôn luôn sát cánh bên ngài Soutetsu」"

# monologue
# JP: 次々、賛同してくれる声。
2652 = "Những tiếng nói đồng tình liên tiếp vang lên."

# monologue
# JP: それに一拍――二拍遅れて、\nほんのすこしだけスネたような声。
2706 = "Chậm hơn một――hai nhịp so với những người khác,\\nlà một giọng nói có chút dỗi hờn."

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにの好きにすればいいばい。\n御一夜が栄えることは、みんなの共通の希望やもん」
1137 = "「……Anh hai cứ làm theo ý mình đi.\\nMỹ Dạ hưng thịnh cũng là tâm nguyện chung của mọi người mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、この案で行かせてもらう」
1969 = "「Nếu vậy, hãy để tôi thực hiện theo phương án này」"

# monologue
# JP: 僕らの活動に口出しさせずに融資を得る。
2303 = "Chúng tôi sẽ nhận được khoản vay mà không để họ can thiệp vào các hoạt động của mình."

# monologue
# JP: 銀行も利子収入を得るのであるから、\nあとはその辺の折り合いをつければ、ことはなる。
2456 = "Ngân hàng cũng sẽ thu được lợi nhuận từ tiền lãi, nên chỉ cần tìm được tiếng nói chung về vấn đề đó, mọi chuyện sẽ thành công."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、銀行との付き合いは」
1791 = "「Paulette này, cô có mối quan hệ nào với ngân hàng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん、普通にはありますけど」
1833 = "「Dĩ nhiên là có, nhưng cũng chỉ ở mức bình thường thôi ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが良ければ、\nわたしから稀咲センパイに連絡とるばい」
1516 = "「Nếu anh hai đồng ý,\\nem sẽ liên lạc với tiền bối Kisaki cho」"

# monologue
# JP: きっぱり言い切る、まだスネた声。\n不機嫌にふくれ、赤らんだ頬。
2308 = "Lời nói quả quyết nhưng giọng điệu vẫn đầy vẻ hờn dỗi.\\nĐôi má cô ấy phụng phịu đỏ bừng vì không vui."

# monologue
# JP: それでも日々姫は、“頼む”といえばすぐさまに、\n携帯を取り出し電話をかける。
2245 = "Thế nhưng chỉ cần tôi bảo \"nhờ em nhé\", Hibiki liền lấy ngay điện thoại ra để gọi."

# 【日々姫】
# display as 日日姬
# JP: 「……これが一番、話の早かことになるけん」
1126 = "「……Làm thế này là nhanh nhất rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1116 = "「…………」" 

# monologue
# JP: 受付嬢が持ってきてくれたコーヒーを飲む。
2400 = "Tôi nhấp một ngụm cà phê do cô nhân viên lễ tân mang đến."

# monologue
# JP: 隈元銀行御一夜支店長室――\n宝生稀咲の仕事部屋は、広々として日当たりがいい。
2674 = "Phòng Giám đốc Chi nhánh Mỹ Dạ của Ngân hàng Kumamoto――\\nVăn phòng làm việc của Houshou Kisaki thật rộng rãi và ngập tràn ánh nắng."

# monologue
# JP: （計算なのか、そういう趣味か――）
2733 = "(Là do cô ta tính toán trước, hay chỉ đơn giản là sở thích như vậy đây...)"

# monologue
# JP: 三角形のセンターテーブル。装飾性の高い照明。\nサイドボードの上にはしかし、古びた大黒様の像。
2166 = "Một chiếc bàn trà hình tam giác. Hệ thống chiếu sáng mang tính trang trí cao.\\nTuy nhiên, phía trên tủ sideboard lại đặt một bức tượng Daikokuten cũ kỹ."

# monologue
# JP: ひどくミスマッチのようにも思えるし、\n『銀行らしい』といえば、いかにもなようにも思える。
2669 = "Cảm giác có vẻ cực kỳ lệch tông,\\nnhưng nếu nói là \"phong cách ngân hàng\" thì nghe cũng có vẻ hợp lý."

# 【浦上】
# display as ？？？
# JP: 「失礼します」
1693 = "「Xin phép cho tôi vào」"

# monologue
# JP: 先ほどの受付嬢の声ではないが、\n宝生稀咲の声とも違う。
2173 = "Đó không phải là giọng của cô nhân viên lễ tân lúc nãy,\\nnhưng cũng không phải giọng của Houshou Kisaki."

# monologue
# JP: 男性のものか女性のものか、\nそれすら判断つきかねる。
2352 = "Là giọng nam hay giọng nữ,\\nthậm chí còn khó mà phân biệt được."

# 【浦上】
# display as ？？？
# JP: 「お約束をいただきながら、\nお待たせしてしまい申し訳ございません」
1618 = "「Dù đã hẹn trước,\\nnhưng lại bắt quý khách phải chờ đợi thế này, tôi thật sự xin lỗi」"

# monologue
# JP: スーツ姿の、ひどく細身でメガネをかけた……\nというか、どこかで――
2194 = "Một người mặc âu phục, dáng người cực kỳ gầy gò và đeo kính...\\nMà khoan, hình như đã gặp ở đâu đó rồi thì phải――"

# monologue
# JP: ああ、そうだ。見学会の日、\n宝生稀咲と連れ立っていた男性だ。
2292 = "À, đúng rồi. Vào ngày tham quan,\\nđây là người đàn ông đi cùng với Houshou Kisaki."

# 【双鉄】
# display as 雙鐵
# JP: 「とんでもない、こんなに早く、\nご面会のお約束を頂けたこと、心より感謝しています」
1781 = "「Không sao đâu ạ, việc có thể hẹn gặp mặt sớm thế này,\\ntôi đã vô cùng biết ơn rồi」"

# 【浦上】
# display as ？？？
# JP: 「[ほうしょう,1]宝生も、ご面会を楽しみにしていたのですが、\nあいにく、緊急の支店長会議が入ってしまいまして」
1612 = "「Houshou cũng rất mong chờ cuộc gặp này,\\nnhưng không may lại có một cuộc họp chi nhánh khẩn cấp đột xuất」"

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、後日に改めたほうが？」
1970 = "「Nếu vậy, liệu chúng ta có nên đổi sang ngày khác không?」"

# 【浦上】
# display as ？？？
# JP: 「いえ、私が宝生の代理として、\nお話をお伺いするよう申し付けられております」
1423 = "「Dạ không cần đâu ạ, tôi đã được chỉ thị\\nsẽ thay mặt Houshou để lắng nghe câu chuyện của quý khách」"

# monologue
# JP: 言って、男は手慣れた様子で、礼儀正しく名刺を差し出す。
2647 = "Nói rồi, người đàn ông lịch thiệp đưa danh thiếp ra với phong thái vô cùng chuyên nghiệp."

# 【浦上】
# display as 浦上
# JP: 「私、宝生の秘書を務めております、[うらかみ,1]浦上と申します」
1679 = "「Tôi là Urakami, thư ký của Houshou」"

# 【双鉄】
# display as 雙鐵
# JP: 「頂戴いたします」
1673 = "「Tôi xin phép nhận ạ」"

# monologue
# JP: 両手で受けとり、確認する。
2425 = "Đón lấy bằng cả hai tay rồi kiểm tra."

# monologue
# JP: 浦上香月――香る月と書いてかづきと読むのか。\nんんっ？　――いや、待て。
2532 = "Urakami Kazuki―― Viết là Hương Nguyệt (Trăng thơm) nhưng lại đọc là Kazuki sao. \\nHửm? ―― Khoan đã."

# 【双鉄】
# display as 雙鐵
# JP: 「浦上様は、\nエアロ=クラフテック社の方でいらっしゃるのですね」
1801 = "「Ngài Urakami, \\nngài là người của công ty Aero-Craftech đúng không ạ?」"

# monologue
# JP: エアロ＝クラフテック社極東支局\n用地担当シニアマネージャー
2595 = "Giám đốc cấp cao phụ trách mặt bằng \\nChi nhánh Viễn Đông công ty Aero-Craftech"

# monologue
# JP: ――名刺の肩には、間違いなくそう書かれている。
1075 = "――Trên góc danh thiếp, rõ ràng đã ghi như vậy."

# 【浦上】
# display as 浦上
# JP: 「ええ、エアロ＝クラフテック社から出向し、\n宝生稀咲の秘書として勤務させていただいております」
1742 = "「Vâng, tôi được biệt phái từ công ty Aero-Craftech sang để đảm nhiệm vị trí thư ký cho tiểu thư Houshou Kisaki」"

# monologue
# JP: なるほど、つまりは、\n工場誘致推進のための、\x%lエアクラ;#00ffc040;エアクラ%l;#;社側の人間か。
2248 = "Ra là vậy, nói cách khác, \\nanh ta là người của phía %lAircra;#00ffc040;Aircra%l;#; nhằm thúc đẩy việc thu hút nhà máy sao."

# monologue
# JP: まして、御一夜外の人間となると、\n稀咲より厳しい交渉相手なのかもしれん。
2488 = "Hơn nữa, là một người từ bên ngoài Ohito, \\ncó lẽ anh ta còn là một đối thủ thương lượng đáng gờm hơn cả Kisaki."

# 【双鉄】
# display as 雙鐵
# JP: 「申し遅れました。わたくしは、右田一[さけてん,1]酒店の\n右田双鉄と申す者です」
1697 = "「Tôi xin lỗi vì đã giới thiệu muộn. Tôi là Migita Soutetsu \\nđến từ tiệm rượu Migita Ichi」"

# monologue
# JP: 名刺は、義父の酒問屋での物しか持ち合わせがない。\n差し出し、受け取ってもらうのを待ち、言葉を継ぎ足す。
2695 = "Danh thiếp thì tôi chỉ mang theo loại dùng ở đại lý rượu của cha nuôi. \\nTung ra, đợi anh ta nhận lấy rồi tôi tiếp lời."

# 【双鉄】
# display as 雙鐵
# JP: 「本日は、酒問屋の従業員としてではなく、\n御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;部長としてご相談に伺いました」
1657 = "「Hôm nay, tôi đến đây thảo luận không phải với tư cách là nhân viên của đại lý rượu, \\nmà là Trưởng bộ phận %lbảo trì đường ray;#00ffc040;bảo trì đường ray%l;#; của Đường sắt Ohito」"

# 【浦上】
# display as 浦上
# JP: 「御一夜鉄道に\x%l保線;#00ffc040;保線%l;#;部が出来たのですか。\nそれは、先日のアクシデントの影響で？」
1637 = "「Đường sắt Ohito đã thành lập bộ phận %lbảo trì đường ray;#00ffc040;bảo trì đường ray%l;#; rồi sao. \\nĐiều đó là do ảnh hưởng từ sự cố hôm trước à?」"

# monologue
# JP: 情報が早い。\nならば話も、早く済むものと考えよう。
2188 = "Nắm bắt thông tin nhanh thật. \\nNếu vậy thì có thể xem như câu chuyện sẽ được giải quyết sớm thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「はい。現在の御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;体制は、\n率直にいって十分なものではないと判断してのことです」
1735 = "「Vâng. Nói thẳng ra thì, quyết định này được đưa ra sau khi chúng tôi nhận định rằng hệ thống %lbảo trì đường ray;#00ffc040;bảo trì đường ray%l;#; hiện tại của Đường sắt Ohito vẫn chưa đủ đáp ứng」"

# 【浦上】
# display as 浦上
# JP: 「そうですか」
1748 = "「Vậy sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「より市民の皆様のお役に立つため、\n\x%l保線;#00ffc040;保線%l;#;強化、安全性の確保は必須と考えております」
1806 = "「Để có thể phục vụ người dân tốt hơn nữa, chúng tôi cho rằng việc tăng cường công tác \\n\\x%l保線;#00ffc040;bảo trì đường ray%l;#; và đảm bảo an toàn là điều tối cần thiết」"

# 【浦上】
# display as 浦上
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯を抱える御一夜では、\n鉄道の公共性は高いものと当行も評価しています」
1766 = "「Tại một nơi vẫn còn những vùng mà \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động như Ohitoyo, \\nngân hàng chúng tôi cũng đánh giá cao tính công ích của đường sắt」"

# monologue
# JP: 淡々とした浦上の声。
2525 = "Giọng nói của Uragami vô cùng thản nhiên."

# monologue
# JP: 意図が読みきれぬものならば、\n小細工を弄しても仕方あるまい。
2455 = "Nếu đã không thể thấu thấu được ý đồ của đối phương, \\nthì có giở chút mánh khóe vặt vãnh cũng chẳng ích gì."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。つきましては、\x%l保線;#00ffc040;保線%l;#;費用の\n一部をご融資いただきたく、ご相談にあがった次第です」
1990 = "「Xin cảm ơn ông. Chính vì vậy, tôi đến đây hôm nay là để thảo luận \\nvề việc xin hỗ trợ vay một phần chi phí \\x%l保線;#00ffc040;bảo trì đường ray%l;#;」"

# 【浦上】
# display as 浦上
# JP: 「おおまかなことは、宝生から私も伺っております。\n事前にお預かりさせていただいていた資料も拝見しました」
1669 = "「Những nét chính thì tôi cũng đã nghe từ Houshou rồi. \\nTôi cũng đã xem qua tài liệu được gửi trước đó」"

# monologue
# JP: 浦上はメガネを一度外して、\n神経質そうに布で拭き取り、またかけ直す。
2524 = "Uragami tháo kính ra một lần, \\nlau chùi nó một cách tỉ mỉ bằng một mảnh vải, rồi đeo lại lên mắt."

# 【浦上】
# display as 浦上
# JP: 「双鉄様の飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;ですが、\n担保価値は二億が妥当と判断します」
1980 = "「Về chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; dạng bay của cậu Soutetsu, \\nthì chúng tôi đánh giá giá trị thế chấp ở mức hai trăm triệu là hợp lý」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビ――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの換装が必要となるからですか？」
1583 = "「Là vì cần phải thay thế thiết bị định vị――\\n\\x%lエアクラ;#00ffc040;Aircra%l;#; Navi đúng không ạ?」"

# 【浦上】
# display as 浦上
# JP: 「その通りです。飛行型ナビの換装は最新技術ですので、\n相当なコストが掛かります」
1740 = "「Chính xác. Việc thay thế Navi cho dòng bay sử dụng công nghệ mới nhất, \\nthế nên sẽ tốn một khoản chi phí không hề nhỏ」"

# monologue
# JP: わかっているなら話が早いと言わんばかりの短い答え。
2190 = "Một câu trả lời ngắn gọn như muốn ám chỉ nếu đã hiểu rõ rồi thì nói chuyện sẽ nhanh hơn."

# monologue
# JP: 確かに、飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;のコストのほとんどが\n\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビのものと聞く。が――
2421 = "Đúng là nghe nói phần lớn chi phí của một chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; dạng bay đều nằm ở \\x%lエアクラ;#00ffc040;Aircra%l;#; Navi. Thế nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「機体そのものの価値とて、\nかなりあるかとは思うのですが」
1682 = "「Tôi nghĩ bản thân giá trị của thân máy bay \\nvẫn còn rất lớn chứ ạ」"

# 【浦上】
# display as 浦上
# JP: 「確かに。が、年式が経ちすぎています。\nくわえ、総飛行距離も、相当なものです」
1782 = "「Đúng là vậy. Tuy nhiên, đời máy đã quá cũ rồi. \\nThêm vào đó, tổng quãng đường bay tích lũy cũng đã là một con số rất lớn」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1535 = "「唔」" 

# monologue
# JP: そうか。ナビは自主的に、ひっきりなしに飛んでいる。\nが――それはもちろん、本来有り得ぬ運用方法なのだろう。
2349 = "Ra là vậy. Navi đang tự ý bay liên tục không ngừng nghỉ.\\nNhưng――đó tất nhiên là cách vận hành vốn dĩ không thể xảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことでしたら、納得できます。\nでは、仮に二億をお借しいただくとして、金利の方は」
1931 = "「Nếu đã là như vậy thì tôi có thể hiểu được.\\nVậy, giả sử như chúng tôi vay hai trăm triệu, còn về lãi suất thì sao ạ?」"

# 【稀咲】
# display as 稀咲
# JP: 「すみません右田さん、お待たせしてしまいました」
1631 = "「Xin lỗi anh Migata, tôi đã bắt anh phải chờ rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、お忙しいところお時間をありがとうございます」
1533 = "「Không sao đâu ạ, rất cảm ơn cô đã dành thời gian cho tôi dù đang bận rộn」"

# monologue
# JP: 宝生稀咲だ。会議とやらが終わったのか――\nそれとも、タイミングを見ていたのか。
2486 = "Là Houshou Kisa. Cuộc họp gì đó đã kết thúc rồi sao――\\nHay là cô ấy đã canh chừng thời điểm thích hợp?"

# 【稀咲】
# display as 稀咲
# JP: 「浦上と、どこまでのお話をされましたか？」
1645 = "「Anh đã nói chuyện với Urakami đến đâu rồi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、融資上限が二億と――」
1546 = "「Vâng, về việc hạn mức vay tối đa là hai trăm triệu và――」"

# 【元忠】
# display as ？？？
# JP: 「なにを[かしこ]畏まっている。\n二人とも、知らない仲でもあるまいし」
1473 = "「Sao lại phải câu nệ thế kia.\\nCả hai đứa đâu phải người xa lạ gì nhau」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1999 = "「！？」"

# monologue
# JP: おっさんだ。\nいきなり、おっさんが支店長室に入り込んできた。
2484 = "Một ông chú.\\nĐột nhiên, một ông chú bước thẳng vào phòng chi nhánh trưởng."

# 【浦上】
# display as 浦上＆稀咲
# JP: 「これは頭取」\n「仕事の邪魔はやめてくれないかな」
1882 = "「Ơ kìa Chủ tịch」\\n「Mong ông đừng cản trở công việc của chúng tôi được không」"

# 【双鉄】
# display as 雙鐵
# JP: 「頭取？」
1884 = "「Chủ tịch sao?」"

# monologue
# JP: 驚いた。\nならばこのおっさんが、宝生元忠、その人なのか。
2668 = "Tôi không khỏi ngạc nhiên.\\nNếu vậy thì ông chú này chính là Houshou Mototada, là người đó sao?"

# monologue
# JP: ……いや、確かに言われて見てみれば、\n身なりも容姿も整い、物腰も落ち着いてはいるのだが――
1087 = "……Không, đúng là nếu nhìn kỹ lại,\\nđầu tóc trang phục lẫn diện mạo đều tươm tất, phong thái cũng vô cùng điềm tĩnh, nhưng mà――"

# 【元忠】
# display as 元忠
# JP: 「おいおい御一夜支店長。\n頭取に対し、『やめてくれないかな』は無いだろう」
1551 = "「Này này Chi nhánh trưởng Ohitoyo.\\nĐối với Chủ tịch mà cô lại bảo 『đừng cản trở』 thì nghe không được đâu nhé」"

# 【稀咲】
# display as 稀咲
# JP: 「知らない仲でないなら畏まるな――と、\nそうおっしゃったのは頭取ご自身ですが？」
1112 = "「Chính Chủ tịch đã bảo là――\\nnếu không phải người xa lạ thì đừng có câu nệ cơ mà?」"

# 【元忠】
# display as 元忠
# JP: 「そうか！\nはっは、これは一本取られたな」
1930 = "「Ra là vậy!\\nHa ha, quả là bái phục, bái phục.」"

# monologue
# JP: かんらと笑って、おでこをパシン。
2184 = "Nói rồi ông cười ha hả, vỗ nhẹ vào trán một cái."

# monologue
# JP: 立場で人の何をはかれるわけでもないが――\nそれにしたって、頭取がこれはあまりにも気さくにすぎる。
2708 = "Địa vị chẳng thể dùng để đánh giá một con người——\\nnhưng dẫu có thế, một vị Thống đốc mà lại cởi mở đến mức này thì thật là quá xá."

# 【元忠】
# display as 元忠
# JP: 「では、ざっくばらんに行こう。\n双鉄君も、そのようにしてくれ」
1966 = "「Vậy thì cứ thẳng thắn với nhau đi.\\nCậu Soutetsu cũng cứ tự nhiên như thế nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。しかし――」
1715 = "「Vâng. Nhưng mà——」"

# 【元忠】
# display as 元忠
# JP: 「ざっくばらんに。\n知らん言葉ではないだろう？」
1114 = "「Đã bảo là thẳng thắn rồi mà.\\nĐâu phải từ ngữ gì xa lạ với cậu đâu đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あー」
1537 = "「A...」"

# monologue
# JP: そういわれても、かなり困る。
2671 = "Bị nói thế, tôi thực sự thấy khá bối rối."

# monologue
# JP: 目上、年上の人間に、敬語以外で話すことなど、\nほとんど経験が無いのだが――ああ、いや、そうか。
2350 = "Giao tiếp với bề trên hay người lớn tuổi mà không dùng kính ngữ thì\\ntôi hầu như chưa từng có kinh nghiệm—— à, không, phải rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「そうは言うけど、“知らないも同然の仲"だと思うんだ。\n僕と、稀咲――稀咲さんは」\n1899 = "「Chú nói thế, nhưng cháu nghĩ chúng cháu \"cũng chẳng khác gì người dưng\".\\nCả cháu và Kisa—— chị Kisa nữa.」"

# monologue
# JP: 遠い昔に、父さんと話していたあの感じ。
2362 = "Cái cảm giác khi trò chuyện với bố ngày xưa ấy."

# monologue
# JP: それをなんとか引張りだして、\n“ざっくばらん”を試みてみる。
2397 = "Tôi cố gắng khơi gợi lại nó\\nđể thử tỏ ra \"thẳng thắn\" xem sao."

# 【元忠】
# display as 元忠
# JP: 「なんだ、双鉄君は覚えてないのか。\n君が引き取られてすぐの頃、何度か会わせているのだが」
1442 = "「Gì chứ, cậu Soutetsu không nhớ sao.\\nHồi cậu mới được nhận nuôi, ta đã cho hai đứa gặp nhau vài lần rồi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「引き取られてすぐの頃――なら――」
1889 = "「Hồi mới được nhận nuôi—— nếu là lúc đó thì——」"

# monologue
# JP: 覚えていない。\nというか恐らく、僕は“会った”と認識してない。
2170 = "Tôi không nhớ gì cả.\\nHay nói đúng hơn, có lẽ lúc đó tôi còn chưa nhận thức được là mình \"đã gặp\" nữa."

# monologue
# JP: あのころの僕は全てを憎み、全てを妬み――\nけれどもそれを発散できず、ただただ内に籠っていたから。
2683 = "Vào thời điểm đó, tôi hận thù tất cả mọi thứ, đố kỵ với tất cả mọi thứ――\\nThế nhưng lại không thể giải tỏa được nó, mà chỉ biết lầm lũi thu mình vào bên trong."

# 【元忠】
# display as 元忠
# JP: 「覚えていなくて当然か？　まぁ、そうだろう。\n私とて思ったものだ、『この子は無理だ』と、正直、な」
1420 = "「Cháu không nhớ cũng là lẽ đương nhiên thôi nhỉ? Mà, cũng phải thôi.\\nNgay cả ta cũng từng nghĩ, nói thật lòng là, 『Thằng bé này chắc không qua khỏi rồi』」"

# monologue
# JP: 事情を知って、会っている。
2192 = "Biết rõ sự tình, và đã từng gặp mặt."

# monologue
# JP: そう暗示する――けれども明るいその声に、\n事情を少し、照らしだされたような気になる。
2182 = "Giọng nói đầy ám chỉ――thế nhưng lại vô cùng tươi sáng ấy,\\nnhư thể đang soi rọi một chút vào sự tình ẩn sau đó."

# 【双鉄】
# display as 雙鐵
# JP: 「なら――頭取――\n元忠さんは、汰斗さんの？」
1972 = "「Vậy thì――Thống đốc――\\nông Mototada là gì của anh Taito ạ?」"

# 【元忠】
# display as 元忠
# JP: 「[たいと,1]汰斗さんともお会いはしていた。\n私と[けんぞう,1]謙三とは、仲の良い学友だったからな」
1653 = "「Ta cũng từng gặp gỡ Taito rồi.\\nBởi vì ta và Kenzo vốn là những người bạn học rất thân thiết mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……[ちち,1]義父の」
1539 = "「A... của cha nuôi ạ.」"

# monologue
# JP: 思いもかけぬところでの、思いもかけぬ縁と感じる。
2563 = "Tôi cảm nhận được một mối nhân duyên vô cùng bất ngờ ở một nơi bản thân không hề nghĩ tới."

# 【双鉄】
# display as 雙鐵
# JP: 「ということは、\n稀咲さんと日々姫も、昔からの仲なのか？」
1971 = "「Nói như vậy nghĩa là,\\nKisaki và Hibiki cũng là bạn bè từ ngày xưa sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「稀咲でいいよ。\nボクも、双鉄と呼ばせてもらうから」
1519 = "「Cứ gọi là Kisaki được rồi.\\nTôi cũng xin phép được gọi cậu là Soutetsu nhé」"

# monologue
# JP: 口調はざっくばらんながらも、\nどこか突き放すように響く声。
2710 = "Cách nói chuyện tuy có phần bộc trực, xuề xòa,\\nnhưng giọng điệu lại mang chút gì đó xa cách, đẩy người khác ra xa."

# 【稀咲】
# display as 稀咲
# JP: 「日々姫とボクは、学園からさ。\n幼少期には会っていないね」
1664 = "「Tôi và Hibiki là bạn từ thời đi học thôi.\\nHồi nhỏ tụi này chưa từng gặp nhau đâu」"

# monologue
# JP: 言い切って、\nそれから稀咲は、眉根と瞳を少し顰める。
2591 = "Khẳng định chắc nịch,\\nvà rồi Kisaki khẽ nhíu mày, ánh mắt hơi trầm xuống."

# 【稀咲】
# display as 稀咲
# JP: 「だけど、ね、双鉄。ボクもようやく思い出した。\nボクとキミとは、幼いころに三度、会ってる」
1453 = "「Thế nhưng mà, Soutetsu này. Cuối cùng tôi cũng đã nhớ ra rồi.\\nTôi và cậu từng gặp nhau ba lần khi còn nhỏ đấy」"

# monologue
# JP: 再会を喜んでいる口調ではない。
2680 = "Giọng điệu ấy hoàn toàn không phải là đang vui mừng cho một cuộc hội ngộ."

# 【稀咲】
# display as 稀咲
# JP: 「三度とも、キミは一言も口をきかなかった。\n忘れないものだね。そういうことをされると、逆に」
1404 = "「Cả ba lần, cậu đều không hé môi lấy một lời.\\nĐúng là khó quên thật đấy. Khi bị đối xử như thế, người ta lại càng nhớ lâu hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは……昔のこととはいえ、失礼をした」
1932 = "「Đó là... Dù là chuyện ngày xưa, nhưng tôi đã thật thất lễ rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「いや、いいんだ。あまりに気になって調べて知ったから。\nキミが、大きな鉄道事故の被害者だということを」
1424 = "「いや、いいんだ。あまりに気になって調べて知ったから。\\nキミが、大きな鉄道事故の被害者だということを」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1561 = "「Ừm」"

# monologue
# JP: 再会を喜ぶ口調ではないが、稀咲の言葉は小気味いい。\n妙な遠慮が全くないから、こちらも構えず話ができる。
2707 = "Giọng điệu của cô ấy không hẳn là vui mừng vì được gặp lại, nhưng lời lẽ của Kisaki lại vô cùng dễ chịu.\\nChính vì không có sự khách sáo hay e dè kỳ lạ nào, nên tôi cũng có thể thoải mái trò chuyện mà không cần phải phòng bị gì cả."

# 【稀咲】
# display as 稀咲
# JP: 「それで、ボクは思ったんだよ。\n『余りに傷が深いと、人は生きたまま死ぬんだ』ってね」
1821 = "「それで、ボクは思ったんだよ。\\n『余りに傷が深いと、人は生きたまま死ぬんだ』ってね」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1727 = "「Đúng vậy nhỉ」"

# monologue
# JP: 頷きながら、驚いている。
2721 = "Đang gật đầu, nhưng trong lòng lại đầy kinh ngạc."

# monologue
# JP: 宝生稀咲は、その頃から――今よりずっと幼いころから、\nそこまで人を、理解していたものなのか、と。
2346 = "**Translation:**\n\n> 宝生稀咲は、その頃から――今よりずっと幼いころから、\\nそこまで人を、理解していたものなのか、と。\n\n**Vietnamese:**\n\n> Hóa ra ngay từ dạo đó――từ cái thuở còn thơ bé hơn bây giờ rất nhiều,\\n Houshou Kisaki đã thấu hiểu lòng người đến nhường ấy rồi sao."

# 【稀咲】
# display as 稀咲
# JP: 「そう感じて、ボクはキミへの興味を完全に失った。\nだから、今、ひどく驚いているんだ」
1648 = "「そう感じて、ボクはキミへの興味を完全に失った。\\nだから、今、ひどく驚いているんだ」"

# monologue
# JP: 物怖じを全くせぬ瞳。\n離れたままに、距離を詰められた感じを受ける。
2162 = "Đôi mắt hoàn toàn không chút e sợ.\\nTuy vẫn đứng cách xa, nhưng tôi lại có cảm giác như khoảng cách giữa cả hai vừa bị thu hẹp lại."

# 【稀咲】
# display as 稀咲
# JP: 「人を見る目には自信がある。けれどね、双鉄。\n赤井阿蘇神社でボクは、キミをキミとは気づけなかった」
1681 = "「Người khác thì ta tự tin nhìn không lầm được. Nhưng mà, Sotetsu à.\\nỞ đền Akai Aso, ta đã không thể nhận ra cháu chính là cháu」"

# monologue
# JP: ふっと、\n稀咲が力の抜けた笑みを浮かべる。
2371 = "ふっと、\\n稀咲が力の抜けた笑みを浮かべる。"

# 【稀咲】
# display as 稀咲
# JP: 「日々姫から、飽きるほどキミの話を聞いてたからかな？\n“日々姫の兄さん”が、まさかあの無愛想な少年だとも」
1730 = "「日々姫から、飽きるほどキミの話を聞いてたからかな？\\n“日々姫の兄さん”が、まさかあの無愛想な少年だとも」\n\nDịch sang tiếng Việt (giữ nguyên các mã điều khiển dòng `\\n`, ngoặc kép `“”`):\n\n「Chắc là do chị nghe Hibiki kể về em nhiều đến mức phát chán luôn rồi nhỉ?\\nKhông ngờ \"anh trai của Hibiki\" lại là cậu thiếu niên khó gần ngày đó đấy」"

# monologue
# JP: ならば日々姫は、僕を褒めてくれていたのか。
2199 = "Nếu vậy thì, hóa ra Hibiki đang khen ngợi tôi sao?"

# monologue
# JP: じんわり感じる嬉しさが、僕の言葉をより素直にする。
2366 = "Niềm vui sướng len lỏi rạo rực trong lòng khiến những lời tôi thốt ra càng thêm phần chân thành."

# 【双鉄】
# display as 雙鐵
# JP: 「いくらかは、僕も成長した――\nいや、違う。成長を、させてもらえたおかげだろうな」
1924 = "「Có lẽ tôi cũng đã trưởng thành hơn một chút――\\nKhông, không phải thế. Đúng hơn là nhờ tôi đã được tạo cơ hội để trưởng thành.」"

# 【稀咲】
# display as 稀咲
# JP: 「させてもらえた？」
1474 = "「Được tạo cơ hội?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1561 = "「嗯」" 

# monologue
# JP: 話す。飾らず、なにも構えず。\n御一夜での沢山の出会いが、僕を成長させてくれたこと。
2404 = "Tôi giãi bày. Chẳng chút hoa mỹ, chẳng chút phòng bị.\\nChính vô vàn những cuộc gặp gỡ tại Onoyo đã giúp tôi trưởng thành như ngày hôm nay."

# monologue
# JP: だから、僕は御一夜を――\nこの町の水と人とを、損ねたくないと思っていることを。
2642 = "Chính vì lẽ đó, tôi――\\nTôi thực lòng không muốn làm tổn hại đến nguồn nước cũng như con người nơi thị trấn Onoyo này."

# 【稀咲】
# display as 稀咲
# JP: 「……ボクも御一夜の生まれだ。キミの主張もわかる。\nわかるからこそ、ボクも融資の許諾を出した」
1128 = "「……Tôi cũng sinh ra ở Onoyo. Tôi hiểu lập luận của cậu chứ.\\nChính vì hiểu rõ nên tôi mới chấp thuận việc cấp vốn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ありがとう」
1559 = "「Vâng. Cảm ơn cậu.」"

# 【稀咲】
# display as 稀咲
# JP: 「だけどね、双鉄。二億円以上は無理なんだ。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;関連の査定なら、浦上に任せて間違いないから」
1458 = "「Thế nhưng, Soutetsu à. Hơn hai trăm triệu Yên là điều bất khả thi.\\nBởi nếu xét về những đánh giá liên quan đến \\x%lエアクラ;#00ffc040;Aircra%l;#;, giao cho Urakami đảm nhiệm thì tuyệt đối không thể sai sót được.」"

# monologue
# JP: 恐縮です、と言わんばかりに浦上が軽く頭を下げる。\n終始、変化を見せぬ態度に、小さな疑問が湧いてくる。
2359 = "Urakami hơi cúi đầu như muốn biểu thị sự khiêm nhường.\\nThái độ trước sau như một, không chút lay chuyển của anh ta khiến một nghi vấn nhỏ nhen nhóm trong tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんは、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を御一夜に建てるために、\nここに出向してきているのですよね？」
1797 = "「Anh Urakami,\\nanh biệt phái đến đây là để xây dựng nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; tại Onoyo đúng không?」"

# 【浦上】
# display as 浦上
# JP: 「違いますよ、右田さん。私の仕事は、\n『適地に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を建てる』ことです」
1414 = "「Không phải đâu, cậu Migita. Nhiệm vụ của tôi là\\n『xây dựng nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; tại một địa điểm thích hợp』.」"

# monologue
# JP: ざっくばらんに、という頭取指示に、\nある程度、浦上も寄せるつもりなのだろうか。
2200 = "Phải chăng Urakami cũng đang định chiều theo ý của ngài Thống đốc, muốn trao đổi một cách thẳng thắn cởi mở chăng."

# monologue
# JP: か細い指が、細いネクタイを左右に動かし、\nわずかに緩める。
2185 = "Những ngón tay gầy guộc khẽ dịch chuyển chiếc cà vạt mảnh sang hai bên,\\nnới lỏng nó ra một chút."

# 【浦上】
# display as 浦上
# JP: 「長期間安定的に、効率良く稼働できる工場というのは、\nそう簡単に建つものではありませんので、その調査を」
1975 = "「Một nhà máy có thể vận hành hiệu quả và duy trì sự ổn định trong thời gian dài không phải là thứ dễ dàng xây dựng được, nên tôi ở đây là để khảo sát việc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「適地かどうか、\n判断するのがお仕事だということですか？」
1434 = "「Ý anh là, công việc của anh\\nlà đánh giá xem nơi đây có phải là địa điểm thích hợp hay không sao?」"

# 【浦上】
# display as 浦上
# JP: 「その通りです。不適と判断できるなら、そこから\n撤退することもまた、私の仕事の成果となります」
1773 = "「Đúng vậy thưa anh. Nếu có thể xác định nơi đây không phù hợp, thì việc quyết định rút lui\\ncũng sẽ được xem là một thành quả trong công việc của tôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1501 = "「Ra là vậy」"

# 【浦上】
# display as 浦上
# JP: 「御一夜は、非常に有力な候補地として、\n現地コーディネーターからの推薦を受けています。が」
1831 = "「Ohito đã nhận được đề cử từ điều phối viên địa phương\\nnhư một ứng cử viên vô cùng tiềm năng. Thế nhưng...」"

# monologue
# JP: 浦上が、メガネの向こうから僕を見る。
2530 = "Uragami nhìn tôi qua gọng kính."

# 【浦上】
# display as 浦上
# JP: 「はたして実際に適地であるのか、見極めるため――\n右田さん達の動きはむしろ、ありがたいですね、正直」
1893 = "「Để xác định xem nơi này có thực sự phù hợp hay không――\\nnói thật, hành động của nhóm anh Migita lại là điều rất đáng hoan nghênh đấy」"

# monologue
# JP: ……融資を行わぬようにすれば、\n工場誘致反対派を、いとも簡単に追い込めるのに――
1089 = "……Nếu từ chối cho vay vốn,\\nhọ hoàn toàn có thể dễ dàng dồn phe phản đối xây dựng nhà máy vào đường cùng――"

# monologue
# JP: 浦上がくれた答えのおかげで、\nその単純な疑問は綺麗に、解消できた。
2528 = "Nhờ câu trả lời của Uragami,\\nthắc mắc đơn giản ấy đã hoàn toàn được gỡ bỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「非常に納得がいきました。\n率直なお答え、ありがとうございます」
1667 = "「Tôi đã hiểu rất rõ rồi.\\nCảm ơn anh vì câu trả lời thẳng thắn này」"

# 【浦上】
# display as 浦上
# JP: 「いえいえ」
1416 = "「Không có chi」"

# 【元忠】
# display as 元忠
# JP: 「はっはは、すっかり打ち解けた空気になったな」
1531 = "「Ha ha ha, bầu không khí đã hoàn toàn cởi mở hơn rồi nhỉ」"

# monologue
# JP: 言われて、気付く。\n支店長室に入った時の警戒感を、僕は完全に失くしている。
2196 = "Nghe ông ấy nói, tôi mới sực nhận ra.\\nSự cảnh giác lúc mới bước vào phòng chi nhánh trưởng nay đã hoàn toàn biến mất trong tôi."

# monologue
# JP: これがいわゆる交渉術であるのなら、\n完全に、その術中に陥っている。
2331 = "Nếu đây là thứ được gọi là nghệ thuật đàm phán,\\nthì tôi đã hoàn toàn sập bẫy của họ mất rồi."

# 【元忠】
# display as 元忠
# JP: 「そこで提案なのだがね」
1963 = "「Vậy nên ta có một đề xuất thế này đây」"

# monologue
# JP: ぱらぱらと、事前に渡しておいた資料を、\n宝生元忠の指が繰る。
2345 = "Những ngón tay của Houshou Mototada\\nlật qua lật lại xấp tài liệu tôi đã gửi trước đó."

# monologue
# JP: そうして、にやりと元忠は、\n僕の目の前、口を開いたライオンのような笑顔を浮かべる。
2542 = "Rồi, Mototada nở một nụ cười rạng rỡ như một chú sư tử đang há miệng ngay trước mắt tôi."

# 【元忠】
# display as 元忠
# JP: 「担保を、ひとつ追加してみないかね？\nそうすれば満額四億――最低金利で貸してあげよう」
1890 = "「Thế cậu có muốn thêm vào một tài sản thế chấp nữa không?\\nNếu vậy tôi sẽ cho vay trọn vẹn bốn trăm triệu —— với mức lãi suất thấp nhất.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ自身が担保って！！？」
1983 = "「Anh hai tự biến bản thân thành tài sản thế chấp á!!?」"

# monologue
# JP: 聞きつけられた。\nケチケチせずに、部屋からかければよかった。
2628 = "Bị nghe thấy mất rồi.\\nBiết thế mình cứ gọi điện ngay trong phòng cho rồi, chẳng việc gì phải căn ke chút không gian như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「すみません、[とう,1]義父さん。またかけ直します」
1700 = "「Con xin lỗi, thưa cha dượng. Con sẽ gọi lại sau ạ.」"

# monologue
# JP: 電話を切れば、\nぱたぱたという足音が近づいてくる。
2411 = "Vừa cúp máy xong,\\ntiếng bước chân vội vã lạch bạch đã tiến lại gần."

# 【真闇】
# display as 真闇
# JP: 「なんねぇ、ひーちゃん、とんでもない声」
1624 = "「Có chuyện gì thế Hii-chan, sao tự dưng lại hét toáng lên vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ねぇね！　にぃにぃが、なんか、\nにぃにぃが借金の担保でどうこうって」
1986 = "「Chị Hai ơi! Anh hai tự dưng...\\nAnh hai tự biến mình thành tài sản thế chấp để vay nợ hay gì đó kìa!」"

# 【真闇】
# display as 真闇
# JP: 「んん？」
1567 = "「Hửm?」"

# monologue
# JP: 真闇姉までが来てしまった。\nしかも腰を下ろしてしまった。
2676 = "Đến cả chị Mayami cũng chạy tới luôn rồi.\\nĐã thế chị ấy còn ngồi bệt xuống luôn."

# monologue
# JP: これは……このまま家族会議だ。\n抵抗をする余地などはない。
2557 = "Thế này thì... chuẩn bị họp gia đình đến nơi rồi.\\nKhông còn cách nào để kháng cự nữa."

# 【日々姫】
# display as 日日姬
# JP: 「で、で！？　にぃに！\nにぃにぃ自身が担保っていったいどぎゃんこつ！？」
1819 = "「Thế, thế là sao hả anh!?\\nCái chuyện anh tự biến bản thân thành tài sản thế chấp rốt cuộc là như thế nào!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう大げさに心配するな。\n人身売買というような話ではない」
1492 = "「Đừng lo lắng thái quá như vậy.\\nĐây không phải là chuyện mua bán người gì đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「あったりまえばいっ！」
1934 = "「Cái đó là đương nhiên rồi!」"

# monologue
# JP: 大いに怒る日々姫にむけて、\nとにもかくにも話のあらましを説明する。
2395 = "Đối diện với một Hibiki đang cực kỳ giận dữ,\\ntôi cố gắng giải thích ngắn gọn toàn bộ sự việc."

# monologue
# JP: と、真闇姉が、にこにこ僕に問うてくる。
2670 = "Thế rồi, chị Mayami mỉm cười hỏi tôi."

# 【真闇】
# display as 真闇
# JP: 「ほんなら双ちゃん。\n双ちゃんいう担保は、どぎゃんして換金されると？」
1968 = "「Vậy thì Sou-chan. Từ \"thế chấp\" là Sou-chan đó, sẽ được quy đổi thành tiền mặt bằng cách nào chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん」
1926 = "「À―― ừm」"

# monologue
# JP: 換金という直接的にすぎる言葉に、気付かされる。
1084 = "Từ \"quy đổi thành tiền mặt\" quá đỗi trực tiếp ấy, đã giúp tôi nhận ra một điều."

# monologue
# JP: 担保というのはつまるところ、\n処分価値という四文字と、変わらぬ意味であるのだと。
2433 = "Suy cho cùng, \"thế chấp\" rốt cuộc cũng có ý nghĩa chẳng khác gì mấy so với bốn chữ \"giá trị thanh lý\" kia cả."

# 【双鉄】
# display as 雙鐵
# JP: 「借金返済を滞らせた場合、隈元銀行に入行し、\n元忠さんのもとで経営を勉強するように――と」
1879 = "「Nếu cháu chậm trễ trong việc trả nợ, cháu sẽ phải vào làm ở Ngân hàng Kumamoto, và học hỏi cách điều hành kinh doanh dưới sự chỉ dẫn của bác Mototada――」"

# 【真闇】
# display as 真闇
# JP: 「無期限で？」
1811 = "「Vô thời hạn sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「期限は特に言われなかった。\n“給料は、規定のとおりに払う”ということは伺った」
1780 = "「Bác ấy không nói rõ thời hạn cụ thể. Nhưng cháu có nghe nói rằng \"lương vẫn sẽ được chi trả đúng theo quy định\"」"

# 【真闇】
# display as 真闇
# JP: 「ふぅん？」
1532 = "「Hửm?」"

# monologue
# JP: 手元も体も表情も、\n真闇姉は少しも動かしてみせてくれはしない。
2582 = "Cả bàn tay, cơ thể lẫn nét mặt, chị Mayami không hề mảy may lay động."

# monologue
# JP: ただ、にこにこと――\n表情が見えぬ笑みの形に、顔を整えきっている。
2604 = "Chị ấy chỉ mỉm cười―― một nụ cười rạng rỡ nhưng không để lộ tâm can, gương mặt giữ nguyên một vẻ điềm tĩnh tuyệt đối."

# 【真闇】
# display as 真闇
# JP: 「で？　双ちゃんはその申し出にどう答えたと？」
1820 = "「Vậy rồi? Sou-chan đã trả lời lời đề nghị đó thế nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。その話はお受け出来んと、断った」
1555 = "「Ừm. Cháu đã từ chối, bảo rằng mình không thể nhận lời chuyện đó」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、なんねぇ、断ったんね」
1542 = "「A, ra vậy, anh từ chối rồi sao」"

# monologue
# JP: ほーっと、日々姫が長い息を吐き胸を撫で下ろす。\n真闇姉は、まったく表情を崩さない。
2471 = "Phùuu, Hibiki thở phào một hơi dài rồi vỗ nhẹ lên ngực an lòng. Còn chị Mayami thì vẫn không hề thay đổi sắc mặt."

# 【真闇】
# display as 真闇
# JP: 「どぎゃんなわけで、そん話をお受けできんと？」
1809 = "「Vì lý do gì mà em lại không thể nhận lời chuyện đó chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。いや、これは、\nもっと早くに伝えておくべきことだったんだが――」
1554 = "「Ừm. Không, việc này...\\nlẽ ra anh phải nói cho em biết sớm hơn mới phải――」"

# monologue
# JP: 折を見てなどとぼやぼやしてたら、\nすっかりと、伝える機会を逃してしまった。
2160 = "Cứ chần chừ đợi thời cơ thích hợp,\\nđể rồi rốt cuộc anh lại bỏ lỡ mất cơ hội mở lời."

# 【双鉄】
# display as 雙鐵
# JP: 「帝大を休学し、酒問屋の方も休ませてもらう条件として、\n僕は、[とう,1]義父さんといくつか約束をしているんだ」
1471 = "「Để được bảo lưu kết quả học ở Đại học Đế quốc, cũng như tạm gác lại công việc ở cửa hàng phân phối rượu, anh đã hứa với cha nuôi một vài điều」"

# 【日々姫】
# display as 日日姬
# JP: 「約束？」
1894 = "「Lời hứa ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつは期限。二年以内に結果を出すこと」
1997 = "「Thứ nhất là về thời hạn. Anh phải đưa ra kết quả trong vòng hai năm」"

# 【日々姫】
# display as 日日姬
# JP: 「ふんふん」
1562 = "「Dạ, dạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「その期限内に工場誘致を撤回できれば、\n見習い期間を終了し、独立を許すとも約束してもらった」
1874 = "「Cha cũng hứa rằng, nếu trong thời hạn đó anh có thể hủy bỏ được kế hoạch thu hút nhà máy về đây, anh sẽ kết thúc thời gian học việc và được phép tự lập」"

# 【日々姫】
# display as 日日姬
# JP: 「それは良か約束ばいっ！」
1933 = "「Đó chẳng phải là một lời hứa rất tốt sao!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。もったいないほど有り難いお話だ」
1558 = "「Ừm. Đó quả thực là một đề nghị tốt đến mức anh vô cùng biết ơn」"

# 【真闇】
# display as 真闇
# JP: 「で？」
1941 = "「Rồi sao nữa ạ?」"

# monologue
# JP: 笑顔のままでの問いが重なる。
2314 = "Câu hỏi dồn dập được đưa ra cùng với nụ cười vẫn giữ nguyên trên môi."

# 【真闇】
# display as 真闇
# JP: 「[さけてん,1]酒店さんは双ちゃんに、\nその他に何を約束させたと？」
1955 = "「Cửa hàng rượu đó còn bắt Sou-chan\\nhứa thêm điều gì khác nữa?」"

# monologue
# JP: 酒店さん。\n父さんではなく、酒店さん。
2690 = "Cửa hàng rượu đó.\\nChị ấy không gọi là cha, mà gọi là cửa hàng rượu đó."

# monologue
# JP: 真闇姉は、怒っている。\nその事実だけで、僕の背筋まで薄寒くなる。
2579 = "Chị Mayami đang giận.\\nChỉ riêng thực tế đó thôi cũng đủ khiến anh sống lưng tôi lạnh toát."

# 【双鉄】
# display as 雙鐵
# JP: 「もうひとつだけ――\n期限内に、結果を出せなかった場合の条件を」
1940 = "「Chỉ còn một điều nữa thôi――\\nĐó là điều kiện trong trường hợp anh không thể đưa ra kết quả trong thời hạn ấy」"

# 【日々姫】
# display as 日日姬
# JP: 「結果を出せんかったらにぃにぃ、どうなると？」
1602 = "「Nếu không đạt được kết quả thì Ni-ni sẽ thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「結果を出せた場合の反対。僕の見習い期間は継続。\nくわえて、義父さんの選んだ相手との結婚をする」
1871 = "「Ngược lại với trường hợp đạt được kết quả. Thời gian thử việc của anh sẽ tiếp tục.\\nĐồng thời, anh phải kết hôn với người mà bố nuôi đã chọn」"

# 【日々姫】
# display as 日日姬
# JP: 「結婚っ！？　結婚って、それって――誰とっ！？\n父さんの選んだ相手って、誰ねっ！？」
1862 = "「Kết hôn ư!? Kết hôn, chuyện đó... là với ai cơ chứ!?\\nNgười mà bố chọn là ai thế ạ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わからん。失敗するつもりは全く無いので、\n確認しようとも思わなかった」
1418 = "「Anh không biết. Vì anh hoàn toàn không có ý định thất bại,\\nnên cũng chưa từng nghĩ đến việc xác nhận chuyện đó」"

# 【日々姫】
# display as 日日姬
# JP: 「あー……あー……あ～～っ」
1549 = "「A... A... A~~」"

# monologue
# JP: 安堵のような、あきれたような、あるいは失望したような。
2453 = "Như thể trút được gánh nặng, như thể ngán ngẩm, hoặc cũng có thể là thất vọng."

# monologue
# JP: なんとも判断しがたい声を出しながら、\n日々姫はくるり、すがりつくように真闇姉を見る。
2472 = "Vừa phát ra những âm thanh khó lòng mà phân định rõ ràng,\\nHibiki vừa quay ngoắt người lại, bám lấy chị Mayami như muốn cầu cứu."

# 【真闇】
# display as 真闇
# JP: 「そいやけん、双ちゃんは断ったんね？　ゆーたらすでに、\n双ちゃんの身は抵当に入れられてしまっとりよるけん」
1582 = "「Hèn chi Sou-chan mới từ chối đúng không? Nói cách khác thì,\\nthân xác của Sou-chan đã bị đem đi thế chấp mất rồi còn đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
1783 = "「Đúng là như vậy」"

# 【真闇】
# display as 真闇
# JP: 「そしたら、なんて？　[もとただ,1]元忠さんは」
1967 = "「Thế rồi sao nữa ạ? Bác Mototada đã nói gì?」"

# 【双鉄】
# display as 雙鐵
# JP: 「かんらかんらと大笑いして――\n『ならば私が、[けんぞう,1]謙三と話をつけておこう』と」
1447 = "「Bác ấy cười ha hả rồi bảo...\\n『Nếu thế thì để ta đi nói chuyện với Kenzo cho』」"

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃん話ばつけるつもりねっ！？」
1448 = "「Định nói chuyện kiểu gì cơ chứ!?」"

# monologue
# JP: また怒声。\n今日の日々姫は、ひさびさの百面相を披露してくれている。
2255 = "Lại một tiếng hét giận dữ.\\nHôm nay Hibiki lại cho tôi thấy một bộ mặt muôn vàn biểu cảm sau bao lâu rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「その説明はなかったな。ただ、\n話をつけるから安心して担保になれ、とそればかりで」
1925 = "「Bác ấy không giải thích gì thêm. Chỉ bảo là,\\ncứ yên tâm làm vật thế chấp đi vì bác ấy sẽ giải quyết ổn thỏa, chỉ bấy nhiêu thôi」"

# 【日々姫】
# display as 日日姬
# JP: 「なんね！　父さんも、その元忠いうおっさんも、\nにぃにぃのこと、まるっきりモノ扱いしよって～っ」
1443 = "「Cái gì vậy chứ! Cả bố lẫn cái ông Mototada gì đó,\\nhoàn toàn xem Ni-ni như một món đồ rồi~!」"

# monologue
# JP: （モノ扱い……そうか、モノ扱いか）
2734 = "(Bị đối xử như đồ vật... Ra là vậy, bị coi như đồ vật sao)"

# monologue
# JP: そうされている自覚がなかった。\n特段の怒りも感じなかった。
2418 = "Bản thân tôi còn chẳng tự nhận thức được việc mình đang bị đối xử như thế.\\nCũng không cảm thấy có gì đặc biệt giận dữ."

# monologue
# JP: 日々姫が僕のため怒ってくれているのをみれば、\n自分自身の感覚が、どこかずれているのか少し不安になる。
2562 = "Nhìn Hibiki đang nổi giận thay cho mình,\\ntôi lại thấy hơi bất an, không biết có phải cảm nhận của bản thân đang bị lệch lạc ở đâu đó rồi không."

# 【真闇】
# display as 真闇
# JP: 「稀咲ちゃんは、なんか言いよったと？」
1855 = "「Kisa-chan có nói gì không em?」"

# 【日々姫】
# display as 日日姬
# JP: 「！！！」
1998 = "「！！！」"

# monologue
# JP: びょん、と日々姫が身を硬くする。
2474 = "Pưng một cái, Hibiki cứng đờ người lại."

# monologue
# JP: なんで稀咲の話をここで？　と思いはするが、\n記憶と口とは疑問に止まらず、素直な答えを折り返す。
2709 = "Tuy có tự hỏi tại sao chị ấy lại nhắc đến Kisa ở đây, nhưng trí nhớ và khuôn miệng tôi không dừng lại ở sự nghi vấn, mà thành thật đáp lời ngay."

# 【双鉄】
# display as 雙鐵
# JP: 「いいや……特には何も。\n何も、言ってなかったかと思う」
1407 = "「Không ạ... Đặc biệt là không có gì.\\nEm nghĩ là cô ấy không nói gì cả」"

# 【日々姫】
# display as 日日姬
# JP: 「あ～～っ」
1550 = "「A~~」"

# monologue
# JP: また妙な声。長い息。\nそれに重なる、ぽんという音。
2312 = "Lại là một chất giọng kỳ lạ. Một hơi thở dài.\\nĐè lên đó là một tiếng \"bộp\" vang lên."

# 【真闇】
# display as 真闇
# JP: 「ほんならね、双ちゃん」
1707 = "「Vậy thì thế này nhé, Sou-chan」"

# monologue
# JP: 真闇姉だ。\n自らの正座の膝を、叩いた音だ。
2250 = "Là chị Mayami.\\nĐó là tiếng chị ấy tự vỗ vào đầu gối khi đang ngồi quỳ."

# 【真闇】
# display as 真闇
# JP: 「もうひとつ。\n双ちゃんにお姉ちゃんから、選択肢をあげよーねぇ」
1606 = "「Thêm một điều nữa.\\nChị sẽ cho Sou-chan thêm một lựa chọn nhé」"

# monologue
# JP: 筆と墨、それから半紙。
2607 = "Bút lông, mực, và cả giấy bản."

# monologue
# JP: 流れるように用意を整え、\n真闇姉は、さらさらと何かを書きつける。
2576 = "Chuẩn bị mọi thứ nhanh như nước chảy,\\nchị Mayami thoăn thoắt viết xuống thứ gì đó."

# 【真闇】
# display as 真闇
# JP: 「双ちゃんがここにサインをしたら、二億円、\nうちから双ちゃんに、無利子無担保で貸したげますけん」
1515 = "「Nếu Sou-chan ký tên vào đây, hai trăm triệu yên,\\nchị sẽ cho Sou-chan vay không lãi suất, không thế chấp luôn nhé」"

# monologue
# JP: あまりに気前の良い申し出に――
2715 = "Trước lời đề nghị quá đỗi hào phóng ấy――"

# monologue
# JP: いや、汰斗さんの相続のときのあの騒動の苦い記憶に、\n声が、ぎくしゃくと詰まってしまう。
2409 = "Không, ký ức cay đắng về sự hỗn loạn hồi thừa kế của anh Taito làm giọng tôi nghẹn lại, trở nên ngập ngừng."

# 【双鉄】
# display as 雙鐵
# JP: 「それは――助かる。助かる、が――」
1923 = "「Chuyện đó――chị giúp được vậy thì tốt quá. Tốt quá, nhưng mà――」"

# 【真闇】
# display as 真闇
# JP: 「『が』、なんね？」
1111 = "「'Nhưng mà' sao cơ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1409 = "「Dạ không――」"

# monologue
# JP: とても言えない。\n『そんな迷惑はかけられない』、など。
2402 = "Tôi không thể nào thốt ra nổi.\\nNhững lời kiểu như 'Em không thể làm phiền chị như thế được'."

# monologue
# JP: すでにして、迷惑をかけすぎるほどかけている上――\nそうした意地を張れる余裕も、まるで無いから。
2390 = "Bởi lẽ tôi đã và đang làm phiền chị ấy quá nhiều rồi――\\nChưa kể bản thân lúc này cũng chẳng còn chút dư dả nào để mà cố tỏ ra bướng bỉnh như thế nữa."

# 【真闇】
# display as 真闇
# JP: 「『いや』、なんね？」
1109 = "「'Dạ không' là sao nè?」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1116 = "「…………」" 

# monologue
# JP: そして聞けない。『何故か』とも。\n聞けば、真闇姉にとんでもない失礼を働くことになる。
2616 = "Và tôi cũng không thể hỏi lý do. 'Tại sao vậy chị?'.\\nNếu hỏi câu đó, tôi sẽ cực kỳ thất lễ với chị Mayami."

# monologue
# JP: だけれど、疑問は否めない。\nだって――僕は――義理の弟にすぎないのだから。
2206 = "Thế nhưng, sự hoài nghi là không thể tránh khỏi.\\nBởi vì――tôi――cũng chỉ là một người em trai hờ không cùng dòng máu."

# monologue
# JP: （二億となると――真闇姉にとってでも、\n右から左にぽんと出る額であるはずがない）
2729 = "(Hai trăm triệu――ngay cả với chị Mayami,\\nđó cũng không thể là một con số có thể dễ dàng rút ra ngay được)"

# monologue
# JP: から、躊躇する。\n身動きを、判断をまるで出来なくなる。
2428 = "Chính vì vậy, tôi lưỡng lự.\\nHoàn toàn không thể cử động, cũng chẳng thể đưa ra quyết định."

# 【真闇】
# display as 真闇
# JP: 「ね、双ちゃん？」
1954 = "「Nè, Sou-chan?」"

# monologue
# JP: 硬直する僕へ、\n落ち着いた声が問いかけてくる。
2150 = "Hướng về phía tôi đang đứng chết trân,\\nmột giọng nói điềm tĩnh cất lên hỏi han."

# monologue
# JP: にこにことした笑顔を消して、\n真闇姉は、ごく穏やかな表情だ。
2581 = "Thu lại nụ cười rạng rỡ thường ngày,\\ngương mặt chị Mayami giờ đây vô cùng ôn hòa."

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんが困っとったら、\n双ちゃん、おねーちゃんのこと助けてくれると？」
1601 = "「Nếu chị hai gặp khó khăn,\\nSoutetsu sẽ giúp chị hai chứ?」"

# monologue
# JP: 不意の質問。
2387 = "Một câu hỏi bất ngờ."

# monologue
# JP: 答えに迷う余地すらもない、\n真闇姉の問いとも思えぬほど単純な。
2667 = "Chẳng có lý do gì để đắn đo suy nghĩ, một câu hỏi quá đỗi đơn thuần mà tôi chẳng thể ngờ là đến từ chị Mayami."

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。全力を尽くし助けるとも」
1832 = "「Dĩ nhiên rồi. Em sẽ cố gắng hết sức để giúp chị.」"

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、同じ。\nそれだけのこと」
1605 = "「Chị cũng vậy, đối với em cũng thế thôi.\\nChỉ đơn giản là vậy thôi mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「私も！　私も絶対絶対助けるけんっ！」
1652 = "「Cả em nữa! Em nhất định, nhất định cũng sẽ giúp ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1536 = "「À――」"

# monologue
# JP: なんだ、と肩から力が抜ける。\n僕は馬鹿だと、今更ながら理解する。
2369 = "Ra là vậy, tôi trút bỏ gánh nặng trên vai. Đến lúc này tôi mới nhận ra mình ngốc nghếch đến nhường nào."

# monologue
# JP: 義理だなんだにこだわっていた、\nそれを一番嫌っていたのは――僕だったのかと。
2611 = "Cứ khư khư chấp niệm vào hai chữ nghĩa vụ, người ghét bỏ điều đó nhất――hóa ra lại chính là tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、日々姫――」
1840 = "「Chị Mayami, Hibiki――」"

# monologue
# JP: だから、自然と。\nそこに置かれた――差し出されない、筆を取る。
2429 = "Thế nên, một cách tự nhiên.\\nTôi cầm lấy cây bút được đặt ở đó――dù không ai đưa cho."

# monologue
# JP: “必ず、全額を返すから”\n言いかけて、けれども、口には出さずに呑み込む。
2152 = "“Nhất định con sẽ hoàn trả lại toàn bộ số tiền”\\nTôi định nói ra, nhưng rồi lại nuốt ngược vào trong."

# monologue
# JP: （妙に飾るな。素直になれ。\n今、僕に満ちているのは、金の心配などではなかろう？）
2724 = "(Đừng có văn vẻ nữa. Hãy thành thật với lòng mình đi.\\nĐiều đang lấp đầy tâm trí tôi lúc này, đâu phải là lo lắng về chuyện tiền bạc đúng không?)"

# monologue
# JP: 自覚をすれば、\n余計な全てが削げ落ちて、気持ちひとつが綺麗に残る。
2155 = "Một khi đã tự thức tỉnh,\\ntất cả những điều thừa thãi đều tan biến, chỉ còn lại một cảm xúc vẹn nguyên, thuần khiết."

# monologue
# JP: 残った気持ちが、自然と、口から溢れ出る。
2672 = "Cảm xúc ấy, cứ thế tự nhiên thốt ra thành lời."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
1900 = "「Cảm ơn chị」"

# monologue
# JP: 真闇姉が作ってくれた選択肢へと。\n真闇姉の墨痕が見事に残る半紙へとサインする。
2305 = "Hướng về lựa chọn mà chị Mayami đã tạo ra cho tôi.\\nTôi đặt bút ký lên tờ giấy bán tuyên vẫn còn lưu lại rõ nét nét mực đầy tuyệt mỹ của chị Mayami."

# monologue
# JP: 右田双鉄――その四文字の、\n右田、双鉄――それぞれにいっぱいの思いを込めて。
2280 = "Miyata Soutetsu ―― bốn chữ ấy,\\nMiyata, Soutetsu ―― mỗi chữ đều đong đầy biết bao tâm tư, tình cảm gửi gắm vào bên trong."
