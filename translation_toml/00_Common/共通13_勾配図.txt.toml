# JP: 血の臭い、鼻の奥から突き上げてきて、\n呼吸がどんどん苦しくなって――
3277 = "Mùi máu xộc thẳng vào sâu trong mũi,\\ncàng lúc càng khiến lồng ngực khó thở dồn dập——"

# 【双鉄】
# display as 雙鐵
# JP: 「止まれっ！！！」
1916 = "「Dừng lại đi!!!」"

# monologue
# JP: だから、叫ぶ！\nだからこそ、力の限りにシャツを振るっ！
3033 = "Thế nên, tôi gào lên!\\nChính vì thế, tôi vẫy chiếc áo sơ mi bằng tất cả sức bình sinh!"

# 【双鉄】
# display as 雙鐵
# JP: 「止まれっ！　止まるんだっ！　止まってくれ！！！\n止まらねば！　止まらねばまた事故になるっ！！！！」
1915 = "「Dừng lại! Dừng lại đi! Làm ơn dừng lại đi!!!\\nNếu không dừng lại! Nếu không dừng lại thì tai nạn sẽ lại xảy ra mất!!!!」"

# monologue
# JP: 風圧。一瞬、誰かの声。\n金属音、\x%lブレーキ;#00ffc040;ブレーキ%l;#;音。足元が揺れ、地に倒れこむ。
3269 = "Áp lực gió. Trong thoáng chốc, tiếng của một ai đó.\\nTiếng kim loại rít lên, tiếng \\x%lphanh;#00ffc040;phanh%l;#; chói tai. Mặt đất dưới chân rung chuyển, tôi ngã nhoài xuống đất."

# 【双鉄】
# display as 雙鐵
# JP: 「ぐうっ！」
2080 = "「Hự!」"

# monologue
# JP: 砂利の味。\x%lバラスト;#00ffc040;バラスト%l;#;の味かと一瞬思い。\nそんな場合ではないことをすぐ思い出す。
3013 = "Vị của sỏi đá. Trong một khoảnh khắc tôi chợt nghĩ liệu đây có phải là vị của \\x%lđá ba-lát;#00ffc040;đá ba-lát%l;#;.\\nNhưng rồi nhanh chóng nhận ra đây không phải là lúc để nghĩ về chuyện đó."

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ！」
2020 = "「Khốn khiếp!」"

# monologue
# JP: 立ち上がる。\n目の前にはもう何もない。
2975 = "Tôi gượng đứng dậy.\\nTrước mắt giờ đây chẳng còn gì cả."

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;は停止した。\n――衝撃音は聞こえてこない。
90 = "Chiếc \\x%lKiha 07;#00ffc040;Kiha 07%l;#; đã dừng lại.\\n——Không hề nghe thấy tiếng va chạm nào vang lên."

# 【双鉄】
# display as 雙鐵
# JP: 「止まったよな、止まったんだよな。\n頼む――頼むよっ！」
1914 = "「Đã dừng lại rồi đúng không, đã dừng lại thật rồi đúng không.\\nLàm ơn——làm ơn đi mà!」"

# monologue
# JP: やがて――車体が見えてくる。\n\x%lキハ07;#00ffc040;キハ07%l;#;の前後変らぬ丸顔が、驚いたように停止している。
2977 = "Cuối cùng——thân tàu cũng dần lộ ra.\\nThiết kế đầu tròn trước sau như một của chiếc \\x%lKiha 07;#00ffc040;Kiha 07%l;#; đang dừng sững lại như thể đang kinh ngạc."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！　ハチロクっ！！！」
1931 = "「Hachiroku! Hachiroku!!!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！」
2521 = "「Soutetsu-sama!」"

# monologue
# JP: 転がるように、\n小さな小さなハチロクが僕へとまっすぐ駆けてくる。
2744 = "Như thể sắp ngã nhào,\\nHachiroku nhỏ bé, thật nhỏ bé đang lao thẳng về phía tôi."

# 【ハチロク】
# display as 八六
# JP: 「止めましたっ！\nわたくしたち――わたくしたちは止めましたっ！」
1913 = "「Dừng lại được rồi ạ!\\nChúng ta――chúng ta đã dừng được nó rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2533 = "「！」"

# monologue
# JP: 歓喜に満ちた涙声。
2871 = "Tiếng khóc nghẹn ngào trong niềm hạnh phúc ngập tràn."

# monologue
# JP: 聞いた瞬間、もうくたくたと全身の力が抜けおちかけるが、\nもう何十歩を駆け抜けて、ハチロクの元へたどり着く。
3150 = "Ngay khoảnh khắc nghe thấy lời ấy, toàn thân tôi như rã rời, suýt chút nữa làkhuỵu ngã,\\nnhưng tôi vẫn cố chạy thêm vài chục bước nữa để đến bên Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「やりました、双鉄様！\n双鉄様のおかげで、わたくしはっ！」
2204 = "「Làm được rồi, ngài Soutetsu!\\nNhờ có ngài Soutetsu, mà em mới có thể!」"

# monologue
# JP: 雨が、ぼとぼと、倒れた僕の顔の上へと降り注ぐ。
2857 = "Mưa rơi lã chã, xối xả xuống khuôn mặt đang gục ngã của tôi."

# monologue
# JP: 熱い雨。\x%l蒸気排水;#00ffc040;蒸気排水%l;#;――\nああ、ハチロクはまた泣いている。
2888 = "Cơn mưa nóng hổi. \\x%lXả hơi nước;#00ffc040;Xả hơi nước%l;#;――\\nÀ, Hachiroku lại đang khóc rồi."

# 【ハチロク】
# display as 八六
# JP: 「泣かないでください、双鉄様。やったのですから！\nわたくしたちは、事故を未然に防いだのですから」
2446 = "「Xin ngài đừng khóc, ngài Soutetsu. Chúng ta đã làm được rồi mà!\\nChúng ta đã ngăn chặn được tai nạn xảy ra cơ mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「泣いてる？　僕もか」
2103 = "「Khóc sao? Anh cũng khóc à?」"

# monologue
# JP: 言われて、感じる、自分の涙。\n何年ぶり――何十年ぶりのことだろう。
3151 = "Được nhắc tôi mới cảm nhận được những giọt nước mắt của chính mình.\\nĐã bao nhiêu năm rồi――đã bao nhiêu thập kỷ rồi nhỉ."

# monologue
# JP: 怖いのか、安堵したのか、喜んでるのか……\n多分すべてが同時に混じり、いささか混乱しているのだ。
2692 = "Là vì sợ hãi, vì nhẹ nhõm, hay vì vui sướng đây……\\nCó lẽ tất cả cảm xúc đang đan xen cùng một lúc, khiến tôi có chút rối bời."

# 【ポーレット】
# display as 波萊特
# JP: 「お怪我は、お怪我はないですか！？\nお怪我をなさったお客様はいませんか」
2304 = "「Có ai bị thương, có ai bị thương không ạ?!\\nCó hành khách nào bị thương không vậy ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「ご、ごめんなさい。ごめんなさい。\nれいな、れいな、こんなことっ」
2143 = "「Em, em xin lỗi. Em xin lỗi.\\nReina, Reina không ngờ chuyện lại thành ra thế nàyっ」"

# 【凪】
# display as 凪
# JP: 「悪いのはウチばい！\nウチが、考えなしだったせいばいっ」
2508 = "「Lỗi là tại mình!\\nTại mình hành động mà không suy nghĩ gì hếtっ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2062 = "「啊」" 

# monologue
# JP: 喧騒だ。\nかしましいこと、この上ない。
3065 = "Thật là náo nhiệt.\\nChưa bao giờ ồn ào đến mức này."

# monologue
# JP: 幸いなのは、怒号も、悲鳴もせぬことだ。\n血のあの臭いが、ほんのわずかも流れぬことだ。
2914 = "Nhưng thật may mắn làm sao, không có tiếng quát tháo, cũng chẳng có tiếng hét thất thanh.\\nVà cái mùi tanh nồng của máu, dù chỉ một chút thôi, cũng không hề vương vất nơi đây."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク。お前がいっていたとおりだな」
1925 = "「Này, Hachiroku. Đúng như những gì em đã nói nhỉ」"

# monologue
# JP: 血の臭いがせぬ場所でなら、少しは休んでもいいだろう。
3004 = "Nếu là ở một nơi không có mùi máu tanh, có lẽ mình nên nghỉ ngơi một chút."

# monologue
# JP: かなり、疲れた。\nだが、これだけは確認せねば。
3134 = "Đã khá mệt rồi.\\nThế nhưng, riêng điều này thì nhất định phải xác nhận."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが――なにを申しましたか？」
2197 = "「Vợt... vâng――em đã nói những gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l保線;#00ffc040;[ほせん,1]保線%l;#;だ。鉄道に\x%l保線;#00ffc040;保線%l;#;は欠かせぬと」
1537 = "「Là \\x%l保線;#00ffc040;bảo trì đường sắt%l;#; đấy. Em bảo rằng đối với đường sắt thì việc \\x%l保線;#00ffc040;bảo trì%l;#; là không thể thiếu」"

# monologue
# JP: 線路に近い大木のこと。\n\x%lバラスト;#00ffc040;バラスト%l;#;が砕けきるほどの消耗のこと。
3124 = "Về những cái cây lớn gần đường ray.\\nVề sự hao mòn nghiêm trọng đến mức lớp \\x%lバラスト;#00ffc040;đá ba-lát%l;#; bị nghiền nát hoàn toàn."

# monologue
# JP: 確かに見ていた、問題を感じていたはずなのに、\n僕ら関係者全員が、見て見ぬふりで先延ばしていた。
2932 = "Chắc chắn đã nhìn thấy, chắc chắn đã nhận ra vấn đề,\\nthế nhưng tất cả những người liên quan như chúng tôi đều nhắm mắt làm ngơ và trì hoãn nó."

# 【ハチロク】
# display as 八六
# JP: 「はい――必要です。\x%l保線;#00ffc040;[ほせん,1]保線%l;#;は、常に」
2278 = "「Vâng――việc đó là cần thiết. \\x%l保線;#00ffc040;Bảo trì đường sắt%l;#; luôn luôn là như vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そこに鉄道が走るのならば」
2261 = "「Phải rồi. Chỉ cần nơi đó vẫn còn tàu chạy」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の修復にはもう、完全に目途がついている。\nならば、僕のなすべきことは――
84 = "Việc phục hồi đầu máy \\x%l8620;#00ffc040;8620%l;#; giờ đây đã hoàn toàn nằm trong tầm tay.\\nNếu vậy, việc tôi cần phải làm chính là――"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ハチロク。任せておけ」
2339 = "「Không sao đâu. Hachiroku. Cứ giao cho anh」"

# monologue
# JP: 人員、予算。\nボランティアや寄付に、これ以上の負担は求められない。
2920 = "Nhân lực, ngân sách.\\nKhông thể đòi hỏi thêm bất kỳ gánh nặng nào từ các tình nguyện viên hay các khoản quyên góp nữa."

# monologue
# JP: ならばどうする？　簡単だ。足りない金は、借りればいい。\nそして人手は、金から変換できるのだ。
3233 = "Vậy thì phải làm thế nào? Đơn giản thôi. Thiếu tiền thì cứ đi vay.\\nVà rồi, nhân lực có thể được chuyển đổi từ tiền mà ra."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を走らせるため――\n大丈夫だ。すべての障害は取り除くから」
2212 = "「Để \\x%l8620;#00ffc040;8620%l;#; được lăn bánh――\\nKhông sao đâu. Anh sẽ dọn sạch mọi trở ngại」"

# monologue
# JP: ハチロクが、僕へとまっすぐ手を伸ばす。
2746 = "Hachiroku vươn thẳng tay về phía tôi."

# monologue
# JP: その手を取って立ち上がり、\nともかくポーレットのところに向かう。
2963 = "Nắm lấy bàn tay ấy đứng dậy,\\ntrước mắt cứ đến chỗ Paulette đã."

# 【双鉄】
# display as 雙鐵
# JP: 「処理するべきを処理しおえたら、\n帰りは、\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗っていこう」
2407 = "「Sau khi xử lý xong những việc cần làm,\\nlúc về chúng ta hãy đi bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; nhé」"

# 【ハチロク】
# display as 八六
# JP: 「飛行不能区域外まで、\nまた徒歩で出るということですか？」
2433 = "「Ý anh là chúng ta sẽ lại đi bộ,\\nra khỏi khu vực cấm bay sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは徒歩でも、\x%lキハ07;#00ffc040;キハ07%l;#;に乗せてもらってでも構わん」
2366 = "「Đi bộ cũng được,\\nhay đi nhờ tàu \\x%lキハ07;#00ffc040;Kiha 07%l;#; cũng không sao」"

# monologue
# JP: 移動経路は問題ではない。\nただ、僕は――
3096 = "Lộ trình di chuyển không phải là vấn đề.\\nChỉ là, tôi――"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビと、相談したいことがあるのだ」
2214 = "「Tôi có chuyện muốn bàn bạc với Navi」"
