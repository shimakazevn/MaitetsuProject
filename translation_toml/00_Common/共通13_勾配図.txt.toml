# lines: 469 
# 【ハチロク】
# display as 八六
# JP: 「あと一分」
2484 = "「Còn một phút nữa.」"

# monologue
# JP: 計算通りのペースで来れてる。\nあと一分で二十七杯――
3264 = "Mọi thứ vẫn diễn ra theo đúng nhịp độ đã\ntính toán.\nCòn một phút nữa là đủ 27 xẻng——"

# monologue
# JP: もう感覚の無い腰と腕とを、\nその間正確に動かすようにと、ただそれだけを意識する。
3251 = "Tôi chỉ tập trung ý thức vào một việc duy\nnhất,\nlà phải điều khiển cái lưng và đôi tay đã\nmất cảm giác di chuyển thật chính xác\ntrong khoảng thời gian đó."

# 【ハチロク】
# display as 八六
# JP: 「十、九、八、七――」
1981 = "「Mười, chín, tám, bảy——」"

# monologue
# JP: 三杯、二杯――\n投げ込むことより、引き抜く力を振り絞る。
3230 = "Ba xẻng, hai xẻng——\nThay vì xúc than vào, tôi dồn toàn bộ sức\nlực để rút xẻng ra."

# 【ハチロク】
# display as 八六
# JP: 「終了です。お疲れ様でした、双鉄様」
2302 = "「Kết thúc rồi ạ. Ngài đã vất vả rồi, ngài\nSoutetsu.」"

# monologue
# JP: （ガランっ）
3298 = "（Keng）"

# monologue
# JP: 声と同時にワンスコが、\n握力の消えた指から勝手に抜け落ちていく。
2762 = "Cùng lúc với giọng nói đó,\nchiếc xẻng wansuko tự động tuột khỏi những\nngón tay đã mất hết lực nắm."

# monologue
# JP: 単純な４００杯\x%l投炭;#00ffc040;投炭%l;#;も、３セット目の終わり――\n１．２トンともなれば、心身ともに摩耗し切る。
3243 = "Dù chỉ là bài tập \\x%l投炭;#00ffc040;xúc than%l;#; 400 xẻng đơn\ngiản, nhưng khi kết thúc set thứ 3——\nkhối lượng lên tới 1.2 tấn, cả thể xác lẫn\ntinh thần đều bị bào mòn đến kiệt quệ."

# 【ハチロク】
# display as 八六
# JP: 「……ふむ……ふむ」
1576 = "「……Hừm…… hừm.」"

# monologue
# JP: 跳ね上げ扉の向こうでは、ハチロクが床を確認している。\n床の上、石炭は黒く隙間なく、マスの全てを埋めている。
2742 = "Phía bên kia cánh cửa lật, Hachiroku đang\nkiểm tra mặt sàn.\nTrên sàn, than đen phủ kín không một khe\nhở, lấp đầy toàn bộ các ô."

# monologue
# JP: ボイラの中、釜の底――\x%l火床;#00ffc040;[かしょう,1]火床%l;#;に見立てて、\n五列五行に分割した、一から二十五までのマスの全てを。
3235 = "Bên trong nồi hơi, đáy lò——được mô phỏng\nthành \\x%l火床;#00ffc040;buồng lửa%l;#;,\nchia thành 5 hàng 5 cột, toàn bộ từ ô số 1\nđến ô số 25."

# 【ハチロク】
# display as 八六
# JP: 「奥正面が一番薄く、手前が厚く――\n良い石炭の敷き方ですね、基本どおりです」
2327 = "「Mặt trong cùng mỏng nhất, phía trước thì\ndày——\nCách rải than rất tốt, đúng theo cơ bản\nđấy ạ.」"

# monologue
# JP: ハチロクの足がぴたりと止まる。\n試すような目が僕を見る。
2757 = "Bước chân của Hachiroku đột ngột dừng lại.\nÁnh mắt mang vẻ dò xét nhìn tôi."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくし、失念してしまったのですが――\n何故、\x%l火床;#00ffc040;[かしょう,1]火床%l;#;の手前を厚く、奥を薄くとするのでしたか？」
2523 = "「Ngài Soutetsu. Em vô tình quên mất rồi——\nTại sao lại phải rải than ở \\x%l火床;#00ffc040;buồng lửa%l;#; phía\ntrước dày, phía trong mỏng vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「石炭が燃えるためには、吸気と排気とが必要。よって、\n燃焼中の釜の中は、ある種の吹き抜けとなるからだ」
2479 = "「Để than cháy được thì cần có khí nạp và\nkhí thải. Do đó,\nbên trong lò khi đang cháy sẽ trở thành\nmột loại thông gió.」"

# monologue
# JP: 跳ね上げ扉を開けばそこから、\n猛烈な勢いで新鮮な空気が釜の中へと雪崩れ込む。
2829 = "Khi mở cánh cửa lật ra, từ đó,\nkhông khí trong lành sẽ tràn vào trong lò\nvới thế mãnh liệt."

# monologue
# JP: スコップの中の石炭を何も考えず投げ込んだなら、\n排気口――煙突に繋がる\x%l火床;#00ffc040;火床%l;#;の奥へと吸い集められる。
2896 = "Nếu cứ vô tư ném than trong xẻng vào,\nchúng sẽ bị hút tụ lại phía trong \\x%l火床;#00ffc040;buồng lửa%l;#;\nnối với cửa xả——tức là ống khói."

# 【双鉄】
# display as 雙鐵
# JP: 「排気が詰まれば火が消える。そこまで悪くならずとも、\n石炭の敷きにムラができれば、燃焼効率は大きく下がる」
2236 = "「Cửa xả bị tắc thì lửa sẽ tắt. Dù không\nđến mức tồi tệ như vậy,\nnhưng nếu rải than không đều, hiệu suất\nđốt cháy sẽ giảm đi đáng kể.」"

# monologue
# JP: ゆえに、吸排気の発生しない練習場では、\n手前を厚く、奥が薄くと敷かれた床が、上等となる。
2988 = "Do đó, ở bãi tập không có hiện tượng nạp\nxả khí,\nmặt sàn được rải phía trước dày, phía\ntrong mỏng sẽ là đạt chuẩn cao nhất."

# monologue
# JP: 練習と同じく投げ込めば、実際の釜の\x%l火床;#00ffc040;火床%l;#;においては、\n空気の流れが石炭を、まんべんなく散りばめてくれるのだ。
2843 = "Nếu xúc vào giống hệt như lúc tập luyện,\nthì ở \\x%l火床;#00ffc040;buồng lửa%l;#; của lò thực tế,\nluồng không khí sẽ giúp phân tán than ra\nđều khắp nơi."

# 【ハチロク】
# display as 八六
# JP: 「ああ、そうでしたね。おかげで思い出せました。\nありがとうございます、双鉄様」
2047 = "「A, đúng là vậy nhỉ. Nhờ ngài mà em nhớ ra\nrồi.\nCảm ơn ngài, ngài Soutetsu.」"

# monologue
# JP: 言いながら、\nハチロクは手にした小スコップを巧みに操る。
2736 = "Vừa nói,\nHachiroku vừa điêu luyện thao tác chiếc\nxẻng nhỏ trên tay."

# monologue
# JP: 二番のマスからは一番に、四番のマスからは五番へと、\n半杯ずつほどの石炭を、掬って移し、じっと眺める。
2922 = "Từ ô số hai sang ô số một, từ ô số bốn\nsang ô số năm,\ncô ấy xúc và chuyển khoảng nửa xẻng than,\nrồi đứng nhìn chằm chằm."

# 【ハチロク】
# display as 八六
# JP: 「と、いうことでしたら、双鉄様。\nこの状態の方がよりよいのでは？」
2525 = "「Nếu là như vậy, ngài Soutetsu.\nChẳng phải trạng thái này sẽ tốt hơn sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「う……む。手前の両端、一番投げ込み辛いところは――\n今の僕の技量では、完全には投げ込みきれんようだな」
2085 = "「Ừ……m. Hai góc phía trước, chỗ khó ném vào\nnhất ấy——\nVới kỹ thuật hiện tại của tôi, có vẻ vẫn\nchưa thể ném vào hoàn hảo được.」"

# monologue
# JP: ポイントは、手首の返し。スコップを釜へ突っ込む瞬間に、\n手首を返して勢い良く伏せ、石炭を叩きつけることだ。
3145 = "Điểm mấu chốt là động tác lật cổ tay. Ngay\nkhoảnh khắc thọc xẻng vào lò,\nphải lật cổ tay úp mạnh xuống, đập than\nvào đó."

# monologue
# JP: 頭ではわかっているのだが、疲労が蓄積してきてしまうと、\nどうにも甘くなってしまう。
3250 = "Trong đầu thì hiểu rõ, nhưng khi sự mệt\nmỏi tích tụ,\nđộng tác kiểu gì cũng trở nên thiếu dứt\nkhoát."

# 【ハチロク】
# display as 八六
# JP: 「とはいえ、この程度でしたら上出来です。\n\x%lフライアッシュ;#00ffc040;[フライアッシュ,2]燃え殻%l;#;が些か無様になる程度。走行には支障は出ません」
1879 = "「Mặc dù vậy, ở mức độ này là rất xuất sắc\nrồi ạ.\nChỉ là \\x%lフライアッシュ;#00ffc040;tro bay%l;#; trông hơi khó coi một chút\nthôi. Sẽ không ảnh hưởng đến việc chạy tàu\nđâu ạ.」"

# monologue
# JP: 言い切り、そしてハチロクは、\n採点者の顔を溶かして、ひだまりのような笑顔を浮かべる。
3197 = "Nói dứt lời, Hachiroku\nrũ bỏ vẻ mặt của người chấm điểm, nở một\nnụ cười ấm áp như tia nắng."

# 【ハチロク】
# display as 八六
# JP: 「１００点満点中９２点。合格です、双鉄様」
2390 = "「92 trên thang điểm 100. Đạt yêu cầu rồi\nạ, ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2042 = "「Ồ.」"

# monologue
# JP: １セットから３セット、\nその全てで合格点を貰えたのは、これが初めてだ。
2921 = "Từ set 1 đến set 3,\nđây là lần đầu tiên tôi đạt điểm đỗ cho\ntất cả các set."

# monologue
# JP: ごく単純な喜びが、スカスカになった体を埋めんばかりの\n達成感が、腹の底から沸き起こってくる。
2839 = "Một niềm vui hết sức giản đơn, cùng cảm\ngiác thành tựu\nnhư lấp đầy cơ thể trống rỗng, trào dâng\ntừ tận đáy lòng."

# 【ハチロク】
# display as 八六
# JP: 「今の双鉄様が、平常のわたくしと一緒なら、\n[ていおう,1]帝央-[こうべ,1]河邊間の乗務にも耐えられることでしょう」
2134 = "「Ngài Soutetsu của hiện tại, nếu đi cùng\nvới em lúc bình thường,\nchắc chắn sẽ có thể chịu đựng được chuyến\ncông tác giữa Teio và Kobe đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2088 = "「Hừm.」"

# monologue
# JP: “平常の”という一言が、耳に気持ちに引っかかる。
2861 = "「Hừm.」"

# monologue
# JP: 赤井宮司にいただいたご助言に従って、\n今日にでも、登呂流湯に行っておくべきだろう。
2707 = "Từ \"lúc bình thường\" cứ vướng bận trong\ntai, trong tâm trí tôi."

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「そういうことであれば、ハチロク」\n「それでですね、双鉄様」
2245 = "「Nếu đã như vậy thì, Hachiroku」\n「Vì thế nên, ngài Soutetsu」"

# monologue
# JP: おっと、タイミングがかぶってしまった。\n僕の話は、夜までにすれば構わぬことだし――
2835 = "Ây da, lại trùng thời điểm mất rồi.\nChuyện của tôi thì để đến tối nói cũng\nchẳng sao——"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「ハチロクから先に――っ！」\n「双鉄様からお先に――っ！」
1927 = "「Hachiroku nói trước đi——!」\n「Ngài Soutetsu nói trước đi ạ——!」"

# monologue
# JP: またかぶった。\nいかん。これでは堂々めぐりだ。
2823 = "Lại trùng nữa rồi.\nKhông ổn. Cứ thế này thì sẽ luẩn quẩn mất."

# monologue
# JP: ならばハチロクの言葉に甘え、
3002 = "Nếu vậy thì cứ nghe theo lời Hachiroku,"

# 【凪】
# display as 凪
# JP: 「あーーーー、なんか面白そうなことしとるばいっ！」
2061 = "「Aaaaa, đang làm cái gì trông có vẻ thú vị\nquá kìa!」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「む」\n「きゃっ！？」
2053 = "「Hừm.」\n「Á!?」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、声、大きい」
2148 = "「Bé Nagi, tiếng ồn quá.」"

# monologue
# JP: 大声と同時に凪が、それをたしなめながらふかみが、\n\x%l投炭;#00ffc040;投炭%l;#;練習場へと入り込んでくる。
2712 = "Cùng lúc với tiếng hét lớn của Nagi,\nFukami vừa khuyên can\nvừa bước vào bãi tập \\x%l投炭;#00ffc040;xúc than%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　こんな時間にこんなところで」
2187 = "「Sao vậy? Giờ này lại ở chỗ thế này.」"

# 【ふかみ】
# display as 深美
# JP: 「あの、こんばんわ。です。わたし――えと、\nポーレットさんと、その、相談、あって」
2496 = "「Dạ, chào buổi tối. Ạ. Em——ừm,\ncó chuyện, muốn bàn bạc với chị Paulette.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ふむ？　ふむ。おお、なるほど、観光の連携か」
1577 = "「……Hừm? Hừm. Ồ, ra là vậy, liên kết du\nlịch sao.」"

# monologue
# JP: レールショップでクマ川下りの、\n発船所では御一夜鉄道一日乗車の割引券をそれぞれ配る。
3237 = "Ở cửa hàng đường sắt thì phát vé giảm giá\nxuôi dòng sông Kuma,\ncòn ở bến thuyền thì phát vé giảm giá đi\ntàu đường sắt Ohimitera một ngày."

# monologue
# JP: 単純なだけに、効果がありそうな試みだ。
3249 = "Dù đơn giản, nhưng lại là một thử nghiệm\ncó vẻ sẽ mang lại hiệu quả."

# 【ふかみ】
# display as 深美
# JP: 「それで……ポーレットさん、今しか時間、取れなくて。\nけど、一人だと……夜とか、危ない。です、から」
2224 = "「Vì thế nên…… chị Paulette, chỉ có thời\ngian rảnh vào lúc này.\nNhưng mà, nếu đi một mình…… vào buổi tối,\nthì nguy hiểm lắm. Ạ, nên là.」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪がボディーガードなわけか――っと？」
2230 = "「Nagi làm vệ sĩ cho em sao——hửm?」"

# monologue
# JP: 凪が近い。\n僕の手元に、息がかかるほど近づき熱心に覗きこんでいる。
2800 = "Nagi đang ở rất gần.\nĐến mức hơi thở phả vào tay tôi, em ấy\nđang say sưa nhìn chằm chằm."

# 【凪】
# display as 凪
# JP: 「それ何ばい？」
2475 = "「Cái đó là gì vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「これはワンスコ。\n石炭を投げ込むためのスコップだ」
2478 = "「Đây là wansuko.\nLà cái xẻng dùng để xúc than vào lò.」"

# 【凪】
# display as 凪
# JP: 「変な名前ばい」
2477 = "「Cái tên nghe kỳ cục quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、これが\x%l投炭;#00ffc040;投炭%l;#;練習機」
2370 = "「Còn đây là máy tập \\x%l投炭;#00ffc040;xúc than%l;#;.」"

# 【凪】
# display as 凪
# JP: 「こっちはすごく面白そうばい！\nなんだか修行に役立ちそうばい！」
2396 = "「Cái này trông thú vị cực kỳ!\nCó vẻ như sẽ giúp ích cho việc tu hành\nđấy!」"

# monologue
# JP: 足、腰、腕、そして背中を酷使することは間違いない。\n言われてみれば、剣術修行にも役立つようにも思える。
2811 = "Việc phải dùng lực quá độ ở chân, eo, tay\nvà cả lưng là điều chắc chắn.\nNghe em ấy nói vậy, tôi cũng thấy có vẻ sẽ\ngiúp ích cho việc tu hành kiếm thuật."

# 【双鉄】
# display as 雙鐵
# JP: 「スコップで石炭をすくい、逆の手で鎖を引き戸を開け、\n入れると同時にスコップを伏せ、石炭を床に叩きつける」
2374 = "「Dùng xẻng xúc than, tay kia kéo xích mở\ncửa,\nvừa đưa vào thì đồng thời úp xẻng xuống,\nđập than xuống sàn.」"

# monologue
# JP: （サク――カパっ――ザバっ）
3301 = "（Phập——Cạch——Rào）"

# 【凪】
# display as 凪
# JP: 「ほわぉっ！」
2043 = "「Oa!」"

# 【ふかみ】
# display as 深美
# JP: 「……綺麗……です。」
1571 = "「……Đẹp quá…… ạ.」"

# monologue
# JP: 実演をするやいなやのふかみの声に、\n気分がよくなる。
2974 = "Giọng nói của Fukami vang lên ngay khi tôi\nvừa làm mẫu xong,\nkhiến tâm trạng tôi trở nên vui vẻ."

# monologue
# JP: 素人目に綺麗と映る動作であるなら、\n僕の投げ込みもある程度、形が出来てきたのだろう。
3005 = "Nếu những động tác ấy trông đẹp mắt ngay\ncả với người ngoài ngành,\nthì chắc hẳn kỹ năng xúc than của tôi cũng\nđã thành hình ở một mức độ nào đó rồi."

# 【凪】
# display as 凪
# JP: 「面白そうばい！　やらせてばいっ！！」
2395 = "「Trông thú vị quá! Cho em làm thử với!!」"

# monologue
# JP: ハチロクを見れば、小さな頷き。\nが、凪はどうみても、普段着だ。
2970 = "Nhìn sang Hachiroku, cô ấy khẽ gật đầu.\nNhưng mà, nhìn kiểu gì thì Nagi cũng đang\nmặc đồ thường ngày."

# 【双鉄】
# display as 雙鐵
# JP: 「では今度、体操着でも着てきたときにやるといい」
2493 = "「Vậy để lần sau, khi nào em mặc đồ thể dục\nđến thì hẵng làm.」"

# 【凪】
# display as 凪
# JP: 「なんでばい！　この格好でも動けるばいっ」
2360 = "「Tại sao chứ! Mặc thế này em vẫn cử động\nđược mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前ならどんな格好でも動けるだろうが――\nほれ」
2510 = "「Nếu là em thì mặc kiểu gì chẳng cử động\nđược——\nĐây này.」"

# monologue
# JP: ぐい、と指先で自分の頬を強めにぬぐう。\nその指先を見せればふたりは、うわ、と飾らぬ声を出す。
2967 = "Tôi dùng đầu ngón tay quệt mạnh một cái\nlên má mình.\nKhi đưa ngón tay đó ra cho hai người xem,\nhọ liền buột miệng thốt lên \"Oa\" một cách\ntự nhiên."

# 【凪】
# display as 凪
# JP: 「まっくろばい！　なにやってそぎゃんと汚れとーと！」
2532 = "「Đen thui luôn kìa! Anh làm gì mà bẩn dữ\nvậy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、\x%l投炭;#00ffc040;投炭%l;#;練習だ」
2100 = "「Đã bảo là, do tập \\x%l投炭;#00ffc040;xúc than%l;#; mà.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　そうか。\n凪ちゃん、石炭って、ちっちゃな粉が飛ぶんだよ」
2065 = "「A! Ra là vậy.\nBé Nagi à, than đá ấy, bụi li ti của nó\nbay ra ghê lắm đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。[たんじん,1]炭塵と言う。\n付けば容易に落ちんばかりか、銭湯ですら嫌われるのだ」
2144 = "「Đúng vậy. Gọi là bụi than.\nDính vào không những khó giặt sạch, mà đến\ncả nhà tắm công cộng cũng ghét nữa là.」"

# 【凪】
# display as 凪
# JP: 「それも丁度いい修行ばい！\nひらりとかわしてみせるばいっ！！」
2486 = "「Thế thì lại càng hợp để tu hành!\nEm sẽ né tránh một cách nhẹ nhàng cho\nxem!!」"

# monologue
# JP: 無茶苦茶なことを言いながら、\nワンスコを取ろうとしがみついてくる。
2792 = "Vừa nói những lời vô lý,\nem ấy vừa bám lấy tôi đòi lấy chiếc xẻng\nwansuko."

# monologue
# JP: そこまでやりたいものならば、やらせてやっても構わんが、\n服を汚して、蓑笠老人の不興を買うのは望ましくない。
3246 = "Nếu em ấy đã muốn làm đến thế thì cho làm\ncũng chẳng sao,\nnhưng tôi không muốn em ấy làm bẩn quần áo\nrồi chuốc lấy sự phật ý của ông lão\nMinokasa."

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう。ならば、お爺様に電話して許可を得なさい。\nそうできたなら、いくらでも練習させてやろう」
2128 = "「Được thôi. Vậy thì, em hãy gọi điện xin\nphép ông nội đi.\nNếu ông đồng ý, anh sẽ cho em tập thỏa\nthích.」"

# 【凪】
# display as 凪
# JP: 「わかったばい！」
2398 = "「Rõ rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「服と肌とが石炭汚れにまみれること。\n一時間程度かかることも、きちんと伝えるんだぞ」
2443 = "「Nhớ nói rõ là quần áo và da dẻ sẽ bị bẩn\nlem luốc vì than đá.\nVà cũng mất khoảng một tiếng đồng hồ đấy\nnhé.」"

# monologue
# JP: 電話を貸そうとするより早く、\n凪がシンプルな携帯を取り出す。
3039 = "Còn nhanh hơn cả việc tôi định cho mượn\nđiện thoại,\nNagi đã rút ra một chiếc điện thoại di\nđộng kiểu dáng đơn giản."

# 【凪】
# display as 凪
# JP: 「あ、じいちゃん？　あのね、今ね、御一夜の駅でね」
2076 = "「A, ông ạ? Chuyện là, bây giờ cháu đang ở\nga Ohimitera.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……双鉄おにいさん」
2495 = "「Dạ…… anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2092 = "「Hửm?」"

# monologue
# JP: ふかみだ。\n絵に描いたような苦笑をしている。
3016 = "Là Fukami.\nEm ấy đang nở một nụ cười gượng gạo y như\ntrong tranh vẽ."

# 【ふかみ】
# display as 深美
# JP: 「ええと、凪ちゃんのおじいさん――\nすごく、凪ちゃんに甘い、です。だから」
2494 = "「À thì, ông của bé Nagi——\nrất là, chiều chuộng bé Nagi, ạ. Nên là.」"

# 【凪】
# display as 凪
# JP: 「にーさんにーさん！\n帰り、遅ぅなるよーやったら送ってくれっと？」
2117 = "「Anh hai, anh hai!\nLúc về, nếu muộn quá thì anh đưa em về\nđược không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、そのくらいは当然」
2095 = "「Hửm? À, chừng đó thì đương nhiên rồi.」"

# monologue
# JP: 答えた瞬間、凪は大きくＶサイン。
3195 = "Ngay khoảnh khắc tôi trả lời, Nagi giơ tay\nhình chữ V thật lớn."

# 【凪】
# display as 凪
# JP: 「ならオッケーばい！　服が汚れてもオッケーばい！\n帰り、夜中でもオッケーばい！！」
2499 = "「Vậy là ok rồi! Quần áo bẩn cũng ok!\nLúc về, có là nửa đêm cũng ok luôn!!」"

# 【ふかみ】
# display as 深美
# JP: 「こうなっちゃう。です」
2164 = "「Sẽ thành ra như thế này. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。それならばそれで構わん。\nが――」
2087 = "「Hừm. Nếu vậy thì cũng chẳng sao.\nNhưng mà——」"

# monologue
# JP: 蓑笠老人の許可とふかみは、関係無い。
3247 = "Sự cho phép của ông lão Minokasa và\nFukami, chẳng liên quan gì đến nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみはどうする？\nそれなりに時間がかかってしまうが」
2356 = "「Fukami tính sao?\nCũng sẽ mất kha khá thời gian đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、わたし。\n今日は、凪ちゃんのところお泊り、する。です。から」
2073 = "「A, em.\nHôm nay, sẽ ngủ lại nhà bé Nagi. Ạ. Nên\nlà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;練習を見ていくということか？\nそれとも、ふかみもチャレンジ」
2437 = "「Nghĩa là em sẽ ở lại xem tập \\x%l投炭;#00ffc040;xúc than%l;#;\nsao?\nHay là, Fukami cũng muốn thử thách.」"

# 【ふかみ】
# display as 深美
# JP: 「無理！　わたし。チャレンジは、無理。です」
1912 = "「Không được đâu! Em. Thử thách là, không\nthể nào. Ạ.」"

# monologue
# JP: 腕とか足とか、これ以上太くしたくないし――\nボソリと呟き、ふかみはすがるような目で僕を見る。
3140 = "Tay với chân, em không muốn làm cho to\nthêm nữa đâu——\nFukami lầm bầm nói nhỏ, rồi nhìn tôi bằng\nánh mắt như van nài."

# 【ふかみ】
# display as 深美
# JP: 「だから、できたら。\n汚れないとこで見ていたい。です」
2227 = "「Nên là, nếu được.\nEm muốn đứng xem ở chỗ không bị bẩn. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう。ならばハチロク――\nまず手始めから頼めるか？」
2126 = "「Được thôi. Vậy thì Hachiroku——\nCô có thể giúp hướng dẫn từ bước đầu tiên\nđược không?」"

# 【ハチロク】
# display as 八六
# JP: 「よろしいですよ。それでは凪様、\n\x%l投炭;#00ffc040;投炭%l;#;について簡単に説明させていただきます」
2378 = "「Được thôi ạ. Vậy thì cô Nagi,\nem xin phép giải thích ngắn gọn về việc \\x%l投炭;#00ffc040;xúc than%l;#;\nnhé.」"

# monologue
# JP: 素人の遊び半分の訓練志願を、\nハチロクはしかし嫌がらない。
3244 = "Một người nghiệp dư tình nguyện xin huấn\nluyện với nửa phần đùa giỡn,\nnhưng Hachiroku lại không hề tỏ ra khó\nchịu."

# monologue
# JP: 至極真面目に、僕にしたのと同じ説明を、\nより噛み砕いた表現をもって凪へと行う。
2878 = "Cô ấy giải thích cho Nagi một cách cực kỳ\nnghiêm túc,\ngiống hệt như đã giải thích với tôi nhưng\nbằng những từ ngữ dễ hiểu hơn."

# 【凪】
# display as 凪
# JP: 「わかったばい！　一キロのスコップで百杯なら、\n百キロの石炭投げ込むばいね！」
2399 = "「Hiểu rồi! Nếu xúc 100 xẻng bằng cái xẻng\n1 ký,\nthì tức là ném vào 100 ký than đúng\nkhông!」"

# monologue
# JP: 初回メニューも、僕と同じだ。\n百キロと聞き、ふかみがうへぇと声を出す。
3106 = "Bài tập đầu tiên cũng giống hệt tôi.\nNghe thấy 100 ký, Fukami buột miệng kêu\nlên một tiếng \"Oái\"."

# monologue
# JP: が――凪はまったく、怯む気配すら見せない。
2696 = "Nhưng——Nagi hoàn toàn không có vẻ gì là\nchùn bước."

# 【ハチロク】
# display as 八六
# JP: 「はじめてください」
2449 = "「Xin hãy bắt đầu đi ạ.」"

# 【凪】
# display as 凪
# JP: 「どおりゃあああああああっ！！！！」
2097 = "「Doryaaaaaaa!!!!」"

# 【ハチロク】
# display as 八六
# JP: 「全くダメです。一箇所に石炭が集まっています。\nスコップを伏せ、手前を厚く奥を薄くと――」
2138 = "「Hoàn toàn không được ạ. Than đang bị tụ\nlại một chỗ rồi.\nPhải úp xẻng xuống, rải phía trước dày\nphía trong mỏng——」"

# 【凪】
# display as 凪
# JP: 「初めてでそんなんよーできんばい！」
2528 = "「Mới lần đầu sao mà làm được như thế chứ!」"

# 【ハチロク】
# display as 八六
# JP: 「そうなのですか？\n双鉄様には出来ましたのに」
2297 = "「Vậy sao ạ?\nNhưng ngài Soutetsu đã làm được đấy ạ.」"

# 【凪】
# display as 凪
# JP: 「んっ――ぐっ！　なら、もう一回ばいっ！！」
2081 = "「Ưm——hự! Nếu vậy thì, làm lại lần nữa!!」"

# 【凪】
# display as 凪
# JP: 「く――んっ！　くはっ！\nこれで――どうばいっ！！！」
2051 = "「Hự——ưm! Hơ!\nThế này——thì sao!!!」"

# 【ハチロク】
# display as 八六
# JP: 「さっきよりは遥かに良くなっています。\n１００点満点中、２２点は差し上げられます」
2329 = "「Đã tốt hơn lúc nãy rất nhiều rồi ạ.\nTrên thang điểm 100, em có thể cho cô 22\nđiểm.」"

# 【凪】
# display as 凪
# JP: 「２２っ！？　たったそれだけとっ！？」
2545 = "「22 á!? Chỉ được chừng đó thôi sao!?」"

# 【ハチロク】
# display as 八六
# JP: 「こちらへ回って、\n仕上がりをご自分でお確かめください」
2447 = "「Xin hãy qua bên này,\nvà tự mình kiểm tra thành quả đi ạ.」"

# 【凪】
# display as 凪
# JP: 「はぁっ――はあっ――はあっ――はあっ――\nこれ、で――どう――ばいっ！」
2431 = "「Hà——hà——hà——hà——\nThế này, thì——sao——hả!」"

# 【ハチロク】
# display as 八六
# JP: 「……見違えるほど良くなりました。\nおまけせず、公平な採点で５１点を差し上げます」
1575 = "「……Đã tiến bộ đến mức không nhận ra luôn\nạ.\nKhông châm chước, em chấm điểm công bằng\nlà 51 điểm.」"

# 【凪】
# display as 凪
# JP: 「やっと……半分、こえた――ばーいっ」
2412 = "「Cuối cùng…… cũng qua được, một nửa——rồi.」"

# monologue
# JP: （どさっ）
# 3298 = "（咣當）" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！」
2146 = "「Bé Nagi!」"

# monologue
# JP: 床へと崩れた凪にふかみが駆け寄り支える。
3052 = "Nagi gục xuống sàn, Fukami vội chạy đến đỡ\nlấy."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん……ダメばい、\n汗と黒いの、うつっちゃうばい」
2151 = "「Fukami…… không được đâu,\nmồ hôi với thứ đen đen này, dính sang cậu\nmất.」"

# 【ふかみ】
# display as 深美
# JP: 「そんなことっ――\nああ、もう、こんなになるまで」
2361 = "「Chuyện đó thì nhằm nhò gì——\nTrời ơi, thật tình, sao lại đến nông nỗi\nnày.」"

# monologue
# JP: ふかみがハンカチで凪をぬぐうが、\n炭塵汚れは少しも落ちない。
3051 = "Fukami dùng khăn tay lau cho Nagi,\nnhưng vết bẩn do bụi than chẳng sạch đi\nchút nào."

# monologue
# JP: が、顔をふかれる凪はいかにも、\n心地よさげに目を細めている。
2715 = "Thế nhưng, Nagi được lau mặt\nlại nheo mắt lại với vẻ vô cùng dễ chịu."

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだ。\nこんなになるまで、本当によく頑張った」
2418 = "「Giỏi lắm.\nĐến mức này thì, em thực sự đã rất cố gắng\nrồi.」"

# monologue
# JP: 倒れるまで力を尽くす――口で言うのは容易いことだが、\n実際にそう出来る人間は、ほとんどいない。
3114 = "Dốc hết sức lực cho đến khi gục ngã——nói\nbằng miệng thì dễ,\nnhưng những người thực sự làm được điều\nđó, hầu như không có mấy ai."

# monologue
# JP: まして、凪のような学園生、しかも女でそう出来るものが、\n果たして何人いることだろうか。
3020 = "Huống hồ, một học sinh như Nagi, lại còn\nlà con gái mà làm được như vậy,\nthì rốt cuộc có được bao nhiêu người cơ\nchứ."

# 【双鉄】
# display as 雙鐵
# JP: 「約束通り、送り届けよう」
2444 = "「Như đã hứa, anh sẽ đưa em về.」"

# monologue
# JP: （ひょいっ）
3304 = "（Nhấc bổng）"

# 【ふかみ】
# display as 深美
# JP: 「わ、いいな凪ちゃん」
2031 = "「Oa, thích thật đấy bé Nagi.」"

# 【凪】
# display as 凪
# JP: 「う～～っ」
2057 = "「Ư~~」"

# monologue
# JP: 背負えば凪は、拍子抜けするほどに軽く小さい。
2981 = "Khi cõng lên lưng, Nagi nhẹ và nhỏ bé đến\nmức khiến tôi hụt hẫng."

# 【凪】
# display as 凪
# JP: 「いけんばい。\nにーさんにも、汗と汚れがうつっちゃうばい」
1872 = "「Không được đâu.\nAnh hai cũng sẽ bị dính mồ hôi và bụi bẩn\nmất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。元より汚れているし、\n送り届けたあとは登呂流湯に直行だからな」
2362 = "「Không sao. Vốn dĩ anh đã bẩn sẵn rồi,\nsau khi đưa em về, anh sẽ đi thẳng đến nhà\ntắm Tororyu-yu mà.」"

# 【凪】
# display as 凪
# JP: 「登呂流湯？　さっきにーさん、\n石炭汚れは銭湯もいやがるゆーてなかったと？」
2384 = "「Nhà tắm Tororyu-yu? Lúc nãy anh hai bảo,\nnhà tắm công cộng cũng ghét vết bẩn than\nđá mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯だけは例外だ。\nあそこは、女湯を貸し切りにして入らせてくれる」
2383 = "「Nhà tắm Tororyu-yu là ngoại lệ.\nỞ đó, họ cho phép anh bao trọn phòng tắm\nnữ để tắm.」"

# 【凪】
# display as 凪＆深美
# JP: 「貸し切り！？」\n「お、女湯――って」
1979 = "「Bao trọn phòng!?」\n「Ph, phòng tắm nữ——sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あそこの主人は鉄道に大変に理解があるのだ。が、\n広い男湯を汚されてしまってはかなわんとのことでな」
2503 = "「Bà chủ ở đó rất thấu hiểu cho ngành đường\nsắt. Nhưng mà,\nbà ấy bảo nếu làm bẩn phòng tắm nam rộng\nlớn thì phiền lắm.」"

# monologue
# JP: 23:00すぎの登呂流湯のことを説明すれば、どんどんと、\n凪の鼻息が荒くなり、ふかみの顔が赤くなっていく。
2939 = "Khi tôi giải thích về nhà tắm Tororyu-yu\nsau 23:00,\nhơi thở của Nagi dần trở nên gấp gáp, còn\nmặt Fukami thì ngày càng đỏ lựng."

# 【凪】
# display as 凪
# JP: 「貸し切りばい！　面白そうばい！\n絶対はいらせてもらうばーーーいっ！！」
1978 = "「Bao trọn phòng! Nghe thú vị quá!\nNhất định em phải vào tắm mớiiiiiiiiii\nđượccc!!」"

# 【ふかみ】
# display as 深美
# JP: 「そ、そうだよ、ね――凪、ちゃん。\nか、貸し切りとか……ええと、面白そう、だし」
2255 = "「Đ, đúng vậy, nhỉ——bé Nagi.\nB, bao trọn phòng hay gì đó…… ừm, có vẻ\nthú vị, mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2088 = "「嗯」" 

# monologue
# JP: 凪をささえて拭いてやるうち、\nふかみにもかなり汚れがついた。
3069 = "Trong lúc đỡ Nagi và lau mặt cho em ấy,\nFukami cũng bị dính khá nhiều vết bẩn."

# monologue
# JP: 真っ黒なまま帰してもさぞ迷惑だろうが、\n勝手に風呂に入れるというのもまた迷惑なことかもしれん。
3252 = "Để các em ấy đen nhẻm như vậy đi về thì\nchắc sẽ gây phiền phức lắm,\nnhưng tự ý đưa đi tắm thì có khi lại càng\nphiền phức hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「保護者にきちんと説明をして問い合わせてくれ。\n許諾が出たなら、登呂流湯には僕から掛け合おう」
1898 = "「Hãy giải thích rõ ràng và hỏi ý kiến\nngười giám hộ đi.\nNếu được cho phép, anh sẽ đứng ra nói\nchuyện với nhà tắm Tororyu-yu.」"

# monologue
# JP: （かぽんっ）
3313 = "（Cạch）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふ～～っ」
2028 = "「Phù~~」"

# monologue
# JP: 長く、だらしない声が出てしまう。\n体が、それほどに疲労している。
2945 = "Một tiếng thở dài não nề buột ra khỏi\nmiệng.\nCơ thể tôi đã mệt mỏi đến nhường ấy."

# monologue
# JP: 肉がスカスカになってしまって、\nその空隙に、湯がしみこんでいってるようだ。
2905 = "Da thịt như trống rỗng,\nvà nước nóng đang thấm dần vào những\nkhoảng không ấy."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。お体をお揉みいたします」
2519 = "「Ngài Soutetsu. Em sẽ xoa bóp cơ thể cho\nngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、頼む――と言いたいところではあるが、\n今日のところは僕より凪にしてやってくれ」
2514 = "「À, nhờ cô——tôi rất muốn nói vậy,\nnhưng hôm nay cô hãy làm cho Nagi thay vì\ntôi đi.」"

# 【ハチロク】
# display as 八六
# JP: 「その必要は、今はないかと」
2205 = "「Em nghĩ bây giờ không cần thiết đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　おお」
2093 = "「Hửm? Ồ.」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？　ここ、どう？　気持ちいい？」
2150 = "「Bé Nagi? Chỗ này, sao rồi? Có dễ chịu\nkhông?」"

# 【凪】
# display as 凪
# JP: 「く～～っ！　効くたいっ！\nもちょっと、強ぉに頼むばいっ！」
2059 = "「Ư~~! Thấm lắm!\nXin hãy làm mạnh thêm chút nữa đi!」"

# 【ふかみ】
# display as 深美
# JP: 「えええ――この辺で――んしょっ――\nわたし――んっ――結構――げん、かいっ――かもっ」
2037 = "「Êêê——Cỡ này——hây dô——\nChị——ưm——chắc cũng——đến giới, hạn——rồi.」"

# 【凪】
# display as 凪
# JP: 「くああああっ、そこっ！　そこばいっ！」
2056 = "「Kuaaaa, chỗ đó! Chỗ đó đấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
1572 = "「……Ra là vậy.」"

# monologue
# JP: 広い湯船の反対側の端で、\nふかみが凪を、熱心にもみほぐしてやっている。
2845 = "Ở phía đầu bên kia của bồn tắm rộng lớn,\nFukami đang nhiệt tình xoa bóp cho Nagi."

# monologue
# JP: あそこにハチロクが入っていっても、\nかえって邪魔になるだけだろう。
2892 = "Hachiroku mà xen vào chỗ đó,\nthì khéo lại thành kỳ đà cản mũi mất."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。頼めるか」
2498 = "「Nếu vậy thì, Hachiroku. Nhờ cô được\nkhông.」"

# 【ハチロク】
# display as 八六
# JP: 「おまかせください。双鉄様」
2448 = "「Xin cứ giao cho em. Ngài Soutetsu.」"

# monologue
# JP: （もみゅっ、もみゅっ、くにゅっ、もみぃっ）
3310 = "（Nắn nắn, bóp bóp, nhào nhào, nắn nắn）"

# monologue
# JP: ……ハチロクの小さな指が、\n僕の強張った筋肉たちをほぐして隙間に血を通していく。
1513 = "……Những ngón tay nhỏ nhắn của Hachiroku,\nđang xoa dịu những bó cơ căng cứng của\ntôi, giúp máu lưu thông qua các khe hở."

# monologue
# JP: ハチロクの手は、いつもと同じ強さと熱さだ、\n動揺を、しているようには感じられない。
2752 = "Đôi tay của Hachiroku vẫn mang sức mạnh và\nđộ ấm như mọi khi,\ntôi không hề cảm thấy cô ấy đang có chút\ndao động nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ショックではなかったのか？」
1904 = "「Cô không thấy sốc sao?」"

# monologue
# JP: 何が、などとは聞くまでもない。\nハチロクも、当然のように答えてくれる。
3010 = "Chẳng cần phải hỏi là chuyện gì.\nHachiroku cũng đáp lại như một lẽ đương\nnhiên."

# 【ハチロク】
# display as 八六
# JP: 「半ば……予想はしておりました。\nわたくしの記憶と機能の障害は、外傷によらぬものだと」
2208 = "「Một nửa trong em…… đã dự đoán được điều\nđó.\nRằng những chướng ngại về ký ức và chức\nnăng của em, không phải do ngoại thương\ngây ra.」"

# monologue
# JP: ……登呂流湯のばあさんの短い検査と問診、触診。\n専用らしい機械にかけての機能確認。
1519 = "……Bà lão ở nhà tắm Tororyu-yu đã tiến hành\nkiểm tra ngắn, hỏi bệnh và sờ nắn.\nSau đó xác nhận chức năng bằng một cỗ máy\ncó vẻ là đồ chuyên dụng."

# monologue
# JP: その結果、ハチロクにくだされた診断は、\n『全ての機能に異常なし』というものだった。
3030 = "Kết quả là, chẩn đoán được đưa ra cho\nHachiroku là,\n『Tất cả các chức năng đều không có gì bất\nthường』."

# 【ハチロク】
# display as 八六
# JP: 「わたくしの障害の原因が、“考えすぎ”と……\nそれがどういう意味なのか、少し悩ましくはありますが」
2209 = "「Nguyên nhân gây ra chướng ngại của em là\ndo \"suy nghĩ quá nhiều\"……\nĐiều đó có nghĩa là gì, em cũng có chút\nphiền não.」"

# monologue
# JP: 揉まれている腕を持ち上げ、\nハチロクの、濡れている髪に手櫛をかける。
2956 = "Tôi nhấc cánh tay đang được xoa bóp lên,\ndùng tay luồn qua mái tóc ướt của\nHachiroku như một chiếc lược."

# monologue
# JP: ハチロクは嫌がりもせず、\n僕に頭をあずけてくる。
2737 = "Hachiroku không hề tỏ ra khó chịu,\nmà còn tựa đầu vào tay tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「悩むことはない。文字通りだろう」
2334 = "「Không có gì phải phiền não cả. Chỉ là\nđúng như nghĩa đen thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「文字通り、とおっしゃいますと？」
2135 = "「Đúng như nghĩa đen, ý ngài là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前がコントロール出来ない部分がおそらく、\n勝手に考えてしまうがゆえの、“考えすぎ”だ」
1906 = "「Những phần mà cô không thể kiểm soát có\nlẽ là,\ndo cô tự ý suy nghĩ, nên mới thành ra \"suy\nnghĩ quá nhiều\".」"

# 【ハチロク】
# display as 八六
# JP: 「勝手に……\n何を考えてしまうのでしょうか？」
1869 = "「Tự ý……\nEm đã suy nghĩ về chuyện gì cơ chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「『この記憶は事故と関係が深すぎる。\n思い出させては危ない』――などとな」
2330 = "「Kiểu như 『Ký ức này có liên quan quá sâu\nsắc đến vụ tai nạn.\nĐể nhớ lại thì nguy hiểm lắm』――chẳng hạn.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
2041 = "「À.」"

# monologue
# JP: ため息のようなその“ああ”は、\n感心したようにも呆れたようにも聞こえる。
2734 = "Tiếng \"À\" nghe như một tiếng thở dài đó,\nvừa giống như đang thán phục, lại vừa\ngiống như đang cạn lời."

# 【ハチロク】
# display as 八六
# JP: 「確かに、人間にでしたらありそうな話ですが――\nそれが、物であるわたくしにも」
2392 = "「Quả thực, nếu là con người thì có thể sẽ\ncó chuyện đó——\nNhưng điều đó, lại xảy ra với một đồ vật\nnhư em sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あるのではないか、と僕は思う」
2219 = "「Tôi nghĩ là có đấy.」"

# monologue
# JP: ハチロクの傷。僕自身の傷。\nそのかさぶたを剥がさぬようにと、言葉を探る。
2961 = "Vết thương của Hachiroku. Vết thương của\nchính tôi.\nTôi thận trọng tìm kiếm từ ngữ, để không\nbóc lớp vảy của chúng ra."

# 【双鉄】
# display as 雙鐵
# JP: 「……考えとは、知性の産物だ。\nそして知性は容易に連鎖し、時に暴走さえするからな」
1580 = "「……Suy nghĩ, là sản phẩm của trí tuệ.\nVà trí tuệ thì rất dễ tạo ra chuỗi phản\nứng dây chuyền, thậm chí đôi khi còn vượt\nngoài tầm kiểm soát.」"

# 【ハチロク】
# display as 八六
# JP: 「ですから――考えすぎてしまう？」
2223 = "「Vì thế nên——mới suy nghĩ quá nhiều ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。知性や……理性すら本当は制御しがたいものだ。\n僕にとっても――恐らくは、ハチロク、お前にとっても」
2335 = "「Đúng vậy. Trí tuệ hay…… ngay cả lý trí\nthực chất cũng rất khó kiểm soát.\nĐối với tôi——và có lẽ, đối với cả cô nữa,\nHachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「そう……ですか。\nけれど、それでしたら安心です」
2296 = "「Vậy…… sao ạ.\nNhưng mà, nếu là vậy thì em yên tâm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「安心？」
2237 = "「Yên tâm?」"

# monologue
# JP: 大きくうなずき、\nそのはずみで、ハチロクの顔がいくらか、湯船の中を揺らす。
2749 = "Cô ấy gật đầu thật mạnh,\ntheo đà đó, khuôn mặt của Hachiroku tạo ra\nvài gợn sóng trong bồn tắm."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが考えすぎてしまうのは、\nきっと――考えずにいるのが怖いからです」
2200 = "「Việc em suy nghĩ quá nhiều,\nchắc chắn là do——em sợ phải không suy nghĩ\ngì cả.」"

# monologue
# JP: わかる。\n僕も同じであるから。
2959 = "Tôi hiểu.\nBởi vì tôi cũng giống như vậy."

# monologue
# JP: 事故の記憶に触れずにいれば、大事な記憶も失いそうで。\nそれを失ってしまったのなら、生きる理由を見失うから。
3179 = "Nếu không chạm vào ký ức về vụ tai nạn,\ndường như tôi sẽ đánh mất cả những ký ức\nquan trọng.\nBởi vì nếu đánh mất nó, tôi sẽ không còn\nlý do để sống nữa."

# 【ハチロク】
# display as 八六
# JP: 「ですが双鉄様といればわたくし、少しも怖くありません。\nきっと、考えすぎずにすみます」
1895 = "「Nhưng nếu ở cùng ngài Soutetsu, em sẽ\nkhông sợ hãi chút nào.\nChắc chắn, em sẽ không phải suy nghĩ quá\nnhiều nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
2083 = "「Ừm……」"

# monologue
# JP: 赤井宮司に言われたことを思い出す。\n未来など、人にも物にも、誰にとっても手探りなのだと。
2941 = "Tôi nhớ lại những lời thầy Akai đã nói.\nTương lai, dù là con người hay đồ vật, dù\nlà ai đi nữa cũng đều phải tự mình mò mẫm."

# 【双鉄】
# display as 雙鐵
# JP: 「しかしハチロク、僕は僕以外の何者でもない。\nお前の代わりに、お前の答えを考えてはやれんぞ？」
1892 = "「Nhưng Hachiroku này, tôi không phải ai\nkhác ngoài chính tôi.\nTôi không thể suy nghĩ thay cô để tìm ra\ncâu trả lời cho cô được đâu?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――それをいうなら、\nわたくしは、物以外の何者でもありません」
2518 = "「Ngài Soutetsu——nếu ngài nói vậy thì,\nem cũng không là gì khác ngoài một đồ vật\ncả.」"

# monologue
# JP: 柔らかな声、穏やかな口調。\nけれども、断固とした響き。
3055 = "Giọng nói dịu dàng, điệu bộ ôn hòa.\nNhưng lại vang lên một cách kiên quyết."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が考えて、与えてくださるご指示こそが、\nそのまま、わたくしの求める答えなのです」
2520 = "「Chính những chỉ thị mà ngài Soutetsu đã\nsuy nghĩ và đưa ra,\nđó mới là câu trả lời mà em đang tìm\nkiếm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「たとえそれが――誤った指示であってもか？」
2048 = "「Cho dù đó——là một chỉ thị sai lầm sao?」"

# 【ハチロク】
# display as 八六
# JP: 「仮に、良くない結果を招こうとも。\n双鉄様が下さるご指示が、唯一無二の正解です」
2166 = "「Giả sử như, điều đó có dẫn đến kết quả\nkhông tốt đi chăng nữa.\nThì chỉ thị mà ngài Soutetsu đưa ra, vẫn\nlà câu trả lời chính xác duy nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふうむ」
2052 = "「Hừm.」"

# monologue
# JP: 掃除機のスイッチをいれれば、\n掃除機は、愚直に吸引を始めるはずだ。
2902 = "Giống như máy hút bụi, chỉ cần bật công\ntắc,\nlà nó sẽ ngoan ngoãn bắt đầu hút."

# monologue
# JP: ノズルの先に待つものが、\n例えその身を溶かしてしまう、濃硫酸であろうとも。
2906 = "Cho dù thứ chờ đợi trước vòi hút,\ncó là axit sunfuric đặc sẽ làm tan chảy cả\ncơ thể nó đi chăng nữa."

# monologue
# JP: （物とは……そうか。\n主の求めに、ただ答えようとするものなのか）
3308 = "（Đồ vật là…… ra là vậy sao.\nLà thứ chỉ biết đáp lại yêu cầu của chủ\nnhân thôi sao.）"

# monologue
# JP: なら――物の身でありながら、主に捨てられたハチロクは、\n判断の基準を失くしたままで、眠り続けていたのだろう。
3234 = "Vậy thì——dù mang thân phận đồ vật, nhưng\nlại bị chủ nhân vứt bỏ, Hachiroku\nchắc hẳn đã chìm trong giấc ngủ dài khi\nđánh mất đi tiêu chuẩn phán đoán."

# monologue
# JP: その不安定な状態で、過去に縛られ苦しめられて……\nそれを“考えすぎ”と切り捨てるのは、言葉不足だ。
2838 = "Trong trạng thái bất ổn đó, cô ấy bị quá\nkhứ trói buộc và hành hạ……\nNếu chỉ dùng một câu \"suy nghĩ quá nhiều\"\nđể gạt bỏ điều đó, thì thật là thiếu sót."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――」
1923 = "「Hachiroku——」"

# monologue
# JP: かといって、僕に足せるような事は無い。\n過去にはなにもしてやれないし――
2698 = "Nói là vậy, nhưng tôi cũng chẳng thể làm\ngì thêm.\nTôi chẳng thể can thiệp gì vào quá khứ\ncả——"

# monologue
# JP: だから口から出て行くのはただ、\n感じたそのままのことだけだ。
2985 = "Vì vậy, những lời buột ra khỏi miệng tôi,\nchỉ là những gì tôi cảm nhận được ngay lúc\nnày."

# 【双鉄】
# display as 雙鐵
# JP: 「……お前は、物で、道具なのだな」
1568 = "「……Cô quả thực là một đồ vật, một công cụ\nnhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「もちろんですとも、双鉄様」
2480 = "「Tất nhiên rồi ạ, ngài Soutetsu.」"

# monologue
# JP: 誇らしげな声。\nハチロクは胸を張っている。
2867 = "Giọng nói đầy tự hào.\nHachiroku ưỡn ngực kiêu hãnh."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様の道具で、物です」
2211 = "「Em là công cụ của ngài Soutetsu, là đồ\nvật của ngài.」"

# 【ふかみ】
# display as 深美
# JP: 「ど、ど、どうぐで――ものっ！」
2172 = "「C, c, công cụ——đồ vật!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？　――おおっ」
2091 = "「Hửm? ——Ồ.」"

# monologue
# JP: 近い。ふかみがいつの間に。\n凪と並んで、僕らの方へと寄ってきている。
2890 = "Gần quá. Fukami từ lúc nào đã\ncùng Nagi xích lại gần phía chúng tôi."

# 【ふかみ】
# display as 深美
# JP: 「やっぱり……そういう……ふたり、そういう――」
2312 = "「Quả nhiên…… hai người…… là mối quan hệ\nnhư thế——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ？」
2357 = "「Fukami?」"

# monologue
# JP: 様子がおかしい。\n言葉が、まるでうわごとだ。
2869 = "Dáng vẻ em ấy lạ lắm.\nLời nói nghe cứ như đang mê sảng vậy."

# 【ふかみ】
# display as 深美
# JP: 「あ、でも……お仕事だけで、そういう関係かも、だし、\nそれなら、わたしにも。そういうチャンス、ある、かも」
2067 = "「A, nhưng mà…… nếu chỉ vì công việc mà có\nmối quan hệ như thế, thì,\nnhư vậy, mình cũng. Có cơ hội, như thế,\nkhông chừng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しっかりしろ、ふかみ。\nさっきから『そういう』ばかりを言っているぞ」
1903 = "「Tỉnh táo lại đi, Fukami.\nTừ nãy giờ em cứ nói 'như thế' suốt đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「は……ふぇ？」
2432 = "「Hả…… hả?」"

# monologue
# JP: 凪がふかみに手をのばす。\n体温を計りたいのか、首筋にぴたり手を当てる。
2799 = "Nagi vươn tay về phía Fukami.\nNhư muốn đo thân nhiệt, em ấy áp sát tay\nvào cổ Fukami."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、顔真っ赤ばい！　のぼせたと？」
2156 = "「Fukami, mặt cậu đỏ bừng kìa! Bị ngâm nóng\nquá rồi hả?」"

# 【ふかみ】
# display as 深美
# JP: 「のぼせた……う～～っ、かなり、\nのぼせて、アテられたかも～」
2349 = "「Ngâm nóng quá…… ư~~, chắc là,\nbị ngâm nóng quá nên say sóng luôn rồi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「湯あたりか？　それはいかんな」
2347 = "「Say nước nóng à? Thế thì không ổn rồi.」"

# monologue
# JP: 全身が、ゆでダコのように赤くなっている。\n一刻も早く、湯から出してやった方が良かろう。
2858 = "Toàn thân em ấy đỏ rực như con bạch tuộc\nluộc.\nTốt nhất là nên đưa em ấy ra khỏi bồn tắm\ncàng sớm càng tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「そら、つかまれ」
1907 = "「Đây, bám vào anh đi.」"

# 【ふかみ】
# display as 深美
# JP: 「ふぇぇぇええっ！？　だいじょうぶっ！　\n大丈夫っ！　です」
2038 = "「Êêêêê!? Không sao đâu! \nKhông sao đâu! Ạ.」"

# monologue
# JP: ゆでダコ訂正、ゆでエビだ。
3190 = "Xin đính chính lại, không phải bạch tuộc\nluộc, mà là tôm luộc."

# monologue
# JP: 僕の差し出す手からビビビと激しく跳ね逃れ、\nそのままふかみは、自力で洗い場へと上がる。
3049 = "Em ấy giật nảy mình né tránh bàn tay tôi\nđưa ra,\nrồi tự mình trèo lên khu vực tắm tráng."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、背中流してあげるばいっ！」
2153 = "「Fukami, để tớ kỳ lưng cho nhé!」"

# monologue
# JP: すぐさま凪もその後を追う。\n波立ちまくった湯船が程無く、静かに収まる。
2804 = "Nagi cũng lập tức đuổi theo sau.\nBồn tắm đang nổi sóng cuồn cuộn chẳng mấy\nchốc đã trở lại tĩnh lặng."

# monologue
# JP: ハチロクの目は凪とふかみとを見送って、\nそれからまっすぐ、僕へと戻る。
2755 = "Ánh mắt Hachiroku dõi theo Nagi và Fukami,\nrồi lại hướng thẳng về phía tôi."

# 【ハチロク】
# display as 八六
# JP: 「……しかし、凪様には驚かされました」
1566 = "「……Nhưng mà, cô Nagi làm em bất ngờ thật\nđấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\x%l投炭;#00ffc040;投炭%l;#;か」
2284 = "「À, chuyện \\x%l投炭;#00ffc040;xúc than%l;#; sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。初めてで、しかもあの小柄さであそこまでとは」
2337 = "「Vâng. Mới lần đầu, lại với vóc dáng nhỏ\nbé như vậy mà làm được đến thế.」"

# monologue
# JP: 洗い場にいる凪を見る。\n服を着ているときより、さらに小さく見える、が――
2973 = "Tôi nhìn Nagi đang ở khu vực tắm tráng.\nTrông em ấy còn nhỏ bé hơn cả lúc mặc quần\náo, nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「口先だけではない。\nあれは、相当に鍛え込んでいる」
2017 = "「Không phải chỉ nói suông đâu.\nĐứa trẻ đó đã rèn luyện rất nhiều đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「１００キロ\x%l投炭;#00ffc040;投炭%l;#;とはいえ、連続で３セットですからね。\n……わたくし、最後は\x%l機関助士;#00ffc040;機関助士%l;#;候補と見ておりました」
2512 = "「Tuy chỉ là \\x%l投炭;#00ffc040;xúc than%l;#; 100 ký, nhưng lại làm\nliên tục 3 set cơ mà.\n……Đến cuối cùng, em đã xem cô ấy như một\nứng cử viên cho vị trí \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; rồi đấy\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\x%l機関助士;#00ffc040;機関助士%l;#;候補か」
1987 = "「Ra là vậy, ứng cử viên \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。小さく薄いお体ですし」
2336 = "「Vâng. Cơ thể cô ấy lại nhỏ nhắn và mỏng\nmanh nữa.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の[キャブ,2]運転台は狭い。
87 = "Buồng lái của \\x%l8620;#00ffc040;8620%l;#; rất chật hẹp."

# monologue
# JP: その狭さを少しでも軽減するため、\n運転モードの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が人形サイズであるほどに。
3146 = "Để giảm bớt sự chật hẹp đó dù chỉ một\nchút,\n\\x%lレイルロオド;#00ffc040;Railord%l;#; ở chế độ lái mới có kích thước như\nbúp bê."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。キャブ内では小柄さは有利となるのだな。\nふむ――もし、凪が興味を示すものなら」
2295 = "「Ra là vậy. Trong buồng lái thì vóc dáng\nnhỏ bé lại là một lợi thế nhỉ.\nHừm——nếu như Nagi tỏ ra hứng thú.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。そのときには是非とも勧誘いたしましょう」
2263 = "「Vâng. Lúc đó chúng ta nhất định phải mời\ngọi cô ấy.」"

# monologue
# JP: 真面目な顔でそこまで言って、\nハチロクはハっと何かに気付いたように苦笑する。
2862 = "Nói đến đó với vẻ mặt nghiêm túc,\nHachiroku bỗng giật mình như nhận ra điều\ngì đó rồi cười khổ."

# 【ハチロク】
# display as 八六
# JP: 「“そのとき”を迎えるためには、\nまだまだ無数に、こなすべきことがありますけれど」
2511 = "「Để đón chờ \"lúc đó\",\nchúng ta vẫn còn vô số việc phải hoàn\nthành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無数ではない、数えきれるさ。\nゆえに、ひとつずつ潰していける」
1881 = "「Không phải vô số đâu, đếm được cả đấy.\nVì vậy, chúng ta có thể giải quyết từng\nviệc một.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
2062 = "「A.」"

# monologue
# JP: 苦笑に緩んだ顔がキリリと引き締まる。
2821 = "Khuôn mặt đang giãn ra vì cười khổ bỗng\ntrở nên căng thẳng."

# monologue
# JP: ハチロクは小さく頷いて、\nそれからまっすぐ、僕を見上げる。
2876 = "Hachiroku khẽ gật đầu,\nrồi ngước nhìn thẳng vào tôi."

# 【ハチロク】
# display as 八六
# JP: 「でしたら、そのうちの一つとして。\nわたくし、\x%l勾配図;#00ffc040;[こうばいず,2]勾配図%l;#;を作成いたしたく思います」
2505 = "「Nếu vậy, như một trong số những việc đó.\nEm muốn tiến hành lập \\x%l勾配図;#00ffc040;bản đồ độ dốc%l;#; ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[こうばいず,2]紅梅図？」
2109 = "「Hồng Mai Đồ?」"

# monologue
# JP: 屏風絵か？　\nなんとも雅な――ある意味ハチロクらしくはあるが……
2899 = "Tranh bình phong sao?\nThật là tao nhã——ở một khía cạnh nào đó\nthì đúng là phong cách của Hachiroku thật,\nnhưng……"

# 【ハチロク】
# display as 八六
# JP: 「線路の勾配を、\x%l縦断面図;#00ffc040;[じゅうだんめんず,3]縦断面図%l;#;にしたものです。\nですので、双鉄様にもご一緒願いたいのですが」
2282 = "「Là \\x%l縦断面図;#00ffc040;bản đồ mặt cắt dọc%l;#; thể hiện độ dốc của\nđường ray ạ.\nVì vậy, em muốn nhờ ngài Soutetsu đi cùng\nem.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。勾配の断面図で、\x%l勾配図;#00ffc040;勾配図%l;#;か」
1985 = "「Ra là vậy. Bản đồ mặt cắt của độ dốc, nên\ngọi là \\x%l勾配図;#00ffc040;bản đồ độ dốc%l;#; sao.」"

# monologue
# JP: 理解した。\nこちらの方が、よほどハチロクらしくある。
2943 = "Tôi hiểu rồi.\nCái này thì đúng là phong cách của\nHachiroku hơn nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん、僕も付き合おう」
2380 = "「Tất nhiên rồi, tôi sẽ đi cùng cô.」"

# 【ふかみ】
# display as 深美
# JP: 「は……ふぁ……やっぱり、ふたりって、そういう～」
2033 = "「Hả…… hả…… quả nhiên, hai người, là mối\nquan hệ như thế~」"

# 【凪】
# display as 凪
# JP: 「なになに？　デートのお話ばい？」
1886 = "「Gì thế gì thế? Đang nói chuyện hẹn hò\nhả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「体は洗い終わったのか？」
2354 = "「Tắm rửa xong hết rồi à?」"

# monologue
# JP: ちょうどいい。
3034 = "Vừa đúng lúc."

# monologue
# JP: その\x%l勾配図;#00ffc040;勾配図%l;#;を作るついでに、\n\x%l機関助士;#00ffc040;機関助士%l;#;の話をしてみても悪くなかろう。
2721 = "Nhân tiện lúc làm \\x%l勾配図;#00ffc040;bản đồ độ dốc%l;#; đó,\nthử nói chuyện về vị trí \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; xem\nsao cũng không tệ."

# 【双鉄】
# display as 雙鐵
# JP: 「明日、ハチロクと線路沿いを歩くのだが、\nどうだ、ふたりも時間があれば」
2249 = "「Ngày mai, anh sẽ đi bộ dọc theo đường ray\ncùng Hachiroku,\nsao nào, nếu hai đứa có thời gian thì đi\ncùng không?」"

# 【ふかみ】
# display as 深美
# JP: 「おじゃまっ！　わたし、おじゃま――ダメっ、\nそれ、しないっ――しない、です」
2229 = "「Kỳ đà cản mũi! Em, sẽ làm kỳ đà cản\nmũi——không được,\nem sẽ không làm, chuyện đó đâu——không làm,\nđâu ạ.」"

# 【凪】
# display as 凪
# JP: 「明日は都合悪かばい」
2248 = "「Ngày mai em bận mất rồi.」"

# monologue
# JP: ふかみは大きく手を横に振り、\n凪は縦へと、面を打つように振り下ろす。
3047 = "Fukami xua tay nguầy nguậy,\ncòn Nagi thì vung tay chém dọc xuống như\nđang đánh vào mặt đối thủ."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、凪は剣道の試合か？」
2188 = "「Sao thế, Nagi có giải đấu kiếm đạo à?」"

# 【凪】
# display as 凪
# JP: 「ちがうばい！　特訓ばいっ！」
1867 = "「Không phải! Là đặc huấn!」"

# 【ハチロク】
# display as 八六
# JP: 「特訓？」
2372 = "「Đặc huấn?」"

# 【凪】
# display as 凪
# JP: 「デカブツたい！　もうちょっとのとこで倒せそうたい」
2022 = "「Một tên khổng lồ! Chỉ một chút nữa thôi\nlà em có thể hạ gục được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2052 = "「唔」" 

# monologue
# JP: 鼻息が荒い。\nよほど手強い相手なのだろう。
2830 = "Thở hồng hộc.\nChắc hẳn đó là một đối thủ rất đáng gờm."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば無理には誘うまい。\nともかく、怪我だけはせぬようにな」
2501 = "「Nếu vậy thì anh không ép đâu.\nNói chung là, nhớ cẩn thận đừng để bị\nthương nhé.」"

# 【凪】
# display as 凪
# JP: 「平気ばいっ！」
2145 = "「Không sao đâu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「それから、ふかみは――」
2507 = "「Còn Fukami thì——」"

# 【ふかみ】
# display as 深美
# JP: 「…………」
1557 = "「…………」"

# monologue
# JP: 真っ赤になって目が泳いでいる。\n呼吸は荒らぎ、せわしない。
2875 = "Mặt em ấy đỏ bừng, ánh mắt đảo liên tục.\nHơi thở gấp gáp, dồn dập."

# monologue
# JP: のぼせるという言葉が示す範囲を越えて、\nこれは……“ゆだる”というものだろう。
3226 = "Vượt qua cả mức độ \"ngâm nóng quá\",\nthế này phải gọi là…… \"bị luộc chín\" mất\nrồi."

# 【ふかみ】
# display as 深美
# JP: 「そ、そんなに、見つめ、られちゃうと――\nわたし、わたし――やばい、です。はうっ」
2445 = "「B, bị anh, nhìn chằm chằm, như thế——\nem, em——tiêu mất, ạ. Hau.」"

# monologue
# JP: (つぅっ――)
31 = "(Phụt——)"

# 【凪】
# display as 凪
# JP: 「うわわぁっ！？　ふかみちゃん鼻血ばいっ！」
2079 = "「Oái!? Fukami chảy máu mũi rồi!」"

# monologue
# JP: これはいかん。\n体を支え、とにもかくにも顔を上へとあげさせる。
2690 = "Không ổn rồi.\nTôi vội đỡ lấy cơ thể em ấy, trước mắt cứ\nphải cho em ấy ngẩng mặt lên đã."

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　これ、あのっ――もっと、鼻血っ」
2025 = "「Hya!? Thế này, cái đó——máu mũi, lại\ncàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「喋るな。まして慌てて動くな。\nゆっくりと――風呂から上がって、体を冷やせ」
1965 = "「Đừng nói gì cả. Càng không được cuống\ncuồng cử động.\nTừ từ——ra khỏi bồn tắm, làm mát cơ thể\nđi.」"

# monologue
# JP: （コンっ！！）
3299 = "（Cạch!!）"

# monologue
# JP: ……誰かが斧でも使っているのだろうか。\n木を切るような音がだんだん、大きくなってくる。
1522 = "……Có ai đó đang dùng rìu hay sao.\nÂm thanh như đang chặt cây ngày càng lớn\ndần."

# 【ハチロク】
# display as 八六
# JP: 「このあたりは……不時着のときに来た場所ですね」
2483 = "「Khu vực này là…… nơi chúng ta đã đến lúc\nhạ cánh khẩn cấp nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、もうそんなところまで進んだか」
2045 = "「Ồ, đã tiến xa đến tận đây rồi sao.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、線路上に下ろしてください」
2526 = "「Ngài Soutetsu, xin hãy đặt em xuống đường\nray.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2088 = "「嗯」" 

# monologue
# JP: 線路にそっと\x%l運転体;#00ffc040;運転体%l;#;のハチロクを下ろしてやれば、\n小さな顔の右頬がぴたり、レールにくっつけられる。
2948 = "Tôi nhẹ nhàng đặt cơ thể lái của Hachiroku\nxuống đường ray,\nmá phải trên khuôn mặt nhỏ nhắn của cô ấy\náp sát vào thanh ray."

# 【ハチロク】
# display as 八六
# JP: 「ここからですね、\n\x%l勾配変更点;#00ffc040;勾配変更点%l;#;――[ハチサンナナテンイチイチ,5]837.11です」
2162 = "「Từ đây nhỉ,\n\\x%l勾配変更点;#00ffc040;điểm thay đổi độ dốc%l;#;——837.11.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l勾配変更点;#00ffc040;勾配変更点%l;#;、837.11」
1553 = "「\\x%l勾配変更点;#00ffc040;Điểm thay đổi độ dốc%l;#;, 837.11.」"

# monologue
# JP: 言われた通りの数字をメモへと書き落とす。\nこの数字をもとに、あとでハチロクが作図するそうだ。
2952 = "Tôi ghi lại những con số đúng như cô ấy\nnói vào sổ tay.\nDựa trên những con số này, lát nữa\nHachiroku sẽ vẽ bản đồ."

# 【ハチロク】
# display as 八六
# JP: 「\x%l勾配千分率;#00ffc040;勾配千分率%l;#;1.6。\x%l施工基面高;#00ffc040;施工基面高%l;#;[イチニイサンテンマルキュウ,5]123.09」。\n\x%l勾配距離;#00ffc040;勾配距離%l;#;が、149.23。\x%lレール種別;#00ffc040;レール種別%l;#;は[さんじゅっ,1]30キロままです」
1550 = "「\\x%l勾配千分率;#00ffc040;Độ dốc phần nghìn%l;#; 1.6. \\x%l施工基面高;#00ffc040;Cao độ mặt nền đường sắt%l;#;\n123.09.\n\\x%l勾配距離;#00ffc040;Chiều dài đoạn dốc%l;#; là 149.23. \\x%lレール種別;#00ffc040;Loại đường sắt%l;#;\nvẫn là 30 ký.」"

# 【双鉄】
# display as 雙鐵
# JP: 「1.6の123.09。ここまでの\x%l勾配距離;#00ffc040;勾配距離%l;#;が149.23で、\n\x%lレール種別;#00ffc040;レール種別%l;#;は変化なし――と」
2538 = "「1.6 và 123.09. \\x%l勾配距離;#00ffc040;Chiều dài đoạn dốc%l;#; đến đây\nlà 149.23,\n\\x%lレール種別;#00ffc040;loại đường sắt%l;#; không đổi——xong.」"

# monologue
# JP: 僕の復唱を確認し終え、\nハチロクは、優しい視線をレールへ落とす。
3094 = "Sau khi xác nhận lại những gì tôi vừa đọc\nlại,\nHachiroku đưa ánh mắt dịu dàng nhìn xuống\nđường ray."

# 【ハチロク】
# display as 八六
# JP: 「川沿いが基本となっているためか、\n本当になだらかな路線ですね、湯医線は」
2119 = "「Có lẽ vì cơ bản là chạy dọc theo con\nsông,\nnên tuyến Yui quả thực là một tuyến đường\nrất thoai thoải nhỉ.」"

# monologue
# JP: 声には色濃い安堵。\nならば、理由はひとつだろう。
2873 = "Giọng nói mang đậm vẻ an tâm.\nNếu vậy, lý do chắc chỉ có một."

# monologue
# JP: （ゴンッ！）
3300 = "（Keng!）"

# 【双鉄】
# display as 雙鐵
# JP: 「急勾配が苦手なのか？　\x%l8620;#00ffc040;8620%l;#;は」
1532 = "「\\x%l8620;#00ffc040;8620%l;#; không giỏi leo dốc cao sao?」"

# 【ハチロク】
# display as 八六
# JP: 「急勾配を得意とする\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;などおりません。\nが――その中でも、やはり不得意な部類でしょうね」
2516 = "「Chẳng có \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; nào lại giỏi\nleo dốc cao cả đâu ạ.\nNhưng mà——trong số đó, thì chắc cũng thuộc\nnhóm không giỏi lắm thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2482 = "「Ra vậy.」"

# monologue
# JP: ごくごく自然に、僕の方へとハチロクが腕を伸ばしてくる。\nそのまま抱き上げ、左手をハチロクの椅子にする。
2758 = "Hachiroku vươn tay về phía tôi một cách vô\ncùng tự nhiên.\nTôi cứ thế bế cô ấy lên, lấy tay trái làm\nghế ngồi cho Hachiroku."

# monologue
# JP: 歩く。\n線路についた勾配が変化する次の地点まで。
2933 = "Bước đi.\nCho đến điểm tiếp theo nơi độ dốc của\nđường ray thay đổi."

# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;は\x%l客車;#00ffc040;客車%l;#;を引くことを主目的に作られたので、\n足がいささか、大きいのです」
1535 = "「\\x%l8620;#00ffc040;8620%l;#; được chế tạo với mục đích chính là\nkéo \\x%l客車;#00ffc040;toa hành khách%l;#;,\nnên bánh xe có hơi lớn một chút ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l動輪;#00ffc040;動輪%l;#;直径が大きいと――乗り心地が良くなる反面、\nパワーは発揮しづらくなる……のか？」
1547 = "「Đường kính \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; lớn thì——tuy\nmang lại cảm giác thoải mái khi ngồi,\nnhưng bù lại\nsẽ khó phát huy được sức mạnh…… đúng\nkhông?」"

# 【ハチロク】
# display as 八六
# JP: 「大正解です。\x%l粘着力;#00ffc040;粘着力%l;#;も小さい方が得やすいですから……\n急勾配は、できることなら避けたいのです」
1865 = "「Chính xác hoàn toàn ạ. \\x%l粘着力;#00ffc040;Lực bám đường%l;#; thì\nbánh nhỏ cũng dễ đạt được hơn……\nNên nếu có thể, em rất muốn tránh những\ncon dốc cao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なければいいな、湯医まで」
2436 = "「Đến Yui mà không có thì tốt nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「そうですね、ここから御一夜に戻る線路は\n\x%lキハ07;#00ffc040;キハ07%l;#;の中でも確認させていただきましたが――」
2267 = "「Vâng ạ, tuyến đường từ đây trở về\nOhimitera\nem cũng đã xác nhận lúc ở trong \\x%lキハ07;#00ffc040;KiHa 07%l;#;\nrồi, nhưng mà——」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ここから湯医まで。\nなんだかんだで、未だ乗ってはいなかったのだな」
2481 = "「Ra là vậy, từ đây đến Yui.\nTính ra thì, chúng ta vẫn chưa đi chuyến\nnào nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「はい――と、双鉄様、下ろしてください。\n勾配が変化しています」
2273 = "「Vâng——a, ngài Soutetsu, xin hãy đặt em\nxuống đi ạ.\nĐộ dốc đang thay đổi rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2088 = "「嗯」" 

# monologue
# JP: また線路へと顔をつけ、\nハチロクが勾配を数値化していく。
2740 = "Hachiroku lại áp mặt xuống đường ray,\nvà bắt đầu chuyển đổi độ dốc thành những\ncon số."

# monologue
# JP: 言われた数字をメモにとり、\nハチロクを手に抱き、歩き始める。
2935 = "Tôi ghi lại những con số cô ấy đọc vào sổ\ntay,\nrồi lại bế Hachiroku lên và tiếp tục bước\nđi."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、運転[ボディ]体のセンサーというのは大した物だな。\n器具なしで勾配を測定できるとは」
1878 = "「Nhưng mà, cảm biến của cơ thể lái tuyệt\nthật đấy.\nKhông cần dụng cụ mà vẫn đo được độ dốc cơ\nmà.」"

# 【ハチロク】
# display as 八六
# JP: 「そう大したものでもないですよ？　走行中は確認までで。\n実地を歩いて止まってみて、やっと精度が出せる程です」
1882 = "「Cũng không tuyệt đến thế đâu ạ? Lúc đang\nchạy thì chỉ có thể xác nhận thôi.\nPhải đi bộ thực tế rồi dừng lại thì mới có\nthể đo chính xác được.」"

# monologue
# JP: 自分で言っておきながら、\nハチロクはすぐ、唇をきゅっと結んでしまう。
3196 = "Dù tự mình nói ra điều đó,\nnhưng Hachiroku lập tức mím chặt môi lại."

# 【ハチロク】
# display as 八六
# JP: 「……いまのわたくしの計測ですと、\nある程度の誤差は否めないかもしれませんが」
1581 = "「……Với khả năng đo lường của em hiện tại,\ncó lẽ không thể tránh khỏi một sai số nhất\nđịnh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。\nどうせこの図は、僕たち専用となるのだろう？」
2338 = "「Không sao.\nDù gì thì bản đồ này cũng chỉ dành riêng\ncho chúng ta thôi mà?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、そうですね。れいなさんたちの\x%l勾配図;#00ffc040;勾配図%l;#;では、\nわたくしたちには、いささか大雑把にすぎますから」
2298 = "「Vâng, đúng vậy ạ. \\x%l勾配図;#00ffc040;Bản đồ độ dốc%l;#; của bé\nReina và mọi người,\nđối với chúng ta thì có hơi quá sơ sài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「パワーがある、ということか？　\n細かな部分までは気にせず踏破できるだけの」
2271 = "「Ý cô là sức mạnh sao? \nĐủ sức vượt qua mà không cần bận tâm đến\nnhững chi tiết nhỏ nhặt ấy.」"

# 【ハチロク】
# display as 八六
# JP: 「それもありますし――\x%lブレーキ;#00ffc040;ブレーキ%l;#;性能などもきっと、\n\x%l8620;#00ffc040;8620%l;#;より大幅に向上しているのでしょう」
2473 = "「Cũng có lý do đó nữa——và hiệu suất \\x%lブレーキ;#00ffc040;phanh%l;#;\nchắc chắn cũng\nđã được cải thiện đáng kể so với \\x%l8620;#00ffc040;8620%l;#; rồi\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。\x%lブレーキ;#00ffc040;ブレーキ%l;#;の方か。\nそのための\x%l勾配図;#00ffc040;勾配図%l;#;――\x%l縦断面図;#00ffc040;縦断面図%l;#;であるのだものな」
2068 = "「À, ra là vậy. Là về \\x%lブレーキ;#00ffc040;phanh%l;#; sao.\nNên mới cần \\x%l勾配図;#00ffc040;bản đồ độ dốc%l;#;——tức là \\x%l縦断面図;#00ffc040;bản đồ mặt cắt dọc%l;#;\nnhỉ.」"

# monologue
# JP: 結局のところ、図面を含めた全ての情報は、\n究極的には、運転を補助する素材にすぎない。
3117 = "Rốt cuộc thì, mọi thông tin bao gồm cả bản\nvẽ,\nsuy cho cùng cũng chỉ là tài liệu hỗ trợ\ncho việc lái tàu mà thôi."

# monologue
# JP: どこでどれだけの強さの\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかければいいか。\nその基本要領を作成するに足りる精度なら問題ないのだ。
3258 = "Phải đạp \\x%lブレーキ;#00ffc040;phanh%l;#; ở đâu và với lực bao nhiêu.\nChỉ cần độ chính xác đủ để xây dựng các\nthao tác cơ bản đó là không có vấn đề gì."

# 【ハチロク】
# display as 八六
# JP: 「この図面の精度が確かなら、一発目から誤差数センチで\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;指示をお出し出来るかとは思うのですが」
2131 = "「Nếu độ chính xác của bản vẽ này được đảm\nbảo, thì ngay từ lần đầu tiên,\nem nghĩ mình có thể đưa ra chỉ thị \\x%lブレーキ;#00ffc040;phanh%l;#;\nvới sai số chỉ vài centimet.」"

# monologue
# JP: プライドと不安とが入り混じる声。\nだから、ハチロクの頭を撫でる。
2753 = "Giọng nói lẫn lộn giữa niềm tự hào và sự\nbất an.\nVì vậy, tôi xoa đầu Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「それを確かめてみるためにも。\n早く、試運転ができるようになればいいな」
2359 = "「Cũng là để kiểm chứng điều đó.\nGiá mà chúng ta có thể nhanh chóng chạy\nthử thì tốt biết mấy.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修は、予想以上の協力の手と、募金までをも\n得たことにより、驚異的なペースで進捗している。
86 = "Việc tu sửa \\x%l8620;#00ffc040;8620%l;#;, nhờ nhận được sự giúp đỡ\nvà cả tiền quyên góp\nvượt ngoài dự kiến, đang tiến triển với\ntốc độ đáng kinh ngạc."

# monologue
# JP: “早く”は実際――\nもはや目に見える範囲の目標なのだ。
1507 = "\"Nhanh chóng\" trên thực tế——\nđã trở thành một mục tiêu có thể nhìn thấy\nđược rồi."

# 【ハチロク】
# display as 八六
# JP: 「そうですね。そのときにはわたくし、\n双鉄様を厳しく叱ってしまうことになると思いますけど」
2260 = "「Vâng ạ. Lúc đó,\nem nghĩ mình sẽ phải nghiêm khắc la mắng\nngài Soutetsu đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ。\n厳しい指導は、よりよい成長に繋がろうから」
2333 = "「Anh đang mong thế đây.\nSự chỉ bảo nghiêm khắc sẽ dẫn đến sự\ntrưởng thành tốt hơn mà.」"

# monologue
# JP: （コキンッ！）
3297 = "（Keng!）"

# 【ハチロク】
# display as 八六
# JP: 「それは当然のことです。\nと、申しますか――」
2515 = "「Đó là điều đương nhiên ạ.\nNói sao nhỉ——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、この音だな」
2090 = "「Ừm, âm thanh này.」"

# monologue
# JP: さっきからずっと気になっていた。
3227 = "Tôi đã để ý từ nãy đến giờ rồi."

# monologue
# JP: そして今、そのうるささは会話に支障を\n来しかねない域にまで達しつつある。
3064 = "Và bây giờ, sự ồn ào đó đang dần đạt đến\nmức\ncó thể gây cản trở cho cuộc trò chuyện."

# 【双鉄】
# display as 雙鐵
# JP: 「木を切るのなら、今どき斧も無かろう――がっ！？」
2442 = "「Nếu là chặt cây thì thời đại này làm gì\ncòn dùng rìu nữa——hả!?」"

# monologue
# JP: ……さすがに、まばたきをしてしまう。\nしかし、見え方は少しも変わらない。
1516 = "……Quả nhiên, tôi không khỏi chớp mắt mấy\ncái.\nNhưng mà, cảnh tượng trước mắt vẫn chẳng\nthay đổi chút nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――見ろ、凪だ」
