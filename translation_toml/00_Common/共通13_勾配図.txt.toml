# monologue
# JP: やがて――車体が見えてくる。\n\x%lキハ07;#00ffc040;キハ07%l;#;の前後変らぬ丸顔が、驚いたように停止している。
2977 = "Cuối cùng——thân xe cũng hiện ra.\nKhuôn mặt tròn trịa không phân biệt trước\nsau của \\x%lキハ07;#00ffc040;KiHa 07%l;#; đang đỗ lại như thể bị\nkinh ngạc."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！　ハチロクっ！！！」
1931 = "「Hachiroku! Hachiroku!!!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！」
2521 = "「Ngài Soutetsu!」"

# monologue
# JP: 転がるように、\n小さな小さなハチロクが僕へとまっすぐ駆けてくる。
2744 = "Hachiroku nhỏ xíu, bé tẹo\nchạy thẳng về phía tôi như thể lăn lông\nlốc."

# 【ハチロク】
# display as 八六
# JP: 「止めましたっ！\nわたくしたち――わたくしたちは止めましたっ！」
1913 = "「Dừng lại được rồi!\nChúng ta——chúng ta đã dừng được nó rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2533 = "「!」"

# monologue
# JP: 歓喜に満ちた涙声。
2871 = "Giọng nói đẫm nước mắt ngập tràn niềm vui\nsướng."

# monologue
# JP: 聞いた瞬間、もうくたくたと全身の力が抜けおちかけるが、\nもう何十歩を駆け抜けて、ハチロクの元へたどり着く。
3150 = "Ngay khoảnh khắc nghe thấy điều đó, toàn\nthân tôi rã rời như muốn đổ gục,\nnhưng tôi vẫn cố chạy thêm vài chục bước\nnữa để đến bên Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「やりました、双鉄様！\n双鉄様のおかげで、わたくしはっ！」
2204 = "「Chúng ta làm được rồi, ngài Soutetsu!\nNhờ có ngài Soutetsu, mà em đã!」"

# monologue
# JP: 雨が、ぼとぼと、倒れた僕の顔の上へと降り注ぐ。
2857 = "Những giọt mưa, lộp bộp, trút xuống khuôn\nmặt của tôi khi tôi đang ngã lăn ra."

# monologue
# JP: 熱い雨。\x%l蒸気排水;#00ffc040;蒸気排水%l;#;――\nああ、ハチロクはまた泣いている。
2888 = "Một cơn mưa nóng hổi. \\x%l蒸気排水;#00ffc040;Xả nước ngưng hơi nước%l;#;\n——\nÀ, Hachiroku lại khóc rồi."

# 【ハチロク】
# display as 八六
# JP: 「泣かないでください、双鉄様。やったのですから！\nわたくしたちは、事故を未然に防いだのですから」
2446 = "「Xin ngài đừng khóc, ngài Soutetsu. Chúng\nta đã làm được rồi mà!\nChúng ta đã ngăn chặn được tai nạn trước\nkhi nó xảy ra rồi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「泣いてる？　僕もか」
2103 = "「Đang khóc sao? Cả tôi nữa à.」"

# monologue
# JP: 言われて、感じる、自分の涙。\n何年ぶり――何十年ぶりのことだろう。
3151 = "Được cô ấy nói, tôi mới cảm nhận được nước\nmắt của chính mình.\nĐã mấy năm rồi——mấy chục năm rồi nhỉ."

# monologue
# JP: 怖いのか、安堵したのか、喜んでるのか……\n多分すべてが同時に混じり、いささか混乱しているのだ。
2692 = "Là sợ hãi, là an tâm, hay là đang vui\nsướng……\nCó lẽ tất cả cùng lúc đan xen, khiến tôi\ncó chút hỗn loạn."

# 【ポーレット】
# display as 波萊特
# JP: 「お怪我は、お怪我はないですか！？\nお怪我をなさったお客様はいませんか」
2304 = "「Có ai bị thương, có ai bị thương không!?\nCó hành khách nào bị thương không ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「ご、ごめんなさい。ごめんなさい。\nれいな、れいな、こんなことっ」
2143 = "「E, em xin lỗi. Em xin lỗi.\nReina, Reina, đã làm ra chuyện này.」"

# 【凪】
# display as 凪
# JP: 「悪いのはウチばい！\nウチが、考えなしだったせいばいっ」
2508 = "「Người có lỗi là em!\nLà do em, đã không suy nghĩ thấu đáo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2062 = "「啊」" 

# monologue
# JP: 喧騒だ。\nかしましいこと、この上ない。
3065 = "Thật ồn ào.\nKhông gì có thể ầm ĩ hơn thế này nữa."

# monologue
# JP: 幸いなのは、怒号も、悲鳴もせぬことだ。\n血のあの臭いが、ほんのわずかも流れぬことだ。
2914 = "Điều may mắn là, không có tiếng la mắng,\ncũng chẳng có tiếng la hét thảm thiết.\nVà mùi máu tươi đó, không hề thoảng qua dù\nchỉ một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク。お前がいっていたとおりだな」
1925 = "「Này, Hachiroku. Đúng như những gì cô đã\nnói nhỉ.」"

# monologue
# JP: 血の臭いがせぬ場所でなら、少しは休んでもいいだろう。
3004 = "Nếu ở một nơi không có mùi máu, thì nghỉ\nngơi một chút cũng được nhỉ."

# monologue
# JP: かなり、疲れた。\nだが、これだけは確認せねば。
3134 = "Tôi khá là, mệt rồi.\nNhưng mà, chỉ điều này là tôi phải xác\nnhận."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが――なにを申しましたか？」
2197 = "「Em đã——nói gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l保線;#00ffc040;[ほせん,1]保線%l;#;だ。鉄道に\x%l保線;#00ffc040;保線%l;#;は欠かせぬと」
1537 = "「\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; đấy. Cô bảo đường sắt\nthì không thể\nthiếu \\x%l保線;#00ffc040;bảo trì đường ray%l;#; mà.」"

# monologue
# JP: 線路に近い大木のこと。\n\x%lバラスト;#00ffc040;バラスト%l;#;が砕けきるほどの消耗のこと。
3124 = "Về cái cây lớn nằm gần đường ray.\nVề sự hao mòn đến mức \\x%lバラスト;#00ffc040;đá ba-lát%l;#; vỡ vụn."

# monologue
# JP: 確かに見ていた、問題を感じていたはずなのに、\n僕ら関係者全員が、見て見ぬふりで先延ばしていた。
2932 = "Rõ ràng là đã nhìn thấy, đã cảm nhận được\nvấn đề,\nnhưng tất cả những người liên quan chúng\ntôi, lại nhắm mắt làm ngơ và trì hoãn nó."

# 【ハチロク】
# display as 八六
# JP: 「はい――必要です。\x%l保線;#00ffc040;[ほせん,1]保線%l;#;は、常に」
2278 = "「Vâng——là cần thiết ạ. \\x%l保線;#00ffc040;Bảo trì đường ray%l;#;\nlà công việc, phải\nlàm thường xuyên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そこに鉄道が走るのならば」
2261 = "「Đúng vậy nhỉ. Nếu ở đó có đường sắt chạy\nqua.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の修復にはもう、完全に目途がついている。\nならば、僕のなすべきことは――
84 = "Việc tu sửa \\x%l8620;#00ffc040;8620%l;#; đã hoàn toàn có hướng\ngiải quyết.\nNếu vậy, điều tôi cần làm là——"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ハチロク。任せておけ」
2339 = "「Không sao đâu. Hachiroku. Cứ giao cho\ntôi.」"

# monologue
# JP: 人員、予算。\nボランティアや寄付に、これ以上の負担は求められない。
2920 = "Nhân sự, ngân sách.\nKhông thể đòi hỏi thêm gánh nặng nào từ\ntình nguyện viên hay quyên góp nữa."

# monologue
# JP: ならばどうする？　簡単だ。足りない金は、借りればいい。\nそして人手は、金から変換できるのだ。
3233 = "Nếu vậy thì phải làm sao? Đơn giản thôi.\nThiếu tiền thì đi vay.\nVà nhân lực thì có thể dùng tiền để đổi\nlấy."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を走らせるため――\n大丈夫だ。すべての障害は取り除くから」
2212 = "「Để cho \\x%l8620;#00ffc040;8620%l;#; chạy lại——\nKhông sao đâu. Tôi sẽ loại bỏ mọi chướng\nngại vật.」"

# monologue
# JP: ハチロクが、僕へとまっすぐ手を伸ばす。
2746 = "Hachiroku, vươn tay thẳng về phía tôi."

# monologue
# JP: その手を取って立ち上がり、\nともかくポーレットのところに向かう。
2963 = "Tôi nắm lấy tay cô ấy đứng dậy,\nvà tiến về phía Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「処理するべきを処理しおえたら、\n帰りは、\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗っていこう」
2407 = "「Sau khi xử lý xong những việc cần xử lý,\nlúc về, chúng ta hãy đi bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「飛行不能区域外まで、\nまた徒歩で出るということですか？」
2433 = "「Chúng ta lại phải đi bộ,\nra ngoài khu vực cấm bay sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは徒歩でも、\x%lキハ07;#00ffc040;キハ07%l;#;に乗せてもらってでも構わん」
2366 = "「Chuyện đó đi bộ cũng được, hay đi nhờ \\x%lキハ07;#00ffc040;KiHa 07%l;#;\ncũng chẳng sao.」"

# monologue
# JP: 移動経路は問題ではない。\nただ、僕は――
3096 = "Lộ trình di chuyển không phải là vấn đề.\nChỉ là, tôi——"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビと、相談したいことがあるのだ」
2214 = "「Có chuyện muốn bàn bạc với Navi.」"
