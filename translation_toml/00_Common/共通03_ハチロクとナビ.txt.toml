# 共通03_ハチロクとナビ.txt 

[info]

[characters]
1769 = "Hachiroku"
1891 = "Soutetsu"
1762 = "Navi"

[character_subs]
1815 = "Hachiroku"
2100 = "Soutetsu"
2101 = "Soutetsu & Hachiroku"
2127 = "Ｎａｖｉ"

[script]
# 【ハチロク】
# JP: 「わたくし、このような景色は初めてです。\n町が、まるで積み木でつくられているように見えます」
1385 = "「Đây là lần đầu tiên tôi được ngắm cảnh\ntượng thế này đấy ạ.\nThị trấn trông cứ như được xếp bằng những\nkhối gỗ vậy.」"
# 【双鉄】
# JP: 「うむ」
1285 = "「Ừm.」"
# (独白)
# JP: ナビは賢い。空気を読む。\nだから、沈黙を守ってくれている。
2030 = "Navi rất thông minh. Biết đọc bầu không\nkhí.\nNên cô ấy đang giữ im lặng."
# (独白)
# JP: その沈黙に守られながら、\n機嫌よく、ハチロクは眼下を眺め続ける。
2028 = "Được bao bọc trong sự im lặng ấy,\nHachiroku vui vẻ tiếp tục đưa mắt ngắm\nnhìn xuống dưới."
# 【ハチロク】
# JP: 「あの見事なお屋根はなんでしょう？」
1628 = "「Mái nhà lộng lẫy kia là ở đâu vậy ạ?」"
# 【双鉄】
# JP: 「赤井阿蘇神社だな。\n屋根だけでなく、[たたず]佇まい全般が美しい場所だ」
1460 = "「Là Đền Akai Aso đấy.\nKhông chỉ mái nhà, mà tổng thể kiến trúc\nnơi đó đều rất đẹp.」"
# 【ハチロク】
# JP: 「あの森は？　\nひとつだけ、随分と小高いところにありますが」
1637 = "「Còn khu rừng kia thì sao ạ?\nChỉ có mỗi chỗ đó là nằm trên mô đất khá\ncao.」"
# 【双鉄】
# JP: 「御一夜[じょうし,1]城址。あそこからも御一夜の町並みを見下ろせる。\n無論、ここからほどに広くは無理だが」
1435 = "「Là Di tích thành Ohimitera. Từ đó cũng có\nthể nhìn bao quát phố phường Ohimitera.\nTất nhiên là không thể nhìn rộng được như\ntừ trên này rồi.」"
# 【ハチロク】
# JP: 「左様ですね。ここは、お空の上ですものね」
1548 = "「Đúng vậy nhỉ. Vì chúng ta đang ở trên\ntrời mà lị.」"
# (独白)
# JP: ハチロクが短い両手を伸ばす。\nそれを翼に、より高くへと求めるように。
1826 = "Hachiroku dang rộng đôi tay ngắn ngủn của\nmình.\nNhư thể muốn biến chúng thành đôi cánh,\nvươn lên cao hơn nữa."
# 【ハチロク】
# JP: 「飛行機には初めて乗りましたが、良いものです。\nきっと、鉄道の次に素敵な乗り物でしょうね、これは」
1659 = "「Đây là lần đầu tiên tôi đi máy bay, cảm\ngiác tuyệt thật đấy.\nChắc chắn đây là phương tiện tuyệt vời thứ\nhai chỉ sau đường sắt thôi nhỉ.」"
# 【双鉄】
# JP: 「鉄道は、最高順位ということか？」
1648 = "「Đường sắt là vị trí số một sao?」"
# 【ハチロク】
# JP: 「はい、もちろん。\nわたくしは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから」
1455 = "「Vâng, tất nhiên rồi ạ.\nVì tôi là một \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【双鉄】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か……確か、鉄道車両それぞれに、\n一体ずつついている物……で、よかったか？」
902 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; à……Hình như là, một thực thể được\ntrang bị\nđi kèm với mỗi phương tiện đường sắt……đúng\nkhông nhỉ?」"
# (独白)
# JP: 素朴な疑問を伝えれば、\nハチロクはふふ、と満足そうな笑みを浮かべる。
2106 = "Nghe tôi hỏi một câu ngô nghê như vậy,\nHachiroku nở một nụ cười thỏa mãn, \"Fufu\"."
# 【ハチロク】
# JP: 「\x%l客車;#00ffc040;客車%l;#;にはついていません。機関車・\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;・[どうりょくしゃ,2]動力車など、\n自ら動く車両を、まずわたくしたちは制御します」
908 = "「Không đi kèm với \\x%l客車;#00ffc040;toa hành khách%l;#; đâu ạ.\nTrước tiên, chúng tôi sẽ điều khiển\ncác phương tiện tự di chuyển được như đầu\nmáy xe lửa,\n\\x%l気動車;#00ffc040;toa xe diesel tự hành%l;#;, toa xe động lực.」"
# 【双鉄】
# JP: 「制御。それは、運転制御ということか？」
1399 = "「Điều khiển. Tức là điều khiển lái tàu\nsao?」"
# 【ハチロク】
# JP: 「それももちろん。駆動車両および\x%l列車;#00ffc040;列車%l;#;の制御は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\x%l機関士;#00ffc040;機関士%l;#;・\x%l運転士;#00ffc040;運転士%l;#;との共同で行います」
1638 = "「Tất nhiên là có cả cái đó rồi ạ. Việc\nđiều khiển phương tiện dẫn động và \\x%l列車;#00ffc040;đoàn tàu%l;#;\nsẽ do \\x%lレイルロオド;#00ffc040;Railord%l;#; phối hợp cùng \\x%l機関士;#00ffc040;lái tàu%l;#; và\nnhân viên cơ vụ thực hiện.」"
# (独白)
# JP: 機関車を運転する人間が\x%l機関士;#00ffc040;機関士%l;#;。\nそれ以外の駆動車両を運転するのが\x%l運転士;#00ffc040;運転士%l;#;と教えてもらう。
2108 = "Tôi được giải thích rằng người lái đầu máy\nxe lửa gọi là \\x%l機関士;#00ffc040;lái tàu%l;#;.\nCòn người lái các phương tiện dẫn động\nkhác thì gọi là nhân viên cơ vụ."
# (独白)
# JP: “鉄道”とひとくくりにしか思わなかったが、\n中身はどうして、なかなか複雑なものであるらしい。
1950 = "「Nếu đã có \"trước tiên\" và \"có cả cái đó\".\nThì \\x%lレイルロオド;#00ffc040;Railord%l;#; còn điều khiển đường sắt ở\nphạm vi rộng hơn nữa sao?」"
# 【双鉄】
# JP: 「“まず”であり、“それも”であるなら。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、さらに広範に鉄道を制御するものか？」
1468 = "「Vâng, đúng là vậy thưa ngài Soutetsu.\nChúng tôi\nđề xuất \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#;, và kiểm soát cả \\x%l運転計画;#00ffc040;kế hoạch hoạt động%l;#;\nnữa ạ.」"
# 【ハチロク】
# JP: 「はい、そのとおりです双鉄様。わたくしたちは\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;を提案し、\x%l運転計画;#00ffc040;運転計画%l;#;をも制御します」
1450 = "「Vâng, đúng là vậy thưa ngài Soutetsu.\nChúng tôi\nđề xuất \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#;, và kiểm soát cả \\x%l運転計画;#00ffc040;kế hoạch hoạt động%l;#;\nnữa ạ.」"
# (独白)
# JP: わからぬ言葉はひとまず置いて、\nわかる部分を確認していく。
2031 = "Tạm thời gác lại những từ chưa hiểu,\ntôi tiếp tục xác nhận những phần mình đã\nnắm được."
# 【双鉄】
# JP: 「わたくし”たち”と繰り返しているが」
1187 = "「Cô cứ lặp đi lặp lại từ \"chúng tôi\" nhỉ.」"
# 【ハチロク】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、いうなれば全て姉妹。その全てが、\n相互に\x%l共感;#00ffc040;共感%l;#;通信を行うことができます」
901 = "「Nói cách khác, \\x%lレイルロオド;#00ffc040;Railord%l;#; đều là chị em. Tất\ncả chúng tôi\nđều có thể liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; với nhau ạ.」"
# 【双鉄】
# JP: 「ふむ」
1268 = "「Hừm.」"
# (独白)
# JP: \x%l共感;#00ffc040;共感%l;#;通信――ナビのような\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも有している、\nいや、その最重要といってもいいらしい機能だ。
60 = "Liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#;——Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; như Navi\ncũng sở hữu chức năng này,\nà không, có thể nói đó là chức năng quan\ntrọng nhất của họ."
# 【双鉄】
# JP: 「その個体が得たさまざまな情報をリアルタイムに共有し、\n集合最適処理する仕組み――でよかったか？」
1256 = "「Đó là cơ chế chia sẻ theo thời gian thực\ncác thông tin đa dạng mà mỗi cá thể thu\nthập được,\nrồi xử lý để đưa ra phương án tối ưu nhất\ncho tập thể——có đúng không?」"
# 【ハチロク】
# JP: 「おくわしいのですね、双鉄様。\nそのご解釈は、ほぼ実際と合致しております」
1665 = "「Ngài am hiểu thật đấy, ngài Soutetsu.\nCách hiểu của ngài gần như hoàn toàn trùng\nkhớp với thực tế ạ.」"
# (独白)
# JP: うれしげなハチロク。\nナビから教わったことだとは言いがたくなる。
2107 = "Nhìn vẻ mặt vui vẻ của Hachiroku,\ntôi thật khó mà mở miệng nói rằng đó là do\nNavi dạy."
# 【ハチロク】
# JP: 「ですのでわたくしたちは、運転支障発生時でも、\n臨時ダイアを極めて短時間で作成、提案可能となります」
1393 = "「Vì thế, ngay cả khi xảy ra sự cố cản trở\nvận hành,\nchúng tôi vẫn có thể lập và đề xuất biểu\nđồ tạm thời trong thời gian cực ngắn ạ.」"
# 【双鉄】
# JP: 「支障を回復するための最善策を短期間に取りうる、\nということか？」
1152 = "「Tức là có thể đưa ra giải pháp tốt nhất\nđể khắc phục sự cố trong thời gian ngắn\nsao?」"
# 【ハチロク】
# JP: 「はい、左様です」
1452 = "「Vâng, đúng là vậy ạ.」"
# (独白)
# JP: ならば、ハチロクたちの\x%l共感;#00ffc040;共感%l;#;通信の運用法と、\nナビたち、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの機能との根幹は同じなのだろう。
2071 = "Nếu vậy, cách vận dụng liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#;\ncủa Hachiroku,\nvà chức năng cốt lõi của Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; như\nNavi chắc hẳn là giống nhau."
# (独白)
# JP: （地上からエンジン自動車が駆逐され、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;自動車に取って代わられた最大の理由、か――）
2121 = "（Lý do lớn nhất khiến ô tô động cơ đốt\ntrong bị loại bỏ khỏi mặt đất,\nvà bị thay thế bởi ô tô \\x%lエアクラ;#00ffc040;Aircra%l;#;, sao——）"
# (独白)
# JP: \x%l共感;#00ffc040;共感%l;#;通信による事故情報と迂回ルートの共用。\nそして、ナビによるオートパイロット。
2075 = "Chia sẻ thông tin tai nạn và tuyến đường\nvòng thông qua liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#;.\nVà chế độ lái tự động do Navi đảm nhiệm."
# (独白)
# JP: それらは渋滞という現象をほぼ根絶し、\n車移動による所要時間を確定可能なものへと変えた。
1903 = "Những điều đó gần như đã triệt tiêu hoàn\ntoàn hiện tượng tắc đường,\nbiến thời gian di chuyển bằng xe hơi thành\nmột con số có thể tính toán chắc chắn."
# 【双鉄】
# JP: 「……\x%l共感;#00ffc040;共感%l;#;通信とは便利なものだな」
927 = "「……Liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; đúng là tiện lợi\nthật.」"
# (独白)
# JP: 言えば大きく。\nとても誇らしげにハチロクが頷く。
2052 = "Vừa dứt lời.\nHachiroku gật đầu mạnh một cái với vẻ vô\ncùng tự hào."
# 【ハチロク】
# JP: 「はい。ですのでわたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n運行とダイアの全てを把握し、制御できたのです」
1440 = "「Vâng. Vì vậy, \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng tôi\ncó thể nắm bắt và kiểm soát toàn bộ quá\ntrình vận hành cũng như biểu đồ chạy tàu\nạ.」"
# 【双鉄】
# JP: 「ゆえに、[ろおど,3]Lordか。支配者か」
1386 = "「Vì thế nên mới là Lord sao. Kẻ chi phối.」"
# 【ハチロク】
# JP: 「いいえ、双鉄様。レイルも車両も、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。\n全てを支配する者でしたら、それは双鉄様たち人間です」
1670 = "「Không phải đâu, ngài Soutetsu. Dù là\nđường ray, phương tiện hay \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nKẻ chi phối tất cả những thứ đó, chính là\ncon người các ngài.」"
# (独白)
# JP: ごく当然、と。\nよどみも力みも無い言葉。
2014 = "Như một lẽ đương nhiên.\nMột câu nói không chút ngập ngừng hay\ngượng gạo."
# (独白)
# JP: ハチロクの小さな手には不似合いなほど長い指が、\n空中に、すらすらと――Roadの文字をかいていく。
1824 = "Những ngón tay thon dài không mấy ăn nhập\nvới bàn tay nhỏ bé của Hachiroku,\nviết thoăn thoắt vào không trung——chữ\nRoad."
# 【ハチロク】
# JP: 「わたくしたちの把握と制御は、その道筋をつけるため。\nわたくしたちは線路と同じ、RailRoadにすぎません」
1374 = "「Sự nắm bắt và kiểm soát của chúng tôi là\nđể vạch ra con đường đó.\nChúng tôi cũng giống như đường ray, chỉ là\nRailRoad mà thôi.」"
# 【双鉄】
# JP: 「なるほどな」
1227 = "「Ra là vậy.」"
# (独白)
# JP: 強い誇りが、揺るがぬものが、言葉の端々に満ちている。
1932 = "Niềm tự hào mãnh liệt, một ý chí không thể\nlay chuyển, tràn ngập trong từng câu chữ."
# (独白)
# JP: 現実の交通事情がどうありどう変化しようとも、\n鉄道こそは、ハチロクの変わらぬ“最高”なのだと。
2000 = "Dù tình hình giao thông thực tế có ra sao,\ncó thay đổi thế nào đi nữa,\nthì đường sắt vẫn mãi là thứ \"tuyệt vời\nnhất\" không thể thay thế đối với\nHachiroku."
# 【双鉄】
# JP: 「そこまでハチロクが誇るものなら。お前の制御する……\n駆動車両、か？　それに、僕も乗りたいものだ」
1416 = "「Nếu Hachiroku đã tự hào đến vậy. Phương\ntiện dẫn động……\ndo cô điều khiển sao? Tôi cũng muốn ngồi\nthử một lần đấy.」"
# 【ハチロク】
# JP: 「それは……いつか。\nその……いつか、きっと――かなうものなら」
1618 = "「Chuyện đó……một ngày nào đó.\nCái đó……một ngày nào đó, chắc chắn——nếu có\nthể trở thành hiện thực.」"
# 【双鉄】
# JP: 「ふむ？」
1269 = "「Hừm?」"
# (独白)
# JP: いきなり歯切れが悪くなる。\nしばらく待つ。続く沈黙。
1914 = "Đột nhiên giọng cô ấy trở nên ngập ngừng.\nTôi đợi một lúc. Vẫn là sự im lặng."
# (独白)
# JP: ならば――と話を、\n先送りした疑問点へと巻き戻す。
1971 = "Nếu vậy——tôi bèn quay lại,\nhỏi về những điểm thắc mắc đã gác lại lúc\nnãy."
# 【双鉄】
# JP: 「鉄道用語なのだろうが、\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;だの臨時ダイアだのとは、なんだ？」
1217 = "「Chắc là thuật ngữ đường sắt nhỉ,\nnhưng \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; với biểu đồ tạm\nthời là gì vậy?」"
# (独白)
# JP: ほっと、安堵したような息。
1811 = "Một tiếng thở phào nhẹ nhõm."
# (独白)
# JP: そして再びハチロクの言葉は、\n立板に水と流れだす。
2095 = "Và rồi những lời của Hachiroku lại tuôn ra\nlưu loát như nước chảy mây trôi."
# 【ハチロク】
# JP: 「\x%l列車;#00ffc040;列車%l;#;の運行計画のことです。適正な\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;は、\n事故を防止し、運転効率を向上させます」
1436 = "「Đó là kế hoạch vận hành của \\x%l列車;#00ffc040;đoàn tàu%l;#; ạ.\nMột \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; hợp lý\nsẽ giúp ngăn ngừa tai nạn và nâng cao hiệu\nquả vận hành.」"
# 【双鉄】
# JP: 「事故の防止、か――」
1654 = "「Ngăn ngừa tai nạn, sao——」"
# (独白)
# JP: けれども、それが引っかかる。
1937 = "Nhưng mà, điều đó lại khiến tôi vướng mắc."
# (独白)
# JP: “だったらなんで”と、過去が泣き……\n無為なこととはわかっていても、尋ねてしまう。
877 = "\"Thế thì tại sao chứ\", quá khứ gào khóc\ntrong tôi……\nDù biết là vô ích, nhưng tôi vẫn buột\nmiệng hỏi."
# 【双鉄】
# JP: 「では、事故を起こす\x%l列車;#00ffc040;列車%l;#;は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に制御されていないものなのか？」
1624 = "「Vậy, những \\x%l列車;#00ffc040;đoàn tàu%l;#; gây ra tai nạn,\nlà những chuyến tàu không được \\x%lレイルロオド;#00ffc040;Railord%l;#;\nđiều khiển sao?」"
# 【ハチロク】
# JP: 「いえ――」
1136 = "「Không ạ——」"
# (独白)
# JP: ハチロクの顔が苦しげに歪む。\n声から温度が抜け落ちる。
1849 = "Khuôn mặt Hachiroku méo xệch đi vì đau\nkhổ.\nGiọng nói cũng mất đi hơi ấm."
# 【ハチロク】
# JP: 「……例えば、線路にされた置き石を、わたくし達は\n画像センサ――いわば目視でしか発見できません」
938 = "「……Ví dụ như, những hòn đá bị đặt trên\nđường ray, chúng tôi\nchỉ có thể phát hiện bằng cảm biến hình\nảnh——nói cách khác là bằng mắt thường thôi\nạ.」"
# 【双鉄】
# JP: 「目視でしか？　それでは人間と」
1247 = "「Chỉ bằng mắt thường thôi sao? Thế thì với\ncon người...」"
# 【ハチロク】
# JP: 「大差ありません。ので、置き石に気付いたときには、\nもう\x%lブレーキ;#00ffc040;ブレーキ%l;#;が間に合わないことがほとんどです」
1148 = "「Không có sự khác biệt lớn nào ạ. Vì vậy,\nkhi nhận ra có đá đặt trên đường ray,\nthì hầu như đã không còn kịp đạp \\x%lブレーキ;#00ffc040;phanh%l;#; nữa\nrồi.」"
# 【双鉄】
# JP: 「なるほど。線路におきた障害に対しては、\n都度での対処しかできない、というわけか」
1226 = "「Ra là vậy. Đối với những chướng ngại vật\ntrên đường ray,\nthì chỉ có thể tùy cơ ứng biến thôi nhỉ.」"
# 【ハチロク】
# JP: 「そのとおりです。双鉄様」
1492 = "「Đúng là vậy thưa ngài Soutetsu.」"
# (独白)
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も万能ではない。\n無論、\x%l共感;#00ffc040;共感%l;#;通信も、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも。
56 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không phải vạn năng.\nTất nhiên, liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; hay Navi \\x%lエアクラ;#00ffc040;Aircra%l;#;\ncũng vậy."
# (独白)
# JP: ゆえに、どれほど技術が発展しようと事故は絶えない。\n無論、事故の真なる原因は、技術などには無いのだが。
1960 = "Thế nên, dù công nghệ có phát triển đến\nđâu thì tai nạn vẫn không bao giờ chấm\ndứt.\nTất nhiên, nguyên nhân thực sự của tai nạn\nkhông nằm ở công nghệ."
# 【ハチロク】
# JP: 「そうした事態を防止するため、\n\x%l保線;#00ffc040;[ほせんがかり,2]保線係%l;#;という職員達が線路の管理をしていましたが……」
1493 = "「Để ngăn chặn những tình huống như vậy,\nnhững nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã đảm\nnhận việc quản lý đường ray, nhưng mà……」"
# (独白)
# JP: 無理に、絞り出したような声。
1839 = "Giọng nói như cố gắng vắt kiệt sức lực để\nthốt ra."
# 【ハチロク】
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、\x%l保線;#00ffc040;保線%l;#;係の不足も甚だしい物となりました。\nあの時期、鉄道事故が多発した一因は、それです」
912 = "「Vào thời kỳ cuối của \\x%l帝鉄;#00ffc040;Teitetsu%l;#;, tình trạng\nthiếu hụt nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã\ntrở nên vô cùng nghiêm trọng.\nĐó cũng là một phần nguyên nhân khiến tai\nnạn đường sắt xảy ra liên tục vào thời kỳ\nđó ạ.」"
# 【双鉄】
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期……」
911 = "「Thời kỳ cuối của \\x%l帝鉄;#00ffc040;Teitetsu%l;#;……」"
# (独白)
# JP: 僕が少年だったころ。\nあの事故のころ。
1953 = "Lúc tôi còn là một thiếu niên.\nVào thời điểm xảy ra vụ tai nạn đó."
# (独白)
# JP: その時代は、後に、\nひどく簡潔に呼称されるようになった。
2080 = "Thời đại đó, sau này,\nđã được gọi bằng một cái tên vô cùng ngắn\ngọn."
# 【双鉄】(双鉄・ハチロク)
# JP: 「[だいはいせん,2]大廃線時代」
1304 = "「Thời đại Đại bãi bỏ các tuyến」"
# (独白)
# JP: ハチロクと僕の声が重なる。
1828 = "Giọng của Hachiroku và tôi hòa vào nhau."
# (独白)
# JP: それが支えになったわけでもあるまいが、\nハチロクは、落としていた視線を持ち上げ直す。
2098 = "Dù chẳng phải đó là chỗ dựa gì,\nnhưng Hachiroku đã ngước ánh nhìn đang cụp\nxuống lên."
# 【ハチロク】
# JP: 「皮肉なことに。わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がその真価を\nフルに発揮したのも、あの時代でした」
1518 = "「Thật trớ trêu. \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng tôi được\nphát huy tối đa\ngiá trị đích thực của mình, cũng chính là\nvào thời đại đó ạ.」"
# 【双鉄】
# JP: 「……事故が多発したせいか？\n臨時ダイア、とやらが必要になったから？」
937 = "「……Là do tai nạn xảy ra liên miên sao?\nVì những thứ như biểu đồ tạm thời trở nên\ncần thiết?」"
# 【ハチロク】
# JP: 「ご明察です、双鉄様。\nしかし――やがて…………」
1663 = "「Ngài thật tinh ý, ngài Soutetsu.\nThế nhưng——chẳng bao lâu sau…………」"
# (独白)
# JP: ハチロクの声が途切れてしまう。\n事故の多発、路線廃止、\x%l列車;#00ffc040;列車%l;#;の廃棄――
1856 = "Giọng Hachiroku chợt đứt quãng.\nTai nạn xảy ra liên miên, bãi bỏ các tuyến\nđường sắt, vứt bỏ \\x%l列車;#00ffc040;đoàn tàu%l;#;——"
# (独白)
# JP: 大廃線時代の終焉は、\nそのまま、鉄道の時代の終焉を意味するがゆえ。
1907 = "Sự kết thúc của thời đại Đại bãi bỏ các\ntuyến,\ncũng đồng nghĩa với sự kết thúc của kỷ\nnguyên đường sắt."
# 【ハチロク】
# JP: 「わたくしが汰斗様に買い取られたのも、その時期です」
1383 = "「Tôi được ngài Taito mua lại cũng vào thời\nđiểm đó ạ.」"
# (独白)
# JP: ハチロクの目が、もう一度、キャノピーの外に向けられる。
1844 = "Ánh mắt Hachiroku một lần nữa hướng ra\nngoài vòm kính."
# (独白)
# JP: 暗い目だ。\n見ていると、こちらまで引かれそうになる。
1975 = "Một đôi mắt u buồn.\nNhìn vào đó, tôi cũng có cảm giác như bị\ncuốn theo."
# 【ハチロク】
# JP: 「しかし、わたくしにはその時期の記憶がありません。\nこの美しい町を見たかどうかさえ、覚えていないのです」
1523 = "「Nhưng tôi lại không có ký ức về khoảng\nthời gian đó.\nNgay cả việc tôi đã từng nhìn thấy thị\ntrấn xinh đẹp này hay chưa, tôi cũng không\nnhớ nữa.」"
# 【双鉄】
# JP: 「見ていないだろう。ここからは」
1565 = "「Chắc là chưa nhìn thấy đâu. Từ trên này\nấy.」"
# (独白)
# JP: 事実の指摘。軽く明るく。
1957 = "Chỉ ra một sự thật. Bằng giọng điệu nhẹ\nnhàng, tươi sáng."
# (独白)
# JP: そして指差し、ハチロクの視点を前へと向ける。\nよどみの全てを、空へと飛ばしてしまえるように。
2097 = "Rồi tôi chỉ tay, hướng ánh nhìn của\nHachiroku về phía trước.\nNhư thể muốn xua tan mọi muộn phiền bay\nvút lên không trung."
# 【双鉄】
# JP: 「歩いて見る御一夜の町は、また別の顔だ。\n歩くうち、あるいは見覚えに出くわすかもしれん」
1506 = "「Thị trấn Ohimitera khi dạo bước ngắm nhìn\nlại mang một vẻ đẹp khác đấy.\nTrong lúc đi dạo, biết đâu cô lại bắt gặp\nkhung cảnh quen thuộc nào đó.」"
# 【ハチロク】
# JP: 「そう……ですね。\nはい。双鉄様のおっしゃるとおりと思います」
1591 = "「Đúng……vậy nhỉ.\nVâng. Tôi nghĩ ngài Soutetsu nói đúng ạ.」"
# (独白)
# JP: うん、と頷き。\n持ち上げ直した顔には表情が戻っている。
1869 = "Cô ấy gật đầu, \"Vâng\".\nKhuôn mặt vừa ngẩng lên đã lấy lại được vẻ\ntươi tắn."
# (独白)
# JP: “無理に浮かべた”。そう思わせる笑顔に逆に、\n普段のハチロクがどれほど自然に笑うかを知る。
872 = "\"Gượng cười\". Nụ cười gượng gạo ấy lại cho\ntôi thấy,\nbình thường Hachiroku cười tự nhiên đến\nnhường nào."
# 【ハチロク】
# JP: 「それにしても、\n双鉄さまは少しお人が悪いですね」
1586 = "「Mà này,\nngài Soutetsu cũng có chút xấu tính đấy\nnhé.」"
# 【双鉄】
# JP: 「僕がか？」
1376 = "「Tôi á?」"
# 【ハチロク】
# JP: 「だって……\nよりにもよって\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗せるだなんておっしゃって」
1421 = "「Tại vì……\nchọn gì không chọn, ngài lại bảo cho tôi\nngồi \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ chứ.」"
# 【双鉄】
# JP: 「ああ」
1272 = "「À.」"
# (独白)
# JP: なるほど。
1885 = "Ra là vậy."
# (独白)
# JP: なにより深く鉄道を愛し、誇るそれ故――\nハチロクは、こうまで\x%lエアクラ;#00ffc040;エアクラ%l;#;を嫌うのか。
1941 = "Vì yêu sâu sắc và tự hào về đường sắt hơn\nbất cứ thứ gì——\nnên Hachiroku mới ghét \\x%lエアクラ;#00ffc040;Aircra%l;#; đến thế sao."
# 【ハチロク】
# JP: 「飛行機なら飛行機と最初からおっしゃってくだされば。\nわたくしもお見苦しいところを見せずにすみましたのに」
1581 = "「Nếu ngài nói ngay từ đầu là máy bay.\nThì tôi đã không phải phơi bày bộ dạng khó\ncoi đó rồi.」"
# 【双鉄】
# JP: 「確かにな」
1201 = "「Cũng đúng.」"
# (独白)
# JP: ハチロクの指摘は正しい。\n今の僕は、人が悪い。
1833 = "Lời trách móc của Hachiroku là chính xác.\nTôi bây giờ, đúng là người xấu tính."
# (独白)
# JP: ナビと無言の共謀をした沈黙で、\nハチロクのことを騙している。
1901 = "Bằng sự im lặng đồng lõa với Navi,\ntôi đang lừa dối Hachiroku."
# 【双鉄】
# JP: 「人が悪いのも仕方ないのだ。\nなにせ僕は、御一夜市の生まれではない」
1200 = "「Tôi xấu tính cũng là hết cách thôi.\nDù sao thì tôi cũng không sinh ra ở thành\nphố Ohimitera mà.」"
# 【ハチロク】
# JP: 「そうなのですか？」
1536 = "「Vậy sao ạ?」"
# 【双鉄】
# JP: 「うむ。そうなのだ」
1502 = "「Ừm. Là vậy đấy.」"
# (独白)
# JP: 答えれば、ハチロクはくす、と小さく笑う。
2032 = "Nghe tôi đáp, Hachiroku bật cười khúc\nkhích."
# 【ハチロク】
# JP: 「ならわたくしは、\n双鉄様のお人の悪さに感謝しなくてはいけませんね？」
1635 = "「Thế thì tôi,\nphải cảm ơn sự xấu tính của ngài Soutetsu\nrồi nhỉ?」"
# 【双鉄】
# JP: 「感謝？　なぜだ」
1365 = "「Cảm ơn? Tại sao?」"
# 【ハチロク】
# JP: 「最初から飛行機と聞いていたなら、わたくしきっと、\n慣れている風を装って、きょろきょろ出来ませんでした」
1580 = "「Nếu biết là máy bay ngay từ đầu, chắc\nchắn tôi\nsẽ làm ra vẻ quen thuộc, chứ không dám ngó\nnghiêng ngó dọc thế này đâu ạ.」"
# (独白)
# JP: 言って、ハチロクはあどけなく、\n身を乗り出してまた眼下を見る。
1830 = "Nói rồi, Hachiroku lại ngây thơ\nrướn người ngắm nhìn xuống dưới."
# 【ハチロク】
# JP: 「川も豊かで見事です。\nあの水を、先ほどわたくしはいただいたのでしょうか？」
1619 = "「Con sông cũng thật dồi dào và tuyệt đẹp.\nNước tôi uống lúc nãy là từ đó sao ạ?」"
# 【双鉄】
# JP: 「うむ。クマ川の水だ。もっとも、酒造りに使うのは\nもっと上流――源流に近いところの水だそうだが」
1280 = "「Ừm. Là nước sông Kuma đấy. Dù nước dùng\nđể ủ rượu\nnghe nói là lấy từ thượng nguồn——gần đầu\nnguồn hơn cơ.」"
# 【ハチロク】
# JP: 「素晴らしいですね。いつか、機会があれば、\nこの素晴らしい川の源を眺めてみたいものです」
1534 = "「Tuyệt vời quá. Một lúc nào đó, nếu có cơ\nhội,\ntôi rất muốn được ngắm nhìn cội nguồn của\ndòng sông tuyệt đẹp này.」"
# (独白)
# JP: 驚いた。\n気持ちが、そのまま口からこぼれる。
1951 = "Thật đáng ngạc nhiên.\nCảm xúc cứ thế tuôn trào ra khỏi miệng\ntôi."
# 【双鉄】
# JP: 「同じことを思うのだな、僕と」
1262 = "「Cô cũng có cùng suy nghĩ với tôi nhỉ.」"
# 【ハチロク】
# JP: 「双鉄様も？」
1662 = "「Ngài Soutetsu cũng vậy sao?」"
# 【双鉄】
# JP: 「うむ。ここに引き取られてすぐのことだがな」
1284 = "「Ừm. Đó là chuyện xảy ra ngay sau khi tôi\nđược nhận nuôi về đây.」"
# 【ハチロク】
# JP: 「引き取られて……ですか？」
1407 = "「Được nhận nuôi……sao ạ?」"
# 【双鉄】
# JP: 「ああ。僕は右田の養子なのだ」
1282 = "「Ừ. Tôi là con nuôi của nhà Migita.」"
# (独白)
# JP: 隠していても仕方がない。\nが、ハチロクは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1985 = "Có giấu giếm cũng chẳng ích gì.\nNhưng Hachiroku là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# (独白)
# JP: 気をつかわれてはわずらわしいので、\n鉄道事故、という一点のみは語らずにおく。
1948 = "Để tránh bị bận tâm phiền phức,\ntôi quyết định không nói đến chi tiết \"tai\nnạn đường sắt\"."
# 【双鉄】
# JP: 「僕は事故で家族の全てを失くし、右田家に――\n汰斗さんに引き取られ、その[ようそん,1]養孫となった」
1378 = "「Tôi mất toàn bộ gia đình trong một vụ tai\nnạn, và được nhà Migita——\nđược ông Taito nhận nuôi, trở thành cháu\nnuôi của ông ấy.」"
# 【ハチロク】
# JP: 「汰斗様に……双鉄様も。\nっ！　だから名前の話のときに、日々姫様は」
1661 = "「Bởi ngài Taito……Cả ngài Soutetsu cũng\nvậy.\n! Thảo nào lúc nói về cái tên, ngài Hibiki\nlại...」"
# 【双鉄】
# JP: 「あれは、僕が養子だという話を嫌うのだ。\n僕は気にせんのだが……覚えておいてもらえば助かる」
1633 = "「Là vì em ấy ghét chuyện tôi là con nuôi\nđấy.\nTôi thì chẳng bận tâm đâu……nhưng nếu cô\nnhớ điều đó thì tốt quá.」"
# (独白)
# JP: 軽く。ハチロクは瞳を伏せる。
1852 = "Hachiroku khẽ cụp mắt xuống."
# 【ハチロク】
# JP: 「はい。以降は間違いなく。\n知らぬこととはいえ、失礼しました」
1306 = "「Vâng. Từ nay tôi sẽ không nhầm lẫn nữa.\nDù là không biết, nhưng tôi đã thất lễ\nrồi.」"
# 【双鉄】
# JP: 「なに、知らぬがゆえの失礼なら僕もした。\nそうだ。これでおあいこということにならんか？」
1265 = "「Có gì đâu, thất lễ vì không biết thì tôi\ncũng thế mà.\nPhải rồi. Coi như chúng ta hòa nhé?」"
# (独白)
# JP: 伏せた瞳がもちあがる。\nいたずらそうな光が宿る。
1850 = "Đôi mắt đang cụp xuống bỗng ngước lên.\nÁnh lên một tia sáng tinh nghịch."
# 【ハチロク】
# JP: 「うふふ。左様でした。お人の悪い双鉄様に――\nわたくし、寝込みを襲われ脱がされてしまいましたね」
1291 = "「Ufufu. Đúng là vậy. Ngài Soutetsu xấu\ntính——\nđã lẻn vào lúc tôi đang ngủ say rồi cởi áo\ntôi ra nhỉ.」"
# 【双鉄】
# JP: 「おいおい、人聞きの悪いことを」
1278 = "「Này này, nói thế nghe dễ gây hiểu lầm lắm\nđấy.」"
# 【ハチロク】
# JP: 「お空ですよ？　双鉄様。\n飛ぶ鳥は、わたくしたちの声などきっと聞きません」
1373 = "「Chúng ta đang ở trên trời cơ mà? Ngài\nSoutetsu.\nNhững chú chim đang bay chắc chắn sẽ không\nnghe thấy tiếng chúng ta đâu.」"
# 【双鉄】
# JP: 「うー……む」
1270 = "「Ư……ừm.」"
# (独白)
# JP: それはそうだが、ナビが聞いてる。\n妙な誤解をしないでくれればいいのだが。
2050 = "Nói thì nói vậy, nhưng Navi đang nghe đấy.\nChỉ mong cô ấy đừng hiểu lầm tai hại là\nđược."
# 【ハチロク】
# JP: 「ご安心ください？　双鉄様。わたくし、もう少しも、\n怒っても、不愉快と思ってもおりません」
1362 = "「Ngài cứ yên tâm đi? Ngài Soutetsu. Tôi\nkhông còn chút nào,\ntức giận hay khó chịu nữa đâu ạ.」"
# 【双鉄】
# JP: 「そうなのか」
1433 = "「Vậy sao.」"
# (独白)
# JP: そうなのだろうなと納得させてくれるほど、\nハチロクの表情は幸せそうだ。
1867 = "Vẻ mặt hạnh phúc của Hachiroku đủ để\nthuyết phục tôi rằng\nchắc hẳn là như vậy."
# (独白)
# JP: 切り替えの早さは物であるからなのかもしれんが――\nあるいは性格的に、僕と似ているのかもしれん。
1943 = "Việc thay đổi tâm trạng nhanh chóng có thể\nlà do cô ấy là đồ vật——\nHoặc cũng có thể về mặt tính cách, cô ấy\ngiống tôi."
# 【ハチロク】
# JP: 「ですが、まだおあいこにはできません」
1145 = "「Nhưng mà, vẫn chưa hòa được đâu ạ.」"
# 【双鉄】
# JP: 「なぜだ？　怒ってないのなら――」
1507 = "「Tại sao? Nếu cô không giận nữa thì——」"
# 【ハチロク】
# JP: 「怒ってないから、むしろです。\n平手打ちを余分にひとつ。わたくしは双鉄様に」
1318 = "「Chính vì không giận nữa nên mới thế đấy\nạ.\nTôi vẫn còn nợ ngài Soutetsu một cái tát.」"
# 【双鉄】
# JP: 「なるほど。よかろう」
1225 = "「Ra là vậy. Được thôi.」"
# (独白)
# JP: （ピンっ！）
2118 = "（Búng!）"
# 【ハチロク】
# JP: 「あ」
1271 = "「A.」"
# (独白)
# JP: おでこを軽く、指先でつつく。\nわずかな痛みも与えぬ弱さで。
1955 = "Tôi dùng đầu ngón tay gõ nhẹ lên trán cô\nấy.\nNhẹ đến mức không hề gây ra chút đau đớn\nnào."
# 【双鉄】
# JP: 「体格差を加味すればこんなところだろう。\nいいな？　ハチロク、これで手打ちだ」
1678 = "「Tính thêm cả sự chênh lệch thể hình thì\ncỡ này là vừa rồi.\nĐược chứ? Hachiroku, thế này là hòa nhé.」"
# 【ハチロク】
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1380 = "「Tôi hiểu rồi thưa ngài Soutetsu.\nHòa nhau, xí xóa, không ai nợ ai nữa.」"
# (独白)
# JP: 話が早い。\nやはり、性格的に似ているのかも――ああ、いや。
1924 = "Nhanh gọn lẹ thật.\nQuả nhiên tính cách cũng có nét giống\nnhau——À, không."
# 【双鉄】
# JP: 「ハチロクも汰斗さんに買い取られたと言っていたな。\nならば僕たちは、似たもの同士なのかもしれん」
1209 = "「Hachiroku cũng nói là được ông Taito mua\nlại nhỉ.\nVậy thì chúng ta có khi lại là những kẻ\nđồng cảnh ngộ cũng nên.」"
# 【ハチロク】
# JP: 「本当にそうかもしれませんね。\n双鉄様も、この川の源に興味がおありとのことですし」
1589 = "「Biết đâu lại đúng là vậy thật.\nNgài Soutetsu cũng có hứng thú với đầu\nnguồn của dòng sông này mà.」"
# 【双鉄】
# JP: 「興味をもって、実際歩いた。\n無論、子供の足で[さかのぼ]遡りきれるものではなかったが」
1138 = "「Vì có hứng thú nên tôi đã thực sự đi bộ\nđến đó.\nTất nhiên, với đôi chân của một đứa trẻ\nthì không thể đi ngược dòng đến tận cùng\nđược.」"
# 【ハチロク】
# JP: 「歩いて！？　遡られたのですか、この川を」
1346 = "「Đi bộ sao!? Ngài đã đi ngược dòng con\nsông này ư?」"
# 【双鉄】
# JP: 「ああ。興味があり、時間と体力があるように思え、\n金はさっぱりなかったからな」
1426 = "「Ừ. Lúc đó tôi vừa có hứng thú, lại cảm\nthấy mình có thời gian và thể lực,\ntrong khi tiền bạc thì hoàn toàn không\ncó.」"
# 【ハチロク】
# JP: 「まぁ」
1622 = "「Chà.」"
# (独白)
# JP: なにが面白かったのか、\nハチロクはくすりと小さく笑う。
1795 = "Không biết có gì thú vị,\nmà Hachiroku lại bật cười khúc khích."
# 【ハチロク】
# JP: 「歩かれて、どうなりました？」
1408 = "「Thế ngài đi bộ rồi kết quả ra sao ạ?」"
# 【双鉄】
# JP: 「動けなくなり、翌朝を迎え発見、保護され――\n真闇姉に、こっぴどく怒られてげんこつをもらった」
1562 = "「Không thể bước nổi nữa, sáng hôm sau thì\nđược tìm thấy, đưa về——\nBị chị Mayami mắng cho một trận té tát và\ncho ăn một quả đấm.」"
# 【ハチロク】
# JP: 「げんこつ、ですか？　あの方が？」
1577 = "「Quả đấm sao ạ? Từ người đó ư?」"
# 【双鉄】
# JP: 「ハチロクが想像しているのの、多分数倍は痛い奴だ。\nこつんでもごつんでもなく、ガン！　と来た」
1358 = "「Chắc phải đau gấp mấy lần so với tưởng\ntượng của Hachiroku đấy.\nKhông phải là cốc đầu hay gõ nhẹ đâu, mà\nlà \"Bốp!\" một cú điếng người cơ.」"
# 【ハチロク】
# JP: 「それほど強く？」
1397 = "「Mạnh đến thế cơ ạ?」"
# 【双鉄】
# JP: 「うむ。目から火花が飛び散った。\nそこに怒涛の隈元弁で、手ひどく叱りつけられたのだ」
1432 = "「Ừm. Nổ đom đóm mắt luôn.\nSau đó là một tràng tiếng Kumamoto mắng mỏ\nxối xả.」"
# (独白)
# JP: 小さく、ハチロクが頷き。黙る。
1865 = "Hachiroku khẽ gật đầu. Im lặng."
# 【双鉄】
# JP: 「『どこに行こうと勝手だが、行き先を言ってからにしろ。\n探すこちらが大変だ』と、そんな意味だと伝わってきた」
917 = "「『Muốn đi đâu thì tùy, nhưng ít nhất cũng\nphải báo một tiếng chứ.\nNgười đi tìm khổ sở lắm đấy』, đại loại là\nmang ý nghĩa như vậy.」"
# 【ハチロク】
# JP: 「ごくまっとうなお叱りですね」
1616 = "「Một lời quở trách vô cùng hợp tình hợp lý\nnhỉ.」"
# 【双鉄】
# JP: 「そうだな。僕もそう思った。そして同時に――\nこの人は僕を叱ってくれると、ホっとした」
1430 = "「Đúng vậy. Tôi cũng nghĩ thế. Và đồng\nthời——\nTôi cảm thấy nhẹ nhõm vì người này đã chịu\nmắng mình.」"
# (独白)
# JP: ……そうだった。僕はほっとしたのだ。\n事故被害者として腫れ物のように扱うのではなく。
883 = "……Đúng vậy. Tôi đã thấy nhẹ nhõm.\nVì không bị đối xử như một cục u nhọt mang\ndanh nạn nhân tai nạn."
# (独白)
# JP: ごくまっとうに、ごくごく普通に――\n僕を扱ってくれる人間に、ようやく出会えて。
2025 = "Vô cùng đường hoàng, vô cùng bình thường——\nCuối cùng tôi cũng gặp được người đối xử\nvới mình như thế."
# 【双鉄】
# JP: 「ホっとして。だから、家族になれたのだろうな。\n今となっては、そう感じる」
1311 = "「Nhờ cảm giác nhẹ nhõm đó. Mà chúng tôi\nmới có thể trở thành gia đình.\nBây giờ nghĩ lại, tôi cảm thấy như vậy.」"
# 【ハチロク】
# JP: 「素敵な方なのですね、真闇様は」
1538 = "「Ngài Mayami quả là một người tuyệt vời\nnhỉ.」"
# 【双鉄】
# JP: 「そうだな。誰より頼れる人だ。\nあの人がひとたび本気になれば――…………」
1427 = "「Đúng vậy. Là người đáng tin cậy hơn bất\ncứ ai.\nMột khi người đó đã nghiêm túc thì——…………」"
# 【ハチロク】
# JP: 「双鉄様？」
1666 = "「Ngài Soutetsu?」"
# (独白)
# JP: おかしい。なぜだ。考えろ。\n真闇姉が反対なことは明白だ。
1909 = "Kỳ lạ thật. Tại sao chứ. Phải suy nghĩ\nxem.\nRõ ràng là chị Mayami đang phản đối."
# 【双鉄】
# JP: 「なのになぜ、帝都の僕にまで届くほど――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動が活発になってしまったのだ？」
1516 = "「Vậy mà tại sao, lại đến mức lan tới tận\ntai tôi ở Đế đô——\nHoạt động mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; lại trở\nnên sôi nổi đến vậy chứ?」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動っ！？」
1344 = "「Hoạt động mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ư!?」"
# (独白)
# JP: ハチロクの声が跳ね上がる。
1860 = "Giọng Hachiroku vút cao lên."
# 【ハチロク】
# JP: 「この町にですか？\nこの川の水を、工場で汚そうというのですか？」
1299 = "「Ở thị trấn này sao?\nHọ định dùng nhà máy làm ô nhiễm nguồn\nnước của dòng sông này ư?」"
# 【双鉄】
# JP: 「そういう話だ。\n僕は、それを食い止めたいと帝都から戻ってきた」
1320 = "「Chuyện là vậy đó.\nTôi từ Đế đô trở về là để ngăn chặn chuyện\nđó.」"
# 【ハチロク】
# JP: 「わたくしは素晴らしいオーナーに巡りあいました！」
1381 = "「Tôi đã may mắn gặp được một người chủ\ntuyệt vời rồi!」"
# (独白)
# JP: 敵意にも近い反発から、一気に感動と喜びへ。\n日々姫が百面相ならば、このハチロクは百感情だ。
1842 = "Từ thái độ phản kháng gần như thù địch,\nthoắt cái chuyển sang cảm động và vui\nsướng.\nNếu Hibiki có trăm biểu cảm, thì Hachiroku\nnày có trăm cảm xúc."
# 【ハチロク】
# JP: 「わたくしをお役立てください、双鉄様。\nこの美しい川の町を、悪の手に渡してはいけません」
1592 = "「Xin hãy cho tôi được góp sức, thưa ngài\nSoutetsu.\nKhông thể để thị trấn bên sông xinh đẹp\nnày rơi vào tay kẻ ác được.」"
# 【双鉄】
# JP: 「悪」
1672 = "「Kẻ ác.」"
# (独白)
# JP: 随分と強い言葉だ。
2021 = "Một từ ngữ khá là nặng nề."
# 【双鉄】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、悪なのか？」
897 = "「Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; là kẻ ác sao?」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものが、\n名前の中に、そもそも悪を内包するような存在です」
887 = "「Bản thân \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nngay từ cái tên đã bao hàm cái ác (aku)\ntrong đó rồi.」"
# (独白)
# JP: エ“アク”ラ、という言葉遊びか。
1886 = "Trò chơi chữ E-\"aku\"-ra sao."
# (独白)
# JP: あまり得意な分野ではないが、\n遊びであれば付き合ってみよう。
2099 = "Tuy không phải lĩnh vực tôi giỏi,\nnhưng nếu là trò đùa thì hùa theo chút\ncũng được."
# 【双鉄】
# JP: 「ならば、お前が今ここで、\n身の処し方に困っているのも、名の故か？」
1590 = "「Nếu vậy, việc cô bây giờ ở đây\nđang loay hoay tìm nơi chốn, cũng là do\ncái tên sao?」"
# 【ハチロク】
# JP: 「え？　それは……\nいかなる意味でございましょうか？」
1264 = "「Hả? Chuyện đó……\ncó ý nghĩa gì cơ ạ?」"
# 【双鉄】
# JP: 「“流浪”を、お前たちはその名に内包している」
924 = "「\"Lưu lạc\", các cô đã bao hàm nó trong tên\ngọi của mình rồi.」"
# (独白)
# JP: あ、と小さくつぶやいて。\nハチロクはまた、空中に指で文字を書く。
1818 = "A, cô ấy khẽ lẩm bẩm.\nHachiroku lại dùng ngón tay viết chữ vào\nkhông trung."
# 【ハチロク】
# JP: 「レイ“ルロオ”ド――なるほど、暗示的ですね。\n悪に駆逐され、われわれは流浪に身を落とした」
1645 = "「Rai-\"lố-rồ\"-d——ra là vậy, thật đầy tính\nám chỉ nhỉ.\nBị kẻ ác đánh đuổi, chúng tôi đành chịu\ncảnh lưu lạc (ruro).」"
# (独白)
# JP: 遊びで返したつもりの言葉を、\nハチロクは真顔で受け止める。
1888 = "Lời tôi định nói đùa để đáp lại,\nHachiroku lại đón nhận bằng vẻ mặt vô cùng\nnghiêm túc."
# (独白)
# JP: その唇が、真一文字に結ばれやがて、小さく歪む。
1841 = "Đôi môi cô ấy mím chặt thành một đường\nthẳng, rồi khẽ méo xệch đi."
# 【ハチロク】
# JP: 「やはり悪です。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;も、\x%lエアクラ;#00ffc040;エアクラ%l;#;を作る工場も」
1485 = "「Quả nhiên là kẻ ác.\nCả \\x%lエアクラ;#00ffc040;Aircra%l;#; lẫn nhà máy chế tạo \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# (独白)
# JP: 淡々と。ひどく冷たく吐き捨てる。
2057 = "Thản nhiên. Cô ấy buông lời cay đắng đầy\nlạnh lẽo."
# 【ハチロク】
# JP: 「人々の暮らしから鉄道を奪い、大廃線時代を招いた。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の犯した罪を、わたくしは決して許しません」
1348 = "「Cướp đi đường sắt khỏi cuộc sống của\nngười dân, gây ra thời đại Đại bãi bỏ các\ntuyến.\nTội ác mà \\x%lエアクラ;#00ffc040;Aircra%l;#; đã gây ra, tôi tuyệt đối\nkhông tha thứ.」"
# 【双鉄】
# JP: 「罪」
1564 = "「Tội ác.」"
# 【ナビ】
# JP: 「より便利だったから人に選ばれただけの話です。\nそれを\x%lエアクラ;#00ffc040;エアクラ%l;#;の罪というなら、逆恨みでは？」
1169 = "「Đơn giản là vì tiện lợi hơn nên mới được\ncon người lựa chọn thôi.\nNếu gọi đó là tội ác của \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì chẳng\nphải là giận cá chém thớt sao?」"
# 【ハチロク】
# JP: 「何者ですかっ！？」
1457 = "「Là kẻ nào!?」"
# (独白)
# JP: 完全に不意打ちのナビの声。\nが、ハチロクは悲鳴もあげず、鋭い目つきで誰何する。
2129 = "Giọng nói của Navi vang lên hoàn toàn bất\nngờ.\nNhưng Hachiroku không hề hét lên, chỉ\nphóng ánh mắt sắc lẹm tra hỏi."
# 【ハチロク】
# JP: 「こそこそ隠れて物申すとは卑怯千万。\n恥じ入りなさい。そして、姿を現しなさい」
1575 = "「Lén lút trốn tránh để lên tiếng thật là\nhèn hạ.\nHãy biết xấu hổ đi. Và mau hiện nguyên\nhình ra đây.」"
# 【ナビ】
# JP: 「隠れてなどいません。\n本機の姿は、あなたの視界に捉えられています」
1147 = "「Tôi không hề lẩn trốn.\nHình dáng của tôi đang nằm ngay trong tầm\nnhìn của cô đấy.」"
# 【ハチロク】
# JP: 「本機？　では」
1480 = "「Của tôi? Vậy thì.」"
# (独白)
# JP: 左右を見渡す。\n目に宿っていた険がいくらか、柔らかになる。
1930 = "Nhìn ngó xung quanh.\nVẻ sắc lẹm trong đôi mắt đã dịu đi đôi\nchút."
# 【ハチロク】
# JP: 「あなたは――この飛行機なのですか？」
1186 = "「Ngươi——chính là chiếc máy bay này sao?」"
# 【ナビ】
# JP: 「飛行機ではありません」
1146 = "「Không phải là máy bay.」"
# (独白)
# JP: ナビは静かに怒っている。\n止めはしない。
2131 = "Navi đang âm thầm tức giận.\nTôi không can ngăn."
# (独白)
# JP: 止めたところで、わだかまりは深くなるだけだ。
1982 = "Có can ngăn thì khúc mắc cũng chỉ càng sâu\nthêm thôi."
# 【ナビ】
# JP: 「本機は、当機――試作飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;、EFL-T007の\n専用\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビです」
1477 = "「Tôi là Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; chuyên dụng của phương\ntiện này——\n\\x%lエアクラ;#00ffc040;Aircra%l;#; kiểu bay thử nghiệm, EFL-T007.」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;！？　\nまさか、空を飛ぶ\x%lエアクラ;#00ffc040;エアクラ%l;#;なんてっ！！？」
898 = "「\\x%lエアクラ;#00ffc040;Aircra%l;#;!?\nKhông thể nào, \\x%lエアクラ;#00ffc040;Aircra%l;#; mà lại bay trên trời\nsao!!?」"
# (独白)
# JP: ハチロクの目が僕を捉える。\nすがりついてくる。
1863 = "Ánh mắt Hachiroku khóa chặt lấy tôi.\nĐầy vẻ cầu cứu."
# (独白)
# JP: が――\nウソで一時ごまかすことは、それこそ悪だ。
2001 = "Nhưng——\nDùng lời nói dối để lấp liếm nhất thời, đó\nmới là tội ác."
# 【双鉄】
# JP: 「あるのだ。今は。\n空にさえ、エアロ＝クラフテック機関の手は届いたのだ」
1549 = "「Có đấy. Bây giờ thì.\nBàn tay của động cơ Aero-Craftech đã vươn\ntới tận bầu trời rồi.」"
# 【ハチロク】
# JP: 「ならば降りますっ！」
1631 = "「Thế thì tôi sẽ xuống!」"
# (独白)
# JP: 金切り声が鳴り響き、狭いキャノピーが激しく揺れる。\nハチロクが、ここから出ようともがき始める。
2086 = "Tiếng thét chói tai vang lên, vòm kính\nchật hẹp rung lắc dữ dội.\nHachiroku bắt đầu vùng vẫy muốn thoát ra\nkhỏi đây."
# 【双鉄】
# JP: 「阿呆かお前は！　\n今ここを出れば地に落ち粉々に壊れるぞっ！」
1190 = "「Cô ngốc hả!\nBây giờ mà ra ngoài thì sẽ rơi xuống đất\ntan tành đấy!」"
# 【ハチロク】
# JP: 「そうであっても！　\x%lエアクラ;#00ffc040;エアクラ%l;#;になぞっ」
1323 = "「Dù có vậy đi nữa! Cũng còn hơn là ở trong\n\\x%lエアクラ;#00ffc040;Aircra%l;#;」"
# 【ナビ】
# JP: 「くだらない意地で自らの職務を永遠に放棄しますか。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、聞くほどの存在では無いのですね」
1294 = "「Chỉ vì lòng tự ái ngu ngốc mà cô định\nvĩnh viễn từ bỏ chức vụ của mình sao.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; xem ra cũng chẳng vĩ đại như lời\nđồn nhỉ.」"
# 【ハチロク】
# JP: 「っ！！！」
1273 = "「!!!」"
# (独白)
# JP: ぴたりと止まる。\nハチロクはまるきり動かなくなる。
2033 = "Dừng phắt lại.\nHachiroku hoàn toàn bất động."
# (独白)
# JP: ただ目が、瞳が――\n動き全ての激しさを超え、烈火のごとくゆらめき燃える。
2004 = "Chỉ có ánh mắt, con ngươi ấy——\nVượt qua mọi sự dữ dội của cử động, bùng\ncháy phừng phực như ngọn lửa dữ."
# 【ハチロク】
# JP: 「わたくしたちから職務を――人を貨物を運ぶことを。\nレイルまでをも奪ったのは、あなたがたでしょうに」
1350 = "「Chính các người đã cướp đi chức vụ của\nchúng tôi——cướp đi công việc vận chuyển\nhành khách và hàng hóa.\nCướp đi cả đường ray của chúng tôi cơ mà.」"
# 【ナビ】
# JP: 「事実誤認の訂正を――」
1197 = "「Xin đính chính lại nhận thức sai lầm——」"
# 【双鉄】
# JP: 「違うぞハチロク」
1141 = "「Không phải đâu Hachiroku.」"
# (独白)
# JP: 割って入れば、すぐさまナビは言葉を止める。\nこれは僕が、人間が言うべき言葉であるから。
2042 = "Tôi vừa chen ngang, Navi lập tức ngừng\nlời.\nVì đây là lời mà tôi, một con người, phải\nnói."
# 【双鉄】
# JP: 「お前自らが言っていたではないか。\n全てを支配するのは人間――全ては、人間の選択だ」
1216 = "「Chẳng phải chính cô đã nói sao.\nKẻ chi phối tất cả là con người——Mọi thứ\nđều là lựa chọn của con người.」"
# (独白)
# JP: 教えてもらった。そのことを。\n金の髪をした見知らぬ少女に。事故の傷がまだ癒えぬころ。
2066 = "Tôi đã được dạy điều đó.\nTừ một thiếu nữ tóc vàng xa lạ. Khi vết\nthương từ vụ tai nạn vẫn chưa lành."
# (独白)
# JP: 憎しみのぶつけどころを見つけることが出来ずに、\n心を腐らせるだけだったころ。
2082 = "Khi tôi không thể tìm được nơi trút bỏ\nlòng căm hận,\nchỉ biết để trái tim mình dần mục nát."
# 【双鉄】
# JP: 「たとえ知性を持とうとも、物は決定を下せない。\n決定を下すのは常に人で、その責任を負うのも、人だ」
1224 = "「Dù có sở hữu trí tuệ, đồ vật cũng không\nthể đưa ra quyết định.\nKẻ đưa ra quyết định luôn là con người, và\nngười phải chịu trách nhiệm cũng là con\nngười.」"
# 【ハチロク】
# JP: 「そのことならば――当然に、承知いたしております」
1623 = "「Chuyện đó thì——đương nhiên là tôi hiểu rõ\nạ.」"
# 【双鉄】
# JP: 「ならば、ナビに――“物”に当たるのはやめた方がいい。\nお前の誇りを、お前自身が貶めることになってしまうぞ」
1413 = "「Nếu vậy, cô nên ngừng việc trút giận lên\nNavi——lên \"đồ vật\" đi.\nChính cô sẽ tự chà đạp lên lòng kiêu hãnh\ncủa mình đấy.」"
# 【ハチロク】
# JP: 「ん――」
1267 = "「Ư——」"
# (独白)
# JP: ハチロクの肩が小さく揺れる。\n喉が、こくんと何かを飲み込む。
1847 = "Bờ vai Hachiroku khẽ run lên.\nCổ họng cô ấy nuốt ực một cái gì đó."
# (独白)
# JP: ハチロクはツバを出すのだろうか？\nそんなことをふと、思ってしまう。
1822 = "Liệu Hachiroku có tiết nước bọt không nhỉ?\nTôi chợt nghĩ vẩn vơ như thế."
# 【ハチロク】
# JP: 「双鉄様のおっしゃられるとおりであるかと思います。\n取り乱し八つ当たりをしたことを、心より恥じ入ります」
1664 = "「Tôi nghĩ ngài Soutetsu nói đúng ạ.\nTôi thực tâm cảm thấy xấu hổ vì đã mất\nbình tĩnh và giận cá chém thớt.」"
# (独白)
# JP: そして深々。\nキャノピー内に両手をついて、ハチロクはその頭を下げる。
2096 = "Rồi cô ấy cúi rạp người.\nChống hai tay xuống sàn vòm kính,\nHachiroku cúi gập đầu xuống."
# 【ナビ】
# JP: 「雨……ですか？」
1621 = "「Trời mưa……sao?」"
# 【双鉄】
# JP: 「いや？」
1139 = "「Đâu có?」"
# (独白)
# JP: 雲ひとつ無い。\nなのに、なぜ、ナビともあろうものがそんな――っ！
2036 = "Trời không một gợn mây.\nVậy mà tại sao, một trí tuệ nhân tạo như\nNavi lại nói thế——A!"
# 【ハチロク】
# JP: 「けれど、わたくしがその事実を認めれば……\nわたくしは、姉妹全てを貶めることとなってしまいます」
1258 = "「Nhưng mà, nếu tôi thừa nhận sự thật đó……\nthì tôi sẽ làm nhục tất cả các chị em của\nmình mất.」"
# (独白)
# JP: 泣いている。\nまた、大粒の涙をぼろぼろこぼしている。
1977 = "Cô ấy đang khóc.\nNhững giọt nước mắt to tròn lại lã chã\ntuôn rơi."
# (独白)
# JP: 手をついたまま肩を震わせ、\nぬぐおうともせず、ただ、泣いている。
1911 = "Vẫn giữ nguyên tư thế chống tay, bờ vai\nrun rẩy,\nkhông buồn lau đi, cô ấy chỉ khóc."
# 【ハチロク】
# JP: 「ですから、たとえそれが人間の選択であろうとも――」
1395 = "「Vì vậy, cho dù đó là sự lựa chọn của con\nngười đi chăng nữa——」"
# 【双鉄】
# JP: 「無理に受け入れることはない。\n正しいと信じる必要もない」
1150 = "「Không cần phải miễn cưỡng chấp nhận đâu.\nCũng không cần phải tin đó là điều đúng\nđắn.」"
# 【ハチロク】
# JP: 「っ！？」
1274 = "「!?」"
# 【双鉄】
# JP: 「人間は間違った選択を、行動をしてしまう。\nそれは事実で、だから事故などが起きるのだ」
1174 = "「Con người sẽ đưa ra những lựa chọn, những\nhành động sai lầm.\nĐó là sự thật, và đó là lý do tai nạn xảy\nra.」"
# (独白)
# JP: 事故は起きる。\n物でなく、技術ではなく、それを運用する人間の責任で。
1807 = "Tai nạn vẫn xảy ra.\nKhông phải do đồ vật, không phải do công\nnghệ, mà là do trách nhiệm của con người\nvận hành chúng."
# (独白)
# JP: しかし、“責任”を、たとえ法が取らせたとして――\n憎しみは消えてはくれないし、傷が癒えてもくれはしない。
2005 = "Nhưng mà, cho dù pháp luật có bắt phải\nchịu \"trách nhiệm\" đi chăng nữa——\nthì lòng căm hận cũng không biến mất, vết\nthương cũng không lành lại."
# 【双鉄】
# JP: 「僕は、そのことをこの身を以て知っている。\nだから少しは、お前の憎しみにも共感できるように思う」
1617 = "「Tôi đã hiểu rõ điều đó bằng chính bản\nthân mình.\nNên tôi nghĩ mình có thể đồng cảm phần nào\nvới lòng căm hận của cô.」"
# 【ハチロク】
# JP: 「誤った選択を――\nそれに、巻き込まれたものの苦しみを――」
1296 = "「Sự lựa chọn sai lầm——\nVà nỗi đau của những kẻ bị cuốn vào đó——」"
# 【双鉄】
# JP: 「そうだ。その苦しみと――\nそれゆえの、ぶつけどころのない憎しみを」
1445 = "「Đúng vậy. Nỗi đau đó——\nVà lòng căm hận không biết trút vào đâu\nbắt nguồn từ đó.」"
# (独白)
# JP: ハチロクが顔を僕へと向ける。\n涙をふかずにそのまま向ける。
1836 = "Hachiroku ngẩng mặt lên nhìn tôi.\nVẫn để nguyên những giọt nước mắt chưa\nlau."
# 【ハチロク】
# JP: 「でしたら、どうか教えてください。\nわたくしは――この憎しみをどうすれば」
1418 = "「Nếu vậy, xin hãy chỉ cho tôi.\nTôi——phải làm sao với lòng căm hận này\nđây.」"
# 【双鉄】
# JP: 「憎むべきは、その決定に巻き込まれた自分の無力さだ。\n憎しみは故に、力をつけることによって[すす]雪ぐべきだ」
1370 = "「Điều đáng hận chính là sự bất lực của bản\nthân khi bị cuốn vào quyết định đó.\nVì vậy, lòng căm hận nên được gột rửa bằng\ncách trau dồi sức mạnh.」"
# (独白)
# JP: これも、教えてもらったこと。
2070 = "Điều này, cũng là do tôi được dạy."
# (独白)
# JP: 生きたまま腐っていく僕に、\n新しい根を与えてくれた、汰斗さんから。
2068 = "Từ ông Taito, người đã trao cho tôi một\ncội rễ mới\nkhi tôi đang dần mục nát lúc vẫn còn sống."
# 【ハチロク】
# JP: 「力をつける……\nしかし、今更そうしたところで」
1401 = "「Trau dồi sức mạnh……\nNhưng mà, giờ có làm vậy thì cũng...」"
# 【双鉄】
# JP: 「時は戻せん。\nしかし、次には巻き込まれずに済むかもしれん」
1463 = "「Thời gian không thể quay lại.\nNhưng, lần tới có thể cô sẽ không bị cuốn\nvào nữa.」"
# 【ハチロク】
# JP: 「次……ですか」
1135 = "「Lần tới……sao ạ.」"
# 【双鉄】
# JP: 「来るのだ。必ず。\n生きてさえいれば、否応なしに」
1133 = "「Sẽ đến thôi. Chắc chắn.\nChỉ cần còn sống, dù muốn hay không.」"
# (独白)
# JP: そのとき。誰かを救えるのなら。\n救えなかった路子の代わりに、誰か一人でも救えるのなら。
2035 = "Khi đó. Nếu có thể cứu được ai đó.\nThay cho Michiko mà tôi đã không thể cứu,\ndù chỉ là một người thôi."
# (独白)
# JP: その贖罪を果たすこと、そうするために生き抜くこと。\nそれこそ果たすべき最大の義務だと、僕は教えてもらった。
1996 = "Hoàn thành sự chuộc tội đó, sống sót để\nlàm điều đó.\nĐó mới là nghĩa vụ lớn nhất cần phải hoàn\nthành, tôi đã được dạy như vậy."
# 【双鉄】
# JP: 「無力を嘆くヒマがあるなら、力をつけるために動け。\n無力であった自分を憎み、ゆえに自らを鍛え抜け」
1572 = "「Nếu có thời gian than thở về sự bất lực,\nthì hãy hành động để trau dồi sức mạnh.\nHãy căm hận bản thân bất lực, và vì thế mà\nkhông ngừng rèn luyện chính mình.」"
# 【ハチロク】
# JP: 「次……は、来ますか？　わたくしのようなものにでも」
1532 = "「Lần tới……liệu có đến không ạ? Với một kẻ\nnhư tôi.」"
# 【双鉄】
# JP: 「お前がどのようなものであるのか、\n僕はまだほとんど知らん」
1192 = "「Cô là kẻ như thế nào,\ntôi vẫn chưa biết rõ lắm.」"
# 【ハチロク】
# JP: 「はい」
1144 = "「Vâng.」"
# 【双鉄】
# JP: 「が、僕は縁あり、お前のオーナーとなった。\nならば、僕は僕にできるかぎりを尽くそう」
2013 = "「Nhưng tôi có duyên, trở thành chủ sở hữu\ncủa cô.\nNếu vậy, tôi sẽ cố gắng làm hết sức mình.」"
# (独白)
# JP: 当然だ。\nそれこそ、僕の義務であるのだ。
1571 = "Đương nhiên rồi.\nĐó chính là nghĩa vụ của tôi."
# 【双鉄】
# JP: 「お前がそれを望むなら。\n僕は必ず、お前に“次”を迎えさせよう」
1660 = "「Nếu cô mong muốn điều đó.\nTôi chắc chắn sẽ giúp cô đón nhận \"lần\ntới\".」"
# 【ハチロク】
# JP: 「双鉄……様」
1913 = "「Ngài……Soutetsu.」"
# (独白)
# JP: また泣く。\n今度は笑いまで混ぜ、整った顔をぐしゃぐしゃにして。
1604 = "Lại khóc.\nLần này còn xen lẫn cả nụ cười, làm khuôn\nmặt thanh tú nhăn nhó hết cả."
# 【ハチロク】
# JP: 「体の調子までおかしいようです。\nわたくしは、自分一つさえ、今は制御できておりません」
2040 = "「Đến cả tình trạng cơ thể tôi dường như\ncũng kỳ lạ.\nBây giờ, tôi thậm chí không thể kiểm soát\nnổi chính mình nữa.」"
# 【双鉄】
# JP: 「そうか」
1803 = "「Vậy sao.」"
# (独白)
# JP: あの汰斗さんが、ガラスケースに“放置”していた。\n記憶の欠落。極端なほどの感情の振れ。
2125 = "Ông Taito đó, đã \"bỏ mặc\" cô ấy trong lồng\nkính.\nKý ức bị khuyết thiếu. Cảm xúc dao động\nđến mức cực đoan."
# (独白)
# JP: ――事実が想像を肉付けしていく。
1917 = "——Những sự thật đang dần đắp thịt thêm cho\ntrí tưởng tượng."
# (独白)
# JP: （あるいは、ならば……）
920 = "（Hoặc có lẽ, nếu vậy……）"
# (独白)
# JP: そうであるなら、直してやるが――\nハチロクは、ひどい故障品であるのかもしれない。
1995 = "Nếu đúng là vậy, tôi sẽ sửa chữa cho cô\nấy——\nNhưng có thể Hachiroku là một món đồ hỏng\nhóc nghiêm trọng."
# 【ハチロク】
# JP: 「“望む”ことなど、いまのわたくしには難しすぎます。\nですが――それでも……」
1593 = "「Việc \"mong muốn\" điều gì đó, đối với tôi\nbây giờ là quá khó.\nNhưng——dù vậy……」"
# (独白)
# JP: 涙に濡れた目が持ち上がる。\n瞳が、まっすぐ僕へと届く。
2117 = "Đôi mắt đẫm lệ ngước lên.\nÁnh nhìn truyền thẳng đến tôi."
# 【ハチロク】
# JP: 「双鉄様に教えていただいたそのとおり、少しでも……\n回復のため、わたくしは、力をつけて――」
1289 = "「Đúng như những gì ngài Soutetsu đã dạy,\ndù chỉ một chút……\nđể hồi phục, tôi sẽ trau dồi sức mạnh——」"
# (独白)
# JP: （ぐう～～っ）
1547 = "（Rột~~~）"
# 【双鉄】
# JP: 「それで良い。\nお前の体も『腹が減っては戦もできん』と言っている」
1798 = "「Vậy là tốt rồi.\nCơ thể cô cũng đang lên tiếng 『Có thực mới\nvực được đạo』 đấy.」"
# 【ハチロク】
# JP: 「左様ですね」
1832 = "「Đúng vậy nhỉ.」"
# (独白)
# JP: 照れず、まっすぐ答えを返す。\n悪くない。
1410 = "Không chút ngại ngùng, đáp lại thẳng thắn.\nKhông tồi."
# (独白)
# JP: 故障してなおハチロクは、\nあの頃の僕よりずっと強いらしい。
1309 = "Dù đang hỏng hóc, Hachiroku\ncó vẻ vẫn mạnh mẽ hơn tôi ngày ấy rất\nnhiều."
# 【双鉄】
# JP: 「なら利用しろ。\x%lエアクラ;#00ffc040;エアクラ%l;#;であれ、なんであれ。\n最も早い道を選んで、選択をできるようになれ」
1817 = "「Vậy thì hãy lợi dụng nó đi. Dù là \\x%lエアクラ;#00ffc040;Aircra%l;#;\nhay bất cứ thứ gì.\nHãy chọn con đường nhanh nhất, để bản thân\ncó khả năng đưa ra lựa chọn.」"
# 【ハチロク】
# JP: 「はい。かしこまりました双鉄様――\nっ！？　なにっ？　\x%l共感;#00ffc040;共感%l;#;っ！？」
2018 = "「Vâng. Tôi hiểu rồi thưa ngài Soutetsu——\n!? Gì cơ? \\x%l共感;#00ffc040;Cộng cảm%l;#;!?」"
# (独白)
# JP: ハチロクがビクリと背筋をたてる。
1194 = "Hachiroku giật mình thẳng lưng lên."
# (独白)
# JP: その目が頼りなげに動きまわって、\nやがて、キャノピーのセンターパネルに注がれる。
1252 = "Ánh mắt ấy dáo dác nhìn quanh vẻ bất lực,\ncuối cùng dán chặt vào bảng điều khiển\ntrung tâm của vòm kính."
# 【ハチロク】
# JP: 「あなた――ええと、\x%lエアクラ;#00ffc040;エアクラ%l;#;・ナビ？」
1287 = "「Cô——ừm, Navi \\x%lエアクラ;#00ffc040;Aircra%l;#;?」"
# 【ナビ】
# JP: 「ただナビと。それ以上の呼称は不要です」
896 = "「Cứ gọi là Navi. Không cần danh xưng nào\nkhác.」"
# 【ハチロク】
# JP: 「そう。そうだったのですね――\nナビ、あなたもまた、わたくしたちの……」
1919 = "「Ra vậy. Là vậy sao——\nNavi, cô cũng là……của chúng tôi……」"
# 【ナビ】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビは、エアロ＝クラフテック社の製品です。\n誰の妹でもありません」
2067 = "「Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; là sản phẩm của công ty\nAero-Craftech.\nKhông phải là em gái của ai cả.」"
# (独白)
# JP: 妹――
1228 = "Em gái——"
# (独白)
# JP: この場合は……後継機種、\nいや、技術の継承先というほどの意味であろうか。
1447 = "Trong trường hợp này……chắc mang ý nghĩa là\ndòng máy thế hệ sau,\nà không, là nơi kế thừa công nghệ thì đúng\nhơn."
# 【双鉄】
# JP: 「なるほどな。\nナビがハチロクに共感とやらを送ったか」
1680 = "「Ra là vậy.\nNavi đã gửi cộng cảm cho Hachiroku sao.」"
# 【ハチロク】
# JP: 「はい。わたくしは間違いなく受け取りました」
1501 = "「Vâng. Tôi chắc chắn đã nhận được.」"
# 【双鉄】
# JP: 「ナビ、いったい何と送った？」
1513 = "「Navi, rốt cuộc cô đã gửi gì vậy?」"
# 【ナビ】
# JP: 「特には。\n単に臨時の周辺情報を発信しただけです」
1351 = "「Không có gì đặc biệt.\nChỉ đơn thuần là phát đi thông tin xung\nquanh tạm thời thôi.」"
# 【双鉄】
# JP: 「では偶然に、\nそれをハチロクが傍受してしまったというわけか」
2133 = "「Vậy là tình cờ,\nHachiroku đã bắt được tín hiệu đó sao.」"
# 【ナビ】
# JP: 「事実群からは、そのように推測されます」
1546 = "「Từ các dữ kiện thực tế, có thể suy đoán\nnhư vậy.」"
# (独白)
# JP: 無愛想極まるナビの言葉に、\nハチロクはふと、唇の端をほころばせる。
1851 = "Nghe những lời vô cùng lạnh nhạt của Navi,\nHachiroku chợt nở một nụ cười mỉm."
# 【ハチロク】
# JP: 「確かに……ふふっ、とても有意な周辺情報を、\nわたくしは偶然、受け取りました」
1814 = "「Quả thực……fufu, tôi đã tình cờ nhận được,\nnhững thông tin xung quanh vô cùng hữu\ních.」"
# (独白)
# JP: いって、ハチロクの視線は下へと。\nいつの間に、高度がかなり落ちている。
1620 = "Nói rồi, Hachiroku đưa mắt nhìn xuống\ndưới.\nKhông biết từ lúc nào, độ cao đã giảm đi\nkhá nhiều."
# (独白)
# JP: はっきり見える銀色の線。二本が長く伸びている。\nハチロクの目に、強い喜びの光が宿る。
1276 = "Hai đường kẻ màu bạc hiện ra rõ nét. Kéo\ndài tít tắp.\nTrong mắt Hachiroku ánh lên niềm vui sướng\ntột độ."
# 【ハチロク】
# JP: 「鉄道は――この町ではまだ――\n生き延びてくれているのですね」
1250 = "「Đường sắt——ở thị trấn này vẫn——\nvẫn còn tồn tại nhỉ.」"
# 【双鉄】
# JP: 「ああ……そのようだな。\n僕がこの町を出たときには、青息吐息だったようだが」
2051 = "「Ừ……Có vẻ vậy.\nDù lúc tôi rời khỏi thị trấn này, nó đã\nthoi thóp lắm rồi.」"
# 【ハチロク】
# JP: 「生き延びているなら、次があります。\n――双鉄様のお言葉ですよ？」
1584 = "「Nếu vẫn còn tồn tại thì sẽ có lần tới.\n——Đây là lời của ngài Soutetsu đấy nhé?」"
# (独白)
# JP: 口調はいつもどおりだが、声は明らかに弾んでる。\n尻尾があったらぶんぶん振られているだろう。
1255 = "Giọng điệu vẫn như bình thường, nhưng nghe\nrõ sự rộn ràng.\nNếu có đuôi, chắc chắn cô ấy đang vẫy tít\nthò lò rồi."
# 【双鉄】
# JP: 「近くに降りて見てみるか？」
1253 = "「Có muốn xuống gần đó xem thử không?」"
# 【ハチロク】
# JP: 「できるのですか！？」
1155 = "「Có thể sao ạ!?」"
# 【双鉄】
# JP: 「出来る。ナビ」
2069 = "「Có thể chứ. Navi.」"
# 【ナビ】
# JP: 「了解しました。\n最適な着水地点を[サーチ,1]探査します」
1402 = "「Đã rõ.\nTiến hành thăm dò địa điểm hạ cánh trên\nmặt nước tối ưu nhất.」"
