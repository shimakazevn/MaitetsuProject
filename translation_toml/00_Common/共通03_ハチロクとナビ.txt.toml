# 共通03_ハチロクとナビ.txt 

[info]

[characters]
1769 = "Hachiroku"
1891 = "Soutetsu"
1762 = "Navi"

[character_subs]
1815 = "Hachiroku"
2100 = "Soutetsu"
2101 = "Soutetsu & Hachiroku"
2127 = "Ｎａｖｉ"

[script]
# 【ハチロク】
# JP: 「わたくし、このような景色は初めてです。\n町が、まるで積み木でつくられているように見えます」
1385 = "「E thẹn nói, đây là lần đầu tiên em được chiêm ngưỡng một khung cảnh như thế này đấy ạ. \nNhìn thị trấn cứ như thể được dựng nên từ những khối xếp hình vậy」"
# 【双鉄】
# JP: 「うむ」
1285 = "「Ừm」"
# (独白)
# JP: ナビは賢い。空気を読む。\nだから、沈黙を守ってくれている。
2030 = "Navi rất thông minh. Nó biết cách đọc bầu không khí. \nChính vì vậy, nó vẫn luôn giữ im lặng."
# (独白)
# JP: その沈黙に守られながら、\n機嫌よく、ハチロクは眼下を眺め続ける。
2028 = "Được bao bọc trong sự im lặng ấy, \nHachiroku vẫn vui vẻ tiếp tục dõi mắt ngắm nhìn xuống phía dưới chân mình."
# 【ハチロク】
# JP: 「あの見事なお屋根はなんでしょう？」
1628 = "「Mái nhà lộng lẫy đằng kia là gì thế ạ?」"
# 【双鉄】
# JP: 「赤井阿蘇神社だな。\n屋根だけでなく、[たたず]佇まい全般が美しい場所だ」
1460 = "「Đó là đền Akai Aso. \nKhông chỉ mái nhà đâu, mà toàn bộ dáng vẻ của nơi đó đều rất đẹp」"
# 【ハチロク】
# JP: 「あの森は？　\nひとつだけ、随分と小高いところにありますが」
1637 = "「Còn khu rừng kia thì sao ạ? \nCó duy nhất một chỗ trông khá là cao」"
# 【双鉄】
# JP: 「御一夜[じょうし,1]城址。あそこからも御一夜の町並みを見下ろせる。\n無論、ここからほどに広くは無理だが」
1435 = "「Tàn tích thành Hitoyoshi. Từ chỗ đó cũng có thể nhìn bao quát được dãy phố Hitoyoshi đấy. \nDù tất nhiên là không thể rộng mở được như từ nơi này rồi」"
# 【ハチロク】
# JP: 「左様ですね。ここは、お空の上ですものね」
1548 = "「Đúng là vậy nhỉ. Bởi vì nơi đây, chúng ta đang ở ngay trên bầu trời mà」"
# (独白)
# JP: ハチロクが短い両手を伸ばす。\nそれを翼に、より高くへと求めるように。
1826 = "Hachiroku dang rộng hai cánh tay ngắn của mình. \nNhư thể biến chúng thành đôi cánh, khao khát được bay cao hơn nữa."
# 【ハチロク】
# JP: 「飛行機には初めて乗りましたが、良いものです。\nきっと、鉄道の次に素敵な乗り物でしょうね、これは」
1659 = "「Đây là lần đầu tiên tôi được đi máy bay, cảm giác thật tuyệt. \nNó chắc chắn là phương tiện tuyệt vời thứ hai, chỉ sau đường sắt thôi nhỉ」"
# 【双鉄】
# JP: 「鉄道は、最高順位ということか？」
1648 = "「Ý cô đường sắt là số một tuyệt đối sao?」"
# 【ハチロク】
# JP: 「はい、もちろん。\nわたくしは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから」
1455 = "「Vâng, tất nhiên rồi ạ. \nVì tôi là một \\\\x%lレイルロオド;#00ffc040;Railord%l;#; mà」"
# 【双鉄】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か……確か、鉄道車両それぞれに、\n一体ずつついている物……で、よかったか？」
902 = "「\\\\x%lレイルロオド;#00ffc040;Railord%l;#; à... Nếu tôi nhớ không lầm thì, đó là thực thể \nđi kèm với từng toa xe đường sắt... có đúng không?」"
# (独白)
# JP: 素朴な疑問を伝えれば、\nハチロクはふふ、と満足そうな笑みを浮かべる。
2106 = "Khi tôi nói ra thắc mắc ngây ngô của mình, \nHachiroku khẽ mỉm cười một cách đầy mãn nguyện."
# 【ハチロク】
# JP: 「\x%l客車;#00ffc040;客車%l;#;にはついていません。機関車・\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;・[どうりょくしゃ,2]動力車など、\n自ら動く車両を、まずわたくしたちは制御します」
908 = "「\\\\x%l客車;#00ffc040;Toa hành khách%l;#; thì không có đâu ạ. Trước hết, chúng tôi sẽ điều khiển những toa xe tự di chuyển được như đầu máy, \\\\x%l気動車;#00ffc040;toa xe diesel%l;#;, hay \\\\x%l動力車;#00ffc040;toa xe động lực%l;#;」"
# 【双鉄】
# JP: 「制御。それは、運転制御ということか？」
1399 = "「Điều khiển. Ý cô là điều khiển vận hành sao?」"
# 【ハチロク】
# JP: 「それももちろん。駆動車両および\x%l列車;#00ffc040;列車%l;#;の制御は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\x%l機関士;#00ffc040;機関士%l;#;・\x%l運転士;#00ffc040;運転士%l;#;との共同で行います」
1638 = "「Điều đó là tất nhiên rồi ạ. Việc điều khiển các toa xe động lực cũng như \\\\x%l列車;#00ffc040;đoàn tàu%l;#; \nsẽ do \\\\x%lレイルロオド;#00ffc040;Railord%l;#; kết hợp cùng với \\\\x%l機関士;#00ffc040;tài xế đầu máy%l;#; hoặc \\\\x%l運転士;#00ffc040;lái tàu%l;#; thực hiện」"
# (独白)
# JP: 機関車を運転する人間が\x%l機関士;#00ffc040;機関士%l;#;。\nそれ以外の駆動車両を運転するのが\x%l運転士;#00ffc040;運転士%l;#;と教えてもらう。
2108 = "Tôi được giải thích rằng người vận hành đầu máy được gọi là \\\\x%l機関士;#00ffc040;tài xế đầu máy%l;#;. \nCòn người vận hành các toa xe động lực khác gọi là \\\\x%l運転士;#00ffc040;lái tàu%l;#;."
# (独白)
# JP: “鉄道”とひとくくりにしか思わなかったが、\n中身はどうして、なかなか複雑なものであるらしい。
1950 = "Trước đây tôi chỉ nghĩ đơn giản tất cả đều là \\\"đường sắt\\\", \nnhưng hóa ra mọi thứ bên trong lại khá là phức tạp."
# 【双鉄】
# JP: 「“まず”であり、“それも”であるなら。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、さらに広範に鉄道を制御するものか？」
1468 = "「Nếu cô bảo là \\\"trước hết\\\" và \\\"điều đó là tất nhiên\\\". \nThì phải chăng \\\\x%lレイルロオド;#00ffc040;Railord%l;#; còn điều khiển đường sắt ở một phạm vi rộng hơn nữa?」"
# 【ハチロク】
# JP: 「はい、そのとおりです双鉄様。わたくしたちは\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;を提案し、\x%l運転計画;#00ffc040;運転計画%l;#;をも制御します」
1450 = "「Vâng, hoàn toàn chính xác thưa cậu Soutetsu. Chúng tôi còn đề xuất cả \\\\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; \nvà quản lý cả \\\\x%l運転計画;#00ffc040;kế hoạch vận hành%l;#; nữa ạ」"
# (独白)
# JP: わからぬ言葉はひとまず置いて、\nわかる部分を確認していく。
2031 = "Tạm gác lại những từ ngữ chưa hiểu sang một bên, \ntôi tiếp tục xác nhận những phần mà mình có thể hiểu được."
# 【双鉄】
# JP: 「わたくし”たち”と繰り返しているが」
1187 = "「Cô vừa lặp lại từ \\\"chúng tôi\\\" phải không?」"
# 【ハチロク】
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、いうなれば全て姉妹。その全てが、\n相互に\x%l共感;#00ffc040;共感%l;#;通信を行うことができます」
901 = "「\\\\x%lRailord;#00ffc040;Railord%l;#; có thể nói đều là chị em với nhau. Tất cả họ đều có thể \n thực hiện giao tiếp \\\\x%lđồng cảm;#00ffc040;đồng cảm%l;#; lẫn nhau」"
# 【双鉄】
# JP: 「ふむ」
1268 = "「Hửm」"
# (独白)
# JP: \x%l共感;#00ffc040;共感%l;#;通信――ナビのような\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも有している、\nいや、その最重要といってもいいらしい機能だ。
60 = "Giao tiếp \\\\x%lđồng cảm;#00ffc040;đồng cảm%l;#;―― Đó là tính năng mà những \\\\x%lAircra;#00ffc040;Aircra%l;#; như Navi cũng sở hữu, \n không, đúng hơn đó dường như là chức năng quan trọng nhất của họ."
# 【双鉄】
# JP: 「その個体が得たさまざまな情報をリアルタイムに共有し、\n集合最適処理する仕組み――でよかったか？」
1256 = "「Đó là cơ chế chia sẻ theo thời gian thực nhiều loại thông tin mà cá thể đó thu thập được, \n rồi xử lý tối ưu hóa tập hợp―― Giải thích như vậy có đúng không?」"
# 【ハチロク】
# JP: 「おくわしいのですね、双鉄様。\nそのご解釈は、ほぼ実際と合致しております」
1665 = "「Ngài thật am hiểu, thưa ngài Soutetsu. \n Cách hiểu đó của ngài gần như hoàn toàn khớp với thực tế ạ」"
# (独白)
# JP: うれしげなハチロク。\nナビから教わったことだとは言いがたくなる。
2107 = "Hachiroku tỏ vẻ vui mừng. \n Điều này khiến tôi khó lòng nói ra rằng đó là những gì mình được Navi chỉ cho."
# 【ハチロク】
# JP: 「ですのでわたくしたちは、運転支障発生時でも、\n臨時ダイアを極めて短時間で作成、提案可能となります」
1393 = "「Chính vì vậy, ngay cả khi có sự cố vận hành xảy ra, chúng em vẫn có thể \n lập và đề xuất một lịch trình tạm thời trong thời gian cực kỳ ngắn ạ」"
# 【双鉄】
# JP: 「支障を回復するための最善策を短期間に取りうる、\nということか？」
1152 = "「Nghĩa là có thể đưa ra phương án tốt nhất để khắc phục sự cố trong thời gian ngắn nhất sao?」"
# 【ハチロク】
# JP: 「はい、左様です」
1452 = "「Vâng, đúng là như vậy ạ」"
# (独白)
# JP: ならば、ハチロクたちの\x%l共感;#00ffc040;共感%l;#;通信の運用法と、\nナビたち、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの機能との根幹は同じなのだろう。
2071 = "Nếu thế thì, phương thức vận hành giao tiếp \\\\x%lđồng cảm;#00ffc040;đồng cảm%l;#; của nhóm Hachiroku \n và cốt lõi chức năng của nhóm Navi, tức \\\\x%lAircra;#00ffc040;Aircra%l;#; Navi, là giống nhau rồi."
# (独白)
# JP: （地上からエンジン自動車が駆逐され、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;自動車に取って代わられた最大の理由、か――）
2121 = "（Lý do lớn nhất khiến xe ô tô chạy động cơ đốt trong bị quét sạch khỏi mặt đất, \n và bị thay thế hoàn toàn bởi ô tô \\\\x%lAircra;#00ffc040;Aircra%l;#; là đây sao――）"
# (独白)
# JP: \x%l共感;#00ffc040;共感%l;#;通信による事故情報と迂回ルートの共用。\nそして、ナビによるオートパイロット。
2075 = "Chia sẻ thông tin tai nạn và lộ trình đường vòng thông qua giao tiếp \\\\x%lđồng cảm;#00ffc040;đồng cảm%l;#;. \n Và tính năng tự động lái của Navi."
# (独白)
# JP: それらは渋滞という現象をほぼ根絶し、\n車移動による所要時間を確定可能なものへと変えた。
1903 = "Những điều đó gần như đã xóa sổ hiện tượng ùn tắc giao thông, \n biến thời gian di chuyển bằng xe hơi thành một đại lượng có thể xác định chính xác."
# 【双鉄】
# JP: 「……\x%l共感;#00ffc040;共感%l;#;通信とは便利なものだな」
927 = "「…… Giao tiếp \\\\x%lđồng cảm;#00ffc040;đồng cảm%l;#; quả là một thứ tiện lợi thật đấy」"
# (独白)
# JP: 言えば大きく。\nとても誇らしげにハチロクが頷く。
2052 = "Khi tôi vừa dứt lời, Hachiroku gật đầu cái rụp. \n Trông cô ấy tràn đầy vẻ tự hào."
# 【ハチロク】
# JP: 「はい。ですのでわたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n運行とダイアの全てを把握し、制御できたのです」
1440 = "「Vâng. Chính vì vậy mà \\\\x%lRailord;#00ffc040;Railord%l;#; như chúng em mới \ncó thể nắm bắt và kiểm soát được toàn bộ hoạt động cũng như lịch trình」"
# 【双鉄】
# JP: 「ゆえに、[ろおど,3]Lordか。支配者か」
1386 = "「Thế nên mới gọi là Lord sao. Kẻ thống trị à」"
# 【ハチロク】
# JP: 「いいえ、双鉄様。レイルも車両も、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。\n全てを支配する者でしたら、それは双鉄様たち人間です」
1670 = "「Không đâu, cậu Soutetsu. Cả đường ray, toa tàu, và cả \\\\x%lRailord;#00ffc040;Railord%l;#; nữa. \nNếu nói đến kẻ thống trị tất cả, thì đó chính là con người như các cậu ạ」"
# (独白)
# JP: ごく当然、と。\nよどみも力みも無い言葉。
2014 = "Một lời khẳng định hết sức hiển nhiên. \nKhông chút ngập ngừng, cũng chẳng hề khiên cưỡng."
# (独白)
# JP: ハチロクの小さな手には不似合いなほど長い指が、\n空中に、すらすらと――Roadの文字をかいていく。
1824 = "Những ngón chân thuôn dài không mấy tương xứng với bàn tay nhỏ nhắn của Hachiroku, \nđang uyển chuyển vẽ vào không trung――từng nét chữ \\\"Road\\\"."
# 【ハチロク】
# JP: 「わたくしたちの把握と制御は、その道筋をつけるため。\nわたくしたちは線路と同じ、RailRoadにすぎません」
1374 = "「Sự nắm bắt và kiểm soát của chúng em là để vạch ra lộ trình đó. \nChúng em cũng giống như đường ray vậy, chỉ đơn thuần là một phần của RailRoad mà thôi」"
# 【双鉄】
# JP: 「なるほどな」
1227 = "「Ra là vậy」"
# (独白)
# JP: 強い誇りが、揺るがぬものが、言葉の端々に満ちている。
1932 = "Một niềm tự hào mãnh liệt, một ý chí kiên định không chút lay chuyển, ngập tràn trong từng câu chữ của cô ấy."
# (独白)
# JP: 現実の交通事情がどうありどう変化しようとも、\n鉄道こそは、ハチロクの変わらぬ“最高”なのだと。
2000 = "Dẫu cho tình hình giao thông thực tế có ra sao hay thay đổi thế nào đi chăng nữa, \nđối với Hachiroku, đường sắt vẫn mãi là điều \\\"tuyệt vời nhất\\\" không bao giờ đổi thay."
# 【双鉄】
# JP: 「そこまでハチロクが誇るものなら。お前の制御する……\n駆動車両、か？　それに、僕も乗りたいものだ」
1416 = "「Nếu đó là điều khiến Hachiroku tự hào đến thế. Thì đầu máy cỗ xe…… \nà không, đầu máy động lực do em kiểm soát nhỉ? Tôi cũng muốn được lên thử một lần」"
# 【ハチロク】
# JP: 「それは……いつか。\nその……いつか、きっと――かなうものなら」
1618 = "「Chuyện đó…… một ngày nào đó. \nÀ thì…… một ngày nào đó, nhất định――nếu ước nguyện thành hiện thực」"
# 【双鉄】
# JP: 「ふむ？」
1269 = "「Hửm?」"
# (独白)
# JP: いきなり歯切れが悪くなる。\nしばらく待つ。続く沈黙。
1914 = "Cô ấy bỗng trở nên ngập ngừng. \nĐợi một lúc. Không gian lại rơi vào im lặng."
# (独白)
# JP: ならば――と話を、\n先送りした疑問点へと巻き戻す。
1971 = "Nếu đã vậy――mình đành quay trở lại \nvới câu hỏi đã tạm gác lại lúc trước."
# 【双鉄】
# JP: 「鉄道用語なのだろうが、\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;だの臨時ダイアだのとは、なんだ？」
1217 = "「Dù biết đây là thuật ngữ ngành đường sắt, \nnhưng \\\\x%lbiểu đồ chạy tàu;#00ffc040;biểu đồ chạy tàu%l;#; hay lịch trình tạm thời nghĩa là gì thế?」"
# (独白)
# JP: ほっと、安堵したような息。
1811 = "Một tiếng thở phào như thể đã trút được gánh nặng."
# (独白)
# JP: そして再びハチロクの言葉は、\n立板に水と流れだす。
2095 = "Và rồi những lời của Hachiroku lại bắt đầu tuôn trào trôi chảy như nước chảy xuôi dòng."
# 【ハチロク】
# JP: 「\x%l列車;#00ffc040;列車%l;#;の運行計画のことです。適正な\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;は、\n事故を防止し、運転効率を向上させます」
1436 = "「Là về kế hoạch vận hành của \\\\x%l列車;#00ffc040;tàu%l;#;. Một \\\\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; hợp lý sẽ giúp phòng ngừa tai nạn và nâng cao hiệu suất vận hành」"
# 【双鉄】
# JP: 「事故の防止、か――」
1654 = "「Phòng ngừa tai nạn, sao――」"
# (独白)
# JP: けれども、それが引っかかる。
1937 = "Thế nhưng, điều đó lại khiến tôi vướng bận."
# (独白)
# JP: “だったらなんで”と、過去が泣き……\n無為なこととはわかっていても、尋ねてしまう。
877 = "\\\"Nếu vậy thì tại sao chứ\\\", quá khứ như đang gào khóc... dù biết là vô nghĩa, tôi vẫn cất tiếng hỏi."
# 【双鉄】
# JP: 「では、事故を起こす\x%l列車;#00ffc040;列車%l;#;は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に制御されていないものなのか？」
1624 = "「Vậy thì, những \\\\x%l列車;#00ffc040;tàu%l;#; xảy ra tai nạn là do không được kiểm soát bởi \\\\x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# 【ハチロク】
# JP: 「いえ――」
1136 = "「Dạ không――」"
# (独白)
# JP: ハチロクの顔が苦しげに歪む。\n声から温度が抜け落ちる。
1849 = "Khuôn mặt Hachiroku méo mó đầy đau đớn. Thơi ấm dần tan biến khỏi giọng nói của cô ấy."
# 【ハチロク】
# JP: 「……例えば、線路にされた置き石を、わたくし達は\n画像センサ――いわば目視でしか発見できません」
938 = "「...Ví dụ như, với những viên đá bị đặt trên đường ray, chúng em chỉ có thể phát hiện bằng cảm biến hình ảnh――nói cách khác là chỉ bằng mắt thường thôi ạ」"
# 【双鉄】
# JP: 「目視でしか？　それでは人間と」
1247 = "「Chỉ bằng mắt thường thôi ư? Thế thì so với con người」"
# 【ハチロク】
# JP: 「大差ありません。ので、置き石に気付いたときには、\nもう\x%lブレーキ;#00ffc040;ブレーキ%l;#;が間に合わないことがほとんどです」
1148 = "「Cũng không khác biệt là bao. Thế nên, khi nhận ra có đá đặt trên ray thì hầu như lúc đó đã không còn kịp \\\\x%lブレーキ;#00ffc040;phanh%l;#; nữa rồi ạ」"
# 【双鉄】
# JP: 「なるほど。線路におきた障害に対しては、\n都度での対処しかできない、というわけか」
1226 = "「Ra là vậy. Đối với các chướng ngại vật trên đường ray, ta chỉ có thể xử lý tình huống phát sinh vào mỗi lần gặp phải thôi sao」"
# 【ハチロク】
# JP: 「そのとおりです。双鉄様」
1492 = "「Đúng là như vậy thưa Sư phụ Soutetsu」"
# (独白)
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も万能ではない。\n無論、\x%l共感;#00ffc040;共感%l;#;通信も、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも。
56 = "\\\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không phải là vạn năng. Tất nhiên, cả truyền thông \\\\x%l共感;#00ffc040;Thấu cảm%l;#; hay định vị \\\\x%lエアクラ;#00ffc040;Aircra%l;#; cũng vậy."
# (独白)
# JP: ゆえに、どれほど技術が発展しようと事故は絶えない。\n無論、事故の真なる原因は、技術などには無いのだが。
1960 = "Vì vậy, dù công nghệ có phát triển đến đâu thì tai nạn vẫn không bao giờ dứt. \nDĩ nhiên, nguyên nhân thực sự của tai nạn không phải nằm ở công nghệ."
# 【ハチロク】
# JP: 「そうした事態を防止するため、\n\x%l保線;#00ffc040;[ほせんがかり,2]保線係%l;#;という職員達が線路の管理をしていましたが……」
1493 = "「Để ngăn ngừa những sự cố như vậy, \n\\\\x%l保線;#00ffc040;nhân viên bảo trì đường sắt%l;#; đã chịu trách nhiệm quản lý các tuyến đường ray... Nhưng...」"
# (独白)
# JP: 無理に、絞り出したような声。
1839 = "Một giọng nói cất lên đầy gượng ép, như phải cố vắt kiệt sức lực."
# 【ハチロク】
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、\x%l保線;#00ffc040;保線%l;#;係の不足も甚だしい物となりました。\nあの時期、鉄道事故が多発した一因は、それです」
912 = "「Vào thời kỳ cuối của \\\\x%l帝鉄;#00ffc040;Đế Thiết%l;#;, tình trạng thiếu hụt nhân viên \\\\x%l保線;#00ffc040;bảo trì%l;#; đã trở nên cực kỳ nghiêm trọng. \nĐó chính là một trong những nguyên nhân khiến tai nạn đường sắt xảy ra liên tiếp trong thời gian đó」"
# 【双鉄】
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期……」
911 = "「Thời kỳ cuối của \\\\x%l帝鉄;#00ffc040;Đế Thiết%l;#;...」"
# (独白)
# JP: 僕が少年だったころ。\nあの事故のころ。
1953 = "Khi tôi còn là một cậu bé. \nKhoảng thời gian xảy ra tai nạn năm ấy."
# (独白)
# JP: その時代は、後に、\nひどく簡潔に呼称されるようになった。
2080 = "Thời đại đó, về sau này, \nđược gọi bằng một cái tên vô cùng ngắn gọn."
# 【双鉄】(双鉄・ハチロク)
# JP: 「[だいはいせん,2]大廃線時代」
1304 = "「Thời đại Đại Phế Tuyến」"
# (独白)
# JP: ハチロクと僕の声が重なる。
1828 = "Giọng của Hachiroku và tôi đồng thanh vang lên."
# (独白)
# JP: それが支えになったわけでもあるまいが、\nハチロクは、落としていた視線を持ち上げ直す。
2098 = "Điều đó có lẽ chẳng phải là chỗ dựa gì lớn lao, \nnhưng Hachiroku đã ngước ánh nhìn vốn đang trĩu xuống lên lại."
# 【ハチロク】
# JP: 「皮肉なことに。わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がその真価を\nフルに発揮したのも、あの時代でした」
1518 = "「Thật trớ trêu thay. Khoảng thời gian mà các \\\\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em phát huy \nđược tối đa giá trị thực sự của mình lại chính là thời đại đó」"
# 【双鉄】
# JP: 「……事故が多発したせいか？\n臨時ダイア、とやらが必要になったから？」
937 = "「...Có phải là vì tai nạn xảy ra liên miên không? \nNên mới cần đến những thứ gọi là lịch trình tạm thời?」"
# 【ハチロク】
# JP: 「ご明察です、双鉄様。\nしかし――やがて…………」
1663 = "「Anh quả là sáng suốt, ngài Soutetsu. \nThế nhưng―― chẳng mấy chốc............」"
# (独白)
# JP: ハチロクの声が途切れてしまう。\n事故の多発、路線廃止、\x%l列車;#00ffc040;列車%l;#;の廃棄――
1856 = "Giọng của Hachiroku chợt nghẹn lại. \nTai nạn xảy ra liên tiếp, các tuyến đường bị xóa bỏ, những chuyến \\\\x%l列車;#00ffc040;tàu%l;#; bị dỡ bỏ――"
# (独白)
# JP: 大廃線時代の終焉は、\nそのまま、鉄道の時代の終焉を意味するがゆえ。
1907 = "Bởi lẽ sự kết thúc của thời đại Đại Phế Tuyến \ncũng đồng nghĩa với sự lụi tàn của kỷ nguyên đường sắt."
# 【ハチロク】
# JP: 「わたくしが汰斗様に買い取られたのも、その時期です」
1383 = "「Đó cũng chính là khoảng thời gian mà tôi được ngài Taito mua lại.」"
# (独白)
# JP: ハチロクの目が、もう一度、キャノピーの外に向けられる。
1844 = "Ánh mắt của Hachiroku một lần nữa hướng ra ngoài mái vòm kính."
# (独白)
# JP: 暗い目だ。\n見ていると、こちらまで引かれそうになる。
1975 = "Đó là một đôi mắt u ám. \nNhìn vào nó, cảm giác như chính bản thân cũng sắp bị hút vào."
# 【ハチロク】
# JP: 「しかし、わたくしにはその時期の記憶がありません。\nこの美しい町を見たかどうかさえ、覚えていないのです」
1523 = "「Nhưng tôi lại không có ký ức gì về khoảng thời gian đó cả. \nNgay cả việc liệu mình đã từng nhìn ngắm thị trấn xinh đẹp này hay chưa, tôi cũng không nhớ nữa.」"
# 【双鉄】
# JP: 「見ていないだろう。ここからは」
1565 = "「Chắc là chưa nhìn thấy đâu. Nếu là từ góc nhìn này.」"
# (独白)
# JP: 事実の指摘。軽く明るく。
1957 = "Một lời chỉ ra sự thật. Nhẹ nhàng và tươi tỉnh."
# (独白)
# JP: そして指差し、ハチロクの視点を前へと向ける。\nよどみの全てを、空へと飛ばしてしまえるように。
2097 = "Rồi tôi chỉ tay, hướng tầm mắt của Hachiroku về phía trước. \nNhư thể muốn thổi bay tất cả những gì đang ứ đọng vào khoảng không vũ trụ."
# 【双鉄】
# JP: 「歩いて見る御一夜の町は、また別の顔だ。\n歩くうち、あるいは見覚えに出くわすかもしれん」
1506 = "「Thị trấn Ohitoyo khi đi dạo ngắm nhìn sẽ mang một bộ mặt hoàn toàn khác. \nBiết đâu trong lúc đi bách bộ, em lại bắt gặp một hình ảnh quen thuộc nào đó thì sao.」"
# 【ハチロク】
# JP: 「そう……ですね。\nはい。双鉄様のおっしゃるとおりと思います」
1591 = "「Đúng…… vậy nhỉ. \nVâng. Tôi nghĩ đúng như những gì ngài Soutetsu nói.」"
# (独白)
# JP: うん、と頷き。\n持ち上げ直した顔には表情が戻っている。
1869 = "Ừm, cô ấy gật đầu. \nKhi ngẩng mặt lên, những biểu cảm đã quay trở lại trên gương mặt."
# (独白)
# JP: “無理に浮かべた”。そう思わせる笑顔に逆に、\n普段のハチロクがどれほど自然に笑うかを知る。
872 = "Một nụ cười khiến người ta nghĩ là “cố gượng lên”. Nhưng chính nó ngược lại \nlại làm tôi nhận ra ngày thường Hachiroku mỉm cười tự nhiên đến nhường nào."
# 【ハチロク】
# JP: 「それにしても、\n双鉄さまは少しお人が悪いですね」
1586 = "「Mà kể ra thì, \nngài Soutetsu cũng có chút xấu tính đấy nhé.」"
# 【双鉄】
# JP: 「僕がか？」
1376 = "「Tôi á?」"
# 【ハチロク】
# JP: 「だって……\nよりにもよって\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗せるだなんておっしゃって」
1421 = "「Thì bởi vì…… \nngài lại bảo muốn để tôi lên chiếc\\\\x%lエアクラ;#00ffc040;máy bay%l;#; này, trong số bao nhiêu lựa chọn khác cơ chứ.」"
# 【双鉄】
# JP: 「ああ」
1272 = "「À」"
# (独白)
# JP: なるほど。
1885 = "Hóa ra là vậy."
# (独白)
# JP: なにより深く鉄道を愛し、誇るそれ故――\nハチロクは、こうまで\x%lエアクラ;#00ffc040;エアクラ%l;#;を嫌うのか。
1941 = "Chính vì yêu thương và tự hào sâu sắc về đường sắt hơn bất kỳ điều gì— \nNên Hachiroku mới ghét \\\\x%lエアクラ;#00ffc040;máy bay%l;#; đến mức này sao."
# 【ハチロク】
# JP: 「飛行機なら飛行機と最初からおっしゃってくだされば。\nわたくしもお見苦しいところを見せずにすみましたのに」
1581 = "「Nếu ngay từ đầu ngài nói đó là máy bay, \nthì tôi đã không để lộ ra bộ dạng thảm hại thế này rồi」"
# 【双鉄】
# JP: 「確かにな」
1201 = "「Cũng đúng thật」"
# (独白)
# JP: ハチロクの指摘は正しい。\n今の僕は、人が悪い。
1833 = "Lời Hachiroku chỉ ra không sai. \nTôi của lúc này thật là xấu tính."
# (独白)
# JP: ナビと無言の共謀をした沈黙で、\nハチロクのことを騙している。
1901 = "Sự im lặng như một sự đồng lõa không lời với Navi \nđã lừa dối Hachiroku."
# 【双鉄】
# JP: 「人が悪いのも仕方ないのだ。\nなにせ僕は、御一夜市の生まれではない」
1200 = "「Tôi có xấu tính cũng là chuyện bất khả kháng thôi. \nBởi suy cho cùng, tôi đâu phải sinh ra ở thành phố Ohitoyo」"
# 【ハチロク】
# JP: 「そうなのですか？」
1536 = "「Vậy sao ạ?」"
# 【双鉄】
# JP: 「うむ。そうなのだ」
1502 = "「Ừm. Đúng vậy đấy」"
# (独白)
# JP: 答えれば、ハチロクはくす、と小さく笑う。
2032 = "Nghe câu trả lời, Hachiroku khẽ bật cười khúc khích."
# 【ハチロク】
# JP: 「ならわたくしは、\n双鉄様のお人の悪さに感謝しなくてはいけませんね？」
1635 = "「Vậy thì tôi phải cảm ơn \nsự xấu tính đó của Soutetsu-sama rồi nhỉ?」"
# 【双鉄】
# JP: 「感謝？　なぜだ」
1365 = "「Cảm ơn? Tại sao chứ」"
# 【ハチロク】
# JP: 「最初から飛行機と聞いていたなら、わたくしきっと、\n慣れている風を装って、きょろきょろ出来ませんでした」
1580 = "「Vì nếu ngay từ đầu biết đó là máy bay, hẳn tôi sẽ cố tỏ ra \nnhư thể mình đã quen thuộc, và chẳng thể nhìn ngó xung quanh một cách tò mò thế này được đâu」"
# (独白)
# JP: 言って、ハチロクはあどけなく、\n身を乗り出してまた眼下を見る。
1830 = "Nói rồi, Hachiroku rướn người nhìn xuống bên dưới một cách ngây thơ."
# 【ハチロク】
# JP: 「川も豊かで見事です。\nあの水を、先ほどわたくしはいただいたのでしょうか？」
1619 = "「Dòng sông cũng thật trù phú và tuyệt đẹp. \nCó phải dòng nước khi nãy tôi được dùng là từ đó không ạ?」"
# 【双鉄】
# JP: 「うむ。クマ川の水だ。もっとも、酒造りに使うのは\nもっと上流――源流に近いところの水だそうだが」
1280 = "「Ừm. Là nước sông Kuma. Nhưng nghe nói nước dùng để ủ rượu là \nở tận phía thượng nguồn――nơi gần với đầu nguồn hơn cơ」"
# 【ハチロク】
# JP: 「素晴らしいですね。いつか、機会があれば、\nこの素晴らしい川の源を眺めてみたいものです」
1534 = "「Tuyệt vời thật đấy ạ. Nếu có cơ hội, nhất định \nem muốn một lần được ngắm nhìn nơi khởi nguồn của con sông tuyệt đẹp này」"
# (独白)
# JP: 驚いた。\n気持ちが、そのまま口からこぼれる。
1951 = "Thật bất ngờ. \nNhững gì tôi nghĩ bỗng tự nhiên thốt ra thành lời."
# 【双鉄】
# JP: 「同じことを思うのだな、僕と」
1262 = "「Cô cũng có cùng suy nghĩ với tôi sao」"
# 【ハチロク】
# JP: 「双鉄様も？」
1662 = "「Cả Soutetsu-sama cũng vậy ạ?」"
# 【双鉄】
# JP: 「うむ。ここに引き取られてすぐのことだがな」
1284 = "「Ừm. Là chuyện ngay sau khi tôi được nhận nuôi và đưa về đây」"
# 【ハチロク】
# JP: 「引き取られて……ですか？」
1407 = "「Được nhận nuôi…… ạ?」"
# 【双鉄】
# JP: 「ああ。僕は右田の養子なのだ」
1282 = "「Phải. Tôi là con nuôi của nhà Migita」"
# (独白)
# JP: 隠していても仕方がない。\nが、ハチロクは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1985 = "Cũng chẳng có lý do gì để giấu giếm. \nThế nhưng, Hachiroku lại là một \\\\x%lレイルロオド;#00ffc040;Railord%l;#;."
# (独白)
# JP: 気をつかわれてはわずらわしいので、\n鉄道事故、という一点のみは語らずにおく。
1948 = "Để tránh làm cô ấy phải bận tâm một cách phiền toái, nên \ntôi giữ lại chuyện vụ tai nạn đường sắt, duy chỉ điểm này là không kể ra."
# 【双鉄】
# JP: 「僕は事故で家族の全てを失くし、右田家に――\n汰斗さんに引き取られ、その[ようそん,1]養孫となった」
1378 = "「Tôi đã mất đi toàn bộ gia đình trong một vụ tai nạn, rồi được nhà Migita―― \nđược ông Daito nhận nuôi, trở thành cháu nuôi của ông」"
# 【ハチロク】
# JP: 「汰斗様に……双鉄様も。\nっ！　だから名前の話のときに、日々姫様は」
1661 = "「Được Daito-sama…… cả Soutetsu-sama cũng vậy sao. \nAh! Chính vì thế mà khi nói chuyện về cái tên, Hibiki-sama mới」"
# 【双鉄】
# JP: 「あれは、僕が養子だという話を嫌うのだ。\n僕は気にせんのだが……覚えておいてもらえば助かる」
1633 = "「Con bé không thích nghe chuyện tôi là con nuôi đâu. \nTôi thì chẳng để tâm mấy…… nhưng nếu cô nhớ giùm cho thì tốt quá」"
# (独白)
# JP: 軽く。ハチロクは瞳を伏せる。
1852 = "Khẽ khàng, Hachiroku cụp hàng mi xuống."
# 【ハチロク】
# JP: 「はい。以降は間違いなく。\n知らぬこととはいえ、失礼しました」
1306 = "「Vâng. Từ nay về sau em nhất định sẽ lưu ý. \nDù là do không biết, nhưng em đã thật thất lễ rồi」"
# 【双鉄】
# JP: 「なに、知らぬがゆえの失礼なら僕もした。\nそうだ。これでおあいこということにならんか？」
1265 = "「Có sao đâu, nếu là thất lễ do vô tri thì bản thân ta cũng phạm phải rồi. \nĐúng thế. Như vậy không phải là huề nhau rồi sao?」"
# (独白)
# JP: 伏せた瞳がもちあがる。\nいたずらそうな光が宿る。
1850 = "Đôi mắt đang cụp xuống ngước lên. \nMột tia sáng tinh nghịch thoáng hiện."
# 【ハチロク】
# JP: 「うふふ。左様でした。お人の悪い双鉄様に――\nわたくし、寝込みを襲われ脱がされてしまいましたね」
1291 = "「Ư hừ hừ. Đúng là như vậy ạ. Đối với một Soutetsu-sama có chút xấu bụng―― \nThì lúc đang ngủ say, với lại còn bị lột đồ ra nữa chứ」"
# 【双鉄】
# JP: 「おいおい、人聞きの悪いことを」
1278 = "「Này này, nghe tai tiếng quá đấy」"
# 【ハチロク】
# JP: 「お空ですよ？　双鉄様。\n飛ぶ鳥は、わたくしたちの声などきっと聞きません」
1373 = "「Là bầu trời đấy ạ? Soutetsu-sama. \nNhững chú chim đang bay nhất định sẽ không nghe thấy tiếng của chúng ta đâu」"
# 【双鉄】
# JP: 「うー……む」
1270 = "「Ừm……m」"
# (独白)
# JP: それはそうだが、ナビが聞いてる。\n妙な誤解をしないでくれればいいのだが。
2050 = "Đúng là vậy thật, nhưng Navi đang nghe mà. \nHi vọng cô ấy không hiểu lầm một cách kỳ quặc."
# 【ハチロク】
# JP: 「ご安心ください？　双鉄様。わたくし、もう少しも、\n怒っても、不愉快と思ってもおりません」
1362 = "「Xin ngài cứ yên tâm được không ạ? Soutetsu-sama. Bản thân ta không hề \ntức giận, cũng chẳng cảm thấy khó chịu một chút nào cả」"
# 【双鉄】
# JP: 「そうなのか」
1433 = "「Thế à」"
# (独白)
# JP: そうなのだろうなと納得させてくれるほど、\nハチロクの表情は幸せそうだ。
1867 = "Biểu cảm của Hachiroku hạnh phúc đến độ khiến tôi hoàn toàn tin là như vậy."
# (独白)
# JP: 切り替えの早さは物であるからなのかもしれんが――\nあるいは性格的に、僕と似ているのかもしれん。
1943 = "Chuyển biến tâm trạng nhanh chóng thế này có lẽ là vì cô ấy là một món đồ―― \nHoặc giả là xét về tính cách, cô ấy có điểm giống với tôi."
# 【ハチロク】
# JP: 「ですが、まだおあいこにはできません」
1145 = "「Thế nhưng, vẫn chưa thể tính là huề nhau được đâu ạ」"
# 【双鉄】
# JP: 「なぜだ？　怒ってないのなら――」
1507 = "「Tại sao chứ? Nếu cô đã không giận thì――」"
# 【ハチロク】
# JP: 「怒ってないから、むしろです。\n平手打ちを余分にひとつ。わたくしは双鉄様に」
1318 = "「Chính vì không giận nên mới thế đấy ạ. \nDư ra một cái tát tay. Ta đối với Soutetsu-sama」"
# 【双鉄】
# JP: 「なるほど。よかろう」
1225 = "「Ra là vậy. Được thôi」"
# (独白)
# JP: （ピンっ！）
2118 = "（Búng!）"
# 【ハチロク】
# JP: 「あ」
1271 = "「Á」"
# (独白)
# JP: おでこを軽く、指先でつつく。\nわずかな痛みも与えぬ弱さで。
1955 = "Tôi khẽ gõ ngón tay vào trán cô ấy. \nMột lực nhẹ nhàng đến mức không hề gây ra chút đau đớn nào."
# 【双鉄】
# JP: 「体格差を加味すればこんなところだろう。\nいいな？　ハチロク、これで手打ちだ」
1678 = "「Xét đến sự chênh lệch thể hình thì thế này là vừa rồi. \nĐược chứ? Hachiroku, huề nhau nhé」"
# 【ハチロク】
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1380 = "「Em hiểu rồi, thưa Sư phụ Soutetsu. \nChúng ta huề nhau, coi như hòa, không ai nợ ai nữa ạ」"
# (独白)
# JP: 話が早い。\nやはり、性格的に似ているのかも――ああ、いや。
1924 = "Thật nhanh gọn. \nĐúng là tính cách của hai chúng tôi có phần nào đó giống nhau thật——À, không."
# 【双鉄】
# JP: 「ハチロクも汰斗さんに買い取られたと言っていたな。\nならば僕たちは、似たもの同士なのかもしれん」
1209 = "「Hachiroku cũng bảo là được bác Taito mua lại đúng không. \nVậy thì có lẽ, chúng ta là những người cùng cảnh ngộ đấy」"
# 【ハチロク】
# JP: 「本当にそうかもしれませんね。\n双鉄様も、この川の源に興味がおありとのことですし」
1589 = "「Thực sự có lẽ là như vậy ạ. \nCả Sư phụ Soutetsu cũng có hứng thú với thượng nguồn của dòng sông này nữa mà」"
# 【双鉄】
# JP: 「興味をもって、実際歩いた。\n無論、子供の足で[さかのぼ]遡りきれるものではなかったが」
1138 = "「Có hứng thú, và thực tế là tôi đã đi bộ dọc theo nó. \nDù tất nhiên, bước chân của một đứa trẻ thì chẳng thể nào đi ngược dòng lên tới tận cùng được」"
# 【ハチロク】
# JP: 「歩いて！？　遡られたのですか、この川を」
1346 = "「Đi bộ ạ!? Ngài đã đi ngược dòng sông này bằng cách đi bộ sao ạ」"
# 【双鉄】
# JP: 「ああ。興味があり、時間と体力があるように思え、\n金はさっぱりなかったからな」
1426 = "「Ừ. Lúc đó tôi thấy tò mò, lại nghĩ mình có thừa thời gian lẫn sức lực, \nvà quan trọng là chẳng có một đồng xu dính túi nữa」"
# 【ハチロク】
# JP: 「まぁ」
1622 = "「Ôi chao」"
# (独白)
# JP: なにが面白かったのか、\nハチロクはくすりと小さく笑う。
1795 = "Không biết là có điều gì thú vị, \nmà Hachiroku khẽ bật cười khúc khích."
# 【ハチロク】
# JP: 「歩かれて、どうなりました？」
1408 = "「Sau khi đi bộ như thế, kết cục của ngài ra sao ạ?」"
# 【双鉄】
# JP: 「動けなくなり、翌朝を迎え発見、保護され――\n真闇姉に、こっぴどく怒られてげんこつをもらった」
1562 = "「Tôi kiệt sức không nhúc nhích nổi, nằm chờ đến sáng hôm sau thì được phát hiện và đưa về—— \nrồi bị chị Mayami mắng cho một trận lôi đình và cốc đầu một cú nhớ đời」"
# 【ハチロク】
# JP: 「げんこつ、ですか？　あの方が？」
1577 = "「Cốc đầu ạ? Người đó sao?」"
# 【双鉄】
# JP: 「ハチロクが想像しているのの、多分数倍は痛い奴だ。\nこつんでもごつんでもなく、ガン！　と来た」
1358 = "「Có lẽ nó đau gấp mấy lần so với những gì Hachiroku đang tưởng tượng đấy. \nKhông phải kiểu cốc nhẹ hay gõ nhẹ đâu, mà là một cú bộp trời giáng!」"
# 【ハチロク】
# JP: 「それほど強く？」
1397 = "「Mạnh đến thế sao ạ?」"
# 【双鉄】
# JP: 「うむ。目から火花が飛び散った。\nそこに怒涛の隈元弁で、手ひどく叱りつけられたのだ」
1432 = "「Ừm. Lửa đom đóm bắn cả ra từ mắt. \nRồi ngay sau đó, anh bị mắng một trận tơi tả bằng giọng Kumamoto dồn dập」"
# (独白)
# JP: 小さく、ハチロクが頷き。黙る。
1865 = "Hachiroku khẽ gật đầu rồi im lặng."
# 【双鉄】
# JP: 「『どこに行こうと勝手だが、行き先を言ってからにしろ。\n探すこちらが大変だ』と、そんな意味だと伝わってきた」
917 = "「『Muốn đi đâu thì tùy, nhưng phải nói rõ nơi đến đã chứ. \nNgười đi tìm khổ sở lắm biết không』, đại ý câu mắng là như vậy」"
# 【ハチロク】
# JP: 「ごくまっとうなお叱りですね」
1616 = "「Đó là lời khiển trách vô cùng đúng đắn ạ」"
# 【双鉄】
# JP: 「そうだな。僕もそう思った。そして同時に――\nこの人は僕を叱ってくれると、ホっとした」
1430 = "「Đúng thế. Anh cũng nghĩ vậy. Và đồng thời―― \nAnh lại thấy nhẹ lòng khi có người chịu đứng ra trách mắng mình」"
# (独白)
# JP: ……そうだった。僕はほっとしたのだ。\n事故被害者として腫れ物のように扱うのではなく。
883 = "……Đúng là vậy. Mình đã thấy nhẹ lòng. \nKhông phải bị đối xử như một món đồ dễ vỡ vì là nạn nhân của vụ tai nạn."
# (独白)
# JP: ごくまっとうに、ごくごく普通に――\n僕を扱ってくれる人間に、ようやく出会えて。
2025 = "Mà một cách hoàn toàn đúng đắn, hết sức bình thường―― \nCuối cùng mình cũng đã gặp được một người đối xử với mình như thế."
# 【双鉄】
# JP: 「ホっとして。だから、家族になれたのだろうな。\n今となっては、そう感じる」
1311 = "「Nhẹ cả người. Có lẽ vì vậy mà chúng anh mới trở thành gia đình được. \nĐến tận bây giờ, anh vẫn cảm nhận sâu sắc điều đó」"
# 【ハチロク】
# JP: 「素敵な方なのですね、真闇様は」
1538 = "「Mayami-sama thật là một người tuyệt vời quá ạ」"
# 【双鉄】
# JP: 「そうだな。誰より頼れる人だ。\nあの人がひとたび本気になれば――…………」
1427 = "「Đúng thế. Chị ấy là người đáng tin cậy hơn bất kỳ ai. \nMột khi người đó đã nghiêm túc thì――…………」"
# 【ハチロク】
# JP: 「双鉄様？」
1666 = "「Soutetsu-sama?」"
# (独白)
# JP: おかしい。なぜだ。考えろ。\n真闇姉が反対なことは明白だ。
1909 = "Lạ thật. Tại sao chứ. Hãy nghĩ xem nào. \nRõ ràng là chị Mayami đang phản đối mà."
# 【双鉄】
# JP: 「なのになぜ、帝都の僕にまで届くほど――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動が活発になってしまったのだ？」
1516 = "「Thế nhưng tại sao, các hoạt động vận động thu hút nhà máy  \n\\\\x%lAircra;#00ffc040;Aircra%l;#;——lại rầm rộ đến mức truyền đến tận tai tôi ở Đế đô chứ?」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動っ！？」
1344 = "「Hoạt động vận động thu hút nhà máy \\\\x%lAircra;#00ffc040;Aircra%l;#; ư?!」"
# (独白)
# JP: ハチロクの声が跳ね上がる。
1860 = "Giọng của Hachiroku chợt cao vút lên."
# 【ハチロク】
# JP: 「この町にですか？\nこの川の水を、工場で汚そうというのですか？」
1299 = "「Là ở thị trấn này sao ạ? \nHọ định làm ô nhiễm nguồn nước của dòng sông này bằng nhà máy hay sao?」"
# 【双鉄】
# JP: 「そういう話だ。\n僕は、それを食い止めたいと帝都から戻ってきた」
1320 = "「Chuyện là như vậy đấy. \nTôi trở về từ Đế đô là vì muốn ngăn chặn điều đó」"
# 【ハチロク】
# JP: 「わたくしは素晴らしいオーナーに巡りあいました！」
1381 = "「Vương tử đã được gặp gỡ một Owner vô cùng tuyệt vời!」"
# (独白)
# JP: 敵意にも近い反発から、一気に感動と喜びへ。\n日々姫が百面相ならば、このハチロクは百感情だ。
1842 = "Từ sự phản kháng gần như là thù địch, cô ấy lập tức chuyển sang cảm động và vui sướng. \nNếu Hibiki là người có trăm khuôn mặt, thì Hachiroku này có đến trăm cảm xúc."
# 【ハチロク】
# JP: 「わたくしをお役立てください、双鉄様。\nこの美しい川の町を、悪の手に渡してはいけません」
1592 = "「Xin hãy sử dụng vương tử, Soutetsu-sama. \nChúng ta tuyệt đối không được để thị trấn sông nước xinh đẹp này rơi vào tay kẻ ác」"
# 【双鉄】
# JP: 「悪」
1672 = "「Kẻ ác」"
# (独白)
# JP: 随分と強い言葉だ。
2021 = "Một từ ngữ có phần quá mạnh mẽ."
# 【双鉄】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、悪なのか？」
897 = "「Nhà máy \\\\x%lAircra;#00ffc040;Aircra%l;#; là kẻ ác sao?」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものが、\n名前の中に、そもそも悪を内包するような存在です」
887 = "「Bản thân \\\\x%lAircra;#00ffc040;Aircra%l;#;, \nngay từ trong tên gọi vốn dĩ đã chứa đựng sự tà ác rồi ạ」"
# (独白)
# JP: エ“アク”ラ、という言葉遊びか。
1886 = "Air-“cra” (ác-quỷ), một cách chơi chữ chăng?"
# (独白)
# JP: あまり得意な分野ではないが、\n遊びであれば付き合ってみよう。
2099 = "Dù đây không phải lĩnh vực sở trường của tôi cho lắm, \nnhưng nếu là một trò đùa thì tôi cũng sẽ thử đón nhận xem sao."
# 【双鉄】
# JP: 「ならば、お前が今ここで、\n身の処し方に困っているのも、名の故か？」
1590 = "「Vậy thì, việc em đang loay hoay không biết phải định đoạt bản thân thế nào ở ngay nơi này lúc này, liệu cũng là do cái tên của em sao?」"
# 【ハチロク】
# JP: 「え？　それは……\nいかなる意味でございましょうか？」
1264 = "「Ủa? Chuyện đó... \nnghĩa là sao ạ?」"
# 【双鉄】
# JP: 「“流浪”を、お前たちはその名に内包している」
924 = "「Trong chính cái tên của các cô, đã bao hàm sự “lưu vong” rồi」"
# (独白)
# JP: あ、と小さくつぶやいて。\nハチロクはまた、空中に指で文字を書く。
1818 = "Khẽ thốt lên một tiếng \\\"A\\\". \nHachiroku lại dùng ngón tay vạch chữ vào không trung."
# 【ハチロク】
# JP: 「レイ“ルロオ”ド――なるほど、暗示的ですね。\n悪に駆逐され、われわれは流浪に身を落とした」
1645 = "「Rai“luroa”d――Ra là vậy, thật là đầy ẩn ý. \nBị cái ác trục xuất, chúng tôi đành phải chịu kiếp lưu vong」"
# (独白)
# JP: 遊びで返したつもりの言葉を、\nハチロクは真顔で受け止める。
1888 = "Lời nói tưởng như chỉ để đáp lại đùa vui, \nHachiroku lại đón nhận nó với gương mặt vô cùng nghiêm túc."
# (独白)
# JP: その唇が、真一文字に結ばれやがて、小さく歪む。
1841 = "Đôi môi ấy mím chặt thành một đường thẳng, rồi khẽ méo xệch đi."
# 【ハチロク】
# JP: 「やはり悪です。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;も、\x%lエアクラ;#00ffc040;エアクラ%l;#;を作る工場も」
1485 = "「Quả nhiên đó là cái ác. \nCả \\\\x%lエアクラ;#00ffc040;máy bay%l;#; lẫn những nhà máy chế tạo ra \\\\x%lエアクラ;#00ffc040;máy bay%l;#;」"
# (独白)
# JP: 淡々と。ひどく冷たく吐き捨てる。
2057 = "Bình thản. Cô lạnh lùng thốt ra những lời cay đắng."
# 【ハチロク】
# JP: 「人々の暮らしから鉄道を奪い、大廃線時代を招いた。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の犯した罪を、わたくしは決して許しません」
1348 = "「Cướp đi đường sắt khỏi đời sống của người dân, dẫn đến thời kỳ Đại Phế Tuyến. \nTội lỗi mà \\\\x%lエアクラ;#00ffc040;máy bay%l;#; đã gây ra, tôi tuyệt đối sẽ không bao giờ tha thứ」"
# 【双鉄】
# JP: 「罪」
1564 = "「Tội lỗi」"
# 【ナビ】
# JP: 「より便利だったから人に選ばれただけの話です。\nそれを\x%lエアクラ;#00ffc040;エアクラ%l;#;の罪というなら、逆恨みでは？」
1169 = "「Đó chẳng qua chỉ là vì nó tiện lợi hơn nên được con người lựa chọn mà thôi. \nNếu gọi đó là tội lỗi của \\\\x%lエアクラ;#00ffc040;máy bay%l;#;, thì chẳng phải là giận cá chém thớt sao?」"
# 【ハチロク】
# JP: 「何者ですかっ！？」
1457 = "「Ai đó ạ!?」"
# (独白)
# JP: 完全に不意打ちのナビの声。\nが、ハチロクは悲鳴もあげず、鋭い目つきで誰何する。
2129 = "Giọng nói của Navi vang lên hoàn toàn bất ngờ. \nNhưng Hachiroku không hề hét lên kinh hãi, cô cất tiếng hỏi vặn với ánh mắt sắc lẹm."
# 【ハチロク】
# JP: 「こそこそ隠れて物申すとは卑怯千万。\n恥じ入りなさい。そして、姿を現しなさい」
1575 = "「Lén lút trốn tránh rồi lên tiếng thật là hèn hạ vô cùng. \nHãy biết xấu hổ đi, và mau mau hiện thân ra đây」"
# 【ナビ】
# JP: 「隠れてなどいません。\n本機の姿は、あなたの視界に捉えられています」
1147 = "「Tôi không có trốn. \nHình dáng của thiết bị này vốn đã nằm trong tầm mắt của cô rồi」"
# 【ハチロク】
# JP: 「本機？　では」
1480 = "「Bản cơ? Vậy thì...」"
# (独白)
# JP: 左右を見渡す。\n目に宿っていた険がいくらか、柔らかになる。
1930 = "Nhìn dáo dác xung quanh. \nVẻ gay gắt trong ánh mắt đã vơi bớt, trở nên mềm mỏng hơn đôi chút."
# 【ハチロク】
# JP: 「あなたは――この飛行機なのですか？」
1186 = "「Ngài là――chiếc máy bay này sao?」"
# 【ナビ】
# JP: 「飛行機ではありません」
1146 = "「Tôi không phải máy bay」"
# (独白)
# JP: ナビは静かに怒っている。\n止めはしない。
2131 = "Navi đang lặng lẽ tức giận. \nNhưng tôi không ngăn lại."
# (独白)
# JP: 止めたところで、わだかまりは深くなるだけだ。
1982 = "Dẫu có ngăn lại thì khúc mắc cũng chỉ thêm sâu đậm mà thôi."
# 【ナビ】
# JP: 「本機は、当機――試作飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;、EFL-T007の\n専用\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビです」
1477 = "「Bản cơ là Navi chuyên dụng của đương cơ――mẫu phi hành thử nghiệm\\\\x%lエアクラ;#00ffc040;Hiệp sĩ đường sắt%l;#;, EFL-T007」"
# 【ハチロク】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;！？　\nまさか、空を飛ぶ\x%lエアクラ;#00ffc040;エアクラ%l;#;なんてっ！！？」
898 = "「\\\\x%lエアクラ;#00ffc040;Hiệp sĩ đường sắt%l;#; sao!? \nKhông thể nào, một \\\\x%lエアクラ;#00ffc040;Hiệp sĩ đường sắt%l;#; bay được trên bầu trời ư!!?」"
# (独白)
# JP: ハチロクの目が僕を捉える。\nすがりついてくる。
1863 = "Ánh mắt Hachiroku khóa chặt lấy tôi. \nNhư muốn bấu víu vào."
# (独白)
# JP: が――\nウソで一時ごまかすことは、それこそ悪だ。
2001 = "Nhưng―― \nDùng lời nói dối để lấp liếm nhất thời, điều đó mới thật sự là tồi tệ."
# 【双鉄】
# JP: 「あるのだ。今は。\n空にさえ、エアロ＝クラフテック機関の手は届いたのだ」
1549 = "「Có đấy. Bây giờ thì có rồi. \nNgay cả bầu trời, bàn tay của động cơ Aero-Craftech cũng đã chạm tới」"
# 【ハチロク】
# JP: 「ならば降りますっ！」
1631 = "「Vậy thì tôi xin xuống!」"
# (独白)
# JP: 金切り声が鳴り響き、狭いキャノピーが激しく揺れる。\nハチロクが、ここから出ようともがき始める。
2086 = "Tiếng hét thất thanh vang lên, vòm kính buồng lái chật hẹp rung lắc dữ dội. \nHachiroku bắt đầu giãy giụa để thoát ra ngoài."
# 【双鉄】
# JP: 「阿呆かお前は！　\n今ここを出れば地に落ち粉々に壊れるぞっ！」
1190 = "「Cô ngốc à! \nBây giờ mà ra ngoài là rơi xuống đất tan tành xác pháo đấy!」"
# 【ハチロク】
# JP: 「そうであっても！　\x%lエアクラ;#00ffc040;エアクラ%l;#;になぞっ」
1323 = "「Dẫu có là vậy! \nTôi cũng không đời nào chịu khuất phục trước \\\\x%lエアクラ;#00ffc040;Hiệp sĩ đường sắt%l;#;」"
# 【ナビ】
# JP: 「くだらない意地で自らの職務を永遠に放棄しますか。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、聞くほどの存在では無いのですね」
1294 = "「Vì chút sĩ diện hão huyền mà cô định vĩnh viễn từ bỏ nghĩa vụ của bản thân sao? \n\\\\x%lレイルロオド;#00ffc040;Railord%l;#; hóa ra cũng chẳng phải thực thể đáng để bận tâm nghe theo nhỉ」"
# 【ハチロク】
# JP: 「っ！！！」
1273 = "「...!!!」"
# (独白)
# JP: ぴたりと止まる。\nハチロクはまるきり動かなくなる。
2033 = "Đột ngột khựng lại. \nHachiroku hoàn toàn bất động."
# (独白)
# JP: ただ目が、瞳が――\n動き全ての激しさを超え、烈火のごとくゆらめき燃える。
2004 = "Chỉ có ánh mắt, chỉ có đôi đồng tử là―― \nvượt lên trên mọi sự dữ dội của cử động, chập chờn bùng cháy tựa như lửa giận."
# 【ハチロク】
# JP: 「わたくしたちから職務を――人を貨物を運ぶことを。\nレイルまでをも奪ったのは、あなたがたでしょうに」
1350 = "「Chính các người――mới là những kẻ đã cướp đi nghĩa vụ vận chuyển hành khách và hàng hóa của chúng tôi, thậm chí cướp đi cả những đường ray cơ mà」"
# 【ナビ】
# JP: 「事実誤認の訂正を――」
1197 = "「Yêu cầu đính chính lại sự nhầm lẫn về mặt sự thật――」"
# 【双鉄】
# JP: 「違うぞハチロク」
1141 = "「Không phải thế đâu, Hachiroku」"
# (独白)
# JP: 割って入れば、すぐさまナビは言葉を止める。\nこれは僕が、人間が言うべき言葉であるから。
2042 = "Ngay khi tôi chen ngang, Navi liền lập tức ngừng lời. \nBởi lẽ đây là những lời mà tôi, một con người, cần phải nói."
# 【双鉄】
# JP: 「お前自らが言っていたではないか。\n全てを支配するのは人間――全ては、人間の選択だ」
1216 = "「Chính em đã từng tự mình nói thế còn gì. \nKẻ chi phối tất thảy chính là con người――mọi thứ, đều là lựa chọn của con người」"
# (独白)
# JP: 教えてもらった。そのことを。\n金の髪をした見知らぬ少女に。事故の傷がまだ癒えぬころ。
2066 = "Tôi đã được dạy như thế. Điều đó. \nBởi một cô gái lạ mặt với mái tóc vàng kim. Vào những ngày mà vết thương từ vụ tai nạn vẫn chưa lành hẳn."
# (独白)
# JP: 憎しみのぶつけどころを見つけることが出来ずに、\n心を腐らせるだけだったころ。
2082 = "Vào cái thuở mà tôi chẳng thể tìm thấy nơi để trút đi lòng căm hận, \nmà chỉ biết để mặc cho cõi lòng mình mục rỗng."
# 【双鉄】
# JP: 「たとえ知性を持とうとも、物は決定を下せない。\n決定を下すのは常に人で、その責任を負うのも、人だ」
1224 = "「Dẫu có sở hữu trí tuệ đi chăng nữa, đồ vật cũng không thể đưa ra quyết định. \nKẻ đưa ra quyết định luôn là con người, và kẻ gánh vác trách nhiệm đó, cũng là con người」"
# 【ハチロク】
# JP: 「そのことならば――当然に、承知いたしております」
1623 = "「Chuyện đó――dĩ nhiên, tôi đã thấu rõ」"
# 【双鉄】
# JP: 「ならば、ナビに――“物”に当たるのはやめた方がいい。\nお前の誇りを、お前自身が貶めることになってしまうぞ」
1413 = "「Nếu vậy, em không nên trút giận lên Navi――lên một 'đồ vật' nữa. \nLàm vậy sẽ chỉ tự hạ thấp đi lòng tự tôn của chính em mà thôi」"
# 【ハチロク】
# JP: 「ん――」
1267 = "「Ư――」"
# (独白)
# JP: ハチロクの肩が小さく揺れる。\n喉が、こくんと何かを飲み込む。
1847 = "Đôi vai Hachiroku khẽ rung lên. \nCổ họng cô cựa quậy như vừa nuốt xuống thứ gì."
# (独白)
# JP: ハチロクはツバを出すのだろうか？\nそんなことをふと、思ってしまう。
1822 = "Liệu Railord như Hachiroku có tiết ra nước bọt không? \nBất chợt, một suy nghĩ như vậy thoáng qua trong đầu tôi."
# 【ハチロク】
# JP: 「双鉄様のおっしゃられるとおりであるかと思います。\n取り乱し八つ当たりをしたことを、心より恥じ入ります」
1664 = "【ハチロク】 \n「Đúng như những gì Soutetsu-sama đã nói. \nEm thật lòng hổ thẹn vì đã mất bình tĩnh mà giận cá chém thớt」"
# (独白)
# JP: そして深々。\nキャノピー内に両手をついて、ハチロクはその頭を下げる。
2096 = "Rồi thật sâu. \nChống hai tay xuống sàn cabin, Hachiroku cúi đầu tạ lỗi."
# 【ナビ】
# JP: 「雨……ですか？」
1621 = "【ハチロク】 \n「Trời mưa…… sao ạ?」"
# 【双鉄】
# JP: 「いや？」
1139 = "【双鉄】 \n「Không phải sao?」"
# (独白)
# JP: 雲ひとつ無い。\nなのに、なぜ、ナビともあろうものがそんな――っ！
2036 = "Trời không một gợn mây. \nThế nhưng, tại sao một người là Navigator mà lại nói ra điều như――っ!"
# 【ハチロク】
# JP: 「けれど、わたくしがその事実を認めれば……\nわたくしは、姉妹全てを貶めることとなってしまいます」
1258 = "【ハチロク】 \n「Nhưng nếu em thừa nhận sự thật đó…… \nThì chẳng khác nào chính em đang hạ thấp tất cả các chị em của mình」"
# (独白)
# JP: 泣いている。\nまた、大粒の涙をぼろぼろこぼしている。
1977 = "Cô ấy đang khóc. \nNhững giọt nước mắt lớn lại lã chã rơi dài."
# (独白)
# JP: 手をついたまま肩を震わせ、\nぬぐおうともせず、ただ、泣いている。
1911 = "Hai tay vẫn chống xuống, đôi vai run bần bật, \nchẳng buồn lau đi, cô cứ thế mà khóc."
# 【ハチロク】
# JP: 「ですから、たとえそれが人間の選択であろうとも――」
1395 = "【ハチロク】 \n「Vì vậy, cho dù đó có là lựa chọn của con người đi chăng nữa――」"
# 【双鉄】
# JP: 「無理に受け入れることはない。\n正しいと信じる必要もない」
1150 = "【双鉄】 \n「Em không cần phải ép buộc bản thân chấp nhận nó. \nCũng không cần phải tin rằng điều đó là đúng」"
# 【ハチロク】
# JP: 「っ！？」
1274 = "「っ！？」"
# 【双鉄】
# JP: 「人間は間違った選択を、行動をしてしまう。\nそれは事実で、だから事故などが起きるのだ」
1174 = "【双鉄】 \n「Con người vẫn thường đưa ra những lựa chọn, những hành động sai lầm. \nĐó là sự thật, và đó là lý do tại sao các tai nạn mới xảy ra」"
# (独白)
# JP: 事故は起きる。\n物でなく、技術ではなく、それを運用する人間の責任で。
1807 = "Tai nạn vẫn luôn xảy ra. \nKhông phải do máy móc, không phải do kỹ thuật, mà chính do trách nhiệm của con người vận hành chúng."
# (独白)
# JP: しかし、“責任”を、たとえ法が取らせたとして――\n憎しみは消えてはくれないし、傷が癒えてもくれはしない。
2005 = "Nhưng, cho dù pháp luật có bắt phải chịu “trách nhiệm” đi chăng nữa―― \nthì lòng hận thù cũng chẳng thể tiêu tan, và vết thương cũng chẳng thể nào lành lại."
# 【双鉄】
# JP: 「僕は、そのことをこの身を以て知っている。\nだから少しは、お前の憎しみにも共感できるように思う」
1617 = "「Bản thân tôi hiểu rất rõ điều đó. \nVì vậy, tôi nghĩ mình có thể phần nào đồng cảm với nỗi hận thù của cô」"
# 【ハチロク】
# JP: 「誤った選択を――\nそれに、巻き込まれたものの苦しみを――」
1296 = "「Một quyết định sai lầm―― \nvà cả nỗi đau đớn của những kẻ bị cuốn vào nó――」"
# 【双鉄】
# JP: 「そうだ。その苦しみと――\nそれゆえの、ぶつけどころのない憎しみを」
1445 = "「Đúng vậy. Nỗi đau đớn đó―― \nvà cả sự hận thù không biết trút vào đâu vì điều đó」"
# (独白)
# JP: ハチロクが顔を僕へと向ける。\n涙をふかずにそのまま向ける。
1836 = "Hachiroku quay mặt về phía tôi. \nCô ấy cứ thế hướng về phía tôi mà không hề lau đi những giọt nước mắt."
# 【ハチロク】
# JP: 「でしたら、どうか教えてください。\nわたくしは――この憎しみをどうすれば」
1418 = "「Nếu đã vậy, xin hãy chỉ choわたくし biết. \nわたくし――phải làm gì với nỗi hận thù này đây」"
# 【双鉄】
# JP: 「憎むべきは、その決定に巻き込まれた自分の無力さだ。\n憎しみは故に、力をつけることによって[すす]雪ぐべきだ」
1370 = "「Kẻ đáng hận chính là sự bất lực của bản thân khi bị cuốn vào quyết định đó. \nChính vì thế, hận thù nên được gột rửa bằng cách trở nên mạnh mẽ hơn」"
# (独白)
# JP: これも、教えてもらったこと。
2070 = "Đây cũng là điều tôi đã được dạy."
# (独白)
# JP: 生きたまま腐っていく僕に、\n新しい根を与えてくれた、汰斗さんから。
2068 = "Từ anh Taito, người đã trao cho tôi những chiếc rễ mới \nkhi tôi đang dần mục ruỗng lúc sinh thời."
# 【ハチロク】
# JP: 「力をつける……\nしかし、今更そうしたところで」
1401 = "「Trở nên mạnh mẽ hơn…… \nNhưng, dẫu bây giờ có làm vậy thì」"
# 【双鉄】
# JP: 「時は戻せん。\nしかし、次には巻き込まれずに済むかもしれん」
1463 = "「Thời gian không thể quay lại. \nNhưng, lần tới có lẽ cô sẽ không bị cuốn vào nữa」"
# 【ハチロク】
# JP: 「次……ですか」
1135 = "「Lần tới…… sao ạ」"
# 【双鉄】
# JP: 「来るのだ。必ず。\n生きてさえいれば、否応なしに」
1133 = "「Nó sẽ đến. Chắc chắn. \nChỉ cần còn sống, dù muốn dù không thì nó vẫn sẽ đến」"
# (独白)
# JP: そのとき。誰かを救えるのなら。\n救えなかった路子の代わりに、誰か一人でも救えるのなら。
2035 = "Vào lúc đó. Nếu có thể cứu được ai đó. \nThay cho Michiko kẻ không thể cứu rỗi, nếu có thể cứu được dù chỉ một người."
# (独白)
# JP: その贖罪を果たすこと、そうするために生き抜くこと。\nそれこそ果たすべき最大の義務だと、僕は教えてもらった。
1996 = "Hoàn thành sự chuộc tội đó, và sống sót để làm được điều đó. \nTôi đã được dạy rằng đó chính là nghĩa vụ lớn nhất mà mình phải thực hiện."
# 【双鉄】
# JP: 「無力を嘆くヒマがあるなら、力をつけるために動け。\n無力であった自分を憎み、ゆえに自らを鍛え抜け」
1572 = "「Nếu có thời gian để than thở về sự bất lực của bản thân, hãy hành động để mài giũa sức mạnh. \nHãy căm ghét bản thân khi còn yếu đuối, và từ đó rèn luyện chính mình」"
# 【ハチロク】
# JP: 「次……は、来ますか？　わたくしのようなものにでも」
1532 = "「Lần... tới, liệu có đến không ạ? Dù cho đó là với một sự tồn tại như em đi chăng nữa」"
# 【双鉄】
# JP: 「お前がどのようなものであるのか、\n僕はまだほとんど知らん」
1192 = "「Em là một sự tồn tại như thế nào, \nanh vẫn chưa thực sự hiểu rõ」"
# 【ハチロク】
# JP: 「はい」
1144 = "「Vâng」"
# 【双鉄】
# JP: 「が、僕は縁あり、お前のオーナーとなった。\nならば、僕は僕にできるかぎりを尽くそう」
2013 = "「Nhưng, chúng ta đã có duyên gặp gỡ, và anh đã trở thành Owner của em. \nNếu vậy, anh sẽ dốc hết sức mình trong khả năng có thể」"
# (独白)
# JP: 当然だ。\nそれこそ、僕の義務であるのだ。
1571 = "Là điều tất nhiên thôi. \nBởi đó chính là nghĩa vụ của anh."
# 【双鉄】
# JP: 「お前がそれを望むなら。\n僕は必ず、お前に“次”を迎えさせよう」
1660 = "「Nếu em ước muốn điều đó. \nAnh nhất định sẽ để em đón nhận “lần tới”」"
# 【ハチロク】
# JP: 「双鉄……様」
1913 = "「Cậu Soutetsu……」"
# (独白)
# JP: また泣く。\n今度は笑いまで混ぜ、整った顔をぐしゃぐしゃにして。
1604 = "Lại khóc rồi. \nLần này còn lẫn cả nụ cười, làm gương mặt thanh tú nhòe đi."
# 【ハチロク】
# JP: 「体の調子までおかしいようです。\nわたくしは、自分一つさえ、今は制御できておりません」
2040 = "「Đến cả tình trạng cơ thể dường như cũng có chút bất thường. \nNgay cả bản thân mình, lúc này em cũng chẳng thể tự kiểm soát được nữa」"
# 【双鉄】
# JP: 「そうか」
1803 = "「Vậy sao」"
# (独白)
# JP: あの汰斗さんが、ガラスケースに“放置”していた。\n記憶の欠落。極端なほどの感情の振れ。
2125 = "Một người như anh Taito lại “bỏ mặc” cô ấy trong tủ kính. \nKý ức bị khiếm khuyết. Sự dao động cảm xúc đến mức cực đoan."
# (独白)
# JP: ――事実が想像を肉付けしていく。
1917 = "――Sự thật đang dần đắp da thịt cho những suy đoán."
# (独白)
# JP: （あるいは、ならば……）
920 = "（Hoặc là, nếu quả đúng như vậy……）"
# (独白)
# JP: そうであるなら、直してやるが――\nハチロクは、ひどい故障品であるのかもしれない。
1995 = "Nếu đúng là thế, mình sẽ sửa chữa lại cho cô ấy―― \nCó lẽ Hachiroku là một sản phẩm lỗi vô cùng nghiêm trọng."
# 【ハチロク】
# JP: 「“望む”ことなど、いまのわたくしには難しすぎます。\nですが――それでも……」
1593 = "「“Hy vọng” vào điều gì đó... lúc này đối với tôi là quá khó. \nNhưng mà―― dẫu vậy thì……」"
# (独白)
# JP: 涙に濡れた目が持ち上がる。\n瞳が、まっすぐ僕へと届く。
2117 = "Đôi mắt đẫm lệ ngước lên. \nÁnh mắt ấy chạm thẳng vào tôi."
# 【ハチロク】
# JP: 「双鉄様に教えていただいたそのとおり、少しでも……\n回復のため、わたくしは、力をつけて――」
1289 = "「Đúng như những gì Soutetsu-sama đã dạy, dù chỉ một chút thôi…… \nĐể phục hồi, tôi phải tích lũy năng lượng――」"
# (独白)
# JP: （ぐう～～っ）
1547 = "（Rọọọt～～）"
# 【双鉄】
# JP: 「それで良い。\nお前の体も『腹が減っては戦もできん』と言っている」
1798 = "「Như thế là tốt rồi. \nCơ thể của cô cũng đang bảo rằng “có thực mới vực được đạo” đấy」"
# 【ハチロク】
# JP: 「左様ですね」
1832 = "「Đúng là như vậy ạ」"
# (独白)
# JP: 照れず、まっすぐ答えを返す。\n悪くない。
1410 = "Không hề ngượng ngùng, cô ấy thẳng thắn đáp lại. \nKhông tệ chút nào."
# (独白)
# JP: 故障してなおハチロクは、\nあの頃の僕よりずっと強いらしい。
1309 = "Dù đang gặp sự cố, có vẻ Hachiroku vẫn \nmạnh mẽ hơn tôi hồi đó rất nhiều."
# 【双鉄】
# JP: 「なら利用しろ。\x%lエアクラ;#00ffc040;エアクラ%l;#;であれ、なんであれ。\n最も早い道を選んで、選択をできるようになれ」
1817 = "「Vậy thì hãy tận dụng nó đi. Dù là \\\\x%lエアクラ;#00ffc040;Aircra%l;#; hay bất cứ thứ gì khác. \nChọn con đường nhanh nhất, để bản thân có thể tự đưa ra những lựa chọn của riêng mình」"
# 【ハチロク】
# JP: 「はい。かしこまりました双鉄様――\nっ！？　なにっ？　\x%l共感;#00ffc040;共感%l;#;っ！？」
2018 = "「Vâng. Tôi đã hiểu thưa Soutetsu-sama―― \nơ kìa!? Cái gì thế này? \\\\x%l共感;#00ffc040;Cộng cảm%l;#; ư!?」"
# (独白)
# JP: ハチロクがビクリと背筋をたてる。
1194 = "Hachiroku giật nảy mình, sống lưng dựng thẳng."
# (独白)
# JP: その目が頼りなげに動きまわって、\nやがて、キャノピーのセンターパネルに注がれる。
1252 = "Đôi mắt cô ấy bối rối đảo quanh, \nrồi cuối cùng đổ dồn về bảng điều khiển trung tâm của vòm kính che."
# 【ハチロク】
# JP: 「あなた――ええと、\x%lエアクラ;#00ffc040;エアクラ%l;#;・ナビ？」
1287 = "「Cô―― à không, \\\\x%lエアクラ;#00ffc040;Aircra%l;#; Navigation?」"
# 【ナビ】
# JP: 「ただナビと。それ以上の呼称は不要です」
896 = "「Chỉ cần gọi là Navi. Không cần bất kỳ danh xưng nào hơn thế」"
# 【ハチロク】
# JP: 「そう。そうだったのですね――\nナビ、あなたもまた、わたくしたちの……」
1919 = "「Ra là vậy. Thì ra là thế―― \nNavi, cô cũng là một thành viên trong chúng tôi sao……」"
# 【ナビ】
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビは、エアロ＝クラフテック社の製品です。\n誰の妹でもありません」
2067 = "「\\\\x%lHệ thống định vị;#00ffc040;Hệ thống định vị%l;#; Navi là sản phẩm của tập đoàn Aero-Craftech. \nKhông phải là em gái của ai cả」"
# (独白)
# JP: 妹――
1228 = "Em gái――"
# (独白)
# JP: この場合は……後継機種、\nいや、技術の継承先というほどの意味であろうか。
1447 = "Trong trường hợp này…… có lẽ ý là thế hệ kế nhiệm, \nkhông, là nơi kế thừa công nghệ chăng."
# 【双鉄】
# JP: 「なるほどな。\nナビがハチロクに共感とやらを送ったか」
1680 = "「Ra vậy. \nRa là Navi đã gửi thứ gọi là sự đồng cảm cho Hachiroku à」"
# 【ハチロク】
# JP: 「はい。わたくしは間違いなく受け取りました」
1501 = "「Vâng. Tôi chắc chắn đã nhận được nó」"
# 【双鉄】
# JP: 「ナビ、いったい何と送った？」
1513 = "「Navi, rốt cuộc cô đã gửi cái gì?」"
# 【ナビ】
# JP: 「特には。\n単に臨時の周辺情報を発信しただけです」
1351 = "「Không có gì đặc biệt. \nTôi chỉ đơn thuần phát đi thông tin xung quanh tạm thời mà thôi」"
# 【双鉄】
# JP: 「では偶然に、\nそれをハチロクが傍受してしまったというわけか」
2133 = "「Vậy là tình cờ, \nHachiroku đã bắt được sóng thông tin đó sao」"
# 【ナビ】
# JP: 「事実群からは、そのように推測されます」
1546 = "「Dựa trên các dữ kiện thực tế, có thể suy đoán là như vậy」"
# (独白)
# JP: 無愛想極まるナビの言葉に、\nハチロクはふと、唇の端をほころばせる。
1851 = "Trước những lời lẽ vô cùng cộc lốc của Navi, \nHachiroku chợt khẽ nở một nụ cười nơi khóe môi."
# 【ハチロク】
# JP: 「確かに……ふふっ、とても有意な周辺情報を、\nわたくしは偶然、受け取りました」
1814 = "「Quả thực…… hì hì, tôi đã tình cờ nhận được \nmột thông tin xung quanh vô cùng ý nghĩa」"
# (独白)
# JP: いって、ハチロクの視線は下へと。\nいつの間に、高度がかなり落ちている。
1620 = "Nói rồi, ánh mắt của Hachiroku hướng xuống dưới. \nTừ lúc nào không hay, độ cao đã giảm đi đáng kể."
# (独白)
# JP: はっきり見える銀色の線。二本が長く伸びている。\nハチロクの目に、強い喜びの光が宿る。
1276 = "Những đường ray màu bạc hiện ra rõ mồn một. Hai đường ray trải dài tít tắp. \nTrong đôi mắt của Hachiroku thắp lên một tia sáng vui mừng khôn xiết."
# 【ハチロク】
# JP: 「鉄道は――この町ではまだ――\n生き延びてくれているのですね」
1250 = "「Đường sắt――ở thị trấn này―― \nvẫn còn đang tiếp tục tồn tại nhỉ」"
# 【双鉄】
# JP: 「ああ……そのようだな。\n僕がこの町を出たときには、青息吐息だったようだが」
2051 = "「Ừ…… Có vẻ là vậy. \nNhưng hồi anh rời khỏi thị trấn này, nghe nói nó đã thoi thóp lắm rồi」"
# 【ハチロク】
# JP: 「生き延びているなら、次があります。\n――双鉄様のお言葉ですよ？」
1584 = "「Nếu còn sống sót, chắc chắn sẽ có lần sau. \n――Đó là lời của ngài Soutetsu đấy ạ?」"
# (独白)
# JP: 口調はいつもどおりだが、声は明らかに弾んでる。\n尻尾があったらぶんぶん振られているだろう。
1255 = "Giọng điệu vẫn như thường lệ, nhưng thanh âm rõ ràng là đang vô cùng phấn khởi. \nNếu có đuôi, hẳn là nó đang vẫy rối rít lên rồi."
# 【双鉄】
# JP: 「近くに降りて見てみるか？」
1253 = "「Em muốn xuống gần hơn để xem thử không?」"
# 【ハチロク】
# JP: 「できるのですか！？」
1155 = "「Có thể làm thế được sao ạ!?」"
# 【双鉄】
# JP: 「出来る。ナビ」
2069 = "「Được chứ. Navi」"
# 【ナビ】
# JP: 「了解しました。\n最適な着水地点を[サーチ,1]探査します」
1402 = "「Đã rõ. \nTôi sẽ dò tìm điểm đáp xuống nước tối ưu nhất」"
