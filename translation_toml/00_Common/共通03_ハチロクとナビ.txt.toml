[script]
# lines: 320 
# 【ハチロク】
# display as 八六
# JP: 「わたくし、このような景色は初めてです。\n町が、まるで積み木でつくられているように見えます」
1385 = "「Đây là lần đầu tiên em được thấy cảnh tượng thế này. Cả thành phố trông cứ như được xếp bằng những khối gỗ đồ chơi vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1285 = "「Ừm.」"
# monologue
# JP: ナビは賢い。空気を読む。\nだから、沈黙を守ってくれている。
2030 = "Navi rất thông minh. Và biết cách đọc bầu không khí. Nên cô ấy vẫn luôn giữ im lặng."
# monologue
# JP: その沈黙に守られながら、\n機嫌よく、ハチロクは眼下を眺め続ける。
2028 = "Được bao bọc trong sự im lặng đó, Hachiroku vẫn vui vẻ tiếp tục ngắm nhìn khung cảnh bên dưới."
# 【ハチロク】
# display as 八六
# JP: 「あの見事なお屋根はなんでしょう？」
1628 = "「Mái nhà tuyệt đẹp kia là ở đâu vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井阿蘇神社だな。\n屋根だけでなく、[たたず]佇まい全般が美しい場所だ」
1460 = "「Là đền Akai Aso đấy. Không chỉ mái nhà, mà toàn bộ kiến trúc ở đó đều rất đẹp.」"
# 【ハチロク】
# display as 八六
# JP: 「あの森は？　\nひとつだけ、随分と小高いところにありますが」
1637 = "「Còn khu rừng kia thì sao ạ? Chỉ có chỗ đó là nhô lên khá cao so với xung quanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜[じょうし,1]城址。あそこからも御一夜の町並みを見下ろせる。\n無論、ここからほどに広くは無理だが」
1435 = "「Đó là tàn tích thành Ohimitera. Từ đó cũng có thể nhìn xuống toàn cảnh thành phố. Tất nhiên là không thể rộng bằng góc nhìn từ trên này được.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ここは、お空の上ですものね」
1548 = "「Đúng vậy nhỉ. Vì chúng ta đang ở trên trời mà.」"
# monologue
# JP: ハチロクが短い両手を伸ばす。\nそれを翼に、より高くへと求めるように。
1826 = "Hachiroku dang rộng hai cánh tay ngắn ngủn của mình. Như muốn biến chúng thành đôi cánh để vươn lên cao hơn nữa."
# 【ハチロク】
# display as 八六
# JP: 「飛行機には初めて乗りましたが、良いものです。\nきっと、鉄道の次に素敵な乗り物でしょうね、これは」
1659 = "「Dù đây là lần đầu tiên đi máy bay, nhưng em thấy nó cũng tuyệt lắm. Chắc chắn đây là phương tiện tuyệt vời thứ hai, chỉ sau đường sắt thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道は、最高順位ということか？」
1648 = "「Đường sắt vẫn là vị trí số một sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、もちろん。\nわたくしは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから」
1455 = "「Vâng, tất nhiên rồi ạ. Vì em là một \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か……確か、鉄道車両それぞれに、\n一体ずつついている物……で、よかったか？」
902 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; à……Hình như là, mỗi phương tiện đường sắt đều có một thực thể đi kèm……đúng không nhỉ?」"
# monologue
# JP: 素朴な疑問を伝えれば、\nハチロクはふふ、と満足そうな笑みを浮かべる。
2106 = "Khi tôi nói ra thắc mắc giản đơn đó, Hachiroku mỉm cười đầy mãn nguyện."
# 【ハチロク】
# display as 八六
# JP: 「\x%l客車;#00ffc040;客車%l;#;にはついていません。機関車・\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;・[どうりょくしゃ,2]動力車など、\n自ら動く車両を、まずわたくしたちは制御します」
908 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; thì không có đâu ạ. Đầu tiên, chúng em sẽ điều khiển các phương tiện có thể tự di chuyển, như đầu máy, \\x%l気動車;#00ffc040;toa xe tự hành%l;#;, hay toa xe động lực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「制御。それは、運転制御ということか？」
1399 = "「Điều khiển. Ý em là điều khiển lái sao?」"
# 【ハチロク】
# display as 八六
# JP: 「それももちろん。駆動車両および\x%l列車;#00ffc040;列車%l;#;の制御は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\x%l機関士;#00ffc040;機関士%l;#;・\x%l運転士;#00ffc040;運転士%l;#;との共同で行います」
1638 = "「Đó là điều hiển nhiên ạ. Việc điều khiển phương tiện động lực và \\x%l列車;#00ffc040;đoàn tàu%l;#;, sẽ do \\x%lレイルロオド;#00ffc040;Railord%l;#; cùng với \\x%l機関士;#00ffc040;người lái tàu%l;#; hoặc \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#; phối hợp thực hiện.」"
# monologue
# JP: 機関車を運転する人間が\x%l機関士;#00ffc040;機関士%l;#;。\nそれ以外の駆動車両を運転するのが\x%l運転士;#00ffc040;運転士%l;#;と教えてもらう。
2108 = "Người lái đầu máy xe lửa thì gọi là \\x%l機関士;#00ffc040;người lái tàu%l;#;. Còn người điều khiển các phương tiện động lực khác thì gọi là \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#;, tôi được dạy như vậy."
# monologue
# JP: “鉄道”とひとくくりにしか思わなかったが、\n中身はどうして、なかなか複雑なものであるらしい。
1950 = "Tôi cứ nghĩ đơn giản tất cả đều là \"đường sắt\", nhưng không ngờ bên trong lại phức tạp đến thế."
# 【双鉄】
# display as 雙鐵
# JP: 「“まず”であり、“それも”であるなら。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、さらに広範に鉄道を制御するものか？」
1468 = "「Nếu đã nói là 'đầu tiên', và 'cả cái đó nữa' thì. \\x%lレイルロオド;#00ffc040;Railord%l;#; còn điều khiển đường sắt ở phạm vi rộng hơn nữa sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、そのとおりです双鉄様。わたくしたちは\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;を提案し、\x%l運転計画;#00ffc040;運転計画%l;#;をも制御します」
1450 = "「Vâng, đúng vậy thưa ngài Soutetsu. Chúng em đề xuất \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; và kiểm soát cả \\x%l運転計画;#00ffc040;kế hoạch hoạt động%l;#; nữa.」"
# monologue
# JP: わからぬ言葉はひとまず置いて、\nわかる部分を確認していく。
2031 = "Tạm thời gác lại những từ ngữ không hiểu, tôi bắt đầu xác nhận lại những phần mình đã nắm được."
# 【双鉄】
# display as 雙鐵
# JP: 「わたくし”たち”と繰り返しているが」
1187 = "「Em cứ lặp đi lặp lại từ 'chúng em' nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、いうなれば全て姉妹。その全てが、\n相互に\x%l共感;#00ffc040;共感%l;#;通信を行うことができます」
901 = "「Có thể nói tất cả \\x%lレイルロオド;#00ffc040;Railord%l;#; đều là chị em. Và tất cả chúng em đều có thể liên lạc với nhau thông qua \\x%l共感;#00ffc040;cộng cảm%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1268 = "「Hừm.」"
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;通信――ナビのような\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも有している、\nいや、その最重要といってもいいらしい機能だ。
60 = "Giao tiếp \\x%l共感;#00ffc040;cộng cảm%l;#;——hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#; như Navi cũng có chức năng này, không, phải nói đó là chức năng quan trọng nhất của chúng mới đúng."
# 【双鉄】
# display as 雙鐵
# JP: 「その個体が得たさまざまな情報をリアルタイムに共有し、\n集合最適処理する仕組み――でよかったか？」
1256 = "「Đó là cơ chế chia sẻ theo thời gian thực những thông tin đa dạng mà mỗi cá thể thu thập được, rồi xử lý tối ưu hóa theo tập hợp——đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「おくわしいのですね、双鉄様。\nそのご解釈は、ほぼ実際と合致しております」
1665 = "「Ngài am hiểu thật đấy, ngài Soutetsu. Cách giải thích đó gần như khớp hoàn toàn với thực tế ạ.」"
# monologue
# JP: うれしげなハチロク。\nナビから教わったことだとは言いがたくなる。
2107 = "Hachiroku trông rất vui vẻ. Khiến tôi khó lòng thú nhận rằng mình đã học được điều đó từ Navi."
# 【ハチロク】
# display as 八六
# JP: 「ですのでわたくしたちは、運転支障発生時でも、\n臨時ダイアを極めて短時間で作成、提案可能となります」
1393 = "「Vì vậy, ngay cả khi xảy ra sự cố vận hành, chúng em vẫn có thể lập và đề xuất biểu đồ chạy tàu tạm thời trong thời gian cực ngắn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「支障を回復するための最善策を短期間に取りうる、\nということか？」
1152 = "「Nghĩa là có thể đưa ra giải pháp tốt nhất để khắc phục sự cố trong thời gian ngắn sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、左様です」
1452 = "「Vâng, chính xác là vậy.」"
# monologue
# JP: ならば、ハチロクたちの\x%l共感;#00ffc040;共感%l;#;通信の運用法と、\nナビたち、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの機能との根幹は同じなのだろう。
2071 = "Nếu vậy thì cách thức vận hành giao tiếp \\x%l共感;#00ffc040;cộng cảm%l;#; của Hachiroku, và chức năng của hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#; như Navi về cơ bản là giống nhau."
# monologue
# JP: （地上からエンジン自動車が駆逐され、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;自動車に取って代わられた最大の理由、か――）
2121 = "（Đó chính là lý do lớn nhất khiến xe ô tô động cơ đốt trong bị loại bỏ khỏi mặt đất, và được thay thế bằng xe \\x%lエアクラ;#00ffc040;Aircra%l;#; sao——）"
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;通信による事故情報と迂回ルートの共用。\nそして、ナビによるオートパイロット。
2075 = "Chia sẻ thông tin tai nạn và tuyến đường vòng thông qua giao tiếp \\x%l共感;#00ffc040;cộng cảm%l;#;. Và chế độ lái tự động nhờ hệ thống định vị."
# monologue
# JP: それらは渋滞という現象をほぼ根絶し、\n車移動による所要時間を確定可能なものへと変えた。
1903 = "Những điều đó gần như đã triệt tiêu hoàn toàn hiện tượng tắc đường, biến thời gian di chuyển bằng xe cộ thành một con số có thể xác định chính xác."
# 【双鉄】
# display as 雙鐵
# JP: 「……\x%l共感;#00ffc040;共感%l;#;通信とは便利なものだな」
927 = "「……Giao tiếp \\x%l共感;#00ffc040;cộng cảm%l;#; quả là một thứ tiện lợi nhỉ.」"
# monologue
# JP: 言えば大きく。\nとても誇らしげにハチロクが頷く。
2052 = "Tôi vừa dứt lời.\nHachiroku đã gật đầu đầy tự hào."
# 【ハチロク】
# display as 八六
# JP: 「はい。ですのでわたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n運行とダイアの全てを把握し、制御できたのです」
1440 = "「Vâng. Vì thế, những \\x%lレイルロオド;#00ffc040;Railord%l;#; như chúng em, mới có thể nắm bắt và kiểm soát toàn bộ quá trình vận hành cũng như biểu đồ chạy tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、[ろおど,3]Lordか。支配者か」
1386 = "「Vì vậy mới gọi là Lord sao. Kẻ chi phối.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。レイルも車両も、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。\n全てを支配する者でしたら、それは双鉄様たち人間です」
1670 = "「Không phải đâu thưa ngài Soutetsu. Dù là đường ray, phương tiện hay \\x%lレイルロオド;#00ffc040;Railord%l;#;. Kẻ chi phối tất cả những thứ đó, chính là con người các ngài.」"
# monologue
# JP: ごく当然、と。\nよどみも力みも無い言葉。
2014 = "Như một lẽ đương nhiên. Những lời nói không chút ngập ngừng hay gượng ép."
# monologue
# JP: ハチロクの小さな手には不似合いなほど長い指が、\n空中に、すらすらと――Roadの文字をかいていく。
1824 = "Những ngón tay dài đến mức không hề ăn nhập với đôi bàn tay nhỏ bé của Hachiroku, viết những nét chữ Road một cách trôi chảy——trong không trung."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちの把握と制御は、その道筋をつけるため。\nわたくしたちは線路と同じ、RailRoadにすぎません」
1374 = "「Việc nắm bắt và kiểm soát của chúng em, chỉ là để vạch ra con đường đó. Chúng em cũng giống như đường ray, chỉ là RailRoad mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1227 = "「Ra là vậy.」"
# monologue
# JP: 強い誇りが、揺るがぬものが、言葉の端々に満ちている。
1932 = "Niềm tự hào mãnh liệt, sự kiên định không lay chuyển, tràn ngập trong từng lời nói."
# monologue
# JP: 現実の交通事情がどうありどう変化しようとも、\n鉄道こそは、ハチロクの変わらぬ“最高”なのだと。
2000 = "Dù tình hình giao thông thực tế có ra sao, có thay đổi thế nào đi chăng nữa, đối với Hachiroku, đường sắt vẫn luôn là điều \"tuyệt vời nhất\" không bao giờ thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「そこまでハチロクが誇るものなら。お前の制御する……\n駆動車両、か？　それに、僕も乗りたいものだ」
1416 = "「Nếu Hachiroku đã tự hào đến vậy. Thì phương tiện động lực…… mà em điều khiển sao? Tôi cũng muốn được đi thử một lần.」"
# 【ハチロク】
# display as 八六
# JP: 「それは……いつか。\nその……いつか、きっと――かなうものなら」
1618 = "「Chuyện đó……một ngày nào đó. Một ngày nào đó, chắc chắn——nếu có thể trở thành hiện thực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1269 = "「Hửm?」"
# monologue
# JP: いきなり歯切れが悪くなる。\nしばらく待つ。続く沈黙。
1914 = "Đột nhiên em ấy lại ấp úng. Tôi chờ đợi một lúc. Nhưng sự im lặng vẫn tiếp diễn."
# monologue
# JP: ならば――と話を、\n先送りした疑問点へと巻き戻す。
1971 = "Nếu vậy——tôi quyết định, quay lại với những thắc mắc đã gác lại lúc trước."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道用語なのだろうが、\n\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;だの臨時ダイアだのとは、なんだ？」
1217 = "「Chắc đó là thuật ngữ đường sắt, nhưng \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; với biểu đồ tạm thời là gì vậy?」"
# monologue
# JP: ほっと、安堵したような息。
1811 = "Một tiếng thở phào nhẹ nhõm."
# monologue
# JP: そして再びハチロクの言葉は、\n立板に水と流れだす。
2095 = "Và rồi những lời của Hachiroku, lại tuôn trào trôi chảy như nước chảy mây trôi."
# 【ハチロク】
# display as 八六
# JP: 「\x%l列車;#00ffc040;列車%l;#;の運行計画のことです。適正な\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;は、\n事故を防止し、運転効率を向上させます」
1436 = "「Đó là kế hoạch vận hành của \\x%l列車;#00ffc040;đoàn tàu%l;#;. Một \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; hợp lý, sẽ giúp ngăn ngừa tai nạn và nâng cao hiệu quả vận hành.」"
# 【双鉄】
# display as 雙鐵
# JP: 「事故の防止、か――」
1654 = "「Ngăn ngừa tai nạn, sao——」"
# monologue
# JP: けれども、それが引っかかる。
1937 = "Nhưng, chính điều đó lại khiến tôi vướng bận."
# monologue
# JP: “だったらなんで”と、過去が泣き……\n無為なこととはわかっていても、尋ねてしまう。
877 = "\"Vậy thì tại sao chứ\", quá khứ trong tôi đang gào thét…… Dù biết là vô ích, nhưng tôi vẫn không kìm được mà buông lời hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、事故を起こす\x%l列車;#00ffc040;列車%l;#;は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に制御されていないものなのか？」
1624 = "「Vậy, những \\x%l列車;#00ffc040;đoàn tàu%l;#; gây ra tai nạn, là những chuyến tàu không được \\x%lレイルロオド;#00ffc040;Railord%l;#; điều khiển sao?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――」
1136 = "「Không phải ạ——」"
# monologue
# JP: ハチロクの顔が苦しげに歪む。\n声から温度が抜け落ちる。
1849 = "Khuôn mặt Hachiroku méo mó đầy đau khổ. Giọng nói cũng trở nên lạnh lẽo."
# 【ハチロク】
# display as 八六
# JP: 「……例えば、線路にされた置き石を、わたくし達は\n画像センサ――いわば目視でしか発見できません」
938 = "「……Ví dụ như, với những hòn đá đặt trên đường ray, chúng em chỉ có thể phát hiện bằng cảm biến hình ảnh——nói cách khác là bằng mắt thường.」"
# 【双鉄】
# display as 雙鐵
# JP: 「目視でしか？　それでは人間と」
1247 = "「Chỉ bằng mắt thường sao? Vậy thì có khác gì con người.」"
# 【ハチロク】
# display as 八六
# JP: 「大差ありません。ので、置き石に気付いたときには、\nもう\x%lブレーキ;#00ffc040;ブレーキ%l;#;が間に合わないことがほとんどです」
1148 = "「Đúng là không khác biệt nhiều ạ. Vì thế, khi phát hiện ra hòn đá, thì hầu hết các trường hợp đều không kịp \\x%lブレーキ;#00ffc040;hãm phanh%l;#; nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。線路におきた障害に対しては、\n都度での対処しかできない、というわけか」
1226 = "「Ra vậy. Đối với những chướng ngại vật trên đường ray, thì chỉ có thể tùy cơ ứng biến thôi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。双鉄様」
1492 = "「Đúng vậy ạ. Thưa ngài Soutetsu.」"
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も万能ではない。\n無論、\x%l共感;#00ffc040;共感%l;#;通信も、\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも。
56 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không phải là vạn năng. Tất nhiên, giao tiếp \\x%l共感;#00ffc040;cộng cảm%l;#; hay hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng vậy."
# monologue
# JP: ゆえに、どれほど技術が発展しようと事故は絶えない。\n無論、事故の真なる原因は、技術などには無いのだが。
1960 = "Vì thế, dù công nghệ có phát triển đến đâu thì tai nạn vẫn không bao giờ chấm dứt. Tất nhiên, nguyên nhân thực sự của tai nạn không nằm ở công nghệ."
# 【ハチロク】
# display as 八六
# JP: 「そうした事態を防止するため、\n\x%l保線;#00ffc040;[ほせんがかり,2]保線係%l;#;という職員達が線路の管理をしていましたが……」
1493 = "「Để ngăn chặn những tình huống như vậy, đã từng có những nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; phụ trách quản lý tuyến đường, nhưng……」"
# monologue
# JP: 無理に、絞り出したような声。
1839 = "Một giọng nói như cố sức nặn ra."
# 【ハチロク】
# display as 八六
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、\x%l保線;#00ffc040;保線%l;#;係の不足も甚だしい物となりました。\nあの時期、鉄道事故が多発した一因は、それです」
912 = "「Vào cuối thời kỳ \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, tình trạng thiếu hụt nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã trở nên vô cùng nghiêm trọng. Đó chính là một trong những nguyên nhân khiến tai nạn đường sắt xảy ra liên tục vào thời điểm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期……」
911 = "「Cuối thời kỳ \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;……」"
# monologue
# JP: 僕が少年だったころ。\nあの事故のころ。
1953 = "Là lúc tôi còn là một cậu bé. Vào thời điểm xảy ra vụ tai nạn đó."
# monologue
# JP: その時代は、後に、\nひどく簡潔に呼称されるようになった。
2080 = "Thời đại đó, sau này, đã được gọi bằng một cái tên vô cùng ngắn gọn."
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「[だいはいせん,2]大廃線時代」
1304 = "「Thời kỳ Đại bãi bỏ tuyến đường sắt.」"
# monologue
# JP: ハチロクと僕の声が重なる。
1828 = "Giọng của tôi và Hachiroku vang lên cùng lúc."
# monologue
# JP: それが支えになったわけでもあるまいが、\nハチロクは、落としていた視線を持ち上げ直す。
2098 = "Dù điều đó có lẽ chẳng phải là chỗ dựa gì, nhưng Hachiroku đã ngước ánh nhìn đang cụp xuống lên."
# 【ハチロク】
# display as 八六
# JP: 「皮肉なことに。わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がその真価を\nフルに発揮したのも、あの時代でした」
1518 = "「Trớ trêu thay. Đó cũng chính là thời đại mà những \\x%lレイルロオド;#00ffc040;Railord%l;#; như chúng em đã phát huy trọn vẹn giá trị đích thực của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……事故が多発したせいか？\n臨時ダイア、とやらが必要になったから？」
937 = "「……Là do tai nạn xảy ra thường xuyên sao? Vì cần đến những biểu đồ chạy tàu tạm thời đó à?」"
# 【ハチロク】
# display as 八六
# JP: 「ご明察です、双鉄様。\nしかし――やがて…………」
1663 = "「Ngài thật tinh ý, thưa ngài Soutetsu. Nhưng——rồi cuối cùng…………」"
# monologue
# JP: ハチロクの声が途切れてしまう。\n事故の多発、路線廃止、\x%l列車;#00ffc040;列車%l;#;の廃棄――
1856 = "Giọng Hachiroku nghẹn lại. Tai nạn xảy ra liên miên, bãi bỏ tuyến đường, loại bỏ \\x%l列車;#00ffc040;đoàn tàu%l;#;——"
# monologue
# JP: 大廃線時代の終焉は、\nそのまま、鉄道の時代の終焉を意味するがゆえ。
1907 = "Sự kết thúc của thời kỳ Đại bãi bỏ tuyến đường sắt, cũng đồng nghĩa với sự kết thúc của thời đại đường sắt."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが汰斗様に買い取られたのも、その時期です」
1383 = "「Đó cũng là lúc em được ngài Taito mua lại.」"
# monologue
# JP: ハチロクの目が、もう一度、キャノピーの外に向けられる。
1844 = "Ánh mắt Hachiroku, một lần nữa, lại hướng ra ngoài cửa kính buồng lái."
# monologue
# JP: 暗い目だ。\n見ていると、こちらまで引かれそうになる。
1975 = "Một đôi mắt tăm tối. Nhìn vào đó, tôi có cảm giác như mình cũng sắp bị cuốn theo."
# 【ハチロク】
# display as 八六
# JP: 「しかし、わたくしにはその時期の記憶がありません。\nこの美しい町を見たかどうかさえ、覚えていないのです」
1523 = "「Nhưng mà, em lại không có ký ức về khoảng thời gian đó. Thậm chí em còn không nhớ mình đã từng nhìn thấy thành phố xinh đẹp này hay chưa nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見ていないだろう。ここからは」
1565 = "「Chắc là chưa nhìn thấy đâu. Từ trên này.」"
# monologue
# JP: 事実の指摘。軽く明るく。
1957 = "Chỉ ra sự thật. Bằng một giọng điệu nhẹ nhàng và tươi sáng."
# monologue
# JP: そして指差し、ハチロクの視点を前へと向ける。\nよどみの全てを、空へと飛ばしてしまえるように。
2097 = "Sau đó tôi chỉ tay, hướng ánh nhìn của Hachiroku về phía trước. Như muốn thổi bay mọi muộn phiền vào không trung."
# 【双鉄】
# display as 雙鐵
# JP: 「歩いて見る御一夜の町は、また別の顔だ。\n歩くうち、あるいは見覚えに出くわすかもしれん」
1506 = "「Thành phố Ohimitera khi dạo bước ngắm nhìn sẽ mang một vẻ đẹp khác. Trong lúc đi dạo, biết đâu em lại bắt gặp một khung cảnh quen thuộc nào đó.」"
# 【ハチロク】
# display as 八六
# JP: 「そう……ですね。\nはい。双鉄様のおっしゃるとおりと思います」
1591 = "「Cũng……đúng nhỉ. Vâng. Em nghĩ ngài Soutetsu nói đúng.」"
# monologue
# JP: うん、と頷き。\n持ち上げ直した顔には表情が戻っている。
1869 = "Em ấy gật đầu cái rụp. Khuôn mặt ngước lên đã khôi phục lại biểu cảm."
# monologue
# JP: “無理に浮かべた”。そう思わせる笑顔に逆に、\n普段のハチロクがどれほど自然に笑うかを知る。
872 = "\"Một nụ cười gượng gạo\". Chính nụ cười ấy lại cho tôi thấy, bình thường Hachiroku cười tự nhiên đến nhường nào."
# 【ハチロク】
# display as 八六
# JP: 「それにしても、\n双鉄さまは少しお人が悪いですね」
1586 = "「Mà này,\nNgài Soutetsu cũng xấu tính thật đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？」
1376 = "「Tôi á?」"
# 【ハチロク】
# display as 八六
# JP: 「だって……\nよりにもよって\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗せるだなんておっしゃって」
1421 = "「Vì ngài…… Lại bảo là sẽ cho em đi \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1272 = "「À.」"
# monologue
# JP: なるほど。
1885 = "Ra là vậy."
# monologue
# JP: なにより深く鉄道を愛し、誇るそれ故――\nハチロクは、こうまで\x%lエアクラ;#00ffc040;エアクラ%l;#;を嫌うのか。
1941 = "Chính vì yêu và tự hào về đường sắt hơn bất cứ thứ gì—— Nên Hachiroku mới ghét \\x%lエアクラ;#00ffc040;Aircra%l;#; đến thế sao."
# 【ハチロク】
# display as 八六
# JP: 「飛行機なら飛行機と最初からおっしゃってくだされば。\nわたくしもお見苦しいところを見せずにすみましたのに」
1581 = "「Nếu là máy bay thì giá như ngài nói ngay từ đầu. Em đã không để ngài phải thấy bộ dạng khó coi của mình rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
1201 = "「Cũng đúng nhỉ.」"
# monologue
# JP: ハチロクの指摘は正しい。\n今の僕は、人が悪い。
1833 = "Hachiroku nói đúng.\nLúc này tôi quả thực rất xấu tính."
# monologue
# JP: ナビと無言の共謀をした沈黙で、\nハチロクのことを騙している。
1901 = "Bằng sự im lặng đồng lõa với Navi, tôi đang lừa dối Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「人が悪いのも仕方ないのだ。\nなにせ僕は、御一夜市の生まれではない」
1200 = "「Xấu tính thì cũng đành chịu thôi. Dù sao thì tôi cũng không sinh ra ở thành phố Ohimitera mà.」"
# 【ハチロク】
# display as 八六
# JP: 「そうなのですか？」
1536 = "「Vậy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうなのだ」
1502 = "「Ừm. Là vậy đấy.」"
# monologue
# JP: 答えれば、ハチロクはくす、と小さく笑う。
2032 = "Nghe tôi trả lời, Hachiroku khẽ cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「ならわたくしは、\n双鉄様のお人の悪さに感謝しなくてはいけませんね？」
1635 = "「Vậy thì em, phải cảm ơn sự xấu tính của ngài Soutetsu rồi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「感謝？　なぜだ」
1365 = "「Cảm ơn? Tại sao chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「最初から飛行機と聞いていたなら、わたくしきっと、\n慣れている風を装って、きょろきょろ出来ませんでした」
1580 = "「Nếu biết là máy bay ngay từ đầu, chắc chắn em sẽ cố tỏ ra quen thuộc, chứ không dám ngó nghiêng xung quanh thế này đâu.」"
# monologue
# JP: 言って、ハチロクはあどけなく、\n身を乗り出してまた眼下を見る。
1830 = "Nói rồi, Hachiroku ngây thơ rướn người về phía trước, tiếp tục ngắm nhìn khung cảnh bên dưới."
# 【ハチロク】
# display as 八六
# JP: 「川も豊かで見事です。\nあの水を、先ほどわたくしはいただいたのでしょうか？」
1619 = "「Dòng sông dồi dào và tráng lệ quá. Đó có phải là dòng nước mà lúc nãy em đã được uống không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。クマ川の水だ。もっとも、酒造りに使うのは\nもっと上流――源流に近いところの水だそうだが」
1280 = "「Ừm. Nước sông Kuma đấy. Dù nghe nói nước dùng để nấu rượu là ở thượng nguồn——gần nguồn hơn cơ.」"
# 【ハチロク】
# display as 八六
# JP: 「素晴らしいですね。いつか、機会があれば、\nこの素晴らしい川の源を眺めてみたいものです」
1534 = "「Tuyệt vời quá. Một ngày nào đó, nếu có cơ hội, em cũng muốn được ngắm nhìn thượng nguồn của dòng sông tuyệt vời này.」"
# monologue
# JP: 驚いた。\n気持ちが、そのまま口からこぼれる。
1951 = "Tôi ngạc nhiên.\nCảm xúc cứ thế bật thốt ra thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「同じことを思うのだな、僕と」
1262 = "「Em cũng nghĩ giống tôi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様も？」
1662 = "「Cả ngài Soutetsu cũng vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ここに引き取られてすぐのことだがな」
1284 = "「Ừm. Dù đó là chuyện ngay sau khi tôi được nhận nuôi ở đây thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「引き取られて……ですか？」
1407 = "「Được nhận nuôi……sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕は右田の養子なのだ」
1282 = "「Ừ. Tôi là con nuôi của nhà Migita.」"
# monologue
# JP: 隠していても仕方がない。\nが、ハチロクは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1985 = "Giấu giếm cũng chẳng để làm gì. Nhưng Hachiroku là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: 気をつかわれてはわずらわしいので、\n鉄道事故、という一点のみは語らずにおく。
1948 = "Vì không muốn em ấy phải bận tâm, nên tôi quyết định giấu đi chi tiết về vụ tai nạn đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は事故で家族の全てを失くし、右田家に――\n汰斗さんに引き取られ、その[ようそん,1]養孫となった」
1378 = "「Tôi đã mất tất cả người thân trong một vụ tai nạn, và được nhà Migita—— được ông Taito nhận nuôi, trở thành cháu nuôi của ông ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「汰斗様に……双鉄様も。\nっ！　だから名前の話のときに、日々姫様は」
1661 = "「Ngài Taito……Cả ngài Soutetsu nữa. A! Thảo nào lúc nói về cái tên, cô Hibiki lại」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれは、僕が養子だという話を嫌うのだ。\n僕は気にせんのだが……覚えておいてもらえば助かる」
1633 = "「Em ấy ghét chuyện tôi là con nuôi. Tôi thì chẳng bận tâm đâu……nhưng nếu em nhớ điều đó thì tốt quá.」"
# monologue
# JP: 軽く。ハチロクは瞳を伏せる。
1852 = "Nhẹ nhàng. Hachiroku cụp mắt xuống."
# 【ハチロク】
# display as 八六
# JP: 「はい。以降は間違いなく。\n知らぬこととはいえ、失礼しました」
1306 = "「Vâng. Từ nay em sẽ không phạm sai lầm nữa. Dù là không biết, nhưng em đã thất lễ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに、知らぬがゆえの失礼なら僕もした。\nそうだ。これでおあいこということにならんか？」
1265 = "「Không sao, thất lễ vì không biết thì tôi cũng từng làm rồi. Đúng rồi. Vậy là chúng ta hòa nhé?」"
# monologue
# JP: 伏せた瞳がもちあがる。\nいたずらそうな光が宿る。
1850 = "Ánh mắt cụp xuống nay đã ngước lên. Ánh lên một tia sáng tinh nghịch."
# 【ハチロク】
# display as 八六
# JP: 「うふふ。左様でした。お人の悪い双鉄様に――\nわたくし、寝込みを襲われ脱がされてしまいましたね」
1291 = "「Ufufu. Đúng vậy nhỉ. Bởi ngài Soutetsu xấu tính—— mà em đã bị tấn công lúc đang ngủ và bị lột sạch đồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、人聞きの悪いことを」
1278 = "「Này này, em nói thế dễ gây hiểu lầm lắm đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「お空ですよ？　双鉄様。\n飛ぶ鳥は、わたくしたちの声などきっと聞きません」
1373 = "「Chúng ta đang ở trên trời mà? Ngài Soutetsu. Chim chóc bay ngang qua chắc chắn sẽ không nghe thấy giọng chúng ta đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うー……む」
1270 = "「Ư……m.」"
# monologue
# JP: それはそうだが、ナビが聞いてる。\n妙な誤解をしないでくれればいいのだが。
2050 = "Nói thì đúng là vậy, nhưng Navi đang nghe đấy. Hy vọng cô ấy không hiểu lầm chuyện gì kỳ quặc."
# 【ハチロク】
# display as 八六
# JP: 「ご安心ください？　双鉄様。わたくし、もう少しも、\n怒っても、不愉快と思ってもおりません」
1362 = "「Xin ngài cứ yên tâm? Ngài Soutetsu. Em không hề, giận dữ hay cảm thấy khó chịu một chút nào đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1433 = "「Vậy sao.」"
# monologue
# JP: そうなのだろうなと納得させてくれるほど、\nハチロクの表情は幸せそうだ。
1867 = "Biểu cảm của Hachiroku hạnh phúc đến mức, khiến tôi tin chắc rằng điều em ấy nói là sự thật."
# monologue
# JP: 切り替えの早さは物であるからなのかもしれんが――\nあるいは性格的に、僕と似ているのかもしれん。
1943 = "Sự chuyển đổi cảm xúc nhanh chóng đó có lẽ là vì em ấy là một đồ vật chăng—— Hoặc cũng có thể về mặt tính cách, em ấy giống tôi."
# 【ハチロク】
# display as 八六
# JP: 「ですが、まだおあいこにはできません」
1145 = "「Nhưng mà, vẫn chưa thể hòa được đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？　怒ってないのなら――」
1507 = "「Tại sao? Nếu em không giận thì——」"
# 【ハチロク】
# display as 八六
# JP: 「怒ってないから、むしろです。\n平手打ちを余分にひとつ。わたくしは双鉄様に」
1318 = "「Chính vì không giận nên mới thế ạ. Một cái tát tay thừa thãi. Em đã dành cho ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。よかろう」
1225 = "「Ra vậy. Được thôi.」"
# monologue
# JP: （ピンっ！）
2118 = "（Búng!）"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1271 = "「A.」"
# monologue
# JP: おでこを軽く、指先でつつく。\nわずかな痛みも与えぬ弱さで。
1955 = "Tôi dùng đầu ngón tay khẽ búng vào trán em ấy. Nhẹ đến mức chẳng gây ra chút đau đớn nào."
# 【双鉄】
# display as 雙鐵
# JP: 「体格差を加味すればこんなところだろう。\nいいな？　ハチロク、これで手打ちだ」
1678 = "「Nếu tính đến sự chênh lệch thể hình thì thế này là vừa rồi. Được chứ? Hachiroku, vậy là hòa nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1380 = "「Em hiểu rồi, thưa ngài Soutetsu. Hòa nhau, không ai nợ ai, sòng phẳng rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1285 = "「嗯」" 
# monologue
# JP: 話が早い。\nやはり、性格的に似ているのかも――ああ、いや。
1924 = "Nói chuyện thật dễ dàng. Quả nhiên, có lẽ tính cách của chúng tôi khá giống nhau——À, không."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも汰斗さんに買い取られたと言っていたな。\nならば僕たちは、似たもの同士なのかもしれん」
1209 = "「Hachiroku cũng từng nói là được ông Taito mua lại nhỉ. Vậy thì chúng ta, có lẽ là những kẻ giống nhau đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「本当にそうかもしれませんね。\n双鉄様も、この川の源に興味がおありとのことですし」
1589 = "「Có lẽ là vậy thật. Cả ngài Soutetsu cũng có hứng thú với cội nguồn của dòng sông này mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「興味をもって、実際歩いた。\n無論、子供の足で[さかのぼ]遡りきれるものではなかったが」
1138 = "「Tôi đã có hứng thú, và thực sự đã đi bộ đến đó. Tất nhiên, với đôi chân của một đứa trẻ thì không thể nào đi ngược dòng đến tận cùng được.」"
# 【ハチロク】
# display as 八六
# JP: 「歩いて！？　遡られたのですか、この川を」
1346 = "「Đi bộ á!? Ngài đã đi ngược dòng, con sông này sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。興味があり、時間と体力があるように思え、\n金はさっぱりなかったからな」
1426 = "「Ừ. Tôi có hứng thú, lại nghĩ mình có thời gian và thể lực, trong khi tiền bạc thì chẳng có một đồng nào.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1622 = "「Chà.」"
# monologue
# JP: なにが面白かったのか、\nハチロクはくすりと小さく笑う。
1795 = "Không biết có gì thú vị, mà Hachiroku lại cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「歩かれて、どうなりました？」
1408 = "「Rồi ngài đi bộ, kết quả ra sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「動けなくなり、翌朝を迎え発見、保護され――\n真闇姉に、こっぴどく怒られてげんこつをもらった」
1562 = "「Không thể nhúc nhích được nữa, đến sáng hôm sau thì được phát hiện, bảo vệ—— Rồi bị chị Mayami mắng cho một trận tơi bời và ăn một cú đấm.」"
# 【ハチロク】
# display as 八六
# JP: 「げんこつ、ですか？　あの方が？」
1577 = "「Cú đấm, sao ạ? Chị ấy á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが想像しているのの、多分数倍は痛い奴だ。\nこつんでもごつんでもなく、ガン！　と来た」
1358 = "「Chắc chắn là đau gấp mấy lần những gì Hachiroku tưởng tượng đấy. Không phải là cái gõ nhẹ hay cái cốc đầu đâu, mà là một cú giáng trời giáng! luôn.」"
# 【ハチロク】
# display as 八六
# JP: 「それほど強く？」
1397 = "「Mạnh đến thế cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。目から火花が飛び散った。\nそこに怒涛の隈元弁で、手ひどく叱りつけられたのだ」
1432 = "「Ừm. Mắt tôi nổ đom đóm luôn. Sau đó là một trận mắng xối xả bằng tiếng Kumamoto nữa chứ.」"
# monologue
# JP: 小さく、ハチロクが頷き。黙る。
1865 = "Hachiroku khẽ gật đầu. Rồi im lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「『どこに行こうと勝手だが、行き先を言ってからにしろ。\n探すこちらが大変だ』と、そんな意味だと伝わってきた」
917 = "「'Muốn đi đâu thì tùy, nhưng ít ra cũng phải nói trước một tiếng chứ. Người đi tìm cực khổ lắm đấy', đại loại là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「ごくまっとうなお叱りですね」
1616 = "「Một lời trách mắng rất chính đáng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕もそう思った。そして同時に――\nこの人は僕を叱ってくれると、ホっとした」
1430 = "「Đúng vậy. Tôi cũng nghĩ thế. Và đồng thời—— Tôi cảm thấy nhẹ nhõm vì người này đã chịu mắng mình.」"
# monologue
# JP: ……そうだった。僕はほっとしたのだ。\n事故被害者として腫れ物のように扱うのではなく。
883 = "……Đúng vậy. Tôi đã cảm thấy nhẹ nhõm. Bởi vì họ không đối xử với tôi như một nạn nhân tai nạn cần được nâng như nâng trứng."
# monologue
# JP: ごくまっとうに、ごくごく普通に――\n僕を扱ってくれる人間に、ようやく出会えて。
2025 = "Một cách rất chính đáng, rất đỗi bình thường—— Cuối cùng tôi cũng gặp được những người đối xử với mình như bao người khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ホっとして。だから、家族になれたのだろうな。\n今となっては、そう感じる」
1311 = "「Nhờ sự nhẹ nhõm đó. Mà chúng tôi mới có thể trở thành một gia đình. Bây giờ nghĩ lại, tôi cảm thấy như vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「素敵な方なのですね、真闇様は」
1538 = "「Chị Mayami quả là một người tuyệt vời nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。誰より頼れる人だ。\nあの人がひとたび本気になれば――…………」
1427 = "「Đúng vậy. Một người đáng tin cậy hơn bất kỳ ai. Một khi chị ấy đã nghiêm túc thì——…………」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
1666 = "「Ngài Soutetsu?」"
# monologue
# JP: おかしい。なぜだ。考えろ。\n真闇姉が反対なことは明白だ。
1909 = "Kỳ lạ thật. Tại sao chứ. Suy nghĩ đi. Rõ ràng là chị Mayami phản đối chuyện này."
# 【双鉄】
# display as 雙鐵
# JP: 「なのになぜ、帝都の僕にまで届くほど――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動が活発になってしまったのだ？」
1516 = "「Nhưng tại sao, nó lại lan đến tận chỗ tôi ở Đế Đô—— Chiến dịch thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; lại trở nên rầm rộ đến vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動っ！？」
1344 = "「Chiến dịch thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;!?」"
# monologue
# JP: ハチロクの声が跳ね上がる。
1860 = "Giọng Hachiroku vút cao lên."
# 【ハチロク】
# display as 八六
# JP: 「この町にですか？\nこの川の水を、工場で汚そうというのですか？」
1299 = "「Ở thành phố này sao? Họ định dùng nhà máy để làm ô nhiễm nguồn nước của dòng sông này ư?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういう話だ。\n僕は、それを食い止めたいと帝都から戻ってきた」
1320 = "「Là chuyện đó đấy. Tôi từ Đế Đô trở về là để ngăn chặn điều đó.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは素晴らしいオーナーに巡りあいました！」
1381 = "「Em đã gặp được một người chủ tuyệt vời rồi!」"
# monologue
# JP: 敵意にも近い反発から、一気に感動と喜びへ。\n日々姫が百面相ならば、このハチロクは百感情だ。
1842 = "Từ sự phản kháng gần như thù địch, bỗng chốc chuyển sang cảm động và vui sướng. Nếu Hibiki là người có trăm khuôn mặt, thì Hachiroku này có trăm cảm xúc."
# 【ハチロク】
# display as 八六
# JP: 「わたくしをお役立てください、双鉄様。\nこの美しい川の町を、悪の手に渡してはいけません」
1592 = "「Xin hãy để em giúp một tay, thưa ngài Soutetsu. Không thể để thành phố bên sông xinh đẹp này rơi vào tay kẻ ác được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「悪」
1672 = "「Kẻ ác.」"
# monologue
# JP: 随分と強い言葉だ。
2021 = "Một từ ngữ khá nặng nề."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、悪なのか？」
897 = "「Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, là kẻ ác sao?」"
# 【ハチロク】
# display as 八六
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものが、\n名前の中に、そもそも悪を内包するような存在です」
887 = "「Bản thân \\x%lエアクラ;#00ffc040;Aircra%l;#;, ngay từ cái tên đã bao hàm ý nghĩa của cái ác rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1268 = "「唔」" 
# monologue
# JP: エ“アク”ラ、という言葉遊びか。
1886 = "E\"aku\"ra, là trò chơi chữ sao."
# monologue
# JP: あまり得意な分野ではないが、\n遊びであれば付き合ってみよう。
2099 = "Dù không phải là lĩnh vực tôi giỏi, nhưng nếu là đùa vui thì cứ thử hùa theo xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お前が今ここで、\n身の処し方に困っているのも、名の故か？」
1590 = "「Nếu vậy, việc em đang ở đây và không biết phải cư xử ra sao, cũng là do cái tên đó sao?」"
# 【ハチロク】
# display as 八六
# JP: 「え？　それは……\nいかなる意味でございましょうか？」
1264 = "「Dạ? Chuyện đó……\ncó ý nghĩa gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「“流浪”を、お前たちはその名に内包している」
924 = "「Chữ 'Lưu lang' (lang thang), đã được bao hàm trong cái tên của các em rồi.」"
# monologue
# JP: あ、と小さくつぶやいて。\nハチロクはまた、空中に指で文字を書く。
1818 = "A, Hachiroku khẽ thốt lên. Rồi em ấy lại dùng ngón tay viết chữ vào không trung."
# 【ハチロク】
# display as 八六
# JP: 「レイ“ルロオ”ド――なるほど、暗示的ですね。\n悪に駆逐され、われわれは流浪に身を落とした」
1645 = "「Rei-\"ruroo\"-do——Ra vậy, quả là một sự ám chỉ. Bị cái ác xua đuổi, chúng em đành phải chịu cảnh lưu lang.」"
# monologue
# JP: 遊びで返したつもりの言葉を、\nハチロクは真顔で受け止める。
1888 = "Những lời tôi chỉ định nói đùa, lại được Hachiroku đón nhận với vẻ mặt vô cùng nghiêm túc."
# monologue
# JP: その唇が、真一文字に結ばれやがて、小さく歪む。
1841 = "Đôi môi em ấy mím chặt thành một đường thẳng, rồi khẽ méo xệch đi."
# 【ハチロク】
# display as 八六
# JP: 「やはり悪です。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;も、\x%lエアクラ;#00ffc040;エアクラ%l;#;を作る工場も」
1485 = "「Quả nhiên là cái ác. Cả \\x%lエアクラ;#00ffc040;Aircra%l;#;, và cả nhà máy sản xuất \\x%lエアクラ;#00ffc040;Aircra%l;#; nữa.」"
# monologue
# JP: 淡々と。ひどく冷たく吐き捨てる。
2057 = "Thản nhiên. Em ấy buông những lời vô cùng lạnh lẽo."
# 【ハチロク】
# display as 八六
# JP: 「人々の暮らしから鉄道を奪い、大廃線時代を招いた。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の犯した罪を、わたくしは決して許しません」
1348 = "「Cướp đi đường sắt khỏi cuộc sống của người dân, gây ra thời kỳ Đại bãi bỏ tuyến đường sắt. Những tội lỗi mà \\x%lエアクラ;#00ffc040;Aircra%l;#; đã gây ra, em tuyệt đối sẽ không tha thứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「罪」
1564 = "「Tội lỗi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「より便利だったから人に選ばれただけの話です。\nそれを\x%lエアクラ;#00ffc040;エアクラ%l;#;の罪というなら、逆恨みでは？」
1169 = "「Chỉ là vì tiện lợi hơn nên mới được con người lựa chọn thôi. Nếu gọi đó là tội lỗi của \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì chẳng phải là oán hận vô lý sao?」"
# 【ハチロク】
# display as 八六
# JP: 「何者ですかっ！？」
1457 = "「Kẻ nào đó!?」"
# monologue
# JP: 完全に不意打ちのナビの声。\nが、ハチロクは悲鳴もあげず、鋭い目つきで誰何する。
2129 = "Giọng nói của Navi vang lên hoàn toàn bất ngờ. Nhưng Hachiroku không hề hét lên, mà chỉ dùng ánh mắt sắc lẹm để chất vấn."
# 【ハチロク】
# display as 八六
# JP: 「こそこそ隠れて物申すとは卑怯千万。\n恥じ入りなさい。そして、姿を現しなさい」
1575 = "「Lén lút trốn chui trốn nhủi để lên tiếng thật là hèn hạ. Hãy biết xấu hổ đi. Và mau hiện nguyên hình ra đây.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「隠れてなどいません。\n本機の姿は、あなたの視界に捉えられています」
1147 = "「Tôi không hề lẩn trốn. Hình dáng của hệ thống này vẫn luôn nằm trong tầm nhìn của cô đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「本機？　では」
1480 = "「Hệ thống này? Lẽ nào.」"
# monologue
# JP: 左右を見渡す。\n目に宿っていた険がいくらか、柔らかになる。
1930 = "Em ấy nhìn sang trái phải. Sự gay gắt trong ánh mắt đã dịu đi phần nào."
# 【ハチロク】
# display as 八六
# JP: 「あなたは――この飛行機なのですか？」
1186 = "「Ngươi——chính là chiếc máy bay này sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「飛行機ではありません」
1146 = "「Không phải là máy bay.」"
# monologue
# JP: ナビは静かに怒っている。\n止めはしない。
2131 = "Navi đang tức giận trong im lặng.\nTôi không can ngăn."
# monologue
# JP: 止めたところで、わだかまりは深くなるだけだ。
1982 = "Dù có can ngăn thì cũng chỉ khiến khúc mắc thêm sâu sắc mà thôi."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「本機は、当機――試作飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;、EFL-T007の\n専用\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビです」
1477 = "「Hệ thống này, chính là hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#; chuyên dụng của cỗ máy này——\\x%lエアクラ;#00ffc040;Aircra%l;#; bay thử nghiệm EFL-T007.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;！？　\nまさか、空を飛ぶ\x%lエアクラ;#00ffc040;エアクラ%l;#;なんてっ！！？」
898 = "「\\x%lエアクラ;#00ffc040;Aircra%l;#;!? Không thể nào, \\x%lエアクラ;#00ffc040;Aircra%l;#; mà lại biết bay trên trời sao!!?」"
# monologue
# JP: ハチロクの目が僕を捉える。\nすがりついてくる。
1863 = "Ánh mắt Hachiroku hướng thẳng vào tôi. Như muốn cầu cứu."
# monologue
# JP: が――\nウソで一時ごまかすことは、それこそ悪だ。
2001 = "Nhưng—— Dùng lời nói dối để lấp liếm tạm thời, đó mới chính là cái ác."
# 【双鉄】
# display as 雙鐵
# JP: 「あるのだ。今は。\n空にさえ、エアロ＝クラフテック機関の手は届いたのだ」
1549 = "「Có đấy. Bây giờ thì có rồi. Bàn tay của động cơ Aero-Craftech đã vươn tới cả bầu trời rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「ならば降りますっ！」
1631 = "「Vậy thì em sẽ xuống!」"
# monologue
# JP: 金切り声が鳴り響き、狭いキャノピーが激しく揺れる。\nハチロクが、ここから出ようともがき始める。
2086 = "Tiếng thét chói tai vang lên, buồng lái chật hẹp rung lắc dữ dội. Hachiroku bắt đầu vùng vẫy để thoát ra khỏi đây."
# 【双鉄】
# display as 雙鐵
# JP: 「阿呆かお前は！　\n今ここを出れば地に落ち粉々に壊れるぞっ！」
1190 = "「Em ngốc à! Bây giờ mà ra khỏi đây là sẽ rơi xuống đất tan tành đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「そうであっても！　\x%lエアクラ;#00ffc040;エアクラ%l;#;になぞっ」
1323 = "「Dù có vậy đi chăng nữa! Em cũng không thèm đi \\x%lエアクラ;#00ffc040;Aircra%l;#;っ」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「くだらない意地で自らの職務を永遠に放棄しますか。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、聞くほどの存在では無いのですね」
1294 = "「Chỉ vì lòng tự ái ngu ngốc mà cô định vĩnh viễn từ bỏ nhiệm vụ của mình sao. \\x%lレイルロオド;#00ffc040;Railord%l;#; hóa ra cũng chẳng phải là một tồn tại đáng nể như lời đồn nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1273 = "「!!!」"
# monologue
# JP: ぴたりと止まる。\nハチロクはまるきり動かなくなる。
2033 = "Dừng bặt.\nHachiroku hoàn toàn bất động."
# monologue
# JP: ただ目が、瞳が――\n動き全ての激しさを超え、烈火のごとくゆらめき燃える。
2004 = "Nhưng ánh mắt, đồng tử của em ấy—— lại bùng cháy dữ dội như ngọn lửa rực sáng, vượt qua cả sự mãnh liệt trong từng chuyển động."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちから職務を――人を貨物を運ぶことを。\nレイルまでをも奪ったのは、あなたがたでしょうに」
1350 = "「Kẻ đã cướp đi nhiệm vụ của chúng tôi——việc vận chuyển con người và hàng hóa. Thậm chí cướp đi cả đường ray, chẳng phải chính là các người sao.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「事実誤認の訂正を――」
1197 = "「Xin hãy đính chính lại sự nhận thức sai lệch đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「違うぞハチロク」
1141 = "「Không phải vậy đâu Hachiroku.」"
# monologue
# JP: 割って入れば、すぐさまナビは言葉を止める。\nこれは僕が、人間が言うべき言葉であるから。
2042 = "Khi tôi xen vào, Navi lập tức dừng lời. Bởi vì đây là những lời mà tôi, một con người, cần phải nói."
# 【双鉄】
# display as 雙鐵
# JP: 「お前自らが言っていたではないか。\n全てを支配するのは人間――全ては、人間の選択だ」
1216 = "「Chẳng phải chính em đã nói sao. Kẻ chi phối tất cả là con người——tất cả đều là lựa chọn của con người.」"
# monologue
# JP: 教えてもらった。そのことを。\n金の髪をした見知らぬ少女に。事故の傷がまだ癒えぬころ。
2066 = "Tôi đã được dạy điều đó. Từ một cô gái tóc vàng xa lạ. Vào lúc vết thương từ vụ tai nạn vẫn chưa nguôi ngoai."
# monologue
# JP: 憎しみのぶつけどころを見つけることが出来ずに、\n心を腐らせるだけだったころ。
2082 = "Vào lúc tôi không thể tìm thấy nơi để trút bỏ sự oán hận, và chỉ biết để trái tim mình dần mục nát."
# 【双鉄】
# display as 雙鐵
# JP: 「たとえ知性を持とうとも、物は決定を下せない。\n決定を下すのは常に人で、その責任を負うのも、人だ」
1224 = "「Dù có sở hữu trí tuệ đi chăng nữa, thì đồ vật cũng không thể đưa ra quyết định. Người đưa ra quyết định luôn là con người, và người phải chịu trách nhiệm, cũng là con người.」"
# 【ハチロク】
# display as 八六
# JP: 「そのことならば――当然に、承知いたしております」
1623 = "「Nếu là chuyện đó——thì đương nhiên, em đã hiểu rõ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ナビに――“物”に当たるのはやめた方がいい。\nお前の誇りを、お前自身が貶めることになってしまうぞ」
1413 = "「Nếu vậy, em nên dừng việc trút giận lên Navi——một \"đồ vật\" đi. Em đang tự hạ thấp lòng kiêu hãnh của chính mình đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ん――」
1267 = "「Ưm——」"
# monologue
# JP: ハチロクの肩が小さく揺れる。\n喉が、こくんと何かを飲み込む。
1847 = "Đôi vai Hachiroku khẽ run lên. Cổ họng em ấy nuốt ực một thứ gì đó."
# monologue
# JP: ハチロクはツバを出すのだろうか？\nそんなことをふと、思ってしまう。
1822 = "Liệu Hachiroku có tiết ra nước bọt không nhỉ? Tôi chợt nghĩ đến điều đó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおっしゃられるとおりであるかと思います。\n取り乱し八つ当たりをしたことを、心より恥じ入ります」
1664 = "「Em nghĩ ngài Soutetsu nói đúng ạ. Em vô cùng xấu hổ vì đã mất bình tĩnh và trút giận vô cớ.」"
# monologue
# JP: そして深々。\nキャノピー内に両手をついて、ハチロクはその頭を下げる。
2096 = "Và rồi, em ấy cúi gập người. Chống hai tay xuống sàn buồng lái, Hachiroku cúi gầm mặt xuống."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「雨……ですか？」
1621 = "「Mưa……sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや？」
1139 = "「Không?」"
# monologue
# JP: 雲ひとつ無い。\nなのに、なぜ、ナビともあろうものがそんな――っ！
2036 = "Trời không một gợn mây. Vậy mà, tại sao một hệ thống như Navi lại nói thế——A!"
# 【ハチロク】
# display as 八六
# JP: 「けれど、わたくしがその事実を認めれば……\nわたくしは、姉妹全てを貶めることとなってしまいます」
1258 = "「Nhưng mà, nếu em thừa nhận sự thật đó…… Thì em sẽ làm nhục tất cả các chị em của mình mất.」"
# monologue
# JP: 泣いている。\nまた、大粒の涙をぼろぼろこぼしている。
1977 = "Em ấy đang khóc. Những giọt nước mắt to tròn lại lã chã tuôn rơi."
# monologue
# JP: 手をついたまま肩を震わせ、\nぬぐおうともせず、ただ、泣いている。
1911 = "Vẫn chống tay xuống sàn, đôi vai em ấy run rẩy, không hề lau đi, chỉ biết khóc nức nở."
# 【ハチロク】
# display as 八六
# JP: 「ですから、たとえそれが人間の選択であろうとも――」
1395 = "「Chính vì vậy, dù đó có là lựa chọn của con người đi chăng nữa——」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理に受け入れることはない。\n正しいと信じる必要もない」
1150 = "「Em không cần phải miễn cưỡng chấp nhận. Cũng không cần phải tin rằng điều đó là đúng.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1274 = "「!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「人間は間違った選択を、行動をしてしまう。\nそれは事実で、だから事故などが起きるのだ」
1174 = "「Con người sẽ có lúc đưa ra những lựa chọn và hành động sai lầm. Đó là sự thật, và đó cũng là lý do xảy ra tai nạn.」"
# monologue
# JP: 事故は起きる。\n物でなく、技術ではなく、それを運用する人間の責任で。
1807 = "Tai nạn sẽ xảy ra. Không phải do đồ vật, không phải do công nghệ, mà là do trách nhiệm của con người vận hành chúng."
# monologue
# JP: しかし、“責任”を、たとえ法が取らせたとして――\n憎しみは消えてはくれないし、傷が癒えてもくれはしない。
2005 = "Tuy nhiên, dù pháp luật có buộc họ phải chịu \"trách nhiệm\" đi chăng nữa—— thì sự oán hận cũng không biến mất, và vết thương cũng chẳng thể lành lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、そのことをこの身を以て知っている。\nだから少しは、お前の憎しみにも共感できるように思う」
1617 = "「Tôi hiểu rõ điều đó bằng chính bản thân mình. Nên tôi nghĩ mình có thể đồng cảm phần nào với sự oán hận của em.」"
# 【ハチロク】
# display as 八六
# JP: 「誤った選択を――\nそれに、巻き込まれたものの苦しみを――」
1296 = "「Những lựa chọn sai lầm—— và cả nỗi đau của những người bị cuốn vào đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。その苦しみと――\nそれゆえの、ぶつけどころのない憎しみを」
1445 = "「Đúng vậy. Nỗi đau đó—— và cả sự oán hận không có nơi trút bỏ vì nó.」"
# monologue
# JP: ハチロクが顔を僕へと向ける。\n涙をふかずにそのまま向ける。
1836 = "Hachiroku ngẩng mặt lên nhìn tôi. Với khuôn mặt đẫm nước mắt chưa hề lau khô."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうか教えてください。\nわたくしは――この憎しみをどうすれば」
1418 = "「Nếu vậy, xin ngài hãy nói cho em biết. Em——phải làm gì với sự oán hận này đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「憎むべきは、その決定に巻き込まれた自分の無力さだ。\n憎しみは故に、力をつけることによって[すす]雪ぐべきだ」
1370 = "「Điều đáng hận nhất chính là sự bất lực của bản thân khi bị cuốn vào những quyết định đó. Vì vậy, phải dùng sức mạnh của mình để rửa sạch nỗi hận này.」"
# monologue
# JP: これも、教えてもらったこと。
2070 = "Đây cũng là điều mà tôi đã được dạy."
# monologue
# JP: 生きたまま腐っていく僕に、\n新しい根を与えてくれた、汰斗さんから。
2068 = "Từ ông Taito, người đã gieo mầm sống mới cho tôi, khi tôi đang dần mục nát dù vẫn còn sống."
# 【ハチロク】
# display as 八六
# JP: 「力をつける……\nしかし、今更そうしたところで」
1401 = "「Dùng sức mạnh…… Nhưng mà, đến nước này rồi thì làm vậy để làm gì chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「時は戻せん。\nしかし、次には巻き込まれずに済むかもしれん」
1463 = "「Thời gian không thể quay lại. Nhưng, có lẽ lần sau em sẽ không bị cuốn vào nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「次……ですか」
1135 = "「Lần sau……sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「来るのだ。必ず。\n生きてさえいれば、否応なしに」
1133 = "「Nó sẽ đến. Chắc chắn. Chỉ cần còn sống, thì dù muốn hay không nó cũng sẽ đến.」"
# monologue
# JP: そのとき。誰かを救えるのなら。\n救えなかった路子の代わりに、誰か一人でも救えるのなら。
2035 = "Lúc đó. Nếu có thể cứu được ai đó. Thay cho Michiko mà tôi đã không thể cứu, dù chỉ cứu được một người thôi."
# monologue
# JP: その贖罪を果たすこと、そうするために生き抜くこと。\nそれこそ果たすべき最大の義務だと、僕は教えてもらった。
1996 = "Hoàn thành sự chuộc tội đó, và sống sót để làm điều đó. Đó chính là nghĩa vụ lớn nhất mà tôi phải hoàn thành, tôi đã được dạy như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「無力を嘆くヒマがあるなら、力をつけるために動け。\n無力であった自分を憎み、ゆえに自らを鍛え抜け」
1572 = "「Nếu có thời gian để than thở về sự bất lực, thì hãy hành động để trở nên mạnh mẽ hơn. Hãy hận sự bất lực của bản thân, và vì thế hãy không ngừng rèn luyện.」"
# 【ハチロク】
# display as 八六
# JP: 「次……は、来ますか？　わたくしのようなものにでも」
1532 = "「Lần sau……liệu có đến không ạ? Với một kẻ như em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前がどのようなものであるのか、\n僕はまだほとんど知らん」
1192 = "「Em là một tồn tại như thế nào, tôi vẫn chưa biết rõ lắm.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1285 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「が、僕は縁あり、お前のオーナーとなった。\nならば、僕は僕にできるかぎりを尽くそう」
1144 = "「Nhưng, tôi đã có duyên trở thành chủ nhân của em. Vậy thì, tôi sẽ cố gắng hết sức mình.」"
# monologue
# JP: 当然だ。\nそれこそ、僕の義務であるのだ。
2013 = "Đó là điều đương nhiên. Bởi vì đó chính là nghĩa vụ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「お前がそれを望むなら。\n僕は必ず、お前に“次”を迎えさせよう」
1571 = "「Nếu em mong muốn điều đó. Tôi chắc chắn sẽ giúp em đón nhận \"lần sau\".」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
1660 = "「Ngài……Soutetsu.」"
# monologue
# JP: また泣く。\n今度は笑いまで混ぜ、整った顔をぐしゃぐしゃにして。
1913 = "Em ấy lại khóc. Lần này xen lẫn cả nụ cười, khiến khuôn mặt xinh đẹp trở nên nhăn nhúm."
# 【ハチロク】
# display as 八六
# JP: 「体の調子までおかしいようです。\nわたくしは、自分一つさえ、今は制御できておりません」
1604 = "「Cơ thể em có vẻ cũng không bình thường nữa rồi. Đến cả bản thân mình, hiện tại em cũng không thể kiểm soát nổi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1433 = "「是嗎」" 
# monologue
# JP: あの汰斗さんが、ガラスケースに“放置”していた。\n記憶の欠落。極端なほどの感情の振れ。
2040 = "Ông Taito đó, đã \"bỏ mặc\" em ấy trong tủ kính. Ký ức bị khuyết thiếu. Cảm xúc dao động đến mức cực đoan."
# monologue
# JP: ――事実が想像を肉付けしていく。
1803 = "——Sự thật đang đắp nặn thêm cho những suy đoán."
# monologue
# JP: （あるいは、ならば……）
2125 = "（Hoặc có lẽ, nếu vậy thì……）"
# monologue
# JP: そうであるなら、直してやるが――\nハチロクは、ひどい故障品であるのかもしれない。
1917 = "Nếu đúng là vậy, tôi sẽ sửa chữa cho em ấy—— Nhưng có lẽ Hachiroku là một món đồ hỏng hóc nghiêm trọng."
# 【ハチロク】
# display as 八六
# JP: 「“望む”ことなど、いまのわたくしには難しすぎます。\nですが――それでも……」
920 = "「Việc \"mong muốn\" điều gì đó, đối với em hiện tại là quá khó khăn. Nhưng mà——dù vậy……」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1285 = "「嗯」" 
# monologue
# JP: 涙に濡れた目が持ち上がる。\n瞳が、まっすぐ僕へと届く。
1995 = "Đôi mắt đẫm lệ ngước lên. Ánh nhìn hướng thẳng về phía tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様に教えていただいたそのとおり、少しでも……\n回復のため、わたくしは、力をつけて――」
1593 = "「Đúng như những gì ngài Soutetsu đã dạy, dù chỉ một chút…… Để hồi phục, em sẽ nỗ lực trở nên mạnh mẽ hơn——」"
# monologue
# JP: （ぐう～～っ）
2117 = "（Ọt~~）"
# 【双鉄】
# display as 雙鐵
# JP: 「それで良い。\nお前の体も『腹が減っては戦もできん』と言っている」
1289 = "「Vậy là tốt rồi. Cơ thể em cũng đang lên tiếng 'Có thực mới vực được đạo' kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね」
1547 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 照れず、まっすぐ答えを返す。\n悪くない。
1798 = "Không hề ngượng ngùng, em ấy trả lời một cách thẳng thắn. Không tệ chút nào."
# monologue
# JP: 故障してなおハチロクは、\nあの頃の僕よりずっと強いらしい。
1832 = "Dù bị hỏng hóc, nhưng có vẻ Hachiroku vẫn mạnh mẽ hơn tôi của ngày xưa rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「なら利用しろ。\x%lエアクラ;#00ffc040;エアクラ%l;#;であれ、なんであれ。\n最も早い道を選んで、選択をできるようになれ」
1410 = "「Vậy thì hãy tận dụng nó đi. Dù là \\x%lエアクラ;#00ffc040;Aircra%l;#; hay bất cứ thứ gì. Hãy chọn con đường nhanh nhất, và học cách đưa ra lựa chọn.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。かしこまりました双鉄様――\nっ！？　なにっ？　\x%l共感;#00ffc040;共感%l;#;っ！？」
1309 = "「Vâng. Em hiểu rồi thưa ngài Soutetsu—— !? Cái gì? \\x%l共感;#00ffc040;Cộng cảm%l;#;!?」"
# monologue
# JP: ハチロクがビクリと背筋をたてる。
1817 = "Hachiroku giật mình thẳng lưng lên."
# monologue
# JP: その目が頼りなげに動きまわって、\nやがて、キャノピーのセンターパネルに注がれる。
2018 = "Đôi mắt em ấy đảo quanh một cách bối rối, rồi cuối cùng dừng lại ở bảng điều khiển trung tâm của buồng lái."
# 【ハチロク】
# display as 八六
# JP: 「あなた――ええと、\x%lエアクラ;#00ffc040;エアクラ%l;#;・ナビ？」
1194 = "「Ngươi——ờm, hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#;?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ただナビと。それ以上の呼称は不要です」
1252 = "「Cứ gọi là Navi. Không cần thêm danh xưng nào khác.」"
# 【ハチロク】
# display as 八六
# JP: 「そう。そうだったのですね――\nナビ、あなたもまた、わたくしたちの……」
1287 = "「Vậy sao. Ra là vậy—— Navi, ngươi cũng là……của chúng ta.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビは、エアロ＝クラフテック社の製品です。\n誰の妹でもありません」
896 = "「Hệ thống định vị \\x%lエアクラ;#00ffc040;Aircra%l;#; là sản phẩm của công ty Aero-Craftech. Không phải là em gái của ai cả.」"
# monologue
# JP: 妹――
1919 = "Em gái——"
# monologue
# JP: この場合は……後継機種、\nいや、技術の継承先というほどの意味であろうか。
2067 = "Trong trường hợp này……có nghĩa là dòng máy kế nhiệm, à không, có lẽ là nơi kế thừa công nghệ thì đúng hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。\nナビがハチロクに共感とやらを送ったか」
1228 = "「Ra là vậy.\nNavi đã gửi cộng cảm cho Hachiroku sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは間違いなく受け取りました」
1447 = "「Vâng. Chắc chắn là em đã nhận được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビ、いったい何と送った？」
1680 = "「Navi, rốt cuộc cô đã gửi gì vậy?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「特には。\n単に臨時の周辺情報を発信しただけです」
1501 = "「Không có gì đặc biệt. Tôi chỉ đơn thuần phát đi thông tin xung quanh tạm thời thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では偶然に、\nそれをハチロクが傍受してしまったというわけか」
1513 = "「Vậy là tình cờ,\nHachiroku đã bắt được sóng sao.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「事実群からは、そのように推測されます」
1351 = "「Từ những sự thật hiện tại, có thể suy đoán là như vậy.」"
# monologue
# JP: 無愛想極まるナビの言葉に、\nハチロクはふと、唇の端をほころばせる。
2133 = "Trước những lời lẽ lạnh lùng của Navi, Hachiroku chợt nở nụ cười mỉm."
# 【ハチロク】
# display as 八六
# JP: 「確かに……ふふっ、とても有意な周辺情報を、\nわたくしは偶然、受け取りました」
1546 = "「Quả thực……fufu, em đã tình cờ, nhận được một thông tin xung quanh rất có ý nghĩa.」"
# monologue
# JP: いって、ハチロクの視線は下へと。\nいつの間に、高度がかなり落ちている。
1851 = "Nói rồi, ánh mắt Hachiroku hướng xuống dưới. Không biết từ lúc nào, độ cao đã giảm đi đáng kể."
# monologue
# JP: はっきり見える銀色の線。二本が長く伸びている。\nハチロクの目に、強い喜びの光が宿る。
1814 = "Hai đường thẳng màu bạc hiện ra rõ rệt. Trải dài tít tắp. Trong ánh mắt Hachiroku, ánh lên một niềm vui sướng mãnh liệt."
# 【ハチロク】
# display as 八六
# JP: 「鉄道は――この町ではまだ――\n生き延びてくれているのですね」
1620 = "「Đường sắt——ở thành phố này vẫn còn——\nsống sót nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そのようだな。\n僕がこの町を出たときには、青息吐息だったようだが」
1276 = "「Ừ……có vẻ là vậy. Lúc tôi rời khỏi thành phố này, nó dường như đã thoi thóp lắm rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「生き延びているなら、次があります。\n――双鉄様のお言葉ですよ？」
1250 = "「Chỉ cần còn sống sót, thì sẽ có lần sau. ——Đó là lời ngài Soutetsu nói mà đúng không?」"
# monologue
# JP: 口調はいつもどおりだが、声は明らかに弾んでる。\n尻尾があったらぶんぶん振られているだろう。
2051 = "Giọng điệu vẫn như thường lệ, nhưng rõ ràng là đang rất hào hứng. Nếu có đuôi chắc em ấy đang vẫy tít thò lò rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「近くに降りて見てみるか？」
1584 = "「Có muốn xuống gần xem thử không?」"
# 【ハチロク】
# display as 八六
# JP: 「できるのですか！？」
1255 = "「Có thể sao ạ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「出来る。ナビ」
1253 = "「Được chứ. Navi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「了解しました。\n最適な着水地点を[サーチ,1]探査します」
1155 = "「Đã rõ. Bắt đầu dò tìm địa điểm hạ cánh trên mặt nước tối ưu nhất.」"
# monologue
# JP: 川の町。おまけに線路もほぼ川沿いだ。\n着水地点には困らない。
2069 = "Một thành phố bên sông. Hơn nữa đường ray cũng chạy dọc theo sông. Nên không lo thiếu chỗ hạ cánh."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「[サーチ,1]探査終了。ただちに着水を開始しますか？」
1402 = "「Dò tìm hoàn tất. Bắt đầu hạ cánh ngay lập tức chứ?」"
