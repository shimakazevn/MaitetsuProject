[script]
# lines: 320 
# 【ハチロク】
# display as 八六
# JP: 「わたくし、このような景色は初めてです。\n町が、まるで積み木でつくられているように見えます」
1385 = "「Đây là lần đầu tiên tôi được ngắm cảnh tượng thế này đấy ạ.\nThị trấn trông cứ như được xếp bằng những khối gỗ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1285 = "「Ừm.」"
# monologue
# JP: ナビは賢い。空気を読む。\nだから、沈黙を守ってくれている。
2030 = "Navi rất thông minh. Biết đọc bầu không khí.\nNên cô ấy đang giữ im lặng."
# monologue
# JP: その沈黙に守られながら、\n機嫌よく、ハチロクは眼下を眺め続ける。
2028 = "Được bao bọc trong sự im lặng ấy,\nHachiroku vui vẻ tiếp tục đưa mắt ngắm nhìn xuống dưới."
# 【ハチロク】
# display as 八六
# JP: 「あの見事なお屋根はなんでしょう？」
1628 = "「Mái nhà lộng lẫy kia là ở đâu vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井阿蘇神社だな。\n屋根だけでなく、[たたず]佇まい全般が美しい場所だ」
1460 = "「Là Đền Akai Aso đấy.\nKhông chỉ mái nhà, mà tổng thể kiến trúc nơi đó đều rất đẹp.」"
# 【ハチロク】
# display as 八六
# JP: 「あの森は？　\nひとつだけ、随分と小高いところにありますが」
1637 = "「Còn khu rừng kia thì sao ạ?\nChỉ có mỗi chỗ đó là nằm trên mô đất khá cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜[じょうし,1]城址。あそこからも御一夜の町並みを見下ろせる。\n無論、ここからほどに広くは無理だが」
1435 = "「Là Di tích thành Ohimitera. Từ đó cũng có thể nhìn bao quát phố phường Ohimitera.\nTất nhiên là không thể nhìn rộng được như từ trên này rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ここは、お空の上ですものね」
1548 = "「Đúng vậy nhỉ. Vì chúng ta đang ở trên trời mà lị.」"
# monologue
# JP: ハチロクが短い両手を伸ばす。\nそれを翼に、より高くへと求めるように。
1826 = "Hachiroku dang rộng đôi tay ngắn ngủn của mình.\nNhư thể muốn biến chúng thành đôi cánh, vươn lên cao hơn nữa."
# 【ハチロク】
# display as 八六
# JP: 「飛行機には初めて乗りましたが、良いものです。\nきっと、鉄道の次に素敵な乗り物でしょうね、これは」
1659 = "「Đây là lần đầu tiên tôi đi máy bay, cảm giác tuyệt thật đấy.\nChắc chắn đây là phương tiện tuyệt vời thứ hai chỉ sau đường sắt thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道は、最高順位ということか？」
1648 = "「Đường sắt là vị trí số một sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、もちろん。\nわたくしは、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですから」
1455 = "「Vâng, tất nhiên rồi ạ.\nVì tôi là một \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か……確か、鉄道車両それぞれに、\n一体ずつついている物……で、よかったか？」
902 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; à......Hình như là, một thực thể được trang bị\nđi kèm với mỗi phương tiện đường sắt......đúng không nhỉ?」"
# monologue
# JP: 素朴な疑問を伝えれば、\nハチロクはふふ、と満足そうな笑みを浮かべる。
2106 = "Nghe tôi hỏi một câu ngô nghê như vậy,\nHachiroku nở một nụ cười thỏa mãn, \"Fufu\"."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l客車;#00ffc040;客車%l;#;にはついていません。機関車・\\x%l気動車;#00ffc040;[きどうしゃ,2]気動車%l;#;・[どうりょくしゃ,2]動力車など、\n自ら動く車両を、まずわたくしたちは制御します」
908 = "「Không đi kèm với \\x%l客車;#00ffc040;toa hành khách%l;#; đâu ạ. Trước tiên, chúng tôi sẽ điều khiển\ncác phương tiện tự di chuyển được như đầu máy xe lửa,\n\\x%l気動車;#00ffc040;toa xe diesel tự hành%l;#;, toa xe động lực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「制御。それは、運転制御ということか？」
1399 = "「Điều khiển. Tức là điều khiển lái tàu sao?」"
# 【ハチロク】
# display as 八六
# JP: 「それももちろん。駆動車両および\\x%l列車;#00ffc040;列車%l;#;の制御は、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\\x%l機関士;#00ffc040;機関士%l;#;・\\x%l運転士;#00ffc040;運転士%l;#;との共同で行います」
1638 = "「Tất nhiên là có cả cái đó rồi ạ. Việc điều khiển phương tiện dẫn động và \\x%l列車;#00ffc040;đoàn tàu%l;#;\nsẽ do \\x%lレイルロオド;#00ffc040;Railord%l;#; phối hợp cùng \\x%l機関士;#00ffc040;lái tàu%l;#; và nhân viên cơ vụ thực hiện.」"
# monologue
# JP: 機関車を運転する人間が\\x%l機関士;#00ffc040;機関士%l;#;。\nそれ以外の駆動車両を運転するのが\\x%l運転士;#00ffc040;運転士%l;#;と教えてもらう。
2108 = "Tôi được giải thích rằng người lái đầu máy xe lửa gọi là \\x%l機関士;#00ffc040;lái tàu%l;#;.\nCòn người lái các phương tiện dẫn động khác thì gọi là nhân viên cơ vụ."
# monologue
# JP: “鉄道”とひとくくりにしか思わなかったが、\n中身はどうして、なかなか複雑なものであるらしい。
1950 = "Trước giờ tôi chỉ nghĩ gộp chung lại là \"đường sắt\",\nkhông ngờ bên trong lại khá phức tạp đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「“まず”であり、“それも”であるなら。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、さらに広範に鉄道を制御するものか？」
1468 = "「Nếu đã có \"trước tiên\" và \"có cả cái đó\".\nThì \\x%lレイルロオド;#00ffc040;Railord%l;#; còn điều khiển đường sắt ở phạm vi rộng hơn nữa sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、そのとおりです双鉄様。わたくしたちは\n\\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;を提案し、\\x%l運転計画;#00ffc040;運転計画%l;#;をも制御します」
1450 = "「Vâng, đúng là vậy thưa ngài Soutetsu. Chúng tôi\nđề xuất \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#;, và kiểm soát cả \\x%l運転計画;#00ffc040;kế hoạch hoạt động%l;#; nữa ạ.」"
# monologue
# JP: わからぬ言葉はひとまず置いて、\nわかる部分を確認していく。
2031 = "Tạm thời gác lại những từ chưa hiểu,\ntôi tiếp tục xác nhận những phần mình đã nắm được."
# 【双鉄】
# display as 雙鐵
# JP: 「わたくし”たち”と繰り返しているが」
1187 = "「Cô cứ lặp đi lặp lại từ \"chúng tôi\" nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、いうなれば全て姉妹。その全てが、\n相互に\\x%l共感;#00ffc040;共感%l;#;通信を行うことができます」
901 = "「Nói cách khác, \\x%lレイルロオド;#00ffc040;Railord%l;#; đều là chị em. Tất cả chúng tôi\nđều có thể liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; với nhau ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1268 = "「Hừm.」"
# monologue
# JP: \\x%l共感;#00ffc040;共感%l;#;通信――ナビのような\\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも有している、\nいや、その最重要といってもいいらしい機能だ。
60 = "Liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#;——Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; như Navi cũng sở hữu chức năng này,\nà không, có thể nói đó là chức năng quan trọng nhất của họ."
# 【双鉄】
# display as 雙鐵
# JP: 「その個体が得たさまざまな情報をリアルタイムに共有し、\n集合最適処理する仕組み――でよかったか？」
1256 = "「Đó là cơ chế chia sẻ theo thời gian thực các thông tin đa dạng mà mỗi cá thể thu thập được,\nrồi xử lý để đưa ra phương án tối ưu nhất cho tập thể——có đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「おくわしいのですね、双鉄様。\nそのご解釈は、ほぼ実際と合致しております」
1665 = "「Ngài am hiểu thật đấy, ngài Soutetsu.\nCách hiểu của ngài gần như hoàn toàn trùng khớp với thực tế ạ.」"
# monologue
# JP: うれしげなハチロク。\nナビから教わったことだとは言いがたくなる。
2107 = "Nhìn vẻ mặt vui vẻ của Hachiroku,\ntôi thật khó mà mở miệng nói rằng đó là do Navi dạy."
# 【ハチロク】
# display as 八六
# JP: 「ですのでわたくしたちは、運転支障発生時でも、\n臨時ダイアを極めて短時間で作成、提案可能となります」
1393 = "「Vì thế, ngay cả khi xảy ra sự cố cản trở vận hành,\nchúng tôi vẫn có thể lập và đề xuất biểu đồ tạm thời trong thời gian cực ngắn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「支障を回復するための最善策を短期間に取りうる、\nということか？」
1152 = "「Tức là có thể đưa ra giải pháp tốt nhất\nđể khắc phục sự cố trong thời gian ngắn sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、左様です」
1452 = "「Vâng, đúng là vậy ạ.」"
# monologue
# JP: ならば、ハチロクたちの\\x%l共感;#00ffc040;共感%l;#;通信の運用法と、\nナビたち、\\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビの機能との根幹は同じなのだろう。
2071 = "Nếu vậy, cách vận dụng liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; của Hachiroku,\nvà chức năng cốt lõi của Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; như Navi chắc hẳn là giống nhau."
# monologue
# JP: （地上からエンジン自動車が駆逐され、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;自動車に取って代わられた最大の理由、か――）
2121 = "（Lý do lớn nhất khiến ô tô động cơ đốt trong bị loại bỏ khỏi mặt đất,\nvà bị thay thế bởi ô tô \\x%lエアクラ;#00ffc040;Aircra%l;#;, sao——）"
# monologue
# JP: \\x%l共感;#00ffc040;共感%l;#;通信による事故情報と迂回ルートの共用。\nそして、ナビによるオートパイロット。
2075 = "Chia sẻ thông tin tai nạn và tuyến đường vòng thông qua liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#;.\nVà chế độ lái tự động do Navi đảm nhiệm."
# monologue
# JP: それらは渋滞という現象をほぼ根絶し、\n車移動による所要時間を確定可能なものへと変えた。
1903 = "Những điều đó gần như đã triệt tiêu hoàn toàn hiện tượng tắc đường,\nbiến thời gian di chuyển bằng xe hơi thành một con số có thể tính toán chắc chắn."
# 【双鉄】
# display as 雙鐵
# JP: 「……\\x%l共感;#00ffc040;共感%l;#;通信とは便利なものだな」
927 = "「......Liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; đúng là tiện lợi thật.」"
# monologue
# JP: 言えば大きく。\nとても誇らしげにハチロクが頷く。
2052 = "Vừa dứt lời.\nHachiroku gật đầu mạnh một cái với vẻ vô cùng tự hào."
# 【ハチロク】
# display as 八六
# JP: 「はい。ですのでわたくしたち\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n運行とダイアの全てを把握し、制御できたのです」
1440 = "「Vâng. Vì vậy, \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng tôi\ncó thể nắm bắt và kiểm soát toàn bộ quá trình vận hành cũng như biểu đồ chạy tàu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、[ろおど,3]Lordか。支配者か」
1386 = "「Vì thế nên mới là Lord sao. Kẻ chi phối.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。レイルも車両も、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。\n全てを支配する者でしたら、それは双鉄様たち人間です」
1670 = "「Không phải đâu, ngài Soutetsu. Dù là đường ray, phương tiện hay \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nKẻ chi phối tất cả những thứ đó, chính là con người các ngài.」"
# monologue
# JP: ごく当然、と。\nよどみも力みも無い言葉。
2014 = "Như một lẽ đương nhiên.\nMột câu nói không chút ngập ngừng hay gượng gạo."
# monologue
# JP: ハチロクの小さな手には不似合いなほど長い指が、\n空中に、すらすらと――Roadの文字をかいていく。
1824 = "Những ngón tay thon dài không mấy ăn nhập với bàn tay nhỏ bé của Hachiroku,\nviết thoăn thoắt vào không trung——chữ Road."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちの把握と制御は、その道筋をつけるため。\nわたくしたちは線路と同じ、RailRoadにすぎません」
1374 = "「Sự nắm bắt và kiểm soát của chúng tôi là để vạch ra con đường đó.\nChúng tôi cũng giống như đường ray, chỉ là RailRoad mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1227 = "「Ra là vậy.」"
# monologue
# JP: 強い誇りが、揺るがぬものが、言葉の端々に満ちている。
1932 = "Niềm tự hào mãnh liệt, một ý chí không thể lay chuyển, tràn ngập trong từng câu chữ."
# monologue
# JP: 現実の交通事情がどうありどう変化しようとも、\n鉄道こそは、ハチロクの変わらぬ“最高”なのだと。
2000 = "Dù tình hình giao thông thực tế có ra sao, có thay đổi thế nào đi nữa,\nthì đường sắt vẫn mãi là thứ \"tuyệt vời nhất\" không thể thay thế đối với Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「そこまでハチロクが誇るものなら。お前の制御する……\n駆動車両、か？　それに、僕も乗りたいものだ」
1416 = "「Nếu Hachiroku đã tự hào đến vậy. Phương tiện dẫn động......\ndo cô điều khiển sao? Tôi cũng muốn ngồi thử một lần đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「それは……いつか。\nその……いつか、きっと――かなうものなら」
1618 = "「Chuyện đó......một ngày nào đó.\nCái đó......một ngày nào đó, chắc chắn——nếu có thể trở thành hiện thực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1269 = "「Hừm?」"
# monologue
# JP: いきなり歯切れが悪くなる。\nしばらく待つ。続く沈黙。
1914 = "Đột nhiên giọng cô ấy trở nên ngập ngừng.\nTôi đợi một lúc. Vẫn là sự im lặng."
# monologue
# JP: ならば――と話を、\n先送りした疑問点へと巻き戻す。
1971 = "Nếu vậy——tôi bèn quay lại,\nhỏi về những điểm thắc mắc đã gác lại lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道用語なのだろうが、\n\\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;だの臨時ダイアだのとは、なんだ？」
1217 = "「Chắc là thuật ngữ đường sắt nhỉ,\nnhưng \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; với biểu đồ tạm thời là gì vậy?」"
# monologue
# JP: ほっと、安堵したような息。
1811 = "Một tiếng thở phào nhẹ nhõm."
# monologue
# JP: そして再びハチロクの言葉は、\n立板に水と流れだす。
2095 = "Và rồi những lời của Hachiroku lại tuôn ra\nlưu loát như nước chảy mây trôi."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l列車;#00ffc040;列車%l;#;の運行計画のことです。適正な\\x%lダイアグラム;#00ffc040;ダイアグラム%l;#;は、\n事故を防止し、運転効率を向上させます」
1436 = "「Đó là kế hoạch vận hành của \\x%l列車;#00ffc040;đoàn tàu%l;#; ạ. Một \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; hợp lý\nsẽ giúp ngăn ngừa tai nạn và nâng cao hiệu quả vận hành.」"
# 【双鉄】
# display as 雙鐵
# JP: 「事故の防止、か――」
1654 = "「Ngăn ngừa tai nạn, sao——」"
# monologue
# JP: けれども、それが引っかかる。
1937 = "Nhưng mà, điều đó lại khiến tôi vướng mắc."
# monologue
# JP: “だったらなんで”と、過去が泣き……\n無為なこととはわかっていても、尋ねてしまう。
877 = "\"Thế thì tại sao chứ\", quá khứ gào khóc trong tôi......\nDù biết là vô ích, nhưng tôi vẫn buột miệng hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、事故を起こす\\x%l列車;#00ffc040;列車%l;#;は、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に制御されていないものなのか？」
1624 = "「Vậy, những \\x%l列車;#00ffc040;đoàn tàu%l;#; gây ra tai nạn,\nlà những chuyến tàu không được \\x%lレイルロオド;#00ffc040;Railord%l;#; điều khiển sao?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――」
1136 = "「Không ạ——」"
# monologue
# JP: ハチロクの顔が苦しげに歪む。\n声から温度が抜け落ちる。
1849 = "Khuôn mặt Hachiroku méo xệch đi vì đau khổ.\nGiọng nói cũng mất đi hơi ấm."
# 【ハチロク】
# display as 八六
# JP: 「……例えば、線路にされた置き石を、わたくし達は\n画像センサ――いわば目視でしか発見できません」
938 = "「......Ví dụ như, những hòn đá bị đặt trên đường ray, chúng tôi\nchỉ có thể phát hiện bằng cảm biến hình ảnh——nói cách khác là bằng mắt thường thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「目視でしか？　それでは人間と」
1247 = "「Chỉ bằng mắt thường thôi sao? Thế thì với con người...」"
# 【ハチロク】
# display as 八六
# JP: 「大差ありません。ので、置き石に気付いたときには、\nもう\\x%lブレーキ;#00ffc040;ブレーキ%l;#;が間に合わないことがほとんどです」
1148 = "「Không có sự khác biệt lớn nào ạ. Vì vậy, khi nhận ra có đá đặt trên đường ray,\nthì hầu như đã không còn kịp đạp \\x%lブレーキ;#00ffc040;phanh%l;#; nữa rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。線路におきた障害に対しては、\n都度での対処しかできない、というわけか」
1226 = "「Ra là vậy. Đối với những chướng ngại vật trên đường ray,\nthì chỉ có thể tùy cơ ứng biến thôi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。双鉄様」
1492 = "「Đúng là vậy thưa ngài Soutetsu.」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も万能ではない。\n無論、\\x%l共感;#00ffc040;共感%l;#;通信も、\\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビも。
56 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không phải vạn năng.\nTất nhiên, liên lạc \\x%l共感;#00ffc040;cộng cảm%l;#; hay Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng vậy."
# monologue
# JP: ゆえに、どれほど技術が発展しようと事故は絶えない。\n無論、事故の真なる原因は、技術などには無いのだが。
1960 = "Thế nên, dù công nghệ có phát triển đến đâu thì tai nạn vẫn không bao giờ chấm dứt.\nTất nhiên, nguyên nhân thực sự của tai nạn không nằm ở công nghệ."
# 【ハチロク】
# display as 八六
# JP: 「そうした事態を防止するため、\n\\x%l保線;#00ffc040;[ほせんがかり,2]保線係%l;#;という職員達が線路の管理をしていましたが……」
1493 = "「Để ngăn chặn những tình huống như vậy,\nnhững nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã đảm nhận việc quản lý đường ray, nhưng mà......」"
# monologue
# JP: 無理に、絞り出したような声。
1839 = "Giọng nói như cố gắng vắt kiệt sức lực để thốt ra."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、\\x%l保線;#00ffc040;保線%l;#;係の不足も甚だしい物となりました。\nあの時期、鉄道事故が多発した一因は、それです」
912 = "「Vào thời kỳ cuối của \\x%l帝鉄;#00ffc040;Teitetsu%l;#;, tình trạng thiếu hụt nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã trở nên vô cùng nghiêm trọng.\nĐó cũng là một phần nguyên nhân khiến tai nạn đường sắt xảy ra liên tục vào thời kỳ đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l帝鉄;#00ffc040;帝鉄%l;#;末期……」
911 = "「Thời kỳ cuối của \\x%l帝鉄;#00ffc040;Teitetsu%l;#;......」"
# monologue
# JP: 僕が少年だったころ。\nあの事故のころ。
1953 = "Lúc tôi còn là một thiếu niên.\nVào thời điểm xảy ra vụ tai nạn đó."
# monologue
# JP: その時代は、後に、\nひどく簡潔に呼称されるようになった。
2080 = "Thời đại đó, sau này,\nđã được gọi bằng một cái tên vô cùng ngắn gọn."
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「[だいはいせん,2]大廃線時代」
1304 = "「Thời đại Đại bãi bỏ các tuyến」"
# monologue
# JP: ハチロクと僕の声が重なる。
1828 = "Giọng của Hachiroku và tôi hòa vào nhau."
# monologue
# JP: それが支えになったわけでもあるまいが、\nハチロクは、落としていた視線を持ち上げ直す。
2098 = "Dù chẳng phải đó là chỗ dựa gì,\nnhưng Hachiroku đã ngước ánh nhìn đang cụp xuống lên."
# 【ハチロク】
# display as 八六
# JP: 「皮肉なことに。わたくしたち\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がその真価を\nフルに発揮したのも、あの時代でした」
1518 = "「Thật trớ trêu. \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng tôi được phát huy tối đa\ngiá trị đích thực của mình, cũng chính là vào thời đại đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……事故が多発したせいか？\n臨時ダイア、とやらが必要になったから？」
937 = "「......Là do tai nạn xảy ra liên miên sao?\nVì những thứ như biểu đồ tạm thời trở nên cần thiết?」"
# 【ハチロク】
# display as 八六
# JP: 「ご明察です、双鉄様。\nしかし――やがて…………」
1663 = "「Ngài thật tinh ý, ngài Soutetsu.\nThế nhưng——chẳng bao lâu sau............」"
# monologue
# JP: ハチロクの声が途切れてしまう。\n事故の多発、路線廃止、\\x%l列車;#00ffc040;列車%l;#;の廃棄――
1856 = "Giọng Hachiroku chợt đứt quãng.\nTai nạn xảy ra liên miên, bãi bỏ các tuyến đường sắt, vứt bỏ \\x%l列車;#00ffc040;đoàn tàu%l;#;——"
# monologue
# JP: 大廃線時代の終焉は、\nそのまま、鉄道の時代の終焉を意味するがゆえ。
1907 = "Sự kết thúc của thời đại Đại bãi bỏ các tuyến,\ncũng đồng nghĩa với sự kết thúc của kỷ nguyên đường sắt."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが汰斗様に買い取られたのも、その時期です」
1383 = "「Tôi được ngài Taito mua lại cũng vào thời điểm đó ạ.」"
# monologue
# JP: ハチロクの目が、もう一度、キャノピーの外に向けられる。
1844 = "Ánh mắt Hachiroku một lần nữa hướng ra ngoài vòm kính."
# monologue
# JP: 暗い目だ。\n見ていると、こちらまで引かれそうになる。
1975 = "Một đôi mắt u buồn.\nNhìn vào đó, tôi cũng có cảm giác như bị cuốn theo."
# 【ハチロク】
# display as 八六
# JP: 「しかし、わたくしにはその時期の記憶がありません。\nこの美しい町を見たかどうかさえ、覚えていないのです」
1523 = "「Nhưng tôi lại không có ký ức về khoảng thời gian đó.\nNgay cả việc tôi đã từng nhìn thấy thị trấn xinh đẹp này hay chưa, tôi cũng không nhớ nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見ていないだろう。ここからは」
1565 = "「Chắc là chưa nhìn thấy đâu. Từ trên này ấy.」"
# monologue
# JP: 事実の指摘。軽く明るく。
1957 = "Chỉ ra một sự thật. Bằng giọng điệu nhẹ nhàng, tươi sáng."
# monologue
# JP: そして指差し、ハチロクの視点を前へと向ける。\nよどみの全てを、空へと飛ばしてしまえるように。
2097 = "Rồi tôi chỉ tay, hướng ánh nhìn của Hachiroku về phía trước.\nNhư thể muốn xua tan mọi muộn phiền bay vút lên không trung."
# 【双鉄】
# display as 雙鐵
# JP: 「歩いて見る御一夜の町は、また別の顔だ。\n歩くうち、あるいは見覚えに出くわすかもしれん」
1506 = "「Thị trấn Ohimitera khi dạo bước ngắm nhìn lại mang một vẻ đẹp khác đấy.\nTrong lúc đi dạo, biết đâu cô lại bắt gặp khung cảnh quen thuộc nào đó.」"
# 【ハチロク】
# display as 八六
# JP: 「そう……ですね。\nはい。双鉄様のおっしゃるとおりと思います」
1591 = "「Đúng......vậy nhỉ.\nVâng. Tôi nghĩ ngài Soutetsu nói đúng ạ.」"
# monologue
# JP: うん、と頷き。\n持ち上げ直した顔には表情が戻っている。
1869 = "Cô ấy gật đầu, \"Vâng\".\nKhuôn mặt vừa ngẩng lên đã lấy lại được vẻ tươi tắn."
# monologue
# JP: “無理に浮かべた”。そう思わせる笑顔に逆に、\n普段のハチロクがどれほど自然に笑うかを知る。
872 = "\"Gượng cười\". Nụ cười gượng gạo ấy lại cho tôi thấy,\nbình thường Hachiroku cười tự nhiên đến nhường nào."
# 【ハチロク】
# display as 八六
# JP: 「それにしても、\n双鉄さまは少しお人が悪いですね」
1586 = "「Mà này,\nngài Soutetsu cũng có chút xấu tính đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？」
1376 = "「Tôi á?」"
# 【ハチロク】
# display as 八六
# JP: 「だって……\nよりにもよって\\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗せるだなんておっしゃって」
1421 = "「Tại vì......\nchọn gì không chọn, ngài lại bảo cho tôi ngồi \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1272 = "「À.」"
# monologue
# JP: なるほど。
1885 = "Ra là vậy."
# monologue
# JP: なにより深く鉄道を愛し、誇るそれ故――\nハチロクは、こうまで\\x%lエアクラ;#00ffc040;エアクラ%l;#;を嫌うのか。
1941 = "Vì yêu sâu sắc và tự hào về đường sắt hơn bất cứ thứ gì——\nnên Hachiroku mới ghét \\x%lエアクラ;#00ffc040;Aircra%l;#; đến thế sao."
# 【ハチロク】
# display as 八六
# JP: 「飛行機なら飛行機と最初からおっしゃってくだされば。\nわたくしもお見苦しいところを見せずにすみましたのに」
1581 = "「Nếu ngài nói ngay từ đầu là máy bay.\nThì tôi đã không phải phơi bày bộ dạng khó coi đó rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
1201 = "「Cũng đúng.」"
# monologue
# JP: ハチロクの指摘は正しい。\n今の僕は、人が悪い。
1833 = "Lời trách móc của Hachiroku là chính xác.\nTôi bây giờ, đúng là người xấu tính."
# monologue
# JP: ナビと無言の共謀をした沈黙で、\nハチロクのことを騙している。
1901 = "Bằng sự im lặng đồng lõa với Navi,\ntôi đang lừa dối Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「人が悪いのも仕方ないのだ。\nなにせ僕は、御一夜市の生まれではない」
1200 = "「Tôi xấu tính cũng là hết cách thôi.\nDù sao thì tôi cũng không sinh ra ở thành phố Ohimitera mà.」"
# 【ハチロク】
# display as 八六
# JP: 「そうなのですか？」
1536 = "「Vậy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうなのだ」
1502 = "「Ừm. Là vậy đấy.」"
# monologue
# JP: 答えれば、ハチロクはくす、と小さく笑う。
2032 = "Nghe tôi đáp, Hachiroku bật cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「ならわたくしは、\n双鉄様のお人の悪さに感謝しなくてはいけませんね？」
1635 = "「Thế thì tôi,\nphải cảm ơn sự xấu tính của ngài Soutetsu rồi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「感謝？　なぜだ」
1365 = "「Cảm ơn? Tại sao?」"
# 【ハチロク】
# display as 八六
# JP: 「最初から飛行機と聞いていたなら、わたくしきっと、\n慣れている風を装って、きょろきょろ出来ませんでした」
1580 = "「Nếu biết là máy bay ngay từ đầu, chắc chắn tôi\nsẽ làm ra vẻ quen thuộc, chứ không dám ngó nghiêng ngó dọc thế này đâu ạ.」"
# monologue
# JP: 言って、ハチロクはあどけなく、\n身を乗り出してまた眼下を見る。
1830 = "Nói rồi, Hachiroku lại ngây thơ\nrướn người ngắm nhìn xuống dưới."
# 【ハチロク】
# display as 八六
# JP: 「川も豊かで見事です。\nあの水を、先ほどわたくしはいただいたのでしょうか？」
1619 = "「Con sông cũng thật dồi dào và tuyệt đẹp.\nNước tôi uống lúc nãy là từ đó sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。クマ川の水だ。もっとも、酒造りに使うのは\nもっと上流――源流に近いところの水だそうだが」
1280 = "「Ừm. Là nước sông Kuma đấy. Dù nước dùng để ủ rượu\nnghe nói là lấy từ thượng nguồn——gần đầu nguồn hơn cơ.」"
# 【ハチロク】
# display as 八六
# JP: 「素晴らしいですね。いつか、機会があれば、\nこの素晴らしい川の源を眺めてみたいものです」
1534 = "「Tuyệt vời quá. Một lúc nào đó, nếu có cơ hội,\ntôi rất muốn được ngắm nhìn cội nguồn của dòng sông tuyệt đẹp này.」"
# monologue
# JP: 驚いた。\n気持ちが、そのまま口からこぼれる。
1951 = "Thật đáng ngạc nhiên.\nCảm xúc cứ thế tuôn trào ra khỏi miệng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「同じことを思うのだな、僕と」
1262 = "「Cô cũng có cùng suy nghĩ với tôi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様も？」
1662 = "「Ngài Soutetsu cũng vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ここに引き取られてすぐのことだがな」
1284 = "「Ừm. Đó là chuyện xảy ra ngay sau khi tôi được nhận nuôi về đây.」"
# 【ハチロク】
# display as 八六
# JP: 「引き取られて……ですか？」
1407 = "「Được nhận nuôi......sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕は右田の養子なのだ」
1282 = "「Ừ. Tôi là con nuôi của nhà Migita.」"
# monologue
# JP: 隠していても仕方がない。\nが、ハチロクは\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1985 = "Có giấu giếm cũng chẳng ích gì.\nNhưng Hachiroku là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: 気をつかわれてはわずらわしいので、\n鉄道事故、という一点のみは語らずにおく。
1948 = "Để tránh bị bận tâm phiền phức,\ntôi quyết định không nói đến chi tiết \"tai nạn đường sắt\"."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は事故で家族の全てを失くし、右田家に――\n汰斗さんに引き取られ、その[ようそん,1]養孫となった」
1378 = "「Tôi mất toàn bộ gia đình trong một vụ tai nạn, và được nhà Migita——\nđược ông Taito nhận nuôi, trở thành cháu nuôi của ông ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「汰斗様に……双鉄様も。\nっ！　だから名前の話のときに、日々姫様は」
1661 = "「Bởi ngài Taito......Cả ngài Soutetsu cũng vậy.\n! Thảo nào lúc nói về cái tên, ngài Hibiki lại...」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれは、僕が養子だという話を嫌うのだ。\n僕は気にせんのだが……覚えておいてもらえば助かる」
1633 = "「Là vì em ấy ghét chuyện tôi là con nuôi đấy.\nTôi thì chẳng bận tâm đâu......nhưng nếu cô nhớ điều đó thì tốt quá.」"
# monologue
# JP: 軽く。ハチロクは瞳を伏せる。
1852 = "Hachiroku khẽ cụp mắt xuống."
# 【ハチロク】
# display as 八六
# JP: 「はい。以降は間違いなく。\n知らぬこととはいえ、失礼しました」
1306 = "「Vâng. Từ nay tôi sẽ không nhầm lẫn nữa.\nDù là không biết, nhưng tôi đã thất lễ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに、知らぬがゆえの失礼なら僕もした。\nそうだ。これでおあいこということにならんか？」
1265 = "「Có gì đâu, thất lễ vì không biết thì tôi cũng thế mà.\nPhải rồi. Coi như chúng ta hòa nhé?」"
# monologue
# JP: 伏せた瞳がもちあがる。\nいたずらそうな光が宿る。
1850 = "Đôi mắt đang cụp xuống bỗng ngước lên.\nÁnh lên một tia sáng tinh nghịch."
# 【ハチロク】
# display as 八六
# JP: 「うふふ。左様でした。お人の悪い双鉄様に――\nわたくし、寝込みを襲われ脱がされてしまいましたね」
1291 = "「Ufufu. Đúng là vậy. Ngài Soutetsu xấu tính——\nđã lẻn vào lúc tôi đang ngủ say rồi cởi áo tôi ra nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、人聞きの悪いことを」
1278 = "「Này này, nói thế nghe dễ gây hiểu lầm lắm đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「お空ですよ？　双鉄様。\n飛ぶ鳥は、わたくしたちの声などきっと聞きません」
1373 = "「Chúng ta đang ở trên trời cơ mà? Ngài Soutetsu.\nNhững chú chim đang bay chắc chắn sẽ không nghe thấy tiếng chúng ta đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うー……む」
1270 = "「Ư......ừm.」"
# monologue
# JP: それはそうだが、ナビが聞いてる。\n妙な誤解をしないでくれればいいのだが。
2050 = "Nói thì nói vậy, nhưng Navi đang nghe đấy.\nChỉ mong cô ấy đừng hiểu lầm tai hại là được."
# 【ハチロク】
# display as 八六
# JP: 「ご安心ください？　双鉄様。わたくし、もう少しも、\n怒っても、不愉快と思ってもおりません」
1362 = "「Ngài cứ yên tâm đi? Ngài Soutetsu. Tôi không còn chút nào,\ntức giận hay khó chịu nữa đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1433 = "「Vậy sao.」"
# monologue
# JP: そうなのだろうなと納得させてくれるほど、\nハチロクの表情は幸せそうだ。
1867 = "Vẻ mặt hạnh phúc của Hachiroku đủ để thuyết phục tôi rằng\nchắc hẳn là như vậy."
# monologue
# JP: 切り替えの早さは物であるからなのかもしれんが――\nあるいは性格的に、僕と似ているのかもしれん。
1943 = "Việc thay đổi tâm trạng nhanh chóng có thể là do cô ấy là đồ vật——\nHoặc cũng có thể về mặt tính cách, cô ấy giống tôi."
# 【ハチロク】
# display as 八六
# JP: 「ですが、まだおあいこにはできません」
1145 = "「Nhưng mà, vẫn chưa hòa được đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？　怒ってないのなら――」
1507 = "「Tại sao? Nếu cô không giận nữa thì——」"
# 【ハチロク】
# display as 八六
# JP: 「怒ってないから、むしろです。\n平手打ちを余分にひとつ。わたくしは双鉄様に」
1318 = "「Chính vì không giận nữa nên mới thế đấy ạ.\nTôi vẫn còn nợ ngài Soutetsu một cái tát.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。よかろう」
1225 = "「Ra là vậy. Được thôi.」"
# monologue
# JP: （ピンっ！）
2118 = "（Búng!）"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1271 = "「A.」"
# monologue
# JP: おでこを軽く、指先でつつく。\nわずかな痛みも与えぬ弱さで。
1955 = "Tôi dùng đầu ngón tay gõ nhẹ lên trán cô ấy.\nNhẹ đến mức không hề gây ra chút đau đớn nào."
# 【双鉄】
# display as 雙鐵
# JP: 「体格差を加味すればこんなところだろう。\nいいな？　ハチロク、これで手打ちだ」
1678 = "「Tính thêm cả sự chênh lệch thể hình thì cỡ này là vừa rồi.\nĐược chứ? Hachiroku, thế này là hòa nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1380 = "「Tôi hiểu rồi thưa ngài Soutetsu.\nHòa nhau, xí xóa, không ai nợ ai nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1285 = "「嗯」" 
# monologue
# JP: 話が早い。\nやはり、性格的に似ているのかも――ああ、いや。
1924 = "Nhanh gọn lẹ thật.\nQuả nhiên tính cách cũng có nét giống nhau——À, không."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも汰斗さんに買い取られたと言っていたな。\nならば僕たちは、似たもの同士なのかもしれん」
1209 = "「Hachiroku cũng nói là được ông Taito mua lại nhỉ.\nVậy thì chúng ta có khi lại là những kẻ đồng cảnh ngộ cũng nên.」"
# 【ハチロク】
# display as 八六
# JP: 「本当にそうかもしれませんね。\n双鉄様も、この川の源に興味がおありとのことですし」
1589 = "「Biết đâu lại đúng là vậy thật.\nNgài Soutetsu cũng có hứng thú với đầu nguồn của dòng sông này mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「興味をもって、実際歩いた。\n無論、子供の足で[さかのぼ]遡りきれるものではなかったが」
1138 = "「Vì có hứng thú nên tôi đã thực sự đi bộ đến đó.\nTất nhiên, với đôi chân của một đứa trẻ thì không thể đi ngược dòng đến tận cùng được.」"
# 【ハチロク】
# display as 八六
# JP: 「歩いて！？　遡られたのですか、この川を」
1346 = "「Đi bộ sao!? Ngài đã đi ngược dòng con sông này ư?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。興味があり、時間と体力があるように思え、\n金はさっぱりなかったからな」
1426 = "「Ừ. Lúc đó tôi vừa có hứng thú, lại cảm thấy mình có thời gian và thể lực,\ntrong khi tiền bạc thì hoàn toàn không có.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1622 = "「Chà.」"
# monologue
# JP: なにが面白かったのか、\nハチロクはくすりと小さく笑う。
1795 = "Không biết có gì thú vị,\nmà Hachiroku lại bật cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「歩かれて、どうなりました？」
1408 = "「Thế ngài đi bộ rồi kết quả ra sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「動けなくなり、翌朝を迎え発見、保護され――\n真闇姉に、こっぴどく怒られてげんこつをもらった」
1562 = "「Không thể bước nổi nữa, sáng hôm sau thì được tìm thấy, đưa về——\nBị chị Mayami mắng cho một trận té tát và cho ăn một quả đấm.」"
# 【ハチロク】
# display as 八六
# JP: 「げんこつ、ですか？　あの方が？」
1577 = "「Quả đấm sao ạ? Từ người đó ư?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが想像しているのの、多分数倍は痛い奴だ。\nこつんでもごつんでもなく、ガン！　と来た」
1358 = "「Chắc phải đau gấp mấy lần so với tưởng tượng của Hachiroku đấy.\nKhông phải là cốc đầu hay gõ nhẹ đâu, mà là \"Bốp!\" một cú điếng người cơ.」"
# 【ハチロク】
# display as 八六
# JP: 「それほど強く？」
1397 = "「Mạnh đến thế cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。目から火花が飛び散った。\nそこに怒涛の隈元弁で、手ひどく叱りつけられたのだ」
1432 = "「Ừm. Nổ đom đóm mắt luôn.\nSau đó là một tràng tiếng Kumamoto mắng mỏ xối xả.」"
# monologue
# JP: 小さく、ハチロクが頷き。黙る。
1865 = "Hachiroku khẽ gật đầu. Im lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「『どこに行こうと勝手だが、行き先を言ってからにしろ。\n探すこちらが大変だ』と、そんな意味だと伝わってきた」
917 = "「『Muốn đi đâu thì tùy, nhưng ít nhất cũng phải báo một tiếng chứ.\nNgười đi tìm khổ sở lắm đấy』, đại loại là mang ý nghĩa như vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「ごくまっとうなお叱りですね」
1616 = "「Một lời quở trách vô cùng hợp tình hợp lý nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕もそう思った。そして同時に――\nこの人は僕を叱ってくれると、ホっとした」
1430 = "「Đúng vậy. Tôi cũng nghĩ thế. Và đồng thời——\nTôi cảm thấy nhẹ nhõm vì người này đã chịu mắng mình.」"
# monologue
# JP: ……そうだった。僕はほっとしたのだ。\n事故被害者として腫れ物のように扱うのではなく。
883 = "......Đúng vậy. Tôi đã thấy nhẹ nhõm.\nVì không bị đối xử như một cục u nhọt mang danh nạn nhân tai nạn."
# monologue
# JP: ごくまっとうに、ごくごく普通に――\n僕を扱ってくれる人間に、ようやく出会えて。
2025 = "Vô cùng đường hoàng, vô cùng bình thường——\nCuối cùng tôi cũng gặp được người đối xử với mình như thế."
# 【双鉄】
# display as 雙鐵
# JP: 「ホっとして。だから、家族になれたのだろうな。\n今となっては、そう感じる」
1311 = "「Nhờ cảm giác nhẹ nhõm đó. Mà chúng tôi mới có thể trở thành gia đình.\nBây giờ nghĩ lại, tôi cảm thấy như vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「素敵な方なのですね、真闇様は」
1538 = "「Ngài Mayami quả là một người tuyệt vời nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。誰より頼れる人だ。\nあの人がひとたび本気になれば――…………」
1427 = "「Đúng vậy. Là người đáng tin cậy hơn bất cứ ai.\nMột khi người đó đã nghiêm túc thì——............」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
1666 = "「Ngài Soutetsu?」"
# monologue
# JP: おかしい。なぜだ。考えろ。\n真闇姉が反対なことは明白だ。
1909 = "Kỳ lạ thật. Tại sao chứ. Phải suy nghĩ xem.\nRõ ràng là chị Mayami đang phản đối."
# 【双鉄】
# display as 雙鐵
# JP: 「なのになぜ、帝都の僕にまで届くほど――\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動が活発になってしまったのだ？」
1516 = "「Vậy mà tại sao, lại đến mức lan tới tận tai tôi ở Đế đô——\nHoạt động mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; lại trở nên sôi nổi đến vậy chứ?」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致活動っ！？」
1344 = "「Hoạt động mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ư!?」"
# monologue
# JP: ハチロクの声が跳ね上がる。
1860 = "Giọng Hachiroku vút cao lên."
# 【ハチロク】
# display as 八六
# JP: 「この町にですか？\nこの川の水を、工場で汚そうというのですか？」
1299 = "「Ở thị trấn này sao?\nHọ định dùng nhà máy làm ô nhiễm nguồn nước của dòng sông này ư?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういう話だ。\n僕は、それを食い止めたいと帝都から戻ってきた」
1320 = "「Chuyện là vậy đó.\nTôi từ Đế đô trở về là để ngăn chặn chuyện đó.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは素晴らしいオーナーに巡りあいました！」
1381 = "「Tôi đã may mắn gặp được một người chủ tuyệt vời rồi!」"
# monologue
# JP: 敵意にも近い反発から、一気に感動と喜びへ。\n日々姫が百面相ならば、このハチロクは百感情だ。
1842 = "Từ thái độ phản kháng gần như thù địch, thoắt cái chuyển sang cảm động và vui sướng.\nNếu Hibiki có trăm biểu cảm, thì Hachiroku này có trăm cảm xúc."
# 【ハチロク】
# display as 八六
# JP: 「わたくしをお役立てください、双鉄様。\nこの美しい川の町を、悪の手に渡してはいけません」
1592 = "「Xin hãy cho tôi được góp sức, thưa ngài Soutetsu.\nKhông thể để thị trấn bên sông xinh đẹp này rơi vào tay kẻ ác được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「悪」
1672 = "「Kẻ ác.」"
# monologue
# JP: 随分と強い言葉だ。
2021 = "Một từ ngữ khá là nặng nề."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、悪なのか？」
897 = "「Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; là kẻ ác sao?」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものが、\n名前の中に、そもそも悪を内包するような存在です」
887 = "「Bản thân \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nngay từ cái tên đã bao hàm cái ác (aku) trong đó rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1268 = "「唔」" 
# monologue
# JP: エ“アク”ラ、という言葉遊びか。
1886 = "Trò chơi chữ E-\"aku\"-ra sao."
# monologue
# JP: あまり得意な分野ではないが、\n遊びであれば付き合ってみよう。
2099 = "Tuy không phải lĩnh vực tôi giỏi,\nnhưng nếu là trò đùa thì hùa theo chút cũng được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お前が今ここで、\n身の処し方に困っているのも、名の故か？」
1590 = "「Nếu vậy, việc cô bây giờ ở đây\nđang loay hoay tìm nơi chốn, cũng là do cái tên sao?」"
# 【ハチロク】
# display as 八六
# JP: 「え？　それは……\nいかなる意味でございましょうか？」
1264 = "「Hả? Chuyện đó......\ncó ý nghĩa gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「“流浪”を、お前たちはその名に内包している」
924 = "「\"Lưu lạc\", các cô đã bao hàm nó trong tên gọi của mình rồi.」"
# monologue
# JP: あ、と小さくつぶやいて。\nハチロクはまた、空中に指で文字を書く。
1818 = "A, cô ấy khẽ lẩm bẩm.\nHachiroku lại dùng ngón tay viết chữ vào không trung."
# 【ハチロク】
# display as 八六
# JP: 「レイ“ルロオ”ド――なるほど、暗示的ですね。\n悪に駆逐され、われわれは流浪に身を落とした」
1645 = "「Rai-\"lố-rồ\"-d——ra là vậy, thật đầy tính ám chỉ nhỉ.\nBị kẻ ác đánh đuổi, chúng tôi đành chịu cảnh lưu lạc (ruro).」"
# monologue
# JP: 遊びで返したつもりの言葉を、\nハチロクは真顔で受け止める。
1888 = "Lời tôi định nói đùa để đáp lại,\nHachiroku lại đón nhận bằng vẻ mặt vô cùng nghiêm túc."
# monologue
# JP: その唇が、真一文字に結ばれやがて、小さく歪む。
1841 = "Đôi môi cô ấy mím chặt thành một đường thẳng, rồi khẽ méo xệch đi."
# 【ハチロク】
# display as 八六
# JP: 「やはり悪です。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;も、\\x%lエアクラ;#00ffc040;エアクラ%l;#;を作る工場も」
1485 = "「Quả nhiên là kẻ ác.\nCả \\x%lエアクラ;#00ffc040;Aircra%l;#; lẫn nhà máy chế tạo \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# monologue
# JP: 淡々と。ひどく冷たく吐き捨てる。
2057 = "Thản nhiên. Cô ấy buông lời cay đắng đầy lạnh lẽo."
# 【ハチロク】
# display as 八六
# JP: 「人々の暮らしから鉄道を奪い、大廃線時代を招いた。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の犯した罪を、わたくしは決して許しません」
1348 = "「Cướp đi đường sắt khỏi cuộc sống của người dân, gây ra thời đại Đại bãi bỏ các tuyến.\nTội ác mà \\x%lエアクラ;#00ffc040;Aircra%l;#; đã gây ra, tôi tuyệt đối không tha thứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「罪」
1564 = "「Tội ác.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「より便利だったから人に選ばれただけの話です。\nそれを\\x%lエアクラ;#00ffc040;エアクラ%l;#;の罪というなら、逆恨みでは？」
1169 = "「Đơn giản là vì tiện lợi hơn nên mới được con người lựa chọn thôi.\nNếu gọi đó là tội ác của \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì chẳng phải là giận cá chém thớt sao?」"
# 【ハチロク】
# display as 八六
# JP: 「何者ですかっ！？」
1457 = "「Là kẻ nào!?」"
# monologue
# JP: 完全に不意打ちのナビの声。\nが、ハチロクは悲鳴もあげず、鋭い目つきで誰何する。
2129 = "Giọng nói của Navi vang lên hoàn toàn bất ngờ.\nNhưng Hachiroku không hề hét lên, chỉ phóng ánh mắt sắc lẹm tra hỏi."
# 【ハチロク】
# display as 八六
# JP: 「こそこそ隠れて物申すとは卑怯千万。\n恥じ入りなさい。そして、姿を現しなさい」
1575 = "「Lén lút trốn tránh để lên tiếng thật là hèn hạ.\nHãy biết xấu hổ đi. Và mau hiện nguyên hình ra đây.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「隠れてなどいません。\n本機の姿は、あなたの視界に捉えられています」
1147 = "「Tôi không hề lẩn trốn.\nHình dáng của tôi đang nằm ngay trong tầm nhìn của cô đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「本機？　では」
1480 = "「Của tôi? Vậy thì.」"
# monologue
# JP: 左右を見渡す。\n目に宿っていた険がいくらか、柔らかになる。
1930 = "Nhìn ngó xung quanh.\nVẻ sắc lẹm trong đôi mắt đã dịu đi đôi chút."
# 【ハチロク】
# display as 八六
# JP: 「あなたは――この飛行機なのですか？」
1186 = "「Ngươi——chính là chiếc máy bay này sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「飛行機ではありません」
1146 = "「Không phải là máy bay.」"
# monologue
# JP: ナビは静かに怒っている。\n止めはしない。
2131 = "Navi đang âm thầm tức giận.\nTôi không can ngăn."
# monologue
# JP: 止めたところで、わだかまりは深くなるだけだ。
1982 = "Có can ngăn thì khúc mắc cũng chỉ càng sâu thêm thôi."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「本機は、当機――試作飛行型\\x%lエアクラ;#00ffc040;エアクラ%l;#;、EFL-T007の\n専用\\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビです」
1477 = "「Tôi là Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; chuyên dụng của phương tiện này——\n\\x%lエアクラ;#00ffc040;Aircra%l;#; kiểu bay thử nghiệm, EFL-T007.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;！？　\nまさか、空を飛ぶ\\x%lエアクラ;#00ffc040;エアクラ%l;#;なんてっ！！？」
898 = "「\\x%lエアクラ;#00ffc040;Aircra%l;#;!?\nKhông thể nào, \\x%lエアクラ;#00ffc040;Aircra%l;#; mà lại bay trên trời sao!!?」"
# monologue
# JP: ハチロクの目が僕を捉える。\nすがりついてくる。
1863 = "Ánh mắt Hachiroku khóa chặt lấy tôi.\nĐầy vẻ cầu cứu."
# monologue
# JP: が――\nウソで一時ごまかすことは、それこそ悪だ。
2001 = "Nhưng——\nDùng lời nói dối để lấp liếm nhất thời, đó mới là tội ác."
# 【双鉄】
# display as 雙鐵
# JP: 「あるのだ。今は。\n空にさえ、エアロ＝クラフテック機関の手は届いたのだ」
1549 = "「Có đấy. Bây giờ thì.\nBàn tay của động cơ Aero-Craftech đã vươn tới tận bầu trời rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「ならば降りますっ！」
1631 = "「Thế thì tôi sẽ xuống!」"
# monologue
# JP: 金切り声が鳴り響き、狭いキャノピーが激しく揺れる。\nハチロクが、ここから出ようともがき始める。
2086 = "Tiếng thét chói tai vang lên, vòm kính chật hẹp rung lắc dữ dội.\nHachiroku bắt đầu vùng vẫy muốn thoát ra khỏi đây."
# 【双鉄】
# display as 雙鐵
# JP: 「阿呆かお前は！　\n今ここを出れば地に落ち粉々に壊れるぞっ！」
1190 = "「Cô ngốc hả!\nBây giờ mà ra ngoài thì sẽ rơi xuống đất tan tành đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「そうであっても！　\\x%lエアクラ;#00ffc040;エアクラ%l;#;になぞっ」
1323 = "「Dù có vậy đi nữa! Cũng còn hơn là ở trong \\x%lエアクラ;#00ffc040;Aircra%l;#;」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「くだらない意地で自らの職務を永遠に放棄しますか。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、聞くほどの存在では無いのですね」
1294 = "「Chỉ vì lòng tự ái ngu ngốc mà cô định vĩnh viễn từ bỏ chức vụ của mình sao.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; xem ra cũng chẳng vĩ đại như lời đồn nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1273 = "「!!!」"
# monologue
# JP: ぴたりと止まる。\nハチロクはまるきり動かなくなる。
2033 = "Dừng phắt lại.\nHachiroku hoàn toàn bất động."
# monologue
# JP: ただ目が、瞳が――\n動き全ての激しさを超え、烈火のごとくゆらめき燃える。
2004 = "Chỉ có ánh mắt, con ngươi ấy——\nVượt qua mọi sự dữ dội của cử động, bùng cháy phừng phực như ngọn lửa dữ."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちから職務を――人を貨物を運ぶことを。\nレイルまでをも奪ったのは、あなたがたでしょうに」
1350 = "「Chính các người đã cướp đi chức vụ của chúng tôi——cướp đi công việc vận chuyển hành khách và hàng hóa.\nCướp đi cả đường ray của chúng tôi cơ mà.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「事実誤認の訂正を――」
1197 = "「Xin đính chính lại nhận thức sai lầm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「違うぞハチロク」
1141 = "「Không phải đâu Hachiroku.」"
# monologue
# JP: 割って入れば、すぐさまナビは言葉を止める。\nこれは僕が、人間が言うべき言葉であるから。
2042 = "Tôi vừa chen ngang, Navi lập tức ngừng lời.\nVì đây là lời mà tôi, một con người, phải nói."
# 【双鉄】
# display as 雙鐵
# JP: 「お前自らが言っていたではないか。\n全てを支配するのは人間――全ては、人間の選択だ」
1216 = "「Chẳng phải chính cô đã nói sao.\nKẻ chi phối tất cả là con người——Mọi thứ đều là lựa chọn của con người.」"
# monologue
# JP: 教えてもらった。そのことを。\n金の髪をした見知らぬ少女に。事故の傷がまだ癒えぬころ。
2066 = "Tôi đã được dạy điều đó.\nTừ một thiếu nữ tóc vàng xa lạ. Khi vết thương từ vụ tai nạn vẫn chưa lành."
# monologue
# JP: 憎しみのぶつけどころを見つけることが出来ずに、\n心を腐らせるだけだったころ。
2082 = "Khi tôi không thể tìm được nơi trút bỏ lòng căm hận,\nchỉ biết để trái tim mình dần mục nát."
# 【双鉄】
# display as 雙鐵
# JP: 「たとえ知性を持とうとも、物は決定を下せない。\n決定を下すのは常に人で、その責任を負うのも、人だ」
1224 = "「Dù có sở hữu trí tuệ, đồ vật cũng không thể đưa ra quyết định.\nKẻ đưa ra quyết định luôn là con người, và người phải chịu trách nhiệm cũng là con người.」"
# 【ハチロク】
# display as 八六
# JP: 「そのことならば――当然に、承知いたしております」
1623 = "「Chuyện đó thì——đương nhiên là tôi hiểu rõ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ナビに――“物”に当たるのはやめた方がいい。\nお前の誇りを、お前自身が貶めることになってしまうぞ」
1413 = "「Nếu vậy, cô nên ngừng việc trút giận lên Navi——lên \"đồ vật\" đi.\nChính cô sẽ tự chà đạp lên lòng kiêu hãnh của mình đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ん――」
1267 = "「Ư——」"
# monologue
# JP: ハチロクの肩が小さく揺れる。\n喉が、こくんと何かを飲み込む。
1847 = "Bờ vai Hachiroku khẽ run lên.\nCổ họng cô ấy nuốt ực một cái gì đó."
# monologue
# JP: ハチロクはツバを出すのだろうか？\nそんなことをふと、思ってしまう。
1822 = "Liệu Hachiroku có tiết nước bọt không nhỉ?\nTôi chợt nghĩ vẩn vơ như thế."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおっしゃられるとおりであるかと思います。\n取り乱し八つ当たりをしたことを、心より恥じ入ります」
1664 = "「Tôi nghĩ ngài Soutetsu nói đúng ạ.\nTôi thực tâm cảm thấy xấu hổ vì đã mất bình tĩnh và giận cá chém thớt.」"
# monologue
# JP: そして深々。\nキャノピー内に両手をついて、ハチロクはその頭を下げる。
2096 = "Rồi cô ấy cúi rạp người.\nChống hai tay xuống sàn vòm kính, Hachiroku cúi gập đầu xuống."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「雨……ですか？」
1621 = "「Trời mưa......sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや？」
1139 = "「Đâu có?」"
# monologue
# JP: 雲ひとつ無い。\nなのに、なぜ、ナビともあろうものがそんな――っ！
2036 = "Trời không một gợn mây.\nVậy mà tại sao, một trí tuệ nhân tạo như Navi lại nói thế——A!"
# 【ハチロク】
# display as 八六
# JP: 「けれど、わたくしがその事実を認めれば……\nわたくしは、姉妹全てを貶めることとなってしまいます」
1258 = "「Nhưng mà, nếu tôi thừa nhận sự thật đó......\nthì tôi sẽ làm nhục tất cả các chị em của mình mất.」"
# monologue
# JP: 泣いている。\nまた、大粒の涙をぼろぼろこぼしている。
1977 = "Cô ấy đang khóc.\nNhững giọt nước mắt to tròn lại lã chã tuôn rơi."
# monologue
# JP: 手をついたまま肩を震わせ、\nぬぐおうともせず、ただ、泣いている。
1911 = "Vẫn giữ nguyên tư thế chống tay, bờ vai run rẩy,\nkhông buồn lau đi, cô ấy chỉ khóc."
# 【ハチロク】
# display as 八六
# JP: 「ですから、たとえそれが人間の選択であろうとも――」
1395 = "「Vì vậy, cho dù đó là sự lựa chọn của con người đi chăng nữa——」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理に受け入れることはない。\n正しいと信じる必要もない」
1150 = "「Không cần phải miễn cưỡng chấp nhận đâu.\nCũng không cần phải tin đó là điều đúng đắn.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1274 = "「!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「人間は間違った選択を、行動をしてしまう。\nそれは事実で、だから事故などが起きるのだ」
1174 = "「Con người sẽ đưa ra những lựa chọn, những hành động sai lầm.\nĐó là sự thật, và đó là lý do tai nạn xảy ra.」"
# monologue
# JP: 事故は起きる。\n物でなく、技術ではなく、それを運用する人間の責任で。
1807 = "Tai nạn vẫn xảy ra.\nKhông phải do đồ vật, không phải do công nghệ, mà là do trách nhiệm của con người vận hành chúng."
# monologue
# JP: しかし、“責任”を、たとえ法が取らせたとして――\n憎しみは消えてはくれないし、傷が癒えてもくれはしない。
2005 = "Nhưng mà, cho dù pháp luật có bắt phải chịu \"trách nhiệm\" đi chăng nữa——\nthì lòng căm hận cũng không biến mất, vết thương cũng không lành lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、そのことをこの身を以て知っている。\nだから少しは、お前の憎しみにも共感できるように思う」
1617 = "「Tôi đã hiểu rõ điều đó bằng chính bản thân mình.\nNên tôi nghĩ mình có thể đồng cảm phần nào với lòng căm hận của cô.」"
# 【ハチロク】
# display as 八六
# JP: 「誤った選択を――\nそれに、巻き込まれたものの苦しみを――」
1296 = "「Sự lựa chọn sai lầm——\nVà nỗi đau của những kẻ bị cuốn vào đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。その苦しみと――\nそれゆえの、ぶつけどころのない憎しみを」
1445 = "「Đúng vậy. Nỗi đau đó——\nVà lòng căm hận không biết trút vào đâu bắt nguồn từ đó.」"
# monologue
# JP: ハチロクが顔を僕へと向ける。\n涙をふかずにそのまま向ける。
1836 = "Hachiroku ngẩng mặt lên nhìn tôi.\nVẫn để nguyên những giọt nước mắt chưa lau."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうか教えてください。\nわたくしは――この憎しみをどうすれば」
1418 = "「Nếu vậy, xin hãy chỉ cho tôi.\nTôi——phải làm sao với lòng căm hận này đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「憎むべきは、その決定に巻き込まれた自分の無力さだ。\n憎しみは故に、力をつけることによって[すす]雪ぐべきだ」
1370 = "「Điều đáng hận chính là sự bất lực của bản thân khi bị cuốn vào quyết định đó.\nVì vậy, lòng căm hận nên được gột rửa bằng cách trau dồi sức mạnh.」"
# monologue
# JP: これも、教えてもらったこと。
2070 = "Điều này, cũng là do tôi được dạy."
# monologue
# JP: 生きたまま腐っていく僕に、\n新しい根を与えてくれた、汰斗さんから。
2068 = "Từ ông Taito, người đã trao cho tôi một cội rễ mới\nkhi tôi đang dần mục nát lúc vẫn còn sống."
# 【ハチロク】
# display as 八六
# JP: 「力をつける……\nしかし、今更そうしたところで」
1401 = "「Trau dồi sức mạnh......\nNhưng mà, giờ có làm vậy thì cũng...」"
# 【双鉄】
# display as 雙鐵
# JP: 「時は戻せん。\nしかし、次には巻き込まれずに済むかもしれん」
1463 = "「Thời gian không thể quay lại.\nNhưng, lần tới có thể cô sẽ không bị cuốn vào nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「次……ですか」
1135 = "「Lần tới......sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「来るのだ。必ず。\n生きてさえいれば、否応なしに」
1133 = "「Sẽ đến thôi. Chắc chắn.\nChỉ cần còn sống, dù muốn hay không.」"
# monologue
# JP: そのとき。誰かを救えるのなら。\n救えなかった路子の代わりに、誰か一人でも救えるのなら。
2035 = "Khi đó. Nếu có thể cứu được ai đó.\nThay cho Michiko mà tôi đã không thể cứu, dù chỉ là một người thôi."
# monologue
# JP: その贖罪を果たすこと、そうするために生き抜くこと。\nそれこそ果たすべき最大の義務だと、僕は教えてもらった。
1996 = "Hoàn thành sự chuộc tội đó, sống sót để làm điều đó.\nĐó mới là nghĩa vụ lớn nhất cần phải hoàn thành, tôi đã được dạy như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「無力を嘆くヒマがあるなら、力をつけるために動け。\n無力であった自分を憎み、ゆえに自らを鍛え抜け」
1572 = "「Nếu có thời gian than thở về sự bất lực, thì hãy hành động để trau dồi sức mạnh.\nHãy căm hận bản thân bất lực, và vì thế mà không ngừng rèn luyện chính mình.」"
# 【ハチロク】
# display as 八六
# JP: 「次……は、来ますか？　わたくしのようなものにでも」
1532 = "「Lần tới......liệu có đến không ạ? Với một kẻ như tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前がどのようなものであるのか、\n僕はまだほとんど知らん」
1192 = "「Cô là kẻ như thế nào,\ntôi vẫn chưa biết rõ lắm.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1285 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「が、僕は縁あり、お前のオーナーとなった。\nならば、僕は僕にできるかぎりを尽くそう」
1144 = "「Vâng.」"
# monologue
# JP: 当然だ。\nそれこそ、僕の義務であるのだ。
2013 = "「Nhưng tôi có duyên, trở thành chủ sở hữu của cô.\nNếu vậy, tôi sẽ cố gắng làm hết sức mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前がそれを望むなら。\n僕は必ず、お前に“次”を迎えさせよう」
1571 = "Đương nhiên rồi.\nĐó chính là nghĩa vụ của tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
1660 = "「Nếu cô mong muốn điều đó.\nTôi chắc chắn sẽ giúp cô đón nhận \"lần tới\".」"
# monologue
# JP: また泣く。\n今度は笑いまで混ぜ、整った顔をぐしゃぐしゃにして。
1913 = "「Ngài......Soutetsu.」"
# 【ハチロク】
# display as 八六
# JP: 「体の調子までおかしいようです。\nわたくしは、自分一つさえ、今は制御できておりません」
1604 = "Lại khóc.\nLần này còn xen lẫn cả nụ cười, làm khuôn mặt thanh tú nhăn nhó hết cả."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1433 = "「是嗎」" 
# monologue
# JP: あの汰斗さんが、ガラスケースに“放置”していた。\n記憶の欠落。極端なほどの感情の振れ。
2040 = "「Đến cả tình trạng cơ thể tôi dường như cũng kỳ lạ.\nBây giờ, tôi thậm chí không thể kiểm soát nổi chính mình nữa.」"
# monologue
# JP: ――事実が想像を肉付けしていく。
1803 = "「Vậy sao.」"
# monologue
# JP: （あるいは、ならば……）
2125 = "Ông Taito đó, đã \"bỏ mặc\" cô ấy trong lồng kính.\nKý ức bị khuyết thiếu. Cảm xúc dao động đến mức cực đoan."
# monologue
# JP: そうであるなら、直してやるが――\nハチロクは、ひどい故障品であるのかもしれない。
1917 = "——Những sự thật đang dần đắp thịt thêm cho trí tưởng tượng."
# 【ハチロク】
# display as 八六
# JP: 「“望む”ことなど、いまのわたくしには難しすぎます。\nですが――それでも……」
920 = "（Hoặc có lẽ, nếu vậy......）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1285 = "「嗯」" 
# monologue
# JP: 涙に濡れた目が持ち上がる。\n瞳が、まっすぐ僕へと届く。
1995 = "Nếu đúng là vậy, tôi sẽ sửa chữa cho cô ấy——\nNhưng có thể Hachiroku là một món đồ hỏng hóc nghiêm trọng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様に教えていただいたそのとおり、少しでも……\n回復のため、わたくしは、力をつけて――」
1593 = "「Việc \"mong muốn\" điều gì đó, đối với tôi bây giờ là quá khó.\nNhưng——dù vậy......」"
# monologue
# JP: （ぐう～～っ）
2117 = "Đôi mắt đẫm lệ ngước lên.\nÁnh nhìn truyền thẳng đến tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それで良い。\nお前の体も『腹が減っては戦もできん』と言っている」
1289 = "「Đúng như những gì ngài Soutetsu đã dạy, dù chỉ một chút......\nđể hồi phục, tôi sẽ trau dồi sức mạnh——」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね」
1547 = "（Rột~~~）"
# monologue
# JP: 照れず、まっすぐ答えを返す。\n悪くない。
1798 = "「Vậy là tốt rồi.\nCơ thể cô cũng đang lên tiếng 『Có thực mới vực được đạo』 đấy.」"
# monologue
# JP: 故障してなおハチロクは、\nあの頃の僕よりずっと強いらしい。
1832 = "「Đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら利用しろ。\\x%lエアクラ;#00ffc040;エアクラ%l;#;であれ、なんであれ。\n最も早い道を選んで、選択をできるようになれ」
1410 = "Không chút ngại ngùng, đáp lại thẳng thắn.\nKhông tồi."
# 【ハチロク】
# display as 八六
# JP: 「はい。かしこまりました双鉄様――\nっ！？　なにっ？　\\x%l共感;#00ffc040;共感%l;#;っ！？」
1309 = "Dù đang hỏng hóc, Hachiroku\ncó vẻ vẫn mạnh mẽ hơn tôi ngày ấy rất nhiều."
# monologue
# JP: ハチロクがビクリと背筋をたてる。
1817 = "「Vậy thì hãy lợi dụng nó đi. Dù là \\x%lエアクラ;#00ffc040;Aircra%l;#; hay bất cứ thứ gì.\nHãy chọn con đường nhanh nhất, để bản thân có khả năng đưa ra lựa chọn.」"
# monologue
# JP: その目が頼りなげに動きまわって、\nやがて、キャノピーのセンターパネルに注がれる。
2018 = "「Vâng. Tôi hiểu rồi thưa ngài Soutetsu——\n!? Gì cơ? \\x%l共感;#00ffc040;Cộng cảm%l;#;!?」"
# 【ハチロク】
# display as 八六
# JP: 「あなた――ええと、\\x%lエアクラ;#00ffc040;エアクラ%l;#;・ナビ？」
1194 = "Hachiroku giật mình thẳng lưng lên."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ただナビと。それ以上の呼称は不要です」
1252 = "Ánh mắt ấy dáo dác nhìn quanh vẻ bất lực,\ncuối cùng dán chặt vào bảng điều khiển trung tâm của vòm kính."
# 【ハチロク】
# display as 八六
# JP: 「そう。そうだったのですね――\nナビ、あなたもまた、わたくしたちの……」
1287 = "「Cô——ừm, Navi \\x%lエアクラ;#00ffc040;Aircra%l;#;?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビは、エアロ＝クラフテック社の製品です。\n誰の妹でもありません」
896 = "「Cứ gọi là Navi. Không cần danh xưng nào khác.」"
# monologue
# JP: 妹――
1919 = "「Ra vậy. Là vậy sao——\nNavi, cô cũng là......của chúng tôi......」"
# monologue
# JP: この場合は……後継機種、\nいや、技術の継承先というほどの意味であろうか。
2067 = "「Navi \\x%lエアクラ;#00ffc040;Aircra%l;#; là sản phẩm của công ty Aero-Craftech.\nKhông phải là em gái của ai cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。\nナビがハチロクに共感とやらを送ったか」
1228 = "Em gái——"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしは間違いなく受け取りました」
1447 = "Trong trường hợp này......chắc mang ý nghĩa là dòng máy thế hệ sau,\nà không, là nơi kế thừa công nghệ thì đúng hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビ、いったい何と送った？」
1680 = "「Ra là vậy.\nNavi đã gửi cộng cảm cho Hachiroku sao.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「特には。\n単に臨時の周辺情報を発信しただけです」
1501 = "「Vâng. Tôi chắc chắn đã nhận được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では偶然に、\nそれをハチロクが傍受してしまったというわけか」
1513 = "「Navi, rốt cuộc cô đã gửi gì vậy?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「事実群からは、そのように推測されます」
1351 = "「Không có gì đặc biệt.\nChỉ đơn thuần là phát đi thông tin xung quanh tạm thời thôi.」"
# monologue
# JP: 無愛想極まるナビの言葉に、\nハチロクはふと、唇の端をほころばせる。
2133 = "「Vậy là tình cờ,\nHachiroku đã bắt được tín hiệu đó sao.」"
# 【ハチロク】
# display as 八六
# JP: 「確かに……ふふっ、とても有意な周辺情報を、\nわたくしは偶然、受け取りました」
1546 = "「Từ các dữ kiện thực tế, có thể suy đoán như vậy.」"
# monologue
# JP: いって、ハチロクの視線は下へと。\nいつの間に、高度がかなり落ちている。
1851 = "Nghe những lời vô cùng lạnh nhạt của Navi,\nHachiroku chợt nở một nụ cười mỉm."
# monologue
# JP: はっきり見える銀色の線。二本が長く伸びている。\nハチロクの目に、強い喜びの光が宿る。
1814 = "「Quả thực......fufu, tôi đã tình cờ nhận được,\nnhững thông tin xung quanh vô cùng hữu ích.」"
# 【ハチロク】
# display as 八六
# JP: 「鉄道は――この町ではまだ――\n生き延びてくれているのですね」
1620 = "Nói rồi, Hachiroku đưa mắt nhìn xuống dưới.\nKhông biết từ lúc nào, độ cao đã giảm đi khá nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そのようだな。\n僕がこの町を出たときには、青息吐息だったようだが」
1276 = "Hai đường kẻ màu bạc hiện ra rõ nét. Kéo dài tít tắp.\nTrong mắt Hachiroku ánh lên niềm vui sướng tột độ."
# 【ハチロク】
# display as 八六
# JP: 「生き延びているなら、次があります。\n――双鉄様のお言葉ですよ？」
1250 = "「Đường sắt——ở thị trấn này vẫn——\nvẫn còn tồn tại nhỉ.」"
# monologue
# JP: 口調はいつもどおりだが、声は明らかに弾んでる。\n尻尾があったらぶんぶん振られているだろう。
2051 = "「Ừ......Có vẻ vậy.\nDù lúc tôi rời khỏi thị trấn này, nó đã thoi thóp lắm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「近くに降りて見てみるか？」
1584 = "「Nếu vẫn còn tồn tại thì sẽ có lần tới.\n——Đây là lời của ngài Soutetsu đấy nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「できるのですか！？」
1255 = "Giọng điệu vẫn như bình thường, nhưng nghe rõ sự rộn ràng.\nNếu có đuôi, chắc chắn cô ấy đang vẫy tít thò lò rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「出来る。ナビ」
1253 = "「Có muốn xuống gần đó xem thử không?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「了解しました。\n最適な着水地点を[サーチ,1]探査します」
1155 = "「Có thể sao ạ!?」"
# monologue
# JP: 川の町。おまけに線路もほぼ川沿いだ。\n着水地点には困らない。
2069 = "「Có thể chứ. Navi.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「[サーチ,1]探査終了。ただちに着水を開始しますか？」
1402 = "「Đã rõ.\nTiến hành thăm dò địa điểm hạ cánh trên mặt nước tối ưu nhất.」"
