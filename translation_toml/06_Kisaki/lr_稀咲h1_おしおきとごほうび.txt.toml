# display as 稀咲
# JP: 「ぁっ――あっ――はっ――あっ！！　子宮――精液――\nしゅご――あ――おまんこ――ヴァギナ――おぼれ、る」
1017 = "「Á――á――há――á!! Tử cung――tinh dịch――\ntuyệt quá――a――âm hộ――âm đạo――sắp chìm,\nmất.」"

# monologue
# JP: （びゅうっ！　びゅくっ！　びゅぶっ！　びゅううっ！）
# 1693 = "（咻咻！咻咻！咻咻！咻咻！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――あっ――わかる――なか、でも――精液――\nあつくて――ねばっこい――んうっ――これ――これっ」
1259 = "「Fua――á――cảm nhận được――bên trong,\ncũng――tinh dịch――\nnóng hổi――nhớt nháp――ưn ư――cái này――cái\nnày.」"

# monologue
# JP: （びゅうっ！　びゅぶっ！　びゅっ！　びゅるっ――\nびゅ……ぷ…………ぴ…………ぴりゅっ――――――）
1692 = "（Byuu! Byubu! Byu! Byuru――\nbyu……pu…………pi…………piryu――――――）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！！！！　はあっ！　はあっ！　はあっ！」
1037 = "「Fua!!!!!! Haa! Haa! Haa!」"

# monologue
# JP: 息が、完全にとめられていた。\nあまりに強い射精感に、気道さえもがふさがれていた。
1432 = "Hơi thở, đã bị ngừng lại hoàn toàn.\nCảm giác xuất tinh quá đỗi mãnh liệt khiến\nngay cả đường thở cũng bị tắc nghẽn."

# 【稀咲】
# display as 稀咲
# JP: 「ふぁ……あ……あ……あ――……」
1008 = "「Fua……a……a……a――……」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？　稀咲っ！」
1247 = "「Kisaki? Kisaki!」"

# monologue
# JP: 稀咲がへたりこんでいる。つながったまま、腰の上。\n接合部からどろどろと、新鮮な精液を溢れ出させて――
1547 = "Kisaki ngồi bệt xuống. Vẫn duy trì trạng\nthái kết nối, trên hông tôi.\nTừ chỗ giao hợp, tinh dịch tươi mới sền\nsệt trào ra――"

# 【稀咲】
# display as 稀咲
# JP: 「こんなの――ボク……ばかみたい、嫉妬なんて……\nこんなに――うふふっ――双鉄、僕に、夢中なのに」
1160 = "「Thế này thì――tôi……giống như đồ ngốc vậy,\nlại đi ghen tuông……\nTrong khi――ufufu――Soutetsu, lại say đắm\ntôi đến thế này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲！　どうした、何を当たり前のことを言ってる」
1245 = "「Kisaki! Sao thế, em đang nói cái điều\nhiển nhiên gì vậy.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふえっ！？　あ！　あっ――ううん――\nなんでも……なんでもない……ただ――うぁっ――」
992 = "「Hả!? A! Á――không――\nkhông có gì……không có gì đâu……chỉ\nlà――ưa――」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした！？」
943 = "「Sao thế!?」"

# monologue
# JP: 稀咲の体から力が抜ける。\n骨の全部が砕けたように、ぐでぐでになる。
1526 = "Sức lực rời khỏi cơ thể Kisaki.\nCô ấy mềm nhũn ra, như thể toàn bộ xương\ncốt đều vỡ vụn."

# 【稀咲】
# display as 稀咲
# JP: 「ボクは――つかれた。\nちょっと、がんばりすぎたみたいで」
1183 = "「Tôi――mệt rồi.\nCó vẻ, tôi đã cố gắng hơi quá sức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。密度と濃度がすごすぎた。\n僕も、どろどろに消耗している――っと」
1198 = "「Đúng vậy. Mật độ và nồng độ quá kinh\nkhủng.\nTôi cũng, bị tiêu hao đến rã rời rồi――ơ.」"

# monologue
# JP: 思い出す。今日のセックスがこうも濃くなったきっかけを。
1439 = "Tôi chợt nhớ ra. Lý do khiến cuộc ân ái\nhôm nay trở nên mãnh liệt đến vậy."

# 【稀咲】
# display as 稀咲
# JP: 「どしたの？　双鉄」
1152 = "「Sao thế? Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、思っただけだ――改めて。\nこれは夫婦の絶対の秘密で。そうしなければ勿体ないと」
1208 = "「Không, tôi chỉ nghĩ lại thôi――một lần\nnữa.\nĐây là bí mật tuyệt đối của vợ chồng mình.\nNếu không giữ kín thì phí lắm.」"

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、だね！　本当だ」
1093 = "「Ufufu, đúng nhỉ! Thật đấy.」"

# monologue
# JP: 稀咲が笑う。晴れ晴れと。\n狐の下着を身に着けて、セックスの汗でどろどろのまま。
1540 = "Kisaki mỉm cười. Thật rạng rỡ.\nKhoác trên mình bộ đồ lót cáo, toàn thân\nvẫn còn ướt đẫm mồ hôi sau cuộc ân ái."

# 【稀咲】
# display as 稀咲
# JP: 「あ！？　……って、双鉄？\n消耗、してるんじゃなかったの？」
1007 = "「A!? ……ơ, Soutetsu?\nKhông phải cậu đang, tiêu hao thể lực\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、もちろん消耗しているのだが」
1223 = "「Không, tất nhiên là có tiêu hao rồi,\nnhưng mà.」"

# monologue
# JP: 笑顔の稀咲がかわいいと。\nごく当然のことを思って――ただ、それだけで――
1360 = "Nụ cười của Kisaki thật dễ thương.\nNghĩ đến một điều hiển nhiên như vậy――chỉ\nthế thôi――"

# 【双鉄】
# display as 雙鐵
# JP: 「少し、回復できたみたいだ。\n例えば、この手をもしも解いてもらえるのなら――」
1299 = "「Hình như, tôi đã hồi phục được một chút\nrồi.\nVí dụ như, nếu đôi tay này được cởi\ntrói――」"

# 【稀咲】
# display as 稀咲
# JP: 「んふふっ、双鉄。体を起こして？」
1095 = "「Nfufu, Soutetsu. Ngồi dậy đi nào?」"

# monologue
# JP: 言われるままに体を起こせば稀咲はぴったり僕に張り付き、\n耳奥へ――とろつく甘い媚薬を流す。
1440 = "Làm theo lời cô ấy, tôi ngồi dậy, Kisaki\nliền áp sát vào tôi,\nvà rót vào sâu trong tai tôi――thứ xuân\ndược ngọt ngào đến tan chảy."

# 【稀咲】
# display as 稀咲
# JP: 「この手をほどいてあげたら、さ？\nボク、ぐちゃぐちゃにされちゃうのかな？」
1121 = "「Nếu tôi cởi trói cho đôi tay này, thì\nsao?\nLiệu tôi, có bị cậu làm cho tơi tả không\nnhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それが稀咲のお望みならば」
1116 = "「Nếu đó là mong muốn của Kisaki.」"

# 【稀咲】
# display as 稀咲
# JP: 「さて、どうだろう――」
1285 = "「Nào, ai biết được――」"

# monologue
# JP: 言いながら、耳元に頬に口にキスして。\nそして稀咲は、僕を拘束してるネクタイに指をかける。
1569 = "Vừa nói, cô ấy vừa hôn lên tai, lên má,\nlên môi tôi.\nVà rồi, Kisaki luồn ngón tay vào chiếc cà\nvạt đang trói buộc tôi."
