[script]
# lines: 326 
# 【稀咲】
# display as 稀咲
# JP: 「ん……。ん。ちょっと、動かないで双鉄。\n縛りづらい――――」
1072 = "「Ưm……. Ưm. Chờ chút, đừng cử động\nSoutetsu.\nKhó trói quá――――」"

# 【稀咲】
# display as 稀咲
# JP: 「ん……うん。こんなもの？　手は？\n――ああ、そう。それじゃあ」
970 = "「Ưm……ừm. Thế này à? Tay thì sao?\n――A, đúng rồi. Vậy thì.」"

# 【稀咲】
# display as 稀咲
# JP: 「楽しい楽しい、お仕置きの時間だ」
1155 = "「Giờ phạt, vui vẻ vui vẻ tới rồi đây.」"

# monologue
# JP: 冷ややかな稀咲の声が股間にかかる。\n股間というか、期待で既に膨れ上がっている僕の勃起に。
1531 = "Giọng nói lạnh lùng của Kisaki phả vào hạ\nbộ tôi.\nNói đúng hơn là phả vào sự cương cứng đã\nsưng phồng lên vì mong đợi của tôi."

# 【稀咲】
# display as 稀咲
# JP: 「さて、双鉄。キミは、自分のしたことの罪深さを、\nきちんと把握できているのかな？」
1107 = "「Nào, Soutetsu. Cậu đã nhận thức rõ\ntội lỗi do những việc mình làm chưa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、出来ている。言ってしまった瞬間にすぐ、\n酒に濁った頭でも、『やらかした』と強く思った」
1181 = "「Tất nhiên là rồi. Ngay khoảnh khắc thốt\nra những lời đó,\ndù đầu óc đang chuếnh choáng hơi men, tôi\nvẫn nhận thức rõ ràng là mình 『tiêu rồi』.」"

# monologue
# JP: というか今も、やらかしている自覚はある。\nお仕置きされる状況で、ガチガチに勃起しているゆえに。
1367 = "Đúng hơn là ngay cả bây giờ, tôi cũng ý\nthức được mình đang làm trò gì.\nBởi vì dù đang trong tình cảnh bị trừng\nphạt, tôi lại đang cương cứng đến mức cứng\nngắc."

# 【稀咲】
# display as 稀咲
# JP: 「イベント対応の臨時ダイヤが解消され、キミたち４名が\n同時にシフトから外れられる半日が発生した」
1099 = "「Biểu đồ chạy tàu tạm thời phục vụ sự kiện\nđã bị hủy,\nthế là 4 người các cậu tự dưng được trống\nlịch làm việc cùng lúc trong nửa ngày.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ほっとして――完全に気がゆるんでな、\n休みに入る前に、一杯やろうという話になった」
1080 = "「Ừm. Thở phào nhẹ nhõm――thế là hoàn toàn\nthả lỏng,\nbọn tôi mới bàn nhau đi làm một ly trước\nkhi bắt đầu kỳ nghỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「その話は、誰から？」
1266 = "「Ý tưởng đó, là của ai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこは――すまん。全く記憶にない」
1191 = "「Chuyện đó thì――xin lỗi. Tôi hoàn toàn\nkhông nhớ.」"

# monologue
# JP: 稀咲の瞳がスっと細まる。
1552 = "Đôi mắt của Kisaki khẽ nheo lại."

# 【稀咲】
# display as 稀咲
# JP: 「消去法で推理してみて？」
1219 = "「Thử suy luận bằng phương pháp loại trừ\nxem sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはありえない。僕もそのような誘いはしない。\nれいなの無邪気な軽油飲みたい的発言がきっかけか――」
1257 = "「Hachiroku thì không thể nào. Tôi cũng\nkhông rủ rê kiểu đó.\nHay là bắt nguồn từ câu nói ngây thơ muốn\nuống dầu diesel của Reina――」"

# 【稀咲】
# display as 稀咲
# JP: 「そうでなければ？」
1115 = "「Nếu không phải thế thì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットからの誘いだったという可能性も、\n否定はできない」
935 = "「Cũng không thể phủ nhận khả năng\nlà do Paulette rủ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
1083 = "「Hừm?」"

# monologue
# JP: 勃起が段々しおれてくる。反比例して、疑念が起きる。\nそもそも何故、これほどにエロい格好で――っ痛っ！！？
1584 = "Sự cương cứng dần xìu xuống. Tỉ lệ nghịch\nvới nó, nỗi hoài nghi bắt đầu trỗi dậy.\nMà ngay từ đầu, tại sao cô ấy lại ăn mặc\nkhêu gợi thế này――á đau!!?"

# 【稀咲】
# display as 稀咲
# JP: 「気を散らさない。これはお仕置きの強さを決めるための\n尋問なんだよ？　わかってる？」
1130 = "「Đừng có phân tâm. Đây là cuộc thẩm vấn\nđể quyết định mức độ trừng phạt đấy nhé?\nHiểu chưa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1074 = "「Ừm.」"

# monologue
# JP: ヒリヒリ痛む。熱さとわずかなむず痒さも交じる。\n僕は……そうか――膝の皮膚を[つね]抓られたのか。
1465 = "Đau rát. Lẫn cả sự nóng ran và một chút\nngứa ngáy.\nTôi……ra vậy――vùng da đầu gối bị véo sao."

# 【稀咲】
# display as 稀咲
# JP: 「ボクはね？　双鉄。本とネットで勉強したんだ。\n人体を傷めずに苦痛だけを与える方法を、今日のために」
1298 = "「Cậu biết không? Soutetsu. Tôi đã nghiên\ncứu qua sách vở và mạng internet đấy.\nCách để gây đau đớn mà không làm tổn\nthương cơ thể, là vì ngày hôm nay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、なのか」
1199 = "「Ra, là vậy.」"

# monologue
# JP: 稀咲は少しも笑ってくれない。\n喉がひりひり乾くのに、ツバの一滴もわきでてこない。
1556 = "Kisaki không hề nở một nụ cười nào.\nCổ họng tôi khô rát, nhưng chẳng thể tiết\nra nổi một giọt nước bọt."

# 【稀咲】
# display as 稀咲
# JP: 「学んだ範囲は、拷問とSM。でも拷問はダメだった。\n壊すことも、重要な拷問のテクニックの一つなんだね」
1176 = "「Phạm vi tôi tìm hiểu là tra tấn và SM.\nNhưng tra tấn thì không được.\nVì hủy hoại cơ thể cũng là một trong những\nkỹ thuật tra tấn quan trọng mà nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「知らなかったが……\nそう言われれば納得せざるを得ぬ気もするな」
1279 = "「Tôi không biết điều đó nhưng……\nNghe cô nói vậy thì cũng đành phải đồng ý\nthôi.」"

# monologue
# JP: 例えば十指のうちの一つが永遠に損なわれれば、\n次の行為への畏れは否応なしに、飛躍的に高められよう。
1454 = "Ví dụ như nếu một trong mười ngón tay bị\nhủy hoại vĩnh viễn,\nthì nỗi sợ hãi về hành động tiếp theo chắc\nchắn sẽ tăng vọt lên một cách đáng kể."

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　意図がわかるんだ。なら双鉄には、\n拷問する側の素質があるのかもしれないね？」
1085 = "「Hừm? Cậu hiểu được ý đồ đó à. Vậy thì\nSoutetsu,\ncó lẽ cậu có tố chất của một kẻ tra tấn\nđấy?」"

# monologue
# JP: 稀咲が笑う。ようやく。可憐に。このタイミングで。\n正直、怖い。怖いというのに――
1560 = "Kisaki mỉm cười. Cuối cùng cũng cười. Thật\nđáng yêu. Ngay thời điểm này.\nThành thật mà nói, tôi thấy sợ. Đáng lẽ ra\nphải sợ, thế mà――"

# 【稀咲】
# display as 稀咲
# JP: 「おやおや？　どうしてまた勃起してきたの？\n自分の中の、拷問者の素質に興奮してるのかな」
989 = "「Ây da? Sao lại cương lên nữa rồi?\nHay là đang hưng phấn với tố chất kẻ tra\ntấn bên trong mình thế.」"

# monologue
# JP: （ツネっ）
1721 = "（Véo）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1030 = "「!!!」"

# monologue
# JP: 膝の皮がまた熱くなる。稀咲の指は爪を立てずに、\n皮膚を傷めず、ただ的確に、痛みだけを僕に与えてくれる。
1594 = "Da đầu gối lại nóng ran. Ngón tay Kisaki\nkhông hề dùng móng,\nkhông làm xước da, mà chỉ nhắm chuẩn xác\nđể mang lại cho tôi cảm giác đau đớn."

# 【稀咲】
# display as 稀咲
# JP: 「それとも――\n痛くしてもらえることに、興奮してる？」
1283 = "「Hay là――\nViệc được làm cho đau đớn, khiến cậu hưng\nphấn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「痛くというか……\n大切にしてもらえていることが、とても嬉しい」
1258 = "「Nói là đau đớn thì……\nViệc được cô trân trọng thế này, khiến tôi\nrất vui.」"

# 【稀咲】
# display as 稀咲
# JP: 「え？」
979 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「傷めず痛みのみを与えることは――同じ頑丈な部分でも、\n尻でなく、膝の皮を選んでくれていることは――」
1265 = "「Việc chỉ gây đau mà không làm tổn\nthương――Dù là những phần cơ thể rắn chắc\nnhư nhau,\nnhưng cô lại chọn da đầu gối chứ không\nphải mông――」"

# 【稀咲】
# display as 稀咲
# JP: 「あ」
1009 = "「A.」"

# monologue
# JP: 稀咲の顔が緩んでしまう。仮面が剥がれる。\n作っていない、生の表情にようやく会えた。
1555 = "Khuôn mặt Kisaki dịu lại. Lớp mặt nạ bong\nra.\nCuối cùng tôi cũng được thấy biểu cảm chân\nthật, không gượng gạo của cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の仕事を――蒸気機関車への乗務のことを、\n考えてくれてのことなんだろう」
1202 = "「Là vì cô đang nghĩ đến công việc của\ntôi――\ncông việc trên chuyến tàu hơi nước, đúng\nkhông.」"

# 【稀咲】
# display as 稀咲
# JP: 「そこまですぐにわかっちゃうんだ。\nやっぱり双鉄は、僕と考えの波長が合うね、抜群だ」
947 = "「Cậu nhận ra nhanh đến thế cơ à.\nQuả nhiên Soutetsu rất hợp với tần số suy\nnghĩ của tôi, cực kỳ xuất sắc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかっ！？――たたたたたっ！！」
1287 = "「Vậy thì tốt rồ!?――Đau đau đau đau đau!!」"

# monologue
# JP: （ぎううううううううううううううっ）
1715 = "（Véo mạnh）"

# monologue
# JP: 褒められたのに抓られる。\n痛さと同時に混乱する。なんでどうして何が悪いと。
1376 = "Vừa được khen xong lại bị véo.\nVừa đau đớn vừa bối rối. Tại sao chứ, tôi\nđã làm gì sai."

# 【稀咲】
# display as 稀咲
# JP: 「おや」
987 = "「Ây da.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1039 = "「!?」"

# monologue
# JP: 混乱させられ、強い痛みを与えられ。\nだけれど僕の肉体は――
1463 = "Bị làm cho bối rối, bị ban cho nỗi đau\nmãnh liệt.\nThế nhưng cơ thể tôi lại――"

# 【稀咲】
# display as 稀咲
# JP: 「勃起してるね。\n普段よりもガチガチなんじゃないの？　っていうくらい」
963 = "「Đang cương cứng này.\nĐến mức cứng hơn bình thường luôn ấy chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひっ！？」
# 1039 = "「啊？！」" 

# monologue
# JP: 稀咲の指先が亀頭へと伸び――\n思った瞬間体がびくりと逃げようとする。
1534 = "Đầu ngón tay Kisaki vươn về phía quy đầu――\nNgay khi vừa nhận ra, cơ thể tôi đã giật\nnảy lên định bỏ trốn."

# monologue
# JP: （さすっ）
1726 = "（Vuốt ve）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ」
# 1009 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「ペニスをつねるわけないだろう。\nとても傷みやすそうだし、傷めてしまったら僕も困るし」
1153 = "「Làm sao tôi có thể véo dương vật được\nchứ.\nNó có vẻ rất dễ tổn thương, mà nếu làm\nhỏng nó thì tôi cũng rắc rối lắm.」"

# 【稀咲】
# display as 稀咲
# JP: 「ちゅっ」
1046 = "「Chu.」"

# monologue
# JP: 優しく触れて、亀頭に甘くキスしてくれ。
1539 = "Chạm vào thật dịu dàng, rồi trao cho quy\nđầu một nụ hôn ngọt ngào."

# monologue
# JP: （ぎゅううううううううううっ！！！！）
1713 = "（Véo mạnh!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「っっっっっ！？　痛った――――――――」
1020 = "「っっっっっ!? Đau quá――――――――」"

# 【稀咲】
# display as 稀咲
# JP: 「だから、つねるのはここ。同じところを、何度でも。\n――どう？　理解できた？」
1188 = "「Vì thế, chỗ bị véo là ở đây. Cùng một\nchỗ, bao nhiêu lần cũng được.\n――Sao nào? Đã hiểu chưa?」"

# monologue
# JP: 稀咲が話すその度に、唇が、舌先が、僕の勃起に何度も\n触れる――触れてくれる。ゆえに頷く。体が勝手に。
1522 = "Mỗi lần Kisaki cất lời, đôi môi, đầu lưỡi\ncô ấy lại nhiều lần chạm vào――\nvuốt ve sự cương cứng của tôi. Thế nên tôi\ngật đầu. Cơ thể tự động làm thế."

# 【稀咲】
# display as 稀咲
# JP: 「そ。ふふっ。ここまで思考の波長が噛み合うならさ、\n双鉄はボクが怒ってる理由もきちんと説明できるよね？」
1087 = "「Vậy à. Fufu. Nếu tần số suy nghĩ đã hợp\nnhau đến thế này,\nthì Soutetsu cũng có thể giải thích rõ\nràng lý do tôi tức giận đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……できると思う。酩酊した僕がポーレットに、\n僕ら――稀咲と僕の、夫婦の秘密を、大事なことを」
709 = "「……Tôi nghĩ là được. Vì trong lúc say\nkhướt, tôi đã nói với Paulette,\nnhững chuyện quan trọng, bí mật vợ chồng\ncủa chúng ta――của Kisaki và tôi.」"

# monologue
# JP: 話してしまった事実すら、ぼんやりとしか記憶してない。\nそれがまた、どうしようもなく申し訳ない。
1434 = "Ngay cả sự thật là mình đã nói ra, tôi\ncũng chỉ nhớ lờ mờ.\nĐiều đó lại càng khiến tôi cảm thấy có lỗi\nvô cùng."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕ら以外の、誰にも知らせてはいけないことを。\nうかつにも、話してしまった、そのためだ」
712 = "「……Những chuyện không được phép cho ai\nkhác ngoài chúng ta biết.\nVậy mà tôi lại sơ ý, nói ra mất, là vì\nchuyện đó.」"

# 【稀咲】
# display as 稀咲
# JP: 「ポーレットが連日あまりにニマつくから、なにかあるな\nと感じたんだ。で、油断させて酔い潰して聞き出した」
1211 = "「Mấy ngày liền Paulette cứ cười tủm tỉm\nsuốt, tôi đã cảm thấy\ncó chuyện gì đó rồi. Thế là tôi lơ là cảnh\ngiác, chuốc cho cô ta say mèm rồi moi\nthông tin.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、なんと？」
1104 = "「Paulette đã nói gì?」"

# 【稀咲】
# display as 稀咲
# JP: 「ニマニマ、実にうれしそうに笑ってね。\n『稀咲って、真面目なセックスしてそうなのに――』」
1103 = "「Cô ta cứ cười tủm tỉm, trông có vẻ rất\nvui sướng.\n『Cứ tưởng Kisaki làm tình nghiêm túc lắm\ncơ――』」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ！！！！　そうだ、思い出した！　僕も言われた。\n『双鉄くんと稀咲って、真面目なセックスしてそう』と」
1033 = "「A!!!! Đúng rồi, tôi nhớ ra rồi! Tôi cũng\nbị nói thế.\n『Soutetsu-kun và Kisaki ấy à, có vẻ làm\ntình nghiêm túc lắm』.」"

# 【稀咲】
# display as 稀咲
# JP: 「で、煽られた」
1218 = "「Rồi, cậu bị kích động.」"

# monologue
# JP: 疑問形ではなく、断定形。\n僕も頷く他にない。
