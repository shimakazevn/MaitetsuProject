# 【稀咲】
# display as 稀咲
# JP: 「ん……。ん。ちょっと、動かないで双鉄。\n縛りづらい――――」
1072 = "「嗯……等一下，不要動。這樣不好綁……」" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……うん。こんなもの？　手は？\n――ああ、そう。それじゃあ」
970 = "「呃……嗯，是這樣吧？手呢？哦，對了。就這樣吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「楽しい楽しい、お仕置きの時間だ」
1155 = "「愉快的懲罰時間到了」" 

# monologue
# JP: 冷ややかな稀咲の声が股間にかかる。\n股間というか、期待で既に膨れ上がっている僕の勃起に。
1531 = "稀咲冰冷的嗓音刺激著我的胯下。準確地說，應該是刺激著我因期待而膨脹起來的肉棒。" 

# 【稀咲】
# display as 稀咲
# JP: 「さて、双鉄。キミは、自分のしたことの罪深さを、\nきちんと把握できているのかな？」
1107 = "「好了，雙鐵。你現在知道自己的罪孽有多深重了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、出来ている。言ってしまった瞬間にすぐ、\n酒に濁った頭でも、『やらかした』と強く思った」
1181 = "「我知道。雖然當時喝得神志不清，但我剛說完就意識到自己說錯話了」" 

# monologue
# JP: というか今も、やらかしている自覚はある。\nお仕置きされる状況で、ガチガチに勃起しているゆえに。
1367 = "其實現在我也覺得自己態度不太端正。明明是在接受懲罰，肉棒卻完全勃起了。" 

# 【稀咲】
# display as 稀咲
# JP: 「イベント対応の臨時ダイヤが解消され、キミたち４名が\n同時にシフトから外れられる半日が発生した」
1099 = "「因為給活動準備的臨時時刻表取消了，你們四人就同時有了半天空閒時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ほっとして――完全に気がゆるんでな、\n休みに入る前に、一杯やろうという話になった」
1080 = "「嗯，我們太放鬆了……完全鬆懈下來了啊，就提到休息之前一起喝幾杯」" 

# 【稀咲】
# display as 稀咲
# JP: 「その話は、誰から？」
1266 = "「誰出的主意？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは――すまん。全く記憶にない」
1191 = "「抱歉，完全不記得了」" 

# monologue
# JP: 稀咲の瞳がスっと細まる。
1552 = "稀咲的眼睛眯了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「消去法で推理してみて？」
1219 = "「用排除法推理一下試試？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはありえない。僕もそのような誘いはしない。\nれいなの無邪気な軽油飲みたい的発言がきっかけか――」
1257 = "「肯定不是八六，我也不像會提議這種事情的人。可能是因為玲奈隨口說了句想喝柴油……」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうでなければ？」
1115 = "「如果不是因為這個呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットからの誘いだったという可能性も、\n否定はできない」
935 = "「也有波萊特主動提議的可能性，這我無法否定」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
1083 = "「嗯？」" 

# monologue
# JP: 勃起が段々しおれてくる。反比例して、疑念が起きる。\nそもそも何故、これほどにエロい格好で――っ痛っ！！？
1584 = "肉棒漸漸萎靡下來，腦中反倒冒出一個疑問。稀咲為什麼要穿得這麼色情——好痛！" 

# 【稀咲】
# display as 稀咲
# JP: 「気を散らさない。これはお仕置きの強さを決めるための\n尋問なんだよ？　わかってる？」
1130 = "「少分心想別的事情。這是用審問來決定接下來的懲罰力度，你明白嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1074 = "「嗯」" 

# monologue
# JP: ヒリヒリ痛む。熱さとわずかなむず痒さも交じる。\n僕は……そうか――膝の皮膚を[つね]抓られたのか。
1465 = "火辣的疼痛與搔癢交織在一起。剛才……她是掐住了我膝蓋上的皮膚吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクはね？　双鉄。本とネットで勉強したんだ。\n人体を傷めずに苦痛だけを与える方法を、今日のために」
1298 = "「雙鐵，我在書本和網路上學習過了。為了今天，我學會了如何在不傷害身體的前提下給予對方痛苦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう、なのか」
1199 = "「是嗎……」" 

# monologue
# JP: 稀咲は少しも笑ってくれない。\n喉がひりひり乾くのに、ツバの一滴もわきでてこない。
1556 = "稀咲的表情沒有絲毫笑意。我感覺口乾舌燥，一滴口水都擠不出來。" 

# 【稀咲】
# display as 稀咲
# JP: 「学んだ範囲は、拷問とSM。でも拷問はダメだった。\n壊すことも、重要な拷問のテクニックの一つなんだね」
1176 = "「我看了拷問和ＳＭ的內容。不過拷問還是被我排除了，因為傷害肉體也是拷問技術中重要的一環」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知らなかったが……\nそう言われれば納得せざるを得ぬ気もするな」
1279 = "「這我倒是不知道……不過聽你這麼一說好像可以理解」" 

# monologue
# JP: 例えば十指のうちの一つが永遠に損なわれれば、\n次の行為への畏れは否応なしに、飛躍的に高められよう。
1454 = "比如要是給手指帶來無法挽回的創傷，對於下一次行為的畏懼就會有飛躍性的提升。" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　意図がわかるんだ。なら双鉄には、\n拷問する側の素質があるのかもしれないね？」
1085 = "「嗯？你懂其中的意圖呀。那你說不定還很有成為拷問者的天賦呢」" 

# monologue
# JP: 稀咲が笑う。ようやく。可憐に。このタイミングで。\n正直、怖い。怖いというのに――
1560 = "稀咲終於露出了惹人憐愛的微笑。說實話，在這個時間點只讓我感到恐懼，但是……" 

# 【稀咲】
# display as 稀咲
# JP: 「おやおや？　どうしてまた勃起してきたの？\n自分の中の、拷問者の素質に興奮してるのかな」
989 = "「哎呀呀，怎麼又勃起了？因為自己有拷問的天賦而興奮起來了嗎」" 

# monologue
# JP: （ツネっ）
1721 = "（掐）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1030 = "「啊！！！」" 

