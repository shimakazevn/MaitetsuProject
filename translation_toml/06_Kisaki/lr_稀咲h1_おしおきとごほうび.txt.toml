1249 = "「Cứ như……mèo rửa mặt ấy nhỉ. À không, là\ncáo chứ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、気づいてたんだ。そう、これはキツネ。\nシルバーフォックスなランジェリーだよ」
1089 = "「Fufu, cậu nhận ra rồi à. Đúng vậy, đây là\ncáo.\nLà đồ lót kiểu cáo bạc đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かわいいし、とてもエロいな。話に集中できなかった\n大きな理由は、あまりに性的なその格好だ」
1141 = "「Dễ thương lắm, lại còn rất khêu gợi nữa.\nLý do lớn nhất khiến tôi\nkhông thể tập trung vào câu chuyện là do\nbộ dạng quá khiêu gợi đó đấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「そのため、のランジェリーだろうからね。\n少なくともボクは、その目的のために購入した」
1134 = "「Thì đồ lót là để phục vụ cho mục đích đó\nmà.\nÍt nhất thì tôi cũng đã mua nó vì mục đích\nấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　であらば使い所が」
1200 = "「Vậy sao? Nếu thế thì lúc dùng phải」"

# 【稀咲】
# display as 稀咲
# JP: 「『ここしかない』っていう使い所だったと思うけど、\nボクとしては」
1168 = "「Theo tôi thì, đây chính là lúc\n『chỉ có thể là lúc này』 để dùng nó đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1083 = "「嗯？」" 

# 【稀咲】
# display as 稀咲
# JP: 「だってさ」
1098 = "「Bởi vì nhé.」"

# monologue
# JP: 稀咲が頬をふくらます。\n拗ねた瞳でボクを見上げる。
1577 = "Kisaki phồng má lên.\nNgước nhìn tôi bằng ánh mắt hờn dỗi."

# 【稀咲】
# display as 稀咲
# JP: 「いくら酔ってたからっていっても、ボク以外の女と――\nポーレットとセックスがらみの話をするだなんてさ」
1137 = "「Cho dù có say đến mấy đi chăng nữa, cậu\ncũng không được phép――\nnói chuyện liên quan đến tình dục với\nngười phụ nữ khác ngoài tôi――với Paulette\nchứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「軽率だったし、愚かだった。\n本当に申し訳なく思っておる」
1203 = "「Là do tôi đã quá khinh suất và ngu ngốc.\nTôi thực sự cảm thấy vô cùng có lỗi.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、双鉄がそう感じてくれてるのはわかってる。\nっていうか、そこは疑っていなかった。けど――」
1081 = "「A, tôi biết Soutetsu cảm thấy như vậy mà.\nĐúng hơn là tôi chưa từng nghi ngờ điều\nđó. Nhưng――」"

# monologue
# JP: （つーーーーっ）
1710 = "（Chọc――）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1029 = "「啊！！」" 

# monologue
# JP: 稀咲の指に撫ぜられ気づく。あれだけ激しく射精したのに。\n僕の勃起は、もうガチガチに硬度を取り戻している。
1521 = "Bị ngón tay Kisaki vuốt ve tôi mới nhận\nra. Dù vừa mới xuất tinh mãnh liệt đến\nthế.\nSự cương cứng của tôi đã lấy lại độ cứng\nngắc từ lúc nào."

# 【稀咲】
# display as 稀咲
# JP: 「その話題が出て次のセックスのとき。ほんの少しでも\nしてる途中に――ポーレットのこと思われたらヤだから」
1255 = "「Khi làm tình vào lần tới sau khi chủ đề\nđó được nhắc đến. Dù chỉ là một chút thôi\ntrong lúc đang làm――tôi không muốn cậu\nnghĩ đến Paulette đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！　稀咲っ――っと！！！？」
1235 = "「! Kisaki――ái!!!?」"

# monologue
# JP: 押し倒そうと勢い込んでバランス崩れてそこで初めて\n自分の両手が縛られてるのを思い出しっ――っ！！！
1429 = "Vừa định chồm tới đè cô ấy xuống thì mất\nthăng bằng, lúc đó tôi mới\nnhớ ra là hai tay mình đang bị trói――!!!"

# monologue
# JP: （どさっ）
1695 = "（Bịch）"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――痛っ――た」
1006 = "「A――đau――quá.」"

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、双鉄。はぁい、ごろーーーーーーん」
1094 = "「Fufu, Soutetsu. Nào, lăn qua đây\nnàoooooo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1009 = "「啊」" 

# monologue
# JP: 仰向けに姿勢を直され、伸し掛かられる。\n稀咲はふんわり――しあわせそうに、微笑んでいる。
1533 = "Bị chỉnh lại tư thế nằm ngửa, rồi bị đè\nlên.\nKisaki khẽ mỉm cười――trông thật hạnh phúc."

# 【稀咲】
# display as 稀咲
# JP: 「どうして、ボクを押し倒そうとしたのかな？」
1213 = "「Tại sao cậu lại định đè tôi xuống thế?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、稀咲を抱きたいと思ったゆえだ。\nあまりにいじらしく可愛らしく――愚かであるので」
1222 = "「Tất nhiên là vì tôi muốn ôm Kisaki rồi.\nVì cô quá đỗi đáng thương, quá đỗi đáng\nyêu――và quá đỗi ngốc nghếch.」"

# 【稀咲】
# display as 稀咲
# JP: 「愚か？　ボクが？　どうして？」
1171 = "「Ngốc nghếch? Tôi á? Tại sao?」"

# monologue
# JP: （くちゅっ）
1690 = "（Chụt）"

# monologue
# JP: 拗ねて甘える声に密やかに交じる水音。\n稀咲は性器を、おまんこを、僕の勃起に食い込ませてる。
1392 = "Lẫn trong giọng nói hờn dỗi nũng nịu là\ntiếng nước róc rách nhè nhẹ.\nKisaki đang để bộ phận sinh dục, âm hộ của\nmình, nuốt trọn lấy sự cương cứng của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「愛する妻と二人っきりで、\nその妻がかくも魅力的に装っていて」
1268 = "「Chỉ có hai người với người vợ yêu dấu,\nmà người vợ ấy lại còn ăn mặc quyến rũ đến\nthế này.」"

# monologue
# JP: 胸を、もみたい。けれども腕は縛られたまま動かし得ない。\nそれをわかってか忘れてか、稀咲は僕を見つめるばかりだ。
1400 = "Tôi muốn xoa bóp ngực cô ấy. Nhưng cánh\ntay vẫn bị trói không thể nhúc nhích.\nKhông biết Kisaki có hiểu điều đó hay đã\nquên mất, cô ấy chỉ chăm chăm nhìn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「他の女の――稀咲以外の誰のことさえ思うものか。\nそんなにもったいないことは、僕には出来ない」
1144 = "「Làm sao tôi có thể nghĩ đến người phụ nữ\nkhác――bất kỳ ai ngoài Kisaki được chứ.\nTôi không thể làm một việc lãng phí đến\nnhư vậy đâu.」"

# 【稀咲】
# display as 稀咲
# JP: 「嬉しい――ね。双鉄……そうてつぅ」
1173 = "「Vui quá――nhỉ. Soutetsu……Soutetsuuu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
# 1065 = "「嗯……」" 

# monologue
# JP: 稀咲が上に乗ってくれてる。腕が全く使えずとも、\n腹筋のちからだけでも、体を起こすのは難しくない。
1572 = "Kisaki đang cưỡi lên người tôi. Dù hoàn\ntoàn không dùng được tay,\nnhưng chỉ cần dùng sức cơ bụng, việc ngồi\ndậy cũng không có gì khó khăn."

# 【稀咲】
# display as 稀咲
# JP: 「ん……ちゅっ――ちゅむっ――ちゅ……れ――りゅっ、\nれりゅっ――ちゅうっ――ちゅるるっ――れりゅうう」
1068 = "「Ưm……chu――chumu――chu……re――ryu,\nreryu――chuu――chururu――reryuuu.」"

# monologue
# JP: 軽く合わさった唇が、すぐにぴたりと噛み合って、\nお互いに舌を伸ばして混ぜて唾液を交換しあう。
1427 = "Đôi môi vừa chạm nhẹ đã lập tức gắn chặt\nvào nhau,\ncả hai cùng vươn lưỡi quấn quýt và trao\nđổi nước bọt."

# 【稀咲】
# display as 稀咲
# JP: 「れる――れりゅっ――んっ――ぢゅずっ――（こくっ）\nぷぁ――好き――好き、好き――ん――ちゅ――ちゅう」
1054 = "「Reru――reryu――ưm――juzu――(koku)\npua――thích――thích lắm,\nthích――ưm――chu――chuu.」"

# monologue
# JP: 稀咲の声が稀咲の匂いが稀咲の熱が、ゼロ距離から甘く、\n僕の体に浸透してくる。ただ心地よい――
1398 = "Giọng nói của Kisaki, mùi hương của\nKisaki, hơi ấm của Kisaki, ngọt ngào từ\nkhoảng cách bằng không,\nđang thấm đẫm vào cơ thể tôi. Chỉ thấy\nthật dễ chịu――"

# 【稀咲】
# display as 稀咲
# JP: 「れりゅうぅぅ――れりゅっ――ぬりゅっ――（こくっ）\nちゅっ――ちゅむっ――ちゅううっ――ちゅうううっ」
1055 = "「Reryuuu――reryu――nuryu――(koku)\nchu――chumu――chuuu――chuuuu.」"

# monologue
# JP: キスが解ければ稀咲は軽く僕と鼻先をこすりあわせて
1386 = "Dứt nụ hôn, Kisaki nhẹ nhàng cọ chóp mũi\nvào mũi tôi."

# monologue
# JP: （とんっ）
# 1710 = "（戳）" 

# monologue
# JP: ――ほんのわずかに指でつついて、\n寝転んでいて？　と実に可愛くお願いしてくる。
1395 = "――Cô ấy dùng ngón tay khẽ chọc một cái,\nvà nài nỉ thật đáng yêu: Cứ nằm yên đó\nnhé?"

# 【稀咲】
# display as 稀咲
# JP: 「ね、双鉄。今日はね？　僕が、全部するから。\n双鉄のことが大好きだから、全部、僕がしたいから」
1297 = "「Này, Soutetsu. Hôm nay nhé? Tôi sẽ làm\ntất cả.\nVì tôi rất yêu Soutetsu, nên tôi muốn tự\nmình làm tất cả.」"

# monologue
# JP: （すにゅっ――くちゅっ――ちゅくっ――ちゅっ）
1688 = "（Sunyu――kuchu――chuku――chu）"

# monologue
# JP: 言葉より先、腰がゆるゆる動き出してる。\n小陰唇と膣前庭とで、僕の勃起を愛撫している。
1609 = "Chưa dứt lời, hông cô ấy đã từ từ chuyển\nđộng.\nDùng môi bé và tiền đình âm đạo để ái ân\nsự cương cứng của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も稀咲が大好きだから、僕から愛撫をしたい気持ちも、\n焦がれるほどに強くあるのだが――」
1164 = "「Tôi cũng rất yêu Kisaki, nên tôi cũng\nkhao khát\nđược tự mình ái ân em đến cháy bỏng――」"

# monologue
# JP: ぐ、ぐと力を入れてみる。\nけれどもやはり、後ろ手に縛られた腕は緩みもしない。
1438 = "Tôi thử dùng sức gồng lên.\nNhưng quả nhiên, đôi tay bị trói quặt ra\nsau vẫn không hề nới lỏng."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲が望んでくれるのならば、僕はもちろん\n今夜の全てを、稀咲の好きに任せよう」
1119 = "「Nếu Kisaki đã mong muốn như vậy, thì tất\nnhiên\nđêm nay tôi sẽ giao phó mọi thứ cho em\nđịnh đoạt.」"

# 【稀咲】
# display as 稀咲
# JP: 「うんっ、任された」
1077 = "「Ừm, cứ giao cho tôi.」"

# monologue
# JP: こどものような口調と笑顔。\nけれども稀咲のおまんこは、ひっきりなしに蠢いて――
1558 = "Giọng điệu và nụ cười ngây thơ như một đứa\ntrẻ.\nNhưng âm hộ của Kisaki lại không ngừng ngọ\nnguậy――"

# 【稀咲】
# display as 稀咲
# JP: 「それじゃぁあ」
1289 = "「Vậy thì.」"

# monologue
# JP: 稀咲が腰を持ち上げる。\n亀頭の先と膣口を、ぴたりと合わせてキスさせる。
1537 = "Kisaki nhấc hông lên.\nĐể đỉnh quy đầu và cửa mình khít chặt vào\nnhau như đang trao một nụ hôn."

# 【稀咲】
# display as 稀咲
# JP: 「いただきまぁす」
1186 = "「Tôi ăn đâyyyy.」"

# monologue
# JP: （くぷっ）
# 1690 = "（咕啾）" 

# 【稀咲】
# display as 稀咲
# JP: 「んっ！！！！！」
1027 = "「Ưm!!!!!」"

# monologue
# JP: 亀頭の、わずかに半分ほど。\nカリ首までをも収めぬところで、稀咲は一度動きを止める。
1621 = "Mới vào được chừng một nửa quy đầu.\nChưa ngập đến rãnh quy đầu, Kisaki đã dừng\nlại một nhịp."

# 【稀咲】
# display as 稀咲
# JP: 「（すーっ、はーっ――すーっ、はーっ）」
1306 = "「(Hít, thở――hít, thở)」"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ……く」
# 1065 = "「嗯……」" 

# monologue
# JP: 稀咲の息に呼応して、稀咲の膣口もゆるく息づく。\nくぱくぱひくひく、早く奥へと、僕の亀頭に囁いてくる。
1549 = "Hô ứng với nhịp thở của Kisaki, cửa mình\ncủa cô ấy cũng khẽ khàng phập phồng.\nĐóng mở co giật, như đang thì thầm giục\ngiã quy đầu của tôi hãy mau tiến vào sâu\nhơn."

# 【稀咲】
# display as 稀咲
# JP: 「っ……ぁっ――ふっ――あっ！」
710 = "「……á――phù――á!」"

# monologue
# JP: （ちゅにゅんっ！）
1689 = "（Chunyun!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅあっ！」
# 1028 = "「啊！」" 

# monologue
# JP: 亀頭の全部が呑み込まれる。\n稀咲の膣の狭さと熱さを一層強く感じられ――っ！！
1619 = "Toàn bộ quy đầu bị nuốt chửng.\nSự chật chội và nóng rực từ âm đạo của\nKisaki truyền đến càng thêm mãnh liệt――!!"

# monologue
# JP: （亀頭が――まだ敏感なままなのか。\nそれとも稀咲が、普段よりも興奮しているのか）
1441 = "(Quy đầu――vẫn còn đang nhạy cảm sao.\nHay là do Kisaki đang hưng phấn hơn ngày\nthường)"

# monologue
# JP: 稀咲の膣の脈動が、はっきり亀頭に伝わってくる。\n普段には無いその感覚が、亀頭をぶるぶる震えさせる。
1622 = "Nhịp đập từ âm đạo của Kisaki truyền đến\nquy đầu một cách rõ rệt.\nCảm giác khác hẳn mọi ngày ấy khiến quy\nđầu run lên bần bật."

# 【稀咲】
# display as 稀咲
# JP: 「少し……動くね？　んっ――」
1185 = "「Tôi sẽ……động một chút nhé? Ưm――」"

# monologue
# JP: （ぐりゅんっ）
# 1690 = "（咕啾）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んぐっ！！」
# 1001 = "「唔！！」" 

# monologue
# JP: 予想していた縦ではなくて、グラインド。\n稀咲の腰は小さくゆるく、円を描くように動き始める。
1458 = "Không phải chiều dọc như tôi dự đoán, mà\nlà xoay tròn.\nHông Kisaki bắt đầu chuyển động vẽ thành\nnhững vòng tròn nhỏ và chậm rãi."

# 【双鉄】
# display as 雙鐵
# JP: 「こ――れはっ……」
1280 = "「Cái――này là……」"

# monologue
# JP: 稀咲の膣に気持ちよくない部分などない。\nそこに単なる脈動が、どくんどくんが加わるだけで――
1412 = "Âm đạo của Kisaki không có chỗ nào là\nkhông sướng cả.\nGiờ đây lại thêm nhịp đập đơn thuần, thình\nthịch thình thịch hòa vào――"

# 【稀咲】
# display as 稀咲
# JP: 「ふ……うふふっ――そう、てつ――んっ……\nだらしない顔……溶け出しそうな顔を――して、るよ？」
986 = "「Phù……ufufu――Sou, tetsu――ưm……\nCái bản mặt lôi thôi……như sắp tan chảy\nra――kìa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、こそ――だ――\nふふっ――きっと、同じ様な顔なのだろう、な」
945 = "「Kisaki, cũng vậy――mà――\nFufu――chắc chắn, cũng đang làm vẻ mặt\ngiống hệt thôi, nhỉ.」"

# monologue
# JP: （くりゅっ――くりゅっ――ぐりゅっ――くりゅっ――）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 

# monologue
# JP: 亀頭の先を、小さな指で柔らかく叩かれているような快感。\nほんの僅かな+αが、最高の膣を未知の膣へと昇華させる。
