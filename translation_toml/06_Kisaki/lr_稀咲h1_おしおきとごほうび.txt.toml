# display as 雙鐵
# JP: 「かわいいし、とてもエロいな。話に集中できなかった\n大きな理由は、あまりに性的なその格好だ」
1141 = "「Dễ thương lắm, lại còn rất khêu gợi nữa. Lý do lớn nhất khiến tôi không thể tập trung vào câu chuyện là do bộ dạng quá khiêu gợi đó đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「そのため、のランジェリーだろうからね。\n少なくともボクは、その目的のために購入した」
1134 = "「Thì đồ lót là để phục vụ cho mục đích đó mà. Ít nhất thì tôi cũng đã mua nó vì mục đích ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　であらば使い所が」
1200 = "「Vậy sao? Nếu thế thì lúc dùng phải」"
# 【稀咲】
# display as 稀咲
# JP: 「『ここしかない』っていう使い所だったと思うけど、\nボクとしては」
1168 = "「Theo tôi thì, đây chính là lúc 『chỉ có thể là lúc này』 để dùng nó đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1083 = "「嗯？」" 
# 【稀咲】
# display as 稀咲
# JP: 「だってさ」
1098 = "「Bởi vì nhé.」"
# monologue
# JP: 稀咲が頬をふくらます。\n拗ねた瞳でボクを見上げる。
1577 = "Kisaki phồng má lên. Ngước nhìn tôi bằng ánh mắt hờn dỗi."
# 【稀咲】
# display as 稀咲
# JP: 「いくら酔ってたからっていっても、ボク以外の女と――\nポーレットとセックスがらみの話をするだなんてさ」
1137 = "「Cho dù có say đến mấy đi chăng nữa, cậu cũng không được phép―― nói chuyện liên quan đến tình dục với người phụ nữ khác ngoài tôi――với Paulette chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「軽率だったし、愚かだった。\n本当に申し訳なく思っておる」
1203 = "「Là do tôi đã quá khinh suất và ngu ngốc. Tôi thực sự cảm thấy vô cùng có lỗi.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、双鉄がそう感じてくれてるのはわかってる。\nっていうか、そこは疑っていなかった。けど――」
1081 = "「A, tôi biết Soutetsu cảm thấy như vậy mà. Đúng hơn là tôi chưa từng nghi ngờ điều đó. Nhưng――」"
# monologue
# JP: （つーーーーっ）
1710 = "（Chọc――）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1029 = "「啊！！」" 
# monologue
# JP: 稀咲の指に撫ぜられ気づく。あれだけ激しく射精したのに。\n僕の勃起は、もうガチガチに硬度を取り戻している。
1521 = "Bị ngón tay Kisaki vuốt ve tôi mới nhận ra. Dù vừa mới xuất tinh mãnh liệt đến thế. Sự cương cứng của tôi đã lấy lại độ cứng ngắc từ lúc nào."
# 【稀咲】
# display as 稀咲
# JP: 「その話題が出て次のセックスのとき。ほんの少しでも\nしてる途中に――ポーレットのこと思われたらヤだから」
1255 = "「Khi làm tình vào lần tới sau khi chủ đề đó được nhắc đến. Dù chỉ là một chút thôi trong lúc đang làm――tôi không muốn cậu nghĩ đến Paulette đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　稀咲っ――っと！！！？」
1235 = "「! Kisaki――ái!!!?」"
# monologue
# JP: 押し倒そうと勢い込んでバランス崩れてそこで初めて\n自分の両手が縛られてるのを思い出しっ――っ！！！
1429 = "Vừa định chồm tới đè cô ấy xuống thì mất thăng bằng, lúc đó tôi mới nhớ ra là hai tay mình đang bị trói――!!!"
# monologue
# JP: （どさっ）
1695 = "（Bịch）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――痛っ――た」
1006 = "「A――đau――quá.」"
# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、双鉄。はぁい、ごろーーーーーーん」
1094 = "「Fufu, Soutetsu. Nào, lăn qua đây nàoooooo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1009 = "「啊」" 
# monologue
# JP: 仰向けに姿勢を直され、伸し掛かられる。\n稀咲はふんわり――しあわせそうに、微笑んでいる。
1533 = "Bị chỉnh lại tư thế nằm ngửa, rồi bị đè lên. Kisaki khẽ mỉm cười――trông thật hạnh phúc."
# 【稀咲】
# display as 稀咲
# JP: 「どうして、ボクを押し倒そうとしたのかな？」
1213 = "「Tại sao cậu lại định đè tôi xuống thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、稀咲を抱きたいと思ったゆえだ。\nあまりにいじらしく可愛らしく――愚かであるので」
1222 = "「Tất nhiên là vì tôi muốn ôm Kisaki rồi. Vì cô quá đỗi đáng thương, quá đỗi đáng yêu――và quá đỗi ngốc nghếch.」"
# 【稀咲】
# display as 稀咲
# JP: 「愚か？　ボクが？　どうして？」
1171 = "「Ngốc nghếch? Tôi á? Tại sao?」"
# monologue
# JP: （くちゅっ）
1690 = "（Chụt）"
# monologue
# JP: 拗ねて甘える声に密やかに交じる水音。\n稀咲は性器を、おまんこを、僕の勃起に食い込ませてる。
1392 = "Lẫn trong giọng nói hờn dỗi nũng nịu là tiếng nước róc rách nhè nhẹ. Kisaki đang để bộ phận sinh dục, âm hộ của mình, nuốt trọn lấy sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「愛する妻と二人っきりで、\nその妻がかくも魅力的に装っていて」
1268 = "「Chỉ có hai người với người vợ yêu dấu, mà người vợ ấy lại còn ăn mặc quyến rũ đến thế này.」"
# monologue
# JP: 胸を、もみたい。けれども腕は縛られたまま動かし得ない。\nそれをわかってか忘れてか、稀咲は僕を見つめるばかりだ。
1400 = "Tôi muốn xoa bóp ngực cô ấy. Nhưng cánh tay vẫn bị trói không thể nhúc nhích. Không biết Kisaki có hiểu điều đó hay đã quên mất, cô ấy chỉ chăm chăm nhìn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「他の女の――稀咲以外の誰のことさえ思うものか。\nそんなにもったいないことは、僕には出来ない」
1144 = "「Làm sao tôi có thể nghĩ đến người phụ nữ khác――bất kỳ ai ngoài Kisaki được chứ. Tôi không thể làm một việc lãng phí đến như vậy đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「嬉しい――ね。双鉄……そうてつぅ」
1173 = "「Vui quá――nhỉ. Soutetsu……Soutetsuuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
# 1065 = "「嗯……」" 
# monologue
# JP: 稀咲が上に乗ってくれてる。腕が全く使えずとも、\n腹筋のちからだけでも、体を起こすのは難しくない。
1572 = "Kisaki đang cưỡi lên người tôi. Dù hoàn toàn không dùng được tay, nhưng chỉ cần dùng sức cơ bụng, việc ngồi dậy cũng không có gì khó khăn."
# 【稀咲】
# display as 稀咲
# JP: 「ん……ちゅっ――ちゅむっ――ちゅ……れ――りゅっ、\nれりゅっ――ちゅうっ――ちゅるるっ――れりゅうう」
1068 = "「Ưm……chu――chumu――chu……re――ryu, reryu――chuu――chururu――reryuuu.」"
# monologue
# JP: 軽く合わさった唇が、すぐにぴたりと噛み合って、\nお互いに舌を伸ばして混ぜて唾液を交換しあう。
1427 = "Đôi môi vừa chạm nhẹ đã lập tức gắn chặt vào nhau, cả hai cùng vươn lưỡi quấn quýt và trao đổi nước bọt."
# 【稀咲】
# display as 稀咲
# JP: 「れる――れりゅっ――んっ――ぢゅずっ――（こくっ）\nぷぁ――好き――好き、好き――ん――ちゅ――ちゅう」
1054 = "「Reru――reryu――ưm――juzu――(koku) pua――thích――thích lắm, thích――ưm――chu――chuu.」"
# monologue
# JP: 稀咲の声が稀咲の匂いが稀咲の熱が、ゼロ距離から甘く、\n僕の体に浸透してくる。ただ心地よい――
1398 = "Giọng nói của Kisaki, mùi hương của Kisaki, hơi ấm của Kisaki, ngọt ngào từ khoảng cách bằng không, đang thấm đẫm vào cơ thể tôi. Chỉ thấy thật dễ chịu――"
# 【稀咲】
# display as 稀咲
# JP: 「れりゅうぅぅ――れりゅっ――ぬりゅっ――（こくっ）\nちゅっ――ちゅむっ――ちゅううっ――ちゅうううっ」
1055 = "「Reryuuu――reryu――nuryu――(koku) chu――chumu――chuuu――chuuuu.」"
# monologue
# JP: キスが解ければ稀咲は軽く僕と鼻先をこすりあわせて
1386 = "Dứt nụ hôn, Kisaki nhẹ nhàng cọ chóp mũi vào mũi tôi."
# monologue
# JP: （とんっ）
# 1710 = "（戳）" 
# monologue
# JP: ――ほんのわずかに指でつついて、\n寝転んでいて？　と実に可愛くお願いしてくる。
1395 = "――Cô ấy dùng ngón tay khẽ chọc một cái, và nài nỉ thật đáng yêu: Cứ nằm yên đó nhé?"
# 【稀咲】
# display as 稀咲
# JP: 「ね、双鉄。今日はね？　僕が、全部するから。\n双鉄のことが大好きだから、全部、僕がしたいから」
1297 = "「Này, Soutetsu. Hôm nay nhé? Tôi sẽ làm tất cả. Vì tôi rất yêu Soutetsu, nên tôi muốn tự mình làm tất cả.」"
# monologue
# JP: （すにゅっ――くちゅっ――ちゅくっ――ちゅっ）
1688 = "（Sunyu――kuchu――chuku――chu）"
# monologue
# JP: 言葉より先、腰がゆるゆる動き出してる。\n小陰唇と膣前庭とで、僕の勃起を愛撫している。
1609 = "Chưa dứt lời, hông cô ấy đã từ từ chuyển động. Dùng môi bé và tiền đình âm đạo để ái ân sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も稀咲が大好きだから、僕から愛撫をしたい気持ちも、\n焦がれるほどに強くあるのだが――」
1164 = "「Tôi cũng rất yêu Kisaki, nên tôi cũng khao khát được tự mình ái ân em đến cháy bỏng――」"
# monologue
# JP: ぐ、ぐと力を入れてみる。\nけれどもやはり、後ろ手に縛られた腕は緩みもしない。
1438 = "Tôi thử dùng sức gồng lên. Nhưng quả nhiên, đôi tay bị trói quặt ra sau vẫn không hề nới lỏng."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲が望んでくれるのならば、僕はもちろん\n今夜の全てを、稀咲の好きに任せよう」
1119 = "「Nếu Kisaki đã mong muốn như vậy, thì tất nhiên đêm nay tôi sẽ giao phó mọi thứ cho em định đoạt.」"
# 【稀咲】
# display as 稀咲
# JP: 「うんっ、任された」
1077 = "「Ừm, cứ giao cho tôi.」"
# monologue
# JP: こどものような口調と笑顔。\nけれども稀咲のおまんこは、ひっきりなしに蠢いて――
1558 = "Giọng điệu và nụ cười ngây thơ như một đứa trẻ. Nhưng âm hộ của Kisaki lại không ngừng ngọ nguậy――"
# 【稀咲】
# display as 稀咲
# JP: 「それじゃぁあ」
1289 = "「Vậy thì.」"
# monologue
# JP: 稀咲が腰を持ち上げる。\n亀頭の先と膣口を、ぴたりと合わせてキスさせる。
1537 = "Kisaki nhấc hông lên. Để đỉnh quy đầu và cửa mình khít chặt vào nhau như đang trao một nụ hôn."
# 【稀咲】
# display as 稀咲
# JP: 「いただきまぁす」
1186 = "「Tôi ăn đâyyyy.」"
# monologue
# JP: （くぷっ）
# 1690 = "（咕啾）" 
# 【稀咲】
# display as 稀咲
# JP: 「んっ！！！！！」
1027 = "「Ưm!!!!!」"
# monologue
# JP: 亀頭の、わずかに半分ほど。\nカリ首までをも収めぬところで、稀咲は一度動きを止める。
1621 = "Mới vào được chừng một nửa quy đầu. Chưa ngập đến rãnh quy đầu, Kisaki đã dừng lại một nhịp."
# 【稀咲】
# display as 稀咲
# JP: 「（すーっ、はーっ――すーっ、はーっ）」
1306 = "「(Hít, thở――hít, thở)」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ……く」
# 1065 = "「嗯……」" 
# monologue
# JP: 稀咲の息に呼応して、稀咲の膣口もゆるく息づく。\nくぱくぱひくひく、早く奥へと、僕の亀頭に囁いてくる。
1549 = "Hô ứng với nhịp thở của Kisaki, cửa mình của cô ấy cũng khẽ khàng phập phồng. Đóng mở co giật, như đang thì thầm giục giã quy đầu của tôi hãy mau tiến vào sâu hơn."
# 【稀咲】
# display as 稀咲
# JP: 「っ……ぁっ――ふっ――あっ！」
710 = "「……á――phù――á!」"
# monologue
# JP: （ちゅにゅんっ！）
1689 = "（Chunyun!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅあっ！」
# 1028 = "「啊！」" 
# monologue
# JP: 亀頭の全部が呑み込まれる。\n稀咲の膣の狭さと熱さを一層強く感じられ――っ！！
1619 = "Toàn bộ quy đầu bị nuốt chửng. Sự chật chội và nóng rực từ âm đạo của Kisaki truyền đến càng thêm mãnh liệt――!!"
# monologue
# JP: （亀頭が――まだ敏感なままなのか。\nそれとも稀咲が、普段よりも興奮しているのか）
1441 = "(Quy đầu――vẫn còn đang nhạy cảm sao. Hay là do Kisaki đang hưng phấn hơn ngày thường)"
# monologue
# JP: 稀咲の膣の脈動が、はっきり亀頭に伝わってくる。\n普段には無いその感覚が、亀頭をぶるぶる震えさせる。
1622 = "Nhịp đập từ âm đạo của Kisaki truyền đến quy đầu một cách rõ rệt. Cảm giác khác hẳn mọi ngày ấy khiến quy đầu run lên bần bật."
# 【稀咲】
# display as 稀咲
# JP: 「少し……動くね？　んっ――」
1185 = "「Tôi sẽ……động một chút nhé? Ưm――」"
# monologue
# JP: （ぐりゅんっ）
# 1690 = "（咕啾）" 
# 【双鉄】
# display as 雙鐵
# JP: 「んぐっ！！」
# 1001 = "「唔！！」" 
# monologue
# JP: 予想していた縦ではなくて、グラインド。\n稀咲の腰は小さくゆるく、円を描くように動き始める。
1458 = "Không phải chiều dọc như tôi dự đoán, mà là xoay tròn. Hông Kisaki bắt đầu chuyển động vẽ thành những vòng tròn nhỏ và chậm rãi."
# 【双鉄】
# display as 雙鐵
# JP: 「こ――れはっ……」
1280 = "「Cái――này là……」"
# monologue
# JP: 稀咲の膣に気持ちよくない部分などない。\nそこに単なる脈動が、どくんどくんが加わるだけで――
1412 = "Âm đạo của Kisaki không có chỗ nào là không sướng cả. Giờ đây lại thêm nhịp đập đơn thuần, thình thịch thình thịch hòa vào――"
# 【稀咲】
# display as 稀咲
# JP: 「ふ……うふふっ――そう、てつ――んっ……\nだらしない顔……溶け出しそうな顔を――して、るよ？」
986 = "「Phù……ufufu――Sou, tetsu――ưm…… Cái bản mặt lôi thôi……như sắp tan chảy ra――kìa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、こそ――だ――\nふふっ――きっと、同じ様な顔なのだろう、な」
945 = "「Kisaki, cũng vậy――mà―― Fufu――chắc chắn, cũng đang làm vẻ mặt giống hệt thôi, nhỉ.」"
# monologue
# JP: （くりゅっ――くりゅっ――ぐりゅっ――くりゅっ――）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 
# monologue
# JP: 亀頭の先を、小さな指で柔らかく叩かれているような快感。\nほんの僅かな+αが、最高の膣を未知の膣へと昇華させる。
1409 = "Khoái cảm tựa như có những ngón tay nhỏ bé đang gõ mềm mại lên đỉnh quy đầu. Chỉ một chút yếu tố cộng thêm ấy đã thăng hoa âm đạo vốn dĩ tuyệt vời nhất thành một âm đạo chưa từng được biết đến."
# 【稀咲】
# display as 稀咲
# JP: 「そう、てつ――んっ――双鉄……ね？」
1296 = "「Sou, tetsu――ưm――Soutetsu……này?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1074 = "「嗯」" 
# monologue
# JP: （にゅっ――ぶっ――つっ――くりゅっ――）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 
# 【稀咲】
# display as 稀咲
# JP: 「んんんんっっ――ふあっ――あ――きもち、いっ――\n双鉄の、ペニス、太、くて――ボクの、ヴァギナを――」
1075 = "「Ưm ưm ưm ưm――fua――a――sướng, quá―― Dương vật, của Soutetsu, to, quá――đang làm, âm đạo, của tôi――」"
# monologue
# JP: まったく贅肉のない稀咲がけれど、その膣内にはこれほど\nむちむちみっちりとした肉を隠し持っている。
1564 = "Tuy Kisaki hoàn toàn không có chút mỡ thừa nào, nhưng bên trong âm đạo cô ấy lại cất giấu những thớ thịt đầy đặn và khít khao đến thế."
# monologue
# JP: （ぎゅるっ――くりゅっ――くっ――くりゅんん）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 
# 【稀咲】
# display as 稀咲
# JP: 「えぐって――ね？　わかるよね？　びくん、びくんて、\n射精したくて――びゅうびゅうしたくて、甘えてる、の」
1100 = "「Ngoáy tung lên――nhỉ? Cậu cảm nhận được đúng không? Giật giật, giật giật, đang muốn xuất tinh――muốn bắn phọt ra, nên mới làm nũng, đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、わかるさ。僕も勃起も、全く同じ気持ちゆえ」
1221 = "「Tất nhiên, tôi biết chứ. Vì cả tôi và sự cương cứng này, đều có chung một cảm xúc mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ――ん――そう、なんだ。\n親子そろって――んっっ――正直、もの、だねっ」
995 = "「Fufu――ưm――vậy, sao. Cả hai cha con――ưm――đều thật thà, nhỉ.」"
# monologue
# JP: （きゅっ――くりゅっ――きゅりゅんっ――くりゅっ）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 
# monologue
# JP: やわやわむちむちの膣内の、わずかにぞりっとするところ。\nそこに何度も、何度も何度も、稀咲は亀頭をすりつける。
1623 = "Bên trong âm đạo mềm mại đầy đặn, có một điểm hơi sần sùi. Kisaki không ngừng cọ xát quy đầu vào đó hết lần này đến lần khác."
# 【双鉄】
# display as 雙鐵
# JP: 「勃起の、ことを――息子、呼ばわりは、されるが――\nくっっ――その親と――初めて、呼ばれた、気が、する」
1190 = "「Sự cương cứng――thường bị gọi là, con trai, nhưng―― kư――bị gọi là cha của nó――thì hình như, đây là lần đầu tiên, đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ん……ふあっ――あっ――そう、だった、かな。\nにたもの、親子って――んっ……思う――けど――っ！」
1073 = "「Ưm……fua――á――vậy, sao, nhỉ. Nhưng tôi thấy――ưm……hai cha con, giống nhau lắm――đấy!」"
# monologue
# JP: （ぐっっ！！！　ずにゅううぅぅぅぅう――こつっ！）
1709 = "（Gư!!! Zunyuuuu――kotsu!）"
# 【稀咲】
# display as 稀咲
# JP: 「んううっ！！！！」
1026 = "「Ưn ư ư!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁっ！！！！！」
1034 = "「Ư á!!!!!」"
# monologue
# JP: 一番奥に亀頭があたり、二人同時に声が出て、\n二人同時に息を詰める。鼓動がヤバイ。汗が吹き出す。
1625 = "Quy đầu chạm đến tận cùng, cả hai cùng lúc thốt lên thành tiếng, cả hai cùng lúc nín thở. Tim đập dữ dội. Mồ hôi túa ra."
# 【稀咲】
# display as 稀咲
# JP: 「ふ～っ――ふ～っ――ふ～っ――ふ～っ――」
978 = "「Phù~――phù~――phù~――phù~――」"
# monologue
# JP: 子宮口からも、稀咲の脈動が伝わってくる。\n期待に喉が乾いてしまう。勃起はもはや、痛いくらいだ。
1407 = "Từ cửa tử cung, nhịp đập của Kisaki cũng truyền đến. Sự mong đợi khiến cổ họng tôi khô khốc. Sự cương cứng giờ đây đã đến mức phát đau."
# 【稀咲】
# display as 稀咲
# JP: 「それ、じゃあ――さ」
# 1289 = "「那就開始吧」" 
# monologue
# JP: （ずろおおおおおおおおおおおおおおおおっ！！！）
1706 = "（Zuro o o o o o o o o o o o o o o o o o!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっっ！！！」
# 1030 = "「啊！！！」" 
# monologue
# JP: 稀咲が腰を持ち上げる。\n亀頭の抜けるギリギリまでで止まって僕を見下ろし、笑う。
1528 = "Kisaki nhấc hông lên. Dừng lại ngay ranh giới quy đầu sắp tuột ra, cô ấy nhìn xuống tôi và mỉm cười."
# 【稀咲】
# display as 稀咲
# JP: 「いくね？　双鉄っ」
1166 = "「Tới đây? Soutetsu.」"
# monologue
# JP: （ずぶううううううううううっっ！！！　ごちゅっ！！）
1705 = "（Zubuuuuuuuuuu!!! Gochu!!）"
# 【稀咲】
# display as 稀咲
# JP: 「きゅふぅぅぅっっっ！！！！」
1064 = "「Kyufuuu!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「かはっ！！！！」
1031 = "「Kaha!!!!」"
# monologue
# JP: 子宮口に亀頭がぶちゅんとあたった瞬間、\n稀咲の脈動が小さな拳で密着亀頭を甘く叩いてっ！！
1624 = "Khoảnh khắc quy đầu chạm phịch vào cửa tử cung, nhịp đập của Kisaki như một nắm đấm nhỏ ngọt ngào gõ vào quy đầu đang áp sát!!"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ！　くはっ！！」
974 = "「――! Kưha!!」"
# 【稀咲】
# display as 稀咲
# JP: 「すごっ！　今日っ――んっ――あっ――ボクっ――\nボクのっ――ヴァギナっ――おまん、こっ！」
1109 = "「Tuyệt quá! Hôm nay――ưm――á――tôi―― âm đạo――âm, hộ――của tôi!」"
# monologue
# JP: （じゅぶうううううううううううううううううっっ！！）
1707 = "（Jubuuuuuuuuuuuuuuuuu!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ちょっ！　待っ！　きさっ――僕っ、\n息がっ――鼓動がっ――っっっっっっっ！！！！」
1062 = "「Khoan! Đợi đã! Kisa――tôi, thở không nổi――tim đập nhanh quá――――!!!!」"
# monologue
# JP: （ずびょぉぉぉぉぉぉぉぉぉっ！　ぶぢゅんっ！！！！）
1704 = "（Zubyooooooo! Bujun!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～～～～っ！！！！」
1003 = "「~~~~~~~~!!!!」"
# monologue
# JP: 自分でペースを制御できない強制的な肉の快感っ！！\n喉が勝手に開いてしまう、脳がぐらぐらゆすられ――っ！
1341 = "Khoái cảm thể xác cưỡng ép mà bản thân không thể kiểm soát nhịp độ!! Cổ họng tự động mở ra, não bộ bị lắc lư chao đảo――!"
# monologue
# JP: （じゅぶっ！　ばちゅっ！！　じゅうっ！　ごちゅっ！）
# 1688 = "（咕啾、咕啾、咕啾、咕啾）" 
# 【稀咲】
# display as 稀咲
# JP: 「おまんこ――すごいっ！　双鉄、そうてつ、のっ！\nはっ！　ペニス！　おちんぽっ！　太くて、あつ、くて」
1126 = "「Âm hộ――tuyệt quá! Của Soutetsu, Soutetsu! Há! Dương vật! Dương vật! Vừa to, vừa nóng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲っ――稀咲っ」
1236 = "「Kisaki――Kisaki.」"
# monologue
# JP: （じゅばっ！　ぶちゅ！　ずりゅううっ！　ぼちゅっ！）
1687 = "（Juba! Buchu! Zuryuuu! Bochu!）"
# monologue
# JP: 僕の腰の上稀咲が踊る。狐の耳と尻尾をつけて、\nその銀髪を振り乱し――
1573 = "Kisaki nhảy múa trên hông tôi. Đeo đôi tai và cái đuôi cáo, mái tóc bạc tung bay rối bời――"
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！　あっ！　ねっ！　そうてつっ――っ！\nんっ！　双鉄も――すごく――いい、よねっ？　ね？」
1262 = "「Fua! Á! Này! Soutetsu――! Ưm! Soutetsu cũng――rất――sướng, đúng không? Nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　ああ！　ああ！　ああ！」
1010 = "「Đúng vậy! Đúng vậy! Đúng vậy! Đúng vậy!」"
# monologue
# JP: （じゅぶっ！　ぼちゅっ！　ずゆっ！　ごちゅんっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！」
1000 = "「~~~~!」"
# 【稀咲】
# display as 稀咲
# JP: 「はっ――あっ――あっ――あっ！！！\n双鉄っ――もっと――もっと――はげ、しくっ！！！」
1261 = "「Há――á――á――á!!! Soutetsu――hơn nữa――hơn nữa――mãnh liệt, lên!!!」"
# monologue
# JP: あまりに綺麗で、あまりに淫らで、いつもの稀咲が、\n僕の女が、神がかった存在のようにさえ思えてしまう。
1453 = "Quá đỗi xinh đẹp, quá đỗi dâm đãng, Kisaki ngày thường, người phụ nữ của tôi, thậm chí còn khiến tôi có cảm giác như một sự tồn tại thần thánh."
# monologue
# JP: （ばちゅっ！　ぼっ！　じゅるう！　ぼちゅんっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【稀咲】
# display as 稀咲
# JP: 「ん～～～っ！　はああっ！　ふあっ！　はぁっ！\nあっ――ああっ！　んあっ！　はっ！　ああっ！」
1025 = "「Ưm~~~! Haaa! Fua! Haa!\nÁ――aa! Ưn á! Há! Aa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲――稀咲――僕も――いいっ！」
1237 = "「Kisaki――Kisaki――tôi cũng――sướng lắm!」"
# monologue
# JP: だから名を呼ぶ。言葉をかける。肉の快感に流されず、\n稀咲とこころでも繋がったまま射精したくて。
1451 = "Vì vậy tôi gọi tên em. Tôi cất tiếng nói. Không để bản thân cuốn theo khoái cảm thể xác, tôi muốn xuất tinh trong khi tâm hồn vẫn đang kết nối với Kisaki."
# monologue
# JP: （じゅっっ！　ばちゅっ！　ずゆぶっ！　ごちゅっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「快感、がっ――密着感が――圧迫感が――すごくてっ、\n奥で――脈動、が――密着亀頭に、ぶつかって、きて」
1147 = "「Khoái cảm――cảm giác khít khao――cảm giác bị ép chặt――tuyệt quá, ở sâu bên trong――nhịp đập――đang va đập, vào quy đầu đang áp sát.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクも！　そうっ！　なのっ！　んっ――どくん、\nどくんて――双鉄の、ペニスの、先、から――んうっ！」
1162 = "「Tôi cũng! Vậy! Đó! Ưm――thình thịch, thình thịch――từ đầu, dương vật, của Soutetsu――ưn ư!」"
# monologue
# JP: （じゅぶっ！　ばちゅっ！　じゅぼっ！　ごちゅっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 
# monologue
# JP: 論より証拠と言わんばかりに稀咲の腰が加速する。
1353 = "Như muốn nói trăm nghe không bằng một thấy, hông Kisaki tăng tốc."
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！　はっ！　あ！　んっ！　うっ！　ねっ？\nねっ！？　でしょ？　双鉄っ！　んっ　そうてつぅ」
1263 = "「Fua! Há! A! Ưm! Ư! Nhỉ? Nhỉ!? Đúng không? Soutetsu! Ưm, Soutetsuuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかる――わかるっ――と、いうか――\n稀咲っ――稀咲っ――僕は、もうっ――」
1178 = "「Hiểu――hiểu chứ――hay đúng hơn là―― Kisaki――Kisaki――tôi, sắp――」"
# 【稀咲】
# display as 稀咲
# JP: 「ふえっ！？　やあっ！　んっ！　もう、ちょっと――\nふあっ！　もうちょっと、だけ、がまん――ねっ！！」
991 = "「Hả!? Nha! Ưm! Thêm, chút nữa thôi―― Fua! Thêm một chút, nữa thôi, ráng nhịn――nhé!!」"
# monologue
# JP: （ぢゅばっ！　ぢゅぼっ！　ぢゅぶっ！　ばちゅっ！！）
1686 = "（Juba! Jubo! Jubu! Bachu!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――がっ――グッ――」
971 = "「――gá――gư――」"
# monologue
# JP: 焦りのせいか稀咲の膣が更にきゅうんと収縮する。\n勃起の全部が全方向から侵食されて抉られ絞られる。
1468 = "Có lẽ vì vội vàng mà âm đạo của Kisaki càng co thắt chặt hơn. Toàn bộ sự cương cứng bị xâm thực, moi móc và siết chặt từ mọi hướng."
# 【稀咲】
# display as 稀咲
# JP: 「もうちょっ――ねっ――双鉄――んっ――あっ、あ！\nボクの、おまんこ――もうちょっと、だか、らぁっ！」
955 = "「Thêm chút nữa――nhé――Soutetsu――ưm――á, a! Âm hộ, của tôi――sắp được, rồi, mà!」"
# monologue
# JP: （ぢゅぶっ！　じゅばっ！　ぶぢゅっ！　ごちゅっ！！）
# 1686 = "（咕啾、咕啾、咕啾、咕啾！！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～～！！！」
1002 = "「~~~~~~!!!」"
# monologue
# JP: 返事をしたら、食いしばってる歯をゆるめたら射精する。\n熱くて熱くて熱くて熱くて全身汗がぶわぶわで。
1436 = "Nếu trả lời, nếu nới lỏng hàm răng đang cắn chặt, tôi sẽ xuất tinh mất. Nóng quá nóng quá nóng quá nóng quá, toàn thân đầm đìa mồ hôi."
# 【稀咲】
# display as 稀咲
# JP: 「あっ！　あっ！　あっ！　あ！　ありがと！　双鉄！\nおまんこ！　ボクもっ！　ボクもっ！　もうっ！　ん！」
1014 = "「Á! Á! Á! A! Cảm ơn! Soutetsu! Âm hộ! Tôi cũng! Tôi cũng! Sắp! Ưm!」"
# monologue
# JP: （ずゆりゅりゅりゅりゅぶびゅぶうぅぅぅぅぅぅ～！）
1708 = "（Zuyuryuryuryuryububyubuuuuuu~!）"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！！！！」
# 1035 = "「啊！！！！！！」" 
# monologue
# JP: （ぢゅびゅううぅぅぅぅぅぅうぅぅぅぅぼぢゅんっ！）
1703 = "（Jubyuuuuuuuuuuuuubojun!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅあっ！！！」
1021 = "「Ư á!!!」"
# 【稀咲】
# display as 稀咲
# JP: 「ぃきゅぅぅぅぅぅぅぅうううううううううう！！！」
1063 = "「Ikyuuuuuuuuuuuuuu!!!」"
# monologue
# JP: （きゅううううううううううぅううっっ！　トクンっ！）
1729 = "（Kyuuuuuuuuuuuuuu! Tokun!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああああああ！！！！」
1018 = "「A a a a a a!!!!」"
# monologue
# JP: （びゅぶっ！　ぶりゅ！　びゅううっ！　びゅぶっ！！）
1693 = "（Byubu! Buryu! Byuuu! Byubu!!）"
# monologue
# JP: 脈動が！　子宮口がトクントクンと脈打って、\n射精の最後に引き金を引きそのうえ今もっ――
1408 = "Nhịp đập! Cửa tử cung đập thình thịch thình thịch, kéo cò vào giây phút cuối cùng của lần xuất tinh, và thậm chí ngay cả bây giờ――"
# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――あっ――はっ――あっ！！　子宮――精液――\nしゅご――あ――おまんこ――ヴァギナ――おぼれ、る」
1017 = "「Á――á――há――á!! Tử cung――tinh dịch―― tuyệt quá――a――âm hộ――âm đạo――sắp chìm, mất.」"
# monologue
# JP: （びゅうっ！　びゅくっ！　びゅぶっ！　びゅううっ！）
# 1693 = "（咻咻！咻咻！咻咻！咻咻！）" 
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――あっ――わかる――なか、でも――精液――\nあつくて――ねばっこい――んうっ――これ――これっ」
1259 = "「Fua――á――cảm nhận được――bên trong, cũng――tinh dịch―― nóng hổi――nhớt nháp――ưn ư――cái này――cái này.」"
# monologue
# JP: （びゅうっ！　びゅぶっ！　びゅっ！　びゅるっ――\nびゅ……ぷ…………ぴ…………ぴりゅっ――――――）
1692 = "（Byuu! Byubu! Byu! Byuru―― byu……pu…………pi…………piryu――――――）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！！！！　はあっ！　はあっ！　はあっ！」
1037 = "「Fua!!!!!! Haa! Haa! Haa!」"
# monologue
# JP: 息が、完全にとめられていた。\nあまりに強い射精感に、気道さえもがふさがれていた。
1432 = "Hơi thở, đã bị ngừng lại hoàn toàn. Cảm giác xuất tinh quá đỗi mãnh liệt khiến ngay cả đường thở cũng bị tắc nghẽn."
# 【稀咲】
# display as 稀咲
# JP: 「ふぁ……あ……あ……あ――……」
1008 = "「Fua……a……a……a――……」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？　稀咲っ！」
1247 = "「Kisaki? Kisaki!」"
# monologue
# JP: 稀咲がへたりこんでいる。つながったまま、腰の上。\n接合部からどろどろと、新鮮な精液を溢れ出させて――
1547 = "Kisaki ngồi bệt xuống. Vẫn duy trì trạng thái kết nối, trên hông tôi. Từ chỗ giao hợp, tinh dịch tươi mới sền sệt trào ra――"
# 【稀咲】
# display as 稀咲
# JP: 「こんなの――ボク……ばかみたい、嫉妬なんて……\nこんなに――うふふっ――双鉄、僕に、夢中なのに」
1160 = "「Thế này thì――tôi……giống như đồ ngốc vậy, lại đi ghen tuông…… Trong khi――ufufu――Soutetsu, lại say đắm tôi đến thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲！　どうした、何を当たり前のことを言ってる」
1245 = "「Kisaki! Sao thế, em đang nói cái điều hiển nhiên gì vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふえっ！？　あ！　あっ――ううん――\nなんでも……なんでもない……ただ――うぁっ――」
992 = "「Hả!? A! Á――không―― không có gì……không có gì đâu……chỉ là――ưa――」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした！？」
943 = "「Sao thế!?」"
# monologue
# JP: 稀咲の体から力が抜ける。\n骨の全部が砕けたように、ぐでぐでになる。
1526 = "Sức lực rời khỏi cơ thể Kisaki. Cô ấy mềm nhũn ra, như thể toàn bộ xương cốt đều vỡ vụn."
# 【稀咲】
# display as 稀咲
# JP: 「ボクは――つかれた。\nちょっと、がんばりすぎたみたいで」
1183 = "「Tôi――mệt rồi.\nCó vẻ, tôi đã cố gắng hơi quá sức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。密度と濃度がすごすぎた。\n僕も、どろどろに消耗している――っと」
1198 = "「Đúng vậy. Mật độ và nồng độ quá kinh khủng. Tôi cũng, bị tiêu hao đến rã rời rồi――ơ.」"
# monologue
# JP: 思い出す。今日のセックスがこうも濃くなったきっかけを。
1439 = "Tôi chợt nhớ ra. Lý do khiến cuộc ân ái hôm nay trở nên mãnh liệt đến vậy."
# 【稀咲】
# display as 稀咲
# JP: 「どしたの？　双鉄」
1152 = "「Sao thế? Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、思っただけだ――改めて。\nこれは夫婦の絶対の秘密で。そうしなければ勿体ないと」
1208 = "「Không, tôi chỉ nghĩ lại thôi――một lần nữa. Đây là bí mật tuyệt đối của vợ chồng mình. Nếu không giữ kín thì phí lắm.」"
# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、だね！　本当だ」
1093 = "「Ufufu, đúng nhỉ! Thật đấy.」"
# monologue
# JP: 稀咲が笑う。晴れ晴れと。\n狐の下着を身に着けて、セックスの汗でどろどろのまま。
1540 = "Kisaki mỉm cười. Thật rạng rỡ. Khoác trên mình bộ đồ lót cáo, toàn thân vẫn còn ướt đẫm mồ hôi sau cuộc ân ái."
# 【稀咲】
# display as 稀咲
# JP: 「あ！？　……って、双鉄？\n消耗、してるんじゃなかったの？」
1007 = "「A!? ……ơ, Soutetsu? Không phải cậu đang, tiêu hao thể lực sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、もちろん消耗しているのだが」
1223 = "「Không, tất nhiên là có tiêu hao rồi, nhưng mà.」"
# monologue
# JP: 笑顔の稀咲がかわいいと。\nごく当然のことを思って――ただ、それだけで――
1360 = "Nụ cười của Kisaki thật dễ thương. Nghĩ đến một điều hiển nhiên như vậy――chỉ thế thôi――"
# 【双鉄】
# display as 雙鐵
# JP: 「少し、回復できたみたいだ。\n例えば、この手をもしも解いてもらえるのなら――」
1299 = "「Hình như, tôi đã hồi phục được một chút rồi. Ví dụ như, nếu đôi tay này được cởi trói――」"
# 【稀咲】
# display as 稀咲
# JP: 「んふふっ、双鉄。体を起こして？」
1095 = "「Nfufu, Soutetsu. Ngồi dậy đi nào?」"
# monologue
# JP: 言われるままに体を起こせば稀咲はぴったり僕に張り付き、\n耳奥へ――とろつく甘い媚薬を流す。
1440 = "Làm theo lời cô ấy, tôi ngồi dậy, Kisaki liền áp sát vào tôi, và rót vào sâu trong tai tôi――thứ xuân dược ngọt ngào đến tan chảy."
# 【稀咲】
# display as 稀咲
# JP: 「この手をほどいてあげたら、さ？\nボク、ぐちゃぐちゃにされちゃうのかな？」
1121 = "「Nếu tôi cởi trói cho đôi tay này, thì sao? Liệu tôi, có bị cậu làm cho tơi tả không nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが稀咲のお望みならば」
1116 = "「Nếu đó là mong muốn của Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「さて、どうだろう――」
1285 = "「Nào, ai biết được――」"
# monologue
# JP: 言いながら、耳元に頬に口にキスして。\nそして稀咲は、僕を拘束してるネクタイに指をかける。
1569 = "Vừa nói, cô ấy vừa hôn lên tai, lên má, lên môi tôi. Và rồi, Kisaki luồn ngón tay vào chiếc cà vạt đang trói buộc tôi."
