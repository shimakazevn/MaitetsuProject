# JP: 話してしまった事実すら、ぼんやりとしか記憶してない。\nそれがまた、どうしようもなく申し訳ない。
1434 = "我對此只剩下朦朦朧朧的記憶，但不影響我心中滿是歉意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕ら以外の、誰にも知らせてはいけないことを。\nうかつにも、話してしまった、そのためだ」
712 = "「……這些事情不應該讓外人知道。但我卻不小心說了出去，所以才要懲罰我」" 

# 【稀咲】
# display as 稀咲
# JP: 「ポーレットが連日あまりにニマつくから、なにかあるな\nと感じたんだ。で、油断させて酔い潰して聞き出した」
1211 = "「波萊特連著幾天總是看著我笑，我就覺得不對勁了。然後把她灌醉才打聽出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、なんと？」
1104 = "「她說了什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ニマニマ、実にうれしそうに笑ってね。\n『稀咲って、真面目なセックスしてそうなのに――』」
1103 = "「她當時真是笑得很開心。對我說“我還以為你做愛的時候會很正經呢”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！！！！　そうだ、思い出した！　僕も言われた。\n『双鉄くんと稀咲って、真面目なセックスしてそう』と」
1033 = "「啊！！！！對，我想起來了，她也是這麼對我說的！“你和稀咲做愛的時候肯定很正經吧”」" 

# 【稀咲】
# display as 稀咲
# JP: 「で、煽られた」
1218 = "「然後你就被她激將了」" 

# monologue
# JP: 疑問形ではなく、断定形。\n僕も頷く他にない。
1542 = "稀咲用的不是疑問句而是判斷句。我只能點頭承認。" 

# 【双鉄】
# display as 雙鐵
# JP: 「結果を見れば、完全にだな。酒もありカーっとなって、\n『そんなことは無い。足を使ってなどもしばしば』」
1143 = "「從結果來看確實是這樣。我喝多了以後就說，“沒這回事，我們還經常足交的”」" 

# 【稀咲】
# display as 稀咲
# JP: 「しばしば！」
1252 = "「經常！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「三度に一度はしばしばだろう。いや、稀咲ほどの美脚が目の前に曝されるのだ。むしろ随分抑えている方かと」
930 = "「三次裡有一次就算經常了吧。不對，你這雙美腿總是在我眼前晃來晃去，這已經算相當克制了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ありがとう、けど――っ！」
1291 = "「那還真是多謝誇獎，但是……！」" 

# monologue
# JP: （ぎううううううううううっっっ！　ぎにっ！！）
1728 = "（用力猛掐！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あぐっ！！！！！！」
1035 = "「啊！！！！！！」" 

# 【稀咲】
# display as 稀咲
# JP: 「今はそういう話をしてないんじゃなかったかな？\nどうにも今日の双鉄は、集中力が散漫だ」
1167 = "「我們現在談的不是這個問題吧？看來你今天注意力很散漫啊」" 

# monologue
# JP: （ふるっ）
1724 = "（搖晃）" 

# monologue
# JP: 僕の目を、稀咲が怜悧な瞳で見上げる。\nその下で、形も量も最高の乳房がふるりと揺れる。
1545 = "稀咲用那雙精明的眼睛仰視著我。形狀與分量俱佳的乳房在下面搖搖晃晃。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……確かに散漫かもしれないが。\n散漫になる原因は」
1278 = "「這個嘛……確實有點散漫。不過這是有原因的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ここ。だ。（ちゅっ！）」
1133 = "「就是因為這裡……啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1001 = "「唔！！」" 

# monologue
# JP: （ぎゅうううううううっっっ！！）
1717 = "（掐緊！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んぎっ！！！！？」
1038 = "「啊！！！！？」" 

# monologue
# JP: 亀頭に甘いキスをされ、\n感じる間もなく膝皮を強く抓られる。
1620 = "龜頭剛感受到甜蜜一吻，膝蓋馬上又襲來強烈的疼痛。" 

# 【稀咲】
# display as 稀咲
# JP: 「勘違いしちゃ、ダメだよ？　これはご褒美じゃない。\nただ単純に双鉄を冷静な状態に戻すための――（はぷ）」
967 = "「可別誤會了，這不是在獎勵你。只是讓你恢復冷靜而已……啾）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！！！！」
