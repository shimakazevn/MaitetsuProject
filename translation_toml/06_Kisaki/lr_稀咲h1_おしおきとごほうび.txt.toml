# JP: 膝の皮がまた熱くなる。稀咲の指は爪を立てずに、\n皮膚を傷めず、ただ的確に、痛みだけを僕に与えてくれる。
1594 = "膝蓋又傳來火辣的痛感。稀咲沒有用上指甲，沒有傷到我的皮膚，但卻實實在在給我帶來了疼痛。" 

# 【稀咲】
# display as 稀咲
# JP: 「それとも――\n痛くしてもらえることに、興奮してる？」
1283 = "「還是說……疼痛讓你感到興奮了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛くというか……\n大切にしてもらえていることが、とても嬉しい」
1258 = "「與其說疼痛……不如說是因為你很關心我，讓我很高興」" 

# 【稀咲】
# display as 稀咲
# JP: 「え？」
979 = "「咦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「傷めず痛みのみを与えることは――同じ頑丈な部分でも、\n尻でなく、膝の皮を選んでくれていることは――」
1265 = "「要在不造成傷痕的情況下給予疼痛……在同樣結實的部位之中，你選的是膝蓋而不是屁股」" 

# 【稀咲】
# display as 稀咲
# JP: 「あ」
1009 = "「啊」" 

# monologue
# JP: 稀咲の顔が緩んでしまう。仮面が剥がれる。\n作っていない、生の表情にようやく会えた。
1555 = "稀咲的表情放鬆下來，撕去了偽裝。終於看到了她不加掩飾的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の仕事を――蒸気機関車への乗務のことを、\n考えてくれてのことなんだろう」
