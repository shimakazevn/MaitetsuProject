# JP: （じゅぶっ！　ぼちゅっ！　ずゆっ！　ごちゅんっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！」
1000 = "「唔！」" 

# 【稀咲】
# display as 稀咲
# JP: 「はっ――あっ――あっ――あっ！！！\n双鉄っ――もっと――もっと――はげ、しくっ！！！」
1261 = "「蛤啊啊啊！！！雙鐵，再來，再激烈一些！！！」" 

# monologue
# JP: あまりに綺麗で、あまりに淫らで、いつもの稀咲が、\n僕の女が、神がかった存在のようにさえ思えてしまう。
1453 = "此刻她的如此美麗而淫蕩，彷彿化身為了我的女神。" 

# monologue
# JP: （ばちゅっ！　ぼっ！　じゅるう！　ぼちゅんっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ん～～～っ！　はああっ！　ふあっ！　はぁっ！\nあっ――ああっ！　んあっ！　はっ！　ああっ！」
1025 = "「啊嗯、蛤啊啊！蛤啊！蛤啊！啊……啊啊啊！啊嗯！蛤啊啊！啊嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲――稀咲――僕も――いいっ！」
1237 = "「稀咲……稀咲，我也很舒服！」" 

# monologue
# JP: だから名を呼ぶ。言葉をかける。肉の快感に流されず、\n稀咲とこころでも繋がったまま射精したくて。
1451 = "於是我叫著她的名字，用語言傳達心意。沒有沉溺於肉體的快感，而是想在和她心靈相通的情況下射精。" 

# monologue
# JP: （じゅっっ！　ばちゅっ！　ずゆぶっ！　ごちゅっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「快感、がっ――密着感が――圧迫感が――すごくてっ、\n奥で――脈動、が――密着亀頭に、ぶつかって、きて」
1147 = "「快感……緊貼感……壓迫感太強烈了，衝擊在……緊貼在深處的龜頭上……」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクも！　そうっ！　なのっ！　んっ――どくん、\nどくんて――双鉄の、ペニスの、先、から――んうっ！」
1162 = "「我也是！啊嗯！蛤啊啊！你的龜頭……一直撞在裡面！」" 

# monologue
# JP: （じゅぶっ！　ばちゅっ！　じゅぼっ！　ごちゅっ！）
# 1687 = "（咕啾、咕啾、咕啾、咕啾！）" 

# monologue
# JP: 論より証拠と言わんばかりに稀咲の腰が加速する。
1353 = "事實勝於雄辯，稀咲的腰此刻就在加速。" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！　はっ！　あ！　んっ！　うっ！　ねっ？\nねっ！？　でしょ？　双鉄っ！　んっ　そうてつぅ」
1263 = "「蛤啊啊！蛤啊、啊嗯、啊嗚……你懂吧？雙鐵……你懂吧……雙鐵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかる――わかるっ――と、いうか――\n稀咲っ――稀咲っ――僕は、もうっ――」
1178 = "「我知道……我知道……而且……稀咲，我已經要……」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふえっ！？　やあっ！　んっ！　もう、ちょっと――\nふあっ！　もうちょっと、だけ、がまん――ねっ！！」
991 = "「哎？！呀啊！啊嗯，再等一下……蛤啊！再忍一下就好！！」" 

# monologue
# JP: （ぢゅばっ！　ぢゅぼっ！　ぢゅぶっ！　ばちゅっ！！）
1686 = "（咕啾、咕啾、咕啾、咕啾！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ――がっ――グッ――」
971 = "「呃啊……」" 

# monologue
# JP: 焦りのせいか稀咲の膣が更にきゅうんと収縮する。\n勃起の全部が全方向から侵食されて抉られ絞られる。
1468 = "焦急讓小穴更為緊縮，全方位地勒緊、吞噬著我的肉棒。" 

# 【稀咲】
# display as 稀咲
# JP: 「もうちょっ――ねっ――双鉄――んっ――あっ、あ！\nボクの、おまんこ――もうちょっと、だか、らぁっ！」
955 = "「再堅持一下，雙鐵，啊啊啊！我的小穴……馬上就……高潮了！」" 

# monologue
# JP: （ぢゅぶっ！　じゅばっ！　ぶぢゅっ！　ごちゅっ！！）
# 1686 = "（咕啾、咕啾、咕啾、咕啾！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～～！！！」
1002 = "「唔！！！」" 

# monologue
# JP: 返事をしたら、食いしばってる歯をゆるめたら射精する。\n熱くて熱くて熱くて熱くて全身汗がぶわぶわで。
1436 = "我無暇回答她，稍有放鬆就會忍不住射精。只感覺渾身火熱不斷冒汗。" 

# 【稀咲】
# display as 稀咲
# JP: 「あっ！　あっ！　あっ！　あ！　ありがと！　双鉄！\nおまんこ！　ボクもっ！　ボクもっ！　もうっ！　ん！」
1014 = "「啊啊啊啊！謝謝你！雙鐵！小穴……我、我也要高潮了！啊嗯！啊啊！」" 

# monologue
# JP: （ずゆりゅりゅりゅりゅぶびゅぶうぅぅぅぅぅぅ～！）
1708 = "（啾嚕嚕嚕嚕嚕！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！！！！！」
# 1035 = "「啊！！！！！！」" 

# monologue
# JP: （ぢゅびゅううぅぅぅぅぅぅうぅぅぅぅぼぢゅんっ！）
1703 = "（啾嚕嚕嚕嚕嚕、啪啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぅあっ！！！」
1021 = "「啊啊！！！」" 

# 【稀咲】
# display as 稀咲
# JP: 「ぃきゅぅぅぅぅぅぅぅうううううううううう！！！」
1063 = "「嗚嗚嗚嗚嗚！！！」" 

# monologue
# JP: （きゅううううううううううぅううっっ！　トクンっ！）
1729 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああああああ！！！！」
1018 = "「啊啊啊啊！！！！」" 

# monologue
# JP: （びゅぶっ！　ぶりゅ！　びゅううっ！　びゅぶっ！！）
1693 = "（咻咻！咻咻！咻咻！咻咻！）" 

# monologue
# JP: 脈動が！　子宮口がトクントクンと脈打って、\n射精の最後に引き金を引きそのうえ今もっ――
1408 = "子宮口正在劇烈跳動，扣動了射精的扳機後仍在持續——" 

# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――あっ――はっ――あっ！！　子宮――精液――\nしゅご――あ――おまんこ――ヴァギナ――おぼれ、る」
1017 = "「啊啊啊啊！！子宮……精液……好棒，小穴都要被射滿了……」" 

# monologue
# JP: （びゅうっ！　びゅくっ！　びゅぶっ！　びゅううっ！）
# 1693 = "（咻咻！咻咻！咻咻！咻咻！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――あっ――わかる――なか、でも――精液――\nあつくて――ねばっこい――んうっ――これ――これっ」
1259 = "「蛤啊啊啊……感覺到了……精液……熱熱的、黏黏的……就是這個」" 

# monologue
# JP: （びゅうっ！　びゅぶっ！　びゅっ！　びゅるっ――\nびゅ……ぷ…………ぴ…………ぴりゅっ――――――）
1692 = "（咻咻！咻咻！咻咻！咻咻！咻咻！咻咻！咻咻……咻咻……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！！！！　はあっ！　はあっ！　はあっ！」
1037 = "「啊！！！！！！蛤啊、蛤啊！」" 

# monologue
# JP: 息が、完全にとめられていた。\nあまりに強い射精感に、気道さえもがふさがれていた。
1432 = "我完全喘不過氣來。強烈的射精快感甚至讓呼吸道都開始堵塞。" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぁ……あ……あ……あ――……」
1008 = "「啊、啊、啊、啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？　稀咲っ！」
1247 = "「稀咲？稀咲！」" 

# monologue
# JP: 稀咲がへたりこんでいる。つながったまま、腰の上。\n接合部からどろどろと、新鮮な精液を溢れ出させて――
1547 = "稀咲癱軟在我的身上。新鮮的精液從我們的下體汩汩流出……" 

# 【稀咲】
# display as 稀咲
# JP: 「こんなの――ボク……ばかみたい、嫉妬なんて……\nこんなに――うふふっ――双鉄、僕に、夢中なのに」
1160 = "「我……簡直就是個傻瓜……居然會嫉妒……嘿嘿……雙鐵明明這麼愛我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲！　どうした、何を当たり前のことを言ってる」
1245 = "「稀咲！怎麼了，說起這麼理所當然的事情」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふえっ！？　あ！　あっ――ううん――\nなんでも……なんでもない……ただ――うぁっ――」
992 = "「哎？！啊、啊……沒什麼……什麼都沒有……只是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした！？」
943 = "「你怎麼了？」" 

# monologue
# JP: 稀咲の体から力が抜ける。\n骨の全部が砕けたように、ぐでぐでになる。
1526 = "稀咲全身脫力。柔若無骨地癱軟在我身上。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクは――つかれた。\nちょっと、がんばりすぎたみたいで」
1183 = "「我累了。有點興奮過頭了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。密度と濃度がすごすぎた。\n僕も、どろどろに消耗している――っと」
1198 = "「是啊，今天太激烈了。我的體力消耗也很大……啊」" 

# monologue
# JP: 思い出す。今日のセックスがこうも濃くなったきっかけを。
1439 = "我突然想起今天如此激情的原因。" 

# 【稀咲】
# display as 稀咲
# JP: 「どしたの？　双鉄」
1152 = "「怎麼了，雙鐵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、思っただけだ――改めて。\nこれは夫婦の絶対の秘密で。そうしなければ勿体ないと」
1208 = "「沒什麼，只是又想了想。這是我們夫妻倆的秘密，告訴別人就太可惜了」" 

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、だね！　本当だ」
1093 = "「嘿嘿，還真是」" 

# monologue
# JP: 稀咲が笑う。晴れ晴れと。\n狐の下着を身に着けて、セックスの汗でどろどろのまま。
1540 = "稀咲爽朗地笑了起來。她穿著銀狐內衣，渾身沾滿了做愛產生的汗水。" 

# 【稀咲】
# display as 稀咲
# JP: 「あ！？　……って、双鉄？\n消耗、してるんじゃなかったの？」
1007 = "「啊……雙鐵，你不是體力消耗很大嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、もちろん消耗しているのだが」
1223 = "「當然是消耗了很多，但是……」" 

# monologue
# JP: 笑顔の稀咲がかわいいと。\nごく当然のことを思って――ただ、それだけで――
1360 = "僅僅只因為稀咲的笑容太過可愛，我就興奮了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「少し、回復できたみたいだ。\n例えば、この手をもしも解いてもらえるのなら――」
1299 = "「體力好像恢復一點了。如果你能幫我把手解開的話……」" 

# 【稀咲】
# display as 稀咲
# JP: 「んふふっ、双鉄。体を起こして？」
1095 = "「嘿嘿，雙鐵，你坐起來吧」" 

# monologue
# JP: 言われるままに体を起こせば稀咲はぴったり僕に張り付き、\n耳奥へ――とろつく甘い媚薬を流す。
1440 = "我聽話地支起身子，稀咲便貼到了我的身邊，在我耳邊打下一劑猛烈的催情藥。" 

# 【稀咲】
# display as 稀咲
# JP: 「この手をほどいてあげたら、さ？\nボク、ぐちゃぐちゃにされちゃうのかな？」
1121 = "「如果幫你把手解開……你會把我幹得神魂顛倒嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが稀咲のお望みならば」
1116 = "「如果你想要的話」" 

# 【稀咲】
# display as 稀咲
# JP: 「さて、どうだろう――」
1285 = "「那可很難說」" 

# monologue
# JP: 言いながら、耳元に頬に口にキスして。\nそして稀咲は、僕を拘束してるネクタイに指をかける。
1569 = "稀咲邊說邊親吻了我的耳邊、臉頰、嘴唇。然後伸手搭在了束縛住我的領帶上……" 
