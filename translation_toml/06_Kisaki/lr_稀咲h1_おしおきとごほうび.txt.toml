# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかっ！？――たたたたたっ！！」
1287 = "「那就好……痛痛痛痛痛！！」" 

# monologue
# JP: （ぎううううううううううううううっ）
1715 = "（掐住）" 

# monologue
# JP: 褒められたのに抓られる。\n痛さと同時に混乱する。なんでどうして何が悪いと。
1376 = "受到稱讚的同時卻又被掐住了。疼痛之餘我的腦中也頗為混亂，我到底又做錯了什麼。" 

# 【稀咲】
# display as 稀咲
# JP: 「おや」
987 = "「哎呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1039 = "「啊？！」" 

# monologue
# JP: 混乱させられ、強い痛みを与えられ。\nだけれど僕の肉体は――
1463 = "混亂與疼痛充斥我的腦海。但我的身體卻……" 

# 【稀咲】
# display as 稀咲
# JP: 「勃起してるね。\n普段よりもガチガチなんじゃないの？　っていうくらい」
963 = "「又勃起了呀。是不是變得比平時還硬了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひっ！？」
# 1039 = "「啊？！」" 

# monologue
# JP: 稀咲の指先が亀頭へと伸び――\n思った瞬間体がびくりと逃げようとする。
1534 = "稀咲把指尖伸向我的龜頭，我忍不住向後抽身想要逃離。" 

# monologue
# JP: （さすっ）
1726 = "（撫摸）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ」
# 1009 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「ペニスをつねるわけないだろう。\nとても傷みやすそうだし、傷めてしまったら僕も困るし」
1153 = "「怎麼可能掐你的肉棒嘛。看起來就很脆弱，萬一受傷了我也會很難過」" 

# 【稀咲】
# display as 稀咲
# JP: 「ちゅっ」
1046 = "「啾」" 

# monologue
# JP: 優しく触れて、亀頭に甘くキスしてくれ。
1539 = "稀咲溫柔撫摸著肉棒，給了龜頭一個甜甜的吻。" 

# monologue
# JP: （ぎゅううううううううううっ！！！！）
1713 = "（掐住！！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っっっっっ！？　痛った――――――――」
1020 = "「啊啊啊啊？！好痛！」" 

# 【稀咲】
# display as 稀咲
# JP: 「だから、つねるのはここ。同じところを、何度でも。\n――どう？　理解できた？」
1188 = "「所以呢，我要掐的是這裡，反覆懲罰這個部位。怎麼樣，懂了嗎？」" 

# monologue
# JP: 稀咲が話すその度に、唇が、舌先が、僕の勃起に何度も\n触れる――触れてくれる。ゆえに頷く。体が勝手に。
1522 = "稀咲一說話，唇舌就會觸碰到我的肉棒。我忍不住自動點了點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「そ。ふふっ。ここまで思考の波長が噛み合うならさ、\n双鉄はボクが怒ってる理由もきちんと説明できるよね？」
1087 = "「嘻嘻，既然我們的思考迴路這麼契合，那你能說出我為什麼生氣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……できると思う。酩酊した僕がポーレットに、\n僕ら――稀咲と僕の、夫婦の秘密を、大事なことを」
709 = "「……應該能。因為我喝醉了以後，把我們夫妻倆的秘密說了出去」" 

