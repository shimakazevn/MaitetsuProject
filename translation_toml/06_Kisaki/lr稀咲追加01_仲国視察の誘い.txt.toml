# lines: 338 
# monologue
# JP: （コンコン）
48 = "（Cốc cốc）"
# 【双鉄】
# JP: 「失礼します」
1974 = "「Xin thất lễ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ああ、双鉄。もういらしてるよ。どうぞ、入って」
1341 = "「A, Soutetsu. Cô ấy đến rồi đấy. Cậu vào đi.」"
# 【双鉄】
# display as 稀咲
# JP: 「おまたせしてすみません」
1163 = "「Xin lỗi vì đã để mọi người phải đợi.」"
# monologue
# display as 雙鐵
# JP: いつもの稀咲の支店長室。\nけれども今日は、いつもには無い姿がある。
1350 = "Vẫn là phòng Giám đốc chi nhánh thường ngày của Kisaki.\nNhưng hôm nay, lại có một bóng dáng không thường thấy."
# 【姜】
# JP: 「あなたが双鉄先生ですね。はじめまして。\n仲国国務院、鉄道部副部長秘書の、[きょうようこう,2]姜叶煌と申します」
1860 = "「Anh là ngài Soutetsu nhỉ. Rất hân hạnh được gặp.\nTôi là thư ký của Thứ trưởng Bộ Đường sắt, Quốc vụ viện Trọng Quốc, tên là Khương Diệp Hoàng.」"
# monologue
# display as 姜
# JP: メガネが非常によくお似合いの穏やかそうな女性が、\nにこやかに右手を差し出してくるゆえ、握手する。
1299 = "Một người phụ nữ trông có vẻ điềm đạm và cực kỳ hợp với chiếc kính,\nmỉm cười đưa tay phải ra, vì thế tôi bắt tay cô ấy."
# 【双鉄】
# JP: 「姜さん、はじめまして。\nご高名はかねがね、稀咲から伺っています」
1936 = "「Cô Khương, rất hân hạnh được gặp.\nTôi đã nghe danh cô từ Kisaki từ lâu rồi.」"
# monologue
# display as 雙鐵
# JP: 言った途端におやおやと、\n姜さんは少し芝居がかったリアクションをみせる。
1241 = "Vừa dứt lời, cô Khương liền tỏ ra ngạc nhiên,\nđưa ra một phản ứng có phần hơi kịch."
# 【姜】
# JP: 「稀咲女士からとあっては、少し怖くもありますね。\nどれほど手厳しいご評価でしょう」
1919 = "「Nếu là từ cô Kisaki thì, cũng có chút đáng sợ đấy.\nKhông biết tôi bị đánh giá khắt khe đến mức nào đây.」"
# 【稀咲】
# display as 姜
# JP: 「いやいや、\n姜女士を低く評価なんて、出来ようもない」
1518 = "「Không không,\nĐánh giá thấp cô Khương thì, tôi làm sao mà dám chứ.」"
# monologue
# display as 稀咲
# JP: 明るく軽い、笑い混じりの切り返し。\nその手の中のティーポットから、ふくよかな香りが漂う。
1133 = "Lời đáp trả vui vẻ, nhẹ nhàng pha lẫn tiếng cười.\nTừ ấm trà trong tay cô ấy, một mùi hương thơm ngát lan tỏa."
# 【稀咲】
# JP: 「“[ゆきめきらん,3]雪芽奇蘭”をいただけなくなったら大変だもの」
1873 = "「Lỡ không được nhận “Tuyết Nha Kỳ Lan” nữa thì gay to.」"
# 【姜】
# display as 稀咲
# JP: 「ふふっ、\nでしたら今年も季節になったらお送りしましょう」
1528 = "「Fufu,\nVậy thì năm nay đến mùa tôi lại gửi cho cô nhé.」"
# monologue
# display as 姜
# JP: 姜さんの返しもやわらかだ。\n単純な仕事以上の仲なのかなと、自然、想像されられる。
1191 = "Lời đáp của cô Khương cũng thật mềm mỏng.\nKhiến tôi tự nhiên tưởng tượng rằng mối quan hệ của họ hẳn phải vượt trên mức công việc đơn thuần."
# 【双鉄】
# JP: 「このお茶は姜さんからのいただきものでしたか。\nありがとうございます、僕も美味しく頂いてます」
1733 = "「Loại trà này là quà của cô Khương tặng sao.\nCảm ơn cô, tôi cũng đang thưởng thức nó rất ngon lành đây.」"
# 【姜】
# display as 雙鐵
# JP: 「お口に合うならなによりです」
1572 = "「Hợp khẩu vị của anh là tốt rồi.」"
# monologue
# display as 姜
# JP: 言って微笑み、けれどすぐ、\n姜さんはああ、と小さな声を漏らす。
1509 = "Nói rồi mỉm cười, nhưng ngay sau đó,\ncô Khương thốt lên một tiếng \"A\" nhỏ."
# 【姜】
# JP: 「いけません、世間話より仕事のお話よりなにより、\nお祝いをまっさきにお伝えするべきところでした」
1747 = "「Thật không phải phép, đáng lẽ ra trước những câu chuyện phiếm hay công việc,\ntôi phải gửi lời chúc mừng đến hai người đầu tiên mới phải.」"
# monologue
# display as 姜
# JP: 姜さんの穏やかな眼差しがまっすぐ稀咲の方を向く。\n稀咲が微笑む。幸せそうに。
986 = "Ánh mắt điềm đạm của cô Khương hướng thẳng về phía Kisaki.\nKisaki mỉm cười. Trông thật hạnh phúc."
# 【姜】
# JP: 「稀咲女士！\n双鉄先生とのご結婚おめでとうございます！」
1739 = "「Cô Kisaki!\nChúc mừng cô đã kết hôn với ngài Soutetsu!」"
# monologue
# display as 姜
# JP: 笑顔に、声に、ぱあっと部屋が明るく華やぐ。\nああ、これこそ祝福というものだ。
1484 = "Nụ cười, giọng nói ấy làm cả căn phòng bừng sáng và rạng rỡ hẳn lên.\nA, đây mới chính là lời chúc phúc thực sự."
# 【稀咲】
# JP: 「お祝い本当にありがとう。とても嬉しい」
1939 = "「Thực sự cảm ơn lời chúc của cô. Tôi rất vui.」"
# monologue
# display as 稀咲
# JP: 稀咲の頬が、生き生きとしたバラ色になる。\n姜さんの顔が僕へ向く。
1342 = "Đôi má Kisaki ửng lên màu hồng đào đầy sức sống.\nGương mặt cô Khương quay sang phía tôi."
# 【姜】
# JP: 「双鉄先生。稀咲女士とのご結婚。\n大変にご幸福なこととお慶び申し上げます」
1863 = "「Ngài Soutetsu. Việc kết hôn với cô Kisaki.\nTôi xin gửi lời chúc mừng nồng nhiệt nhất đến niềm hạnh phúc lớn lao này của ngài.」"
# monologue
# display as 姜
# JP: 僕への祝福は礼儀正しく、穏やかだ。\nで、ありながら、あたたかさがじんわり伝わってくる。
1607 = "Lời chúc dành cho tôi rất lịch sự và điềm đạm.\nNhưng đồng thời, sự ấm áp cũng từ từ lan tỏa."
# 【姜】
# JP: 「稀咲女士のことを、どうぞ大事になさってください。\n大げさではなく、彼女は日ノ本の貴重な宝の一つです」
1704 = "「Xin ngài hãy trân trọng cô Kisaki.\nKhông hề nói quá đâu, cô ấy chính là một trong những báu vật quý giá của Hinomoto đấy.」"
# 【双鉄】
# display as 姜
# JP: 「ええ、そのことが誰より僕がよく知っています」
1576 = "「Vâng, điều đó thì tôi là người rõ hơn ai hết.」"
# 【稀咲】
# display as 雙鐵
# JP: 「っ！！！」
1400 = "「!!!」"
# monologue
# display as 稀咲
# JP: 言った途端に、稀咲がわずかに狼狽する。\n照れさせてしまったようだが、事実は事実だ。
1142 = "Vừa dứt lời, Kisaki có chút bối rối.\nCó vẻ tôi đã làm cô ấy ngại ngùng, nhưng sự thật vẫn là sự thật."
# 【双鉄】
# JP: 「もしも稀咲が力を貸してくれていなければ、\n今の僕も、今の御一夜もありません」
1920 = "「Nếu không có sự trợ giúp của Kisaki,\nthì đã không có tôi của hiện tại, cũng không có Ohimitera của hiện tại.」"
# 【稀咲】
# display as 雙鐵
# JP: 「いや、双鉄。そんなことはないよ。\nボクがもしもいなくても、キミなら」
1516 = "「Không đâu, Soutetsu. Không có chuyện đó đâu.\nNgay cả khi không có tôi, nếu là cậu thì」"
# 【双鉄】
# display as 稀咲
# JP: 「謙遜はたしかに美徳だが、事実を曲げるのはよくない。\n稀咲は僕に多くを教え、僕の世界を変えてくれた」
1135 = "「Khiêm tốn quả thực là một mỹ đức, nhưng bóp méo sự thật thì không tốt đâu.\nKisaki đã dạy tôi rất nhiều điều, và đã thay đổi thế giới của tôi.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ぁぅっ」
1535 = "「Aư.」"
# 【双鉄】
# display as 稀咲
# JP: 「稀咲のおかげで、僕の視野は大いに広がった。\nそれがなければ……例えば、元忠氏との対立なども」
1152 = "「Nhờ có Kisaki, tầm nhìn của tôi đã được mở rộng rất nhiều.\nNếu không có điều đó......ví dụ như, sự đối đầu với ngài Mototada」"
# 【稀咲】
# display as 雙鐵
# JP: 「こほんっ！」
1418 = "「Khụ khụ!」"
# 【双鉄】
# display as 稀咲
# JP: 「っと」
1126 = "「Ái chà.」"
# monologue
# display as 雙鐵
# JP: この話はもうヤメの合図の、咳払い。なるほど――\n義父との対立の話題など、仮定にしても穏やかでない。
1140 = "Tiếng hắng giọng, dấu hiệu cho thấy câu chuyện này nên dừng lại. Ra vậy――\nChủ đề đối đầu với bố vợ, dù chỉ là giả định thì cũng không được hay ho cho lắm."
# 【双鉄】
# JP: 「すまん。少し勢いこんでしまったようだ」
1872 = "「Xin lỗi. Có vẻ tôi hơi quá đà rồi.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ボクはまぁ褒められたから嬉しくもあったけど\n……驚かせたよね。さわがせてごめんね？　姜女士」
1353 = "「Tuy tôi cũng vui vì được khen đấy\n......nhưng làm cô bất ngờ rồi nhỉ. Xin lỗi vì đã làm ồn nhé? Cô Khương.」"
# 【姜】
# display as 稀咲
# JP: 「いえいえ、大変に仲睦まじいご様子。\n微笑ましくも、うらやましくも拝見しました」
1526 = "「Không đâu, hai người trông thật sự rất hòa thuận.\nTôi xem mà vừa thấy vui lây, vừa thấy ghen tị đấy.」"
# 【稀咲】
# display as 姜
# JP: 「からかわないでよ。意地悪だなぁ。とにかくええと――\nああ、うん、そうだ、お茶菓子の用意もあるんだ」
1132 = "「Đừng trêu tôi nữa mà. Xấu tính ghê. Tóm lại là ừm――\nA, đúng rồi, đúng rồi, tôi có chuẩn bị cả bánh kẹo dùng kèm với trà nữa.」"
# monologue
# display as 稀咲
# JP: 稀咲が茶盆をもってくる。\nその上には――ああ。
1272 = "Kisaki mang khay trà ra.\nTrên đó là――A."
# 【双鉄】
# JP: 「姜さん、甘いものが大丈夫でしたら、ぜひご一緒に。\n御一夜名物の長饅頭です。お茶との相性がとても良くて」
1866 = "「Cô Khương, nếu cô dùng được đồ ngọt thì xin mời dùng chung.\nĐây là món bánh trường man thầu đặc sản của Ohimitera. Rất hợp để thưởng thức cùng với trà đấy.」"
# 【姜】
# display as 雙鐵
# JP: 「甘いものは大好物です。喜んでいただきます」
1244 = "「Đồ ngọt là món khoái khẩu của tôi đấy. Tôi xin vui vẻ đón nhận.」"
# 【稀咲】
# display as 姜
# JP: 「ふふっ、よかったらおかわりもあるから遠慮しないで。\n双鉄も、はい」
1450 = "「Fufu, nếu thích thì vẫn còn thêm nữa nên đừng ngại nhé.\nSoutetsu cũng vậy, đây.」"
# monologue
# display as 稀咲
# JP: よく見れば、茶器と皿ともいつもとは違う、仲国のものだ。\n細かな気遣いもさすがだなと、改めて感心させられる。
1182 = "Nhìn kỹ thì, cả bộ ấm chén và đĩa đều khác ngày thường, là đồ của Trọng Quốc.\nSự chu đáo tỉ mỉ này quả nhiên không hổ danh là cô ấy, khiến tôi một lần nữa phải thán phục."
# 【姜】
# JP: 「それでは遠慮なく。ん……ああ、美味しい。\n地元で飲むよりずっといい、水のおかげでしょうか」
1751 = "「Vậy tôi không khách sáo nhé. Ưm......a, ngon quá.\nCòn ngon hơn cả uống ở quê nhà nữa, là nhờ nguồn nước sao?」"
# monologue
# display as 姜
# JP: お世辞とはとても思えない、自然な笑顔。
1578 = "Nụ cười tự nhiên, hoàn toàn không có vẻ gì là nói xã giao."
# 【姜】
# JP: 「双鉄先生が水を守られた経緯。稀咲女士にもお伺い\nしましたし、部内からも報告としてあがってきました」
1717 = "「Quá trình ngài Soutetsu bảo vệ nguồn nước. Tôi đã được nghe cô Kisaki kể lại,\nvà cũng đã nhận được báo cáo từ nội bộ.」"
# 【双鉄】
# display as 姜
# JP: 「部内……」
1606 = "「Nội bộ......」"
# monologue
# display as 雙鐵
# JP: ごく穏やかな笑顔から、あまりにスっと出てきた言葉。\n意味の重さとの距離感に、一瞬、意味がつかめなかった。
1051 = "Từ nụ cười cực kỳ điềm đạm ấy, một lời nói tuôn ra quá đỗi tự nhiên.\nKhoảng cách với sức nặng của ý nghĩa câu nói khiến tôi thoáng chốc không nắm bắt được ý nghĩa."
# 【双鉄】
# JP: 「というと、仲国国務院の鉄道部内で……ですか。\n大変恐縮です。――というか、一体全体どういうわけで」
1716 = "「Nói vậy tức là, trong nội bộ Bộ Đường sắt của Quốc vụ viện Trọng Quốc......sao.\nThật vô cùng vinh hạnh. ――Hay đúng hơn là, rốt cuộc thì tại sao lại như vậy.」"
# 【姜】
# display as 雙鐵
# JP: 「日ノ本鉄道復権の可能性を大きく拡大した一連の事象の、\n中核を為すエピソードのひとつとして、です」
1276 = "「Là một trong những sự kiện cốt lõi của chuỗi các sự việc\nđã mở rộng đáng kể khả năng phục hưng đường sắt Hinomoto đấy ạ.」"
# monologue
# display as 姜
# JP: 思わず稀咲の顔を見る。が、ご機嫌そうな顔のままだ。\nあるいは僕を待つ間に、すでに聞いた話なのかもしれん。
1014 = "Tôi bất giác nhìn sang mặt Kisaki. Nhưng cô ấy vẫn giữ vẻ mặt vui vẻ.\nHoặc có lẽ trong lúc đợi tôi, cô ấy đã nghe chuyện này rồi cũng nên."
# 【姜】
# JP: 「失礼ながら、弊鉄道部では日ノ本の鉄路は滅びる――\nとの観測が、圧倒的な大多数を占めていました」
1778 = "「Xin thất lễ, nhưng tại Bộ Đường sắt của chúng tôi, nhận định rằng đường sắt của Hinomoto sẽ diệt vong――\nđã chiếm đa số áp đảo đấy ạ.」"
# 【稀咲】
# display as 姜
# JP: 「ふふっ」
1533 = "「Fufu.」"
# monologue
# display as 稀咲
# JP: 率直すぎる一言に、稀咲が微笑み、言葉を添える。\nお茶会の如き空気のままに……恐らく、仕事の話が始まる。
1180 = "Trước lời nói quá thẳng thắn ấy, Kisaki mỉm cười và nói thêm vào.\nBầu không khí vẫn như một buổi tiệc trà......có lẽ, câu chuyện công việc bắt đầu từ đây."
# 【稀咲】
# JP: 「失礼どころか、極めて常識的な観測だと思うよ。\n実際ボクもそれを前提として計画を立案し、動いていた」
1962 = "「Đâu có thất lễ gì, tôi nghĩ đó là một nhận định cực kỳ hợp lẽ thường đấy chứ.\nThực tế tôi cũng đã lập kế hoạch và hành động dựa trên tiền đề đó mà.」"
# 【姜】
# display as 稀咲
# JP: 「弊鉄道部も同様です。散逸しつつあった、日ノ本の\n鉄道関連の人材・技術の確保を行うべく動いていました」
1072 = "「Bộ Đường sắt của chúng tôi cũng vậy. Chúng tôi đã hành động nhằm thu hút\nnhân tài và công nghệ liên quan đến đường sắt của Hinomoto đang dần phân tán.」"
# 【双鉄】
# display as 姜
# JP: 「なるほど。そうだったのですね。\nそうした話は僕の方でもいくつか聞いていましたが――」
1595 = "「Ra là vậy. Hóa ra là thế.\nChuyện đó thì phía tôi cũng có nghe vài lần nhưng――」"
# monologue
# display as 雙鐵
# JP: 日ノ本車輌の淵さんはじめ、仲国からの声かけを受けた\n一流どころの技術者ならば、複数の名前を把握している。
1091 = "Từ anh Fuchi của Xe lửa Hinomoto, cho đến những kỹ sư hàng đầu\nnhận được lời mời từ Trọng Quốc, tôi đều nắm rõ một vài cái tên."
# 【双鉄】
# JP: 「国家的事業として動かれていたとまでは、\n想像もしていませんでした」
1788 = "「Đến mức được triển khai như một dự án cấp quốc gia thì,\ntôi chưa từng tưởng tượng tới.」"
# 【姜】
# display as 雙鐵
# JP: 「国家的事業かどうかはわかりません。あくまで、\n弊鉄道部がそのように動いていた、というだけの話です」
1486 = "「Có phải là dự án cấp quốc gia hay không thì tôi không rõ. Nói cho cùng,\nchỉ là Bộ Đường sắt của chúng tôi đã hành động như vậy thôi.」"
# 【稀咲】
# display as 姜
# JP: 「直接の命令は、姜女士の場合は鉄道部副部長からだよね。\nけど、副部長に誰が命令しているのかはわからない？」
1311 = "「Mệnh lệnh trực tiếp, trong trường hợp của cô Khương là từ Thứ trưởng Bộ Đường sắt nhỉ.\nNhưng, ai ra lệnh cho Thứ trưởng thì cô không biết sao?」"
# 【姜】
# display as 稀咲
# JP: 「その解釈で間違いありません。\nですので、国家的事業かどうかは判断できないのです」
1120 = "「Hiểu như vậy là không sai ạ.\nVì thế, tôi không thể đánh giá được đây có phải là dự án cấp quốc gia hay không.」"
# monologue
# display as 姜
# JP: ……国務院鉄道部に命令を下せる者の数など限られようが、\nだからといって、断定できるわけでもないとは理解できる。
1419 = "......Số người có thể ra lệnh cho Bộ Đường sắt Quốc vụ viện có lẽ chỉ đếm trên đầu ngón tay,\nnhưng dù vậy, tôi cũng hiểu là không thể kết luận chắc chắn được."
# 【双鉄】
# JP: 「なるほど。たしかに裏付けなく『国家的事情』とは\n断ぜませんね。軽率な憶測を失礼しました」
693 = "「Ra vậy. Quả thực nếu không có bằng chứng thì không thể kết luận\nđó là 『tình hình cấp quốc gia』 được. Xin lỗi vì sự suy đoán khinh suất của tôi.」"
# 【姜】
# display as 雙鐵
# JP: 「いえ、こちらこそ確定的な情報をお渡しできず\n申し訳なく思います」
1452 = "「Không đâu, chính tôi mới là người phải xin lỗi\nvì không thể cung cấp thông tin xác thực cho ngài.」"
# monologue
# display as 姜
# JP: 姜さんは軽く目礼し、\nその目を再び柔らかに僕の目元にむける。
1134 = "Cô Khương khẽ cúi đầu chào,\nrồi lại hướng ánh mắt dịu dàng về phía tôi."
# 【姜】
# JP: 「ともかくその人材確保計画は順調に動いており、\nしかし、実施の直前に中断を余儀なくされました」
1735 = "「Nói chung thì kế hoạch thu hút nhân tài đó đang tiến triển thuận lợi,\nnhưng, ngay trước khi thực hiện thì buộc phải gián đoạn.」"
# monologue
# display as 姜
# JP: 長饅頭が口に運ばれ――恐らく甘味が好きなのだろう、\n眼鏡の奥の瞳が一瞬、純粋なよろこびの色にきらめく。
1004 = "Miếng bánh trường man thầu được đưa lên miệng――có lẽ cô ấy thích đồ ngọt,\nđôi mắt đằng sau lớp kính chợt lóe lên niềm vui sướng thuần túy trong giây lát."
# 【姜】
# JP: 「内諾をいただいた技術者達が一転して続々と辞退を。\n理由を探ればすぐ、双鉄先生と御一夜鉄道に当りました」
1772 = "「Các kỹ sư đã đồng ý ngầm bỗng quay ngoắt lại và liên tiếp từ chối.\nKhi tìm hiểu lý do, chúng tôi ngay lập tức bắt gặp ngài Soutetsu và Đường sắt Ohimitera.」"
# 【稀咲】
# display as 姜
# JP: 「日ノ本の鉄道産業復興の目が見えてきた。\nならば、やはり地元で働きたい……という感じかな？」
1278 = "「Đã nhìn thấy hy vọng phục hưng ngành công nghiệp đường sắt của Hinomoto.\nNếu vậy thì, quả nhiên vẫn muốn làm việc tại quê nhà......đại loại thế chăng?」"
# 【姜】
# display as 稀咲
# JP: 「辞退理由はほとんど全てがそれでした。ですので、\n弊鉄道局は短期方針の見直しをはじめることとしました」
1529 = "「Lý do từ chối hầu như đều là như vậy. Vì thế,\nCục Đường sắt của chúng tôi đã bắt đầu xem xét lại phương hướng ngắn hạn.」"
# 【双鉄】
# display as 姜
# JP: 「短期方針――ということは、\n中～長期の方針はそのままに、ということとなりますか」
1354 = "「Phương hướng ngắn hạn――nghĩa là,\nphương hướng trung và dài hạn vẫn giữ nguyên, có phải vậy không ạ.」"
# 【姜】
# display as 雙鐵
# JP: 「はい。ご存知かもしれませんがその方針は、\n『大廃線後の鉄道産業の、世界No.1シェアの取得』です」
1464 = "「Vâng. Có lẽ ngài đã biết, phương hướng đó là,\n『Giành thị phần số 1 thế giới về ngành công nghiệp đường sắt sau Đại bãi bỏ các tuyến đường sắt』.」"
# 【双鉄】
# display as 姜
# JP: 「なんとなくですが、\nそのような話は稀咲からも聞いていました」
1393 = "「Tôi cũng lờ mờ đoán được,\nchuyện đó tôi cũng từng nghe Kisaki nói rồi.」"
# monologue
# display as 雙鐵
# JP: 仲国は冥国をはっきりとライバル視している国だ。ゆえ、\n冥国のエアクラ推進への対立軸を立てようとしていると。
1563 = "Trọng Quốc là quốc gia coi Minh Quốc là đối thủ rõ rệt. Vì vậy,\nhọ đang cố gắng thiết lập một trục đối lập với việc thúc đẩy Aircra của Minh Quốc."
# 【姜】
# JP: 「日ノ本の鉄道が復活するなら、無理に取り込むより、\n技術交流を行い、その上で各々発展していけばいい」
1672 = "「Nếu đường sắt của Hinomoto phục sinh, thay vì cố gắng thâu tóm,\nthì tiến hành giao lưu công nghệ, rồi dựa trên cơ sở đó mỗi bên tự phát triển là được.」"
# 【双鉄】
# display as 姜
# JP: 「！」
1214 = "「!」"
# monologue
# display as 雙鐵
# JP: 思わず全身が引き締まる。一国の鉄道部の方針転換――\nその裏にいくらかは、自分達も影響したらしいと知り。
1141 = "Bất giác toàn thân tôi căng cứng. Sự chuyển hướng chính sách của Bộ Đường sắt một quốc gia――\nKhi biết rằng đằng sau đó có phần nào ảnh hưởng từ chính chúng tôi."
# 【姜】
# JP: 「現在の方針は概ねそのようなものとなり、\nその方針に沿って、私は先生達を訪ねてきました」
1775 = "「Phương hướng hiện tại đại khái là như vậy,\nvà theo phương hướng đó, tôi đã đến thăm các ngài.」"
# 【稀咲】
# display as 姜
# JP: 「マイレールファンド事業の話を聞きたい。だったよね」
1447 = "「Cô muốn nghe chuyện về dự án Quỹ Đường sắt của tôi. Đúng không.」"
# 【姜】
# display as 稀咲
# JP: 「ええ」
1401 = "「Vâng.」"
# monologue
# display as 姜
# JP: まったく変わらぬフレンドリーな口調の会話。\nけれども稀咲は、ビジネスモードに切り替わってる。
1398 = "Cuộc trò chuyện với giọng điệu thân thiện không hề thay đổi.\nNhưng Kisaki đã chuyển sang chế độ công việc."
# 【稀咲】
# JP: 「詳しい話に入る前に、新しいお茶を淹れよう。\nまた温かいものでかまわないかな」
1760 = "「Trước khi đi vào chi tiết, để tôi pha trà mới nhé.\nTrà nóng tiếp có được không?」"
# 【姜】
# display as 稀咲
# JP: 「ええ、熱いくらいのお茶をいただけましたら」
1598 = "「Vâng, nếu được thì xin cô cho tôi trà nóng một chút.」"
# 【稀咲】
# display as 姜
# JP: 「OK。\nなら今度は、ボクらの地元のお茶を味わってもらいたい」
1170 = "「OK.\nVậy lần này, tôi muốn cô nếm thử loại trà ở quê hương chúng tôi.」"
# monologue
# display as 稀咲
# JP: 言って稀咲は茶器を変える。\n今度の急須と湯呑とは、どこにでもある和風のものだ。
1622 = "Nói rồi Kisaki thay bộ ấm chén.\nẤm trà và chén trà lần này là loại phong cách Nhật Bản có thể thấy ở bất cứ đâu."
# 【稀咲】
# JP: 「クマ茶っていって、\n双鉄の勤める御一夜鉄道――湯医線沿線の名産なのさ」
1868 = "「Đây gọi là trà Kuma,\nđặc sản dọc tuyến Yui――Đường sắt Ohimitera nơi Soutetsu làm việc đấy.」"
# 【双鉄】
# display as 稀咲
# JP: 「（ずずっ）……ああ、\nすっかりぬるくなってしまったな」
1566 = "「(Nhấp một ngụm)......A,\nnguội ngắt mất rồi.」"
# 【姜】
# display as 雙鐵
# JP: 「そうでしたか、すみません、質問ばかりで。\n大変に興味深く聴き入ってしまいましたので」
1619 = "「Vậy sao, xin lỗi ngài, tôi cứ hỏi mãi.\nVì nghe cuốn hút quá nên tôi cứ mải mê lắng nghe.」"
# 【双鉄】
# display as 姜
# JP: 「ご質問が的を射たものばかりでしたので、\nこちらとしても熱がはいってしまいました」
1391 = "「Những câu hỏi của cô đều rất đúng trọng tâm,\nnên phía chúng tôi cũng bị cuốn theo đó mà.」"
# monologue
# display as 雙鐵
# JP: 御一夜鉄道をめぐる現況をざっと説明するだけでも、\nかなりの時間が経ってしまった。
1300 = "Chỉ mới giải thích sơ qua về tình hình hiện tại xung quanh Đường sắt Ohimitera,\nmà cũng đã tốn khá nhiều thời gian rồi."
# 【稀咲】
# JP: 「ああ、すぐ淹れなおすよ。姜女士のも。\nん……っと、はい、どうぞ」
1680 = "「A, tôi sẽ pha lại ngay đây. Cả của cô Khương nữa.\nƯm......rồi, vâng, xin mời.」"
# 【姜】
# display as 稀咲
# JP: 「やぁ、長饅頭のおかわりまで。\nすみません、ありがとうございます」
1159 = "「Chà, có thêm cả bánh trường man thầu nữa.\nXin lỗi cô, cảm ơn cô nhiều nhé.」"
# monologue
# display as 姜
# JP: あらためてしみじみ味わうと、クマ茶も実にふくよかだ。\nいささか話し疲れた喉にじんわり染み入る。
1123 = "Nếm lại thật kỹ, trà Kuma quả thực cũng rất đậm đà.\nThấm đẫm vào cổ họng đang có chút mệt mỏi vì nói nhiều."
# 【姜】
# JP: 「なるほど。クマ茶はさらに、長饅頭と合いますね」
1923 = "「Ra vậy. Trà Kuma lại càng hợp với bánh trường man thầu hơn nữa nhỉ.」"
# 【稀咲】
# display as 姜
# JP: 「ふふっ。\nボクも大好物だからね。気に入って貰えて嬉しいよ」
1088 = "「Fufu.\nĐó cũng là món khoái khẩu của tôi đấy. Rất vui vì cô thích nó.」"
# monologue
# display as 稀咲
# JP: いって稀咲もむしゃりといくゆえ、僕も倣う。\n心地よく疲労している脳に甘味が浸透していく。
1179 = "Nói rồi Kisaki cũng nhai nhóp nhép, nên tôi cũng làm theo.\nVị ngọt thấm đẫm vào não bộ đang mệt mỏi một cách dễ chịu."
# 【姜】
# JP: 「しかし……そうですか。マイレールファンド事業は、\nすでに稀咲女士の手を離れたのですか」
1869 = "「Nhưng mà......vậy sao. Dự án Quỹ Đường sắt của tôi,\nđã không còn nằm trong tay cô Kisaki nữa sao.」"
# 【稀咲】
# display as 姜
# JP: 「だね。ここからは事業の成熟と安定をはかる時期。\nその方向では、ボクはあまり適任者じゃない」
993 = "「Đúng vậy. Từ giờ là thời kỳ nhằm mục tiêu trưởng thành và ổn định của dự án.\nTheo hướng đó, tôi không phải là người quá thích hợp.」"
# monologue
# display as 稀咲
# JP: 甘味の話題が、いきなり本題に引き戻される。\nこうしたペースに、ふたりとも慣れきっているようだ。
1433 = "Chủ đề đồ ngọt, đột ngột bị kéo trở lại chủ đề chính.\nCó vẻ như cả hai người đều đã quá quen với nhịp độ này."
# 【稀咲】
# JP: 「だから隈銀と御一夜鉄道の共同出資で設立した新法人に、\n関連全事業を請け負ってもらうことにしたんだ」
1921 = "「Vì vậy, một pháp nhân mới được thành lập với sự góp vốn chung của Ngân hàng Kuma và Đường sắt Ohimitera,\nsẽ đảm nhận toàn bộ các dự án liên quan.」"
# monologue
# display as 稀咲
# JP: 共同出資な上、新法人を実質的に仕切っているのは元忠氏。\n任せておいて、全く何の心配もない。
1338 = "Hơn nữa lại là góp vốn chung, người thực sự điều hành pháp nhân mới là ngài Mototada.\nGiao phó cho ông ấy thì hoàn toàn không có gì phải lo lắng cả."
# 【姜】
# JP: 「では、今は稀咲女士と右田先生は、\n各々ご本業のみに注力されていることとなりますか？」
1708 = "「Vậy, bây giờ cô Kisaki và ngài Migita,\nmỗi người chỉ đang tập trung vào công việc chính của mình thôi sao?」"
# 【稀咲】
# display as 姜
# JP: 「一時的にそうなっているね。\nとはいえ、新事業を常に模索してもいるよ」
1336 = "「Tạm thời là như vậy.\nTuy nhiên, chúng tôi cũng luôn tìm tòi các dự案 mới.」"
# 【姜】
# display as 稀咲
# JP: 「新事業！」
1408 = "「Dự án mới!」"
# monologue
# display as 姜
# JP: 芝居がかった口ぶりだけれど、メガネの奥の目は真剣だ。
1363 = "Dù giọng điệu có phần kịch, nhưng đôi mắt đằng sau lớp kính lại rất nghiêm túc."
# 【姜】
# JP: 「大変興味深いお話です。もしお伺いできる範囲のことが\nあれば、ぜひお伺いしたいのですが」
1959 = "「Một câu chuyện vô cùng thú vị. Nếu có điều gì nằm trong phạm vi có thể chia sẻ,\ntôi rất mong được lắng nghe.」"
# 【稀咲】
# display as 姜
# JP: 「残念ながら、まだ全く、だね。\n良くいえば、情報収集の最中……という感じでもあるし」
1562 = "「Rất tiếc, hiện tại vẫn chưa có gì cả.\nNói một cách hoa mỹ thì, đang trong quá trình thu thập thông tin......đại loại thế.」"
# monologue
# display as 稀咲
# JP: 稀咲がちら、と僕を見る。\nならばと言葉の続きを引き取る。
1288 = "Kisaki liếc nhìn tôi một cái.\nThấy vậy, tôi liền tiếp lời."
# 【双鉄】
# JP: 「充電期間であるともいえるが――\n悪く言うなら、僕も稀咲も気を抜いてる時期ともいえる」
1879 = "「Có thể nói là thời gian nạp lại năng lượng――\nNhưng nói khó nghe thì, cả tôi và Kisaki đều đang trong thời kỳ lơ là.」"
# 【稀咲】
# display as 雙鐵
# JP: 「マイレールファンドは実に手のかかる子だった。\nそれが順調に発展して手を離れた分……さすがに、ね」
1328 = "「Quỹ Đường sắt của tôi quả thực là một đứa trẻ cần nhiều công chăm sóc.\nKhi nó phát triển thuận lợi và không còn cần bận tâm nữa thì......quả thực là vậy nhỉ.」"
# monologue
# display as 稀咲
# JP: 嬉しくもあり、安堵もあり、寂しくもある。\nすぐに次をとの思いはあれど、引き継ぐべきも数多ある。
1469 = "Vừa vui mừng, vừa an tâm, lại vừa thấy trống vắng.\nDù muốn bắt tay ngay vào việc tiếp theo, nhưng cũng có rất nhiều thứ cần phải bàn giao."
# 【双鉄】
# JP: 「新法人は、いわゆるコンサルタント業も手掛けます。\nすでに、日ノ本各所からの受注で大賑わいの状況です」
1798 = "「Pháp nhân mới cũng sẽ đảm nhận cả mảng gọi là nghiệp vụ tư vấn.\nHiện tại, tình hình đang rất nhộn nhịp với các đơn đặt hàng từ khắp nơi trên Hinomoto.」"
# 【姜】
# display as 雙鐵
# JP: 「線路管理と列車運用を別々に行う。いわゆる上下分離の\n発展型ともいえるのが、マイレールファンドですよね？」
1367 = "「Thực hiện riêng biệt việc quản lý đường ray và vận hành tàu. Có thể nói Quỹ Đường sắt của tôi\nlà một hình thức phát triển của cái gọi là phân tách trên dưới, đúng không ạ?」"
# 【稀咲】
# display as 姜
# JP: 「そう解釈して貰えると嬉しいよ。線路所有権を証券化し、\n利益を配当する金融商品。であるといっても現状は――」
1267 = "「Tôi rất vui nếu cô hiểu như vậy. Chứng khoán hóa quyền sở hữu đường ray,\nlà một sản phẩm tài chính chia cổ tức. Dù nói vậy nhưng hiện trạng là――」"
# 【双鉄】
# display as 稀咲
# JP: 「実際に利益を配当できているケースは、まだまだ少ない。\n現時点では、支援のための出資の色合いが濃厚ですので」
1513 = "「Những trường hợp thực sự có thể chia cổ tức vẫn còn rất ít.\nỞ thời điểm hiện tại, màu sắc góp vốn để hỗ trợ vẫn còn rất đậm nét.」"
# 【姜】
# display as 雙鐵
# JP: 「なるほど、そうした性質が色濃いからこそ、\nあえてのコンサルタント形式とするわけですか」
1261 = "「Ra vậy, chính vì tính chất đó còn đậm nét,\nnên mới chủ đích áp dụng hình thức tư vấn sao.」"
# 【稀咲】
# display as 姜
# JP: 「ふふっ、ご明察」
1090 = "「Fufu, cô thật tinh tường.」"
# monologue
# display as 稀咲
# JP: いや、打てば響く。１を聞いて１０を知るとはこのことか。\nさすがは稀咲の知己だなと、つくづく感心させられる。
1185 = "Quả là nói một hiểu mười. Đây chính là nghe 1 biết 10 sao.\nĐúng là tri kỷ của Kisaki, khiến tôi không khỏi thán phục."
# 【稀咲】
# JP: 「例えば[なごてつ,2]名護鉄沿線の方々は『名護鉄』そのものを\n応援したい。名も知らぬ法人の事業を、ではなくて」
1938 = "「Ví dụ như những người dân dọc tuyến Đường sắt Nago muốn ủng hộ chính 『Đường sắt Nago』.\nChứ không phải là dự án của một pháp nhân vô danh nào đó.」"
# 【双鉄】
# display as 稀咲
# JP: 「加え、線路運用の事情が各事業者ごとに千差万別すぎ、\n一般化がとても難しかったということもありました」
1427 = "「Thêm vào đó, hoàn cảnh vận hành đường ray của mỗi doanh nghiệp lại quá đỗi khác biệt,\nviệc khái quát hóa là một điều vô cùng khó khăn.」"
# 【姜】
# display as 雙鐵
# JP: 「なるほどなるほど。では逆に言えば、\n日ノ本鉄路さんのコンサルティングで学べるノウハウは」
1078 = "「Ra vậy ra vậy. Vậy nói ngược lại,\nnhững bí quyết có thể học được từ việc tư vấn của Đường sắt Hinomoto là」"
# 【稀咲】
# display as 姜
# JP: 「だね。かなり適用できる範囲の広いものと自負している。\nどのような線路運用を行う、どのような国においても」
1089 = "「Đúng thế. Tôi tự tin rằng nó có phạm vi áp dụng khá rộng.\nDù vận hành đường ray như thế nào, ở bất kỳ quốc gia nào.」"
# 【双鉄】
# display as 稀咲
# JP: 「！」
1434 = "「!」"
# monologue
# display as 雙鐵
# JP: 世間話と仕事の話が切れ目なく流れるそのうちに、\nなるほど、ここにたどり着くのか。
1153 = "Trong lúc những câu chuyện phiếm và chuyện công việc cứ thế trôi chảy không đứt đoạn,\nra vậy, cuối cùng cũng đi đến điểm này sao."
# 【姜】
# JP: 「実は弊部においても、マイレールファンドに興味をもつ\n鉄道事業者、複数からの問い合わせをうけています」
1958 = "「Thực ra tại Bộ chúng tôi, cũng đã nhận được yêu cầu tìm hiểu\ntừ một số doanh nghiệp đường sắt quan tâm đến Quỹ Đường sắt của tôi.」"
# 【稀咲】
# display as 姜
# JP: 「ん？　複数の鉄道事業者って……国鉄以外にもあるんだ。\n仲国にも……いわゆる民鉄、私鉄的なものが」
1068 = "「Hử? Một số doanh nghiệp đường sắt tức là......ngoài đường sắt quốc gia ra vẫn còn à.\nỞ Trọng Quốc cũng có......cái gọi là đường sắt dân sự, đường sắt tư nhân sao.」"
# 【姜】
# display as 稀咲
# JP: 「ええ。非・国鉄の鉄道事業者も意外と沢山ありますよ。\n市等が主体の都市鉄道も。鉱山・森林等の産業鉄道も」
1176 = "「Vâng. Bất ngờ là cũng có rất nhiều doanh nghiệp đường sắt phi quốc gia đấy.\nĐường sắt đô thị do thành phố làm chủ thể. Đường sắt công nghiệp như mỏ, lâm nghiệp.」"
# 【双鉄】
# display as 姜
# JP: 「なるほど。産業鉄道も国営なのかと思い込んでいました。\n考えてみれば、他分野でも民営企業も盛んですものね」
1395 = "「Ra vậy. Tôi cứ đinh ninh rằng đường sắt công nghiệp cũng là của nhà nước.\nNgẫm lại thì, ở các lĩnh vực khác doanh nghiệp tư nhân cũng phát triển mạnh mà nhỉ.」"
# 【姜】
# display as 雙鐵
# JP: 「残念ながら民営鉄道は盛ん、というほどではありません。\nしかし、その分それぞれ独自の魅力を有しています」
1086 = "「Đáng tiếc là đường sắt tư nhân chưa đến mức gọi là phát triển mạnh.\nNhưng bù lại, mỗi nơi đều có sức hấp dẫn riêng biệt.」"
# 【双鉄】
# display as 姜
# JP: 「ほう」
1289 = "「Hô.」"
# monologue
# display as 雙鐵
# JP: 瞬間、ふっと姜さんの雰囲気がやわらぐ。
1129 = "Trong khoảnh khắc, bầu không khí của cô Khương bỗng dịu đi."
# 【姜】
# JP: 「双鉄先生、ご興味がおありでしたらいかがでしょう。\n弊部がお招きいたしますので、稀咲女士との仲国視察は」
1741 = "「Ngài Soutetsu, nếu ngài có hứng thú thì sao ạ.\nBộ chúng tôi sẽ gửi lời mời, chuyến khảo sát Trọng Quốc cùng cô Kisaki.」"
# 【双鉄】
# display as 姜
# JP: 「お招き……ご招待ですか。お話はありがたく思いますが、\nお招きいただいて、一体何を視察すればいいのかも」
1608 = "「Được mời......lời mời sao. Tôi rất biết ơn lời đề nghị này, nhưng\nđược mời rồi thì, rốt cuộc chúng tôi nên khảo sát cái gì mới được.」"
# 【姜】
# display as 雙鐵
# JP: 「さきほど稀咲女士が、『新事業案』と仰られました。\nそのヒントに繋がる何かをご視察で見つけて頂ければと」
1357 = "「Ban nãy cô Kisaki có nhắc đến 『Dự án mới』.\nHy vọng ngài có thể tìm thấy điều gì đó gợi ý cho dự án đó qua chuyến khảo sát.」"
# 【稀咲】
# display as 姜
# JP: 「ボクたちにとっては、\nとてもありがたいお話に聞こえるけれども」
1075 = "「Đối với chúng tôi thì,\nnghe có vẻ là một lời đề nghị rất đáng biết ơn đấy.」"
# monologue
# display as 稀咲
# JP: 稀咲がすっと話を引き取る。
1565 = "Kisaki khéo léo tiếp lời."
# 【稀咲】
# JP: 「かかるお招きにボク達が応じた場合、国務院鉄道部が\n期待するメリットは、一体何になるのかな」
1850 = "「Trong trường hợp chúng tôi nhận lời mời này, lợi ích mà\nBộ Đường sắt Quốc vụ viện mong đợi rốt cuộc là gì vậy.」"
# 【姜】
# display as 稀咲
# JP: 「ひとまずは、みっつ」
1515 = "「Trước mắt là, ba điều.」"
# monologue
# display as 姜
# JP: 言いながら、姜さんは少し丸っこい指を折っていく。
1204 = "Vừa nói, cô Khương vừa gập những ngón tay hơi tròn trịa của mình lại."
# 【姜】
# JP: 「第一。マイレールファンド事業、ならびに関わる\nコンサルティングについてのレクチャーを頂きたい」
1743 = "「Thứ nhất. Chúng tôi muốn được nghe bài giảng về dự án Quỹ Đường sắt của tôi,\ncũng như các vấn đề tư vấn liên quan.」"
# 【稀咲】
# display as 姜
# JP: 「マイレールファンドに興味を持ってもらえることも\n嬉しいよ。ありがとう。なら、２つ目は？」
1492 = "「Việc các vị quan tâm đến Quỹ Đường sắt của tôi\ncũng khiến tôi rất vui. Cảm ơn cô. Vậy, điều thứ hai là?」"
# 【姜】
# display as 稀咲
# JP: 「新事業案の共有。それが仲国でも展開可能なもので\nあるなら、なんらかの方法での共同展開を検討頂きたい」
1511 = "「Chia sẻ dự án mới. Nếu đó là dự án có thể triển khai ở Trọng Quốc,\nchúng tôi mong muốn được xem xét việc cùng triển khai bằng một phương pháp nào đó.」"
# 【双鉄】
# display as 姜
# JP: 「その点は……まだ本当に何のアイディアもない状態です。\nご期待に添えるとは限りませんが――」
1055 = "「Về điểm đó thì......thực sự vẫn chưa có ý tưởng gì cả.\nChưa chắc đã đáp ứng được kỳ vọng của các vị nhưng――」"
# 【姜】
# display as 雙鐵
# JP: 「そこも含めて期待するのが、三点目となります」
1561 = "「Bao gồm cả điều đó, kỳ vọng của chúng tôi nằm ở điểm thứ ba.」"
# monologue
# display as 姜
# JP: 姜さんは、もったいぶるように間をおいて、\n稀咲を見てから、僕を見る。
1081 = "Cô Khương cố tình dừng lại một nhịp như muốn tỏ vẻ quan trọng,\nnhìn Kisaki, rồi nhìn sang tôi."
# 【姜】
# JP: 「つまり、双鉄先生、稀咲女士との関係の強化です。\n新事業案が纏まるのが仮に、ご視察の[のち]後になった場合も」
1745 = "「Nói tóm lại, là củng cố mối quan hệ với ngài Soutetsu và cô Kisaki.\nGiả sử dự án mới được hoàn thiện sau chuyến khảo sát đi chăng nữa.」"
# 【稀咲】
# display as 姜
# JP: 「なるほど。共同展開の検討を、ボクらから鉄道部──\n姜女士へともちかけられる環境を用意してもらえる、と」
1002 = "「Ra vậy. Nghĩa là chuẩn bị sẵn một môi trường để chúng tôi có thể đề xuất\nviệc xem xét cùng triển khai với Bộ Đường sắt──với cô Khương, đúng không.」"
# 【姜】
# display as 稀咲
# JP: 「ぜひそのようにご理解下さい。\n当然ながら、何をご確約いただく必要もありません」
1084 = "「Xin hãy hiểu như vậy.\nTất nhiên, các vị không cần phải cam kết bất cứ điều gì cả.」"
# 【稀咲】
# display as 姜
# JP: 「ふぅん。大変興味深いお話とボクはお伺いしたけれど\n――双鉄、キミはどう思う？」
1521 = "「Hừm. Tôi thấy đây là một câu chuyện rất thú vị đấy\n――Soutetsu, cậu nghĩ sao?」"
# monologue
# display as 稀咲
# JP: 姜さんは稀咲の客で、この席での僕は稀咲の夫にすぎん。\n決定権は稀咲にあるゆえ、思うところを述べればよかろう。
1192 = "Cô Khương là khách của Kisaki, và ở đây tôi chỉ là chồng của Kisaki.\nQuyền quyết định nằm ở Kisaki, nên tôi cứ nói ra suy nghĩ của mình là được."
# 【双鉄】
# JP: 「僕も同じくだ。興味深くありがたいお誘いだと感じる。\n……もし視察にお伺いするとしたら、時期はいつごろに」
1737 = "「Tôi cũng nghĩ vậy. Cảm thấy đây là một lời mời thú vị và đáng trân trọng.\n......Nếu chúng tôi đến khảo sát, thì khoảng thời gian nào là phù hợp.」"
# 【姜】
# display as 雙鐵
# JP: 「先生達のご都合のよいとき、いつであろうと。\nそれこそ春節の真っ只中であろうとご案内いたします」
1308 = "「Bất cứ khi nào thuận tiện cho các vị.\nThậm chí ngay giữa dịp Tết Nguyên Đán, chúng tôi cũng sẽ hướng dẫn tận tình.」"
# 【稀咲】
# display as 姜
# JP: 「！？　春節中はさすがに」
1118 = "「!? Vào dịp Tết Nguyên Đán thì e là.」"
# monologue
# display as 稀咲
# JP: 稀咲が驚いた顔をする。春節――旧正月は確か、\n仲国で一番のお祭りの時期と聞き及ぶが……
1573 = "Kisaki lộ vẻ ngạc nhiên. Tết Nguyên Đán――Tết Âm lịch hình như,\nlà dịp lễ hội lớn nhất ở Trọng Quốc theo như tôi nghe được......"
# 【稀咲】
# JP: 「姜さんも春節中くらいは休んだ方がいい。\nプライベートの時間を楽しむことも、大切な仕事だ」
1886 = "「Cô Khương cũng nên nghỉ ngơi trong dịp Tết Nguyên Đán đi.\nTận hưởng thời gian cá nhân cũng là một công việc quan trọng đấy.」"
# 【姜】
# display as 稀咲
# JP: 「はい。ですのでその場合には、私人として、\n友人夫妻をプライベートで案内させていただこうかと」
1237 = "「Vâng. Vì vậy trong trường hợp đó, với tư cách cá nhân,\ntôi định sẽ hướng dẫn riêng cho vợ chồng người bạn của mình.」"
# 【稀咲】
# display as 姜
# JP: 「あぁ……そこまで言ってもらえてとても嬉しいよ。\nありがとう、本当に」
1397 = "「A......Nghe cô nói vậy tôi rất vui.\nCảm ơn cô, thực sự đấy.」"
# monologue
# display as 稀咲
# JP: ――なるほど、春節は完全な休暇期間であるわけか。\nさすがにそこに実際お伺いするわけにもいくまいが……
1145 = "――Ra vậy, Tết Nguyên Đán là kỳ nghỉ hoàn toàn nhỉ.\nQuả nhiên thực tế cũng không thể đến thăm vào lúc đó được......"
# monologue
# JP: （友人、なのだな、本当に。仕事関係だけにとどまらぬ、\nなにかこう、稀咲の、対等な友人……）
684 = "(Là bạn bè, thật sự. Không chỉ dừng lại ở mối quan hệ công việc,\nmà là một cái gì đó, một người bạn bình đẳng của Kisaki......)"
# 【稀咲】
# JP: 「それならまずは、スケジュールを確認させてもらいたい。\n確認の上、仮に視察にお伺いできそうな候補日があれば」
1977 = "「Nếu vậy trước tiên, cho phép tôi kiểm tra lại lịch trình.\nSau khi kiểm tra, giả sử có những ngày dự kiến có thể đến khảo sát.」"
# monologue
# display as 稀咲
# JP: 稀咲が僕へと視線をむける。\n気にかかるような点も無いので、言葉を引き継ぐ。
1570 = "Kisaki hướng ánh mắt về phía tôi.\nVì không có điểm gì đáng bận tâm, nên tôi tiếp lời."
# 【双鉄】
# JP: 「候補日をお渡しし、そちらでの具体的なご検討を頂く\n――といった形でいかがでしょうか？」
1874 = "「Chúng tôi sẽ đưa ra các ngày dự kiến, và nhờ phía cô xem xét cụ thể\n――với hình thức như vậy thì sao ạ?」"
# 【稀咲】
# display as 雙鐵
# JP: 「姜女士がＯＫだったら、ボクはそれで」
1345 = "「Nếu cô Khương OK thì, tôi cũng đồng ý.」"
# 【姜】
# display as 稀咲
# JP: 「ではそのように承りました。\n候補日をいただけますことを、楽しみにしています」
1233 = "「Vậy tôi xin ghi nhận như thế.\nTôi rất mong chờ được nhận các ngày dự kiến từ các vị.」"
# 【稀咲】
# display as 姜
# JP: 「日ノ本滞在はあと何日だっけ？」
1584 = "「Cô ở lại Hinomoto thêm mấy ngày nữa nhỉ?」"
# 【姜】
# display as 稀咲
# JP: 「本日を除いて２日ですね。あさっての夜の便で、\n副丘から北琴に戻る予定です」
1021 = "「Trừ hôm nay ra thì còn 2 ngày ạ. Chuyến bay tối ngày kia,\ntôi dự định sẽ từ Fukuoka trở về Bắc Cầm.」"
# 【稀咲】
# display as 姜
# JP: 「なるほど、なら、滞在中にお渡しする方向で頑張るよ。\nちなみに、今日このあとの予定は？」
1601 = "「Ra vậy, thế thì, tôi sẽ cố gắng đưa cho cô trong thời gian cô ở lại đây.\nNhân tiện, dự định sau hôm nay của cô là gì?」"
# 【姜】
# display as 稀咲
# JP: 「旅館に帰り、報告書をまとめて送信するだけですね。\n旅館は古い温泉旅館ですので、お風呂だけが楽しみです」
1568 = "「Chỉ về nhà trọ, tổng hợp báo cáo rồi gửi đi thôi ạ.\nVì là một nhà trọ suối nước nóng cổ, nên tôi chỉ mong chờ mỗi việc tắm thôi.」"
# 【稀咲】
# display as 姜
# JP: 「なら、さ。もしもよかったら」
1194 = "「Thế thì. Nếu cô không phiền.」"
# monologue
# display as 稀咲
# JP: 稀咲が一瞬僕を見るゆえ、さりげなく頷く。\nどういう意図であるにせよ、稀咲のしたいようしてほしい。
1589 = "Kisaki thoáng nhìn tôi, nên tôi khẽ gật đầu.\nDù ý đồ là gì đi chăng nữa, tôi vẫn muốn Kisaki làm theo ý mình."
# 【稀咲】
# JP: 「晩ごはん、一緒にどうかな。御一夜の名店だと、地鶏、\n鰻あたりがおすすめだし――」
1906 = "「Ăn tối, cùng nhau thì sao nhỉ. Nhắc đến quán nổi tiếng ở Ohimitera, thì gà thả đồi,\nhay lươn là những món đáng thử đấy――」"
# 【姜】
# display as 稀咲
# JP: 「“地鶏農園”ですね！　以前お招きいただいたことを、\nとてもうれしく、そして美味しく記憶しています」
981 = "「Là “Nông trại gà thả đồi” nhỉ! Lần trước được mời đến đó,\ntôi nhớ là mình đã rất vui, và món ăn cũng rất ngon.」"
# 【稀咲】
# display as 姜
# JP: 「じゃ、あそこが第一候補。他の候補としては――\nそうだね、日ノ本の家庭料理を振る舞うこともできる」
1383 = "「Vậy, đó là lựa chọn số một. Còn lựa chọn khác thì――\nĐúng rồi nhỉ, tôi cũng có thể trổ tài làm món ăn gia đình Hinomoto đấy.」"
# 【姜】
# display as 稀咲
# JP: 「振る舞う！」
1582 = "「Trổ tài!」"
# monologue
# display as 姜
# JP: びっくりするほどの反応だ。\nメガネの奥の目がキラキラと、輝いているようにも見える。
1258 = "Phản ứng đáng kinh ngạc thật.\nĐôi mắt đằng sau lớp kính như đang lấp lánh, sáng rực lên."
# 【姜】
# JP: 「でしたら――もしや――勘違いだったら恐縮ですが、\n稀咲女士の手料理を、というお誘いでしょうか？」
1937 = "「Nếu vậy――chẳng lẽ――tôi sợ mình hiểu lầm nhưng,\nđó là lời mời thưởng thức món ăn do chính tay cô Kisaki nấu sao?」"
# 【稀咲】
# display as 姜
# JP: 「うん。まぁね。僕も結婚したわけだから、多少の料理は\n――付け焼き刃だけどさ、身につけたりして」
1569 = "「Ừm. Chắc vậy. Dù sao tôi cũng đã kết hôn rồi, nên chút ít nấu nướng\n――tuy chỉ là học lỏm thôi, nhưng tôi cũng biết sơ sơ.」"
# monologue
# display as 稀咲
# JP: 付け焼き刃は事実かもしれんが、『多少』は全く謙遜だ。\n稀咲はとにかく努力家で、その上実に、舌がいい。
1172 = "Học lỏm có thể là sự thật, nhưng 『chút ít』 thì hoàn toàn là khiêm tốn.\nKisaki dù sao cũng là một người nỗ lực, hơn nữa vị giác của cô ấy thực sự rất tuyệt."
# monologue
# JP: （なるほどなぁ。なにかご馳走を仕込んでいるなと\n思っていたが……姜さんにふるまうためであったか）
1900 = "(Ra là vậy. Thảo nào tôi cứ nghĩ cô ấy đang chuẩn bị món ngon gì đó\n......Hóa ra là để chiêu đãi cô Khương sao.)"
# 【姜】
# JP: 「ああ、なんと嬉しいお誘いでしょう！　ぜひ、ぜひに！\nお招きのお礼に、自分用の紹興酒を持っていきます」
1970 = "「A, thật là một lời mời đáng mừng! Nhất định, nhất định rồi!\nĐể đáp lễ lời mời, tôi sẽ mang theo rượu Thiệu Hưng của riêng mình.」"
# 【稀咲】
# display as 姜
# JP: 「ふふっ、相変わらず呑むんだねぇ。\n自分用ってことは――仲国からの持ち込み？」
1161 = "「Fufu, vẫn thích uống như ngày nào nhỉ.\nCủa riêng mình nghĩa là――mang từ Trọng Quốc sang sao?」"
# 【姜】
# display as 稀咲
# JP: 「ええ、一番お気に入りのヤツです。\n日ノ本では買えないものかと」
1128 = "「Vâng, loại tôi thích nhất đấy.\nChắc ở Hinomoto không mua được đâu.」"
# 【稀咲】
# display as 姜
# JP: 「それはそれは楽しみだ。ああ、念の為。\nアレルギーとか好き嫌いがあれば聞いておきたい」
1390 = "「Thế thì đáng mong đợi lắm đây. A, để chắc chắn.\nTôi muốn hỏi xem cô có dị ứng hay ghét món gì không.」"
# 【姜】
# display as 稀咲
# JP: 「なんでも食べますよ。アレルギーもありません。\nですから、もしも図々しいお願いをしてもよければ」
1571 = "「Tôi ăn được mọi thứ. Cũng không bị dị ứng gì.\nVì vậy, nếu cô không phiền cho tôi đưa ra một yêu cầu hơi mặt dày một chút.」"
# 【稀咲】
# display as 姜
# JP: 「なに？　何でも言って？」
1305 = "「Gì cơ? Cứ nói đi?」"
# 【姜】
# display as 稀咲
# JP: 「稀咲女士の一番の得意料理を。やはりピザですか？\n私はそれを、ぜひともご馳走になってみたいです」
1007 = "「Món tủ nhất của cô Kisaki. Vẫn là pizza sao?\nTôi nhất định muốn được thưởng thức món đó.」"
# 【稀咲】
# display as 姜
# JP: 「ピザか。ピザも焼くよ。結構得意な方だと思う。けど、\n一番の得意となると……姜さん、食べたことあるかなぁ」
1480 = "「Pizza à. Tôi cũng có nướng pizza. Cũng khá tự tin đấy. Nhưng,\nnếu nói là món tủ nhất thì......không biết cô Khương đã ăn bao giờ chưa nhỉ.」"
# monologue
# display as 稀咲
# JP: 稀咲は少し、困ったような照れくさそうな笑みを浮かべる。
1347 = "Kisaki nở một nụ cười có chút bối rối, ngại ngùng."
# 【稀咲】
# JP: 「ヒジキって、とっても地味なお惣菜なんだけど」
1885 = "「Rong biển Hijiki ấy, một món ăn kèm rất đỗi bình dân.」"
# 【稀咲】
# display as 稀咲
# JP: 「あぁ」
1064 = "「A.」"
# monologue
# display as 稀咲
# JP: 姜さんを旅館に送り、帰宅して。\n並んで眠れば稀咲は実に、満ち足りたような声を出す。
1150 = "Đưa cô Khương về nhà trọ, rồi trở về nhà.\nKhi nằm cạnh nhau, Kisaki thốt ra một giọng nói thực sự mãn nguyện."
# 【稀咲】
# JP: 「――とてもにぎやかな食卓になったね。\n右田の家での食事会にして、本当によかった」
1780 = "「――Bữa ăn thật náo nhiệt nhỉ.\nTổ chức tiệc tối ở nhà Migita, thật sự là một quyết định đúng đắn.」"
# 【双鉄】
# display as 稀咲
# JP: 「だなぁ」
700 = "「Đúng thế.」"
# monologue
# display as 雙鐵
# JP: 稀咲のアパート、右田の家。今の僕らは、\n二箇所をともに、使い分けながら生活している。
1388 = "Căn hộ của Kisaki, nhà Migita. Hiện tại chúng tôi,\nđang sống và linh hoạt sử dụng cả hai nơi."
# 【双鉄】
# JP: 「姜さんはたいへんに社交的なのだな。\nてっきり三人だけでの食事を選ぶものかと思ったが」
1859 = "「Cô Khương giao thiệp rộng thật đấy.\nTôi cứ đinh ninh cô ấy sẽ chọn bữa ăn chỉ có ba người thôi chứ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「もしも手料理になるのなら、姜さんのことだからね。\n右田でパーティの方が喜んでもらえそうって思ってた」
1236 = "「Nếu là đồ tự nấu, thì với tính cách của cô Khương mà.\nTôi đã nghĩ tổ chức tiệc ở nhà Migita sẽ khiến cô ấy vui hơn.」"
# 【双鉄】
# display as 稀咲
# JP: 「真闇姉たちにも予め話を通してあったようだったしな」
1371 = "「Có vẻ như em cũng đã báo trước với chị Mayami rồi nhỉ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「まぁね。姜さんがお店での食事を選んでも、\n仕込んだ料理を無駄にしちゃったらもったいないし」
1019 = "「Thì đó. Dù cô Khương có chọn ăn ở quán,\nnhưng bỏ phí đồ ăn đã chuẩn bị thì tiếc lắm.」"
# 【双鉄】
# display as 稀咲
# JP: 「素晴らしいな。あらゆる可能性を考慮し、\nどう運んでも無駄のないように手配してあったわけか」
1498 = "「Tuyệt vời thật. Đã cân nhắc mọi khả năng,\nvà sắp xếp sao cho dù có chuyện gì xảy ra cũng không lãng phí.」"
# 【稀咲】
# display as 雙鐵
# JP: 「この程度は普通のことだと思うけど？」
1034 = "「Tôi nghĩ mức độ này là chuyện bình thường mà?」"
# monologue
# display as 稀咲
# JP: 特に気負いも感じぬ言葉。それだけに、\n稀咲の普通の基準の高さを、今更ながらに痛感する。
1323 = "Lời nói không hề có vẻ gì là khoe khoang. Chính vì thế,\ntôi mới thấm thía sâu sắc tiêu chuẩn bình thường của Kisaki cao đến nhường nào."
# 【双鉄】
# JP: 「そこを普通とできるのならば、日ノ本は、\n世界一の経済大国として覇権を得ているだろうさ」
1882 = "「Nếu có thể coi đó là bình thường, thì Hinomoto,\nchắc đã giành được bá quyền với tư cách là cường quốc kinh tế số 1 thế giới rồi.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ、ありがとう。双鉄に褒めて貰えると嬉しい。\nけど――そうだね。だからボクらは相性がいいのかも」
1024 = "「Fufu, cảm ơn nhé. Được Soutetsu khen tôi vui lắm.\nNhưng――đúng vậy nhỉ. Có lẽ vì thế mà chúng ta mới hợp nhau.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1188 = "「Ừ.」"
# monologue
# display as 雙鐵
# JP: それだけで多分伝わってきた。\nなるほど、これが相性の良さか。
# 1150 = "「啊」" 
# 【双鉄】
# JP: 「僕からみれば、稀咲は計画、準備あたりに、\n抜群の能力を発揮しているように思える」
1663 = "「Theo góc nhìn của tôi, Kisaki đang phát huy năng lực xuất chúng\ntrong việc lên kế hoạch và chuẩn bị.」"
# 【稀咲】
# display as 雙鐵
# JP: 「だね。逆にボクから見れば、双鉄はその辺に抜けもある。\nけどそれだけに、発想力や現場における柔軟さに優れる」
1016 = "「Đúng vậy. Ngược lại theo góc nhìn của tôi, Soutetsu cũng có những thiếu sót trong phần đó.\nNhưng bù lại, cậu lại vượt trội về khả năng sáng tạo và sự linh hoạt tại hiện trường.」"
# 【双鉄】
# display as 稀咲
# JP: 「柔軟さか。\nふふっ、素晴らしい言葉で褒めていただけ光栄だ」
1386 = "「Sự linh hoạt sao.\nFufu, thật vinh hạnh khi được khen ngợi bằng những lời tuyệt vời như vậy.」"
# monologue
# display as 雙鐵
# JP: 言い換えるなら、準備不足のリカバリーを、\nどうにかこうにか応急処置でこなしているにすぎないが。
1285 = "Nói cách khác, chỉ là đang cố gắng xoay xở\nkhắc phục sự thiếu chuẩn bị bằng các biện pháp ứng phó tạm thời mà thôi."
# 【双鉄】
# JP: 「しかし、その柔軟さも、姜さんの振る舞いを見ると、\nまったく僕などまだまだまだと思えるよ」
1685 = "「Tuy nhiên, ngay cả sự linh hoạt đó, khi nhìn vào cách hành xử của cô Khương,\ntôi thấy mình vẫn còn kém xa lắm.」"
# 【稀咲】
# display as 雙鐵
# JP: 「対人関係のみに絞れば、そうかもね。\nなにせ仲国国務院鉄道部の副部長秘書だ」
996 = "「Nếu chỉ xét riêng về quan hệ đối nhân xử thế, thì có lẽ là vậy.\nDù sao cô ấy cũng là thư ký của Thứ trưởng Bộ Đường sắt Quốc vụ viện Trọng Quốc mà.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1038 = "「Ừ.」"
# monologue
# display as 雙鐵
# JP: 日ノ本であるなら国土交通省鉄道局副局長秘書。\n超高級官僚の秘書ということになるのだろうか。
# 1150 = "「啊」" 
# 【双鉄】
# JP: 「それは確かに、対人関係のスキルセットの\n最上級のものを取り揃えねば、とても務まらなさそうだ」
1759 = "「Điều đó thì chắc chắn rồi, nếu không trang bị những kỹ năng\nđối nhân xử thế ở mức thượng thừa, thì khó mà đảm đương nổi.」"
# 【稀咲】
# display as 雙鐵
# JP: 「その基礎となる天性も、だよね。\n姜さんを苦手だという人に、ボクは出会ったことがない」
1466 = "「Cả thiên bẩm làm nền tảng cho điều đó nữa, nhỉ.\nTôi chưa từng gặp ai nói rằng không thích cô Khương cả.」"
# 【双鉄】
# display as 稀咲
# JP: 「だろうなぁ」
1506 = "「Chắc là vậy rồi.」"
# monologue
# display as 雙鐵
# JP: 実際今日の会食でもその振る舞いは完璧だった。\nどの料理にも興味津々、食事も会話も楽しみきっていた。
1312 = "Thực tế trong bữa ăn hôm nay, cách cư xử của cô ấy cũng thật hoàn hảo.\nHứng thú với mọi món ăn, tận hưởng trọn vẹn cả bữa ăn lẫn cuộc trò chuyện."
# 【双鉄】
# JP: 「ひじきをおかわりしてくれたのは嬉しかったな。他に\n幾らもご馳走があるのに、一番気に入ったようだった」
1756 = "「Tôi rất vui khi cô ấy xin thêm rong biển Hijiki đấy. Dù có\nbiết bao nhiêu món ngon khác, có vẻ cô ấy thích món đó nhất.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ。無理をさせてなかったならいいけど。そこは\n事前におすすめしちゃったボクにあわせてくれたのかも」
1459 = "「Fufu. Miễn là cô ấy không phải cố gượng ép là được. Chuyện đó\ncó khi cô ấy hùa theo tôi vì tôi đã lỡ gợi ý từ trước cũng nên.」"
# 【双鉄】
# display as 稀咲
# JP: 「とてもそうは見えなかった。というか、\n無理をしてあの量を食べられるものでもなかろう」
1183 = "「Nhìn không giống thế chút nào. Mà nói đúng hơn,\ncố ép mình thì làm sao ăn được ngần ấy chứ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「健啖家だからね、彼女は。呑む方も凄いし。\n食べすぎたと恐縮しているのも可愛らしかった」
1456 = "「Cô ấy ăn khỏe mà. Tửu lượng cũng đáng nể nữa.\nCái điệu bộ áy náy vì ăn quá nhiều cũng đáng yêu lắm cơ.」"
# 【双鉄】
# display as 稀咲
# JP: 「だなぁ」
1212 = "「Đúng vậy nhỉ.」"
# monologue
# display as 雙鐵
# JP: こらえきれずにあのハチロクが、\n吹き出してしまうほどだった。
1003 = "Đến mức Hachiroku không nhịn được\nmà bật cười thành tiếng."
# 【双鉄】
# JP: 「ハチロクも随分懐いていたな。\nハチロクとて、対外的な社交術は見事なものだが――」
1762 = "「Hachiroku cũng khá thân thiết với cô ấy nhỉ.\nDù kỹ năng giao tiếp đối ngoại của Hachiroku cũng rất xuất sắc――」"
# monologue
# display as 雙鐵
# JP: お客様をお迎えするにふさわしい立居振舞。\nそれが完璧に維持されていたのは、ほんの30分ほどだ。
1052 = "Cử chỉ điệu bộ hoàn toàn phù hợp để tiếp đón khách quý.\nNhưng sự hoàn hảo ấy chỉ duy trì được vỏn vẹn chừng 30 phút."
# 【双鉄】
# JP: 「……うむ。今日のアレは、実に珍しかった。\n初対面にもかかわらず、身内のようにはしゃいでいた」
1764 = "「......Ừm. Hôm nay quả thực rất hiếm thấy.\nDù là lần đầu gặp mặt, mà lại vui đùa như người nhà vậy.」"
# 【稀咲】
# display as 雙鐵
# JP: 「日々姫もだよね。あの子の隠れ人見知りは相当だけど、\n今日は完全にリラックスして楽しんでくれていた」
714 = "「Hibiki cũng thế nhỉ. Đứa trẻ đó bề ngoài thì vậy chứ bên trong nhút nhát lắm,\nnhưng hôm nay lại hoàn toàn thư giãn và tận hưởng.」"
# 【双鉄】
# display as 稀咲
# JP: 「！？　日々姫と姜さんも初対面だったのか？\nてっきり以前に、稀咲を通じて知り合っていたものと」
1382 = "「!? Hibiki và cô Khương cũng là lần đầu gặp nhau sao?\nTôi cứ đinh ninh là họ đã quen biết qua Kisaki từ trước rồi chứ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ううん、完全に初対面。だから会食の前に、\n自己紹介の時間を設けたんじゃないか」
1124 = "「Không, hoàn toàn là lần đầu gặp. Nên trước bữa ăn,\ntôi mới dành thời gian cho mọi người tự giới thiệu mà.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ……あれは真闇姉とハチロクのためのものかと\n思いこんでしまっていた」
987 = "「A......tôi cứ tưởng phần đó là dành cho\nchị Mayami và Hachiroku cơ.」"
# monologue
# display as 雙鐵
# JP: 日々姫とも初対面だったと知り、\nさらにそのコミュニケーション能力の高さに恐れ入る。
1149 = "Biết rằng cô ấy cũng lần đầu gặp Hibiki,\ntôi càng thêm nể phục khả năng giao tiếp tuyệt vời của cô ấy."
# 【双鉄】
# JP: 「すごいな。さすがは稀咲の友人だ、という気がするよ」
1810 = "「Giỏi thật. Cảm giác đúng là bạn của Kisaki có khác.」"
# 【稀咲】
# display as 雙鐵
# JP: 「友人」
1522 = "「Bạn.」"
# monologue
# display as 稀咲
# JP: 驚いた――意表をつかれたかのような声。\n僕の方が、かえってびっくりしてしまう。
1410 = "Giọng điệu ngạc nhiên――như thể bị bất ngờ.\nKhiến tôi cũng phải giật mình theo."
# 【双鉄】
# JP: 「違うのか？　稀咲の……お互いの接し方からして、\n完全にそのような関係だと思いこんでしまっていたが」
1713 = "「Không phải sao? Từ cách đối xử của Kisaki......của hai người với nhau,\ntôi cứ đinh ninh đó hoàn toàn là mối quan hệ như vậy đấy.」"
# 【稀咲】
# display as 雙鐵
# JP: 「友人……になれているのかな。\nもしもそうなら、光栄で嬉しいことだと思うけど……」
1609 = "「Liệu đã......trở thành bạn bè chưa nhỉ.\nNếu đúng là vậy, tôi nghĩ đó là một điều vinh hạnh và đáng mừng, nhưng......」"
# monologue
# display as 稀咲
# JP: 稀咲がなにか考え込んでる。\n思考の邪魔をしないよう、続く言葉をじっと待つ。
1496 = "Kisaki đang suy nghĩ điều gì đó.\nĐể không làm phiền dòng suy nghĩ ấy, tôi kiên nhẫn chờ đợi lời tiếp theo."
# 【稀咲】
# JP: 「……姜女士は、ボクにとっては先生なんだ。\n向こうはそんなつもりはないかもとも思うけど」
1853 = "「......Cô Khương, đối với tôi là một người thầy.\nDù tôi nghĩ có lẽ bên kia không có ý đó.」"
# 【双鉄】
# display as 稀咲
# JP: 「先生か。年齢的にそれほど上とは見えないが」
718 = "「Thầy sao. Nhìn tuổi tác thì có vẻ không hơn nhiều lắm nhỉ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「うん。10才も違わない。けれどキャリアが――\n姜さんを紹介してくれたのは、父なんだ」
1504 = "「Ừ. Cách nhau chưa tới 10 tuổi đâu. Nhưng sự nghiệp thì――\nNgười đã giới thiệu cô Khương cho tôi, là bố tôi đấy.」"
# monologue
# display as 稀咲
# JP: 懐かしそうな、あたたかな声。\n聞いた途端、話の続きに、さらなる興味を掻き立てられる。
1430 = "Giọng nói ấm áp, đầy hoài niệm.\nVừa nghe thấy, tôi càng thêm tò mò về phần tiếp theo của câu chuyện."
# 【稀咲】
# JP: 「あの頃ボクは、年齢的にも精神的にも小娘だった。\n銀行で働き始めることになって、完全に空回りしていた」
1711 = "「Hồi đó tôi, cả về tuổi tác lẫn tinh thần đều chỉ là một con nhóc.\nBắt đầu làm việc ở ngân hàng, tôi hoàn toàn luống cuống.」"
# 【双鉄】
# display as 稀咲
# JP: 「最初はワーキングスタディだったのか？」
1588 = "「Lúc đầu là vừa học vừa làm sao?」"
# 【稀咲】
# display as 雙鐵
# JP: 「そのとおり。アルバイトもしたことがなくて、\n一番最初の仕事先が隈元銀行だったんだ」
982 = "「Đúng vậy. Tôi chưa từng đi làm thêm,\nvà nơi làm việc đầu tiên của tôi chính là Ngân hàng Kumamoto.」"
# monologue
# display as 稀咲
# JP: いった途端に、クスっと微笑。
1431 = "Vừa nói xong, cô ấy khẽ mỉm cười."
# 【稀咲】
# JP: 「というか、今にいたるまで銀行業一本槍だね、ボクは。\nファンド組成も、もろに銀行の仕事だし」
1924 = "「Đúng hơn là, cho đến tận bây giờ tôi vẫn chỉ gắn bó với nghề ngân hàng.\nViệc thành lập quỹ cũng hoàn toàn là công việc của ngân hàng mà.」"
# 【双鉄】
# display as 稀咲
# JP: 「僕の目に映る稀咲は、完全に理想的な[バンカー,2]銀行家だ。\n未熟なころがあったなど、まったく想像もつかんほどに」
1534 = "「Trong mắt tôi, Kisaki hoàn toàn là một chủ ngân hàng lý tưởng.\nĐến mức không thể tưởng tượng nổi em từng có thời non nớt đấy.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ありがとう。もしもそうなら、それも姜さんと――\n姜さんを紹介してくれた父のおかげだね、完全に」
1318 = "「Cảm ơn. Nếu đúng là vậy, thì đó cũng là nhờ cô Khương――\nvà nhờ bố tôi, người đã giới thiệu cô Khương cho tôi, hoàn toàn là vậy.」"
# monologue
# display as 稀咲
# JP: ふっと、稀咲が身を寄せてくる。\n腕を伸ばせば、それを枕にしてくれる。
1538 = "Bất chợt, Kisaki nép sát vào người tôi.\nKhi tôi dang tay ra, em liền dùng nó làm gối đầu."
# 【稀咲】
# JP: 「他がどうだかしらないけれど、うちの銀行は結構な\n男社会でね。ボクは舐められたくないって思ってた」
1925 = "「Em không biết những nơi khác thế nào, chứ ngân hàng của em thì nặng tư tưởng trọng nam khinh nữ lắm.\nNên em không muốn bị coi thường đâu.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1603 = "「À.」"
# monologue
# display as 雙鐵
# JP: 浦上さんをふと思い出す。あの方の男装も確か、\n『この方がいろいろ便利』という理由であった。
# 1150 = "「啊」" 
# 【稀咲】
# JP: 「小さなころから一人称がボクだったのも、その現れかな。\n今となっては、かえって逆効果だったかとも思うけど」
1781 = "「Chắc việc từ nhỏ em đã xưng là [boku]Tôi cũng là vì thế.\nNhưng giờ nghĩ lại, em thấy nó phản tác dụng thì đúng hơn.」"
# 【双鉄】
# display as 稀咲
# JP: 「恐ろしく似合っているので問題なかろう。\n社交の場での”[わたくし]私”も、実に可憐で素敵だが」
1290 = "「Thấy hợp đến đáng sợ nên chắc không sao đâu.\n Dù em xưng là \"[watakushi]Tôi\" trong các buổi giao tế cũng rất đáng yêu và tuyệt vời.」"
# 【稀咲】
# display as 雙鐵
# JP: 「あ」
1065 = "「A.」"
# monologue
# display as 稀咲
# JP: クスっと小さな笑い声。\n綺麗な顔が、僕の耳元に寄ってくる。
# 1150 = "「啊」" 
# 【稀咲】
# JP: 「実はね？　あれはハチロクちゃんのパクリなんだ。\n知り合う以前には、”く”は入れてなかった」
1957 = "「Thực ra nhé? Cái đó là em học lỏm từ Hachiroku đó.\nTrước khi quen biết em ấy, em không có thêm chữ \"ku\" vào đâu.」"
# 【双鉄】
# display as 稀咲
# JP: 「そうだったのか。ふむ――確かに稀咲にも、\nわたしよりわたくしの方が似合うな」
1063 = "「Ra là vậy sao. Hừm——Đúng là với Kisaki,\nxưng \"watakushi\" hợp hơn là \"watashi\" thật.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ、褒め言葉と受け取っておくよ。\nで――ええと、どこまで話してたっけ？」
1404 = "「Fufu, em sẽ nhận nó như một lời khen nha.\nThế——ờm, chúng ta đang nói đến đâu rồi nhỉ?」"
# 【双鉄】
# display as 稀咲
# JP: 「銀行が男社会で、舐められたくなくて気を張っていた\n――というような話だった」
1187 = "「Đang nói đến đoạn ngân hàng trọng nam khinh nữ, nên em luôn căng thẳng vì không muốn bị coi thường\n——đại loại thế.」"
# 【稀咲】
# display as 雙鐵
# JP: 「ああ、うん。一人称にも現れているように……\nボクの気の張り方は、概ね空回りしちゃってたんだ」
1594 = "「À, đúng rồi. Như cách em xưng hô cũng cho thấy......\nSự căng thẳng của em phần lớn chỉ là lo bò trắng răng thôi.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1158 = "「À.」"
# monologue
# display as 雙鐵
# JP: 確かに小娘の新任支店長がボク呼びだったら――\nそこに表出するものは、威厳ではなく可愛らしさだ。
# 1150 = "「啊」" 
# 【稀咲】
# JP: 「父は、それをみかねたんだろうね。\n仲国からの留学生を、家庭教師につけてくれた」
1819 = "「Chắc cha em không thể đứng nhìn mãi được.\nNên ông đã thuê một du học sinh từ Trọng Quốc về làm gia sư cho em.」"
# 【双鉄】
# display as 稀咲
# JP: 「それが姜さんか」
1260 = "「Đó là cô Jiang sao?」"
# 【稀咲】
# display as 雙鐵
# JP: 「うん。姜さんはボクに勉強と――\n勉強そのものの何倍も、多くのことを教えてくれた」
1275 = "「Vâng. Cô Jiang không chỉ dạy em học mà——\nCô ấy còn dạy em nhiều điều gấp mấy lần việc học nữa.」"
# 【双鉄】
# display as 稀咲
# JP: 「例えば、社交術的な？」
1165 = "「Ví dụ như, nghệ thuật giao tiếp à?」"
# 【稀咲】
# display as 雙鐵
# JP: 「そういう直接的な技術じゃなくって。なんていうのかな、\n……準備があれば構えなくていい、みたいな？」
1425 = "「Không phải những kỹ năng trực tiếp như vậy đâu. Phải nói sao nhỉ,\n......Kiểu như có chuẩn bị trước thì không cần phải căng thẳng ấy?」"
# 【双鉄】
# display as 稀咲
# JP: 「ほう」
997 = "「Ồ.」"
# 【稀咲】
# display as 雙鐵
# JP: 「例えば今日、日々姫と姜さん、\nデザインの話で随分もりあがってたけど――」
# 1129 = "「哦」" 
# 【双鉄】
# display as 稀咲
# JP: 「！　あれも準備があったのか」
1426 = "「! Chuyện đó cũng là do có chuẩn bị trước sao?」"
# 【稀咲】
# display as 雙鐵
# JP: 「確証はないけど、多分ね。ボクの結婚相手と、\nその家族構成あたりのことは、事前に調べてたと思う」
1155 = "「Tuy không có bằng chứng xác thực, nhưng có lẽ là vậy. Về đối tượng kết hôn của em,\nvà gia cảnh nhà người đó, em nghĩ cô ấy đã điều tra từ trước rồi.」"
# 【双鉄】
# display as 稀咲
# JP: 「それが準備か」
1604 = "「Đó là chuẩn bị sao.」"
# 【稀咲】
# display as 雙鐵
# JP: 「準備のほんの一部分。双鉄は閃くタイプじゃないか。\n予想外の事態を、むしろ発展のチャンスにできる」
1488 = "「Chỉ là một phần nhỏ của sự chuẩn bị thôi. Anh Soutetsu thuộc tuýp người hay nảy ra ý tưởng bất chợt mà.\nAnh có thể biến những tình huống ngoài dự kiến thành cơ hội phát triển.」"
# 【双鉄】
# display as 稀咲
# JP: 「買いかぶりすぎかとは思うが……\n稀咲が評価してくれるのであれば、そうかもしれんな」
1116 = "「Anh nghĩ em đánh giá anh hơi cao rồi đấy......\nNhưng nếu Kisaki đã nhận xét vậy thì, chắc là thế thật.」"
# 【稀咲】
# display as 雙鐵
# JP: 「でもね？　ボクや姜さんはそうじゃない。\nポーレットとかもお仲間だよね。閃かないタイプ」
1564 = "「Nhưng anh biết không? Em và cô Jiang lại không như thế.\nCả chị Paulette cũng giống tụi em. Đều là tuýp người không có ý tưởng bất chợt.」"
# 【双鉄】
# display as 稀咲
# JP: 「ああ――」
994 = "「À——」"
# monologue
# display as 雙鐵
# JP: 確かにポーレットは異様なまでに突発事態に弱い。\n弱くあるのに、それでもなんとか事態を破綻させんのは
1143 = "Đúng là Paulette yếu kém một cách kỳ lạ trong việc xử lý các tình huống bất ngờ.\nDù yếu kém, nhưng cô ấy vẫn có thể xoay sở để mọi chuyện không đổ vỡ là nhờ..."
# 【双鉄】
# JP: 「ゆえに、準備か」
1922 = "「Do đó, mới cần chuẩn bị sao.」"
# 【稀咲】
# display as 雙鐵
# JP: 「そのとおり。閃かないからこそ、閃き不要に事態を運ぶ。\n完璧に準備し、立案し、計画し、計画どおりに実施する」
1335 = "「Đúng vậy. Chính vì không thể nảy ra ý tưởng, nên mới phải lèo lái mọi việc mà không cần đến nó.\nChuẩn bị hoàn hảo, lập đề án, lên kế hoạch, và thực hiện đúng như kế hoạch.」"
# monologue
# display as 稀咲
# JP: 稀咲の声は誇りに満ちてる。\n積み重ねて来た者の強さを、しかと感じる。
1432 = "Giọng nói của Kisaki tràn đầy sự tự hào.\nTôi có thể cảm nhận rõ sức mạnh của một người luôn nỗ lực tích lũy từng chút một."
# 【稀咲】
# JP: 「姜さんが、無言のうちに一番深く教えてくれたのは、\n多分、そこ」
1864 = "「Điều mà cô Jiang dạy em sâu sắc nhất trong im lặng,\ncó lẽ chính là điểm đó.」"
# monologue
# display as 稀咲
# JP: 噛みしめるような、深い息。
1240 = "Một tiếng thở dài sâu thẳm, như đang suy ngẫm."
# 【稀咲】
# JP: 「正しく情報収集し、正しく分析し、正しく準備する。\n最終的な成果は、その正しさと仕事量との乗算になる」
1883 = "「Thu thập thông tin chính xác, phân tích chính xác, chuẩn bị chính xác.\nThành quả cuối cùng sẽ là phép nhân giữa sự chính xác đó và khối lượng công việc.」"
# 【双鉄】
# display as 稀咲
# JP: 「乗算か。なるほどな」
1217 = "「Phép nhân sao. Ra là vậy.」"
# monologue
# display as 雙鐵
# JP: ……方向性が、例えばまるで真逆だったら、\n仕事量はデメリットしか生み出さない。
1000 = "......Nếu phương hướng, ví dụ như hoàn toàn đi ngược lại,\nthì khối lượng công việc sẽ chỉ sinh ra tác hại mà thôi."
# 【双鉄】
# JP: 「いや、しかし方向性がマイナスで、\n仕事量もマイナスという場合にはどうだ？」
694 = "「Không, nhưng nếu phương hướng là số âm,\nvà khối lượng công việc cũng là số âm thì sao?」"
# 【稀咲】
# display as 雙鐵
# JP: 「悪意を持つ、けれども極めて無能な者が、\n足を引っ張ろうと動くパターンを考えてみて？」
1493 = "「Anh thử nghĩ đến trường hợp một kẻ có ác ý nhưng lại cực kỳ vô dụng,\nđang cố gắng ngáng đường xem?」"
# 【双鉄】
# display as 稀咲
# JP: 「！　マイナスかけるマイナスがプラスになるな！\n無能な者の妨害工作は、うむ、逆方向に働こうゆえ」
1349 = "「! Âm nhân âm sẽ thành dương nhỉ!\nCông cuộc phá hoại của kẻ vô dụng, ừm, sẽ hoạt động theo hướng ngược lại.」"
# 【稀咲】
# display as 雙鐵
# JP: 「だよね。だから、一番怖いのは無能な働き者でもある。\nマイナス方向の仕事量を愚直に積み重ねちゃうから」
1130 = "「Đúng không. Nên là, đáng sợ nhất vẫn là những kẻ vô dụng mà lại chăm chỉ.\nBởi vì họ sẽ cứ ngoan cố tích lũy khối lượng công việc theo hướng tiêu cực.」"
# 【双鉄】
# display as 稀咲
# JP: 「なるほど。なかなかに深いな」
1269 = "「Ra là vậy. Khá là sâu sắc đấy.」"
# 【稀咲】
# display as 雙鐵
# JP: 「そ。深いんだ、彼女の教えは。\nボクが正しく解釈できているのか、今もわからないけど」
1087 = "「Vâng. Lời dạy của cô ấy sâu sắc lắm.\nDù đến giờ em vẫn không biết mình đã hiểu đúng hay chưa nữa.」"
# monologue
# display as 稀咲
# JP: 稀咲がふっ、と微笑を零す。
1268 = "Kisaki khẽ nở một nụ cười."
# 【稀咲】
# JP: 「ボクには物凄くフィットする方法論だと感じた。\nだからボクは選んで学んで身につけた」
1856 = "「Em cảm thấy đó là một phương pháp luận vô cùng phù hợp với mình.\nNên em đã lựa chọn học hỏi và tiếp thu nó.」"
# 【双鉄】
# display as 稀咲
# JP: 「その選択は大正解だったのだなと感じるよ。\n僕の知る稀咲の、稀咲らしさの根源であるようにさえ」
1322 = "「Anh cảm thấy lựa chọn đó là hoàn toàn chính xác.\nThậm chí nó giống như cội nguồn tạo nên một Kisaki mang đậm chất Kisaki mà anh biết vậy.」"
# 【稀咲】
# display as 雙鐵
# JP: 「そういわれると、もともとの素養を、\n姜さんが整頓して道筋を見せてくれた感じなのかな」
1321 = "「Anh nói vậy làm em có cảm giác như, những tố chất vốn có của em,\nđã được cô Jiang sắp xếp lại và vạch ra đường đi nước bước cho vậy.」"
# 【双鉄】
# display as 稀咲
# JP: 「かもしれんな。『そう導ける』と思ったがゆえ、\n元忠さんは姜さんを家庭教師に選んだのかもしれん」
1025 = "「Có thể lắm. Chắc vì nghĩ rằng 'có thể dẫn dắt như vậy',\nnên ông Mototada mới chọn cô Jiang làm gia sư cho em.」"
# 【稀咲】
# display as 雙鐵
# JP: 「あ」
1329 = "「A.」"
# monologue
# display as 稀咲
# JP: そこは思考の盲点だったか、稀咲が不意に言葉を止める。
# 1150 = "「啊」" 
# 【稀咲】
# JP: 「……そっか。そうかも。もしもそうなら、\n僕は父に、いっそう感謝しなくっちゃだね」
1785 = "「......Ra vậy. Có thể lắm. Nếu đúng là thế,\nthì em càng phải biết ơn cha mình nhiều hơn nữa rồi.」"
# 【双鉄】
# display as 稀咲
# JP: 「そうするといい。僕が言うと重すぎるかもしれんが、\n親孝行したいときには親は無し、だ」
720 = "「Nên làm vậy đi. Anh nói ra thì có thể hơi nặng nề, nhưng\ncây muốn lặng mà gió chẳng ngừng, tử dục dưỡng mà thân bất đãi đâu.」"
# 【稀咲】
# display as 雙鐵
# JP: 「うん。ありがと。\n……今度、三人で食事にでもいこう」
1587 = "「Vâng. Cảm ơn anh.\n......Hôm nào đó, ba chúng ta cùng đi ăn nhé.」"
# 【双鉄】
# display as 稀咲
# JP: 「大歓迎だ」
1174 = "「Rất sẵn lòng.」"
# 【稀咲】
# display as 雙鐵
# JP: 「そっか……本当に大感謝だなぁ」
1605 = "「Vậy sao...... Thật sự vô cùng biết ơn.」"
# 【双鉄】
# display as 稀咲
# JP: 「！」
1567 = "「!」"
# monologue
# display as 雙鐵
# JP: 稀咲がさらに、ぐぐっと体を寄せてくる。\n甘い香りと温もりが、声にまじって僕の全部に染みてくる。
# 1141 = "「唔！」" 
# 【稀咲】
# JP: 「天性があったとしても、それは方法になってなかった。\n具体化されず、だから身についていなかった」
1854 = "「Dù có thiên bẩm đi chăng nữa, thì nó vẫn chưa trở thành phương pháp.\nChưa được cụ thể hóa, nên tôi chưa thể nắm bắt được.」"
# monologue
# display as 稀咲
# JP: とくん、とくんと稀咲の鼓動が伝わってくる。\n稀咲の胸は大きくなったと、そう思わずにはいられない。
1082 = "Từng nhịp đập thình thịch của Kisaki truyền đến.\nTôi không thể không nghĩ rằng ngực của Kisaki đã lớn hơn."
# 【稀咲】
# JP: 「けど、姜さんが“ボクにあうやり方”を教えてくれた。\nその一番の成果物なら、キミだよ？　双鉄」
1783 = "「Nhưng, cô Khương đã dạy tôi 'cách làm phù hợp với bản thân'.\nThành quả lớn nhất của điều đó, chính là anh đấy? Anh Soutetsu.」"
# 【双鉄】
# display as 稀咲
# JP: 「む？」
995 = "「Hử?」"
# 【稀咲】
# display as 雙鐵
# JP: 「キミに関する情報は、日々姫がいくらでもくれたから。\nキミに恋してもらえるよう、ボクは出来るだけ準備した」
1327 = "「Thông tin về anh, Hibiki đã cung cấp cho tôi rất nhiều.\nĐể khiến anh yêu tôi, tôi đã chuẩn bị kỹ càng nhất có thể.」"
# 【双鉄】
# display as 稀咲
# JP: 「そうだったのか――ならば、その努力に応えねばな」
1599 = "「Ra là vậy sao——Nếu thế, tôi phải đáp lại sự nỗ lực đó mới được.」"
# 【稀咲】
# display as 雙鐵
# JP: 「んっ」
1092 = "「Ưm.」"
# monologue
# display as 稀咲
# JP: キスをする。今まさに恋していると伝えたくって、\n何度も何度も、ついばむように、貪るように。
1169 = "Tôi trao cô ấy một nụ hôn. Như muốn truyền đạt rằng hiện tại tôi đang yêu cô ấy nhường nào,\ntôi hôn đi hôn lại, như đang mổ lấy, như đang khao khát."
# 【双鉄】
# JP: 「――稀咲」
1960 = "「——Kisaki.」"
# monologue
# display as 雙鐵
# JP: 稀咲を思い切り抱きしめ――ようとし、\nすんでのところで思いとどまる。
698 = "Tôi định ôm chặt lấy Kisaki——nhưng rồi\nkhựng lại ngay phút chót."
# 【稀咲】
# JP: 「なぁに？　双鉄」
1687 = "「Sao vậy? Anh Soutetsu.」"
# monologue
# display as 稀咲
# JP: 会食の片付けもあったため、今日は右田で就寝している。\n今夜はもろもろ、我慢しなければならぬゆえ――ああ。
1294 = "Vì còn phải dọn dẹp sau bữa tiệc, nên hôm nay chúng tôi ngủ lại nhà Migita.\nĐêm nay, tôi phải kiềm chế nhiều thứ——A."
# 【双鉄】
# JP: 「姜さんに関する話を聞いて、\n視察にいってみたい気持ちが、僕としては一層強まった」
1707 = "「Nghe những chuyện về cô Khương,\ntrong tôi càng thôi thúc cảm giác muốn đi khảo sát hơn.」"
# 【稀咲】
# display as 雙鐵
# JP: 「あ……っと。そうだね。\nその話を先にすませちゃおうか」
1507 = "「A...... ừm. Đúng vậy.\nChúng ta giải quyết xong chuyện đó trước nhé.」"
# monologue
# display as 稀咲
# JP: 何より先かを、稀咲は言わない。稀咲もあるいは、\nここが右田の寝室なのだと失念をしているのだろう。
1147 = "Kisaki không nói rõ là 'trước chuyện gì'. Có lẽ Kisaki cũng\nđã quên mất đây là phòng ngủ của nhà Migita."
# 【稀咲】
# JP: 「ボクも賛成。今ならスケジュールも調整がつくし。\nずっと行けてない新婚旅行がわりにもできそうかな」
1851 = "「Tôi cũng tán thành. Bây giờ thì có thể sắp xếp lịch trình được.\nCó lẽ cũng có thể coi như chuyến tuần trăng mật mà chúng ta vẫn chưa đi được.」"
# 【双鉄】
# display as 稀咲
# JP: 「いや。新婚旅行は別途でスケジュールを必ず取ろう。\nマイレールファンドの引き継ぎが全て完了次第、すぐ」
1309 = "「Không. Tuần trăng mật nhất định phải sắp xếp lịch trình riêng.\nNgay sau khi hoàn tất việc bàn giao My Rail Fund.」"
# 【稀咲】
# display as 雙鐵
# JP: 「うん。ボクもそのほうがもちろん嬉しい。\n今回も、取れて２～３日程度にはなっちゃうだろうし」
984 = "「Ừm. Đương nhiên là tôi cũng muốn như vậy hơn.\nLần này chắc cũng chỉ xin nghỉ được tầm 2~3 ngày thôi.」"
# 【双鉄】
# display as 稀咲
# JP: 「ゆえ、新婚旅行は視察ののち、一週間以上で改めて。\nそうするためにも、今回は視察をがんばりたい」
1168 = "「Vì thế, tuần trăng mật sẽ dời lại sau chuyến khảo sát, kéo dài hơn một tuần.\nĐể làm được như vậy, lần này tôi muốn cố gắng hết sức cho chuyến khảo sát.」"
# 【稀咲】
# display as 雙鐵
# JP: 「完全にビジネスと割り切っての視察でも、もちろん賛成。\nそれはそれで充実した楽しい時間になりそうだしね」
1332 = "「Tất nhiên là tôi cũng tán thành việc coi chuyến khảo sát này hoàn toàn là công việc.\nNhư vậy cũng sẽ là một khoảng thời gian vui vẻ và trọn vẹn mà.」"
# 【双鉄】
# display as 稀咲
# JP: 「ではいく方向で返事をしよう。具体的にどこを、\nあるいは何を視察してみたい、などの希望があるか？」
1246 = "「Vậy tôi sẽ trả lời là chúng ta sẽ đi. Cụ thể thì em có nguyện vọng\nmuốn khảo sát ở đâu, hay muốn xem những gì không?」"
# 【稀咲】
# display as 雙鐵
# JP: 「そうだねぇ。\nどこ――というのはないけれど」
1580 = "「Để xem nào.\nỞ đâu——thì tôi không có ý kiến gì, nhưng mà」"
# monologue
# display as 稀咲
# JP: ふふっ、と、笑い未満の楽しげな息。
1314 = "Fufu, một tiếng thở hắt vui vẻ chưa hẳn là tiếng cười."
# 【稀咲】
# JP: 「姜さんに完全に任せちゃうのでどうかなぁ？\n姜さんがボクらに見せたいものをみてみたい」
1899 = "「Giao phó hoàn toàn cho cô Khương thì sao nhỉ?\nTôi muốn xem những thứ mà cô Khương muốn cho chúng ta xem.」"
# 【双鉄】
# display as 稀咲
# JP: 「なるほど。いいな。実にいい。\nではその方向で姜さんに明日にでも返事をして欲しい」
1249 = "「Ra là vậy. Hay đấy. Rất hay.\nVậy em hãy trả lời cô Khương theo hướng đó vào ngày mai nhé.」"
# 【稀咲】
# display as 雙鐵
# JP: 「うん。わかった」
1085 = "「Ừm. Tôi hiểu rồi.」"
# monologue
# display as 稀咲
# JP: 甘い香りがふわり、鼻先に近づいてくる。\n話の時間はこれで終わりと――稀咲が僕にキスをする。
1164 = "Một mùi hương ngọt ngào phảng phất tiến lại gần chóp mũi tôi.\nNhư muốn nói thời gian trò chuyện đến đây là kết thúc——Kisaki trao cho tôi một nụ hôn."
