48 = ":黑畫面" 

# 【双鉄】
# JP: 「失礼します」
1974 = "（敲門聲）" 

# 【稀咲】
# display as 雙鐵
# JP: 「ああ、双鉄。もういらしてるよ。どうぞ、入って」
1341 = "「打擾了」" 

# 【双鉄】
# display as 稀咲
# JP: 「おまたせしてすみません」
1163 = "「啊，雙鐵。人已經到了。快請進吧」" 

# monologue
# display as 雙鐵
# JP: いつもの稀咲の支店長室。\nけれども今日は、いつもには無い姿がある。
1350 = "「抱歉讓你久等了」" 

# 【姜】
# JP: 「あなたが双鉄先生ですね。はじめまして。\n仲国国務院、鉄道部副部長秘書の、[きょうようこう,2]姜叶煌と申します」
1860 = "稀咲的支行長室與往常無二。但今天在座的卻多了一張陌生的面孔。" 

# monologue
# display as 姜
# JP: メガネが非常によくお似合いの穏やかそうな女性が、\nにこやかに右手を差し出してくるゆえ、握手する。
1299 = "「您就是雙鐵先生吧，很高興見到您。我是仲國國務院鐵道部副部長秘書，姜葉煌」" 

# 【双鉄】
# JP: 「姜さん、はじめまして。\nご高名はかねがね、稀咲から伺っています」
1936 = "這位女士的氣質在眼鏡的襯托下更顯穩健，她面帶微笑伸出了右手與我握手。" 

# monologue
# display as 雙鐵
# JP: 言った途端におやおやと、\n姜さんは少し芝居がかったリアクションをみせる。
1241 = "「姜小姐，久仰大名。之前稀咲可沒少提起過您」" 

# 【姜】
# JP: 「稀咲女士からとあっては、少し怖くもありますね。\nどれほど手厳しいご評価でしょう」
1919 = "話音未落，姜小姐面上便現出了略顯做作的驚訝神情。" 

# 【稀咲】
# display as 姜
# JP: 「いやいや、\n姜女士を低く評価なんて、出来ようもない」
1518 = "「若是經稀咲女士口中的話，還真是有點嚇人。不知會得到怎樣嚴苛的評價呢」" 

# monologue
# display as 稀咲
# JP: 明るく軽い、笑い混じりの切り返し。\nその手の中のティーポットから、ふくよかな香りが漂う。
1133 = "「哪裡哪裡，我哪敢對姜女士擅加批評」" 

# 【稀咲】
# JP: 「“[ゆきめきらん,3]雪芽奇蘭”をいただけなくなったら大変だもの」
1873 = "稀咲輕快一笑，岔開了話題。而從她手中的茶壺，飄來了馥郁的香氣。" 

# 【姜】
# display as 稀咲
# JP: 「ふふっ、\nでしたら今年も季節になったらお送りしましょう」
1528 = "「要是從此喝不到雪芽奇蘭的話可就虧大了」" 

# monologue
# display as 姜
# JP: 姜さんの返しもやわらかだ。\n単純な仕事以上の仲なのかなと、自然、想像されられる。
1191 = "「嘻嘻，那等到今年上市的時候再送來給你吧」" 

# 【双鉄】
# JP: 「このお茶は姜さんからのいただきものでしたか。\nありがとうございます、僕も美味しく頂いてます」
1733 = "姜小姐也面帶笑意地回應道。不難想像，兩人的關係絕不止於工作伙伴而已。" 

# 【姜】
# display as 雙鐵
# JP: 「お口に合うならなによりです」
1572 = "「這茶竟是姜小姐所贈啊。十分感謝，讓我也能得嘗此等甘爽」" 

# monologue
# display as 姜
# JP: 言って微笑み、けれどすぐ、\n姜さんはああ、と小さな声を漏らす。
1509 = "「能合您的口味就再好不過了」" 

# 【姜】
# JP: 「いけません、世間話より仕事のお話よりなにより、\nお祝いをまっさきにお伝えするべきところでした」
1747 = "姜小姐面帶微笑地回應了我，但又隨即低聲言語起來。" 

# monologue
# display as 姜
# JP: 姜さんの穏やかな眼差しがまっすぐ稀咲の方を向く。\n稀咲が微笑む。幸せそうに。
986 = "「不成不成，怎麼就扯到工作和閒聊去了呢，應該一開始就先致以祝賀才對呀」" 

# 【姜】
# JP: 「稀咲女士！\n双鉄先生とのご結婚おめでとうございます！」
1739 = "姜小姐沉穩的目光轉向了稀咲。稀咲臉上洋溢著幸福的微笑。" 

# monologue
# display as 姜
# JP: 笑顔に、声に、ぱあっと部屋が明るく華やぐ。\nああ、これこそ祝福というものだ。
1484 = "「稀咲女士！恭喜你與雙鐵先生成婚！」" 

# 【稀咲】
# JP: 「お祝い本当にありがとう。とても嬉しい」
1939 = "那笑容，那話語，霎時讓整個房間都隨之一亮。啊，這是何等真摯的祝福啊。" 

# monologue
# display as 稀咲
# JP: 稀咲の頬が、生き生きとしたバラ色になる。\n姜さんの顔が僕へ向く。
1342 = "「承吉言十分感謝，我好高興」" 

# 【姜】
# JP: 「双鉄先生。稀咲女士とのご結婚。\n大変にご幸福なこととお慶び申し上げます」
1863 = "稀咲的臉頰飄起了淡淡的紅暈。姜女士隨後轉頭看向了我。" 

# monologue
# display as 姜
# JP: 僕への祝福は礼儀正しく、穏やかだ。\nで、ありながら、あたたかさがじんわり伝わってくる。
1607 = "「雙鐵先生，恭喜您與稀咲女士成婚。祝二位幸福美滿」" 

# 【姜】
# JP: 「稀咲女士のことを、どうぞ大事になさってください。\n大げさではなく、彼女は日ノ本の貴重な宝の一つです」
1704 = "向我送上的則是禮數周到而正式的祝福。但話語間仍滿溢著發自心底的暖意。" 

# 【双鉄】
# display as 姜
# JP: 「ええ、そのことが誰より僕がよく知っています」
1576 = "「還請您對稀咲女士多加珍惜。說她是日本的國寶亦不為過」" 

# 【稀咲】
# display as 雙鐵
# JP: 「っ！！！」
1400 = "「是的，這一點我是再清楚不過了」" 

# monologue
# display as 稀咲
# JP: 言った途端に、稀咲がわずかに狼狽する。\n照れさせてしまったようだが、事実は事実だ。
1142 = "「唔！！！」" 

# 【双鉄】
# JP: 「もしも稀咲が力を貸してくれていなければ、\n今の僕も、今の御一夜もありません」
1920 = "話音未落，稀咲臉上閃過了一絲狼狽的神情。這話也許會讓她有些不好意思，卻是毋庸置疑的事實。" 

# 【稀咲】
# display as 雙鐵
# JP: 「いや、双鉄。そんなことはないよ。\nボクがもしもいなくても、キミなら」
1516 = "「若是沒有稀咲鼎力相助，我和御一夜都絕無可能是如今的樣貌」" 

# 【双鉄】
# display as 稀咲
# JP: 「謙遜はたしかに美徳だが、事実を曲げるのはよくない。\n稀咲は僕に多くを教え、僕の世界を変えてくれた」
1135 = "「哪裡，雙鐵，不至於。就算沒有我，只要有你在」" 

# 【稀咲】
# display as 雙鐵
# JP: 「ぁぅっ」
1535 = "「謙虛固然是美德，但歪曲事實總是不好的。我從稀咲那裡受教良多，我的世界都隨之煥然一新」" 

# 【双鉄】
# display as 稀咲
# JP: 「稀咲のおかげで、僕の視野は大いに広がった。\nそれがなければ……例えば、元忠氏との対立なども」
1152 = "「啊嗚」" 

# 【稀咲】
# display as 雙鐵
# JP: 「こほんっ！」
1418 = "「正因為有稀咲在，我才能大幅拓寬我的視野。而若非如此……比如，難保不會做出與元忠先生對立的決策」" 

# 【双鉄】
# display as 稀咲
# JP: 「っと」
1126 = "「咳咳！」" 

# monologue
# display as 雙鐵
# JP: この話はもうヤメの合図の、咳払い。なるほど――\n義父との対立の話題など、仮定にしても穏やかでない。
1140 = "「唔」" 

# 【双鉄】
# JP: 「すまん。少し勢いこんでしまったようだ」
1872 = "稀咲輕咳一聲，示意我這個話題就此打住。的確——與岳父對立這樣的話題，即便是作為例子也多有不妥。" 

# 【稀咲】
# display as 雙鐵
# JP: 「ボクはまぁ褒められたから嬉しくもあったけど\n……驚かせたよね。さわがせてごめんね？　姜女士」
1353 = "「抱歉，不小心扯遠了」" 

# 【姜】
# display as 稀咲
# JP: 「いえいえ、大変に仲睦まじいご様子。\n微笑ましくも、うらやましくも拝見しました」
1526 = "「被表揚我還是很開心啦，但那樣的評價還是讓我有點驚訝。抱歉見笑了，姜女士」" 

# 【稀咲】
# display as 姜
# JP: 「からかわないでよ。意地悪だなぁ。とにかくええと――\nああ、うん、そうだ、お茶菓子の用意もあるんだ」
1132 = "「哪裡哪裡，兩位如此恩愛。讓人看在眼裡又是歡喜又是羨慕」" 

# monologue
# display as 稀咲
# JP: 稀咲が茶盆をもってくる。\nその上には――ああ。
1272 = "「就別使壞欺負我啦。總之，呃——啊，嗯，對了，我還準備了茶點」" 

# 【双鉄】
# JP: 「姜さん、甘いものが大丈夫でしたら、ぜひご一緒に。\n御一夜名物の長饅頭です。お茶との相性がとても良くて」
1866 = "稀咲端來了茶盤。在茶盤上——啊。" 

# 【姜】
# display as 雙鐵
# JP: 「甘いものは大好物です。喜んでいただきます」
1244 = "「姜小姐，若是吃得慣甜食的話，請務必嘗一嘗。這是御一夜特產長饅頭，作為茶點相當合適」" 

# 【稀咲】
# display as 姜
# JP: 「ふふっ、よかったらおかわりもあるから遠慮しないで。\n双鉄も、はい」
1450 = "「甜食那是相當喜歡。那我就嚐嚐吧，好期待」" 

# monologue
# display as 稀咲
# JP: よく見れば、茶器と皿ともいつもとは違う、仲国のものだ。\n細かな気遣いもさすがだなと、改めて感心させられる。
1182 = "「嘻嘻，喜歡的話還有哦，不要客氣。雙鐵也有，給」" 

# 【姜】
# JP: 「それでは遠慮なく。ん……ああ、美味しい。\n地元で飲むよりずっといい、水のおかげでしょうか」
1751 = "定睛細看，茶具和器皿都不是平常用的，而是用的仲國的。讓我不由得再次感嘆她用心之細。" 

# monologue
# display as 姜
# JP: お世辞とはとても思えない、自然な笑顔。
1578 = "「那就不客氣啦。嗯……啊，真好吃。比在家裡的醇厚多了，是水的關係吧」" 

# 【姜】
# JP: 「双鉄先生が水を守られた経緯。稀咲女士にもお伺い\nしましたし、部内からも報告としてあがってきました」
1717 = "她臉上自然的笑容，讓這話聽起來都不像是恭維。" 

# 【双鉄】
# display as 姜
# JP: 「部内……」
1606 = "「雙鐵先生保護水源的行動，我聽稀咲女士提起過，在鐵道部的內參報告中也有見到」" 

# monologue
# display as 雙鐵
# JP: ごく穏やかな笑顔から、あまりにスっと出てきた言葉。\n意味の重さとの距離感に、一瞬、意味がつかめなかった。
1051 = "「內參……」" 

# 【双鉄】
# JP: 「というと、仲国国務院の鉄道部内で……ですか。\n大変恐縮です。――というか、一体全体どういうわけで」
1716 = "她臉上帶著平和的笑容，自然地說出的話語，卻有著與此全然不同的分量，讓我一時沒能完全理解。" 

# 【姜】
# display as 雙鐵
# JP: 「日ノ本鉄道復権の可能性を大きく拡大した一連の事象の、\n中核を為すエピソードのひとつとして、です」
1276 = "「就是說，仲國國務院鐵道部的……內參嗎。敢問……不，請您務必說明一下」" 

# monologue
# display as 姜
# JP: 思わず稀咲の顔を見る。が、ご機嫌そうな顔のままだ。\nあるいは僕を待つ間に、すでに聞いた話なのかもしれん。
1014 = "「令日本鐵路復興的可能性大幅提升的一連串事件，其核心誘因之一」" 

# 【姜】
# JP: 「失礼ながら、弊鉄道部では日ノ本の鉄路は滅びる――\nとの観測が、圧倒的な大多数を占めていました」
1778 = "我不禁扭頭看了一眼稀咲。可她臉上仍是那副開心的樣子。說不定是在等我過來的工夫，已經提到過這個話題了吧。" 

# 【稀咲】
# display as 姜
# JP: 「ふふっ」
1533 = "「說來多有冒犯，在鐵道部內持有日本鐵路將會滅亡看法的，占據了壓倒性的多數」" 

# monologue
# display as 稀咲
# JP: 率直すぎる一言に、稀咲が微笑み、言葉を添える。\nお茶会の如き空気のままに……恐らく、仕事の話が始まる。
1180 = "「嘻嘻」" 

# 【稀咲】
# JP: 「失礼どころか、極めて常識的な観測だと思うよ。\n実際ボクもそれを前提として計画を立案し、動いていた」
1962 = "順著這直接的發言，稀咲微笑著接了下去。氣氛隨仍是茶會的感覺，但恐怕話題就要轉向工作了。" 

# 【姜】
# display as 稀咲
# JP: 「弊鉄道部も同様です。散逸しつつあった、日ノ本の\n鉄道関連の人材・技術の確保を行うべく動いていました」
1072 = "「冒犯說不上，倒不如說是有常識的人就會有的看法吧。實際上我也是以此為前提建立計劃並付諸行動的」" 

# 【双鉄】
# display as 姜
# JP: 「なるほど。そうだったのですね。\nそうした話は僕の方でもいくつか聞いていましたが――」
1595 = "「鐵道部也同樣如此。為掌握日漸流失的日本鐵路相關人才與技術而展開了行動」" 

# monologue
# display as 雙鐵
# JP: 日ノ本車輌の淵さんはじめ、仲国からの声かけを受けた\n一流どころの技術者ならば、複数の名前を把握している。
1091 = "「原來如此，確實有道理。這方面的情況我也有所耳聞——」" 

# 【双鉄】
# JP: 「国家的事業として動かれていたとまでは、\n想像もしていませんでした」
1788 = "據我所知，以日本車輛的淵先生為代表，有多名一流技術人員接到了仲國方面的聯繫。" 

# 【姜】
# display as 雙鐵
# JP: 「国家的事業かどうかはわかりません。あくまで、\n弊鉄道部がそのように動いていた、というだけの話です」
1486 = "「竟是以國家層面推進的行動，這點著實超出我的想像」" 

# 【稀咲】
# display as 姜
# JP: 「直接の命令は、姜女士の場合は鉄道部副部長からだよね。\nけど、副部長に誰が命令しているのかはわからない？」
1311 = "「我很難說是否是國家層面。但就鐵道部而言，確實是在這樣行動著」" 

# 【姜】
# display as 稀咲
# JP: 「その解釈で間違いありません。\nですので、国家的事業かどうかは判断できないのです」
1120 = "「向姜女士下達直接命令的，應該是鐵道部副部長吧。不過副部長是收到誰的指示就不清楚了，對吧？」" 

# monologue
# display as 姜
# JP: ……国務院鉄道部に命令を下せる者の数など限られようが、\nだからといって、断定できるわけでもないとは理解できる。
1419 = "「正如你所說。所以是否是國家層面我無法擅下斷言」" 

# 【双鉄】
# JP: 「なるほど。たしかに裏付けなく『国家的事情』とは\n断ぜませんね。軽率な憶測を失礼しました」
693 = "……能夠對國務院鐵道部下達指示的官員屈指可數，但僅憑這一點便做出結論也的確難以信服。" 

# 【姜】
# display as 雙鐵
# JP: 「いえ、こちらこそ確定的な情報をお渡しできず\n申し訳なく思います」
1452 = "「的確。並沒有足夠將其認定為“國家層面”的訊息。妄加揣測多有冒犯」" 

# monologue
# display as 姜
# JP: 姜さんは軽く目礼し、\nその目を再び柔らかに僕の目元にむける。
1134 = "「哪裡，我這邊本身也無法拿出充分確定的訊息，實屬抱歉」" 

# 【姜】
# JP: 「ともかくその人材確保計画は順調に動いており、\nしかし、実施の直前に中断を余儀なくされました」
1735 = "姜小姐以目光表達了歉意，而後恢復了平和的眼神看向我。" 

# monologue
# display as 姜
# JP: 長饅頭が口に運ばれ――恐らく甘味が好きなのだろう、\n眼鏡の奥の瞳が一瞬、純粋なよろこびの色にきらめく。
1004 = "「人才掌握計劃姑且還是順利進行著，然而，在臨門一腳的時候確被迫中斷了」" 

# 【姜】
# JP: 「内諾をいただいた技術者達が一転して続々と辞退を。\n理由を探ればすぐ、双鉄先生と御一夜鉄道に当りました」
1772 = "想必她對甜食是頗為喜愛吧——每把一塊長饅頭送入口中，在她眼鏡後的雙眸中，就會閃過純粹的喜悅之情。" 

# 【稀咲】
# display as 姜
# JP: 「日ノ本の鉄道産業復興の目が見えてきた。\nならば、やはり地元で働きたい……という感じかな？」
1278 = "「已經達成意向的技術人員紛紛轉變態度，婉拒了合作。我們調查其理由，很快便注意到了雙鐵先生和御一夜鐵路的存在」" 

# 【姜】
# display as 稀咲
# JP: 「辞退理由はほとんど全てがそれでした。ですので、\n弊鉄道局は短期方針の見直しをはじめることとしました」
1529 = "「見到了日本鐵路產業復興的希望。因而還是想要留在家鄉工作……這樣吧？」" 

# 【双鉄】
# display as 姜
# JP: 「短期方針――ということは、\n中～長期の方針はそのままに、ということとなりますか」
1354 = "「拒絕的理由大抵如此。因而，鐵道部便開始著手修正短期目標」" 

# 【姜】
# display as 雙鐵
# JP: 「はい。ご存知かもしれませんがその方針は、\n『大廃線後の鉄道産業の、世界No.1シェアの取得』です」
1464 = "「短期目標——那也就是說，中長期的目標仍保持原樣嗎」" 

# 【双鉄】
# display as 姜
# JP: 「なんとなくですが、\nそのような話は稀咲からも聞いていました」
1393 = "「是的。兩位或許也有所耳聞，那個目標就是，“取得大廢線後世界鐵路產業第一的市場佔有率”」" 

# monologue
# display as 雙鐵
# JP: 仲国は冥国をはっきりとライバル視している国だ。ゆえ、\n冥国のエアクラ推進への対立軸を立てようとしていると。
1563 = "「這個說法確實多少從稀咲那裡聽說過一點」" 

# 【姜】
# JP: 「日ノ本の鉄道が復活するなら、無理に取り込むより、\n技術交流を行い、その上で各々発展していけばいい」
1672 = "仲國是明確地將美國視為競爭對手的。因而，便站在了美國推進的空凝機的對立面。" 

# 【双鉄】
# display as 姜
# JP: 「！」
1214 = "「如果日本的鐵路得以復興，比起強行吞併，進行技術交流，各自進行發展更合適」" 

# monologue
# display as 雙鐵
# JP: 思わず全身が引き締まる。一国の鉄道部の方針転換――\nその裏にいくらかは、自分達も影響したらしいと知り。
1141 = "「唔！」" 

# 【姜】
# JP: 「現在の方針は概ねそのようなものとなり、\nその方針に沿って、私は先生達を訪ねてきました」
1775 = "我不由得繃緊了全身的神經。一個國家的鐵道部的目標更改——其背後竟是多少受到了我們的影響。" 

# 【稀咲】
# display as 姜
# JP: 「マイレールファンド事業の話を聞きたい。だったよね」
1447 = "「現在的目標大體就是變成這樣了，而我今天來拜訪雙鐵先生你們也正是基於這個目標」" 

# 【姜】
# display as 稀咲
# JP: 「ええ」
1401 = "「是要了解私有線路基金，對吧」" 

# monologue
# display as 姜
# JP: まったく変わらぬフレンドリーな口調の会話。\nけれども稀咲は、ビジネスモードに切り替わってる。
1398 = "「是的」" 

# 【稀咲】
# JP: 「詳しい話に入る前に、新しいお茶を淹れよう。\nまた温かいものでかまわないかな」
1760 = "對話的口氣仍然如剛才一樣友善。然而稀咲確已不著痕跡地切換到了工作模式。" 

# 【姜】
# display as 稀咲
# JP: 「ええ、熱いくらいのお茶をいただけましたら」
1598 = "「開始新話題之前，先重新泡一壺茶吧。還像剛才那樣溫度的可以嗎」" 

# 【稀咲】
# display as 姜
# JP: 「OK。\nなら今度は、ボクらの地元のお茶を味わってもらいたい」
1170 = "「嗯，方便的話還是那樣的熱茶吧」" 

# monologue
# display as 稀咲
# JP: 言って稀咲は茶器を変える。\n今度の急須と湯呑とは、どこにでもある和風のものだ。
1622 = "「ＯＫ。那這次就喝我們這邊當地產的茶吧」" 

# 【稀咲】
# JP: 「クマ茶っていって、\n双鉄の勤める御一夜鉄道――湯医線沿線の名産なのさ」
1868 = "稀咲說完便起身更換了茶具。這次的茶壺和茶碗，是我們平常見慣的日式茶具。" 

# 【双鉄】
# display as 稀咲
# JP: 「（ずずっ）……ああ、\nすっかりぬるくなってしまったな」
1566 = "「這是隈茶，是雙鐵就職的御一夜鐵路——湯醫線沿線的特產」" 

# 【姜】
# display as 雙鐵
# JP: 「そうでしたか、すみません、質問ばかりで。\n大変に興味深く聴き入ってしまいましたので」
1619 = "「（輕飲）……啊，已經涼掉了啊」" 

# 【双鉄】
# display as 姜
# JP: 「ご質問が的を射たものばかりでしたので、\nこちらとしても熱がはいってしまいました」
1391 = "「是嗎，抱歉，一口氣問了太多。又聽得入了神」" 

# monologue
# display as 雙鐵
# JP: 御一夜鉄道をめぐる現況をざっと説明するだけでも、\nかなりの時間が経ってしまった。
1300 = "「您的問題都是直中要害，我們也不由得興致高漲起來了」" 

# 【稀咲】
# JP: 「ああ、すぐ淹れなおすよ。姜女士のも。\nん……っと、はい、どうぞ」
1680 = "光是大略把御一夜鐵路各方面現狀說明一遍，就占用了頗多的時間。" 

# 【姜】
# display as 稀咲
# JP: 「やぁ、長饅頭のおかわりまで。\nすみません、ありがとうございます」
1159 = "「啊，我重新斟給你。姜女士也重新斟一杯吧。嗯……哦，好了，請用」" 

# monologue
# display as 姜
# JP: あらためてしみじみ味わうと、クマ茶も実にふくよかだ。\nいささか話し疲れた喉にじんわり染み入る。
1123 = "「呀，還添了長饅頭。這多不好意思，謝謝」" 

# 【姜】
# JP: 「なるほど。クマ茶はさらに、長饅頭と合いますね」
1923 = "說來，若是認真品味隈茶，便能感受到其甘潤。在談話疲憊時滋養喉嚨甚是受用。" 

# 【稀咲】
# display as 姜
# JP: 「ふふっ。\nボクも大好物だからね。気に入って貰えて嬉しいよ」
1088 = "「原來如此。還是隈茶和長饅頭的相性更好呀」" 

# monologue
# display as 稀咲
# JP: いって稀咲もむしゃりといくゆえ、僕も倣う。\n心地よく疲労している脳に甘味が浸透していく。
1179 = "「嘻嘻。我也很喜歡這樣搭配，你也喜歡我真是太高興了」" 

# 【姜】
# JP: 「しかし……そうですか。マイレールファンド事業は、\nすでに稀咲女士の手を離れたのですか」
1869 = "稀咲說完就往嘴裡送了一塊長饅頭，我也有樣學樣。甘甜瞬間浸潤心脾，連大腦的疲乏都消減了幾分。" 

# 【稀咲】
# display as 姜
# JP: 「だね。ここからは事業の成熟と安定をはかる時期。\nその方向では、ボクはあまり適任者じゃない」
993 = "「不過……竟然是這樣。私有線路基金業務，已經不再是稀咲女士經手了呀」" 

# monologue
# display as 稀咲
# JP: 甘味の話題が、いきなり本題に引き戻される。\nこうしたペースに、ふたりとも慣れきっているようだ。
1433 = "「沒錯。目前這一業務正處於成熟化與穩定化的階段。而這一方向的話，我不太能算是適合的人選」" 

# 【稀咲】
# JP: 「だから隈銀と御一夜鉄道の共同出資で設立した新法人に、\n関連全事業を請け負ってもらうことにしたんだ」
1921 = "話題又從甜點急轉回了正題。而這樣的節奏，兩人似乎都早已習慣。" 

# monologue
# display as 稀咲
# JP: 共同出資な上、新法人を実質的に仕切っているのは元忠氏。\n任せておいて、全く何の心配もない。
1338 = "「所以相關的所有業務，都已經移交給隈銀和御一夜鐵路合資成立的新法人了」" 

# 【姜】
# JP: 「では、今は稀咲女士と右田先生は、\n各々ご本業のみに注力されていることとなりますか？」
1708 = "在合資之上，新法人實質上的負責人是元忠先生。事情交到他手上，就可謂是高枕無憂了。" 

# 【稀咲】
# display as 姜
# JP: 「一時的にそうなっているね。\nとはいえ、新事業を常に模索してもいるよ」
1336 = "「所以目前稀咲女士和右田先生，都是專注於各自的主業嗎？」" 

# 【姜】
# display as 稀咲
# JP: 「新事業！」
1408 = "「暫時是這樣的了。不過也絲毫沒有放棄對新業務的探索哦」" 

# monologue
# display as 姜
# JP: 芝居がかった口ぶりだけれど、メガネの奥の目は真剣だ。
1363 = "「新業務！」" 

# 【姜】
# JP: 「大変興味深いお話です。もしお伺いできる範囲のことが\nあれば、ぜひお伺いしたいのですが」
1959 = "雖然語氣上感覺有點刻意，但眼鏡後透出的目光卻格外認真。" 

# 【稀咲】
# display as 姜
# JP: 「残念ながら、まだ全く、だね。\n良くいえば、情報収集の最中……という感じでもあるし」
1562 = "「這個話題可不容錯過。若是方便的話，請務必透露一二」" 

# monologue
# display as 稀咲
# JP: 稀咲がちら、と僕を見る。\nならばと言葉の続きを引き取る。
1288 = "「很遺憾，暫時還完全沒有頭緒。真要說的話，還處於收集訊息的階段……這個樣子吧」" 

# 【双鉄】
# JP: 「充電期間であるともいえるが――\n悪く言うなら、僕も稀咲も気を抜いてる時期ともいえる」
1879 = "稀咲邊說邊瞄了我一眼。我便心領神會地接下了這個話題。" 

# 【稀咲】
# display as 雙鐵
# JP: 「マイレールファンドは実に手のかかる子だった。\nそれが順調に発展して手を離れた分……さすがに、ね」
1328 = "「或許應該稱之為充電期吧——反之，說我和稀咲最近有些鬆懈也不為過」" 

# monologue
# display as 稀咲
# JP: 嬉しくもあり、安堵もあり、寂しくもある。\nすぐに次をとの思いはあれど、引き継ぐべきも数多ある。
1469 = "「私有線路基金確實是讓人不省心。而當它走上正軌自己可以放手不管時……那感覺，是吧」" 

# 【双鉄】
# JP: 「新法人は、いわゆるコンサルタント業も手掛けます。\nすでに、日ノ本各所からの受注で大賑わいの状況です」
1798 = "有高興，有安心，也有一絲寂寞。想要馬上翻篇的想法當然是有的，但放不下的地方也不少。" 

# 【姜】
# display as 雙鐵
# JP: 「線路管理と列車運用を別々に行う。いわゆる上下分離の\n発展型ともいえるのが、マイレールファンドですよね？」
1367 = "「新法人也開展了顧問業務。而且已經接到了日本各地的頗多訂單，可謂門庭若市」" 

# 【稀咲】
# display as 姜
# JP: 「そう解釈して貰えると嬉しいよ。線路所有権を証券化し、\n利益を配当する金融商品。であるといっても現状は――」
1267 = "「將線路管理和列車的使用進行拆分，換言之就是上下分離的發展方式。私有線路基金的要點就在於此吧？」" 

# 【双鉄】
# display as 稀咲
# JP: 「実際に利益を配当できているケースは、まだまだ少ない。\n現時点では、支援のための出資の色合いが濃厚ですので」
1513 = "「能這樣理解我很高興。本意是把線路的所有權證券化進行利益分配的金融商品，但現狀還——」" 

# 【姜】
# display as 雙鐵
# JP: 「なるほど、そうした性質が色濃いからこそ、\nあえてのコンサルタント形式とするわけですか」
1261 = "「實際進行了利益分配的還只是極少數。目前為支撐業務而融資的色彩還是比較濃重的」" 

# 【稀咲】
# display as 姜
# JP: 「ふふっ、ご明察」
1090 = "「原來如此，正因為其有著比較濃重的融資色彩，才以顧問的形式進行推進啊」" 

# monologue
# display as 稀咲
# JP: いや、打てば響く。１を聞いて１０を知るとはこのことか。\nさすがは稀咲の知己だなと、つくづく感心させられる。
1185 = "「嘻嘻，慧眼如炬啊」" 

# 【稀咲】
# JP: 「例えば[なごてつ,2]名護鉄沿線の方々は『名護鉄』そのものを\n応援したい。名も知らぬ法人の事業を、ではなくて」
1938 = "這可真是有呼有應，觸類旁通。我不禁越來越覺得，她真不愧是稀咲的知己。" 

# 【双鉄】
# display as 稀咲
# JP: 「加え、線路運用の事情が各事業者ごとに千差万別すぎ、\n一般化がとても難しかったということもありました」
1427 = "「比方說名古屋鐵路沿線的人，比起不熟悉不出名的企業，更願意支持名古屋鐵路的情況」" 

# 【姜】
# display as 雙鐵
# JP: 「なるほどなるほど。では逆に言えば、\n日ノ本鉄路さんのコンサルティングで学べるノウハウは」
1078 = "「加之，線路的運營情況因從業者不同而千差萬別，想找出一般解更是極其困難」" 

# 【稀咲】
# display as 姜
# JP: 「だね。かなり適用できる範囲の広いものと自負している。\nどのような線路運用を行う、どのような国においても」
1089 = "「原來如此原來如此。那反言之，在提供顧問服務過程中從日本各處的鐵路從業者處得到的經驗」" 

# 【双鉄】
# display as 稀咲
# JP: 「！」
1434 = "「沒錯。相信可以使其適用到更大的範圍——可以在各式各樣的線路上套用，即便是不同國家亦可參考」" 

# monologue
# display as 雙鐵
# JP: 世間話と仕事の話が切れ目なく流れるそのうちに、\nなるほど、ここにたどり着くのか。
1153 = "「啊！」" 

# 【姜】
# JP: 「実は弊部においても、マイレールファンドに興味をもつ\n鉄道事業者、複数からの問い合わせをうけています」
1958 = "隨著閒聊和工作話題反覆無縫切換，終於步步逼近了主題。" 

# 【稀咲】
# display as 姜
# JP: 「ん？　複数の鉄道事業者って……国鉄以外にもあるんだ。\n仲国にも……いわゆる民鉄、私鉄的なものが」
1068 = "「其實鐵道部也接到了一些對私有線路基金有興趣的鐵路從業人員的諮詢」" 

# 【姜】
# display as 稀咲
# JP: 「ええ。非・国鉄の鉄道事業者も意外と沢山ありますよ。\n市等が主体の都市鉄道も。鉱山・森林等の産業鉄道も」
1176 = "「嗯？一些鐵路從業人員……仲國原來也有國營鐵路以外的……也就是民營鐵路或是私營鐵路之類」" 

# 【双鉄】
# display as 姜
# JP: 「なるほど。産業鉄道も国営なのかと思い込んでいました。\n考えてみれば、他分野でも民営企業も盛んですものね」
1395 = "「是的。國營鐵路以外的鐵路從業人員其實還不少。比如各地市的城市鐵路，以及礦山、林場等的專用鐵路等」" 

# 【姜】
# display as 雙鐵
# JP: 「残念ながら民営鉄道は盛ん、というほどではありません。\nしかし、その分それぞれ独自の魅力を有しています」
1086 = "「原來如此。我還以為那些專用鐵路也是歸在國營範圍內呢。這麼一想的話，其他領域的民營企業也是百花齊放啊」" 

# 【双鉄】
# display as 姜
# JP: 「ほう」
1289 = "「很遺憾，民營鐵路遠達不到百花齊放的程度。不過，正因其數量不多，而有著各自獨特的魅力」" 

# monologue
# display as 雙鐵
# JP: 瞬間、ふっと姜さんの雰囲気がやわらぐ。
1129 = "「哦」" 

# 【姜】
# JP: 「双鉄先生、ご興味がおありでしたらいかがでしょう。\n弊部がお招きいたしますので、稀咲女士との仲国視察は」
1741 = "姜小姐的態度突然柔和了下來。" 

# 【双鉄】
# display as 姜
# JP: 「お招き……ご招待ですか。お話はありがたく思いますが、\nお招きいただいて、一体何を視察すればいいのかも」
1608 = "「雙鐵先生，若是您有興趣的話，鐵道部可以接待兩位來仲國進行考察」" 

# 【姜】
# display as 雙鐵
# JP: 「さきほど稀咲女士が、『新事業案』と仰られました。\nそのヒントに繋がる何かをご視察で見つけて頂ければと」
1357 = "「接待……邀請我們嗎。能得到您的邀請我十分感激，但邀請我們是要進行怎樣的考察呢？」" 

# 【稀咲】
# display as 姜
# JP: 「ボクたちにとっては、\nとてもありがたいお話に聞こえるけれども」
1075 = "「剛剛稀咲女士提起過“新業務”。或許在考察中能找到一些契機」" 

# monologue
# display as 稀咲
# JP: 稀咲がすっと話を引き取る。
1565 = "「這對我們而言，真可謂是感激不盡了」" 

# 【稀咲】
# JP: 「かかるお招きにボク達が応じた場合、国務院鉄道部が\n期待するメリットは、一体何になるのかな」
1850 = "稀咲不著痕跡地接過了話題。" 

# 【姜】
# display as 稀咲
# JP: 「ひとまずは、みっつ」
1515 = "「若是我們接受了邀請，不知國務院鐵道部對此行又抱有怎樣的收益預期呢？」" 

# monologue
# display as 姜
# JP: 言いながら、姜さんは少し丸っこい指を折っていく。
1204 = "「大體來說，有三點」" 

# 【姜】
# JP: 「第一。マイレールファンド事業、ならびに関わる\nコンサルティングについてのレクチャーを頂きたい」
1743 = "姜小姐邊說邊輕握手指比起了數字。" 

# 【稀咲】
# display as 姜
# JP: 「マイレールファンドに興味を持ってもらえることも\n嬉しいよ。ありがとう。なら、２つ目は？」
1492 = "「第一，希望能開辦關於私有線路基金業務，以及相關顧問服務的講座」" 

# 【姜】
# display as 稀咲
# JP: 「新事業案の共有。それが仲国でも展開可能なもので\nあるなら、なんらかの方法での共同展開を検討頂きたい」
1511 = "「能對我們的私有線路基金抱有這樣的興趣，我真的很高興。非常感謝。那第二呢？」" 

# 【双鉄】
# display as 姜
# JP: 「その点は……まだ本当に何のアイディアもない状態です。\nご期待に添えるとは限りませんが――」
1055 = "「共向新業務方案。若是有可能在仲國開展的業務的話，進一步探討合作推進的方法」" 

# 【姜】
# display as 雙鐵
# JP: 「そこも含めて期待するのが、三点目となります」
1561 = "「這一點……現在還處於完全沒有任何頭緒的狀態。難保不會辜負您的期待——」" 

# monologue
# display as 姜
# JP: 姜さんは、もったいぶるように間をおいて、\n稀咲を見てから、僕を見る。
1081 = "「包含這些在內的期待，就是第三了」" 

# 【姜】
# JP: 「つまり、双鉄先生、稀咲女士との関係の強化です。\n新事業案が纏まるのが仮に、ご視察の[のち]後になった場合も」
1745 = "姜小姐鄭重地停頓了一下，而後目光依次投向了稀咲和我。" 

# 【稀咲】
# display as 姜
# JP: 「なるほど。共同展開の検討を、ボクらから鉄道部──\n姜女士へともちかけられる環境を用意してもらえる、と」
1002 = "「也就是加深和雙鐵先生，稀咲女士你們的關係。例如在視察中未能成型，而在其後整利歸納出新業務方案的情況」" 

# 【姜】
# display as 稀咲
# JP: 「ぜひそのようにご理解下さい。\n当然ながら、何をご確約いただく必要もありません」
1084 = "「原來如此。也就是建立一個由我們向鐵道部——向姜女士提出合作推進的環境，對吧？」" 

# 【稀咲】
# display as 姜
# JP: 「ふぅん。大変興味深いお話とボクはお伺いしたけれど\n――双鉄、キミはどう思う？」
1521 = "「若能如此理解再好不過。當然，對此我們並不要求任何明確的約定」" 

# monologue
# display as 稀咲
# JP: 姜さんは稀咲の客で、この席での僕は稀咲の夫にすぎん。\n決定権は稀咲にあるゆえ、思うところを述べればよかろう。
1192 = "「嚯。我覺得相當感興趣哎——雙鐵，你怎麼看？」" 

# 【双鉄】
# JP: 「僕も同じくだ。興味深くありがたいお誘いだと感じる。\n……もし視察にお伺いするとしたら、時期はいつごろに」
1737 = "姜小姐是稀咲的客人，而我在這個場合不過是稀咲的丈夫。既然決定權在稀咲，那我應該直說無妨。" 

# 【姜】
# display as 雙鐵
# JP: 「先生達のご都合のよいとき、いつであろうと。\nそれこそ春節の真っ只中であろうとご案内いたします」
1308 = "「我也深有同感。我對這邀請頗有興趣也深表感激。若是接受的話，不知考察會安排在什麼時間呢？」" 

# 【稀咲】
# display as 姜
# JP: 「！？　春節中はさすがに」
1118 = "「只要二位方便，我們隨時歡迎。即便趕上春節期間也可以接待」" 

# monologue
# display as 稀咲
# JP: 稀咲が驚いた顔をする。春節――旧正月は確か、\n仲国で一番のお祭りの時期と聞き及ぶが……
1573 = "「這！？春節期間還是不太好吧」" 

# 【稀咲】
# JP: 「姜さんも春節中くらいは休んだ方がいい。\nプライベートの時間を楽しむことも、大切な仕事だ」
1886 = "稀咲頗為驚訝。春節——即舊曆新年，聽說是仲國最重要的節假日……" 

# 【姜】
# display as 稀咲
# JP: 「はい。ですのでその場合には、私人として、\n友人夫妻をプライベートで案内させていただこうかと」
1237 = "「姜小姐春節還是好好休假吧。充分享受個人時間也是很重要的工作」" 

# 【稀咲】
# display as 姜
# JP: 「あぁ……そこまで言ってもらえてとても嬉しいよ。\nありがとう、本当に」
1397 = "「是的。所以真在那時的話，就以個人身份，按招待朋友夫婦的方式來安排吧」" 

# monologue
# display as 稀咲
# JP: ――なるほど、春節は完全な休暇期間であるわけか。\nさすがにそこに実際お伺いするわけにもいくまいが……
1145 = "「啊……你能這樣說我好高興。謝謝，真心感謝」" 

# monologue
# JP: （友人、なのだな、本当に。仕事関係だけにとどまらぬ、\nなにかこう、稀咲の、対等な友人……）
684 = "——原來如此，春節是徹底的假期啊。看來無論如何也不該選在那個時間吧……" 

# 【稀咲】
# JP: 「それならまずは、スケジュールを確認させてもらいたい。\n確認の上、仮に視察にお伺いできそうな候補日があれば」
1977 = "（朋友，這麼一說，還真是。不僅限於工作上的關係的，能和稀咲平等相待的朋友……）" 

# monologue
# display as 稀咲
# JP: 稀咲が僕へと視線をむける。\n気にかかるような点も無いので、言葉を引き継ぐ。
1570 = "「這樣的話，還請讓我們先確認一下日程。若是能找到可以去考察的日期的話」" 

# 【双鉄】
# JP: 「候補日をお渡しし、そちらでの具体的なご検討を頂く\n――といった形でいかがでしょうか？」
1874 = "稀咲轉頭看向了我。在我看來她並沒有特別強調什麼的樣子，我便把話接了過來。" 

# 【稀咲】
# display as 雙鐵
# JP: 「姜女士がＯＫだったら、ボクはそれで」
1345 = "「把日期發過去，而後由您那邊安排——這樣操作不知如何？」" 

# 【姜】
# display as 稀咲
# JP: 「ではそのように承りました。\n候補日をいただけますことを、楽しみにしています」
1233 = "「姜女士同意的話，我也沒問題」" 

# 【稀咲】
# display as 姜
# JP: 「日ノ本滞在はあと何日だっけ？」
1584 = "「那就這樣定下吧。那就等兩位先確認好日期吧」" 

# 【姜】
# display as 稀咲
# JP: 「本日を除いて２日ですね。あさっての夜の便で、\n副丘から北琴に戻る予定です」
1021 = "「你在日本的行程還有幾天來著？」" 

# 【稀咲】
# display as 姜
# JP: 「なるほど、なら、滞在中にお渡しする方向で頑張るよ。\nちなみに、今日このあとの予定は？」
1601 = "「除今天還有兩天。準備乘後天晚上的航班從福岡返回北琴」" 

# 【姜】
# display as 稀咲
# JP: 「旅館に帰り、報告書をまとめて送信するだけですね。\n旅館は古い温泉旅館ですので、お風呂だけが楽しみです」
1568 = "「這樣啊，那我們儘量在你回國前定下來給你。順便，今天接下來還有其他安排嗎？」" 

# 【稀咲】
# display as 姜
# JP: 「なら、さ。もしもよかったら」
1194 = "「回旅館整利發送報告，沒有其他了。這次住的是很有歷史的溫泉旅館，很期待啊」" 

# monologue
# display as 稀咲
# JP: 稀咲が一瞬僕を見るゆえ、さりげなく頷く。\nどういう意図であるにせよ、稀咲のしたいようしてほしい。
1589 = "「那，我說，不介意的話」" 

# 【稀咲】
# JP: 「晩ごはん、一緒にどうかな。御一夜の名店だと、地鶏、\n鰻あたりがおすすめだし――」
1906 = "見稀咲瞄了我一眼，我便向她點了點頭。不管她在盤算什麼，都由著她去安排便好。" 

# 【姜】
# display as 稀咲
# JP: 「“地鶏農園”ですね！　以前お招きいただいたことを、\nとてもうれしく、そして美味しく記憶しています」
981 = "「一起吃個晚餐吧。那家御一夜名店的土雞和鰻魚都是推薦菜——」" 

# 【稀咲】
# display as 姜
# JP: 「じゃ、あそこが第一候補。他の候補としては――\nそうだね、日ノ本の家庭料理を振る舞うこともできる」
1383 = "「是“土雞農場”吧！以前去吃過，吃得很開心，那美味我現在都還記得」" 

# 【姜】
# display as 稀咲
# JP: 「振る舞う！」
1582 = "「那就列為第一備選。其他的備選——我想想，做些日式家庭料理應該也可以」" 

# monologue
# display as 姜
# JP: びっくりするほどの反応だ。\nメガネの奥の目がキラキラと、輝いているようにも見える。
1258 = "「家庭料理！」" 

# 【姜】
# JP: 「でしたら――もしや――勘違いだったら恐縮ですが、\n稀咲女士の手料理を、というお誘いでしょうか？」
1937 = "這反應倒讓我們大吃一驚。她眼中彷彿閃爍著光芒，透過眼鏡映入我們眼中。" 

# 【稀咲】
# display as 姜
# JP: 「うん。まぁね。僕も結婚したわけだから、多少の料理は\n――付け焼き刃だけどさ、身につけたりして」
1569 = "「這樣的話——如果——我沒有理解錯的話，是在邀請我品嘗稀咲女士親手烹飪的菜餚嗎？」" 

# monologue
# display as 稀咲
# JP: 付け焼き刃は事実かもしれんが、『多少』は全く謙遜だ。\n稀咲はとにかく努力家で、その上実に、舌がいい。
1172 = "「嗯，算是吧。我好歹也已經結婚了，做菜的話——臨時抱佛腳，稍微學會了一些」" 

# monologue
# JP: （なるほどなぁ。なにかご馳走を仕込んでいるなと\n思っていたが……姜さんにふるまうためであったか）
1900 = "臨時抱佛腳或許不假，但“稍微”就完全是在謙虛了。稀咲不光非常努力，她舌尖的天賦也著實不錯。" 

# 【姜】
# JP: 「ああ、なんと嬉しいお誘いでしょう！　ぜひ、ぜひに！\nお招きのお礼に、自分用の紹興酒を持っていきます」
1970 = "（原來如此。我就看她事前準備了菜品……原來是為了招待姜小姐啊）" 

# 【稀咲】
# display as 姜
# JP: 「ふふっ、相変わらず呑むんだねぇ。\n自分用ってことは――仲国からの持ち込み？」
1161 = "「啊，承蒙邀請，我真是太開心了！哪有拒絕的道理呀！作為回禮，我帶自備的紹興酒過來吧」" 

# 【姜】
# display as 稀咲
# JP: 「ええ、一番お気に入りのヤツです。\n日ノ本では買えないものかと」
1128 = "「哈哈，還是老樣子無酒不開心啊。你說自備——也就是從仲國帶來的囉？」" 

# 【稀咲】
# display as 姜
# JP: 「それはそれは楽しみだ。ああ、念の為。\nアレルギーとか好き嫌いがあれば聞いておきたい」
1390 = "「是呀，是我最喜歡的。怕在日本買不到，就自帶了」" 

# 【姜】
# display as 稀咲
# JP: 「なんでも食べますよ。アレルギーもありません。\nですから、もしも図々しいお願いをしてもよければ」
1571 = "「這真是這真是太讓人期待了。哦，對了，姑且先確認一下有沒有忌口和不喜歡的東西」" 

# 【稀咲】
# display as 姜
# JP: 「なに？　何でも言って？」
1305 = "「我不挑食的，也沒什麼忌口。所以如果不介意的話」" 

# 【姜】
# display as 稀咲
# JP: 「稀咲女士の一番の得意料理を。やはりピザですか？\n私はそれを、ぜひともご馳走になってみたいです」
1007 = "「什麼？別客氣儘管說唄」" 

# 【稀咲】
# display as 姜
# JP: 「ピザか。ピザも焼くよ。結構得意な方だと思う。けど、\n一番の得意となると……姜さん、食べたことあるかなぁ」
1480 = "「稀咲女士最拿手的，果然還是披薩嗎？請務必賞臉讓我嘗一嘗」" 

# monologue
# display as 稀咲
# JP: 稀咲は少し、困ったような照れくさそうな笑みを浮かべる。
1347 = "「披薩啊……披薩也會烤的，也算我挺拿手的吧。不過，要說最拿手的……就不知道姜小姐吃過沒有了」" 

# 【稀咲】
# JP: 「ヒジキって、とっても地味なお惣菜なんだけど」
1885 = "稀咲露出了似有一絲為難，又略帶羞澀的笑容。" 

# 【稀咲】
# display as 稀咲
# JP: 「あぁ」
1064 = "「其實是羊栖菜，很普通的小菜」" 

# monologue
# display as 稀咲
# JP: 姜さんを旅館に送り、帰宅して。\n並んで眠れば稀咲は実に、満ち足りたような声を出す。
1150 = "「啊」" 

# 【稀咲】
# JP: 「――とてもにぎやかな食卓になったね。\n右田の家での食事会にして、本当によかった」
1780 = "我們把姜小姐送回了旅館，而後回到家中。躺在我身邊的稀咲的聲音透著一股滿足的感覺。" 

# 【双鉄】
# display as 稀咲
# JP: 「だなぁ」
700 = "「——這頓飯吃得好熱鬧呀。把地點選在右田家真是選對了」" 

# monologue
# display as 雙鐵
# JP: 稀咲のアパート、右田の家。今の僕らは、\n二箇所をともに、使い分けながら生活している。
1388 = "「是呀」" 

# 【双鉄】
# JP: 「姜さんはたいへんに社交的なのだな。\nてっきり三人だけでの食事を選ぶものかと思ったが」
1859 = "稀咲的公寓，右田家。如今我們兩個兩邊都有在住，視乎情況而定。" 

# 【稀咲】
# display as 雙鐵
# JP: 「もしも手料理になるのなら、姜さんのことだからね。\n右田でパーティの方が喜んでもらえそうって思ってた」
1236 = "「姜小姐待人接物確實了得。我還以為你會安排只有我們三個人用餐呢」" 

# 【双鉄】
# display as 稀咲
# JP: 「真闇姉たちにも予め話を通してあったようだったしな」
1371 = "「既然是親手做的話，考慮到姜小姐的性格，我就覺得在右田家這樣像聚會的感覺她會更喜歡」" 

# 【稀咲】
# display as 雙鐵
# JP: 「まぁね。姜さんがお店での食事を選んでも、\n仕込んだ料理を無駄にしちゃったらもったいないし」
1019 = "「你也事先跟真闇姐她們打過招呼了吧」" 

# 【双鉄】
# display as 稀咲
# JP: 「素晴らしいな。あらゆる可能性を考慮し、\nどう運んでも無駄のないように手配してあったわけか」
1498 = "「算是吧。就算姜小姐選了去店裡吃，準備的菜也不至於浪費嘛，不然不是太可惜了」" 

# 【稀咲】
# display as 雙鐵
# JP: 「この程度は普通のことだと思うけど？」
1034 = "「做得很不錯。考慮到各種可能性，做好了無論怎樣執行都可以充分利用的準備啊」" 

# monologue
# display as 稀咲
# JP: 特に気負いも感じぬ言葉。それだけに、\n稀咲の普通の基準の高さを、今更ながらに痛感する。
1323 = "「我覺得這種程度也就算普通吧？」" 

# 【双鉄】
# JP: 「そこを普通とできるのならば、日ノ本は、\n世界一の経済大国として覇権を得ているだろうさ」
1882 = "稀咲隨口應道。由此我越來越深感，稀咲的所謂“普通”其標準之高。" 

# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ、ありがとう。双鉄に褒めて貰えると嬉しい。\nけど――そうだね。だからボクらは相性がいいのかも」
1024 = "「你這要是算普通的話，日本恐怕早就建立世界第一經濟大國的霸權了」" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1188 = "「嘻嘻，謝謝。聽到雙鐵表揚我好高興。不過——也對。所以才說我們兩個相性好呀」" 

# monologue
# display as 雙鐵
# JP: それだけで多分伝わってきた。\nなるほど、これが相性の良さか。
# 1150 = "「啊」" 

# 【双鉄】
# JP: 「僕からみれば、稀咲は計画、準備あたりに、\n抜群の能力を発揮しているように思える」
1663 = "不過幾句話便已基本理解了彼此的意思。確實，所謂相性好就是這麼回事吧。" 

# 【稀咲】
# display as 雙鐵
# JP: 「だね。逆にボクから見れば、双鉄はその辺に抜けもある。\nけどそれだけに、発想力や現場における柔軟さに優れる」
1016 = "「以我看來，稀咲的計劃和準備，都表現出了超凡的能力」" 

# 【双鉄】
# display as 稀咲
# JP: 「柔軟さか。\nふふっ、素晴らしい言葉で褒めていただけ光栄だ」
1386 = "「是吧。反之，在我看來，雙鐵在這方面就有所不足。不過相應的，想像力和臨場應變的彈性更勝一籌」" 

# monologue
# display as 雙鐵
# JP: 言い換えるなら、準備不足のリカバリーを、\nどうにかこうにか応急処置でこなしているにすぎないが。
1285 = "「彈性啊。哈哈，被你這樣表揚我好高興」" 

# 【双鉄】
# JP: 「しかし、その柔軟さも、姜さんの振る舞いを見ると、\nまったく僕などまだまだまだと思えるよ」
1685 = "其實換個說法，就是對於準備不足的情況，想盡辦法進行應急處置最後順利過關而已。" 

# 【稀咲】
# display as 雙鐵
# JP: 「対人関係のみに絞れば、そうかもね。\nなにせ仲国国務院鉄道部の副部長秘書だ」
996 = "「不過，這所謂彈性，在見識過姜小姐的表現以後，真是自慚形穢，差得太遠了」" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1038 = "「僅就待人能力而言的話，或許確實如此。畢竟人家是仲國國務院鐵道部副部長秘書」" 

# monologue
# display as 雙鐵
# JP: 日ノ本であるなら国土交通省鉄道局副局長秘書。\n超高級官僚の秘書ということになるのだろうか。
# 1150 = "「啊」" 

# 【双鉄】
# JP: 「それは確かに、対人関係のスキルセットの\n最上級のものを取り揃えねば、とても務まらなさそうだ」
1759 = "對應到日本就是國土交通省鐵道局副局長秘書。簡單說就是超級高官的秘書。" 

# 【稀咲】
# display as 雙鐵
# JP: 「その基礎となる天性も、だよね。\n姜さんを苦手だという人に、ボクは出会ったことがない」
1466 = "「確實，若不是掌握著最頂尖的待人能力的話，想必是難以勝任的」" 

# 【双鉄】
# display as 稀咲
# JP: 「だろうなぁ」
1506 = "「而天性作為其基礎，也得是相當出眾。讓姜小姐手足無措的人，我還從來沒有見過」" 

# monologue
# display as 雙鐵
# JP: 実際今日の会食でもその振る舞いは完璧だった。\nどの料理にも興味津々、食事も会話も楽しみきっていた。
1312 = "「我想也是」" 

# 【双鉄】
# JP: 「ひじきをおかわりしてくれたのは嬉しかったな。他に\n幾らもご馳走があるのに、一番気に入ったようだった」
1756 = "實際上，她在晚餐全程的表現都無可挑剔。對每道菜都表現出了足夠的興趣，和大家的氣氛也很融洽。" 

# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ。無理をさせてなかったならいいけど。そこは\n事前におすすめしちゃったボクにあわせてくれたのかも」
1459 = "「真高興她還額外添了些羊栖菜。其他的菜還有好幾道，但她好像還是最喜歡那一道」" 

# 【双鉄】
# display as 稀咲
# JP: 「とてもそうは見えなかった。というか、\n無理をしてあの量を食べられるものでもなかろう」
1183 = "「嘻嘻，希望她沒有勉強自己。講不定是因為聽我說那是最拿手的菜而特意配合呢」" 

# 【稀咲】
# display as 雙鐵
# JP: 「健啖家だからね、彼女は。呑む方も凄いし。\n食べすぎたと恐縮しているのも可愛らしかった」
1456 = "「看起來實在不像。不過話說回來，勉強吃下那麼多不太可能吧」" 

# 【双鉄】
# display as 稀咲
# JP: 「だなぁ」
1212 = "「她吃起來可豪放著呢。喝酒也很豪爽。擔心自己是不是吃太多的樣子真是太可愛了」" 

# monologue
# display as 雙鐵
# JP: こらえきれずにあのハチロクが、\n吹き出してしまうほどだった。
1003 = "「也是」" 

# 【双鉄】
# JP: 「ハチロクも随分懐いていたな。\nハチロクとて、対外的な社交術は見事なものだが――」
1762 = "就連一向沉穩的八六都沒能沉住氣。" 

# monologue
# display as 雙鐵
# JP: お客様をお迎えするにふさわしい立居振舞。\nそれが完璧に維持されていたのは、ほんの30分ほどだ。
1052 = "「八六也許久沒這樣過了啊。按說八六對外的社交能力也是相當了得的——」" 

# 【双鉄】
# JP: 「……うむ。今日のアレは、実に珍しかった。\n初対面にもかかわらず、身内のようにはしゃいでいた」
1764 = "待客水準的舉手投足——然而這樣的完美形象，也不過維持了短短３０分鐘而已。" 

# 【稀咲】
# display as 雙鐵
# JP: 「日々姫もだよね。あの子の隠れ人見知りは相当だけど、\n今日は完全にリラックスして楽しんでくれていた」
714 = "「……嗯。今天那個樣子真的是很少見。明明是初次見面，卻像多年老友一樣談笑風生」" 

# 【双鉄】
# display as 稀咲
# JP: 「！？　日々姫と姜さんも初対面だったのか？\nてっきり以前に、稀咲を通じて知り合っていたものと」
1382 = "「日日姬也是啊。那孩子其實內心裡很怕生的，但今天卻放鬆的很，完全樂在其中」" 

# 【稀咲】
# display as 雙鐵
# JP: 「ううん、完全に初対面。だから会食の前に、\n自己紹介の時間を設けたんじゃないか」
1124 = "「咦！？日日姬喝姜小姐也是初次見面嗎？我還以為你已經介紹他們認識過了呢」" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ……あれは真闇姉とハチロクのためのものかと\n思いこんでしまっていた」
987 = "「不是哦，就是初次見面。所以開席之前才安排了自我介紹的時間嘛」" 

# monologue
# display as 雙鐵
# JP: 日々姫とも初対面だったと知り、\nさらにそのコミュニケーション能力の高さに恐れ入る。
1149 = "「啊……我還當那是給真闇姐和八六準備的呢」" 

# 【双鉄】
# JP: 「すごいな。さすがは稀咲の友人だ、という気がするよ」
1810 = "知道日日姬也是初次見面之後，越來越對姜小姐的待人能力嘆為觀止。" 

# 【稀咲】
# display as 雙鐵
# JP: 「友人」
1522 = "「著實了得。真讓人有種“稀咲的朋友就該是這樣嘛”的感覺」" 

# monologue
# display as 稀咲
# JP: 驚いた――意表をつかれたかのような声。\n僕の方が、かえってびっくりしてしまう。
1410 = "「朋友」" 

# 【双鉄】
# JP: 「違うのか？　稀咲の……お互いの接し方からして、\n完全にそのような関係だと思いこんでしまっていたが」
1713 = "她的聲音裡透出了些許驚訝的感覺。而這反而讓我吃了一驚。" 

# 【稀咲】
# display as 雙鐵
# JP: 「友人……になれているのかな。\nもしもそうなら、光栄で嬉しいことだと思うけど……」
1609 = "「難道不是嗎？稀咲你和她互動的感覺……我覺得怎麼看都是朋友關係吧」" 

# monologue
# display as 稀咲
# JP: 稀咲がなにか考え込んでる。\n思考の邪魔をしないよう、続く言葉をじっと待つ。
1496 = "「算是……成為朋友了嗎？可以算的話我倒是覺得很光榮就是了……」" 

# 【稀咲】
# JP: 「……姜女士は、ボクにとっては先生なんだ。\n向こうはそんなつもりはないかもとも思うけど」
1853 = "稀咲似乎在思索著什麼。我不想擾亂她的思緒，便靜靜地等她再次開口。" 

# 【双鉄】
# display as 稀咲
# JP: 「先生か。年齢的にそれほど上とは見えないが」
718 = "「……姜女士於我而言，應該算是老師了。雖然她自己並沒有這麼覺得就是了」" 

# 【稀咲】
# display as 雙鐵
# JP: 「うん。10才も違わない。けれどキャリアが――\n姜さんを紹介してくれたのは、父なんだ」
1504 = "「老師嗎……實在看不出啊，她的年齡已經那麼大了嗎」" 

# monologue
# display as 稀咲
# JP: 懐かしそうな、あたたかな声。\n聞いた途端、話の続きに、さらなる興味を掻き立てられる。
1430 = "「沒有。大我不到十歲而已。但她的履歷——實際上，是家父介紹我們認識的」" 

# 【稀咲】
# JP: 「あの頃ボクは、年齢的にも精神的にも小娘だった。\n銀行で働き始めることになって、完全に空回りしていた」
1711 = "她溫暖的語調中洋溢著懷念。而這也瞬間激起了我對接下來內容的興趣。" 

# 【双鉄】
# display as 稀咲
# JP: 「最初はワーキングスタディだったのか？」
1588 = "「那時我不管從年齡層面還是精神層面，都還是個小姑娘，是個剛在銀行入職開始工作的冒失鬼」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そのとおり。アルバイトもしたことがなくて、\n一番最初の仕事先が隈元銀行だったんだ」
982 = "「一開始應該是實習吧？」" 

# monologue
# display as 稀咲
# JP: いった途端に、クスっと微笑。
1431 = "「沒錯。之前連打工的經驗都沒有，直接就進了隈元銀行」" 

# 【稀咲】
# JP: 「というか、今にいたるまで銀行業一本槍だね、ボクは。\nファンド組成も、もろに銀行の仕事だし」
1924 = "說到這，稀咲輕笑了起來。" 

# 【双鉄】
# display as 稀咲
# JP: 「僕の目に映る稀咲は、完全に理想的な[バンカー,2]銀行家だ。\n未熟なころがあったなど、まったく想像もつかんほどに」
1534 = "「說起來，我這是在銀行一路幹到現在啊。組建基金說到底也還是銀行的工作」" 

# 【稀咲】
# display as 雙鐵
# JP: 「ありがとう。もしもそうなら、それも姜さんと――\n姜さんを紹介してくれた父のおかげだね、完全に」
1318 = "「我眼中的稀咲，就是個完美的[Ｂａｎｋｅｒ,2]銀行家。實在難以想像你有什麼不成熟的地方的樣子」" 

# monologue
# display as 稀咲
# JP: ふっと、稀咲が身を寄せてくる。\n腕を伸ばせば、それを枕にしてくれる。
1538 = "「謝謝。即便真如你所言，那也完全是拜姜小姐和——把姜小姐介紹給我的家父所賜」" 

# 【稀咲】
# JP: 「他がどうだかしらないけれど、うちの銀行は結構な\n男社会でね。ボクは舐められたくないって思ってた」
1925 = "說著，稀咲朝我靠了過來。我伸出手去，她便把我的手臂當作了枕頭枕了上去。" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1603 = "「雖然不清楚別處是怎樣，但我們銀行大男子主義氣息還是很重的。但我偏偏就是不想被人看扁」" 

# monologue
# display as 雙鐵
# JP: 浦上さんをふと思い出す。あの方の男装も確か、\n『この方がいろいろ便利』という理由であった。
# 1150 = "「啊」" 

# 【稀咲】
# JP: 「小さなころから一人称がボクだったのも、その現れかな。\n今となっては、かえって逆効果だったかとも思うけど」
1781 = "我想起了浦上經理。她之所以以男裝示人也是因為“這樣有著諸多便利之處”。" 

# 【双鉄】
# display as 稀咲
# JP: 「恐ろしく似合っているので問題なかろう。\n社交の場での”[わたくし]私”も、実に可憐で素敵だが」
1290 = "「從小開始就以[ｂｏｋｕ]我自稱，也是源自於此吧。不過回頭想來，或許倒是起了反效果」" 

# 【稀咲】
# display as 雙鐵
# JP: 「あ」
1065 = "「其實自然得很，根本沒什麼問題嘛。社交場合用的[ｗａｔａｋｕｓｈｉ]我也很可愛很棒」" 

# monologue
# display as 稀咲
# JP: クスっと小さな笑い声。\n綺麗な顔が、僕の耳元に寄ってくる。
# 1150 = "「啊」" 

# 【稀咲】
# JP: 「実はね？　あれはハチロクちゃんのパクリなんだ。\n知り合う以前には、”く”は入れてなかった」
1957 = "隨著輕笑聲，稀咲那美麗的面龐向我的耳邊湊了過來。" 

# 【双鉄】
# display as 稀咲
# JP: 「そうだったのか。ふむ――確かに稀咲にも、\nわたしよりわたくしの方が似合うな」
1063 = "「其實呀，那是從八六那有樣學樣來的。認識她以前是不加“ｋｕ”的」" 

# 【稀咲】
# display as 雙鐵
# JP: 「ふふっ、褒め言葉と受け取っておくよ。\nで――ええと、どこまで話してたっけ？」
1404 = "「是這樣嗎。嗯——的確，比起“ｗａｔａｓｈｉ”，“ｗａｔａｋｕｓｈｉ”更適合稀咲吧」" 

# 【双鉄】
# display as 稀咲
# JP: 「銀行が男社会で、舐められたくなくて気を張っていた\n――というような話だった」
1187 = "「嘻嘻，稱讚的話我就先收下了。那——我想想，剛才說到哪來著？」" 

# 【稀咲】
# display as 雙鐵
# JP: 「ああ、うん。一人称にも現れているように……\nボクの気の張り方は、概ね空回りしちゃってたんだ」
1594 = "「銀行裡大男子主義盛行，不想被看扁而繃著一口氣——應該是說到這個地方」" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ」
1158 = "「啊，對。說自稱也是源自這裡……而我這繃著一口氣，大概顯得更冒失鬼了」" 

# monologue
# display as 雙鐵
# JP: 確かに小娘の新任支店長がボク呼びだったら――\nそこに表出するものは、威厳ではなく可愛らしさだ。
# 1150 = "「啊」" 

# 【稀咲】
# JP: 「父は、それをみかねたんだろうね。\n仲国からの留学生を、家庭教師につけてくれた」
1819 = "確實，一個新來的小姑娘當支行長，自稱又是[ｂｏｋｕ]我——這樣表現出來的就不是威嚴而是可愛了。" 

# 【双鉄】
# display as 稀咲
# JP: 「それが姜さんか」
1260 = "「家父大概也是實在看不下去了。就介紹了一位仲國來的留學生給我做家庭教師」" 

# 【稀咲】
# display as 雙鐵
# JP: 「うん。姜さんはボクに勉強と――\n勉強そのものの何倍も、多くのことを教えてくれた」
1275 = "「就是姜小姐嗎」" 

# 【双鉄】
# display as 稀咲
# JP: 「例えば、社交術的な？」
1165 = "「嗯。姜小姐不光輔導我學習——還教給了我比學業多了不知多少倍的東西」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そういう直接的な技術じゃなくって。なんていうのかな、\n……準備があれば構えなくていい、みたいな？」
1425 = "「比如，社交的方法？」" 

# 【双鉄】
# display as 稀咲
# JP: 「ほう」
997 = "「並不是那麼直接的。該怎麼說呢……有備無患，舉重若輕？」" 

# 【稀咲】
# display as 雙鐵
# JP: 「例えば今日、日々姫と姜さん、\nデザインの話で随分もりあがってたけど――」
# 1129 = "「哦」" 

# 【双鉄】
# display as 稀咲
# JP: 「！　あれも準備があったのか」
1426 = "「比方說今天，日日姬和姜小姐討論了好多設計方面的話題——」" 

# 【稀咲】
# display as 雙鐵
# JP: 「確証はないけど、多分ね。ボクの結婚相手と、\nその家族構成あたりのことは、事前に調べてたと思う」
1155 = "「啊！那也是事先做了準備的嗎」" 

# 【双鉄】
# display as 稀咲
# JP: 「それが準備か」
1604 = "「雖然沒有確鑿的證據，但大概八九不離十。應該是已經事前調查過我的丈夫和婆家人了吧」" 

# 【稀咲】
# display as 雙鐵
# JP: 「準備のほんの一部分。双鉄は閃くタイプじゃないか。\n予想外の事態を、むしろ発展のチャンスにできる」
1488 = "「竟是這樣的準備啊」" 

# 【双鉄】
# display as 稀咲
# JP: 「買いかぶりすぎかとは思うが……\n稀咲が評価してくれるのであれば、そうかもしれんな」
1116 = "「只是準備的一小部分。因為你時常會靈光一現不是，所以預料之外的情況可能反而會成為發展的機會」" 

# 【稀咲】
# display as 雙鐵
# JP: 「でもね？　ボクや姜さんはそうじゃない。\nポーレットとかもお仲間だよね。閃かないタイプ」
1564 = "「這太抬舉我了，受之有愧啊……不過若是稀咲這麼評價的話，也說不定真就是這樣」" 

# 【双鉄】
# display as 稀咲
# JP: 「ああ――」
994 = "「不過哦？我和姜小姐都不是這樣的類型。波萊特也和我們一樣，不太會突發奇想的」" 

# monologue
# display as 雙鐵
# JP: 確かにポーレットは異様なまでに突発事態に弱い。\n弱くあるのに、それでもなんとか事態を破綻させんのは
1143 = "「啊——」" 

# 【双鉄】
# JP: 「ゆえに、準備か」
1922 = "說來確實，波萊特對突發情況的應對弱得出奇。但儘管如此，卻仍能平平安安一路走來，恐怕——" 

# 【稀咲】
# display as 雙鐵
# JP: 「そのとおり。閃かないからこそ、閃き不要に事態を運ぶ。\n完璧に準備し、立案し、計画し、計画どおりに実施する」
1335 = "「所以更要準備嗎」" 

# monologue
# display as 稀咲
# JP: 稀咲の声は誇りに満ちてる。\n積み重ねて来た者の強さを、しかと感じる。
1432 = "「沒錯。正因為沒有靈光一現，才更需要完美的準備、方案、計劃以及按部就班地執行，才能不仰仗靈光一現而度過危機」" 

# 【稀咲】
# JP: 「姜さんが、無言のうちに一番深く教えてくれたのは、\n多分、そこ」
1864 = "稀咲的話語中充滿了自豪。讓我深感一步一個腳印所積累出的強大。" 

# monologue
# display as 稀咲
# JP: 噛みしめるような、深い息。
1240 = "「姜小姐雖然並沒有對我說過這些，但她令我留下最深刻印象的，大概就是這個道理了」" 

# 【稀咲】
# JP: 「正しく情報収集し、正しく分析し、正しく準備する。\n最終的な成果は、その正しさと仕事量との乗算になる」
1883 = "稀咲隨後長呼一口氣，彷彿在回味剛剛的話。" 

# 【双鉄】
# display as 稀咲
# JP: 「乗算か。なるほどな」
1217 = "「妥善收集訊息，妥善加以分析，妥善進行準備。最終的成果，便是妥善的程度與工作量的乘積」" 

# monologue
# display as 雙鐵
# JP: ……方向性が、例えばまるで真逆だったら、\n仕事量はデメリットしか生み出さない。
1000 = "「乘積啊，原來如此」" 

# 【双鉄】
# JP: 「いや、しかし方向性がマイナスで、\n仕事量もマイナスという場合にはどうだ？」
694 = "……若是走錯了方向，比如完全反面的話，工作量再大也是百害無一利。" 

# 【稀咲】
# display as 雙鐵
# JP: 「悪意を持つ、けれども極めて無能な者が、\n足を引っ張ろうと動くパターンを考えてみて？」
1493 = "「等一下，那要是方向性為負，工作量也是負的話又會怎樣？」" 

# 【双鉄】
# display as 稀咲
# JP: 「！　マイナスかけるマイナスがプラスになるな！\n無能な者の妨害工作は、うむ、逆方向に働こうゆえ」
1349 = "「抱有惡意，但卻極其無能的人，試著拉你後腿的情況，想想看？」" 

# 【稀咲】
# display as 雙鐵
# JP: 「だよね。だから、一番怖いのは無能な働き者でもある。\nマイナス方向の仕事量を愚直に積み重ねちゃうから」
1130 = "「哦！負負得正嗎！無能的人來妨礙工作，嗯，只會起到反效果」" 

# 【双鉄】
# display as 稀咲
# JP: 「なるほど。なかなかに深いな」
1269 = "「對吧。所以，可以說最恐怖的是無能而勤奮的人。那會讓負方向的工作量直線上升」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そ。深いんだ、彼女の教えは。\nボクが正しく解釈できているのか、今もわからないけど」
1087 = "「原來如此。竟有這麼深刻的道理」" 

# monologue
# display as 稀咲
# JP: 稀咲がふっ、と微笑を零す。
1268 = "「對。她教給我的道理就是這麼深刻。雖然現在我也不能確定自己到底是不是正確地理解了」" 

# 【稀咲】
# JP: 「ボクには物凄くフィットする方法論だと感じた。\nだからボクは選んで学んで身につけた」
1856 = "稀咲嫣然一笑。" 

# 【双鉄】
# display as 稀咲
# JP: 「その選択は大正解だったのだなと感じるよ。\n僕の知る稀咲の、稀咲らしさの根源であるようにさえ」
1322 = "「我覺得這是一套非常可靠的方法論。所以我選擇學習掌握了它」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そういわれると、もともとの素養を、\n姜さんが整頓して道筋を見せてくれた感じなのかな」
1321 = "「我覺得這個選擇真是無比正確。這就是我所知道的稀咲之所以是稀咲的根源所在啊」" 

# 【双鉄】
# display as 稀咲
# JP: 「かもしれんな。『そう導ける』と思ったがゆえ、\n元忠さんは姜さんを家庭教師に選んだのかもしれん」
1025 = "「你這麼一說的話，感覺就像是再我原本道行基礎上，給姜小姐打通了任督二脈的感覺」" 

# 【稀咲】
# display as 雙鐵
# JP: 「あ」
1329 = "「或許是吧。而元忠先生選擇姜小姐來做你的家庭教師，或許就是想讓她給予你“這樣的教導”」" 

# monologue
# display as 稀咲
# JP: そこは思考の盲点だったか、稀咲が不意に言葉を止める。
# 1150 = "「啊」" 

# 【稀咲】
# JP: 「……そっか。そうかも。もしもそうなら、\n僕は父に、いっそう感謝しなくっちゃだね」
1785 = "或許是被我說到了思維的盲區上，稀咲不由得卡了一下殼。" 

# 【双鉄】
# display as 稀咲
# JP: 「そうするといい。僕が言うと重すぎるかもしれんが、\n親孝行したいときには親は無し、だ」
720 = "「……這樣啊，真有可能。要真是這樣的話，那我真要好好謝謝家父才行」" 

# 【稀咲】
# display as 雙鐵
# JP: 「うん。ありがと。\n……今度、三人で食事にでもいこう」
1587 = "「那是自然。這話我說可能不太合適，但千萬別等到子欲養而親不待，是吧」" 

# 【双鉄】
# display as 稀咲
# JP: 「大歓迎だ」
1174 = "「嗯，謝謝。……回頭找個機會三個人一起吃頓飯吧」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そっか……本当に大感謝だなぁ」
1605 = "「雙手贊成」" 

# 【双鉄】
# display as 稀咲
# JP: 「！」
1567 = "「這樣啊……真是太謝謝你了」" 

# monologue
# display as 雙鐵
# JP: 稀咲がさらに、ぐぐっと体を寄せてくる。\n甘い香りと温もりが、声にまじって僕の全部に染みてくる。
# 1141 = "「唔！」" 

# 【稀咲】
# JP: 「天性があったとしても、それは方法になってなかった。\n具体化されず、だから身についていなかった」
1854 = "稀咲又向我貼得緊了一些。我便沉浸在了她淡淡的體香、體溫與甜美的聲音中。" 

# monologue
# display as 稀咲
# JP: とくん、とくんと稀咲の鼓動が伝わってくる。\n稀咲の胸は大きくなったと、そう思わずにはいられない。
1082 = "「即便天性如此，也並不足以成為方法。因為不夠具體，所以也不能算作是掌握了」" 

# 【稀咲】
# JP: 「けど、姜さんが“ボクにあうやり方”を教えてくれた。\nその一番の成果物なら、キミだよ？　双鉄」
1783 = "我清晰地感受到了稀咲的心跳。不得不承認，稀咲的雙峰又有所成長。" 

# 【双鉄】
# display as 稀咲
# JP: 「む？」
995 = "「不過，姜小姐教會我的“適合我的方法”，其最卓越的成果，可是你哦，雙鐵」" 

# 【稀咲】
# display as 雙鐵
# JP: 「キミに関する情報は、日々姫がいくらでもくれたから。\nキミに恋してもらえるよう、ボクは出来るだけ準備した」
1327 = "「我？」" 

# 【双鉄】
# display as 稀咲
# JP: 「そうだったのか――ならば、その努力に応えねばな」
1599 = "「關於你的訊息，日日姬那邊可是取之不竭。為讓你愛上我，我可是做了完全的準備」" 

# 【稀咲】
# display as 雙鐵
# JP: 「んっ」
1092 = "「原來是這樣哦——那我可得好好回應這份努力」" 

# monologue
# display as 稀咲
# JP: キスをする。今まさに恋していると伝えたくって、\n何度も何度も、ついばむように、貪るように。
1169 = "「嗯」" 

# 【双鉄】
# JP: 「――稀咲」
1960 = "雙唇相印。我們像是要這樣傳達自己的愛意一般，一次又一次，纏綿著，索求著。" 

# monologue
# display as 雙鐵
# JP: 稀咲を思い切り抱きしめ――ようとし、\nすんでのところで思いとどまる。
698 = "「——稀咲」" 

# 【稀咲】
# JP: 「なぁに？　双鉄」
1687 = "剛想盡情擁抱稀咲，轉念一想現在在哪裡，就停了下來。" 

# monologue
# display as 稀咲
# JP: 会食の片付けもあったため、今日は右田で就寝している。\n今夜はもろもろ、我慢しなければならぬゆえ――ああ。
1294 = "「怎麼啦，雙鐵？」" 

# 【双鉄】
# JP: 「姜さんに関する話を聞いて、\n視察にいってみたい気持ちが、僕としては一層強まった」
1707 = "因為還要幫忙收拾，所以今天我們就住在了右田家。所以今晚各方面不得不多多克制——啊。" 

# 【稀咲】
# display as 雙鐵
# JP: 「あ……っと。そうだね。\nその話を先にすませちゃおうか」
1507 = "「聽你說了這麼多關於姜小姐的事情，我變得更加想去考察了」" 

# monologue
# display as 稀咲
# JP: 何より先かを、稀咲は言わない。稀咲もあるいは、\nここが右田の寝室なのだと失念をしているのだろう。
1147 = "「啊……哦。對哦。先把這件事定下來吧」" 

# 【稀咲】
# JP: 「ボクも賛成。今ならスケジュールも調整がつくし。\nずっと行けてない新婚旅行がわりにもできそうかな」
1851 = "稀咲並沒有把話題推開。或許剛才稀咲也一時忘記了這裡是右田家的臥室。" 

# 【双鉄】
# display as 稀咲
# JP: 「いや。新婚旅行は別途でスケジュールを必ず取ろう。\nマイレールファンドの引き継ぎが全て完了次第、すぐ」
1309 = "「我也贊成。現在應該能有調整行程的空間，說不定可以把一推再推的新婚旅行也安排上」" 

# 【稀咲】
# display as 雙鐵
# JP: 「うん。ボクもそのほうがもちろん嬉しい。\n今回も、取れて２～３日程度にはなっちゃうだろうし」
984 = "「不。新婚旅行我一定會再另行安排的。等私有線路基金移交都結束之後就馬上著手」" 

# 【双鉄】
# display as 稀咲
# JP: 「ゆえ、新婚旅行は視察ののち、一週間以上で改めて。\nそうするためにも、今回は視察をがんばりたい」
1168 = "「嗯。能那樣我當然更高興啦。這次應該也就是兩三天的程度吧」" 

# 【稀咲】
# display as 雙鐵
# JP: 「完全にビジネスと割り切っての視察でも、もちろん賛成。\nそれはそれで充実した楽しい時間になりそうだしね」
1332 = "「所以新婚旅行等考察回來之後，再找個一星期以上的機會吧。為此，這次考察也要加油啊」" 

# 【双鉄】
# display as 稀咲
# JP: 「ではいく方向で返事をしよう。具体的にどこを、\nあるいは何を視察してみたい、などの希望があるか？」
1246 = "「安排成徹底的商務考察我當然也贊成。這樣也有這樣的好，也會是段充實而快樂的時光」" 

# 【稀咲】
# display as 雙鐵
# JP: 「そうだねぇ。\nどこ――というのはないけれど」
1580 = "「那就先答覆人家說會去吧。具體考察地點，還有考察內容之類，有什麼想法嗎？」" 

# monologue
# display as 稀咲
# JP: ふふっ、と、笑い未満の楽しげな息。
1314 = "「我想想。地點——倒還沒有太多想法，不過」" 

# 【稀咲】
# JP: 「姜さんに完全に任せちゃうのでどうかなぁ？\n姜さんがボクらに見せたいものをみてみたい」
1899 = "耳邊傳來一絲尚不及笑聲的快樂的氣息。" 

# 【双鉄】
# display as 稀咲
# JP: 「なるほど。いいな。実にいい。\nではその方向で姜さんに明日にでも返事をして欲しい」
1249 = "「完全交給姜小姐安排怎麼樣？我想看一看姜小姐究竟是打算讓我看些什麼」" 

# 【稀咲】
# display as 雙鐵
# JP: 「うん。わかった」
1085 = "「原來如此。可以，這想法不錯。那你明天就這樣答覆姜小姐吧」" 

# monologue
# display as 稀咲
# JP: 甘い香りがふわり、鼻先に近づいてくる。\n話の時間はこれで終わりと――稀咲が僕にキスをする。
1164 = "「嗯。好的」" 
