[script]
# lines: 452 
# 【稀咲】
# display as 稀咲
# JP: 「済まないね、こんな時間に呼び出して」
1690 = "「Xin lỗi nhé, sáng sớm đã gọi anh ra đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、構わん。僕とて酒造の、端くれとはいえ一員だ。\n早起き程度は、苦にもならんさ」
1704 = "「Không sao đâu. Dù chỉ là một kẻ chạy việc vặt, nhưng ít ra tôi cũng là một thành viên của xưởng rượu.\nViệc dậy sớm chẳng nhằm nhò gì cả.」"
# monologue
# JP: 早朝の支店長室。\n見下ろす一階フロアには、まだ誰の姿も見当たらない。
2714 = "Từ phòng giám đốc chi nhánh nhìn xuống vào lúc sáng sớm.\nDưới tầng một vẫn chưa thấy bóng dáng ai."
# 【稀咲】
# display as 稀咲
# JP: 「そういうものかい？　\n日々姫は、ときどき眠そうだけど」
2160 = "「Vậy sao? \nHibiki thì thỉnh thoảng lại trông như chưa tỉnh ngủ ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は絵を描く人間だからな。\n集中すると、明け方近くまで起きているようだ」
2232 = "「Vì Hibiki là người vẽ tranh mà.\nMột khi đã tập trung, có vẻ em ấy sẽ thức đến tận gần sáng.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。今日も？」
1820 = "「Ra là vậy. Hôm nay em ấy cũng thế à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「絵が原因かどうかはしらんが、\n起こしても起きぬようだった」
2070 = "「Tôi không rõ nguyên nhân có phải do vẽ tranh không,\nnhưng có gọi cũng không dậy nổi.」"
# monologue
# JP: “もしも興味がありそうなら”と、\n日々姫に関しては言われてた。
2998 = "Về phần Hibiki, Kisaki chỉ bảo\n\"nếu em ấy có hứng thú thì cứ đưa đến\"."
# monologue
# JP: ゆえに強くは起こさなかったが――
2763 = "Vì thế nên tôi cũng không cố đánh thức em ấy dậy——"
# 【双鉄】
# display as 雙鐵
# JP: 「無理矢理にでも連れてきたほうが良かったか？」
2084 = "「Có lẽ tôi nên ép em ấy đi cùng thì tốt hơn nhỉ?」"
# 【稀咲】
# display as 稀咲
# JP: 「いいや？　今日の話は、\n多分、あの子には退屈な内容だと思うし」
1680 = "「Không đâu? Chuyện chúng ta sắp nói hôm nay,\ncó lẽ đối với em ấy sẽ khá là nhàm chán đấy.」"
# monologue
# JP: 笑って、稀咲は奥のデスクに目を走らせる。\n今は無人のデスクの上には、整えられた紙束がある。
2952 = "Kisaki mỉm cười, đưa mắt nhìn về phía chiếc bàn làm việc ở bên trong.\nTrên chiếc bàn không người lúc này, có một xấp giấy tờ được xếp ngay ngắn."
# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんは？」
2194 = "「Anh Urakami đâu rồi?」"
# 【稀咲】
# display as 稀咲
# JP: 「勤務時間前だもの。\nボクの都合で、早朝出勤をさせたくもないからね」
2345 = "「Vẫn chưa đến giờ làm việc mà.\nTôi cũng không muốn vì chuyện cá nhân của mình mà bắt người khác phải đi làm sớm.」"
# monologue
# JP: ボクの都合、と稀咲はいうが、\nむしろこちらの都合に合わせてもらっているだけだ。
3094 = "Mặc dù Kisaki nói là \"chuyện cá nhân của mình\",\nnhưng thực chất cô ấy chỉ đang phối hợp theo lịch trình của chúng tôi mà thôi."
# monologue
# JP: 乗務訓練だなんだがあるので、じっくり話をしたいなら、\nベストな時間帯は早朝になる。
2858 = "Bởi vì tôi còn có khóa huấn luyện tổ lái và nhiều việc khác, nên nếu muốn nói chuyện kỹ càng thì\nsáng sớm là khoảng thời gian lý tưởng nhất."
# 【稀咲】
# display as 稀咲
# JP: 「あ、そこ座って？」
1912 = "「A, anh ngồi đó đi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1935 = "「Ừm.」"
# monologue
# JP: 促されるままソファに座れば、\n稀咲はコーヒーを淹れようと――
2732 = "Ngồi xuống ghế sofa theo lời mời,\nđúng lúc Kisaki định đi pha cà phê thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「と、そうだ。少し待ってくれ。\n朝食はもう済ませたか？」
1916 = "「A, đúng rồi. Đợi một chút.\nCô đã ăn sáng chưa?」"
# 【稀咲】
# display as 稀咲
# JP: 「ううん、\nこれが終わったら適当に取ろうと思ってたけど」
1702 = "「Chưa,\ntôi định lát nữa bàn xong chuyện sẽ ăn tạm thứ gì đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら良かった。嫌いでなければ摘んでくれ」
2355 = "「Vậy thì tốt. Nếu không chê thì cô ăn thử đi.」"
# monologue
# JP: 弁当箱の一つ目は、\n一口サイズの鮭、梅、昆布のおにぎりたち。
2971 = "Trong hộp cơm bento thứ nhất,\nlà những nắm cơm nhỏ vừa miệng với nhân cá hồi, mơ muối và tảo bẹ."
# monologue
# JP: そしてもう一つの弁当箱には、\n切り干し大根とミニトマトのサラダ。
2985 = "Còn ở hộp bento thứ hai,\nlà salad củ cải khô và cà chua bi."
# 【稀咲】
# display as 稀咲
# JP: 「ああ――ふふっ、なんだ、\nボクの食生活をそこまで心配してくれたんだ」
1900 = "「A——fufu, gì chứ,\nhóa ra anh lại lo lắng cho chế độ ăn uống của tôi đến thế sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「余計なお世話とは承知だが、妙に気にかかってな。\n若い娘が、出来合いのものばかりの食事では」
2073 = "「Dù biết là lo chuyện bao đồng, nhưng tôi cứ thấy bận tâm một cách kỳ lạ.\nMột cô gái trẻ mà toàn ăn đồ ăn làm sẵn thì không ổn đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「古風だねぇ、双鉄は。\nうちの父より、よっぽど古い考え方だ」
1768 = "「Anh Soutetsu cổ hủ thật đấy.\nSuy nghĩ còn cổ hủ hơn cả bố tôi nhiều.」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、コーヒーは食後にしよう」
2359 = "「Vậy thì, để ăn xong rồi hẵng uống cà phê nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、緑茶もあるのか」
1918 = "「A, còn có cả trà xanh nữa à.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん。ご年配の来客も多いんだよ？　この部屋は」
2234 = "「Tất nhiên rồi. Căn phòng này cũng thường xuyên tiếp đón những vị khách lớn tuổi mà?」"
# monologue
# JP: 取り留めの無い会話と、食事。\n腹が満ちれば、やはり心もあたたかになる。
2724 = "Một cuộc trò chuyện vu vơ cùng bữa ăn sáng.\nKhi cái bụng đã no, trái tim dường như cũng trở nên ấm áp hơn."
# 【稀咲】
# display as 稀咲
# JP: 「ご馳走様。おいしかった。\nさすがは、真闇さんだね」
2076 = "「Cảm ơn vì bữa ăn. Ngon lắm.\nQuả không hổ danh là chị Mayami làm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか。朝の真闇姉にそこまで負担はかけられぬ。\nレシピを昨晩おしえてもらい、僕が作った」
2049 = "「Không đâu. Sáng sớm không thể tạo thêm gánh nặng cho chị Mayami được.\nTối qua tôi đã hỏi xin công thức rồi tự tay làm đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄が」
2142 = "「Anh Soutetsu làm á?」"
# monologue
# JP: 目を丸くして、空の弁当箱を見て。
2950 = "Kisaki tròn xoe mắt, nhìn vào hộp bento trống rỗng."
# monologue
# JP: 稀咲の顔に、\nふわふわに焼いた玉子のような微笑が浮かぶ。
2657 = "Trên gương mặt Kisaki,\nnở một nụ cười rạng rỡ, mềm mại như món trứng chiên bồng bềnh."
# 【稀咲】
# display as 稀咲
# JP: 「それはそれは……\nうふふ、本当においしかったよ？　大したものだ」
2238 = "「Thật không ngờ……\nfufu, thực sự rất ngon đấy? Giỏi quá đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだろうな。真闇姉の名が出たのだから」
2059 = "「Chắc là vậy rồi. Dù sao thì cũng phải mang danh tiếng của chị Mayami ra bảo chứng mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ご馳走になった分、まずは仕事で返さなくっちゃね」
2118 = "「Đã được anh thiết đãi một bữa ngon như vậy, trước tiên tôi phải đền đáp bằng công việc mới được.」"
# monologue
# JP: ナプキンで指をキュっと拭き、\n稀咲は表情を引き締める。
2938 = "Kisaki dùng khăn ăn lau sạch các ngón tay,\nnét mặt trở nên nghiêm túc."
# 【稀咲】
# display as 稀咲
# JP: 「早速だけど、これ」
1718 = "「Vào việc luôn nhé, anh xem cái này đi.」"
# monologue
# JP: その手が取るのは、浦上さんのデスクの上の紙束だ。
2666 = "Thứ mà tay cô ấy cầm lên, chính là xấp giấy tờ trên bàn làm việc của anh Urakami."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2334 = "「Đây là——」"
# monologue
# JP: 表紙も中身も簡素で見やすい。\nそれだけに、内容の濃さがまさに一目で伝わってくる。
2687 = "Cả trang bìa lẫn nội dung bên trong đều rất đơn giản và dễ nhìn.\nChính vì vậy, chỉ cần liếc mắt qua cũng đủ thấy nội dung vô cùng phong phú và chi tiết."
# 【双鉄】
# display as 雙鐵
# JP: 「――浦上さんの作った資料か？　すごいな……\nというか、ここまでを僕が見てしまっても――」
2337 = "「——Đây là tài liệu do anh Urakami làm sao? Tuyệt thật đấy……\ncơ mà, cho tôi xem nhiều thế này có sao không——」"
# 【稀咲】
# display as 稀咲
# JP: 「どうぞ遠慮無く扱って欲しい。最初から、\nキミに見てもらうために、作ってもらった資料だし」
2022 = "「Cứ tự nhiên xem đi. Ngay từ đầu,\ntài liệu này được làm ra là để cho anh xem mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕のために？　これほどのものを、何故……」
2205 = "「Cho tôi sao? Một tài liệu đồ sộ thế này, tại sao lại……」"
# 【稀咲】
# display as 稀咲
# JP: 「彼の仕事は、『御一夜に工場を誘致すること』ではなく、\n『最適の場所に工場を立地すること』だからさ」
2192 = "「Công việc của anh ấy không phải là 『thu hút nhà máy đến Ohimitera』,\nmà là 『chọn địa điểm tối ưu nhất để đặt nhà máy』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――つまり、僕らと浦上さんとの利害は、\n一致するのか」
1891 = "「À——nói cách khác, lợi ích của chúng ta và anh Urakami là\nđồng nhất sao?」"
# monologue
# JP: 御一夜より有利な候補地を設定できれば、\n工場誘致は回避でき、浦上さんの得点にもなる。
2676 = "Nếu có thể thiết lập một địa điểm ứng cử viên có lợi thế hơn Ohimitera,\nthì vừa có thể tránh được việc thu hút nhà máy, vừa mang lại điểm cộng cho anh Urakami."
# monologue
# JP: 納得できれば、遠慮も消える。\nそういう話であるのなら、ありがたく読ませて頂こう。
2854 = "Khi đã hiểu ra vấn đề, sự e ngại cũng biến mất.\nNếu chuyện đã như vậy, tôi xin mạn phép đọc kỹ nó."
# 【双鉄】
# display as 雙鐵
# JP: 「……ならばゴールは、より先に設定せねばならんな。\n誘致撤回にとどまらず、将来的な共存共栄も睨まねば」
1412 = "「……Nếu vậy thì chúng ta phải đặt mục tiêu xa hơn nữa.\nKhông chỉ dừng lại ở việc hủy bỏ kế hoạch thu hút nhà máy, mà còn phải hướng tới sự cùng tồn tại và cùng phát triển trong tương lai.」"
# 【稀咲】
# display as 稀咲
# JP: 「共存共栄？　御一夜市と、\x%lエアクラ;#00ffc040;エアクラ%l;#;社とのかい？」
1721 = "「Cùng tồn tại và cùng phát triển? Giữa thành phố Ohimitera và\ncông ty \x%lエアクラ;#00ffc040;Aircra%l;#; sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもあるし、鉄道と\x%lエアクラ;#00ffc040;エアクラ%l;#;の、というのもある。\n誘致賛成・反対、どちらの立場の者も、もあるな」
1686 = "「Cũng có khía cạnh đó, và cả giữa đường sắt với \x%lエアクラ;#00ffc040;Aircra%l;#; nữa.\nCũng bao gồm cả những người ủng hộ và phản đối việc thu hút nhà máy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ……」
1902 = "「À……」"
# monologue
# JP: 困ったような苦笑い。
2670 = "Cô ấy nở một nụ cười gượng gạo như đang bối rối."
# 【稀咲】
# display as 稀咲
# JP: 「直接的、金銭的な利害とも関わる話だからね。\n誰もが満足する解決案は、難しいとは思うけど？」
2233 = "「Vì đây là câu chuyện liên quan trực tiếp đến lợi ích tiền bạc mà.\nTôi nghĩ để tìm ra một giải pháp làm hài lòng tất cả mọi người là rất khó đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「短期的にはそうであっても、\n長期的な共存共栄であるなら必ず、目指せるさ」
2015 = "「Dù trước mắt có thể là vậy,\nnhưng nếu hướng tới sự cùng tồn tại và cùng phát triển lâu dài, chúng ta chắc chắn có thể làm được.」"
# 【稀咲】
# display as 稀咲
# JP: 「ははっ」
1881 = "「Haha.」"
# monologue
# JP: 一転、笑いは軽やかに。
3060 = "Đột nhiên, tiếng cười trở nên nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「驚いた。\n日々姫の話とは、ちょっと印象が違うようだね」
2092 = "「Tôi ngạc nhiên đấy.\nCó vẻ ấn tượng này hơi khác so với những gì Hibiki đã kể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の話？　印象、とは、いったい何の」
2126 = "「Hibiki kể sao? Ấn tượng, rốt cuộc là về chuyện gì?」"
# 【稀咲】
# display as 稀咲
# JP: 「『禁欲的で、何かを欲しがるのを見たことが無い』って。\nけど、実際は、相当なレベルの欲張りさんのようだから」
1965 = "「Em ấy bảo anh 『rất cấm dục, chưa bao giờ thấy anh ấy khao khát thứ gì』.\nNhưng thực tế, anh có vẻ là một người khá tham lam đấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の話か。……欲張り、か」
2163 = "「Là chuyện về tôi sao. ……Tham lam à.」"
# monologue
# JP: 指摘をされて、自分が驚く。\n確かにそうだ。今、僕は欲ばって動いてる。
2990 = "Bị chỉ ra như vậy, chính tôi cũng phải giật mình.\nQuả thực là thế. Hiện tại, tôi đang hành động với sự tham lam."
# monologue
# JP: 少し前までの僕だったなら、『工場誘致撤回の先』など、\n望むどころか、考えようともしなかったろう。
2673 = "Nếu là tôi của một thời gian trước, đừng nói là khao khát,\ncó lẽ tôi còn chẳng thèm mảy may nghĩ đến những chuyện xa xôi như 『sau khi hủy bỏ việc thu hút nhà máy』."
# 【双鉄】
# display as 雙鐵
# JP: 「……刺激をされて、\n変化したのかもしれないな」
1403 = "「……Có lẽ tôi đã bị kích thích,\nvà thay đổi chăng.」"
# 【稀咲】
# display as 稀咲
# JP: 「刺激を？　何に？」
1806 = "「Bị kích thích? Bởi thứ gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏や浦上さん。\nそれからもちろん――宝生稀咲、君にもだ」
1782 = "「Ông Mototada và anh Urakami.\nVà tất nhiên rồi——cả cô nữa, Houshou Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「えっ」
1882 = "「Ể.」"
# monologue
# JP: 一瞬、息を呑み込んで。\n稀咲は何故か、抑えた声で問いかけてくる。
2918 = "Trong thoáng chốc, cô ấy nín thở.\nRồi không hiểu sao, Kisaki lại hạ giọng hỏi tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクが、双鉄にどんな刺激を？」
2099 = "「Tôi, đã kích thích anh Soutetsu như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前の僕は単純に『自らの目的の達成が全て』と、\nそこまでの視野しか持てていなかったのだが――」
1743 = "「Trước đây, tôi chỉ đơn thuần nghĩ rằng 『đạt được mục đích của bản thân là tất cả』,\ntôi chỉ có tầm nhìn hạn hẹp đến thế thôi——」"
# monologue
# JP: 元忠氏や浦上さんの視野は、僕よりはるかに広く遠い。
2563 = "Tầm nhìn của ông Mototada và anh Urakami rộng lớn và xa vời hơn tôi rất nhiều."
# monologue
# JP: 僕が目的を達成することが、自分の利益に繋がるのなら、\nそれはそれで良しとして、完全に割り切って扱っている。
2558 = "Nếu việc tôi đạt được mục đích có thể mang lại lợi ích cho họ,\nthì họ sẵn sàng chấp nhận điều đó, họ phân định rạch ròi như vậy đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「視野を広げ、対立するものの目的や意図さえ汲むことで、\n目的の更に先にある、もっと大きなゴールを見つける」
2113 = "「Bằng cách mở rộng tầm nhìn, thậm chí thấu hiểu cả mục đích và ý đồ của những người đối lập,\nta có thể tìm ra một đích đến lớn lao hơn, vượt xa cả mục đích ban đầu.」"
# monologue
# JP: ああ、と稀咲がゆっくり頷く。\n当然だ。稀咲もまた、その実践者なのだから。
2953 = "Kisaki khẽ 'À' lên một tiếng rồi chậm rãi gật đầu.\nĐó là điều hiển nhiên. Bởi vì Kisaki cũng chính là người thực hành triết lý đó mà."
# 【双鉄】
# display as 雙鐵
# JP: 「そうした考え方に、そして実践に触れたこと。\nそれが恐らく、僕には大きな刺激となった」
1764 = "「Được tiếp xúc với cách suy nghĩ đó, và cả việc thực hành nó nữa.\nĐó có lẽ là một sự kích thích lớn đối với tôi.」"
# monologue
# JP: 手元の資料に、重さを感じる。
2767 = "Tập tài liệu trên tay mang lại cho tôi một cảm giác nặng nề."
# monologue
# JP: 即断即決その上に、普段からの整頓準備が重ならなければ、\nここまでのもの、この短期間に用意できよう筈もない。
3000 = "Nếu không có sự quyết đoán nhanh chóng, cộng thêm việc luôn chuẩn bị và sắp xếp chu đáo từ trước,\nthì làm sao có thể chuẩn bị được một thứ như thế này trong khoảng thời gian ngắn như vậy chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「見習いたいと、素直に思った。\n恐らくそれが、欲へと繋がってくれたのだろう」
2093 = "「Tôi thực lòng muốn học hỏi theo.\nCó lẽ chính điều đó đã dẫn đến sự tham lam của tôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「そんな欲なら素敵だね。\n業務を抜きに、応援したくなってしまうよ」
2339 = "「Một sự tham lam như vậy thật tuyệt vời.\nBỏ qua công việc sang một bên, tôi cũng bất giác muốn ủng hộ anh rồi đấy.」"
# monologue
# JP: ふわりと、微笑。\n室温が少しあたたかになる。
2668 = "Một nụ cười dịu dàng nở trên môi.\nNhiệt độ trong phòng dường như cũng ấm áp hơn đôi chút."
# 【稀咲】
# display as 稀咲
# JP: 「さて」
1967 = "「Vậy thì.」"
# monologue
# JP: けれど稀咲はすぐ表情を引き締めて、\nデスクから、同じ書類を持ってくる。
2572 = "Nhưng Kisaki ngay lập tức thu lại vẻ mặt nghiêm túc,\nrồi lấy một tập tài liệu giống hệt từ trên bàn làm việc."
# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社が御一夜を候補地にしている最大の理由は\n九洲中央部への生産・販売の拠点とし易いからだ」
1371 = "「Lý do lớn nhất khiến công ty \x%lエアクラ;#00ffc040;Aircra%l;#; chọn Ohimitera làm địa điểm ứng cử,\nlà vì nơi đây dễ dàng trở thành cứ điểm sản xuất và bán hàng cho khu vực trung tâm Kyushu.」"
# monologue
# JP: 資料の要点を、稀咲は簡潔にまとめてくれるらしい。\n慌ててメモ帳を広げれば、声のペースを落としてくれる。
2923 = "Có vẻ như Kisaki đang tóm tắt ngắn gọn những điểm chính của tài liệu cho tôi.\nKhi tôi vội vàng mở sổ tay ra, cô ấy liền giảm tốc độ giọng nói xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「中央と言えば聞こえはいいが……\n過去にも鉄道網の無かった、交通困難地域のことか？」
2381 = "「Nói là trung tâm thì nghe hay đấy, nhưng……\nchẳng phải đó là khu vực giao thông khó khăn, nơi mà trước đây còn không có cả mạng lưới đường sắt sao?」"
# monologue
# JP: 稀咲が頷く。
2962 = "Kisaki gật đầu."
# monologue
# JP: 確かに、山がちのあの方面では自動車が必需品と聞く。\nならば既に、\x%lエアクラ;#00ffc040;エアクラ%l;#;が行き渡っていそうだが……
2886 = "Quả thực, tôi nghe nói ở những vùng đồi núi như vậy, ô tô là một vật dụng thiết yếu.\nNếu thế thì \x%lエアクラ;#00ffc040;Aircra%l;#; có lẽ đã được phủ sóng rộng rãi rồi, nhưng mà……"
# 【稀咲】
# display as 稀咲
# JP: 「他国人のものに比べ、[ひのもと,2]日ノ本人の“新車”の定義が、\n極めて狭く、厳しいことを知ってるかい？」
1766 = "「Anh có biết rằng so với người nước ngoài, định nghĩa về 『xe mới』 của người Hinomoto\ncực kỳ hẹp và khắt khe không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「というと？」
1762 = "「Nghĩa là sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「たとえ１キロでも走行距離があればダメ。\nそれが０でも、展示をされていたものはダメ、とかさ」
1897 = "「Cho dù chỉ có quãng đường di chuyển là 1 km cũng không được.\nDù là 0 km đi chăng nữa, thì hàng trưng bày cũng không được tính, kiểu vậy đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。確かに日ノ本人は、そうした、ある種\n潔癖症めいた傾向を、強く持っているかもしれんな」
1821 = "「Ra là vậy. Quả thật, người Hinomoto có thể có khuynh hướng mang hơi hướm\nmắc bệnh sạch sẽ như vậy rất mạnh mẽ.」"
# monologue
# JP: 納得をして頷けば、\n稀咲は逆に首を傾げる。
2762 = "Tôi gật đầu tỏ vẻ đã hiểu, nhưng Kisaki lại nghiêng đầu."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄も、その辺を気にするほう？」
2386 = "「Anh Soutetsu cũng là người bận tâm đến mấy chuyện đó sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。僕は特には。特に実用品などは、\n手に馴染む中古があれば、その方が好ましいくらいだ」
1700 = "「Không. Tôi thì không hẳn. Đặc biệt là những đồ dùng thực tế,\nnếu có đồ cũ vừa tay thì tôi còn thích hơn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　ピカピカの新品を、\n自分好みに馴染ませる方がいいって思わない？」
1946 = "「Hửm? Anh không nghĩ việc biến một món đồ mới tinh tươm\nthành món đồ hợp với sở thích của mình sẽ tuyệt hơn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、それはそれで楽しかろうな。\nが、特にこだわりは感じない」
2235 = "「Tất nhiên, như thế cũng có cái thú vị riêng.\nNhưng tôi không đặc biệt kén chọn chuyện đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「へぇぇ。そうなんだ」
1949 = "「Hể. Ra là vậy.」"
# monologue
# JP: なぜだか稀咲は、少しつまらなそうな顔をする。
2533 = "Không hiểu sao, Kisaki lại làm ra vẻ mặt có chút chán nản."
# 【稀咲】
# display as 稀咲
# JP: 「まぁいいや。そういうこだわりを持つ人が多いから、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の新車販売では、移送手段の確保が重要になる」
2283 = "「Mà thôi bỏ đi. Vì có rất nhiều người kén chọn như vậy,\nnên trong việc bán xe \x%lエアクラ;#00ffc040;Aircra%l;#; mới, việc đảm bảo phương tiện vận chuyển là rất quan trọng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああそうか――\x%lエアクラ;#00ffc040;エアクラ%l;#;で\x%lエアクラ;#00ffc040;エアクラ%l;#;は」
1895 = "「À đúng rồi——dùng \x%lエアクラ;#00ffc040;Aircra%l;#; để vận chuyển \x%lエアクラ;#00ffc040;Aircra%l;#; thì」"
# 【稀咲】
# display as 稀咲
# JP: 「運べない。共振崩壊を起こすからね」
2141 = "「Không thể vận chuyển được. Vì sẽ gây ra hiện tượng sụp đổ cộng hưởng.」"
# monologue
# JP: 稀咲は苦笑し、指先で手元の資料をはじく。
2956 = "Kisaki cười gượng, dùng đầu ngón tay gõ nhẹ lên tập tài liệu trên tay."
# 【稀咲】
# display as 稀咲
# JP: 「日ノ本人特有の潔癖さは、\x%lエアクラ;#00ffc040;エアクラ%l;#;本社の想定外だった。\n他国では\x%lエアクラ;#00ffc040;エアクラ%l;#;を自走させて納品するらしいけど――」
2130 = "「Sự sạch sẽ đặc trưng của người Hinomoto nằm ngoài dự tính của trụ sở chính \x%lエアクラ;#00ffc040;Aircra%l;#;.\nỞ các nước khác, dường như họ đều cho \x%lエアクラ;#00ffc040;Aircra%l;#; tự chạy đến để giao hàng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「……自走させての納品が嫌われるなら、\nガソリンエンジン車でのトレーラー陸送となるか」
1406 = "「……Nếu việc tự chạy để giao hàng bị ghét bỏ,\nthì chỉ còn cách dùng xe tải động cơ xăng để vận chuyển đường bộ thôi sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。日ノ本国内での移送コストは、\n自走で納品できる地域の四十倍を上回ると資料にあるね」
2161 = "「Đúng vậy. Trong tài liệu có ghi, chi phí vận chuyển trong nội địa Hinomoto\ncao gấp 40 lần so với những khu vực có thể giao hàng bằng cách tự chạy đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「随分だな。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社にとっては、思わぬ落とし穴となったわけか」
1970 = "「Chi phí cao thật đấy.\nĐối với công ty \x%lエアクラ;#00ffc040;Aircra%l;#;, đây quả là một cái bẫy không ngờ tới nhỉ.」"
# monologue
# JP: そう考えると、トヨダ、ポンダ、ニッサヌ、マチダ――
3065 = "Nghĩ vậy, Toyoda, Ponda, Nissanu, Machida——"
# monologue
# JP: ガソリンエンジン車から\x%lエアクラ;#00ffc040;エアクラ%l;#;車へと移行した、\n国内主要自動車メーカーがいかに老獪か僕にもわかる。
3056 = "Tôi cũng hiểu được các nhà sản xuất ô tô lớn trong nước đã chuyển đổi từ\nxe động cơ xăng sang xe \x%lエアクラ;#00ffc040;Aircra%l;#; lão luyện đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば国内メーカーは、\x%lエアクラ;#00ffc040;エアクラ%l;#;旋風による大廃線で、\n鉄道網がずたずたに寸断されている間に――」
2360 = "「Nếu vậy, trong khi mạng lưới đường sắt bị cắt đứt tả tơi bởi\nđợt Đại bãi bỏ tuyến do cơn sốt \x%lエアクラ;#00ffc040;Aircra%l;#; gây ra, các nhà sản xuất trong nước đã——」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。彼らは生産・移送の体制を虎視眈々と整えた。\nそして、大廃線の済んだ後、シェア奪回に動き始めた」
2183 = "「Đúng vậy. Họ đã nhòm ngó và chuẩn bị sẵn sàng hệ thống sản xuất và vận chuyển.\nSau đó, khi đợt Đại bãi bỏ tuyến kết thúc, họ bắt đầu hành động để giành lại thị phần.」"
# monologue
# JP: 当初は\x%lエアクラ;#00ffc040;エアクラ%l;#;社製品以外に選択肢は無く、\n誰もがそれに飛びついていた。
2526 = "Ban đầu, ngoài sản phẩm của công ty \x%lエアクラ;#00ffc040;Aircra%l;#; ra thì không có lựa chọn nào khác,\nnên ai cũng đổ xô vào nó."
# monologue
# JP: 品薄は熱狂を呼び、熱狂はさらなる品薄を生んだ――が。
2982 = "Tình trạng khan hiếm hàng hóa tạo ra sự cuồng nhiệt, và sự cuồng nhiệt lại càng làm cho tình trạng khan hiếm trở nên trầm trọng hơn——nhưng."
# 【稀咲】
# display as 稀咲
# JP: 「動乱期が過ぎ、国内メーカーも自社製品を出し始め、\n選べるようになればやはり、潔癖さが発揮されたのさ」
1817 = "「Thời kỳ hỗn loạn qua đi, các nhà sản xuất trong nước cũng bắt đầu tung ra sản phẩm của riêng mình,\nkhi đã có sự lựa chọn thì tính ưa sạch sẽ lại được phát huy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かくて、痒いところに手がとどく国内メーカー製品が、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社製品を駆逐していった――という流れか」
2115 = "「Kết quả là, những sản phẩm của các nhà sản xuất trong nước gãi đúng chỗ ngứa\nđã đánh bật sản phẩm của công ty \x%lエアクラ;#00ffc040;Aircra%l;#;——là diễn biến như vậy sao.」"
# monologue
# JP: 稀咲の顔が満足そうだ。\n僕の理解は、合格点をもらえたらしい。
2915 = "Gương mặt Kisaki lộ vẻ hài lòng.\nCó vẻ như sự hiểu biết của tôi đã đạt điểm tuyệt đối."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社製の\x%lエアクラ;#00ffc040;エアクラ%l;#;をあまり見かけんのには、\nなるほど、そうした事情があったのか」
1822 = "「Việc hiếm khi bắt gặp \x%lエアクラ;#00ffc040;Aircra%l;#; do công ty \x%lエアクラ;#00ffc040;Aircra%l;#; sản xuất,\nra là có những uẩn khúc như vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社としては、当然現状を打開したい。\nシェアを回復し、地盤と実績とを固めておく必要がある」
1372 = "「Về phía công ty \x%lエアクラ;#00ffc040;Aircra%l;#;, dĩ nhiên họ muốn phá vỡ cục diện hiện tại.\nCần phải khôi phục thị phần, củng cố nền tảng và thành tích.」"
# monologue
# JP: 勢いも良く資料を広げ、その中の、\n『長期戦略』と書かれたページを稀咲は示す。
2936 = "Kisaki dứt khoát mở tài liệu ra, chỉ vào trang\ncó dòng chữ 『Chiến lược dài hạn』."
# 【稀咲】
# display as 稀咲
# JP: 「いずれ飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;を普及させるそのときに、\n今回と同じ[てつ]轍を踏まないようにね」
2206 = "「Để đến một lúc nào đó, khi phổ biến \x%lエアクラ;#00ffc040;Aircra%l;#; loại bay,\nsẽ không lặp lại vết xe đổ như lần này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……バンソーコ社と同じ構図か。\n知名度は圧倒的でも、国内シェアはそれに遠く及ばない」
1399 = "「……Cùng một kịch bản với công ty Bansoko sao.\nMặc dù độ nhận diện thương hiệu áp đảo, nhưng thị phần trong nước lại kém xa.」"
# monologue
# JP: 簡易的傷保護テープの、バンソーコ。
1349 = "Băng dán bảo vệ vết thương đơn giản, Bansoko."
# monologue
# JP: 誰もがそれをバンソーコと呼び、しかし実際使ってるのは、\nバンテープだのバンガードだのの、他社製品だったりする。
2551 = "Mọi người đều gọi nó là Bansoko, nhưng thực tế những thứ họ sử dụng lại là\nsản phẩm của công ty khác như Bantape hay Vanguard."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社も\x%lエアクラ;#00ffc040;エアクラ%l;#;社で大変なのだな。\nこの世の春を[おうか,1]謳歌しているものだと思っていたが」
1370 = "「Công ty \x%lエアクラ;#00ffc040;Aircra%l;#; cũng có những khó khăn riêng của công ty \x%lエアクラ;#00ffc040;Aircra%l;#; nhỉ.\nTôi cứ tưởng họ đang ca ngợi mùa xuân của thế gian này cơ.」"
# 【稀咲】
# display as 稀咲
# JP: 「今はまだエアロ＝クラフテック機関の[パテントフィー,2]特許料があるから、\nこの世の春は春だろうけど……[おうか,1]謳歌する余裕なんて、ね」
2223 = "「Bây giờ vẫn còn phí bản quyền của động cơ Aero-Craftech,\nnên mùa xuân của thế gian này vẫn là mùa xuân thôi…… nhưng làm gì có dư dả để mà ca ngợi chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今はまだ――か。\n言われてみれば、確かに、だな」
2222 = "「Bây giờ vẫn còn——sao.\nNghe cô nói vậy, quả thực là thế nhỉ.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;機関がいかに完成されたものであっても、\nその特許を侵さない代替品は、いずれ開発されるだろう。
2845 = "Dù cho động cơ \x%lエアクラ;#00ffc040;Aircra%l;#; có hoàn thiện đến đâu,\nnhững sản phẩm thay thế không vi phạm bằng sáng chế đó rồi sẽ sớm được phát triển thôi."
# monologue
# JP: 特許料が不要になる分の値下げをされれば、\n代替品に、さらにシェアを削られる未来も十分ありえる。
2694 = "Nếu giá giảm xuống nhờ việc không cần trả phí bản quyền,\nthì viễn cảnh thị phần bị các sản phẩm thay thế bào mòn thêm nữa là hoàn toàn có thể xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「闘争、と元忠氏が言っていたが――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社もまた、闘争の中にあるのだな」
1784 = "「Ông Mototada đã nói về cuộc đấu tranh——\ncông ty \x%lエアクラ;#00ffc040;Aircra%l;#; cũng đang ở giữa một cuộc đấu tranh nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。[みぎたいちしゅぞうもと,5]右田一酒造元もそうだろうし、\n[くまぎん,1]隈銀だって、例外じゃない」
2151 = "「Đúng vậy. Xưởng rượu Migita System cũng thế,\nvà Kumagin cũng không ngoại lệ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「隈銀が？　隈元県内では無双だろうに」
2341 = "「Cả Kumagin sao? Tôi tưởng ở trong tỉnh Kumamoto thì các cô là vô song rồi chứ.」"
# 【稀咲】
# display as 稀咲
# JP: 「[かごぎん,2]鹿兒銀はいつだって[くまもと,1]隈元進出を狙ってる。\n県内最大信金の[くましん,1]隈信との合併の噂話だってある」
2391 = "「Kagogin lúc nào cũng nhăm nhe tiến vào Kumamoto.\nThậm chí còn có tin đồn họ sẽ sáp nhập với Kumashin, tổ chức tín dụng lớn nhất trong tỉnh nữa cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2158 = "「Vậy sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「みんな、闘争の中にあるのさ。\nだからこそ、手を取れる相手とならば、手を取り合う」
2280 = "「Mọi người, đều đang ở giữa một cuộc đấu tranh.\nChính vì thế, nếu có đối tác có thể nắm tay, thì hãy cùng nhau nắm tay.」"
# monologue
# JP: 当然のことだと言わんばかりに、\n稀咲はその手を、僕にまっすぐ差し出してくる。
2917 = "Như thể đó là điều hiển nhiên,\nKisaki đưa tay thẳng về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「こういう風にか？」
1779 = "「Theo kiểu này sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、こういう風に」
2000 = "「Đúng vậy, theo kiểu này.」"
# monologue
# JP: 握手は、やはり力強い。
2941 = "Cái bắt tay, quả nhiên rất mạnh mẽ."
# monologue
# JP: 満足そうに稀咲は笑い、\n解いた手を軽く、ぐ、ぱ、とやって、また書類を取る。
2653 = "Kisaki cười mãn nguyện,\nsau khi buông tay ra, cô ấy nhẹ nhàng nắm lại rồi mở ra, sau đó lại cầm tài liệu lên."
# 【稀咲】
# display as 稀咲
# JP: 「もっともこういうのは、\n銀行にとっては、大変結構な状況なんだけどね」
1699 = "「Dù sao thì những chuyện như thế này,\nđối với ngân hàng mà nói, lại là một tình huống cực kỳ tuyệt vời đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「闘争がか？」
1759 = "「Là đấu tranh sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「闘争と協調との繰り返しが、さ。\n健全な競争が技術発展を生み、経済が好循環していく」
2087 = "「Là sự lặp đi lặp lại của đấu tranh và hợp tác.\nCạnh tranh lành mạnh sẽ tạo ra sự phát triển công nghệ, và nền kinh tế sẽ vận hành theo một vòng tuần hoàn tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1924 = "「À……」"
# 【稀咲】
# display as 稀咲
# JP: 「闘争だけでは破綻が生じる。どんな小さな破綻でも、\n生じればそれは、悪影響を連鎖させてく」
1746 = "「Chỉ có đấu tranh thì sẽ nảy sinh sự sụp đổ. Dù là sự sụp đổ nhỏ đến đâu,\nmột khi đã xảy ra thì nó sẽ kéo theo hàng loạt những ảnh hưởng xấu.」"
# monologue
# JP: 酒問屋としてのまだまだ浅い経験でさえ、\n稀咲の言葉は真実だという裏付けとなる。
3089 = "Dù kinh nghiệm làm việc ở xưởng rượu chưa nhiều,\nnhưng tôi vẫn có thể chứng minh lời Kisaki nói là sự thật."
# monologue
# JP: どんな小さな企業が出した不渡りだろうと、\n連鎖倒産の引き金になると――僕とて知ってる。
2736 = "Bất kể là tờ hối phiếu không thanh toán của một doanh nghiệp nhỏ đến đâu,\nnó cũng có thể trở thành ngòi nổ cho những vụ phá sản dây chuyền——tôi cũng biết điều đó."
# 【稀咲】
# display as 稀咲
# JP: 「かといって、協調だけでは緩やかな衰退は避け得ない。\nちょうど、御一夜が陥ってしまった状況のようにね」
1750 = "「Tuy nhiên, nếu chỉ có hợp tác thì cũng không thể tránh khỏi sự suy thoái chậm chạp.\nGiống hệt như tình trạng mà Ohimitera đang mắc phải vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、だな」
1987 = "「Chính xác là vậy.」"
# monologue
# JP: 稀咲の言葉が僕の視界を、\nより広く、より深くへと導いてくれる。
2945 = "Lời nói của Kisaki đã dẫn dắt tầm nhìn của tôi,\ntrở nên rộng lớn hơn, sâu sắc hơn."
# monologue
# JP: 元忠氏が、稀咲が、浦上さんが見ているものを、\nほんの少しだけ、見せてもらってるような気になる。
2723 = "Tôi có cảm giác như mình đã nhìn thấy được một chút xíu\nnhững gì mà ông Mototada, Kisaki, và anh Urakami đang thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「社会が硬直化しないよう、好循環を生むために、\n銀行は資金を融通し、経済を活性化させているのか」
2204 = "「Để xã hội không bị cứng nhắc, để tạo ra một vòng tuần hoàn tốt,\nngân hàng đã điều tiết dòng vốn, làm cho nền kinh tế trở nên sôi động hơn sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ちょっと大げさな言い方すぎるよ。\nお預かりして、お貸しする――ただ、それだけさ」
2340 = "「Anh nói hơi quá lời rồi đấy.\nChỉ là nhận tiền gửi, rồi cho vay——đơn giản là vậy thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「預かって、貸す、か」
2168 = "「Nhận tiền gửi, rồi cho vay, sao.」"
# monologue
# JP: 余剰資金を、足りない場所に再配置する。\nそれが無ければ、社会はどんどん固定化していく。
2690 = "Tái phân bổ số vốn dư thừa đến những nơi đang thiếu hụt.\nNếu không có điều đó, xã hội sẽ dần dần trở nên cố định."
# monologue
# JP: その判断が正しいものなら、社会は活性化するのだろうし、\n間違えれば――銀行さえもが、破綻してしまうこともある。
2672 = "Nếu phán đoán đó là đúng đắn, xã hội có lẽ sẽ được tiếp thêm sinh lực,\ncòn nếu sai lầm——thì ngay cả ngân hàng cũng có thể bị phá sản."
# 【双鉄】
# display as 雙鐵
# JP: 「……大変なことだな。\n楽な仕事だと、今まで誤解してしまっていた」
1408 = "「……Thật là một công việc khó khăn.\nCho đến tận bây giờ tôi vẫn luôn hiểu lầm rằng đó là một công việc nhàn hạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「よく言われる。けど、他の仕事も同じだろう？\n楽しさと、苦しさと、難しさ。全部をきっと持っている」
2101 = "「Tôi thường nghe người ta nói vậy. Nhưng những công việc khác cũng giống thế mà?\nChắc chắn công việc nào cũng có niềm vui, nỗi khổ, và sự khó khăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだな。本当にそうだ」
1927 = "「À…… đúng vậy. Quả thực là vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ともあれ、隈銀と\x%lエアクラ;#00ffc040;エアクラ%l;#;社との現状について、\n双鉄が興味を持ってくれたみたいで、嬉しいよ」
2292 = "「Dù sao thì, tôi rất vui vì anh Soutetsu có vẻ đã hứng thú\nvới tình trạng hiện tại của Kumagin và công ty \x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# monologue
# JP: 稀咲の言葉のトーンが少し変わった気がして、\nようやく気づく。
2834 = "Cảm thấy tông giọng của Kisaki có chút thay đổi,\ncuối cùng tôi cũng nhận ra."
# monologue
# JP: 一階がざわめきはじめているし、\nドアの向こうに、おそらくは浦上さんだろう気配も感じる。
2519 = "Tầng một đã bắt đầu nhộn nhịp,\nvà tôi cũng cảm nhận được sự hiện diện của ai đó, có lẽ là anh Urakami, ở phía bên kia cánh cửa."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。稀咲の解説はとてもためになった。ありがとう。\n資料は、持ち帰って読み込ませてもらう」
1931 = "「Ừm. Lời giải thích của Kisaki thực sự rất hữu ích. Cảm ơn cô.\nTôi xin phép mang tài liệu này về để đọc kỹ nhé.」"
# monologue
# JP: 稀咲の話の興味深さに、思わぬ長居をしてしまった。\nすっかりと熱を帯びたソファから、尻を浮かせる。
2944 = "Câu chuyện của Kisaki quá đỗi thú vị khiến tôi nán lại lâu hơn dự định.\nTôi nhấc mông khỏi chiếc ghế sofa đã ấm sực."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、ここまでで失礼しよう。\nで、明日だが」
1733 = "「Hôm nay, tôi xin phép cáo từ tại đây.\nCòn về ngày mai thì.」"
# 【稀咲】
# display as 稀咲
# JP: 「うんっ、よろしく！\n\x%l投炭;#00ffc040;投炭%l;#;練習は、たっぷりさせてもらったしね」
1940 = "「Ừm, mong anh giúp đỡ nhé!\nDù sao thì tôi cũng đã tập \x%l投炭;#00ffc040;thêm than%l;#; rất nhiều rồi mà.」"
# monologue
# JP: らしくもない、弾んだ声。ほほのてっぺんも赤くなってる。\nああ、そうなのかと嬉しく思う。
3064 = "Một giọng nói rộn ràng không giống cô ấy thường ngày chút nào. Đỉnh gò má cũng ửng đỏ.\nÀ, ra là vậy, tôi cảm thấy vui mừng trong lòng."
# monologue
# JP: \x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の\x%l運転台;#00ffc040;運転台%l;#;に乗れるとなれば、\n冷静な知性の人の稀咲でも、やはり興奮するものなのかと。
3016 = "Nghĩ đến việc được lên \x%l運転台;#00ffc040;buồng lái%l;#; của \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;,\nngay cả một người lý trí và điềm tĩnh như Kisaki quả nhiên cũng sẽ thấy phấn khích sao."
# 【稀咲】
# display as 稀咲
# JP: 「明日はキミに、たっぷりと、\n鉄道のことを教えてもらうよ？」
2133 = "「Ngày mai anh sẽ dạy cho tôi thật nhiều, thật nhiều về đường sắt đấy nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「わ、私が\x%l機関士;#00ffc040;機関士%l;#;代理だなんて――」
2017 = "「V, việc để em làm đại lý \x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;——」"
# monologue
# JP: ガチガチだ。\n見てて気の毒になるほどに、日々姫は固くなっている。
2795 = "Cứng đờ cả người rồi.\nHibiki đang căng thẳng đến mức nhìn mà thấy tội nghiệp."
# 【ハチロク】
# display as 八六
# JP: 「それが一番良い配置なのです、日々姫」
2336 = "「Đó là sự sắp xếp tốt nhất rồi, Hibiki.」"
# monologue
# JP: 鉄道を良く知るためには、\n乗務を体験してみるのが一番だ。
2842 = "Để hiểu rõ hơn về đường sắt,\ntrải nghiệm công việc của tổ lái là cách tốt nhất."
# monologue
# JP: が、数日程度の訓練で出来る\x%l機関士;#00ffc040;機関士%l;#;の仕事など、\n正真正銘、なにひとつない。
2569 = "Tuy nhiên, công việc của \x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; mà chỉ cần huấn luyện vài ngày là làm được thì,\nthực sự là chẳng có công việc nào cả."
# 【ハチロク】
# display as 八六
# JP: 「稀咲様が\x%l機関助士;#00ffc040;機関助士%l;#;見習い。双鉄様がその指導。\nとなれば、日々姫が\x%l機関士;#00ffc040;機関士%l;#;見習いで――」
2260 = "「Chị Kisaki sẽ làm \x%l機関助士;#00ffc040;phụ lái tàu%l;#; tập sự. Ngài Soutetsu sẽ hướng dẫn.\nNếu vậy, Hibiki sẽ làm \x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; tập sự——」"
# 【日々姫】
# display as 日日姬
# JP: 「わかってる。聞いたし。\nわかっててもやっぱり――プレッシャー」
2095 = "「Em biết. Em nghe rồi.\nDù biết là vậy nhưng quả nhiên——vẫn áp lực lắm.」"
# 【稀咲】
# display as 稀咲
# JP: 「困るよ先輩。\n先輩がそんな有り様じゃ、後輩はもっと不安になる」
2333 = "「Khó xử thật đấy tiền bối.\nTiền bối mà còn thế này thì, hậu bối sẽ càng bất an hơn đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　あのっ」
1887 = "「Ể!? Dạ.」"
# monologue
# JP: いたずらっぽい稀咲の声に、\nけれど日々姫は、ビクリとすくみあがってしまう。
2959 = "Trước giọng nói đầy vẻ trêu chọc của Kisaki,\nHibiki giật mình co rúm người lại."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩？」
2257 = "「Tiền bối Kisaki?」"
# 【稀咲】
# display as 稀咲
# JP: 「違うよ日々姫。ここは学園の中じゃない。\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の中においては、日々姫がボクの先輩だ」
1696 = "「Sai rồi Hibiki. Đây không phải là trong học viện.\nỞ bên trong \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;, Hibiki chính là tiền bối của tôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1899 = "「A——」"
# monologue
# JP: 口をつぐんで赤くなり。\n深呼吸して、目を閉じて。
2798 = "Em ấy ngậm miệng lại, mặt đỏ bừng.\nHít một hơi thật sâu, rồi nhắm mắt lại."
# monologue
# JP: そうして日々姫は、パンっ！　と自分の両頬を、\n手で挟むように勢い良く叩き鳴らす。
2850 = "Sau đó, Hibiki vỗ mạnh hai tay vào má mình một cái thật to, Bốp! "
# 【日々姫】
# display as 日日姬
# JP: 「ごめんなさい。今の無し！\n最初のとこからやりなおします！」
1999 = "「Em xin lỗi. Coi như chưa có chuyện vừa rồi nhé!\nChúng ta sẽ làm lại từ đầu!」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
2097 = "「Em hiểu rồi ạ.」"
# monologue
# JP: すました顔のハチロクと、\nそれでいい、と言わんばかりの稀咲の表情。
2595 = "Khuôn mặt tỉnh bơ của Hachiroku, và biểu cảm của Kisaki như muốn nói rằng,\nthế là được rồi."
# monologue
# JP: 二人の視線を一身に受け、\n日々姫は堂々、背筋を伸ばして号令をかける。
2793 = "Nhận lấy ánh nhìn của cả hai,\nHibiki đường hoàng thẳng lưng và hô khẩu lệnh."
# 【日々姫】
# display as 日日姬
# JP: 「[ハチロクニイマル,3]8620試験運転、運転準備に入ってください」
2397 = "「Chạy thử 8620, vui lòng chuẩn bị vận hành.」"
# 【稀咲】
# display as ３人
# JP: 『「運転準備、了解」「運転準備、了解」\n「運転準備、了解！」』
2406 = "『「Chuẩn bị vận hành, rõ」「Chuẩn bị vận hành, rõ」\n「Chuẩn bị vận hành, rõ!」』"
# monologue
# JP: 僕らの応答に一歩遅れて、\n稀咲は忠実にそれを真似する。
2940 = "Chậm hơn một nhịp so với câu trả lời của chúng tôi,\nKisaki cũng trung thành bắt chước theo."
# monologue
# JP: 見習いらしい初々しさと、それでも滲む有能さ。\nこれはきちんと指導せねばと、心の背筋も伸ばされる。
2857 = "Sự ngây ngô đúng chất một người tập sự, nhưng vẫn toát lên vẻ tài năng.\nThấy vậy, tôi cũng xốc lại tinh thần, tự nhủ phải hướng dẫn đàng hoàng mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l機関助士;#00ffc040;機関助士%l;#;が、まず真っ先に点検すべきは\x%l溶栓;#00ffc040;[とけせん,1]溶栓%l;#;だ」
1375 = "「Điều đầu tiên mà \x%l機関助士;#00ffc040;phụ lái tàu%l;#; phải kiểm tra là \x%l溶栓;#00ffc040;nút chảy an toàn%l;#;.」"
# 【稀咲】
# display as 稀咲
# JP: 「トケセン？」
2139 = "「Nút chảy an toàn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「溶ける栓と書いて、\x%l溶栓;#00ffc040;溶栓%l;#;。\nその名の通り、芯の部分が鉛でできている栓だ」
2013 = "「Viết là nút dễ nóng chảy, đọc là \x%l溶栓;#00ffc040;nút chảy an toàn%l;#;.\nĐúng như tên gọi, nó là một cái nút có phần lõi làm bằng chì.」"
# 【稀咲】
# display as 稀咲
# JP: 「というと――\n鉛は……溶けやすい金属なのかい？」
2358 = "「Nói vậy tức là——\nchì…… là kim loại dễ nóng chảy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ。それゆえ、これ――」
2311 = "「Quan sát tinh tế đấy. Vì thế, đây——」"
# monologue
# JP: \x%l火室;#00ffc040;火室%l;#;の焚き口戸を開き、\x%l保火;#00ffc040;保火%l;#;状態の石炭の上、\n天井部分、デベソのような突起を[ポーカー,3]火掻き棒で指し示す。
2741 = "Tôi mở cửa tiếp than của \x%l火室;#00ffc040;buồng đốt%l;#;, dùng \x%lポーカー;#00ffc040;móc bếp%l;#; chỉ vào phần trần ngay phía trên đống than đang ở trạng thái \x%l保火;#00ffc040;giữ lửa%l;#;, nơi có một phần nhô ra giống như cái rốn lồi."
# 【双鉄】
# display as 雙鐵
# JP: 「この\x%l溶栓;#00ffc040;溶栓%l;#;は、安全装置の役割を果たしてくれる」
2330 = "「\x%l溶栓;#00ffc040;Nút chảy an toàn%l;#; này đóng vai trò như một thiết bị an toàn.」"
# monologue
# JP: ボイラ水が減少しすぎて、空焚きに近い状態になると、\n\x%l溶栓;#00ffc040;溶栓%l;#;が水から露出し、熱の直射を受けてすぐさま融解する。
2859 = "Khi nước trong lò hơi giảm đi quá nhiều, tiến gần đến trạng thái cháy khô,\n\x%l溶栓;#00ffc040;nút chảy an toàn%l;#; sẽ lộ ra khỏi mặt nước, chịu sự chiếu xạ trực tiếp của nhiệt và tan chảy ngay lập tức."
# monologue
# JP: すると\x%l火室;#00ffc040;火室%l;#;に逆流した蒸気が一気に吹き出して、\n非常に危険な状態だと、警告してくれることとなる。
3058 = "Khi đó, hơi nước chảy ngược vào \x%l火室;#00ffc040;buồng đốt%l;#; sẽ phụt ra mạnh mẽ,\ncảnh báo cho chúng ta biết rằng tình trạng đang cực kỳ nguy hiểm."
# 【稀咲】
# display as 稀咲
# JP: 「もし、\x%l溶栓;#00ffc040;溶栓%l;#;が機能しないとどうなるんだい？」
1975 = "「Nếu \x%l溶栓;#00ffc040;nút chảy an toàn%l;#; không hoạt động thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ボイラそのものが溶け始め、圧力に耐えられなくなり、\nボイラ爆発を起こしてしまうと聞いている」
2102 = "「Nghe nói bản thân lò hơi sẽ bắt đầu nóng chảy, không thể chịu nổi áp suất,\ndẫn đến phát nổ lò hơi.」"
# 【稀咲】
# display as 稀咲
# JP: 「爆発」
2216 = "「Phát nổ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうならないよう、\x%l溶栓;#00ffc040;溶栓%l;#;が落ちたら火をすぐ消すこと。\nそれ以前に、\x%l溶栓;#00ffc040;溶栓%l;#;を落とさないようすることが重要だ」
2208 = "「Để không xảy ra chuyện đó, nếu \x%l溶栓;#00ffc040;nút chảy an toàn%l;#; rớt xuống thì phải lập tức dập lửa.\nNhưng trước đó, việc quan trọng nhất là không được để \x%l溶栓;#00ffc040;nút chảy an toàn%l;#; rớt xuống.」"
# 【稀咲】
# display as 稀咲
# JP: 「わ、わかったよ」
2068 = "「T, tôi hiểu rồi.」"
# monologue
# JP: おそるおそる、と、言葉をそのまま仕草にし、\n\x%l火室;#00ffc040;火室%l;#;天井を覗き込むべく、稀咲は体を折り曲げて――
2933 = "Kisaki rụt rè làm theo lời nói,\ngập người lại để nhìn lên trần \x%l火室;#00ffc040;buồng đốt%l;#;——"
# 【稀咲】
# display as 稀咲
# JP: 「熱っ！？　熱っ！！？　な、なんだいこの熱気は？」
1973 = "「Nóng!? Nóng quá!!? C, cái luồng khí nóng này là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;しているのだ。\n石炭の熱の[ほか]他になかろう」
1952 = "「Vì đang \x%l保火;#00ffc040;giữ lửa%l;#; mà.\nLàm gì còn thứ gì khác ngoài nhiệt lượng của than đá chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ってぇ」
1868 = "「Ái chà.」"
# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;側で、日々姫が盛大にずっこける。\nそうされ、気付き。
2634 = "Ở phía ghế \x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;, Hibiki trượt chân ngã cái oạch.\nNhờ vậy tôi mới nhận ra."
# monologue
# JP: 自分自身が意図せぬところで、\n下らぬダジャレを口にしてしまっていたことに。
2874 = "Bản thân mình vừa vô tình thốt ra\nmột câu chơi chữ nhạt nhẽo. (Bảo hỏa - Hoka / Ngoài ra - Hoka)"
# 【稀咲】
# display as 稀咲
# JP: 「ボクには、そのホカもわからない」
2080 = "「Tôi thì chẳng hiểu nổi cái thứ khác đó là gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1937 = "「À, xin lỗi.」"
# monologue
# JP: 気にしていない様子の稀咲に、\nなぜかはしらねどホっとする。
2871 = "Thấy Kisaki có vẻ không để tâm,\nkhông hiểu sao tôi lại thở phào nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「火を保つで、\x%l保火;#00ffc040;保火%l;#;。つまり、今、積まれた石炭の内側で\nくすぶりながらも、火は燃え続けているのだ」
2228 = "「Giữ cho lửa không tắt, gọi là \x%l保火;#00ffc040;giữ lửa%l;#;. Tức là hiện tại, ngọn lửa vẫn đang tiếp tục cháy âm ỉ bên trong đống than chất cao kia.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ……その熱か。\n炎も立っていないのに、随分と熱いものなのだね」
1905 = "「A…… là nhiệt lượng đó sao.\nDù không thấy ngọn lửa bốc lên, nhưng vẫn nóng kinh khủng nhỉ.」"
# monologue
# JP: かなり新鮮な反応だ。
2877 = "Một phản ứng khá là mới mẻ."
# monologue
# JP: 僕も確かに、初の訓練乗務のときには、\n“熱くて辛い”と、感じていたはずなのだけれども。
2535 = "Quả thực, trong lần huấn luyện tổ lái đầu tiên,\nlẽ ra tôi cũng phải cảm thấy \"nóng và khó chịu\" mới đúng."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんが、もう少し熱くなる。\nゆっくりやるから、覚悟してくれ。いいか？」
1693 = "「Xin lỗi nhé, nhưng lát nữa sẽ còn nóng hơn nữa đấy.\nTôi sẽ làm từ từ thôi, nên cô hãy chuẩn bị tinh thần đi. Rõ chưa?」"
# 【稀咲】
# display as 稀咲
# JP: 「えっ！？　ちょっ！」
1885 = "「Ể!? Khoan đã!」"
# monologue
# JP: （ガツッ！）
3115 = "（Cạch!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひゃっ！？」
1859 = "「Á!?」"
# monologue
# JP: （ボウっ！！！）
3130 = "（Bùng!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「きゃあああああっ！」
1857 = "「Kyaaaaa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
2048 = "「Gì vậy!?」"
# monologue
# JP: \x%lポーカー;#00ffc040;ポーカー%l;#;で石炭を突き崩せば、\n\x%l保火;#00ffc040;保火%l;#;状態から一気に炎が立ち上がる。
2750 = "Khi tôi dùng \x%lポーカー;#00ffc040;móc bếp%l;#; đâm nát đống than,\nngọn lửa bùng lên dữ dội từ trạng thái \x%l保火;#00ffc040;giữ lửa%l;#;."
# monologue
# JP: ただそれだけのことに、けれども、\n稀咲は怯えた声をあげ、僕の体に抱きついてくる。
2625 = "Chỉ có vậy thôi, nhưng\nKisaki lại hét lên sợ hãi và ôm chầm lấy tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした。\nもしや、火が苦手なのか？」
2047 = "「Sao thế.\nChẳng lẽ, cô sợ lửa à?」"
# 【稀咲】
# display as 稀咲
# JP: 「ふ、普通の火なら平気だけどさ。\n驚くだろう！？　こんな、地獄の窯みたいな火」
1674 = "「B, bình thường thì tôi không sợ đâu.\nNhưng mà giật mình chứ sao!? Ngọn lửa cứ như lò bát quái thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、もっと燃やさねば、\nまるで蒸気が足りなくなるぞ」
1683 = "「Không không, nếu không đốt cháy mạnh hơn nữa,\nhơi nước sẽ thiếu mất.」"
# 【稀咲】
# display as 稀咲
# JP: 「もっと！？　って、あっ」
2346 = "「Còn mạnh hơn nữa sao!? Ư, a.」"
# monologue
# JP: 抱きつかれている手をひるがえし、\n稀咲の体を僕の方から包み込む。
2734 = "Tôi gỡ đôi bàn tay đang ôm chặt lấy mình ra,\nvà vòng tay ôm trọn lấy cơ thể Kisaki."
# monologue
# JP: 手に手を重ねてワンスコをもたせ、\n石炭を掬い、投げ入れる。
3030 = "Đặt tay cô ấy lên tay tôi để cầm xẻng xúc than,\nxúc một xẻng than rồi ném vào trong."
# monologue
# JP: （ざくっ――ボッっ！）
3123 = "（Phập——Bùng!）"
# 【稀咲】
# display as 稀咲
# JP: 「きゃ、わっ――熱っ！」
1863 = "「Kya, oa——nóng quá!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなに熱いか？　もしも無理なら」
2170 = "「Nóng đến thế sao? Nếu không chịu nổi thì」"
# 【稀咲】
# display as 稀咲
# JP: 「い、いやっ――」
1678 = "「Kh, không phải——」"
# monologue
# JP: 腕の中から僕を見上げて、\n\x%lカマ;#00ffc040;カマ%l;#;の火を見て。
2928 = "Từ trong vòng tay tôi, cô ấy ngước lên nhìn tôi,\nrồi lại nhìn ngọn lửa trong \x%lカマ;#00ffc040;lò hơi%l;#;."
# monologue
# JP: そうして稀咲は、\n炎に煽られ真っ赤になった顔で頷く。
2849 = "Sau đó, với khuôn mặt đỏ bừng vì bị ngọn lửa hắt vào,\nKisaki gật đầu."
# 【稀咲】
# display as 稀咲
# JP: 「ちょっと驚いた、だけ――かな。\nうん……我慢、できない――ほどじゃない、よ」
1847 = "「Chỉ là hơi giật mình, một chút——thôi.\nỪm…… không đến mức, không thể chịu đựng được, đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　無理そうだったら、すぐに言えよ？」
2159 = "「Vậy sao? Nếu thấy quá sức thì phải nói ngay đấy nhé?」"
# monologue
# JP: （ざくっ――ボッ！）
# 3123 = "（沙沙——轟！）" 
# monologue
# JP: （ざくっ――ボっ！）
# 3123 = "（沙沙——轟！）" 
# monologue
# JP: ああ――ハチロクの事前訓練の成果もあろうが、\nやはり稀咲は勘がいい。
2631 = "À——có lẽ cũng nhờ thành quả huấn luyện trước đó của Hachiroku,\nnhưng quả thực Kisaki có trực giác rất nhạy bén."
# monologue
# JP: ほんの数回のリードをすれば、\nそれだけで、的確に手首を返し始める。
2579 = "Chỉ cần tôi dẫn dắt vài lần,\ncổ tay cô ấy đã bắt đầu đảo một cách chính xác."
# 【稀咲】
# display as 稀咲
# JP: 「ん……これは――リズムがつかめると……\nふふ、体がかなりキツイけれども――少し、楽しい」
1930 = "「Ưm…… cái này——một khi đã nắm được nhịp độ thì……\nfufu, mặc dù cơ thể khá mỏi——nhưng lại thấy, hơi vui vui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら何よりだ」
2356 = "「Vậy thì tốt quá rồi.」"
# monologue
# JP: 文武両道と日々姫からさんざ聞かされてもいたが……\nこの調子なら、しばらくは任せておいて大丈夫だろう。
2796 = "Hibiki đã kể cho tôi nghe rất nhiều về sự văn võ song toàn của cô ấy……\nvới tình hình này, chắc giao phó cho cô ấy một lúc cũng không sao đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、こっちも見ておいてもらえるか？」
1791 = "「Hachiroku, em trông chừng bên này giúp tôi được không?」"
# 【ハチロク】
# display as 八六
# JP: 「お任せください。いってらっしゃいませ」
2312 = "「Xin cứ giao cho em. Ngài đi cẩn thận ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「って、双鉄？　どこへいくんだい？」
1919 = "「Ơ, anh Soutetsu? Anh đi đâu vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「各部点検だ。長くはかからん」
1829 = "「Tôi đi kiểm tra các bộ phận. Sẽ không lâu đâu.」"
# monologue
# JP: 助士側計器の動作と状態を確認し、\n終えれば素早くキャブを出る。
2889 = "Xác nhận hoạt động và tình trạng của các đồng hồ đo bên phía phụ lái,\nxong xuôi tôi nhanh chóng rời khỏi buồng lái."
# monologue
# JP: ボイラ各部を確認し、油ポンプの動作を確かめ、\n\x%l炭水車;#00ffc040;炭水車%l;#;を見、砂箱を見て、必要各所に給油する。
2819 = "Kiểm tra các bộ phận của lò hơi, xác nhận hoạt động của bơm dầu,\nxem xét \x%l炭水車;#00ffc040;toa tiếp than nước%l;#;, hộp cát, và tra dầu vào những vị trí cần thiết."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1974 = "「Tốt!」"
# monologue
# JP: キャブへ戻れば、日々姫が窓から顔を出し、\nポーレットとなにやら確認している。
2758 = "Khi tôi quay lại buồng lái, Hibiki đang thò đầu ra ngoài cửa sổ,\ncó vẻ như đang xác nhận gì đó với Paulette."
# 【稀咲】
# display as 稀咲
# JP: 「おかえり双鉄、どうだった？」
2385 = "「Anh Soutetsu về rồi à, sao rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「万事万全、異常なしだ」
2298 = "「Mọi thứ đều hoàn hảo, không có gì bất thường.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;側も異常なしです。\nポーレット様から出発合図が出れば――あっ」
1378 = "「Phía \x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; cũng không có gì bất thường ạ.\nChỉ cần Thị trưởng Paulette phát tín hiệu xuất phát là——a.」"
# monologue
# JP: 窓から顔を戻した日々姫は、\n引き締まった顔で前方をじっと注視する。
2715 = "Hibiki rụt đầu vào từ ngoài cửa sổ,\nkhuôn mặt căng thẳng nhìn chằm chằm về phía trước."
# monologue
# JP: 窓の向こうに振られる\x%l緑旗;#00ffc040;緑旗%l;#;。\nポーレットの示した出発合図だ。
67 = "\x%l緑旗;#00ffc040;Cờ xanh lá%l;#; phất lên bên ngoài cửa sổ.\nĐó là tín hiệu xuất phát do Paulette đưa ra."
# 【日々姫】
# display as 日日姬
# JP: 「本線――」
2025 = "「Tuyến chính——」"
# monologue
# JP: 出発信号機を確かめて、日々姫は大きく息を吸う。
2888 = "Sau khi xác nhận tín hiệu xuất phát, Hibiki hít một hơi thật sâu."
# 【稀咲】
# display as 日日姬＆雙鐵＆稀咲
# JP: 『「出発！　進行っ！！」「出発、進行」\n「出発！　進行！」』
2402 = "『「Xuất phát! Tiến lên!!」「Xuất phát, tiến lên」\n「Xuất phát! Tiến lên!」』"
# monologue
# JP: 今度は稀咲も、見事な\x%l喚呼;#00ffc040;喚呼%l;#;。
3061 = "Lần này Kisaki cũng thực hiện \x%l喚呼;#00ffc040;hô xác nhận%l;#; rất xuất sắc."
# monologue
# JP: 水面計を確認し、稀咲にも指差してみせながら、\n状態を日々姫に報告する。
2755 = "Tôi xác nhận đồng hồ đo mực nước, vừa chỉ cho Kisaki xem,\nvừa báo cáo tình trạng cho Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「[かんすい,1]缶水八十、良しっ！」
2219 = "「Nước lò 80, tốt!」"
# 【日々姫】
# display as 日日姬
# JP: 「[かんすい,1]缶水八十了解、発車！」
2218 = "「Đã rõ nước lò 80, xuất phát!」"
# monologue
# JP: （ポーーーーーーッ！）
3128 = "（Tuúúúúúúúúúúú!）"
# 【稀咲】
# display as 稀咲
# JP: 「わ――動いたっ！」
1878 = "「Oa——chạy rồi!」"
# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;一声、日々姫-ハチロクコンビの操る\x%l8620;#00ffc040;8620%l;#;は、\nスムーズにレールを掴み、走りだす。
2522 = "Một tiếng \x%l汽笛;#00ffc040;còi hơi nước%l;#; vang lên, chiếc \x%l8620;#00ffc040;8620%l;#; do bộ đôi Hibiki và Hachiroku điều khiển\nbám lấy đường ray một cách trơn tru và bắt đầu lăn bánh."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、六、七杯投げ込んでおいてくれ」
2270 = "「Kisaki, xúc thêm sáu, bảy xẻng nữa đi.」"
# 【稀咲】
# display as 稀咲
# JP: 「りょ、了解」
2114 = "「R, rõ.」"
# monologue
# JP: \x%lブロワー;#00ffc040;ブロワー%l;#;を切り稀咲に指示して、後方確認。\n異常なし。ポーレットの姿がみるみる小さくなっていく。
2760 = "Tắt \x%lブロワー;#00ffc040;thiết bị thổi gió%l;#;, tôi chỉ thị cho Kisaki rồi kiểm tra phía sau.\nKhông có gì bất thường. Hình dáng của Paulette nhỏ dần đi trong chớp mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「後部異状、無しっ！」
2032 = "「Phía sau không có gì bất thường!」"
# 【日々姫】
# display as 日日姬
# JP: 「後部異状なし、了解！」
2033 = "「Đã rõ phía sau không có gì bất thường!」"
# monologue
# JP: テンションがよほどあがっているのか、\nそれとも稀咲に準備の時間を与えるためか。
2626 = "Có lẽ vì quá phấn khích,\nhoặc cũng có thể là để cho Kisaki có thời gian chuẩn bị."
# monologue
# JP: 普段はしない細かいことまで、\n日々姫は律儀に\x%l喚呼;#00ffc040;喚呼%l;#;する。
2699 = "Ngay cả những chi tiết nhỏ nhặt bình thường không làm,\nHibiki cũng cẩn thận \x%l喚呼;#00ffc040;hô xác nhận%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「加速しますっ！」
2368 = "「Tăng tốc đây!」"
# monologue
# JP: （ぐんっ！）
3134 = "（Rầm!）"
# 【稀咲】
# display as 稀咲
# JP: 「わっ、わわっ！？」
1880 = "「Oa, oái!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「怯むな稀咲、煽られるぞっ！」
1797 = "「Đừng chùn bước Kisaki, sẽ bị thổi bay đấy!」"
# 【稀咲】
# display as 稀咲
# JP: 「そ、そんなこと言ったって――\n速い！　速い速い！　落ちる落ちる落ちるっ！」
2004 = "「N, nói thì nói thế——\nNhanh quá! Nhanh nhanh nhanh! Rơi rơi rơi mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1798 = "「Không sao đâu.」"
# monologue
# JP: （ぐいっ！）
3122 = "（Giật mạnh!）"
# 【稀咲】
# display as 稀咲
# JP: 「あっ」
1906 = "「A.」"
# monologue
# JP: 稀咲を抱き寄せ、僕の体につかまらせる。
2744 = "Tôi ôm Kisaki vào lòng, để cô ấy bám chặt lấy người tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「怖いなら、慣れるまでしがみついておけ。\n今まで一度も、キャブから落ちたことの無い僕に」
1991 = "「Nếu sợ thì cứ bám chặt lấy tôi cho đến khi quen đi.\nTừ trước đến giờ, tôi chưa từng rơi khỏi buồng lái bao giờ đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「う……うんっ」
1865 = "「Ư…… ừm.」"
# monologue
# JP: （きゅっ）
3127 = "（Nắm chặt）"
# monologue
# JP: 速度におびえている割に、やけに弱々しい手つき。\nが、こちらもそうそう止まってられない。
3093 = "Mặc dù sợ hãi trước tốc độ, nhưng lực tay cô ấy bám vào lại yếu ớt đến kỳ lạ.\nTuy nhiên, chúng tôi cũng không thể dừng lại dễ dàng thế được."
# monologue
# JP: なにせ加速だ。火と水をいくら与えても、\n\x%l8620;#00ffc040;8620%l;#;はもっともっとと、貪欲に求め息を荒げる。
2855 = "Dù sao thì tàu đang tăng tốc mà. Cho dù có thêm bao nhiêu lửa và nước đi chăng nữa,\nchiếc \x%l8620;#00ffc040;8620%l;#; vẫn thở hổn hển đòi hỏi thêm nữa, thêm nữa với vẻ tham lam."
# 【双鉄】
# display as 雙鐵
# JP: 「しっかり掴まっておけよ」
2108 = "「Bám chắc vào đấy nhé.」"
# 【稀咲】
# display as 稀咲
# JP: 「ひゃっ！？　きゃうっ！」
1861 = "「Kya!? Kyaư!」"
# monologue
# JP: （ゴオオオオっ！）
3129 = "（Ầm ầm ầm ầm!）"
# monologue
# JP: 焚き口戸を開いた瞬間、\n吸い込むような業火と熱気が迎えてくれる。
2638 = "Ngay khoảnh khắc mở cửa lò ra,\nngọn lửa địa ngục cùng luồng khí nóng hầm hập như muốn hút chửng lấy chúng tôi ùa tới."
# monologue
# JP: （ざくっ――ゴウっ！！）
3125 = "（Phập——Bùng!!）"
# 【稀咲】
# display as 稀咲
# JP: 「うわわっ！？」
1923 = "「Oa oa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大声は危ない。\n長時間開き過ぎると、喉を焼くぞっ！」
1922 = "「La lớn nguy hiểm lắm.\nHá miệng quá lâu sẽ bị bỏng họng đấy!」"
# 【稀咲】
# display as 稀咲
# JP: 「んぐっ！」
1936 = "「Ưm!」"
# monologue
# JP: 目を焦がすほどの業火と激しい\x%lブラスト;#00ffc040;ブラスト%l;#;音。\nむせ返るような石炭の匂い、加速感。
2703 = "Ngọn lửa hừng hực như muốn thiêu rụi đôi mắt cùng âm thanh \x%lブラスト;#00ffc040;khí thải xi lanh%l;#; chát chúa.\nMùi than đá nồng nặc đến nghẹt thở, và cả cảm giác gia tốc nữa."
# monologue
# JP: 五感の全てを刺激しまくる時間がやがて、\n大きな嵐を抜けたがごとく、シン――と静まる。
2696 = "Khoảng thời gian mọi giác quan bị kích thích liên tục ấy, chẳng mấy chốc đã\ntĩnh lặng trở lại——như thể vừa đi qua một cơn bão lớn."
# 【稀咲】
# display as 稀咲
# JP: 「え？　あ――あれ？」
1889 = "「Ể? A——ủa?」"
# 【日々姫】
# display as 日日姬
# JP: 「制限60――良しっ！」
2377 = "「Giới hạn tốc độ 60——tốt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「加速は終わった。\nこれからしばらくは、あんなに\x%lカマ;#00ffc040;カマ%l;#;を焚く必要もない」
1810 = "「Việc tăng tốc đã xong.\nTrong một khoảng thời gian tới, không cần phải đốt \x%lカマ;#00ffc040;lò hơi%l;#; mạnh như vậy nữa đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ……あー……って、あっ！　ごめんっ」
1903 = "「A…… a——…… ơ, a! Xin lỗi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2394 = "「!」"
# monologue
# JP: 抱きつかれてた体を急に離される。\n途端、ばくん、と胸が鳴る。
2662 = "Cơ thể đang ôm chặt lấy tôi bỗng nhiên tách ra.\nNgay lập tức, trái tim tôi đập thịch một nhịp."
# monologue
# JP: 密着していた間はなんとも思わなかったが――\n離れぎわ、猛烈な柔らかさを感じてしまって。
3095 = "Lúc áp sát vào nhau thì tôi không nghĩ ngợi gì cả——\nnhưng khi rời ra, tôi lại cảm nhận được một sự mềm mại mãnh liệt."
# 【ハチロク】
# display as 八六
# JP: 「稀咲様、頑張られましたね」
2262 = "「Cô Kisaki, cô đã vất vả rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ、ハチロク――ちゃん、さん」
1913 = "「A, Hachiroku——chan, san.」"
# 【ハチロク】
# display as 八六
# JP: 「呼び捨てで結構ですよ？\nそんなことより、ね？　お顔をあげてご覧なさいな」
2056 = "「Cô cứ gọi trống không cũng được ạ?\nChuyện đó bỏ qua đi nhé? Cô thử ngẩng mặt lên nhìn xem.」"
# 【稀咲】
# display as 稀咲
# JP: 「え？　あ――わああっ！」
1890 = "「Ể? A——oaaaa!」"
# monologue
# JP: 森の中、\x%l8620;#00ffc040;8620%l;#;が巡航速度で駆け抜けていく。
2639 = "Giữa khu rừng, \x%l8620;#00ffc040;8620%l;#; đang băng băng chạy với tốc độ hành trình."
# monologue
# JP: 僕らには慣れきってしまった光景に、\nけれど稀咲は目を輝かせ、心を動かしているようだ。
3088 = "Một khung cảnh mà chúng tôi đã quá quen thuộc,\nnhưng Kisaki lại đang mở to đôi mắt lấp lánh, dường như trái tim cô ấy đang lay động."
# 【稀咲】
# display as 稀咲
# JP: 「これは……素晴らしく心地良いね。\n素敵な風だ――あの熱の無い……緑色の風」
2338 = "「Cái này…… dễ chịu tuyệt vời luôn.\nMột cơn gió thật đẹp——không hề có hơi nóng…… cơn gió màu xanh lá.」"
# monologue
# JP: 稀咲が振り向く、\n汗だくの顔で、爽やかに。
2925 = "Kisaki quay lại,\nvới khuôn mặt đẫm mồ hôi, nở nụ cười sảng khoái."
# 【稀咲】
# display as 稀咲
# JP: 「ボクは、わかった気がするよ」
2081 = "「Tôi, có cảm giác như mình đã hiểu ra rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何がだ？」
2138 = "「Hiểu chuyện gì cơ?」"
# monologue
# JP: やけに熱いような気がする。
2737 = "Tôi có cảm giác như cơ thể mình đang nóng bừng lên."
# monologue
# JP: \x%lカマ;#00ffc040;カマ%l;#;ならば、抑えているのに。\n焚き口戸だって閉まっているのに。
2805 = "Rõ ràng ngọn lửa trong \x%lカマ;#00ffc040;lò hơi%l;#; đã được kiềm lại rồi.\nCửa tiếp than cũng đã đóng kín."
# 【稀咲】
# display as 稀咲
# JP: 「キミに刺激を、きっかけを与えたのはボクじゃない。\nもちろん、父でも、浦上でもね」
2286 = "「Người đã tạo ra sự kích thích, tạo ra cơ hội cho anh không phải là tôi.\nTất nhiên, cũng không phải là bố tôi, hay anh Urakami.」"
# monologue
# JP: 風が、白銀の髪を流す。\n少女なのだと、不意に感じる。
2957 = "Gió lùa qua mái tóc màu bạch kim.\nBất chợt, tôi cảm nhận được rằng cô ấy vẫn chỉ là một thiếu nữ."
# monologue
# JP: 隈元銀行の支店長で、日々姫の先輩で恩人で。\nけど、それ以前に――宝生稀咲は、少女なのだと。
2649 = "Là giám đốc chi nhánh của Kumagin, là tiền bối và ân nhân của Hibiki.\nNhưng trước những điều đó——Houshou Kisaki, là một thiếu nữ."
# 【稀咲】
# display as 稀咲
# JP: 「あの熱に焼かれた後の、この風が。\nきっと、ね。双鉄――キミの何かを、変えたのさ」
1956 = "「Chính là cơn gió này, sau khi bị thiêu đốt bởi hơi nóng kia.\nChắc chắn là vậy. Nó đã thay đổi——một phần nào đó trong anh Soutetsu.」"
# monologue
# JP: （かぽーん）
3121 = "（Rào rào）"
# 【ハチロク】
# display as 八六
# JP: 「ふぅ……いいお湯ですね、今日も今日とて」
1874 = "「Phù…… Nước nóng thật tuyệt, hôm nay cũng vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうとー？　じゃなくって、んんっ、そうかな？\nなんか、今日はいつもよりお湯、熱くない？」
2149 = "「Thế á? À không, ưm, vậy sao?\nKhông hiểu sao, hôm nay nước có vẻ nóng hơn bình thường nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「あら。うふふ、左様ですね。\nそういわれれば、いつもより熱いかもしれません」
1883 = "「Trời ạ. Fufu, đúng là vậy.\nNhắc mới nhớ, có lẽ nước nóng hơn bình thường một chút.」"
# monologue
# JP: ハチロクののどかな声と、\nどこか尖った日々姫の声と。
2596 = "Giọng nói nhàn nhã của Hachiroku,\ncùng với giọng nói có chút sắc nhọn của Hibiki."
# monologue
# JP: 聞こえているが、反応をするどころではない。\n――動けない。
3092 = "Dù nghe thấy, nhưng tôi không ở trong tình trạng có thể phản ứng lại.\n——Tôi không thể nhúc nhích."
# 【稀咲】
# display as 稀咲
# JP: 「そ、そ、そ、双鉄。\nそ、そ、そんなに、緊張、しないで、くれない、かな」
2382 = "「A, a, a, anh Soutetsu.\nA, a, anh, có thể, đừng, căng, thẳng, như, vậy, được, không.」"
# monologue
# JP: 僕の後ろに、宝生稀咲。\n姿は見えねど、温度は感じる。
2686 = "Phía sau tôi, là Houshou Kisaki.\nDù không nhìn thấy hình dáng, nhưng tôi có thể cảm nhận được hơi ấm."
# monologue
# JP: 緊張は確かにしているのだが、\n何故か素直に認めることが、気恥ずかしい。
3091 = "Quả thực là tôi đang căng thẳng,\nnhưng không hiểu sao việc thành thật thừa nhận lại khiến tôi thấy xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「き、きんっ――――～～～っ」
2289 = "「C, căng thẳng――――～～～」"
# monologue
# JP: 妙に上ずった声が出かけて、慌てて言葉を呑み込み耐える。\nまず、落ち着こう。考えよう。
2720 = "Một giọng nói cao vút kỳ lạ suýt thốt ra, tôi vội vàng nuốt lại lời định nói.\nTrước tiên, phải bình tĩnh lại. Hãy suy nghĩ nào."
# monologue
# JP: 乗務の後の風呂などは、ごく当然の……\nああ、そうだ。
2545 = "Việc đi tắm sau khi làm nhiệm vụ tổ lái là chuyện hết sức bình thường……\nÀ, đúng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲こそ、緊張を解いてくつろぐといい。\nここで汚れを落とすことは、業務の延長のようなものだ」
2268 = "「Kisaki mới là người nên thả lỏng sự căng thẳng ra mà thư giãn đi.\nViệc gột rửa bụi bẩn ở đây cũng giống như một phần kéo dài của công việc thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボ、ボ、ボクが緊張！？　す、するわけ、ないよっ。\nな、納得をして、入ってるんだし――全然、へ、平気っ」
2067 = "「T, t, tôi mà căng thẳng á!? L, làm gì, có chuyện đó.\nT, tôi đã đồng ý, rồi mới vào mà——hoàn toàn, kh, không sao cả.」"
# monologue
# JP: その一言に、思ってしまう。\nどうも、平気ではないらしい。
2664 = "Nghe câu nói đó, tôi lại nghĩ.\nCó vẻ như, cô ấy chẳng ổn chút nào."
# monologue
# JP: 乗務が終わればやはり煤けてしまう体を、\n一刻もはやく落としたいと、本人も希望していたが――
3087 = "Chính bản thân cô ấy cũng bày tỏ mong muốn được gột rửa cơ thể lấm lem nhọ nồi\nngay lập tức sau khi kết thúc công việc——"
# 【双鉄】
# display as 雙鐵
# JP: 「居づらいようなら、僕はあがろう」
1977 = "「Nếu cô thấy không thoải mái, tôi sẽ lên trước.」"
# 【稀咲】
# display as 稀咲
# JP: 「い、いやっ！　平気。居づらくないよ。\nただ、少し……ほんのすこし……そのっ――」
1679 = "「Kh, không! Không sao. Không có không thoải mái đâu.\nChỉ là, hơi…… chỉ một chút thôi…… chuyện đó——」"
# monologue
# JP: その、のその後が続かない。
1354 = "Sau từ \"chuyện đó\" là một khoảng lặng."
# monologue
# JP: ゆるゆる続く沈黙に、\n僕の感じてた緊張も、またゆるゆるとほぐれてく。
2701 = "Giữa sự im lặng chầm chậm kéo dài,\nsự căng thẳng mà tôi cảm nhận được cũng dần dần tan biến."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、稀咲」
2103 = "「Này, Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「ひうっ！？　な、な、なんだい、双鉄っ」
1858 = "「Hya!? Ch, ch, chuyện gì vậy, anh Soutetsu.」"
# monologue
# JP: ガチガチすぎる。いつもの湯船が、\n小波が絶えぬプールのごとく揺れまくってる。
2648 = "Cứng đờ cả người rồi. Bồn tắm quen thuộc đang rung rinh dữ dội\nnhư một hồ bơi không dứt những gợn sóng lăn tăn."
# 【双鉄】
# display as 雙鐵
# JP: 「今日、乗ってみてどうだった？\nなにか、新たな気付きはあったか？」
1730 = "「Hôm nay, đi tàu thử cô thấy thế nào?\nCó nhận ra được điều gì mới mẻ không?」"
# 【稀咲】
# display as 稀咲
# JP: 「あったよ！　大いに」
2166 = "「Có chứ! Rất nhiều là đằng khác.」"
# monologue
# JP: 弾んだ声にホっとする。
2660 = "Giọng nói hào hứng của cô ấy khiến tôi thở phào nhẹ nhõm."
# monologue
# JP: やはり、稀咲は宝生稀咲だ。\n仕事がらみの話が一番、落ち着くらしい。
2931 = "Quả nhiên, Kisaki vẫn là Houshou Kisaki.\nCó vẻ như những chủ đề liên quan đến công việc là cách tốt nhất để cô ấy bình tĩnh lại."
# 【稀咲】
# display as 稀咲
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は、面白いね。ただ、\x%l客車;#00ffc040;客車%l;#;がつくとなると、\nあの……テンダーだっけ？」
1382 = "「\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; thú vị thật đấy. Có điều, khi kéo theo \x%l客車;#00ffc040;toa hành khách%l;#; thì,\ncái đó…… gọi là toa tiếp than nước nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\x%l炭水車;#00ffc040;[テンダー,2]炭水車%l;#;やボイラが邪魔になり、\n[キャブ,2]運転台の様子や前の様子は、まるで見えない」
1942 = "「À, đúng vậy. Bị \x%l炭水車;#00ffc040;toa tiếp than nước%l;#; và lò hơi che khuất,\nnên hành khách hoàn toàn không thể nhìn thấy tình hình trong \x%l運転台;#00ffc040;buồng lái%l;#; hay cảnh vật phía trước.」"
# 【稀咲】
# display as 稀咲
# JP: 「だよね。そうなるよね。そうなると、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の魅力はかなり……薄くなるよね」
2154 = "「Đúng thế. Sẽ thành ra như vậy nhỉ. Nếu thế thì,\nsức hấp dẫn của \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sẽ bị…… giảm đi đáng kể đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんな」
1398 = "「……Có lẽ là vậy.」"
# monologue
# JP: 客として、客車にのったあの時を。\n父さんと、母さんと、路子との旅を思い出す。
2730 = "Lần đó, với tư cách là một hành khách ngồi trên toa xe.\nTôi nhớ lại chuyến du lịch cùng bố, mẹ và Michiko."
# monologue
# JP: あれは確かにわくわくしたが、例えば\n\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;でも、同じわくわくを感じた気もする。
3096 = "Khi ấy tôi thực sự rất phấn khích, nhưng nếu là\n\x%lディーゼル機関車;#00ffc040;đầu máy diesel%l;#; chẳng hạn, tôi có cảm giác mình cũng sẽ phấn khích y như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「“\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;”という五文字が強い売りとなるのは、\nある程度は鉄道好きな人に対してだけかもしれんな」
1387 = "「Sức hút mạnh mẽ từ 5 chữ 『\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;』,\ncó lẽ ở một mức độ nào đó, chỉ dành cho những người yêu thích đường sắt mà thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ん……」
# 1924 = "「嗯……」" 
# 【日々姫】
# display as 日日姬
# JP: 「だよねー。やっぱり。\nそれはそうだよ」
2243 = "「Đúng vậy nhỉ. Quả nhiên.\nChuyện đó là đương nhiên rồi.」"
# monologue
# JP: ハチロクさえも、あえて異論を挟んでこない。
3069 = "Ngay cả Hachiroku cũng không hề phản bác."
# monologue
# JP: ならば恐らく、それは正しい認識だろうし、\n今となっては、鉄道好きの数にも期待は出来なかろう。
3072 = "Nếu vậy thì có lẽ, nhận thức đó là chính xác,\nvà trong thời đại này, chúng ta cũng không thể kỳ vọng nhiều vào số lượng người yêu thích đường sắt."
# 【稀咲】
# display as 稀咲
# JP: 「だから……鉄道だけで観光推進っていうのは、\nよほどのアイディアが無いと厳しそうかとは思う」
2105 = "「Thế nên…… việc thúc đẩy du lịch chỉ dựa vào đường sắt,\nnếu không có ý tưởng gì đó thực sự đột phá thì tôi nghĩ sẽ rất khó khăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「アイディア、か」
2393 = "「Ý tưởng, sao.」"
# monologue
# JP: それが簡単に出てくるのなら、\n何の苦労もないのだが――ああ。
2678 = "Nếu có thể dễ dàng nghĩ ra thì\nđã chẳng phải khổ sở thế này——à."
# 【双鉄】
# display as 雙鐵
# JP: 「言っていただろう。キャブ内で。\n僕が、[ハチロクニイマル,3]8620から刺激を受けたということを」
1758 = "「Cô đã nói rồi mà. Ở trong buồng lái ấy.\nRằng tôi đã nhận được sự kích thích từ \x%l8620;#00ffc040;8620%l;#;.」"
# 【稀咲】
# display as 稀咲
# JP: 「う、うん。言ったね、確かに言った」
1866 = "「Ư, ừm. Tôi có nói, chắc chắn là đã nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうした意見が出るというのは――\n稀咲もなにか、刺激を感じたからではないのか？」
1761 = "「Việc cô đưa ra ý kiến như vậy——\nchẳng phải là vì Kisaki cũng cảm nhận được sự kích thích nào đó sao?」"
# monologue
# JP: ちゃぷん、と水音。
2523 = "Tiếng nước kêu róc rách."
# monologue
# JP: まさか振り返りも出来ないが、\n稀咲がなにか、体を動かしたことは感じる。
3090 = "Dù không thể quay lại nhìn,\nnhưng tôi cảm nhận được Kisaki vừa cử động cơ thể."
# 【稀咲】
# display as 稀咲
# JP: 「刺激っていうか――僕が感じたのは欲さ。\nだから、双鉄の変化のきっかけになったと思った」
2297 = "「Nói là kích thích thì——thứ tôi cảm nhận được là dục vọng.\nThế nên, tôi nghĩ đó chính là cơ hội để anh Soutetsu thay đổi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「欲」
2178 = "「Dục vọng.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。欲。\n『このままずっと走っていたい』って、そんな欲」
1998 = "「Đúng vậy. Dục vọng.\nDục vọng 『Muốn cứ tiếp tục chạy mãi như thế này』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かにそれは感じるな」
2001 = "「À, quả thực là có cảm giác đó.」"
# monologue
# JP: 言えばぱしゃん、と、\nさっきよりずっと元気な水音。
3066 = "Vừa nói xong, một tiếng nước ào ào vang lên mạnh bạo hơn lúc nãy."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄もか。やっぱり、誰でも感じるよね。\nあんなに短い区間を往復するだけじゃもったいない」
1755 = "「Cả anh Soutetsu cũng vậy sao. Quả nhiên, ai cũng sẽ cảm thấy như thế nhỉ.\nNếu chỉ chạy đi chạy lại trên một đoạn đường ngắn như vậy thì thật lãng phí.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが……\n復線とは、そう簡単なものではないらしい」
2310 = "「Đúng là vậy, nhưng……\nkhôi phục lại tuyến đường dường như không phải là chuyện đơn giản.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね。土地が絡むことだし。\nっていうか、なら双鉄もそのことを？」
1716 = "「Chắc là vậy rồi. Vì còn liên quan đến đất đai nữa mà.\nMà nói vậy tức là, anh Soutetsu cũng đã nghĩ đến chuyện đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレットとも相談はした。\nもらった資料を読み込んで、それもありかと思ってな」
1934 = "「Ừm. Tôi cũng đã thảo luận với Paulette rồi.\nSau khi đọc kỹ tài liệu cô đưa, tôi nghĩ cách đó cũng khả thi.」"
# 【稀咲】
# display as 稀咲
# JP: 「あの資料からその発想が？」
2352 = "「Từ tài liệu đó mà nảy sinh ý tưởng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の工場立地と移送コストとの話だ。\n復線がなれば、それらを一気に解決できる」
2085 = "「Là câu chuyện về địa điểm đặt nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; và chi phí vận chuyển.\nNếu khôi phục được tuyến đường, chúng ta có thể giải quyết những vấn đề đó trong một sớm một chiều.」"
# monologue
# JP: ああ、と納得したような声。
2655 = "Cô ấy cất tiếng 'À' như đã hiểu ra vấn đề."
# monologue
# JP: けれど稀咲は、\nそれが机上の空論だともやはりたちどころに理解する。
2565 = "Tuy nhiên, Kisaki cũng ngay lập tức hiểu rằng,\nđó chỉ là lý thuyết suông trên giấy."
# 【稀咲】
# display as 稀咲
# JP: 「叶えば、素晴らしい話だけれど……」
1982 = "「Nếu thành hiện thực thì đúng là một câu chuyện tuyệt vời, nhưng……」"
# 【双鉄】
# display as 雙鐵
# JP: 「実現可能性を見つけられんかと思って相談したが――\nさすがポーレットは、路線のことを熟知している」
2072 = "「Tôi đã thảo luận xem có tìm ra khả năng thực hiện được không——\nnhưng quả nhiên Paulette rất am hiểu về tuyến đường.」"
# monologue
# JP: 資料上、候補地の一つとしてあがっていた[せんだい,1]千内市。
3037 = "Trên tài liệu, một trong những địa điểm ứng cử là thành phố Sendai."
# monologue
# JP: そこと御一夜との間はかつて、\n鹿兒島をぐるり回って、\x%l帝鉄;#00ffc040;帝鉄%l;#;路線で結ばれていた。
2559 = "Giữa nơi đó và Ohimitera trước đây,\ntừng được kết nối bằng tuyến đường sắt \x%l帝鉄;#00ffc040;Teitetsu%l;#; chạy vòng quanh Kagoshima."
# 【双鉄】
# display as 雙鐵
# JP: 「その復線が仮にできれば、\x%lエアクラ;#00ffc040;エアクラ%l;#;社と御一夜鉄道、\nともに利益を生み出せるから……出来ればと考えたのだ」
1772 = "「Nếu giả sử có thể khôi phục lại tuyến đường đó, thì cả công ty \x%lエアクラ;#00ffc040;Aircra%l;#; và Đường sắt Ohito\nđều có thể tạo ra lợi nhuận…… nên tôi đã nghĩ nếu làm được thì tốt biết mấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「御一夜鉄道も？　って、あ……そうか。当然か、\n移送となれば貨物\x%l列車;#00ffc040;列車%l;#;が走るわけだし――」
2038 = "「Cả Đường sắt Ohito nữa sao? Ơ, à…… ra là vậy. Đương nhiên rồi,\nnếu là vận chuyển thì sẽ có \x%l列車;#00ffc040;đoàn tàu%l;#; chở hàng chạy qua mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「線路が長く続き、乗り継ぎなども出来るようになれば、\n観光\x%l列車;#00ffc040;列車%l;#;としての価値も向上しようしな」
1774 = "「Nếu tuyến đường sắt được kéo dài, có thể trung chuyển đổi chuyến,\nthì giá trị của nó với tư cách là một \x%l列車;#00ffc040;đoàn tàu%l;#; du lịch cũng sẽ tăng lên.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん……だよね、これは――だから――」
1926 = "「Ừm…… đúng vậy nhỉ, chuyện này——vậy nên——」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
2272 = "「Kisaki?」"
# monologue
# JP: 相槌のようで、相槌ではない。\n稀咲は一人で頷いて、なにやらぶつぶつつぶやいている。
2943 = "Giống như đang hùa theo, nhưng lại không phải là hùa theo.\nKisaki một mình gật gù, lẩm bẩm điều gì đó trong miệng."
# 【稀咲】
# display as 稀咲
# JP: 「周辺自治体にも当然波及はするだろうし――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社の長期目標は飛行型の普及なんだし！」
2226 = "「Tất nhiên nó cũng sẽ lan tỏa đến các chính quyền địa phương xung quanh——\nvà mục tiêu dài hạn của công ty \x%lエアクラ;#00ffc040;Aircra%l;#; là phổ cập loại bay mà!」"
# monologue
# JP: （ざばあっ！）
3120 = "（Ào!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2395 = "「!?」"
# monologue
# JP: 激しい水音。
2604 = "Tiếng nước kêu dữ dội."
# monologue
# JP: それは止まずに、僕の脇へと回り込み、\n正面側へと近づいてく――っ！！
2830 = "Tiếng nước đó không hề dừng lại, mà vòng sang bên hông, rồi tiến sát ngay bên cạnh tôi——!!"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄。それだ。それで行こう」
2383 = "「Anh Soutetsu. Chính là cái này. Hãy làm theo cách đó đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それ……と、は、\n御一夜-[せんだい,1]千内間の復線か？」
2331 = "「Cách đó…… ý cô là, khôi phục lại tuyến đường giữa Ohimitera và Sendai sao?」"
# monologue
# JP: 話に集中することで、\n稀咲の肌へと向きそうになる意識をなんとか引き止める。
2727 = "Bằng cách tập trung vào câu chuyện, tôi cố gắng kìm nén ý thức đang chực chờ hướng về phía làn da của Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それほど長区間の復線を果たす資金など」
1748 = "「Nhưng mà, lấy đâu ra nguồn vốn để khôi phục một đoạn đường dài đến thế chứ?」"
# 【稀咲】
# display as 稀咲
# JP: 「無い資金なら、作るのさ。君たちの知恵、\n\x%lまいてつ;#00ffc040;まいてつ%l;#;システム。あれを、レールで行えばいい」
2181 = "「Nếu không có vốn thì tạo ra thôi. Trí tuệ của các anh, hệ thống \x%lまいてつ;#00ffc040;chủ tàu%l;#;. Áp dụng nó vào đường ray là được.」"
# monologue
# JP: ああ、と控えめなハチロクの声。
2598 = "Hachiroku khẽ 'A' lên một tiếng đầy dè dặt."
# 【ハチロク】
# display as 八六
# JP: 「レールオーナー制度でございますか？\nけれどあれは、大して参加者が集まるようなものでは」
2057 = "「Là chế độ chủ sở hữu đường ray sao ạ? Nhưng mà cái đó, cũng chẳng thu hút được bao nhiêu người tham gia đâu ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「多分、違う。ボクが考えているのは、レールを資産――\n投資対象として、証券化して販売することだよ」
2065 = "「Chắc là không. Điều tôi đang nghĩ đến là, chứng khoán hóa đường ray như một loại tài sản——một đối tượng đầu tư, rồi đem bán.」"
# 【双鉄】
# display as 雙鐵
# JP: 「投資対象？」
2110 = "「Đối tượng đầu tư?」"
# 【稀咲】
# display as 稀咲
# JP: 「レールの営業権を分割して売るんだ。\nレールが利益を生み出せば、それを分配する」
1795 = "「Chia nhỏ quyền kinh doanh đường ray ra để bán. Nếu đường ray sinh ra lợi nhuận, thì sẽ tiến hành chia cổ tức.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっと……」
1864 = "「Ưm……」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄が[ハチロク,3]8620を所有し、走らせ、利益の分配を受ける。\n同じことを、レールを使って、大人数でやるってことさ」
2008 = "「Giống như anh Soutetsu sở hữu [8620'86], cho chạy tàu, và nhận được phần lợi nhuận được chia. Ý tôi là làm điều tương tự với đường ray, nhưng với số lượng người tham gia lớn hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　だから『\x%lまいてつ;#00ffc040;まいてつ%l;#;のレール版』」
1907 = "「A! Nên mới gọi là 『phiên bản đường ray của \x%lまいてつ;#00ffc040;chủ tàu%l;#;』.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。いわば……マイレール。\nマイレール・ファンドと言ったところだ」
2184 = "「Đúng vậy. Có thể gọi là…… My Rail. Quỹ My Rail chẳng hạn.」"
# 【ハチロク】
# display as 八六
# JP: 「マイレール・ファンド」
2247 = "「Quỹ My Rail.」"
# 【稀咲】
# display as 稀咲
# JP: 「復線がなれば一番利益を得るのは\x%lエアクラ;#00ffc040;エアクラ%l;#;社だ。\nよって、\x%lエアクラ;#00ffc040;エアクラ%l;#;社は多少なりともファンドに参加する」
1985 = "「Nếu khôi phục lại tuyến đường, người hưởng lợi nhiều nhất sẽ là công ty \x%lエアクラ;#00ffc040;Aircra%l;#;. Do đó, công ty \x%lエアクラ;#00ffc040;Aircra%l;#; ít nhiều cũng sẽ tham gia vào quỹ.」"
# monologue
# JP: 推定ではなく、断定形。\n稀咲の言葉も姿勢も強い確信に満ちている。
2658 = "Không phải phỏng đoán, mà là khẳng định. Cả lời nói và tư thế của Kisaki đều tràn ngập sự tự tin mãnh liệt."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社がファンドに参加するという意味は」
2156 = "「Ra là vậy——ý nghĩa của việc công ty \x%lエアクラ;#00ffc040;Aircra%l;#; tham gia vào quỹ là」"
# 【稀咲】
# display as 稀咲
# JP: 「極めて大きい。それは、\x%lエアクラ;#00ffc040;エアクラ%l;#;社が、\n鉄道との共存を望んでいるとアピールにもなるから」
2063 = "「Cực kỳ to lớn. Bởi vì điều đó cũng đồng nghĩa với việc công ty \x%lエアクラ;#00ffc040;Aircra%l;#; tuyên bố rằng họ mong muốn cùng tồn tại với đường sắt.」"
# monologue
# JP: それは、間違いなく呼び水となる。\n一般から、行政から、企業から――
3063 = "Điều đó chắc chắn sẽ trở thành chất xúc tác. Từ công chúng, từ chính quyền, từ các doanh nghiệp——"
# monologue
# JP: 資金も意見も集まってこようし、\n集まった金と知恵とは、きっと新たなレールを繋ぐ。
2987 = "Vốn và ý kiến sẽ cùng nhau hội tụ, và nguồn tiền cùng trí tuệ được tập hợp lại đó, chắc chắn sẽ kết nối thành những tuyến đường ray mới."
# 【双鉄】
# display as 雙鐵
# JP: 「凄い……な」
1964 = "「Thật…… đáng kinh ngạc.」"
# monologue
# JP: 体が震える。\n震えているのに、熱くなる。
2753 = "Cơ thể tôi đang run rẩy. Rõ ràng là đang run rẩy, nhưng lại nóng bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、キミは凄いな。\nよくもまぁそんなアイディアを」
2267 = "「Kisaki, cô tuyệt thật đấy. Sao có thể nghĩ ra một ý tưởng như vậy chứ.」"
# 【稀咲】
# display as 稀咲
# JP: 「[ハチロク,3]8620に乗せてもらったからさ。\nそれに、復線の話も細かく聞かせてもらえたから」
2365 = "「Là nhờ được ngồi trên [8620'86] đấy. Hơn nữa, cũng nhờ được nghe anh kể chi tiết về chuyện khôi phục tuyến đường.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら」
2357 = "「Nếu vậy thì.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう！」
2185 = "「Đúng thế!」"
# monologue
# JP: 言葉と同時に体が動き、お湯の飛沫が跳ね上がる。\nそのきらめきよりなお眩しく、稀咲の満面の笑みが輝く。
2643 = "Cơ thể cô ấy cử động cùng lúc với lời nói, những giọt nước bắn tung tóe. Nhưng nụ cười rạng rỡ của Kisaki còn tỏa sáng lấp lánh hơn cả những giọt nước ấy."
# 【稀咲】
# display as 稀咲
# JP: 「これは全員のアイディアだ。\nそして必ず、全員で叶えていけるアイディアなんだ」
2335 = "「Đây là ý tưởng của tất cả chúng ta. Và chắc chắn, đó là một ý tưởng mà tất cả chúng ta có thể cùng nhau hiện thực hóa.」"
# 【ハチロク】
# display as 八六
# JP: 「マイレール・ファンド……それがうまくいくのなら、\nきっと、[ひのもと,2]日ノ本、全ての場所で」
2246 = "「Quỹ My Rail…… nếu chuyện đó thành công, chắc chắn, trên khắp mọi miền Hinomoto.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\n途切れてしまった、全てのレールが」
2002 = "「À, đúng vậy. Tất cả những tuyến đường ray đã bị đứt đoạn.」"
# monologue
# JP: 路線網――鉄道の生命線たるそれの復活に繋がる案を、\n僕の目の前、笑顔の少女が産みだした。
2992 = "Phương án dẫn đến sự hồi sinh của mạng lưới đường sắt——sinh mệnh của ngành đường sắt, đã được sinh ra từ nụ cười của thiếu nữ ngay trước mắt tôi."
# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;では、あれほど頼りなかった姿が、\n今はどうだ、これほどまでに美しく――――――っ！！
2810 = "Dáng vẻ thiếu tự tin trong \x%l運転台;#00ffc040;buồng lái%l;#; khi nãy, giờ đây lại xinh đẹp đến nhường này sao――――――!!"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ――兄さん？」
2376 = "「Anh hai——anh Soutetsu?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2384 = "「Ngài Soutetsu?」"
# monologue
# JP: いかん。\n体が……熱くなる。
2531 = "Không ổn rồi. Cơ thể…… đang nóng dần lên."
# monologue
# JP: 稀咲と風呂に入っている。\n極めて単純な事実を僕は、その輝きに忘れていたが――
2745 = "Tôi đang tắm cùng Kisaki. Sự tỏa sáng đó đã khiến tôi quên mất một sự thật cực kỳ đơn giản——"
# 【稀咲】
# display as 稀咲
# JP: 「え？」
1888 = "「Ể?」"
# monologue
# JP: 真正面の。稀咲の視線が、下を向く。\n向いた視線が、すぐ上へ――っ！！？
2821 = "Ngay chính diện. Ánh mắt của Kisaki nhìn xuống dưới. Và ánh mắt đó, ngay lập tức lại hướng lên trên——!!?"
# 【稀咲】
# display as 稀咲
# JP: 「ひえっ！？　あうわっ！？――あ――\nきゅうう～～～っ」
1870 = "「Hiee!? Auwa!?——A——kyuuu～～～」"
# 【双鉄】
# display as 雙鐵
# JP: 「お、おい、稀咲っ！」
1920 = "「N, này, Kisaki!」"
# monologue
# JP: 真っ赤になって、目を白くして、崩れてく。
2654 = "Mặt đỏ bừng, mắt trợn trắng, cô ấy ngã gục xuống."
# 【ハチロク】
# display as 八六
# JP: 「いけません。のぼせましたか」
1689 = "「Không xong rồi. Bị say nước nóng sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2125 = "「Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった、にぃに！」
2098 = "「Rõ rồi, anh hai!」"
# monologue
# JP: 日々姫の手を借り、\n稀咲が湯へと崩れおちぬよう、支えてもらう。
2756 = "Mượn tay Hibiki, tôi nhờ em ấy đỡ Kisaki để cô ấy không bị chìm xuống nước."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
# 1974 = "「好！」" 
# monologue
# JP: （ざばあああああっ！）
3119 = "（Àooooooooo!）"
# 【日々姫】
# display as 日日姬
# JP: 「わ、お姫様だっこ！！」
1879 = "「Oa, bế kiểu công chúa kìa!!」"
# monologue
# JP: ともかく、冷静にならねばならん。\n稀咲にも、冷静になってもらわねば。
2980 = "Dù sao thì, tôi phải bình tĩnh lại. Và cũng phải làm cho Kisaki bình tĩnh lại nữa."
# monologue
# JP: この案を必ず実現するため――\nのぼせてるような時間など、僕らには許されていないのだ。
2841 = "Để chắc chắn hiện thực hóa phương án này——chúng tôi không được phép có thời gian để say nước nóng đâu."
