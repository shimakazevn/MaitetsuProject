[script]
# lines: 452 
# 【稀咲】
# display as 稀咲
# JP: 「済まないね、こんな時間に呼び出して」
1690 = "「不好意思，一大早把你叫出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、構わん。僕とて酒造の、端くれとはいえ一員だ。\n早起き程度は、苦にもならんさ」
1704 = "「不，沒關係。雖說是一介雜役，但我好歹也算是釀酒廠的一員。早起不算什麼」" 

# monologue
# JP: 早朝の支店長室。\n見下ろす一階フロアには、まだ誰の姿も見当たらない。
2714 = "從清晨的支行行長室往下看去，一樓還見不到任何人。" 

# 【稀咲】
# display as 稀咲
# JP: 「そういうものかい？　\n日々姫は、ときどき眠そうだけど」
2160 = "「是嗎？日日姬倒三不五時一副睡不醒的樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は絵を描く人間だからな。\n集中すると、明け方近くまで起きているようだ」
2232 = "「畢竟日日姬是干畫畫這行的。一專注起來可能到天快亮時才睡覺」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。今日も？」
1820 = "「原來如此。她今天也是這樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「絵が原因かどうかはしらんが、\n起こしても起きぬようだった」
2070 = "「我也不知道原因是不是畫畫，但叫也叫不起來」" 

# monologue
# JP: “もしも興味がありそうなら”と、\n日々姫に関しては言われてた。
2998 = "至於日日姬，稀咲只是說“她感興趣的話就帶她來”。" 

# monologue
# JP: ゆえに強くは起こさなかったが――
2763 = "所以我才沒逼著她起床。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理矢理にでも連れてきたほうが良かったか？」
2084 = "「我是不是應該把她強帶過來更好呢」" 

# 【稀咲】
# display as 稀咲
# JP: 「いいや？　今日の話は、\n多分、あの子には退屈な内容だと思うし」
1680 = "「不。今天要談的事對她來說估計比較無聊」" 

# monologue
# JP: 笑って、稀咲は奥のデスクに目を走らせる。\n今は無人のデスクの上には、整えられた紙束がある。
2952 = "稀咲笑著將視線移向裡面的寫字檯上。寫字檯那邊空無一人，上面放著一摞整齊的紙張。" 

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんは？」
2194 = "「浦上經理呢？」" 

# 【稀咲】
# display as 稀咲
# JP: 「勤務時間前だもの。\nボクの都合で、早朝出勤をさせたくもないからね」
2345 = "「還沒到上班時間。我也不想因為自己的私事讓別人提早上班」" 

# monologue
# JP: ボクの都合、と稀咲はいうが、\nむしろこちらの都合に合わせてもらっているだけだ。
3094 = "雖然稀咲說是“自己的私事”，但其實應該是她在配合我們。" 

# monologue
# JP: 乗務訓練だなんだがあるので、じっくり話をしたいなら、\nベストな時間帯は早朝になる。
2858 = "畢竟我還有乘務訓練等一大堆事，如果想好好談的話，早上是最適合的時間。" 

# 【稀咲】
# display as 稀咲
# JP: 「あ、そこ座って？」
1912 = "「啊，你坐那邊吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1935 = "「嗯」" 

# monologue
# JP: 促されるままソファに座れば、\n稀咲はコーヒーを淹れようと――
2732 = "我在稀咲的催促下坐在沙發上，正當她打算去泡咖啡的時候——" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、そうだ。少し待ってくれ。\n朝食はもう済ませたか？」
1916 = "「啊，對了，等一下。你吃過早餐了嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ううん、\nこれが終わったら適当に取ろうと思ってたけど」
1702 = "「不，我打算等事情談完後再隨便吃一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら良かった。嫌いでなければ摘んでくれ」
2355 = "「那就好。不嫌棄的話吃一點吧」" 

# monologue
# JP: 弁当箱の一つ目は、\n一口サイズの鮭、梅、昆布のおにぎりたち。
2971 = "第一個便當盒裡裝著可以一口吃下去的小飯糰，裡面的餡料有鮭魚、梅乾和海帶。" 

# monologue
# JP: そしてもう一つの弁当箱には、\n切り干し大根とミニトマトのサラダ。
2985 = "而另外一個便當盒裡，則是用干蘿蔔絲和聖女果做的沙拉。" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ――ふふっ、なんだ、\nボクの食生活をそこまで心配してくれたんだ」
1900 = "「啊——呵呵，原來你這麼擔心我的飲食呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「余計なお世話とは承知だが、妙に気にかかってな。\n若い娘が、出来合いのものばかりの食事では」
2073 = "「我也知道自己是在多管閒事，不過總感覺不放心。你一個年輕女孩子，總吃那種現成的飯菜也不好」" 

# 【稀咲】
# display as 稀咲
# JP: 「古風だねぇ、双鉄は。\nうちの父より、よっぽど古い考え方だ」
1768 = "「你還真是個傳統的人。比家父還要傳統得多了」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、コーヒーは食後にしよう」
2359 = "「那麼咖啡就飯後再喝吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、緑茶もあるのか」
1918 = "「啊，還有綠茶啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん。ご年配の来客も多いんだよ？　この部屋は」
2234 = "「當然。這邊也有不少年紀大的客人會來的」" 

# monologue
# JP: 取り留めの無い会話と、食事。\n腹が満ちれば、やはり心もあたたかになる。
2724 = "我們一邊漫無目的地聊著，一邊吃早餐。肚子填飽了，心裡感覺也暖洋洋的。" 

# 【稀咲】
# display as 稀咲
# JP: 「ご馳走様。おいしかった。\nさすがは、真闇さんだね」
2076 = "「我吃飽了。真好吃。真不愧是真闇小姐做的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。朝の真闇姉にそこまで負担はかけられぬ。\nレシピを昨晩おしえてもらい、僕が作った」
2049 = "「怎麼會。早上可不能再加重真闇姐的負擔了。這是我昨晚向她請教了食譜以後做的」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が」
2142 = "「是你做的？」" 

# monologue
# JP: 目を丸くして、空の弁当箱を見て。
2950 = "稀咲瞪大眼睛看著空空如也的便當盒。" 

# monologue
# JP: 稀咲の顔に、\nふわふわに焼いた玉子のような微笑が浮かぶ。
2657 = "她的臉上露出好像煎得熱騰騰的雞蛋一般的溫和笑容。" 

# 【稀咲】
# display as 稀咲
# JP: 「それはそれは……\nうふふ、本当においしかったよ？　大したものだ」
2238 = "「真沒想到……呵呵，真得很好吃。了不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだろうな。真闇姉の名が出たのだから」
2059 = "「想來也是啊。畢竟都抬出真闇姐的名字了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ご馳走になった分、まずは仕事で返さなくっちゃね」
2118 = "「既然吃了你的東西，就得在工作上回報你才行呢」" 

# monologue
# JP: ナプキンで指をキュっと拭き、\n稀咲は表情を引き締める。
2938 = "稀咲用餐巾擦了擦手指，表情嚴肅起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「早速だけど、これ」
1718 = "「事不宜遲，你看看這個」" 

# monologue
# JP: その手が取るのは、浦上さんのデスクの上の紙束だ。
2666 = "她那起了剛剛放在浦上經理桌上的那疊紙。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2334 = "「這是——」" 

# monologue
# JP: 表紙も中身も簡素で見やすい。\nそれだけに、内容の濃さがまさに一目で伝わってくる。
2687 = "封面和內容都很簡單，閱讀起來很方便。正因如此，一眼就能看出來內容有多嚴謹充實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――浦上さんの作った資料か？　すごいな……\nというか、ここまでを僕が見てしまっても――」
2337 = "「這是浦上經理整理的資料？真厲害啊……話說，讓我看這麼多真的——」" 

# 【稀咲】
# display as 稀咲
# JP: 「どうぞ遠慮無く扱って欲しい。最初から、\nキミに見てもらうために、作ってもらった資料だし」
2022 = "「希望你不要顧慮太多。這些資料本來就是為了給你看才整理的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕のために？　これほどのものを、何故……」
2205 = "「為了我？為什麼要如此大費周章……」" 

# 【稀咲】
# display as 稀咲
# JP: 「彼の仕事は、『御一夜に工場を誘致すること』ではなく、\n『最適の場所に工場を立地すること』だからさ」
2192 = "「浦上的工作不是“讓工廠落戶到御一夜”，而是“讓工廠落戶到最合適的地方”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――つまり、僕らと浦上さんとの利害は、\n一致するのか」
1891 = "「哦——也就是說，我們和浦上經理的利害是一致的嗎」" 

# monologue
# JP: 御一夜より有利な候補地を設定できれば、\n工場誘致は回避でき、浦上さんの得点にもなる。
2676 = "如果能找到比御一夜更適合的候選地的話，在阻止工廠落戶的同時，對浦上經理也有益處。" 

# monologue
# JP: 納得できれば、遠慮も消える。\nそういう話であるのなら、ありがたく読ませて頂こう。
2854 = "理解了這件事，我的顧慮也就消失了。既然如此，就心懷感激地仔細閱讀吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ならばゴールは、より先に設定せねばならんな。\n誘致撤回にとどまらず、将来的な共存共栄も睨まねば」
1412 = "「……那麼就得把目標設定得更長遠才行了啊。不僅是撤銷落戶計劃，還得以將來的互利共贏為目標」" 

# 【稀咲】
# display as 稀咲
# JP: 「共存共栄？　御一夜市と、\x%lエアクラ;#00ffc040;エアクラ%l;#;社とのかい？」
1721 = "「互利共贏？御一夜市和\\x%lエアクラ;#00ffc040;空凝機%l;#;公司嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それもあるし、鉄道と\x%lエアクラ;#00ffc040;エアクラ%l;#;の、というのもある。\n誘致賛成・反対、どちらの立場の者も、もあるな」
1686 = "「不光是它們，還有鐵路與\\x%lエアクラ;#00ffc040;空凝機%l;#;的互利共贏。也包括贊成與反對落戶的人們」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ……」
1902 = "「啊……」" 

# monologue
# JP: 困ったような苦笑い。
2670 = "她露出為難的苦笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「直接的、金銭的な利害とも関わる話だからね。\n誰もが満足する解決案は、難しいとは思うけど？」
2233 = "「畢竟直接與金錢上的利害關係掛鉤了。我覺得要想出人人都滿意的解決方案是很困難的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「短期的にはそうであっても、\n長期的な共存共栄であるなら必ず、目指せるさ」
2015 = "「就算短期來看是這樣，但就長期而言，我們一定能努力做到互利共贏」" 

# 【稀咲】
# display as 稀咲
# JP: 「ははっ」
1881 = "「哈哈」" 

# monologue
# JP: 一転、笑いは軽やかに。
3060 = "這次是輕快的笑容。" 

# 【稀咲】
# display as 稀咲
# JP: 「驚いた。\n日々姫の話とは、ちょっと印象が違うようだね」
2092 = "「我有點驚訝。感覺和日日姬說的有點不一樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の話？　印象、とは、いったい何の」
2126 = "「日日姬？她說什麼了嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「『禁欲的で、何かを欲しがるのを見たことが無い』って。\nけど、実際は、相当なレベルの欲張りさんのようだから」
1965 = "「她說你“整個人無欲無求，從來沒見他想要過什麼”。不過實際上，你好像相當貪心呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の話か。……欲張り、か」
2163 = "「是說我啊……貪心嗎」" 

# monologue
# JP: 指摘をされて、自分が驚く。\n確かにそうだ。今、僕は欲ばって動いてる。
2990 = "聽她這樣一說，我自己也有些吃驚。確實沒錯。我現在確實很貪心。" 

# monologue
# JP: 少し前までの僕だったなら、『工場誘致撤回の先』など、\n望むどころか、考えようともしなかったろう。
2673 = "如果是不久前的我，別說有什麼希望，甚至連想都不會去想“工廠落戶計劃取消之後”的事吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……刺激をされて、\n変化したのかもしれないな」
1403 = "「……或許是受到刺激後發生了變化吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「刺激を？　何に？」
1806 = "「刺激？被什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏や浦上さん。\nそれからもちろん――宝生稀咲、君にもだ」
1782 = "「元忠先生和浦上經理。當然還有你——寶生稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「えっ」
1882 = "「哎」" 

# monologue
# JP: 一瞬、息を呑み込んで。\n稀咲は何故か、抑えた声で問いかけてくる。
2918 = "稀咲一瞬間屏住了呼吸，隨後不知為何壓低音量問我。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクが、双鉄にどんな刺激を？」
2099 = "「我給你帶來了什麼刺激？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前の僕は単純に『自らの目的の達成が全て』と、\nそこまでの視野しか持てていなかったのだが――」
1743 = "「以前的我只認為“達成自己的目的就是一切”，視野很狹隘——」" 

# monologue
# JP: 元忠氏や浦上さんの視野は、僕よりはるかに広く遠い。
2563 = "但元忠先生和浦上經理的視野比我要開闊得多。" 

# monologue
# JP: 僕が目的を達成することが、自分の利益に繋がるのなら、\nそれはそれで良しとして、完全に割り切って扱っている。
2558 = "他們考慮得很清楚，認為如果我達到目的能為他們也帶來利益的話，便同樣可行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「視野を広げ、対立するものの目的や意図さえ汲むことで、\n目的の更に先にある、もっと大きなゴールを見つける」
2113 = "「拓寬視野，去理解與自己對立的人的目的與想法，就能發現比原本目的更加遠大的目標」" 

# monologue
# JP: ああ、と稀咲がゆっくり頷く。\n当然だ。稀咲もまた、その実践者なのだから。
2953 = "稀咲緩緩地點點頭以示贊同。這是當然的。因為稀咲自己也是這個理論的實踐者。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした考え方に、そして実践に触れたこと。\nそれが恐らく、僕には大きな刺激となった」
1764 = "「你的這種思考方式，加上我的切身體會。正是這些給我帶來了莫大的衝擊」" 

# monologue
# JP: 手元の資料に、重さを感じる。
2767 = "手中的資料讓我感覺沉甸甸的。" 

# monologue
# JP: 即断即決その上に、普段からの整頓準備が重ならなければ、\nここまでのもの、この短期間に用意できよう筈もない。
3000 = "若不是她當機立斷，加上時時刻刻都在進行整理和準備的話，是不可能在如此短的期間內準備得這麼完善的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見習いたいと、素直に思った。\n恐らくそれが、欲へと繋がってくれたのだろう」
2093 = "「我真心覺得要向你多加學習。或許正是這種想法讓我有了欲望吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「そんな欲なら素敵だね。\n業務を抜きに、応援したくなってしまうよ」
2339 = "「這種欲望很值得讚揚啊。就算拋開工作不談，我也不由得想為你加油打氣了」" 

# monologue
