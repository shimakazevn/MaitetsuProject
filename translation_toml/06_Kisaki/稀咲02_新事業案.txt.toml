1940 = "「嗯，拜託你了！畢竟都做過很多\\x%l投炭;#00ffc040;加煤%l;#;練習了呢」" 

# monologue
# JP: らしくもない、弾んだ声。ほほのてっぺんも赤くなってる。\nああ、そうなのかと嬉しく思う。
3064 = "這興奮的聲音一點也不像平時的她，臉頰也變得紅通通的。原來如此——我想通了原因，不由有些高興。" 

# monologue
# JP: \x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の\x%l運転台;#00ffc040;運転台%l;#;に乗れるとなれば、\n冷静な知性の人の稀咲でも、やはり興奮するものなのかと。
3016 = "要上\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的\\x%l運転台;#00ffc040;駕駛台%l;#;，讓冷靜知性的稀咲也興奮起來了啊。" 

# 【稀咲】
# display as 稀咲
