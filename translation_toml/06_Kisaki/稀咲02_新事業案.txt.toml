# 【稀咲】
# display as 稀咲
# JP: 「ちょっと大げさな言い方すぎるよ。\nお預かりして、お貸しする――ただ、それだけさ」
2340 = "「這說得也有點誇張了。銀行只是有存有借——僅此而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「預かって、貸す、か」
2168 = "「有存有借，是嗎」" 

# monologue
