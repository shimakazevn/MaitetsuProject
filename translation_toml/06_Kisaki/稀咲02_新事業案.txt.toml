# monologue
# JP: 僕らには慣れきってしまった光景に、\nけれど稀咲は目を輝かせ、心を動かしているようだ。
3088 = "雖然我們早已習慣這副光景，但是稀咲卻雙眼放光，一副感動的樣子。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは……素晴らしく心地良いね。\n素敵な風だ――あの熱の無い……緑色の風」
2338 = "「這種感覺……真棒啊。好舒服的風——沒有那股火熱……綠色的風」" 

# monologue
# JP: 稀咲が振り向く、\n汗だくの顔で、爽やかに。
2925 = "稀咲回過頭，臉上大汗淋漓，爽朗地說道。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクは、わかった気がするよ」
2081 = "「我感覺好像明白了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何がだ？」
2138 = "「明白什麼？」" 

# monologue
# JP: やけに熱いような気がする。
2737 = "我感覺自己渾身燙得厲害。" 

# monologue
# JP: \x%lカマ;#00ffc040;カマ%l;#;ならば、抑えているのに。\n焚き口戸だって閉まっているのに。
2805 = "明明\\x%lカマ;#00ffc040;窯%l;#;內的燃燒已經減弱了。明明爐門也是關緊的。" 

# 【稀咲】
# display as 稀咲
# JP: 「キミに刺激を、きっかけを与えたのはボクじゃない。\nもちろん、父でも、浦上でもね」
2286 = "「給予你刺激和契機的不是我。當然也不是父親，更不是浦上」" 

# monologue
# JP: 風が、白銀の髪を流す。\n少女なのだと、不意に感じる。
2957 = "稀咲銀色的秀髮隨風飄揚。我忽然意識到，她還只是位少女。" 

# monologue
# JP: 隈元銀行の支店長で、日々姫の先輩で恩人で。\nけど、それ以前に――宝生稀咲は、少女なのだと。
2649 = "她是隈元銀行的支行行長，是日日姬的學姐和恩人。但更根本地說——寶生稀咲是一位少女。" 

# 【稀咲】
# display as 稀咲
# JP: 「あの熱に焼かれた後の、この風が。\nきっと、ね。双鉄――キミの何かを、変えたのさ」
1956 = "「在經歷過炎熱後的這陣風，一定改變了雙鐵——改變了你的某些部分」" 

# monologue
# JP: （かぽーん）
3121 = "（嘩啦）" 

# 【ハチロク】
# display as 八六
# JP: 「ふぅ……いいお湯ですね、今日も今日とて」
1874 = "「呼……今天泡得也很舒服呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうとー？　じゃなくって、んんっ、そうかな？\nなんか、今日はいつもよりお湯、熱くない？」
2149 = "「是唄？不對，不不不，是嗎？你不覺得今天的水比平時要更熱一些嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「あら。うふふ、左様ですね。\nそういわれれば、いつもより熱いかもしれません」
1883 = "「哎呀。呵呵，您說得是。這麼一說，或許是比往常要熱些吧」" 

# monologue
# JP: ハチロクののどかな声と、\nどこか尖った日々姫の声と。
2596 = "八六悠閒自得的聲音，加上日日姬不滿的聲音。" 

# monologue
# JP: 聞こえているが、反応をするどころではない。\n――動けない。
3092 = "雖然我能聽見，但卻無法作出反應。——我動不了。" 

# 【稀咲】
# display as 稀咲
# JP: 「そ、そ、そ、双鉄。\nそ、そ、そんなに、緊張、しないで、くれない、かな」
2382 = "「雙、雙、雙、雙鐵。能、能、能別那麼、緊、緊、張、嗎」" 

# monologue
# JP: 僕の後ろに、宝生稀咲。\n姿は見えねど、温度は感じる。
2686 = "寶生稀咲就在我的背後。雖然看不見人，但是能感受到到她的溫度。" 

# monologue
# JP: 緊張は確かにしているのだが、\n何故か素直に認めることが、気恥ずかしい。
3091 = "雖然我確實很緊張，但不知為何，又羞於老實承認。" 

# 【双鉄】
# display as 雙鐵
# JP: 「き、きんっ――――～～～っ」
2289 = "「緊、緊————～～～」" 

# monologue
# JP: 妙に上ずった声が出かけて、慌てて言葉を呑み込み耐える。\nまず、落ち着こう。考えよう。
2720 = "我一不小心發出的聲音都高了八度，只得趕忙把後半句話吞了回去。首先得冷靜。慢慢想。" 

# monologue
# JP: 乗務の後の風呂などは、ごく当然の……\nああ、そうだ。
2545 = "乘務工作後泡個澡是很正常的……啊，對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲こそ、緊張を解いてくつろぐといい。\nここで汚れを落とすことは、業務の延長のようなものだ」
2268 = "「稀咲，你才該輕鬆一點吧。在這裡洗去汙跡不過是工作的後續而已」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボ、ボ、ボクが緊張！？　す、するわけ、ないよっ。\nな、納得をして、入ってるんだし――全然、へ、平気っ」
2067 = "「我、我、我會緊張！？怎、怎麼、會呢。我、我是同意之後、才進來的——完全、沒、沒關係」" 

# monologue
# JP: その一言に、思ってしまう。\nどうも、平気ではないらしい。
2664 = "她這話聽起來一點也不冷靜。" 

# monologue
# JP: 乗務が終わればやはり煤けてしまう体を、\n一刻もはやく落としたいと、本人も希望していたが――
3087 = "雖然她本人親口說過想在乘務工作結束後儘快清洗沾滿了煤灰的身體——" 

# 【双鉄】
# display as 雙鐵
# JP: 「居づらいようなら、僕はあがろう」
1977 = "「如果感覺不自在的話，我先出去吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「い、いやっ！　平気。居づらくないよ。\nただ、少し……ほんのすこし……そのっ――」
1679 = "「不、不會！沒事的。沒有不自在。只是有點……真的只是有一點……那個——」" 

# monologue
# JP: その、のその後が続かない。
1354 = "“那個”之後就沒下文了。" 

# monologue
# JP: ゆるゆる続く沈黙に、\n僕の感じてた緊張も、またゆるゆるとほぐれてく。
2701 = "平緩的沉默，也讓我的緊張慢慢平靜了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、稀咲」
2103 = "「我說，稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「ひうっ！？　な、な、なんだい、双鉄っ」
1858 = "「呀嗚！？什、什、什麼事，雙鐵」" 

# monologue
# JP: ガチガチすぎる。いつもの湯船が、\n小波が絶えぬプールのごとく揺れまくってる。
2648 = "她太緊張了。我們平時泡的浴池泛起了連綿不斷的漣漪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日、乗ってみてどうだった？\nなにか、新たな気付きはあったか？」
1730 = "「今天上火車的感覺如何？有沒有什麼新發現？」" 

# 【稀咲】
# display as 稀咲
# JP: 「あったよ！　大いに」
2166 = "「有啊！很大的新發現」" 

# monologue
# JP: 弾んだ声にホっとする。
2660 = "她興奮的聲音讓我放下心來。" 

# monologue
# JP: やはり、稀咲は宝生稀咲だ。\n仕事がらみの話が一番、落ち着くらしい。
2931 = "稀咲果然還是那個寶生稀咲。跟工作有關的話題，是最能讓她冷靜下來的。" 

# 【稀咲】
# display as 稀咲
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は、面白いね。ただ、\x%l客車;#00ffc040;客車%l;#;がつくとなると、\nあの……テンダーだっけ？」
1382 = "「\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;真有意思啊。只是連接著\\x%l客車;#00ffc040;客運車廂%l;#;的時候，那個……好像是叫煤水車？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\x%l炭水車;#00ffc040;[テンダー,2]炭水車%l;#;やボイラが邪魔になり、\n[キャブ,2]運転台の様子や前の様子は、まるで見えない」
1942 = "「嗯，是的。\\x%l炭水車;#00ffc040;煤水車%l;#;和鍋爐會擋住視野，完全看不見駕駛台和駕駛台前面的情況」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよね。そうなるよね。そうなると、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の魅力はかなり……薄くなるよね」
2154 = "「是啊。確實會這樣。這樣一來，\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的魅力就……小了很多啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんな」
1398 = "「……可能是吧」" 

# monologue
# JP: 客として、客車にのったあの時を。\n父さんと、母さんと、路子との旅を思い出す。
2730 = "我回想起自己作為乘客搭乘客車的時候。和父親、母親和路子去旅行的那一天。" 

# monologue
# JP: あれは確かにわくわくしたが、例えば\n\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;でも、同じわくわくを感じた気もする。
3096 = "雖然那個時候我確實很興奮，但就算是坐柴油機車，我也一樣會覺得很興奮的吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;”という五文字が強い売りとなるのは、\nある程度は鉄道好きな人に対してだけかもしれんな」
1387 = "「“\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;”這四個字會吸引的，或許只有喜歡鐵路，對鐵路有一定了解的人啊」" 

# 【ハチロク】
# display as 八六
# JP: 「ん……」
# 1924 = "「嗯……」" 

# 【日々姫】
# display as 日日姬
# JP: 「だよねー。やっぱり。\nそれはそうだよ」
2243 = "「確實啊。果然是這樣，不過這也沒錯」" 

# monologue
# JP: ハチロクさえも、あえて異論を挟んでこない。
3069 = "連八六都沒有反對。" 

# monologue
# JP: ならば恐らく、それは正しい認識だろうし、\n今となっては、鉄道好きの数にも期待は出来なかろう。
3072 = "那麼，這個認識恐怕沒有錯了。在現在這個年代，恐怕不能對鐵路愛好者的數量抱什麼幻想。" 

# 【稀咲】
# display as 稀咲
# JP: 「だから……鉄道だけで観光推進っていうのは、\nよほどのアイディアが無いと厳しそうかとは思う」
2105 = "「所以……想光靠鐵路來推動旅遊，如果沒有相當好的點子的話，我覺得很困難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「アイディア、か」
2393 = "「點子啊」" 

# monologue
# JP: それが簡単に出てくるのなら、\n何の苦労もないのだが――ああ。
2678 = "如果能這麼輕鬆就想得到的話，就不用這麼辛苦了——啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言っていただろう。キャブ内で。\n僕が、[ハチロクニイマル,3]8620から刺激を受けたということを」
1758 = "「你剛剛在駕駛室裡的時候說過吧。說我是受到了８６２０的刺激」" 

# 【稀咲】
# display as 稀咲
# JP: 「う、うん。言ったね、確かに言った」
1866 = "「呃、嗯。說過。確實說過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした意見が出るというのは――\n稀咲もなにか、刺激を感じたからではないのか？」
1761 = "「你會說出這樣的意見——是不是說明你也感受到了什麼刺激？」" 

# monologue
# JP: ちゃぷん、と水音。
2523 = "一聲“啾噗”的水聲。" 

# monologue
# JP: まさか振り返りも出来ないが、\n稀咲がなにか、体を動かしたことは感じる。
3090 = "雖然我沒辦法回頭，但是我感覺到稀咲的身體動了。" 

# 【稀咲】
# display as 稀咲
# JP: 「刺激っていうか――僕が感じたのは欲さ。\nだから、双鉄の変化のきっかけになったと思った」
2297 = "「與其說是刺激——不如說，我感覺到的是欲望。所以我想，這或許是你產生變化的契機」" 

# 【双鉄】
# display as 雙鐵
# JP: 「欲」
2178 = "「欲望」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう。欲。\n『このままずっと走っていたい』って、そんな欲」
1998 = "「對。欲望。“想就這樣奔跑下去”的欲望」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かにそれは感じるな」
2001 = "「對，我確實有這種感覺」" 

# monologue
# JP: 言えばぱしゃん、と、\nさっきよりずっと元気な水音。
3066 = "這麼說之後，我又聽見了“嘩啦”一聲比剛才要響亮許多的聲音。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄もか。やっぱり、誰でも感じるよね。\nあんなに短い区間を往復するだけじゃもったいない」
1755 = "「你也有啊。果然每個人都會有這種感覺呢。只在這麼短的路段內往返，太浪費了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが……\n復線とは、そう簡単なものではないらしい」
2310 = "「話是這麼說……但恢復廢線好像並不是一件容易的事」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね。土地が絡むことだし。\nっていうか、なら双鉄もそのことを？」
1716 = "「也是啊。畢竟還關係到土地。這麼說的話，你也想到過這個？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレットとも相談はした。\nもらった資料を読み込んで、それもありかと思ってな」
1934 = "「嗯。我和波萊特也談過。閱讀了你那邊的資料後，我覺得這樣也可行」" 

# 【稀咲】
# display as 稀咲
# JP: 「あの資料からその発想が？」
2352 = "「那些資料讓你產生了這樣的想法？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の工場立地と移送コストとの話だ。\n復線がなれば、それらを一気に解決できる」
2085 = "「我是說\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的選址和運輸成本的事情。能恢復廢線的話，這些問題就能一次性解決」" 

# monologue
# JP: ああ、と納得したような声。
2655 = "她發出“啊”的一聲表示理解。" 

# monologue
# JP: けれど稀咲は、\nそれが机上の空論だともやはりたちどころに理解する。
2565 = "但是稀咲也馬上明白，這只是紙上談兵。" 

# 【稀咲】
# display as 稀咲
# JP: 「叶えば、素晴らしい話だけれど……」
1982 = "「如果能實現的話確實最好……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実現可能性を見つけられんかと思って相談したが――\nさすがポーレットは、路線のことを熟知している」
2072 = "「我也想著有沒有實現的可能性，跟波萊特談了一下——不愧是波萊特，對線路的事再熟悉不過」" 

# monologue
# JP: 資料上、候補地の一つとしてあがっていた[せんだい,1]千内市。
3037 = "資料上提到的候選地之一——川內市。" 

# monologue
# JP: そこと御一夜との間はかつて、\n鹿兒島をぐるり回って、\x%l帝鉄;#00ffc040;帝鉄%l;#;路線で結ばれていた。
2559 = "以前川內和御一夜之間是通過繞了鹿兒島一圈的\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;線路連接起來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その復線が仮にできれば、\x%lエアクラ;#00ffc040;エアクラ%l;#;社と御一夜鉄道、\nともに利益を生み出せるから……出来ればと考えたのだ」
1772 = "「假如能夠恢復廢線，\\x%lエアクラ;#00ffc040;空凝機%l;#;公司和御一夜鐵路都能從中獲益……如果能實現的話就好了」" 

# 【稀咲】
# display as 稀咲
# JP: 「御一夜鉄道も？　って、あ……そうか。当然か、\n移送となれば貨物\x%l列車;#00ffc040;列車%l;#;が走るわけだし――」
2038 = "「御一夜鐵路也有？呃，啊……是這樣啊。也對，要運輸的話就要用到貨運\\x%l列車;#00ffc040;列車%l;#;——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路が長く続き、乗り継ぎなども出来るようになれば、\n観光\x%l列車;#00ffc040;列車%l;#;としての価値も向上しようしな」
1774 = "「假如能延長線路，也能換乘的話，作為觀光\\x%l列車;#00ffc040;列車%l;#;的價值也會提高」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん……だよね、これは――だから――」
1926 = "「嗯……也是啊，畢竟是——所以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
2272 = "「稀咲？」" 

# monologue
# JP: 相槌のようで、相槌ではない。\n稀咲は一人で頷いて、なにやらぶつぶつつぶやいている。
2943 = "稀咲的話像是在附和，又好像不是。她一個人一邊點著頭一邊嘀咕著什麼。" 

# 【稀咲】
# display as 稀咲
# JP: 「周辺自治体にも当然波及はするだろうし――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社の長期目標は飛行型の普及なんだし！」
2226 = "「理所當然也會涉及到周邊自治體——\\x%lエアクラ;#00ffc040;空凝機%l;#;社的長期目標又是普及飛行型！」" 

# monologue
# JP: （ざばあっ！）
3120 = "（嘩啦！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2395 = "「！？」" 

# monologue
# JP: 激しい水音。
2604 = "劇烈的水聲。" 

# monologue
# JP: それは止まずに、僕の脇へと回り込み、\n正面側へと近づいてく――っ！！
2830 = "水聲沒有停下來，繞到我的側邊，又接近我的正側面——！！" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄。それだ。それで行こう」
2383 = "「雙鐵。就是這個。就用這個辦法吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それ……と、は、\n御一夜-[せんだい,1]千内間の復線か？」
2331 = "「這個……是說恢復御一夜至川內間的線路？」" 

# monologue
# JP: 話に集中することで、\n稀咲の肌へと向きそうになる意識をなんとか引き止める。
2727 = "我努力集中精神在談話上，讓自己不要去注意稀咲的身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それほど長区間の復線を果たす資金など」
1748 = "「但是，有這麼多資金去支撐如此長的路段恢復廢線嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「無い資金なら、作るのさ。君たちの知恵、\n\x%lまいてつ;#00ffc040;まいてつ%l;#;システム。あれを、レールで行えばいい」
2181 = "「沒有資金的話就去賺。將你們的智慧——\\x%lまいてつ;#00ffc040;掌車人%l;#;系統運用到線路上就好了」" 

# monologue
# JP: ああ、と控えめなハチロクの声。
2598 = "八六輕輕“啊”了一聲。" 

# 【ハチロク】
# display as 八六
# JP: 「レールオーナー制度でございますか？\nけれどあれは、大して参加者が集まるようなものでは」
2057 = "「您是說私有線路制度嗎？但是它並不能吸引大量的參與者」" 

# 【稀咲】
# display as 稀咲
# JP: 「多分、違う。ボクが考えているのは、レールを資産――\n投資対象として、証券化して販売することだよ」
2065 = "「應該不能吧。我考慮的是，將線路作為資產——作為投資對象，來銷售鐵路證券」" 

# 【双鉄】
# display as 雙鐵
# JP: 「投資対象？」
2110 = "「投資對象？」" 

# 【稀咲】
# display as 稀咲
# JP: 「レールの営業権を分割して売るんだ。\nレールが利益を生み出せば、それを分配する」
1795 = "「分割線路的經營權來銷售。如果線路上產生了利潤，就進行分紅」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっと……」
1864 = "「呃……」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が[ハチロク,3]8620を所有し、走らせ、利益の分配を受ける。\n同じことを、レールを使って、大人数でやるってことさ」
2008 = "「就像雙鐵擁有[八六,3]８６２０，可以讓８６２０行駛並得到分紅一樣。就是讓更多的人來參與鐵路運營的意思」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　だから『\x%lまいてつ;#00ffc040;まいてつ%l;#;のレール版』」
1907 = "「啊！所以就是“\\x%lまいてつ;#00ffc040;掌車人%l;#;的線路版”」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう。いわば……マイレール。\nマイレール・ファンドと言ったところだ」
2184 = "「沒錯。可以說是……私有線路。也就是私有線路基金」" 

# 【ハチロク】
# display as 八六
# JP: 「マイレール・ファンド」
2247 = "「私有線路基金」" 

# 【稀咲】
# display as 稀咲
# JP: 「復線がなれば一番利益を得るのは\x%lエアクラ;#00ffc040;エアクラ%l;#;社だ。\nよって、\x%lエアクラ;#00ffc040;エアクラ%l;#;社は多少なりともファンドに参加する」
1985 = "「如果能恢復廢線，能得到最多利益的還是\\x%lエアクラ;#00ffc040;空凝機%l;#;公司。因此，\\x%lエアクラ;#00ffc040;空凝機%l;#;公司或多或少肯定會參與的」" 

# monologue
# JP: 推定ではなく、断定形。\n稀咲の言葉も姿勢も強い確信に満ちている。
2658 = "她的話並不是推測，而是肯定。稀咲的語氣和態度中都充滿了強烈的自信。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社がファンドに参加するという意味は」
2156 = "「是嗎——\\x%lエアクラ;#00ffc040;空凝機%l;#;公司會參與，也就代表著——」" 

# 【稀咲】
# display as 稀咲
# JP: 「極めて大きい。それは、\x%lエアクラ;#00ffc040;エアクラ%l;#;社が、\n鉄道との共存を望んでいるとアピールにもなるから」
2063 = "「意義重大。因為這代表\\x%lエアクラ;#00ffc040;空凝機%l;#;公司希望與鐵路共存」" 

# monologue
# JP: それは、間違いなく呼び水となる。\n一般から、行政から、企業から――
3063 = "這無疑將會激起漣漪。這樣下來，一般民眾、行政界、企業都會紛紛投資——" 

# monologue
# JP: 資金も意見も集まってこようし、\n集まった金と知恵とは、きっと新たなレールを繋ぐ。
2987 = "而我們既能收集到資金和意見，得到的資金和智慧又能為全新的軌道鋪上基石。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凄い……な」
1964 = "「太……厲害了」" 

# monologue
# JP: 体が震える。\n震えているのに、熱くなる。
2753 = "我的身體在發抖。明明在發抖，但身體卻熱得厲害。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、キミは凄いな。\nよくもまぁそんなアイディアを」
2267 = "「稀咲，你太厲害了。居然能想到這樣的點子」" 

# 【稀咲】
# display as 稀咲
# JP: 「[ハチロク,3]8620に乗せてもらったからさ。\nそれに、復線の話も細かく聞かせてもらえたから」
2365 = "「都是因為搭乘了[八六,3]８６２０。而且也詳細聽你說了恢復廢線的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら」
2357 = "「那麼——」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう！」
2185 = "「沒錯！」" 

# monologue
# JP: 言葉と同時に体が動き、お湯の飛沫が跳ね上がる。\nそのきらめきよりなお眩しく、稀咲の満面の笑みが輝く。
2643 = "在說話的同時，她一下子站了起來，掀起朵朵水花。而稀咲那燦爛的笑容比水花更加耀眼。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは全員のアイディアだ。\nそして必ず、全員で叶えていけるアイディアなんだ」
2335 = "「這是所有人的點子。而且也肯定是要由所有人共同來實現的點子」" 

# 【ハチロク】
# display as 八六
# JP: 「マイレール・ファンド……それがうまくいくのなら、\nきっと、[ひのもと,2]日ノ本、全ての場所で」
2246 = "「私有線路基金……如果順利的話，肯定能擴散到日本的每一個角落——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\n途切れてしまった、全てのレールが」
2002 = "「對，沒錯。所有中斷的鐵路都將會復活——」" 

# monologue
# JP: 路線網――鉄道の生命線たるそれの復活に繋がる案を、\n僕の目の前、笑顔の少女が産みだした。
2992 = "能令相當於鐵路生命線的線路網起死回生的方案，是由我眼前這位滿面歡笑的少女所想到的。" 

# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;では、あれほど頼りなかった姿が、\n今はどうだ、これほどまでに美しく――――――っ！！
2810 = "曾經在\\x%l運転台;#00ffc040;駕駛台%l;#;上手忙腳亂的她，現在卻顯得如此美麗動人——————！！" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ――兄さん？」
2376 = "「阿哥——哥哥？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2384 = "「雙鐵少爺？」" 

# monologue
# JP: いかん。\n体が……熱くなる。
2531 = "不好。身體……好燙。" 

# monologue
# JP: 稀咲と風呂に入っている。\n極めて単純な事実を僕は、その輝きに忘れていたが――
2745 = "我正在和稀咲泡澡。她的光芒讓我忘記了這極為單純的事實——" 

# 【稀咲】
# display as 稀咲
# JP: 「え？」
1888 = "「哎？」" 

# monologue
# JP: 真正面の。稀咲の視線が、下を向く。\n向いた視線が、すぐ上へ――っ！！？
2821 = "正面。稀咲的視線往下看。投來的視線很快往上——！！？" 

# 【稀咲】
# display as 稀咲
# JP: 「ひえっ！？　あうわっ！？――あ――\nきゅうう～～～っ」
1870 = "「呃啊！？啊哇！？——啊——嗚嗚嗚～～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お、おい、稀咲っ！」
1920 = "「喂、喂，稀咲！」" 

# monologue
# JP: 真っ赤になって、目を白くして、崩れてく。
2654 = "她滿臉通紅，雙眼翻白倒了下去。" 

# 【ハチロク】
# display as 八六
# JP: 「いけません。のぼせましたか」
1689 = "「不好。是泡暈了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2125 = "「日日姬！」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった、にぃに！」
2098 = "「我知道了，阿哥！」" 

# monologue
# JP: 日々姫の手を借り、\n稀咲が湯へと崩れおちぬよう、支えてもらう。
2756 = "我讓日日姬支撐住稀咲，不讓她倒在水中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
# 1974 = "「好！」" 

# monologue
# JP: （ざばあああああっ！）
3119 = "（嘩啦啦啦啦啦啦啦！）" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、お姫様だっこ！！」
1879 = "「哇，公主抱！！」" 

# monologue
# JP: ともかく、冷静にならねばならん。\n稀咲にも、冷静になってもらわねば。
2980 = "總之現在必須要冷靜。也必須要讓稀咲冷靜。" 

# monologue
# JP: この案を必ず実現するため――\nのぼせてるような時間など、僕らには許されていないのだ。
2841 = "為了實現這個方案——我們可沒空暈在浴池。" 
