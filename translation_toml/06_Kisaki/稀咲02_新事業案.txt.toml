1750 = "「但雖如此，光靠合作也無法迴避緩慢的衰退。就和目前御一夜所處的狀況一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、だな」
1987 = "「完全沒錯」" 

# monologue
# JP: 稀咲の言葉が僕の視界を、\nより広く、より深くへと導いてくれる。
2945 = "稀咲的話讓我的視野變得更加開闊、思考得更加深遠。" 

