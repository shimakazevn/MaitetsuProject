2101 = "「我習慣被這麼說了。但是其他工作也一樣吧？都有苦有樂，也有困難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだな。本当にそうだ」
1927 = "「嗯……是啊。完全沒錯」" 

# 【稀咲】
# display as 稀咲
