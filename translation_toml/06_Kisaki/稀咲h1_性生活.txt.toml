# monologue
# JP: 亀頭の先から、余りに強い快感が、\nしびれのように、僕の全身に広がっていく。
1982 = "Từ đỉnh quy đầu, một khoái cảm quá đỗi mãnh liệt,\nlan tỏa khắp toàn thân tôi như một luồng điện tê dại."
# 【稀咲】
# display as 稀咲
# JP: 「ちゅるっ――ずっ――ちゅっ――れるっ――\nちゅむっ――はむっ――じゅるるっ――んっ」
1277 = "「Chụt――mút――chụt――liếm――\nchu mu――ha mu――chu ru ru――ưm」"
# monologue
# JP: （しこっ！　しゅこっ！　しこっ！　しゅっ！！）
2084 = "（Tuốt! Tuốt! Tuốt! Tuốt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ――稀咲――稀咲――稀咲っ」
1262 = "「A――Kisaki――Kisaki――Kisaki」"
# monologue
# JP: 稀咲の口から溢れるよだれが、\n髪を濡らして、しごく手をさらに潤滑させる。
1854 = "Nước bọt tràn ra từ miệng Kisaki\nlàm ướt mái tóc, khiến bàn tay đang tuốt càng thêm trơn tru."
# monologue
# JP: 舌はくりくり亀頭の割れ目に入ろうとして、\n口内全部が、きゅううと僕を吸引してきて――
1662 = "Chiếc lưỡi cứ lượn lờ chực chờ tiến vào rãnh quy đầu,\ntoàn bộ khoang miệng đang mút chặt lấy tôi――"
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲――これ以上、したら――もうっ！」
1426 = "「Kisaki――nếu cứ tiếp tục thế này――anh ra mất!」"
# monologue
# JP: 稀咲の動きが、ぴたりと止まる。\n咥えたままで――目が、まっすぐに僕を見る。
1862 = "Chuyển động của Kisaki đột ngột dừng lại.\nVẫn ngậm lấy nó――đôi mắt cô ấy nhìn thẳng vào tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ひひひょ、ほーへふっ――んっ――ほのはは――はひへ――――――ずゅぼおおおぉぉぉぉっ！！」
1407 = "「Hông hao âu, anh Houtehu――ưm――hứ hế――bắn hao hoang hiệng em hiii――――――chụt ooooooo!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っあっ！」
1275 = "「A!」"
# monologue
# JP: （びゅぶっ！　びゅるるっ！　びゅうっ！　びゅぼっ！）
2053 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【稀咲】
# display as 稀咲
# JP: 「んぷっ！？　ぷっ――ん～～～～～～っ」
1310 = "「Ưm!? Phụt――ưm~~~~~~っ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ――あっ――あ――あ」
1261 = "「A――a――a――a」"
# monologue
# JP: 射精、している。\n稀咲の口内に剥き出しの精液を打ち付けている。
1678 = "Tôi đang xuất tinh.\nBắn trực tiếp những luồng tinh dịch trần trụi vào trong miệng Kisaki."
# monologue
# JP: 稀咲の目のふちに見る見る涙のつぶが膨らみ――\nそれでも稀咲は、咥えた亀頭を離さずにいる。
1876 = "Khóe mắt Kisaki ngấn lệ đọng lại thành từng giọt lớn――\nDù vậy cô ấy vẫn không chịu nhả quy đầu đang ngậm trong miệng ra."
# monologue
# JP: （びゅっ――びゅる――――ピッ――ぴゅっ）
2061 = "（Phụt――phụt――――tí tách――phụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ……うあ――」
1265 = "「A...... ư a――」"
# monologue
# JP: 腰がぶるりと震えれば、\n稀咲はようやく、僕の亀頭から唇を離す。
1648 = "Khi hông tôi khẽ run lên bần bật,\ncuối cùng Kisaki cũng chịu buông môi khỏi quy đầu của tôi."
# monologue
# JP: そして、ふくらんだ頬のまま、\nティッシュへと手を――
1666 = "Sau đó, với đôi má vẫn đang phồng lên,\ncô ấy đưa tay về phía hộp khăn giấy――"
# 【双鉄H】
# display as 雙鐵
# JP: 「？」
1490 = "「?」"
# monologue
# JP: ――伸ばしたところで、動きが止まる。\nぱちぱち、大きなまばたきをする。
980 = "――Vừa vươn tay ra thì động tác liền dừng lại.\nCô ấy chớp chớp đôi mắt to tròn."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲？　どうした」
1445 = "「Kisaki? Có chuyện gì vậy」"
# 【稀咲】
# display as 稀咲
# JP: 「ん～～～～～っ――んっ――んうっ――ごくんっ！」
1323 = "「Ưm~~~~~っ――ưm――ưm――ực!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なっ！？」
1194 = "「Hả!?」"
# 【稀咲】
# display as 稀咲
# JP: 「んくっ――ごくっ――んっ――ごくっ、んっ――\nぷえっ！」
1308 = "「Ưm――ực――ưm――ực, ưm――\nphù!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何も、無理して飲まずとも」
1189 = "「Em không cần phải cố nuốt xuống đâu」"
# 【稀咲】
# display as 稀咲
# JP: 「む、無理くらいする、よ。――うぇ――えっ。\nだって、双鉄の目――んっ――飲んで、欲しいって」
1421 = "「P-Phải cố một chút chứ. ――Oẹ――e.\nTại vì, ánh mắt của anh Soutetsu――ưm――như đang muốn em nuốt nó mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ」
999 = "「――Ừm」"
# monologue
# JP: 嬉しい。愛おしい。たまらない。
1670 = "Thật hạnh phúc. Thật đáng yêu. Không thể kìm nén được."
# monologue
# JP: 言葉にすれば、ひどく月並にしかならない気がして――\nだから唇の使い方を今は変えてみる。
1708 = "Cảm giác như nếu diễn đạt bằng lời thì sẽ trở nên vô cùng sáo rỗng――\nVì vậy lúc này tôi thử thay đổi cách sử dụng đôi môi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ちゅっ――ちゅむっ――あむっ――れろおっ」
1279 = "「Chụt――chu mu――a mu――liếm」"
# 【稀咲】
# display as 稀咲
# JP: 「んむっ！？　んっ――ちゅっ――ちゅうっ――ふっ」
1309 = "「Ưm mu!? Ưm――chụt――chụt――fu」"
# monologue
# JP: キスをし、舌を伸ばしてみれば、\n稀咲のえずきの理由が僕にも伝わってくる。
1907 = "Hôn và đưa lưỡi vào,\nlý do khiến Kisaki nôn khan cũng truyền sang tôi."
# monologue
# JP: 青臭く、生臭く。苦く、そうして、ひたすらえぐい。
1926 = "Mùi hăng hắc, tanh tưởi. Vị đắng chát, và vô cùng khó nuốt."
# 【双鉄H】
# display as 雙鐵
# JP: 「……稀咲」
1017 = "「......Kisaki」"
# monologue
# JP: 良くこんなものを飲んでくれた――と、\n思えば、愛おしさが止まらなくなる。
1692 = "Vậy mà em ấy lại chịu nuốt thứ này vì mình――\nNghĩ đến đó, tình yêu thương trong tôi lại tuôn trào không dứt."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲――稀咲！　稀咲っ！！」
1429 = "「Kisaki――Kisaki! Kisaki!!」"
# 【稀咲】
# display as 稀咲
# JP: 「ぁっ」
# 1270 = "「啊」" 
# monologue
# JP: （とさっ）
2059 = "（Bịch）"
# monologue
# JP: 稀咲と体勢を入れ替える。
1714 = "Tôi đảo ngược tư thế với Kisaki."
# monologue
# JP: なかば衝動的な動きにも、\n稀咲は素直に従って――僕にその身を任せてくれる。
1805 = "Dù đó là một hành động có phần bốc đồng,\nnhưng Kisaki vẫn ngoan ngoãn thuận theo――giao phó bản thân cho tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲……綺麗だ」
1432 = "「Kisaki...... em đẹp lắm」"
# monologue
# JP: 横たわる稀咲は、\n今までよりずっとやわらかな顔をしている。
1956 = "Kisaki nằm đó,\nkhuôn mặt trông dịu dàng hơn hẳn từ trước đến nay."
# monologue
# JP: 女、なのだと――\n男である僕の心が、そして体がひしひし感じる。
1766 = "Quả nhiên là một người phụ nữ――\nCả tâm trí lẫn cơ thể của một thằng đàn ông như tôi đều cảm nhận được điều đó một cách mãnh liệt."
# 【双鉄H】
# display as 雙鐵
# JP: 「肌を重ねあうことがこれほど素敵なことだと……\n稀咲に教えてもらえることが、僕は本当に幸せだ」
1449 = "「Sự tiếp xúc da thịt lại tuyệt vời đến thế này......\nĐược Kisaki dạy cho điều đó, anh thực sự rất hạnh phúc」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ。嬉しいな。\n双鉄が、ボクと同じ気持ちでいてくれて」
1252 = "「Fufu. Em vui lắm.\nVì anh Soutetsu cũng có cùng cảm xúc với em」"
# monologue
# JP: 花の香りがする微笑。\n稀咲の瞳の中には僕が映ってる。
1659 = "Nụ cười mang theo hương hoa.\nTrong đôi mắt của Kisaki phản chiếu hình bóng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクも、教えてもらってるんだよ？\n双鉄に――恋のこと、セックスのこと、男の子のこと」
1216 = "「Em cũng được anh dạy cho nhiều điều mà?\nTừ anh Soutetsu――về tình yêu, về tình dục, và về con trai nữa」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕が――稀咲に？」
1361 = "「Anh――dạy cho Kisaki sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「DVDで勉強できるのは、誰か他人のセックスだから。\nボクのセックスは、双鉄からしか学べないから」
1344 = "「Vì học qua DVD thì đó cũng chỉ là tình dục của người khác thôi.\nCòn tình dục của riêng em, thì em chỉ có thể học từ anh Soutetsu mà thôi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ――僕のセックスも、稀咲からしか教われないし、\n教わりたくない」
1364 = "「Anh cũng vậy――tình dục của anh, cũng chỉ có thể học từ Kisaki,\nvà anh cũng không muốn học từ ai khác」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。だから、一緒に勉強しよう？　双鉄と、ボクの\n――きっとありきたりで、だけど特別な、セックスを」
1317 = "「Ừm. Vậy nên, chúng ta cùng nhau học nhé? Tình dục của anh Soutetsu và em\n――chắc chắn sẽ rất bình dị, nhưng cũng vô cùng đặc biệt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1304 = "「Ừm」"
# monologue
# JP: 稀咲の言葉は、いつでも僕を解いてくれる。
1882 = "Những lời nói của Kisaki, lúc nào cũng giải thoát cho tôi."
# monologue
# JP: セックスは誰もがきっとすることで――\nだけれど僕らのセックスは、僕たちだけの特別だ。
1586 = "Tình dục là chuyện mà chắc hẳn ai cũng sẽ làm――\nNhưng tình dục của chúng tôi, lại là sự đặc biệt chỉ thuộc về hai chúng tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲……パンツを脱いでくれるか？」
1433 = "「Kisaki...... em cởi quần lót ra được không?」"
# 【稀咲】
# display as 稀咲
# JP: 「いいよ。双鉄。\n……見てて、ね？　脱ぐとこ」
1333 = "「Được thôi. Anh Soutetsu.\n......Nhìn cho kỹ, nhé? Cảnh em cởi ra ấy」"
# monologue
# JP: （しゅるッ――）
2054 = "（Tuột――）"
# monologue
# JP: 稀咲がパンツをめくりあげれば、\n女性器とパンツの間につ――と透明な糸が繋がる。
1886 = "Khi Kisaki lột chiếc quần lót xuống,\ngiữa âm hộ và quần lót kéo dài ra một sợi tơ trong suốt."
# 【双鉄H】
# display as 雙鐵
# JP: 「すごいな……\n女性器とは、それほどに濡れるものなのか」
1256 = "「Thật tuyệt vời......\nÂm hộ phụ nữ, lại có thể ướt át đến mức này sao」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね……ボクも、自分で知らなかったよ。\nこれも、双鉄がボクに教えてくれたことになるね」
1396 = "「Đúng vậy nhỉ...... chính em cũng không biết đâu.\nĐây cũng xem như là điều anh Soutetsu đã dạy cho em đấy」"
# monologue
# JP: いって、稀咲は――
1760 = "Nói rồi, Kisaki――"
# 【稀咲】
# display as 稀咲
# JP: 「ん……」
1291 = "「Ưm......」"
# monologue
# JP: （くぱぁっ）
2056 = "（Tách）"
# monologue
# JP: ――自らの手で、女性器の外の肉の唇を開いてくれる。
982 = "――Tự dùng tay vạch mở đôi môi thịt bên ngoài âm hộ ra."
# monologue
# JP: 鮮やかでかわいいサーモンピンクに、\n女の子の中身の色に――僕の全身が惹きつけられる。
1980 = "Sắc hồng cá hồi rực rỡ và đáng yêu,\nmàu sắc bên trong cơ thể con gái――đã thu hút toàn bộ sự chú ý của tôi."
# 【稀咲】
# display as 稀咲
# JP: 「今度は、ボクが教える番かな――\nね？　双鉄、どこにペニスを挿れるか、わかる？」
1471 = "「Lần này, đến lượt em làm giáo viên nhỉ――\nNè? Anh Soutetsu, anh có biết phải đưa dương vật vào đâu không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
1002 = "「............」"
# monologue
# JP: 僕の、ペニスを、挿れる、場所。
1728 = "Nơi, để đưa, dương vật, của tôi vào."
# monologue
# JP: その言葉だけで、脳がクラクラしてしまう。\n探そうとする目の情報を処理できなくなる。
1911 = "Chỉ với những lời đó thôi cũng đủ làm não tôi choáng váng.\nKhông thể xử lý nổi lượng thông tin mà đôi mắt đang cố tìm kiếm nữa."
# 【稀咲】
# display as 稀咲
# JP: 「……ここ、だよ？　双鉄。ヴァギナ――膣。\nこの穴に、双鉄のペニスを挿れるんだ」
1016 = "「......Là ở đây, nè? Anh Soutetsu. Vagina――âm đạo.\nAnh sẽ đưa dương vật của mình vào cái lỗ này đó」"
# monologue
# JP: ヴァギナ。膣。指先がその穴だけを開いてくれれば、\n僕にもはっきり理解ができる。
55 = "Vagina. Âm đạo. Khi đầu ngón tay cô ấy vạch mở cái lỗ đó ra,\ntôi đã có thể hiểu được một cách rõ ràng."
# monologue
# JP: そして理解は、欲に繋がる。\n体が勝手に、亀頭を膣へと押し付けている。
1789 = "Và sự thấu hiểu đó, dẫn lối cho dục vọng.\nCơ thể tự động ép sát quy đầu vào âm đạo."
# monologue
# JP: （ぷりゅっ）
2068 = "（Phụt）"
# 【稀咲】
# display as 稀咲
# JP: 「んっ！」
# 1311 = "「嗯！」" 
# monologue
# JP: 甘い声。\n熱くぬかるむ、想像よりもさらに弾力を持った肉の感触。
1794 = "Giọng nói ngọt ngào.\nCảm giác da thịt nóng hổi, nhão nhoét, và đàn hồi hơn cả sức tưởng tượng."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲――」
1424 = "「Kisaki――」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。双鉄」
1319 = "「Vâng. Anh Soutetsu」"
# monologue
# JP: こくりと、小さくツバを飲み。\nそして稀咲は、また僕を解く言葉をくれる。
1715 = "Nuốt ực một ngụm nước bọt nhỏ.\nVà rồi Kisaki, lại trao cho tôi những lời giải thoát."
# 【稀咲】
# display as 稀咲
# JP: 「しよう？　セックス」
1205 = "「Làm nhé? Tình dục ấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲っ！」
1442 = "「Kisaki!」"
# monologue
# JP: （ずっ！！！）
2048 = "（Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「いっ――ぎっ！　――ぁっ」
1253 = "「Á――á! ――A」"
# monologue
# JP: （ぷつっ）
2063 = "（Phụt）"
# monologue
# JP: 紐を、ちぎったような感触。
1569 = "Cảm giác như vừa xé đứt một sợi dây."
# monologue
# JP: 目を向けたなら接合部から、\n真っ赤な真っ赤な血が流れてくる。
1729 = "Hướng mắt nhìn xuống phần tiếp nối,\nnhững dòng máu đỏ tươi đang chảy ra."
# 【稀咲】
# display as 稀咲
# JP: 「これが……ロスト、バージン、か――\n痛い、って、聞いてた、けど……ンッ――」
1463 = "「Đây là...... mất, trinh, sao――\nEm có nghe nói, là sẽ đau, nhưng mà...... Ưm――」"
# monologue
# JP: （きゅっ！）
2049 = "（Siết chặt!）"
# monologue
# JP: 意識して、だから力んでしまったのだろうか？\n稀咲の膣がキツくすぼまり、危うく射精しそうになる。
1624 = "Có lẽ vì ý thức được điều đó nên em ấy đã vô tình gồng mình lên chăng?\nÂm đạo của Kisaki siết chặt lại, khiến tôi suýt chút nữa thì xuất tinh."
# 【稀咲】
# display as 稀咲
# JP: 「最悪の……想像、よりは――ずうっと――楽――んっ\n……だから、双鉄――動い、て――ひゃんっ！？」
1409 = "「So với...... tưởng tượng tồi tệ nhất, thì――nhẹ nhàng――hơn nhiều――ưm\n......Vậy nên, anh Soutetsu――cử động, đi――hyan!?」"
# monologue
# JP: （もみゅっ――もにゅっ――）
2088 = "（Nắn nắn――nắn nắn――）"
# 【稀咲】
# display as 稀咲
# JP: 「なんだ……双鉄――ンッ――はっ――おっぱい――\nもみもみ――した、かった――んっ――の？」
1349 = "「Gì vậy...... anh Soutetsu――ưm――ha――ngực em――\nanh muốn――nắn bóp――lắm――ưm――sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1399 = "「Ừm」"
# monologue
# JP: 答えには少しのウソも無い。
1723 = "Trong câu trả lời không hề có chút dối trá nào."
# monologue
# JP: おっぱいももみもみしまくりたいし、\nおしりも思いっきり触ってみたい。
1718 = "Vừa muốn nắn bóp ngực thỏa thích,\nlại vừa muốn sờ soạng mông thật thỏa mãn."
# monologue
# JP: （もみっ――もみゅっ――にゅっ――こりゅっ）
2087 = "（Xoa nắn――nắn nắn――nắn――bóp）"
# 【稀咲】
# display as 稀咲
# JP: 「な……なんだか――妙に……手……上手、だね……\nんっ――すごく……おっぱい……気持ち……い、い――」
1200 = "「Sao...... sao tự nhiên――tay anh...... điêu luyện, thế......\nƯm――ngực em...... sướng...... sướng, quá――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか？　初めてのことなのだがな」
1400 = "「Vậy sao? Dù đây là lần đầu tiên anh làm chuyện này đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「なんだ……おっぱい……も――初めて……なの、か――\nんっ――んふふっ――ふっ――んっ――ふあっ――あっ」
1466 = "「Vậy sao...... sờ ngực...... cũng――là lần đầu tiên...... à――\nƯm――ưm fufu――fu――ưm――fua――a」"
# monologue
# JP: 嬉しげな笑み。\n強ばっていた稀咲の体が、少しやわら――っ！！？
1650 = "Nụ cười rạng rỡ.\nCơ thể đang căng cứng của Kisaki, chợt mềm ra một chút――!!?"
# monologue
# JP: （むちいいいいいいっ）
2064 = "（Phụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――あっ――」
1285 = "「Ưm――a――」"
# monologue
# JP: なんだ、これは。\nヴァギナ――膣内。ついさっきまでと、全然違う――
1961 = "Cái gì, thế này.\nVagina――bên trong âm đạo. Khác hẳn so với lúc nãy――"
# 【稀咲】
# display as 稀咲
# JP: 「ん……あっ――双、鉄――ふっ――んっ――\n動い、て……いい……かも」
1295 = "「Ưm...... a――anh, Soutetsu――fu――ưm――\nAnh cử động, đi...... được...... rồi đấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 1282 = "「嗯――」" 
# monologue
# JP: むちむちだ。\n稀咲はこんなにスレンダーなのに、膣内だけはむちむちだ。
1950 = "Thật là đẫy đà.\nKisaki có vóc dáng mảnh mai như vậy, thế mà bên trong âm đạo lại vô cùng đẫy đà."
# monologue
# JP: 柔らかな肉の内壁がぴったりムチムチ押しついてきて、\nこれで動けば――動いたら――
1625 = "Thành vách bằng thịt mềm mại ép chặt lấy tôi đầy đặn,\nnếu cứ thế này mà cử động――nếu tôi cử động――"
# monologue
# JP: （ぞりゅっ！）
2046 = "（Phập!）"
# 【稀咲】
# display as 稀咲
# JP: 「ん――きゅ――あ、んっ――」
1284 = "「Ưm――kyu――a, ưm――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くは――あっ――」
1280 = "「Kuha――a――」"
# monologue
# JP: 押しついてくる肉壁の、その表面のヒダもむちむち、\n強い質感で僕に張り付き、ほとんど食い込み刺激してくる。
1951 = "Thành vách bằng thịt đang ép sát lấy, những nếp gấp trên bề mặt cũng vô cùng đẫy đà,\nbám chặt lấy tôi với cảm giác chân thực mãnh liệt, như thể đang cắn chặt và kích thích tôi."
# monologue
# JP: （ずっ――ぶっ――）
2036 = "（Phập――phập――）"
# 【稀咲】
# display as 稀咲
# JP: 「んっ――ふっ――ひあっ――あっ――」
1283 = "「Ưm――fu――hya――a――」"
# monologue
# JP: ほんの少しを動かすだけで、体温が一気に跳ね上がる。\n全身から汗が吹き出して、呼吸もひどく乱れてしまう。
1896 = "Chỉ cần cử động một chút thôi, thân nhiệt liền tăng vọt.\nMồ hôi tuôn ra khắp toàn thân, nhịp thở cũng trở nên vô cùng rối loạn."
# monologue
# JP: （ず――るっ――ぞっ――ぞるっ――）
2038 = "（Phập――phập――phập――phập――）"
# 【稀咲】
# display as 稀咲
# JP: 「あ……これっ――んっ――さっき――より――長っ」
1269 = "「A...... cái này――ưm――dài――hơn――lúc nãy」"
# monologue
# JP: （ずっ――ぶっ――ぶっ――ずるっ――）
2035 = "（Phập――phập――phập――phập――）"
# 【稀咲】
# display as 稀咲
# JP: 「動き……だんだん……おっきく――ふっ――あっ――\nヴァギナ――おまんこ――ボク、の――押され、て」
1223 = "「Chuyển động...... dần dần...... mạnh hơn――fu――a――\nVagina――âm hộ――của em――bị ép, vào」"
# monologue
# JP: 稀咲の中もどんどん熱く、どろどろしてくる。
1867 = "Bên trong Kisaki cũng ngày càng nóng hơn, và nhão nhoét hơn."
# monologue
# JP: 動かすたびに蜜が泡だち、潤滑を助けてくれるのだけど、\nそれでもムチムチおまんこの刺激は強烈すぎる。
1939 = "Mỗi lần cử động, mật ngọt lại sủi bọt, giúp bôi trơn,\nnhưng dù vậy, sự kích thích từ chiếc âm hộ đẫy đà này vẫn quá đỗi mãnh liệt."
# monologue
# JP: （ぞっ――りゅっ――りゅっ――るううっ――）
2039 = "（Phập――phập――phập――phập――）"
# 【稀咲】
# display as 稀咲
# JP: 「や……抜けちゃ……やぁっ――だめ、えっ――」
1185 = "「Đừng...... rút ra...... á――không được, đâu――」"
# monologue
# JP: （ずぶ――――ぶっ――ぶうっ――うっ！）
2041 = "（Phập――――phập――phập――ư!）"
# monologue
# JP: 腰を動かすそのたびに、ひどく淫らな音が立つ。
1916 = "Mỗi lần hông tôi cử động, lại phát ra những âm thanh vô cùng dâm đãng."
# monologue
# JP: そこに稀咲の、か細い声が――\nか細いけれど、熱と湿り気をいっぱいに帯びた声が混じる。
1761 = "Hòa lẫn vào đó là giọng nói yếu ớt của Kisaki――\nTuy yếu ớt, nhưng lại mang đầy sức nóng và sự ẩm ướt."
# 【稀咲】
# display as 稀咲
# JP: 「これ――ねっ――これ――もっと――んっ！\nもっと――深く、ても――平、気――だか、らっ」
1461 = "「Cái này――nè――cái này――nữa đi――ưm!\nSâu――hơn nữa, cũng――không, sao――đâu」"
# monologue
# JP: （ずぶんっ！！！）
2043 = "（Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「～～～～～～～～～～っ！！！」
1494 = "「~~~~~~~~~~っ!!!」"
# monologue
# JP: 言葉に甘えて押しこめば、\n亀頭がごん、と、強く一番奥へと当たる。
1759 = "Nghe theo lời em ấy mà ấn sâu vào,\nquy đầu lập tức đâm mạnh vào tận sâu bên trong."
# monologue
# JP: 稀咲は背筋を、腕を足をピンと張り詰めて、\n声にならない声を喉から溢れさす。
1869 = "Kisaki căng cứng sống lưng, tay và chân duỗi thẳng,\nnhững âm thanh không thành tiếng trào ra từ cổ họng."
# 【双鉄H】
# display as 雙鐵
# JP: 「――ぁっ――これ――はっ――」
997 = "「――A――cái này――ha――」"
# monologue
# JP: （ずるっ！　ごっ！　ずうっ！　ごんっ！！）
2044 = "（Phập! Bịch! Phập! Bịch!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――ひあっ――あっ――イッて――いま――\nいって――るっ――か――あっ――待っ――んっ！？」
1260 = "「A――hya――a――ra đi――bây giờ――\nra――đi――a――đợi đã――ưm!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ。\n――僕も……っっ――イくっ」
1316 = "「Ừm, anh cũng vậy.\n――Anh cũng......っっ――ra đây」"
# monologue
# JP: （ずっ！　ごっ！　ずるっ！　ごりゅんんっ！！！）
2047 = "（Phập! Bịch! Phập! Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「んきゅ――くはっ――んあっ――～～～っ！！！」
1306 = "「Ưm kyu――kuha――ưm a――~~~っ!!!」"
# monologue
# JP: 稀咲が大きくのけぞれば、\nおまんこも緊張したようにキュっとすぼまる。
1852 = "Kisaki ưỡn người lên thật mạnh,\nâm hộ cũng như đang căng thẳng mà co rút lại."
# monologue
# JP: より密着するその狭隘を、\nとにかく抜けて――、一番奥へと亀頭でなんどもキスをする。
1687 = "Nơi chật hẹp ấy càng bám sát hơn,\ntôi rút ra một chút――rồi dùng quy đầu liên tục hôn vào nơi sâu nhất."
# monologue
# JP: （じゅぶっ！　ずごっ！　ずっ！　ごちゅんっ！）
2057 = "（Phập! Phập! Phập! Phập!）"
# 【稀咲】
# display as 稀咲
# JP: 「そ――そう――へっ――ふあっ――ひゃっ――あっ――\nま、た――ボク――またっ――イっちゃ――んっ、く」
1460 = "「N-Như vậy――he――fua――hya――a――\nL-Lại――em――lại――ra mất――ưm, ku」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ――稀咲っ！　もう少し、でっ――っ！」
1366 = "「Anh cũng vậy――Kisaki! Một chút, nữa thôi――っ!」"
# monologue
# JP: （ずるううううううううううううっ！！）
2045 = "（Phập!!）"
# 【稀咲】
# display as 稀咲
# JP: 「きゅ――ん――ひゃっ――ぇあっ――あっ――」
1243 = "「Kyu――ưm――hya――a――a――」"
# monologue
# JP: 最後の力を振り絞り、\n腰を大きく、ぎりぎりまで引く。
1590 = "Vắt kiệt chút sức lực cuối cùng,\ntôi kéo hông ra thật mạnh, đến tận mép ngoài."
# monologue
# JP: そして、呼吸を止めて一気にっ！！！
1788 = "Rồi nín thở, đâm mạnh vào một mạch!!!"
# monologue
# JP: （ずぶうううううううううううっ――ごっ！！！）
2042 = "（Phập――bịch!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「いっひゅうぅぅぅぅぅぅぅっっ！！！」
1254 = "「I hyuuuuuuuっっ!!!」"
# monologue
# JP: （きゅうううううっ！）
2055 = "（Siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ！！」
1281 = "「U a!!」"
# monologue
# JP: （びゅっ！　どびゅっ！　どびゅうう！　びゅるるっ！）
2070 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひゃっ――あっ――来てっ、るっ――あっ――\nびゅうって――精、子――んっ――しきゅ、子宮、にぃ」
1242 = "「Hya――a――vào rồi, ư――a――\nPhụt ra――tinh, trùng――ưm――tử cung, vào tử cung, rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: （子宮――子宮っ）
2077 = "（Tử cung――tử cung）"
# monologue
# JP: （びゅるっ！　びゅううっ！　びゅっ！　どびゅっ！）
2067 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 膣の最奥。\nそこが子宮で、僕の精子を稀咲が受精してくれる部屋。
1686 = "Tận cùng của âm đạo.\nNơi đó là tử cung, căn phòng mà Kisaki sẽ thụ tinh cho tinh trùng của tôi."
# monologue
# JP: 稀咲の言葉にそのイメージを与えて貰えば、\n精液さえもが、もう一段の力を絞る！
1881 = "Lời nói của Kisaki đã khơi gợi lên hình ảnh đó,\nkhiến ngay cả tinh dịch cũng vắt kiệt thêm một luồng sức mạnh nữa!"
# monologue
# JP: （びゅっ！　びゅうううっ！　びゅるっ！　びゅるんっ）
2072 = "（Phụt! Phụt! Phụt! Phụt）"
# 【稀咲】
# display as 稀咲
# JP: 「ひゃ……あっ――しゅごっ――すごっ――ふっ――\nあっ――精液……おまん、こ――いっぱい――すぎ、で」
1244 = "「Hya...... a――tuyệt――tuyệt quá――fu――\nA――tinh dịch...... âm, hộ――tràn đầy――quá, rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1258 = "「Ưm」"
# monologue
# JP: 膣を圧迫しすぎて痛めでもしたら大事だ。\n慌てて、膣からペニスを抜けば――
1943 = "Nếu chèn ép âm đạo quá mức mà làm tổn thương em ấy thì nguy to.\nTôi vội vàng rút dương vật ra khỏi âm đạo――"
# monologue
# JP: （こぽ……ぽっ）
2051 = "（Róc rách......）"
# monologue
# JP: 膣の入り口から溢れた精の濁った白色が、\nまだ止まらない、稀咲の処女を奪った赤と入り交じる。
1684 = "Màu trắng đục của tinh dịch tràn ra từ cửa âm đạo,\nhòa lẫn với màu đỏ vẫn chưa ngừng chảy, minh chứng cho việc tôi đã cướp đi trinh tiết của Kisaki."
# monologue
# JP: その光景が強烈すぎて、\n頭の温度がどんどんどんどんたかまって――
1962 = "Khung cảnh đó quá đỗi mãnh liệt,\nkhiến nhiệt độ trong đầu tôi cứ thế tăng dần lên――"
# monologue
# JP: （ぶっ！）
2073 = "（Phụt!）"
# 【稀咲】
# display as 稀咲
# JP: 「きゃっ！？　双鉄っ！！？」
1247 = "「Kya!? Anh Soutetsu!!?」"
# monologue
# JP: 目の前が一気に赤へと染まる。\n鼻から鉄の強い匂いが――鼻血を、出してしまったらしい。
1808 = "Tầm nhìn trước mắt bỗng chốc nhuộm một màu đỏ.\nMùi sắt nồng nặc bốc lên từ mũi――có vẻ như tôi đã bị chảy máu cam."
# monologue
# JP: 稀咲の手が僕を導いて、ソファに――\nいや、これは……
1859 = "Bàn tay Kisaki dìu tôi, đến chiếc ghế sofa――\nKhông, đây là......"
# 【稀咲】
# display as 稀咲
# JP: 「ごめんね？　双鉄。\nちょっと、お勉強、詰め込みすぎちゃったかな」
1385 = "「Xin lỗi anh nhé? Anh Soutetsu.\nHình như em, nhồi nhét bài học, hơi quá tay rồi nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――」
1417 = "「Không――」"
# monologue
# JP: 声が近い。
1909 = "Giọng nói thật gần."
# monologue
# JP: ついでに――性臭も立ち上ってくる。
1591 = "Nhân tiện――mùi hương tình dục cũng bốc lên nồng nặc."
# 【双鉄H】
# display as 雙鐵
# JP: 「もっと貪欲に学びたい。\n稀咲の、ヴァギナの傷が癒えたら、すぐにでも」
1379 = "「Anh còn muốn học hỏi nhiều hơn nữa.\nChỉ cần vết thương ở âm đạo của Kisaki lành lại, anh sẵn sàng làm ngay lập tức」"
# 【稀咲】
# display as 稀咲
# JP: 「あ」
# 1270 = "「啊」" 
# monologue
# JP: ふっと、空気が柔かになる。\n稀咲の指が、僕の髪を優しく撫でる。
1898 = "Bầu không khí chợt trở nên dịu dàng.\nNhững ngón tay của Kisaki nhẹ nhàng vuốt ve mái tóc tôi."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄……キミは――――\nふふっ……ちゅっ――ちゅっ――ちゅっ」
1477 = "「Anh Soutetsu...... anh đúng là――――\nFufu...... chụt――chụt――chụt」"
# monologue
# JP: キス。キス。キス。\n頬に。鼻にまぶたに。
1571 = "Hôn. Hôn. Hôn.\nLên má. Lên mũi, lên mí mắt."
# 【稀咲】
# display as 稀咲
# JP: 「ボクの初恋が、キミで良かった。\n諦めないで――叶えて、良かった」
1219 = "「Mối tình đầu của em, là anh thật tốt.\nĐã không bỏ cuộc――đã biến nó thành hiện thực, thật tốt quá」"
# 【双鉄H】
# display as 雙鐵
# JP: 「叶えて、か」
1329 = "「Biến thành hiện thực, sao」"
# monologue
# JP: 叶って、ではなく。\nそれがなんとも、稀咲らしい。
1576 = "Là tự mình biến nó thành hiện thực, chứ không phải chờ đợi nó trở thành hiện thực.\nĐiều đó quả thực rất giống với phong cách của Kisaki."
# 【双鉄H】
# display as 雙鐵
# JP: 「そのおかげで、僕も――」
1450 = "「Nhờ vậy mà, anh cũng――」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　それ以上はちょっとヤボかな」
1480 = "「Anh Soutetsu? Nói thêm nữa thì hơi mất hứng đấy nhé」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ――」
1307 = "「Ưm mu――」"
# monologue
# JP: 僕の言葉を、キスで塞いで。
1652 = "Cô ấy chặn lời tôi lại bằng một nụ hôn."
# monologue
# JP: そうして稀咲は、\nキスをしたまま、言葉に出さずに伝えてくれる。
1758 = "Và rồi Kisaki,\nvẫn giữ nguyên nụ hôn, truyền đạt cho tôi những điều không cần nói thành lời."
# 【稀咲】
# display as 稀咲
# JP: （セックスのことも、その先も――\n双鉄、一緒に、一生学ぼう？）
2093 = "（Cả chuyện tình dục, lẫn những chuyện sau này――\nAnh Soutetsu, chúng ta hãy cùng nhau học hỏi suốt đời nhé?）"
# monologue
# JP: わかりきってる答えを、それでも伝えたくって――\n僕も稀咲の口内へ、舌を思い切り伸ばし、差し込む。
1646 = "Dù đó là một câu trả lời đã quá rõ ràng, nhưng tôi vẫn muốn truyền đạt lại――\nTôi cũng vươn dài lưỡi, tiến thẳng vào trong khoang miệng của Kisaki."
