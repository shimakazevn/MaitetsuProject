1494 = "「～～～～～～～～～～！！！」" 

# monologue
# JP: 言葉に甘えて押しこめば、\n亀頭がごん、と、強く一番奥へと当たる。
1759 = "於是我真的用力往裡一頂，龜頭就直直地撞在了最深處的位置。" 

# monologue
# JP: 稀咲は背筋を、腕を足をピンと張り詰めて、\n声にならない声を喉から溢れさす。
1869 = "稀咲的後背、手腳都繃直了，張大嘴巴卻叫不出聲音來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――ぁっ――これ――はっ――」
997 = "「――啊――這個――哈――」" 

# monologue
# JP: （ずるっ！　ごっ！　ずうっ！　ごんっ！！）
2044 = "（吱溜！　咚！　吱！　咚！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――ひあっ――あっ――イッて――いま――\nいって――るっ――か――あっ――待っ――んっ！？」
1260 = "「啊――咿啊――啊――射吧――快點――射吧――要射了――嗎――啊――等一下――嗯！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ。\n――僕も……っっ――イくっ」
1316 = "「嗯，我也想。――我也……――要射了」" 

# monologue
# JP: （ずっ！　ごっ！　ずるっ！　ごりゅんんっ！！！）
2047 = "（吱！　咚！　吱溜！　咕咚！！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「んきゅ――くはっ――んあっ――～～～っ！！！」
1306 = "「嗯呀――嗚啊――嗯啊――～～～！！！」" 

# monologue
# JP: 稀咲が大きくのけぞれば、\nおまんこも緊張したようにキュっとすぼまる。
1852 = "稀咲仰起了身子，小穴也緊張得緊緊一縮。" 

# monologue
# JP: より密着するその狭隘を、\nとにかく抜けて――、一番奥へと亀頭でなんどもキスをする。
1687 = "小縫變得更加緊密了，我先抽出肉棒――然後再一次次推送到最深處的門上。" 

# monologue
# JP: （じゅぶっ！　ずごっ！　ずっ！　ごちゅんっ！）
2057 = "（啾噗！　吱！　吱！　咕吱！）" 

# 【稀咲】
# display as 稀咲
# JP: 「そ――そう――へっ――ふあっ――ひゃっ――あっ――\nま、た――ボク――またっ――イっちゃ――んっ、く」
1460 = "「這――這樣――的――呼啊――話――啊――我――又要――高潮――了――嗯啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ――稀咲っ！　もう少し、でっ――っ！」
1366 = "「我也是――稀咲！　再忍耐一小――！」" 

# monologue
# JP: （ずるううううううううううううっ！！）
2045 = "（吱溜！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「きゅ――ん――ひゃっ――ぇあっ――あっ――」
1243 = "「呀――嗯――呀――啊――啊――」" 

# monologue
# JP: 最後の力を振り絞り、\n腰を大きく、ぎりぎりまで引く。
1590 = "使出最後的力氣，我拔出到就要脫離小穴的位置。" 

# monologue
# JP: そして、呼吸を止めて一気にっ！！！
1788 = "然後沉住氣，猛地撞進去！！！" 

# monologue
# JP: （ずぶうううううううううううっ――ごっ！！！）
2042 = "（吱噗――咚！！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「いっひゅうぅぅぅぅぅぅぅっっ！！！」
1254 = "「咿呀啊啊啊啊！！！」" 

# monologue
# JP: （きゅうううううっ！）
2055 = "（哧溜！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ！！」
1281 = "「嗚啊！！」" 

# monologue
# JP: （びゅっ！　どびゅっ！　どびゅうう！　びゅるるっ！）
2070 = "（噗！　咚噗！　咚噗！　噗嚕！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ひゃっ――あっ――来てっ、るっ――あっ――\nびゅうって――精、子――んっ――しきゅ、子宮、にぃ」
1242 = "「呀――啊――進來了――啊――進來了――精子――嗯――進子、子宮了」" 

# 【双鉄H】
# display as 雙鐵
# JP: （子宮――子宮っ）
2077 = "（子宮――子宮）" 

# monologue
# JP: （びゅるっ！　びゅううっ！　びゅっ！　どびゅっ！）
2067 = "（噗嚕！　噗！　噗！　咚噗！）" 

# monologue
# JP: 膣の最奥。\nそこが子宮で、僕の精子を稀咲が受精してくれる部屋。
1686 = "小穴的最深處。那裡是子宮，我的精子給稀咲受精的小房間。" 

# monologue
# JP: 稀咲の言葉にそのイメージを与えて貰えば、\n精液さえもが、もう一段の力を絞る！
1881 = "稀咲的話勾引起了我的想像，連精液都能努力再射一輪了！" 

# monologue
# JP: （びゅっ！　びゅうううっ！　びゅるっ！　びゅるんっ）
2072 = "（噗！　噗！　噗嚕！　噗嚕）" 

# 【稀咲】
# display as 稀咲
# JP: 「ひゃ……あっ――しゅごっ――すごっ――ふっ――\nあっ――精液……おまん、こ――いっぱい――すぎ、で」
1244 = "「呀……啊――好多――好多啊――呼――啊――精液……小穴裡――滿滿的――都是」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1258 = "「唔」" 

# monologue
# JP: 膣を圧迫しすぎて痛めでもしたら大事だ。\n慌てて、膣からペニスを抜けば――
1943 = "要是壓傷了小穴就不好了。我趕緊把肉棒拔了出來――" 

# monologue
# JP: （こぽ……ぽっ）
2051 = "（咕嚕……咕嘟）" 

# monologue
# JP: 膣の入り口から溢れた精の濁った白色が、\nまだ止まらない、稀咲の処女を奪った赤と入り交じる。
1684 = "小穴口濺出的白色精液不斷地流出，混雜著稀咲紅色的處女血。" 

# monologue
# JP: その光景が強烈すぎて、\n頭の温度がどんどんどんどんたかまって――
1962 = "這種景象太刺激了，我大腦的溫度也越來越高――" 

# monologue
# JP: （ぶっ！）
2073 = "（噗！）" 

# 【稀咲】
# display as 稀咲
# JP: 「きゃっ！？　双鉄っ！！？」
1247 = "「呀！？　雙鐵！！？」" 

# monologue
# JP: 目の前が一気に赤へと染まる。\n鼻から鉄の強い匂いが――鼻血を、出してしまったらしい。
1808 = "眼前一下子被染成鮮紅。鼻孔中強烈的鐵鏽味――應該是流鼻血了。" 

# monologue
# JP: 稀咲の手が僕を導いて、ソファに――\nいや、これは……
1859 = "稀咲攙著我躺在了沙發上――不對，這是……" 

# 【稀咲】
# display as 稀咲
# JP: 「ごめんね？　双鉄。\nちょっと、お勉強、詰め込みすぎちゃったかな」
1385 = "「抱歉，雙鐵。好像學得有點過火了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや――」
1417 = "「沒有――」" 

# monologue
# JP: 声が近い。
1909 = "聲音離我很近。" 

# monologue
# JP: ついでに――性臭も立ち上ってくる。
1591 = "做愛的氣味――也刺鼻般得可聞。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「もっと貪欲に学びたい。\n稀咲の、ヴァギナの傷が癒えたら、すぐにでも」
1379 = "「我還想再多學點呢。只要稀咲小穴的傷好了，我願意立刻就做」" 

# 【稀咲】
# display as 稀咲
# JP: 「あ」
# 1270 = "「啊」" 

# monologue
# JP: ふっと、空気が柔かになる。\n稀咲の指が、僕の髪を優しく撫でる。
1898 = "空氣突然柔和了很多。稀咲溫和地撫摸起我的頭髮來。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄……キミは――――\nふふっ……ちゅっ――ちゅっ――ちゅっ」
1477 = "「雙鐵……你啊――――呵呵……啾――啾――啾」" 

# monologue
# JP: キス。キス。キス。\n頬に。鼻にまぶたに。
1571 = "三連的親吻。親在了臉上、鼻子上、眼皮上。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクの初恋が、キミで良かった。\n諦めないで――叶えて、良かった」
1219 = "「初戀是你真好。沒有放棄機會――能夠圓了夢想，真好」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「叶えて、か」
1329 = "「圓了夢想嗎」" 

# monologue
# JP: 叶って、ではなく。\nそれがなんとも、稀咲らしい。
1576 = "不是等來的夢想，而是主動爭取的夢想。這樣的女孩才是稀咲。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そのおかげで、僕も――」
1450 = "「託你的福，我也――」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　それ以上はちょっとヤボかな」
1480 = "「雙鐵？　再說下去就有點敗氣氛了喔」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ――」
1307 = "「嗯唔――」" 

# monologue
# JP: 僕の言葉を、キスで塞いで。
1652 = "她用嘴唇封上了我的嘴。" 

# monologue
# JP: そうして稀咲は、\nキスをしたまま、言葉に出さずに伝えてくれる。
1758 = "於是儘管她沒開口，我依然能感知到吻背後的意思。" 

# 【稀咲】
# display as 稀咲
# JP: （セックスのことも、その先も――\n双鉄、一緒に、一生学ぼう？）
2093 = "（無論是做愛，還是未來――雙鐵，我們都一起學一輩子吧？）" 

# monologue
# JP: わかりきってる答えを、それでも伝えたくって――\n僕も稀咲の口内へ、舌を思い切り伸ばし、差し込む。
1646 = "她很清楚我的答案，但我依然想真切地告訴她――於是我也伸長了舌頭，送進了稀咲的嘴裡。" 
