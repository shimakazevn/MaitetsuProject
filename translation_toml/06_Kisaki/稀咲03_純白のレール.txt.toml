1923 = "「我一定會載著滿車的客人，讓他們帶著笑容抵達鹿兒島」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1832 = "「嗯」" 

# monologue
# JP: 観光\x%l列車;#00ffc040;列車%l;#;第一号のニュースはそのまま、\n今日開始するＭＲＦ二期募集の宣伝にもなる。
2923 = "首班觀光\\x%l列車;#00ffc040;列車%l;#;的新聞也能成為今天開始的第二期集資的宣傳。" 

