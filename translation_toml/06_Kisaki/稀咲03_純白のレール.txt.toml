# JP: その長身に埋もれるように、\nネクタイを、親しく直してあげている。
2766 = "稀咲彷彿整個人都要貼到那挺拔的身上一般，親密地繫著領帶。" 

# monologue
# JP: まるで新婚の夫婦のように――
2802 = "簡直就像新婚夫婦一樣——" 

# monologue
# JP: （ズキっ）
2940 = "（刺痛）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1791 = "「啊」" 

# monologue
# JP: 心臓を、針で刺すような痛みを感じる。
2541 = "我的心臟感到了針刺般的疼痛。" 

