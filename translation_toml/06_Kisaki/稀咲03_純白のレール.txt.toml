1872 = "「對不起，日日姬。謝謝你」" 

# 【日々姫】
# display as 日日姬
# JP: 「お礼なんてよしてください。水臭い。\n私たち、兄妹じゃないですか」
1625 = "「不用謝，這麼見外幹嘛，我們可是兄妹呀」" 

