# JP: そのことをわかっていても、いなくても、\nハチロクはきっと乗客と共に、最良の旅をしてくるだろう。
2325 = "不管八六是否明白這點，她一定都會帶給乘客一段完美的旅程吧。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、双鉄様は」
1966 = "「所以，雙鐵少爺您——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕も最善を尽くして記者会見に臨んでこよう」
1835 = "「嗯，我也會盡最大的努力，準備迎接記者發布會的」" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、いつまでお話しとーと？」
1712 = "「八六，你要聊到什麼時候呀？」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　口より手ば動かせって、\nハチロクがいーーーっつも言いよるこったい」
1884 = "「就是咧！你不是一直說，多動手少動口嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、わたくしとしたことが。\nそれでは、双鉄様」
1764 = "「哎呀，瞧我都忘了時間。那我先去了，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。また後でな」
1829 = "「嗯。待會見」" 

