[script]
# lines: 448 
# 【双鉄】
# display as 雙鐵
# JP: 「帝国線路合同会社、か」
1899 = "「Công ty TNHH Đường sắt Hoàng gia, sao.」"
# monologue
# JP: 帝国線路合同会社――Teikoku Railroad LLC.
2478 = "Công ty TNHH Đường sắt Hoàng gia——Teikoku Railroad LLC."
# monologue
# JP: 証券上に記載されている文字列を見れば、\n日々姫が初めて\x%l機関士;#00ffc040;機関士%l;#;代理を任された時の言葉を思い出す。
2869 = "Nhìn vào dòng chữ được ghi trên chứng khoán, tôi chợt nhớ lại lời nói của Hibiki khi lần đầu tiên được giao làm đại lý \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「『わかっていてもプレッシャー』とは、\nなるほど、こんな感覚なのだな」
1349 = "「『Dù biết là vậy nhưng vẫn áp lực』, ra là cảm giác này sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「何を弱気なことを言っているんだい、双鉄」
2141 = "「Anh đang nói lời yếu đuối gì vậy, anh Soutetsu.」"
# monologue
# JP: 郵便物の束を抱えて、\n稀咲が部屋へと入ってくる。
2567 = "Ôm một chồng bưu phẩm, Kisaki bước vào phòng."
# 【稀咲】
# display as 稀咲
# JP: 「キミ達の例えでいうなら『動輪はもう回ってる』だろ？\n今さら止まれるものではないさ」
2025 = "「Nếu dùng cách ví von của các anh thì là 『bánh xe chủ động đã bắt đầu quay rồi』 đúng không? Giờ không còn dừng lại được nữa đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことなら百も承知だ。が――」
2100 = "「Chuyện đó thì tôi biết quá rõ rồi. Nhưng mà——」"
# monologue
# JP: 言葉を探せば……やはりそれへと帰結していく。
2529 = "Cố gắng tìm kiếm từ ngữ…… rốt cuộc lại quay về với câu nói đó."
# monologue
# JP: 義理とはいえど兄妹だから、\n言語感覚もいつの間にやら、似通ってきたのかもしれん。
2912 = "Dù chỉ là anh em nuôi nhưng vẫn là anh em, có lẽ cảm quan ngôn ngữ cũng đã trở nên giống nhau từ lúc nào không hay."
# 【双鉄】
# display as 雙鐵
# JP: 「わかっていてもプレッシャーなのだ。\n僕ごときが、合同会社の代表社員とは」
1893 = "「Dù biết là vậy nhưng vẫn áp lực. Một kẻ như tôi, lại là đại diện của công ty TNHH sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「ごときじゃないよ。キミが最適」
1658 = "「Kẻ như anh gì chứ. Anh là người phù hợp nhất đấy.」"
# monologue
# JP: きっぱり、稀咲は言い切って、\n郵便物をドサリとデスクの上に下ろす。
2768 = "Kisaki nói một cách dứt khoát, rồi đặt phịch chồng bưu phẩm xuống bàn làm việc."
# 【稀咲】
# display as 稀咲
# JP: 「鉄道、金融、行政に。古い御一夜と新しい御一夜に。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社にまで――キミは、強力な人脈を持っている」
1690 = "「Đường sắt, tài chính, hành chính. Ohimitera cũ và Ohimitera mới. Thậm chí cả công ty \\x%lエアクラ;#00ffc040;Aircra%l;#;——anh có một mạng lưới nhân mạch vô cùng mạnh mẽ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのどの分野においても、僕自身は大した技能も知恵も\n発揮できんがな」
1677 = "「Trong bất kỳ lĩnh vực nào, bản thân tôi cũng chẳng phát huy được kỹ năng hay trí tuệ gì to tát cả.」"
# 【稀咲】
# display as 稀咲
# JP: 「それでいいのさ。どんな状況で誰に頼むか。\nリーダーは、そこだけ間違えなければいいから」
2103 = "「Thế là đủ rồi. Nhờ ai trong tình huống nào. Người lãnh đạo chỉ cần không nhầm lẫn điều đó là được.」"
# monologue
# JP: そこまでキッパリ言い切られると、\nそんなものかという気がしてくる。
2843 = "Bị khẳng định một cách dứt khoát như vậy, tôi cũng có cảm giác là như thế thật."
# monologue
# JP: なにせ稀咲は隈元銀行御一夜支店の、\n誰もが認める優れたリーダーなのだから。
2713 = "Dù sao thì Kisaki cũng là một nhà lãnh đạo xuất sắc được mọi người công nhận của Kumagin chi nhánh Ohimitera mà."
# 【稀咲】
# display as 稀咲
# JP: 「正しく任せる。そのための決断をする。責任を負う。\nそれ以上にまで踏み込めば、かえって混乱を呼ぶものさ」
2142 = "「Giao phó một cách chính xác. Đưa ra quyết định vì điều đó. Và chịu trách nhiệm. Nếu can thiệp sâu hơn thế, ngược lại sẽ chỉ gây ra sự hỗn loạn thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか。\nならば、そのように心がけよう」
1984 = "「Ra là vậy sao. Nếu thế thì tôi sẽ ghi nhớ điều đó.」"
# monologue
# JP: 頷けば、ふふっと嬉しげな顔。
2721 = "Thấy tôi gật đầu, cô ấy nở nụ cười vui vẻ, fufu."
# 【稀咲】
# display as 稀咲
# JP: 「それじゃ、実践してみせて？\nこれ――どうしようか」
2116 = "「Vậy thì, hãy thực hành thử xem nào? Đống này——chúng ta phải làm sao đây.」"
# monologue
# JP: 言って稀咲は、持ち運んできた郵便物の束を指す。
2783 = "Nói rồi Kisaki chỉ vào chồng bưu phẩm mà cô ấy vừa mang vào."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……もしかしなくても、申し込み書か？」
1809 = "「À…… không lẽ, là đơn đăng ký sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。ご年配層で鉄道の復活を望む方は多いのだね。\n今どき、これほど郵送申し込みがあるとは思わなかった」
1830 = "「Ừ. Có vẻ như những người lớn tuổi mong muốn đường sắt hồi sinh rất nhiều nhỉ. Không ngờ thời đại này rồi mà vẫn còn nhiều đơn đăng ký gửi qua đường bưu điện đến vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「情報入手もその分遅れてしまうのだろうな。\nしかし……先着順とは募集時から明示はしていたが――」
1667 = "「Có lẽ việc tiếp cận thông tin của họ cũng bị chậm trễ tương ứng. Tuy nhiên…… ngay từ lúc bắt đầu huy động, chúng ta đã ghi rõ là theo thứ tự đăng ký rồi mà——」"
# 【稀咲】
# display as 稀咲
# JP: 「困ったよね、即完売になってしまったから。\n[マイレールファンド,2]ＭＲＦ第一期：御一夜-[かごしま,2]鹿兒島復線ファンドが」
2098 = "「Đau đầu thật đấy, vì đã bán hết sạch ngay lập tức rồi. Quỹ MRF kỳ 1: Quỹ khôi phục tuyến Ohimitera - Kagoshima ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1823 = "「Hừm.」"
# monologue
# JP: 稀咲ならどうするか――と、\n舌先にまで触れた言葉を、けれども喉に押し込め直す。
2523 = "\"Nếu là Kisaki thì cô sẽ làm thế nào\"——câu nói đã trực chờ trên đầu lưỡi, nhưng tôi lại nuốt nó xuống cổ họng."
# monologue
# JP: ヒントは、すでに貰っている。\nならばそれを、ともかく実践してみよう。
2442 = "Gợi ý thì tôi đã nhận được rồi. Vậy thì trước tiên hãy thử thực hành nó xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏のスケジュールを貰えるか、尋ねてくれるか？\nあと、浦上さんのも」
2057 = "「Cô có thể hỏi xin lịch trình của ông Mototada được không? À, cả của anh Urakami nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「わかった。すぐに連絡してみる」
2034 = "「Tôi hiểu rồi. Tôi sẽ liên lạc ngay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、僕もだな――」
1873 = "「À, tôi cũng phải——」"
# monologue
# JP: 視野なら広い方が良く、知恵なら多い方がいい。\n電話を借りて、暗記している番号を押す。
2898 = "Tầm nhìn càng rộng càng tốt, trí tuệ càng nhiều càng hay. Mượn điện thoại, tôi bấm số mà mình đã ghi nhớ trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、僕だ。\n少し、時間を貰えるか？」
1813 = "「Alo, tôi đây. Cho tôi xin chút thời gian được không?」"
# 【浦上】
# display as 浦上
# JP: 「――すみません。遅刻です」
1337 = "「——Xin lỗi cậu. Tôi đến muộn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、ご連絡はいただきましたし。\n[せんだい,1]千内からわざわざ、こちらこそすみません」
1999 = "「Không đâu, anh đã liên lạc trước rồi mà. Cất công từ Sendai đến tận đây, tôi mới là người phải xin lỗi.」"
# monologue
# JP: 出発前の連絡通りの、十四分間の遅刻。
2456 = "Đúng như liên lạc trước khi xuất phát, anh ấy đến trễ 14 phút."
# monologue
# JP: 交通状況を完全に読める\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビのありがたさを、\n今更ながらに痛感する。
2518 = "Đến tận bây giờ tôi mới cảm nhận sâu sắc được sự tuyệt vời của hệ thống dẫn đường \\x%lエアクラ;#00ffc040;Aircra%l;#;, thứ có thể đọc thấu hoàn toàn tình hình giao thông."
# 【浦上】
# display as 浦上
# JP: 「打ち合わせが長引いてしまいまして」
2064 = "「Cuộc họp kéo dài quá.」"
# monologue
# JP: 浦上さんは、恐縮しきりといった様子で、\nソファに浅めに腰掛ける。
2689 = "Anh Urakami tỏ vẻ vô cùng áy náy, ngồi ghé xuống mép ghế sofa."
# monologue
# JP: 浦上さんのものだったデスクは、今は僕が。\n――この短期間に、本当に多くが動いたものだ。
2385 = "Chiếc bàn làm việc từng là của anh Urakami, giờ đây lại thuộc về tôi. ——Trong một khoảng thời gian ngắn như vậy, thực sự đã có rất nhiều thứ thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「マイレールファンド一期はありがとうございました。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;・ヒノモトの社員持株会さんのおかげで――」
2038 = "「Cảm ơn anh rất nhiều về quỹ My Rail kỳ 1. Nhờ có hội sở hữu cổ phần nhân viên của Aircra Hinomoto mà——」"
# 【浦上】
# display as 浦上
# JP: 「持株会の件は全くノータッチですよ。\nあれは、会員投票で投資先を決めるものですから」
1768 = "「Tôi hoàn toàn không nhúng tay vào chuyện hội sở hữu cổ phần đâu. Đó là do các hội viên tự bỏ phiếu quyết định nơi đầu tư mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「浦上さん絡みの案件だから満場一致での投資が決まった。\nそう、うちの宝生から――」
1950 = "「Vì là dự án có liên quan đến anh Urakami nên mọi người mới nhất trí đầu tư đấy. Vâng, Houshou bên tôi đã——」"
# 【元忠】
# display as 元忠
# JP: 「うむ？」
1839 = "「Hừm?」"
# monologue
# JP: いや、元忠氏は“うち”の――\n帝国線路合同会社の一員ではない。
2321 = "Không phải, ông Mototada không phải là người của \"bên tôi\"——\ntức là một thành viên của Công ty TNHH Đường sắt Hoàng gia."
# monologue
# JP: が、確かに、宝生だけではややこしい。
2711 = "Nhưng quả thực, chỉ gọi bằng họ thì dễ gây nhầm lẫn thật."
# 【双鉄】
# display as 雙鐵
# JP: 「――稀咲から、そのように聞いております」
1338 = "「——Tôi đã nghe Kisaki kể lại như vậy.」"
# monologue
# JP: 浦上さんが千内に拠点を移したということは、\n千内が工場誘致の最有力候補となったということ。
2584 = "Việc anh Urakami chuyển cơ sở hoạt động đến Sendai,\ncó nghĩa là Sendai đã trở thành ứng cử viên sáng giá nhất cho việc thu hút nhà máy."
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;・ヒノモトの社員なら誰にでもわかるその事実が、\n持株会のマイレールファンドへの信用を高めたらしい。
2632 = "Bất kỳ nhân viên nào của Aircra Hinomoto cũng hiểu được sự thật đó,\nvà có vẻ như điều này đã làm tăng thêm sự tin tưởng của hội sở hữu cổ phần đối với quỹ My Rail."
# 【浦上】
# display as 浦上
# JP: 「ああ」
2105 = "「À.」"
# monologue
# JP: 浦上さんの顔が目に見えて晴れやかになる。
2687 = "Nét mặt anh Urakami rạng rỡ hẳn lên trông thấy."
# 【浦上】
# display as 浦上
# JP: 「買いかぶりすぎです。\nですが、元上司からの高い評価は、ありがたい」
1859 = "「Đánh giá quá cao rồi.\nNhưng được cấp trên cũ đánh giá cao như vậy, tôi thực sự rất biết ơn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1840 = "「Fufu.」"
# monologue
# JP: 稀咲の微笑が、場の雰囲気を和ませる。\n話を切り出す良いタイミングだ。
2773 = "Nụ cười của Kisaki làm dịu đi bầu không khí.\nĐây là thời điểm tốt để bắt đầu câu chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「さて。今日お集まりいただいたのは、おかげさまで、\n第一期のマイレールファンドが完売となったためです」
1661 = "「Vậy thì. Hôm nay tôi tập hợp mọi người lại đây là vì, nhờ hồng phúc của mọi người,\nquỹ My Rail kỳ 1 đã bán hết sạch.」"
# 【元忠】
# display as 元忠
# JP: 「予想より随分早かった。法人としての\x%lエアクラ;#00ffc040;エアクラ%l;#;社と\n持株会と。両方の参加が、ファンドを注目させたかね？」
1993 = "「Nhanh hơn dự đoán khá nhiều đấy. Việc công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; tham gia với tư cách pháp nhân và\ncả hội sở hữu cổ phần nữa. Sự tham gia của cả hai bên đã khiến quỹ thu hút được sự chú ý chăng?」"
# monologue
# JP: 前置きも終わりきらぬうちに、元忠氏が食いついてくる。\nが、丁度いい。流れにのって進めてしまおう。
2899 = "Lời mào đầu còn chưa dứt, ông Mototada đã bắt ngay vào chuyện.\nNhưng như thế lại vừa vặn. Hãy nương theo đà này mà tiến hành thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それは極めて大きいと思います。事実、オンラインでの\n申し込みの最初期は、金融機関からのものが殆どでした」
1952 = "「Tôi nghĩ điều đó có tác động cực kỳ lớn. Thực tế là, trong giai đoạn đầu tiên của\nđợt đăng ký trực tuyến, hầu hết đều đến từ các tổ chức tài chính.」"
# 【ハチロク】
# display as 八六
# JP: 「金融機関……\n鉄道関係からの投資は無かったのですか？」
2128 = "「Các tổ chức tài chính……\nKhông có sự đầu tư nào từ các bên liên quan đến đường sắt sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「最初期は、御一夜鉄道さんからだけだ。が、ほどなく\n[ひさつ,1]肥颯みかん鉄道さんからもご応募いただいた」
1624 = "「Giai đoạn đầu thì chỉ có từ Đường sắt Ohito thôi. Nhưng chẳng bao lâu sau,\nĐường sắt Hisatsu Mikan cũng đã đăng ký tham gia.」"
# monologue
# JP: みかん鉄道さんは、鹿兒島-千内間のレールを保有し、\n営業運転を維持し続けている鉄道会社。
2824 = "Đường sắt Mikan là công ty đường sắt sở hữu tuyến đường từ Kagoshima đến Sendai,\nvà vẫn đang tiếp tục duy trì hoạt động kinh doanh."
# monologue
# JP: そこからの参加をいただけたことは、\n鉄道関係者からのファンドへの注目を厚くした。
2484 = "Việc nhận được sự tham gia từ họ,\nđã thu hút sự chú ý sâu sắc của những người trong ngành đường sắt đối với quỹ."
# 【稀咲】
# display as 稀咲
# JP: 「その影響で、かな？　少し時間を置いてから、\n鉄道関係から、郵便で、大量の申し込みが押し寄せた」
1857 = "「Có lẽ là nhờ ảnh hưởng đó chăng? Một thời gian ngắn sau,\nnhững lá đơn đăng ký gửi qua đường bưu điện từ các bên liên quan đến đường sắt đã đổ về dồn dập.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ――すごっ」
1762 = "「Oa——nhiều quá.」"
# monologue
# JP: ダンボールいく箱をも埋める郵便物の山を見て、\n日々姫が目を丸くする。
2619 = "Nhìn núi bưu phẩm lấp đầy không biết bao nhiêu là thùng các tông,\nHibiki tròn xoe mắt ngạc nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「これ……どのくらい」
2096 = "「Chỗ này…… khoảng bao nhiêu vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだ精査はしていないのだが、一万件以上ある」
2107 = "「Tôi vẫn chưa kiểm tra kỹ, nhưng có hơn mười ngàn đơn đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「いちまんけ――って、え？　だって、個人は一口、\n１０万円からの出資だから……１０億円分！？」
1623 = "「Mười ngàn đơ——ơ, hả? Vì mỗi cá nhân đầu tư một suất\nlà từ 100.000 yên cơ mà…… vậy là 1 tỷ yên cơ á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、第一期分は既に完売してしまっています。\nので、取扱をどうすべきか、知恵をお借りできればと」
1682 = "「Tuy nhiên, phần của kỳ 1 đã bán hết sạch rồi.\nVì vậy, tôi muốn mượn trí tuệ của mọi người xem nên xử lý thế nào.」"
# monologue
# JP: 頭を下げれば、戻すより早く声が聴こえる。
2522 = "Tôi vừa cúi đầu xuống, thì một giọng nói đã vang lên trước cả khi tôi kịp ngẩng đầu lên."
# 【元忠】
# display as 元忠
# JP: 「第二期募集をかけるとして、候補地は？」
2068 = "「Giả sử mở đợt huy động kỳ 2, thì địa điểm ứng cử là ở đâu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだろう、ポーレット」
2006 = "「Cô thấy sao, Paulette.」"
# monologue
# JP: 水を向ければ、\n待ちかねていたかのようにポーレットが立つ。
2664 = "Tôi vừa gợi chuyện,\nPaulette liền đứng bật dậy như thể đã chờ đợi từ lâu."
# 【ポーレット】
# display as 波萊特
# JP: 「圧倒的に御一夜-[やつしろ,2]八ツ城間です。ここを復線できれば、\nみかん鉄道さんの線路と環状になりますから」
1908 = "「Áp đảo nhất là đoạn Ohimitera - Yatsushiro. Nếu có thể khôi phục tuyến đường này,\nnó sẽ tạo thành một tuyến đường vòng tròn với tuyến đường của Đường sắt Mikan.」"
# 【稀咲】
# display as 稀咲
# JP: 「環状になると、何かメリットが？」
2023 = "「Tạo thành đường vòng tròn thì có lợi ích gì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはもう！　\x%l列車;#00ffc040;列車%l;#;運用の面でも、利便性でも、\nコスト削減の意味でも、地域発展性の面でも」
1702 = "「Tất nhiên là có rồi! Về mặt vận hành \\x%l列車;#00ffc040;đoàn tàu%l;#;, về mặt tiện lợi,\nvề mặt cắt giảm chi phí, và cả về mặt phát triển khu vực nữa.」"
# monologue
# JP: 路線が環状となるのがいかに有用か。
2710 = "Tuyến đường vòng tròn mang lại lợi ích to lớn đến nhường nào."
# monologue
# JP: ポーレットの情感豊かな力説に、\n元忠氏までもが前のめりになる。
2425 = "Lời thuyết phục đầy cảm xúc của Paulette\nđã khiến ngay cả ông Mototada cũng phải rướn người về phía trước."
# 【元忠】
# display as 元忠
# JP: 「では、二期募集はその路線の復線を目標とするもので\n決まりだな」
2123 = "「Vậy thì, đợt huy động kỳ 2 sẽ lấy việc khôi phục tuyến đường đó làm mục tiêu\nquyết định nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、わたしも思います。思うんですけど……\n費用が、その――多分、第一期の何倍も――」
1925 = "「Tôi cũng nghĩ vậy. Nhưng mà……\nchi phí thì, ừm——có lẽ sẽ gấp mấy lần kỳ 1——」"
# 【元忠】
# display as 元忠
# JP: 「ふむ？」
# 1839 = "「嗯？」" 
# monologue
# JP: さすがは市長というべきか、お役所繋がりというべきか。
2660 = "Không hổ danh là thị trưởng, hay phải nói là có mối liên hệ mật thiết với chính quyền nhỉ."
# monologue
# JP: ポーレットの差し出した資料には、\n復線区間の地権者リストが並べられてる。
2446 = "Trong tài liệu mà Paulette đưa ra,\ncó liệt kê danh sách các chủ đất của đoạn đường cần khôi phục."
# 【稀咲】
# display as 稀咲
# JP: 「うわ……これは酷いね。見事にバラバラだ」
1757 = "「Oa…… cái này tệ thật đấy. Phân mảnh một cách ngoạn mục luôn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;が払い下げたとき事業参入を名目に落札した業者が、\n結局は小分けに転売しちゃったみたいなんです」
1673 = "「Khi \\x%l帝鉄;#00ffc040;Teitetsu%l;#; bán thanh lý, các nhà thầu trúng thầu với danh nghĩa tham gia dự án,\nrốt cuộc lại chia nhỏ ra để bán lại mất rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど……第一期のときのように、道路用地として\n自治体が一括購入したケースばかりではないのだね」
1720 = "「Ra là vậy…… không phải trường hợp nào cũng giống như kỳ 1, chính quyền địa phương\nmua lại toàn bộ để làm đất làm đường nhỉ.」"
# monologue
# JP: 第一期の案件は、ありとあらゆる条件面で恵まれていたと、\n今更ながらに思い知る。
2709 = "Đến bây giờ tôi mới nhận ra,\ndự án kỳ 1 đã được ưu ái về mọi mặt điều kiện đến mức nào."
# monologue
# JP: 線路を復活させるとは――\nつまりは、用地の買収なのだと。
2871 = "Hồi sinh đường sắt——\ntức là, phải thu mua lại đất đai."
# 【ポーレット】
# display as 波萊特
# JP: 「これ程の小分けも、レアケースだとは思うんですけど\n……時間も、費用も、多分第一期の何倍も――」
2136 = "「Tôi nghĩ việc chia nhỏ đến mức này cũng là trường hợp hiếm gặp thôi\n……nhưng cả thời gian lẫn chi phí, có lẽ sẽ gấp mấy lần kỳ 1——」"
# 【元忠】
# display as 元忠
# JP: 「……かかるだろうが、不可能ではない。\n住宅開発をされていないのが幸いしたな」
1374 = "「……Sẽ tốn kém đấy, nhưng không phải là bất khả thi.\nMay mắn là nó chưa bị phát triển thành khu dân cư.」"
# monologue
# JP: 断言されて、不安が一気に軽くなる。\n僕には見えぬ成算を、元忠氏の目が見つけてくれてる。
2820 = "Bị khẳng định dứt khoát như vậy, nỗi bất an vơi đi hẳn.\nĐôi mắt của ông Mototada đã nhìn thấy cơ hội thành công mà tôi không thể thấy."
# 【元忠】
# display as 元忠
# JP: 「が、第一期の買収を完了させ、配当を出すまで動けんな。\n続けざまにこの規模の募集をしては、信頼を損ねかねん」
1679 = "「Tuy nhiên, chúng ta không thể hành động cho đến khi hoàn tất việc thu mua của kỳ 1 và chi trả cổ tức.\nHuy động quy mô lớn liên tục như vậy có thể làm tổn hại đến sự tín nhiệm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー……やっぱり、そうなりますよね。はい」
1788 = "「A——…… quả nhiên, sẽ thành ra như vậy nhỉ. Vâng.」"
# monologue
# JP: ポーレットと元忠氏と。
2661 = "Paulette và ông Mototada."
# monologue
# JP: 別方面のスペシャリスト同士が\n意見を同じくするのなら、僕に挟める異論などない。
2581 = "Khi các chuyên gia ở những lĩnh vực khác nhau\ncùng chung một ý kiến, thì tôi chẳng có lý do gì để phản đối cả."
# 【双鉄】
# display as 雙鐵
# JP: 「了解した。が、二期募集まで長期お待たせするのも、\nまた、[むげ,1]無碍にお断りするのも避けたいのだ」
1946 = "「Tôi hiểu rồi. Nhưng mà, tôi cũng không muốn bắt họ phải chờ đợi lâu cho đến đợt huy động kỳ 2,\nhay từ chối họ một cách \\x%l無碍;#00ffc040;phũ phàng%l;#; đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……そか。\nそのお手紙の人達のお話だっけ」
1784 = "「A…… ra vậy.\nLà chuyện về những người gửi thư đó nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ここから鉄道人脈を発掘できそうな気もするからね。\n出来れば、前向きになって頂けるお返事をお出ししたい」
1847 = "「Vì tôi có cảm giác chúng ta có thể khai thác được nhân mạch đường sắt từ đây mà.\nNếu có thể, tôi muốn gửi cho họ một câu trả lời mang tính tích cực.」"
# monologue
# JP: 僕の気持ちを、そのまま稀咲が掬ってくれる。
2782 = "Kisaki đã nói đúng những gì tôi đang nghĩ trong lòng."
# monologue
# JP: が、ポーレットは口を噤んで考えこみ、\n元忠氏も腕組みし、厳しく眉根を潜めてしまう。
2341 = "Tuy nhiên, Paulette lại im lặng chìm vào suy tư,\nông Mototada cũng khoanh tay, cau mày nghiêm nghị."
# 【元忠】
# display as 元忠
# JP: 「さて……一口づつとして十億、\n五口平均になったとすれば五十億の金、か」
2109 = "「Nào…… nếu mỗi người một suất là 1 tỷ,\ntrung bình mỗi người năm suất thì sẽ là 5 tỷ tiền vốn, sao.」"
# monologue
# JP: 小さな額では無いのだが、\n二期復線の費用にはまるで届かない。
2909 = "Tuy không phải là một con số nhỏ,\nnhưng hoàn toàn không đủ cho chi phí khôi phục tuyến đường kỳ 2."
# monologue
# JP: どうしたものか……と、重い沈黙が垂れ込める。
2431 = "Phải làm sao đây…… một sự im lặng nặng nề bao trùm."
# 【ハチロク】
# display as 八六
# JP: 「あ」
1791 = "「A.」"
# monologue
# JP: 不意にハチロクが声をあげ、ポーレットへと顔を向ける。
2789 = "Bất chợt Hachiroku cất tiếng, hướng khuôn mặt về phía Paulette."
# 【ハチロク】
# display as 八六
# JP: 「あの、ポーレット様、悩んでらしたではないですか。\n御一夜-[かごしま,2]鹿兒島間の\x%l保線;#00ffc040;保線%l;#;について」
1874 = "「À này, Thị trưởng Paulette, chẳng phải ngài đang đau đầu sao.\nVề việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đoạn Ohimitera - Kagoshima ấy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……うん。確かに――\nけど、なんとか人員を確保して」
1782 = "「A…… ừm. Đúng là vậy——\nnhưng, tôi sẽ cố gắng xoay xở tìm nhân sự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、やはりキツそうなのか？」
1981 = "「À, quả nhiên là rất khó khăn sao?」"
# monologue
# JP: 問えば、苦笑。\nこれは……無理をさせてる顔だ。
2663 = "Nghe tôi hỏi, cô ấy cười gượng.\nĐây là…… vẻ mặt của người đang cố quá sức rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「現状のままだと……ですね。ちょっと」
1669 = "「Nếu cứ giữ nguyên tình trạng hiện tại thì…… vâng. Hơi khó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2105 = "「這樣啊」" 
# monologue
# JP: できたばかりの帝国線路合同会社には、\n復線させた線路を\x%l保線;#00ffc040;保線%l;#;する技術も人員も無い。
2377 = "Công ty TNHH Đường sắt Hoàng gia mới thành lập,\nkhông có cả kỹ thuật lẫn nhân sự để \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã được khôi phục."
# monologue
# JP: ので、そこについては、御一夜鉄道株式会社に\n業務委託でお願いできればと相談をしていたのだが――
2565 = "Do đó, về vấn đề này, chúng tôi đã thảo luận với Công ty Cổ phần Đường sắt Ohito\nđể nhờ họ nhận thầu công việc——"
# 【ハチロク】
# display as 八六
# JP: 「そこでなのですけれども――御一夜鉄道の線路を全部、\nそのお金で買収していただくのはいかがですか？」
1957 = "「Về chuyện đó thì——ngài nghĩ sao nếu dùng số tiền đó\nđể mua lại toàn bộ đường ray của Đường sắt Ohito ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1765 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道の……御一夜-[ゆのい,1]湯医間をか？」
1906 = "「Của Đường sắt Ohito…… đoạn Ohimitera - Yunoi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1982 = "「Vâng ạ.」"
# monologue
# JP: テーブル上に地図を広げて、\nハチロクは稀咲からペンを借りる。
2366 = "Trải bản đồ lên bàn,\nHachiroku mượn bút từ Kisaki."
# monologue
# JP: そしてキュウっと赤線で、\n湯医-御一夜-鹿兒島間を大きな丸で囲ってしまう。
2704 = "Sau đó, bằng một đường kẻ đỏ,\ncô ấy khoanh một vòng tròn lớn bao quanh đoạn Yunoi - Ohimitera - Kagoshima."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様たちの会社に、このようにして線路の保守管理を\n行っていただける方が、間違いがないと思うのです」
1951 = "「Em nghĩ rằng, để công ty của ngài Soutetsu tiến hành bảo trì và quản lý đường ray\ntheo cách này thì sẽ không có gì sai sót đâu ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　うん、それはそう。他社\x%l列車;#00ffc040;列車%l;#;との相互乗り入れも\nあるし、全線を同じ品質と方法で管理してもらえた方が」
1797 = "「A! Ừm, đúng là vậy. Sẽ có cả \\x%l列車;#00ffc040;đoàn tàu%l;#; của các công ty khác chạy qua nữa,\nnên nếu để họ quản lý toàn tuyến với cùng một chất lượng và phương pháp thì sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし。そうするだけの技術も人員も」
1740 = "「Không, nhưng mà. Chúng ta làm gì có kỹ thuật và nhân sự để làm việc đó.」"
# 【ハチロク】
# display as 八六
# JP: 「ですので。『御一夜鉄道の所有する全線路』を、\n双鉄様の会社にご買収いただくのです」
1963 = "「Chính vì thế. Công ty của ngài Soutetsu sẽ mua lại\n『toàn bộ đường ray thuộc sở hữu của Đường sắt Ohito』 ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1845 = "「À.」"
# monologue
# JP: ようやく、わかる。
2542 = "Cuối cùng, tôi cũng hiểu."
# monologue
# JP: そうなれば以降の御一夜鉄道は、\n\x%l保線;#00ffc040;保線%l;#;にかかる人員設備を、所有しなくて済むのだから――
2894 = "Nếu vậy thì từ nay trở đi, Đường sắt Ohito\nsẽ không cần phải sở hữu nhân sự và thiết bị phục vụ cho việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「つまりは、帝国線路合同会社に線路だけでなく、\n\x%l保線;#00ffc040;保線%l;#;に関する人と技術とも、集積させるというわけか」
1637 = "「Nói cách khác, Công ty TNHH Đường sắt Hoàng gia không chỉ thu mua đường ray,\nmà còn tập hợp cả con người và kỹ thuật liên quan đến \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nữa sao.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です」
1997 = "「Chính xác là vậy ạ.」"
# monologue
# JP: 堰さんたち、\n\x%l保線;#00ffc040;保線%l;#;ボランティアさんからの協力は引き続き得られよう。
2892 = "Vẫn có thể tiếp tục nhận được sự hợp tác từ\nông Seki và những tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; khác."
# monologue
# JP: となると、御一夜-鹿兒島間をどう手当するか――
2903 = "Vậy thì, đoạn Ohimitera - Kagoshima sẽ xử lý ra sao đây——"
# 【ハチロク】
# display as 八六
# JP: 「きっと、このお手紙のご応募者さんの中にも、\n\x%l保線;#00ffc040;保線%l;#;技術者さんだった方がいらっしゃるのでは？」
1943 = "「Chắc chắn, trong số những người nộp đơn qua thư này,\ncũng sẽ có những người từng là kỹ thuật viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2146 = "「!」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。“だった人”たち――だよね、\n大廃線で失業した専門家は、山のように埋もれてる筈だ」
2104 = "「Ra là vậy. Những người 『từng là』——đúng thế nhỉ,\nnhững chuyên gia thất nghiệp do Đại bãi bỏ tuyến chắc chắn bị chôn vùi nhiều như núi.」"
# monologue
# JP: いうなり稀咲はPCに向かい、\n猛然とキーを叩き始める。
2786 = "Nói rồi Kisaki quay sang máy tính,\nvà bắt đầu gõ phím một cách mãnh liệt."
# monologue
# JP: 待つほどのことも無いうち、プリンタが紙を吐き始める。\nごく当然といった仕草で、浦上さんがそれをまとめる。
2393 = "Chẳng cần đợi lâu, máy in bắt đầu nhả giấy ra.\nVới một cử chỉ hết sức tự nhiên, anh Urakami liền gom chúng lại."
# 【元忠】
# display as 元忠
# JP: 「……ほほう、悪くない。\nこれならば受け取る側も納得してくれるだろう」
1366 = "「……Hô hô, không tệ.\nNếu là cái này thì bên nhận cũng sẽ đồng ý thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「確かに、よくまとまってますね、これ。\n押し付けがましくないだけじゃなく……わくわくします」
2031 = "「Đúng là được tóm tắt rất tốt. \nKhông chỉ không có cảm giác bị ép buộc…… mà còn thấy rất hào hứng nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「『第一期追加募集;\n（株）御一夜鉄道稼働中路線・御一夜-湯医間』ですか」
1882 = "「『Đợt huy động bổ sung kỳ 1;\nTuyến đường đang hoạt động của Công ty CP Đường sắt Ohito・Đoạn Ohimitera - Yunoi』 sao ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「細目はこれから精査して詰めるとして――\nどうだろう、双鉄。こんな感じの募集説明で」
2050 = "「Chi tiết cụ thể thì từ giờ sẽ kiểm tra kỹ lưỡng và chốt lại sau——\nAnh thấy sao, anh Soutetsu. Một bản giải trình huy động vốn mang cảm giác thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「良いな、とても良い」
1629 = "「Tốt lắm, rất tốt.」"
# monologue
# JP: 募集に添えられたキャッチコピー。
2577 = "Khẩu hiệu được đính kèm với đợt huy động vốn."
# monologue
# JP: それこそが帝国線路合同会社、\n僕らの事業の本質なのだと、ただ一言で表している。
2349 = "Chỉ một câu ngắn gọn, nhưng đã thể hiện được bản chất sự nghiệp của chúng tôi,\ncủa Công ty TNHH Đường sắt Hoàng gia."
# 【双鉄】
# display as 雙鐵
# JP: 「『線路を続けていくために』、か」
1350 = "「『Để tiếp tục duy trì đường ray』, sao.」"
# monologue
# JP: 線路を続けていくために。\n集中運用集中管理が必要ならば、僕は必ずそれを果たそう。
2701 = "Để tiếp tục duy trì đường ray.\nNếu cần phải vận hành tập trung, quản lý tập trung, thì tôi nhất định sẽ làm được điều đó."
# 【浦上】
# display as 浦上
# JP: 「これは……新しい事業モデルとなるかもしれませんね。\nつまり、後発が、日ノ本各地で模倣参入してくるかも」
2094 = "「Cái này…… có lẽ sẽ trở thành một mô hình kinh doanh mới đấy.\nNói cách khác, có thể sẽ có những người đi sau bắt chước và tham gia ở khắp nơi trên đất Hinomoto.」"
# 【稀咲】
# display as 稀咲
# JP: 「なればなったで望むところさ」
2120 = "「Nếu được thế thì đúng như mong muốn rồi.」"
# monologue
# JP: 浦上さんの言葉に稀咲が、カラリと笑う。
2780 = "Trước lời nói của anh Urakami, Kisaki bật cười sảng khoái."
# 【稀咲】
# display as 稀咲
# JP: 「各地の復線が早まって、鉄道事業のシナジーも復活する。\nそうなれば健全な競争が発生し、業界が再編されていく」
2102 = "「Sự khôi phục các tuyến đường ở các khu vực sẽ được đẩy nhanh, và sức mạnh tổng hợp của ngành đường sắt cũng sẽ hồi sinh.\nKhi đó, một cuộc cạnh tranh lành mạnh sẽ nổ ra, và toàn ngành sẽ được tái cơ cấu.」"
# monologue
# JP: 稀咲がしばしば口にする――\n僕の耳にもすっかり馴染んでしまった言葉に、頷いている。
2509 = "Lời Kisaki thường xuyên nhắc đến——\ntôi gật đầu trước câu nói mà đôi tai mình đã hoàn toàn quen thuộc."
# monologue
# JP: 僕らの事業が成功すれば、それは最初の\x%l枕木;#00ffc040;枕木%l;#;となり、\n続いて走る者たちと、競争と発展とを呼び起こすのだ。
2397 = "Nếu sự nghiệp của chúng tôi thành công, nó sẽ trở thành thanh \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; đầu tiên,\nđánh thức những người tiếp bước, cùng với sự cạnh tranh và phát triển."
# 【双鉄】
# display as 雙鐵
# JP: 「ご異議が無ければ、この線――、一期追加募集案で、\n細目を詰めさせていただきたいと思っています」
2066 = "「Nếu không có ý kiến phản đối, tôi muốn tiếp tục đi sâu vào chi tiết với phương án huy động bổ sung kỳ 1 này.」"
# 【元忠】
# display as 元忠
# JP: 「異議無し」
1996 = "「Không có ý kiến.」"
# monologue
# JP: 元忠氏の真っ先の声。\n次いですぐさま、「異議なし」の声達が部屋を埋める。
2358 = "Giọng nói đầu tiên cất lên là của ông Mototada.\nNgay sau đó, những tiếng \"Không có ý kiến\" lấp đầy căn phòng."
# 【双鉄】
# display as 雙鐵
# JP: 「では、そのように進めます。\nお知恵とお時間とを、ありがとうございました」
2118 = "「Vậy thì, chúng ta sẽ tiến hành theo hướng đó.\nCảm ơn trí tuệ và thời gian của mọi người.」"
# monologue
# JP: 拍手。閉会。\n同時に、みなが動き始める。
2429 = "Tiếng vỗ tay. Bế mạc.\nĐồng thời, mọi người bắt đầu tản ra."
# 【元忠】
# display as 元忠
# JP: 「ああ、私だ。\nアナリストの野上先生のアポを取ってくれ」
1815 = "「À, tôi đây.\nSắp xếp cho tôi một cuộc hẹn với nhà phân tích Nogami đi.」"
# 【浦上】
# display as 浦上
# JP: 「済みません、稀咲さん。少しよろしいですか？」
1969 = "「Xin lỗi, cô Kisaki. Cho tôi xin chút thời gian được không?」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろんだよ、何だい？」
2028 = "「Tất nhiên rồi, chuyện gì vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1351 = "「…………」"
# monologue
# JP: （む？）
2944 = "（Hửm?）"
# monologue
# JP: 視線を感じて振り向けば、日々姫がじっと僕を見ている。\nなにか――なにかを言いたげに。
2536 = "Cảm nhận được ánh nhìn, tôi quay lại thì thấy Hibiki đang chằm chằm nhìn mình.\nDường như——em ấy muốn nói điều gì đó."
# monologue
# JP: そういえば会議の途中から、\nずっと考え込んでいるような風情だったが――
2866 = "Nhắc mới nhớ, từ giữa cuộc họp,\nem ấy đã có vẻ như đang trầm tư suy nghĩ điều gì đó——"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、細かな話についてなんですけど」
2138 = "「Cậu Soutetsu, về những chi tiết cụ thể thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1800 = "「À, ừm.」"
# monologue
# JP: ポーレットの声。\n日々姫の様子は気がかりだが、今は気持ちを切り替える。
2662 = "Tiếng gọi của Paulette.\nMặc dù lo lắng cho tình trạng của Hibiki, nhưng lúc này tôi phải chuyển đổi tâm trạng."
# monologue
# JP: とにかく、前を向かねばだ。\n線路を、続けていくために。
2809 = "Dù sao thì, cũng phải hướng về phía trước.\nĐể tiếp tục duy trì đường ray."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ」
1753 = "「Phù.」"
# monologue
# JP: 喉が乾いた。\nいささか根を詰め過ぎたのか、背中も痛い。
2390 = "Khát nước quá.\nChắc do làm việc quá sức nên lưng cũng đau nhức."
# 【双鉄】
# display as 雙鐵
# JP: 「……今日はこのくらいにしておくか」
1362 = "「……Hôm nay làm đến đây thôi.」"
# monologue
# JP: 風呂に入るほどの気力もない。\n水だけ飲んで――む？
2557 = "Ngay cả sức lực để đi tắm cũng không còn.\nChỉ uống chút nước rồi——hửm?"
# 【日々姫】
# display as 日日姬
# JP: 「あ、兄さん」
1799 = "「A, anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おう、日々姫か」
1776 = "「Ồ, Hibiki à.」"
# monologue
# JP: 何気なく答えたけれど、違和感がある。
2560 = "Trả lời một cách bâng quơ, nhưng tôi lại cảm thấy có gì đó sai sai."
# monologue
# JP: ああ、いや、そうか。\nここには僕らしか居ないのに、日々姫は僕を――
2413 = "À, không, ra là vậy.\nDù ở đây chỉ có hai chúng tôi, nhưng Hibiki lại gọi tôi là——"
# 【日々姫】
# display as 日日姬
# JP: 「どうかしました？　兄さん」
1911 = "「Có chuyện gì sao? Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1806 = "「À, không.」"
# monologue
# JP: やはり、そうだ。\n“兄さん”と。
2640 = "Quả nhiên là vậy.\n\"Anh trai\"."
# monologue
# JP: 日々姫の前にはミルクのコップとクッキーの皿。\nならば恐らく、僕が降りてくるのを待ってたのだろう。
2630 = "Trước mặt Hibiki là một cốc sữa và một đĩa bánh quy.\nNếu vậy, có lẽ em ấy đã đợi tôi xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「一枚もらうぞ」
1932 = "「Cho anh một miếng nhé.」"
# monologue
# JP: クッキーをかじりつつ日々姫の正面に座る。
2527 = "Vừa cắn miếng bánh quy, tôi vừa ngồi xuống đối diện Hibiki."
# monologue
# JP: どう切り出すか――と少し悩むが、\nどう切り出そうと、聞くべきことはおんなじだ。
2915 = "Hơi phân vân không biết nên mở lời thế nào——\nnhưng dù có mở lời ra sao, điều cần hỏi vẫn chỉ có một."
# 【双鉄】
# display as 雙鐵
# JP: 「僕に、なにか話があるのか？」
1694 = "「Em có chuyện gì muốn nói với anh sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ある。\nあの――ね、兄さん」
1837 = "「Vâng. Có ạ.\nDạ——này, anh trai.」"
# monologue
# JP: ミルクのコップを両手で包み、けれど口には運ばない。
2628 = "Hai tay ôm trọn cốc sữa, nhưng em ấy không hề đưa lên miệng."
# monologue
# JP: ためらうような沈黙の後、\n何も飲まない日々姫の喉が、コク、と鳴る。
2650 = "Sau một khoảng lặng như đang do dự,\ncổ họng của Hibiki dù chưa uống ngụm nào vẫn kêu cái 'ực'."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん――稀咲先輩といるとき、\nすごく楽しそうですよね？」
1775 = "「Anh trai——lúc ở cùng tiền bối Kisaki,\ntrông anh có vẻ rất vui nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、楽しい。\nあれの言葉は、良い刺激になる」
1978 = "「Đúng vậy, rất vui.\nLời nói của cô ấy là một sự kích thích tốt.」"
# 【日々姫】
# display as 日日姬
# JP: 「刺激って？」
1719 = "「Kích thích sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……そうだな。目新しい、という感じではなく……\n例えていうなら、頭の回転を加速させてくれるというか」
1824 = "「Ừm…… phải rồi. Không hẳn là cảm giác mới mẻ……\nmà nếu phải ví von thì, giống như giúp não bộ tăng tốc độ xử lý vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「背中を、押してくれる感じですか？」
1889 = "「Cảm giác như được thúc đẩy từ phía sau sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういう面もあるな。\nなんにせよ、稀咲が居てくれると物事が小気味良く進む」
1643 = "「Cũng có khía cạnh đó.\nDù sao thì, có Kisaki ở đó, mọi việc sẽ tiến triển rất trơn tru.」"
# monologue
# JP: ほ、と小さな息が吐かれる。
2624 = "Một tiếng thở hắt ra nhè nhẹ."
# monologue
# JP: 安堵したようにも聞こえ、\nため息のようにも聞こえる。
2822 = "Nghe như tiếng thở phào nhẹ nhõm,\nlại vừa giống như một tiếng thở dài."
# 【日々姫】
# display as 日日姬
# JP: 「相性いいんですね、やっぱり。\n兄さんと稀咲先輩って」
1773 = "「Quả nhiên là rất hợp nhau nhỉ.\nAnh trai và tiền bối Kisaki ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうかもしれんな」
1645 = "「Có lẽ là vậy.」"
# monologue
# JP: 相性などと、いままで余り考えたこともなかったが、\n言われてみれば、確かに稀咲とは話が合う。
2544 = "Cho đến nay tôi chưa từng nghĩ nhiều về mức độ hòa hợp,\nnhưng khi được nhắc đến, quả thực tôi rất hợp nói chuyện với Kisaki."
# monologue
# JP: 興味が重なっているというわけでもないのに、\nどうでもいいような話題が咬み合ったりもする。
2911 = "Dù không hẳn là có chung sở thích,\nnhưng ngay cả những chủ đề vô thưởng vô phạt cũng rất ăn khớp."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは――」
1769 = "「Anh trai——」"
# monologue
# JP: 言って、沈黙。
2323 = "Nói rồi, em ấy im lặng."
# monologue
# JP: 日々姫の手のミルクのコップが、\nカタ、と小さな音を立てる。
2445 = "Cốc sữa trên tay Hibiki\nphát ra tiếng lạch cạch nhỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、どうかしたか？」
1938 = "「Anh, làm sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――いいえ。あの……\n私、友達がいます。学園に、同い年の女の子」
1789 = "「A——không ạ. Ừm……\nEm, có một người bạn. Một cô gái bằng tuổi ở học viện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1839 = "「嗯？」" 
# monologue
# JP: いきなり何の話かと面食らったような気になるが、
2913 = "Cảm thấy bối rối không biết đột nhiên em ấy đang nói chuyện gì,"
# monologue
# JP: 日々姫の目は真剣で――\nというかむしろ、すがりついてくるようなものさえ感じる。
2336 = "Ánh mắt Hibiki rất nghiêm túc——\nhay nói đúng hơn, tôi thậm chí còn cảm nhận được sự níu kéo."
# 【日々姫】
# display as 日日姬
# JP: 「その子にも、相性がいい人がいたんです。\nいつでも話を聞いてくれて、背中を押してくれる人」
2113 = "「Cô bạn đó cũng có một người rất hợp với mình.\nMột người luôn lắng nghe, và thúc đẩy cô ấy từ phía sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1832 = "「À.」"
# monologue
# JP: ならば日々姫は、大事な話をしたいのだ。\n何かを問えばそれだけで、話の邪魔となってしまおう。
2613 = "Nếu vậy thì Hibiki đang muốn nói một chuyện rất quan trọng.\nBất cứ câu hỏi nào lúc này cũng sẽ chỉ làm gián đoạn câu chuyện."
# 【日々姫】
# display as 日日姬
# JP: 「ずっと一緒にいれるって、自然とその子は思ってました。\nこんなに相性がいいんだから、きっと、ずっと一緒って」
1895 = "「Cô bạn đó cứ tự nhiên nghĩ rằng họ sẽ luôn ở bên nhau.\nHợp nhau đến thế cơ mà, chắc chắn, sẽ mãi mãi ở bên nhau.」"
# monologue
# JP: 口調に、生々しい熱を感じる。
2553 = "Tôi cảm nhận được sức nóng chân thực trong giọng điệu ấy."
# 【日々姫】
# display as 日日姬
# JP: 「けど――そうはならなかったんです。\n相手の人に……好きな人ができちゃったから」
1685 = "「Nhưng——mọi chuyện lại không như vậy.\nBởi vì người kia…… đã có người mình thích.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1352 = "「……」"
# monologue
# JP: 『よくある話だ』――\n思いは、けれど舌に乗らない。
2914 = "『Chuyện thường tình thôi』——\nnghĩ vậy, nhưng lời nói không bật ra khỏi đầu lưỡi."
# monologue
# JP: その友人に残酷だろうという気だけではなく、\nなにかざわざわしたものが、僕の喉奥を締めている。
2319 = "Không chỉ vì nghĩ rằng nói vậy sẽ tàn nhẫn với người bạn đó,\nmà còn có thứ gì đó gợn gợn đang bóp nghẹt cuống họng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは――」
# 1769 = "「哥哥你——」" 
# monologue
# JP: ごくりと、\n日々姫は一気に牛乳のコップを空ける。
2610 = "Đánh ực một cái,\nHibiki uống cạn cốc sữa trong một hơi."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩と、これからも一緒に居たいって――\nそういう風に思ってますか？」
1689 = "「Anh có nghĩ rằng——từ nay về sau cũng muốn ở bên cạnh tiền bối Kisaki không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……どうかな。\n未来のことを考えるのには、なれてない」
2093 = "「Chuyện đó…… sao nhỉ.\nAnh chưa quen với việc suy nghĩ về tương lai.」"
# 【日々姫】
# display as 日日姬
# JP: 「だったら、想像してみてください」
2111 = "「Vậy thì, anh hãy thử tưởng tượng xem.」"
# monologue
# JP: 日々姫の視線が突き刺さってくる。\nひるむほど――まっすぐ迷わず、見つめられてる。
2627 = "Ánh mắt của Hibiki xuyên thấu tôi.\nTrực diện, không một chút do dự, đến mức khiến tôi phải chùn bước."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんと稀咲先輩は仲良しで。仲良しのまま、\nいい感じだなって思うまま、時間がどんどん過ぎてって」
1772 = "「Anh trai và tiền bối Kisaki rất thân thiết. Vẫn cứ thân thiết như vậy,\nvẫn nghĩ rằng thế này là ổn rồi, và thời gian cứ thế trôi qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1832 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「そうしていつか、現れちゃうんです。\n兄さんよりも、稀咲先輩と楽しくお話しちゃう人が」
2051 = "「Và rồi một ngày nào đó, người đó sẽ xuất hiện.\nMột người có thể trò chuyện vui vẻ với tiền bối Kisaki hơn cả anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 2146 = "「！」" 
# monologue
# JP: チクリと――軽い痛みを感じる。\n心筋梗塞の類なら、この程度では済まないだろう。
2535 = "Nhói một cái——tôi cảm thấy một cơn đau nhẹ.\nNếu là nhồi máu cơ tim thì chắc chắn không chỉ dừng ở mức này đâu."
# monologue
# JP: だが、痛い。\n針先で心を突かれたような……軽い、けれども確かな痛み。
2345 = "Nhưng mà, đau thật.\nCảm giác như trái tim bị đầu kim đâm trúng…… một cơn đau nhẹ nhàng nhưng rất chân thực."
# 【日々姫】
# display as 日日姬
# JP: 「なのに、稀咲先輩は考えこむことが多くなる。\n塞いでるみたいで心配で、だから、兄さんは声をかける」
2019 = "「Thế nhưng, tiền bối Kisaki lại ngày càng trầm tư nhiều hơn.\nTrông có vẻ buồn bã khiến anh lo lắng, vì thế, anh đã lên tiếng hỏi han.」"
# monologue
# JP: ……そうするだろうな、とぼんやり思う。\n日々姫が今、こうして僕に、声をかけてくれているように。
1326 = "……Chắc là sẽ như vậy thôi, tôi thầm nghĩ.\nGiống như Hibiki đang lo lắng và bắt chuyện với tôi lúc này."
# 【日々姫】
# display as 日日姬
# JP: 「それで、兄さんは気づくんですよ。\n二つのことに、きっと、その時」
1717 = "「Và rồi, anh trai sẽ nhận ra.\nHai điều, chắc chắn là vào lúc đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「二つのこと？」
1711 = "「Hai điều?」"
# monologue
# JP: 稀咲が恋をしていて、だけれどそれを自覚できない、\n認められないでいること――それが、一つ目。
2794 = "Kisaki đang yêu, nhưng bản thân cô ấy lại không nhận thức được,\nkhông thể thừa nhận điều đó——đó là điều thứ nhất."
# monologue
# JP: 二つ、“恋”の相手は、僕ではない。\n僕より親しく稀咲と話す――例えば、浦上さんのような人。
2800 = "Thứ hai, đối tượng \"yêu\" không phải là tôi.\nMột người nói chuyện thân thiết với Kisaki hơn cả tôi——ví dụ như anh Urakami."
# monologue
# JP: 架空の話の筈なのに、心臓を突く針が一気に、数を増す。
2635 = "Rõ ràng chỉ là chuyện giả định, nhưng những mũi kim đâm vào tim tôi lại đột ngột tăng lên."
# 【日々姫】
# display as 日日姬
# JP: 「そうしてきっと、その瞬間。兄さんも気づきますよね。\n自分も、恋をしていたことに――けど、もう言えない」
2018 = "「Và chắc chắn, ngay khoảnh khắc đó. Anh trai cũng sẽ nhận ra.\nRằng bản thân mình cũng đã biết yêu——nhưng, không thể nói ra được nữa rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 1823 = "「嗯……」" 
# monologue
# JP: そうかもしれない。\n素直に思う。
2524 = "Có lẽ là vậy thật.\nTôi thành thật nghĩ thế."
# monologue
# JP: 想像だけで、これほど痛い。\n話せばきっと、痛みを稀咲にも与えてしまう。
2362 = "Chỉ mới tưởng tượng thôi mà đã đau đớn đến nhường này.\nNếu nói ra, chắc chắn cũng sẽ khiến Kisaki phải chịu nỗi đau tương tự."
# 【双鉄】
# display as 雙鐵
# JP: 「何が恋かを、僕は知らんが――」
2135 = "「Dù anh không biết tình yêu là gì——」"
# monologue
# JP: 言葉が、うまく見つけられない。\n日々姫は、じっと僕を見ている。
2507 = "Tôi không thể tìm được từ ngữ thích hợp.\nHibiki vẫn đang chăm chú nhìn tôi."
# monologue
# JP: 少し泣きそうにうるむ目で、\n僕をせかさず、見てくれている。
2451 = "Với đôi mắt ươn ướt như sắp khóc,\nem ấy không hề hối thúc, chỉ lặng lẽ nhìn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「――そんな未来は、迎えたくない。\nそのことだけは、つくづく思うよ」
1335 = "「——Anh không muốn đón nhận một tương lai như thế.\nAnh chỉ nghĩ đến điều đó một cách sâu sắc thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、考えた方がいいですよ？\nそうならないよう、どうしたらいいのかって」
2122 = "「Nếu vậy, anh nên suy nghĩ đi thì hơn?\nPhải làm sao để chuyện đó không xảy ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。良く考えてみよう」
1974 = "「Đúng vậy nhỉ. Anh sẽ suy nghĩ thật kỹ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですよ、自分ひとりで、\nたくさんたくさん悩んでください」
1886 = "「Đúng vậy, anh hãy tự mình,\ntrăn trở thật nhiều thật nhiều đi.」"
# monologue
# JP: 言って、日々姫は立ち上がる。
2864 = "Nói xong, Hibiki đứng dậy."
# monologue
# JP: ほとんど手付かずのクッキー皿とコップを片付け、\nさっさと居間から出ていこうとする。
2575 = "Dọn dẹp đĩa bánh quy và cốc sữa gần như chưa đụng đến,\nem ấy định nhanh chóng rời khỏi phòng khách."
# 【日々姫】
# display as 日日姬
# JP: 「その答えは、\n兄さんにしか見つけられないものですから」
2097 = "「Bởi vì câu trả lời đó,\nchỉ có anh trai mới có thể tìm ra được thôi.」"
# monologue
# JP: 僕に背中を向けたまま、日々姫の足が、ふと止まる。
2623 = "Vẫn quay lưng về phía tôi, bước chân của Hibiki chợt khựng lại."
# 【日々姫】
# display as 日日姬
# JP: 「もしも答えを見つけたら……私にも……後ででいいから\n聞かせてください、その答え」
1862 = "「Nếu anh tìm thấy câu trả lời…… thì sau này cũng được,\nhãy nói cho em nghe nhé, câu trả lời đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1832 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「今後の参考にしたいんです。\n私だって――その、恋に興味とかありますから」
1940 = "「Em muốn dùng nó làm tài liệu tham khảo cho sau này.\nCả em nữa——cái đó, cũng có hứng thú với tình yêu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「参考になるのか？　恋など知らん、僕の答えが」
1876 = "「Có thể làm tài liệu tham khảo sao? Câu trả lời của một kẻ chẳng biết gì về tình yêu như anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「だから、参考になるんです。\nわたしも、恋を知りませんから」
1960 = "「Chính vì thế mới có thể làm tài liệu tham khảo được.\nBởi vì em cũng, chẳng biết gì về tình yêu cả.」"
# monologue
# JP: 日々姫の肩が、ぴくん――と動く。
2615 = "Đôi vai của Hibiki khẽ giật mình——một cái."
# monologue
# JP: 振り向くのかと一瞬思うが、\nやはり、日々姫は僕に背中を向けたまま。
2558 = "Tôi cứ ngỡ em ấy sẽ quay lại,\nnhưng quả nhiên, Hibiki vẫn quay lưng về phía tôi."
# 【日々姫】
# display as 日日姬
# JP: 「初恋の種を、告白もできないうちにつぶしてしまって。\nだから、ひとつも、私は恋なんて知らないんです」
1949 = "「Hạt giống tình đầu của em, còn chưa kịp tỏ tình đã bị bóp nát mất rồi.\nThế nên, em chẳng biết một chút gì về tình yêu đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのか」
1373 = "「……Vậy sao.」"
# monologue
# JP: ならば、あるいは。\n“友達”とやらは日々姫なのかもしれん。
2897 = "Nếu vậy thì, có lẽ.\nNgười \"bạn\" đó có thể chính là Hibiki."
# monologue
# JP: そうと思えば、\n感謝の気持ちが、より一層に湧いてくる。
2896 = "Nghĩ vậy,\nlòng biết ơn trong tôi lại càng dâng trào mạnh mẽ hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、日々姫。ありがとう」
1872 = "「Xin lỗi em, Hibiki. Cảm ơn em.」"
# 【日々姫】
# display as 日日姬
# JP: 「お礼なんてよしてください。水臭い。\n私たち、兄妹じゃないですか」
1625 = "「Đừng cảm ơn em chứ. Khách sáo quá.\nChúng ta là anh em mà, đúng không.」"
# monologue
# JP: 言って、トン、と日々姫のつま先が床を蹴る。
2863 = "Nói rồi, Hibiki dùng mũi chân gõ nhẹ xuống sàn nhà."
# monologue
# JP: それで思い切りをつけたのか、\n大きく一歩、日々姫が踏み出す。
2471 = "Như thể để xốc lại tinh thần,\nem ấy bước một bước thật dài."
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、おやすみなさい。兄さん」
2126 = "「Vậy thì, chúc ngủ ngon. Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おやすみ。日々姫」
1836 = "「Ừm, ngủ ngon nhé. Hibiki.」"
# monologue
# JP: ……階段を登る足音が、ほどなく静かになっていく。
1329 = "……Tiếng bước chân bước lên cầu thang, chẳng mấy chốc đã trở nên tĩnh lặng."
# monologue
# JP: 日々姫は最後の最後まで、僕を兄さんと呼びつづけた。\n普段の日々姫、素顔の日々姫を、決して見せはしなかった。
2617 = "Hibiki cho đến tận phút cuối cùng, vẫn liên tục gọi tôi là anh trai.\nEm ấy nhất quyết không cho tôi thấy một Hibiki của ngày thường, một Hibiki với khuôn mặt thật."
# 【双鉄】
# display as 雙鐵
# JP: 「……考えろ、か」
1369 = "「……Suy nghĩ, sao.」"
# monologue
# JP: あの日々姫が。
2621 = "Chính Hibiki đó."
# monologue
# JP: ほぼ初対面の僕にさえ、すがりつくほど弱かった子が、\n僕の背中を、こうも力強く押し出そうとしてくれたのだ。
2901 = "Cô bé từng yếu đuối đến mức bám víu lấy cả tôi, một người gần như mới gặp lần đầu,\ngiờ đây lại cố gắng thúc đẩy tôi từ phía sau một cách mạnh mẽ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「考えるとも。\nそして必ず、お前にも答えを伝えよう」
1947 = "「Anh sẽ suy nghĩ.\nVà chắc chắn, anh cũng sẽ truyền đạt câu trả lời cho em.」"
# monologue
# JP: （ポーーーーーっ！）
2943 = "（Tuúúúúú!）"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l汽笛;#00ffc040;汽笛%l;#;一声――
73 = "Một tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#; của \\x%l8620;#00ffc040;8620%l;#; vang lên——"
# monologue
# JP: それをホームから見守っているのは、\n実になんとも、微妙な気分だ。
2819 = "Đứng nhìn cảnh đó từ sân ga,\nthực sự là một cảm giác rất chi là, vi diệu."
# 【ハチロク】
# display as 八六
# JP: 「いかがなさいました、双鉄様？」
2140 = "「Ngài sao vậy, ngài Soutetsu?」"
# monologue
# JP: キャブの窓から、\x%l運転体;#00ffc040;運転体%l;#;のハチロクの顔。
77 = "Từ cửa sổ buồng lái, khuôn mặt của Hachiroku trong trạng thái \\x%l運転体;#00ffc040;cơ thể vận hành%l;#; ló ra."
# 【双鉄】
# display as 雙鐵
# JP: 「いや――この晴れの日に見送る自分を、\n少し残念に思っていたところだ」
1995 = "「Không——tôi chỉ đang cảm thấy hơi tiếc nuối khi phải tiễn em đi trong ngày vui này thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「残念とお感じいただけますことは光栄ですが――」
2058 = "「Được ngài cảm thấy tiếc nuối là một vinh dự đối với em——」"
# monologue
# JP: こいこいと、ハチロクが僕を手招きする。
2865 = "Vẫy vẫy tay, Hachiroku ra hiệu gọi tôi lại gần."
# monologue
# JP: 招かれるまま近寄れば、窓から小さな手が伸びて、\n僕の髪へとそうっと触れる。
2482 = "Tiến lại gần theo tiếng gọi, một bàn tay nhỏ bé vươn ra từ cửa sổ,\nnhẹ nhàng chạm vào tóc tôi."
# 【ハチロク】
# display as 八六
# JP: 「――[キャブ,2]運転台でご一緒できずとも、\nわたくしは、双鉄様とともに走らせていただきますよ？」
1332 = "「——Cho dù không được ở cùng ngài trong \\x%l運転台;#00ffc040;buồng lái%l;#;,\nthì em vẫn đang chạy cùng với ngài Soutetsu mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1839 = "「嗯？」" 
# monologue
# JP: ハチロクが動かした視線を追えば、\nそこにはひたすら真っ直ぐ続く――
2562 = "Nhìn theo ánh mắt của Hachiroku,\nnơi đó là một đường ray trải dài thẳng tắp——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が復活させてくださった線路ですから。\nそれがなければ、今日のこの日は来ませんでした」
2099 = "「Bởi vì đây là tuyến đường mà ngài Soutetsu đã khôi phục lại mà.\nNếu không có nó, ngày hôm nay đã không bao giờ đến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
# 1645 = "「也許是吧」" 
# monologue
# JP: 復線が成り、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の千内移転が決定し。\n御一夜-鹿兒島間の観光\x%l列車;#00ffc040;列車%l;#;が走りだす。
2513 = "Khôi phục tuyến đường thành công, nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; quyết định chuyển đến Sendai.\nChuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch đoạn Ohimitera - Kagoshima bắt đầu lăn bánh."
# monologue
# JP: 僕が御一夜に舞い戻ってきたあの日には、\n夢に描くことさえなかった光景だ。
2891 = "Vào cái ngày tôi trở về Ohimitera,\nđây là một khung cảnh mà tôi thậm chí còn chưa từng mơ tới."
# 【ハチロク】
# display as 八六
# JP: 「この満員のお客様たちを、わたくしは必ず、\n[かごしま,2]鹿兒島まで、笑顔とともにお届けします」
1923 = "「Em nhất định sẽ đưa những vị khách đang ngồi kín chỗ này,\ncùng với những nụ cười, đến tận Kagoshima.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1832 = "「嗯」" 
# monologue
# JP: 観光\x%l列車;#00ffc040;列車%l;#;第一号のニュースはそのまま、\n今日開始するＭＲＦ二期募集の宣伝にもなる。
2923 = "Tin tức về chuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch đầu tiên sẽ trở thành\nlời quảng cáo cho đợt huy động MRF kỳ 2 bắt đầu từ hôm nay."
# monologue
# JP: そのことをわかっていても、いなくても、\nハチロクはきっと乗客と共に、最良の旅をしてくるだろう。
2325 = "Dù Hachiroku có hiểu điều đó hay không,\nchắc chắn em ấy cũng sẽ cùng hành khách tạo nên một chuyến đi tuyệt vời nhất."
# 【ハチロク】
# display as 八六
# JP: 「ですので、双鉄様は」
1966 = "「Chính vì vậy, ngài Soutetsu cũng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕も最善を尽くして記者会見に臨んでこよう」
1835 = "「Ừm, tôi cũng sẽ cố gắng hết sức để chuẩn bị cho buổi họp báo.」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、いつまでお話しとーと？」
1712 = "「Hachiroku, chị định nói chuyện đến bao giờ thế?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　口より手ば動かせって、\nハチロクがいーーーっつも言いよるこったい」
1884 = "「Đúng đó! Thay vì mở miệng thì hãy động tay đi,\nlúc nàaaaao Hachiroku cũng nói vậy mà.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、わたくしとしたことが。\nそれでは、双鉄様」
1764 = "「Trời ạ, em đúng là.\nVậy thì, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。また後でな」
1829 = "「Ừm. Hẹn gặp lại sau nhé.」"
# monologue
# JP: 出発前の貴重な時間を使わせてしまったのは悪かった、が\n――話せたおかげで、気分がかなりスッキリとした。
2910 = "Dù cảm thấy có lỗi vì đã chiếm dụng khoảng thời gian quý giá trước khi xuất phát,\nnhưng nhờ được nói chuyện với em ấy, tâm trạng tôi đã trở nên sảng khoái hơn rất nhiều."
# monologue
# JP: うむ？　スッキリしたということは、\n僕はモヤモヤしていた……のか？　しかし、何故――
2421 = "Hừm? Cảm thấy sảng khoái tức là,\ntrước đó tôi đã có gì đó vướng bận trong lòng…… sao? Nhưng mà, tại sao——"
# 【稀咲】
# display as 稀咲
# JP: 「ああ！　久しぶり、本当に来てくれたんだね」
1793 = "「A! Lâu rồi không gặp, anh đến thật này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と！」
1792 = "「A!」"
# monologue
# JP: 稀咲の弾んだ声に揺すられ、思い出す。
2821 = "Bị lay động bởi giọng nói rộn ràng của Kisaki, tôi sực nhớ ra."
# monologue
# JP: そうだ、今日は浦上さんもまた千内から来てくれるのだ。\n僕も、挨拶しないわけには――っ！
2461 = "Đúng rồi, hôm nay anh Urakami cũng sẽ lại từ Sendai đến đây.\nTôi cũng phải đi chào hỏi mới được——!"
# 【稀咲】
# display as 稀咲
# JP: 「ちょっと、襟元だらしないよ」
1810 = "「Này, cổ áo xộc xệch quá kìa.」"
# 【浦上】
# display as 浦上
# JP: 「あ――すみません。暑かったので」
1804 = "「A——xin lỗi cô. Vì nóng quá.」"
# monologue
# JP: 小走りになり、稀咲は浦上さんに寄って行く。\n浦上さんの胸元に、ほとんど飛び込むほどの近さだ。
2764 = "Chạy chậm lại gần, Kisaki tiến sát anh Urakami.\nKhoảng cách gần đến mức tưởng chừng như cô ấy sắp lao hẳn vào ngực anh Urakami vậy."
# 【稀咲】
# display as 稀咲
# JP: 「じゃないでしょ。危なっかしいなぁ。\n御一夜に戻ってきて緩んじゃった？」
1657 = "「Nóng nực gì chứ. Nguy hiểm thật đấy.\nVừa quay lại Ohimitera là đã lơi lỏng rồi sao?」"
# 【浦上】
# display as 浦上
# JP: 「かも知れませんね。稀咲さんのお顔を見たから」
1644 = "「Có lẽ là vậy. Vì được nhìn thấy khuôn mặt của cô Kisaki mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ。それほどボクは頼れる上司だったかな？\nまぁいいや。なあ――ほら」
1842 = "「Fufu. Tôi là một cấp trên đáng tin cậy đến vậy sao?\nThôi được rồi. Nào——đưa đây.」"
# 【浦上】
# display as 浦上
# JP: 「ああ、すみません。そんなことまで」
1805 = "「A, xin lỗi cô. Lại để cô phải làm đến mức này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 
# monologue
# JP: その長身に埋もれるように、\nネクタイを、親しく直してあげている。
2766 = "Như thể vùi mình vào thân hình cao lớn ấy,\ncô ấy đang thân mật chỉnh lại cà vạt cho anh."
# monologue
# JP: まるで新婚の夫婦のように――
2802 = "Trông cứ như một cặp vợ chồng mới cưới——"
# monologue
# JP: （ズキっ）
2940 = "（Nhói）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1791 = "「啊」" 
# monologue
# JP: 心臓を、針で刺すような痛みを感じる。
2541 = "Tôi cảm thấy một cơn đau như bị kim đâm vào tim."
# monologue
# JP: そうして、僕は思い出す。\n日々姫が、いつか、聞かせてくれていたことを。
2705 = "Và rồi, tôi nhớ lại.\nNhững lời Hibiki đã từng nói với tôi."
# monologue
# JP: （これか――\n日々姫は、このことを教えてくれていたのか）
2949 = "（Là cái này sao——\nHibiki đã dạy cho mình điều này sao.）"
# monologue
# JP: 毎日があまりに忙しいから、距離があまりに近いから。\n何を話してもすぐに通じる、感覚があまりに心地よいから。
2423 = "Bởi vì mỗi ngày đều quá bận rộn, bởi vì khoảng cách quá đỗi gần gũi.\nNói gì cũng hiểu nhau ngay lập tức, cảm giác đó quá đỗi dễ chịu."
# 【日々姫】
# display as 日日姬
# JP: 「そうしてきっと、その瞬間。兄さんも気づきますよね」
2017 = "「Và chắc chắn, ngay khoảnh khắc đó. Anh trai cũng sẽ nhận ra.」"
# monologue
# JP: ――日々姫に警告されていたのに、\n今このときまで、気づけなかった。
1313 = "——Dù đã được Hibiki cảnh báo,\nvậy mà cho đến tận lúc này, tôi vẫn chưa nhận ra."
# monologue
# JP: 考えるよう言われていたのに、考えたのに、\n頭だけでは、答えに、たどりつけてなかった。
2448 = "Dù đã được bảo phải suy nghĩ, dù đã suy nghĩ,\nnhưng nếu chỉ dùng lý trí, thì chẳng thể nào chạm đến được câu trả lời."
# monologue
# JP: （いや、違う。\n僕はきっと、答えにたどり着いていて――）
2939 = "（Không, không phải.\nChắc chắn tôi đã chạm đến được câu trả lời rồi——）"
# monologue
# JP: だけれど、それを無視してた。\n失うことが、壊れることが、きっと怖くて。
2383 = "Thế nhưng, tôi lại phớt lờ nó đi.\nChắc chắn là vì sợ hãi việc sẽ đánh mất, sẽ phá vỡ."
# 【稀咲】
# display as 稀咲
# JP: 「これで良し。\nもう、油断しちゃダメだよ？　ほんとに」
2106 = "「Thế là xong.\nĐừng có lơ đễnh nữa đấy nhé? Thật tình.」"
# 【浦上】
# display as 浦上
# JP: 「すみません。いつまでもお手数おかけしちゃって」
1871 = "「Xin lỗi cô. Lúc nào cũng làm phiền cô thế này.」"
# 【稀咲】
# display as 稀咲
# JP: 「お手数くらいは構わないけどね。\nボクとキミとの仲なんだし」
2145 = "「Chút phiền phức này thì có sao đâu.\nDù sao thì cũng là quan hệ giữa tôi và anh mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 
# monologue
# JP: ――間に合っていないのかもしれない。\n――もう、遅すぎるのかもしれない。
1316 = "——Có lẽ đã không kịp nữa rồi.\n——Có lẽ, đã quá muộn rồi."
# monologue
# JP: それでも、はっきり自覚した。\nならば僕は、ただ、この気持ちを伝えたい。
2338 = "Dù vậy, tôi đã nhận thức được một cách rõ ràng.\nNếu thế, tôi chỉ muốn truyền đạt cảm xúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2044 = "「Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「わ！？　双鉄？　どうしたのさ、怖い顔して」
1760 = "「Oa!? Anh Soutetsu? Có chuyện gì vậy, sao mặt mũi đáng sợ thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「怖いのではない。これは、真剣な顔なのだ」
2095 = "「Không phải đáng sợ. Đây là vẻ mặt nghiêm túc đấy.」"
# monologue
# JP: 浦上がスッと一歩引く。\n僕の視界から外れてくれる。
2698 = "Anh Urakami lặng lẽ lùi lại một bước.\nRời khỏi tầm nhìn của tôi."
# monologue
# JP: 行為の意味を考えかけて、\n今考えるべきことは、たったひとつだと考えなおす。
2531 = "Đang định suy nghĩ về ý nghĩa của hành động đó,\ntôi lại tự nhủ rằng điều cần nghĩ lúc này chỉ có một mà thôi."
# 【稀咲】
# display as 稀咲
# JP: 「だったら、何に。\n双鉄は、そんなに真剣になっているのさ？」
2125 = "「Nếu vậy thì, với chuyện gì.\nMà anh Soutetsu lại trở nên nghiêm túc đến vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「キミにだ、稀咲」
2012 = "「Với cô đấy, Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「え？」
1754 = "「Hả?」"
# monologue
# JP: きょとんとした顔。\nいや……少し怯えも入っているのか？
2439 = "Khuôn mặt ngơ ngác.\nKhông…… có chút sợ hãi xen lẫn trong đó chăng?"
# monologue
# JP: 表情を伺えばどんどん不安になって――\nけれど不安で潰れるほどに、気持ちはもはや小さくは無い。
2724 = "Nhìn biểu cảm ấy, tôi ngày càng trở nên bất an——\nnhưng cảm xúc trong tôi không hề nhỏ bé đến mức bị sự bất an đè bẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「今気づいた。いや、気づいていたのかもしれないが――\n僕は、今、キミと浦上さんとを見ててようやくわかった」
1928 = "「Bây giờ tôi mới nhận ra. Không, có lẽ tôi đã nhận ra từ lâu rồi——\nnhưng bây giờ, nhìn cô và anh Urakami, tôi mới thực sự hiểu.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクと……浦上？」
1934 = "「Tôi và…… Urakami?」"
# monologue
# JP: 稀咲の視線が、けげんそうに浦上を見て――\nそれからぱっと、一瞬で僕の元へと戻る。
2770 = "Ánh mắt Kisaki ngạc nhiên nhìn sang anh Urakami——\nrồi chớp mắt một cái, ngay lập tức quay trở lại phía tôi."
# 【稀咲】
# display as 稀咲
# JP: 「え？　え――え？　それって――」
1767 = "「Ể? Ể——ể? Thế tức là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんにも、他の誰にも。\n宝生稀咲――僕は、君を渡したくない」
1627 = "「Cho dù là anh Urakami, hay bất cứ ai khác.\nHoushou Kisaki——tôi không muốn giao cô cho ai cả.」"
# 【稀咲】
# display as 稀咲
# JP: 「わ」
1758 = "「Oa.」"
# monologue
# JP: ぼふんと、稀咲が真っ赤になる。\n熱湯に浸けられでもしたかのように一気に茹で上がる。
2777 = "Đùng một cái, mặt Kisaki đỏ bừng lên.\nNóng bừng lên ngay tắp lự như thể vừa bị nhúng vào nước sôi."
# monologue
# JP: 誰に対して、何に対しての照れなのか――\n心は惑うが、それでも言葉を止めはしない。
2561 = "Là đang xấu hổ với ai, vì điều gì——\ntuy trong lòng bối rối, nhưng tôi vẫn không dừng lời."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、稀咲。君にずっと、僕の隣に居て欲しい。\nそして、これは、多分――これが、僕の恋だ」
1936 = "「Tôi muốn, Kisaki. Cô hãy luôn ở bên cạnh tôi.\nVà, điều này, có lẽ——đây chính là, tình yêu của tôi.」"
# monologue
# JP: 舌がもつれる。呼吸が苦しい。\n日々姫はあのとき、僕にどう、教えてくれていただろうか？
2547 = "Lưỡi tôi líu lại. Hơi thở trở nên khó khăn.\nLúc đó, Hibiki đã dạy tôi thế nào nhỉ?"
# monologue
# JP: 自分の気持ちをまっすぐ言葉にしているつもりで、\nだけれど、全然足りない気がして、もどかしい。
2532 = "Rõ ràng là tôi định nói thẳng cảm xúc của mình ra bằng lời,\nvậy mà cứ có cảm giác hoàn toàn không đủ, thật bực mình."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり――僕は――――その、僕はっ――」
1636 = "「Nói tóm lại là——tôi――――chuyện đó, tôi——」"
# 【稀咲】
# display as 稀咲
# JP: 「……つまり、キミは」
1359 = "「……Nói tóm lại là, anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 
# monologue
# JP: 稀咲の両手が伸びてくる。\n下から、僕をつかまえる。
2772 = "Hai tay Kisaki vươn ra.\nBắt lấy tôi từ phía dưới."
# monologue
# JP: 浦上のネクタイを直してたときよりずっと、\n稀咲は、僕に――体を、寄せてくれている。
2454 = "So với lúc chỉnh cà vạt cho anh Urakami,\nKisaki đang nép sát cơ thể vào tôi——nhiều hơn thế nữa."
# 【稀咲】
# display as 稀咲
# JP: 「右田双鉄。キミは、ボクが。\n宝生稀咲が、好きなのかい？」
1744 = "「Migita Soutetsu. Anh, thích tôi.\nThích Houshou Kisaki, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「好きだ」
1819 = "「Thích.」"
# monologue
# JP: 言った瞬間、すべてのつかえが消え失せる。
2862 = "Ngay khoảnh khắc nói ra, mọi vướng bận đều tan biến."
# monologue
# JP: この一言で、十分で。\nこの一言を、だから言えてなかったのだと理解する。
2399 = "Chỉ cần một câu này là đủ.\nVà tôi cũng hiểu ra tại sao, mình lại không thể nói ra được câu đó."
# 【双鉄】
# display as 雙鐵
# JP: 「好きだ。僕は。君が――宝生稀咲が、好きだ」
1818 = "「Anh thích em. Anh——thích em, Houshou Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、双鉄」
1750 = "「Fufu, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 
# monologue
# JP: 稀咲が、僕にぶつかってくる。\nその唇で、唇に――
2778 = "Kisaki nhào vào lòng tôi.\nBằng đôi môi ấy, áp lên môi tôi——"
# monologue
# JP: （ああ――）
2942 = "（A——）"
# monologue
# JP: 稀咲の息を感じた瞬間、\n呼吸が自然なものへと、戻る。
2505 = "Ngay khoảnh khắc cảm nhận được hơi thở của Kisaki,\nnhịp thở của tôi trở lại bình thường."
# monologue
# JP: 導かれてる――稀咲に、僕は。\nこれでいいのだと、教えられてる。
2763 = "Tôi đang được Kisaki——dẫn dắt.\nEm ấy đang dạy tôi rằng, như thế này là được rồi."
# 【稀咲】
# display as 稀咲
# JP: 「ん――ふふっ、やっとだ！　言わせた！\n我慢するの大変だったよ。ボクから先にいうとこだった」
1821 = "「Ưm——fufu, cuối cùng cũng chịu nói! Bắt anh phải nói ra!\nEm đã phải nhẫn nhịn vất vả lắm đấy. Suýt chút nữa là em đã nói ra trước mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「な？　え？　……我慢？」
1659 = "「Hả? Ể? ……Nhẫn nhịn?」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、我慢。ボクにも意地と見栄とがあってね。\n実にくだらないものだけど――」
1877 = "「Đúng vậy, nhẫn nhịn. Em cũng có sự bướng bỉnh và sĩ diện của riêng mình chứ.\nDù nó thực sự là một thứ ngớ ngẩn——」"
# monologue
# JP: あははと、笑う。\nまったく力みなく軽やかに。
2441 = "Em ấy bật cười ha hả.\nHoàn toàn không chút gượng ép, vô cùng nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「小さな頃。ボクはキミに全く相手にされなかった。\nそれで、キミを、すごく嫌いになったんだ」
1881 = "「Hồi nhỏ. Anh chẳng hề thèm để mắt đến em.\nVì thế, em đã rất ghét anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1777 = "「À.」"
# 【稀咲】
# display as 稀咲
# JP: 「でも、また会ったらさ。やっぱりキミを好きになって。\nそれがなんとなく悔しくて」
1680 = "「Nhưng mà, khi gặp lại nhau. Quả nhiên em lại thích anh.\nCảm giác đó, có chút gì đó không cam tâm.」"
# monologue
# JP: そこまで言われ、ようやく、つながったような気がする。
2452 = "Nghe đến đây, cuối cùng tôi cũng có cảm giác mọi thứ đã được xâu chuỗi lại."
# 【双鉄】
# display as 雙鐵
# JP: 「だから……我慢か？」
1956 = "「Thế nên…… em mới nhẫn nhịn sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、我慢。\nキミから先に言わせたくって、ずうっと、ね」
1998 = "「Đúng vậy, nhẫn nhịn.\nMuốn anh phải là người nói ra trước, nên em đã luôn chờ đợi.」"
# monologue
# JP: 微笑む稀咲は、とても可憐で。
2496 = "Kisaki đang mỉm cười, trông thật đáng yêu."
# monologue
# JP: この子は、これほど可愛いのだと、\n阿呆のように、いまさら気づく。
2502 = "Cô gái này, lại đáng yêu đến nhường này,\nkẻ ngốc nghếch như tôi, đến tận bây giờ mới nhận ra."
# 【稀咲】
# display as 稀咲
# JP: 「キミが、ボクを好きになってくれるずっと前から。\n双鉄、ボクはね？　キミを好きだよ」
1930 = "「Từ rất lâu trước khi anh bắt đầu thích em.\nAnh Soutetsu, anh biết không? Em đã thích anh rồi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 1777 = "「啊——」" 
# monologue
# JP: もう一度、キス。\n今度は、くちびるをかするだけ。
2437 = "Một nụ hôn nữa.\nLần này, chỉ là một cái chạm môi sượt qua."
# 【稀咲】
# display as 稀咲
# JP: 「だから、いいよ？　一緒にいよう。\nこれから先も、ずっと、ずっとね！」
1965 = "「Vì thế, em đồng ý. Hãy ở bên nhau nhé.\nTừ nay về sau, mãi mãi, mãi mãi nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1833 = "「Ừm!」"
# monologue
# JP: 三度目のキスは僕の方から。
2798 = "Nụ hôn thứ ba là từ phía tôi."
# monologue
# JP: 稀咲の口がもごもご動き、\nなにか、言葉を話すみたいで――
2761 = "Môi Kisaki mấp máy,\nnhư muốn nói điều gì đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……稀咲、なんだ？　なにか」
1827 = "「Ưm…… Kisaki, sao vậy? Em muốn nói gì à.」"
# 【浦上】
# display as 浦上
# JP: 「ああ……うんっ」
1780 = "「À…… ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2147 = "「!!?」"
# monologue
# JP: 浦上さんの咳払い。\n視野がぐわん、と元へと戻る。
2691 = "Tiếng hắng giọng của anh Urakami.\nTầm nhìn của tôi bừng sáng, trở lại với thực tại."
# monologue
# JP: というか――そうだ、駅だった。\nキャブの窓から、\x%l客車;#00ffc040;客車%l;#;から、無数の視線が、僕らを見てる。
1310 = "Hay nói đúng hơn——phải rồi, đây là nhà ga.\nTừ cửa sổ buồng lái, từ \\x%l客車;#00ffc040;toa hành khách%l;#;, vô số ánh mắt đang đổ dồn về phía chúng tôi."
# 【浦上】
# display as 浦上
# JP: 「おめでとうございます。やっとですね。\n他人ごとながら、私もハラハラしてました」
1917 = "「Chúc mừng hai người. Cuối cùng cũng thành đôi rồi nhỉ.\nDù là chuyện của người khác, nhưng tôi cũng đã phải thấp thỏm lo âu đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、ありがとう。\n浦上には気づかれてるかなって思ってたけど」
1843 = "「Fufu, cảm ơn anh.\nDù tôi nghĩ Urakami chắc cũng nhận ra rồi.」"
# 【浦上】
# display as 浦上
# JP: 「それはもう。って――どうされました？　双鉄さん」
2101 = "「Chuyện đó thì đương nhiên rồi. Ơ——cậu sao vậy? Cậu Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いや、その」
1779 = "「À…… không, chuyện đó.」"
# monologue
# JP: ものすごく親しく見えていたのが、\n僕の勘違いだったのか――
2917 = "Việc trông họ vô cùng thân thiết,\nchỉ là sự hiểu lầm của tôi thôi sao——"
# monologue
# JP: 浦上さんは、本当に、\n僕らを心から祝福してくれてるようで……
2688 = "Anh Urakami, có vẻ như thực sự\nđang chúc phúc cho chúng tôi từ tận đáy lòng……"
# 【浦上】
# display as 浦上
# JP: 「ああ」
# 2105 = "「這樣啊」" 
# monologue
# JP: ぽん、と小さく手を打ち鳴らし、\n浦上さんは、僕を呼び寄せ耳打ちしてくる。
2686 = "Khẽ vỗ tay cái bộp,\nanh Urakami gọi tôi lại gần và thì thầm vào tai."
# 【浦上】
# display as 浦上
# JP: 「誤解、されたままだと良くないですしね。\nちょっと、数秒だけいいですか？」
2073 = "「Cứ để cậu hiểu lầm mãi thì cũng không hay.\nXin vài giây thôi được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ、はい」
1801 = "「A, vâng.」"
# monologue
# JP: 促されるまま、\x%l列車;#00ffc040;列車%l;#;側へと背を向ける。
2551 = "Bị giục, tôi quay lưng về phía \\x%l列車;#00ffc040;đoàn tàu%l;#;."
# monologue
# JP: 浦上さんは僕の体に隠れるようにネクタイを緩め、\nここ、ここ、と言わんばかりに喉のあたりを――
2690 = "Anh Urakami nới lỏng cà vạt như thể giấu mình vào cơ thể tôi,\nrồi chỉ vào vùng cổ họng như muốn nói 'đây này, đây này'——"
# 【双鉄】
# display as 雙鐵
# JP: 「え？　あっ！？　喉っ」
1755 = "「Hả? Á!? Cổ họng.」"
# monologue
# JP: 喉仏が、無い。\nつまり、浦上さんは男性ではなく――
2651 = "Không có yết hầu.\nNói cách khác, anh Urakami không phải là nam giới——"
# 【浦上】
# display as 浦上
# JP: 「なんです。内緒にしてくださいね」
1891 = "「Là vậy đó. Hãy giữ bí mật nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし、あのっ」
1632 = "「Không, nhưng mà, cái đó.」"
# 【浦上】
# display as 浦上
# JP: 「ただ単に仕事上有利なんです。\n不愉快なことも激減しますし」
1738 = "「Chỉ đơn giản là có lợi trong công việc thôi.\nNhững chuyện không vui cũng giảm đi đáng kể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうなのですか」
1786 = "「À…… ra là vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろんボクは、知ってたよ？　……っていっても、\n銀行で一緒のときは気づけなかったけど」
2027 = "「Tất nhiên là em biết chứ? ……Dù nói vậy,\nnhưng hồi làm chung ở ngân hàng thì em cũng không nhận ra đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
# 2105 = "「這樣啊」" 
# monologue
# JP: 稀咲からずっと隠し通せていたというなら、\n浦上さんの男装に、僕が気づけなかったとしても仕方ない。
2587 = "Nếu có thể giấu nhẹm chuyện đó với Kisaki suốt ngần ấy thời gian,\nthì việc tôi không nhận ra màn giả nam của anh Urakami cũng là điều khó tránh khỏi."
# monologue
# JP: もともと、それほど親しく接していたわけでもないし――
2817 = "Vốn dĩ, tôi cũng đâu có tiếp xúc thân mật đến thế——"
# monologue
# JP: （ぽーーーーーーーっ！）
# 2943 = "（嗚——！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 
# monologue
# JP: 発車時刻か――\nホームの端で、ポーレットが\x%l緑旗;#00ffc040;緑旗%l;#;を振っている。
2717 = "Đã đến giờ khởi hành——\nở cuối sân ga, Paulette đang phất \\x%l緑旗;#00ffc040;cờ xanh lá%l;#;."
# monologue
# JP: ボッ、ボッ、ボッ、ボと\x%lブラスト;#00ffc040;ブラスト%l;#;音。\n\x%l動輪;#00ffc040;動輪%l;#;が回り、\x%l8620;#00ffc040;8620%l;#;はゆっくりホームを離れ始める。
76 = "Tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#; xình, xịch, xình, xịch.\n\\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; quay, chiếc \\x%l8620;#00ffc040;8620%l;#; chầm chậm bắt đầu rời khỏi sân ga."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、稀咲先輩！　おめでとーーーっ！」
2134 = "「Anh hai, tiền bối Kisaki! Chúc mừng hai người——!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、おめでとうございます！」
2139 = "「Ngài Soutetsu, xin chúc mừng ngài!」"
# 【凪】
# display as 凪
# JP: 「にーさん、かっこよかったばい！」
1855 = "「Anh hai, ngầu lắm á!」"
# monologue
# JP: キャブから、そして\x%l客車;#00ffc040;客車%l;#;の窓から――
2434 = "Từ buồng lái, và từ cửa sổ của \\x%l客車;#00ffc040;toa hành khách%l;#;——"
# 【ふかみ】
# display as 深美
# JP: 「ううう～残念だけど、\nおふたりとも、おめでとうございます、ですっ」
1820 = "「Ư ư ư~ Dù hơi tiếc, nhưng mà,\nchúc mừng hai người ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うふふぅ、おめでと、ふたりとも」
1752 = "「Fufu, chúc mừng nhé, hai đứa.」"
# 【元忠】
# display as 元忠
# JP: 「……双鉄くん。あとで一杯やろうじゃないか」
1375 = "「……Cậu Soutetsu. Lát nữa chúng ta đi làm một ly chứ.」"
# monologue
# JP: ――祝福の声をいくつも響かせ、\n\x%l8620;#00ffc040;8620%l;#;は遠く鹿兒島へと走り去る。
71 = "——Rất nhiều tiếng chúc phúc vang lên,\nchiếc \\x%l8620;#00ffc040;8620%l;#; chạy xa dần về phía Kagoshima."
# 【れいな】
# display as 玲奈
# JP: 「双鉄さんと稀咲さん、けっこんするんですよねぇ！\nすごく、おめでとうございまぁす！」
2137 = "「Anh Soutetsu và chị Kisaki, sắp kết hôn rồi đúng không ạ!\nThật sự, xin chúc mừng hai người nha!」"
# 【ポーレット】
# display as 波萊特
# JP: 「おめでとうございます、ふたりとも。\n新婚旅行、\x%l列車;#00ffc040;列車%l;#;の旅がおすすめですよ？」
1918 = "「Xin chúc mừng hai người.\nTuần trăng mật, tôi đề xuất một chuyến đi bằng \\x%l列車;#00ffc040;tàu%l;#; nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2072 = "「Cảm ơn mọi người.」"
# monologue
# JP: そしてホームの端からも、温かな祝福を送ってもらう。
2791 = "Và từ đầu bên kia sân ga, những lời chúc phúc ấm áp cũng được gửi đến."
# monologue
# JP: けれども今は、それに浸るにはまだ早すぎる。
2343 = "Thế nhưng lúc này, vẫn còn quá sớm để chìm đắm trong điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲――」
2042 = "「Kisaki——」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね、双鉄。そろそろ時間だ」
1980 = "「Đúng vậy, anh Soutetsu. Sắp đến giờ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1832 = "「嗯」" 
# monologue
# JP: ただこれだけで、通じ合えてる。
2327 = "Chỉ cần vậy thôi, chúng tôi đã có thể thấu hiểu nhau."
# monologue
# JP: これほど僕らは近いのに、\n好きだと、それだけ――ずうっと伝えられないでいた。
2515 = "Chúng tôi gần gũi đến thế,\nvậy mà câu nói thích nhau, chỉ điều đó thôi——lại mãi chẳng thể thốt nên lời."
# 【双鉄】
# display as 雙鐵
# JP: 「説明会を、頑張るよ」
2029 = "「Anh sẽ cố gắng hết sức cho buổi thuyết trình.」"
# monologue
# JP: 伝えなければ、伝わらない。\nきっと、大事なことであるほど。
2637 = "Nếu không nói ra, sẽ không thể truyền đạt được.\nChắc chắn, càng là những chuyện quan trọng thì càng như vậy."
# monologue
# JP: そう知ったから、もうためらわない。
2582 = "Vì đã hiểu điều đó, nên không còn chần chừ gì nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの願いを、僕らの夢を、\n少しでも広く伝えるために」
2013 = "「Để truyền đạt mong muốn của chúng ta, ước mơ của chúng ta,\nđến với nhiều người hơn nữa. Dù chỉ một chút.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね、双鉄。\nもちろんボクも、一緒だよ？」
1979 = "「Đúng vậy, anh Soutetsu.\nTất nhiên em cũng sẽ, đồng hành cùng anh chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1833 = "「嗯！」" 
# monologue
# JP: 稀咲の手を取り、歩き出す。
2539 = "Nắm lấy tay Kisaki, tôi bước đi."
# monologue
# JP: 稀咲とならば、第二期募集もその次も、\n必ず成功するだろう。
2402 = "Nếu có Kisaki, đợt huy động kỳ 2 và cả những đợt tiếp theo nữa,\nchắc chắn sẽ thành công."
# monologue
# JP: （復線を果たし、鉄道網を復活させて――）
2947 = "（Khôi phục lại tuyến đường, làm sống lại mạng lưới đường sắt——）"
# monologue
# JP: そうして、いつか、きっと僕らは敷くだろう。\n誰かと誰かを繋ぐため、新しい未来へ走り出すため。
2810 = "Rồi một ngày nào đó, chắc chắn chúng tôi sẽ trải những đường ray mới.\nĐể kết nối ai đó với ai đó, để chạy tới một tương lai mới."
# monologue
# JP: まだ誰も走ったことのない、純白に輝くレールを――\n僕と稀咲と、必ずふたりで。
1315 = "Những đường ray tỏa sáng thuần khiết mà chưa ai từng chạy qua——\ntôi và Kisaki, chắc chắn cả hai sẽ cùng nhau."
