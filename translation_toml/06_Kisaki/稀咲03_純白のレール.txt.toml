# 【稀咲】
# display as 稀咲
# JP: 「え？　え――え？　それって――」
1767 = "「哎？哎——哎？這是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんにも、他の誰にも。\n宝生稀咲――僕は、君を渡したくない」
