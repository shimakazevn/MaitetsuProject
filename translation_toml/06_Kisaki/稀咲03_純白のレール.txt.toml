[script]
# lines: 448 
# 【双鉄】
# display as 雙鐵
# JP: 「帝国線路合同会社、か」
1899 = "「帝國線路有限公司啊」" 

# monologue
# JP: 帝国線路合同会社――Teikoku Railroad LLC.
2478 = "帝國線路有限公司——Ｔｅｉｋｏｋｕ·Ｒａｉｌｒｏａｄ·ＬＬＣ." 

# monologue
# JP: 証券上に記載されている文字列を見れば、\n日々姫が初めて\x%l機関士;#00ffc040;機関士%l;#;代理を任された時の言葉を思い出す。
2869 = "證券上印的字，讓我想起了日日姬第一次被任命為代理\\x%l機関士;#00ffc040;司機%l;#;時說的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『わかっていてもプレッシャー』とは、\nなるほど、こんな感覚なのだな」
1349 = "「“就算知道還是會感到壓力”原來是這種感覺啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「何を弱気なことを言っているんだい、双鉄」
2141 = "「雙鐵，你在說什麼洩氣話呢」" 

# monologue
# JP: 郵便物の束を抱えて、\n稀咲が部屋へと入ってくる。
2567 = "抱著一堆郵件的稀咲走進屋裡。" 

# 【稀咲】
# display as 稀咲
# JP: 「キミ達の例えでいうなら『動輪はもう回ってる』だろ？\n今さら止まれるものではないさ」
2025 = "「用你們的話來說就是“動輪已經轉起來了”，不是嗎？現在已經停不下來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことなら百も承知だ。が――」
2100 = "「這我當然再清楚不過了。可是——」" 

# monologue
# JP: 言葉を探せば……やはりそれへと帰結していく。
2529 = "我在腦海裡尋找能形容現在感受的詞彙……可還是只能想到日日姬說過的那句話。" 

# monologue
# JP: 義理とはいえど兄妹だから、\n言語感覚もいつの間にやら、似通ってきたのかもしれん。
2912 = "雖然我們不是親兄妹，但畢竟一起待了那麼久，說話的風格大概也相似起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかっていてもプレッシャーなのだ。\n僕ごときが、合同会社の代表社員とは」
1893 = "「就算知道還是會感到壓力。讓我這種人來當有限公司的代表人真的好嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「ごときじゃないよ。キミが最適」
1658 = "「什麼叫這種人啊。你是最合適的人選」" 

# monologue
# JP: きっぱり、稀咲は言い切って、\n郵便物をドサリとデスクの上に下ろす。
2768 = "稀咲斬釘截鐵地說著，把手裡的東西嘩一下全放到桌子上。" 

# 【稀咲】
# display as 稀咲
# JP: 「鉄道、金融、行政に。古い御一夜と新しい御一夜に。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社にまで――キミは、強力な人脈を持っている」
1690 = "「你有強大的人脈，從鐵路、金融到行政，從老御一夜到新御一夜，連\\x%lエアクラ;#00ffc040;空凝機%l;#;公司裡都有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのどの分野においても、僕自身は大した技能も知恵も\n発揮できんがな」
1677 = "「但不管在哪個領域，我都沒有什麼技能和知識」" 

# 【稀咲】
# display as 稀咲
# JP: 「それでいいのさ。どんな状況で誰に頼むか。\nリーダーは、そこだけ間違えなければいいから」
2103 = "「這樣也足夠了。領導只要知道在什麼狀況下該用什麼人就行了」" 

# monologue
# JP: そこまでキッパリ言い切られると、\nそんなものかという気がしてくる。
2843 = "被她如此斷言，連我自己都快要相信了。" 

# monologue
# JP: なにせ稀咲は隈元銀行御一夜支店の、\n誰もが認める優れたリーダーなのだから。
2713 = "畢竟稀咲本人可是人人都認可的隈元銀行御一夜支行的優秀領導。" 

# 【稀咲】
# display as 稀咲
# JP: 「正しく任せる。そのための決断をする。責任を負う。\nそれ以上にまで踏み込めば、かえって混乱を呼ぶものさ」
2142 = "「領導只需要選出正確的人選，做出決定，然後承擔責任。要是插手具體事務，反而會造成混亂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか。\nならば、そのように心がけよう」
1984 = "「是這樣嗎。那我可得記在心裡」" 

# monologue
# JP: 頷けば、ふふっと嬉しげな顔。
2721 = "看到我同意她的說法，稀咲開心地笑了。" 

# 【稀咲】
# display as 稀咲
# JP: 「それじゃ、実践してみせて？\nこれ――どうしようか」
2116 = "「那就先實踐一下吧。這些該怎麼辦才好？」" 

# monologue
# JP: 言って稀咲は、持ち運んできた郵便物の束を指す。
2783 = "稀咲說著指了指她剛才搬進來的那一大疊信件。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……もしかしなくても、申し込み書か？」
1809 = "「啊，這些……不用說，肯定都是申請書吧？」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。ご年配層で鉄道の復活を望む方は多いのだね。\n今どき、これほど郵送申し込みがあるとは思わなかった」
1830 = "「嗯。看來年紀大的人裡面希望鐵路復活的人很多啊。沒想到現在還能收到這麼多郵寄的申請書」" 

# 【双鉄】
# display as 雙鐵
# JP: 「情報入手もその分遅れてしまうのだろうな。\nしかし……先着順とは募集時から明示はしていたが――」
1667 = "「他們獲取消息恐怕也會慢一些吧。不過……集資開始的時候不是就公布了按申請順序來嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「困ったよね、即完売になってしまったから。\n[マイレールファンド,2]ＭＲＦ第一期：御一夜-[かごしま,2]鹿兒島復線ファンドが」
2098 = "「這可就令人頭痛了。因為第一期私有線路基金：御一夜——鹿兒島線剛一發布就被認購一空了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1823 = "「嗯……」" 

# monologue
# JP: 稀咲ならどうするか――と、\n舌先にまで触れた言葉を、けれども喉に押し込め直す。
2523 = "我剛想說“稀咲你會怎麼辦”，話到嘴邊還是咽了下去。" 

# monologue
# JP: ヒントは、すでに貰っている。\nならばそれを、ともかく実践してみよう。
2442 = "她已經給過我提示了，那我就實踐一下吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏のスケジュールを貰えるか、尋ねてくれるか？\nあと、浦上さんのも」
2057 = "「能幫我問問元忠先生還有浦上經理的時間安排嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「わかった。すぐに連絡してみる」
2034 = "「知道了，我馬上去問」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、僕もだな――」
1873 = "「對了，我也得問問——」" 

# monologue
# JP: 視野なら広い方が良く、知恵なら多い方がいい。\n電話を借りて、暗記している番号を押す。
2898 = "還是把視野放寬一些，多借助一些人的智慧。我借了電話，撥通了記在心裡的號碼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、僕だ。\n少し、時間を貰えるか？」
1813 = "「喂，是我。能打擾一下嗎？」" 

# 【浦上】
# display as 浦上
# JP: 「――すみません。遅刻です」
1337 = "「——抱歉，我遲到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、ご連絡はいただきましたし。\n[せんだい,1]千内からわざわざ、こちらこそすみません」
1999 = "「沒關係，事先不是聯絡過了嗎。麻煩您專程從川內大老遠跑過來，我才應該道歉」" 

# monologue
# JP: 出発前の連絡通りの、十四分間の遅刻。
2456 = "如浦上經理出發前在電話中所說的一樣，遲到了１４分鐘。" 

# monologue
# JP: 交通状況を完全に読める\x%lエアクラ;#00ffc040;エアクラ%l;#;ナビのありがたさを、\n今更ながらに痛感する。
2518 = "我再次切身感受到，有能夠完全掌握交通狀況的\\x%lエアクラ;#00ffc040;空凝機%l;#;導航系統是一件多麼方便的事。" 

# 【浦上】
# display as 浦上
# JP: 「打ち合わせが長引いてしまいまして」
2064 = "「被會議拖延了一些時間」" 

# monologue
# JP: 浦上さんは、恐縮しきりといった様子で、\nソファに浅めに腰掛ける。
2689 = "浦上經理拘謹地輕輕坐到沙發上。" 

# monologue
# JP: 浦上さんのものだったデスクは、今は僕が。\n――この短期間に、本当に多くが動いたものだ。
2385 = "原本這張桌子是屬於浦上經理的，現在卻是我的——在這短短一段時間裡，變化真的很大。" 

# 【双鉄】
# display as 雙鐵
# JP: 「マイレールファンド一期はありがとうございました。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;・ヒノモトの社員持株会さんのおかげで――」
2038 = "「私有線路基金第一期的時候真的謝謝您了。都是多虧日本\\x%lエアクラ;#00ffc040;空凝機%l;#;公司的員工持股計劃——」" 

# 【浦上】
# display as 浦上
# JP: 「持株会の件は全くノータッチですよ。\nあれは、会員投票で投資先を決めるものですから」
1768 = "「員工持股計劃我並沒有參與。那是員工們自己投票選定的投資項目」" 

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さん絡みの案件だから満場一致での投資が決まった。\nそう、うちの宝生から――」
1950 = "「我聽說是因為和浦上經理有關，所以全場一致決定投資的。敝司的寶生——」" 

# 【元忠】
# display as 元忠
# JP: 「うむ？」
1839 = "「嗯？」" 

# monologue
# JP: いや、元忠氏は“うち”の――\n帝国線路合同会社の一員ではない。
2321 = "不對，元忠先生並不是我們公司——帝國線路有限公司的一員。" 

# monologue
# JP: が、確かに、宝生だけではややこしい。
2711 = "用姓來稱呼還是容易引起誤會。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――稀咲から、そのように聞いております」
1338 = "「——稀咲告訴我的」" 

# monologue
# JP: 浦上さんが千内に拠点を移したということは、\n千内が工場誘致の最有力候補となったということ。
2584 = "既然浦上經理轉赴川內，也就是說川內成為了建立工廠最有力的候選地。" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;・ヒノモトの社員なら誰にでもわかるその事実が、\n持株会のマイレールファンドへの信用を高めたらしい。
2632 = "日本\\x%lエアクラ;#00ffc040;空凝機%l;#;公司的職員都明白這件事，這也加深了員工持股計劃對我們的信任。" 

# 【浦上】
# display as 浦上
# JP: 「ああ」
2105 = "「這樣啊」" 

# monologue
# JP: 浦上さんの顔が目に見えて晴れやかになる。
2687 = "浦上經理不禁喜形於色。" 

# 【浦上】
# display as 浦上
# JP: 「買いかぶりすぎです。\nですが、元上司からの高い評価は、ありがたい」
1859 = "「太抬舉我了。不過被前上司這麼高看，真是不勝感激」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1840 = "「嘻嘻」" 

# monologue
# JP: 稀咲の微笑が、場の雰囲気を和ませる。\n話を切り出す良いタイミングだ。
2773 = "稀咲的微笑緩和了會議的氣氛，現在正適合切入主題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて。今日お集まりいただいたのは、おかげさまで、\n第一期のマイレールファンドが完売となったためです」
1661 = "「今天麻煩各位前來是因為託各位的福，我們第一期的私有線路基金已經售罄」" 

# 【元忠】
# display as 元忠
# JP: 「予想より随分早かった。法人としての\x%lエアクラ;#00ffc040;エアクラ%l;#;社と\n持株会と。両方の参加が、ファンドを注目させたかね？」
1993 = "「比我想得還要快很多啊。是因為\\x%lエアクラ;#00ffc040;空凝機%l;#;公司和員工持股計劃的攜手參加，讓私有線路基金受到了關注嗎？」" 

# monologue
# JP: 前置きも終わりきらぬうちに、元忠氏が食いついてくる。\nが、丁度いい。流れにのって進めてしまおう。
2899 = "還沒等我說完開場白，元忠先生就表現出濃厚的興趣。正好，我就順著他的話說下去吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは極めて大きいと思います。事実、オンラインでの\n申し込みの最初期は、金融機関からのものが殆どでした」
1952 = "「我認為這是非常重要的一個原因。事實上，一開始的網路上申請也都來自金融機構」" 

# 【ハチロク】
# display as 八六
# JP: 「金融機関……\n鉄道関係からの投資は無かったのですか？」
2128 = "「金融機構……沒有鐵路相關公司的投資嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最初期は、御一夜鉄道さんからだけだ。が、ほどなく\n[ひさつ,1]肥颯みかん鉄道さんからもご応募いただいた」
1624 = "「一開始只有御一夜鐵路公司。但之後肥薩橙鐵路公司也馬上就參加了」" 

# monologue
# JP: みかん鉄道さんは、鹿兒島-千内間のレールを保有し、\n営業運転を維持し続けている鉄道会社。
2824 = "肥薩橙鐵路是擁有和負責運營鹿兒島到川內之間線路的鐵路公司。" 

# monologue
# JP: そこからの参加をいただけたことは、\n鉄道関係者からのファンドへの注目を厚くした。
2484 = "得到了這家公司的參與後，其他鐵路相關組織也開始注意我們的私有線路基金。" 

# 【稀咲】
# display as 稀咲
# JP: 「その影響で、かな？　少し時間を置いてから、\n鉄道関係から、郵便で、大量の申し込みが押し寄せた」
1857 = "「大概就是因為這件事的影響吧，過了一段時間之後我們就收到了大量來自鐵路相關行業的申請」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ――すごっ」
1762 = "「哇，好厲害」" 

# monologue
# JP: ダンボールいく箱をも埋める郵便物の山を見て、\n日々姫が目を丸くする。
2619 = "日日姬看著用幾個紙箱裝起來的信件小山，眼睛瞪得大大的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ……どのくらい」
2096 = "「這些……大概有多少呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まだ精査はしていないのだが、一万件以上ある」
2107 = "「還沒細數，大概有一萬份以上吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「いちまんけ――って、え？　だって、個人は一口、\n１０万円からの出資だから……１０億円分！？」
1623 = "「一萬份？呃，可是個人出資最低十萬日元……所以有十億日元！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、第一期分は既に完売してしまっています。\nので、取扱をどうすべきか、知恵をお借りできればと」
1682 = "「但是第一期已經全部售出了。所以我想請在座各位出出主意，該如何處理這些申請」" 

# monologue
# JP: 頭を下げれば、戻すより早く声が聴こえる。
2522 = "我剛低下頭，還沒等抬起來就有人發言了。" 

# 【元忠】
# display as 元忠
# JP: 「第二期募集をかけるとして、候補地は？」
2068 = "「要開第二期集資的話，候選地有哪些？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうだろう、ポーレット」
2006 = "「波萊特，你怎麼想」" 

# monologue
# JP: 水を向ければ、\n待ちかねていたかのようにポーレットが立つ。
2664 = "波萊特胸有成竹，似乎正等著我問她。" 

# 【ポーレット】
# display as 波萊特
# JP: 「圧倒的に御一夜-[やつしろ,2]八ツ城間です。ここを復線できれば、\nみかん鉄道さんの線路と環状になりますから」
1908 = "「必須是御一夜到八代。如果能讓這裡的廢線恢復，就可以和橙鐵路的線路形成環線」" 

# 【稀咲】
# display as 稀咲
# JP: 「環状になると、何かメリットが？」
2023 = "「環線有什麼優勢嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはもう！　\x%l列車;#00ffc040;列車%l;#;運用の面でも、利便性でも、\nコスト削減の意味でも、地域発展性の面でも」
1702 = "「優勢可大了！不管是從\\x%l列車;#00ffc040;列車%l;#;的調度、便利性、成本控制，還是帶動地區發展來說，都是如此」" 

# monologue
# JP: 路線が環状となるのがいかに有用か。
2710 = "環狀線就是有著這樣種種得天獨厚的優勢。" 

# monologue
# JP: ポーレットの情感豊かな力説に、\n元忠氏までもが前のめりになる。
2425 = "在波萊特充滿感情的強調之下，就連元忠先生也積極了起來。" 

# 【元忠】
# display as 元忠
# JP: 「では、二期募集はその路線の復線を目標とするもので\n決まりだな」
2123 = "「那第二期集資的目標就是恢復這條線路了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って、わたしも思います。思うんですけど……\n費用が、その――多分、第一期の何倍も――」
1925 = "「我也是這麼想的。不過……恢復線路的費用恐怕是第一期的好幾倍——」" 

# 【元忠】
# display as 元忠
# JP: 「ふむ？」
# 1839 = "「嗯？」" 

# monologue
# JP: さすがは市長というべきか、お役所繋がりというべきか。
2660 = "波萊特不愧是市長，和當地政府關係密切。" 

# monologue
# JP: ポーレットの差し出した資料には、\n復線区間の地権者リストが並べられてる。
2446 = "她拿出的資料上，列著恢復廢線路段的土地擁有者名單。" 

# 【稀咲】
# display as 稀咲
# JP: 「うわ……これは酷いね。見事にバラバラだ」
1757 = "「哇……這可難辦了。沒想到有這麼多人」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;が払い下げたとき事業参入を名目に落札した業者が、\n結局は小分けに転売しちゃったみたいなんです」
1673 = "「似乎是\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;轉讓土地時，表面上以參股名義集體買下的土地，實際上是被分割轉賣了」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど……第一期のときのように、道路用地として\n自治体が一括購入したケースばかりではないのだね」
1720 = "「原來如此……看來並不是所有的土地都像第一期那樣，被地方自治體全部買下作為道路用地了」" 

# monologue
# JP: 第一期の案件は、ありとあらゆる条件面で恵まれていたと、\n今更ながらに思い知る。
2709 = "現在我才明白，像第一期那樣各種條件都很合適的案例是很少的。" 

# monologue
# JP: 線路を復活させるとは――\nつまりは、用地の買収なのだと。
2871 = "讓鐵路復活，也就意味著買下整片土地。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ程の小分けも、レアケースだとは思うんですけど\n……時間も、費用も、多分第一期の何倍も――」
2136 = "「雖然我覺得土地被切割成這麼多塊的案例也很罕見……不過，恐怕我們需要投入比第一期多好幾倍的時間和費用」" 

# 【元忠】
# display as 元忠
# JP: 「……かかるだろうが、不可能ではない。\n住宅開発をされていないのが幸いしたな」
1374 = "「……雖然花費很大，但並不是不可能。幸好這些土地還沒有被開發成住宅」" 

# monologue
# JP: 断言されて、不安が一気に軽くなる。\n僕には見えぬ成算を、元忠氏の目が見つけてくれてる。
2820 = "聽元忠先生這麼斷言，我心裡的不安少了許多。當我束手無策的時候，他卻從中找到了勝算。" 

# 【元忠】
# display as 元忠
# JP: 「が、第一期の買収を完了させ、配当を出すまで動けんな。\n続けざまにこの規模の募集をしては、信頼を損ねかねん」
1679 = "「但我們在完成第一期土地收購、順利發放股息前都不能輕舉妄動。沒出成果就連續進行這種規模的集資，可能有損信譽」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー……やっぱり、そうなりますよね。はい」
1788 = "「啊……果然會這樣嗎。嗯」" 

# monologue
# JP: ポーレットと元忠氏と。
2661 = "波萊特和元忠先生接連點頭。" 

# monologue
# JP: 別方面のスペシャリスト同士が\n意見を同じくするのなら、僕に挟める異論などない。
2581 = "既然兩個不同方面的專家持相同意見，那我自然不會有異議。" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した。が、二期募集まで長期お待たせするのも、\nまた、[むげ,1]無碍にお断りするのも避けたいのだ」
1946 = "「我明白了。但我還是不想讓他們一直等到第二期，或者冷冰冰地拒絕他們」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……そか。\nそのお手紙の人達のお話だっけ」
1784 = "「啊……對哦，是在說寫信來申請的那些人吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ここから鉄道人脈を発掘できそうな気もするからね。\n出来れば、前向きになって頂けるお返事をお出ししたい」
1847 = "「因為有可能從這裡面找到與鐵路有關的人脈。如果有可能，我想給他們正面的答覆」" 

# monologue
# JP: 僕の気持ちを、そのまま稀咲が掬ってくれる。
2782 = "稀咲解釋了我的想法。" 

# monologue
# JP: が、ポーレットは口を噤んで考えこみ、\n元忠氏も腕組みし、厳しく眉根を潜めてしまう。
2341 = "但波萊特卻閉口不言沉思起來，元忠先生也抱著手臂皺起眉頭。" 

# 【元忠】
# display as 元忠
# JP: 「さて……一口づつとして十億、\n五口平均になったとすれば五十億の金、か」
2109 = "「那……每封一手是十億，平均每封五手就是五十億」" 

# monologue
# JP: 小さな額では無いのだが、\n二期復線の費用にはまるで届かない。
2909 = "雖然不是小數字，但完全填不上第二期恢復線路所需資金的缺口。" 

# monologue
# JP: どうしたものか……と、重い沈黙が垂れ込める。
2431 = "大家都一言不發專心思考著，氣氛格外沉重。" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
1791 = "「啊」" 

# monologue
# JP: 不意にハチロクが声をあげ、ポーレットへと顔を向ける。
2789 = "突然，八六想到了什麼，朝波萊特問道。" 

# 【ハチロク】
# display as 八六
# JP: 「あの、ポーレット様、悩んでらしたではないですか。\n御一夜-[かごしま,2]鹿兒島間の\x%l保線;#00ffc040;保線%l;#;について」
1874 = "「對了，波萊特小姐，你不是很頭痛從御一夜到鹿兒島之間線路的\\x%l保線;#00ffc040;巡線%l;#;問題嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……うん。確かに――\nけど、なんとか人員を確保して」
1782 = "「啊……嗯，是的。不過，我會想辦法找到人手——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、やはりキツそうなのか？」
1981 = "「是嗎，果然人手很吃緊？」" 

# monologue
# JP: 問えば、苦笑。\nこれは……無理をさせてる顔だ。
2663 = "波萊特用苦笑來回答。看來她是在硬撐。" 

# 【ポーレット】
# display as 波萊特
# JP: 「現状のままだと……ですね。ちょっと」
1669 = "「以目前的情況來看……有些困難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2105 = "「這樣啊」" 

# monologue
# JP: できたばかりの帝国線路合同会社には、\n復線させた線路を\x%l保線;#00ffc040;保線%l;#;する技術も人員も無い。
2377 = "剛成立的帝國線路有限公司連對恢復的線路進行\\x%l保線;#00ffc040;巡線%l;#;的技術和人手都沒有。" 

# monologue
# JP: ので、そこについては、御一夜鉄道株式会社に\n業務委託でお願いできればと相談をしていたのだが――
2565 = "所以我們找上了御一夜鐵路股份公司，希望能把業務委託給他們——" 

# 【ハチロク】
# display as 八六
# JP: 「そこでなのですけれども――御一夜鉄道の線路を全部、\nそのお金で買収していただくのはいかがですか？」
1957 = "「所以我在想——能不能把御一夜鐵路的所有線路都用那些資金買下來呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1765 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道の……御一夜-[ゆのい,1]湯医間をか？」
1906 = "「御一夜鐵路的……是說御一夜到湯醫嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
1982 = "「是的」" 

# monologue
# JP: テーブル上に地図を広げて、\nハチロクは稀咲からペンを借りる。
2366 = "八六在桌子上攤開地圖並向稀咲借來筆。" 

# monologue
# JP: そしてキュウっと赤線で、\n湯医-御一夜-鹿兒島間を大きな丸で囲ってしまう。
2704 = "然後在湯醫——御一夜——鹿兒島之間畫了一個大大的紅圈。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様たちの会社に、このようにして線路の保守管理を\n行っていただける方が、間違いがないと思うのです」
1951 = "「我認為讓雙鐵少爺的公司這樣來進行鐵路的維護工作為好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　うん、それはそう。他社\x%l列車;#00ffc040;列車%l;#;との相互乗り入れも\nあるし、全線を同じ品質と方法で管理してもらえた方が」
1797 = "「啊！對，因為這條線還會有不同公司的\\x%l列車;#00ffc040;列車%l;#;通行，用統一的標準和方法來管理比較好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし。そうするだけの技術も人員も」
1740 = "「可這樣做需要技術和人員，但我們都沒有」" 

# 【ハチロク】
# display as 八六
# JP: 「ですので。『御一夜鉄道の所有する全線路』を、\n双鉄様の会社にご買収いただくのです」
1963 = "「所以，我希望雙鐵少爺的公司能收購御一夜鐵路的所有線路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1845 = "「噢噢」" 

# monologue
# JP: ようやく、わかる。
2542 = "我終於懂了。" 

# monologue
# JP: そうなれば以降の御一夜鉄道は、\n\x%l保線;#00ffc040;保線%l;#;にかかる人員設備を、所有しなくて済むのだから――
2894 = "這樣，御一夜鐵路就不需要再負擔\\x%l保線;#00ffc040;巡線%l;#;的人員和設備了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりは、帝国線路合同会社に線路だけでなく、\n\x%l保線;#00ffc040;保線%l;#;に関する人と技術とも、集積させるというわけか」
1637 = "「也就是說，不只是線路，同時也要將\\x%l保線;#00ffc040;巡線%l;#;的人員和技術匯聚到帝國線路有限公司旗下，對吧」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です」
1997 = "「沒錯」" 

# monologue
# JP: 堰さんたち、\n\x%l保線;#00ffc040;保線%l;#;ボランティアさんからの協力は引き続き得られよう。
2892 = "這樣還能繼續得到堰先生他們這些\\x%l保線;#00ffc040;巡線%l;#;志願者的幫助。" 

# monologue
# JP: となると、御一夜-鹿兒島間をどう手当するか――
2903 = "那，應該怎麼處理御一夜到鹿兒島的部分呢——" 

# 【ハチロク】
# display as 八六
# JP: 「きっと、このお手紙のご応募者さんの中にも、\n\x%l保線;#00ffc040;保線%l;#;技術者さんだった方がいらっしゃるのでは？」
1943 = "「我想這些信裡，應該能找到以前當過\\x%l保線;#00ffc040;巡線%l;#;技術人員的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2146 = "「！」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうか。“だった人”たち――だよね、\n大廃線で失業した専門家は、山のように埋もれてる筈だ」
2104 = "「這樣啊。以前的鐵路技術人員——對，在大廢線中失業的專業人員應該多得很」" 

# monologue
# JP: いうなり稀咲はPCに向かい、\n猛然とキーを叩き始める。
2786 = "稀咲馬上面對電腦，飛快地敲擊起鍵盤。" 

# monologue
# JP: 待つほどのことも無いうち、プリンタが紙を吐き始める。\nごく当然といった仕草で、浦上さんがそれをまとめる。
2393 = "只消片刻，印表機就開始吐出文件。浦上經理也理所當然地整理了起來。" 

# 【元忠】
# display as 元忠
# JP: 「……ほほう、悪くない。\nこれならば受け取る側も納得してくれるだろう」
1366 = "「……哦，不錯。這樣的話投資人應該也會接受吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「確かに、よくまとまってますね、これ。\n押し付けがましくないだけじゃなく……わくわくします」
2031 = "「的確，有理有據。沒有給人強迫的感覺……讓人不禁躍躍欲試」" 

# 【ハチロク】
# display as 八六
# JP: 「『第一期追加募集;\n（株）御一夜鉄道稼働中路線・御一夜-湯医間』ですか」
1882 = "「就叫“第一期追加集資：御一夜鐵路股份公司運營中的路線·御一夜至湯醫路段”嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「細目はこれから精査して詰めるとして――\nどうだろう、双鉄。こんな感じの募集説明で」
2050 = "「細節部分可以慢慢確定。雙鐵，你覺得這樣的集資說明可以嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「良いな、とても良い」
1629 = "「不錯，非常不錯」" 

# monologue
# JP: 募集に添えられたキャッチコピー。
2577 = "文件上印著宣傳語。" 

# monologue
# JP: それこそが帝国線路合同会社、\n僕らの事業の本質なのだと、ただ一言で表している。
2349 = "僅僅一句話就概括出了帝國線路有限公司——我們事業的本質。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『線路を続けていくために』、か」
1350 = "「“為讓鐵路延伸下去”」" 

# monologue
# JP: 線路を続けていくために。\n集中運用集中管理が必要ならば、僕は必ずそれを果たそう。
2701 = "為了讓鐵路延伸下去。如果這需要集中調度集中管理的話，那我就一定要做到。" 

# 【浦上】
# display as 浦上
# JP: 「これは……新しい事業モデルとなるかもしれませんね。\nつまり、後発が、日ノ本各地で模倣参入してくるかも」
2094 = "「這……說不定能成為新的事業範例。今後說不定日本各地都會有模仿者湧現出來」" 

# 【稀咲】
# display as 稀咲
# JP: 「なればなったで望むところさ」
2120 = "「那我們就先做好領頭人吧」" 

# monologue
# JP: 浦上さんの言葉に稀咲が、カラリと笑う。
2780 = "稀咲笑著回應。" 

# 【稀咲】
# display as 稀咲
# JP: 「各地の復線が早まって、鉄道事業のシナジーも復活する。\nそうなれば健全な競争が発生し、業界が再編されていく」
2102 = "「這樣也會加快各地恢復廢線的速度，彼此呼應相互促進。繼而產生良性競爭，鐵路產業也能夠最佳化整合」" 

# monologue
# JP: 稀咲がしばしば口にする――\n僕の耳にもすっかり馴染んでしまった言葉に、頷いている。
2509 = "我也點頭贊成這句稀咲經常掛在嘴邊的話。" 

# monologue
# JP: 僕らの事業が成功すれば、それは最初の\x%l枕木;#00ffc040;枕木%l;#;となり、\n続いて走る者たちと、競争と発展とを呼び起こすのだ。
2397 = "只要我們這次的事業成功，就能成為最初的\\x%l枕木;#00ffc040;枕木%l;#;，吸引後來者們競爭、發展。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご異議が無ければ、この線――、一期追加募集案で、\n細目を詰めさせていただきたいと思っています」
2066 = "「要是沒有異議，就按照這個方向來完善第一期追加集資的具體方案」" 

# 【元忠】
# display as 元忠
# JP: 「異議無し」
1996 = "「沒有異議」" 

# monologue
# JP: 元忠氏の真っ先の声。\n次いですぐさま、「異議なし」の声達が部屋を埋める。
2358 = "元忠先生首先表示同意。接著，表示同意的聲音馬上響徹了整個房間。" 

# 【双鉄】
# display as 雙鐵
