2705 = "然後我想起了日日姬那天對我說過的話。" 

# monologue
# JP: （これか――\n日々姫は、このことを教えてくれていたのか）
2949 = "（這就是日日姬想要告訴我的嗎）" 

# monologue
# JP: 毎日があまりに忙しいから、距離があまりに近いから。\n何を話してもすぐに通じる、感覚があまりに心地よいから。
