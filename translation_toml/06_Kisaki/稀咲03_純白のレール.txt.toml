1949 = "「我的初戀還沒等到告白就結束了。所以我對戀愛，是一竅不通的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのか」
1373 = "「……這樣嗎」" 

# monologue
# JP: ならば、あるいは。\n“友達”とやらは日々姫なのかもしれん。
2897 = "這麼說，日日姬口中的“朋友”也許就是她本人。" 

# monologue
# JP: そうと思えば、\n感謝の気持ちが、より一層に湧いてくる。
