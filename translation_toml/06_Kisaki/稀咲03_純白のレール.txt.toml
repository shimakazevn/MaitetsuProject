2471 = "就好像是因此而下定了決心一般，她邁出了大大的一步。" 

# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、おやすみなさい。兄さん」
2126 = "「那，晚安。哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おやすみ。日々姫」
1836 = "「嗯，晚安。日日姬」" 

# monologue
# JP: ……階段を登る足音が、ほどなく静かになっていく。
1329 = "……爬上樓梯的腳步聲迅速歸於沉寂。" 

# monologue
# JP: 日々姫は最後の最後まで、僕を兄さんと呼びつづけた。\n普段の日々姫、素顔の日々姫を、決して見せはしなかった。
2617 = "日日姬直到最後都叫我哥哥。絲毫不讓我看到平時那個真實的日日姬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……考えろ、か」
1369 = "「……思考嗎」" 

# monologue
# JP: あの日々姫が。
2621 = "日日姬竟會如此跟我說。" 

# monologue
# JP: ほぼ初対面の僕にさえ、すがりつくほど弱かった子が、\n僕の背中を、こうも力強く押し出そうとしてくれたのだ。
2901 = "那個連第一次見面的我都要依靠的軟弱女孩，如今也能在背後用力推我一把了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「考えるとも。\nそして必ず、お前にも答えを伝えよう」
1947 = "「我會好好考慮的。然後一定會告訴你答案」" 

# monologue
# JP: （ポーーーーーっ！）
2943 = "（嗚——！）" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l汽笛;#00ffc040;汽笛%l;#;一声――
73 = "\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l汽笛;#00ffc040;汽笛%l;#;聲在耳邊迴響——" 

# monologue
# JP: それをホームから見守っているのは、\n実になんとも、微妙な気分だ。
2819 = "而我卻只能在站台看著，心情實在有些複雜。" 

# 【ハチロク】
# display as 八六
# JP: 「いかがなさいました、双鉄様？」
2140 = "「雙鐵少爺，您怎麼了？」" 

# monologue
# JP: キャブの窓から、\x%l運転体;#00ffc040;運転体%l;#;のハチロクの顔。
77 = "\\x%l運転体;#00ffc040;駕駛體%l;#;狀態的八六從駕駛室探出腦袋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――この晴れの日に見送る自分を、\n少し残念に思っていたところだ」
1995 = "「沒什麼。我只是覺得這大喜之日自己只能站在邊上看，有點遺憾」" 

# 【ハチロク】
# display as 八六
# JP: 「残念とお感じいただけますことは光栄ですが――」
2058 = "「能讓您感到這麼遺憾，我倒是很光榮——」" 

# monologue
# JP: こいこいと、ハチロクが僕を手招きする。
2865 = "說著，八六招手讓我過去。" 

# monologue
# JP: 招かれるまま近寄れば、窓から小さな手が伸びて、\n僕の髪へとそうっと触れる。
2482 = "待我走到近前，她從窗戶伸出小手來輕輕撫摸我的頭髮。" 

# 【ハチロク】
# display as 八六
# JP: 「――[キャブ,2]運転台でご一緒できずとも、\nわたくしは、双鉄様とともに走らせていただきますよ？」
1332 = "「——就算不能在駕駛室和雙鐵少爺在一起，我也是和雙鐵少爺一同前行的呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1839 = "「嗯？」" 

# monologue
# JP: ハチロクが動かした視線を追えば、\nそこにはひたすら真っ直ぐ続く――
2562 = "我順著八六的視線看去，只見眼前的鐵軌向著遠方筆直延申——" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が復活させてくださった線路ですから。\nそれがなければ、今日のこの日は来ませんでした」
2099 = "「這可是雙鐵少爺恢復的線路。沒有它我們是斷然無法走到今天這一步的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
# 1645 = "「也許是吧」" 

