# 【稀咲】
# display as 稀咲
# JP: 「だったら、何に。\n双鉄は、そんなに真剣になっているのさ？」
2125 = "「那雙鐵你是為了什麼而如此認真？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「キミにだ、稀咲」
2012 = "「為了你，稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「え？」
1754 = "「咦？」" 

