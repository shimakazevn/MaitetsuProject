# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 

# monologue
# JP: ――間に合っていないのかもしれない。\n――もう、遅すぎるのかもしれない。
1316 = "——說不定已經來不及了。已經太晚了。" 

