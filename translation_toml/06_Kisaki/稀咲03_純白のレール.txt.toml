# JP: 復線が成り、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の千内移転が決定し。\n御一夜-鹿兒島間の観光\x%l列車;#00ffc040;列車%l;#;が走りだす。
2513 = "我們成功恢復了廢線，讓\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠決定改在川內落戶。從御一夜到鹿兒島的觀光\\x%l列車;#00ffc040;列車%l;#;也即將啟動。" 

# monologue
# JP: 僕が御一夜に舞い戻ってきたあの日には、\n夢に描くことさえなかった光景だ。
2891 = "這是我回到御一夜那天，做夢也不會想到的場景。" 

# 【ハチロク】
# display as 八六
