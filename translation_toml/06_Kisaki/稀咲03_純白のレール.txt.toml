2383 = "卻一直視而不見。因為我害怕失去這份感情，害怕毀壞這份感情。" 

# 【稀咲】
# display as 稀咲
# JP: 「これで良し。\nもう、油断しちゃダメだよ？　ほんとに」
2106 = "「這樣就好了。不可以再鬆懈啦，真是的」" 

# 【浦上】
# display as 浦上
