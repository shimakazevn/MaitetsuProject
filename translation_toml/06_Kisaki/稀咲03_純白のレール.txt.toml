2338 = "但我既然已經明白了自己的心意。那麼，我就要把這份心意傳達給她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2044 = "「稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「わ！？　双鉄？　どうしたのさ、怖い顔して」
