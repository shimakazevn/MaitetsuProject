# monologue
# JP: そうして、いつか、きっと僕らは敷くだろう。\n誰かと誰かを繋ぐため、新しい未来へ走り出すため。
2810 = "總有一天，我們也會為了連繫起其他人，邁向新的未來，而鋪下閃耀著純白光輝的嶄新鐵軌。" 

# monologue
# JP: まだ誰も走ったことのない、純白に輝くレールを――\n僕と稀咲と、必ずふたりで。
1315 = "——由我和稀咲兩個人一起。" 
