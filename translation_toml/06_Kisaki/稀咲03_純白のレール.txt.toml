# 【浦上】
# display as 浦上
# JP: 「かも知れませんね。稀咲さんのお顔を見たから」
1644 = "「也許吧。因為看到了稀咲小姐」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ。それほどボクは頼れる上司だったかな？\nまぁいいや。なあ――ほら」
1842 = "「嘻嘻，你把我當成這麼可靠的上司嗎？好吧不怪你了，來——我給你繫好」" 

# 【浦上】
# display as 浦上
# JP: 「ああ、すみません。そんなことまで」
1805 = "「啊，對不起。還讓您做這些」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2146 = "「！」" 

