# lines: 301 
# monologue
# JP: 完全個室のレストランでの時間を経てなお、\n僕らの討議は道半ばにあり、それゆえに――
1501 = "Dù đã trải qua khoảng thời gian ở nhà hàng\ncó phòng riêng hoàn toàn,\ncuộc thảo luận của chúng tôi vẫn đang dang\ndở, vì thế——"

# 【稀咲】
# display as 稀咲
# JP: 「遠慮はいらない。さぁ、どうぞ。\nって、姜さんたちが手配してくれた部屋だけれども」
973 = "「Không cần phải khách sáo đâu. Nào, xin\nmời.\nÀ mà, đây vốn là căn phòng do cô Khương\nsắp xếp cho chúng tôi mà.」"

# 【姜】
# display as 姜
# JP: 「いえ、双鉄先生と稀咲女士のお部屋ですから、\nやはり、いささか緊張します」
1038 = "「Không đâu, đây là phòng của anh Soutetsu\nvà chị Kisaki mà,\nnên quả thật, tôi cũng có chút căng\nthẳng.」"

# 【稀咲】
# display as 稀咲
# JP: 「安心して？　旅荷だけだし、\nおかしなものが転がってたりはしない……と思う」
1216 = "「Cứ yên tâm đi? Chỉ có hành lý thôi,\nchứ không có vứt lung tung mấy thứ kỳ quái\nđâu…… tôi nghĩ vậy.」"

# 【姜】
# display as 姜
# JP: 「おやおや、それは楽しみです」
1035 = "「Ái chà chà, vậy thì tôi rất mong đợi\nđấy.」"

# monologue
# JP: カードをあててキーを解除し扉を開く。
1562 = "Quẹt thẻ mở khóa và mở cửa."

# 【西瓜】
# display as 西瓜
# JP: 「わ！　とても素敵なお部屋ですね。\nさすが姜女士のお手配だと西瓜は感心いたします」
1018 = "「Oa! Một căn phòng thật tuyệt vời.\nĐúng là sự sắp xếp của cô Khương có khác,\nSuika rất khâm phục ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、昨日チェックインしたとき、\nボクも全く同じ感想を抱いたよ」
1057 = "「Ufufu, hôm qua lúc nhận phòng,\ntôi cũng có cùng cảm nhận y như vậy đấy.」"

# 【姜】
# display as 姜
# JP: 「恐縮です」
1410 = "「Thật ngại quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ボクらはベッドに腰掛けるゆえ、\n姜さんたちはソファーを使ってください」
1184 = "「Chúng tôi sẽ ngồi trên giường,\ncòn cô Khương và Suika hãy dùng ghế sofa\nnhé.」"

# 【姜】
# display as 姜
# JP: 「かしこまりました」
1095 = "「Tôi hiểu rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「さて、と。\n今出てきている案をまずは羅列してみよう」
1092 = "「Vậy thì.\nTrước tiên hãy liệt kê lại những phương án\nđã được đưa ra nào.」"

# monologue
# JP: テーブルをずらし、四人で囲めるように整えれば、\n稀咲はすぐさま、レストランで討議内容を整理しはじめる。
1571 = "Sau khi di chuyển chiếc bàn để cả bốn\nngười có thể ngồi quây lại,\nKisaki lập tức bắt đầu tóm tắt lại nội\ndung thảo luận ở nhà hàng."

# 【稀咲】
# display as 稀咲
# JP: 「ま、どの案もパンチにはかけるよね。無難といえば無難。\nそれだけに、効果の方も無難なりのものに留まりそうだ」
1008 = "「Chà, phương án nào cũng thiếu tính đột\nphá nhỉ. An toàn thì có an toàn.\nNhưng cũng chính vì thế, hiệu quả có lẽ\ncũng chỉ dừng ở mức an toàn mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありきたりの案は、それが有効であるからこそ、\n手垢にまみれ、ありきたりになったという面もあろうが」
909 = "「Những phương án thông thường, chính vì nó\nhiệu quả\nnên mới bị lạm dụng và trở nên thông\nthường, cũng có mặt đó mà.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。ターゲットに確実に刺さる場合には、\nあえて王道――ありきたり、無難を外す意味はない」
1309 = "「Đúng vậy. Nếu chắc chắn đánh trúng mục\ntiêu,\nthì không có lý do gì lại cố tình bỏ qua\ncon đường chính đạo——thông thường và an\ntoàn cả.」"

# monologue
# JP: 稀咲の言に、ああ、と姜さんが頷きを見せる。
1535 = "Trước lời nói của Kisaki, cô Khương 'A'\nlên một tiếng rồi gật đầu."

# 【姜】
# display as 姜
# JP: 「今回はターゲットが茫漠としすぎ、広すぎるのですね」
1191 = "「Lần này mục tiêu của chúng ta quá mơ hồ\nvà quá rộng lớn nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。鉄道に一切の興味がない層に、\n鉄道への興味をいだいてもらうことが大目標だものね」
1136 = "「Ừm. Vì mục tiêu lớn của chúng ta là khiến\nnhững người hoàn toàn không có hứng thú\nvới đường sắt\nphải cảm thấy hứng thú với đường sắt mà.」"

# 【姜】
# display as 姜
# JP: 「ええ」
1132 = "「Vâng.」"

# 【稀咲】
# display as 稀咲
# JP: 「例えばSNSやグループチャットに広告を出稿しても。\n著名人に紹介記事を書いてもらっても。それは結局」
1148 = "「Ví dụ như có chạy quảng cáo trên SNS hay\ntrò chuyện nhóm.\nHay nhờ người nổi tiếng viết bài giới\nthiệu đi chăng nữa. Thì rốt cuộc」"

# 【双鉄】
# display as 雙鐵
# JP: 「もとよりいくらかは鉄道に興味をいだいている層にしか\nリーチし得ないであろうな」
1350 = "「Chắc cũng chỉ có thể tiếp cận được với\nnhững người\nvốn dĩ đã có chút ít hứng thú với đường\nsắt thôi.」"

# 【姜】
# display as 姜
# JP: 「ですね。まるで興味ないジャンルの広告は飛ばされます。\n目障りと思われるのが関の山かと」
1270 = "「Đúng vậy. Quảng cáo về những lĩnh vực\nkhông quan tâm sẽ bị bỏ qua.\nThậm chí còn bị coi là chướng mắt nữa là\nđằng khác.」"

# 【稀咲】
# display as 稀咲
# JP: 「だよねぇ」
1146 = "「Đúng vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまない」
1043 = "「A, xin lỗi.」"

# monologue
# JP: 稀咲か、あるいは姜さんか。\n誰のか知らぬ腹の虫を、ひとまず自分のものとしておく。
1574 = "Là Kisaki, hay là cô Khương.\nKhông biết tiếng bụng sôi là của ai, nhưng\ntạm thời tôi cứ nhận là của mình vậy."

# 【稀咲】
# display as 稀咲
# JP: 「そういえばお腹が空いたよね。レストランでも話して\nばかりで、結局ほとんどテイクアウトになっちゃったし」
1404 = "「Nhắc mới nhớ, bụng đói rồi nhỉ. Ở nhà\nhàng cũng toàn mải nói chuyện,\nrốt cuộc hầu như phải mang về hết.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ」
1041 = "「A.」"

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君。お手数だけど、テイクアウトしたものを」
1368 = "「Suika. Phiền em lấy đồ ăn mang về ra\nnhé.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい、西瓜はすぐに配膳します」
1097 = "「Vâng, Suika sẽ dọn ra ngay ạ.」"

# monologue
# JP: 少し所在なげに討議を見守るばかりだった西瓜が、\n稀咲の言葉にいそいそと動き始める。
1700 = "Suika, nãy giờ chỉ biết lóng ngóng theo\ndõi cuộc thảo luận,\nnghe Kisaki nói vậy liền hăm hở hành động."

# 【双鉄】
# display as 雙鐵
# JP: 「いい香りだ。\n――ああ、ポットにお茶まで持たせてくれたのか」
1016 = "「Mùi thơm thật.\n——A, họ còn cho cả trà trong bình mang về\nnữa sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「まさしくいたれりつくせり……\nって、いや――。改めて見るとものすごい量だね、これ」
1012 = "「Đúng là phục vụ tận tình chu đáo……\nÀ, không——. Giờ nhìn lại mới thấy lượng\nthức ăn này khủng khiếp thật đấy.」"

# monologue
# JP: レストランの大きな回転テーブルからホテル個室の小机へ。\n配膳が変わってがため、ボリューム感も大きく変わる。
1514 = "Từ chiếc bàn xoay lớn ở nhà hàng chuyển\nsang chiếc bàn nhỏ trong phòng khách sạn.\nDo cách bày biện thay đổi, nên cảm giác về\nsố lượng cũng thay đổi lớn."

# 【姜】
# display as 姜
# JP: 「注文したものは適量だったかと思います。ですが、\n思いもかけず、大量のお土産を頂いてしまったので」
1257 = "「Tôi nghĩ lượng thức ăn mình gọi là vừa\nđủ. Nhưng mà,\nkhông ngờ lại được tặng thêm một lượng lớn\nđồ ăn mang về như vậy.」"

# 【稀咲】
# display as 稀咲
# JP: 「大量のお土産！\n凄いね、姜さんは余程の上得意さんなんだ」
1436 = "「Tặng thêm một lượng lớn!\nTuyệt thật, cô Khương chắc hẳn phải là\nkhách VIP lắm đây.」"

# 【姜】
# display as 姜
# JP: 「いえ、そうではありません。一秘書である私が、\n自分で直接あのお店を使う機会など殆どありませんから」
1418 = "「Không, không phải vậy đâu. Một thư ký như\ntôi,\nhầu như chẳng có cơ hội tự mình trực tiếp\nđến ăn ở nhà hàng đó đâu.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうなの？\nじゃあなんで、こんなにたくさんのお土産を――」
1248 = "「Vậy sao?\nThế tại sao lại được tặng nhiều đồ ăn thế\nnày——」"

# monologue
# JP: 稀咲の問いに、姜さんがくすくす笑い出す。
1536 = "Trước câu hỏi của Kisaki, cô Khương bật\ncười khúc khích."

# 【姜】
# display as 姜
# JP: 「大当たりをしたそうなのです。お店のオーナーが。\nええと……西瓜、なんでしたっけ？」
1344 = "「Nghe nói là trúng mánh lớn. Ông chủ nhà\nhàng ấy.\nÀ ừm…… Suika, là trò gì nhỉ?」"

# 【西瓜】
# display as 西瓜
# JP: 「[ｄｏｕ,1]闘羊――日ノ本語読みするなら“とうよう”\n闘う羊と書いて闘羊です」
1141 = "「Đấu Dương——nếu đọc theo tiếng Hinomoto\nthì là 'Touyou'.\nViết là con cừu chiến đấu, nghĩa là Đấu\nDương ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「闘羊」
1218 = "「Đấu Dương.」"

# monologue
# JP: 知っているかと稀咲を見れば、\n稀咲もはてなと首をかしげる。
1573 = "Tôi nhìn Kisaki xem em ấy có biết không,\nnhưng Kisaki cũng nghiêng đầu khó hiểu."

# 【稀咲】
# display as 稀咲
# JP: 「話の流れから推測すると……\n多分、賭け事なんだよね？　羊のレースか何かかい？」
1225 = "「Suy luận từ mạch câu chuyện thì……\nChắc là một trò cá cược nhỉ? Cuộc đua cừu\nhay gì đó à?」"

# 【西瓜】
# display as 西瓜
# JP: 「はい、賭け事です。ですが、レースではありません。\n羊同士が闘いあう……そうですね、いわば羊の相撲です」
1311 = "「Vâng, là trò cá cược ạ. Nhưng không phải\nlà đua.\nMà là những con cừu chiến đấu với nhau……\nđúng rồi, có thể gọi là sumo cừu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、なかなかに面白そうだ」
1033 = "「Hô, nghe có vẻ khá thú vị đấy.」"

# monologue
# JP: つい出た言葉に、稀咲が不思議そうな目を向けてくる。\n確かに羊の相撲というのは、稀咲の好みとは遠かろう。
1665 = "Trước câu nói buột miệng của tôi, Kisaki\nhướng ánh mắt kỳ lạ về phía tôi.\nĐúng là sumo cừu thì khác xa với sở thích\ncủa Kisaki."

# 【西瓜】
# display as 西瓜
# JP: 「元々は春節だけの催事でしたが、\n近年では通年で行われるようになりました」
993 = "「Ban đầu đây chỉ là sự kiện diễn ra trong\ndịp Tết Nguyên Đán,\nnhưng những năm gần đây đã được tổ chức\nquanh năm rồi ạ.」"

# 【姜】
# display as 姜
# JP: 「それも、[かほくしょう,2]河蹼省でだけ楽しまれているものでした。\nそれがあれよあれよと、一気に全国区となりまして」
1340 = "「Hơn nữa, trò này vốn chỉ được ưa chuộng ở\ntỉnh Hà Bộc.\nVậy mà chớp mắt một cái, nó đã nhanh chóng\nlan rộng ra toàn quốc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、規模も期間も大幅に拡大されたのか」
907 = "「Trời, quy mô và thời gian đều được mở\nrộng đáng kể sao.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。その結果、今ではインターネットを通じ、\nどこからでも勝羊投票券を購入できるようになりました」
1244 = "「Vâng. Kết quả là, hiện tại thông qua mạng\ninternet,\nngười ta có thể mua vé cá cược cừu thắng\ntừ bất cứ đâu ạ.」"

# monologue
# JP: 西瓜がスマホを操作して、画面を僕らに見せてくれる。\n漢字の形は微妙に違うが、それでもなんとなく理解できる。
1708 = "Suika thao tác trên điện thoại thông minh\nvà đưa màn hình cho chúng tôi xem.\nDù hình dáng chữ Hán hơi khác một chút,\nnhưng tôi vẫn có thể hiểu được đại khái."

# 【双鉄】
# display as 雙鐵
# JP: 「イメージ的には……日ノ本のサッカーくじと同じかな？\n一枚の投票券で、複数の試合の勝ち負け引分を投票する」
1318 = "「Cảm giác thì…… giống như cá cược bóng đá\nở Hinomoto nhỉ?\nChỉ với một tấm vé, có thể cá cược thắng\nthua hòa cho nhiều trận đấu.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね、それだと当選確率はかなり低くなる。\n大当たりすれば一挙に高額の払い戻しが――ああ！」
991 = "「Ra là vậy, thế thì xác suất trúng thưởng\nsẽ khá thấp.\nNếu trúng mánh lớn thì sẽ được trả một số\ntiền khổng lồ trong chốc lát——A!」"

# monologue
# JP: 稀咲と顔を見合わせる。
1570 = "Tôi và Kisaki nhìn nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「レストランのオーナーは、\n見事その大当たりを引き当てたわけか」
920 = "「Ông chủ nhà hàng,\nđã xuất sắc trúng được cái mánh lớn đó\nsao.」"

# 【姜】
# display as 姜
# JP: 「そうなりますね。ですのでお土産は、\nレストラン利用者全員に振る舞われたものとなります」
1241 = "「Là vậy đấy. Vì thế, đồ ăn mang về\nlà thứ được thiết đãi cho tất cả các khách\nhàng của nhà hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「全員にこの量か。なんとも豪気なことだなぁ」
1207 = "「Ai cũng được lượng thức ăn thế này sao.\nThật là hào phóng quá đi.」"

# 【稀咲】
# display as 稀咲
# JP: 「ありがたいけど、とてもボクらでは食べ切れないよ。\n姜さんも、さぁ。西瓜君もよければ」
953 = "「Biết ơn thật đấy, nhưng chúng ta làm sao\nmà ăn hết được.\nCô Khương cũng ăn đi. Suika nếu thích thì\ncứ tự nhiên nhé.」"

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます。\nですが、西瓜は軽油しかいただくことができません」
1325 = "「Em cảm ơn ạ.\nNhưng mà, Suika chỉ có thể dùng dầu diesel\nthôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n電気式とはいえどディーゼル動力なのだものな」
1094 = "「Vậy sao.\nDù là loại chạy điện nhưng vẫn dùng động\ncơ diesel mà nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ、それは残念。ならさ、誰か――ああ、\nさっき言ってたマスターさんにテイクアウトとかどう？」
1247 = "「Vậy à, tiếc thật đấy. Thế thì, có ai——a,\nmang về cho người Master mà em vừa nhắc\nđến lúc nãy thì sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「わ！」
1017 = "「Oa!」"

# monologue
# JP: ぱっと、西瓜の顔が華やぐ。
1698 = "Khuôn mặt Suika bỗng chốc sáng bừng lên."

# 【西瓜】
# display as 西瓜
# JP: 「もしここで余るようでしたら、ぜひ持ち帰らせて下さい。\n[ｙａｎｇｒｏｕ,2]羊肉串は、志寰――西瓜のマスターの好物なのです」
1099 = "「Nếu ở đây còn thừa, xin hãy cho em mang\nvề ạ.\nYangrou——Thịt cừu xiên nướng là món khoái\nkhẩu của Zhihuan——Master của Suika ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ヤン……？　ふむ？　それは、どれだい？」
1337 = "「Yang……? Hừm? Là cái nào vậy?」"

# 【西瓜】
# display as 西瓜
# JP: 「これです。串焼きの――日ノ本でいう、焼き鳥の羊版、\nケバブとも似た料理です」
1145 = "「Là cái này ạ. Xiên nướng——ở Hinomoto gọi\nlà yakitori phiên bản thịt cừu,\ncũng giống như món kebab vậy ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「羊相撲のお祝いが、焼き羊！」
1067 = "「Ăn mừng sumo cừu, bằng cừu nướng!」"

# monologue
# JP: 稀咲がくすくす笑い出す。
1673 = "Kisaki bật cười khúc khích."

# 【稀咲】
# display as 稀咲
# JP: 「いや本当に豪快だね！　――ああ、けど、うん。\n食べて供養っていう考えは、多分仲国にもあるのかな」
1029 = "「Chà, hào sảng thật đấy! ——A, nhưng mà,\nừm.\nTư tưởng ăn để cúng dường, chắc ở Trọng\nQuốc cũng có nhỉ.」"

# 【姜】
# display as 姜
# JP: 「さてどうでしょう。少なくとも私は理解できますが、\nなにせ仲国は広いですから」
1394 = "「Chuyện đó thì sao nhỉ. Ít nhất là tôi có\nthể hiểu được,\nnhưng dù sao thì Trọng Quốc cũng rộng lớn\nlắm mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「羊料理ひとつとっても、仲国各地で、\nさぞさまざまなバリエーションがあるのだろうな」
1170 = "「Chỉ riêng món thịt cừu thôi, ở các vùng\nkhác nhau của Trọng Quốc,\nchắc hẳn cũng có vô vàn biến tấu khác nhau\nnhỉ.」"

# monologue
# JP: 西瓜にもたせてやる分を、かなり多めに取り分ける。\nそれでもやはり、食べ切れるかが不安な量だが――
1564 = "Tôi chia một phần khá lớn để Suika mang\nvề.\nDù vậy, lượng thức ăn còn lại vẫn khiến\ntôi lo lắng không biết có ăn hết nổi\nkhông——"

# 【双鉄】
# display as 雙鐵
# JP: 「羊の供養になるように、我々も\nおいしくいただくとしよう。『いただきます』だ」
1291 = "「Để cúng dường cho bầy cừu, chúng ta\ncũng hãy ăn thật ngon miệng nào.\n'Itadakimasu'.」"

# 【稀咲】
# display as 稀咲
# JP: 「いただきます。あむっ」
1200 = "「Itadakimasu. Ngoạm.」"

# monologue
# JP: かぶりつき、噛みしめるごと、\n稀咲の頬にじわじわ赤みが増していく。
1654 = "Mỗi lần cắn một miếng và nhai,\nđôi má Kisaki lại dần ửng đỏ thêm."

# 【稀咲】
# display as 稀咲
# JP: 「んくっ。うん。これはいいね。スパイシーで美味しい。\n羊の独特のクセみたいなのが、まったく気にならない」
1442 = "「Ưm. Ừm. Ngon thật đấy. Vừa cay vừa ngon.\nHoàn toàn không thấy mùi vị đặc trưng của\nthịt cừu luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この串焼きも河蹼省の――ああ、いや」
1276 = "「Đúng vậy. Món xiên nướng này cũng của\ntỉnh Hà Bộc——A, không.」"

# monologue
# JP: 不意に、先程の西瓜の言が気にかかってくる。\n聞き流してかけてしまっていたが……
1547 = "Đột nhiên, tôi để tâm đến lời nói lúc nãy\ncủa Suika.\nTôi đã suýt nghe xong rồi bỏ ngoài tai,\nnhưng mà……"

# 【双鉄】
# display as 雙鐵
# JP: 「地方人気だったという闘羊が、\n突如全国区になったという話だったが――」
975 = "「Chuyện Đấu Dương vốn chỉ nổi tiếng ở địa\nphương,\nđột nhiên lan rộng ra toàn quốc ấy——」"

# 【稀咲】
# display as 稀咲
# JP: 「！」
1042 = "「!」"

# monologue
# JP: 稀咲の食べる手が止まる。
1636 = "Kisaki dừng tay đang ăn lại."

# 【稀咲】
# display as 稀咲
# JP: 「そうか。それって、闘羊に興味がなかった――\n知らなかった人達も一気に興味を抱いたってことだよね」
1131 = "「Ra vậy. Tức là, những người không có hứng\nthú với Đấu Dương——\nnhững người không hề biết đến nó cũng đột\nnhiên cảm thấy hứng thú nhỉ.」"

# 【姜】
# display as 姜
# JP: 「！」
# 1042 = "「啊！」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ！」
# 1042 = "「啊！」" 

# monologue
# JP: 姜さんも西瓜も気づいたようだ。\nここにあるいは、探し求めるヒントがあるかもしれないと。
1533 = "Cả cô Khương và Suika dường như cũng nhận\nra.\nCó lẽ ở đây chứa đựng gợi ý mà chúng tôi\nđang tìm kiếm."

# 【双鉄】
# display as 雙鐵
# JP: 「突如の人気爆発の背後には、一体何があったのだ？」
1220 = "「Đằng sau sự bùng nổ mức độ yêu thích đột\nngột đó, rốt cuộc là có chuyện gì?」"

# 【西瓜】
# display as 西瓜
# JP: 「これです。西瓜もスマホにいれています。\n西瓜だけでなく、機関士達やレイルロオド達の多くが」
1232 = "「Là cái này ạ. Suika cũng cài trên điện\nthoại.\nKhông chỉ Suika, mà rất nhiều kỹ sư lái\ntàu và Railord cũng cài ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「これは……」
1398 = "「Đây là……」"

# monologue
# JP: 稀咲とスマホを覗き込む。\n画面には恐らくブランドロゴ。そして画面が白転し――
1568 = "Tôi và Kisaki cùng nhìn vào điện thoại.\nTrên màn hình có lẽ là logo thương hiệu.\nSau đó màn hình chuyển sang màu trắng——"

# 【稀咲】
# display as 稀咲
# JP: 「女の子のキャラクター……\nって、これ――ゲームアプリ！？」
971 = "「Nhân vật nữ……\nƠ, cái này——là ứng dụng trò chơi sao!?」"

# monologue
# JP: 西瓜の操作を、稀咲とふたり覗き込む。
1561 = "Tôi và Kisaki cùng nhìn Suika thao tác."

# 【双鉄】
# display as 雙鐵
# JP: 「……ふむ、人気が出るものうなずける」
627 = "「……Hừm, nổi tiếng cũng phải thôi.」"

# monologue
# JP: 動作は軽快、女の子のキャラクターもかわいいし、\n相撲らしきムービーは驚くほどの躍動感に満ちている。。
1581 = "Thao tác mượt mà, nhân vật nữ cũng dễ\nthương,\nvà đoạn phim giống như sumo thì tràn đầy\nsự sống động đáng kinh ngạc."

# 【双鉄】
# display as 雙鐵
# JP: 「つまりこれは、女の子が相撲で闘うゲームなのか？」
1408 = "「Nói cách khác, đây là trò chơi các cô gái\nchiến đấu bằng sumo sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。『羊女??』――日ノ本語でいうと、\n羊娘レスリングとか羊娘相撲という印象のタイトルです」
1237 = "「Vâng. 'Dương Nữ??'——nếu nói bằng tiếng\nHinomoto,\nthì tựa game mang cảm giác như là Đấu vật\nDương Nương hay Sumo Dương Nương ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、その『羊娘』っていうのが、\nこの女の子たち？」
1062 = "「A, cái gọi là 'Dương Nương' đó,\nchính là những cô gái này sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「ですね。闘羊の伝説的な横綱たちを、\n擬人化して羊娘にしています」
1273 = "「Đúng vậy ạ. Họ đã nhân hóa những Yokozuna\nhuyền thoại của Đấu Dương,\nthành các Dương Nương.」"

# 【稀咲】
# display as 稀咲
# JP: 「擬人化！　羊を！」
1210 = "「Nhân hóa! Cừu sao!」"

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、みな耳と角とが生えているな」
1405 = "「Nhắc mới để ý, ai cũng có tai và sừng mọc\nra nhỉ.」"

# monologue
# JP: が、共通項はその位。あとは女学生風だったり\nOL風だったり女医風だったり、さまざまだ。
1487 = "Nhưng điểm chung chỉ có bấy nhiêu. Còn lại\nthì mang phong cách nữ sinh,\nphong cách nữ nhân viên văn phòng hay nữ\nbác sĩ, vô cùng đa dạng."

# 【稀咲】
# display as 稀咲
# JP: 「で、その羊娘を操作してレスリングして勝てばいい？」
1204 = "「Thế, chỉ cần điều khiển các Dương Nương\nđó đấu vật và giành chiến thắng là được\nsao?」"

# 【西瓜】
# display as 西瓜
# JP: 「目的はそのとおりですが、過程が少しだけ違います。\nプレイヤーは選択した羊娘を、操作ではなく育成します」
1402 = "「Mục đích thì đúng là vậy, nhưng quá trình\nthì hơi khác một chút ạ.\nNgười chơi sẽ chọn một Dương Nương, và\nnuôi dưỡng chứ không phải điều khiển cô\nấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「育成？」
1076 = "「Nuôi dưỡng?」"

# 【西瓜】
# display as 西瓜
# JP: 「試しに大人気の羊娘、『白眼幕内』を育ててみます。\n日ノ本語でいえば、『目が白い幕内力士』です」
1423 = "「Để em thử nuôi dưỡng một Dương Nương rất\nđược yêu thích, 'Bạch Nhãn Mạc Nội' nhé.\nNếu nói bằng tiếng Hinomoto thì là 'Lực sĩ\nMakuuchi mắt trắng' ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「確かに目も髪も白いね。アルビノってやつなのかな」
1308 = "「Đúng là mắt và tóc đều trắng nhỉ. Kiểu\nnhư bệnh bạch tạng chăng.」"

# 【西瓜】
# display as 西瓜
# JP: 「モデルとなった闘羊も同じ特徴をしていたそうです」
1343 = "「Nghe nói chú cừu chiến đấu được lấy làm\nnguyên mẫu cũng có đặc điểm giống vậy ạ.」"

# monologue
# JP: 慣れた手付きで、西瓜が画面をタップしていく。\nするやいなやで、画面内の少女が走ったり頭突きをしたり。
1703 = "Với đôi tay điêu luyện, Suika liên tục\nchạm vào màn hình.\nNgay lập tức, cô gái trên màn hình bắt đầu\nchạy và húc đầu."

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君が選んだトレーニングを、白目ちゃんがやって、その結果、少しずつ成長していくわけか！」
922 = "「Cô bé mắt trắng sẽ thực hiện các bài tập\nmà Suika chọn, và kết quả là cô bé sẽ dần\ntrưởng thành sao!」"

# 【西瓜】
# display as 西瓜
# JP: 「そのとおりです。パラメーターの上昇にともなって、\n勝利確率もまたアップしていくという仕組みです」
1163 = "「Đúng vậy ạ. Cơ chế của trò chơi là khi\ncác chỉ số tăng lên,\nthì xác suất chiến thắng cũng sẽ tăng\ntheo.」"

# monologue
# JP: 西瓜がさらにタップしていく。\n画面が動画に切り替わり――ああ、先程の相撲シーンだ。
1709 = "Suika tiếp tục chạm vào màn hình.\nMàn hình chuyển sang dạng video——A, là\ncảnh sumo lúc nãy."

# 【西瓜】
# display as 西瓜
# JP: 「これが勝負のシーンです。ここでは操作は一切できず、\nプレイヤーはただ大一番の結果を見守るだけになります」
1401 = "「Đây là cảnh thi đấu ạ. Ở bước này không\nthể thao tác gì được,\nngười chơi chỉ có thể theo dõi kết quả của\ntrận đấu quan trọng nhất thôi.」"

# monologue
# JP: 初見時にはただ美麗というだけの印象だったが、\n内容を理解できたため、受け取る意味ががらりと変わる。
1679 = "Lúc mới xem, tôi chỉ có ấn tượng là đồ họa\nđẹp,\nnhưng khi đã hiểu được nội dung, thì ý\nnghĩa tôi nhận được đã hoàn toàn thay đổi."

# 【稀咲】
# display as 稀咲
# JP: 「これは――すごいな。結構手に汗を握ってしまうね」
1395 = "「Cái này——Tuyệt thật. Khá là hồi hộp toát\nmồ hôi hột đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nこれはついつい西瓜の羊を応援してしま――っ！！？」
1274 = "「Đúng vậy.\nCái này khiến người ta bất giác muốn cổ vũ\ncho Dương Nương của Suika——!!?」"

# 【稀咲】
# display as 稀咲
# JP: 「白目ちゃん負けちゃう！　っ！！！\nすごい！　土俵際でうっちゃって勝った！！！！」
1301 = "「Cô bé mắt trắng sắp thua rồi! !!!\nTuyệt quá! Cô bé đã hất văng đối thủ ở rìa\nvõ đài và chiến thắng rồi!!!!」"

# monologue
# JP: 稀咲が子供のようにはしゃぐ。\n西瓜もふう、と、見るからに安堵の息を吐く。
1644 = "Kisaki reo hò ầm ĩ như một đứa trẻ.\nSuika cũng thở phào nhẹ nhõm, trông thấy\nrõ."

# 【西瓜】
# display as 西瓜
# JP: 「危ういところでしたが、先程とったばかりのスキル、\n『角うっちゃり』が発動したおかげで勝利しました」
1153 = "「Suýt chút nữa thì nguy, nhưng nhờ kỹ năng\nvừa mới lấy được lúc nãy,\n'Sừng Hất Văng' được kích hoạt nên đã\ngiành chiến thắng ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。さきほど勝利確率といっていたが、\nそのスキル――必殺技の発動などがランダムなのだな？」
990 = "「Ra là vậy. Lúc nãy em có nhắc đến xác\nsuất chiến thắng,\nvậy là việc kích hoạt các kỹ năng——chiêu\nthức tất sát đó là ngẫu nhiên sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「ですね。ですから鍛えていれば必ず勝てるとも\n限りませんし、取り組み前の指示――」
1133 = "「Đúng vậy ạ. Vì thế, không phải cứ rèn\nluyện là chắc chắn sẽ thắng,\nmà còn phụ thuộc vào các chỉ thị trước\ntrận đấu——」"

# monologue
# JP: 西瓜が画面を示してくれる。仲国語が読めずとも、\n意味するところはアイコンから、何となく伝わってくる。
1706 = "Suika đưa màn hình cho chúng tôi xem. Dù\nkhông đọc được tiếng Trọng Quốc,\nnhưng tôi vẫn có thể lờ mờ hiểu được ý\nnghĩa thông qua các biểu tượng."

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。戦術を選べるんだね？　押し相撲、四つ相撲\n――ふふっ、角のアイコンは角相撲かな？」
992 = "「Ra là vậy. Có thể chọn chiến thuật nhỉ?\nĐẩy sumo, vật sumo\n——Fufu, biểu tượng chiếc sừng là húc sừng\nsumo chăng?」"

# 【西瓜】
# display as 西瓜
# JP: 「まさしく仰る通りです。羊娘ごとに得意戦術があり、\n戦術同士の間には、じゃんけんのような相性があります」
1424 = "「Đúng như chị nói ạ. Mỗi Dương Nương đều\ncó chiến thuật sở trường riêng,\nvà giữa các chiến thuật cũng có tính tương\nkhắc giống như oẳn tù tì vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「自分の羊娘の得意がグーなのに相手がパーの専門家なら、\nあえて不得意なチョキで勝負をかける手もあるのか」
919 = "「Nếu sở trường của Dương Nương phe mình là\nbúa, nhưng đối thủ lại là chuyên gia ra\nbao,\nthì cũng có thể liều mình dùng kéo dù\nkhông phải sở trường sao.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。ですが稽古が十分なら、\nグーでパーにも勝てる可能性も、またあるのです」
1147 = "「Vâng. Nhưng nếu rèn luyện đủ tốt,\nthì vẫn có khả năng dùng búa thắng bao ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど。その選択が悩ましい分だけ、\n勝利出来たときに一層の快感を得られるわけだね？」
989 = "「Ra là vậy, ra là vậy. Sự lựa chọn càng\nkhiến người ta phải đau đầu,\nthì khi giành chiến thắng sẽ càng đạt được\nkhoái cảm tột độ nhỉ?」"

# 【西瓜】
# display as 西瓜
# JP: 「ですね。日ノ本語でいうと、\n『脳汁がどばーっと出る』状態になります」
1239 = "「Đúng vậy ạ. Nếu nói bằng tiếng Hinomoto,\nthì sẽ ở trạng thái 'Não tuôn trào chất\nkích thích' ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「またマニアックな日ノ本語を知っているねぇ」
1403 = "「Em lại biết thêm một từ tiếng Hinomoto\nmang tính chuyên môn nữa rồi đấy.」"

# monologue
# JP: くすくす笑い。\n不意に稀咲は真顔に戻って僕を見る。
1663 = "Bật cười khúc khích.\nĐột nhiên Kisaki trở lại vẻ mặt nghiêm túc\nvà nhìn tôi."

# 【稀咲】
# display as 稀咲
# JP: 「ポイントはつまり、\n『擬人化』『勝負』『ランダム性』ってことになる？」
1298 = "「Nói tóm lại, điểm mấu chốt là\n'Nhân hóa', 'Thi đấu' và 'Tính ngẫu nhiên'\nphải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「勝負自体がランダム性をもつものだ。ポイントを3つに\n絞るなら、『擬人化』『育成』『勝負』だろうな」
1258 = "「Bản thân thi đấu đã mang tính ngẫu nhiên\nrồi. Nếu phải thu hẹp lại thành 3 điểm,\nthì có lẽ là 'Nhân hóa', 'Nuôi dưỡng' và\n'Thi đấu'.」"

# 【稀咲】
# display as 稀咲
# JP: 「そっか、そうだね。\n育成っていうのが、多分一番のミソだね、これの」
1126 = "「Ra vậy, đúng nhỉ.\nNuôi dưỡng có lẽ chính là điểm cốt lõi\nnhất của trò chơi này.」"

# 【姜】
# display as 姜
# JP: 「育成シミュレーションゲーム」
918 = "「Game mô phỏng nuôi dưỡng.」"

# monologue
# JP: 僕らの会話をじっと聞いてた姜さんが、\nしばらくぶりに口を開く。
1481 = "Cô Khương, người nãy giờ vẫn im lặng lắng\nnghe cuộc trò chuyện của chúng tôi,\nsau một lúc lâu mới lên tiếng."

# 【姜】
# display as 姜
# JP: 「ゲームアプリと鉄道を絡めるのは確かに、\n鉄道に興味の無い層をひきつけるのに役立ちそうです」
1103 = "「Việc kết hợp ứng dụng trò chơi với đường\nsắt quả thực\ncó vẻ sẽ giúp ích trong việc thu hút những\nngười không có hứng thú với đường sắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。ただ、このアイディアを、\nそのまま実現化できるかどうかとなってくると……」
1253 = "「Đúng vậy. Chỉ là, việc liệu có thể biến ý\ntưởng này\nthành hiện thực một cách nguyên vẹn hay\nkhông thì……」"

# 【姜】
# display as 姜
# JP: 「ああ――難しいものと思われますか？」
1048 = "「A——Anh nghĩ là khó sao?」"

# monologue
# JP: 姜さんの声は、抑えてはいるが残念そうだ。\nが……うむ。考えてみても、やはり結論は変えられない。
1491 = "Giọng cô Khương tuy đã cố kìm nén nhưng\nvẫn lộ rõ vẻ tiếc nuối.\nNhưng…… ừm. Dù có suy nghĩ thế nào, kết\nluận vẫn không thể thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「姜さんのところはわかりませんが、御一夜鉄道では、\n残念ながらゲームアプリの開発を指揮できません」
1431 = "「Tôi không biết chỗ cô Khương thế nào,\nnhưng ở Đường sắt Ohitoyo,\nthật đáng tiếc là chúng tôi không thể chỉ\nđạo phát triển ứng dụng trò chơi được.」"

# 【稀咲】
# display as 稀咲
# JP: 「やっぱりそうかな。\n中核メンバーでゲーム好きっていうと……」
1262 = "「Quả nhiên là vậy nhỉ.\nNếu nói thành viên nòng cốt mà thích chơi\ngame thì……」"

# 【双鉄】
# display as 雙鐵
# JP: 「強いていうなら凪あたりだな。\nカードゲームを好むと聞いた。が――」
1435 = "「Miễn cưỡng mà nói thì chắc là Nagi.\nTôi nghe nói em ấy thích chơi game thẻ\nbài. Nhưng mà——」"

# 【稀咲】
# display as 稀咲
# JP: 「……今の凪くんに企画や全体統括は無理か。\n三年くらい修行させたらわからないけど」
633 = "「……Bây giờ để Nagi lên kế hoạch và quản lý\ntổng thể là không thể sao.\nNếu cho em ấy tu nghiệp khoảng ba năm thì\nkhông biết thế nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「三年は待てぬし、他にできそうな人材もない。\n完全におまかせとなる開発は、博打と何も変わらない」
1188 = "「Chúng ta không thể đợi ba năm được, và\ncũng không có nhân tài nào khác có khả\nnăng làm được.\nViệc phát triển mà giao phó hoàn toàn cho\nngười khác thì chẳng khác gì đánh bạc cả.」"

# 【稀咲】
# display as 稀咲
# JP: 「だねぇ」
943 = "「Đúng vậy nhỉ.」"

# monologue
# JP: 稀咲も同意してくれる。\nならばこの線は、やはり切り捨てる他ないだろう。
1638 = "Kisaki cũng đồng ý với tôi.\nNếu vậy thì hướng đi này, quả nhiên chỉ\ncòn cách từ bỏ thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ということですので、姜さん。\nアプリという線は、現状の僕らには取り得ません」
1206 = "「Vì thế nên, cô Khương à.\nHướng đi phát triển ứng dụng, hiện tại\nchúng tôi không thể thực hiện được.」"

# 【姜】
# display as 姜
# JP: 「そうなのですか」
1086 = "「Vậy sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「がっかりするのはまだ早いよ。双鉄が言っているのが、\n『同じ要素をアプリ以外で活かしたい』ってことだから」
1294 = "「Vẫn còn quá sớm để thất vọng đấy. Vì\nnhững gì anh Soutetsu nói,\ncó nghĩa là 'muốn tận dụng những yếu tố\ntương tự ngoài ứng dụng' mà.」"

# 【姜】
# display as 姜
# JP: 「！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の言葉が、信頼が。\n姜さんと西瓜が期待する目が、僕の思考を加速させる。
1488 = "Lời nói của Kisaki, sự tin tưởng.\nÁnh mắt đầy kỳ vọng của cô Khương và\nSuika, đã thúc đẩy suy nghĩ của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「擬人化という点なら鉄道には、\n最初から圧倒的な強みがある」
1046 = "「Nếu xét về điểm nhân hóa, thì đường sắt\nngay từ đầu đã có một lợi thế áp đảo.」"

# 【姜】
# display as 姜
# JP: 「ああ！　――確かにレイルロオドは……例えば西瓜なら、\n擬人化ではありませんが、東富4型の象徴となりますね」
1127 = "「A! ——Đúng là Railord…… ví dụ như Suika,\ntuy không phải là nhân hóa, nhưng lại là\nbiểu tượng của Dongfu loại 4 nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜鉄道でいうなら8620形の象徴はハチロク、\nキハ07形の象徴はれいなというふうに売り出せるよな」
1135 = "「Ừm. Nếu ở Đường sắt Ohitoyo, chúng ta có\nthể quảng bá Hachiroku là biểu tượng của\nloại 8620,\nvà Reina là biểu tượng của loại KiHa 07.」"

# 【稀咲】
# display as 稀咲
# JP: 「売り出す――さて、売り出し方だけど」
1226 = "「Quảng bá——Thế, cách quảng bá thì sao?」"

# monologue
# JP: 稀咲の視線が西瓜へと向く。
1667 = "Ánh mắt Kisaki hướng về phía Suika."

# 【稀咲】
# display as 稀咲
# JP: 「このアプリの場合は、育てて勝負させる。\nその勝ったり負けたりの面白さが人気になってるよね？」
1409 = "「Trong trường hợp của ứng dụng này, là\nnuôi dưỡng rồi cho thi đấu.\nSự thú vị của việc thắng thua đó chính là\nđiều khiến nó được yêu thích nhỉ?」"

# 【西瓜】
# display as 西瓜
# JP: 「そうですね。育成が簡単な羊娘は初心者に、\n育成が困難な羊娘は上級者に人気がある傾向かと」
1234 = "「Đúng vậy ạ. Những Dương Nương dễ nuôi\ndưỡng thì được người mới chơi ưa chuộng,\ncòn những Dương Nương khó nuôi dưỡng thì\nlại có xu hướng được người chơi kinh\nnghiệm yêu thích hơn.」"

# 【稀咲】
# display as 稀咲
# JP: 「人気の要素は育成難易度だけ？　ああ、もちろん\nキャラクターの容姿などの要素もあるだろうけど」
932 = "「Yếu tố được yêu thích chỉ có độ khó nuôi\ndưỡng thôi sao? A, tất nhiên\nchắc chắn cũng có những yếu tố khác như\nngoại hình của nhân vật nữa nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「その他でしたら、出身地も大きく人気を左右します。\n北琴では、北琴出身の羊娘――この子が一番人気です」
1417 = "「Ngoài ra thì, quê quán cũng ảnh hưởng lớn\nđến mức độ yêu thích ạ.\nỞ Bắc Cầm, Dương Nương xuất thân từ Bắc\nCầm——cô bé này là được yêu thích nhất ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1068 = "「Hô.」"

# monologue
# JP: 理知的そうな、メガネをかけている痩身の羊娘だ。\nなるほど。言われてみればいかにも都会的で垢抜けている。
1711 = "Một Dương Nương dáng người mảnh khảnh, đeo\nkính, trông rất trí thức.\nRa là vậy. Nghe em ấy nói mới thấy, đúng\nlà mang đậm nét sành điệu của thành thị."

# 【稀咲】
# display as 稀咲
# JP: 「ふふ。わかってきた。だったらこっちの羊娘はどこか\n……山岳地方の出身？　で、こっちの水着の子は海」
1023 = "「Fufu. Tôi hiểu rồi. Vậy thì Dương Nương\nbên này là xuất thân từ\n……vùng núi nào đó sao? Còn cô bé mặc đồ\nbơi bên này là từ biển.」"

# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のご指摘の通りです。ザックを背負った羊娘は\n景林、水着の羊娘は金岩灘の出身です」
1425 = "「Đúng như chị Kisaki chỉ ra ạ. Dương Nương\nđeo ba lô\nlà xuất thân từ Cảnh Lâm, còn Dương Nương\nmặc đồ bơi là từ bãi biển Kim Nham.」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、それぞれ地元人気がある？」
1342 = "「Và mỗi người đều được yêu thích ở quê\nhương của mình sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。ご当地ではキャラクターグッズなども売られます。\nネットを通じて、それらを個人売買することも盛んです」
1236 = "「Vâng. Ở địa phương của họ cũng có bán các\nsản phẩm ăn theo nhân vật.\nViệc mua bán cá nhân những món đồ đó qua\nmạng cũng rất sôi nổi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、そうか。100人が100人、\n自分の地方の羊娘を好きになるとは限らない――」
629 = "「……A, ra vậy. Đâu phải 100 người thì cả\n100 người\nđều thích Dương Nương ở địa phương mình\nđâu——」"

# monologue
# JP: 瞬間、繋がる。\nぱっと、一気に視界が開ける。
1580 = "Khoảnh khắc đó, mọi thứ đã kết nối lại với\nnhau.\nĐột nhiên, tầm nhìn của tôi mở rộng ra."

# 【双鉄】
# display as 雙鐵
# JP: 「地方ももちろん、鉄道が強みを持つ要素だ。\nゆえに、売り出すための基本線は」
1070 = "「Địa phương tất nhiên cũng là một yếu tố\nmà đường sắt có thế mạnh.\nVì thế, đường lối cơ bản để quảng bá là」"

# 【稀咲】
# display as 稀咲
# JP: 「各路線のレイルロオドが、それぞれの地元で、\nキャラクターグッズを売り出す感じ？」
1082 = "「Railord của mỗi tuyến đường sắt sẽ bán\ncác sản phẩm ăn theo nhân vật\nở chính địa phương của mình sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「その線はよさそうかと感じる。しかしそれのみでは、\n育成、応援、勝負という、恐らくコアとなる要素を欠く」
1197 = "「Tôi cảm thấy hướng đi đó khá ổn. Nhưng\nnếu chỉ có vậy,\nthì có lẽ sẽ thiếu đi những yếu tố cốt lõi\nlà nuôi dưỡng, cổ vũ và thi đấu.」"

# 【姜】
# display as 姜
# JP: 「ああ！　でしたらその要素をどう組み込みましょう」
1128 = "「A! Vậy thì chúng ta sẽ lồng ghép những\nyếu tố đó vào như thế nào đây.」"

# monologue
# JP: 司会然としていた姜さんが、身を乗り出して尋ねてくる。\n場が帯び始めてきた熱に、さらに思考を煽られる。
1485 = "Cô Khương, người nãy giờ vẫn đóng vai trò\nnhư người dẫn chương trình, rướn người tới\nhỏi.\nBầu không khí bắt đầu nóng lên, càng thôi\nthúc suy nghĩ của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな。例えばグッズ開発の過程そのものを、\n地元の方たちが応援できるようにするのはどうだろう」
634 = "「……Để xem nào. Ví dụ như, chúng ta có thể\nlàm cho quá trình phát triển sản phẩm\ntrở thành thứ mà người dân địa phương có\nthể cổ vũ thì sao?」"

# 【姜】
# display as 姜
# JP: 「と、おっしゃいますと？」
962 = "「Ý anh là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「インターネット等で定期的な配信を行うなどをし、\n同時に、視聴者からの情報を募って行動する的な」
1264 = "「Chúng ta có thể tổ chức các buổi phát\nsóng định kỳ trên mạng internet,\nđồng thời thu thập thông tin từ người xem\nđể hành động chẳng hạn.」"

# 【稀咲】
# display as 稀咲
# JP: 「つまり、グッズ開発の過程を可視化し、\nインタラクティブなものにするというわけだね」
921 = "「Tức là, trực quan hóa quá trình phát\ntriển sản phẩm,\nvà biến nó thành một quá trình mang tính\ntương tác nhỉ.」"

# monologue
# JP: 荒削りだった思考に稀咲が、\nびたりとはまる言葉をくれる。
1646 = "Kisaki đã đưa ra một từ ngữ vô cùng chuẩn\nxác\ncho những suy nghĩ còn thô sơ của tôi."

# 【姜】
# display as 姜
# JP: 「インタラクティブ――双方向性ですか。\nなるほど、それは面白いかもしれません」
1357 = "「Tương tác——tính hai chiều sao.\nRa là vậy, nghe có vẻ thú vị đấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「インタラクティブであるためには、視聴者の参加が必須。\nそれを募る軸となる要素を、『勝負』に定める」
1397 = "「Để có tính tương tác, thì sự tham gia của\nngười xem là điều bắt buộc.\nChúng ta sẽ lấy yếu tố cốt lõi để thu hút\nsự tham gia đó là 'Thi đấu'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。例えばハチロクで考えてみよう。勝負の相手は\n――どうせなら豪勢に高嵜鉄道のランとする」
1272 = "「Đúng vậy. Ví dụ như thử lấy Hachiroku ra\nxem. Đối thủ cạnh tranh\n――đã làm thì làm\ncho lớn, chọn luôn Ran của Đường sắt\nTakasaki đi.」"

# 【西瓜】
# display as 西瓜
# JP: 「ランは、日ノ本を代表する人気レイルロオドです。\n眉目秀麗。プリンスオブレイルロオドの異名を持ちます」
1358 = "「Ran là một Railord nổi tiếng đại diện cho\nHinomoto.\nDung mạo tú lệ. Còn có biệt danh\nlà Hoàng tử Railord ạ.」"

# monologue
# JP: 姜さんへは、西瓜が適宜で解説してくれる。\nそれゆえ僕は、ただ思考だけに集中できる。
1714 = "Xigua giải thích một cách thích hợp cho cô\nJiang.\nNhờ vậy, tôi chỉ cần tập trung vào\nviệc suy nghĩ."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道。地域としては御一夜・クマの代表として、\nハチロクがランに、グッズの売上勝負を挑む」
1186 = "「Đường sắt Ohimitera. Với tư cách là đại\ndiện của khu vực Ohimitera và Kuma,\nHachiroku sẽ thách đấu doanh số bán sản\nphẩm với Ran.」"

# 【稀咲】
# display as 稀咲
# JP: 「それ、単なるキャラクターグッズじゃなくてさ、\n地元の特産品をベースとするのを規定にしない？」
914 = "「Cái đó, không chỉ đơn thuần là các sản\nphẩm nhân vật,\nmà chúng ta quy định là\nphải dựa trên đặc sản của địa phương thì\nsao?」"

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　そうするのなら、インタラクティブの第一歩に、\n『地元の特産品情報を募る』を持ってこれますね」
1061 = "「A! Nếu làm vậy thì bước đầu tiên của sự\ntương tác,\nchúng ta có thể bắt đầu bằng\nviệc 『thu thập thông tin về đặc sản địa\nphương』 nhỉ.」"

# 【姜】
# display as 姜
# JP: 「自分が提案した特産品を、地元代表のレイルロオドが\nグッズ化してくれる――応援しがいを感じそうです」
1376 = "「Đặc sản mà mình đề xuất, được Railord đại\ndiện cho địa phương\nbiến thành sản phẩm\nthương mại——nghe là thấy có động lực cổ vũ\nrồi.」"

# monologue
# JP: アイディアがぽんぽん飛び出し噛み合っていく。\nこういうときは精査は後だ。流れを止めない方がいい。
1510 = "Các ý tưởng liên tục tuôn ra và ăn khớp\nvới nhau.\nNhững lúc thế này thì việc xem\nxét kỹ lưỡng cứ để sau. Tốt nhất là không\nnên làm đứt mạch."

# 【双鉄】
# display as 雙鐵
# JP: 「情報をもとにハチロクが例えばハチロク包丁を作ろうと\n試行錯誤する――そこが、要素としては『育成』だ」
965 = "「Dựa trên thông tin thu thập được,\nHachiroku sẽ thử nghiệm và sửa sai để làm\nra\nví dụ như dao Hachiroku chẳng hạn——đó\nchính là yếu tố 『nuôi dưỡng』.」"

# 【稀咲】
# display as 稀咲
# JP: 「勝負の期日を定めれば、さらに切迫感がでるよね。\n上手くいく、失敗する。どちらにいっても盛り上がる」
966 = "「Nếu định ra thời hạn phân định thắng\nthua, thì sẽ càng tạo thêm cảm giác cấp\nbách nhỉ.\nThành công, hay thất bại. Dù kết\nquả thế nào thì cũng sẽ rất náo nhiệt.」"

# 【姜】
# display as 姜
# JP: 「情報を募る、その情報を試すなどの過程については、\nBaliBaliなどでライブ配信するのも良さそうです」
1356 = "「Về quá trình thu thập thông tin và thử\nnghiệm thông tin đó,\nphát sóng trực tiếp\ntrên BaliBali hay gì đó có vẻ cũng tốt.」"

# 【西瓜】
# display as 西瓜
# JP: 「BaliBaliは動画サイト――\n日ノ本でいうポコポコ動画のようなものです」
1444 = "「BaliBali là một trang web video——\nGiống\nnhư Pocopoco Douga ở Hinomoto ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「定期配信だけでなくライブ配信も確かにアリだね。\nコメントでなら、より気軽に情報提供等ができるし」
1312 = "「Không chỉ phát sóng định kỳ mà phát sóng\ntrực tiếp cũng là một ý hay đấy.\nThông qua\nphần bình luận, mọi người có thể cung cấp\nthông tin một cách thoải mái hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。リアルタイムでのレスポンスがあれば、\n応援を超え、『一緒に戦っている』感もでるかもしれん」
1051 = "「Hừm. Nếu có phản hồi trong thời gian\nthực,\nthì không chỉ là cổ vũ, mà còn có\nthể tạo ra cảm giác 『đang cùng nhau chiến\nđấu』 nữa.」"

# 【姜】
# display as 姜
# JP: 「まさに『育成』の醍醐味を、\nダイレクトに感じられそうです」
1400 = "「Quả thực có thể cảm nhận trực tiếp\nnhững\nđiểm hấp dẫn nhất của việc 『nuôi dưỡng』.」"

# 【稀咲】
# display as 稀咲
# JP: 「現状案は、『擬人化』『育成』『勝負』のすべてを揃え、\nかつ――うん。ボクたちでコントロール可能になってる」
1314 = "「Phương án hiện tại đã hội tụ đủ cả 『nhân\nhóa』, 『nuôi dưỡng』 và 『phân định thắng\nthua』,\nhơn nữa——ừm. Nằm trong tầm kiểm\nsoát của chúng ta.」"

# monologue
# JP: 勢いまかせのアイディアたちを、稀咲が整頓し始める。
1672 = "Kisaki bắt đầu sắp xếp lại những ý tưởng\nvừa tuôn ra theo mạch cảm xúc."

# 【稀咲】
# display as 稀咲
# JP: 「レイルロオドがご当地代表となり、他の地方の\nレイルロオドと名産品での売上勝負を繰り広げる」
1377 = "「Railord sẽ trở thành đại diện của địa\nphương, và triển khai cuộc chiến\ndoanh số\nbán đặc sản với Railord của các địa phương\nkhác.」"

# monologue
# JP: 整理されればすぐさまに、\n気になるところが浮き上がってくる。
1479 = "Ngay khi được sắp xếp lại,\nnhững điểm đáng\nlo ngại cũng lập tức nổi lên."

# 【双鉄】
# display as 雙鐵
# JP: 「実現のためには、他の鉄道事業者の企画参加が必須だが\n――勝負となると、負けのリスクもでるゆえに……」
1292 = "「Để thực hiện được, việc các doanh nghiệp\nđường sắt khác tham gia vào dự án là điều\nbắt buộc\n――nhưng đã là phân định thắng\nthua thì sẽ có rủi ro thất bại nên……」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、鉄道の性質上どうしても、なのかな。\n保守的なところがとても多いような印象もあるよね」
1053 = "「A, có lẽ do tính chất của ngành đường sắt\nnên không thể tránh khỏi nhỉ.\nTôi cũng có\nấn tượng rằng có rất nhiều nơi mang tư\ntưởng bảo thủ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……御一夜鉄道と縁が一番深いとなると、\n現状では肥薩みかん鉄道となるが――どうだろう」
1267 = "「Ừm……Nếu nói về nơi có mối liên hệ sâu sắc\nnhất với Đường sắt Ohimitera,\nthì hiện tại\nlà Đường sắt Hisatsu Mikan——nhưng không\nbiết thế nào.」"

# monologue
# JP: あそこには、れいなをライバル視しているレイルロオド、\n紅もいる。条件的には非常に申し分ないのだが……
1587 = "Ở đó có Kurenai, một Railord luôn coi\nReina là đối thủ.\nVề mặt điều kiện thì vô\ncùng hoàn hảo, nhưng mà……"

# 【双鉄】
# display as 雙鐵
# JP: 「勝ち負けがつくとなると……関係も距離も近すぎるゆえ。\nお祭り、催事との印象をかなり強めねば、断られるやも」
900 = "「Đã phân định thắng thua thì……vì mối quan\nhệ và khoảng cách quá gần gũi.\nNếu không\nnhấn mạnh ấn tượng đây là một lễ hội, một\nsự kiện, thì có thể sẽ bị từ chối.」"

# 【稀咲】
# display as 稀咲
# JP: 「おやおや」
999 = "「Chà chà.」"

# monologue
# JP: くすっと、稀咲の小さな笑い。
1662 = "Kisaki khẽ bật cười khúc khích."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄は対象が身近になればなるほど、近視眼的に――\n情緒という不安定なものだけを見がちになるよね」
938 = "「Đối tượng càng gần gũi, anh Soutetsu lại\ncàng trở nên thiển cận——\nanh có xu hướng\nchỉ nhìn vào những thứ không ổn định như\ncảm xúc nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1056 = "「Hửm?」"

# 【稀咲】
# display as 稀咲
# JP: 「経営判断に最も大きな影響を与える要素。\nそれは情ではなくて、利だよ？　双鉄」
1433 = "「Yếu tố ảnh hưởng lớn nhất đến các quyết\nđịnh kinh doanh.\nĐó không phải là tình, mà\nlà lợi đấy? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の指摘が、僕の視界を大きく広げる。\nというかぐるりと急展開する。
1657 = "Sự chỉ ra của Kisaki đã mở rộng tầm nhìn\ncủa tôi.\nHay nói đúng hơn là một sự chuyển\nbiến đột ngột."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、利益を呼び込める企画であること、\nそこをプレゼンすればよいのか」
1129 = "「Ra vậy, chỉ cần thuyết trình rằng\nđây là\nmột dự án có thể mang lại lợi nhuận là\nđược sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。実際にこの企画は、鉄道人気の向上をはかると\n同時に、直接的に地元特産品の売上向上に繋げ得るよね」
1271 = "「Đúng vậy. Thực tế thì dự án này, bên cạnh\nviệc nâng cao mức độ phổ biến của đường\nsắt,\ncũng có thể trực tiếp dẫn đến việc\ntăng doanh số bán đặc sản địa phương mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。売上合戦をするのだものな。利益の何％という\nロイヤリティフィーも、企画があたれば跳ね上がろうし」
1137 = "「Ừm. Vì là cuộc chiến doanh số mà. Tiền\nbản quyền chiếm bao nhiêu %\nlợi nhuận, nếu\ndự án thành công thì cũng sẽ tăng vọt\nthôi.」"

# 【稀咲】
# display as 稀咲
# JP: 「『ご当地限定商品』を用意して、それはあえて\nネットから除外すれば、定期外客数の増加も見込める」
1192 = "「Nếu chuẩn bị 『Sản phẩm giới hạn địa\nphương』 và cố tình\nkhông bán trên mạng,\nthì cũng có thể kỳ vọng vào việc tăng\nlượng khách vãng lai.」"

# 【姜】
# display as 姜
# JP: 「――ああ」
615 = "「――A.」"

# monologue
# JP: 感心だろうか、安堵だろうか。\n姜さんの息から熱を感じる。
1537 = "Là sự thán phục, hay là sự an tâm.\nTôi cảm\nnhận được sức nóng từ hơi thở của cô\nJiang."

# 【姜】
# display as 姜
# JP: 「仲国でも同時にこの企画を走らせることが叶うなら、\n[ヒノチュウ,2]日ノ仲戦も行えるようになりますね」
1101 = "「Nếu có thể đồng thời triển khai dự án này\nở Trung Quốc,\nthì chúng ta cũng có thể tổ\nchức trận đấu Nhật-Trung nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！　そうか、この案はそこまで展開できるのか」
1031 = "「! Ra vậy, phương án này có thể mở rộng\nđến mức đó sao.」"

# monologue
# JP: 視野が、希望が更に膨らむ。
1563 = "Tầm nhìn, và hy vọng ngày càng phình to."

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線に、その危機に苦しむ国は数多ある。\nそうした国の、いくらかでも企画参加してくれるなら」
1252 = "「Có rất nhiều quốc gia đang phải gánh chịu\ncuộc Đại bãi bỏ và cuộc khủng hoảng đó.\nNếu có một vài quốc gia như vậy tham gia\nvào dự án này thì」"

# 【稀咲】
# display as 稀咲
# JP: 「レイルロオド・ワールドトロフィー」
915 = "「Cúp Thế giới Railord.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の言葉が、アイディアたちに枠を与える。\n全ての要素が結像していく。
1655 = "Lời nói của Kisaki đã tạo nên một khuôn\nkhổ cho các ý tưởng.\nTất cả các yếu tố dần\nkết tinh lại."

# 【双鉄】
# display as 雙鐵
# JP: 「それだ――各国・各地方・各路線の誇りをかけ開発した\n地元特産の鉄道/キャラクターグッズを一つに集わせる」
1396 = "「Chính là nó——Tập hợp tất cả các sản phẩm\nđường sắt/nhân vật đặc sản địa phương\nđược\nphát triển bằng niềm tự hào của mỗi quốc\ngia, mỗi địa phương, mỗi tuyến đường sắt\nlại với nhau.」"

# 【姜】
# display as 姜
# JP: 「ネットとご当地での販売だけでなく、アンテナショップ\nも欲しくなりますね。参加国それぞれの、例えば首都に」
1399 = "「Không chỉ bán trên mạng và tại địa\nphương, mà còn muốn có cả các cửa hàng\ntrưng bày sản phẩm\nnữa nhỉ. Ví dụ như ở\nthủ đô của mỗi quốc gia tham gia chẳng\nhạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでの規模とできれば実店舗もさぞ盛り上がろう。\nネット・実店舗共通の販売期間を定め、売上を競い」
1105 = "「Nếu đạt được quy mô như vậy thì các cửa\nhàng thực tế chắc chắn cũng sẽ rất náo\nnhiệt.\nĐịnh ra một thời gian bán hàng\nchung cho cả trên mạng và cửa hàng thực\ntế, cạnh tranh doanh số」"

# 【西瓜】
# display as 西瓜
# JP: 「その売上で第一位に輝いたものが、\n『レイルロオド・ワールドトロフィー』を獲得できる！」
1212 = "「Và người giành vị trí số một về doanh số\nbán hàng đó,\nsẽ nhận được 『Cúp Thế giới\nRailord』!」"

# monologue
# JP: 西瓜の瞳もキラキラと、実に楽しげに輝いている。
1702 = "Đôi mắt của Xigua cũng lấp lánh, sáng lên\nmột cách vô cùng vui vẻ."

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は是非参加して、\n栄光のトロフィーを勝ち取りたいです！！！」
1364 = "「Xigua nhất định sẽ tham gia,\nvà giành lấy\nchiếc cúp vinh quang đó!!!」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ……」
1040 = "「A……」"

# monologue
# JP: 座席にぐったりもたれる稀咲は、\n見るからに疲れてはいるが、幸せそうだ。
1653 = "Kisaki tựa lưng vào ghế một cách uể oải,\ntrông có vẻ mệt mỏi nhưng lại toát lên vẻ\nhạnh phúc."

# 【稀咲】
# display as 稀咲
# JP: 「みっちりだったね。一分の隙もなく、\n視察と会議をやり続けてた感さえあるよ」
1185 = "「Kín mít luôn nhỉ. Cảm giác như chúng ta\nđã liên tục\nđi khảo sát và họp hành mà\nkhông có lấy một phút ngơi nghỉ nào vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「奇遇だな。僕もまったくおんなじように感じてる。\nなにせ飛行機の遅延すら、むしろ歓迎されたからなぁ」
941 = "「Trùng hợp thật. Anh cũng có cảm giác y\nhệt như vậy.\nDù sao thì ngay cả việc máy\nbay bị hoãn, cũng được chúng ta chào đón\nmà.」"

# monologue
# JP: エアクラ時代になったとて、国際線はジャンボジェットだ。\n機材繰りうんぬんのトラブルも、昔と少しも変わらない。
1499 = "Dù đã bước sang thời đại Aircra, nhưng các\nchuyến bay quốc tế vẫn dùng máy bay phản\nlực khổng lồ.\nNhững rắc rối về việc điều\nđộng máy bay này nọ cũng chẳng khác gì\nngày xưa."

# 【双鉄】
# display as 雙鐵
# JP: 「副丘からナビで無理やり帰ってもいいが――\n稀咲がよければ、今日はさすがに宿泊したい」
1432 = "「Dù có thể gọi Navi đến để cố về từ\nFukuoka——\nNhưng nếu Kisaki không phiền,\nthì hôm nay anh thực sự muốn nghỉ lại.」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクもおんなじ気持ちだよ。いくらその為の招聘だって、\nさすがにちょっと、働き通しすぎたかとは思うもの」
1194 = "「Tôi cũng nghĩ vậy. Dù là được mời đến vì\nmục đích đó,\nnhưng quả thực là chúng ta đã\nlàm việc quá sức rồi.」"

# monologue
# JP: 深い溜息。\n疲労にどこか、満足感も混じったような。
1670 = "Một tiếng thở dài sâu.\nTrong sự mệt mỏi\ndường như có lẫn chút cảm giác thỏa mãn."

# 【稀咲】
# display as 稀咲
# JP: 「……今回の道中、ふたりきりの時間だなんて、\nずっと爆睡してただけになっちゃったしね」
637 = "「……Chuyến đi lần này, thời gian chỉ có hai\nchúng ta,\nrốt cuộc toàn là ngủ say sưa\nthôi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。見るもの全てが議論・検討の材料となった――\nというか、そうなるように姜さんが設定してくれたのか」
1275 = "「Ừm. Mọi thứ chúng ta thấy đều trở thành\ntài liệu để thảo luận và xem xét——\nHay nói\nđúng hơn là cô Jiang đã sắp xếp để nó trở\nthành như vậy sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だよ？　彼女は非常に有能だから」
1346 = "「Đúng vậy chứ sao? Vì cô ấy vô cùng tài\nnăng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「パッと見では有能そうには見えぬ――\nように、多分、わざとしているのだろうな」
1047 = "「Thoạt nhìn thì không có vẻ gì là người\ntài năng cả——\nCó lẽ là cô ấy cố tình tỏ ra\nnhư vậy nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「だろうね、秘書という立場もあるし。\n女性が有能そうに見えれば、それだけで障害も増えるし」
1196 = "「Chắc là vậy rồi, dù sao thì cô ấy cũng\nmang chức danh thư ký mà.\nPhụ nữ mà tỏ ra\ntài giỏi thì chỉ chuốc thêm rắc rối thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、以前にもそのような話をきいたっけな」
1054 = "「À, trước đây anh cũng từng nghe những\nchuyện như vậy rồi.」"

# monologue
# JP: ゆえに、浦上さんは男装し、姜さんは平凡を装って――
1578 = "Vì thế, cô Urakami mới cải trang thành\nnam, còn cô Jiang thì giả vờ bình phàm——"

# 【双鉄】
# display as 雙鐵
# JP: 「……堂々たるものだな、稀咲は。有能さを隠さず、\nむしろ誇りとして、美しく鮮やかに振る舞っている」
639 = "「……Kisaki đường hoàng thật đấy. Không hề\nche giấu tài năng của mình,\nngược lại còn\ncoi đó là niềm tự hào, và cư xử một cách\nvô cùng xinh đẹp và rạng rỡ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、そう思ってもらえるなら嬉しいな」
1026 = "「Fufu, nếu anh nghĩ vậy thì tôi rất vui.」"

# monologue
# JP: どこか安心しきったような、\n少女のようにあどけない笑み。
1520 = "Một nụ cười ngây thơ như một thiếu nữ,\nmang theo chút gì đó hoàn toàn an tâm."

# 【稀咲】
# display as 稀咲
# JP: 「けど……どう？　実際に有能であれたのかなぁ。今回。\n一晩たつと、なかなかに問題点は多い気もする」
1007 = "「Nhưng mà……sao nhỉ? Thực sự thì lần này\ntôi có tài giỏi không ta.\nQua một đêm, tôi\ncảm thấy cũng có khá nhiều vấn đề đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「問題点か」
1044 = "「Vấn đề sao.」"

# monologue
# JP: 確かに数多思いつく。が、逆から見れば、\n最大の一点さえ超えてしまえればという思いもある。
1601 = "Đúng là có thể nghĩ ra vô số vấn đề. Nhưng\nnhìn từ góc độ ngược lại,\ntôi cũng nghĩ\nrằng chỉ cần vượt qua được điểm lớn nhất\nlà ổn."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく小規模でも第一回の実施を、だよな。\nそれが叶うか。ある程度の話題になるかが、極めて重い」
1036 = "「Dù sao thì cũng phải thực hiện lần đầu\ntiên dù ở quy mô nhỏ nhỉ.\nCó làm được điều\nđó hay không. Có tạo được tiếng vang ở một\nmức độ nào đó hay không, là cực kỳ quan\ntrọng.」"

# 【稀咲】
# display as 稀咲
# JP: 「だよねぇ。もしやれたとして、\n継続的にどれだけの回数を実施できるかも不安だし」
1139 = "「Đúng vậy. Giả sử có làm được đi chăng\nnữa,\nthì cũng lo không biết có thể tổ chức\nliên tục được bao nhiêu lần.」"

# 【双鉄】
# display as 雙鐵
# JP: 「というと？」
963 = "「Ý em là sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「単純な話。特産品の数。そっち方面は詳しくないけど、例えば御一夜でキャラクターグッズ化できる特産品って」
1412 = "「Chuyện đơn giản thôi. Số lượng đặc sản.\nTôi không rành về mảng đó lắm, nhưng ví dụ\nở Ohimitera, những đặc sản có thể làm\nthành sản phẩm nhân vật là gì?」"

# 【双鉄】
# display as 雙鐵
# JP: 「クマ焼酎、包丁。川下り関連の……例えば救命胴衣や笠。\nクマ茶にクマ米。[にしき,1]二色の梨……は、足が早すぎるかな」
1256 = "「Rượu shochu Kuma, dao. Những thứ liên\nquan đến xuôi dòng sông……ví dụ như áo phao\nhay nón lá.\nTrà Kuma, gạo Kuma. Lê\nNishiki……thì chắc là hỏng quá nhanh nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「通年販売できるものじゃないとまずくない？\n開催期間によっての有利不利ができてしまうもの」
1160 = "「Nếu không phải là thứ có thể bán quanh\nnăm thì không ổn đâu nhỉ?\nBởi vì nó sẽ tạo\nra sự bất lợi hay có lợi tùy thuộc vào\nthời gian tổ chức mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば――\nああ、梨ジュースなどに加工するという手でいけばいい」
927 = "「Ra vậy, nếu thế thì――\nÀ, cứ dùng cách chế\nbiến thành nước ép lê hay gì đó là được.」"

# 【稀咲】
# display as 稀咲
# JP: 「そっか。加工品も考えたら、10や20、御一夜・クマ\nでも特産品は用意できるかも――うん、なら継続性も」
1130 = "「Vậy sao. Nếu tính cả các sản phẩm chế\nbiến, thì Ohimitera và Kuma\nchắc cũng\nchuẩn bị được 10 hay 20 loại đặc sản\nđấy――Ừm, thế thì tính liên tục cũng」"

# monologue
# JP: そこまで言って唐突に、稀咲は口を閉ざしてしまう。
1666 = "Nói đến đó, Kisaki đột nhiên im bặt."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、どうした？」
1328 = "「Kisaki, sao vậy?」"

# 【稀咲】
# display as 稀咲
# JP: 「いや」
903 = "「Không có gì.」"

# monologue
# JP: また笑顔。\nけれど今度は、絵に描いたような苦笑だ。
1518 = "Lại mỉm cười.\nNhưng lần này, là một nụ\ncười gượng gạo như được vẽ ra."

# 【稀咲】
# display as 稀咲
# JP: 「言った端からこれだ、と思っちゃってつい、ね。\nよっぽどボクは――ううん、ボクらは仕事好きなんだね」
896 = "「Vừa mới nói xong lại thế này rồi, tự dưng\ntôi nghĩ vậy thôi.\nĐúng là tôi――à không,\nchúng ta cuồng công việc quá nhỉ.」"

# monologue
# JP: 稀咲の苦笑が伝染する。\nまったく否定できないゆえに。
1556 = "Nụ cười gượng của Kisaki lây sang tôi.\nBởi\nvì tôi hoàn toàn không thể phủ nhận điều\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ワーカホリックのきらいはあるよな。\n夫婦揃ってとなったときなど、完全に歯止めが効かん」
1187 = "「Đúng là có xu hướng cuồng công việc thật.\nNhất là khi cả hai vợ chồng đều như vậy,\nthì hoàn toàn không có cách nào hãm lại\nđược.」"

# 【稀咲】
# display as 稀咲
# JP: 「はは、似たもの夫婦ってヤツね、ボクたち」
1021 = "「Haha, kiểu vợ chồng giống nhau ấy nhỉ,\nchúng chúng ta ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。その点は瓜二つだ。が――」
1310 = "「Đúng vậy. Điểm đó thì giống nhau như đúc.\nNhưng mà――」"

# 【稀咲】
# display as 稀咲
# JP: 「どうかした？」
1250 = "「Sao vậy?」"

# monologue
# JP: 疲れのせいか、稀咲の顔はいつもより少し青白い。\n美しく可憐であるが、健康な笑顔の方がずっといい。
1506 = "Có lẽ do mệt mỏi, khuôn mặt Kisaki trông\nhơi nhợt nhạt hơn bình thường.\nDù vẫn xinh\nđẹp và đáng yêu, nhưng nụ cười khỏe mạnh\nvẫn tốt hơn nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「あらためて言葉にすると、かなり危ういと感じてな。\nなにかこう、具体的対策を考えた方がいいかもしれん」
898 = "「Nói ra thành lời mới thấy, cảm giác khá\nlà nguy hiểm đấy.\nCó lẽ chúng ta nên nghĩ\nra một biện pháp cụ thể nào đó.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　例えば」
1230 = "「Hừm? Ví dụ như?」"

# 【双鉄】
# display as 雙鐵
# JP: 「例えばそう――月に一度……はとても無理でも、\n二ヶ月に一度程度は強制的に全面休暇を取る」
1265 = "「Ví dụ như――Mỗi tháng một lần……thì có vẻ\nkhông khả thi lắm,\nnhưng khoảng hai tháng\nmột lần thì sẽ bắt buộc nghỉ phép toàn\ndiện.」"

# 【稀咲】
# display as 稀咲
# JP: 「全面休暇？」
1156 = "「Nghỉ phép toàn diện?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。どうあがいても仕事ができぬ状態にする休暇だ。\nデスクを離れて、どこか遠くへ旅に出るなど――」
1134 = "「Ừm. Là kỳ nghỉ mà dù có muốn cũng không\nthể làm việc được.\nRời khỏi bàn làm việc,\nđi du lịch đâu đó thật xa chẳng hạn――」"

# monologue
# JP: 言って思わず稀咲を見れば、稀咲も僕をまじまじと見る。\nゆえに、吹き出す。ふたり同時に。
1575 = "Vừa nói tôi vừa bất giác nhìn Kisaki,\nKisaki cũng đang nhìn chằm chằm vào tôi.\nThế là, bật cười. Cả hai cùng một lúc."

# 【稀咲】
# display as 稀咲
# JP: 「旅に出たところで同じだよ！　ボクらそろって二人とも、\n隙あらば仕事の話をしちゃうんだから」
969 = "「Có đi du lịch thì cũng thế thôi! Cả hai\nchúng ta,\ncứ hở ra là lại nói chuyện công\nviệc mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。仕事の話をせぬようにするには……\nああ、会話ができない状況に陥ればいいのか」
1228 = "「Đúng nhỉ. Để không nói chuyện công việc\nnữa thì……\nÀ, chỉ cần rơi vào tình huống\nkhông thể nói chuyện là được sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、映画館とか？」
1025 = "「Fufu, đi xem phim chẳng hạn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは観劇とか――団体旅行なども有効かもな。\n誰の耳があるかわからん場所では、出来る話も限られる」
1201 = "「Hoặc là đi xem kịch――du lịch theo đoàn có\nlẽ cũng hiệu quả đấy.\nỞ nơi không biết có\nai đang nghe, thì những chuyện có thể nói\ncũng bị giới hạn.」"

# 【稀咲】
# display as 稀咲
# JP: 「それだと出来る範囲での仕事の話をはじめるだけさ。\n丁度、いまこの状況とおんなじに」
1421 = "「Thế thì chúng ta cũng chỉ bắt đầu nói\nchuyện công việc trong phạm vi có thể\nthôi.\nY như tình huống hiện tại này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「違いない。してみると僕らは……うむ。\n四六時中、のべつまくなしに仕事の話をしてるのだなぁ」
942 = "「Không sai. Nhìn lại thì chúng ta……ừm.\nLúc\nnào cũng nói chuyện công việc không ngớt\nnhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「だよ？　けどね。\n仕事の話は、仕事の話だけじゃないんだ」
1268 = "「Đúng chứ? Nhưng mà nhé.\nChuyện công việc,\nkhông chỉ đơn thuần là chuyện công việc\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1056 = "「嗯？」" 

# monologue
# JP: 笑いを含んだ嬉しげな声。\nふわり、稀咲の香りが漂う。
1522 = "Một giọng nói vui vẻ pha lẫn tiếng cười.\nMùi hương của Kisaki thoang thoảng bay\ntới."

# 【稀咲】
# display as 稀咲
# JP: 「わからない？　なら、いいことを教えてあげる」
940 = "「Anh không hiểu sao? Vậy, tôi sẽ nói cho\nanh biết một điều hay ho nhé.」"

# monologue
# JP: 稀咲が顔を寄せてくる。\nベルトがあるゆえ、僕からも耳を稀咲に寄せる。
1651 = "Kisaki kề mặt lại gần.\nVì đang thắt dây an\ntoàn, nên tôi cũng ghé tai về phía Kisaki."

# 【稀咲】
# display as 稀咲
# JP: 「四六時中、のべつまくなしにイチャついてるのさ。\nボクとキミとは、どこにいたって何をしてても」
1189 = "「Chúng ta đang tình tứ với nhau mọi lúc\nmọi nơi đấy.\nTôi và anh, dù ở đâu hay làm\ngì đi chăng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1059 = "「À.」"

# monologue
# JP: 嬉しくなる。\nこれが僕らの形なのだと、稀咲が言葉にしてくれたから。
1511 = "Tôi cảm thấy vui.\nVì Kisaki đã nói ra\nthành lời rằng, đây chính là cách của\nchúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「いちゃついてるのか。理屈で、思考で。\n確かにそうだな――稀咲と話すのはとても楽しい」
1190 = "「Đang tình tứ sao. Bằng lý lẽ, bằng suy\nnghĩ.\nĐúng là vậy thật――Nói chuyện với\nKisaki rất vui.」"

# monologue
# JP: 機内ゆえ、言葉にせぬよう抑えぬが、直感としては、うむ。\n僕と稀咲は、思考でセックスしてるのだなと理解する。
1592 = "Vì đang ở trên máy bay nên tôi cố kìm nén\nkhông nói ra, nhưng theo trực giác thì,\nừm.\nTôi hiểu rằng tôi và Kisaki đang làm\ntình bằng suy nghĩ."

# 【稀咲】
# display as 稀咲
# JP: 「のんきに観光してみたりとか。\nこういうのも、ね？　すごくいいけど」
954 = "「Thong thả đi ngắm cảnh chẳng hạn.\nNhững\nlúc như thế này cũng rất tuyệt đúng không?\nNhưng mà」"

# monologue
# JP: 肘掛けの上の手に手がかさなる。\n指の隙間のひとつひとつに、稀咲の指が入ってくる。
1516 = "Hai bàn tay đan vào nhau trên chỗ để tay.\nTừng ngón tay của Kisaki luồn vào từng kẽ\nhở giữa các ngón tay tôi."

# 【稀咲】
# display as 稀咲
# JP: 「フィジカルなイチャイチャとおんなじくらい。\nボクはね、ロジカルなイチャイチャも大好きなんだ」
906 = "「Cũng giống như việc tình tứ về mặt thể\nxác.\nTôi ấy nhé, cũng rất thích việc tình\ntứ về mặt logic nữa.」"

# monologue
# JP: 稀咲の肌の、絹よりもなお滑らかで上品な肌触り。\nこの感触と同じくらいの快感を――
1660 = "Làn da của Kisaki, mượt mà và thanh tao\nhơn cả lụa.\nMột khoái cảm tương đương với\ncảm giác này――"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、稀咲。言葉を交えることもどこまでも心地よい。\nつまりはこれが、相性というものなのだろうな」
1171 = "「Anh cũng vậy, Kisaki. Việc trao đổi ngôn\ntừ cũng mang lại cảm giác vô cùng dễ chịu.\nNói tóm lại, đây chính là sự hòa hợp nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。相性だし、愛情だ」
1269 = "「Đúng vậy. Là sự hòa hợp, và cũng là tình\nyêu.」"

# monologue
# JP: キスをしている。\n唇ではなく、言葉と言葉、思考と思考で。
1595 = "Chúng tôi đang hôn nhau.\nKhông phải bằng\nmôi, mà bằng ngôn từ, bằng suy nghĩ."

# 【稀咲】
# display as 稀咲
# JP: 「つまりね、双鉄」
1434 = "「Nói tóm lại là, anh Soutetsu.」"

# monologue
# JP: 言葉が、思考が、稀咲が僕を愛撫する。
1649 = "Ngôn từ, suy nghĩ, Kisaki đang vuốt ve\ntôi."

# 【稀咲】
# display as 稀咲
# JP: 「ボクたちは、どうしようもないバカップルなのさ」
1183 = "「Chúng ta, là một cặp đôi ngốc nghếch hết\nthuốc chữa đấy.」"
