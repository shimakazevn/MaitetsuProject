# lines: 301 
# monologue
# JP: 完全個室のレストランでの時間を経てなお、\n僕らの討議は道半ばにあり、それゆえに――
1501 = "即便是吃完晚餐走出酒店包廂，我們依然在繼續著討論，並且——" 

# 【稀咲】
# display as 稀咲
# JP: 「遠慮はいらない。さぁ、どうぞ。\nって、姜さんたちが手配してくれた部屋だけれども」
973 = "「別客氣，請進，哦，雖說這本來就是你們為我們準備的房間」" 

# 【姜】
# display as 姜
# JP: 「いえ、双鉄先生と稀咲女士のお部屋ですから、\nやはり、いささか緊張します」
1038 = "「哪裡，這裡畢竟是二位的房間，多少還是會有些緊張」" 

# 【稀咲】
# display as 稀咲
# JP: 「安心して？　旅荷だけだし、\nおかしなものが転がってたりはしない……と思う」
1216 = "「放心吧，裡面只放了我們的行李，應該不會有什麼見不得人的東西……吧」" 

# 【姜】
# display as 姜
# JP: 「おやおや、それは楽しみです」
1035 = "「哦，那我就樂得叨擾了」" 

# monologue
# JP: カードをあててキーを解除し扉を開く。
1562 = "我們刷卡打開了房門。" 

# 【西瓜】
# display as 西瓜
# JP: 「わ！　とても素敵なお部屋ですね。\nさすが姜女士のお手配だと西瓜は感心いたします」
1018 = "「哇！姜女士安排的房間就是漂亮，西瓜實在太佩服您了」" 

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、昨日チェックインしたとき、\nボクも全く同じ感想を抱いたよ」
1057 = "「嘻嘻，在昨天登記入住時，我心裡就是這麼想的」" 

# 【姜】
# display as 姜
# JP: 「恐縮です」
1410 = "「過獎了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ボクらはベッドに腰掛けるゆえ、\n姜さんたちはソファーを使ってください」
1184 = "「我們就坐床邊，姜小姐和西瓜請坐沙發吧」" 

# 【姜】
# display as 姜
# JP: 「かしこまりました」
1095 = "「好的」" 

# 【稀咲】
# display as 稀咲
# JP: 「さて、と。\n今出てきている案をまずは羅列してみよう」
1092 = "「好了，我們先把目前想到的方案都列出來吧」" 

# monologue
# JP: テーブルをずらし、四人で囲めるように整えれば、\n稀咲はすぐさま、レストランで討議内容を整理しはじめる。
1571 = "我於是移動茶几，好讓四個人圍桌而坐。甫一坐定，稀咲便立刻開始總結我們在酒店討論的內容。" 

# 【稀咲】
# display as 稀咲
# JP: 「ま、どの案もパンチにはかけるよね。無難といえば無難。\nそれだけに、効果の方も無難なりのものに留まりそうだ」
1008 = "「只不過，這些方案都沒有讓人眼睛一亮的感覺，只能算是很常見的辦法，所以取得的效果恐怕也談不上理想」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありきたりの案は、それが有効であるからこそ、\n手垢にまみれ、ありきたりになったという面もあろうが」
909 = "「不過也正因為確實有效，才會變成慣用手段」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。ターゲットに確実に刺さる場合には、\nあえて王道――ありきたり、無難を外す意味はない」
1309 = "「的確如此，如果要確保達到目的，也沒有不走尋常路的道理」" 

# monologue
# JP: 稀咲の言に、ああ、と姜さんが頷きを見せる。
1535 = "姜小姐聽了稀咲的一番話，也點頭表示贊同。" 

# 【姜】
# display as 姜
# JP: 「今回はターゲットが茫漠としすぎ、広すぎるのですね」
1191 = "「我們這一次的目標人群實在是太過龐大並且寬泛了」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。鉄道に一切の興味がない層に、\n鉄道への興味をいだいてもらうことが大目標だものね」
1136 = "「對，畢竟大目標是要本來對鐵路毫無興趣的人群對鐵路產生興趣」" 

# 【姜】
# display as 姜
# JP: 「ええ」
1132 = "「對的」" 

# 【稀咲】
# display as 稀咲
# JP: 「例えばSNSやグループチャットに広告を出稿しても。\n著名人に紹介記事を書いてもらっても。それは結局」
1148 = "「就算在社交軟體和群聊發布廣告，或者是讓著名記者發稿宣傳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もとよりいくらかは鉄道に興味をいだいている層にしか\nリーチし得ないであろうな」
1350 = "「能夠因為這些提起興趣的人，肯定是本來就對鐵路感興趣的」" 

# 【姜】
# display as 姜
# JP: 「ですね。まるで興味ないジャンルの広告は飛ばされます。\n目障りと思われるのが関の山かと」
1270 = "「沒錯，如果對這方面一點興趣都沒有，就算看到了廣告，也只會產生反感」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよねぇ」
1146 = "「就是這樣啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまない」
1043 = "「啊，不好意思」" 

# monologue
# JP: 稀咲か、あるいは姜さんか。\n誰のか知らぬ腹の虫を、ひとまず自分のものとしておく。
1574 = "我聽到了有人的肚子發出咕咕叫的聲音，雖然不知道是稀咲還是姜小姐，姑且算在自己頭上了。" 

# 【稀咲】
# display as 稀咲
# JP: 「そういえばお腹が空いたよね。レストランでも話して\nばかりで、結局ほとんどテイクアウトになっちゃったし」
1404 = "「這麼說來，我肚子確實是餓了，畢竟在桌上也是一直在談事情，結果大多數菜品都是打包帶回來了」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ」
1041 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君。お手数だけど、テイクアウトしたものを」
1368 = "「西瓜，麻煩你把打包的菜拿出來吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい、西瓜はすぐに配膳します」
1097 = "「好的，西瓜這就給各位上菜」" 

# monologue
# JP: 少し所在なげに討議を見守るばかりだった西瓜が、\n稀咲の言葉にいそいそと動き始める。
1700 = "西瓜之前只是在旁聽我們討論，顯得很不自在，她一聽到稀咲的話，便立刻開始忙活。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いい香りだ。\n――ああ、ポットにお茶まで持たせてくれたのか」
1016 = "「味道真香，噢噢，連茶水也裝在瓶子裡帶回來了嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「まさしくいたれりつくせり……\nって、いや――。改めて見るとものすごい量だね、これ」
1012 = "「名副其實的無微不至……啊，這個，現在看來，可真是好大一桌啊」" 

# monologue
# JP: レストランの大きな回転テーブルからホテル個室の小机へ。\n配膳が変わってがため、ボリューム感も大きく変わる。
1514 = "因為是將酒店裡擺在轉盤餐桌上的菜品帶回賓館享用，一旦放在這小小的茶几之上，就顯得更為豐盛了。" 

# 【姜】
# display as 姜
# JP: 「注文したものは適量だったかと思います。ですが、\n思いもかけず、大量のお土産を頂いてしまったので」
1257 = "「本來我點的量是剛好夠我們一桌人吃的，只是我沒想到，還額外附送了這麼多菜品」" 

# 【稀咲】
# display as 稀咲
# JP: 「大量のお土産！\n凄いね、姜さんは余程の上得意さんなんだ」
1436 = "「額外附送的！這麼多啊，看來你在那家酒店是能夠享受貴賓級待遇的老主顧」" 

# 【姜】
# display as 姜
# JP: 「いえ、そうではありません。一秘書である私が、\n自分で直接あのお店を使う機会など殆どありませんから」
1418 = "「那倒沒有，我身為秘書，很少有機會去那家酒店用餐」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうなの？\nじゃあなんで、こんなにたくさんのお土産を――」
1248 = "「是這樣？那酒店老闆為什麼會白送這麼多菜給我們——」" 

# monologue
# JP: 稀咲の問いに、姜さんがくすくす笑い出す。
1536 = "姜小姐聽到稀咲的問題，便笑了起來。" 

# 【姜】
# display as 姜
# JP: 「大当たりをしたそうなのです。お店のオーナーが。\nええと……西瓜、なんでしたっけ？」
1344 = "「聽說老闆是押中了大獎，我想想……西瓜，他說是什麼的頭等？」" 

# 【西瓜】
# display as 西瓜
# JP: 「[ｄｏｕ,1]闘羊――日ノ本語読みするなら“とうよう”\n闘う羊と書いて闘羊です」
1141 = "「就是斗羊，斗是戰鬥的斗，羊是動物的羊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「闘羊」
1218 = "「斗羊」" 

# monologue
# JP: 知っているかと稀咲を見れば、\n稀咲もはてなと首をかしげる。
1573 = "我本以為稀咲可能比較了解，一看稀咲也是一頭霧水。" 

# 【稀咲】
# display as 稀咲
# JP: 「話の流れから推測すると……\n多分、賭け事なんだよね？　羊のレースか何かかい？」
1225 = "「既然是中了獎……應該是賭博性質的活動？難道是讓羊競跑？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい、賭け事です。ですが、レースではありません。\n羊同士が闘いあう……そうですね、いわば羊の相撲です」
1311 = "「的確是有賭博性質，不過不是賽跑，而是讓羊互相搏鬥……這個，相當於讓羊參加相撲運動」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、なかなかに面白そうだ」
1033 = "「哦，聽起來還挺有趣的」" 

# monologue
# JP: つい出た言葉に、稀咲が不思議そうな目を向けてくる。\n確かに羊の相撲というのは、稀咲の好みとは遠かろう。
1665 = "稀咲聽到我的無心之言，則是不解地看向我，可能她是無法理解這類活動的樂趣所在" 

# 【西瓜】
# display as 西瓜
# JP: 「元々は春節だけの催事でしたが、\n近年では通年で行われるようになりました」
993 = "「原本是只在春節舉辦的活動，而最近幾年則是不分時節隨時都在舉辦了」" 

# 【姜】
# display as 姜
# JP: 「それも、[かほくしょう,2]河蹼省でだけ楽しまれているものでした。\nそれがあれよあれよと、一気に全国区となりまして」
1340 = "「而且斗羊原本只是在河焙省盛行的活動，卻在轉眼之間便於仲國各地都流行起來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、規模も期間も大幅に拡大されたのか」
907 = "「不止是舉辦時間，連規模都擴大了嗎」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。その結果、今ではインターネットを通じ、\nどこからでも勝羊投票券を購入できるようになりました」
1244 = "「是的，所以現在已經可以隨時隨地在網路上購買賭羊票」" 

# monologue
# JP: 西瓜がスマホを操作して、画面を僕らに見せてくれる。\n漢字の形は微妙に違うが、それでもなんとなく理解できる。
1708 = "西瓜拿出手機讓我看，雖然漢字看起來和日語不太一樣，但我還是能看得出來是什麼意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「イメージ的には……日ノ本のサッカーくじと同じかな？\n一枚の投票券で、複数の試合の勝ち負け引分を投票する」
1318 = "「看起來……感覺和日本的足彩差不多吧？在一張彩券上寫上對多場球賽的結果預判，猜中就能獲得獎金」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね、それだと当選確率はかなり低くなる。\n大当たりすれば一挙に高額の払い戻しが――ああ！」
991 = "「原來是這樣，想必能中獎的機率是非常低了，一旦中了大獎，就能獲得高額獎金——噢噢！」" 

# monologue
# JP: 稀咲と顔を見合わせる。
1570 = "我和稀咲互相看向對方。" 

# 【双鉄】
# display as 雙鐵
# JP: 「レストランのオーナーは、\n見事その大当たりを引き当てたわけか」
920 = "「也就是說，那酒店老闆是賭羊中了大獎嗎？」" 

# 【姜】
# display as 姜
# JP: 「そうなりますね。ですのでお土産は、\nレストラン利用者全員に振る舞われたものとなります」
1241 = "「是的，所以只要是去那家酒店用餐的客人，都能獲得額外附送的菜品」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全員にこの量か。なんとも豪気なことだなぁ」
1207 = "「所有顧客都能拿到這麼多菜啊，這老闆真是太豪爽了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ありがたいけど、とてもボクらでは食べ切れないよ。\n姜さんも、さぁ。西瓜君もよければ」
953 = "「儘管很感謝老闆的好意，但我們幾個人根本吃不完啊，姜女士和西瓜也別客氣，都來一起吃吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます。\nですが、西瓜は軽油しかいただくことができません」
1325 = "「稀咲女士的好意西瓜心領了，不過西瓜只能喝柴油」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n電気式とはいえどディーゼル動力なのだものな」
1094 = "「好吧，雖然是柴電機車，還是以柴油為動力的啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ、それは残念。ならさ、誰か――ああ、\nさっき言ってたマスターさんにテイクアウトとかどう？」
1247 = "「是這樣，那真是太可惜了，那麼還能讓誰來幫忙——噢噢，剛剛不是提到了你的司機嗎，要不帶給他一份吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「わ！」
1017 = "「哇！」" 

# monologue
# JP: ぱっと、西瓜の顔が華やぐ。
1698 = "西瓜一下表現得格外欣喜。" 

# 【西瓜】
# display as 西瓜
# JP: 「もしここで余るようでしたら、ぜひ持ち帰らせて下さい。\n[ｙａｎｇｒｏｕ,2]羊肉串は、志寰――西瓜のマスターの好物なのです」
1099 = "「如果實在是吃不下，就讓西瓜帶走一些吧，志寰——西瓜的司機最喜歡吃羊肉串了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ヤン……？　ふむ？　それは、どれだい？」
1337 = "「羊肉串……？嗯？是說哪一樣吃的？」" 

# 【西瓜】
# display as 西瓜
# JP: 「これです。串焼きの――日ノ本でいう、焼き鳥の羊版、\nケバブとも似た料理です」
1145 = "「就是這個拿木籤串著的肉，跟日本的烤雞串或者中東烤肉比較相似」" 

# 【稀咲】
# display as 稀咲
# JP: 「羊相撲のお祝いが、焼き羊！」
1067 = "「因為是羊相撲中了獎，所以才要拿烤羊肉來慶賀是嗎！」" 

# monologue
# JP: 稀咲がくすくす笑い出す。
1673 = "稀咲開心地笑了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「いや本当に豪快だね！　――ああ、けど、うん。\n食べて供養っていう考えは、多分仲国にもあるのかな」
1029 = "「哎呀，果真是豪爽！哦，不過也對，也許在仲國也有以食表達感激的風俗」" 

# 【姜】
# display as 姜
# JP: 「さてどうでしょう。少なくとも私は理解できますが、\nなにせ仲国は広いですから」
1394 = "「這可很難說，雖然我能理解這種文化，但仲國畢竟地大物博」" 

# 【双鉄】
# display as 雙鐵
# JP: 「羊料理ひとつとっても、仲国各地で、\nさぞさまざまなバリエーションがあるのだろうな」
1170 = "「想必在仲國，即便同樣是羊肉，在不同地區也有著截然不同的菜式吧」" 

# monologue
# JP: 西瓜にもたせてやる分を、かなり多めに取り分ける。\nそれでもやはり、食べ切れるかが不安な量だが――
1564 = "我分了不少羊肉串讓西瓜帶走，即便如此，剩下的菜品依然非常多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「羊の供養になるように、我々も\nおいしくいただくとしよう。『いただきます』だ」
1291 = "「為了向羊表示感謝，我們也開始享用吧，我開動了」" 

# 【稀咲】
# display as 稀咲
# JP: 「いただきます。あむっ」
1200 = "「我開動了，啊嗚」" 

# monologue
# JP: かぶりつき、噛みしめるごと、\n稀咲の頬にじわじわ赤みが増していく。
1654 = "稀咲用力咬了一大塊羊肉下去，很快她的臉上便泛起了陣陣紅暈。" 

# 【稀咲】
# display as 稀咲
# JP: 「んくっ。うん。これはいいね。スパイシーで美味しい。\n羊の独特のクセみたいなのが、まったく気にならない」
1442 = "「（嚥下）嗯，真不錯，味道調得恰到好處，甚至蓋過了羊肉的膻味」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この串焼きも河蹼省の――ああ、いや」
1276 = "「沒錯，這羊肉串也是河焙省的——哦，不是」" 

# monologue
# JP: 不意に、先程の西瓜の言が気にかかってくる。\n聞き流してかけてしまっていたが……
1547 = "就在這時，西瓜剛剛提到的一個情況引起了我的注意，差一點就被我忽視了……" 

# 【双鉄】
# display as 雙鐵
# JP: 「地方人気だったという闘羊が、\n突如全国区になったという話だったが――」
975 = "「剛剛西瓜提到，原本只是在部分地區流行的斗羊，突然在全國掀起了熱潮」" 

# 【稀咲】
# display as 稀咲
# JP: 「！」
1042 = "「啊！」" 

# monologue
# JP: 稀咲の食べる手が止まる。
1636 = "稀咲也放下了手裡的羊肉串。" 

# 【稀咲】
# display as 稀咲
# JP: 「そうか。それって、闘羊に興味がなかった――\n知らなかった人達も一気に興味を抱いたってことだよね」
1131 = "「對啊，這樣就說明很多原本對斗羊不感興趣，或者不了解的人突然對斗羊產生了興趣沒錯吧？」" 

# 【姜】
# display as 姜
# JP: 「！」
# 1042 = "「啊！」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ！」
# 1042 = "「啊！」" 

# monologue
# JP: 姜さんも西瓜も気づいたようだ。\nここにあるいは、探し求めるヒントがあるかもしれないと。
1533 = "姜小姐和西瓜也意識到其中的問題，或許我們就能從中得到靈感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「突如の人気爆発の背後には、一体何があったのだ？」
1220 = "「斗羊是因為什麼才會突然開始流行的？」" 

# 【西瓜】
# display as 西瓜
# JP: 「これです。西瓜もスマホにいれています。\n西瓜だけでなく、機関士達やレイルロオド達の多くが」
1232 = "「是因為這個，西瓜也在手機裡裝了，不止是西瓜，很多司機和鐵路人偶都下了這款應用」" 

# 【稀咲】
# display as 稀咲
# JP: 「これは……」
1398 = "「這是……」" 

# monologue
# JP: 稀咲とスマホを覗き込む。\n画面には恐らくブランドロゴ。そして画面が白転し――
1568 = "我和稀咲一起看向西瓜的手機，首先顯示的應該是製作廠商，然後螢幕變成一片空白——" 

# 【稀咲】
# display as 稀咲
# JP: 「女の子のキャラクター……\nって、これ――ゲームアプリ！？」
971 = "「出現了女孩的卡通形象……這是——手機遊戲？！」" 

# monologue
# JP: 西瓜の操作を、稀咲とふたり覗き込む。
1561 = "我們一起看著西瓜操作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ふむ、人気が出るものうなずける」
627 = "「……嗯，也難怪會這麼受歡迎」" 

# monologue
# JP: 動作は軽快、女の子のキャラクターもかわいいし、\n相撲らしきムービーは驚くほどの躍動感に満ちている。。
1581 = "操作感非常爽快，女孩子的卡通形象也很討喜，而在進入相撲時的遊戲畫面也是富有動感，令人非常震撼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりこれは、女の子が相撲で闘うゲームなのか？」
1408 = "「遊戲內容就是讓這些女孩以相撲決勝負嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。『羊女??』――日ノ本語でいうと、\n羊娘レスリングとか羊娘相撲という印象のタイトルです」
1237 = "「是的，名字叫《羊女》，譯成日語大概就是羊娘摔跤或者羊娘相撲之類的了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、その『羊娘』っていうのが、\nこの女の子たち？」
1062 = "「噢噢，所謂“羊娘”，就是指這些少女嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ですね。闘羊の伝説的な横綱たちを、\n擬人化して羊娘にしています」
1273 = "「沒錯，就是將名垂青史的著名斗羊們擬人化，讓她們以羊娘的形象在遊戲裡登場」" 

# 【稀咲】
# display as 稀咲
# JP: 「擬人化！　羊を！」
1210 = "「把羊擬人化！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、みな耳と角とが生えているな」
1405 = "「這麼說來，這些女孩是長有動物的耳朵和角」" 

# monologue
# JP: が、共通項はその位。あとは女学生風だったり\nOL風だったり女医風だったり、さまざまだ。
1487 = "但也只有這些特徵是共通的，人物形象則是有學生、上班族或者醫生等等，可謂種類繁多。" 

# 【稀咲】
# display as 稀咲
# JP: 「で、その羊娘を操作してレスリングして勝てばいい？」
1204 = "「所以只要操作這些羊娘在摔跤中取勝就行了？」" 

# 【西瓜】
# display as 西瓜
# JP: 「目的はそのとおりですが、過程が少しだけ違います。\nプレイヤーは選択した羊娘を、操作ではなく育成します」
1402 = "「這的確是遊戲的目標，但是過程則和您說的不太一樣，玩家要做的是培養自己選擇的羊娘，而非比賽」" 

# 【稀咲】
# display as 稀咲
# JP: 「育成？」
1076 = "「培養？」" 

# 【西瓜】
# display as 西瓜
# JP: 「試しに大人気の羊娘、『白眼幕内』を育ててみます。\n日ノ本語でいえば、『目が白い幕内力士』です」
1423 = "「那我就以這位非常受大家歡迎的羊娘“白眼幕內”，譯成日語就是“白眼睛的幕內力士”，來舉例」" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに目も髪も白いね。アルビノってやつなのかな」
1308 = "「的確她的眼睛和頭髮都是白色，是不是得了白化病？」" 

# 【西瓜】
# display as 西瓜
# JP: 「モデルとなった闘羊も同じ特徴をしていたそうです」
1343 = "「聽說她的原型也有著相同的特徵」" 

# monologue
# JP: 慣れた手付きで、西瓜が画面をタップしていく。\nするやいなやで、画面内の少女が走ったり頭突きをしたり。
1703 = "西瓜以熟練的動作點擊螢幕，隨即螢幕裡的少女就開始奔跑或者用頭撞擊。" 

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君が選んだトレーニングを、白目ちゃんがやって、その結果、少しずつ成長していくわけか！」
922 = "「也就是讓這白目女孩按照你選擇的項目訓練，並且逐漸成長是嗎？！」" 

# 【西瓜】
# display as 西瓜
# JP: 「そのとおりです。パラメーターの上昇にともなって、\n勝利確率もまたアップしていくという仕組みです」
1163 = "「您說的沒錯，羊娘的能力越高，獲勝的機率也就越大」" 

# monologue
# JP: 西瓜がさらにタップしていく。\n画面が動画に切り替わり――ああ、先程の相撲シーンだ。
1709 = "西瓜繼續點擊螢幕，上面於是開始播放動畫，噢噢，就是剛才我們看到的相撲畫面。" 

# 【西瓜】
# display as 西瓜
# JP: 「これが勝負のシーンです。ここでは操作は一切できず、\nプレイヤーはただ大一番の結果を見守るだけになります」
1401 = "「這樣就進入比賽階段了，玩家在這時無法進行任何操作，只能眼看著比賽分出勝負」" 

# monologue
# JP: 初見時にはただ美麗というだけの印象だったが、\n内容を理解できたため、受け取る意味ががらりと変わる。
1679 = "第一眼看到的時候只給人一種精緻美觀的感覺，一旦現在理解了遊戲內容，觀感就截然不同了。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは――すごいな。結構手に汗を握ってしまうね」
1395 = "「這可真厲害，讓人感覺既興奮又緊張」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nこれはついつい西瓜の羊を応援してしま――っ！！？」
1274 = "「沒錯，我都忍不住想為西瓜的羊娘助威——啊？！」" 

# 【稀咲】
# display as 稀咲
# JP: 「白目ちゃん負けちゃう！　っ！！！\nすごい！　土俵際でうっちゃって勝った！！！！」
1301 = "「白目要輸了！哦！！好厲害！在邊線處用角頂了回去，我們贏了！！！」" 

# monologue
# JP: 稀咲が子供のようにはしゃぐ。\n西瓜もふう、と、見るからに安堵の息を吐く。
1644 = "稀咲如同孩童一般激動，而西瓜也是長吁了一口氣。" 

# 【西瓜】
# display as 西瓜
# JP: 「危ういところでしたが、先程とったばかりのスキル、\n『角うっちゃり』が発動したおかげで勝利しました」
1153 = "「差一點就輸了，多虧了剛剛獲得的這個名叫“角沖”的技能，才在千鈞一髮之際取得了勝利」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。さきほど勝利確率といっていたが、\nそのスキル――必殺技の発動などがランダムなのだな？」
990 = "「原來是這樣，剛剛你說過取勝是有機率的，說明這個技能也就是必殺技，是隨機發動的吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ですね。ですから鍛えていれば必ず勝てるとも\n限りませんし、取り組み前の指示――」
1133 = "「對的，所以也不是經過培育就一定能夠取勝，在比賽開始之前還要給羊娘下指示——」" 

# monologue
# JP: 西瓜が画面を示してくれる。仲国語が読めずとも、\n意味するところはアイコンから、何となく伝わってくる。
1706 = "西瓜把手機拿給我們看，即便我看不懂仲文，單看圖示也能大概猜出是什麼意思。" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。戦術を選べるんだね？　押し相撲、四つ相撲\n――ふふっ、角のアイコンは角相撲かな？」
992 = "「原來還可以選擇戰術？有推技進攻、交手互扭——哈哈，這個帶角的圖示是說用角進攻嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「まさしく仰る通りです。羊娘ごとに得意戦術があり、\n戦術同士の間には、じゃんけんのような相性があります」
1424 = "「都讓您說中了，每個羊娘都有各自擅長的戰術，而且在戰術之間也像猜拳一樣存在相互剋制的關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分の羊娘の得意がグーなのに相手がパーの専門家なら、\nあえて不得意なチョキで勝負をかける手もあるのか」
919 = "「也就是說，如果自己這邊擅長的是出拳，而對方擅長出布，還可以特意選擇不擅長出的剪刀來取勝嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。ですが稽古が十分なら、\nグーでパーにも勝てる可能性も、またあるのです」
1147 = "「就是這樣，不過只要數值培養得足夠高，用拳也能贏得了布」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど。その選択が悩ましい分だけ、\n勝利出来たときに一層の快感を得られるわけだね？」
989 = "「原來如此，戰術的選擇越是傷腦筋，在勝利時獲得的快感也更加強烈，我說的沒錯吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ですね。日ノ本語でいうと、\n『脳汁がどばーっと出る』状態になります」
1239 = "「是的，就跟日本常說的“爽得腦漿迸裂”的感覺差不多」" 

# 【稀咲】
# display as 稀咲
# JP: 「またマニアックな日ノ本語を知っているねぇ」
1403 = "「這種冷僻說法你居然都知道」" 

# monologue
# JP: くすくす笑い。\n不意に稀咲は真顔に戻って僕を見る。
1663 = "稀咲笑了起來，但她很快收起笑容看向我這邊。" 

# 【稀咲】
# display as 稀咲
# JP: 「ポイントはつまり、\n『擬人化』『勝負』『ランダム性』ってことになる？」
1298 = "「由此可以發現三個關鍵點，分別是“擬人化”、“競賽”和“隨機性”，你覺得呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「勝負自体がランダム性をもつものだ。ポイントを3つに\n絞るなら、『擬人化』『育成』『勝負』だろうな」
1258 = "「本來比賽就是存在一定隨機性的，如果真要總結出三點，我覺得應該是“擬人化”、“培養”和“競賽”」" 

# 【稀咲】
# display as 稀咲
# JP: 「そっか、そうだね。\n育成っていうのが、多分一番のミソだね、これの」
1126 = "「對哦，你說的沒錯，培養應該是這個遊戲的核心內容」" 

# 【姜】
# display as 姜
# JP: 「育成シミュレーションゲーム」
918 = "「也就是模擬養成遊戲」" 

# monologue
# JP: 僕らの会話をじっと聞いてた姜さんが、\nしばらくぶりに口を開く。
1481 = "一直默默聽著我們說話的姜小姐在這時突然開了口。" 

# 【姜】
# display as 姜
# JP: 「ゲームアプリと鉄道を絡めるのは確かに、\n鉄道に興味の無い層をひきつけるのに役立ちそうです」
1103 = "「如果能將鐵路的要素加入到手機遊戲當中，的確是能吸引那些對鐵路沒有興趣的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。ただ、このアイディアを、\nそのまま実現化できるかどうかとなってくると……」
1253 = "「有道理，只是要說這個想法可行不可行……」" 

# 【姜】
# display as 姜
# JP: 「ああ――難しいものと思われますか？」
1048 = "「嗯——我覺得難度是挺高的？」" 

# monologue
# JP: 姜さんの声は、抑えてはいるが残念そうだ。\nが……うむ。考えてみても、やはり結論は変えられない。
1491 = "儘管姜小姐有所收斂，但她的聲音聽起來還是充滿了遺憾。不過……嗯，我在一番思索之後，也只能得出相同的結論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「姜さんのところはわかりませんが、御一夜鉄道では、\n残念ながらゲームアプリの開発を指揮できません」
1431 = "「雖然我不清楚您這裡的情況如何，我們御一夜鐵路明顯沒有開發遊戲軟體的環境」" 

# 【稀咲】
# display as 稀咲
# JP: 「やっぱりそうかな。\n中核メンバーでゲーム好きっていうと……」
1262 = "「果然你也是這麼認為的，要說核心成員裡喜歡遊戲的人……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「強いていうなら凪あたりだな。\nカードゲームを好むと聞いた。が――」
1435 = "「頂多只有凪能算得上了了，我聽說她喜歡桌遊，不過——」" 

# 【稀咲】
# display as 稀咲
# JP: 「……今の凪くんに企画や全体統括は無理か。\n三年くらい修行させたらわからないけど」
633 = "「……很明顯凪現在沒有領導或者統籌計劃的能力，如果讓她鑽研上三年，或許還有可能」" 

# 【双鉄】
# display as 雙鐵
# JP: 「三年は待てぬし、他にできそうな人材もない。\n完全におまかせとなる開発は、博打と何も変わらない」
1188 = "「我們等不了這麼長時間，也找不到其他有能力的人選，如果將遊戲開發完全交給別人，無異於一場賭博」" 

# 【稀咲】
# display as 稀咲
# JP: 「だねぇ」
943 = "「你說的對」" 

# monologue
# JP: 稀咲も同意してくれる。\nならばこの線は、やはり切り捨てる他ないだろう。
1638 = "稀咲也贊同我的看法，那我們就只能不走遊戲這條路了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ということですので、姜さん。\nアプリという線は、現状の僕らには取り得ません」
1206 = "「所以姜小姐，開發遊戲這條路對我們來說是行不通的」" 

# 【姜】
# display as 姜
# JP: 「そうなのですか」
1086 = "「太可惜了」" 

# 【稀咲】
# display as 稀咲
# JP: 「がっかりするのはまだ早いよ。双鉄が言っているのが、\n『同じ要素をアプリ以外で活かしたい』ってことだから」
1294 = "「現在還不是喪氣的時候，雙鐵的意思是，這個思路我們也可以通過遊戲之外的途徑實現」" 

# 【姜】
# display as 姜
# JP: 「！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の言葉が、信頼が。\n姜さんと西瓜が期待する目が、僕の思考を加速させる。
1488 = "來自稀咲的話語與信任，以及來自姜小姐和西瓜的充滿期待的眼神，令我的大腦飛一般地運轉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「擬人化という点なら鉄道には、\n最初から圧倒的な強みがある」
1046 = "「單就擬人化這一點來說，我們鐵路從一開始便佔有很大優勢」" 

# 【姜】
# display as 姜
# JP: 「ああ！　――確かにレイルロオドは……例えば西瓜なら、\n擬人化ではありませんが、東富4型の象徴となりますね」
1127 = "「對啊！的確鐵路人偶……以西瓜為例，雖然嚴格來說不算列車擬人化，但她就是東富４型的象徵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜鉄道でいうなら8620形の象徴はハチロク、\nキハ07形の象徴はれいなというふうに売り出せるよな」
1135 = "「對，換成我們御一夜鐵路，８６２０型的象徵就是八六，而玲奈就是Ｋｉｈａ０７型的象徵，這就能作為鐵路的賣點」" 

# 【稀咲】
# display as 稀咲
# JP: 「売り出す――さて、売り出し方だけど」
1226 = "「既然賣點有了——說到具體的行銷策略」" 

# monologue
# JP: 稀咲の視線が西瓜へと向く。
1667 = "稀咲說罷便看向西瓜。" 

# 【稀咲】
# display as 稀咲
# JP: 「このアプリの場合は、育てて勝負させる。\nその勝ったり負けたりの面白さが人気になってるよね？」
1409 = "「遊戲裡是透過培養羊娘讓其參加競賽，其中的樂趣便是這個遊戲大火的關鍵對吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「そうですね。育成が簡単な羊娘は初心者に、\n育成が困難な羊娘は上級者に人気がある傾向かと」
1234 = "「是的，一般初學者會選擇培養難度較低的羊娘，有經驗的玩家就會選擇培養難度高的羊娘了」" 

# 【稀咲】
# display as 稀咲
# JP: 「人気の要素は育成難易度だけ？　ああ、もちろん\nキャラクターの容姿などの要素もあるだろうけど」
932 = "「什麼樣的羊娘受歡迎是依培養難度而定？哦，想必容貌也是玩家的選擇標準之一」" 

# 【西瓜】
# display as 西瓜
# JP: 「その他でしたら、出身地も大きく人気を左右します。\n北琴では、北琴出身の羊娘――この子が一番人気です」
1417 = "「還有就是跟出生地有關，比如在北琴，就是這個北琴出身的羊娘最受玩家歡迎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1068 = "「在理」" 

# monologue
# JP: 理知的そうな、メガネをかけている痩身の羊娘だ。\nなるほど。言われてみればいかにも都会的で垢抜けている。
1711 = "西瓜說的是一個身材偏瘦，戴著眼鏡看起來很有內涵的羊娘，的確給人一種大都市出身、成熟穩重的感覺，" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ。わかってきた。だったらこっちの羊娘はどこか\n……山岳地方の出身？　で、こっちの水着の子は海」
1023 = "「哈哈，我逐漸理解其中的規律了。那麼這位羊娘應該就是……來自某個山岳地區？而這邊穿著泳裝的羊娘則是海邊出身」" 

# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のご指摘の通りです。ザックを背負った羊娘は\n景林、水着の羊娘は金岩灘の出身です」
1425 = "「都讓稀咲女士說中了，背著登山包的羊娘是貴林出身，穿泳裝的羊娘是金炻灘出身」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、それぞれ地元人気がある？」
1342 = "「而她們在自己的出身地都很受歡迎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。ご当地ではキャラクターグッズなども売られます。\nネットを通じて、それらを個人売買することも盛んです」
1236 = "「是的，一般在出身地還會出售對應羊娘的周邊，在網路上也有很多人互相倒賣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、そうか。100人が100人、\n自分の地方の羊娘を好きになるとは限らない――」
629 = "「……噢噢，也對。也不是所有人都喜歡自己當地的羊娘」" 

# monologue
# JP: 瞬間、繋がる。\nぱっと、一気に視界が開ける。
1580 = "所有要素在剎那間聯繫成一個整體，我一下感到眼前豁然開朗。" 

# 【双鉄】
# display as 雙鐵
# JP: 「地方ももちろん、鉄道が強みを持つ要素だ。\nゆえに、売り出すための基本線は」
1070 = "「地區一樣是鐵路獨具特色的要素，所以我們的基本行銷策略——」" 

# 【稀咲】
# display as 稀咲
# JP: 「各路線のレイルロオドが、それぞれの地元で、\nキャラクターグッズを売り出す感じ？」
1082 = "「大概分別在各個路線的鐵路人偶所對應的地區，發售相關周邊是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その線はよさそうかと感じる。しかしそれのみでは、\n育成、応援、勝負という、恐らくコアとなる要素を欠く」
1197 = "「我覺得這是個好主意，但只是這樣做，還缺乏培養、聲援和競賽等關鍵要素」" 

# 【姜】
# display as 姜
# JP: 「ああ！　でしたらその要素をどう組み込みましょう」
1128 = "「對啊！那我們應該如何將這些要素加入其中呢？」" 

# monologue
# JP: 司会然としていた姜さんが、身を乗り出して尋ねてくる。\n場が帯び始めてきた熱に、さらに思考を煽られる。
1485 = "之前還略顯失落的姜小姐突然振作起來，激動地向我提問，逐漸熱烈的氣氛也讓我的思路更加清晰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな。例えばグッズ開発の過程そのものを、\n地元の方たちが応援できるようにするのはどうだろう」
634 = "「……我想想，比如說我們可以把每個地區民眾的聲援情況，體現到當地周邊的開發過程中」" 

# 【姜】
# display as 姜
# JP: 「と、おっしゃいますと？」
962 = "「具體來說呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「インターネット等で定期的な配信を行うなどをし、\n同時に、視聴者からの情報を募って行動する的な」
1264 = "「比如將製作進程定期上傳至網路，同時根據觀眾的意見做出調整」" 

# 【稀咲】
# display as 稀咲
# JP: 「つまり、グッズ開発の過程を可視化し、\nインタラクティブなものにするというわけだね」
921 = "「也就是讓設計周邊的全過程透明化，增強與當地民眾的互動對吧？」" 

# monologue
# JP: 荒削りだった思考に稀咲が、\nびたりとはまる言葉をくれる。
1646 = "稀咲將我模糊的思緒以清晰易懂的話語解釋給姜小姐聽。" 

# 【姜】
# display as 姜
# JP: 「インタラクティブ――双方向性ですか。\nなるほど、それは面白いかもしれません」
1357 = "「與當地民眾互動是嗎……我明白了，這的確是個好辦法」" 

# 【稀咲】
# display as 稀咲
# JP: 「インタラクティブであるためには、視聴者の参加が必須。\nそれを募る軸となる要素を、『勝負』に定める」
1397 = "「這就需要觀眾參與其中了，而募集觀眾的關鍵就在於“競賽”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。例えばハチロクで考えてみよう。勝負の相手は\n――どうせなら豪勢に高嵜鉄道のランとする」
1272 = "「沒錯，就以八六為例，至於競爭對手——不如就找個強有力的對手，就是高崎鐵路的蘭了」" 

# 【西瓜】
# display as 西瓜
# JP: 「ランは、日ノ本を代表する人気レイルロオドです。\n眉目秀麗。プリンスオブレイルロオドの異名を持ちます」
1358 = "「蘭是能夠代表日本的偶像級鐵路人偶，容貌可謂傾國傾城，還有著鐵路公主的美稱」" 

# monologue
# JP: 姜さんへは、西瓜が適宜で解説してくれる。\nそれゆえ僕は、ただ思考だけに集中できる。
1714 = "西瓜隨即向姜小姐解釋，所以我可以專心思考具體方案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道。地域としては御一夜・クマの代表として、\nハチロクがランに、グッズの売上勝負を挑む」
1186 = "「我們御一夜鐵路可以代表御一夜乃至整個隈元，讓八六就相關周邊的銷售額與蘭一決勝負」" 

# 【稀咲】
# display as 稀咲
# JP: 「それ、単なるキャラクターグッズじゃなくてさ、\n地元の特産品をベースとするのを規定にしない？」
914 = "「也不要拘泥於鐵路人偶的周邊，要不我們將周邊化的範圍擴大至當地的土特產吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　そうするのなら、インタラクティブの第一歩に、\n『地元の特産品情報を募る』を持ってこれますね」
1061 = "「噢噢！這樣一來就可以先從“募集當地特產的有關訊息”做起，由此展開與當地民眾的互動了」" 

# 【姜】
# display as 姜
# JP: 「自分が提案した特産品を、地元代表のレイルロオドが\nグッズ化してくれる――応援しがいを感じそうです」
1376 = "「讓代表自己家鄉的鐵路人偶與自己熱愛的土特產合作，推出相關產品，的確會讓大家萌生支持並參與其中的念頭」" 

# monologue
# JP: アイディアがぽんぽん飛び出し噛み合っていく。\nこういうときは精査は後だ。流れを止めない方がいい。
1510 = "各種主意接踵而至，並順利融合在一起，現在就應該一鼓作氣往下發掘，回頭再查漏補缺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「情報をもとにハチロクが例えばハチロク包丁を作ろうと\n試行錯誤する――そこが、要素としては『育成』だ」
965 = "「再以八六為例，我們就可以根據收集到的訊息嘗試製作類似八六菜刀之類的商品，這樣就將“培養”這一要素也包含在內了」" 

# 【稀咲】
# display as 稀咲
# JP: 「勝負の期日を定めれば、さらに切迫感がでるよね。\n上手くいく、失敗する。どちらにいっても盛り上がる」
966 = "「再加上期限的制約，就會顯得更有緊張感，成功並不是最終目的，關鍵在於激起民眾的熱情」" 

# 【姜】
# display as 姜
# JP: 「情報を募る、その情報を試すなどの過程については、\nBaliBaliなどでライブ配信するのも良さそうです」
1356 = "「至於收集意見，嘗試製作的過程，我覺得可以在ＢａｌｉＢａｌｉ進行直播」" 

# 【西瓜】
# display as 西瓜
# JP: 「BaliBaliは動画サイト――\n日ノ本でいうポコポコ動画のようなものです」
1444 = "「ＢａｌｉＢａｌｉ是一個影片平台，類似於日本的ｐｏｃｏｐｏｃｏ動畫」" 

# 【稀咲】
# display as 稀咲
# JP: 「定期配信だけでなくライブ配信も確かにアリだね。\nコメントでなら、より気軽に情報提供等ができるし」
1312 = "「的確除了上傳影片，直播也不失為一種選擇，彈幕也方便觀眾暢所欲言」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。リアルタイムでのレスポンスがあれば、\n応援を超え、『一緒に戦っている』感もでるかもしれん」
1051 = "「嗯，如果能夠即時回饋，就不止是支持，或許能造成一種“並肩作戰”的感覺」" 

# 【姜】
# display as 姜
# JP: 「まさに『育成』の醍醐味を、\nダイレクトに感じられそうです」
1400 = "「這樣大家就能直觀地感受到“培養”的樂趣所在」" 

# 【稀咲】
# display as 稀咲
# JP: 「現状案は、『擬人化』『育成』『勝負』のすべてを揃え、\nかつ――うん。ボクたちでコントロール可能になってる」
1314 = "「目前這個方案，可以說是集合了“擬人化”、“培養”和“競賽”三大要素，並且屬於我們可控的範疇」" 

# monologue
# JP: 勢いまかせのアイディアたちを、稀咲が整頓し始める。
1672 = "稀咲開始整理我們一股腦搬出的各種主意。" 

# 【稀咲】
# display as 稀咲
# JP: 「レイルロオドがご当地代表となり、他の地方の\nレイルロオドと名産品での売上勝負を繰り広げる」
1377 = "「讓鐵路人偶代表整個地區，以本地特產的銷售額與其他地區的鐵路人偶一決勝負」" 

# monologue
# JP: 整理されればすぐさまに、\n気になるところが浮き上がってくる。
1479 = "一旦開始總結，很快我就注意到其中的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「実現のためには、他の鉄道事業者の企画参加が必須だが\n――勝負となると、負けのリスクもでるゆえに……」
1292 = "「為了實現這個方案，其他鐵路公司的參與是不可或缺的，正因為競爭有輸贏，存在失敗的風險……」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、鉄道の性質上どうしても、なのかな。\n保守的なところがとても多いような印象もあるよね」
1053 = "「嗯，畢竟干鐵路這行的，大多在思想上也比較保守」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……御一夜鉄道と縁が一番深いとなると、\n現状では肥薩みかん鉄道となるが――どうだろう」
1267 = "「沒錯……目前和我們御一夜鐵路交情最深的，就是肥薩的橙鐵路了——他們會認可嗎？」" 

# monologue
# JP: あそこには、れいなをライバル視しているレイルロオド、\n紅もいる。条件的には非常に申し分ないのだが……
1587 = "橙鐵路還有一直視玲奈為勁敵的鐵路人偶，也就是指紅了，從客觀條件來說也是非常適合這個方案的……" 

# 【双鉄】
# display as 雙鐵
# JP: 「勝ち負けがつくとなると……関係も距離も近すぎるゆえ。\nお祭り、催事との印象をかなり強めねば、断られるやも」
900 = "「一旦關係到勝負輸贏……正因為我們交情太深，如果無法讓他們理解這是一種無關輸贏的活動，或許他們是不會答應的」" 

# 【稀咲】
# display as 稀咲
# JP: 「おやおや」
999 = "「又來了」" 

# monologue
# JP: くすっと、稀咲の小さな笑い。
1662 = "稀咲突然衝著我微微一笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄は対象が身近になればなるほど、近視眼的に――\n情緒という不安定なものだけを見がちになるよね」
938 = "「你一直都有這個傾向，一旦牽扯到與你關係親密的對象，你就容易無法把目光放長遠，拘泥於情感這個不安定的要素」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1056 = "「嗯？」" 

# 【稀咲】
# display as 稀咲
# JP: 「経営判断に最も大きな影響を与える要素。\nそれは情ではなくて、利だよ？　双鉄」
1433 = "「雙鐵你要知道，在經營策略上起決定性要素的可不是人情，而是利益哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の指摘が、僕の視界を大きく広げる。\nというかぐるりと急展開する。
1657 = "稀咲的一番話令我如夢初醒，思緒也隨之掙脫枷鎖飛速延展。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、利益を呼び込める企画であること、\nそこをプレゼンすればよいのか」
1129 = "「對啊，我們只要讓對方明白這個方案能夠帶來很大收益，對方自然會與我們合作」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。実際にこの企画は、鉄道人気の向上をはかると\n同時に、直接的に地元特産品の売上向上に繋げ得るよね」
1271 = "「沒錯，實際上我們的方案不僅能提升鐵路的熱度，還能夠直接帶動當地土特產的收益」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。売上合戦をするのだものな。利益の何％という\nロイヤリティフィーも、企画があたれば跳ね上がろうし」
1137 = "「對，畢竟是要競爭營業額，如果企劃大獲成功，也能收穫一大筆版權費，畢竟版權費是按照一定百分比的收益計算的」" 

# 【稀咲】
# display as 稀咲
# JP: 「『ご当地限定商品』を用意して、それはあえて\nネットから除外すれば、定期外客数の増加も見込める」
1192 = "「我們還可以準備一些限定地區發售的商品，只在當地實體店出售，這樣也能增加前來購買的遊客」" 

# 【姜】
# display as 姜
# JP: 「――ああ」
615 = "「——啊」" 

# monologue
# JP: 感心だろうか、安堵だろうか。\n姜さんの息から熱を感じる。
1537 = "姜小姐長吁了一口氣，或許是心有感慨，也或許是感到釋然。" 

# 【姜】
# display as 姜
# JP: 「仲国でも同時にこの企画を走らせることが叶うなら、\n[ヒノチュウ,2]日ノ仲戦も行えるようになりますね」
1101 = "「如果能同時在仲國實行這一套方案，我們還可以舉辦仲日對抗賽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！　そうか、この案はそこまで展開できるのか」
1031 = "「哦！對啊，還可以更進一步往國際交流發展」" 

# monologue
# JP: 視野が、希望が更に膨らむ。
1563 = "我們的視野，和心中的希望都在一步步向外擴張。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線に、その危機に苦しむ国は数多ある。\nそうした国の、いくらかでも企画参加してくれるなら」
1252 = "「有很多國家都深受大廢線之害，如果其中能有一部分也加入進來」" 

# 【稀咲】
# display as 稀咲
# JP: 「レイルロオド・ワールドトロフィー」
915 = "「也就是所謂的“鐵路人偶世界盃”了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1042 = "「啊！」" 

# monologue
# JP: 稀咲の言葉が、アイディアたちに枠を与える。\n全ての要素が結像していく。
1655 = "稀咲的一句話概括了我們的所有想法，將所有要素歸結為一個整體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだ――各国・各地方・各路線の誇りをかけ開発した\n地元特産の鉄道/キャラクターグッズを一つに集わせる」
1396 = "「這就是我們的最終目標——讓所有國家、地區乃至線路全力以赴打造的當地特產與鐵路及角色周邊集中於同一個平台」" 

# 【姜】
# display as 姜
# JP: 「ネットとご当地での販売だけでなく、アンテナショップ\nも欲しくなりますね。参加国それぞれの、例えば首都に」
1399 = "「這樣一來，除了在線上或者當地出售，還可以考慮在各個參加國的首都設立紀念品商店」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでの規模とできれば実店舗もさぞ盛り上がろう。\nネット・実店舗共通の販売期間を定め、売上を競い」
1105 = "「如果能達到如此規模，線下實體店的生意也會非常興隆，囊括線上線下，在既定時間內競爭商品銷售額」" 

# 【西瓜】
# display as 西瓜
# JP: 「その売上で第一位に輝いたものが、\n『レイルロオド・ワールドトロフィー』を獲得できる！」
1212 = "「排名第一的就能夠榮獲象徵鐵路人偶世界盃冠軍的金杯！」" 

# monologue
# JP: 西瓜の瞳もキラキラと、実に楽しげに輝いている。
1702 = "西瓜也是兩眼放光，表現得無比激動。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は是非参加して、\n栄光のトロフィーを勝ち取りたいです！！！」
1364 = "「西瓜也要參與進來，力爭摘得桂冠！！」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ……」
1040 = "「啊……」" 

# monologue
# JP: 座席にぐったりもたれる稀咲は、\n見るからに疲れてはいるが、幸せそうだ。
1653 = "稀咲無力地癱坐在座椅上，儘管她看起來疲憊不堪，卻是滿臉幸福。" 

# 【稀咲】
# display as 稀咲
# JP: 「みっちりだったね。一分の隙もなく、\n視察と会議をやり続けてた感さえあるよ」
1185 = "「我們幾乎是自始至終都在洽談，連一分鐘的空隙都沒有，我甚至覺得我們除了考察就是在開會討論」" 

# 【双鉄】
# display as 雙鐵
# JP: 「奇遇だな。僕もまったくおんなじように感じてる。\nなにせ飛行機の遅延すら、むしろ歓迎されたからなぁ」
941 = "「你說巧不巧，我剛好和你有著完全相同的感想，甚至連飛機晚點對我們來說都是求之不得」" 

# monologue
# JP: エアクラ時代になったとて、国際線はジャンボジェットだ。\n機材繰りうんぬんのトラブルも、昔と少しも変わらない。
1499 = "即便已經有了空凝機，國際航班依舊是依靠大型客機，所以和以前一樣容易因機器故障等原因晚點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「副丘からナビで無理やり帰ってもいいが――\n稀咲がよければ、今日はさすがに宿泊したい」
1432 = "「雖然我也可以讓Ｎａｖｉ帶我們從福岡返回御一夜，如果你不急著回去，今天我們還是住下來吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクもおんなじ気持ちだよ。いくらその為の招聘だって、\nさすがにちょっと、働き通しすぎたかとは思うもの」
1194 = "「我正有此意，儘管我們此行就是為工作而來，這一次的工作量還是讓我有點吃不消了」" 

# monologue
# JP: 深い溜息。\n疲労にどこか、満足感も混じったような。
1670 = "稀咲長吁了一口氣，除了疲憊，還能感受到她此時有多麼滿足。" 

# 【稀咲】
# display as 稀咲
# JP: 「……今回の道中、ふたりきりの時間だなんて、\nずっと爆睡してただけになっちゃったしね」
637 = "「……畢竟這一路上，二人獨處的時間全部被我們用來睡懶覺了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。見るもの全てが議論・検討の材料となった――\nというか、そうなるように姜さんが設定してくれたのか」
1275 = "「沒錯，而我們的所見所聞都為最後制定方案起到了很大作用，不如說，或許為我們安排行程的姜小姐也是有意而為之」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよ？　彼女は非常に有能だから」
1346 = "「肯定是的，畢竟她可是無所不能的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「パッと見では有能そうには見えぬ――\nように、多分、わざとしているのだろうな」
1047 = "「單看第一眼還難以發現她的才能——不過這一切應該都在她的安排之中」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね、秘書という立場もあるし。\n女性が有能そうに見えれば、それだけで障害も増えるし」
1196 = "「我覺得是這樣，畢竟她是秘書，如果女性過於將自己的才能表露在外，很容易帶來很多麻煩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、以前にもそのような話をきいたっけな」
1054 = "「嗯，記得你以前也說過類似的話」" 

# monologue
# JP: ゆえに、浦上さんは男装し、姜さんは平凡を装って――
1578 = "所以浦上小姐才要身著男裝，而姜小姐則是深藏不露——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……堂々たるものだな、稀咲は。有能さを隠さず、\nむしろ誇りとして、美しく鮮やかに振る舞っている」
639 = "「……而你就表現得光明磊落了，毫不掩飾自己的能力，反而引以為傲，以言行之美驚艷眾人」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、そう思ってもらえるなら嬉しいな」
1026 = "「哈哈，能得到你如此讚譽，我真高興」" 

# monologue
# JP: どこか安心しきったような、\n少女のようにあどけない笑み。
1520 = "她此時的笑容又顯得非常安心，宛如少女一般純真。" 

# 【稀咲】
# display as 稀咲
# JP: 「けど……どう？　実際に有能であれたのかなぁ。今回。\n一晩たつと、なかなかに問題点は多い気もする」
1007 = "「只不過……這一次我的表現能算讓你滿意嗎？到了第二天，我感覺自己又發現了不少問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「問題点か」
1044 = "「問題啊」" 

# monologue
# JP: 確かに数多思いつく。が、逆から見れば、\n最大の一点さえ超えてしまえればという思いもある。
1601 = "的確是能發現不少需要解決的問題，但是反過來說，我認為只要攻克最大的難關，其他也會跟著迎刃而解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく小規模でも第一回の実施を、だよな。\nそれが叶うか。ある程度の話題になるかが、極めて重い」
1036 = "「哪怕只是小規模的活動，總之我們要先把第一場對抗賽辦起來吧。能不能實現還很難說，而且關鍵在於能夠引起多大的反響」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよねぇ。もしやれたとして、\n継続的にどれだけの回数を実施できるかも不安だし」
1139 = "「就是啊，就算把頭開起來了，要怎麼一直辦下去也是個難題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「というと？」
963 = "「具體是指？」" 

# 【稀咲】
# display as 稀咲
# JP: 「単純な話。特産品の数。そっち方面は詳しくないけど、例えば御一夜でキャラクターグッズ化できる特産品って」
1412 = "「道理很簡單，就是特產的數量有限，儘管我對這方面並不了解，比如我們御一夜，能有多少可以設計周邊的特產？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ焼酎、包丁。川下り関連の……例えば救命胴衣や笠。\nクマ茶にクマ米。[にしき,1]二色の梨……は、足が早すぎるかな」
1256 = "「有隈燒酒、菜刀，還有漂流相關的……比如說救生衣，蓑笠。除此之外還有隈茶隈米，至於錦梨……怎麼保鮮是一個問題啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「通年販売できるものじゃないとまずくない？\n開催期間によっての有利不利ができてしまうもの」
1160 = "「必須得選一些全年都能提供的特產才行吧？不然活動的舉辦時間就很難平衡了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば――\nああ、梨ジュースなどに加工するという手でいけばいい」
927 = "「也是，如此說來——對了，只要加工成梨汁之類的商品就沒問題了」" 

# 【稀咲】
# display as 稀咲
# JP: 「そっか。加工品も考えたら、10や20、御一夜・クマ\nでも特産品は用意できるかも――うん、なら継続性も」
1130 = "「對啊，算上加工品的話，御一夜和隈元大概能拿得出十幾二十樣特產的——嗯，這樣一來短時間內就不用愁了」" 

# monologue
# JP: そこまで言って唐突に、稀咲は口を閉ざしてしまう。
1666 = "稀咲說到這裡，卻突然不作聲了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、どうした？」
1328 = "「稀咲，你怎麼不說話了？」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや」
903 = "「不是」" 

# monologue
# JP: また笑顔。\nけれど今度は、絵に描いたような苦笑だ。
1518 = "她又露出了笑容，只不過這一次屬於標準的苦笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「言った端からこれだ、と思っちゃってつい、ね。\nよっぽどボクは――ううん、ボクらは仕事好きなんだね」
896 = "「一想到自己三句不離工作，感覺就很無奈啊，看來我真是個工作狂——不對，應該說你我都是這樣」" 

# monologue
# JP: 稀咲の苦笑が伝染する。\nまったく否定できないゆえに。
1556 = "我不禁跟著她一起面露苦笑，因為我完全無法反駁稀咲的結論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ワーカホリックのきらいはあるよな。\n夫婦揃ってとなったときなど、完全に歯止めが効かん」
1187 = "「我們的確是過於沉迷工作了，尤其夫妻都是如此，就更是剎不住車了」" 

# 【稀咲】
# display as 稀咲
# JP: 「はは、似たもの夫婦ってヤツね、ボクたち」
1021 = "「哈哈，我們夫妻倆還真是速配」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。その点は瓜二つだ。が――」
1310 = "「的確是再相稱不過，然而——」" 

# 【稀咲】
# display as 稀咲
# JP: 「どうかした？」
1250 = "「有什麼問題？」" 

# monologue
# JP: 疲れのせいか、稀咲の顔はいつもより少し青白い。\n美しく可憐であるが、健康な笑顔の方がずっといい。
1506 = "可能是因為過於疲憊，稀咲的臉龐顯得比平時更加蒼白，儘管此時的她一樣美麗動人，但我肯定是更喜歡她精神煥發的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あらためて言葉にすると、かなり危ういと感じてな。\nなにかこう、具体的対策を考えた方がいいかもしれん」
898 = "「一旦談起這些方面，我還真覺得這不是什麼好兆頭了，或許我們需要想辦法給自己減負」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　例えば」
1230 = "「是嗎？那你說說該怎麼辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えばそう――月に一度……はとても無理でも、\n二ヶ月に一度程度は強制的に全面休暇を取る」
1265 = "「比如說每個月安排一次……感覺不太現實，還是每兩個月必須安排一次強制性的休假比較好」" 

# 【稀咲】
# display as 稀咲
# JP: 「全面休暇？」
1156 = "「強制性休假？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。どうあがいても仕事ができぬ状態にする休暇だ。\nデスクを離れて、どこか遠くへ旅に出るなど――」
1134 = "「對，就是讓自己無論如何都得放下工作休息，比如遠離辦公桌，去什麼地方旅行」" 

# monologue
# JP: 言って思わず稀咲を見れば、稀咲も僕をまじまじと見る。\nゆえに、吹き出す。ふたり同時に。
1575 = "我說到這裡不禁看向稀咲，而稀咲也盯著我看，我們幾乎是同時笑了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「旅に出たところで同じだよ！　ボクらそろって二人とも、\n隙あらば仕事の話をしちゃうんだから」
969 = "「出去旅行有什麼用！我們倆不管在哪裡，不一樣是三句不離工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。仕事の話をせぬようにするには……\nああ、会話ができない状況に陥ればいいのか」
1228 = "「是啊，要想不談工作……哦，只要讓我們處於無法交談的狀態就行了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、映画館とか？」
1025 = "「哈哈，比如去電影院？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは観劇とか――団体旅行なども有効かもな。\n誰の耳があるかわからん場所では、出来る話も限られる」
1201 = "「或者是觀賞舞台劇——參加團體旅遊也不失為一個辦法，畢竟要是周圍人多，有很多事情就不方便談了」" 

# 【稀咲】
# display as 稀咲
# JP: 「それだと出来る範囲での仕事の話をはじめるだけさ。\n丁度、いまこの状況とおんなじに」
1421 = "「那我們也只會拿方便談的工作作為話題，你看，現在不就是這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違いない。してみると僕らは……うむ。\n四六時中、のべつまくなしに仕事の話をしてるのだなぁ」
942 = "「你說得太對了，這麼看來我們簡直是……從早到晚都在談工作」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよ？　けどね。\n仕事の話は、仕事の話だけじゃないんだ」
1268 = "「沒錯呀，只不過呢，我們談工作，可不僅僅是在談工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1056 = "「嗯？」" 

# monologue
# JP: 笑いを含んだ嬉しげな声。\nふわり、稀咲の香りが漂う。
1522 = "她的聲音充滿喜悅，並帶著一絲笑意，轉眼間，稀咲的幽香便將我重重包圍。" 

# 【稀咲】
# display as 稀咲
# JP: 「わからない？　なら、いいことを教えてあげる」
940 = "「你不懂我的意思？那我有個好消息要告訴你」" 

# monologue
# JP: 稀咲が顔を寄せてくる。\nベルトがあるゆえ、僕からも耳を稀咲に寄せる。
1651 = "稀咲把臉湊了過來，因為繫著安全帶，我只能把耳朵湊過去" 

# 【稀咲】
# display as 稀咲
# JP: 「四六時中、のべつまくなしにイチャついてるのさ。\nボクとキミとは、どこにいたって何をしてても」
1189 = "「我們等於是從早到晚都在卿卿我我，不管我們身在何方在忙什麼，都是一樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1059 = "「噢噢」" 

# monologue
# JP: 嬉しくなる。\nこれが僕らの形なのだと、稀咲が言葉にしてくれたから。
1511 = "喜悅之情油然而生，因為稀咲一語中的，道出了我們恩愛的方式。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いちゃついてるのか。理屈で、思考で。\n確かにそうだな――稀咲と話すのはとても楽しい」
1190 = "「我們算是在卿卿我我吧，以交換意見，共同討論的方式。的確這麼說也不為過，因為與你的交流，能夠給我帶來莫大的樂趣」" 

# monologue
# JP: 機内ゆえ、言葉にせぬよう抑えぬが、直感としては、うむ。\n僕と稀咲は、思考でセックスしてるのだなと理解する。
1592 = "正因為是在機艙內，我只能不把話說得太明白。其實說白了，我們是讓彼此的思緒在一起纏綿。" 

# 【稀咲】
# display as 稀咲
# JP: 「のんきに観光してみたりとか。\nこういうのも、ね？　すごくいいけど」
954 = "「儘管悠閒地觀光度假也非常吸引我」" 

# monologue
# JP: 肘掛けの上の手に手がかさなる。\n指の隙間のひとつひとつに、稀咲の指が入ってくる。
1516 = "在扶手之上，我們的手疊在了一起，十指相扣。" 

# 【稀咲】
# display as 稀咲
# JP: 「フィジカルなイチャイチャとおんなじくらい。\nボクはね、ロジカルなイチャイチャも大好きなんだ」
906 = "「不止是彼此身體的親熱，心靈的纏綿也是我的最愛」" 

# monologue
# JP: 稀咲の肌の、絹よりもなお滑らかで上品な肌触り。\nこの感触と同じくらいの快感を――
1660 = "稀咲的肌膚有如絹絲般光滑細膩，除此之外我還能感受到同樣舒心的快感——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、稀咲。言葉を交えることもどこまでも心地よい。\nつまりはこれが、相性というものなのだろうな」
1171 = "「我也是的，稀咲，只是言語上的交流，都能讓我感到無比愉悅，或許這也表明了我們是多麼般配的一對」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。相性だし、愛情だ」
1269 = "「沒錯，同時也能代表我們對彼此的愛」" 

# monologue
# JP: キスをしている。\n唇ではなく、言葉と言葉、思考と思考で。
1595 = "無需嘴唇交合，我們通過話語和思緒的共鳴，已經獲得了不亞於親吻的快感。" 

# 【稀咲】
# display as 稀咲
# JP: 「つまりね、双鉄」
1434 = "「雙鐵，換句話來說」" 

# monologue
# JP: 言葉が、思考が、稀咲が僕を愛撫する。
1649 = "稀咲憑藉話語和思緒，來愛撫我的心靈。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクたちは、どうしようもないバカップルなのさ」
1183 = "「我們可謂是一對無可救藥的熱戀情侶」" 
