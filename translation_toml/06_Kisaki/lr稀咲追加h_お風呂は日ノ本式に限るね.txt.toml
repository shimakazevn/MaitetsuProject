1439 = "Bầu ngực, nhũ hoa, mỗi lần xoa bóp lại trơn tuột trượt đi mất. Mỗi lần như vậy, đầu nhũ hoa cứng ngắc lại lưu lại một kích thích dễ chịu trên ngón tay."
# 【稀咲】
# display as 稀咲
