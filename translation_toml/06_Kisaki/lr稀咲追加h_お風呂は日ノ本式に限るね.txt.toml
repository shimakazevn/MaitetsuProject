1287 = "「Anh hiểu rồi. Cho đến khi em thỏa mãn, anh sẽ không rút ra, cũng không cử động.」"
# 【稀咲】
# display as 稀咲
# JP: 「う……ん。ふ、ふっ――ありがと、双鉄」
1144 = "「Ư……m. Phù, phù——cảm ơn anh, Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それをいうなら、僕のほうこそ、だ」
1317 = "「Nếu nói vậy thì, anh mới là người phải cảm ơn.」"
# monologue
# JP: 子供を作る。子供を授かる。そうあることをこれほど願う。\n稀咲と出会い結ばれなければ、ありえなかった今だと思う。
1528 = "Tạo ra những đứa trẻ. Mang thai những đứa trẻ. Tôi khao khát điều đó đến nhường này. Nếu không gặp và gắn kết với Kisaki, tôi nghĩ hiện tại này sẽ không thể xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
# 1300 = "「稀咲」" 
# monologue
# JP: だから感謝を伝えたい。\nいまできることなど本当に、たかが知れてはいるけれど。
1567 = "Vì vậy, tôi muốn bày tỏ lòng biết ơn. Dù những gì tôi có thể làm bây giờ thực sự rất nhỏ bé."
# monologue
# JP: （さすっ）
1851 = "（Xoa xoa）"
