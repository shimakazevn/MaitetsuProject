# JP: ウソというなら、ひとまず悪いことだろう。\n仕置きのつもりで、軽ぅくクリトリスを弾いてみる。
1711 = "Nếu đã nói dối, thì trước mắt đó là một việc xấu. Như một hình phạt, tôi khẽ búng nhẹ vào âm vật của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜそのようなウソを？」
1268 = "「Tại sao em lại nói dối như vậy?」"
# 【稀咲】
# display as 稀咲
# JP: 「だって――だって、ボクっ――\n予習……必要……だと思った、から」
1183 = "「Tại vì——Tại vì, tôi—— nghĩ rằng…… cần phải…… chuẩn bị trước, nên mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1133 = "「!!!」"
# monologue
# JP: 一瞬意味をつかめなかったヨシュウの響きが、\nじわじわ理解に、そして喜びに変化していく。
1497 = "Âm vang của từ 'chuẩn bị trước' mà thoáng chốc tôi không hiểu được ý nghĩa, dần dần biến thành sự thấu hiểu, và rồi là niềm vui sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「いつごろからだ？　予習の必要を感じたのは」
1043 = "「Từ khi nào vậy? Em cảm thấy cần phải chuẩn bị trước ấy.」"
# monologue
# JP: （くちいいいっっっっっ）
1883 = "(Nhóp nhép)"
# 【稀咲】
# display as 稀咲
# JP: 「はうんっっっっ」
1125 = "「Ha ưm.」"
# monologue
# JP: 愛おしくってたまらなくなり、亀頭先端を膣口に当てる。\n食い込むか食い込まないか、ゼロ距離でただ密着させる。
1521 = "Trở nên đáng yêu đến mức không thể chịu nổi, tôi áp đỉnh quy đầu vào cửa âm đạo. Lún vào hay không lún vào, chỉ đơn giản là áp sát ở cự ly số không."
# 【双鉄】
# display as 雙鐵
# JP: 「こういうことを想定し、稀咲が予習を開始したのは？」
1044 = "「Kisaki bắt đầu chuẩn bị trước, là vì đã lường trước được những chuyện thế này sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「具体的――にはっ――覚えて、ない――けどっ――」
1058 = "「Cụ thể——thì——tôi không, nhớ——nhưng mà——」"
# monologue
# JP: 稀咲の声に、重なっている部分が震える。\n膣口は激しくわなないて、僕の亀頭を呑み込もうとする。
1536 = "Theo giọng nói của Kisaki, phần cơ thể đang chạm nhau của chúng tôi cũng run rẩy. Cửa âm đạo run lên dữ dội, như muốn nuốt chửng lấy quy đầu của tôi."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄と……プライベートの、話――するように、なって。\nだんだん、ボク――双鉄のこと――ほしいって、思って」
1234 = "「Kể từ khi…… bắt đầu nói chuyện, riêng tư——với anh Soutetsu. Dần dần, tôi——đã nghĩ rằng——mình muốn, anh Soutetsu.」"
# monologue
# JP: かわいい。愛しい。挿入したい。思い切り膣内射精したい。\nその衝動を、話の続きを聞きたい一心でひたすら抑える。
1499 = "Thật dễ thương. Thật đáng yêu. Muốn cắm vào quá. Muốn xuất tinh trong thật thỏa thích. Tôi cố gắng kìm nén sự thôi thúc đó, chỉ với một mong muốn duy nhất là được nghe tiếp câu chuyện."
# 【稀咲】
# display as 稀咲
# JP: 「そういうこと、に――なった――とき――はずかしく、\nないように、と――。……あと……ね？　あと――ボク」
1266 = "「Để khi——chuyện đó, xảy ra——thì sẽ không, bị xấu hổ——. ……Và…… nhé? Và——tôi.」"
# monologue
# JP: 稀咲の全身がぽーっと綺麗な桜色に染まってる。\n羞恥と混じる性欲が、稀咲を鮮やかに艶めかせている。
1634 = "Toàn thân Kisaki ửng lên một màu hồng đào tuyệt đẹp. Sự ham muốn nhục dục xen lẫn sự ngượng ngùng, đang làm cho Kisaki trở nên vô cùng rực rỡ và quyến rũ."
# 【稀咲】
# display as 稀咲
# JP: 「ボク、綺麗ってほめられるから――ルックス、とかも、\n好きになってもらう、ための――武器に、したくて」
1184 = "「Tôi, thường được khen là xinh đẹp——nên vẻ ngoài, các thứ, tôi cũng muốn biến chúng thành——vũ khí, để khiến anh thích tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕たちのはじめてのセックスのとき」
1360 = "「Nếu vậy, lúc chúng ta làm tình lần đầu tiên.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、だよ。予習したなんて思われたくなくて、\nボク、つまらない見栄はっちゃったんだ」
1247 = "「Đúng, vậy đấy. Vì không muốn bị nghĩ là đã chuẩn bị trước, nên tôi, đã sĩ diện hão đấy.」"
# monologue
# JP: これほど僕に、愛おしく嬉しく思わせてくれているのに、\n稀咲の声は、本気でもうしわけなさそうだ。
1643 = "Mặc dù đã khiến tôi cảm thấy đáng yêu và vui sướng đến nhường này, nhưng giọng điệu của Kisaki lại có vẻ thực sự hối lỗi."
# 【稀咲】
# display as 稀咲
# JP: 「本当はボク、いっぱいいっぱでテンパってたんだ。\nけど、セックス。絶対失敗したくなかったから」
1055 = "「Thực ra lúc đó tôi, đã vô cùng lúng túng và hoảng loạn. Nhưng mà, chuyện làm tình. Tôi tuyệt đối không muốn bị thất bại.」"
# monologue
# JP: だから稀咲は、知識抱負なフリで僕をリードしてくれた。\n上手に僕をリードして、セックスに夢中にならせてくれた。
1570 = "Vì vậy Kisaki đã giả vờ như có rất nhiều kiến thức để dẫn dắt tôi. Dẫn dắt tôi một cách khéo léo, khiến tôi đắm chìm vào tình dục."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲のおかげで、僕は助けてもらったのだな。\nいや――セックスのことだけではないか」
1280 = "「Nhờ có Kisaki, mà tôi đã được cứu rỗi nhỉ. À không——Không chỉ riêng chuyện làm tình đâu.」"
# monologue
# JP: 余裕綽々、自信満々。\n稀咲のそんな振る舞いは、いつでも僕を支えてくれてる。
1684 = "Luôn dư dả thời gian, tràn đầy tự tin. Những hành xử như vậy của Kisaki, lúc nào cũng là điểm tựa cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「知ってはいたが、理解できていなかった。\n稀咲こそ、本当の努力家なのだな」
1225 = "「Dù tôi có biết, nhưng lại chưa thể hiểu thấu được. Kisaki mới thực sự là một người luôn nỗ lực hết mình.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん、そうだよ。ボクいつだって頑張ってる。\n今も、そう――双鉄とボクの、赤ちゃん、ほしくて」
1167 = "「Ừm, đúng vậy đấy. Lúc nào tôi cũng cố gắng hết sức. Bây giờ, cũng vậy——Tôi muốn có, em bé, của anh Soutetsu và tôi.」"
# monologue
# JP: 苦しいであろう姿勢の下で、それでも稀咲は腰を動かす。\nおまんこをなんとか持ち上げて、僕の勃起を呑み込もうと。
1651 = "Dưới tư thế chắc hẳn là rất khó khăn, Kisaki vẫn cử động hông. Cố gắng nâng âm đạo lên, như muốn nuốt trọn lấy dương vật đang cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、いつもとおんなじように。\n僕に、正解を示してほしい」
816 = "「……Nếu vậy, hãy giống như mọi khi. Hãy chỉ cho tôi, câu trả lời chính xác đi.」"
# monologue
# JP: （ず――むっ――）
# 1845 = "（插入）" 
# 【稀咲】
# display as 稀咲
# JP: 「んっ――はっ――あっ――\nそう、てつ――太っ――んっ――うぅっっ」
1137 = "「Ưm——Ha——A——\nAnh Sou, tetsu——To quá——Ưm——Ư.」"
# monologue
# JP: 亀頭全部を埋め込めば、稀咲は切なげな息を吐く。
1737 = "Khi tôi vùi trọn quy đầu vào trong, Kisaki thở hắt ra một hơi đầy nghẹn ngào."
# 【双鉄】
# display as 雙鐵
# JP: 「ここから先。僕はどのようにすればいい？」
1239 = "「Từ giờ trở đi. Tôi phải làm thế nào đây?」"
# 【稀咲】
# display as 稀咲
# JP: 「はぁっ――はあっ――はあっ――はあっ――。\nん……うん。わかったよ。双鉄」
1087 = "「Haa——Haa——Haa——Haa——. Ưm…… Ừm. Tôi hiểu rồi. Anh Soutetsu.」"
# monologue
# JP: やがて落ち着く呼吸の下から、\n稀咲はつとめて、いつもに近い声をくれる。
1495 = "Sau khi nhịp thở dần ổn định lại, Kisaki cố gắng cất giọng nói gần giống với thường ngày nhất."
# 【稀咲】
# display as 稀咲
# JP: 「体位は、これで大正解。んっ――膣口が高くて、\n子宮が低く。だからっ――精液、が――こぼれないっ」
1277 = "「Tư thế, thế này là hoàn toàn chính xác. Ưm——Cửa âm đạo ở trên cao, tử cung ở dưới thấp. Vì thế——tinh dịch, sẽ——không bị tràn ra ngoài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「正解ならば、この次は？」
1246 = "「Nếu đã chính xác rồi, thì tiếp theo là gì?」"
# 【稀咲】
# display as 稀咲
# JP: 「そのまま、ペニスを――ボクのっ、ヴァギナに、挿入、\nしてっ――それで――子宮に、精液」
1209 = "「Cứ thế, cắm dương vật——vào âm đạo, của tôi, đi——Rồi sau đó——xuất tinh dịch, vào tử cung.」"
# monologue
# JP: （じゅぶううううううううううっっ！！　ごりゅっ！！）
1880 = "(Sùng sụcccccccc!! Cục!!)"
# 【稀咲】
# display as 稀咲
# JP: 「んひゅううううううううううっっっっっっっっ！！！」
1159 = "「Ưm hyuuuuuuuuuuuuuu!!!」"
# monologue
# JP: （じゅるるうううううううううううううううっっっ！）
1867 = "(Sùng sụccccccccccccc!)"
# 【稀咲】
# display as 稀咲
# JP: 「あっ！　あっ！！！　双鉄っ！！！！\nそれっ！　それっ！　それっ！　しょれええええっ！」
1132 = "「A! A!!! Anh Soutetsu!!!! Đúng rồi! Đúng rồi! Đúng rồi! Đúng rồi ôi ôi ôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ！」
# 1130 = "「啊！」" 
# monologue
# JP: 稀咲の膣はもう完全に出来上がってる。\n精液を絞るそのためだけに、僕の勃起を待ち伏せしていて
1678 = "Âm đạo của Kisaki đã hoàn toàn sẵn sàng. Chỉ chực chờ vắt kiệt tinh dịch, nó phục kích lấy dương vật cương cứng của tôi."
# monologue
# JP: （ぶぢゅううううううううっっっっ！！　ごちゅんっ！）
1868 = "(Phập bập bập bập bập!! Cục!)"
# 【稀咲】
# display as 稀咲
# JP: 「はうっ！　それっ――しゅきっ――すきいいっっ！！\n子宮！　ペニスでっ――ごちゅって――ごつんてっっ」
1126 = "「Hau! Đúng rồi——Thích quá——Thích lắmmmm!! Tử cung! Bị dương vật——đâm cái cục——húc mạnh vào.」"
# monologue
# JP: （ぞりゅうううううううううっっっっっっっっ！！！）
1834 = "(Sùng sụcccccccc!!!)"
# 【稀咲】
# display as 稀咲
# JP: 「ひあっ――やあっ――ぬいちゃっ――やあ！　んっ！\nもっと！　もっと！　もっと！　もっとおおおっ！！！」
1071 = "「Hia——A——Đừng rút ra——A! Ưm!\nNữa! Nữa! Nữa! Nữa đi!!!」"
# monologue
# JP: 滑りそうゆえ、ゆっくり長くで試したが、\n稀咲が求めてくれるのならばっ――っ！！！
1473 = "Vì có vẻ trơn trượt, nên tôi đã định thử làm thật chậm và dài, nhưng nếu Kisaki đã yêu cầu như vậy thì——!!!"
# monologue
# JP: （じゅぼっ！！　ごりゅっ！　じゅぶうっ！　ぐりゅ！）
1879 = "(Sùng sục!! Cục! Sùng sục! Cục!)"
# 【稀咲】
# display as 稀咲
# JP: 「来たっ！　これっ！　ずぼずぼっ！　ごちゅごちゅっ！\nリズム、これ、しゅきっ！　いいのぉ、いいっ、好きっ」
1050 = "「Đến rồi! Là cái này! Phập phập! Cục cục! Nhịp điệu, này, thích quá! Sướng quá, sướng, thích lắm.」"
# monologue
# JP: （ずびゅっ！　ごちゅっ！　じゅぼっ！　ぶちゅんっ）
1816 = "(Phập! Cục! Sùng sục! Phập!)"
# 【稀咲】
# display as 稀咲
# JP: 「もっと！　してっ！　リズム、このままっ――\nボクの、ヴァギナっ――双鉄の――ペニス、でっ！！」
1059 = "「Làm! Nữa đi! Cứ giữ nguyên, nhịp điệu này—— Âm đạo, của tôi——Bằng dương vật——của anh Soutetsu!!」"
# monologue
# JP: （びゅぼっ！　ぐちゅっ！　ぼちゅっ！！　ずりゅっ！）
1882 = "(Phập! Sùng sục! Phập!! Trượt!)"
# monologue
# JP: 勃起全部が稀咲の膣に絞られながら逆撫でされるっ！！
1677 = "Toàn bộ dương vật cương cứng bị âm đạo của Kisaki siết chặt và vuốt ve ngược lại!!"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ――くっ――ぁっ――ぉっ」
780 = "「——Ư——Hự——A——O.」"
# monologue
# JP: （ずびゅっ！　じゅちゅっ！　ぶりゅっ！　ごちゅっ）
1822 = "(Phập! Nhóp nhép! Phập! Cục)"
# monologue
# JP: あれほど望んだ射精を今は、けれども必死でこらえてる。\nこの快感を、少しでも長く味わいたくて――
1462 = "Dù lúc nãy khao khát xuất tinh là thế, nhưng giờ đây tôi lại đang liều mạng kìm nén. Chỉ vì muốn tận hưởng khoái cảm này lâu thêm chút nữa——"
# monologue
# JP: （にゅぼっ！　ぶちゅっ！　じゅうっ！　ごちゅっ！！）
# 1879 = "（進進出出）" 
# 【稀咲】
# display as 稀咲
# JP: 「ああっ――しゅごいっ――ふとくてっ――あつ、くてっ\nヴァギナ――子宮――ボク――ダメに――されちゃうっ」
1108 = "「Aa——Tuyệt quá——To quá——Nóng, quá Âm đạo——Tử cung——Tôi——Sắp hỏng——mất rồi.」"
# monologue
# JP: （じゅぶっ！　ぐちゅっ！　ぶふゅっ！　ちゅぢゅ！）
# 1816 = "（反覆抽插）" 
# monologue
# JP: 声を出したら射精する。解るゆえ歯を食いしばり、\nそれでも呻きは、喉の奥から勝手に漏れる。
1562 = "Nếu lên tiếng thì sẽ xuất tinh mất. Hiểu rõ điều đó nên tôi nghiến chặt răng, nhưng những tiếng rên rỉ vẫn tự động bật ra từ sâu trong cổ họng."
# monologue
# JP: （ぼぢゅっ！　ごちゅっ！　じゅぶっっ！　ずちゅ！）
# 1879 = "（進進出出）" 
# 【稀咲】
# display as 稀咲
# JP: 「双鉄――そう、てつ――ね、ボク――ボク――もうっ、\nもう――ねっ――イキ――そうっ――んっ――ぁあっ」
1361 = "「Anh Soutetsu——Anh Sou, tetsu——Này, tôi——tôi——sắp, sắp——này——lên đỉnh——rồi——ưm——aa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ぅ――少し――だ、けっ――」
776 = "「——Ư——Một chút——nữa, thôi——」"
# monologue
# JP: （びゅぢゅっ！　ごりゅ！　でゅぼっ！　ずりゅん！！）
1862 = "(Phập! Cục! Phập! Trượt!!)"
# 【稀咲】
# display as 稀咲
# JP: 「わかっ――た――あっ――んっ　がまんっ――ボクっ、\nんっ――はっ――ボクっ――がまん――するっ！！！」
1286 = "「Tôi hiểu——rồi——a——ưm, sẽ nhẫn nhịn——tôi, ưm——ha——tôi——sẽ nhẫn nhịn!!!」"
# monologue
# JP: いいこだと撫でてやりたい。伝えたい。\nけれどもそうする余裕など、どこを探しても存在しない。
1538 = "Tôi muốn xoa đầu khen em ấy ngoan. Muốn truyền đạt cho em ấy biết. Nhưng dù có tìm mỏi mắt cũng chẳng còn chút dư dả nào để làm việc đó."
# monologue
# JP: （ぢゅぶっ！　ごちゅっ！　づぢゅっ！　ぐりゅん！）
# 1822 = "（大開大合）" 
# 【稀咲】
# display as 稀咲
# JP: 「イクっ、ときっ！　一緒っ――ねっ――だからっ――\nリズムっ――かえてっ――イクとき――イクときぃっ」
1365 = "「Lúc, lên đỉnh! Cùng nhau——nhé——Thế nên—— Thay đổi——nhịp điệu đi——Lúc lên đỉnh——Lúc lên đỉnh ấy.」"
# monologue
# JP: 余裕が無いのを、稀咲も理解してくれている。\nなんと賢くいい女だろう。射精欲求がさらに膨らむ。
1630 = "Kisaki cũng hiểu rằng tôi không còn chút dư dả nào. Thật là một người phụ nữ thông minh và tuyệt vời. Khao khát xuất tinh càng lúc càng dâng trào."
# monologue
# JP: （ぼぢゅっ！　ごりゅっ！　じゅぶううっ！　ごりゅっ）
# 1816 = "（反覆抽插）" 
