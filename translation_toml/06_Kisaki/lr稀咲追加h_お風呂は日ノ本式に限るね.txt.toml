1268 = "「Tại sao em lại nói dối như vậy?」"

# 【稀咲】
# display as 稀咲
# JP: 「だって――だって、ボクっ――\n予習……必要……だと思った、から」
1183 = "「Tại vì——Tại vì, tôi——\nnghĩ rằng…… cần phải…… chuẩn bị trước, nên\nmới.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1133 = "「!!!」"

# monologue
# JP: 一瞬意味をつかめなかったヨシュウの響きが、\nじわじわ理解に、そして喜びに変化していく。
1497 = "Âm vang của từ 'chuẩn bị trước' mà thoáng\nchốc tôi không hiểu được ý nghĩa,\ndần dần biến thành sự thấu hiểu, và rồi là\nniềm vui sướng."

# 【双鉄】
# display as 雙鐵
# JP: 「いつごろからだ？　予習の必要を感じたのは」
1043 = "「Từ khi nào vậy? Em cảm thấy cần phải\nchuẩn bị trước ấy.」"

# monologue
# JP: （くちいいいっっっっっ）
1883 = "(Nhóp nhép)"

# 【稀咲】
# display as 稀咲
# JP: 「はうんっっっっ」
1125 = "「Ha ưm.」"

# monologue
# JP: 愛おしくってたまらなくなり、亀頭先端を膣口に当てる。\n食い込むか食い込まないか、ゼロ距離でただ密着させる。
1521 = "Trở nên đáng yêu đến mức không thể chịu\nnổi, tôi áp đỉnh quy đầu vào cửa âm đạo.\nLún vào hay không lún vào, chỉ đơn giản là\náp sát ở cự ly số không."

# 【双鉄】
# display as 雙鐵
# JP: 「こういうことを想定し、稀咲が予習を開始したのは？」
1044 = "「Kisaki bắt đầu chuẩn bị trước, là vì đã\nlường trước được những chuyện thế này\nsao?」"

# 【稀咲】
# display as 稀咲
