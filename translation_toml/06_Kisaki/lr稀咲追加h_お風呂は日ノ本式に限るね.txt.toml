1528 = "Tạo ra những đứa trẻ. Mang thai những đứa\ntrẻ. Tôi khao khát điều đó đến nhường này.\nNếu không gặp và gắn kết với Kisaki, tôi\nnghĩ hiện tại này sẽ không thể xảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
# 1300 = "「稀咲」" 

# monologue
# JP: だから感謝を伝えたい。\nいまできることなど本当に、たかが知れてはいるけれど。
1567 = "Vì vậy, tôi muốn bày tỏ lòng biết ơn.\nDù những gì tôi có thể làm bây giờ thực sự\nrất nhỏ bé."

