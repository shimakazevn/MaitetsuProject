1135 = "「っ!?」"
# monologue
# JP: 稀咲の気持ちが痛いくらいに伝わってくる。\nとはいえこの体勢では、キスのひとつもしてやれない。
1564 = "Tôi có thể cảm nhận được tâm trạng của Kisaki đến mức nhói lòng. Nhưng với tư thế này, tôi thậm chí còn không thể trao cho em ấy một nụ hôn."
# 【双鉄】
# display as 雙鐵
