1560 = "Dù lý trí đã bị thuyết phục, nhưng cơ thể thì không thể nhẫn nhịn thêm được nữa. Để kích thích Kisaki thêm chút nào hay chút đó, tôi càng ra sức ái ân ngọt ngào hơn."
# monologue
