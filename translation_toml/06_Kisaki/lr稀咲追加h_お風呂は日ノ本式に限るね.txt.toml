# 1807 = "（不停射精）" 
# monologue
# JP: 稀咲の求めに身体が応え\n挿入したまま身体を思い切り潰すようにして押し付ける。
1544 = "Cơ thể tôi đáp lại mong muốn của Kisaki, trong khi vẫn cắm bên trong, tôi đè mạnh xuống như muốn nghiền nát cơ thể em ấy."
