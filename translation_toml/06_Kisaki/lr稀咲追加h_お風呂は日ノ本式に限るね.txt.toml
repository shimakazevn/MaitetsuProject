1355 = "「Vẫn chưa——được sao——Anh Sou, tetsu——Tôi, không ——chịu nổi nữa——không chịu nổi nữa——ưm——Xin anh đấy, anh Sou, tetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ――くっっ――妊娠、する――にはっ」
778 = "「——Ư——Hự——Để, mang thai——thì.」"
