# JP: ローションで逃げてしまう分、刺激は、摩擦は軽減される。\nその生殺しの快感が身体全部にどろりどろりと溜まってく。
1600 = "Do lotion làm trơn tuột nên sự kích thích và ma sát bị giảm đi. Khoái cảm nửa vời đó cứ từ từ tích tụ lại khắp cơ thể."
# 【双鉄】
# display as 雙鐵
