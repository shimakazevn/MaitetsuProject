1058 = "「Cụ thể——thì——tôi không, nhớ——nhưng mà——」"

# monologue
# JP: 稀咲の声に、重なっている部分が震える。\n膣口は激しくわなないて、僕の亀頭を呑み込もうとする。
1536 = "Theo giọng nói của Kisaki, phần cơ thể\nđang chạm nhau của chúng tôi cũng run rẩy.\nCửa âm đạo run lên dữ dội, như muốn nuốt\nchửng lấy quy đầu của tôi."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄と……プライベートの、話――するように、なって。\nだんだん、ボク――双鉄のこと――ほしいって、思って」
1234 = "「Kể từ khi…… bắt đầu nói chuyện, riêng\ntư——với anh Soutetsu.\nDần dần, tôi——đã nghĩ rằng——mình muốn, anh\nSoutetsu.」"

# monologue
# JP: かわいい。愛しい。挿入したい。思い切り膣内射精したい。\nその衝動を、話の続きを聞きたい一心でひたすら抑える。
1499 = "Thật dễ thương. Thật đáng yêu. Muốn cắm\nvào quá. Muốn xuất tinh trong thật thỏa\nthích.\nTôi cố gắng kìm nén sự thôi thúc đó, chỉ\nvới một mong muốn duy nhất là được nghe\ntiếp câu chuyện."

# 【稀咲】
# display as 稀咲
