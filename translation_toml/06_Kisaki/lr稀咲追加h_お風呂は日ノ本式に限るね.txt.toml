# monologue
# JP: 亀頭を両手でぬらぬらつつみ、\nつつんだままで、稀咲は尻を、背中を大きく動かし始める。
1654 = "Dùng hai tay trơn tuột bao bọc lấy quy\nđầu,\ngiữ nguyên tư thế đó, Kisaki bắt đầu\nchuyển động mạnh mông và lưng."

# monologue
# JP: （ぬりゅっ――んぢゅっ――にゅぶっ――クリュっ――）
1871 = "(Trơn tuột——Nhóp nhép——Nhóp nhép——Sột\nsoạt——)"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁあっ――ううっ――く、あ――気持ち、いい――\n確かにぞわぞわ――気持ちいいのは、確か――なのだが」
1121 = "「Aaa——Ư——Ku, a——Sướng, quá——\nĐúng là râm ran——sướng thì, có sướng\nthật——nhưng mà.」"

# monologue
# JP: ローションで逃げてしまう分、刺激は、摩擦は軽減される。\nその生殺しの快感が身体全部にどろりどろりと溜まってく。
1600 = "Do lotion làm trơn tuột nên sự kích thích\nvà ma sát bị giảm đi.\nKhoái cảm nửa vời đó cứ từ từ tích tụ lại\nkhắp cơ thể."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲――稀咲」
1299 = "「Kisaki——Kisaki.」"

# monologue
# JP: ゆえに囁く。ローションごとねぶるようにして、\n稀咲の耳にキスをしながら。
1565 = "Vì thế tôi thì thầm. Vừa hôn lên tai\nKisaki,\nvừa như mút trọn cả lớp lotion."

# 【双鉄】
# display as 雙鐵
# JP: 「一度ローションを洗い流して」
1053 = "「Tắm rửa sạch lớp lotion này đi đã.」"

# 【稀咲】
# display as 稀咲
# JP: 「ダメ、だよ――双、鉄――んっ――あっ――\n今は――まだ、ダメ」
1025 = "「Không được, đâu——Anh Sou, tetsu——Ưm——A——\nBây giờ——vẫn chưa, được đâu.」"

# monologue
# JP: 稀咲が身体の動きを止める。\n亀頭だけは、しつこくぬらぬら弄んだまま。
1633 = "Kisaki dừng cử động cơ thể.\nChỉ có quy đầu là vẫn bị trêu đùa một cách\ndai dẳng và trơn tuột."

# 【双鉄】
# display as 雙鐵
# JP: 「ダメとは――どうして」
1267 = "「Không được là sao——Tại sao chứ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ボク……ね？　ずっと、思ってるんだ。\n双鉄との赤ちゃんが欲しい、って」
1232 = "「Tôi…… nhé? Lúc nào cũng, nghĩ rằng.\nMuốn có em bé với anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1366 = "「!」"

# monologue
# JP: （さすっ――もみゅっ――にゅりゅっ――さすうっ）
1840 = "(Vuốt ve——Xoa nắn——Trơn tuột——Vuốt ve)"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅ……あっ――」
# 1097 = "「唔……啊——」" 

# monologue
# JP: 指が下へと移動する。揉まれるタマがにゅるにゅる逃げて、\nもどかしさをさらに募らせられる。
1492 = "Những ngón tay di chuyển xuống dưới. Hai\nhòn dái bị xoa bóp cứ trơn tuột trượt đi,\ncàng làm tăng thêm sự nôn nóng."

# 【稀咲】
# display as 稀咲
# JP: 「それでね？　知人に聞いたんだ。\n赤ちゃんを授かりやすくなる、セックスのポイント」
1272 = "「Thế là nhé? Tôi đã hỏi một người quen.\nVề bí quyết làm tình, để dễ có em bé hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ」
1148 = "「Ưm…… Hự.」"

# monologue
# JP: 明らかに寸止めを意識している手指の動きが、\n恐らくはその“ポイント”だろうと伝わてくる。
1488 = "Chuyển động của những ngón tay rõ ràng\nđang cố tình dừng lại ngay trước vạch\nđích,\ncho tôi biết rằng đó có lẽ chính là 'bí\nquyết' mà em ấy nói."

# 【稀咲】
# display as 稀咲
# JP: 「膣内射精してもらうまで、イかない方がいいんだって。\n男も、女も、我慢して我慢して、溜めとくの」
1192 = "「Nghe nói là không nên lên đỉnh cho đến\nkhi được xuất tinh trong.\nCả nam, lẫn nữ, đều phải nhẫn nhịn và nhẫn\nnhịn, để tích tụ lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いまでも、十分――我慢。している、つもりだが――\nそれでも、我慢が――足りない、の――ならっ」
1237 = "「Đến giờ, tôi đã——nhẫn nhịn. Đủ lắm rồi,\nvậy mà——\nNếu thế này, vẫn chưa——đủ, sao——」"

# monologue
# JP: （にゅるっっ）
1843 = "(Trơn tuột)"

# 【稀咲】
# display as 稀咲
# JP: 「んきゅんっ！！！！」
1161 = "「Ưm kyun!!!!」"

# monologue
# JP: 勃起と性器の隙間に手を挿れ、\nクリトリスにローションをたっぷりなじませる。
1542 = "Tôi luồn tay vào khe hở giữa dương vật và\nâm đạo,\nthoa đẫm lotion lên âm vật."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲を、イカ、せる――寸前まで。乳首と、クリトリス――を、愛撫、して――そのまま、挿入――すれば」
1235 = "「Tôi sẽ khiến Kisaki, lên đỉnh——ngay sát\nnút. Ái ân, đầu nhũ hoa và, âm vật——\nrồi cứ thế, cắm vào——là được chứ gì.」"

# 【稀咲】
# display as 稀咲
# JP: 「ダメ……なのっ――双鉄。だって――体位。\nこの体位だと……んっ――精液、こぼれ、やすいから」
1349 = "「Không được…… đâu——Anh Soutetsu. Tại\nvì——tư thế.\nTư thế này thì…… ưm——tinh dịch, rất dễ, bị\ntràn ra ngoài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「多少――こぼれても――変わらんだろう」
1188 = "「Có tràn ra——một chút——cũng chẳng sao\nđâu.」"

# monologue
# JP: （にゅぢゅっ！）
# 1842 = "（揉捏）" 

# 【稀咲】
# display as 稀咲
# JP: 「んゅっ！！」
1163 = "「Ưm!!」"

# monologue
# JP: 頭は納得させられるものの、身体はもはや我慢できない。\n稀咲を少しでも煽れるように、愛撫をいっそう甘くする。
1560 = "Dù lý trí đã bị thuyết phục, nhưng cơ thể\nthì không thể nhẫn nhịn thêm được nữa.\nĐể kích thích Kisaki thêm chút nào hay\nchút đó, tôi càng ra sức ái ân ngọt ngào\nhơn."

# monologue
# JP: （にゅるっ――ぬじゅっ――ぐちゅっ――じゅるっ）
# 1839 = "（揉來揉去）" 

# 【双鉄】
# display as 雙鐵
# JP: 「どの体位でも――溢れ出す、ほど――\n僕は――パンパンに……溜まりまくって」
1022 = "「Dù là tư thế nào——thì tôi cũng——\nđã tích tụ…… căng cứng đến mức, trào ra\nngoài rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「あっ――ん――わかって。ね？　……この、姿勢、だと\n膣内射精――たくさん――たくさん、して、もらっても」
1106 = "「A——Ưm——Hiểu cho tôi đi. Nhé? ……Nếu ở, tư\nthế, này\nDù anh có xuất tinh trong——thật\nnhiều——thật nhiều, đi chăng nữa」"

# monologue
# JP: （もみゅ――にゅるん――こしゅっ――もみゅううっ）
# 1817 = "（反覆揉捏）" 

# monologue
# JP: 稀咲の手指はひたすらに、亀頭とタマだけを弄び続ける。\n膣内射精をお互い求め。だけれど焦らしあっている。
1663 = "Những ngón tay của Kisaki vẫn một mực trêu\nđùa quy đầu và hai hòn dái.\nCả hai đều khao khát được xuất tinh trong.\nNhưng lại đang trêu ngươi lẫn nhau."

# 【稀咲】
# display as 稀咲
# JP: 「こぼれ、ちゃったら――んっ――ふっ――あっ――\n妊娠――確率――さがっちゃいそうで――イヤ、なんだ」
1315 = "「Nếu bị, tràn ra ngoài——Ưm——Fu——A——\nXác suất——mang thai——có vẻ sẽ giảm đi——Nên\ntôi không, muốn đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なる、ほど――つまり」
1283 = "「Ra, vậy——Tức là.」"

# monologue
