1091 = "「Fuaan!?」"

# monologue
# JP: ウソというなら、ひとまず悪いことだろう。\n仕置きのつもりで、軽ぅくクリトリスを弾いてみる。
1711 = "Nếu đã nói dối, thì trước mắt đó là một\nviệc xấu.\nNhư một hình phạt, tôi khẽ búng nhẹ vào âm\nvật của em ấy."

# 【双鉄】
# display as 雙鐵
