# 1879 = "（進進出出）" 
# monologue
# JP: 稀咲の膣と僕の勃起の境目がもうわからない。\n全身熱くてどろどろで、しびれたようになっている。
1676 = "Ranh giới giữa âm đạo của Kisaki và dương vật của tôi đã không còn phân biệt được nữa. Toàn thân nóng rực, nhầy nhụa, và có cảm giác như bị tê liệt."
# 【稀咲】
# display as 稀咲
# JP: 「っ――ぁっ――ぁっ――ぁっ――\nぁ――ぁぁっ――んっ――ふあっ――」
1100 = "「Ư——A——A——A——\nA——Aa——Ưm——Fua——」"
# monologue
# JP: （じゅぬっ！　ぎりゅっ！　づびゅっ！　ごりゅんっっ）
# 1880 = "（長驅直入）" 
# 【稀咲】
# display as 稀咲
