1555 = "Chỉ cần gõ nhẹ bằng đầu ngón tay, Kisaki đã phát ra âm thanh nũng nịu. Từ đó, chỉ cần duỗi ngón tay ra thôi cũng đủ khiến cơ thể em ấy giật nảy lên."
