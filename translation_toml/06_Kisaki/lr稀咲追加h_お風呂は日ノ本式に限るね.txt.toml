# JP: 「わかっ――た――あっ――んっ　がまんっ――ボクっ、\nんっ――はっ――ボクっ――がまん――するっ！！！」
1286 = "「Tôi hiểu——rồi——a——ưm, sẽ nhẫn nhịn——tôi,\nưm——ha——tôi——sẽ nhẫn nhịn!!!」"

# monologue
# JP: いいこだと撫でてやりたい。伝えたい。\nけれどもそうする余裕など、どこを探しても存在しない。
1538 = "Tôi muốn xoa đầu khen em ấy ngoan. Muốn\ntruyền đạt cho em ấy biết.\nNhưng dù có tìm mỏi mắt cũng chẳng còn\nchút dư dả nào để làm việc đó."

# monologue
# JP: （ぢゅぶっ！　ごちゅっ！　づぢゅっ！　ぐりゅん！）
# 1822 = "（大開大合）" 

# 【稀咲】
# display as 稀咲
# JP: 「イクっ、ときっ！　一緒っ――ねっ――だからっ――\nリズムっ――かえてっ――イクとき――イクときぃっ」
1365 = "「Lúc, lên đỉnh! Cùng nhau——nhé——Thế nên——\nThay đổi——nhịp điệu đi——Lúc lên đỉnh——Lúc\nlên đỉnh ấy.」"

# monologue
# JP: 余裕が無いのを、稀咲も理解してくれている。\nなんと賢くいい女だろう。射精欲求がさらに膨らむ。
1630 = "Kisaki cũng hiểu rằng tôi không còn chút\ndư dả nào.\nThật là một người phụ nữ thông minh và\ntuyệt vời. Khao khát xuất tinh càng lúc\ncàng dâng trào."

# monologue
# JP: （ぼぢゅっ！　ごりゅっ！　じゅぶううっ！　ごりゅっ）
# 1816 = "（反覆抽插）" 

# 【稀咲】
# display as 稀咲
# JP: 「まだっ――なのっ――そう、てっっ――ボクっ、もう\n――むり――むりっ――んっ――おねがい、そう、てつ」
1355 = "「Vẫn chưa——được sao——Anh Sou, tetsu——Tôi,\nkhông\n——chịu nổi nữa——không chịu nổi\nnữa——ưm——Xin anh đấy, anh Sou, tetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――っ――くっっ――妊娠、する――にはっ」
778 = "「——Ư——Hự——Để, mang thai——thì.」"

