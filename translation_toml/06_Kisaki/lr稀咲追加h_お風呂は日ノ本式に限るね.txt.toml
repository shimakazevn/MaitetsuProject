# display as 稀咲
# JP: 「あっ」
# 1116 = "「啊」" 
# monologue
# JP: まだローションが残る肌。\nその腹の上からそっと、子宮のあたりを撫でてみる。
1494 = "Làn da vẫn còn dính lotion. Tôi nhẹ nhàng vuốt ve phần bụng trên, ngay vị trí của tử cung."
# 【双鉄】
# display as 雙鐵
# JP: 「何度も何度もセックスしよう。\n僕らのこどもを授かるまで。僕もそれを望んでいるゆえ」
1229 = "「Chúng ta hãy làm tình hết lần này đến lần khác nhé. Cho đến khi em mang thai đứa con của chúng ta. Bởi vì anh cũng mong muốn điều đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄」
1362 = "「Soutetsu.」"
# monologue
# JP: 微笑んで。
1486 = "Mỉm cười."
# 【稀咲】
# display as 稀咲
# JP: 「もう十分だと思うから、抜いて平気。\nそれで、ね？　そのあと」
1223 = "「Em nghĩ là đủ rồi, anh rút ra đi. Sau đó, anh biết không? Sau đó thì...」"
# monologue
# JP: そうして稀咲は、照れくさそうにそっと囁く。
1646 = "Rồi Kisaki ngượng ngùng thì thầm."
# 【稀咲】
# display as 稀咲
# JP: 「キスしてくれたら、嬉しいな」
1051 = "「Nếu anh hôn em, em sẽ vui lắm.」"
