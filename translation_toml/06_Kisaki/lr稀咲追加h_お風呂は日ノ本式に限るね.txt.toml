1534 = "Trêu đùa bộ phận sinh dục trơn trượt của\nnhau, và tiếp tục nhẫn nhịn cơn cực khoái.\nDù đầu óc có mụ mẫm đi vì nóng, tôi vẫn\nlập tức nghĩ ra cách giải quyết."

# monologue
# JP: （ぐちゅううっっ！）
1845 = "(Sùng sục!)"

# 【稀咲】
# display as 稀咲
# JP: 「んひゅっ！！」
1154 = "「Ưm hyu!!」"

# monologue
# JP: 指に交えたローションがすぐとろけるほどに、\n稀咲の膣内は、ぐちゅぐちゅに濡れほぐれてる。
1679 = "Bên trong âm đạo của Kisaki đã ướt sũng và\nmềm nhũn ra,\nđến mức lớp lotion trên ngón tay tôi ngay\nlập tức tan chảy."

# 【双鉄】
# display as 雙鐵
# JP: 「こちらがわ。膣の入り口側を高くして」
1354 = "「Phía bên này. Nâng cao phần cửa âm đạo\nlên.」"

# monologue
# JP: （ぬぼっ――ぐ、ちぃっっ）
1850 = "(Trơn tuột——Sùng, sục)"

# 【稀咲】
# display as 稀咲
# JP: 「やっ――あっ――ふあっ――そう、てつぅっ」
1074 = "「A——A——Fua——Anh Sou, tetsu.」"

# monologue
# JP: 指先で軽くノックをすれば、稀咲は切なげな声を出す。\nそこから指を伸ばしただけでも、身体をビクリ触れさす。
1555 = "Chỉ cần gõ nhẹ bằng đầu ngón tay, Kisaki\nđã phát ra âm thanh nũng nịu.\nTừ đó, chỉ cần duỗi ngón tay ra thôi cũng\nđủ khiến cơ thể em ấy giật nảy lên."

# 【双鉄】
# display as 雙鐵
# JP: 「膣の奥側……指では届かぬ部分の方が\n低い体位になればいい――という[わけ,1]理屈だよな？」
1320 = "「Chỉ cần đổi sang tư thế mà phần sâu bên\ntrong âm đạo……\nphần ngón tay không chạm tới được thấp hơn\nlà được——lý thuyết là vậy, đúng không?」"

# 【稀咲】
# display as 稀咲
# JP: 「うんっ――うんっ――そう、なのっ」
1142 = "「Ưm——Ưm——Đúng, vậy đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
1243 = "「Nếu vậy.」"

# monologue
# JP: 膣内射精でしかイケないなら、膣内射精をすぐしたい。\n二度でも三度でも四度でも稀咲の膣内に射精しまくりたい。
1584 = "Nếu chỉ có thể lên đỉnh bằng cách xuất\ntinh trong, thì tôi muốn xuất tinh trong\nngay lập tức.\nHai lần, ba lần, hay bốn lần, tôi muốn\nxuất tinh vào trong âm đạo của Kisaki thỏa\nthích."

# 【双鉄】
# display as 雙鐵
# JP: 「こうしてしまえば問題なかろう」
1352 = "「Làm thế này thì không có vấn đề gì nữa\nchứ.」"

# 【稀咲】
# display as 稀咲
# JP: 「きゃあっ！！？」
1078 = "「Kyaa!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「滑りやすい。\n稀咲は自分の身体を支えることだけに集中するんだ」
1191 = "「Rất trơn đấy.\nKisaki chỉ cần tập trung chống đỡ cơ thể\nmình thôi.」"

# monologue
# JP: 稀咲の下から身体をぬいて、そのまま両足を広げさせ――
1540 = "Tôi rút người ra khỏi bên dưới Kisaki, và\ncứ thế dang rộng hai chân em ấy ra——"

# 【稀咲】
# display as 稀咲
# JP: 「やぁあっ――双鉄――ボク。こんな格好――\n恥ずかしいっ――マンぐりがえし――とかっ――」
1077 = "「Yaa——Anh Soutetsu——Tôi. Tư thế này——\nXấu hổ lắm——Giống tư thế đóng cọc——quá——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。そんな名前がついているのか」
1177 = "「Hô. Hóa ra nó có cái tên như vậy sao.」"

# monologue
# JP: いいえて妙だ。\nおまんこをさらけ出してるでんぐり返し。
1723 = "Nói cũng đúng thật.\nMột cú lộn nhào phơi bày cả âm đạo ra\nngoài."

# 【双鉄】
# display as 雙鐵
# JP: 「いい名前だな。稀咲が考えたのか？」
1346 = "「Cái tên hay đấy. Kisaki tự nghĩ ra à?」"

# 【稀咲】
# display as 稀咲
# JP: 「そんなわけっ」
1219 = "「Làm gì có chuyện đó.」"

# monologue
# JP: おまんこの下で口を尖らせ、\nけれども稀咲はすぐさまに、恥ずかしそうに瞳をそらす。
1477 = "Bên dưới âm đạo, Kisaki chu môi lên,\nnhưng ngay lập tức, em ấy ngượng ngùng\nquay đi chỗ khác."

# 【稀咲】
# display as 稀咲
# JP: 「……ううん。からかわれてるわけじゃないよね。\nだって双鉄――そういうの、全然知識なかったんだし」
811 = "「……Ừm. Anh không phải đang trêu tôi đâu\nnhỉ.\nTại vì anh Soutetsu——hoàn toàn không có\nkiến thức về mấy chuyện đó mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうの、とは？」
1347 = "「Mấy chuyện đó, là sao?」"

# monologue
# JP: （くぱあっ）
1838 = "(Tách ra)"

# 【稀咲】
# display as 稀咲
# JP: 「あっ――あっ」
1102 = "「A——A.」"

# monologue
# JP: 膣周辺のローションは、もはや愛液に溶かされている。\nゆえ指先はなんの苦もなく、稀咲のおまんこを大きく開く。
1508 = "Lotion quanh âm đạo giờ đã hòa tan hoàn\ntoàn vào dâm thủy.\nVì thế, những đầu ngón tay của tôi không\nchút khó khăn nào, mở rộng âm đạo của\nKisaki ra."

# 【双鉄】
# display as 雙鐵
# JP: 「教えてくれ、稀咲。\n“そういうの”とは、いったいどういう」
1081 = "「Nói cho tôi biết đi, Kisaki.\n'Mấy chuyện đó', rốt cuộc là chuyện gì.」"

# 【稀咲】
# display as 稀咲
# JP: 「…………っ」
800 = "「…………」"

# monologue
# JP: ためらう息の間にも、稀咲の膣口はわななき続ける。\n膣が呼吸をしてるようだと、くだらぬことを思ってしまう。
1649 = "Ngay cả trong lúc ngập ngừng thở, cửa âm\nđạo của Kisaki vẫn không ngừng run rẩy.\nTôi chợt có một suy nghĩ ngớ ngẩn rằng âm\nđạo dường như đang hô hấp vậy."

# 【稀咲】
# display as 稀咲
# JP: 「だから……普通の――どこにでもある、\nエッチな、DVDだとか……」
1206 = "「Thì là…… mấy cái đĩa DVD——bình thường,\ndâm đãng, mà ở đâu cũng có ấy……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。はじめてのセックスのときにも、\nそんなことを言っていたな」
1180 = "「A, ra vậy. Lúc làm tình lần đầu tiên,\nem cũng từng nói như thế nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「え？」
1096 = "「Hả?」"

# monologue
# JP: 急に稀咲が、驚いたような声をだす。
1637 = "Kisaki đột nhiên thốt lên một giọng đầy\nngạc nhiên."

# 【稀咲】
# display as 稀咲
# JP: 「そうだっけ？　ボク、なんて？」
1250 = "「Vậy sao? Tôi, đã nói gì cơ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　年頃の学園生なら、エッチなDVDなどは、\n普通に誰もがみるものだ――とかなんとか」
1168 = "「Hừm? Em nói là nếu là học sinh đang tuổi\nmới lớn, thì mấy cái đĩa DVD dâm đãng,\nbình thường ai cũng xem cả——đại loại thế.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ」
# 1116 = "「啊」" 

# monologue
# JP: 苦笑だろうか。自嘲だろうか。\n場にはそぐわぬため息に、強く興味をそそられる。
1435 = "Là nụ cười gượng gạo chăng. Hay là tự\ntrào.\nTiếng thở dài không hợp với hoàn cảnh này,\nkhiến tôi vô cùng tò mò."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、どうした。なにかあるのなら聞かせて欲しい」
1217 = "「Gì vậy, sao thế. Nếu có chuyện gì thì nói\ncho tôi nghe đi.」"

# 【稀咲】
# display as 稀咲
# JP: 「……そんなに大したことじゃないんだけど――」
810 = "「……Cũng không phải chuyện gì to tát lắm\nđâu——」"

# monologue
# JP: （ちゅむっ）
1826 = "(Chụt)"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1366 = "「！」" 

# monologue
# JP: 稀咲の膣口が大きくわななく。
1666 = "Cửa âm đạo của Kisaki run lên bần bật."

# 【稀咲】
# display as 稀咲
# JP: 「それ……ごめん。ウソなんだ。少なくとも、ボクはね？\nHなDVDとか――それまで、全然――見たことなかったの」
1344 = "「Chuyện đó…… xin lỗi anh. Là nói dối đấy.\nÍt nhất là, với tôi nhé?\nMấy cái đĩa DVD H——cho đến lúc đó, tôi\nhoàn toàn——chưa từng xem qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1176 = "「Hô.」"

# monologue
# JP: （ちゅんっ）
# 1826 = "（彈動）" 

# 【稀咲】
# display as 稀咲
