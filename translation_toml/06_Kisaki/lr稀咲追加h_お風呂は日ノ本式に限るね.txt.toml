# 1807 = "（不停射精）" 
# monologue
# JP: 僕も睾丸も身体に押され、あれほど射精した精液を、\nなおあさましく絞りだす。
1557 = "Tinh hoàn của tôi cũng bị cơ thể ép chặt, dù đã bắn ra nhiều tinh dịch đến thế, nhưng vẫn tiếp tục bị vắt kiệt một cách thảm hại."
# monologue
