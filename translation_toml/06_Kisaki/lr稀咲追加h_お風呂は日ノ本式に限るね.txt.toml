1266 = "「Để khi——chuyện đó, xảy ra——thì sẽ không,\nbị\nxấu hổ——. ……Và…… nhé? Và——tôi.」"

# monologue
# JP: 稀咲の全身がぽーっと綺麗な桜色に染まってる。\n羞恥と混じる性欲が、稀咲を鮮やかに艶めかせている。
1634 = "Toàn thân Kisaki ửng lên một màu hồng đào\ntuyệt đẹp.\nSự ham muốn nhục dục xen lẫn sự ngượng\nngùng, đang làm cho Kisaki trở nên vô cùng\nrực rỡ và quyến rũ."

# 【稀咲】
