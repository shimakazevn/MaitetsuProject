1112 = "「A……Phù――Phù――Này, anh Soutetsu――Nhũ hoa――Ưm ――Nhũ hoa……Cái đó, nhé? Thêm nữa――Làm thêm nữa đi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「承った。乳首は、特に丹念に洗わせていただこう」
1290 = "「Tuân lệnh. Anh sẽ rửa nhũ hoa cho em thật cẩn thận.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ」
# 1116 = "「啊」" 
