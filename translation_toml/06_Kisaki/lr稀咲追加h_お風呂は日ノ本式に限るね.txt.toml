1633 = "Kisaki dừng cử động cơ thể. Chỉ có quy đầu là vẫn bị trêu đùa một cách dai dẳng và trơn tuột."
# 【双鉄】
# display as 雙鐵
# JP: 「ダメとは――どうして」
1267 = "「Không được là sao——Tại sao chứ.」"
# 【稀咲】
# display as 稀咲
