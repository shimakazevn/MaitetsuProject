1229 = "「Chúng ta hãy làm tình hết lần này đến lần\nkhác nhé.\nCho đến khi em mang thai đứa con của chúng\nta. Bởi vì anh cũng mong muốn điều đó.」"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄」
1362 = "「Soutetsu.」"

# monologue
# JP: 微笑んで。
1486 = "Mỉm cười."

# 【稀咲】
# display as 稀咲
# JP: 「もう十分だと思うから、抜いて平気。\nそれで、ね？　そのあと」
1223 = "「Em nghĩ là đủ rồi, anh rút ra đi.\nSau đó, anh biết không? Sau đó thì...」"

# monologue
# JP: そうして稀咲は、照れくさそうにそっと囁く。
1646 = "Rồi Kisaki ngượng ngùng thì thầm."

# 【稀咲】
# display as 稀咲
