# JP: ぬるぬるすべる乳房はじれったく新鮮で、\nそれだけに、いまさらなことを思わせてくる。
1596 = "Bầu ngực trơn trượt mang lại cảm giác mới mẻ và đầy khiêu khích, chính vì thế, nó khiến tôi nhận ra một điều dù đã muộn màng."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の胸は、だんだん成長してきているよな」
1046 = "「Ngực của Kisaki, đang dần dần lớn lên nhỉ.」"
# 【稀咲】
# display as 稀咲
