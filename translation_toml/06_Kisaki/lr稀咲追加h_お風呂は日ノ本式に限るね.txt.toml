1655 = "Kisaki dùng hai tay nhẹ nhàng ái ân quy đầu, đồng thời ấn nghiêng dương vật của tôi xuống. Dương vật cương cứng lún sâu vào khe hở ướt át của Kisaki một cách trơn tuột."
