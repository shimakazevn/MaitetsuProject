1235 = "「Tôi sẽ khiến Kisaki, lên đỉnh——ngay sát nút. Ái ân, đầu nhũ hoa và, âm vật—— rồi cứ thế, cắm vào——là được chứ gì.」"
# 【稀咲】
# display as 稀咲
# JP: 「ダメ……なのっ――双鉄。だって――体位。\nこの体位だと……んっ――精液、こぼれ、やすいから」
1349 = "「Không được…… đâu——Anh Soutetsu. Tại vì——tư thế. Tư thế này thì…… ưm——tinh dịch, rất dễ, bị tràn ra ngoài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「多少――こぼれても――変わらんだろう」
1188 = "「Có tràn ra——một chút——cũng chẳng sao đâu.」"
# monologue
