# display as 元忠
# JP: 「私はね、双鉄くん。その人間の本性は、\n金の使い方と、人の使い方から見えると思っている」
2057 = "「雙鐵，我覺得，從一個人用錢的方法和差遣他人做事的方式裡，就能看出他的本性」" 

# 【双鉄】
# display as 雙鐵
# JP: 「金と……人との使い方、ですか」
1901 = "「用錢的方法……和差遣他人做事的方式嗎」" 

# 【元忠】
# display as 元忠
# JP: 「見せてもらうよ。\n君という人間の、本性を」
1961 = "「讓我見識一下你這個人的本性吧」" 

# monologue
# JP: 試されてると、強く感じる。\n同時に自問を植え付けられる。
2338 = "我感受到，自己在被試探。同時，這份壓力讓我不禁叩問自己。" 

# monologue
# JP: いったい、僕という人間は、\nどのようにして、金を、人を、扱うのだろう？
2354 = "我這個人，到底是怎樣用錢、怎樣用人的呢？" 

# 【元忠】
# display as 元忠
# JP: 「と――時間だ。面白い話ができた。感謝する」
1623 = "「哎——時間不早了。謝謝你跟我聊了這麼有意思的話」" 

# monologue
# JP: （バタンっ）
2628 = "（喀噠）" 

# monologue
# JP: 一方的に話を打ち切り、\n来た時同様、いきなり元忠氏は部屋を出て行く。
2213 = "元忠先生突然單方面結束話題，徑直走出了房間。跟他來的時候如出一轍。" 

# monologue
# JP: 一瞬の、途方にくれたような沈黙――
2162 = "一瞬間，房間裡充斥著茫然無措的沉默——" 

# 【稀咲】
# display as 稀咲
# JP: 「済まない。父が。\nあれは……ああいう人なんだ」
1501 = "「不好意思啊。爸爸他……就是那樣的人」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……あの……\n別に、ねぇ？」
1647 = "「啊……那個……沒關係的，是吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「謝られるようなこととは思わん。\n実際、良い話し合いをさせてもらった」
1559 = "「你不需要為此道歉。我們之間的交流確實很有意義」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや、良い話し合いって」
1992 = "「這，很有意義嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「甘かばい！　にぃに！\nあんなん、向こうの思う壺ばい！」
2050 = "「阿哥你忒天真咧！這下正中他下懷咧！」" 

# monologue
# JP: 勢いこんだ日々姫の言葉に、稀咲も頷く。\n僕とて、そこには同感だ。
2527 = "聽了日日姬激動的話，稀咲也點了點頭。這句話就連我也同意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。どう転んでも、元忠氏は損をしない。\n僕らが上手い再建計画を立案できても、そうでなくても」
1826 = "「是啊。不論結果如何，對元忠先生都有利無害。不論我們能否成功擬定一個好的方案，對他都沒影響」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1624 = "「哎！？」" 

# monologue
# JP: 驚きに、日々姫の目が丸くなる。\n稀咲の顔には正反対に、安堵の色が滲み始める。
2391 = "日日姬驚訝得眼睛都瞪圓了。稀咲則與之相反，露出了放心的表情。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――んっ――兄さん。\nそれがわかっているなら、なんで」
2048 = "「阿哥——嗯——哥哥。你都知道是這樣了，為什麼還」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際に良い話だからだ。\n損が無いのは、僕らも全く同じだろう？」
1689 = "「因為這個結果實際上並不壞。對我們來說，這樣也完全沒有什麼損失，不是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1652 = "「啊！」" 

# monologue
# JP: 思惑通りにことを運んだのは、宝生元忠一人ではない。
2300 = "對此正中下懷的，並非只有寶生元忠一個人。" 

# monologue
# JP: 僕らとて、より優れた再生計画を立案できれば、\n工場誘致を撤回すると――それに等しい言質を得たのだ。
2321 = "我們也得到了他的承諾——只要我們能擬定一個更好的振興方案，就撤回工廠落戶計劃。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに加えて、宝生稀咲――君の助力まで得られるのだ。\n損得でいえば、むしろ僕らの得点の方が多いと思う」
1945 = "「而且我們還得到了你——寶生稀咲的幫助。要權衡得失的話，不如說我們反而賺多了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ、光栄だね」
1679 = "「嘿嘿，我很高興你能這麼說」" 

# monologue
# JP: まっすぐに、\n真っ白い手が伸びてくる。
2257 = "她向我伸出了雪白的手。" 

# 【稀咲】
# display as 稀咲
# JP: 「どう転んでも銀行の利益になる以上、\nボクも心置きなく、全力で君に協力しよう」
1820 = "「既然無論怎麼發展都對銀行有益，那麼我也可以毫無顧慮地盡全力幫助你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな、よろしく頼む」
1838 = "「有你在我就放心多了，拜託了」" 

# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ」
1787 = "「我也拜託你了」" 

# monologue
# JP: 短い握手。\n力強い。
2323 = "我們短而用力地握了握手。" 

# monologue
# JP: ピザにタバスコをかけすぎたのか、\n稀咲の手は、少し汗ばんでしっとりしている。
2337 = "我感到稀咲的手上滲出了一些汗，難道是因為她往披薩上加太多辣椒醬了嗎。" 

# 【稀咲】
# display as 稀咲
# JP: 「で？　\n具体的に、君たちの計画はどの程度進んでいるんだい？」
1804 = "「所以呢？具體來說，你們的計劃進行到什麼地步了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、まだほとんど。\n[ハチロクニイマル,3]8620――鉄道をどう活用するかも、確定してない状況だ」
1955 = "「說來慚愧，還沒有多少進展。我們目前還不知道應該如何發揮８６２０——發揮鐵路的優勢」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。\nでは、まずはそこから視察させてもらうとするかな」
1586 = "「原來如此。那麼，就讓我先去實地考察一下吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。――む？」
1700 = "「好的——嗯？」" 

# monologue
# JP: なんだ、日々姫がふくれてる。
2176 = "不知怎麼回事，日日姬一臉不開心。" 

# monologue
# JP: ただふくれているだけでなく……\nどこか苦しげなようにも見える。
2172 = "不光是不開心……她的表情看起來甚至有些難受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、日々姫？」
1768 = "「怎麼了，日日姬？」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　あ、なーんも！\nなーん、んんっ、何でもないです。大丈夫」
1630 = "「哎？啊，沒事！沒事，嗯，什麼事都沒有。沒關係」" 

# monologue
# JP: あからさまなほどの作り笑い。\nそして日々姫は、ごまかすような言葉を重ねる。
2261 = "她擠出了一副明顯是裝出來的笑容，又說起敷衍的話來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ええと、ちょっと気になって――その――あっ！\nあれです、元忠さん、稀咲先輩のお父さん」
1999 = "「那個，我只是有點在意——就是——啊！就是元忠先生，稀咲學姐的父親」" 

# 【稀咲】
# display as 稀咲
# JP: 「父が？　気になったって、一体――」
1886 = "「父親？你在意的是——」" 

# 【日々姫】
# display as 日日姬
# JP: 「ええと――あ！　そう、\n稀咲先輩に話があって来たはずなのに――えっ！？」
1614 = "「呃——啊！他來這裡明明是有事找你的，但是——哎！？」" 

# monologue
# JP: 首から順に、まるでスプレーを吹き上げるように。\n稀咲の顔が、じわじわ、目に見えて赤くなる。
2530 = "能夠明顯看到，紅暈慢慢從稀咲的脖子爬上了整張臉，讓她的臉越來越紅。" 

# 【日々姫】
# display as 日日姬
# JP: 「せ、先輩？」
1730 = "「學，學姐？」" 

# 【稀咲】
# display as 稀咲
# JP: 「それはあれだよ、ええとね、日々姫」
1986 = "「這個嘛，就是說呢，日日姬啊」" 

# monologue
# JP: 稀咲の視線が、一瞬ちらりと僕を捉えて、\nすぐさま日々姫の上へと戻る。
2498 = "稀咲的視線悄悄瞟了我一眼，然後馬上又回到了日日姬身上。" 

# 【稀咲】
# display as 稀咲
# JP: 「あの人は……あれで、要件を済ませたんだよ。\n全部、ね。多分」
1534 = "「他……他已經辦完要辦的事了。可能，全都辦完了」" 

# monologue
# JP: 独り言じみた言葉を吐いて、\n力なく、ひどく照れくさそうに――
2265 = "她略顯有氣無力，又有些害羞地自言自語道。" 

# monologue
# JP: 年齢相応の、ごくごく自然な少女の笑みを、\n稀咲はふわりと、ほころばせる。
2420 = "然後，她的臉上綻放出與這個年齡的少女相符的、極其自然的笑容。" 

# 【稀咲】
# display as 稀咲
# JP: 「あれは……そういう人なんだ」
1956 = "「誰叫他……就是這樣的人呢」" 
