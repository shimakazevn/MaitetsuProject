[script]
# lines: 385 
# 【稀咲】
# display as 稀咲
# JP: 「さてと、今日のお仕事はこれで終わりだね。\nおつかれ、日々姫。これからどうする？」
1698 = "「Rồi, công việc hôm nay đến đây là xong nhé.\nVất vả cho em rồi, Hibiki. Tiếp theo em định làm gì?」"
# monologue
# JP: 稀咲の声に、日々姫はぱっと顔を向ける。
2382 = "Nghe tiếng Kisaki, Hibiki liền quay mặt lại."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲センパイも、浦上さんもお疲れ様です。\n今日も私、たくさん助けてもらっちゃいました」
1929 = "「Tiền bối Kisaki, anh Uragami, hai người cũng vất vả rồi.\nHôm nay em lại được mọi người giúp đỡ nhiều quá.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちつもたれつさ。\nボクらは利益共同体だから」
1527 = "「Có qua có lại thôi mà.\nChúng ta là cộng đồng chung lợi ích cơ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1651 = "「Aha.」"
# monologue
# JP: 少しふざけた物言いに、日々姫の笑顔がいっそう輝く。
2475 = "Cách nói hơi đùa cợt của Kisaki khiến nụ cười của Hibiki càng thêm rạng rỡ."
# monologue
# JP: 浦上は、ほんのすこしだけ会釈を返し、\nすぐにすました顔をＰＣに向け直す。
2525 = "Anh Uragami chỉ khẽ cúi đầu đáp lại,\nrồi ngay lập tức quay lại nhìn màn hình máy tính với vẻ mặt điềm nhiên."
# 【稀咲】
# display as 稀咲
# JP: 「疲れてないなら、\n食事でもしながらもう少し打ち合わせるかい？」
1713 = "「Nếu em chưa mệt,\nchúng ta vừa ăn vừa bàn bạc thêm chút nữa được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「疲れは、特にないんですけど」
1792 = "「Mệt thì em cũng không mệt lắm...」"
# monologue
# JP: そこまで言って口ごもり、\n日々姫が問うように僕を見る。
2388 = "Nói đến đó, Hibiki ngập ngừng,\nrồi nhìn tôi như dò hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\nもしも僕が仕事の話の邪魔になるなら」
1655 = "「À,\nnếu như anh làm phiền cuộc nói chuyện công việc của hai người thì――」"
# 【日々姫】
# display as 日日姬
# JP: 「邪魔なんて！　そぎゃんわけ――ううんっ、\nそんなこと、ありえませんよ。兄さん」
1769 = "「Làm phiền gì chứ! Làm gì có chuyện――à không,\nkhông có chuyện đó đâu ạ. Anh trai.」"
# 【稀咲】
# display as 稀咲
# JP: 「や。これはボクの言い方が良くなかったね」
1612 = "「Ây da. Là do cách nói của chị không tốt rồi.」"
# monologue
# JP: 飛び出してすぐひっこめられた隈元弁にか、\nあるいは他の何かにか。
2488 = "Không biết là do chất giọng Kumamoto-ben vừa bật ra đã vội kìm lại,\nhay là do một điều gì khác."
# monologue
# JP: 稀咲が浮かべた微笑はすぐに、\nどこか挑むようなものへと変わる。
2178 = "Nụ cười trên môi Kisaki ngay lập tức,\nchuyển sang một vẻ gì đó đầy thách thức."
# 【稀咲】
# display as 稀咲
# JP: 「仕事の打ち合わせは口実だ。時間を取って――\nもう少し、突っ込んだ話を出来ないものかと思ってね」
1805 = "「Bàn bạc công việc chỉ là cái cớ thôi. Chị muốn dành thời gian――\nđể chúng ta có thể nói chuyện sâu hơn một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことなら大歓迎だ」
1989 = "「Nếu là vậy thì anh rất hoan nghênh.」"
# monologue
# JP: 日々姫を見れば、無言の頷き。
2349 = "Tôi nhìn sang Hibiki, con bé gật đầu không nói gì."
# monologue
# JP: その目が少し不安げで、\n心配を解いてやらねばという気にさせられる。
2278 = "Đôi mắt con bé có chút bất an,\nkhiến tôi cảm thấy phải giải tỏa nỗi lo lắng đó."
# 【双鉄】
# display as 雙鐵
# JP: 「主張をぶつけあうだけでない、\n実りある話し合いが出来れば――と願っている」
1753 = "「Anh mong rằng chúng ta không chỉ dừng lại ở việc bảo vệ quan điểm của mình,\nmà có thể có một cuộc thảo luận thực sự mang lại kết quả.」"
# monologue
# JP: 日々姫に聞かせるための言葉を、\n素直な気持ちのまま表せる。
2343 = "Tôi bày tỏ những lời muốn nói cho Hibiki nghe\nmột cách thành thật nhất."
# monologue
# JP: 日々姫と稀咲とが看板づくりで見せた姿勢は、\n僕にも新たな理解を与えてくれた。
2431 = "Thái độ mà Hibiki và Kisaki thể hiện khi làm biển hiệu,\ncũng đã mang lại cho tôi những cách nhìn nhận mới."
# 【双鉄】
# display as 雙鐵
# JP: 「見ているもの、見えているものが違うようだが、\n御一夜の発展を願う気持ちは同じだと感じたからな」
1800 = "「Dù góc nhìn và những gì chúng ta thấy có vẻ khác nhau,\nnhưng anh cảm nhận được mong muốn phát triển Ohito của chúng ta là như nhau.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクも似たような感じを受けた。だから話し合いたい。\nキミが何を見て、誘致反対の立場にいるのか知りたいね」
1789 = "「Em cũng có cảm giác tương tự. Thế nên em mới muốn nói chuyện.\nEm muốn biết anh đã nhìn thấy điều gì để đứng ở lập trường phản đối việc mời gọi nhà máy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何でも遠慮無く聞いてくれ。\nが――その辺を[ふくぞう,1]腹蔵なく話すなら」
1508 = "「Em cứ hỏi thoải mái.\nNhưng――nếu muốn nói chuyện một cách cởi mở về vấn đề đó thì...」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうか。移動はしない方がいいね。\n他人の目があるところでは……ね」
1670 = "「À, ra vậy. Tốt nhất là không nên di chuyển nhỉ.\nỞ những nơi có người ngoài thì……hơi khó nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。迷惑にならんようなら、ここでこのまま」
1665 = "「Ừm. Nếu không phiền, thì chúng ta cứ ở lại đây.」"
# 【稀咲】
# display as 稀咲
# JP: 「じゃ、食事を何か取り寄せよう。\nそうだな……ピザは？　嫌いなら、他のものでも」
2009 = "「Vậy, chúng ta gọi đồ ăn đến nhé.\nXem nào……pizza thì sao? Nếu anh không thích, thì món khác cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。こだわらん。お任せしよう」
1863 = "「Không sao. Anh không kén chọn đâu. Tùy em quyết định.」"
# 【稀咲】
# display as 稀咲
# JP: 「よし、決まりだ。注文をお願いできるかな？\nいつものと、あとはまぁ、バランスを見て」
1708 = "「Được rồi, chốt vậy đi. Anh gọi món giúp em được không?\nCứ như mọi khi, còn lại thì anh xem cân bằng dinh dưỡng nhé.」"
# 【浦上】
# display as 浦上
# JP: 「かしこまりました」
1701 = "「Tôi hiểu rồi.」"
# monologue
# JP: 浦上は携帯を手に、すぐさま注文を開始する。
2415 = "Anh Uragami cầm điện thoại lên và bắt đầu đặt món ngay lập tức."
# monologue
# JP: 慣れきったその仕草にふっと、\n小さな疑問を感じてしまう。
2435 = "Thấy động tác quá đỗi quen thuộc đó,\ntôi bỗng nảy sinh một thắc mắc nhỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「いつもの……と言っていたが、\nそれほどピザを良く頼むのか？」
1565 = "「Em vừa nói \"như mọi khi\"……\nEm thường xuyên gọi pizza đến vậy sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「この部屋で食事をするときには、わりとね。\n手軽に食べられてすぐ届くから」
1950 = "「Khi ăn trong phòng này thì khá thường xuyên.\nVì nó dễ ăn và giao hàng nhanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ピザが手軽か？\n食べ辛いもののように思うが……」
1611 = "「Pizza mà dễ ăn á?\nAnh thấy nó khó ăn mới đúng……」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1677 = "「Fufu.」"
# monologue
# JP: 稀咲らしからぬ――と感じてしまう、\nまったく屈託を感じない笑み。
2469 = "Một nụ cười hoàn toàn vô tư lự,\nkhiến tôi có cảm giác không giống Kisaki chút nào."
# 【稀咲】
# display as 稀咲
# JP: 「それは食べ慣れないからさ。\nコツがあるんだ。仕事をしながら食べるためのね」
2011 = "「Đó là vì anh chưa ăn quen thôi.\nCó bí quyết cả đấy. Để có thể vừa ăn vừa làm việc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事しながら？　食事のときもか」
1562 = "「Vừa làm việc á? Cả lúc ăn luôn sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「団欒しての食事じゃ無いときはね。食事の時間を削れば、\nその分、他で自由に使える時間が増えるわけだし」
1606 = "「Những lúc không phải ăn uống quây quần cùng mọi người thì vậy. Nếu bớt thời gian ăn uống,\nthì thời gian rảnh rỗi cho việc khác sẽ tăng lên mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1587 = "「Ra là vậy.」"
# monologue
# JP: 食事に関する稀咲の主張に相槌をうつ。\nが、そうする度に、小さな違和感が重なっていく。
2526 = "Tôi gật gù trước quan điểm về bữa ăn của Kisaki.\nNhưng mỗi lần như vậy, một cảm giác khác lạ nhỏ bé lại dâng lên."
# monologue
# JP: あるいは、僕が古い感覚なだけかもしれないが――
2360 = "Hoặc cũng có thể do tôi quá cổ hủ chăng――"
# monologue
# JP: （[いびつ]歪というか……\nどうなのだ、それが常態であっていいのか？）
2632 = "（Có vẻ hơi méo mó……\nLiệu coi đó là chuyện bình thường thì có ổn không?）"
# monologue
# JP: この若さで、銀行の支店長。\nしかも、有能との評価を得るほどの実績もある。
2256 = "Ở độ tuổi này mà đã là Giám đốc chi nhánh ngân hàng.\nHơn nữa, còn có những thành tích được đánh giá là tài năng xuất chúng."
# monologue
# JP: 生半でない努力がその裏にあろうとは、\n容易に想像できることだが――
2259 = "Dễ dàng tưởng tượng được rằng đằng sau đó\nlà những nỗ lực phi thường――"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、届いたね」
1656 = "「A, đến rồi kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当に早いな」
1916 = "「Nhanh thật đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう感じるかい？\nだいたいいつでも、こんなものだけど」
1834 = "「Anh thấy vậy sao?\nLúc nào cũng tầm này thôi mà.」"
# monologue
# JP: それは稀咲が、上得意客だからだろう――
2218 = "Đó là vì Kisaki là khách VIP của họ chăng――"
# monologue
# JP: そんな思いを口にするかどうかを悩んだ隙に、\nピザは手早く開封される。
2355 = "Trong lúc tôi đang do dự không biết có nên nói ra suy nghĩ đó hay không,\nthì hộp pizza đã được mở ra nhanh chóng."
# 【稀咲】
# display as 稀咲
# JP: 「さぁ、好きなのを取ってくれ」
1572 = "「Nào, cứ lấy món mọi người thích đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、私はそれじゃ――\nミックスピザの方、いただきます」
1658 = "「A, vậy thì em xin phép――\nlấy phần pizza thập cẩm nhé.」"
# monologue
# JP: 浦上も同じく、三切れのミックスピザを取り、\nすぐさま席に戻っていく。
2413 = "Anh Uragami cũng lấy ba miếng pizza thập cẩm,\nrồi lập tức quay trở lại chỗ ngồi."
# monologue
# JP: それも恐らく、この部屋での、\nごくあたりまえの光景なのだろう。
2569 = "Có lẽ đó cũng là\nmột cảnh tượng rất đỗi bình thường trong căn phòng này."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？」
2058 = "「Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1653 = "「À, ừm.」"
# monologue
# JP: ピザは――ミックスの大きなヤツと、\nそれより一回り小さいサイズの、サラミづくしだ。
2567 = "Pizza gồm――một chiếc thập cẩm cỡ lớn,\nvà một chiếc nhỏ hơn một chút, phủ đầy xúc xích Salami."
# monologue
# JP: ミックスの方を一切れ取れば、\nすぐさま稀咲もサラミの方を一切れ手に取る。
2331 = "Tôi vừa lấy một miếng thập cẩm,\nKisaki cũng lập tức lấy một miếng Salami."
# 【稀咲】
# display as 稀咲
# JP: 「いいかい？　ほら、こうすれば――」
1729 = "「Anh nhìn nhé? Này, nếu làm thế này――」"
# monologue
# JP: 論より証拠といわんばかりに、稀咲は器用に左手だけで、\n手にしたピザを半折りにして――
2573 = "Như muốn chứng minh lời mình nói, Kisaki khéo léo dùng tay trái\ngập đôi miếng pizza lại――"
# 【稀咲】
# display as 稀咲
# JP: 「――はむっ。\nね？　仕事をしながら、こぼさずいける」
2065 = "「――Ngoạm.\nThấy chưa? Vừa làm việc vừa ăn mà không bị rơi vãi chút nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1662 = "「Ừm.」"
# monologue
# JP: 空いてる右手でマウスを繰って、\nピザを食べつつ、PC画面をチェックしている。
2495 = "Tay phải rảnh rỗi điều khiển chuột,\ncô ấy vừa ăn pizza vừa kiểm tra màn hình máy tính."
# monologue
# JP: 仕草はいっそ熟練で、絵になるほどの光景なのだが――\nにもかかわらず、どうにも不安を感じてしまう。
2267 = "Động tác thành thạo đến mức trông như một bức tranh――\nThế nhưng, tôi vẫn không khỏi cảm thấy bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「まともな食事は取っているのか？」
1563 = "「Em có ăn uống tử tế không đấy?」"
# monologue
# JP: 稀咲ではなく日々姫に問えば、\n少し困った声が答える。
2344 = "Tôi không hỏi Kisaki mà hỏi Hibiki,\ncon bé trả lời với giọng hơi bối rối."
# 【日々姫】
# display as 日日姬
# JP: 「ええと……私と一緒に外食のときは、\nファーストフードとか喫茶店とか」
1617 = "「Dạ……khi đi ăn ngoài với em,\nthì thường ăn thức ăn nhanh hoặc ở quán cà phê.」"
# 【双鉄】
# display as 雙鐵
# JP: 「軽食ばかりか」
2016 = "「Toàn đồ ăn nhẹ thôi sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「って、こう見えて支店長だよ？　ボクは。\nパーティだの会食だのが無い日の方が少ないくらいだ」
1628 = "「Nhìn thế này thôi chứ em là Giám đốc chi nhánh đấy nhé?\nNhững ngày không có tiệc tùng hay ăn uống xã giao còn ít hơn ấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、豪勢な食事ではなく――いうなれば家庭料理をだ。\n野菜の煮物だの、ひじきだの」
1515 = "「Không, ý anh không phải là những bữa ăn sang trọng――mà là những bữa cơm gia đình cơ.\nVí dụ như rau củ hầm, rong biển Hijiki chẳng hạn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ひじき！」
1943 = "「Rong biển Hijiki!」"
# monologue
# JP: 驚いた顔でのオウム返し。\nそして稀咲は、珍獣を見る目でまじまじ、僕を眺める。
2254 = "Cô ấy ngạc nhiên lặp lại lời tôi.\nRồi Kisaki nhìn tôi chằm chằm như thể đang nhìn một sinh vật lạ."
# 【稀咲】
# display as 稀咲
# JP: 「なんでそんなことを？\n双鉄、キミはボクのお母さんかなにかなのかい？」
1879 = "「Sao anh lại hỏi vậy?\nSoutetsu, anh là mẹ em hay sao thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、違う。\n違うが……ううむ――」
1904 = "「Tất nhiên là không phải rồi.\nKhông phải nhưng mà……ừm――」"
# monologue
# JP: 問われてしまえば、そのとおり。\n僕がそのようなことを気にする筋合いは無い。
2538 = "Bị hỏi vặn lại, tôi mới thấy đúng là vậy.\nTôi chẳng có tư cách gì để bận tâm đến những chuyện đó."
# monologue
# JP: 稀咲の端正な印象とはいささか異なる食事風景に、\n余計……を越して、おせっかいな興味を持ってしまったか。
2503 = "Cảnh ăn uống có phần khác với ấn tượng đoan trang của Kisaki,\nđã khiến tôi nảy sinh sự tò mò thừa thãi……hay đúng hơn là bao đồng."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気になってしまってな」
1810 = "「Xin lỗi. Tự nhiên anh thấy tò mò thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「謝らなくても。気にかけてもらえるのはありがたいしね。\nでも――そんなことより、もっと大事な話をしよう」
1862 = "「Anh không cần phải xin lỗi đâu. Em rất vui vì được anh quan tâm.\nNhưng――thay vì chuyện đó, chúng ta hãy bàn chuyện quan trọng hơn đi.」"
# monologue
# JP: ぺろ、と指先のチーズを舐めとり、\n紙ナプキンで手をぬぐう。
2280 = "Cô ấy liếm nhẹ lớp phô mai dính trên đầu ngón tay,\nrồi dùng khăn giấy lau tay."
# monologue
# JP: 宣言通りの高効率で、\n稀咲は食事を、もはや終えてしまったらしい。
2432 = "Với hiệu suất cao đúng như đã tuyên bố,\ncó vẻ Kisaki đã dùng bữa xong."
# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場からの排水は、国の基準値を満たしている。\n法的にも、環境保全の面からも、全く問題のないものだ」
1232 = "「Nước thải từ nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; đáp ứng tiêu chuẩn quốc gia.\nVề mặt pháp lý cũng như bảo vệ môi trường, hoàn toàn không có vấn đề gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「承知している」
1988 = "「Anh biết.」"
# monologue
# JP: ズバリ本題に切り込んでもらえたおかげで、\n僕も気持ちを切り替えられる。
2248 = "Nhờ cô ấy đi thẳng vào vấn đề chính,\ntôi cũng lấy lại được tinh thần."
# monologue
# JP: 今一番に心配すべきことなら無論、\n宝生稀咲の食生活についてなどではない。
2426 = "Điều đáng lo ngại nhất lúc này, tất nhiên,\nkhông phải là chế độ ăn uống của Houshou Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、基準値内であるということと、\n影響が及ばぬということとは、イコールではない」
1544 = "「Nhưng, nằm trong tiêu chuẩn\nvà không gây ảnh hưởng, không phải là một.」"
# 【稀咲】
# display as 稀咲
# JP: 「それはおかしくないかい？　双鉄。\n悪影響が出ないよう、規制範囲は定められるだろう？」
1984 = "「Nghe vô lý vậy? Soutetsu.\nChẳng phải phạm vi quy định được đặt ra để ngăn chặn những ảnh hưởng xấu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜は焼酎の町であり、温泉の町だ。\n水の変化から受ける影響は、それだけ大きいものになる」
1688 = "「Ohito là thị trấn của shochu, và cũng là thị trấn của suối nước nóng.\nẢnh hưởng từ sự thay đổi của nguồn nước sẽ lớn đến mức đó đấy.」"
# monologue
# JP: ん、と困ったような声。\n稀咲の声の速度が落ちる。
2491 = "Kisaki ậm ừ với giọng bối rối.\nTốc độ nói của cô ấy chậm lại."
# 【稀咲】
# display as 稀咲
# JP: 「……受ける影響が大きいのではなくて――\n変化に対してナイーブなだけ、という可能性は？」
1241 = "「……Không phải là chịu ảnh hưởng lớn――\nmà chỉ là quá nhạy cảm với sự thay đổi, có khả năng đó không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナイーブ、か」
1866 = "「Nhạy cảm sao.」"
# monologue
# JP: 日々姫ともしたような話だが、\n“見えているもの”の違いが、姿勢の違いとなってる。
2181 = "Tôi cũng từng nói chuyện này với Hibiki rồi,\nsự khác biệt trong \"những gì nhìn thấy\" dẫn đến sự khác biệt trong thái độ."
# monologue
# JP: （見ようとしないものは見えない……\nでなければ、見たいものだけを見るのだな、人は）
2625 = "（Những thứ không muốn nhìn thì sẽ không thấy……\nNếu không thì con người chỉ nhìn những gì họ muốn nhìn thôi.）"
# monologue
# JP: 焼酎にとって水がどれほど重要か……\n日々姫はそれを、根っこの部分でわかっていた。
2384 = "Nước quan trọng thế nào đối với shochu……\nHibiki hiểu rõ điều đó từ tận gốc rễ."
# monologue
# JP: が、稀咲にはその点への理解が無い。\n果たして、どのように伝えたものか――
2200 = "Nhưng Kisaki lại không hiểu điểm đó.\nRốt cuộc, tôi nên truyền đạt thế nào đây――"
# 【稀咲】
# display as 稀咲
# JP: 「思い当たるところがあるかい？\nなら」
1569 = "「Anh nghĩ ra điều gì rồi sao?\nVậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、違う。\n沈黙は、疑問を感じていたからだ」
1649 = "「À không, không phải.\nAnh im lặng là vì anh đang có chút thắc mắc.」"
# 【稀咲】
# display as 稀咲
# JP: 「疑問？　どんな？」
1907 = "「Thắc mắc? Chuyện gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲、君は――」
1740 = "「Houshou Kisaki, em――」"
# monologue
# JP: 御一夜を大切にしていることなら、確かに感じた。
2351 = "Việc em ấy trân trọng Ohito, tôi thực sự đã cảm nhận được."
# monologue
# JP: だが、御一夜の何を大切と感じているか、\nそこに、恐らくは食い違いがある。
2198 = "Nhưng, em ấy trân trọng điều gì ở Ohito,\ncó lẽ chúng tôi đang có sự khác biệt ở điểm đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……例えば、銀行の仕事において。\n君が、一番大切にしていることは、なんだ？」
1253 = "「……Ví dụ như trong công việc ở ngân hàng.\nĐiều em coi trọng nhất là gì?」"
# 【稀咲】
# display as 稀咲
# JP: 「お金だよ。\nそれが、銀行の全てだからね」
2038 = "「Là tiền.\nĐó là tất cả của ngân hàng mà.」"
# monologue
# JP: 即答。\n一秒の迷いすらない。
2263 = "Trả lời ngay lập tức.\nKhông một giây do dự."
# monologue
# JP: あまりに明快な返答ぶりに、\n妙な感慨さえ覚えてしまう。
2528 = "Cách trả lời quá đỗi rõ ràng,\nkhiến tôi thậm chí còn cảm thấy một sự xúc động kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「きっぱり、金か」
1747 = "「Dứt khoát là tiền sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「という反応を見せるよね。\nお金の価値を、正しく理解していない人は」
1865 = "「Mọi người thường có phản ứng như vậy đấy.\nNhững người không hiểu đúng về giá trị của đồng tiền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お金の価値？」
2024 = "「Giá trị của đồng tiền?」"
# monologue
# JP: 問えばすぐさま、稀咲が微笑む。
2332 = "Tôi vừa hỏi, Kisaki liền mỉm cười."
# monologue
# JP: どこか冷たい――\n僕を計るような瞳をしながら。
2269 = "Một nụ cười có phần lạnh lùng――\nVới ánh mắt như đang dò xét tôi."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄。君にとって、お金とはなにかな？\nまずはそれを、ボクに聞かせてくれないか？」
2054 = "「Soutetsu. Đối với anh, tiền là gì?\nTrước tiên, anh có thể cho em biết điều đó được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「金――とは」
2022 = "「Tiền――là.」"
# monologue
# JP: 沈思黙考して整理する。
2356 = "Tôi trầm ngâm suy nghĩ và sắp xếp lại từ ngữ."
# monologue
# JP: 結局のところ、金とは利便性を高めるための代用品だ。\nそれが、何を代用しているのかといえば――
2403 = "Suy cho cùng, tiền là vật thay thế để nâng cao sự tiện lợi.\nNếu hỏi nó thay thế cho cái gì thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「金は……労働の対価だな。\nそれを引き換え、別の労働の対価を得る」
2021 = "「Tiền là……thù lao cho sức lao động.\nDùng nó để đổi lấy thù lao từ sức lao động của người khác.」"
# 【稀咲】
# display as 稀咲
# JP: 「へぇ、いい答えだね。予想より……\nといっては失礼だけど、いい答えだ」
1682 = "「Hê, câu trả lời hay đấy. Hơn cả em mong đợi……\nNói vậy thì hơi thất lễ, nhưng là một câu trả lời rất hay.」"
# monologue
# JP: 満足そうな声を出し、\n稀咲は席から立ち上がる。
2497 = "Kisaki thốt lên vẻ hài lòng,\nrồi đứng dậy khỏi ghế."
# 【稀咲】
# display as 稀咲
# JP: 「この部屋からは、一階フロアを見下ろせる。\n日々姫には、見せたことがあるよね？」
1757 = "「Từ phòng này có thể nhìn xuống tầng một.\nChị từng cho Hibiki xem rồi nhỉ?」"
# monologue
# JP: 話を振られ、\nあわてて日々姫はピザを飲み込む。
2518 = "Bất ngờ bị gọi tên,\nHibiki vội vàng nuốt miếng pizza."
# monologue
# JP: ああ、いつの間に……\nミックスピザは、もはや姿を消している。
2240 = "Ồ, từ lúc nào mà……\nMiếng pizza thập cẩm đã biến mất tiêu rồi."
# 【日々姫】
# display as 日日姬
# JP: 「うん。見せてもらって――\n凄かった」
1668 = "「Vâng. Chị đã cho em xem――\nTuyệt lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1680 = "「Ồ?」"
# 【稀咲】
# display as 稀咲
# JP: 「実際、なかなかの光景かと思うよ？\n丁度閉店したばかりだし、双鉄にも是非見てみて欲しい」
2061 = "「Thực sự là một cảnh tượng khá ấn tượng đấy.\nNgân hàng vừa mới đóng cửa, em cũng muốn Soutetsu xem thử.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1669 = "「Ừm.」"
# monologue
# JP: 誘われるまま、窓際に寄り、一階フロアに目を落とす。
2358 = "Theo lời mời, tôi tiến đến gần cửa sổ và nhìn xuống tầng một."
# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1659 = "「Ồ.」"
# monologue
# JP: 思わず声が出てしまう。
2317 = "Tôi bất giác thốt lên."
# monologue
# JP: これが銀行かと思うほど、普段とはまるで違った――\n混乱というか、熱気に満ちた姿が映る。
2170 = "Một khung cảnh hoàn toàn khác với ngân hàng thường ngày――\nMột sự hỗn loạn, hay nói đúng hơn là một bầu không khí tràn đầy nhiệt huyết hiện ra trước mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「閉店後だろう？\nお客もいないのに、何故こんなにバタついているのだ」
1504 = "「Chẳng phải đã đóng cửa rồi sao?\nKhông có khách hàng, sao lại nhộn nhịp thế này.」"
# 【稀咲】
# display as 稀咲
# JP: 「銀行業務は、閉店後からが本番だからさ」
1581 = "「Nghiệp vụ ngân hàng, sau khi đóng cửa mới là lúc bắt đầu mà.」"
# monologue
# JP: 言いながら、稀咲は僕へ寄ってくる。\nその目は、誇りに輝いている。
2472 = "Vừa nói, Kisaki vừa tiến lại gần tôi.\nĐôi mắt cô ấy ánh lên niềm tự hào."
# 【稀咲】
# display as 稀咲
# JP: 「電子化された部分がどれほど増えようと、\n窓口業務は決してなくならない」
1512 = "「Dù quá trình điện tử hóa có tăng lên đến mức nào,\nthì nghiệp vụ giao dịch tại quầy cũng không bao giờ biến mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。僕も、税金やら保険料やらを、\n銀行で取り扱ってもらうことがある」
1828 = "「Chắc là vậy. Anh cũng có lúc phải\nnhờ ngân hàng xử lý tiền thuế hay tiền bảo hiểm.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ――\nご利用、ありがとうございます」
1832 = "「Vậy sao――\nCảm ơn anh đã sử dụng dịch vụ.」"
# monologue
# JP: 自然と出てきた――そんな感じを受けさせられる、礼と声。
2271 = "Một cái cúi đầu và giọng nói tự nhiên――mang lại cảm giác như vậy."
# monologue
# JP: 伸びた背筋が、銀行業への稀咲の姿勢を、\nそのまま示しているようだ。
2484 = "Tấm lưng thẳng tắp dường như thể hiện\nchính thái độ của Kisaki đối với ngành ngân hàng."
# 【稀咲】
# display as 稀咲
# JP: 「そうしたお客様をお待たせする時間を短縮するため、\n各種の事務は、どうしても後回し後回しになる」
1878 = "「Để rút ngắn thời gian chờ đợi của những khách hàng như vậy,\ncác loại công việc giấy tờ đành phải gác lại giải quyết sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――なるほど。\nそのつけを、閉店後に一気に払うのか」
1641 = "「À――ra là vậy.\nVậy nên sau khi đóng cửa mới giải quyết một lượt sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね、まさしく。\nつけは正しく精算される必要が――おっと」
1835 = "「Đúng vậy, chính xác.\nCác khoản nợ cần phải được thanh toán chính xác――ối.」"
# monologue
# JP: 一階フロアがざわめいている。\n大勢が、ひとつのテーブルに集まっていく。
2159 = "Tầng một đang xôn xao.\nRất nhiều người đang tập trung lại quanh một chiếc bàn."
# 【稀咲】
# display as 稀咲
# JP: 「残念。今日は[ふとつごう,2]不突合が出たようだ」
1914 = "「Tiếc thật. Hôm nay có vẻ xảy ra bất cân xứng rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふとつごう？」
1845 = "「Bất cân xứng?」"
# 【稀咲】
# display as 稀咲
# JP: 「突合とは、伝票集計と現金残高とが一致すること。\nそれが合わないのが不突合」
1846 = "「Cân xứng là khi tổng số liệu trên chứng từ khớp với số dư tiền mặt.\nKhông khớp thì gọi là bất cân xứng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「帳面と現金が合わんのか――最悪だな」
1779 = "「Sổ sách và tiền mặt không khớp nhau sao――tệ thật.」"
# monologue
# JP: 酒問屋でも……金を扱い帳面をつける職場なら、\nどこでも発生してしまうことではあるが――
2235 = "Dù là ở cửa hàng rượu……hay bất cứ nơi nào làm việc liên quan đến tiền bạc và sổ sách,\nthì chuyện này đều có thể xảy ra, nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「銀行でも、そんなことが起こるのか？\n金を扱う人も機械も、まさしく専門のものであろうに」
2035 = "「Ngân hàng mà cũng xảy ra chuyện đó sao?\nCả người và máy móc xử lý tiền bạc đều là chuyên nghiệp mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「それでも、起こる。人間の側のミスが多いけれども、\nまれには、機械が不具合を出すこともある」
1751 = "「Dù vậy vẫn xảy ra. Phần lớn là do lỗi của con người,\nnhưng thỉnh thoảng máy móc cũng gặp trục trặc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「起きたときにはどうするのだ？」
1911 = "「Khi xảy ra thì phải làm sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「原因を究明する。それなしには、閉店できない。\nだからともかく、合わない額を9で割る」
1979 = "「Phải tìm ra nguyên nhân. Nếu không thì không thể đóng cửa được.\nNên trước tiên, cứ lấy số tiền chênh lệch chia cho 9.」"
# 【双鉄】
# display as 雙鐵
# JP: 「9で？」
1899 = "「Chia cho 9?」"
# 【稀咲】
# display as 稀咲
# JP: 「[けたちが,1]桁違いか[くらいちが,1]位違いが原因のときは、9で割り切れるから。\n例えば……そうだね。820円を支払う状況を想定しよう」
1724 = "「Nếu nguyên nhân là do sai số hàng chục hay hàng đơn vị, thì số đó sẽ chia hết cho 9.\nVí dụ……xem nào. Giả sử tình huống cần phải trả 820 yên nhé.」"
# monologue
# JP: 言いながら、稀咲はキーを軽く叩いて、\nディスプレイ上に820の数字を示す。
2473 = "Vừa nói, Kisaki vừa gõ nhẹ lên bàn phím,\nhiển thị con số 820 trên màn hình."
# 【稀咲】
# display as 稀咲
# JP: 「しかし、窓口がうっかり82,000円を払ってしまった。\nこの場合は、81,180円の不足が出るよね？」
1547 = "「Nhưng nhân viên giao dịch lại sơ ý trả nhầm thành 82,000 yên.\nTrong trường hợp này, sẽ thiếu hụt 81,180 yên đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「81180は――ああ、9で割り切れる数字だな」
2067 = "「81180――à, là một số chia hết cho 9 nhỉ.」"
# monologue
# JP: 言えばふと、\n稀咲は瞳を和らげながら、僕を見上げる。
2333 = "Tôi vừa dứt lời,\nKisaki ngước nhìn tôi, ánh mắt dịu lại."
# 【稀咲】
# display as 稀咲
# JP: 「へぇ、暗算が得意なのかい？」
1660 = "「Hê, anh giỏi tính nhẩm sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、大学の友人に数学の得意なものがいて――\nそれに習った」
1514 = "「Không, hồi đại học anh có một người bạn giỏi toán――\nanh học được từ cậu ấy thôi.」"
# monologue
# JP: 数字を構成する全ての位を、一桁になるまで足していく。\n例えば35468であれば、3+5+4+6+8=26、2+6=8と。
2613 = "Cộng tất cả các chữ số cấu thành nên con số đó cho đến khi chỉ còn một chữ số.\nVí dụ 35468, thì 3+5+4+6+8=26, 2+6=8."
# monologue
# JP: 出てきた数は、元の数字を9で割った余りと同じだし、\n3と6、4と5という9になる数を除いた場合も、同じ答えだ。
2399 = "Con số tính ra được sẽ bằng với số dư khi chia số ban đầu cho 9,\nvà ngay cả khi loại bỏ các cặp số có tổng bằng 9 như 3 và 6, 4 và 5, kết quả vẫn giống nhau."
# 【稀咲】
# display as 稀咲
# JP: 「[きゅうきょほう,2]九去法か。使っているかい？」
1822 = "「Cửu khứ pháp à. Anh có hay dùng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。暗算自体をあまりしないので。\n電卓を使ったほうが、確実だ」
1499 = "「Không. Bản thân anh ít khi tính nhẩm.\nDùng máy tính vẫn chắc chắn hơn.」"
# 【稀咲】
# display as 稀咲
# JP: 「とも言い切れないさ。\n入力ミスは、不突合の原因のベスト５に入る」
1524 = "「Cũng không hẳn đâu.\nLỗi nhập liệu lọt top 5 nguyên nhân gây ra bất cân xứng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、『僕の場合は、電卓の方が確実だ』と言い直そう。\n暗算ミスなら、入力ミスの十倍は起こしてしまいそうだ」
2002 = "「Vậy để anh sửa lại là 『Trong trường hợp của anh, dùng máy tính chắc chắn hơn』.\nNếu tính nhẩm, có lẽ anh sẽ mắc lỗi gấp mười lần lỗi nhập liệu mất.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん、それほど暗算が苦手なんだね」
1674 = "「Hừm, anh kém tính nhẩm đến thế cơ à.」"
# monologue
# JP: 期待はずれといわんばかりに、声の温度がわずかに落ちる。
2252 = "Giọng cô ấy hơi trầm xuống, như thể thất vọng vì không đúng như mong đợi."
# 【稀咲】
# display as 稀咲
# JP: 「少し残念。九去法の原理が理解できていれば、\n踏み込んだ説明も容易になったのだけれどね」
1609 = "「Hơi tiếc thật. Nếu anh hiểu được nguyên lý của Cửu khứ pháp,\nthì em giải thích sâu hơn sẽ dễ dàng hơn nhiều.」"
# monologue
# JP: 切り替えるように素早くマウスを動かして、\n820の数字へと、稀咲は僕の注意を戻す。
2486 = "Như muốn chuyển chủ đề, Kisaki di chuyển chuột thật nhanh,\nhướng sự chú ý của tôi trở lại con số 820."
# 【稀咲】
# display as 稀咲
# JP: 「とにかく、桁違いの場合と、位違い――820円に対し、\n280円を支払ったような場合は、差額は9で割り切れる」
1942 = "「Tóm lại, trong trường hợp sai số hàng chục và sai số hàng đơn vị――ví dụ thay vì 820 yên,\nlại trả 280 yên, thì số tiền chênh lệch sẽ chia hết cho 9.」"
# monologue
# JP: 820-280は540円の過剰。\nなるほど、9で割り切れる。
2635 = "820-280 là dư 540 yên.\nRa là vậy, chia hết cho 9."
# 【稀咲】
# display as 稀咲
# JP: 「不突合の原因は、位違いか桁違いかが大半だから、\n9で割れた場合には、まずそこを疑って確認し直す」
1844 = "「Nguyên nhân của bất cân xứng phần lớn là do sai số hàng chục hoặc hàng đơn vị,\nnên nếu chia hết cho 9, trước tiên phải nghi ngờ và kiểm tra lại những chỗ đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「桁違いと位違いが原因でないときには？」
1710 = "「Nếu nguyên nhân không phải do sai số hàng chục hay hàng đơn vị thì sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「現金を数え直して、伝票内容と入力内容のチェック。\n各端末の利用記録と伝票とを突き合わせる」
2004 = "「Đếm lại tiền mặt, kiểm tra nội dung chứng từ và nội dung đã nhập.\nĐối chiếu chứng từ với lịch sử giao dịch của từng thiết bị.」"
# monologue
# JP: 稀咲の目が窓の下へと。\nまさにそうした光景が、今行われているようだ。
2478 = "Kisaki đưa mắt nhìn xuống dưới cửa sổ.\nCó vẻ như cảnh tượng đó đang diễn ra ngay lúc này."
# 【稀咲】
# display as 稀咲
# JP: 「振替、振込伝票を再確認して、\nそれでもなければ――あっ！」
1851 = "「Kiểm tra lại chứng từ chuyển khoản, nộp tiền,\nnếu vẫn không phải thì――á!」"
# monologue
# JP: 『[いっさん,1]一算！』と、晴れやかな声がここまで届く。
2516 = "Một giọng nói rạng rỡ vang lên đến tận đây: 『Khớp rồi!』"
# monologue
# JP: 行員たちはにこにこと、帰り支度を始めたようだ。
2597 = "Các nhân viên có vẻ đã bắt đầu mỉm cười và thu dọn đồ đạc ra về."
# 【稀咲】
# display as 稀咲
# JP: 「よかった。今回はすぐに終わったね。\n……ああ、両替機に現金の置き忘れがあったのか」
1694 = "「May quá. Lần này xong sớm nhỉ.\n……À, ra là có người để quên tiền mặt ở máy đổi tiền.」"
# monologue
# JP: 僕にはまるでわからんが、行員たちの動きと様子で、\nそこまでを読み取れるものらしい。
2598 = "Tôi thì chịu chết, nhưng có vẻ như cô ấy có thể đọc được\ntất cả những điều đó qua cử chỉ và điệu bộ của các nhân viên."
# monologue
# JP: いろいろな意味で感心させられ――\nけれど日々姫は僕とは逆に、あきれたような声を出す。
2173 = "Tôi thực sự ngưỡng mộ cô ấy về nhiều mặt――\nnhưng trái ngược với tôi, Hibiki lại thốt lên một giọng kinh ngạc."
# 【日々姫】
# display as 日日姬
# JP: 「って……今ので、『すぐに？』」
1941 = "「Khoan đã……vừa rồi mà gọi là 『sớm』 á?」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん、今の程度はトラブルのうちに入らないよ」
2012 = "「Tất nhiên, mức độ vừa rồi còn chưa được tính là rắc rối đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ならば、トラブルと呼ぶほどの問題は――」
1676 = "「Hửm? Vậy thì, vấn đề đến mức gọi là rắc rối thì――」"
# 【稀咲】
# display as 稀咲
# JP: 「分からないときは、朝までかけても分からない。\nその場合には、次の日もその次の日も原因を探す」
1721 = "「Những lúc không tìm ra thì có tìm đến sáng cũng không ra.\nTrong trường hợp đó, ngày hôm sau, rồi hôm sau nữa vẫn phải tiếp tục tìm nguyên nhân.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　何日も？」
1626 = "「Hả!? Cả mấy ngày trời á?」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。合わない以上は、原因がある。\nそれを突き止めないのなら、現金を扱う資格を失う」
1664 = "「Đúng vậy. Không khớp thì ắt phải có nguyên nhân.\nNếu không tìm ra được, thì không có tư cách xử lý tiền mặt nữa.」"
# monologue
# JP: 言葉と気迫に驚かされる。
2276 = "Lời nói và khí phách của cô ấy khiến tôi bất ngờ."
# monologue
# JP: 効率重視が、\n稀咲の姿勢だと感じたのだが――
2245 = "Tôi cứ nghĩ coi trọng hiệu suất\nlà phong cách của Kisaki cơ――"
# 【双鉄】
# display as 雙鐵
# JP: 「現金を扱う資格、とは……\nたとえ、合わないのが一円でもか？」
1947 = "「Tư cách xử lý tiền mặt, sao……\nCho dù số tiền không khớp chỉ là một yên?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。金額の[たか,1]多寡は関係ない。\n仮に一円の不突合でも、原因は必ず明らかにする」
1868 = "「Đúng vậy. Không quan trọng số tiền lớn hay nhỏ.\nDù chỉ lệch một yên, cũng phải làm rõ nguyên nhân.」"
# monologue
# JP: ほんの一瞬、\n稀咲の眉根が生々しく寄る。
2163 = "Trong một khoảnh khắc ngắn ngủi,\nchân mày Kisaki nhíu lại rõ rệt."
# 【稀咲】
# display as 稀咲
# JP: 「……他の可能性が全て潰れてしまった場合には。\n防犯カメラで、行員の動きを逐一チェックしてでも、ね」
1251 = "「……Trong trường hợp mọi khả năng khác đều đã bị loại trừ.\nThậm chí phải kiểm tra từng cử động của nhân viên qua camera an ninh.」"
# 【日々姫】
# display as 日日姬
# JP: 「あぁ……」
1643 = "「A……」"
# monologue
# JP: なるほど。そうか――\n銀行とは、つまりそういう仕事だ。
2230 = "Ra là vậy. Thì ra――\nNgân hàng, chính là một công việc như thế."
# 【双鉄】
# display as 雙鐵
# JP: 「不正の目を、そうして摘まねばならぬのか」
1765 = "「Phải triệt tiêu mầm mống gian lận như vậy sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「ミスと不正は、いつだって二人連れなのさ。\nだから、原因を必ず潰して、入り口で止める」
1695 = "「Sai sót và gian lận lúc nào cũng đi đôi với nhau mà.\nThế nên, phải dập tắt nguyên nhân, chặn đứng ngay từ cửa ngõ.」"
# monologue
# JP: 稀咲の目の先、一階フロアにはもう誰一人残っていない。
2501 = "Nơi Kisaki đang nhìn, tầng một đã không còn một bóng người."
# monologue
# JP: 規律、整頓――それが行き届いているからこその、\n機敏さなのだと、だから感じる。
2402 = "Kỷ luật, ngăn nắp――chính vì được duy trì tốt,\nnên mới có được sự nhanh nhẹn như vậy, tôi cảm thấy thế."
# 【稀咲】
# display as 稀咲
# JP: 「環境が緩めば、人は緩む。一円の誤差を許容すれば、\nそれは必ず、十円、百円となってしまう」
1896 = "Kisaki rời mắt khỏi tầng dưới, nhìn thẳng vào tôi."
# monologue
# JP: 稀咲は眼下から視線を外し、僕へと真っ直ぐ向け直す。
2482 = "「Tiền là thù lao cho sức lao động――câu trả lời của Soutetsu chắc chắn là đúng.\nNhưng hơn thế nữa, em cho rằng tiền chính là niềm tin.」"
# 【稀咲】
# display as 稀咲
# JP: 「お金は労働の対価だと――双鉄の答えは、確かに正しい。\nその上で僕は。お金とは、信頼そのものだとも考える」
2023 = "「Tiền là……ra vậy. Niềm tin sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お金は……なるほど。信頼か」
1585 = "「Hả? Cái gì mà ra vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　なにが、なるほど？」
1633 = "「Nếu mọi người không tin tưởng vào tiền,\nthì tiền giấy cũng chỉ là những mảnh giấy vụn mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「みながお金を信頼せねば、\n紙幣など、ただの紙切れになってしまうということだ」
1711 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「んん？」
1672 = "Hibiki nghiêng đầu vẻ khó hiểu."
# monologue
# JP: 日々姫の首が大きく傾ぐ。
2387 = "Thấy vậy, Kisaki lấy ra một tờ một vạn yên từ trong ví,\nsau đó viết \"Một vạn yên\" lên một tờ giấy nhớ."
# monologue
# JP: それを見、稀咲は財布から一万円札を出し、\n次いで、メモ用紙の一枚に「一万円」と書く。
2508 = "「Cả hai tờ này đều là tờ một vạn yên. Một tờ do Ngân hàng Hinomoto phát hành,\nvà một tờ do cá nhân Houshou Kisaki phát hành.」"
# 【稀咲】
# display as 稀咲
# JP: 「これは、両方とも一万円札だ。日ノ本銀行発行のものと、\n宝生稀咲、個人が発行したものと」
1987 = "「Hả?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1629 = "「Một tờ có thể sử dụng ở khắp mọi nơi trên toàn quốc Hinomoto,\ncòn một tờ thì không ai coi nó là tiền tệ cả.」"
# 【稀咲】
# display as 稀咲
# JP: 「この内の片方は日ノ本全国各地で使え、\nもう片方は誰からも、通貨として扱ってもらえない」
1579 = "「Chuyện đó……chẳng phải là đương nhiên sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなの……当たり前じゃないですか」
1985 = "Kisaki mỉm cười đáp lại lời nói đầy vẻ hoài nghi của Hibiki."
# monologue
# JP: 怪訝そうな日々姫の言葉に答える稀咲はにこやかだ。
2494 = "「Tại sao lại là đương nhiên chứ.」"
# 【稀咲】
# display as 稀咲
# JP: 「何故、当たり前なのかな」
1880 = "「Bởi vì……tờ giấy tiền bối Kisaki viết tay,\nchỉ là một mảnh giấy vụn có viết chữ một vạn yên――A.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって……稀咲先輩の手書きのやつは、\n一万円って書いただけの、ただの紙切れ――あ」
1687 = "Dường như đã hiểu ra,\nđôi mắt Hibiki sáng long lanh và mở to."
# monologue
# JP: 理解したのか、\n日々姫の目がキラキラ輝き、丸くなってく。
2379 = "「Nhưng, thế nhưng――cũng giống nhau thôi. Tờ một vạn yên thật,\ndù được in ấn đẹp đẽ……thì rốt cuộc cũng chỉ là một mảnh giấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「でも、だけど――同じ。本物の一万円札も、\n綺麗に印刷されてはいるけど……やっぱり、紙切れ」
1539 = "「Một mảnh giấy vụn có thể được lưu thông như một loại tiền tệ, như một vật thay thế cho sức lao động――\nđó là vì có niềm tin đặt vào nó đúng không?」"
# 【稀咲】
# display as 稀咲
# JP: 「ただの紙切れが通貨として、労働力の代替物として、\n通用するのは――そこに信頼があるからだよね？」
1809 = "「Ra là vậy. Phiếu mua hàng cũng thế nhỉ.\nVì biết là dùng được, vì tin tưởng được nên nó không phải là giấy vụn.」"
# 【日々姫】
# display as 日日姬
# JP: 「なんですね。商品券とかもそうですよね。\n使えるってわかってる、信頼できるから紙切れじゃない」
1830 = "「Nói cách khác, niềm tin vào đơn vị phát hành\nchính là thứ bảo chứng cho giá trị của tiền tệ sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいかえれば、発行元に対する信頼が、\n通貨の価値を担保している、ということになるか」
1816 = "Nếu niềm tin đó bị phá vỡ――\nVí dụ như quốc gia phát hành bị phá sản, thì tiền tệ cũng sẽ sụp đổ."
# monologue
# JP: その信頼が壊れてしまえば――\n例えば発行元の国が破綻してしまったなら、通貨も破綻だ。
2285 = "Những tờ tiền giấy ngày hôm qua sẽ biến thành giấy lộn, và chỉ có ngoại tệ, vàng bạc hay đá quý\nmới có thể đổi lấy một mẩu bánh mì."
# monologue
# JP: 昨日までの紙幣が紙切れになり、外貨や金や宝石でしか、\nパンの一枚さえも手に入れられなくなってしまう。
2393 = "「Ngân hàng là nơi xử lý niềm tin dưới hình thức tiền bạc.\nThế nên, dù chỉ là một yên, cũng không thể làm tổn hại đến nó được.」"
# 【稀咲】
# display as 稀咲
# JP: 「銀行は、お金という形の信頼を扱っている場所だ。\nだから仮に一円だろうと、それを損ねることは出来ない」
2036 = "「Ra là vậy――đó chính là,\n『giá trị của đồng tiền』 đối với Houshou Kisaki sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――それが、\n宝生稀咲にとっての、『お金の価値』か」
1584 = "Nếu là vậy thì tôi hoàn toàn có thể đồng cảm――\nNghĩ đến đây, tôi chợt thấy xấu hổ về bản thân lúc nãy."
# monologue
# JP: そういうことなら共感できる――\n思った瞬間、さっきの自分が恥ずかしくなる。
2571 = "「Xin lỗi vì thái độ lúc nãy của anh. Chưa hiểu rõ ý nghĩa thực sự trong lời nói của em,\nchỉ nghe nói tiền quan trọng, anh đã hiểu lầm em là một kẻ hám tiền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまない態度を見せてしまった。言葉の真意もわからず、\n金が大事と聞いただけで、君を守銭奴のように誤解した」
1503 = "「Trái lại, em phản đối việc chỉ biết khư khư tích trữ tiền bạc đấy?\nBởi vì em nghĩ tiền chỉ thực sự là tiền khi nó được lưu thông đúng cách.」"
# 【稀咲】
# display as 稀咲
# JP: 「お金をただ貯めこむことにはむしろ否定的だよ？\nお金は、正しく流通させてこそのお金だと思うから」
1573 = "Nếu thay chữ tiền bằng chữ niềm tin, tôi cảm thấy mình có thể hiểu sâu sắc hơn\nvề giá trị quan của Houshou Kisaki――à, khoan đã."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 1587 = "「原來如此」" 
# monologue
# JP: お金を信頼と言い換えたなら、宝生稀咲の価値観を、\nより深く理解できそうにも――ああ、いや。
2288 = "「Đúng rồi……nói cách khác, nó gần như là một.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ……言い換えれば、ほとんど同じことなのだ」
1743 = "「Nghe này, Houshou Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？」
# 2058 = "「雙鐵？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「聞いてくれ、宝生稀咲」
1741 = "Nhìn thẳng vào cô ấy,\ntôi truyền đạt những lời muốn nói một cách trực diện."
# monologue
# JP: まっすぐに見て、\nただまっすぐに言葉を伝える。
2346 = "「Một yên đối với ngân hàng,\ncũng giống như một giọt nước sông Kuma đối với xưởng nấu shochu vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「銀行にとっての一円が、\n焼酎酒造にとっては、クマ川の水の一滴なのだ」
2052 = "「A.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ」
1648 = "Vẻ mặt như thể bị đánh trúng điểm yếu."
# monologue
# JP: 虚を突かれたと、そんな表情。
2274 = "Kisaki chớp mắt vài lần,\nrồi từ từ thốt lên bằng một giọng như mất hết sức lực."
# monologue
# JP: 稀咲はなんどかまばたきをして、\nそれからゆっくり、脱力したような声を出す。
2480 = "「A……ra vậy. Ra là thế. Ra là thế――\nĐó là điều không thể nhượng bộ, nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「あー……そうか。なるほど。なるほど――\nそれは、譲れないところだ、ね」
1644 = "「Đúng vậy. Dù chỉ nhượng bộ một bước――\ncũng sẽ phá hủy đi niềm tin mà shochu Kuma đã dày công gây dựng bấy lâu nay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。ただの一歩でも譲っては――\nクマ焼酎が今まで積み重ねてきた信頼を破壊してしまう」
1867 = "「Một ngân hàng không coi trọng và không bảo vệ nổi một yên――\nthì rốt cuộc sẽ có ai muốn sử dụng chứ, anh nghĩ chuyện này cũng tương tự như vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1669 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「一円を大事にせず、守ることが出来ぬ銀行を――\nいったい、どこの誰が使うのか、という話かとも思う」
1799 = "Chậm rãi, sâu sắc.\nKisaki gật đầu."
# monologue
# JP: ゆっくり、深く。\n稀咲が頷く。
2504 = "「Không ai dùng đâu, một ngân hàng như thế.\nVậy nên……shochu mà không bảo vệ nổi nguồn nước, thì sẽ không còn ai uống nữa?」"
# 【稀咲】
# display as 稀咲
# JP: 「使わないね、そんな銀行。\nだから……水も守れない焼酎は、飲まれなくなる？」
1864 = "「Anh tin chắc là vậy. Dù không có ảnh hưởng ngay lập tức\nnhưng dần dần, chắc chắn sẽ xảy ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうと僕は確信している。すぐには影響が出なくても\nいずれは徐々に、確実に」
1796 = "「Nếu vậy……Ohito sẽ đánh mất thương hiệu shochu Kuma.\nKhoản lợi nhuận bị mất đó――đúng là không thể phớt lờ được.」"
# 【稀咲】
# display as 稀咲
# JP: 「となると……御一夜はクマ焼酎というブランドを失う。\nその[いっしつ,1]逸失利益は――確かに無視できるものとも思えない」
1991 = "「Vậy thì, thế nào.\nChuyện mời gọi nhà máy, em có thể xem xét lại được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、どうだ。\n工場誘致の件、再検討をしてもらえんか」
1998 = "「Đừng vội vàng thế, Soutetsu. Chuyện lớn như vậy,\nmột Giám đốc chi nhánh như em làm sao có thể quyết định ngay được.」"
# 【稀咲】
# display as 稀咲
# JP: 「慌てないでくれ、双鉄。そこまでのこと、\n支店長レベルで即決できるわけがないだろう」
2055 = "「Ưm……cũng phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ……そうか」
1639 = "Vui mừng vì đã tìm được tiếng nói chung,\ntôi có hơi vội vàng quá."
# monologue
# JP: 話が通じた喜びに、\nいささか焦りすぎてしまった。
2282 = "Kisaki cười khổ,\nđưa tay vân vê lọn tóc dài của mình."
# monologue
# JP: 稀咲は苦笑し、\nその長い髪の毛先をつまんで、指先で弄る。
2506 = "「……Trước mắt thì……tóm lại, hãy để em đưa ra những con số cụ thể.\nTrong trường hợp đánh mất thương hiệu shochu Kuma――」"
# 【稀咲】
# display as 稀咲
# JP: 「……ひとまずは……とにかく、数字を出させて欲しい。\nクマ焼酎というブランドを逸失してしまった場合――」
1260 = "（Cộc cộc）"
# monologue
# JP: （ゴンッ、ゴンッ）
2631 = "Tiếng gõ cửa thô bạo――như thể đang đập cửa.\nVai Kisaki giật nảy lên."
# monologue
# JP: 乱暴な――叩きつけるようなノックの音。\n稀咲の肩がビクリと動く。
2581 = "「Bố――à không, Chủ tịch!?」"
# 【稀咲】
# display as 稀咲
# JP: 「父さ――と、頭取っ！？」
1887 = "「Ta vào được chứ? Có chuyện công việc.」"
# 【元忠】
# display as 元忠
# JP: 「入っていいか？　仕事の話だ」
1798 = "「Khoan, khoan, đợi một chút đã――\nHiện tại đang có khách――Hibiki và Soutetsu đang ở đây.」"
# 【稀咲】
# display as 稀咲
# JP: 「ちょ、ちょ、ちょっと待って――\nいま、来客中――日々姫と双鉄が来てるんだ」
1939 = "「Ồ?」"
# 【元忠】
# display as 元忠
# JP: 「ほう？」
1634 = "「――Hừm.\nCó một sự hiểu lầm lớn ở đây.」"
# 【元忠】
# display as 元忠
# JP: 「――ふむ。\n一つ、大きな誤解がある」
1234 = "……Đáng lẽ đến tìm Kisaki, nhưng ông ấy lại chăm chú lắng nghe tôi nói."
# monologue
# JP: ……稀咲を訪ねてきた筈が、僕から熱心に話を聞いて。
1223 = "Ngay sau khi tôi kể lại toàn bộ câu chuyện đã nói với Kisaki,\nHoushou Mototada thẳng thừng tuyên bố."
# monologue
# JP: 稀咲と話したひと通り、そのままを伝え終えればすぐさま、\n宝生元忠はズバリと言い切る。
2341 = "「Người mua không quan tâm đến môi trường nước đâu.\nTiêu chí để họ quyết định mua chỉ là ngon hay dở, đắt hay rẻ mà thôi.」"
# 【元忠】
# display as 元忠
# JP: 「水環境のことなど、買い手は気にせんよ。\n購買の判断基準は、旨いまずいと、高い安いとだけだ」
1965 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1618 = "Tôi không thể nghĩ ra lời phản bác ngay lập tức.\nĐó quả thực là――một sự thật tàn khốc."
# monologue
# JP: とっさに反論を思いつけない。\nそれは確かに――、一面の強烈な真実だ。
2157 = "「Nhưng, xưởng nấu rượu thì có quan tâm.\nNếu nhượng bộ điểm đó, một thứ gì đó rất quan trọng sẽ bị đánh mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、酒造はそれを気にします。\nそこを譲れば、なにか、大事なものが失われます」
1543 = "Thứ bị đánh mất.\nNiềm tự hào, truyền thống――và sự tự tin được xây đắp từ những điều đó."
# monologue
# JP: 失われるもの。\n誇り、伝統――そうしたものが支える自信。
2322 = "Đúng là như vậy, nhưng……"
# monologue
# JP: それは確かにそうなのだけれど……
2557 = "「Nếu chỉ vì không bảo vệ được một giọt nước mà làm giảm hương vị,\nthì shochu Kuma suy cho cùng cũng chỉ là loại rượu tầm thường thôi.」"
# 【元忠】
# display as 元忠
# JP: 「一滴の水を守れぬことから、味が落ちるというのなら、\nクマ焼酎は、所詮そのレベルの酒とも言えるだろう」
1719 = "「!」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2063 = "Lại một sự thật phũ phàng nữa khó lòng phản bác."
# monologue
# JP: これもまた、反論しがたい事実の指摘だ。
2190 = "Nếu lấy sự suy giảm chất lượng nước không thể đo đếm được làm cái cớ cho việc giảm sút chất lượng sản phẩm,\nthì dù có bị đánh giá là sự yếu kém và dựa dẫm của nhà sản xuất cũng đành chịu."
# monologue
# JP: 数値に出ない水の悪化を品質低下の言い訳とするのなら、\n製作者側の甘えや弱さと断じられても仕方ない。
2287 = "「Để ta hỏi ngược lại cậu. Shochu Kuma,\nlà loại rượu dễ dàng bị hủy hoại chỉ vì một giọt nước bị vấy bẩn sao?」"
# 【元忠】
# display as 元忠
# JP: 「逆に聞こう。クマ焼酎とは、\n水の一滴を損ねることで、壊れてしまう程度の酒かね？」
1815 = "「Làm gì có chuyện đó!」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんこつあるわけなかっ！」
2000 = "「Vậy thì, không có vấn đề gì cả.」"
# 【元忠】
# display as 元忠
# JP: 「ならば、何の問題も無い」
1994 = "「A――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1640 = "Chỉ với vài lời.\nĐã đủ làm lung lay tận gốc rễ những lập luận của chúng tôi."
# monologue
# JP: ほんの数語。\nただそれだけで、論拠をガタガタに揺すられる。
2180 = "Bị dồn vào chân tường bởi chính lời nói của mình, Hibiki cứng họng,\ncon bé nhìn tôi với ánh mắt cầu cứu."
# monologue
# JP: 自身の言葉に追い詰められて、絶句させられ、\n日々姫は僕にすがる視線を向けてくる。
2385 = "「Cháu nghĩ những gì bác nói hoàn toàn chính xác.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ご主張の点はその通りかと思います」
1777 = "Dù không có ánh mắt đó, tôi vẫn muốn đối mặt.\nTôi muốn thử thách và mài giũa bản thân bằng những lời chỉ trích sắc bén của Houshou Mototada."
# monologue
# JP: それがなくとも、向き合ってみたい。\n宝生元忠の厳しい指摘で、自分を洗って、計ってみたい。
2302 = "「Tuy nhiên, việc làm ô nhiễm nguồn nước không mang lại lợi ích gì cho chúng cháu.\nNgược lại, dù không thấy ngay trước mắt, nhưng rủi ro về lâu dài là rất lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですが、僕らには水を汚すメリットは無い。\n反面、すぐに見えずとも、長期的なリスクは大きい」
1540 = "「Lợi ích thì có đấy. Nếu thành phố Ohito suy tàn,\nthì shochu Kuma, chèo thuyền trên sông Kuma hay đường sắt cũng sẽ lụi bại theo.」"
# 【元忠】
# display as 元忠
# JP: 「メリットならある。御一夜市が衰退してしまうのなら、\nクマ焼酎もクマ川下りも鉄道も衰退していく」
1704 = "「Việc ngăn chặn sự suy tàn của thành phố Ohito không liên quan trực tiếp đến việc mời gọi nhà máy.\nChúng cháu tin rằng có những cách khác để phục hưng Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市の衰退を防ぐことと、工場誘致とは直結しない。\n僕らは他のやり方で御一夜を再興できると考えています」
2046 = "「Ồ, nếu cháu có ý tưởng khác thì thú vị đấy.」"
# 【元忠】
# display as 元忠
# JP: 「ほう、他のアイディアがあるというなら、面白い」
1636 = "Bác Mototada cười nhếch mép, đưa tay vuốt cằm."
# monologue
# JP: ニヤリと笑い、元忠氏の手がその顎を撫ぜる。
2211 = "「Vậy thì hãy cạnh tranh xem bên nào ưu việt hơn đi. Một cuộc chiến.」"
# 【元忠】
# display as 元忠
# JP: 「ならば優劣を競おうではないか。闘争だ」
2008 = "「Một cuộc chiến――」"
# 【双鉄】
# display as 雙鐵
# JP: 「闘争――」
1937 = "「Với tư cách là Giám đốc chi nhánh,\ncháu xin phép được phản đối ý kiến đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「支店長として、\nそのご意見には異議を唱えさせていただきます」
1557 = "Khoảnh khắc bị áp đảo bởi những lời lẽ mạnh mẽ đó,\nđã bị phá vỡ bởi một giọng nói lạnh lùng xen vào."
# monologue
# JP: 強い言葉にやや気圧された一瞬を、\n涼しい声が割り込み、壊す。
2161 = "Kisaki vẫn giữ vẻ mặt điềm nhiên,\nlặng lẽ nhìn chằm chằm vào Houshou Mototada."
# monologue
# JP: 稀咲は全く変わらぬ様子で、\n宝生元忠を静かに見据える。
2511 = "「Phản đối?」"
# 【元忠】
# display as 元忠
# JP: 「異議とは？」
1604 = "「Việc thành phố Ohito bị chia rẽ là điều không nên.\nChúng ta cần cố gắng đạt được sự đồng thuận từ càng nhiều người càng tốt――」"
# 【稀咲】
# display as 稀咲
# JP: 「御一夜市が二分されるのは好ましくありません。\nできるかぎり多くからの同意を得られるように――」
1785 = "「Tất nhiên, chúng ta cũng sẽ nỗ lực làm điều đó.\nNhưng nếu hai bên đều không chịu nhượng bộ, thì chỉ còn cách đối đầu thôi.」"
# 【元忠】
# display as 元忠
# JP: 「もちろん、そうした努力も行う。\nが、譲れぬもの同士であれば、ぶつかるしかない」
1791 = "「Thật vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうでしょうか？」
1833 = "Đối đầu với nhau, và kẻ yếu hơn sẽ bị nuốt chửng."
# 【元忠】
# display as 元忠
# JP: 「ふむ？」
# 1669 = "「嗯」" 
# monologue
# JP: ぶつかりあって、劣った方が飲み込まれる。
2599 = "Có thể sự mạnh mẽ được rèn giũa qua đó cũng tốt,\nnhưng tôi không nghĩ đó là điều Ohito cần lúc này."
# monologue
# JP: そうして研磨される強さもあろうが、\n今の御一夜に求めるべきが、それであるとは思えない。
2291 = "「Mục tiêu của bác chắc chắn không phải là việc mời gọi nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;.\nViệc mời gọi nhà máy chỉ là phương tiện để phục hưng Ohito và chấn hưng kinh tế thôi, đúng không ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あなたの目標とて、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致自体ではない筈だ。\n誘致はあくまで、御一夜再生、経済振興の手段ですよね」
1775 = "「Haha, vậy là cháu muốn nói điều này sao.\n『Cháu có một kế hoạch phục hưng Ohito xuất sắc hơn việc mời gọi nhà máy』.」"
# 【元忠】
# display as 元忠
# JP: 「ははぁ、つまりはこう言いたいわけか。\n『工場誘致より優れた御一夜再生計画がある』と」
1620 = "「Đúng hơn là――\nCháu cảm thấy việc mời gọi nhà máy không phải là một kế hoạch phục hưng xuất sắc cho lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうよりむしろ――\n工場誘致は、さほど優れた再生計画ではない気がします」
1783 = "「Ồ.」"
# 【元忠】
# display as 元忠
# JP: 「ほう」
1681 = "Ánh mắt nhìn tôi sắc bén lại."
# monologue
# JP: 僕を見る目が鋭く細まる。
2193 = "Biểu cảm đó có nét gì đó giống Kisaki,\nkhiến tôi có suy nghĩ thảnh thơi rằng “Quả đúng là cha con”."
# monologue
# JP: その表情が稀咲とどこか似通っていて、\n“親子なのだな”と、のんきなことを感じてしまう。
2572 = "「Mượn ví dụ lúc nãy của bác, thì đó là 『loại rượu không ngon nhưng rẻ』.\nĐại đa số người dân Ohito đều coi việc mời gọi nhà máy là như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さっきの例えを借りるなら、『旨くはないが安い酒』。\n御一夜市民の大多数は、工場誘致をそう捉えている」
1749 = "Một tiếng kêu như thích thú của Kisaki.\nTrong một khoảnh khắc ngắn ngủi, Houshou Mototada nhíu mày vẻ khó chịu."
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
# 1587 = "「原來如此」" 
# monologue
# JP: 面白がるような稀咲の一声。\nほんの一瞬、不愉快そうに宝生元忠の眉根が寄る。
2298 = "「Nhưng mà, Ohito đang khốn khó.\nDù là rượu rẻ tiền, nếu không có nó thì sẽ chết khát mất.」"
# 【元忠】
# display as 元忠
# JP: 「しかしだ、御一夜は困窮している。\n安酒であれ、それがなければ渇ききるほどに」
1549 = "（Ồ.）"
# monologue
# JP: （おお）
2627 = "Nói nặng lời quá, dù là chuyện của người khác nhưng tôi vẫn thấy lo."
# monologue
# JP: 随分なことを言うなと、他人ごとながら心配になる。
2334 = "Nhân viên của \x%lエアクラ;#00ffc040;Aircra%l;#;――Tôi liếc nhìn về phía anh Uragami,\nchắc chắn anh ấy nghe thấy, nhưng biểu cảm không hề thay đổi."
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;社員――浦上の方をちらりと見れば、\n聞こえないわけもなかろうに、表情はまるで変化してない。
2325 = "「Nếu có loại rượu vừa rẻ vừa ngon,\nthì ta cũng muốn nếm thử xem sao.」"
# 【元忠】
# display as 元忠
# JP: 「安くて旨い酒があるなら、\n私にも飲ませて欲しいものだ」
1715 = "「Cháu không thể chuẩn bị ngay lúc này được.\nNhưng――」"
# 【双鉄】
# display as 雙鐵
# JP: 「今すぐに用意できるものでもありません。\nが――」
2053 = "「Cháu định từ giờ sẽ chuẩn bị sao?\nBằng cách kết hợp suối nước nóng, shochu và cả đường sắt nữa.」"
# 【元忠】
# display as 元忠
# JP: 「これから用意するつもりかね？\n温泉と焼酎と、それに鉄道を加えて」
1566 = "「Đúng như bác nói.\nĐó là định hướng cơ bản của chúng cháu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仰るとおり。\nその線を基本と考えています」
1852 = "「Hừ.」"
# 【元忠】
# display as 元忠
# JP: 「ふん」
1637 = "Một tiếng thở hắt ra từ mũi."
# monologue
# JP: 鼻から短く抜くような息。
2192 = "Khi ông ấy nhún vai,\ntôi mới nhận ra đôi vai đó thật vạm vỡ, trái ngược với thân hình mảnh khảnh."
# monologue
# JP: 竦められればその肩が、\n細身によらず、分厚いものだと気付かされる。
2195 = "「Nếu vậy thì tất cả đều là di vật của quá khứ.\nKhông thể dẫn đến sự phục hưng của Ohito được đâu.」"
# 【元忠】
# display as 元忠
# JP: 「それなら全てが、過去の遺物だ。\n御一夜の再生には繋がらんよ」
1551 = "「Nếu chỉ lấy ra từng cái một, thì có thể là vậy.\nNhưng, nếu kết hợp chúng lại, chúng ta có thể tạo ra những giá trị hoàn toàn mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一個一個を取り上げるなら、そうであるかもしれません。\nが。連携させれば、まったく新しい価値を創出できます」
1723 = "「Kết hợp, nhỉ.」"
# 【元忠】
# display as 元忠
# JP: 「連携、ね」
1912 = "Đôi mắt của Houshou Mototada lại nheo lại, quan sát tôi thật kỹ."
# monologue
# JP: 宝生元忠の目がまた細まり、僕をじっくり眺め回す。
2297 = "「……Đúng như ta đã nói.\nNếu là loại rượu vừa rẻ vừa ngon, ta cũng rất sẵn lòng thưởng thức.」"
# 【元忠】
# display as 元忠
# JP: 「……言ったとおりだ。\n安くて旨い酒ならば、私も喜んで飲む」
1245 = "Vẫn giữ nguyên ánh mắt sắc bén,\nbác Mototada quay sang Kisaki."
# monologue
# JP: 鋭い目つきを緩めぬままに、\n元忠氏は稀咲へと向き直る。
2210 = "「Kisaki là đứa con gái đáng tự hào của ta.\nNó sẽ giúp ích cho việc lập kế hoạch kinh doanh đấy.」"
# 【元忠】
# display as 元忠
# JP: 「稀咲は私の自慢の娘だ。\n経営計画の立案には役に立つ」
1931 = "「Soutetsu, cháu có muốn dùng không?」"
# 【稀咲】
# display as 稀咲
# JP: 「えっ」
# 1629 = "「哎？」" 
# 【元忠】
# display as 元忠
# JP: 「双鉄くん、使うか？」
2056 = "Điều đó là đương nhiên.\nNhưng tôi vẫn cẩn thận trong cách trả lời."
# monologue
# JP: 是非も無い。\nが、答え方には気をつける。
2570 = "「Nếu nhận được sự giúp đỡ của Kisaki,\ncháu sẽ vô cùng biết ơn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲さんのご助力をいただけるなら、\n極めてありがたく思います」
1726 = "「Vậy thì, Giám đốc chi nhánh Ohito. Việc mời gọi nhà máy cứ để ta lo.\nCon hãy rút lui khỏi chuyện đó, và tập trung vào phương án khác đi.」"
# 【元忠】
# display as 元忠
# JP: 「ならば御一夜支店長。誘致は私の方で進める。\n君は外れて、別案の方に注力してくれたまえ」
1705 = "「Chuyện đó――」"
# 【稀咲】
# display as 稀咲
# JP: 「それは――」
1983 = "Kisaki rõ ràng đang dao động."
# monologue
# JP: 稀咲は、明らかに動揺している。
2490 = "Đôi má hơi ửng hồng,\ncô ấy nhìn tôi rồi lại nhìn bác Mototada bằng ánh mắt bất an."
# monologue
# JP: 頬をわずかに紅潮させて、\n落ち着かぬ目で僕を、元忠をじゅんじゅんに見る。
2273 = "「……Bố đang nói với tư cách là Bố, hay là Chủ tịch vậy?」"
# 【稀咲】
# display as 稀咲
# JP: 「……父と、頭取、どっちの立場で」
1256 = "「Là mệnh lệnh công việc. Giám đốc chi nhánh.」"
# 【元忠】
# display as 元忠
# JP: 「業務命令だ。支店長」
1990 = "「Vậy sao. Nếu thế thì tôi xin tuân lệnh.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうですか。でしたら拝命いたします」
1702 = "「Ta mong chờ sự nỗ lực hết mình của con.\nĐừng làm ta thất vọng đấy nhé?」"
# 【元忠】
# display as 元忠
# JP: 「全力を期待している。\n私を失望させんでくれよ？」
1793 = "Nói rồi, bác Mototada quay sang tôi.\nTrong ánh mắt ấy không còn sự sắc bén như lúc nãy nữa."
# monologue
# JP: 言って、元忠氏は僕へ向く。\nその目にはもう、先程までの鋭さは無い。
2214 = "「Ta nghĩ thế này, Soutetsu. Bản tính của một con người,\ncó thể nhìn thấu qua cách họ sử dụng tiền bạc và con người.」"
# 【元忠】
# display as 元忠
# JP: 「私はね、双鉄くん。その人間の本性は、\n金の使い方と、人の使い方から見えると思っている」
2057 = "「Cách sử dụng tiền bạc……và con người, sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「金と……人との使い方、ですか」
1901 = "「Hãy cho ta xem đi.\nBản tính con người cháu.」"
# 【元忠】
# display as 元忠
# JP: 「見せてもらうよ。\n君という人間の、本性を」
1961 = "Tôi cảm nhận rõ ràng mình đang bị thử thách.\nĐồng thời, một câu hỏi tự vấn được gieo vào tâm trí tôi."
# monologue
# JP: 試されてると、強く感じる。\n同時に自問を植え付けられる。
2338 = "Rốt cuộc, một kẻ như tôi,\nsẽ đối xử với tiền bạc, với con người như thế nào?"
# monologue
# JP: いったい、僕という人間は、\nどのようにして、金を、人を、扱うのだろう？
2354 = "「Ồ――đến giờ rồi. Một cuộc nói chuyện thú vị. Cảm ơn nhé.」"
# 【元忠】
# display as 元忠
# JP: 「と――時間だ。面白い話ができた。感謝する」
1623 = "（Rầm）"
# monologue
# JP: （バタンっ）
2628 = "Đơn phương cắt đứt cuộc nói chuyện,\nbác Mototada đột ngột rời khỏi phòng y như lúc mới đến."
# monologue
# JP: 一方的に話を打ち切り、\n来た時同様、いきなり元忠氏は部屋を出て行く。
2213 = "Một khoảnh khắc im lặng, như thể không biết phải làm sao――"
# monologue
# JP: 一瞬の、途方にくれたような沈黙――
2162 = "「Xin lỗi nhé. Bố em.\nÔng ấy……là người như vậy đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「済まない。父が。\nあれは……ああいう人なんだ」
1501 = "「A……ừm……\nKhông sao đâu, nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……あの……\n別に、ねぇ？」
1647 = "「Anh không nghĩ em cần phải xin lỗi đâu.\nThực tế thì, chúng ta đã có một cuộc thảo luận rất tốt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「謝られるようなこととは思わん。\n実際、良い話し合いをさせてもらった」
1559 = "「Không, tốt gì chứ.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、良い話し合いって」
1992 = "「Anh hai ngây thơ quá! \nThế này là trúng kế của ổng rồi còn gì!」"
# 【日々姫】
# display as 日日姬
# JP: 「甘かばい！　にぃに！\nあんなん、向こうの思う壺ばい！」
2050 = "Kisaki gật đầu đồng tình với lời nói hùng hồn của Hibiki.\nTôi cũng đồng tình với điều đó."
# monologue
# JP: 勢いこんだ日々姫の言葉に、稀咲も頷く。\n僕とて、そこには同感だ。
2527 = "「Đúng là vậy. Dù kết quả có ra sao, bác Mototada cũng không thiệt thòi.\nCho dù chúng ta có lập được kế hoạch tái thiết tốt hay không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。どう転んでも、元忠氏は損をしない。\n僕らが上手い再建計画を立案できても、そうでなくても」
1826 = "「Hả!?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1624 = "Hibiki tròn mắt ngạc nhiên.\nTrái ngược với con bé, vẻ nhẹ nhõm bắt đầu lan tỏa trên khuôn mặt Kisaki."
# monologue
# JP: 驚きに、日々姫の目が丸くなる。\n稀咲の顔には正反対に、安堵の色が滲み始める。
2391 = "「Anh hai――ưm――anh trai.\nAnh đã biết thế rồi, tại sao còn...」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――んっ――兄さん。\nそれがわかっているなら、なんで」
2048 = "「Vì thực tế thì đó là một thỏa thuận tốt.\nViệc không bị thiệt thòi, chúng ta cũng hoàn toàn giống nhau mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際に良い話だからだ。\n損が無いのは、僕らも全く同じだろう？」
1689 = "「A!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1652 = "Người đã hành động đúng như toan tính, không chỉ có mình Houshou Mototada."
# monologue
# JP: 思惑通りにことを運んだのは、宝生元忠一人ではない。
2300 = "Cả chúng ta nữa, nếu có thể lập ra một kế hoạch tái thiết ưu việt hơn,\nthì việc mời gọi nhà máy sẽ bị rút lại――chúng ta đã có được lời hứa hẹn tương đương như vậy."
# monologue
# JP: 僕らとて、より優れた再生計画を立案できれば、\n工場誘致を撤回すると――それに等しい言質を得たのだ。
2321 = "「Thêm vào đó, Houshou Kisaki――còn có được sự giúp đỡ của em nữa.\nNếu nói về được mất, anh nghĩ điểm số của chúng ta còn cao hơn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それに加えて、宝生稀咲――君の助力まで得られるのだ。\n損得でいえば、むしろ僕らの得点の方が多いと思う」
1945 = "「Fufu, vinh hạnh thật.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ、光栄だね」
1679 = "Một bàn tay trắng ngần,\nđưa thẳng về phía tôi."
# monologue
# JP: まっすぐに、\n真っ白い手が伸びてくる。
2257 = "「Một khi đằng nào cũng mang lại lợi ích cho ngân hàng,\nem sẽ toàn tâm toàn ý, dốc hết sức hợp tác với anh.」"
# 【稀咲】
# display as 稀咲
# JP: 「どう転んでも銀行の利益になる以上、\nボクも心置きなく、全力で君に協力しよう」
1820 = "「Đáng tin cậy thật, trăm sự nhờ em nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心強いな、よろしく頼む」
1838 = "「Em cũng vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ」
1787 = "Một cái bắt tay ngắn ngủi.\nNhưng đầy mạnh mẽ."
# monologue
# JP: 短い握手。\n力強い。
2323 = "Không biết có phải do cho quá nhiều Tabasco vào pizza không,\nnhưng tay Kisaki hơi rịn mồ hôi và ẩm ướt."
# monologue
# JP: ピザにタバスコをかけすぎたのか、\n稀咲の手は、少し汗ばんでしっとりしている。
2337 = "「Thế? \nCụ thể thì kế hoạch của các anh tiến triển đến đâu rồi?」"
# 【稀咲】
# display as 稀咲
# JP: 「で？　\n具体的に、君たちの計画はどの程度進んでいるんだい？」
1804 = "「Rất tiếc là, hầu như chưa có gì.\nNgay cả việc tận dụng 8620――đường sắt như thế nào, cũng chưa được xác định.」"
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、まだほとんど。\n[ハチロクニイマル,3]8620――鉄道をどう活用するかも、確定してない状況だ」
1955 = "「Ra là vậy.\nThế thì, chắc em phải bắt đầu khảo sát từ đó thôi nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。\nでは、まずはそこから視察させてもらうとするかな」
1586 = "「Đã rõ. ――Hửm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。――む？」
1700 = "Sao thế này, Hibiki đang phồng má giận dỗi."
# monologue
# JP: なんだ、日々姫がふくれてる。
2176 = "Không chỉ giận dỗi thôi đâu……\nTrông con bé còn có vẻ gì đó hơi đau khổ."
# monologue
# JP: ただふくれているだけでなく……\nどこか苦しげなようにも見える。
2172 = "「Sao vậy, Hibiki?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、日々姫？」
1768 = "「Dạ? À, không có gì đâu!\nKhông, ưm, không có gì đâu ạ. Em ổn.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あ、なーんも！\nなーん、んんっ、何でもないです。大丈夫」
1630 = "Một nụ cười gượng gạo lộ liễu.\nVà rồi Hibiki liên tục thốt ra những lời lấp liếm."
# monologue
# JP: あからさまなほどの作り笑い。\nそして日々姫は、ごまかすような言葉を重ねる。
2261 = "「À thì, em chỉ hơi tò mò――chuyện đó――a!\nChuyện bác Mototada, bố của tiền bối Kisaki ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええと、ちょっと気になって――その――あっ！\nあれです、元忠さん、稀咲先輩のお父さん」
1999 = "「Bố em á? Tò mò chuyện gì cơ――」"
# 【稀咲】
# display as 稀咲
# JP: 「父が？　気になったって、一体――」
1886 = "「À thì――a! Đúng rồi,\nRõ ràng bác ấy đến tìm tiền bối Kisaki để nói chuyện mà――hả!?」"
# 【日々姫】
# display as 日日姬
# JP: 「ええと――あ！　そう、\n稀咲先輩に話があって来たはずなのに――えっ！？」
1614 = "Bắt đầu từ cổ, giống như có ai đó đang phun sơn vậy.\nKhuôn mặt Kisaki dần dần, thấy rõ là đang đỏ bừng lên."
# monologue
# JP: 首から順に、まるでスプレーを吹き上げるように。\n稀咲の顔が、じわじわ、目に見えて赤くなる。
2530 = "「T-tiền bối?」"
# 【日々姫】
# display as 日日姬
# JP: 「せ、先輩？」
1730 = "「…………」"
# 【稀咲】
# display as 稀咲
# JP: 「それはあれだよ、ええとね、日々姫」
1986 = "「Chuyện đó, ừm, Hibiki à」"
# monologue
# JP: 稀咲の視線が、一瞬ちらりと僕を捉えて、\nすぐさま日々姫の上へと戻る。
2498 = "Ánh mắt của Kisaki liếc nhẹ sang tôi một cái, rồi ngay lập tức quay trở lại phía Hibiki."
# 【稀咲】
# display as 稀咲
# JP: 「あの人は……あれで、要件を済ませたんだよ。\n全部、ね。多分」
1534 = "「Anh ấy…… anh ấy đã giải quyết xong công việc rồi.\nChắc là, tất cả luôn rồi.」"
# monologue
# JP: 独り言じみた言葉を吐いて、\n力なく、ひどく照れくさそうに――
2265 = "Cô ấy lẩm bẩm như đang tự nói với chính mình,\ngiọng điệu có chút yếu ớt và vô cùng ngượng ngùng——"
# monologue
# JP: 年齢相応の、ごくごく自然な少女の笑みを、\n稀咲はふわりと、ほころばせる。
2420 = "Rồi sau đó, trên gương mặt Kisaki nở một nụ cười\ncực kỳ tự nhiên, đúng với lứa tuổi thiếu nữ của mình."
# 【稀咲】
# display as 稀咲
# JP: 「あれは……そういう人なんだ」
1956 = "「Bởi vì anh ấy…… là người như vậy mà.」"
