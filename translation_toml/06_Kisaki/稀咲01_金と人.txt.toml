[script]
# lines: 385 
# 【稀咲】
# display as 稀咲
# JP: 「さてと、今日のお仕事はこれで終わりだね。\nおつかれ、日々姫。これからどうする？」
1698 = "「好了，今天的工作就到此為止。日日姬，辛苦你了，接下來有什麼安排嗎？」" 

# monologue
# JP: 稀咲の声に、日々姫はぱっと顔を向ける。
2382 = "日日姬聞聲，馬上扭頭面向稀咲。" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲センパイも、浦上さんもお疲れ様です。\n今日も私、たくさん助けてもらっちゃいました」
1929 = "「稀咲學姐、浦上經理，你們也辛苦了。謝謝你們今天幫我這麼大的忙」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちつもたれつさ。\nボクらは利益共同体だから」
1527 = "「互相幫助嘛。畢竟我們的利益是一致的」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1651 = "「啊哈」" 

# monologue
# JP: 少しふざけた物言いに、日々姫の笑顔がいっそう輝く。
2475 = "稀咲半開玩笑的話讓日日姬笑得更燦爛了。" 

# monologue
# JP: 浦上は、ほんのすこしだけ会釈を返し、\nすぐにすました顔をＰＣに向け直す。
2525 = "而浦上則是簡短地應了一聲，就一臉淡然地回過頭去，繼續操作起電腦。" 

# 【稀咲】
# display as 稀咲
# JP: 「疲れてないなら、\n食事でもしながらもう少し打ち合わせるかい？」
1713 = "「如果你不是很累的話，我們就一邊吃飯一邊再商量一會怎麼樣？」" 

# 【日々姫】
# display as 日日姬
# JP: 「疲れは、特にないんですけど」
1792 = "「我倒不是很累」" 

# monologue
# JP: そこまで言って口ごもり、\n日々姫が問うように僕を見る。
2388 = "日日姬說到一半就若有所思似地停了下來，向我投來詢問的眼神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\nもしも僕が仕事の話の邪魔になるなら」
1655 = "「啊，如果我在場會妨礙你們討論工作的話——」" 

# 【日々姫】
# display as 日日姬
# JP: 「邪魔なんて！　そぎゃんわけ――ううんっ、\nそんなこと、ありえませんよ。兄さん」
1769 = "「怎麼會呢！怎麼會妨礙——呃不，哥哥在場也完全不會有問題的」" 

# 【稀咲】
# display as 稀咲
# JP: 「や。これはボクの言い方が良くなかったね」
1612 = "「呀，看來是我的表達方式不太對」" 

# monologue
# JP: 飛び出してすぐひっこめられた隈元弁にか、\nあるいは他の何かにか。
2488 = "稀咲方才掛在臉上的微笑變成了某種挑逗似的表情。" 

# monologue
# JP: 稀咲が浮かべた微笑はすぐに、\nどこか挑むようなものへと変わる。
2178 = "不知道這是她對日日姬脫口而出後又急忙改口的隈元話，還是什麼別的而做出的反應。" 

# 【稀咲】
# display as 稀咲
# JP: 「仕事の打ち合わせは口実だ。時間を取って――\nもう少し、突っ込んだ話を出来ないものかと思ってね」
1805 = "「所謂“商量工作”只是個藉口而已。我只是想多花些時間——和你們深入交流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことなら大歓迎だ」
1989 = "「這我樂意至極」" 

# monologue
# JP: 日々姫を見れば、無言の頷き。
2349 = "我看了一眼日日姬，她默默點了點頭。" 

# monologue
# JP: その目が少し不安げで、\n心配を解いてやらねばという気にさせられる。
2278 = "她眼中流露出的不安讓我下定決心，一定要解除她的擔憂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「主張をぶつけあうだけでない、\n実りある話し合いが出来れば――と願っている」
1753 = "「希望這次協商不要還只是各說各話，而是能得到些共識」" 

# monologue
# JP: 日々姫に聞かせるための言葉を、\n素直な気持ちのまま表せる。
2343 = "我把心中最真實的想法說了出來，而這句話其實是說給日日姬聽的。" 

# monologue
# JP: 日々姫と稀咲とが看板づくりで見せた姿勢は、\n僕にも新たな理解を与えてくれた。
2431 = "當初日日姬和稀咲在製作招牌時的態度，也讓我有了一些全新的認識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見ているもの、見えているものが違うようだが、\n御一夜の発展を願う気持ちは同じだと感じたからな」
1800 = "「我覺得雖然我們的著眼點和看問題的角度各不相同，但希望御一夜發展壯大的心願是相通的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクも似たような感じを受けた。だから話し合いたい。\nキミが何を見て、誘致反対の立場にいるのか知りたいね」
1789 = "「我也略有同感，所以想和你好好聊聊。我想知道在你的角度都看到了什麼，讓你反對工廠落戶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何でも遠慮無く聞いてくれ。\nが――その辺を[ふくぞう,1]腹蔵なく話すなら」
1508 = "「不用客氣儘管問吧。不過——如果要開誠布公的話」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうか。移動はしない方がいいね。\n他人の目があるところでは……ね」
1670 = "「嗯，也是。看來我們不需要換地方了。別的地方會有無關人員在場……對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。迷惑にならんようなら、ここでこのまま」
1665 = "「嗯。如果你不介意的話，在這裡聊就行了」" 

# 【稀咲】
# display as 稀咲
# JP: 「じゃ、食事を何か取り寄せよう。\nそうだな……ピザは？　嫌いなら、他のものでも」
2009 = "「那我們點份外賣吃吧。我想想……披薩怎麼樣？如果你不喜歡吃的話，點別的也可以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。こだわらん。お任せしよう」
1863 = "「沒事，我不挑，點什麼都可以」" 

# 【稀咲】
# display as 稀咲
# JP: 「よし、決まりだ。注文をお願いできるかな？\nいつものと、あとはまぁ、バランスを見て」
1708 = "「好，那就這麼辦。能麻煩你幫我下單嗎？點和平時一樣的就行了，不過稍微注意一下營養平衡」" 

# 【浦上】
# display as 浦上
# JP: 「かしこまりました」
1701 = "「好的」" 

# monologue
# JP: 浦上は携帯を手に、すぐさま注文を開始する。
2415 = "浦上拿出手機，立刻開始下單。" 

# monologue
# JP: 慣れきったその仕草にふっと、\n小さな疑問を感じてしまう。
2435 = "看著那熟練的動作，我的腦海中不禁浮現出了一個小小的疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつもの……と言っていたが、\nそれほどピザを良く頼むのか？」
1565 = "「你剛才說“和平時一樣的”……你們經常點外賣披薩嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「この部屋で食事をするときには、わりとね。\n手軽に食べられてすぐ届くから」
1950 = "「要在這裡吃東西的時候，基本上都是叫披薩。因為吃起來方便，送過來也很快」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ピザが手軽か？\n食べ辛いもののように思うが……」
1611 = "「吃披薩很方便嗎？我覺得吃起來還挺麻煩的……」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1677 = "「嘿嘿」" 

# monologue
# JP: 稀咲らしからぬ――と感じてしまう、\nまったく屈託を感じない笑み。
2469 = "稀咲一反常態，毫無顧忌地笑了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「それは食べ慣れないからさ。\nコツがあるんだ。仕事をしながら食べるためのね」
2011 = "「那是因為你沒習慣。想要一邊工作一邊吃披薩，可是有技巧在裡面的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕事しながら？　食事のときもか」
1562 = "「你們吃東西的時候還不忘工作嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「団欒しての食事じゃ無いときはね。食事の時間を削れば、\nその分、他で自由に使える時間が増えるわけだし」
1606 = "「只要不是聚餐的話都是這樣。如果能節約吃飯時間，就有更多時間可以自由支配了嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1587 = "「原來如此」" 

# monologue
# JP: 食事に関する稀咲の主張に相槌をうつ。\nが、そうする度に、小さな違和感が重なっていく。
2526 = "聽了她關於吃飯的看法，我附和了幾句。但同時，我總覺得有些小小的不對勁。" 

# monologue
# JP: あるいは、僕が古い感覚なだけかもしれないが――
2360 = "或許，這只是因為我思想比較落後吧——" 

# monologue
# JP: （[いびつ]歪というか……\nどうなのだ、それが常態であっていいのか？）
2632 = "（總感覺這樣不妥……難不成，她已經對此習以為常了嗎？）" 

# monologue
# JP: この若さで、銀行の支店長。\nしかも、有能との評価を得るほどの実績もある。
2256 = "她不僅這麼年輕就當上了銀行的支行行長，還做出了優秀的業績，以至於眾人都評價她有才能。" 

# monologue
# JP: 生半でない努力がその裏にあろうとは、\n容易に想像できることだが――
2259 = "她在成功的背後付出了多麼大的努力不難想像，可是——" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、届いたね」
1656 = "「啊，送到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に早いな」
1916 = "「真快啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう感じるかい？\nだいたいいつでも、こんなものだけど」
1834 = "「是嗎？這也就是平常的速度吧」" 

# monologue
# JP: それは稀咲が、上得意客だからだろう――
2218 = "八成是因為稀咲是他們的貴客吧——" 

# monologue
# JP: そんな思いを口にするかどうかを悩んだ隙に、\nピザは手早く開封される。
2355 = "我還在猶豫要不要把這句話說出口時，她就迅速打開了包裝。" 

# 【稀咲】
# display as 稀咲
# JP: 「さぁ、好きなのを取ってくれ」
1572 = "「來，大家想吃什麼儘管拿」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、私はそれじゃ――\nミックスピザの方、いただきます」
1658 = "「啊，那我就選——這個，混合披薩」" 

# monologue
# JP: 浦上も同じく、三切れのミックスピザを取り、\nすぐさま席に戻っていく。
2413 = "浦上和日日姬一樣，取了三塊混合披薩，隨後馬上回到座位上。" 

# monologue
# JP: それも恐らく、この部屋での、\nごくあたりまえの光景なのだろう。
2569 = "這恐怕已經是這個房間裡司空見慣的場景了吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄？」
2058 = "「雙鐵？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1653 = "「啊，嗯」" 

# monologue
# JP: ピザは――ミックスの大きなヤツと、\nそれより一回り小さいサイズの、サラミづくしだ。
2567 = "送來的披薩中有大盤裝的混合披薩，還有一份尺寸略小一圈的義式香腸披薩。" 

# monologue
# JP: ミックスの方を一切れ取れば、\nすぐさま稀咲もサラミの方を一切れ手に取る。
2331 = "我剛取了一塊混合披薩，稀咲就緊跟著取了一塊義式香腸披薩。" 

# 【稀咲】
# display as 稀咲
# JP: 「いいかい？　ほら、こうすれば――」
1729 = "「學著點哦？你看，這樣——」" 

# monologue
# JP: 論より証拠といわんばかりに、稀咲は器用に左手だけで、\n手にしたピザを半折りにして――
2573 = "還真是事實勝於雄辯，稀咲熟練地僅用左手就把披薩對摺了起來——" 

# 【稀咲】
# display as 稀咲
# JP: 「――はむっ。\nね？　仕事をしながら、こぼさずいける」
2065 = "「（咀嚼）　你看？一邊工作一邊吃，也不會漏出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1662 = "「嗯——」" 

# monologue
# JP: 空いてる右手でマウスを繰って、\nピザを食べつつ、PC画面をチェックしている。
2495 = "稀咲用空出來的右手操作滑鼠，一邊吃著披薩，一邊盯著電腦螢幕。" 

# monologue
# JP: 仕草はいっそ熟練で、絵になるほどの光景なのだが――\nにもかかわらず、どうにも不安を感じてしまう。
2267 = "她的動作行雲流水，彷彿一道美麗的風景——不過我還是有些擔心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まともな食事は取っているのか？」
1563 = "「你們平時有沒有好好吃飯啊？」" 

# monologue
# JP: 稀咲ではなく日々姫に問えば、\n少し困った声が答える。
2344 = "我沒有向稀咲發問，而是問日日姬，而她用有些為難的聲音回答了我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ええと……私と一緒に外食のときは、\nファーストフードとか喫茶店とか」
1617 = "「呃……她們和我一起去外面吃東西時，經常去快餐店或者咖啡店」" 

# 【双鉄】
# display as 雙鐵
# JP: 「軽食ばかりか」
2016 = "「都是些簡單的快餐啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「って、こう見えて支店長だよ？　ボクは。\nパーティだの会食だのが無い日の方が少ないくらいだ」
1628 = "「哎，再怎麼說我也是支行行長呀？不如說，我日程中沒有派對或者聚餐的日子反倒是少數呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、豪勢な食事ではなく――いうなれば家庭料理をだ。\n野菜の煮物だの、ひじきだの」
1515 = "「不，我並不是說要吃得多豐盛——我指的是家常菜。比如煮青菜或者羊栖菜之類的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ひじき！」
1943 = "「羊栖菜！」" 

# monologue
# JP: 驚いた顔でのオウム返し。\nそして稀咲は、珍獣を見る目でまじまじ、僕を眺める。
2254 = "她一臉驚訝地重複了一遍，然後用觀察珍稀野獸般的目光看著我。" 

# 【稀咲】
# display as 稀咲
# JP: 「なんでそんなことを？\n双鉄、キミはボクのお母さんかなにかなのかい？」
1879 = "「為什麼問這些？雙鐵，難道你是我媽媽嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、違う。\n違うが……ううむ――」
1904 = "「當然不是。不過……唔——」" 

# monologue
# JP: 問われてしまえば、そのとおり。\n僕がそのようなことを気にする筋合いは無い。
2538 = "被她這麼一問，我才反應過來，確實是這麼回事。我並沒有道理去對他人的飲食起居指指點點。" 

# monologue
# JP: 稀咲の端正な印象とはいささか異なる食事風景に、\n余計……を越して、おせっかいな興味を持ってしまったか。
2503 = "稀咲端莊的形象與她的飲食方式稍有些落差……這反倒勾起了我的興趣，讓我有些多管閒事了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気になってしまってな」
1810 = "「抱歉。我只是稍微有些在意」" 

# 【稀咲】
# display as 稀咲
# JP: 「謝らなくても。気にかけてもらえるのはありがたいしね。\nでも――そんなことより、もっと大事な話をしよう」
1862 = "「沒事。我反倒應該謝謝你關心我。不過——先不說這個，我們還是來說說更加重要的事情吧」" 

# monologue
# JP: ぺろ、と指先のチーズを舐めとり、\n紙ナプキンで手をぬぐう。
2280 = "她輕輕伸出舌頭將指尖上的起司舔去，然後用紙巾擦了擦手。" 

# monologue
# JP: 宣言通りの高効率で、\n稀咲は食事を、もはや終えてしまったらしい。
2432 = "看來她確實用行動證明了她所說的高效率進食為何物。" 

# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場からの排水は、国の基準値を満たしている。\n法的にも、環境保全の面からも、全く問題のないものだ」
1232 = "「\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的排水已經達到了國家標準。不論是從法律還是從環境保護的角度來看，都完全沒有問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「承知している」
1988 = "「這我明白」" 

# monologue
# JP: ズバリ本題に切り込んでもらえたおかげで、\n僕も気持ちを切り替えられる。
2248 = "多虧她果斷切入了正題，我也轉換到了工作狀態。" 

# monologue
# JP: 今一番に心配すべきことなら無論、\n宝生稀咲の食生活についてなどではない。
2426 = "現在最應該擔心的，當然不是寶生稀咲的飲食健康。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、基準値内であるということと、\n影響が及ばぬということとは、イコールではない」
1544 = "「但是，排汙滿足國家標準，並不代表完全不會對環境造成影響」" 

# 【稀咲】
# display as 稀咲
# JP: 「それはおかしくないかい？　双鉄。\n悪影響が出ないよう、規制範囲は定められるだろう？」
1984 = "「這不是很奇怪嗎？雙鐵。所謂的標準，不就是為了不產生惡性影響而制定的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜は焼酎の町であり、温泉の町だ。\n水の変化から受ける影響は、それだけ大きいものになる」
1688 = "「因為御一夜是燒酒之鄉，也是溫泉之鄉。水資源變化帶來的影響會比一般城市嚴重得多」" 

# monologue
# JP: ん、と困ったような声。\n稀咲の声の速度が落ちる。
2491 = "稀咲沉吟起來，聲音有些為難，語速也變慢了。" 

# 【稀咲】
# display as 稀咲
# JP: 「……受ける影響が大きいのではなくて――\n変化に対してナイーブなだけ、という可能性は？」
1241 = "「……也有可能，並不是受到的影響嚴重——而是對於變化太沒有防備了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナイーブ、か」
1866 = "「沒有防備嗎」" 

# monologue
# JP: 日々姫ともしたような話だが、\n“見えているもの”の違いが、姿勢の違いとなってる。
2181 = "之前我也和日日姬說過，看問題的角度不同，會讓態度大相徑庭。" 

# monologue
# JP: （見ようとしないものは見えない……\nでなければ、見たいものだけを見るのだな、人は）
2625 = "（人不會看見自己不想看見的東西……或者說，只會看見自己想看的東西）" 

# monologue
# JP: 焼酎にとって水がどれほど重要か……\n日々姫はそれを、根っこの部分でわかっていた。
2384 = "日日姬肯定非常清楚……對於燒酒來說，水有多麼重要。" 

# monologue
# JP: が、稀咲にはその点への理解が無い。\n果たして、どのように伝えたものか――
2200 = "但稀咲並不理解這一點。所以，我應該怎樣解釋給她聽呢——" 

# 【稀咲】
# display as 稀咲
# JP: 「思い当たるところがあるかい？\nなら」
1569 = "「你有什麼想說的嗎？但說無妨」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、違う。\n沈黙は、疑問を感じていたからだ」
1649 = "「啊不是，你誤會了。我剛才沒說話，只是因為有些疑惑」" 

# 【稀咲】
# display as 稀咲
# JP: 「疑問？　どんな？」
1907 = "「疑惑？關於什麼的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲、君は――」
1740 = "「寶生稀咲，你——」" 

# monologue
# JP: 御一夜を大切にしていることなら、確かに感じた。
2351 = "我確實能感覺到，她也很珍惜御一夜。" 

# monologue
# JP: だが、御一夜の何を大切と感じているか、\nそこに、恐らくは食い違いがある。
2198 = "但是，要說具體珍惜御一夜的什麼，這個問題的答案恐怕有所不同。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……例えば、銀行の仕事において。\n君が、一番大切にしていることは、なんだ？」
1253 = "「……就拿銀行的工作來說吧。你最重視的是什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「お金だよ。\nそれが、銀行の全てだからね」
2038 = "「錢啊。這就是銀行的一切嘛」" 

# monologue
# JP: 即答。\n一秒の迷いすらない。
2263 = "她毫不猶豫地脫口而出。" 

# monologue
# JP: あまりに明快な返答ぶりに、\n妙な感慨さえ覚えてしまう。
2528 = "聽到她這樣乾脆的回答，甚至讓我有些感慨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「きっぱり、金か」
1747 = "「就一個“錢”字……這麼直接嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「という反応を見せるよね。\nお金の価値を、正しく理解していない人は」
1865 = "「沒有正確理解金錢的價值的人，確實會有這種反應呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お金の価値？」
2024 = "「金錢的價值？」" 

# monologue
# JP: 問えばすぐさま、稀咲が微笑む。
2332 = "我剛問出口，稀咲就微笑了起來。" 

# monologue
# JP: どこか冷たい――\n僕を計るような瞳をしながら。
2269 = "她的眼神有些冰冷——似乎在打量著我一般。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄。君にとって、お金とはなにかな？\nまずはそれを、ボクに聞かせてくれないか？」
2054 = "「雙鐵。對你來說，金錢是什麼？你先回答我的這個問題怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「金――とは」
2022 = "「金錢就是——」" 

# monologue
# JP: 沈思黙考して整理する。
2356 = "我陷入沉默，慢慢整理思緒。" 

# monologue
# JP: 結局のところ、金とは利便性を高めるための代用品だ。\nそれが、何を代用しているのかといえば――
2403 = "歸根結底，金錢就是為了讓生活更加方便而使用的替代品。要說它代替了什麼的話——" 

# 【双鉄】
# display as 雙鐵
# JP: 「金は……労働の対価だな。\nそれを引き換え、別の労働の対価を得る」
2021 = "「金錢……就是勞動的對等價值。並且可以用它換來其他的對等價值」" 

# 【稀咲】
# display as 稀咲
# JP: 「へぇ、いい答えだね。予想より……\nといっては失礼だけど、いい答えだ」
1682 = "「嚯，回答得不錯。雖然這麼說有點不禮貌……但你回答得比我想像中要好」" 

# monologue
# JP: 満足そうな声を出し、\n稀咲は席から立ち上がる。
2497 = "稀咲發出滿意的聲音，從座位上站起身來。" 

# 【稀咲】
# display as 稀咲
# JP: 「この部屋からは、一階フロアを見下ろせる。\n日々姫には、見せたことがあるよね？」
1757 = "「從這個房間可以俯瞰一樓。日日姬，我以前帶你看過吧？」" 

# monologue
# JP: 話を振られ、\nあわてて日々姫はピザを飲み込む。
2518 = "突然被提到的日日姬急忙吞下口中的披薩。" 

# monologue
# JP: ああ、いつの間に……\nミックスピザは、もはや姿を消している。
2240 = "啊，不知不覺間……混合披薩就已經被吃得一乾二淨。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。見せてもらって――\n凄かった」
1668 = "「嗯。那時候看了覺得——真的好厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1680 = "「噢？」" 

# 【稀咲】
# display as 稀咲
# JP: 「実際、なかなかの光景かと思うよ？\n丁度閉店したばかりだし、双鉄にも是非見てみて欲しい」
2061 = "「風景確實不錯呀。正好銀行現在剛剛關門，我也希望雙鐵你能來看看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1669 = "「嗯」" 

# monologue
# JP: 誘われるまま、窓際に寄り、一階フロアに目を落とす。
2358 = "我順著稀咲的邀請走到窗邊，望向一樓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1659 = "「喔」" 

# monologue
# JP: 思わず声が出てしまう。
2317 = "我不禁發出驚嘆聲。" 

# monologue
# JP: これが銀行かと思うほど、普段とはまるで違った――\n混乱というか、熱気に満ちた姿が映る。
2170 = "下面的樣子和平時完全不一樣，甚至讓我懷疑這裡究竟是不是銀行——一副有些混亂，又熱鬧的場景映入了我的眼簾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「閉店後だろう？\nお客もいないのに、何故こんなにバタついているのだ」
1504 = "「不是已經關門了嗎？明明已經沒有客人了，怎麼下面還人來人往的」" 

# 【稀咲】
# display as 稀咲
# JP: 「銀行業務は、閉店後からが本番だからさ」
1581 = "「其實，銀行在關門後才會真正忙起來」" 

# monologue
# JP: 言いながら、稀咲は僕へ寄ってくる。\nその目は、誇りに輝いている。
2472 = "稀咲一邊說一邊向我走來。她的眼中閃耀著自豪。" 

# 【稀咲】
# display as 稀咲
# JP: 「電子化された部分がどれほど増えようと、\n窓口業務は決してなくならない」
1512 = "「不管現在銀行業務再怎麼自動化，人工窗口也絕不會被徹底取代」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。僕も、税金やら保険料やらを、\n銀行で取り扱ってもらうことがある」
1828 = "「是啊。我也在銀行繳納過稅金、辦理過保險」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ――\nご利用、ありがとうございます」
1832 = "「是嗎——那還真是多謝惠顧」" 

# monologue
# JP: 自然と出てきた――そんな感じを受けさせられる、礼と声。
2271 = "她的禮節與話語讓我感受到，這些都是她的真情流露。" 

# monologue
# JP: 伸びた背筋が、銀行業への稀咲の姿勢を、\nそのまま示しているようだ。
2484 = "稀咲挺直的腰板，彰顯著她身為銀行從業者的態度。" 

# 【稀咲】
# display as 稀咲
# JP: 「そうしたお客様をお待たせする時間を短縮するため、\n各種の事務は、どうしても後回し後回しになる」
1878 = "「為了儘量減少客人們的等待時間，銀行不得不把內部業務的處理一直延後」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――なるほど。\nそのつけを、閉店後に一気に払うのか」
1641 = "「啊——原來如此。於是就把這些業務都堆到關門以後再處理啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね、まさしく。\nつけは正しく精算される必要が――おっと」
1835 = "「是，你說的沒錯。而且這些業務都必須要仔細計算出正確的——哎喲」" 

# monologue
# JP: 一階フロアがざわめいている。\n大勢が、ひとつのテーブルに集まっていく。
2159 = "一樓突然喧鬧了起來，很多人都圍在一張桌子周圍。" 

# 【稀咲】
# display as 稀咲
# JP: 「残念。今日は[ふとつごう,2]不突合が出たようだ」
1914 = "「真可惜。看來今天的核對出問題了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふとつごう？」
1845 = "「核對出問題？」" 

# 【稀咲】
# display as 稀咲
# JP: 「突合とは、伝票集計と現金残高とが一致すること。\nそれが合わないのが不突合」
1846 = "「核對要確保對帳統計與現金餘額一致。核對時發現兩者不相符就是核對不一致」" 

# 【双鉄】
# display as 雙鐵
# JP: 「帳面と現金が合わんのか――最悪だな」
1779 = "「意思就是帳單記錄和現金量不一致嗎——糟糕了啊」" 

# monologue
# JP: 酒問屋でも……金を扱い帳面をつける職場なら、\nどこでも発生してしまうことではあるが――
2235 = "只要是涉及到金錢，需要記帳的工作場所……就算只是一間小酒行，同樣會出現這種錯誤，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「銀行でも、そんなことが起こるのか？\n金を扱う人も機械も、まさしく専門のものであろうに」
2035 = "「銀行也會發生這種事嗎？我覺得銀行裡處理相關業務的機器和工作人員都應該是專業級的吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「それでも、起こる。人間の側のミスが多いけれども、\nまれには、機械が不具合を出すこともある」
1751 = "「就算如此，也會發生這種情況。大部分情況是人為問題，但機器偶爾也是會故障的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「起きたときにはどうするのだ？」
1911 = "「發生這類情況的時候該怎麼辦？」" 

# 【稀咲】
# display as 稀咲
# JP: 「原因を究明する。それなしには、閉店できない。\nだからともかく、合わない額を9で割る」
1979 = "「追根問底。如果沒查明原因，就不能關門。所以有問題的時候總之先用差額除以９試試」" 

# 【双鉄】
# display as 雙鐵
# JP: 「9で？」
1899 = "「用差額除以９？」" 

# 【稀咲】
# display as 稀咲
# JP: 「[けたちが,1]桁違いか[くらいちが,1]位違いが原因のときは、9で割り切れるから。\n例えば……そうだね。820円を支払う状況を想定しよう」
1724 = "「如果發生了數位錯誤或者位值錯位的話就可以被９整除。比如說……對了。假設需要支付８２０日元吧」" 

# monologue
# JP: 言いながら、稀咲はキーを軽く叩いて、\nディスプレイ上に820の数字を示す。
2473 = "稀咲一邊說一邊輕輕敲擊鍵盤，螢幕上顯示出了“８２０”這串數字。" 

# 【稀咲】
# display as 稀咲
# JP: 「しかし、窓口がうっかり82,000円を払ってしまった。\nこの場合は、81,180円の不足が出るよね？」
1547 = "「但是，櫃臺人員不小心支付了８２０００日元。這時候就會產生８１１８０日元的差額對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「81180は――ああ、9で割り切れる数字だな」
2067 = "「８１１８０——啊，正好是可以被９整除的數字」" 

# monologue
# JP: 言えばふと、\n稀咲は瞳を和らげながら、僕を見上げる。
2333 = "我剛說完，稀咲立刻抬起眼睛望向我，目光也柔和了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「へぇ、暗算が得意なのかい？」
1660 = "「喔，你很擅長心算嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、大学の友人に数学の得意なものがいて――\nそれに習った」
1514 = "「不，只是我在大學有位朋友很擅長數學——所以就跟他學了一點」" 

# monologue
# JP: 数字を構成する全ての位を、一桁になるまで足していく。\n例えば35468であれば、3+5+4+6+8=26、2+6=8と。
2613 = "首先把數字的所有位數都相加，直到只剩一位。比如３５４６８的話，就用３＋５＋４＋６＋８＝２６，最後２＋６＝８。" 

# monologue
# JP: 出てきた数は、元の数字を9で割った余りと同じだし、\n3と6、4と5という9になる数を除いた場合も、同じ答えだ。
2399 = "最後得到的一位數就是原數字除９得到的餘數。就算排除掉３和６、４和５這種可以構成９的數字，也能得到相同的結果。" 

# 【稀咲】
# display as 稀咲
# JP: 「[きゅうきょほう,2]九去法か。使っているかい？」
1822 = "「是“去九法”啊。你平時也會用到嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。暗算自体をあまりしないので。\n電卓を使ったほうが、確実だ」
1499 = "「不。其實我很少心算。我覺得用計算器來得準確一些」" 

# 【稀咲】
# display as 稀咲
# JP: 「とも言い切れないさ。\n入力ミスは、不突合の原因のベスト５に入る」
1524 = "「也不能這麼說。輸入錯誤在造成核對不一致的原因裡，能排進前五名」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、『僕の場合は、電卓の方が確実だ』と言い直そう。\n暗算ミスなら、入力ミスの十倍は起こしてしまいそうだ」
2002 = "「那就當做是“對我來說，還是用計算器更準確”吧。我覺得自己心算的話，錯誤會有輸入錯誤的十倍那麼多」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん、それほど暗算が苦手なんだね」
1674 = "「嗯？這麼不擅長心算嗎」" 

# monologue
# JP: 期待はずれといわんばかりに、声の温度がわずかに落ちる。
2252 = "她一副期待落空的樣子，連聲音都少了幾分溫度。" 

# 【稀咲】
# display as 稀咲
# JP: 「少し残念。九去法の原理が理解できていれば、\n踏み込んだ説明も容易になったのだけれどね」
1609 = "「可惜了。不過既然你理解去九法的原理，倒是方便我進一步解釋」" 

# monologue
# JP: 切り替えるように素早くマウスを動かして、\n820の数字へと、稀咲は僕の注意を戻す。
2486 = "稀咲換了個話題，快速動了動滑鼠，讓我的注意力重新又回到“８２０”這串數字上。" 

# 【稀咲】
# display as 稀咲
# JP: 「とにかく、桁違いの場合と、位違い――820円に対し、\n280円を支払ったような場合は、差額は9で割り切れる」
1942 = "「總之要是數位錯誤和位值錯位——還是用８２０日元假設，若錯誤地支付了２８０日元的話，其的差值也可以被９整除」" 

# monologue
# JP: 820-280は540円の過剰。\nなるほど、9で割り切れる。
2635 = "８２０－２８０＝５４０日元的差值。原來如此，確實能被９整除。" 

# 【稀咲】
# display as 稀咲
# JP: 「不突合の原因は、位違いか桁違いかが大半だから、\n9で割れた場合には、まずそこを疑って確認し直す」
1844 = "「核對不一致的原因很大可能就是因為數位錯誤和位值錯位，如果能被９整除的話，就首先檢查這兩個問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「桁違いと位違いが原因でないときには？」
1710 = "「如果不是數位錯誤和位值錯位怎麼辦？」" 

# 【稀咲】
# display as 稀咲
# JP: 「現金を数え直して、伝票内容と入力内容のチェック。\n各端末の利用記録と伝票とを突き合わせる」
2004 = "「那就重新清點現金，檢查單據和輸入資料。還有就是將各個終端的使用記錄和單據進行對比」" 

# monologue
# JP: 稀咲の目が窓の下へと。\nまさにそうした光景が、今行われているようだ。
2478 = "稀咲將目光投向窗外下方，彷彿在告訴我，現在那裡正在進行著這樣的工作。" 

# 【稀咲】
# display as 稀咲
# JP: 「振替、振込伝票を再確認して、\nそれでもなければ――あっ！」
1851 = "「檢查出入轉帳單據，如果還是不對的話——啊！」" 

# monologue
# JP: 『[いっさん,1]一算！』と、晴れやかな声がここまで届く。
2516 = "突然人群中傳出了一聲“對上了！”的歡呼，甚至在這裡都能聽見。" 

# monologue
# JP: 行員たちはにこにこと、帰り支度を始めたようだ。
2597 = "隨後，工作人員們滿臉笑意地開始收拾東西，準備回家。" 

# 【稀咲】
# display as 稀咲
# JP: 「よかった。今回はすぐに終わったね。\n……ああ、両替機に現金の置き忘れがあったのか」
1694 = "「太好了。這次很快就結束了……噢，原來是忘記從兌換機裡取回現金了」" 

# monologue
# JP: 僕にはまるでわからんが、行員たちの動きと様子で、\nそこまでを読み取れるものらしい。
2598 = "雖然我完全搞不懂底下在忙些什麼，但她似乎光從銀行工作人員的動作和樣子上就能看出來這麼多。" 

# monologue
# JP: いろいろな意味で感心させられ――\nけれど日々姫は僕とは逆に、あきれたような声を出す。
2173 = "不得不說我真是很佩服她——但日日姬卻和我相反，發出了詫異的聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「って……今ので、『すぐに？』」
1941 = "「等一下……剛才的算“很快”嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん、今の程度はトラブルのうちに入らないよ」
2012 = "「那當然了，這次的情況甚至可以說是雞毛蒜皮的小事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ならば、トラブルと呼ぶほどの問題は――」
1676 = "「嗯？那怎樣的情況才算是大事呢——」" 

# 【稀咲】
# display as 稀咲
# JP: 「分からないときは、朝までかけても分からない。\nその場合には、次の日もその次の日も原因を探す」
1721 = "「如果實在是弄不清楚，有時候甚至會忙到天亮都沒有結果。這種情況下，到第二天甚至第三天都要一直清查原因」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　何日も？」
1626 = "「哎！？連續幾天？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう。合わない以上は、原因がある。\nそれを突き止めないのなら、現金を扱う資格を失う」
1664 = "「嗯。只要不一致，就肯定有原因。如果不將其查清，我們就沒有處理金錢的資格」" 

# monologue
# JP: 言葉と気迫に驚かされる。
2276 = "她的話和氣魄讓我很驚訝。" 

# monologue
# JP: 効率重視が、\n稀咲の姿勢だと感じたのだが――
2245 = "在我印象中，稀咲的風格應該是很重視效率的才對——" 

# 【双鉄】
# display as 雙鐵
# JP: 「現金を扱う資格、とは……\nたとえ、合わないのが一円でもか？」
1947 = "「處理金錢的資格……就算只有一日元的偏差也一樣？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。金額の[たか,1]多寡は関係ない。\n仮に一円の不突合でも、原因は必ず明らかにする」
1868 = "「沒錯。無關金額大小，就算只有一日元的不一致也必須要查清原因」" 

# monologue
# JP: ほんの一瞬、\n稀咲の眉根が生々しく寄る。
2163 = "一瞬間，稀咲的眉間明顯地皺了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「……他の可能性が全て潰れてしまった場合には。\n防犯カメラで、行員の動きを逐一チェックしてでも、ね」
1251 = "「……如果其他所有的可能性都考慮過了，那麼最後就要調出監控錄影，檢查銀行職員的一舉一動」" 

# 【日々姫】
# display as 日日姬
# JP: 「あぁ……」
1643 = "「啊……」" 

# monologue
# JP: なるほど。そうか――\n銀行とは、つまりそういう仕事だ。
2230 = "原來如此。是啊——所謂銀行，就是做這些工作的地方。" 

# 【双鉄】
# display as 雙鐵
# JP: 「不正の目を、そうして摘まねばならぬのか」
1765 = "「必須要排除可能造成不正當行為的根源啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「ミスと不正は、いつだって二人連れなのさ。\nだから、原因を必ず潰して、入り口で止める」
1695 = "「失誤與不正當行為往往如影隨形。所以必須要查清原因，將其扼殺在搖籃中」" 

# monologue
# JP: 稀咲の目の先、一階フロアにはもう誰一人残っていない。
2501 = "稀咲目光所及之處——也就是一樓，已然是人去樓空了。" 

# monologue
# JP: 規律、整頓――それが行き届いているからこその、\n機敏さなのだと、だから感じる。
2402 = "正因為做到了紀律嚴明、規矩公正——所以才會有這樣的應對速度。" 

# 【稀咲】
# display as 稀咲
# JP: 「環境が緩めば、人は緩む。一円の誤差を許容すれば、\nそれは必ず、十円、百円となってしまう」
1896 = "「環境的鬆懈就會導致人的鬆懈。只要允許一日元的誤差，那麼一定會導致十日元、百日元的誤差」" 

# monologue
# JP: 稀咲は眼下から視線を外し、僕へと真っ直ぐ向け直す。
2482 = "稀咲抬起頭，直直地看向我。" 

# 【稀咲】
# display as 稀咲
# JP: 「お金は労働の対価だと――双鉄の答えは、確かに正しい。\nその上で僕は。お金とは、信頼そのものだとも考える」
2023 = "「金錢就是勞動的對等價值——你的回答很正確。但是對我來說，金錢還代表著信任」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お金は……なるほど。信頼か」
1585 = "「原來如此……金錢就是信任啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　なにが、なるほど？」
1633 = "「哎？怎麼就明白了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みながお金を信頼せねば、\n紙幣など、ただの紙切れになってしまうということだ」
1711 = "「如果人不信任金錢，那麼紙幣也不過就是一張廢紙罷了」" 

# 【日々姫】
# display as 日日姬
# JP: 「んん？」
1672 = "「嗯？」" 

# monologue
# JP: 日々姫の首が大きく傾ぐ。
2387 = "日日姬誇張地歪了歪腦袋。" 

# monologue
# JP: それを見、稀咲は財布から一万円札を出し、\n次いで、メモ用紙の一枚に「一万円」と書く。
2508 = "稀咲見狀，從錢包中取出一張一萬日元紙幣，隨後在一張紙上寫下“一萬日元”。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは、両方とも一万円札だ。日ノ本銀行発行のものと、\n宝生稀咲、個人が発行したものと」
1987 = "「這兩張都是一萬日元紙幣。區別在於一張是日本銀行發行的，另一張是寶生稀咲個人發行的」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
1629 = "「哎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「この内の片方は日ノ本全国各地で使え、\nもう片方は誰からも、通貨として扱ってもらえない」
1579 = "「其中一張在日本全國各地都能使用，而另一張沒有任何一個人會把它當作貨幣」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなの……当たり前じゃないですか」
1985 = "「這不是理所當然的嗎……」" 

# monologue
# JP: 怪訝そうな日々姫の言葉に答える稀咲はにこやかだ。
2494 = "稀咲用微笑回應日日姬驚訝的話。" 

# 【稀咲】
# display as 稀咲
# JP: 「何故、当たり前なのかな」
1880 = "「為什麼會是理所當然的呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって……稀咲先輩の手書きのやつは、\n一万円って書いただけの、ただの紙切れ――あ」
1687 = "「因為……稀咲學姐你手寫的那張，只不過是一張紙上寫了一萬——啊」" 

# monologue
# JP: 理解したのか、\n日々姫の目がキラキラ輝き、丸くなってく。
2379 = "日日姬似乎理解了稀咲的意思，雙眼瞪得圓溜溜的，甚至還在閃閃發光。" 

# 【日々姫】
# display as 日日姬
# JP: 「でも、だけど――同じ。本物の一万円札も、\n綺麗に印刷されてはいるけど……やっぱり、紙切れ」
1539 = "「但是——其實它們是一樣的。真正的一萬日元，就算印刷得再漂亮……也只是一張紙」" 

# 【稀咲】
# display as 稀咲
# JP: 「ただの紙切れが通貨として、労働力の代替物として、\n通用するのは――そこに信頼があるからだよね？」
1809 = "「把一張紙當做貨幣，當做勞動力的等價物，並且全國通用——這不正是依靠信任才能做到的嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「なんですね。商品券とかもそうですよね。\n使えるってわかってる、信頼できるから紙切れじゃない」
1830 = "「是啊。購物卡也是一個道理。正因為知道它可以使用，信任它，它才不是一張廢紙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいかえれば、発行元に対する信頼が、\n通貨の価値を担保している、ということになるか」
1816 = "「換句話說，就是用發行單位的信用，來給貨幣的價值作擔保吧」" 

# monologue
# JP: その信頼が壊れてしまえば――\n例えば発行元の国が破綻してしまったなら、通貨も破綻だ。
2285 = "如果信任關係崩塌了——比如發行國家破產，貨幣也就失去了作用。" 

# monologue
# JP: 昨日までの紙幣が紙切れになり、外貨や金や宝石でしか、\nパンの一枚さえも手に入れられなくなってしまう。
2393 = "昨天為止還能當做錢用的紙幣就會變成廢紙，哪怕一塊麵包，都只能用外幣、金子和寶石來交換。" 

# 【稀咲】
# display as 稀咲
# JP: 「銀行は、お金という形の信頼を扱っている場所だ。\nだから仮に一円だろうと、それを損ねることは出来ない」
2036 = "「銀行就是處理金錢這種信用的地方。所以哪怕只有一日元偏差，也不能姑息」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――それが、\n宝生稀咲にとっての、『お金の価値』か」
1584 = "「原來如此——對你而言，這就是“金錢的價值”啊」" 

# monologue
# JP: そういうことなら共感できる――\n思った瞬間、さっきの自分が恥ずかしくなる。
2571 = "這樣一來我也能理解她的想法——產生這種想法的瞬間，我就為自己剛才的態度感到難為情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまない態度を見せてしまった。言葉の真意もわからず、\n金が大事と聞いただけで、君を守銭奴のように誤解した」
1503 = "「不好意思，剛才我太膚淺了。我沒有理解你真正的意思，聽你說金錢很重要，就把你誤解成了守財奴」" 

# 【稀咲】
# display as 稀咲
# JP: 「お金をただ貯めこむことにはむしろ否定的だよ？\nお金は、正しく流通させてこそのお金だと思うから」
1573 = "「倒不如說，我很反對一味存錢呀。金錢就要正確流通起來才成其為金錢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 1587 = "「原來如此」" 

# monologue
# JP: お金を信頼と言い換えたなら、宝生稀咲の価値観を、\nより深く理解できそうにも――ああ、いや。
2288 = "如果把金錢換成信任，那麼我也能更進一步理解寶生稀咲的價值觀——啊，對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ……言い換えれば、ほとんど同じことなのだ」
1743 = "「對啊……換個角度來考慮的話，其實是差不多的」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄？」
# 2058 = "「雙鐵？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞いてくれ、宝生稀咲」
1741 = "「寶生稀咲，你聽我說」" 

# monologue
# JP: まっすぐに見て、\nただまっすぐに言葉を伝える。
2346 = "我目不轉睛地直視她，將我想說的話盡數傾吐而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「銀行にとっての一円が、\n焼酎酒造にとっては、クマ川の水の一滴なのだ」
2052 = "「隈河的一滴水對於燒酒釀酒廠的價值，就相當於一日元對於銀行的價值」" 

# 【稀咲】
# display as 稀咲
# JP: 「あ」
1648 = "「啊」" 

# monologue
# JP: 虚を突かれたと、そんな表情。
2274 = "她的表情似乎證實了我正好戳到點子上了。" 

# monologue
# JP: 稀咲はなんどかまばたきをして、\nそれからゆっくり、脱力したような声を出す。
2480 = "稀咲就像突然洩了氣一樣，眨了好幾次眼睛，然後才慢慢發出聲音。" 

# 【稀咲】
# display as 稀咲
# JP: 「あー……そうか。なるほど。なるほど――\nそれは、譲れないところだ、ね」
1644 = "「啊……是啊。原來如此。原來如此——這確實不能讓步呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。ただの一歩でも譲っては――\nクマ焼酎が今まで積み重ねてきた信頼を破壊してしまう」
1867 = "「沒錯。哪怕妥協一點點——隈燒酒都會遺失掉過去積累起來的信任」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1669 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一円を大事にせず、守ることが出来ぬ銀行を――\nいったい、どこの誰が使うのか、という話かとも思う」
1799 = "「我覺得這就好像——究竟會有誰會去光顧不重視一日元的銀行的道理一樣」" 

# monologue
# JP: ゆっくり、深く。\n稀咲が頷く。
2504 = "稀咲緩緩地用力點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「使わないね、そんな銀行。\nだから……水も守れない焼酎は、飲まれなくなる？」
1864 = "「沒有人會去那樣的銀行的。所以……也自然沒有人會喝連水質都無法保證的燒酒？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうと僕は確信している。すぐには影響が出なくても\nいずれは徐々に、確実に」
1796 = "「我確信如此。影響就算不會馬上發生，也一定會慢慢顯現」" 

# 【稀咲】
# display as 稀咲
# JP: 「となると……御一夜はクマ焼酎というブランドを失う。\nその[いっしつ,1]逸失利益は――確かに無視できるものとも思えない」
1991 = "「這樣一來……御一夜就少了隈燒酒這樣一個品牌。我們確實不能眼睜睜看著這樣一塊利益消失掉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、どうだ。\n工場誘致の件、再検討をしてもらえんか」
1998 = "「那你看這樣如何，不如重新探討一下工廠落戶方案吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「慌てないでくれ、双鉄。そこまでのこと、\n支店長レベルで即決できるわけがないだろう」
