[script]
# lines: 346 
# 【稀咲】
# display as 稀咲
# JP: 「これは――すごいね」
1593 = "「這——不得了」" 

# monologue
# JP: 北琴鉄道博物館。見学する稀咲の踊るような足取りが、\n超大型の蒸気機関車の前で、ぴたりととまる。
1985 = "這裡是北琴鐵路博物館。在此參觀的稀咲雀躍不已，卻在一輛超大型蒸氣機車前停下了腳步。" 

# 【稀咲】
# display as 稀咲
# JP: 「とても大きい。いや、もちろん、\n蒸気機関車は大きく分厚いものとわかっているけれど」
1616 = "「還真是好大啊。當然我也知道，蒸汽機車越大越會給人厚重的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nうちの8620と比べると大人と子供の印象さえある」
1387 = "「是啊。和我們的８６２０一比就像大人和小孩一樣」" 

# monologue
# JP: プレートには2101。そして国繋号の文字。
1930 = "編號牌上寫著２１０１，以及車名國系號。" 

# 【双鉄】
# display as 雙鐵
# JP: 「実に見事だ。日ノ本ではとても走れんだろうが――\nそれだけに、大陸の雄大さをつくづく感じさせられる」
1476 = "「確實很雄偉。感覺在日本不太能開得起來吧——這也讓人從一個側面深感大陸的博大」" 

# 【稀咲】
# display as 稀咲
# JP: 「ん？　日ノ本では、って――ああ、そうか。\nきっと重すぎるんだね、この機関車は」
1219 = "「嗯？日本的話，我想想——啊，對了。這輛機車在日本肯定太重了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1475 = "「確實」" 

# monologue
# JP: 嬉しくなる。マイレールファンド事業を通じ、稀咲も随分、\n鉄道……というか、線路に詳しくなったものだと。
1830 = "我不由覺得有些開心。通過私有線路基金業務，稀咲也對於鐵路……具體來說就是線路，越來越了解起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本には川沿いの線路が多く、\n地盤が頑強でないところも非常に多い。それだけでなく」
1380 = "「日本沿河流鋪設的線路很多，故而地基不是非常牢固的地點也很多。而且不僅如此」" 

# monologue
# JP: 嬉しすぎてつい口走り、余計なことかと一瞬感じる。
1728 = "一開心嘴上就沒個把門，不經意間就說多了。" 

# 【稀咲】
# display as 稀咲
# JP: 「それだけでなく？」
1028 = "「不僅如此？」" 

# monologue
# JP: けれど稀咲は、目を輝かせて問い直し、\nますます調子に乗らせてくれる。
1739 = "但在稀咲兩眼放光地追問一下，便越來越停不下來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路の幅が、日ノ本の狭軌、1067mmに対し、\nこの機関車は標準軌、1435mm仕様となっている」
1494 = "「線路的寬度方面，日本是窄軌，１０６７ｍｍ寬，而這輛機車是標準軌，１４３５ｍｍ規格的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、だから列車そのものも幅広だし、\n足元がしっかりしている分、高さもとれているのか」
1191 = "「啊，所以列車整體都會更寬，底盤更加穩固，因而也可以做得更高」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。それゆえ仮に台車交換をして走らせたとて、\n日ノ本の線路上では建築限界を優にオーバーしてしまう」
1437 = "「沒錯。所以即便是更換了轉向架上線行駛，也會毫無疑問地超出日本線路的建築限界」" 

# 【稀咲】
# display as 稀咲
# JP: 「建築限界？」
1304 = "「建築限界？」" 

# monologue
# JP: ああ、そこまでは知識の中になかったか。\nここが鉄道博物館なら……っと。
1761 = "啊，她看來還沒有接觸到這部分的知識。既然這裡是鐵路博物館……哦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すみません！　姜さん！」
1029 = "「不好意思，姜小姐！」" 

# 【姜】
# display as 姜
# JP: 「はい、なんでしょう双鉄先生」
1342 = "「我在，有什麼事嗎？雙鐵先生」" 

# monologue
# JP: 夫婦の会話を邪魔せぬようにか、\n離れて控えてくれていた姜さんがすっと近づいてくる。
1839 = "或許是為了不打擾我們夫婦之間的對話，一直和我們保持著不遠不近的距離的姜小姐快步走近了我們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この博物館に建築限界測定車は展示されていますか？\nざっと見た感じでは見当たらなくて」
1598 = "「這座博物館裡有出展的限界檢測車嗎？大略看了一眼好像沒看到」" 

# 【姜】
# display as 姜
# JP: 「ああ――どうなのかな。私もわかりかねます。\n詳しい者をよびましょう。西瓜！　西瓜！」
1171 = "「啊——有還是沒有呢。我也不是很清楚。我叫更了解情況的人過來吧。西瓜！西瓜！」" 

# monologue
# JP: 姜さんの声に答えて、\nいかにも利発そうなレイルロオドがやってくる。
1801 = "姜小姐話音剛落，一個看起來十分伶俐的鐵路人偶就向走了過來。" 

# 【西瓜】
# display as 西瓜
# JP: 「はじめまして、双鉄先生、稀咲女士。\n東富4 2000専用レイルロオドの、西瓜です」
1098 = "「初次見面，雙鐵先生，稀咲女士。我是東富４　２０００的專用鐵路人偶，西瓜」" 

# 【稀咲】
# display as 稀咲
# JP: 「東富4……って、さっき見た緑色のだ。確か――\n魯国の技術をベースにした、電気式ディーゼル機関車」
1420 = "「東富４……那不就是剛才見到那輛綠色的。我記得——是基於俄國技術的柴電機車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すごい、よく覚えていたな」
1118 = "「厲害，記得這麼清楚」" 

# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のおっしゃるとおり、展示してある\n東富4の1号機は、西瓜の[いもうとき,1]妹機にあたります」
1430 = "「正如稀咲女士所言，那邊展示的東富４　１號機車，正是西瓜的[妹機,1]妹妹」" 

# 【双鉄】
# display as 雙鐵
# JP: 「妹機？」
718 = "「[妹機,1]妹妹？」" 

# monologue
# JP: 大変流暢な日ノ本語ゆえ、ひっかかる。
1777 = "她說得一口流利的日語，這反倒讓我卡了一下殼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「1号機の方が姉ではないのか？」
1674 = "「１號機不應該是姐姐嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「いえ、双鉄先生。妹機で間違いありません。\n西瓜の東富4 2000は、シリーズ全ての試作機ですから」
1660 = "「非也，雙鐵先生。的確是妹妹。因為西瓜的東富４　２０００是整個系列的測試車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、君は試作機レイルロオドなのか」
1190 = "「啊，所以你是測試車的鐵路人偶啊」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。ですので他の姉妹より多少は、\nご質問にお答えできる範囲は広いかと思います」
1396 = "「是的。所以比起其他的姐妹，或許能夠多回答一些您的問題」" 

# monologue
# JP: まことに敏い。さすがは試作機――エリートだ。\n話を実に鮮やかに、本線へと復帰させてくれた。
1937 = "著實機敏，真不愧是測試車的精英鐵路人偶。話題也被巧妙地引導回了正軌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では尋ねるが、この鉄道博物館に\n建築限界測定車は展示されているだろうか」
1640 = "「那請問，這座鐵路博物館裡有出展的限界檢測車嗎」" 

# 【西瓜】
# display as 西瓜
# JP: 「建築限界測定車――\nいわゆるオイラン車で合っていますでしょうか？」
1651 = "「限界檢測車——也就是日語中的花魁車，我沒理解錯吧？」" 

# monologue
# JP: しかも日ノ本語、日ノ本の鉄道事情にも詳しいようだ。\nオイラン車の語がすっとでてくるのには恐れ入る。
1771 = "她不光日語流利，還對日本鐵路的情況頗為了解。花魁車從她口中自然地說出來著實讓我吃了一驚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それで間違いない」
1207 = "「嗯。說得就是那種車」" 

# 【西瓜】
# display as 西瓜
# JP: 「でしたら双鉄先生、申し訳ありません。\n残念ながら、北琴鉄道博物館には展示されていません」
1509 = "「若是這樣的話，雙鐵先生，非常抱歉。很遺憾，北琴鐵路博物館並沒有出展的該型車輛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1601 = "「這樣啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「っていうか、双鉄？　なんだい、その……\nオイランシャ？　っていうのは」
1353 = "「所以說，雙鐵？那個……是叫花魁車？是什麼啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「建築限界測定車の愛称だ。建築限界を測定するため、\nセンサつきの棒が、花魁の簪の如く突き出ている」
1407 = "「是限界檢測車的暱稱。為檢測建築限界而安裝的帶感測器的探杆，凸出在車體外就像花魁的簪子一樣」" 

# 【稀咲】
# display as 稀咲
# JP: 「おやおや」
1150 = "「哦喲喲」" 

# monologue
# JP: 言った途端に稀咲が微笑み、\nからかうように、僕のほっぺたをかるくくつつく。
1925 = "稀咲邊說邊微笑著彷彿逗弄我一般，輕輕貼了貼我的臉頰。" 

# 【稀咲】
# display as 稀咲
# JP: 「ニワトリタマゴになってるよ？　双鉄。\n建築限界が何かを、ボクに説明してくれてるんだよね」
1084 = "「先有雞還是先有蛋囉？雙鐵。應該先給我解釋一下建築限界是什麼才對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだった。オイラン車の実物を見せるのが、\n建築限界の説明にもっとも早いかと考えたのだが……」
1188 = "「啊，對哦。我本來想的是直接看看花魁車的實物，比解釋建築限界來得會更快更直接的……」" 

# 【西瓜】
# display as 西瓜
# JP: 「あの……」
1091 = "「兩位……」" 

# monologue
# JP: 会話の切れ目をまっていたのか、\n西瓜がおずおず手を挙げる。
1825 = "想必是在等我們對話的間隙吧，只見西瓜輕輕地舉起了手。" 

# 【西瓜】
# display as 西瓜
# JP: 「そういうことでしたら、双鉄先生、稀咲女士。\n西瓜は簡単にですが、作図をすることが可能です」
1510 = "「若是這樣的說明，雙鐵先生，稀咲女士。西瓜可以簡單地畫一個圖解」" 

# 【稀咲】
# display as 稀咲
# JP: 「あ、それは嬉しいな。\nもしよかったら、ぜひ描いてみせてほしいんだけど」
1200 = "「啊，那可太好了。可以的話請務必畫給我看」" 

# 【西瓜】
# display as 西瓜
# JP: 「かしこまりました。では少しだけお待ちください」
1253 = "「好的，我明白了。那請您稍等」" 

# monologue
# JP: 日々姫と違い、スケッチブックは出てこない。\n普通の小さなメモ帳に、これも小振りなボールペンで――
1760 = "和日日姬不一樣，她並沒有掏出素描簿，而是拿出普通的小記事本，以及一支小小的原子筆——" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1231 = "「噢噢」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん、鮮やかなものだねぇ。\nああ――そっか……なるほど――」
1141 = "「哇哦，畫得真不錯。啊——這樣啊……原來如此——」" 

# monologue
# JP: ぱっぱと、手付きは実に鮮やかだ。\n記憶――記録をそのまま作図している印象がある。
1845 = "手起筆落，運筆乾淨俐落。彷彿將記憶——記錄原樣繪製成圖一般。" 

# 【西瓜】
# display as 西瓜
# JP: 「おまたせしました。本当に簡単な図で恐縮ですが」
1092 = "「兩位久等了。不好意思，畫得很簡單」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、花魁の簪ってこういうことだったんだね。\n確かにこれはオイラン車だね。面白い」
1227 = "「嘻嘻，所謂花魁的簪子原來是這麼回事啊。難怪被叫做花魁車。真有趣」" 

# monologue
# JP: 図を指差して、稀咲が尋ねる。
1924 = "稀咲邊用手指指著圖面邊追問道。" 

# 【稀咲】
# display as 稀咲
# JP: 「この簪がぶつかっちゃうと、建築限界を満たしていない。\nつまり走行中の列車が衝突する建造物ってことになる？」
1265 = "「如果這簪子碰到了的話，就是侵入了建築限界。也就是說建築物會與行駛中的列車發生碰撞吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。その解釈で間違いない」
1216 = "「嗯，這麼解釋沒錯」" 

# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。理解できたと思う。この超大型機関車が仮に\n日ノ本で走れば、線路周辺の建物を壊しちゃうんだね」
1678 = "「ＯＫ。我覺得我理解了。要是這輛超大型的機車真在日本行駛的話，線路周邊的建築物就都要給撞壞了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「図をみただけでそこまで理解できるのか、\n説明の必要もなかったな。素晴らしい読解力だ」
1089 = "「光是看看圖就能理解到這個程度了，應該就不需要我解釋了吧。真是出眾的理解能力」" 

# 【稀咲】
# display as 稀咲
# JP: 「いやいや」
1156 = "「哪裡哪裡」" 

# monologue
# JP: 理解にいたった喜びでか、それとも僕の称賛にか、\n稀咲は少し照れくさそうだ。
1730 = "不知是正確理解的喜悅，還是我的稱讚，讓稀咲臉上現出了些許羞赧。" 

# 【稀咲】
# display as 稀咲
# JP: 「褒めるんだったら西瓜君の方こそ、だよ。\nこの図を見れば、誰にだって理解できるでしょ？」
1561 = "「要表揚應該表揚西瓜才對，是吧。你看這圖，給誰看都能理解不是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、この図は簡潔にして明瞭だ。\n西瓜、素晴らしい図をありがとう」
1051 = "「也是，這圖解簡潔明瞭。西瓜，謝謝你畫的這麼好的圖解」" 

# 【稀咲】
# display as 稀咲
# JP: 「本当にありがとうね。西瓜君。\nおかげでボクまで褒められちゃった」
1467 = "「真的很感謝你，西瓜。託你的福我也被表揚啦」" 

# 【西瓜】
# display as 西瓜
# JP: 「お礼をいただくほどのことは何も。\nけれど、お役にたてたのでしたら西瓜は嬉しく思います」
1502 = "「舉手之勞不足掛齒。不過能幫到忙西瓜也覺得很高興」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ときに、この図の建築限界測定車。\n僕の目には、旧帝鉄のオヤそっくりに見えるのだが」
1567 = "「說起來，這圖上的限界檢測車，在我看來，和前帝國鐵路的Ｏｙａ幾乎一模一樣」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。まさしく旧帝鉄のオヤ31そのものです。西瓜は、\n日ノ本に視察にいかせていただいたことがあるのです」
1403 = "「是的，這就是前帝國鐵路的Ｏｙａ３１。西瓜以前得到機會去日本考察過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。仲国と日ノ本の鉄道両方を知っているのか。\nそれは大変こころづよいな」
1153 = "「哦，對中日雙方的鐵路知己知彼啊。那可真是相當可靠呢」" 

# monologue
# JP: 言えば大きく姜さんが頷く。
1798 = "姜小姐聞言用力點頭。" 

# 【姜】
# display as 姜
# JP: 「そうお感じいただけ光栄です。今回の先生方のご視察の、\n案内役に、西瓜は適任なのではないかと考えています」
1136 = "「可以得到你們認可倍感光榮。之前還在考慮，西瓜是否合適擔任兩位這次考察的嚮導」" 

# monologue
# JP: ほんの一瞬稀咲を見れば、満足そうな笑みでの返答。\nならば喜んで、案内をしてもらうとしよう。
1836 = "我瞄了一眼稀咲，見她臉上掛著滿意的笑容，那我也樂得客隨主便，就接受她作為我們的嚮導吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大変にありがたいご提案です。\nぜひ、視察の案内役をお願いできればと思います」
1595 = "「這個提議太貼心了。那就麻煩擔當我們這次考察的嚮導了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、視察がもっと実りあるものになりそうだね。\n西瓜君、どうぞよろしく」
1225 = "「嘻嘻，感覺這次考察的成果會更豐厚了呀。西瓜，請多指教」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。\nよろしくお願いいたします、双鉄先生、稀咲女士」
1251 = "「好的。請多多指教，雙鐵先生，稀咲女士」" 

# monologue
# JP: 深い礼。\n姿勢が戻るのをまって、稀咲がさっそく問いかけていく。
1954 = "西瓜深施一禮。而待她起身後，稀咲便緊跟著問道。" 

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君の印象だけで語って欲しいんだけど――\n日ノ本の鉄道と仲国の鉄道、一番の違いってなにかな」
1343 = "「我想問一下單以西瓜的第一印象而言的話——日本鐵路和仲國鐵路最大的區別是什麼？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜としては、大廃線を回避しなかった点と、\n大廃線を回避した点とが、一番の違いだと感じます」
1249 = "「好的。在西瓜看來，沒有避免大廢線，和避免了大廢線，是兩者最大的區別」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、それはそうか。というか今西瓜君は、\n『回避しなかった』って言ったけど……そう見える？」
1186 = "「啊，也是。不過西瓜你剛剛說“沒有避免大廢線”，在你看來是這樣的嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ――\n西瓜だけの印象で、というお話でしたね、すみません」
1169 = "「啊——您是要只以西瓜的印象而言啊，抱歉」" 

# monologue
# JP: 確認を受け、西瓜はわずかにうつむいてしまう。
1969 = "見稀咲追問確認，西瓜輕輕低下了頭。" 

# 【西瓜】
# display as 西瓜
# JP: 「そこについては、西瓜は老子――西瓜の先代マスターの\nご解釈の影響を大いに受けてしまっています」
1649 = "「關於這一部分，西瓜是受到了師父——西瓜的前任司機很大影響的」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや、こっちの質問が悪かった。自分だけの意見って、\n冷静に考えたら難しいよね。周囲の影響は必ずあるし」
1364 = "「抱歉，我不該這樣問的。只以自己的看法，仔細想想其實是很難的。人總會受到周圍的影響」" 

# monologue
# JP: 失敗失敗と、稀咲はわざとおどけてみせる。\nほっとしたように西瓜の顔がもちあがる。
1903 = "稀咲故意“失敗失敗”這樣自嘲著。放下心來的西瓜也抬起了頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君の先代マスターさんは、\n日ノ本の鉄道事情に精通していた感じなのかな？」
1547 = "「西瓜的前任司機，是很了解日本鐵路的嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。老子の研究は独自研究でしたが、\nその悉究は深いものだったと、西瓜は理解しています」
1395 = "「是的。師父雖然是獨自進行研究的，但以西瓜的了解，其悉究可謂頗深」" 

# 【稀咲】
# display as 稀咲
# JP: 「シツキュウ？」
1686 = "「Ｘｉｊｉｕ？」" 

# 【姜】
# display as 姜
# JP: 「仲国の古文にある言葉です。\n『物事をその成立から遡り突き詰める』的な意味です」
1385 = "「是一句仲國的古文。“事無大小，悉究本末”的意思」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん。その悉究なる言葉も、先代マスターさんが？」
1155 = "「哦，那悉究這話也是從前任司機那裡學來？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ご指摘の通りです。悉究は老子の口癖でした」
1426 = "「正如您所言。悉究是師父的口頭禪」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。先代マスターさんからして、\n相当な知性と知識の人だったんだね、恐らくは」
1111 = "「原來如此。這麼看來，前任司機應該是位知識豐富才智過人之人」" 

# monologue
# JP: 西瓜の頬に、実にうれしげな朱が走る。
1956 = "西瓜的臉頰上飄起了兩朵高興的紅暈。" 

# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士に老子をお褒めいただいて、\n西瓜は大変に光栄です」
1357 = "「承蒙稀咲女士對師父的讚揚，西瓜無比光榮」" 

# 【姜】
# display as 姜
# JP: 「実際に、西瓜の先代マスターは、東富4 2000開発にも\n深く関わった、学究肌の試験機関士だったんですよ」
1282 = "「實際上，西瓜的前任司機，深入參與了東富４　２０００的開發，是位學者型的試車員」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。では西瓜君の日ノ本視察自体にも、\nその先代マスターの意向が大きく影響している？」
1112 = "「原來如此。那西瓜去日本考察這件事，也主要是前任司機的意向嗎？」" 

# 【姜】
# display as 姜
# JP: 「ですね。先代マスターは、西瓜の観察力と分析力とを\n大変に高く評価していらっしゃいました」
1391 = "「是的。前任司機對西瓜的觀察力和分析能力有著極高的評價」" 

# 【西瓜】
# display as 西瓜
# JP: 「いえいえいえ！」
1157 = "「哪裡哪裡哪裡！」" 

# monologue
# JP: 完全に元気を取り戻したのか、西瓜の否定は手振りつきだ。
1866 = "看來已經完全恢復了精神的西瓜擺手否定著。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は単なる記録係。\n老子にとっては、ただの電子メモ帳代わりだったかと」
1535 = "「西瓜只是單純負責記錄而已。對於師父而言，只是像電子記事本一樣而已」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、なかなかかわいい謙遜だ。けど、観察力の\n確かさは、先程の図でボク達も把握させて貰ってるよ？」
1229 = "「嘻嘻，謙虛的樣子也很可愛啊。不過你的觀察能力從剛才的圖解裡就已經看出來了哦？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はぅ……あの――恐縮です。\n西瓜は少し、照れくさいように感じます」
1143 = "「哈……這個——不敢當。西瓜覺得有些害羞了」" 

# monologue
# JP: 嬉しげな朱がさらに赤らむ。\n西瓜はすっかり、稀咲を気に入ったご様子だ。
1997 = "高興的紅暈越來越鮮艷。西瓜看來已經開始喜歡上稀咲了。" 

# 【稀咲】
# display as 稀咲
# JP: 「照れさせちゃったのならごめんね。\nけど、本当に感じたことだから」
1362 = "「抱歉讓你害羞啦。不過我也是實話實說而已」" 

# 【西瓜】
# display as 西瓜
# JP: 「褒められすぎて、西瓜は熱暴走してしまいそうです」
1516 = "「表揚太過的話，西瓜就要過熱失控了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ごめんごめん。じゃ、少しだけクールダウンしよう」
1361 = "「抱歉抱歉。那先稍微冷靜一下吧」" 

# monologue
# JP: 稀咲が深呼吸してをみせたなら、西瓜も律儀にそれに倣う。\nなかなかのどかな光景だ。
1894 = "稀咲做起了深呼吸的樣子，西瓜也儀態端莊地照做了。這是何等恬靜的光景啊。" 

# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。じゃ、もう少しだけ質問させて？　今度は逆に、\n日ノ本と仲国の鉄道で、同じだと感じるところは？」
1682 = "「ＯＫ。那我再多問一點囉，這次反過來問，日本和仲國的鐵路，有哪些地方感覺是一樣的？」" 

# 【西瓜】
# display as 西瓜
# JP: 「同じところ……それはいくつか思いつきます」
1026 = "「一樣的地方……那可以想到很多」" 

# 【稀咲】
# display as 稀咲
# JP: 「全部聞かせて？」
1645 = "「都說來聽聽？」" 

# 【西瓜】
# display as 西瓜
# JP: 「まずは、超高速鉄道の必要性です。どちらの国でも、\n鉄道の実需を復活させるには必須と西瓜は観測しました」
1668 = "「首先，就是超高速鐵路的必要性。以西瓜的觀測而言，這對重振兩國的鐵路剛需不可或缺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1184 = "「啊！！！」" 

# monologue
# JP: これは――凄い。西瓜の先代マスターなる人物の影響が\nどれほどかはわからんが、まさに正鵠を射た見解だ。
1984 = "這可真不得了。不知道西瓜受到前任司機的影響有多大，但這見解確實是一語中的。" 

# 【西瓜】
# display as 西瓜
# JP: 「それはエアクラとの棲み分けの明確化とも言えます。\n裏を返せば、エアクラに駆逐される危機感も共通点です」
1604 = "「這樣才可以確保與空凝機並存。反言之，被空凝機淘汰也是兩國共同面臨的危機」" 

# 【稀咲】
# display as 稀咲
# JP: 「仲国では、まだエアクラ自動車の普及率、\nそこまでではないと理解していたけど？」
1074 = "「仲國的空凝機汽車普及率，應該還沒有那麼高吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「現状はご指摘のとおりです。しかし、\n『所有できないからこその憧れ』を西瓜は強く感じます」
1450 = "「現狀的確如您所言。不過，西瓜覺得“正因沒有所以憧憬”的氛圍非常濃厚」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど、そうした皮膚感覚の話は特に嬉しい。\n姜さんも、おなじような感じを受けてる？」
1113 = "「原來如此原來如此，這樣的切身感受我最喜歡了。姜小姐也有同樣的感覺嗎？」" 

# 【姜】
# display as 姜
# JP: 「ですね。仮に政府が購入制限を廃止し、かつ低価格化が\n起きれば、爆発的に購入されるかと予想します」
1412 = "「有的。如果政府取消限購政策，加之可以降低售價的話，可以預期到銷量會有爆發式的增長」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん」
1164 = "「唔」" 

# monologue
# JP: わずかに口を閉じ考え込んで。\n再び稀咲は視線を西瓜へと向け直す。
1914 = "稀咲緘口思索了片刻，而後再次將視線投向了西瓜。" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、西瓜君。仲国国鉄が、鉄道存続のために\nまっさきに為すべきことは、なんだと思う？」
1638 = "「那西瓜你覺得，仲國國鐵為確保鐵路的存續，該做的最首當其衝的是什麼？」" 

# 【西瓜】
# display as 西瓜
# JP: 「それはひとえに鉄道人気を高めることです。\n注目され、興味をもたれ、期待される鉄道にすること」
1326 = "「應該是專注於讓鐵路更受歡迎。讓鐵路引起注意、激發興趣、產生期待」" 

# monologue
# JP: ……レイルロオド然と、控えめに振る舞っていた西瓜が、\n今は一転、自らの意見を前向きに語っている。いや――
708 = "……剛才還維持著鐵路人偶的禮節，不太放得開手腳的西瓜，現在卻畫風一變，積極主動發表著自己的意見。等一下——" 

# monologue
# JP: （稀咲が語らせているというべきか。\nこの短時間に、鮮やかに信頼関係を構築して）
2003 = "（應該說是稀咲引導她說出來的嗎。在這麼短的時間裡，構築起了如此堅實的信賴關係）" 

# 【西瓜】
# display as 西瓜
# JP: 「現状のままでは、超高速鉄道さえ徒花となってしまう\n……そのような危険さえあると、西瓜は理解しています」
1256 = "「如果不改變現狀，超高速鐵路也只能是空中樓閣……西瓜認為不能排除發展成那樣的可能」" 

# 【稀咲】
# display as 稀咲
# JP: 「いいね、実に面白い」
1036 = "「不錯，非常有趣」" 

# monologue
# JP: 稀咲が深くうなずけば、西瓜の顔にも笑顔が浮かぶ。\nまるで教師と生徒のようだ。
1908 = "稀咲用力點了點頭，西瓜臉上隨即綻放出了笑容。簡直就像老師和學生一樣。" 

# 【稀咲】
# display as 稀咲
# JP: 「なら僕たちが次に視察するべきは、\n『仲国国鉄の現状そのもの』かな？　どう思う？　双鉄」
1629 = "「那我們接下來該考察的，就是“仲國國鐵的現狀本身”了吧？你覺得呢，雙鐵？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「異論はない。\n乗れるものなら、ぜひとも乗らせてもらいたい」
1347 = "「我沒有異議。有條件的話，很想實際乘坐一下」" 

# 【稀咲】
# display as 稀咲
# JP: 「っていうことなんだけど、姜さん、手配を。\n西瓜君にはガイドをお願いできるかな？」
1643 = "「那麻煩姜小姐安排，西瓜來做嚮導，可以嗎？」" 

# monologue
# JP: 流れるように、全てが段取りされていく。\n僕と結婚してもやっぱり、稀咲は常に“宝生稀咲”だ。
1928 = "種種安排一氣呵成。就算和我結婚了，稀咲還是那個“寶生稀咲”。" 

# 【稀咲】
# display as 稀咲
# JP: 「仲国で一番たくさんの乗客に乗られている列車。\nボクらをそれに乗せてほしい」
1072 = "「仲國最多乘客乘坐的列車，我們希望能去乘坐一下」" 

# 【姜】
# display as 姜
# JP: 「おかえりなさい。\n列車内はいかがでした？　双鉄先生、稀咲女士」
1424 = "「歡迎回來。雙鐵先生，稀咲女士，列車裡感覺如何？」" 

# monologue
# JP: 北琴から聖都へ向かう列車の餐車――食堂車。\n僕らを待ってた姜さんは、わざわざ椅子を引いてくれる。
1986 = "這裡是北琴開往盛都列車的餐車。在這裡等我們的姜小姐，已經幫我們拉開了椅子。" 

# 【稀咲】
# display as 稀咲
# JP: 「すごかった。\n……こんなに凄いものだとは、夢にも思ってなかったよ」
1466 = "「真不簡單。……我做夢都想像不出這樣的光景」" 

# monologue
# JP: 客車最後尾の縦断は、実際、かなりの重労働だった。\n椅子に座れば稀咲は一気にコップの水を飲み干していく。
1747 = "前後貫穿列車其實是頗為累人的。稀咲坐在椅子上，一口氣喝光了杯子裡的水。" 

# 【姜】
# display as 姜
# JP: 「お疲れ様です。ご昼食はいかがされますか？\n[さんしゃ,1]餐車ですし、お好きなものをご注文いただけましたら」
1575 = "「辛苦了。現在要吃午餐嗎？這裡正好是餐車，有想吃的儘管點就可以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お気持ちは実に嬉しく大変興味があるのですが、\n時間がどうでしょう。今から注文して間に合いますか？」
1312 = "「您的好意我樂於心領，對車上的餐食也頗感興趣。只是時間方面，現在點餐還來得及嗎？」" 

# 【姜】
# display as 姜
# JP: 「あ――どうかな、西瓜。スケジュールの都合があるので、\nどうしてもお隣、[ほてい,1]哺定駅折返しになってしまうんだけど」
1172 = "「啊——西瓜，你覺得呢？因為行程的關係，咱們只能坐到最近的寶定站然後就得返程了」" 

# 【西瓜】
# display as 西瓜
# JP: 「哺定駅には12:45の到着です。今から注文する場合、\nかなり慌ただしいお食事になるかと西瓜は推測します」
1283 = "「寶定站的進站時間是１２：４５。現在點餐的話，西瓜推測會吃得很匆忙」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ……もうこんな時間なのか。\nごめん、列車内をのんびり見学しすぎちゃったね」
1176 = "「啊……已經這麼晚了嗎。對不起，我在車內參觀得太不緊不慢了」" 

# 【姜】
# display as 姜
# JP: 「いえ、見ていただくためのご招待ですし。\nそれはむしろ、大いに望むところです。ただ――」
1562 = "「言重了，邀請二位來的目的就在這裡嘛。倒不如說，我們也希望二位能多多參觀、觀察。只是——」" 

# monologue
# JP: 姜さんは落ち着いた笑顔のまま、\nごくさりげなくメニューをどける。
1800 = "姜小姐臉上依然掛著沉穩的笑容，不著痕跡地隨手放下了菜單。" 

# 【姜】
# display as 姜
# JP: 「聖都局の餐車の料理はたいへん美味しいと評判ですので、\n時間があればご馳走させていただきたくはありました」
1463 = "「盛都局餐車上餐食口味的風評相當不錯，有時間的話真希望二位能夠品嚐一下」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、テイクアウトをお願いできないかな？\n持ち帰って、折返しの北琴に戻る列車でいただければ」
1618 = "「那不知，是否能夠提供外帶呢？那樣我們就可以帶上在返回北琴的列車上享用了」" 

# 【姜】
# display as 姜
# JP: 「ああ！　それは素晴らしい考えです。\nでは、持ち運びやすいものを見繕う形でよいですか？」
1183 = "「啊！這個辦法很不錯。那我們就點些方便外帶的菜品可以嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん、そうしてもらえたらとても嬉しい」
1210 = "「嗯。那就麻煩了」" 

# 【姜】
# display as 姜
# JP: 「でしたら大いに喜んでいただきましょう。\n西瓜？」
1625 = "「那就這樣安排吧。西瓜？」" 

# monologue
# JP: 姜さんが西瓜に指示すれば、\n西瓜はすぐさま、餐車の厨房へと向かう。
1846 = "接到姜小姐的指示，西瓜便立即起身走向了餐車的廚房。" 

# monologue
# JP: （と、いうか――\nおいしいと大評判だというわりには……）
2001 = "（不過話說回來——口味的風評既然相當不錯……）" 

# monologue
# JP: 餐車の中にはいま、僕たち以外のお客の姿は見当たらない。\n僕の視線に気がついたのか、稀咲も周囲をぐるり見渡す。
1992 = "餐車中現在卻並未見到我們以外乘客的身影。或許是察覺了我的視線，稀咲也環視起了周圍。" 

# 【稀咲】
# display as 稀咲
# JP: 「それにしてもここは静かだね。客車の方は大賑わいで、\n鉄道に人気がないって、すぐには信じられなかったのに」
1034 = "「不過這裡還真安靜。客運車廂那邊那邊明明那麼熱鬧，真讓人很難馬上相信，鐵路現在不太受歡迎」" 

# monologue
# JP: 途端、姜さんがいかにも楽しげに微笑する。
1934 = "聞言，姜小姐臉上現出了愉悅的笑容。" 

# 【姜】
# display as 姜
# JP: 「ふふっ、“すぐには”ですか」
1221 = "「嘻嘻，“馬上”啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。普通の客車、寝台客車と歩いていくうち、\nだんだんボクにもわかってきた」
1393 = "「是的。在普通客運車廂，臥鋪車廂一路走來，我也逐漸開始理解了」" 

# monologue
# JP: 西瓜がオーダーしてくれたのだろう。\n運ばれてきた烏龍茶で、稀咲は再び口を湿らす。
1951 = "西瓜或許是點餐時順便點了一些飲料，稀咲接過她拿來的烏龍茶，又潤了潤喉嚨。" 

# 【稀咲】
# display as 稀咲
# JP: 「ご老人と家族連れが多く、若者は極めて少ない。\n特に、デートらしいカップルなどは殆ど見なかった」
1497 = "「老人和一大家人的乘客很多，年輕人卻極少。特別是約會的情侶幾乎沒有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 1475 = "「確實」" 

# monologue
# JP: 稀咲の視線が僕に来たゆえ、感じたことを言葉にしていく。
1827 = "感受到了稀咲投過來的視線，我便開始講述自己的感受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅を楽しむ雰囲気ではなく、移動の手段なのだと感じた。\n特に普通客車内は、何というか、ひどく雑然としていて」
1619 = "「那並非是享受旅途的氛圍，而僅僅給人移動手段的感覺。特別是在普通客運車廂裡，怎麼說呢，頗為熱鬧」" 

# monologue
# JP: ……あの混雑を、果たしてどう表現すればいいのだろうか。\n活気というには湿り気があり、旅情というのもまた違い
713 = "……那種嘈雜的感覺應該怎麼表述才好呢。說是活力卻又頗為沉滯，旅途的氛圍也不該是如此。" 

# 【稀咲】
# display as 稀咲
# JP: 「日常生活そのものを車内に持ち込んでいるようだった。\nジャージでくつろぐご家庭の居間が、客車に、そのまま」
1289 = "「就像是把日常生活整個搬進了車廂的感覺。比起車廂，倒不如說就是穿著休閒服在自家起居室懶散的樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だな。まさしく生活空間だった。\nボックスシートの一席ずつが、私的空間となっていた」
1193 = "「啊，沒錯。就是日常生活的空間。一個個包廂坐席都變成了各自的私人空間」" 

# monologue
# JP: だから、旅ではなく移動。\n旅にともなう余所行き感を、少なくとも僕は感じなかった。
1843 = "所以不是旅行而是移動。旅途上那種去往別處的感覺，至少我是沒有感受到。" 

# 【稀咲】
# display as 稀咲
# JP: 「この列車が長距離列車だからそうなのかい？\nそれとも、市内の……通勤列車みたいなのも同じ？」
1389 = "「是因為這輛列車是長途列車的關係嗎？還是說，市內的……通勤列車之類也是這樣？」" 

# 【姜】
# display as 姜
# JP: 「通勤列車こそ日常ですとも。\nそれは単なる、必要に応じての移動にほかなりません」
1610 = "「通勤列車才更加接近日常。因為那只是單純滿足移動的剛需而已」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、よく考えたらそれはそうだね」
1197 = "「啊，細想一下確實是這樣」" 

# monologue
# JP: 稀咲の同意にうなずき返し、\n姜さんはふと、客車へつながる扉の方へ目を注ぐ。
1794 = "姜小姐向表示同意的稀咲點了點頭，而後將視線投向了通向客運車廂的門。" 

# 【姜】
# display as 姜
# JP: 「双鉄先生と稀咲女士は、雑然、生活感、くつろぎなどと\nご表現下さいましたが――それが若者を遠ざけています」
1655 = "「雙鐵先生和稀咲女士剛剛用了熱鬧、生活感、懶散之類的詞彙——而這些卻拉開了與年輕人之間的距離」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ。若者が好みそうな洗練やおしゃれ、\n先進的な感じなどとは、まさしく対極だった――客車は」
1414 = "「有道理。年輕人都是喜歡簡潔和時髦的，再就是有科技感的——和這客運車廂簡直是完全相反呢」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、たしかに、『客車は』だね」
1196 = "「啊，確實，“客運車廂”嘛」" 

# monologue
# JP: あわてて付け足した一言を、稀咲は理解し拾ってくれる。
1765 = "在我最後的補充之下，稀咲也隨即理解了。" 

# 【稀咲】
# display as 稀咲
# JP: 「この食堂車――[さんしゃ,1]餐車っていったっけ？\nここはいいね。ノスタルジーに満ちた清潔感がある」
1605 = "「這節餐車——中文是叫ｃａｎｃｈｅ對吧？這裡就不錯，清淨又有一絲淡淡的思鄉的感覺」" 

# 【姜】
# display as 姜
# JP: 「お褒めいただき光栄です。けれど餐車の清潔感は、\n単純に、利用者数の少なさのためかもしれません」
1359 = "「承蒙褒獎。但是這餐車能如此清淨，恐怕單純是使用這裡的乘客較少的關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1217 = "「嗯？」" 

# monologue
# JP: 姜さんの言葉に意表を突かれる。確かにさっきからずっと、\n餐車の中には僕らだけという状況が続いているが……
1796 = "姜小姐的話讓我頗感意外。說來從上車到現在，餐車裡倒確實一直只有我們幾個……" 

# 【双鉄】
# display as 雙鐵
# JP: 「利用者の少なさとおっしゃいましたが――\nこの貸切状態は、姜さんがお手配くださったのでは」
1313 = "「您說使用的乘客較少——像現在這樣包場難道不是姜小姐安排的嗎」" 

# 【姜】
# display as 姜
# JP: 「私は1秘書にすぎませんから、\nお手配のためには、事前の準備と手続きが必要です」
1329 = "「我不過是秘書而已，又不是領導。要做這樣的安排需要事前準備和相當的手續」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよね。乗車をお願いして昨日の今日だもの」
1047 = "「也是。拜託您安排搭車也不過是昨天才提出來的」" 

# monologue
# JP: 少し申し訳無さそうな声と、ごく穏やかな微笑みと。\n一瞬のうちに、無言のやりとりが交わされる。
1912 = "稀咲的聲音中略顯歉意，而姜小姐則是回以穩重的微笑。短短片刻，兩人便完成了一次無聲的交流。" 

# 【稀咲】
# display as 稀咲
# JP: 「これはだから――特別な手配もなにもない、\nごくごく普通の状態なんだよね？」
1352 = "「所以說這並不是特別的安排，而是非常普通的狀態囉？」" 

# 【姜】
# display as 姜
# JP: 「西瓜、それで間違いありませんか？」
1553 = "「西瓜，確實是這樣沒錯吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のご推測のとおりです。現在はちょうどお昼時\nですが、お昼に餐車という贅沢はなかなか見られません」
1434 = "「正如稀咲女士推測。現在雖然是午餐時間，但乘客多數覺得在餐車用午餐會略顯奢侈所以少有光顧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　贅沢。\nなら、価格帯の問題なのかな？」
1166 = "「唔嗯？奢侈。那是價位的問題嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1168 = "「啊——」" 

# monologue
# JP: つい最近、日々姫が食堂車の研究をしたおり、\nハチロクが聞かせてくれた帝鉄の話をふと思い出す。
1833 = "我想起就在最近，日日姬在研究餐車的時候，聽八六提起帝國鐵路的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「帝鉄の衰退期にも同じことが起きたと聞いている。\nつまり、列車利用の日常化と、乗客の食堂車離れだ」
1349 = "「我聽說帝國鐵路在衰退期時也有過同樣的情況。也就是乘坐列車變得日常化，但乘客卻不再光顧餐車」" 

# 【稀咲】
# display as 稀咲
# JP: 「面白そうな話だね。\nね、姜さん。姜さんももし興味があれば――」
1606 = "「這話題很有趣啊。是吧，姜小姐。姜小姐要是也有興趣的話——」" 

# 【姜】
# display as 姜
# JP: 「大きな興味を覚えます。\nぜひともくわしくお聞かせいただけましたら」
1337 = "「我也非常感興趣。請具體講一講吧，願洗耳恭聽」" 

# monologue
# JP: 確かに現状を分析するヒントがあるかもしれん。\nハチロクの話を、できるだけ詳細に思い出そう。
1872 = "確實可能對分析現狀有所啟發。我便開始儘量詳細地回憶起八六的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「食堂車……寝台車も同じと聞いたが、\n登場時には、豪華な贅沢品として珍重されたそうだ」
1666 = "「餐車……聽說臥鋪車也是一樣，在剛出現時，都是作為豪華的奢侈品而備受重視」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね。寝台車も食堂車も、ボクには縁が無かった。\nだから、骨董品に対する憧れのようなものは感じるよ」
1325 = "「應該是吧。臥鋪和餐車我都沒有實際乘坐過。所以會有一種對古董的憧憬那樣的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「憧れか。実際そうした存在だったのだろうな。が、その\n――いわば黄金時代は、長くは続かなかったと聞いた」
1322 = "「憧憬啊。實際上也確實曾經是那樣的存在。但，聽說其黃金時期並未能持續長久」" 

# 【稀咲】
# display as 稀咲
# JP: 「憧れの存在がその輝きを失えば……\nいわゆる陳腐化が待っている？」
1323 = "「憧憬的存在若是失去其光輝的話……等待它的就只有破敗的命運了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。高級品が実用品となっていったそうだ。\nハチロクの言を借りれば、確か……」
1204 = "「嗯。似乎是從高端定位變為了實用品。借用八六的話來說，就是……」" 

# monologue
# JP: 思い出した瞬間、頷いている。\nそれはまさしく、今日見たこの列車内と重なるようで。
1740 = "八六的話映在腦海中時，我也不禁點了點頭。那簡直就是在描述今天在這班列車內所目睹的情況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『余所行きの召し物を普段着におろしてしまう』\n『途端に扱いが雑になり、みるみるうちに色褪せる』」
724 = "「“遠行華服若降做平日穿著”“取用滌置便會諸多隨意，不日便會褪去華美色彩”」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ！」
1181 = "「啊！」" 

# monologue
# JP: 思わず、といった感じの西瓜の声。\n恐縮そうに口を塞ぐが、むしろ実感を聞かせてほしい。
1828 = "感覺西瓜這聲完全是下意識地發出來的。她緊張地遮住嘴的樣子，讓我不禁想要聽聽她真實的感想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かなり強い同意を受けたように思ったが――\n仲国国鉄の餐車や寝台車も、同じような感じなのか？」
1077 = "「似乎你們也深有同感的樣子——莫非仲國的餐車和臥鋪車也都經歷了類似的過程嗎？" 

# 【西瓜】
# display as 西瓜
# JP: 「まさしくです。導入当初の餐車には正装のお客様達が、\n昼も夜もなく列を為し順番待ちをしていたそうです」
1436 = "「正是如此。當初餐車剛上線時，乘客們衣著隆重，不分晝夜地排隊光顧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1148 = "「哦」" 

# 【西瓜】
# display as 西瓜
# JP: 「けれども利用客減少と値下げとを何度か繰り返すうちに、\n普段着でのご利用をされる方の比率がどんどん増して」
1442 = "「然而隨著光顧的客人減少及降價幾個循環之後，穿著隨意的客人的比例越來越高」" 

# monologue
# JP: 西瓜がぐるりとあたりを見回す。\n――稀咲の言った清潔感が、いまは寂寞と思えてしまう。
1965 = "西瓜邊說邊環顧了一下四周。——稀咲剛剛說的清淨，現在更多的是落寞的感覺。" 

# 【西瓜】
# display as 西瓜
# JP: 「……先生方は、ご覧になられましたでしょうか？\n普通客車、あるいは寝台車での昼食の様子を」
728 = "「……兩位剛剛應該也看到了吧，普通客運車廂，還有臥鋪車廂裡乘客們用午餐的情形」" 

# monologue
# JP: 言われればすぐ思い出す。\n稀咲が僕の袖を引き、見るように促してくれた光景を。
1936 = "聽她這麼一說，我腦海裡不禁浮現出剛剛稀咲拉著我的袖子催促我去看的樣子。" 

# 【稀咲】
# display as 稀咲
# JP: 「寝台車の方では飴色の、何かの肉を食べてる人がいた。\n驚いたのは客車の方で、カップラーメンを食していたね」
1501 = "「臥鋪那邊看到有人在吃米色的不知是什麼肉。客運車廂那邊更令我驚訝，竟然有人在吃杯麵」" 

# monologue
# JP: それも、一人ではない。\n複数――というか、かなりの多数だ。
1933 = "而且還不止一個人。實話說，是相當不少。" 

# 【稀咲】
# display as 稀咲
# JP: 「あれは、魔法瓶かなにかを誰かが持ち込んでるとか？\nあるいは車内販売とかで作って売っている？」
1631 = "「那是有誰帶了暖瓶之類的嗎？還是說列車售貨員泡好賣的呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「いえ、先生方は隣駅である[ほてい,1]哺定駅まで一駅間だけの\n往復乗車となりますが、列車自体は長距離夜行なのです」
1031 = "「不是的。我們這次只是乘到最近的寶定站往返，但這列車是夜行的長途列車」" 

# monologue
# JP: 職業柄時刻表を見て確認してある。
1743 = "出於職業習慣，我有確認過時刻表。" 

# 【双鉄】
# display as 雙鐵
# JP: 「北琴西駅を11:28に出て、終着聖都駅には08:56着。\nほぼほぼ一昼夜を走り抜ける列車だったよな」
1105 = "「北琴西站１１：２８發車，終點站盛都站０８：５６進站。行駛時間差不多是一整個晝夜」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい、まさしく双鉄先生のおっしゃられたとおりです。\nですので、車内では水とお湯は無料で自由に使えます」
1401 = "「是的，正如雙鐵先生所言。所以冷熱水在車內都有免費供應」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうか。なるほど――それでカップラーメンね。\nふーん」
1600 = "「這樣啊。原來如此——所以是杯麵啊。嗯」" 

# monologue
# JP: 思考を整理したいのだろう、\n稀咲がぶつぶつつぶやきはじめる。
1838 = "或許是想整利思路吧，稀咲開始低聲嘀咕了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「最初は正装で食堂車だったものが、いまでは普段着で\nカップラーメン。実用品の最たるものになった印象だ」
1411 = "「最開始是衣著隆重在餐車，現在是穿著隨意吃杯麵。這就是實用品最直觀的印象了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「若いカップルの姿が少なかったのもその影響かな。\nデートで乗りたい列車であるとは、正直思えん」
1658 = "「難見年輕情侶應該也是受此影響吧。實話說，確實不覺得這是想在約會時乘坐的列車」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね。エアクラへの切り替えは進んでいずとも、\nガソリン自動車は相当に普及していたはずだし」
1473 = "「確實。即便空凝機還沒有普及，燃油汽車應該還是很普遍的」" 

# monologue
# JP: ちら、と姜さんへ視線を向ければ、\nそのとおりですとの頷きが返される。
1780 = "她邊說邊瞄了一眼姜小姐，不出意外地得到了點頭肯定。" 

# 【稀咲】
# display as 稀咲
# JP: 「この現状のまま、究極的に低コストである移動手段。\nエアクラ自動車が一般に普及できる価格で市販されれば」
1506 = "「若是不能突破現狀，空凝機汽車作為極低成本的移動手段，能夠以足以大面積普及的價格上市銷售的話」" 

# 【西瓜】
# display as 西瓜
# JP: 「まさしく、今の仲国国鉄が担っている実需が根こそぎ\n奪われるでしょう。西瓜はそれを懸念しています」
1634 = "「那無疑會動搖到如今仲國國鐵所肩負的剛需的根基。西瓜擔心的就是這一點」" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……」
1202 = "「嗯……」" 

# monologue
# JP: 稀咲が親指を唇に当てる。\n爪を噛むかと思いきや、気づいたように手を戻す。
1910 = "稀咲用拇指抵住了嘴唇。我剛在想她是不是想要咬指甲，她彷彿意識到一般把手又放下了。" 

# 【稀咲】
# display as 稀咲
# JP: 「これだけの混雑率で賑わいだ。恐らく――というか直感\nだけれども、実需を奪われることはないんじゃないかな」
1373 = "「既然還是這麼嘈雜而熱鬧的話，估計——雖然只是我的直覺——應該不至於會動搖到剛需的根基」" 

# 【西瓜】
# display as 西瓜
# JP: 「と、おっしゃいますと？」
1594 = "「這……這話怎麼說？」" 

# 【稀咲】
# display as 稀咲
# JP: 「公共の中に私的空間を展開する、その猥雑さを愛する\nという方々は、エアクラ移動を恐らく好まないだろう」
1236 = "「在公共空間中劃出一塊私人空間，而喜歡這種略顯雜亂感覺的人，想必不會喜歡空凝機這種移動方式吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「！」
1167 = "「唔！」" 

# monologue
# JP: みるみるうちに西瓜の瞳が丸くなり、\n頬がじわりと紅潮していく。
1957 = "西瓜聞言瞪大了眼睛，緊繃的表情也逐漸舒緩了開來。" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ――その視点を、西瓜は全く持っていませんでした。\n人間には……整理整頓よりも猥雑さを好む層も、いる」
1175 = "「啊——這個思路，西瓜從來沒想到過。會有一些人……較之完全規整，會更傾向一定程度的雜亂」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。散らかっている方が落ち着くというタイプだ。\nボクにはナンセンスに思えるが、彼らは実際そうらしい」
1206 = "「嗯。就是不那麼規整才能安下心來的人。我是不太能理解啦，但他們確實就是這麼覺得的」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜のまわりも整理整頓をきっちりする方ばかりです。\nですので、今のご指摘は大いに勉強になります」
1549 = "「西瓜身邊都是非常規整的人。所以剛剛的話真是讓西瓜茅塞頓開」" 

# 【稀咲】
# display as 稀咲
# JP: 「その層を手放すことはもったいないし、無意味だ。\nどころか観光需要もプロモーション次第で見込めるかも」
1367 = "「放棄這些乘客即可惜又沒有意義。若是宣傳得當，觀光需求或許也是可以期待的」" 

# 【西瓜】
# display as 西瓜
# JP: 「なるほど。他国のそうした層の方々に、\nむしろ猥雑さを宣伝していく感じでしょうか？」
1110 = "「原來如此。是指向外國的這類人群進行宣傳嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「それもありかな、と。けれど――」
1599 = "「這樣也是可以的吧。不過——」" 

# monologue
# JP: また親指が唇へ。稀咲の興味と思と考が、\nかなり深めに、この問題に入り始めていると感じる。
1895 = "稀咲又用拇指抵住了嘴唇。我感覺稀咲已經十分投入地在思考這個問題了。" 

# 【稀咲】
# display as 稀咲
# JP: 「――そうした実需が残っただけでは、ダメだよね。\nそれは結局、現状からのゆるやかな衰退にすぎないし」
720 = "「——只剩這一種剛需的話還是不行啊。那樣最終也只能是減緩衰退的進程而已」" 

# 【姜】
# display as 姜
# JP: 「そうですね。\nですので、そこを打開できればと望んでいます」
1474 = "「確實。所以，我們才希望能找到打開局面的方法」" 

# monologue
# JP: タイミングの良い姜さんの声。
1803 = "姜小姐開口的時機真是恰到好處。" 

# 【姜】
# display as 姜
# JP: 「双鉄先生と稀咲女士には、ぜひそこにつながる案を――\n新事業の枠にこだわらずご教示いただければと願います」
1291 = "「希望雙鐵先生和稀咲女士不要拘泥於新業務框架的話題，在這方面也提出一些方案」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。未整理だけど、いくつかアイディアを\n思いつけるかもしれないとは感じてる。けど……」
1383 = "「明白。雖然還沒有梳理過，不過感覺好像已經有幾個思路了。只是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1151 = "「哦！」" 

# monologue
# JP: ようやくの二組目は、４人連れ。がやがやとした賑わいに、\n他人事ながら思わず嬉しくなってしまう。
1993 = "餐車裡終於又來了一撥客人，四個人談笑風生好不熱鬧。讓人不由得受其感染，變得開心了起來。" 

# 【姜】
# display as 姜
# JP: 「ふふっ、双鉄先生と稀咲女士が、\n他のお客様の呼び水となってくれたのでしょう」
1224 = "「嘻嘻，兩位看來是成了招徠其他顧客的引子呀」" 

# 【稀咲】
# display as 稀咲
# JP: 「いやいや、呼び水はこの香りの方じゃないかな」
1158 = "「哪裡哪裡，應該是菜品的香氣才對吧」" 

# monologue
# JP: いつの間に、西瓜がテイクアウトを取りにいってる。\nなにか肉まんの類だろうか。確かに実に旨そうな香りだ。
1731 = "不經意間，西瓜已經取來了外帶的菜品。似乎是某種肉包一樣的食物，散發著無比誘人的香氣。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、稀咲女士。\n列車は間もなく、哺定駅に到着します」
1656 = "「雙鐵先生，稀咲女士，列車即將抵達寶定站」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では下りる準備をしないとな」
1602 = "「這樣啊，那我們該準備下車了」" 

# 【稀咲】
# display as 稀咲
# JP: 「西瓜君。折返しの列車なんだけど――さっきまでの\n餐車みたいな、ボクたちだけになれるような空間って」
1554 = "「西瓜，返程的列車上，是否有像剛才的餐車一樣，能讓我們獨處的空間」" 

# 【西瓜】
# display as 西瓜
# JP: 「確認します――確認しました。折返しの列車の牽引機は\n東富Ⅳ型。西瓜の妹に当るレイルロオドの乗務列車です」
1551 = "「西瓜這就確認一下——好的，返程列車的牽引車是東富４型，是由西瓜的妹妹負責的列車」" 

# monologue
# JP: にこっと――西瓜の笑みは誇らしげだ。
1950 = "西瓜微微一笑，臉上寫滿自豪" 

# 【西瓜】
# display as 西瓜
# JP: 「ですので西瓜は必ずや、\n先生方のご期待に沿うことをお約束申し上げます」
1350 = "「所以西瓜保證能夠滿足二位的期待」" 

# 【姜】
# display as 姜
# JP: 「こちらは折返し用の補機なので、\n北琴西までは西瓜のみが乗務するよういたしました」
1607 = "「這輛是回送的補機，所以在抵達北琴西站之前，這個駕駛台只安排了西瓜獨自負責乘務」" 

# 【西瓜】
# display as 西瓜
# JP: 「東富４型の運転台内のみのことでしたら、\n西瓜にも手配のお手伝いが可能ですので」
1100 = "「別的不敢說，但東富４型駕駛台裡西瓜還是了如指掌的，幫忙駕駛也沒有問題」" 

# monologue
# JP: ……姜さんと西瓜がなにやら説明してくれているが、\n右耳から左耳へと、綺麗に抜けていってしまう。
706 = "……儘管姜小姐和西瓜在給我們介紹著情況，但她們說的話我是一個字都沒聽進去。" 

# 【稀咲】
# display as 稀咲
# JP: 「すごいね、これは。\n『男の子ってこういうの好きなんでしょ？』って光景だ」
1596 = "「這可真不得了。感覺完全就是男孩子最愛的場面」" 

# monologue
# JP: 西瓜が乗車させてくれた東富４型の運転台と、\nはしゃぐ稀咲との両方に、目も耳もこころも奪われている。
1961 = "西瓜讓我們搭乘的東富４型的駕駛台，以及情緒高漲的稀咲，牢牢吸引住了我全部的注意力。" 

# 【稀咲】
# display as 稀咲
# JP: 「けど、こんなのは大人の女性だって好きだよ。\n少なくともボクと――間違いなくポーレット、日々姫も」
1035 = "「不過，就算是成年女性也一樣喜歡。至少我是這樣，還有波萊特和日日姬也肯定會喜歡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それをいうなら、凪も大喜びするだろう」
1559 = "「要是這麼說，凪看到了也一定會興高采烈」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、だろうね。といっても彼女はまだまだ少女だし。\n『男の子』に近いところも少なくないように見えるけど」
1145 = "「哈哈，也是，只不過她只能算個女孩子，而且她在很多地方反倒更接近男孩子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違いない」
1461 = "「的確如此」" 

# monologue
# JP: しかしまぁ、8620のキャブとのなんという違いだろう。\nまず広い。そして非常に近代的だ。
1757 = "只不過，跟８６２０的駕駛室相比真是完全不一樣。首先空間非常寬敞，而且設備也顯得非常現代化。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あそこがブレーキ弁だろうな。\n今はハンドルを外しているようだが……動力操作は――」
1637 = "「那裡就是剎車手把吧，雖然目前手把沒有裝上……至於動力控制——」" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生。もしご興味があるようでしたら、\n東富４型の運転操作のすべてを、西瓜はお教えします」
1266 = "「如果雙鐵先生有興趣的話，西瓜可以將東富４型的駕駛方式全部告訴您」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1199 = "「啊，那倒不用了」" 

# monologue
# JP: 無論、大いに興味はある。もし可能なら入れ換え時などに、\n実際の運転もさせてほしいと思ってしまう。が――
1835 = "我當然對於駕駛非常感興趣，可以的話，我都忍不住想在調車時實際嘗試一下。只不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはまた、可能であれば別の機会に願いたい。\nいまはなにより、話し合いの時間が必要だろう」
1615 = "「還是另找機會再請教你吧，我們現在需要好好磋商一下」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。往路と同じ時間なら、復路もわずか90分程度しか\n時間を確保できないってことになるんだから」
1287 = "「對，如果來回時間相同，留給我們的時間只有大概一個半小時」" 

# 【姜】
# display as 姜
# JP: 「お心遣いに感謝いたします。それで、先程稀咲女士は\n――確か、いくつかアイディアを思いつきそう、と」
1315 = "「感謝二位的關照，於是稀咲女士方才，說是大概有了一些眉目是嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「その前に論点を少し整頓したいかな。\n人気を持ち上げたいターゲットは、若者層で大丈夫かな」
1239 = "「在這之前，我想先整理一下議題，你們是想要提高對年輕人的吸引力沒錯吧？」" 

# 【姜】
# display as 姜
# JP: 「はい。さきほどお二方が不在をご指摘くださった、\n『デート中のカップル』などを引き付けられればと」
1399 = "「是的，剛剛二位也提到在車上見不到約會中的情侶，我們希望提高火車對這類人群的吸引力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今の持ち味であるあの雑然感、実需はそのまま維持し。\nその上で別途、新ターゲット層を引きつける施策を行う」
1491 = "「維持現在的特色，也就是熱鬧的感覺以滿足實際需要，再另施新策以吸引新的目標人群」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクもその線がいいと思う。だからまず仲国の若い\nカップル層の多数が、どのような嗜好かを知りたいな」
1332 = "「我也認為這樣做最為妥當，所以需要先知道你們仲國的年輕情侶大多有著什麼樣的需求」" 

# 【姜】
# display as 姜
# JP: 「とのことですが、どうですか？　西瓜」
1053 = "「二位都這麼說了，西瓜你能說明一下嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「ぁっ」
1180 = "「啊」" 

# monologue
# JP: 少し照れたような反応。稀咲も、ん？　と反応する。\nどうやら西瓜は、レイルロオドでありながら――
1959 = "西瓜表現得有些羞澀，而稀咲也意識到了其中的含義。看來西瓜儘管身為鐵路人偶——" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は決して詳しいわけではありませんが、\n西瓜の観測範囲では、その……」
1532 = "「西瓜也並不算特別了解，單就西瓜的觀察來看，這個呢……」" 

# monologue
# JP: 今までの冷静かつハツラツとした感じが一転、もじもじだ。\nならば西瓜は恐らくは『カップルの当事者』なのだろう。
1774 = "她不再像之前那樣冷靜而不失活潑，突然變得忸怩起來。可以見得，西瓜應該也屬於“情侶”這個人群了。" 

# 【西瓜】
# display as 西瓜
# JP: 「先程双鉄先生がおっしゃられた感じで間違いないかと。\n『洗練、おしゃれ、先進的』等は、人気を博しそうです」
1327 = "「應該正如雙鐵先生剛才所言，“簡潔、時髦和科技感”等主題應該是最受情侶們歡迎的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん」
1248 = "「好吧」" 

# monologue
# JP: 稀咲のふぅん、はっきり楽しげな色を帯びてる。\n――朴念仁とされる僕でも気づくほどだ。間違いなかろう。
1923 = "稀咲這句“好吧”滿是樂在其中的感覺，就連一直被稱為木頭人的我都能發覺，應該不會有錯。" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、ボクも西瓜君に質問させてほしい。\n例えば日々姫……ああ、日々姫のことは」
1644 = "「那麼請允許我向你提問，比如讓日日姬……哦，日日姬是」" 

# 【西瓜】
# display as 西瓜
# JP: 「もちろん存じ上げています。日ノ本を代表しつつある、\n新進気鋭の、天才とも称される車輌デザイナーさんです」
1545 = "「西瓜當然認識，她是最近嶄露頭角，正逐步成為能日本代表性的天才車輛設計師」" 

# 【稀咲】
# display as 稀咲
# JP: 「その日々姫に、ターゲット層の好みに刺さる観光列車を\nデザインしてもらうとして──効果ありそう？」
1082 = "「假如讓日日姬設計符合目標人群喜好的觀光列車，你認為能取得很好的效果嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の意見でよければ、もちろんです。ですが、\n西瓜はそもそも『鉄道に大いに興味がある』層ですので」
1261 = "「如果您是想聽西瓜的意見，那麼答案當然是肯定的，只不過西瓜本就屬於“熱愛鐵路”的人群」" 

# 【稀咲】
# display as 稀咲
# JP: 「そっか。鉄道にまったく興味がない層が、そもそも\n鉄道関連の情報に興味を抱いてくれるかは予測できない」
1049 = "「也是，如果換成對於鐵路無感的人群，很難說他們一定會對鐵路有關的訊息產生興趣」" 

# 【西瓜】
# display as 西瓜
# JP: 「お役に立てずすみませんが、ご指摘のとおりです。\n西瓜の周辺も、みな鉄道関係者で」
1281 = "「實在抱歉，稀咲女士所言極是，西瓜身邊的人也都是鐵路從業人員」" 

# 【稀咲】
# display as 稀咲
# JP: 「周辺ね。なるほど、了解」
1079 = "「你周圍的人也都是啊，我明白了」" 

# monologue
# JP: 言って稀咲は僕を見る。
1916 = "稀咲說罷便看向了我。" 

# 【稀咲】
# display as 稀咲
# JP: 「過去のボクなら、どんなに綺麗な列車がデザインされた\nとしても、乗りたいとは思わなかったかな。双鉄は？」
1258 = "「如果在以前，不管列車的設計再優美，我也不會萌生想要乘坐的念頭，雙鐵你呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今の僕が、新造の素晴らしいデザインの客船の情報に\n触れたときと同様だろう。仮に興味をひかれたとしても」
1058 = "「以客輪為例，如果我現在知道有一艘新下水的輪船其設計非常棒，就算會產生一定興趣，肯定也和你一樣」" 

# 【稀咲】
# display as 稀咲
# JP: 「わざわざ乗りに行こうという強い動機にまではならない。\nだよね、うん。分野への興味がないってそういうことだ」
1565 = "「設計無法成為吸引顧客的決定性因素，果然是這樣，嗯。想要得到局外人的青睞，的確不是一件容易的事情」" 

# 【姜】
# display as 姜
# JP: 「つまり、もう一段階前の施策が必要となりますか。\n『鉄道という分野そのもの』へ目を向けてもらうための」
1044 = "「也就是說，除了設計，還需要採取更根本性的措施，也就是想辦法讓目標人群對鐵路自身產生興趣」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。さて……そうなるとなかなか難しい。\nターゲットが広く浅いだけに、選択肢も絞り込みづらい」
1438 = "「沒錯，只不過……這可是很困難的，目標人群龐大而寬泛，很難想到適用大部分人群的方法」" 

# monologue
# JP: 親指を唇にあて、稀咲が考えこんでしまう。\nであらば僕も思いつくまま尋ねてみよう。
1902 = "稀咲將拇指抵上嘴唇，陷入了沉思之中。那麼我也將想到的問題全部提出來吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国の若者層の主たるニュースソースはどのあたりだ？\nネット、新聞、TVなどいろいろあるかとは思うが」
1073 = "「仲國的年輕人主要是通過什麼樣的途徑獲得訊息的？比如網路、報紙和電視，應該是種類繁多」" 

# 【西瓜】
# display as 西瓜
# JP: 「志か――んんっ、西瓜のよく知る若者でしたら。\nネットのニュースサイトを一番頻繁にみているようです」
1307 = "「志……嗯，就西瓜很熟悉的年輕人來說，應該是以網路上的新聞網站為主要訊息來源」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ニュースサイトか」
1405 = "「是這樣，新聞網站啊」" 

# 【西瓜】
# display as 西瓜
# JP: 「その他にショートメッセージをやりとりするアプリでの、\n人づての情報なども、頻繁に受け取っているようです」
1653 = "「除此之外，他還經常會通過聊天軟體與其他人交流，藉此獲得訊息」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本でいうDINEのようなものか。\nなるほど、その辺は日ノ本の若者と差異がないのだな」
1663 = "「類似日本常見的ＤＩＮＥ吧，原來在這些方面兩國的年輕人都差不多」" 

# 【姜】
# display as 姜
# JP: 「DINEに相当するのはOurChatというサービスですね。\nその他、QwQというグループチャットも盛んです」
1075 = "「仲國的ＯｕｒＣｈａｔ服務就相當於日本的ＤＩＮＥ，除此之外還有ＱｗＱ也非常流行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「個人間での情報のやりとりが盛んなのか。\nそこに上手くささるような広告ができればいいのだが」
1042 = "「主流是與他人互相交換訊息嗎？要是能通過這個途徑好好宣傳一下，勾起年輕人的興趣就好了」" 

# 【稀咲】
# display as 稀咲
# JP: 「口コミを意図的に作ろうとするのは難しいよね。\n日ノ本だとすぐ、ステマステマと騒がれてしまう」
1557 = "「要想故意製造良好的口碑也是挺困難的，在我們日本，很可能立刻被人批評為是秘密行銷」" 

# 【姜】
# display as 姜
# JP: 「すてま、ですか？」
1481 = "「秘密行銷？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう。Stealth Marketing」
1566 = "「說白了就是暗中打廣告」" 

# 【姜】
# display as 姜
# JP: 「理解しました。それは確かに悪手ですね。\n仲国でも、露見すれば反発されることは必至です」
1346 = "「我明白了，這樣做的確不好，就算在仲國，一旦被揭穿也肯定會招來人們的反感」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ……ちょっと混乱してきた。整理しよう」
1179 = "「啊……有點理不清思緒了，先總結一下吧」" 

# monologue
# JP: 言いつつ、稀咲は指を一本立ててみせる。
1926 = "稀咲邊說邊豎起一根手指。" 

# 【稀咲】
# display as 稀咲
# JP: 「大目標は、鉄道の復権。具体的には乗客数を増やす。\n増やしたい乗客の主体となるのは、若者層」
1247 = "「大目標是復興鐵路，具體來說就是增加乘客數量，主要是想增加年輕乘客」" 

# 【姜】
# display as 姜
# JP: 「はい、間違いありません」
1211 = "「嗯，沒有問題」" 

# 【稀咲】
# display as 稀咲
# JP: 「魅力ある列車を作ることは、鉄道に興味ある層に有効。\nけれどそもそも若者層の殆どは鉄道に興味を持ってない」
1564 = "「設計優秀富有魅力的列車對於本就喜歡鐵路的人群確實有效果，但問題在於大多數年輕人對鐵路本就沒有興趣」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜はそのように認識しています」
1544 = "「西瓜是這樣認為的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。ならどうやって興味を抱かせるか」
1685 = "「ＯＫ，那麼關鍵就是如何讓他們產生興趣了」" 

# monologue
# JP: 二本目の指が立てられる。
1918 = "稀咲豎起了第二根手指。" 

# 【稀咲】
# display as 稀咲
# JP: 「若者層の主たるニュースソースはニュースサイト、\nSNS、グループチャット。ステマは仲国でも反感を買う」
1294 = "「年輕人的訊息來源以網站、社交軟體和即時通信軟體為主，仲國人也非常反感秘密行銷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「若者層にPRする最適な手法は、ネットやスマホ経由で、\n鉄道の魅力を発信していく――ということになるか」
1453 = "「由此可見，大體方向就是透過網路或者手機應用，向年輕人宣傳鐵路的魅力」" 

# 【稀咲】
# display as 稀咲
# JP: 「そのとおりだとボクも感じる。\nとなるとようやく、具体的な内容の検討に進めるね」
1331 = "「我也是這樣認為的，那我們就該商量一下具體的宣傳手段了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1138 = "「呃」" 

# monologue
# JP: 減速している。\nもしやと思い時計を見れば――
1744 = "列車在減速，我於是看向時鐘——" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、稀咲女士。\n残念ですが、列車は間もなく北琴西駅に到着します」
1657 = "「雙鐵先生，稀咲女士，很遺憾列車即將抵達北琴西站」" 

# 【稀咲】
# display as 稀咲
# JP: 「もうか！\n90分なんてディスカッションしてるとあっという間だね」
1597 = "「這就要到了嗎！一旦開始討論，一個半小時真是轉瞬即逝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まことにな。ここで話を打ち切るというのも\nもったいないかとは思うのだが――」
1462 = "「的確是這樣，雖然我也不忍就此結束話題——」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。西瓜君と姜さんにも、可能なら引続き\nディスカッションに参加して欲しいのだけれど」
1286 = "「對啊，如果可以的話，希望西瓜和姜女士能繼續和我們討論」" 

# 【姜】
# display as 姜
# JP: 「もちろんです！\nお邪魔でなければ、ぜひ参加させてください」
1458 = "「當然沒問題！若是二位不介意的話，請務必讓我繼續參加討論」" 

# monologue
# JP: 満面の笑みでの即答だ。
1776 = "她滿面笑容，二話不說就答應了。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の話がご参考になるのでしたら、喜んで。\nお二人のお話に、西瓜はとても刺激を受けています」
1262 = "「如果西瓜的意見對二位有參考價值的話，西瓜當然非常樂意，與二位的交流也給西瓜帶來了很大的積極影響」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、であればなによりだ」
1603 = "「這樣啊，那當然是再好不過」" 

# 【姜】
# display as 姜
# JP: 「お二人の北琴での歓待は当初予定どおりですので、\n完全個室のレストランを予約手配してあります」
1339 = "「我們會按照原定計劃在北琴設宴款待二位，已經在酒店預約了單獨包廂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは助かります。お手配ありがとうございます」
1636 = "「那真是太好了，準備如此周到，實在是感激不盡」" 

# monologue
# JP: 姜さんの言う『完全個室』の意味ならば、\n“そこでの話は外部に漏れない”――に違いない。
1848 = "既然姜小姐特意說是“單獨包廂”，肯定是指不會有外人聽到我們在餐桌上的一切談話。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクもそれで――っとと」
1334 = "「我也贊成這樣的安排——哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ」
1218 = "「嗯？哦」" 

# monologue
# JP: 稀咲が気にしているのは西瓜から渡された小さな包み。\n先程の餐車からのテイクアウト品だ。
1905 = "稀咲是看到了西瓜交給我們的包裹，裡面是剛剛從餐車打包帶來的菜品。" 

# 【稀咲】
# display as 稀咲
# JP: 「姜さんのおすすめだ。絶対おいしいに決まってるから、\nこれも食べたいけど――賞味期限とか夜まで保つかな」
1371 = "「既然是姜女士大力推薦的，味道肯定有保證，雖然我也想吃——但是這能放到晚上嗎？」" 

# 【姜】
# display as 姜
# JP: 「でしたら、これからいくレストランに預けて、\n料理と一緒によい感じにサーブしてもらいましょう」
1621 = "「那就把它交給酒店的廚師，作為餐桌上美味的副菜享用吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだね。それがいい」
1215 = "「嗯，這個主意好」" 

# 【姜】
# display as 姜
# JP: 「では、決まりですね！」
1626 = "「那就這麼定了！」" 

# monologue
# JP: 稀咲も姜さんもにこにこだ。\n西瓜までもが、実に楽しげな顔をしている。
1898 = "稀咲和姜女士都是滿面笑容，連西瓜也顯得非常愉快。" 

# 【西瓜】
# display as 西瓜
# JP: 「間もなく停車をいたします。ホームに降りる時、\n段差になってしまいますのでお気をつけください」
1096 = "「列車即將進站停靠，下車時請小心車廂和站台之間的落差」" 

# monologue
# JP: そういってから、西瓜はあわてて言葉を継ぎ足す。
1960 = "西瓜說到這裡，又急忙補了一句。" 

# 【西瓜】
# display as 西瓜
# JP: 「もちろん、\n双鉄先生は慣れていらっしゃることと思いますが」
1457 = "「當然我知道，對雙鐵先生是不用提醒這些的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「アドバイスをありがとう。けど、大丈夫だ」
1568 = "「謝謝你的提醒，不過我們是不用擔心這個問題的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、だね」
1146 = "「哈哈，沒錯」" 

# monologue
# JP: 稀咲と僕と、手を取り合うのは双方からだ。
1900 = "稀咲和我同時伸出手牽在了一起。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が、ボクをエスコートしてくれるから」
1233 = "「因為有雙鐵守護著我」" 
