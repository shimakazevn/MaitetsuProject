[script]
# lines: 346 
# 【稀咲】
# display as 稀咲
# JP: 「これは――すごいね」
1593 = "「Thứ này——Tuyệt thật đấy.」"
# monologue
# JP: 北琴鉄道博物館。見学する稀咲の踊るような足取りが、\n超大型の蒸気機関車の前で、ぴたりととまる。
1985 = "Bảo tàng Đường sắt Bắc Cầm. Bước chân nhảy múa của Kisaki đang đi tham quan, bỗng dừng bặt trước một chiếc đầu máy hơi nước siêu lớn."
# 【稀咲】
# display as 稀咲
# JP: 「とても大きい。いや、もちろん、\n蒸気機関車は大きく分厚いものとわかっているけれど」
1616 = "「Lớn quá. Không, tất nhiên là tôi biết đầu máy hơi nước vốn dĩ rất to lớn và đồ sộ rồi, nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nうちの8620と比べると大人と子供の印象さえある」
1387 = "「Đúng vậy. So với chiếc 8620 của chúng ta thì cứ như người lớn với trẻ con vậy.」"
# monologue
# JP: プレートには2101。そして国繋号の文字。
1930 = "Trên biển số là 2101. Và dòng chữ Quốc Hệ Hào."
# 【双鉄】
# display as 雙鐵
# JP: 「実に見事だ。日ノ本ではとても走れんだろうが――\nそれだけに、大陸の雄大さをつくづく感じさせられる」
1476 = "「Thật sự rất ấn tượng. Dù ở Hinomoto chắc chắn sẽ không thể chạy được—— Nhưng chính vì thế, nó càng khiến tôi cảm nhận sâu sắc sự hùng vĩ của đại lục.」"
# 【稀咲】
# display as 稀咲
# JP: 「ん？　日ノ本では、って――ああ、そうか。\nきっと重すぎるんだね、この機関車は」
1219 = "「Hử? Ở Hinomoto sao——A, ra vậy. Chắc chắn là chiếc đầu máy này quá nặng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1475 = "「Đúng vậy.」"
# monologue
# JP: 嬉しくなる。マイレールファンド事業を通じ、稀咲も随分、\n鉄道……というか、線路に詳しくなったものだと。
1830 = "Tôi cảm thấy vui mừng. Thông qua dự án My Rail Fund, Kisaki cũng đã hiểu biết hơn rất nhiều về đường sắt…… hay nói đúng hơn là về đường ray."
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本には川沿いの線路が多く、\n地盤が頑強でないところも非常に多い。それだけでなく」
1380 = "「Ở Hinomoto có rất nhiều tuyến đường sắt dọc theo các con sông, và cũng có vô số nơi nền đất không được vững chắc. Không chỉ vậy,」"
# monologue
# JP: 嬉しすぎてつい口走り、余計なことかと一瞬感じる。
1728 = "Vì quá vui sướng nên tôi lỡ buột miệng, trong thoáng chốc tôi cảm thấy mình đã nói hơi thừa."
# 【稀咲】
# display as 稀咲
# JP: 「それだけでなく？」
1028 = "「Không chỉ vậy?」"
# monologue
# JP: けれど稀咲は、目を輝かせて問い直し、\nますます調子に乗らせてくれる。
1739 = "Nhưng Kisaki lại mắt sáng rực hỏi lại, khiến tôi càng thêm hăng hái."
# 【双鉄】
# display as 雙鐵
# JP: 「線路の幅が、日ノ本の狭軌、1067mmに対し、\nこの機関車は標準軌、1435mm仕様となっている」
1494 = "「Khổ đường sắt ở Hinomoto là khổ hẹp 1067mm, còn chiếc đầu máy này được thiết kế cho khổ tiêu chuẩn 1435mm.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、だから列車そのものも幅広だし、\n足元がしっかりしている分、高さもとれているのか」
1191 = "「A, thảo nào bản thân đoàn tàu cũng rộng hơn, và nhờ phần chân vững chắc nên chiều cao cũng được tăng lên sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。それゆえ仮に台車交換をして走らせたとて、\n日ノ本の線路上では建築限界を優にオーバーしてしまう」
1437 = "「Đúng vậy. Vì thế, giả sử có thay giá chuyển hướng để chạy đi chăng nữa, thì nó cũng sẽ vượt quá giới hạn kiến trúc trên đường ray của Hinomoto.」"
# 【稀咲】
# display as 稀咲
# JP: 「建築限界？」
1304 = "「Giới hạn kiến trúc?」"
# monologue
# JP: ああ、そこまでは知識の中になかったか。\nここが鉄道博物館なら……っと。
1761 = "A, ra là kiến thức của em ấy chưa đến mức đó. Nếu đây đã là bảo tàng đường sắt thì…… à."
# 【双鉄】
# display as 雙鐵
# JP: 「すみません！　姜さん！」
1029 = "「Xin lỗi! Cô Khương!」"
# 【姜】
# display as 姜
# JP: 「はい、なんでしょう双鉄先生」
1342 = "「Vâng, có chuyện gì vậy thưa anh Soutetsu.」"
# monologue
# JP: 夫婦の会話を邪魔せぬようにか、\n離れて控えてくれていた姜さんがすっと近づいてくる。
1839 = "Như để không làm phiền cuộc trò chuyện của hai vợ chồng, cô Khương, người nãy giờ vẫn đứng chờ ở xa, liền bước tới."
# 【双鉄】
# display as 雙鐵
# JP: 「この博物館に建築限界測定車は展示されていますか？\nざっと見た感じでは見当たらなくて」
1598 = "「Trong bảo tàng này có trưng bày xe đo giới hạn kiến trúc không? Tôi nhìn sơ qua thì không thấy.」"
# 【姜】
# display as 姜
# JP: 「ああ――どうなのかな。私もわかりかねます。\n詳しい者をよびましょう。西瓜！　西瓜！」
1171 = "「A——Tôi cũng không rõ nữa. Để tôi gọi người rành về chuyện này nhé. Suika! Suika!」"
# monologue
# JP: 姜さんの声に答えて、\nいかにも利発そうなレイルロオドがやってくる。
1801 = "Đáp lại tiếng gọi của cô Khương, một Railord trông rất lanh lợi bước tới."
# 【西瓜】
# display as 西瓜
# JP: 「はじめまして、双鉄先生、稀咲女士。\n東富4 2000専用レイルロオドの、西瓜です」
1098 = "「Rất vui được gặp hai vị, anh Soutetsu, chị Kisaki. Tôi là Suika, Railord chuyên dụng của Dongfu 4 2000.」"
# 【稀咲】
# display as 稀咲
# JP: 「東富4……って、さっき見た緑色のだ。確か――\n魯国の技術をベースにした、電気式ディーゼル機関車」
1420 = "「Dongfu 4…… là chiếc màu xanh lá cây vừa nãy chúng ta xem. Hình như là—— đầu máy diesel-điện được chế tạo dựa trên công nghệ của nước Lỗ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すごい、よく覚えていたな」
1118 = "「Tuyệt thật, em nhớ rõ thế.」"
# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のおっしゃるとおり、展示してある\n東富4の1号機は、西瓜の[いもうとき,1]妹機にあたります」
1430 = "「Đúng như lời chị Kisaki nói, chiếc Dongfu 4 số 1 đang được trưng bày chính là em gái của Suika.」"
# 【双鉄】
# display as 雙鐵
# JP: 「妹機？」
718 = "「Em gái sao?」"
# monologue
# JP: 大変流暢な日ノ本語ゆえ、ひっかかる。
1777 = "Vì cô bé nói tiếng Hinomoto quá trôi chảy nên tôi có chút bất ngờ."
# 【双鉄】
# display as 雙鐵
# JP: 「1号機の方が姉ではないのか？」
1674 = "「Chiếc số 1 không phải là chị sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「いえ、双鉄先生。妹機で間違いありません。\n西瓜の東富4 2000は、シリーズ全ての試作機ですから」
1660 = "「Không đâu, anh Soutetsu. Chắc chắn là em gái ạ. Bởi vì chiếc Dongfu 4 2000 của Suika là nguyên mẫu thử nghiệm của toàn bộ series này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、君は試作機レイルロオドなのか」
1190 = "「A, ra em là Railord của nguyên mẫu thử nghiệm.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。ですので他の姉妹より多少は、\nご質問にお答えできる範囲は広いかと思います」
1396 = "「Vâng. Vì vậy, em nghĩ phạm vi những câu hỏi em có thể trả lời sẽ rộng hơn một chút so với các chị em khác ạ.」"
# monologue
# JP: まことに敏い。さすがは試作機――エリートだ。\n話を実に鮮やかに、本線へと復帰させてくれた。
1937 = "Quả thật rất lanh lợi. Không hổ danh là nguyên mẫu thử nghiệm——một tinh anh. Cô bé đã khéo léo đưa câu chuyện quay trở lại chủ đề chính."
# 【双鉄】
# display as 雙鐵
# JP: 「では尋ねるが、この鉄道博物館に\n建築限界測定車は展示されているだろうか」
1640 = "「Vậy cho tôi hỏi, trong bảo tàng đường sắt này có trưng bày xe đo giới hạn kiến trúc không?」"
# 【西瓜】
# display as 西瓜
# JP: 「建築限界測定車――\nいわゆるオイラン車で合っていますでしょうか？」
1651 = "「Xe đo giới hạn kiến trúc—— Ý anh là xe Oiran đúng không ạ?」"
# monologue
# JP: しかも日ノ本語、日ノ本の鉄道事情にも詳しいようだ。\nオイラン車の語がすっとでてくるのには恐れ入る。
1771 = "Hơn nữa, có vẻ cô bé cũng rất am hiểu tiếng Hinomoto và tình hình đường sắt của Hinomoto. Việc từ 'xe Oiran' thốt ra một cách tự nhiên như vậy thật đáng nể."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それで間違いない」
1207 = "「Ừm. Chắc chắn là nó rồi.」"
# 【西瓜】
# display as 西瓜
# JP: 「でしたら双鉄先生、申し訳ありません。\n残念ながら、北琴鉄道博物館には展示されていません」
1509 = "「Nếu vậy thì anh Soutetsu, em vô cùng xin lỗi. Thật đáng tiếc, nhưng bảo tàng đường sắt Bắc Cầm không có trưng bày chiếc xe đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1601 = "「Ra là vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「っていうか、双鉄？　なんだい、その……\nオイランシャ？　っていうのは」
1353 = "「Mà này, anh Soutetsu? Cái đó là gì vậy…… Xe Oiran? ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「建築限界測定車の愛称だ。建築限界を測定するため、\nセンサつきの棒が、花魁の簪の如く突き出ている」
1407 = "「Đó là biệt danh của xe đo giới hạn kiến trúc. Để đo giới hạn kiến trúc, những thanh gắn cảm biến nhô ra trông giống như trâm cài tóc của các Oiran vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「おやおや」
1150 = "「Ái chà chà.」"
# monologue
# JP: 言った途端に稀咲が微笑み、\nからかうように、僕のほっぺたをかるくくつつく。
1925 = "Vừa dứt lời, Kisaki liền mỉm cười, và chọc nhẹ vào má tôi như muốn trêu chọc."
# 【稀咲】
# display as 稀咲
# JP: 「ニワトリタマゴになってるよ？　双鉄。\n建築限界が何かを、ボクに説明してくれてるんだよね」
1084 = "「Anh đang bị vòng luẩn quẩn 'con gà hay quả trứng có trước' rồi đấy? Anh Soutetsu. Anh đang định giải thích cho tôi giới hạn kiến trúc là gì cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだった。オイラン車の実物を見せるのが、\n建築限界の説明にもっとも早いかと考えたのだが……」
1188 = "「A, đúng rồi. Tôi cứ nghĩ cho em xem tận mắt chiếc xe Oiran sẽ là cách nhanh nhất để giải thích về giới hạn kiến trúc……」"
# 【西瓜】
# display as 西瓜
# JP: 「あの……」
1091 = "「Dạ……」"
# monologue
# JP: 会話の切れ目をまっていたのか、\n西瓜がおずおず手を挙げる。
1825 = "Như đang chờ khoảng lặng trong cuộc trò chuyện, Suika rụt rè giơ tay lên."
# 【西瓜】
# display as 西瓜
# JP: 「そういうことでしたら、双鉄先生、稀咲女士。\n西瓜は簡単にですが、作図をすることが可能です」
1510 = "「Nếu là chuyện đó thì, anh Soutetsu, chị Kisaki. Suika có thể vẽ một bản vẽ phác thảo đơn giản ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「あ、それは嬉しいな。\nもしよかったら、ぜひ描いてみせてほしいんだけど」
1200 = "「A, vậy thì tuyệt quá. Nếu được, mong em hãy vẽ cho chúng tôi xem nhé.」"
# 【西瓜】
# display as 西瓜
# JP: 「かしこまりました。では少しだけお待ちください」
1253 = "「Đã rõ ạ. Vậy xin hai vị vui lòng đợi một chút.」"
# monologue
# JP: 日々姫と違い、スケッチブックは出てこない。\n普通の小さなメモ帳に、これも小振りなボールペンで――
1760 = "Khác với Hibiki, cô bé không lấy ra một cuốn sổ phác thảo. Mà là một cuốn sổ tay nhỏ bình thường, cùng với một cây bút bi cũng nhỏ nhắn không kém——"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1231 = "「Ồ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん、鮮やかなものだねぇ。\nああ――そっか……なるほど――」
1141 = "「Hừm, nét vẽ sống động thật đấy. A——ra vậy…… hiểu rồi——」"
# monologue
# JP: ぱっぱと、手付きは実に鮮やかだ。\n記憶――記録をそのまま作図している印象がある。
1845 = "Từng nét vẽ thoăn thoắt, đôi tay vô cùng điêu luyện. Cảm giác như cô bé đang trực tiếp tái hiện lại ký ức——hay nói đúng hơn là những dữ liệu đã được ghi chép."
# 【西瓜】
# display as 西瓜
# JP: 「おまたせしました。本当に簡単な図で恐縮ですが」
1092 = "「Để hai vị phải đợi lâu rồi. Xin lỗi vì đây chỉ là một bản vẽ phác thảo vô cùng đơn giản ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、花魁の簪ってこういうことだったんだね。\n確かにこれはオイラン車だね。面白い」
1227 = "「Fufu, trâm cài tóc của Oiran là thế này sao. Đúng là xe Oiran thật. Thú vị quá.」"
# monologue
# JP: 図を指差して、稀咲が尋ねる。
1924 = "Kisaki chỉ vào bản vẽ và hỏi."
# 【稀咲】
# display as 稀咲
# JP: 「この簪がぶつかっちゃうと、建築限界を満たしていない。\nつまり走行中の列車が衝突する建造物ってことになる？」
1265 = "「Nếu những chiếc trâm này bị va chạm, tức là không đáp ứng được giới hạn kiến trúc. Nói cách khác, đó sẽ là công trình kiến trúc mà đoàn tàu đang chạy có thể va phải sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。その解釈で間違いない」
1216 = "「Ừm. Em hiểu như vậy là hoàn toàn chính xác.」"
# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。理解できたと思う。この超大型機関車が仮に\n日ノ本で走れば、線路周辺の建物を壊しちゃうんだね」
1678 = "「OK. Tôi nghĩ mình đã hiểu rồi. Nếu chiếc đầu máy siêu lớn này mà chạy ở Hinomoto, nó sẽ phá hủy hết các công trình xung quanh đường ray nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「図をみただけでそこまで理解できるのか、\n説明の必要もなかったな。素晴らしい読解力だ」
1089 = "「Chỉ nhìn hình vẽ mà em đã hiểu được đến mức đó sao, chẳng cần tôi phải giải thích nữa. Khả năng đọc hiểu tuyệt vời thật.」"
# 【稀咲】
# display as 稀咲
# JP: 「いやいや」
1156 = "「Không đâu.」"
# monologue
# JP: 理解にいたった喜びでか、それとも僕の称賛にか、\n稀咲は少し照れくさそうだ。
1730 = "Không biết là do niềm vui khi đã hiểu ra vấn đề, hay do lời khen ngợi của tôi, mà Kisaki trông có vẻ hơi ngượng ngùng."
# 【稀咲】
# display as 稀咲
# JP: 「褒めるんだったら西瓜君の方こそ、だよ。\nこの図を見れば、誰にだって理解できるでしょ？」
1561 = "「Nếu khen thì anh phải khen Suika mới đúng. Nhìn hình vẽ này, ai mà chẳng hiểu được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、この図は簡潔にして明瞭だ。\n西瓜、素晴らしい図をありがとう」
1051 = "「Cũng đúng, bản vẽ này vừa ngắn gọn lại vừa rõ ràng. Suika, cảm ơn em vì bản vẽ tuyệt vời này.」"
# 【稀咲】
# display as 稀咲
# JP: 「本当にありがとうね。西瓜君。\nおかげでボクまで褒められちゃった」
1467 = "「Thực sự cảm ơn em nhé. Suika. Nhờ em mà chị cũng được khen lây đấy.」"
# 【西瓜】
# display as 西瓜
# JP: 「お礼をいただくほどのことは何も。\nけれど、お役にたてたのでしたら西瓜は嬉しく思います」
1502 = "「Không có gì đáng để hai vị phải cảm ơn đâu ạ. Nhưng nếu có thể giúp ích được gì, Suika cũng cảm thấy rất vui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ときに、この図の建築限界測定車。\n僕の目には、旧帝鉄のオヤそっくりに見えるのだが」
1567 = "「Nhân tiện, chiếc xe đo giới hạn kiến trúc trong bản vẽ này. Trong mắt tôi, nó trông giống hệt chiếc Oya của Đường sắt Hoàng gia cũ.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。まさしく旧帝鉄のオヤ31そのものです。西瓜は、\n日ノ本に視察にいかせていただいたことがあるのです」
1403 = "「Vâng. Nó chính xác là chiếc Oya 31 của Đường sắt Hoàng gia cũ ạ. Suika đã từng có cơ hội đến Hinomoto để khảo sát.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。仲国と日ノ本の鉄道両方を知っているのか。\nそれは大変こころづよいな」
1153 = "「Hô. Vậy là em am hiểu cả đường sắt của Trọng Quốc và Hinomoto sao. Thế thì thật là đáng tin cậy.」"
# monologue
# JP: 言えば大きく姜さんが頷く。
1798 = "Nghe vậy, cô Khương gật đầu mạnh."
# 【姜】
# display as 姜
# JP: 「そうお感じいただけ光栄です。今回の先生方のご視察の、\n案内役に、西瓜は適任なのではないかと考えています」
1136 = "「Rất vinh hạnh khi anh cảm thấy như vậy. Tôi nghĩ rằng, Suika rất phù hợp để làm người hướng dẫn cho chuyến khảo sát lần này của hai vị.」"
# monologue
# JP: ほんの一瞬稀咲を見れば、満足そうな笑みでの返答。\nならば喜んで、案内をしてもらうとしよう。
1836 = "Tôi liếc nhìn Kisaki trong chớp mắt, và nhận lại một nụ cười mãn nguyện. Nếu vậy thì tôi rất sẵn lòng để cô bé làm người hướng dẫn."
# 【双鉄】
# display as 雙鐵
# JP: 「大変にありがたいご提案です。\nぜひ、視察の案内役をお願いできればと思います」
1595 = "「Đó quả là một đề xuất vô cùng tuyệt vời. Chúng tôi rất mong em có thể làm người hướng dẫn cho chuyến khảo sát này.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、視察がもっと実りあるものになりそうだね。\n西瓜君、どうぞよろしく」
1225 = "「Fufu, có vẻ chuyến khảo sát này sẽ thu hoạch được nhiều thứ đây. Suika, mong em giúp đỡ nhé.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。\nよろしくお願いいたします、双鉄先生、稀咲女士」
1251 = "「Vâng. Rất mong được hai vị chiếu cố, anh Soutetsu, chị Kisaki.」"
# monologue
# JP: 深い礼。\n姿勢が戻るのをまって、稀咲がさっそく問いかけていく。
1954 = "Một cái cúi chào thật sâu. Đợi cô bé ngẩng đầu lên, Kisaki liền lập tức đặt câu hỏi."
# 【稀咲】
# display as 稀咲
# JP: 「西瓜君の印象だけで語って欲しいんだけど――\n日ノ本の鉄道と仲国の鉄道、一番の違いってなにかな」
1343 = "「Chị muốn nghe cảm nhận của riêng Suika thôi nhé—— Sự khác biệt lớn nhất giữa đường sắt Hinomoto và đường sắt Trọng Quốc là gì vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜としては、大廃線を回避しなかった点と、\n大廃線を回避した点とが、一番の違いだと感じます」
1249 = "「Vâng. Theo quan điểm của Suika, điểm khác biệt lớn nhất chính là việc không né tránh Đại bãi bỏ tuyến và việc đã né tránh được Đại bãi bỏ tuyến ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、それはそうか。というか今西瓜君は、\n『回避しなかった』って言ったけど……そう見える？」
1186 = "「A, ra là vậy. Mà này, vừa nãy Suika nói là 'không né tránh'…… em thấy như vậy sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「あ――\n西瓜だけの印象で、というお話でしたね、すみません」
1169 = "「A—— Chị bảo là chỉ muốn nghe cảm nhận của riêng Suika nhỉ, em xin lỗi.」"
# monologue
# JP: 確認を受け、西瓜はわずかにうつむいてしまう。
1969 = "Bị hỏi ngược lại, Suika hơi cúi mặt xuống."
# 【西瓜】
# display as 西瓜
# JP: 「そこについては、西瓜は老子――西瓜の先代マスターの\nご解釈の影響を大いに受けてしまっています」
1649 = "「Về vấn đề đó, Suika đã chịu ảnh hưởng rất lớn từ cách diễn giải của Lão Sư—— tức là Master đời trước của Suika ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、こっちの質問が悪かった。自分だけの意見って、\n冷静に考えたら難しいよね。周囲の影響は必ずあるし」
1364 = "「Không, là do câu hỏi của chị không tốt. Nếu bình tĩnh suy nghĩ lại thì, việc chỉ nêu ý kiến của bản thân cũng khó thật. Chắc chắn sẽ có sự ảnh hưởng từ những người xung quanh mà.」"
# monologue
# JP: 失敗失敗と、稀咲はわざとおどけてみせる。\nほっとしたように西瓜の顔がもちあがる。
1903 = "Kisaki cố tình tỏ ra hài hước và nói 'Thất bại rồi, thất bại rồi'. Khuôn mặt Suika ngẩng lên như trút được gánh nặng."
# 【稀咲】
# display as 稀咲
# JP: 「西瓜君の先代マスターさんは、\n日ノ本の鉄道事情に精通していた感じなのかな？」
1547 = "「Master đời trước của Suika, có vẻ rất am hiểu về tình hình đường sắt ở Hinomoto nhỉ?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。老子の研究は独自研究でしたが、\nその悉究は深いものだったと、西瓜は理解しています」
1395 = "「Vâng. Dù những nghiên cứu của Lão Sư là do ông ấy tự mình thực hiện, nhưng Suika hiểu rằng sự Tất Cứu của ông ấy vô cùng sâu sắc.」"
# 【稀咲】
# display as 稀咲
# JP: 「シツキュウ？」
1686 = "「Tất Cứu?」"
# 【姜】
# display as 姜
# JP: 「仲国の古文にある言葉です。\n『物事をその成立から遡り突き詰める』的な意味です」
1385 = "「Đó là một từ trong cổ văn của Trọng Quốc. Nó mang ý nghĩa 'truy tìm nguồn gốc và đi sâu vào bản chất của sự việc'.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん。その悉究なる言葉も、先代マスターさんが？」
1155 = "「Hừm. Vậy từ Tất Cứu đó cũng là do Master đời trước dạy em sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「ご指摘の通りです。悉究は老子の口癖でした」
1426 = "「Đúng như chị nói ạ. Tất Cứu là câu cửa miệng của Lão Sư.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。先代マスターさんからして、\n相当な知性と知識の人だったんだね、恐らくは」
1111 = "「Ra là vậy. Có lẽ Master đời trước của em là một người có trí tuệ và kiến thức vô cùng uyên bác nhỉ.」"
# monologue
# JP: 西瓜の頬に、実にうれしげな朱が走る。
1956 = "Một vệt ửng đỏ đầy vui sướng hiện lên trên má Suika."
# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士に老子をお褒めいただいて、\n西瓜は大変に光栄です」
1357 = "「Được chị Kisaki khen ngợi Lão Sư, Suika cảm thấy vô cùng vinh hạnh.」"
# 【姜】
# display as 姜
# JP: 「実際に、西瓜の先代マスターは、東富4 2000開発にも\n深く関わった、学究肌の試験機関士だったんですよ」
1282 = "「Thực ra, Master đời trước của Suika là một kỹ sư lái tàu thử nghiệm mang đậm chất học giả, ông ấy cũng tham gia sâu vào việc phát triển Dongfu 4 2000 đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。では西瓜君の日ノ本視察自体にも、\nその先代マスターの意向が大きく影響している？」
1112 = "「Ra là vậy. Thế thì việc Suika đi khảo sát ở Hinomoto, cũng chịu ảnh hưởng lớn từ ý muốn của vị Master đời trước đó sao?」"
# 【姜】
# display as 姜
# JP: 「ですね。先代マスターは、西瓜の観察力と分析力とを\n大変に高く評価していらっしゃいました」
1391 = "「Đúng vậy. Master đời trước đã đánh giá rất cao khả năng quan sát và phân tích của Suika.」"
# 【西瓜】
# display as 西瓜
# JP: 「いえいえいえ！」
1157 = "「Không đâu, không đâu ạ!」"
# monologue
# JP: 完全に元気を取り戻したのか、西瓜の否定は手振りつきだ。
1866 = "Có vẻ như đã hoàn toàn lấy lại tinh thần, Suika vừa xua tay vừa phủ nhận."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は単なる記録係。\n老子にとっては、ただの電子メモ帳代わりだったかと」
1535 = "「Suika chỉ là một người ghi chép đơn thuần thôi. Đối với Lão Sư, em chắc chỉ giống như một cuốn sổ tay điện tử thôi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、なかなかかわいい謙遜だ。けど、観察力の\n確かさは、先程の図でボク達も把握させて貰ってるよ？」
1229 = "「Fufu, cách khiêm tốn của em đáng yêu thật đấy. Nhưng mà, sự nhạy bén trong khả năng quan sát của em thì bọn chị cũng đã nắm được qua bức vẽ lúc nãy rồi nhé?」"
# 【西瓜】
# display as 西瓜
# JP: 「はぅ……あの――恐縮です。\n西瓜は少し、照れくさいように感じます」
1143 = "「Hau…… dạ——Em ngại quá.\nSuika cảm thấy hơi xấu hổ ạ.」"
# monologue
# JP: 嬉しげな朱がさらに赤らむ。\n西瓜はすっかり、稀咲を気に入ったご様子だ。
1997 = "Vệt ửng đỏ vui sướng trên má cô bé càng thêm đậm. Có vẻ như Suika đã hoàn toàn mến Kisaki rồi."
# 【稀咲】
# display as 稀咲
# JP: 「照れさせちゃったのならごめんね。\nけど、本当に感じたことだから」
1362 = "「Xin lỗi vì đã làm em xấu hổ nhé. Nhưng đó là những gì chị thực sự cảm nhận được mà.」"
# 【西瓜】
# display as 西瓜
# JP: 「褒められすぎて、西瓜は熱暴走してしまいそうです」
1516 = "「Được khen nhiều quá, Suika sắp bị quá nhiệt đến nơi rồi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ごめんごめん。じゃ、少しだけクールダウンしよう」
1361 = "「Xin lỗi, xin lỗi. Vậy chúng ta hạ nhiệt một chút nhé.」"
# monologue
# JP: 稀咲が深呼吸してをみせたなら、西瓜も律儀にそれに倣う。\nなかなかのどかな光景だ。
1894 = "Kisaki hít một hơi thật sâu, Suika cũng nghiêm túc làm theo. Quả là một cảnh tượng thanh bình."
# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。じゃ、もう少しだけ質問させて？　今度は逆に、\n日ノ本と仲国の鉄道で、同じだと感じるところは？」
1682 = "「OK. Vậy cho chị hỏi thêm một chút nữa nhé? Lần này ngược lại, em cảm thấy điểm giống nhau giữa đường sắt Hinomoto và Trọng Quốc là gì?」"
# 【西瓜】
# display as 西瓜
# JP: 「同じところ……それはいくつか思いつきます」
1026 = "「Điểm giống nhau sao…… Em có thể nghĩ ra vài điểm ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「全部聞かせて？」
1645 = "「Kể cho chị nghe tất cả được không?」"
# 【西瓜】
# display as 西瓜
# JP: 「まずは、超高速鉄道の必要性です。どちらの国でも、\n鉄道の実需を復活させるには必須と西瓜は観測しました」
1668 = "「Đầu tiên là sự cần thiết của đường sắt siêu tốc. Theo quan sát của Suika, ở cả hai quốc gia, đây là điều bắt buộc để khôi phục lại nhu cầu thực tế đối với đường sắt ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1184 = "「!!!」"
# monologue
# JP: これは――凄い。西瓜の先代マスターなる人物の影響が\nどれほどかはわからんが、まさに正鵠を射た見解だ。
1984 = "Điều này——Thật đáng kinh ngạc. Không biết ảnh hưởng từ vị Master đời trước của Suika lớn đến mức nào, nhưng đây quả thực là một quan điểm vô cùng sắc bén."
# 【西瓜】
# display as 西瓜
# JP: 「それはエアクラとの棲み分けの明確化とも言えます。\n裏を返せば、エアクラに駆逐される危機感も共通点です」
1604 = "「Đó cũng có thể coi là sự phân định rạch ròi với Aircra. Nói cách khác, cảm giác khủng hoảng trước nguy cơ bị Aircra đào thải cũng là một điểm chung ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「仲国では、まだエアクラ自動車の普及率、\nそこまでではないと理解していたけど？」
1074 = "「Chị hiểu là ở Trọng Quốc, tỷ lệ phổ cập của xe Aircra vẫn chưa đến mức đó mà nhỉ?」"
# 【西瓜】
# display as 西瓜
# JP: 「現状はご指摘のとおりです。しかし、\n『所有できないからこその憧れ』を西瓜は強く感じます」
1450 = "「Hiện tại thì đúng như chị nói ạ. Tuy nhiên, Suika cảm nhận rất rõ 'sự khao khát chính vì không thể sở hữu' của mọi người.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど、そうした皮膚感覚の話は特に嬉しい。\n姜さんも、おなじような感じを受けてる？」
1113 = "「Ra là vậy, ra là vậy, những câu chuyện mang tính cảm nhận thực tế như thế này thật sự rất tuyệt. Cô Khương cũng có cảm nhận tương tự chứ?」"
# 【姜】
# display as 姜
# JP: 「ですね。仮に政府が購入制限を廃止し、かつ低価格化が\n起きれば、爆発的に購入されるかと予想します」
1412 = "「Vâng. Giả sử chính phủ bãi bỏ lệnh hạn chế mua, và giá cả giảm xuống, tôi dự đoán sức mua sẽ bùng nổ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん」
1164 = "「Hừm.」"
# monologue
# JP: わずかに口を閉じ考え込んで。\n再び稀咲は視線を西瓜へと向け直す。
1914 = "Khép hờ miệng suy nghĩ một chút. Kisaki lại một lần nữa hướng ánh mắt về phía Suika."
# 【稀咲】
# display as 稀咲
# JP: 「なら、西瓜君。仲国国鉄が、鉄道存続のために\nまっさきに為すべきことは、なんだと思う？」
1638 = "「Vậy thì Suika. Em nghĩ Đường sắt Quốc gia Trọng Quốc, việc đầu tiên cần làm để duy trì sự tồn tại của đường sắt là gì?」"
# 【西瓜】
# display as 西瓜
# JP: 「それはひとえに鉄道人気を高めることです。\n注目され、興味をもたれ、期待される鉄道にすること」
1326 = "「Đó hoàn toàn là việc nâng cao mức độ yêu thích đối với đường sắt ạ. Biến đường sắt thành một thứ được chú ý, được quan tâm và được kỳ vọng.」"
# monologue
# JP: ……レイルロオド然と、控えめに振る舞っていた西瓜が、\n今は一転、自らの意見を前向きに語っている。いや――
708 = "……Suika, người vốn cư xử rất chừng mực đúng chuẩn một Railord, hiện tại lại thay đổi thái độ, tích cực bày tỏ ý kiến của bản thân. Không——"
# monologue
# JP: （稀咲が語らせているというべきか。\nこの短時間に、鮮やかに信頼関係を構築して）
2003 = "(Nói đúng hơn là Kisaki đang khiến cô bé nói ra. Chỉ trong một thời gian ngắn, cô ấy đã xây dựng được một mối quan hệ tin cậy vô cùng ấn tượng.)"
# 【西瓜】
# display as 西瓜
# JP: 「現状のままでは、超高速鉄道さえ徒花となってしまう\n……そのような危険さえあると、西瓜は理解しています」
1256 = "「Nếu cứ giữ nguyên hiện trạng, thì ngay cả đường sắt siêu tốc cũng sẽ chỉ là một bông hoa sớm nở tối tàn ……Suika hiểu rằng thậm chí còn có nguy cơ như vậy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「いいね、実に面白い」
1036 = "「Tuyệt đấy, thật sự rất thú vị.」"
# monologue
# JP: 稀咲が深くうなずけば、西瓜の顔にも笑顔が浮かぶ。\nまるで教師と生徒のようだ。
1908 = "Kisaki gật đầu sâu, trên khuôn mặt Suika cũng hiện lên một nụ cười. Trông họ hệt như giáo viên và học sinh vậy."
# 【稀咲】
# display as 稀咲
# JP: 「なら僕たちが次に視察するべきは、\n『仲国国鉄の現状そのもの』かな？　どう思う？　双鉄」
1629 = "「Vậy thì thứ tiếp theo chúng ta cần khảo sát, có lẽ là 'chính hiện trạng của Đường sắt Quốc gia Trọng Quốc' nhỉ? Anh thấy sao? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「異論はない。\n乗れるものなら、ぜひとも乗らせてもらいたい」
1347 = "「Tôi không có ý kiến gì khác. Nếu có thể, tôi rất muốn được đi thử.」"
# 【稀咲】
# display as 稀咲
# JP: 「っていうことなんだけど、姜さん、手配を。\n西瓜君にはガイドをお願いできるかな？」
1643 = "「Là vậy đó, cô Khương, nhờ cô sắp xếp nhé. Còn Suika, em có thể làm hướng dẫn viên cho chúng tôi được không?」"
# monologue
# JP: 流れるように、全てが段取りされていく。\n僕と結婚してもやっぱり、稀咲は常に“宝生稀咲”だ。
1928 = "Mọi thứ được sắp xếp một cách trôi chảy. Dù đã kết hôn với tôi, Kisaki vẫn luôn là một 'Houshou Kisaki'."
# 【稀咲】
# display as 稀咲
# JP: 「仲国で一番たくさんの乗客に乗られている列車。\nボクらをそれに乗せてほしい」
1072 = "「Chuyến tàu có số lượng hành khách đi nhiều nhất ở Trọng Quốc. Tôi muốn chúng tôi được đi chuyến tàu đó.」"
# 【姜】
# display as 姜
# JP: 「おかえりなさい。\n列車内はいかがでした？　双鉄先生、稀咲女士」
1424 = "「Chào mừng hai vị đã quay lại. Bên trong đoàn tàu thế nào? Anh Soutetsu, chị Kisaki.」"
# monologue
# JP: 北琴から聖都へ向かう列車の餐車――食堂車。\n僕らを待ってた姜さんは、わざわざ椅子を引いてくれる。
1986 = "Toa ăn——hay còn gọi là toa nhà hàng của chuyến tàu đi từ Bắc Cầm đến Thánh Đô. Cô Khương, người đang đợi chúng tôi, cất công kéo ghế ra cho chúng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「すごかった。\n……こんなに凄いものだとは、夢にも思ってなかったよ」
1466 = "「Thật sự rất ấn tượng. ……Tôi chưa từng mơ tới việc nó lại ấn tượng đến mức này đấy.」"
# monologue
# JP: 客車最後尾の縦断は、実際、かなりの重労働だった。\n椅子に座れば稀咲は一気にコップの水を飲み干していく。
1747 = "Việc đi bộ xuyên suốt đến tận cuối toa hành khách, quả thực là một công việc khá nặng nhọc. Vừa ngồi xuống ghế, Kisaki liền uống cạn một hơi ly nước."
# 【姜】
# display as 姜
# JP: 「お疲れ様です。ご昼食はいかがされますか？\n[さんしゃ,1]餐車ですし、お好きなものをご注文いただけましたら」
1575 = "「Hai vị vất vả rồi. Bữa trưa hai vị muốn dùng gì? Đây là toa ăn mà, hai vị cứ gọi món mình thích nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お気持ちは実に嬉しく大変興味があるのですが、\n時間がどうでしょう。今から注文して間に合いますか？」
1312 = "「Thành ý của cô khiến tôi rất vui và cũng rất hứng thú, nhưng thời gian thì sao nhỉ. Bây giờ gọi món thì có kịp không?」"
# 【姜】
# display as 姜
# JP: 「あ――どうかな、西瓜。スケジュールの都合があるので、\nどうしてもお隣、[ほてい,1]哺定駅折返しになってしまうんだけど」
1172 = "「A——Sao nhỉ, Suika. Vì lịch trình, nên chúng ta bắt buộc phải quay đầu ở ga Hotei kế bên rồi.」"
# 【西瓜】
# display as 西瓜
# JP: 「哺定駅には12:45の到着です。今から注文する場合、\nかなり慌ただしいお食事になるかと西瓜は推測します」
1283 = "「Tàu sẽ đến ga Hotei lúc 12:45. Nếu bây giờ gọi món, Suika đoán là bữa ăn sẽ khá vội vã đấy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ……もうこんな時間なのか。\nごめん、列車内をのんびり見学しすぎちゃったね」
1176 = "「A…… đã đến giờ này rồi sao. Xin lỗi nhé, tôi đã mải mê tham quan bên trong tàu quá.」"
# 【姜】
# display as 姜
# JP: 「いえ、見ていただくためのご招待ですし。\nそれはむしろ、大いに望むところです。ただ――」
1562 = "「Không đâu, chúng tôi mời hai vị đến là để tham quan mà. Đó thậm chí còn là điều chúng tôi rất mong muốn. Chỉ là——」"
# monologue
# JP: 姜さんは落ち着いた笑顔のまま、\nごくさりげなくメニューをどける。
1800 = "Cô Khương vẫn giữ nụ cười điềm tĩnh, và vô cùng tự nhiên cất thực đơn đi."
# 【姜】
# display as 姜
# JP: 「聖都局の餐車の料理はたいへん美味しいと評判ですので、\n時間があればご馳走させていただきたくはありました」
1463 = "「Đồ ăn ở toa ăn của Cục Thánh Đô nổi tiếng là rất ngon, nên nếu có thời gian, tôi rất muốn thiết đãi hai vị.」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、テイクアウトをお願いできないかな？\n持ち帰って、折返しの北琴に戻る列車でいただければ」
1618 = "「Vậy, có thể cho chúng tôi mua mang về được không? Chúng tôi sẽ mang theo và ăn trên chuyến tàu quay về Bắc Cầm.」"
# 【姜】
# display as 姜
# JP: 「ああ！　それは素晴らしい考えです。\nでは、持ち運びやすいものを見繕う形でよいですか？」
1183 = "「A! Đó là một ý kiến tuyệt vời. Vậy, chúng tôi sẽ chuẩn bị những món dễ mang theo nhé, được không ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん、そうしてもらえたらとても嬉しい」
1210 = "「Ừm, được vậy thì tôi rất vui.」"
# 【姜】
# display as 姜
# JP: 「でしたら大いに喜んでいただきましょう。\n西瓜？」
1625 = "「Nếu vậy thì chúng tôi sẽ khiến hai vị thật hài lòng. Suika?」"
# monologue
# JP: 姜さんが西瓜に指示すれば、\n西瓜はすぐさま、餐車の厨房へと向かう。
1846 = "Khi cô Khương ra chỉ thị cho Suika, Suika liền lập tức hướng về phía nhà bếp của toa ăn."
# monologue
# JP: （と、いうか――\nおいしいと大評判だというわりには……）
2001 = "(Nhưng mà——\nDù mang tiếng là rất ngon nhưng mà……)"
# monologue
# JP: 餐車の中にはいま、僕たち以外のお客の姿は見当たらない。\n僕の視線に気がついたのか、稀咲も周囲をぐるり見渡す。
1992 = "Bên trong toa ăn lúc này, ngoài chúng tôi ra không hề thấy bóng dáng vị khách nào khác. Có lẽ nhận ra ánh mắt của tôi, Kisaki cũng nhìn quanh một vòng."
# 【稀咲】
# display as 稀咲
# JP: 「それにしてもここは静かだね。客車の方は大賑わいで、\n鉄道に人気がないって、すぐには信じられなかったのに」
1034 = "「Nhưng mà ở đây yên tĩnh thật đấy. Phía toa hành khách thì nhộn nhịp đến mức, tôi không thể tin ngay được là đường sắt lại không được ưa chuộng.」"
# monologue
# JP: 途端、姜さんがいかにも楽しげに微笑する。
1934 = "Ngay lập tức, cô Khương mỉm cười một cách vô cùng thích thú."
# 【姜】
# display as 姜
# JP: 「ふふっ、“すぐには”ですか」
1221 = "「Fufu, 'không thể tin ngay được' sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。普通の客車、寝台客車と歩いていくうち、\nだんだんボクにもわかってきた」
1393 = "「Đúng vậy. Trong lúc đi dọc theo các toa hành khách thông thường và toa giường nằm, tôi cũng dần hiểu ra rồi.」"
# monologue
# JP: 西瓜がオーダーしてくれたのだろう。\n運ばれてきた烏龍茶で、稀咲は再び口を湿らす。
1951 = "Chắc là do Suika đã gọi món giúp. Kisaki lại thấm giọng bằng ly trà ô long vừa được mang ra."
# 【稀咲】
# display as 稀咲
# JP: 「ご老人と家族連れが多く、若者は極めて少ない。\n特に、デートらしいカップルなどは殆ど見なかった」
1497 = "「Người già và các gia đình đi cùng nhau rất nhiều, còn người trẻ thì cực kỳ ít. Đặc biệt là hầu như không thấy những cặp đôi đi hẹn hò.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 1475 = "「確實」" 
# monologue
# JP: 稀咲の視線が僕に来たゆえ、感じたことを言葉にしていく。
1827 = "Vì ánh mắt của Kisaki hướng về phía tôi, nên tôi liền nói ra những gì mình cảm nhận được."
# 【双鉄】
# display as 雙鐵
# JP: 「旅を楽しむ雰囲気ではなく、移動の手段なのだと感じた。\n特に普通客車内は、何というか、ひどく雑然としていて」
1619 = "「Tôi cảm thấy đây giống như một phương tiện di chuyển hơn là một bầu không khí tận hưởng chuyến đi. Đặc biệt là bên trong toa hành khách thông thường, nói sao nhỉ, vô cùng lộn xộn.」"
# monologue
# JP: ……あの混雑を、果たしてどう表現すればいいのだろうか。\n活気というには湿り気があり、旅情というのもまた違い
713 = "……Sự đông đúc đó, rốt cuộc nên diễn tả thế nào đây. Nói là sôi động thì lại có vẻ hơi ảm đạm, mà nói là không khí du lịch thì cũng không đúng."
# 【稀咲】
# display as 稀咲
# JP: 「日常生活そのものを車内に持ち込んでいるようだった。\nジャージでくつろぐご家庭の居間が、客車に、そのまま」
1289 = "「Cảm giác như họ mang cả cuộc sống thường nhật lên tàu vậy. Phòng khách của một gia đình đang mặc đồ thể thao thư giãn, cứ thế được bê nguyên vào toa hành khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だな。まさしく生活空間だった。\nボックスシートの一席ずつが、私的空間となっていた」
1193 = "「A, đúng vậy. Chính xác là một không gian sinh hoạt. Mỗi một chỗ ngồi trong khoang ghế hộp đều trở thành một không gian riêng tư.」"
# monologue
# JP: だから、旅ではなく移動。\n旅にともなう余所行き感を、少なくとも僕は感じなかった。
1843 = "Vì vậy, đây là di chuyển chứ không phải du lịch. Ít nhất thì tôi không cảm nhận được sự khác biệt của một chuyến đi xa."
# 【稀咲】
# display as 稀咲
# JP: 「この列車が長距離列車だからそうなのかい？\nそれとも、市内の……通勤列車みたいなのも同じ？」
1389 = "「Là do chuyến tàu này là tàu đường dài sao? Hay là những chuyến tàu nội thành…… kiểu như tàu điện ngầm đi làm cũng vậy?」"
# 【姜】
# display as 姜
# JP: 「通勤列車こそ日常ですとも。\nそれは単なる、必要に応じての移動にほかなりません」
1610 = "「Tàu đi làm mới chính là thường nhật đấy. Đó đơn thuần chỉ là sự di chuyển theo nhu cầu mà thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、よく考えたらそれはそうだね」
1197 = "「A, nghĩ kỹ lại thì đúng là vậy nhỉ.」"
# monologue
# JP: 稀咲の同意にうなずき返し、\n姜さんはふと、客車へつながる扉の方へ目を注ぐ。
1794 = "Gật đầu đáp lại sự đồng tình của Kisaki, cô Khương chợt hướng mắt về phía cánh cửa dẫn sang toa hành khách."
# 【姜】
# display as 姜
# JP: 「双鉄先生と稀咲女士は、雑然、生活感、くつろぎなどと\nご表現下さいましたが――それが若者を遠ざけています」
1655 = "「Anh Soutetsu và chị Kisaki đã dùng những từ như lộn xộn, cảm giác sinh hoạt, thư giãn để diễn tả—— nhưng chính điều đó lại khiến giới trẻ xa lánh đường sắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ。若者が好みそうな洗練やおしゃれ、\n先進的な感じなどとは、まさしく対極だった――客車は」
1414 = "「Có lẽ vậy. Sự tinh tế, thời trang hay cảm giác tiên tiến mà giới trẻ yêu thích, quả thực hoàn toàn trái ngược——với toa hành khách.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、たしかに、『客車は』だね」
1196 = "「A, đúng thật, là 'toa hành khách' nhỉ.」"
# monologue
# JP: あわてて付け足した一言を、稀咲は理解し拾ってくれる。
1765 = "Kisaki đã hiểu và nắm bắt được câu nói mà tôi vội vàng nói thêm vào."
# 【稀咲】
# display as 稀咲
# JP: 「この食堂車――[さんしゃ,1]餐車っていったっけ？\nここはいいね。ノスタルジーに満ちた清潔感がある」
1605 = "「Toa ăn này——hình như gọi là toa nhà hàng nhỉ? Ở đây tuyệt thật đấy. Có một sự sạch sẽ tràn ngập nét hoài cổ.」"
# 【姜】
# display as 姜
# JP: 「お褒めいただき光栄です。けれど餐車の清潔感は、\n単純に、利用者数の少なさのためかもしれません」
1359 = "「Rất vinh hạnh khi được chị khen ngợi. Nhưng sự sạch sẽ của toa ăn này, có lẽ đơn giản chỉ là do số lượng người sử dụng quá ít thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1217 = "「Hửm?」"
# monologue
# JP: 姜さんの言葉に意表を突かれる。確かにさっきからずっと、\n餐車の中には僕らだけという状況が続いているが……
1796 = "Tôi hơi bất ngờ trước lời nói của cô Khương. Đúng là từ nãy đến giờ, bên trong toa ăn vẫn chỉ có mỗi chúng tôi, nhưng mà……"
# 【双鉄】
# display as 雙鐵
# JP: 「利用者の少なさとおっしゃいましたが――\nこの貸切状態は、姜さんがお手配くださったのでは」
1313 = "「Cô nói là số lượng người sử dụng ít sao—— Tình trạng bao trọn toa này không phải là do cô Khương đã sắp xếp sao?」"
# 【姜】
# display as 姜
# JP: 「私は1秘書にすぎませんから、\nお手配のためには、事前の準備と手続きが必要です」
1329 = "「Tôi chỉ là một thư ký thôi, để sắp xếp được thì cần phải có sự chuẩn bị và làm thủ tục từ trước.」"
# 【稀咲】
# display as 稀咲
# JP: 「だよね。乗車をお願いして昨日の今日だもの」
1047 = "「Đúng nhỉ. Mới hôm qua chúng tôi nhờ cô sắp xếp lên tàu mà hôm nay đã đi rồi.」"
# monologue
# JP: 少し申し訳無さそうな声と、ごく穏やかな微笑みと。\n一瞬のうちに、無言のやりとりが交わされる。
1912 = "Một giọng nói xen chút áy náy, cùng với một nụ cười vô cùng điềm tĩnh. Trong nháy mắt, một cuộc trao đổi không lời đã diễn ra."
# 【稀咲】
# display as 稀咲
# JP: 「これはだから――特別な手配もなにもない、\nごくごく普通の状態なんだよね？」
1352 = "「Vậy nên chuyện này——không hề có sự sắp xếp đặc biệt nào cả, đây là trạng thái hoàn toàn bình thường phải không?」"
# 【姜】
# display as 姜
# JP: 「西瓜、それで間違いありませんか？」
1553 = "「Suika, điều đó không sai chứ?」"
# 【西瓜】
# display as 西瓜
# JP: 「稀咲女士のご推測のとおりです。現在はちょうどお昼時\nですが、お昼に餐車という贅沢はなかなか見られません」
1434 = "「Đúng như chị Kisaki suy đoán ạ. Hiện tại đang là giờ ăn trưa, nhưng rất hiếm thấy ai dùng bữa trưa xa xỉ tại toa ăn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　贅沢。\nなら、価格帯の問題なのかな？」
1166 = "「Hừm? Xa xỉ sao.\nVậy là do vấn đề về mức giá à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1168 = "「A——」"
# monologue
# JP: つい最近、日々姫が食堂車の研究をしたおり、\nハチロクが聞かせてくれた帝鉄の話をふと思い出す。
1833 = "Gần đây, khi Hibiki đang nghiên cứu về toa ăn, tôi chợt nhớ lại câu chuyện về Đường sắt Hoàng gia mà Hachiroku từng kể."
# 【双鉄】
# display as 雙鐵
# JP: 「帝鉄の衰退期にも同じことが起きたと聞いている。\nつまり、列車利用の日常化と、乗客の食堂車離れだ」
1349 = "「Tôi nghe nói điều tương tự cũng đã xảy ra trong thời kỳ suy thoái của Đường sắt Hoàng gia. Tức là, việc sử dụng tàu hỏa trở nên thường nhật hóa, và hành khách dần quay lưng lại với toa ăn.」"
# 【稀咲】
# display as 稀咲
# JP: 「面白そうな話だね。\nね、姜さん。姜さんももし興味があれば――」
1606 = "「Câu chuyện có vẻ thú vị đấy. Này, cô Khương. Nếu cô Khương cũng có hứng thú thì——」"
# 【姜】
# display as 姜
# JP: 「大きな興味を覚えます。\nぜひともくわしくお聞かせいただけましたら」
1337 = "「Tôi vô cùng hứng thú. Xin anh hãy kể chi tiết cho tôi nghe với.」"
# monologue
# JP: 確かに現状を分析するヒントがあるかもしれん。\nハチロクの話を、できるだけ詳細に思い出そう。
1872 = "Chắc chắn nó có thể là một gợi ý để phân tích hiện trạng. Tôi sẽ cố gắng nhớ lại câu chuyện của Hachiroku một cách chi tiết nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「食堂車……寝台車も同じと聞いたが、\n登場時には、豪華な贅沢品として珍重されたそうだ」
1666 = "「Toa ăn…… nghe nói toa giường nằm cũng vậy, khi mới xuất hiện, chúng được trân trọng như những món đồ xa xỉ đắt tiền.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね。寝台車も食堂車も、ボクには縁が無かった。\nだから、骨董品に対する憧れのようなものは感じるよ」
1325 = "「Chắc là vậy. Cả toa giường nằm lẫn toa ăn, tôi đều chưa có duyên đi thử. Vì thế, tôi có cảm giác như đang khao khát những món đồ cổ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「憧れか。実際そうした存在だったのだろうな。が、その\n――いわば黄金時代は、長くは続かなかったと聞いた」
1322 = "「Khao khát sao. Thực tế chắc hẳn nó đã từng là một sự tồn tại như vậy. Nhưng mà, ——cái gọi là thời kỳ hoàng kim đó, nghe nói đã không kéo dài được lâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「憧れの存在がその輝きを失えば……\nいわゆる陳腐化が待っている？」
1323 = "「Nếu một sự tồn tại đáng mơ ước đánh mất đi ánh hào quang của nó…… thì cái gọi là sự lỗi thời đang chờ đợi phía trước sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。高級品が実用品となっていったそうだ。\nハチロクの言を借りれば、確か……」
1204 = "「Ừm. Nghe nói những món đồ cao cấp đã dần trở thành đồ dùng thiết thực. Mượn lời của Hachiroku thì, hình như là……」"
# monologue
# JP: 思い出した瞬間、頷いている。\nそれはまさしく、今日見たこの列車内と重なるようで。
1740 = "Khoảnh khắc nhớ ra, tôi gật đầu. Điều đó quả thực rất giống với những gì tôi đã thấy bên trong chuyến tàu ngày hôm nay."
# 【双鉄】
# display as 雙鐵
# JP: 「『余所行きの召し物を普段着におろしてしまう』\n『途端に扱いが雑になり、みるみるうちに色褪せる』」
724 = "「'Đem trang phục mặc đi tiệc tùng xuống làm đồ mặc thường ngày' 'Ngay lập tức sẽ bị đối xử thô bạo, và chẳng mấy chốc sẽ phai màu'.」"
# 【西瓜】
# display as 西瓜
# JP: 「ああ！」
1181 = "「A!」"
# monologue
# JP: 思わず、といった感じの西瓜の声。\n恐縮そうに口を塞ぐが、むしろ実感を聞かせてほしい。
1828 = "Giọng nói của Suika cất lên như một phản xạ vô điều kiện. Cô bé ngượng ngùng bịt miệng lại, nhưng tôi lại càng muốn nghe cảm nhận thực tế của cô bé hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「かなり強い同意を受けたように思ったが――\n仲国国鉄の餐車や寝台車も、同じような感じなのか？」
1077 = "「Tôi có cảm giác em rất đồng tình với điều này—— Toa ăn và toa giường nằm của Đường sắt Quốc gia Trọng Quốc cũng giống như vậy sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「まさしくです。導入当初の餐車には正装のお客様達が、\n昼も夜もなく列を為し順番待ちをしていたそうです」
1436 = "「Chính xác là vậy ạ. Nghe nói vào thời điểm mới đưa vào sử dụng, những hành khách mặc âu phục đã xếp hàng chờ đợi cả ngày lẫn đêm ở toa ăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1148 = "「Hô.」"
# 【西瓜】
# display as 西瓜
# JP: 「けれども利用客減少と値下げとを何度か繰り返すうちに、\n普段着でのご利用をされる方の比率がどんどん増して」
1442 = "「Nhưng sau vài lần lượng khách giảm sút và giảm giá, tỷ lệ hành khách mặc đồ thường ngày sử dụng dịch vụ ngày càng tăng lên.」"
# monologue
# JP: 西瓜がぐるりとあたりを見回す。\n――稀咲の言った清潔感が、いまは寂寞と思えてしまう。
1965 = "Suika nhìn quanh một vòng. ——Sự sạch sẽ mà Kisaki nhắc đến, giờ đây lại mang đến cảm giác cô quạnh."
# 【西瓜】
# display as 西瓜
# JP: 「……先生方は、ご覧になられましたでしょうか？\n普通客車、あるいは寝台車での昼食の様子を」
728 = "「……Hai vị đã thấy chưa ạ? Cảnh ăn trưa ở toa hành khách thông thường, hay toa giường nằm ấy.」"
# monologue
# JP: 言われればすぐ思い出す。\n稀咲が僕の袖を引き、見るように促してくれた光景を。
1936 = "Được nhắc đến, tôi nhớ lại ngay. Cảnh tượng mà Kisaki đã kéo tay áo tôi và giục tôi nhìn."
# 【稀咲】
# display as 稀咲
# JP: 「寝台車の方では飴色の、何かの肉を食べてる人がいた。\n驚いたのは客車の方で、カップラーメンを食していたね」
1501 = "「Ở phía toa giường nằm, có người đang ăn một loại thịt gì đó màu nâu nhạt. Điều khiến tôi ngạc nhiên là ở phía toa hành khách, có người đang ăn mì ly.」"
# monologue
# JP: それも、一人ではない。\n複数――というか、かなりの多数だ。
1933 = "Hơn nữa, không chỉ có một người. Mà là nhiều người——hay nói đúng hơn là một số lượng khá lớn."
# 【稀咲】
# display as 稀咲
# JP: 「あれは、魔法瓶かなにかを誰かが持ち込んでるとか？\nあるいは車内販売とかで作って売っている？」
1631 = "「Đó là do ai đó mang theo bình thủy hay thứ gì đó lên tàu sao? Hay là do nhân viên bán hàng trên tàu pha sẵn rồi bán?」"
# 【西瓜】
# display as 西瓜
# JP: 「いえ、先生方は隣駅である[ほてい,1]哺定駅まで一駅間だけの\n往復乗車となりますが、列車自体は長距離夜行なのです」
1031 = "「Dạ không, hai vị chỉ đi khứ hồi một ga đến ga Hotei kế bên, nhưng bản thân chuyến tàu này là tàu đêm đường dài ạ.」"
# monologue
# JP: 職業柄時刻表を見て確認してある。
1743 = "Vì tính chất công việc, tôi đã xem qua bảng giờ tàu để xác nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「北琴西駅を11:28に出て、終着聖都駅には08:56着。\nほぼほぼ一昼夜を走り抜ける列車だったよな」
1105 = "「Xuất phát từ ga Tây Bắc Cầm lúc 11:28, và đến ga cuối Thánh Đô lúc 08:56. Là một chuyến tàu chạy xuyên suốt gần như một ngày một đêm nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい、まさしく双鉄先生のおっしゃられたとおりです。\nですので、車内では水とお湯は無料で自由に使えます」
1401 = "「Vâng, chính xác như lời anh Soutetsu nói ạ. Vì vậy, nước lọc và nước nóng trên tàu được sử dụng miễn phí và tự do.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。なるほど――それでカップラーメンね。\nふーん」
1600 = "「Vậy sao. Ra là thế——Vậy nên mới có mì ly nhỉ.\nHừm.」"
# monologue
# JP: 思考を整理したいのだろう、\n稀咲がぶつぶつつぶやきはじめる。
1838 = "Chắc là muốn sắp xếp lại suy nghĩ, Kisaki bắt đầu lầm bầm."
# 【稀咲】
# display as 稀咲
# JP: 「最初は正装で食堂車だったものが、いまでは普段着で\nカップラーメン。実用品の最たるものになった印象だ」
1411 = "「Ban đầu là mặc âu phục ăn ở toa ăn, còn bây giờ là mặc đồ thường ngày ăn mì ly. Có cảm giác nó đã trở thành thứ đồ dùng thiết thực nhất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「若いカップルの姿が少なかったのもその影響かな。\nデートで乗りたい列車であるとは、正直思えん」
1658 = "「Việc có ít cặp đôi trẻ tuổi chắc cũng là do ảnh hưởng của điều đó nhỉ. Thành thật mà nói, tôi không nghĩ đây là chuyến tàu mà người ta muốn đi khi hẹn hò đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね。エアクラへの切り替えは進んでいずとも、\nガソリン自動車は相当に普及していたはずだし」
1473 = "「Chắc là vậy. Dù việc chuyển đổi sang Aircra chưa tiến triển, nhưng xe hơi chạy bằng xăng chắc hẳn đã khá phổ biến rồi.」"
# monologue
# JP: ちら、と姜さんへ視線を向ければ、\nそのとおりですとの頷きが返される。
1780 = "Tôi liếc nhìn sang cô Khương, và nhận lại một cái gật đầu đồng tình."
# 【稀咲】
# display as 稀咲
# JP: 「この現状のまま、究極的に低コストである移動手段。\nエアクラ自動車が一般に普及できる価格で市販されれば」
1506 = "「Với hiện trạng này, đây là phương tiện di chuyển có chi phí thấp nhất. Nếu xe hơi Aircra được bán ra thị trường với mức giá có thể phổ cập cho đại chúng thì」"
# 【西瓜】
# display as 西瓜
# JP: 「まさしく、今の仲国国鉄が担っている実需が根こそぎ\n奪われるでしょう。西瓜はそれを懸念しています」
1634 = "「Chắc chắn, nhu cầu thực tế mà Đường sắt Quốc gia Trọng Quốc đang đảm nhận hiện nay sẽ bị cướp mất tận gốc rễ. Suika đang rất lo ngại về điều đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「ん……」
1202 = "「Ưm……」"
# monologue
# JP: 稀咲が親指を唇に当てる。\n爪を噛むかと思いきや、気づいたように手を戻す。
1910 = "Kisaki đưa ngón cái lên chạm vào môi. Tôi cứ tưởng em ấy định cắn móng tay, nhưng như chợt nhận ra, em ấy lại bỏ tay xuống."
# 【稀咲】
# display as 稀咲
# JP: 「これだけの混雑率で賑わいだ。恐らく――というか直感\nだけれども、実需を奪われることはないんじゃないかな」
1373 = "「Với mức độ đông đúc và nhộn nhịp thế này. Có lẽ——hay nói đúng hơn là theo trực giác của tôi, nhu cầu thực tế sẽ không bị cướp mất đâu.」"
# 【西瓜】
# display as 西瓜
# JP: 「と、おっしゃいますと？」
1594 = "「Ý, ý chị là sao ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「公共の中に私的空間を展開する、その猥雑さを愛する\nという方々は、エアクラ移動を恐らく好まないだろう」
1236 = "「Việc mở ra một không gian riêng tư ngay giữa chốn công cộng, những người yêu thích sự lộn xộn đó có lẽ sẽ không thích việc di chuyển bằng Aircra đâu.」"
# 【西瓜】
# display as 西瓜
# JP: 「！」
1167 = "「!」"
# monologue
# JP: みるみるうちに西瓜の瞳が丸くなり、\n頬がじわりと紅潮していく。
1957 = "Đôi mắt của Suika nhanh chóng mở to, và đôi má dần dần ửng hồng."
# 【西瓜】
# display as 西瓜
# JP: 「ああ――その視点を、西瓜は全く持っていませんでした。\n人間には……整理整頓よりも猥雑さを好む層も、いる」
1175 = "「A——Suika hoàn toàn không có góc nhìn đó. Con người…… cũng có những tầng lớp thích sự lộn xộn hơn là sự ngăn nắp gọn gàng.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。散らかっている方が落ち着くというタイプだ。\nボクにはナンセンスに思えるが、彼らは実際そうらしい」
1206 = "「Ừm. Là tuýp người cảm thấy bình yên hơn khi mọi thứ bừa bộn. Tôi thì thấy điều đó thật vô lý, nhưng có vẻ thực tế họ lại như vậy.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜のまわりも整理整頓をきっちりする方ばかりです。\nですので、今のご指摘は大いに勉強になります」
1549 = "「Xung quanh Suika cũng toàn là những người rất gọn gàng ngăn nắp. Vì vậy, sự chỉ điểm vừa rồi của chị giúp em học hỏi được rất nhiều ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「その層を手放すことはもったいないし、無意味だ。\nどころか観光需要もプロモーション次第で見込めるかも」
1367 = "「Việc từ bỏ tầng lớp đó thật lãng phí và vô nghĩa. Thậm chí, nhu cầu du lịch cũng có thể được kỳ vọng tùy thuộc vào cách quảng bá.」"
# 【西瓜】
# display as 西瓜
# JP: 「なるほど。他国のそうした層の方々に、\nむしろ猥雑さを宣伝していく感じでしょうか？」
1110 = "「Ra là vậy. Vậy là chúng ta sẽ đi quảng bá sự lộn xộn đó đến những tầng lớp như vậy ở các quốc gia khác sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「それもありかな、と。けれど――」
1599 = "「Tôi nghĩ cách đó cũng được. Nhưng mà——」"
# monologue
# JP: また親指が唇へ。稀咲の興味と思と考が、\nかなり深めに、この問題に入り始めていると感じる。
1895 = "Ngón cái lại đưa lên môi. Tôi cảm thấy sự hứng thú và những suy nghĩ của Kisaki, đang bắt đầu đi sâu vào vấn đề này."
# 【稀咲】
# display as 稀咲
# JP: 「――そうした実需が残っただけでは、ダメだよね。\nそれは結局、現状からのゆるやかな衰退にすぎないし」
720 = "「——Nếu chỉ còn lại nhu cầu thực tế như vậy thì không ổn nhỉ. Rốt cuộc thì đó cũng chỉ là sự suy thoái từ từ so với hiện trạng mà thôi.」"
# 【姜】
# display as 姜
# JP: 「そうですね。\nですので、そこを打開できればと望んでいます」
1474 = "「Đúng vậy. Vì thế, chúng tôi rất mong có thể phá vỡ được bế tắc đó.」"
# monologue
# JP: タイミングの良い姜さんの声。
1803 = "Giọng nói của cô Khương cất lên rất đúng lúc."
# 【姜】
# display as 姜
# JP: 「双鉄先生と稀咲女士には、ぜひそこにつながる案を――\n新事業の枠にこだわらずご教示いただければと願います」
1291 = "「Rất mong anh Soutetsu và chị Kisaki sẽ đưa ra những phương án giải quyết vấn đề này—— xin hãy chỉ giáo cho chúng tôi mà không cần bận tâm đến khuôn khổ của dự án mới.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。未整理だけど、いくつかアイディアを\n思いつけるかもしれないとは感じてる。けど……」
1383 = "「Ừm. Dù chưa được sắp xếp lại, nhưng tôi cảm thấy mình có thể nghĩ ra vài ý tưởng. Nhưng mà……」"
# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1151 = "「Ồ!」"
# monologue
# JP: ようやくの二組目は、４人連れ。がやがやとした賑わいに、\n他人事ながら思わず嬉しくなってしまう。
1993 = "Cuối cùng thì nhóm khách thứ hai cũng xuất hiện, một nhóm 4 người. Bầu không khí nhộn nhịp ồn ào, dù là chuyện của người khác nhưng cũng khiến tôi bất giác vui lây."
# 【姜】
# display as 姜
# JP: 「ふふっ、双鉄先生と稀咲女士が、\n他のお客様の呼び水となってくれたのでしょう」
1224 = "「Fufu, có lẽ anh Soutetsu và chị Kisaki đã trở thành mồi nhử thu hút những vị khách khác đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「いやいや、呼び水はこの香りの方じゃないかな」
1158 = "「Không đâu, mồi nhử chắc là mùi hương này mới đúng.」"
# monologue
# JP: いつの間に、西瓜がテイクアウトを取りにいってる。\nなにか肉まんの類だろうか。確かに実に旨そうな香りだ。
1731 = "Từ lúc nào, Suika đã đi lấy đồ ăn mang về. Có vẻ là một loại bánh bao thịt nào đó. Quả thực là một mùi hương vô cùng hấp dẫn."
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、稀咲女士。\n列車は間もなく、哺定駅に到着します」
1656 = "「Anh Soutetsu, chị Kisaki. Tàu sắp sửa đến ga Hotei rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では下りる準備をしないとな」
1602 = "「Vậy sao, thế thì phải chuẩn bị xuống tàu thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「西瓜君。折返しの列車なんだけど――さっきまでの\n餐車みたいな、ボクたちだけになれるような空間って」
1554 = "「Suika này. Chuyến tàu quay về ấy——có không gian nào giống như toa ăn vừa nãy, nơi chỉ có chúng ta không?」"
# 【西瓜】
# display as 西瓜
# JP: 「確認します――確認しました。折返しの列車の牽引機は\n東富Ⅳ型。西瓜の妹に当るレイルロオドの乗務列車です」
1551 = "「Để em xác nhận ạ——Em đã xác nhận xong. Đầu máy kéo của chuyến tàu quay về là Dongfu loại IV. Đây là chuyến tàu do em gái của Suika phụ trách ạ.」"
# monologue
# JP: にこっと――西瓜の笑みは誇らしげだ。
1950 = "Nhoẻn miệng cười——Nụ cười của Suika đầy vẻ tự hào."
# 【西瓜】
# display as 西瓜
# JP: 「ですので西瓜は必ずや、\n先生方のご期待に沿うことをお約束申し上げます」
1350 = "「Vì vậy, Suika xin hứa chắc chắn sẽ đáp ứng được kỳ vọng của hai vị ạ.」"
# 【姜】
# display as 姜
# JP: 「こちらは折返し用の補機なので、\n北琴西までは西瓜のみが乗務するよういたしました」
1607 = "「Đây là đầu máy phụ dùng để quay về, nên chúng tôi đã sắp xếp để chỉ có Suika phụ trách cho đến ga Tây Bắc Cầm.」"
# 【西瓜】
# display as 西瓜
# JP: 「東富４型の運転台内のみのことでしたら、\n西瓜にも手配のお手伝いが可能ですので」
1100 = "「Nếu chỉ là bên trong buồng lái của Dongfu loại 4, thì Suika cũng có thể giúp sắp xếp được ạ.」"
# monologue
# JP: ……姜さんと西瓜がなにやら説明してくれているが、\n右耳から左耳へと、綺麗に抜けていってしまう。
706 = "……Cô Khương và Suika đang giải thích điều gì đó, nhưng nó cứ lọt từ tai phải sang tai trái tôi một cách sạch sẽ."
# 【稀咲】
# display as 稀咲
# JP: 「すごいね、これは。\n『男の子ってこういうの好きなんでしょ？』って光景だ」
1596 = "「Tuyệt thật đấy, cái này. Đúng là cảnh tượng 'Con trai thích mấy thứ như thế này phải không?' luôn.」"
# monologue
# JP: 西瓜が乗車させてくれた東富４型の運転台と、\nはしゃぐ稀咲との両方に、目も耳もこころも奪われている。
1961 = "Cả buồng lái của chiếc Dongfu loại 4 mà Suika cho chúng tôi lên, và cả Kisaki đang phấn khích, đều thu hút trọn vẹn ánh mắt, đôi tai và cả trái tim tôi."
# 【稀咲】
# display as 稀咲
# JP: 「けど、こんなのは大人の女性だって好きだよ。\n少なくともボクと――間違いなくポーレット、日々姫も」
1035 = "「Nhưng mà, mấy thứ như thế này phụ nữ trưởng thành cũng thích lắm đấy. Ít nhất là tôi và——chắc chắn cả Paulette và Hibiki cũng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それをいうなら、凪も大喜びするだろう」
1559 = "「Nếu nói thế thì Nagi cũng sẽ vui sướng lắm đây.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、だろうね。といっても彼女はまだまだ少女だし。\n『男の子』に近いところも少なくないように見えるけど」
1145 = "「Fufu, chắc chắn rồi. Dù sao thì cô bé vẫn còn là một thiếu nữ mà. Nhưng có vẻ cũng có không ít điểm giống 'con trai' nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「違いない」
1461 = "「Không sai vào đâu được.」"
# monologue
# JP: しかしまぁ、8620のキャブとのなんという違いだろう。\nまず広い。そして非常に近代的だ。
1757 = "Nhưng mà, sự khác biệt so với buồng lái của 8620 quả là một trời một vực. Đầu tiên là rất rộng. Và vô cùng hiện đại."
# 【双鉄】
# display as 雙鐵
# JP: 「あそこがブレーキ弁だろうな。\n今はハンドルを外しているようだが……動力操作は――」
1637 = "「Đó chắc là van hãm phanh nhỉ. Hiện tại có vẻ như tay cầm đã được tháo ra…… còn thao tác động lực thì——」"
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生。もしご興味があるようでしたら、\n東富４型の運転操作のすべてを、西瓜はお教えします」
1266 = "「Anh Soutetsu. Nếu anh có hứng thú, Suika sẽ hướng dẫn anh toàn bộ thao tác lái của Dongfu loại 4 ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1199 = "「A, không.」"
# monologue
# JP: 無論、大いに興味はある。もし可能なら入れ換え時などに、\n実際の運転もさせてほしいと思ってしまう。が――
1835 = "Tất nhiên là tôi rất có hứng thú. Nếu có thể, tôi thậm chí còn muốn được tự mình lái thử trong lúc dồn toa nữa kìa. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「それはまた、可能であれば別の機会に願いたい。\nいまはなにより、話し合いの時間が必要だろう」
1615 = "「Chuyện đó, nếu có thể thì xin hẹn vào một dịp khác. Bây giờ, hơn hết là chúng ta cần thời gian để bàn bạc.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。往路と同じ時間なら、復路もわずか90分程度しか\n時間を確保できないってことになるんだから」
1287 = "「Đúng vậy. Nếu thời gian bằng với lúc đi, thì lúc về chúng ta cũng chỉ có khoảng 90 phút mà thôi.」"
# 【姜】
# display as 姜
# JP: 「お心遣いに感謝いたします。それで、先程稀咲女士は\n――確か、いくつかアイディアを思いつきそう、と」
1315 = "「Cảm ơn sự chu đáo của hai vị. Vậy, lúc nãy chị Kisaki ——hình như có nói là có thể nghĩ ra vài ý tưởng.」"
# 【稀咲】
# display as 稀咲
# JP: 「その前に論点を少し整頓したいかな。\n人気を持ち上げたいターゲットは、若者層で大丈夫かな」
1239 = "「Trước đó, tôi muốn sắp xếp lại các luận điểm một chút. Mục tiêu mà chúng ta muốn nâng cao mức độ yêu thích là giới trẻ, đúng không?」"
# 【姜】
# display as 姜
# JP: 「はい。さきほどお二方が不在をご指摘くださった、\n『デート中のカップル』などを引き付けられればと」
1399 = "「Vâng. Nếu có thể thu hút được 'những cặp đôi đang hẹn hò' mà hai vị vừa chỉ ra là không có mặt lúc nãy thì tốt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今の持ち味であるあの雑然感、実需はそのまま維持し。\nその上で別途、新ターゲット層を引きつける施策を行う」
1491 = "「Vẫn duy trì cảm giác lộn xộn vốn là đặc trưng hiện tại, cũng như nhu cầu thực tế. Trên cơ sở đó, thực hiện riêng các biện pháp thu hút tầng lớp mục tiêu mới.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクもその線がいいと思う。だからまず仲国の若い\nカップル層の多数が、どのような嗜好かを知りたいな」
1332 = "「Tôi cũng nghĩ hướng đó là tốt nhất. Vì vậy, trước tiên tôi muốn biết đại đa số các cặp đôi trẻ ở Trọng Quốc có sở thích như thế nào.」"
# 【姜】
# display as 姜
# JP: 「とのことですが、どうですか？　西瓜」
1053 = "「Hai vị ấy hỏi vậy, ý em thế nào? Suika.」"
# 【西瓜】
# display as 西瓜
# JP: 「ぁっ」
1180 = "「A.」"
# monologue
# JP: 少し照れたような反応。稀咲も、ん？　と反応する。\nどうやら西瓜は、レイルロオドでありながら――
1959 = "Một phản ứng có chút ngượng ngùng. Kisaki cũng phản ứng lại 'Hửm?'. Có vẻ như Suika, dù là một Railord nhưng——"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は決して詳しいわけではありませんが、\n西瓜の観測範囲では、その……」
1532 = "「Suika tuyệt đối không rành về chuyện này đâu ạ, nhưng trong phạm vi quan sát của Suika thì, cái đó……」"
# monologue
# JP: 今までの冷静かつハツラツとした感じが一転、もじもじだ。\nならば西瓜は恐らくは『カップルの当事者』なのだろう。
1774 = "Vẻ điềm tĩnh và hoạt bát từ nãy đến giờ bỗng chốc thay đổi, cô bé trở nên bẽn lẽn. Nếu vậy thì có lẽ Suika chính là 'người trong cuộc của một cặp đôi' rồi."
# 【西瓜】
# display as 西瓜
# JP: 「先程双鉄先生がおっしゃられた感じで間違いないかと。\n『洗練、おしゃれ、先進的』等は、人気を博しそうです」
1327 = "「Em nghĩ là đúng như những gì anh Soutetsu vừa nói lúc nãy ạ. 'Tinh tế, thời trang, tiên tiến' v.v., có vẻ sẽ rất được yêu thích.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん」
1248 = "「Hừm.」"
# monologue
# JP: 稀咲のふぅん、はっきり楽しげな色を帯びてる。\n――朴念仁とされる僕でも気づくほどだ。間違いなかろう。
1923 = "Tiếng 'Hừm' của Kisaki mang rõ sắc thái thích thú. ——Đến mức một kẻ bị coi là khúc gỗ như tôi cũng nhận ra. Chắc chắn không sai được."
# 【稀咲】
# display as 稀咲
# JP: 「なら、ボクも西瓜君に質問させてほしい。\n例えば日々姫……ああ、日々姫のことは」
1644 = "「Vậy, tôi cũng muốn hỏi Suika một câu. Ví dụ như Hibiki…… à, về Hibiki thì」"
# 【西瓜】
# display as 西瓜
# JP: 「もちろん存じ上げています。日ノ本を代表しつつある、\n新進気鋭の、天才とも称される車輌デザイナーさんです」
1545 = "「Tất nhiên là em biết ạ. Một nhà thiết kế toa xe trẻ tuổi đầy triển vọng, đang dần đại diện cho Hinomoto, thậm chí còn được gọi là thiên tài.」"
# 【稀咲】
# display as 稀咲
# JP: 「その日々姫に、ターゲット層の好みに刺さる観光列車を\nデザインしてもらうとして──効果ありそう？」
1082 = "「Giả sử nhờ Hibiki thiết kế một chuyến tàu du lịch đánh trúng sở thích của tầng lớp mục tiêu── liệu có hiệu quả không?」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の意見でよければ、もちろんです。ですが、\n西瓜はそもそも『鉄道に大いに興味がある』層ですので」
1261 = "「Nếu là ý kiến của Suika thì tất nhiên là có ạ. Nhưng mà, vốn dĩ Suika thuộc tầng lớp 'rất có hứng thú với đường sắt' nên」"
# 【稀咲】
# display as 稀咲
# JP: 「そっか。鉄道にまったく興味がない層が、そもそも\n鉄道関連の情報に興味を抱いてくれるかは予測できない」
1049 = "「Ra là vậy. Những người hoàn toàn không có hứng thú với đường sắt, vốn dĩ không thể đoán trước được liệu họ có quan tâm đến các thông tin liên quan đến đường sắt hay không.」"
# 【西瓜】
# display as 西瓜
# JP: 「お役に立てずすみませんが、ご指摘のとおりです。\n西瓜の周辺も、みな鉄道関係者で」
1281 = "「Xin lỗi vì không giúp được gì, nhưng đúng như chị nói ạ. Xung quanh Suika cũng toàn là những người làm trong ngành đường sắt.」"
# 【稀咲】
# display as 稀咲
# JP: 「周辺ね。なるほど、了解」
1079 = "「Xung quanh nhỉ. Ra là vậy, đã rõ.」"
# monologue
# JP: 言って稀咲は僕を見る。
1916 = "Nói rồi, Kisaki nhìn tôi."
# 【稀咲】
# display as 稀咲
# JP: 「過去のボクなら、どんなに綺麗な列車がデザインされた\nとしても、乗りたいとは思わなかったかな。双鉄は？」
1258 = "「Nếu là tôi của quá khứ, dù có thiết kế ra một chuyến tàu đẹp đến đâu, chắc tôi cũng không muốn đi đâu. Còn anh Soutetsu thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今の僕が、新造の素晴らしいデザインの客船の情報に\n触れたときと同様だろう。仮に興味をひかれたとしても」
1058 = "「Chắc cũng giống như tôi hiện tại, khi tiếp xúc với thông tin về một chiếc tàu khách mới đóng có thiết kế tuyệt vời thôi. Giả sử có bị thu hút đi chăng nữa」"
# 【稀咲】
# display as 稀咲
# JP: 「わざわざ乗りに行こうという強い動機にまではならない。\nだよね、うん。分野への興味がないってそういうことだ」
1565 = "「Thì cũng không đến mức tạo thành một động lực mạnh mẽ để cất công đi thử. Đúng nhỉ, ừm. Không có hứng thú với lĩnh vực đó là như vậy đấy.」"
# 【姜】
# display as 姜
# JP: 「つまり、もう一段階前の施策が必要となりますか。\n『鉄道という分野そのもの』へ目を向けてもらうための」
1044 = "「Tức là, cần phải có một biện pháp đi trước một bước nữa sao. Để khiến họ chú ý đến 'chính lĩnh vực đường sắt'.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。さて……そうなるとなかなか難しい。\nターゲットが広く浅いだけに、選択肢も絞り込みづらい」
1438 = "「Đúng vậy. Chà…… nếu vậy thì khá là khó đấy. Mục tiêu càng rộng và nông, thì càng khó thu hẹp các lựa chọn.」"
# monologue
# JP: 親指を唇にあて、稀咲が考えこんでしまう。\nであらば僕も思いつくまま尋ねてみよう。
1902 = "Kisaki đặt ngón cái lên môi và chìm vào suy tư. Nếu vậy, tôi cũng sẽ hỏi những gì mình vừa nghĩ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「仲国の若者層の主たるニュースソースはどのあたりだ？\nネット、新聞、TVなどいろいろあるかとは思うが」
1073 = "「Nguồn tin tức chính của giới trẻ Trọng Quốc là ở đâu? Tôi nghĩ có rất nhiều nguồn như mạng internet, báo chí, TV v.v.」"
# 【西瓜】
# display as 西瓜
# JP: 「志か――んんっ、西瓜のよく知る若者でしたら。\nネットのニュースサイトを一番頻繁にみているようです」
1307 = "「Chi——Ưm, nếu là người trẻ mà Suika biết rõ. Thì có vẻ họ thường xuyên xem các trang tin tức trên mạng nhất ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ニュースサイトか」
1405 = "「Ra là vậy, trang tin tức sao.」"
# 【西瓜】
# display as 西瓜
# JP: 「その他にショートメッセージをやりとりするアプリでの、\n人づての情報なども、頻繁に受け取っているようです」
1653 = "「Ngoài ra, thông qua các ứng dụng nhắn tin ngắn, họ cũng thường xuyên nhận được thông tin truyền miệng từ người khác ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本でいうDINEのようなものか。\nなるほど、その辺は日ノ本の若者と差異がないのだな」
1663 = "「Giống như DINE ở Hinomoto sao. Ra là vậy, về mặt đó thì không có sự khác biệt so với giới trẻ Hinomoto nhỉ.」"
# 【姜】
# display as 姜
# JP: 「DINEに相当するのはOurChatというサービスですね。\nその他、QwQというグループチャットも盛んです」
1075 = "「Dịch vụ tương đương với DINE là OurChat. Ngoài ra, ứng dụng trò chuyện nhóm QwQ cũng rất phổ biến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「個人間での情報のやりとりが盛んなのか。\nそこに上手くささるような広告ができればいいのだが」
1042 = "「Việc trao đổi thông tin giữa các cá nhân diễn ra sôi nổi sao. Nếu có thể tạo ra những quảng cáo đánh trúng vào đó thì tốt biết mấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「口コミを意図的に作ろうとするのは難しいよね。\n日ノ本だとすぐ、ステマステマと騒がれてしまう」
1557 = "「Việc cố tình tạo ra hiệu ứng truyền miệng rất khó nhỉ. Ở Hinomoto là sẽ bị làm ầm lên là 'stealth marketing' ngay.」"
# 【姜】
# display as 姜
# JP: 「すてま、ですか？」
1481 = "「'Stealth marketing' là gì vậy?」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。Stealth Marketing」
1566 = "「Đúng vậy. Stealth Marketing.」"
# 【姜】
# display as 姜
# JP: 「理解しました。それは確かに悪手ですね。\n仲国でも、露見すれば反発されることは必至です」
1346 = "「Tôi hiểu rồi. Đó quả thực là một nước đi tồi. Ở Trọng Quốc cũng vậy, nếu bị lộ chắc chắn sẽ vấp phải sự phản đối gay gắt.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ……ちょっと混乱してきた。整理しよう」
1179 = "「A…… tôi bắt đầu thấy hơi rối rồi. Sắp xếp lại nào.」"
# monologue
# JP: 言いつつ、稀咲は指を一本立ててみせる。
1926 = "Vừa nói, Kisaki vừa giơ một ngón tay lên."
# 【稀咲】
# display as 稀咲
# JP: 「大目標は、鉄道の復権。具体的には乗客数を増やす。\n増やしたい乗客の主体となるのは、若者層」
1247 = "「Mục tiêu lớn là khôi phục lại vị thế của đường sắt. Cụ thể là tăng số lượng hành khách. Đối tượng hành khách chính muốn tăng thêm là giới trẻ.」"
# 【姜】
# display as 姜
# JP: 「はい、間違いありません」
1211 = "「Vâng, không sai ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「魅力ある列車を作ることは、鉄道に興味ある層に有効。\nけれどそもそも若者層の殆どは鉄道に興味を持ってない」
1564 = "「Việc tạo ra những chuyến tàu hấp dẫn có hiệu quả với những người có hứng thú với đường sắt. Nhưng vốn dĩ hầu hết giới trẻ đều không có hứng thú với đường sắt.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜はそのように認識しています」
1544 = "「Suika cũng nhận thức được như vậy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ＯＫ。ならどうやって興味を抱かせるか」
1685 = "「OK. Vậy làm thế nào để khiến họ cảm thấy hứng thú.」"
# monologue
# JP: 二本目の指が立てられる。
1918 = "Ngón tay thứ hai được giơ lên."
# 【稀咲】
# display as 稀咲
# JP: 「若者層の主たるニュースソースはニュースサイト、\nSNS、グループチャット。ステマは仲国でも反感を買う」
1294 = "「Nguồn tin tức chính của giới trẻ là các trang tin tức, SNS, trò chuyện nhóm. Stealth marketing ở Trọng Quốc cũng gây phản cảm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「若者層にPRする最適な手法は、ネットやスマホ経由で、\n鉄道の魅力を発信していく――ということになるか」
1453 = "「Phương pháp PR tối ưu nhất cho giới trẻ là thông qua internet và điện thoại thông minh, để truyền tải sức hấp dẫn của đường sắt——có phải vậy không?」"
# 【稀咲】
# display as 稀咲
# JP: 「そのとおりだとボクも感じる。\nとなるとようやく、具体的な内容の検討に進めるね」
1331 = "「Tôi cũng cảm thấy đúng là như vậy. Thế thì cuối cùng chúng ta cũng có thể tiến tới việc xem xét nội dung cụ thể rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1138 = "「Ưm.」"
# monologue
# JP: 減速している。\nもしやと思い時計を見れば――
1744 = "Tàu đang giảm tốc độ. Nghĩ đến một khả năng, tôi nhìn đồng hồ thì——"
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、稀咲女士。\n残念ですが、列車は間もなく北琴西駅に到着します」
1657 = "「Anh Soutetsu, chị Kisaki. Thật đáng tiếc, nhưng tàu sắp đến ga Tây Bắc Cầm rồi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「もうか！\n90分なんてディスカッションしてるとあっという間だね」
1597 = "「Đã đến rồi sao! 90 phút mà cứ thảo luận thì trôi qua nhanh thật đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まことにな。ここで話を打ち切るというのも\nもったいないかとは思うのだが――」
1462 = "「Đúng vậy. Tôi cũng nghĩ nếu dừng câu chuyện ở đây thì thật là đáng tiếc, nhưng mà——」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。西瓜君と姜さんにも、可能なら引続き\nディスカッションに参加して欲しいのだけれど」
1286 = "「Đúng vậy. Nếu có thể, tôi cũng muốn Suika và cô Khương tiếp tục tham gia thảo luận cùng chúng tôi.」"
# 【姜】
# display as 姜
# JP: 「もちろんです！\nお邪魔でなければ、ぜひ参加させてください」
1458 = "「Tất nhiên rồi! Nếu không phiền, xin hãy cho chúng tôi tham gia với.」"
# monologue
# JP: 満面の笑みでの即答だ。
1776 = "Một câu trả lời ngay lập tức cùng với nụ cười rạng rỡ."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の話がご参考になるのでしたら、喜んで。\nお二人のお話に、西瓜はとても刺激を受けています」
1262 = "「Nếu câu chuyện của Suika có thể giúp ích cho hai vị thì em rất sẵn lòng ạ. Suika cũng đang nhận được rất nhiều sự kích thích từ cuộc nói chuyện của hai vị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、であればなによりだ」
1603 = "「Vậy sao, thế thì tốt quá rồi.」"
# 【姜】
# display as 姜
# JP: 「お二人の北琴での歓待は当初予定どおりですので、\n完全個室のレストランを予約手配してあります」
1339 = "「Việc tiếp đón hai vị ở Bắc Cầm vẫn sẽ diễn ra theo đúng kế hoạch ban đầu, chúng tôi đã đặt trước một nhà hàng có phòng riêng hoàn toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは助かります。お手配ありがとうございます」
1636 = "「Thế thì tốt quá. Cảm ơn cô đã sắp xếp.」"
# monologue
# JP: 姜さんの言う『完全個室』の意味ならば、\n“そこでの話は外部に漏れない”――に違いない。
1848 = "Nếu theo đúng ý nghĩa 'phòng riêng hoàn toàn' mà cô Khương nói, thì chắc chắn 'những chuyện nói ở đó sẽ không bị lọt ra ngoài'——"
# 【稀咲】
# display as 稀咲
# JP: 「ボクもそれで――っとと」
1334 = "「Tôi cũng tán thành——á chà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ」
1218 = "「Hửm? A.」"
# monologue
# JP: 稀咲が気にしているのは西瓜から渡された小さな包み。\n先程の餐車からのテイクアウト品だ。
1905 = "Điều khiến Kisaki chú ý là gói đồ nhỏ mà Suika vừa đưa. Đó là đồ ăn mang về từ toa ăn lúc nãy."
# 【稀咲】
# display as 稀咲
# JP: 「姜さんのおすすめだ。絶対おいしいに決まってるから、\nこれも食べたいけど――賞味期限とか夜まで保つかな」
1371 = "「Là món cô Khương gợi ý mà. Chắc chắn là ngon rồi, tôi cũng muốn ăn thử——nhưng không biết có để được đến tối không nhỉ.」"
# 【姜】
# display as 姜
# JP: 「でしたら、これからいくレストランに預けて、\n料理と一緒によい感じにサーブしてもらいましょう」
1621 = "「Nếu vậy, chúng ta cứ gửi ở nhà hàng sắp tới, rồi nhờ họ dọn ra cùng với các món ăn khác cho đẹp mắt nhé.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだね。それがいい」
1215 = "「A, đúng rồi. Như vậy đi.」"
# 【姜】
# display as 姜
# JP: 「では、決まりですね！」
1626 = "「Vậy, quyết định thế nhé!」"
# monologue
# JP: 稀咲も姜さんもにこにこだ。\n西瓜までもが、実に楽しげな顔をしている。
1898 = "Cả Kisaki và cô Khương đều cười rạng rỡ. Đến cả Suika cũng mang một khuôn mặt vô cùng vui vẻ."
# 【西瓜】
# display as 西瓜
# JP: 「間もなく停車をいたします。ホームに降りる時、\n段差になってしまいますのでお気をつけください」
1096 = "「Tàu sắp dừng lại rồi ạ. Khi bước xuống sân ga, sẽ có khoảng cách độ cao nên xin hai vị hãy cẩn thận nhé.」"
# monologue
# JP: そういってから、西瓜はあわてて言葉を継ぎ足す。
1960 = "Nói xong, Suika vội vàng nói thêm."
# 【西瓜】
# display as 西瓜
# JP: 「もちろん、\n双鉄先生は慣れていらっしゃることと思いますが」
1457 = "「Tất nhiên, em nghĩ anh Soutetsu đã quá quen với việc này rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「アドバイスをありがとう。けど、大丈夫だ」
1568 = "「Cảm ơn lời khuyên của em. Nhưng mà, không sao đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、だね」
1146 = "「Fufu, đúng nhỉ.」"
# monologue
# JP: 稀咲と僕と、手を取り合うのは双方からだ。
1900 = "Cả tôi và Kisaki đều chủ động nắm lấy tay nhau."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄が、ボクをエスコートしてくれるから」
1233 = "「Vì đã có anh Soutetsu hộ tống tôi rồi mà.」"
