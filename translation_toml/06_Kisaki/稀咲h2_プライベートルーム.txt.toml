1338 = "「稀咲……可以放鬆一點嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1217 = "「嗯」" 

# monologue
# JP: （ずっ――ずっ――）
1931 = "（吱――吱――）" 

# monologue
