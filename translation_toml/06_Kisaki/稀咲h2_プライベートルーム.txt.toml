# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――っ～～～～～～～っ！！！」
1198 = "「啊～～～～～～～！！！」" 

# monologue
# JP: 声を殺して、稀咲が思い切り弓なりになる。
1754 = "稀咲忍住聲音，人都彎成了弓形。" 

# monologue
# JP: 逸らした足の圧力が消え――\n睾丸を、踏まれてたのかと理解する。
1819 = "腳的壓力也消失了――我才知道她剛才是踩在了睪丸上。" 

# monologue
# JP: （びゅっ！　びゅうっ！　びゅっ！　びゅるんっ！）
1959 = "（噗！　噗！　噗！　噗嚕！）" 

# monologue
# JP: 白濁が、稀咲の黒いソックスを汚す。
