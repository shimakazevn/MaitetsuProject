# JP: オナニーで解れてる筈なのに、こんなに熱く蕩けてるのに、\nまだ二回目のおまんこは、硬さを持って僕を迎える。
1527 = "剛剛都自慰過一波了，已經這樣熱乎發軟了，才有過一次性經驗的小穴，還是緊張地迎接了我的進入。" 

# 【双鉄H】
# display as 雙鐵
