# monologue
# JP: 稀咲のおまんこがぬるぬるすぎてムチムチすぎて、\nどこからどこまで僕のペニスかわからんほどだ。
1763 = "Âm hộ của Kisaki quá trơn ướt và đẫy đà, đến mức tôi chẳng còn phân biệt được đâu là dương vật của mình nữa."
# 【双鉄H】
# display as 雙鐵
