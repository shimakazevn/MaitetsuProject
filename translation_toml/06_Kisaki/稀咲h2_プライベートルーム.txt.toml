1153 = "「呀！？　啊――」" 

# monologue
# JP: （どさっ）
1969 = "（抱起）" 

# monologue
# JP: 稀咲を抱いて畳の上に寝かせれば、\nその白い手は、素早く座布団を引き寄せる。
1617 = "我抱起稀咲，讓她躺在了榻榻米上。她白淨的手馬上就把坐墊拽了過來。" 

# 【稀咲】
# display as 稀咲
# JP: 「あ……んふっ――強引だね、双鉄。\nそれほど、ボクが――」
1190 = "「啊……嗯哼――好強硬啊，雙鐵。就這麼想和我――」" 

# 【双鉄H】
