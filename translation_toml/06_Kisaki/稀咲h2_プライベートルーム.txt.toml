1635 = "手指的動作變快了，聲音也變高了，牆外都能聽到哧溜哧溜的水聲吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「双、鉄……ボク、もうっ――」
1385 = "「雙鐵……我已經――」" 

# monologue
# JP: 一緒に、と、稀咲も願ってくれている。
