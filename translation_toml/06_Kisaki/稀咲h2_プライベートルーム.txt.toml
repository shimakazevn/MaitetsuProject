# 【稀咲】
# display as 稀咲
# JP: 「ん……このままの姿勢で――するんだね」
1212 = "「嗯……是要用這個姿勢――做愛的吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 

