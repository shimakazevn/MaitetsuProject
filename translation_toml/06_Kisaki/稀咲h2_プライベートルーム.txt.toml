1502 = "Vậy mà Kisaki, và cả lớp thịt âm đạo đó, lại phản ứng bằng cách run rẩy một cách ngọt ngào và mãnh liệt."
# 【稀咲】
# display as 稀咲
# JP: 「おしり……はっ――まだっ――準備――んっ――\nちゃんと――出来て――ない、からっ――」
