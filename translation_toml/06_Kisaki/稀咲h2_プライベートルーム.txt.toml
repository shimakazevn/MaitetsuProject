# display as 稀咲
# JP: 「もう一生、ボク……オナニー、しない……よ、きっと。\nだって、だって――こんなセックス――知っちゃったら」
1262 = "「Cả đời này, em...... sẽ không bao giờ, thủ dâm nữa...... đâu, chắc chắn đấy. Bởi vì, bởi vì――đã biết đến, tình dục tuyệt vời thế này――rồi mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 
# monologue
# JP: どれほど会えない時間があろうと、\nオナニーよりも、セックスを、僕も、稀咲も望んでる。
1671 = "Dù cho có khoảng thời gian không thể gặp nhau bao lâu đi chăng nữa, cả tôi và Kisaki đều khao khát tình dục hơn là thủ dâm."
# monologue
# JP: 会えない時間が、重ねる我慢が、\n次のセックスを甘くすることを、知ったから。
1558 = "Bởi vì chúng tôi đã biết rằng, khoảng thời gian xa cách, sự kìm nén chồng chất, sẽ làm cho lần làm tình tiếp theo trở nên ngọt ngào hơn."
# 【稀咲】
# display as 稀咲
# JP: 「だけど――ん？　あれ？　“だから”、かな？」
1113 = "「Nhưng mà――hửm? Ơ? Phải là “Vì vậy” chứ nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。こうして、会えてるときは」
1229 = "「Ừm, đúng vậy. Vì vậy, những lúc được gặp nhau như thế này」"
# monologue
# JP: 雨戸を締めて、窓を閉め、障子を閉めれば、\n稀咲は布団を敷いてごろりと横になってる。
1655 = "Đóng cửa chớp, đóng cửa sổ, rồi khép cửa kéo lại, Kisaki đã trải sẵn đệm và nằm lăn ra đó."
# 【稀咲】
# display as 稀咲
# JP: 「来て、双鉄」
1124 = "「Lại đây, anh Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 
# monologue
# JP: そして、僕らはセックスをする。
1609 = "Và thế là, chúng tôi lại làm tình."
# monologue
# JP: 会えない時間も、稀咲の体温と居られるように。\n僕を注いで、僕と一緒に、居てもらえるよう。
1670 = "Để ngay cả trong những lúc không thể gặp nhau, tôi vẫn có thể ở bên hơi ấm của Kisaki. Để tôi có thể rót cạn bản thân mình, và được ở bên em ấy."
