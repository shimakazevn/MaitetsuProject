1787 = "Với một lực siết rõ ràng là đang cự tuyệt đầu ngón tay tôi, Kisaki thắt chặt lỗ hậu lại."
# monologue
# JP: それに応じて指を離せば、安堵のためか、\nおまんこも少し、ふわふわになる。
1656 = "Tôi chiều ý em ấy mà rút ngón tay ra, có lẽ vì an tâm, nên âm hộ cũng trở nên mềm mại hơn một chút."
# 【稀咲】
# display as 稀咲
# JP: 「だから……ね？　双、鉄――ふっ――\n今は――セックス――んっ……おまんこ、でっ――」
1282 = "「Vậy nên...... nhé? Anh, Soutetsu――fu―― Bây giờ――làm tình――ưm...... bằng âm hộ, thôi――」"
