1660 = "是太有感覺還是喘不上氣呢，稀咲淚眼汪汪。" 

# monologue
# JP: それが愛しくて可愛らしくて、\n膣の最奥、子宮のドアを叩く亀頭にも力がこもる。
1853 = "這樣的她太可愛也太惹人疼愛，敲著小穴最深處子宮門的龜頭也多了幾分力氣。" 

# monologue
# JP: （ぐりっ！　ぐっ！　ごつっ！　ごんっ！）
1991 = "（頂！　頂！　咚！　咚！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ひっ――あっ――っ――ふっ――双――て、つっ――\nんっ――ゆる――してっ――ボクっ――ボク――もうっ」
1166 = "「咿――啊――嗚――雙――鐵――嗯――放過――我吧――我――我――不行了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1194 = "「啊」" 

# monologue
# JP: 僕とてとうに限界だ。
1520 = "其實我也要到極限了。" 

# monologue
# JP: 稀咲のおまんこがぬるぬるすぎてムチムチすぎて、\nどこからどこまで僕のペニスかわからんほどだ。
1763 = "稀咲的小穴那麼黏滑豐滿，我都快捉摸不到自己陰莖的位置了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――んっ！」
1178 = "「唔――嗯！」" 

# monologue
# JP: だから、もう無理に腰を引かない。
1631 = "所以我不再勉強自己往後拔。" 

# monologue
# JP: ただただただただ押し込んで、\n密着させてもさらに押し込む。
1548 = "只是一再向前推，與她緊密結合，絕不分開。" 

# 【稀咲】
# display as 稀咲
# JP: 「んっ――はっ――あっ――双っ――鉄っ――」
1205 = "「嗯――哈――啊――雙――鐵――」" 

# monologue
# JP: （にゅむるっ――にゅるっ――）
1945 = "（哧溜――哧溜――）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん、稀咲――イク、からっ」
1230 = "「嗯，稀咲――我要射了」" 

# monologue
# JP: 稀咲の膣が、蠢いている。わなないている。
1761 = "稀咲的小穴在蠕動，在顫抖。" 

# monologue
# JP: 僕のペニスに張り付き揉み込み絞ってきてる。\nならば、もう――このまま押し込み続けるだけで――っ！
1804 = "緊緊包裹我的陰莖，揉搓並壓緊。那――我只要繼續往前推進――！" 

# monologue
# JP: （ぐううっ！　――――きゅんっ！）
1942 = "（咕！　――――啾！）" 

# 【稀咲】
# display as 稀咲
# JP: 「あっ！」
1196 = "「啊！」" 

# monologue
# JP: 子宮の口が、ここぞと僕に吸いつき絞る！\n腰の奥から精液が、一気に全部引き出されてく！！
1580 = "子宮口就會緊緊將我吸住！將我的精液從腰裡全部給吸出來！！" 

# monologue
# JP: （びゅるるるるうぅぅっ！！！）
1955 = "（噗嚕！！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ひゅあっ――っ――～～～～～～～っ！！！」
1168 = "「咿啊――～～～～～～～！！！」" 

# monologue
# JP: （きゅうううううんっ！）
1960 = "（噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――ぁっ――」
# 1182 = "「啊――」" 

# monologue
# JP: （どびゅっ！　びゅるっ！　どびゅるっ！　びゅうっ！）
1944 = "（咚噗！　噗嚕！　噗嚕！　噗！）" 

# monologue
# JP: 動きを殺し、声を殺して至った射精に、\n全ての毛穴がぶわりと開く！
1479 = "不敢活動也不敢出聲下，這一炮讓我渾身都激靈了起來！" 

# 【稀咲】
# display as 稀咲
# JP: 「ふっ――っ――つ――ん～～～～～っ！！」
1201 = "「嗚――嗯――嗯～～～～～！！」" 

# monologue
# JP: （びゅっ！　びゅう！　びゅううっ！　びゅるんっ！）
# 1959 = "（噗！　噗！　噗！　噗嚕！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぃ――――ぁっ――――」
1163 = "「咿――啊――」" 

# monologue
# JP: 動かない分、良くわかる。
1667 = "正因沒有亂動，我才能夠清楚感受到。" 

# monologue
# JP: 稀咲の子宮の入り口は、あえぐようにしてくぱくぱ開き、\n僕の亀頭をわずかに呑んで、密封して精を絞ってくれる。
1750 = "稀咲子宮的入口喘著氣似地一張一合，將我的龜頭稍稍含了進去，吸下了所有的精液。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ……ぁっ――ふっ――あっ――」
1188 = "「啊……啊――嗚――啊――」" 

# monologue
# JP: 完全に包み込まれる感覚。\n安堵。安らぎ――そんな言葉では足りない感覚。
1663 = "有種被懷抱的感覺。安心、平靜――都難以形容的感覺。" 

# monologue
# JP: それにただただ満たされて、\n全ての精を子宮に移して――僕の体は崩れてしまう。
1549 = "只是感覺那麼滿足，所有精子都進了子宮――我的身體都要壞掉了。" 

# monologue
# JP: （どさっ）
1947 = "（唰啦）" 

# 【稀咲】
# display as 稀咲
# JP: 「あっ――」
# 1182 = "「啊――」" 

# monologue
# JP: 繋がったまま、稀咲がのそのそ身をよじる。\n応じて僕も、残った力をなんとかしぼり――
1610 = "我們還連在一起，稀咲就蜷起了身體。於是我也用上剩下的最後一絲力氣――" 

# 【稀咲】
# display as 稀咲
# JP: 「ちゅっ――ちゅうっ――ちゅっ――むちゅっ――」
1199 = "「啾――啾――啾――唔啾――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……」
# 1210 = "「嗯……」" 

# monologue
# JP: キスを交わして、おでことおでこをくっつけあって。\nそうしてペニスを引き抜いて、稀咲の横へと寝転がる。
1552 = "吻在一起，額頭對額頭貼在一起。然後拔出陰莖，躺在稀咲的身邊。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……せっかく教えてもらったことだが」
932 = "「……這是你教會我的寶貴知識」" 

# 【稀咲】
# display as 稀咲
# JP: 「……は……あ…………ん。\nうん――うん。ボクも――だ――双鉄」
922 = "「……哈……啊…………嗯。嗯――嗯，我也――是――雙鐵」" 

# monologue
# JP: ただ、それだけで通じ合う。
1537 = "即便話都說不完整，我們也能互相溝通。" 

# 【稀咲】
# display as 稀咲
# JP: 「もう一生、ボク……オナニー、しない……よ、きっと。\nだって、だって――こんなセックス――知っちゃったら」
1262 = "「我一輩子……都不會再自慰……了。因為、因為――我知道有――這麼美妙的性愛了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 

# monologue
# JP: どれほど会えない時間があろうと、\nオナニーよりも、セックスを、僕も、稀咲も望んでる。
1671 = "無論有多少時間不能碰面，我和稀咲都會將期待放在下一次做愛上。" 

# monologue
# JP: 会えない時間が、重ねる我慢が、\n次のセックスを甘くすることを、知ったから。
1558 = "因為碰不上面的時間、付出的忍耐，都會讓下一次性愛更加甜蜜。" 

# 【稀咲】
# display as 稀咲
# JP: 「だけど――ん？　あれ？　“だから”、かな？」
1113 = "「但是――嗯？　奇怪，應該是“所以”吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。こうして、会えてるときは」
1229 = "「嗯，是啊。所以能碰上面的時候呢」" 

# monologue
# JP: 雨戸を締めて、窓を閉め、障子を閉めれば、\n稀咲は布団を敷いてごろりと横になってる。
1655 = "放下防雨棚，關上窗，推上門。稀咲鋪好墊子，躺了上去。" 

# 【稀咲】
# display as 稀咲
# JP: 「来て、双鉄」
1124 = "「來吧，雙鐵」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 

# monologue
# JP: そして、僕らはセックスをする。
1609 = "我們又開始做愛了。" 

# monologue
# JP: 会えない時間も、稀咲の体温と居られるように。\n僕を注いで、僕と一緒に、居てもらえるよう。
1670 = "為了她碰不上面的時候也能感受到我的溫存。將我的一切射進她的體內，讓我的溫暖能永遠陪伴她。" 
