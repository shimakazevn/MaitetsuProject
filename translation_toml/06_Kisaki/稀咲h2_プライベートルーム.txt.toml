[script]
# lines: 342 
# 【稀咲】
# display as 稀咲
# JP: 「うん。\n見せてくれてありがとう。これで十分満足だ」
1215 = "「Ừm. Cảm ơn anh đã cho em xem. Thế này là em mãn nguyện lắm rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1369 = "「Vậy sao」"
# monologue
# JP: 稀咲のスッキリした顔に、\n僕まで嬉しい気持ちになる。
1756 = "Nhìn khuôn mặt rạng rỡ của Kisaki, khiến tôi cũng cảm thấy vui lây."
# monologue
# JP: 嬉しい気持ちにはなるのだが――
1864 = "Tuy là cảm thấy vui thật đấy――"
# 【双鉄H】
# display as 雙鐵
# JP: 「本当に良かったのか？　休みを合わせられるなど、\nそうそうあることでは無いのに」
1329 = "「Thế này thật sự ổn chứ? Chuyện chúng ta có thể sắp xếp ngày nghỉ cùng nhau, không phải lúc nào cũng có đâu」"
# monologue
# JP: 厳密に言えば、今日の稀咲は休みではない。\n学園行事を速攻で終わらせることで、空き時間を作った。
1556 = "Nói chính xác thì, hôm nay Kisaki không được nghỉ. Cô ấy đã giải quyết các sự kiện ở trường một cách nhanh chóng nhất có thể để tạo ra thời gian rảnh rỗi."
# monologue
# JP: そうまでして整えた、二人で過ごせる時間なら、\nより充実した使い道が、いくらもありそうに感じてしまう。
1676 = "Đã phải cất công sắp xếp thời gian để hai đứa ở bên nhau như vậy, tôi cứ có cảm giác rằng vẫn còn vô số cách khác để tận dụng nó một cách trọn vẹn hơn."
# 【稀咲】
# display as 稀咲
# JP: 「貴重な機会だからこそ、双鉄の部屋をじっくりたっぷり\n見たかったのさ。部屋は、その人の表れだから」
1359 = "「Chính vì là cơ hội quý giá, nên em mới muốn ngắm nghía thật kỹ căn phòng của anh Soutetsu. Bởi vì căn phòng chính là tấm gương phản chiếu con người mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ？　この部屋が僕の表れか？」
1236 = "「Hừm? Căn phòng này phản chiếu con người anh sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。実に、双鉄らしい部屋だ。\nま、お金の使い方からも想像はついていたけれど」
1299 = "「Đúng vậy. Quả thực là một căn phòng rất mang phong cách của anh Soutetsu. Mà, nhìn vào cách anh tiêu tiền thì em cũng đoán được phần nào rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕らしい、とは？」
1275 = "「Mang phong cách của anh, là sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「物をまったく欲しがらない。娯楽に興味を示さない。\n実用品を最小限度――その他には何も必要としない」
1310 = "「Hoàn toàn không có ham muốn vật chất. Không hứng thú với các hình thức giải trí. Chỉ giữ lại những đồ dùng thiết yếu ở mức tối thiểu――ngoài ra không cần thêm bất cứ thứ gì khác」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……言われてみれば――\n確かに、そうした傾向はあるかもしれんな」
933 = "「......Nghe em nói vậy thì―― Có lẽ anh đúng là có khuynh hướng như thế thật」"
# 【稀咲】
# display as 稀咲
# JP: 「傾向どころか、究極的な形じゃないかな？　本も雑誌も\n見当たらないし……テレビを見てる気配さえない」
1176 = "「Đâu chỉ là khuynh hướng, phải nói là hình thái tối thượng luôn rồi ấy chứ? Chẳng thấy sách hay tạp chí đâu cả...... thậm chí còn chẳng có vẻ gì là anh có xem tivi luôn」"
# monologue
# JP: フっ、と、稀咲が息をかければ、\nテレビの上から画面から、埃が散らされ飛んでいく。
1744 = "Phù một tiếng, Kisaki thổi nhẹ, bụi từ trên nóc và màn hình tivi bay lả tả."
# monologue
# JP: ……掃除は欠かさぬタイプなのだが、\nテレビのことは完全に、意識から外れていたらしい。
900 = "......Dù tôi thuộc tuýp người dọn dẹp không sót chỗ nào, nhưng có vẻ như tôi đã hoàn toàn quên mất sự tồn tại của chiếc tivi."
# 【双鉄H】
# display as 雙鐵
# JP: 「テレビなど居間で見ればいい。真闇姉にも言ったのだが、\n『部屋にあったら便利やけん』と、押し付けられてな」
1271 = "「Tivi thì xem ở phòng khách là được rồi. Anh cũng từng nói với chị Mayami như vậy, nhưng chị ấy cứ nằng nặc ép anh nhận với lý do 『Có trong phòng thì sẽ tiện hơn mà』」"
# 【稀咲】
# display as 稀咲
# JP: 「一般的な成人男子には、きっとそうなのさ。\n雑誌も本もテレビ類も、[プライベートルーム,1]私室にあった方がいい」
1304 = "「Đối với một nam thanh niên trưởng thành bình thường thì chắc chắn là vậy rồi. Tạp chí, sách vở hay tivi các loại, có trong phòng riêng vẫn tốt hơn chứ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ？」
1237 = "「Hừm?」"
# monologue
# JP: 考えてみても理由が思い当たらない。
1602 = "Dù có nghĩ thế nào cũng không tìm ra được lý do."
# monologue
# JP: 何故だ――と尋ねかけた瞬間、\n稀咲がスックと立ち上がり、窓のふちへと腰掛ける。
1613 = "Ngay khoảnh khắc tôi định hỏi tại sao―― Kisaki đột nhiên đứng phắt dậy, rồi ngồi lên bậu cửa sổ."
# 【双鉄H】
# display as 雙鐵
# JP: （むっ）
1946 = "（Ưm）"
# monologue
# JP: パンツが、見えてる。\nただそれだけのことなのに、体と心の温度が上がる。
1695 = "Quần lót, lộ ra rồi. Chỉ có thế thôi, vậy mà nhiệt độ cơ thể và tâm trí tôi lại tăng vọt."
# 【双鉄H】
# display as 雙鐵
# JP: （いや……それだけのこと、ではないな）
1925 = "（Không...... không chỉ có thế đâu nhỉ）"
# monologue
# JP: あの奥。おまんこに挿入をした。\n僕と稀咲は、セックスをした。
1516 = "Sâu bên trong đó. Nơi tôi đã đâm vào âm hộ. Tôi và Kisaki, đã làm tình với nhau."
# monologue
# JP: その特別な人のパンツだ。\nただの布切れと、最早思えるわけもない。
1851 = "Đó là chiếc quần lót của một người đặc biệt. Nên tôi không thể nào chỉ xem nó như một mảnh vải bình thường được nữa."
# 【稀咲】
# display as 稀咲
# JP: 「……裏庭にしても、随分と塀が高いよね？」
931 = "「......Dù là sân sau đi chăng nữa, thì bức tường này cũng khá cao nhỉ?」"
# monologue
# JP: 声をかけられ我に返れば、\n窓の外を、稀咲は仔細に眺めてる。
1812 = "Tiếng gọi khiến tôi giật mình tỉnh lại, Kisaki đang chăm chú nhìn ra ngoài cửa sổ."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、やはり酒造――飲み物を作る場所だからな。\n安全管理上、侵入しづらい構造にしてあるのだろう」
1232 = "「À, dù sao đây cũng là xưởng ủ rượu――nơi sản xuất đồ uống mà. Vì lý do an toàn, nên họ thiết kế cấu trúc sao cho khó đột nhập vào ấy mà」"
# 【稀咲】
# display as 稀咲
# JP: 「確かに。入り口付近の見通しもとても良さそうだ。\n誰かが入ってきたならば、作業中の人の目に留まる？」
1291 = "「Đúng vậy. Tầm nhìn khu vực gần lối vào cũng rất tốt. Nếu có ai đi vào, chắc chắn sẽ lọt vào tầm mắt của những người đang làm việc nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。見知らぬ人には、『見学希望の方ですか？』と、\n声をかけるようにも徹底されてる」
1295 = "「Ừm. Mọi người cũng được dặn dò kỹ lưỡng là phải hỏi thăm những người lạ mặt, kiểu như 『Anh/chị muốn tham quan xưởng ạ?』」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、この窓の外を誰かが通ったりはしない？」
1379 = "「Vậy thì, sẽ không có ai đi ngang qua bên ngoài cửa sổ này đâu nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「記憶にあるかぎりは、一度も無い。\n裏庭だし、従業員が通るような場所でもない」
1273 = "「Theo những gì anh nhớ thì chưa từng có ai cả. Đây là sân sau, cũng không phải là nơi nhân viên thường đi lại」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん……」
1210 = "「Hừm......」"
# monologue
# JP: もう一度、慎重そうに窓の外を大きく見渡し――\n稀咲の視線がしっとりと、僕の上へと戻される。
1571 = "Một lần nữa, cô ấy cẩn thận đảo mắt nhìn ra ngoài cửa sổ―― Rồi ánh mắt ướt át của Kisaki từ từ quay lại nhìn tôi."
# 【稀咲】
# display as 稀咲
# JP: 「それなら。\n安心して双鉄に教えてあげられる、かな？」
1374 = "「Nếu vậy thì. Em có thể yên tâm dạy cho anh Soutetsu rồi, nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「教える？　何をだ」
1289 = "「Dạy? Dạy cái gì cơ」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1158 = "「Fufu」"
# monologue
# JP: （すっ）
1953 = "（Trượt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1389 = "「!」"
# monologue
# JP: 稀咲の指が、自らの股間へと向かってく。
1770 = "Ngón tay của Kisaki, đang hướng về phía đũng quần của chính mình."
# monologue
# JP: 黒ソックスに引き立てられる、真っ白すぎるパンツの上に、\n細長い指がそうっと、触れる。
1564 = "Trên chiếc quần lót trắng tinh khôi nổi bật nhờ đôi tất đen, những ngón tay thon dài nhẹ nhàng, chạm vào."
# 【稀咲】
# display as 稀咲
# JP: 「さっき――双鉄はここを見てくれてたね。\n息を荒くして……顔も、体も赤くなってた」
1136 = "「Lúc nãy――anh Soutetsu đã nhìn vào đây nhỉ. Hơi thở trở nên gấp gáp...... khuôn mặt, và cả cơ thể đều đỏ ửng lên」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――あ――…………うむ。\n呼吸や顔が変わっていたとは、気付かなかったが」
912 = "「A――ờ――............ ừm. Anh không nhận ra là hơi thở hay nét mặt của mình đã thay đổi đâu」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクは観察してたから。今日の双鉄は、\nパンツを見せたらどんな反応をしてくれるかって」
1268 = "「Bởi vì em đã quan sát anh mà. Rằng hôm nay anh Soutetsu, sẽ phản ứng thế nào nếu em cho anh xem quần lót của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――わざと、見せたのか？」
915 = "「――Em cố tình, cho anh xem sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだよ？　女の子は視線に敏感な生き物だ。\n好きな人が相手なら……特に、ね？」
1294 = "「Đúng vậy đó? Con gái là sinh vật rất nhạy cảm với ánh nhìn mà. Nếu đối phương là người mình thích...... thì lại càng đặc biệt nhạy cảm, đúng không?」"
# monologue
# JP: （すっ――すりっ）
1952 = "（Trượt――xoa xoa）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1181 = "「Ưm」"
# monologue
# JP: 稀咲の指が、パンツの上からおまんこのスジを\n撫でさする。
1775 = "Ngón tay của Kisaki, cách một lớp quần lót, vuốt ve rãnh âm hộ của chính mình."
# monologue
# JP: じわりと、蜜が染みていく――\n薄いパンツのその向こう、稀咲の色がわずかに透ける。
1827 = "Mật ngọt từ từ thấm ra―― Phía bên kia lớp quần lót mỏng manh, sắc màu của Kisaki khẽ ẩn hiện."
# 【稀咲】
# display as 稀咲
# JP: 「偶然に見せちゃうなんて、ほとんど無い、と、思うよ？\n好きな人には……偶然のふりで、わざと見せるんだ」
1279 = "「Hầu như chẳng bao giờ có chuyện vô tình để lộ ra đâu, anh biết không? Đối với người mình thích...... em sẽ giả vờ như vô tình, nhưng thực chất là cố ý cho xem đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そう……なのか」
1368 = "「Ra là...... vậy sao」"
# monologue
# JP: 目が、離せない。
1630 = "Ánh mắt, không thể rời đi."
# monologue
# JP: わざと見せる――と稀咲は言ったが、\nだったら、そうする目的は――
1790 = "Cố ý cho xem――Kisaki đã nói vậy, nếu thế, mục đích của việc đó là――"
# 【双鉄H】
# display as 雙鐵
# JP: 「目を奪い……\n惹きつけるため――か？」
1313 = "「Để thu hút ánh nhìn...... để quyến rũ anh――sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだよ、だから……\n今までもボクは双鉄に、わざとパンツや胸元を見せてた」
1243 = "「Đúng vậy, cho nên...... Từ trước đến nay em cũng đã cố tình để lộ quần lót và vòng ngực cho anh Soutetsu thấy đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだったのか？　気付かなかったが」
1302 = "「Vậy sao? Anh hoàn toàn không nhận ra đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「だから嬉しい。双鉄が今日は気づいてくれて。\nボクを欲しがってくれていて」
1284 = "「Vì thế nên em mới vui. Vì hôm nay anh Soutetsu đã nhận ra. Và khao khát em」"
# monologue
# JP: （ふみっ）
1990 = "（Đạp nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1389 = "「！」" 
# monologue
# JP: 稀咲の足が、ソックスにくるまれた足指が、\nズボンの上から僕の股間をそっと踏む。
1784 = "Bàn chân của Kisaki, những ngón chân được bọc trong đôi tất, nhẹ nhàng giẫm lên đũng quần tôi."
# monologue
# JP: 足の裏だというのに柔らかな肉感が、\nもうガチガチに勃起してると、強調してくる。
1818 = "Dù chỉ là lòng bàn chân nhưng cảm giác mềm mại của da thịt, đã nhấn mạnh rằng tôi đang cương cứng đến cực điểm rồi."
# 【稀咲】
# display as 稀咲
# JP: 「でも、さ、双鉄。ボクたちはお互いに忙しい。\n毎日は、会ってイチャイチャもできないよね？」
1116 = "「Nhưng mà, anh Soutetsu này. Cả hai chúng ta đều bận rộn. Đâu thể ngày nào cũng gặp nhau rồi âu yếm được, đúng không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だな。お互いに、果たさねばならぬ義務があり、\n叶えたいと願う夢もある。毎日は、さすがに無理だ」
1298 = "「Đúng vậy. Cả hai đều có những nghĩa vụ phải hoàn thành, và những ước mơ muốn biến thành hiện thực. Ngày nào cũng gặp thì quả thật là không thể」"
# 【稀咲】
# display as 稀咲
# JP: 「でも、双鉄はセックスを知った。\n性の喜びを覚えたばかりで、きっと、毎日したくなる」
1117 = "「Nhưng mà, anh Soutetsu đã biết đến tình dục rồi. Vừa mới nếm trải niềm vui sướng của tình dục, chắc chắn ngày nào anh cũng sẽ muốn làm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――かもしれん」
909 = "「――Cũng có thể」"
# monologue
# JP: 実際、今とてしたくてしたくてたまらない。\n稀咲の足が止まってるのが、実に焦れったくもどかしい。
1522 = "Thật ra, ngay lúc này đây tôi cũng đang thèm khát đến phát điên lên được. Việc bàn chân của Kisaki dừng lại, quả thực khiến tôi vô cùng nóng lòng và bứt rứt."
# 【稀咲】
# display as 稀咲
# JP: 「だから、双鉄に教えてあげる。一人でも出来るセックス。\nボクのことを想いながらの、オナニーのやり方を」
1286 = "「Vì vậy, em sẽ dạy cho anh Soutetsu. Cách làm tình có thể thực hiện một mình. Cách thủ dâm, trong khi nghĩ về em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「オナニー」
1347 = "「Thủ dâm」"
# monologue
# JP: 知識としては、知っている。\n自分で自分の性器を弄り、射精にいたる方法だ。が――
1628 = "Về mặt kiến thức thì tôi có biết. Đó là phương pháp tự vuốt ve bộ phận sinh dục của mình để đạt đến khoái cảm xuất tinh. Nhưng――"
# 【稀咲】
# display as 稀咲
# JP: 「したこと、ないよね？」
1123 = "「Anh chưa làm, bao giờ đúng không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。今までは」
1227 = "「Ừm. Cho đến bây giờ thì chưa」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、あんまりオナニーされすぎて、\nセックスのとき元気がなくても困るけど」
1160 = "「Fufu, nếu anh thủ dâm nhiều quá, đến lúc làm tình lại không còn sức thì cũng rắc rối lắm đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
# 1237 = "「嗯？」" 
# monologue
# JP: 今、なにか、\n稀咲がつぶやいたような気がしたが――
1612 = "Vừa nãy, hình như Kisaki mới lẩm bẩm gì đó thì phải――"
# 【稀咲】
# display as 稀咲
# JP: 「ううん、なんでも？」
1309 = "「Không, có gì đâu?」"
# monologue
# JP: 稀咲は小さく首を振り――
1792 = "Kisaki khẽ lắc đầu――"
# monologue
# JP: （くっ）
1984 = "（Cọ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1194 = "「A」"
# monologue
# JP: ――ごまかすように足を動かし、\n僕の勃起を、更に焦らして乾かしていく。
895 = "――Cô ấy cử động chân như để lấp liếm, khiến sự cương cứng của tôi càng thêm khô nóng vì thèm khát."
# 【稀咲】
# display as 稀咲
# JP: 「オナニーをするには、まず、ボクを思い出すんだ。\nボクの、エッチな姿をね」
1349 = "「Để thủ dâm, trước tiên, anh phải nhớ đến em. Nhớ đến, dáng vẻ dâm đãng của em ấy」"
# monologue
# JP: （しゅるっ）
1928 = "（Tuột）"
# 【双鉄H】
# display as 雙鐵
# JP: 「エッチな……姿……か」
1351 = "「Dáng vẻ...... dâm đãng...... sao」"
# monologue
# JP: 稀咲は制服の上をまくって、ブラをズラして、\nおっぱいを僕に見せつけてくれる。
1789 = "Kisaki vén áo đồng phục lên, kéo trễ áo lót xuống, và phô bày bộ ngực của mình ra trước mắt tôi."
# monologue
# JP: 僕が普段を過ごす部屋、その開け放した窓の景色に、\n稀咲の――確かに――実にエッチな姿が浮かぶ。
1560 = "Trong căn phòng tôi vẫn thường sinh hoạt, cùng với khung cảnh từ ô cửa sổ mở toang, dáng vẻ của Kisaki――quả thực――vô cùng dâm đãng hiện lên."
# 【稀咲】
# display as 稀咲
# JP: 「ボクを思って興奮したら――\nペニスを、ズボンの外に出してあげるんだ」
1259 = "「Nếu anh cảm thấy hưng phấn khi nghĩ về em―― Thì hãy lôi dương vật ra khỏi quần đi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1217 = "「Ừm」"
# monologue
# JP: （ぶるんっ！）
1979 = "（Bật ra!）"
# monologue
# JP: 僕自身、そうしたくって焦れていた。
1521 = "Bản thân tôi cũng đang bứt rứt muốn làm thế lắm rồi."
# monologue
# JP: ズボンから解放されたペニスは、\n待ちかねていた散歩に出れた犬のごとくに、跳ねて震える。
1863 = "Dương vật vừa được giải phóng khỏi chiếc quần, liền nảy lên rung rẩy như một chú chó háo hức cuối cùng cũng được dắt đi dạo."
# 【稀咲】
# display as 稀咲
# JP: 「そしたら、この間のセックスを思い出す。\nペニスを、手で包んで――しこ、しこ、しこ、って」
1317 = "「Sau đó, anh hãy nhớ lại lần làm tình vừa rồi. Dùng tay bao lấy dương vật――rồi tuốt, tuốt, tuốt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 
# monologue
# JP: あの時は、稀咲の柔らかな指と手だった。\n最高の感触の髪が一緒にまとわりついてた。
1859 = "Lúc đó, là những ngón tay và bàn tay mềm mại của Kisaki. Cùng với mái tóc mang lại cảm giác tuyệt vời nhất quấn quýt lấy."
# monologue
# JP: それに比し、自分のこの手の硬さとゴツさは、\nいかにも無様に思えてしまうが――
1693 = "So với điều đó, sự thô cứng và thô ráp của chính bàn tay mình, quả thực có vẻ hơi vụng về――"
# monologue
# JP: （しこ――しこ――しこ――）
1971 = "（Tuốt――tuốt――tuốt――）"
# 【双鉄H】
# display as 雙鐵
# JP: 「む……」
1179 = "「Ưm......」"
# monologue
# JP: 言われたとおりに手を動かせば、\n確かに――確かに。性的な快感を感じられはする。
1499 = "Di chuyển tay theo đúng như lời em ấy nói, quả thật――quả thật là. Tôi có thể cảm nhận được khoái cảm tình dục."
# 【稀咲】
# display as 稀咲
# JP: 「あ……すごい……双鉄――双鉄が、\nボクで、オナニー……ん……して、くれて、る……」
1193 = "「A...... tuyệt quá...... anh Soutetsu――anh Soutetsu đang, thủ dâm...... vì em...... ưm...... vì em......」"
# monologue
# JP: （くちゅっ）
1941 = "（Lạch cạch）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1389 = "「！」" 
# monologue
# JP: 稀咲の指が――人差し指と薬指とが――\nパンツの上から、自分のおまんこを広げてる。
1765 = "Ngón tay của Kisaki――ngón trỏ và ngón áp út―― đang vạch mở âm hộ của chính mình qua lớp quần lót."
# monologue
# JP: そうして、余った中指が、\nゆっくり上下し、おまんこの中を撫でさすってる。
1675 = "Và rồi, ngón giữa còn lại, chầm chậm di chuyển lên xuống, vuốt ve bên trong âm hộ."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲……稀咲も、オナニー、するのか」
1341 = "「Kisaki...... Kisaki cũng, thủ dâm, sao」"
# 【稀咲】
# display as 稀咲
# JP: 「そう……だよ……会えない、ときとか、は……んっ、\nボク、も――双鉄を、思って――オナニー、する、よ？」
1325 = "「Đúng...... vậy đó...... những lúc, không gặp được anh, thì...... ưm, Em, cũng――nghĩ về anh Soutetsu――và thủ dâm, đó?」"
# monologue
# JP: （ぐっ）
1961 = "（Kéo）"
# monologue
# JP: 股間の布がズラされる。
1814 = "Lớp vải ở đũng quần bị kéo sang một bên."
# monologue
# JP: 稀咲はおまんこを露出させ、\nそうして再び、さっきと同じ指使いになる。
1795 = "Kisaki phơi bày âm hộ ra, và rồi lại tiếp tục cử động ngón tay giống như lúc nãy."
# 【稀咲】
# display as 稀咲
# JP: 「ここ……ね？　クリトリス」
1251 = "「Ở đây...... nè? Âm vật」"
# monologue
# JP: 中指が、今度は場所を示してくれる。
1485 = "Lần này, ngón giữa chỉ rõ vị trí cho tôi thấy."
# 【稀咲】
# display as 稀咲
# JP: 「これは、いわば女の子のペニスなんだ。\nだから、一番感じるし、強く刺激し過ぎたら痛い」
1367 = "「Cái này, có thể nói là dương vật của con gái đấy. Vì vậy, nó là nơi nhạy cảm nhất, nếu kích thích quá mạnh sẽ bị đau」"
# monologue
# JP: （さすっ――さわっ――）
1982 = "（Vuốt――chạm――）"
# 【稀咲】
# display as 稀咲
# JP: 「んふっ」
1221 = "「Ưm fu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉぉ」
1173 = "「Ồ ồ」"
# monologue
# JP: 本当に、触れるか触れぬかの指使い。\nなのに稀咲の体は、面白いほどにピクピク震える。
1689 = "Một cách dùng ngón tay thực sự rất nhẹ nhàng, như chạm mà như không chạm. Thế nhưng cơ thể Kisaki lại run lên bần bật một cách thú vị."
# 【双鉄H】
# display as 雙鐵
# JP: 「それほどデリケートに扱うものなのか」
1137 = "「Phải xử lý một cách tinh tế đến mức đó sao」"
# 【稀咲】
# display as 稀咲
# JP: 「そう……だよ？　んっ――ペニスと、同じ……感覚を、\nこの、小ささに……ぎゅって……凝縮、してる、から」
1371 = "「Đúng...... vậy đó? Ưm――Vì cảm giác...... giống hệt như dương vật, đã được cô đọng...... ép chặt...... vào một chỗ nhỏ xíu, thế này, mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
# 1389 = "「！」" 
# monologue
# JP: 言われて、背筋がゾっとする。
1626 = "Nghe em ấy nói vậy, sống lưng tôi bất chợt rùng mình."
# monologue
# JP: 体積比で、百倍以上の凝縮度合いになるのだろうか？\nそれほど敏感であるものであるなら――
1644 = "Xét theo tỷ lệ thể tích, mức độ cô đọng có lẽ phải gấp hơn hàng trăm lần sao? Nếu nó thực sự nhạy cảm đến mức đó――"
# 【双鉄H】
# display as 雙鐵
# JP: 「強くなど、とても扱えないな」
1378 = "「Vậy thì không thể xử lý mạnh bạo được rồi」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、なんだ――だか、ら……んっ――ふあっ――\n特に……先っぽ――は――ねっ？　――ん――ちゅぷっ」
1250 = "「Đúng, là vậy đó――Cho, nên...... ưm――fua―― Đặc biệt là...... phần đỉnh――đó――nha? ――Ưm――chu pu」"
# monologue
# JP: 稀咲は濡れた指先を、唇に咥えさらに唾液で湿らせて――
1746 = "Kisaki ngậm đầu ngón tay ướt át vào môi, làm ẩm nó thêm bằng nước bọt――"
# monologue
# JP: （むきっ）
1926 = "（Lột nhẹ）"
# 【稀咲】
# display as 稀咲
# JP: 「んふっ――あっ――」
1220 = "「Ưm fu――a――」"
# monologue
# JP: 半分かぶってた皮を剥き、\nそうっとかすかに柔かに、肉の真珠を刺激していく。
1528 = "Lột đi lớp da đang che phủ một nửa, nhẹ nhàng, khẽ khàng và mềm mại kích thích viên ngọc trai bằng thịt ấy."
# 【稀咲】
# display as 稀咲
# JP: 「この……くら――いっ――んっ――優しく……\nしない、と――――んっ――はっ――んっ、ん！」
1130 = "「Phải nhẹ nhàng...... cỡ...... này――ưm――mới...... được, đó――――ưm――ha――ưm, ưm!」"
# monologue
# JP: 荒く、速くなってく呼吸を、\n指先を離すそのことで、稀咲はなんとか落ち着ける。
1642 = "Bằng cách buông đầu ngón tay ra, Kisaki cố gắng làm dịu đi nhịp thở đang ngày một thô bạo và dồn dập."
# monologue
# JP: 稀咲の震える膣からは、\n絶えることなく、新しい蜜が溢れて腿をつたってく。
1797 = "Từ âm đạo đang run rẩy của Kisaki, những dòng mật ngọt mới không ngừng trào ra, chảy dọc xuống đùi."
# 【稀咲】
# display as 稀咲
# JP: 「クリトリスの……下が……おしっこの、穴……\nボクは、ここ――感じるところじゃ……ないみたい、で」
1381 = "「Bên dưới...... âm vật...... là lỗ, tiểu...... Em, thì――hình như không...... cảm nhận được gì, ở đây」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う、む」
1180 = "「Ư, ừm」"
# 【稀咲】
# display as 稀咲
# JP: 「この……おまんこの内側の、肉っぽいとこ――んっ――\n[ちつぜんてい,2]膣前庭、ね？　膣の、前の……あ……お庭」
1316 = "「Chỗ...... phần thịt bên trong âm hộ này――ưm―― là tiền đình âm đạo, nhỉ? Cái sân...... a...... ở phía trước, âm đạo ấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「膣前庭」
1247 = "「Tiền đình âm đạo」"
# 【稀咲】
# display as 稀咲
# JP: 「ボク、ね？　ここは――んっ――感じる、とこ――んっ\n……ふぁ……こうやっ、って……すり、すり――し、て」
1267 = "「Em, ấy hả? Chỗ này――ưm――là nơi, cảm nhận được――ưm ......fua...... chỉ cần làm thế, này...... xoa, xoa――thôi」"
# monologue
# JP: 稀咲の指がスライドし、\n膣前庭を何度も何度も、長いストロークで往復していく。
1773 = "Ngón tay của Kisaki trượt đi, vuốt ve tiền đình âm đạo hết lần này đến lần khác bằng những nhịp dài."
# 【稀咲】
# display as 稀咲
# JP: 「ビラ、ビラの、とこ――んっ――小陰唇……より……\nこっちの、方、が――ずっと、良く……って、それでっ」
1365 = "「So với...... môi bé――ưm――cái chỗ, lật phật, đó...... Thì chỗ, này――thích, hơn...... nhiều...... vậy nên」"
# monologue
# JP: （ちゅるんっ！）
1950 = "（Chu run!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1389 = "「！」" 
# monologue
# JP: ヴァギナ――膣口。
51 = "Vagina――Cửa âm đạo."
# monologue
# JP: おまんこの中でも最重要なその穴に、\n稀咲の指先があっけないように飲まれてしまう。
1591 = "Đầu ngón tay của Kisaki dễ dàng bị nuốt chửng vào cái lỗ quan trọng nhất trong âm hộ."
# 【稀咲】
# display as 稀咲
# JP: 「ヴァギナ、は……双鉄に、開けられる……まで……\nんっ――自分で――イジって――なかった――けどっ」
1246 = "「Vagina, thì...... cho đến khi...... được anh Soutetsu, mở ra...... Ưm――em chưa từng――tự mình――đụng chạm――vào nó――đâu」"
# monologue
# JP: つぷん、つぷんと、稀咲の指が浅くヴァギナを出入りする。
1769 = "Tủm, tủm, ngón tay của Kisaki ra vào âm đạo một cách nông cạn."
# monologue
# JP: 掻かれ泡立つ稀咲の蜜に、ちゅっぷちゅっぷと乱れる音に、\n濃くなっていく女の匂いに――勃起が激しく暴れてしまう。
1653 = "Mật ngọt sủi bọt khi bị khuấy động, âm thanh nhóp nhép rối loạn, mùi hương phụ nữ ngày càng nồng nặc――khiến sự cương cứng của tôi bùng nổ dữ dội."
# 【稀咲】
# display as 稀咲
# JP: 「[バージン,1]処女、失くして――あっ……イジって、みた、ら――\nボク……[なか,1]膣内、も……感じる、みたいで――んっ」
1238 = "「Mất, trinh, rồi――a...... thử, đụng chạm, vào―― Thì em...... bên trong, âm đạo...... hình như, cũng...... cảm nhận được――ưm」"
# monologue
# JP: 指の動きが加速していく。\n膣に呑まれる指もどんどん、長くなってく。
1636 = "Chuyển động của ngón tay ngày càng tăng tốc. Phần ngón tay bị âm đạo nuốt trọn cũng ngày càng sâu hơn."
# 【双鉄H】
# display as 雙鐵
# JP: （なんて……綺麗で――\nなんていやらしい……光景なんだ）
1967 = "（Thật là...... đẹp đẽ―― Một khung cảnh...... thật dâm đãng làm sao）"
# monologue
# JP: 目を完全に奪われている。\nこのまま全部を見届けたいと感じてる。
1584 = "Ánh mắt tôi hoàn toàn bị cướp đi. Tôi cảm thấy muốn chứng kiến tất cả mọi thứ cứ tiếp diễn như thế này."
# monologue
# JP: けれど同時に――稀咲がオナニーでイくことが、\nどうしようもなく寂しい気がして、声を出してる。
1501 = "Nhưng đồng thời――việc Kisaki lên đỉnh bằng cách thủ dâm, lại khiến tôi cảm thấy vô cùng cô đơn, nên tôi đã cất tiếng."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲――イクなら、一緒にイキたい」
1334 = "「Kisaki――Nếu ra, anh muốn ra cùng em」"
# 【稀咲】
# display as 稀咲
# JP: 「うん！　双鉄っ――双鉄、もも――って、え？」
1223 = "「Vâng! Anh Soutetsu――Anh Soutetsu, cũng――ơ, hả?」"
# monologue
# JP: ぴたりと、稀咲の動きが止まる。\nその口が、いかにも不満そうに尖ってしまう。
1759 = "Chuyển động của Kisaki đột ngột dừng lại. Cô ấy bĩu môi, trông có vẻ rất bất mãn."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄……なんでオナニー、止めているのさ」
1384 = "「Anh Soutetsu...... sao anh lại dừng thủ dâm rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「やり方はわかったし。稀咲のことを想えばいつでも、\n間違いなく、一人でイケる手応えはある」
1278 = "「Anh đã biết cách làm rồi. Chỉ cần nghĩ về Kisaki, thì bất cứ lúc nào, chắc chắn anh cũng có thể tự mình ra được」"
# 【稀咲】
# display as 稀咲
# JP: 「へ、へえ？　\nふーん、そうか。そうなんだ」
1172 = "「H-Hả? Hừm, vậy sao. Ra là vậy」"
# monologue
# JP: 尖ってた口がにやにや緩む。
1572 = "Đôi môi đang bĩu ra bỗng chốc mỉm cười."
# monologue
# JP: 理由はいまひとつわからんが、\n機嫌を直してもらえたのなら、続く言葉もなめらかになる。
1606 = "Dù không hiểu lý do cho lắm, nhưng nếu em ấy đã vui vẻ trở lại, thì những lời tiếp theo cũng sẽ dễ nói hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「が、今は二人だ。僕は稀咲をイカせたいし、稀咲に僕を\nイカせて欲しいと思ってる。その方が、オナニーよりも」
1321 = "「Nhưng, hiện tại chúng ta đang ở cùng nhau. Anh muốn làm cho Kisaki ra, và anh cũng muốn Kisaki làm cho anh ra. Như thế, sẽ tốt hơn là thủ dâm」"
# 【稀咲】
# display as 稀咲
# JP: 「確かにね」
1290 = "「Đúng vậy nhỉ」"
# monologue
# JP: （むぎゅっ！）
1965 = "（Kẹp chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――」
1203 = "「Ưm――」"
# monologue
# JP: 稀咲の足が器用に動き、僕の勃起を捕まえる。
1783 = "Bàn chân của Kisaki di chuyển điệu nghệ, tóm gọn lấy sự cương cứng của tôi."
# monologue
# JP: 甲と足裏で挟み込まれて、\nそのままゆるゆる――シゴいてもらえる。
1562 = "Bị kẹp giữa mu bàn chân và lòng bàn chân, cứ thế nhẹ nhàng――cô ấy bắt đầu tuốt cho tôi."
# 【稀咲】
# display as 稀咲
# JP: 「うわ……すごいね――ここまで熱く、\nガチガチになるものなんだ」
1170 = "「Oa...... tuyệt quá――có thể nóng, và cứng ngắc đến mức này luôn đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それは――もちろん。恋する相手のオナニーを見て。\nなのに指一本、触れも、触れられも出来なかったから」
1376 = "「Đó là――tất nhiên rồi. Nhìn người mình yêu thủ dâm. Vậy mà đến một ngón tay cũng không thể chạm vào, hay được chạm vào mà」"
# 【稀咲】
# display as 稀咲
# JP: 「……ボクに触ってほしくって……\nそれで、自分でしこしこするのを我慢してたんだ？」
924 = "「......Vì muốn được em chạm vào...... Nên anh mới nhịn không tự mình tuốt sao?」"
# monologue
# JP: （しゅこんっ！）
1985 = "（Tuốt mạnh!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ……ああっ」
1189 = "「A...... a a」"
# monologue
# JP: 稀咲の足裏はじっとりしてる。\n汗をかいてて、体温も高くなっている。
1782 = "Lòng bàn chân của Kisaki ướt đẫm mồ hôi. Cô ấy đang đổ mồ hôi, và nhiệt độ cơ thể cũng tăng cao."
# monologue
# JP: 見ることだけに焦らされすぎて、ギリギリだった精液は、\nその感触に、今にも弾けそうになる。
1526 = "Bị trêu chọc quá mức chỉ bằng việc nhìn, lượng tinh dịch đã dồn ứ đến giới hạn, trước cảm giác đó, như chực chờ bùng nổ bất cứ lúc nào."
# 【稀咲】
# display as 稀咲
# JP: 「甘えん坊で、正直者だね。双鉄は。\nおちんちん、ここに[い]挿れたいんだよね？」
1386 = "「Anh Soutetsu đúng là, thích làm nũng và thật thà nhỉ. Anh muốn đưa chim vào đây đúng không?」"
# monologue
# JP: （くちっ）
# 1926 = "（剝開）" 
# monologue
# JP: 動きを止めてた稀咲の指が、\nもう一度、その膣内を蠢き始める。
1767 = "Ngón tay của Kisaki đang dừng lại, một lần nữa bắt đầu luồn lách bên trong âm đạo."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、挿れたい。\nその指と、僕のペニスを交換してしまいたいほどだ」
1226 = "「Ừm, anh muốn đưa vào. Đến mức muốn tráo đổi ngón tay đó với dương vật của anh luôn」"
# 【稀咲】
# display as 稀咲
# JP: 「交換はさすがに無理だけど――\nね？　じゃあ、もうちょっとだけ我慢して？」
1244 = "「Đổi thì chắc là không được rồi―― Nè? Vậy thì, anh ráng nhịn thêm chút nữa nhé?」"
# monologue
# JP: （ふみっ――しゅこっ――くりっ――もみゅっ――）
1989 = "（Đạp――tuốt――miết――nắn――）"
# 【双鉄H】
# display as 雙鐵
# JP: 「我慢……我慢――か？」
1257 = "「Nhịn...... nhịn――sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボク……一回、イっとかない――と――んっ――\n双鉄に、今、挿れられ、たら――狂っちゃ――からっ」
1260 = "「Em...... phải ra, một lần――đã――ưm―― Nếu để anh Soutetsu, đưa vào ngay bây giờ, thì――em sẽ phát điên――mất」"
# monologue
# JP: （ちぷっ――ちゅっ――ちゅくっ――ちぷっ）
1948 = "（Chụt――chụt――chụt――chụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「だったらボクもだ。\n一緒にイキたい。イカせてほしい」
1265 = "「Vậy thì anh cũng thế. Anh muốn cùng nhau ra. Hãy làm cho anh ra đi」"
# 【稀咲】
# display as 稀咲
# JP: 「んっ……そっかっ――」
1214 = "「Ưm...... vậy sao――」"
# monologue
# JP: （ぐもにゅっ！）
1980 = "（Bóp chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1390 = "「!!!」"
# monologue
# JP: 稀咲の足指が蠢いて、僕の亀頭を甘く柔らかに捕まえる！
1776 = "Những ngón chân của Kisaki ngọ nguậy, tóm gọn lấy quy đầu của tôi một cách ngọt ngào và mềm mại!"
# monologue
# JP: そうして甲はしこしこと、\n表側から、竿を丹念にシゴきつづける。
1674 = "Và rồi mu bàn chân cứ thế nhịp nhàng, liên tục tuốt dọc theo phần thân từ phía trên một cách tỉ mỉ."
# monologue
# JP: （ふみゅ――しこっ――こしゅっ――もみゅっ）
1972 = "（Nhào――tuốt――cọ――nắn）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅ……ぁ――」
1202 = "「Ư...... a――」"
# 【稀咲】
# display as 稀咲
# JP: 「顔……双鉄……溶けちゃってる……よ？\n……あっ――ふっ――んっ……」
1120 = "「Khuôn mặt...... của anh Soutetsu...... tan chảy ra rồi...... kìa? ......A――fu――ưm......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲、も、だ。\n顔……だけでなく、おまんこも、ひどく……とろとろに」
1119 = "「Cả Kisaki, cũng, vậy thôi. Không chỉ...... khuôn mặt, mà cả âm hộ cũng, ướt sũng...... nhão nhoét rồi」"
# 【稀咲】
# display as 稀咲
# JP: 「言、言わないでっ――欲しい、な――そういう――\nこと――はっ」
1134 = "「Đừng, đừng nói nữa――đừng nói――những chuyện―― như thế――nữa」"
# monologue
# JP: 言葉と裏腹、\n稀咲のおまんこは嬉しげに震えわなないている。
1555 = "Trái ngược với lời nói, âm hộ của Kisaki đang run rẩy đầy sung sướng."
# monologue
# JP: 指の動きも速くなり、\n音はぐじゅぐじゅ、塀の外まで漏れそうな程に高くなる。
1635 = "Chuyển động của ngón tay cũng nhanh hơn, âm thanh nhóp nhép lớn đến mức tưởng chừng như lọt ra ngoài bức tường."
# 【稀咲】
# display as 稀咲
# JP: 「双、鉄……ボク、もうっ――」
1385 = "「Anh, Soutetsu...... em, sắp――」"
# monologue
# JP: 一緒に、と、稀咲も願ってくれている。
1755 = "Kisaki cũng đang mong muốn, được cùng nhau lên đỉnh."
# monologue
# JP: 亀頭をもんでいる足指先に力が入り、\n支えてしごく足の甲との間隔がすぼめられていく。
1651 = "Đầu ngón chân đang xoa nắn quy đầu dùng lực, khoảng cách với mu bàn chân đang nâng đỡ và tuốt cũng dần thu hẹp lại."
# monologue
# JP: （きゅむっ！　しゅこっ！　しゅっ！　きゅうっ！！）
1962 = "（Ép! Tuốt! Tuốt! Ép!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ――キツっ――」
1200 = "「Ư――a――chặt quá――」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄――イって！！　ボク、ボクっ――んっ！」
1382 = "「Anh Soutetsu――ra đi!! Em, em――ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1391 = "「!!?」"
# monologue
# JP: あと少し、もう少しだけ刺激が欲しいところで\nふっと、稀咲の足が下へと落ちて――
1857 = "Chỉ còn một chút nữa thôi, ngay lúc tôi đang muốn thêm một chút kích thích nữa, thì đột nhiên, bàn chân của Kisaki thả lỏng xuống――"
# monologue
# JP: （ふみゅっ！）
1976 = "（Giẫm!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おおおっ！」
1174 = "「Ô ô ô!」"
# monologue
# JP: （びゅっ！　びゅるるっ！　ぶびゅ！　びゅろっ！！）
1957 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ぁっ――っ～～～～～～～っ！！！」
1198 = "「A――っ~~~~~~~!!!」"
# monologue
# JP: 声を殺して、稀咲が思い切り弓なりになる。
1754 = "Kìm nén giọng nói, Kisaki cong người lên như một cây cung."
# monologue
# JP: 逸らした足の圧力が消え――\n睾丸を、踏まれてたのかと理解する。
1819 = "Áp lực từ bàn chân vừa trượt đi biến mất―― Tôi nhận ra, nãy giờ mình đã bị giẫm lên tinh hoàn."
# monologue
# JP: （びゅっ！　びゅうっ！　びゅっ！　びゅるんっ！）
1959 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 白濁が、稀咲の黒いソックスを汚す。
1687 = "Dòng tinh dịch trắng đục, làm bẩn đôi tất đen của Kisaki."
# monologue
# JP: 角度のせいで精液は、パンツにまでは届かない――\nそれが無性に悔しくて、衝動的に体が動く。
1540 = "Vì góc độ mà tinh dịch không thể chạm tới chiếc quần lót―― Điều đó khiến tôi vô cùng ấm ức, cơ thể bốc đồng mà chuyển động."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲っ」
1344 = "「Kisaki」"
# 【稀咲】
# display as 稀咲
# JP: 「きゃっ！？　ひゃっ――」
1153 = "「Kya!? Hya――」"
# monologue
# JP: （どさっ）
1969 = "（Bịch）"
# monologue
# JP: 稀咲を抱いて畳の上に寝かせれば、\nその白い手は、素早く座布団を引き寄せる。
1617 = "Ôm lấy Kisaki và đặt em ấy nằm xuống tấm chiếu tatami, bàn tay trắng trẻo của em ấy nhanh chóng kéo lấy chiếc đệm lót."
# 【稀咲】
# display as 稀咲
# JP: 「あ……んふっ――強引だね、双鉄。\nそれほど、ボクが――」
1190 = "「A...... ưm fu――Anh mạnh bạo quá đấy, anh Soutetsu. Đến mức đó, em đã――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、欲しい。\n稀咲が想像しているよりも、ずっと激しく狂おしく」
1233 = "「Ừm, anh muốn. Mãnh liệt và điên cuồng hơn nhiều so với những gì Kisaki đang tưởng tượng đấy」"
# monologue
# JP: （くぱっ）
1978 = "（Tách）"
# monologue
# JP: 稀咲のおまんこを指で開いて、\n亀頭の先をぐりぐり当てる。
1620 = "Dùng ngón tay vạch mở âm hộ của Kisaki ra, và cọ xát đỉnh quy đầu vào đó."
# 【稀咲】
# display as 稀咲
# JP: 「ん……このままの姿勢で――するんだね」
1212 = "「Ưm...... anh định làm――với tư thế này sao」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1217 = "「嗯」" 
# monologue
# JP: 稀咲が座布団をもぞもぞ動かし、\n畳と肌とか擦れないよう調整をする。
1752 = "Kisaki cựa quậy di chuyển chiếc đệm lót, điều chỉnh để da thịt không bị cọ xát với chiếu tatami."
# monologue
# JP: つまりは、ＯＫということだ。\nだったら僕に、ためらう理由は何もない――が――
1575 = "Tức là, em ấy đã đồng ý. Vậy thì tôi chẳng có lý do gì để chần chừ nữa――nhưng mà――"
# monologue
# JP: （すりっ――すりゅんっ――）
1983 = "（Cọ cọ――trượt――）"
# 【稀咲】
# display as 稀咲
# JP: 「あっ！？　んッ――」
1197 = "「A!? Ưm――」"
# monologue
# JP: 稀咲が、オナニーで触れてた部分。\nクリトリスから膣前庭、感じないといってた小陰唇も。
1852 = "Những bộ phận mà Kisaki đã chạm vào khi thủ dâm. Từ âm vật đến tiền đình âm đạo, và cả môi bé mà em ấy bảo là không có cảm giác."
# monologue
# JP: そこをいちいち、竿で、亀頭で、先走り汁で。\nなぞりなおして、僕のものだと刻印していく。
1680 = "Từng chỗ một, bằng thân dương vật, bằng quy đầu, bằng dịch nhờn rỉ ra. Tôi vuốt ve lại tất cả, như để khắc ghi dấu ấn rằng chúng là của tôi."
# 【稀咲】
# display as 稀咲
# JP: 「や……んっ……双、鉄……焦らしちゃ……\nや、だ――んあっ」
1151 = "「Đừng...... ưm...... anh, Soutetsu...... cứ trêu chọc...... thế này, ghét――lắm á」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――僕だって限界だ」
1207 = "「Ừm――anh cũng đến giới hạn rồi」"
# monologue
# JP: （みちっ――！）
1938 = "（Phập――!）"
# 【稀咲】
# display as 稀咲
# JP: 「あっ――」
1182 = "「A――」"
# monologue
# JP: オナニーで解れてる筈なのに、こんなに熱く蕩けてるのに、\nまだ二回目のおまんこは、硬さを持って僕を迎える。
1527 = "Rõ ràng là đã được thả lỏng nhờ thủ dâm, lại còn nóng hổi ướt át đến thế, vậy mà chiếc âm hộ mới chỉ đón nhận lần thứ hai này, vẫn dùng sự căng cứng để chào đón tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「稀咲……体の力を抜けるか？」
1338 = "「Kisaki...... em thả lỏng cơ thể ra được không?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1217 = "「嗯」" 
# monologue
# JP: （ずっ――ずっ――）
1931 = "（Phập――phập――）"
# monologue
# JP: 稀咲の呼吸のリズムにあわせ、\n髪をゆっくりゆっくり撫ぜて。
1861 = "Hòa nhịp với hơi thở của Kisaki, tôi chầm chậm, chầm chậm vuốt ve mái tóc em ấy."
# monologue
# JP: じわりじわり――と進んでいけば――っ！？
1832 = "Từng chút, từng chút một――tiến sâu vào――!?"
# monologue
# JP: （ずぶんっ！！！）
1940 = "（Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「あんっ！！！」
1195 = "「A ưm!!!」"
# monologue
# JP: ――、一線を、越えるというのはこのことか――\nそう思うほど、そこから先の膣肉は、僕を歓迎してくれる。
899 = "――Vượt qua, ranh giới, là như thế này sao―― Lớp thịt âm đạo bên trong như đang dang rộng vòng tay chào đón tôi, khiến tôi có cảm giác như vậy."
# monologue
# JP: とろっとろっに蕩けてるのに、やっぱり稀咲のおまんこは、\nムチムチとした肉感で、僕を甘やかに押しつぶしてくる。
1803 = "Dù đã ướt sũng và nhão nhoét, nhưng âm hộ của Kisaki, vẫn mang lại cảm giác da thịt đẫy đà, ngọt ngào ép chặt lấy tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――ふっ――」
910 = "「Ưm――fu――」"
# 【稀咲】
# display as 稀咲
# JP: 「あ――ペニ、ス――ふあっ――この、角度……\nだ、と――んっ――」
1186 = "「A――dương, vật――fua――góc độ, này...... thì――ưm――」"
# monologue
# JP: （ぞりゅっ！）
1937 = "（Phập!）"
# monologue
# JP: 亀頭のソリが、いつもの逆側、\n膣内の、お尻の側をごりごりこする。
1800 = "Phần cong của quy đầu, cọ xát mạnh vào phía ngược lại so với bình thường, phía bên trong âm đạo, hướng về phía mông."
# monologue
# JP: 膣肉が、粒だちながらコスってくれる。\n気持ちよくって、そこを何度も前後動する。
1811 = "Lớp thịt âm đạo nổi cộm lên, cọ xát lấy tôi. Cảm giác sướng rơn khiến tôi liên tục di chuyển ra vào ở chỗ đó."
# 【稀咲】
# display as 稀咲
# JP: 「双、鉄――そこっ――いいっ――んっ――」
1383 = "「Anh, Soutetsu――chỗ đó――thích lắm――ưm――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「の、ようだな――」
1240 = "「Có vẻ, là vậy nhỉ――」"
# monologue
# JP: おまんこの中だけでなく、\n可愛いお尻も――お尻の穴までひくひくしてる。
1477 = "Không chỉ bên trong âm hộ, mà cả chiếc mông xinh xắn――đến tận lỗ hậu cũng đang co giật."
# monologue
# JP: そうも可愛く蠢かれると、\n放っておくのも悪い気がして――
1854 = "Bị ngọ nguậy một cách đáng yêu như vậy, tôi cảm thấy nếu bỏ qua thì thật là có lỗi――"
# monologue
# JP: （さすっ）
# 1984 = "（擦）" 
# 【稀咲】
