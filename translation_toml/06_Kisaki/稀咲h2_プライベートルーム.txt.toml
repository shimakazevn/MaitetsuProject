1134 = "「別、別說了――別說了吧――那種――話――」" 

# monologue
# JP: 言葉と裏腹、\n稀咲のおまんこは嬉しげに震えわなないている。
1555 = "嘴上不老實，她的小穴倒是高興地小唇吞吞吐吐起來。" 

# monologue
