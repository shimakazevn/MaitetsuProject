905 = "「Ưm――」"
# monologue
# JP: デリケートな部分と思うから、\nほんのわずかにさすっただけだ。
1684 = "Vì nghĩ đó là bộ phận nhạy cảm, nên tôi chỉ vuốt ve một chút xíu thôi."
# monologue
