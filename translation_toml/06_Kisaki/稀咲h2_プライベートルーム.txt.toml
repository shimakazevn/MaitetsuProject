1233 = "「嗯，非常想。比稀咲的想像中要激烈難以抑制得多」" 

# monologue
# JP: （くぱっ）
1978 = "（揭開）" 

# monologue
# JP: 稀咲のおまんこを指で開いて、\n亀頭の先をぐりぐり当てる。
