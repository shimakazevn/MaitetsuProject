[script]
# lines: 342 
# 【稀咲】
# display as 稀咲
# JP: 「うん。\n見せてくれてありがとう。これで十分満足だ」
1215 = "「嗯。謝謝你肯讓我參觀，我很滿足了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1369 = "「這樣啊」" 

# monologue
# JP: 稀咲のスッキリした顔に、\n僕まで嬉しい気持ちになる。
1756 = "稀咲清爽的面孔，讓我看起來都非常高興。" 

# monologue
# JP: 嬉しい気持ちにはなるのだが――
1864 = "雖然真的非常高興――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「本当に良かったのか？　休みを合わせられるなど、\nそうそうあることでは無いのに」
1329 = "「真的這樣就夠了嗎？　休息日排一起的日子，其實本來就沒多少的」" 

# monologue
# JP: 厳密に言えば、今日の稀咲は休みではない。\n学園行事を速攻で終わらせることで、空き時間を作った。
1556 = "嚴格來說今天稀咲並沒有放假。而是把學校的事風捲殘雲地搞定，才爭取出了閒暇。" 

# monologue
# JP: そうまでして整えた、二人で過ごせる時間なら、\nより充実した使い道が、いくらもありそうに感じてしまう。
1676 = "牙縫裡扒出來的、我們倆能共處的時光，本來應該有更加充實的路可以選擇的。" 

# 【稀咲】
# display as 稀咲
# JP: 「貴重な機会だからこそ、双鉄の部屋をじっくりたっぷり\n見たかったのさ。部屋は、その人の表れだから」
1359 = "「趁著寶貴的機會，我才想仔仔細細看遍你房間的每一個角落啊。房間可以體現出一個人嘛」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ？　この部屋が僕の表れか？」
1236 = "「嗯？　這個房間就是我的體現嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。実に、双鉄らしい部屋だ。\nま、お金の使い方からも想像はついていたけれど」
1299 = "「是啊，真的很有你的風格。雖然從你的開銷上，我已經猜到會是這樣的了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕らしい、とは？」
1275 = "「我的風格是什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「物をまったく欲しがらない。娯楽に興味を示さない。\n実用品を最小限度――その他には何も必要としない」
1310 = "「沒有物慾、沒有娛樂欲。所有用品控制在最小限度――其他就什麼都不需要」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……言われてみれば――\n確かに、そうした傾向はあるかもしれんな」
933 = "「……這麼說來――的確是有這方面的傾向吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「傾向どころか、究極的な形じゃないかな？　本も雑誌も\n見当たらないし……テレビを見てる気配さえない」
1176 = "「哪隻是傾向啊，我看已經是究極的體現了吧？看不到書和雜誌的蹤影……也沒有會看電視的樣子」" 

# monologue
# JP: フっ、と、稀咲が息をかければ、\nテレビの上から画面から、埃が散らされ飛んでいく。
1744 = "稀咲吹了一口氣，電視機的螢幕上就起了一片灰塵。" 

# monologue
# JP: ……掃除は欠かさぬタイプなのだが、\nテレビのことは完全に、意識から外れていたらしい。
900 = "……儘管我是勤打掃的人，但根本就沒注意過電視機的存在。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「テレビなど居間で見ればいい。真闇姉にも言ったのだが、\n『部屋にあったら便利やけん』と、押し付けられてな」
1271 = "「我在起居室看電視就夠了。這話我跟真闇姐說的時候，她非說“房間裡有一台方便”，然後就硬塞給了我」" 

# 【稀咲】
# display as 稀咲
# JP: 「一般的な成人男子には、きっとそうなのさ。\n雑誌も本もテレビ類も、[プライベートルーム,1]私室にあった方がいい」
1304 = "「普通的成人男子都是這樣的啊。雜誌書籍電視，都喜歡擺在自己的房間」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ？」
1237 = "「嗯？」" 

# monologue
# JP: 考えてみても理由が思い当たらない。
1602 = "想不出理由是什麼。" 

# monologue
# JP: 何故だ――と尋ねかけた瞬間、\n稀咲がスックと立ち上がり、窓のふちへと腰掛ける。
1613 = "我就問了一句為什麼――稀咲就站起了身，坐到了窗緣上。" 

# 【双鉄H】
# display as 雙鐵
# JP: （むっ）
1946 = "（唔）" 

# monologue
# JP: パンツが、見えてる。\nただそれだけのことなのに、体と心の温度が上がる。
1695 = "看到內褲了。然後我的身體和心裡就陡然火熱了起來。" 

# 【双鉄H】
# display as 雙鐵
# JP: （いや……それだけのこと、ではないな）
1925 = "（不對……好像不止這麼簡單）" 

# monologue
# JP: あの奥。おまんこに挿入をした。\n僕と稀咲は、セックスをした。
1516 = "內褲的裡面是小穴，我進入過那裡面。我和稀咲做過愛了。" 

# monologue
# JP: その特別な人のパンツだ。\nただの布切れと、最早思えるわけもない。
1851 = "這是一個特別的人的內褲。我已經不會當它只是塊布片了。" 

# 【稀咲】
# display as 稀咲
# JP: 「……裏庭にしても、随分と塀が高いよね？」
931 = "「……這後院的牆還挺高的啊？」" 

# monologue
# JP: 声をかけられ我に返れば、\n窓の外を、稀咲は仔細に眺めてる。
1812 = "聽到她的聲音，我才回過神來。稀咲正認真地望著窗外。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、やはり酒造――飲み物を作る場所だからな。\n安全管理上、侵入しづらい構造にしてあるのだろう」
1232 = "「嗯，這可是製酒廠――製造飲品的地方。那是為了防盜而加高的吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに。入り口付近の見通しもとても良さそうだ。\n誰かが入ってきたならば、作業中の人の目に留まる？」
1291 = "「是啊，入口附近的視野也非常好。只要有人進來，工作人員就能看見吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。見知らぬ人には、『見学希望の方ですか？』と、\n声をかけるようにも徹底されてる」
1295 = "「是啊，如果是不認識的人就會問清楚來由。“您是來參觀的嗎？”這樣」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、この窓の外を誰かが通ったりはしない？」
1379 = "「那麼這扇窗戶外就不會有人經過嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「記憶にあるかぎりは、一度も無い。\n裏庭だし、従業員が通るような場所でもない」
1273 = "「我沒有人走過的印象。後院也不是工作人員會經過的地方」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん……」
1210 = "「嗯……」" 

# monologue
# JP: もう一度、慎重そうに窓の外を大きく見渡し――\n稀咲の視線がしっとりと、僕の上へと戻される。
1571 = "她又慎重地看了看窗外――才將濕潤的視線轉回了我身上。" 

# 【稀咲】
# display as 稀咲
# JP: 「それなら。\n安心して双鉄に教えてあげられる、かな？」
1374 = "「那好吧。我可以放心地教一教雙鐵了吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「教える？　何をだ」
1289 = "「教我？　教什麼啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1158 = "「呵呵」" 

# monologue
# JP: （すっ）
1953 = "（嘶）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1389 = "「！」" 

# monologue
# JP: 稀咲の指が、自らの股間へと向かってく。
1770 = "稀咲的手指滑到了她的股間。" 

# monologue
# JP: 黒ソックスに引き立てられる、真っ白すぎるパンツの上に、\n細長い指がそうっと、触れる。
1564 = "在黑襪的襯托下越來越白淨的內褲。細長的手指圍著內褲圍了個圈。" 

# 【稀咲】
# display as 稀咲
# JP: 「さっき――双鉄はここを見てくれてたね。\n息を荒くして……顔も、体も赤くなってた」
1136 = "「剛剛――雙鐵就在看這個部位吧。呼吸粗重……表情和身體都發紅的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――あ――…………うむ。\n呼吸や顔が変わっていたとは、気付かなかったが」
912 = "「――啊――…………嗯。我都沒注意到自己表情和呼吸的變化」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクは観察してたから。今日の双鉄は、\nパンツを見せたらどんな反応をしてくれるかって」
1268 = "「我在觀察你啊，我想知道今天讓你看到內褲會有什麼反應呢」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――わざと、見せたのか？」
915 = "「――所以你是故意露的嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだよ？　女の子は視線に敏感な生き物だ。\n好きな人が相手なら……特に、ね？」
1294 = "「是啊，女孩子對視線可敏感了。尤其面對的還是喜歡的人……懂了吧？」" 

# monologue
# JP: （すっ――すりっ）
1952 = "（嘶――撫摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1181 = "「唔」" 

# monologue
# JP: 稀咲の指が、パンツの上からおまんこのスジを\n撫でさする。
1775 = "稀咲的手指隔著內褲，揉起了小穴的那道蜜縫。" 

# monologue
# JP: じわりと、蜜が染みていく――\n薄いパンツのその向こう、稀咲の色がわずかに透ける。
1827 = "蜜汁就緩緩滲了出來――我也多少能隔著薄薄的內褲，看到稀咲肌膚的顏色。" 

# 【稀咲】
# display as 稀咲
# JP: 「偶然に見せちゃうなんて、ほとんど無い、と、思うよ？\n好きな人には……偶然のふりで、わざと見せるんだ」
1279 = "「我覺得我基本上不會偶然給你看到的啦？我都是假裝不小心……故意露給喜歡的人看的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そう……なのか」
1368 = "「這樣……嗎」" 

# monologue
# JP: 目が、離せない。
1630 = "我都移不開視線了。" 

# monologue
# JP: わざと見せる――と稀咲は言ったが、\nだったら、そうする目的は――
1790 = "稀咲說了――她是故意給我看的，所以她的目的就是――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「目を奪い……\n惹きつけるため――か？」
1313 = "「為了吸走我的視線……為了勾引我――對嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだよ、だから……\n今までもボクは双鉄に、わざとパンツや胸元を見せてた」
1243 = "「對啊，所以呢……我才三番兩次地讓你看到胸部和內褲」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだったのか？　気付かなかったが」
1302 = "「是這樣嗎？　我真的沒有注意到」" 

# 【稀咲】
# display as 稀咲
# JP: 「だから嬉しい。双鉄が今日は気づいてくれて。\nボクを欲しがってくれていて」
1284 = "「所以我才高興啊，你今天終於注意到了。終於對我有欲望了」" 

# monologue
# JP: （ふみっ）
1990 = "（踩）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1389 = "「！」" 

# monologue
# JP: 稀咲の足が、ソックスにくるまれた足指が、\nズボンの上から僕の股間をそっと踏む。
1784 = "稀咲的腳，她被黑襪包裹的腳趾，隔著褲子輕輕踩在了我的股間上。" 

# monologue
# JP: 足の裏だというのに柔らかな肉感が、\nもうガチガチに勃起してると、強調してくる。
1818 = "腳底板柔軟的肉感，我已經發硬的肉棒很能感覺得到。" 

# 【稀咲】
# display as 稀咲
# JP: 「でも、さ、双鉄。ボクたちはお互いに忙しい。\n毎日は、会ってイチャイチャもできないよね？」
1116 = "「但是雙鐵啊，我們都是大忙人。每天見了面也不能如膠似漆吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だな。お互いに、果たさねばならぬ義務があり、\n叶えたいと願う夢もある。毎日は、さすがに無理だ」
1298 = "「是啊，我們都有應盡的義務，都有夢想要實現。怎麼可能每天纏綿」" 

# 【稀咲】
# display as 稀咲
# JP: 「でも、双鉄はセックスを知った。\n性の喜びを覚えたばかりで、きっと、毎日したくなる」
1117 = "「但是雙鐵知道做愛的滋味了。剛體驗過性的美好，肯定每天都想嘗試」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――かもしれん」
909 = "「――可能吧」" 

# monologue
# JP: 実際、今とてしたくてしたくてたまらない。\n稀咲の足が止まってるのが、実に焦れったくもどかしい。
1522 = "其實我現在就想做愛想得不得了。稀咲的腳停了下來，就叫我急不可耐慾火難填。" 

# 【稀咲】
# display as 稀咲
# JP: 「だから、双鉄に教えてあげる。一人でも出来るセックス。\nボクのことを想いながらの、オナニーのやり方を」
1286 = "「所以我要教教雙鐵，什麼是一個人能做的愛。如何一邊腦海裡想著我，一邊自慰」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「オナニー」
1347 = "「自慰」" 

# monologue
# JP: 知識としては、知っている。\n自分で自分の性器を弄り、射精にいたる方法だ。が――
1628 = "我知道這個名詞。自己玩弄自己的性器並射精的辦法，只是――" 

# 【稀咲】
# display as 稀咲
# JP: 「したこと、ないよね？」
1123 = "「你還沒有做過吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。今までは」
1227 = "「嗯，從來沒有過」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、あんまりオナニーされすぎて、\nセックスのとき元気がなくても困るけど」
1160 = "「呵呵，要是你自慰得太多，本壘的時候沒動力上壘，那就是另一種麻煩了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
# 1237 = "「嗯？」" 

# monologue
# JP: 今、なにか、\n稀咲がつぶやいたような気がしたが――
1612 = "我好像聽到稀咲小聲說了些什麼――" 

# 【稀咲】
# display as 稀咲
# JP: 「ううん、なんでも？」
1309 = "「沒有啊，我沒說什麼」" 

# monologue
# JP: 稀咲は小さく首を振り――
1792 = "稀咲輕輕搖了搖頭――" 

# monologue
# JP: （くっ）
1984 = "（擦）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1194 = "「啊」" 

# monologue
# JP: ――ごまかすように足を動かし、\n僕の勃起を、更に焦らして乾かしていく。
895 = "――她為了搪塞而動了動腳，叫我的勃起更加急不可耐起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「オナニーをするには、まず、ボクを思い出すんだ。\nボクの、エッチな姿をね」
1349 = "「自慰的時候呢，首先要回憶起我來。回憶起我色色的樣子」" 

# monologue
# JP: （しゅるっ）
1928 = "（卷）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「エッチな……姿……か」
1351 = "「色色的……樣子……嗎」" 

# monologue
# JP: 稀咲は制服の上をまくって、ブラをズラして、\nおっぱいを僕に見せつけてくれる。
1789 = "稀咲翻開校服的上面，揭開胸罩，露出了她的乳房。" 

# monologue
# JP: 僕が普段を過ごす部屋、その開け放した窓の景色に、\n稀咲の――確かに――実にエッチな姿が浮かぶ。
1560 = "在我平時生活的房間、在窗外景色的映襯下，是稀咲――的確――非常色情的身姿。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクを思って興奮したら――\nペニスを、ズボンの外に出してあげるんだ」
1259 = "「想著我而興奮的話――就解開你的褲子，把陰莖掏出來吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1217 = "「嗯」" 

# monologue
# JP: （ぶるんっ！）
1979 = "（撲騰！）" 

# monologue
# JP: 僕自身、そうしたくって焦れていた。
1521 = "其實我就等著這一刻呢。" 

# monologue
# JP: ズボンから解放されたペニスは、\n待ちかねていた散歩に出れた犬のごとくに、跳ねて震える。
1863 = "陰莖終於從褲子裡解脫了出來。彷彿等到了夢寐以求的散步的狗一樣，昂起了它威武的頭。" 

# 【稀咲】
# display as 稀咲
