1651 = "揉著龜頭的腳趾尖使了用力，和支撐著龜頭、幫忙擼的腳背拉近了距離。" 

# monologue
# JP: （きゅむっ！　しゅこっ！　しゅっ！　きゅうっ！！）
1962 = "（壓！　捋！　捋！　壓！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ――キツっ――」
1200 = "「嗚――啊――忍不住了――」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄――イって！！　ボク、ボクっ――んっ！」
1382 = "「雙鐵――射吧！！　我、我――嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1391 = "「！！？」" 

