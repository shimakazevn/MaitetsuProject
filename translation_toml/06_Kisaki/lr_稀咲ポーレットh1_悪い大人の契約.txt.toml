# display as 稀咲
# JP: 「はぁ―んっ―ふぁ―あ―。そう、てつ―\n双鉄―ふふっ―よく頑張ったね。双鉄、おいで？」
1513 = "「哈——嗯——呼啊——啊——雙、鐵——雙鐵——呼呼——你真的很努力。雙鐵，過來吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、うん！　あの、来てください。双鉄、くん」
1582 = "「啊，嗯！　那個，請你過來。雙鐵，君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
992 = "「……嗯」" 

# monologue
# JP: （とさっ）
2495 = "（倒下）" 

# monologue
# JP: 崩れるように倒れ込む。いまもって結ばれている手の上に。\n稀咲とポーレット―ふたりの体の、まんなかに。
2162 = "我整個倒了下去，倒在她們仍然交握在一起的手上，在稀咲和波萊特——兩人身體的正中央。" 

# 【稀咲】
# display as 稀咲
# JP: 「フフッ―おつかれさま、双鉄」
1456 = "「呵呵——辛苦了，雙鐵」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……えと―すごく―その―\nありがとうございました―ふたりとも―」
1856 = "「那個……那個——非常——那個——感謝——兩位」" 

# 【双鉄】
# display as 雙鐵
# JP: 「礼をいわれるようなことは、なにも……」
1761 = "「沒什麼值得你道謝的……」" 

# monologue
# JP: いい匂いがする。嗅ぎ慣れた稀咲の爽やか匂いだけでなく、\n夕暮れに咲く花の様な、ポーレットの控えめで甘い匂いも。
2058 = "味道真香。不僅僅是稀咲熟悉的清新氣息，還聞到了像黃昏開放的花朵一般的，波萊特溫和甜美的氣息。" 

# 【稀咲】
# display as 稀咲
# JP: 「……話すこともダルそうだね。いまは双鉄。\n何も考えずに休むといいよ」
1000 = "「……看來連說話都很累吧。現在，雙鐵。什麼都別想，好好休息吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……双鉄くん、おやすみなさい」
1855 = "「那個……晚安，雙鐵君」" 

# monologue
# JP: 優しい声。呼吸音。\n稀咲とポーレット、ふたりが同時にクスっと微笑み―
2244 = "溫柔的聲音。呼吸的聲音。稀咲和波萊特同時露出了燦爛的笑容——" 

# 【稀咲】
# display as 稀咲＆波萊特
# JP: 「（チュッ！）」\n「（ちゅっ！）」
1900 = "「（啾！）」\\n「（啾！）」" 

# monologue
# JP: そうして僕は、春泥のような眠りに落ちる。
2107 = "就這樣，我陷入了春泥般的睡眠。" 
