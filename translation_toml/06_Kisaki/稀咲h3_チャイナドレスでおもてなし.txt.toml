# 稀咲h3_チャイナドレスでおもてなし.txt 
[info]

[characters]
3388 = "稀咲"
3066 = "双鉄"

[character_subs]
# 3388 = "稀咲"
3676 = "雙鐵"

[script]
# lines: 695 
# 【稀咲】
# display as 稀咲
# JP: 「ふーん？\n焼酎の方が日本酒より、更にもう一手間かけてるんだ」
2300 = "「嗯？燒酒比日本酒還要再多花一步的工夫啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「随分と意外そうだな」
2051 = "「你好像挺吃驚的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクが飲むのは、仕事のためだけだから。\nそういうレベルの素人の意見にすぎないけれど――」
2416 = "「我只會因為工作不得已地喝酒。所以你就當是個外行的看法吧」" 

# monologue
# JP: 僕の口調が、不満げに聞こえてしまったのだろうか。\n稀咲はどこか、申し訳なさそうな声を出す。
3264 = "我的口氣聽起來有不滿的意思嗎。稀咲的話音似乎帶著些歉意。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクの場合は、日本酒の方がより澄み切っている\n……みたいなイメージが、先入観としてあって」
2472 = "「我還以為日本酒要更加清淡爽口……這是我先入為主的想法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは確かに。\nむしろ一般的なイメージだろうな」
2290 = "「嗯，說的沒錯。大多數人都有這個感覺吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろう！」
2354 = "「對吧！」" 

# monologue
# JP: 今度は一転、華やかな声。\n密やかながら確かな変化が、僕に喜びを与えてくれる。
3114 = "她又得意洋洋了起來。一點點細微又真實的變化，逗得我直樂呵。" 

# monologue
# JP: （あの稀咲が……\n僕の些細なひとことで、これほど一喜一憂するのか）
3796 = "（她真的是稀咲嗎……會因為我的兩三句話，就這樣時而歡喜時而憂嗎）" 

# monologue
# JP: 愛おしいなと、芯から思う。
3250 = "我打從心底地疼愛她。" 

# monologue
# JP: だからこそ、大事に素直に接しなければと、\nこころの底から、あらためて自分に刻み込む。
3283 = "所以我打從心底地又提醒自己，一定要用真心和她相處。" 

# 【稀咲】
# display as 稀咲
# JP: 「だから、日本酒みたいな醸造酒を、\nさらに蒸留したのが焼酎って話は、ちょっと不思議で」
2485 = "「所以日本酒這樣的釀造酒，只要蒸餾過後就是燒酒，聽起來挺不可思議的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「理解できれば、不思議でもなんでもない話なのだが。\n――もう少し細かく説明するか？」
2146 = "「只要理解了，就沒什麼不可思議的。――要我再詳細解釋一下嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。お願いするよ」
2687 = "「謝謝，請說吧」" 

# monologue
# JP: 笑みがほころぶ。\n酒蔵がほんのり、あたたかみを増す。
3137 = "她臉上綻放的笑容，讓酒窖多了幾分溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日本酒はもちろん、米からつくる。\nで、クマ焼酎。右田の焼酎も、米焼酎だ」
2500 = "「日本酒是用大米製成的。這是球磨燒酒，右田的燒酒也是米燒酒」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2735 = "「這樣啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、蒸留前のクマ焼酎が、果たして日本酒として\n飲めるものかどうか――気にはならんか？」
2784 = "「那麼蒸餾前的球磨燒酒能否作為日本酒直接飲用呢――你想知道嗎？」" 

# monologue
# JP: 問えば稀咲の瞳が細まる。
3588 = "聽到我的問題，稀咲眯縫起了眼睛。" 

# 【稀咲】
# display as 稀咲
# JP: 「気になるとも。飲ませてくれるのかい？」
2593 = "「當然想知道，可以給我嚐嚐嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ。あらかじめ許可も受けている」
2738 = "「這簡單，我先前已經獲得過對方的許可了」" 

# monologue
# JP: 稀咲が強く希望した、右田の蔵の醸造所見学。
3478 = "稀咲強烈要求的，參觀右田酒窖的釀酒廠。" 

# monologue
# JP: 真闇姉たちも気を利かせ、\n一時間だけ、僕らをふたりきりにしてくれている。
3107 = "多虧真闇姐她們照顧，讓我們有了一小時獨處的時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸留直前の、いわゆる二次もろみを発酵させ、\n絞ったものがこれだ。日本酒で言えば[なまざけ,1]生酒となるな」
2672 = "「蒸餾前對酒釀做二次發酵而成的東西，就是這個。在日本酒之中，這叫做生酒」" 

# 【稀咲】
# display as 稀咲
# JP: 「これは……ボクのために、\nわざわざ用意しておいてくれたのかい？」
2729 = "「這是……專門為了我而準備的嗎？」" 

# monologue
# JP: 一升瓶を差し出せばまた、笑顔が弾ける。\nもちろん曇らせたくないが、ウソを言うのも心苦しい。
3255 = "我拿出一升瓶，她又笑開了花。我不想毀了她的笑容，但也不好意思說謊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「広く捉えれば、そのとおりだ」
2311 = "「大體上說來，是的」" 

# 【稀咲】
# display as 稀咲
# JP: 「広く？　って、ああ、そうか。\nボク以外にも、同じ疑問を持つ人間は、結構いるんだ」
2312 = "「大體上？　啊，我懂了。還有不少人有著和我一樣的疑問，對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ」
2056 = "「你很聰明」" 

# monologue
# JP: 打てば響くでわかってくれる。\nそれが心地よい、いとおしい。
3111 = "她一點就通。這樣教起來就舒服了，讓我更是喜愛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「飲んでみてくれ」
2049 = "「你嚐嚐看吧」" 

# monologue
# JP: まだ昼前だ。\nほんのひとくちふたくち程度を、コップに注ぐ。
3101 = "因為還是早晨，我在杯裡倒了一兩口就能喝完的小酒。" 

# monologue
# JP: けれど稀咲は、差し出したコップを受け取らず、\n僕へとそっと押し戻してくる。
3008 = "但是稀咲不肯接過我遞出的酒杯，而是又推回給了我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2298 = "「嗯？」" 

# 【稀咲】
# display as 稀咲
# JP: 「『飲ませてくれる』んじゃないのかい？\n双鉄が、ボクに」
2468 = "「我說了，要『給我喝』的啊，忘了嗎？要由你餵我喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2735 = "「這樣啊」" 

# monologue
# JP: 稀咲の舌が、その薄い唇をちろりと舐める。\n誘われている。稀咲に、誘ってもらえてる。
3541 = "稀咲舔了舔薄薄的嘴唇。她在勾引我，一定是在勾引我。" 

# monologue
# JP: その喜びが体を動かす。\nコップを一気に煽ってる。
3088 = "喜悅讓我動了起來。將酒一口氣灌進嘴裡。" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……ぷっ……んっ――ごくっ――\nちゅずっ――んっ――ごく――ごくんっ――んふっ」
2268 = "「嗯……唔……嗯――咕嘟――咕啾――嗯――咕嚕――咕嚕――嗯唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2809 = "「！」" 

# monologue
# JP: 全部を流し込んだあと、ほんの一瞬、稀咲の舌が、\n僕の口内に侵入してくる。
3060 = "全部餵完後，稀咲的舌頭竟然一瞬間探進了我的嘴裡。" 

# 【稀咲】
# display as 稀咲
# JP: 「（れるっ――れろっ――ねろおっ）」
2816 = "「（舔――舔――舔）」" 

# monologue
# JP: 舌が、蠢く。ああ、これは――
3606 = "蠕動的舌頭，我知道這是什麼意思――" 

# monologue
# JP: 『ごちそうさま』と、\n声には出さず、舌の動きと気持ちで、伝えてくれる。\n 
2829 = "『謝謝招待』。不用出聲，舌頭的動作已經說明了一切。" 

# 【稀咲】
# display as 稀咲
# JP: 「ぷぁ。んふっ……」
2207 = "「哈，嗯唔……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうだった？」
2391 = "「怎麼樣？」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が飲ませてくれたからね？\n最高に甘くて美味しかった……といいたいけれど」
2732 = "「這是雙鐵餵給我喝的，所以甜蜜極了、美味極了……以上只是我美好的預想」" 

# monologue
# JP: 小さく、肩がすくめられる。
3140 = "她輕輕聳了聳肩膀。" 

# 【稀咲】
# display as 稀咲
# JP: 「残念。すっぱくて美味しいものではなかった。\n日本酒とは、まったく違うお酒だね」
2145 = "「只可惜實際上酸酸的，並不好喝。和日本酒完全不一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ここで質問だ」
2774 = "「那我有個問題要考考你」" 

# monologue
# JP: 普通の酒造見学者には、ここで答えを明かしてる。\nが、稀咲相手だ。もう少しだけ、楽しみたい。
3168 = "對於一般的參觀人員，我會直接公布答案。但是面對稀咲，我想考考她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「米という同じ原料、同じ製法で何故そうなるか。\n少し、考えて見て欲しい」
2592 = "「用的都是大米，做法也是一樣的，但為什麼味道卻截然不同。你稍微思想一下」" 

# 【稀咲】
# display as 稀咲
# JP: 「さっきもいったけど、ボクはお酒の素人だよ？\nまったくのノーヒントでは、厳しいね」
2412 = "「我剛都說了，我對酒的了解可是外行喔？一點提示都不給，這可難猜了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では……そうだな。米焼酎と日本酒と、\nその代表的な産地を比べてみて欲しい」
2783 = "「那麼……你可以對比下米燒酒和日本酒，它們代表性的產地」" 

# 【稀咲】
# display as 稀咲
# JP: 「米焼酎の代表なら、もちろんクマ――御一夜だよね。\n日本酒は――[にいがた,2]二干潟のイメージが強いかな」
2648 = "「米燒酒的代表就是球磨――御一夜吧。日本酒呢――我印象強烈的就是二干潟了」" 

# monologue
# JP: 言った瞬間、稀咲は「ああ」と小さく頷く。
3629 = "說的時候稀咲還點了點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「気温差？　それとも年間降水量とか――湿度とか？」
2502 = "「是不是溫差？　還是說是年降雨量或是濕度的緣故？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな。さすが稀咲だ。その辺の全て――\nつまり、発酵を促す環境の差、だな」
2115 = "「厲害，稀咲果然聰明。應該說全都是――換句話說，就是發酵環境的差別吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら――焼酎は暖地、\n日本酒は寒地で作られた方がいいみたいな感じかい？」
2782 = "「那麼――溫暖的地區出好燒酒，寒冷的地區出好日本酒，是這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。なぜさっき飲んだ“未蒸留の焼酎”が\n酸っぱかったかというと、クエン酸のせいだ」
2352 = "「對了。你剛剛喝的“未蒸餾的燒酒”會發酸就是因為檸檬酸」" 

# 【稀咲】
# display as 稀咲
# JP: 「クエン酸。くえん、酸。どうりで飲みづらい」
2544 = "「檸檬酸，檸檬（發音同“吃不下去”）、酸。難怪不好喝呢」" 

# monologue
# JP: ダジャレのつもりか、そうでないのか。\nどちらにしても、稀咲はかなりのご機嫌だ。
3124 = "她是不是想說冷笑話呢。至少我知道她心情肯定非常好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「飲みづらくはあるが、メリットもある。\nクエン酸は酸ゆえ、殺菌能力を持つ」
2097 = "「儘管難以下咽，也是有好處的。檸檬酸作為酸，有著殺菌作用」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ！　つまり余計な雑菌が繁殖しづらくなる。\nだから、高温多湿の地域に向くんだね？」
2281 = "「嗯！　因為其他雜菌難以繁殖。所以才會適合在高溫潮濕的地區製造吧？」" 

# monologue
# JP: いつもながらのことではあるが、\n理解の早さに舌を巻く。
3126 = "她理解得飛快，讓我欽佩不已。雖然我知道她一直都思維活躍。" 

# monologue
# JP: そうして一度巻かれた舌は、\n嬉しさに、よりなめらかになる。
3169 = "對此咋舌之後，我高興得口若懸河地繼續說了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。そして、日本酒で使う[きこうじ,1]黄麹は、\n酸味がなく、いわゆる澄み切った味を出すが――」
2558 = "「沒錯。而日本酒使用的黃麴黴不帶酸味，可以製作出清澈干洌的酒液――」" 

# 【稀咲】
# display as 稀咲
# JP: 「酸が弱くて殺菌能力も無いから、雑菌が繁殖し易い\n高温多湿の地域では使えない。だから、寒冷地向き？」
2040 = "「但是酸少、殺菌能力也低，雜菌容易繁殖，高溫潮濕的地區不方便使用，所以才適合寒冷地區？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2366 = "「就是這樣」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。だから日本酒は、[なまざけ,1]生酒そのままでも、\nおいしく呑むことができるんだ」
2112 = "「原來是這樣，所以日本酒的生酒喝起來才那麼好喝啊」" 

# monologue
# JP: わずかな言葉で、多くが通じる。\nこころまで、重ねあえてる気になれる。
3196 = "幾句話就能說清楚這麼多事。有種心意相通的感覺。" 

# monologue
# JP: もっともっと、\n稀咲のことばを、稀咲の理解を引き出したくなる。
3241 = "我想多聽聽稀咲的話，多聽聽她的見解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一方、黒麹を使う焼酎の二次もろみは、クエン酸を\n含むがゆえに蒸留し、不純物を取り除く必要が出る」
2660 = "「而用黑麴黴製成的燒酒進行二次發酵時，由於含有檸檬酸，所以需要蒸餾來去除不純物質」" 

# 【稀咲】
# display as 稀咲
# JP: 「蒸留で、クエン酸も取り除ける？」
2671 = "「蒸餾也可以去除檸檬酸嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「生酒は水とアルコールと不純物とが混じったものだ。\nクエン酸は、アルコールではなく水に溶けている」
2587 = "「生酒含有水、酒精和不純物質。檸檬酸溶於水而非溶於酒精」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
2276 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして、エチルアルコールの沸点は78.37℃。\n水よりも早く沸騰する」
1999 = "「乙醇的沸點是78.37℃，比水更早沸騰」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど！　蒸留っていうのは、アルコールだけを\n沸騰させて、冷やして戻す作業なんだね？」
2448 = "「我懂了！　蒸餾就是讓酒精沸騰，然後再冷卻還原為酒精吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。そうして水も、水に溶けているクエン酸も、\n不純物もまるごと置き去りにする」
2557 = "「沒錯。於是水、溶於水的檸檬酸和不純物質就全部留了下來」" 

# monologue
# JP: もっとも、エチルアルコールと沸点の近い物質は\nやはり混じってしまう。
2980 = "不過和乙醇沸點相近的物質還是會給帶進產物中。" 

# monologue
# JP: ゆえに、蒸留酒もまた多種多様。\nさまざまな味わいをそれぞれにもつものとなるのだ。
3096 = "因此蒸餾酒也有很多種。各種蒸餾酒也就有了五花八門的口味。" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。理屈だねぇ。けど――そういうことなら\n温暖地で日本酒を、寒冷地で焼酎を作ったりも」
2737 = "「這樣啊，我明白道理了。但是――既然如此，溫暖地區製造的日本酒和寒冷地區製造的燒酒也是有的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、昨今はできるようになっている。空調、気温、\n菌の環境――金さえあれば、制御可能な時代だからな」
2559 = "「沒錯，這是最近才實現的。空氣調節、氣溫、菌種環境――這年頭有錢就能全部加以控制」" 

# monologue
# JP: そうであっても――どこまで金をかけたとしても、\n狙い通りの味を作ることは不可能だろう。
3001 = "但是――無論花上多少錢，也不可能想要什麼味道就百分百做出什麼味道。" 

# monologue
# JP: ゆえに酒造りは、あの真闇姉が一生涯を注ぎ込む程に\nむつかしく、また面白いものであるのだろう。
3098 = "因此製酒才是真闇姐肯花上一生去鑽研的困難卻又異彩紛呈的一門手藝。" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど……こういう話は楽しいね。\nそれに、大いに参考にもなった」
2733 = "「這樣啊……這個話題真有意思。我也可以參考不少」" 

# 【双鉄】
# display as 雙鐵
# JP: 「参考。なんのだ？」
2060 = "「你指的什麼參考？」" 

# 【稀咲】
# display as 稀咲
# JP: 「来客があるんだよ、[ちゅうごく,1]仲国から。父の古い友人の\n娘さんなんだけどさ、随分気難しい方らしくてね」
2455 = "「我有個來自仲國的客人，是父親老友的女兒，真的很不好相處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2518 = "「是嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「日ノ本の特産品に興味をお持ちとのことだから、\nそうしたものを紹介できれば――と考えてるんだ」
2460 = "「我看她對日本的特產感興趣，想給她推薦這方面的東西，就好溝通了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それで右田の蔵の見学か」
2111 = "「原來如此，所以才來右田酒窖參觀嗎」" 

# monologue
# JP: 納得いった。\nと思った瞬間、稀咲はやわらかに首を振る。
3260 = "我理解了。但稀咲卻輕輕搖了搖頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「“それで”、じゃないよ？　順番が違う。\n来たく来た。そしたら、たまたま参考になっただけ」
1979 = "「不是你想的那個“所以”，順序錯了。我就是想來，只是偶然學到了點值得參考的知識」" 

# 【双鉄】
# display as 雙鐵
# JP: 「学ぶために来てくれたのではなかったのか？」
2797 = "「難道不是來學習的嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「海外からのお客様を御案内する蔵見学なら、\nしろ[ぐら]蔵さんの焼酎博物館の方を、ボクは選ぶ」
2334 = "「如果要帶外國客人參觀酒窖，我會選擇白酒窖的燒酒博物館」" 

# monologue
# JP: 右田にとってはライバルになる酒蔵の名だが、\n悔しいよりも、納得の方が先にたつ。
3664 = "那是跟右田競爭的另一家酒窖，儘管有點不甘心，但心裡更多的還是理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……あそこは観光客さん向けに、\nかなり洗練された展示案内をしているからな」
2505 = "「是啊……那裡給遊客提供了相當精緻的導覽」" 

# 【稀咲】
# display as 稀咲
# JP: 「けど、ボクはどうしてもここに来たかった。\n理由なんて、そんなのは最初からひとつしかない」
2035 = "「但是我就想來這裡。理由明擺著只有一個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつ、とは？」
1967 = "「一個？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、わかっているのに言わせたいんだ？」
2183 = "「呵呵，你都知道還要我說嗎？」" 

# monologue
# JP: 稀咲が、しなだれかかってくる。\n焼酎のせいもあるのだろうか、吐息が熱い。
3495 = "稀咲朝我靠了過來。她的氣息很熱，可能有燒酒的影響。" 

# 【稀咲】
# display as 稀咲
# JP: 「小さなころから、ずっと興味はあったんだ。\nけど、ボクは意地っ張りだからね。来られなかった」
2435 = "「我從小就很感興趣了。但是我比較固執，一直沒有來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2221 = "「啊――」" 

# monologue
# JP: 稀咲の指が、甘えてくる。\n僕の胸板でくるくる動く。
3514 = "稀咲的手指貼到了我身上來。在我的胸口上畫圈圈。" 

# monologue
# JP: 抱きしめたいが、ぐっと堪える。\n稀咲の声を、もっと聞きたい。
3239 = "我很想抱住她，但是忍住了。因為想再聽聽稀咲的聲音。" 

# 【稀咲】
# display as 稀咲
# JP: 「ここが、双鉄の家だから」
2739 = "「這裡是雙鐵的家」" 

# monologue
# JP: それは、囁き。\nけれど止まった指先から、胸に直接伝わってくる。
3130 = "她的呢喃細語，順著停下的指尖傳進了我的心裡。" 

# 【稀咲】
# display as 稀咲
# JP: 「『好きな男の子の家だから』。だよ？」
1550 = "「“因為這裡是我喜歡的男孩子的家”喔？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2619 = "「稀咲」" 

# monologue
# JP: 稀咲の息に、稀咲の熱に、酔わされる。\n抱き寄せ、ゆっくりとキスをする。
3502 = "稀咲的呼吸、熱度，讓我陶醉。我抱過她，慢慢地吻她。" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ……んっ――ちゅっ――ちゅむっ」
2266 = "「嗯……呼……嗯――啾――啾唔」" 

# monologue
# JP: 稀咲の口へと舌を差し込み、\nその舌を丁寧に舐めまわす。
3253 = "我把舌頭伸進稀咲的嘴裡，仔仔細細地舔起她的舌頭來。" 

# 【稀咲】
# display as 稀咲
# JP: 「あむっ――んっ――ふぁ……んっ――ちゅむっ\nほーへふっ――ふっ――しゅき――んっ――ちゅっ」
2238 = "「啊嗚――嗯――哇……嗯――啾唔啊嗚――呼――喜歡――嗯――啾」" 

# monologue
# JP: 酒の、香だ。
3330 = "是酒的氣味。" 

# monologue
# JP: 酒蔵内に満ち満ちているのものよりも濃密に、\n稀咲の口内から伝わってくる。
3503 = "稀咲的嘴裡有著比酒窖裡飄滿的酒香更加濃厚的氣味。" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ――んっ――ちゅっ――ちゅむっ――\nちゅるっ――ちゅっ――んちゅっ――ふ……あ――」
2265 = "「嗯……呼――嗯――啾――啾唔――啾――啾――嗯啾――呼……啊――」" 

# monologue
# JP: お互いの手が、お互いの体を抱きしめる。\n暑い。熱い。
3227 = "我們的手都抱住了對方。熱，燥熱。" 

# monologue
# JP: 全身の血に酒が溶け込み、鼓動が速くなっていく。
3642 = "身體裡的血溶入了酒精，心跳也加速了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――稀咲」
1544 = "「――稀咲」" 

# monologue
# JP: キスでは、足りない。\n抱き合う距離では、遠すぎる。
3620 = "親吻已經無法滿足。擁抱的距離也是那麼遙遠。" 

# monologue
# JP: もっと触れたい。触れられたい。近くに行きたい。\nその欲望が、僕をカラカラに乾かして――
3244 = "我想撫摸她，想被她撫摸，想離她更近一步。無底的欲望讓我飢渴難耐――" 

# monologue
# JP: （ごとっ）
3783 = "（咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2810 = "「！！」" 

# 【稀咲】
# display as 稀咲
# JP: 「あっ」
2234 = "「啊」" 

# monologue
# JP: 物音。全身の血が冷える。
3556 = "突然的響聲讓血液冷卻了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1551 = "「…………」" 

# monologue
# JP: ――けれど、おきない。何もおきない。
1525 = "――但是我們什麼都沒有做。" 

# monologue
# JP: ならば、今の物音は、真闇姉がおそらく、\nわざと立ててくれたものだろう。
3665 = "那麼剛剛的響聲可能是真闇姐故意製造的吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「残念。時間のようだね？」
2597 = "「真可惜，時間已經到了吧」" 

# monologue
# JP: サバサバとした声を出し、\n稀咲がさりげなく身を離す。
3497 = "稀咲爽快地說道，然後就放開了我。" 

# monologue
# JP: けれどもその手はしっかりと、\n僕の指先を掴んでくれてる。
3004 = "但是她的手依然緊緊抓住了我的指尖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっという間だったな。そろそろ行くか」
2601 = "「真是短暫的時光，我們走吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「どこへ？　どこへでもボクはついていくけど」
2118 = "「去哪邊？不管哪邊我都會跟你走就是了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて――どうするかな」
2770 = "「那我想想――怎麼辦呢」" 

# monologue
# JP: ともかく、今はここを出よう。
3055 = "先離開這裡吧。" 

# monologue
# JP: 真闇姉と顔をあわせてしまうのは、\nどうにも、なんとも気恥ずかしすぎる。
3616 = "要跟真闇姐碰面，怎麼都覺得特別難為情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に、なにか希望はあるか？」
2066 = "「你有什麼想去的地方嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2444 = "「我想想」" 

# monologue
# JP: 稀咲は笑って、僕を引っ張る。
3538 = "稀咲笑著牽起了我。" 

# 【稀咲】
# display as 稀咲
# JP: 「軽く、なにかつまみたいかな。\nまだ少し、酔いが残ってるみたいだから」
2447 = "「我想稍微吃點什麼。因為醉意還沒有完全消掉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。頬にクリームがついてるぞ」
2638 = "「稀咲，你臉上沾著奶油呢」" 

# 【稀咲】
# display as 稀咲
# JP: 「……指摘するより、\nさりげなく取って欲しいんだけど？」
1575 = "「……有時間指出來，就不能不著痕跡地幫我拿掉嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もっともだ」
2456 = "「我正有此意」" 

# monologue
# JP: 指でぬぐって、すぐになめとる。
3262 = "我用手指擦掉她臉上的奶油，送進自己的嘴裡。" 

# 【稀咲】
# display as 稀咲
# JP: 「わ」
2199 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、チーズクリームも旨いものだな。\n予想していたよりもクセが無い」
2316 = "「奶油乳酪真是好吃啊。比想像中要爽口很多」" 

# 【稀咲】
# display as 稀咲
# JP: 「…………」
# 1551 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 稀咲が、驚いた顔をしている。固まっている\n見開かれた目さえもが美しい――ではなく。
3526 = "稀咲神色驚訝，睜得很大、一動不動的眼睛都美麗得驚人――問題不是這個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
2389 = "「怎麼了？」" 

# 【稀咲】
# display as 稀咲
# JP: 「え？　あ――いや、ね？　その……\n双鉄も少し、酔ってくれてるのかな？　とか思ってさ」
2211 = "「哎？　啊――沒什麼啦，只是……雙鐵好像也有點醉了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？\nなにか、おかしなことでもしたか？」
2476 = "「我？我有什麼不對勁的嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、無自覚なんだね。すごく嬉しい」
2180 = "「呵呵，你沒感覺到啊，真是有趣極了」" 

# monologue
# JP: 驚き顔が、くすくす笑いに。\n頬がピンクに染まってる。
3118 = "她嗤嗤地笑了，表情依然很驚訝。臉上紅了幾分。" 

# 【稀咲】
# display as 稀咲
# JP: 「でも、そこまでするなら。\nキスでぬぐってくれた方が、もっと嬉しかったかな？」
1991 = "「不過既然要吃掉，要是你能親掉它，我會更高興的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！？」
2242 = "「啊！？」" 

# monologue
# JP: 慌ててあたりを大きく見渡す。
3249 = "我慌忙望了一圈周圍。" 

# monologue
# JP: 人影はそこそこあるものに、\n僕らを気にする様子の者は……見当たらない。
3084 = "周圍有不少人影，但好像……沒什麼人注意到我們。" 

# 【稀咲】
# display as 稀咲
# JP: 「ちょっと離れすぎちゃったか。\n永山さんなら、きっとみんなに話してくれたのに」
2324 = "「好像離得有些遠了。如果給永山夫人看見了，一定會說給其他人知道的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
2507 = "「是啊」" 

# monologue
# JP: 永山夫人のクレープの出店では、\n僕たちも少し順番待ちした。
3226 = "我們也排著隊等了等永山夫人的可麗餅出攤。" 

# monologue
# JP: あそこでイチャつき目立ったのなら、\n確かに噂もされかねないが――
3614 = "要是那時候做出卿卿我我的舉動，是很有可能被她傳開來的――" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなったところで、苦笑される程度だろう。\n婚約者同士がイチャイチャするのは、まぁ当然だ」
2028 = "「但我覺得人家只會苦笑一下。訂婚的人會親密一番是理所當然的」" 

# 【稀咲】
# display as 稀咲
# JP: 「いいや。今のはただのイチャイチャじゃない。\n少なくとも、ボクにとってはね」
1975 = "「不對，剛剛可不只是親密喔。反正在我心裡可不是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 何故だ、と視線で尋ねれば、\n稀咲の頬の薔薇色が、もう少しだけ濃さを増す。
3233 = "我向她投去疑惑的目光，稀咲臉頰上的玫瑰色因此多了幾分深度。" 

# 【稀咲】
# display as 稀咲
# JP: 「今のはさ、恋人より、婚約者よりもっと近い仕草だ。\n日々姫にだってしたことが無いくらいじゃないかな？」
2107 = "「剛剛的舉動比戀人、比訂婚的人還要更親密喔。我看你跟日日姬都沒有做過吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみると、そうかもしれんな」
2322 = "「好像是的」" 

# monologue
# JP: あんな仕草は、意識して出て来るものではない。\nそう接していた相手など――
3658 = "那個舉動只可能是下意識做的。能有這種機會的對象――" 

# 【稀咲】
# display as 稀咲
# JP: 「妹さんと双鉄の、きっと、日常のひとこまだった。\nそういう距離を、あたたかさを、感じた気がした」
1969 = "「一定是妹妹和雙鐵最平凡的互動之一了。我能感受到，我們之間的距離已經那麼近、關係已經那麼溫暖了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん。」
1539 = "「――嗯。」" 

# monologue
# JP: 嬉しくなる、切なくなる。\nほんの少しだけ、泣きそうになる。
3683 = "高興卻又有些難受。有種想掉眼淚的感覺。" 

# monologue
# JP: こんなに自然に、路子のことを語ってくれる――\nそうしてくれる相手が稀咲で、ただ幸せで。
3072 = "可以如此輕鬆地談起路子――跟我聊天的對象是稀咲，又叫我非常幸福。" 

# 【稀咲】
# display as 稀咲
# JP: 「だから、特別。ああ――けど。ふふっ、\nそう考えると、誰にも見られなくて良かったんだね」
2482 = "「所以才很特別。嗯――但是……呵呵，這麼一想，還好沒有給人看到啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう考えると？」
2575 = "「為什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクが、双鉄の日常になれた瞬間だもの。\n見せびらかすより、ふたりだけのヒミツにしたい」
2731 = "「這是我走入雙鐵日常的一瞬間啊。我想留作我們之間的秘密，可不想到處炫耀呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2276 = "「嗯」" 

# monologue
# JP: 僕のささいな仕草から、\n稀咲はしあわせを見つけてくれる。
3203 = "從我最細微的動作上，稀咲都找到了幸福。" 

# monologue
# JP: 見つけた小さなしあわせを、\n二人でいれば、宝石にさえ換えられる。
3650 = "這份小小的幸福，對我們而言，勝過任何寶石的價值。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄、食べる？\nチーズクリーム、気にいったみたいだったから」
2796 = "「雙鐵，要嚐嚐嗎？你好像挺喜歡奶油乳酪的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、交換しよう。\n稀咲がもしもいやでなければ」
2764 = "「那就交換一下吧，只要你樂意的話」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、ナイショだけどね？　実は――\nメイプルバターも食べたかった！　（あむっ）」
2179 = "「呵呵，一定要保密喔？　其實――我還想吃楓糖漿！　（啊嗚）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2210 = "「哎喲」" 

# monologue
# JP: 僕が手にする食べかけに、\n稀咲がふざけてかぶりついてくる。
3231 = "我剛準備吃，稀咲就調皮地咬了上來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほらほら、こぼすぞ」
2568 = "「注意點啊，差點掉地上」" 

# 【稀咲】
# display as 稀咲
# JP: 「こぼさないように食べさせて？」
2766 = "「那就餵我吃吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も稀咲に、稀咲のを食べさせてもらいたい。\n交代で、でどうだ？」
2401 = "「我也希望稀咲餵我吃呢。換著來怎麼樣？」" 

# 【稀咲】
# display as 稀咲
# JP: 「交代。ふふっ、素敵なことだね」
2493 = "「換著喂，呵呵，很棒啊」" 

# monologue
# JP: じゃれあいながら、\nふたりでふたつ、クレープをきれいに食べ終わる。
3229 = "我們開著玩笑，就把兩個可麗餅都吃光了。" 

# monologue
# JP: 口の端、今度は僕がクリームをつければよかったと、\n食べ終わってから、ほんのすこしだけ残念になる。
3569 = "等到吃完我才後悔起來，要是我也在嘴角邊沾上奶油就好了。" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ美味しかった。\n永山夫人は、何を作ってもおいしくするね」
2599 = "「真好吃。永山夫人做什麼都好吃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲も、ずいぶんと上手くなってきているぞ」
2636 = "「稀咲的手藝也精進不少啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「本当かい！？」
2603 = "「真的嗎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、この前のだご汁などは、\nまるきり右田の味だった」
2509 = "「是啊，之前做的米粉丸子湯就是右田的味道」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうか。頑張ってる甲斐が出てきてるんだね」
2519 = "「是嗎，不枉我一番心思了」" 

# monologue
# JP: 安堵と喜びのいりまじる笑み。\nふんわりと、あたりの空気がまるくなる。
3134 = "她笑得安心又喜悅。四周的氣氛輕鬆了很多。" 

# 【稀咲】
# display as 稀咲
# JP: 「[まくら,1]真闇先生さまさまだ。\n先行きはまだまだ長いけど」
2378 = "「得感謝真闇老師了。雖然要學的還有很多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。真闇姉を超えるところまで目指すのか？」
2798 = "「難道你打算做到超越真闇姐嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや、超える、超えなくとかじゃなく。\n真闇さんからは習えない味を、身につけたいんだ」
1981 = "「不是超不超過的問題。我想掌握真闇小姐不會教我的味道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉でも教えられない？」
2609 = "「真闇姐不會教的味道？」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん、そう。ボクがどうしても覚えたいのは……」
2515 = "「是啊，我最想學會的……」" 

# monologue
# JP: 稀咲が、ちらと僕を見る。\nいつもの強い瞳ではなく、どこか、伺い見るように。
3524 = "稀咲瞧了我一眼。不是凝神用力的一眼，而是偷瞧的眼神。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄の――[そごう,1]十川の家の味だから」
2793 = "「雙鐵的――十川家的味道啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 

# monologue
# JP: 旧姓を。
3662 = "那是我的舊姓。" 

# monologue
# JP: 右田になる前、産まれたときの僕の名字を、\n何年ぶりに、人の口から聞いただろうか。
3201 = "很多年沒有聽到有人叫我舊姓了，那是我更姓為右田前、出生時的姓氏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちは、とても――とても嬉しい」
2474 = "「我，我真的――真的很高興」" 

# monologue
# JP: 言葉が、スムーズにでてこない。
3653 = "連話都講不俐落了。" 

# monologue
# JP: 嬉しすぎて。これほど嬉しい気持ちをけれど、\n受け取れないことが悲しくて。
3379 = "真是太高興了，高興到有點消受不起，又覺得有點難過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれども、それは」
2038 = "「但是那個……」" 

# 【稀咲】
# display as 稀咲
# JP: 「無理じゃないよ？　双鉄が必ず。覚えてるから。\n今は例え、心のどこかに、閉じ込めてても」
1994 = "「並不是不可能哦？　你肯定也記得的。就算現在還封閉在心底裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2234 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「時間をかけて、思い出してよ。\nボクは必ず、その味を双鉄に食べさせてあげる」
2666 = "「花時間慢慢回憶吧。我一定會做出那個味道讓你品嘗的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう」
1545 = "「――謝謝」" 

# monologue
# JP: なんといういい女かと。\n結婚したいと、つくづく思う。
3651 = "這女子何其優秀，讓我每每想到就恨不得立刻和她結婚。" 

# monologue
# JP: 毎日毎夜、切に願っていることではあるが。
3345 = "每日每夜，我都衷心地這麼想著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それで、だな」
1579 = "「……然後呢」" 

# 【稀咲】
# display as 稀咲
# JP: 「ごめん。まだ決めきれてないようだ。\nあの人は……どうにも強欲だから」
2487 = "「抱歉，還沒有決定好呢。那個人……太貪心了」" 

# monologue
# JP: 先回りされ、嬉しくなる。\n稀咲もやはり、同じ気持ちと伝わってきて。
3560 = "竟然是她先去問的。原來稀咲和我是一樣的心情。" 

# monologue
# JP: だからこそ。どれほど切なくともどかしくとも、\n我慢するしかないとも思う。
3282 = "所以再怎麼難受、再怎麼焦急，我能做的也只有等待。" 

# 【双鉄】
# display as 雙鐵
# JP: 「欲、というのも違うだろう。\n稀咲への愛情の深さゆえのことだ」
2393 = "「應該不是貪心的問題吧。因為他非常疼愛你啊」" 

# monologue
# JP: プロポーズをして、受け入れられて。\n両方の家も大歓迎で。
3352 = "求過婚，她也應允了。雙方的家庭都非常贊成。" 

# monologue
# JP: けれど結婚できてないのは、\n招待客が決まらぬためだ。
3013 = "但結婚的事遲遲沒有敲定，是因為賓客還沒有定下來。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクへの愛情？　なのかなぁ？　あの人はただ、\n帝国線路合同会社のコネクションを強化するために」
2594 = "「疼愛我？　真的嗎？　那個人只是想進一步拉攏和帝國鐵路有限公司的關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「愛情だろう。その行為こそが」
2027 = "「但他的做法肯定是出於疼愛啊」" 

# monologue
# JP: 家を出て行く娘のために、\n最大最良の引き出物をと、元忠さんは考えている。
3355 = "為了要出嫁的女兒，元忠叔叔還在考慮什麼是最好的禮物呢。" 

# monologue
# JP: 式の来賓、招待客。はては仲人――\n全てを任せて欲しいと僕らに、頭を下げてくれてまで。
3368 = "甚至不惜低下頭向我們請求――讓我們包攬婚禮來賓、客人甚至是媒人的人選工作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。結婚式の主役は、稀咲。\nゆえに、稀咲にとって最高の式を作りあげたい」
2405 = "「我也是一樣的。婚禮的主角是你，所以我想給你一場最棒的婚禮」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクにとって最高の式は、\n新郎席に、双鉄がいてくれるだけで作れるよ？」
2437 = "「我心目中最棒的婚禮，只要雙鐵站在新郎席上就好了哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、言い直そう。稀咲にとって――\nそして稀咲の夢にとって、最高の式を作りたいのだ」
2772 = "「那我換個說法，我想為了你――為了你的夢，帶給你一場最棒的婚禮」" 

# 【稀咲】
# display as 稀咲
# JP: 「夢……か」
2305 = "「夢……」" 

# monologue
# JP: 稀咲の瞳が、ほんの一瞬閉じられる。\nなにかを思い出すように。なにかを懐かしむように。
3550 = "稀咲閉上了一瞬眼睛。彷彿在回憶什麼似的，在懷念什麼似的。" 

# 【稀咲】
# display as 稀咲
# JP: 「――うん。確かに。\nボクの夢はいつの間にか、双鉄の夢と重なったよね」
1540 = "「――嗯，是啊。我的夢不知不覺就跟你的夢重疊在了一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もそう感じている」
2289 = "「嗯，我也有這種感覺」" 

# 【稀咲】
# display as 稀咲
# JP: 「レールを戻し、伸ばし、つなげていくこと。\n[ひのもと,2]日ノ本の、交通に悩む、全ての人へと」
2688 = "「讓鐵道回到身邊，讓鐵道在各地都四通八達。為了日本所有有交通煩惱的人服務」" 

# monologue
# JP: ふと思う。
3271 = "我突然想到。" 

# monologue
# JP: 僕と出合わずにいたのなら、\n稀咲の夢は、どんな形をしていたのだろうかと。
3146 = "如果沒有遇上我，稀咲會懷著怎樣的夢呢。" 

# 【稀咲】
# display as 稀咲
# JP: 「それは[なまなか,1]生半な夢じゃない。\n僕たちだけでは、叶えられない」
2724 = "「這不是隨便說說的夢。不是僅靠我們兩個人就能實現的夢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりで同じ夢を抱けていることに、感謝している。\n元忠さんが、それをわかってくださっていることにも」
2434 = "「我很高興能和你有著一樣的夢。也感謝元忠叔叔對我們的理解」" 

# monologue
# JP: だから、ひたすらに待つしかできない。\n何ひとつさえ投げ出せないし、疎かにも出来ない。
3280 = "所以不能一味地等待。不能放棄，不能敷衍。" 

# monologue
# JP: 二度と取り返せない多くを、僕らはすでに、\nみんなから、御一夜から、授かっているのだから。
3099 = "因為我們已經從所有人、從御一夜，收到了太多太多獨一無二的東西了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜とも右田とも宝生とも縁もゆかりもなかった、\n旧帝鉄総裁を仲人にまで引っ張ってくださったのだ」
2740 = "「連和御一夜、和右田、和寶生都沒有任何來往的舊帝鐵總裁，都肯當我們的媒人了」" 

# 【稀咲】
# display as 稀咲
# JP: 「それだけで、ボクらの会社――\n帝鉄線路合同会社の評価と信頼は、大きく高まる」
2547 = "「正說明我們的公司――帝國鐵路有限公司受到了多高的評價、多大的信任」" 

# 【双鉄】
# display as 雙鐵
# JP: 「結婚式への出席希望者も膨れ上がったと聞いている。\n調整が、そう簡単につかぬだろうとも思うのだがな」
2661 = "「聽說希望出席婚禮的人也多了很多。雖然調整起來不會容易」" 

# monologue
# JP: わかってはいる。こころの底から感謝もしている。\nそれでも、やはり――どうしても。
3257 = "我明白，也打從心底感激他們。但有件事，是無論怎麼都掩飾不了的。" 

# 【稀咲】
# display as 稀咲
# JP: 「……あげたいよね、式」
1565 = "「……好想舉辦婚禮啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もう七ヶ月も待たされている。\n僕ら自身にはどうにもできんのが、もどかしい」
2297 = "「嗯，還要等上七個月。我們卻對此無能為力，真叫人焦急」" 

# 【稀咲】
# display as 稀咲
# JP: 「このテの名簿作成は職人芸の世界だからねぇ。\nボクでもまったく、手を出せない」
2676 = "「製作這一類的名冊是專業人士的工作。我都完全插不上手」" 

# monologue
# JP: お手上げだよ、とおどけて肩をすくめてみせる、\n稀咲はどこか……やっぱりどこか、さみしげだ。
3138 = "她調皮地聳聳肩膀，彷彿在說“沒轍啦”似的，她總是……總是能給人一種空落落的感覺。" 

# monologue
# JP: そんな稀咲を見たくはなくて、\nなかば無理やり、話を変える。
3220 = "我不忍心看著這樣的稀咲，多少有些強行地轉了個話題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば――さっきの話にでてきた要人。\n元忠さんの、古い友人の娘さんという方」
2684 = "「話說――剛剛我們聊到的那個要人。元忠叔叔老朋友的那個女兒」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2276 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方も、結婚式の出席リストに入ってくるのか？」
2319 = "「她也是婚禮出席者的一員嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「……さて、どうだろうね？　近しい間柄でもないし。\n今回の面会も、別の要件での来日のついでらしいし」
1585 = "「……這我就不知道了，關係也談不上很親密。這次好像她也是順路來碰面的，她來日本是為了別的事情」" 

# monologue
# JP: 稀咲の声が低くなる。\nしまった。まるで話を変えられてない。
3517 = "稀咲的聲音低沉了下去。不好，話題根本沒有改變好。" 

# 【稀咲】
# display as 稀咲
# JP: 「けど……彼女も銀行系だし……国情もある。\nあちらの鉄道系への人脈を持っているのかもしれない」
2030 = "「但是……她也是銀行業的人……考慮到國情問題，她有可能在她那邊有鐵路方面的人脈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
2271 = "「嗯……這樣啊」" 

# monologue
# JP: 稀咲の言葉に、安堵する。
3256 = "我放心了。" 

# monologue
# JP: 僕の不用意な発言は、稀咲の機嫌を損ねておらず――\nただ単に、スイッチを切り替えただけと、理解でき。
3100 = "因為我大意的發言並沒有破壞稀咲的心情――只是讓她的大腦切換到了工作上而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国では、銀行も国営なのか」
2020 = "「仲國的銀行也是國營的嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。基本的には国営、国策銀行と考えていい。\n外資の銀行も営業を許可されてはいるけど」
2513 = "「是啊，大部分是國有的，就是政策性銀行。當然外資銀行也是可以經營的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方はどちらなのだ？」
2758 = "「那她是什麼人呢？」" 

# 【稀咲】
# display as 稀咲
# JP: 「国体発展銀行――ばりばりの政策性銀行の、\nかなり中央に近い位置にいる人間だ」
2321 = "「她是國體發展銀行――一家完全政策性銀行的、相當核心的位置的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道関係の融資にも、その銀行はかかわる？」
2761 = "「那家銀行會參與鐵路方面的融資嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「かかわるというより、融資の主体となるはずだ。\nもっとも今は仲国も、大廃線の嵐だけれども」
1983 = "「不止是參加那麼簡單，而是融資的主體。現在仲國也掀起了廢線的潮流」" 

# monologue
# JP: 反冥という政府方針もあってだろうか、\n仲国のエアクラ本格化は日ノ本よりもかなり遅れた。
2972 = "一部分是出於反冥的行政要求，仲國的民航業比日本晚了很久才走上正軌。" 

# monologue
# JP: 今がまさに大廃線の嵐なら――\nその後に、復線の機運が高まる道もありうるだろう。
3362 = "現在掀起廢線潮流的話――以後也有很大機率恢復線路的運輸吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠さんをして要人と扱うに[た]足る地位なわけか。\nなるほど、接待も難しそうだ」
2481 = "「所以就元忠叔叔而言，她可是個貴客啊。那接待起來的確會比較花心思」" 

# 【稀咲】
# display as 稀咲
