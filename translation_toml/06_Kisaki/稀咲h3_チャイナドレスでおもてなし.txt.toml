3750 = "（他很想遲一點再放女兒遠走高飛吧――不對，或許……）" 

# monologue
# JP: こういう機会を、元忠さんは、\nすでに何度か与えてくれていたのかもしれない。
3048 = "元忠叔叔可能已經給過我這樣的機會很多次了。" 

# monologue
# JP: 僕らが受け身でいつづけたのなら、\n気付きも活かしも出来ない類の、いわばヒントを。
3145 = "如果我一直只懂得被動接受就永遠注意不到、利用不上的提示。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、稀咲」
# 2619 = "「稀咲」" 

# 【稀咲】
# display as 稀咲
