2658 = "「而且稀咲和我都有把思考作為樂趣的傾向。“別想太深了”這種安慰話就不用說了吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「あっ」
# 2234 = "「啊」" 

# monologue
# JP: せめてもの気持ちで、肩を揉む。\n普段からのケアのおかげで、さほどの凝りは感じない。
2998 = "但我給她揉了揉肩膀，表達一下心意。不過她平時就有做保養，所以也沒有硬到哪裡去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「せめて現場で、僕も何かを手伝えればな」
2443 = "「我想在現場提供一點幫助啦」" 

# 【稀咲】
# display as 稀咲
