[script]
# lines: 695 
# 【稀咲】
# display as 稀咲
# JP: 「ふーん？\n焼酎の方が日本酒より、更にもう一手間かけてるんだ」
2300 = "「Hừm? Hóa ra shochu lại tốn thêm một công đoạn nữa so với rượu sake nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「随分と意外そうだな」
2051 = "「Trông em có vẻ khá ngạc nhiên đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクが飲むのは、仕事のためだけだから。\nそういうレベルの素人の意見にすぎないけれど――」
2416 = "「Bởi vì em chỉ uống rượu vì công việc thôi mà. Nên đó cũng chỉ là ý kiến của một người nghiệp dư ở mức độ đó thôi――」"
# monologue
# JP: 僕の口調が、不満げに聞こえてしまったのだろうか。\n稀咲はどこか、申し訳なさそうな声を出す。
3264 = "Không biết có phải giọng điệu của tôi nghe có vẻ bất mãn hay không. Mà Kisaki lại cất giọng như thể đang cảm thấy có lỗi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクの場合は、日本酒の方がより澄み切っている\n……みたいなイメージが、先入観としてあって」
2472 = "「Đối với em thì, rượu sake mang lại cảm giác trong vắt hơn ......kiểu như vậy, đó là định kiến từ trước của em rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは確かに。\nむしろ一般的なイメージだろうな」
2290 = "「À, điều đó thì đúng thật. Đúng hơn thì đó là ấn tượng chung của mọi người mà」"
# 【稀咲】
# display as 稀咲
# JP: 「だろう！」
2354 = "「Đúng không!」"
# monologue
# JP: 今度は一転、華やかな声。\n密やかながら確かな変化が、僕に喜びを与えてくれる。
3114 = "Lần này lại đổi sang một giọng nói rạng rỡ. Một sự thay đổi tuy nhỏ bé nhưng rõ ràng, mang lại cho tôi niềm vui."
# monologue
# JP: （あの稀咲が……\n僕の些細なひとことで、これほど一喜一憂するのか）
3796 = "（Một Kisaki như thế...... lại vì một câu nói nhỏ nhặt của tôi mà buồn vui thất thường đến vậy sao）"
# monologue
# JP: 愛おしいなと、芯から思う。
3250 = "Thật đáng yêu, tôi nghĩ vậy từ tận đáy lòng."
# monologue
# JP: だからこそ、大事に素直に接しなければと、\nこころの底から、あらためて自分に刻み込む。
3283 = "Chính vì vậy, tôi lại một lần nữa khắc sâu vào tâm khảm, rằng phải đối xử với em ấy một cách trân trọng và chân thành."
# 【稀咲】
# display as 稀咲
# JP: 「だから、日本酒みたいな醸造酒を、\nさらに蒸留したのが焼酎って話は、ちょっと不思議で」
2485 = "「Vì thế, cái chuyện đem một loại rượu lên men như sake đi chưng cất thêm một lần nữa để thành shochu, nghe có hơi kỳ lạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「理解できれば、不思議でもなんでもない話なのだが。\n――もう少し細かく説明するか？」
2146 = "「Nếu hiểu được thì chẳng có gì kỳ lạ cả đâu. ――Anh giải thích chi tiết hơn một chút nhé?」"
# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。お願いするよ」
2687 = "「Cảm ơn anh. Nhờ anh vậy」"
# monologue
# JP: 笑みがほころぶ。\n酒蔵がほんのり、あたたかみを増す。
3137 = "Nụ cười nở rộ trên môi. Khiến cho xưởng rượu thêm phần ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「日本酒はもちろん、米からつくる。\nで、クマ焼酎。右田の焼酎も、米焼酎だ」
2500 = "「Rượu sake tất nhiên là được làm từ gạo rồi. Và shochu Kuma. Shochu của nhà Migita cũng là shochu gạo」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2735 = "「Đúng vậy nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、蒸留前のクマ焼酎が、果たして日本酒として\n飲めるものかどうか――気にはならんか？」
2784 = "「Vậy thì, liệu shochu Kuma trước khi chưng cất, có thể uống như rượu sake được không――em có tò mò không?」"
# monologue
# JP: 問えば稀咲の瞳が細まる。
3588 = "Nghe tôi hỏi, Kisaki khẽ nheo mắt lại."
# 【稀咲】
# display as 稀咲
# JP: 「気になるとも。飲ませてくれるのかい？」
2593 = "「Tất nhiên là tò mò rồi. Anh định cho em uống thử sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ。あらかじめ許可も受けている」
2738 = "「Chuyện nhỏ. Anh cũng đã xin phép trước rồi」"
# monologue
# JP: 稀咲が強く希望した、右田の蔵の醸造所見学。
3478 = "Chuyến tham quan xưởng ủ rượu của nhà Migita mà Kisaki đã tha thiết mong muốn."
# monologue
# JP: 真闇姉たちも気を利かせ、\n一時間だけ、僕らをふたりきりにしてくれている。
3107 = "Chị Mayami và mọi người cũng rất tâm lý, đã để cho hai chúng tôi có một giờ đồng hồ được ở riêng với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留直前の、いわゆる二次もろみを発酵させ、\n絞ったものがこれだ。日本酒で言えば[なまざけ,1]生酒となるな」
2672 = "「Thứ được ép ra sau khi lên men cơm rượu lần hai ngay trước khi chưng cất, chính là cái này đây. Nếu nói theo kiểu rượu sake thì nó là rượu tươi đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「これは……ボクのために、\nわざわざ用意しておいてくれたのかい？」
2729 = "「Cái này là...... anh đã cất công chuẩn bị sẵn vì em sao?」"
# monologue
# JP: 一升瓶を差し出せばまた、笑顔が弾ける。\nもちろん曇らせたくないが、ウソを言うのも心苦しい。
3255 = "Vừa đưa chai rượu một thăng ra, nụ cười lại bừng sáng trên khuôn mặt em ấy. Tất nhiên là tôi không muốn dập tắt nụ cười đó, nhưng nói dối thì cũng áy náy lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「広く捉えれば、そのとおりだ」
2311 = "「Nói rộng ra thì, đúng là như vậy」"
# 【稀咲】
# display as 稀咲
# JP: 「広く？　って、ああ、そうか。\nボク以外にも、同じ疑問を持つ人間は、結構いるんだ」
2312 = "「Rộng ra á? À, ra vậy. Ngoài em ra, cũng có khá nhiều người có chung thắc mắc này nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ」
2056 = "「Em tinh ý thật đấy」"
# monologue
# JP: 打てば響くでわかってくれる。\nそれが心地よい、いとおしい。
3111 = "Chỉ cần gợi ý một chút là em ấy đã hiểu ngay. Điều đó thật dễ chịu, và cũng thật đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「飲んでみてくれ」
2049 = "「Uống thử đi」"
# monologue
# JP: まだ昼前だ。\nほんのひとくちふたくち程度を、コップに注ぐ。
3101 = "Vẫn chưa đến trưa. Tôi rót vào cốc một lượng chỉ đủ cho một hai ngụm nhỏ."
# monologue
# JP: けれど稀咲は、差し出したコップを受け取らず、\n僕へとそっと押し戻してくる。
3008 = "Thế nhưng Kisaki không nhận lấy chiếc cốc tôi đưa, mà nhẹ nhàng đẩy nó về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2298 = "「Hửm?」"
# 【稀咲】
# display as 稀咲
# JP: 「『飲ませてくれる』んじゃないのかい？\n双鉄が、ボクに」
2468 = "「Chẳng phải anh bảo là 『cho em uống』 sao? Anh Soutetsu, cho em ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2735 = "「這樣啊」" 
# monologue
# JP: 稀咲の舌が、その薄い唇をちろりと舐める。\n誘われている。稀咲に、誘ってもらえてる。
3541 = "Lưỡi của Kisaki khẽ liếm qua đôi môi mỏng manh ấy. Tôi đang bị quyến rũ. Được Kisaki quyến rũ."
# monologue
# JP: その喜びが体を動かす。\nコップを一気に煽ってる。
3088 = "Niềm vui sướng đó thôi thúc cơ thể tôi hành động. Tôi nốc cạn chiếc cốc trong một hơi."
# 【稀咲】
# display as 稀咲
# JP: 「ん……ぷっ……んっ――ごくっ――\nちゅずっ――んっ――ごく――ごくんっ――んふっ」
2268 = "「Ưm...... phu...... ưm――ực―― chu zu――ưm――ực――ực――ưm fu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2809 = "「!」"
# monologue
# JP: 全部を流し込んだあと、ほんの一瞬、稀咲の舌が、\n僕の口内に侵入してくる。
3060 = "Sau khi truyền toàn bộ lượng rượu sang, trong một khoảnh khắc ngắn ngủi, lưỡi của Kisaki xâm nhập vào khoang miệng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「（れるっ――れろっ――ねろおっ）」
2816 = "「（Liếm――liếm――liếm）」"
# monologue
# JP: 舌が、蠢く。ああ、これは――
3606 = "Chiếc lưỡi ngọ nguậy. À, đây là――"
# monologue
# JP: 『ごちそうさま』と、\n声には出さず、舌の動きと気持ちで、伝えてくれる。\n 
2829 = "『Cảm ơn vì bữa ăn』, Không cần nói thành lời, em ấy truyền đạt điều đó qua chuyển động của lưỡi và cảm xúc."
# 【稀咲】
# display as 稀咲
# JP: 「ぷぁ。んふっ……」
2207 = "「Pha. Ưm fu......」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだった？」
2391 = "「Thế nào?」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄が飲ませてくれたからね？\n最高に甘くて美味しかった……といいたいけれど」
2732 = "「Vì là anh Soutetsu cho em uống mà? Nên em rất muốn nói là nó ngọt ngào và ngon tuyệt vời...... nhưng mà」"
# monologue
# JP: 小さく、肩がすくめられる。
3140 = "Em ấy khẽ nhún vai."
# 【稀咲】
# display as 稀咲
# JP: 「残念。すっぱくて美味しいものではなかった。\n日本酒とは、まったく違うお酒だね」
2145 = "「Tiếc thật. Nó chua lè và chẳng ngon lành gì cả. Quả thực là một loại rượu hoàn toàn khác so với sake nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ここで質問だ」
2774 = "「Vậy thì, anh có một câu hỏi cho em đây」"
# monologue
# JP: 普通の酒造見学者には、ここで答えを明かしてる。\nが、稀咲相手だ。もう少しだけ、楽しみたい。
3168 = "Đối với những khách tham quan xưởng rượu bình thường, tôi sẽ tiết lộ câu trả lời ngay tại đây. Nhưng đối phương là Kisaki. Nên tôi muốn tận hưởng thêm một chút nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「米という同じ原料、同じ製法で何故そうなるか。\n少し、考えて見て欲しい」
2592 = "「Cùng một nguyên liệu là gạo, cùng một phương pháp sản xuất, nhưng tại sao lại thành ra như vậy. Anh muốn em thử suy nghĩ một chút xem」"
# 【稀咲】
# display as 稀咲
# JP: 「さっきもいったけど、ボクはお酒の素人だよ？\nまったくのノーヒントでは、厳しいね」
2412 = "「Lúc nãy em đã nói rồi mà, em là dân nghiệp dư về rượu đấy nhé? Nếu hoàn toàn không có gợi ý nào thì khó lắm đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「では……そうだな。米焼酎と日本酒と、\nその代表的な産地を比べてみて欲しい」
2783 = "「Vậy thì...... xem nào. Anh muốn em thử so sánh giữa shochu gạo và rượu sake, cùng với những vùng sản xuất tiêu biểu của chúng」"
# 【稀咲】
# display as 稀咲
# JP: 「米焼酎の代表なら、もちろんクマ――御一夜だよね。\n日本酒は――[にいがた,2]二干潟のイメージが強いかな」
2648 = "「Đại diện cho shochu gạo thì tất nhiên là Kuma――Ohimitera rồi. Còn rượu sake thì――chắc là Niigata để lại ấn tượng mạnh nhất nhỉ」"
# monologue
# JP: 言った瞬間、稀咲は「ああ」と小さく頷く。
3629 = "Vừa dứt lời, Kisaki khẽ gật gù thốt lên \"À\"."
# 【稀咲】
# display as 稀咲
# JP: 「気温差？　それとも年間降水量とか――湿度とか？」
2502 = "「Sự chênh lệch nhiệt độ sao? Hay là lượng mưa hàng năm――hay độ ẩm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな。さすが稀咲だ。その辺の全て――\nつまり、発酵を促す環境の差、だな」
2115 = "「Tuyệt vời. Quả không hổ danh là Kisaki. Là tất cả những yếu tố đó―― Tóm lại là sự khác biệt về môi trường thúc đẩy quá trình lên men, đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「なら――焼酎は暖地、\n日本酒は寒地で作られた方がいいみたいな感じかい？」
2782 = "「Vậy thì――shochu được sản xuất ở vùng ấm áp, còn rượu sake được sản xuất ở vùng lạnh giá sẽ tốt hơn, kiểu như vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。なぜさっき飲んだ“未蒸留の焼酎”が\n酸っぱかったかというと、クエン酸のせいだ」
2352 = "「Ừm. Lý do khiến thứ “shochu chưa chưng cất” em vừa uống lúc nãy có vị chua, là do axit citric đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「クエン酸。くえん、酸。どうりで飲みづらい」
2544 = "「Axit citric. Axit khó nuốt (kuen). Thảo nào khó uống thế」"
# monologue
# JP: ダジャレのつもりか、そうでないのか。\nどちらにしても、稀咲はかなりのご機嫌だ。
3124 = "Chẳng biết là em ấy đang cố chơi chữ hay không nữa. Dù sao đi nữa thì tâm trạng của Kisaki đang rất tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「飲みづらくはあるが、メリットもある。\nクエン酸は酸ゆえ、殺菌能力を持つ」
2097 = "「Tuy khó uống, nhưng nó cũng có ưu điểm. Vì axit citric là một loại axit nên nó có khả năng diệt khuẩn」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ！　つまり余計な雑菌が繁殖しづらくなる。\nだから、高温多湿の地域に向くんだね？」
2281 = "「À! Tức là các loại tạp khuẩn dư thừa sẽ khó sinh sôi hơn. Vì vậy, nó phù hợp với những vùng có nhiệt độ và độ ẩm cao nhỉ?」"
# monologue
# JP: いつもながらのことではあるが、\n理解の早さに舌を巻く。
3126 = "Mặc dù lúc nào cũng vậy, nhưng tôi vẫn luôn phải kinh ngạc trước khả năng thấu hiểu nhanh nhạy của em ấy."
# monologue
# JP: そうして一度巻かれた舌は、\n嬉しさに、よりなめらかになる。
3169 = "Và rồi sự kinh ngạc ấy, nhường chỗ cho niềm vui sướng, khiến tôi nói năng lưu loát hơn hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。そして、日本酒で使う[きこうじ,1]黄麹は、\n酸味がなく、いわゆる澄み切った味を出すが――」
2558 = "「Chính xác. Và men koji vàng dùng trong rượu sake, không có vị chua, tạo ra cái gọi là hương vị trong trẻo, nhưng――」"
# 【稀咲】
# display as 稀咲
# JP: 「酸が弱くて殺菌能力も無いから、雑菌が繁殖し易い\n高温多湿の地域では使えない。だから、寒冷地向き？」
2040 = "「Vì tính axit yếu và không có khả năng diệt khuẩn, nên không thể dùng ở những vùng có nhiệt độ và độ ẩm cao, nơi tạp khuẩn dễ sinh sôi. Do đó, nó phù hợp với vùng lạnh giá sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2366 = "「Đúng vậy」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。だから日本酒は、[なまざけ,1]生酒そのままでも、\nおいしく呑むことができるんだ」
2112 = "「Ra là vậy. Vì thế nên rượu sake, dù uống trực tiếp dưới dạng rượu tươi cũng rất ngon nhỉ」"
# monologue
# JP: わずかな言葉で、多くが通じる。\nこころまで、重ねあえてる気になれる。
3196 = "Chỉ bằng vài lời ngắn gọn mà có thể thấu hiểu nhau nhiều đến vậy. Cảm giác như ngay cả tâm hồn cũng đang hòa quyện vào nhau."
# monologue
# JP: もっともっと、\n稀咲のことばを、稀咲の理解を引き出したくなる。
3241 = "Càng lúc càng muốn, khơi gợi thêm nhiều lời nói, nhiều sự thấu hiểu từ Kisaki hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「一方、黒麹を使う焼酎の二次もろみは、クエン酸を\n含むがゆえに蒸留し、不純物を取り除く必要が出る」
2660 = "「Mặt khác, cơm rượu lên men lần hai của shochu dùng men koji đen, vì chứa axit citric nên cần phải chưng cất để loại bỏ các tạp chất」"
# 【稀咲】
# display as 稀咲
# JP: 「蒸留で、クエン酸も取り除ける？」
2671 = "「Chưng cất cũng có thể loại bỏ được cả axit citric sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「生酒は水とアルコールと不純物とが混じったものだ。\nクエン酸は、アルコールではなく水に溶けている」
2587 = "「Rượu tươi là hỗn hợp của nước, cồn và tạp chất. Axit citric hòa tan trong nước chứ không phải trong cồn」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
2276 = "「Ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「そして、エチルアルコールの沸点は78.37℃。\n水よりも早く沸騰する」
1999 = "「Và, nhiệt độ sôi của ethanol là 78,37°C. Nó sôi nhanh hơn nước」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど！　蒸留っていうのは、アルコールだけを\n沸騰させて、冷やして戻す作業なんだね？」
2448 = "「Ra là thế! Chưng cất nghĩa là, chỉ làm cho cồn sôi lên, rồi làm lạnh để nó ngưng tụ lại thành chất lỏng đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。そうして水も、水に溶けているクエン酸も、\n不純物もまるごと置き去りにする」
2557 = "「Đúng vậy. Bằng cách đó, cả nước, cả axit citric hòa tan trong nước, lẫn các tạp chất đều bị bỏ lại toàn bộ」"
# monologue
# JP: もっとも、エチルアルコールと沸点の近い物質は\nやはり混じってしまう。
2980 = "Tuy nhiên, những chất có nhiệt độ sôi gần với ethanol cuối cùng vẫn sẽ bị lẫn vào."
# monologue
# JP: ゆえに、蒸留酒もまた多種多様。\nさまざまな味わいをそれぞれにもつものとなるのだ。
3096 = "Do đó, rượu chưng cất cũng rất đa dạng và phong phú. Mỗi loại lại mang trong mình những hương vị khác nhau."
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。理屈だねぇ。けど――そういうことなら\n温暖地で日本酒を、寒冷地で焼酎を作ったりも」
2737 = "「Ra vậy. Rất có lý. Nhưng mà――nếu thế thì người ta cũng có thể làm rượu sake ở vùng ấm áp, hay làm shochu ở vùng lạnh giá chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、昨今はできるようになっている。空調、気温、\n菌の環境――金さえあれば、制御可能な時代だからな」
2559 = "「À, dạo gần đây thì người ta đã làm được điều đó rồi. Điều hòa không khí, nhiệt độ, môi trường vi khuẩn――đây là thời đại mà chỉ cần có tiền là có thể kiểm soát được mọi thứ mà」"
# monologue
# JP: そうであっても――どこまで金をかけたとしても、\n狙い通りの味を作ることは不可能だろう。
3001 = "Mặc dù vậy――dù có đổ bao nhiêu tiền đi chăng nữa, việc tạo ra hương vị chính xác như mong muốn vẫn là điều bất khả thi."
# monologue
# JP: ゆえに酒造りは、あの真闇姉が一生涯を注ぎ込む程に\nむつかしく、また面白いものであるのだろう。
3098 = "Chính vì thế, việc ủ rượu mới là một công việc khó khăn và đầy thú vị, đến mức chị Mayami sẵn sàng cống hiến cả cuộc đời mình cho nó."
# 【稀咲】
# display as 稀咲
# JP: 「なるほど……こういう話は楽しいね。\nそれに、大いに参考にもなった」
2733 = "「Ra là vậy...... Những câu chuyện thế này thú vị thật đấy. Hơn nữa, nó cũng giúp ích cho em rất nhiều」"
# 【双鉄】
# display as 雙鐵
# JP: 「参考。なんのだ？」
2060 = "「Giúp ích? Về chuyện gì cơ?」"
# 【稀咲】
# display as 稀咲
# JP: 「来客があるんだよ、[ちゅうごく,1]仲国から。父の古い友人の\n娘さんなんだけどさ、随分気難しい方らしくてね」
2455 = "「Em sắp có khách đến thăm, từ Trọng Quốc. Là con gái của một người bạn cũ của bố em, nhưng có vẻ cô ấy là người khá khó tính」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2518 = "「Ồ」"
# 【稀咲】
# display as 稀咲
# JP: 「日ノ本の特産品に興味をお持ちとのことだから、\nそうしたものを紹介できれば――と考えてるんだ」
2460 = "「Nghe nói cô ấy có hứng thú với đặc sản của Hinomoto, nên em đang nghĩ――nếu có thể giới thiệu cho cô ấy những thứ như vậy thì tốt biết mấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それで右田の蔵の見学か」
2111 = "「Ra là vậy, thế nên em mới đến tham quan xưởng rượu của nhà Migita sao」"
# monologue
# JP: 納得いった。\nと思った瞬間、稀咲はやわらかに首を振る。
3260 = "Hợp lý đấy. Ngay khoảnh khắc tôi vừa nghĩ vậy, Kisaki lại nhẹ nhàng lắc đầu."
# 【稀咲】
# display as 稀咲
# JP: 「“それで”、じゃないよ？　順番が違う。\n来たく来た。そしたら、たまたま参考になっただけ」
1979 = "「Không phải “thế nên” đâu nhé? Trình tự sai rồi. Là do em muốn đến nên mới đến. Và rồi, tình cờ nó lại trở thành tài liệu tham khảo thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「学ぶために来てくれたのではなかったのか？」
2797 = "「Không phải em đến đây để học hỏi sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「海外からのお客様を御案内する蔵見学なら、\nしろ[ぐら]蔵さんの焼酎博物館の方を、ボクは選ぶ」
2334 = "「Nếu là chuyến tham quan xưởng rượu để hướng dẫn khách nước ngoài, thì em sẽ chọn Bảo tàng Shochu của nhà Shirogura cơ」"
# monologue
# JP: 右田にとってはライバルになる酒蔵の名だが、\n悔しいよりも、納得の方が先にたつ。
3664 = "Dù đó là tên xưởng rượu đối thủ của nhà Migita, nhưng thay vì cảm thấy cay cú, tôi lại thấy đồng tình nhiều hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに……あそこは観光客さん向けに、\nかなり洗練された展示案内をしているからな」
2505 = "「Cũng phải...... chỗ đó có hệ thống hướng dẫn trưng bày khá là bài bản dành cho khách du lịch mà」"
# 【稀咲】
# display as 稀咲
# JP: 「けど、ボクはどうしてもここに来たかった。\n理由なんて、そんなのは最初からひとつしかない」
2035 = "「Nhưng mà, em vẫn muốn đến đây bằng mọi giá. Lý do thì, ngay từ đầu đã chỉ có một thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとつ、とは？」
1967 = "「Một lý do, là sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、わかっているのに言わせたいんだ？」
2183 = "「Fufu, anh biết rõ rồi mà còn bắt em phải nói ra sao?」"
# monologue
# JP: 稀咲が、しなだれかかってくる。\n焼酎のせいもあるのだろうか、吐息が熱い。
3495 = "Kisaki ngả người dựa vào tôi. Không biết có phải do tác dụng của rượu shochu hay không, mà hơi thở của em ấy nóng rực."
# 【稀咲】
# display as 稀咲
# JP: 「小さなころから、ずっと興味はあったんだ。\nけど、ボクは意地っ張りだからね。来られなかった」
2435 = "「Từ khi còn nhỏ, em đã luôn tò mò về nơi này rồi. Nhưng mà, vì em là đứa bướng bỉnh mà. Nên em đã không thể đến đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2221 = "「A――」"
# monologue
# JP: 稀咲の指が、甘えてくる。\n僕の胸板でくるくる動く。
3514 = "Ngón tay của Kisaki, nũng nịu chạm vào tôi. Vẽ những vòng tròn trên lồng ngực tôi."
# monologue
# JP: 抱きしめたいが、ぐっと堪える。\n稀咲の声を、もっと聞きたい。
3239 = "Rất muốn ôm lấy em ấy, nhưng tôi cố kìm nén lại. Tôi muốn nghe thêm giọng nói của Kisaki."
# 【稀咲】
# display as 稀咲
# JP: 「ここが、双鉄の家だから」
2739 = "「Bởi vì nơi này, là nhà của anh Soutetsu」"
# monologue
# JP: それは、囁き。\nけれど止まった指先から、胸に直接伝わってくる。
3130 = "Đó là một lời thì thầm. Nhưng từ đầu ngón tay đang dừng lại, nó truyền trực tiếp vào trái tim tôi."
# 【稀咲】
# display as 稀咲
# JP: 「『好きな男の子の家だから』。だよ？」
1550 = "「『Vì đây là nhà của người con trai mà em thích』. Đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2619 = "「Kisaki」"
# monologue
# JP: 稀咲の息に、稀咲の熱に、酔わされる。\n抱き寄せ、ゆっくりとキスをする。
3502 = "Tôi bị say đắm bởi hơi thở, bởi sức nóng của Kisaki. Kéo em ấy vào lòng, tôi chầm chậm trao một nụ hôn."
# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ……んっ――ちゅっ――ちゅむっ」
2266 = "「Ưm...... fu...... ưm――chụt――chu mu」"
# monologue
# JP: 稀咲の口へと舌を差し込み、\nその舌を丁寧に舐めまわす。
3253 = "Đưa lưỡi vào trong miệng Kisaki, tôi cẩn thận mút mát lấy chiếc lưỡi ấy."
# 【稀咲】
# display as 稀咲
# JP: 「あむっ――んっ――ふぁ……んっ――ちゅむっ\nほーへふっ――ふっ――しゅき――んっ――ちゅっ」
2238 = "「A mu――ưm――fua...... ưm――chu mu Anh Houhehu――fu――hích anh――ưm――chụt」"
# monologue
# JP: 酒の、香だ。
3330 = "Là hương, rượu."
# monologue
# JP: 酒蔵内に満ち満ちているのものよりも濃密に、\n稀咲の口内から伝わってくる。
3503 = "Một mùi hương nồng nàn hơn cả thứ đang tràn ngập trong xưởng rượu, truyền đến từ bên trong khoang miệng của Kisaki."
# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ――んっ――ちゅっ――ちゅむっ――\nちゅるっ――ちゅっ――んちゅっ――ふ……あ――」
2265 = "「Ưm...... fu――ưm――chụt――chu mu―― chu ru――chụt――ưm chu――fu...... a――」"
# monologue
# JP: お互いの手が、お互いの体を抱きしめる。\n暑い。熱い。
3227 = "Bàn tay của cả hai ôm chặt lấy cơ thể đối phương. Nóng quá. Nóng rực."
# monologue
# JP: 全身の血に酒が溶け込み、鼓動が速くなっていく。
3642 = "Rượu hòa tan vào máu chạy khắp toàn thân, nhịp tim ngày một đập nhanh hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「――稀咲」
1544 = "「――Kisaki」"
# monologue
# JP: キスでは、足りない。\n抱き合う距離では、遠すぎる。
3620 = "Chỉ hôn thôi thì không đủ. Khoảng cách của một cái ôm, vẫn còn quá xa."
# monologue
# JP: もっと触れたい。触れられたい。近くに行きたい。\nその欲望が、僕をカラカラに乾かして――
3244 = "Muốn chạm vào em ấy nhiều hơn. Muốn được em ấy chạm vào. Muốn tiến lại gần hơn nữa. Dục vọng đó, vắt kiệt tôi đến khô cằn――"
# monologue
# JP: （ごとっ）
3783 = "（Cạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2810 = "「!!」"
# 【稀咲】
# display as 稀咲
# JP: 「あっ」
2234 = "「A」"
# monologue
# JP: 物音。全身の血が冷える。
3556 = "Một tiếng động vang lên. Máu toàn thân tôi bỗng chốc lạnh toát."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1551 = "「............」"
# monologue
# JP: ――けれど、おきない。何もおきない。
1525 = "――Nhưng mà, không có gì xảy ra cả. Chẳng có chuyện gì xảy ra."
# monologue
# JP: ならば、今の物音は、真闇姉がおそらく、\nわざと立ててくれたものだろう。
3665 = "Nếu vậy, tiếng động vừa rồi, có lẽ là do chị Mayami cố tình tạo ra."
# 【稀咲】
# display as 稀咲
# JP: 「残念。時間のようだね？」
2597 = "「Tiếc thật. Có vẻ như hết giờ rồi nhỉ?」"
# monologue
# JP: サバサバとした声を出し、\n稀咲がさりげなく身を離す。
3497 = "Cất giọng điệu thản nhiên, Kisaki khéo léo tách người ra."
# monologue
# JP: けれどもその手はしっかりと、\n僕の指先を掴んでくれてる。
3004 = "Thế nhưng bàn tay ấy vẫn nắm chặt lấy, những đầu ngón tay của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「あっという間だったな。そろそろ行くか」
2601 = "「Thời gian trôi qua nhanh thật đấy. Chúng ta chuẩn bị đi thôi」"
# 【稀咲】
# display as 稀咲
# JP: 「どこへ？　どこへでもボクはついていくけど」
2118 = "「Đi đâu? Dù là đi đâu thì em cũng sẽ theo anh thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて――どうするかな」
2770 = "「Để xem nào――tính sao đây nhỉ」"
# monologue
# JP: ともかく、今はここを出よう。
3055 = "Dù sao thì, bây giờ cứ ra khỏi đây đã."
# monologue
# JP: 真闇姉と顔をあわせてしまうのは、\nどうにも、なんとも気恥ずかしすぎる。
3616 = "Chạm mặt với chị Mayami lúc này, dù thế nào đi nữa, cũng thật sự quá đỗi ngượng ngùng."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に、なにか希望はあるか？」
2066 = "「Kisaki có nguyện vọng gì không?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2444 = "「Để xem nào」"
# monologue
# JP: 稀咲は笑って、僕を引っ張る。
3538 = "Kisaki mỉm cười, kéo tay tôi đi."
# 【稀咲】
# display as 稀咲
# JP: 「軽く、なにかつまみたいかな。\nまだ少し、酔いが残ってるみたいだから」
2447 = "「Em muốn nhấm nháp chút gì đó nhẹ nhàng. Vì có vẻ như em vẫn còn hơi say say」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。頬にクリームがついてるぞ」
2638 = "「Kisaki. Kem dính trên má em kìa」"
# 【稀咲】
# display as 稀咲
# JP: 「……指摘するより、\nさりげなく取って欲しいんだけど？」
1575 = "「......Thay vì chỉ ra, sao anh không tự nhiên lau đi giúp em?」"
# 【双鉄】
# display as 雙鐵
# JP: 「もっともだ」
2456 = "「Cũng phải」"
# monologue
# JP: 指でぬぐって、すぐになめとる。
3262 = "Dùng ngón tay quệt lấy, rồi lập tức liếm sạch."
# 【稀咲】
# display as 稀咲
# JP: 「わ」
2199 = "「Oa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、チーズクリームも旨いものだな。\n予想していたよりもクセが無い」
2316 = "「Hừm, kem phô mai cũng ngon đấy chứ. Không bị ngấy như anh tưởng」"
# 【稀咲】
# display as 稀咲
# JP: 「…………」
# 1551 = "「…………」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 
# monologue
# JP: 稀咲が、驚いた顔をしている。固まっている\n見開かれた目さえもが美しい――ではなく。
3526 = "Kisaki đang mang vẻ mặt ngạc nhiên. Cứng đờ cả người. Ngay cả đôi mắt mở to đó trông cũng thật xinh đẹp――à không phải."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
2389 = "「Sao thế?」"
# 【稀咲】
# display as 稀咲
# JP: 「え？　あ――いや、ね？　その……\n双鉄も少し、酔ってくれてるのかな？　とか思ってさ」
2211 = "「Hả? À――không, chỉ là? Chuyện đó...... Em đang nghĩ, liệu có phải anh Soutetsu cũng hơi say rồi không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？\nなにか、おかしなことでもしたか？」
2476 = "「Anh sao? Anh đã làm chuyện gì kỳ lạ à?」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、無自覚なんだね。すごく嬉しい」
2180 = "「Fufu, anh không tự nhận thức được nhỉ. Em vui lắm」"
# monologue
# JP: 驚き顔が、くすくす笑いに。\n頬がピンクに染まってる。
3118 = "Khuôn mặt ngạc nhiên chuyển sang tiếng cười khúc khích. Đôi má em ấy ửng hồng."
# 【稀咲】
# display as 稀咲
# JP: 「でも、そこまでするなら。\nキスでぬぐってくれた方が、もっと嬉しかったかな？」
1991 = "「Nhưng mà, nếu anh đã làm đến mức đó. Thì thà anh dùng nụ hôn để lau đi, chắc em sẽ còn vui hơn nữa đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！？」
2242 = "「A!?」"
# monologue
# JP: 慌ててあたりを大きく見渡す。
3249 = "Tôi vội vàng đưa mắt nhìn quanh."
# monologue
# JP: 人影はそこそこあるものに、\n僕らを気にする様子の者は……見当たらない。
3084 = "Mặc dù có lác đác vài bóng người, nhưng không thấy ai...... có vẻ như đang để ý đến chúng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ちょっと離れすぎちゃったか。\n永山さんなら、きっとみんなに話してくれたのに」
2324 = "「Hình như chúng ta đi hơi xa quá rồi nhỉ. Nếu là bà Nagayama, chắc chắn bà ấy sẽ kể cho mọi người nghe rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
2507 = "「Ừm」"
# monologue
# JP: 永山夫人のクレープの出店では、\n僕たちも少し順番待ちした。
3226 = "Ở quầy bánh crepe của bà Nagayama, chúng tôi cũng đã phải xếp hàng chờ một chút."
# monologue
# JP: あそこでイチャつき目立ったのなら、\n確かに噂もされかねないが――
3614 = "Nếu lúc đó chúng tôi có những hành động âu yếm gây chú ý, thì chắc chắn sẽ bị đồn thổi, nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなったところで、苦笑される程度だろう。\n婚約者同士がイチャイチャするのは、まぁ当然だ」
2028 = "「Dù có bị đồn thì chắc mọi người cũng chỉ cười trừ thôi. Những người đã đính hôn âu yếm nhau thì cũng là chuyện đương nhiên mà」"
# 【稀咲】
# display as 稀咲
# JP: 「いいや。今のはただのイチャイチャじゃない。\n少なくとも、ボクにとってはね」
1975 = "「Không đâu. Hành động vừa rồi không chỉ đơn thuần là âu yếm. Ít nhất là, đối với em」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 
# monologue
# JP: 何故だ、と視線で尋ねれば、\n稀咲の頬の薔薇色が、もう少しだけ濃さを増す。
3233 = "Tôi dùng ánh mắt để hỏi tại sao, sắc hồng trên má Kisaki lại càng thêm đậm màu."
# 【稀咲】
# display as 稀咲
# JP: 「今のはさ、恋人より、婚約者よりもっと近い仕草だ。\n日々姫にだってしたことが無いくらいじゃないかな？」
2107 = "「Hành động vừa rồi, còn thân mật hơn cả người yêu, hơn cả vị hôn phu nữa. Chắc anh còn chưa từng làm thế với Hibiki bao giờ đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみると、そうかもしれんな」
2322 = "「Nghe em nói vậy, có lẽ là thế thật」"
# monologue
# JP: あんな仕草は、意識して出て来るものではない。\nそう接していた相手など――
3658 = "Những cử chỉ như vậy, không phải cứ có ý thức là làm được. Người mà tôi từng đối xử như vậy――"
# 【稀咲】
# display as 稀咲
# JP: 「妹さんと双鉄の、きっと、日常のひとこまだった。\nそういう距離を、あたたかさを、感じた気がした」
1969 = "「Đó chắc chắn là một khoảnh khắc thường ngày giữa anh Soutetsu và em gái. Em có cảm giác như mình đã chạm đến được khoảng cách đó, sự ấm áp đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん。」
1539 = "「――Ừm.」"
# monologue
# JP: 嬉しくなる、切なくなる。\nほんの少しだけ、泣きそうになる。
3683 = "Vừa vui sướng, lại vừa nhói lòng. Tôi có cảm giác như mình sắp khóc đến nơi."
# monologue
# JP: こんなに自然に、路子のことを語ってくれる――\nそうしてくれる相手が稀咲で、ただ幸せで。
3072 = "Có thể nói về Michiko một cách tự nhiên như thế này―― Người mang lại cho tôi điều đó là Kisaki, tôi chỉ cảm thấy hạnh phúc."
# 【稀咲】
# display as 稀咲
# JP: 「だから、特別。ああ――けど。ふふっ、\nそう考えると、誰にも見られなくて良かったんだね」
2482 = "「Thế nên, nó mới đặc biệt. À――nhưng mà. Fufu, nghĩ lại thì, thật may là không ai nhìn thấy nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう考えると？」
2575 = "「Nghĩ lại thì sao cơ?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクが、双鉄の日常になれた瞬間だもの。\n見せびらかすより、ふたりだけのヒミツにしたい」
2731 = "「Đó là khoảnh khắc em trở thành một phần cuộc sống thường ngày của anh Soutetsu mà. Thay vì khoe khoang, em muốn giữ nó làm bí mật của riêng hai chúng ta hơn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2276 = "「嗯」" 
# monologue
# JP: 僕のささいな仕草から、\n稀咲はしあわせを見つけてくれる。
3203 = "Từ những cử chỉ nhỏ nhặt của tôi, Kisaki luôn tìm thấy được niềm hạnh phúc."
# monologue
# JP: 見つけた小さなしあわせを、\n二人でいれば、宝石にさえ換えられる。
3650 = "Những niềm hạnh phúc nhỏ bé tìm thấy ấy, chỉ cần có hai người, chúng thậm chí có thể hóa thành đá quý."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄、食べる？\nチーズクリーム、気にいったみたいだったから」
2796 = "「Anh Soutetsu, ăn không? Có vẻ anh khá thích kem phô mai mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、交換しよう。\n稀咲がもしもいやでなければ」
2764 = "「Vậy thì, đổi cho nhau nhé. Nếu như Kisaki không phiền」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、ナイショだけどね？　実は――\nメイプルバターも食べたかった！　（あむっ）」
2179 = "「Fufu, bí mật nhé? Thật ra thì―― Em cũng muốn ăn thử bơ phong nữa! （A mu）」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2210 = "「Ây da」"
# monologue
# JP: 僕が手にする食べかけに、\n稀咲がふざけてかぶりついてくる。
3231 = "Vào miếng bánh tôi đang ăn dở trên tay, Kisaki tinh nghịch ngoạm lấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ほらほら、こぼすぞ」
2568 = "「Này này, rớt ra ngoài bây giờ」"
# 【稀咲】
# display as 稀咲
# JP: 「こぼさないように食べさせて？」
2766 = "「Vậy anh đút cho em ăn để không bị rớt đi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も稀咲に、稀咲のを食べさせてもらいたい。\n交代で、でどうだ？」
2401 = "「Anh cũng muốn được Kisaki đút cho ăn phần của em. Chúng ta thay phiên nhau nhé, thấy sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「交代。ふふっ、素敵なことだね」
2493 = "「Thay phiên. Fufu, tuyệt đấy chứ」"
# monologue
# JP: じゃれあいながら、\nふたりでふたつ、クレープをきれいに食べ終わる。
3229 = "Vừa trêu đùa nhau, hai đứa vừa ăn sạch bách hai chiếc bánh crepe."
# monologue
# JP: 口の端、今度は僕がクリームをつければよかったと、\n食べ終わってから、ほんのすこしだけ残念になる。
3569 = "Sau khi ăn xong, tôi cảm thấy hơi tiếc nuối một chút, giá như lúc nãy tôi cũng để kem dính ở khóe miệng thì tốt biết mấy."
# 【稀咲】
# display as 稀咲
# JP: 「ああ美味しかった。\n永山夫人は、何を作ってもおいしくするね」
2599 = "「A, ngon quá đi mất. Bà Nagayama làm món gì cũng ngon hết sẩy nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲も、ずいぶんと上手くなってきているぞ」
2636 = "「Kisaki dạo này nấu ăn cũng lên tay lắm rồi đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「本当かい！？」
2603 = "「Thật sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、この前のだご汁などは、\nまるきり右田の味だった」
2509 = "「Ừm, món súp Dago hôm nọ, hương vị hệt như của nhà Migita luôn」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。頑張ってる甲斐が出てきてるんだね」
2519 = "「Vậy sao. Thế là công sức em nỗ lực cũng bõ công rồi nhỉ」"
# monologue
# JP: 安堵と喜びのいりまじる笑み。\nふんわりと、あたりの空気がまるくなる。
3134 = "Một nụ cười pha lẫn sự an tâm và vui sướng. Bầu không khí xung quanh trở nên êm dịu, nhẹ nhàng."
# 【稀咲】
# display as 稀咲
# JP: 「[まくら,1]真闇先生さまさまだ。\n先行きはまだまだ長いけど」
2378 = "「Đều là nhờ cô giáo Mayami cả đấy. Dù chặng đường phía trước vẫn còn dài」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。真闇姉を超えるところまで目指すのか？」
2798 = "「Ồ. Mục tiêu của em là vượt qua cả chị Mayami sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、超える、超えなくとかじゃなく。\n真闇さんからは習えない味を、身につけたいんだ」
1981 = "「Không, không phải chuyện vượt qua hay không vượt qua. Mà em muốn nắm bắt được những hương vị không thể học từ chị Mayami」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉でも教えられない？」
2609 = "「Hương vị mà ngay cả chị Mayami cũng không thể dạy được sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん、そう。ボクがどうしても覚えたいのは……」
2515 = "「Ừm, đúng vậy. Hương vị mà em muốn ghi nhớ bằng mọi giá là......」"
# monologue
# JP: 稀咲が、ちらと僕を見る。\nいつもの強い瞳ではなく、どこか、伺い見るように。
3524 = "Kisaki liếc nhìn tôi. Không phải bằng ánh mắt kiên định thường ngày, mà có chút gì đó dò xét."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄の――[そごう,1]十川の家の味だから」
2793 = "「Hương vị của nhà Sogou――gia đình của anh Soutetsu cơ」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 
# monologue
# JP: 旧姓を。
3662 = "Họ cũ của tôi."
# monologue
# JP: 右田になる前、産まれたときの僕の名字を、\n何年ぶりに、人の口から聞いただろうか。
3201 = "Cái họ từ khi tôi sinh ra, trước khi đổi thành Migita, đã bao nhiêu năm rồi tôi mới được nghe từ miệng một người khác nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちは、とても――とても嬉しい」
2474 = "「Tấm lòng của em, anh thực sự――thực sự rất vui」"
# monologue
# JP: 言葉が、スムーズにでてこない。
3653 = "Những lời nói, không thể thốt ra một cách trôi chảy."
# monologue
# JP: 嬉しすぎて。これほど嬉しい気持ちをけれど、\n受け取れないことが悲しくて。
3379 = "Quá đỗi vui sướng. Nhưng đồng thời, tôi lại cảm thấy buồn vì không thể đón nhận trọn vẹn niềm vui ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「けれども、それは」
2038 = "「Thế nhưng, chuyện đó」"
# 【稀咲】
# display as 稀咲
# JP: 「無理じゃないよ？　双鉄が必ず。覚えてるから。\n今は例え、心のどこかに、閉じ込めてても」
1994 = "「Không phải là không thể đâu? Anh Soutetsu chắc chắn. Vẫn còn nhớ mà. Cho dù hiện tại, nó đang bị nhốt ở một góc nào đó trong trái tim anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2234 = "「啊」" 
# 【稀咲】
# display as 稀咲
# JP: 「時間をかけて、思い出してよ。\nボクは必ず、その味を双鉄に食べさせてあげる」
2666 = "「Hãy dành thời gian, để nhớ lại đi nhé. Em nhất định, sẽ nấu lại hương vị đó cho anh Soutetsu ăn」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう」
1545 = "「――Cảm ơn em」"
# monologue
# JP: なんといういい女かと。\n結婚したいと、つくづく思う。
3651 = "Thật là một người phụ nữ tuyệt vời làm sao. Tôi lại càng thêm khao khát được kết hôn với em ấy."
# monologue
# JP: 毎日毎夜、切に願っていることではあるが。
3345 = "Dù rằng ngày nào đêm nào, tôi cũng tha thiết mong mỏi điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……それで、だな」
1579 = "「......Tiếp theo, là」"
# 【稀咲】
# display as 稀咲
# JP: 「ごめん。まだ決めきれてないようだ。\nあの人は……どうにも強欲だから」
2487 = "「Xin lỗi anh. Có vẻ như vẫn chưa quyết định được. Người đó...... dù sao cũng quá tham lam mà」"
# monologue
# JP: 先回りされ、嬉しくなる。\n稀咲もやはり、同じ気持ちと伝わってきて。
3560 = "Bị nói trúng tim đen, tôi cảm thấy vui mừng. Bởi tôi cảm nhận được rằng, Kisaki cũng có cùng chung tâm trạng với mình."
# monologue
# JP: だからこそ。どれほど切なくともどかしくとも、\n我慢するしかないとも思う。
3282 = "Chính vì vậy. Dù có đau khổ và bứt rứt đến đâu, tôi cũng nghĩ rằng mình chỉ còn cách kiên nhẫn chờ đợi."
# 【双鉄】
# display as 雙鐵
# JP: 「欲、というのも違うだろう。\n稀咲への愛情の深さゆえのことだ」
2393 = "「Tham lam, nói vậy cũng không đúng đâu. Đó là vì tình yêu thương sâu sắc dành cho Kisaki đấy」"
# monologue
# JP: プロポーズをして、受け入れられて。\n両方の家も大歓迎で。
3352 = "Cầu hôn, và được chấp nhận. Hai bên gia đình cũng hết sức ủng hộ."
# monologue
# JP: けれど結婚できてないのは、\n招待客が決まらぬためだ。
3013 = "Thế nhưng vẫn chưa thể tổ chức đám cưới, là do chưa chốt được danh sách khách mời."
# 【稀咲】
# display as 稀咲
# JP: 「ボクへの愛情？　なのかなぁ？　あの人はただ、\n帝国線路合同会社のコネクションを強化するために」
2594 = "「Tình yêu thương dành cho em sao? Thật vậy không nhỉ? Người đó chỉ là, muốn củng cố mối quan hệ với Công ty TNHH Đường sắt Hoàng gia thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「愛情だろう。その行為こそが」
2027 = "「Chắc chắn là tình yêu thương rồi. Chính hành động đó đã nói lên tất cả」"
# monologue
# JP: 家を出て行く娘のために、\n最大最良の引き出物をと、元忠さんは考えている。
3355 = "Vì cô con gái sắp xuất giá, bác Mototada đang suy tính để chuẩn bị một món quà hồi môn tuyệt vời nhất, hoành tráng nhất."
# monologue
# JP: 式の来賓、招待客。はては仲人――\n全てを任せて欲しいと僕らに、頭を下げてくれてまで。
3368 = "Khách mời danh dự, khách tham dự hôn lễ. Thậm chí là cả người làm mai―― Bác ấy còn cúi đầu nhờ chúng tôi giao phó toàn bộ cho bác ấy lo liệu."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。結婚式の主役は、稀咲。\nゆえに、稀咲にとって最高の式を作りあげたい」
2405 = "「Anh cũng vậy thôi. Nhân vật chính của lễ cưới, là Kisaki. Vì vậy, anh muốn tạo ra một hôn lễ tuyệt vời nhất dành cho Kisaki」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクにとって最高の式は、\n新郎席に、双鉄がいてくれるだけで作れるよ？」
2437 = "「Đối với em, một hôn lễ tuyệt vời nhất, chỉ cần có anh Soutetsu đứng ở vị trí chú rể là đủ rồi mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、言い直そう。稀咲にとって――\nそして稀咲の夢にとって、最高の式を作りたいのだ」
2772 = "「Vậy thì, anh nói lại nhé. Đối với Kisaki―― Và đối với ước mơ của Kisaki, anh muốn tạo ra một hôn lễ tuyệt vời nhất」"
# 【稀咲】
# display as 稀咲
# JP: 「夢……か」
2305 = "「Ước mơ...... sao」"
# monologue
# JP: 稀咲の瞳が、ほんの一瞬閉じられる。\nなにかを思い出すように。なにかを懐かしむように。
3550 = "Đôi mắt của Kisaki nhắm lại trong một khoảnh khắc ngắn ngủi. Như đang nhớ lại điều gì đó. Như đang hoài niệm về điều gì đó."
# 【稀咲】
# display as 稀咲
# JP: 「――うん。確かに。\nボクの夢はいつの間にか、双鉄の夢と重なったよね」
1540 = "「――Ừm. Đúng vậy thật. Ước mơ của em từ lúc nào, đã hòa làm một với ước mơ của anh Soutetsu rồi nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もそう感じている」
2289 = "「Đúng vậy. Anh cũng cảm thấy thế」"
# 【稀咲】
# display as 稀咲
# JP: 「レールを戻し、伸ばし、つなげていくこと。\n[ひのもと,2]日ノ本の、交通に悩む、全ての人へと」
2688 = "「Khôi phục lại đường ray, kéo dài chúng ra, và kết nối chúng lại với nhau. Đến với tất cả những người đang gặp khó khăn về giao thông trên toàn Hinomoto」"
# monologue
# JP: ふと思う。
3271 = "Tôi chợt nghĩ."
# monologue
# JP: 僕と出合わずにいたのなら、\n稀咲の夢は、どんな形をしていたのだろうかと。
3146 = "Nếu như không gặp được tôi, thì ước mơ của Kisaki, sẽ mang hình dáng như thế nào nhỉ."
# 【稀咲】
# display as 稀咲
# JP: 「それは[なまなか,1]生半な夢じゃない。\n僕たちだけでは、叶えられない」
2724 = "「Đó không phải là một ước mơ nửa vời. Chỉ với hai chúng ta, thì không thể nào biến nó thành hiện thực được」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりで同じ夢を抱けていることに、感謝している。\n元忠さんが、それをわかってくださっていることにも」
2434 = "「Anh rất biết ơn vì hai chúng ta có thể cùng chung một ước mơ. Và cũng biết ơn vì bác Mototada đã thấu hiểu điều đó」"
# monologue
# JP: だから、ひたすらに待つしかできない。\n何ひとつさえ投げ出せないし、疎かにも出来ない。
3280 = "Chính vì thế, chúng tôi chỉ có thể kiên nhẫn chờ đợi. Không thể vứt bỏ bất cứ điều gì, cũng không thể lơ là."
# monologue
# JP: 二度と取り返せない多くを、僕らはすでに、\nみんなから、御一夜から、授かっているのだから。
3099 = "Bởi vì chúng tôi đã nhận được rất nhiều thứ không thể nào lấy lại được lần thứ hai, từ mọi người, và từ Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜とも右田とも宝生とも縁もゆかりもなかった、\n旧帝鉄総裁を仲人にまで引っ張ってくださったのだ」
2740 = "「Bác ấy thậm chí còn mời được cựu Tổng giám đốc Đường sắt Hoàng gia, người vốn không có chút liên hệ nào với Ohimitera, nhà Migita hay nhà Houshou, làm người mai mối cho chúng ta mà」"
# 【稀咲】
# display as 稀咲
# JP: 「それだけで、ボクらの会社――\n帝鉄線路合同会社の評価と信頼は、大きく高まる」
2547 = "「Chỉ nội điều đó thôi, đánh giá và sự tin tưởng dành cho công ty của chúng ta―― Công ty TNHH Đường sắt Hoàng gia, đã tăng lên đáng kể rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「結婚式への出席希望者も膨れ上がったと聞いている。\n調整が、そう簡単につかぬだろうとも思うのだがな」
2661 = "「Anh nghe nói số lượng người muốn tham dự lễ cưới cũng tăng lên chóng mặt. Anh nghĩ việc sắp xếp chắc chắn sẽ không hề đơn giản đâu」"
# monologue
# JP: わかってはいる。こころの底から感謝もしている。\nそれでも、やはり――どうしても。
3257 = "Tôi hiểu điều đó. Và cũng biết ơn từ tận đáy lòng. Nhưng dù vậy, quả thực――dù thế nào đi chăng nữa."
# 【稀咲】
# display as 稀咲
# JP: 「……あげたいよね、式」
1565 = "「......Thật muốn, tổ chức lễ cưới sớm nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もう七ヶ月も待たされている。\n僕ら自身にはどうにもできんのが、もどかしい」
2297 = "「Ừm. Chúng ta đã phải chờ đợi tận bảy tháng rồi. Việc bản thân chúng ta không thể làm gì được, thật sự rất bức bối」"
# 【稀咲】
# display as 稀咲
# JP: 「このテの名簿作成は職人芸の世界だからねぇ。\nボクでもまったく、手を出せない」
2676 = "「Việc lập danh sách kiểu này đúng là nghệ thuật của các chuyên gia mà. Đến cả em cũng hoàn toàn bó tay, không thể nhúng tay vào được」"
# monologue
# JP: お手上げだよ、とおどけて肩をすくめてみせる、\n稀咲はどこか……やっぱりどこか、さみしげだ。
3138 = "Bó tay rồi, Kisaki đùa giỡn nhún vai, nhưng ở em ấy vẫn toát lên một vẻ gì đó...... quả nhiên là có chút cô đơn."
# monologue
# JP: そんな稀咲を見たくはなくて、\nなかば無理やり、話を変える。
3220 = "Không muốn nhìn thấy một Kisaki như vậy, tôi nửa gượng ép, chuyển sang chủ đề khác."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば――さっきの話にでてきた要人。\n元忠さんの、古い友人の娘さんという方」
2684 = "「Nhắc mới nhớ――nhân vật quan trọng mà em nhắc đến lúc nãy. Người con gái của bạn cũ bác Mototada ấy」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2276 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「その方も、結婚式の出席リストに入ってくるのか？」
2319 = "「Vị đó, cũng sẽ có tên trong danh sách khách mời dự đám cưới chứ?」"
# 【稀咲】
# display as 稀咲
# JP: 「……さて、どうだろうね？　近しい間柄でもないし。\n今回の面会も、別の要件での来日のついでらしいし」
1585 = "「......Chà, ai biết được nhỉ? Bọn em cũng chẳng thân thiết gì cho cam. Cuộc gặp mặt lần này, hình như cũng chỉ là tiện đường cô ấy đến Nhật vì việc khác thôi」"
# monologue
# JP: 稀咲の声が低くなる。\nしまった。まるで話を変えられてない。
3517 = "Giọng của Kisaki trầm xuống. Thôi chết. Chẳng khác nào chưa hề chuyển chủ đề."
# 【稀咲】
# display as 稀咲
# JP: 「けど……彼女も銀行系だし……国情もある。\nあちらの鉄道系への人脈を持っているのかもしれない」
2030 = "「Nhưng mà...... cô ấy cũng làm trong ngành ngân hàng...... lại còn tùy thuộc vào tình hình quốc gia nữa. Biết đâu cô ấy lại có mối quan hệ với ngành đường sắt bên đó thì sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
2271 = "「À...... ra vậy」"
# monologue
# JP: 稀咲の言葉に、安堵する。
3256 = "Nghe Kisaki nói vậy, tôi cảm thấy nhẹ nhõm."
# monologue
# JP: 僕の不用意な発言は、稀咲の機嫌を損ねておらず――\nただ単に、スイッチを切り替えただけと、理解でき。
3100 = "Lời nói thiếu suy nghĩ của tôi đã không làm Kisaki phật lòng―― Tôi có thể hiểu rằng, em ấy chỉ đơn thuần là chuyển đổi trạng thái suy nghĩ mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「仲国では、銀行も国営なのか」
2020 = "「Ở Trọng Quốc, ngân hàng cũng là của nhà nước sao」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。基本的には国営、国策銀行と考えていい。\n外資の銀行も営業を許可されてはいるけど」
2513 = "「Đúng vậy. Về cơ bản có thể coi đó là ngân hàng quốc doanh, ngân hàng chính sách. Mặc dù các ngân hàng có vốn đầu tư nước ngoài cũng được phép hoạt động」"
# 【双鉄】
# display as 雙鐵
# JP: 「その方はどちらなのだ？」
2758 = "「Vậy vị đó làm ở bên nào?」"
# 【稀咲】
# display as 稀咲
# JP: 「国体発展銀行――ばりばりの政策性銀行の、\nかなり中央に近い位置にいる人間だ」
2321 = "「Ngân hàng Phát triển Quốc thể――một ngân hàng chính sách thực thụ, và cô ấy là người giữ vị trí khá gần với trung tâm quyền lực đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道関係の融資にも、その銀行はかかわる？」
2761 = "「Ngân hàng đó có liên quan đến việc cấp vốn cho các dự án đường sắt không?」"
# 【稀咲】
# display as 稀咲
# JP: 「かかわるというより、融資の主体となるはずだ。\nもっとも今は仲国も、大廃線の嵐だけれども」
1983 = "「Hơn cả liên quan, họ chắc chắn là chủ thể cấp vốn chính đấy. Mặc dù hiện tại Trọng Quốc cũng đang chìm trong cơn bão Đại bãi bỏ các tuyến đường sắt」"
# monologue
# JP: 反冥という政府方針もあってだろうか、\n仲国のエアクラ本格化は日ノ本よりもかなり遅れた。
2972 = "Có lẽ cũng một phần do chính sách phản đối Aerocraft của chính phủ, mà việc phổ biến Aerocraft ở Trọng Quốc diễn ra muộn hơn Hinomoto khá nhiều."
# monologue
# JP: 今がまさに大廃線の嵐なら――\nその後に、復線の機運が高まる道もありうるだろう。
3362 = "Nếu bây giờ đang là đỉnh điểm của cơn bão Đại bãi bỏ các tuyến―― Thì sau đó, rất có thể sẽ mở ra một con đường làm dấy lên phong trào khôi phục lại đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「元忠さんをして要人と扱うに[た]足る地位なわけか。\nなるほど、接待も難しそうだ」
2481 = "「Thảo nào bác Mototada lại coi cô ấy là nhân vật quan trọng. Ra là vậy, việc tiếp đón chắc cũng sẽ khó khăn đây」"
# 【稀咲】
# display as 稀咲
# JP: 「なんだよね。だから、あれこれ考えちゃって」
2355 = "「Đúng vậy đấy. Thế nên em mới phải suy tính đủ đường」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲も僕も、考え事が趣味の様な一面もあるからな。\n『考えすぎるな』などとは、気休めでも言えんが」
2658 = "「Cả Kisaki và anh đều có sở thích là hay suy nghĩ mà. Nên anh cũng chẳng thể nói những câu an ủi kiểu như 『Đừng suy nghĩ nhiều quá』 được」"
# 【稀咲】
# display as 稀咲
# JP: 「あっ」
# 2234 = "「啊」" 
# monologue
# JP: せめてもの気持ちで、肩を揉む。\n普段からのケアのおかげで、さほどの凝りは感じない。
2998 = "Ít nhất thì để thể hiện tấm lòng, tôi bóp vai cho em ấy. Nhờ thường xuyên chăm sóc cơ thể nên vai em ấy cũng không bị căng cứng cho lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「せめて現場で、僕も何かを手伝えればな」
2443 = "「Ít nhất thì ở hiện trường, anh cũng muốn giúp được gì đó」"
# 【稀咲】
# display as 稀咲
# JP: 「！！！」
2811 = "「!!!」"
# monologue
# JP: 稀咲がいきなり振り返る。\n僕の両手を両手で握る。
3529 = "Kisaki đột ngột quay lại. Nắm chặt lấy hai tay tôi bằng cả hai tay của em ấy."
# 【稀咲】
# display as 稀咲
# JP: 「いいね！　双鉄。それでいこう。\nそうだよ、ボクたちは正式な婚約者なんだから」
2326 = "「Hay đấy! Anh Soutetsu. Cứ quyết định vậy đi. Đúng rồi, chúng ta đã là hôn phu hôn thê chính thức của nhau rồi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2282 = "「Ừm!」"
# monologue
# JP: 繋がる。響く。\n稀咲の言わんとすることが伝わってくる。
3292 = "Gắn kết. Đồng điệu. Tôi có thể hiểu được những gì Kisaki định nói."
# 【双鉄】
# display as 雙鐵
# JP: 「婚約者だと紹介してしまうことで、\n結婚式への招待の流れをつくるのか」
2419 = "「Bằng cách giới thiệu anh là vị hôn phu, em định tạo cớ để mời cô ấy đến dự lễ cưới luôn sao」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。[か]彼の国は家族とメンツとを大切にする。\nどんなに古い友人の元へも、挨拶を欠かさないほどに」
2275 = "「Ừm. Quốc gia của cô ấy rất coi trọng gia đình và thể diện. Đến mức dù là bạn bè cũ lâu năm đến đâu, cũng không bao giờ bỏ qua việc chào hỏi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、結婚を知れば式への出席も検討される。\nしかも相手は、元忠氏が“要人”と扱う存在だ」
2759 = "「Vậy thì, nếu biết chuyện kết hôn, cô ấy cũng sẽ cân nhắc việc tham dự lễ cưới. Hơn nữa, đối phương lại là nhân vật mà bác Mototada coi là “yếu nhân” nữa」"
# 【稀咲】
# display as 稀咲
# JP: 「貰えるスケジュールは相当に制限されるよね。\nとなると、明確な締め切りが定まる」
2025 = "「Lịch trình mà chúng ta có thể sắp xếp được chắc chắn sẽ rất hạn hẹp nhỉ. Thế thì, chúng ta sẽ có một hạn chót rõ ràng」"
# 【双鉄】
# display as 雙鐵
# JP: 「……帝国線路合同会社は右肩あがり――\n締め切りを先に定めねば、名簿も定まらんわけだ」
1571 = "「......Công ty TNHH Đường sắt Hoàng gia đang trên đà phát triển―― Nếu không định trước hạn chót, thì danh sách khách mời cũng chẳng thể nào chốt được」"
# monologue
# JP: 納得すれば、苦笑が浮かぶ。\n元忠さんが、その程度を理解してない筈もない。
3611 = "Khi đã hiểu ra vấn đề, tôi khẽ cười khổ. Bác Mototada không thể nào không hiểu được những điều đó."
# monologue
# JP: （娘を手放すその日を少しでも先延ばしにしたかった\n――いいや、違うか？　ひょっとしたら）
3750 = "（Bác ấy muốn trì hoãn ngày con gái mình đi lấy chồng thêm một chút chăng ――Không, không phải sao? Có lẽ nào）"
# monologue
# JP: こういう機会を、元忠さんは、\nすでに何度か与えてくれていたのかもしれない。
3048 = "Những cơ hội như thế này, bác Mototada, có lẽ đã tạo cho chúng tôi vài lần rồi cũng nên."
# monologue
# JP: 僕らが受け身でいつづけたのなら、\n気付きも活かしも出来ない類の、いわばヒントを。
3145 = "Nếu chúng tôi cứ mãi thụ động, thì sẽ chẳng thể nhận ra hay tận dụng được những cơ hội đó, nói cách khác, đó chính là những gợi ý."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、稀咲」
# 2619 = "「稀咲」" 
# 【稀咲】
# display as 稀咲
# JP: 「なんだい双鉄」
2388 = "「Sao thế anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2555 = "「Không――」"
# monologue
# JP: しかし、聞くのもあまりにヤボだ。\nすぐさま話を、今度こそ確実に切り替える。
3002 = "Nhưng mà, hỏi ra thì lại quá mất hứng. Tôi lập tức chuyển chủ đề, lần này thì chắc chắn là phải chuyển."
# 【双鉄】
# display as 雙鐵
# JP: 「その接待には、僕はどのような服でいけばいい？\n普通の背広でかまわないのか？」
2491 = "「Vậy đi tiếp khách thì anh nên mặc đồ gì? Mặc vest bình thường có được không?」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、ビジネスの席ではないし、会食での紹介に\nなるだろうから……セミフォーマルかな？」
1984 = "「Không cần đâu, đây không phải là buổi gặp mặt công việc, mà chắc chỉ là giới thiệu trong bữa ăn thôi nên...... trang phục bán trang trọng chắc là ổn nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「セミフォーマル」
2220 = "「Bán trang trọng」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。ボクも、ドレスを着ることになるし」
2287 = "「Đúng vậy. Em cũng sẽ mặc váy dạ hội mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2518 = "「是嗎」" 
# monologue
# JP: 稀咲がどんなドレスを着るのか――\n想像すれば、すぐに一つの姿が浮かぶ。
3493 = "Kisaki sẽ mặc chiếc váy như thế nào nhỉ―― Vừa tưởng tượng, trong đầu tôi lập tức hiện lên một hình ảnh."
# 【双鉄】
# display as 雙鐵
# JP: 「仲国の方の接待となると、\nやはり、チャイナドレスを着たりするのか？」
2489 = "「Tiếp đón khách từ Trọng Quốc, thì em sẽ mặc sườn xám sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「あれ？　意外。\n双鉄はあまり、パーティーに出る方では無かった？」
2191 = "「Ủa? Bất ngờ thật đấy. Anh Soutetsu không hay tham gia các buổi tiệc tùng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのような立場にいなかったからな。\n御一夜に戻ってくる前は、酒問屋の社員兼帝大生だ」
2302 = "「Anh đâu có ở vị thế để tham gia mấy chuyện đó. Trước khi trở về Ohimitera, anh chỉ là nhân viên của một cửa hàng bán buôn rượu kiêm sinh viên Đại học Hoàng gia thôi mà」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだったっけ。\n双鉄には貫禄があるから、ついつい、ね」
2246 = "「À, đúng rồi nhỉ. Tại anh Soutetsu có phong thái chững chạc quá, nên em cứ vô tình nghĩ vậy」"
# monologue
# JP: 稀咲が、少し背伸びする。\nあわせて腰をかがめれば、耳元近く、密やかな声。
3547 = "Kisaki hơi kiễng chân lên. Tôi cũng cúi người xuống phối hợp, một giọng nói thầm thì vang lên bên tai tôi."
# 【稀咲】
# display as 稀咲
# JP: 「覚えておいて？　双鉄。民族衣装は、\n“自国のもの”しか、礼服としては扱えないよ？」
2753 = "「Anh nhớ kỹ nhé? Anh Soutetsu. Trang phục truyền thống, chỉ có “của nước mình” thì mới được coi là lễ phục thôi đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか。\nでは、日ノ本人の場合は、和服か」
2734 = "「Ra là vậy. Thế thì, đối với người Hinomoto, là Kimono nhỉ」"
# 【稀咲】
# display as 稀咲
# JP: 「あれあれ？　双鉄は残念そうだね」
2193 = "「Ủa ủa? Trông anh Soutetsu có vẻ tiếc nuối nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――ああ、うむ。残念といえば残念か。\n無論、稀咲の和装も、極めて目に嬉しいものだが」
1977 = "「Không――à, ừm. Tiếc thì cũng có tiếc. Tất nhiên, Kisaki mặc Kimono cũng vô cùng mãn nhãn rồi」"
# monologue
# JP: しかし、和装であれば正月など、\n他にも目にする機会はある。
3010 = "Nhưng mà, nếu là Kimono thì vào dịp năm mới, hay những dịp khác cũng có cơ hội được ngắm."
# monologue
# JP: けれど、チャイナドレス姿は一度も――
3012 = "Còn sườn xám thì chưa một lần nào――"
# 【稀咲】
# display as 稀咲
# JP: 「つまり、見たいんだね？\n双鉄は、ボクの、チャイナドレスが」
2750 = "「Tóm lại là, anh muốn xem đúng không? Anh Soutetsu, muốn xem em mặc, sườn xám」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 
# monologue
# JP: また、耳元に。\n今度はさっきよりも、熱くて甘く、濡れた声。
3116 = "Lại thì thầm vào tai tôi. Lần này, giọng nói còn nóng bỏng, ngọt ngào và ướt át hơn cả lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――見たい」
2262 = "「Ừm――anh muốn xem」"
# monologue
# JP: 酒蔵で散らされた熱情が、\nさらに強く濃く集まってくる。
3102 = "Ngọn lửa nhiệt tình bị dập tắt trong xưởng rượu, nay lại tụ tập về, mãnh liệt và sâu đậm hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、稀咲のチャイナドレス姿を見たい」
2445 = "「Anh muốn ngắm nhìn dáng vẻ Kisaki trong bộ sườn xám」"
# 【稀咲】
# display as 稀咲
# JP: 「いいよ？　なら見せてあげる。\n行こ？　双鉄」
2327 = "「Được thôi? Vậy em sẽ cho anh xem. Đi nào? Anh Soutetsu」"
# monologue
# JP: どこへ、と言わず稀咲が僕の腕を取る。\n行き先がどこであろうとも、僕の答えは変わらない。
3485 = "Không nói đi đâu, Kisaki nắm lấy cánh tay tôi. Dù điểm đến là nơi nào đi chăng nữa, thì câu trả lời của tôi vẫn không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。見せてくれ」
2291 = "「Ừm. Cho anh xem đi」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄。着たよ？」
2795 = "「Anh Soutetsu. Em mặc xong rồi nè?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2214 = "「Ồ」"
# monologue
# JP: 稀咲の声に、期待が高まる。\nが――待てど暮らせど、稀咲の姿が現れない。
3518 = "Giọng nói của Kisaki khiến sự mong đợi trong tôi tăng cao. Nhưng――chờ mãi, đợi mãi, vẫn không thấy bóng dáng Kisaki đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
2641 = "「Kisaki?」"
# 【稀咲】
# display as 稀咲
# JP: 「あー……これ、ちゃんと仲国で採寸して仕立てた、\n本場の、本格的なヤツなんだ」
2230 = "「A...... bộ này, là đồ chính hiệu, được đo may đàng hoàng ở Trọng Quốc đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2276 = "「嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「だからその……日ノ本の民族性とは、馴染まない」
2478 = "「Nên là...... nó không hợp với tính cách dân tộc của Hinomoto cho lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2479 = "「Hừm?」"
# 【稀咲】
# display as 稀咲
# JP: 「実際、試着してそのまま、お蔵入りさせてた。\nいままで、誰にも見せたことがないんだ」
2467 = "「Thực ra, sau khi mặc thử xong là em cất luôn vào tủ. Từ đó đến giờ, em chưa từng cho ai xem cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「誰にも？　元忠氏や日々姫にもか？」
2022 = "「Chưa cho ai xem sao? Cả bác Mototada hay Hibiki cũng vậy à?」"
# 【稀咲】
# display as 稀咲
# JP: 「見せられるわけないよ！！　試着室で着てたのさえ\n一瞬だった。ひとりでだって、恥ずかしすぎて」
2441 = "「Làm sao mà cho xem được chứ!! Ngay cả lúc mặc trong phòng thử đồ cũng chỉ dám mặc một thoáng thôi. Dù chỉ có một mình, em cũng thấy xấu hổ lắm rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2314 = "「Trời đất」"
# monologue
# JP: 稀咲の声が、めずらしく感情的になっている。
3519 = "Giọng nói của Kisaki hiếm khi lại trở nên bối rối thế này."
# monologue
# JP: そこまで稀咲を動揺させるチャイナドレスが、\n果たしていかなるものなのか、ますます気になる。
3180 = "Chiếc sườn xám có thể khiến Kisaki lúng túng đến vậy, rốt cuộc trông như thế nào, tôi càng lúc càng tò mò."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ。早く見せてくれ」
2429 = "「Anh mong lắm rồi đấy. Nhanh cho anh xem đi」"
# 【稀咲】
# display as 稀咲
# JP: 「う、うん――だよね。\n見せてあげる、ってボクがいったんだし」
2243 = "「Ư, ừm――anh nói phải. Chính em đã nói là sẽ cho anh xem mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2213 = "「Ồ――」"
# monologue
# JP: 美しい。\nその一言しか浮かんでこない。
3381 = "Đẹp quá. Trong đầu tôi chỉ hiện lên đúng một từ đó."
# monologue
# JP: ああ、いや、もう一言もすぐに出てきた。
3091 = "À, không, một từ khác cũng ngay lập tức nảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「美しいし、かわいらしいな」
2604 = "「Vừa đẹp, lại vừa đáng yêu nữa」"
# 【稀咲】
# display as 稀咲
# JP: 「か、かわいらしい？　かな」
2148 = "「Đ-Đáng yêu á? Thật không」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。シニヨンであっているか？\n頭のおだんごが、なんとも愛くるしいぞ」
2517 = "「Ừm. Kiểu tóc búi chignon đúng không? Hai cái búi tóc trên đầu em, trông đáng yêu cực kỳ luôn」"
# 【稀咲】
# display as 稀咲
# JP: 「そ、そっか！　うんっ。\nがんばってまとめてみて、よかったかな」
2723 = "「V-Vậy sao! Ừm. Cất công búi lên thế này, đúng là bõ công nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 
# monologue
# JP: 稀咲が、実にそわそわしている。\n足をもじもじ――っ！！？
3483 = "Kisaki đang thực sự rất bồn chồn. Đôi chân cứ xoắn xuýt vào nhau――!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおっ！？」
2215 = "「Ồ!?」"
# 【稀咲】
# display as 稀咲
# JP: 「はうっ」
2239 = "「Hau」"
# monologue
# JP: 気づけば、稀咲が自分の体を隠そうと――っ！
3143 = "Bất chợt, Kisaki cố gắng che giấu cơ thể mình――!"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのままだ。\n隠さずそのまま、全身をきちんと見せてくれ」
1993 = "「Không, cứ giữ nguyên như vậy đi. Đừng che lại, hãy để anh ngắm nhìn toàn bộ cơ thể em」"
# 【稀咲】
# display as 稀咲
# JP: 「う、うん」
2231 = "「Ư, ừm」"
# monologue
# JP: 稀咲が自身を抱きしめようとしていた腕が、戻される。\nそのゆるやかな動きさえもが――
3481 = "Vòng tay đang định ôm lấy cơ thể của Kisaki từ từ buông thõng xuống. Ngay cả chuyển động chậm rãi đó cũng――"
# 【双鉄】
# display as 雙鐵
# JP: 「すごい、な――チャイナドレスとは、\nここまで体の線が出る……いや、出すものなのか」
2458 = "「Tuyệt thật, đấy――Sườn xám, lại có thể tôn lên đường cong cơ thể đến mức này sao...... à không, phải nói là phô bày ra mới đúng」"
# monologue
# JP: 布地の薄さ・繊細さと、極めて正確な採寸と\n稀咲自体のプロポーションのメリハリと。
3607 = "Độ mỏng manh, tinh tế của chất vải, cùng với số đo vô cùng chính xác, và cả những đường nét quyến rũ trên cơ thể của chính Kisaki."
# monologue
# JP: その三者が完全に合致して、体の線が――\n見えるというより、浮き出している。\n                                                
2973 = "Sự kết hợp hoàn hảo của ba yếu tố đó, khiến đường cong cơ thể―― Không chỉ là nhìn thấy, mà như đang nổi hẳn lên vậy."
# 【稀咲】
# display as 稀咲
# JP: 「本場の……仲国の一流の工房でお願いしたんだ」
2730 = "「Em đã đặt may ở...... một xưởng may hàng đầu tại Trọng Quốc đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「工房」
2532 = "「Xưởng may sao」"
# 【稀咲】
# display as 稀咲
# JP: 「その……あの国では、まったく文化が違うんだ。\n体の線とか、下着とか、気にしないっていう感じで」
2580 = "「Chuyện đó...... văn hóa ở quốc gia đó hoàn toàn khác biệt. Kiểu như họ không mấy bận tâm đến việc để lộ đường cong cơ thể, hay đồ lót đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
2228 = "「Ư...... m」"
# monologue
# JP: 下着と言われてしまうなら、下半身へと目が向かう。\nスリットは、極めて上品だ。
3316 = "Nhắc đến đồ lót, ánh mắt tôi bất giác hướng về nửa thân dưới của em ấy. Đường xẻ tà, cực kỳ thanh lịch."
# monologue
# JP: 稀咲の足の長さもあって、\nサイド部分に危なっかしさは感じない。が――
3520 = "Nhờ đôi chân dài của Kisaki, nên phần xẻ hai bên hông không mang lại cảm giác hớ hênh. Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「完全に、透けてしまっているな」
2721 = "「Nhìn thấu, toàn bộ luôn rồi kìa」"
# 【稀咲】
# display as 稀咲
# JP: 「ううっ」
2256 = "「Ư ư」"
# monologue
# JP: 稀咲の下着も、その下さえも、\n何度も何度も直接目にして、味わっている。
3499 = "Đồ lót của Kisaki, và cả những gì bên dưới đó nữa, tôi đã trực tiếp nhìn thấy, đã tận hưởng không biết bao nhiêu lần rồi."
# monologue
# JP: というのに稀咲は、全裸のときより\nよほど恥じ入ってしまっている。
3583 = "Ấy vậy mà lúc này, Kisaki lại tỏ ra xấu hổ hơn cả lúc khỏa thân."
# 【双鉄】
# display as 雙鐵
# JP: 「黒、だな」
2807 = "「Màu đen, nhỉ」"
# 【稀咲】
# display as 稀咲
# JP: 「う、うん、黒。同じ色の方が、まだしも――\n透けても、目立たないかと思って」
2232 = "「Ư, ừm, màu đen. Cùng màu thì, ít ra―― dù có bị nhìn xuyên thấu, cũng sẽ không quá nổi bật」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。言われるまでは、気づかなかった」
2510 = "「Cũng đúng. Cho đến khi em nói, anh mới nhận ra đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
2177 = "「Fufu」"
# monologue
# JP: チャイナドレスに着替えて初めて、稀咲が微笑む。\nそれだけで僕まで、ほっとし、とても嬉しくなる。
3567 = "Kể từ lúc thay sườn xám đến giờ, Kisaki mới mỉm cười. Chỉ vậy thôi cũng đủ khiến tôi thở phào nhẹ nhõm, và cảm thấy vô cùng vui sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした。なにか僕がおかしなことでもいったか？」
2387 = "「Sao thế. Anh nói gì kỳ lạ à?」"
# 【稀咲】
# display as 稀咲
# JP: 「いいや。双鉄だなぁって思ってさ。\n嬉しくって、愛しくって。それでつい、ね」
2556 = "「Không đâu. Em chỉ nghĩ, đúng là anh Soutetsu có khác. Vui quá, đáng yêu quá. Nên em lỡ cười thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにが、僕だ？」
2440 = "「Anh thì, làm sao cơ?」"
# 【稀咲】
# display as 稀咲
# JP: 「だってさ。このドレスだよ？」
2072 = "「Thì đó. Em đang mặc bộ váy này mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 
# monologue
# JP: 照れを抑えた稀咲にスラリと立たれると、\n今度は僕が気恥ずかしくなる。
3377 = "Thấy Kisaki kìm nén sự xấu hổ mà đứng thẳng người lên, lần này đến lượt tôi cảm thấy ngượng ngùng."
# monologue
# JP: 着衣で、これほど裸に近い。\n裸でない分、目のやり場に非常に困る。
3554 = "Mặc quần áo, mà lại gần với trạng thái khỏa thân đến thế này. Chính vì không khỏa thân, nên tôi mới không biết phải để mắt vào đâu."
# 【稀咲】
# display as 稀咲
# JP: 「普通は、体を見ると思う。男でも、女でさえも。\nでも、双鉄は真っ先にボクの顔を見て――うふふっ」
2465 = "「Bình thường thì, người ta sẽ nhìn vào cơ thể. Dù là đàn ông, hay thậm chí là phụ nữ. Nhưng mà, anh Soutetsu lại nhìn vào mặt em đầu tiên――ufufu」"
# monologue
# JP: 稀咲が笑えば、ドレス自体も本当に可憐で、\n美しいものだと引き立ってくる。
3539 = "Khi Kisaki cười, bản thân bộ váy cũng thực sự trở nên vô cùng đáng yêu, và vẻ đẹp của nó càng được tôn lên gấp bội."
# 【稀咲】
# display as 稀咲
# JP: 「シニヨンを見て、かわいいって！\n双鉄だなってすごく思って、嬉しくて」
2070 = "「Nhìn kiểu tóc búi chignon của em, anh khen đáng yêu! Em thấy đúng chuẩn anh Soutetsu luôn, nên em vui lắm」"
# monologue
# JP: とん、と稀咲が近寄ってくる。
3532 = "Bịch một cái, Kisaki tiến lại gần tôi."
# monologue
# JP: 弾む、軽やかな足取りで。\n黒アゲハ蝶が舞うように。
3644 = "Với những bước chân nhẹ nhàng, nảy bật. Như một chú bướm phượng đen đang nhảy múa."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄を好きになって。双鉄と恋ができて。\n本当に幸せで――ただ、それだけだよ」
2250 = "「Thích anh Soutetsu. Yêu anh Soutetsu. Thực sự rất hạnh phúc――chỉ vậy thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。僕も幸せだ。\n即物的と思われてしまうかもしれないが――」
2640 = "「Kisaki. Anh cũng hạnh phúc lắm. Có thể em sẽ nghĩ anh thực dụng, nhưng――」"
# monologue
# JP: それでもこれほど、心が動かされている。\n言葉にせずにはいられない。
3006 = "Dù vậy, trái tim anh vẫn rung động đến nhường này. Không thể không nói ra thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲がこれほどに美しいと、\n美しい女に愛される幸福を、改めて強く感じた」
2428 = "「Khi thấy Kisaki xinh đẹp đến thế này, anh lại một lần nữa cảm nhận sâu sắc niềm hạnh phúc khi được một người phụ nữ xinh đẹp yêu thương」"
# 【稀咲】
# display as 稀咲
# JP: 「頑張ってるから。\n双鉄のためにも、自分のためにも」
2432 = "「Vì em đã rất cố gắng mà. Vì anh Soutetsu, và cũng vì chính bản thân em nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「美しくあろうとか？」
2590 = "「Cố gắng để trở nên xinh đẹp sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。双鉄を、誰にも取られたくないからね」
2296 = "「Ừm. Vì em không muốn anh Soutetsu bị ai khác cướp mất đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「取られるなどと――」
2012 = "「Bị cướp mất gì chứ――」"
# monologue
# JP: あらためて稀咲をまじまじと見る。
3270 = "Tôi lại một lần nữa chăm chú nhìn Kisaki."
# monologue
# JP: 理性的に整った顔立ちは、けれど表情を変えるたび、\nかわいらしさや妖艶ささえをも描き出す。
3563 = "Khuôn mặt thanh tú đầy lý trí, nhưng mỗi khi thay đổi biểu cảm, lại toát lên vẻ đáng yêu hay thậm chí là yêu kiều, quyến rũ."
# monologue
# JP: そして、体は――
3585 = "Và, cơ thể thì――"
# monologue
# JP: （ごくりっ）
3778 = "（Ực）"
# monologue
# JP: 触れたいと、その丸い胸を揉みたいと、\n重い気持ちを、なんとか言葉に落とし込む。
3245 = "Muốn chạm vào, muốn nắn bóp bộ ngực tròn trịa ấy, tôi cố gắng diễn đạt những cảm xúc mãnh liệt này thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「――これほど完璧なバランスだ。\n女性美とは、稀咲のためのことばだろうに」
1543 = "「――Sự cân đối hoàn hảo đến nhường này. Vẻ đẹp của người phụ nữ, chắc hẳn là từ ngữ dành riêng cho Kisaki rồi」"
# monologue
# JP: “文化の違い”と稀咲が何度か言っていた、\nその意味を、視覚情報で理解する。
3487 = "“Sự khác biệt về văn hóa” mà Kisaki đã nhắc đến vài lần, tôi đã hiểu được ý nghĩa của nó thông qua những gì nhìn thấy."
# monologue
# JP: 日ノ本文化が、女性の曲線を隠すものなら、\n仲国文化は、曲線を見せる文化なのだと。
3324 = "Nếu văn hóa Hinomoto là che giấu đi những đường cong của người phụ nữ, thì văn hóa Trọng Quốc lại là văn hóa phô bày những đường cong ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……この姿を、誰にも見せずにいてくれて、\n本当によかった」
1586 = "「......Em đã không cho ai xem dáng vẻ này, thật sự tốt quá rồi」"
# 【稀咲】
# display as 稀咲
# JP: 「それは、どうして？」
2574 = "「Tại sao anh lại nói vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうしても何も――」
2725 = "「Tại sao gì chứ――」"
# monologue
# JP: 稀咲がしゃべるそれだけで、\nほんのわずかな腹の動きが、見て取れる。
3543 = "Chỉ cần Kisaki nói chuyện, là tôi có thể nhìn thấy những chuyển động nhỏ nhất nơi bụng em ấy."
# monologue
# JP: そうして、それは、\nわずかで、あえかな動きだからこそ――
3587 = "Và, chính vì đó là những chuyển động nhỏ nhoi, mong manh――"
# 【双鉄】
# display as 雙鐵
# JP: 「……男であれば、誰でも稀咲に欲を[いだ]抱く。\n稀咲を、犯したくなるだろうからな」
1576 = "「......Là đàn ông, ai cũng sẽ khao khát Kisaki. Chắc chắn sẽ muốn chiếm đoạt Kisaki mất thôi」"
# monologue
# JP: 危険を強調するために、あえて汚い言葉を使う。\nそれほどに、この欲望は直線的で、動物的だ。
3372 = "Để nhấn mạnh sự nguy hiểm, tôi cố tình dùng những từ ngữ thô tục. Dục vọng này trực diện và mang tính bản năng đến vậy đấy."
# monologue
# JP: 完成された女性美が、これほど男を、\nいや雄を掻き立てるものだと僕さえ、初めて知った。
3272 = "Vẻ đẹp hoàn mỹ của người phụ nữ, lại có thể kích thích đàn ông, à không, kích thích bản năng giống đực đến nhường này, đến tôi cũng mới biết lần đầu."
# 【稀咲】
# display as 稀咲
# JP: 「それは……怖いね。とても嫌だ」
2744 = "「Như thế thì...... đáng sợ thật. Em ghét lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。稀咲が警戒してくれている、その数百倍、\n恐らく危うい。その姿は、男の理性をたやすく壊すぞ」
2285 = "「Ừm. Có lẽ còn nguy hiểm gấp hàng trăm lần so với những gì Kisaki đang cảnh giác đấy. Dáng vẻ đó, có thể dễ dàng phá nát lý trí của đàn ông đó」"
# 【稀咲】
# display as 稀咲
# JP: 「けど、双鉄は」
2041 = "「Nhưng mà, anh Soutetsu thì sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 
# monologue
# JP: 稀咲の指が伸びてくる。\nけれど、僕へと触れはしない。
3469 = "Ngón tay của Kisaki vươn tới. Nhưng lại không hề chạm vào tôi."
# monologue
# JP: 頬から顎へ、胸から臍へ、その下へ――\nギリギリの線で触れぬまま、形をなぞり下りていく、
3123 = "Từ má xuống cằm, từ ngực xuống rốn, rồi xuống thấp hơn nữa―― Vuốt ve dọc theo hình dáng cơ thể ở một khoảng cách sít sao mà không hề chạm vào."
# 【稀咲】
# display as 稀咲
# JP: 「理性。しっかり保ってるよね？\n双鉄の理性を壊せるほどには、魅力、無い？」
2053 = "「Lý trí. Anh vẫn đang giữ vững đúng không? Chẳng lẽ em không đủ sức hấp dẫn, để phá vỡ lý trí của anh Soutetsu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「魅力は、余りあるほどだ」
2806 = "「Sức hấp dẫn, có thừa là đằng khác」"
# monologue
# JP: 股間を、わずかに突き出して見せる。
3274 = "Tôi hơi ưỡn đũng quần ra cho em ấy thấy."
# monologue
# JP: ズボンの上からであってなお、\n僕がどれほど高まってるかは明白だ。
3178 = "Dù chỉ nhìn qua lớp quần, cũng đủ thấy rõ tôi đang hưng phấn đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「けれど理性が壊れぬように、\nより多くの想いが守ってくれているだけだ」
2034 = "「Nhưng để lý trí không bị phá vỡ, chỉ là do có nhiều tình cảm khác đang bảo vệ nó thôi」"
# 【稀咲】
# display as 稀咲
# JP: 「より多くの想い？」
2529 = "「Nhiều tình cảm khác?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に対する、無数の“好き”が、だ」
2521 = "「Là vô số những tình cảm “yêu thích” dành cho Kisaki đấy」"
# monologue
# JP: 稀咲が、はっと僕を見上げる。\nその眼差しが、僕を捉える。
3528 = "Kisaki giật mình ngước nhìn tôi. Ánh mắt ấy, ghim chặt lấy tôi."
# monologue
# JP: 僕の大好きな知性の光は、\n欲望に濡れる瞳の中でも、曇りはしない。
3610 = "Ánh sáng của sự thông tuệ mà tôi hằng yêu thích, dù trong đôi mắt đẫm lệ dục vọng, vẫn không hề bị che mờ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は稀咲が、稀咲であると知っている。\n稀咲の全てを愛しているし、尊敬している」
2463 = "「Anh biết Kisaki, chính là Kisaki. Anh yêu tất cả mọi thứ thuộc về Kisaki, và cũng rất tôn trọng em」"
# 【稀咲】
# display as 稀咲
# JP: 「……っ」
1552 = "「......」"
# monologue
# JP: 稀咲の口元が小さく動く。
3505 = "Khóe miệng Kisaki khẽ động đậy."
# monologue
# JP: 何かを言おうとして飲み込んだのかもしれないし、\n表情を押さえ込んでいるのかもしれない。
3074 = "Có lẽ em ấy định nói gì đó nhưng lại nuốt vào trong, hoặc cũng có thể em ấy đang cố kìm nén cảm xúc của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は稀咲を傷つけたくない、捻じ曲げたくない。\n稀咲が稀咲でなくなることを、何より強く恐れている」
2397 = "「Anh không muốn làm tổn thương Kisaki, không muốn bóp méo con người em. Anh sợ hãi hơn bất cứ điều gì, việc Kisaki không còn là Kisaki nữa」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、双鉄の理性は、さ――」
2781 = "「Vậy thì, lý trí của anh Soutetsu, đã――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2813 = "「!!?」"
# monologue
# JP: 稀咲が、胸をおしつけてくる。
3477 = "Kisaki ép sát ngực vào tôi."
# monologue
# JP: 股間と股間を密着させて、\nゼロ距離から――蕩ける言葉を流し込んでくる。
3228 = "Đũng quần dán chặt lấy nhau, từ cự ly số không――em ấy rót vào tai tôi những lời lẽ ngọt ngào làm tan chảy tâm trí."
# 【稀咲】
# display as 稀咲
# JP: 「ボクが、ボクじゃなかったら。\nとっくに壊れちゃってるの？」
2329 = "「Nếu em, không còn là em nữa. Thì lý trí của anh đã sụp đổ từ lâu rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その仮定は――無意味だ。\n稀咲は、稀咲だ」
2067 = "「Giả thiết đó――thật vô nghĩa. Kisaki, là Kisaki」"
# 【稀咲】
# display as 稀咲
# JP: 「無意味かどうか、試してみる？」
2104 = "「Có vô nghĩa hay không, anh muốn thử không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！？」
2812 = "「!!!?」"
# monologue
# JP: 稀咲が僕の前にたつ。\n背中を向けて――顔を、見せないようにして。
3534 = "Kisaki đứng trước mặt tôi. Quay lưng lại――như để giấu đi khuôn mặt của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
# 2641 = "「稀咲？」" 
# 【稀咲】
# display as 稀咲
# JP: 「じゃ、ないって思ってみて？　ここにいるのは、\nボクそっくりな、けれど稀咲じゃない女だって」
2752 = "「Vậy, anh cứ thử nghĩ không phải thế xem sao? Rằng người đang ở đây, là một người phụ nữ giống hệt em, nhưng không phải là Kisaki」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲ではない――女」
2377 = "「Không phải là Kisaki――một người phụ nữ」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、ただの女。ただの女の、ただの肉体」
2356 = "「Đúng vậy, chỉ là một người phụ nữ. Một thể xác, của một người phụ nữ bình thường」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故、そんなことを――」
2573 = "「Tại sao, em lại nói vậy――」"
# 【稀咲】
# display as 稀咲
# JP: 「知りたいんだ。双鉄は、ボクの外観だけでも――\nボクを好きになって、興奮してくれるのかなって」
2426 = "「Em muốn biết. Liệu anh Soutetsu, chỉ cần vẻ bề ngoài của em thôi―― cũng có thể yêu thích em, và cảm thấy hưng phấn không」"
# monologue
# JP: ああ――そうなのかと理解する。\n僕がいつでも、どこかでは不安であるように。
3087 = "À――tôi đã hiểu ra vấn đề. Cũng giống như tôi luôn cảm thấy bất an ở một góc nào đó trong lòng."
# monologue
# JP: 稀咲でさえも、自分自身に、\n自信を持てぬ部分を有しているのだと。
3466 = "Ngay cả Kisaki, cũng có những khía cạnh mà em ấy không thể tự tin vào chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「確かめずとも、わかろうが」
2064 = "「Không cần kiểm chứng, em cũng thừa hiểu mà」"
# monologue
# JP: （ぐいっ）
3826 = "（Thúc）"
# 【稀咲】
# display as 稀咲
# JP: 「んっ！」
# 2282 = "「嗯！」" 
# monologue
# JP: 股間を、勃起を思いっきりに押し付ける。\n稀咲の――女の尻の割れ目にはめ込むように。
3268 = "Tôi ép chặt đũng quần, ép chặt sự cương cứng của mình vào. Như thể muốn khảm nó vào rãnh mông của Kisaki――của người phụ nữ ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はこれほど、稀咲の体も求めてる。\nだが、体だけでは意味がないのだ」
2453 = "「Anh khao khát cơ thể của Kisaki đến nhường này. Nhưng, nếu chỉ có cơ thể thôi thì chẳng có ý nghĩa gì cả」"
# monologue
# JP: （れるっ）
3816 = "（Liếm）"
# 【稀咲】
# display as 稀咲
# JP: 「んっっ――あ――」
2261 = "「Ưm――a――」"
# monologue
# JP: 髪ごと、首筋を舐めていく。\n首筋から耳――その内側へと、舌を這わせる。
3603 = "Tôi liếm dọc theo gáy, xuyên qua mái tóc. Từ gáy lên đến tai――tôi trườn lưỡi vào tận bên trong."
# 【稀咲】
# display as 稀咲
# JP: 「ん……や……そんな――優しく――され、たら」
2263 = "「Ưm...... nha...... đừng――dịu dàng――như vậy, chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、稀咲の全てが好きだ。どこかひとつを\n切り離したなら、それはもう、稀咲ではない」
2418 = "「Anh, yêu mọi thứ thuộc về Kisaki. Nếu tách rời bất cứ phần nào ra, thì đó không còn là Kisaki nữa」"
# 【稀咲】
# display as 稀咲
# JP: 「それは――双鉄。それは、凄く嬉しい……ん――\nだけ、どっ……」
2726 = "「Chuyện đó――anh Soutetsu. Nghe vậy, em rất vui...... ưm―― nhưng, mà......」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 
# monologue
# JP: 動きを止めれば、稀咲は暫く息を整え、\nそうして、つぶやく。
3025 = "Khi tôi dừng động tác, Kisaki mất một lúc để điều hòa nhịp thở, và rồi, em ấy lẩm bẩm."
# 【稀咲】
# display as 稀咲
# JP: 「大事にされすぎるのも――不安になるんだ。\nいっつも、だって……セックス――ボクから、だし」
2074 = "「Được trân trọng quá mức――cũng khiến em thấy bất an. Lúc nào cũng vậy, bởi vì...... làm tình――toàn là do em chủ động, mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、僕が不慣れだからだ。欲望のままに動いて、\n稀咲を傷つけはしないかと」
2415 = "「Đó là, do anh chưa quen thôi. Anh sợ nếu cứ hành động theo dục vọng, thì sẽ làm tổn thương Kisaki mất」"
# 【稀咲】
# display as 稀咲
# JP: 「もう慣れてるってば！　ボクの体のこと、\nきっと、ボクよりも良く、知ってるし」
2062 = "「Anh đã quen rồi còn gì! Cơ thể của em, chắc chắn, anh còn hiểu rõ hơn cả em nữa cơ mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2216 = "「Ưm」"
# 【稀咲】
# display as 稀咲
# JP: 「それに――ボクは、ボクはね？　双鉄」
2656 = "「Hơn nữa――em, em này? Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 2810 = "「！！」" 
# monologue
# JP: 稀咲の指が、僕の手を取る。\nそのまま腕は持ち上がり――
3513 = "Ngón tay Kisaki, nắm lấy tay tôi. Cứ thế nâng cánh tay tôi lên――"
# monologue
# JP: （むにゅっ）
3799 = "（Nắm lấy）"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄に、思い切り好きにして欲しいんだ。\n双鉄のしたい、セックスを」
2422 = "「Em muốn anh Soutetsu, cứ thoải mái làm theo ý mình. Làm tình, theo cách mà anh Soutetsu muốn」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2612 = "「Anh hiểu rồi」"
# monologue
# JP: 遠慮が、不安を引き出していた。
3327 = "Sự e dè của tôi, đã gây ra sự bất an cho em ấy."
# monologue
# JP: 傷つけることを恐れるあまり、\n逆に傷つけてしまっていた。
3109 = "Quá sợ hãi việc làm tổn thương em ấy, mà ngược lại, tôi đã vô tình làm em ấy tổn thương."
# monologue
# JP: （さすっ――）
3814 = "（Vuốt――）"
# 【稀咲】
# display as 稀咲
# JP: 「ふ……ぁっ――」
2189 = "「Fu...... a――」"
# monologue
# JP: であらば今は、望むがままに――\n動いた指は、胸の表面を撫でさする。
3666 = "Nếu vậy thì bây giờ, cứ làm theo ý muốn thôi―― Ngón tay tôi di chuyển, vuốt ve bề mặt bầu ngực em ấy."
# monologue
# JP: （さわっ――さすっ――すりっ――こしゅっ）
3812 = "（Chạm――vuốt――xoa――miết）"
# 【稀咲】
# display as 稀咲
# JP: 「は……んっ――ふ、ぁ……手……双鉄の、手――\nあったか――ふっ……はぁ……はふっ」
2203 = "「Ha...... ưm――fu, a...... tay...... tay của, anh Soutetsu―― ấm quá――fu...... ha...... ha fu」"
# monologue
# JP: 本物の、最上質のシルクの感触。\nそれだけで手のひらが喜んでいる。
3335 = "Cảm giác chân thực của loại lụa thượng hạng nhất. Chỉ vậy thôi cũng đủ khiến lòng bàn tay tôi vui sướng."
# monologue
# JP: 僕も僕もとせがまれるまま、指にも力を加えていく。
3287 = "Chiều theo những lời nài nỉ liên hồi, tôi dần tăng thêm lực vào những ngón tay."
# 【稀咲】
# display as 稀咲
# JP: 「乳首……双鉄、に……なでられ――て……っ……\nそれだけ、で――こんなに、あつく――かたく――」
2003 = "「Đầu vú...... được, anh Soutetsu...... vuốt ve――...... Chỉ cần vậy, thôi――đã nóng ran――và cứng lại, thế này――」"
# monologue
# JP: 手のひらにも、こりゅこりゅとせがんでくれている。\n触れて欲しいと、いじってほしいと。が――
2983 = "Nó cũng đang cọ cọ vào lòng bàn tay tôi như muốn vòi vĩnh. Muốn được chạm vào, muốn được trêu đùa. Nhưng――"
# monologue
# JP: （もにゅっ――）
3811 = "（Nắn nắn――）"
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！」
2255 = "「Fua!」"
# monologue
# JP: 今はまだ、乳房を思い切り堪能したい。
3277 = "Bây giờ tôi vẫn muốn tận hưởng trọn vẹn bầu ngực này đã."
# 【稀咲】
# display as 稀咲
# JP: 「ゆっくり……なん、だね――ふっ――あ――\n優しいの、も――好き――ん――気持ちいい――けど」
2057 = "「Anh muốn...... từ từ, nhỉ――fu――a―― Dịu dàng thế này, em cũng――thích――ưm――sướng lắm――nhưng mà」"
# monologue
# JP: （これほどまでに柔らかなのに、\nこれほど確かに応えてくれる）
3822 = "（Mềm mại đến mức này, mà lại phản ứng rõ ràng đến vậy）"
# monologue
# JP: あらためて意識をすれば、手指は至福に満たされる。\nおっぱいが、男を狂わす理由を僕も、思い知る。
3289 = "Khi nhận thức lại điều đó, những ngón tay tôi ngập tràn hạnh phúc. Tôi cũng đã hiểu ra lý do tại sao bầu ngực lại khiến đàn ông phát cuồng đến vậy."
# 【稀咲】
# display as 稀咲
# JP: 「んっ――ふっ――ああっ――双、鉄っ――\n指……エッチ……ん……すごい――ねっとり――」
2260 = "「Ưm――fu――a a――anh, Soutetsu―― Ngón tay...... dâm quá...... ưm...... tuyệt thật――dính dính――」"
# monologue
# JP: 体が、どんどん熱くなる。\n指の動きが、止まらなくなる。
3643 = "Cơ thể, ngày càng nóng lên. Chuyển động của ngón tay, không thể dừng lại được nữa."
# monologue
# JP: （もみゅっ――もにゅっ――くにっ――むにゅっ）
3810 = "（Nắn nắn――bóp bóp――miết――vò）"
# 【稀咲】
# display as 稀咲
# JP: 「おっぱい……んっ――ふっ――もっと――\n双、鉄、の――好きに――して――ほしっ――」
2663 = "「Ngực em...... ưm――fu――thêm nữa đi―― Anh, Soutetsu, cứ――làm theo ý, thích――của anh, đi――」"
# 【双鉄】
# display as 雙鐵
# JP: 「十分、好きにしているが？」
2423 = "「Anh đã làm đủ thứ mình thích rồi mà?」"
# monologue
# JP: （くにっ）
3804 = "（Nắn）"
# 【稀咲】
# display as 稀咲
# JP: 「やっ！？　乳首――ンッ」
2164 = "「Á!? Núm vú――ưm」"
# monologue
# JP: （くにっ――こしゅっ――もみゅっ――くりゅん！）
3803 = "（Nắn――vuốt――xoa――vê!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひあっ――んっ――それっ――あっ！　ちく、びっ\n――そんな、に――くりくり――され、たらぁっ」
2197 = "「I a――ưm――cái đó――á! Núm, vú ――bị――vê――như thế, thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「されたら、なんだ？」
2530 = "「Bị thế thì, sao nào?」"
# 【稀咲】
# display as 稀咲
# JP: 「っ――ううん。ふあっ――なん、でも――ない……\nんっ――」
1538 = "「――Ưm. Phua――không, có――gì...... ưm――」"
# monologue
# JP: 多分、自分の欲望を、稀咲は喉に押し込めた。\nそれは切ないことでもあるが、嬉しくもある。
3475 = "Có lẽ Kisaki đã kìm nén dục vọng của mình xuống cổ họng. Điều đó khiến tôi vừa xót xa, lại vừa vui sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「どこまでも――僕の望むままにか」
2411 = "「Dù thế nào đi nữa――cũng sẽ theo ý muốn của anh sao」"
# monologue
# JP: ならば、強くを試してみたい。\n痛みの声を感じるのなら、もちろんすぐに緩めるが――
3023 = "Nếu vậy, tôi muốn thử mạnh tay một chút. Nếu cô ấy kêu đau, tất nhiên tôi sẽ nới lỏng ngay――"
# monologue
# JP: （むみゅっ！！）
3815 = "（Bóp chặt!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひウっ！！！」
2198 = "「I ư!!!」"
# monologue
# JP: 甘さ。喜び。\n稀咲の、雌の嬌声が、僕の雄へと突き刺さる。
3369 = "Sự ngọt ngào. Sự vui sướng. Tiếng rên rỉ đầy nữ tính của Kisaki xuyên thấu vào bản năng đàn ông của tôi."
# monologue
# JP: （もみっ――モニュ――さすっ――こリュッ――）
3809 = "（Xoa――nắn――vuốt――chà――）"
# 【稀咲】
# display as 稀咲
# JP: 「ふうっ――はぁ――んっ――ふぁっ――んっ――\n～～っ！　はっ――ふぁっ――ん……んふ――」
2188 = "「Phù――hà――ưm――phua――ưm―― ~~! Hà――phua――ưm......ưm phu――」"
# monologue
# JP: （もみゅっ――にゅむっ――くにゅっ――むにゅん）　
3806 = "（Xoa――nắn――bóp――nặn）"
# 【稀咲】
# display as 稀咲
# JP: 「は――あっ――んはっ、あっ――ふっ――ふうっ、\nはぁ――あっ――んっ――くふ――んっ――ふうっ」
2201 = "「Hà――á――ưm hà, á――phù――phù, hà――á――ưm――ư phu――ưm――phù」"
# monologue
# JP: 稀咲の汗が、手に落ちてくる。
3516 = "Mồ hôi của Kisaki rơi xuống tay tôi."
# monologue
# JP: すべすべとしたチャイナドレスの手触りが、\nただそれだけで変化する。肌への密着が強くなる。
3319 = "Cảm giác mượt mà của bộ sườn xám chỉ vì thế mà thay đổi. Nó bám chặt vào da thịt hơn."
# monologue
# JP: （もみゅっ――もにっ――くにゅつ――ふあっ――）
3808 = "（Xoa――nắn――bóp――phua――）"
# 【稀咲】
# display as 稀咲
# JP: 「っっっ～～っ――ふぁっ、あっ――おっぱい――ん、\nふっ――ふあっ――んっ――ふうっ――ふうっ」
2170 = "「~~~――phua, á――vú――ưm, phù――phua――ưm――phù――phù」"
# monologue
# JP: これほど揉んでも、揉み足りぬ。\nそれゆえ、乾きはいや増していく。
3208 = "Dù xoa nắn đến thế này vẫn thấy chưa đủ. Bởi vậy, sự khao khát ngày càng tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「おっぱい以外も、好きにするぞ」
2789 = "「Ngoài vú ra, anh cũng sẽ làm theo ý mình đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「あっ！」
2241 = "「Á!」"
# monologue
# JP: ズボンの前だけ手早く開き、\n勃起の全てを剥き出しにする。
3225 = "Tôi nhanh chóng kéo khóa quần, để lộ hoàn toàn dương vật đang cương cứng."
# monologue
# JP: （ぐりっ）
# 3826 = "（頂）" 
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！　ペニスっ――すごい――双鉄っ――\nこんなに、硬くっ――て――ふ、あっ――熱いっ」
2254 = "「Phua! Dương vật――tuyệt quá――anh Soutetsu―― Cứng――như thế này――phu, á――nóng quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
2258 = "「Ưm――」"
# monologue
# JP: 直接を、稀咲の尻の谷間に挟む。\nただそれだけで、声がもれるほど気持ちいい。
3559 = "Tôi kẹp trực tiếp nó vào khe mông của Kisaki. Chỉ thế thôi cũng sướng đến mức phát ra tiếng rên."
# monologue
# JP: 極上過ぎる稀咲の肉が最高級のシルクを\n僕に押し付けてきて――
3496 = "Da thịt tuyệt hảo của Kisaki ép chặt lớp lụa cao cấp vào người tôi――"
# monologue
# JP: （しにゅっ――ぐいっ）
3813 = "（Ép――đẩy）"
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――んっ――そう、てつ――すご、い――\nっ――びく、びく――してる――あつくて、おっきい」
2253 = "「Phua――ưm――anh, Soutetsu――tuyệt, quá―― ――giật, giật――liên hồi――nóng quá, to quá」"
# monologue
# JP: 稀咲が体を震わせる、その刺激さえ快感になり、\nだから、どこまでも貪欲になる。
3492 = "Kisaki run rẩy cơ thể, sự kích thích đó cũng biến thành khoái cảm, cho nên, tôi càng trở nên tham lam vô độ."
# 【双鉄】
# display as 雙鐵
# JP: 「もっと、近くで感じさせてくれ」
2102 = "「Hãy cho anh cảm nhận gần hơn nữa đi」"
# monologue
# JP: （しゅるっ）
3752 = "（Roạt）"
# 【稀咲】
# display as 稀咲
# JP: 「あっ」
# 2234 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2298 = "「嗯？」" 
# monologue
# JP: サイドの紐をほどいてみても、\n黒の下着は、そのまま股間を離れない。
3624 = "Dù đã cởi sợi dây buộc hai bên, chiếc quần lót màu đen vẫn dính chặt lấy háng cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「濡れて、くっついてしまっているのか」
2523 = "「Ướt đẫm nên dính chặt vào rồi sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「やっ――双鉄、そんな恥ずかしいことっ」
2248 = "「Này――anh Soutetsu, đừng nói chuyện đáng xấu hổ như thế」"
# 【双鉄】
# display as 雙鐵
# JP: 「いかんか？　僕は言いたいのだがな」
1987 = "「Không được sao? Nhưng anh lại muốn nói đấy」"
# 【稀咲】
# display as 稀咲
# JP: 「んっ！！！」
2283 = "「Ưm!!!」"
# monologue
# JP: 稀咲が慌てて言葉を飲み込む。
3549 = "Kisaki vội vàng nuốt lời vào trong."
# monologue
# JP: 恥ずかしさを吐き出せなくなってしまってせいか、\n首筋が、じわじわ赤くなっていく。
3574 = "Có lẽ vì không thể thốt ra sự ngượng ngùng, phần cổ cô ấy dần dần đỏ bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「そして聞きたい。教えて欲しい。\nどうして紐をほどいてもなお、下着が落ちんのだ？」
2775 = "「Và anh muốn hỏi. Em hãy nói cho anh biết. Tại sao cởi dây ra rồi mà quần lót vẫn không rớt xuống?」"
# 【稀咲】
# display as 稀咲
# JP: 「――」
1530 = "「――」"
# monologue
# JP: ごくりと、稀咲の喉がなる。\n背中が、小さく小さく震える。
3471 = "（Ực） một tiếng, cổ họng Kisaki nuốt nước bọt. Tấm lưng cô ấy run rẩy khe khẽ."
# 【稀咲】
# display as 稀咲
# JP: 「それは……ボクのが、濡れてるから、だよ。\n濡れて、ぴったりくっついて、だからっ」
2778 = "「Đó là......vì của em, đang ướt, mà. Ướt đẫm, dính sát vào, cho nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の、何が濡れているんだ？」
2634 = "「Cái gì của Kisaki đang ướt cơ?」"
# 【稀咲】
# display as 稀咲
# JP: 「何って――だから……その、ヴァギナ」
2011 = "「Cái gì là sao――thì......cái đó, Vagina」"
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本語で」
2685 = "「Nói bằng tiếng Hinomoto đi」"
# 【稀咲】
# display as 稀咲
# JP: 「～～～～～っ！」
2824 = "「~~~~~!」"
# monologue
# JP: 僕におまんこという言葉を、その構造までを、\n丁寧に教えてくれた稀咲が、真っ赤になっている。
3167 = "Kisaki, người đã từng tận tình dạy tôi từ \"âm đạo\" cho đến cấu tạo của nó, đang đỏ bừng cả mặt."
# 【双鉄】
# display as 雙鐵
# JP: 「もしも言うのが恥ずかしいなら」
2332 = "「Nếu em thấy xấu hổ không dám nói thì」"
# 【稀咲】
# display as 稀咲
# JP: 「は、恥ずかしいなんてあるわけないよっ！」
2395 = "「X-Xấu hổ gì chứ, làm gì có chuyện đó!」"
# monologue
# JP: （にちゃっ）
3753 = "（Nhóp nhép）"
