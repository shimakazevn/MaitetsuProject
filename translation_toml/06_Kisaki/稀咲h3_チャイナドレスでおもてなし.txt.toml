# 稀咲h3_チャイナドレスでおもてなし.txt 
[info]

[characters]
3388 = "稀咲"
3066 = "双鉄"

[character_subs]
# 3388 = "稀咲"
3676 = "雙鐵"

[script]
# lines: 695 
# 【稀咲】
# display as 稀咲
# JP: 「ふーん？\n焼酎の方が日本酒より、更にもう一手間かけてるんだ」
2300 = "「Hừm?\nHóa ra shochu lại tốn thêm một công\nđoạn nữa so với rượu sake nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「随分と意外そうだな」
2051 = "「Trông em có vẻ khá ngạc nhiên đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクが飲むのは、仕事のためだけだから。\nそういうレベルの素人の意見にすぎないけれど――」
2416 = "「Bởi vì em chỉ uống rượu vì công việc thôi\nmà.\nNên đó cũng chỉ là ý kiến của một\nngười nghiệp dư ở mức độ đó thôi――」"

# monologue
# JP: 僕の口調が、不満げに聞こえてしまったのだろうか。\n稀咲はどこか、申し訳なさそうな声を出す。
3264 = "Không biết có phải giọng điệu của tôi nghe\ncó vẻ bất mãn hay không.\nMà Kisaki lại cất\ngiọng như thể đang cảm thấy có lỗi."

# 【稀咲】
# display as 稀咲
# JP: 「ボクの場合は、日本酒の方がより澄み切っている\n……みたいなイメージが、先入観としてあって」
2472 = "「Đối với em thì, rượu sake mang lại cảm\ngiác trong vắt hơn\n……kiểu như vậy, đó là\nđịnh kiến từ trước của em rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは確かに。\nむしろ一般的なイメージだろうな」
2290 = "「À, điều đó thì đúng thật.\nĐúng hơn thì đó\nlà ấn tượng chung của mọi người mà」"

# 【稀咲】
# display as 稀咲
# JP: 「だろう！」
2354 = "「Đúng không!」"

# monologue
# JP: 今度は一転、華やかな声。\n密やかながら確かな変化が、僕に喜びを与えてくれる。
3114 = "Lần này lại đổi sang một giọng nói rạng\nrỡ.\nMột sự thay đổi tuy nhỏ bé nhưng rõ\nràng, mang lại cho tôi niềm vui."

# monologue
# JP: （あの稀咲が……\n僕の些細なひとことで、これほど一喜一憂するのか）
3796 = "（Một Kisaki như thế……\nlại vì một câu nói\nnhỏ nhặt của tôi mà buồn vui thất thường\nđến vậy sao）"

# monologue
# JP: 愛おしいなと、芯から思う。
3250 = "Thật đáng yêu, tôi nghĩ vậy từ tận đáy\nlòng."

# monologue
# JP: だからこそ、大事に素直に接しなければと、\nこころの底から、あらためて自分に刻み込む。
3283 = "Chính vì vậy, tôi lại một lần nữa khắc sâu\nvào tâm khảm,\nrằng phải đối xử với em ấy\nmột cách trân trọng và chân thành."

# 【稀咲】
# display as 稀咲
# JP: 「だから、日本酒みたいな醸造酒を、\nさらに蒸留したのが焼酎って話は、ちょっと不思議で」
2485 = "「Vì thế, cái chuyện đem một loại rượu lên\nmen như sake\nđi chưng cất thêm một lần nữa\nđể thành shochu, nghe có hơi kỳ lạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「理解できれば、不思議でもなんでもない話なのだが。\n――もう少し細かく説明するか？」
2146 = "「Nếu hiểu được thì chẳng có gì kỳ lạ cả\nđâu.\n――Anh giải thích chi tiết hơn một\nchút nhé?」"

# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。お願いするよ」
2687 = "「Cảm ơn anh. Nhờ anh vậy」"

# monologue
# JP: 笑みがほころぶ。\n酒蔵がほんのり、あたたかみを増す。
3137 = "Nụ cười nở rộ trên môi.\nKhiến cho xưởng\nrượu thêm phần ấm áp."

# 【双鉄】
# display as 雙鐵
# JP: 「日本酒はもちろん、米からつくる。\nで、クマ焼酎。右田の焼酎も、米焼酎だ」
2500 = "「Rượu sake tất nhiên là được làm từ gạo\nrồi.\nVà shochu Kuma. Shochu của nhà Migita\ncũng là shochu gạo」"

# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2735 = "「Đúng vậy nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、蒸留前のクマ焼酎が、果たして日本酒として\n飲めるものかどうか――気にはならんか？」
2784 = "「Vậy thì, liệu shochu Kuma trước khi chưng\ncất,\ncó thể uống như rượu sake được\nkhông――em có tò mò không?」"

# monologue
# JP: 問えば稀咲の瞳が細まる。
3588 = "Nghe tôi hỏi, Kisaki khẽ nheo mắt lại."

# 【稀咲】
# display as 稀咲
# JP: 「気になるとも。飲ませてくれるのかい？」
2593 = "「Tất nhiên là tò mò rồi. Anh định cho em\nuống thử sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ。あらかじめ許可も受けている」
2738 = "「Chuyện nhỏ. Anh cũng đã xin phép trước\nrồi」"

# monologue
# JP: 稀咲が強く希望した、右田の蔵の醸造所見学。
3478 = "Chuyến tham quan xưởng ủ rượu của nhà\nMigita mà Kisaki đã tha thiết mong muốn."

# monologue
# JP: 真闇姉たちも気を利かせ、\n一時間だけ、僕らをふたりきりにしてくれている。
3107 = "Chị Mayami và mọi người cũng rất tâm lý,\nđã để cho hai chúng tôi có một giờ đồng hồ\nđược ở riêng với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「蒸留直前の、いわゆる二次もろみを発酵させ、\n絞ったものがこれだ。日本酒で言えば[なまざけ,1]生酒となるな」
2672 = "「Thứ được ép ra sau khi lên men cơm rượu\nlần hai ngay trước khi chưng cất,\nchính là\ncái này đây. Nếu nói theo kiểu rượu sake\nthì nó là rượu tươi đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「これは……ボクのために、\nわざわざ用意しておいてくれたのかい？」
2729 = "「Cái này là…… anh đã cất công chuẩn bị sẵn\nvì em sao?」"

# monologue
# JP: 一升瓶を差し出せばまた、笑顔が弾ける。\nもちろん曇らせたくないが、ウソを言うのも心苦しい。
3255 = "Vừa đưa chai rượu một thăng ra, nụ cười\nlại bừng sáng trên khuôn mặt em ấy.\nTất\nnhiên là tôi không muốn dập tắt nụ cười\nđó, nhưng nói dối thì cũng áy náy lắm."

# 【双鉄】
# display as 雙鐵
# JP: 「広く捉えれば、そのとおりだ」
2311 = "「Nói rộng ra thì, đúng là như vậy」"

# 【稀咲】
# display as 稀咲
# JP: 「広く？　って、ああ、そうか。\nボク以外にも、同じ疑問を持つ人間は、結構いるんだ」
2312 = "「Rộng ra á? À, ra vậy.\nNgoài em ra, cũng\ncó khá nhiều người có chung thắc mắc này\nnhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ」
2056 = "「Em tinh ý thật đấy」"

# monologue
# JP: 打てば響くでわかってくれる。\nそれが心地よい、いとおしい。
3111 = "Chỉ cần gợi ý một chút là em ấy đã hiểu\nngay.\nĐiều đó thật dễ chịu, và cũng thật\nđáng yêu."

# 【双鉄】
# display as 雙鐵
# JP: 「飲んでみてくれ」
2049 = "「Uống thử đi」"

# monologue
# JP: まだ昼前だ。\nほんのひとくちふたくち程度を、コップに注ぐ。
3101 = "Vẫn chưa đến trưa.\nTôi rót vào cốc một\nlượng chỉ đủ cho một hai ngụm nhỏ."

# monologue
# JP: けれど稀咲は、差し出したコップを受け取らず、\n僕へとそっと押し戻してくる。
3008 = "Thế nhưng Kisaki không nhận lấy chiếc cốc\ntôi đưa,\nmà nhẹ nhàng đẩy nó về phía tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2298 = "「Hửm?」"

# 【稀咲】
# display as 稀咲
# JP: 「『飲ませてくれる』んじゃないのかい？\n双鉄が、ボクに」
2468 = "「Chẳng phải anh bảo là 『cho em uống』 sao?\nAnh Soutetsu, cho em ấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2735 = "「這樣啊」" 

# monologue
# JP: 稀咲の舌が、その薄い唇をちろりと舐める。\n誘われている。稀咲に、誘ってもらえてる。
3541 = "Lưỡi của Kisaki khẽ liếm qua đôi môi mỏng\nmanh ấy.\nTôi đang bị quyến rũ. Được Kisaki\nquyến rũ."

# monologue
# JP: その喜びが体を動かす。\nコップを一気に煽ってる。
3088 = "Niềm vui sướng đó thôi thúc cơ thể tôi\nhành động.\nTôi nốc cạn chiếc cốc trong một\nhơi."

# 【稀咲】
# display as 稀咲
# JP: 「ん……ぷっ……んっ――ごくっ――\nちゅずっ――んっ――ごく――ごくんっ――んふっ」
2268 = "「Ưm…… phu…… ưm――ực――\nchu\nzu――ưm――ực――ực――ưm fu」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2809 = "「!」"

# monologue
# JP: 全部を流し込んだあと、ほんの一瞬、稀咲の舌が、\n僕の口内に侵入してくる。
3060 = "Sau khi truyền toàn bộ lượng rượu sang,\ntrong một khoảnh khắc ngắn ngủi, lưỡi của\nKisaki\nxâm nhập vào khoang miệng tôi."

# 【稀咲】
# display as 稀咲
# JP: 「（れるっ――れろっ――ねろおっ）」
2816 = "「（Liếm――liếm――liếm）」"

# monologue
# JP: 舌が、蠢く。ああ、これは――
3606 = "Chiếc lưỡi ngọ nguậy. À, đây là――"

# monologue
# JP: 『ごちそうさま』と、\n声には出さず、舌の動きと気持ちで、伝えてくれる。\n 
2829 = "『Cảm ơn vì bữa ăn』,\nKhông cần nói thành\nlời, em ấy truyền đạt điều đó qua chuyển\nđộng của lưỡi và cảm xúc."

# 【稀咲】
# display as 稀咲
# JP: 「ぷぁ。んふっ……」
2207 = "「Pha. Ưm fu……」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうだった？」
2391 = "「Thế nào?」"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が飲ませてくれたからね？\n最高に甘くて美味しかった……といいたいけれど」
2732 = "「Vì là anh Soutetsu cho em uống mà?\nNên em\nrất muốn nói là nó ngọt ngào và ngon tuyệt\nvời…… nhưng mà」"

# monologue
# JP: 小さく、肩がすくめられる。
3140 = "Em ấy khẽ nhún vai."

# 【稀咲】
# display as 稀咲
# JP: 「残念。すっぱくて美味しいものではなかった。\n日本酒とは、まったく違うお酒だね」
2145 = "「Tiếc thật. Nó chua lè và chẳng ngon lành\ngì cả.\nQuả thực là một loại rượu hoàn toàn\nkhác so với sake nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ここで質問だ」
2774 = "「Vậy thì, anh có một câu hỏi cho em đây」"

# monologue
# JP: 普通の酒造見学者には、ここで答えを明かしてる。\nが、稀咲相手だ。もう少しだけ、楽しみたい。
3168 = "Đối với những khách tham quan xưởng rượu\nbình thường, tôi sẽ tiết lộ câu trả lời\nngay tại đây.\nNhưng đối phương là Kisaki.\nNên tôi muốn tận hưởng thêm một chút nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「米という同じ原料、同じ製法で何故そうなるか。\n少し、考えて見て欲しい」
2592 = "「Cùng một nguyên liệu là gạo, cùng một\nphương pháp sản xuất, nhưng tại sao lại\nthành ra như vậy.\nAnh muốn em thử suy nghĩ\nmột chút xem」"

# 【稀咲】
# display as 稀咲
# JP: 「さっきもいったけど、ボクはお酒の素人だよ？\nまったくのノーヒントでは、厳しいね」
2412 = "「Lúc nãy em đã nói rồi mà, em là dân\nnghiệp dư về rượu đấy nhé?\nNếu hoàn toàn\nkhông có gợi ý nào thì khó lắm đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「では……そうだな。米焼酎と日本酒と、\nその代表的な産地を比べてみて欲しい」
2783 = "「Vậy thì…… xem nào. Anh muốn em thử so\nsánh giữa shochu gạo và rượu sake,\ncùng\nvới những vùng sản xuất tiêu biểu của\nchúng」"

# 【稀咲】
# display as 稀咲
# JP: 「米焼酎の代表なら、もちろんクマ――御一夜だよね。\n日本酒は――[にいがた,2]二干潟のイメージが強いかな」
2648 = "「Đại diện cho shochu gạo thì tất nhiên là\nKuma――Ohimitera rồi.\nCòn rượu sake\nthì――chắc là Niigata để lại ấn tượng mạnh\nnhất nhỉ」"

# monologue
# JP: 言った瞬間、稀咲は「ああ」と小さく頷く。
3629 = "Vừa dứt lời, Kisaki khẽ gật gù thốt lên\n\"À\"."

# 【稀咲】
# display as 稀咲
# JP: 「気温差？　それとも年間降水量とか――湿度とか？」
2502 = "「Sự chênh lệch nhiệt độ sao? Hay là lượng\nmưa hàng năm――hay độ ẩm?」"

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな。さすが稀咲だ。その辺の全て――\nつまり、発酵を促す環境の差、だな」
2115 = "「Tuyệt vời. Quả không hổ danh là Kisaki.\nLà tất cả những yếu tố đó――\nTóm lại là sự\nkhác biệt về môi trường thúc đẩy quá trình\nlên men, đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「なら――焼酎は暖地、\n日本酒は寒地で作られた方がいいみたいな感じかい？」
2782 = "「Vậy thì――shochu được sản xuất ở vùng ấm\náp,\ncòn rượu sake được sản xuất ở vùng\nlạnh giá sẽ tốt hơn, kiểu như vậy sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。なぜさっき飲んだ“未蒸留の焼酎”が\n酸っぱかったかというと、クエン酸のせいだ」
2352 = "「Ừm. Lý do khiến thứ “shochu chưa chưng\ncất” em vừa uống lúc nãy\ncó vị chua, là do\naxit citric đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「クエン酸。くえん、酸。どうりで飲みづらい」
2544 = "「Axit citric. Axit khó nuốt (kuen). Thảo\nnào khó uống thế」"

# monologue
# JP: ダジャレのつもりか、そうでないのか。\nどちらにしても、稀咲はかなりのご機嫌だ。
3124 = "Chẳng biết là em ấy đang cố chơi chữ hay\nkhông nữa.\nDù sao đi nữa thì tâm trạng của\nKisaki đang rất tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「飲みづらくはあるが、メリットもある。\nクエン酸は酸ゆえ、殺菌能力を持つ」
2097 = "「Tuy khó uống, nhưng nó cũng có ưu điểm.\nVì axit citric là một loại axit nên nó có\nkhả năng diệt khuẩn」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ！　つまり余計な雑菌が繁殖しづらくなる。\nだから、高温多湿の地域に向くんだね？」
2281 = "「À! Tức là các loại tạp khuẩn dư thừa sẽ\nkhó sinh sôi hơn.\nVì vậy, nó phù hợp với\nnhững vùng có nhiệt độ và độ ẩm cao nhỉ?」"

# monologue
# JP: いつもながらのことではあるが、\n理解の早さに舌を巻く。
3126 = "Mặc dù lúc nào cũng vậy,\nnhưng tôi vẫn\nluôn phải kinh ngạc trước khả năng thấu\nhiểu nhanh nhạy của em ấy."

# monologue
# JP: そうして一度巻かれた舌は、\n嬉しさに、よりなめらかになる。
3169 = "Và rồi sự kinh ngạc ấy,\nnhường chỗ cho\nniềm vui sướng, khiến tôi nói năng lưu\nloát hơn hẳn."

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。そして、日本酒で使う[きこうじ,1]黄麹は、\n酸味がなく、いわゆる澄み切った味を出すが――」
2558 = "「Chính xác. Và men koji vàng dùng trong\nrượu sake,\nkhông có vị chua, tạo ra cái\ngọi là hương vị trong trẻo, nhưng――」"

# 【稀咲】
# display as 稀咲
# JP: 「酸が弱くて殺菌能力も無いから、雑菌が繁殖し易い\n高温多湿の地域では使えない。だから、寒冷地向き？」
2040 = "「Vì tính axit yếu và không có khả năng\ndiệt khuẩn, nên không thể dùng ở\nnhững\nvùng có nhiệt độ và độ ẩm cao, nơi tạp\nkhuẩn dễ sinh sôi. Do đó, nó phù hợp với\nvùng lạnh giá sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2366 = "「Đúng vậy」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。だから日本酒は、[なまざけ,1]生酒そのままでも、\nおいしく呑むことができるんだ」
2112 = "「Ra là vậy. Vì thế nên rượu sake,\ndù uống\ntrực tiếp dưới dạng rượu tươi cũng rất\nngon nhỉ」"

# monologue
# JP: わずかな言葉で、多くが通じる。\nこころまで、重ねあえてる気になれる。
3196 = "Chỉ bằng vài lời ngắn gọn mà có thể thấu\nhiểu nhau nhiều đến vậy.\nCảm giác như ngay\ncả tâm hồn cũng đang hòa quyện vào nhau."

# monologue
# JP: もっともっと、\n稀咲のことばを、稀咲の理解を引き出したくなる。
3241 = "Càng lúc càng muốn,\nkhơi gợi thêm nhiều\nlời nói, nhiều sự thấu hiểu từ Kisaki hơn\nnữa."

# 【双鉄】
# display as 雙鐵
# JP: 「一方、黒麹を使う焼酎の二次もろみは、クエン酸を\n含むがゆえに蒸留し、不純物を取り除く必要が出る」
2660 = "「Mặt khác, cơm rượu lên men lần hai của\nshochu dùng men koji đen,\nvì chứa axit\ncitric nên cần phải chưng cất để loại bỏ\ncác tạp chất」"

# 【稀咲】
# display as 稀咲
# JP: 「蒸留で、クエン酸も取り除ける？」
2671 = "「Chưng cất cũng có thể loại bỏ được cả\naxit citric sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「生酒は水とアルコールと不純物とが混じったものだ。\nクエン酸は、アルコールではなく水に溶けている」
2587 = "「Rượu tươi là hỗn hợp của nước, cồn và tạp\nchất.\nAxit citric hòa tan trong nước chứ\nkhông phải trong cồn」"

# 【稀咲】
# display as 稀咲
# JP: 「うん」
2276 = "「Ừm」"

# 【双鉄】
# display as 雙鐵
# JP: 「そして、エチルアルコールの沸点は78.37℃。\n水よりも早く沸騰する」
1999 = "「Và, nhiệt độ sôi của ethanol là 78,37°C.\nNó sôi nhanh hơn nước」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほど！　蒸留っていうのは、アルコールだけを\n沸騰させて、冷やして戻す作業なんだね？」
2448 = "「Ra là thế! Chưng cất nghĩa là,\nchỉ làm\ncho cồn sôi lên, rồi làm lạnh để nó ngưng\ntụ lại thành chất lỏng đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう。そうして水も、水に溶けているクエン酸も、\n不純物もまるごと置き去りにする」
2557 = "「Đúng vậy. Bằng cách đó, cả nước, cả axit\ncitric hòa tan trong nước,\nlẫn các tạp\nchất đều bị bỏ lại toàn bộ」"

# monologue
# JP: もっとも、エチルアルコールと沸点の近い物質は\nやはり混じってしまう。
2980 = "Tuy nhiên, những chất có nhiệt độ sôi gần\nvới ethanol\ncuối cùng vẫn sẽ bị lẫn vào."

# monologue
# JP: ゆえに、蒸留酒もまた多種多様。\nさまざまな味わいをそれぞれにもつものとなるのだ。
3096 = "Do đó, rượu chưng cất cũng rất đa dạng và\nphong phú.\nMỗi loại lại mang trong mình\nnhững hương vị khác nhau."

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。理屈だねぇ。けど――そういうことなら\n温暖地で日本酒を、寒冷地で焼酎を作ったりも」
2737 = "「Ra vậy. Rất có lý. Nhưng mà――nếu thế thì\nngười ta cũng có thể làm rượu sake ở vùng\nấm áp, hay làm shochu ở vùng lạnh giá chứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、昨今はできるようになっている。空調、気温、\n菌の環境――金さえあれば、制御可能な時代だからな」
2559 = "「À, dạo gần đây thì người ta đã làm được\nđiều đó rồi. Điều hòa không khí, nhiệt độ,\nmôi trường vi khuẩn――đây là thời đại mà\nchỉ cần có tiền là có thể kiểm soát được\nmọi thứ mà」"

# monologue
# JP: そうであっても――どこまで金をかけたとしても、\n狙い通りの味を作ることは不可能だろう。
3001 = "Mặc dù vậy――dù có đổ bao nhiêu tiền đi\nchăng nữa,\nviệc tạo ra hương vị chính xác\nnhư mong muốn vẫn là điều bất khả thi."

# monologue
# JP: ゆえに酒造りは、あの真闇姉が一生涯を注ぎ込む程に\nむつかしく、また面白いものであるのだろう。
3098 = "Chính vì thế, việc ủ rượu mới là một công\nviệc khó khăn và đầy thú vị,\nđến mức chị\nMayami sẵn sàng cống hiến cả cuộc đời mình\ncho nó."

# 【稀咲】
# display as 稀咲
# JP: 「なるほど……こういう話は楽しいね。\nそれに、大いに参考にもなった」
2733 = "「Ra là vậy…… Những câu chuyện thế này thú\nvị thật đấy.\nHơn nữa, nó cũng giúp ích cho\nem rất nhiều」"

# 【双鉄】
# display as 雙鐵
# JP: 「参考。なんのだ？」
2060 = "「Giúp ích? Về chuyện gì cơ?」"

# 【稀咲】
# display as 稀咲
# JP: 「来客があるんだよ、[ちゅうごく,1]仲国から。父の古い友人の\n娘さんなんだけどさ、随分気難しい方らしくてね」
2455 = "「Em sắp có khách đến thăm, từ Trọng Quốc.\nLà con gái\ncủa một người bạn cũ của bố em,\nnhưng có vẻ cô ấy là người khá khó tính」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2518 = "「Ồ」"

# 【稀咲】
# display as 稀咲
# JP: 「日ノ本の特産品に興味をお持ちとのことだから、\nそうしたものを紹介できれば――と考えてるんだ」
2460 = "「Nghe nói cô ấy có hứng thú với đặc sản\ncủa Hinomoto,\nnên em đang nghĩ――nếu có thể\ngiới thiệu cho cô ấy những thứ như vậy thì\ntốt biết mấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それで右田の蔵の見学か」
2111 = "「Ra là vậy, thế nên em mới đến tham quan\nxưởng rượu của nhà Migita sao」"

# monologue
# JP: 納得いった。\nと思った瞬間、稀咲はやわらかに首を振る。
3260 = "Hợp lý đấy.\nNgay khoảnh khắc tôi vừa nghĩ\nvậy, Kisaki lại nhẹ nhàng lắc đầu."

# 【稀咲】
# display as 稀咲
# JP: 「“それで”、じゃないよ？　順番が違う。\n来たく来た。そしたら、たまたま参考になっただけ」
1979 = "「Không phải “thế nên” đâu nhé? Trình tự\nsai rồi.\nLà do em muốn đến nên mới đến. Và\nrồi, tình cờ nó lại trở thành tài liệu\ntham khảo thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「学ぶために来てくれたのではなかったのか？」
2797 = "「Không phải em đến đây để học hỏi sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「海外からのお客様を御案内する蔵見学なら、\nしろ[ぐら]蔵さんの焼酎博物館の方を、ボクは選ぶ」
2334 = "「Nếu là chuyến tham quan xưởng rượu để\nhướng dẫn khách nước ngoài,\nthì em sẽ chọn\nBảo tàng Shochu của nhà Shirogura cơ」"

# monologue
# JP: 右田にとってはライバルになる酒蔵の名だが、\n悔しいよりも、納得の方が先にたつ。
3664 = "Dù đó là tên xưởng rượu đối thủ của nhà\nMigita,\nnhưng thay vì cảm thấy cay cú, tôi\nlại thấy đồng tình nhiều hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……あそこは観光客さん向けに、\nかなり洗練された展示案内をしているからな」
2505 = "「Cũng phải…… chỗ đó có hệ thống hướng dẫn\ntrưng bày\nkhá là bài bản dành cho khách du\nlịch mà」"

# 【稀咲】
# display as 稀咲
# JP: 「けど、ボクはどうしてもここに来たかった。\n理由なんて、そんなのは最初からひとつしかない」
2035 = "「Nhưng mà, em vẫn muốn đến đây bằng mọi\ngiá.\nLý do thì, ngay từ đầu đã chỉ có một\nthôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつ、とは？」
1967 = "「Một lý do, là sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、わかっているのに言わせたいんだ？」
2183 = "「Fufu, anh biết rõ rồi mà còn bắt em phải\nnói ra sao?」"

# monologue
# JP: 稀咲が、しなだれかかってくる。\n焼酎のせいもあるのだろうか、吐息が熱い。
3495 = "Kisaki ngả người dựa vào tôi.\nKhông biết\ncó phải do tác dụng của rượu shochu hay\nkhông, mà hơi thở của em ấy nóng rực."

# 【稀咲】
# display as 稀咲
# JP: 「小さなころから、ずっと興味はあったんだ。\nけど、ボクは意地っ張りだからね。来られなかった」
2435 = "「Từ khi còn nhỏ, em đã luôn tò mò về nơi\nnày rồi.\nNhưng mà, vì em là đứa bướng bỉnh\nmà. Nên em đã không thể đến đây」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2221 = "「A――」"

# monologue
# JP: 稀咲の指が、甘えてくる。\n僕の胸板でくるくる動く。
3514 = "Ngón tay của Kisaki, nũng nịu chạm vào\ntôi.\nVẽ những vòng tròn trên lồng ngực\ntôi."

# monologue
# JP: 抱きしめたいが、ぐっと堪える。\n稀咲の声を、もっと聞きたい。
3239 = "Rất muốn ôm lấy em ấy, nhưng tôi cố kìm\nnén lại.\nTôi muốn nghe thêm giọng nói của\nKisaki."

# 【稀咲】
# display as 稀咲
# JP: 「ここが、双鉄の家だから」
2739 = "「Bởi vì nơi này, là nhà của anh Soutetsu」"

# monologue
# JP: それは、囁き。\nけれど止まった指先から、胸に直接伝わってくる。
3130 = "Đó là một lời thì thầm.\nNhưng từ đầu ngón\ntay đang dừng lại, nó truyền trực tiếp vào\ntrái tim tôi."

# 【稀咲】
# display as 稀咲
# JP: 「『好きな男の子の家だから』。だよ？」
1550 = "「『Vì đây là nhà của người con trai mà em\nthích』. Đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2619 = "「Kisaki」"

# monologue
# JP: 稀咲の息に、稀咲の熱に、酔わされる。\n抱き寄せ、ゆっくりとキスをする。
3502 = "Tôi bị say đắm bởi hơi thở, bởi sức nóng\ncủa Kisaki.\nKéo em ấy vào lòng, tôi chầm\nchậm trao một nụ hôn."

# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ……んっ――ちゅっ――ちゅむっ」
2266 = "「Ưm…… fu…… ưm――chụt――chu mu」"

# monologue
# JP: 稀咲の口へと舌を差し込み、\nその舌を丁寧に舐めまわす。
3253 = "Đưa lưỡi vào trong miệng Kisaki,\ntôi cẩn\nthận mút mát lấy chiếc lưỡi ấy."

# 【稀咲】
# display as 稀咲
# JP: 「あむっ――んっ――ふぁ……んっ――ちゅむっ\nほーへふっ――ふっ――しゅき――んっ――ちゅっ」
2238 = "「A mu――ưm――fua…… ưm――chu mu\nAnh\nHouhehu――fu――hích anh――ưm――chụt」"

# monologue
# JP: 酒の、香だ。
3330 = "Là hương, rượu."

# monologue
# JP: 酒蔵内に満ち満ちているのものよりも濃密に、\n稀咲の口内から伝わってくる。
3503 = "Một mùi hương nồng nàn hơn cả thứ đang\ntràn ngập trong xưởng rượu,\ntruyền đến từ\nbên trong khoang miệng của Kisaki."

# 【稀咲】
# display as 稀咲
# JP: 「ん……ふっ――んっ――ちゅっ――ちゅむっ――\nちゅるっ――ちゅっ――んちゅっ――ふ……あ――」
2265 = "「Ưm…… fu――ưm――chụt――chu mu――\nchu\nru――chụt――ưm chu――fu…… a――」"

# monologue
# JP: お互いの手が、お互いの体を抱きしめる。\n暑い。熱い。
3227 = "Bàn tay của cả hai ôm chặt lấy cơ thể đối\nphương.\nNóng quá. Nóng rực."

# monologue
# JP: 全身の血に酒が溶け込み、鼓動が速くなっていく。
3642 = "Rượu hòa tan vào máu chạy khắp toàn thân,\nnhịp tim ngày một đập nhanh hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「――稀咲」
1544 = "「――Kisaki」"

# monologue
# JP: キスでは、足りない。\n抱き合う距離では、遠すぎる。
3620 = "Chỉ hôn thôi thì không đủ.\nKhoảng cách của\nmột cái ôm, vẫn còn quá xa."

# monologue
# JP: もっと触れたい。触れられたい。近くに行きたい。\nその欲望が、僕をカラカラに乾かして――
3244 = "Muốn chạm vào em ấy nhiều hơn. Muốn được\nem ấy chạm vào. Muốn tiến lại gần hơn nữa.\nDục vọng đó, vắt kiệt tôi đến khô cằn――"

# monologue
# JP: （ごとっ）
3783 = "（Cạch）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2810 = "「!!」"

# 【稀咲】
# display as 稀咲
# JP: 「あっ」
2234 = "「A」"

# monologue
# JP: 物音。全身の血が冷える。
3556 = "Một tiếng động vang lên. Máu toàn thân tôi\nbỗng chốc lạnh toát."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1551 = "「…………」"

# monologue
# JP: ――けれど、おきない。何もおきない。
1525 = "――Nhưng mà, không có gì xảy ra cả. Chẳng\ncó chuyện gì xảy ra."

# monologue
# JP: ならば、今の物音は、真闇姉がおそらく、\nわざと立ててくれたものだろう。
3665 = "Nếu vậy, tiếng động vừa rồi, có lẽ là do\nchị Mayami\ncố tình tạo ra."

# 【稀咲】
# display as 稀咲
# JP: 「残念。時間のようだね？」
2597 = "「Tiếc thật. Có vẻ như hết giờ rồi nhỉ?」"

# monologue
# JP: サバサバとした声を出し、\n稀咲がさりげなく身を離す。
3497 = "Cất giọng điệu thản nhiên,\nKisaki khéo léo\ntách người ra."

# monologue
# JP: けれどもその手はしっかりと、\n僕の指先を掴んでくれてる。
3004 = "Thế nhưng bàn tay ấy vẫn nắm chặt lấy,\nnhững đầu ngón tay của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「あっという間だったな。そろそろ行くか」
2601 = "「Thời gian trôi qua nhanh thật đấy. Chúng\nta chuẩn bị đi thôi」"

# 【稀咲】
# display as 稀咲
# JP: 「どこへ？　どこへでもボクはついていくけど」
2118 = "「Đi đâu? Dù là đi đâu thì em cũng sẽ theo\nanh thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「さて――どうするかな」
2770 = "「Để xem nào――tính sao đây nhỉ」"

# monologue
# JP: ともかく、今はここを出よう。
3055 = "Dù sao thì, bây giờ cứ ra khỏi đây đã."

# monologue
# JP: 真闇姉と顔をあわせてしまうのは、\nどうにも、なんとも気恥ずかしすぎる。
3616 = "Chạm mặt với chị Mayami lúc này,\ndù thế\nnào đi nữa, cũng thật sự quá đỗi ngượng\nngùng."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に、なにか希望はあるか？」
2066 = "「Kisaki có nguyện vọng gì không?」"

# 【稀咲】
# display as 稀咲
# JP: 「そうだね」
2444 = "「Để xem nào」"

# monologue
# JP: 稀咲は笑って、僕を引っ張る。
3538 = "Kisaki mỉm cười, kéo tay tôi đi."

# 【稀咲】
# display as 稀咲
# JP: 「軽く、なにかつまみたいかな。\nまだ少し、酔いが残ってるみたいだから」
2447 = "「Em muốn nhấm nháp chút gì đó nhẹ nhàng.\nVì có vẻ như em vẫn còn hơi say say」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。頬にクリームがついてるぞ」
2638 = "「Kisaki. Kem dính trên má em kìa」"

# 【稀咲】
# display as 稀咲
# JP: 「……指摘するより、\nさりげなく取って欲しいんだけど？」
1575 = "「……Thay vì chỉ ra,\nsao anh không tự nhiên\nlau đi giúp em?」"

# 【双鉄】
# display as 雙鐵
# JP: 「もっともだ」
2456 = "「Cũng phải」"

# monologue
# JP: 指でぬぐって、すぐになめとる。
3262 = "Dùng ngón tay quệt lấy, rồi lập tức liếm\nsạch."

# 【稀咲】
# display as 稀咲
# JP: 「わ」
2199 = "「Oa」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、チーズクリームも旨いものだな。\n予想していたよりもクセが無い」
2316 = "「Hừm, kem phô mai cũng ngon đấy chứ.\nKhông\nbị ngấy như anh tưởng」"

# 【稀咲】
# display as 稀咲
# JP: 「…………」
# 1551 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 稀咲が、驚いた顔をしている。固まっている\n見開かれた目さえもが美しい――ではなく。
3526 = "Kisaki đang mang vẻ mặt ngạc nhiên. Cứng\nđờ cả người.\nNgay cả đôi mắt mở to đó\ntrông cũng thật xinh đẹp――à không phải."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
2389 = "「Sao thế?」"

# 【稀咲】
# display as 稀咲
# JP: 「え？　あ――いや、ね？　その……\n双鉄も少し、酔ってくれてるのかな？　とか思ってさ」
2211 = "「Hả? À――không, chỉ là? Chuyện đó……\nEm đang\nnghĩ, liệu có phải anh Soutetsu cũng hơi\nsay rồi không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？\nなにか、おかしなことでもしたか？」
2476 = "「Anh sao?\nAnh đã làm chuyện gì kỳ lạ à?」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、無自覚なんだね。すごく嬉しい」
2180 = "「Fufu, anh không tự nhận thức được nhỉ. Em\nvui lắm」"

# monologue
# JP: 驚き顔が、くすくす笑いに。\n頬がピンクに染まってる。
3118 = "Khuôn mặt ngạc nhiên chuyển sang tiếng\ncười khúc khích.\nĐôi má em ấy ửng hồng."

# 【稀咲】
# display as 稀咲
# JP: 「でも、そこまでするなら。\nキスでぬぐってくれた方が、もっと嬉しかったかな？」
1991 = "「Nhưng mà, nếu anh đã làm đến mức đó.\nThì\nthà anh dùng nụ hôn để lau đi, chắc em sẽ\ncòn vui hơn nữa đấy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！？」
2242 = "「A!?」"

# monologue
# JP: 慌ててあたりを大きく見渡す。
3249 = "Tôi vội vàng đưa mắt nhìn quanh."

# monologue
# JP: 人影はそこそこあるものに、\n僕らを気にする様子の者は……見当たらない。
3084 = "Mặc dù có lác đác vài bóng người,\nnhưng\nkhông thấy ai…… có vẻ như đang để ý đến\nchúng tôi."

# 【稀咲】
# display as 稀咲
# JP: 「ちょっと離れすぎちゃったか。\n永山さんなら、きっとみんなに話してくれたのに」
2324 = "「Hình như chúng ta đi hơi xa quá rồi nhỉ.\nNếu là bà Nagayama, chắc chắn bà ấy sẽ kể\ncho mọi người nghe rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
2507 = "「Ừm」"

# monologue
# JP: 永山夫人のクレープの出店では、\n僕たちも少し順番待ちした。
3226 = "Ở quầy bánh crepe của bà Nagayama,\nchúng\ntôi cũng đã phải xếp hàng chờ một chút."

# monologue
# JP: あそこでイチャつき目立ったのなら、\n確かに噂もされかねないが――
3614 = "Nếu lúc đó chúng tôi có những hành động âu\nyếm gây chú ý,\nthì chắc chắn sẽ bị đồn\nthổi, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなったところで、苦笑される程度だろう。\n婚約者同士がイチャイチャするのは、まぁ当然だ」
2028 = "「Dù có bị đồn thì chắc mọi người cũng chỉ\ncười trừ thôi.\nNhững người đã đính hôn âu\nyếm nhau thì cũng là chuyện đương nhiên\nmà」"

# 【稀咲】
# display as 稀咲
# JP: 「いいや。今のはただのイチャイチャじゃない。\n少なくとも、ボクにとってはね」
1975 = "「Không đâu. Hành động vừa rồi không chỉ\nđơn thuần là âu yếm.\nÍt nhất là, đối với\nem」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 何故だ、と視線で尋ねれば、\n稀咲の頬の薔薇色が、もう少しだけ濃さを増す。
3233 = "Tôi dùng ánh mắt để hỏi tại sao,\nsắc hồng\ntrên má Kisaki lại càng thêm đậm màu."

# 【稀咲】
# display as 稀咲
# JP: 「今のはさ、恋人より、婚約者よりもっと近い仕草だ。\n日々姫にだってしたことが無いくらいじゃないかな？」
2107 = "「Hành động vừa rồi, còn thân mật hơn cả\nngười yêu, hơn cả vị hôn phu nữa.\nChắc anh\ncòn chưa từng làm thế với Hibiki bao giờ\nđúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみると、そうかもしれんな」
2322 = "「Nghe em nói vậy, có lẽ là thế thật」"

# monologue
# JP: あんな仕草は、意識して出て来るものではない。\nそう接していた相手など――
3658 = "Những cử chỉ như vậy, không phải cứ có ý\nthức là làm được.\nNgười mà tôi từng đối xử\nnhư vậy――"

# 【稀咲】
# display as 稀咲
# JP: 「妹さんと双鉄の、きっと、日常のひとこまだった。\nそういう距離を、あたたかさを、感じた気がした」
1969 = "「Đó chắc chắn là một khoảnh khắc thường\nngày giữa anh Soutetsu và em gái.\nEm có\ncảm giác như mình đã chạm đến được khoảng\ncách đó, sự ấm áp đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「――うん。」
1539 = "「――Ừm.」"

# monologue
# JP: 嬉しくなる、切なくなる。\nほんの少しだけ、泣きそうになる。
3683 = "Vừa vui sướng, lại vừa nhói lòng.\nTôi có\ncảm giác như mình sắp khóc đến nơi."

# monologue
# JP: こんなに自然に、路子のことを語ってくれる――\nそうしてくれる相手が稀咲で、ただ幸せで。
3072 = "Có thể nói về Michiko một cách tự nhiên\nnhư thế này――\nNgười mang lại cho tôi điều\nđó là Kisaki, tôi chỉ cảm thấy hạnh phúc."

# 【稀咲】
# display as 稀咲
# JP: 「だから、特別。ああ――けど。ふふっ、\nそう考えると、誰にも見られなくて良かったんだね」
2482 = "「Thế nên, nó mới đặc biệt. À――nhưng mà.\nFufu,\nnghĩ lại thì, thật may là không ai\nnhìn thấy nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう考えると？」
2575 = "「Nghĩ lại thì sao cơ?」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクが、双鉄の日常になれた瞬間だもの。\n見せびらかすより、ふたりだけのヒミツにしたい」
2731 = "「Đó là khoảnh khắc em trở thành một phần\ncuộc sống thường ngày của anh Soutetsu mà.\nThay vì khoe khoang, em muốn giữ nó làm bí\nmật của riêng hai chúng ta hơn」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2276 = "「嗯」" 

# monologue
# JP: 僕のささいな仕草から、\n稀咲はしあわせを見つけてくれる。
3203 = "Từ những cử chỉ nhỏ nhặt của tôi,\nKisaki\nluôn tìm thấy được niềm hạnh phúc."

# monologue
# JP: 見つけた小さなしあわせを、\n二人でいれば、宝石にさえ換えられる。
3650 = "Những niềm hạnh phúc nhỏ bé tìm thấy ấy,\nchỉ cần có hai người, chúng thậm chí có\nthể hóa thành đá quý."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄、食べる？\nチーズクリーム、気にいったみたいだったから」
2796 = "「Anh Soutetsu, ăn không?\nCó vẻ anh khá\nthích kem phô mai mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、交換しよう。\n稀咲がもしもいやでなければ」
2764 = "「Vậy thì, đổi cho nhau nhé.\nNếu như Kisaki\nkhông phiền」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、ナイショだけどね？　実は――\nメイプルバターも食べたかった！　（あむっ）」
2179 = "「Fufu, bí mật nhé? Thật ra thì――\nEm cũng\nmuốn ăn thử bơ phong nữa! （A mu）」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2210 = "「Ây da」"

# monologue
# JP: 僕が手にする食べかけに、\n稀咲がふざけてかぶりついてくる。
3231 = "Vào miếng bánh tôi đang ăn dở trên tay,\nKisaki tinh nghịch ngoạm lấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ほらほら、こぼすぞ」
2568 = "「Này này, rớt ra ngoài bây giờ」"

# 【稀咲】
# display as 稀咲
# JP: 「こぼさないように食べさせて？」
2766 = "「Vậy anh đút cho em ăn để không bị rớt\nđi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も稀咲に、稀咲のを食べさせてもらいたい。\n交代で、でどうだ？」
2401 = "「Anh cũng muốn được Kisaki đút cho ăn phần\ncủa em.\nChúng ta thay phiên nhau nhé, thấy\nsao?」"

# 【稀咲】
# display as 稀咲
# JP: 「交代。ふふっ、素敵なことだね」
2493 = "「Thay phiên. Fufu, tuyệt đấy chứ」"

# monologue
# JP: じゃれあいながら、\nふたりでふたつ、クレープをきれいに食べ終わる。
3229 = "Vừa trêu đùa nhau,\nhai đứa vừa ăn sạch\nbách hai chiếc bánh crepe."

# monologue
# JP: 口の端、今度は僕がクリームをつければよかったと、\n食べ終わってから、ほんのすこしだけ残念になる。
3569 = "Sau khi ăn xong, tôi cảm thấy hơi tiếc\nnuối một chút,\ngiá như lúc nãy tôi cũng để\nkem dính ở khóe miệng thì tốt biết mấy."

# 【稀咲】
# display as 稀咲
# JP: 「ああ美味しかった。\n永山夫人は、何を作ってもおいしくするね」
2599 = "「A, ngon quá đi mất.\nBà Nagayama làm món\ngì cũng ngon hết sẩy nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲も、ずいぶんと上手くなってきているぞ」
2636 = "「Kisaki dạo này nấu ăn cũng lên tay lắm\nrồi đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「本当かい！？」
2603 = "「Thật sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、この前のだご汁などは、\nまるきり右田の味だった」
2509 = "「Ừm, món súp Dago hôm nọ,\nhương vị hệt như\ncủa nhà Migita luôn」"

# 【稀咲】
# display as 稀咲
# JP: 「そうか。頑張ってる甲斐が出てきてるんだね」
2519 = "「Vậy sao. Thế là công sức em nỗ lực cũng\nbõ công rồi nhỉ」"

# monologue
# JP: 安堵と喜びのいりまじる笑み。\nふんわりと、あたりの空気がまるくなる。
3134 = "Một nụ cười pha lẫn sự an tâm và vui\nsướng.\nBầu không khí xung quanh trở nên êm\ndịu, nhẹ nhàng."

# 【稀咲】
# display as 稀咲
# JP: 「[まくら,1]真闇先生さまさまだ。\n先行きはまだまだ長いけど」
2378 = "「Đều là nhờ cô giáo Mayami cả đấy.\nDù\nchặng đường phía trước vẫn còn dài」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。真闇姉を超えるところまで目指すのか？」
2798 = "「Ồ. Mục tiêu của em là vượt qua cả chị\nMayami sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「いや、超える、超えなくとかじゃなく。\n真闇さんからは習えない味を、身につけたいんだ」
1981 = "「Không, không phải chuyện vượt qua hay\nkhông vượt qua.\nMà em muốn nắm bắt được\nnhững hương vị không thể học từ chị\nMayami」"

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉でも教えられない？」
2609 = "「Hương vị mà ngay cả chị Mayami cũng không\nthể dạy được sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「うん、そう。ボクがどうしても覚えたいのは……」
2515 = "「Ừm, đúng vậy. Hương vị mà em muốn ghi nhớ\nbằng mọi giá là……」"

# monologue
# JP: 稀咲が、ちらと僕を見る。\nいつもの強い瞳ではなく、どこか、伺い見るように。
3524 = "Kisaki liếc nhìn tôi.\nKhông phải bằng ánh\nmắt kiên định thường ngày, mà có chút gì\nđó dò xét."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄の――[そごう,1]十川の家の味だから」
2793 = "「Hương vị của nhà Sogou――gia đình của anh\nSoutetsu cơ」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 

# monologue
# JP: 旧姓を。
3662 = "Họ cũ của tôi."

# monologue
# JP: 右田になる前、産まれたときの僕の名字を、\n何年ぶりに、人の口から聞いただろうか。
3201 = "Cái họ từ khi tôi sinh ra, trước khi đổi\nthành Migita,\nđã bao nhiêu năm rồi tôi mới\nđược nghe từ miệng một người khác nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちは、とても――とても嬉しい」
2474 = "「Tấm lòng của em, anh thực sự――thực sự rất\nvui」"

# monologue
# JP: 言葉が、スムーズにでてこない。
3653 = "Những lời nói, không thể thốt ra một cách\ntrôi chảy."

# monologue
# JP: 嬉しすぎて。これほど嬉しい気持ちをけれど、\n受け取れないことが悲しくて。
3379 = "Quá đỗi vui sướng. Nhưng đồng thời,\ntôi\nlại cảm thấy buồn vì không thể đón nhận\ntrọn vẹn niềm vui ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「けれども、それは」
2038 = "「Thế nhưng, chuyện đó」"

# 【稀咲】
# display as 稀咲
# JP: 「無理じゃないよ？　双鉄が必ず。覚えてるから。\n今は例え、心のどこかに、閉じ込めてても」
1994 = "「Không phải là không thể đâu? Anh Soutetsu\nchắc chắn. Vẫn còn nhớ mà.\nCho dù hiện\ntại, nó đang bị nhốt ở một góc nào đó\ntrong trái tim anh」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2234 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「時間をかけて、思い出してよ。\nボクは必ず、その味を双鉄に食べさせてあげる」
2666 = "「Hãy dành thời gian, để nhớ lại đi nhé.\nEm\nnhất định, sẽ nấu lại hương vị đó cho anh\nSoutetsu ăn」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう」
1545 = "「――Cảm ơn em」"

# monologue
# JP: なんといういい女かと。\n結婚したいと、つくづく思う。
3651 = "Thật là một người phụ nữ tuyệt vời làm\nsao.\nTôi lại càng thêm khao khát được kết\nhôn với em ấy."

# monologue
# JP: 毎日毎夜、切に願っていることではあるが。
3345 = "Dù rằng ngày nào đêm nào, tôi cũng tha\nthiết mong mỏi điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「……それで、だな」
1579 = "「……Tiếp theo, là」"

# 【稀咲】
# display as 稀咲
# JP: 「ごめん。まだ決めきれてないようだ。\nあの人は……どうにも強欲だから」
2487 = "「Xin lỗi anh. Có vẻ như vẫn chưa quyết\nđịnh được.\nNgười đó…… dù sao cũng quá tham\nlam mà」"

# monologue
# JP: 先回りされ、嬉しくなる。\n稀咲もやはり、同じ気持ちと伝わってきて。
3560 = "Bị nói trúng tim đen, tôi cảm thấy vui\nmừng.\nBởi tôi cảm nhận được rằng, Kisaki\ncũng có cùng chung tâm trạng với mình."

# monologue
# JP: だからこそ。どれほど切なくともどかしくとも、\n我慢するしかないとも思う。
3282 = "Chính vì vậy. Dù có đau khổ và bứt rứt đến\nđâu,\ntôi cũng nghĩ rằng mình chỉ còn cách\nkiên nhẫn chờ đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「欲、というのも違うだろう。\n稀咲への愛情の深さゆえのことだ」
2393 = "「Tham lam, nói vậy cũng không đúng đâu.\nĐó\nlà vì tình yêu thương sâu sắc dành cho\nKisaki đấy」"

# monologue
# JP: プロポーズをして、受け入れられて。\n両方の家も大歓迎で。
3352 = "Cầu hôn, và được chấp nhận.\nHai bên gia\nđình cũng hết sức ủng hộ."

# monologue
# JP: けれど結婚できてないのは、\n招待客が決まらぬためだ。
3013 = "Thế nhưng vẫn chưa thể tổ chức đám cưới,\nlà do chưa chốt được danh sách khách mời."

# 【稀咲】
# display as 稀咲
# JP: 「ボクへの愛情？　なのかなぁ？　あの人はただ、\n帝国線路合同会社のコネクションを強化するために」
2594 = "「Tình yêu thương dành cho em sao? Thật vậy\nkhông nhỉ? Người đó chỉ là,\nmuốn củng cố\nmối quan hệ với Công ty TNHH Đường sắt\nHoàng gia thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「愛情だろう。その行為こそが」
2027 = "「Chắc chắn là tình yêu thương rồi. Chính\nhành động đó đã nói lên tất cả」"

# monologue
# JP: 家を出て行く娘のために、\n最大最良の引き出物をと、元忠さんは考えている。
3355 = "Vì cô con gái sắp xuất giá,\nbác Mototada\nđang suy tính để chuẩn bị một món quà hồi\nmôn tuyệt vời nhất, hoành tráng nhất."

# monologue
# JP: 式の来賓、招待客。はては仲人――\n全てを任せて欲しいと僕らに、頭を下げてくれてまで。
3368 = "Khách mời danh dự, khách tham dự hôn lễ.\nThậm chí là cả người làm mai――\nBác ấy còn\ncúi đầu nhờ chúng tôi giao phó toàn bộ cho\nbác ấy lo liệu."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。結婚式の主役は、稀咲。\nゆえに、稀咲にとって最高の式を作りあげたい」
2405 = "「Anh cũng vậy thôi. Nhân vật chính của lễ\ncưới, là Kisaki.\nVì vậy, anh muốn tạo ra\nmột hôn lễ tuyệt vời nhất dành cho Kisaki」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクにとって最高の式は、\n新郎席に、双鉄がいてくれるだけで作れるよ？」
2437 = "「Đối với em, một hôn lễ tuyệt vời nhất,\nchỉ cần có anh Soutetsu đứng ở vị trí chú\nrể là đủ rồi mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、言い直そう。稀咲にとって――\nそして稀咲の夢にとって、最高の式を作りたいのだ」
2772 = "「Vậy thì, anh nói lại nhé. Đối với\nKisaki――\nVà đối với ước mơ của Kisaki, anh\nmuốn tạo ra một hôn lễ tuyệt vời nhất」"

# 【稀咲】
# display as 稀咲
# JP: 「夢……か」
2305 = "「Ước mơ…… sao」"

# monologue
# JP: 稀咲の瞳が、ほんの一瞬閉じられる。\nなにかを思い出すように。なにかを懐かしむように。
3550 = "Đôi mắt của Kisaki nhắm lại trong một\nkhoảnh khắc ngắn ngủi.\nNhư đang nhớ lại\nđiều gì đó. Như đang hoài niệm về điều gì\nđó."

# 【稀咲】
# display as 稀咲
# JP: 「――うん。確かに。\nボクの夢はいつの間にか、双鉄の夢と重なったよね」
1540 = "「――Ừm. Đúng vậy thật.\nƯớc mơ của em từ lúc\nnào, đã hòa làm một với ước mơ của anh\nSoutetsu rồi nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もそう感じている」
2289 = "「Đúng vậy. Anh cũng cảm thấy thế」"

# 【稀咲】
# display as 稀咲
# JP: 「レールを戻し、伸ばし、つなげていくこと。\n[ひのもと,2]日ノ本の、交通に悩む、全ての人へと」
2688 = "「Khôi phục lại đường ray, kéo dài chúng\nra, và kết nối chúng lại với nhau.\nĐến với\ntất cả những người đang gặp khó khăn về\ngiao thông trên toàn Hinomoto」"

# monologue
# JP: ふと思う。
3271 = "Tôi chợt nghĩ."

# monologue
# JP: 僕と出合わずにいたのなら、\n稀咲の夢は、どんな形をしていたのだろうかと。
3146 = "Nếu như không gặp được tôi,\nthì ước mơ của\nKisaki, sẽ mang hình dáng như thế nào nhỉ."

# 【稀咲】
# display as 稀咲
# JP: 「それは[なまなか,1]生半な夢じゃない。\n僕たちだけでは、叶えられない」
2724 = "「Đó không phải là một ước mơ nửa vời.\nChỉ\nvới hai chúng ta, thì không thể nào biến\nnó thành hiện thực được」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりで同じ夢を抱けていることに、感謝している。\n元忠さんが、それをわかってくださっていることにも」
2434 = "「Anh rất biết ơn vì hai chúng ta có thể\ncùng chung một ước mơ.\nVà cũng biết ơn vì\nbác Mototada đã thấu hiểu điều đó」"

# monologue
# JP: だから、ひたすらに待つしかできない。\n何ひとつさえ投げ出せないし、疎かにも出来ない。
3280 = "Chính vì thế, chúng tôi chỉ có thể kiên\nnhẫn chờ đợi.\nKhông thể vứt bỏ bất cứ điều\ngì, cũng không thể lơ là."

# monologue
# JP: 二度と取り返せない多くを、僕らはすでに、\nみんなから、御一夜から、授かっているのだから。
3099 = "Bởi vì chúng tôi đã nhận được rất nhiều\nthứ không thể nào lấy lại được lần thứ\nhai,\ntừ mọi người, và từ Ohimitera."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜とも右田とも宝生とも縁もゆかりもなかった、\n旧帝鉄総裁を仲人にまで引っ張ってくださったのだ」
2740 = "「Bác ấy thậm chí còn mời được cựu Tổng\ngiám đốc Đường sắt Hoàng gia,\nngười vốn\nkhông có chút liên hệ nào với Ohimitera,\nnhà Migita hay nhà Houshou, làm người mai\nmối cho chúng ta mà」"

# 【稀咲】
# display as 稀咲
# JP: 「それだけで、ボクらの会社――\n帝鉄線路合同会社の評価と信頼は、大きく高まる」
2547 = "「Chỉ nội điều đó thôi, đánh giá và sự tin\ntưởng dành cho công ty của chúng ta――\nCông\nty TNHH Đường sắt Hoàng gia, đã tăng lên\nđáng kể rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「結婚式への出席希望者も膨れ上がったと聞いている。\n調整が、そう簡単につかぬだろうとも思うのだがな」
2661 = "「Anh nghe nói số lượng người muốn tham dự\nlễ cưới cũng tăng lên chóng mặt.\nAnh nghĩ\nviệc sắp xếp chắc chắn sẽ không hề đơn\ngiản đâu」"

# monologue
# JP: わかってはいる。こころの底から感謝もしている。\nそれでも、やはり――どうしても。
3257 = "Tôi hiểu điều đó. Và cũng biết ơn từ tận\nđáy lòng.\nNhưng dù vậy, quả thực――dù thế\nnào đi chăng nữa."

# 【稀咲】
# display as 稀咲
# JP: 「……あげたいよね、式」
1565 = "「……Thật muốn, tổ chức lễ cưới sớm nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もう七ヶ月も待たされている。\n僕ら自身にはどうにもできんのが、もどかしい」
2297 = "「Ừm. Chúng ta đã phải chờ đợi tận bảy\ntháng rồi.\nViệc bản thân chúng ta không\nthể làm gì được, thật sự rất bức bối」"

# 【稀咲】
# display as 稀咲
# JP: 「このテの名簿作成は職人芸の世界だからねぇ。\nボクでもまったく、手を出せない」
2676 = "「Việc lập danh sách kiểu này đúng là nghệ\nthuật của các chuyên gia mà.\nĐến cả em\ncũng hoàn toàn bó tay, không thể nhúng tay\nvào được」"

# monologue
# JP: お手上げだよ、とおどけて肩をすくめてみせる、\n稀咲はどこか……やっぱりどこか、さみしげだ。
3138 = "Bó tay rồi, Kisaki đùa giỡn nhún vai,\nnhưng ở em ấy vẫn toát lên một vẻ gì đó……\nquả nhiên là có chút cô đơn."

# monologue
# JP: そんな稀咲を見たくはなくて、\nなかば無理やり、話を変える。
3220 = "Không muốn nhìn thấy một Kisaki như vậy,\ntôi nửa gượng ép, chuyển sang chủ đề khác."

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば――さっきの話にでてきた要人。\n元忠さんの、古い友人の娘さんという方」
2684 = "「Nhắc mới nhớ――nhân vật quan trọng mà em\nnhắc đến lúc nãy.\nNgười con gái của bạn cũ\nbác Mototada ấy」"

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2276 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方も、結婚式の出席リストに入ってくるのか？」
2319 = "「Vị đó, cũng sẽ có tên trong danh sách\nkhách mời dự đám cưới chứ?」"

# 【稀咲】
# display as 稀咲
# JP: 「……さて、どうだろうね？　近しい間柄でもないし。\n今回の面会も、別の要件での来日のついでらしいし」
1585 = "「……Chà, ai biết được nhỉ? Bọn em cũng\nchẳng thân thiết gì cho cam.\nCuộc gặp mặt\nlần này, hình như cũng chỉ là tiện đường\ncô ấy đến Nhật vì việc khác thôi」"

# monologue
# JP: 稀咲の声が低くなる。\nしまった。まるで話を変えられてない。
3517 = "Giọng của Kisaki trầm xuống.\nThôi chết.\nChẳng khác nào chưa hề chuyển chủ đề."

# 【稀咲】
# display as 稀咲
# JP: 「けど……彼女も銀行系だし……国情もある。\nあちらの鉄道系への人脈を持っているのかもしれない」
2030 = "「Nhưng mà…… cô ấy cũng làm trong ngành\nngân hàng…… lại còn tùy thuộc vào tình\nhình quốc gia nữa.\nBiết đâu cô ấy lại có\nmối quan hệ với ngành đường sắt bên đó thì\nsao」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
2271 = "「À…… ra vậy」"

# monologue
# JP: 稀咲の言葉に、安堵する。
3256 = "Nghe Kisaki nói vậy, tôi cảm thấy nhẹ\nnhõm."

# monologue
# JP: 僕の不用意な発言は、稀咲の機嫌を損ねておらず――\nただ単に、スイッチを切り替えただけと、理解でき。
3100 = "Lời nói thiếu suy nghĩ của tôi đã không\nlàm Kisaki phật lòng――\nTôi có thể hiểu\nrằng, em ấy chỉ đơn thuần là chuyển đổi\ntrạng thái suy nghĩ mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国では、銀行も国営なのか」
2020 = "「Ở Trọng Quốc, ngân hàng cũng là của nhà\nnước sao」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。基本的には国営、国策銀行と考えていい。\n外資の銀行も営業を許可されてはいるけど」
2513 = "「Đúng vậy. Về cơ bản có thể coi đó là ngân\nhàng quốc doanh, ngân hàng chính sách.\nMặc\ndù các ngân hàng có vốn đầu tư nước ngoài\ncũng được phép hoạt động」"

# 【双鉄】
# display as 雙鐵
# JP: 「その方はどちらなのだ？」
2758 = "「Vậy vị đó làm ở bên nào?」"

# 【稀咲】
# display as 稀咲
# JP: 「国体発展銀行――ばりばりの政策性銀行の、\nかなり中央に近い位置にいる人間だ」
2321 = "「Ngân hàng Phát triển Quốc thể――một ngân\nhàng chính sách thực thụ,\nvà cô ấy là\nngười giữ vị trí khá gần với trung tâm\nquyền lực đấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道関係の融資にも、その銀行はかかわる？」
2761 = "「Ngân hàng đó có liên quan đến việc cấp\nvốn cho các dự án đường sắt không?」"

# 【稀咲】
# display as 稀咲
# JP: 「かかわるというより、融資の主体となるはずだ。\nもっとも今は仲国も、大廃線の嵐だけれども」
1983 = "「Hơn cả liên quan, họ chắc chắn là chủ thể\ncấp vốn chính đấy.\nMặc dù hiện tại Trọng\nQuốc cũng đang chìm trong cơn bão Đại bãi\nbỏ các tuyến đường sắt」"

# monologue
# JP: 反冥という政府方針もあってだろうか、\n仲国のエアクラ本格化は日ノ本よりもかなり遅れた。
2972 = "Có lẽ cũng một phần do chính sách phản đối\nAerocraft của chính phủ,\nmà việc phổ biến\nAerocraft ở Trọng Quốc diễn ra muộn hơn\nHinomoto khá nhiều."

# monologue
# JP: 今がまさに大廃線の嵐なら――\nその後に、復線の機運が高まる道もありうるだろう。
3362 = "Nếu bây giờ đang là đỉnh điểm của cơn bão\nĐại bãi bỏ các tuyến――\nThì sau đó, rất có\nthể sẽ mở ra một con đường làm dấy lên\nphong trào khôi phục lại đường sắt."

# 【双鉄】
# display as 雙鐵
# JP: 「元忠さんをして要人と扱うに[た]足る地位なわけか。\nなるほど、接待も難しそうだ」
2481 = "「Thảo nào bác Mototada lại coi cô ấy là\nnhân vật quan trọng.\nRa là vậy, việc tiếp\nđón chắc cũng sẽ khó khăn đây」"

# 【稀咲】
# display as 稀咲
# JP: 「なんだよね。だから、あれこれ考えちゃって」
2355 = "「Đúng vậy đấy. Thế nên em mới phải suy\ntính đủ đường」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲も僕も、考え事が趣味の様な一面もあるからな。\n『考えすぎるな』などとは、気休めでも言えんが」
2658 = "「Cả Kisaki và anh đều có sở thích là hay\nsuy nghĩ mà.\nNên anh cũng chẳng thể nói\nnhững câu an ủi kiểu như 『Đừng suy nghĩ\nnhiều quá』 được」"

# 【稀咲】
# display as 稀咲
# JP: 「あっ」
# 2234 = "「啊」" 

# monologue
# JP: せめてもの気持ちで、肩を揉む。\n普段からのケアのおかげで、さほどの凝りは感じない。
2998 = "Ít nhất thì để thể hiện tấm lòng, tôi bóp\nvai cho em ấy.\nNhờ thường xuyên chăm sóc\ncơ thể nên vai em ấy cũng không bị căng\ncứng cho lắm."

# 【双鉄】
# display as 雙鐵
# JP: 「せめて現場で、僕も何かを手伝えればな」
2443 = "「Ít nhất thì ở hiện trường, anh cũng muốn\ngiúp được gì đó」"

# 【稀咲】
# display as 稀咲
# JP: 「！！！」
2811 = "「!!!」"

# monologue
# JP: 稀咲がいきなり振り返る。\n僕の両手を両手で握る。
3529 = "Kisaki đột ngột quay lại.\nNắm chặt lấy hai\ntay tôi bằng cả hai tay của em ấy."

# 【稀咲】
# display as 稀咲
# JP: 「いいね！　双鉄。それでいこう。\nそうだよ、ボクたちは正式な婚約者なんだから」
2326 = "「Hay đấy! Anh Soutetsu. Cứ quyết định vậy\nđi.\nĐúng rồi, chúng ta đã là hôn phu hôn\nthê chính thức của nhau rồi mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2282 = "「Ừm!」"

# monologue
# JP: 繋がる。響く。\n稀咲の言わんとすることが伝わってくる。
3292 = "Gắn kết. Đồng điệu.\nTôi có thể hiểu được\nnhững gì Kisaki định nói."

# 【双鉄】
# display as 雙鐵
# JP: 「婚約者だと紹介してしまうことで、\n結婚式への招待の流れをつくるのか」
2419 = "「Bằng cách giới thiệu anh là vị hôn phu,\nem định tạo cớ để mời cô ấy đến dự lễ cưới\nluôn sao」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。[か]彼の国は家族とメンツとを大切にする。\nどんなに古い友人の元へも、挨拶を欠かさないほどに」
2275 = "「Ừm. Quốc gia của cô ấy rất coi trọng gia\nđình và thể diện.\nĐến mức dù là bạn bè cũ\nlâu năm đến đâu, cũng không bao giờ bỏ qua\nviệc chào hỏi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、結婚を知れば式への出席も検討される。\nしかも相手は、元忠氏が“要人”と扱う存在だ」
2759 = "「Vậy thì, nếu biết chuyện kết hôn, cô ấy\ncũng sẽ cân nhắc việc tham dự lễ cưới.\nHơn\nnữa, đối phương lại là nhân vật mà bác\nMototada coi là “yếu nhân” nữa」"

# 【稀咲】
# display as 稀咲
# JP: 「貰えるスケジュールは相当に制限されるよね。\nとなると、明確な締め切りが定まる」
2025 = "「Lịch trình mà chúng ta có thể sắp xếp\nđược chắc chắn sẽ rất hạn hẹp nhỉ.\nThế\nthì, chúng ta sẽ có một hạn chót rõ ràng」"

# 【双鉄】
# display as 雙鐵
# JP: 「……帝国線路合同会社は右肩あがり――\n締め切りを先に定めねば、名簿も定まらんわけだ」
1571 = "「……Công ty TNHH Đường sắt Hoàng gia đang\ntrên đà phát triển――\nNếu không định trước\nhạn chót, thì danh sách khách mời cũng\nchẳng thể nào chốt được」"

# monologue
# JP: 納得すれば、苦笑が浮かぶ。\n元忠さんが、その程度を理解してない筈もない。
3611 = "Khi đã hiểu ra vấn đề, tôi khẽ cười khổ.\nBác Mototada không thể nào không hiểu được\nnhững điều đó."

# monologue
# JP: （娘を手放すその日を少しでも先延ばしにしたかった\n――いいや、違うか？　ひょっとしたら）
3750 = "（Bác ấy muốn trì hoãn ngày con gái mình đi\nlấy chồng thêm một chút chăng\n――Không,\nkhông phải sao? Có lẽ nào）"

# monologue
# JP: こういう機会を、元忠さんは、\nすでに何度か与えてくれていたのかもしれない。
3048 = "Những cơ hội như thế này, bác Mototada,\ncó\nlẽ đã tạo cho chúng tôi vài lần rồi cũng\nnên."

# monologue
# JP: 僕らが受け身でいつづけたのなら、\n気付きも活かしも出来ない類の、いわばヒントを。
3145 = "Nếu chúng tôi cứ mãi thụ động,\nthì sẽ\nchẳng thể nhận ra hay tận dụng được những\ncơ hội đó, nói cách khác, đó chính là\nnhững gợi ý."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、稀咲」
# 2619 = "「稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「なんだい双鉄」
2388 = "「Sao thế anh Soutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2555 = "「Không――」"

# monologue
# JP: しかし、聞くのもあまりにヤボだ。\nすぐさま話を、今度こそ確実に切り替える。
3002 = "Nhưng mà, hỏi ra thì lại quá mất hứng.\nTôi\nlập tức chuyển chủ đề, lần này thì chắc\nchắn là phải chuyển."

# 【双鉄】
# display as 雙鐵
# JP: 「その接待には、僕はどのような服でいけばいい？\n普通の背広でかまわないのか？」
2491 = "「Vậy đi tiếp khách thì anh nên mặc đồ gì?\nMặc vest bình thường có được không?」"

# 【稀咲】
# display as 稀咲
# JP: 「いや、ビジネスの席ではないし、会食での紹介に\nなるだろうから……セミフォーマルかな？」
1984 = "「Không cần đâu, đây không phải là buổi gặp\nmặt công việc, mà chắc chỉ là\ngiới thiệu\ntrong bữa ăn thôi nên…… trang phục bán\ntrang trọng chắc là ổn nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「セミフォーマル」
2220 = "「Bán trang trọng」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。ボクも、ドレスを着ることになるし」
2287 = "「Đúng vậy. Em cũng sẽ mặc váy dạ hội mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2518 = "「是嗎」" 

# monologue
# JP: 稀咲がどんなドレスを着るのか――\n想像すれば、すぐに一つの姿が浮かぶ。
3493 = "Kisaki sẽ mặc chiếc váy như thế nào nhỉ――\nVừa tưởng tượng, trong đầu tôi lập tức\nhiện lên một hình ảnh."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国の方の接待となると、\nやはり、チャイナドレスを着たりするのか？」
2489 = "「Tiếp đón khách từ Trọng Quốc,\nthì em sẽ\nmặc sườn xám sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「あれ？　意外。\n双鉄はあまり、パーティーに出る方では無かった？」
2191 = "「Ủa? Bất ngờ thật đấy.\nAnh Soutetsu không\nhay tham gia các buổi tiệc tùng sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのような立場にいなかったからな。\n御一夜に戻ってくる前は、酒問屋の社員兼帝大生だ」
2302 = "「Anh đâu có ở vị thế để tham gia mấy\nchuyện đó.\nTrước khi trở về Ohimitera, anh\nchỉ là nhân viên của một cửa hàng bán buôn\nrượu kiêm sinh viên Đại học Hoàng gia thôi\nmà」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだったっけ。\n双鉄には貫禄があるから、ついつい、ね」
2246 = "「À, đúng rồi nhỉ.\nTại anh Soutetsu có\nphong thái chững chạc quá, nên em cứ vô\ntình nghĩ vậy」"

# monologue
# JP: 稀咲が、少し背伸びする。\nあわせて腰をかがめれば、耳元近く、密やかな声。
3547 = "Kisaki hơi kiễng chân lên.\nTôi cũng cúi\nngười xuống phối hợp, một giọng nói thầm\nthì vang lên bên tai tôi."

# 【稀咲】
# display as 稀咲
# JP: 「覚えておいて？　双鉄。民族衣装は、\n“自国のもの”しか、礼服としては扱えないよ？」
2753 = "「Anh nhớ kỹ nhé? Anh Soutetsu. Trang phục\ntruyền thống,\nchỉ có “của nước mình” thì\nmới được coi là lễ phục thôi đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか。\nでは、日ノ本人の場合は、和服か」
2734 = "「Ra là vậy.\nThế thì, đối với người\nHinomoto, là Kimono nhỉ」"

# 【稀咲】
# display as 稀咲
# JP: 「あれあれ？　双鉄は残念そうだね」
2193 = "「Ủa ủa? Trông anh Soutetsu có vẻ tiếc nuối\nnhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――ああ、うむ。残念といえば残念か。\n無論、稀咲の和装も、極めて目に嬉しいものだが」
1977 = "「Không――à, ừm. Tiếc thì cũng có tiếc.\nTất\nnhiên, Kisaki mặc Kimono cũng vô cùng mãn\nnhãn rồi」"

# monologue
# JP: しかし、和装であれば正月など、\n他にも目にする機会はある。
3010 = "Nhưng mà, nếu là Kimono thì vào dịp năm\nmới,\nhay những dịp khác cũng có cơ hội\nđược ngắm."

# monologue
# JP: けれど、チャイナドレス姿は一度も――
3012 = "Còn sườn xám thì chưa một lần nào――"

# 【稀咲】
# display as 稀咲
# JP: 「つまり、見たいんだね？\n双鉄は、ボクの、チャイナドレスが」
2750 = "「Tóm lại là, anh muốn xem đúng không?\nAnh\nSoutetsu, muốn xem em mặc, sườn xám」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 

# monologue
# JP: また、耳元に。\n今度はさっきよりも、熱くて甘く、濡れた声。
3116 = "Lại thì thầm vào tai tôi.\nLần này, giọng\nnói còn nóng bỏng, ngọt ngào và ướt át hơn\ncả lúc nãy."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――見たい」
2262 = "「Ừm――anh muốn xem」"

# monologue
# JP: 酒蔵で散らされた熱情が、\nさらに強く濃く集まってくる。
3102 = "Ngọn lửa nhiệt tình bị dập tắt trong xưởng\nrượu,\nnay lại tụ tập về, mãnh liệt và sâu\nđậm hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、稀咲のチャイナドレス姿を見たい」
2445 = "「Anh muốn ngắm nhìn dáng vẻ Kisaki trong\nbộ sườn xám」"

# 【稀咲】
# display as 稀咲
# JP: 「いいよ？　なら見せてあげる。\n行こ？　双鉄」
2327 = "「Được thôi? Vậy em sẽ cho anh xem.\nĐi nào?\nAnh Soutetsu」"

# monologue
# JP: どこへ、と言わず稀咲が僕の腕を取る。\n行き先がどこであろうとも、僕の答えは変わらない。
3485 = "Không nói đi đâu, Kisaki nắm lấy cánh tay\ntôi.\nDù điểm đến là nơi nào đi chăng nữa,\nthì câu trả lời của tôi vẫn không thay\nđổi."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。見せてくれ」
2291 = "「Ừm. Cho anh xem đi」"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄。着たよ？」
2795 = "「Anh Soutetsu. Em mặc xong rồi nè?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2214 = "「Ồ」"

# monologue
# JP: 稀咲の声に、期待が高まる。\nが――待てど暮らせど、稀咲の姿が現れない。
3518 = "Giọng nói của Kisaki khiến sự mong đợi\ntrong tôi tăng cao.\nNhưng――chờ mãi, đợi\nmãi, vẫn không thấy bóng dáng Kisaki đâu."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
2641 = "「Kisaki?」"

# 【稀咲】
# display as 稀咲
# JP: 「あー……これ、ちゃんと仲国で採寸して仕立てた、\n本場の、本格的なヤツなんだ」
2230 = "「A…… bộ này, là đồ chính hiệu, được đo may\nđàng hoàng\nở Trọng Quốc đấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2276 = "「嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「だからその……日ノ本の民族性とは、馴染まない」
2478 = "「Nên là…… nó không hợp với tính cách dân\ntộc của Hinomoto cho lắm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2479 = "「Hừm?」"

# 【稀咲】
# display as 稀咲
# JP: 「実際、試着してそのまま、お蔵入りさせてた。\nいままで、誰にも見せたことがないんだ」
2467 = "「Thực ra, sau khi mặc thử xong là em cất\nluôn vào tủ.\nTừ đó đến giờ, em chưa từng\ncho ai xem cả」"

# 【双鉄】
# display as 雙鐵
# JP: 「誰にも？　元忠氏や日々姫にもか？」
2022 = "「Chưa cho ai xem sao? Cả bác Mototada hay\nHibiki cũng vậy à?」"

# 【稀咲】
# display as 稀咲
# JP: 「見せられるわけないよ！！　試着室で着てたのさえ\n一瞬だった。ひとりでだって、恥ずかしすぎて」
2441 = "「Làm sao mà cho xem được chứ!! Ngay cả lúc\nmặc trong phòng thử đồ\ncũng chỉ dám mặc\nmột thoáng thôi. Dù chỉ có một mình, em\ncũng thấy xấu hổ lắm rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2314 = "「Trời đất」"

# monologue
# JP: 稀咲の声が、めずらしく感情的になっている。
3519 = "Giọng nói của Kisaki hiếm khi lại trở nên\nbối rối thế này."

# monologue
# JP: そこまで稀咲を動揺させるチャイナドレスが、\n果たしていかなるものなのか、ますます気になる。
3180 = "Chiếc sườn xám có thể khiến Kisaki lúng\ntúng đến vậy,\nrốt cuộc trông như thế nào,\ntôi càng lúc càng tò mò."

# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ。早く見せてくれ」
2429 = "「Anh mong lắm rồi đấy. Nhanh cho anh xem\nđi」"

# 【稀咲】
# display as 稀咲
# JP: 「う、うん――だよね。\n見せてあげる、ってボクがいったんだし」
2243 = "「Ư, ừm――anh nói phải.\nChính em đã nói là\nsẽ cho anh xem mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2213 = "「Ồ――」"

# monologue
# JP: 美しい。\nその一言しか浮かんでこない。
3381 = "Đẹp quá.\nTrong đầu tôi chỉ hiện lên đúng\nmột từ đó."

# monologue
# JP: ああ、いや、もう一言もすぐに出てきた。
3091 = "À, không, một từ khác cũng ngay lập tức\nnảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「美しいし、かわいらしいな」
2604 = "「Vừa đẹp, lại vừa đáng yêu nữa」"

# 【稀咲】
# display as 稀咲
# JP: 「か、かわいらしい？　かな」
2148 = "「Đ-Đáng yêu á? Thật không」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。シニヨンであっているか？\n頭のおだんごが、なんとも愛くるしいぞ」
2517 = "「Ừm. Kiểu tóc búi chignon đúng không?\nHai\ncái búi tóc trên đầu em, trông đáng yêu\ncực kỳ luôn」"

# 【稀咲】
# display as 稀咲
# JP: 「そ、そっか！　うんっ。\nがんばってまとめてみて、よかったかな」
2723 = "「V-Vậy sao! Ừm.\nCất công búi lên thế này,\nđúng là bõ công nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 稀咲が、実にそわそわしている。\n足をもじもじ――っ！！？
3483 = "Kisaki đang thực sự rất bồn chồn.\nĐôi chân\ncứ xoắn xuýt vào nhau――!!?"

# 【双鉄】
# display as 雙鐵
# JP: 「おおっ！？」
2215 = "「Ồ!?」"

# 【稀咲】
# display as 稀咲
# JP: 「はうっ」
2239 = "「Hau」"

# monologue
# JP: 気づけば、稀咲が自分の体を隠そうと――っ！
3143 = "Bất chợt, Kisaki cố gắng che giấu cơ thể\nmình――!"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのままだ。\n隠さずそのまま、全身をきちんと見せてくれ」
1993 = "「Không, cứ giữ nguyên như vậy đi.\nĐừng che\nlại, hãy để anh ngắm nhìn toàn bộ cơ thể\nem」"

# 【稀咲】
# display as 稀咲
# JP: 「う、うん」
2231 = "「Ư, ừm」"

# monologue
# JP: 稀咲が自身を抱きしめようとしていた腕が、戻される。\nそのゆるやかな動きさえもが――
3481 = "Vòng tay đang định ôm lấy cơ thể của\nKisaki từ từ buông thõng xuống.\nNgay cả\nchuyển động chậm rãi đó cũng――"

# 【双鉄】
# display as 雙鐵
# JP: 「すごい、な――チャイナドレスとは、\nここまで体の線が出る……いや、出すものなのか」
2458 = "「Tuyệt thật, đấy――Sườn xám, lại có thể\ntôn\nlên đường cong cơ thể đến mức này sao…… à\nkhông, phải nói là phô bày ra mới đúng」"

# monologue
# JP: 布地の薄さ・繊細さと、極めて正確な採寸と\n稀咲自体のプロポーションのメリハリと。
3607 = "Độ mỏng manh, tinh tế của chất vải, cùng\nvới số đo vô cùng chính xác,\nvà cả những\nđường nét quyến rũ trên cơ thể của chính\nKisaki."

# monologue
# JP: その三者が完全に合致して、体の線が――\n見えるというより、浮き出している。\n                                                
2973 = "Sự kết hợp hoàn hảo của ba yếu tố đó,\nkhiến đường cong cơ thể――\nKhông chỉ là\nnhìn thấy, mà như đang nổi hẳn lên vậy."

# 【稀咲】
# display as 稀咲
# JP: 「本場の……仲国の一流の工房でお願いしたんだ」
2730 = "「Em đã đặt may ở…… một xưởng may hàng đầu\ntại Trọng Quốc đấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「工房」
2532 = "「Xưởng may sao」"

# 【稀咲】
# display as 稀咲
# JP: 「その……あの国では、まったく文化が違うんだ。\n体の線とか、下着とか、気にしないっていう感じで」
2580 = "「Chuyện đó…… văn hóa ở quốc gia đó hoàn\ntoàn khác biệt.\nKiểu như họ không mấy bận\ntâm đến việc để lộ đường cong cơ thể, hay\nđồ lót đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
2228 = "「Ư…… m」"

# monologue
# JP: 下着と言われてしまうなら、下半身へと目が向かう。\nスリットは、極めて上品だ。
3316 = "Nhắc đến đồ lót, ánh mắt tôi bất giác\nhướng về nửa thân dưới của em ấy.\nĐường xẻ\ntà, cực kỳ thanh lịch."

# monologue
# JP: 稀咲の足の長さもあって、\nサイド部分に危なっかしさは感じない。が――
3520 = "Nhờ đôi chân dài của Kisaki,\nnên phần xẻ\nhai bên hông không mang lại cảm giác hớ\nhênh. Nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「完全に、透けてしまっているな」
2721 = "「Nhìn thấu, toàn bộ luôn rồi kìa」"

# 【稀咲】
# display as 稀咲
# JP: 「ううっ」
2256 = "「Ư ư」"

# monologue
# JP: 稀咲の下着も、その下さえも、\n何度も何度も直接目にして、味わっている。
3499 = "Đồ lót của Kisaki, và cả những gì bên dưới\nđó nữa,\ntôi đã trực tiếp nhìn thấy, đã tận\nhưởng không biết bao nhiêu lần rồi."

# monologue
# JP: というのに稀咲は、全裸のときより\nよほど恥じ入ってしまっている。
3583 = "Ấy vậy mà lúc này, Kisaki lại tỏ ra\nxấu hổ\nhơn cả lúc khỏa thân."

# 【双鉄】
# display as 雙鐵
# JP: 「黒、だな」
2807 = "「Màu đen, nhỉ」"

# 【稀咲】
# display as 稀咲
# JP: 「う、うん、黒。同じ色の方が、まだしも――\n透けても、目立たないかと思って」
2232 = "「Ư, ừm, màu đen. Cùng màu thì, ít ra――\ndù\ncó bị nhìn xuyên thấu, cũng sẽ không quá\nnổi bật」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。言われるまでは、気づかなかった」
2510 = "「Cũng đúng. Cho đến khi em nói, anh mới\nnhận ra đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
2177 = "「Fufu」"

# monologue
# JP: チャイナドレスに着替えて初めて、稀咲が微笑む。\nそれだけで僕まで、ほっとし、とても嬉しくなる。
3567 = "Kể từ lúc thay sườn xám đến giờ, Kisaki\nmới mỉm cười.\nChỉ vậy thôi cũng đủ khiến\ntôi thở phào nhẹ nhõm, và cảm thấy vô cùng\nvui sướng."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした。なにか僕がおかしなことでもいったか？」
2387 = "「Sao thế. Anh nói gì kỳ lạ à?」"

# 【稀咲】
# display as 稀咲
# JP: 「いいや。双鉄だなぁって思ってさ。\n嬉しくって、愛しくって。それでつい、ね」
2556 = "「Không đâu. Em chỉ nghĩ, đúng là anh\nSoutetsu có khác.\nVui quá, đáng yêu quá.\nNên em lỡ cười thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「なにが、僕だ？」
2440 = "「Anh thì, làm sao cơ?」"

# 【稀咲】
# display as 稀咲
# JP: 「だってさ。このドレスだよ？」
2072 = "「Thì đó. Em đang mặc bộ váy này mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 

# monologue
# JP: 照れを抑えた稀咲にスラリと立たれると、\n今度は僕が気恥ずかしくなる。
3377 = "Thấy Kisaki kìm nén sự xấu hổ mà đứng\nthẳng người lên,\nlần này đến lượt tôi cảm\nthấy ngượng ngùng."

# monologue
# JP: 着衣で、これほど裸に近い。\n裸でない分、目のやり場に非常に困る。
3554 = "Mặc quần áo, mà lại gần với trạng thái\nkhỏa thân đến thế này.\nChính vì không khỏa\nthân, nên tôi mới không biết phải để mắt\nvào đâu."

# 【稀咲】
# display as 稀咲
# JP: 「普通は、体を見ると思う。男でも、女でさえも。\nでも、双鉄は真っ先にボクの顔を見て――うふふっ」
2465 = "「Bình thường thì, người ta sẽ nhìn vào cơ\nthể. Dù là đàn ông, hay thậm chí là phụ\nnữ.\nNhưng mà, anh Soutetsu lại nhìn vào\nmặt em đầu tiên――ufufu」"

# monologue
# JP: 稀咲が笑えば、ドレス自体も本当に可憐で、\n美しいものだと引き立ってくる。
3539 = "Khi Kisaki cười, bản thân bộ váy cũng thực\nsự trở nên vô cùng đáng yêu,\nvà vẻ đẹp của\nnó càng được tôn lên gấp bội."

# 【稀咲】
# display as 稀咲
# JP: 「シニヨンを見て、かわいいって！\n双鉄だなってすごく思って、嬉しくて」
2070 = "「Nhìn kiểu tóc búi chignon của em, anh\nkhen đáng yêu!\nEm thấy đúng chuẩn anh\nSoutetsu luôn, nên em vui lắm」"

# monologue
# JP: とん、と稀咲が近寄ってくる。
3532 = "Bịch một cái, Kisaki tiến lại gần tôi."

# monologue
# JP: 弾む、軽やかな足取りで。\n黒アゲハ蝶が舞うように。
3644 = "Với những bước chân nhẹ nhàng, nảy bật.\nNhư một chú bướm phượng đen đang nhảy múa."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄を好きになって。双鉄と恋ができて。\n本当に幸せで――ただ、それだけだよ」
2250 = "「Thích anh Soutetsu. Yêu anh Soutetsu.\nThực sự rất hạnh phúc――chỉ vậy thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。僕も幸せだ。\n即物的と思われてしまうかもしれないが――」
2640 = "「Kisaki. Anh cũng hạnh phúc lắm.\nCó thể em\nsẽ nghĩ anh thực dụng, nhưng――」"

# monologue
# JP: それでもこれほど、心が動かされている。\n言葉にせずにはいられない。
3006 = "Dù vậy, trái tim anh vẫn rung động đến\nnhường này.\nKhông thể không nói ra thành\nlời."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲がこれほどに美しいと、\n美しい女に愛される幸福を、改めて強く感じた」
2428 = "「Khi thấy Kisaki xinh đẹp đến thế này,\nanh\nlại một lần nữa cảm nhận sâu sắc niềm hạnh\nphúc khi được một người phụ nữ xinh đẹp\nyêu thương」"

# 【稀咲】
# display as 稀咲
# JP: 「頑張ってるから。\n双鉄のためにも、自分のためにも」
2432 = "「Vì em đã rất cố gắng mà.\nVì anh Soutetsu,\nvà cũng vì chính bản thân em nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「美しくあろうとか？」
2590 = "「Cố gắng để trở nên xinh đẹp sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。双鉄を、誰にも取られたくないからね」
2296 = "「Ừm. Vì em không muốn anh Soutetsu bị ai\nkhác cướp mất đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「取られるなどと――」
2012 = "「Bị cướp mất gì chứ――」"

# monologue
# JP: あらためて稀咲をまじまじと見る。
3270 = "Tôi lại một lần nữa chăm chú nhìn Kisaki."

# monologue
# JP: 理性的に整った顔立ちは、けれど表情を変えるたび、\nかわいらしさや妖艶ささえをも描き出す。
3563 = "Khuôn mặt thanh tú đầy lý trí, nhưng mỗi\nkhi thay đổi biểu cảm,\nlại toát lên vẻ\nđáng yêu hay thậm chí là yêu kiều, quyến\nrũ."

# monologue
# JP: そして、体は――
3585 = "Và, cơ thể thì――"

# monologue
# JP: （ごくりっ）
3778 = "（Ực）"

# monologue
# JP: 触れたいと、その丸い胸を揉みたいと、\n重い気持ちを、なんとか言葉に落とし込む。
3245 = "Muốn chạm vào, muốn nắn bóp bộ ngực tròn\ntrịa ấy,\ntôi cố gắng diễn đạt những cảm\nxúc mãnh liệt này thành lời."

# 【双鉄】
# display as 雙鐵
# JP: 「――これほど完璧なバランスだ。\n女性美とは、稀咲のためのことばだろうに」
1543 = "「――Sự cân đối hoàn hảo đến nhường này.\nVẻ\nđẹp của người phụ nữ, chắc hẳn là từ ngữ\ndành riêng cho Kisaki rồi」"

# monologue
# JP: “文化の違い”と稀咲が何度か言っていた、\nその意味を、視覚情報で理解する。
3487 = "“Sự khác biệt về văn hóa” mà Kisaki đã\nnhắc đến vài lần,\ntôi đã hiểu được ý nghĩa\ncủa nó thông qua những gì nhìn thấy."

# monologue
# JP: 日ノ本文化が、女性の曲線を隠すものなら、\n仲国文化は、曲線を見せる文化なのだと。
3324 = "Nếu văn hóa Hinomoto là che giấu đi những\nđường cong của người phụ nữ,\nthì văn hóa\nTrọng Quốc lại là văn hóa phô bày những\nđường cong ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……この姿を、誰にも見せずにいてくれて、\n本当によかった」
1586 = "「……Em đã không cho ai xem dáng vẻ này,\nthật sự tốt quá rồi」"

# 【稀咲】
# display as 稀咲
# JP: 「それは、どうして？」
2574 = "「Tại sao anh lại nói vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうしても何も――」
2725 = "「Tại sao gì chứ――」"

# monologue
# JP: 稀咲がしゃべるそれだけで、\nほんのわずかな腹の動きが、見て取れる。
3543 = "Chỉ cần Kisaki nói chuyện,\nlà tôi có thể\nnhìn thấy những chuyển động nhỏ nhất nơi\nbụng em ấy."

# monologue
# JP: そうして、それは、\nわずかで、あえかな動きだからこそ――
3587 = "Và, chính vì đó là\nnhững chuyển động nhỏ\nnhoi, mong manh――"

# 【双鉄】
# display as 雙鐵
# JP: 「……男であれば、誰でも稀咲に欲を[いだ]抱く。\n稀咲を、犯したくなるだろうからな」
1576 = "「……Là đàn ông, ai cũng sẽ khao khát\nKisaki.\nChắc chắn sẽ muốn chiếm đoạt\nKisaki mất thôi」"

# monologue
# JP: 危険を強調するために、あえて汚い言葉を使う。\nそれほどに、この欲望は直線的で、動物的だ。
3372 = "Để nhấn mạnh sự nguy hiểm, tôi cố tình\ndùng những từ ngữ thô tục.\nDục vọng này\ntrực diện và mang tính bản năng đến vậy\nđấy."

# monologue
# JP: 完成された女性美が、これほど男を、\nいや雄を掻き立てるものだと僕さえ、初めて知った。
3272 = "Vẻ đẹp hoàn mỹ của người phụ nữ, lại có\nthể kích thích đàn ông,\nà không, kích\nthích bản năng giống đực đến nhường này,\nđến tôi cũng mới biết lần đầu."

# 【稀咲】
# display as 稀咲
# JP: 「それは……怖いね。とても嫌だ」
2744 = "「Như thế thì…… đáng sợ thật. Em ghét lắm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。稀咲が警戒してくれている、その数百倍、\n恐らく危うい。その姿は、男の理性をたやすく壊すぞ」
2285 = "「Ừm. Có lẽ còn nguy hiểm gấp hàng trăm lần\nso với những gì Kisaki đang cảnh giác đấy.\nDáng vẻ đó, có thể dễ dàng phá nát lý trí\ncủa đàn ông đó」"

# 【稀咲】
# display as 稀咲
# JP: 「けど、双鉄は」
2041 = "「Nhưng mà, anh Soutetsu thì sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 

# monologue
# JP: 稀咲の指が伸びてくる。\nけれど、僕へと触れはしない。
3469 = "Ngón tay của Kisaki vươn tới.\nNhưng lại\nkhông hề chạm vào tôi."

# monologue
# JP: 頬から顎へ、胸から臍へ、その下へ――\nギリギリの線で触れぬまま、形をなぞり下りていく、
3123 = "Từ má xuống cằm, từ ngực xuống rốn, rồi\nxuống thấp hơn nữa――\nVuốt ve dọc theo hình\ndáng cơ thể ở một khoảng cách sít sao mà\nkhông hề chạm vào."

# 【稀咲】
# display as 稀咲
# JP: 「理性。しっかり保ってるよね？\n双鉄の理性を壊せるほどには、魅力、無い？」
2053 = "「Lý trí. Anh vẫn đang giữ vững đúng không?\nChẳng lẽ em không đủ sức hấp dẫn, để phá\nvỡ lý trí của anh Soutetsu sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「魅力は、余りあるほどだ」
2806 = "「Sức hấp dẫn, có thừa là đằng khác」"

# monologue
# JP: 股間を、わずかに突き出して見せる。
3274 = "Tôi hơi ưỡn đũng quần ra cho em ấy thấy."

# monologue
# JP: ズボンの上からであってなお、\n僕がどれほど高まってるかは明白だ。
3178 = "Dù chỉ nhìn qua lớp quần,\ncũng đủ thấy rõ\ntôi đang hưng phấn đến mức nào."

# 【双鉄】
# display as 雙鐵
# JP: 「けれど理性が壊れぬように、\nより多くの想いが守ってくれているだけだ」
2034 = "「Nhưng để lý trí không bị phá vỡ,\nchỉ là\ndo có nhiều tình cảm khác đang bảo vệ nó\nthôi」"

# 【稀咲】
# display as 稀咲
# JP: 「より多くの想い？」
2529 = "「Nhiều tình cảm khác?」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に対する、無数の“好き”が、だ」
2521 = "「Là vô số những tình cảm “yêu thích” dành\ncho Kisaki đấy」"

# monologue
# JP: 稀咲が、はっと僕を見上げる。\nその眼差しが、僕を捉える。
3528 = "Kisaki giật mình ngước nhìn tôi.\nÁnh mắt\nấy, ghim chặt lấy tôi."

# monologue
# JP: 僕の大好きな知性の光は、\n欲望に濡れる瞳の中でも、曇りはしない。
3610 = "Ánh sáng của sự thông tuệ mà tôi hằng yêu\nthích,\ndù trong đôi mắt đẫm lệ dục vọng,\nvẫn không hề bị che mờ."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は稀咲が、稀咲であると知っている。\n稀咲の全てを愛しているし、尊敬している」
2463 = "「Anh biết Kisaki, chính là Kisaki.\nAnh yêu\ntất cả mọi thứ thuộc về Kisaki, và cũng\nrất tôn trọng em」"

# 【稀咲】
# display as 稀咲
# JP: 「……っ」
1552 = "「……」"

# monologue
# JP: 稀咲の口元が小さく動く。
3505 = "Khóe miệng Kisaki khẽ động đậy."

# monologue
# JP: 何かを言おうとして飲み込んだのかもしれないし、\n表情を押さえ込んでいるのかもしれない。
3074 = "Có lẽ em ấy định nói gì đó nhưng lại nuốt\nvào trong,\nhoặc cũng có thể em ấy đang cố\nkìm nén cảm xúc của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は稀咲を傷つけたくない、捻じ曲げたくない。\n稀咲が稀咲でなくなることを、何より強く恐れている」
2397 = "「Anh không muốn làm tổn thương Kisaki,\nkhông muốn bóp méo con người em.\nAnh sợ\nhãi hơn bất cứ điều gì, việc Kisaki không\ncòn là Kisaki nữa」"

# 【稀咲】
# display as 稀咲
# JP: 「なら、双鉄の理性は、さ――」
2781 = "「Vậy thì, lý trí của anh Soutetsu, đã――」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2813 = "「!!?」"

# monologue
# JP: 稀咲が、胸をおしつけてくる。
3477 = "Kisaki ép sát ngực vào tôi."

# monologue
# JP: 股間と股間を密着させて、\nゼロ距離から――蕩ける言葉を流し込んでくる。
3228 = "Đũng quần dán chặt lấy nhau,\ntừ cự ly số\nkhông――em ấy rót vào tai tôi những lời lẽ\nngọt ngào làm tan chảy tâm trí."

# 【稀咲】
# display as 稀咲
# JP: 「ボクが、ボクじゃなかったら。\nとっくに壊れちゃってるの？」
2329 = "「Nếu em, không còn là em nữa.\nThì lý trí\ncủa anh đã sụp đổ từ lâu rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「その仮定は――無意味だ。\n稀咲は、稀咲だ」
2067 = "「Giả thiết đó――thật vô nghĩa.\nKisaki, là\nKisaki」"

# 【稀咲】
# display as 稀咲
# JP: 「無意味かどうか、試してみる？」
2104 = "「Có vô nghĩa hay không, anh muốn thử\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！！？」
2812 = "「!!!?」"

# monologue
# JP: 稀咲が僕の前にたつ。\n背中を向けて――顔を、見せないようにして。
3534 = "Kisaki đứng trước mặt tôi.\nQuay lưng\nlại――như để giấu đi khuôn mặt của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲？」
# 2641 = "「稀咲？」" 

# 【稀咲】
# display as 稀咲
# JP: 「じゃ、ないって思ってみて？　ここにいるのは、\nボクそっくりな、けれど稀咲じゃない女だって」
2752 = "「Vậy, anh cứ thử nghĩ không phải thế xem\nsao? Rằng người đang ở đây,\nlà một người\nphụ nữ giống hệt em, nhưng không phải là\nKisaki」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲ではない――女」
2377 = "「Không phải là Kisaki――một người phụ nữ」"

# 【稀咲】
# display as 稀咲
# JP: 「そう、ただの女。ただの女の、ただの肉体」
2356 = "「Đúng vậy, chỉ là một người phụ nữ. Một\nthể xác, của một người phụ nữ bình thường」"

# 【双鉄】
# display as 雙鐵
# JP: 「何故、そんなことを――」
2573 = "「Tại sao, em lại nói vậy――」"

# 【稀咲】
# display as 稀咲
# JP: 「知りたいんだ。双鉄は、ボクの外観だけでも――\nボクを好きになって、興奮してくれるのかなって」
2426 = "「Em muốn biết. Liệu anh Soutetsu, chỉ cần\nvẻ bề ngoài của em thôi――\ncũng có thể yêu\nthích em, và cảm thấy hưng phấn không」"

# monologue
# JP: ああ――そうなのかと理解する。\n僕がいつでも、どこかでは不安であるように。
3087 = "À――tôi đã hiểu ra vấn đề.\nCũng giống như\ntôi luôn cảm thấy bất an ở một góc nào đó\ntrong lòng."

# monologue
# JP: 稀咲でさえも、自分自身に、\n自信を持てぬ部分を有しているのだと。
3466 = "Ngay cả Kisaki, cũng có những khía cạnh\nmà\nem ấy không thể tự tin vào chính mình."

# 【双鉄】
# display as 雙鐵
# JP: 「確かめずとも、わかろうが」
2064 = "「Không cần kiểm chứng, em cũng thừa hiểu\nmà」"

# monologue
# JP: （ぐいっ）
3826 = "（Thúc）"

# 【稀咲】
# display as 稀咲
# JP: 「んっ！」
# 2282 = "「嗯！」" 

# monologue
# JP: 股間を、勃起を思いっきりに押し付ける。\n稀咲の――女の尻の割れ目にはめ込むように。
3268 = "Tôi ép chặt đũng quần, ép chặt sự cương\ncứng của mình vào.\nNhư thể muốn khảm nó\nvào rãnh mông của Kisaki――của người phụ nữ\nấy."

# 【双鉄】
# display as 雙鐵
# JP: 「僕はこれほど、稀咲の体も求めてる。\nだが、体だけでは意味がないのだ」
2453 = "「Anh khao khát cơ thể của Kisaki đến\nnhường này.\nNhưng, nếu chỉ có cơ thể thôi\nthì chẳng có ý nghĩa gì cả」"

# monologue
# JP: （れるっ）
3816 = "（Liếm）"

# 【稀咲】
# display as 稀咲
# JP: 「んっっ――あ――」
2261 = "「Ưm――a――」"

# monologue
# JP: 髪ごと、首筋を舐めていく。\n首筋から耳――その内側へと、舌を這わせる。
3603 = "Tôi liếm dọc theo gáy, xuyên qua mái tóc.\nTừ gáy lên đến tai――tôi trườn lưỡi vào tận\nbên trong."

# 【稀咲】
# display as 稀咲
# JP: 「ん……や……そんな――優しく――され、たら」
2263 = "「Ưm…… nha…… đừng――dịu dàng――như vậy, chứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、稀咲の全てが好きだ。どこかひとつを\n切り離したなら、それはもう、稀咲ではない」
2418 = "「Anh, yêu mọi thứ thuộc về Kisaki. Nếu\ntách rời\nbất cứ phần nào ra, thì đó không\ncòn là Kisaki nữa」"

# 【稀咲】
# display as 稀咲
# JP: 「それは――双鉄。それは、凄く嬉しい……ん――\nだけ、どっ……」
2726 = "「Chuyện đó――anh Soutetsu. Nghe vậy, em rất\nvui…… ưm――\nnhưng, mà……」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2298 = "「嗯？」" 

# monologue
# JP: 動きを止めれば、稀咲は暫く息を整え、\nそうして、つぶやく。
3025 = "Khi tôi dừng động tác, Kisaki mất một lúc\nđể điều hòa nhịp thở,\nvà rồi, em ấy lẩm\nbẩm."

# 【稀咲】
# display as 稀咲
# JP: 「大事にされすぎるのも――不安になるんだ。\nいっつも、だって……セックス――ボクから、だし」
2074 = "「Được trân trọng quá mức――cũng khiến em\nthấy bất an.\nLúc nào cũng vậy, bởi vì……\nlàm tình――toàn là do em chủ động, mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、僕が不慣れだからだ。欲望のままに動いて、\n稀咲を傷つけはしないかと」
2415 = "「Đó là, do anh chưa quen thôi. Anh sợ nếu\ncứ hành động theo dục vọng,\nthì sẽ làm tổn\nthương Kisaki mất」"

# 【稀咲】
# display as 稀咲
# JP: 「もう慣れてるってば！　ボクの体のこと、\nきっと、ボクよりも良く、知ってるし」
2062 = "「Anh đã quen rồi còn gì! Cơ thể của em,\nchắc chắn, anh còn hiểu rõ hơn cả em nữa\ncơ mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2216 = "「Ưm」"

# 【稀咲】
# display as 稀咲
# JP: 「それに――ボクは、ボクはね？　双鉄」
2656 = "「Hơn nữa――em, em này? Anh Soutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 2810 = "「！！」" 

# monologue
# JP: 稀咲の指が、僕の手を取る。\nそのまま腕は持ち上がり――
3513 = "Ngón tay Kisaki, nắm lấy tay tôi.\nCứ thế\nnâng cánh tay tôi lên――"

# monologue
# JP: （むにゅっ）
3799 = "（Nắm lấy）"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄に、思い切り好きにして欲しいんだ。\n双鉄のしたい、セックスを」
2422 = "「Em muốn anh Soutetsu, cứ thoải mái làm\ntheo ý mình.\nLàm tình, theo cách mà anh\nSoutetsu muốn」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2612 = "「Anh hiểu rồi」"

# monologue
# JP: 遠慮が、不安を引き出していた。
3327 = "Sự e dè của tôi, đã gây ra sự bất an cho\nem ấy."

# monologue
# JP: 傷つけることを恐れるあまり、\n逆に傷つけてしまっていた。
3109 = "Quá sợ hãi việc làm tổn thương em ấy,\nmà\nngược lại, tôi đã vô tình làm em ấy tổn\nthương."

# monologue
# JP: （さすっ――）
3814 = "（Vuốt――）"

# 【稀咲】
# display as 稀咲
# JP: 「ふ……ぁっ――」
2189 = "「Fu…… a――」"

# monologue
# JP: であらば今は、望むがままに――\n動いた指は、胸の表面を撫でさする。
3666 = "Nếu vậy thì bây giờ, cứ làm theo ý muốn\nthôi――\nNgón tay tôi di chuyển, vuốt ve bề\nmặt bầu ngực em ấy."

# monologue
# JP: （さわっ――さすっ――すりっ――こしゅっ）
3812 = "（Chạm――vuốt――xoa――miết）"

# 【稀咲】
# display as 稀咲
# JP: 「は……んっ――ふ、ぁ……手……双鉄の、手――\nあったか――ふっ……はぁ……はふっ」
2203 = "「Ha…… ưm――fu, a…… tay…… tay của, anh\nSoutetsu――\nấm quá――fu…… ha…… ha fu」"

# monologue
# JP: 本物の、最上質のシルクの感触。\nそれだけで手のひらが喜んでいる。
3335 = "Cảm giác chân thực của loại lụa thượng\nhạng nhất.\nChỉ vậy thôi cũng đủ khiến lòng\nbàn tay tôi vui sướng."

# monologue
# JP: 僕も僕もとせがまれるまま、指にも力を加えていく。
3287 = "Chiều theo những lời nài nỉ liên hồi, tôi\ndần tăng thêm lực vào những ngón tay."

# 【稀咲】
# display as 稀咲
# JP: 「乳首……双鉄、に……なでられ――て……っ……\nそれだけ、で――こんなに、あつく――かたく――」
2003 = "「Đầu vú…… được, anh Soutetsu…… vuốt ve――……\nChỉ cần vậy, thôi――đã nóng ran――và cứng\nlại, thế này――」"

# monologue
# JP: 手のひらにも、こりゅこりゅとせがんでくれている。\n触れて欲しいと、いじってほしいと。が――
2983 = "Nó cũng đang cọ cọ vào lòng bàn tay tôi\nnhư muốn vòi vĩnh.\nMuốn được chạm vào,\nmuốn được trêu đùa. Nhưng――"

# monologue
# JP: （もにゅっ――）
3811 = "（Nắn nắn――）"

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！」
2255 = "「Fua!」"

# monologue
# JP: 今はまだ、乳房を思い切り堪能したい。
3277 = "Bây giờ tôi vẫn muốn tận hưởng trọn vẹn\nbầu ngực này đã."

# 【稀咲】
# display as 稀咲
# JP: 「ゆっくり……なん、だね――ふっ――あ――\n優しいの、も――好き――ん――気持ちいい――けど」
2057 = "「Anh muốn…… từ từ, nhỉ――fu――a――\nDịu dàng\nthế này, em cũng――thích――ưm――sướng\nlắm――nhưng mà」"

# monologue
# JP: （これほどまでに柔らかなのに、\nこれほど確かに応えてくれる）
3822 = "（Mềm mại đến mức này,\nmà lại phản ứng rõ\nràng đến vậy）"

# monologue
# JP: あらためて意識をすれば、手指は至福に満たされる。\nおっぱいが、男を狂わす理由を僕も、思い知る。
3289 = "Khi nhận thức lại điều đó, những ngón tay\ntôi ngập tràn hạnh phúc.\nTôi cũng đã hiểu\nra lý do tại sao bầu ngực lại khiến đàn\nông phát cuồng đến vậy."

# 【稀咲】
# display as 稀咲
# JP: 「んっ――ふっ――ああっ――双、鉄っ――\n指……エッチ……ん……すごい――ねっとり――」
2260 = "「Ưm――fu――a a――anh, Soutetsu――\nNgón tay……\ndâm quá…… ưm…… tuyệt thật――dính dính――」"

# monologue
# JP: 体が、どんどん熱くなる。\n指の動きが、止まらなくなる。
3643 = "Cơ thể, ngày càng nóng lên.\nChuyển động\ncủa ngón tay, không thể dừng lại được nữa."

# monologue
# JP: （もみゅっ――もにゅっ――くにっ――むにゅっ）
3810 = "（Nắn nắn――bóp bóp――miết――vò）"

# 【稀咲】
# display as 稀咲
# JP: 「おっぱい……んっ――ふっ――もっと――\n双、鉄、の――好きに――して――ほしっ――」
2663 = "「Ngực em…… ưm――fu――thêm nữa đi――\nAnh,\nSoutetsu, cứ――làm theo ý, thích――của anh,\nđi――」"

# 【双鉄】
# display as 雙鐵
# JP: 「十分、好きにしているが？」
2423 = "「Anh đã làm đủ thứ mình thích rồi mà?」"

# monologue
# JP: （くにっ）
3804 = "（Nắn）"

# 【稀咲】
# display as 稀咲
# JP: 「やっ！？　乳首――ンッ」
2164 = "「Á!? Núm vú――ưm」"

# monologue
# JP: （くにっ――こしゅっ――もみゅっ――くりゅん！）
3803 = "（Nắn――vuốt――xoa――vê!）"

# 【稀咲】
# display as 稀咲
# JP: 「ひあっ――んっ――それっ――あっ！　ちく、びっ\n――そんな、に――くりくり――され、たらぁっ」
2197 = "「I a――ưm――cái đó――á! Núm, vú\n――bị――vê――như\nthế, thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「されたら、なんだ？」
2530 = "「Bị thế thì, sao nào?」"

# 【稀咲】
# display as 稀咲
# JP: 「っ――ううん。ふあっ――なん、でも――ない……\nんっ――」
1538 = "「――Ưm. Phua――không, có――gì……\nưm――」"

# monologue
# JP: 多分、自分の欲望を、稀咲は喉に押し込めた。\nそれは切ないことでもあるが、嬉しくもある。
3475 = "Có lẽ Kisaki đã kìm nén dục vọng của mình\nxuống cổ họng.\nĐiều đó khiến tôi vừa xót\nxa, lại vừa vui sướng."

# 【双鉄】
# display as 雙鐵
# JP: 「どこまでも――僕の望むままにか」
2411 = "「Dù thế nào đi nữa――cũng sẽ theo ý muốn\ncủa anh sao」"

# monologue
# JP: ならば、強くを試してみたい。\n痛みの声を感じるのなら、もちろんすぐに緩めるが――
3023 = "Nếu vậy, tôi muốn thử mạnh tay một chút.\nNếu cô ấy kêu đau, tất nhiên tôi sẽ nới\nlỏng ngay――"

# monologue
# JP: （むみゅっ！！）
3815 = "（Bóp chặt!!）"

# 【稀咲】
# display as 稀咲
# JP: 「ひウっ！！！」
2198 = "「I ư!!!」"

# monologue
# JP: 甘さ。喜び。\n稀咲の、雌の嬌声が、僕の雄へと突き刺さる。
3369 = "Sự ngọt ngào. Sự vui sướng.\nTiếng rên rỉ\nđầy nữ tính của Kisaki xuyên thấu vào bản\nnăng đàn ông của tôi."

# monologue
# JP: （もみっ――モニュ――さすっ――こリュッ――）
3809 = "（Xoa――nắn――vuốt――chà――）"

# 【稀咲】
# display as 稀咲
# JP: 「ふうっ――はぁ――んっ――ふぁっ――んっ――\n～～っ！　はっ――ふぁっ――ん……んふ――」
2188 = "「Phù――hà――ưm――phua――ưm――\n~~!\nHà――phua――ưm……ưm phu――」"

# monologue
# JP: （もみゅっ――にゅむっ――くにゅっ――むにゅん）　
3806 = "（Xoa――nắn――bóp――nặn）"

# 【稀咲】
# display as 稀咲
# JP: 「は――あっ――んはっ、あっ――ふっ――ふうっ、\nはぁ――あっ――んっ――くふ――んっ――ふうっ」
2201 = "「Hà――á――ưm hà, á――phù――phù,\nhà――á――ưm――ư\nphu――ưm――phù」"

# monologue
# JP: 稀咲の汗が、手に落ちてくる。
3516 = "Mồ hôi của Kisaki rơi xuống tay tôi."

# monologue
# JP: すべすべとしたチャイナドレスの手触りが、\nただそれだけで変化する。肌への密着が強くなる。
3319 = "Cảm giác mượt mà của bộ sườn xám\nchỉ vì\nthế mà thay đổi. Nó bám chặt vào da thịt\nhơn."

# monologue
# JP: （もみゅっ――もにっ――くにゅつ――ふあっ――）
3808 = "（Xoa――nắn――bóp――phua――）"

# 【稀咲】
# display as 稀咲
# JP: 「っっっ～～っ――ふぁっ、あっ――おっぱい――ん、\nふっ――ふあっ――んっ――ふうっ――ふうっ」
2170 = "「~~~――phua, á――vú――ưm,\nphù――phua――ưm――phù――phù」"

# monologue
# JP: これほど揉んでも、揉み足りぬ。\nそれゆえ、乾きはいや増していく。
3208 = "Dù xoa nắn đến thế này vẫn thấy chưa đủ.\nBởi vậy, sự khao khát ngày càng tăng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「おっぱい以外も、好きにするぞ」
2789 = "「Ngoài vú ra, anh cũng sẽ làm theo ý mình\nđấy」"

# 【稀咲】
# display as 稀咲
# JP: 「あっ！」
2241 = "「Á!」"

# monologue
# JP: ズボンの前だけ手早く開き、\n勃起の全てを剥き出しにする。
3225 = "Tôi nhanh chóng kéo khóa quần,\nđể lộ hoàn\ntoàn dương vật đang cương cứng."

# monologue
# JP: （ぐりっ）
# 3826 = "（頂）" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！　ペニスっ――すごい――双鉄っ――\nこんなに、硬くっ――て――ふ、あっ――熱いっ」
2254 = "「Phua! Dương vật――tuyệt quá――anh\nSoutetsu――\nCứng――như thế này――phu, á――nóng\nquá」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
2258 = "「Ưm――」"

# monologue
# JP: 直接を、稀咲の尻の谷間に挟む。\nただそれだけで、声がもれるほど気持ちいい。
3559 = "Tôi kẹp trực tiếp nó vào khe mông của\nKisaki.\nChỉ thế thôi cũng sướng đến mức\nphát ra tiếng rên."

# monologue
# JP: 極上過ぎる稀咲の肉が最高級のシルクを\n僕に押し付けてきて――
3496 = "Da thịt tuyệt hảo của Kisaki ép chặt lớp\nlụa cao cấp\nvào người tôi――"

# monologue
# JP: （しにゅっ――ぐいっ）
3813 = "（Ép――đẩy）"

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――んっ――そう、てつ――すご、い――\nっ――びく、びく――してる――あつくて、おっきい」
2253 = "「Phua――ưm――anh, Soutetsu――tuyệt, quá――\n――giật, giật――liên hồi――nóng quá, to quá」"

# monologue
# JP: 稀咲が体を震わせる、その刺激さえ快感になり、\nだから、どこまでも貪欲になる。
3492 = "Kisaki run rẩy cơ thể, sự kích thích đó\ncũng biến thành khoái cảm,\ncho nên, tôi\ncàng trở nên tham lam vô độ."

# 【双鉄】
# display as 雙鐵
# JP: 「もっと、近くで感じさせてくれ」
2102 = "「Hãy cho anh cảm nhận gần hơn nữa đi」"

# monologue
# JP: （しゅるっ）
3752 = "（Roạt）"

# 【稀咲】
# display as 稀咲
# JP: 「あっ」
# 2234 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2298 = "「嗯？」" 

# monologue
# JP: サイドの紐をほどいてみても、\n黒の下着は、そのまま股間を離れない。
3624 = "Dù đã cởi sợi dây buộc hai bên,\nchiếc quần\nlót màu đen vẫn dính chặt lấy háng cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「濡れて、くっついてしまっているのか」
2523 = "「Ướt đẫm nên dính chặt vào rồi sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「やっ――双鉄、そんな恥ずかしいことっ」
2248 = "「Này――anh Soutetsu, đừng nói chuyện đáng\nxấu hổ như thế」"

# 【双鉄】
# display as 雙鐵
# JP: 「いかんか？　僕は言いたいのだがな」
1987 = "「Không được sao? Nhưng anh lại muốn nói\nđấy」"

# 【稀咲】
# display as 稀咲
# JP: 「んっ！！！」
2283 = "「Ưm!!!」"

# monologue
# JP: 稀咲が慌てて言葉を飲み込む。
3549 = "Kisaki vội vàng nuốt lời vào trong."

# monologue
# JP: 恥ずかしさを吐き出せなくなってしまってせいか、\n首筋が、じわじわ赤くなっていく。
3574 = "Có lẽ vì không thể thốt ra sự ngượng\nngùng,\nphần cổ cô ấy dần dần đỏ bừng lên."

