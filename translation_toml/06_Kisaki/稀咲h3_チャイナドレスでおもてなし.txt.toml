2775 = "「Và anh muốn hỏi. Em hãy nói cho anh biết.\nTại sao cởi dây ra rồi mà quần lót vẫn\nkhông rớt xuống?」"

# 【稀咲】
# display as 稀咲
# JP: 「――」
1530 = "「――」"

# monologue
