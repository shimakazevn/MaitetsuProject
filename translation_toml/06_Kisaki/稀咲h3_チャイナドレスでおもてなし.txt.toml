# 2198 = "「咿！！！」" 

# monologue
# JP: （きゅううううううんんっ！！！）
3757 = "（吱！！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「いっ――きゅううううううううううんんんっ！！！」
2116 = "「去――了！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2217 = "「唔啊！」" 

# monologue
# JP: （どびゅんっ！　ぶびゅっ！　ぶばっ！　びゅるっ！）
3782 = "（咚噗！　噗噗！　噗啪！　噗嚕！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ぁ――ぁっ――ふあっ――あっ――あつい――の\n――しきゅう――たたいて――ふあっ――あっ」
2225 = "「啊――啊――嗚啊――啊――好熱――啊――撞在――子宮上――嗚啊――啊」" 

# monologue
# JP: （びゅう！　びゅっ！　どびゅう！　びゅるっ！！）
3794 = "（噗！　噗！　咚噗！　噗嚕！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「ひあっ――あっ――あっ――ふあっ――ああっ――\nそうっ――てつ――すきっ――すき――すきぃ」
2195 = "「咿啊――啊――啊――嗚啊――啊啊――雙――鐵――喜歡――喜歡――喜歡你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ――稀咲」
2402 = "「我也是――稀咲」" 

# monologue
# JP: （ぐっ！！！）
3780 = "（咕！！！）" 

# 【稀咲】
# display as 稀咲
# JP: 「んんんっっ！！！」
2279 = "「嗯嗯！！！」" 

# monologue
# JP: 腰を掴んで押し付けて、密着よりなお食い込ませる。\n勃起自体を蓋にして、精液全部の栓とする。
3298 = "抓著她的腰往裡面推，肉棒比零距離身貼身還要更深入。勃起的肉棒將精液全部堵在了小穴裡。" 

# monologue
# JP: （びゅっ――びゅるっ！　びゅぶっ――ぷっ――）
3790 = "（噗――噗嚕！　咻噗――唔――）" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――あっ――あ……子宮……これ……\nんっ――卵子……精液で、おぼれちゃう、かも」
2252 = "「嗚啊――啊――啊……子宮……這個……嗯――卵子……要給精液從頭泡到腳了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の赤ちゃんの種なのだぞ？\nそんなに弱いわけもなかろう」
2043 = "「但那是稀咲小寶寶的種喔？不會那麼柔弱的」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ、そうだね……っ――双鉄の精液だから……\nおぼれないよう……ちゃんと、優しくしてくれるしね」
2187 = "「呵呵，是啊……――那是雙鐵的精液啊……一定會很溫柔的……不會悶著她的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
# 2619 = "「稀咲」" 

# monologue
# JP: （ツッ――）
3758 = "（呲――）" 

# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！」
# 2255 = "「嗚啊！」" 

# monologue
# JP: チャイナドレスの布地の上から\n背中のラインに指を這わせる。
3675 = "隔著旗袍的衣料，我撫摸起她後背的線條。" 

# monologue
# JP: たっぷりと吸われた汗が、僕の指にも絡みつく。
3354 = "沁滿的汗液沾上了我的手指。" 

# monologue
# JP: （ちぷっ）
3787 = "（啾）" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄、ね？　指しゃぶりなんて、してないで」
2794 = "「雙鐵，不要含手指頭喔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2612 = "「知道了」" 

# monologue
# JP: 肌をほどいて、稀咲を抱きしめ、キスをする。
3640 = "身體放鬆下來，我抱住稀咲吻她。" 

# 【稀咲】
# display as 稀咲
# JP: 「ん……ちゅっ――ふっ――ちゅむっ――ちゅっ、\nちゅるっ――れろっ――れるうっ――ちゅむっ」
2269 = "「嗯……啾――呼――啾唔――啾、啾――舔――舔――啾唔」" 

# monologue
# JP: 稀咲は、舌でおねだりしてくる。
3523 = "稀咲的舌頭還在渴求我的愛。" 

# monologue
# JP: まだ足りないと――\n僕とおんなじ気持ちを素直に、伝えてくれる。
3246 = "我感覺到了，她還不滿足――其實我也有一樣的感情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ソファだと、布地が痛むのか？」
2561 = "「沙發上會傷到布料嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「布地！？」
2370 = "「布料！？」" 

# monologue
# JP: 一瞬、びっくりした顔をして、\nすぐに稀咲は、くすくす小さく笑い出す。
3122 = "她好像有點詫異，然後馬上又噗嗤笑出了聲來。" 

# 【稀咲】
# display as 稀咲
# JP: 「そんなの！　双鉄が構わないなら、構わないよ？\nこのドレスは、双鉄にしか見せないものだし」
2390 = "「怎麼會呢！　只要你不介意，我也不介意啦。只有雙鐵見過這件旗袍啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは嬉しい。\nしかし、やはり痛めてはもったいないな」
2451 = "「我是很高興啦。但是我也不想弄壞這件衣服，多可惜啊」" 

# monologue
# JP: 布地を接触させないで、しかも今度は繋がりながら、\n稀咲の胸も楽しむには――ああ！
2977 = "不能讓布料接觸沙發麵，而且下次還要在插入的同時，享受稀咲胸部的滋味――對了！" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕が、ソファに横たわるとしよう」
2768 = "「那我就躺在沙發上好了」" 

# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、いいよ？\nそれならボクは、双鉄をクッションにしちゃうから」
2185 = "「呵呵，好啊。我就拿雙鐵當彈簧墊吧」" 

# monologue
# JP: いつもと同じ、瞬時の理解。\nつながり、響き会えてる快感。ゆえ、気づく。
3127 = "她理解得飛快，跟平時一樣。這種緊密相連、啪啪直響的快感，讓我明白。" 

# monologue
# JP: 僕と稀咲は、言葉で、脳で――\nいつでもセックス、しているのだと。
3234 = "我和稀咲，一直都在透過語言和思考在交合著，一刻不停。" 
