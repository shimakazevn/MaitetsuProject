2388 = "「怎麼了，雙鐵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2555 = "「沒什麼――」" 

# monologue
# JP: しかし、聞くのもあまりにヤボだ。\nすぐさま話を、今度こそ確実に切り替える。
3002 = "但是問這個問題就沒意思了。趕快認真地討論一下這件事吧。" 

