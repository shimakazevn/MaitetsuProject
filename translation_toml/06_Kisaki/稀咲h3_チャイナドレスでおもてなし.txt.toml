1571 = "「……帝國鐵路有限公司就要騰飛了――而且不提前定好時間，名簿都定不出來」" 

# monologue
# JP: 納得すれば、苦笑が浮かぶ。\n元忠さんが、その程度を理解してない筈もない。
3611 = "要是人家接受的話，想想我就苦笑了。元忠叔叔不可能不了解這一點。" 

# monologue
