2302 = "「因為我以前沒有那個身份啊。我回到御一夜前，只是小酒鋪的店員和帝大學生」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうだったっけ。\n双鉄には貫禄があるから、ついつい、ね」
2246 = "「啊，對哦。看你總是威風凜凜的，總是不由自主就那麼想了」" 

# monologue
