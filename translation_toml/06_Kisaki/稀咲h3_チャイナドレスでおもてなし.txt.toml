# JP: 「子宮！　子宮っ！！　ボクの――おまんこ、こ――\n一番、大事な――んっ――赤ちゃんの――部屋っ！」
2342 = "「Tử cung! Tử cung!! Của em――âm đạo, âm―― Quan trọng, nhất――ưm――căn phòng――của em bé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤ちゃんの部屋に――」
2353 = "「Vào căn phòng của em bé――」"
# 【稀咲】
# display as 稀咲
# JP: 「キスして！　叩いて！　ノックして！！\nたくさん、たくさん――ピュッピュしてぇっ！」
2681 = "「Hãy hôn đi! Hãy gõ đi! Hãy đập cửa đi!! Thật nhiều, thật nhiều――bắn tinh vào đi!」"
# monologue
# JP: 先回りされ、おねだりされる。\n嬉しい。満たされる。応えたい。
3132 = "Bị đón đầu, bị vòi vĩnh. Vui sướng. Thỏa mãn. Muốn đáp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2809 = "「！」" 
# monologue
# JP: （ずんっっっ！！！）
3772 = "（Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「くふぅんんんん～～～～っ！！！」
2257 = "「Khu phư ưm~~~~!!!」"
# monologue
# JP: 快感は既に十分すぎる。\n稀咲の体をしっかり支え、ただいっしんに腰を振る。
46 = "Khoái cảm đã quá đủ rồi. Tôi đỡ chặt cơ thể Kisaki, và chỉ chăm chăm vung hông."
# monologue
# JP: （ずっ！　ずばんっ！　ずるっ！　ぐぽんっ！！）
3755 = "（Thút! Phập! Trượt! Ục!!）"
# 【稀咲】
# display as 稀咲
# JP: 「来てるっ！　ごつん、って！　ふひゅっ、んっ！\n赤ちゃんの、部屋――ごんごんっ――されてゆっ」
2077 = "「Đến rồi! Cộp, một cái! Phu hyu, ưm! Căn phòng, của em bé――đang bị――gõ cộc cộc」"
# monologue
# JP: （ずばんっ！　ずるうっ！　ごりゅっ！　ずこん！）
3760 = "（Phập! Trượt! Ngoáy! Phập!）"
# 【稀咲】
# display as 稀咲
# JP: 「これっ！　またっ――来てっ！　チカって――\nふあっ――あたま――しろい、の――波っ、きてっ」
2120 = "「Cái này! Lại――đến rồi! Chớp chớp―― Phua――đầu óc――trắng xóa――cơn sóng, đang đến」"
# monologue
# JP: （くぼっ！　ぼちゅっ！　ずぷっ！　ずぶんっ！！）
3773 = "（Ục! Bạch! Phập! Phập!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひゅあっ！　らめっ！　ごちゅん、しゅごいのっ、\nおまんこ、おまんこっ――とけて――あたま、がっ」
2157 = "「Hyua! Không được! Cộp, tuyệt quá, Âm đạo, âm đạo――tan chảy――đầu óc, cũng」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう少しだけ、がまんしてくれ」
2048 = "「Hãy cố chịu đựng thêm một chút nữa thôi」"
# monologue
# JP: （ずぶっ！　ずばっ！！！　にゅぶ！　ぶちゅん！）
3762 = "（Phập! Phập!!! Phập! Bạch!）"
# 【稀咲】
# display as 稀咲
# JP: 「～～～っ！！　はっ――がまんっ、むりっ！\nがんばる、けどっ――もうっ！　おまんこ、だって！」
2218 = "「~~~!! Hà――chịu đựng, không nổi! Cố gắng, nhưng mà――không được! Cả âm đạo, cũng thế!」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう少し、だ――」
2742 = "「Một chút nữa, thôi――」"
# monologue
# JP: 子宮の口が、ちゅうちゅう吸ってくれている、\n膣全体が、僕に貼り付き甘えてくれてる。
3155 = "Cổ tử cung đang chụt chụt hút lấy tôi, Toàn bộ âm đạo bám chặt lấy tôi như đang làm nũng."
# monologue
# JP: ただ、そこを突く。\n精液全部を注ぐこむための助走をつける。
3218 = "Chỉ cần đâm vào đó. Lấy đà để rót toàn bộ tinh dịch vào."
# monologue
# JP: （ずぶっ！　じゅばっ！　ぶちゅっ！　ばちゅん！！）
3763 = "（Phập! Phập! Bạch! Bạch!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひゃうっ！　らめ！　がまん――むりっ！！\nいくっ！　ボクっ！　いっちゃうよ――もうっ！」
2159 = "「Hyau! Không được! Chịu đựng――không nổi!! Ra mất! Em! Sắp ra rồi――á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2237 = "「A!」"
# monologue
# JP: （じゅるううううううっ！！）
3786 = "（Chụttttt!!）"
# monologue
# JP: 僕も、もうすでに限界だ。
3236 = "Tôi cũng đã đến giới hạn rồi."
# monologue
# JP: 思いっきりに、子宮の奥へ。\n精液全部をぶっつけることだけを意識して――っ！
3373 = "Đâm mạnh vào tận sâu trong tử cung. Chỉ ý thức việc bắn toàn bộ tinh dịch vào――!"
# monologue
# JP: （ごぢゅんんっ！！！）
3775 = "（Phập!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひっっ！！！」
# 2198 = "「咿！！！」" 
# monologue
# JP: （きゅううううううんんっ！！！）
3757 = "（Thít chặt!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「いっ――きゅううううううううううんんんっ！！！」
2116 = "「Ra――rồiiiiii!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2217 = "「Kua!」"
# monologue
# JP: （どびゅんっ！　ぶびゅっ！　ぶばっ！　びゅるっ！）
3782 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【稀咲】
# display as 稀咲
# JP: 「ぁ――ぁっ――ふあっ――あっ――あつい――の\n――しきゅう――たたいて――ふあっ――あっ」
2225 = "「A――á――phua――á――nóng――quá ――tử cung――đang đập――phua――á」"
# monologue
# JP: （びゅう！　びゅっ！　どびゅう！　びゅるっ！！）
3794 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【稀咲】
# display as 稀咲
# JP: 「ひあっ――あっ――あっ――ふあっ――ああっ――\nそうっ――てつ――すきっ――すき――すきぃ」
2195 = "「Hia――á――á――phua――á á―― Sou――tetsu――yêu anh――yêu anh――yêu anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ――稀咲」
2402 = "「Anh cũng vậy――Kisaki」"
# monologue
# JP: （ぐっ！！！）
3780 = "（Hự!!!）"
# 【稀咲】
# display as 稀咲
# JP: 「んんんっっ！！！」
2279 = "「Ưm ưm!!!」"
# monologue
# JP: 腰を掴んで押し付けて、密着よりなお食い込ませる。\n勃起自体を蓋にして、精液全部の栓とする。
3298 = "Tôi nắm lấy hông cô ấy ép chặt, đâm sâu hơn cả sự áp sát. Dùng chính sự cương cứng làm nắp đậy, chặn toàn bộ tinh dịch lại."
# monologue
# JP: （びゅっ――びゅるっ！　びゅぶっ――ぷっ――）
3790 = "（Phụt――phụt! Phụt――phụt――）"
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ――あっ――あ……子宮……これ……\nんっ――卵子……精液で、おぼれちゃう、かも」
2252 = "「Phua――á――a......tử cung......cái này...... Ưm――trứng......chắc sẽ, chết đuối trong tinh dịch mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の赤ちゃんの種なのだぞ？\nそんなに弱いわけもなかろう」
2043 = "「Là hạt giống em bé của Kisaki cơ mà? Chắc chắn sẽ không yếu ớt thế đâu」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ、そうだね……っ――双鉄の精液だから……\nおぼれないよう……ちゃんと、優しくしてくれるしね」
2187 = "「Fufu, đúng nhỉ......――Vì là tinh dịch của anh Soutetsu...... Chắc chắn sẽ dịu dàng......để không bị chết đuối nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
# 2619 = "「稀咲」" 
# monologue
# JP: （ツッ――）
3758 = "（Chạm――）"
# 【稀咲】
# display as 稀咲
# JP: 「ふあっ！」
# 2255 = "「嗚啊！」" 
# monologue
# JP: チャイナドレスの布地の上から\n背中のラインに指を這わせる。
3675 = "Từ trên lớp vải của bộ sườn xám Tôi trượt ngón tay dọc theo đường cong trên lưng cô ấy."
# monologue
# JP: たっぷりと吸われた汗が、僕の指にも絡みつく。
3354 = "Mồ hôi thấm đẫm cũng bám lấy ngón tay tôi."
# monologue
# JP: （ちぷっ）
3787 = "（Chụt）"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄、ね？　指しゃぶりなんて、してないで」
2794 = "「Anh Soutetsu này? Đừng có mút ngón tay nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2612 = "「知道了」" 
# monologue
# JP: 肌をほどいて、稀咲を抱きしめ、キスをする。
3640 = "Buông lỏng cơ thể, tôi ôm lấy Kisaki và trao nụ hôn."
# 【稀咲】
# display as 稀咲
# JP: 「ん……ちゅっ――ふっ――ちゅむっ――ちゅっ、\nちゅるっ――れろっ――れるうっ――ちゅむっ」
2269 = "「Ưm......chụt――phu――chụt――chụt, chụt――rero――rero――chụt」"
# monologue
# JP: 稀咲は、舌でおねだりしてくる。
3523 = "Kisaki dùng lưỡi vòi vĩnh."
# monologue
# JP: まだ足りないと――\n僕とおんなじ気持ちを素直に、伝えてくれる。
3246 = "Vẫn chưa đủ―― Cô ấy thành thật truyền đạt cảm xúc giống hệt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ソファだと、布地が痛むのか？」
2561 = "「Nếu làm trên sofa thì vải sẽ bị hỏng sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「布地！？」
2370 = "「Vải!?」"
# monologue
# JP: 一瞬、びっくりした顔をして、\nすぐに稀咲は、くすくす小さく笑い出す。
3122 = "Thoáng chốc, cô ấy làm vẻ mặt ngạc nhiên, nhưng ngay sau đó Kisaki bật cười khúc khích."
# 【稀咲】
# display as 稀咲
# JP: 「そんなの！　双鉄が構わないなら、構わないよ？\nこのドレスは、双鉄にしか見せないものだし」
2390 = "「Chuyện đó! Nếu anh Soutetsu không bận tâm thì em cũng không sao đâu? Bộ váy này, em chỉ cho một mình anh Soutetsu xem thôi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは嬉しい。\nしかし、やはり痛めてはもったいないな」
2451 = "「Anh rất vui. Nhưng mà, làm hỏng thì vẫn uổng lắm」"
# monologue
# JP: 布地を接触させないで、しかも今度は繋がりながら、\n稀咲の胸も楽しむには――ああ！
2977 = "Không để vải tiếp xúc, hơn nữa lần này vừa kết nối, vừa thưởng thức ngực của Kisaki thì――a!"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕が、ソファに横たわるとしよう」
2768 = "「Nếu vậy anh sẽ nằm xuống sofa nhé」"
# 【稀咲】
# display as 稀咲
# JP: 「うふふっ、いいよ？\nそれならボクは、双鉄をクッションにしちゃうから」
2185 = "「Ufufu, được thôi? Nếu vậy em sẽ lấy anh Soutetsu làm gối nệm đấy」"
# monologue
# JP: いつもと同じ、瞬時の理解。\nつながり、響き会えてる快感。ゆえ、気づく。
3127 = "Vẫn như mọi khi, thấu hiểu trong chớp mắt. Khoái cảm của sự kết nối, sự đồng điệu. Vì vậy, tôi nhận ra."
# monologue
# JP: 僕と稀咲は、言葉で、脳で――\nいつでもセックス、しているのだと。
3234 = "Tôi và Kisaki, bằng lời nói, bằng trí óc―― Lúc nào cũng đang làm tình."
