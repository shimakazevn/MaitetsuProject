2293 = "Khi tôi hỏi lý do cho tiếng reo hò bất ngờ đó, Hachiroku đáp lại bằng một giọng đầy hào hứng."

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様！　ただいまの停車駅、中慶北駅において、ようやく機関車交換がなりましたので」
2067 = "「Vâng thưa ngài Soutetsu! Tại ga dừng hiện tại, ga Bắc Trung Khánh, cuối cùng thì việc thay đầu máy cũng đã hoàn tất rồi ạ.」"

# 【志寰】
# display as 志寰
# JP: 「双鉄さん、日々姫さん、レイルロオド・ハチロク。\nさっきは、本当にありがとうございました」
2066 = "「Anh Soutetsu, chị Hibiki, Railord Hachiroku. Vừa nãy thực sự cảm ơn mọi người rất nhiều.」"

# 【西瓜】
# display as 西瓜
# JP: 「おかげで遅延は二時間以内にまとまりそうです。\n先生たちのおかげです」
1774 = "「Nhờ vậy mà thời gian chậm trễ có vẻ đã được kiểm soát trong vòng hai tiếng. Tất cả là nhờ các vị đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1525 = "「À——」"

# monologue
# JP: そうか、機関車・乗務員交代により、\n志寰君と西瓜が救援乗務から開放されたのか。
2327 = "Ra vậy, nhờ việc thay đổi đầu máy và kíp lái, Chí Hoàn và Tây Qua đã được giải phóng khỏi nhiệm vụ cứu hộ rồi sao."

# monologue
# JP: ふたりともさすがに疲れた様子だが、\n達成感を滲ませる笑顔が、疲労の色さえ塗りつぶしている。
2642 = "Dù cả hai đều lộ rõ vẻ mệt mỏi, nhưng nụ cười ánh lên cảm giác thành tựu đã xóa nhòa đi cả sắc thái mệt nhọc đó."

# 【双鉄】
# display as 雙鐵
# JP: 「実に見事な救援だった。引出しもブレーキも、\nなんとなめらかな挙動かと、大いに感心させられた」
1899 = "「Thực sự là một cuộc cứu hộ xuất sắc. Cả lúc khởi hành lẫn lúc phanh hãm, chuyển động mượt mà đến mức khiến tôi vô cùng thán phục.」"

# 【志寰】
# display as 志寰
# JP: 「！！　双鉄さんに運転操作をほめていただけるなんて。\nとても強い励みになります！　ありがとうございます！」
1566 = "「!! Được anh Soutetsu khen ngợi kỹ năng lái tàu như vậy. Thật sự là một sự khích lệ rất lớn đối với em! Cảm ơn anh rất nhiều!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1595 = "「Hửm!?」"

# monologue
# JP: 僕の運転操作など、大したレベルとも思えんのだが……\nよほど良いとこ撮りの資料でも渡っているのだろうか？
2441 = "Kỹ năng lái tàu của tôi cũng đâu đến mức xuất sắc gì cho cam...... Chẳng lẽ Kisaki đã gửi cho họ những tài liệu quay lại những khoảnh khắc đẹp nhất của tôi sao?"

# monologue
# JP: まぁしかし、今は招聘されている立場ゆえ、\n謙遜するのも、逆に失礼になるかもしれん。
2227 = "Nhưng mà, hiện tại tôi đang ở vị thế của một khách mời, nếu khiêm tốn quá thì ngược lại có thể sẽ thành ra thất lễ."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方も、志寰君を見習いたいと思った。\n技術の練磨――悉究に、いきつくところはないからな」
1532 = "「Bản thân tôi cũng muốn học hỏi từ Chí Hoàn. Bởi vì việc rèn luyện kỹ thuật——sự tất cứu, là không có điểm dừng mà.」"

# 【志寰】
# display as 志寰
# JP: 「！！　とても光栄です！　僕はただ、基本通りのことを、\n基本通りにやっているだけかと思いますけど、それでも」
1900 = "「!! Em rất vinh hạnh! Em nghĩ mình chỉ làm theo những điều cơ bản, một cách cơ bản nhất thôi, nhưng dù vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1555 = "「Ừ.」"

# monologue
# JP: 苦し紛れに選んだ言葉が、\n思わぬ納得を呼び込んでくれる。
2443 = "Những lời tôi chọn trong lúc bối rối, lại mang đến sự đồng tình ngoài mong đợi."

# monologue
# JP: 基本なら、白紙の状態から徹底的に、今もってなお、\nハチロクが僕の全身に、叩き込み続けてくれているゆえ。
2609 = "Nếu nói về \"cơ bản\", thì từ lúc tôi còn là một tờ giấy trắng cho đến tận bây giờ, Hachiroku vẫn luôn không ngừng nhồi nhét nó vào từng tế bào của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、逆に、僕にとっての単なる基本動作が、\n志寰君には熟達した技量と映っているかもしれんのか」
1478 = "「Ra vậy, nói cách khác, những thao tác cơ bản đối với tôi, trong mắt Chí Hoàn lại trở thành kỹ năng điêu luyện sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、あるかも！　\\x%l指差喚呼;#00ffc040;指差喚呼%l;#;とかしないんだぁって、\n私、志寰君と西瓜ちゃんの運転、さっき見てて思ったし」
1552 = "「A, có thể lắm! Em vừa xem Chí Hoàn và Tây Qua lái tàu, đã thắc mắc sao họ không làm \\x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1555 = "「啊」" 

# monologue
# JP: 言われてみれば、だ。
2357 = "Nghe em ấy nói vậy mới để ý."

# monologue
# JP: 救援車の運転台内。\n志寰君も西瓜も\\x%l指差喚呼;#00ffc040;指差喚呼%l;#;をしていなかったような気がする。
2366 = "Trong buồng lái của đầu máy cứu hộ. Hình như Chí Hoàn và Tây Qua đều không thực hiện \\x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「……状況が緊迫していたとはいえ、気づけんものだな。\n自分の見たいものしか見れていない、ということなのか」
1108 = "「......Dù lúc đó tình hình có căng thẳng, nhưng tôi lại chẳng hề nhận ra. Quả nhiên con người chỉ nhìn thấy những gì mình muốn thấy thôi sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「そいば、普通のことでしょお。私の場合は、\n目にうつるもの全部を見たい、ってだけのことだし」
1457 = "「Chuyện đó cũng bình thường mà. Còn với em, em chỉ đơn giản là muốn nhìn thấy tất cả những gì lọt vào tầm mắt thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ……しかし、運転操作について\n見逃したというのは……機関士としては恥ずかしい」
1537 = "「Ưm......nhưng mà, việc bỏ sót cả thao tác lái tàu thì...... Đúng là đáng xấu hổ với tư cách một người lái tàu.」"

# 【日々姫】
# display as 八六＆日日姬
# JP: 「そうではないかと」\n「そぎゃんこつなかとよ」
2035 = "「Không phải vậy đâu ạ.」\n「Không đến mức đó đâu anh.」"

# monologue
# JP: ふたりが同時に僕の言葉をせき止めて、しばし見つめ合い、\nどうぞ、と日々姫が目線で譲る。
2263 = "Hai người đồng thanh ngắt lời tôi, rồi nhìn nhau một lúc, Sau đó Hibiki đưa mắt nhường lời cho Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「あの場での双鉄様は、運行全体――事態解決のための\n方法を、ただ一心に見つめていらしただけのことです」
1630 = "「Lúc đó ngài Soutetsu chỉ tập trung vào toàn bộ quá trình vận hành—— Chỉ một lòng tìm cách giải quyết tình huống mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1543 = "「À——」"

# monologue
# JP: なるほど。言われればそうかもしれぬ。
2330 = "Ra vậy. Nghe cô ấy nói thì có lẽ đúng là thế."

# monologue
# JP: 思った途端、僕の中での昔っからの疑念がわずかに、\nゆるみほどける。
2610 = "Ngay khi nghĩ vậy, một nỗi nghi ngờ từ lâu trong tôi đã phần nào được gỡ bỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「皆が僕を、レールを敷く者だと評価してくれるのは\n……あるいは、僕がそうした視線を持つ者だからか」
1636 = "「Mọi người đánh giá tôi là người lát đường ray ......Có lẽ là vì tôi luôn nhìn nhận vấn đề dưới góc độ đó chăng.」"

# 【日々姫】
# display as 日日姬
# JP: 「きっと、そぎゃんね！\nもちろん、それだけのことでもなかと思うけど」
2045 = "「Chắc chắn là vậy rồi! Tất nhiên, em nghĩ không chỉ có mỗi lý do đó đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ……自分の興味が、視線の先が、いったいどこへ\n向かっているかなど、気にしたこともなかったが」
1539 = "「Ưm......Sự quan tâm của mình, hay ánh mắt của mình rốt cuộc đang hướng về đâu, trước giờ tôi chưa từng bận tâm đến.」"

# 【日々姫】
# display as 日日姬
# JP: 「ふふっ」
1605 = "「Fufu.」"

# monologue
# JP: 日々姫が笑う。なぜだかとてもしあわせそうに――\nああ、いや。
2486 = "Hibiki mỉm cười. Không hiểu sao trông em ấy vô cùng hạnh phúc—— À, không phải."

# monologue
# JP: “興味を持つ”という行為事態を拒んでいた過去の僕を\n知る日々姫ゆえ、この変化も喜んでくれているのか。
2482 = "Chính vì Hibiki biết rõ tôi trong quá khứ, một kẻ luôn từ chối việc \"có hứng thú\" với bất cứ thứ gì, nên em ấy mới vui mừng trước sự thay đổi này của tôi."

# 【ハチロク】
# display as 八六
# JP: 「うふふっ。そうしたお気付きもまた、\n仲国にこなければ得られなかったものかもしれませんね」
1611 = "「Fufu. Những nhận thức như vậy, có lẽ nếu không đến Trung Quốc thì ngài đã chẳng thể có được nhỉ.」"

# monologue
# JP: ハチロクも、日々姫と同じくしあわせそうだ。\nそう感じれば、ふつふつ嬉しさが湧いてくる。
2290 = "Hachiroku cũng trông hạnh phúc hệt như Hibiki. Nhận ra điều đó, một niềm vui sướng chợt trào dâng trong tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「だな。あるいはこれもまた、異文化交流の成果であり、\n僕自身への、思わぬ悉究であるのかもしれん」
1917 = "「Đúng vậy. Hoặc có lẽ đây cũng là thành quả của việc giao lưu văn hóa, và là một sự tất cứu đầy bất ngờ đối với chính bản thân tôi.」"

# 【姜】
# display as 姜
# JP: 「禍転じて、佳きご視察のひとつとなったのであれば、\n当方にとっても大変に喜ばしいことです」
1631 = "「Trong cái rủi có cái may, nếu điều đó giúp ích cho chuyến khảo sát của mọi người, thì đối với chúng tôi đó cũng là một niềm vui lớn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「姜さん」
1658 = "「Cô Khương.」"

# monologue
# JP: 姜さんにも感謝の言葉しかないなぁと、\n今更ながら強く感じる。
2429 = "Đến tận lúc này tôi mới cảm nhận sâu sắc rằng, tôi thực sự chỉ có những lời biết ơn dành cho cô Khương."

# monologue
# JP: いつでもこの人は一番目立たぬところをしっかり支え、\n後補機として、行程の全てを成り立たせてくれている。
2491 = "Lúc nào cô ấy cũng âm thầm hỗ trợ vững chắc ở những nơi khuất lấp nhất, đóng vai trò như một đầu máy phụ đẩy phía sau, giúp toàn bộ hành trình diễn ra suôn sẻ."

# 【双鉄】
# display as 雙鐵
# JP: 「おかげさまで、まことに実り多き視察を\n重ねさせていただけていると感じます」
1467 = "「Nhờ có cô mà tôi cảm thấy chúng tôi đã có được những chuyến khảo sát vô cùng thiết thực và bổ ích.」"

# 【姜】
# display as 姜
# JP: 「なによりです。聖都でも同様に佳き視察をお重ね\n頂きたいと存じますので、ひとつ、ご相談があります」
2041 = "「Vậy thì tốt quá. Tôi cũng mong mọi người sẽ có những chuyến khảo sát thuận lợi tại Thịnh Đô, nhưng trước đó, tôi có một chuyện muốn bàn bạc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「相談ですか。なんでしょう」
1411 = "「Bàn bạc sao? Chuyện gì vậy?」"

# 【姜】
# display as 姜
# JP: 「ご視察の日程を、一日――いえ、半日だけでも、\n延長することは叶いませんか？」
2034 = "「Lịch trình khảo sát, liệu mọi người có thể kéo dài thêm một ngày—— không, dù chỉ nửa ngày thôi, có được không?」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1559 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ痛っ！！？」
1522 = "「A đau!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！？」
1797 = "「Hibiki!?」"

# 【日々姫】
# display as 日日姬
# JP: 「って、ごめん、邪魔して。\n平気やけん、続けて続けて」
1578 = "「A, xin lỗi vì đã cắt ngang. Em không sao đâu, mọi người cứ tiếp tục đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2033 = "「Vậy sao.」"

# monologue
# JP: 延長の二文字にいろめきたった日々姫が\n状況を忘れ立ち上がりかけ、ゆえに沈んだ。
2212 = "Vừa nghe đến hai chữ \"kéo dài\", Hibiki đã phấn khích đến mức quên mất hoàn cảnh mà đứng bật dậy, kết quả là ngã rầm xuống."

# monologue
# JP: まぁ寝台は柔らかなものだし、\n声からしてもまったく心配なさそうだが。
2226 = "Mà giường nằm cũng mềm, nghe giọng em ấy thì có vẻ chẳng có gì đáng lo cả."

# 【双鉄】
# display as 雙鐵
# JP: 「……可能であるなら、もちろん滞在を延長し、\nより多くをさせていただきたい気持ちはありますが――」
1077 = "「......Nếu có thể, tất nhiên chúng tôi cũng muốn kéo dài thời gian lưu trú để có thể làm được nhiều việc hơn, nhưng mà——」"

# 【ハチロク】
# display as 八六
# JP: 「大変に残念ですが、明々後日、帰国予定日の\n翌日には、ポーレット様に帝都での会合のご予定が」
1435 = "「Rất tiếc, nhưng ngày kia, tức là một ngày sau ngày dự định về nước, Thị trưởng Paulette đã có lịch họp ở Đế Đô rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「国交省のもので、ポーレットが出ないとまずい会合\nなのです。ので、僕が御一夜に戻っていないと」
1873 = "「Đó là cuộc họp của Bộ Đất đai, Hạ tầng, Giao thông và Du lịch, Paulette không thể không tham gia. Do đó, tôi bắt buộc phải có mặt ở Ohimitera.」"

# 【姜】
# display as 姜
# JP: 「理解しました。責任者不在の状況が発生してしまう――\nというわけですね」
1750 = "「Tôi hiểu rồi. Sẽ dẫn đến tình trạng không có người chịu trách nhiệm ở lại quản lý—— là vậy đúng không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「です。僕か日々姫がいなくては、万一何かがあった場合、事態を収拾できなくなりかねません」
1837 = "「Đúng vậy. Nếu không có tôi hoặc Hibiki ở đó, lỡ như có chuyện gì xảy ra, e rằng sẽ không có ai giải quyết tình hình.」"

# monologue
# JP: 赤井宮司は現役の神職であるお立場上、公共性が高くとも、\n一営利企業の管理職につくことを固辞される。
2618 = "Đền chủ Akai với tư cách là một thần quan đương nhiệm, dù công ty có tính chất phục vụ cộng đồng cao, ông vẫn kiên quyết từ chối đảm nhận chức vụ quản lý của một doanh nghiệp vì lợi nhuận."

# monologue
# JP: 現場の知識なら凪は十分だが、経営面ではまだ知識不足。\nふかみは完全にその逆で――その他の面々も一長一短だ。
2311 = "Về kiến thức thực địa thì Nagi hoàn toàn nắm rõ, nhưng về mặt quản lý kinh doanh thì vẫn còn thiếu sót. Fukami thì hoàn toàn ngược lại——những người khác cũng đều có điểm mạnh điểm yếu riêng."

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、いや……その観点でいうのなら、\n日々姫のみが数日滞在を延長することは――」
1541 = "「Hửm? À, không......Nếu xét theo khía cạnh đó, thì việc chỉ có Hibiki ở lại thêm vài ngày——」"

# 【日々姫】
# display as 日日姬
# JP: 「冷静になったら、やっぱり無理と。私は私で、\nデザインの方のスケジュールがみっちりつまっとるけん」
1461 = "「Bình tĩnh nghĩ lại thì, chắc là không được đâu. Bản thân em cũng có lịch trình thiết kế kín mít rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか」
1568 = "「À, cũng đúng nhỉ.」"

# 【姜】
# display as 姜
# JP: 「残念ですが、日程延長がご無理とのこと了解しました。\nでは、少し強行軍とはなりますが――」
1423 = "「Thật đáng tiếc, tôi đã hiểu là mọi người không thể kéo dài lịch trình. Vậy thì, hành trình tiếp theo sẽ có chút gấp gáp——」"

# monologue
# JP: 姜さんが、志寰君と、なにやら仲国語で打ち合わせ始める。\nすぐさま西瓜が、通訳・補足してくれる。
2397 = "Cô Khương và Chí Hoàn bắt đầu bàn bạc điều gì đó bằng tiếng Trung Quốc. Ngay lập tức, Tây Qua đã dịch và giải thích lại cho chúng tôi."

# 【西瓜】
# display as 西瓜
# JP: 「……約90分到着が遅延しますので、今日、\n健為を見学にいくことが不可能となってしまったのです」
1074 = "「......Do thời gian đến nơi sẽ bị chậm trễ khoảng 90 phút, nên hôm nay, việc đi tham quan Kiện Vi đã trở nên bất khả thi rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ケンイー、とは？」
2084 = "「Jianwei, là gì vậy?」"

# 【西瓜】
# display as 西瓜
# JP: 「健康の健に、物事を為すの為と書いて、健為です。\n蒸気機関車が現役で仕事をしている地方鉱山都市です」
1851 = "「Viết là chữ 'Kiện' trong 'khỏe mạnh', và chữ 'Vi' trong 'làm việc', đọc là Kiện Vi. Đó là một thành phố khai thác mỏ địa phương nơi đầu máy hơi nước vẫn đang hoạt động.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　\\x%l蒸機;#00ffc040;蒸機%l;#;といよいよ会えるのですね！\n今日の見学が不可能としても、それは、明日には？」
1513 = "「Trời ơi! Cuối cùng cũng được gặp \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; rồi sao! Dù hôm nay không thể tham quan, vậy thì, ngày mai thì sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。もちろん見学していただく予定です。ので、\n明日のものだった予定を今日にずらしての組み換えを」
1817 = "「Vâng. Tất nhiên là chúng ta sẽ đi tham quan rồi ạ. Vì thế, chúng tôi đang sắp xếp dời lịch trình ngày mai sang hôm nay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1477 = "「Ra vậy.」"

# monologue
# JP: と、いうことは、明日丸一日分だった予定の一部を、\n今日の着後にもってくる形の組み換えとなる。
2248 = "Nói cách khác, một phần lịch trình của cả ngày mai sẽ được dời lên sau khi chúng tôi đến nơi vào hôm nay."

# monologue
# JP: であらば、予定の全行程はこなしきれぬであろうゆえ――
2639 = "Nếu vậy, e rằng chúng tôi sẽ không thể hoàn thành toàn bộ lịch trình dự kiến——"

# 【姜】
# display as 姜
# JP: 「優先すべき視察内容を、双鉄先生、日々姫女士、\nレイルロオド・ハチロクに決定頂きたく思います」
1761 = "「Tôi muốn anh Soutetsu, cô Hibiki, và Railord Hachiroku quyết định xem nội dung khảo sát nào nên được ưu tiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。どのような選択肢があるのでしょうか？」
1650 = "「Vâng. Chúng tôi có những lựa chọn nào vậy?」"

# 【姜】
# display as 姜
# JP: 「北琴から来た一般的な観光客が好みそうな場所として、\n『自然景』『歴史遺産』『演劇文化』『パンダ』などを」
1431 = "「Những địa điểm mà khách du lịch bình thường từ Bắc Cầm thường thích bao gồm: 'Phong cảnh thiên nhiên', 'Di sản lịch sử', 'Văn hóa kịch nghệ', 'Gấu trúc', v.v.」"

# 【ハチロク】
# display as 八六＆日日姬
# JP: 「パンダ！！」
1864 = "「Gấu trúc!!」"

# monologue
# JP: ハチロク日々姫が異口同音の歓声をあげ、驚いたように\nお互いを見て、同時にはにかんだ笑みを浮かべる。
2272 = "Hachiroku và Hibiki đồng thanh reo lên, rồi cả hai ngạc nhiên nhìn nhau và cùng nở nụ cười bẽn lẽn."

# 【双鉄】
# display as 雙鐵
# JP: 「パンダというのは、\n仲国でもやはり人気のある動物なのですか？」
1994 = "「Gấu trúc, ở Trung Quốc cũng là một loài động vật rất được yêu thích sao?」"

# 【姜】
# display as 姜
# JP: 「もちろん、大いに人気がありますね。この辺は、\n聖都での仕事も多い志寰君の方が詳しいでしょう」
2054 = "「Tất nhiên rồi, chúng rất được yêu thích. Về vấn đề này, Chí Hoàn, người thường xuyên làm việc ở Thịnh Đô, chắc hẳn sẽ rành hơn.」"

# 【志寰】
# display as 志寰
# JP: 「国内外を問わず、観光客が聖都で一番訪れる場所が、\n聖都の、[ぱんだはんしょくきち,10]大熊猫保存研究中心基地です」
1412 = "「Dù là khách trong hay ngoài nước, địa điểm được ghé thăm nhiều nhất ở Thịnh Đô, chính là Cơ sở Nghiên cứu Bảo tồn Gấu trúc lớn Thịnh Đô.」"

# 【日々姫】
# display as 日日姬
# JP: 「パンダ基地！　有名！！　芸能人とかときどきいって、\nパンダの赤ちゃん抱っこしたりしてるとこでしょ？」
1861 = "「Cơ sở gấu trúc! Nổi tiếng lắm luôn!! Thỉnh thoảng lại có mấy người nổi tiếng đến đó, rồi bế mấy bé gấu trúc con đúng không?」"

# 【西瓜】
# display as 西瓜
# JP: 「そうですね。パンダの赤ちゃんを抱っこ出来る施設は、\n仲国全土で。つまり世界中でここ一箇所と聞いています」
2007 = "「Đúng vậy ạ. Cơ sở cho phép bế gấu trúc con, nghe nói trên toàn Trung Quốc, hay nói cách khác là trên toàn thế giới, chỉ có duy nhất một nơi này thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「赤ちゃんを抱っこ！？　パ、パンダの赤ちゃんを――\n抱っこ、できるのでございますか？？？」
1773 = "「Bế gấu trúc con!? B-Bế gấu trúc con—— thật sự được bế sao ạ???」"

# monologue
# JP: なんと、ハチロクが異常な食いつきをみせている。
2295 = "Không ngờ Hachiroku lại tỏ ra hứng thú một cách lạ thường như vậy."

# monologue
# JP: ハチロク好みの配色は黒赤金と思っていたが……\nふぅむ、白黒もツボであるのか。
2428 = "Tôi cứ tưởng Hachiroku thích phối màu đen-đỏ-vàng cơ chứ...... Ưm, hóa ra trắng-đen cũng hợp gu em ấy sao."

# 【志寰】
# display as 志寰
# JP: 「残念ですけれど抱っこには、事前の申込みと審査と、\nとても高額の寄付金とが必要となります」
1416 = "「Rất tiếc nhưng để được bế, mọi người cần phải đăng ký trước, trải qua vòng xét duyệt, và phải quyên góp một khoản tiền rất lớn.」"

# 【姜】
# display as 姜
# JP: 「もちろん、ご希望があればできるかぎりの交渉を」
1878 = "「Tất nhiên, nếu mọi người muốn, chúng tôi sẽ cố gắng thương lượng hết sức có thể.」"

# 【ハチロク】
# display as 八六
# JP: 「いえいえいえいえ！！？　そんな恐れ多い――\nと、申しますかそのような経験……わたくし、無理です」
1406 = "「Không không không không!!? Thật là vinh hạnh quá—— nhưng mà trải nghiệm như vậy......em, không làm được đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「赤ちゃんクマの一体くらい、\n整備体でもあるのだし、問題なく抱っこできよう」
1442 = "「Chỉ là một bé gấu con thôi mà, em đang dùng thân chính, bế chắc chắn không thành vấn đề đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「そうではなくて――おそれおおくて、尊くて。\nわたくしきっと……回路を焼き切ってしまいます」
1408 = "「Không phải vậy đâu ạ——nó quá đỗi cao quý và thiêng liêng. Em chắc chắn sẽ......bị cháy mạch mất thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
1644 = "「Đến mức đó sao.」"

# monologue
# JP: ハチロクがそこまで動物好きとは思わなかった。\nコン駅長など、れいなや日々姫ばかりになついて――
2437 = "Tôi không ngờ Hachiroku lại yêu động vật đến thế. Bởi vì Ga trưởng Kon toàn quấn lấy Reina và Hibiki thôi——"

# monologue
# JP: （ああいや、あるいは、\n動物好きだが、接し方などがわからんだけか？）
2660 = "（À không, có lẽ, em ấy thích động vật, nhưng chỉ là không biết cách tiếp xúc với chúng chăng?）"

# monologue
# JP: 右田は酒造だ。ペットは飼えん。帝鉄時代はそれこそ、\n動物と接する機会すらなかったろうし……
2347 = "Nhà Migita là xưởng nấu rượu. Không thể nuôi thú cưng được. Hồi ở Đường sắt Hoàng gia, chắc chắn em ấy cũng chẳng có cơ hội tiếp xúc với động vật......"

# 【日々姫】
# display as 日日姬
# JP: 「抱っこできなくても、いってみたかと！\nたくさんのパンダなんて、めったに見られんし！」
1688 = "「Dù không được bế thì em vẫn muốn đi thử! Cơ hội được nhìn thấy nhiều gấu trúc cùng lúc hiếm lắm đấy!」"

# 【ハチロク】
# display as 八六
# JP: 「で、ございますよね！」
1597 = "「Đúng vậy nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。両者とも同じ希望か」
1531 = "「Hừm. Cả hai đều có chung nguyện vọng sao.」"

# monologue
# JP: 確認すれば、ハチロクはぶんぶんぶんぶん幾度も頷く。\n回路がすでに壊れてしまっているかの如く、強く激しく。
2440 = "Vừa xác nhận, Hachiroku đã gật đầu lia lịa liên tục. Mạnh mẽ và mãnh liệt đến mức tưởng chừng như mạch điện của em ấy đã hỏng mất rồi."

# monologue
# JP: そこまで見たいものならば、僕に異論のあるはずもない。
2458 = "Nếu em ấy đã muốn xem đến vậy, tôi cũng chẳng có lý do gì để phản đối."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことでこちらの意見はまとまりました。\n問題なければ、そのパンダ基地を視察したいのですが」
1747 = "「Vậy là ý kiến của chúng tôi đã thống nhất. Nếu không có vấn đề gì, chúng tôi muốn đi khảo sát cơ sở gấu trúc đó.」"

# 【姜】
# display as 姜
# JP: 「承りました。では……」
1652 = "「Tôi đã hiểu. Vậy thì......」"

# monologue
# JP: また仲国語での打ち合わせ。\n西瓜は何度でも根気よく、通訳・補足をしてくれる。
2237 = "Lại là một cuộc thảo luận bằng tiếng Trung Quốc. Tây Qua vẫn kiên nhẫn phiên dịch và bổ sung cho chúng tôi hết lần này đến lần khác."

# 【西瓜】
# display as 西瓜
# JP: 「到着予定時間とバスの時間を確認しています。\n先に一度、お宿で荷物を下ろしていただくかどうかを」
1452 = "「Họ đang xác nhận thời gian dự kiến đến nơi và lịch trình xe buýt. Xem liệu mọi người có nên ghé qua nhà nghỉ để cất hành lý trước hay không.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにとハチロクが平気なら、私としては、\nパンダ基地の方に直行したかと」
2060 = "「Nếu anh hai và Hachiroku không thấy phiền, em muốn đi thẳng đến cơ sở gấu trúc luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな、旅の興奮もあるのかもしれんが――\n今のところは、特段の疲労なども感じていないし」
1809 = "「Đúng vậy, có lẽ do sự hào hứng của chuyến đi—— nhưng hiện tại tôi cũng không cảm thấy mệt mỏi gì đặc biệt.」"

# 【ハチロク】
# display as 八六
# JP: 「早く到着すればその分長くパンダを見られるのですから。\nわたくしも、そのご判断を支持いたします」
1801 = "「Đến sớm thì sẽ có thêm nhiều thời gian để ngắm gấu trúc mà. Em cũng ủng hộ quyết định đó ạ.」"

# 【姜】
# display as 姜
# JP: 「わかりました。では、志寰君に乗車可能な一番早い\nパンダバスを予約手配してもらいます」
1647 = "「Tôi hiểu rồi. Vậy thì, tôi sẽ nhờ Chí Hoàn đặt vé chuyến xe buýt gấu trúc sớm nhất có thể.」"

# 【ハチロク】
# display as 八六
# JP: 「パンダバス！　バスまでパンダなのですか！？」
1860 = "「Xe buýt gấu trúc! Đến cả xe buýt cũng là gấu trúc sao!?」"

# 【姜】
# display as 姜
# JP: 「話によるとそのようですね。\n当方も、実物を見聞したことはまだ無いのですけれど」
1779 = "「Nghe nói là vậy. Bản thân tôi cũng chưa từng được tận mắt chứng kiến.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　わたくし、存じ上げませんでした。\n聖都はその名にふさわしい、パンダの都なのですね！」
1518 = "「Ôi trời ơi! Em hoàn toàn không biết luôn. Thịnh Đô quả thật xứng danh là thủ đô của gấu trúc nhỉ!」"

# 【姜】
# display as 姜
# JP: 「らしいですね。\nひょっとすると、駅員もパンダかもしれません」
1889 = "「Có vẻ là vậy. Biết đâu, nhân viên nhà ga cũng là gấu trúc đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　うふふふふっ。\nでしたらきっと、笹のきっぷが必要ですね」
1508 = "「Ôi! Ufufufu. Nếu vậy chắc chắn phải dùng vé bằng lá trúc rồi nhỉ.」"

# monologue
# JP: 姜さんの真顔の冗談に、ハチロクがころころ笑いころげる。\n――なんとも、旅だ。旅の空気だ。
2394 = "Trước câu nói đùa tỉnh bơ của cô Khương, Hachiroku cười khúc khích không ngớt. ——Thật đúng là một chuyến đi. Bầu không khí của một chuyến du lịch."

# monologue
# JP: 到着直前の空気の弛緩が、\n仕事も立場も、全てをひととき、溶かしたようだ。っと。
2361 = "Sự thư giãn trước khi đến nơi, như thể đã hòa tan mọi công việc và vị thế trong chốc lát."

# 【姜】
# display as 姜
# JP: 「ああ、到着の準備に入りましたね。\n乗車時にお預けしたカードを、お戻しください」
1584 = "「A, có vẻ họ đang chuẩn bị đến ga rồi. Xin hãy trả lại thẻ mà tôi đã đưa cho mọi người lúc lên tàu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「『硬臥換票証』ですね。はい」
1045 = "「Là 'Giấy đổi vé giường nằm cứng' nhỉ. Đây ạ.」"

# monologue
# JP: 車掌さんが僕らの寝台に戻ってきて、\nカードときっぷを再交換する。
2312 = "Trưởng tàu quay lại giường nằm của chúng tôi, và tiến hành đổi thẻ lấy vé một lần nữa."

# monologue
# JP: 志寰君がなにやら短く会話して、\nほっとしたような笑顔を浮かべる。
2412 = "Chí Hoàn trao đổi ngắn gọn vài câu, rồi nở nụ cười nhẹ nhõm."

# 【志寰】
# display as 志寰
# JP: 「よかった。回復運転もがんばっているようです。\nこれなら遅延は、90分を切れるかもしれません」
1640 = "「Tốt quá rồi. Có vẻ họ đang nỗ lực tăng tốc để bù lại thời gian. Như thế này thì độ trễ có thể rút ngắn xuống dưới 90 phút.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2050 = "「Vậy thì còn gì bằng.」"

# monologue
# JP: 換票証の再交換は、\n下車の準備開始の格好の目印であるらしい。
2342 = "Việc đổi lại giấy đổi vé, có vẻ là một dấu hiệu tốt cho thấy đã đến lúc chuẩn bị xuống tàu."

# monologue
# JP: どの寝台の脇の通路にも人がはみ出し、\n車内は一気に、喧騒の度を増している。
2235 = "Hành khách bắt đầu tràn ra lối đi cạnh các giường nằm, khung cảnh trong xe bỗng chốc trở nên ồn ào và náo nhiệt hơn hẳn."

# 【姜】
# display as 姜
# JP: 「そろそろ身支度を整えましょう。大きな荷物を、\n寝台の下から引出してしまってかまいませんか」
1746 = "「Chúng ta cũng chuẩn bị hành lý thôi. Tôi kéo những hành lý lớn từ dưới gầm giường ra nhé?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、お願いします。助かります」
1586 = "「A, làm phiền cô. Cảm ơn cô nhiều.」"

# 【ハチロク】
# display as 八六
# JP: 「荷物整理が大変でしたら、\n上の寝台もどうぞお使いくださいましね？」
1867 = "「Nếu việc sắp xếp hành lý khó khăn quá, mọi người cứ thoải mái sử dụng giường tầng trên nhé?」"

# 【日々姫】
# display as 日日姬
# JP: 「ありがと、ハチロク」
2008 = "「Cảm ơn nhé, Hachiroku.」"

# 【西瓜】
# display as 西瓜
# JP: 「志寰、手伝う！」
1717 = "「Chí Hoàn, để em giúp!」"

# monologue
# JP: 僕らの寝台も一気ににぎわう。\nまったく耳慣れぬチャイムが響き、車内放送が流れ始める。
2435 = "Khu vực giường nằm của chúng tôi cũng lập tức trở nên náo nhiệt. Một tiếng chuông hoàn toàn xa lạ vang lên, và loa phát thanh trên tàu bắt đầu thông báo."

# monologue
# JP: ……仲国語のみの放送だけれど、意味は間違いようもない。\n間もなく終点、聖都着――だ。
1008 = "......Dù thông báo chỉ bằng tiếng Trung Quốc, nhưng ý nghĩa thì không thể nhầm lẫn được. Sắp đến ga cuối, Thịnh Đô——rồi."

# 【ハチロク】
# display as 八六
# JP: 「パンダパトカア、パンダ門、パンダ自販機、パンダ交番、\nパンダ保育所、パンダ弁当、パンダ像、パンダタクシイ」
1863 = "「Xe cảnh sát gấu trúc, cổng gấu trúc, máy bán hàng tự động gấu trúc, đồn cảnh sát gấu trúc, nhà trẻ gấu trúc, cơm hộp gấu trúc, tượng gấu trúc, taxi gấu trúc.」"

# monologue
# JP: 夢見るように、憧れるように、\nハチロクがひたすらパンダを連呼していく。
2276 = "Như đang chìm trong một giấc mơ đầy khao khát, Hachiroku không ngừng lặp đi lặp lại từ gấu trúc."

# 【ハチロク】
# display as 八六
# JP: 「百花繚乱のパンダバスたち、バンダ時計にパンダ帽、\nパンダリュックに、パンダコインにパンダ茶器！」
1502 = "「Những chiếc xe buýt gấu trúc muôn màu muôn vẻ, đồng hồ gấu trúc, mũ gấu trúc, balo gấu trúc, đồng xu gấu trúc và cả bộ ấm trà gấu trúc nữa!」"

# monologue
# JP: 連呼される全てをスケッチしていたのだろう。\nスケッチブックを開き直して、日々姫も感嘆の息を吐く。
2478 = "Chắc em ấy đã phác thảo lại tất cả những thứ vừa được liệt kê. Hibiki mở lại cuốn sổ phác thảo, buông một tiếng thở dài đầy cảm thán."

# 【日々姫】
# display as 日日姬
# JP: 「まっこと……ありとあらゆるパンダデザインの\n見本市とね、こん、聖都パンダ基地って」
2037 = "「Thật sự......Cơ sở gấu trúc Thịnh Đô này cứ như một hội chợ triển lãm đủ mọi thiết kế về gấu trúc vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「見てきた全てが珠玉のデザインとわたくしは感じました。\nけれど――ああ、双鉄さま、けれど、けれども！」
1733 = "「Em cảm thấy tất cả những gì mình nhìn thấy đều là những thiết kế tuyệt mỹ. Nhưng mà——a, ngài Soutetsu, nhưng mà, nhưng mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1590 = "「Ừ.」"

# 【ハチロク】
# display as 八六
# JP: 「実物こそがまことの珠玉！！　ああああ、なんと！\nパンダはなんと！　愛らしい生き物なのでしょう！」
1433 = "「Bản thân gấu trúc mới thực sự là một viên ngọc quý!! Aaaaa, thật là! Gấu trúc thật là! Một sinh vật đáng yêu làm sao!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……来てよかったなぁ」
1067 = "「......Đến đây đúng là quyết định sáng suốt.」"

# monologue
# JP: つくづく思う。\n熱暴走でもしているのではないかと心配になる浮かれぶり。
2299 = "Tôi thực sự nghĩ vậy. Sự phấn khích của em ấy khiến tôi có chút lo lắng không biết em ấy có bị quá tải nhiệt hay không."

# monologue
# JP: ハチロクのこんな姿を見れるのであれば、\n僕にはさほど興味を持てぬパンダの姿も愛しく思える。
2517 = "Chỉ cần được nhìn thấy dáng vẻ này của Hachiroku, thì dù là gấu trúc mà tôi không mấy hứng thú cũng trở nên thật đáng yêu."

# 【ハチロク】
# display as 八六
# JP: 「こどもパンダがこれほど動きまわるものとは――\nあああ、見てください！　ひとつのボオルを奪い合って」
1862 = "「Gấu trúc con lại năng động đến thế này sao—— Aaa, nhìn kìa! Chúng đang tranh nhau một quả bóng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大変に活発なものだな」
1905 = "「Năng động thật đấy.」"

# monologue
# JP: 子パンダもだが、ハチロクも。
2505 = "Cả gấu trúc con lẫn Hachiroku."

# monologue
# JP: 混雑の中、少しでも近くでパンダを見ようと、\n人波にもまれるようにふらふら動き回っている。
2363 = "Giữa đám đông chen lấn, em ấy cứ chạy lăng xăng như bị cuốn theo dòng người, cố gắng tiến lại gần gấu trúc thêm một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「はぐれないように気をつけろよ」
1685 = "「Cẩn thận kẻo lạc đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あああ！　双鉄さま！　見ました？　ころんって！\nこどもパンダが、ひっくり返ってころんって！！！」
1558 = "「Aaa! Ngài Soutetsu! Ngài thấy không? Nó ngã lăn quay kìa! Bé gấu trúc con ngã lộn nhào lăn quay kìa!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「聞こえていないか。日々姫――も、スケッチに夢中か」
1402 = "「Không nghe thấy sao. Hibiki——cũng đang mải mê phác thảo à.」"

# monologue
# JP: ふふ、と小さな笑い声。
2401 = "Fufu, một tiếng cười nhỏ vang lên."

# monologue
# JP: 姜さんと志寰君がさりげなく、パンダに夢中な群衆から、\n日々姫をガードしてくれている。
2533 = "Cô Khương và Chí Hoàn đang khéo léo bảo vệ Hibiki khỏi đám đông cuồng nhiệt vì gấu trúc."

# 【姜】
# display as 姜
# JP: 「もしはぐれたら、一時間後に先程のパンダ自販機の前で\n合流しましょう。こちらは、当方が安全確保します」
1655 = "「Nếu lỡ lạc nhau, một tiếng sau chúng ta sẽ tập trung trước máy bán hàng tự động gấu trúc lúc nãy nhé. Phía bên này, chúng tôi sẽ đảm bảo an toàn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。ありがとうございます。\nではそのように」
1653 = "「Tôi hiểu rồi. Cảm ơn mọi người. Vậy quyết định thế nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「ね！　双鉄さま、双鉄さま――\nあら？　双鉄さま？　どちらでございましょう！？」
1891 = "「Nè! Ngài Soutetsu, ngài Soutetsu—— Ủa? Ngài Soutetsu? Ngài đang ở đâu vậy!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ！　ここだ！　今いく！！\n少しだけ待っていろ」
1573 = "「A, ừ! Tôi ở đây! Tới ngay đây!!\nĐợi một chút nhé.」"

# monologue
# JP: 予想以上にハチロクの動きは大きく、\n人波の度合いも激しい。
2296 = "Hachiroku di chuyển nhanh hơn tôi tưởng, và dòng người cũng đông đúc hơn dự đoán."

# monologue
# JP: 日々姫のことは今は姜さんたちに任せて、\n僕はハチロクの引率に集中するべきだろう。
2479 = "Hibiki thì cứ giao cho cô Khương và mọi người, giờ tôi nên tập trung vào việc dẫn dắt Hachiroku thì hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな、ハチロク」
1421 = "「Để em phải đợi rồi, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「あ。双鉄さま」
1585 = "「A. Ngài Soutetsu.」"

# monologue
# JP: 近くによれば、ハチロクが安堵の笑みを浮かべて――\n同時に僕も、理解する。
2515 = "Khi tôi đến gần, Hachiroku nở một nụ cười nhẹ nhõm—— và cùng lúc đó, tôi cũng đã hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これはかわいらしいな」
1479 = "「Ra vậy, đúng là đáng yêu thật.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふふっ。で、ございましょ？」
1606 = "「Ufufufu. Đúng không ạ?」"

# monologue
# JP: はしゃぎつかれたこどもパンダの、\nスイッチが切れてしまったらしい。
2448 = "Có vẻ như bé gấu trúc con đã chơi đùa đến kiệt sức, và bị sập nguồn mất rồi."

# monologue
# JP: 半端な姿勢で寝こけたそのこを、\n飼育員さんが抱っこして、どこかへ運び去ろうとする。
2536 = "Nhân viên chăn nuôi bế bé gấu trúc đang ngủ gật trong một tư thế lửng lơ ấy lên, và định mang đi đâu đó."

# 【ハチロク】
# display as 八六
# JP: 「なんとしあわせそうな眠りでしょう。\n笹のおふとんに寝かせてもらうのでしょうか？」
1893 = "「Một giấc ngủ trông thật hạnh phúc làm sao. Liệu bé có được ngủ trên chiếc giường làm bằng lá trúc không nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「笹？　笹は彼らの食べ物だろう？　ああいや――\n人間で考えれば、稲ワラの寝具などもあるにはあるか」
1923 = "「Lá trúc? Đó là thức ăn của chúng mà? À không—— nếu nghĩ theo kiểu con người thì cũng có những chiếc giường làm từ rơm rạ nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、双鉄さまったら」
1903 = "「Trời ạ, ngài Soutetsu thật là.」"

# 【西瓜】
# display as 西瓜
# JP: 「子パンダが、おかあさんに抱っこされて眠る映像を、\n西瓜は、テレビの放送で見たことがあります」
1980 = "「Tây Qua đã từng xem cảnh gấu trúc con được mẹ bế ngủ trên chương trình truyền hình rồi.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「西瓜」「まぁまぁまぁ！　パンダのこどもは、おかあさん\nパンダの腕が寝台なのですね！　なんて愛らしい！！」
1949 = "「Tây Qua」「Ôi trời ơi! Gấu trúc con dùng vòng tay của gấu mẹ làm giường ngủ sao! Đáng yêu quá đi mất!!」"

# monologue
# JP: 目にできるなら、確かに愛らしい光景だろうが、\n想像だけでは、さすがに僕は身悶えまでは出来かねる。
2546 = "Nếu được tận mắt chứng kiến thì chắc chắn đó là một khung cảnh rất đáng yêu, nhưng chỉ tưởng tượng thôi thì tôi không thể nào quắn quéo lên được như em ấy."

# monologue
# JP: それよりむしろ気にかかるのは――
2493 = "Hơn nữa, điều khiến tôi bận tâm hơn là——"

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、志寰君と一緒に見学するものかと思ったが――\nああ！　いやっ、そうか。すまんな、僕らのためか」
1971 = "「Tôi cứ nghĩ Tây Qua sẽ đi tham quan cùng Chí Hoàn chứ—— À! Không, ra là vậy. Xin lỗi nhé, vì chúng tôi sao.」"

# 【西瓜】
# display as 西瓜
# JP: 「すまなくないです。けれど双鉄先生とハチロクだけでは、\n仲国語話者とのコミュニケーションが難しいかと」
1732 = "「Không có gì phải xin lỗi đâu ạ. Nhưng nếu chỉ có thầy Soutetsu và Hachiroku, thì việc giao tiếp với người nói tiếng Trung Quốc sẽ rất khó khăn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。うかつだった。大変助かる。\n気にかけてくれてありがとう」
1916 = "「Đúng vậy. Tôi bất cẩn quá. Rất cảm ơn em. Cảm ơn em đã quan tâm.」"

# 【西瓜】
# display as 西瓜
# JP: 「いえ。通訳と身の回りのお世話も、\n今回西瓜が命じられているお仕事ですし、それに――」
1533 = "「Không có gì ạ. Việc phiên dịch và chăm sóc mọi người cũng là nhiệm vụ mà Tây Qua được giao phó lần này, hơn nữa——」"

# monologue
# JP: 西瓜が、きょろきょろあたりを見回す。\nそうして僕に、なにやら言いたげに身を寄せてくる。
2580 = "Tây Qua dáo dác nhìn quanh. Sau đó, cô bé xích lại gần tôi, vẻ như muốn nói điều gì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1724 = "「Sao vậy?」"

# 【西瓜】
# display as 西瓜
# JP: 「先生のご迷惑にならないようでしたら。西瓜は、\n双鉄先生に教えていただきたいことが、ひとつあります」
1941 = "「Nếu không phiền thầy. Tây Qua, có một điều muốn thỉnh giáo thầy Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1035 = "「——Ừm.」"

# monologue
# JP: 西瓜の声が緊張している。\n大事な話と直感する。
2587 = "Giọng Tây Qua lộ rõ vẻ căng thẳng. Trực giác mách bảo tôi đây là một chuyện quan trọng."

# 【双鉄】
# display as 雙鐵
# JP: 「答えられる質問かどうかは聞いてみないとわからんが。\n質問を受け付けること事態には、無論、何の問題もない」
1939 = "「Có trả lời được hay không thì phải nghe thử mới biết. Nhưng tất nhiên, việc nhận câu hỏi thì chẳng có vấn đề gì cả.」"

# 【西瓜】
# display as 西瓜
# JP: 「でしたら、西瓜は双鉄先生――\nレイルロオド・ハチロクのマスターに質問します」
2057 = "「Nếu vậy, Tây Qua xin được hỏi thầy Soutetsu—— Master của Railord Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「！？」
1524 = "「!?」"

# monologue
# JP: ハチロクの名がここで出るとは思わなかった。
2283 = "Tôi không ngờ tên của Hachiroku lại được nhắc đến ở đây."

# monologue
# JP: ハチロクの意識もこどもパンダから引きがされたのか、\n小さく、息を飲むような音が聞こえる。
2286 = "Có vẻ sự chú ý của Hachiroku cũng bị kéo khỏi bé gấu trúc con, tôi nghe thấy một tiếng nín thở nhỏ."

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生はレールを敷かれる方と認識していました。\nハチロクとの共感で、その認識が正しいと理解しました」
2065 = "「Em luôn nghĩ thầy Soutetsu là người lát đường ray. Thông qua cộng cảm với Hachiroku, em đã hiểu được nhận thức đó là chính xác.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1555 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは光栄だ」
1407 = "「Thật vinh hạnh.」"

# monologue
# JP: ハチロクがじわじわ赤くなる。\n僕への高い評価の証と素直に感じ、嬉しくなる。
2289 = "Hachiroku dần đỏ mặt. Tôi cảm thấy vui mừng vì đó là minh chứng cho sự đánh giá cao dành cho mình."

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、志寰に自分の気持ちを伝えたいと考えます。\nけれど。そうしようと思うと、怖くなってしまうのです」
1984 = "「Tây Qua muốn bày tỏ tình cảm của mình với Chí Hoàn. Nhưng. Cứ nghĩ đến việc đó, em lại cảm thấy sợ hãi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1540 = "「Hừm.」"

# monologue
# JP: 伝えたい気持ちがいかなるものであるのかを、\n尋ねなおすのもまた“余計なこと”に違いない。
2628 = "Hỏi lại xem tình cảm mà cô bé muốn truyền đạt là gì, chắc chắn sẽ là một việc \"thừa thãi\"."

# monologue
# JP: ならば、西瓜が話してくれることだけで、\n僕に見いだせる路を探そう。
2632 = "Nếu vậy, tôi sẽ chỉ dựa vào những gì Tây Qua nói để tìm ra con đường mà mình có thể thấy được."

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、何を、怖がっているのだ？」
1438 = "「Tây Qua, em đang sợ hãi điều gì?」"

# 【西瓜】
# display as 西瓜
# JP: 「何を――何を……」
1682 = "「Sợ điều gì——điều gì......」"

# monologue
# JP: 悉究、悉究、悉究と、西瓜が小さく、何度かつぶやく。\nその舌が唇をすばやく舐めて、また悉究が繰り返される。
2578 = "Tất cứu, tất cứu, tất cứu, Tây Qua lẩm bẩm nhỏ nhiều lần. Cô bé liếm môi thật nhanh, rồi lại tiếp tục lẩm bẩm từ tất cứu."

# 【西瓜】
# display as 西瓜
# JP: 「……怖いのは、時間が経過してしまったから。\n志寰が、その間に変化したかもしれないと思うからです」
1084 = "「......Điều em sợ là, thời gian đã trôi qua quá lâu. Em nghĩ có thể Chí Hoàn đã thay đổi trong khoảng thời gian đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君が、\nどのように変化しているのを恐れているのだ？」
2043 = "「Em sợ Chí Hoàn\nđã thay đổi như thế nào?」"

# 【西瓜】
# display as 西瓜
# JP: 「………………。以前、志寰は。\n西瓜のことを――『好きだ』と言ってくれました」
1049 = "「................... Trước đây, Chí Hoàn. Đã từng nói với Tây Qua rằng——'Tớ thích cậu'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1526 = "「Ồ.」"

# 【ハチロク】
# display as 八六
# JP: 「！」
# 1559 = "「啊！」" 

# monologue
# JP: ハチロクがわずかに息を飲む。\nけれども、それ以上のなにごともない。
2268 = "Hachiroku khẽ nín thở.\nNhưng, cũng chỉ có vậy thôi."

# monologue
# JP: ハチロクの反応を特に気にした風もなく――\n西瓜は、静かな言葉を続ける。
2225 = "Không mảy may để tâm đến phản ứng của Hachiroku—— Tây Qua tiếp tục cất giọng đều đều."

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、答えを返さないまま逃げ出しました。\nそれから、一年と七ヶ月が経過してしまいました」
1985 = "「Tây Qua đã bỏ chạy mà không đưa ra câu trả lời. Kể từ đó, một năm bảy tháng đã trôi qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一年七ヶ月は、確かに長い時間だが――」
1398 = "「Một năm bảy tháng, quả thực là một khoảng thời gian dài——」"

# 【西瓜】
# display as 西瓜
# JP: 「っ！！！」
1523 = "「!!!」"

# monologue
# JP: ああ、いや、しかし、人のこころなどはわからない。\n志寰くんが西瓜を今も好きかなど……
2351 = "À, không, nhưng mà, lòng người thì không thể nào đoán trước được. Việc Chí Hoàn hiện tại có còn thích Tây Qua hay không......"

# monologue
# JP: 傍目から、好意があるようにしか見えずとも、\n僕には、何の保証もできない。
2323 = "Dù nhìn từ bên ngoài, có vẻ như cậu ấy vẫn còn tình cảm, nhưng tôi không thể đảm bảo bất cứ điều gì."

# 【双鉄】
# display as 雙鐵
# JP: 「……その期間に、志寰君の心がかわったかどうかは、\nやはり、本人に尋ねてみる他に知る手段がないだろう」
1076 = "「......Trong khoảng thời gian đó, trái tim Chí Hoàn có thay đổi hay không, quả nhiên không còn cách nào khác ngoài việc hỏi trực tiếp cậu ấy.」"

# 【西瓜】
# display as 西瓜
# JP: 「それはそうです。大変理に叶ったお答えです。\nけれど西瓜は、怖くて質問できないのです」
2005 = "「Đúng là vậy ạ. Đó là một câu trả lời rất hợp lý. Nhưng Tây Qua, sợ hãi nên không thể hỏi được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ」
1072 = "「......Ưm.」"

# monologue
# JP: 堂々めぐりだ。\nいささか困ってハチロクに視線を向けてみる――
2335 = "Lại quay về vạch xuất phát rồi. Hơi bối rối, tôi thử hướng ánh mắt về phía Hachiroku——"

# monologue
# JP: が、ハチロクもやはりよい手は思いつかんのか、\n静かに首をふるばかり、だ。
2530 = "Nhưng, có vẻ Hachiroku cũng không nghĩ ra cách nào hay, em ấy chỉ lặng lẽ lắc đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「――ならば、切り口を変えてみよう。志寰君が当時とは\nこころがわりしたと。その様に感じる根拠はあるのか？」
1037 = "「——Nếu vậy, hãy thử thay đổi góc độ xem. Em cảm thấy Chí Hoàn đã thay lòng đổi dạ so với lúc đó. Vậy em có căn cứ nào cho cảm giác ấy không?」"

# 【西瓜】
# display as 西瓜
# JP: 「例えばこのような行動のとき、\n志寰は、必ず西瓜と一緒に行動したがりました」
1844 = "「Ví dụ như trong những hoạt động thế này, Chí Hoàn, nhất định sẽ muốn đi cùng Tây Qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1590 = "「嗯」" 

# 【西瓜】
# display as 西瓜
# JP: 「けれど今は……西瓜がお二人を追いかけるのを……\n志寰は、気にするそぶりも見せませんでした」
1500 = "「Nhưng bây giờ......việc Tây Qua chạy theo hai người...... Chí Hoàn, không hề tỏ ra bận tâm chút nào.」"

# monologue
# JP: それは……役割分担と通訳の必要性とを理解して――\nむしろ信頼のゆえのことではなかろうかと思う。
2635 = "Điều đó......tôi nghĩ là do cậu ấy hiểu được sự phân chia vai trò và sự cần thiết của việc phiên dịch—— đúng hơn, đó là vì sự tin tưởng."

# monologue
# JP: でなくとも、『好きだ』と告げて逃げられて。その後も、\n常に一緒に行動したいと表明するのは……厳しかろう。
2321 = "Dù không phải vậy, thì sau khi tỏ tình 'Tớ thích cậu' và bị bỏ chạy. Sau đó, việc tiếp tục bày tỏ muốn luôn hành động cùng nhau......cũng khó khăn lắm chứ."

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書と志寰も、最近は距離が近いような気がします。\nその疑念は、西瓜の思考を無限ループに追い込みます」
1671 = "「Tây Qua cảm thấy dạo gần đây thư ký Khương và Chí Hoàn cũng có vẻ thân thiết. Sự nghi ngờ đó, đã đẩy suy nghĩ của Tây Qua vào một vòng lặp vô tận.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1554 = "「À......」"

# monologue
# JP: なるほど、西瓜自身も、そうした疑念からでは決して\n求める解を導けないと、そこは自覚出来ているわけか。
2329 = "Ra vậy, bản thân Tây Qua cũng tự nhận thức được rằng, từ những nghi ngờ đó chắc chắn sẽ không thể tìm ra được câu trả lời mà mình mong muốn."

# monologue
# JP: ならば――うむ。\nさらに切り口を変えてみよう。
2460 = "Nếu vậy thì——ưm. Hãy thử thay đổi góc độ một lần nữa xem sao."

# 【双鉄】
# display as 雙鐵
# JP: 「……西瓜と姜さんは、どのような関係なのだ？\n姜さんは、鉄道の現場で働いたことはなさそうだが」
1102 = "「......Tây Qua và cô Khương có quan hệ như thế nào vậy? Trông cô Khương không giống như từng làm việc ở hiện trường đường sắt.」"

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は、老師――志寰のお父さん、\n西瓜の以前のマスターの、お知り合いです」
1673 = "「Thư ký Khương là người quen của lão sư——tức là cha của Chí Hoàn, cũng là Master trước đây của Tây Qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 

# 【西瓜】
# display as 西瓜
# JP: 「試験運転士であった老師と西瓜の報告を受ける側の\n一員に、姜先生が加わられたのは7年ほど前だそうです」
1670 = "「Nghe nói cô Khương đã tham gia vào nhóm tiếp nhận báo cáo của lão sư, một lái tàu thử nghiệm, và Tây Qua vào khoảng 7 năm trước.」"

# monologue
# JP: ……試作機から営業運転に転用された西瓜の東富4　2000は、\nそのまま本線上での各種データを収拾報告し続けた。
1018 = "......Chiếc Đông Phú 4 2000 của Tây Qua sau khi chuyển từ máy thử nghiệm sang vận hành thương mại, vẫn tiếp tục thu thập và báo cáo các loại dữ liệu trên tuyến đường chính."

# 【西瓜】
# display as 西瓜
# JP: 「初めて姜秘書が老師と西瓜に会いに来たのが、５年前。\n報告に顕著な特異性が見られるとして、確認の為でした」
1674 = "「Lần đầu tiên thư ký Khương đến gặp lão sư và Tây Qua là vào 5 năm trước. Vì nhận thấy có sự khác thường rõ rệt trong báo cáo, nên cô ấy đến để xác nhận.」"

# 【双鉄】
# display as 雙鐵
# JP: 「顕著な特異性とは？」
1805 = "「Sự khác thường rõ rệt là sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「異音に関する報告を、特筆すべき頻度と精度をもって、\n老師と西瓜は、あげつづけていたとのことでした」
1615 = "「Đó là việc lão sư và Tây Qua đã liên tục gửi các báo cáo về tiếng ồn bất thường, với tần suất và độ chính xác đáng kinh ngạc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――共感を通じ、『自分には聞こえていない音』を西瓜から受け取っていると、ハチロクも言っていたか」
1545 = "「À——Hachiroku cũng từng nói, thông qua cộng cảm, cô ấy đã nhận được 'những âm thanh mà bản thân không thể nghe thấy' từ Tây Qua nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜の聴覚ユニットは、明らかに設計を上回る、\n偶然の奇跡的な産物として出来上がったようなのです」
1820 = "「Vâng. Bộ phận thính giác của Tây Qua rõ ràng vượt xa thiết kế ban đầu, có vẻ như nó được tạo ra như một sản phẩm kỳ diệu của sự tình cờ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。それは恵まれたな。\n音からは普通の耳の僕らでも、多くを教わる」
1600 = "「Hừm. Quả là một món quà trời ban. Ngay cả với đôi tai bình thường như chúng tôi, âm thanh cũng mang lại rất nhiều thông tin.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜自身も、とても恵まれたと思います。\n音への興味は、西瓜の世界を大きく広げてくれました」
1972 = "「Bản thân Tây Qua cũng cảm thấy rất may mắn. Sự hứng thú với âm thanh đã mở rộng thế giới của Tây Qua rất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　どういうふうにだ？」
1604 = "「Hửm? Mở rộng như thế nào?」"

# 【西瓜】
# display as 西瓜
# JP: 「老師の学ぶ日ノ本語の響きに西瓜はひかれ、\n日ノ本語で会話できるようになりました」
1876 = "「Tây Qua đã bị thu hút bởi âm điệu tiếng Hinomoto mà lão sư học, và từ đó đã có thể giao tiếp bằng tiếng Hinomoto.」"

# 【ハチロク】
# display as 八六
# JP: 「確かに、西瓜の日ノ本語はとても誠実で、\n美しく心地よく響きますね」
1884 = "「Quả thực, tiếng Hinomoto của Tây Qua rất chân thành, nghe rất êm tai và dễ chịu.」"

# 【西瓜】
# display as 西瓜
# JP: 「わあっ」
1506 = "「Oa.」"

# monologue
# JP: 西瓜が笑う。\n弾けるように。それでいて、とても安心したように。
2597 = "Tây Qua mỉm cười. Một nụ cười rạng rỡ. Nhưng đồng thời, cũng vô cùng an tâm."

# 【西瓜】
# display as 西瓜
# JP: 「ハチロクにそういってもらえると、自信になります。\nハチロクの日ノ本語は、澄み切って柔らかに響くから」
1454 = "「Được Hachiroku khen như vậy, Tây Qua thấy tự tin hơn hẳn. Bởi vì tiếng Hinomoto của Hachiroku nghe rất trong trẻo và mềm mại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1526 = "「哦」" 

# monologue
# JP: 澄み切っていて、しかも柔らか。\nなるほど、言われてみればハチロクの声はそう響く。
2499 = "Trong trẻo, và còn mềm mại nữa. Ra vậy, nghe cô bé nói thế mới thấy giọng của Hachiroku đúng là như vậy."

# monologue
# JP: 言われた当人は目をパチクリ、\n照れの余りか、フリーズ同然に陥ってしまったようだが。
2224 = "Người được khen thì chớp chớp mắt liên tục, chắc do quá xấu hổ nên trông như bị đứng hình luôn rồi."

# 【ハチロク】
# display as 八六
# JP: 「まぁ……あの――ええと――ありがとうございます」
2031 = "「Chà......ờm——ừm——cảm ơn cô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は――\n日ノ本語を話せるようになり、なにかが変ったか？」
2059 = "「Tây Qua này—— sau khi biết nói tiếng Hinomoto, có điều gì thay đổi không?」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。そのことにより、姜秘書は、老師と西瓜に新しい\n――志寰には初めての仕事をくださいました」
1835 = "「Vâng. Nhờ vậy mà thư ký Khương đã giao cho lão sư và Tây Qua một công việc mới ——và đó cũng là công việc đầu tiên của Chí Hoàn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「仕事？」
1694 = "「Công việc?」"

# 【西瓜】
# display as 西瓜
# JP: 「老師がご退職され、志寰が西瓜の新しい正機関士と\nして配属されるまで、四ヶ月の空白期間が生じました」
1706 = "「Từ lúc lão sư nghỉ hưu cho đến khi Chí Hoàn được phân công làm lái tàu chính thức mới của Tây Qua, có một khoảng thời gian trống 4 tháng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 

# 【西瓜】
# display as 西瓜
# JP: 「その四ヶ月に、西瓜の東富4　2000の車体・機器更新が\n行われることとなり――そこに仕事を頂いたのです」
1628 = "「Trong 4 tháng đó, thân xe và thiết bị trên chiếc Đông Phú 4 2000 của Tây Qua được tiến hành bảo dưỡng nâng cấp——và chúng em đã nhận được công việc trong lúc đó.」"

# 【ハチロク】
# display as 八六
# JP: 「どのようなお仕事でございましょうか？」
2039 = "「Đó là công việc như thế nào vậy?」"

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本の鉄道の現況の視察。および――\n日ノ本の鉄道技士のスカウトのお仕事です」
1687 = "「Khảo sát hiện trạng đường sắt của Hinomoto. Và—— công việc chiêu mộ các kỹ sư đường sắt của Hinomoto.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「！」\n「まぁ！」
1560 = "「!」\n「Ôi trời!」"

# monologue
# JP: なるほど――西瓜は日ノ本を既に視察していたのか。\nそうしてそれは、姜さんの命によってのこと、と。
2328 = "Ra vậy——Tây Qua đã từng đi khảo sát Hinomoto rồi sao. Và đó là theo lệnh của cô Khương."

# monologue
# JP: 理解できれば、繋がり始める。\n散らばっていた小さな疑問が、一つの答えを描き始める。
2423 = "Một khi đã hiểu, mọi thứ bắt đầu kết nối lại với nhau. Những thắc mắc nhỏ nhặt rải rác bắt đầu vẽ nên một câu trả lời duy nhất."

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は、日ノ本の鉄道が復興しつつあることを\n多大な興味を持って注目なさっておられました」
1672 = "「Thư ký Khương rất quan tâm và chú ý đến việc đường sắt Hinomoto đang dần được phục hưng.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1590 = "「嗯」" 

# 【西瓜】
# display as 西瓜
# JP: 「それで、老師と志寰と西瓜を、日ノ本に送ったのです。\n4ヶ月。視察と、可能であればスカウトをと命じられて」
1763 = "「Vì vậy, cô ấy đã cử lão sư, Chí Hoàn và Tây Qua đến Hinomoto. Trong 4 tháng. Với nhiệm vụ khảo sát, và nếu có thể thì tiến hành chiêu mộ.」"

# monologue
# JP: 1年7ヶ月前……の4ヶ月前。\nなるほど、まさにナインスターズ初走行の直近だ。
2210 = "1 năm 7 tháng trước......của 4 tháng trước. Ra vậy, đúng vào khoảng thời gian ngay trước chuyến chạy đầu tiên của Nine Stars."

# monologue
# JP: ……あの時期であれば、有力なまいてつや技術者などは、\nもう激しい囲い込み合戦の終わったあとであったと思うが。
1022 = "......Vào thời điểm đó, tôi nghĩ cuộc chiến tranh giành khốc liệt những chủ tàu và kỹ sư tài năng có lẽ đã kết thúc rồi chứ."

# 【双鉄】
# display as 雙鐵
# JP: 「成果はどうだった？」
2053 = "「Kết quả thế nào?」"

# 【西瓜】
# display as 西瓜
# JP: 「[ひろでん,1]廣電の[もうりあき,3]毛利安芸先生。[ごとうきゅう,2]後東急の[ごとうかいた,3]後東塊多先生。北開道\nから九洲まで、それぞれ復興の核となる人物を見ました」
1705 = "「Thầy Mouri Aki của Đường sắt điện Hiro. Thầy Goto Kaita của Đường sắt Goto Kyu. Từ Hokkaido đến Kyushu, chúng em đã được gặp gỡ những nhân vật nòng cốt trong công cuộc phục hưng ở mỗi nơi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう！　それは……大変に興味深そうな――\nいや――言葉を飾らず言えば、実に楽しそうな旅だな」
1529 = "「Ồ! Thật là......có vẻ rất thú vị—— À không——nói một cách không hoa mỹ thì, đó thực sự là một chuyến đi rất vui vẻ nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい。大変楽しかったです。北開道や北淕、四國\nなどでは、キーパーソンに直接のお話も聞けました」
1816 = "「Vâng. Rất là vui ạ. Ở Hokkaido, Hokuriku, Shikoku và nhiều nơi khác, chúng em còn được nghe chuyện trực tiếp từ những nhân vật chủ chốt.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんとすばらしいことでしょう」
1583 = "「Ôi, thật là một điều tuyệt vời.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜が録音の方の録り鉄――音鉄だと知ると、\nそれぞれのご自慢の鉄道音風景も聞かせてくれました」
1704 = "「Khi biết Tây Qua là người thích ghi âm tàu hỏa——tức là Tori-tetsu chuyên về âm thanh, mọi người đã cho em nghe những phong cảnh âm thanh đường sắt mà họ tự hào nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\n西瓜の耳は、そうした趣味でも磨かれていたのか」
1546 = "「À——ra vậy. Đôi tai của Tây Qua cũng được mài giũa qua những sở thích như thế sao.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 

# monologue
# JP: 西瓜が照れたのか下を向く。\n反動で、おさげがぴょこっと、嬉しげに揺れる。
2584 = "Không biết có phải do xấu hổ hay không mà Tây Qua cúi gằm mặt xuống. Theo phản xạ, bím tóc của cô bé khẽ giật giật, đung đưa đầy vui sướng."

# 【ハチロク】
# display as 八六
# JP: 「西瓜の耳で聞く鉄道の音風景！\nああ、どれほど素敵なものなのでしょう」
1986 = "「Phong cảnh âm thanh đường sắt được nghe qua đôi tai của Tây Qua! Ôi, hẳn là tuyệt vời lắm.」"

# 【西瓜】
# display as 西瓜
# JP: 「……日ノ本の鉄道音風景は、素晴らしいの一言でした」
1060 = "「......Phong cảnh âm thanh đường sắt của Hinomoto, chỉ có thể diễn tả bằng một từ: tuyệt vời.」"

# 【ハチロク】
# display as 八六
# JP: 「特に印象に残っているのは、\nどのような音でございましょうか？」
1832 = "「Âm thanh nào để lại ấn tượng sâu sắc nhất đối với cô vậy?」"

# 【西瓜】
# display as 西瓜
# JP: 「[つってつ,2]津っ鐵のストーブ列車の車内から聞く、地吹雪の音。\nみちのく湯けむり鉄道の車内放送のオルゴールの音」
1625 = "「Tiếng bão tuyết nghe từ bên trong toa xe sưởi ấm của Đường sắt Tsutetsu. Tiếng hộp nhạc phát ra từ loa thông báo trên tàu của Đường sắt Michinoku Yukemuri.」"

# monologue
# JP: 西瓜の声が、もう音楽だ。\nうっとりと、ここちよく鼓膜をくすぐってくる。
2588 = "Giọng nói của Tây Qua, tự bản thân nó đã là một bản nhạc. Nó mơn trớn màng nhĩ một cách êm ái, khiến người ta say đắm."

# 【西瓜】
# display as 西瓜
# JP: 「[がくなん,1]岳楠鉄道の[でんれい,1]電鈴式の踏切の音。[たいしゃ,1]大社鉄道の古い車輌の、\n空気圧縮機がコココココと鳴く音」
1690 = "「Tiếng chuông điện ở ngã tư đường ngang của Đường sắt Gakunan. Tiếng máy nén khí kêu cọc cọc cọc cọc trên những toa xe cũ của Đường sắt Taisha.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
# 1543 = "「啊——」" 

# monologue
# JP: 思い当たるところがあるのだろうか？\n耳に残る音があるのだろうか？
2217 = "Liệu em ấy có nhớ ra điều gì không? Có âm thanh nào còn đọng lại trong tai em ấy không?"

# monologue
# JP: うっとりとした様子のハチロクを、\nとてもうらやましく感じてしまう。
2301 = "Nhìn dáng vẻ say sưa của Hachiroku, tôi bỗng cảm thấy vô cùng ghen tị."

# 【西瓜】
# display as 西瓜
# JP: 「そうした中でも最高だったのが、クマ川くだり――\n船の上、鉄橋の真下から聞いた、8620の走行音と汽笛」
1933 = "「Và tuyệt vời nhất trong số đó, chính là chuyến đi thuyền trên sông Kuma—— Tiếng chạy tàu và tiếng còi của 8620 nghe từ trên thuyền, ngay dưới cây cầu sắt.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　ありがとうございます！！」
1510 = "「Ôi! Cảm ơn cô rất nhiều!!」"

# 【西瓜】
# display as 西瓜
# JP: 「お礼を言うのはこちらの方です。あの日は霧雨で、\n偶然、西瓜たちだけの貸し切りの乗船になりました」
1735 = "「Người phải nói lời cảm ơn là Tây Qua mới đúng. Hôm đó trời mưa phùn, tình cờ lại trở thành chuyến đi thuyền bao trọn gói chỉ dành riêng cho nhóm Tây Qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは恵まれていたな。大変なぜいたくだ」
2052 = "「Thật may mắn làm sao. Quả là một sự xa xỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい、あれほどにめぐまれた録音は他にないです。\n霧雨は、完全に雑音を消してくれていましたし――」
1830 = "「Vâng, chưa từng có buổi ghi âm nào tuyệt vời đến thế. Mưa phùn đã hoàn toàn xóa sạch mọi tạp âm——」"

# monologue
# JP: 西瓜は静かに目を閉じる。\n記憶の中に聞こえる音に、耳を傾けているかのように。
2600 = "Tây Qua lặng lẽ nhắm mắt lại. Như thể đang lắng nghe những âm thanh vọng về từ trong ký ức."

# 【西瓜】
# display as 西瓜
# JP: 「女性の船頭さん達は、西瓜の録音に気づくと黙り込み。\n櫓と櫂の扱いも最小限にして――音を、くれたのです」
1451 = "「Các cô lái đò khi nhận ra Tây Qua đang ghi âm liền im lặng. Họ hạn chế tối đa việc sử dụng mái chèo——để dành trọn không gian cho âm thanh đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1543 = "「啊——」" 

# monologue
# JP: それだけの気遣いが瞬時に出来て、\n最低限の操船だけで、舟を完全に制御する――
2541 = "Có thể ngay lập tức tinh tế nhận ra điều đó, và hoàn toàn kiểm soát con thuyền chỉ bằng những thao tác chèo tối thiểu——"

# monologue
# JP: ならばふかみ・凪コンビによる操船で――\n8620側は恐らく、僕・日々姫・ハチロクで間違いなかろう。
2425 = "Nếu vậy thì người lái đò chắc chắn là bộ đôi Fukami và Nagi—— Còn phía 8620 có lẽ không ai khác ngoài tôi, Hibiki và Hachiroku."

# 【西瓜】
# display as 西瓜
# JP: 「真下から、なんの雑音も無く聞く8620の走行音――\nドラフト音にブラスト音。そして、高らかに轟く汽笛」
1707 = "「Tiếng chạy tàu của 8620 nghe từ ngay bên dưới mà không có chút tạp âm nào—— Tiếng hút gió lò hơi, tiếng khí thải xi lanh. Và cả tiếng còi hơi nước vang dội.」"

# monologue
# JP: ……それも一因となったのかもしれんと、ふと思う。\n数多いる有能極まる日ノ本鉄道人たちの中から――
1010 = "......Tôi chợt nghĩ, có lẽ đó cũng là một lý do. Trong số vô vàn những người làm đường sắt tài năng xuất chúng ở Hinomoto——"

# monologue
# JP: ハチロク以外は実績も経験もまだまだの僕たちが、\n今回の視察のメンバーとして、いわば抜擢されたのは。
2542 = "Ngoài Hachiroku ra, những người vẫn còn non kém cả về thành tích lẫn kinh nghiệm như chúng tôi, lại được đặc cách chọn làm thành viên cho chuyến khảo sát lần này."

# 【西瓜】
# display as 西瓜
# JP: 「あれほど鮮やかな鉄道音風景を、西瓜は他に知りません。\nあの音を志寰と一緒に聞けたのは、西瓜の一生の宝です」
1982 = "「Tây Qua chưa từng biết đến phong cảnh âm thanh đường sắt nào sống động đến thế. Việc được cùng Chí Hoàn lắng nghe âm thanh đó, là báu vật cả đời của Tây Qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これは想像にすぎないが――\nきっと、志寰くんも、同じ感動を覚えたのではないかな」
1589 = "「Ừm. Đây chỉ là suy đoán của tôi thôi—— nhưng chắc chắn Chí Hoàn cũng có chung cảm xúc đó.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 

# monologue
# JP: 西瓜が一気に赤くなる。\n今ならきっと、届く言葉を話せる気がする。
2593 = "Mặt Tây Qua lập tức đỏ bừng. Tôi cảm thấy bây giờ chắc chắn những lời mình nói sẽ chạm được đến cô bé."

# 【双鉄】
# display as 雙鐵
# JP: 「今の西瓜の話を聞くと――正しく音を聞くためには、\n周囲の状況を整えることが大事であるのかと想像する」
1935 = "「Nghe câu chuyện vừa rồi của Tây Qua——tôi mường tượng ra rằng, để có thể lắng nghe âm thanh một cách trọn vẹn, việc sắp xếp, điều chỉnh môi trường xung quanh là rất quan trọng.」"

# 【西瓜】
# display as 西瓜
# JP: 「はい、それはこの上なく大切です。どんなに素敵な音も、\n周囲が雑音だらけでは、残念に聞こえてしまいます」
1826 = "「Vâng, điều đó là vô cùng quan trọng. Dù âm thanh có tuyệt vời đến đâu, mà xung quanh toàn là tạp âm, thì nghe cũng sẽ rất đáng tiếc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、大事な音を聞くときには――\n雑音を消すための努力が必要になる？」
1783 = "「Nếu vậy, khi muốn lắng nghe một âm thanh quan trọng—— chẳng phải sẽ cần nỗ lực để loại bỏ tạp âm sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「雑音を消すための努力が必要です。場所を変えたり、\n時間をずらして、人が消えるのを待ってみたりなどの」
1919 = "「Đúng là cần phải nỗ lực loại bỏ tạp âm. Chẳng hạn như thay đổi địa điểm, dời thời gian, hoặc đợi cho đến khi không còn ai xung quanh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、それをすればいいのではないかな」
1089 = "「......Vậy thì, em cứ làm như thế là được mà.」"

# 【西瓜】
# display as 西瓜
# JP: 「え？」
1505 = "「Dạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜がやり慣れていることを。\n今回も、西瓜のやり方でやればいい」
1993 = "「Hãy làm những gì Tây Qua vốn đã quen thuộc. Lần này cũng vậy, cứ làm theo cách của Tây Qua là được.」"

# 【ハチロク】
# display as 八六
# JP: 「！」
# 1559 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「志寰くんの声を、正しくまっすぐ聞くために、だ。\n西瓜の中や周辺にある雑音を、ひとつひとつ消していく」
1852 = "「Để có thể lắng nghe trọn vẹn và chân thực nhất giọng nói của Chí Hoàn. Hãy loại bỏ từng chút một những tạp âm bên trong và xung quanh Tây Qua.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 

# monologue
# JP: 西瓜の瞳が大きく開く。\nその瞳のまま僕を見て、ハチロクの方へ視線を動かす。
2596 = "Đôi mắt Tây Qua mở to. Cô bé cứ mở to mắt như vậy nhìn tôi, rồi chuyển ánh nhìn sang phía Hachiroku."

# monologue
# JP: ハチロクはごく穏やかな笑みを浮かべて、\n頷き、ひとつ。それだけ返す。
2274 = "Hachiroku nở một nụ cười vô cùng dịu dàng, và khẽ gật đầu một cái. Chỉ đáp lại như vậy thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「恐怖も雑音だろうし、憶測も雑音だろう。\nそれを消すための努力を、もしも西瓜が出来るのならば」
1730 = "「Sợ hãi cũng là tạp âm, mà suy đoán cũng là tạp âm. Nếu Tây Qua có thể nỗ lực để loại bỏ chúng.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜はできます。努力できます。志寰の声を聞くことは。\n西瓜にとって――一番大事な音を聞くことですから」
1989 = "「Tây Qua có thể làm được. Em có thể nỗ lực. Bởi vì việc lắng nghe giọng nói của Chí Hoàn. Đối với Tây Qua——là việc lắng nghe âm thanh quan trọng nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2033 = "「這樣啊」" 

# monologue
# JP: 恋愛のことなどなにもわからん。\nけれどもそれを、西瓜の中にある方法論まで落とし込めた。
2604 = "Tôi chẳng hiểu gì về chuyện yêu đương cả. Nhưng tôi đã có thể diễn giải nó thành phương pháp luận phù hợp với Tây Qua."

# monologue
# JP: ならば、僕にできることはここまでだ――\nっと。
2636 = "Nếu vậy, những gì tôi có thể làm cũng chỉ đến đây thôi—— Chắc vậy."

# 【ハチロク】
# display as 八六
# JP: 「パンダ……いつの間にどこかへいってしまいましたね」
1859 = "「Gấu trúc......không biết đã đi đâu mất từ lúc nào rồi nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ！　屋内に。――ちいさなパンダたちは、\n屋内の飼育施設にうつされたのかと思います」
1564 = "「A! Ở trong nhà.——Em nghĩ mấy bé gấu trúc con, đã được chuyển vào cơ sở chăn nuôi trong nhà rồi ạ.」"

# monologue
# JP: 西瓜がしまったという顔になる。\n申し訳なさそうな声が出てくる。
2591 = "Tây Qua lộ vẻ mặt như vừa làm hỏng chuyện. Giọng nói cũng đầy vẻ hối lỗi."

# 【西瓜】
# display as 西瓜
# JP: 「すみません、西瓜の相談のせいで、\nせっかくの貴重なご視察の機会を」
1470 = "「Xin lỗi mọi người, chỉ vì chuyện của Tây Qua, mà làm lỡ mất cơ hội khảo sát quý giá này.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにー！　ハチロクー！　西瓜ちゃーん！！」
2062 = "「Anh haiiiii! Hachirokuuu! Tây Qua ơiiii!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日々姫。探しにきてくれたのか」
1726 = "「À, Hibiki. Em đến tìm bọn anh sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　パンダひっこんじゃったら、\n誰もおらんくなったけん、すぐ見つかった！」
1594 = "「Vâng! Bọn gấu trúc mà chui vào trong, là chẳng còn ai ở ngoài này nữa, nên em tìm thấy mọi người ngay!」"

# monologue
# JP: 顔も声もニコニコしている。もうごきげんの塊だ。
2552 = "Cả nét mặt lẫn giọng nói đều tươi rói. Đúng là một cục năng lượng vui vẻ."

# 【双鉄】
# display as 雙鐵
# JP: 「よいスケッチができたようだな」
1888 = "「Có vẻ em đã vẽ được những bức phác thảo ưng ý nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「バッチリ！　それに、周りに集まってきた人たちから、\nいろーんなお話も聞けたし」
1496 = "「Hoàn hảo luôn! Hơn nữa, em còn được nghe đủ thứ chuyện từ những người vây quanh nữa.」"

# 【姜】
# display as 姜
# JP: 「日々姫先生の絵はやはり大人気となりました。\n仲国国内、海外の方。様々な観光客が集まって」
1796 = "「Tranh của cô Hibiki quả nhiên rất được yêu thích. Khách du lịch trong nước, ngoài nước. Đủ mọi du khách xúm lại xem.」"

# 【志寰】
# display as 志寰
# JP: 「日ノ本語・仲国語・髑国語の多重通訳まで発生しました。\n観光客の仲・髑国語話者さんが買ってでてくれて」
1872 = "「Thậm chí còn có cả phiên dịch đa ngôn ngữ Hinomoto - Trung Quốc - Đức nữa. Một du khách biết tiếng Trung và tiếng Đức đã tình nguyện làm phiên dịch giúp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはすごいな――今回の視察、\n日々姫の取材力が本当にものをいってくれそうだ」
2049 = "「Thật tuyệt vời——chuyến khảo sát lần này, khả năng thu thập thông tin của Hibiki thực sự đã phát huy tác dụng rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「見て描くことがわたしのお仕事やけん！\nゆーても、にぃにたちも見たり撮ったりしたんでしょ？」
1751 = "「Quan sát và vẽ lại là công việc của em mà! Nói vậy chứ, anh hai và mọi người cũng đã xem và chụp ảnh rồi đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1590 = "「嗯」" 

# monologue
# JP: シャッターの方は、そうたくさんは切れなかったが、\nそれでも、だ。
2502 = "Về phần chụp ảnh thì tôi không chụp được nhiều lắm, nhưng dù vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「よい視察が出来たかと思う。\nここで見聞きしたこともまた、大きな学びだと感じる」
1753 = "「Anh nghĩ chúng ta đã có một chuyến khảo sát tốt. Những gì nghe và thấy ở đây cũng là một bài học lớn.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、まことでございますね。\nとても尊く、可愛らしいものを見て、聞きました」
1609 = "「Ufufu, đúng vậy nhỉ. Chúng ta đã được nhìn thấy, nghe thấy những điều vô cùng đáng quý và dễ thương.」"

# 【西瓜】
# display as 西瓜
# JP: 「…………」
1050 = "「............」"

# monologue
# JP: 西瓜が赤面してしまう。\n途端、志寰君が目に見えておろおろしはじめる。
2592 = "Tây Qua đỏ bừng mặt. Ngay lập tức, Chí Hoàn bắt đầu lộ rõ vẻ luống cuống."

# monologue
# JP: ……他人の気持ちはどこまでも想像するしかないが――\nこれならば西瓜は、すぐ雑音を消せそうに思う。
1005 = "......Cảm xúc của người khác thì chỉ có thể suy đoán thôi, nhưng—— như thế này thì tôi nghĩ Tây Qua sẽ sớm loại bỏ được tạp âm thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、今日はどうだった？」
1977 = "「Tây Qua, hôm nay em thấy thế nào?」"

# monologue
# JP: ゆえに、尋ねる。\n西瓜もすぐに顔を上げ、僕をおじずに見つめ、答える。
2359 = "Vì vậy, tôi hỏi. Tây Qua cũng lập tức ngẩng đầu lên, nhìn thẳng vào tôi không chút sợ sệt và trả lời."

# 【西瓜】
# display as 西瓜
# JP: 「西瓜にも、この上なく貴重で大切な視察の時間を\nいただけたものと理解しています」
1973 = "「Tây Qua cũng hiểu rằng mình đã có được một khoảng thời gian khảo sát vô cùng quý giá và quan trọng.」"

# monologue
# JP: 深く、西瓜がお辞儀する。\n僕へ、ハチロクへ。そして日々姫に、姜さんに向け。
2582 = "Tây Qua cúi đầu thật sâu. Chào tôi, Hachiroku. Rồi hướng về phía Hibiki và cô Khương."

# monologue
# JP: そうして伸ばし直した背で、\n志寰君へ、まっすぐまっすぐ、向き直る。
2534 = "Sau đó, cô bé thẳng lưng lên, và quay sang đối diện trực tiếp với Chí Hoàn."

# 【西瓜】
# display as 西瓜
# JP: 「帰りましょう。志寰。\n西瓜は、志寰と。ふたりでお話がしたいです」
1719 = "「Chúng ta về thôi. Chí Hoàn. Tây Qua, muốn nói chuyện riêng với Chí Hoàn.」"

# 【日々姫】
# display as 日日姬
# JP: 「へぇええ～　そぎゃんお話ししとったんだー」
1519 = "「Hểêê~ Mọi người đã nói chuyện như vậy sao.」"

# monologue
# JP: ベッドにごろりころげたままの日々姫の声には、\n少し、眠たさが混じり始める。
2376 = "Giọng nói của Hibiki khi đang nằm lăn lộn trên giường, bắt đầu xen lẫn chút buồn ngủ."

# monologue
# JP: 考えてみれば無理もない。三段寝台の、トラブルありの\n一夜のあとで、そのまま半日観光したのだから。
2356 = "Nghĩ lại thì cũng phải thôi. Sau một đêm đầy rắc rối trên chiếc giường ba tầng, rồi lại đi tham quan suốt nửa ngày trời cơ mà."

# 【日々姫】
# display as 日日姬
# JP: 「……西瓜ちゃん。\n気持ち、ちゃあんと伝えられるとよかね」
1062 = "「......Bé Tây Qua. Mong là em ấy sẽ truyền đạt được trọn vẹn tình cảm của mình nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。あとわずか二日の視察といえど、\n妙にギクシャクなどされてしまっては、こちらも居辛い」
1493 = "「Đúng vậy. Dù chuyến khảo sát chỉ còn vỏn vẹn hai ngày, nhưng nếu cứ gượng gạo một cách kỳ lạ thì chúng ta cũng khó xử.」"

# 【日々姫】
# display as 日日姬＆八六
# JP: 「え"っ」\n「まぁ」\n1511 = "「哎」\\n「呃…」" \n\n# monologue\n# JP: ああ、これは――なにかを僕はやらかしたのか。\n思う間もなく、尖った声が飛んでくる。\n2353 = "啊，這——是我把什麼事又給搞砸了嗎？不容我多想，嚴厲的呵斥就撲面而來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしたちのことより、西瓜ちゃんたちのことでしょー。\n女の子の一世一代の、大事なこととよ？」\n1748 = "「我們怎麼樣暫且不說，西瓜他們的事才是重點吧。這可是女孩子一輩子的大事哦？」" \n\n# monologue\n# JP: ハチロクも声には出さぬが、なんども大きく頷いている。\n2269 = "八六倒是沒開口，不過卻在一邊不停地用力點頭。" \n\n# monologue\n# JP: ふむ、なるほど。\n恋とはかほど、女の子から冷静さを奪い取るものか。\n2348 = "哦，原來如此。看來戀愛讓女孩子喪失冷靜的效果真是相當之強啊。" \n\n# monologue\n# JP: （……あの聡明な西瓜が、あれほど混乱したのだものな。\n他人ごととはいえ、日々姫・ハチロクも思い入れるか）\n2657 = "（……聰明伶俐如西瓜，都會那般混亂無助。雖然事不關己，但日日姬和八六卻格外上心啊）" \n\n# monologue\n# JP: 納得できれば、釘を刺す必要を感じてしまう。\n恐らく無用なことであろうが、それでも、だ。\n2629 = "這樣一想，我忽然覺得必須多叮囑幾句——即便很可能只是無用之功。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だとしても、仕事は仕事だ。僕らには、\nよりよい視察を提言するという、職務がある」\n1475 = "「即便這樣，工作就是工作。我們有義務對於提出合理方案，以完善此次考察」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あうっ」\n1587 = "「嗚……」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「それは……まことに左様でございますけれど」\n2030 = "「這……倒是說得沒錯啦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「とはいえ僕の発言も軽率な上、失礼だった」\n2006 = "「話雖如此，我的話也確實有些草率，實屬不妥」" \n\n# monologue\n# JP: そこは認める。反省する。\n本人達が不在の所で、見くびる様なことを言ってしまった。\n2627 = "這一點我確實要承認，也應該反省。在當事者不在的情況下，說出那樣大言不慚的話。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「志寰君も西瓜もプロだ。私事で何があろうが、\n職責はきちんと果たしてくれると決まっていように」\n1716 = "「志寰和西瓜也都是職業人士，無論私事如何，都斷然會盡職盡責，不令私情影響工作」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あー、うん。よねっ！」\n1548 = "「啊——嗯。可不是！」" \n\n# monologue\n# JP: 日々姫が頷く。\nベッドが深く沈み込むほど、大きく強く。\n2484 = "日日姬深深地點了點頭，用力之大甚至讓床墊都下沉幾分。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やけん、私達も！\n私達のお仕事、きっちり果たさんといけんね」\n1765 = "「所以說囉，咱們也要把咱們的工作，好好做完才成」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「で、ございますね。\n……これほどの接遇を頂いていることもございますし」\n1828 = "「是的，正是如此。畢竟都得到了如此熱烈而周全的接待」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だなぁ」\n1808 = "「是啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「お姫様のベッド！」\n1455 = "「公主床！」" \n\n# monologue\n# JP: 部屋に一歩を踏み入れた瞬間のはしゃぎっぷりが、\nハチロクの一言によって、巻き戻される。\n2280 = "八六的一句話，又讓我回想起剛進旅館房間時那一通喧鬧。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ほんっとすごかね～　こんお部屋！\n仲国の時代劇とかに出てきそうだもん！！」\n2032 = "「這房間可真不得了唉～簡直和仲國古裝劇裡的一模一樣！！」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「レイルロオドの身でありながら、天蓋付きの寝台に、\nまさか横たわれるとは、夢にも思っておりませんでした」\n2021 = "「身為鐵路人偶，沒想到竟有朝一日能睡在有頂蓋的床鋪上」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「こうした宿が変わらず残っているのであれば――\n無論、需要もそれなり以上にあるのだろうな」\n1781 = "「既然現在還保留有這樣的房間，那自然是有相應的需求存在吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あー、うん」\n1549 = "「啊——嗯」" \n\n# monologue\n# JP: 日々姫がスケッチブックを開き始める。\nスイッチが入り、眠気を押し戻したようだ。\n2487 = "日日姬說話間又翻開了素描簿，就像按下開關，把睡意通通壓了下去。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「その辺のお話は聞いたと。歴史ば、仲国観光の、\nやっぱりおっきなテーマのひとつみたい」\n1739 = "「我也記得聽他們說過唉，歷史在中國人的旅行中也是占了很大的比重的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「歴史――史跡や名蹟などを見学するといった感じか？」\n1839 = "「歷史——也就是探訪古蹟囉？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。そう。おぼえてなかと？　このおじさん。\nパンダバスの中にまぎれて、おじさんのバスもあったの」\n1598 = "「嗯，沒錯。還記得這個大叔嗎？大叔塗裝的公車就混在一堆熊貓公車之中」" \n\n# monologue\n# JP: スケッチブックの中には、デフォルメされた、\n時代がかった服装に、飄々とした壮年男性が描かれている。\n2526 = "素描簿上，是一位以抽象筆法畫下的，身著古裝長袖飄飄的壯年男性。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、覚えている。というか、[とほ,1]徒甫と添え書きも\nしてあったよな。仲国の、代表的な詩人だろう？」\n1580 = "「啊，記得記得。而且我看到人像旁還標註了“杜浦”兩字。那應該是仲國代表性的詩人對吧？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そ！　そん詩人のかつてのお家が史跡になって、\n周辺が公園として観光名所化されたりする位だって」\n1684 = "「對！那位詩人從前的家，如今就成了古蹟。現在周邊已經修建成公園，是一處知名景點了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんと。詩人のかつての住居に、\nそれほどたくさんの人が来るのか？」\n2002 = "「詩人的故居竟然有那麼多人來參觀嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だって。年間何十万人も！　その他にも、ここ、\n聖都は三国志時代の蜀って国の、首都だったけん」\n2047 = "「那可不，年均幾十萬人次呢！還有這盛都，可是三國時代蜀國的都城來著」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……なるほど、仲国においての歴史観光は、\n日ノ本のそれの何百倍もの人気をもっているのだな」\n1068 = "「……原來如此，在仲國，歷史觀光所吸引的人流遠在日本國的數百倍之上啊」" \n\n# monologue\n# JP: 日ノ本ではとても考えられんことだ。\n2369 = "在日本國這簡直無法想像。" \n\n# monologue\n# JP: 天守閣の残る城跡ならば、さすがに観光名所だが、\n詩人――例えば俳人などの、ゆかりの土地や生家など……\n2382 = "天守閣遺跡這種作為知名景點尚且不論，詩人的故居或是老家這種就未免……" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「日ノ本では――あの名高い関臥原の古戦場さえ、\nほとんど見学する方もいないそうですものね」\n1624 = "「在日本國的話——即便是那著名的關原古戰場，前去參觀的人也是少之又少」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n1602 = "「嗯？」" \n\n# monologue\n# JP: ハチロクも、僕と同じことを思ったらしい。\nが、なにゆえに、唐突極まる関臥原――ああ！\n2278 = "八六應該和我想的是差不多的方向，但為何會莫名提到關原——啊！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか。関臥原は、旧東峡道本線の駅だったか」\n1480 = "「原來如此，關原是從前東海道本線上的車站對吧」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい。急勾配を持つ難所です。帝鉄全盛期には、\n\\x%l補機;#00ffc040;補機%l;#;の回送のためだけの迂回線が設けられたほどの」\n1821 = "「是的。那裡有著頗難行駛的陡坡。當年帝國鐵路全盛時期，還在那邊鋪設了專門用於\\x%l補機;#00ffc040;補機%l;#;回送的迂迴線路」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ほう」\n1527 = "「哦！」" \n\n# monologue\n# JP: 感心すれば、ふふっ、とハチロクは小さく笑う。\n2513 = "看到我發出感慨，八六“嘻嘻”地笑了起來。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「\\x%l補機;#00ffc040;補機%l;#;の付け外しの合間などには時間がありましたので。\n関臥原の観光については、少し、わたくし詳しいのです」\n1616 = "「因為需要掛接解掛\\x%l補機;#00ffc040;補機%l;#;，就經常會在那邊停留，所以對關原的觀光多少有些了解」" \n\n# monologue\n# JP: ……関臥原の古戦場は観光地化を目指し、\nそこそこ以上の整備が行われているらしい。\n1016 = "……為將關原古戰場打造為景點，似乎進行了頗為系統的準備工作。" \n\n# monologue\n# JP: が――僕も日々姫もそうした事実をまったく知らずにいた。\nつまりはそこらが、日ノ本の歴史観光の弱さだろう。\n2246 = "但我和日日姬卻都對此一無所知。也就是說，這就是日本國歷史觀光的局限所在了。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それに比べて、仲国は本当に歴史観光が盛んみたい。\n春節や国慶節には、史跡めぐりの旅もよく行われるって」\n1940 = "「與此相比，仲國的歷史觀光真是不得了。春節和國慶的出行行程，也有許多人選擇遊覽歷史古蹟的」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「シュンセツに、コッケイセツ――でございますか？」\n1806 = "「春節和國慶？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、仲国の大型連休。春節が日ノ本の旧正月で、\n国慶節は仲国の建国記念日。それぞれ一週間のお休み」\n1575 = "「啊，就是仲國的長假。春節相當於日本國的舊曆正月，國慶是仲國的建國紀念日。都有一週的假期」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「一週間の大型連休が年に二回か！\nそれは、さぞかし賑わおうな」\n1400 = "「一年兩次的大型連休啊！那想必是熱鬧得不得了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「賑わうって。国内便の飛行機とエアクラで。\n鉄道旅行客は、年々減少しちゃってるって」\n1877 = "「當然熱鬧啊，不過那都是飛機和空凝機的事。聽說乘鐵路出行的旅客可是在年年減少的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「大廃線はなくとも、鉄道離れは避けられんのか。\nああ――そういえば飛行機の客室乗務員さんも……」\n1472 = "「即便沒有大廢線，人們也在遠離鐵路嗎。啊，這麼說來飛機上的乘務員小姐也……」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「！　おっしゃっておられましたね。[ほんこん,1]紅港の方……\n確か、『鉄道にはほとんど馴染みがない』と」\n1563 = "「啊！她有提到過箱港那裡……我記得是說“對鐵路幾乎沒什麼印象”」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あるんだと思う。特に若い世代にほど――\n鉄道路線があるのに、利用していないって傾向が」\n1754 = "「我覺得很有可能。特別是年輕的這一代人，即便有相應的鐵路線路，也不會被優先選擇」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あるいは国土の広大さ故か。国内便で移動して、\n移動先でエアクラをレンタルしてが主流なのかもしれん」\n1757 = "「或許是疆域過於廣闊的關係吧，乘坐國內航班，抵達後租賃空凝機的方式是目前的主流吧」" \n\n# monologue\n# JP: 整頓される。\n要素と要素が、ひとつの形に繋がり始める。\n2453 = "整理一下目前的線索。一個個要素，正逐漸勾勒出一個相對完整的形狀。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ゆえ、移動を単なる移動としないための要素を――\n『仲国版ナインスターズ』で、取り込みたいわけか」\n1764 = "「所以為了拓展更多要素，讓鐵路不再是單純的出行手段——才想引進“仲國版九星”的概念啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「確かに、ナインスターズは九日間、\nお客様を飽きさせないで、楽しい旅に連れ出すと。けど」\n1883 = "「的確，九星帶來的是在九天的時間裡，一直讓旅客保持新鮮感的快樂旅程」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「で。ございますね。九洲周遊列車ですから――\n走りっぱなしになるわけではない」\n1918 = "「確實如此。畢竟是九州周遊列車，總不會是一路傻跑咯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな。夜から早朝の時間帯を走り、日中から夕方は、\nたっぷりと観光下車をお楽しみいただくのが、基本だ」\n1848 = "「沒錯。基本上是入夜到早上行車，白天和傍晚則是下車盡情遊覽的時間」" \n\n# monologue\n# JP: そうできなければ、ナインスターズは成立しない。\n全員が理解できているゆえ、空気が一気に重くなる。\n2543 = "脫離了這個前提，九星就無從談起。而在幾個人都理解了這一情況後，空氣突然沉重了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……仲国全土の、例えば歴史遺産だけに絞ったとしても、\n周遊ってなると――」\n1066 = "「……仲國全境，即便只挑選歷史古蹟，想要周遊也——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……拠点間の距離を短くとれば、ナインスターズ型も\n可能となるが……それでは、仲国らしさを余りにも欠く」\n1107 = "「……選擇的據點之間距離較短的話，倒是可以實現九星一樣的形式……但就少了很多仲國特色」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「かと申しまして――それぞれの拠点間の距離を、\n例えば、北琴－聖都の程度に設定しますと――」\n1498 = "「可如果將各據點之間的距離，比方說，設定為從北琴到盛都這樣的路程——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「７日間で仲国大陸半周くらいはできそう？\nばってん、乗車と観光の時間のバランスが……」\n2081 = "「７天大概夠遊覽仲國大陸半圈？而且，搭車與觀光的時間平衡也……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「20時間乗車、4時間観光のローテーションでは、\nいくら車内を快適・豪華に仕立てたところで」\n1777 = "「按照２０小時搭車，４小時觀光的比例的話，即便車內再舒適再豪華恐怕也……」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「……ポーレット様でしたら、\nさぞやご堪能くださいましょうが」\n1105 = "「……要換成波萊特大人，想必就會樂在其中了」" \n\n# monologue\n# JP: はぁ、と全員のため息が混じる。\nそれだけの長時間の連日乗車。\n2378 = "大家不約而同地嘆了一口氣。那樣長時間，而且是連日搭車。" \n\n# monologue\n# JP: 僕や日々姫でも恐らく保たない。\n飽きも来ようし、体力的にも厳しくなろう。\n2326 = "即便是我和日日姬怕是都很難吃得消。會厭倦不說，對體力也是個巨大的挑戰。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――マニアをターゲットには出来ない。\nそれは確実な滅びへの道だし、鉄道復権を遠ざける」\n1033 = "「——不能以鐵路迷為目標人群。那樣就真的是朝著毀滅一路狂奔，與鐵路復興是背道而馳」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「よねぇ」\n1494 = "「可不是」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「となると、だ」\n1766 = "「所以說，啊」" \n\n# monologue\n# JP: ……日々姫のスケッチブックを見直す。\n自分のメモと、カメラに残した写真群とも。\n1013 = "……我又翻起了日日姬的素描簿，同時佐以自己的筆記和照片。" \n\n# monologue\n# JP: 要素を全て一度書き出し、\nあらためて眺め、考え直す。\n2446 = "把所有的要素都攤開來，統攬全局，再重新想過。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……少し、材料が足りていないのかもしれんな」\n1082 = "「……感覺，材料還是缺了點什麼啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あー、うん。今のままでも、一応絵、\n描けるは描けると思うばってん――」\n1571 = "「啊，嗯。到現在為止，我是一直都有在儘量畫啦，可是——」" \n\n# monologue\n# JP: 頷き合う。\nその絵は、案は、決して納得できるものには仕上がらない。\n2436 = "我們相視點頭。以目前的畫也好，方案也好，肯定是無法令人滿意的。" \n\n# monologue\n# JP: 僕たちはまだ、仲国の鉄道利用者の。あるいは鉄道を\n利用していない人たちの、声を、ほとんど聞けていない。\n2434 = "我們所聽到的，在仲國乘坐列車的人的心聲還是太少，而不坐火車的人的意見，更是幾乎沒有。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「きっと描けます。日々姫なら。\n目にする誰もが、しあわせになれる素晴らしい絵を」\n1794 = "「日日姬一定能夠描繪出讓目睹其容的每個人,都感到幸福的畫作」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あはっ」\n1556 = "「啊哈」" \n\n# monologue\n# JP: ハチロクがことさら明るい声をだす。\n室内の重い空気を、吹き飛ばそうとしてくれる。\n2302 = "八六顯然是刻意以明快的語氣發言，不過室內沉重的氣氛也確實隨之煙消雲散。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「その材料を集めるための時間だって、\nまだ二日間もあるのではございませんか」\n1745 = "「我們不是還有兩天的時間收集這些材料嗎」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな。……帰国準備やなんだもあるゆえ、\n実質的には、明日一日の猶予となろうが」\n1915 = "「確實……不過因為還要做回國的準備，實際上，也就是明天一天而已了吧」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「その一日を、蒸気機関車乗車に使えるのです」\n1803 = "「明天會安排乘坐蒸汽機車」" \n\n# monologue\n# JP: ぽふんと、ハチロクが姫君の寝台に横たわる。\n2266 = "八六一頭倒在了公主床上。" \n\n# monologue\n# JP: 顔が見えなくなったかわりに――その声に、その息に、\n混じるワクワクが、より際立って伝わってくる。\n2643 = "雖然看不到她的臉，但我卻非常清晰地感受到了，混雜在她的聲音和氣息中的期待之情。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「――きっと、多くを学べますとも」\n1032 = "「——一定，能了解到很多東西吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！　よねっ！\nよーし、私も鉛筆、たーくさん削っておかないと」\n1592 = "「嗯！就是！好咧，我也要多削幾支鉛筆才行」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな。どんな\\x%l蒸機;#00ffc040;蒸機%l;#;か、どんな路線か、楽しみだ」\n1813 = "「是啊，會是怎樣的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，怎樣的線路，真讓人期待」" \n\n# monologue\n# JP: 予備知識なし。\nつまりは、行き当たりばったりの旅。\n2262 = "全無事先預習，換句話說就是走到哪算哪。" \n\n# monologue\n# JP: いまのところは、\nそれは良い方向に出ていることが確信できる。\n2228 = "不過，現在我可以確信，如此選擇，一定也會讓事情向著一個好的方向發展。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「きっと、素晴らしい蒸気機関車で、路線で、\nお客様たちで、レイルロオドと機関士さんです」\n1395 = "「一定是很棒的蒸汽機車和線路，乘客、鐵路人偶還有司機都是！」" \n\n# monologue\n# JP: ハチロクの声にも、眠さの色が濃く混じりはじめる。\nというか――僕も――\n2287 = "八六的聲音中已經開始泛出了濃濃睡意。不過我其實也是一樣——" \n\n# monologue\n# JP: ああ、横たわればずっしり来る。\n疲労が眠気の綿に変わって、全身を緩く包み込む。\n2214 = "一躺下，洶湧而來的疲勞，就化作無數飽含睡意的羽絨，將我全身溫柔地包裹其中。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「わたくし……ふぁあ――少しでも……\nレイルロオドと、お話……できると……良いのですけど」\n1738 = "「我……蛤啊——要是能和……鐵路人偶，說上……幾句話……就好了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「できるさ。必ず。だから、今は安心して眠るといい。\nおやすみハチロク。おやすみ日々姫」\n1937 = "「肯定能的。所以現在先安心睡吧。晚安，八六。晚安，日日姬」" \n\n# monologue\n# JP: ふわっ、と、小さな息が聞こえる。\n2211 = "一聲輕柔的嘆息傳入耳中。" \n\n# monologue\n# JP: 笑いのような、あくびのような――\n安心しきった、だれかの息が。\n2251 = "像是輕笑，又像是呵欠——朦朧之中，我卻無從分辨這充滿安心感覺的氣息是誰所發。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい。おやすみなさい。双鉄さま」\n1646 = "「好的。晚安，雙鐵少爺」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おやすみ、にぃに」\n1831 = "「晚安，阿哥」" \n
