[script]
# lines: 389 
# 【姜】
# display as 姜
# JP: 「良くお眠りになれたとのこと、なによりです」
2349 = "「Mọi người đã có một giấc ngủ ngon, vậy là tốt nhất rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ホテルのお部屋！\n二階建てで私、びっくりしちゃいました」
2333 = "「Phòng khách sạn ấy ạ! Nó có tận hai tầng làm em bất ngờ lắm luôn.」"
# monologue
# JP: 二階建て……\n確かに単なるロフトというには、豪勢すぎる空間だった。
2913 = "Hai tầng…… Quả thực nếu chỉ gọi là gác lửng thì không gian đó quá đỗi xa hoa."
# monologue
# JP: 一階の僕はシングルベッド。\n二階にはダブルのベッドで日々姫・ハチロク。
2765 = "Tôi ở tầng một với giường đơn. Còn tầng hai là giường đôi dành cho Hibiki và Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「北琴ダックでお腹もぽんぽんでしたから、\nふっかふかのベッドに潜った途端に、もうぐっすりで！」
2212 = "「Bữa tối Vịt quay Beiqin làm bụng em no căng luôn rồi, nên vừa chui vào chiếc giường mềm mại là em ngủ thiếp đi ngay!」"
# monologue
# JP: 晩餐の北琴ダックも凄かった。\n日ノ本の総理大臣が接遇されたこともあるという高級店。
2651 = "Bữa tối Vịt quay Beiqin cũng thật tuyệt vời. Đó là một nhà hàng cao cấp nghe nói từng đón tiếp cả Thủ tướng Hinomoto."
# monologue
# JP: 味はもちろん素晴らしかったし――その上料理の外観も、\n日々姫がスケッチを止められぬほど、一々芸術的だった。
2967 = "Hương vị tất nhiên là vô cùng tuyệt hảo——hơn nữa cách trình bày món ăn, cũng nghệ thuật đến mức khiến Hibiki không thể ngừng phác họa."
# 【双鉄】
# display as 雙鐵
# JP: 「暖かなお手配に、こころより御礼申し上げます」
2045 = "「Từ tận đáy lòng, tôi xin gửi lời cảm ơn vì sự sắp xếp chu đáo này.」"
# 【姜】
# display as 姜
# JP: 「いえいえ、気持ち良くご視察いただくことも、\n我々の職務ですので」
1961 = "「Không có gì đâu ạ, việc giúp mọi người có một chuyến khảo sát thoải mái, cũng là nhiệm vụ của chúng tôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ！　がんばらんと～！！！\n姜さん、ここってスケッチばしても？」
1952 = "「Oa! Phải cố gắng thôi~!!! Cô Jiang, em có thể phác họa ở đây được không?」"
# 【姜】
# display as 姜
# JP: 「博物館なので、もちろん大丈夫です。写真撮影も。\n禁止施設の場合は、事前に必ずご注意します」
2386 = "「Vì đây là bảo tàng nên tất nhiên là được rồi. Cả chụp ảnh cũng được. Đối với những khu vực cấm, tôi nhất định sẽ nhắc nhở trước.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かります。ご教示ありがとうございます」
2117 = "「Vậy thì tốt quá. Cảm ơn cô đã chỉ dẫn.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ！　時間、これ一日で足りるとかなぁ」
2020 = "「Ehehe! Thời gian, một ngày ở đây có đủ không nhỉ.」"
# monologue
# JP: 満面の笑顔を浮かべて、日々姫が大きく辺りを見回す。\n僕もつられて――うむ？　ハチロクは？
2676 = "Với nụ cười rạng rỡ trên môi, Hibiki đưa mắt nhìn quanh một vòng rộng lớn. Tôi cũng bị cuốn theo——hửm? Hachiroku đâu rồi?"
# 【ハチロク】
# display as 八六
# JP: 「…………」
1559 = "「…………」"
# monologue
# JP: いつの間に、僕らの側から離れ機関車を凝視している。\nその顔は、ほとんど真上を向いている。
2554 = "Không biết từ lúc nào, em ấy đã rời khỏi chúng tôi và đang nhìn chằm chằm vào một chiếc đầu máy. Gương mặt em ấy gần như ngửa hẳn lên trên."
# monologue
# JP: 視線の先は2101プレートの――\n実に大きな蒸気機関車だ。
2964 = "Phía trước ánh mắt đó là tấm biển số 2101—— Quả thực là một chiếc đầu máy hơi nước rất lớn."
# 【日々姫】
# display as 日日姬
# JP: 「このこ……大陸、って感じ。前照灯ば突き出してて、\nその上になんか、王冠みたいなのまで乗ってて」
2383 = "「Đứa bé này…… mang đậm cảm giác Đại lục. Đèn pha nhô hẳn ra ngoài, mà bên trên lại còn có cái gì đó giống như vương miện nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日ノ本\x%l蒸機;#00ffc040;蒸機%l;#;も勇壮で見事に違いないが……」
2008 = "「Ừm. \\x%l蒸機;#00ffc040;Đầu máy hơi nước%l;#; của Hinomoto chắc chắn cũng rất hùng tráng và tuyệt đẹp, nhưng……」"
# monologue
# JP: 僕らも間近に近づけば、\nついぞ経験したことの無い迫力を感じる。
2596 = "Khi chúng tôi tiến lại gần, cũng cảm nhận được một sức ép chưa từng trải qua."
# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、大陸の印象だな。\n分厚く、大きく、威圧感さえ伝わってくる」
1599 = "「……Quả thực mang lại ấn tượng của Đại lục. Dày dặn, to lớn, thậm chí còn truyền đến cả cảm giác uy áp.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1559 = "「…………」" 
# monologue
# JP: ほうっ、とため息。
2618 = "Phù, một tiếng thở dài."
# monologue
# JP: ハチロクは、今気づいたように、\nゆるゆる僕らへと振り返る。
2717 = "Hachiroku như vừa mới nhận ra, từ từ quay đầu lại phía chúng tôi."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの8620は、[こんにち,1]今日となっては\n小柄な\x%l蒸機;#00ffc040;蒸機%l;#;ではございますが、それにいたしましても」
2156 = "「Chiếc 8620 của tôi, cho đến ngày hôm nay tuy chỉ là một \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; nhỏ bé, nhưng dù vậy thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大人と子供という気さえするな。\n全長全幅全高――どれも、8620の1.5倍はありそうだ」
2195 = "「A, đúng là có cảm giác như người lớn và trẻ con vậy. Chiều dài, chiều rộng, chiều cao——mọi kích thước, có lẽ đều gấp 1.5 lần chiếc 8620.」"
# 【西瓜】
# display as 西瓜
# JP: 「1.5倍は、ある程度正しい計算かと西瓜は判断します」
2419 = "「Gấp 1.5 lần, Suika đánh giá đó là một tính toán đúng ở một mức độ nào đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1968 = "「Hửm!?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1964 = "「Ưm……」"
# monologue
# JP: いつの間に日々姫は機関車、2101の真横に回り込んでいる。
2549 = "Không biết từ lúc nào, Hibiki đã vòng ra ngay bên cạnh chiếc đầu máy 2101."
# monologue
# JP: 鉛筆をものさしのようにして眼の前に持ち、\nしかつめらしく、描かずにじっと、観察している。
2690 = "Em ấy cầm cây bút chì trước mắt như một chiếc thước đo, với vẻ mặt nghiêm túc, không vẽ mà chỉ chăm chú quan sát."
# 【日々姫】
# display as 日日姬
# JP: 「1.5倍はさすがになかけど、確かにそこそこ近いかも。\nこのこ、多分全長22mくらいあるし」
2421 = "「Gấp 1.5 lần thì hơi quá, nhưng chắc chắn là cũng gần bằng mức đó. Đứa bé này, có lẽ chiều dài tổng thể vào khoảng 22m.」"
# 【志寰】
# display as 志寰
# JP: 「わ！　すごい。目が良いのですね」
1948 = "「Oa! Tuyệt thật. Mắt chị tinh quá.」"
# monologue
# JP: 日々姫の言葉は今度は逆に、志寰君を驚かせる。
2947 = "Lần này, lời nói của Hibiki lại khiến Zhihuan ngạc nhiên."
# 【志寰】
# display as 志寰
# JP: 「[かいほういちけい,3]開放1型、[にいいちまるいち,3]2101。\n[こくけい,1]国繋号の全長は21.91mです」
2220 = "「Giải Phóng loại 1, 2101. Chiều dài tổng thể của Quốc Hệ hiệu là 21.91m.」"
# 【ハチロク】
# display as 八六
# JP: 「8620の全長が約16.745mですから――\nちょうど1.3倍ほどの計算ということになりますね」
2426 = "「Vì chiều dài tổng thể của 8620 là khoảng 16.745m—— Nên tính ra là vừa đúng gấp khoảng 1.3 lần nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2002 = "「Hừm.」"
# monologue
# JP: なるほど。『ある程度正しい』は、\n客人の顔を立てつつ、事実も曲げず。まこと巧妙な表現だ。
2663 = "Ra là vậy. 『Đúng ở một mức độ nào đó』, vừa giữ thể diện cho khách, lại không làm sai lệch sự thật. Quả là một cách diễn đạt vô cùng khéo léo."
# monologue
# JP: 姜さんが連れているだけのことはあり、\n西瓜はなかなか高度な……うむ？
2567 = "Đúng là người được cô Jiang dẫn theo, Suika có trình độ khá cao…… hửm?"
# monologue
# JP: （姜さんと西瓜はどのような関係なのだ？\nマスターは志寰君だし……）
2981 = "(Cô Jiang và Suika có mối quan hệ như thế nào nhỉ? Master của em ấy là Zhihuan mà……)"
# 【双鉄】
# display as 雙鐵
# JP: 「姜さん」
2047 = "「Cô Jiang.」"
# 【姜】
# display as 姜
# JP: 「はい――あ、いや少しお待ちください」
2025 = "「Vâng——a, không, xin đợi một chút.」"
# monologue
# JP: おっと、電話か。\n姜さんは早口の仲国語でなにやら――っ！
2845 = "Ôi chà, có điện thoại. Cô Jiang đang nói gì đó bằng tiếng Zhongguo với tốc độ rất nhanh——!"
# 【姜】
# display as 姜
# JP: 「すみません、双鉄先生。自分が向かわなければいけない\n要件が発生してしまいました」
1921 = "「Xin lỗi, thầy Soutetsu. Có việc khẩn cấp mà tôi phải đích thân đi giải quyết.」"
# monologue
# JP: 僕へと向かう声はいつもの冷静さだが、\n電話を切る直前には、あきらかな緊張を含んでいた。
2714 = "Giọng nói hướng về phía tôi vẫn giữ được sự bình tĩnh như mọi khi, nhưng ngay trước khi cúp máy, nó chứa đựng một sự căng thẳng rõ rệt."
# monologue
# JP: 恐らくは、緊急性を持つ案件だろう。
2750 = "Có lẽ là một vấn đề mang tính khẩn cấp."
# 【双鉄】
# display as 雙鐵
# JP: 「僕たちには構わずにお向かいください。\nお戻りまで、こちらで待っていても大丈夫ですし」
2348 = "「Xin cô cứ đi đi, không cần bận tâm đến chúng tôi đâu. Chúng tôi có thể đợi ở đây cho đến khi cô quay lại.」"
# 【姜】
# display as 姜
# JP: 「いえ、志寰君と西瓜に任せます。自由に行動して下さい。\n可能なようなら、自分も後から合流しますので」
2396 = "「Không sao, cứ giao lại cho Zhihuan và Suika. Xin mọi người cứ tự do hành động. Nếu có thể, tôi sẽ quay lại hội quân sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました」
2038 = "「Tôi hiểu rồi.」"
# 【姜】
# display as 姜
# JP: 「明日の列車の詳細なども既に伝えてあります。\n折を見て聞いておいてください。では、失礼します」
2183 = "「Chi tiết về chuyến tàu ngày mai tôi cũng đã truyền đạt lại rồi. Xin hãy hỏi họ khi có thời gian nhé. Vậy, tôi xin phép.」"
# monologue
# JP: いうなり、姜さんは足早に歴史館から外へと――！
2910 = "Nói xong, cô Jiang rảo bước nhanh ra khỏi bảo tàng lịch sử——!"
# 【日々姫】
# display as 日日姬
# JP: 「わ……あれ、お迎えよね」
1954 = "「Oa…… xe đến đón kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「見るからに高級そうなエアクラ車でございますね」
2403 = "「Trông có vẻ là một chiếc Aircra cao cấp nhỉ.」"
# monologue
# JP: 歴史館の出入り口脇にはいつの間に、\n真っ黒な高級エアクラ車が横付けされている。
2553 = "Không biết từ lúc nào, bên cạnh lối ra vào của bảo tàng lịch sử, đã có một chiếc xe Aircra cao cấp đen bóng đỗ sát vào."
# monologue
# JP: 姜さんが乗り込むや否やでエアクラ車は、\nかなりの加速で飛び出していく。
2703 = "Ngay khi cô Jiang vừa bước lên xe, chiếc Aircra đã tăng tốc lao vút đi."
# 【西瓜】
# display as 西瓜
# JP: 「双鉄さんは、姜秘書に何のお話でしたか？」
2412 = "「Anh Soutetsu, anh định nói chuyện gì với thư ký Jiang vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ、いや――」
2010 = "「Hửm? A, không có gì——」"
# monologue
# JP: 思いついた勢いで、西瓜と姜さんの関係を、\n直接尋ねそうになってしまったが……
2646 = "Theo đà suy nghĩ, tôi suýt nữa đã trực tiếp hỏi về mối quan hệ giữa Suika và cô Jiang, nhưng……"
# monologue
# JP: （あるいは、なにか複雑な関係かもしれん。\n少なくとも、志寰君のいないところで尋ねるべきか）
2977 = "(Hoặc có thể là một mối quan hệ phức tạp nào đó. Ít nhất thì cũng nên hỏi lúc không có mặt Zhihuan chăng.)"
# 【西瓜】
# display as 西瓜
# JP: 「双鉄さん？」
2414 = "「Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大したことではないのだが、その――」
1985 = "「A, cũng không có gì to tát đâu, chuyện là——」"
# 【ハチロク】
# display as 八六
# JP: 「このこ。2101。\n[こくけい,1]国繋号の大きさのお話でございましょうか？」
2196 = "「Là chuyện về kích thước của đứa bé này, chiếc 2101. Quốc Hệ hiệu phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2191 = "「Đúng vậy.」"
# monologue
# JP: ハチロクの、ごくさりげない助け舟。\nそうだ、その話の途中であったか。
2626 = "Hachiroku đã giải vây một cách vô cùng tự nhiên. Đúng rồi, chúng tôi đang nói dở chuyện đó mà."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。全幅も全長と大差ない対比であるなら、\nこのゲージは1435mm――標準軌かなと思ってな」
2001 = "「Ừm. Nếu tỷ lệ chiều rộng cũng không khác biệt mấy so với chiều dài tổng thể, thì tôi đoán khổ đường ray này là 1435mm——khổ tiêu chuẩn chăng.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい！\nこのゲージは間違いなく、1435mmの標準軌です」
2207 = "「Vâng! Khổ đường ray này chắc chắn là khổ tiêu chuẩn 1435mm.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか、昨日の客車……緑比車！　も、\n標準軌だから、あぎゃん広々しておったとねー」
2385 = "「Ra là vậy, toa hành khách hôm qua…… Lục Bỉ Xa! Cũng là khổ tiêu chuẩn nên mới rộng rãi như thế nhỉ~」"
# monologue
# JP: ふんふんと日々姫が頷き、もう一度2101――\n国繋号を見上げて、今度はじっくりスケッチし始める。
2791 = "Hibiki gật gù, ngước nhìn chiếc 2101—— Quốc Hệ hiệu một lần nữa, và lần này em ấy bắt đầu phác họa cẩn thận."
# monologue
# JP: ああ、よく見ればあの王冠には、\n『國繋號』の三文字が、燦然と輝いているではないか。
2709 = "A, nhìn kỹ thì trên chiếc vương miện đó, chẳng phải có ba chữ 『Quốc Hệ Hiệu』 đang tỏa sáng rực rỡ sao."
# 【双鉄】
# display as 雙鐵
# JP: 「……国を繋ぐ、で、国繋号か。\n素晴らしい列車愛称だな」
1589 = "「……Kết nối đất nước, nên gọi là Quốc Hệ hiệu sao. Quả là một cái tên tuyệt vời dành cho tàu hỏa.」"
# 【西瓜】
# display as 西瓜
# JP: 「わ！　素晴らしい列車愛称と思ってもらえて、\n西瓜はとても嬉しく、同時に大いに納得します！」
2411 = "「Oa! Được anh nghĩ đó là một cái tên tuyệt vời, Suika rất vui, và đồng thời cũng vô cùng đồng tình!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　納得、とは」
2014 = "「Hửm? Đồng tình, nghĩa là sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「なぜかを西瓜は説明します。国繋号が繋ぐ二つの国と国。\nそれは、仲国と日ノ本のことだからです」
2331 = "「Suika sẽ giải thích lý do tại sao. Hai quốc gia mà Quốc Hệ hiệu kết nối. Đó chính là Zhongguo và Hinomoto.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そうなのか」
2394 = "「Không ngờ, lại là như vậy sao.」"
# monologue
# JP: 西瓜は嬉しそうに頷いて、視線を志寰君へと向ける。\n話を振られ、志寰君もまた嬉しそうに頷き返す。
2889 = "Suika vui vẻ gật đầu, rồi hướng ánh mắt về phía Zhihuan. Được nhường lời, Zhihuan cũng vui vẻ gật đầu đáp lại."
# 【志寰】
# display as 志寰
# JP: 「はい。なぜならば国繋号は、もとをたどれば日ノ本製\n――旧[まんてつ,1]漫鉄で使われていた、ミカイ号だからです」
2209 = "「Vâng. Bởi vì Quốc Hệ hiệu, nếu truy ngược về nguồn gốc thì nó được sản xuất tại Hinomoto ——chính là chiếc Mikai từng được sử dụng ở Đường sắt Nam Man cũ.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　このこはミカイなのですか！！」
1950 = "「Ôi! Đứa bé này chính là Mikai sao!!」"
# monologue
# JP: ハチロクが目を丸くする。\nその目がすぐに、ふわり、いたわるように和らぐ。
2611 = "Hachiroku tròn xoe mắt. Đôi mắt ấy ngay lập tức dịu lại, ánh lên vẻ xót thương."
# 【ハチロク】
# display as 八六
# JP: 「旧[まんてつ,1]漫鉄で働いた後――\n仲国国鉄でも活躍をしたのですね、このこは？」
1878 = "「Sau khi làm việc ở Đường sắt Nam Man cũ—— Đứa bé này cũng đã hoạt động tích cực ở Đường sắt Quốc gia Zhongguo nhỉ?」"
# 【志寰】
# display as 志寰
# JP: 「そうです。一度は廃棄寸前にまで傷んだものの、\n仲国建国一周年を記念して修復され、再度活躍しました」
2225 = "「Đúng vậy. Dù từng bị hư hỏng đến mức suýt bị vứt bỏ, nhưng nó đã được phục hồi để kỷ niệm một năm thành lập Zhongguo, và lại tiếp tục hoạt động.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本製ということだが……もともとのミカイ号、\nというのは、“開かれていない”の意味の未開か？」
2316 = "「Nói là được sản xuất tại Hinomoto nhưng…… chiếc Mikai ban đầu, có phải mang ý nghĩa là \"chưa được khai phá\" không?」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。ミカイは、ミカド型のイチゴウキで、\nミカイです」
1866 = "「Không phải đâu, Ngài Soutetsu. Mikai là máy số 1 của dòng Mikado, nên gọi là Mikai ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あああ！　パシナ号と同じ命名規則なのだな？\nさすがにパシナは僕でも聞いたことがある」
1958 = "「Aaa! Là cùng quy tắc đặt tên với Pashina hiệu sao? Đến Pashina thì ngay cả tôi cũng từng nghe qua.」"
# monologue
# JP: 言った瞬間、日々姫の指がピタッと止まる。
2909 = "Ngay khoảnh khắc tôi nói ra, ngón tay của Hibiki chợt khựng lại."
# 【日々姫】
# display as 日日姬
# JP: 「なんね？　にぃに。\nそん、パシナ？　とか、ミカイとか」
2345 = "「Gì cơ? Anh hai.\nCái Pashina? Hay Mikai đó là gì vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。動輪形式の愛称が、命名のベースだという話だ。\n例えばこの国繋号の動輪形式は」
1998 = "「Ừm. Ý là biệt danh của hình thức bánh xe chủ động là cơ sở để đặt tên. Ví dụ, hình thức bánh xe chủ động của chiếc Quốc Hệ hiệu này là」"
# 【日々姫】
# display as 日日姬
# JP: 「1－D－1。2－8－2と」
2423 = "「1-D-1. Tức là 2-8-2.」"
# monologue
# JP: まさにスケッチしていたがゆえ、\n間髪入れずの日々姫の答えは正確だ。
2813 = "Đúng là vì đang phác họa, nên câu trả lời không chút do dự của Hibiki hoàn toàn chính xác."
# 【日々姫】
# display as 日日姬
# JP: 「\x%l先輪;#00ffc040;先輪%l;#;が1軸2つで。動輪がD――4軸8つで。\n\x%l従輪;#00ffc040;従輪%l;#;も、1軸2つ」
1540 = "「\\x%l先輪;#00ffc040;Bánh dẫn hướng trước%l;#; là 1 trục 2 bánh. Bánh xe chủ động là D——4 trục 8 bánh. \\x%l従輪;#00ffc040;Bánh chịu tải không động lực%l;#; cũng là 1 trục 2 bánh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして1－D－1形式には、\nミカドという愛称があるらしいのだ」
2231 = "「Đúng vậy. Và nghe nói hình thức 1-D-1, có một biệt danh là Mikado.」"
# 【ハチロク】
# display as 八六
# JP: 「[きゅうなな,3]9700、9700形蒸気機関車が1D1形式なのですが――\n彼女たちは、冥国に発注された、輸入\x%l蒸機;#00ffc040;蒸機%l;#;なのです」
2430 = "「9700, đầu máy hơi nước dòng 9700 có hình thức 1D1—— Nhưng các cô ấy là những \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; nhập khẩu, được đặt hàng từ Meikoku (Mỹ).」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2211 = "「Ồ.」"
# monologue
# JP: そこまで詳しくは僕も知らなかった。\n日々姫だけでなく、西瓜も志寰君も聞き入っている。
2760 = "Chi tiết đến mức đó thì tôi cũng không biết. Không chỉ Hibiki, mà cả Suika và Zhihuan cũng đang chăm chú lắng nghe."
# 【ハチロク】
# display as 八六
# JP: 「そして9700は、冥国でも初めて製造された\n1D1の\x%l蒸機;#00ffc040;蒸機%l;#;だった――ゆえに、発注元への敬意を表し」
2304 = "「Và 9700 cũng là \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; 1D1 đầu tiên được sản xuất tại Meikoku—— Vì vậy, để thể hiện sự tôn trọng đối với bên đặt hàng」"
# 【日々姫】
# display as 日日姬
# JP: 「日ノ本帝有鉄道のオーナー、[ヒノモトノミカド,3]日ノ本帝から、\nミカドって愛称になったと！？」
2248 = "「Nên lấy từ tên của chủ sở hữu Đường sắt Đế hữu Hinomoto, Hoàng đế Hinomoto (Mikado), để đặt biệt danh là Mikado sao!?」"
# 【ハチロク】
# display as 八六
# JP: 「と、帝鉄では申し伝えられておりました」
2029 = "「Ở Đường sắt Hoàng gia, người ta đã truyền tai nhau như vậy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「すごかとね！　ほんなら帝鉄は解体されちゃっても。\nそれでも名前ば、今も世界中で生きておるとね！」
1867 = "「Tuyệt thật đấy! Dù Đường sắt Hoàng gia đã bị giải thể. Nhưng cái tên đó, hiện tại vẫn đang tồn tại trên toàn thế giới!」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
1975 = "「A!」"
# monologue
# JP: ……なるほど、確かに。言われてみれば、だ。
1517 = "……Ra là vậy, đúng là thế. Nghe em ấy nói mới để ý."
# monologue
# JP: 日々姫の視野は、ハチロクの盲点を照らしたらしい。\nハチロクの頬が、みるみる嬉しげなバラ色になる。
2800 = "Tầm nhìn của Hibiki dường như đã soi sáng điểm mù của Hachiroku. Đôi má của Hachiroku nhanh chóng ửng hồng đầy vui sướng."
# 【ハチロク】
# display as 八六
# JP: 「ええと……あの……あ、左様でした！　同様に、2－C－1。\n4－6－2の動輪形式は、パシヒック、と呼ばれております」
2138 = "「À ừm…… dạ…… a, đúng là vậy ạ! Tương tự, 2-C-1. Hình thức bánh xe chủ động 4-6-2 được gọi là Pacific ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「1－D－1がミカド。2－C－1がパシフィック」
2422 = "「1-D-1 là Mikado. 2-C-1 là Pacific.」"
# monologue
# JP: 話をまとめるふりをして、\nハチロクの苦手な発音を念の為一応フォローしておく。
2758 = "Giả vờ như đang tóm tắt lại câu chuyện, tôi tranh thủ hỗ trợ cách phát âm mà Hachiroku không giỏi để đề phòng."
# 【双鉄】
# display as 雙鐵
# JP: 「でだ。日々姫。ミカイは、ミカドのイチゴウキ、\nの意味とのことであるとハチロクが教えてくれたな？」
2146 = "「Thế nên. Hibiki. Hachiroku vừa dạy cho chúng ta rằng Mikai có nghĩa là máy số 1 của dòng Mikado phải không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　わかったと！！　ほんならパシナは、2－C－1、\nパシフィックのナナゴウキ！？」
1983 = "「A! Em hiểu rồi!! Vậy thì Pashina là 2-C-1, máy số 7 của dòng Pacific!?」"
# 【ハチロク】
# display as 八六
# JP: 「大正解でございます！」
2049 = "「Hoàn toàn chính xác ạ!」"
# monologue
# JP: イェイ、と日々姫が手を差し出せば、\nハチロクもいぇいと手を出しパチン！　鳴らし合わせる。
2817 = "Hibiki vui sướng chìa tay ra nói \"Yeah\", Hachiroku cũng nói \"Yeah\" rồi đưa tay ra, đập tay một cái chát!"
# 【日々姫】
# display as 日日姬
# JP: 「って！　正解しといてアレだけど――\nずいぶん簡単なお名前のつけかたしてたとねー」
1956 = "「Cơ mà! Dù em trả lời đúng thì nói cái này hơi kỳ—— Cách đặt tên của họ đơn giản quá nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ……」
1997 = "「Ừm……」"
# monologue
# JP: 旧漫州鉄道――というか旧漫州国は、\n日ノ本と仲国とが相争ったあの\x%l大戦;#00ffc040;大戦%l;#;の要因のひとつだ。
2642 = "Đường sắt Nam Man cũ——hay đúng hơn là Manzhouguo cũ, là một trong những nguyên nhân dẫn đến \\x%l大戦;#00ffc040;Đại chiến%l;#; giữa Hinomoto và Zhongguo."
# monologue
# JP: "簡単な名"も、広い意味では戦時仕様であるかもしれん。\nそうした対立を乗り越え、修復されて与えられた名が――
1506 = "\"Cái tên đơn giản\" theo nghĩa rộng có lẽ cũng là một tiêu chuẩn thời chiến. Vượt qua những xung đột đó, cái tên được trao cho sau khi được phục hồi là——"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、だな。機械的である“ミカイ”より、\n“国繋号”の方が、遥かに美しく――豊かな名だ」
2275 = "「Quả đúng là vậy. So với cái tên \"Mikai\" mang tính máy móc, thì \"Quốc Hệ hiệu\" đẹp đẽ hơn——và phong phú ý nghĩa hơn nhiều.」"
# 【西瓜】
# display as 西瓜
# JP: 「美しく豊かな名だと双鉄先生にも思ってもらえて、\n西瓜は、とても嬉しいです！」
2413 = "「Được thầy Soutetsu nghĩ đó là một cái tên đẹp đẽ và phong phú, Suika thực sự rất vui!」"
# monologue
# JP: 言葉と同時に長く艷やかな西瓜の髪がぴょこんと跳ねる。\n僕も自然と、嬉しくなる。
2883 = "Cùng lúc với lời nói, mái tóc dài mượt mà của Suika khẽ nảy lên. Tôi cũng tự nhiên cảm thấy vui lây."
# monologue
# JP: 西瓜がどれほど仲国を、日ノ本を、大事に想って\nくれているのかが、伝わってくる気さえする。
2592 = "Tôi thậm chí còn cảm nhận được Suika trân trọng Zhongguo, trân trọng Hinomoto đến nhường nào."
# 【志寰】
# display as 志寰
# JP: 「この歴史館には、[おおさか,1]逢坂で作られた蒸気機関車もいます。\n仲国と日ノ本のレールは、かつては繋がっていたんです」
2384 = "「Trong bảo tàng lịch sử này, còn có những đầu máy hơi nước được chế tạo ở Osaka nữa. Đường ray của Zhongguo và Hinomoto, trước đây từng được kết nối với nhau đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのだな」
1928 = "「Ra là vậy.」"
# monologue
# JP: その繋がりを断ち切ったのは、\x%l大戦;#00ffc040;大戦%l;#;と大廃線だろう。\nなんとももったいないことだ。
2855 = "Thứ cắt đứt sự kết nối đó, chính là \\x%l大戦;#00ffc040;Đại chiến%l;#; và Đại bãi bỏ các tuyến đường sắt. Thật là một điều đáng tiếc."
# 【志寰】
# display as 志寰
# JP: 「日ノ本は全線電化に一番近い国だと、父に教わりました。\nだから、大廃線が。僕にはとても残念なことでした」
2056 = "「Cha tôi đã dạy rằng Hinomoto là quốc gia tiến gần nhất đến việc điện khí hóa toàn tuyến. Vì vậy, cuộc Đại bãi bỏ các tuyến đường sắt. Đối với tôi là một điều vô cùng đáng tiếc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1970 = "「A——」"
# monologue
# JP: そうだった。\n西瓜の先代のマスターが、志寰君の父親と聞かされていた。
2664 = "Đúng rồi. Tôi đã được nghe nói Master tiền nhiệm của Suika là cha của Zhihuan."
# monologue
# JP: 西瓜と志寰君の日ノ本語の上手さ、\n加え、帝鉄史にまで及ぶ知識の広範さから類推するに――
2860 = "Từ sự thành thạo tiếng Hinomoto của Suika và Zhihuan, cộng thêm kiến thức sâu rộng bao quát cả lịch sử Đường sắt Hoàng gia, có thể suy ra——"
# 【双鉄】
# display as 雙鐵
# JP: 「志寰君のご[ふくん,1]父君は、\n日ノ本の鉄道の研究かなにかされてらしたのか？」
2104 = "「Cha của cậu Zhihuan, đã từng nghiên cứu hay làm gì đó liên quan đến đường sắt của Hinomoto sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「老師の日ノ本帝有鉄道――帝鉄への接し方は、\n確かに研究でしたけれど、それだけでなく……ん……」
2082 = "「Cách tiếp cận của Sư phụ đối với Đường sắt Đế hữu Hinomoto——Đường sắt Hoàng gia, đúng là nghiên cứu, nhưng không chỉ có vậy…… ừm……」"
# 【ハチロク】
# display as 八六
# JP: 「『ライバル視』という言葉がよろしいかと」
1557 = "「Tôi nghĩ từ 『Xem như đối thủ』 sẽ phù hợp đấy ạ.」"
# 【西瓜】
# display as 西瓜
# JP: 「ライバル視！　それです。ありがとうハチロク」
2339 = "「Xem như đối thủ! Chính là nó. Cảm ơn Hachiroku.」"
# monologue
# JP: にこり笑った西瓜の瞳が、ふっと細まる。
2951 = "Đôi mắt đang mỉm cười của Suika bỗng nheo lại."
# monologue
# JP: その目が帯びている色は、\nハチロクが過去を懐かしむときのものと変わらない。
2957 = "Màu sắc ánh lên trong đôi mắt ấy, không khác gì ánh mắt của Hachiroku khi hoài niệm về quá khứ."
# 【西瓜】
# display as 西瓜
# JP: 「老師は、帝鉄を大いにライバル視して研究していました。\n老師だけでなく、私、西瓜も――仲国国鉄全体も」
2083 = "「Sư phụ đã nghiên cứu Đường sắt Hoàng gia với tư cách là một đối thủ lớn. Không chỉ Sư phụ, mà cả tôi, Suika——và toàn bộ Đường sắt Quốc gia Zhongguo cũng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど、な」
1576 = "「……Ra là vậy, nhỉ.」"
# monologue
# JP: 西瓜の言葉と、この歴史館に収蔵されている、\n仲国国鉄ごく初期の、日ノ本製造の\x%l蒸機;#00ffc040;蒸機%l;#;たち。
2849 = "Lời nói của Suika, và những chiếc \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; do Hinomoto sản xuất từ thời kỳ đầu của Đường sắt Quốc gia Zhongguo đang được lưu giữ trong bảo tàng lịch sử này."
# monologue
# JP: それらが結び合わされば、ハチロクが先程垣間見せた、\n口惜しさに近い何かを、僕も感じる。
2638 = "Kết nối những điều đó lại với nhau, tôi cũng cảm nhận được điều gì đó gần giống với sự tiếc nuối mà Hachiroku vừa thoáng bộc lộ lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「かつての帝鉄は――少なくとも仲国国鉄の創設期には、\nライバル視されるに足る存在であったのか」
2251 = "「Đường sắt Hoàng gia ngày xưa——ít nhất là vào thời kỳ đầu thành lập của Đường sắt Quốc gia Zhongguo, là một sự tồn tại xứng đáng được xem như đối thủ sao.」"
# 【志寰】
# display as 志寰
# JP: 「はい。父や、父のまわりの方々はそう評価していました。\nですので、日ノ本に学び、追いつき追い越そうとした」
2203 = "「Vâng. Cha tôi và những người xung quanh ông đều đánh giá như vậy. Do đó, họ đã học hỏi từ Hinomoto, cố gắng bắt kịp và vượt qua.」"
# 【ハチロク】
# display as 八六
# JP: 「……お尋ねしては失礼なことかもしれませんが」
1572 = "「……Có thể sẽ là thất lễ khi hỏi điều này nhưng」"
# 【志寰】
# display as 志寰
# JP: 「どうぞ、なんでも聞いてください。\n僕に答えられることだったら、答えます」
2347 = "「Xin cứ tự nhiên, chị muốn hỏi gì cũng được. Nếu là điều tôi có thể trả lời, tôi sẽ trả lời.」"
# 【ハチロク】
# display as 八六
# JP: 「『だから』。仲国国鉄は、[せんよんひゃくさんじゅうごみりき,6]1435mm軌――\n標準軌を選択したのですか？」
1556 = "「『Vì vậy』. Đường sắt Quốc gia Zhongguo, đã chọn khổ 1435mm——khổ tiêu chuẩn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1972 = "「A.」"
# monologue
# JP: ハチロクの、8620形蒸気機関車の――いや、\n日ノ本の近代鉄道の父ともいえる、[しば]芝[こうじろう,2]高次郎技官。
2911 = "kỹ sư Shiba Kojiro."
# monologue
# JP: 彼が描いた高速鉄道の最終型は、\n標準軌への改軌と電化とを前提としたものだった。
2576 = "Hình thái cuối cùng của đường sắt cao tốc mà ông vẽ ra, là dựa trên tiền đề cải tạo thành khổ tiêu chuẩn và điện khí hóa."
# monologue
# JP: （もはや日ノ本の全ての狭軌を、標準軌には改められん。\nゆえ僕らの新・幹線鉄道構想は専用高架線を想定したが）
2976 = "(Giờ đây không thể cải tạo toàn bộ đường sắt khổ hẹp của Hinomoto thành khổ tiêu chuẩn được nữa. Vì vậy, ý tưởng Đường sắt Tân Tuyến của chúng tôi đã giả định sử dụng đường sắt trên cao chuyên dụng)"
# 【志寰】
# display as 志寰
# JP: 「そうですね……狭軌では速度積載量ともに限界があると\n帝鉄が示してくれた影響も、あったかもしれません」
2190 = "「Đúng vậy nhỉ…… Có lẽ cũng có ảnh hưởng từ việc Đường sắt Hoàng gia đã cho thấy khổ hẹp có giới hạn về cả tốc độ lẫn tải trọng.」"
# 【ハチロク】
# display as 八六
# JP: 「やはり、ですか――」
2218 = "「Quả nhiên là vậy sao——」"
# monologue
# JP: 狭軌導入は失敗だった。可能な内に全線改軌をすべきだと。
2722 = "Việc áp dụng khổ hẹp là một thất bại. Cần phải cải tạo toàn tuyến thành khổ tiêu chuẩn khi còn có thể."
# monologue
# JP: 芝技官が、その生涯を通じて燃やした情熱は、\nハチロクの中にも、いまもなおくすぶっているのだろう。
2721 = "Niềm đam mê cháy bỏng suốt cuộc đời của kỹ sư Shiba, có lẽ cho đến tận bây giờ vẫn còn đang âm ỉ trong lòng Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「“影響も”ということは――\n他にも標準軌を選択した理由が？」
1543 = "「Nói \"cũng có ảnh hưởng\" nghĩa là—— Còn có lý do khác để chọn khổ tiêu chuẩn sao?」"
# 【志寰】
# display as 志寰
# JP: 「と、僕は聞いています。\nその辺は、西瓜の方が正確に記憶しているかと」
2139 = "「Tôi nghe nói là vậy. Về phần đó, chắc Suika nhớ chính xác hơn tôi.」"
# monologue
# JP: わずかに、西瓜のおさげが踊る。\n任せてもらえて嬉しいと、物語ってでもいるかのように。
2886 = "Bím tóc của Suika khẽ nảy lên. Như thể đang nói rằng em ấy rất vui vì được giao phó nhiệm vụ này."
# 【西瓜】
# display as 西瓜
# JP: 「『日ノ本が世界で最も早く全線電化を果たすだろう』と、\n老師がおっしゃっていた理由のひとつが、その狭軌です」
1554 = "「Một trong những lý do khiến Sư phụ nói rằng 『Hinomoto sẽ là quốc gia đầu tiên trên thế giới hoàn thành việc điện khí hóa toàn tuyến』, chính là khổ hẹp đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1969 = "「Hửm?」"
# 【西瓜】
# display as 西瓜
# JP: 「日ノ本が狭軌を選択せざるを得なかった理由こそ、\n全線電化を強く後押ししよう――と、老師は」
2086 = "「Sư phụ cho rằng, chính lý do khiến Hinomoto buộc phải chọn khổ hẹp, sẽ là động lực thúc đẩy mạnh mẽ việc điện khí hóa toàn tuyến——」"
# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「ああっ！」\n「なるほどな」
1976 = "「A!」\n「Ra là vậy.」"
# monologue
# JP: 共感を通じ、言葉よりも先に背景が見えたのかもしれぬ。\nならば僕は言葉によって、答え合わせを図ってみよう。
2616 = "Thông qua cộng cảm, có lẽ em ấy đã nhìn thấy bối cảnh trước cả lời nói. Nếu vậy, tôi sẽ thử đối chiếu câu trả lời bằng lời nói xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「国土の多くを山岳と河川とに埋められている日ノ本は、\nどうしようも無く地盤が軟弱な地域を、多く抱えている」
2024 = "「Hinomoto với phần lớn lãnh thổ là núi non và sông ngòi, ôm trong mình rất nhiều khu vực có nền đất yếu không thể tránh khỏi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし……わたくし、理解できていませんでした。\nだって、わたくしが走った――走っている路線は、全て」
2332 = "「Tôi…… tôi đã không hiểu được điều đó. Bởi vì, những tuyến đường mà tôi đã chạy——đang chạy, tất cả đều」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。東峡道線にせよ、肥颯線にせよ、\n国威をかけて敷設された、国策路線であるし……」
2271 = "「Đúng vậy. Cho dù là Tuyến Tokyodo hay Tuyến Hisatsu, đều là những tuyến đường chiến lược quốc gia được xây dựng bằng uy tín của đất nước……」"
# 【日々姫】
# display as 日日姬
# JP: 「湯医線も、平坦地の平坦路線やもんね。\nハチロクが軟弱路線のことば知らんの、無理もなかとよ」
2389 = "「Tuyến Yui cũng là tuyến đường bằng phẳng trên vùng đất bằng phẳng mà. Hachiroku không biết về những tuyến đường nền đất yếu cũng là điều dễ hiểu thôi.」"
# monologue
# JP: ナインスターズを走らせるため、九洲各所を視察するうち、\n日々姫と僕は、否応なしに理解させられた。
2824 = "Trong quá trình đi khảo sát khắp các nơi ở Kyushuu để chuẩn bị cho chuyến chạy của Nine Stars, Hibiki và tôi đã buộc phải hiểu ra điều đó."
# monologue
# JP: 大廃線を越えてなお生き残っている路線の中にさえ、\n軟弱地盤に苦しめられる箇所が少なくないことを。
2658 = "Rằng ngay cả trong số những tuyến đường còn sống sót sau Đại bãi bỏ, cũng không ít nơi phải khổ sở vì nền đất yếu."
# 【ハチロク】
# display as 八六
# JP: 「地盤が軟弱であるのなら、軽いレイルを敷き。\nそのレイルが耐えられる、軽い列車を走らせるしかない」
2032 = "「Nếu nền đất yếu, thì phải rải đường ray nhẹ. Và chỉ có thể cho chạy những đoàn tàu nhẹ mà đường ray đó có thể chịu được.」"
# monologue
# JP: 言って、ハチロクは視線を上げる。\n視線の先の2101――国繋号は、無論、なんの返事もしない。
2952 = "Nói rồi, Hachiroku ngước mắt lên. Phía trước ánh mắt đó là 2101——Quốc Hệ hiệu, tất nhiên, nó không đưa ra bất kỳ câu trả lời nào."
# 【ハチロク】
# display as 八六
# JP: 「このこが全力で走れる線路は……左様ですね。\n日ノ本の隅々にまでは、とても敷き得なかった」
2350 = "「Đường ray để đứa bé này có thể chạy hết tốc lực…… Đúng vậy nhỉ. Rất khó để có thể trải rộng đến mọi ngóc ngách của Hinomoto.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2066 = "「Chắc là vậy.」"
# monologue
# JP: 事実関係を一度掴めば、さすがそこからの理解が早い。\n僕のつたない答え合わせは、もはや必要ないだろう。
2675 = "Một khi đã nắm bắt được sự thật, thì việc hiểu ra vấn đề quả nhiên rất nhanh chóng. Có lẽ những lời giải thích vụng về của tôi không còn cần thiết nữa."
# 【ハチロク】
# display as 八六
# JP: 「ですので、狭軌やむなしの日ノ本における鉄道発展の\n最適解は……動力分散方式――電車方式での、発展」
2145 = "「Do đó, giải pháp tối ưu cho sự phát triển đường sắt ở Hinomoto, nơi không thể tránh khỏi việc sử dụng khổ hẹp là…… Phát triển theo phương thức phân tán động lực——phương thức \\x%l電車;#00ffc040;tàu điện%l;#.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。機関車に動力と重量を集中させるより、\n編成内に分散させる\x%l電車;#00ffc040;電車%l;#;の方が、線路負担は軽く済む」
2232 = "「Đúng vậy. So với việc tập trung động lực và trọng lượng vào đầu máy, thì \\x%l電車;#00ffc040;tàu điện%l;#; với việc phân tán chúng trong toàn bộ đoàn tàu sẽ giảm bớt gánh nặng cho đường ray hơn.」"
# 【志寰】
# display as 志寰
# JP: 「と、仲国国鉄も見込み、発展を期待していたそうです。\nけれど、大廃線が全てを大きく狂わせてしまった」
1882 = "「Đường sắt Quốc gia Zhongguo cũng đã dự đoán và kỳ vọng vào sự phát triển đó. Nhưng cuộc Đại bãi bỏ các tuyến đường sắt đã làm đảo lộn mọi thứ.」"
# 【西瓜】
# display as 西瓜
# JP: 「日ノ本にとどまらず、\x%l電車;#00ffc040;電車%l;#;発展が見込まれた国々では\n例外なく、エアクラが大きく伸長しましたから」
2292 = "「Không chỉ ở Hinomoto, mà ở những quốc gia được kỳ vọng vào sự phát triển của \\x%l電車;#00ffc040;tàu điện%l;#; không có ngoại lệ, Aircra đều phát triển rất mạnh mẽ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そっか！　そいばそーよね。\nエアクラは軽ぅく作れるけんね」
1981 = "「A! Ra là vậy! Nói mới nhớ. Aircra có thể được chế tạo rất nhẹ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1966 = "「Hừm.」"
# monologue
# JP: 驚くべきは、志寰君と西瓜の広い見識だ。\n他国の鉄道事情にここまで通じているとは――いや――
2742 = "Đáng kinh ngạc là kiến thức sâu rộng của Zhihuan và Suika. Không ngờ họ lại am hiểu tình hình đường sắt của các nước khác đến mức này——không——"
# 【双鉄】
# display as 雙鐵
# JP: 「失礼でなければ、もうひとつ聞かせてほしい。\n志寰君のご父君は、何故そこまで詳細に帝鉄の分析を」
2315 = "「Nếu không phiền, tôi muốn hỏi thêm một điều nữa. Tại sao cha của Zhihuan lại phân tích chi tiết về Đường sắt Hoàng gia đến vậy?」"
# 【志寰】
# display as 志寰
# JP: 「父は、仲国国鉄を支えるべき次期機関車の、\n開発・選定に深く関わった、試験機関士でした」
2055 = "「Cha tôi là một người lái tàu thử nghiệm, đã tham gia sâu vào việc phát triển và lựa chọn đầu máy thế hệ tiếp theo để hỗ trợ Đường sắt Quốc gia Zhongguo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1975 = "「啊！」" 
# monologue
# JP: 試験機関士――聞いた瞬間、\n赤井運転士の姿が脳裏に浮かぶ。
2904 = "Người lái tàu thử nghiệm——Ngay khoảnh khắc nghe thấy từ đó, hình bóng của người lái tàu Akai hiện lên trong tâm trí tôi."
# monologue
# JP: それがどれ程の博識と勤勉さとを求められる仕事なのかを、\n赤井運転士はまさしく、体現によって教えてくれた。
2954 = "Đó là một công việc đòi hỏi kiến thức uyên bác và sự cần mẫn đến nhường nào, người lái tàu Akai đã thể hiện điều đó một cách vô cùng rõ nét."
# 【西瓜】
# display as 西瓜
# JP: 「老師ご自身が次期主力として一番に望んだ構想もまた、\n全線電化と\x%l電車;#00ffc040;電車%l;#;形式での高速・大量輸送だったそうです」
2084 = "「Ý tưởng mà bản thân Sư phụ mong muốn nhất cho thế hệ chủ lực tiếp theo, nghe nói cũng là điện khí hóa toàn tuyến và vận chuyển tốc độ cao, khối lượng lớn bằng hình thức \\x%l電車;#00ffc040;tàu điện%l;#.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど。それゆえ日ノ本を、\n主たる研究・調査の対象としていたわけか」
1575 = "「……Ra là vậy. Vì thế nên ông ấy mới lấy Hinomoto làm đối tượng nghiên cứu và điều tra chính sao.」"
# monologue
# JP: 納得できた僕と裏腹、\n西瓜は急に、なんともあいまいな顔になってしまう。
2680 = "Trái ngược với tôi đã hiểu ra vấn đề, Suika đột nhiên tỏ ra một vẻ mặt khá là khó tả."
# 【西瓜】
# display as 西瓜
# JP: 「けれど……精査の末に採用されたのは、[ろこく,1]魯国の技術を\n下敷きにした、東富４型――西瓜たちの機関車でした」
2241 = "「Nhưng mà…… sau khi xem xét kỹ lưỡng, thứ được chọn lại là Dongfu 4 loại—— đầu máy của bọn Suika, được chế tạo dựa trên nền tảng kỹ thuật của Lỗ Quốc (Nga).」"
# monologue
# JP: 大廃線により開発停止も選考に影響したのだろうか。
2684 = "Việc ngừng phát triển do Đại bãi bỏ có lẽ cũng đã ảnh hưởng đến quá trình lựa chọn."
# monologue
# JP: そこから生じた結果は確かに……\n皮肉ともいえるような奇縁だろう。
2835 = "Kết quả sinh ra từ đó quả thực…… có thể nói là một cơ duyên kỳ lạ mang chút mỉa mai."
# 【双鉄】
# display as 雙鐵
# JP: 「志寰君のご父君の願いが叶わなかったがゆえ――\n西瓜は誕生できたわけだな？」
2222 = "「Vì ước nguyện của cha cậu Zhihuan không thành hiện thực—— Nên Suika mới được sinh ra sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。\x%l電車;#00ffc040;電車%l;#;形式がもしも採用されていたなら、\n西瓜はこの世にいませんでした」
2200 = "「Vâng. Nếu hình thức \\x%l電車;#00ffc040;tàu điện%l;#; được chọn, thì Suika đã không có mặt trên cõi đời này.」"
# monologue
# JP: チラ、と西瓜の黒い瞳が志寰君の顔を眺める。\nけれども志寰君は、西瓜の視線に気づかぬようだ。
2912 = "Đôi mắt đen láy của Suika khẽ liếc nhìn khuôn mặt Zhihuan. Nhưng Zhihuan dường như không nhận ra ánh mắt của Suika."
# 【志寰】
# display as 志寰
# JP: 「そのようにして完成された試作機が、\n西瓜の[とうふうよん,2]東富4　[にせん,3]2000――東富4の試作第一号機です」
2297 = "「Cỗ máy thử nghiệm được hoàn thành theo cách đó, chính là Dongfu 4 2000 của Suika——cỗ máy thử nghiệm số 1 của Dongfu 4.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　2000番が試作機の番号なのか――\nあ、いや」
2425 = "「Trời đất! Số 2000 là số hiệu của cỗ máy thử nghiệm sao—— A, không.」"
# monologue
# JP: 思い当たって口を噤めば、すぐにハチロクも察し、微笑む。
2841 = "Tôi chợt nhận ra và ngậm miệng lại, Hachiroku cũng lập tức hiểu ra và mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。トップナンバーが8620のわたくしと、\n大した差異もございませんでしょう」
2274 = "「Đúng là vậy nhỉ. So với tôi, người có số hiệu đầu tiên là 8620, thì cũng chẳng có gì khác biệt lớn lắm đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみればそのとおりだ。しかし……そうか。\n西瓜は、試作機レイルロオドだったのか」
2388 = "「Nói mới nhớ đúng là vậy. Nhưng mà…… ra là vậy. Suika là Railord của cỗ máy thử nghiệm sao.」"
# monologue
# JP: こくり、小さく西瓜が頷く。
2887 = "Suika khẽ gật đầu một cái."
# 【西瓜】
# display as 西瓜
# JP: 「『悉究。悉究』。\nもともとは、老師の口癖でした」
1552 = "「『Tất cứu. Tất cứu』. Ban đầu, đó là câu cửa miệng của Sư phụ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『物事の成り立ちを、その始めから考えることが重要』\n……という意味合いだったか」
1548 = "「『Điều quan trọng là phải suy nghĩ về sự hình thành của sự vật ngay từ điểm khởi đầu của nó』 ……Có phải mang ý nghĩa như vậy không?」"
# monologue
# JP: 自らの希望は叶わず。それでも真摯に、東富4 2000号機と\nレイルロオド・西瓜とに向き合った――
2659 = "Ước nguyện của bản thân không thành. Dù vậy, ông ấy vẫn chân thành đối mặt với cỗ máy Dongfu 4 2000 và Railord Suika——"
# monologue
# JP: 志寰君のご父君の『悉究』が正しく身を結んだことは、\n他ならぬ西瓜自身と、志寰君とが示していよう。
2693 = "Việc sự 『Tất cứu』 của cha Zhihuan đã đơm hoa kết trái một cách đúng đắn, chính bản thân Suika và Zhihuan đã chứng minh điều đó."
# 【ハチロク】
# display as 八六
# JP: 「悉究。\nまことに素晴らしい言葉で、考え方であるかと存じます」
2111 = "「Tất cứu. Quả thực là một từ ngữ, một lối suy nghĩ vô cùng tuyệt vời.」"
# monologue
# JP: ハチロクの声もまっすぐだ。\nだのに何故だか物悲しげに、視線は床へと落ちてしまう。
2620 = "Giọng nói của Hachiroku cũng rất thẳng thắn. Nhưng không hiểu sao, ánh mắt em ấy lại cụp xuống sàn nhà một cách buồn bã."
# 【ハチロク】
# display as 八六
# JP: 「……わたくしが現役でしたころの、最晩年の帝鉄にも。\nそのような考えと行動が、もし定着しておりましたなら」
1585 = "「……Ngay cả trong những năm cuối cùng của Đường sắt Hoàng gia, khi tôi vẫn còn đang hoạt động. Nếu như lối suy nghĩ và hành động đó được bám rễ vững chắc thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ～……その頃の帝鉄って、乗客軽視してたんだっけ？\n一に特急、ニに急行。三四がなくて五に乗客、とか」
1992 = "「A~…… Đường sắt Hoàng gia thời đó, nghe nói là rất coi thường hành khách phải không? Một là tốc hành đặc biệt, hai là tốc hành. Ba bốn không có, năm mới đến hành khách, kiểu vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「そのようにうそぶいていた者さえおりました。\n既得権益を当然の、そして永続するものだと誤解して」
2401 = "「Thậm chí còn có những kẻ huênh hoang như vậy đấy ạ. Họ hiểu lầm rằng những đặc quyền sẵn có là điều hiển nhiên, và sẽ tồn tại mãi mãi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 1997 = "「嗯……」" 
# monologue
# JP: 仲国に来てからのハチロクが、\nときおりにじませる口惜しさ。
2641 = "Kể từ khi đến Zhongguo, Hachiroku thỉnh thoảng lại bộc lộ sự tiếc nuối."
# monologue
# JP: それは複雑なものであっても、結局は、\n嫉妬や羨望の現れといえるものかと思っていたが――
2556 = "Dù có phức tạp đến đâu, tôi đã nghĩ rằng rốt cuộc, đó cũng chỉ là biểu hiện của sự ghen tị hay ngưỡng mộ, nhưng——"
# 【ハチロク】
# display as 八六
# JP: 「最も、ニイロクと赤井運転士とを見れば。旧帝鉄も\n解体寸前には、ようやく目覚めてくれたとは分かります」
1872 = "「Nhưng, nếu nhìn vào Niiroku và người lái tàu Akai. Tôi hiểu rằng Đường sắt Hoàng gia cũ cuối cùng cũng đã thức tỉnh ngay trước bờ vực giải thể.」"
# monologue
# JP: ……自分の愛した存在が、崩壊していくその瞬間を、\n支えることも――見届けることさえも叶わなかった。
1520 = "……Khoảnh khắc sự tồn tại mà mình yêu thương sụp đổ, ngay cả việc nâng đỡ——hay chứng kiến đến phút cuối cùng cũng không thể làm được."
# monologue
# JP: ハチロクの、抑えきれない口惜しさを産み出すものは。\nそうか……そこへの後悔なのか。
2630 = "Thứ sinh ra sự tiếc nuối không thể kìm nén của Hachiroku. Ra là vậy…… là sự hối hận về điều đó sao."
# 【ハチロク】
# display as 八六
# JP: 「……残念ながら、目覚めるのがあまりに遅すぎた。\nただ、それだけのことなのでしょうね」
1593 = "「……Thật đáng tiếc, sự thức tỉnh đó đã đến quá muộn màng. Chỉ đơn giản là vậy thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。遅くはなかったさ」
1873 = "「Không. Không hề muộn màng chút nào đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
1957 = "「Hả?」"
# monologue
# JP: 理解はすぐさま言葉に変わり、迸る。\n極めて近い後悔を、僕も抱え続けていたゆえ。
2763 = "Sự thấu hiểu ngay lập tức chuyển hóa thành lời nói, tuôn trào ra. Bởi vì tôi cũng luôn mang trong mình một sự hối hận vô cùng tương đồng."
# 【双鉄】
# display as 雙鐵
# JP: 「目覚めて以降の帝鉄が重ねてくれた悉究は、\nニイロクの中に残され、僕らはそれを、受け取れた」
2027 = "「Sự tất cứu mà Đường sắt Hoàng gia đã tích lũy được sau khi thức tỉnh, vẫn còn lưu lại trong Niiroku, và chúng ta đã kế thừa được điều đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「その前の帝鉄が悉究しとった、よかとこだって――\nハチロクから私達、たーくさん受け取っとるでしょ？」
1906 = "「Ngay cả những điểm tốt mà Đường sắt Hoàng gia trước đó đã tất cứu—— Chúng ta cũng đã nhận được rất nhiều từ Hachiroku mà, đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1972 = "「啊」" 
# monologue
# JP: ああ――日々姫もだ。\nハチロクの抱える悔しさを、日々姫も同じく受け止めた。
2713 = "A——cả Hibiki cũng vậy. Sự hối hận mà Hachiroku đang ôm ấp, Hibiki cũng đã thấu hiểu được."
# monologue
# JP: ゆえに、僕らの言葉が重なる。\nその後悔は昇華できると、それぞれの声で伝えられる。
2766 = "Chính vì thế, lời nói của chúng tôi mới hòa quyện vào nhau. Bằng giọng nói của chính mình, chúng tôi muốn truyền đạt rằng sự hối hận đó có thể được thăng hoa."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに帝鉄は解体された。\nけれどもそれでも――レールを、僕らは継がせて貰った」
2081 = "「Đúng là Đường sắt Hoàng gia đã bị giải thể. Nhưng dù vậy——chúng ta đã được kế thừa lại những đường ray đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「ゆーたらナインスターズだって、古きよき帝鉄と、\n帝鉄が最後に夢見た未来とを、繋ぎあわせたものやけん」
2301 = "「Nói cách khác, ngay cả Nine Stars, cũng là thứ kết nối giữa Đường sắt Hoàng gia tốt đẹp xưa cũ, và tương lai mà Đường sắt Hoàng gia đã mơ ước vào những giây phút cuối cùng.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……」
1971 = "「A……」"
# monologue
# JP: 過去から未来へ――そのコンセプトを体現するのは、\n復元された、\x%lクハ26;#00ffc040;クハ26%l;#;－000編成――ニイロクの特急\x%l電車;#00ffc040;電車%l;#;だ。
2707 = "Từ quá khứ đến tương lai——thứ thể hiện rõ nhất ý tưởng đó, chính là đoàn tàu \\x%lクハ26;#00ffc040;Kuha 26%l;#; - 000 đã được phục chế——\\x%l電車;#00ffc040;tàu điện%l;#; tốc hành đặc biệt của Niiroku."
# monologue
# JP: 力強くも美しいボンネット型の車輌が走る姿は僕らに、\n更なる未来図を。実現可能なものと鮮やかに示してくれる。
2726 = "Hình ảnh đoàn tàu kiểu mũi nhô (bonnet) mạnh mẽ mà tuyệt đẹp đang chạy, đã chỉ ra cho chúng tôi một cách sống động rằng bản đồ tương lai xa hơn nữa là điều hoàn toàn có thể thực hiện được."
# 【ハチロク】
# display as 八六
# JP: 「左様でした。\nまことに――左様でございます」
2273 = "「Quả đúng là vậy.\nThật sự——đúng là như vậy ạ.」"
# 【志寰】
# display as 志寰
# JP: 「そして。そのナインスターズから、\n再び僕たちは、学びを得ようとしています」
2299 = "「Và. Từ Nine Stars đó, chúng tôi lại đang cố gắng học hỏi thêm một lần nữa.」"
# monologue
# JP: 志寰君と、西瓜と目が合う。頷き合う。\nああ、そうだ。
2740 = "Ánh mắt tôi chạm với Zhihuan và Suika. Chúng tôi gật đầu với nhau. A, đúng rồi."
# monologue
# JP: レールがたとえ途切れようとも、離れようとも。\n意思さえあれば、それは何度も、繋ぎあえるのだ。
2661 = "Dù đường ray có bị đứt đoạn, hay cách xa nhau đi chăng nữa. Chỉ cần có ý chí, thì có thể kết nối lại bao nhiêu lần cũng được."
# 【双鉄】
# display as 雙鐵
# JP: 「全ての過去は、必ず未来への礎にできる。\n思い出すのも嫌なことさえ、バラストに砕き、搗き固め」
2390 = "「Mọi quá khứ, nhất định đều có thể trở thành nền tảng cho tương lai. Ngay cả những điều không muốn nhớ lại, cũng có thể nghiền nát thành đá ba-lát, rồi đầm cho thật chặt.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！」
2205 = "「Vâng!」"
# monologue
# JP: 日々姫のペンがささっと動く。
2798 = "Cây bút của Hibiki đưa thoăn thoắt."
# monologue
# JP: 今のハチロクの笑顔を描きとめたのならば、\n僕も、あとで見せてもらおう。
2866 = "Nếu em ấy đã vẽ lại được nụ cười hiện tại của Hachiroku, thì lát nữa tôi cũng phải xin xem mới được."
# 【日々姫】
# display as 日日姬
# JP: 「やったら、ね？　たーくさん勉強――\nじゃないや！　悉究、しよ？」
2406 = "「Nếu vậy thì, nhỉ? Phải học hỏi thật nhiề—— À không phải! Phải tất cứu thật nhiều mới được, nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちが受け継いだレイルを――\n更に先へと、受け渡すため」
2227 = "「Đúng vậy nhỉ. Những đường ray mà chúng ta đã kế thừa—— Là để truyền lại cho những thế hệ xa hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
2003 = "「Ừm!」"
# monologue
# JP: これでいい。仲国に来てからずうっと、どこかギクシャク不安定だったハチロクに、ようやく一本の芯が通った。
2944 = "Thế này là được rồi. Hachiroku, người luôn có chút gượng gạo và bất ổn kể từ khi đến Zhongguo, cuối cùng cũng đã tìm lại được trục cốt lõi của mình."
# monologue
# JP: 安堵の息が出、背筋が伸びる。
2547 = "Tôi thở phào nhẹ nhõm, vươn thẳng lưng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことで、改めてお願いしたい。この歴史館で\n学び得るものを、できるだけ多く僕らに学ばせてほしい」
2278 = "「Vậy nên, tôi muốn nhờ mọi người một lần nữa. Xin hãy để chúng tôi học hỏi được nhiều nhất có thể từ những gì bảo tàng lịch sử này mang lại.」"
# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はい！　右田先生。任せてください！」
2039 = "「Vâng! Thầy Migita. Xin cứ giao cho chúng tôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2041 = "「Ồ!」"
# monologue
# JP: 息も言葉もぴったりだ。
2605 = "Hơi thở và lời nói của họ thật ăn ý."
# monologue
# JP: さすが西瓜が志寰君の、日ノ本語の先生というだけは――\nああ、いや。
2814 = "Quả không hổ danh Suika là giáo viên tiếng Hinomoto của Zhihuan—— A, không phải."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば、二人は志寰君が産まれたときからの\n長い付き合いになるのだな」
2346 = "「Ra là vậy, nếu thế thì, hai người đã gắn bó với nhau từ lúc Zhihuan mới sinh ra rồi nhỉ.」"
# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はいっ！！」\n「っ！！！」
1945 = "「Vâng!!」\n「!!!」"
# monologue
# JP: その事実がもう、嬉しくて誇らしくてたまらない。\n志寰君の素直な笑顔は、眩しいほどだ。
2941 = "Chỉ riêng sự thật đó thôi, đã khiến cậu ấy vô cùng vui sướng và tự hào. Nụ cười chân thật của Zhihuan chói lọi đến mức chói mắt."
# 【志寰】
# display as 志寰
# JP: 「西瓜は僕のレイルロオドで。日ノ本語の先生で。\nそうしてそれ以前にずっと！　僕のお姉さんなんです！」
2325 = "「Suika là Railord của tôi. Là giáo viên tiếng Hinomoto của tôi. Và từ rất lâu trước đó! Cô ấy đã là chị gái của tôi rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1970 = "「啊——」" 
# monologue
# JP: 大きなベッドに横になる。\nハチロクと日々姫。ふたりに挟まれ、匂いに包まれ。
2756 = "Tôi ngả lưng xuống chiếc giường rộng lớn. Hachiroku và Hibiki. Bị kẹp giữa hai người, được bao bọc trong mùi hương của họ."
# monologue
# JP: 異国の宿の床とはいえど、\n家族団欒――その四文字が自然と脳裏に浮いてくる。
2962 = "Mặc dù đang ở trên giường của một nhà trọ nơi đất khách quê người, nhưng bốn chữ \"Gia đình đoàn tụ\"——lại tự nhiên hiện lên trong tâm trí tôi."
# 【ハチロク】
# display as 八六
# JP: 「まこと、双鉄さまは無神経でいらっしゃいます」
2260 = "「Thật sự, Ngài Soutetsu quá vô tâm đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ほーんと。あのあとの西瓜ちゃんのギクシャクったら、\nかわいそうなくらいだったけん」
1942 = "「Đúng thật á. Nhìn Suika lúng túng sau chuyện đó, mà thấy tội nghiệp luôn ấy.」"
# monologue
# JP: であるというのに両端から、言葉と物理の二刀をもって、\n日々姫ハチロクがちくちく僕をつついてくる。
2603 = "Dù vậy, từ hai phía, Hibiki và Hachiroku đang liên tục dùng cả lời nói lẫn hành động vật lý để châm chọc tôi."
# monologue
# JP: 『話があるからあがってきて』と、\n呼び出した上でのこの仕打ち、だ。
2666 = "Đây là sự trừng phạt sau khi gọi tôi lên với lý do \"Có chuyện muốn nói\" đây mà."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が何かをやらかしてしまったらしいということは、\nさすがに感じないではなかった」
2125 = "「Anh cũng không phải là không cảm nhận được rằng mình dường như đã làm hỏng chuyện gì đó.」"
# monologue
# JP: 言えばうんうん、二人は頷く。\n柔らかなベッドがそれだけで、僕の体を沈みこませる。
2607 = "Nghe tôi nói vậy, hai người gật đầu lia lịa. Chỉ riêng chiếc giường mềm mại cũng đủ làm cơ thể tôi chìm xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、いつ何をやらかしたのかがさっぱりわからん。\nできれば、そこから教示してもらいたい」
2310 = "「Nhưng mà, anh hoàn toàn không biết mình đã làm hỏng chuyện gì, và vào lúc nào. Nếu được, xin hãy chỉ giáo từ đoạn đó.」"
# 【日々姫】
# display as 八六＆日日姬
# JP: 「はぁ～っ」
1963 = "「Haa~」"
# monologue
# JP: なんと見事なシンクロだ。\n血が繋がらぬでも家族は家族と、微妙に嬉しくなってくる。
2604 = "Đồng điệu đến mức đáng kinh ngạc. Dù không cùng huyết thống nhưng gia đình vẫn là gia đình, điều đó khiến tôi cảm thấy vui vui."
# 【双鉄】
# display as 雙鐵
# JP: 「志寰君と西瓜もだったが、\nなかなか日々姫とハチロクも」
2102 = "「Zhihuan và Suika thì đã đành, nhưng Hibiki và Hachiroku cũng rất ăn ý nhỉ.」"
# 【日々姫】
# display as 八六＆日日姬
# JP: 「それでございます」\n「そこっ！」
1993 = "「Chính là chuyện đó đấy ạ!」\n「Là chỗ đó đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおっ！？」
1960 = "「Ôi!?」"
# monologue
# JP: 両方向から同時に鋭い叱咤の声。\nなのだが……僕にはまだ掴めない。
2768 = "Những tiếng quát mắng sắc bén vang lên đồng thời từ cả hai phía. Nhưng mà…… tôi vẫn chưa nắm bắt được vấn đề."
# 【双鉄】
# display as 雙鐵
# JP: 「それとは何で、そことはどこだ」
1890 = "「Chuyện đó là chuyện gì, và chỗ đó là chỗ nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「やけーん！　西瓜ちゃんと志寰君の関係のこと！」
2393 = "「Thì là! Chuyện về mối quan hệ giữa Suika và Zhihuan ấy!」"
# 【ハチロク】
# display as 八六
# JP: 「そこは、さすがに……\n容易に口に出すべきではなかったのではないか、と」
2380 = "「Chỗ đó, quả thực là…… Không nên dễ dàng nói ra miệng như vậy đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1968 = "「唔！？」" 
# monologue
# JP: 何故だ。\n僕がしたことといえば……
2942 = "Tại sao chứ.\nNếu nói về những gì tôi đã làm……"
# monologue
# JP: ……西瓜と姜さんの関係については尋ねるのを控えたし。\nあとは単なる、明白すぎる事実の再確認をしたにすぎない。
1514 = "……Tôi đã kiềm chế không hỏi về mối quan hệ giữa Suika và cô Jiang. Còn lại thì tôi chỉ đơn thuần xác nhận lại một sự thật quá đỗi hiển nhiên mà thôi."
# 【日々姫】
# display as 日日姬
# JP: 「……わかってなかと？　なかとよね？\nにぃにやもんね。しかたなかとねー」
1600 = "「……Anh không hiểu sao? Không hiểu thật sao? Anh hai mà. Đành chịu thôi~」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまにこの類のことをご説明申し上げるのは、\nいささか骨が折れそうです」
2337 = "「Việc giải thích những chuyện thuộc loại này cho Ngài Soutetsu, có vẻ sẽ khá là tốn công sức đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……」
1967 = "「Ưm……」"
# monologue
# JP: 反論したいが、ハチロク日々姫。\nまさしく身内の二人がこうも一致している。
2961 = "Tôi muốn phản bác, nhưng Hachiroku và Hibiki. Đúng là hai người nhà lại đang đồng lòng đến thế này."
# monologue
# JP: ならばやはり、僕になんらかの失点、\nないし、見落としがあるということだろう。
2955 = "Nếu vậy thì chắc chắn, tôi đã mắc phải một sai lầm nào đó, hoặc là đã bỏ sót điều gì đó rồi."
# 【日々姫】
# display as 日日姬
# JP: 「西瓜ちゃんの志寰君への接し方みとって。\nにぃには、なーんも感じんかったと？」
2329 = "「Anh cứ nhìn cách Suika đối xử với Zhihuan đi. Anh hai, anh không cảm thấy gì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、とても嬉しそうだと感じた。言葉を交わしたり、\n信頼を示されたり。そうしたひとつひとつのことが」
2379 = "「Về chuyện đó, anh cảm thấy cô bé có vẻ rất vui. Qua cách nói chuyện, hay cách thể hiện sự tin tưởng. Từng hành động một đều cho thấy điều đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「そいばわかって――って……あー。\nわかっても、うん。額面通りなんよね、にぃに」
2162 = "「Nếu anh hiểu điều đó——thì…… a~. Dù có hiểu, ừm. Anh hai cũng chỉ nhìn theo đúng nghĩa đen thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「額面通りではいかんのか？\n――ああ、ならば、なにか裏がある？」
1870 = "「Nhìn theo nghĩa đen thì không được sao? ——A, nếu vậy, có ẩn ý gì phía sau sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「裏っていうたらアレばってん……ん～」
2387 = "「Nói là ẩn ý thì hơi quá nhưng…… ưm~」"
# 【ハチロク】
# display as 八六
# JP: 「では、双鉄さま。西瓜は全く同じでしたでしょうか？\n姜様と接しているときと、志寰様に接しているときとで」
2404 = "「Vậy thì, Ngài Soutetsu. Suika có hoàn toàn giống nhau không ạ? Khi tiếp xúc với cô Jiang, và khi tiếp xúc với Zhihuan.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！」
# 1975 = "「啊！」" 
# monologue
# JP: なにやら、日々姫が感心している。\n『その手があったか』といわんばかりに。
2789 = "Không hiểu sao, Hibiki lại tỏ vẻ thán phục. Như thể muốn nói 『Ra là còn có cách đó』 vậy."
# monologue
# JP: ならば僕も、なんとなくで答えるべきではないだろう。\n目を閉じ、慎重に思い返して…………ふむ。
2771 = "Nếu vậy thì tôi cũng không nên trả lời một cách qua loa. Tôi nhắm mắt lại, cẩn thận nhớ lại………… hừm."
# 【双鉄】
# display as 雙鐵
# JP: 「違いはあるな。志寰君に対するときの方が、\n西瓜は、うむ……なんというか、反応が過敏に思えた」
2272 = "「Đúng là có sự khác biệt. Khi đối diện với Zhihuan, Suika, ừm…… nói sao nhỉ, phản ứng có vẻ nhạy cảm hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん！　そぎゃんと！！」
2068 = "「Đúng thế! Chính là chỗ đó!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。志寰君と接するときには、表情よりもよほど\n豊かに、西瓜のおさげが、揺れたり踊ったりもしていた」
2188 = "「Đúng nhỉ. Khi tiếp xúc với Zhihuan, thay vì biểu cảm trên khuôn mặt thì bím tóc của Suika lại đung đưa, nhảy múa nhiều hơn hẳn.」"
# 【日々姫】
# display as 日日姬
# JP: 「よね！？　嬉しか気持ちを顔で必死に隠そうとして。\nだけど体がぴょこっ！ て動いちゃうみたいな感じで！」
2060 = "「Đúng không!? Kiểu như đang tuyệt vọng che giấu niềm vui sướng trên khuôn mặt. Nhưng cơ thể lại cứ nảy lên! Cảm giác giống như vậy đó!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
2016 = "「Ufufu.」"
# monologue
# JP: やわらかにハチロクは微笑んで、\nけれどもすぐに真面目な顔で、まっすぐまっすぐ僕を見る。
2627 = "Hachiroku mỉm cười dịu dàng, nhưng ngay sau đó lại mang vẻ mặt nghiêm túc, nhìn thẳng vào tôi."
# 【ハチロク】
# display as 八六
# JP: 「その度に、です。双鉄様。\n瞬時、共感が遮断されるのです」
2415 = "「Mỗi lần như vậy đấy ạ. Ngài Soutetsu. Trong khoảnh khắc, cộng cảm sẽ bị ngắt kết nối.」"
# 【双鉄】
# display as 雙鐵
# JP: 「共感が遮断される？　何故だ？」
1912 = "「Cộng cảm bị ngắt kết nối? Tại sao chứ?」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ、何故でしょう。例えば、そう……\n路子様と双鉄さまでは、いかがでしたか？」
2378 = "「Chà, tại sao nhỉ. Ví dụ như, đúng rồi…… Giữa cô Michiko và Ngài Soutetsu thì thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らのときか」
2133 = "「Lúc của bọn anh sao.」"
# monologue
# JP: 日々姫が一瞬、ぎくりと固まってしまったが、\n僕は……うん、完全に平静だ。
2801 = "Hibiki thoáng chốc giật mình cứng đờ người, nhưng tôi…… ừm, hoàn toàn bình tĩnh."
# monologue
# JP: 路子が生きて、隣にいたころ――\nあのころのことを、ただ懐かしく、思い出せてる。
2929 = "Hồi Michiko còn sống, và ở bên cạnh tôi—— Tôi có thể nhớ lại những ngày tháng đó với một cảm giác thật hoài niệm."
# 【双鉄】
# display as 雙鐵
# JP: 「路子に対してこころを閉ざすことはほとんどなかったが\n……あ、いや、失敗など、隠し事をしたいときには……」
2061 = "「Anh hầu như không bao giờ khép kín lòng mình với Michiko cả ……A, không, khi gặp thất bại hay muốn giấu giếm điều gì đó thì……」"
# monologue
# JP: ……隠し事……西瓜もあるいは隠していたのか。\n志寰君と触れ合うたびに、にじみ出る喜びを。
1512 = "……Giấu giếm…… Suika có lẽ cũng đang giấu giếm điều gì đó chăng. Niềm vui sướng trào dâng mỗi khi được tiếp xúc với Zhihuan."
# monologue
# JP: それがかえって、あの特徴的なおさげの動きを\n目立たせてしまっていたようにも……なるほど、思える。
2826 = "Và điều đó lại vô tình làm cho chuyển động đặc trưng của bím tóc kia càng trở nên nổi bật hơn…… Ra là vậy, cũng có lý."
# 【双鉄】
# display as 雙鐵
# JP: 「共感遮断は、志寰君と触れ合う喜びを感じていることを、ハチロクに伝えたくないと思ったゆえ、か？」
1911 = "「Ngắt kết nối cộng cảm là vì không muốn truyền đạt cho Hachiroku biết rằng cô bé đang cảm thấy vui sướng khi được tiếp xúc với Zhihuan sao?」"
# 【ハチロク】
# display as 八六
# JP: 「“わたくしに”と申しますより、わたくしに知られ、\nそれが“誰か”に伝わることを恐れたから、では？」
2229 = "「Thay vì nói là \"với tôi\", thì có lẽ cô bé sợ rằng nếu tôi biết, điều đó sẽ truyền đến tai \"ai đó\" chăng?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その“誰か”とは？」
2377 = "「\"Ai đó\" là ai?」"
# 【日々姫】
# display as 日日姬
# JP: 「わからん？　にぃに。よぉ考えて？」
2376 = "「Anh không biết sao? Anh hai. Thử suy nghĩ kỹ xem nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
1965 = "「Ư……m」"
# monologue
# JP: ハチロクは除外。日々姫と僕も、西瓜と出会ってまだ\n間もない。候補から外しても問題なかろう。
2624 = "Loại trừ Hachiroku. Hibiki và tôi cũng mới gặp Suika chưa được bao lâu. Loại khỏi danh sách ứng cử viên cũng không sao."
# monologue
# JP: 姜さんは途中から不在だったし、残るは志寰君一人……\nん？　あ……ああ、そうか！　そうなのか！！
2858 = "Cô Jiang thì đã vắng mặt từ giữa chừng, vậy chỉ còn lại một mình Zhihuan…… Hửm? A…… A, ra là vậy! Là vậy sao!!"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどわかった。\n西瓜は志寰くんに、恋愛感情を抱いているのか」
1927 = "「Ra là vậy, anh hiểu rồi. Suika đang ôm ấp tình cảm nam nữ với Zhihuan sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク！」
1901 = "「Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「日々姫！！」
2177 = "「Hibiki!!」"
# monologue
# JP: やりとげた、と言わんばかりの視線が、言葉が、\n僕を通り越し交換される。
2608 = "Ánh mắt và lời nói như thể muốn bảo \"Cuối cùng cũng xong\", được trao đổi qua lại ngay trên đầu tôi."
# monologue
# JP: ……まぁ、確かに。かつての僕なら何をどのように\n考えようが、達し得なかった結論だろう。が――
1511 = "……Chà, cũng đúng. Nếu là tôi của ngày xưa thì dù có suy nghĩ thế nào đi nữa, chắc cũng không thể đạt đến kết luận này được. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだとしてもわからない。\n一体、僕がなにをやらかしてしまったのだ」
1884 = "「Dù có là vậy thì anh vẫn không hiểu. Rốt cuộc, anh đã làm hỏng chuyện gì cơ chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「んとね？　にぃに。\n恋する女の子って、相手の気持ちば、気になるの」
2141 = "「Anh biết không? Anh hai. Một cô gái đang yêu ấy, sẽ rất quan tâm đến cảm xúc của đối phương đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2002 = "「嗯」" 
# monologue
# JP: 日々姫の声は真剣だ。
2799 = "Giọng của Hibiki rất nghiêm túc."
# monologue
# JP: 起き上がり、背筋を正して聞きたく思うが、\nそうすることも、何故だか今ははばかられる。
2925 = "Tôi muốn ngồi dậy, vươn thẳng lưng để lắng nghe, nhưng không hiểu sao lúc này lại cảm thấy hơi e ngại."
# 【ハチロク】
# display as 八六
# JP: 「何より知りたいことなのに、知るのが一番怖いこと。\nですので知るなら、自らの行為によって知りたいのです」
2113 = "「Điều muốn biết nhất, lại chính là điều sợ phải biết nhất. Vì vậy nếu muốn biết, thì họ muốn tự mình tìm hiểu thông qua hành động của bản thân.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういうものか」
1601 = "「……Là vậy sao.」"
# 【ハチロク】
# display as 八六
# JP: 「そういうものか、と思います。わたくしの知識も、\n恋愛小説や少女マンガ等からの学習にすぎませんけれど」
2140 = "「Tôi nghĩ là như vậy ạ. Dù kiến thức của tôi, cũng chỉ là học hỏi từ tiểu thuyết tình cảm hay manga thiếu nữ thôi.」"
# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「あはは」\n「ふぅむ」
1973 = "「Ahaha」\n「Hừm」"
# monologue
# JP: 相手の気持ちを知る行為とは、つまり告白のことだろう。\n相手の気持ちを知りたいがゆえ、決意を固め告白をする。
2896 = "Hành động để biết được cảm xúc của đối phương, nói tóm lại chính là tỏ tình. Vì muốn biết cảm xúc của đối phương, nên mới quyết tâm tỏ tình."
# monologue
# JP: その欲求はごく当然のものに思えて、\n僕にも素直に頷け……る……うむ？
2945 = "Khao khát đó nghe có vẻ rất đương nhiên, và tôi cũng ngoan ngoãn gật đầu…… đồng ý…… hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕は。そこをやらかしてしまったわけか？\nつまり、志寰君に――」
1989 = "「Nếu vậy, là anh. Anh đã làm hỏng chuyện đó sao? Tức là, đối với Zhihuan——」"
# 【日々姫】
# display as 日日姬
# JP: 「言わせちゃったでしょー！　\n『お姉さん』だとか！　はっきり！！」
2154 = "「Anh đã khiến cậu ấy nói ra mất rồi còn gì! Là 『Chị gái』 đấy! Một cách rõ ràng!!」"
# 【ハチロク】
# display as 八六
# JP: 「可愛そうに、西瓜。\nあのあとの動揺と落ち込みようときたら……」
2328 = "「Tội nghiệp Suika. Sự bối rối và suy sụp sau lúc đó của cô bé……」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに――志寰くんとの距離が妙に遠くなったし、\nおさげも殆ど踊らなくなったとも思えたが――」
2253 = "「Đúng là——khoảng cách với Zhihuan trở nên xa cách một cách kỳ lạ, và bím tóc cũng gần như không còn nhảy múa nữa, nhưng mà——」"
# monologue
# JP: しかし、しかしだ。
2679 = "Nhưng mà, nhưng mà."
# 【双鉄】
# display as 雙鐵
# JP: 「『お姉さん』という評価は、家族ということだろう。\nそれは、最高の親しみではないかと」
1546 = "「Đánh giá là 『Chị gái』, nghĩa là gia đình đúng không. Đó chẳng phải là sự thân thiết tuyệt vời nhất sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「家族の好きと、異性の好きとは別物ばい！！」
1996 = "「Thích kiểu gia đình, và thích kiểu khác giới là hai chuyện hoàn toàn khác nhau!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1984 = "「Hả!!?」"
# 【ハチロク】
# display as 八六
# JP: 「日々姫、ここはホテルですよ」
2179 = "「Hibiki, chúng ta đang ở khách sạn đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1975 = "「啊！」" 
# monologue
# JP: 日々姫がしまったという顔をして、\n両手で大きく口を押さえて――
2803 = "Hibiki làm vẻ mặt như thể nhận ra mình lỡ lời, vội dùng hai tay che kín miệng——"
# monologue
# JP: そうして、視線で、\nハチロクに感謝の気持ちを伝える。
2719 = "Và rồi, bằng ánh mắt, em ấy truyền đạt sự biết ơn đến Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「かまいませんよ。わたくしたちは、家族で、仲間。\n――で、ございましょ？」
2234 = "「Không sao đâu ạ. Chúng ta là gia đình, là đồng đội. ——Phải không ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「……うんっ」
1581 = "「……Vâng.」"
# monologue
# JP: 日々姫の強い頷きに、ほっとしたような息を吐き。\nそして再びハチロクは、静かに、僕に教えてくれる。
2794 = "Trước cái gật đầu mạnh mẽ của Hibiki, Hachiroku thở hắt ra như thể nhẹ nhõm. Và rồi một lần nữa, Hachiroku lại nhẹ nhàng giải thích cho tôi hiểu."
# 【ハチロク】
# display as 八六
# JP: 「恋する乙女は、こころを[ちぢ,1]千千に乱すのです。\n言われたこと、されたこと。全てに意味を求めるのです」
2120 = "「Trái tim của một thiếu nữ đang yêu, lúc nào cũng rối bời. Những gì được nói, những gì được làm. Họ đều tìm kiếm ý nghĩa trong tất cả những điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういうものか」
1577 = "「……Là vậy sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「意味なんかないってわかってたって、考えちゃうの。\n好きだから――ヒントにしたいって思っちゃうの」
1925 = "「Dù biết là không có ý nghĩa gì, nhưng vẫn cứ suy nghĩ. Bởi vì thích——nên muốn biến nó thành gợi ý.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、な」
1926 = "「Ra là vậy, nhỉ.」"
# monologue
# JP: 異性として、西瓜が志寰くんを求めていると仮定するなら、\nなるほど、確かに全てが繋がる。
2868 = "Nếu giả định rằng Suika đang mong muốn Zhihuan với tư cách là một người khác giới, thì ra là vậy, mọi chuyện đã được kết nối với nhau một cách hợp lý."
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、志寰君の『お姉さん』ではいたくないわけか」
2152 = "「Suika, không muốn chỉ là 『Chị gái』 của Zhihuan sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「いたくないわけじゃないと思う。\n『お姉さんなだけ』じゃ、辛いってだけで――きっと」
2119 = "「Em không nghĩ là cô bé không muốn. Chỉ là, nếu 『Chỉ là chị gái』 thì sẽ rất đau khổ——chắc chắn là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも同様に感じます。家族であることと恋とが、\nもしも両立できるのならば――両立させたい」
2129 = "「Tôi cũng có cảm giác tương tự. Việc là gia đình và tình yêu, nếu có thể song hành——thì tôi muốn cả hai song hành cùng nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……西瓜の望みがそこであるなら――うむ。\n志寰くんの、『お姉さん』宣言は……堪えるものか」
1587 = "「……Nếu mong muốn của Suika là vậy——ừm. Lời tuyên bố 『Chị gái』 của Zhihuan…… đúng là khó mà chịu đựng nổi.」"
# 【ハチロク】
# display as 八六
# JP: 「共感を隠しきれぬほど――堪えていましたね」
2400 = "「Cô bé đã phải chịu đựng——đến mức không thể che giấu được cộng cảm nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あれば、相当にキツかとよ」
2092 = "「Nếu là vậy, thì chắc chắn là đau lòng lắm.」"
# monologue
# JP: 強い、説得力を感じる。\n同時に……いささかの自己嫌悪も。
2948 = "Tôi cảm nhận được một sự thuyết phục mạnh mẽ. Đồng thời…… cũng có chút chán ghét bản thân."
# monologue
# JP: 成長し、人のこころを多少は僕もわかってきたかと、\n感じ始めてもいたのだが――
2811 = "Dù tôi đã bắt đầu cảm thấy mình đã trưởng thành, và cũng đã phần nào hiểu được tâm lý con người, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり僕は、無自覚に、西瓜の心に踏み込んで、\nあまつさえかき乱してしまったわけか」
1877 = "「Nói cách khác, anh đã vô thức bước vào trái tim của Suika, thậm chí còn làm nó rối bời lên sao.」"
# monologue
# JP: 理解できれば、納得できるし反省できる。\nたとえ相手がレイルロオドとそのマスターであろうとも…
2832 = "Nếu có thể hiểu được, thì có thể chấp nhận và tự kiểm điểm. Dù đối phương có là Railord và Master của cô ấy đi chăng nữa..."
# monologue
# JP: 『他者の生い立ち』――そこに安易に踏み入ることは、\n当然控えるべきだった。
1503 = "『Quá trình trưởng thành của người khác』——việc dễ dàng bước vào đó, tất nhiên là điều nên tránh."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕の失敗を指摘し、教えてくれて、ありがとう」
1602 = "「……Cảm ơn hai người đã chỉ ra và dạy cho anh biết sai lầm của mình.」"
# 【日々姫】
# display as 日日姬
# JP: 「いや！？　そんなっ、\n失敗っていうほどのことじゃなかけん」
1913 = "「Không!? Đâu có, cũng không đến mức gọi là sai lầm đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。実害が生じたわけでもございませんし」
2224 = "「Đúng vậy ạ. Cũng không có thiệt hại thực tế nào xảy ra cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても大いに助かった。注意を受けずにいたのなら。\n明日以降、またやらかしていたかもしれん」
1886 = "「Dù vậy thì cũng đã giúp anh rất nhiều. Nếu không được nhắc nhở. Từ ngày mai trở đi, có lẽ anh lại tiếp tục làm hỏng chuyện nữa.」"
# monologue
# JP: きっぷを取り出す。
2761 = "Tôi lấy vé ra."
# monologue
# JP: 志寰君から渡された、明日のきっぷ――\n姜さんが預けてくれていた、きっぷを。
2943 = "Tấm vé cho ngày mai mà Zhihuan đã đưa cho tôi—— Tấm vé mà cô Jiang đã nhờ cậu ấy giữ hộ."
# 【双鉄】
# display as 雙鐵
# JP: 「[ぜっとよんじゅうきゅう,2]Ｚ４９列車。11時28分北琴西駅発、翌08:39　[せいと,1]聖都駅着。\nほぼ丸一日を、彼らと一緒にすごすのだから」
2433 = "「Tàu Z49. Xuất phát từ ga Beiqin Tây lúc 11:28, đến ga Thánh Đô lúc 08:39 ngày hôm sau. Chúng ta sẽ trải qua gần trọn một ngày cùng với họ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あーうん。そうよね。知っとっても、注意ばしとっても\n……私達だって、ちょっとどぎゃんしたら良かとか」
1987 = "「A~ vâng. Đúng vậy nhỉ. Dù có biết, dù có chú ý ……thì chúng ta, nên làm gì đó một chút thì tốt hơn chăng.」"
# 【ハチロク】
# display as 八六
# JP: 「まこと。むつかしいところでございますよね」
2258 = "「Thật sự. Đây là một vấn đề khó khăn đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nふたりはなにか、西瓜から希望を聞いているのか？」
2012 = "「Hửm? Hai người có nghe được nguyện vọng gì từ Suika sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「希望って？」
2407 = "「Nguyện vọng gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、志寰くんとどうなりたいとか。\nそのためになにか協力してほしいとか、そうした希望だ」
2064 = "「Thì là, muốn tiến triển thế nào với Zhihuan chẳng hạn. Hay là muốn chúng ta giúp đỡ gì đó để đạt được điều đó, những nguyện vọng kiểu vậy.」"
# 【日々姫】
# display as 八六＆日日姬
# JP: 「あ」
# 1972 = "「啊」" 
# monologue
# JP: 二人の声と視線とが、また僕の上を通り過ぎ、交わる。
2606 = "Giọng nói và ánh mắt của hai người họ lại một lần nữa lướt qua tôi và giao nhau."
# 【ハチロク】
# display as 八六
# JP: 「まったく、伺っておりません」
2050 = "「Hoàn toàn, chưa từng nghe gì cả ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「私も、なんにも」
2126 = "「Em cũng, không nghe gì hết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「であらば、どぎゃんもこぎゃんもなかろう。\n普段どおりに。特別なことはなにもせぬようすれば良い」
2163 = "「Nếu vậy thì, chẳng có cách nào cả. Cứ như bình thường. Không cần phải làm gì đặc biệt cả là được.」"
# 【日々姫】
# display as 日日姬
# JP: 「よね、うん」
1876 = "「Đúng vậy nhỉ, vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もしもなにかを西瓜に、あるいは志寰君に頼られたなら、\nそのときに改めて、どうするのかを考えれば十分だろう」
2043 = "「Nếu Suika, hoặc Zhihuan có nhờ vả điều gì, thì đến lúc đó chúng ta mới suy nghĩ xem nên làm thế nào là đủ rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし――ああ、恥ずかしい。\nつられてしまい、どこか舞い上がっていたようです」
2122 = "「Tôi——a, thật xấu hổ quá. Có vẻ như tôi đã bị cuốn theo và trở nên phấn khích quá đà rồi.」"
# monologue
# JP: じたっと、ハチロクが身動ぎをする。\nまたも小さくベッドが揺れて、体がほんのわずかに跳ねる。
2622 = "Hachiroku cựa quậy người một cái. Chiếc giường lại khẽ rung lên, cơ thể em ấy hơi nảy lên một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「僕とて同じだ。視察とはいえ、初めての異国で――\n真闇姉の不在こそは残念だけれど、家族旅行でもある」
2134 = "「Anh cũng vậy thôi. Dù là đi khảo sát, nhưng đây là lần đầu tiên đến một đất nước xa lạ—— Dù hơi tiếc vì chị Mayami không thể đi cùng, nhưng đây cũng là một chuyến du lịch gia đình mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2002 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「はい」
2204 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「舞い上がらないわけがない。ならば、舞い上がった上で\n見える景色を――逃さず捉えればそれでよかろう」
2091 = "「Không thể không phấn khích được. Nếu vậy, trong lúc đang phấn khích hãy nắm bắt trọn vẹn những cảnh sắc hiện ra trước mắt——không bỏ sót điều gì là được.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん！　そぎゃんする」
2005 = "「Ưm! Em sẽ làm vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ。やはりお話はいいものですね。\nこころのさまざまなモヤが、スッキリと晴れた思いです」
2017 = "「Ufufu. Quả nhiên nói chuyện với nhau thật là tốt nhỉ. Những đám mây mù trong lòng tôi, cảm giác như đã được xua tan hoàn toàn rồi.」"
# monologue
# JP: 甘えるように、ハチロクの小さなてのひらが近づいてくる。
2594 = "Như đang làm nũng, bàn tay nhỏ bé của Hachiroku tiến lại gần."
# monologue
# JP: 求められているものがすぐわかる。\nゆえにその手に、そっときっぷを握らせてやる。
2946 = "Tôi hiểu ngay em ấy muốn gì. Vì vậy, tôi nhẹ nhàng đặt tấm vé vào tay em ấy."
# 【ハチロク】
# display as 八六
# JP: 「はじめての、仲国の列車。Z49列車。\n[こうがしゃ,2]硬臥車……三段寝台をお手配いただけたのですね」
2132 = "「Chuyến tàu đầu tiên ở Zhongguo. Tàu Z49. \\x%lこうがしゃ;#00ffc040;Toa giường cứng%l;#;…… Mọi người đã sắp xếp cho chúng ta giường ba tầng nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば、めちゃくちゃありがたかとよ！\n個室じゃ視察もなにもなかけん」
2381 = "「Điều đó thật sự rất đáng biết ơn đấy! Nếu là phòng riêng thì chẳng khảo sát được gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、完全に希望通りを手配してもらえた。\nありがたいことだ」
2193 = "「Đúng vậy, họ đã sắp xếp hoàn toàn theo đúng nguyện vọng của chúng ta. Thật đáng biết ơn.」"
# 【ハチロク】
# display as 八六
# JP: 「聖都……」
2254 = "「Thánh Đô……」"
# monologue
# JP: ハチロクの指がそうっと、きっぷの表面を撫ぜる。
2612 = "Ngón tay Hachiroku nhẹ nhàng vuốt ve bề mặt tấm vé."
# 【ハチロク】
# display as 八六
# JP: 「美しい名前の街ですが、\n果たして、どのようなところなのでしょう？」
2382 = "「Thành phố có cái tên thật đẹp, nhưng không biết đó sẽ là một nơi như thế nào nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「私は知らんと。にぃにはどぎゃん？」
2123 = "「Em không biết nữa. Anh hai thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「知らぬが、いくつかはわかっている」
1908 = "「Anh không rõ lắm, nhưng cũng biết được một vài điều.」"
# monologue
# JP: なにせ、あの姜さんが、西瓜と志寰君と一緒になって、\n“僕らの希望を汲んで”手配してくれたきっぷゆえ。
2891 = "Dù sao thì, đây cũng là tấm vé mà cô Jiang, cùng với Suika và Zhihuan, đã \"nắm bắt nguyện vọng của chúng ta\" để sắp xếp mà."
# 【双鉄】
# display as 雙鐵
# JP: 「北琴の人たちが好んで訪れる、\nメジャーな旅行先のひとつで――」
2308 = "「Đây là một trong những điểm đến du lịch phổ biến, mà người dân Beiqin rất thích ghé thăm——」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！」
# 1975 = "「啊！」" 
# monologue
# JP: ハチロクが笑う。\n幸せそうに、楽しげに。まさしく浮かれた顔をして。
2631 = "Hachiroku mỉm cười. Một cách hạnh phúc, vui vẻ. Với một khuôn mặt rạng rỡ thực sự."
# 【ハチロク】
# display as 八六
# JP: 「そうしてそこには、\n蒸気機関車が待っているのでございますね！」
2294 = "「Và ở đó, có những chiếc đầu máy hơi nước đang chờ đợi chúng ta phải không ạ!」"
