[script]
# lines: 389 
# 【姜】
# display as 姜
# JP: 「良くお眠りになれたとのこと、なによりです」
2349 = "「諸位昨晚休息得不錯真是太好了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ホテルのお部屋！\n二階建てで私、びっくりしちゃいました」
2333 = "「要說那旅館的房間哎！竟然是上下躍層的！我一進去真是大吃一驚咧」" 

# monologue
# JP: 二階建て……\n確かに単なるロフトというには、豪勢すぎる空間だった。
2913 = "說躍層委實有點誇張……但說那樓上是閣樓的話，也的確是太奢侈了一點。" 

# monologue
# JP: 一階の僕はシングルベッド。\n二階にはダブルのベッドで日々姫・ハチロク。
2765 = "我睡樓下的單人床，日日姬和八六睡樓上的雙人床。" 

# 【日々姫】
# display as 日日姬
# JP: 「北琴ダックでお腹もぽんぽんでしたから、\nふっかふかのベッドに潜った途端に、もうぐっすりで！」
2212 = "「晚餐那北琴烤鴨超好吃，吃得好撐，然後一黏到那軟乎乎的床就馬上睡著咧！」" 

# monologue
# JP: 晩餐の北琴ダックも凄かった。\n日ノ本の総理大臣が接遇されたこともあるという高級店。
2651 = "北琴烤鴨確實是非比尋常。聽說那家店是曾經接待過日本國總理的高級飯店。" 

# monologue
# JP: 味はもちろん素晴らしかったし――その上料理の外観も、\n日々姫がスケッチを止められぬほど、一々芸術的だった。
2967 = "飯菜的美味至極自不必說，菜品的擺盤也簡直如藝術品般精美絕倫，讓日日姬忍不住畫個不停。" 

# 【双鉄】
# display as 雙鐵
# JP: 「暖かなお手配に、こころより御礼申し上げます」
2045 = "「如此周到的安排，我們真是由衷地感謝」" 

# 【姜】
# display as 姜
# JP: 「いえいえ、気持ち良くご視察いただくことも、\n我々の職務ですので」
1961 = "「哪裡哪裡，確保諸位在考察過程中身心愉悅，也是我們的職務所在」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ！　がんばらんと～！！！\n姜さん、ここってスケッチばしても？」
1952 = "「哇！那我更得加油整了～！！姜小姐，這裡可以畫素描嗎！？」" 

# 【姜】
# display as 姜
# JP: 「博物館なので、もちろん大丈夫です。写真撮影も。\n禁止施設の場合は、事前に必ずご注意します」
2386 = "「這裡是博物館，當然允許寫生，拍照攝影等行為也沒問題。如果要進入有禁令的設施，我定會提前告知各位」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助かります。ご教示ありがとうございます」
2117 = "「感謝您的照顧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへ！　時間、これ一日で足りるとかなぁ」
2020 = "「嘿嘿！也不知道一天時間夠不夠整嘞」" 

# monologue
# JP: 満面の笑顔を浮かべて、日々姫が大きく辺りを見回す。\n僕もつられて――うむ？　ハチロクは？
2676 = "只見日日姬滿面燦爛的笑容，不斷環顧四周，於是我也和她一起——不對，八六人呢？" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1559 = "「…………」" 

# monologue
# JP: いつの間に、僕らの側から離れ機関車を凝視している。\nその顔は、ほとんど真上を向いている。
2554 = "不知何時，八六和我們拉開了距離，獨自昂首凝視著一輛蒸汽機車——小腦瓜抬得簡直像望天一樣高。" 

# monologue
# JP: 視線の先は2101プレートの――\n実に大きな蒸気機関車だ。
2964 = "順她視線看去，其編號牌２１０１映入眼簾——這蒸汽機車的體型著實不小。" 

# 【日々姫】
# display as 日日姬
# JP: 「このこ……大陸、って感じ。前照灯ば突き出してて、\nその上になんか、王冠みたいなのまで乗ってて」
2383 = "「這孩子……看起來就有種“大陸”的感覺。在突出於煙室門前方的頭燈上，竟然架有像王冠一樣的裝飾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日ノ本\x%l蒸機;#00ffc040;蒸機%l;#;も勇壮で見事に違いないが……」
2008 = "「嗯，雖說以雄偉壯觀而論，日本國的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;應該並非相差甚遠……」" 

# monologue
# JP: 僕らも間近に近づけば、\nついぞ経験したことの無い迫力を感じる。
2596 = "但當我們走到近前時，一股前所未有的巨大壓迫感卻撲面而來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、大陸の印象だな。\n分厚く、大きく、威圧感さえ伝わってくる」
1599 = "「……這還真是“大陸”的感覺啊。厚重，大氣，威嚴磅礴的感覺噴薄而出」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1559 = "「…………」" 

# monologue
# JP: ほうっ、とため息。
2618 = "八六發出了一聲嘆息。" 

# monologue
# JP: ハチロクは、今気づいたように、\nゆるゆる僕らへと振り返る。
2717 = "就如同剛剛意識到我們走近一般，緩緩地向我們轉過身來。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの8620は、[こんにち,1]今日となっては\n小柄な\x%l蒸機;#00ffc040;蒸機%l;#;ではございますが、それにいたしましても」
2156 = "「按說我的８６２０，在如今這個年代應該只能算小型的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;了，但如此差距實在是令人始料未及」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大人と子供という気さえするな。\n全長全幅全高――どれも、8620の1.5倍はありそうだ」
2195 = "「是啊，簡直有種大人和小孩的感覺。長寬高——每一項應該都有８６２０的１.５倍左右吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「1.5倍は、ある程度正しい計算かと西瓜は判断します」
2419 = "「１.５倍在某種程度上應該也不算錯吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1968 = "「唔！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1964 = "「唔……」" 

# monologue
# JP: いつの間に日々姫は機関車、2101の真横に回り込んでいる。
2549 = "不知不覺間，日日姬已經繞到２１０１的側面去了。" 

# monologue
# JP: 鉛筆をものさしのようにして眼の前に持ち、\nしかつめらしく、描かずにじっと、観察している。
2690 = "她並沒有揮筆作畫，而是把鉛筆像尺一樣端在眼前，滿臉嚴肅地觀察著。" 

# 【日々姫】
# display as 日日姬
# JP: 「1.5倍はさすがになかけど、確かにそこそこ近いかも。\nこのこ、多分全長22mくらいあるし」
2421 = "「１.５倍還是太誇張了，不過也比較接近了。這孩子的全長應該有差不多２２公尺吧」" 

# 【志寰】
# display as 志寰
# JP: 「わ！　すごい。目が良いのですね」
1948 = "「哇！好厲害。眼光確實了得」" 

# monologue
# JP: 日々姫の言葉は今度は逆に、志寰君を驚かせる。
2947 = "這次倒是日日姬的話讓志寰為之驚訝了。" 

# 【志寰】
# display as 志寰
# JP: 「[かいほういちけい,3]開放1型、[にいいちまるいち,3]2101。\n[こくけい,1]国繋号の全長は21.91mです」
2220 = "「檞放１型，２１０１。國系號的長度是２１.９１公尺」" 

# 【ハチロク】
# display as 八六
# JP: 「8620の全長が約16.745mですから――\nちょうど1.3倍ほどの計算ということになりますね」
2426 = "「８６２０的長度約１６.７４５公尺，所以長度方面應該是１.３倍左右」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2002 = "「嗯」" 

# monologue
# JP: なるほど。『ある程度正しい』は、\n客人の顔を立てつつ、事実も曲げず。まこと巧妙な表現だ。
2663 = "原來如此。“某種程度上也不算錯”——此言既不掃客人面子，也不歪曲事實，著實是巧妙的措辭。" 

# monologue
# JP: 姜さんが連れているだけのことはあり、\n西瓜はなかなか高度な……うむ？
2567 = "也難怪姜小姐會把她帶在身邊，西瓜待人處事的確……嗯？" 

# monologue
# JP: （姜さんと西瓜はどのような関係なのだ？\nマスターは志寰君だし……）
2981 = "（說起來，姜小姐和西瓜究竟是怎樣的關係呢？畢竟志寰才是西瓜的司機……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「姜さん」
2047 = "「姜小姐」" 

# 【姜】
# display as 姜
# JP: 「はい――あ、いや少しお待ちください」
2025 = "「在——啊，請稍等一下」" 

# monologue
# JP: おっと、電話か。\n姜さんは早口の仲国語でなにやら――っ！
2845 = "真不巧，正趕上有電話進來。姜小姐以很快的語速用仲文和對方交流著。" 

# 【姜】
# display as 姜
# JP: 「すみません、双鉄先生。自分が向かわなければいけない\n要件が発生してしまいました」
1921 = "「十分抱歉，雙鐵先生。有點要事我必須親自去處理一下」" 

# monologue
# JP: 僕へと向かう声はいつもの冷静さだが、\n電話を切る直前には、あきらかな緊張を含んでいた。
2714 = "對我的話語還是一如既往地沉著冷靜，但在掛斷前，她的話語中還是透著明顯的緊張。" 

# monologue
# JP: 恐らくは、緊急性を持つ案件だろう。
2750 = "恐怕是發生了頗為緊急的情況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕たちには構わずにお向かいください。\nお戻りまで、こちらで待っていても大丈夫ですし」
2348 = "「請您前去處理吧，不必顧慮我們。我們就在這裡等您回來也無妨」" 

# 【姜】
# display as 姜
# JP: 「いえ、志寰君と西瓜に任せます。自由に行動して下さい。\n可能なようなら、自分も後から合流しますので」
2396 = "「那倒不必，志寰和西瓜還在，諸位還請自由行動便可。如果可能的話，我會在稍後與諸位會合」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました」
2038 = "「好的」" 

# 【姜】
# display as 姜
# JP: 「明日の列車の詳細なども既に伝えてあります。\n折を見て聞いておいてください。では、失礼します」
2183 = "「明天的列車也已經敲定下來了，回頭和您具體確認一下吧。那我先告辭了」" 

# monologue
# JP: いうなり、姜さんは足早に歴史館から外へと――！
2910 = "話音未落，姜小姐已經快步走出了博物館。" 

# 【日々姫】
# display as 日日姬
# JP: 「わ……あれ、お迎えよね」
1954 = "「哇，那是來接她的吧」" 

# 【ハチロク】
# display as 八六
# JP: 「見るからに高級そうなエアクラ車でございますね」
2403 = "「那空凝機車看起來相當高級呀」" 

# monologue
# JP: 歴史館の出入り口脇にはいつの間に、\n真っ黒な高級エアクラ車が横付けされている。
2553 = "不知何時，一輛全黑的高級空凝機車已經停在了博物館的出口旁邊。" 

# monologue
# JP: 姜さんが乗り込むや否やでエアクラ車は、\nかなりの加速で飛び出していく。
2703 = "姜小姐才剛剛坐進車內，車子便猛一加速絕塵而去。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄さんは、姜秘書に何のお話でしたか？」
2412 = "「雙鐵先生剛剛是想跟姜老師說什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ、いや――」
2010 = "「嗯？啊，沒什麼——」" 

# monologue
# JP: 思いついた勢いで、西瓜と姜さんの関係を、\n直接尋ねそうになってしまったが……
2646 = "剛才差點就順勢開口直接詢問西瓜和姜小姐的關係了……" 

# monologue
# JP: （あるいは、なにか複雑な関係かもしれん。\n少なくとも、志寰君のいないところで尋ねるべきか）
2977 = "（如此想來，說不定是相當錯綜複雜的關係。或許，至少應該找個志寰不在的時機再問吧）" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄さん？」
2414 = "「雙鐵先生？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大したことではないのだが、その――」
1985 = "「啊，也沒什麼，只是——」" 

# 【ハチロク】
# display as 八六
# JP: 「このこ。2101。\n[こくけい,1]国繋号の大きさのお話でございましょうか？」
2196 = "「是在說這２１０１，國系號的大小的話題吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2191 = "「是啊」" 

# monologue
# JP: ハチロクの、ごくさりげない助け舟。\nそうだ、その話の途中であったか。
2626 = "八六若無其事地伸出了援手。也對，剛才也確實是在討論這個話題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。全幅も全長と大差ない対比であるなら、\nこのゲージは1435mm――標準軌かなと思ってな」
2001 = "「嗯。如果寬度和長度的比例相仿的話，這軌距應該是１４３５ｍｍ——也就是標準軌」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい！\nこのゲージは間違いなく、1435mmの標準軌です」
2207 = "「是的！完全正確，這的確是１４３５ｍｍ的標準軌」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか、昨日の客車……緑比車！　も、\n標準軌だから、あぎゃん広々しておったとねー」
2385 = "「這樣啊，那昨天的綠比車也是同樣的標準軌囉！怪不得那麼寬敞吶」" 

# monologue
# JP: ふんふんと日々姫が頷き、もう一度2101――\n国繋号を見上げて、今度はじっくりスケッチし始める。
2791 = "日日姬像搗蒜一樣不住點頭，而後目光再次落向２１０１——這次她邊抬頭觀察國系號，邊仔細地畫起了素描。" 

# monologue
# JP: ああ、よく見ればあの王冠には、\n『國繋號』の三文字が、燦然と輝いているではないか。
2709 = "定睛再看，車頭的王冠上，赫然刻著“國系號”三個金光閃爍的大字。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……国を繋ぐ、で、国繋号か。\n素晴らしい列車愛称だな」
1589 = "「……將國家繫於一處，是為國系號嗎。還真是響亮而富有深意的車名」" 

# 【西瓜】
# display as 西瓜
# JP: 「わ！　素晴らしい列車愛称と思ってもらえて、\n西瓜はとても嬉しく、同時に大いに納得します！」
2411 = "「雙鐵先生也覺得這車名很棒，西瓜好高興！西瓜其實也認同這樣的解釋！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　納得、とは」
2014 = "「嗯？認同是指……」" 

# 【西瓜】
# display as 西瓜
# JP: 「なぜかを西瓜は説明します。国繋号が繋ぐ二つの国と国。\nそれは、仲国と日ノ本のことだからです」
2331 = "「西瓜這就為您說明。國系號所聯繫的，是兩個國家——仲國和日本國」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そうなのか」
2394 = "「還有這層含義嗎」" 

# monologue
# JP: 西瓜は嬉しそうに頷いて、視線を志寰君へと向ける。\n話を振られ、志寰君もまた嬉しそうに頷き返す。
2889 = "西瓜開心地點頭，扭頭望向了志寰。而志寰也開心地點頭接過了話題。" 

# 【志寰】
# display as 志寰
# JP: 「はい。なぜならば国繋号は、もとをたどれば日ノ本製\n――旧[まんてつ,1]漫鉄で使われていた、ミカイ号だからです」
2209 = "「是的，因為國系號，若追根溯源，本是日本國生產，前南曼鐵路使用過的米卡伊號」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　このこはミカイなのですか！！」
1950 = "「哇！這孩子就是米卡伊嗎！！」" 

# monologue
# JP: ハチロクが目を丸くする。\nその目がすぐに、ふわり、いたわるように和らぐ。
2611 = "八六不禁瞪大了眼睛。而後，目光漸漸柔和了下來，還透著一絲憫恤。" 

# 【ハチロク】
# display as 八六
# JP: 「旧[まんてつ,1]漫鉄で働いた後――\n仲国国鉄でも活躍をしたのですね、このこは？」
1878 = "「也就是說，她在前南曼鐵路服役之後，還在仲國國鐵大顯身手過囉？」" 

# 【志寰】
# display as 志寰
# JP: 「そうです。一度は廃棄寸前にまで傷んだものの、\n仲国建国一周年を記念して修復され、再度活躍しました」
2225 = "「正是如此。該車曾嚴重受損，差點遭到廢棄處理，但趕上仲國建國一周年而得以修復，再次活躍在鐵軌上」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本製ということだが……もともとのミカイ号、\nというのは、“開かれていない”の意味の未開か？」
2316 = "「若是說起初是日本國生產的話，原本的名字是米卡伊號，是“尚未開啟”那個未開的意思嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。ミカイは、ミカド型のイチゴウキで、\nミカイです」
1866 = "「不對哦，雙鐵少爺。米卡伊是帝（米卡多）一號機車，是為米卡伊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああ！　パシナ号と同じ命名規則なのだな？\nさすがにパシナは僕でも聞いたことがある」
1958 = "「哦哦！原來是和太洋棲同樣的命名規則嗎？說太洋棲的話那我就知道了」" 

# monologue
# JP: 言った瞬間、日々姫の指がピタッと止まる。
2909 = "話音剛落，日日姬揮筆的手戛然而止。" 

# 【日々姫】
# display as 日日姬
# JP: 「なんね？　にぃに。\nそん、パシナ？　とか、ミカイとか」
2345 = "「說什麼吶，阿哥？那個什麼，太洋棲？還有那什麼，米卡伊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。動輪形式の愛称が、命名のベースだという話だ。\n例えばこの国繋号の動輪形式は」
1998 = "「嗯。在說動輪輪式的稱呼和命名規則。比方說這輛國系號的動輪輪式就是」" 

# 【日々姫】
# display as 日日姬
# JP: 「1－D－1。2－8－2と」
2423 = "「１－Ｄ－１，也就是２－８－２」" 

# monologue
# JP: まさにスケッチしていたがゆえ、\n間髪入れずの日々姫の答えは正確だ。
2813 = "果然剛畫過素描的人觀察就是細緻，日日姬不假思索地立即給出了正確答案。" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l先輪;#00ffc040;先輪%l;#;が1軸2つで。動輪がD――4軸8つで。\n\x%l従輪;#00ffc040;従輪%l;#;も、1軸2つ」
1540 = "「\\x%l先輪;#00ffc040;導輪%l;#;１軸２個，動輪是Ｄ——也就是４軸８個。\\x%l従輪;#00ffc040;從輪%l;#;也是１軸２個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして1－D－1形式には、\nミカドという愛称があるらしいのだ」
2231 = "「沒錯，聽說１－Ｄ－１這個輪式的愛稱，就是叫做“帝”」" 

# 【ハチロク】
# display as 八六
# JP: 「[きゅうなな,3]9700、9700形蒸気機関車が1D1形式なのですが――\n彼女たちは、冥国に発注された、輸入\x%l蒸機;#00ffc040;蒸機%l;#;なのです」
2430 = "「９７００型蒸汽機車就是１Ｄ１輪式——她們都是從美國進口的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2211 = "「是這樣」" 

# monologue
# JP: そこまで詳しくは僕も知らなかった。\n日々姫だけでなく、西瓜も志寰君も聞き入っている。
2760 = "我對這些也沒有如此深入的了解，不止是日日姬，就連西瓜和志寰也都饒有興致地聽八六講解。" 

# 【ハチロク】
# display as 八六
# JP: 「そして9700は、冥国でも初めて製造された\n1D1の\x%l蒸機;#00ffc040;蒸機%l;#;だった――ゆえに、発注元への敬意を表し」
2304 = "「而９７００甚至在美國，也是第一輛１Ｄ１輪式\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，所以為致敬其進口方」" 

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本帝有鉄道のオーナー、[ヒノモトノミカド,3]日ノ本帝から、\nミカドって愛称になったと！？」
2248 = "「由於帝家日本國鐵路的所有人是日本國[米卡多]帝，所以愛稱就叫“帝”了嗎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「と、帝鉄では申し伝えられておりました」
2029 = "「在帝鐵是這樣流傳的」" 

# 【日々姫】
# display as 日日姬
# JP: 「すごかとね！　ほんなら帝鉄は解体されちゃっても。\nそれでも名前ば、今も世界中で生きておるとね！」
1867 = "「不得了！要說這帝鐵明明都解散了，但是其名卻還在全世界廣為流傳！」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1975 = "「啊！」" 

# monologue
# JP: ……なるほど、確かに。言われてみれば、だ。
1517 = "……日日姬此言確有一番道理。" 

# monologue
# JP: 日々姫の視野は、ハチロクの盲点を照らしたらしい。\nハチロクの頬が、みるみる嬉しげなバラ色になる。
2800 = "日日姬的著眼點剛好覆蓋了八六的盲點，八六的臉頰上漸漸染上代表欣喜的玫瑰色。" 

# 【ハチロク】
# display as 八六
# JP: 「ええと……あの……あ、左様でした！　同様に、2－C－1。\n4－6－2の動輪形式は、パシヒック、と呼ばれております」
2138 = "「我想想……那個什麼……啊，對了！　２-Ｃ-１也與之同理，４-６-２的輪式就叫做太品洋」" 

# 【双鉄】
# display as 雙鐵
# JP: 「1－D－1がミカド。2－C－1がパシフィック」
2422 = "「１－Ｄ－１叫做帝，２-Ｃ-１是太平洋」" 

# monologue
# JP: 話をまとめるふりをして、\nハチロクの苦手な発音を念の為一応フォローしておく。
2758 = "我假裝複述，同時暗中為八六糾正了一下發音。" 

# 【双鉄】
# display as 雙鐵
# JP: 「でだ。日々姫。ミカイは、ミカドのイチゴウキ、\nの意味とのことであるとハチロクが教えてくれたな？」
2146 = "「所以日日姬，八六不是告訴我們，米卡伊的意思是[米卡多]帝一號機嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　わかったと！！　ほんならパシナは、2－C－1、\nパシフィックのナナゴウキ！？」
1983 = "「啊！我懂了！！那太洋棲就是２-Ｃ-１，太平洋七號機了對嗎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「大正解でございます！」
2049 = "「完全正確！」" 

# monologue
# JP: イェイ、と日々姫が手を差し出せば、\nハチロクもいぇいと手を出しパチン！　鳴らし合わせる。
2817 = "歡欣鼓舞的日日姬伸出手來，於是八六也以相同的熱烈情緒伸手與之擊掌。" 

# 【日々姫】
# display as 日日姬
# JP: 「って！　正解しといてアレだけど――\nずいぶん簡単なお名前のつけかたしてたとねー」
1956 = "「哇，雖然是讓我猜對了，但是想想這命名規則還蠻簡單的呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……」
1997 = "「嗯……」" 

# monologue
# JP: 旧漫州鉄道――というか旧漫州国は、\n日ノ本と仲国とが相争ったあの\x%l大戦;#00ffc040;大戦%l;#;の要因のひとつだ。
2642 = "前南曼鐵路——準確說是前曼州國，說來也是當年日本國與仲國之間那場\\x%l大戦;#00ffc040;大戰%l;#;的核心因素之一。" 

# monologue
# JP: "簡単な名"も、広い意味では戦時仕様であるかもしれん。\nそうした対立を乗り越え、修復されて与えられた名が――
1506 = "“命名簡單”，廣義而言或許也是依照戰時標準而來。而經歷了這樣的對立、修復後得到的新名字——" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、だな。機械的である“ミカイ”より、\n“国繋号”の方が、遥かに美しく――豊かな名だ」
2275 = "「確實貼切啊。比起機械的“米卡伊”，“國系號”不止好聽得多，而且也有更深層次的含義在裡面」" 

# 【西瓜】
# display as 西瓜
# JP: 「美しく豊かな名だと双鉄先生にも思ってもらえて、\n西瓜は、とても嬉しいです！」
2413 = "「雙鐵先生覺得這名字好聽而有深意，西瓜真是非常高興！」" 

# monologue
# JP: 言葉と同時に長く艷やかな西瓜の髪がぴょこんと跳ねる。\n僕も自然と、嬉しくなる。
2883 = "西瓜漂亮的長辮子也隨著她說話的節奏舞動著。而這些看在眼裡，我也和她一起開心了起來。" 

# monologue
# JP: 西瓜がどれほど仲国を、日ノ本を、大事に想って\nくれているのかが、伝わってくる気さえする。
2592 = "仲國，以及日本國在西瓜心中究竟有著怎樣的分量，在適才的一言一行中，體現得淋漓盡致。" 

# 【志寰】
# display as 志寰
# JP: 「この歴史館には、[おおさか,1]逢坂で作られた蒸気機関車もいます。\n仲国と日ノ本のレールは、かつては繋がっていたんです」
2384 = "「這座歷史博物館裡還有大阪生產的蒸汽機車。過去仲國和日本的軌道是有過緊密聯繫的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのだな」
1928 = "「原來是這樣」" 

# monologue
# JP: その繋がりを断ち切ったのは、\x%l大戦;#00ffc040;大戦%l;#;と大廃線だろう。\nなんとももったいないことだ。
2855 = "而切斷這聯繫的，應該就是那場\\x%l大戦;#00ffc040;大戰%l;#;與大廢線了吧。著實令人惋惜。" 

# 【志寰】
# display as 志寰
# JP: 「日ノ本は全線電化に一番近い国だと、父に教わりました。\nだから、大廃線が。僕にはとても残念なことでした」
2056 = "「家父當年曾告訴我，日本國是最接近鐵路全面電力化的國家。所以，大廢線讓我覺得格外遺憾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1970 = "「啊——」" 

# monologue
# JP: そうだった。\n西瓜の先代のマスターが、志寰君の父親と聞かされていた。
2664 = "原來是這樣。先前姜小姐說過，西瓜的前任司機是志寰的父親。" 

# monologue
# JP: 西瓜と志寰君の日ノ本語の上手さ、\n加え、帝鉄史にまで及ぶ知識の広範さから類推するに――
2860 = "而西瓜與志寰的日語如此流利，知識範圍更是廣到對帝國鐵路的歷史都了如指掌，如此想來——" 

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君のご[ふくん,1]父君は、\n日ノ本の鉄道の研究かなにかされてらしたのか？」
2104 = "「志寰，令尊是進行日本國鐵路研究或類似的工作的嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「老師の日ノ本帝有鉄道――帝鉄への接し方は、\n確かに研究でしたけれど、それだけでなく……ん……」
2082 = "「師父對於帝家日本國鐵路——對於帝國鐵路確實是抱以研究的態度，不過不僅如此……嗯……」" 

# 【ハチロク】
# display as 八六
# JP: 「『ライバル視』という言葉がよろしいかと」
1557 = "「“視為勁敵”這一詞彙可算妥當」" 

# 【西瓜】
# display as 西瓜
# JP: 「ライバル視！　それです。ありがとうハチロク」
2339 = "「視為勁敵！沒錯。八六謝謝你」" 

# monologue
# JP: にこり笑った西瓜の瞳が、ふっと細まる。
2951 = "適才還飽含笑意的西瓜，眼神漸漸眯成了一條線。" 

# monologue
# JP: その目が帯びている色は、\nハチロクが過去を懐かしむときのものと変わらない。
2957 = "那眼中映出的神色，和八六在緬懷過去時的樣子別無二致。" 

# 【西瓜】
# display as 西瓜
# JP: 「老師は、帝鉄を大いにライバル視して研究していました。\n老師だけでなく、私、西瓜も――仲国国鉄全体も」
2083 = "「師父是將帝國鐵路視為一大勁敵而對其加以研究的。而且不僅是師父，我——西瓜，還有仲國國鐵所有人也都是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど、な」
1576 = "「……原來如此，唔」" 

# monologue
# JP: 西瓜の言葉と、この歴史館に収蔵されている、\n仲国国鉄ごく初期の、日ノ本製造の\x%l蒸機;#00ffc040;蒸機%l;#;たち。
2849 = "結合西瓜所講，以及那些藏於這座博物館的仲國國鐵草創期時，曾使用的日本國產\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;。" 

# monologue
# JP: それらが結び合わされば、ハチロクが先程垣間見せた、\n口惜しさに近い何かを、僕も感じる。
2638 = "再稍加聯想，對於八六剛才神色間那一閃即逝，略帶惋惜的感情，我也多了一分理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かつての帝鉄は――少なくとも仲国国鉄の創設期には、\nライバル視されるに足る存在であったのか」
2251 = "「當年的帝國鐵路——至少在仲國國鐵創設之初，絕對是一個值得被視為勁敵的存在」" 

# 【志寰】
# display as 志寰
# JP: 「はい。父や、父のまわりの方々はそう評価していました。\nですので、日ノ本に学び、追いつき追い越そうとした」
2203 = "「是的。家父及家父身邊的同僚們都是如此評價的。所以，才要學習日本國，加以追趕，進而超越」" 

# 【ハチロク】
# display as 八六
# JP: 「……お尋ねしては失礼なことかもしれませんが」
1572 = "「……不知如此提問是否有所冒犯」" 

# 【志寰】
# display as 志寰
# JP: 「どうぞ、なんでも聞いてください。\n僕に答えられることだったら、答えます」
2347 = "「請不要客氣儘管開口。我一定知無不言」" 

# 【ハチロク】
# display as 八六
# JP: 「『だから』。仲国国鉄は、[せんよんひゃくさんじゅうごみりき,6]1435mm軌――\n標準軌を選択したのですか？」
1556 = "「“正因如此”，仲國國鐵才選擇了１４３５ｍｍ軌距的標準軌嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1972 = "「啊」" 

# monologue
# JP: ハチロクの、8620形蒸気機関車の――いや、\n日ノ本の近代鉄道の父ともいえる、[しば]芝[こうじろう,2]高次郎技官。
2911 = "說到八六，８６２０的父親島安次郎技官——不，將其稱作日本國近代鐵路之父也不為過。" 

# monologue
# JP: 彼が描いた高速鉄道の最終型は、\n標準軌への改軌と電化とを前提としたものだった。
2576 = "他所描繪的高速鐵路終極藍圖，就是以改軌為標準軌與電力化為前提的。" 

# monologue
# JP: （もはや日ノ本の全ての狭軌を、標準軌には改められん。\nゆえ僕らの新・幹線鉄道構想は専用高架線を想定したが）
2976 = "（但日本國全境既有的全都是窄軌，改軌完全不現實。所以我們的新·幹線鐵路藍圖中，都是採用專用高架線路）" 

# 【志寰】
# display as 志寰
# JP: 「そうですね……狭軌では速度積載量ともに限界があると\n帝鉄が示してくれた影響も、あったかもしれません」
2190 = "「是啊……帝國鐵路所展現出的窄軌在速度和承重上的局限性，可能確實是促使我國採用標準軌的原因之一」" 

# 【ハチロク】
# display as 八六
# JP: 「やはり、ですか――」
2218 = "「果然如此嗎，可是——」" 

# monologue
# JP: 狭軌導入は失敗だった。可能な内に全線改軌をすべきだと。
2722 = "引入窄軌是錯誤的選擇，那就應在尚可能時進行全線改軌。" 

# monologue
# JP: 芝技官が、その生涯を通じて燃やした情熱は、\nハチロクの中にも、いまもなおくすぶっているのだろう。
2721 = "島技官的這股熱情貫徹了他的一生，而這熱情如今想必也仍深埋在八六的心中吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“影響も”ということは――\n他にも標準軌を選択した理由が？」
1543 = "「“原因之一”，就是說還有其他選擇標準軌的理由嗎？」" 

# 【志寰】
# display as 志寰
# JP: 「と、僕は聞いています。\nその辺は、西瓜の方が正確に記憶しているかと」
2139 = "「我聽說是這樣的。這部分應該西瓜會記得更清楚一些」" 

# monologue
# JP: わずかに、西瓜のおさげが踊る。\n任せてもらえて嬉しいと、物語ってでもいるかのように。
2886 = "西瓜的辮子隨之一跳。簡直就像是在表達她被委以重任的高興心情一般。" 

# 【西瓜】
# display as 西瓜
# JP: 「『日ノ本が世界で最も早く全線電化を果たすだろう』と、\n老師がおっしゃっていた理由のひとつが、その狭軌です」
1554 = "「“日本國應該會是全世界最早完成全面電力化的國家吧”，師父做出如此判斷的理由之一，就在於日本國的窄軌」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1969 = "「唔？」" 

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本が狭軌を選択せざるを得なかった理由こそ、\n全線電化を強く後押ししよう――と、老師は」
2086 = "「師父說，日本國被迫選擇窄軌的原因，同時也是全面電力化的強大助力」" 

# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「ああっ！」\n「なるほどな」
1976 = "「啊！」\\n「原來如此啊」" 

# monologue
# JP: 共感を通じ、言葉よりも先に背景が見えたのかもしれぬ。\nならば僕は言葉によって、答え合わせを図ってみよう。
2616 = "八六或許通過共鳴，在西瓜說明完成前就已經了解了其中的緣由。那我就通過語言去找出答案和她對照吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「国土の多くを山岳と河川とに埋められている日ノ本は、\nどうしようも無く地盤が軟弱な地域を、多く抱えている」
2024 = "「國土中有大量山川河流的日本國，相應的就有許多地基頗不穩固的地區」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし……わたくし、理解できていませんでした。\nだって、わたくしが走った――走っている路線は、全て」
2332 = "「要說……我原本都理解不了這些因素。你看我以前……行駛過的這些線路都是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。東峡道線にせよ、肥颯線にせよ、\n国威をかけて敷設された、国策路線であるし……」
2271 = "「確實。不管是東海道線，還是肥薩線，都是以舉國之力鋪設的戰略線路……」" 

# 【日々姫】
# display as 日日姬
# JP: 「湯医線も、平坦地の平坦路線やもんね。\nハチロクが軟弱路線のことば知らんの、無理もなかとよ」
2389 = "「連湯醫線都是在平原鋪設的線路吶，也難怪八六對地基不穩固的線路不清楚咯」" 

# monologue
# JP: ナインスターズを走らせるため、九洲各所を視察するうち、\n日々姫と僕は、否応なしに理解させられた。
2824 = "為確保九星順利行駛，我和日日姬在九州各處考察，同時自然就深刻地理解到了這一點。" 

# monologue
# JP: 大廃線を越えてなお生き残っている路線の中にさえ、\n軟弱地盤に苦しめられる箇所が少なくないことを。
2658 = "即便是熬過了大廢線存留至今的線路中，深受地基不穩固所苦的也不在少數。" 

# 【ハチロク】
# display as 八六
# JP: 「地盤が軟弱であるのなら、軽いレイルを敷き。\nそのレイルが耐えられる、軽い列車を走らせるしかない」
2032 = "「地基若是不穩固的話，就只能鋪設輕質的鐵軌。更是只能讓鐵軌能夠承載的輕量列車行駛」" 

# monologue
# JP: 言って、ハチロクは視線を上げる。\n視線の先の2101――国繋号は、無論、なんの返事もしない。
2952 = "邊說，八六邊抬頭仰望。而八六眼中的２１０１——國系號，當然不會給她任何答案。" 

# 【ハチロク】
# display as 八六
# JP: 「このこが全力で走れる線路は……左様ですね。\n日ノ本の隅々にまでは、とても敷き得なかった」
2350 = "「讓這孩子能夠全力行駛的線路……的確，若是在全日本國各地鋪設的話，著實是難於上青天」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2066 = "「就是這樣啊」" 

# monologue
# JP: 事実関係を一度掴めば、さすがそこからの理解が早い。\n僕のつたない答え合わせは、もはや必要ないだろう。
2675 = "只要確定了一個事實基點，其後的理解自然就很快了。而我這稚拙的答案，看來也全無必要一一說出來了。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、狭軌やむなしの日ノ本における鉄道発展の\n最適解は……動力分散方式――電車方式での、発展」
2145 = "「所以基於無奈選擇了窄軌的日本國鐵路若要進一步發展，那麼選擇動力分散為特點的電車，便是最佳方案了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。機関車に動力と重量を集中させるより、\n編成内に分散させる\x%l電車;#00ffc040;電車%l;#;の方が、線路負担は軽く済む」
2232 = "「沒錯，較之將重量和動力都集中在機車一處，將重量與動力分散在整個編組內的\\x%l電車;#00ffc040;電車%l;#;對線路的負擔顯然更輕」" 

# 【志寰】
# display as 志寰
# JP: 「と、仲国国鉄も見込み、発展を期待していたそうです。\nけれど、大廃線が全てを大きく狂わせてしまった」
1882 = "「仲國國鐵似乎也意識到了這一點，並靜待其發展成熟。但突如其來的大廢線，徹底打亂了全盤計劃」" 

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本にとどまらず、\x%l電車;#00ffc040;電車%l;#;発展が見込まれた国々では\n例外なく、エアクラが大きく伸長しましたから」
2292 = "「而且不只日本國，看好\\x%l電車;#00ffc040;電車%l;#;發展的諸多國家都無一例外，被空凝機大舉占領了市場」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そっか！　そいばそーよね。\nエアクラは軽ぅく作れるけんね」
1981 = "「啊！對哦！說來也是呢。空凝機很容易做得很輕便啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1966 = "「唔」" 

# monologue
# JP: 驚くべきは、志寰君と西瓜の広い見識だ。\n他国の鉄道事情にここまで通じているとは――いや――
2742 = "志寰與西瓜見識之廣著實令人驚嘆。對別國的鐵路知識竟如此廣泛——等等——" 

# 【双鉄】
# display as 雙鐵
# JP: 「失礼でなければ、もうひとつ聞かせてほしい。\n志寰君のご父君は、何故そこまで詳細に帝鉄の分析を」
2315 = "「若不介意，我還想再問一個問題。志寰，不知令尊為何會如此詳細地分析帝國鐵路呢？」" 

# 【志寰】
# display as 志寰
# JP: 「父は、仲国国鉄を支えるべき次期機関車の、\n開発・選定に深く関わった、試験機関士でした」
2055 = "「家父是與仲國國鐵下一代主力機車開發、選型密切相關的試車員」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1975 = "「啊！」" 

# monologue
# JP: 試験機関士――聞いた瞬間、\n赤井運転士の姿が脳裏に浮かぶ。
2904 = "試車員——聽到這個詞的瞬間，赤井駕駛員的面容就浮現在我的眼前。" 

# monologue
# JP: それがどれ程の博識と勤勉さとを求められる仕事なのかを、\n赤井運転士はまさしく、体現によって教えてくれた。
2954 = "那是一個多麼需要見多識廣勤勉好學的職位，赤井駕駛員可謂是給了我們一個完美的詮釋。" 

# 【西瓜】
# display as 西瓜
# JP: 「老師ご自身が次期主力として一番に望んだ構想もまた、\n全線電化と\x%l電車;#00ffc040;電車%l;#;形式での高速・大量輸送だったそうです」
2084 = "「師父本人最看好的下一代主力車型方案，好像也是基於全面電力化的高速大運量\\x%l電車;#00ffc040;電車%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど。それゆえ日ノ本を、\n主たる研究・調査の対象としていたわけか」
1575 = "「……原來如此。所以才以日本國為主要的研究調查對象啊」" 

# monologue
# JP: 納得できた僕と裏腹、\n西瓜は急に、なんともあいまいな顔になってしまう。
2680 = "可與恍然大悟表示理解的我相反，西瓜的表情卻突然顯露出了些許微妙的猶豫。" 

# 【西瓜】
# display as 西瓜
# JP: 「けれど……精査の末に採用されたのは、[ろこく,1]魯国の技術を\n下敷きにした、東富４型――西瓜たちの機関車でした」
2241 = "「然而……調研的結果最終定案為採用俄國技術框架的東富４型——也就是我們的機車了」" 

# monologue
# JP: 大廃線により開発停止も選考に影響したのだろうか。
2684 = "因大廢線而停止開發似乎也影響了選型。" 

# monologue
# JP: そこから生じた結果は確かに……\n皮肉ともいえるような奇縁だろう。
2835 = "由此而得出的結果……倒真是略顯諷刺的奇妙緣分了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君のご父君の願いが叶わなかったがゆえ――\n西瓜は誕生できたわけだな？」
2222 = "「正因為志寰父親的願望最終未能實現——西瓜才能夠誕生，是這樣吧？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。\x%l電車;#00ffc040;電車%l;#;形式がもしも採用されていたなら、\n西瓜はこの世にいませんでした」
2200 = "「是的。如果當時採用了\\x%l電車;#00ffc040;電車%l;#;方案的話，西瓜就不會誕生在這個世界上了」" 

# monologue
# JP: チラ、と西瓜の黒い瞳が志寰君の顔を眺める。\nけれども志寰君は、西瓜の視線に気づかぬようだ。
2912 = "說到這裡，西瓜轉動黑色的眼睛，望向了志寰。而志寰，卻似乎全未注意到西瓜的視線。" 

# 【志寰】
# display as 志寰
# JP: 「そのようにして完成された試作機が、\n西瓜の[とうふうよん,2]東富4　[にせん,3]2000――東富4の試作第一号機です」
2297 = "「而後完成的測試車，就是西瓜的東富４　２０００——也就是東富４型的第一號測試機車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　2000番が試作機の番号なのか――\nあ、いや」
2425 = "「２０００號竟然是測試車的編號嗎——哦，慢著」" 

# monologue
# JP: 思い当たって口を噤めば、すぐにハチロクも察し、微笑む。
2841 = "發現不妥我趕忙收住了話語，而察覺到了的八六也只是回以微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。トップナンバーが8620のわたくしと、\n大した差異もございませんでしょう」
2274 = "「確實會有這樣的情況啊。首車編號就是８６２０的我，其實也算是相差無幾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみればそのとおりだ。しかし……そうか。\n西瓜は、試作機レイルロオドだったのか」
2388 = "「這麼一說倒也沒錯。不過……對哦。西瓜原來是測試車的鐵路人偶啊」" 

# monologue
# JP: こくり、小さく西瓜が頷く。
2887 = "西瓜輕輕地點了點頭。" 

# 【西瓜】
# display as 西瓜
# JP: 「『悉究。悉究』。\nもともとは、老師の口癖でした」
1552 = "「“悉究，悉究”。這原本是師父的口頭禪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『物事の成り立ちを、その始めから考えることが重要』\n……という意味合いだったか」
1548 = "「“對事物的理解最重要的是理清來龍去脈，直達最深層次的根源”……這樣理解不知是否正確」" 

# monologue
# JP: 自らの希望は叶わず。それでも真摯に、東富4 2000号機と\nレイルロオド・西瓜とに向き合った――
2659 = "即便自己的希望最終落空，他卻仍然對東富４　２０００號機車，對其鐵路人偶西瓜以誠相待——" 

# monologue
# JP: 志寰君のご父君の『悉究』が正しく身を結んだことは、\n他ならぬ西瓜自身と、志寰君とが示していよう。
2693 = "如今西瓜與志寰所表現出的這份優秀，正是志寰父親的“悉究”所結出的碩果。" 

# 【ハチロク】
# display as 八六
# JP: 「悉究。\nまことに素晴らしい言葉で、考え方であるかと存じます」
2111 = "「悉究。真是美妙的語言，同時也是出色的思考方式啊」" 

# monologue
# JP: ハチロクの声もまっすぐだ。\nだのに何故だか物悲しげに、視線は床へと落ちてしまう。
2620 = "八六的感慨也是發自肺腑。但不知為何語氣中卻有一絲悲涼，視線也沉了下去。" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしが現役でしたころの、最晩年の帝鉄にも。\nそのような考えと行動が、もし定着しておりましたなら」
1585 = "「……在帝國鐵路最末期，我還在服役的那時候，若是這樣的思考與行動方式，能夠成為規定、標准的話」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ～……その頃の帝鉄って、乗客軽視してたんだっけ？\n一に特急、ニに急行。三四がなくて五に乗客、とか」
1992 = "「啊～那個時候的帝國鐵路，聽說是很不重視乘客的來著？“特快優先，快速其次，其他讓路，最後乘客”之類」" 

# 【ハチロク】
# display as 八六
# JP: 「そのようにうそぶいていた者さえおりました。\n既得権益を当然の、そして永続するものだと誤解して」
2401 = "「那時的確是有這樣的不肖之徒。這些人愚蠢地把即得的利益當作理所當然亙古不變」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 1997 = "「嗯……」" 

# monologue
# JP: 仲国に来てからのハチロクが、\nときおりにじませる口惜しさ。
2641 = "到仲國以後，八六話語中不時顯現出絲絲憾意。" 

# monologue
# JP: それは複雑なものであっても、結局は、\n嫉妬や羨望の現れといえるものかと思っていたが――
2556 = "不管其中的原委如何複雜，我原以為最終表現出的，都是嫉妒與羨慕，然而——" 

# 【ハチロク】
# display as 八六
# JP: 「最も、ニイロクと赤井運転士とを見れば。旧帝鉄も\n解体寸前には、ようやく目覚めてくれたとは分かります」
1872 = "「不過，透過二六和赤井駕駛員就能了解，前帝國鐵路到了臨近解體時，總算是幡然醒悟了」" 

# monologue
# JP: ……自分の愛した存在が、崩壊していくその瞬間を、\n支えることも――見届けることさえも叶わなかった。
1520 = "……自己深愛的存在，當它轟然崩塌的瞬間，自己未能給予它支持——甚至連送它最後一程都未能做到。" 

# monologue
# JP: ハチロクの、抑えきれない口惜しさを産み出すものは。\nそうか……そこへの後悔なのか。
2630 = "八六這難以自抑的遺憾，應該是源自對那時的悔恨吧。" 

# 【ハチロク】
# display as 八六
# JP: 「……残念ながら、目覚めるのがあまりに遅すぎた。\nただ、それだけのことなのでしょうね」
1593 = "「……然而非常遺憾，我醒來得實在太晚了。木已成舟，僅此而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。遅くはなかったさ」
1873 = "「不，並不算太晚啊」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
1957 = "「哎？」" 

# monologue
# JP: 理解はすぐさま言葉に変わり、迸る。\n極めて近い後悔を、僕も抱え続けていたゆえ。
2763 = "我把我剛剛理解的內容一一講出。因為在我心中，也同樣存在著與此類似的悔恨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「目覚めて以降の帝鉄が重ねてくれた悉究は、\nニイロクの中に残され、僕らはそれを、受け取れた」
2027 = "「在你醒來之後的現在，帝國鐵路所積累下的悉究，仍然在二六身上發光發熱，而我們則要將它傳承下去」" 

# 【日々姫】
# display as 日日姬
# JP: 「その前の帝鉄が悉究しとった、よかとこだって――\nハチロクから私達、たーくさん受け取っとるでしょ？」
1906 = "「其實之前的帝國鐵路也有悉究和優點啊——我們也從八六身上學到了很多好的東西不是嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1972 = "「啊」" 

# monologue
# JP: ああ――日々姫もだ。\nハチロクの抱える悔しさを、日々姫も同じく受け止めた。
2713 = "對啊——日日姬又何嘗不是。八六心中的悔恨，日日姬同樣也感同身受。" 

# monologue
# JP: ゆえに、僕らの言葉が重なる。\nその後悔は昇華できると、それぞれの声で伝えられる。
2766 = "所以，三人的話語自然匯聚為一。大家想說的是同一句話——這悔恨終將升華。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに帝鉄は解体された。\nけれどもそれでも――レールを、僕らは継がせて貰った」
2081 = "「帝國鐵路解體確實是無可挽回了。但即便如此，其軌道確實被我們繼承了下來」" 

# 【日々姫】
# display as 日日姬
# JP: 「ゆーたらナインスターズだって、古きよき帝鉄と、\n帝鉄が最後に夢見た未来とを、繋ぎあわせたものやけん」
2301 = "「而通過九星這一媒介，帝國鐵路構建的良好傳統，與帝國鐵路最終在夢中所勾勒的未來，也聯繫在了一起」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……」
1971 = "「啊……」" 

# monologue
# JP: 過去から未来へ――そのコンセプトを体現するのは、\n復元された、\x%lクハ26;#00ffc040;クハ26%l;#;－000編成――ニイロクの特急\x%l電車;#00ffc040;電車%l;#;だ。
2707 = "完成修復的\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;－０００編組，二六的特快\\x%l電車;#00ffc040;電車%l;#;，就是“來自過去，奔向未來”這一概念的生動體現。" 

# monologue
# JP: 力強くも美しいボンネット型の車輌が走る姿は僕らに、\n更なる未来図を。実現可能なものと鮮やかに示してくれる。
2726 = "強大而美麗的流線型列車疾馳的身姿，更為我們繪出了前方的藍圖，指明了可以實現的未來。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でした。\nまことに――左様でございます」
2273 = "「確實如此。您說得完全正確」" 

# 【志寰】
# display as 志寰
# JP: 「そして。そのナインスターズから、\n再び僕たちは、学びを得ようとしています」
2299 = "「而我們，也再次從九星中看到了值得學習的地方」" 

# monologue
# JP: 志寰君と、西瓜と目が合う。頷き合う。\nああ、そうだ。
2740 = "志寰和西瓜，相視點頭。哦，對啊。" 

# monologue
# JP: レールがたとえ途切れようとも、離れようとも。\n意思さえあれば、それは何度も、繋ぎあえるのだ。
2661 = "即便鐵軌已不再相接，線路已山水相隔，只要彼此心意相通，即便經歷諸多波折，也終能相連於一處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「全ての過去は、必ず未来への礎にできる。\n思い出すのも嫌なことさえ、バラストに砕き、搗き固め」
2390 = "「過去的所有，都必定是通往未來的基礎。即便是那些不願回憶的事情，也能夠化作我們堅固的道砟」" 

# 【ハチロク】
# display as 八六
# JP: 「はい！」
2205 = "「是的！」" 

# monologue
# JP: 日々姫のペンがささっと動く。
2798 = "日日姬的筆在素描簿上飛舞。" 

# monologue
# JP: 今のハチロクの笑顔を描きとめたのならば、\n僕も、あとで見せてもらおう。
2866 = "若她畫的是八六現在的笑容的話，回頭就問她要來看看吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「やったら、ね？　たーくさん勉強――\nじゃないや！　悉究、しよ？」
2406 = "「那，咱就幹唄？好好學習——啊不對，好好悉究一番吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちが受け継いだレイルを――\n更に先へと、受け渡すため」
2227 = "「正該如此。為將我們繼承到的軌道再傳承給未來的後繼者」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
2003 = "「嗯！」" 

# monologue
# JP: これでいい。仲国に来てからずうっと、どこかギクシャク不安定だったハチロクに、ようやく一本の芯が通った。
2944 = "這樣就好。出發來中國之後一直不太對勁的八六總算又調整對了狀態。" 

# monologue
# JP: 安堵の息が出、背筋が伸びる。
2547 = "一顆心放穩，背脊也挺直了幾分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことで、改めてお願いしたい。この歴史館で\n学び得るものを、できるだけ多く僕らに学ばせてほしい」
2278 = "「綜上所述，還麻煩二位，讓我們儘可能從這博物館中，多多地汲取知識吧」" 

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はい！　右田先生。任せてください！」
2039 = "「好的！右田先生。放心交給我們吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2041 = "「好！」" 

# monologue
# JP: 息も言葉もぴったりだ。
2605 = "兩人的話語都是這麼合拍。" 

# monologue
# JP: さすが西瓜が志寰君の、日ノ本語の先生というだけは――\nああ、いや。
2814 = "果然志寰的日語是西瓜一手教出來的——等一下，不太對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば、二人は志寰君が産まれたときからの\n長い付き合いになるのだな」
2346 = "「說來，自從志寰出生開始，你們就一直在一起了對吧」" 

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はいっ！！」\n「っ！！！」
1945 = "「呃！！！」\\n「是的！！」" 

# monologue
# JP: その事実がもう、嬉しくて誇らしくてたまらない。\n志寰君の素直な笑顔は、眩しいほどだ。
2941 = "這事實，似乎讓志寰開心驕傲到不能自已，而他那質樸的笑容簡直耀眼到無法直視。" 

# 【志寰】
# display as 志寰
# JP: 「西瓜は僕のレイルロオドで。日ノ本語の先生で。\nそうしてそれ以前にずっと！　僕のお姉さんなんです！」
2325 = "「西瓜是我的鐵路人偶，也是我的日語老師，但在還沒有這些關係之前，她就是我的姐姐！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1970 = "「啊——」" 

# monologue
# JP: 大きなベッドに横になる。\nハチロクと日々姫。ふたりに挟まれ、匂いに包まれ。
2756 = "我倒在大大的床上，八六和日日姬把我夾在當中。不只是身體，鼻腔也同樣被兩人身上淡淡的味道包圍了。" 

# monologue
# JP: 異国の宿の床とはいえど、\n家族団欒――その四文字が自然と脳裏に浮いてくる。
2962 = "雖然此刻身處異國他鄉旅館的床上，但“闔家團圓”四個字不由自主地浮現在了腦海裡。" 

# 【ハチロク】
# display as 八六
# JP: 「まこと、双鉄さまは無神経でいらっしゃいます」
2260 = "「真是的，雙鐵少爺實在是太不會說話了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ほーんと。あのあとの西瓜ちゃんのギクシャクったら、\nかわいそうなくらいだったけん」
1942 = "「可不是唄。你看那之後西瓜舉手投足開口講話都尷尬得不行，多可憐你說」" 

# monologue
# JP: であるというのに両端から、言葉と物理の二刀をもって、\n日々姫ハチロクがちくちく僕をつついてくる。
2603 = "兩人不僅嘴不饒人，而且還動起手來，她們前後夾擊，對準我就是一頓亂戳。" 

# monologue
# JP: 『話があるからあがってきて』と、\n呼び出した上でのこの仕打ち、だ。
2666 = "原本以為是被叫上來談話，結果卻落得這副下場。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が何かをやらかしてしまったらしいということは、\nさすがに感じないではなかった」
2125 = "「我也不是木頭做的，說錯話把事情搞砸了還是知道的」" 

# monologue
# JP: 言えばうんうん、二人は頷く。\n柔らかなベッドがそれだけで、僕の体を沈みこませる。
2607 = "兩個人對這話倒是不約而同地點頭。而這時我才總算可以安心地陷進柔軟的床褥裡了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、いつ何をやらかしたのかがさっぱりわからん。\nできれば、そこから教示してもらいたい」
2310 = "「至於那句話為什麼如此不妥就完全不知道了。可以的話還請從這裡開始解釋吧」" 

# 【日々姫】
# display as 八六＆日日姬
# JP: 「はぁ～っ」
1963 = "「唉～」" 

# monologue
# JP: なんと見事なシンクロだ。\n血が繋がらぬでも家族は家族と、微妙に嬉しくなってくる。
2604 = "兩人的態度真是驚人得一致。雖說並無血緣關係，但一家人就是一家人，一點開心的感覺隨之湧上心頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君と西瓜もだったが、\nなかなか日々姫とハチロクも」
2102 = "「志寰和西瓜也就算了，連日日姬和八六也反應這麼大」" 

# 【日々姫】
# display as 八六＆日日姬
# JP: 「それでございます」\n「そこっ！」
1993 = "「問題就在這！」\\n「正是如此啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおっ！？」
1960 = "「哦！？」" 

# monologue
# JP: 両方向から同時に鋭い叱咤の声。\nなのだが……僕にはまだ掴めない。
2768 = "斥責從兩邊同時傳來。但我仍然搞不清情況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それとは何で、そことはどこだ」
1890 = "「你們指的到底是什麼啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけーん！　西瓜ちゃんと志寰君の関係のこと！」
2393 = "「還問是什麼！不就是西瓜和志寰的關係嘛！」" 

# 【ハチロク】
# display as 八六
# JP: 「そこは、さすがに……\n容易に口に出すべきではなかったのではないか、と」
2380 = "「這個話題，再怎麼說……也不能這麼隨隨便便就直接開口吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1968 = "「唔！？」" 

# monologue
# JP: 何故だ。\n僕がしたことといえば……
2942 = "這又是為什麼？要說我說過的話……" 

# monologue
# JP: ……西瓜と姜さんの関係については尋ねるのを控えたし。\nあとは単なる、明白すぎる事実の再確認をしたにすぎない。
1514 = "……想問西瓜和姜小姐關係的想法被我壓下去了。剩下的，應該只是確認一些顯而易見的事實而已。" 

# 【日々姫】
# display as 日日姬
# JP: 「……わかってなかと？　なかとよね？\nにぃにやもんね。しかたなかとねー」
1600 = "「……這都不懂？真不懂假不懂啊？阿哥啊，真是說你什麼好」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまにこの類のことをご説明申し上げるのは、\nいささか骨が折れそうです」
2337 = "「要跟雙鐵少爺解釋這類事情，感覺真是要費個九牛二虎之力了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……」
1967 = "「唔唔……」" 

# monologue
# JP: 反論したいが、ハチロク日々姫。\nまさしく身内の二人がこうも一致している。
2961 = "雖然想要開口辯解，但偏偏八六和日日姬這兩個我最親的人竟如此意見一致的話……" 

# monologue
# JP: ならばやはり、僕になんらかの失点、\nないし、見落としがあるということだろう。
2955 = "那看來就的確是我哪裡做得不對，或是哪裡有所疏忽了吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「西瓜ちゃんの志寰君への接し方みとって。\nにぃには、なーんも感じんかったと？」
2329 = "「西瓜與志寰相處時的言行舉止，阿哥你瞅在眼裡，就一點感覺都沒有是怎樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、とても嬉しそうだと感じた。言葉を交わしたり、\n信頼を示されたり。そうしたひとつひとつのことが」
2379 = "「這個嘛，能看得出她很開心啊。不管是言談，還是舉手投足中表現出的信任，這從諸多細節上都看得出啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいばわかって――って……あー。\nわかっても、うん。額面通りなんよね、にぃに」
2162 = "「既然這些你都明白——不對，光知道這個還不行啊。阿哥，你怎麼就瞅得這麼表面呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「額面通りではいかんのか？\n――ああ、ならば、なにか裏がある？」
1870 = "「不能光看表面嗎？——啊，那莫非還暗藏了什麼我沒發現的？」" 

# 【日々姫】
# display as 日日姬
# JP: 「裏っていうたらアレばってん……ん～」
2387 = "「這還有什麼暗藏不暗藏的……唉～」" 

# 【ハチロク】
# display as 八六
# JP: 「では、双鉄さま。西瓜は全く同じでしたでしょうか？\n姜様と接しているときと、志寰様に接しているときとで」
2404 = "「那雙鐵少爺，您再想想看，西瓜在面對姜小姐的時候，和面對志寰時，表現得完全一樣嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ！」
# 1975 = "「啊！」" 

# monologue
# JP: なにやら、日々姫が感心している。\n『その手があったか』といわんばかりに。
2789 = "日日姬不禁驚叫出聲，臉上的表情彷彿在說，“原來還有這一招啊”。" 

# monologue
# JP: ならば僕も、なんとなくで答えるべきではないだろう。\n目を閉じ、慎重に思い返して…………ふむ。
2771 = "既然這樣，看來這個問題我也馬虎不得了。我閉上雙眼，謹慎仔細地回憶…………嗯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「違いはあるな。志寰君に対するときの方が、\n西瓜は、うむ……なんというか、反応が過敏に思えた」
2272 = "「確實不太一樣。在面對志寰的時候，西瓜，嗯……總覺得她的反應有些敏感過頭了」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん！　そぎゃんと！！」
2068 = "「就這裡！就是這一點！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。志寰君と接するときには、表情よりもよほど\n豊かに、西瓜のおさげが、揺れたり踊ったりもしていた」
2188 = "「是吧。在面對志寰的時候，表情比別的時候都豐富，她的辮子也舞動得比平時活潑得多」" 

# 【日々姫】
# display as 日日姬
# JP: 「よね！？　嬉しか気持ちを顔で必死に隠そうとして。\nだけど体がぴょこっ！ て動いちゃうみたいな感じで！」
2060 = "「對唄！？就是拚命把開心憋在心裡不要顯露在表情上。但身體卻很老實，把那點心思全都表現出來了！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
2016 = "「嘻嘻」" 

# monologue
# JP: やわらかにハチロクは微笑んで、\nけれどもすぐに真面目な顔で、まっすぐまっすぐ僕を見る。
2627 = "八六輕輕地笑了。但轉眼就又以認真的表情直勾勾地盯著我。" 

# 【ハチロク】
# display as 八六
# JP: 「その度に、です。双鉄様。\n瞬時、共感が遮断されるのです」
2415 = "「雙鐵少爺，每當這樣的時候，她就會瞬間切斷和我的共鳴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「共感が遮断される？　何故だ？」
1912 = "「切斷共鳴？為什麼呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「さぁ、何故でしょう。例えば、そう……\n路子様と双鉄さまでは、いかがでしたか？」
2378 = "「這個嘛，到底是為什麼呢。比方說……雙鐵少爺和路子小姐之間是怎樣的呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らのときか」
2133 = "「我們那時候啊」" 

# monologue
# JP: 日々姫が一瞬、ぎくりと固まってしまったが、\n僕は……うん、完全に平静だ。
2801 = "日日姬聽到這話題，一下子僵住了，而我……倒是平靜得不行。" 

# monologue
# JP: 路子が生きて、隣にいたころ――\nあのころのことを、ただ懐かしく、思い出せてる。
2929 = "路子還在世，與我形影不離的時候——如此回憶起那時的種種，還真是覺得相當懷念。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子に対してこころを閉ざすことはほとんどなかったが\n……あ、いや、失敗など、隠し事をしたいときには……」
2061 = "「對路子封閉心聲的情況基本上沒有啊……哦，也不是，要是什麼事失敗了，或是有小秘密的話……」" 

# monologue
# JP: ……隠し事……西瓜もあるいは隠していたのか。\n志寰君と触れ合うたびに、にじみ出る喜びを。
1512 = "……小秘密……西瓜或許也算是在掩飾吧，掩飾她每次面對志寰時內心難以抑制的喜悅。" 

# monologue
# JP: それがかえって、あの特徴的なおさげの動きを\n目立たせてしまっていたようにも……なるほど、思える。
2826 = "然而這卻反而讓她辮子那頗具特色的躍動，變得格外引人注目……原來如此，這就說得通了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「共感遮断は、志寰君と触れ合う喜びを感じていることを、ハチロクに伝えたくないと思ったゆえ、か？」
1911 = "「切斷共鳴，是不想讓把她在面對志寰時心裡的喜悅之情讓八六知道……吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「“わたくしに”と申しますより、わたくしに知られ、\nそれが“誰か”に伝わることを恐れたから、では？」
2229 = "「比起“讓我知道”，恐怕真正擔心的是讓我知道以後，再告訴“某人”才對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その“誰か”とは？」
2377 = "「這個“某人”又是誰呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「わからん？　にぃに。よぉ考えて？」
2376 = "「這你不知道？阿哥你好好想想？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
1965 = "「唔……嗯」" 

# monologue
# JP: ハチロクは除外。日々姫と僕も、西瓜と出会ってまだ\n間もない。候補から外しても問題なかろう。
2624 = "八六肯定排除。日日姬與我和西瓜才認識沒多久，自然也可以不用考慮吧。" 

# monologue
# JP: 姜さんは途中から不在だったし、残るは志寰君一人……\nん？　あ……ああ、そうか！　そうなのか！！
2858 = "而姜小姐中途就離開了隊伍，剩下的就只有志寰一個……嗯？啊……哦，是這樣啊！原來是這樣嗎！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどわかった。\n西瓜は志寰くんに、恋愛感情を抱いているのか」
1927 = "「原來如此我懂了。西瓜是對志寰有著愛慕之情啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク！」
1901 = "「八六！」" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫！！」
2177 = "「日日姬！！」" 

# monologue
# JP: やりとげた、と言わんばかりの視線が、言葉が、\n僕を通り越し交換される。
2608 = "兩個人隔著我交換了一下眼神，就差大聲說“總算讓我開竅了”。" 

# monologue
# JP: ……まぁ、確かに。かつての僕なら何をどのように\n考えようが、達し得なかった結論だろう。が――
1511 = "……不過也的確，若是放在從前的話，即便我想破腦袋怕是也想不到這一點吧。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだとしてもわからない。\n一体、僕がなにをやらかしてしまったのだ」
1884 = "「但我還是有一點不明白。我到底把什麼給搞砸了呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「んとね？　にぃに。\n恋する女の子って、相手の気持ちば、気になるの」
2141 = "「我說啊，阿哥。戀愛中的少女啊，可是非常在意對方的想法的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2002 = "「嗯」" 

# monologue
# JP: 日々姫の声は真剣だ。
2799 = "日日姬的聲音無比認真。" 

# monologue
# JP: 起き上がり、背筋を正して聞きたく思うが、\nそうすることも、何故だか今ははばかられる。
2925 = "起身正坐洗耳恭聽的念頭浮現在腦海之中，但不知為何剛想動就又猶豫了。" 

# 【ハチロク】
# display as 八六
# JP: 「何より知りたいことなのに、知るのが一番怖いこと。\nですので知るなら、自らの行為によって知りたいのです」
2113 = "「想知道想知道想知道得不得了，但又非常害怕真的知道。所以真要知道，也必須是自己親自找出答案才可以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そういうものか」
1601 = "「……還有這種說法啊」" 

# 【ハチロク】
# display as 八六
# JP: 「そういうものか、と思います。わたくしの知識も、\n恋愛小説や少女マンガ等からの学習にすぎませんけれど」
2140 = "「我認為應該是這樣的，雖然我的這些認識也都僅僅來源於戀愛小說，以及少女漫畫」" 

# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「あはは」\n「ふぅむ」
1973 = "「啊哈哈」\\n「唔」" 

# monologue
# JP: 相手の気持ちを知る行為とは、つまり告白のことだろう。\n相手の気持ちを知りたいがゆえ、決意を固め告白をする。
2896 = "親自找出答案，也就是告白吧。下定決心開口告白，之後再讓對方告知心中的真意。" 

# monologue
# JP: その欲求はごく当然のものに思えて、\n僕にも素直に頷け……る……うむ？
2945 = "這樣的想法自是合理至極，我也不禁點頭贊……同……嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕は。そこをやらかしてしまったわけか？\nつまり、志寰君に――」
1989 = "「啊，所以說我是把這一步給搞砸了嗎？也就是讓志寰——」" 

# 【日々姫】
# display as 日日姬
# JP: 「言わせちゃったでしょー！　\n『お姉さん』だとか！　はっきり！！」
2154 = "「把他的想法給說出來了不是！“姐姐”什麼的，幾乎是毫不猶豫脫口而出！！」" 

# 【ハチロク】
# display as 八六
# JP: 「可愛そうに、西瓜。\nあのあとの動揺と落ち込みようときたら……」
2328 = "「西瓜真可憐。從那之後就是一副魂不守舍的樣子看起來都心疼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに――志寰くんとの距離が妙に遠くなったし、\nおさげも殆ど踊らなくなったとも思えたが――」
2253 = "「的確，她和志寰的距離微妙地拉遠了一些，辮子也只是無精打采地垂著了——」" 

# monologue
# JP: しかし、しかしだ。
2679 = "可是，但是。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『お姉さん』という評価は、家族ということだろう。\nそれは、最高の親しみではないかと」
1546 = "「“姐姐”這個評價，就是家人的意思吧。這不是最親近的關係嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「家族の好きと、異性の好きとは別物ばい！！」
1996 = "「喜歡家人跟喜歡異性那能是一回事嗎！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1984 = "「啊！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫、ここはホテルですよ」
2179 = "「日日姬，這裡可是旅館哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1975 = "「啊！」" 

# monologue
# JP: 日々姫がしまったという顔をして、\n両手で大きく口を押さえて――
2803 = "日日姬臉上的表情彷彿在說“不好”，同時伸手蓋在了自己嘴上——" 

# monologue
# JP: そうして、視線で、\nハチロクに感謝の気持ちを伝える。
2719 = "就這樣只用眼神向八六表達了謝意。" 

# 【ハチロク】
# display as 八六
# JP: 「かまいませんよ。わたくしたちは、家族で、仲間。\n――で、ございましょ？」
2234 = "「沒關係。我們畢竟是家人，是伙伴——你說對不對？」" 

# 【日々姫】
# display as 日日姬
# JP: 「……うんっ」
1581 = "「……嗯」" 

# monologue
# JP: 日々姫の強い頷きに、ほっとしたような息を吐き。\nそして再びハチロクは、静かに、僕に教えてくれる。
2794 = "日日姬用力點了點頭，長出了一口氣。而後八六便繼續平靜地向我解釋。" 

# 【ハチロク】
# display as 八六
# JP: 「恋する乙女は、こころを[ちぢ,1]千千に乱すのです。\n言われたこと、されたこと。全てに意味を求めるのです」
2120 = "「戀愛中的少女啊，心思是剪不斷理還亂。心上人的言談舉止看在眼裡聽在耳中，都會覺得其中另有深意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そういうものか」
1577 = "「……原來是這樣嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「意味なんかないってわかってたって、考えちゃうの。\n好きだから――ヒントにしたいって思っちゃうの」
1925 = "「即便明白其實並沒什麼深意，但就是控制不住自己的思緒。就是因為喜歡，所以想從各種地方找出蛛絲馬跡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、な」
1926 = "「原來如此……啊」" 

# monologue
# JP: 異性として、西瓜が志寰くんを求めていると仮定するなら、\nなるほど、確かに全てが繋がる。
2868 = "若是假定西瓜以異性的角度愛慕志寰的話，嗯，的確全都說得通了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、志寰君の『お姉さん』ではいたくないわけか」
2152 = "「所以說西瓜是不想讓志寰把她視為“姐姐”嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「いたくないわけじゃないと思う。\n『お姉さんなだけ』じゃ、辛いってだけで――きっと」
2119 = "「應該也不是說不想。但如果說志寰“只當她是姐姐”的話，那就指定是老傷心了吧」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも同様に感じます。家族であることと恋とが、\nもしも両立できるのならば――両立させたい」
2129 = "「我也有同感。如果親情和愛情可以兩全的話，那兩全自是上上之選」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……西瓜の望みがそこであるなら――うむ。\n志寰くんの、『お姉さん』宣言は……堪えるものか」
1587 = "「……如果這便是西瓜的願望……嗯，志寰這句“姐姐”，就的確是很難接受了」" 

# 【ハチロク】
# display as 八六
# JP: 「共感を隠しきれぬほど――堪えていましたね」
2400 = "「那時她內心之沮喪——甚至都難以控制自己的共鳴」" 

# 【日々姫】
# display as 日日姬
# JP: 「あれば、相当にキツかとよ」
2092 = "「心裡肯定老難過了」" 

# monologue
# JP: 強い、説得力を感じる。\n同時に……いささかの自己嫌悪も。
2948 = "這由不得我不認同。而同時……心裡泛起了一絲對自己的厭惡之情。" 

# monologue
# JP: 成長し、人のこころを多少は僕もわかってきたかと、\n感じ始めてもいたのだが――
2811 = "本以為自己有所成長，變得懂得去體諒別人的心境了，沒想到卻還是這個樣子——" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり僕は、無自覚に、西瓜の心に踏み込んで、\nあまつさえかき乱してしまったわけか」
1877 = "「也就是說我在不知不覺間傷害了西瓜的感情，還給她平添了許多煩惱嗎」" 

# monologue
# JP: 理解できれば、納得できるし反省できる。\nたとえ相手がレイルロオドとそのマスターであろうとも…
2832 = "理解了原委，就可以認同並自我反省了。即便對方是鐵路人偶與司機，也不能夠作為藉口。" 

# monologue
# JP: 『他者の生い立ち』――そこに安易に踏み入ることは、\n当然控えるべきだった。
1503 = "“別人的過往”——顯然這不是應該隨意踏足的領域，謹言慎行自是理所應當。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕の失敗を指摘し、教えてくれて、ありがとう」
1602 = "「……非常感謝你們指明我所犯下的過錯」" 

# 【日々姫】
# display as 日日姬
# JP: 「いや！？　そんなっ、\n失敗っていうほどのことじゃなかけん」
1913 = "「別呀！？不至於，這還不至於算是過錯吧」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。実害が生じたわけでもございませんし」
2224 = "「正是如此。畢竟也還沒有造成實質性的損失」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても大いに助かった。注意を受けずにいたのなら。\n明日以降、またやらかしていたかもしれん」
1886 = "「但至少造成了不好的影響。若不是有你們提醒，怕是明天，甚至於之後，我還會再搞砸吧」" 

# monologue
# JP: きっぷを取り出す。
2761 = "我從口袋裡掏出了車票。" 

# monologue
# JP: 志寰君から渡された、明日のきっぷ――\n姜さんが預けてくれていた、きっぷを。
2943 = "這是由姜小姐安排，經志寰之手交給我們的明天的車票。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ぜっとよんじゅうきゅう,2]Ｚ４９列車。11時28分北琴西駅発、翌08:39　[せいと,1]聖都駅着。\nほぼ丸一日を、彼らと一緒にすごすのだから」
2433 = "「Ｚ４９次列車。１１點２８分於北琴西站發車，次日８點３９分抵達盛都站。幾乎要和他們在一起一整天啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あーうん。そうよね。知っとっても、注意ばしとっても\n……私達だって、ちょっとどぎゃんしたら良かとか」
1987 = "「啊，嗯。可不是。可是光是知道，光是注意也不好吧……我說咱們是不是應該整那麼一下」" 

# 【ハチロク】
# display as 八六
# JP: 「まこと。むつかしいところでございますよね」
2258 = "「真是的，日日姬又在強人所難了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nふたりはなにか、西瓜から希望を聞いているのか？」
2012 = "「嗯？我說你們兩個，西瓜有向你們開口嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「希望って？」
2407 = "「開什麼口？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、志寰くんとどうなりたいとか。\nそのためになにか協力してほしいとか、そうした希望だ」
2064 = "「就是想要和志寰怎麼怎麼樣啊。她有讓你們幫她什麼忙嗎」" 

# 【日々姫】
# display as 八六＆日日姬
# JP: 「あ」
# 1972 = "「啊」" 

# monologue
# JP: 二人の声と視線とが、また僕の上を通り過ぎ、交わる。
2606 = "兩個人又隔著我交換了一下眼神。" 

# 【ハチロク】
# display as 八六
# JP: 「まったく、伺っておりません」
2050 = "「完全沒有」" 

# 【日々姫】
# display as 日日姬
# JP: 「私も、なんにも」
2126 = "「我也什麼都沒聽她說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であらば、どぎゃんもこぎゃんもなかろう。\n普段どおりに。特別なことはなにもせぬようすれば良い」
2163 = "「既然這樣，那自然不該擅自瞎整了。只要像平常一樣，完全不用特地做什麼就好」" 

# 【日々姫】
# display as 日日姬
# JP: 「よね、うん」
1876 = "「也對，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもなにかを西瓜に、あるいは志寰君に頼られたなら、\nそのときに改めて、どうするのかを考えれば十分だろう」
2043 = "「如果西瓜，或者是志寰開口了的話，到時再去考慮該怎麼做就是了」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし――ああ、恥ずかしい。\nつられてしまい、どこか舞い上がっていたようです」
2122 = "「我……啊，真是面目無光。看來我受到氣氛的影響，有些忘乎所以了」" 

# monologue
# JP: じたっと、ハチロクが身動ぎをする。\nまたも小さくベッドが揺れて、体がほんのわずかに跳ねる。
2622 = "八六羞得在床上小腳踢個不停，床也隨著輕輕地搖了起來，連我都感覺到了床褥的起伏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕とて同じだ。視察とはいえ、初めての異国で――\n真闇姉の不在こそは残念だけれど、家族旅行でもある」
2134 = "「我又何嘗不是。雖說是考察，但畢竟是第一次出國——雖然真闇姐不在有些遺憾，但這其實也是一家人的旅行啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2002 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2204 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「舞い上がらないわけがない。ならば、舞い上がった上で\n見える景色を――逃さず捉えればそれでよかろう」
2091 = "「心情興奮也是在所難免。那就索性不要限制想像力的翅膀，但同時也要把所見的景色巨細無遺地記下來就好了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん！　そぎゃんする」
2005 = "「嗯，就這麼整唄」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ。やはりお話はいいものですね。\nこころのさまざまなモヤが、スッキリと晴れた思いです」
2017 = "「嘻嘻，交談果然是件開心的事啊。心中的各處鬱結，都豁然開朗了」" 

# monologue
# JP: 甘えるように、ハチロクの小さなてのひらが近づいてくる。
2594 = "似乎是在撒嬌一般，八六把她那小小的手朝我伸了過來。" 

# monologue
# JP: 求められているものがすぐわかる。\nゆえにその手に、そっときっぷを握らせてやる。
2946 = "這樣的請求實在是太顯而易見，我便毫不猶豫地將車票放進了她的手心。" 

# 【ハチロク】
# display as 八六
# JP: 「はじめての、仲国の列車。Z49列車。\n[こうがしゃ,2]硬臥車……三段寝台をお手配いただけたのですね」
2132 = "「我們即將初次乘坐的仲國的列車，Ｚ４９次列車，硬臥車……應我們的要求安排了三層床鋪車廂的車票啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば、めちゃくちゃありがたかとよ！\n個室じゃ視察もなにもなかけん」
2381 = "「這可真是太感激了！包廂的話可就沒辦法兒好好觀察咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、完全に希望通りを手配してもらえた。\nありがたいことだ」
2193 = "「是啊，完全照我們的要求安排的，真是太感謝她了」" 

# 【ハチロク】
# display as 八六
# JP: 「聖都……」
2254 = "「盛都……」" 

# monologue
# JP: ハチロクの指がそうっと、きっぷの表面を撫ぜる。
2612 = "八六伸出手指，輕撫著車票。" 

# 【ハチロク】
# display as 八六
# JP: 「美しい名前の街ですが、\n果たして、どのようなところなのでしょう？」
2382 = "「這城市的名字真美。不知會讓我們領略到怎樣的風光呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「私は知らんと。にぃにはどぎゃん？」
2123 = "「我不知道唉，阿哥咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知らぬが、いくつかはわかっている」
1908 = "「具體我也不清楚，不過大體還是知道一點」" 

# monologue
# JP: なにせ、あの姜さんが、西瓜と志寰君と一緒になって、\n“僕らの希望を汲んで”手配してくれたきっぷゆえ。
2891 = "要說為什麼的話，姜小姐和西瓜還有志寰，既然完全按我們的要求安排了車票，那……" 

# 【双鉄】
# display as 雙鐵
# JP: 「北琴の人たちが好んで訪れる、\nメジャーな旅行先のひとつで――」
2308 = "「肯定是北琴人喜歡去的，熱門旅遊城市之一——」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！」
# 1975 = "「啊！」" 

# monologue
# JP: ハチロクが笑う。\n幸せそうに、楽しげに。まさしく浮かれた顔をして。
2631 = "八六開心地笑了，那笑容滿溢著幸福與快樂，對明天的旅途充滿了期待。" 

# 【ハチロク】
# display as 八六
# JP: 「そうしてそこには、\n蒸気機関車が待っているのでございますね！」
2294 = "「而且，那裡想必也有蒸汽機車在等著我們吧！」" 
