1826 = "「嘻嘻，要不要也挑一張送西瓜呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「！」
# 2142 = "「！」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1755 = "「啊」" 

# monologue
# JP: 浮かれたか、日々姫。\nあれほどに余計なことは言うなと僕に言っておいて――
2625 = "日日姬真是太得意忘形了。昨晚都那樣反覆強調不要多說多錯了——" 

# 【西瓜】
