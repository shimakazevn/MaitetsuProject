2736 = "西瓜輕輕向著志寰靠過去，不停地朝著他手裡瞄著。" 

# 【志寰】
# display as 志寰
# JP: 「すごいな。いろんな西瓜が描かれてる。\nラフな絵なのに、かわいさが閉じ込められてるね」
