[script]
# lines: 455 
# 【ハチロク】
# display as 八六
# JP: 「ああ、なんと懐かしく、\nなんと嬉しいことでしょう！！！」
1791 = "「啊，這真是何等令人懷念，並且讓人欣喜萬分！！！」" 

# monologue
# JP: 三段寝台を目の当たりにするなり、感極まったような声。
2661 = "當三層床鋪真的映入眼簾時，八六的這聲驚嘆中委實蘊含了太多的感慨。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、\n一度でいいから寝台車での旅をしてみたかったのです」
1991 = "「真的，一直以來我都希望能夠乘坐臥鋪出門旅行一次」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\n一度も経験がないというのは、意外だな」
2083 = "「這真是出乎意料。沒想到八六竟然真的一次都沒坐過嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「珍しいことではございませんよ？\nレイルロオドの客車乗車自体が稀ですし」
2080 = "「這應該不是很奇怪的事情吧？鐵路人偶乘坐在客運車廂裡的機會本就很少了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。言われてみればそうだったか」
1740 = "「哦，你這麼一說倒確實是這麼回事」" 

# 【ハチロク】
# display as 八六
# JP: 「それに、寝台客車は……わたくし、帝鉄時代には、\n牽引したことさえございませんでしたので」
2007 = "「而且要說臥鋪車的話……至少我在帝國鐵路時代連掛接過的經歷都沒有」" 

# 【西瓜】
# display as 西瓜
# JP: 「昼行列車だけしか牽引しなかったのですか？」
1837 = "「執行的全都是日間列車的牽引任務嗎？」" 

# monologue
# JP: 西瓜の驚いたような声。\nとなればかなり、例外的なことなのかもしれん。
2729 = "西瓜的疑問中帶著一絲驚奇。依此看來，那應該是相當非比尋常的情況吧。" 

# 【ハチロク】
# display as 八六
# JP: 「夜行列車なら牽くこともございました。\nですけれど残念なことに、寝台客車とはご縁がなくて」
1903 = "「我也是有牽引過夜間列車的。但非常遺憾，我所牽引的車次始終都和臥鋪車無緣」" 

# monologue
# JP: ハチロクの視線が上へ向く。\n最上段を、眩しいもののように見上げている。
2348 = "八六說著又向上抬起了視線，仰望最上層臥鋪。她眼睛略略眯起，就如直視耀眼之物一般。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、全く知らないのです。\n寝台の寝心地も、あたたかさも、夜の静けさも」
1923 = "「所以，我其實對臥鋪車幾乎一無所知——不管是睡起來的感觸，還是床鋪的溫暖，以及夜裡的那份寂靜，都未曾經歷」" 

# 【西瓜】
# display as 西瓜
# JP: 「夜は、確かに静かです。\n消灯後には、本当に誰一人、言葉を発しなくなります」
1963 = "「晚上的確是很安靜的。熄燈之後，真的就完全沒有人說話了」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……でしたら、カタン、コトンと。\nただこのこだけが歌い続けるのですね？」
1734 = "「哦……那就是只剩下這孩子“喀嗒轟隆”的歌唱聲了是嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「そうなります。けれど、他の点はきっと少し想像と」
1839 = "「基本上是這樣了。不過具體細節可能和你想的還是不太一樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　これが三段寝台！？　低かね！　天井！\n座ってるだけでも窮屈そう――っていうか座れない！？」
1724 = "「哇！這就是三層床鋪哦！？鋪位的高度好低哎！坐在裡面也很憋屈——不對，這好像坐不起來吧！？」" 

# monologue
# JP: 日々姫だ。\n先日の反省を活かしたらしい。
2699 = "聽聲音就知道是日日姬上車了，看來她確實是有好好反省過了。" 

# monologue
# JP: 姜さんと志寰くんとを引き連れて、\nしかも極めて短時間で、スケッチを終えて戻ってきた。
2413 = "在姜小姐和志寰的陪同下，她在極短的時間內畫好了素描，來到了車上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「描けたか？」
1976 = "「畫好了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「描けたと！　東富4D！！\n西瓜ちゃんの、一番若い世代の妹ちゃん！！」
1977 = "「畫妥咧！東富４D！！西瓜的妹妹們中最年輕的一批！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1799 = "「嗯」" 

# monologue
# JP: 外国人が集団でホームを長時間うろつくことは、\nあらぬ嫌疑を呼びかねない、と。
2265 = "一大群外國人長時間在站台上滯留的話，會引人起疑是理所當然的吧。" 

# monologue
# JP: 姜さんのその判断に従って、ホーム視察は日々姫に任せ、僕とハチロクは一足先に客車に入っていたわけだけれど。
2553 = "所以我們就依姜小姐的安排，站台部分就全部交給日日姬，而我和八六就先一步上車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……よく描けているな。楽しげだ。\n旅に出る前の空気感は、日ノ本も仲国も変わらんな」
1392 = "「……畫得不錯啊，歡欣雀躍的感覺撲面而來。果然出發旅行前的氣氛，仲日兩國並無二致」" 

# monologue
# JP: 日々姫が描いた一見乱雑な線はけれども、東富4Dの勇姿\nだけにはとどまらず、駅全体の旅立ち前を閉じ込めている。
2812 = "雖然粗看起來日日姬的筆觸略顯凌亂，但東富４Ｄ那魁梧雄壯的姿態，與整個站台上出發前的景象卻都躍然紙上。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに。わたし、中段もらってよかと？」
1745 = "「唉，我說阿哥，我要中鋪行嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ――そうか。中段がもっとも\n窓を大きく使えるのだな。無論、僕には異論ないが」
1810 = "「嗯？哦——中鋪應該是能最有效利用車窗的鋪位了。我當然是沒有問題啦，就看——」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、残った寝台でもちろん問題ございません」
1914 = "「我無所謂的，你們先選，剩下的鋪位給我就好」" 

# monologue
# JP: そういいつつも、ハチロクの目はちらちら\n上段へと向いてしまう。
2408 = "嘴上這麼說著，八六的目光卻不停地向上鋪瞟著。" 

# monologue
# JP: あれほど切望するものならば、\nできれば叶えてやりたくもある。
2437 = "她的態度都這麼明顯了，那我自然應該儘量滿足她這小小的願望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「姜さんたちはいかがでしょうか？」
1868 = "「姜小姐，不知道您幾位意下如何？」" 

# 【姜】
# display as 姜
# JP: 「私と志寰君は下段にいたほうが便利かと。\n出入りなども多くなりましょうから」
1904 = "「我和志寰在下鋪應該比較方便吧，在這幾個人裡，我們兩個出入相對更頻繁吧」" 

# 【志寰】
# display as 志寰
# JP: 「なら、日々姫さんの真下に僕が。\n姜秘書は、双鉄さんの真下がいいでしょう」
2100 = "「那我就在日日姬小姐下面的鋪位，姜老師就睡雙鐵先生下面的鋪位吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ、そうか。斜めの関係になると、\n相手の姿が丸見えになってしまうのか」
1812 = "「嗯？哦，原來如此。斜對著的話，有意無意都可能會看到啊，男女有別果然還是不太方便嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――ベッドサイドにカアテンが無いのですね。\nここは、日ノ本の寝台と異なりますね」
1753 = "「啊——鋪位邊上沒有床簾。這一點就和日本國的臥鋪車不一樣了」" 

# monologue
# JP: ならば……うむ。\n寝台配置は理屈で決めていけるか。
2571 = "既然這樣……嗯，就按這個原則把鋪位定下來吧" 

# 【双鉄】
# display as 雙鐵
# JP: 「進行方向側寝台の上段が西瓜、中段に僕、下段が姜さん。\n逆側寝台の上段がハチロク、中段日々姫で下段志寰君」
2056 = "「車頭方向的上鋪西瓜，我在中鋪，下鋪是姜小姐。然後車尾方向上鋪八六，中鋪日日姬，下鋪志寰」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにから見えるのがハチロクとわたしと志寰君。\n志寰君から見えるのが、西瓜ちゃんとにぃにと姜さん」
2111 = "「阿哥這邊能看到八六和我還有志寰。志寰這邊能看到西瓜、阿哥和姜小姐」" 

# monologue
# JP: 日々姫ハチロク西瓜が視線を交わし合い、すぐに深く頷く。
2626 = "日日姬與八六和西瓜交換了一下眼神，深深點了點頭。" 

# 【姜】
# display as 姜
# JP: 「当方としても、その寝台配置で問題ありません。\nでしたら、荷物を――まずは大物を下段寝台の下に」
1907 = "「我對於這樣的鋪位安排沒有什麼異議。那就放行李吧——先把大件的放到下鋪下面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。トランクなどをベッドの下に、か」
1684 = "「原來如此，手提箱是放在鋪位下面的啊」" 

# 【姜】
# display as 姜
# JP: 「そうしたら、上段の方々から上にどうぞ」
2108 = "「都放好了。接下來從上鋪開始，諸位請入席吧」" 

# 【ハチロク】
# display as 八六
# JP: 「どうぞ、とおすすめいただきましても――\nええと、はしごはどこでしょう？」
2073 = "「這……要入席的話——這梯子在哪裡呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はしごは無いですね。けれど、ここ。\nこの突起を引っ張り出すとステップになります」
1965 = "「沒有梯子哦。不過你看這裡，把這個凸起拉開的話，就有地方可以落腳了」" 

# monologue
# JP: いうなりするする、\n西瓜はブーツを脱いでそろえて、最上段へと登る。
2803 = "邊說，西瓜邊脫下了靴子，俐落地在那裡一踩，爬上了上鋪。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁ。なんと身軽なことでしょう」
1716 = "「哇哦，真是身輕如燕呀」" 

# monologue
# JP: とはいえ、ハチロクも外観印象よりはよほど身軽だ。\nランボードの上でのみのこなしなど、僕よりよほど――
2756 = "話雖如此，八六其實遠比看起來來得靈活。至少在踏腳板上行走的動作，就比我更——" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま……その……\nわたくし、スカアトでございますので」
2118 = "「雙鐵少爺……您看……我現在穿著裙子……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、そうか。すまない」
1815 = "「嗯？哦，對哦，不好意思」" 

# monologue
# JP: 視線を外せば、ハチロクもすぐに上段まで登ったようだ。
2544 = "我移開了視線，八六便也迅速地爬上了上鋪。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、とても高うございます。\n寝台は……ああ、ちゃんと柔らかではないですか」
1830 = "「嘻嘻，還真蠻高的。床鋪……啊，也還是很柔軟的嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1735 = "「哦」" 

# monologue
# JP: 僕と日々姫も中段へ。\n……確かにひどく屋根は低くて窮屈だけれど、窓は大きい。
2525 = "我和日日姬也爬上了中鋪……空間的確是頗為侷促，但窗戶確實非常大。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1795 = "「嗯……」" 

# monologue
# JP: 日々姫はもう、スケッチブックを広げている。\nペンが走る音にも、いつも以上の勢いがある。
2758 = "說時遲那時快，日日姬已經攤開了素描簿。而筆尖飛舞的聲音，也來得比平時更有氣勢。" 

# 【姜】
# display as 姜
# JP: 「いかがでしょうか？　お望みの三段寝台は」
2048 = "「諸位選定的三層床鋪，感覺如何？」" 

# 【志寰】
# display as 志寰
# JP: 「なにか不便があったら、すぐに言ってください」
2039 = "「要是有什麼不便的話，還請不要客氣隨時開口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とのことだが、どうだ？　ふたりは」
1656 = "「人家都這麼問了，你們兩個怎麼說？」" 

# 【ハチロク】
# display as 八六
# JP: 「まことにたのしうございます！\n横になりながら、うふふっ、列車の旅を楽しめるなんて」
2014 = "「能邊舒服地躺著邊享受列車旅行，嘻嘻，真的是非常開心！」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……走り出すの、ば――待ち遠しか…………」
1750 = "「唔……還沒發車嗎——等得好心急哦…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とのことです」
1898 = "「您都聽到了吧」" 

# monologue
# JP: ふふっ、と帰ってくる笑いは、\nとてもやわらかであたたかだ。
2685 = "而二人回答時對我投以的微笑，讓我瞬間被溫馨暖意所包圍。" 

# monologue
# JP: まだ走り出してもいないのに、三段寝台の狭さはどうやら、\nこころの距離を縮めてくれ――おっ！？
2802 = "還沒發車，這三層床鋪的狹小空間，似乎就讓心與心之間的距離也貼得更近了——哦！？" 

# 【日々姫】
# display as 日日姬＆八六
# JP: 「あ」\n「まぁ」
1756 = "「啊」\\n「哇」" 

# monologue
# JP: 目立った振動。
2666 = "相當的震動從身下傳來。" 

# monologue
# JP: 上等の滑り出しとは思えぬが……あるいは\x%l蒸機;#00ffc040;蒸機%l;#;とちがい、なめらかには引き出せないものなのだろうか？
2507 = "怎麼說這都不能算是一次優秀的發車……還是說與\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;不同，沒辦法平順地牽引起步嗎？" 

# 【西瓜】
# display as 西瓜
# JP: 「この機関士とレイルロオドは、経験が浅いようですね」
2078 = "「這司機和鐵路人偶似乎經驗有所不足啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: 珍しく、西瓜がはっきり不満の色をにじませている。\n……レイルロオドにこうした言葉もどうかと思うが――
2725 = "西瓜少見卻直截了當地露出了不滿的神色……這樣的話語用來形容鐵路人偶或許不是很合適——" 

# monologue
# JP: 『人間らしい』ところを見せてもらえたような気がして、\nほんの少しだけうれしくも思う。
2313 = "但看到她展現出“像人類一樣”的一面，心裡還是不禁有一點點高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。加速がいいな、素晴らしい」
1775 = "「啊，加速很迅猛，真不錯」" 

# monologue
# JP: 8620では――\nというか、蒸気機関では到底真似のできない加速だろう。
2511 = "憑８６２０——應該說，放眼全部蒸汽機車，應該都難有與之匹敵的加速能力吧。" 

# monologue
# JP: あっという間に北琴西駅の長いホームが車窓から去る。
2773 = "轉眼間，北琴西站那長長的站台就已經被甩在了身後。" 

# 【ハチロク】
# display as 八六
# JP: 「……振動は、引き出しのときだけですね。\nこの速度だというのに、驚くほどに揺れません」
1404 = "「……震動也只有起步的那一下呢。速度都這麼快了，卻並沒有什麼搖晃，真令人驚嘆」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。やはり軌間が広いことの影響だろうか。無論、\n足回り等も、日ノ本より進歩しているのかもしれんが」
1805 = "「嗯，應該是拜軌距的寬度所賜吧。當然，在行駛系統等方面，應該也比日本國的更先進一些」" 

# monologue
# JP: 他の乗客たちもそれぞれに寝台を整えおえたか、\n通路側のざわめきも、だいぶん賑やかになってきた。
2809 = "雖然其他乘客也大都在各自的鋪位上安頓了下來，但過道那邊還是逐漸熱鬧了起來。" 

# monologue
# JP: とはいえ、ハチロクとの共感がある。\n僕らの声は、西瓜には間違いなく届いていようが――
2280 = "不過西瓜和八六之間有共鳴在，她要聽清我們之間的對話應該不是問題——" 

# 【西瓜】
# display as 西瓜
# JP: 「…………」
1368 = "「…………」" 

# monologue
# JP: しかし、西瓜は何も答えない。\n穏やかな顔でにこにこしている。
2389 = "可不知為何西瓜卻並不主動發話，只是面帶安詳的微笑看著我們。" 

# monologue
# JP: 問えばもちろん答えはすぐに返るのだろうが、\n今しばらくはせっかくだ。“見知らぬ鉄路”を堪能しよう。
2519 = "我們提問的話，她應該會毫不猶豫地給予解答，而且難得有機會享受在陌生鐵路上的旅程，暫時就先不去深究好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1737 = "「哦喲」" 

# monologue
# JP: 音楽だ。チャイムではなく、楽曲――歌曲、歌謡曲。\n多分、アイドルとかその辺の歌だろう。
2819 = "音樂聲飄入耳中，卻並不是鈴聲，而是歌曲。感覺應該是偶像歌手的歌或者類似的作品。" 

# monologue
# JP: ……まるまる一曲流されそうな気配だが、これはいわゆる、ＢＧＭ的なサービスだろうか。
1300 = "……看這架勢似乎是要放足整曲，據此推斷，這應該是類似背景音樂的服務吧。" 

# 【ハチロク】
# display as 八六
# JP: 「お歌が……車内放送で流れるのですね。\n日ノ本でしたら、邪魔にされる方もいそうですが」
2087 = "「通過車內廣播放歌啊……在日本國的話，可能會有乘客覺得被打擾了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一つの文化、といったものなのだろうな……。\nうん。特段、誰も気にしている気配すらない」
1920 = "「或許是這裡鐵路文化的一部分吧……嗯，感覺並沒有誰對此有什麼特別的反應」" 

# 【姜】
# display as 姜
# JP: 「お話のところをすみません。\n皆さんのきっぷをお渡しいただけますか？」
1927 = "「抱歉打斷一下諸位談話，不過可以把車票先交給我一下嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　きっぷですか？　わかりました。\nハチロク。日々姫。きっぷを」
1822 = "「嗯？車票嗎，好的。八六，日日姬，拿一下車票」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……いま、手離せんけん、とって。\n私の、ポーチの中やけん」
1798 = "「嗯……我現在沒手，幫我拿下。我擱小包裡頭了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった、預かるぞ」
1858 = "「好的，那我拿了」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの分はこちらです」
2001 = "「給，這是我的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。姜さん、どうぞ」
2049 = "「謝謝。姜小姐，麻煩」" 

# monologue
# JP: そうか、なるほど。検札か。
2373 = "原來如此，是查票啊。" 

# monologue
# JP: 車掌さんが来ていることに、\nまるで気がついていなかった――っと、と？
2520 = "我們竟然全都沒有注意到列車長已經過來了——不對？" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1715 = "「哇」" 

# monologue
# JP: 全員のきっぷが、取り上げられて、収納された。\n車掌さんのもっているファイルの中に。
2365 = "列車長把所有人的票收過去，放進了手上的文件夾裡。" 

# monologue
# JP: けれどもすぐにファイルの中から、\n何かが入れ替わりで差し出され――
2654 = "然後又馬上從文件夾裡拿出一樣東西，交給我們——" 

# 【双鉄】
# display as 雙鐵
# JP: 「プラスチックのカードだ――『硬臥換票証』。\n9号車9号中舗――これは、僕の寝台の番号だな」
1685 = "「原來是張塑膠卡片——“硬臥換票證”。１１車９號中鋪——這是我的鋪位號碼啊」" 

# 【ハチロク】
# display as 八六
# JP: 「列車の写真もはいっておりますね。\n乗車記念品、でございましょうか？」
2010 = "「背面還有列車的照片呢。這是搭車紀念品嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、記念品として配布するには\nコストがかかりすぎそうに思えるが……」
1899 = "「應該不是，如果這是發放的紀念品的話，成本未免太高了一點……」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、左様ですね――\nだとすると、これは一体……」
1783 = "「啊，有道理——那這到底是……」" 

# monologue
# JP: ハチロクがよほど思い悩みでもしたのだろうか。\nクスクスと、僕の真上から小さな笑い声がする。
2346 = "八六絞盡腦汁卻百思不得其解，而這時從我上面傳來了一絲輕輕的笑聲。" 

# 【西瓜】
# display as 西瓜
# JP: 「乗車記念品ではありません。\nもう一度、きっぷと交換されますよ？」
2075 = "「這並不是搭車紀念品。回頭還要再換回車票的」" 

# 【ハチロク】
# display as 八六
# JP: 「もう一度きっぷと交換――で、ございますか？\nどうしてそのような手間をかけるのでございましょう」
2090 = "「還要再換回車票嗎？為什麼要有這樣一個麻煩的過程呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　うむむ――ああ、そうか。なるほど！！！」
1817 = "「嗯？唔——啊，對哦，原來是這樣！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、おわかりになられたのですか？」
2119 = "「雙鐵少爺，您想明白了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多分な。西瓜のヒントが、\nこの問題を面白いクイズにしてくれた」
1848 = "「大概是，西瓜的提示讓這個問題變成了有趣的謎題」" 

# 【志寰】
# display as 志寰
# JP: 「あはっ」
1761 = "「啊哈」" 

# monologue
# JP: 向かい下段の志寰君が、実に嬉しそうに頷いている。\n国は違えど、マスターの心理は変わらんようだ。
2565 = "斜下方的志寰喜形於色，不住點頭。即便國籍有別，司機的心理卻並無二致。" 

# monologue
# JP: ハチロクが機転をきかせ、粋なところを見せてくれるなら、\n僕とてやはり、嬉しく誇らしく感じるゆえに。
2707 = "若是八六發揮她的機敏才智，讓人刮目相看的話，想必我也同樣會樂不可支，驕傲得不能自已吧。" 

# 【ハチロク】
# display as 八六
# JP: 「ヒント……もう一度きっぷと交換することが……\nう……ん……。……どういうことなのでしょう」
1931 = "「提示……是說再換回車票嗎……唔……嗯…………到底怎麼回事呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁあ」
1755 = "「啊」" 

# monologue
# JP: 手は変わらずに動いたままだが、\n日々姫も密かにクイズ参加をしていたようだ。
2811 = "雖然手裡的筆完全沒有停，但日日姬的心思似乎也已經加入到了解題的行列中。" 

# monologue
# JP: 僕や日々姫でわかることがハチロクにわからんのなら……\nふむ。“異国の列車”の印象が邪魔しているのかもしれん。
2528 = "我和日日姬都想明白了而八六卻沒有的話……嗯，或許是“異國的列車”這一先入為主的印象在作梗吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。車掌さんの業務内容は、\n仲国も日ノ本も同じではないかと僕は思うぞ？」
1671 = "「八六，要說列車長的工作內容，我覺得仲日兩國應該並無二致吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「車掌さんの業務……寝台列車の――\nああ！　ああ！　ああああああ！！！」
1679 = "「列車長的工作……臥鋪車——啊！啊啊！啊啊啊啊！！！」" 

# monologue
# JP: ようやく、ハチロクが笑顔に戻る。
2681 = "笑容又回到了八六的面龐上。" 

# 【ハチロク】
# display as 八六
# JP: 「座席の管理でございますね！　このカアドを戻すときは、\nお客様が下車される間近になってから」
2096 = "「那就是鋪位的管理吧！把這張卡取回的時候，也就是乘客快要下車的時候了」" 

# 【西瓜】
# display as 西瓜
# JP: 「そのとおり。カードときっぷが交換されている寝台は、\n正規のきっぷが購入されている寝台となります」
1881 = "「就是這樣。換了卡的鋪位，就是已經購買了正規車票的」" 

# 【ハチロク】
# display as 八六
# JP: 「日ノ本ですと、座席管理はメモで確認かと存じますが\n……なるほど、これはすぐれたやり方ですね」
1836 = "「在日本國的話，據我所知鋪位管理是人工記錄的……原來如此，還真是個很棒的方法啊」" 

# monologue
# JP: 交換されていない寝台にもしも乗客がいたのなら、\n都度の検札を行うことで、不正乗車を防止できる。
2689 = "而如果沒有換票的鋪位上有乘客的話，就對其進行查票，這樣就可以防止逃票了。" 

# monologue
# JP: 乗客のきっぷ紛失も、\n車掌の一括管理によって防止できるし――
2694 = "而藉由列車長統一管理，也可以有效避免乘客弄丟車票——" 

# 【志寰】
# display as 志寰
# JP: 「下車駅に近くなっても寝たままの乗客は、\n車掌さんが起こしてくれもしますよ」
1680 = "「列車長還會叫醒臨近下車還沒有醒來的乘客哦」" 

# 【ハチロク】
# display as 八六
# JP: 「それも素晴らしいことですね」
2074 = "「這一點也很棒呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「再交換が必要ゆえに、必ず起こすこととなるのか。\nふむ……いや、これは面白い上に、よく考えられている」
1834 = "「因為還要換回來，所以一定要叫醒。嗯……等等，這不只是有趣，而是經過充分考慮的流程」" 

# monologue
# JP: ん……っと小さく考え込む声。\nいつの間に、日々姫はスケッチの手を止めている。
2269 = "一邊傳來了沉思時不經意發出的，輕輕的“嗯”聲——不知何時，日日姬已經停下了手中的筆。" 

# 【日々姫】
# display as 日日姬
# JP: 「ナインスターズにも採用したらよかかも。で、きっぷと\nカード再交換のときに、同じ絵柄の乗車記念証あげるの」
1652 = "「九星或許也應該引入這一流程。然後換回車票時候，附帶一張同樣圖案的紀念卡什麼的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　なるほど確かに、僕が小さなこどもだったら、\nこのカードを手放すことを、とても残念に思いそうだ」
1771 = "「啊！有道理！換成我是小孩子的話，讓我把這卡還回去我肯定是千萬個不願意的」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、日ノ本と仲国と。\n両方のサアビスのいいとこどりでございますね」
1829 = "「嘻嘻，這是對仲日兩國的服務各取所長呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1955 = "「是啊——」" 

# monologue
# JP: そうか、そこもまた、\n僕らが呼ばれた理由の一つなのかもしれん。
2374 = "原來如此，這或許也是叫我們來的理由之一吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗車記念カードの配布など、僕らにとっては\nごく平凡なサービスであるが……」
1978 = "「發放搭車紀念卡，對我們而言已經算是習以為常的服務了……」" 

# 【姜】
# display as 姜
# JP: 「当方にとっては極めて新鮮で魅力的です。\n逆に、当方には当然の換票が、双鉄先生達にはお珍しい」
1879 = "「對我們而言就相當新鮮且有吸引力。反觀之，我們習以為常的換票，對諸位而言又很新鮮」" 

# 【双鉄】
# display as 雙鐵
# JP: 「当然のものには、それが定番化するだけの魅力がある。\nけれど定番化したがゆえに、却って魅力を見失いやすい」
2006 = "「習以為常的東西，說明它有著足以使其成為固定流程的魅力。但成為固定流程後，卻反又容易讓其魅力被埋沒」" 

# 【日々姫】
# display as 日日姬
# JP: 「外国の視点にふれると、そいばリセットされるとね。\nわたし……うん。呼んでもらえて、よかったと！」
1891 = "「從外國人的角度來瞅的話，就沒有這些多餘的干擾咧。我……嗯，真的很感謝這趟仲國行！」" 

# monologue
# JP: 言って、日々姫はベッドを降りる。
2757 = "說完，日日姬從鋪位上爬了下去。" 

# monologue
# JP: 靴を履くなり通路に出、\n補助椅子に腰掛けスケッチブックをすぐさま広げる。
2439 = "她穿上鞋，坐到了過道那邊的臨時座位上，又攤開了素描簿。" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 通路の情景を描いているのだろう。\n日々姫の手は、一切の迷いを見せずあざやかに動く。
2433 = "她大概是在畫走道上的情景吧。而她手中的筆，不見絲毫猶豫，不住地上下飛舞著。" 

# monologue
# JP: [クロッキー,1]速描をしているのだろうが、それにしても速い。\n日々姫の視線が、体がくるくるとその向きを変えていく。
2790 = "這應該就是所謂速寫的技法吧，不過這也實在是太快了。只見日日姬的視線隨著手頭的動作，身體不停變換著朝向。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……うん。したら、西瓜ちゃんか姜さん。\nヤじゃなかったら、向かいに座ってもらえませんか？」
1748 = "「唔……嗯。我瞧瞧……西瓜，或者姜小姐也可以，要不介意的話，能在我對面這坐一下嗎？」" 

# 【姜】
# display as 姜
# JP: 「だ、そうだけれど？　西瓜」
1912 = "「我是沒問題，西瓜？」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は少しもヤではないので、\n日々姫さんの向かいに座ります」
1901 = "「我一點都不介意哦，馬上就坐過來」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
1718 = "「哇！」" 

# monologue
# JP: ひらり、ただの一瞬で、\n僕の眼前を西瓜が落下――いや、通過していった。
2667 = "眨眼之間，西瓜就在我面前落下——實際應該是跳下來才對吧。" 

# monologue
# JP: 上段ベッドから一気に床へ、\nステップを引き出しさえもせず。
2474 = "從上鋪直接下到地面，連踏腳板都沒打開。" 

# 【双鉄】
# display as 雙鐵
# JP: 「驚いた。\nずいぶんと身が軽いのだな」
2079 = "「這太讓人吃驚了，說是輕若鴻毛絕不誇張」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の整備体重量は同機種平均と変わりません。\n今の下り方は、単なる慣れです」
2030 = "「西瓜的整備體重量與同型機並無相左。剛才這樣下來，只是習慣成自然而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、寝台車利用はよくあることなのか？」
2015 = "「莫非是經常乘坐臥鋪車的關係嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「いえ。本線乗務について以降の宿舎の寝台が、\nこれとおんなじものでした」
2125 = "「非也。在接到幹線乘務任務後住的宿舍，鋪位和這是完全一樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……同じものをそのまま使ったか、\nあるいは廃部品の流用か」
1732 = "「哦……直接用了同樣的東西啊，或者是汰換品的重複利用嗎」" 

# monologue
# JP: ふふっ、と西瓜が、珍しく微笑みを表情にだす。\nとても柔らかに、あたたかに。
2726 = "西瓜少見地露出微笑的表情，還嘻嘻地輕笑出聲來。那表情飽含著無盡的柔情與暖意。" 

# 【西瓜】
# display as 西瓜
# JP: 「今の宿舎は異なりますが、数多の姉妹と過ごした\n三段寝台を、西瓜は変わらず好んでいます」
1859 = "「如今的宿舍已經不是這樣了，不過當年和眾多姐妹們同住的三層床鋪，西瓜還是一如既往地喜歡」" 

# 【志寰】
# display as 志寰
# JP: 「西瓜の2000は、姉妹機が量産・運用開始されて以降は、\nただの１車輌として本線に投入されたんですよ」
2033 = "「西瓜的２０００號，在姐妹機量產並投入使用後，也被作為一輛普通的機車投入了幹線運營」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: 僕らの雑談の合間にも、日々姫の手はぐんぐん動く。\n西瓜をモチーフのひとつに加え――
2464 = "就在我們閒聊的工夫，日日姬的手是片刻未停。以西瓜為中心的構圖，加上——" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
1729 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1772 = "「啊！？」" 

# monologue
# JP: 白髪、美髯のご老人が日々姫に声をかけてくる。\n――いくらか酒を飲んでいる様子だ。
2360 = "冷不防一位白髮美髯的長者走過來和日日姬搭話——而且好像還喝了些酒的樣子。" 

# monologue
# JP: 飛び降りようとした僕を日々姫は笑顔の目線で制し、\n姜さんに通訳を依頼する。
2609 = "日日姬以一個微笑制止了想要飛身而下的我，轉而請姜小姐幫忙翻譯。" 

# 【日々姫】
# display as 日日姬
# JP: 「姜さん、こちらの方はなんて？」
1870 = "「姜小姐，這位先生說什麼呀？」" 

# 【姜】
# display as 姜
# JP: 「『素晴らしい絵で驚いた』と言っています。\n『自分のことも描いてほしい』とも」
1660 = "「他說“這畫得太好了真讓人吃驚不小”，還說“能不能給我也畫一張”」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　描いてみたか！！　っていうか、\n『描いてる途中、お話聞いてもいいですか？』　って」
1726 = "「哇！那就畫唄！不過幫我問問他看，就說“畫的時候能不能我們聊聊”」" 

# monologue
# JP: 日々姫の問いが翻訳されて、\nご老人が破顔一笑、なにかを答える。
2414 = "在聽到姜小姐翻譯的問題後，長者開懷一笑，只恨我們聽不懂他的回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2142 = "「！」" 

# monologue
# JP: 途端西瓜が席を外して、\n軽業よろしくあっという間に上段ベッドへ体を戻す。
2734 = "西瓜突然起身，如雜技般轉眼又爬回了上鋪。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ」
1758 = "「啊呀呀」" 

# monologue
# JP: ご老人はすぐ空いた席へと腰掛けて、\nテーブルの上に、なにか――鶏肉のようなものを差し出す。
2696 = "而長者便直接坐上了西瓜空出的位子，隨手把不知是什麼但有點像雞肉的東西放在了小桌上。" 

# 【姜】
# display as 姜
# JP: 「絵を書いてもらうお礼だそうです。\nアヒルの肉の燻製ですね」
2106 = "「那是燻鴨，好像是打算當作給他畫像的謝禮」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはは、ありがとうございます。\n描き終わったら、いただきますね」
1762 = "「啊哈哈，那就多謝啦。等畫完馬上嚐嚐吧」" 

# monologue
# JP: 日々姫に目で求められるゆえ、僕に任せろと頷き返す。\nアヒルの肉の――『アヒルの、頭部の肉の燻製』。
2615 = "日日姬向我投來了請求的目光，我向她點點頭表示讓她決定。而這鴨肉——“是燻鴨頭”。" 

# monologue
# JP: いまもってなおかわいいもの好きの日々姫には、\n『アヒルさんの頭を食べる』のは、困難だろう。
2794 = "這麼一想，要讓喜歡一切可愛東西的日日姬吃鴨子的頭，怕是有點困難吧。" 

# 【ハチロク】
# display as 八六
# JP: 「……双鉄様のお口にあえばよろしいのですが」
1396 = "「……要是能合雙鐵少爺的口味就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見た目は飴色で甘辛そう――というか旨そうだ。\n多分、大丈夫かとは思うが……」
1638 = "「一眼看起來這琥珀色感覺就像是甜辣口味的——不過確實給人是很香的感覺，大概沒什麼問題吧……」" 

# 【西瓜】
# display as 西瓜
# JP: 「あのご老人は、聖都の方だそうです。\n北琴にお嫁入りした娘さんを尋ねた帰りだそうです」
2076 = "「這位長者好像是盛都人。之前他去探望嫁到北琴的女兒，現在好像正處於返程途中」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: ご老人の声はもごもごしている上に、か細い。\n車内放送とざわめきが、その声をさらに聞きづらくする。
2806 = "長者說話都不甚張口，音量也頗低，加上車內廣播，越來越難以聽得真切。" 

# monologue
# JP: すぐ隣に立つ姜さんでさえ、しばしば聞き返している声を、\nけれど西瓜はこの距離から、何の苦もなく聞き取っている。
2452 = "姜小姐即便就在他旁邊，也三不五時要請他重複，但西瓜身在上鋪，卻是聽得毫不費力。" 

# 【西瓜】
# display as 西瓜
# JP: 「……あのアヒルは聖都のものだそうです。\nつまり[しせん,1]汜川省の食べ物ですから、辛い可能性が高いです」
1401 = "「……那鴨頭好像是盛都的特色，也就是泗川省的，非常有可能是辣的」" 

# 【志寰】
# display as 志寰
# JP: 「お口にあわなければ、喜んで僕がいただきますよ」
2036 = "「要是不合諸位的胃口的話，那我就不客氣啦」" 

# monologue
# JP: 辛い料理が好きなのか、志寰君の声は明るい。
2548 = "或許是喜歡吃辣的食物吧，志寰的話語中透著掩不住的高興。" 

# 【西瓜】
# display as 西瓜
# JP: 「日々姫さんは、汜川について尋ねています。\n見どころ、名物――汜川の人の好む旅行先」
1945 = "「日日姬在打聽關於泗川的事情。值得一看的地方，特產——還有泗川人喜歡的旅行目的地」" 

# 【ハチロク】
# display as 八六
# JP: 「……さすがは日々姫でございますね」
1388 = "「……果然是日日姬的風格」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1378 = "「……嗯」" 

# monologue
# JP: 不意に目頭が熱くなりかけ、咳払いしてなんとか誤魔化す。\nあの日々姫がだ。人見知りの固まりだったあの日々姫がだ。
2515 = "我不禁眼眶一熱，只得趕緊假咳一聲掩飾過去。當初那麼怕生的日日姬，如今竟有這般變化。" 

# monologue
# JP: 見事なコミュニケーション能力を異国で発揮し、\nそれを“さすが”と、当然のことと評価されているのだ。
2411 = "在國外發揮出這麼出色的溝通能力，而別人也將之當作她的優點，理所當然地對她加以稱讚。" 

# monologue
# JP: （成長したな――本当に――）
2856 = "（真的是長大了啊——）" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2121 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
# 1378 = "「……嗯」" 

# monologue
# JP: 大丈夫。鼻声にはなっていない。\n寝台客車はどうにも人を、感傷的にするものらしい。
2647 = "沒問題，應該還沒哽咽出聲。看來這臥鋪車似乎是有讓人感傷的魔力啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はつくづく、妹に恵まれる男だと思ってな」
1916 = "「我真是深切感受到自己受了妹妹多少的幫助」" 

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1363 = "「——是啊」" 

# monologue
# JP: 過去がある。ハチロクの声は、神妙だ。\nけれどいま、僕はハチロクのことも褒めている。
2306 = "似曾相識——八六的聲音似乎是話裡有話。不過我剛才的話裡其實也包括了對八六的褒獎。" 

# monologue
# JP: 戸籍上、僕らはすでに兄妹なのだ。\nハチロクが余りに恐縮するゆえ、未だそうとは呼べないが。
2467 = "就戶籍而言，我和八六已經是兄妹關係了。只是八六太過拘謹，還從來沒這麼開口叫過而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に、僕にはもったいないほどの妹ばかりだ」
1712 = "「和我這些如此優秀的妹妹們一比，我真是自慚形穢啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「はーい！　描けました～――って！？」
1853 = "「好——嘞！畫好咧——哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1809 = "「嗯？」" 

# monologue
# JP: 日々姫の声で我に帰って視線を落とす――！！
2623 = "日日姬的聲音把我拉回現實，而當我低頭看去——！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2081 = "「這是——」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ……\n日々姫……大人気ですね」
1714 = "「哇……日日姬大受歡迎啊」" 

# monologue
# JP: すぐさまベッドから飛び降りて日々姫を庇うように立つ。
2545 = "我立即飛身下地，擋在了日日姬的身前。" 

# monologue
# JP: 人が集まり覗き込み、あるいは覗き込もうとしている。\n日々姫の手の中のスケッチブックを。
2290 = "人們不是湊過來在看熱鬧，就是正打算湊過來看熱鬧。而焦點的中心，就是日日姬手中的素描簿。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずいな。これは争いが起きかねないぞ」
2077 = "「這可不妙，搞不好要起事端的」" 

# monologue
# JP: 実際、軽い押し合いが発生している。
2461 = "實際上，人群中已經發生了輕微地推搡了。" 

# monologue
# JP: 姜さんと僕に志寰君、\nご老人までが盾となってくれてはいるが――
2810 = "雖然姜小姐和志寰，連那位長者都在試圖擋開人群——" 

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書が、集まらないようにと言っています。\nけれど、それは逆効果かもしれません」
2113 = "「雖然姜老師在讓大家不要聚過來，但看來起了反效果」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1956 = "「是啊」" 

# monologue
# JP: 実際、姜さんの声をききつけ、奥側の寝台からも\n「なんだなんだ」と言わんばかりの顔が出てくる。
2462 = "實際上，在聽到姜小姐的聲音後，遠處的鋪位上也有人探出頭來，滿臉“怎麼了怎麼了”的神情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らが移動してしまうのが一番安全かつ迅速な\n事態収拾につながろう。……確か、この列車にも」
1987 = "「看來只有我們離開才是最安全而有效地平息事態的方法了。我記得這列車上應該是有……」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　さすが双鉄先生。\nとても優れた考えだと西瓜も同意します」
1767 = "「啊！不愧是雙鐵先生。果然是穩妥的方法，西瓜完全同意」" 

# 【志寰】
# display as 志寰
# JP: 「では、僕が先導しましょう。姜秘書にはあとで合流\nいただいて、西瓜と僕とでみなさんを挟むかたちで」
2099 = "「那我們先走吧，姜老師回頭來和我們會合。我開路，西瓜斷後」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、その前に」
1786 = "「啊，稍等一下」" 

# monologue
# JP: 日々姫は席を立つと同時に、\nスケッチブックの紙を一枚、丁寧に取り外す。
2630 = "日日姬起身的同時，小心地從素描簿上撕下了一頁。" 

# 【日々姫】
# display as 日日姬
# JP: 「おじいさん。お話たくさん、ありがとうございました。\nあと、アヒル。いただきますね！」
1851 = "「大爺，謝謝你陪我嘮了這麼多。鴨頭我們就不客氣啦！」" 

# 【志寰】
# display as 志寰
# JP: 「この通路を抜けたところです」
1997 = "「穿過這段過道就到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1738 = "「哦！」" 

# monologue
# JP: 厨房脇の狭い通路の向こうには、\n広々とした空間に、清潔なテーブル達が整列している。
2672 = "穿過廚房邊的狹窄過道後，前方豁然開朗，兩邊整齊地排列著潔淨的餐桌。" 

# 【ハチロク】
# display as 八六
# JP: 「素敵な食堂車でございますね。\n居心地がとても良さそう……懐かしい感じがいたします」
1989 = "「真是漂亮的餐車呀。讓人覺得很舒服……還有些令人懷念的感覺」" 

# 【西瓜】
# display as 西瓜
# JP: 「食堂車のことを、仲国では[ｃａｎｃｈｅ,1]餐車。[さんしゃ,1]餐車といいます。\n晩餐の餐という文字を書きますね」
2131 = "「餐車在仲文裡讀作[ｃａｎｃｈｅ,1]餐車。餐就是晚餐的那個餐字」" 

# 【日々姫】
# display as 日日姬
# JP: 「餐車！　よかとね。洒落とるとね～！！」
2135 = "「餐車！挺好的，簡單明瞭～！！」" 

# monologue
# JP: まだ夕食には早い時間なのが幸いしてか、\nほとんどの席が空席だ。
2554 = "所幸目前離吃晚餐還早，幾乎所有的席位都還空著。" 

# monologue
# JP: テーブル一つにつき固定されている座席には、\nどうみても四人までしか座れんが、さて――
2645 = "每一桌都是搭配了固定的座位，看來最多只能坐四個人的樣子。" 

# 【姜】
# display as 姜
# JP: 「三人と三人にわかれませんか？」
1641 = "「三人一桌分開坐吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、姜さん。お疲れ様です」
1779 = "「啊，姜小姐，多有辛苦」" 

# monologue
# JP: あの混乱を、これほど手早く収めてくれたのか。\n驚きとともに、感心・感謝も湧いてくる。
2567 = "方才那般混亂，已經如此迅速地平息了嗎。驚訝之餘，讚嘆與感激之情油然而生。" 

# 【姜】
# display as 姜
# JP: 「いえなにも。日々姫先生が離れられたら、\n蜘蛛の子を散らすようにみな自分の寝台に戻りましたよ」
1741 = "「哪裡哪裡，日日姬小姐一走開，人群自然就一哄而散，各自回到自己鋪位了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、なんかお騒がせしちゃって～」
1774 = "「啊，一不小心搞出這麼大事咧～」" 

# 【姜】
# display as 姜
# JP: 「いえいえ。\nあれも、よいご視察になられたことかと思いますし」
1966 = "「沒關係沒關係，我覺得這也算考察中頗有收穫的一部分吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ。ご迷惑かけちゃたのはごめんなさいですけど。\nそういってもらえると、ほっとしますし――確かにです」
1764 = "「啊哈，給您添這麼大麻煩真是不好意思。不過您這麼說我也就放心了——而且您說得也沒錯」" 

# monologue
# JP: ふむ。姜さんと日々姫との話を断ち切ることもないだろう。\nならば、あちらの二席は決まりで……。さて、どうするか。
2399 = "唔，看來這當口是不該分開日日姬和姜小姐了。這樣的話她們就得占去那桌的兩個位子……那剩下的怎麼辦呢。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくしもあちらの席でよろしいでしょうか？」
2120 = "「雙鐵少爺，我也坐到那邊去可好？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――！」
1751 = "「唔？——！」" 

# monologue
# JP: まさかのハチロクのウィンクだ。\n驚く僕のまなざしを、ハチロクは視線の動きで誘導し――
2345 = "八六竟然在朝我擠眉弄眼，同時還以她的視線帶著我的視線——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな。\nそうした方がいいだろう」
1777 = "「啊，原來如此。這樣安排應該也不錯」" 

# monologue
# JP: 僕の言葉を終わりまで待たず、\nハチロクは日々姫、姜さんのテーブルにつく。
2801 = "還不等我說完，八六就坐到了日日姬和姜小姐那一桌。" 

# monologue
# JP: つまり、僕の方のテーブルには――
2805 = "那我這桌剩下的就是——" 

# 【志寰】
# display as 志寰
# JP: 「とても光栄です。\n双鉄さんと差し向かいで食事をできるだなんて」
2012 = "「能和雙鐵先生面對面用餐，真是不勝榮幸」" 

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本の鉄道の今についてを教えてもらえたら、\n西瓜はとてもうれしく思います」
1861 = "「如果能順便對日本國鐵路的現狀請教一二，西瓜就再高興不過了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1799 = "「嗯」" 

# monologue
# JP: 僕の向かいに、\n志寰君と西瓜が自然、隣同士に並び合っている。
2498 = "志寰和西瓜，自然而然地就併排坐在了我對面。" 

# monologue
# JP: 志寰君は満面の笑顔だし、西瓜の髪も踊っている。\n僕までが、なんともほっこりした気持ちにさせられる。
2503 = "志寰笑容滿面，西瓜的辮子也雀躍不已。看他們這副樣子，我都不禁跟著開心了起來。" 

# monologue
# JP: （とはいえ、昨日あれほど注意されたばかりだ。\n余計なことを言わないように、気をつけんとな）
2844 = "（但話說回來，昨天晚上那一大通認真的討論可不是白忙的，一定得小心不要禍從口出）" 

# 【志寰】
# display as 志寰
# JP: 「双鉄さん？」
2117 = "「雙鐵先生？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1784 = "「啊，沒事」" 

# monologue
# JP: 黙り込み、不機嫌などの誤解を与えてしまうのも、\n“余計なこと”と同等以上に避けねばならぬことだろう。
2674 = "突然默不作聲，被誤會成不開心的話，可能就和“禍從口出”無異，或者有過之無不及，絕對要避免。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その……餐車は初めてなので、戸惑ってしまって。\n注文などは、どのようにすればいいのかな、と」
1708 = "「只是，第一次到這樣的餐車來，有點搞不太清楚狀況。比方說，要怎麼點菜呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　できればだけどみんなの注文！\n色んな種類に散らしてくれたらうれしかと！！」
1769 = "「啊！最好大家都點不一樣的唄！我想儘量各種不同的都看一看！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。確かに」
1806 = "「嗯，有道理」" 

# monologue
# JP: 背中からの日々姫の声に頷かされる。\nなるほど。これも極めて重要な視察とできよう。
2703 = "背後傳來日日姬的聲音，我也不禁點頭贊同。她說得確實在理，這也是考察中很重要的一部分。" 

# 【姜】
# display as 姜
# JP: 「先生方が先に、お好みのものを遠慮なくお選びください。\n当方はそれにあわせて、不足を補い注文します」
2091 = "「還請三位先挑你們喜歡的吧，然後我們再根據三位選擇的情況補充其他的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2094 = "「那就恭敬不如從命了」" 

# 【姜】
# display as 姜
# JP: 「ああ、それと。石炭、軽油は別途で手配してあります。\n我々の食事と一緒に供されますので、ご安心を」
1792 = "「啊，還有，煤炭和柴油我們已經另外準備了。等一下會和我們點的菜一起送來，還請諸位放心」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！\nなにからなにまで、まことにありがとうございます」
1719 = "「哇！真是安排得滴水不漏啊，太感謝了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ディーゼルエンジンでモーターを回すなら、\n西瓜も軽油を摂取するのか」
1878 = "「對哦，既然是通過柴油引擎驅動馬達，那西瓜也當然是要喝柴油的」" 

# monologue
# JP: 軽油の二文字に自然とれいなの笑顔が浮かぶ。\nなぜだか、どやぁっと自慢げだ。
2267 = "一想到柴油這兩個字，腦海中就不禁浮現出玲奈的笑容。而不知為何，這個玲奈也是一副驕傲得意的樣子。" 

# monologue
# JP: ただそれだけでなんともリラックスできるから、\n実にれいなは大したものだ。
2332 = "光是想到她，整個人都隨之放鬆了許多，玲奈還真是不得了。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、こちらがメニューになります」
2116 = "「雙鐵先生，這是菜單，請過目」" 

# 【双鉄】
# display as 雙鐵
# JP: 「漢字を見ればなんとなく料理を想像できるのはいいな。\nでは――僕はこの、『[うめさい？　のなにか,3]梅菜扣肉』にしよう」
1645 = "「不過這菜單，只是看漢字就能大致猜到是什麼還挺方便的，我看看——我就選這道有個什麼梅菜的吧」" 

# 【志寰】
# display as 志寰
# JP: 「それは[メイツァイコウロウ,3]梅菜扣肉です、双鉄さん。\n豚肉と、梅菜とを混ぜ込んだ蒸し料理ですね」
2084 = "「這道菜名叫梅菜扣肉，是由梅菜配上豬肉片蒸製而成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、なかなか旨そうだ。\nところで、梅菜とは――いったい、どんな代物だ？」
1958 = "「是這樣，聽起來就很美味可口，不過這個梅菜——到底是什麼菜呢？」" 

# 【志寰】
# display as 志寰
# JP: 「え？　梅菜は……梅菜……だよね、西瓜」
1793 = "「啊？梅菜……就是梅菜……吧，西瓜你說呢」" 

# 【西瓜】
# display as 西瓜
# JP: 「うん、志寰。梅菜は梅菜としか……\n西瓜も――それ以外の説明の言葉を思いつけない」
1803 = "「嗯，志寰說得沒錯。梅菜就是梅菜……西瓜也不知道還能怎麼解釋了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、困らせるつもりはなかった。\n食べてみればわかることだしな」
1780 = "「啊，想不出就別特地想了吧。上來吃了大概就能知道了」" 

# monologue
# JP: そういえば、志寰君と西瓜はほっとしたように\n目と目を見交わし、小さく小さく微笑み合う。
2698 = "聽我這麼說，志寰和西瓜似乎是鬆了口氣，相視一笑。" 

# monologue
# JP: ……まるで僕がわがままな悪役のような感じになったが、\nしかし――うむ。この雰囲気は良いのではないか？
1308 = "……這搞得我像是任性胡來的壞人一樣。不過——嗯，二人間這樣的氣氛倒也不錯。" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　松茸のスープがあると！？」
1722 = "「哇！竟然有松茸湯耶！？」" 

# monologue
# JP: つかのま生じた良い雰囲気が、日々姫の歓声に飛ばされる。
2315 = "但這片刻的好氣氛，卻隨日日姬開心的叫聲一哄而散。" 

# 【日々姫】
# display as 日日姬
# JP: 「したらわたしそれと――あと、この、\nなんか魚って書いてあるやつ！」
2103 = "「那我就要這個——還有這裡寫著什麼什麼魚的這個！」" 

# 【姜】
# display as 姜
# JP: 「白米もご入用ですよね？」
1980 = "「白米飯也要點的吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、お願いします」
1808 = "「嗯，要的，麻煩啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕にも白米をお願いします」
2047 = "「請給我也點白米飯」" 

# 【姜】
# display as 姜
# JP: 「承りました。志寰君」
1952 = "「明白了。志寰」" 

# 【志寰】
# display as 志寰
# JP: 「はい。姜秘書」
1960 = "「是，姜老師」" 

# monologue
# JP: 志寰君と姜さんはウェイトレスさんを呼び寄せて、\n早口でなにかをやりとりし合う。
2496 = "志寰和姜小姐叫來了服務員，快速地交談起來。" 

# 【西瓜】
# display as 西瓜
