# JP: 「姜秘書」
1875 = "「姜老師」" 

# monologue
# JP: ――西瓜はけれど、浮足立たない。\nどころかひどく真剣な顔に戻っている――いや――
1286 = "——但反觀西瓜，卻是冷靜得不行。或者說表情恢復了往常的認真——不對——" 

