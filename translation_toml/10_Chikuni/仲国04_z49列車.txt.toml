1663 = "「作為記錄的畫我別有準備，即便把那張正反兩面去掉，後面白鬍子爺爺那裡我也畫了一張一樣構圖的」" 

# 【志寰】
# display as 志寰
# JP: 「そうなんですか」
2082 = "「這樣啊……」" 

# 【日々姫】
# display as 日日姬
