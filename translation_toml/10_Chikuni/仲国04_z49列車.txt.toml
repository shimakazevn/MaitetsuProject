2114 = "「雖然都是速寫，如果以一張“畫”的角度來看的話，當然還是將其交給能夠用心珍藏的人手裡更好」" 

# 【志寰】
# display as 志寰
# JP: 「もちろん！　一生大事にします。\n僕の、宝物にさせてもらいます」
2107 = "「那是當然！我會一生用心珍藏它的。這就是我的不讓傳寶」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1800 = "「嗯！」" 

# monologue
# JP: 日々姫が手をだす。\n志寰君からスケッチブックを受け取りそのままリレーする。
2611 = "日日姬伸過手來，我也識趣地幫忙把素描簿從志寰手裡遞過去。" 

# monologue
