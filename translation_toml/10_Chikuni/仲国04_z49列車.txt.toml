# JP: 今まで一度も僕らに見せてくれてはいなかった、\n恐らくは、真剣極まる顔になっている。
2793 = "這表情我們迄今為止從未在我們面前展現過，恐怕，是她認真至極的表情。" 

# 【姜】
# display as 姜
# JP: 「日々姫女士がそうおっしゃってくださるなら、\nそれももちろん、よいご視察かと」
1947 = "「日日姬女士既然這麼說的話，那必定也是對考察有所裨益的一環吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「なら。わたしは――西瓜は。\n志寰を描いた一枚を、いただきたいと願います」
1934 = "「既然這樣的話，我——西瓜就斗膽要一張志寰的畫」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1362 = "「——嗯」" 

# monologue
# JP: 言葉が、重い。願いが、強い。\n日々姫も、僕も、ハチロクも、とても笑っていられない。
2755 = "言辭擲地有聲，懇願誠摯真切。日日姬，我，還有八六，也都不禁隨之嚴肅了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった。描くと。志寰君が油断しきって、\n普段の顔ばしているときに、パパって描いちゃう」
1863 = "「妥妥的，給你畫。等志寰不注意的時候，刷刷兩下畫幅平常的表情吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ、ありがとうございます！　それは、この旅の――\n志寰と私の、きっと大切な想い出になります」
2122 = "「非、非常感謝！那，這次旅行——一定會成為志寰和我非常珍貴的回憶的」" 

# 【志寰】
# display as 志寰
# JP: 「僕との大切な想い出って、西瓜」
1709 = "「和我的珍貴回憶……西瓜你」" 

# monologue
# JP: 志寰君さえ、真顔になっている。\nいつものにこにこが消えている。
2483 = "志寰也嚴肅了起來，連一貫掛在臉上的微笑都收了起來。" 

# 【志寰】
# display as 志寰
# JP: 「そんな、なんだか縁起でもない」
1896 = "「怎麼感覺你這話說得很不吉利……」" 

# monologue
# JP:  （どんっ）
2848 = "（咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！！？」
1801 = "「嗯！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　大きなバケツにいっぱいの！\n――なんて見事な石炭の盛り合わせでございましょう！」
1760 = "「啊呀這可真是！竟然這麼滿滿一大桶！這一份煤炭也未免太豐盛了吧！」" 

# monologue
# JP: （どんっ）（どんっ）（どんっ）
2849 = "（咚）（咚）（咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1730 = "「哦——」" 

# monologue
# JP: 石炭バケツを皮切りに、\n料理が次々、テーブル上に並べられていく。
2791 = "這桶煤炭只是開了個頭，菜品隨後一道道都送了上來。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生。西瓜がご飯をよそいましょう」
2115 = "「雙鐵先生，西瓜來給您盛飯吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ――うん。お願いしよう」
1819 = "「嗯？啊……好的，麻煩了」" 

# monologue
# JP: 寄り添っていた志寰君と西瓜とは、最初の距離に――\nあるいは少し、最初より離れた距離に収まっている。
2641 = "本來靠在一起的志寰與西瓜，恢復了最初的距離——或者說，比最初或許還遠了那麼一點點。" 

# 【西瓜】
# display as 西瓜
# JP: 「お茶碗にやまもりにしますか？」
2041 = "「要盛滿一碗嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。八分目程度にしてほしい」
1647 = "「不，八分滿就好了」" 

# monologue
# JP: ……西瓜は、完全に平静な――\n僕らがいつも見ている顔に、戻ってる。
1304 = "……西瓜完全恢復了平靜——回到了她平常的表情。" 

# monologue
# JP: 志寰君は、西瓜を不安げに見ているが……\nここで僕らが蒸し返すべき話題ではないのは確実だ。
2501 = "志寰看向西瓜的眼神中明顯帶著些許的不安……但這個場合，我們也實在不好再多說什麼了。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、『いただきます』が待ち遠しいです。\n何と素敵な気持ちでしょう」
1831 = "「嘻嘻，都要等不及說“我開動了”。這感覺實在太美妙了」" 

# 【日々姫】
# display as 日日姬
# JP: 「よねっ！　わたしの魚もおいしそう～！」
1954 = "「是唄！我點的魚看起來也賊好吃～！」" 

# monologue
# JP: ハチロクも日々姫も同じ気持ちであるのだろう。\n見事なまでに食事モードに切り替えている。
2342 = "八六和日日姬看來真都是這麼覺得的。兩人已經完全進入饕餮模式了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君。これが……梅菜だよな？」
1894 = "「志寰，這就是……梅菜對吧？」" 

# 【志寰】
# display as 志寰
# JP: 「え？　あ、はい！　そうです双鉄さん。\n間違いなく、その豚肉の下の野菜が、梅菜です」
1821 = "「嗯？啊，是的！雙鐵先生，這豬肉下面的，就是梅菜了」" 

# monologue
# JP: 見たことがない。\nあるいは日ノ本には無い野菜だろうか。
2532 = "我從來沒有見過，或許是日本國沒有的品種吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは確かに、梅菜だとしかいえないな。\nどんな味だか、食べてみるのが楽しみだ」
2085 = "「這還真是，除了梅菜也確實沒其他話來解釋了。真期待實際嚐嚐看到底是什麼味道」" 

# 【西瓜】
# display as 西瓜
# JP: 「ふふっ」
1824 = "「嘻嘻」" 

# monologue
# JP: 西瓜が笑う。ほんの小さく。
2735 = "西瓜輕輕一笑。" 

# monologue
# JP: だけれどたったそれだけで、\n食卓の空気がぱあっと晴れる。
2309 = "但僅此而已，就讓整個餐桌上的空氣再次歡快了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「早く食べたいな。あの、姜さん。\n仲国では、食事の開始のときにはどのように」
1857 = "「好想趕快嚐嚐啊。話說，姜小姐，在仲國，開始用餐之前有什麼習慣嗎」" 

# 【姜】
# display as 姜
# JP: 「この場では、主賓のしきたりにあわせましょう。\n双鉄先生の、よろしいように」
1984 = "「目前這場合，我們還是主隨客便吧。雙鐵先生，您請」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですか、では、日ノ本式で」
2095 = "「那就恭敬不如從命，按日本國的方式來了」" 

# monologue
# JP: 背筋を伸ばす。\n背後で日々姫・ハチロクもそうしたことが伝わってくる。
2539 = "我挺直了身板，從椅背上能感覺到身後的日日姬和八六也做出了相同的動作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いただきます」
1917 = "「我開動了」" 

# 【日々姫】
# display as 日日姬＆八六
# JP: 「いただきます！」\n「いただきます」
1918 = "「我開動了！」\\n「我開動了」" 

# monologue
# JP: （カタンコトンカタンコトン）
2852 = "（喀嗒轟隆喀嗒轟隆）" 

# monologue
# JP: 列車の音が、いつもと違う。\n路子がいない。
2364 = "列車的聲音與往常不同。路子不在這裡。" 

# monologue
# JP: それでも、夢なのだと気づく。\n何年ぶりかの、『この夢』なのだと。
2311 = "但就算這樣，我還是注意到了這是夢境之中。要說“這個夢”，倒還真是數年未見了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……珍しいな、夢をみるなど」
1398 = "「……還真是難得啊，竟然又做這個夢了」" 

# monologue
# JP: 夢は深層心理のあらわれと――そんな有名な、\n有名すぎて通俗的ですらある学説のことをふと思う。
1289 = "——我不禁想起那個有名的，實在太有名以至於變得通俗的理論——夢是深層心理的表現。" 

# monologue
# JP: もしもそうなら、路子のいない、空の客車の――\nあの日の夢は、いったい僕の、どんな心理の現れだろう。
2441 = "如果真是這樣的話，那這個沒有路子的空車廂——那天的夢，究竟是表現了我怎樣的心理呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……寂しい、ということもないと思うが」
1380 = "「……寂寞，我覺得應該不是吧」" 

# monologue
# JP: 車窓を見れば、黒一色。\nどうやら夜を抜けているらしい。
2562 = "放眼車窗，漆黑一片。這徹底的黑也很難說是夜色吧。" 

# monologue
# JP: （カタンコトンカタンコトン）
# 2852 = "（喀嗒轟隆喀嗒轟隆）" 

# monologue
# JP: レールの継ぎ目を通過する音が、とても静かだ。
2770 = "車輪碾過鐵軌接縫的聲音，輕得不可思議。" 

# monologue
# JP: 現実よりも――過去よりも。\nよほど上等なレールの上を、僕は走っているらしい。
2651 = "無論是較諸現實，還是較諸過去，這車廂下的鐵軌顯然要高級得多了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……目覚めるためには、\nいったいどうすればいいのかな」
1400 = "「……那現在我又要怎樣才能醒來呢」" 

# monologue
# JP: ここにはもう、なんの未練もないはずだ。\nお別れならば、とっくにきちんと、済ませたはずだ。
2530 = "我對這裡，應該早已沒有任何的留戀。要說道別，在許久之前也已乾脆地做了了斷。" 

# monologue
# JP: 見るべき夢は、もう過去には無く。\nただ未来にのみ、あるはずだから。
2535 = "我應夢到之物，早已不再存在於過去，夢境所現，皆應是未來願景。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1752 = "「啊——」" 

# monologue
# JP: 光だ。車窓の外から、不意に。
2334 = "光芒，不知何時從窗外投射而入。" 

# monologue
# JP: まるでカーテンをほんの僅かだけ開いた様な、\n静かな光が――
2466 = "就如窗簾被掀開一角一般，靜靜地傾瀉在車廂內——" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁ――」
# 1752 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……む」
1796 = "「嗯……唔」" 

# 【日々姫】
# display as 日日姬
# JP: 「！」
# 2142 = "「！」" 

# monologue
# JP: （カリカリ――シャッ――シャーーーッ）
2850 = "（唰啦唰啦——沙——沙————）" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 日々姫だ。\n暗闇のなか、ぼんやりと――
2637 = "是日日姬。不過夜深光暗，看不真切——" 

# monologue
# JP: ああ……夜か。\nつまりは僕は、眠っていたのか。
2402 = "啊……確實是夜裡。也就是說我這是醒來了嗎。" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 夜の真ん中。わずかに開いたカーテンから、\n何かを日々姫は、一心不乱にスケッチしている。
2688 = "而在這夜深人靜中，日日姬透過窗簾掀開的一角觀察，又在專心致志地畫著什麼。" 

# monologue
# JP: （一体何を――――っ！）
2846 = "（到底是————！）" 

# monologue
# JP: 星、だ。\nなんと美しい星々だろう。
2635 = "是……星光。這星光是多麼美麗啊。" 

# monologue
# JP: ホームの上に、まばゆい星が散りばめられている。\nホームを照らす灯として、ホームに眠る車窓の灯として。
2683 = "耀眼的星光灑落在站台上。化作照亮站台的燈火，化作了沉眠在站台的車窗的燈火。" 

# monologue
# JP: （緑比車の……あれは回送列車か？\n車内灯をつけ、清掃作業をしているのだろうか）
2858 = "（綠比車……那是車底回送嗎？車廂裡亮著燈，是在進行打掃嗎？）" 

# monologue
# JP: 人の気配を感じない。\n遠くのホームの緑比車にも、僕らの横たわる寝台にも。
2339 = "全然感覺不到其他人的氣息。無論是從遠處站台邊的綠比車上，還是我們周遭的鋪位上。" 

# monologue
# JP: 全てが、寝静まっている。\n日々姫が鉛筆を走らせる、その音だけを例外として。
2557 = "所有一切，都是如此寂靜。而打破這寂靜的唯一例外，就來自日日姬手中的鉛筆。" 

# monologue
# JP: （シャーーっ、サッ、サッ――カリカリ、カリカリっ）
2855 = "（沙——沙沙——唰啦唰啦，唰啦唰啦）" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やがて、ピタリと。日々姫の鉛筆の音が止まる。\n一瞬おいて、音の種類ががらりとかわる――！
2692 = "而就在此時，日日姬突然止住了手中的筆。而聲音也隨之變化——！" 

# 【日々姫】
# display as 日日姬
# JP: 「――」
1361 = "「——」" 

# monologue
# JP: ページを開いたスケッチブックに鉛筆を乗せ、\n日々姫が僕に手渡してくる。
2618 = "日日姬把鉛筆放在了攤開的素描簿上，一起遞了過來。" 

# monologue
# JP: 受け取り見れば、人の作った星明りの下、\n日々姫の文字がぼんやり浮かぶ。
2561 = "接過素描簿，就著這人造的星光，朦朧地辨出日日姬寫的字——" 

# monologue
# JP: 《起こしちゃったの、ごめんなさい》
1328 = "《不好意思，把你吵醒了》" 

# monologue
# JP: 口を開けば、この静寂はこわれてしまう。\n誰かが起きれば、この美しさは剥がれてしまう。
2513 = "我不敢開口，唯恐打破這份寂靜。若是吵醒了誰，這寂靜的美怕就要被破壞殆盡。" 

# monologue
# JP: 僕も日々姫も理解している。\nだから、こわさぬように振る舞う。
2471 = "就這一點我和日日姬取得了共識。所以心有靈犀地互相配合著。" 

# monologue
# JP: 《いいや、構わん。\nおかげで素晴らしい光景を目にできた》
1350 = "《沒事，沒關係。我反而多虧了你才看到了這麼漂亮的光景》" 

# monologue
# JP: 窓の外へとまた目を向ける。旅だと感じる。\n不意に、強く。どうしようもないほど強く。強く。
2357 = "再看向窗外，旅行的感覺不由地撲面而來，而且一波未平一波又起。" 

# monologue
# JP: これは視察で、仕事で、同時に家族旅行で。\nそうありながら、僕の旅であり、日々姫の旅だと。
2644 = "此行是考察，是工作，但也是一家人的旅行。因而，這是我的旅途，同樣也是日日姬的旅途。" 

# monologue
# JP: 《あの緑比車は、素晴らしい旅をしてきたのだろうな》
1331 = "《不知那輛綠比車，是不是有經歷了一場暢快的旅行呢》" 

# monologue
# JP: 書いて渡せば、またすぐに日々姫の文字が戻されてくる。
2800 = "遞過素描簿，片刻間日日姬便寫下話語遞了回來。" 

# monologue
# JP: 《よね。しあわせそうに、眠っとるもん》
1339 = "《應該是吧，它在站台邊睡得多香甜幸福啊》" 

# monologue
# JP: ああ――日々姫もか。\n車内灯をともしていても、眠っていると、やはり見えるか。
2404 = "啊，日日姬也這麼覺得啊。哪怕車廂裡燈火通明，列車也依然是在香甜的夢中。" 

# monologue
# JP: うれしくなる。そんなささやかな気持ちの一致が。\n日々姫は家族で、妹なのだと、今更ながらつくづく思う。
2792 = "這樣些許的一致讓一絲開心湧上心頭。同時越來越深感日日姬果然是我的家人，我的妹妹。" 

# monologue
# JP: 《美しいものだな。列車が眠る姿というのは》
1333 = "《列車睡著的樣子真是美啊》" 

# monologue
# JP: 《うん》
1337 = "《嗯》" 

# monologue
# JP: それだけ書いたスケッチブックを、\n日々姫はすぐに、戻して戻してと手振りしてくる。
2524 = "我剛寫了這一點，日日姬就揮手讓我趕快還給她。" 

# monologue
# JP: 《向こうから誰か見とったら、\nこっちの列車は、どぎゃん景色に見えるとかねぇ？》
1330 = "《不知道對面要是有人朝這邊瞅的話，又會看到怎麼樣的景色咧？》" 

# monologue
# JP: 《さぁ、どうだろう。まるでわからん――》
1358 = "《這就不知道囉——》" 

# monologue
# JP: そこで手を止め、想像してみる。
2521 = "我停下了手，讓想像展翅翱翔。" 

# monologue
# JP: 向こうの列車に僕が乗り――\n僕を見ている日々姫を見る、と。
2509 = "想像自己坐在對面的列車上，看著望向自己的日日姬時，眼中的景色——" 

# monologue
# JP: 《きっと、同じくらい。\nいや、より美しく見えようかと思う》
1327 = "《一定同樣美麗吧。不，我覺得應該會更美吧》" 

# monologue
# JP: 《そかな？　どうかな？　そぎゃんだったら嬉しかとね。\n実際に見れんのば残念だけど》
1349 = "《是嗎？這可不一定哦？真這樣的話倒是挺讓人開心的。不過沒機會親眼目睹就挺遺憾了》" 

# monologue
# JP: 《そうだな。見てみたくあるよな》
1345 = "《是啊。越說越想看看了》" 

# monologue
# JP: 声を出さずに、言葉を交わす、こころを交わす。\n真夜中の、異国の旅の、寝台越しの、文通で。
2472 = "就這樣，兩人一言不發地交流著心聲。夜闌人靜，異國他鄉，越過鋪位，以筆代口。" 

# monologue
# JP: 日々姫の一文字一文字が、ともに隠れ見るこの光景が、\n僕の体とこころに旅情を、いと心地よく満たしてくれる。
2617 = "日日姬寫的一字一句，一同悄悄眺望的景致，讓我的身心充滿了輕快的遠遊之情。" 

# monologue
# JP: 《ずっと、日々姫は起きていたのか？》
1342 = "《日日姬你是一直都沒睡嗎？》" 

# monologue
# JP: 《ううん、偶然。目がさめちゃって、\nなんか見えるかなってカーテンめくったら、この景色で》
1340 = "《才不是咧，只是碰巧醒了，心想能不能瞅見點什麼拉開窗簾這麼一瞄，就看到了這個景色咯》" 

# monologue
# JP: 《それは素晴らしい偶然だな。\nいっそ、運命的とも思える》
1359 = "《這還真是一次絕妙的偶然。簡直給人命中注定的感覺》" 

# monologue
# JP: 日々姫の鉛筆がスラスラ動く。\nほんの一瞬だけ止まる。
2628 = "日日姬落筆的手突然停滯了一下。" 

# monologue
# JP: そうして何かを書き足して、\nスケッチブックはまた戻ってくる。
2693 = "而後她繼續揮筆寫完，遞了過來。" 

# monologue
# JP: 《運命だったら――――素敵ね。まっこと》
1353 = "《要說命中注定的話————倒真是美妙至極》" 

# monologue
# JP: 頷いている。\n誰の目にさえ触れぬであろうとわかっていても。
2547 = "我點頭表示贊同。即便日日姬未必看得真切，她想必也能感受得到吧。" 

# monologue
# JP: 《ああ。本当に素敵だな》
1348 = "《是啊，確實是美妙至極》" 

# monologue
# JP: スケッチブックを、たたんで戻す。\n日々姫も受け取ったまま、開かずにおく。
2536 = "我把素描簿合起來還了回去。日日姬接過後也不打開，便直接放在了枕邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……………………」
1367 = "「……………………」" 

# 【日々姫】
# display as 日日姬
# JP: 「……………………」
# 1367 = "「……………………」" 

# monologue
# JP: 路子とむかし――\n遠いむかしに、こんな夜を過ごした気がする。
2416 = "在那久遠的往昔，我與路子——似乎也曾共度過這樣的夜晚。" 

# monologue
# JP: 言葉一つさえ雑音になる、世界と僕らが溶け合うような\n――とても、とても静かな時間を。
2808 = "隻言片語亦顯嘈雜，我們彷彿與這世界融為了一體，一同度過了無比寂靜的時光。" 

# monologue
# JP: （あ――）
2851 = "（啊——）" 

# monologue
# JP: 動き出す音が聞こえなかった。
2541 = "我甚至都沒聽到起步的聲音。" 

# monologue
# JP: この窓からは確認できない牽引機関車の動力音も、\n客車が牽かれ、レールを走るその音さえも。
2786 = "透過這車窗，不要說機車引擎的轟鳴，連列車在鐵軌上行駛的聲音都聽不到。" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 日々姫の視線をふわりと感じて、目を向ける。\n日々姫は僕に、くちびるだけで話しかけてくる。
2533 = "我感受到日日姬輕柔的視線，便轉過頭去。她在開口向我說話——卻沒有絲毫的聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 『いっちゃったね』と、唇の声。\n読唇術など覚えもないが、それでもはっきり伝わってくる。
2434 = "她的口型是在說“開走了吶”。雖然我並不會看口型，但日日姬的話卻毫無阻滯地傳達到了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 『ああ、いったな』と、僕も唇だけで応える。
1293 = "“是啊，開走了”，我也以同樣的方式答道。" 

# monologue
# JP: 魔法の時間はきっともうすぐ解けてしまうが、\n今なら絶対つたわると、僕にも確信できている。
2831 = "魔法的時光想必難以長久，但在目前的片刻，我相信她也一定能夠理解。" 

# monologue
# JP: （おやすみ、日々姫）
2854 = "（日日姬，晚安）" 

# monologue
# JP: （おやすみ、にぃに）
2862 = "（阿哥，晚安）" 

# monologue
# JP: 声を出さずに、文字さえ書かずに、伝え合う。
2652 = "無需聲音，甚至無需文字，卻可心意相通。" 

# monologue
# JP: 日々姫の指がゆっくりと――\nカーテンを閉じ、魔法の夜を黒一色で塗りつぶす。
2678 = "窗簾緩緩地從日日姬收回的指尖滑落——魔法的夜晚又浸入了漆黑之中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1368 = "「…………」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 暗闇。\nまことの夜の暗さだ。
2304 = "伸手不見五指，是真正屬於夜晚的顏色。" 

# monologue
# JP: それが、どこまでも心地よい。
2372 = "卻讓我心頭無比舒暢。" 

# monologue
# JP: （カタンコトンカタンコトン）
# 2852 = "（喀嗒轟隆喀嗒轟隆）" 

# monologue
# JP: いつの間に、僕らの列車も滑り出している。
2278 = "不知何時，我們的列車也駛離了站台。" 

# monologue
# JP: さらなる夜更けと、夜明けに向けて――\nその先に待つ、聖都に向けて。
2825 = "駛向更深的深夜，駛向明天的黎明——以及在前方等待著我們的，盛都。" 
