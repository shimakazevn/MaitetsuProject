# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やはりにこにこ――いや、ニヤニヤか？
2385 = "只見她們面帶笑容——不對，這笑容還真是別有用心。" 

# monologue
# JP: 照れくさそうにも見える笑顔で、\n必死に声をおしころしている風情と見える。
2431 = "她們的笑容似乎夾帶幾分羞澀，卻又好像是在拚命在忍著不要笑出聲。" 

# 【志寰】
# display as 志寰
# JP: 「ああ、この絵は特にいい」
1790 = "「啊，這張特別棒」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1755 = "「啊」" 

# monologue
# JP: 見ずともわかる――\nそれほどの手応えの絵だったのだろうか？
2612 = "日日姬似乎不用看都猜到了志寰說的是哪一張畫——莫非那真是她獨一無二的得意之作嗎。" 

# monologue
# JP: 志寰君の手元を確かめることもせず、\n日々姫は満足げな声をだす。
