# lines: 455 
# 【ハチロク】
# display as 八六
# JP: 「ああ、なんと懐かしく、\nなんと嬉しいことでしょう！！！」
1791 = "「A, thật là hoài niệm,\nvà cũng thật là vui sướng biết bao!!!」"

# monologue
# JP: 三段寝台を目の当たりにするなり、感極まったような声。
2661 = "Ngay khi tận mắt nhìn thấy giường ba tầng,\nem ấy đã thốt lên một giọng đầy xúc động."

# 【ハチロク】
# display as 八六
# JP: 「わたくし、\n一度でいいから寝台車での旅をしてみたかったのです」
1991 = "「Tôi,\nchỉ muốn được một lần trải nghiệm chuyến\ndu lịch bằng tàu giường nằm thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\n一度も経験がないというのは、意外だな」
2083 = "「Vậy sao.\nThật bất ngờ khi em chưa từng có kinh\nnghiệm đó.」"

# 【ハチロク】
# display as 八六
# JP: 「珍しいことではございませんよ？\nレイルロオドの客車乗車自体が稀ですし」
2080 = "「Cũng không có gì lạ đâu ạ?\nBản thân việc Railord lên toa hành khách\nđã là chuyện hiếm rồi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。言われてみればそうだったか」
1740 = "「A. Nghe em nói mới nhớ ra.」"

# 【ハチロク】
# display as 八六
# JP: 「それに、寝台客車は……わたくし、帝鉄時代には、\n牽引したことさえございませんでしたので」
2007 = "「Hơn nữa, toa khách giường nằm thì…… vào\nthời Đường sắt Hoàng gia,\ntôi thậm chí còn chưa từng kéo chúng bao\ngiờ.」"

# 【西瓜】
# display as 西瓜
# JP: 「昼行列車だけしか牽引しなかったのですか？」
1837 = "「Chị chỉ kéo những chuyến tàu chạy ban\nngày thôi sao?」"

# monologue
# JP: 西瓜の驚いたような声。\nとなればかなり、例外的なことなのかもしれん。
2729 = "Giọng nói đầy ngạc nhiên của Suika.\nNếu vậy thì, có lẽ đó là một điều khá\nngoại lệ."

# 【ハチロク】
# display as 八六
# JP: 「夜行列車なら牽くこともございました。\nですけれど残念なことに、寝台客車とはご縁がなくて」
1903 = "「Tôi cũng từng kéo những chuyến tàu chạy\nđêm.\nNhưng thật đáng tiếc, tôi lại không có\nduyên với toa khách giường nằm.」"

# monologue
# JP: ハチロクの視線が上へ向く。\n最上段を、眩しいもののように見上げている。
2348 = "Ánh mắt của Hachiroku hướng lên trên.\nEm ấy đang ngước nhìn tầng trên cùng, như\nthể đang nhìn một thứ gì đó chói lóa."

# 【ハチロク】
# display as 八六
# JP: 「ですので、全く知らないのです。\n寝台の寝心地も、あたたかさも、夜の静けさも」
1923 = "「Vì vậy, tôi hoàn toàn không biết gì cả.\nCảm giác nằm trên giường, sự ấm áp, hay sự\ntĩnh lặng của màn đêm.」"

# 【西瓜】
# display as 西瓜
# JP: 「夜は、確かに静かです。\n消灯後には、本当に誰一人、言葉を発しなくなります」
1963 = "「Ban đêm, quả thực rất tĩnh lặng.\nSau khi tắt đèn, thực sự sẽ không còn ai\ncất tiếng nói nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ……でしたら、カタン、コトンと。\nただこのこだけが歌い続けるのですね？」
1734 = "「A…… Nếu vậy thì, lạch cạch, xình xịch.\nChỉ có đứa bé này tiếp tục hát thôi nhỉ?」"

# 【西瓜】
# display as 西瓜
# JP: 「そうなります。けれど、他の点はきっと少し想像と」
1839 = "「Sẽ là như vậy ạ. Nhưng, những điểm khác\nchắc chắn sẽ hơi khác so với tưởng tượng.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ！　これが三段寝台！？　低かね！　天井！\n座ってるだけでも窮屈そう――っていうか座れない！？」
1724 = "「Oa! Đây là giường ba tầng sao!? Thấp quá!\nTrần nhà ấy!\nChỉ ngồi thôi cũng thấy chật chội rồi——hay\nđúng hơn là không thể ngồi được!?」"

# monologue
# JP: 日々姫だ。\n先日の反省を活かしたらしい。
2699 = "Là Hibiki.\nCó vẻ như em ấy đã rút kinh nghiệm từ sự\ncố hôm trước."

# monologue
# JP: 姜さんと志寰くんとを引き連れて、\nしかも極めて短時間で、スケッチを終えて戻ってきた。
2413 = "Em ấy dẫn theo cô Jiang và Zhihuan,\nhơn nữa còn hoàn thành việc phác họa trong\nthời gian cực ngắn rồi quay lại."

# 【双鉄】
# display as 雙鐵
# JP: 「描けたか？」
1976 = "「Vẽ xong rồi sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「描けたと！　東富4D！！\n西瓜ちゃんの、一番若い世代の妹ちゃん！！」
1977 = "「Vẽ xong rồi ạ! Dongfu 4D!!\nLà những đứa em gái thế hệ trẻ nhất của\nSuika!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1799 = "「Hừm.」"

# monologue
# JP: 外国人が集団でホームを長時間うろつくことは、\nあらぬ嫌疑を呼びかねない、と。
2265 = "Việc một nhóm người nước ngoài đi lang\nthang trên sân ga trong thời gian dài,\ncó thể sẽ gây ra những nghi ngờ không đáng\ncó."

# monologue
# JP: 姜さんのその判断に従って、ホーム視察は日々姫に任せ、僕とハチロクは一足先に客車に入っていたわけだけれど。
2553 = "Theo quyết định đó của cô Jiang, chúng tôi\ngiao việc khảo sát sân ga cho Hibiki, còn\ntôi và Hachiroku thì vào trong toa hành\nkhách trước một bước."

# 【双鉄】
# display as 雙鐵
# JP: 「……よく描けているな。楽しげだ。\n旅に出る前の空気感は、日ノ本も仲国も変わらんな」
1392 = "「……Vẽ đẹp lắm. Rất có hồn.\nBầu không khí trước khi khởi hành cho một\nchuyến đi, dù là Hinomoto hay Zhongguo thì\ncũng không khác biệt mấy nhỉ.」"

# monologue
# JP: 日々姫が描いた一見乱雑な線はけれども、東富4Dの勇姿\nだけにはとどまらず、駅全体の旅立ち前を閉じ込めている。
2812 = "Những đường nét thoạt nhìn có vẻ lộn xộn\nmà Hibiki đã vẽ, không chỉ dừng lại ở dáng\nvẻ oai phong của Dongfu 4D,\nmà còn gói gọn cả bầu không khí trước giờ\nkhởi hành của toàn bộ nhà ga."

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに。わたし、中段もらってよかと？」
1745 = "「Đúng không? Anh hai. Em lấy giường tầng\ngiữa được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ――そうか。中段がもっとも\n窓を大きく使えるのだな。無論、僕には異論ないが」
1810 = "「Hửm? A——Ra là vậy. Tầng giữa là nơi có\nthể\nsử dụng cửa sổ lớn nhất nhỉ. Tất nhiên,\nanh không có ý kiến gì, nhưng」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、残った寝台でもちろん問題ございません」
1914 = "「Tất nhiên tôi không có vấn đề gì với\nchiếc giường còn lại ạ.」"

# monologue
# JP: そういいつつも、ハチロクの目はちらちら\n上段へと向いてしまう。
2408 = "Mặc dù miệng nói vậy, nhưng ánh mắt của\nHachiroku cứ liên tục\nliếc lên tầng trên cùng."

# monologue
# JP: あれほど切望するものならば、\nできれば叶えてやりたくもある。
2437 = "Nếu em ấy đã khao khát đến thế,\nthì tôi cũng muốn cố gắng đáp ứng nếu có\nthể."

# 【双鉄】
# display as 雙鐵
# JP: 「姜さんたちはいかがでしょうか？」
1868 = "「Mọi người thấy sao, cô Jiang?」"

# 【姜】
# display as 姜
# JP: 「私と志寰君は下段にいたほうが便利かと。\n出入りなども多くなりましょうから」
1904 = "「Tôi và Zhihuan ở tầng dưới có lẽ sẽ tiện\nhơn.\nVì chúng tôi có thể sẽ phải ra vào nhiều\nlần.」"

# 【志寰】
# display as 志寰
# JP: 「なら、日々姫さんの真下に僕が。\n姜秘書は、双鉄さんの真下がいいでしょう」
2100 = "「Vậy thì, tôi sẽ nằm ngay dưới chị Hibiki.\nThư ký Jiang nằm ngay dưới anh Soutetsu là\nhợp lý nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ、そうか。斜めの関係になると、\n相手の姿が丸見えになってしまうのか」
1812 = "「Hửm? A, ra là vậy. Nếu nằm chéo nhau,\nthì sẽ nhìn thấy rõ đối phương mất.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――ベッドサイドにカアテンが無いのですね。\nここは、日ノ本の寝台と異なりますね」
1753 = "「A——Bên cạnh giường không có rèm che nhỉ.\nĐiểm này thì khác với giường nằm ở\nHinomoto ạ.」"

# monologue
# JP: ならば……うむ。\n寝台配置は理屈で決めていけるか。
2571 = "Nếu vậy thì…… ừm.\nCó thể sắp xếp vị trí giường nằm theo\nlogic được không nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「進行方向側寝台の上段が西瓜、中段に僕、下段が姜さん。\n逆側寝台の上段がハチロク、中段日々姫で下段志寰君」
2056 = "「Giường nằm cùng chiều hướng tàu chạy:\ntầng trên là Suika, tầng giữa là tôi, tầng\ndưới là cô Jiang.\nGiường nằm ngược chiều: tầng trên là\nHachiroku, tầng giữa là Hibiki và tầng\ndưới là Zhihuan.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにから見えるのがハチロクとわたしと志寰君。\n志寰君から見えるのが、西瓜ちゃんとにぃにと姜さん」
2111 = "「Từ chỗ anh hai có thể nhìn thấy\nHachiroku, em và Zhihuan.\nTừ chỗ Zhihuan có thể nhìn thấy Suika, anh\nhai và cô Jiang.」"

# monologue
# JP: 日々姫ハチロク西瓜が視線を交わし合い、すぐに深く頷く。
2626 = "Hibiki, Hachiroku và Suika trao đổi ánh\nmắt, rồi lập tức gật đầu sâu."

# 【姜】
# display as 姜
# JP: 「当方としても、その寝台配置で問題ありません。\nでしたら、荷物を――まずは大物を下段寝台の下に」
1907 = "「Về phía chúng tôi, việc bố trí giường nằm\nnhư vậy không có vấn đề gì.\nVậy thì, hãy để hành lý——trước tiên là\nnhững món đồ lớn xuống dưới gầm giường\ntầng dưới.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。トランクなどをベッドの下に、か」
1684 = "「Ra là vậy. Vali và những thứ tương tự sẽ\nđể dưới gầm giường sao.」"

# 【姜】
# display as 姜
# JP: 「そうしたら、上段の方々から上にどうぞ」
2108 = "「Sau khi xong, xin mời những người ở tầng\ntrên lên trước.」"

# 【ハチロク】
# display as 八六
# JP: 「どうぞ、とおすすめいただきましても――\nええと、はしごはどこでしょう？」
2073 = "「Dù cô có mời lên trước thì——\nỪm, thang ở đâu vậy ạ?」"

# 【西瓜】
# display as 西瓜
# JP: 「はしごは無いですね。けれど、ここ。\nこの突起を引っ張り出すとステップになります」
1965 = "「Không có thang đâu ạ. Nhưng mà, ở đây\nnày.\nChỉ cần kéo phần nhô ra này là sẽ thành\nbậc bước lên.」"

# monologue
# JP: いうなりするする、\n西瓜はブーツを脱いでそろえて、最上段へと登る。
2803 = "Vừa nói, Suika vừa thoăn thoắt\ncởi giày bốt xếp ngay ngắn, rồi trèo lên\ntầng trên cùng."

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁ。なんと身軽なことでしょう」
1716 = "「Oa. Thật là nhanh nhẹn.」"

# monologue
# JP: とはいえ、ハチロクも外観印象よりはよほど身軽だ。\nランボードの上でのみのこなしなど、僕よりよほど――
2756 = "Tuy nói vậy, nhưng Hachiroku cũng nhanh\nnhẹn hơn nhiều so với ấn tượng bề ngoài.\nSự linh hoạt của em ấy khi đi trên bệ bước\nchân hành lang, còn hơn tôi rất nhiều——"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま……その……\nわたくし、スカアトでございますので」
2118 = "「Ngài Soutetsu…… ừm……\nVì tôi đang mặc váy nên……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、そうか。すまない」
1815 = "「Hửm? A, đúng rồi. Xin lỗi nhé.」"

# monologue
# JP: 視線を外せば、ハチロクもすぐに上段まで登ったようだ。
2544 = "Khi tôi quay đi chỗ khác, Hachiroku dường\nnhư cũng đã nhanh chóng trèo lên tầng\ntrên."

# 【ハチロク】
# display as 八六
# JP: 「うふふ、とても高うございます。\n寝台は……ああ、ちゃんと柔らかではないですか」
1830 = "「Ufufu, cao quá ạ.\nGiường nằm…… A, cũng mềm mại lắm đúng\nkhông ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1735 = "「Ồ.」"

# monologue
# JP: 僕と日々姫も中段へ。\n……確かにひどく屋根は低くて窮屈だけれど、窓は大きい。
2525 = "Tôi và Hibiki cũng lên tầng giữa.\n……Đúng là trần nhà rất thấp và chật chội,\nnhưng cửa sổ lại rất lớn."

# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1795 = "「Ưm……」"

# monologue
# JP: 日々姫はもう、スケッチブックを広げている。\nペンが走る音にも、いつも以上の勢いがある。
2758 = "Hibiki đã mở sổ phác thảo ra rồi.\nÂm thanh ngòi bút lướt trên giấy cũng mạnh\nmẽ hơn thường ngày."

# 【姜】
# display as 姜
# JP: 「いかがでしょうか？　お望みの三段寝台は」
2048 = "「Mọi người thấy sao? Chiếc giường ba tầng\nnhư mong muốn.」"

# 【志寰】
# display as 志寰
# JP: 「なにか不便があったら、すぐに言ってください」
2039 = "「Nếu có gì bất tiện, xin hãy nói ngay\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とのことだが、どうだ？　ふたりは」
1656 = "「Hai người họ nói vậy đấy, hai em thấy\nsao?」"

# 【ハチロク】
# display as 八六
# JP: 「まことにたのしうございます！\n横になりながら、うふふっ、列車の旅を楽しめるなんて」
2014 = "「Thực sự rất vui ạ!\nVừa nằm, ufufu, vừa tận hưởng chuyến du\nlịch bằng tàu hỏa thế này.」"

# 【日々姫】
# display as 日日姬
# JP: 「ん……走り出すの、ば――待ち遠しか…………」
1750 = "「Ưm…… mong lúc tàu bắt đầu chạy ghê…………」"

# 【双鉄】
# display as 雙鐵
# JP: 「とのことです」
1898 = "「Họ nói vậy đó.」"

# monologue
# JP: ふふっ、と帰ってくる笑いは、\nとてもやわらかであたたかだ。
2685 = "Tiếng cười \"Fufu\" đáp lại,\nthật mềm mại và ấm áp."

# monologue
# JP: まだ走り出してもいないのに、三段寝台の狭さはどうやら、\nこころの距離を縮めてくれ――おっ！？
2802 = "Dù tàu còn chưa chạy, nhưng sự chật hẹp\ncủa chiếc giường ba tầng này có vẻ như\nđã thu hẹp khoảng cách giữa những trái\ntim——Ô!?"

# 【日々姫】
# display as 日日姬＆八六
# JP: 「あ」\n「まぁ」
1756 = "「A」\n「Oa」"

# monologue
# JP: 目立った振動。
2666 = "Một chấn động rõ rệt."

# monologue
# JP: 上等の滑り出しとは思えぬが……あるいは\x%l蒸機;#00ffc040;蒸機%l;#;とちがい、なめらかには引き出せないものなのだろうか？
2507 = "Không thể coi đây là một cú khởi hành mượt\nmà xuất sắc được…… Hay là khác với \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#;\n,\nnó không thể kéo đi một cách trơn tru được\nnhỉ?"

# 【西瓜】
# display as 西瓜
# JP: 「この機関士とレイルロオドは、経験が浅いようですね」
2078 = "「Có vẻ như người lái tàu và Railord này\nkinh nghiệm còn non nớt nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: 珍しく、西瓜がはっきり不満の色をにじませている。\n……レイルロオドにこうした言葉もどうかと思うが――
2725 = "Hiếm khi thấy Suika thể hiện sự bất mãn rõ\nràng như vậy.\n……Dùng những lời lẽ như vậy với một\nRailord thì không biết có ổn không,\nnhưng——"

# monologue
# JP: 『人間らしい』ところを見せてもらえたような気がして、\nほんの少しだけうれしくも思う。
2313 = "Cảm giác như được thấy một khía cạnh 『Rất\ncon người』 của em ấy,\nkhiến tôi cũng cảm thấy vui lên một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。加速がいいな、素晴らしい」
1775 = "「A. Gia tốc tốt đấy, tuyệt vời.」"

# monologue
# JP: 8620では――\nというか、蒸気機関では到底真似のできない加速だろう。
2511 = "Với 8620——\nHay nói đúng hơn là, với động cơ hơi nước\nthì đây là một gia tốc không thể nào bắt\nchước được."

# monologue
# JP: あっという間に北琴西駅の長いホームが車窓から去る。
2773 = "Chỉ trong chớp mắt, sân ga dài của ga\nBeiqin Tây đã lùi lại phía sau cửa sổ."

# 【ハチロク】
# display as 八六
# JP: 「……振動は、引き出しのときだけですね。\nこの速度だというのに、驚くほどに揺れません」
1404 = "「……Chỉ có chấn động lúc mới kéo đi thôi\nnhỉ.\nDù đang chạy với tốc độ này, nhưng tàu lại\nkhông hề rung lắc một cách đáng ngạc\nnhiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。やはり軌間が広いことの影響だろうか。無論、\n足回り等も、日ノ本より進歩しているのかもしれんが」
1805 = "「Ừm. Quả nhiên là nhờ ảnh hưởng của khổ\nđường ray rộng sao. Tất nhiên,\nhệ thống gầm xe và những thứ khác cũng có\nthể đã tiến bộ hơn Hinomoto.」"

# monologue
# JP: 他の乗客たちもそれぞれに寝台を整えおえたか、\n通路側のざわめきも、だいぶん賑やかになってきた。
2809 = "Có lẽ các hành khách khác cũng đã sắp xếp\nxong chỗ ngủ của mình,\nnhững tiếng ồn ào phía lối đi cũng đã trở\nnên náo nhiệt hơn hẳn."

# monologue
# JP: とはいえ、ハチロクとの共感がある。\n僕らの声は、西瓜には間違いなく届いていようが――
2280 = "Tuy nhiên, tôi có cộng cảm với Hachiroku.\nChắc chắn Suika cũng có thể nghe thấy\ngiọng nói của chúng tôi, nhưng——"

# 【西瓜】
# display as 西瓜
# JP: 「…………」
1368 = "「…………」"

# monologue
# JP: しかし、西瓜は何も答えない。\n穏やかな顔でにこにこしている。
2389 = "Nhưng Suika lại không trả lời gì cả.\nChỉ mỉm cười với một khuôn mặt bình yên."

# monologue
# JP: 問えばもちろん答えはすぐに返るのだろうが、\n今しばらくはせっかくだ。“見知らぬ鉄路”を堪能しよう。
2519 = "Tất nhiên nếu hỏi thì sẽ nhận được câu trả\nlời ngay thôi,\nnhưng hiếm khi có dịp. Hãy tận hưởng\n\"Tuyến đường sắt xa lạ\" này một lúc đã."

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1737 = "「Ôi chà.」"

# monologue
# JP: 音楽だ。チャイムではなく、楽曲――歌曲、歌謡曲。\n多分、アイドルとかその辺の歌だろう。
2819 = "Là âm nhạc. Không phải tiếng chuông báo,\nmà là một bản nhạc——ca khúc, nhạc nhẹ.\nCó lẽ là bài hát của một thần tượng nào đó\nchăng."

# monologue
# JP: ……まるまる一曲流されそうな気配だが、これはいわゆる、ＢＧＭ的なサービスだろうか。
1300 = "……Có vẻ như họ định phát trọn vẹn cả bài\nhát, đây có phải là dịch vụ nhạc nền (BGM)\nkhông nhỉ."

# 【ハチロク】
# display as 八六
# JP: 「お歌が……車内放送で流れるのですね。\n日ノ本でしたら、邪魔にされる方もいそうですが」
2087 = "「Bài hát…… được phát qua loa phát thanh\ntrên xe nhỉ.\nNếu là ở Hinomoto, chắc sẽ có người cảm\nthấy bị làm phiền mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一つの文化、といったものなのだろうな……。\nうん。特段、誰も気にしている気配すらない」
1920 = "「Chắc đây là một nét văn hóa của họ……\nỪm. Đặc biệt là không có dấu hiệu nào cho\nthấy có ai bận tâm cả.」"

# 【姜】
# display as 姜
# JP: 「お話のところをすみません。\n皆さんのきっぷをお渡しいただけますか？」
1927 = "「Xin lỗi vì đã cắt ngang câu chuyện.\nMọi người có thể đưa vé cho tôi được\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　きっぷですか？　わかりました。\nハチロク。日々姫。きっぷを」
1822 = "「Hửm? Vé sao? Tôi hiểu rồi.\nHachiroku. Hibiki. Đưa vé đây.」"

# 【日々姫】
# display as 日日姬
# JP: 「ん……いま、手離せんけん、とって。\n私の、ポーチの中やけん」
1798 = "「Ưm…… Giờ em đang không rảnh tay, anh lấy\ngiúp em với.\nNó ở trong túi nhỏ của em ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった、預かるぞ」
1858 = "「Anh biết rồi, anh sẽ giữ hộ.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしの分はこちらです」
2001 = "「Phần của tôi đây ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。姜さん、どうぞ」
2049 = "「Cảm ơn. Cô Jiang, đây ạ.」"

# monologue
# JP: そうか、なるほど。検札か。
2373 = "Ra là vậy. Soát vé sao."

# monologue
# JP: 車掌さんが来ていることに、\nまるで気がついていなかった――っと、と？
2520 = "Chúng tôi hoàn toàn không nhận ra\nsự xuất hiện của người trưởng tàu——khoan,\nhửm?"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1715 = "「Oa.」"

# monologue
# JP: 全員のきっぷが、取り上げられて、収納された。\n車掌さんのもっているファイルの中に。
2365 = "Vé của tất cả mọi người đều bị thu lại và\ncất đi.\nVào trong tập hồ sơ mà người trưởng tàu\nđang cầm."

# monologue
# JP: けれどもすぐにファイルの中から、\n何かが入れ替わりで差し出され――
2654 = "Nhưng ngay sau đó, từ trong tập hồ sơ,\nmột thứ gì đó khác đã được đưa ra để đổi\nlại——"

# 【双鉄】
# display as 雙鐵
# JP: 「プラスチックのカードだ――『硬臥換票証』。\n9号車9号中舗――これは、僕の寝台の番号だな」
1685 = "「Là một tấm thẻ nhựa——『Chứng nhận đổi vé\ngiường cứng』.\nToa số 9, giường tầng giữa số 9——đây là số\ngiường của tôi.」"

# 【ハチロク】
# display as 八六
# JP: 「列車の写真もはいっておりますね。\n乗車記念品、でございましょうか？」
2010 = "「Trên đó còn có cả ảnh của đoàn tàu nữa\nnhỉ.\nCó phải là đồ lưu niệm đi tàu không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、記念品として配布するには\nコストがかかりすぎそうに思えるが……」
1899 = "「Không, nếu phát như một món đồ lưu niệm\nthì có vẻ sẽ tốn quá nhiều chi phí……」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、左様ですね――\nだとすると、これは一体……」
1783 = "「A, đúng vậy nhỉ——\nNếu vậy thì, cái này rốt cuộc là……」"

# monologue
# JP: ハチロクがよほど思い悩みでもしたのだろうか。\nクスクスと、僕の真上から小さな笑い声がする。
2346 = "Có lẽ Hachiroku đang rất đau đầu suy nghĩ.\nMột tiếng cười khúc khích nhỏ phát ra từ\nngay phía trên tôi."

# 【西瓜】
# display as 西瓜
# JP: 「乗車記念品ではありません。\nもう一度、きっぷと交換されますよ？」
2075 = "「Đó không phải là đồ lưu niệm đi tàu đâu\nạ.\nLát nữa mọi người sẽ phải đổi lại vé một\nlần nữa đấy?」"

# 【ハチロク】
# display as 八六
# JP: 「もう一度きっぷと交換――で、ございますか？\nどうしてそのような手間をかけるのでございましょう」
2090 = "「Đổi lại vé một lần nữa——sao ạ?\nTại sao lại phải tốn công sức như vậy\nnhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　うむむ――ああ、そうか。なるほど！！！」
1817 = "「Hửm? Ưm mư——A, đúng rồi. Ra là vậy!!!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、おわかりになられたのですか？」
2119 = "「Ngài Soutetsu, ngài đã hiểu ra rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「多分な。西瓜のヒントが、\nこの問題を面白いクイズにしてくれた」
1848 = "「Chắc là vậy. Gợi ý của Suika,\nđã biến vấn đề này thành một câu đố thú\nvị.」"

# 【志寰】
# display as 志寰
# JP: 「あはっ」
1761 = "「Aha」"

# monologue
# JP: 向かい下段の志寰君が、実に嬉しそうに頷いている。\n国は違えど、マスターの心理は変わらんようだ。
2565 = "Zhihuan ở tầng dưới phía đối diện, đang\ngật đầu với vẻ rất vui sướng.\nDù khác quốc gia, nhưng tâm lý của một\nMaster có vẻ vẫn không thay đổi."

# monologue
# JP: ハチロクが機転をきかせ、粋なところを見せてくれるなら、\n僕とてやはり、嬉しく誇らしく感じるゆえに。
2707 = "Bởi vì nếu Hachiroku thể hiện được sự\nnhanh trí và tinh tế,\nthì tôi cũng sẽ cảm thấy vui sướng và tự\nhào."

# 【ハチロク】
# display as 八六
# JP: 「ヒント……もう一度きっぷと交換することが……\nう……ん……。……どういうことなのでしょう」
1931 = "「Gợi ý…… việc đổi lại vé một lần nữa……\nƯ……m……. ……Rốt cuộc là có ý nghĩa gì nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「ぁあ」
1755 = "「A」"

# monologue
# JP: 手は変わらずに動いたままだが、\n日々姫も密かにクイズ参加をしていたようだ。
2811 = "Tay vẫn không ngừng đưa nét,\nnhưng có vẻ Hibiki cũng đang âm thầm tham\ngia giải đố."

# monologue
# JP: 僕や日々姫でわかることがハチロクにわからんのなら……\nふむ。“異国の列車”の印象が邪魔しているのかもしれん。
2528 = "Nếu tôi và Hibiki có thể hiểu mà Hachiroku\nlại không hiểu thì……\nHừm. Có lẽ ấn tượng về \"Chuyến tàu nước\nngoài\" đang cản trở suy nghĩ của em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。車掌さんの業務内容は、\n仲国も日ノ本も同じではないかと僕は思うぞ？」
1671 = "「Hachiroku. Công việc của người trưởng\ntàu,\nanh nghĩ ở Zhongguo và Hinomoto cũng giống\nnhau thôi, đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「車掌さんの業務……寝台列車の――\nああ！　ああ！　ああああああ！！！」
1679 = "「Công việc của trưởng tàu…… của tàu khách\ngiường nằm——\nA! A! Aaaaa!!!」"

# monologue
# JP: ようやく、ハチロクが笑顔に戻る。
2681 = "Cuối cùng, Hachiroku cũng đã lấy lại nụ\ncười."

# 【ハチロク】
# display as 八六
# JP: 「座席の管理でございますね！　このカアドを戻すときは、\nお客様が下車される間近になってから」
2096 = "「Là để quản lý chỗ ngồi đúng không ạ! Khi\ntrả lại tấm thẻ này,\nlà lúc hành khách sắp sửa xuống tàu.」"

# 【西瓜】
# display as 西瓜
# JP: 「そのとおり。カードときっぷが交換されている寝台は、\n正規のきっぷが購入されている寝台となります」
1881 = "「Chính xác. Những giường nằm đã được đổi\nthẻ và vé,\nlà những giường nằm đã được mua vé hợp\nlệ.」"

# 【ハチロク】
# display as 八六
# JP: 「日ノ本ですと、座席管理はメモで確認かと存じますが\n……なるほど、これはすぐれたやり方ですね」
1836 = "「Ở Hinomoto, tôi nhớ việc quản lý chỗ ngồi\nđược xác nhận bằng ghi chép tay\n……Ra là vậy, đây là một cách làm rất tuyệt\nvời.」"

# monologue
# JP: 交換されていない寝台にもしも乗客がいたのなら、\n都度の検札を行うことで、不正乗車を防止できる。
2689 = "Nếu có hành khách ở những giường nằm chưa\nđược đổi thẻ,\nthì bằng cách soát vé từng lần một, có thể\nngăn chặn việc đi tàu trái phép."

# monologue
# JP: 乗客のきっぷ紛失も、\n車掌の一括管理によって防止できるし――
2694 = "Việc hành khách làm mất vé,\ncũng có thể được ngăn chặn nhờ sự quản lý\ntập trung của người trưởng tàu——"

# 【志寰】
# display as 志寰
# JP: 「下車駅に近くなっても寝たままの乗客は、\n車掌さんが起こしてくれもしますよ」
1680 = "「Đối với những hành khách vẫn còn đang ngủ\nkhi sắp đến ga xuống,\nngười trưởng tàu cũng sẽ gọi họ dậy nữa\nđấy.」"

# 【ハチロク】
# display as 八六
# JP: 「それも素晴らしいことですね」
2074 = "「Điều đó cũng thật tuyệt vời nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「再交換が必要ゆえに、必ず起こすこととなるのか。\nふむ……いや、これは面白い上に、よく考えられている」
1834 = "「Vì cần phải đổi lại vé, nên chắc chắn sẽ\nphải gọi họ dậy sao.\nHừm…… Không, điều này không chỉ thú vị, mà\ncòn được tính toán rất kỹ lưỡng.」"

# monologue
# JP: ん……っと小さく考え込む声。\nいつの間に、日々姫はスケッチの手を止めている。
2269 = "Một tiếng \"Ưm……\" trầm ngâm nho nhỏ vang\nlên.\nKhông biết từ lúc nào, Hibiki đã ngừng\nphác họa."

# 【日々姫】
# display as 日日姬
# JP: 「ナインスターズにも採用したらよかかも。で、きっぷと\nカード再交換のときに、同じ絵柄の乗車記念証あげるの」
1652 = "「Nếu áp dụng cho Nine Stars thì có lẽ cũng\ntốt đấy. Và khi đổi lại thẻ và vé,\nsẽ tặng kèm một tấm chứng nhận đi tàu có\ncùng hình vẽ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　なるほど確かに、僕が小さなこどもだったら、\nこのカードを手放すことを、とても残念に思いそうだ」
1771 = "「A! Ra là vậy, đúng là nếu anh là một đứa\ntrẻ nhỏ,\nthì sẽ cảm thấy rất tiếc nuối khi phải trả\nlại tấm thẻ này.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、日ノ本と仲国と。\n両方のサアビスのいいとこどりでございますね」
1829 = "「Ufufu, Hinomoto và Zhongguo.\nĐây là sự kết hợp những điểm tốt nhất\ntrong dịch vụ của cả hai bên nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1955 = "「Đúng vậy——」"

# monologue
# JP: そうか、そこもまた、\n僕らが呼ばれた理由の一つなのかもしれん。
2374 = "Ra là vậy, đó cũng lại là\nmột trong những lý do chúng tôi được mời\nđến đây chăng."

# 【双鉄】
# display as 雙鐵
# JP: 「乗車記念カードの配布など、僕らにとっては\nごく平凡なサービスであるが……」
1978 = "「Việc phát thẻ kỷ niệm đi tàu, đối với\nchúng ta\nlà một dịch vụ hết sức bình thường,\nnhưng……」"

# 【姜】
# display as 姜
# JP: 「当方にとっては極めて新鮮で魅力的です。\n逆に、当方には当然の換票が、双鉄先生達にはお珍しい」
1879 = "「Đối với chúng tôi, nó lại vô cùng mới mẻ\nvà hấp dẫn.\nNgược lại, việc đổi vé vốn là điều hiển\nnhiên với chúng tôi, lại là điều mới lạ\nvới thầy Soutetsu và mọi người.」"

# 【双鉄】
# display as 雙鐵
# JP: 「当然のものには、それが定番化するだけの魅力がある。\nけれど定番化したがゆえに、却って魅力を見失いやすい」
2006 = "「Những điều hiển nhiên, đều có sức hấp dẫn\nđủ để nó trở thành tiêu chuẩn.\nNhưng chính vì đã trở thành tiêu chuẩn,\nnên người ta lại dễ dàng đánh mất đi sức\nhấp dẫn đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「外国の視点にふれると、そいばリセットされるとね。\nわたし……うん。呼んでもらえて、よかったと！」
1891 = "「Khi tiếp xúc với góc nhìn của nước ngoài,\nthì điều đó sẽ được làm mới lại nhỉ.\nEm…… ừm. Thật tốt khi được mời đến đây!」"

# monologue
# JP: 言って、日々姫はベッドを降りる。
2757 = "Nói rồi, Hibiki bước xuống khỏi giường."

# monologue
# JP: 靴を履くなり通路に出、\n補助椅子に腰掛けスケッチブックをすぐさま広げる。
2439 = "Vừa xỏ giày xong, em ấy bước ra lối đi,\nngồi xuống chiếc ghế phụ và lập tức mở sổ\nphác thảo ra."

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 通路の情景を描いているのだろう。\n日々姫の手は、一切の迷いを見せずあざやかに動く。
2433 = "Chắc là đang vẽ lại quang cảnh lối đi.\nTay của Hibiki di chuyển một cách sống\nđộng, không chút do dự."

# monologue
# JP: [クロッキー,1]速描をしているのだろうが、それにしても速い。\n日々姫の視線が、体がくるくるとその向きを変えていく。
2790 = "Có lẽ là đang vẽ \\x%lクロッキー;#00ffc040;ký họa%l;#;, nhưng dù vậy thì\ncũng quá nhanh.\nÁnh mắt và cơ thể của Hibiki liên tục xoay\nchuyển hướng."

# 【日々姫】
# display as 日日姬
# JP: 「ん……うん。したら、西瓜ちゃんか姜さん。\nヤじゃなかったら、向かいに座ってもらえませんか？」
1748 = "「Ưm…… ừm. Vậy thì, Suika hoặc cô Jiang.\nNếu không phiền, hai người có thể ngồi đối\ndiện em được không ạ?」"

# 【姜】
# display as 姜
# JP: 「だ、そうだけれど？　西瓜」
1912 = "「Em ấy nói vậy đấy? Suika.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は少しもヤではないので、\n日々姫さんの向かいに座ります」
1901 = "「Suika không hề thấy phiền chút nào,\nnên Suika sẽ ngồi đối diện với chị\nHibiki.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
1718 = "「Oa!」"

# monologue
# JP: ひらり、ただの一瞬で、\n僕の眼前を西瓜が落下――いや、通過していった。
2667 = "Phốc một cái, chỉ trong chớp mắt,\nSuika đã rơi xuống——không, là bay ngang\nqua trước mắt tôi."

# monologue
# JP: 上段ベッドから一気に床へ、\nステップを引き出しさえもせず。
2474 = "Từ giường tầng trên cùng nhảy thẳng xuống\nsàn nhà,\nmà không thèm kéo bậc bước chân ra."

# 【双鉄】
# display as 雙鐵
# JP: 「驚いた。\nずいぶんと身が軽いのだな」
2079 = "「Bất ngờ thật đấy.\nEm ấy nhẹ nhàng quá nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の整備体重量は同機種平均と変わりません。\n今の下り方は、単なる慣れです」
2030 = "「Trọng lượng cơ thể chỉnh bị của Suika\nkhông khác gì mức trung bình của cùng dòng\nmáy.\nCách nhảy xuống vừa rồi, chỉ đơn giản là\ndo quen thuộc thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、寝台車利用はよくあることなのか？」
2015 = "「Ra là vậy, em thường xuyên sử dụng toa\nkhách giường nằm sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「いえ。本線乗務について以降の宿舎の寝台が、\nこれとおんなじものでした」
2125 = "「Không ạ. Kể từ khi làm nhiệm vụ trên\ntuyến chính, giường ngủ ở khu tập thể\ncũng giống hệt như thế này ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……同じものをそのまま使ったか、\nあるいは廃部品の流用か」
1732 = "「A…… Họ sử dụng y nguyên đồ giống nhau\nsao,\nhay là tái sử dụng từ những phụ tùng bị\nloại bỏ.」"

# monologue
# JP: ふふっ、と西瓜が、珍しく微笑みを表情にだす。\nとても柔らかに、あたたかに。
2726 = "Fufu, Suika hiếm khi nở nụ cười trên môi.\nMột nụ cười rất đỗi dịu dàng và ấm áp."

# 【西瓜】
# display as 西瓜
# JP: 「今の宿舎は異なりますが、数多の姉妹と過ごした\n三段寝台を、西瓜は変わらず好んでいます」
1859 = "「Khu tập thể hiện tại thì khác rồi, nhưng\nchiếc giường ba tầng\ntừng trải qua cùng vô số chị em gái, Suika\nvẫn luôn yêu thích nó.」"

# 【志寰】
# display as 志寰
# JP: 「西瓜の2000は、姉妹機が量産・運用開始されて以降は、\nただの１車輌として本線に投入されたんですよ」
2033 = "「Sau khi các cỗ máy chị em được sản xuất\nhàng loạt và đưa vào vận hành,\nchiếc 2000 của Suika cũng chỉ được đưa vào\ntuyến chính như một phương tiện thông\nthường thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: 僕らの雑談の合間にも、日々姫の手はぐんぐん動く。\n西瓜をモチーフのひとつに加え――
2464 = "Giữa những câu chuyện phiếm của chúng tôi,\ntay của Hibiki vẫn thoăn thoắt di chuyển.\nThêm Suika vào làm một trong những chủ đề\nchính——"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
1729 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1772 = "「Hửm!?」"

# monologue
# JP: 白髪、美髯のご老人が日々姫に声をかけてくる。\n――いくらか酒を飲んでいる様子だ。
2360 = "Một ông lão tóc bạc, râu đẹp đang bắt\nchuyện với Hibiki.\n——Có vẻ như ông ấy đã uống chút rượu."

# monologue
# JP: 飛び降りようとした僕を日々姫は笑顔の目線で制し、\n姜さんに通訳を依頼する。
2609 = "Hibiki dùng ánh mắt tươi cười cản tôi lại\nkhi tôi định nhảy xuống,\nvà nhờ cô Jiang phiên dịch giúp."

# 【日々姫】
# display as 日日姬
# JP: 「姜さん、こちらの方はなんて？」
1870 = "「Cô Jiang, bác này nói gì vậy ạ?」"

# 【姜】
# display as 姜
# JP: 「『素晴らしい絵で驚いた』と言っています。\n『自分のことも描いてほしい』とも」
1660 = "「Bác ấy nói 『Bức tranh đẹp quá làm tôi\nngạc nhiên』.\nCòn nói 『Cô có thể vẽ cho tôi một bức\nkhông』 nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ！　描いてみたか！！　っていうか、\n『描いてる途中、お話聞いてもいいですか？』　って」
1726 = "「Oa! Thử vẽ xem sao!! À mà,\ncô hỏi giúp em 『Trong lúc vẽ, cháu có thể\nnói chuyện với bác được không ạ?』 với.」"

# monologue
# JP: 日々姫の問いが翻訳されて、\nご老人が破顔一笑、なにかを答える。
2414 = "Câu hỏi của Hibiki được dịch lại,\nông lão cười tươi rạng rỡ và trả lời điều\ngì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2142 = "「!」"

# monologue
# JP: 途端西瓜が席を外して、\n軽業よろしくあっという間に上段ベッドへ体を戻す。
2734 = "Ngay lập tức Suika rời khỏi chỗ ngồi,\nvà quay trở lại giường tầng trên cùng\ntrong nháy mắt với động tác nhẹ nhàng như\nlàm xiếc."

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ」
1758 = "「Ôi chao ôi.」"

# monologue
# JP: ご老人はすぐ空いた席へと腰掛けて、\nテーブルの上に、なにか――鶏肉のようなものを差し出す。
2696 = "Ông lão liền ngồi xuống chỗ trống đó,\nvà đặt lên bàn một thứ gì đó——trông giống\nnhư thịt gà."

# 【姜】
# display as 姜
# JP: 「絵を書いてもらうお礼だそうです。\nアヒルの肉の燻製ですね」
2106 = "「Bác ấy nói đó là quà cảm ơn vì đã vẽ\ntranh cho bác ấy.\nLà thịt vịt hun khói nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あはは、ありがとうございます。\n描き終わったら、いただきますね」
1762 = "「Ahaha, cháu cảm ơn bác.\nSau khi vẽ xong, cháu sẽ thưởng thức nhé!」"

# monologue
# JP: 日々姫に目で求められるゆえ、僕に任せろと頷き返す。\nアヒルの肉の――『アヒルの、頭部の肉の燻製』。
2615 = "Vì Hibiki đưa mắt cầu cứu, tôi gật đầu ra\nhiệu cứ giao cho anh.\nThịt vịt——『Thịt phần đầu vịt hun khói』."

# monologue
# JP: いまもってなおかわいいもの好きの日々姫には、\n『アヒルさんの頭を食べる』のは、困難だろう。
2794 = "Đối với một người thích những thứ dễ\nthương như Hibiki cho đến tận bây giờ,\nviệc 『Ăn đầu của bạn vịt』 có lẽ sẽ rất khó\nkhăn."

# 【ハチロク】
# display as 八六
# JP: 「……双鉄様のお口にあえばよろしいのですが」
1396 = "「……Nếu hợp khẩu vị của Ngài Soutetsu thì\ntốt quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見た目は飴色で甘辛そう――というか旨そうだ。\n多分、大丈夫かとは思うが……」
1638 = "「Trông màu cánh gián có vẻ ngọt và\ncay——hay nói đúng hơn là có vẻ ngon.\nChắc là không sao đâu, nhưng mà……」"

# 【西瓜】
# display as 西瓜
# JP: 「あのご老人は、聖都の方だそうです。\n北琴にお嫁入りした娘さんを尋ねた帰りだそうです」
2076 = "「Ông lão đó có vẻ là người vùng Thánh Đô.\nNghe nói ông ấy đang trên đường về sau khi\nđến thăm con gái lấy chồng ở Beiqin.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1735 = "「哦」" 

# monologue
# JP: ご老人の声はもごもごしている上に、か細い。\n車内放送とざわめきが、その声をさらに聞きづらくする。
2806 = "Giọng của ông lão vừa lầm bầm lại vừa nhỏ.\nTiếng loa phát thanh trên xe và tiếng ồn\nào càng làm cho giọng nói đó khó nghe hơn."

# monologue
# JP: すぐ隣に立つ姜さんでさえ、しばしば聞き返している声を、\nけれど西瓜はこの距離から、何の苦もなく聞き取っている。
2452 = "Ngay cả cô Jiang đứng ngay bên cạnh cũng\nthường xuyên phải hỏi lại,\nvậy mà Suika từ khoảng cách này lại nghe\nđược không chút khó khăn."

# 【西瓜】
# display as 西瓜
# JP: 「……あのアヒルは聖都のものだそうです。\nつまり[しせん,1]汜川省の食べ物ですから、辛い可能性が高いです」
1401 = "「……Món vịt đó có vẻ là đặc sản của Thánh\nĐô.\nTức là đồ ăn của tỉnh \\x%lしせん;#00ffc040;Tứ Xuyên%l;#;, nên khả\nnăng cao là sẽ cay đấy ạ.」"

# 【志寰】
# display as 志寰
# JP: 「お口にあわなければ、喜んで僕がいただきますよ」
2036 = "「Nếu không hợp khẩu vị, tôi rất sẵn lòng\năn giúp mọi người đấy.」"

# monologue
# JP: 辛い料理が好きなのか、志寰君の声は明るい。
2548 = "Không biết có phải vì thích đồ ăn cay\nkhông, mà giọng của Zhihuan nghe rất vui\nvẻ."

# 【西瓜】
# display as 西瓜
# JP: 「日々姫さんは、汜川について尋ねています。\n見どころ、名物――汜川の人の好む旅行先」
1945 = "「Chị Hibiki đang hỏi về Tứ Xuyên.\nNhững điểm tham quan, đặc sản——và những\nđiểm đến du lịch yêu thích của người dân\nTứ Xuyên.」"

# 【ハチロク】
# display as 八六
# JP: 「……さすがは日々姫でございますね」
1388 = "「……Quả không hổ danh là Hibiki nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1378 = "「……Ừm.」"

# monologue
# JP: 不意に目頭が熱くなりかけ、咳払いしてなんとか誤魔化す。\nあの日々姫がだ。人見知りの固まりだったあの日々姫がだ。
2515 = "Đột nhiên khóe mắt tôi nóng lên, tôi đành\nhắng giọng để đánh trống lảng.\nLà Hibiki đó. Một Hibiki từng là một khối\nnhút nhát đó."

# monologue
# JP: 見事なコミュニケーション能力を異国で発揮し、\nそれを“さすが”と、当然のことと評価されているのだ。
2411 = "Phát huy khả năng giao tiếp tuyệt vời ở\nmột đất nước xa lạ,\nvà được đánh giá là \"Quả không hổ danh\",\nnhư một điều hiển nhiên."

# monologue
# JP: （成長したな――本当に――）
2856 = "(Trưởng thành rồi nhỉ——thật sự——)"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2121 = "「Ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
# 1378 = "「……嗯」" 

# monologue
# JP: 大丈夫。鼻声にはなっていない。\n寝台客車はどうにも人を、感傷的にするものらしい。
2647 = "Không sao. Giọng tôi chưa bị nghẹn ngào.\nToa khách giường nằm dường như có khả năng\nkhiến con người ta trở nên đa sầu đa cảm."

# 【双鉄】
# display as 雙鐵
# JP: 「僕はつくづく、妹に恵まれる男だと思ってな」
1916 = "「Anh thực sự nghĩ rằng, mình là một người\nđàn ông may mắn khi có được những người em\ngái tuyệt vời.」"

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1363 = "「——Vâng.」"

# monologue
# JP: 過去がある。ハチロクの声は、神妙だ。\nけれどいま、僕はハチロクのことも褒めている。
2306 = "Có một quá khứ. Giọng nói của Hachiroku\nđầy vẻ bí ẩn.\nNhưng lúc này, tôi cũng đang khen ngợi cả\nHachiroku nữa."

# monologue
# JP: 戸籍上、僕らはすでに兄妹なのだ。\nハチロクが余りに恐縮するゆえ、未だそうとは呼べないが。
2467 = "Trên hộ khẩu, chúng tôi đã là anh em rồi.\nVì Hachiroku quá e dè, nên đến giờ vẫn\nchưa thể gọi nhau như vậy thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「本当に、僕にはもったいないほどの妹ばかりだ」
1712 = "「Thật sự, toàn là những người em gái tuyệt\nvời đến mức anh cảm thấy mình không xứng\nđáng.」"

# 【日々姫】
# display as 日日姬
# JP: 「はーい！　描けました～――って！？」
1853 = "「Xong~ rồi! Em vẽ xong rồi~——Á!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1809 = "「Hửm?」"

# monologue
# JP: 日々姫の声で我に帰って視線を落とす――！！
2623 = "Giọng nói của Hibiki kéo tôi về thực tại,\ntôi nhìn xuống——!!"

# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2081 = "「Đây là——」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ……\n日々姫……大人気ですね」
1714 = "「Ôi chao……\nHibiki…… nổi tiếng quá nhỉ.」"

# monologue
# JP: すぐさまベッドから飛び降りて日々姫を庇うように立つ。
2545 = "Tôi lập tức nhảy xuống khỏi giường và đứng\nchắn để bảo vệ Hibiki."

# monologue
# JP: 人が集まり覗き込み、あるいは覗き込もうとしている。\n日々姫の手の中のスケッチブックを。
2290 = "Mọi người đang tụ tập lại và ngó vào, hoặc\nđang cố gắng ngó vào.\nCuốn sổ phác thảo trên tay Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「まずいな。これは争いが起きかねないぞ」
2077 = "「Nguy to rồi. Chuyện này có thể dẫn đến ẩu\nđả mất.」"

# monologue
# JP: 実際、軽い押し合いが発生している。
2461 = "Thực tế là, đã bắt đầu có hiện tượng xô\nđẩy nhẹ."

# monologue
# JP: 姜さんと僕に志寰君、\nご老人までが盾となってくれてはいるが――
2810 = "Dù cô Jiang, tôi, Zhihuan,\nvà cả ông lão cũng đã đứng ra làm lá chắn\nnhưng——"

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書が、集まらないようにと言っています。\nけれど、それは逆効果かもしれません」
2113 = "「Thư ký Jiang đang bảo mọi người đừng tụ\ntập lại.\nNhưng có vẻ như điều đó lại gây ra tác\ndụng ngược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1956 = "「Đúng vậy.」"

# monologue
# JP: 実際、姜さんの声をききつけ、奥側の寝台からも\n「なんだなんだ」と言わんばかりの顔が出てくる。
2462 = "Thực tế là, nghe thấy tiếng của cô Jiang,\nnhững hành khách ở các giường phía trong\ncũng thò đầu ra với vẻ mặt như muốn hỏi\n\"Có chuyện gì vậy\"."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らが移動してしまうのが一番安全かつ迅速な\n事態収拾につながろう。……確か、この列車にも」
1987 = "「Việc chúng ta rời đi có lẽ là cách an\ntoàn và nhanh chóng nhất\nđể giải quyết tình hình. ……Hình như, trên\nchuyến tàu này cũng có」"

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　さすが双鉄先生。\nとても優れた考えだと西瓜も同意します」
1767 = "「A! Quả không hổ danh thầy Soutetsu.\nSuika cũng đồng ý rằng đó là một ý tưởng\nrất tuyệt vời.」"

# 【志寰】
# display as 志寰
# JP: 「では、僕が先導しましょう。姜秘書にはあとで合流\nいただいて、西瓜と僕とでみなさんを挟むかたちで」
2099 = "「Vậy thì, tôi sẽ đi trước dẫn đường. Thư\nký Jiang sẽ hội quân sau,\ncòn Suika và tôi sẽ đi trước và sau để kẹp\nmọi người ở giữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、その前に」
1786 = "「A, trước đó đã.」"

# monologue
# JP: 日々姫は席を立つと同時に、\nスケッチブックの紙を一枚、丁寧に取り外す。
2630 = "Hibiki vừa đứng lên,\nvừa cẩn thận xé một tờ giấy từ cuốn sổ\nphác thảo ra."

# 【日々姫】
# display as 日日姬
# JP: 「おじいさん。お話たくさん、ありがとうございました。\nあと、アヒル。いただきますね！」
1851 = "「Ông ơi. Cảm ơn ông vì đã kể cho cháu nghe\nrất nhiều chuyện.\nVà cả món thịt vịt nữa. Cháu xin nhận\nnhé!」"

# 【志寰】
# display as 志寰
# JP: 「この通路を抜けたところです」
1997 = "「Đi qua lối đi này là tới nơi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1738 = "「Ồ!」"

# monologue
# JP: 厨房脇の狭い通路の向こうには、\n広々とした空間に、清潔なテーブル達が整列している。
2672 = "Phía bên kia lối đi hẹp cạnh nhà bếp,\nlà một không gian rộng rãi, với những\nchiếc bàn sạch sẽ được xếp ngay ngắn."

# 【ハチロク】
# display as 八六
# JP: 「素敵な食堂車でございますね。\n居心地がとても良さそう……懐かしい感じがいたします」
1989 = "「Thật là một toa ăn tuyệt vời.\nCó vẻ rất thoải mái…… mang lại một cảm\ngiác thật hoài niệm.」"

# 【西瓜】
# display as 西瓜
# JP: 「食堂車のことを、仲国では[ｃａｎｃｈｅ,1]餐車。[さんしゃ,1]餐車といいます。\n晩餐の餐という文字を書きますね」
2131 = "「Ở Zhongguo, toa ăn được gọi là \\x%lｃａｎｃｈｅ;#00ffc040;Can-che%l;#;. \\x%lさんしゃ;#00ffc040;Xan-chơ%l;#;\n.\nĐược viết bằng chữ \"Xan\" trong bữa tối\n(Vãn xan) đấy ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「餐車！　よかとね。洒落とるとね～！！」
2135 = "「Xan-chơ! Hay nhỉ. Nghe rất sành điệu\nluôn~!!」"

# monologue
# JP: まだ夕食には早い時間なのが幸いしてか、\nほとんどの席が空席だ。
2554 = "May mắn là vẫn còn sớm so với giờ ăn tối,\nnên hầu hết các chỗ ngồi đều còn trống."

# monologue
# JP: テーブル一つにつき固定されている座席には、\nどうみても四人までしか座れんが、さて――
2645 = "Mỗi chiếc bàn đều có ghế cố định,\nnhìn thế nào cũng chỉ ngồi được tối đa bốn\nngười, vậy thì——"

# 【姜】
# display as 姜
# JP: 「三人と三人にわかれませんか？」
1641 = "「Chúng ta chia làm hai nhóm ba người nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、姜さん。お疲れ様です」
1779 = "「A, cô Jiang. Cô vất vả rồi.」"

# monologue
# JP: あの混乱を、これほど手早く収めてくれたのか。\n驚きとともに、感心・感謝も湧いてくる。
2567 = "Cô ấy đã giải quyết sự hỗn loạn đó nhanh\ngọn đến vậy sao.\nCùng với sự ngạc nhiên, lòng thán phục và\nbiết ơn cũng trào dâng."

# 【姜】
# display as 姜
# JP: 「いえなにも。日々姫先生が離れられたら、\n蜘蛛の子を散らすようにみな自分の寝台に戻りましたよ」
1741 = "「Không có gì đâu. Khi cô Hibiki vừa rời\nđi,\nmọi người cũng tản ra như ong vỡ tổ và\nquay về giường của mình thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、なんかお騒がせしちゃって～」
1774 = "「A~, xin lỗi vì đã làm mọi người náo loạn\nlên~」"

# 【姜】
# display as 姜
# JP: 「いえいえ。\nあれも、よいご視察になられたことかと思いますし」
1966 = "「Không sao đâu.\nTôi nghĩ đó cũng là một trải nghiệm khảo\nsát tốt mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「あはっ。ご迷惑かけちゃたのはごめんなさいですけど。\nそういってもらえると、ほっとしますし――確かにです」
1764 = "「Aha. Dù xin lỗi vì đã gây rắc rối cho cô.\nNhưng nghe cô nói vậy em cũng thấy nhẹ\nnhõm hơn——đúng là vậy thật.」"

# monologue
# JP: ふむ。姜さんと日々姫との話を断ち切ることもないだろう。\nならば、あちらの二席は決まりで……。さて、どうするか。
2399 = "Hừm. Cũng không nên cắt ngang cuộc nói\nchuyện giữa cô Jiang và Hibiki.\nNếu vậy, hai chỗ ngồi đằng kia đã được\nquyết định…… Giờ thì, làm sao đây."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくしもあちらの席でよろしいでしょうか？」
2120 = "「Ngài Soutetsu. Tôi ngồi ở chỗ đằng kia có\nđược không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――！」
1751 = "「Hửm? ——!」"

# monologue
# JP: まさかのハチロクのウィンクだ。\n驚く僕のまなざしを、ハチロクは視線の動きで誘導し――
2345 = "Không ngờ Hachiroku lại nháy mắt với tôi.\nÁnh mắt ngạc nhiên của tôi bị ánh nhìn của\nHachiroku dẫn dắt——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな。\nそうした方がいいだろう」
1777 = "「À. Đúng vậy nhỉ.\nLàm như vậy chắc sẽ tốt hơn.」"

# monologue
# JP: 僕の言葉を終わりまで待たず、\nハチロクは日々姫、姜さんのテーブルにつく。
2801 = "Không đợi tôi nói hết câu,\nHachiroku đã ngồi xuống bàn của Hibiki và\ncô Jiang."

# monologue
# JP: つまり、僕の方のテーブルには――
2805 = "Nói cách khác, ở bàn của tôi còn lại——"

# 【志寰】
# display as 志寰
# JP: 「とても光栄です。\n双鉄さんと差し向かいで食事をできるだなんて」
2012 = "「Thật là vinh hạnh quá.\nKhông ngờ lại được dùng bữa đối diện với\nanh Soutetsu.」"

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本の鉄道の今についてを教えてもらえたら、\n西瓜はとてもうれしく思います」
1861 = "「Nếu được anh chỉ bảo thêm về tình hình\nđường sắt Hinomoto hiện tại,\nSuika sẽ rất vui đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1799 = "「嗯」" 

# monologue
# JP: 僕の向かいに、\n志寰君と西瓜が自然、隣同士に並び合っている。
2498 = "Ở phía đối diện tôi,\ncậu Zhihuan và Suika rất tự nhiên ngồi\ncạnh nhau."

# monologue
# JP: 志寰君は満面の笑顔だし、西瓜の髪も踊っている。\n僕までが、なんともほっこりした気持ちにさせられる。
2503 = "Cậu Zhihuan nở nụ cười rạng rỡ, bím tóc\ncủa Suika cũng đang nhảy nhót.\nĐến cả tôi cũng cảm thấy ấm áp lây."

# monologue
# JP: （とはいえ、昨日あれほど注意されたばかりだ。\n余計なことを言わないように、気をつけんとな）
2844 = "(Mặc dù vậy, tối qua tôi vừa mới bị nhắc\nnhở nghiêm khắc xong.\nPhải cẩn thận không được lỡ lời nói điều\ngì thừa thãi mới được.)"

# 【志寰】
# display as 志寰
# JP: 「双鉄さん？」
2117 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1784 = "「À, không có gì.」"

# monologue
# JP: 黙り込み、不機嫌などの誤解を与えてしまうのも、\n“余計なこと”と同等以上に避けねばならぬことだろう。
2674 = "Đột nhiên im lặng, gây ra hiểu lầm là đang\nkhông vui,\ncó lẽ cũng là điều cần phải tránh không\nkém gì việc \"lỡ lời\"."

# 【双鉄】
# display as 雙鐵
# JP: 「その……餐車は初めてなので、戸惑ってしまって。\n注文などは、どのようにすればいいのかな、と」
1708 = "「Chỉ là……đây là lần đầu tiên tôi đến toa\năn, nên hơi bối rối.\nKhông biết việc gọi món thì phải làm thế\nnào nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　できればだけどみんなの注文！\n色んな種類に散らしてくれたらうれしかと！！」
1769 = "「A! Nếu được thì mọi người gọi món đi!\nEm muốn gọi nhiều loại khác nhau cho đa\ndạng luôn á!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。確かに」
1806 = "「Ra vậy. Đúng là thế thật.」"

# monologue
# JP: 背中からの日々姫の声に頷かされる。\nなるほど。これも極めて重要な視察とできよう。
2703 = "Giọng nói của Hibiki vang lên từ phía sau\nkhiến tôi gật gù đồng tình.\nRa là vậy. Đây cũng có thể coi là một phần\nkhảo sát cực kỳ quan trọng."

# 【姜】
# display as 姜
# JP: 「先生方が先に、お好みのものを遠慮なくお選びください。\n当方はそれにあわせて、不足を補い注文します」
2091 = "「Xin các vị cứ tự nhiên chọn những món\nmình thích trước đi ạ.\nChúng tôi sẽ dựa vào đó để gọi thêm những\nmón còn thiếu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2094 = "「Cảm ơn cô.」"

# 【姜】
# display as 姜
# JP: 「ああ、それと。石炭、軽油は別途で手配してあります。\n我々の食事と一緒に供されますので、ご安心を」
1792 = "「À, còn nữa. Than đá và dầu diesel chúng\ntôi đã chuẩn bị riêng rồi.\nSẽ được phục vụ cùng với bữa ăn của chúng\nta, xin cứ yên tâm.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！\nなにからなにまで、まことにありがとうございます」
1719 = "「Ôi!\nMọi thứ đều chu toàn, thực sự cảm ơn cô\nrất nhiều ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ディーゼルエンジンでモーターを回すなら、\n西瓜も軽油を摂取するのか」
1878 = "「Phải rồi, nếu dùng động cơ diesel để làm\nquay mô-tơ,\nthì Suika cũng nạp dầu diesel nhỉ.」"

# monologue
# JP: 軽油の二文字に自然とれいなの笑顔が浮かぶ。\nなぜだか、どやぁっと自慢げだ。
2267 = "Hai chữ dầu diesel tự nhiên làm tôi nhớ\nđến nụ cười của Reina.\nKhông hiểu sao, con bé lại mang vẻ mặt tự\nhào đầy đắc ý."

# monologue
# JP: ただそれだけでなんともリラックスできるから、\n実にれいなは大したものだ。
2332 = "Chỉ vậy thôi cũng đủ khiến tôi cảm thấy\nthư giãn,\nReina quả thực rất tuyệt vời."

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、こちらがメニューになります」
2116 = "「Thầy Soutetsu, đây là thực đơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「漢字を見ればなんとなく料理を想像できるのはいいな。\nでは――僕はこの、『[うめさい？　のなにか,3]梅菜扣肉』にしよう」
1645 = "「Chỉ cần nhìn chữ Hán là có thể lờ mờ đoán\nđược món ăn, tiện thật đấy.\nVậy thì――tôi sẽ chọn món, 『Mai thái khâu\nnhục』 này đi.」"

# 【志寰】
# display as 志寰
# JP: 「それは[メイツァイコウロウ,3]梅菜扣肉です、双鉄さん。\n豚肉と、梅菜とを混ぜ込んだ蒸し料理ですね」
2084 = "「Đó là món Mai thái khâu nhục, anh\nSoutetsu.\nLà món hấp kết hợp giữa thịt lợn và rau\nmai thái đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、なかなか旨そうだ。\nところで、梅菜とは――いったい、どんな代物だ？」
1958 = "「Ra vậy, nghe có vẻ ngon đấy.\nNhân tiện, rau mai thái――rốt cuộc là loại\nrau gì vậy?」"

# 【志寰】
# display as 志寰
# JP: 「え？　梅菜は……梅菜……だよね、西瓜」
1793 = "「Hả? Rau mai thái thì……là rau mai\nthái……phải không, Suika.」"

# 【西瓜】
# display as 西瓜
# JP: 「うん、志寰。梅菜は梅菜としか……\n西瓜も――それ以外の説明の言葉を思いつけない」
1803 = "「Ừm, Zhihuan. Rau mai thái thì chỉ là rau\nmai thái thôi……\nSuika cũng――không nghĩ ra từ nào khác để\ngiải thích cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、困らせるつもりはなかった。\n食べてみればわかることだしな」
1780 = "「À, tôi không có ý làm khó đâu.\nĂn thử là biết ngay thôi mà.」"

# monologue
# JP: そういえば、志寰君と西瓜はほっとしたように\n目と目を見交わし、小さく小さく微笑み合う。
2698 = "Nhắc mới nhớ, cậu Zhihuan và Suika như\ntrút được gánh nặng,\nhai người đưa mắt nhìn nhau, khẽ mỉm cười."

# monologue
# JP: ……まるで僕がわがままな悪役のような感じになったが、\nしかし――うむ。この雰囲気は良いのではないか？
1308 = "……Cảm giác như tôi vừa đóng vai kẻ phản\ndiện ích kỷ vậy,\nnhưng mà――ừm. Bầu không khí này cũng tốt\nđấy chứ?"

# 【日々姫】
# display as 日日姬
# JP: 「わ！　松茸のスープがあると！？」
1722 = "「Oa! Có súp nấm tùng nhung luôn á!?」"

# monologue
# JP: つかのま生じた良い雰囲気が、日々姫の歓声に飛ばされる。
2315 = "Bầu không khí tốt đẹp vừa chớm nở đã bị\ntiếng reo hò của Hibiki làm bay biến."

# 【日々姫】
# display as 日日姬
# JP: 「したらわたしそれと――あと、この、\nなんか魚って書いてあるやつ！」
2103 = "「Thế thì em lấy món đó――với lại, món này,\ncái món gì mà có chữ cá này nè!」"

# 【姜】
# display as 姜
# JP: 「白米もご入用ですよね？」
1980 = "「Chắc mọi người cũng cần cơm trắng đúng\nkhông ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、お願いします」
1808 = "「A, cho em xin với ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕にも白米をお願いします」
2047 = "「Cho tôi một phần cơm trắng luôn nhé.」"

# 【姜】
# display as 姜
# JP: 「承りました。志寰君」
1952 = "「Tôi hiểu rồi. Cậu Zhihuan.」"

# 【志寰】
# display as 志寰
# JP: 「はい。姜秘書」
1960 = "「Vâng. Cô Jiang.」"

# monologue
# JP: 志寰君と姜さんはウェイトレスさんを呼び寄せて、\n早口でなにかをやりとりし合う。
2496 = "Cậu Zhihuan và cô Jiang gọi nữ phục vụ\nlại,\nhai người trao đổi nhanh điều gì đó."

# 【西瓜】
# display as 西瓜
# JP: 「白菜の炒めものと水煮牛肉も注文されました。\n兎の火鍋も頼もうとしましたが、兎が品切れだそうです」
1706 = "「Họ vừa gọi thêm bắp cải xào và thịt bò\nluộc cay.\nVốn định gọi cả lẩu thỏ nữa, nhưng nghe\nnói thịt thỏ đã hết rồi ạ.」"

# monologue
# JP: 西瓜がすぐに、会話内容を僕らに訳して伝えてくれる。\n日々姫の手もそれにあわせて、再び忙しく動きはじめる。
2724 = "Suika lập tức dịch lại nội dung cuộc trò\nchuyện cho chúng tôi nghe.\nTay của Hibiki cũng theo đó mà bắt đầu bận\nrộn cử động trở lại."

# 【志寰】
# display as 志寰
# JP: 「……日々姫さんは、会話を全て絵になおして\n描いてらっしゃるのですか？」
1387 = "「……Chị Hibiki, đang vẽ lại toàn bộ cuộc\ntrò chuyện thành tranh sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、文字が書けないわけではありませんから。\nスケッチブックをメモ帳代わりにしているだけかと」
2046 = "「Không không, không phải là con bé không\nbiết viết chữ đâu.\nChắc chỉ là đang dùng sổ phác thảo thay\ncho sổ tay thôi.」"

# 【志寰】
# display as 志寰
# JP: 「そうなのですか。日々姫さんほどの画家さんなら、\n全てを絵にした方が早いのかと勘違いしました」
1683 = "「Ra là vậy. Một họa sĩ như chị Hibiki,\nem lại cứ tưởng chuyển hết thành tranh sẽ\nnhanh hơn chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「たしかに速描などは、見慣れてもなお\n速さに驚かされますが――ああ」
2112 = "「Quả thực kỹ năng ký họa nhanh của con bé,\ndù có nhìn quen rồi\nvẫn khiến người ta phải kinh ngạc vì tốc\nđộ――à.」"

# monologue
# JP: そういえば、さっき日々姫は西瓜を速描していたか。
2442 = "Nhắc mới nhớ, lúc nãy Hibiki vừa vẽ ký họa\nnhanh Suika nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。志寰君がお前の絵に興味をもっているようだ」
1949 = "「Hibiki. Cậu Zhihuan có vẻ hứng thú với\ntranh của em đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「よかよ？　メモももう取り終わったし」
2021 = "「Được á? Em cũng ghi chú xong rồi nè.」"

# 【志寰】
# display as 志寰
# JP: 「え！？　いいんですか！？　嬉しいな。\nありがとうございます！」
1728 = "「Hả!? Được sao ạ!? Vui quá.\nEm cảm ơn chị!」"

# monologue
# JP: 日々姫から受け取ったスケッチブックを手渡せば、\nもうそれだけで満面の笑顔がこぼれ落ちる。
2330 = "Nhận lấy cuốn sổ phác thảo từ tay Hibiki,\nchỉ vậy thôi cũng đủ khiến nụ cười rạng rỡ\nnở trên môi cậu bé."

# monologue
# JP: ……しっぽがあれば、ぶんぶん振っていることだろう。\nなんとも、人好きのすることだ。
1305 = "……Nếu có đuôi, chắc hẳn cậu bé đang vẫy\ntít thò lò rồi.\nThật là một cậu bé dễ mến."

# 【志寰】
# display as 志寰
# JP: 「西瓜。見てごらん。\nきみが描かれてるよ」
2035 = "「Suika. Nhìn này.\nChị ấy vẽ cậu nè.」"

# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やはり興味があるのだろう。
2356 = "Quả nhiên là Suika cũng có hứng thú."

# monologue
# JP: 西瓜がツツと体を寄せて、\n真横から志寰君の手元を覗き込む。
2736 = "Suika khẽ nhích người lại gần,\nnhìn chăm chú vào tay cậu Zhihuan từ ngay\nbên cạnh."

# 【志寰】
# display as 志寰
# JP: 「すごいな。いろんな西瓜が描かれてる。\nラフな絵なのに、かわいさが閉じ込められてるね」
1855 = "「Tuyệt thật. Chị ấy vẽ rất nhiều dáng vẻ\ncủa Suika này.\nDù chỉ là phác thảo thô, nhưng sự dễ\nthương vẫn được thể hiện trọn vẹn.」"

# 【西瓜】
# display as 西瓜
# JP: 「っ！！！！」
2143 = "「!!!!」"

# monologue
# JP: おお――と出かけた声をけれども、慌てて飲み込む。\n日々姫とハチロクを振り返り見れば――
2759 = "Tiếng \"Ồ――\" chực thốt ra khỏi miệng vội vã\nbị tôi nuốt ngược vào trong.\nQuay lại nhìn Hibiki và Hachiroku thì――"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やはりにこにこ――いや、ニヤニヤか？
2385 = "Quả nhiên là đang tủm tỉm cười――không,\ncười nham hiểm mới đúng?"

# monologue
# JP: 照れくさそうにも見える笑顔で、\n必死に声をおしころしている風情と見える。
2431 = "Với nụ cười trông có vẻ ngượng ngùng,\ntrông họ như đang tuyệt vọng kìm nén tiếng\ncười."

# 【志寰】
# display as 志寰
# JP: 「ああ、この絵は特にいい」
1790 = "「A, bức tranh này đặc biệt đẹp này.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1755 = "「啊」" 

# monologue
# JP: 見ずともわかる――\nそれほどの手応えの絵だったのだろうか？
2612 = "Không cần nhìn cũng biết――\nĐó là một bức tranh đầy tâm đắc sao?"

# monologue
# JP: 志寰君の手元を確かめることもせず、\n日々姫は満足げな声をだす。
2620 = "Không thèm kiểm tra xem cậu Zhihuan đang\nchỉ bức nào,\nHibiki cất giọng đầy mãn nguyện."

# 【日々姫】
# display as 日日姬
# JP: 「もしよかったら、もらってほしかと。そいば自分でも、\n西瓜ちゃんの魅力切り取れたかもって感じとったけん」
1674 = "「Nếu cậu không phiền thì cứ lấy bức đó đi.\nBức đó chính chị cũng\ncảm thấy mình đã nắm bắt được trọn vẹn sức\nhút của Suika á.」"

# 【志寰】
# display as 志寰
# JP: 「えっ！？　いいんですか？　けど――」
1744 = "「Hả!? Được thật sao ạ? Nhưng mà――」"

# 【日々姫】
# display as 日日姬
# JP: 「記録としては押えがあるけん。そん表裏の二枚抜けても、\nおヒゲのおじいさんで、同じ構図ば描いとるし」
1663 = "「Chị có bản sao để lưu trữ rồi. Dù có rút\nhai tờ trước sau đó ra,\nthì chị cũng đã vẽ một bố cục y hệt với\nông lão râu kẽm rồi.」"

# 【志寰】
# display as 志寰
# JP: 「そうなんですか」
2082 = "「Vậy sao ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「クロッキーばってん、『絵』として見てもらえるんなら。\nそれはもちろん、大事にしてもらえる方が嬉しかけんね」
2114 = "「Dù chỉ là ký họa nhanh, nhưng nếu cậu coi\nnó là một bức 『tranh』.\nThì tất nhiên, giao cho người biết trân\ntrọng nó chị sẽ vui hơn rồi.」"

# 【志寰】
# display as 志寰
# JP: 「もちろん！　一生大事にします。\n僕の、宝物にさせてもらいます」
2107 = "「Tất nhiên rồi ạ! Em sẽ trân trọng nó suốt\nđời.\nNó sẽ trở thành bảo vật của em.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1800 = "「Ừm!」"

# monologue
# JP: 日々姫が手をだす。\n志寰君からスケッチブックを受け取りそのままリレーする。
2611 = "Hibiki đưa tay ra.\nNhận lấy cuốn sổ phác thảo từ tay cậu\nZhihuan rồi chuyển lại."

# monologue
# JP: 大切そうな手付きで日々姫は、\nその中の一枚を取り外し――
2606 = "Với đôi tay đầy nâng niu, Hibiki\ncẩn thận tháo một tờ ra khỏi cuốn sổ――"

# 【日々姫】
# display as 日日姬
# JP: 「はい。どうぞ」
2000 = "「Đây. Tặng em nè.」"

# 【志寰】
# display as 志寰
# JP: 「ありがとうございます。僕は、本当に嬉しいです」
2126 = "「Em cảm ơn chị. Em thực sự rất vui.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん喜んでもらえるんなら、私も嬉しかー」
1986 = "「Em vui như vậy, chị cũng thấy vui lây áー」"

# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 西瓜の視線がしきりに動く。
2731 = "Ánh mắt của Suika liên tục đảo quanh."

# monologue
# JP: 志寰君へ、その手元へ。\n日々姫に、そしてスケッチブックに。
2475 = "Nhìn cậu Zhihuan, nhìn xuống tay cậu ấy.\nNhìn Hibiki, rồi lại nhìn cuốn sổ phác\nthảo."

# 【日々姫】
# display as 日日姬
# JP: 「ふふっ、西瓜ちゃんにも、\n何か一枚お送りすると？」
1826 = "「Fufu, Suika cũng muốn\nchị tặng một bức hả?」"

# 【ハチロク】
# display as 八六
# JP: 「！」
# 2142 = "「！」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1755 = "「啊」" 

# monologue
# JP: 浮かれたか、日々姫。\nあれほどに余計なことは言うなと僕に言っておいて――
2625 = "Hibiki, em đắc ý quá rồi đấy.\nRõ ràng đã dặn tôi không được nói điều\nthừa thãi mà――"

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書」
1875 = "「Cô Jiang.」"

# monologue
# JP: ――西瓜はけれど、浮足立たない。\nどころかひどく真剣な顔に戻っている――いや――
1286 = "――Tuy nhiên, Suika không hề tỏ ra phấn\nkhích.\nTrái lại, vẻ mặt cô bé trở nên cực kỳ\nnghiêm túc――không――"

# monologue
# JP: 今まで一度も僕らに見せてくれてはいなかった、\n恐らくは、真剣極まる顔になっている。
2793 = "Đó là một vẻ mặt mà chúng tôi chưa từng\nthấy trước đây,\ncó lẽ là vẻ mặt nghiêm túc tột độ."

# 【姜】
# display as 姜
# JP: 「日々姫女士がそうおっしゃってくださるなら、\nそれももちろん、よいご視察かと」
1947 = "「Nếu quý cô Hibiki đã nói vậy,\nđó tất nhiên cũng là một trải nghiệm khảo\nsát tuyệt vời.」"

# 【西瓜】
# display as 西瓜
# JP: 「なら。わたしは――西瓜は。\n志寰を描いた一枚を、いただきたいと願います」
1934 = "「Vậy thì. Tôi――Suika.\nXin được nhận một bức vẽ Zhihuan ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1362 = "「――Ừm.」"

# monologue
# JP: 言葉が、重い。願いが、強い。\n日々姫も、僕も、ハチロクも、とても笑っていられない。
2755 = "Lời nói đầy sức nặng. Mong muốn mãnh liệt.\nHibiki, tôi, và cả Hachiroku, đều không\nthể cười nổi nữa."

# 【日々姫】
# display as 日日姬
# JP: 「わかった。描くと。志寰君が油断しきって、\n普段の顔ばしているときに、パパって描いちゃう」
1863 = "「Chị hiểu rồi. Chị sẽ vẽ. Đợi lúc cậu\nZhihuan lơ là nhất,\nlúc cậu ấy mang vẻ mặt thường ngày, chị sẽ\nvẽ roẹt một cái là xong.」"

# 【西瓜】
# display as 西瓜
# JP: 「あ、ありがとうございます！　それは、この旅の――\n志寰と私の、きっと大切な想い出になります」
2122 = "「A, em cảm ơn chị! Bức tranh đó, chắc chắn\nsẽ trở thành――\nkỷ niệm quý giá của chuyến đi này đối với\nZhihuan và em.」"

# 【志寰】
# display as 志寰
# JP: 「僕との大切な想い出って、西瓜」
1709 = "「Kỷ niệm quý giá với anh sao, Suika.」"

# monologue
# JP: 志寰君さえ、真顔になっている。\nいつものにこにこが消えている。
2483 = "Ngay cả cậu Zhihuan cũng trở nên nghiêm\ntúc.\nNụ cười thường trực đã biến mất."

# 【志寰】
# display as 志寰
# JP: 「そんな、なんだか縁起でもない」
1896 = "「Nói vậy, nghe cứ điềm gở thế nào ấy.」"

# monologue
# JP:  （どんっ）
2848 = "(Cạch)"

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！！？」
1801 = "「Hửm!!?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　大きなバケツにいっぱいの！\n――なんて見事な石炭の盛り合わせでございましょう！」
1760 = "「Chà chà chà! Đầy ắp cả một cái xô lớn\nluôn này!\n――Quả là một mâm than đá tuyệt hảo!」"

# monologue
# JP: （どんっ）（どんっ）（どんっ）
2849 = "(Cạch) (Cạch) (Cạch)"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1730 = "「Ồ――」"

# monologue
# JP: 石炭バケツを皮切りに、\n料理が次々、テーブル上に並べられていく。
2791 = "Bắt đầu bằng xô than đá,\ncác món ăn lần lượt được dọn lên bàn."

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生。西瓜がご飯をよそいましょう」
2115 = "「Thầy Soutetsu. Để Suika xới cơm cho thầy\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ――うん。お願いしよう」
1819 = "「Hửm? À――ừm. Nhờ em vậy.」"

# monologue
# JP: 寄り添っていた志寰君と西瓜とは、最初の距離に――\nあるいは少し、最初より離れた距離に収まっている。
2641 = "Cậu Zhihuan và Suika vốn đang sát lại gần\nnhau, giờ đã trở về khoảng cách ban đầu――\nhoặc có lẽ, xa hơn một chút so với lúc\nđầu."

# 【西瓜】
# display as 西瓜
# JP: 「お茶碗にやまもりにしますか？」
2041 = "「Thầy ăn một bát đầy vun luôn nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。八分目程度にしてほしい」
1647 = "「Không. Tám phần là được rồi.」"

# monologue
# JP: ……西瓜は、完全に平静な――\n僕らがいつも見ている顔に、戻ってる。
1304 = "……Suika đã hoàn toàn bình tĩnh lại――\ntrở về với khuôn mặt mà chúng tôi vẫn\nthường thấy."

# monologue
# JP: 志寰君は、西瓜を不安げに見ているが……\nここで僕らが蒸し返すべき話題ではないのは確実だ。
2501 = "Cậu Zhihuan nhìn Suika với vẻ bất an\nnhưng……\nchắc chắn đây không phải là chủ đề mà\nchúng tôi nên khơi lại lúc này."

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、『いただきます』が待ち遠しいです。\n何と素敵な気持ちでしょう」
1831 = "「Ufufu, háo hức chờ đến lúc nói 『Mời mọi\nngười dùng bữa』 quá.\nThật là một cảm giác tuyệt vời.」"

# 【日々姫】
# display as 日日姬
# JP: 「よねっ！　わたしの魚もおいしそう～！」
1954 = "「Đúng á! Món cá của em trông cũng ngon quá\nchừng~!」"

# monologue
# JP: ハチロクも日々姫も同じ気持ちであるのだろう。\n見事なまでに食事モードに切り替えている。
2342 = "Hachiroku và Hibiki chắc cũng có chung cảm\nnhận.\nHọ đã chuyển sang chế độ ăn uống một cách\nhoàn hảo."

# 【双鉄】
# display as 雙鐵
# JP: 「志寰君。これが……梅菜だよな？」
1894 = "「Cậu Zhihuan. Đây là……rau mai thái phải\nkhông?」"

# 【志寰】
# display as 志寰
# JP: 「え？　あ、はい！　そうです双鉄さん。\n間違いなく、その豚肉の下の野菜が、梅菜です」
1821 = "「Hả? À, vâng! Đúng vậy anh Soutetsu.\nKhông sai đâu ạ, phần rau dưới lớp thịt\nlợn đó chính là rau mai thái.」"

# monologue
# JP: 見たことがない。\nあるいは日ノ本には無い野菜だろうか。
2532 = "Tôi chưa từng thấy bao giờ.\nHoặc có lẽ là loại rau không có ở\nHinomoto."

# 【双鉄】
# display as 雙鐵
# JP: 「これは確かに、梅菜だとしかいえないな。\nどんな味だか、食べてみるのが楽しみだ」
2085 = "「Đúng là chỉ có thể gọi nó là rau mai thái\nthôi.\nTôi rất mong chờ xem hương vị của nó ra\nsao đây.」"

# 【西瓜】
# display as 西瓜
# JP: 「ふふっ」
1824 = "「Fufu.」"

# monologue
# JP: 西瓜が笑う。ほんの小さく。
2735 = "Suika cười. Một nụ cười rất khẽ."

# monologue
# JP: だけれどたったそれだけで、\n食卓の空気がぱあっと晴れる。
2309 = "Nhưng chỉ cần có thế,\nbầu không khí trên bàn ăn bỗng bừng sáng."

# 【双鉄】
# display as 雙鐵
# JP: 「早く食べたいな。あの、姜さん。\n仲国では、食事の開始のときにはどのように」
1857 = "「Muốn ăn quá đi. À, cô Jiang này.\nỞ Trung Quốc, khi bắt đầu bữa ăn mọi người\nthường làm thế nào vậy?」"

# 【姜】
# display as 姜
# JP: 「この場では、主賓のしきたりにあわせましょう。\n双鉄先生の、よろしいように」
1984 = "「Trong hoàn cảnh này, hãy làm theo phong\ntục của khách quý đi ạ.\nThầy Soutetsu cứ tự nhiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうですか、では、日ノ本式で」
2095 = "「Vậy sao, thế thì, theo kiểu Hinomoto\nnhé.」"

# monologue
# JP: 背筋を伸ばす。\n背後で日々姫・ハチロクもそうしたことが伝わってくる。
2539 = "Tôi ngồi thẳng lưng.\nTừ phía sau, tôi cảm nhận được Hibiki và\nHachiroku cũng làm như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「いただきます」
1917 = "「Mời mọi người dùng bữa.」"

# 【日々姫】
# display as 日日姬＆八六
# JP: 「いただきます！」\n「いただきます」
1918 = "「Mời mọi người dùng bữa!」\n「Mời mọi người dùng bữa.」"

# monologue
# JP: （カタンコトンカタンコトン）
2852 = "(Cạch cạch xình xịch, cạch cạch xình xịch)"

# monologue
# JP: 列車の音が、いつもと違う。\n路子がいない。
2364 = "Tiếng tàu chạy, khác với mọi khi.\nKhông có Michiko."

# monologue
# JP: それでも、夢なのだと気づく。\n何年ぶりかの、『この夢』なのだと。
2311 = "Dù vậy, tôi vẫn nhận ra đây là giấc mơ.\nLà 『giấc mơ này』, đã bao năm rồi mới gặp\nlại."

# 【双鉄】
# display as 雙鐵
# JP: 「……珍しいな、夢をみるなど」
1398 = "「……Hiếm thật đấy, mình lại nằm mơ sao.」"

# monologue
# JP: 夢は深層心理のあらわれと――そんな有名な、\n有名すぎて通俗的ですらある学説のことをふと思う。
1289 = "Giấc mơ là sự phản chiếu của tâm lý sâu\nthẳm――tôi chợt nghĩ đến\nmột học thuyết nổi tiếng, nổi tiếng đến\nmức trở nên sáo rỗng."

# monologue
# JP: もしもそうなら、路子のいない、空の客車の――\nあの日の夢は、いったい僕の、どんな心理の現れだろう。
2441 = "Nếu đúng là vậy, thì giấc mơ về toa hành\nkhách trống không, không có Michiko――\ngiấc mơ của ngày hôm đó, rốt cuộc là sự\nphản chiếu cho tâm lý nào của tôi đây."

# 【双鉄】
# display as 雙鐵
# JP: 「……寂しい、ということもないと思うが」
1380 = "「……Mình cũng không nghĩ là do cảm thấy cô\nđơn đâu.」"

# monologue
# JP: 車窓を見れば、黒一色。\nどうやら夜を抜けているらしい。
2562 = "Nhìn ra ngoài cửa sổ, chỉ thấy một màu đen\nkịt.\nCó vẻ như con tàu đang chạy xuyên qua màn\nđêm."

# monologue
# JP: （カタンコトンカタンコトン）
# 2852 = "（喀嗒轟隆喀嗒轟隆）" 

# monologue
# JP: レールの継ぎ目を通過する音が、とても静かだ。
2770 = "Tiếng bánh xe lướt qua các khớp nối đường\nray, tĩnh lặng đến lạ thường."

# monologue
# JP: 現実よりも――過去よりも。\nよほど上等なレールの上を、僕は走っているらしい。
2651 = "So với hiện tại――so với quá khứ.\nCó vẻ như tôi đang chạy trên một tuyến\nđường ray cao cấp hơn nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「……目覚めるためには、\nいったいどうすればいいのかな」
1400 = "「……Để tỉnh lại,\nrốt cuộc mình phải làm sao đây.」"

# monologue
# JP: ここにはもう、なんの未練もないはずだ。\nお別れならば、とっくにきちんと、済ませたはずだ。
2530 = "Nơi này, đáng lẽ tôi không còn chút vương\nvấn nào nữa.\nNếu là lời từ biệt, thì tôi đã giải quyết\nổn thỏa từ lâu rồi."

# monologue
# JP: 見るべき夢は、もう過去には無く。\nただ未来にのみ、あるはずだから。
2535 = "Giấc mơ tôi nên thấy, không còn nằm ở quá\nkhứ nữa.\nMà chỉ hướng về tương lai thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1752 = "「A――」"

# monologue
# JP: 光だ。車窓の外から、不意に。
2334 = "Là ánh sáng. Bất chợt hắt vào từ ngoài cửa\nsổ tàu."

# monologue
# JP: まるでカーテンをほんの僅かだけ開いた様な、\n静かな光が――
2466 = "Tựa như rèm cửa vừa được hé mở đôi chút,\nmột luồng sáng tĩnh lặng――"

# 【日々姫】
# display as 日日姬
# JP: 「ぁ――」
# 1752 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……む」
1796 = "「Ưm……ư.」"

# 【日々姫】
# display as 日日姬
# JP: 「！」
# 2142 = "「！」" 

# monologue
# JP: （カリカリ――シャッ――シャーーーッ）
2850 = "(Sột soạt――xoẹt――xoẹtttt)"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 日々姫だ。\n暗闇のなか、ぼんやりと――
2637 = "Là Hibiki.\nTrong bóng tối, mờ mờ ảo ảo――"

# monologue
# JP: ああ……夜か。\nつまりは僕は、眠っていたのか。
2402 = "À……là ban đêm sao.\nNghĩa là tôi, đã ngủ quên ư."

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 夜の真ん中。わずかに開いたカーテンから、\n何かを日々姫は、一心不乱にスケッチしている。
2688 = "Giữa đêm khuya. Từ khe rèm hé mở,\nHibiki đang say sưa phác thảo thứ gì đó."

# monologue
# JP: （一体何を――――っ！）
2846 = "(Rốt cuộc là đang vẽ cái gì――――!)"

# monologue
# JP: 星、だ。\nなんと美しい星々だろう。
2635 = "Là những vì sao.\nNhững vì sao thật đẹp biết bao."

# monologue
# JP: ホームの上に、まばゆい星が散りばめられている。\nホームを照らす灯として、ホームに眠る車窓の灯として。
2683 = "Trên sân ga, những vì sao chói lọi rải rác\nkhắp nơi.\nNhư ánh đèn chiếu sáng sân ga, như ánh đèn\ntừ cửa sổ toa tàu đang say ngủ."

# monologue
# JP: （緑比車の……あれは回送列車か？\n車内灯をつけ、清掃作業をしているのだろうか）
2858 = "(Toa xe Ryokuhi……kia là tàu hồi tống sao?\nBật đèn trong xe, chắc là đang dọn dẹp vệ\nsinh nhỉ.)"

# monologue
# JP: 人の気配を感じない。\n遠くのホームの緑比車にも、僕らの横たわる寝台にも。
2339 = "Không cảm nhận được hơi thở của con người.\nTừ toa xe Ryokuhi trên sân ga đằng xa, cho\nđến giường nằm của chúng tôi."

# monologue
# JP: 全てが、寝静まっている。\n日々姫が鉛筆を走らせる、その音だけを例外として。
2557 = "Mọi thứ đều đang chìm trong giấc ngủ say.\nNgoại trừ âm thanh ngòi chì lướt trên giấy\ncủa Hibiki."

# monologue
# JP: （シャーーっ、サッ、サッ――カリカリ、カリカリっ）
2855 = "(Xoẹttt, xoẹt, xoẹt――sột soạt, sột soạt)"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やがて、ピタリと。日々姫の鉛筆の音が止まる。\n一瞬おいて、音の種類ががらりとかわる――！
2692 = "Chẳng mấy chốc, dừng hẳn. Tiếng bút chì\ncủa Hibiki im bặt.\nMột thoáng sau, loại âm thanh hoàn toàn\nthay đổi――!"

# 【日々姫】
# display as 日日姬
# JP: 「――」
1361 = "「――」"

# monologue
# JP: ページを開いたスケッチブックに鉛筆を乗せ、\n日々姫が僕に手渡してくる。
2618 = "Đặt cây bút chì lên trang sổ phác thảo\nđang mở,\nHibiki đưa nó cho tôi."

# monologue
# JP: 受け取り見れば、人の作った星明りの下、\n日々姫の文字がぼんやり浮かぶ。
2561 = "Nhận lấy và nhìn thử, dưới ánh sao nhân\ntạo,\nnhững dòng chữ của Hibiki mờ mờ hiện lên."

# monologue
# JP: 《起こしちゃったの、ごめんなさい》
1328 = "《Em làm anh thức giấc à, xin lỗi anh nhé.》"

# monologue
# JP: 口を開けば、この静寂はこわれてしまう。\n誰かが起きれば、この美しさは剥がれてしまう。
2513 = "Nếu mở miệng nói, sự tĩnh lặng này sẽ bị\nphá vỡ.\nNếu có ai đó thức giấc, vẻ đẹp này sẽ bị\ntước đoạt mất."

# monologue
# JP: 僕も日々姫も理解している。\nだから、こわさぬように振る舞う。
2471 = "Cả tôi và Hibiki đều hiểu điều đó.\nNên chúng tôi hành xử sao cho không phá vỡ\nnó."

# monologue
# JP: 《いいや、構わん。\nおかげで素晴らしい光景を目にできた》
1350 = "《Không, không sao đâu.\nNhờ em mà anh mới được chiêm ngưỡng khung\ncảnh tuyệt vời này đấy.》"

# monologue
# JP: 窓の外へとまた目を向ける。旅だと感じる。\n不意に、強く。どうしようもないほど強く。強く。
2357 = "Tôi lại hướng mắt ra ngoài cửa sổ. Cảm\ngiác như đang trong một chuyến hành trình.\nBất chợt, mãnh liệt. Mãnh liệt đến mức\nkhông thể cưỡng lại. Vô cùng mãnh liệt."

# monologue
# JP: これは視察で、仕事で、同時に家族旅行で。\nそうありながら、僕の旅であり、日々姫の旅だと。
2644 = "Đây là chuyến khảo sát, là công việc, đồng\nthời cũng là chuyến du lịch gia đình.\nDù vậy, đây là chuyến hành trình của tôi,\nvà cũng là chuyến hành trình của Hibiki."

# monologue
# JP: 《あの緑比車は、素晴らしい旅をしてきたのだろうな》
1331 = "《Toa xe Ryokuhi kia, chắc hẳn đã trải qua\nmột chuyến hành trình tuyệt vời nhỉ.》"

# monologue
# JP: 書いて渡せば、またすぐに日々姫の文字が戻されてくる。
2800 = "Viết xong đưa lại, những dòng chữ của\nHibiki lập tức được gửi trả lại."

# monologue
# JP: 《よね。しあわせそうに、眠っとるもん》
1339 = "《Đúng á. Trông nó ngủ hạnh phúc ghê chưa\nkìa.》"

# monologue
# JP: ああ――日々姫もか。\n車内灯をともしていても、眠っていると、やはり見えるか。
2404 = "À――Hibiki cũng nghĩ vậy sao.\nDù đèn trong xe đang bật, nhưng vẫn thấy\nnó như đang say ngủ."

# monologue
# JP: うれしくなる。そんなささやかな気持ちの一致が。\n日々姫は家族で、妹なのだと、今更ながらつくづく思う。
2792 = "Cảm thấy thật vui. Sự đồng điệu nhỏ nhoi\nấy.\nHibiki là gia đình, là em gái tôi, giờ\nphút này tôi mới thấm thía điều đó."

# monologue
# JP: 《美しいものだな。列車が眠る姿というのは》
1333 = "《Thật đẹp làm sao. Hình ảnh đoàn tàu đang\nsay ngủ ấy.》"

# monologue
# JP: 《うん》
1337 = "《Vâng.》"

# monologue
# JP: それだけ書いたスケッチブックを、\n日々姫はすぐに、戻して戻してと手振りしてくる。
2524 = "Cuốn sổ phác thảo chỉ viết vỏn vẹn nhiêu\nđó,\nHibiki lập tức vẫy tay ra hiệu trả lại cho\ncon bé."

# monologue
# JP: 《向こうから誰か見とったら、\nこっちの列車は、どぎゃん景色に見えるとかねぇ？》
1330 = "《Nếu có ai đó nhìn từ bên kia lại,\nthì đoàn tàu bên này, trông sẽ ra sao ha?》"

# monologue
# JP: 《さぁ、どうだろう。まるでわからん――》
1358 = "《Chà, ai biết được. Anh chịu thôi――》"

# monologue
# JP: そこで手を止め、想像してみる。
2521 = "Đến đây tôi dừng bút, thử tưởng tượng xem\nsao."

# monologue
# JP: 向こうの列車に僕が乗り――\n僕を見ている日々姫を見る、と。
2509 = "Nếu tôi ngồi trên chuyến tàu bên kia――\nvà nhìn Hibiki đang nhìn tôi thì sao."

# monologue
# JP: 《きっと、同じくらい。\nいや、より美しく見えようかと思う》
1327 = "《Chắc chắn, cũng sẽ giống như vậy.\nKhông, anh nghĩ trông sẽ còn đẹp hơn nữa\nkìa.》"

# monologue
# JP: 《そかな？　どうかな？　そぎゃんだったら嬉しかとね。\n実際に見れんのば残念だけど》
1349 = "《Vậy á? Chắc không? Nếu được vậy thì vui\nquá ha.\nTiếc là không thể tận mắt nhìn thấy thôi.》"

# monologue
# JP: 《そうだな。見てみたくあるよな》
1345 = "《Đúng vậy. Anh cũng muốn nhìn thử xem\nsao.》"

# monologue
# JP: 声を出さずに、言葉を交わす、こころを交わす。\n真夜中の、異国の旅の、寝台越しの、文通で。
2472 = "Không cất tiếng, chúng tôi trao đổi ngôn\ntừ, trao đổi tâm tư.\nGiữa đêm khuya, trong chuyến du hành nơi\nđất khách, qua những dòng thư trao tay qua\nlại trên giường ngủ."

# monologue
# JP: 日々姫の一文字一文字が、ともに隠れ見るこの光景が、\n僕の体とこころに旅情を、いと心地よく満たしてくれる。
2617 = "Từng nét chữ của Hibiki, khung cảnh chúng\ntôi cùng lén lút chiêm ngưỡng này,\nđã lấp đầy cơ thể và tâm trí tôi bằng một\nniềm khao khát du hành thật dễ chịu."

# monologue
# JP: 《ずっと、日々姫は起きていたのか？》
1342 = "《Nãy giờ, Hibiki vẫn thức sao?》"

# monologue
# JP: 《ううん、偶然。目がさめちゃって、\nなんか見えるかなってカーテンめくったら、この景色で》
1340 = "《Dạ không, tình cờ thôi. Em bị tỉnh giấc,\nđịnh vén rèm xem có thấy gì không, ai dè\nlại thấy cảnh này.》"

# monologue
# JP: 《それは素晴らしい偶然だな。\nいっそ、運命的とも思える》
1359 = "《Thật là một sự tình cờ tuyệt vời.\nThậm chí, anh còn thấy nó giống như định\nmệnh vậy.》"

# monologue
# JP: 日々姫の鉛筆がスラスラ動く。\nほんの一瞬だけ止まる。
2628 = "Cây bút chì của Hibiki lướt đi thoăn\nthoắt.\nChỉ dừng lại trong một khoảnh khắc ngắn\nngủi."

# monologue
# JP: そうして何かを書き足して、\nスケッチブックはまた戻ってくる。
2693 = "Sau đó con bé viết thêm gì đó,\nrồi cuốn sổ phác thảo lại được đưa về phía\ntôi."

# monologue
# JP: 《運命だったら――――素敵ね。まっこと》
1353 = "《Nếu là định mệnh thì――――tuyệt thật ha.\nThật sự á.》"

# monologue
# JP: 頷いている。\n誰の目にさえ触れぬであろうとわかっていても。
2547 = "Tôi gật đầu.\nDù biết rằng sẽ chẳng có ai nhìn thấy."

# monologue
# JP: 《ああ。本当に素敵だな》
1348 = "《À. Thật sự rất tuyệt vời.》"

# monologue
# JP: スケッチブックを、たたんで戻す。\n日々姫も受け取ったまま、開かずにおく。
2536 = "Gấp cuốn sổ phác thảo lại, tôi đưa nó cho\ncon bé.\nHibiki nhận lấy, cũng không mở ra xem."

# 【双鉄】
# display as 雙鐵
# JP: 「……………………」
1367 = "「……………………」"

# 【日々姫】
# display as 日日姬
# JP: 「……………………」
# 1367 = "「……………………」" 

# monologue
# JP: 路子とむかし――\n遠いむかしに、こんな夜を過ごした気がする。
2416 = "Ngày xưa với Michiko――\nRất lâu về trước, hình như tôi cũng từng\ntrải qua một đêm như thế này."

# monologue
# JP: 言葉一つさえ雑音になる、世界と僕らが溶け合うような\n――とても、とても静かな時間を。
2808 = "Một khoảng thời gian tĩnh lặng đến mức,\nchỉ một lời nói cũng trở thành tạp âm,\nnhư thể thế giới và chúng tôi hòa làm một."

# monologue
# JP: （あ――）
2851 = "(A――)"

# monologue
# JP: 動き出す音が聞こえなかった。
2541 = "Không nghe thấy tiếng khởi hành."

# monologue
# JP: この窓からは確認できない牽引機関車の動力音も、\n客車が牽かれ、レールを走るその音さえも。
2786 = "Tiếng động cơ của đầu máy kéo không thể\nxác nhận từ cửa sổ này,\nngay cả tiếng toa hành khách bị kéo đi,\nlăn bánh trên đường ray cũng không."

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 日々姫の視線をふわりと感じて、目を向ける。\n日々姫は僕に、くちびるだけで話しかけてくる。
2533 = "Cảm nhận được ánh nhìn nhẹ nhàng của\nHibiki, tôi quay sang.\nHibiki đang nói chuyện với tôi, chỉ bằng\nkhẩu hình miệng."

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 『いっちゃったね』と、唇の声。\n読唇術など覚えもないが、それでもはっきり伝わってくる。
2434 = "Khẩu hình miệng nói 『Tàu chạy mất rồi\nkìa』.\nDù không biết thuật đọc khẩu hình, nhưng\ntôi vẫn hiểu rõ con bé đang nói gì."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 『ああ、いったな』と、僕も唇だけで応える。
1293 = "『À, chạy rồi nhỉ』, tôi cũng đáp lại bằng\nkhẩu hình miệng."

# monologue
# JP: 魔法の時間はきっともうすぐ解けてしまうが、\n今なら絶対つたわると、僕にも確信できている。
2831 = "Khoảng thời gian ma thuật chắc chắn sắp\nkết thúc rồi,\nnhưng tôi tin chắc rằng, nếu là bây giờ\nthì nhất định sẽ truyền đạt được."

# monologue
# JP: （おやすみ、日々姫）
2854 = "(Ngủ ngon nhé, Hibiki.)"

# monologue
# JP: （おやすみ、にぃに）
2862 = "(Ngủ ngon nha, anh hai.)"

# monologue
# JP: 声を出さずに、文字さえ書かずに、伝え合う。
2652 = "Không cất tiếng, cũng chẳng cần viết chữ,\nchúng tôi truyền đạt cho nhau."

# monologue
# JP: 日々姫の指がゆっくりと――\nカーテンを閉じ、魔法の夜を黒一色で塗りつぶす。
2678 = "Những ngón tay của Hibiki chầm chậm――\nkhép rèm lại, nhuộm đen màn đêm ma thuật."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1368 = "「…………」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 暗闇。\nまことの夜の暗さだ。
2304 = "Bóng tối.\nSự tĩnh mịch của màn đêm đích thực."

# monologue
# JP: それが、どこまでも心地よい。
2372 = "Cảm giác ấy, dễ chịu đến lạ thường."

# monologue
# JP: （カタンコトンカタンコトン）
# 2852 = "（喀嗒轟隆喀嗒轟隆）" 

# monologue
# JP: いつの間に、僕らの列車も滑り出している。
2278 = "Không biết từ lúc nào, chuyến tàu của\nchúng tôi cũng đã lăn bánh."

# monologue
# JP: さらなる夜更けと、夜明けに向けて――\nその先に待つ、聖都に向けて。
2825 = "Hướng về đêm khuya tĩnh mịch, hướng về\nbình minh rạng rỡ――\nvà hướng về Thánh đô đang chờ đợi ở phía\ntrước."
