1706 = "「另外還點了炒白菜和水煮牛肉。本來還想點兔肉火鍋的，不過兔肉好像沒有備貨了」" 

# monologue
# JP: 西瓜がすぐに、会話内容を僕らに訳して伝えてくれる。\n日々姫の手もそれにあわせて、再び忙しく動きはじめる。
2724 = "西瓜及時地把對話的內容翻譯給我們。而日日姬的手也隨之再次忙碌起來。" 

# 【志寰】
# display as 志寰
# JP: 「……日々姫さんは、会話を全て絵になおして\n描いてらっしゃるのですか？」
1387 = "「……日日姬小姐這是要把這些對話全畫下來嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、文字が書けないわけではありませんから。\nスケッチブックをメモ帳代わりにしているだけかと」
2046 = "「說是素描簿，但誰也沒規定說不能寫字不是，她只是拿素描簿暫代筆記本啦」" 

# 【志寰】
# display as 志寰
# JP: 「そうなのですか。日々姫さんほどの画家さんなら、\n全てを絵にした方が早いのかと勘違いしました」
1683 = "「原來如此。我還誤以為對於日日姬小姐來說，用畫的比用寫的來得更快呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「たしかに速描などは、見慣れてもなお\n速さに驚かされますが――ああ」
2112 = "「雖然她的速寫功底著實了得，像我們這些看慣了的人也不由得驚訝於她的迅速，但——啊」" 

# monologue
# JP: そういえば、さっき日々姫は西瓜を速描していたか。
2442 = "如此說來，剛剛日日姬好像有畫過西瓜的速寫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。志寰君がお前の絵に興味をもっているようだ」
1949 = "「日日姬，志寰好像對你的畫很有興趣哎」" 

# 【日々姫】
# display as 日日姬
# JP: 「よかよ？　メモももう取り終わったし」
2021 = "「行啊，反正我筆記也記好了」" 

# 【志寰】
# display as 志寰
# JP: 「え！？　いいんですか！？　嬉しいな。\nありがとうございます！」
1728 = "「哎！？可以嗎！？好開心。非常感謝！」" 

# monologue
# JP: 日々姫から受け取ったスケッチブックを手渡せば、\nもうそれだけで満面の笑顔がこぼれ落ちる。
2330 = "光是從日日姬手中接過素描簿，志寰的笑容就已經燦爛到無法直視了。" 

# monologue
# JP: ……しっぽがあれば、ぶんぶん振っていることだろう。\nなんとも、人好きのすることだ。
1305 = "……要是有尾巴的話，想必已經搖個不停了吧。真是讓人不由得心生喜歡。" 

# 【志寰】
# display as 志寰
# JP: 「西瓜。見てごらん。\nきみが描かれてるよ」
2035 = "「西瓜，你看看，你就在畫上」" 

# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: やはり興味があるのだろう。
2356 = "其實還是很感興趣的吧。" 

