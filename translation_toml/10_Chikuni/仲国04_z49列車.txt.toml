# 【日々姫】
# display as 日日姬
# JP: 「はい。どうぞ」
2000 = "「給」" 

# 【志寰】
# display as 志寰
# JP: 「ありがとうございます。僕は、本当に嬉しいです」
2126 = "「非常感謝。我真的好高興」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん喜んでもらえるんなら、私も嬉しかー」
1986 = "「看你樂成這樣，我也跟著一起樂呵起來咧——」" 

# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1368 = "「…………」" 

# monologue
# JP: 西瓜の視線がしきりに動く。
