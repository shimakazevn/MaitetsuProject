# JP: スケッチブックの上には大きく、入境許可書の記入見本。\n見本に倣って記入を始める。
2552 = "Trên cuốn sổ phác thảo là mẫu điền thẻ\nnhập cảnh được vẽ rất to.\nChúng tôi bắt đầu điền theo mẫu."

# 【ハチロク】
# display as 八六
