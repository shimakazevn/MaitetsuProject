# JP: 「……仲国版ナインスターズ、か」
1365 = "「……Nine Stars phiên bản Trung Quốc, sao.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1345 = "「…………」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1345 = "「…………」" 

# monologue
# JP: ……話を振ったつもりであったが、\nあいにく何の反応もない。
1329 = "……Tôi định bắt chuyện với em ấy,\nnhưng tiếc là chẳng có phản ứng gì."

# monologue
# JP: 不思議に思い視線を横へと動かせば――
2453 = "Thấy lạ, tôi đưa mắt nhìn sang bên cạnh\nthì——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1814 = "「À.」"

# monologue
# JP: 日々姫の視線も、ハチロクの視線も、\nまさしく、釘付けになっている。
2485 = "Cả ánh mắt của Hibiki và ánh mắt của\nHachiroku,\nđều đang bị đóng đinh vào một chỗ."

# monologue
# JP: 国際線の飛行機の、小さな窓の外を流れる景色――\n一心に見入るその横顔は、あどけないほどに純粋だ。
2401 = "Khung cảnh trôi qua bên ngoài ô cửa sổ nhỏ\ncủa chuyến bay quốc tế——\nGóc nghiêng của hai người khi chăm chú\nnhìn ngắm, trong sáng đến mức ngây thơ."

# 【双鉄】
# display as 雙鐵
# JP: 「……搭乗までの大騒ぎが、ウソのようだな」
1403 = "「……Sự ồn ào trước khi lên máy bay, cứ như\nlà nói dối vậy.」"

# monologue
# JP: なにせ、三人とも初めての国際線だ。\nその上、強行スケジュール。
2526 = "Dù sao thì, cả ba chúng tôi đều là lần đầu\nđi chuyến bay quốc tế.\nHơn nữa, lại còn là một lịch trình dày\nđặc."

# monologue
# JP: ロクな準備もできなかったが、\nなんとか、ここまでは間に合った。
2394 = "Dù không chuẩn bị được gì nhiều,\nnhưng bằng cách nào đó, chúng tôi đã kịp\nđến được đây."

# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ……日々姫は当然のことであろうが、\nハチロクまでもか」
1996 = "「Nhưng mà……Hibiki thì là chuyện đương\nnhiên rồi,\nkhông ngờ đến cả Hachiroku cũng vậy.」"

# monologue
# JP: 座席配置は2－3－2。\n僕の席からではあいにく、遠目に空が望めるのみだが……
2573 = "Sơ đồ ghế ngồi là 2-3-2.\nTừ chỗ của tôi, tiếc là chỉ có thể nhìn\nthấy bầu trời từ đằng xa……"

# monologue
# JP: 窓席の日々姫のすぐ隣にいるハチロクからは、\n日々姫ほどではないにせよ――ああ。
2339 = "Nhưng từ chỗ Hachiroku ngồi ngay cạnh ghế\nsát cửa sổ của Hibiki,\nthì dù không bằng Hibiki——à."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。日々姫が手を休めたときにでも、\n座席の位置を交代してもらうか？」
1720 = "「Hachiroku. Hay là đợi lúc Hibiki nghỉ\ntay,\nanh nhờ em ấy đổi chỗ cho em nhé?」"

# monologue
# JP: 名を呼べばハチロクは嬉しげな顔で僕へと振り向く。\nその口から、ほうっと大きな排気がもれる。
2364 = "Nghe gọi tên, Hachiroku quay lại nhìn tôi\nvới vẻ mặt vui sướng.\nMột luồng khí thải lớn phụt ra từ miệng em\nấy."

# 【ハチロク】
# display as 八六
# JP: 「ご厚意をありがとうございます、双鉄さま。\nですけれどわたくしは、ここからの景色が良いのです」
2189 = "「Cảm ơn lòng tốt của ngài, ngài Soutetsu.\nNhưng em thích cảnh sắc nhìn từ chỗ này\nhơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1851 = "「Hửm?」"

# monologue
# JP: “景色で”ではなく、“景色が”と――
2307 = "「Hửm?」"

# monologue
# JP: ハチロクがあえていうのなら、なにか理由が……\nああ。
2347 = "Không phải \"thích cảnh sắc\", mà là \"cảnh\nsắc nhìn từ chỗ này tốt hơn\"——"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ふたりで景色を分け合っているのか」
1746 = "「Ra là vậy. Hai người đang chia sẻ cảnh\nsắc với nhau sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。左様です。双鉄さま。\n日々姫は景色を、わたくしにも見せてくれています」
2018 = "「Vâng. Đúng vậy ạ. Ngài Soutetsu.\nHibiki đang cho em cùng ngắm cảnh sắc đó\nạ.」"

# monologue
# JP: 窓は――より厳密にいえば、その外側に流れる景色は――\n常に日々姫が専有すべきだ。
2577 = "Cửa sổ——nói chính xác hơn là cảnh sắc trôi\nqua bên ngoài cửa sổ——\nlẽ ra Hibiki phải luôn được độc chiếm."

# monologue
# JP: 今回の旅行の目的が視察――あらゆるものを見聞きして、\nそこからアイディアを産み出すことである以上。
2612 = "Vì mục đích của chuyến đi lần này là khảo\nsát——nhìn và nghe mọi thứ,\ntừ đó nảy sinh ra các ý tưởng."

# 【ハチロク】
# display as 八六
# JP: 「スケッチブックとペンを手に。目は窓の外を向いたまま。\nけれど日々姫は、決して窓を独り占めにはしないのです」
2184 = "「Tay cầm sổ phác thảo và bút. Mắt vẫn\nhướng ra ngoài cửa sổ.\nNhưng Hibiki tuyệt đối không độc chiếm cửa\nsổ cho riêng mình đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。随分と窮屈そうな姿勢ではあるが……」
1954 = "「Đúng vậy nhỉ. Dù tư thế trông có vẻ khá\nchật vật……」"

# monologue
# JP: 日々姫は窓の手前側に、ぴったりと顔をつけるようにし、\n視線を固定し、外を眺めてはペンを走らせている。
2493 = "Hibiki áp sát mặt vào mép trong của cửa\nsổ,\nánh mắt cố định, vừa ngắm nhìn bên ngoài\nvừa lia bút."

# monologue
# JP: そうすればハチロクも、機窓の眺めを楽しめるのだと――\n日々姫のことだ。もちろん意識していよう。
2611 = "Làm như vậy thì Hachiroku cũng có thể\nthưởng thức cảnh sắc từ cửa sổ máy bay——\nLà Hibiki mà. Chắc chắn con bé đã ý thức\nđược điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、美しい景色だな」
1399 = "「……Đúng là, một cảnh sắc tuyệt đẹp nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょう？」
1937 = "「Đúng không ạ?」"

# monologue
# JP: ハチロクの満足そうなすまし顔。\nカリカリとペンを走らせる日々姫のまっすぐな瞳。
2356 = "Khuôn mặt điềm tĩnh đầy vẻ mãn nguyện của\nHachiroku.\nĐôi mắt kiên định của Hibiki khi đang lia\nbút sột soạt."

# monologue
# JP: その両方をひとつの景色と楽しめるのだ――\nあるいは僕の席こそが、一番の特等席であるかもしれん。
2334 = "Có thể thưởng thức cả hai điều đó như một\ncảnh sắc duy nhất——\nCó lẽ chỗ ngồi của tôi mới là chỗ ngồi đặc\nbiệt nhất cũng nên."

# 【ハチロク】
# display as 八六
# JP: 「それにわたくし、[このからだ,2]整備体でもございますから。\n視覚情報も、どうしても限られてしまいますし」
2085 = "「Hơn nữa em đang ở trong \\x%l整備体;#00ffc040;thân chính%l;#; mà.\nThông tin thị giác dù sao cũng bị hạn chế\nđi nhiều ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。どうやっても運転体を国外に持ち出す方法はない、\nとのことだったものな」
2011 = "「Ừ. Nghe nói dù có làm cách nào cũng không\nthể\nmang thân lái ra nước ngoài được mà.」"

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;前には、仲国に輸出された機関車とレイルロオドも\nいたという記憶はあるのですけれど……」
1944 = "「Em nhớ là trước \\x%l大戦;#00ffc040;Đại chiến%l;#;, cũng từng có\nđầu máy xe lửa và Railord\nđược xuất khẩu sang Trung Quốc……」"

# 【双鉄】
# display as 雙鐵
# JP: 「技術流出を防止するため――か。\n思わぬところに、\x%l大戦;#00ffc040;大戦%l;#;の禍根は残っているものだ」
2015 = "「Để ngăn chặn rò rỉ công nghệ——sao.\nMầm mống tai họa của \\x%l大戦;#00ffc040;Đại chiến%l;#; vẫn còn sót\nlại ở những nơi không ngờ tới nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;の禍根」
1340 = "「Mầm mống tai họa của \\x%l大戦;#00ffc040;Đại chiến%l;#;.」"

# monologue
# JP: ……言って、ハチロクが辺りを見回す。
1323 = "……Nói rồi, Hachiroku nhìn quanh."

# monologue
# JP: 恐る恐るな風情だが、無論、機内は平穏そのもの――\nみながみな、思い思いに寛いでいる。
2621 = "Dù có vẻ sợ sệt, nhưng tất nhiên, bên\ntrong khoang máy bay rất đỗi yên bình——\nAi nấy đều đang thư giãn theo cách riêng\ncủa mình."

# 【ハチロク】
# display as 八六
# JP: 「海外に行くというのは、とても複雑なことなのですね。\n……頭ではそう、わたくしも理解しているのですけれど」
1734 = "「Việc đi ra nước ngoài, quả là một chuyện\nrất phức tạp nhỉ.\n……Dù trong đầu em cũng hiểu là vậy nhưng\nmà.」"

# monologue
# JP: またきょろきょろ。
2337 = "Em ấy lại nhìn quanh quất."

# monologue
# JP: [　　キャビンアテンダント,1]ＣＡが目ざとく気づき、「何か？」と\n目線で尋ねてくるのを、やはり目線で遠慮する
2553 = "Cô tiếp viên hàng không (CA) tinh mắt nhận\nra, đưa ánh mắt dò hỏi \"Có chuyện gì\nsao?\",\ntôi cũng dùng ánh mắt để từ chối."

# 【ハチロク】
# display as 八六
# JP: 「……現実味がない、と申しますか――この期に及んで\nまだふわふわと、宙に浮いている心持ちです」
1382 = "「……Nói sao nhỉ, không có cảm giác chân\nthực——đến tận lúc này rồi\nmà em vẫn cảm thấy lơ lửng, cứ như đang\ntrôi lơ lửng trên không trung vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、それは当然のことだろう。\n実際僕らは、いままさに宙に浮いているのだ」
1782 = "「Haha, chuyện đó là đương nhiên rồi.\nThực tế thì chúng ta đang lơ lửng trên\nkhông trung thật mà.」"

# 【ハチロク】
# display as 八六
# JP: 「まあっ！\nうふふっ、左様でしたね」
1922 = "「Ôi chao!\nUfufu, đúng là vậy nhỉ.」"

# monologue
# JP: こぼれた笑顔に気付かされる。\n機内に入ってからハチロクは、一度も笑ってなかったと。
2361 = "Nụ cười hé nở ấy khiến tôi nhận ra.\nTừ lúc lên máy bay, Hachiroku chưa hề cười\nmột lần nào."

# monologue
# JP: つまるところは、\nガチガチに緊張してしまっているのだろう。
2419 = "Nói tóm lại là,\nchắc hẳn em ấy đang căng thẳng đến mức\ncứng đờ người rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「飛行機は、世界で最も安全な乗り物のひとつだ。\n安心していい」
2193 = "「Máy bay là một trong những phương tiện an\ntoàn nhất thế giới.\nEm cứ yên tâm.」"

# 【ハチロク】
# display as 八六
# JP: 「あ、いえ。そこはわずかも不安に思ってはおりません。\nエアクラナビが運転制御をしているというお話ですし」
1821 = "「A, không ạ. Về chuyện đó thì em không hề\nlo lắng chút nào.\nVì nghe nói Navi của Aircra đang điều\nkhiển vận hành mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1842 = "「Ừ.」"

# monologue
# JP: その一言に嬉しくなる。
2610 = "Câu nói đó khiến tôi thấy vui."

# monologue
# JP: 当初はあれほど、エアクラ自体を敵視していたハチロクが、\nいまではすっかり、エアクラナビを妹分と信頼している。
2527 = "Hachiroku, người ban đầu vốn rất thù địch\nvới bản thân Aircra,\nhiờ đây đã hoàn toàn tin tưởng Navi của\nAircra như một người em gái."

# 【双鉄】
# display as 雙鐵
# JP: 「動力自体はジェットエンジンだがな。今やほぼ全ての\n主要交通手段のナビゲーションは、レイルロオド由来だ」
2183 = "「Dù động lực chính là động cơ phản lực.\nNhưng hiện nay hầu hết\nhệ thống định vị của các phương tiện giao\nthông chính đều bắt nguồn từ Railord.」"

# 【ハチロク】
# display as 八六
# JP: 「光栄なことと存じます」
1950 = "「Thật là một niềm vinh hạnh ạ.」"

# monologue
# JP: はにかんで。\n頬の赤みもわずかに強め、ハチロクはまた辺りを見回す。
2367 = "Em ấy bẽn lẽn.\nĐôi má ửng hồng hơn một chút, Hachiroku\nlại nhìn quanh."

# 【ハチロク】
# display as 八六
# JP: 「ジェットエンジンの飛行機。ジェット機。――わたくし、\n初めて乗りましたが、相当に快適なものですね」
1855 = "「Máy bay động cơ phản lực. Máy bay phản\nlực.——Đây là lần đầu tiên\nem đi, nhưng nó khá là thoải mái nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。鉄道車輌と比べてどうだ？」
1921 = "「Đúng vậy. So với toa xe đường sắt thì\nsao?」"

# 【ハチロク】
# display as 八六
# JP: 「揺れることを含めましても、普通客車より快適ですね。\n一等展望車とまでは申しませんが、二等相当くらいかと」
2182 = "「Tính cả độ rung lắc thì vẫn thoải mái hơn\ntoa hành khách phổ thông ạ.\nDù không bằng toa quan sát hạng nhất,\nnhưng chắc cũng tương đương hạng hai ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。なかなか妥当な評価と思うぞ」
1838 = "「Hửm. Anh nghĩ đó là một đánh giá khá xác\nđáng đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまに教えていただきましたので。\n交通手段にはそれぞれの、特色があり強みがあると」
1342 = "「Vì ngài Soutetsu đã dạy em mà.\nMỗi phương tiện giao thông đều có đặc sắc\nvà thế mạnh riêng ạ.」"

# monologue
# JP: 言って、黙って、またキョロキョロ。\n好奇心が強まっているのか、どうもハチロクは落ち着かぬ。
2596 = "Nói rồi, em ấy im lặng, lại nhìn quanh\nquất.\nCó vẻ sự tò mò đang dâng cao, Hachiroku cứ\nbồn chồn không yên."

# 【ハチロク】
# display as 八六
# JP: 「速度の方も、飛行型エアクラと比してなお圧倒的ですし。\n日ノ本からの渡航手段の殆どがこれというのも納得です」
2149 = "「Về tốc độ thì nó cũng áp đảo hoàn toàn so\nvới Aircra bay.\nCũng dễ hiểu khi hầu hết các phương tiện\nxuất cảnh từ Hinomoto đều là máy bay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。まぁ、日ノ本の法が、飛行用エアクラでの渡航に\n厳しい制限をかけるのは、出入国管理のためだそうだが」
2065 = "「Đúng vậy. Mà, nghe nói việc luật pháp\nHinomoto áp đặt những hạn chế nghiêm ngặt\nđối với việc xuất cảnh bằng Aircra bay là\nvì mục đích quản lý xuất nhập cảnh.」"

# 【ハチロク】
# display as 八六
# JP: 「出入国管理、でございますか？」
1731 = "「Quản lý xuất nhập cảnh, sao ạ?」"

# monologue
# JP: おや。ナビはハチロクにはグチらな――ああいや、\n言葉を選んでの婉曲な不満表現を示さなかったか。
2404 = "Ủa. Navi không cằn nhằn với Hachiroku\nsao——à không,\ncon bé đã chọn lọc từ ngữ để thể hiện sự\nbất mãn một cách uyển chuyển rồi sao."

# 【双鉄】
# display as 雙鐵
# JP: 「空港や港等に、出入国を出来る地点を絞り込まねば、\n出国者や入国者の数を、国が把握できなくなってしまう」
1899 = "「Nếu không giới hạn các địa điểm có thể\nxuất nhập cảnh như sân bay hay bến cảng,\nquốc gia sẽ không thể nắm bắt được số\nlượng người xuất cảnh và nhập cảnh.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ……左様ですね。日ノ本は島国ですので、\nそうすることが比較的容易なのですね？」
1854 = "「A……đúng vậy nhỉ. Hinomoto là một quốc\nđảo,\nnên việc đó tương đối dễ dàng phải không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。先程話した、物品の持ち出しや運び入れ禁止とも\n絡んでくるな。入国経路と手段とは、ゆえに制限される」
1846 = "「Ừm. Nó cũng liên quan đến việc cấm mang\nvật phẩm ra vào\nmà anh vừa nói lúc nãy. Vì vậy, lộ trình\nvà phương tiện nhập cảnh bị hạn chế.」"

# 【ハチロク】
# display as 八六
# JP: 「大いに納得いたしました。\n……海外に出るというのは、本当に――」
1909 = "「Em đã hoàn toàn hiểu rồi ạ.\n……Việc ra nước ngoài, quả thực là——」"

# monologue
# JP: （ぽーん、ぽーん、ぽーん）
2637 = "（Bong, bong, bong）"

# 【ハチロク】
# display as 八六
# JP: 「あらっ」
1769 = "「Ôi.」"

# 【機内放送】
# display as 機內廣播
# JP: 「女士們、先生們。\n歓迎乗坐仲国国際航空公司248次副丘前往北琴的航班」
1885 = "「Thưa quý bà, quý ông.\nChào mừng quý khách đã lên chuyến bay số\n248 của Hãng hàng không Quốc tế Trung Quốc\ntừ Fukuoka đến Bắc Cầm.」"

# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄さま！？　これは一体、\n何をアナウンスされているのでございましょうか？」
2187 = "「Ngài, ngài Soutetsu!? Cái này rốt cuộc\nlà,\nhọ đang thông báo điều gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「仲国語は全くわからん――。\nあ、いや――」
1704 = "「Anh hoàn toàn không hiểu tiếng Trung——\nÀ, không——」"

# monologue
# JP: 続いてすぐに、詠語でのアナウンス。\n僕も堪能な方ではないが、いくらかならば理解できる。
2620 = "Ngay sau đó là thông báo bằng tiếng Anh.\nTôi cũng không phải là người giỏi tiếng\nAnh, nhưng cũng có thể hiểu được đôi chút."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国国際航空248便へのご搭乗ありがとうございます。\nこの飛行機は、[ふくおか,1]副丘発[ぺきん,1]北琴いき――むっ」
1938 = "「Cảm ơn quý khách đã lên chuyến bay số 248\ncủa Hãng hàng không Quốc tế Trung Quốc.\nChuyến bay này khởi hành từ Fukuoka đến\nBắc Cầm——hửm.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、日ノ本語でのアナウンスも。……うふふっ、\n双鉄さまのおっしゃられていたとおりの意味でしたね」
1778 = "「Chà, có cả thông báo bằng tiếng Hinomoto\nnữa.……Ufufu,\ný nghĩa đúng như những gì ngài Soutetsu đã\nnói nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。……ほう。『この機には特別に、\n日ノ本語のできるアテンダントも乗務しております』か」
2008 = "「Đúng vậy.……Hô. 『Trên chuyến bay này đặc\nbiệt\ncó sự phục vụ của tiếp viên có thể nói\ntiếng Hinomoto』 sao.」"

# 【ハチロク】
# display as 八六
# JP: 「大変心強いことですね。――あ！　ね？　双鉄さま。\nあの方が、日ノ本語を話せる方だと助かりますね」
2160 = "「Thật là đáng yên tâm nhỉ.——A! Đúng không?\nNgài Soutetsu.\nNếu người đó có thể nói tiếng Hinomoto thì\ntốt quá nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2014 = "「Ừ.」"

# monologue
# JP: ハチロクの視線の先にはワゴン。\n機内食までついてくるとは豪勢だ。っと――
2442 = "Theo hướng nhìn của Hachiroku là một chiếc\nxe đẩy.\nCó cả suất ăn trên máy bay nữa, thật xa\nhoa. Khoan đã——"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、昼食だ。長くもないフライトゆえに、\n放置していると食べそこねてしまうぞ？」
2000 = "「Hibiki, bữa trưa kìa. Chuyến bay cũng\nkhông dài,\nnếu cứ để đó là sẽ lỡ bữa đấy?」"

# 【日々姫】
# display as 日日姬
# JP: 「ぁ…………もーちょい。あと、これだけ……ん！\nオッケー！　食べると！　機内食も描いときたいし」
1807 = "「A…………một chút nữa thôi. Chỉ một chút này\nnữa thôi……ưm!\nOk! Em ăn đây! Em cũng muốn vẽ lại suất ăn\ntrên máy bay nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「機内食を描く？　……出来合いのものであろうし、\n資料にするなら、写真で十分なのではないか？」
2052 = "「Vẽ suất ăn trên máy bay sao? ……Chắc cũng\nchỉ là đồ làm sẵn thôi,\nnếu làm tư liệu thì chụp ảnh là đủ rồi\nmà?」"

# 【日々姫】
# display as 日日姬
# JP: 「出来合いでも、わたしには初めてのものだし。\n資料にするからこそ、手で描かんと覚えられんし」
1926 = "「Dù là đồ làm sẵn, nhưng với em thì đây là\nlần đầu tiên.\nChính vì làm tư liệu nên nếu không tự tay\nvẽ lại thì em sẽ không nhớ được.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「失礼いたします。魚あんかけご飯と、オムレツと、\nどちらにいたしましょうか？」
1971 = "「Xin lỗi quý khách. Cơm cá sốt và trứng\ncuộn,\nquý khách dùng món nào ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしは、魚あんかけご飯！」
1960 = "「Em chọn cơm cá sốt!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕はオムレツで」
2171 = "「Vậy thì tôi chọn trứng cuộn.」"

# monologue
# JP: 僕らの答えに頷きテキパキ用意を整え。\nＣＡさんは、ハチロクに目を移し不意に動きを止める。
2541 = "Cô CA gật đầu trước câu trả lời của chúng\ntôi và nhanh nhẹn chuẩn bị.\nSau đó, cô ấy chuyển mắt sang Hachiroku và\nbất ngờ dừng động tác."

# monologue
# JP: ハチロクは少し困ったような顔をして――\nいや、そうか
2365 = "Hachiroku làm vẻ mặt hơi bối rối——\nÀ, ra vậy."

# 【ハチロク】
# display as 八六
# JP: 「あの……わたくしはレイルロオドですので」
2135 = "「Dạ……em là Railord ạ.」"

# monologue
# JP: 僕が助け舟を出すより早く、\nハチロクは自ら身分を明かす。
2520 = "Nhanh hơn cả lúc tôi định lên tiếng giải\nvây,\nHachiroku đã tự mình nói rõ thân phận."

# 【ＣＡ】
# display as ＣＡ
# JP: 「あ！？　申し訳ございません。かしこまりました。\nすぐにご用意をいたします」
1818 = "「A!? Tôi thành thật xin lỗi. Tôi hiểu rồi\nạ.\nTôi sẽ chuẩn bị ngay.」"

# 【ハチロク】
# display as 八六
# JP: 「え、いえっ！？」
1729 = "「Hả, dạ không!?」"

# monologue
# JP: ＣＡさんが優雅に頭を少しさげ、\nトレーの下から、ごそごそ何かを――おお。
2540 = "Cô CA tao nhã cúi đầu một chút,\nvà lúi húi lấy thứ gì đó từ dưới khay——ồ."

# 【ＣＡ】
# display as ＣＡ
# JP: 「レイルロオドのお客様には、\n石炭のご用意でよろしいですか？」
2136 = "「Đối với quý khách là Railord,\nchúng tôi chuẩn bị than đá có được không\nạ?」"

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ――はい、もちろんでございます」
1774 = "「Hả!? A——vâng, tất nhiên là được ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「よかねー！　ハチロク、特別食！」
1868 = "「Tuyệt quá nha! Hachiroku, suất ăn đặc\nbiệt!」"

# monologue
# JP: パチパチ、二、三度瞬きし。\nそしてキラキラ、ハチロクの瞳が輝きを増す。
2345 = "Chớp chớp mắt hai, ba cái.\nVà rồi đôi mắt Hachiroku lấp lánh, sáng\nrực lên."

# 【ハチロク】
# display as 八六
# JP: 「これは――まさかの[むえんたん,2]無煙炭ではございませんか！\nまぁまぁまぁ、なんというご馳走でございましょう」
2134 = "「Đây là——không ngờ lại là than antraxit\nsao!\nChà chà chà, đúng là một bữa thịnh soạn\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[れきせいたん,2]瀝青炭より良いものなのか？」
2144 = "「Nó tốt hơn than bitum sao?」"

# 【ハチロク】
# display as 八六
# JP: 「炭化度が極めて高く、着火温度が高いのです。\nその名の通り、完全燃焼時には煙もほとんど出しません」
1908 = "「Độ cacbon hóa cực kỳ cao, và nhiệt độ bắt\ncháy cũng cao ạ.\nĐúng như tên gọi, khi cháy hoàn toàn, nó\nhầu như không tạo ra khói.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。瀝青炭が更に上質になったものか」
1745 = "「Ra là vậy. Giống như than bitum nhưng\nchất lượng cao hơn sao.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。価格も相応にお高いものと聞きますので、\nわたくしたちが現場で見ることは、まずございません」
2030 = "「Đúng vậy ạ. Nghe nói giá cả cũng đắt\ntương đương,\nnên chúng em hầu như không bao giờ được\nnhìn thấy nó ở hiện trường đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほぉ。いや？　ならば、もしかしてこれは――\nっと」
1787 = "「Hô. Không? Nếu vậy thì, có lẽ đây là——\nKhoan đã.」"

# monologue
# JP: 話を聞きたく思ったのだが、\nＣＡさんはカートを押して、もう通路の奥へと進んでいる。
2518 = "Tôi đang định hỏi thêm,\nnhưng cô CA đã đẩy xe đi sâu vào trong lối\nđi mất rồi."

# 【日々姫】
# display as 日日姬
# JP: 「描けた！　食べよ！　にぃに、ハチロク」
2051 = "「Vẽ xong rồi! Ăn thôi! Anh hai,\nHachiroku.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もう描けたのか。さすがに早いな」
2140 = "「Vẽ xong rồi sao. Nhanh thật đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ただのクロッキーやけんね～　いっただっきまーす」
1759 = "「Chỉ là phác thảo nhanh thôi mà~ Mời mọi\nngười ăn nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いただきます」
1964 = "「Mời mọi người.」"

# 【ハチロク】
# display as 八六
# JP: 「いただきます」
# 1964 = "「我開動了」" 

# monologue
# JP: ……日々姫とは違うものをとオーダーしたが、\nオムレツは残念、どこででも出てきそうなものでしか無い。
1325 = "……Tôi đã cố tình gọi món khác với Hibiki,\nnhưng thật đáng tiếc, món trứng cuộn này\nchỉ là thứ có thể thấy ở bất cứ đâu."

# monologue
# JP: ああ、いや――
2403 = "À, không——"

# 【双鉄】
# display as 雙鐵
# JP: 「一応なのだが、これも描くか？」
1905 = "「Hỏi cho chắc thôi, em có định vẽ cả món\nnày không?」"

# 【日々姫】
# display as 日日姬
# JP: 「もう描いたと！　食器の使い方とか盛り付けの仕方とか。\n食堂車まわりのヒントになるかもしれんけん」
2003 = "「Em vẽ xong rồi! Cả cách dùng chén dĩa hay\ncách bày biện nữa.\nBiết đâu sẽ là gợi ý cho toa ăn thì sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1788 = "「À.」"

# 【日々姫】
# display as 日日姬
# JP: 「それに、パッケージとかはもう異国やけん！\nオレンジジュースば『橙汁』って、面白かとよねー」
2089 = "「Với lại, bao bì thì đậm chất nước ngoài\nluôn rồi!\nNước cam mà gọi là 『Trừng trấp』, thú vị\nghê nhỉ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと。そんなところまで見て、描いたのか」
1709 = "「Ra vậy. Em quan sát đến tận những chỗ đó\nrồi vẽ lại sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「ナインスターズの仲国版なんてまるで検討もつかんけん。\n材料、集められるだけ集めとかんと」
1942 = "「Phiên bản Trung Quốc của Nine Stars thì\nem hoàn toàn mù tịt mà.\nNên phải thu thập tư liệu càng nhiều càng\ntốt thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――まさしく道理だ」
2142 = "「À——đúng là có lý.」"

# monologue
# JP: ようやっと、\n打ち合わせたかったところへと話題が一周してきた。
2594 = "Cuối cùng thì,\nchủ đề cũng quay trở lại đúng điều tôi\nmuốn bàn bạc."

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。日々姫、ハチロク」
2175 = "「Vậy nên. Hibiki, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「あの、双鉄さま。お話も結構ですが――お二人のお食事、\n食べないと、冷めてしまうものではないかと」
2190 = "「Dạ, ngài Soutetsu. Trò chuyện cũng tốt\nthôi ạ——nhưng đồ ăn của hai người,\nnếu không ăn sẽ nguội mất đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っと、それも道理だな」
1793 = "「À, nói cũng phải.」"

# monologue
# JP: 身内同士だ。\n話すのならば、食事しながらの方が良いだろう。
2616 = "Đều là người nhà cả.\nNếu muốn nói chuyện thì vừa ăn vừa nói sẽ\ntốt hơn."

# monologue
# JP: ……ハチロクの目がさっきから、\n無煙炭と僕の間を行き来していることもあるし。
1321 = "……Với lại, ánh mắt của Hachiroku từ nãy\nđến giờ,\ncứ đảo qua đảo lại giữa chỗ than antraxit\nvà tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「では、あらためて『いただきます』だ」
2165 = "「Vậy thì, một lần nữa 『Mời mọi người』.」"

# 【日々姫】
# display as 日日姬
# JP: 「いっただっきまーす！」
1965 = "「Mời mọi người nha!」"

# 【ハチロク】
# display as 八六
# JP: 「いただきます」
# 1964 = "「我開動了」" 

# 【ハチロク】
# display as 八六
# JP: 「（ばりっ！　ぼりっ！　ごりっ！　がりっ！）\n……ふぅ。ご馳走様でした。大変おいしうございました」
2207 = "「(Rào rào! Rộp rộp! Rào rào! Rộp rộp!)\n……Phù. Cảm ơn vì bữa ăn. Ngon tuyệt vời\nluôn ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「みたいねぇ。まっこと良か食べっぷりだったもん！」
1678 = "「Trông có vẻ vậy nhỉ. Cách ăn của cậu\ntrông ngon miệng lắm luôn đó!」"

# 【ハチロク】
# display as 八六
# JP: 「あら、いやだお恥ずかしい」
1932 = "「Ôi, thật là xấu hổ quá đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ。口の端に石炭くずがついているぞ？」
1780 = "「Fufu. Vụn than dính ở mép kìa?」"

# 【ハチロク】
# display as 八六
# JP: 「えっ！？」
1799 = "「Hả!?」"

# monologue
# JP: 指摘した途端、ハチロクの動きがぴたりと止まる。\nそしておずおず、僕の方へと向き直る。
2569 = "Vừa bị chỉ ra, động tác của Hachiroku lập\ntức dừng lại.\nRồi em ấy rụt rè quay sang nhìn tôi."

# 【ハチロク】
# display as 八六
# JP: 「あの――双鉄さま……\nお手を煩わせて恐縮ですが」
2158 = "「Dạ——ngài Soutetsu……\nLàm phiền ngài thì thật ngại quá, nhưng\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、そんなん私が」
1826 = "「A, chuyện đó để em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、構わんさ」
2033 = "「Không, không sao đâu.」"

# monologue
# JP: 通路の幅は広くない。
2614 = "Lối đi không được rộng cho lắm."

# monologue
# JP: 安全ベルトを外さぬままに手を伸ばし、\n少し甘えた顔をしたハチロクの顔を拭いてやる。
2309 = "Tôi vẫn thắt dây an toàn, vươn tay ra,\nlau mặt cho Hachiroku, người đang mang vẻ\nmặt nũng nịu."

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。双鉄さま」
1741 = "「Cảm ơn ngài. Ngài Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「えー！　ずるかとー！\nにぃに、にぃに、わたしもお顔拭いて」
1771 = "「Ể! Gian xảo quá đi!\nAnh hai, anh hai, lau mặt cho em nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや……綺麗な顔だぞ？\n特段拭くべきような何物もついてはいない」
2137 = "「Không……mặt em sạch mà?\nCó dính gì cần lau đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「はうっ！？　き、綺麗な顔って……うれしかと。\nあっ！？　違くて、そうじゃなくって――あ！」
1803 = "「Hả!? M, mặt sạch……em vui lắm.\nA!? Không phải, không phải ý đó——a!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む。これは失礼」
1785 = "「Hửm. Thật là thất lễ.」"

# monologue
# JP: さすが日々姫は視野が広い。
2498 = "Quả không hổ danh là Hibiki, tầm nhìn rộng\nthật."

# monologue
# JP: 声を出してくれたおかげで、\nＣＡさんの移動を邪魔せずに済んだ。
2581 = "Nhờ con bé lên tiếng,\nmà tôi đã không cản trở việc di chuyển của\ncô CA."

# 【ＣＡ】
# display as ＣＡ
# JP: 「とんでもないことです。こちらこそご歓談中に\n失礼しました。ドリンクのおかわりはいかがですか？」
1798 = "「Không có gì đâu ạ. Tôi mới là người xin\nlỗi vì đã làm phiền lúc mọi người đang trò\nchuyện vui vẻ.\nQuý khách có muốn dùng thêm đồ uống không\nạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、日ノ本語喋れるアテンダントさん！\nうふふ、嬉しか！　じゃ、私は橙汁！　もう一杯！」
1828 = "「A, cô tiếp viên nói được tiếng Hinomoto!\nUfufu, vui quá! Vậy, cho tôi một ly Trừng\ntrấp! Một ly nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、僕も同じものを頼もう」
2170 = "「Vậy, cho tôi một ly giống thế.」"

# 【ハチロク】
# display as 八六
# JP: 「あの……わたくしは」
2157 = "「Dạ……còn em thì.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「はい。どのようなものがお好みでしょうか？」
1849 = "「Vâng. Quý khách muốn dùng loại nào ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「あ――」
1805 = "「A——」"

# monologue
# JP: メニューがすっと差し出されれば、\nハチロクの顔が目に見えてやわらぐ。
2529 = "Khi tờ thực đơn được đưa ra,\nkhuôn mặt Hachiroku dịu đi trông thấy."

# 【ハチロク】
# display as 八六
# JP: 「お水をいただけますと幸いです」
1948 = "「Cho tôi xin một ly nước lọc là được ạ.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「かしこまりました」
1893 = "「Tôi hiểu rồi ạ.」"

# monologue
# JP: 手慣れた様子で、紙パックから紙コップへと\nミネラルウォーターが注がれている。
2593 = "Với dáng vẻ quen tay, cô ấy rót nước\nkhoáng\ntừ hộp giấy sang cốc giấy."

# monologue
# JP: この対応を見る限り、あるいは……
2532 = "Nhìn cách phục vụ này, có lẽ nào……"

# 【双鉄】
# display as 雙鐵
# JP: 「たまにはあることなのですか？\n国際線への、レイルロオドの搭乗は」
1861 = "「Thỉnh thoảng cũng có chuyện này sao?\nViệc Railord lên chuyến bay quốc tế ấy.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「いえ――ほとんど無いことかと思います。\n私個人としても、初めての経験です」
1683 = "「Dạ không——tôi nghĩ là hầu như không có\nđâu ạ.\nCá nhân tôi cũng là lần đầu tiên trải\nnghiệm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。そうなのですか。\nそれにしては石炭の用意などもいただいてしまって」
1796 = "「Hô. Vậy sao.\nThế mà cô lại chuẩn bị sẵn cả than đá\nnữa.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「上から、レイルロオドのお客様にお出しするようにと\n指示を受けていたのですが――すみませんでした」
1858 = "「Tôi nhận được chỉ thị từ cấp trên là phải\nphục vụ\ncho quý khách là Railord——xin lỗi quý\nkhách.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
1775 = "「Hả?」"

# monologue
# JP: ぺこりと頭をさげられる。
2542 = "Cô ấy cúi đầu cái rụp."

# 【ＣＡ】
# display as ＣＡ
# JP: 「レイルロオドのお客様を見るのは初めてだったので――\nさきほど、私、見とれてしまいまして」
1859 = "「Vì đây là lần đầu tiên tôi được nhìn thấy\nmột vị khách là Railord——\nnên lúc nãy, tôi đã lỡ nhìn chằm chằm.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2036 = "「Ôi chao!」"

# 【日々姫】
# display as 日日姬
# JP: 「わかる！　わかると！！\nわたしとにぃにもいっとー最初は」
1762 = "「Tôi hiểu! Tôi hiểu mà!!\nTôi và anh hai lúc đầu cũng vậy đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かにだ。目を奪われたな。\n『なんと美しい人形なのか』と――」
1810 = "「Ừ……đúng là vậy. Bị hớp hồn luôn mà.\n『Quả là một con búp bê xinh đẹp』——」"

# 【ハチロク】
# display as 八六
# JP: 「はうっ！？　わたくし、あのっ、そのっ」
1776 = "「Hả!? Em, dạ, chuyện đó.」"

# monologue
# JP: まぁその直後に、『恥じ入りなさい』と\nハチロクを激怒させてしまったわけでもあるが……。
2528 = "Mà ngay sau đó, em ấy đã nổi trận lôi đình\nmắng tôi là\n『Hãy biết xấu hổ đi』……"

# monologue
# JP: 思い返せば懐かしい。\n今となっては、遥か昔のこととも思える。
2411 = "Nhớ lại thấy thật hoài niệm.\nBây giờ thì cứ ngỡ như chuyện từ thuở xa\nxưa nào rồi."

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、レイルロオドば見慣れんのなら――\nあ！　その前に。ＣＡさんば、仲国の方ですか？」
1900 = "「Mà nếu đã không quen nhìn thấy Railord\nthì——\nA! Trước đó. Cô CA là người Trung Quốc\nsao?」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「はい。[ほんこん,1]紅港の出身です。\n日ノ本語は大学で勉強しました」
2020 = "「Vâng. Tôi xuất thân từ Hồng Cảng.\nTôi học tiếng Hinomoto ở trường đại học.」"

# 【双鉄】
# display as 雙鐵
# JP: 「紅港では、レイルロオドは珍しい存在なのですか？」
2178 = "「Ở Hồng Cảng, Railord là một sự tồn tại\nhiếm hoi sao?」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「私の世代……20代だと、少なくとも紅港では、\nあまり縁が無い存在だと思います――あ」
1693 = "「Ở thế hệ của tôi……những người độ tuổi 20,\nít nhất là ở Hồng Cảng,\nthì tôi nghĩ đó là một sự tồn tại không\nmấy quen thuộc——A.」"

# monologue
# JP: うむ？　ああ――他の乗客の呼び出しか。
2408 = "Hửm? À——hành khách khác gọi sao."

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。\nお忙しい中、長々と引き止めてしまいまして」
1978 = "「Xin lỗi cô.\nĐang lúc bận rộn mà lại giữ cô lại lâu thế\nnày.」"

# 【ＣＡ】
# display as ＣＡ
# JP: 「いえ。短いフライトですが、引き続きのお楽しみを。\nなにかございましたら、いつなりとお呼び出し下さい」
1797 = "「Không đâu ạ. Chuyến bay tuy ngắn nhưng\nmong quý khách tiếp tục tận hưởng.\nNếu có chuyện gì, xin cứ gọi tôi bất cứ\nlúc nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました、ありがとう」
1894 = "「Tôi hiểu rồi, cảm ơn cô.」"

# monologue
# JP: 会話を終えれば、\nＣＡさんはすぐに通路の奥へと向かう。
2592 = "Kết thúc cuộc trò chuyện,\ncô CA lập tức đi sâu vào trong lối đi."

# 【ハチロク】
# display as 八六
# JP: 「……仲国の鉄道は、\nそこまで廃れてしまっているのでしょうか？」
1366 = "「……Đường sắt Trung Quốc,\nđã lụi tàn đến mức đó rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「さぁ、どうだろう。『仲国版ナインスターズを』という\n話がでてくるくらいなら、発展の意思はあるのだろうが」
2112 = "「Chà, ai biết được. Nếu đã có chuyện\n『Nine Stars phiên bản Trung Quốc』 thì chắc\nlà họ có ý định phát triển.」"

# 【日々姫】
# display as 日日姬
# JP: 「ってか、聞いてた話とも違わなくない？　稀咲先輩。\n『ご褒美のつもりで、気楽に』とか言うっとったけど」
1708 = "「Cơ mà, có vẻ không giống như những gì chị\nKisaki nói nhỉ.\nChị ấy bảo là 『Cứ coi như phần thưởng,\nthoải mái đi』 mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……だな。あまり気楽な感じはせんかもしれん」
1388 = "「……Đúng vậy. Có vẻ không được thoải mái\ncho lắm.」"

# monologue
# JP: 航空会社が石炭をストックしているものとも思えんし、\nましてや『瀝青炭以上の代物』だ。
2524 = "Tôi không nghĩ là hãng hàng không lại dự\ntrữ than đá,\nhuống hồ lại còn là 『loại tốt hơn cả than\nbitum』."

# monologue
# JP: ならばハチロクを――レイルロオドを饗応するため、\n“上”からの指示で、わざわざ用意したものだろう。
2422 = "Vậy thì để thiết đãi Hachiroku——một\nRailord,\nchắc chắn họ đã cất công chuẩn bị theo chỉ\nthị từ \"cấp trên\"."

# 【双鉄】
# display as 雙鐵
# JP: 「……思い返せばそういうフシがいくつかあったかもな」
1374 = "「……Nhớ lại thì, có lẽ cũng có vài điểm\nđáng ngờ.」"

# 【ハチロク】
# display as 八六
# JP: 「そういうフシ、でございますか？」
1934 = "「Những điểm đáng ngờ, sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。まず、稀咲を通じてこの話が御一夜鉄道へと\nやってきたのが、三ヶ月前――八月だった」
2013 = "「Ừ. Đầu tiên, chuyện này được truyền đến\nĐường sắt Ohimitera\nthông qua Kisaki là vào ba tháng\ntrước——tháng Tám.」"

# monologue
# JP: 日々姫がすぐに、前の座席の下に入れてあったカバンからガサゴソと、古いスケッチブックを取り出す。
2500 = "Hibiki lập tức lục lọi trong chiếc túi đặt\ndưới ghế trước, lấy ra một cuốn sổ phác\nthảo cũ."

# 【日々姫】
# display as 日日姬
# JP: 「うん。八月の一日。年内に仲国視察に来てほしいって。\nにぃにとポーレットさんとわたしがご指名で」
1847 = "「Vâng. Ngày 1 tháng 8. Họ muốn chúng ta\nđến Trung Quốc khảo sát trong năm nay.\nChỉ đích danh anh hai, chị Paulette và\nem.」"

# 【ハチロク】
# display as 八六
# JP: 「視察の目的は――\n『仲国版ナインスタアズの、コンセプト案の立案』」
2079 = "「Mục đích của chuyến khảo sát là——\n『Lập dự án ý tưởng cho Nine Stars phiên\nbản Trung Quốc』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。『外国人旅行者に喜ばれるものが希望』ゆえ、\n『なるべく白紙に近い状態で来てほしい』だったか」
2034 = "「Đúng vậy. Vì 『Mong muốn một thứ khiến\nkhách du lịch nước ngoài yêu thích』,\nnên 『Mong mọi người đến với tâm thế càng\ngiống một tờ giấy trắng càng tốt』.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと。で、ポーレットさんは、多忙と、\n知識が白紙とはとてもいえない――ってことで、辞退」
1968 = "「Là vậy đó. Rồi chị Paulette vì quá bận\nrộn, cộng thêm việc\nkiến thức không thể nào là một tờ giấy\ntrắng được——nên đã từ chối.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……心底残念そうだったなぁ、\nあのときのポーレットは」
1397 = "「……Lúc đó trông Paulette,\nthật sự rất tiếc nuối nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「『行きたいんですけど！　乗りたいんですけど！\nわたし、市長で社長で一週間も空けられませんし――』」
1343 = "「『Em muốn đi lắm chứ! Em muốn đi tàu lắm\nchứ!\nNhưng em vừa là thị trưởng vừa là giám\nđốc, không thể bỏ trống cả tuần được——』」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
1760 = "「Ôi chao!」"

# monologue
# JP: ものまねだ。ポーレットらしい雰囲気が良くでている。\n観察力は、こういうところでも効果を発揮するらしい。
2491 = "Là bắt chước. Rất giống phong thái của\nPaulette.\nKhả năng quan sát có vẻ cũng phát huy tác\ndụng ở những chỗ thế này."

# 【日々姫】
# display as 日日姬
# JP: 「『それに、わたし――\n[ちゅうごくてつ,2]仲国鉄もかじっちゃってるんです～～』って！」
2153 = "「『Với lại, em——\ncũng có tìm hiểu chút ít về Đường sắt\nTrung Quốc rồi~~』 nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……だったな。まさか仲国の鉄道が、日ノ本のマニアの守備範囲に入っているとは、想像だにしていなかったが」
1385 = "「……Đúng là vậy. Không ngờ đường sắt Trung\nQuốc lại nằm trong phạm vi hiểu biết của\nmột người đam mê đường sắt ở Hinomoto,\nthật không thể tưởng tượng nổi.」"

# 【ハチロク】
# display as 八六
# JP: 「なぜ入っているのか、どこを楽しんでいらっしゃるのか。\nポーレット様は、教えてくださいませんでしたね」
2093 = "「Tại sao cô ấy lại tìm hiểu, cô ấy thích\nđiểm nào ở đó.\nThị trưởng Paulette đã không nói cho chúng\nta biết nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……恐らくそこも、予備知識としてもってしまうと、\n前提条件の『なるべく白紙』が崩れてしまうのだろうな」
1831 = "「Ừm……Có lẽ nếu biết trước những điều đó,\nđiều kiện tiên quyết 『càng giống tờ giấy\ntrắng càng tốt』 sẽ bị phá vỡ mất.」"

# 【日々姫】
# display as 日日姬
# JP: 「で、ポーレットさんがいけないってことになって。\n『ならば、是非ともレイルロオド・ハチロクで』って」
1967 = "「Rồi sau khi quyết định chị Paulette không\nthể đi.\nHọ liền bảo 『Nếu vậy, nhất định phải là\nRailord Hachiroku』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「向こうからの強い希望だったな。ナインスターズ計画の\n立役者で、日ノ本の鉄道史を熟知もしているから、と」
2141 = "「Đó là nguyện vọng tha thiết từ phía bên\nkia. Vì em là người có công lớn trong dự\nán Nine Stars,\nlại còn am hiểu lịch sử đường sắt Hinomoto\nnữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「って。稀咲先輩はいうとったとねー。\nで、ええと――」
1924 = "「Thế đó. Chị Kisaki đã nói vậy đó.\nRồi, ừm thì——」"

# monologue
# JP: ペラペラとスケッチブックがめくられて――\n持ち上がる顔は嬉しげだ。
2481 = "Cuốn sổ phác thảo lật lạch phạch——\nKhuôn mặt ngẩng lên trông có vẻ vui mừng."

# 【日々姫】
# display as 日日姬
# JP: 「『ではハチロクで』って確定したのが、\n話が来てからちょうど一週間後。八月八日」
1911 = "「『Vậy thì quyết định là Hachiroku』,\nđúng một tuần sau khi nhận được lời mời.\nNgày 8 tháng 8.」"

# 【ハチロク】
# display as 八六
# JP: 「そこからが……随分と時間がかかりましたね」
1931 = "「Từ lúc đó……đã mất khá nhiều thời gian\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。物品扱いではレイルロオドは海外にでられぬと\n分かり、戸籍創出という解決法を教えられた」
2066 = "「Đúng vậy. Khi biết Railord không thể ra\nnước ngoài dưới dạng vật phẩm,\nhọ đã chỉ cho chúng ta giải pháp tạo hộ\ntịch.」"

# monologue
# JP: ……ポーレットが市長であることを知った上での、\n仲国側からのアイディアだと、稀咲は密かに教えてくれた。
1330 = "……Kisaki đã bí mật cho tôi biết, đó là ý\ntưởng từ phía Trung Quốc\nsau khi họ biết Paulette là thị trưởng."

# monologue
# JP: パスポート取得までの紆余曲折の解決策も、\n全て同様、あちらサイドからのアドバイスがあった、とも。
2565 = "Những giải pháp cho những khúc mắc cho đến\nkhi lấy được hộ chiếu,\ntất cả cũng đều nhờ có sự tư vấn từ phía\nhọ."

# monologue
# JP: （ナインスターズ計画の立役者、という条件を外すなら、\n他にいくらでも、もっと楽に選べる候補がいたはずだ）
2638 = "(Nếu bỏ qua điều kiện \"người có công lớn\ntrong dự án Nine Stars\",\nthì chắc chắn có vô số ứng cử viên khác dễ\ndàng lựa chọn hơn nhiều.)"

# monologue
# JP: ポーレットが居残る以上は、れいなも確実に居残りだ。\nが、赤井宮司にニイロク。あるいは宗方さんなども――
2460 = "Một khi Paulette ở lại, thì Reina chắc\nchắn cũng phải ở lại.\nNhưng vẫn còn đền chủ Akai và Niiroku.\nHoặc là anh Munakata chẳng hạn——"

# 【ハチロク】
# display as 八六
# JP: 「右田、ハチロク――わたくし、思いもかけぬことから、\n右田の姓をいただきまして……」
1766 = "「Migita, Hachiroku——Em, không ngờ lại có\nngày,\nđược mang họ Migita……」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2199 = "「!」"

# monologue
# JP: ほうっと、長く――排気とはとても呼べない、\n暖かな、こころがこもった、それは、”息”。
2348 = "Phù, một hơi dài——hoàn toàn không thể gọi\nlà khí thải,\nmột \"hơi thở\" ấm áp, đong đầy cảm xúc."

# monologue
# JP: 不安を混じえ渦巻いていた憶測が、\nふわりと吹き飛ばされてしまう。
2564 = "Những suy đoán đan xen sự bất an đang cuộn\ntrào trong tôi,\nnhẹ nhàng bị thổi bay đi mất."

# 【ハチロク】
# display as 八六
# JP: 「しつこいようですが、本当にありがとうございます。\n双鉄さま、日々姫――もちろん、真闇様にも」
1688 = "「Dù có vẻ nói đi nói lại nhiều lần, nhưng\nem thực sự cảm ơn mọi người.\nNgài Soutetsu, Hibiki——tất nhiên là cả chị\nMayami nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなん。最初から家族だったけんね、実際のとこ。\n戸籍ば作れるって知っとったら、もっと早ぅに、ねぇ？」
2139 = "「Có gì đâu. Thực ra thì ngay từ đầu chúng\nta đã là gia đình rồi mà.\nNếu biết có thể làm hộ tịch thì đã làm sớm\nhơn rồi, nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もちろんだ」
1839 = "「Ừm. Tất nhiên rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし――本当にしあわせで……」
1959 = "「Em——thực sự rất hạnh phúc……」"

# monologue
# JP: うっとりと、ハチロクが下腹部のあたりを撫でる。\n母性、と。そんな言葉さえ連想しそうな柔らかな面差しで。
2351 = "Hachiroku say sưa vuốt ve vùng bụng dưới.\nVới một vẻ mặt dịu dàng đến mức khiến\nngười ta liên tưởng đến hai chữ \"tình mẫu\ntử\"."

# monologue
# JP: 最も、その下にあるのは、腹巻き型のパスポートケースと、\n苦労の末に取得したパスポートではあるのだが――っと。
2375 = "Mà, bên dưới đó thực chất là chiếc túi\nđựng hộ chiếu dạng quấn bụng,\nvà cuốn hộ chiếu mà em ấy đã phải rất vất\nvả mới lấy được——khoan đã."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国への入国手続に手間取るかもしれないと、\nそこは警告されていたな」
1863 = "「Họ đã cảnh báo rằng,\nviệc làm thủ tục nhập cảnh vào Trung Quốc\ncó thể sẽ mất thời gian.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、うん」
1824 = "「A, vâng.」"

# monologue
# JP: 頷きながら取り出されるのは、日々姫愛用のタブレット。
2504 = "Vừa gật đầu, con bé vừa lấy ra chiếc máy\ntính bảng yêu thích của mình."

# 【日々姫】
# display as 日日姬
# JP: 「レンタルwifiの使い方と、VPNっていうののやり方。\nちゃんと勉強して準備してあると」
2181 = "「Cách sử dụng wifi thuê, và cách dùng cái\ngọi là VPN.\nEm đã học và chuẩn bị kỹ càng rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、さきほど、それを尋ねたいと思っていたのです。\n空港で大行列でした、その、れんたるわいはいとは一体」
1823 = "「A, lúc nãy em cũng định hỏi chuyện đó.\nỞ sân bay mọi người xếp hàng dài lắm, cái\nwifi thuê đó rốt cuộc là gì vậy ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「簡単にいうと、仲国でも、私のこのタブレットで、\nインターネットを使えるようにする仕組みのこと」
2076 = "「Nói đơn giản thì, đó là một hệ thống giúp\nem\ncó thể sử dụng Internet bằng chiếc máy\ntính bảng này ngay cả ở Trung Quốc.」"

# 【ハチロク】
# display as 八六
# JP: 「！！？　仲国のいんたあねっとと\n日ノ本のいんたあねっとは別物なのでございますか？」
2203 = "「!!? Internet của Trung Quốc\nvà Internet của Hinomoto là hai thứ khác\nnhau sao ạ?」"

# 【日々姫】
# display as 日日姬
