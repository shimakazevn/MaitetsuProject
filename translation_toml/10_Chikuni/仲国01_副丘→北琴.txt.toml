2151 = "「Đăng ký cả dấu vân tay sao.\nQuả nhiên là nghiêm ngặt thật đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「外国人は、登録しないと入国できないんだって。\nばってん、登録作業は機械で簡単にできるみたいやけん」
2111 = "「Người nước ngoài nếu không đăng ký thì\nkhông được nhập cảnh đâu.\nNhưng mà, thao tác đăng ký có vẻ đơn giản,\nlàm bằng máy là được.」"

# 【ハチロク】
# display as 八六
# JP: 「指紋……でございますか」
1980 = "「Dấu vân tay……sao ạ.」"

# monologue
# JP: ハチロクが小さな両手をもちあげ、\nその指先をまじまじ見つめる。
2344 = "Hachiroku đưa hai bàn tay nhỏ bé lên,\nchăm chú nhìn vào những đầu ngón tay."

# 【ハチロク】
# display as 八六
