1963 = "「Em——vì là Railord,\nnên nếu không ngại bất tiện một chút, thì\nviệc thay thế linh kiện cũng có thể làm\nđược ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1851 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「妹たちのいずれか……例えば、[おおむた,2]雄武田のみくろと、\n手のパアツ全交換をいたしましたら――」
1958 = "「Nếu đổi toàn bộ linh kiện tay với một\ntrong các em gái……\nví dụ như Mikuro ở Omuta thì——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……指紋は全て入れ替わる。\n指紋登録の意味を完全に消してしまえるわけか」
1784 = "「A……dấu vân tay sẽ thay đổi toàn bộ.\nÝ nghĩa của việc đăng ký dấu vân tay sẽ\nhoàn toàn biến mất sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？」
1829 = "「Khoan!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1684 = "「Không.」"

# monologue
# JP: 日々姫が咎めた理由はわかる。\n不正入国の手段を検討していると思われかねん話題ゆえ。
2483 = "Tôi hiểu lý do Hibiki trách móc.\nVì đây là chủ đề dễ khiến người ta nghĩ\nrằng chúng tôi đang bàn mưu nhập cảnh trái\nphép."

# monologue
# JP: が――今日のハチロクは、どこか神経質で、不安定だ。\nならば話を中断させるのはよろしくなかろう。
2324 = "Nhưng——Hachiroku hôm nay có vẻ gì đó căng\nthẳng và bất ổn.\nNếu vậy thì không nên ngắt lời em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドの渡航者が少ないということで、\nそこは、いままで盲点となってきていたのかもしれんな」
2050 = "「Vì có ít Railord ra nước ngoài,\nnên có lẽ điều đó cho đến nay vẫn là một\nđiểm mù.」"

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょうね。レイルロオドの個体認証なら、\nこれはタブレットが絶対確実でございますから」
1706 = "「Có lẽ là vậy ạ. Nếu là xác thực cá nhân\ncủa Railord,\nthì \\x%lタブレット;#00ffc040;thẻ bảng%l;#; này mới là thứ chắc chắn\ntuyệt đối ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに」
1923 = "「Ra là vậy, đúng thật.」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなら！　指紋のことも報告書に書けばよかとね！\n仲国の人たちの安全の役にたつようになるかもしれんし」
2143 = "「Vậy thì! Ghi cả chuyện dấu vân tay vào\nbáo cáo là được mà!\nBiết đâu lại giúp ích cho sự an toàn của\nngười dân Trung Quốc thì sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nああ――そうだな」
1852 = "「Hửm?\nÀ——đúng vậy nhỉ.」"

# monologue
# JP: そうか、日々姫も不安であるのか。\n初めての海外、初めての入国審査――
2385 = "Ra vậy, Hibiki cũng đang bất an sao.\nLần đầu ra nước ngoài, lần đầu qua cửa\nkiểm tra nhập cảnh——"

# monologue
# JP: 言葉は悪いが、『目をつけられる』要素を\n少しでも減らしておきたい心理なのであろう。
2595 = "Nói hơi khó nghe, nhưng chắc hẳn tâm lý\ncon bé là muốn giảm thiểu\nnhững yếu tố bị \"để mắt tới\" dù chỉ một\nchút."

# 【双鉄】
# display as 雙鐵
# JP: 「他にも、なにか必要となる準備はあるか？」
2152 = "「Ngoài ra, còn cần chuẩn bị gì nữa không?」"

# monologue
# JP: 聞けばすぐさま、ほっとしたような顔をして、\n日々姫は再び、ガイドブックへと目を落とす。
2570 = "Vừa nghe tôi hỏi, Hibiki lập tức làm vẻ\nmặt nhẹ nhõm,\nvà lại dán mắt vào cuốn sách hướng dẫn."

# 【日々姫】
# display as 日日姬
# JP: 「……ううん。ない筈。指紋登録を機械でしたら、\nレシートが出てくるけん。それと、入境許可証と」
1372 = "「……Không. Chắc là không còn gì đâu. Đăng\nký dấu vân tay bằng máy xong,\nsẽ có biên lai chạy ra. Lấy cái đó, với\nthẻ nhập cảnh.」"

# monologue
# JP: 日々姫がぽん、と、ポシェットを叩く。
2503 = "Hibiki vỗ nhẹ cái \"bộp\" vào chiếc túi đeo\nchéo."

# 【日々姫】
# display as 日日姬
# JP: 「そん二枚を、パスポートと一緒に係官さんに渡せば\nそれで大丈夫――って書いてあると！」
1975 = "「Đưa hai tờ đó cùng với hộ chiếu cho nhân\nviên kiểm tra\nlà được——trong sách ghi vậy đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。教えてくれてありがとう」
1744 = "「Ra là vậy. Cảm ơn em đã chỉ cho anh.」"

# 【ハチロク】
# display as 八六
# JP: 「パスポオト。身の安全とタブレットの次に大事で、\n肌身離さず携行するもの」
2113 = "「Hộ chiếu. Là thứ quan trọng thứ ba sau sự\nan toàn của bản thân và \\x%lタブレット;#00ffc040;thẻ bảng%l;#;,\nphải luôn mang theo bên người không được\nrời nửa bước.」"

# monologue
# JP: その所在を確かめたいのか、ハチロクはスカートのお腹を\n少しつまんで持ち上げる。……いささか無防備な仕草だ。
2392 = "Có vẻ muốn kiểm tra xem nó ở đâu,\nHachiroku khẽ nhúm\nphần bụng váy lên một chút.……Một cử chỉ\nhơi hớ hênh."

# monologue
# JP: 着陸態勢で全員着席のタイミングゆえよかったが――\nパスポートの出し入れ時には、体で目隠ししてやらねばだ。
2530 = "May mà lúc này mọi người đều đang ngồi\nchuẩn bị hạ cánh——\nLúc lấy hộ chiếu ra vào, chắc tôi phải lấy\nthân mình che chắn cho em ấy mới được."

# 【日々姫】
# display as 日日姬
# JP: 「そ。だけど入国管理官さんには預けなきゃダメ。\n預けて、入国手続きばおわったら、すぐにまたしまう」
2107 = "「Đúng rồi. Nhưng phải giao cho nhân viên\nquản lý xuất nhập cảnh mới được.\nGiao cho họ, làm xong thủ tục nhập cảnh\nthì cất đi ngay.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。わかりました。必ずそのようにいたします」
1892 = "「Vâng. Em hiểu rồi ạ. Em nhất định sẽ làm\nnhư vậy.」"

# monologue
# JP: 頷き。けれどもすぐまたきょろきょろ。\n今日何度目のきょろきょろだろう。
2369 = "Gật đầu. Nhưng rồi lại nhìn quanh quất.\nHôm nay là lần thứ mấy em ấy nhìn quanh\nnhư vậy rồi nhỉ."

# monologue
# JP: 乗務の安全確認時以外は、姿勢も視線も落ち着けている。\n――それがハチロクの常態であるゆえ、気にかかる。
2427 = "Ngoài lúc xác nhận an toàn khi làm nhiệm\nvụ, tư thế và ánh mắt của em ấy luôn rất\nđiềm tĩnh.\n——Đó mới là trạng thái bình thường của\nHachiroku, nên tôi thấy khá bận tâm."

# 【ハチロク】
# display as 八六
# JP: 「……機内、満席だったのですね。それに、お肌の色も、\nお[ぐし]髪の色もさまざまな方が乗っていらっしゃいます」
1408 = "「……Trên máy bay, kín chỗ rồi nhỉ. Hơn nữa,\ncó rất nhiều hành khách\nvới đủ màu da, màu tóc khác nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「観光地としての――無論、ビジネスの相手としてもの\n――仲国の国際的な評価が、高まっている現れだろうな」
2049 = "「Với tư cách là một địa điểm du lịch——tất\nnhiên là cả với tư cách là đối tác kinh\ndoanh\n——đây chắc hẳn là minh chứng cho thấy đánh\ngiá quốc tế về Trung Quốc đang ngày càng\ntăng cao.」"

# 【ハチロク】
# display as 八六
# JP: 「……入国管理のお仕事のご苦労が偲ばれますね。\n言葉が通じないお客様は、ときおりでも大変ですのに」
1370 = "「……Có thể tưởng tượng được công việc quản\nlý xuất nhập cảnh vất vả thế nào nhỉ.\nChỉ thỉnh thoảng gặp hành khách bất đồng\nngôn ngữ thôi đã mệt lắm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。それだけに、こちらが準備を整えることは、\n先方の負担を軽減することにもつながるわけだ」
2056 = "「Đúng vậy. Chính vì thế, việc chúng ta\nchuẩn bị chu đáo\ncũng là giúp giảm bớt gánh nặng cho họ.」"

# monologue
# JP: 思えば、感謝が湧いてくる。\n日々姫とて、多忙を極めている状況に変わりないのに――
2420 = "Nghĩ lại, tôi chợt thấy biết ơn vô cùng.\nDù Hibiki cũng đang trong tình trạng cực\nkỳ bận rộn——"

# 【双鉄】
# display as 雙鐵
# JP: 「実にありがたい。というかむしろ、頼もしい。\n日々姫がいなかったら、どうなっていたかわからんな」
2058 = "「Thật sự rất biết ơn em. Hay nói đúng hơn\nlà rất đáng tin cậy.\nNếu không có Hibiki, không biết chuyện gì\nsẽ xảy ra nữa.」"

# monologue
# JP: 視察ゆえ、通訳を兼ねた案内がつくと聞き、\nすっかり安心しきっていたが――
2571 = "Vì là chuyến khảo sát, nghe nói sẽ có\nhướng dẫn viên kiêm phiên dịch đi cùng,\nnên tôi đã hoàn toàn yên tâm——"

# monologue
# JP: 冷静に考えたなら北琴空港を出るまでは、\n僕たちだけの道中となるに決まっていたのに。
2523 = "Nhưng nếu bình tĩnh suy nghĩ lại, thì cho\nđến khi rời khỏi sân bay Bắc Cầm,\nchắc chắn chỉ có chúng tôi tự xoay xở với\nnhau."

# 【双鉄】
# display as 雙鐵
# JP: 「……『白紙の状態で来てほしい』と。その言葉を、\n僕はどうやらバカ正直に受け取りすぎてしまったらしい」
1400 = "「……『Mong mọi người đến với tâm thế như một\ntờ giấy trắng』. Có vẻ như anh\nđã tiếp nhận câu nói đó một cách quá đỗi\nthật thà rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あはっ、わかっとーとよ。にぃににそぎゃんとこあるの。\n私、にぃにの妹やけん――家族やけんね！」
1816 = "「Aha, em biết mà. Anh hai có những lúc như\nvậy đó.\nEm là em gái của anh hai mà——là gia đình\nmà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1842 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「その上、乗務でも相棒でしょお。足りないとこば\n補いあうのは、あったりまえのことやけん」
2081 = "「Hơn nữa, trong công việc cũng là cộng sự\nmà.\nViệc bù đắp những thiếu sót cho nhau là\nchuyện đương nhiên thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……すまんな。ありがとう。\n僕も日々姫を、ハチロクを。補えるように努めよう」
1356 = "「……Xin lỗi em. Cảm ơn em.\nAnh cũng sẽ cố gắng để bù đắp cho Hibiki,\ncho Hachiroku.」"

# 【日々姫】
# display as 日日姬
# JP: 「そーんなん、いっつも補いまくってもらっとるけん！\nたまには私もいいとこ見せて、恩返しせんと！」
2145 = "「Chuyện đó, lúc nào anh chẳng bù đắp cho\nem!\nThỉnh thoảng em cũng phải thể hiện chút\nđỉnh để báo đáp chứ!」"

# monologue
# JP: 日々姫の声が明るく晴れる。\nであるというのにハチロクは、顔を下へと向けてしまう。
2499 = "Giọng Hibiki tươi sáng, rạng rỡ.\nThế nhưng Hachiroku lại cúi gầm mặt xuống."

# 【ハチロク】
# display as 八六
# JP: 「……足りないところを補いあうのが、家族で、相棒」
1359 = "「……Bù đắp những thiếu sót cho nhau, là gia\nđình, là cộng sự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク？」
1718 = "「Hachiroku?」"

# monologue
# JP: わざと明るい声を出し、手を伸ばし――\nハチロクの帽子を軽ぅく叩いて前を向かせる。
2451 = "Tôi cố tình cất giọng tươi tỉnh, vươn tay\nra——\ngõ nhẹ lên chiếc mũ của Hachiroku để em ấy\nngẩng mặt lên."

# 【双鉄】
# display as 雙鐵
# JP: 「普段からそうできているさ。故に僕らは最高のチームで。\n故に、今ここに招聘されているのだから」
1726 = "「Bình thường chúng ta vẫn làm được như vậy\nmà. Thế nên chúng ta mới là một đội tuyệt\nvời nhất.\nThế nên, chúng ta mới được mời đến đây.」"

# 【ハチロク】
# display as 八六
# JP: 「あ……双鉄さま」
1811 = "「A……ngài Soutetsu.」"

# monologue
# JP: ほーっと安堵した顔が、\nけれどまたすぐ曇ってしまう。
2362 = "Khuôn mặt vừa thở phào nhẹ nhõm,\nnhưng rồi lại lập tức xịu xuống."

# 【ハチロク】
# display as 八六
# JP: 「左様でしたら嬉しいのですが……わたくしどうにも……\nこの視察で果たすべき役割を、今ひとつ掴みきれないで」
2060 = "「Nếu được vậy thì em rất vui……nhưng sao em\ncứ thấy……\nvẫn chưa nắm bắt được vai trò mình cần\nphải hoàn thành trong chuyến khảo sát\nnày.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほどな」
1812 = "「À. Ra là vậy.」"

# monologue
# JP: 初めての異国ということを割り引いてもなお、\nハチロクは過敏になりすぎであるように思っていたが……
2386 = "Dù có châm chước cho việc đây là lần đầu\nra nước ngoài,\nnhưng tôi vẫn thấy Hachiroku có vẻ hơi\nnhạy cảm quá mức……"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。日々姫はともかく、\n僕らに期待されている役割は、掴みづらいな」
1713 = "「Đúng là vậy. Khoan bàn đến Hibiki,\nvai trò mà họ kỳ vọng ở chúng ta quả thực\nrất khó nắm bắt.」"

# 【日々姫】
# display as 日日姬
# JP: 「いうたら私は、いつだってなーんも変わらんもんね～。\nいろんなもの見て材料集めて、整理して渡すのがお仕事」
1727 = "「Nói ra thì em, lúc nào cũng chẳng có gì\nthay đổi cả~.\nQuan sát nhiều thứ, thu thập tài liệu, sắp\nxếp lại rồi giao nộp, đó là công việc của\nem.」"

# 【ハチロク】
# display as 八六
# JP: 「それを言うのでしたら、双鉄さまもいつもと同じでは\nございませんか？　つまり、わたくしたちのレールです」
2146 = "「Nếu nói vậy thì ngài Soutetsu cũng giống\nnhư mọi khi\nchứ ạ? Nghĩa là, đường ray của chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「方向性を定める、か？\nしかし、今この状況では右も左も――」
2023 = "「Định hướng, sao?\nNhưng trong tình cảnh hiện tại, thì phương\nhướng nào cũng——」"

# 【日々姫】
# display as 日日姬
# JP: 「白紙でこいっていうお話やけん、当然でしょお。\nそん地図が埋まりはじめたら、レールば引けばよかとよ」
2176 = "「Họ bảo chúng ta đến như một tờ giấy trắng\nmà, đương nhiên rồi.\nKhi tấm bản đồ đó bắt đầu được lấp đầy,\nthì anh cứ việc vạch ra đường ray thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。で、あるのならば、僕も日々姫と同じく。\nいつもどおりであればいいだけか」
2110 = "「Ra là vậy. Nếu thế thì anh cũng giống như\nHibiki.\nChỉ cần làm như mọi khi là được sao.」"

# 【ハチロク】
# display as 八六
# JP: 「けれど……わたくしはどうしていいのか――\nわたくしの本務は、8620あってのものでございますし」
2155 = "「Nhưng……còn em thì phải làm sao đây——\nNhiệm vụ chính của em là phải gắn liền với\n8620 cơ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ハチロク。\nお前の仕事は、それだけではないさ」
1686 = "「Không đâu, Hachiroku.\nCông việc của em không chỉ có vậy đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄……さま？」
2188 = "「Ngài……Soutetsu?」"

# monologue
# JP: 日々姫が早速、状況を整理してくれた。\nおかげで僕も迷いなく、果たすべき役割に立ち帰れる。
2486 = "Hibiki đã nhanh chóng sắp xếp lại tình\nhình giúp tôi.\nNhờ vậy, tôi có thể quay lại với vai trò\nmình cần đảm nhận mà không chút do dự."

# monologue
# JP: 僕もいつもと同じように。\n皆のレールで――ハチロクのマスターであればよい。
2450 = "Tôi cũng sẽ làm như mọi khi.\nLà đường ray của mọi người——là Master của\nHachiroku là được."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の目に見えず、僕の耳にも聞こえぬものを、\nお前だけは捉えられる。それはつまりは――」
1999 = "「Những thứ Hibiki không nhìn thấy, anh\nkhông nghe thấy,\nchỉ có mình em nắm bắt được. Đó chính\nlà——」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1817 = "「A!」"

# monologue
# JP: 歓喜の一声。\nそれだけで、機内の空気の淀みが消える。
2353 = "Một tiếng reo vui sướng.\nChỉ vậy thôi cũng đủ làm tan biến sự ngột\nngạt trong khoang máy bay."

# 【ハチロク】
# display as 八六
# JP: 「共感！　共感でございますね！！」
1722 = "「\\x%l共感;#00ffc040;Cộng cảm%l;#;! Là \\x%l共感;#00ffc040;cộng cảm%l;#; đúng không ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ」
1836 = "「Ừm. Đúng vậy.」"

# monologue
# JP: ようやく晴れたその顔が、明るい声が嬉しくて、\n帽子ごと、頭をぐりぐりなでてしまう。
2302 = "Khuôn mặt rạng rỡ, giọng nói vui tươi ấy\nkhiến tôi vui sướng,\nvô thức xoa đầu em ấy, xoa cả lên chiếc\nmũ."

# monologue
# JP: ハチロクは少しも嫌な顔をせず――\nなぜだか日々姫が、微妙にスネた顔になる。
2562 = "Hachiroku không hề tỏ vẻ khó chịu chút\nnào——\nKhông hiểu sao Hibiki lại làm vẻ mặt hờn\ndỗi."

# 【双鉄】
# display as 雙鐵
# JP: 「言葉の問題は確かにあろうが、共感ならば、\n仲国のレイルロオドと通じあえるものが恐らくあろう」
2185 = "「Vấn đề ngôn ngữ thì chắc chắn là có,\nnhưng nếu là \\x%l共感;#00ffc040;cộng cảm%l;#;,\nthì có lẽ em sẽ giao tiếp được với các\nRailord của Trung Quốc đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしもそう思います、双鉄さま」
2022 = "「Vâng, em cũng nghĩ vậy ạ, ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに僕は、マスターとして、\nレイルロオド・ハチロクに命じよう」
2162 = "「Vì vậy, với tư cách là Master,\nanh sẽ ra lệnh cho Railord Hachiroku.」"

# monologue
# JP: レイルロオドの存在意義は、\n鉄路の安全を守り抜くこと。与えられた役割を果たすこと。
2617 = "Ý nghĩa tồn tại của Railord là,\nbảo vệ an toàn cho tuyến đường sắt. Hoàn\nthành vai trò được giao."

# monologue
# JP: ハチロクが、オリヴィが教えてくれたことだから、\n迷いなく、僕は下すべき指示を下せる。
2609 = "Đó là điều mà Hachiroku, Olivy đã dạy tôi,\nnên tôi có thể đưa ra chỉ thị cần thiết mà\nkhông chút do dự."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らには捉え得ぬ、『仲国のレイルロオドから見た\n仲国の鉄路』を。ハチロク。お前には捉えてほしい」
1943 = "「Thứ mà chúng ta không thể nắm bắt được,\n『Tuyến đường sắt Trung Quốc\nqua góc nhìn của Railord Trung Quốc』.\nHachiroku. Anh muốn em nắm bắt điều đó.」"

# 【ハチロク】
# display as 八六
# JP: 「仲国のレイルロオドたちからみた、仲国鉄路の長所や\n短所。改善点や要望などを、わたくしが聞き取り集める」
2072 = "「Ưu điểm và nhược điểm của tuyến đường sắt\nTrung Quốc qua góc nhìn của các Railord\nTrung Quốc.\nEm sẽ lắng nghe và thu thập những điểm cần\ncải thiện, những nguyện vọng của họ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だ。しかし、無理なくできる範囲を越えぬように。\nなにせ国外だ。思わぬ法律等にふれるかもしれぬ」
1920 = "「Đúng vậy. Nhưng, đừng vượt quá giới hạn\ncho phép.\nDù sao cũng là ở nước ngoài. Nhỡ đâu lại\nvi phạm luật pháp gì đó thì nguy.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました双鉄様。無理せず法規に触れぬ範囲で、\nわたくしは必ず、お求めの情報を集めます」
1956 = "「Đã rõ thưa ngài Soutetsu. Trong phạm vi\nkhông gắng sức và không vi phạm luật pháp,\nem nhất định sẽ thu thập những thông tin\nngài yêu cầu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。ああ、いや――あとひとつだけ。\nこれは命令ではなく、家族の一員としての希望なのだが」
2167 = "「Trăm sự nhờ em. À, không——còn một điều\nnữa.\nĐây không phải mệnh lệnh, mà là mong muốn\nvới tư cách là một thành viên trong gia\nđình.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、なんなりと双鉄さま」
1897 = "「Vâng, ngài cứ nói ạ, ngài Soutetsu.」"

# monologue
# JP: ハチロクの瞳に力が戻る。\nまっすぐ、僕の視線を捉える。
2357 = "Sức sống đã trở lại trong đôi mắt\nHachiroku.\nNhìn thẳng vào mắt tôi."

# monologue
# JP: ああ、これこそがハチロクの目だ――\n瀝青炭を燃やすが如き、赤いきらめきが輝いている。
2407 = "Sức sống đã trở lại trong đôi mắt\nHachiroku.\nNhìn thẳng vào mắt tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「視察とはいえ、せっかくのはじめての海外旅行だ。\n楽しもう――仕事自体を。そうして、仲国という国を！」
2186 = "「A, đây mới chính là ánh mắt của\nHachiroku——\nLấp lánh sắc đỏ rực rỡ như than bitum đang\nbùng cháy.」"

# 【ハチロク】
# display as 八六
# JP: 「はいっ！　かしこまりました、双鉄さま」
1890 = "「Dù là đi khảo sát, nhưng hiếm khi có dịp\nra nước ngoài lần đầu tiên.\nHãy tận hưởng nào——chính công việc này. Và\ncả đất nước Trung Quốc nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫もだぞ？　一緒に、なるべく多くを楽しもう」
1995 = "「Vâng! Đã rõ thưa ngài Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　頼まれんでも楽しんじゃうけん！\n安心してね？　にぃに、ハチロク！」
1843 = "「Cả Hibiki nữa đấy? Cùng nhau tận hưởng\nthật nhiều nhé.」"

# monologue
# JP: （ポーン、ポーン、ポーン）
# 2637 = "（叮咚，叮咚）" 

# monologue
# JP: 着陸だ。周りの乗客たちにあわせて、\n僕らも安全ベルトを外す。
2627 = "Hạ cánh rồi. Hòa theo những hành khách\nxung quanh,\nchúng tôi cũng tháo dây an toàn."

# monologue
# JP: 立ち上がり、手荷物をまとめたその途端、\n日々姫は、とん、と僕の背中を押してくれる。
2382 = "Vừa đứng lên, thu dọn hành lý xách tay\nxong,\nHibiki liền đẩy nhẹ vào lưng tôi."

# 【日々姫】
# display as 日日姬
# JP: 「そうするためにも入国審査！\nさくっとまるっと、クリアしちゃおー！！」
2046 = "「Để làm được điều đó thì phải qua cửa kiểm\ntra nhập cảnh đã!\nHãy nhanh chóng, gọn gàng, vượt qua thôi\nnào!!」"
