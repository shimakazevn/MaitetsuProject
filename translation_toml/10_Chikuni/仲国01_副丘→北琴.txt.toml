# 【ＣＡ】
# display as ＣＡ
# JP: 「レイルロオドのお客様を見るのは初めてだったので――\nさきほど、私、見とれてしまいまして」
1859 = "「因為是第一次親眼見到鐵路人偶乘客——所以剛才不小心看入神了」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2036 = "「沒關係」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかる！　わかると！！\nわたしとにぃにもいっとー最初は」
1762 = "「可不是！可不是嘛！！我和阿哥頭一趟的時候也是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かにだ。目を奪われたな。\n『なんと美しい人形なのか』と――」
1810 = "「啊……確實，那真是目不轉睛。心想“這人偶簡直美若天仙啊”——」" 

# 【ハチロク】
# display as 八六
# JP: 「はうっ！？　わたくし、あのっ、そのっ」
1776 = "「哇！？我……我哪有……」" 

# monologue
# JP: まぁその直後に、『恥じ入りなさい』と\nハチロクを激怒させてしまったわけでもあるが……。
2528 = "當然，隨後就被八六怒斥說“簡直不知羞恥”了……" 

# monologue
# JP: 思い返せば懐かしい。\n今となっては、遥か昔のこととも思える。
2411 = "回頭想來，真是頗感懷念，彷彿那之後已度過了諸多歲月一般。" 

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、レイルロオドば見慣れんのなら――\nあ！　その前に。ＣＡさんば、仲国の方ですか？」
1900 = "「如果不是經常見到鐵路人偶——哦，對了，請問空服小姐，您是仲國人嗎？」" 

# 【ＣＡ】
# display as ＣＡ
# JP: 「はい。[ほんこん,1]紅港の出身です。\n日ノ本語は大学で勉強しました」
2020 = "「是的，我生在箱港（ＨＫ）。日語是在大學裡學的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「紅港では、レイルロオドは珍しい存在なのですか？」
2178 = "「鐵路人偶在箱港很少見嗎？」" 

# 【ＣＡ】
# display as ＣＡ
# JP: 「私の世代……20代だと、少なくとも紅港では、\nあまり縁が無い存在だと思います――あ」
1693 = "「以我這個年紀——二十多歲的人而言，至少在箱港，應該是幾乎看不到的吧——啊」" 

# monologue
# JP: うむ？　ああ――他の乗客の呼び出しか。
2408 = "嗯？哦——原來是有其他乘客在呼叫了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。\nお忙しい中、長々と引き止めてしまいまして」
1978 = "「抱歉。百忙之中，還占用了這麼長的時間」" 

# 【ＣＡ】
# display as ＣＡ
# JP: 「いえ。短いフライトですが、引き続きのお楽しみを。\nなにかございましたら、いつなりとお呼び出し下さい」
1797 = "「哪裡。雖然行程短暫，但也祝您旅途愉快。若再有需要，請隨時找我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました、ありがとう」
1894 = "「好的，謝謝」" 

# monologue
# JP: 会話を終えれば、\nＣＡさんはすぐに通路の奥へと向かう。
2592 = "話音剛落，空服便轉身向過道遠處走去。" 

# 【ハチロク】
# display as 八六
# JP: 「……仲国の鉄道は、\nそこまで廃れてしまっているのでしょうか？」
1366 = "「……仲國的鐵路，竟然荒廢到這等地步了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さぁ、どうだろう。『仲国版ナインスターズを』という\n話がでてくるくらいなら、発展の意思はあるのだろうが」
2112 = "「誰知道呢。但會有“仲國版九星”這樣的想法，至少說明還是有意繼續發展的吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ってか、聞いてた話とも違わなくない？　稀咲先輩。\n『ご褒美のつもりで、気楽に』とか言うっとったけど」
1708 = "「但這和稀咲學姐跟咱們說好的不一樣吧？她說的可是“就當是獎勵，放輕鬆啦”這樣哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だな。あまり気楽な感じはせんかもしれん」
1388 = "「……是啊，但現在看來，怕是輕鬆不了吧」" 

# monologue
# JP: 航空会社が石炭をストックしているものとも思えんし、\nましてや『瀝青炭以上の代物』だ。
2524 = "照理說航空公司不可能會常備煤炭，更何況還是“比煙煤品質更好的煤炭”。" 

# monologue
# JP: ならばハチロクを――レイルロオドを饗応するため、\n“上”からの指示で、わざわざ用意したものだろう。
2422 = "如此看來，應該是有人特地做了指示，為招待八六而專門準備的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……思い返せばそういうフシがいくつかあったかもな」
1374 = "「……回頭想想，這事情或許早有苗頭」" 

# 【ハチロク】
# display as 八六
# JP: 「そういうフシ、でございますか？」
1934 = "「您是說……早有苗頭嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。まず、稀咲を通じてこの話が御一夜鉄道へと\nやってきたのが、三ヶ月前――八月だった」
2013 = "「是啊。首先，這消息通過稀咲傳到御一夜鐵路，是在三個月前——也就是八月份」" 

# monologue
# JP: 日々姫がすぐに、前の座席の下に入れてあったカバンからガサゴソと、古いスケッチブックを取り出す。
2500 = "日日姬聞言，馬上伸手在面前座椅下的包裡翻找起來，然後拿出了一本已經畫滿了的素描簿。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。八月の一日。年内に仲国視察に来てほしいって。\nにぃにとポーレットさんとわたしがご指名で」
1847 = "「嗯，是在八月一日。她說希望在年內能去仲國考察一次，還點名要阿哥、波萊特和我去」" 

# 【ハチロク】
# display as 八六
# JP: 「視察の目的は――\n『仲国版ナインスタアズの、コンセプト案の立案』」
2079 = "「考察的目的則是——“草擬仲國版九星的設計方案”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。『外国人旅行者に喜ばれるものが希望』ゆえ、\n『なるべく白紙に近い状態で来てほしい』だったか」
2034 = "「沒錯。“希望能拿出受到外國遊客喜愛的設計”，所以“想要我們儘可能以一無所知的狀態前來”」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと。で、ポーレットさんは、多忙と、\n知識が白紙とはとてもいえない――ってことで、辞退」
1968 = "「所以說唄，波萊特小姐不但非常忙碌，而且算是知道內情的人，於是就主動放棄了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……心底残念そうだったなぁ、\nあのときのポーレットは」
1397 = "「……當時波萊特那樣子，真是遺憾得無以復加了」" 

# 【日々姫】
# display as 日日姬
# JP: 「『行きたいんですけど！　乗りたいんですけど！\nわたし、市長で社長で一週間も空けられませんし――』」
1343 = "「“好想去好想去！好想坐好想坐！但我身兼市長和社長，無論如何都不可能開一個星期的天窗——”」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
1760 = "「可不是！」" 

# monologue
# JP: ものまねだ。ポーレットらしい雰囲気が良くでている。\n観察力は、こういうところでも効果を発揮するらしい。
2491 = "日日姬把波萊特的態度模仿得惟妙惟肖。觀察力在這種地方也同樣可以發揮其獨特的效果。" 

# 【日々姫】
# display as 日日姬
# JP: 「『それに、わたし――\n[ちゅうごくてつ,2]仲国鉄もかじっちゃってるんです～～』って！」
2153 = "「還說什麼“話說回來，我對仲國鐵也是相當了解啊～～”！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だったな。まさか仲国の鉄道が、日ノ本のマニアの守備範囲に入っているとは、想像だにしていなかったが」
1385 = "「……是啊。真想不到，日本鐵路迷竟然連仲國的鐵路都有涉獵」" 

# 【ハチロク】
# display as 八六
# JP: 「なぜ入っているのか、どこを楽しんでいらっしゃるのか。\nポーレット様は、教えてくださいませんでしたね」
2093 = "「至於為什麼要了解，有趣的地方在哪裡這些內容，波萊特小姐就沒告訴我們了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……恐らくそこも、予備知識としてもってしまうと、\n前提条件の『なるべく白紙』が崩れてしまうのだろうな」
1831 = "「嗯……恐怕是怕事先告訴我們這些基本知識的話，“儘量一無所知”的前提就不成立了吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「で、ポーレットさんがいけないってことになって。\n『ならば、是非ともレイルロオド・ハチロクで』って」
1967 = "「所以波萊特小姐就來不了了囉。於是“既然這樣，那就拜託一定要讓鐵路人偶八六同行”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「向こうからの強い希望だったな。ナインスターズ計画の\n立役者で、日ノ本の鉄道史を熟知もしているから、と」
2141 = "「這是來自對方的強烈要求，因為八六是九星計劃的核心人物，並且對日本國的鐵路歷史也非常熟悉」" 

# 【日々姫】
# display as 日日姬
# JP: 「って。稀咲先輩はいうとったとねー。\nで、ええと――」
1924 = "「對，稀咲學姐是這麼說來著。哎，我看看——」" 

# monologue
# JP: ペラペラとスケッチブックがめくられて――\n持ち上がる顔は嬉しげだ。
2481 = "日日姬低頭唰啦唰啦地翻起了素描簿——而後滿面笑意地抬起頭來。" 

# 【日々姫】
# display as 日日姬
# JP: 「『ではハチロクで』って確定したのが、\n話が来てからちょうど一週間後。八月八日」
1911 = "「定下來讓八六一起去，是在收到邀請後一星期後，也就是八月八日那天」" 

# 【ハチロク】
# display as 八六
# JP: 「そこからが……随分と時間がかかりましたね」
1931 = "「從那時就開始了啊……這麼一想還真是用了蠻多時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。物品扱いではレイルロオドは海外にでられぬと\n分かり、戸籍創出という解決法を教えられた」
2066 = "「確實。對方得知作為物品的話，鐵路人偶是不允許出國的，所以就告訴了我們登記戶籍這個解決方法」" 

# monologue
# JP: ……ポーレットが市長であることを知った上での、\n仲国側からのアイディアだと、稀咲は密かに教えてくれた。
1330 = "……稀咲悄悄跟我說過，仲國方面是在得知波萊特是市長後提出的方案。" 

# monologue
# JP: パスポート取得までの紆余曲折の解決策も、\n全て同様、あちらサイドからのアドバイスがあった、とも。
2565 = "而直到申請到護照為止的一連串複雜操作，都得到了對方細緻入微的建議。" 

# monologue
# JP: （ナインスターズ計画の立役者、という条件を外すなら、\n他にいくらでも、もっと楽に選べる候補がいたはずだ）
2638 = "（若是不考慮九星計劃的核心人物這一前提條件的話，應該有很多更省事的候選人選才對）" 

# monologue
# JP: ポーレットが居残る以上は、れいなも確実に居残りだ。\nが、赤井宮司にニイロク。あるいは宗方さんなども――
2460 = "既然定下波萊特留守的話，玲奈自然也要和她一起。然而赤井宮司和二六，或者說宗方先生都可以——" 

# 【ハチロク】
# display as 八六
# JP: 「右田、ハチロク――わたくし、思いもかけぬことから、\n右田の姓をいただきまして……」
1766 = "「右田八六——我竟然因為這樣意想不到的原因，得到了右田這個姓氏……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2199 = "「！」" 

# monologue
# JP: ほうっと、長く――排気とはとても呼べない、\n暖かな、こころがこもった、それは、”息”。
2348 = "八六深深地、長長地吁了一口氣，這帶著發自心底溫度的氣息，我實在無法稱之為排氣。" 

# monologue
# JP: 不安を混じえ渦巻いていた憶測が、\nふわりと吹き飛ばされてしまう。
2564 = "而我心中那夾雜著不安的臆測，也隨之被吹得煙消雲散。" 

# 【ハチロク】
# display as 八六
# JP: 「しつこいようですが、本当にありがとうございます。\n双鉄さま、日々姫――もちろん、真闇様にも」
1688 = "「也許你們會嫌我囉嗦，不過我是真的非常感謝你們。雙鐵少爺，日日姬，當然還有真闇小姐」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん。最初から家族だったけんね、実際のとこ。\n戸籍ば作れるって知っとったら、もっと早ぅに、ねぇ？」
2139 = "「這哪說的。打一開始就當你是家人咧，真的。要是知道能登記戶籍的話，就早這麼整了，是吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もちろんだ」
1839 = "「嗯。那是自然」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし――本当にしあわせで……」
1959 = "「我真的是太幸福了……」" 

# monologue
# JP: うっとりと、ハチロクが下腹部のあたりを撫でる。\n母性、と。そんな言葉さえ連想しそうな柔らかな面差しで。
2351 = "八六滿面沉醉，手輕撫著自己的下腹部。她的面龐，讓我的腦海中不禁浮現出了“母性”二字。" 

# monologue
# JP: 最も、その下にあるのは、腹巻き型のパスポートケースと、\n苦労の末に取得したパスポートではあるのだが――っと。
2375 = "其實她輕撫著的，是貼身的護照腰包，以及辛辛苦苦拿到的護照。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国への入国手続に手間取るかもしれないと、\nそこは警告されていたな」
1863 = "「在仲國入境可能會花些功夫，對方已經提早通知過我們了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、うん」
1824 = "「啊，嗯」" 

# monologue
# JP: 頷きながら取り出されるのは、日々姫愛用のタブレット。
2504 = "日日姬邊點頭，邊掏出了她慣用的平板電腦。" 

# 【日々姫】
# display as 日日姬
# JP: 「レンタルwifiの使い方と、VPNっていうののやり方。\nちゃんと勉強して準備してあると」
2181 = "「隨身Ｗｉ－Ｆｉ的使用方法，還有那個什麼ＶＰＮ的操作方法，我都查清楚準備妥當咧」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、さきほど、それを尋ねたいと思っていたのです。\n空港で大行列でした、その、れんたるわいはいとは一体」
1823 = "「啊，其實我剛才就想問了。這個在機場大排長龍的隨身Ｗｉ－Ｆｉ到底是什麼啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「簡単にいうと、仲国でも、私のこのタブレットで、\nインターネットを使えるようにする仕組みのこと」
2076 = "「簡單說，就是讓我們在仲國，也能用平板電腦連接網路的東西」" 

# 【ハチロク】
# display as 八六
# JP: 「！！？　仲国のいんたあねっとと\n日ノ本のいんたあねっとは別物なのでございますか？」
2203 = "「！！？仲國的網路和日本的網路是不一樣的嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、インターネットは世界共通で一つなんだけど、\nえと、プロバイダ……ん……なんていうたらよかとかな」
1712 = "「倒不是，網路是世界共同的啦，但這個，運營商……應該怎麼解釋呢」" 

# monologue
# JP: 日々姫の視線にすがられる。
2494 = "日日姬投來求助的目光。" 

# monologue
# JP: 僕も詳しいわけではないが……\nハチロクに通じやすいたとえ話は、なんとか出来よう。
2376 = "其實我也不是很清楚啊……但應該勉強能簡單地和八六解釋一下。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……インターネットは世界共通の、情報の線路なのだ。\nそして各事業者が、その線路に列車を走らせている」
1405 = "「……網路是世界共通的訊息線路。而各個公司都在這線路上開行著他們的列車」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2004 = "「明白」" 

# 【双鉄】
# display as 雙鐵
# JP: 「列車に乗るためには、事業者の定期券が必要だ。\n日々姫の定期は、日ノ本の会社のものだから――」
2091 = "「而要乘坐這些列車，就需要相應公司的定期票。日日姬的定期票，是日本的公司的，所以——」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、仲国でいんたあねっと線に乗るには、\n仲国の事業者の定期券が必要となるわけですね？」
1790 = "「哦，如果要乘仲國網路線路的話，就需要仲國的公司的定期票了，對吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そそ。で。レンタルwifiがレンタル定期券で――\nVPNば、仲国では使えない車内設備を使えるチケット！」
2035 = "「沒錯。所以，隨身Ｗｉ－Ｆｉ就是租借式的定期票，而ＶＰＮ則相當於使用那些在仲國不能使用的車內設施的票啦！」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。それの用意が既にある、ということは。\n万が一のときには、いんたあねっとを通じての連絡で」
1743 = "「原來如此。既然已經準備好了的話，也就是說，萬一有需要的時候，就可以通過網路取得聯繫了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。稀咲センパイにでもポーレットさんにでも、\n助けば求められるけん。安心は安心なんだけど――」
1841 = "「嗯。需要的時候就可以找稀咲學姐或者波萊特幫忙。安心倒是安心啦，不過——」" 

# monologue
# JP: 日々姫はタブレットをしまいこみ、\n今度は小さな黒表紙の本を取り出してくる。
2489 = "日日姬把平板電腦放回包裡，掏了個黑色封面的小本子出來。" 

# 【日々姫】
# display as 日日姬
# JP: 「トラブルないのが一番やけん！\n入国手続き、きちんと復習しとかんと」
2191 = "「順順利利才是最好咧！得再好好複習一下入境手續咯」" 

# 【ハチロク】
# display as 八六
# JP: 「それこそ、\nタブレットで調べればよいのではないのですか？」
2138 = "「這個不是用平板電腦查一下就好了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「飛行機の中はネット使っちゃいけないの。\n電波で飛行機の計器とか誤作動させちゃったら怖いけん」
1864 = "「在飛機上是不能用網路的，萬一信號干擾到飛機的儀器就太可怕咧」" 

# 【ハチロク】
# display as 八六
# JP: 「えっ！？」
1772 = "「咦！？」" 

# monologue
# JP: ハチロクの視線が窓へと向かう。\n見えるのはただ、空と雲だけ――
2342 = "八六扭頭看向窗外——映入眼簾的是無垠的天空和白雲。" 

# 【ハチロク】
# display as 八六
# JP: 「誤作動は\n――確かに恐ろしく思います」
1677 = "「一旦干擾到正常運轉，後果的確是不堪設想」" 

# 【日々姫】
# display as 日日姬
# JP: 「でしょ？　やけん」
2009 = "「是吧？所以咯」" 

# monologue
# JP: （ポーン、ポーン、ポーン）
# 2637 = "（叮咚，叮咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1851 = "「嗯？」" 

# 【機内放送】
# display as 機內廣播
# JP: 「女士們、先生們。本次航班预定将在15分钟後到達北琴機場」
1886 = "「女士們，先生們。本次航班預定將在十五分鐘後抵達北琴機場」" 

# monologue
# JP: 仲国語、詠語、そうして日ノ本語で順次のアナウンス。『あと15分ほどで北琴空港に着陸』だ。
2511 = "機內依次以仲文、英語及日語，廣播通知我們“十五分鐘後在北琴機場降落”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、日々姫先生よろしく頼む。入国手続さえ済んで\nしまえば、稀咲の友人が迎えに来てくれている筈だ」
2168 = "「那就麻煩日日姬老師啦。入境手續辦好之後，應該就能見到來接機的稀咲的朋友了」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった！　ってか、にぃにたちも準備して！\nまだわたしたち、[アライバルカード,4]入境許可証も書いとらんけん！！」
1888 = "「好噠！等等，阿哥你們倒是也準備一下啦！咱們的入境登記卡還沒填吶！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……っしょ――うん……っと！\nはい！　こいばお手本！！」
1834 = "「嗯……這樣——嗯……好！妥咧！就照這個填吧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお。これはわかりやすいな。なるほど、\nガイドブックの中身を描き写したのか」
1792 = "「哦，真是簡單易懂啊。原來如此，是把指南的內容都畫出來了啊」" 

# monologue
# JP: スケッチブックの上には大きく、入境許可書の記入見本。\n見本に倣って記入を始める。
2552 = "素描簿上畫著一張大大的入境登記卡填寫樣本。我和八六便照著它填寫了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「……書けました。[か　し,1]瑕疵がないか、日々姫。\nわたくしの分を確認していただけますか？」
1377 = "「……填完了。日日姬，幫我檢查看看有沒有錯誤好嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「オッケー。\nじゃ、にぃには私が書いたのチェックして？」
2209 = "「ＯＫ。那阿哥就檢查我寫的唄？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、ハチロクは僕の分を確かめてくれ」
2173 = "「那我的就由八六來檢查吧」" 

# monologue
# JP: チェックの後に、もう一回ししてダブルチェック。\n見本が明快だったゆえ、記入ミスなどはなかったようだ。
2514 = "檢查完以後，又互相交換再檢查了一遍。樣本簡單易懂，所以大家填的都完全正確。" 

# 【日々姫】
# display as 日日姬
# JP: 「オッケー。これと……あとは、入国管理所で\n指紋登録が必要になるって書いてある」
2211 = "「ＯＫ，這個好了，我看看……指南上說就只差在海關錄指紋了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「指紋まで登録するのか。\n随分と厳重なのだな、やはり」
2151 = "「連指紋都要登記啊。管理還真是相當嚴格啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「外国人は、登録しないと入国できないんだって。\nばってん、登録作業は機械で簡単にできるみたいやけん」
2111 = "「說是外國人不錄的話就不能入境。不過，錄指紋也都是用專用機器，挺簡單的就是了」" 

# 【ハチロク】
# display as 八六
# JP: 「指紋……でございますか」
1980 = "「指紋……嗎」" 

# monologue
# JP: ハチロクが小さな両手をもちあげ、\nその指先をまじまじ見つめる。
2344 = "八六抬起她小巧玲瓏的雙手，對著指尖左看右看。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――レイルロオドでございますので、\n多少の不便を厭わなければ、パアツ交換も可能です」
1963 = "「我身為鐵路人偶，若是不嫌麻煩的話，換零件其實不是問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1851 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「妹たちのいずれか……例えば、[おおむた,2]雄武田のみくろと、\n手のパアツ全交換をいたしましたら――」
1958 = "「我有幾位妹妹……比方說，大牟田的美玖路，就更換過整隻手——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……指紋は全て入れ替わる。\n指紋登録の意味を完全に消してしまえるわけか」
1784 = "「哦……這樣指紋也隨之全都換掉了。所以錄的指紋也就完全失去意義了嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？」
1829 = "「喂！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1684 = "「不好」" 

# monologue
# JP: 日々姫が咎めた理由はわかる。\n不正入国の手段を検討していると思われかねん話題ゆえ。
2483 = "日日姬出言呵斥的理由不難理解，畢竟剛才的對話很容易被誤認為是在討論非法入境的方法。" 

# monologue
# JP: が――今日のハチロクは、どこか神経質で、不安定だ。\nならば話を中断させるのはよろしくなかろう。
2324 = "但今天的八六有些神經兮兮的，狀態不太穩定。貿然中斷話題似乎也有不妥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドの渡航者が少ないということで、\nそこは、いままで盲点となってきていたのかもしれんな」
2050 = "「畢竟鐵路人偶出入境的情況太少，或許目前為止都還是管理的盲點吧」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょうね。レイルロオドの個体認証なら、\nこれはタブレットが絶対確実でございますから」
1706 = "「似乎確實如此呢。其實要識別鐵路人偶的身份的話，檢查一下操作板就萬無一失了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに」
1923 = "「對哦，還真是這樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなら！　指紋のことも報告書に書けばよかとね！\n仲国の人たちの安全の役にたつようになるかもしれんし」
2143 = "「這樣的話，就把指紋這事也寫進報告裡好了！說不定能為保障仲國人民安全起到一點作用呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nああ――そうだな」
1852 = "「嗯？哦——也是」" 

# monologue
# JP: そうか、日々姫も不安であるのか。\n初めての海外、初めての入国審査――
2385 = "原來日日姬心裡也很不安，畢竟是第一次出國，第一次入境別國——" 

# monologue
# JP: 言葉は悪いが、『目をつけられる』要素を\n少しでも減らしておきたい心理なのであろう。
2595 = "說來好笑，或許她這是“不想太引人注目”的想法正在暗中作祟吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他にも、なにか必要となる準備はあるか？」
2152 = "「還有什麼其他要準備的嗎?」" 

# monologue
# JP: 聞けばすぐさま、ほっとしたような顔をして、\n日々姫は再び、ガイドブックへと目を落とす。
2570 = "聽我這樣一問，日日姬臉上現出鬆了一口氣的神情，再次低頭翻起了指南。" 

# 【日々姫】
# display as 日日姬
# JP: 「……ううん。ない筈。指紋登録を機械でしたら、\nレシートが出てくるけん。それと、入境許可証と」
1372 = "「……唔。應該沒了。在機器上錄好指紋的話，就會有回執出來。拿好那個還有入境登記卡」" 

# monologue
# JP: 日々姫がぽん、と、ポシェットを叩く。
2503 = "日日姬邊說邊輕輕拍了拍隨身的小包。" 

# 【日々姫】
# display as 日日姬
# JP: 「そん二枚を、パスポートと一緒に係官さんに渡せば\nそれで大丈夫――って書いてあると！」
1975 = "「把這兩張紙和護照一起交給工作人員就可以了——指南上是這麼寫的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。教えてくれてありがとう」
1744 = "「原來如此。謝謝你解釋得這麼詳細」" 

# 【ハチロク】
# display as 八六
# JP: 「パスポオト。身の安全とタブレットの次に大事で、\n肌身離さず携行するもの」
2113 = "「護照，保證了自身和操作板的安全以後，最重要的就是它了。我一定會片刻不離隨身攜帶」" 

