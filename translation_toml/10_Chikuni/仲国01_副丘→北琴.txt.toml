2035 = "「Đúng đúng. Và wifi thuê chính là vé tháng\ncho thuê——\nCòn VPN là vé cho phép sử dụng các trang\nthiết bị trên tàu mà bình thường không\ndùng được ở Trung Quốc!」"

# 【ハチロク】
# display as 八六
