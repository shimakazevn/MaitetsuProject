1886 = "「Thưa quý bà, quý ông. Chuyến bay dự kiến\nsẽ hạ cánh xuống Sân bay Bắc Cầm sau 15\nphút nữa.」"

# monologue
# JP: 仲国語、詠語、そうして日ノ本語で順次のアナウンス。『あと15分ほどで北琴空港に着陸』だ。
2511 = "Thông báo lần lượt bằng tiếng Trung, tiếng\nAnh, rồi đến tiếng Hinomoto. 『Khoảng 15\nphút nữa sẽ hạ cánh xuống sân bay Bắc\nCầm』."

# 【双鉄】
# display as 雙鐵
# JP: 「では、日々姫先生よろしく頼む。入国手続さえ済んで\nしまえば、稀咲の友人が迎えに来てくれている筈だ」
2168 = "「Vậy thì, trăm sự nhờ cô giáo Hibiki. Chỉ\ncần làm xong thủ tục nhập cảnh,\nchắc chắn bạn của Kisaki sẽ đến đón chúng\nta.」"

# 【日々姫】
# display as 日日姬
