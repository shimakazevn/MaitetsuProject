# JP: その所在を確かめたいのか、ハチロクはスカートのお腹を\n少しつまんで持ち上げる。……いささか無防備な仕草だ。
2392 = "可能是為了確認它是不是好好的在那裡，八六輕輕地掀起了小腹位置的裙子……如此動作未免太沒有防備了。" 

# monologue
# JP: 着陸態勢で全員着席のタイミングゆえよかったが――\nパスポートの出し入れ時には、体で目隠ししてやらねばだ。
2530 = "目前因為即將著陸，所有人都坐在座位上倒還好——要是在邊檢也這樣拿護照可不行，得幫她擋一檔。" 

# 【日々姫】
# display as 日日姬
# JP: 「そ。だけど入国管理官さんには預けなきゃダメ。\n預けて、入国手続きばおわったら、すぐにまたしまう」
2107 = "「話是這麼說啦，但還是得交給邊檢官檢查的啊。交過去，辦好入境手續再收好就是了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。わかりました。必ずそのようにいたします」
1892 = "「好的，我明白了。一定照做」" 

# monologue
# JP: 頷き。けれどもすぐまたきょろきょろ。\n今日何度目のきょろきょろだろう。
2369 = "八六點了點頭，但沒過一會就又左顧右盼起來。我已經記不清這是她今天第幾次這樣了。" 

# monologue
# JP: 乗務の安全確認時以外は、姿勢も視線も落ち着けている。\n――それがハチロクの常態であるゆえ、気にかかる。
2427 = "平時八六在進行安全確認工作時以外，動作和視線都很沉穩。——正因為八六常態如此，現在這樣子才更讓人放心不下。" 

# 【ハチロク】
# display as 八六
