2514 = "Sau khi kiểm tra, chúng tôi chuyền tay\nnhau kiểm tra chéo thêm một lần nữa.\nNhờ mẫu hướng dẫn rõ ràng nên có vẻ không\nai điền sai gì cả."

# 【日々姫】
# display as 日日姬
# JP: 「オッケー。これと……あとは、入国管理所で\n指紋登録が必要になるって書いてある」
2211 = "「Ok. Cái này và……tiếp theo, trong sách ghi\nlà\ncần phải đăng ký dấu vân tay ở cục quản lý\nxuất nhập cảnh.」"

# 【双鉄】
# display as 雙鐵
