1888 = "「Em biết rồi! Mà này, anh hai cũng chuẩn\nbị đi!\nChúng ta vẫn chưa điền thẻ nhập cảnh nữa\nđó!!」"

# 【日々姫】
# display as 日日姬
# JP: 「ん……っしょ――うん……っと！\nはい！　こいばお手本！！」
1834 = "「Ưm……hầy——ưm……rồi!\nĐây! Đây là mẫu nè!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお。これはわかりやすいな。なるほど、\nガイドブックの中身を描き写したのか」
1792 = "「Ồ. Dễ hiểu thật đấy. Ra vậy,\nem đã vẽ lại nội dung trong sách hướng dẫn\nsao.」"

