1712 = "「Không, Internet là một mạng lưới chung\ntrên toàn thế giới,\nnhưng mà, nhà mạng……ừm……phải nói sao cho\ndễ hiểu nhỉ.」"

# monologue
# JP: 日々姫の視線にすがられる。
2494 = "Hibiki đưa ánh mắt cầu cứu về phía tôi."

# monologue
# JP: 僕も詳しいわけではないが……\nハチロクに通じやすいたとえ話は、なんとか出来よう。
2376 = "Tôi cũng không rành lắm nhưng……\nchắc cũng có thể lấy ví dụ nào đó cho\nHachiroku dễ hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「……インターネットは世界共通の、情報の線路なのだ。\nそして各事業者が、その線路に列車を走らせている」
1405 = "「……Internet là tuyến đường sắt thông tin\nchung của toàn thế giới.\nVà các nhà cung cấp dịch vụ đang cho chạy\ncác chuyến tàu trên tuyến đường sắt đó.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2004 = "「Vâng ạ.」"

# 【双鉄】
# display as 雙鐵
