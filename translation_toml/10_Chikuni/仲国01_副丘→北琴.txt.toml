# 【ハチロク】
# display as 八六
# JP: 「…………」
1345 = "「…………」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1345 = "「…………」" 

# monologue
# JP: ……話を振ったつもりであったが、\nあいにく何の反応もない。
1329 = "……本想找個話題打破一下沉悶的氣氛，但邊上的兩人卻對此毫無反應。" 

# monologue
# JP: 不思議に思い視線を横へと動かせば――
2453 = "我略感不可思議地扭頭看去，映入眼簾的卻是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1814 = "「啊」" 

# monologue
# JP: 日々姫の視線も、ハチロクの視線も、\nまさしく、釘付けになっている。
2485 = "日日姬和八六兩人的視線，都像被磁鐵吸住了一樣，完全沒有理會我的意思。" 

# monologue
# JP: 国際線の飛行機の、小さな窓の外を流れる景色――\n一心に見入るその横顔は、あどけないほどに純粋だ。
2401 = "吸引兩人的，是國際航班飛機小小的舷窗外變換的景色——而兩人專心致志的面龐，從旁看來是那麼天真而純粹。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……搭乗までの大騒ぎが、ウソのようだな」
1403 = "「……看著她們現在的樣子，誰能想到登機前的那種折騰勁」" 

# monologue
# JP: なにせ、三人とも初めての国際線だ。\nその上、強行スケジュール。
2526 = "畢竟我們三人都是第一次乘坐國際航班。而且這次的行程也頗為倉促。" 

# monologue
# JP: ロクな準備もできなかったが、\nなんとか、ここまでは間に合った。
2394 = "各方面的準備都相當不充分，但總算是順利乘上了飛機出發了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ……日々姫は当然のことであろうが、\nハチロクまでもか」
1996 = "「日日姬就不說了，但八六也這樣，我還真是沒想到」" 

# monologue
# JP: 座席配置は2－3－2。\n僕の席からではあいにく、遠目に空が望めるのみだが……
2573 = "航班的座位布置是２－３－２。從我的位置向外看去，只能看到遠處的一點點天空……" 

# monologue
# JP: 窓席の日々姫のすぐ隣にいるハチロクからは、\n日々姫ほどではないにせよ――ああ。
2339 = "八六坐在靠窗第二個座位，視野雖不及窗邊的日日姬——對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。日々姫が手を休めたときにでも、\n座席の位置を交代してもらうか？」
1720 = "「八六，等到日日姬畫累了休息的時候，和她商量換個位置怎麼樣？」" 

# monologue
# JP: 名を呼べばハチロクは嬉しげな顔で僕へと振り向く。\nその口から、ほうっと大きな排気がもれる。
2364 = "八六被叫到了名字，總算回過頭來。而從她的口中，排出了一大口氣。" 

# 【ハチロク】
# display as 八六
# JP: 「ご厚意をありがとうございます、双鉄さま。\nですけれどわたくしは、ここからの景色が良いのです」
2189 = "「雙鐵少爺您的好意我心領了。不過其實我這裡看到的景色最好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1851 = "「嗯？」" 

# monologue
# JP: “景色で”ではなく、“景色が”と――
2307 = "不是“這裡就好”，而是“這裡最好”嗎——" 

# monologue
# JP: ハチロクがあえていうのなら、なにか理由が……\nああ。
2347 = "八六既然這麼說，那想必有她的理由……我明白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ふたりで景色を分け合っているのか」
1746 = "「原來如此，你們倆在分享景色啊」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。左様です。双鉄さま。\n日々姫は景色を、わたくしにも見せてくれています」
2018 = "「是的。正如雙鐵少爺所言。日日姬也有讓我看到風景」" 

# monologue
# JP: 窓は――より厳密にいえば、その外側に流れる景色は――\n常に日々姫が専有すべきだ。
2577 = "舷窗——嚴格說來應該是舷窗外變換的景色——的確是應該無條件以日日姬為優先的。" 

# monologue
# JP: 今回の旅行の目的が視察――あらゆるものを見聞きして、\nそこからアイディアを産み出すことである以上。
2612 = "這次旅行的目的是考察——盡其所能地廣見博聞，並從其中覓得新的思路與想法，而日日姬自然是其中關鍵。" 

# 【ハチロク】
# display as 八六
# JP: 「スケッチブックとペンを手に。目は窓の外を向いたまま。\nけれど日々姫は、決して窓を独り占めにはしないのです」
2184 = "「雖然日日姬一直盯著窗外，素描簿和畫筆不離手，但她絕沒有絲毫獨自霸占舷窗的意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。随分と窮屈そうな姿勢ではあるが……」
1954 = "「我想也是。但這姿勢看起來好憋屈啊……」" 

# monologue
# JP: 日々姫は窓の手前側に、ぴったりと顔をつけるようにし、\n視線を固定し、外を眺めてはペンを走らせている。
2493 = "日日姬把臉貼在舷窗旁邊，視線盯著窗外一動不動，手中的畫筆疾馳如飛。" 

# monologue
# JP: そうすればハチロクも、機窓の眺めを楽しめるのだと――\n日々姫のことだ。もちろん意識していよう。
2611 = "這樣一來八六就可以一起看到窗外風光了——溫柔的日日姬自然不缺乏這樣的體貼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、美しい景色だな」
1399 = "「……的確是不可多得的美景」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょう？」
1937 = "「您看，確實如此吧？」" 

# monologue
# JP: ハチロクの満足そうなすまし顔。\nカリカリとペンを走らせる日々姫のまっすぐな瞳。
2356 = "八六的面龐上洋溢著滿足，而筆耕不輟的日日姬的眼神中則閃爍著率真的光芒。" 

# monologue
# JP: その両方をひとつの景色と楽しめるのだ――\nあるいは僕の席こそが、一番の特等席であるかもしれん。
2334 = "兩人自身又何嘗不是一道亮麗的風景——如此說來，或許我這裡才是最棒的特等席吧。" 

# 【ハチロク】
# display as 八六
# JP: 「それにわたくし、[このからだ,2]整備体でもございますから。\n視覚情報も、どうしても限られてしまいますし」
2085 = "「而且我現在用的是[這副身體,2]整備體，能夠獲取到的視覺訊息也相當有限」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。どうやっても運転体を国外に持ち出す方法はない、\nとのことだったものな」
2011 = "「是啊……這也沒辦法，駕駛體是無論如何都不允許帶出國外的」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;前には、仲国に輸出された機関車とレイルロオドも\nいたという記憶はあるのですけれど……」
1944 = "「我倒是記得在\\x%l大戦;#00ffc040;大戰%l;#;以前，曾經向仲國出口過機車和鐵路人偶，不過……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「技術流出を防止するため――か。\n思わぬところに、\x%l大戦;#00ffc040;大戦%l;#;の禍根は残っているものだ」
2015 = "「是為了提防技術被竊取嗎……竟然在意想不到的地方感受到了\\x%l大戦;#00ffc040;大戰%l;#;的遺毒啊」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;の禍根」
1340 = "「\\x%l大戦;#00ffc040;大戰%l;#;的遺毒」" 

# monologue
# JP: ……言って、ハチロクが辺りを見回す。
1323 = "……八六邊說邊環顧四周。" 

# monologue
# JP: 恐る恐るな風情だが、無論、機内は平穏そのもの――\nみながみな、思い思いに寛いでいる。
2621 = "雖然八六面露拘謹，但放眼望去，機內自是波瀾不驚——從眾人的臉上，可以清楚地感受到他們的輕鬆愜意。" 

# 【ハチロク】
# display as 八六
# JP: 「海外に行くというのは、とても複雑なことなのですね。\n……頭ではそう、わたくしも理解しているのですけれど」
1734 = "「出國旅行還真是件很複雜的事呢。……儘管我也做了一定的心理準備，但還是不夠」" 

# monologue
# JP: またきょろきょろ。
2337 = "八六又開始緊張地左顧右盼。" 

# monologue
# JP: [　　キャビンアテンダント,1]ＣＡが目ざとく気づき、「何か？」と\n目線で尋ねてくるのを、やはり目線で遠慮する
2553 = "細心的[空服,1]ＣＡ發現了她的舉動，以眼色詢問我們有什麼問題，而我們同樣以眼神示意不要緊。" 

# 【ハチロク】
# display as 八六
# JP: 「……現実味がない、と申しますか――この期に及んで\nまだふわふわと、宙に浮いている心持ちです」
1382 = "「……怎麼說呢，我就是覺得一切都特別不真實——到現在還是懸著一顆心，感覺輕飄飄的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、それは当然のことだろう。\n実際僕らは、いままさに宙に浮いているのだ」
1782 = "「哈哈，那不是理所當然的嘛。因為我們實際上就是飄在天上啊」" 

# 【ハチロク】
# display as 八六
# JP: 「まあっ！\nうふふっ、左様でしたね」
1922 = "「對哦！嘻嘻，還真是如此」" 

# monologue
# JP: こぼれた笑顔に気付かされる。\n機内に入ってからハチロクは、一度も笑ってなかったと。
2361 = "八六臉上洋溢著笑容。我這才注意到，在登機以後，這還是八六第一次露出笑容。" 

# monologue
# JP: つまるところは、\nガチガチに緊張してしまっているのだろう。
2419 = "如此不拘言笑，想必是相當緊張的緣故吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「飛行機は、世界で最も安全な乗り物のひとつだ。\n安心していい」
2193 = "「飛機是世界上最安全的交通工具之一。儘管放心吧」" 

# 【ハチロク】
# display as 八六
# JP: 「あ、いえ。そこはわずかも不安に思ってはおりません。\nエアクラナビが運転制御をしているというお話ですし」
1821 = "「啊，不是的。關於這一點我完全不擔心。畢竟聽說這飛機也是由空凝機導航系統控制駕駛的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1842 = "「嗯」" 

# monologue
# JP: その一言に嬉しくなる。
2610 = "這句話讓我喜從中來。" 

# monologue
# JP: 当初はあれほど、エアクラ自体を敵視していたハチロクが、\nいまではすっかり、エアクラナビを妹分と信頼している。
2527 = "當初對空凝機抱有相當敵意的八六，如今也如同對待自己的妹妹們一般信任著空凝機導航系統。" 

# 【双鉄】
# display as 雙鐵
# JP: 「動力自体はジェットエンジンだがな。今やほぼ全ての\n主要交通手段のナビゲーションは、レイルロオド由来だ」
2183 = "「雖然動力來源是噴氣式引擎，但如今幾乎所有交通工具的導航系統，都已經是源自鐵路人偶的了」" 

# 【ハチロク】
# display as 八六
# JP: 「光栄なことと存じます」
1950 = "「我對此深感榮幸」" 

# monologue
# JP: はにかんで。\n頬の赤みもわずかに強め、ハチロクはまた辺りを見回す。
2367 = "八六面頰上又多了一分羞澀的紅暈，同時移開了視線，再次四下張望。" 

# 【ハチロク】
# display as 八六
# JP: 「ジェットエンジンの飛行機。ジェット機。――わたくし、\n初めて乗りましたが、相当に快適なものですね」
1855 = "「噴氣式引擎飛機——噴氣式飛機。我雖然是第一次乘坐，但我承認，的確是相當舒適」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。鉄道車輌と比べてどうだ？」
1921 = "「對吧。和鐵路車輛相比如何？」" 

# 【ハチロク】
# display as 八六
# JP: 「揺れることを含めましても、普通客車より快適ですね。\n一等展望車とまでは申しませんが、二等相当くらいかと」
2182 = "「雖有些搖晃，但比普通客運車廂更加舒適。應該達不到一等遊覽車廂的程度，和二等大體相當吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。なかなか妥当な評価と思うぞ」
1838 = "「嗯。相當中肯的評價啊」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまに教えていただきましたので。\n交通手段にはそれぞれの、特色があり強みがあると」
1342 = "「“交通工具各自都有著其特色和長處”——這都是雙鐵少爺的教導」" 

# monologue
# JP: 言って、黙って、またキョロキョロ。\n好奇心が強まっているのか、どうもハチロクは落ち着かぬ。
2596 = "說完，八六又一言不發地左顧右盼起來。不知她是不是好奇心大起，但心情無法平靜是毋庸置疑的。" 

# 【ハチロク】
# display as 八六
# JP: 「速度の方も、飛行型エアクラと比してなお圧倒的ですし。\n日ノ本からの渡航手段の殆どがこれというのも納得です」
2149 = "「速度方面，也較航空型空凝機有著壓倒性的優勢。所以我現在也算是理解了，為何它成為絕大部分人出國時的交通手段」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。まぁ、日ノ本の法が、飛行用エアクラでの渡航に\n厳しい制限をかけるのは、出入国管理のためだそうだが」
2065 = "「確實。不過據說日本法律之所以嚴格限制使用航空型空凝機出入境，原因在於出入境的管理上」" 

# 【ハチロク】
# display as 八六
# JP: 「出入国管理、でございますか？」
1731 = "「出入境管理……的問題嗎？」" 

# monologue
# JP: おや。ナビはハチロクにはグチらな――ああいや、\n言葉を選んでの婉曲な不満表現を示さなかったか。
2404 = "哦，ＮＡＶＩ居然沒有因此事和八六發牢騷——不不，組織委婉的措辭表達自己的不滿嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「空港や港等に、出入国を出来る地点を絞り込まねば、\n出国者や入国者の数を、国が把握できなくなってしまう」
1899 = "「如果不將出入境的渠道限制在民用機場和港口，國家就難以掌握出入境的具體人數」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……左様ですね。日ノ本は島国ですので、\nそうすることが比較的容易なのですね？」
1854 = "「噢噢……的確如您所言，正好日本國還是島國，相對而言也容易實現這樣的管控措施是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。先程話した、物品の持ち出しや運び入れ禁止とも\n絡んでくるな。入国経路と手段とは、ゆえに制限される」
1846 = "「嗯，就像剛才說的，不只是人，還牽涉到物品的進出口。所以出入境的渠道和方式都要加以限制」" 

# 【ハチロク】
# display as 八六
# JP: 「大いに納得いたしました。\n……海外に出るというのは、本当に――」
1909 = "「完全理解了……所以說出國還真是——」" 

# monologue
# JP: （ぽーん、ぽーん、ぽーん）
2637 = "（叮咚，叮咚）" 

# 【ハチロク】
# display as 八六
# JP: 「あらっ」
1769 = "「咦」" 

# 【機内放送】
# display as 機內廣播
# JP: 「女士們、先生們。\n歓迎乗坐仲国国際航空公司248次副丘前往北琴的航班」
1885 = "「女士們，先生們。感謝您乘坐仲國國際航空公司第２４８次，由福岡飛往北琴的航班」" 

# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄さま！？　これは一体、\n何をアナウンスされているのでございましょうか？」
2187 = "「雙、雙鐵少爺！這廣播究竟是在說什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国語は全くわからん――。\nあ、いや――」
1704 = "「仲文我完全聽不懂啊——啊，慢著——」" 

# monologue
# JP: 続いてすぐに、詠語でのアナウンス。\n僕も堪能な方ではないが、いくらかならば理解できる。
2620 = "隨後傳來了英語的廣播聲。雖然我的水準做不到應答如流，但大意還是聽得懂的。" 

# 【双鉄】
# display as 雙鐵
