1408 = "「……這機艙裡真是座無虛席啊。而且，各種膚色和髮色的乘客都有呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「観光地としての――無論、ビジネスの相手としてもの\n――仲国の国際的な評価が、高まっている現れだろうな」
2049 = "「畢竟無論是旅遊方面還是商業方面，如今的仲國在國際上的評價都在不斷提高吧」" 

# 【ハチロク】
# display as 八六
# JP: 「……入国管理のお仕事のご苦労が偲ばれますね。\n言葉が通じないお客様は、ときおりでも大変ですのに」
1370 = "「……入境管理的工作想必也很辛苦吧。畢竟會有很多語言不通的遊客，麻煩事應該不會少」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。それだけに、こちらが準備を整えることは、\n先方の負担を軽減することにもつながるわけだ」
2056 = "「的確。所以說，我們事先做好準備，其實也算是減輕他們的負擔」" 

# monologue
# JP: 思えば、感謝が湧いてくる。\n日々姫とて、多忙を極めている状況に変わりないのに――
2420 = "如此想來，一股感激之情不禁湧上心頭。這次的行程壓力最大最忙的其實是日日姬，而她卻還在指導我們填表格——" 

# 【双鉄】
# display as 雙鐵
# JP: 「実にありがたい。というかむしろ、頼もしい。\n日々姫がいなかったら、どうなっていたかわからんな」
2058 = "「真是感激不盡，或者說真是可靠。要是沒有日日姬同行的話，真不知道會多費多少工夫」" 

# monologue
# JP: 視察ゆえ、通訳を兼ねた案内がつくと聞き、\nすっかり安心しきっていたが――
2571 = "聽說因為這次是視察，對方會給我們配備兼任翻譯的嚮導，得知這個情況之後我們就完全放鬆下來了——" 

# monologue
# JP: 冷静に考えたなら北琴空港を出るまでは、\n僕たちだけの道中となるに決まっていたのに。
2523 = "然而冷靜思考一下便發現，其實直到走出北琴機場，一路上的大小事宜都需要我們獨自應對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……『白紙の状態で来てほしい』と。その言葉を、\n僕はどうやらバカ正直に受け取りすぎてしまったらしい」
1400 = "「……看來是我不夠明智，把“以儘量一無所知的狀態前來”的要求，執行得太過徹底了……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ、わかっとーとよ。にぃににそぎゃんとこあるの。\n私、にぃにの妹やけん――家族やけんね！」
1816 = "「啊哈，我就知道。阿哥總是這樣兒。我可是你的妹妹——是一家人吶！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1842 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「その上、乗務でも相棒でしょお。足りないとこば\n補いあうのは、あったりまえのことやけん」
2081 = "「而且我們在火車上也是工作搭檔啊。哪裡沒做好，自然要幫個忙嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……すまんな。ありがとう。\n僕も日々姫を、ハチロクを。補えるように努めよう」
1356 = "「……不好意思，謝謝。我也會努力做到能夠幫上日日姬和八六的」" 

# 【日々姫】
# display as 日日姬
# JP: 「そーんなん、いっつも補いまくってもらっとるけん！\nたまには私もいいとこ見せて、恩返しせんと！」
2145 = "「這話怎麼說的，幫得這還少嗎！也得讓我有機會好好表現一下報答報答不是！」" 

# monologue
# JP: 日々姫の声が明るく晴れる。\nであるというのにハチロクは、顔を下へと向けてしまう。
2499 = "日日姬的聲音清澈而明快。而一旁的八六卻低頭盯著腳下。" 

# 【ハチロク】
# display as 八六
# JP: 「……足りないところを補いあうのが、家族で、相棒」
1359 = "「……互相幫助、一家人、搭檔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク？」
1718 = "「八六?」" 

# monologue
# JP: わざと明るい声を出し、手を伸ばし――\nハチロクの帽子を軽ぅく叩いて前を向かせる。
2451 = "我故意以明快的語氣開口，同時伸過手去，輕輕拍拍八六的帽子，讓她抬起頭來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「普段からそうできているさ。故に僕らは最高のチームで。\n故に、今ここに招聘されているのだから」
1726 = "「其實我們不是一直都這樣的嗎，所以才是最棒的團隊啊。也正因如此才會在這裡，一起參與這次的計劃啊」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……双鉄さま」
1811 = "「啊……雙鐵少爺」" 

# monologue
# JP: ほーっと安堵した顔が、\nけれどまたすぐ曇ってしまう。
2362 = "八六臉上現出一絲安心，但很快又蒙上了一層陰霾。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でしたら嬉しいのですが……わたくしどうにも……\nこの視察で果たすべき役割を、今ひとつ掴みきれないで」
2060 = "「真是這樣的話就好了……可我實在摸不准……自己在這次考察中該扮演什麼樣的角色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なるほどな」
1812 = "「啊。原來如此」" 

# monologue
# JP: 初めての異国ということを割り引いてもなお、\nハチロクは過敏になりすぎであるように思っていたが……
2386 = "原本我就納悶，即便是第一次出國，八六在飛機上未免表現得過於惴惴不安……" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。日々姫はともかく、\n僕らに期待されている役割は、掴みづらいな」
1713 = "「倒也怪不得你。姑且不說日日姬，對方究竟對我們兩個抱有怎樣的期待，確實很難想像」" 

# 【日々姫】
# display as 日日姬
# JP: 「いうたら私は、いつだってなーんも変わらんもんね～。\nいろんなもの見て材料集めて、整理して渡すのがお仕事」
1727 = "「其實要說我做的事，自始至終都沒有變過哎～觀察事物、收集材料、整理、交出去，總是在做這些事情」" 

# 【ハチロク】
# display as 八六
# JP: 「それを言うのでしたら、双鉄さまもいつもと同じでは\nございませんか？　つまり、わたくしたちのレールです」
2146 = "「這麼說的話，雙鐵少爺也一樣吧？也就是說，您的職責是成為我們的軌道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「方向性を定める、か？\nしかし、今この状況では右も左も――」
2023 = "「是說我的工作是確定方向……嗎？但目前這情況，別說方向……」" 

# 【日々姫】
# display as 日日姬
# JP: 「白紙でこいっていうお話やけん、当然でしょお。\nそん地図が埋まりはじめたら、レールば引けばよかとよ」
2176 = "「都說是一無所知的狀態囉，不就是這樣嘛。鐵軌就等到地圖理清楚了，再鋪也不遲嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。で、あるのならば、僕も日々姫と同じく。\nいつもどおりであればいいだけか」
2110 = "「說得在理。那到時我也和日日姬一樣，保持常態就對了是吧」" 

# 【ハチロク】
# display as 八六
# JP: 「けれど……わたくしはどうしていいのか――\nわたくしの本務は、8620あってのものでございますし」
2155 = "「那……我又該怎麼辦才好呢——畢竟我的本職任務只是駕駛好８６２０而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ハチロク。\nお前の仕事は、それだけではないさ」
1686 = "「不是哦，八六。你的工作可不只是這個」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……さま？」
2188 = "「雙鐵……少爺？」" 

# monologue
# JP: 日々姫が早速、状況を整理してくれた。\nおかげで僕も迷いなく、果たすべき役割に立ち帰れる。
2486 = "日日姬已經飛速地理清了現狀。而受她啟發，我也明確了我的任務。" 

# monologue
# JP: 僕もいつもと同じように。\n皆のレールで――ハチロクのマスターであればよい。
2450 = "我只要像平常一樣，成為大家的軌道，做好八六的司機就行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の目に見えず、僕の耳にも聞こえぬものを、\nお前だけは捉えられる。それはつまりは――」
1999 = "「日日姬所看不到的，我所聽不到的，但你卻能注意到的，也就是說——」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1817 = "「啊！」" 

# monologue
# JP: 歓喜の一声。\nそれだけで、機内の空気の淀みが消える。
2353 = "八六的喜悅撲面而來。而機艙裡的陰霾也隨之一掃而空。" 

# 【ハチロク】
# display as 八六
# JP: 「共感！　共感でございますね！！」
1722 = "「共鳴！您是說共鳴吧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ」
1836 = "「嗯。完全正確」" 

# monologue
# JP: ようやく晴れたその顔が、明るい声が嬉しくて、\n帽子ごと、頭をぐりぐりなでてしまう。
2302 = "一路的愁雲消散無形，八六面露喜色，聲如雀鳴。而我也開心得不禁伸手隔著帽子輕撫她的頭。" 

# monologue
# JP: ハチロクは少しも嫌な顔をせず――\nなぜだか日々姫が、微妙にスネた顔になる。
2562 = "而八六也毫不抗拒——倒是一旁的日日姬臉上現出了一絲彆扭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言葉の問題は確かにあろうが、共感ならば、\n仲国のレイルロオドと通じあえるものが恐らくあろう」
2185 = "「雖然語言方面的問題不可忽視，但通過共鳴的話，應該還是能夠和仲國的鐵路人偶溝通吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしもそう思います、双鉄さま」
2022 = "「是的，雙鐵少爺。我也覺得應該可以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに僕は、マスターとして、\nレイルロオド・ハチロクに命じよう」
2162 = "「那就暫且把右田家人的關係放一放，我以司機的身份命令鐵路人偶八六」" 

# monologue
# JP: レイルロオドの存在意義は、\n鉄路の安全を守り抜くこと。与えられた役割を果たすこと。
2617 = "鐵路人偶的存在意義，就是堅守鐵路的安全，完成被賦予的任務。" 

# monologue
# JP: ハチロクが、オリヴィが教えてくれたことだから、\n迷いなく、僕は下すべき指示を下せる。
2609 = "這些八六都已通過奧莉薇清楚地認識到了。所以我也毫不猶豫地發出指令。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らには捉え得ぬ、『仲国のレイルロオドから見た\n仲国の鉄路』を。ハチロク。お前には捉えてほしい」
1943 = "「我們難以了解到的“仲國鐵路人偶眼中的仲國鐵路”，就全部交給你負責了，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「仲国のレイルロオドたちからみた、仲国鉄路の長所や\n短所。改善点や要望などを、わたくしが聞き取り集める」
2072 = "「站在仲國鐵路人偶的立場上所看到的仲國鐵路的優點和缺點，以及可以或希望改進之處，就都由我來了解收集」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ。しかし、無理なくできる範囲を越えぬように。\nなにせ国外だ。思わぬ法律等にふれるかもしれぬ」
1920 = "「對。但也不要勉強，盡力就好。畢竟身在國外，很多法律規定的界限我們並不清楚」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました双鉄様。無理せず法規に触れぬ範囲で、\nわたくしは必ず、お求めの情報を集めます」
1956 = "「我明白了，雙鐵少爺。我一定會在不觸犯法律的前提下，儘量收集所需的訊息，絕不勉強貪功」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。ああ、いや――あとひとつだけ。\nこれは命令ではなく、家族の一員としての希望なのだが」
2167 = "「那就麻煩了。啊，等一下——還有一件事。不過這不是命令而，是身為家人對你的請求」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、なんなりと双鉄さま」
1897 = "「好的，雙鐵少爺您儘管吩咐」" 

# monologue
# JP: ハチロクの瞳に力が戻る。\nまっすぐ、僕の視線を捉える。
2357 = "八六眼中再次閃爍起充滿力量的光芒，就這樣與我四目相對。" 

# monologue
# JP: ああ、これこそがハチロクの目だ――\n瀝青炭を燃やすが如き、赤いきらめきが輝いている。
2407 = "啊，這才是八六的眼神應有的樣子啊——如煤炭燃燒般灼熱，閃爍著奪目的紅光。" 

# 【双鉄】
# display as 雙鐵
# JP: 「視察とはいえ、せっかくのはじめての海外旅行だ。\n楽しもう――仕事自体を。そうして、仲国という国を！」
2186 = "「雖說是考察，但也是難得的初次出國旅行。好好享受這次的工作以及仲國的風土人情吧！」" 

# 【ハチロク】
# display as 八六
# JP: 「はいっ！　かしこまりました、双鉄さま」
1890 = "「好的！我明白了，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫もだぞ？　一緒に、なるべく多くを楽しもう」
1995 = "「日日姬也一樣哦？大家一起好好享受吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　頼まれんでも楽しんじゃうけん！\n安心してね？　にぃに、ハチロク！」
1843 = "「嗯！就算你不說我也會盡情享受的咧！放心吧，阿哥，八六！」" 

# monologue
# JP: （ポーン、ポーン、ポーン）
# 2637 = "（叮咚，叮咚）" 

# monologue
# JP: 着陸だ。周りの乗客たちにあわせて、\n僕らも安全ベルトを外す。
2627 = "飛機著陸了，我們也隨著周圍的乘客們一道解開了安全帶。" 

# monologue
# JP: 立ち上がり、手荷物をまとめたその途端、\n日々姫は、とん、と僕の背中を押してくれる。
2382 = "剛起身拿下行李，日日姬便在背後輕推了我一把。" 

# 【日々姫】
# display as 日日姬
# JP: 「そうするためにも入国審査！\nさくっとまるっと、クリアしちゃおー！！」
2046 = "「為了完成那些目標，就先三兩下把入境的事情搞定吧！！」" 
