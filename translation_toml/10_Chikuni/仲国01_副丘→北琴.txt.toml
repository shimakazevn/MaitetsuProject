1841 = "「Ừ. Có thể cầu cứu chị Kisaki hay chị\nPaulette.\nYên tâm thì yên tâm thật đấy nhưng mà——」"

# monologue
# JP: 日々姫はタブレットをしまいこみ、\n今度は小さな黒表紙の本を取り出してくる。
2489 = "Hibiki cất máy tính bảng đi,\nlần này lấy ra một cuốn sách nhỏ bìa đen."

# 【日々姫】
# display as 日日姬
# JP: 「トラブルないのが一番やけん！\n入国手続き、きちんと復習しとかんと」
2191 = "「Tốt nhất là đừng để xảy ra rắc rối nào!\nPhải ôn lại kỹ càng thủ tục nhập cảnh mới\nđược.」"

# 【ハチロク】
# display as 八六
# JP: 「それこそ、\nタブレットで調べればよいのではないのですか？」
2138 = "「Chuyện đó,\nchẳng phải tra trên máy tính bảng là được\nsao ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「飛行機の中はネット使っちゃいけないの。\n電波で飛行機の計器とか誤作動させちゃったら怖いけん」
1864 = "「Trên máy bay không được dùng mạng đâu.\nLỡ sóng điện từ làm thiết bị trên máy bay\nhoạt động sai thì sợ lắm.」"

# 【ハチロク】
# display as 八六
# JP: 「えっ！？」
1772 = "「Hả!?」"

# monologue
# JP: ハチロクの視線が窓へと向かう。\n見えるのはただ、空と雲だけ――
2342 = "Ánh mắt Hachiroku hướng ra cửa sổ.\nChỉ thấy toàn mây và bầu trời——"

# 【ハチロク】
# display as 八六
# JP: 「誤作動は\n――確かに恐ろしく思います」
1677 = "「Hoạt động sai\n——quả thật là rất đáng sợ ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「でしょ？　やけん」
2009 = "「Đúng không? Thế nên.」"

# monologue
# JP: （ポーン、ポーン、ポーン）
# 2637 = "（叮咚，叮咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1851 = "「嗯？」" 

