1743 = "「Ra là vậy. Việc đã chuẩn bị sẵn những thứ\nđó, nghĩa là.\nTrong trường hợp khẩn cấp, chúng ta có thể\nliên lạc thông qua Internet.」"

# 【日々姫】
# display as 日日姬
