[script]
# lines: 457 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　あれ！！！」
2742 = "「Anh hai! Kìa!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2188 = "「Ồ!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　8620と北琴で再会できるとは思いませんでした。\nうふふっ、なんて素敵な歓迎ボオドでございましょう」
2178 = "「Ôi chao! Em không ngờ lại được gặp lại 8620 ở Bắc Cầm đấy.\nUfufu, quả là một tấm bảng chào mừng tuyệt vời nhỉ.」"
# monologue
# JP: 8620を模したボードに描かれているのは、\n『歓迎！　御一夜鉄道御一行』の文字。
2984 = "Trên tấm bảng mô phỏng 8620 có viết dòng chữ\n『Hoan nghênh! Phái đoàn Đường sắt Ohimitera』."
# monologue
# JP: ボードを手にしているのは――\nふむ。どうみてもレイルロオドだ。
3186 = "Người đang cầm tấm bảng là——\nHửm. Nhìn kiểu gì cũng thấy là một Railord."
# 【双鉄】
# display as 雙鐵
# JP: 「君は――あ、いや。\nにぃはお。あー」
2081 = "「Cô là——à, không.\nNỉ hảo. À.」"
# 【西瓜】
# display as 西瓜
# JP: 「日ノ本語でお話しいただき大丈夫です。\n私、[すいか,1]西瓜は日ノ本語が使えます」
2394 = "「Ngài cứ nói tiếng Hinomoto cũng không sao đâu ạ.\nTôi, Xigua, có thể sử dụng tiếng Hinomoto.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2187 = "「Ồ.」"
# monologue
# JP: 思いもかけず、極めて流暢な日ノ本語だ。
3063 = "Không ngờ tới, một vốn tiếng Hinomoto cực kỳ trôi chảy."
# 【西瓜】
# display as 西瓜
# JP: 「ようこそ北琴へ！　歓迎来到北琴！！」
2489 = "「Chào mừng đến với Bắc Cầm! Hoan nghênh lai đáo Bắc Cầm!!」"
# monologue
# JP: そうして、ぱっと花咲く笑顔。\n嬉しくなって右手を出せば、すぐに握手で応えてくれる。
3239 = "Và rồi, một nụ cười rạng rỡ như hoa nở.\nTôi vui vẻ đưa tay phải ra, cô ấy liền đáp lại bằng một cái bắt tay."
# 【西瓜】
# display as 西瓜
# JP: 「右田日々姫女士に右田双鉄先生にハチロクさんですね。\n我叫[ｘｉｇｕａ,1]西瓜。私は[すいか,1]西瓜。[とうふうよん,2]東富4 [にせん,3]2000専用レイルロオドです」
2360 = "「Quý cô Migita Hibiki, ngài Migita Soutetsu và Hachiroku nhỉ.\nNgã khiếu Xigua. Tôi là Xigua. Railord chuyên dụng của Dongfu 4 2000.」"
# 【ハチロク】
# display as 八六
# JP: 「シーグァというのは、日ノ本語の、果物の“西瓜”と、\n全く同じ意味で同じ漢字だそうでございます」
2539 = "「Xigua có nghĩa là \"Dưa hấu\", một loại trái cây trong tiếng Hinomoto,\ncùng ý nghĩa và cùng chữ Hán luôn đó ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク！？　なんでそぎゃんこと知っとーと？」
2103 = "「Hachiroku!? Sao em lại biết chuyện đó?」"
# monologue
# JP: 日々姫の驚く声を聞くなり同時に、\nハチロクと、西瓜と名乗ったレイルロオドとが小さく笑う。
3279 = "Ngay khi nghe giọng điệu ngạc nhiên của Hibiki,\nHachiroku và Railord tự xưng là Xigua khẽ cười."
# 【日々姫】
# display as 日日姬
# JP: 「あー！　そっか、共感か」
2230 = "「A! Ra vậy, \\x%l共感;#00ffc040;cộng cảm%l;#; sao.」"
# monologue
# JP: 左様ですねと微笑んで、\nハチロクは優雅にスカートの裾をつまんで持ち上げる。
2924 = "Mỉm cười \"Đúng vậy ạ\",\nHachiroku tao nhã nhón gấu váy nâng lên."
# 【ハチロク】
# display as 八六
# JP: 「はじめまして、[すいか,1]西瓜さん。わたくしはハチロク。\n8620形蒸気機関車8620の専用レイルロオドです」
2612 = "「Rất vui được gặp cô, Xigua. Tôi là Hachiroku.\nRailord chuyên dụng của đầu máy hơi nước dòng 8620, số hiệu 8620.」"
# 【西瓜】
# display as 西瓜
# JP: 「挨拶を丁寧にありがとうございます。\nさんは不要です。私を西瓜と呼んでください」
2313 = "「Cảm ơn lời chào hỏi lịch sự của cô.\nKhông cần thêm kính ngữ đâu. Cứ gọi tôi là Xigua.」"
# 【ハチロク】
# display as 八六
# JP: 「では、わたくしのことも、ただハチロクと」
2708 = "「Vậy thì, cũng cứ gọi tôi là Hachiroku đi.」"
# 【西瓜】
# display as 西瓜
# JP: 「ハチロク。わかりました。では、私、西瓜は、\n右田先生と右田女士とハチロクにご紹介します」
2297 = "「Hachiroku. Tôi hiểu rồi. Vậy thì, tôi, Xigua,\nxin giới thiệu với ngài Migita, quý cô Migita và Hachiroku.」"
# monologue
# JP: その声を受け、西瓜の後方に控えていた女性がすっと、\nスマートな体を折り曲げる。
3187 = "Nghe vậy, người phụ nữ đứng chờ phía sau Xigua\nlập tức gập tấm thân thon gọn xuống chào."
# 【姜】
# display as 姜
# JP: 「はじめまして。[きょう　　ようこう,2]姜叶煌と申します。\n仲国国務院、鉄道部の副部長秘書です」
2278 = "「Rất vui được gặp mọi người. Tôi là Jiang Yehuang.\nThư ký Thứ trưởng Bộ Đường sắt, Quốc vụ viện Trung Quốc.」"
# 【日々姫】
# display as 日日姬
# JP: 「は、はじめまして。右田日々姫です。御一夜鉄道所属の\n車輌デザイナーで、機関士・機関助士も務めています」
2388 = "「R, rất vui được gặp cô. Tôi là Migita Hibiki. Nhà thiết kế toa xe thuộc Đường sắt Ohimitera,\nđồng thời cũng là lái tàu và phụ lái tàu.」"
# 【姜】
# display as 姜
# JP: 「はい。[みぎた,1]右田女士と右田先生のことは、\n[ほうしょう,1]宝生女士からよく伺っています」
2740 = "「Vâng. Về quý cô Migita và ngài Migita,\ntôi đã nghe cô Houshou kể rất nhiều rồi.」"
# monologue
# JP: 軽く笑って、日々姫と握手し、スーツ姿の姜さんは、\n僕とも短く――けれども強く握手する。
3020 = "Mỉm cười nhẹ, bắt tay với Hibiki, cô Jiang trong bộ vest\ncũng bắt tay tôi một cái ngắn gọn——nhưng đầy mạnh mẽ."
# 【姜】
# display as 姜
# JP: 「右田先生。\nナインスターズ計画のご成功、おめでとうございます」
2155 = "「Ngài Migita.\nChúc mừng thành công của dự án Nine Stars.」"
# monologue
# JP: うむ！？\nいや……そうか。この面子ならば僕が代表となるわけか。
2982 = "Hửm!?\nÀ......ra vậy. Với đội hình này thì tôi sẽ là người đại diện sao."
# monologue
# JP: 慣れぬことゆえ、ポーレットの普段の対応を思い出しつつ、\nそのままなぞる。
2919 = "Vì chưa quen nên tôi vừa nhớ lại cách ứng xử thường ngày của Paulette,\nvừa làm theo y hệt."
# 【双鉄】
# display as 雙鐵
# JP: 「ご祝辞をありがとうございます。\nまたこの度のお招きにも、こころより御礼申し上げます」
2121 = "「Cảm ơn lời chúc mừng của cô.\nĐồng thời, tôi cũng xin chân thành cảm ơn lời mời lần này.」"
# 【姜】
# display as 姜
# JP: 「こちらこそ、[ごらいきん,2]御来琴を誠にありがとうございます。\nいかがですか？　[ぺきん,1]北琴の印象は」
2391 = "「Chúng tôi mới là người phải cảm ơn vì mọi người đã đến Bắc Cầm.\nMọi người thấy thế nào? Ấn tượng về Bắc Cầm ra sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですね――」
2559 = "「Chà, để xem——」"
# 【日々姫】
# display as 日日姬
# JP: 「すっごい栄えとー！！　入国審査の指紋登録ば、\n機械で一瞬で、おお！　って思ったと――思いました」
2729 = "「Phát triển kinh khủng luôn!! Việc đăng ký dấu vân tay lúc kiểm tra nhập cảnh,\nlàm bằng máy tính trong nháy mắt, khiến tôi ồ lên! ——nghĩ thầm.」"
# monologue
# JP: 怖がっていた指紋登録を、ほんの一瞬で\n完了できたことがよほど印象強かったのだろう。
3250 = "Việc hoàn thành đăng ký dấu vân tay từng khiến con bé sợ hãi chỉ trong nháy mắt\nchắc hẳn đã để lại ấn tượng rất mạnh."
# monologue
# JP: つい出た方言を修正しつつも、\n日々姫の言葉の熱はわずかも下がらない。
3274 = "Dù cố gắng sửa lại giọng địa phương lỡ thốt ra,\nnhưng sự nhiệt tình trong lời nói của Hibiki không hề giảm sút."
# 【日々姫】
# display as 日日姬
# JP: 「入国審査通過してから、この到着ロビーまでの移動も、\nまさかのエアクラモノレールで、すっごく驚きました！」
2365 = "「Sau khi qua cửa kiểm tra nhập cảnh, việc di chuyển đến sảnh đến này\ncũng bằng Aircra Monorail, tôi thực sự rất ngạc nhiên!」"
# monologue
# JP: 確かにあれには驚いた。４人乗りの小さなエアクラ動車が、\nモノレールの上を一定間隔で無数に環状走行していた。
3241 = "Đúng là điều đó thật đáng kinh ngạc. Vô số toa xe Aircra nhỏ chở được 4 người\nchạy vòng tròn trên đường ray Monorail với khoảng cách nhất định."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じく。実に見事なものだと感心しました」
2408 = "「Tôi cũng vậy. Thực sự rất ấn tượng.」"
# monologue
# JP: 日々姫の声に頷けば、『来たばかり故、まだなんとも』と、\n出しかけていた言葉がするり、入れ替わる。
3085 = "Gật đầu trước lời của Hibiki, câu nói 『Vì mới đến nên vẫn chưa biết thế nào』\nđang định thốt ra liền trơn tru thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「初期投資のコストは莫大なものになりそうですが……\nあれなら、運用コストは極限的に下げられましょう」
2542 = "「Chi phí đầu tư ban đầu có vẻ sẽ rất khổng lồ nhưng......\nNếu là hệ thống đó, chi phí vận hành có thể giảm đến mức tối đa.」"
# 【姜】
# display as 姜
# JP: 「さすがのご慧眼です。エアクラバス等を選択するなら、\nなかなか消耗部品がかさんでしまいますからね」
2096 = "「Quả là con mắt tinh đời. Nếu chọn Aircra Bus hay những phương tiện tương tự,\nthì chi phí cho linh kiện hao mòn sẽ khá tốn kém.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに……消耗の少なそうな車体とお見受けしました」
2555 = "「Quả thật......tôi thấy thân xe có vẻ ít bị hao mòn.」"
# monologue
# JP: モノレール路線は全てがチューブ状の……\nアクリルかなにかのカバーですっぽり覆われていた。
2980 = "Toàn bộ tuyến Monorail đều có hình ống......\nđược bao bọc hoàn toàn bởi một lớp vỏ bằng acrylic hay gì đó."
# monologue
# JP: ゆえ、モノレールの車体自体の屋根は省かれ、\n見るからに軽量化、省部品化を図られていた。
3090 = "Do đó, phần mái của bản thân toa xe Monorail đã được lược bỏ,\nnhìn là thấy ngay việc thiết kế hướng tới tối giản trọng lượng và linh kiện."
# 【ハチロク】
# display as 八六
# JP: 「鉄輪・[こざ,1]跨座式と申しますより――そうですね、\n半浮上式とも呼びたくなるように思えました」
2502 = "「Thay vì gọi là loại bánh sắt - ngồi vắt ngang——thì đúng hơn,\ncó cảm giác như muốn gọi là loại bán nổi vậy.」"
# 【姜】
# display as 姜
# JP: 「然り。飛行型エアクラの技術を一部応用し、\nガイドレールと鉄輪の接触を最低限に抑えています」
2507 = "「Đúng vậy. Bằng cách ứng dụng một phần công nghệ của Aircra bay,\nchúng tôi đã giảm thiểu tối đa sự tiếp xúc giữa thanh dẫn hướng và bánh sắt.」"
# monologue
# JP: 姜さんの目がふと緩む。
3017 = "Ánh mắt cô Jiang chợt dịu lại."
# 【姜】
# display as 姜
# JP: 「右田先生がご慧眼なら、\n右田先生のレイルロオドもやはりご慧眼だ」
2022 = "「Ngài Migita đã có con mắt tinh đời,\nthì Railord của ngài Migita quả nhiên cũng có con mắt tinh đời.」"
# 【ハチロク】
# display as 八六
# JP: 「あ……わたくし――そのっ、\n大変恐縮でございます」
2218 = "「A......em——dạ,\nthật là vinh hạnh quá ạ.」"
# monologue
# JP: 心強い。ハチロクも日々姫も、それぞれの目で、\nそれぞれの専門分野をしっかり観察してくれている。
2872 = "Thật đáng tin cậy. Cả Hachiroku và Hibiki, bằng chính đôi mắt của mình,\nđều đang quan sát rất kỹ lĩnh vực chuyên môn của mỗi người."
# 【日々姫】
# display as 日日姬
# JP: 「そっか、そんならレールとかに負荷の殆どかからんけん、\n消耗部品のコストば、めちゃくちゃ抑えられるとね」
2133 = "「Ra vậy, nếu thế thì đường ray hầu như không phải chịu tải trọng gì,\nnên chi phí cho linh kiện hao mòn sẽ được cắt giảm đáng kể nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。初期投資がどれほど莫大になろうとも――」
2533 = "「Đúng vậy. Dù chi phí đầu tư ban đầu có khổng lồ đến đâu đi chăng nữa——」"
# monologue
# JP: ……立ち話のかたちになっている僕らの脇を、\nひっきりなしに入国者たちが通り過ぎていく。
1629 = "......Chúng tôi cứ thế đứng trò chuyện, trong khi những hành khách nhập cảnh khác không ngừng lướt qua."
# monologue
# JP: 御一夜がもっとも賑わう赤井さんの“おくんち”でも、\nこれほどまでの盛況を見ることは難しかろう。
2985 = "Ngay cả trong lễ hội mùa thu \"Okunchi\" náo nhiệt nhất của đền Akai ở Ohimitera,\nchắc cũng khó mà thấy được cảnh tượng đông đúc đến mức này."
# 【双鉄】
# display as 雙鐵
# JP: 「都度のランニングコストを抑えることで回収していく。\n旧帝鉄がかつて目指した、全線電化と同じ発想だな」
2061 = "「Bằng cách giảm chi phí vận hành cho mỗi chuyến đi để thu hồi vốn.\nÝ tưởng này cũng giống hệt với mục tiêu điện khí hóa toàn tuyến mà Đường sắt Hoàng gia từng hướng tới.」"
# monologue
# JP: 僕の言葉に、姜さんは力強く頷いてくれる。
3015 = "Nghe tôi nói vậy, cô Jiang gật đầu mạnh mẽ tán thành."
# 【姜】
# display as 姜
# JP: 「我が仲国は総人口13億強の巨大国家です。\n北琴空港の年間利用客数も、1億人を優に超えます」
2074 = "「Zhongguo của chúng tôi là một quốc gia khổng lồ với dân số hơn 1,3 tỷ người.\nChỉ tính riêng lượng hành khách qua sân bay Beiqin hàng năm cũng đã dễ dàng vượt mức 100 triệu người rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「……日ノ本の外国への玄関口。\n[なりた,1]鳴多空港の年間利用客数は3500万人程度だそうです」
1699 = "「......Nghe nói sân bay Narita, cửa ngõ giao thương quốc tế của Hinomoto,\ncó lượng hành khách hàng năm chỉ khoảng 35 triệu người thôi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「！！？　そぎゃんと違かと！？」
2762 = "「!!? Khác biệt lớn đến thế cơ á!?」"
# monologue
# JP: ハチロク越しに西瓜を見れば、にこり、誇らしげな笑み。\nなるほど、共感での入れ知恵か。
3094 = "Nhìn sang Suika đứng phía sau Hachiroku, cô bé đang mỉm cười đầy tự hào.\nRa là vậy, kiến thức này được chia sẻ qua cộng cảm sao."
# monologue
# JP: 共感での情報収集を早速試み、成功させてくれた――\nその実直さが、なんとも嬉しく心強い。
3266 = "Cô bé đã nhanh chóng thử nghiệm việc thu thập thông tin qua cộng cảm và thành công——\nSự chân thành và thực tế đó thực sự khiến người ta cảm thấy vui vẻ và vững tâm."
# 【日々姫】
# display as 日日姬
# JP: 「日ノ本だって、海外旅行する人も海外からのお客さんも、\nめーっちゃたくさんおるとに――」
2457 = "「Rõ ràng ở Hinomoto, những người đi du lịch nước ngoài và khách du lịch từ nước ngoài đến\ncũng đã nhiều lắm rồi mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「その更に三倍、か。しかも仲国は広大だ。\n同クラスの空港も、恐らく複数箇所あるのだろう」
1703 = "「......Gấp ba lần chỗ đó sao. Hơn nữa Zhongguo lại vô cùng rộng lớn.\nNhững sân bay cùng đẳng cấp chắc hẳn cũng có không ít đâu nhỉ.」"
# 【姜】
# display as 姜
# JP: 「おっしゃる通りです。だけでなく、空港の無い\n大きな都市には、必ず大規模な鉄道駅が存在します」
2508 = "「Đúng như anh nói. Không chỉ vậy, ở những thành phố lớn không có sân bay,\nchắc chắn sẽ có những nhà ga đường sắt quy mô lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「13億人と、その人々の暮らしをささえる物資とか――\n移動・輸送のコストがどれ程になるか、想像もできんな」
2764 = "「1,3 tỷ người, cùng với các vật tư hỗ trợ cuộc sống của họ——\nChi phí di chuyển và vận chuyển sẽ lớn đến mức nào, thật không thể tưởng tượng nổi.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、都度のランニングコストを抑えることば、\nめーっちゃ重要になってくるとね？」
2144 = "「Thế nên, việc giảm chi phí vận hành cho mỗi chuyến đi\nmới trở nên cực kỳ quan trọng đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「定点間の低コスト大量高速輸送！\nそれこそ、鉄道の最も得意とすることでございます！」
2261 = "「Vận chuyển khối lượng lớn ở tốc độ cao với chi phí thấp giữa các điểm cố định!\nĐó chính là điều mà đường sắt giỏi nhất đấy ạ!」"
# 【姜】
# display as 姜
# JP: 「然り、然り」
2509 = "「Đúng vậy, đúng vậy.」"
# monologue
# JP: 勢い混んだハチロクの声を、\n姜さんは涼やかな笑顔で受け入れる。
2935 = "Cô Jiang nở nụ cười điềm tĩnh, đón nhận những lời nói tràn đầy nhiệt huyết của Hachiroku."
# monologue
# JP: なるほど、ならば――
2961 = "Ra là vậy, nếu thế thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「そうした必要性の高さをPRする広告塔――といった\n位置づけになりますでしょうか？　今回のこの」
2719 = "「Vậy mục đích của chuyến đi lần này, có phải là để chúng tôi đóng vai trò như một tháp quảng cáo——\nnhằm tuyên truyền về mức độ cần thiết của việc đó không?」"
# 【姜】
# display as 姜
# JP: 「ああ……申し訳ありません。そこをご説明申し上げ、\n発想の枠が狭まることを、当方は懸念しております」
2222 = "「A...... Thành thật xin lỗi. Chúng tôi e rằng nếu giải thích điều đó lúc này,\nsẽ làm thu hẹp khuôn khổ tư duy của mọi người mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2130 = "「Ra là vậy.」"
# monologue
# JP: 言われればごく当然のことだ。\n人は、自分の思考の正当性を補強する材料を探してしまう。
3068 = "Nghĩ lại thì cũng đúng.\nCon người ta thường có xu hướng tìm kiếm những tài liệu để củng cố cho tính chính đáng trong suy nghĩ của mình."
# monologue
# JP: ゆえ、最終的に目指すところを知ってしまえばその時点で、\nゼロベースでの視察など、到底不可能となるだろう。
3091 = "Do đó, nếu biết trước mục tiêu cuối cùng ngay từ lúc này,\nthì việc khảo sát từ con số không sẽ trở nên hoàn toàn bất khả thi."
# 【双鉄】
# display as 雙鐵
# JP: 「『仲国視察と、仲国版ナインスターズに関する立案』\n……その理由を探すこともまた、視察の一部なのですね」
1651 = "「『Khảo sát Zhongguo và lập kế hoạch cho Nine Stars phiên bản Zhongguo』\n......Việc tìm ra lý do cho yêu cầu đó cũng là một phần của cuộc khảo sát nhỉ.」"
# 【姜】
# display as 姜
# JP: 「はい。この依頼の背景にあるものも、右田先生たちには、\n必ずや見出していただけるものと確信しております」
2506 = "「Vâng. Chúng tôi tin chắc rằng thầy Migita và mọi người\nnhất định sẽ tìm ra được bối cảnh đằng sau yêu cầu này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご信頼をありがとうございます」
2120 = "「Cảm ơn cô đã tin tưởng.」"
# monologue
# JP: 稀咲を通じ、一体どれ程の情報が行っているのだろうか。\nが、稀咲由来なら、質的には極めて妥当な物であろう。
3272 = "Không biết họ đã nắm được bao nhiêu thông tin thông qua Kisaki rồi.\nNhưng nếu nguồn tin từ Kisaki, thì về mặt chất lượng chắc chắn là cực kỳ thỏa đáng."
# monologue
# JP: そこからくだされた評価に恥じることがないよう、\n僕もまた、僕の役割をきちんと果たそう。
3158 = "Để không phải hổ thẹn với những đánh giá mà họ đã đưa ra từ đó,\ntôi cũng phải hoàn thành thật tốt vai trò của mình mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「では、早速視察に入らせていただきたいのですが――\n今のお話の流れですと」
2304 = "「Vậy thì, tôi muốn bắt đầu việc khảo sát ngay lập tức——\nTheo như mạch câu chuyện nãy giờ thì...」"
# 【姜】
# display as 姜
# JP: 「ですね。\nご視察先の希望を、大まかにでも頂けましたら」
2459 = "「Vâng.\nNếu mọi người có nguyện vọng về địa điểm khảo sát, dù chỉ là phác thảo sơ qua...」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「やったら、駅ば！」\n「でしたら、駅を！」
2283 = "「Nếu vậy thì, nhà ga đi!」\n「Nếu vậy thì, nhà ga ạ!」"
# monologue
# JP: ふたりの声がぴたりと重なる。\n無論、僕も同じ気持ちだ。
2921 = "Giọng của hai người họ vang lên cùng một lúc.\nTất nhiên, tôi cũng có cùng suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことなので、駅へご案内いただけませんか？\nまずは、生きている列車たちをみてみたい」
2538 = "「Vậy nên, cô có thể dẫn chúng tôi đến nhà ga được không?\nTrước tiên, tôi muốn xem những đoàn tàu đang hoạt động.」"
# 【姜】
# display as 姜
# JP: 「かしこまりました。\n西瓜？」
2307 = "「Tôi hiểu rồi.\nSuika?」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は了解しました！　姜秘書」
2616 = "「Suika đã rõ! Thư ký Jiang.」"
# monologue
# JP: 現場のことはレイルロオドにという意図であろうか。\n姜さんの極めて短い指示を受け、西瓜が元気に歩き出す。
3013 = "Chắc hẳn cô ấy có ý định giao phó công việc hiện trường cho Railord.\nNhận được chỉ thị cực kỳ ngắn gọn của cô Jiang, Suika tràn đầy năng lượng bước đi."
# 【西瓜】
# display as 西瓜
# JP: 「それでは西瓜はみなさんを、北琴駅――\n仲国最大のターミナル駅に、ご案内します！」
2731 = "「Vậy thì Suika sẽ dẫn mọi người đến ga Beiqin——\nga đầu mối lớn nhất của Zhongguo!」"
# 【日々姫】
# display as 日日姬
# JP: 「……驚いたー。きっぷ売り場に入るのに、身体検査と\nパスポートチェックと手荷物検査があるなんて！」
1696 = "「......Bất ngờ thật đấy. Chỉ để vào khu vực bán vé mà cũng phải kiểm tra thân thể,\nkiểm tra hộ chiếu và cả hành lý xách tay nữa cơ á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2244 = "「Hừm.」"
# monologue
# JP: それだけあって、規模も設備も壮観だ、\n日々姫のスケッチだけに任せず、僕も撮っておくべき――
2997 = "Quy mô và trang thiết bị thật hoành tráng, xứng đáng với sự nghiêm ngặt đó.\nKhông thể chỉ giao phó mỗi việc phác họa cho Hibiki được, tôi cũng nên chụp lại——"
# 【姜】
# display as 姜
# JP: 「ああ、双鉄先生。駅施設内では、\n写真撮影は控えた方が安全です」
2227 = "「A, thầy Migita. Bên trong cơ sở nhà ga,\ntốt nhất là anh không nên chụp ảnh thì sẽ an toàn hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　――む！」
2252 = "「Hửm? ——Hự!」"
# monologue
# JP: 警備のための人員であろうか――
3148 = "Chắc là nhân viên an ninh——"
# monologue
# JP: きっぷ売り場を巡回している制服姿の男性が、\n僕の手――カメラに、咎めるような視線を向けている。
3169 = "Một người đàn ông mặc đồng phục đang đi tuần tra trong khu vực bán vé,\nđang nhìn chằm chằm vào tay tôi——vào chiếc máy ảnh, với ánh mắt đầy vẻ khiển trách."
# 【姜】
# display as 姜
# JP: 「仲国では、駅施設は保安の対象となるのです。\n外国人が写真撮影をすると、身体検査をされかねません」
2265 = "「Ở Zhongguo, các cơ sở nhà ga là đối tượng được bảo vệ an ninh.\nNếu người nước ngoài chụp ảnh, rất có thể sẽ bị kiểm tra thân thể đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご助言、ありがとうございます。控えます」
2398 = "「Cảm ơn cô đã nhắc nhở. Tôi sẽ chú ý.」"
# monologue
# JP: カメラをしまえばすぐさまに、保安員氏はまた巡回に戻る。
3168 = "Ngay khi tôi cất máy ảnh đi, nhân viên an ninh kia lại tiếp tục đi tuần tra."
# 【双鉄】
# display as 雙鐵
# JP: 「……空港並のセキュリティチェックの厳しさだな。\nこれは、北琴駅だけ、特別に厳しいものなのですか？」
2685 = "「......Kiểm tra an ninh nghiêm ngặt ngang ngửa sân bay luôn nhỉ.\nCó phải chỉ riêng ga Beiqin mới đặc biệt nghiêm ngặt như vậy không?」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知るどこの駅でもセキュリティチェックはあります。\nその中でも北琴駅は特に厳しいと西瓜も感じています」
2349 = "「Theo như Suika biết thì bất kỳ nhà ga nào cũng có kiểm tra an ninh.\nNhưng Suika cũng cảm thấy ga Beiqin đặc biệt nghiêm ngặt hơn cả.」"
# 【ハチロク】
# display as 八六
# JP: 「どこでも？　どのような地方の小さな駅でも、\nこのような厳しい立ち入り検査を？」
2167 = "「Bất kỳ đâu sao? Dù là những nhà ga nhỏ ở vùng quê,\ncũng phải kiểm tra an ninh nghiêm ngặt như thế này ạ?」"
# monologue
# JP: 僕らにも聞こえるようにだろう。\nハチロクはあえて、声での質問を投げかけてくれる。
2929 = "Chắc hẳn là để chúng tôi cũng có thể nghe thấy.\nHachiroku cố tình cất tiếng hỏi."
# monologue
# JP: それに意表をつかれたわけでもなかろうが、\n一瞬、西瓜は困ったような顔になる。
3217 = "Có vẻ không phải vì bất ngờ trước câu hỏi đó,\nnhưng trong thoáng chốc, Suika lộ ra vẻ mặt có chút bối rối."
# 【西瓜】
# display as 西瓜
# JP: 「……[Ｘｉ　　ｊｉｕ,1]悉究……悉究」
1681 = "「......Tất cứu......tất cứu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しーじぉ？」
2765 = "「Xijiu?」"
# 【ハチロク】
# display as 八六
# JP: 「[しつきゅう,1]悉究。[ことごと]悉くを追求する――\n徹底的な原因追求という意味の様です。つまりここでは」
1690 = "「\\x%lしつきゅう;#00ffc040;Tất cứu%l;#;. Có nghĩa là theo đuổi đến cùng——\nCó vẻ mang ý nghĩa là truy tìm nguyên nhân một cách triệt để. Tức là trong trường hợp này...」"
# 【日々姫】
# display as 日日姬
# JP: 「細かなとこまでちゃーんと伝えようとしてくれて、\n悩んどる……いう感じ？」
2267 = "「Em ấy đang cố gắng truyền đạt chi tiết cho chúng ta,\nnên mới thấy phiền não...... kiểu vậy đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　そのような心の動きでもれてきた、\nいわゆる、これは、独り言かと」
2497 = "「Vâng! Những chuyển động trong tâm trí như vậy đã vô tình bộc lộ ra ngoài,\ncái này, người ta thường gọi là nói mớ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2243 = "「Hừm.」"
# monologue
# JP: 独り言を漏らした背景などは、\n本人もなかなか自覚しづらいことだろう。
3192 = "Bản thân người nói mớ chắc cũng khó mà tự nhận thức được\nbối cảnh khiến họ thốt ra những lời đó."
# monologue
# JP: そこまで共感を開いて西瓜は僕らを信頼し――\nその上で、誠実に対応しようとしてくれているのか。
3026 = "Mở rộng cộng cảm đến mức đó, chứng tỏ Suika rất tin tưởng chúng tôi——\nHơn nữa, em ấy đang cố gắng phản hồi chúng tôi một cách chân thành sao."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知る範囲で、仲国には、日ノ本的な『小さな駅』。\n改札とホームのみといった構造の駅は存在しません」
2354 = "「Trong phạm vi hiểu biết của Suika, ở Zhongguo không tồn tại những 『nhà ga nhỏ』 mang phong cách Hinomoto.\nTức là những nhà ga chỉ có cấu trúc gồm cổng soát vé và sân ga.」"
# 【双鉄】
# display as 雙鐵
# JP: 「改札とホームに加え……ああ。\nこのような大規模なきっぷ売り場が必ずある、とか？」
2747 = "「Ngoài cổng soát vé và sân ga ra...... A.\nCó phải nhất định phải có một khu vực bán vé quy mô lớn như thế này không?」"
# 【西瓜】
# display as 西瓜
# JP: 「大規模というより、日ノ本語だと……ん……」
2594 = "「Nói là quy mô lớn thì cũng không hẳn, trong tiếng Hinomoto thì gọi là...... ừm......」"
# 【ハチロク】
# display as 八六
# JP: 「『[べつむね,1]別棟』が好適な言葉かと」
1653 = "「Tôi nghĩ từ 『Tòa nhà độc lập』 sẽ là một từ thích hợp đấy ạ.」"
# monologue
# JP: 西瓜の顔がパッと輝く。\nなるほど、共感は便利なものだ。
3227 = "Gương mặt Suika bỗng bừng sáng.\nRa là vậy, cộng cảm thật tiện lợi."
# monologue
# JP: 西瓜の中にある”概念”に、ハチロクが適切な日ノ本語を\nパチンとハメてやったのだろう。
3066 = "Hachiroku chắc hẳn đã tìm ra từ tiếng Hinomoto phù hợp\nđể khớp với \"khái niệm\" trong đầu Suika."
# 【西瓜】
# display as 西瓜
# JP: 「別棟です。どのような小規模駅でも、きっぷ売り場は。\nつまり、この北琴駅と同じような建屋構造になります」
2338 = "「Là tòa nhà độc lập. Dù là nhà ga quy mô nhỏ đến đâu thì khu vực bán vé cũng vậy.\nTức là, nó sẽ có cấu trúc tòa nhà giống như ga Beiqin này.」"
# 【日々姫】
# display as 日日姬
# JP: 「同じような建屋構造……」
2535 = "「Cấu trúc tòa nhà giống nhau......」"
# monologue
# JP: 日々姫がすぐさまスケッチブックを開いてみせる。
3138 = "Hibiki lập tức mở cuốn sổ phác thảo ra cho chúng tôi xem."
# monologue
# JP: つい先程、夢中になって描きまわっていた北琴駅の外観が、\n動感豊かで的確な線により、浮き上がってくる。
3182 = "Bề ngoài của ga Beiqin mà em ấy vừa say sưa vẽ lúc nãy,\nđang hiện lên rõ nét qua những đường nét chính xác và đầy tính động."
# 【日々姫】
# display as 日日姬
# JP: 「どの駅でも、きっぷを買ったらいったん駅の外に出て。\n別の入口からの駅本屋への再入場が必要――になると？」
2199 = "「Ở bất kỳ nhà ga nào, sau khi mua vé xong, chúng ta đều phải đi ra ngoài ga.\nRồi lại phải đi vào tòa nhà chính của ga qua một lối vào khác——là vậy sao?」"
# monologue
# JP: とたんに、ぴょこん――\n小さく西瓜のおさげが跳ねる。
3077 = "Ngay lập tức, pưn——\nHai bím tóc của Suika nảy lên một cái nhẹ."
# 【西瓜】
# display as 西瓜
# JP: 「わ！　素晴らしい悉究です！　外観とこの部屋とから、\n建屋構成の意図を読み取られるなんて！！」
2180 = "「Oa! Thật là một sự tất cứu tuyệt vời! Từ vẻ bề ngoài và căn phòng này,\nmà chị có thể đọc được ý đồ của cấu trúc tòa nhà sao!!」"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃ、ざらっとでも描いたけんね！\nそれに、セキュリティチェックもこぎゃんと厳しかけん」
2682 = "「Thì, chị cũng đã phác họa sơ qua rồi mà!\nHơn nữa, kiểm tra an ninh lại còn nghiêm ngặt đến thế này nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2243 = "「嗯」" 
# monologue
# JP: 日々姫の手のスケッチブックを確認し、\n周囲をぐるり、見渡してみる。
3078 = "Tôi kiểm tra cuốn sổ phác thảo trên tay Hibiki,\nrồi nhìn một vòng xung quanh."
# monologue
# JP: 僕らの並ぶ窓口の後方にある扉はなるほど――\n駅本屋やホームではなく、外へと向かう出口となるのか。
2960 = "Ra là vậy, cánh cửa phía sau quầy vé mà chúng tôi đang xếp hàng——\nkhông phải hướng vào tòa nhà chính của ga hay sân ga, mà là lối ra hướng ra ngoài sao."
# 【双鉄】
# display as 雙鐵
# JP: 「きっぷを購入後には必ず一度建屋の外に出し、\n駅本屋への再入場時に、もう一度の安全検査を行う」
2644 = "「Sau khi mua vé, nhất định phải đi ra ngoài tòa nhà một lần,\nrồi khi vào lại tòa nhà chính của ga, sẽ phải tiến hành kiểm tra an ninh thêm một lần nữa.」"
# monologue
# JP: そのための、別棟入り口二箇所構造。\n利用客にとっては面倒が嵩んでもしまいそうだが――
3159 = "Cấu trúc hai lối vào tòa nhà riêng biệt là để phục vụ cho việc đó.\nĐối với hành khách sử dụng thì có vẻ sẽ tăng thêm phần rắc rối, nhưng——"
# 【ハチロク】
# display as 八六
# JP: 「なぜ、そのような手間をかけるのでしょう？」
2523 = "「Tại sao lại phải tốn công sức như vậy ạ?」"
# 【西瓜】
# display as 西瓜
# JP: 「危険物の持ち込みを阻止する確率を上げるためと……\nもともとはきっぷの転売防止の意味もあると習いました」
2522 = "「Suika được học là để tăng xác suất ngăn chặn việc mang vật liệu nguy hiểm vào trong......\nVà ban đầu, nó cũng mang ý nghĩa là để ngăn chặn việc bán lại vé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば……きっぷには購入者の個人情報が記載される\nこととなるのか？」
2694 = "「Nếu vậy thì...... trên vé sẽ ghi thông tin cá nhân của người mua\nsao?」"
# 【西瓜】
# display as 西瓜
# JP: 「！」
2759 = "「!」"
# monologue
# JP: 西瓜のおさげがまた跳ねる。
3225 = "Bím tóc của Suika lại nảy lên."
# monologue
# JP: 表情の動きが日々姫ハチロク程には見えぬだけに、\nそこが一際、西瓜の驚きを表したようにも感じられる。
2963 = "Chính vì những thay đổi trên nét mặt không rõ ràng như Hibiki hay Hachiroku,\nnên hành động đó càng thể hiện rõ sự ngạc nhiên của Suika."
# 【西瓜】
# display as 西瓜
# JP: 「今の会話だけでそこまで見抜かれてしまうとは……\n右田先生もさすがの悉究です。西瓜は感服します」
2239 = "「Chỉ qua cuộc trò chuyện vừa rồi mà thầy đã nhìn thấu đến mức đó......\nThầy Migita quả nhiên là một người tất cứu. Suika thật sự khâm phục.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ。きっぷに個人情報が記されるのでしたら、\n改札前の再入場時の身分証提示で見比べられるのですね」
2189 = "「A. Nếu thông tin cá nhân được ghi trên vé,\nthì khi xuất trình giấy tờ tùy thân lúc vào lại trước cổng soát vé, người ta có thể đối chiếu được nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それで転売防止になるし……個人情報書いてあるきっぷ、誰かに売るとか、その時点でもう結構イヤよね、うん」
2688 = "「Như vậy sẽ ngăn chặn được việc bán lại vé...... Chứ vé có ghi thông tin cá nhân mà đem bán cho ai đó, thì ngay từ lúc đó đã thấy khá là khó chịu rồi, ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よく出来た転売防止策だとこちらが感服するが……。\nしかし――この盛況でも、『もともとは』なのか」
2328 = "「Quả là một biện pháp chống bán lại vé được thiết kế rất tốt, khiến người ta phải khâm phục......\nNhưng mà——ngay cả với sự thịnh vượng này, mà vẫn dùng từ 『ban đầu』 sao.」"
# monologue
# JP: きっぷ売り場の窓口は6箇所ほどが開かれており\nその全てに、10人規模の行列が発生している。
2978 = "Có khoảng 6 quầy bán vé đang mở,\nvà ở tất cả các quầy, đều có một hàng dài khoảng 10 người đang xếp hàng."
# monologue
# JP: ……日ノ本ではなかなかお目にかかれなかろう大盛況だが、\nそれでも今は、きっぷ転売が発生しないということならば。
1625 = "......Sự nhộn nhịp này ở Hinomoto rất hiếm thấy,\nnhưng nếu nói rằng hiện tại không còn xảy ra tình trạng bán lại vé nữa thì."
# 【日々姫】
# display as 日日姬
# JP: 「そいば、つまりは、\n以前はもーっと混雑ばしとったいうことと？」
2706 = "「Nếu vậy, tức là,\ntrước đây còn đông đúc hơn thế này nhiều sao?」"
# 【姜】
# display as 姜
# JP: 「はい、そのとおりです――っと、順番が次ですね。\n皆さん、パスポートを私に預けてください」
2496 = "「Vâng, đúng là như vậy——A, người tiếp theo là chúng ta rồi.\nMọi người, xin hãy đưa hộ chiếu cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
2233 = "「A, vâng.」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁい。……っていうか、単なる入場券買うのにも\nパスポートば必要――個人情報の記載ばあると？」
2280 = "「Vâng ạ. ......Mà này, chỉ mua vé vào cửa bình thường thôi\nmà cũng cần hộ chiếu——cũng phải ghi thông tin cá nhân sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知る全ての仲国の鉄道駅には、\n入場券というシステムがありません」
2352 = "「Trong tất cả các nhà ga đường sắt ở Zhongguo mà Suika biết,\nkhông có hệ thống vé vào cửa đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2470 = "「Vậy sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「そうなのです。だから、駅のホームに入って、\n実際に列車を見学したいときなどにも――」
2345 = "「Đúng vậy. Thế nên, khi muốn vào sân ga\nđể thực sự tham quan các đoàn tàu——」"
# 【姜】
# display as 姜
# JP: 「お待たせしました。無事に購入できました」
2630 = "「Để mọi người phải đợi lâu rồi. Đã mua vé xong xuôi rồi đây.」"
# monologue
# JP: ほっとした顔の姜さんが、\n僕らにパスポートを返却し、同時に紙片を渡してくれる。
3206 = "Cô Jiang với vẻ mặt nhẹ nhõm,\ntrả lại hộ chiếu cho chúng tôi, đồng thời đưa cho mỗi người một mảnh giấy."
# 【ハチロク】
# display as 八六
# JP: 「これは……普通のきっぷでございますね」
2686 = "「Đây là...... một tấm vé bình thường nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。こうするしか手がないわけか」
2131 = "「Ra là vậy. Chỉ còn cách này thôi sao.」"
# monologue
# JP: 日ノ本のきっぷ同様に、発駅と目的駅と料金などと……\n意味の読めない数字や記号などもある。
2976 = "Giống như vé ở Hinomoto, trên này cũng ghi ga đi, ga đến, giá vé, v.v...\nVà cả những con số, ký hiệu không rõ ý nghĩa nữa."
# monologue
# JP: このいずれかが、恐らくは暗号化された個人情報――\n例えばパスポートナンバー等を示しているものなのだろう。
3076 = "Một trong số này có lẽ là thông tin cá nhân đã được mã hóa——\nVí dụ như nó hiển thị số hộ chiếu chẳng hạn."
# 【日々姫】
# display as 日日姬
# JP: 「見られるんならなんでもよかとよ！　なら早速――って、ええと、ここを出てから、どうするんでしたっけ？」
2589 = "「Miễn là được xem thì thế nào cũng được! Vậy thì nhanh chóng——mà khoan, ừm, sau khi ra khỏi đây, chúng ta phải làm gì tiếp theo nhỉ?」"
# 【姜】
# display as 姜
# JP: 「進站口からセキュリティチェックを再度受けて駅本屋に\n入って。その上で改札時間になったらホームへ入れます」
2269 = "「Chúng ta sẽ qua cửa vào ga để kiểm tra an ninh một lần nữa rồi mới vào tòa nhà chính của ga.\nSau đó, khi đến giờ soát vé, chúng ta mới có thể vào sân ga.」"
# 【日々姫】
# display as 日日姬
# JP: 「その、改札時間っていうのは？」
2691 = "「Giờ soát vé đó là sao ạ?」"
# 【姜】
# display as 姜
# JP: 「列車の出発の大体30分くらい前ですから――」
2335 = "「Là khoảng 30 phút trước khi tàu khởi hành——」"
# monologue
# JP: 言って、姜さんはその手の中のきっぷを見つめる。
3267 = "Vừa nói, cô Jiang vừa nhìn chằm chằm vào tấm vé trong tay."
# 【姜】
# display as 姜
# JP: 「まだ少し待たなければなりませんね」
2693 = "「Chúng ta vẫn phải đợi thêm một chút nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー。そぎゃん仕組みなら、待つしかなかとねー」
2224 = "「A. Nếu hệ thống là vậy thì đành phải đợi thôi~」"
# monologue
# JP: 日々姫の視線もきっぷへ落ちる。
3129 = "Ánh mắt của Hibiki cũng rơi xuống tấm vé."
# 【日々姫】
# display as 日日姬
# JP: 「北琴駅から……通衆西駅……\nこの、K1189というのは――どぎゃん意味と？」
2364 = "「Từ ga Beiqin...... đến ga Tongzhou Tây......\nK1189 này——có ý nghĩa gì vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「それは列車番号となります。K1189列車は、\n[ウランホト,3]烏羊浩特駅が終着の、快速列車です」
2726 = "「Đó là số hiệu đoàn tàu. Tàu K1189 là\ntàu nhanh có ga cuối là ga Ulanhot.」"
# 【日々姫】
# display as 日日姬
# JP: 「快速列車でＫ！　わかりやすかとね～」
2384 = "「Tàu nhanh nên là chữ K! Dễ hiểu quá nhỉ~」"
# 【西瓜】
# display as 西瓜
# JP: 「はい！　西瓜もわかりやすいと思います。\n仲国でも快速は快速。発音は『Kuai－su』ですから」
2462 = "「Vâng! Suika cũng thấy rất dễ hiểu.\nỞ Zhongguo, tàu nhanh cũng là tàu nhanh. Phát âm là 『Kuai-su』 mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。同じ漢字圏ならではの面白さだな。\nならば――特急列車もそのまま特急になるのかな」
2255 = "「Ồ. Đúng là điều thú vị chỉ có ở những nước cùng chung vùng văn hóa chữ Hán nhỉ.\nNếu vậy thì——tàu tốc hành đặc biệt cũng giữ nguyên là đặc cấp sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「それが少しだけ違ってきます。日ノ本でいう特急列車は、\n[とっかい,1]特快――Te－kuai、T列車になります」
2683 = "「Cái đó thì hơi khác một chút. Tàu tốc hành đặc biệt ở Hinomoto,\nsẽ tương đương với Đặc khoái——Te-kuai, tức là tàu chữ T.」"
# 【ハチロク】
# display as 八六
# JP: 「旧帝鉄には無いものですね。特別快速――鉄道が順調に\n発展していれば、発生した列車種別かもしれませんが」
2114 = "「Là loại tàu không có ở Đường sắt Hoàng gia cũ nhỉ. Đặc biệt nhanh——nếu đường sắt phát triển\nthuận lợi, thì có lẽ đây là loại tàu đã được sinh ra.」"
# 【西瓜】
# display as 西瓜
# JP: 「仲国には、さらに特快の上の列車種別もあります。\n直達特快――Zhi－da Te－kuai。これが最速のZ列車です」
2259 = "「Ở Zhongguo, còn có loại tàu cao cấp hơn cả Đặc khoái nữa.\nĐó là Trực đạt đặc khoái——Zhi-da Te-kuai. Đây là tàu chữ Z nhanh nhất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「特快よりも、更に停車駅が少ないのか？」
2500 = "「Còn ít điểm dừng hơn cả Đặc khoái sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい！　少ないのです！」
2461 = "「Vâng! Ít hơn ạ!」"
# monologue
# JP: ご自慢なのか、西瓜のおさげがひょこんと踊る。
3228 = "Không biết có phải đang tự hào không, mà bím tóc của Suika nhảy lên một cái."
# 【西瓜】
# display as 西瓜
# JP: 「その上牽引列車が東富4D。西瓜たちの東富4の改良機で、\n運転最高速度は、実に時速145kmにも達します！」
2529 = "「Hơn nữa, tàu kéo là Dongfu 4D. Là phiên bản cải tiến của Dongfu 4 của bọn Suika,\ntốc độ vận hành tối đa thực tế lên tới 145km/h đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！？」
2232 = "「Á!!!?」"
# monologue
# JP: 一瞬にして、ハチロクの目がまんまるになる。
2939 = "Trong nháy mắt, hai mắt Hachiroku tròn xoe."
# monologue
# JP: 驚きのあまりであろう、\n口がわななき、言葉をすぐには出せない様子だ。
3265 = "Chắc hẳn là vì quá đỗi ngạc nhiên,\nmiệng cô ấy run rẩy, có vẻ như không thể thốt nên lời ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「運転最高速度――というのは、\n営業運転中に145km／hを出す区間があるということか？」
2477 = "「Tốc độ vận hành tối đa——tức là,\ncó đoạn đường chạy với tốc độ 145km/h trong quá trình vận hành thương mại sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「そういうことです！」
2628 = "「Đúng là như vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……凄まじいな。\n営業運転としては、世界最高速ではないのか？」
1694 = "「......Khủng khiếp thật.\nXét về vận hành thương mại, chẳng phải đây là tốc độ cao nhất thế giới sao?」"
# 【ハチロク】
# display as 八六
# JP: 「……厳密には精査しないとわかりませんが……\nその領域の一つであることには、間違いないかと」
1663 = "「......Nếu không xem xét kỹ lưỡng thì cũng không thể biết chắc được nhưng......\ntôi nghĩ không thể nghi ngờ gì nữa, nó chắc chắn nằm trong top đầu thế giới.」"
# 【日々姫】
# display as 日日姬
# JP: 「すごかね、仲国の鉄道」
2075 = "「Đường sắt của Zhongguo tuyệt thật đấy.」"
# monologue
# JP: 日々姫の素直な称賛を受け、西瓜は瞬時、表情をゆるめ。\nけれどもすぐに、元の落ち着いたものへと戻してしまう。
3188 = "Nhận được lời khen ngợi chân thành từ Hibiki, nét mặt Suika ngay lập tức giãn ra.\nNhưng ngay sau đó, cô bé lại trở về với vẻ điềm tĩnh ban đầu."
# 【西瓜】
# display as 西瓜
# JP: 「改良を重ねているとはいえ、東富4Dも既に20年近く前の\n機関車です。機関車の新規開発は、そこで中断しました」
2093 = "「Mặc dù đã trải qua nhiều lần cải tiến, nhưng Dongfu 4D cũng đã là đầu máy\ncủa gần 20 năm trước rồi. Việc phát triển đầu máy mới đã bị gián đoạn từ đó.」"
# 【ハチロク】
# display as 八六
# JP: 「……それでも、ほんの20年前までは新型機関車の……\n鉄道車輌の製造開発をしていたのですね――」
1673 = "「......Dù vậy, cho đến tận 20 năm trước, các bạn vẫn tiến hành chế tạo và phát triển\nđầu máy mới...... các phương tiện đường sắt mới nhỉ——」"
# monologue
# JP: ……ハチロクの声には、隠しきれない悲しみが滲んでいる。\nいや、口惜しさ――あるいは、羨望と呼ぶべきものが。
1623 = "......Trong giọng nói của Hachiroku, thấm đượm một nỗi buồn không thể che giấu.\nKhông, phải gọi đó là sự tiếc nuối——hoặc là, sự ghen tị."
# monologue
# JP: 20年前まで、もしも帝鉄が新規車輌開発を続けていたら、\nいったいどんな列車が産まれていたのであろうか――
2994 = "Nếu như Đường sắt Hoàng gia vẫn tiếp tục phát triển phương tiện mới cho đến tận 20 năm trước,\nthì không biết những đoàn tàu như thế nào đã được sinh ra đây——"
# 【日々姫】
# display as 日日姬
# JP: 「そのこ、見れると？　私見たかと！\n今日のこの時間の北琴駅に、入線しとーと？」
2590 = "「Có thể xem mấy đứa bé đó không? Chị muốn xem!\nVào giờ này hôm nay, có tàu nào đang đỗ ở ga Beiqin không?」"
# monologue
# JP: 重くなりかけた空気を感じ、意図的にだろう、\n不意に日々姫が場違いなほど、明るく脳天気な声をだす。
3087 = "Cảm nhận được bầu không khí đang dần trở nên nặng nề, có lẽ là cố ý,\nHibiki bỗng cất giọng tươi sáng và vô tư đến mức lạc lõng."
# 【西瓜】
# display as 西瓜
# JP: 「あ…………ん！　はい。入線しています。\n東富4Dレイルロオドが、ちょうど出発準備をしています」
2213 = "「A............ ừm! Vâng. Có tàu đang đỗ ạ.\nRailord của Dongfu 4D đang chuẩn bị khởi hành.」"
# 【日々姫】
# display as 日日姬
# JP: 「それならわたし！　そのこのスケッチしたかと！\nそれともし、乗れるものなら乗ってみたかと！！」
2720 = "「Nếu vậy thì chị! Chị muốn phác họa lại đứa bé đó!\nHoặc nếu có thể lên tàu thì chị muốn đi thử một chuyến!!」"
# 【姜】
# display as 姜
# JP: 「今日すぐのご乗車はもろもろの手配の関係で困難です。\nが、出来るだけ早い列車のきっぷを手配しましょうか？」
2257 = "「Việc lên tàu ngay hôm nay thì hơi khó vì liên quan đến nhiều khâu sắp xếp.\nNhưng chúng tôi có thể sắp xếp vé cho chuyến tàu sớm nhất có thể, mọi người thấy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうしてもらえるならわたしは！　――って、\nもちろん、にぃにとハチロク次第だけど」
2145 = "「Nếu được như vậy thì em! ——À mà,\ntất nhiên là còn tùy thuộc vào anh hai và Hachiroku nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も乗りたいが、北琴で見るべきを逃したくもない。\n例えば……北琴に、鉄道歴史館的なものがあるなら」
2405 = "「Tôi cũng muốn đi thử, nhưng cũng không muốn bỏ lỡ những nơi đáng xem ở Beiqin.\nVí dụ như...... nếu ở Beiqin có một nơi kiểu như bảo tàng lịch sử đường sắt.」"
# 【西瓜】
# display as 西瓜
# JP: 「ものがあります。仲国鉄道歴史館という施設が、\n北琴の郊外に存在しています」
2481 = "「Có một nơi như vậy ạ. Có một cơ sở tên là Bảo tàng Lịch sử Đường sắt Zhongguo,\nnằm ở vùng ngoại ô Beiqin.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そこ！　そこももちろん見てみたかとよ。\n仲国の鉄道について、ザラっとでも勉強したかけん」
2237 = "「A, chỗ đó! Tất nhiên là em cũng muốn đi xem chỗ đó rồi.\nEm muốn học hỏi thêm về đường sắt của Zhongguo, dù chỉ là sơ qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、明日はそこと――他にも北琴周辺におすすめの\n鉄道スポットがあれば、あわせて見学させてください」
2724 = "「Vậy thì, ngày mai chúng ta sẽ đến đó——và nếu có địa điểm đường sắt nào\nđáng chú ý ở quanh Beiqin, xin hãy cho chúng tôi tham quan cùng luôn.」"
# 【姜】
# display as 姜
# JP: 「しかと承りました。西瓜。あとで打ち合わせましょう」
2309 = "「Tôi đã rõ. Suika. Lát nữa chúng ta sẽ bàn bạc nhé.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい、姜秘書！　西瓜はあとで打ち合わせます」
2302 = "「Vâng, thư ký Jiang! Lát nữa Suika sẽ bàn bạc cùng cô.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その後……あさっての朝から乗車――\nといったスケジュールでどうだろうか？」
2689 = "「Nếu vậy, sau đó...... chúng ta sẽ lên tàu từ sáng ngày mốt——\nMọi người thấy lịch trình như vậy thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「賛成！」
2646 = "「Tán thành!」"
# 【ハチロク】
# display as 八六
# JP: 「さすが双鉄さまです。\n理想的なスケジュウルではないかと、わたくしも」
2748 = "「Quả không hổ danh là Ngài Soutetsu.\nTôi cũng nghĩ đó là một lịch trình vô cùng lý tưởng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、ご無理なければそのように願いたいのですが」
2732 = "「Vậy thì, nếu không có gì bất tiện, tôi muốn nhờ cô sắp xếp như vậy.」"
# 【姜】
# display as 姜
# JP: 「承りました。どのような列車で、\nどのような目的地への乗車をご希望されますか？」
2305 = "「Tôi đã rõ. Mọi người muốn đi chuyến tàu như thế nào,\nvà muốn đến điểm đến nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2681 = "「Chuyện đó thì......」"
# monologue
# JP: ハチロク日々姫に視線を送れば、\n日々姫がはい！　と手をあげる。
2927 = "Khi tôi đưa mắt nhìn Hachiroku và Hibiki,\nHibiki liền giơ tay lên và nói \"Dạ!\"."
# 【日々姫】
# display as 日日姬
# JP: 「仲国の人が、北琴から何泊かの旅行にいく！\nみたいなとき、メジャーな旅先ってどこですか？」
2687 = "「Khi người Zhongguo đi du lịch vài ngày từ Beiqin!\nNhững lúc như thế, điểm đến phổ biến nhất là ở đâu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。帝都発で例えるのなら、\n北開道、京塗、九洲といった感じの、大定番の旅先か」
2483 = "「Ra là vậy. Nếu lấy việc xuất phát từ Đế đô làm ví dụ,\nthì sẽ là những điểm đến cực kỳ quen thuộc như Hokukaido, Kyonuri, hay Kyushuu nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「そうですね――[せいあん,1]栖安、[せいねい,1]栖寧、[せいと,1]聖都、[こんめい,1]坤明、[あもい,1]厦問。[なんきん,1]南琴。\n[そしゅう,1]蘇洲。[こうしゅう,1]広洲。[ハルビン,2]哈爾瓶。もちろん[シャンハイ,1]上杯、[ホンコン,1]紅港等も人気です」
2634 = "「Để xem nào——Tây An, Tây Ninh, Thánh Đô, Khôn Minh, Hạ Môn. Nam Cầm.\nTô Châu. Quảng Châu. Cáp Nhĩ Tân. Tất nhiên Thượng Hải, Hồng Cảng, v.v... cũng rất được yêu thích.」"
# 【ハチロク】
# display as 八六
# JP: 「……ああ、さすが仲国は広大なのですね。\n候補だけでも多すぎて、わたくし、目がまわりそうです」
1678 = "「......Oa, Zhongguo quả thực rộng lớn quá nhỉ.\nChỉ nghe danh sách ứng cử viên thôi mà tôi đã thấy chóng mặt rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば別方面から考えてみよう。ハチロクは、\n仲国で乗りたい列車や、見たい列車などはあるか？」
2715 = "「Vậy thì hãy thử suy nghĩ từ một khía cạnh khác xem sao. Hachiroku,\ncô có chuyến tàu nào muốn đi, hay muốn xem ở Zhongguo không?」"
# monologue
# JP: 問えば、ハチロクはわずかにはにかむ。
3189 = "Khi tôi hỏi, Hachiroku khẽ mỉm cười bẽn lẽn."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――もしも仲国で蒸気機関車が現役ならば、\nそのこにあってみたいです」
2401 = "「Tôi——nếu ở Zhongguo vẫn còn đầu máy hơi nước đang hoạt động,\nthì tôi muốn đi xem đứa bé đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nでは、『乗ってみたい』の方では、どうだ？」
2471 = "「Ra là vậy.\nVậy còn về phía 『muốn đi thử』 thì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「……贅沢を申して大丈夫でしたら――その……\nわたくし、双鉄さまと――日々姫と。寝台列車の旅を」
1679 = "「......Nếu được phép yêu cầu xa xỉ thì——ừm......\nTôi muốn cùng Ngài Soutetsu——và Hibiki. Đi du lịch bằng tàu khách giường nằm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいいな。昼行・夜行。\n両方の景色をやはり、僕も視察してみたいと思う」
2193 = "「A, ý kiến hay đấy. Chạy ban ngày và chạy ban đêm.\nTôi cũng muốn khảo sát cảnh sắc của cả hai.」"
# 【日々姫】
# display as 日日姬
# JP: 「したら……朝に出て次の日に到着するような寝台列車で、\nいった先で蒸気機関車を見学できる、メジャーな旅行先」
2705 = "「Nếu vậy thì...... một điểm đến du lịch phổ biến, nơi chúng ta có thể đi bằng tàu khách giường nằm\nxuất phát vào buổi sáng và đến nơi vào ngày hôm sau, và có thể tham quan đầu máy hơi nước ở đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうのが、\n今の時点での大まかな希望となるのですが……」
2251 = "「Đó là\nnhững nguyện vọng khái quát của chúng tôi tính đến thời điểm hiện tại......」"
# monologue
# JP: 姜さんを見れば、姜さんはすぐに西瓜に目を振る。\n西瓜はしばし考え込んで――
3082 = "Khi tôi nhìn cô Jiang, cô ấy lập tức hướng ánh mắt sang Suika.\nSuika suy nghĩ một lát rồi——"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜の専門は仲国国鉄の線路がつながっている範囲です。\nその地域外のことは要悉究。少し調べる必要があります」
2611 = "「Chuyên môn của Suika là trong phạm vi các tuyến đường sắt quốc gia Zhongguo được kết nối.\nNhững khu vực ngoài đó thì cần phải tất cứu. Cần phải điều tra một chút ạ.」"
# 【姜】
# display as 姜
# JP: 「今晩中になら？」
2054 = "「Trong tối nay có được không?」"
# 【西瓜】
# display as 西瓜
# JP: 「一晩の時間があれば、西瓜は複数の候補地を出せます。\n共感ネットワークの他にも――」
2479 = "「Nếu có thời gian một đêm, Suika có thể đưa ra nhiều địa điểm ứng cử viên.\nNgoài mạng lưới cộng cảm ra thì——」"
# monologue
# JP: 西瓜がふっと視線を動かす。
3222 = "Suika khẽ chuyển ánh nhìn."
# monologue
# JP: きっぷ売り場の壁の向こうの……\nおそらくは、駅本屋の方へと向けて。
3280 = "Phía bên kia bức tường của khu vực bán vé......\nCó lẽ là hướng về phía tòa nhà chính của ga."
# 【西瓜】
# display as 西瓜
# JP: 「今日はタイミング良く、西瓜には頼れるツテがあります。\nですから高確率で、任務を遂行できると西瓜は思います」
2043 = "「Hôm nay thời điểm rất thích hợp, Suika có những mối quan hệ đáng tin cậy.\nThế nên Suika nghĩ mình có thể hoàn thành nhiệm vụ với xác suất rất cao.」"
# 【姜】
# display as 姜
# JP: 「では、そのように――っと」
2712 = "「Vậy thì, cứ quyết định như thế nhé——」"
# monologue
# JP: 姜さんが腕時計へと目を向ける。ずいぶんと薄い……\nあれは、スマートウォッチという物であろうか。
3011 = "Cô Jiang đưa mắt nhìn đồng hồ đeo tay. Nó khá mỏng......\nĐó có phải là thứ gọi là đồng hồ thông minh không nhỉ."
# 【姜】
# display as 姜
# JP: 「もうすぐ改札時間です。列車を観察するのでしたら、\n早く向かった方がいいでしょう」
2334 = "「Sắp đến giờ soát vé rồi. Nếu mọi người muốn quan sát tàu,\nthì tốt nhất là nên đi nhanh lên.」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁい！」
2282 = "「Vâng ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだ。いいか？　ハチロク」
2346 = "「Nghe vậy đó. Đi thôi chứ, Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしも――\nとても楽しみでございます！」
2291 = "「Vâng. Tôi cũng——\nđang rất mong đợi đây ạ!」"
# 【日々姫】
# display as 日日姬
# JP: 「……わ――ホームも綺麗！\nまっこと、全部が都会的」
1676 = "「......Oa——sân ga cũng đẹp quá!\nThật sự, mọi thứ đều mang đậm chất thành thị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。これは……実に見事だ」
2532 = "「Đúng vậy. Chỗ này...... thật sự rất ấn tượng.」"
# monologue
# JP: たとえ機関車の新規開発が長期に渡り止まっていようと、\n仲国には、日ノ本における大廃線はなかったと――
2920 = "Cho dù việc phát triển đầu máy mới đã bị đình trệ trong một thời gian dài,\nnhưng ở Zhongguo, không hề có cuộc đại bãi bỏ các tuyến đường sắt như ở Hinomoto——"
# monologue
# JP: あるいは“未だ発生していない”のだと――\nそう考える他にない……これはまさしく、新築駅だ。
2885 = "Hoặc là \"vẫn chưa xảy ra\"——\nKhông thể nghĩ khác được...... Đây chắc chắn là một nhà ga mới được xây dựng."
# 【ハチロク】
# display as 八六
# JP: 「真新しい……そのような印象さえ受けますが」
2563 = "「Mới toanh...... tôi thậm chí còn có ấn tượng như vậy.」"
# 【西瓜】
# display as 西瓜
# JP: 「真新しい。の範囲内だと西瓜も思います。最新の\n改築工事は2004年。日ノ本暦だと、正和59年のことです」
2617 = "「Suika cũng nghĩ nó nằm trong phạm vi mới toanh.\nCông trình cải tạo mới nhất là vào năm 2004. Theo lịch Hinomoto là năm Chính Hà 59.」"
# 【日々姫】
# display as 日日姬
# JP: 「正和59年！　って！！！！」
2492 = "「Năm Chính Hà 59! Trời ơi!!!!」"
# 【ハチロク】
# display as 八六
# JP: 「御一夜鉄道史で申しますと……\nナインスターズが初走行を果たす、その二年前ですね」
2262 = "「Nếu nói theo lịch sử Đường sắt Ohito thì......\nĐó là hai năm trước khi Nine Stars có chuyến chạy đầu tiên nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまりは、わずか４年ほど前の改築終了か……\nなんと羨ましいことだ」
2035 = "「Tức là, việc cải tạo chỉ mới kết thúc khoảng 4 năm trước sao......\nThật đáng ghen tị.」"
# 【ハチロク】
# display as 八六
# JP: 「客車も新造、ないしは更新をなされているのですね？\nなんとかわいらしいこでしょうか」
2327 = "「Các toa hành khách cũng được đóng mới, hoặc là đã được tân trang lại đúng không ạ?\nNhững đứa trẻ này đáng yêu quá đi mất.」"
# monologue
# JP: そうっと優しく撫でるようなハチロクの目線の先には、\nずらりと連結されている濃緑に塗装されている客車たち。
2932 = "Phía trước ánh mắt dịu dàng như đang âu yếm của Hachiroku,\nlà những toa hành khách được sơn màu xanh lá cây đậm nối liền nhau thành một hàng dài."
# monologue
# JP: 黄色のラインの簡素な飾りが、\n僕などの目にも極めて愛らしく映る。
3273 = "Những đường viền trang trí đơn giản màu vàng,\ncũng lọt vào mắt tôi một cách vô cùng đáng yêu."
# 【日々姫】
# display as 日日姬
# JP: 「うん。シンプルで素敵なデザイン」
2242 = "「Ừm. Thiết kế đơn giản mà tuyệt đẹp.」"
# 【西瓜】
# display as 西瓜
# JP: 「素敵なデザインと褒めてもらって西瓜は嬉しいです！\n[ｌｕ－ｂｉ－ｃｈｅ,2]緑比車――[りょくひしゃ,2]緑比車は、仲国の鉄道の象徴です！」
2582 = "「Được khen là thiết kế tuyệt đẹp, Suika vui lắm!\nLü-pi-che——Lục Bỉ Xa là biểu tượng của đường sắt Zhongguo đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「りょくひしゃ」
2573 = "「Lục Bỉ Xa.」"
# 【西瓜】
# display as 西瓜
# JP: 「緑色をしていて、あなたの[ならび]比。\n仲間、おとなりにある客車というほどの意味合いです」
2648 = "「Nó có màu xanh lá cây (Lục), và kề vai sát cánh (Bỉ) cùng bạn.\nNó mang ý nghĩa là những toa hành khách ở bên cạnh, như những người bạn.」"
# 【日々姫】
# display as 日日姬
# JP: 「お名前も素敵とね～！　日ノ本にも、こぎゃん客車――\nイメージば統一された客車群があるとよかとね～」
2684 = "「Cái tên cũng tuyệt quá ha~!\nGiá mà ở Hinomoto cũng có những toa hành khách như thế này——những đoàn tàu có hình ảnh đồng nhất thì tốt biết mấy~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。日ノ本であれば、やはり赤白か？」
2247 = "「Hừm. Nếu là Hinomoto, thì vẫn nên là màu đỏ trắng sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「悪くなかけど……ちょっと長旅には落ち着かなさそう？\n青一色とか――そんな感じ？」
2087 = "「Cũng không tệ nhưng...... đi đường dài thì có vẻ không được thư giãn cho lắm nhỉ?\nMột màu xanh dương thì sao——kiểu như vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。青もまた、日ノ本の印象に似合う色だな」
2556 = "「Ra là vậy. Màu xanh dương cũng là màu phù hợp với ấn tượng về Hinomoto.」"
# 【西瓜】
# display as 西瓜
# JP: 「仲国は、この緑。車輌更新があってもずっと変わらない、\nまさしく、仲国国鉄の伝統色です！」
2073 = "「Zhongguo chính là màu xanh lá này. Dù có đổi mới toa xe thì vẫn luôn không đổi,\nquả thực, đây chính là màu sắc truyền thống của Đường sắt Quốc gia Zhongguo!」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。私もそぎゃん感じる。詳しくなかけど――\n人民服とかも、こぎゃん色よね？」
2249 = "「Ừm. Em cũng cảm thấy vậy. Dù không rành lắm nhưng——\nnhững bộ trang phục nhân dân trước đây cũng có màu này phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。なるほど。まさしく極めて身近な。\n旅の仲間であり、旅の隣にある客車なのだな」
2215 = "「A...... ừm. Ra là vậy. Quả thực là vô cùng gần gũi.\nLà những người bạn đồng hành, là những toa hành khách luôn kề vai sát cánh trên mọi chuyến đi nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「そうです。旅の隣にある客車です。\nもっとも今は人民服は、あまり着る人もいませんけれど」
2467 = "「Đúng vậy ạ. Là những toa hành khách kề vai sát cánh trên mọi chuyến đi.\nMặc dù bây giờ không còn nhiều người mặc trang phục nhân dân nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、確かに！」
2209 = "「A, đúng là vậy thật!」"
# monologue
# JP: ホームから客車……緑比車へ、次々乗客が乗り込んでいく。\nその服装は、僕らとほとんど変わりない。
3173 = "Từ sân ga, từng tốp hành khách lần lượt lên toa hành khách...... lên Lục Bỉ Xa.\nTrang phục của họ cũng gần như chẳng khác gì chúng tôi."
# monologue
# JP: 日々姫はそこもすばやくスケッチし、\nそしてなんともじれったそうに背伸びし視界を少し広げる。
3136 = "Hibiki cũng nhanh chóng phác họa lại cảnh tượng đó,\nrồi nhón chân lên với vẻ sốt ruột để mở rộng tầm nhìn thêm một chút."
# 【日々姫】
# display as 日日姬
# JP: 「今日の乗車は困難……ってことは、\nこのこにわたしたちが乗るって、できないんですか？」
2044 = "「Hôm nay khó mà lên tàu được...... nghĩa là,\nchúng ta không thể lên chuyến tàu này sao?」"
# 【姜】
# display as 姜
# JP: 「入って、中のスケッチをする程度でしたら大丈夫かと。\nですが、そのまま乗車すると、戻るのが困難になります」
2019 = "「Nếu chỉ vào trong phác họa một chút thì chắc không sao.\nNhưng nếu cứ thế mà lên tàu đi luôn thì việc quay lại sẽ rất khó khăn đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなら！　私、ちょこーっとだけ中身見てくる！」
2690 = "「Nếu vậy thì! Em sẽ vào trong xem một chút xíu thôi!」"
# 【姜】
# display as 姜
# JP: 「西瓜！　ご案内を！！」
2621 = "「Suika! Dẫn đường đi!!」"
# 【西瓜】
# display as 西瓜
# JP: 「はい、姜秘書！　西瓜は右田女士のご案内をします」
2301 = "「Vâng, thư ký Jiang! Suika sẽ dẫn đường cho cô Migita.」"
# 【ハチロク】
# display as 八六
# JP: 「あ、わたくしも参ります！！」
2236 = "「A, tôi cũng đi cùng nữa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2139 = "「Hừm.」"
# monologue
# JP: ついていこうか悩む間もなく、\n西瓜と共に日々姫ハチロクは緑比車の中へ飛び込んでいく。
3084 = "Chưa kịp phân vân xem có nên đi theo hay không,\nnhưng Hibiki và Hachiroku đã cùng Suika lao vọt vào trong Lục Bỉ Xa."
# monologue
# JP: しかし、今無理に視察せずとも――
2971 = "Nhưng mà, dù hôm nay không miễn cưỡng vào trong khảo sát thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば寝台列車にも、普通客車は編成されますよね？」
2348 = "「Ví dụ như trên tàu khách giường nằm, cũng có nối thêm toa hành khách thông thường đúng không?」"
# 【姜】
# display as 姜
# JP: 「ご明察です。右田先生。\nそのときにゆっくり、硬座車の様子も確認いただけます」
2154 = "「Anh quả là tinh ý, thầy Migita.\nĐến lúc đó, mọi người có thể thong thả kiểm tra tình trạng của toa ghế cứng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうざしゃ」
2550 = "「Toa ghế cứng.」"
# 【姜】
# display as 姜
# JP: 「硬い座席の車輌、と書きます。その他に軟臥車、硬臥車、食堂車が編成されるのが、長距離列車では一般的です」
2339 = "「Được viết là toa xe có chỗ ngồi cứng. Ngoài ra, trên các chuyến tàu đường dài,\nviệc nối thêm toa giường mềm, toa giường cứng và toa ăn là điều rất phổ biến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――なんが、こうがの『が』は『[ふしど]臥』ですか？\n柔らかな寝台と、硬い寝台？」
2210 = "「A——Chữ 『Giường』 trong giường mềm, giường cứng là 『Giường ngủ』 sao?\nGiường ngủ mềm và giường ngủ cứng à?」"
# 【姜】
# display as 姜
# JP: 「ご明察です、右田先生。もっとも、一番大きな違いは、\n個室型であるか、開放型であるかとなりますかと」
2393 = "「Anh quả là tinh ý, thầy Migita. Tuy nhiên, điểm khác biệt lớn nhất,\ncó lẽ là nó thuộc kiểu phòng riêng hay kiểu mở.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2130 = "「原來如此」" 
# monologue
# JP: 自覚しきれぬ海外渡航の疲労もあろうし、\n座席で夜行は避けたいところだ。
3276 = "Dù chưa nhận thức rõ nhưng chắc hẳn cũng có chút mệt mỏi từ chuyến bay ra nước ngoài,\nnên tôi muốn tránh việc phải ngồi ghế suốt đêm."
# monologue
# JP: 平常ならば、個室型の軟臥車という選択になろうが……\n視察という点を考えるなら、開放型が好ましかろうか？
3196 = "Nếu là bình thường, chắc chắn tôi sẽ chọn toa giường mềm kiểu phòng riêng......\nNhưng xét trên khía cạnh khảo sát, thì kiểu mở có vẻ sẽ thích hợp hơn chăng?"
# 【双鉄】
# display as 雙鐵
# JP: 「それぞれの、\nより詳しい特徴を教えていただけますか？」
2147 = "「Cô có thể cho tôi biết\nđặc điểm chi tiết hơn của từng loại được không?」"
# 【姜】
# display as 姜
# JP: 「軟臥車は、一区画がそれぞれ二人用個室となります。\n二段ベッドと、その向かいの二人がけのソファです」
2654 = "「Toa giường mềm, mỗi khoang sẽ là một phòng riêng dành cho hai người.\nBao gồm một giường tầng, và một chiếc ghế sofa dành cho hai người ở phía đối diện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは凄い。豪勢ですね」
2138 = "「Tuyệt thật đấy. Thật là xa hoa.」"
# 【姜】
# display as 姜
# JP: 「一方、硬臥車は一区画の両面が、\nそれぞれ三段寝台となりまして」
2581 = "「Mặt khác, toa giường cứng thì mỗi khoang sẽ có hai bên,\nmỗi bên là một giường ba tầng.」"
# 【ハチロク】
# display as 八六
# JP: 「三段寝台！！！\nまぁまぁまぁ、なんと懐かしい響きでしょう！」
2015 = "「Giường ba tầng!!!\nÔi chao ôi, nghe mới hoài niệm làm sao!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、戻ったのか」
2194 = "「Ồ, mọi người quay lại rồi à.」"
# monologue
# JP: 声のテンションも高くあったが、\nなにより瞳がキラキラしている。これは――
3038 = "Giọng nói nghe rất phấn khích,\nnhưng trên hết là đôi mắt đang sáng lấp lánh kia. Đây là——"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しい視察だったようだな」
2018 = "「Có vẻ như mọi người đã có một chuyến khảo sát rất vui vẻ nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　雑然と賑わっておりました。お声掛けして\n人をかき分けないと、通路も通りづらいほどの様子で」
2464 = "「Vâng! Bên trong rất lộn xộn và náo nhiệt. Nếu không cất tiếng gọi\nvà rẽ đám đông ra thì ngay cả lối đi cũng khó mà đi lọt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2187 = "「哦」" 
# monologue
# JP: それは素晴らしい活況だ。
3263 = "Quả là một sự nhộn nhịp tuyệt vời."
# monologue
# JP: 完全指定制のナインスターズ等観光列車では見られんし、\n御一夜鉄道の全普通列車でお目にかかれることも無い。
3264 = "Cảnh tượng này không thể thấy trên các chuyến tàu du lịch chỉ định chỗ ngồi hoàn toàn như Nine Stars,\nvà cũng chưa từng thấy trên toàn bộ các chuyến tàu thông thường của Đường sắt Ohito."
# 【ハチロク】
# display as 八六
# JP: 「旅へと向かう熱気ではなく、日常の、普段のことの。\n少し飽いたような気怠い、けれども高まりも混じる空気」
2416 = "「Không phải là sự cuồng nhiệt khi hướng đến một chuyến đi, mà là của những điều thường nhật, bình dị.\nMột bầu không khí có chút uể oải, chán chường, nhưng lại đan xen cả sự phấn khích.」"
# monologue
# JP: 常にはあらぬ饒舌に驚かされる。\nハチロクはうっとりと――まるで歌っているかのようだ。
2892 = "Tôi khá bất ngờ trước sự hoạt ngôn khác hẳn ngày thường này.\nHachiroku đang say sưa——cứ như thể em ấy đang hát vậy."
# 【ハチロク】
# display as 八六
# JP: 「駅弁の匂いに、お酒の匂い。赤ちゃんの泣き声、笑い声。\n異国の言葉の、なのに懐かしい賑わい、ざわめき――」
2738 = "「Mùi cơm hộp nhà ga, mùi rượu. Tiếng trẻ con khóc, tiếng cười đùa.\nLà ngôn ngữ ngoại quốc, vậy mà sự náo nhiệt, ồn ào ấy lại thân thuộc đến lạ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2458 = "「Ừm......」"
# 【ハチロク】
# display as 八六
# JP: 「あのこ――西瓜は耳がよろしいのですね。\n共感で、わたくしが聞くより多くが伝わってくるのです」
2711 = "「Đứa bé đó——Suika có đôi tai thính thật đấy.\nNhờ cộng cảm mà tôi nghe được nhiều điều hơn cả những gì mình tự nghe thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「多くの……音がか？」
2288 = "「Nhiều...... âm thanh sao?」"
# 【ハチロク】
# display as 八六
# JP: 「客車の床鳴り。連結部分の歩み板が立てる小さな軋み。\n牽引の機関車の発電機の音と、モオタアの音」
2593 = "「Tiếng sàn toa xe kêu cọt kẹt. Tiếng cọt kẹt nho nhỏ từ bệ bước chân ở phần nối các toa.\nTiếng máy phát điện của đầu máy kéo, và cả tiếng mô-tơ nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「モーター？　ああ。ならば東富4という機関車は――」
2755 = "「Mô-tơ? A. Vậy thì đầu máy có tên là Dongfu 4 đó——」"
# 【ハチロク】
# display as 八六
# JP: 「ディーゼルエンジンで発電機を駆動。発生させた電力で、\nモオタアを回して走る、電気式\\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;ですね」
2474 = "「Dùng động cơ diesel để chạy máy phát điện. Rồi dùng điện năng tạo ra\nđể làm quay mô-tơ và chạy, đó là loại \\x%lディーゼル機関車;#00ffc040;đầu máy diesel%l;#; truyền động điện nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと……そのような形式の機関車が、\n何十年も前から実用化されていたのか」
2548 = "「Không ngờ...... loại đầu máy với hình thức như vậy,\nđã được đưa vào sử dụng thực tế từ hàng chục năm trước rồi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「日ノ本と、帝鉄とは――まったく別の選択をして。\nまったく別の鉄路が――仲国では伸び、生きたのですね」
2175 = "「Hinomoto và Đường sắt Hoàng gia——đã đưa ra những lựa chọn hoàn toàn khác biệt.\nMột tuyến đường sắt hoàn toàn khác——đã vươn dài và tồn tại ở Zhongguo nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 2458 = "「是啊……」" 
# monologue
# JP: そうか、ハチロクは重ねて――思い出しているのか。
2937 = "Ra là vậy, Hachiroku đang liên tưởng——đang nhớ lại sao."
# 【ハチロク】
# display as 八六
# JP: 「けれど同じく感じもします。かつて華やかなりし頃の\n――皆様の暮らしの一部であった、今は懐かしき帝鉄を」
2076 = "「Nhưng tôi cũng cảm thấy có nét tương đồng. Giống như Đường sắt Hoàng gia đầy hoài niệm hiện tại,\n——vốn từng là một phần trong cuộc sống của mọi người vào thời kỳ hoàng kim trước đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……お前が愛し、お前が生きた鉄道か」
1664 = "「......Là thời đại đường sắt mà em đã yêu, đã sống sao.」"
# 【ハチロク】
# display as 八六
# JP: 「あら？　双鉄様？　わたくしは、今もいきいき生きて、鉄道を愛しておりますよ？」
2184 = "「Ơ kìa? Ngài Soutetsu? Tôi hiện tại vẫn đang sống rất vui vẻ, và vẫn luôn yêu đường sắt mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん！　そうだな」
2206 = "「A——Ừm! Đúng vậy nhỉ.」"
# monologue
# JP: 花の咲くような笑顔を浮かべ、\nくるん、とハチロクがまわってみせる。
2942 = "Nở một nụ cười rạng rỡ như hoa nở,\nHachiroku xoay một vòng cho tôi xem."
# monologue
# JP: 瞬間、胸のモヤが晴れ――自分自身が、今一瞬、\n『旧帝鉄』に、嫉妬していたのかと気付かされる。
3185 = "Trong khoảnh khắc, đám mây mù trong ngực tôi tan biến——Tôi nhận ra rằng, trong giây lát vừa rồi,\nchính bản thân mình đã ghen tị với 『Đường sắt Hoàng gia cũ』."
# 【双鉄】
# display as 雙鐵
# JP: 「……目指さねばならんな。僕らの御一夜鉄道も。\nより深く、より広く、人々の暮らしと共にあることを」
1685 = "「......Chúng ta cũng phải hướng tới điều đó thôi. Cả Đường sắt Ohito của chúng ta nữa.\nPhải đồng hành cùng cuộc sống của mọi người một cách sâu sắc hơn, rộng lớn hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「もうすでに。正しく目指しておられますし、そのように\n進まれておられますよ？　わたくし、保証いたします」
2413 = "「Chúng ta đã và đang hướng tới điều đó rồi. Và cũng đang tiến bước\ntheo đúng hướng đó mà? Tôi xin đảm bảo đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。なんともこころづよい」
2692 = "「Vậy sao. Thật sự rất vững tâm.」"
# monologue
# JP: 来てよかったと、まだ到着して数時間でも、つくづく思う。\n異国の鉄道に触れることは、自国の鉄道を知ることだ。
3275 = "Dù mới đến được vài giờ, nhưng tôi thực sự cảm thấy việc đến đây là vô cùng xứng đáng.\nTiếp xúc với đường sắt nước bạn, cũng chính là cách để hiểu rõ hơn về đường sắt nước mình."
# monologue
# JP: 仲国版のナインスターズ計画の草案を立案できたなら、\nその経験は、必ず御一夜鉄道に……も……？
2996 = "Nếu có thể lập ra được bản thảo cho kế hoạch Nine Stars phiên bản Zhongguo,\nthì kinh nghiệm đó nhất định cũng sẽ...... mang lại lợi ích cho Đường sắt Ohito......?"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は――\n日々姫と西瓜はどうしたのだ？」
2447 = "「Hibiki đâu rồi——\nHibiki và Suika đâu rồi?」"
# 【ハチロク】
# display as 八六
# JP: 「車内の様子をひととおり描きましたのち、\n機関車もスケッチしたいと申しまして、西瓜と一緒に」
2449 = "「Sau khi phác họa xong một vòng cảnh tượng bên trong xe,\nHibiki nói là muốn phác họa cả đầu máy nữa, nên đã đi cùng Suika rồi ạ.」"
# 【姜】
# display as 姜
# JP: 「機関車をスケッチ！？　それは良くない」
2571 = "「Phác họa đầu máy!? Thế thì không ổn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
2228 = "「A!」"
# monologue
# JP: きっぷ売り場で受けた警告を思い出す。\n“駅施設は、仲国では保安の対象”であるのなら――
3074 = "Tôi chợt nhớ lại lời cảnh báo đã nhận được ở khu vực bán vé.\nNếu \"cơ sở nhà ga là đối tượng được bảo vệ an ninh ở Zhongguo\" thì——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃにっ！！！」
2743 = "「Anh hai! Anh hai!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！！」
2451 = "「Hibiki!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、助けてっ」
2745 = "「Anh hai, cứu em với!」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！」
2450 = "「Hibiki!」"
# monologue
# JP: 日々姫がスケッチブックを奪われまいと抵抗している。\n相手は制服姿の壮年男性――
3132 = "Hibiki đang cố gắng chống cự để không bị giật mất cuốn sổ phác thảo.\nĐối phương là một người đàn ông tráng niên mặc đồng phục——"
# 【姜】
# display as 姜
# JP: 「待って！　ここは任せてください」
2560 = "「Đợi đã! Chỗ này cứ giao cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2228 = "「啊！」" 
# monologue
# JP: 割って入ろうとした寸前に、姜さんの声に制される。
3028 = "Ngay khoảnh khắc tôi định chen vào, giọng nói của cô Jiang đã cản tôi lại."
# 【姜】
# display as 姜
# JP: 「必ずすぐにお手元に戻します。\nひとまず彼に、スケッチブックをお渡しください」
2410 = "「Tôi nhất định sẽ trả lại tận tay cho em ngay.\nTạm thời em cứ đưa cuốn sổ phác thảo cho anh ấy đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ…………んっ――」
2212 = "「A............ưm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。ここは異国だ。\n僕らはしきたりを理解していない。今は姜さんに任せて」
2453 = "「Hibiki. Đây là nước ngoài.\nChúng ta không hiểu rõ phong tục ở đây. Bây giờ cứ giao cho cô Jiang đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかったと。にぃに」
2418 = "「Em hiểu rồi. Anh hai.」"
# monologue
# JP: 日々姫が、スケッチブックから手を離す。\n見ている僕の心さえ、ズキリと痛む光景だ。
3141 = "Hibiki buông tay khỏi cuốn sổ phác thảo.\nCảnh tượng đó khiến ngay cả người đứng nhìn như tôi cũng cảm thấy nhói đau trong tim."
# 【西瓜】
# display as 西瓜
# JP: 「姜秘書にまかせておけば、大丈夫です。右田女士」
2038 = "「Cứ giao cho thư ký Jiang là không sao đâu. Cô Migita.」"
# monologue
# JP: スケッチブックを失って、わななく日々姫の手を引いて。\n西瓜は日々姫を僕らのもとへと――
3219 = "Suika nắm lấy bàn tay đang run rẩy của Hibiki sau khi bị mất cuốn sổ phác thảo.\nRồi dẫn Hibiki về phía chúng tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。日々姫。怖かったな。大丈夫だ」
2505 = "「Không sao đâu. Hibiki. Em sợ lắm đúng không. Không sao đâu.」"
# monologue
# JP: それを待たずに、\n日々姫の元へと駆け寄り優しく抱きしめる。
3072 = "Không đợi họ đi tới,\ntôi đã lao đến ôm chầm lấy Hibiki một cách dịu dàng."
# monologue
# JP: 日々姫はかなり震えている。\nガチガチガチと、歯がぶつかっている音が聞こえる。
3140 = "Hibiki đang run rẩy dữ dội.\nTôi có thể nghe thấy tiếng hai hàm răng em ấy va vào nhau lập cập."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。びっくりしたな。怖かった。\nだが、もう大丈夫だ。なんの心配もない」
2504 = "「Không sao đâu. Em giật mình lắm nhỉ. Chắc em sợ lắm.\nNhưng mà, giờ thì không sao rồi. Không có gì phải lo lắng nữa đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「ごめ……なさ――にぃに。\n私、夢中に、なって――それで――」
2330 = "「Em xin...... lỗi——anh hai.\nEm mải mê quá——nên mới——」"
# 【双鉄】
# display as 雙鐵
# JP: 「見て描くことを、日々姫は求められているんだ。\nそれを果たしていただけだ。日々姫は何も悪くない」
2083 = "「Nhiệm vụ của em là quan sát và vẽ lại mà.\nEm chỉ đang hoàn thành nhiệm vụ đó thôi. Hibiki không làm gì sai cả.」"
# 【西瓜】
# display as 西瓜
# JP: 「右田女士はなにも悪いことをしていないです。\n準備、調整不足は西瓜の失点です」
2159 = "「Cô Migita không làm gì sai cả.\nViệc chuẩn bị và sắp xếp thiếu sót là lỗi của Suika.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、当日いきなりの駅をみたいと要望したのは、\n僕らの方だ。調整不足にならない方がおかしい」
2031 = "「Không, việc đột ngột yêu cầu muốn xem nhà ga ngay trong ngày,\nlà do phía chúng tôi. Việc chuẩn bị thiếu sót là điều đương nhiên.」"
# monologue
# JP: この行程の、この面子での責任者は、間違いなく僕だ。
3157 = "Người chịu trách nhiệm cho hành trình này, với những thành viên này, chắc chắn là tôi."
# monologue
# JP: 忙しさにかまけ、『ゼロ知識で来てほしい』という要望を\n真に受けすぎず――
2899 = "Bị cuốn vào sự bận rộn, tôi đã quá coi trọng yêu cầu \"mong mọi người đến với kiến thức bằng không\"——"
# 【双鉄】
# display as 雙鐵
# JP: 「少なくとも禁忌にあたること、安全に関わることは、\n勉強して、渡航をしなければならなかったし――」
2485 = "「Ít nhất thì đối với những điều cấm kỵ, những vấn đề liên quan đến an toàn,\ntôi đáng lẽ phải tìm hiểu kỹ trước khi xuất ngoại mới phải——」"
# monologue
# JP: それに、姜さんの警告と日々姫の性格とをより注意深く\n考慮し繋げられていたなら、この展開も予想し得た。
3146 = "Hơn nữa, nếu tôi chú ý và xem xét cẩn thận hơn lời cảnh báo của cô Jiang cùng tính cách của Hibiki,\nthì hoàn toàn có thể dự đoán được tình huống này."
# monologue
# JP: つまり今回の事態を引き起こしてしまった原因は、\n単純な、僕個人の準備と注意力不足に他ならない。
3096 = "Nói cách khác, nguyên nhân dẫn đến tình trạng này,\nkhông gì khác ngoài sự thiếu chuẩn bị và thiếu chú ý của cá nhân tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「[シーチォゥ,1]悉究……といったか？\nそれが完全に不足していた」
2078 = "「Cô gọi đó là \\x%lシーチォゥ;#00ffc040;Tất cứu%l;#;...... đúng không?\nTôi đã hoàn toàn thiếu sót điều đó.」"
# 【西瓜】
# display as 西瓜
# JP: 「あっ」
2225 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「済まなかった。西瓜にも、姜さんにも――\n当然の職務を果たしているであろう彼にも、迷惑を」
2754 = "「Thật xin lỗi. Đã gây rắc rối cho Suika, cho cô Jiang——\nvà cả người đàn ông chắc hẳn chỉ đang làm đúng chức trách của mình kia nữa.」"
# 【西瓜】
# display as 西瓜
# JP: 「迷惑なことはありません。これはただの行き違いですし、\nここからの悉究で、改善に繋げられると西瓜は思います」
2196 = "「Không có rắc rối gì đâu ạ. Đây chỉ là một sự hiểu lầm thôi,\nvà Suika nghĩ rằng, qua sự tất cứu từ việc này, chúng ta có thể dẫn đến những cải thiện tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、あればよいのだが――」
2311 = "「Nếu được như vậy thì tốt quá——」"
# monologue
# JP: しかし、単なる行き違いにしては……
2878 = "Nhưng mà, nếu chỉ là một sự hiểu lầm đơn thuần thì......"
# 【ハチロク】
# display as 八六
# JP: 「ずいぶんと……お話がこじれている様子ですね」
2678 = "「Có vẻ như...... cuộc nói chuyện đang trở nên khá rắc rối nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
2204 = "「Hau...」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、大丈夫だ日々姫。時間をかけているのは恐らく、\nより穏便に、事態をすませるためであるかと思う」
2427 = "「Không sao đâu Hibiki. Việc tốn nhiều thời gian có lẽ là để\ngiải quyết sự việc một cách êm đẹp hơn thôi.」"
# monologue
# JP: ……姜さん自身が、かなり高い地位にあるはずだし、\n彼女が仕える主の身分を出せば一発で問題解決しよう。
1632 = "......Bản thân cô Jiang chắc hẳn có địa vị khá cao,\nnếu cô ấy đưa ra danh phận của người chủ mà mình phục vụ thì vấn đề có lẽ sẽ được giải quyết ngay lập tức."
# monologue
# JP: が、そうなっていない……そうしない理由はおそらく、\n身分を明かすことを禁じられているのか、あるいは――
2911 = "Nhưng mọi chuyện lại không diễn ra như vậy...... Lý do cô ấy không làm thế có lẽ là,\nbị cấm tiết lộ danh phận, hoặc là——"
# 【志寰】
# display as 志寰
# JP: 「[ｘｉｇｕａ,1]西瓜？　[ｘｉｇｕａ,1]西瓜！！！」
2623 = "「\\x%lｘｉｇｕａ;#00ffc040;Suika%l;#;? \\x%lｘｉｇｕａ;#00ffc040;Suika%l;#;!!!」"
# 【西瓜】
# display as 西瓜
# JP: 「っ！！　[ｚｈｉｈｕａｎ,1]志寰！！！」
2231 = "「!! \\x%lｚｈｉｈｕａｎ;#00ffc040;Zhihuan%l;#;!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2185 = "「!」"
# monologue
# JP: 歓喜の声だ。\nびょん！　と大きく西瓜のおさげが跳ねる。
3221 = "Đó là giọng nói tràn đầy niềm vui sướng.\nBím tóc của Suika nhảy dựng lên một cái rõ to!"
# monologue
# JP: なにがあったかと顔を向ければ、西瓜の方へ、制服姿\n――仲国国鉄の制服姿の――青年が小走りに駆けてくる。
3281 = "Khi tôi quay mặt lại xem có chuyện gì, thì thấy một thanh niên mặc đồng phục\n——đồng phục của Đường sắt Quốc gia Zhongguo——đang chạy chậm về phía Suika."
# monologue
# JP: （青年、というより少年――か？）
3296 = "(Thanh niên, hay đúng hơn là thiếu niên——sao?)"
# monologue
# JP: 制服姿が大人びた印象をあたえているが、\n面差しだけなら、少年だ。
3254 = "Bộ đồng phục mang lại ấn tượng trưởng thành,\nnhưng nếu chỉ nhìn nét mặt thì cậu ấy vẫn chỉ là một thiếu niên."
# monologue
# JP: とはいえ正規職員であろうゆえ、\nそれほど若年でもなかろうが――
2909 = "Dù vậy, chắc hẳn cậu ấy là nhân viên chính thức,\nnên tuổi tác cũng không đến mức quá nhỏ đâu——"
# 【ハチロク】
# display as 八六
# JP: 「[りゅうしかん,2]劉志寰様とおっしゃる機関士の方だそうです。\n西瓜の――マスターの方だと」
2059 = "「Nghe nói đó là một người lái tàu tên là Liu Zhihuan.\nLà——Master của Suika đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、西瓜のマスターか」
2558 = "「Gì cơ, là Master của Suika sao.」"
# monologue
# JP: 共感で、言葉より多くを受け取ったのだろうか？
2886 = "Có lẽ nhờ cộng cảm mà em ấy đã nhận được nhiều thông tin hơn là chỉ qua lời nói chăng?"
# monologue
# JP: ハチロクの声は、\n単なる紹介以上のなにかを含んでいるようにも聞こえる。
2934 = "Giọng nói của Hachiroku,\nnghe có vẻ như còn chứa đựng điều gì đó nhiều hơn là một lời giới thiệu đơn thuần."
# 【志寰】
# display as 志寰
# JP: 「日ノ本の先生たち。申し訳ないです。\nすぐ、話をしてきます」
2164 = "「Các vị khách đến từ Hinomoto. Thật sự xin lỗi.\nTôi sẽ đi nói chuyện ngay đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すみません、ありがとうございます」
2026 = "「Xin lỗi, cảm ơn cậu nhiều.」"
# monologue
# JP: にこやかに笑って、志寰氏はすぐ、\n姜さんと制服姿の青年の間に――
3056 = "Nở một nụ cười tươi tắn, Zhihuan ngay lập tức\ntiến đến giữa cô Jiang và người đàn ông mặc đồng phục kia——"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2176 = "「Ôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……」
2677 = "「Cái này......」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！」
2171 = "「Á!!!!」"
# monologue
# JP: 志寰氏が取り返してくれたスケッチブックに、\n日々姫が飛びつく。
3165 = "Hibiki lao tới vồ lấy cuốn sổ phác thảo\nmà Zhihuan vừa lấy lại được."
# 【日々姫】
# display as 日日姬
# JP: 「ありがとう！　あの、ありがとうございます！！」
2633 = "「Cảm ơn! À, cảm ơn cậu rất nhiều!!」"
# 【志寰】
# display as 志寰
# JP: 「いえいえ。お役にたててよかった」
2198 = "「Không có gì đâu. Rất vui vì có thể giúp được chị.」"
# monologue
# JP: 日々姫はよほどほっとしたのか、\n目のふちに涙まで浮かべている。
3135 = "Có lẽ vì quá nhẹ nhõm,\nmà khóe mắt Hibiki còn rơm rớm nước mắt."
# 【日々姫】
# display as 日日姬
# JP: 「姜さんも、西瓜ちゃんも、ありがとうございました！\nわたし次からはちゃんと、聞いてから動くようにします」
2316 = "「Cảm ơn cô Jiang, cảm ơn cả em Suika nữa!\nTừ lần sau, em nhất định sẽ hỏi kỹ trước khi hành động.」"
# 【西瓜】
# display as 西瓜
# JP: 「大丈夫です。無問題！\n問題なく、全部が綺麗に解決しました」
2510 = "「Không sao đâu ạ. Không có vấn đề gì!\nMọi chuyện đã được giải quyết êm đẹp, không có vấn đề gì cả.」"
# 【姜】
# display as 姜
# JP: 「西瓜は、西瓜の最善を尽くしていました」
2614 = "「Suika đã cố gắng hết sức trong khả năng của mình rồi.」"
# monologue
# JP: 断言し。姜さんの手が西瓜へと伸び、\nそうっと優しく、いたわるようにその髪を撫でる。
3009 = "Khẳng định chắc nịch. Cô Jiang đưa tay về phía Suika,\nnhẹ nhàng và ân cần vuốt ve mái tóc cô bé như để an ủi."
# 【姜】
# display as 姜
# JP: 「細かなことをフォローするのが当方の職務です。\n全うしきれず、申し訳ありませんでした。改善します」
2595 = "「Việc theo sát những chi tiết nhỏ nhặt vốn là nhiệm vụ của tôi.\nThật xin lỗi vì đã không hoàn thành trọn vẹn. Tôi sẽ khắc phục.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなっ！」
2197 = "「Làm gì có chuyện đó ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2205 = "「A——」"
# monologue
# JP: そうか、そうだ。車内には西瓜ではなく、\n姜さんがついていくべきだった。
3144 = "Ra là vậy, đúng rồi. Đáng lẽ người đi cùng vào trong xe không phải là Suika,\nmà phải là cô Jiang mới đúng."
# monologue
# JP: 御一夜鉄道の特殊な環境それゆえに、\n僕らはついつい、その点を失念しがちだが……
3164 = "Vì môi trường đặc thù của Đường sắt Ohito,\nnên chúng tôi thường hay vô tình quên mất điểm đó, nhưng......"
# 【双鉄】
# display as 雙鐵
# JP: 「注意・警告まではできても……\nレイルロオドには、人間を制止することができない」
2128 = "「Dù có thể nhắc nhở hay cảnh báo......\nnhưng Railord không thể ngăn cản con người bằng vũ lực được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2225 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2186 = "「Hả!?」"
# monologue
# JP: 口に出すつもりはなかった。\n日々姫の声に慌てさせられ――
2868 = "Tôi không định nói ra thành tiếng.\nBị giật mình bởi giọng nói của Hibiki——"
# monologue
# JP: けれども日々姫は、そして姜さんは。\n強い眼差しを僕に返して、もう一度深く頷いてくれる。
2877 = "Nhưng Hibiki, và cả cô Jiang.\nĐều đáp lại tôi bằng một ánh mắt mạnh mẽ, rồi gật đầu thật sâu một lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕たち人間組に、それぞれ足りない点があった。\n今回、そうした点が、これほど早期に浮き彫りにできた」
1684 = "「......Mỗi người trong nhóm con người chúng ta đều có những điểm thiếu sót.\nLần này, những điểm đó đã bộc lộ ra từ rất sớm.」"
# monologue
# JP: ハチロクと西瓜が少し、困ったような顔になってしまう。\nが、無論、彼女たちにはほんの僅かの瑕疵もない。
2926 = "Hachiroku và Suika có vẻ hơi bối rối một chút.\nNhưng tất nhiên, các em ấy không có lấy một chút tì vết nào."
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜の言の通り、今回は何の損失もなく問題解決できた。\nならばこれを奇貨とし、諸点の改善――」
2493 = "「Đúng như lời Suika nói, lần này vấn đề đã được giải quyết mà không có tổn thất nào.\nVậy thì hãy coi đây là một cơ hội tốt để cải thiện những thiếu sót——」"
# monologue
# JP: いや、違う。\nこの雰囲気を飛ばすためには、別の言葉が必要だ。
2880 = "Không, không phải.\nĐể xua tan bầu không khí này, cần phải dùng những lời lẽ khác."
# 【双鉄】
# display as 雙鐵
# JP: 「今後の悉究に役立てればいい」
2635 = "「Chỉ cần lấy đó làm bài học hữu ích cho sự tất cứu sau này là được.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ！」
# 2228 = "「啊！」" 
# 【日々姫】
# display as 日日姬
# JP: 「うん！！！」
2245 = "「Vâng!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いい返事だ」
2342 = "「Trả lời hay lắm.」"
# monologue
# JP: 頭を撫でればようやっと、日々姫の頬に血色が戻る。\n立派な大人に成長しても、こういうところは変わらない。
2987 = "Khi tôi xoa đầu, sắc mặt Hibiki cuối cùng cũng hồng hào trở lại.\nDù có trưởng thành thành một người lớn chững chạc, thì điểm này của em ấy vẫn không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「と――。\n[しかん,1]志寰さん……と、お呼びしても？」
2700 = "「Và——.\nTôi có thể gọi cậu là...... Zhihuan...... được không?」"
# 【志寰】
# display as 志寰
# JP: 「さんは不要です。右田先生。僕は見ての通り若輩者です。\n呼び捨てにしていただければ」
2094 = "「Không cần thêm chữ 'anh' hay 'chú' đâu ạ. Thầy Migita. Như thầy thấy đấy, tôi còn trẻ tuổi lắm.\nThầy cứ gọi trống không tên tôi là được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもどうかと……では、差し支えなければ志寰君で。\n僕らのことも、姓ではなく、双鉄、日々姫と」
2717 = "「Như thế cũng hơi...... Vậy nếu không phiền, tôi sẽ gọi cậu là Zhihuan nhé.\nCòn về phía chúng tôi, cậu cũng đừng gọi bằng họ nữa, cứ gọi là Soutetsu, Hibiki đi.」"
# 【志寰】
# display as 志寰
# JP: 「わかりました。双鉄さん、日々姫さん。\nレイルロオド・ハチロクも、よろしくおねがいします」
2294 = "「Tôi hiểu rồi. Anh Soutetsu, chị Hibiki.\nCả Railord Hachiroku nữa, rất mong được mọi người giúp đỡ.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしにまで丁寧なご挨拶をありがとうございます。\nよろしくお願いいたします、志寰様」
2749 = "「Cảm ơn anh đã chào hỏi lịch sự với cả tôi nữa.\nRất mong được giúp đỡ, anh Zhihuan.」"
# 【日々姫】
# display as 日日姬
# JP: 「[しかん,1]志寰君。助けてくれて、ありがとうございました」
2379 = "「Zhihuan. Cảm ơn cậu đã giúp đỡ nhé.」"
# 【志寰】
# display as 志寰
# JP: 「助けたのは僕ではなく、この制服です」
2359 = "「Người giúp đỡ không phải là tôi, mà là bộ đồng phục này.」"
# monologue
# JP: 言って、志寰君は制帽の中央に輝いている、\n仲国国鉄のマークを指差す。
3268 = "Nói rồi, Zhihuan chỉ vào biểu tượng của Đường sắt Quốc gia Zhongguo\nđang tỏa sáng ở chính giữa chiếc mũ đồng phục."
# 【志寰】
# display as 志寰
# JP: 「保安員さんは、仲国国鉄のための仕事をしています。\nだから事情の説明には、制服がとても役にたちました」
2679 = "「Nhân viên an ninh đang làm việc cho Đường sắt Quốc gia Zhongguo.\nNên bộ đồng phục này đã giúp ích rất nhiều trong việc giải thích tình hình.」"
# 【姜】
# display as 姜
# JP: 「逆に私には、その制服がなかったので」
2536 = "「Ngược lại, tôi lại không có bộ đồng phục đó nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、さらに相手の立場を重んじたなら……\n確かに、相当に面倒でしょうね」
2132 = "「Ra là vậy, nếu còn phải tôn trọng lập trường của đối phương nữa thì......\nChắc chắn sẽ khá là rắc rối nhỉ.」"
# 【姜】
# display as 姜
# JP: 「ご理解痛み入ります」
2750 = "「Vô cùng cảm kích sự thấu hiểu của anh.」"
# monologue
# JP: やはりか。姜さんは、保安員氏のみならず、\nこの北琴駅そのものの面子と秩序も重視したのだ。
3151 = "Quả nhiên là vậy. Cô Jiang không chỉ tôn trọng nhân viên an ninh kia,\nmà còn coi trọng thể diện và trật tự của chính ga Beiqin này nữa."
# monologue
# JP: 身分を明かし、北琴駅長からのであろう警備命令を\n頭越しに無効化するのは、幾つもの問題を孕もうゆえに。
2889 = "Bởi vì nếu tiết lộ thân phận, rồi vô hiệu hóa lệnh bảo vệ có lẽ là từ ga trưởng ga Beiqin\nmột cách ngang ngược, thì sẽ nảy sinh ra rất nhiều vấn đề khác."
# 【姜】
# display as 姜
# JP: 「志寰君は西瓜から話を聞いているようですが――\n双鉄先生、日々姫女士には、ご紹介が必要ですよね」
2378 = "「Có vẻ như Zhihuan đã nghe chuyện từ Suika rồi——\nNhưng mà, vẫn cần phải giới thiệu cậu ấy với thầy Soutetsu và cô Hibiki nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですね、いただけましたら」
2627 = "「Vâng, nếu được thì xin nhờ cô.」"
# monologue
# JP: 双鉄、日々姫と寄せてくれたが、先生、女士は変わらない。
3037 = "Tuy đã gọi là Soutetsu, Hibiki cho gần gũi hơn, nhưng cách gọi thầy, cô vẫn không thay đổi."
# monologue
# JP: ならばそこは、姜さんの――あるいは姜さんが担う職務の、\n恐らく、ぎりぎり許される線なのであろうか？
3099 = "Nếu vậy thì đó có lẽ là giới hạn cuối cùng được cho phép\ncủa cô Jiang——hoặc là của chức vụ mà cô Jiang đang đảm nhiệm chăng?"
# 【姜】
# display as 姜
# JP: 「こちらは劉志寰君。先任である彼のご父君を引き継ぎ、\nレイルロオド・西瓜のマスターとなった機関士です」
2680 = "「Đây là cậu Liu Zhihuan. Cậu ấy là người lái tàu kế nhiệm cha mình,\nvà hiện đang là Master của Railord Suika.」"
# 【志寰】
# display as 志寰
# JP: 「[りゅうしかん,2]劉志寰です。日ノ本語は西瓜に習いました。日ノ本語で初めて話す日ノ本の方がお二人で、僕はとても光栄です」
2415 = "「Tôi là Liu Zhihuan. Tôi học tiếng Hinomoto từ Suika. Hai người là những người Hinomoto đầu tiên tôi nói chuyện bằng tiếng Hinomoto, tôi cảm thấy rất vinh dự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそ光栄です。あらためてよろしく頼みます。\n志寰機関士」
2200 = "「Chúng tôi mới là người thấy vinh dự. Một lần nữa, rất mong được cậu giúp đỡ.\nNgười lái tàu Zhihuan.」"
# 【日々姫】
# display as 日日姬
# JP: 「よろしくおねがいします。志寰機関士。\n助けていただき、本当にありがとうございました」
2629 = "「Rất mong được giúp đỡ. Người lái tàu Zhihuan.\nThật sự cảm ơn cậu rất nhiều vì đã giúp đỡ tôi.」"
# 【志寰】
# display as 志寰
# JP: 「ああ……その……\nからこまられるとボクが困ってしまいます」
2220 = "「A...... ừm......\nMọi người cứ khác sáo thế này làm tôi bối rối quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2253 = "「Hửm?」"
# 【西瓜】
# display as 西瓜
# JP: 「あ。志寰。『かしこまられる』」
2234 = "「A. Zhihuan. Phải nói là 『khách sáo』 chứ.」"
# 【志寰】
# display as 志寰
# JP: 「謝謝。かしこままれる――んんっ？　かしこまむらる」
2632 = "「Cảm ơn. Khách xáo——hửm? Khách xạo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ。本当に困らせているな。すまない。\nならばかしこまるのはやめよう。いいな？　日々姫」
2182 = "「Haha. Đúng là làm cậu bối rối thật rồi. Xin lỗi nhé.\nVậy thì chúng ta đừng khách sáo nữa. Được chứ? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。わかったと！　じゃ、やりなおしで。――\nありがと、よろしく！　志寰君」
2596 = "「Ừm. Em hiểu rồi! Vậy, làm lại nhé.——\nCảm ơn cậu, rất vui được làm quen! Zhihuan.」"
# 【志寰】
# display as 志寰
# JP: 「はいです！\n双鉄さん、日々姫さん！　よろしくです！」
2296 = "「Vâng ạ!\nAnh Soutetsu, chị Hibiki! Rất vui được làm quen!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
# 2244 = "「嗯嗯」" 
# monologue
# JP: なんとも気持ちのいい好青年だ。
3172 = "Quả là một chàng trai trẻ dễ mến và sảng khoái."
# monologue
# JP: 人懐こさというか、人好きさというような丸さが、\nどこか四角い西瓜と、好一対だと感じさせられる。
3240 = "Sự thân thiện, hay nói đúng hơn là sự hòa đồng, cởi mở của cậu ấy,\ncho người ta cảm giác cậu ấy là một cặp bài trùng hoàn hảo với một Suika có phần góc cạnh."
# 【姜】
# display as 姜
# JP: 「[ｚｈｉｈｕａｎ,1]志寰？――」
2381 = "「\\x%lｚｈｉｈｕａｎ;#00ffc040;Zhihuan%l;#;?——」"
# monologue
# JP: おっと、仲国語だ。
2897 = "Ôi chà, là tiếng Zhongguo."
# monologue
# JP: 志寰君はふんふん頷き、西瓜ににこりと笑顔を投げかけ。\nおや――
3054 = "Zhihuan liên tục gật gù, rồi nở nụ cười tươi tắn với Suika.\nÔ kìa——"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2225 = "「啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「ふーん？」
2240 = "「Hừm~?」"
# monologue
# JP: ……西瓜は表情を極力保つよう、\n命令でもされているのだろうか？
1635 = "......Có phải Suika đang cố gắng hết sức để giữ nguyên nét mặt,\nnhư thể đang nhận được một mệnh lệnh nào đó không?"
# monologue
# JP: 頬の赤みを一秒ごとに色濃くし、けれど表情は動かさず。\nそれゆえ強く、嬉しさを滲ませているように見えるが……
2991 = "Hai má cô bé đỏ ửng lên từng giây, nhưng nét mặt lại không hề thay đổi.\nChính vì thế mà trông cô bé càng giống như đang cố kìm nén sự vui sướng đang trào dâng......"
# 【姜】
# display as 姜
# JP: 「志寰君の制服は、視察の大きな助けとなると学びました。\nですので、先生方に異論がなければ同行をと思いますが」
2572 = "「Tôi nhận ra rằng bộ đồng phục của Zhihuan sẽ giúp ích rất nhiều cho việc khảo sát.\nVì vậy, nếu các thầy cô không có ý kiến gì khác, tôi muốn để cậu ấy đi cùng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕としては大歓迎だ。日々姫とハチロクは」
2412 = "「Về phần tôi thì rất hoan nghênh. Còn Hibiki và Hachiroku thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんしてもらえるなら心強かと」
2375 = "「Nếu được như vậy thì yên tâm quá rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「よろしくおねがいいたします。志寰様」
2701 = "「Rất mong được anh giúp đỡ. Anh Zhihuan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「決まりだな。よろしく頼む」
2356 = "「Vậy là quyết định rồi nhé. Trăm sự nhờ cậu.」"
# monologue
# JP: 言った瞬間、西瓜の顔がはじけたようにほころんで、\n長いおさげがふるふる震える。
3238 = "Ngay khoảnh khắc tôi vừa dứt lời, gương mặt Suika bừng sáng như thể vỡ òa,\nvà hai bím tóc dài rung lên bần bật."
# monologue
# JP: 僕らにとってと同等か、あるいはそれより更に強くに、\n西瓜にとっても、嬉しいニュースとなったらしい。
3052 = "Có vẻ như đối với Suika, đây cũng là một tin tức đáng mừng\nngang ngửa, hoặc thậm chí là hơn cả đối với chúng tôi."
# 【姜】
# display as 姜
# JP: 「それでは、先生方をホテルにご案内いたします。\n荷物を下ろしてお休みいただき、お食事にご案内します」
2722 = "「Vậy thì, tôi sẽ dẫn các thầy cô đến khách sạn.\nXin hãy cất hành lý và nghỉ ngơi một chút, sau đó tôi sẽ đưa mọi người đi dùng bữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。よろしくおねがいいたします」
2293 = "「Tôi hiểu rồi. Rất mong được cô giúp đỡ.」"
# monologue
# JP: （ぐ～～っ）
3294 = "(Rột~~)"
# monologue
# JP: 誰のであろうか、かなり豪快に腹がなった。\nが、誰のであろうと、僕のやることは変わらない。
2873 = "Không biết là của ai, nhưng tiếng bụng sôi vang lên khá to.\nNhưng dù là của ai đi chăng nữa, thì việc tôi cần làm vẫn không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。食事と聞いて、腹が鳴ってしまいました」
2025 = "「Xin lỗi. Vừa nghe đến ăn uống là bụng tôi đã réo lên rồi.」"
# 【姜】
# display as 姜
# JP: 「ふふふ。ご期待に添えると思いますよ？\nあっ――好き嫌いをお伺いしていなかった」
2173 = "「Fufufu. Tôi nghĩ là sẽ đáp ứng được kỳ vọng của mọi người đấy?\nA——Tôi chưa hỏi xem mọi người có thích hay ghét món gì không.」"
# monologue
# JP: 姜さんは、僕に、日々姫に、\nじゅんじゅんに笑顔を向けてくる。
3021 = "Cô Jiang lần lượt hướng nụ cười\nvề phía tôi, và Hibiki."
# 【姜】
# display as 姜
# JP: 「双鉄先生と日々姫女士のお口には――\n北琴ダックは、合いますでしょうか？」
2028 = "「Không biết món Vịt quay Beiqin——\ncó hợp khẩu vị của thầy Soutetsu và cô Hibiki không nhỉ?」"
