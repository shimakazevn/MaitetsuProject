# 【西瓜】
# display as 西瓜
# JP: 「大丈夫です。無問題！\n問題なく、全部が綺麗に解決しました」
2510 = "「沒關係的，沒問題！全都圓滿解決了」" 

# 【姜】
# display as 姜
# JP: 「西瓜は、西瓜の最善を尽くしていました」
2614 = "「西瓜已經在力所能及的範圍內做到最好了」" 

# monologue
# JP: 断言し。姜さんの手が西瓜へと伸び、\nそうっと優しく、いたわるようにその髪を撫でる。
3009 = "姜小姐一邊這樣肯定著，一邊伸出手來，溫柔地輕撫著西瓜的頭髮作為慰勞。" 

# 【姜】
# display as 姜
# JP: 「細かなことをフォローするのが当方の職務です。\n全うしきれず、申し訳ありませんでした。改善します」
2595 = "「處理這些細節問題本就是我們的責任。非常抱歉未能做到盡善盡美，今後一定改進」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなっ！」
2197 = "「哪有！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2205 = "「啊——」" 

# monologue
# JP: そうか、そうだ。車内には西瓜ではなく、\n姜さんがついていくべきだった。
3144 = "是這樣嗎，原來是這樣。姜小姐的意思應該是，在上車時她也應該一起跟去，而不是只交給西瓜。" 

# monologue
# JP: 御一夜鉄道の特殊な環境それゆえに、\n僕らはついつい、その点を失念しがちだが……
3164 = "畢竟御一夜鐵路環境特殊，而身處其中的我們，也漸漸將這麼重要的事情忘在了腦後……" 

# 【双鉄】
# display as 雙鐵
# JP: 「注意・警告まではできても……\nレイルロオドには、人間を制止することができない」
2128 = "「即便可以提醒注意、發出警告，鐵路人偶也不能制止人類」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2225 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2186 = "「哎！？」" 

# monologue
# JP: 口に出すつもりはなかった。\n日々姫の声に慌てさせられ――
2868 = "一不留神竟說出聲來了。聽到日日姬的聲音我慌忙住口——" 

# monologue
# JP: けれども日々姫は、そして姜さんは。\n強い眼差しを僕に返して、もう一度深く頷いてくれる。
2877 = "不過日日姬和姜小姐，都只是瞪了我一眼，而後深深點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕たち人間組に、それぞれ足りない点があった。\n今回、そうした点が、これほど早期に浮き彫りにできた」
1684 = "「……我們人類這邊都有沒做到位的地方。這次只是讓這個問題早早浮出水面而已」" 

# monologue
# JP: ハチロクと西瓜が少し、困ったような顔になってしまう。\nが、無論、彼女たちにはほんの僅かの瑕疵もない。
2926 = "八六和西瓜臉上浮現出一絲為難的神色。當然，她們本身並無半點瑕疵。" 

# 【双鉄】
# display as 雙鐵
# JP: 「西瓜の言の通り、今回は何の損失もなく問題解決できた。\nならばこれを奇貨とし、諸点の改善――」
2493 = "「正如西瓜所說，這次沒有任何損失便解決了問題。那麼就以此為契機，對出現的問題加以改進——」" 

# monologue
# JP: いや、違う。\nこの雰囲気を飛ばすためには、別の言葉が必要だ。
2880 = "不，不對。要打破這尷尬的氛圍，不該是說這種話才對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今後の悉究に役立てればいい」
2635 = "「讓這次的事情為今後的悉究起到作用就好了」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ！」
# 2228 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！！！」
2245 = "「嗯！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いい返事だ」
2342 = "「就是要這樣的回答」" 

# monologue
# JP: 頭を撫でればようやっと、日々姫の頬に血色が戻る。\n立派な大人に成長しても、こういうところは変わらない。
2987 = "在我伸手輕撫日日姬的頭時，她的臉頰上終於恢復了血色。即便已經成長為獨當一面的大人，這種地方卻還是絲毫未變。" 

# 【双鉄】
# display as 雙鐵
# JP: 「と――。\n[しかん,1]志寰さん……と、お呼びしても？」
2700 = "「那——志寰先生……這麼稱呼您合適嗎？」" 

