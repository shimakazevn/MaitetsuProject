# monologue
# JP: 完全指定制のナインスターズ等観光列車では見られんし、\n御一夜鉄道の全普通列車でお目にかかれることも無い。
3264 = "這種情況不僅不會出現在全指定座的九星上，就是在御一夜鐵路的全普通座列車上也未曾一見。" 

# 【ハチロク】
# display as 八六
# JP: 「旅へと向かう熱気ではなく、日常の、普段のことの。\n少し飽いたような気怠い、けれども高まりも混じる空気」
2416 = "「我沒有感受到出遊時的熱情，而是更平常、更普通的氛圍。有些厭煩和倦怠，但又不失活潑和熱鬧」" 

# monologue
# JP: 常にはあらぬ饒舌に驚かされる。\nハチロクはうっとりと――まるで歌っているかのようだ。
2892 = "今天的八六特別健談，令我大吃一驚。她陶醉地說著——彷彿像在歌唱一般。" 

# 【ハチロク】
# display as 八六
# JP: 「駅弁の匂いに、お酒の匂い。赤ちゃんの泣き声、笑い声。\n異国の言葉の、なのに懐かしい賑わい、ざわめき――」
2738 = "「鐵路便當的味道、酒的味道，小寶寶的哭聲笑聲、異國的語言，混雜在一起的這熱鬧而又嘈雜的感覺，真讓人懷念……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2458 = "「是啊……」" 

# 【ハチロク】
# display as 八六
# JP: 「あのこ――西瓜は耳がよろしいのですね。\n共感で、わたくしが聞くより多くが伝わってくるのです」
2711 = "「那孩子——西瓜的耳朵真是相當靈敏啊。我從她那裡通過共鳴聽到好多，憑我自己都是難以認知的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多くの……音がか？」
2288 = "「好多的……聲音嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「客車の床鳴り。連結部分の歩み板が立てる小さな軋み。\n牽引の機関車の発電機の音と、モオタアの音」
2593 = "「腳步踩在車廂上的聲音，車廂間踏板輕輕的碰撞聲，牽引列車的機車裡發電機的聲音和馬達的聲音」" 

# 【双鉄】
# display as 雙鐵
# JP: 「モーター？　ああ。ならば東富4という機関車は――」
2755 = "「馬達？啊。這麼說東富４型機車是——」" 

# 【ハチロク】
# display as 八六
# JP: 「ディーゼルエンジンで発電機を駆動。発生させた電力で、\nモオタアを回して走る、電気式\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;ですね」
2474 = "「是通過柴油引擎驅動發電機，再用電力驅動馬達來運行的電力驅動型\\x%lディーゼル機関車;#00ffc040;柴油機車%l;#;，又稱柴電機車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと……そのような形式の機関車が、\n何十年も前から実用化されていたのか」
2548 = "「真是驚人……這種形式的機車在幾十年前就已經投入實際運營了嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「日ノ本と、帝鉄とは――まったく別の選択をして。\nまったく別の鉄路が――仲国では伸び、生きたのですね」
2175 = "「和帝國鐵路選擇了完全不同的方向。在仲國生龍活虎地延伸著的，已是和日本完全不同的鐵路了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 2458 = "「是啊……」" 

# monologue
# JP: そうか、ハチロクは重ねて――思い出しているのか。
2937 = "八六看來是睹物思情，勾起了當年的回憶吧。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど同じく感じもします。かつて華やかなりし頃の\n――皆様の暮らしの一部であった、今は懐かしき帝鉄を」
2076 = "「但也有給人感覺相同的部分。追憶起那繁華的年代，帝國鐵路也是融入人們的生活，成為了其中的一部分」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……お前が愛し、お前が生きた鉄道か」
1664 = "「……便是你曾經深愛、生活的鐵路時代嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「あら？　双鉄様？　わたくしは、今もいきいき生きて、鉄道を愛しておりますよ？」
2184 = "「哎呀，雙鐵少爺，我現在也還生活在您身邊，深愛著鐵路哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん！　そうだな」
2206 = "「啊——嗯！說得沒錯」" 

# monologue
# JP: 花の咲くような笑顔を浮かべ、\nくるん、とハチロクがまわってみせる。
2942 = "八六臉上綻放出了花朵般的笑容，還輕快地在原地轉了個圈。" 

# monologue
# JP: 瞬間、胸のモヤが晴れ――自分自身が、今一瞬、\n『旧帝鉄』に、嫉妬していたのかと気付かされる。
3185 = "而我心中的不快也隨之一掃而空——這時我才意識到，剛才心中竟對“前帝國鐵路”湧起了一絲嫉妒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……目指さねばならんな。僕らの御一夜鉄道も。\nより深く、より広く、人々の暮らしと共にあることを」
1685 = "「……我們御一夜鐵路也必須要以此為目標才行——要更深入、更廣泛地融入到人們的生活中去」" 

# 【ハチロク】
# display as 八六
# JP: 「もうすでに。正しく目指しておられますし、そのように\n進まれておられますよ？　わたくし、保証いたします」
2413 = "「我們已經在朝著這個正確的目標穩步前進了，這一點我可以向您保證」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。なんともこころづよい」
2692 = "「這話著實振奮人心」" 

# monologue
# JP: 来てよかったと、まだ到着して数時間でも、つくづく思う。\n異国の鉄道に触れることは、自国の鉄道を知ることだ。
3275 = "雖然抵達這裡才不過幾個小時，但不虛此行的感覺卻越來越切實。接觸到異國的鐵路，讓我們對本國的鐵路又多了幾分認識。" 

# monologue
# JP: 仲国版のナインスターズ計画の草案を立案できたなら、\nその経験は、必ず御一夜鉄道に……も……？
2996 = "如果能成功擬定仲國版九星的設計方案的話，這過程中積累的經驗，想必也能對御一夜鐵路——" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は――\n日々姫と西瓜はどうしたのだ？」
2447 = "「日日姬呢？日日姬和西瓜在做什麼？」" 

# 【ハチロク】
# display as 八六
# JP: 「車内の様子をひととおり描きましたのち、\n機関車もスケッチしたいと申しまして、西瓜と一緒に」
2449 = "「日日姬畫了一下車內的樣子，隨後說想畫一下機車，就和西瓜一起過去了」" 

# 【姜】
# display as 姜
# JP: 「機関車をスケッチ！？　それは良くない」
2571 = "「給機車畫素描嗎？這可不好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
2228 = "「啊！」" 

# monologue
# JP: きっぷ売り場で受けた警告を思い出す。\n“駅施設は、仲国では保安の対象”であるのなら――
3074 = "我想到剛才在售票廳的經歷，如果“車站在仲國屬於安保對象”——" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃにっ！！！」
2743 = "「阿哥！阿哥！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！！」
2451 = "「日日姬！！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、助けてっ」
2745 = "「阿哥，幫幫我啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！」
2450 = "「日日姬！」" 

# monologue
# JP: 日々姫がスケッチブックを奪われまいと抵抗している。\n相手は制服姿の壮年男性――
3132 = "日日姬在掙扎著護住素描簿，不讓對面穿制服的壯年男性將它搶走。" 

# 【姜】
# display as 姜
# JP: 「待って！　ここは任せてください」
2560 = "「等一下！這裡就讓我來處理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2228 = "「啊！」" 

# monologue
# JP: 割って入ろうとした寸前に、姜さんの声に制される。
3028 = "就在我打算衝上去的時候，卻被姜小姐開口攔下了。" 

# 【姜】
# display as 姜
# JP: 「必ずすぐにお手元に戻します。\nひとまず彼に、スケッチブックをお渡しください」
2410 = "「我保證會儘快物歸原主，現在先把素描簿交給他」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ…………んっ――」
2212 = "「啊…………嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。ここは異国だ。\n僕らはしきたりを理解していない。今は姜さんに任せて」
2453 = "「日日姬，這裡是國外，這裡的規矩我們不懂，聽姜小姐的話吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかったと。にぃに」
2418 = "「我知道了咧，阿哥」" 

# monologue
# JP: 日々姫が、スケッチブックから手を離す。\n見ている僕の心さえ、ズキリと痛む光景だ。
3141 = "日日姬鬆開了緊抓住素描簿的手，這一幕看在眼裡，我的心裡都不禁為之一悸。" 

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書にまかせておけば、大丈夫です。右田女士」
2038 = "「交給姜老師處理肯定沒問題的，右田女士」" 

# monologue
# JP: スケッチブックを失って、わななく日々姫の手を引いて。\n西瓜は日々姫を僕らのもとへと――
3219 = "西瓜牽著被搶走素描簿，還在不住顫抖的日日姬朝我走過來——" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。日々姫。怖かったな。大丈夫だ」
2505 = "「沒事啦，日日姬。不怕不怕，沒事了」" 

# monologue
# JP: それを待たずに、\n日々姫の元へと駆け寄り優しく抱きしめる。
3072 = "我不等她們走近，就迎了上去，輕輕抱住了日日姬。" 

# monologue
# JP: 日々姫はかなり震えている。\nガチガチガチと、歯がぶつかっている音が聞こえる。
3140 = "日日姬體若篩糠，我都能聽到她上下牙齒碰撞的聲音。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。びっくりしたな。怖かった。\nだが、もう大丈夫だ。なんの心配もない」
2504 = "「沒事了，你嚇壞了吧。不過沒事了，你別怕」" 

# 【日々姫】
# display as 日日姬
# JP: 「ごめ……なさ――にぃに。\n私、夢中に、なって――それで――」
2330 = "「對不起……阿哥。我畫得入神了……然後就……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見て描くことを、日々姫は求められているんだ。\nそれを果たしていただけだ。日々姫は何も悪くない」
2083 = "「你此行的任務就是去觀察，然後畫下來。你只是在履行自己的責任而已，什麼都沒有做錯」" 

# 【西瓜】
# display as 西瓜
# JP: 「右田女士はなにも悪いことをしていないです。\n準備、調整不足は西瓜の失点です」
2159 = "「右田女士您沒有任何不對，這都怪西瓜，在準備和安排工作上多有疏漏」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、当日いきなりの駅をみたいと要望したのは、\n僕らの方だ。調整不足にならない方がおかしい」
2031 = "「不，是我們臨時提出當天要參觀車站的要求的。安排欠妥完全可以說是在所難免」" 

# monologue
# JP: この行程の、この面子での責任者は、間違いなく僕だ。
3157 = "毫無疑問，此行我們這邊的負責人是我。" 

# monologue
# JP: 忙しさにかまけ、『ゼロ知識で来てほしい』という要望を\n真に受けすぎず――
2899 = "以事務繁忙做託詞，對於這個“以儘量一無所知的狀態前來”的要求，不假思索地全盤接受——" 

# 【双鉄】
# display as 雙鐵
# JP: 「少なくとも禁忌にあたること、安全に関わることは、\n勉強して、渡航をしなければならなかったし――」
2485 = "「本應該至少了解一下禁忌事項，以及安全相關的內容再出發的」" 

# monologue
# JP: それに、姜さんの警告と日々姫の性格とをより注意深く\n考慮し繋げられていたなら、この展開も予想し得た。
3146 = "更何況，依據剛才姜小姐的提醒以及我對日日姬性格的了解，只要稍作聯想，早該料到會出現這樣的局面。" 

# monologue
# JP: つまり今回の事態を引き起こしてしまった原因は、\n単純な、僕個人の準備と注意力不足に他ならない。
3096 = "換言之，引發如今事態的原因，純粹是我個人準備不充分，以及思慮淺薄。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[シーチォゥ,1]悉究……といったか？\nそれが完全に不足していた」
2078 = "「你一直說“悉究”……對吧？看來這方面我是欠缺得很徹底啊」" 

# 【西瓜】
# display as 西瓜
# JP: 「あっ」
2225 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「済まなかった。西瓜にも、姜さんにも――\n当然の職務を果たしているであろう彼にも、迷惑を」
2754 = "「非常抱歉。不管是對西瓜，還是姜小姐，還有明顯是在履行自己職務的那位先生，都帶來了麻煩」" 

# 【西瓜】
# display as 西瓜
# JP: 「迷惑なことはありません。これはただの行き違いですし、\nここからの悉究で、改善に繋げられると西瓜は思います」
2196 = "「哪有麻煩，您言重了。這只是一場誤會而已，西瓜覺得，今後只需多加悉究，一定能夠得到改進」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、あればよいのだが――」
2311 = "「如果真是這樣就好，不過——」" 

# monologue
# JP: しかし、単なる行き違いにしては……
2878 = "不過，若真的只是一場誤會的話……" 

# 【ハチロク】
# display as 八六
# JP: 「ずいぶんと……お話がこじれている様子ですね」
2678 = "「這交涉……未免進行得太久了些」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
2204 = "「唔……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、大丈夫だ日々姫。時間をかけているのは恐らく、\nより穏便に、事態をすませるためであるかと思う」
2427 = "「放心吧，日日姬，沒事的。多花些時間，應該只是想把事態更穩妥地處理好吧」" 

# monologue
# JP: ……姜さん自身が、かなり高い地位にあるはずだし、\n彼女が仕える主の身分を出せば一発で問題解決しよう。
1632 = "……相較那位身著制服的先生，姜小姐應該算是身居高位了。若是表明身份動用職權的話，解決這事態應該只在片刻之間。" 

# monologue
# JP: が、そうなっていない……そうしない理由はおそらく、\n身分を明かすことを禁じられているのか、あるいは――
2911 = "但情況卻並沒有這樣發展，那麼理由可能是她不方便表明身份，或者——" 

# 【志寰】
# display as 志寰
# JP: 「[ｘｉｇｕａ,1]西瓜？　[ｘｉｇｕａ,1]西瓜！！！」
2623 = "「西瓜？西瓜！！！」" 

# 【西瓜】
# display as 西瓜
# JP: 「っ！！　[ｚｈｉｈｕａｎ,1]志寰！！！」
2231 = "「啊！！志寰！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2185 = "「哎！」" 

# monologue
# JP: 歓喜の声だ。\nびょん！　と大きく西瓜のおさげが跳ねる。
3221 = "西瓜的聲音中透著滿滿的歡欣雀躍。而她的辮子也隨之舞動了起來。" 

# monologue
# JP: なにがあったかと顔を向ければ、西瓜の方へ、制服姿\n――仲国国鉄の制服姿の――青年が小走りに駆けてくる。
3281 = "順著西瓜的目光看去，一位身著制服——身著仲國國鐵制服的青年正朝我們小跑過來。" 

# monologue
# JP: （青年、というより少年――か？）
3296 = "（青年，或者說其實是少年？）" 

# monologue
# JP: 制服姿が大人びた印象をあたえているが、\n面差しだけなら、少年だ。
3254 = "身著制服的形象倒是透著幾分成熟穩重，但從面孔上看，確是如假包換的少年。" 

# monologue
# JP: とはいえ正規職員であろうゆえ、\nそれほど若年でもなかろうが――
2909 = "但從制服看來，應該是正式員工，所以實際上應該也不至於那麼年輕吧——" 

# 【ハチロク】
# display as 八六
# JP: 「[りゅうしかん,2]劉志寰様とおっしゃる機関士の方だそうです。\n西瓜の――マスターの方だと」
2059 = "「他好像是一位司機，名叫劉志寰……應該就是西瓜的司機」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、西瓜のマスターか」
2558 = "「竟然是西瓜的司機嗎」" 

# monologue
# JP: 共感で、言葉より多くを受け取ったのだろうか？
2886 = "也許是通過共鳴得到的訊息量更甚於言語的緣故——" 

