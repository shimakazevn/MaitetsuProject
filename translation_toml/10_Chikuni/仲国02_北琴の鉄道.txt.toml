2572 = "「經過這次的事情，我們意識到志寰的這身制服對考察會有莫大的幫助。所以如果諸位沒有意見的話，我想請他同行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕としては大歓迎だ。日々姫とハチロクは」
2412 = "「我個人是雙手歡迎啦。日日姬和八六呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんしてもらえるなら心強かと」
2375 = "「志寰能加入的話那就更安心啦」" 

# 【ハチロク】
# display as 八六
# JP: 「よろしくおねがいいたします。志寰様」
2701 = "「那一路上請多關照，志寰先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「決まりだな。よろしく頼む」
2356 = "「就這麼決定啦，請多關照」" 

# monologue
# JP: 言った瞬間、西瓜の顔がはじけたようにほころんで、\n長いおさげがふるふる震える。
3238 = "話音剛落，西瓜就笑開了花，長長的辮子都隨之抖個不停。" 

