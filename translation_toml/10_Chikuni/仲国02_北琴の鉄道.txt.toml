[script]
# lines: 457 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　あれ！！！」
2742 = "「阿哥！你瞅那個！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2188 = "「哦！」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　8620と北琴で再会できるとは思いませんでした。\nうふふっ、なんて素敵な歓迎ボオドでございましょう」
2178 = "「哇！真想不到在北琴也能與８６２０重逢。嘻嘻，這歡迎板做得還真是漂亮」" 

# monologue
# JP: 8620を模したボードに描かれているのは、\n『歓迎！　御一夜鉄道御一行』の文字。
2984 = "在做成８６２０形狀的板子上，寫著“歡迎御一夜鐵路貴賓一行！”。" 

# monologue
# JP: ボードを手にしているのは――\nふむ。どうみてもレイルロオドだ。
3186 = "而舉著這塊板子的——怎麼看都是一位鐵路人偶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「君は――あ、いや。\nにぃはお。あー」
2081 = "「你是——啊，不對，“ｎｉｈａｏ”。啊——」" 

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本語でお話しいただき大丈夫です。\n私、[すいか,1]西瓜は日ノ本語が使えます」
2394 = "「您請講日語就好了，我——西瓜也會說日語的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2187 = "「哦」" 

# monologue
# JP: 思いもかけず、極めて流暢な日ノ本語だ。
3063 = "想不到她的日語竟有如此流利。" 

# 【西瓜】
# display as 西瓜
# JP: 「ようこそ北琴へ！　歓迎来到北琴！！」
2489 = "「歡迎來到北琴！」" 

# monologue
# JP: そうして、ぱっと花咲く笑顔。\n嬉しくなって右手を出せば、すぐに握手で応えてくれる。
3239 = "話音未落，她臉上便綻放出花朵一般的笑容。而當我開心地伸出手時，她也毫不猶豫地握了過來。" 

# 【西瓜】
# display as 西瓜
# JP: 「右田日々姫女士に右田双鉄先生にハチロクさんですね。\n我叫[ｘｉｇｕａ,1]西瓜。私は[すいか,1]西瓜。[とうふうよん,2]東富4 [にせん,3]2000専用レイルロオドです」
2360 = "「幾位是右田日日姬女士、右田雙鐵先生和八六小姐吧。我叫[Ｘｉｇｕａ,1]西瓜，日語應該是[すいか,1]西瓜，是東富４　２０００專用鐵路人偶」" 

# 【ハチロク】
# display as 八六
# JP: 「シーグァというのは、日ノ本語の、果物の“西瓜”と、\n全く同じ意味で同じ漢字だそうでございます」
2539 = "「看來Ｘｉｇｕａ這個詞，和日語中指水果的那個“西瓜”不僅漢字寫法相同，意思也是完全相同」" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク！？　なんでそぎゃんこと知っとーと？」
2103 = "「八六！？你怎麼知道的咧？」" 

# monologue
# JP: 日々姫の驚く声を聞くなり同時に、\nハチロクと、西瓜と名乗ったレイルロオドとが小さく笑う。
3279 = "面對日日姬驚訝的詢問，八六和自稱西瓜的鐵路人偶只是相視一笑。" 

# 【日々姫】
# display as 日日姬
# JP: 「あー！　そっか、共感か」
2230 = "「啊！難道，是共鳴嗎」" 

# monologue
# JP: 左様ですねと微笑んで、\nハチロクは優雅にスカートの裾をつまんで持ち上げる。
2924 = "八六以微笑肯定了日日姬的猜想，而後優雅地輕牽裙裾，向西瓜施禮。" 

# 【ハチロク】
# display as 八六
# JP: 「はじめまして、[すいか,1]西瓜さん。わたくしはハチロク。\n8620形蒸気機関車8620の専用レイルロオドです」
2612 = "「西瓜小姐你好，初次見面請多關照。我是八六，是８６２０型蒸汽機車８６２０的專用鐵路人偶」" 

# 【西瓜】
# display as 西瓜
# JP: 「挨拶を丁寧にありがとうございます。\nさんは不要です。私を西瓜と呼んでください」
2313 = "「如此大禮實在受之有愧。請直接叫我西瓜就好」" 

# 【ハチロク】
# display as 八六
# JP: 「では、わたくしのことも、ただハチロクと」
2708 = "「那也請叫我八六就好」" 

# 【西瓜】
# display as 西瓜
# JP: 「ハチロク。わかりました。では、私、西瓜は、\n右田先生と右田女士とハチロクにご紹介します」
2297 = "「好的，八六。那接下來容我向幾位隆重介紹——」" 

# monologue
# JP: その声を受け、西瓜の後方に控えていた女性がすっと、\nスマートな体を折り曲げる。
3187 = "聞言，一直站在西瓜身後身著正裝的女性，優雅地向著我們幾人輕鞠一躬。" 

# 【姜】
# display as 姜
# JP: 「はじめまして。[きょう　　ようこう,2]姜叶煌と申します。\n仲国国務院、鉄道部の副部長秘書です」
2278 = "「大家好，我叫姜葉煌。在仲國國務院，任交通運輸部副部長秘書一職」" 

# 【日々姫】
# display as 日日姬
# JP: 「は、はじめまして。右田日々姫です。御一夜鉄道所属の\n車輌デザイナーで、機関士・機関助士も務めています」
2388 = "「您、您好。我叫右田日日姬，在御一夜鐵路擔任車輛設計師，同時兼任司機和司爐」" 

# 【姜】
# display as 姜
# JP: 「はい。[みぎた,1]右田女士と右田先生のことは、\n[ほうしょう,1]宝生女士からよく伺っています」
2740 = "「關於右田女士和右田先生，從寶生女士處早有耳聞」" 

# monologue
# JP: 軽く笑って、日々姫と握手し、スーツ姿の姜さんは、\n僕とも短く――けれども強く握手する。
3020 = "姜小姐面帶微笑，與日日姬和我一一握手——簡短而有力的握手彰顯著她的幹練。" 

# 【姜】
# display as 姜
# JP: 「右田先生。\nナインスターズ計画のご成功、おめでとうございます」
2155 = "「右田先生，祝賀您的九星計劃獲得圓滿成功」" 

# monologue
# JP: うむ！？\nいや……そうか。この面子ならば僕が代表となるわけか。
2982 = "嗯！？哦……也對，以我們此行的人員陣容，我的確需要代表整個團隊。" 

# monologue
# JP: 慣れぬことゆえ、ポーレットの普段の対応を思い出しつつ、\nそのままなぞる。
2919 = "儘管尚不習慣，但我也只能邊回憶波萊特往常的表現，邊有樣學樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご祝辞をありがとうございます。\nまたこの度のお招きにも、こころより御礼申し上げます」
2121 = "「十分感謝，承蒙吉言。衷心感謝您邀請我們來仲國」" 

# 【姜】
# display as 姜
# JP: 「こちらこそ、[ごらいきん,2]御来琴を誠にありがとうございます。\nいかがですか？　[ぺきん,1]北琴の印象は」
2391 = "「您客氣了，幾位百忙之中抽空前來，應該是我們道謝才對。不知幾位對北琴的第一印象如何」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですね――」
2559 = "「第一印象啊——」" 

# 【日々姫】
# display as 日日姬
# JP: 「すっごい栄えとー！！　入国審査の指紋登録ば、\n機械で一瞬で、おお！　って思ったと――思いました」
2729 = "「那是相當繁華啊！！入境的時候錄指紋，在機器上按一下就好了，我就尋思——我就覺得好神奇啊」" 

# monologue
# JP: 怖がっていた指紋登録を、ほんの一瞬で\n完了できたことがよほど印象強かったのだろう。
3250 = "起初還很擔心錄指紋的事，沒想到一瞬間就完成了，這反差看來留下了相當深刻的印象。" 

# monologue
# JP: つい出た方言を修正しつつも、\n日々姫の言葉の熱はわずかも下がらない。
3274 = "雖然在糾正著不時蹦出來的方言，但日日姬話語中的熱情卻分毫未減。" 

# 【日々姫】
# display as 日日姬
# JP: 「入国審査通過してから、この到着ロビーまでの移動も、\nまさかのエアクラモノレールで、すっごく驚きました！」
2365 = "「從海關到到達大廳的這段路，竟然是乘單軌空凝機過來，真是太讓人吃驚了！」" 

# monologue
# JP: 確かにあれには驚いた。４人乗りの小さなエアクラ動車が、\nモノレールの上を一定間隔で無数に環状走行していた。
3241 = "說來的確令人驚嘆。在環狀的單軌上以間隔分布的方式循環運行著許多四人一輛的小型空凝機動車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じく。実に見事なものだと感心しました」
2408 = "「我也深有同感。真是相當了不起的傑作」" 

# monologue
# JP: 日々姫の声に頷けば、『来たばかり故、まだなんとも』と、\n出しかけていた言葉がするり、入れ替わる。
3085 = "我附和了日日姬的話，把話到嘴邊的“新來乍到，不好妄加評論”給咽了回去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「初期投資のコストは莫大なものになりそうですが……\nあれなら、運用コストは極限的に下げられましょう」
2542 = "「看起來這工程的前期投入應該相當可觀……但運營成本可以被控制到極低的水準吧」" 

# 【姜】
# display as 姜
# JP: 「さすがのご慧眼です。エアクラバス等を選択するなら、\nなかなか消耗部品がかさんでしまいますからね」
2096 = "「先生果真是慧眼識珠，若是選用空凝機巴士等方案的話，都難免會產生大量的耗材費用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……消耗の少なそうな車体とお見受けしました」
2555 = "「確實……這車體一眼看起來就是耐耗損的設計」" 

# monologue
# JP: モノレール路線は全てがチューブ状の……\nアクリルかなにかのカバーですっぽり覆われていた。
2980 = "單軌線路都是架設在……似乎是亞克力或是類似的其他材料的管狀通道裡。" 

# monologue
# JP: ゆえ、モノレールの車体自体の屋根は省かれ、\n見るからに軽量化、省部品化を図られていた。
3090 = "所以單軌車輛自身就無需再設置頂棚，進而得以降低重量，減少零件數目。" 

# 【ハチロク】
# display as 八六
# JP: 「鉄輪・[こざ,1]跨座式と申しますより――そうですね、\n半浮上式とも呼びたくなるように思えました」
2502 = "「比起傳統的跨座式……我想想，或許用半懸浮式來形容更適合吧」" 

# 【姜】
# display as 姜
# JP: 「然り。飛行型エアクラの技術を一部応用し、\nガイドレールと鉄輪の接触を最低限に抑えています」
2507 = "「沒錯。部分採用了航空型空凝機的技術，將軌道與車輪間的接觸降低到最低的程度」" 

# monologue
# JP: 姜さんの目がふと緩む。
3017 = "姜小姐的眼神顯出一抹笑意。" 

# 【姜】
# display as 姜
# JP: 「右田先生がご慧眼なら、\n右田先生のレイルロオドもやはりご慧眼だ」
2022 = "「不但右田先生慧眼如炬，您的鐵路人偶果然也是眼光獨到啊」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……わたくし――そのっ、\n大変恐縮でございます」
2218 = "「啊……我——哪有，您太過獎了」" 

# monologue
# JP: 心強い。ハチロクも日々姫も、それぞれの目で、\nそれぞれの専門分野をしっかり観察してくれている。
2872 = "一股安心感湧上心頭。八六和日日姬，都在以各自的視角，觀察著自己專業領域內的各個方面。" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか、そんならレールとかに負荷の殆どかからんけん、\n消耗部品のコストば、めちゃくちゃ抑えられるとね」
2133 = "「原來如此，這樣的話軌道的負荷就輕到幾乎可以忽略咧，耗材成本也就可以控制得相當低咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。初期投資がどれほど莫大になろうとも――」
2533 = "「的確。這樣哪怕前期投入再大——」" 

# monologue
# JP: ……立ち話のかたちになっている僕らの脇を、\nひっきりなしに入国者たちが通り過ぎていく。
1629 = "……我們就這樣在原地站著聊了起來，而其他到達的乘客如同潮水般與我們擦肩而過。" 

# monologue
# JP: 御一夜がもっとも賑わう赤井さんの“おくんち”でも、\nこれほどまでの盛況を見ることは難しかろう。
2985 = "在御一夜，即便是頂頂熱鬧的赤井神社“秋大祭”，怕是也難見如此場面吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「都度のランニングコストを抑えることで回収していく。\n旧帝鉄がかつて目指した、全線電化と同じ発想だな」
2061 = "「以降低單次運行成本的方式回收成本，和前帝國鐵路當年的目標，全線電力化可算是異曲同工了」" 

# monologue
# JP: 僕の言葉に、姜さんは力強く頷いてくれる。
3015 = "姜小姐深深點頭，對我的話表示贊同。" 

# 【姜】
# display as 姜
# JP: 「我が仲国は総人口13億強の巨大国家です。\n北琴空港の年間利用客数も、1億人を優に超えます」
2074 = "「仲國是擁有超過１３億人口的巨大國家。僅以北琴機場為例，每年的旅客吞吐量就輕鬆超過一億人次」" 

# 【ハチロク】
# display as 八六
# JP: 「……日ノ本の外国への玄関口。\n[なりた,1]鳴多空港の年間利用客数は3500万人程度だそうです」
1699 = "「……聽說被稱作日本通向外國門戶的成田機場，年旅客吞吐量大概是３５００萬人左右」" 

# 【日々姫】
# display as 日日姬
# JP: 「！！？　そぎゃんと違かと！？」
2762 = "「！！？怎麼能差這麼大嘞！？」" 

# monologue
# JP: ハチロク越しに西瓜を見れば、にこり、誇らしげな笑み。\nなるほど、共感での入れ知恵か。
3094 = "抬頭向八六身後看去，只見西瓜調皮而又滿懷驕傲地微笑著。原來如此，是通過共鳴互相分享的知識啊。" 

# monologue
# JP: 共感での情報収集を早速試み、成功させてくれた――\nその実直さが、なんとも嬉しく心強い。
3266 = "這麼快她就開始嘗試通過共鳴搜集情報並收穫成功——她正直務實的作風真讓人既欣喜又放心。" 

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本だって、海外旅行する人も海外からのお客さんも、\nめーっちゃたくさんおるとに――」
2457 = "「明明日本出國旅行的人，還有來旅行的外國人，都已經算是絡繹不絕了的說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その更に三倍、か。しかも仲国は広大だ。\n同クラスの空港も、恐らく複数箇所あるのだろう」
1703 = "「……這裡直接是日本的三倍嗎。而且仲國幅員遼闊，同樣等級的機場恐怕也不止一處吧」" 

# 【姜】
# display as 姜
# JP: 「おっしゃる通りです。だけでなく、空港の無い\n大きな都市には、必ず大規模な鉄道駅が存在します」
2508 = "「沒錯，正如雙鐵先生所言。而且，在沒有機場的大城市，相應的就會有大規模的火車站」" 

# 【双鉄】
# display as 雙鐵
# JP: 「13億人と、その人々の暮らしをささえる物資とか――\n移動・輸送のコストがどれ程になるか、想像もできんな」
2764 = "「１３億人，以及支撐這麼多人口日常生活的各種物資等等——這些的移動和運輸成本會是怎樣的規模，真是難以想像」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、都度のランニングコストを抑えることば、\nめーっちゃ重要になってくるとね？」
2144 = "「可不唄，降低單次運行成本，就顯得更加重要了不是？」" 

# 【ハチロク】
# display as 八六
# JP: 「定点間の低コスト大量高速輸送！\nそれこそ、鉄道の最も得意とすることでございます！」
2261 = "「在固定地點之間的低成本大量高速運輸！這不正是鐵路最擅長做的事情嘛！」" 

# 【姜】
# display as 姜
# JP: 「然り、然り」
2509 = "「沒錯，沒錯」" 

# monologue
# JP: 勢い混んだハチロクの声を、\n姜さんは涼やかな笑顔で受け入れる。
2935 = "八六的話語中充滿了幹勁，而姜小姐則以波瀾不驚的笑容表示了肯定。" 

# monologue
# JP: なるほど、ならば――
2961 = "原來如此，那就是說——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした必要性の高さをPRする広告塔――といった\n位置づけになりますでしょうか？　今回のこの」
2719 = "「那我們此行的任務，其實就是樹立一個樣板，以宣傳這樣的成本控制究竟有多大的必要性，對吧？」" 

# 【姜】
# display as 姜
# JP: 「ああ……申し訳ありません。そこをご説明申し上げ、\n発想の枠が狭まることを、当方は懸念しております」
2222 = "「啊……非常抱歉。由於我方擔心會局限住諸位的想像力，所以尚且無法做出解答」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2130 = "「原來如此」" 

# monologue
# JP: 言われればごく当然のことだ。\n人は、自分の思考の正当性を補強する材料を探してしまう。
3068 = "想想也對。人總是會不自主地為自證觀點去搜集各種材料。" 

# monologue
# JP: ゆえ、最終的に目指すところを知ってしまえばその時点で、\nゼロベースでの視察など、到底不可能となるだろう。
3091 = "所以，一旦得知了最終的目的，便再也無法以“中立、不設前提”的狀態進行考察了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『仲国視察と、仲国版ナインスターズに関する立案』\n……その理由を探すこともまた、視察の一部なのですね」
1651 = "「“前往仲國考察，以及草擬仲國版九星的設計方案”……看來找出更深層次的原因也是考察的目的之一啊」" 

# 【姜】
# display as 姜
# JP: 「はい。この依頼の背景にあるものも、右田先生たちには、\n必ずや見出していただけるものと確信しております」
2506 = "「沒錯。我們相信諸位一定能夠了解到這次委託的背景，以及深層次的原因」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご信頼をありがとうございます」
2120 = "「十分感謝對我們的信任」" 

# monologue
# JP: 稀咲を通じ、一体どれ程の情報が行っているのだろうか。\nが、稀咲由来なら、質的には極めて妥当な物であろう。
3272 = "雖然不清楚對方透過稀咲了解了多少我們的情況，但稀咲應該會如實反映，不會加以誇大吧。" 

# monologue
# JP: そこからくだされた評価に恥じることがないよう、\n僕もまた、僕の役割をきちんと果たそう。
3158 = "為了不辜負她對我們的評價，我也必須履行自己應盡的責任。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、早速視察に入らせていただきたいのですが――\n今のお話の流れですと」
2304 = "「好的，我們希望儘快開始考察，但從剛才話題的意思來看——」" 

# 【姜】
# display as 姜
# JP: 「ですね。\nご視察先の希望を、大まかにでも頂けましたら」
2459 = "「是啊。就請幾位先考慮一下想去哪裡考察，定個大方向吧」" 

# 【日々姫】
# display as 日日姬＆八六
# JP: 「やったら、駅ば！」\n「でしたら、駅を！」
2283 = "「好哎，車站唄！」\\n「那就，車站吧！」" 

# monologue
# JP: ふたりの声がぴたりと重なる。\n無論、僕も同じ気持ちだ。
2921 = "兩人異口同聲地回答道。當然，我也有同樣的想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことなので、駅へご案内いただけませんか？\nまずは、生きている列車たちをみてみたい」
2538 = "「看來大家都意見一致了，可以麻煩帶我們去車站嗎？想先看一看還在運行的列車」" 

# 【姜】
# display as 姜
# JP: 「かしこまりました。\n西瓜？」
2307 = "「好的，明白了。西瓜」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は了解しました！　姜秘書」
2616 = "「西瓜明白！」" 

# monologue
# JP: 現場のことはレイルロオドにという意図であろうか。\n姜さんの極めて短い指示を受け、西瓜が元気に歩き出す。
3013 = "姜小姐幹練地發出了簡短的指示，看來是把嚮導任務委派給了鐵路人偶。西瓜也心領神會，精神飽滿地帶著一行人出發了。" 

# 【西瓜】
# display as 西瓜
# JP: 「それでは西瓜はみなさんを、北琴駅――\n仲国最大のターミナル駅に、ご案内します！」
2731 = "「那西瓜就帶大家去北琴站——仲國最大的總站！」" 

# 【日々姫】
# display as 日日姬
# JP: 「……驚いたー。きっぷ売り場に入るのに、身体検査と\nパスポートチェックと手荷物検査があるなんて！」
1696 = "「……真是嚇到我了，進售票處竟然就要搜身和檢查護照和行李唉！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2244 = "「嗯嗯」" 

# monologue
# JP: それだけあって、規模も設備も壮観だ、\n日々姫のスケッチだけに任せず、僕も撮っておくべき――
2997 = "如此大的規模，設備之齊全自是令人嘆為觀止，看來不能只讓日日姬一個人畫，我也該都拍下來——" 

# 【姜】
# display as 姜
# JP: 「ああ、双鉄先生。駅施設内では、\n写真撮影は控えた方が安全です」
2227 = "「啊啊，雙鐵先生，在站內還是請您不要拍照」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　――む！」
2252 = "「嗯？——呃！」" 

# monologue
# JP: 警備のための人員であろうか――
3148 = "有一個身穿制服在售票廳巡邏的男性，正以很不友好的視線看著我手上的照相機。" 

# monologue
# JP: きっぷ売り場を巡回している制服姿の男性が、\n僕の手――カメラに、咎めるような視線を向けている。
3169 = "看起來他應該是安保人員。" 

# 【姜】
# display as 姜
# JP: 「仲国では、駅施設は保安の対象となるのです。\n外国人が写真撮影をすると、身体検査をされかねません」
2265 = "「在我們仲國，車站設施也屬於安保對象，要是外國人在這裡拍照，有可能會被搜身」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご助言、ありがとうございます。控えます」
2398 = "「感謝您的忠告，我會注意的」" 

# monologue
# JP: カメラをしまえばすぐさまに、保安員氏はまた巡回に戻る。
3168 = "看我將照相機收好，安保人員就回到了巡邏中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……空港並のセキュリティチェックの厳しさだな。\nこれは、北琴駅だけ、特別に厳しいものなのですか？」
2685 = "「這安檢的嚴格程度堪比機場了啊，是只有北琴站會這樣特別嚴格嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知るどこの駅でもセキュリティチェックはあります。\nその中でも北琴駅は特に厳しいと西瓜も感じています」
2349 = "「就西瓜所知各地的火車站也都是有安檢的。不過北琴站相對而言也算是尤為嚴格的了」" 

# 【ハチロク】
# display as 八六
# JP: 「どこでも？　どのような地方の小さな駅でも、\nこのような厳しい立ち入り検査を？」
2167 = "「各地都有？不管多小的站，都要進行這樣嚴格的進站安檢嗎？」" 

# monologue
# JP: 僕らにも聞こえるようにだろう。\nハチロクはあえて、声での質問を投げかけてくれる。
2929 = "八六特地開口詢問，想必是也想讓我們一起聽到答案吧。" 

# monologue
# JP: それに意表をつかれたわけでもなかろうが、\n一瞬、西瓜は困ったような顔になる。
3217 = "西瓜似乎對於八六開口而非通過共鳴詢問有些詫異，臉上一時現出了些許為難的表情。" 

# 【西瓜】
# display as 西瓜
# JP: 「……[Ｘｉ　　ｊｉｕ,1]悉究……悉究」
1681 = "「……悉究……悉究」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しーじぉ？」
2765 = "「Ｘｉｊｉｕ？」" 

# 【ハチロク】
# display as 八六
# JP: 「[しつきゅう,1]悉究。[ことごと]悉くを追求する――\n徹底的な原因追求という意味の様です。つまりここでは」
1690 = "「……是“事無大小，悉究本末”的意思。所以，她是——」" 

# 【日々姫】
# display as 日日姬
# JP: 「細かなとこまでちゃーんと伝えようとしてくれて、\n悩んどる……いう感じ？」
2267 = "「在煩惱究竟要詳細解釋到怎麼樣的程度……是這樣嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい！　そのような心の動きでもれてきた、\nいわゆる、これは、独り言かと」
2497 = "「正是！她心裡現在正是這麼想的，也就是說，這是在自言自語」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2243 = "「嗯」" 

# monologue
# JP: 独り言を漏らした背景などは、\n本人もなかなか自覚しづらいことだろう。
3192 = "自言自語背後隱藏的含義，本人怕是也很難意識到吧。" 

# monologue
# JP: そこまで共感を開いて西瓜は僕らを信頼し――\nその上で、誠実に対応しようとしてくれているのか。
3026 = "將如此深層次的思維共鳴給八六，這充分說明西瓜是多麼信賴我們——或者更進一步說，她是多麼開誠布公地和我們交流。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知る範囲で、仲国には、日ノ本的な『小さな駅』。\n改札とホームのみといった構造の駅は存在しません」
2354 = "「就西瓜所知，在仲國並沒有日本那種，只設有檢票口和站台的“小站”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「改札とホームに加え……ああ。\nこのような大規模なきっぷ売り場が必ずある、とか？」
2747 = "「除了檢票口和站台之外……哦，都有這樣的大型售票處是嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「大規模というより、日ノ本語だと……ん……」
2594 = "「與其說是大規模……這個用日語要怎麼說呢……」" 

# 【ハチロク】
# display as 八六
# JP: 「『[べつむね,1]別棟』が好適な言葉かと」
1653 = "「“獨棟”應該是個妥當的描述」" 

# monologue
# JP: 西瓜の顔がパッと輝く。\nなるほど、共感は便利なものだ。
3227 = "西瓜臉上瞬間閃出歡快的光芒。原來如此，共鳴確實相當便利。" 

# monologue
# JP: 西瓜の中にある”概念”に、ハチロクが適切な日ノ本語を\nパチンとハメてやったのだろう。
3066 = "想必是西瓜腦海中浮現出來一個“概念”，八六便隨即找出了最貼切的日語詞彙。" 

# 【西瓜】
# display as 西瓜
# JP: 「別棟です。どのような小規模駅でも、きっぷ売り場は。\nつまり、この北琴駅と同じような建屋構造になります」
2338 = "「就是獨棟。不管車站的規模多小，售票處都是和北琴站這裡一樣，存在相仿的獨棟建築」" 

# 【日々姫】
# display as 日日姬
# JP: 「同じような建屋構造……」
2535 = "「相仿的獨棟建築……」" 

# monologue
# JP: 日々姫がすぐさまスケッチブックを開いてみせる。
3138 = "日日姬馬上打開素描簿翻看起來。" 

# monologue
# JP: つい先程、夢中になって描きまわっていた北琴駅の外観が、\n動感豊かで的確な線により、浮き上がってくる。
3182 = "素描簿上，是她剛剛才在站外埋頭畫下的北琴站外觀。動感的線條讓北琴站的形象躍然紙上。" 

# 【日々姫】
# display as 日日姬
# JP: 「どの駅でも、きっぷを買ったらいったん駅の外に出て。\n別の入口からの駅本屋への再入場が必要――になると？」
2199 = "「哪裡的車站都要在買完票之後先走出站外，然後再從別的入口進入車站主棟，是這樣嗎？」" 

# monologue
# JP: とたんに、ぴょこん――\n小さく西瓜のおさげが跳ねる。
3077 = "我話音剛落，西瓜便興奮地跳了起來，馬尾辮隨之躍動。" 

# 【西瓜】
# display as 西瓜
# JP: 「わ！　素晴らしい悉究です！　外観とこの部屋とから、\n建屋構成の意図を読み取られるなんて！！」
2180 = "「哇！這是何等悉究！從外觀和這棟建築，就了解了整體建築的設計思路！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「そりゃ、ざらっとでも描いたけんね！\nそれに、セキュリティチェックもこぎゃんと厳しかけん」
2682 = "「這個嘛，雖然只是草稿，但畢竟已經畫了一遍，而且，安檢又這麼嚴格，想想就都聯繫起來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2243 = "「嗯」" 

# monologue
# JP: 日々姫の手のスケッチブックを確認し、\n周囲をぐるり、見渡してみる。
3078 = "我認真看了一下日日姬手裡的素描簿，而後環視周圍。" 

# monologue
# JP: 僕らの並ぶ窓口の後方にある扉はなるほど――\n駅本屋やホームではなく、外へと向かう出口となるのか。
2960 = "原來如此，我們正在排隊的窗口正對的門，並不是通向本棟，而是去往站外啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「きっぷを購入後には必ず一度建屋の外に出し、\n駅本屋への再入場時に、もう一度の安全検査を行う」
2644 = "「買好車票後必須先走出車站，然後再進入車站本棟，這時還要再進行一次安檢」" 

# monologue
# JP: そのための、別棟入り口二箇所構造。\n利用客にとっては面倒が嵩んでもしまいそうだが――
3159 = "為配合這樣的流程而設計的獨棟布局，對於乘客而言多有不便——" 

# 【ハチロク】
# display as 八六
# JP: 「なぜ、そのような手間をかけるのでしょう？」
2523 = "「為什麼要弄得這麼複雜呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「危険物の持ち込みを阻止する確率を上げるためと……\nもともとはきっぷの転売防止の意味もあると習いました」
2522 = "「為了降低危險品被帶入站內的機會……其實本來還有另一個原因，就是防止倒賣車票」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……きっぷには購入者の個人情報が記載される\nこととなるのか？」
2694 = "「這麼說來……車票也是要記錄個人訊息的，對嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「！」
2759 = "「！」" 

# monologue
# JP: 西瓜のおさげがまた跳ねる。
3225 = "西瓜的辮子再次在空中舞動。" 

# monologue
# JP: 表情の動きが日々姫ハチロク程には見えぬだけに、\nそこが一際、西瓜の驚きを表したようにも感じられる。
2963 = "原本她神情的變化沒有日日姬和八六那般明顯，所以此時更能讓我認識到她此時有多麼驚訝。" 

# 【西瓜】
# display as 西瓜
# JP: 「今の会話だけでそこまで見抜かれてしまうとは……\n右田先生もさすがの悉究です。西瓜は感服します」
2239 = "「單憑這番對話就能得到如此多的訊息……右田先生果真是善於悉究之人，西瓜實在佩服」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ。きっぷに個人情報が記されるのでしたら、\n改札前の再入場時の身分証提示で見比べられるのですね」
2189 = "「哦，如果車票記錄了個人身份訊息，那麼就能在檢票時拿乘客的身份證進行比對了」" 

# 【日々姫】
# display as 日日姬
# JP: 「それで転売防止になるし……個人情報書いてあるきっぷ、誰かに売るとか、その時点でもう結構イヤよね、うん」
2688 = "「這樣就能防止倒賣行為……一般也不會有人願意把記錄有自己身份訊息的車票賣給別人嘛，對不對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よく出来た転売防止策だとこちらが感服するが……。\nしかし――この盛況でも、『もともとは』なのか」
2328 = "「實屬巧妙的防倒賣措施，值得佩服……但就是如此繁盛之景，也難以和“本來”相比嗎」" 

# monologue
# JP: きっぷ売り場の窓口は6箇所ほどが開かれており\nその全てに、10人規模の行列が発生している。
2978 = "售票處開了六個窗口，每個窗口前都排了十個人左右的隊伍。" 

# monologue
# JP: ……日ノ本ではなかなかお目にかかれなかろう大盛況だが、\nそれでも今は、きっぷ転売が発生しないということならば。
1625 = "……在日本，這樣的場面著實難得一見，但即便如此，按西瓜的說法，現在倒賣車票的情況已經基本杜絕了。" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば、つまりは、\n以前はもーっと混雑ばしとったいうことと？」
2706 = "「那也就是說……以前排隊買票的人更多嗎？」" 

# 【姜】
# display as 姜
# JP: 「はい、そのとおりです――っと、順番が次ですね。\n皆さん、パスポートを私に預けてください」
2496 = "「正是——啊，下一個就到我們了。請大家把護照都交給我吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
2233 = "「啊，好的」" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁい。……っていうか、単なる入場券買うのにも\nパスポートば必要――個人情報の記載ばあると？」
2280 = "「好……話說回來，買個門票還得要護照——登記個人訊息嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜の知る全ての仲国の鉄道駅には、\n入場券というシステムがありません」
2352 = "「就西瓜所知，全仲國的火車站，都不賣所謂門票的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2470 = "「是這樣的嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「そうなのです。だから、駅のホームに入って、\n実際に列車を見学したいときなどにも――」
2345 = "「就是這樣。所以，想要去站台近距離看火車就得——」" 

# 【姜】
# display as 姜
# JP: 「お待たせしました。無事に購入できました」
2630 = "「諸位久等，票買好了」" 

# monologue
# JP: ほっとした顔の姜さんが、\n僕らにパスポートを返却し、同時に紙片を渡してくれる。
3206 = "表情看起來鬆了一口氣的姜小姐，把護照還給我們同時，還給我們每人發了一張小紙片。" 

# 【ハチロク】
# display as 八六
# JP: 「これは……普通のきっぷでございますね」
2686 = "「這是……普通的車票啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。こうするしか手がないわけか」
2131 = "「原來如此，只能透過這種變通的方法」" 

# monologue
# JP: 日ノ本のきっぷ同様に、発駅と目的駅と料金などと……\n意味の読めない数字や記号などもある。
2976 = "和日本國的車票相同，這上面寫有起始站以及價格……還有一些不明所以的數字和記號。" 

# monologue
# JP: このいずれかが、恐らくは暗号化された個人情報――\n例えばパスポートナンバー等を示しているものなのだろう。
3076 = "我猜這一列字元應該是加密處理後的個人身份訊息——依我們的情況來說，大概就代表護照號。" 

# 【日々姫】
# display as 日日姬
# JP: 「見られるんならなんでもよかとよ！　なら早速――って、ええと、ここを出てから、どうするんでしたっけ？」
2589 = "「能看到就怎麼都無所謂囉！那咱趕快——我想想，要先從這裡出去，然後怎麼走來著？」" 

# 【姜】
# display as 姜
# JP: 「進站口からセキュリティチェックを再度受けて駅本屋に\n入って。その上で改札時間になったらホームへ入れます」
2269 = "「在進站口再次接受安檢進入車站本棟。等到了檢票時間就可以去站台了」" 

# 【日々姫】
# display as 日日姬
# JP: 「その、改札時間っていうのは？」
2691 = "「這檢票時間是指什麼呢？」" 

# 【姜】
# display as 姜
# JP: 「列車の出発の大体30分くらい前ですから――」
2335 = "「就是列車出發前大約三十分鐘——」" 

# monologue
# JP: 言って、姜さんはその手の中のきっぷを見つめる。
3267 = "邊說，姜小姐邊低頭確認了一下手中的車票。" 

# 【姜】
# display as 姜
# JP: 「まだ少し待たなければなりませんね」
2693 = "「這還要等上一會呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー。そぎゃん仕組みなら、待つしかなかとねー」
2224 = "「啊。既然流程是這樣，那就只能等咯」" 

# monologue
# JP: 日々姫の視線もきっぷへ落ちる。
3129 = "日日姬也低頭看起了車票。" 

# 【日々姫】
# display as 日日姬
# JP: 「北琴駅から……通衆西駅……\nこの、K1189というのは――どぎゃん意味と？」
2364 = "「從北琴站開往通洲西站……這個Ｋ１１８９是什麼意思啊？」" 

# 【西瓜】
# display as 西瓜
# JP: 「それは列車番号となります。K1189列車は、\n[ウランホト,3]烏羊浩特駅が終着の、快速列車です」
2726 = "「那是列車的車次，Ｋ１１８９次列車是開往乎合浩特站的快速列車」" 

# 【日々姫】
# display as 日日姬
# JP: 「快速列車でＫ！　わかりやすかとね～」
2384 = "「快速列車就是Ｋ！好直觀哦～」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい！　西瓜もわかりやすいと思います。\n仲国でも快速は快速。発音は『Kuai－su』ですから」
2462 = "「是的！西瓜也覺得很直觀。仲國的快速和日文文字相同，讀作“Ｋｕａｉ－ｓｕ”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。同じ漢字圏ならではの面白さだな。\nならば――特急列車もそのまま特急になるのかな」
2255 = "「噢，這真是同在漢字文化圈的醍醐味啊。這麼說，特急列車同樣也是特急二字嗎」" 

# 【西瓜】
# display as 西瓜
# JP: 「それが少しだけ違ってきます。日ノ本でいう特急列車は、\n[とっかい,1]特快――Te－kuai、T列車になります」
2683 = "「這個就有一點點不同了。日本的特急列車，對應的是特快，讀作“Ｔｅ－Ｋｕａｉ”，簡寫是Ｔ」" 

# 【ハチロク】
# display as 八六
# JP: 「旧帝鉄には無いものですね。特別快速――鉄道が順調に\n発展していれば、発生した列車種別かもしれませんが」
2114 = "「前帝國鐵路就沒有這個分類，特別快速——這是拜鐵路日新月異的發展所賜，才產生的新的列車類型吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「仲国には、さらに特快の上の列車種別もあります。\n直達特快――Zhi－da Te－kuai。これが最速のZ列車です」
2259 = "「在仲國，還有一種位居特快之上的列車。直達特快——Ｚｈｉ－ｄａ　Ｔｅ－ｋｕａｉ，就是最快的Ｚ列車了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「特快よりも、更に停車駅が少ないのか？」
2500 = "「比特快停站更少嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい！　少ないのです！」
2461 = "「是的！比特快更少！」" 

# monologue
# JP: ご自慢なのか、西瓜のおさげがひょこんと踊る。
3228 = "西瓜長長的辮子隨著她彰顯自豪的動作而跳動。" 

# 【西瓜】
# display as 西瓜
# JP: 「その上牽引列車が東富4D。西瓜たちの東富4の改良機で、\n運転最高速度は、実に時速145kmにも達します！」
2529 = "「牽引那些列車的是東富４Ｄ，是我們東富４的改良型，最高運營時速可以達到１４５ｋｍ！」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！？」
2232 = "「啊！！！？」" 

# monologue
# JP: 一瞬にして、ハチロクの目がまんまるになる。
2939 = "八六瞬間被驚得瞪大了眼睛。" 

# monologue
# JP: 驚きのあまりであろう、\n口がわななき、言葉をすぐには出せない様子だ。
3265 = "這衝擊著實非同小可。看八六這瞠目結舌的樣子，看來是要緩一緩才說得出話了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「運転最高速度――というのは、\n営業運転中に145km／hを出す区間があるということか？」
2477 = "「最高運營時速——按這個說法的話，實際運營中就有可以達到１４５ｋｍ／ｈ的路段嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「そういうことです！」
2628 = "「說得沒錯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……凄まじいな。\n営業運転としては、世界最高速ではないのか？」
1694 = "「……真是了不起。就實際運營而言的話，應該是全世界最高時速了吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「……厳密には精査しないとわかりませんが……\nその領域の一つであることには、間違いないかと」
1663 = "「……不進行嚴密考證的話不好斷言，但位居頂尖之列應該是毋庸置疑的」" 

# 【日々姫】
# display as 日日姬
# JP: 「すごかね、仲国の鉄道」
2075 = "「仲國鐵路真厲害呀」" 

# monologue
# JP: 日々姫の素直な称賛を受け、西瓜は瞬時、表情をゆるめ。\nけれどもすぐに、元の落ち着いたものへと戻してしまう。
3188 = "聽到日日姬由衷的稱讚，西瓜顯得有些喜形於色，但隨即就又恢復到剛才不苟言笑的樣子。" 

# 【西瓜】
# display as 西瓜
# JP: 「改良を重ねているとはいえ、東富4Dも既に20年近く前の\n機関車です。機関車の新規開発は、そこで中断しました」
2093 = "「儘管進行過各種改進，但東富４Ｄ也已經是將近２０年前的機車了。而新機車的開發工作，在那之後就中斷了」" 

# 【ハチロク】
# display as 八六
# JP: 「……それでも、ほんの20年前までは新型機関車の……\n鉄道車輌の製造開発をしていたのですね――」
1673 = "「……反過來說，就是仲國直到差不多２０年前還在進行新機車——鐵路車輛的製造與開發是嗎」" 

# monologue
# JP: ……ハチロクの声には、隠しきれない悲しみが滲んでいる。\nいや、口惜しさ――あるいは、羨望と呼ぶべきものが。
1623 = "……八六難掩話語中的悲傷。其中，抑或摻雜著遺憾，也許還有著一絲羨慕。" 

# monologue
# JP: 20年前まで、もしも帝鉄が新規車輌開発を続けていたら、\nいったいどんな列車が産まれていたのであろうか――
2994 = "如果帝國鐵路也能繼續新車輛的開發直到２０年前，又會創造出怎樣的新型列車呢——" 

# 【日々姫】
# display as 日日姬
# JP: 「そのこ、見れると？　私見たかと！\n今日のこの時間の北琴駅に、入線しとーと？」
2590 = "「能見見那些機車嗎？今天這個時間，有停靠在北琴站的嗎？」" 

# monologue
# JP: 重くなりかけた空気を感じ、意図的にだろう、\n不意に日々姫が場違いなほど、明るく脳天気な声をだす。
3087 = "或許是感受到了身邊沉重的空氣而有意為之，日日姬忽然發出明快而不帶一絲煩惱的聲音，趕跑了尷尬的氣氛。" 

# 【西瓜】
# display as 西瓜
# JP: 「あ…………ん！　はい。入線しています。\n東富4Dレイルロオドが、ちょうど出発準備をしています」
2213 = "「啊…………嗯！有的，有正停靠在站裡的東富４Ｄ，其鐵路人偶在做出發準備」" 

# 【日々姫】
# display as 日日姬
# JP: 「それならわたし！　そのこのスケッチしたかと！\nそれともし、乗れるものなら乗ってみたかと！！」
2720 = "「那我想看看，給機車畫個素描！要是可以的話，最好能坐一坐！！」" 

# 【姜】
# display as 姜
# JP: 「今日すぐのご乗車はもろもろの手配の関係で困難です。\nが、出来るだけ早い列車のきっぷを手配しましょうか？」
2257 = "「因為要做諸多準備工作，今天的話恐怕很困難。不過我們會提供車票讓各位儘早坐上列車，不知意下如何？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうしてもらえるならわたしは！　――って、\nもちろん、にぃにとハチロク次第だけど」
2145 = "「可以的話我當然——還是要聽阿哥和八六的啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も乗りたいが、北琴で見るべきを逃したくもない。\n例えば……北琴に、鉄道歴史館的なものがあるなら」
2405 = "「我也很想坐，但要是錯過了北琴該遊覽的地點就不好了。比方說……北琴有沒有展現鐵路歷史的博物館之類」" 

# 【西瓜】
# display as 西瓜
# JP: 「ものがあります。仲国鉄道歴史館という施設が、\n北琴の郊外に存在しています」
2481 = "「有的，名字叫仲國鐵路博物館，就位於北琴近郊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、そこ！　そこももちろん見てみたかとよ。\n仲国の鉄道について、ザラっとでも勉強したかけん」
2237 = "「啊，那裡好！那裡當然也得去！早就想了解一下仲國鐵路的知識咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、明日はそこと――他にも北琴周辺におすすめの\n鉄道スポットがあれば、あわせて見学させてください」
2724 = "「那明天就去那裡吧。如果北琴周邊還有什麼其他推薦的鐵路相關的地點，就請安排在一起讓我們參觀吧」" 

# 【姜】
# display as 姜
# JP: 「しかと承りました。西瓜。あとで打ち合わせましょう」
2309 = "「好的，明白了。西瓜，回頭我們研究一下」" 

# 【西瓜】
# display as 西瓜
# JP: 「はい、姜秘書！　西瓜はあとで打ち合わせます」
2302 = "「好的，姜老師！西瓜回頭會和您一起商討」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その後……あさっての朝から乗車――\nといったスケジュールでどうだろうか？」
2689 = "「這樣的話，接下來在後天早上搭車出發，這樣的安排大家覺得怎麼樣呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「賛成！」
2646 = "「贊成！」" 

# 【ハチロク】
# display as 八六
# JP: 「さすが双鉄さまです。\n理想的なスケジュウルではないかと、わたくしも」
2748 = "「雙鐵少爺安排得是。在我看來，如此制定行程非常妥當，我自然也贊成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、ご無理なければそのように願いたいのですが」
2732 = "「那麼如果可行的話，我方希望能這樣安排」" 

# 【姜】
# display as 姜
# JP: 「承りました。どのような列車で、\nどのような目的地への乗車をご希望されますか？」
2305 = "「好的，明白了。不知諸位想要乘坐怎樣的列車，前往哪裡呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2681 = "「這個嘛……」" 

# monologue
# JP: ハチロク日々姫に視線を送れば、\n日々姫がはい！　と手をあげる。
2927 = "八六把眼光轉向了日日姬，日日姬則是毫不猶豫地舉起了手。" 

# 【日々姫】
# display as 日日姬
# JP: 「仲国の人が、北琴から何泊かの旅行にいく！\nみたいなとき、メジャーな旅先ってどこですか？」
2687 = "「這樣問好了，在“要從北琴出去玩幾天！”的時候，仲國人大多選擇去哪裡旅行呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。帝都発で例えるのなら、\n北開道、京塗、九洲といった感じの、大定番の旅先か」
2483 = "「有道理，換成在我們那裡，從帝都出發，就有北海道、京都、九州之類的幾大主流旅遊勝地」" 

# 【西瓜】
# display as 西瓜
# JP: 「そうですね――[せいあん,1]栖安、[せいねい,1]栖寧、[せいと,1]聖都、[こんめい,1]坤明、[あもい,1]厦問。[なんきん,1]南琴。\n[そしゅう,1]蘇洲。[こうしゅう,1]広洲。[ハルビン,2]哈爾瓶。もちろん[シャンハイ,1]上杯、[ホンコン,1]紅港等も人気です」
2634 = "「讓我想想——有栖安、棲寧、盛都、坤明、廈問、南琴、蘇洲、廣洲、哈爾賓等等，當然上烸、箱港也非常熱門」" 

# 【ハチロク】
# display as 八六
# JP: 「……ああ、さすが仲国は広大なのですね。\n候補だけでも多すぎて、わたくし、目がまわりそうです」
1678 = "「……噢噢，切身感受到仲國的地大物博了。選擇實在太多，我已經感到眼花撩亂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば別方面から考えてみよう。ハチロクは、\n仲国で乗りたい列車や、見たい列車などはあるか？」
2715 = "「那就換個思路吧。八六你有想在仲國乘坐，或是親眼看一看的列車嗎？」" 

# monologue
# JP: 問えば、ハチロクはわずかにはにかむ。
3189 = "聽我一問，八六突然靦腆而笑。" 

# 【ハチロク】
