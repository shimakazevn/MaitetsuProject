# 【志寰】
# display as 志寰
# JP: 「日ノ本の先生たち。申し訳ないです。\nすぐ、話をしてきます」
2164 = "「各位日本來的客人，非常抱歉。我這就去幫忙交涉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すみません、ありがとうございます」
2026 = "「不好意思，非常感謝」" 

# monologue
# JP: にこやかに笑って、志寰氏はすぐ、\n姜さんと制服姿の青年の間に――
3056 = "志寰隨即帶著爽朗的笑容，加入了姜小姐和身著制服的青年的談話中——" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2176 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……」
2677 = "「這……」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！」
2171 = "「呀！！！！」" 

# monologue
# JP: 志寰氏が取り返してくれたスケッチブックに、\n日々姫が飛びつく。
3165 = "看到志寰先生拿回了素描簿，日日姬飛也似地迎了上去。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとう！　あの、ありがとうございます！！」
2633 = "「謝謝！啊，非常感謝！！」" 

# 【志寰】
# display as 志寰
# JP: 「いえいえ。お役にたててよかった」
2198 = "「哪裡哪裡，很高興能幫上忙」" 

# monologue
# JP: 日々姫はよほどほっとしたのか、\n目のふちに涙まで浮かべている。
3135 = "日日姬緊繃著的弦一下子鬆了下來，眼角也不由得泛起了淚花。" 

# 【日々姫】
# display as 日日姬
# JP: 「姜さんも、西瓜ちゃんも、ありがとうございました！\nわたし次からはちゃんと、聞いてから動くようにします」
