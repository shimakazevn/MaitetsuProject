# 【日々姫】
# display as 日日姬
# JP: 「よろしくおねがいします。志寰機関士。\n助けていただき、本当にありがとうございました」
2629 = "「請多指教，志寰司機。非常感謝剛才您為我解圍」" 

# 【志寰】
# display as 志寰
# JP: 「ああ……その……\nからこまられるとボクが困ってしまいます」
2220 = "「啊……這個……二位這樣畢空畢慶的，我都不知道該怎麼辦好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2253 = "「嗯？」" 

# 【西瓜】
# display as 西瓜
# JP: 「あ。志寰。『かしこまられる』」
2234 = "「啊，志寰，要說“畢恭畢敬”」" 

