# display as 志寰
# JP: 「謝謝。かしこままれる――んんっ？　かしこまむらる」
2632 = "「謝謝。畢恭畢定——嗯？畢恭畢令」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ。本当に困らせているな。すまない。\nならばかしこまるのはやめよう。いいな？　日々姫」
2182 = "「哈哈。還真是讓你為難了，抱歉。那我們還是不要說太複雜的敬語了吧。好嗎，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。わかったと！　じゃ、やりなおしで。――\nありがと、よろしく！　志寰君」
2596 = "「行，我知道咧。那重來一遍——謝謝，多指教啦！志寰」" 

# 【志寰】
# display as 志寰
# JP: 「はいです！\n双鉄さん、日々姫さん！　よろしくです！」
2296 = "「好的！雙鐵先生，日日姬小姐，請多指教！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
# 2244 = "「嗯嗯」" 

# monologue
# JP: なんとも気持ちのいい好青年だ。
3172 = "真是個惹人喜愛的好青年啊。" 

# monologue
# JP: 人懐こさというか、人好きさというような丸さが、\nどこか四角い西瓜と、好一対だと感じさせられる。
3240 = "該說是不怕生呢，還是惹人喜愛呢，總之這種八面圓通的感覺，和西瓜那種稜角分明的感覺，倒是頗為般配。" 

# 【姜】
# display as 姜
# JP: 「[ｚｈｉｈｕａｎ,1]志寰？――」
2381 = "「志寰？——」" 

# monologue
# JP: おっと、仲国語だ。
2897 = "他們的對話突然切換成了仲文。" 

# monologue
# JP: 志寰君はふんふん頷き、西瓜ににこりと笑顔を投げかけ。\nおや――
3054 = "志寰邊聽邊不住點頭，還對西瓜微笑著。莫非——" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2225 = "「啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふーん？」
2240 = "「嗯……？」" 

# monologue
# JP: ……西瓜は表情を極力保つよう、\n命令でもされているのだろうか？
1635 = "……看西瓜似乎是在竭盡全力維持著自己的表情，難道是志寰要她保持平靜嗎？" 

# monologue
# JP: 頬の赤みを一秒ごとに色濃くし、けれど表情は動かさず。\nそれゆえ強く、嬉しさを滲ませているように見えるが……
2991 = "她面頰泛紅，難掩絲絲滲出的笑意，而全身的動作更是透著喜悅。" 

# 【姜】
# display as 姜
