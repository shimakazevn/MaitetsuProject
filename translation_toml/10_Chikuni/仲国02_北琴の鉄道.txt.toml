# display as 志寰
# JP: 「さんは不要です。右田先生。僕は見ての通り若輩者です。\n呼び捨てにしていただければ」
2094 = "「先生就不必了吧，右田先生。如您所見，我年歲尚小，請直接叫我的名字就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それもどうかと……では、差し支えなければ志寰君で。\n僕らのことも、姓ではなく、双鉄、日々姫と」
2717 = "「那恭敬不如從命，我就叫你志寰吧。相對的，也不要以姓稱呼我們了，就叫雙鐵和日日姬就好」" 

# 【志寰】
# display as 志寰
# JP: 「わかりました。双鉄さん、日々姫さん。\nレイルロオド・ハチロクも、よろしくおねがいします」
2294 = "「好的。雙鐵先生，日日姬小姐還有鐵路人偶八六，諸位請多指教」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしにまで丁寧なご挨拶をありがとうございます。\nよろしくお願いいたします、志寰様」
