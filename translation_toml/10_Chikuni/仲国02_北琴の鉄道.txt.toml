3052 = "志寰能與我們同行，或許西瓜感受到的喜悅不亞於我們，甚至在我們之上。" 

# 【姜】
# display as 姜
# JP: 「それでは、先生方をホテルにご案内いたします。\n荷物を下ろしてお休みいただき、お食事にご案内します」
2722 = "「那接下來就帶諸位去旅館吧。安頓好行李稍事休息後，我們就去用餐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。よろしくおねがいいたします」
2293 = "「好的。那就麻煩了」" 

# monologue
# JP: （ぐ～～っ）
3294 = "（咕～～）" 

# monologue
# JP: 誰のであろうか、かなり豪快に腹がなった。\nが、誰のであろうと、僕のやることは変わらない。
2873 = "不知是誰的肚子發出了這引人側目的聲音。但不管是誰，我都應該出面打圓場。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。食事と聞いて、腹が鳴ってしまいました」
2025 = "「不好意思。一聽到吃飯，肚子就等不及了」" 

# 【姜】
# display as 姜
# JP: 「ふふふ。ご期待に添えると思いますよ？\nあっ――好き嫌いをお伺いしていなかった」
2173 = "「呵呵呵，應該不會讓諸位失望的哦。對了，還沒問過諸位的喜好與忌口」" 

# monologue
# JP: 姜さんは、僕に、日々姫に、\nじゅんじゅんに笑顔を向けてくる。
3021 = "姜小姐面帶笑容，向我和日日姬開口詢問。" 

# 【姜】
# display as 姜
# JP: 「双鉄先生と日々姫女士のお口には――\n北琴ダックは、合いますでしょうか？」
2028 = "「不知北琴烤鴨是否合雙鐵先生和日日姬女士的胃口呢？」" 
