# lines: 482 
# 【ハチロク】
# display as 八六
# JP: 「…………」
1579 = "「…………」"
# monologue
# JP: 身動きを取ることができません。
3047 = "Không gian chật hẹp, chẳng thể nào cử động thoải mái được."
# monologue
# JP: けれども音が、そして気配が、\n様子をはっきり伝えてくれます。
2611 = "Nhưng âm thanh, và cả hơi thở, đã truyền tải rõ ràng tình hình cho tôi biết."
# monologue
# JP: （双鉄さまと日々姫と……\nスケッチブックで、文通をしていらっしゃる――）
3316 = "(Ngài Soutetsu và Hibiki…… đang trao đổi thư từ bằng sổ phác thảo――)"
# monologue
# JP: 日々姫がなにか、夢中になって描いている音。\nそれで目覚めて、何を見ているのか知りたくなって。
2553 = "Tiếng Hibiki đang say sưa vẽ thứ gì đó. Chính vì âm thanh ấy mà tôi tỉnh giấc, tò mò muốn biết em ấy đang nhìn gì."
# monologue
# JP: けれど、きっとほとんど同時に、\n双鉄さまもお目覚めになってしまわれたから……
2600 = "Nhưng, có lẽ gần như cùng lúc đó, ngài Soutetsu cũng đã thức giấc mất rồi nên……"
# monologue
# JP: （……同じ三段寝台に横たわっておりますのに――\n上段と中段では、完全に別世界になってしまうのですね）
3236 = "(……Rõ ràng cùng nằm trên một chiếc giường ba tầng―― nhưng tầng trên và tầng giữa lại hoàn toàn là hai thế giới khác biệt nhỉ.)"
# monologue
# JP: 上段は開放感がありますし、高くて楽しうございます。\nけれど、残念――窓の景色は楽しめません。
2558 = "Tầng trên mang lại cảm giác thoáng đãng, lại ở trên cao nên rất thú vị. Nhưng, thật tiếc――lại không thể thưởng thức cảnh sắc ngoài cửa sổ."
# monologue
# JP: できるのはただ、おふたりの邪魔をしないこと。\nペンが走りスケッチブックの行き交う音を、聞くのみです。
2860 = "Điều duy nhất tôi có thể làm là không làm phiền hai người họ. Chỉ có thể lắng nghe tiếng bút chạy và tiếng cuốn sổ phác thảo được chuyền qua lại."
# monologue
# JP: けれど、それでも。\n何も見えずともわかります。
2608 = "Nhưng, dù vậy. Dù chẳng nhìn thấy gì, tôi vẫn có thể hiểu được."
# monologue
# JP: 音楽のように軽快なのは、日々姫の[て,1]筆跡。\n一文字一文字、刻むように記していくのが双鉄さまの[て,1]筆跡。
2963 = "Nhẹ nhàng như một bản nhạc là nét bút của Hibiki. Từng chữ từng chữ, như được khắc ghi xuống là nét bút của ngài Soutetsu."
# monologue
# JP: （あ――珍しい。日々姫がなにか、書き淀みましたね）
3283 = "(A――Hiếm thật. Hibiki đang khựng lại khi viết gì đó kìa.)"
# monologue
# JP: 気になります。車窓から、日々姫がどんな景色を見たのか。\n双鉄さまも、それをご覧になられたのかどうか。
2751 = "Thật tò mò. Từ cửa sổ tàu, Hibiki đã nhìn thấy cảnh sắc gì. Ngài Soutetsu có cùng chiêm ngưỡng nó hay không."
# monologue
# JP: そうして、おふたりがどんな言葉を、\nこの上もなくひっそりと、交わしあっているのかが。
2980 = "Và, hai người họ đang trao đổi những lời gì, một cách lặng lẽ đến tột cùng như vậy."
# monologue
# JP: （……明日になればわかること、ではあるのですけれど）
3231 = "(……Dù rằng ngày mai là sẽ biết thôi.)"
# monologue
# JP: 文字通り、一目瞭然に。\nだって日々姫は、決していつわりを描きませんから。
3062 = "Đúng như nghĩa đen, chỉ cần nhìn qua là hiểu rõ. Bởi vì Hibiki, tuyệt đối không bao giờ vẽ những điều giả dối."
# monologue
# JP: けれど、それでも……わたくしもふたりと一緒に、\n中段の車窓から、同じ景色を見てみたかったと思います。
2690 = "Nhưng, dù vậy……tôi cũng muốn cùng hai người họ, ngắm nhìn cùng một cảnh sắc từ cửa sổ tầng giữa."
# monologue
# JP: 無言の会話にわたくしの[て,1]筆跡も混じらせて、\n思ったことを共有できたら、どれほどの旅の思い出に――
2829 = "Nếu nét bút của tôi cũng được hòa vào cuộc trò chuyện không lời ấy, được chia sẻ những suy nghĩ của mình, thì đó sẽ là một kỷ niệm đáng giá biết bao――"
# monologue
# JP: （あら、いやだ。わたくしったら……\nいつのまにこれ程の欲張りになってしまったのでしょう）
3279 = "(Ôi, thôi chết. Mình thật là…… từ lúc nào lại trở nên tham lam đến mức này cơ chứ.)"
# monologue
# JP: 恥じ入りましたら、思い出します。
3060 = "Cảm thấy xấu hổ, tôi lại nhớ về."
# monologue
# JP: 双鉄さまに、わたくしの――わたくし自身の「望み」は\n一体、なんであるかと、お尋ねいただいた日のことを。
2866 = "Ngày mà ngài Soutetsu đã hỏi tôi―― 「mong muốn」 của chính bản thân tôi, rốt cuộc là gì."
# monologue
# JP: （あのときは、何一つ望みなど浮かびませんでしたのに）
3315 = "(Lúc đó, mình chẳng hề nghĩ ra một mong muốn nào cả, vậy mà)"
# monologue
# JP: 今はこれほど短い時間のなかに、いったいいくつ、\n「望み」を抱いたことでしょう。
3011 = "Giờ đây, chỉ trong một khoảng thời gian ngắn ngủi, mình đã ấp ủ biết bao nhiêu 「mong muốn」 rồi."
# monologue
# JP: （あ――）
3285 = "(A――)"
# 【双鉄】
# display as 雙鐵
# JP: 「……………………」
1578 = "「……………………」"
# 【日々姫】
# display as 日日姬
# JP: 「……………………」
# 1578 = "「……………………」" 
# monologue
# JP: わたくしたちの列車――Z49列車が、\nいつの間に、ふたたびの夜の中へと滑り出しております。
2859 = "Chuyến tàu của chúng tôi――chuyến tàu Z49, không biết từ lúc nào đã lại trượt vào màn đêm."
# monologue
# JP: 双鉄さまと日々姫も、\nふたたびの夢路への旅を、たどり始められたようです。
3082 = "Ngài Soutetsu và Hibiki, có vẻ cũng đã bắt đầu cuộc hành trình vào cõi mộng lần nữa."
# 【ハチロク】
# display as 八六
# JP: 「（ふうっ）」
2382 = "「(Phù~)」"
# monologue
# JP: 命令もだしておりませんのに、口から勝手に排気が漏れて、思いもかけぬ大きな音を響かせ――っ！
2874 = "Dù không hề ra lệnh, nhưng khí xả tự động lọt ra từ miệng tôi, tạo thành một tiếng động lớn không ngờ――!"
# monologue
# JP: （西瓜……起こしてしまった……\nいえ、少し前から起きていた……のですか？）
3305 = "(Suika……bị mình đánh thức rồi sao…… Không, cô bé đã thức từ trước rồi……phải không?)"
# monologue
# JP: 少しだけ眠そうな共感に、誘われます。\nこの寝台を離れて少し、『話さない』かと。
2740 = "Một luồng cộng cảm có chút ngái ngủ mời gọi tôi. Hỏi tôi có muốn rời khỏi giường một lát để 『trò chuyện』 không."
# monologue
# JP: 真夜中、ふたり。レイルロオドとレイルロオドで、\nこっそりと、ナイショばなしをしないか、と。
3160 = "Giữa đêm khuya, hai người. Railord và Railord, cùng nhau lén lút thì thầm to nhỏ."
# monologue
# JP: （まるで……\nうふふっ、物語の中の寄宿舎の生徒のようですね）
3293 = "(Cứ như là…… Ufufu, giống như những học sinh nội trú trong truyện vậy nhỉ.)"
# monologue
# JP: とても素敵なお誘いです。\nわたくしの回路のどこかが、わくわくとした熱を帯びます。
3041 = "Một lời mời thật tuyệt vời. Đâu đó trong mạch của tôi, một sự phấn khích nóng hổi dâng lên."
# monologue
# JP: けれどわたくし、西瓜ほど身軽ではありません。\n寝台を降りようとしたときに、万が一にも――
2602 = "Nhưng tôi không được nhẹ nhàng như Suika. Nhỡ đâu lúc leo xuống giường mà――"
# monologue
# JP: （え？　あ――うふふっ、なのですね。はい。\nそれでしたら、わたくしでもなんとか行けそうです）
3277 = "(Hả? À――Ufufu, ra là vậy. Vâng. Nếu vậy thì, tôi chắc cũng có thể xoay xở được.)"
# monologue
# JP: 西瓜の耳は、わたくしの耳よりはるかに優れております。
3141 = "Đôi tai của Suika thính nhạy hơn tai tôi rất nhiều."
# monologue
# JP: その西瓜が、『全員、熟睡の寝息だ』と、\n保証をつけてくれるのでしたら……
3076 = "Nếu chính Suika đã đảm bảo rằng, 『Tất cả mọi người đều đang thở đều đặn trong giấc ngủ say』 thì……"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: ああ――ああ――さすがは日々姫です。
2709 = "À――À――Quả không hổ danh là Hibiki."
# monologue
# JP: わたくしが夜中、移動したくなったときのため――\n足場を、出したままにしておいてくれています。
3004 = "Đề phòng lúc nửa đêm tôi muốn di chuyển―― em ấy đã để nguyên bệ bước chân mà không cất đi."
# monologue
# JP: （ぎしっ――ぎっ）
3291 = "(Cót――két)"
# monologue
# JP: 体重がかかればどうしても、\n足場は少し、軋みます。
2879 = "Khi dồn trọng lượng cơ thể lên, dù thế nào đi nữa, bệ bước chân cũng sẽ hơi kêu cót két."
# 【日々姫】
# display as 日日姬
# JP: 「……ん……にぃに…………」
1595 = "「……Ưm……anh hai…………」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: それでも、日々姫は起きません。\nしあわせそうに――微笑みながら眠っています。
2567 = "Dù vậy, Hibiki vẫn không tỉnh giấc. Em ấy đang say ngủ――với nụ cười hạnh phúc trên môi."
# monologue
# JP: （あ！　ごめんなさい西瓜。すぐに参ります）
3286 = "(A! Xin lỗi Suika. Tôi đến ngay đây.)"
# monologue
# JP: 時間をかければかけるほど、どなたかの眠りを\n妨げてしまう可能性があがるだけ。だから、急ぎます。
2919 = "Càng kéo dài thời gian, khả năng làm phiền giấc ngủ của ai đó càng tăng lên. Vì vậy, tôi phải nhanh lên."
# monologue
# JP: 志寰様の寝台も、同じく足場を出したまま――\nこちらも静かに足をかけ――よいしょ！
2798 = "Giường của cậu Zhihuan cũng để nguyên bệ bước chân như vậy―― Bên này tôi cũng nhẹ nhàng đặt chân lên――Ây da!"
# monologue
# JP: （とっ）
3303 = "(Phịch)"
# monologue
# JP: 『ハチロク』と、笑顔の共感が迎えてくれます。
3135 = "『Hachiroku』, một luồng cộng cảm mang theo nụ cười chào đón tôi."
# monologue
# JP: 消灯後の暗がりの中にあってなお、\n西瓜の瞳も、笑っているのがわかります。
2663 = "Dù đang ở trong bóng tối sau khi tắt đèn, tôi vẫn có thể nhận ra đôi mắt của Suika đang cười."
# monologue
# JP: （ああ――あなたもわくわくしているのですね）
3281 = "(A――cô cũng đang háo hức lắm phải không.)"
# monologue
# JP: 試作機レイルロオドとトップナンバー機レイルロオド。\n常に長姉である者同士。
3000 = "Railord phiên bản thử nghiệm và Railord phiên bản đầu tiên. Cả hai đều luôn mang trên mình trọng trách của người chị cả."
# monologue
# JP: 手本であるよう――周囲の誰もに望まれて、自らも望み。\nかくあることが常態だから。
2836 = "Phải làm gương――đó là điều mà mọi người xung quanh mong đợi, và cũng là điều bản thân mong muốn. Bởi vì đó đã trở thành một trạng thái bình thường."
# monologue
# JP: （あ！　待ってください、西瓜）
3288 = "(A! Đợi đã, Suika.)"
# monologue
# JP: ――夜更かしをしてこっそり共感を交わし合い\n誰にもナイショの約束をして。
1539 = "――Thức khuya lén lút trao đổi cộng cảm, lập ra một lời hứa bí mật không cho ai biết."
# monologue
# JP: マスターのご許可もいただかないで、\n寝台を抜け出してお散歩までしてしまう――
2574 = "Thậm chí còn lẻn khỏi giường đi dạo―― mà không hề xin phép Master."
# monologue
# JP: （あのね？　わたくし、まだ車内構造に慣れていなくて\n……その上で、この暗さでしょう？）
3270 = "(Cô biết không? Tôi vẫn chưa quen với cấu trúc trong xe ……Hơn nữa, trời lại còn tối thế này nữa chứ?)"
# monologue
# JP: 「規則違反ではなくとも、望ましくないふるまいですね」\nと嗜めるのが、わたくしたちの役割だから。
2858 = "「Dù không vi phạm nội quy, nhưng đây là hành vi không nên làm đâu」 Việc khuyên can như vậy mới là vai trò của chúng tôi."
# monologue
# JP: だからこそ、これほどにささやかなことたちが……\nわたくしたちには、どれも初めての冒険なのです。
2899 = "Chính vì vậy, những điều nhỏ nhặt đến nhường này…… đối với chúng tôi, tất cả đều là những cuộc phiêu lưu lần đầu tiên trải nghiệm."
# monologue
# JP: （うふふっ、はい。そのようにしていただけるなら。\nわたくしとても、助かりますし嬉しいです）
3295 = "(Ufufu, vâng. Nếu cô làm vậy thì. Tôi sẽ rất biết ơn và vui lắm.)"
# monologue
# JP: 旅先の、誰もが深く眠りに落ちる、寝台車内。\nここででしたら、わたくしだって――
2931 = "Trong toa giường nằm, nơi đất khách quê người, khi mọi người đều đã chìm sâu vào giấc ngủ. Nếu là ở đây, thì ngay cả tôi cũng――"
# monologue
# JP: （ありがとうございます。西瓜）
3308 = "(Cảm ơn cô. Suika.)"
# monologue
# JP: 西瓜のとてもあたたかな手に、\nわたくしの手を引いてもらって。
3151 = "Bàn tay vô cùng ấm áp của Suika, đang nắm lấy tay tôi dắt đi."
# monologue
# JP: 全てを任せて、導かれるまま、\n夜の端まで、歩けるのです。
2846 = "Giao phó tất cả, cứ để mặc cho cô ấy dẫn dắt, tôi có thể bước đi đến tận cùng của màn đêm."
# 【ハチロク】
# display as 八六
# JP: 「西瓜は――」
2232 = "「Suika này――」"
# monologue
# JP: 抑えたつもりの声が、けれども、\n大きく響いた気がします。
2868 = "Dù đã cố kìm nén giọng nói, nhưng tôi có cảm giác nó vẫn vang lên khá lớn."
# monologue
# JP: ですから、さらに、\n小さく声をひそめます。
2908 = "Vì vậy, tôi càng\nhạ giọng thì thầm nhỏ hơn nữa."
# 【ハチロク】
# display as 八六
# JP: 「西瓜はいつから起きていたのですか？」
1857 = "「Suika đã thức từ lúc nào vậy?」"
# monologue
# JP: 共感を切って、声でお話。\n無人の餐車に移動してきたとはいえど、真夜中です。
2857 = "Ngắt cộng cảm, chúng tôi nói chuyện bằng giọng nói. Dù đã di chuyển đến toa ăn không người, nhưng giờ đang là nửa đêm."
# monologue
# JP: あまりよくないことであるように思います。\nけれどもきっとだからこそ。不思議な楽しさも感じます。
2791 = "Tôi nghĩ đây là việc không tốt cho lắm. Nhưng chắc chắn chính vì vậy. Tôi lại cảm thấy một niềm vui kỳ lạ."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は起きてすぐ、ハチロクに共感を求めようかと思い。\nけれどもそれを中止しました」
2250 = "「Ngay khi thức dậy, Suika đã định kết nối cộng cảm với Hachiroku. Nhưng rồi lại thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「中止したのは、どうしてで――あっ」
1837 = "「Thôi là vì lý do gì――A.」"
# monologue
# JP: 共感を、閉ざすことさえ忘れていました。\n真夜中ですし、異国です。受け取る者もいないと思って。
2862 = "Tôi thậm chí đã quên cả việc đóng cộng cảm lại. Vì đang là nửa đêm, lại ở nơi đất khách. Tôi cứ nghĩ sẽ chẳng có ai tiếp nhận nó."
# monologue
# JP: ですから、つまり。\nわたくしの思っていたことは……
2900 = "Do đó, nói cách khác.\nNhững gì tôi đang nghĩ……"
# 【西瓜】
# display as 西瓜
# JP: 「聞いてはいけないと思い、西瓜は共感を切りました。\nやがて、双鉄先生と日々姫女士がお眠りになり」
2255 = "「Nghĩ rằng không nên nghe lén, nên Suika đã ngắt cộng cảm. Chẳng bao lâu sau, thầy Soutetsu và cô Hibiki đã chìm vào giấc ngủ.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしがため息を零してしまったのを聞いて――\n共感をつなぎ直して、ここに誘って下さったのですね？」
2181 = "「Cô nghe thấy tiếng thở dài của tôi―― nên đã kết nối cộng cảm lại, rồi rủ tôi ra đây phải không?」"
# 【西瓜】
# display as 西瓜
# JP: 「事実関係は、今ハチロクがいったとおりだと、\n西瓜は同意します」
1843 = "「Suika đồng ý rằng, sự việc đúng như những gì Hachiroku vừa nói.」"
# 【ハチロク】
# display as 八六
# JP: 「それで、どうして」
2352 = "「Vậy thì, tại sao.」"
# monologue
# JP: ああ、共感は――\n確かにこうしたお話では、間違いなく切っておくべきです。
2711 = "À, cộng cảm―― Quả thật trong những cuộc trò chuyện thế này, chắc chắn nên ngắt nó đi."
# monologue
# JP: 伝えるために、伝えたくって、言葉を選ぶ。\nそれはなんともどかしく、優美で優しい行いでしょう。
3003 = "Để truyền đạt, vì muốn truyền đạt, mà phải cẩn trọng lựa chọn từng từ ngữ. Đó là một hành động thật bứt rứt, nhưng cũng thật tao nhã và dịu dàng biết bao."
# 【ハチロク】
# display as 八六
# JP: 「わたくしを、\nふたりきりのお茶会にお誘いくださったのですか？」
2093 = "「Cô đã rủ tôi, đến buổi tiệc trà chỉ có hai người chúng ta sao?」"
# monologue
# JP: お湯を――お白湯をいただきます。\nカップは西瓜が用意しておいてくれたもの。
3212 = "Tôi uống nước――nước lọc ấm. Chiếc cốc này do Suika chuẩn bị sẵn cho tôi."
# monologue
# JP: そうしてお湯は、仲国の寝台列車では、全乗客が。\n自動の給湯器から、いくらでも使えるものなのです。
3089 = "Hơn nữa, trên tàu giường nằm của Trung Quốc, mọi hành khách đều có thể lấy nước nóng từ bình đun tự động bao nhiêu tùy thích."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜がハチロクを飲茶に誘った理由は」
2259 = "「Lý do Suika rủ Hachiroku đi uống trà là.」"
# monologue
# JP: 言いつつ西瓜が傾けるのは、これも予め用意していた、\n彼女好みの味だという軽油が入ったカップです。
3205 = "Vừa nói, Suika vừa nhấp một ngụm từ chiếc cốc cũng được chuẩn bị sẵn, chứa loại dầu diesel có hương vị mà cô bé yêu thích."
# 【西瓜】
# display as 西瓜
# JP: 「ハチロクとなら、\n相談しあえるのではないかと推測したからです」
2138 = "「Vì Suika đoán rằng, nếu là Hachiroku thì có thể cùng nhau bàn bạc được.」"
# 【ハチロク】
# display as 八六
# JP: 「なにについての相談でしょう？」
2369 = "「Bàn bạc về chuyện gì vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「それは――」
2324 = "「Đó là――」"
# monologue
# JP: 西瓜が、らしくもなく言いよどみます。\nその頬が、じわじわ、赤味を増していきます。
3127 = "Suika ngập ngừng một cách hiếm thấy. Đôi gò má cô bé dần dần ửng đỏ."
# monologue
# JP: 悉究、悉究、悉究、と――\nもう聞きなれた言葉が何度も、呟やかれます。
2828 = "Tất cứu, tất cứu, tất cứu―― Cô bé lẩm nhẩm nhiều lần từ ngữ mà tôi đã nghe quen tai."
# 【西瓜】
# display as 西瓜
# JP: 「それは、恋心についての相談です。ハチロクも――\n思い悩んでいるのではないかと、西瓜は類推しました」
2027 = "「Đó là bàn bạc về chuyện tình cảm. Suika suy luận rằng―― Hachiroku cũng đang phiền lòng về chuyện này.」"
# 【ハチロク】
# display as 八六
# JP: 「恋心！」
2101 = "「Chuyện tình cảm!」"
# monologue
# JP: なんて素敵な響きでしょう。\nそうして、ああ――なんと光栄なことでしょう。
3199 = "Thật là một âm thanh tuyệt vời làm sao. Và, a――thật là một vinh dự lớn lao."
# monologue
# JP: あれほど秘密にしようとしている気持ちを西瓜は、\nまっすぐに、わたくしに伝えてくれたのですから。
3138 = "Một tâm tư mà Suika luôn cố gắng giấu kín đến thế, vậy mà cô bé lại truyền đạt thẳng thắn cho tôi."
# 【西瓜】
# display as 西瓜
# JP: 「ハチロクは――」
1867 = "「Hachiroku――」"
# monologue
# JP: 西瓜の瞳が、少しだけ、驚いたように開いています。\nぱち、ぱちと、短いまばたきが繰り返されます。
3147 = "Đôi mắt của Suika hơi mở to, có vẻ ngạc nhiên. Cô bé chớp mắt liên tục, những cái chớp mắt ngắn ngủi."
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生に恋心を抱いているのではないのですか？」
2024 = "「Không phải cô đang đem lòng yêu thầy Soutetsu sao?」"
# 【ハチロク】
# display as 八六
# JP: 「恋……ごころ……」
2094 = "「Tình……yêu……」"
# monologue
# JP: 素敵な響きが、いきなりドロリととろけます。\nとろけたそれは、とても濃くって重たくて――
3197 = "Âm thanh tuyệt vời ấy, đột nhiên tan chảy đặc sệt. Thứ tan chảy ấy, vô cùng đậm đặc và nặng nề――"
# monologue
# JP: 回路に染みて沈めるようで、けれども少し、ほんの少し。\nあまやかに……わたくしのどこか深くを、疼かせます。
3198 = "Như thể ngấm vào và nhấn chìm các mạch điện, nhưng một chút, chỉ một chút thôi. Ngọt ngào……làm nhói đau một nơi sâu thẳm nào đó trong tôi."
# 【ハチロク】
# display as 八六
# JP: 「恋、ごころ――で、ございますか」
2095 = "「Tình, yêu――sao?」"
# monologue
# JP: わかりませぬ。わかりませぬ。\nわかりませぬ。わかりませぬ。
2843 = "Tôi không biết. Tôi không biết. Tôi không biết. Tôi không biết."
# monologue
# JP: どれほど演算――いいえ、悉究しようとしてみても、\n必ずループバックして、解を少しも、導けませぬ。
3008 = "Cho dù có tính toán――không, có cố gắng tất cứu đến mức nào đi nữa, tôi vẫn luôn bị mắc kẹt trong vòng lặp, chẳng thể tìm ra dù chỉ một chút đáp án."
# 【西瓜】
# display as 西瓜
# JP: 「やっぱりハチロクも、双鉄先生への恋心に、その扱いに、思い悩んでいることは、相違ありませんか？」
2160 = "「Quả nhiên Hachiroku cũng đang phiền não về tình cảm dành cho thầy Soutetsu, và cách xử lý nó, không sai chứ?」"
# 【ハチロク】
# display as 八六
# JP: 「どう、なのでしょう……」
2327 = "「Làm sao, mà biết được chứ……」"
# monologue
# JP: 双鉄さまは、大切です。他の誰より大事な方です。\nマスターで。家族で。ただそれだけにはとどまらぬ方です。
3216 = "Ngài Soutetsu, rất quan trọng. Là người quan trọng hơn bất kỳ ai khác. Là Master. Là gia đình. Nhưng không chỉ dừng lại ở đó."
# monologue
# JP: わたくし自身より、8620よりなお大切であることは、\nこの先どのような未来においても不変でしょう……が……
2990 = "Việc ngài ấy còn quan trọng hơn cả bản thân tôi, hơn cả 8620, chắc chắn sẽ không bao giờ thay đổi dù tương lai có ra sao đi nữa……nhưng……"
# 【ハチロク】
# display as 八六
# JP: 「……わたくしには、恋が何かがわかりませぬ」
1599 = "「……Tôi không biết tình yêu là gì cả.」"
# monologue
# JP: 恋愛小説を、少女マンガを、どれほど熱心に読もうとも。\n日々姫の恋を――どれほど間近に見つめようとも。
2665 = "Dù tôi có say sưa đọc tiểu thuyết lãng mạn, manga thiếu nữ đến đâu đi nữa. Dù tôi có quan sát tình yêu của Hibiki――ở khoảng cách gần đến mức nào đi nữa."
# monologue
# JP: それでも、やはりわたくしは――\n“恋”がなにかを、本当には、きっと理解しておりませぬ。
2604 = "Dù vậy, tôi vẫn―― chắc chắn chưa thực sự hiểu được \"tình yêu\" là gì."
# 【ハチロク】
# display as 八六
# JP: 「恋とは――西瓜。\nいったい、どのようなものなのでしょう」
2268 = "「Tình yêu là――Suika. Rốt cuộc, nó là thứ như thế nào vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: 西瓜はまた、どこかきょとんとした顔をします。\nその瞳を閉じ、悉究、悉究、悉究と――あ。
3131 = "Suika lại mang một vẻ mặt ngơ ngác. Cô bé nhắm mắt lại, lẩm nhẩm tất cứu, tất cứu, tất cứu――a."
# 【西瓜】
# display as 西瓜
# JP: 「恋が何かを言葉で説明することは、恐らくとても難しい。\nですからハチロク、もしもお互いに同意できるなら」
2090 = "「Giải thích tình yêu là gì bằng lời nói, có lẽ rất khó. Vì vậy Hachiroku, nếu chúng ta có thể đồng ý với nhau.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。西瓜がよければ、わたくしもそれが一番、\n理解が早いのでは……と、考えておりました」
2215 = "「Đúng vậy nhỉ. Nếu Suika không phiền, tôi cũng nghĩ cách đó là nhanh nhất, để có thể hiểu được……tôi đã nghĩ vậy.」"
# monologue
# JP: こくん、と西瓜が頷きます。\nですから、共感を開きま――っ！！！！！！
3158 = "Suika khẽ gật đầu.\nVì vậy, tôi mở cộng cảm――!!!!!!!!!"
# 【ハチロク】
# display as 八六
# JP: 「あ――あ――あ――あ！」
1957 = "「A――A――A――A!」"
# monologue
# JP: これが――恋。恋ごころ。\nなんと巨大な熱量でしょう。なんと切ない欲望でしょう。
3196 = "Đây là――tình yêu. Trái tim đang yêu. Thật là một lượng nhiệt khổng lồ làm sao. Thật là một khao khát xót xa biết nhường nào."
# monologue
# JP: 圧倒的な情報量に、大げさではなく処理能力がおいつかず、\n集積回路が熱暴走をしてしまいそうで、怖くなります。
2725 = "Lượng thông tin áp đảo đến mức, không hề nói quá, khả năng xử lý của tôi không theo kịp, mạch tích hợp dường như sắp quá tải nhiệt, khiến tôi cảm thấy sợ hãi."
# monologue
# JP: （望んで、求めて、独り占めしたいと――\n独り占めされたいと――これほど強く、果て無く激しく）
3301 = "(Khao khát, mong mỏi, muốn độc chiếm―― muốn được độc chiếm――mãnh liệt đến nhường này, dữ dội không có hồi kết.)"
# monologue
# JP: ……ああ、けれど。共感を閉ざすなどできませぬ。\n西瓜は、余さず隠さず伝えてくれます。
1554 = "……A, nhưng mà. Tôi không thể đóng cộng cảm lại được. Suika đang truyền đạt cho tôi mọi thứ, không hề giấu giếm."
# monologue
# JP: 幼い頃の志寰様へと注ぎ続けた、惜しみない無垢な愛情を。\nそうして想いの種が鮮やかに、恋慕と開花した一瞬を。
2881 = "Tình yêu thuần khiết, không tiếc nuối mà cô bé luôn dành cho cậu Zhihuan từ khi còn nhỏ. Và khoảnh khắc hạt giống tình cảm ấy rực rỡ nở rộ thành tình yêu."
# monologue
# JP: （告白、されて――抱きしめられ――あっ！？）
3297 = "(Được tỏ tình――được ôm vào lòng――a!?)"
# monologue
# JP: パツン、と全てが断ち切られます。\nわたくしに、わたくしの世界が戻ってきます。
3081 = "Pặc, mọi thứ bị cắt đứt. Thế giới của tôi, lại trở về với tôi."
# monologue
# JP: けれども、回路がざわめきます。\n触れた世界の断片が、わたくしの中で、騒ぎます。
3013 = "Nhưng, các mạch điện lại đang xôn xao. Những mảnh vỡ của thế giới mà tôi vừa chạm vào, đang náo động bên trong tôi."
# 【西瓜】
# display as 西瓜
# JP: 「――老師の息子で、弟みたいな存在で。\n志寰を、だから西瓜は、守り続けたいと願っている」
1564 = "「――Là con trai của sư phụ, là sự tồn tại giống như em trai. Vì vậy, Suika luôn mong muốn được tiếp tục bảo vệ Zhihuan.」"
# monologue
# JP: 現在形で。今の気持ちを。\n西瓜は言葉で、静かに静かに聞かせてくれます。
2742 = "Bằng thì hiện tại. Những cảm xúc lúc này. Suika dùng lời nói, tĩnh lặng kể cho tôi nghe."
# 【西瓜】
# display as 西瓜
# JP: 「けれど、志寰が仲国国鉄の職員に採用された日。制服に、\n志寰の方が着られている姿を始めて目にした、あの日」
2183 = "「Nhưng, vào ngày Zhihuan được nhận làm nhân viên Đường sắt Quốc gia Trung Quốc. Ngày hôm đó, lần đầu tiên Suika nhìn thấy bóng dáng Zhihuan lọt thỏm trong bộ đồng phục.」"
# monologue
# JP: 共感はすでに切れています。\nそれでも回路が、声を聞くだけでざわめきます。
2649 = "Cộng cảm đã bị ngắt. Dù vậy, các mạch điện vẫn xôn xao chỉ vì nghe thấy giọng nói ấy."
# monologue
# JP: 西瓜がわたくしに伝えてくれたあの光景が、感情――\nあまりに鮮やかで美しく。そうして、苦しくあったから。
3130 = "Khung cảnh, những cảm xúc mà Suika đã truyền cho tôi―― quá đỗi rực rỡ và xinh đẹp. Và, cũng thật đau khổ."
# 【西瓜】
# display as 西瓜
# JP: 「志寰が、西瓜に。『西瓜のことが大好きだ』と。\n気持ちを飾らずに伝えてくれて、口づけを――」
2062 = "「Zhihuan đã nói với Suika rằng. 『Anh rất thích Suika』. Cậu ấy truyền đạt tình cảm một cách không hoa mỹ, và xin một nụ hôn――」"
# monologue
# JP: 抱きしめられて、志寰様が迫ってきたとき、\n西瓜は、ひどく戸惑っていました。
3097 = "Khi được ôm vào lòng, khi cậu Zhihuan tiến lại gần, Suika đã vô cùng bối rối."
# monologue
# JP: けれども一秒、一秒ごとに、戸惑いは深く強い愛へと、\n紡ぎ直されていったものかと感じましたが……
3214 = "Nhưng từng giây, từng giây trôi qua, sự bối rối ấy tôi cảm giác như nó đã được dệt lại thành một tình yêu sâu đậm và mãnh liệt……"
# 【西瓜】
# display as 西瓜
# JP: 「口づけを求めてくれて――嬉しくて。\nだから、西瓜は……恐ろしくなって、逃げました」
1845 = "「Cậu ấy muốn hôn em――em rất vui. Chính vì vậy, Suika……cảm thấy sợ hãi, và đã bỏ chạy.」"
# 【ハチロク】
# display as 八六
# JP: 「恐ろしくなって……逃げた」
2097 = "「Cảm thấy sợ hãi……và bỏ chạy.」"
# monologue
# JP: 理屈に合わない、非論理的な行動と、\nわたくしの回路は結論づけます。
3194 = "Một hành động không hợp lý, phi logic, các mạch điện của tôi đã đưa ra kết luận như vậy."
# monologue
# JP: その結論には納得する他ありません。\nけれど、納得をしてもなお――
2844 = "Tôi không còn cách nào khác ngoài việc chấp nhận kết luận đó. Nhưng, dù đã chấp nhận――"
# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜は恐ろしくなって逃げました。結果、\n問題はより複雑になり、解決は遠のいてしまいました」
2148 = "「Vâng. Suika đã sợ hãi và bỏ chạy. Kết quả là, vấn đề trở nên phức tạp hơn, và cách giải quyết ngày càng xa vời.」"
# 【ハチロク】
# display as 八六
# JP: 「遠のいたなんて、そのようなこと――\nわたくしは、きっとないのではないかと、感じます」
2154 = "「Trở nên xa vời, chuyện đó―― Tôi cảm thấy, chắc chắn là không phải vậy đâu.」"
# monologue
# JP: 理屈にあわぬその行動を、\n『わかる気がする』と、わたくしのこころは感じます。
2877 = "Hành động phi lý đó, trái tim tôi lại cảm thấy 『có thể hiểu được』."
# monologue
# JP: だからより深く知りたいと、\nわたくしの、こころと回路が同じ結論にたどり着きます。
2894 = "Vì vậy, tôi muốn tìm hiểu sâu hơn, trái tim và mạch điện của tôi đã đi đến cùng một kết luận."
# 【ハチロク】
# display as 八六
# JP: 「遠のいたように思えても、それは一時的なこと。\nいつか振り返れば、最善の路であったと判るのでは、と」
1888 = "「Dù có vẻ như đã trở nên xa vời, nhưng đó chỉ là tạm thời. Biết đâu một ngày nào đó nhìn lại, cô sẽ nhận ra đó là con đường tốt nhất.」"
# 【西瓜】
# display as 西瓜
# JP: 「……ハチロクは優しいですね。ハチロクの今の言葉で、\n西瓜は、自らの混乱の一部が解消されたと観測します」
1588 = "「……Hachiroku thật dịu dàng. Nhờ những lời vừa rồi của Hachiroku, Suika quan sát thấy một phần sự bối rối trong mình đã được giải tỏa.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもホッといたします」
2334 = "「Nếu vậy thì, tôi cũng thấy nhẹ nhõm phần nào.」"
# monologue
# JP: 目が合います。\n共感を切っておりますのに、温かな何かがつたわります。
2715 = "Ánh mắt chạm nhau. Dù đã ngắt cộng cảm, nhưng tôi vẫn cảm nhận được một điều gì đó thật ấm áp."
# 【ハチロク】
# display as 八六
# JP: 「ね？　西瓜」
2227 = "「Cô biết không? Suika.」"
# monologue
# JP: 指が伸びます。\n指先が西瓜の髪に触れ――西瓜はそれを、嫌がりません。
2854 = "Tôi vươn ngón tay ra. Đầu ngón tay chạm vào mái tóc của Suika――Suika không hề tỏ ra khó chịu."
# monologue
# JP: 遠い昔。ハロ２――　一番の仲良しの妹にしていたように。\nですから、髪を、指先で穏やかにくしけずります。
2777 = "Giống như cách tôi từng làm với Haro 2――đứa em gái thân thiết nhất của tôi ngày xưa. Nên tôi dùng những ngón tay nhẹ nhàng chải vuốt mái tóc ấy."
# 【ハチロク】
# display as 八六
# JP: 「どうして、怖いと感じたのですか？\n志寰様を、その愛を――口づけを受け入れるそのことが」
2025 = "「Tại sao, cô lại cảm thấy sợ hãi? Việc chấp nhận cậu Zhihuan, tình yêu đó――và nụ hôn đó.」"
# 【西瓜】
# display as 西瓜
# JP: 「受け入れれば戻れなくなる。シーリングが開封されると。\n西瓜ははっきり、自覚しているためです」
2229 = "「Nếu chấp nhận, sẽ không thể quay lại được nữa. Khi phong ấn được mở ra. Bởi vì Suika nhận thức rất rõ điều đó.」"
# 【ハチロク】
# display as 八六
# JP: 「シイリング――」
2019 = "「Phong ấn――」"
# monologue
# JP: 初めて耳にする言葉です。
2790 = "Đây là lần đầu tiên tôi nghe thấy từ này."
# 【ハチロク】
# display as 八六
# JP: 「シイリングとは、一体なに、でございましょうか？」
2023 = "「Phong ấn, rốt cuộc là gì vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「！」
1967 = "「!」"
# monologue
# JP: 西瓜は三度――そうしていままでで一番はっきり、\n驚いた顔を浮かべて瞳を、パチクリします。
3149 = "Lần thứ ba――và cũng là lần rõ ràng nhất từ trước đến nay, Suika lộ vẻ mặt ngạc nhiên, chớp chớp mắt."
# monologue
# JP: 唇がぎゅっと閉じられて、もごもご、何度か小さく動き。\nそうしてゆっくり――ひどくゆっくり、開かれます。
2746 = "Đôi môi mím chặt, mấp máy cử động nhỏ vài lần. Rồi chầm chậm――rất chầm chậm, mở ra."
# 【西瓜】
# display as 西瓜
# JP: 「シーリングとは、マスターとレイルロオドがその恋愛を\n物理的に成就させるための、生体機能の開封のことです」
2021 = "「Phong ấn, là việc mở ra các chức năng sinh học, để Master và Railord có thể hoàn thành tình yêu của họ về mặt vật lý.」"
# 【ハチロク】
# display as 八六
# JP: 「生体機能の開封……」
2188 = "「Mở ra chức năng sinh học……」"
# monologue
# JP: 生体機能――生体部品。\nその噂なら、もちろんわたくしも知っております。
3031 = "Chức năng sinh học――bộ phận sinh học. Nếu là tin đồn đó, tất nhiên tôi cũng biết."
# monologue
# JP: レイルロオドのどこかには、生体部品が使われている――\nそうして生体部品だけは、交換も修復もできない、と。
2726 = "Đâu đó trong Railord, có sử dụng bộ phận sinh học―― và chỉ riêng bộ phận sinh học là không thể thay thế hay sửa chữa được."
# 【ハチロク】
# display as 八六
# JP: 「左様でしたか。生体部品は……シイリングという形で、\n恋愛成就のための機能として、封印されていたのですね」
1894 = "「Ra là vậy. Bộ phận sinh học……dưới dạng phong ấn, đã bị khóa lại như một chức năng để hoàn thành tình yêu nhỉ.」"
# monologue
# JP: 長年の、ささやかな謎が解けました。\nその開封を果たしたのでしょう、いくたりかの妹たち。
2780 = "Bí ẩn nho nhỏ suốt bao năm qua đã được giải đáp. Chắc hẳn đã có vài đứa em gái của tôi mở được phong ấn đó."
# monologue
# JP: ”大好きなマスターと結ばれました”とのその言葉は――\n西瓜の言った、”物理的に成就”と、同義でしょう。
1543 = "Lời nói \"Đã kết duyên cùng Master yêu quý\"―― chắc hẳn đồng nghĩa với \"hoàn thành về mặt vật lý\" mà Suika vừa nói."
# monologue
# JP: （それが果たして具体的にどういうことであるのかまでは、\nまだ今ひとつわかりませぬが――）
3313 = "(Rốt cuộc cụ thể là chuyện như thế nào, tôi vẫn chưa hiểu rõ lắm――)"
# monologue
# JP: それでも、もうひとつを理解しました。\nそれぞれの恋を実らせた、わたくしのかわいい妹たち。
2568 = "Nhưng, tôi đã hiểu ra một điều khác. Những đứa em gái đáng yêu của tôi, những người đã đơm hoa kết trái cho tình yêu của riêng mình."
# monologue
# JP: その全機がすでに、遠の昔に、機能を停止していることが\n……生体部品の解放の、恐らく不可避の代償であり――
2738 = "Tất cả bọn họ đều đã ngừng hoạt động từ rất lâu rồi ……đó có lẽ là cái giá không thể tránh khỏi cho việc giải phóng bộ phận sinh học――"
# 【ハチロク】
# display as 八六
# JP: 「西瓜。あなたがシイリングの開封を恐れて拒む理由は。\n開封が、修理不能な劣化の始まりとなるからですか？」
2267 = "「Suika. Lý do cô sợ hãi và từ chối mở phong ấn là. Có phải vì việc mở phong ấn sẽ là khởi đầu cho sự xuống cấp không thể sửa chữa?」"
# monologue
# JP: 西瓜は、困った顔をします。\n困った顔をし、唇を閉じ。
3153 = "Suika lộ vẻ mặt bối rối. Vẻ mặt bối rối, đôi môi mím chặt."
# monologue
# JP: そうしてゆっくり――\n不思議そうな、それでいて少しさみしげな声を出します。
3075 = "Rồi chầm chậm―― cất lên một giọng nói có vẻ khó hiểu, nhưng lại xen lẫn chút buồn bã."
# 【西瓜】
# display as 西瓜
# JP: 「『このまま進めばシーリングが開封される』、と。\nその警告をハチロクは受け取ったことが無いのですか？」
1573 = "「『Nếu cứ tiếp tục, phong ấn sẽ được mở ra』. Hachiroku chưa từng nhận được lời cảnh báo đó sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい……今のところは、恐らく無いように思います」
2142 = "「Vâng……cho đến hiện tại, có lẽ là chưa.」"
# monologue
# JP: 双鉄さまに、優しく抱きとめていただいたとき。\n双鉄さまに耳元で、『ありがとう』等とささやかれるとき。
2723 = "Khi được ngài Soutetsu dịu dàng ôm vào lòng. Khi được ngài Soutetsu thì thầm 『Cảm ơn em』 bên tai."
# monologue
# JP: わたくしの、どこかわからぬ深いところが感じるざわめき。\nそれがあるいは開封の、予兆なのかもしれませんけれど。
2873 = "Sự xôn xao dấy lên từ một nơi sâu thẳm nào đó trong tôi. Có lẽ đó chính là điềm báo của việc mở phong ấn."
# 【ハチロク】
# display as 八六
# JP: 「警告、とまで強くざわめいたことは一度も……\n幸か不幸か、わたくしには経験ございません」
1833 = "「Một sự xôn xao mạnh mẽ đến mức gọi là cảnh báo thì chưa từng…… Không biết là may hay rủi, nhưng tôi chưa từng trải qua.」"
# 【西瓜】
# display as 西瓜
# JP: 「経験がないのですか――。そうですか。\nあれほど深く、強く信頼しあっているように見えるのに」
2167 = "「Chưa từng trải qua sao――. Vậy à. Trông hai người có vẻ tin tưởng nhau sâu sắc và mạnh mẽ đến thế cơ mà.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1966 = "「À.」"
# monologue
# JP: 確かに、深く、そうして強く。\nわたくしは双鉄様をご信頼申し上げ――
3034 = "Quả thực, rất sâu sắc, và rất mạnh mẽ. Tôi vô cùng tin tưởng ngài Soutetsu――"
# monologue
# JP: いいえ。きっと、愛しております。\nただ、恐らくは愛の形が……あるいは、種別が――
2570 = "Không. Chắc chắn, tôi yêu ngài ấy. Chỉ là, có lẽ hình thái của tình yêu……hoặc chủng loại――"
# 【ハチロク】
# display as 八六
# JP: 「ね？　西瓜……もしよかったら今度は、\nわたくしからの共感を」
2252 = "「Này? Suika……Nếu cô không phiền, lần này, hãy nhận cộng cảm từ tôi nhé.」"
# 【西瓜】
# display as 西瓜
# JP: 「よいに決まっています。大歓迎です。\n西瓜はとても、ハチロクの恋を知りたく思います」
2189 = "「Tất nhiên là được rồi. Rất hoan nghênh. Suika rất muốn biết về tình yêu của Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「恋、であるのか、わたくし自身も知りませぬけれど」
2336 = "「Có phải là tình yêu hay không, chính bản thân tôi cũng không rõ nữa.」"
# monologue
# JP: それでも、今は手渡しましょう。\n双鉄さまがわたくしにくださった大事なものたちを。
2569 = "Dù vậy, bây giờ tôi sẽ trao cho cô ấy. Những điều quý giá mà ngài Soutetsu đã dành cho tôi."
# monologue
# JP: 積み重ねて来た時間を、ともに走ってきたレールを。\n西瓜の恋の、なにかの扶けになると信じて、伝えましょう。
2855 = "Những khoảng thời gian chúng tôi đã cùng nhau tích lũy, những chặng đường ray chúng tôi đã cùng nhau đi qua. Tin rằng nó sẽ giúp ích phần nào cho tình yêu của Suika, tôi sẽ truyền đạt cho cô ấy."
# 【西瓜】
# display as 西瓜
# JP: 「あ――あ――あ――ああっ」
1956 = "「A――A――A――A.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: そうっと、共感を閉ざします。\n西瓜はパチパチ、まばたきします。
2891 = "Tôi nhẹ nhàng đóng cộng cảm lại. Suika chớp mắt liên hồi."
# monologue
# JP: きらりとなにか――涙にも見える排水が、\nそのまつげから、わずかに、飛ばされ消えていきます。
2552 = "Một thứ gì đó lấp lánh――như những giọt nước mắt thoát ra, từ hàng mi của cô bé, khẽ bay đi và biến mất."
# 【西瓜】
# display as 西瓜
# JP: 「凄い……これほど惹かれているのに……ただひたすらに\n……一番近くで……最良のレイルロオドであろうとだけ」
2202 = "「Tuyệt quá……dù bị thu hút đến nhường này……nhưng chỉ một lòng ……muốn ở bên cạnh……trở thành Railord tốt nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「凄くは、ないと思いますけれど。\nわたくし、だって……そのようにしか、できないだけで」
2118 = "「Tôi không nghĩ là tuyệt đâu. Bởi vì tôi……chỉ có thể làm được như vậy thôi.」"
# 【西瓜】
# display as 西瓜
# JP: 「凄い……凄い……西瓜とは、全然違う」
2006 = "「Tuyệt quá……Tuyệt quá……Hoàn toàn khác với Suika.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、西瓜」
1829 = "「Không đâu, Suika.」"
# monologue
# JP: 思考より先に声が出て。\nおくれて理解が、ゆるゆる、声に追いつきます。
3170 = "Lời nói thốt ra trước cả suy nghĩ. Một lúc sau, sự thấu hiểu mới từ từ bắt kịp lời nói."
# 【ハチロク】
# display as 八六
# JP: 「……西瓜。――わたくしたちは、おんなじです。\n違うのは、それぞれのマスターの、お望みだけ」
1613 = "「……Suika. ――Chúng ta, giống hệt nhau. Điều khác biệt duy nhất, là mong muốn của Master mỗi người thôi.」"
# 【西瓜】
# display as 西瓜
# JP: 「っ！！！！！」
2375 = "「!!!!!」"
# monologue
# JP: 西瓜のおさげが、激しく揺れます。\nこころのうちの動揺と、同意を、強く感じます。
3145 = "Bím tóc của Suika rung lắc dữ dội. Tôi cảm nhận rõ ràng sự bối rối và đồng tình trong lòng cô bé."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、ともに願っております。\nそれぞれのマスターのお役にずっと、立ちたいと」
2106 = "「Chúng ta, đều có chung một nguyện ước. Đó là luôn muốn trở nên hữu ích cho Master của mình.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、強く願っています。志寰とずっと共にありたい。\n志寰のレールの終端まで、旅を、願わくば続けたいと」
2258 = "「Suika, luôn khao khát mãnh liệt. Muốn mãi mãi ở bên Zhihuan. Muốn tiếp tục chuyến hành trình, cho đến tận điểm cuối đường ray của Zhihuan.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、そうですよね。だから、わたくしたちはおんなじ。\n本当に、そっくりおんなじなんです」
2136 = "「Vâng, đúng vậy. Vì thế, chúng ta giống nhau. Thực sự, giống hệt nhau.」"
# 【西瓜】
# display as 西瓜
# JP: 「おんなじならハチロク。どうかハチロク。教えて下さい。\nもしも双鉄先生が、志寰が望んでくれているように」
2231 = "「Nếu giống nhau thì Hachiroku. Xin Hachiroku. Hãy nói cho Suika biết. Giả sử thầy Soutetsu, cũng mong muốn giống như Zhihuan thì.」"
# 【ハチロク】
# display as 八六
# JP: 「お応えします」
2191 = "「Tôi sẽ đáp lại.」"
# monologue
# JP: 断言できます。\n意思と思考と言葉とが、同じ速度で同じ答えを描きます。
3009 = "Có thể khẳng định. Ý chí, suy nghĩ và lời nói, cùng vẽ nên một câu trả lời với cùng một tốc độ."
# 【ハチロク】
# display as 八六
# JP: 「それが、どのようなお望みであれ。わたくしは。\n双鉄さまが、わたくしに求めてくださる全てに、必ず」
2177 = "「Dù đó là mong muốn gì đi chăng nữa. Tôi. Nhất định sẽ đáp ứng mọi điều ngài Soutetsu yêu cầu ở tôi.」"
# 【西瓜】
# display as 西瓜
# JP: 「そうすることで、マスターの旅の一番終わりまで、\n一緒に歩めなくなるとわかっていても？」
1891 = "「Dù biết rằng làm như vậy, sẽ không thể cùng Master bước tiếp đến điểm cuối cùng của chuyến hành trình?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わかっていても。例えばお応えすることで、\nわたくしの機能が明日止まるとしても、変わりませぬ」
2146 = "「Vâng. Dù có biết. Ví dụ như vì đáp lại mong muốn đó, mà chức năng của tôi ngày mai sẽ dừng lại, thì điều đó cũng không thay đổi.」"
# 【西瓜】
# display as 西瓜
# JP: 「どうして、そんな……\nそんなに、強く――」
2175 = "「Tại sao, lại có thể……\nmạnh mẽ đến vậy――」"
# monologue
# JP: ひどく戸惑い――\nきっと、怯えさせてしまった声。
2744 = "Vô cùng bối rối―― Chắc hẳn, giọng nói của tôi đã khiến cô bé sợ hãi."
# monologue
# JP: であるというのに、西瓜をぐっと、\nわたくしの近くに感じます。
2610 = "Mặc dù vậy, tôi lại cảm thấy Suika, đang ở rất gần tôi."
# 【西瓜】
# display as 西瓜
# JP: 「ハチロクは機能停止が……。マスターと一緒の全てが\n二度とできなくなることが、怖くはないのですか？」
2089 = "「Hachiroku không sợ việc ngừng hoạt động sao……. Không sợ việc mọi thứ cùng Master sẽ không bao giờ có thể làm lại lần thứ hai sao?」"
# 【ハチロク】
# display as 八六
# JP: 「怖いですよ。それは。想像だけで、体が震えてしまう程。\nですけれど――。けれど……わたくし……」
2190 = "「Sợ chứ. Tất nhiên rồi. Chỉ tưởng tượng thôi, cơ thể cũng run rẩy. Nhưng mà――. Nhưng mà……tôi……」"
# monologue
# JP: 機能停止を迎えてしまった――
2617 = "Đã đón nhận việc ngừng hoạt động――"
# monologue
# JP: あるいは機能のその途中で、\n廃棄・解体されてしまった妹たちを、思い出します。
2893 = "Hay những đứa em gái đã bị loại bỏ, tháo dỡ ngay khi vẫn còn đang hoạt động, tôi nhớ đến họ."
# 【ハチロク】
# display as 八六
# JP: 「ですけれど、西瓜。機能はいつか停止します。\nそのときを、わたくしたちは、決して制御できませぬ」
1855 = "「Nhưng mà, Suika. Chức năng rồi sẽ có ngày dừng lại. Thời điểm đó, chúng ta tuyệt đối không thể kiểm soát được.」"
# 【西瓜】
# display as 西瓜
# JP: 「制御はできない。確かなことです。だけれど悉究して、\n機能停止を迎える日を先延ばしすることは、可能です」
2176 = "「Không thể kiểm soát. Đó là điều chắc chắn. Nhưng nếu tất cứu, việc trì hoãn ngày đón nhận sự ngừng hoạt động, là điều có thể.」"
# 【ハチロク】
# display as 八六
# JP: 「可能でしょうね。\nその試みも、とても尊く、価値あるものとも理解します」
2099 = "「Có thể chứ nhỉ. Tôi cũng hiểu rằng sự cố gắng đó, rất đáng trân trọng và có giá trị.」"
# monologue
# JP: 少しでも長く、マスターのお役に立ち続けること。
3085 = "Tiếp tục giúp ích cho Master lâu thêm một chút."
# monologue
# JP: それこそが、レイルロオドの――\n物の本懐であるのだろうとも、想います。
2886 = "Đó chính là―― ước nguyện sâu xa của Railord, của một món đồ, tôi nghĩ vậy."
# 【ハチロク】
# display as 八六
# JP: 「けれども西瓜、わたくしは――\n振り返り見る[わだち]轍の姿を、どうしても思ってしまうのです」
1928 = "「Nhưng mà Suika, tôi―― lại cứ nghĩ đến hình ảnh vết bánh xe khi quay đầu nhìn lại.」"
# 【西瓜】
# display as 西瓜
# JP: 「[わだち]轍……車が通ったあとに残る、車輪の跡。\n――動輪たちがレールに残す、かすかな痕跡」
2295 = "「Vết bánh xe……dấu vết bánh xe để lại sau khi xe đi qua. ――Dấu vết mờ nhạt mà các bánh xe chủ động để lại trên đường ray.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちの残せる轍は、\n本当にかすかな――あえかなものです」
2168 = "「Đúng vậy. Vết bánh xe mà chúng ta có thể để lại, thực sự rất mờ nhạt――rất mong manh.」"
# monologue
# JP: レール削正が行われれば、跡形もなく消えてしまう。\n轍があったことさえも、誰にも思い出されなくなる。
3074 = "Nếu tiến hành mài đường ray, nó sẽ biến mất không tì vết. Ngay cả việc từng có vết bánh xe ở đó, cũng chẳng ai nhớ đến nữa."
# monologue
# JP: それでも、轍を残したわたくしにだけ……\nわたくしと、双鉄さまにだけは、きっといつでも――
2598 = "Dù vậy, chỉ đối với tôi, người đã để lại vết bánh xe đó…… Chỉ đối với tôi và ngài Soutetsu, chắc chắn bất cứ lúc nào――"
# 【ハチロク】
# display as 八六
# JP: 「わたくしの旅の終着点で、あえかな轍を振り返るとき。\nわたくしは、その上に、これ以上の後悔を見たくはない」
2003 = "「Tại điểm cuối cùng của chuyến hành trình, khi nhìn lại vết bánh xe mong manh ấy. Tôi không muốn nhìn thấy thêm bất kỳ sự hối hận nào trên đó nữa.」"
# 【西瓜】
# display as 西瓜
# JP: 「っ！！！」
1972 = "「!!!」"
# 【ハチロク】
# display as 八六
# JP: 「それだけなのです。西瓜。双鉄さまとわたくしの轍を。\nわたくしは、悔いることなく振り返りたいだけなのです」
2033 = "「Chỉ vậy thôi. Suika. Vết bánh xe của ngài Soutetsu và tôi. Tôi chỉ muốn có thể quay lại nhìn nó mà không hề hối tiếc.」"
# monologue
# JP: 大きく、大きく刻まれた傷。\n決して消えることの無い傷。
3032 = "Một vết thương được khắc sâu, rất sâu. Một vết thương không bao giờ có thể xóa nhòa."
# monologue
# JP: 旅の終わりを迎えるときには、あの傷とさえ――\n真正面から向き合えるよう、わたくしは自分を運びたい。
3078 = "Khi đón nhận điểm cuối của chuyến hành trình, ngay cả với vết thương đó―― tôi muốn dẫn dắt bản thân mình để có thể đối mặt trực diện với nó."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は……」
2233 = "「Suika……」"
# monologue
# JP: 言葉が、なかなか続きません。
3142 = "Lời nói, mãi không thể tiếp tục."
# monologue
# JP: カタン、コトンと、とても静かな走行音が、\n沈黙の隙間を埋めていきます。
3014 = "Tiếng chạy tàu rất khẽ, cạch cạch, xình xịch, lấp đầy khoảng trống của sự im lặng."
# 【西瓜】
# display as 西瓜
# JP: 「確かに、西瓜は悔いるでしょう。\nこのままずっと、志寰を避ける時間を、重ねるのなら」
2200 = "「Chắc chắn, Suika sẽ hối hận. Nếu cứ tiếp tục lặp lại những khoảng thời gian lảng tránh Zhihuan như thế này.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1967 = "「啊！」" 
# 【西瓜】
# display as 西瓜
# JP: 「っ！！！？　なにかありましたか、ハチロク」
1946 = "「!!!? Có chuyện gì vậy, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、ごめんなさい、その……」
2165 = "「Không, xin lỗi cô, chỉ là……」"
# monologue
# JP: 西瓜の時間を、西瓜の大事な考え事を、\n邪魔してしまい、申し訳なく、恥ずかしいことと思います。
2863 = "Đã làm phiền thời gian của Suika, làm phiền dòng suy nghĩ quan trọng của Suika, tôi cảm thấy thật có lỗi và xấu hổ."
# monologue
# JP: でも、だからこそ伝えます。声が思わず飛び出た理由も、\nきっと、“答え”の一つでしょう。
2605 = "Nhưng, chính vì vậy tôi mới truyền đạt. Lý do khiến tôi bất chợt thốt lên, chắc chắn, cũng là một trong những \"câu trả lời\"."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、こちらにこられているような気がして」
2108 = "「Tôi có cảm giác ngài Soutetsu đang đến đây.」"
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生が？　西瓜には――\nそのような足音は聞こえていな――っ！！？」
2365 = "「Thầy Soutetsu sao? Suika―― không hề nghe thấy tiếng bước chân nào như vậy――!!?」"
# 【ハチロク】
# display as 八六
# JP: 「あ、やはりでしたか？」
1976 = "「A, quả nhiên là vậy sao?」"
# monologue
# JP: 西瓜が、驚いた顔で頷きます。\nじわじわ、嬉しさがこみあげてきます。
3157 = "Suika gật đầu với vẻ mặt ngạc nhiên. Niềm vui dần dần trào dâng trong tôi."
# monologue
# JP: 足音が、わたくしの耳にも届きます。\nですので、立ち上がりお迎えします。
3087 = "Tiếng bước chân cũng đã lọt vào tai tôi. Vì vậy, tôi đứng dậy để đón ngài ấy."
# 【ハチロク】
# display as 八六
# JP: 「こんばんわ、双鉄さま。\nとても静かで、優しく素敵な夜ですね？」
2152 = "「Chào buổi tối, ngài Soutetsu. Một đêm thật yên tĩnh, dịu dàng và tuyệt vời nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「やふぁひ、ほほふぁ。ふぁ――あっ――あっ――\nうふぁっ――ん……寝台に……いなかった……ので」
1940 = "「À, ừm. Oáp――a――a―― Ưm――……Thấy em……không có trên giường……nên.」"
# 【ハチロク】
# display as 八六
# JP: 「探しに来てくださったのですね？\nありがとうございます。双鉄さま」
2120 = "「Ngài đã đi tìm tôi sao?\nCảm ơn ngài. Ngài Soutetsu.」"
# monologue
# JP: 西瓜とすごしたお茶会は、\n双鉄さまにも、ナイショにしたいような気がして――
2705 = "Buổi tiệc trà cùng với Suika, tôi có cảm giác muốn giữ bí mật với cả ngài Soutetsu――"
# monologue
# JP: あと、どさくさで甘えたくって！\n双鉄さまのお腕にもたれてしまいます。
2657 = "Hơn nữa, tôi muốn nhân cơ hội này làm nũng! Nên tôi đã tựa vào cánh tay của ngài Soutetsu."
# 【ハチロク】
# display as 八六
# JP: 「ご心配をおかけしてすみません。\nさ、ご一緒に、わたくしたちの寝台にもどりましょう？」
2087 = "「Xin lỗi vì đã làm ngài lo lắng. Nào, chúng ta cùng quay lại giường của mình nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む。ふぁぁあああああああ」
1952 = "「Ư……m. Oápppppppppp.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
1995 = "「Ufufu.」"
# monologue
# JP: 双鉄さまの腕にもたれて、そのまま一緒に歩きだし。\n歩きだしざま、西瓜を一瞬、振り返ります。
2775 = "Tựa vào cánh tay ngài Soutetsu, tôi cùng ngài ấy bước đi. Vừa bước đi, tôi ngoảnh lại nhìn Suika một thoáng."
# 【西瓜】
# display as 西瓜
# JP: 「謝謝。晩安」
2278 = "「Cảm ơn. Ngủ ngon.」"
# monologue
# JP: ささやき声です。そのうえおそらく、仲国語。
2749 = "Một tiếng thì thầm. Hơn nữa có lẽ là tiếng Trung."
# monologue
# JP: だけれど、共感を閉ざしていても、\nなにを言われたか、わかります。
2593 = "Nhưng, dù đã đóng cộng cảm, tôi vẫn hiểu cô bé đang nói gì."
# monologue
# JP: だから、わたくしもお返しします。\n今日の素敵なお茶会に、誘ってもらえた、御礼を。
2905 = "Vì vậy, tôi cũng đáp lại. Lời cảm ơn vì đã mời tôi đến buổi tiệc trà tuyệt vời hôm nay."
# 【ハチロク】
# display as 八六
# JP: 「ありがとう、西瓜。おやすみなさい」
2280 = "「Cảm ơn cô, Suika. Ngủ ngon nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1579 = "「…………」" 
# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1579 = "「…………」" 
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 
# 【双鉄】
# display as ３人
# JP: 「っ！！！？」「ふえっ！？」\n「なにごとですかっ！？」
2378 = "「!!!?」「Uể!?」\n「Có chuyện gì vậy!?」"
# monologue
# JP: 非常ブレーキの音が聞こえた。\n寝ぼけて錯覚などしていないなら、その直前には衝動も。
3055 = "Tôi nghe thấy tiếng phanh khẩn cấp. Nếu không phải do ngái ngủ mà sinh ra ảo giác, thì ngay trước đó còn có cả một chấn động."
# 【志寰】
# display as 志寰
# JP: 「西瓜！」
2265 = "「Suika!」"
# 【西瓜】
# display as 西瓜
# JP: 「志寰！！」
2067 = "「Zhihuan!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
2376 = "「!!!?」"
# monologue
# JP: 落ちる！！　西瓜が目の前をっ！？
3133 = "Rơi xuống!! Suika rơi ngay trước mắt tôi!?"
# monologue
# JP: （どさっ）
3280 = "(Phịch)"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「あっ！」\n「わっ！？　すごっ！」
1969 = "「A!」\n「Oa!? Tuyệt quá!」"
# monologue
# JP: 落ちた西瓜を志寰君は抱きとめて、\nそのまますばやくブーツを履かせ地面に立たせ――
2789 = "Cậu Zhihuan đỡ lấy Suika đang rơi xuống, rồi nhanh chóng xỏ ủng cho cô bé và đặt xuống sàn――"
# 【志寰】
# display as 志寰
# JP: 「機関車を見てきます！\n西瓜の共感では、事故ではないとのことですが」
2105 = "「Bọn em đi xem đầu máy đây! Theo cộng cảm của Suika thì không phải là tai nạn đâu ạ.」"
# 【西瓜】
# display as 西瓜
# JP: 「右田先生たちは待機していて欲しいです。\nなにかあれば西瓜がハチロクに共感で連絡します」
1936 = "「Thầy Migita và mọi người cứ ở đây chờ nhé. Có gì Suika sẽ liên lạc với Hachiroku qua cộng cảm.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、そのようにでよろしいでしょうか？」
2367 = "「Ngài Soutetsu, như vậy có được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕には異論ない」
1980 = "「Ừm. Tôi không có ý kiến gì.」"
# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい！　気をつけて！！」
2069 = "「Đi cẩn thận nhé!!」"
# monologue
# JP: 日々姫の声が終わるより先、\n志寰君と西瓜は機関車に向け走り始める。
2968 = "Tiếng của Hibiki chưa dứt, cậu Zhihuan và Suika đã bắt đầu chạy về phía đầu máy."
# 【姜】
# display as 姜
# JP: 「ん……ん？　あ――なにか、ありましたか」
1954 = "「Ưm……hửm? A――có chuyện gì vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……姜さん。起こしてしまいましたか、すみません」
1960 = "「A……cô Jiang. Đánh thức cô rồi sao, xin lỗi cô.」"
# monologue
# JP: 寝ぼけた声が申しわけなく。けれど同時に安心させられる。\nあの衝動とブレーキ音。凄まじいものと感じたが……
2750 = "Giọng nói ngái ngủ khiến tôi thấy có lỗi. Nhưng đồng thời cũng làm tôi an tâm. Chấn động và tiếng phanh đó. Tôi cảm thấy nó rất khủng khiếp nhưng……"
# monologue
# JP: それはどうやら、僕たちだけに――\n鉄道屋にとってだけの感覚であったらしいと、理解でき。
2613 = "Có vẻ như đó chỉ là cảm giác đối với chúng tôi―― những người làm đường sắt mà thôi, tôi hiểu ra điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「車輌故障等が発生したようで、列車が停止しています。\nいま、志寰君と西瓜が機関車を見にいっています」
1850 = "「Có vẻ như đã xảy ra sự cố hỏng hóc xe cộ gì đó nên tàu đang dừng lại. Bây giờ cậu Zhihuan và Suika đang đi kiểm tra đầu máy rồi.」"
# 【姜】
# display as 姜
# JP: 「そうでしたか」
1897 = "「Vậy sao.」"
# monologue
# JP: 姜さんは、口をつぐんで通路に顔を出し、左右を見渡す。\nああ……あたりもまだ、どうやら寝静まっているようだ。
2764 = "Cô Jiang ngậm miệng, thò mặt ra lối đi và nhìn quanh. À……xung quanh có vẻ vẫn đang chìm trong giấc ngủ say."
# 【姜】
# display as 姜
# JP: 「誰も起き出していないのは幸運ですね。\nこのまま障害が解消してくれればよいのですが」
2166 = "「Thật may là không ai thức giấc. Giá mà cứ thế này khắc phục được sự cố thì tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですね」
2199 = "「Đúng vậy nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――双鉄さま。西瓜からの共感です」
1958 = "「A――ngài Soutetsu. Có cộng cảm từ Suika ạ.」"
# monologue
# JP: いって、ハチロクはしばし沈黙。\nややあり、抑えた。けれど安堵と喜びのにじむ声を出す。
3056 = "Nói xong, Hachiroku im lặng một lát. Một lúc sau, em ấy cất giọng kìm nén. Nhưng vẫn toát lên sự an tâm và vui mừng."
# 【ハチロク】
# display as 八六
# JP: 「単純な車両故障とのことです。自力での再始動は困難の\nようですが、幸い、救援機もすぐに派遣される、と」
2098 = "「Là hỏng hóc xe cộ đơn thuần thôi ạ. Có vẻ khó tự khởi động lại được, nhưng may mắn là đầu máy cứu hộ sẽ được phái đến ngay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――不幸中の幸いといったところだな」
2331 = "「Vậy sao――trong cái rủi có cái may nhỉ.」"
# monologue
# JP: いいつつ、体を横たえ直す。
2840 = "Vừa nói, tôi vừa nằm xuống lại."
# 【双鉄】
# display as 雙鐵
# JP: 「で、あるのなら、僕らは安心して待てばいい。\n話を続け、周囲の誰かを起こしでもしてはご迷惑だし」
2013 = "「Nếu vậy, chúng ta cứ yên tâm chờ đợi thôi. Tiếp tục nói chuyện lỡ đánh thức ai đó xung quanh thì phiền lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「だね。わかった。おやすみなさーい」
2134 = "「Đúng á. Em hiểu rồi. Ngủ ngon nha~」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。おやすみなさいませ」
2011 = "「Đã rõ ạ. Chúc mọi người ngủ ngon.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。おやすみ」
1987 = "「Ừm. Ngủ ngon.」"
# 【姜】
# display as 姜
# JP: 「みなさま、安心しておやすみ下さい」
2277 = "「Mọi người cứ yên tâm ngủ đi nhé.」"
# monologue
# JP: 姜さんも、とは口に出せない。
2655 = "Tôi không thể nói \"Cô Jiang cũng vậy nhé\"."
# monologue
# JP: 列車の安全運行が再開されるまで、\n姜さんは、決して眠らないだろうから。
3037 = "Bởi vì cho đến khi tàu an toàn chạy lại, cô Jiang chắc chắn sẽ không chợp mắt."
# monologue
# JP: （まぁ、それは僕らにしても同じことか）
3266 = "(Mà, đối với chúng tôi cũng vậy thôi)"
# monologue
# JP: 横にならねば、口を閉じねば、\n誰かを起こしてしまう可能性がその分、あがる。
2755 = "Nếu không nằm xuống, nếu không im lặng, khả năng đánh thức ai đó sẽ tăng lên."
# monologue
# JP: ゆえに横にはなるけれど、障害が解消されるまで、\n眠りになどは、どうやっても陥れるものとも思えん。
2896 = "Vì vậy tôi nằm xuống, nhưng cho đến khi sự cố được khắc phục, tôi không nghĩ mình có thể chợp mắt được."
# monologue
# JP: （……鉄道屋とは、因果なものだなぁ）
3234 = "(……Nghề đường sắt, đúng là có duyên nợ mà.)"
# monologue
# JP: いっそ忙しく動き回っている方が、\n気持ち的にはよっぽど楽だ。
3162 = "Thà cứ bận rộn chạy ngược chạy xuôi, tâm trạng còn thấy thoải mái hơn nhiều."
# monologue
# JP: 日々姫などは外に飛び出し、故障の様子を\nスケッチしたい気持ちでいっぱいだろう。
2955 = "Hibiki chắc đang rất muốn nhảy ra ngoài để phác thảo lại cảnh hỏng hóc này."
# monologue
# JP: （が、それは無礼だ。信義にもとる。\n日々姫も無論、抑えられるほど大人になった）
3268 = "(Nhưng làm vậy là thất lễ. Trái với đạo nghĩa. Tất nhiên Hibiki cũng đã đủ lớn để kiềm chế được.)"
# monologue
# JP: ゆえに、静かだ。
2903 = "Vì vậy, thật yên tĩnh."
# monologue
# JP: 弓弦をいっぱいに引き込んだような、強い緊張を孕む\n静止ではあるが――誰ひとり物音も、声もたてない。
2754 = "Một sự tĩnh lặng mang theo sự căng thẳng tột độ như dây cung kéo căng ――nhưng không một ai phát ra tiếng động hay giọng nói nào."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: ……しかし、つくづく、三段寝台は[きょうあい,1]狭隘だ。\nレイルロオドには十分だろうが、成人男性には些かきつい。
1555 = "……Nhưng mà, nghĩ lại thì, giường ba tầng hẹp thật đấy. Với Railord thì đủ, chứ với đàn ông trưởng thành thì hơi chật."
# monologue
# JP: 寝返り一つ打つのにも――
2779 = "Ngay cả việc trở mình cũng――"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　いま何か……\nいや。うむ？」
1993 = "「Hửm? Vừa rồi có gì đó……\nKhông. Hửm?」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「どぎゃんしたと？　にぃに」\n「いかがされました？　双鉄さま」
1905 = "「Có chuyện gì á? Anh hai.」 「Có chuyện gì vậy ạ? Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1977 = "「À, không.」"
# monologue
# JP: ふたりとも、やはり張り詰めていたのだろう。
2739 = "Cả hai người họ, quả nhiên cũng đang căng thẳng."
# monologue
# JP: 潜めに潜めたつぶやきに、打てば響くで\n潜めに潜めた声が口々、返されてくる。
2913 = "Lời lẩm nhẩm cực kỳ nhỏ của tôi, lập tức được đáp lại bằng những giọng nói cũng được hạ nhỏ hết mức."
# 【双鉄】
# display as 雙鐵
# JP: 「この客車なのだが――\n勾配の途中にとまっていないか？」
2337 = "「Toa hành khách này―― có phải đang dừng ở giữa dốc không?」"
# monologue
# JP: 一瞬。空白。\nややあり日々姫が頷く気配。
2668 = "Một thoáng. Trống rỗng. Một lúc sau, có tiếng Hibiki gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「ほんとだ。傾むいとーとね」
2208 = "「Thật á. Nó đang nghiêng kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「……ですね。[このからだ,2]整備体でもわかりますから、\n決して小さくはない勾配です」
1605 = "「……Đúng vậy. Ngay cả với [cơ thể này] thân chính cũng có thể nhận ra, chắc chắn độ dốc không hề nhỏ.」"
# monologue
# JP: 気づいてしまえば、これは明確に傾いている。\n最初からこの状態だったのならば大した問題ではなかろう。
2934 = "Khi đã nhận ra, thì rõ ràng là nó đang nghiêng. Nếu ngay từ đầu đã ở trạng thái này thì không có vấn đề gì lớn."
# monologue
# JP: が……万一平坦部から傾斜部へ、\nブレーキが負け、引きずり込まれ初めているなら――
2591 = "Nhưng……lỡ như từ đoạn bằng phẳng chuyển sang đoạn dốc, phanh bị mất tác dụng và bắt đầu bị kéo tuột xuống thì――"
# 【姜】
# display as 姜
# JP: 「傾斜、してますか？」
2329 = "「Đang nghiêng sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あの、姜さん。これ、よかったら」
1973 = "「À, cô Jiang. Cái này, nếu được thì.」"
# 【姜】
# display as 姜
# JP: 「ああ――謝謝」
1948 = "「À――Cảm ơn.」"
# monologue
# JP: 日々姫が手渡した鉛筆を、\n姜さんは無人の通路にそうっと置く。
2762 = "Cây bút chì Hibiki đưa, cô Jiang nhẹ nhàng đặt xuống lối đi không người."
# monologue
# JP: 置かれた鉛筆はゆっくりと。けれどすぐさま転がり始める。\n――予想以上に勾配がある。
3206 = "Cây bút chì được đặt xuống từ từ. Nhưng ngay lập tức bắt đầu lăn. ――Độ dốc lớn hơn dự đoán."
# 【ハチロク】
# display as 八六
# JP: 「編成も長いですし、お客さまも多い。\nこの傾斜だと、静かに引き出すのは少し――あ」
2221 = "「Đoàn tàu dài, hành khách lại đông. Với độ nghiêng này, để khởi hành êm ái thì hơi――a.」"
# 【双鉄】
# display as 雙鐵
# JP: 「共感か」
1872 = "「Cộng cảm à.」"
# monologue
# JP: ハチロクは小さく頷き、\nしばし言葉を閉ざしてしまう。
2639 = "Hachiroku khẽ gật đầu,\nim lặng một lúc."
# 【ハチロク】
# display as 八六
# JP: 「……技術的に相談したいことがあるとのことです。\n運転台まできてもらえないか、と」
1614 = "「……Có chuyện muốn thảo luận về mặt kỹ thuật ạ. Họ hỏi ngài có thể đến buồng lái được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった、すぐに向かうと返事してくれ」
2210 = "「Hiểu rồi, hãy trả lời là tôi sẽ đến ngay.」"
# 【日々姫】
# display as 日日姬
# JP: 「私、荷物番しとったほうがよかとよね？」
2113 = "「Em, nên ở lại trông hành lý thì hơn ha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1562 = "「――」"
# monologue
# JP: このチームの責任者は僕であるゆえ、\nここはいかねばならんだろう。
3179 = "Vì tôi là người chịu trách nhiệm của đội này, nên tôi phải đi thôi."
# monologue
# JP: 共感を使うかもしれんことを考えるなら、\nハチロクも必須に違いない。が……
3067 = "Nếu xét đến việc có thể phải dùng cộng cảm, thì Hachiroku cũng bắt buộc phải đi. Nhưng……"
# 【姜】
# display as 姜
# JP: 「いえ、荷物番は当方が。\nいま行っても、何もできることはないでしょうし」
1834 = "「Không, để tôi trông hành lý cho. Bây giờ tôi có đi thì cũng chẳng làm được gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。ありがとうございます」
2111 = "「Tôi hiểu rồi. Cảm ơn cô.」"
# monologue
# JP: 正直助かる。\n日々姫の瞳と記録とを、この状況下で欠きたくは無い。
3202 = "Thành thật mà nói, cô ấy đã giúp tôi một việc lớn. Tôi không muốn thiếu đôi mắt và khả năng ghi chép của Hibiki trong tình huống này."
# monologue
# JP: ゆえ、姜さんへと深く黙礼し、\n寝台をおり、手早く身支度を整える。
2909 = "Vì vậy, tôi cúi đầu chào cô Jiang, xuống khỏi giường, nhanh chóng chỉnh đốn trang phục."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、いくぞ。ハチロク、日々姫」
2356 = "「Vậy thì, đi thôi. Hachiroku, Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……近場に救援可能な機関車が、\nこの一両しかなかった、と」
1893 = "「Ra là vậy……đầu máy có thể cứu hộ ở gần đây, chỉ có một chiếc này thôi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「レイルロオド損失により廃車予定の、最初期型。\n第一次製造の東富4型機関車。でございますか」
2140 = "「Do mất Railord nên dự định loại bỏ, là mẫu đầu tiên. Đầu máy Dongfu 4 sản xuất đợt đầu. Có phải không ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「最初期型、ってことは、西瓜ちゃんの試作機と、\n形、近かと？」
2158 = "「Mẫu đầu tiên, nghĩa là, hình dáng gần giống với máy thử nghiệm của Suika á?」"
# 【西瓜】
# display as 西瓜
# JP: 「近いというか、同一です。こまかな外装品、それから\nギア比。構成的な差異はただそれだけしかありません」
2293 = "「Gần giống, hay đúng hơn là giống hệt. Các phụ tùng ngoại thất nhỏ lẻ, và tỷ số truyền. Sự khác biệt về cấu tạo chỉ có bấy nhiêu thôi.」"
# 【志寰】
# display as 志寰
# JP: 「ですので、僕らが運転することに、\n一切の技術的な支障はありません」
2123 = "「Vì vậy, việc chúng em lái nó, hoàn toàn không có trở ngại kỹ thuật nào cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2107 = "「Chắc là vậy rồi.」"
# monologue
# JP: 少年のよう、と、志寰君のその印象が消えている。\n運転台に立つ彼は、どこをどう見ても機関士だ。
2885 = "Ấn tượng về một cậu thiếu niên của cậu Zhihuan đã biến mất. Đứng trong buồng lái, cậu ấy nhìn thế nào cũng là một người lái tàu."
# 【双鉄】
# display as 雙鐵
# JP: 「この機関車――救援機が本務機とすでに連結されている\nことに驚いた。衝動を僕は感じなかった。いい腕だ」
2338 = "「Đầu máy này――tôi ngạc nhiên khi thấy đầu máy phụ đã được nối với đầu máy chính rồi. Tôi không hề cảm nhận được chấn động nào. Tay lái tốt lắm.」"
# 【志寰】
# display as 志寰
# JP: 「西瓜の指示のおかげです」
2362 = "「Nhờ sự chỉ dẫn của Suika đấy ạ.」"
# 【西瓜】
# display as 西瓜
# JP: 「志寰は謙遜しています。連結に際し、\n西瓜はほとんど、指示らしい指示を出していません」
2059 = "「Zhihuan đang khiêm tốn thôi. Khi nối tàu, Suika hầu như không đưa ra chỉ dẫn nào đáng gọi là chỉ dẫn cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――なるほど」
1566 = "「――Ra là vậy.」"
# monologue
# JP: 志寰君と西瓜の距離感も好ましい。
2808 = "Khoảng cách giữa cậu Zhihuan và Suika cũng thật đáng yêu."
# monologue
# JP: いままでずっとどこかつきまとっていたギクシャクが、\n綺麗さっぱり消え失せたようにさえ見える。
2987 = "Sự gượng gạo luôn đeo bám từ trước đến nay, dường như đã biến mất sạch sẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「で――その上での問題というのは、一体？」
2350 = "「Vậy――vấn đề trên hết rốt cuộc là gì?」"
# 【志寰】
# display as 志寰
# JP: 「この機関車の出力不足です。全客車と故障牽引機を、\nこの機関車の現在の出力では引き出せないのです」
2340 = "「Là sự thiếu hụt công suất của đầu máy này. Với công suất hiện tại của nó, không thể kéo nổi toàn bộ toa hành khách và đầu máy bị hỏng.」"
# 【西瓜】
# display as 西瓜
# JP: 「レイルロオド損失に伴う廃車前提の\x%l入換機;#00ffc040;入換機%l;#;として、\nろくな整備も受けず運用されつづけていたそうですので」
1998 = "「Là \\x%l入換機;#00ffc040;đầu máy dồn toa%l;#; với tiền đề sẽ bị loại bỏ do mất Railord, nghe nói nó vẫn tiếp tục được vận hành mà không được bảo dưỡng đàng hoàng.」"
# 【志寰】
# display as 志寰
# JP: 「逆にいえば、だからすぐさま自由に動けたのですが。\n他の救援機を待つと、遅延は更に一時間以上拡大します」
1918 = "「Nói ngược lại, chính vì vậy mà nó mới có thể tự do di chuyển ngay lập tức. Nếu chờ đầu máy cứu hộ khác, sự chậm trễ sẽ kéo dài thêm hơn một giờ nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。大まかな状況は理解できたように思う」
1896 = "「Ra là vậy. Tôi nghĩ mình đã hiểu được tình hình đại khái rồi.」"
# monologue
# JP: ふっと、沈黙。\nスケッチを止め、日々姫がはい、と小さく手を上げる。
2731 = "Bất chợt, im lặng. Dừng việc phác thảo, Hibiki giơ tay lên nhỏ nhẹ nói \"Dạ\"."
# 【日々姫】
# display as 日日姬
# JP: 「この機関車ばつれてきてくれた入換機関士さんは？」
2372 = "「Người lái tàu dồn toa đưa đầu máy này đến đâu rồi á?」"
# 【志寰】
# display as 志寰
# JP: 「整備の有資格者とのことなので、故障した機関車を\n見てもらっています。ですが、回復は困難なようですね」
1846 = "「Nghe nói là người có chứng chỉ bảo dưỡng, nên đang đi xem đầu máy bị hỏng rồi. Nhưng có vẻ như việc phục hồi rất khó khăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばまずは、用語を確認しよう」
2332 = "「Vậy sao. Thế thì trước tiên, hãy xác nhận thuật ngữ đã.」"
# monologue
# JP: 言えばすぐさま、みなが頷く。
3171 = "Vừa dứt lời, mọi người lập tức gật đầu."
# monologue
# JP: 志寰君と西瓜とが、いくら達者な日ノ本語話者とはいえど、\n専門用語をすり合わせねば、いらぬ危険を招きかねない。
2563 = "Dù cậu Zhihuan và Suika có nói tiếng Hinomoto giỏi đến đâu, nếu không thống nhất các thuật ngữ chuyên môn, có thể sẽ dẫn đến những nguy hiểm không đáng có."
# 【双鉄】
# display as 雙鐵
# JP: 「この機関車が救援機。故障中の本来の牽引機関車が、\n本務機。……最後尾の客車に、車掌ブレーキは？」
2339 = "「Đầu máy này là đầu máy phụ. Đầu máy kéo chính đang bị hỏng là đầu máy chính. ……Ở toa hành khách cuối cùng, có phanh của trưởng tàu không?」"
# 【志寰】
# display as 志寰
# JP: 「はい。\nもちろんついていますし、車掌も常駐しています」
2192 = "「Vâng. Tất nhiên là có, và trưởng tàu cũng luôn túc trực ở đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その車輌をいまは\x%l車掌車;#00ffc040;車掌車%l;#;と呼称する。\nここまでに疑問のある者は？」
2359 = "「Vậy thì, hiện tại toa xe đó sẽ được gọi là \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;. Đến đây có ai có thắc mắc gì không?」"
# monologue
# JP: ……誰も疑問の手をあげない。\n用語は、それではこれで行こう。
1551 = "……Không ai giơ tay thắc mắc. Vậy thì thuật ngữ sẽ thống nhất như thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「次に西瓜。救援機をふくめたこの車輌の\n現在の編成を、説明してくれ」
2180 = "「Tiếp theo là Suika. Hãy giải thích về đoàn tàu hiện tại bao gồm cả đầu máy phụ đi.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は現在の編成を説明します。進行、聖都方向から、\n救援機、本務機、客車10両、餐車１両、\x%l車掌車;#00ffc040;車掌車%l;#;1両です」
2263 = "「Suika xin giải thích về đoàn tàu hiện tại. Hướng di chuyển từ phía Thánh đô, đầu máy phụ, đầu máy chính, 10 toa hành khách, 1 toa ăn, 1 \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふわ！　14両編成！！！\nめっちゃすごかと！　長かとね～！！」
1942 = "「Oa! Đoàn tàu 14 toa!!!\nĐỉnh quá chừng! Dài ghê á~!!」"
# 【ハチロク】
# display as 八六
# JP: 「そうして客車では、ほぼ満員のお客様たちが、\n眠りに落ちていらっしゃるわけですね」
2224 = "「Và trong các toa hành khách, những vị khách gần như kín chỗ, đều đang chìm trong giấc ngủ say nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「ハチロクの認識は、西瓜の認識と合致しています」
1866 = "「Nhận thức của Hachiroku hoàn toàn trùng khớp với nhận thức của Suika.」"
# monologue
# JP: であらば、事態は概ね整頓できてきたかと思う。\n残すところはあと一点、ここは確認せねばならない。
3200 = "Nếu vậy, tôi nghĩ tình hình đại khái đã được làm rõ. Chỉ còn một điểm cuối cùng, cần phải xác nhận lại."
# 【双鉄】
# display as 雙鐵
# JP: 「列車は現在、上り勾配の途中に停車している？」
1880 = "「Đoàn tàu hiện tại đang dừng ở giữa dốc lên phải không?」"
# 【西瓜】
# display as 西瓜
# JP: 「そのとおりです。\n約14パーミルの勾配の途中に停車しています」
2084 = "「Đúng vậy ạ. Đang dừng ở giữa đoạn dốc khoảng 14 phần nghìn.」"
# 【ハチロク】
# display as 八六
# JP: 「この\x%l長大編成;#00ffc040;長大編成%l;#;で14パーミルの坂の途中。機関車の出力も\n弱いなら……確かに、引き出しは多少困難ですね」
1861 = "「Với \\x%l長大編成;#00ffc040;đoàn tàu siêu dài%l;#; này lại ở giữa dốc 14 phần nghìn. Nếu công suất đầu máy cũng yếu nữa……thì quả thật, việc khởi hành có hơi khó khăn.」"
# 【志寰】
# display as 志寰＆雙鐵
# JP: 「っ！！？」\n「だな。連結器も伸び切っていた――まずはそれを」
1983 = "「!!?」 「Đúng vậy. Khớp nối toa xe cũng đang bị kéo căng――trước hết là cái đó.」"
# 【西瓜】
# display as 西瓜
# JP: 「あの」
2124 = "「Cho em hỏi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1991 = "「Hửm?」"
# monologue
# JP: 珍しく、西瓜が会話に割って入ってきた。\nその目は丸く――完全に驚いた顔をしている。
3154 = "Hiếm khi Suika lại ngắt lời chen ngang vào cuộc trò chuyện. Đôi mắt cô bé tròn xoe――hoàn toàn là một khuôn mặt kinh ngạc."
# 【西瓜】
# display as 西瓜
# JP: 「“引き出しは多少困難”という日ノ本語は、\n“困難だが可能”という意味で、間違いないですか？」
1577 = "「Cụm từ tiếng Hinomoto \"khởi hành có hơi khó khăn\", có nghĩa là \"khó khăn nhưng vẫn có thể\", đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。間違いない。引き出しはもちろん可能だ。\n乗客を起こさないようにというのが難しいかもしれんが」
1988 = "「Ừm. Đúng vậy. Khởi hành thì tất nhiên là có thể. Chỉ là việc không đánh thức hành khách có thể hơi khó thôi.」"
# 【志寰】
# display as 志寰
# JP: 「それは、一体どうやって」
2323 = "「Chuyện đó, rốt cuộc làm bằng cách nào.」"
# monologue
# JP: 虚をつかれる。\nまさかそこに驚かれるものとは思わなかった。
3195 = "Tôi hơi bất ngờ. Không ngờ họ lại ngạc nhiên về điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……逆に、まずは教えてほしいのだが――君たちは、\nこうしたときには、普段、どう対処しているのだ？」
1619 = "「……Ngược lại, trước tiên tôi muốn biết――Các cậu, lúc thế này bình thường sẽ xử lý ra sao?」"
# monologue
# JP: 今度は志寰君までが、ひどく驚いたような顔。
3201 = "Lần này đến lượt cậu Zhihuan lộ vẻ mặt vô cùng kinh ngạc."
# monologue
# JP: 僕もおそらく、似た表情をしてしまっていると思われる、\n“自分は一体、何を聞かれているのだろう”という顔だ
2871 = "Tôi có lẽ cũng đang mang một biểu cảm tương tự, một khuôn mặt tự hỏi \"Mình rốt cuộc đang bị hỏi cái gì vậy\"."
# 【志寰】
# display as 志寰
# JP: 「十分な余力をもてる必要両数の機関車を手配します。\n今回の場合は、そうした救援機を待ちます」
2276 = "「Bọn em sẽ sắp xếp số lượng đầu máy cần thiết để có đủ công suất dư thừa. Trong trường hợp này, bọn em sẽ chờ những đầu máy cứu hộ đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1947 = "「!!?」"
# 【西瓜】
# display as 西瓜
# JP: 「一番安全で一番確実。なんの間違いもない方法です」
2328 = "「Đó là cách an toàn nhất và chắc chắn nhất. Một phương pháp không có sai sót nào.」"
# monologue
# JP: まさに正道。あるいは王道。\n正論すぎて、反論の余地などまるでない。
2976 = "Quả là chính đạo. Hay vương đạo. Quá chí lý, không có chỗ nào để phản bác."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに――それはまことに、確かにだ」
2198 = "「Đúng vậy――Đó quả thực là sự thật.」"
# monologue
# JP: 思わず零したつぶやきに、\nハチロク、日々姫も深々、頷く。
2841 = "Trước tiếng lẩm nhẩm bất chợt của tôi, Hachiroku và Hibiki cũng gật đầu thật sâu."
# 【ハチロク】
# display as 八六
# JP: 「安全で、確実で、特別な技量なども必要とはならない」
2015 = "「An toàn, chắc chắn, và không cần kỹ năng đặc biệt nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「お国柄の違い、こぎゃんとこでも出るとね～」
2001 = "「Sự khác biệt về văn hóa quốc gia, thể hiện ở những chỗ thế này đây~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……だな」
1964 = "「À……đúng vậy nhỉ.」"
# monologue
# JP: 物資や資源が足りないとき、日ノ本人は、\n『現場の工夫』でやりくりしようとしてしまう。
3018 = "Khi thiếu hụt vật tư và tài nguyên, người Hinomoto thường cố gắng xoay xở bằng 『sự khéo léo tại hiện trường』."
# monologue
# JP: だが仲国では、単純に不足を補充する。――島国と大陸と。\nそれは恐らく、資源そのものの多寡から生じる差異だろう。
2595 = "Nhưng ở Trung Quốc, họ đơn giản là bổ sung những gì còn thiếu. ――Quốc đảo và đại lục. Đó có lẽ là sự khác biệt nảy sinh từ sự phong phú của chính tài nguyên."
# 【双鉄】
# display as 雙鐵
# JP: 「が、今のような、遅延を拡大させたくないときには、\n僕らの知恵も有用であるかもしれん。――日々姫」
1853 = "「Nhưng, trong lúc không muốn làm tăng thêm sự chậm trễ như hiện tại, trí tuệ của chúng ta có lẽ cũng hữu ích đấy. ――Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん、にぃに」
1990 = "「Dạ, anh hai.」"
# monologue
# JP: 日々姫がスケッチブックを広げてくれる。
2959 = "Hibiki mở cuốn sổ phác thảo ra."
# monologue
# JP: 日々姫の絵での補足があれば、\nまず間違いなく、説明できようし伝わろう。
2889 = "Nếu có thêm tranh vẽ minh họa của Hibiki, chắc chắn tôi sẽ có thể giải thích và truyền đạt được."
# 【双鉄】
# display as 雙鐵
# JP: 「こうした引き出しで重要になるのは連結器。\nより厳密には、連結器に遊びを生じさせることとなる」
2335 = "「Điều quan trọng trong cách khởi hành này là khớp nối toa xe. Nói chính xác hơn là tạo ra độ rơ cho khớp nối toa xe.」"
# monologue
# JP: 日々姫のペンの動きを待つ。
2625 = "Tôi chờ nét bút của Hibiki."
# monologue
# JP: ＜伸び切っている＞と＜遊びがある＞と、\nそれぞれの状態の連結器たちが、図示される。
2961 = "Những khớp nối toa xe ở trạng thái <Kéo căng> và <Có độ rơ>, lần lượt được minh họa bằng hình vẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「連結器が伸び切っている状態では、\n全ての車輌はひとかたまりの負荷となってしまう」
2193 = "「Ở trạng thái khớp nối toa xe bị kéo căng, tất cả các toa xe sẽ trở thành một khối tải trọng duy nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「満載の14両の全重量を、上り勾配で一気に引き出す。\nこれはなかなか困難なこととなります。けれど」
2383 = "「Kéo toàn bộ trọng lượng của 14 toa xe đầy ắp khách lên dốc cùng một lúc. Đây là một việc khá khó khăn. Nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「連結器の遊びは、編成を一塊りではなく、\n一両＋一両＋一両といった形に分解してくれる。つまり」
2194 = "「Độ rơ của khớp nối toa xe sẽ phân tách đoàn tàu thành từng toa một cộng lại với nhau, chứ không phải là một khối thống nhất. Tức là.」"
# 【志寰】
# display as 志寰
# JP: 「あ！」
# 1967 = "「啊！」" 
# monologue
# JP: 志寰くんと西瓜の顔が、同時に輝く。\n視線と視線がまっすぐ交わり、ふたり、大きく頷き合う。
2806 = "Gương mặt của cậu Zhihuan và Suika đồng loạt sáng lên. Ánh mắt chạm nhau trực diện, cả hai gật đầu mạnh mẽ."
# 【西瓜】
# display as 西瓜
# JP: 「[ｗｏ－ｚｈｉ－ｄａｏ－ｌｅ,3]我知道了！　連結器の遊びを利用して！\n一両、次の一両、次の一両と、連続で引き出すのですね」
2116 = "「Wo zhi dao le! Tận dụng độ rơ của khớp nối toa xe! Khởi hành liên tục từng toa một, rồi toa tiếp theo, rồi toa tiếp theo nữa phải không ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「で。ございます。このやり方を、帝央機関区では、\n『[あっしゅくひきだしほう,4]圧縮引出方』などと呼称しておりました」
2032 = "「Đúng vậy ạ. Ở Khu đầu máy Trung tâm Hoàng gia, cách làm này được gọi là 『Phương pháp khởi hành nén』 ạ.」"
# 【志寰】
# display as 志寰
# JP: 「あっしゅくひきだしほう――なら、このZ49列車も、\n編成全部、連結器を詰めた状態にもっていければ」
2004 = "「Phương pháp khởi hành nén――vậy thì, chuyến tàu Z49 này cũng vậy, nếu có thể đưa toàn bộ đoàn tàu về trạng thái khớp nối toa xe bị nén lại thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのやり方で引き出せよう。連結器の詰め方も、\n最後尾に\x%l車掌車;#00ffc040;車掌車%l;#;がついているということなので」
2036 = "「Ừm. Sẽ khởi hành được bằng cách đó. Cách nén khớp nối toa xe cũng vậy, vì có \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; ở cuối cùng nên.」"
# 【西瓜】
# display as 西瓜
# JP: 「志寰！　簡単！　車掌ブレーキだけ残して、\nあとのブレーキを全部ゆるめれば」
2066 = "「Zhihuan! Đơn giản lắm! Chỉ cần giữ lại phanh của trưởng tàu, rồi nhả toàn bộ các phanh khác ra thì.」"
# 【志寰】
# display as 志寰
# JP: 「……勾配に引き戻されて、自動的に客車、機関車は\n後に下がるから……\x%l車掌車;#00ffc040;車掌車%l;#;が栓をするような形になって」
1589 = "「……Bị độ dốc kéo lại, các toa hành khách và đầu máy sẽ tự động lùi về phía sau……\\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; sẽ trở thành giống như một cái nút chặn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、連結器は詰まる。しかし、いいタイミングで\nブレーキを掛け直さねば、列車全体が逆走しかねない」
2150 = "「Đúng vậy, khớp nối toa xe sẽ bị nén lại. Nhưng, nếu không đạp phanh lại đúng lúc, toàn bộ đoàn tàu có thể bị chạy lùi.」"
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生のご指摘どおりです。車掌ブレーキだけでは、\n全列車が勾配に引き戻される力には、耐えられません」
2366 = "「Đúng như thầy Soutetsu đã chỉ ra. Chỉ với phanh của trưởng tàu, sẽ không thể chịu nổi lực kéo toàn bộ đoàn tàu lùi lại do độ dốc.」"
# 【ハチロク】
# display as 八六
# JP: 「逆に申しますと、車掌ブレーキの解放タイミング。\nそこだけ、何らかの方法であわせられれば」
1920 = "「Nói ngược lại, thời điểm nhả phanh của trưởng tàu. Chỉ cần tìm cách nào đó để khớp với thời điểm đó thì.」"
# 【志寰】
# display as 志寰
# JP: 「あわせられると思います。本務機のレイルロオドに、\n\x%l車掌車;#00ffc040;車掌車%l;#;へと入ってもらって」
2325 = "「Em nghĩ là khớp được. Nhờ Railord của đầu máy chính vào \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど！　ハチロクが直前の車輌――餐車に入って、\n動き出したタイミングで、西瓜へと共感を送れば」
1895 = "「Ra là vậy! Hachiroku vào toa xe ngay phía trước――toa ăn, và gửi cộng cảm cho Suika đúng vào thời điểm bắt đầu di chuyển thì.」"
# 【西瓜】
# display as 西瓜
# JP: 「共感を受け取り次第、西瓜は志寰に、\n全車両への再ブレーキを要請します」
2127 = "「Ngay khi nhận được cộng cảm, Suika sẽ yêu cầu Zhihuan đạp phanh lại cho toàn bộ toa xe.」"
# 【志寰】
# display as 志寰
# JP: 「それで編成全ての連結器を詰まった状態に出来ます。\nそこだけ確認できれば、あとは――」
2333 = "「Như vậy có thể đưa toàn bộ khớp nối toa xe của đoàn tàu về trạng thái nén. Chỉ cần xác nhận được điều đó, phần còn lại thì――」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。――うん！！！」
1979 = "「Ừm. ――Ừm!!!」"
# monologue
# JP: 忙しく動き回っていた日々姫の指が、ようやく止まる。\n流れを図にして確認し――そうして、笑顔が持ち上がる。
2956 = "Những ngón tay bận rộn của Hibiki cuối cùng cũng dừng lại. Vẽ sơ đồ quy trình để xác nhận――rồi, một nụ cười nở rộ."
# 【日々姫】
# display as 日日姬
# JP: 「これならよかね！　連結器ば詰めたら、あとはゆるゆる\n引出していけば、運転再開！　きっとできると！！」
2330 = "「Thế này là được á! Nén khớp nối toa xe lại, rồi cứ thế từ từ khởi hành là có thể chạy lại! Chắc chắn làm được á!!」"
# monologue
# JP: 日々姫と、ハチロクと、頷き合う。
2837 = "Hibiki và Hachiroku gật đầu với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、このやりかたを僕たちとしては提案しよう」
1849 = "「Vậy thì, chúng tôi xin đề xuất cách làm này.」"
# monologue
# JP: 頷き合う。\n志寰くんと西瓜も、深く。
2804 = "Cùng gật đầu. Cậu Zhihuan và Suika cũng gật đầu thật sâu."
# 【志寰】
# display as 志寰
# JP: 「ご提案をありがとうございます。いただいた案で、\n臨時救援機関士　劉　志寰は、Z49列車の救援を試みます」
2370 = "「Cảm ơn mọi người đã đề xuất. Với phương án này, người lái tàu cứu hộ lâm thời Lưu Chí Hoàn, sẽ thử cứu hộ chuyến tàu Z49.」"
# 【西瓜】
# display as 西瓜
# JP: 「右田先生、日々姫女士、ハチロクには、引き続き\n大変恐縮なのですけれども」
1937 = "「Thầy Migita, cô Hibiki, và Hachiroku, tiếp theo cũng rất ngại nhưng mong mọi người giúp đỡ.」"
# 【ハチロク】
# display as 八六
# JP: 「タイミング、間違いなく共感でおくります」
2114 = "「Thời điểm, tôi chắc chắn sẽ gửi qua cộng cảm.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ！」
# 1967 = "「啊！」" 
# monologue
# JP: 思わず、といった風情で、西瓜がハチロクに手を伸ばす。
3128 = "Suika bất giác vươn tay về phía Hachiroku."
# monologue
# JP: ハチロクはその手を一瞬受け取り。\nぐっと握手し、すぐに手放し、敬礼を送る。
2630 = "Hachiroku đón lấy tay cô bé trong giây lát. Bắt tay thật chặt, rồi lập tức buông ra, đưa tay chào nghiêm trang."
# 【西瓜】
# display as 西瓜
# JP: 「！」
# 1967 = "「啊！」" 
# 【志寰】
# display as 志寰
# JP: 「ではみなさん。\nそのようにどうか、よろしくお願いいたします」
2354 = "「Vậy mọi người. Xin hãy làm theo như vậy, trăm sự nhờ mọi người.」"
# monologue
# JP: 西瓜の凛とした答礼と、\n志寰君らしいふんわりとした声に送られ、動き出す。
3083 = "Được tiễn bằng lời đáp lễ dõng dạc của Suika, và giọng nói nhẹ nhàng đặc trưng của cậu Zhihuan, chúng tôi bắt đầu hành động."
# monologue
# JP: 後部ドアから、ハチロクが大きく身を乗り出している。\n目視して、\x%l車掌車;#00ffc040;車掌車%l;#;との車間の距離を確認している。
2635 = "Từ cửa sau, Hachiroku rướn hẳn người ra ngoài. Nhìn bằng mắt thường, xác nhận khoảng cách với \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;."
# monologue
# JP: 万一の事故を防止するため、\nその手を決して離さぬように、強く握る。
3079 = "Để phòng ngừa tai nạn vạn nhất, tôi nắm chặt lấy tay em ấy, tuyệt đối không buông."
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 
# monologue
# JP: ハチロクの排気がほんの少しだけ強くなる。\nあるいはまさに、西瓜となにかの共感を――
2638 = "Khí xả của Hachiroku mạnh lên đôi chút. Hoặc có lẽ, em ấy đang kết nối cộng cảm với Suika――"
# 【ハチロク】
# display as 八六
# JP: 「車掌ブレーキ以外の全ブレーキ。\nゆるみまーーーーーーす――いま」
2363 = "「Toàn bộ phanh ngoại trừ phanh của trưởng tàu. Nhả rồiiiiii――ngay lúc này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――お」
1978 = "「Ừm――ồ.」"
# monologue
# JP: ああ、うまい。\n実にじわじわ、まことに繊細なブレーキゆるめだ。
2713 = "Chà, giỏi thật.\nNhả phanh từ từ, vô cùng tinh tế."
# 【日々姫】
# display as 日日姬
# JP: 「あ……ちょっとずつ下がりはじめたとね」
1965 = "「A……bắt đầu tụt xuống từng chút một rồi nè.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。しかしまだです――まだ、もう少し――」
2144 = "「Vâng. Nhưng vẫn chưa được――vẫn chưa, thêm chút nữa――」"
# monologue
# JP: うまい――これは、本当にうまい。\nこれほど意識をはりつめてなお、ほとんど挙動を感じない。
2561 = "Giỏi――thật sự rất giỏi. Căng thẳng chú ý đến vậy mà hầu như không cảm nhận được chuyển động."
# monologue
# JP: 勾配と重量のバランスを西瓜が完全に演算しきり。\n求められる繊細極まる操作に、志寰君が完全に応え――
2730 = "Suika đã tính toán hoàn hảo sự cân bằng giữa độ dốc và trọng lượng. Cậu Zhihuan đã đáp ứng hoàn hảo thao tác cực kỳ tinh tế được yêu cầu――"
# 【ハチロク】
# display as 八六
# JP: 「いまです！　再制動！！」
2029 = "「Bây giờ! Hãm phanh lại!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1982 = "「!!」"
# monologue
# JP: 静止。ふわりと。なんの衝動も引き起こさずに、一瞬に。
2618 = "Dừng lại. Nhẹ nhàng. Không gây ra bất kỳ chấn động nào, chỉ trong chớp mắt."
# monologue
# JP: ゆえに当然、餐車－\x%l車掌車;#00ffc040;車掌車%l;#;間の――\nこの編成で最後尾にある連結器も――
3065 = "Do đó tất nhiên, giữa toa ăn và \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;―― khớp nối toa xe ở vị trí cuối cùng trong đoàn tàu này cũng――"
# 【ハチロク】
# display as 八六
# JP: 「詰まっております！\nですので、車掌弁以外の全ブレーキを開放し――」
2044 = "「Đã bị nén lại! Vì vậy, hãy nhả toàn bộ phanh ngoại trừ van của trưởng tàu――」"
# monologue
# JP: （ばしゅーーっ）
3289 = "(Phụt――)"
# monologue
# JP: 圧縮空気が注入される音がする。\nそうして、ほどなく――
2732 = "Tiếng khí nén được bơm vào.\nVà, chẳng bao lâu sau――"
# monologue
# JP: （ぐんっ！）
3310 = "(Khục!)"
# 【ハチロク】
# display as 八六
# JP: 「車掌ブレーキ！　開放を！！！」
2292 = "「Phanh của trưởng tàu! Nhả ra!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1868 = "「Hachiroku!」"
# monologue
# JP: ハチロクをおもいっきりに引き込んで、\n腕の中へとすっぽり納める。
2883 = "Tôi kéo mạnh Hachiroku vào trong, ôm trọn em ấy vào lòng."
# 【日々姫】
# display as 日日姬
# JP: 「お見事！　\x%l車掌車;#00ffc040;車掌車%l;#;もついてきとーと！！」
2009 = "「Tuyệt vời! \\x%l車掌車;#00ffc040;Toa xe trưởng tàu%l;#; cũng đi theo rồi á!!」"
# monologue
# JP: 同時に日々姫が後方ドアをきっちり閉めて――
2973 = "Cùng lúc đó Hibiki đóng chặt cửa sau lại――"
# monologue
# JP: （カタン――コトン――カタン、トトン）
3290 = "(Cạch――xình――cạch, xình xịch)"
# monologue
# JP: レールの継ぎ目を、列車は次々叩き始める。\nゆっくり、ゆっくり、そうして、伸びやかに加速して！
3180 = "Đoàn tàu bắt đầu gõ nhịp lên từng khớp nối đường ray. Chầm chậm, chầm chậm, và rồi, tăng tốc mạnh mẽ!"
# 【双鉄】
# display as 雙鐵
# JP: 「――見事だな。志寰君と西瓜はもちろんだが、\n\x%l車掌車;#00ffc040;車掌車%l;#;の車掌も、まさに完璧なタイミングだった」
2203 = "「――Tuyệt thật. Cậu Zhihuan và Suika thì khỏi nói rồi, nhưng trưởng tàu ở \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; cũng canh thời điểm quá hoàn hảo.」"
# 【日々姫】
# display as 日日姬
# JP: 「よね、お尻から二両目やけん、さすがにちょこっと\n衝動出たけど――これ、前の客車は無衝動でしょ」
1926 = "「Đúng á, vì là toa thứ hai từ dưới đếm lên nên có hơi chấn động một chút――nhưng các toa hành khách phía trước chắc là êm ru luôn ha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。恐れいった。\nこの条件でかほどのなめらかさは、僕には無理だ」
2100 = "「Chắc vậy rồi. Thật đáng nể. Khởi hành mượt mà đến mức này trong điều kiện như vậy, tôi không làm được đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「あ……あの……双鉄、さま……」
1963 = "「A……Dạ……Ngài Soutetsu……」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ、すまん」
1994 = "「Hửm? À, xin lỗi em.」"
# monologue
# JP: うっかりと、\nハチロクを腕の中に収めっぱなしにしてしまっていた。
3193 = "Tôi vô ý,\nôm Hachiroku trong vòng tay mãi không buông."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも見事だったな。\n完璧なタイミングでの伝達だった」
1864 = "「Hachiroku cũng làm rất tốt. Truyền đạt vào thời điểm hoàn hảo.」"
# 【ハチロク】
# display as 八六
# JP: 「は、はひ……おほめにあずかり……\nこうえい、しごくでございます」
1950 = "「V, vâng……Được ngài khen ngợi…… Thật vô cùng vinh hạnh ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1991 = "「嗯？」" 
# monologue
# JP: どうにもハチロクがふにゃふにゃしている。\n見れば、顔もずいぶん赤い。
2634 = "Hachiroku cứ mềm nhũn ra. Nhìn kỹ thì mặt em ấy cũng rất đỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　――っ！\nまさか、旅疲れで異常発熱でも」
2071 = "「Sao vậy? ――! Không lẽ đi lại mệt mỏi quá nên phát sốt rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ！？　あのっ、そういうのではございません。\nわたくし、大丈夫。大丈夫なのですけれど、その」
1830 = "「Không ạ!? Dạ, không phải vậy đâu. Tôi, không sao. Không sao đâu ạ, chỉ là.」"
# monologue
# JP: 吸気し、排気し。\n吸気し、排気し。
2702 = "Hít vào, thở ra.\nHít vào, thở ra."
# monologue
# JP: 僕ら同様深呼吸して。そしてハチロクは、\nなぜだかなんともまぶしそうな顔をして、僕を見上げる。
2856 = "Hít thở sâu giống như chúng tôi. Và Hachiroku, không hiểu sao lại ngước nhìn tôi với vẻ mặt như bị chói lóa."
# 【ハチロク】
# display as 八六
# JP: 「西瓜は……西瓜はすごいなと。\nよくこれほどの……これほどの――はうっ」
2254 = "「Suika……Suika thật tuyệt vời. Vậy mà có thể chịu đựng được mức độ……mức độ này――ha.」"
# 【日々姫】
# display as 日日姬
# JP: 「あら」
1944 = "「Ôi chà.」"
# monologue
# JP: ばふっと、音がしそうなほどの激しい反応。
2972 = "Một phản ứng dữ dội như thể phát ra tiếng \"phụt\"."
# monologue
# JP: 深呼吸で収まりつつあったハチロクの頬の赤味が、\nなぜか一気に戻ってしまう。
3213 = "Đôi má đỏ ửng của Hachiroku đang dịu đi nhờ hít thở sâu, không hiểu sao lại đỏ bừng trở lại."
# 【ハチロク】
# display as 八六
# JP: 「……西瓜は、本当にがんばっているのだな、と。\nわたくしそれを――いくらか理解、できただけ、です」
1597 = "「……Suika, thực sự đang rất cố gắng. Tôi chỉ――hiểu được phần nào điều đó thôi ạ.」"
