# lines: 482 
# 【ハチロク】
# display as 八六
# JP: 「…………」
1579 = "「…………」" 

# monologue
# JP: 身動きを取ることができません。
3047 = "空間侷促，並沒有自由活動的餘裕。" 

# monologue
# JP: けれども音が、そして気配が、\n様子をはっきり伝えてくれます。
2611 = "但聲音和氣息，卻都可以清晰地感覺到。" 

# monologue
# JP: （双鉄さまと日々姫と……\nスケッチブックで、文通をしていらっしゃる――）
3316 = "（雙鐵少爺和日日姬……以在素描簿上寫字的方式交流著——）" 

# monologue
# JP: 日々姫がなにか、夢中になって描いている音。\nそれで目覚めて、何を見ているのか知りたくなって。
2553 = "一開始日日姬似乎是在專心畫著什麼。我便是因這沙沙聲醒來，所以好奇她在看什麼。" 

# monologue
# JP: けれど、きっとほとんど同時に、\n双鉄さまもお目覚めになってしまわれたから……
2600 = "但想必也是在差不多的時候，雙鐵少爺也醒了過來，我便只好……" 

# monologue
# JP: （……同じ三段寝台に横たわっておりますのに――\n上段と中段では、完全に別世界になってしまうのですね）
3236 = "（……雖然同樣是躺在這三層床鋪上，可是——上鋪和中鋪卻有天壤之別）" 

# monologue
# JP: 上段は開放感がありますし、高くて楽しうございます。\nけれど、残念――窓の景色は楽しめません。
2558 = "上鋪算是相對開敞的空間，而且高高在上很有趣。但相對的，看不到車窗外的景色算是美中不足。" 

# monologue
# JP: できるのはただ、おふたりの邪魔をしないこと。\nペンが走りスケッチブックの行き交う音を、聞くのみです。
2860 = "我儘量屏氣吞聲，不要打擾到中鋪的兩位，任由筆在素描簿上摩擦與素描簿來回傳遞的聲音在耳中迴響。" 

# monologue
# JP: けれど、それでも。\n何も見えずともわかります。
2608 = "但是，即便如此，哪怕什麼都看不到，我還是能感受到。" 

# monologue
# JP: 音楽のように軽快なのは、日々姫の[て,1]筆跡。\n一文字一文字、刻むように記していくのが双鉄さまの[て,1]筆跡。
2963 = "日日姬的[手,1]筆跡就如音樂一般輕快。而雙鐵少爺的[手,1]筆跡一筆一划，是力透紙背的感覺。" 

# monologue
# JP: （あ――珍しい。日々姫がなにか、書き淀みましたね）
3283 = "（啊——真少見，日日姬竟然寫到一半突然卡了一下殼）" 

# monologue
# JP: 気になります。車窓から、日々姫がどんな景色を見たのか。\n双鉄さまも、それをご覧になられたのかどうか。
2751 = "好想知道日日姬在車窗外究竟看到了怎樣的景色。也想知道雙鐵少爺是否也將其納入了眼中呢。" 

# monologue
# JP: そうして、おふたりがどんな言葉を、\nこの上もなくひっそりと、交わしあっているのかが。
2980 = "更想知道的是，兩人究竟寫下了怎樣的詞句，又在悄悄溝通著怎樣的話題。" 

# monologue
# JP: （……明日になればわかること、ではあるのですけれど）
3231 = "（……等到明天，應該也就自然會知道了吧）" 

# monologue
# JP: 文字通り、一目瞭然に。\nだって日々姫は、決していつわりを描きませんから。
3062 = "而且就如字面意思一樣，一目了然。因為日日姬的畫中，絕無半點虛假。" 

# monologue
# JP: けれど、それでも……わたくしもふたりと一緒に、\n中段の車窓から、同じ景色を見てみたかったと思います。
2690 = "可是，即便如此……我也想和他們一起，在中鋪，一同欣賞窗外的景色。" 

# monologue
# JP: 無言の会話にわたくしの[て,1]筆跡も混じらせて、\n思ったことを共有できたら、どれほどの旅の思い出に――
2829 = "想讓我的[手,1]筆跡也可以參與進這無聲的對話中，分享自己心中所想，沿途所見，以留下更多美好回憶——" 

# monologue
# JP: （あら、いやだ。わたくしったら……\nいつのまにこれ程の欲張りになってしまったのでしょう）
3279 = "（哎呀，不好，我真是的……什麼時候變得這麼貪心了呢）" 

# monologue
# JP: 恥じ入りましたら、思い出します。
3060 = "羞怯之心與點滴回憶一同湧上心頭。" 

# monologue
# JP: 双鉄さまに、わたくしの――わたくし自身の「望み」は\n一体、なんであるかと、お尋ねいただいた日のことを。
2866 = "我回憶起那天，雙鐵少爺曾問我，我自己的“願望”究竟是什麼。" 

# monologue
# JP: （あのときは、何一つ望みなど浮かびませんでしたのに）
3315 = "（那時我心頭實在是浮現不出半點想要的東西）" 

# monologue
# JP: 今はこれほど短い時間のなかに、いったいいくつ、\n「望み」を抱いたことでしょう。
3011 = "然而現在，僅是這短短的片刻，我究竟萌發了多少“願望”啊。" 

# monologue
# JP: （あ――）
3285 = "（啊——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……………………」
1578 = "「……………………」" 

# 【日々姫】
# display as 日日姬
# JP: 「……………………」
# 1578 = "「……………………」" 

# monologue
# JP: わたくしたちの列車――Z49列車が、\nいつの間に、ふたたびの夜の中へと滑り出しております。
2859 = "我們身處的這班列車——Ｚ４９次列車，不知何時，又再次疾馳在了夜幕之中。" 

# monologue
# JP: 双鉄さまと日々姫も、\nふたたびの夢路への旅を、たどり始められたようです。
3082 = "而雙鐵少爺與日日姬似乎也再次進入夢鄉。" 

# 【ハチロク】
# display as 八六
# JP: 「（ふうっ）」
2382 = "「（呼～）」" 

# monologue
# JP: 命令もだしておりませんのに、口から勝手に排気が漏れて、思いもかけぬ大きな音を響かせ――っ！
2874 = "我明明沒有發出指令，嘴卻不由自主地長長排了一口氣，而且聲音還格外響亮——！" 

# monologue
# JP: （西瓜……起こしてしまった……\nいえ、少し前から起きていた……のですか？）
3305 = "（西瓜……被我吵醒了嗎……好像不是，那是剛才就已經……醒了嗎？）" 

# monologue
# JP: 少しだけ眠そうな共感に、誘われます。\nこの寝台を離れて少し、『話さない』かと。
2740 = "她傳來的共鳴中還摻雜著一絲睡意。“要不要離開鋪位，與我略作交談。”" 

# monologue
# JP: 真夜中、ふたり。レイルロオドとレイルロオドで、\nこっそりと、ナイショばなしをしないか、と。
3160 = "要不要在這夜闌人靜之時，我們兩個鐵路人偶之間，悄悄地，說一點知心話。" 

# monologue
# JP: （まるで……\nうふふっ、物語の中の寄宿舎の生徒のようですね）
3293 = "（嘻嘻……這簡直就像故事裡那些住校生一樣啊）" 

# monologue
# JP: とても素敵なお誘いです。\nわたくしの回路のどこかが、わくわくとした熱を帯びます。
3041 = "真是讓人無法拒絕的邀請啊。在我的迴路中，興奮難耐的感覺不住翻湧著。" 

# monologue
# JP: けれどわたくし、西瓜ほど身軽ではありません。\n寝台を降りようとしたときに、万が一にも――
2602 = "但我又不像西瓜那樣身輕如燕，從鋪位下去的時候，萬一——" 

# monologue
# JP: （え？　あ――うふふっ、なのですね。はい。\nそれでしたら、わたくしでもなんとか行けそうです）
3277 = "（咦？啊——嘻嘻，的確是呢。好的。這樣的話，我應該也能做到吧）" 

# monologue
# JP: 西瓜の耳は、わたくしの耳よりはるかに優れております。
3141 = "西瓜的耳朵，遠比我的更靈敏。" 

# monologue
# JP: その西瓜が、『全員、熟睡の寝息だ』と、\n保証をつけてくれるのでしたら……
3076 = "而正是她向我保證，“大家全都睡熟了”……" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 

# monologue
# JP: ああ――ああ――さすがは日々姫です。
2709 = "啊——啊——日日姬果真是如此體貼。" 

# monologue
# JP: わたくしが夜中、移動したくなったときのため――\n足場を、出したままにしておいてくれています。
3004 = "為防我夜裡上下不便，她特地把踏腳板打開沒有收起來。" 

# monologue
# JP: （ぎしっ――ぎっ）
3291 = "（嘎——吱）" 

# monologue
# JP: 体重がかかればどうしても、\n足場は少し、軋みます。
2879 = "我的體重壓在上面，動作再怎麼輕，也還是發出了聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「……ん……にぃに…………」
1595 = "「……嗯……阿哥…………」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 

# monologue
# JP: それでも、日々姫は起きません。\nしあわせそうに――微笑みながら眠っています。
2567 = "不過就算這樣，日日姬也並沒有醒過來，還是帶著滿臉幸福的微笑睡得香甜。" 

# monologue
# JP: （あ！　ごめんなさい西瓜。すぐに参ります）
3286 = "（啊！抱歉，西瓜，我馬上就來）" 

# monologue
# JP: 時間をかければかけるほど、どなたかの眠りを\n妨げてしまう可能性があがるだけ。だから、急ぎます。
2919 = "拖得越久，越有可能不小心打擾到誰的美夢。所以，我也得抓緊。" 

# monologue
# JP: 志寰様の寝台も、同じく足場を出したまま――\nこちらも静かに足をかけ――よいしょ！
2798 = "志寰先生的鋪位上，也同樣沒有把踏腳板收起來，於是輕輕地踩上去——欸咻！" 

# monologue
# JP: （とっ）
3303 = "（然後）" 

# monologue
# JP: 『ハチロク』と、笑顔の共感が迎えてくれます。
3135 = "西瓜帶著滿臉笑容，以共鳴傳來了“八六你來啦”。" 

# monologue
# JP: 消灯後の暗がりの中にあってなお、\n西瓜の瞳も、笑っているのがわかります。
2663 = "即便是在熄燈後的一片漆黑之中，我也能感受到西瓜的眼中所蘊含的笑意。" 

# monologue
# JP: （ああ――あなたもわくわくしているのですね）
3281 = "（啊——你的心裡也是小鹿亂撞的呀）" 

# monologue
# JP: 試作機レイルロオドとトップナンバー機レイルロオド。\n常に長姉である者同士。
3000 = "測試車的鐵路人偶和首車的鐵路人偶——同為長女。" 

# monologue
# JP: 手本であるよう――周囲の誰もに望まれて、自らも望み。\nかくあることが常態だから。
2836 = "成為榜樣——這樣的期待不僅來自周遭，也同樣來自自己。自始至終，鮮有改變。" 

# monologue
# JP: （あ！　待ってください、西瓜）
3288 = "（啊！等我一下啦，西瓜）" 

# monologue
# JP: ――夜更かしをしてこっそり共感を交わし合い\n誰にもナイショの約束をして。
1539 = "——在這夜深人靜之時，我們兩個鐵路人偶以共鳴悄悄約定，神不知鬼不覺地行動。" 

# monologue
# JP: マスターのご許可もいただかないで、\n寝台を抜け出してお散歩までしてしまう――
2574 = "也不管有沒有得到司機的許可，便溜下鋪位跑出來散步——" 

# monologue
# JP: （あのね？　わたくし、まだ車内構造に慣れていなくて\n……その上で、この暗さでしょう？）
3270 = "（其實啊，我對這車內部的結構還不太習慣……而且你看，還這麼黑不是？）" 

# monologue
# JP: 「規則違反ではなくとも、望ましくないふるまいですね」\nと嗜めるのが、わたくしたちの役割だから。
2858 = "我們深知“雖並非違反規則，但這也並非妥當的行為”，這也是我們的職責之一。" 

# monologue
# JP: だからこそ、これほどにささやかなことたちが……\nわたくしたちには、どれも初めての冒険なのです。
2899 = "所以這些微不足道的小事……對我們來說全都是未曾體驗過的冒險。" 

# monologue
# JP: （うふふっ、はい。そのようにしていただけるなら。\nわたくしとても、助かりますし嬉しいです）
3295 = "（嘻嘻，好的。你願意這麼做，我很感激也很高興）" 

# monologue
# JP: 旅先の、誰もが深く眠りに落ちる、寝台車内。\nここででしたら、わたくしだって――
2931 = "旅途中的臥鋪車廂內，乘客們也都安然酣睡著。在這裡，我也就——" 

# monologue
# JP: （ありがとうございます。西瓜）
3308 = "（謝謝你，西瓜）" 

# monologue
# JP: 西瓜のとてもあたたかな手に、\nわたくしの手を引いてもらって。
3151 = "西瓜那無比溫暖的手，牽住了我的手。" 

# monologue
# JP: 全てを任せて、導かれるまま、\n夜の端まで、歩けるのです。
2846 = "我也安心地把手交給她，任由她牽著，向著這夜幕的盡頭走去。" 

# 【ハチロク】
# display as 八六
# JP: 「西瓜は――」
2232 = "「西瓜——」" 

# monologue
# JP: 抑えたつもりの声が、けれども、\n大きく響いた気がします。
2868 = "我已經儘量放低了聲音，但聽在耳中似乎還是有些高。" 

# monologue
# JP: ですから、さらに、\n小さく声をひそめます。
2908 = "所以，我便進一步壓低了音量，輕語道。" 

# 【ハチロク】
# display as 八六
# JP: 「西瓜はいつから起きていたのですか？」
1857 = "「你是什麼時候醒過來的啊？」" 

# monologue
# JP: 共感を切って、声でお話。\n無人の餐車に移動してきたとはいえど、真夜中です。
2857 = "我們斷開了共鳴，發聲交談著。雖然是來到了空無一人的餐車，但這畢竟是午夜時分。" 

# monologue
# JP: あまりよくないことであるように思います。\nけれどもきっとだからこそ。不思議な楽しさも感じます。
2791 = "心裡還是有種做壞事的感覺。但也正因如此，卻也有種不思議的快樂摻雜其中。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は起きてすぐ、ハチロクに共感を求めようかと思い。\nけれどもそれを中止しました」
2250 = "「西瓜一醒過來就想和八六共鳴來著。但我後來就中止了共鳴」" 

# 【ハチロク】
# display as 八六
# JP: 「中止したのは、どうしてで――あっ」
1837 = "「中止共鳴，這是為什麼……啊」" 

# monologue
# JP: 共感を、閉ざすことさえ忘れていました。\n真夜中ですし、異国です。受け取る者もいないと思って。
2862 = "我剛才連共鳴都忘記關閉了。光想著反正大半夜的，又在國外，應該沒有人接收得到吧。" 

# monologue
# JP: ですから、つまり。\nわたくしの思っていたことは……
2900 = "所以，也就是說，我剛才內心所想……" 

# 【西瓜】
# display as 西瓜
# JP: 「聞いてはいけないと思い、西瓜は共感を切りました。\nやがて、双鉄先生と日々姫女士がお眠りになり」
2255 = "「西瓜就是覺得自己好像不該聽這些，所以把共鳴斷開了。後來等到雙鐵先生和日日姬女士也都入睡」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしがため息を零してしまったのを聞いて――\n共感をつなぎ直して、ここに誘って下さったのですね？」
2181 = "「然後聽到我在嘆氣的時候才重新開始共鳴，把我叫到這裡來了是嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「事実関係は、今ハチロクがいったとおりだと、\n西瓜は同意します」
1843 = "「事實正如八六所言，西瓜表示同意」" 

# 【ハチロク】
# display as 八六
# JP: 「それで、どうして」
2352 = "「那你為什麼……」" 

# monologue
# JP: ああ、共感は――\n確かにこうしたお話では、間違いなく切っておくべきです。
2711 = "啊——要想像這樣說話，的確應該斷開共鳴。" 

# monologue
# JP: 伝えるために、伝えたくって、言葉を選ぶ。\nそれはなんともどかしく、優美で優しい行いでしょう。
3003 = "為了表達，為了讓對方明白，斟酌推敲要說的話語。這是一種非常繁複而優美的溫柔舉動。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしを、\nふたりきりのお茶会にお誘いくださったのですか？」
2093 = "「想要邀我參加這場，只屬於我們兩個的茶話會呢？」" 

# monologue
# JP: お湯を――お白湯をいただきます。\nカップは西瓜が用意しておいてくれたもの。
3212 = "隨後，我輕抿了一口杯中的熱水。而杯子則是西瓜幫我準備好的。" 

# monologue
# JP: そうしてお湯は、仲国の寝台列車では、全乗客が。\n自動の給湯器から、いくらでも使えるものなのです。
3089 = "至於杯中的熱水，在仲國的臥鋪車上，所有的乘客都可以在自動茶爐機那裡自由取用。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜がハチロクを飲茶に誘った理由は」
2259 = "「西瓜請你來參加茶話會的理由」" 

# monologue
# JP: 言いつつ西瓜が傾けるのは、これも予め用意していた、\n彼女好みの味だという軽油が入ったカップです。
3205 = "邊說，西瓜邊抿了一口杯中的柴油。自不消說，這也是她事先準備好的，裡面斟著她喜歡的口味。" 

# 【西瓜】
# display as 西瓜
# JP: 「ハチロクとなら、\n相談しあえるのではないかと推測したからです」
2138 = "「是因為依我推斷，應該能夠和八六互相商量一下」" 

# 【ハチロク】
# display as 八六
# JP: 「なにについての相談でしょう？」
2369 = "「需要和我商量什麼呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「それは――」
2324 = "「這個嘛——」" 

# monologue
# JP: 西瓜が、らしくもなく言いよどみます。\nその頬が、じわじわ、赤味を増していきます。
3127 = "西瓜一反常態，張口結舌，而臉頰上的淡淡紅暈也逐漸擴散開來。" 

# monologue
# JP: 悉究、悉究、悉究、と――\nもう聞きなれた言葉が何度も、呟やかれます。
2828 = "悉究，悉究，悉究——她只是不停地低聲呢喃著這已經不知聽過多少次的話語。" 

# 【西瓜】
# display as 西瓜
# JP: 「それは、恋心についての相談です。ハチロクも――\n思い悩んでいるのではないかと、西瓜は類推しました」
2027 = "「就是想商量關於戀愛的話題。西瓜猜想——你是不是也在為此而煩惱糾結」" 

# 【ハチロク】
# display as 八六
# JP: 「恋心！」
2101 = "「戀愛！」" 

# monologue
# JP: なんて素敵な響きでしょう。\nそうして、ああ――なんと光栄なことでしょう。
3199 = "這是何等悅耳的辭藻。而且，啊——這又是何等的榮幸。" 

# monologue
# JP: あれほど秘密にしようとしている気持ちを西瓜は、\nまっすぐに、わたくしに伝えてくれたのですから。
3138 = "西瓜明明將這份心意深藏心底，任誰都不願透露分毫，對我卻願意坦言相待。" 

# 【西瓜】
# display as 西瓜
# JP: 「ハチロクは――」
1867 = "「八六你——」" 

# monologue
# JP: 西瓜の瞳が、少しだけ、驚いたように開いています。\nぱち、ぱちと、短いまばたきが繰り返されます。
3147 = "西瓜突然驚訝似的瞪大了一下眼睛，而後撲閃撲閃地眨著。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生に恋心を抱いているのではないのですか？」
2024 = "「對右田先生其實是心存愛慕的吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「恋……ごころ……」
2094 = "「愛……慕……」" 

# monologue
# JP: 素敵な響きが、いきなりドロリととろけます。\nとろけたそれは、とても濃くって重たくて――
3197 = "這悅耳的辭藻，瞬間在我胸中蔓延開來——所到之處，無比濃重。" 

# monologue
# JP: 回路に染みて沈めるようで、けれども少し、ほんの少し。\nあまやかに……わたくしのどこか深くを、疼かせます。
3198 = "這感覺無孔不入，如同整個迴路都盡沒其中，但卻又有一絲，一絲絲甜蜜若隱若現……卻又在不知哪個角落隱隱作痛。" 

# 【ハチロク】
# display as 八六
# JP: 「恋、ごころ――で、ございますか」
2095 = "「愛……戀……嗎」" 

# monologue
# JP: わかりませぬ。わかりませぬ。\nわかりませぬ。わかりませぬ。
2843 = "我不知道，我不知道，我不知道，我不知道。" 

# monologue
# JP: どれほど演算――いいえ、悉究しようとしてみても、\n必ずループバックして、解を少しも、導けませぬ。
3008 = "無論如何演算——不，應該說無論怎樣嘗試悉究，都會落入死循環，而與答案之間的距離，卻沒有絲毫縮短。" 

# 【西瓜】
# display as 西瓜
# JP: 「やっぱりハチロクも、双鉄先生への恋心に、その扱いに、思い悩んでいることは、相違ありませんか？」
2160 = "「果然八六也對自己對右田先生的這份愛戀，以及自己應該如何面對它而煩惱著吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「どう、なのでしょう……」
2327 = "「這個，誰知道呢……」" 

# monologue
# JP: 双鉄さまは、大切です。他の誰より大事な方です。\nマスターで。家族で。ただそれだけにはとどまらぬ方です。
3216 = "雙鐵少爺無比重要，比任何其他人都要重要。司機，抑或家人，應該都不足以表現他對我的重要。" 

# monologue
# JP: わたくし自身より、8620よりなお大切であることは、\nこの先どのような未来においても不変でしょう……が……
2990 = "比我自己，比８６２０更加重要，這一點，無論將來如何都不會改變……吧……" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしには、恋が何かがわかりませぬ」
1599 = "「……我還是不明白，愛戀究竟是什麼。」" 

# monologue
# JP: 恋愛小説を、少女マンガを、どれほど熱心に読もうとも。\n日々姫の恋を――どれほど間近に見つめようとも。
2665 = "即便自己對戀愛小說和少女漫畫十分熱衷。即便在近距離目睹了日日姬的戀情。" 

# monologue
# JP: それでも、やはりわたくしは――\n“恋”がなにかを、本当には、きっと理解しておりませぬ。
2604 = "但我肯定還是——沒有真正理解“戀愛”到底是什麼。" 

# 【ハチロク】
# display as 八六
# JP: 「恋とは――西瓜。\nいったい、どのようなものなのでしょう」
2268 = "「西瓜，愛戀，究竟是什麼呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「…………」
# 1579 = "「…………」" 

# monologue
# JP: 西瓜はまた、どこかきょとんとした顔をします。\nその瞳を閉じ、悉究、悉究、悉究と――あ。
3131 = "西瓜又露出了些許驚訝的神情，而後閉上了眼睛，又念叨起了“悉究、悉究”。" 

# 【西瓜】
# display as 西瓜
# JP: 「恋が何かを言葉で説明することは、恐らくとても難しい。\nですからハチロク、もしもお互いに同意できるなら」
2090 = "「想要用話語來說明愛戀，恐怕是相當困難。所以八六，如果我們互相都沒有異議的話」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。西瓜がよければ、わたくしもそれが一番、\n理解が早いのでは……と、考えておりました」
2215 = "「確實如此。如果西瓜不介意的話，我也覺得那是最好的，能夠最快理解的方法」" 

# monologue
# JP: こくん、と西瓜が頷きます。\nですから、共感を開きま――っ！！！！！！
3158 = "西瓜點了點頭。既然這樣，就開始共鳴——！！！！！！" 

# 【ハチロク】
# display as 八六
# JP: 「あ――あ――あ――あ！」
1957 = "「啊——啊——啊——啊！」" 

# monologue
# JP: これが――恋。恋ごころ。\nなんと巨大な熱量でしょう。なんと切ない欲望でしょう。
3196 = "這就是——愛上一個人，對於他人的愛慕。這是何等澎湃的熱量，這是何等無法抑制的欲望。" 

# monologue
# JP: 圧倒的な情報量に、大げさではなく処理能力がおいつかず、\n集積回路が熱暴走をしてしまいそうで、怖くなります。
2725 = "在這壓倒性的訊息量面前，我的處理能力甚至力不從心，這絕非誇大其詞，主迴路逼近過熱失控，一股懼意隨之湧起。" 

# monologue
# JP: （望んで、求めて、独り占めしたいと――\n独り占めされたいと――これほど強く、果て無く激しく）
3301 = "（渴望，欲求，想要獨占——想要被佔有——其中感情是如此強烈，無窮無盡洶湧澎湃）" 

# monologue
# JP: ……ああ、けれど。共感を閉ざすなどできませぬ。\n西瓜は、余さず隠さず伝えてくれます。
1554 = "……然而，卻由不得我斷開共鳴。西瓜已經將她的內心毫無保留地傳達給了我。" 

# monologue
# JP: 幼い頃の志寰様へと注ぎ続けた、惜しみない無垢な愛情を。\nそうして想いの種が鮮やかに、恋慕と開花した一瞬を。
2881 = "我看到了無怨無悔地灌注在年幼志寰先生身上的，純潔愛情。看到了思念的種子絢麗綻放成戀慕之花的瞬間。" 

# monologue
# JP: （告白、されて――抱きしめられ――あっ！？）
3297 = "（得到告白——被擁入懷——啊！？）" 

# monologue
# JP: パツン、と全てが断ち切られます。\nわたくしに、わたくしの世界が戻ってきます。
3081 = "而這一切，又毫無徵兆地被切斷了。我又回到了這個世界，恢復成了我自己。" 

# monologue
# JP: けれども、回路がざわめきます。\n触れた世界の断片が、わたくしの中で、騒ぎます。
3013 = "然而，迴路卻久久不能平靜。適才觸碰到的那個世界的點滴，在我胸中奔湧不息。" 

# 【西瓜】
# display as 西瓜
# JP: 「――老師の息子で、弟みたいな存在で。\n志寰を、だから西瓜は、守り続けたいと願っている」
1564 = "「——他是師父的兒子，是像弟弟一樣的存在，所以，西瓜希望能夠永遠保護志寰」" 

# monologue
# JP: 現在形で。今の気持ちを。\n西瓜は言葉で、静かに静かに聞かせてくれます。
2742 = "她用現在時表述著如今的感情。西瓜傾訴的言語，讓我不由地屏氣凝神，靜靜傾聽。" 

# 【西瓜】
# display as 西瓜
# JP: 「けれど、志寰が仲国国鉄の職員に採用された日。制服に、\n志寰の方が着られている姿を始めて目にした、あの日」
2183 = "「然而，在志寰成為仲國國鐵職員的那一天，在我第一次見到他身著制服身姿的那一天」" 

# monologue
# JP: 共感はすでに切れています。\nそれでも回路が、声を聞くだけでざわめきます。
2649 = "共鳴早已斷開，但我的迴路，卻因這話語而再次沸騰起來。" 

# monologue
# JP: 西瓜がわたくしに伝えてくれたあの光景が、感情――\nあまりに鮮やかで美しく。そうして、苦しくあったから。
3130 = "西瓜傳遞給我的那副光景和感情——是何等鮮明而美麗，卻又飽含著苦澀。" 

# 【西瓜】
# display as 西瓜
# JP: 「志寰が、西瓜に。『西瓜のことが大好きだ』と。\n気持ちを飾らずに伝えてくれて、口づけを――」
2062 = "「志寰對西瓜說“我最喜歡西瓜了”，他毫不掩飾地表達了自己的情感，並向我索吻——」" 

# monologue
# JP: 抱きしめられて、志寰様が迫ってきたとき、\n西瓜は、ひどく戸惑っていました。
3097 = "被抱入懷中，志寰就近在眼前，西瓜卻表現得不知所措。" 

# monologue
# JP: けれども一秒、一秒ごとに、戸惑いは深く強い愛へと、\n紡ぎ直されていったものかと感じましたが……
3214 = "雖然隨著時間一秒一秒流逝，猶豫漸漸溶解，化作了深沉而強烈的愛意，然而……" 

# 【西瓜】
# display as 西瓜
# JP: 「口づけを求めてくれて――嬉しくて。\nだから、西瓜は……恐ろしくなって、逃げました」
1845 = "「他向西瓜求吻——西瓜真的很開心。所以西瓜感到了畏懼，逃跑了」" 

# 【ハチロク】
# display as 八六
# JP: 「恐ろしくなって……逃げた」
2097 = "「感到了畏懼……逃跑了」" 

# monologue
# JP: 理屈に合わない、非論理的な行動と、\nわたくしの回路は結論づけます。
3194 = "這不合理，這是毫無邏輯的行為——我的迴路得出了這樣的結論。" 

# monologue
# JP: その結論には納得する他ありません。\nけれど、納得をしてもなお――
2844 = "我也只能認同這樣的結論。但認同之後還是——" 

# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜は恐ろしくなって逃げました。結果、\n問題はより複雑になり、解決は遠のいてしまいました」
2148 = "「是的，西瓜害怕得逃開了。最後問題變得更加複雜，更難以解決了」" 

# 【ハチロク】
# display as 八六
# JP: 「遠のいたなんて、そのようなこと――\nわたくしは、きっとないのではないかと、感じます」
2154 = "「更難以解決，這怎麼會呢——我認為並非如此」" 

# monologue
# JP: 理屈にあわぬその行動を、\n『わかる気がする』と、わたくしのこころは感じます。
2877 = "我的心裡，卻不知為何對這不合理的行為，有了”似乎能夠理解“的感覺。" 

# monologue
# JP: だからより深く知りたいと、\nわたくしの、こころと回路が同じ結論にたどり着きます。
2894 = "所以我的內心與迴路得到了同樣的結論——想要進一步地了解她。" 

# 【ハチロク】
# display as 八六
# JP: 「遠のいたように思えても、それは一時的なこと。\nいつか振り返れば、最善の路であったと判るのでは、と」
1888 = "「即使目前看來像是更加複雜，但這也只是暫時性的。我相信有朝一日，你一定會慶幸曾經做出了正確的選擇」" 

# 【西瓜】
# display as 西瓜
# JP: 「……ハチロクは優しいですね。ハチロクの今の言葉で、\n西瓜は、自らの混乱の一部が解消されたと観測します」
1588 = "「……八六真的很溫柔啊。你這番話，據西瓜判斷，已經為自己排除了一些混亂」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもホッといたします」
2334 = "「這樣的話我也就放心了」" 

# monologue
# JP: 目が合います。\n共感を切っておりますのに、温かな何かがつたわります。
2715 = "四目相對。明明都已經斷開了共鳴，卻有一股暖流涓涓而來。" 

# 【ハチロク】
# display as 八六
# JP: 「ね？　西瓜」
2227 = "「聽我說，西瓜」" 

# monologue
# JP: 指が伸びます。\n指先が西瓜の髪に触れ――西瓜はそれを、嫌がりません。
2854 = "我伸出手去。指尖撫過西瓜的秀髮——西瓜也並未抗拒。" 

# monologue
# JP: 遠い昔。ハロ２――　一番の仲良しの妹にしていたように。\nですから、髪を、指先で穏やかにくしけずります。
2777 = "就如多年以前，我對自己最親的妹妹——Ｈａｒｏ２號一樣，以指尖，輕輕梳理著她的秀髮。" 

# 【ハチロク】
# display as 八六
# JP: 「どうして、怖いと感じたのですか？\n志寰様を、その愛を――口づけを受け入れるそのことが」
2025 = "「對志寰先生，對志寰先生的愛——對於接受他的吻，你為什麼會感到害怕呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「受け入れれば戻れなくなる。シーリングが開封されると。\n西瓜ははっきり、自覚しているためです」
2229 = "「若是接受了，開啟了封印，那就再也無法回頭了。西瓜對此心知肚明，所以……」" 

# 【ハチロク】
# display as 八六
# JP: 「シイリング――」
2019 = "「封印——」" 

# monologue
# JP: 初めて耳にする言葉です。
2790 = "從未聽到過的詞彙。" 

# 【ハチロク】
# display as 八六
# JP: 「シイリングとは、一体なに、でございましょうか？」
2023 = "「封印，到底是什麼呢？」" 

# 【西瓜】
# display as 西瓜
# JP: 「！」
1967 = "「啊！」" 

# monologue
# JP: 西瓜は三度――そうしていままでで一番はっきり、\n驚いた顔を浮かべて瞳を、パチクリします。
3149 = "西瓜第三次——也是目前為止表現得最明顯的一次——露出了目瞪口呆的表情，眼睛不住的眨著。" 

# monologue
# JP: 唇がぎゅっと閉じられて、もごもご、何度か小さく動き。\nそうしてゆっくり――ひどくゆっくり、開かれます。
2746 = "她緊咬著嘴唇，欲言又止似的輕輕動了幾下，而後，緩緩地——緩緩地，開口道。" 

# 【西瓜】
# display as 西瓜
# JP: 「シーリングとは、マスターとレイルロオドがその恋愛を\n物理的に成就させるための、生体機能の開封のことです」
2021 = "「封印指的是生理機能的開啟，為的是在物理層面上實現司機與鐵路人偶的愛情」" 

# 【ハチロク】
# display as 八六
# JP: 「生体機能の開封……」
2188 = "「生理機能的開啟……」" 

# monologue
# JP: 生体機能――生体部品。\nその噂なら、もちろんわたくしも知っております。
3031 = "生理機能——活體零件。我當然也聽說過這樣的傳言。" 

# monologue
# JP: レイルロオドのどこかには、生体部品が使われている――\nそうして生体部品だけは、交換も修復もできない、と。
2726 = "在鐵路人偶體內某處，裝有活體零件——而這活體零件，也是鐵路人偶唯一不能更換也不能修理的部分。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でしたか。生体部品は……シイリングという形で、\n恋愛成就のための機能として、封印されていたのですね」
1894 = "「原來如此。活體零件……作為成就愛情的機能，被封存起來了吧」" 

# monologue
# JP: 長年の、ささやかな謎が解けました。\nその開封を果たしたのでしょう、いくたりかの妹たち。
2780 = "常年縈繞在心頭的小小疑惑總算解開了。恐怕在我的妹妹當中，也有部分最終成功開啟了封印。" 

# monologue
# JP: ”大好きなマスターと結ばれました”とのその言葉は――\n西瓜の言った、”物理的に成就”と、同義でしょう。
1543 = "“與思慕已久的司機結合”——這句話，應該就代表著西瓜剛剛所說的“物理層面的實現”。" 

# monologue
# JP: （それが果たして具体的にどういうことであるのかまでは、\nまだ今ひとつわかりませぬが――）
3313 = "（那具體是怎樣的一個過程，我至今仍然不清楚，不過——）" 

# monologue
# JP: それでも、もうひとつを理解しました。\nそれぞれの恋を実らせた、わたくしのかわいい妹たち。
2568 = "不過，我還是明白了另一件事。那就是我那些，已經讓各自的愛戀開花結果的可愛妹妹們——" 

# monologue
# JP: その全機がすでに、遠の昔に、機能を停止していることが\n……生体部品の解放の、恐らく不可避の代償であり――
2738 = "她們也在很早以前就全都停止了運作……恐怕，這就是啟動活體零件不可避免的代價吧……" 

# 【ハチロク】
# display as 八六
# JP: 「西瓜。あなたがシイリングの開封を恐れて拒む理由は。\n開封が、修理不能な劣化の始まりとなるからですか？」
2267 = "「西瓜，你害怕開啟封印的原因，是因為開啟會導致性能持續下降，並且無法修復？」" 

# monologue
# JP: 西瓜は、困った顔をします。\n困った顔をし、唇を閉じ。
3153 = "西瓜露出了為難的表情，同時緊閉著雙唇。" 

# monologue
# JP: そうしてゆっくり――\n不思議そうな、それでいて少しさみしげな声を出します。
3075 = "而後她緩緩地，以帶著不可思議卻又有一絲落寞的聲音說道。" 

# 【西瓜】
# display as 西瓜
# JP: 「『このまま進めばシーリングが開封される』、と。\nその警告をハチロクは受け取ったことが無いのですか？」
1573 = "「“再這樣下去就要開啟封印了”，這樣的警告八六你從來都沒有聽到過嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい……今のところは、恐らく無いように思います」
2142 = "「是的……至今為止，應該是從來沒聽到過」" 

# monologue
# JP: 双鉄さまに、優しく抱きとめていただいたとき。\n双鉄さまに耳元で、『ありがとう』等とささやかれるとき。
2723 = "在被雙鐵少爺溫柔地抱在懷中的時候，雙鐵少爺在我耳邊輕聲說“謝謝你”之類的話語的時候。" 

# monologue
# JP: わたくしの、どこかわからぬ深いところが感じるざわめき。\nそれがあるいは開封の、予兆なのかもしれませんけれど。
2873 = "我感受到的那種來自體內深處的嘈雜聲，或許就是開啟封印的前兆吧。" 

# 【ハチロク】
# display as 八六
# JP: 「警告、とまで強くざわめいたことは一度も……\n幸か不幸か、わたくしには経験ございません」
1833 = "「不知道這算是幸運還是不幸，那種嚴重到受到警告的情況，我還一次都沒有經歷過……」" 

# 【西瓜】
# display as 西瓜
# JP: 「経験がないのですか――。そうですか。\nあれほど深く、強く信頼しあっているように見えるのに」
2167 = "「沒有經歷過啊——真沒想到。明明看起來有著那麼深那麼牢不可破的信賴」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1966 = "「啊」" 

# monologue
# JP: 確かに、深く、そうして強く。\nわたくしは双鉄様をご信頼申し上げ――
3034 = "的確，我和雙鐵少爺之間那深深的信賴，確實是牢不可破——" 

# monologue
# JP: いいえ。きっと、愛しております。\nただ、恐らくは愛の形が……あるいは、種別が――
2570 = "不，那肯定就是愛吧。只是，恐怕這愛的形式……或者說種類——" 

# 【ハチロク】
# display as 八六
# JP: 「ね？　西瓜……もしよかったら今度は、\nわたくしからの共感を」
2252 = "「西瓜啊，要不要這次換我對你共鳴」" 

# 【西瓜】
# display as 西瓜
# JP: 「よいに決まっています。大歓迎です。\n西瓜はとても、ハチロクの恋を知りたく思います」
2189 = "「當然好啊，熱烈歡迎。西瓜非常想了解你的愛戀的來龍去脈」" 

# 【ハチロク】
# display as 八六
# JP: 「恋、であるのか、わたくし自身も知りませぬけれど」
2336 = "「這究竟算不算得上愛戀，我自己也說不清楚」" 

# monologue
# JP: それでも、今は手渡しましょう。\n双鉄さまがわたくしにくださった大事なものたちを。
2569 = "不過，還是先把雙鐵少爺給予我的這些珍貴的回憶傳達給西瓜吧——" 

# monologue
# JP: 積み重ねて来た時間を、ともに走ってきたレールを。\n西瓜の恋の、なにかの扶けになると信じて、伝えましょう。
2855 = "我們一同度過的這些時光，並肩開過的鐵軌——相信我傳達給西瓜的這些訊息，一定能成為她愛戀的助力吧。" 

# 【西瓜】
# display as 西瓜
# JP: 「あ――あ――あ――ああっ」
1956 = "「啊——啊——啊——啊啊」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1579 = "「…………」" 

# monologue
# JP: そうっと、共感を閉ざします。\n西瓜はパチパチ、まばたきします。
2891 = "我靜靜地斷開了共鳴。而後西瓜只是在那裡不停地眨著眼。" 

# monologue
# JP: きらりとなにか――涙にも見える排水が、\nそのまつげから、わずかに、飛ばされ消えていきます。
2552 = "一絲光芒閃過——一滴如淚水般的排水，從她的睫毛上輕輕滑落、飄散。" 

# 【西瓜】
# display as 西瓜
# JP: 「凄い……これほど惹かれているのに……ただひたすらに\n……一番近くで……最良のレイルロオドであろうとだけ」
2202 = "「真厲害……明明深受吸引……可你卻依然全心全意……只想在他身邊……當一位最優秀的鐵路人偶……」" 

# 【ハチロク】
# display as 八六
# JP: 「凄くは、ないと思いますけれど。\nわたくし、だって……そのようにしか、できないだけで」
2118 = "「我覺得這並不算厲害，因為我……就只有這樣的念頭」" 

# 【西瓜】
# display as 西瓜
# JP: 「凄い……凄い……西瓜とは、全然違う」
2006 = "「好厲害……好厲害……和西瓜完全不一樣」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、西瓜」
1829 = "「不是的，西瓜」" 

# monologue
# JP: 思考より先に声が出て。\nおくれて理解が、ゆるゆる、声に追いつきます。
3170 = "話語不假思索地脫口而出。而後，思路才逐漸跟了上來。" 

# 【ハチロク】
# display as 八六
# JP: 「……西瓜。――わたくしたちは、おんなじです。\n違うのは、それぞれのマスターの、お望みだけ」
1613 = "「……西瓜，我們其實是一樣的。有所不同的，只是各自司機的願望而已」" 

# 【西瓜】
# display as 西瓜
# JP: 「っ！！！！！」
2375 = "「！！！！！」" 

# monologue
# JP: 西瓜のおさげが、激しく揺れます。\nこころのうちの動揺と、同意を、強く感じます。
3145 = "西瓜的辮子晃個不停，從中能夠強烈感受到她心中的同意與動搖。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、ともに願っております。\nそれぞれのマスターのお役にずっと、立ちたいと」
2106 = "「我們心中的祈願，其實都是能夠常伴在我們的司機身邊，為他出一份力」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、強く願っています。志寰とずっと共にありたい。\n志寰のレールの終端まで、旅を、願わくば続けたいと」
2258 = "「西瓜衷心祈願，能常伴志寰身邊，形影不離，直到志寰走到他鐵軌的終點」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ、そうですよね。だから、わたくしたちはおんなじ。\n本当に、そっくりおんなじなんです」
2136 = "「是啊，就是這樣啊。所以，我們是一樣的，就如同那鏡中的倒影一般」" 

# 【西瓜】
# display as 西瓜
# JP: 「おんなじならハチロク。どうかハチロク。教えて下さい。\nもしも双鉄先生が、志寰が望んでくれているように」
2231 = "「若真一樣的話，八六，請你務必告訴我，如果雙鐵先生像志寰那樣的話，你會怎麼辦呢」" 

# 【ハチロク】
# display as 八六
# JP: 「お応えします」
2191 = "「當然是回應他」" 

# monologue
# JP: 断言できます。\n意思と思考と言葉とが、同じ速度で同じ答えを描きます。
3009 = "無需猶豫。內心、思考、話語，於同一時刻給出了同樣的答案。" 

# 【ハチロク】
# display as 八六
# JP: 「それが、どのようなお望みであれ。わたくしは。\n双鉄さまが、わたくしに求めてくださる全てに、必ず」
2177 = "「無論他的願望是什麼，但凡是雙鐵少爺對我的希望，我都赴湯蹈火在所不辭」" 

# 【西瓜】
# display as 西瓜
# JP: 「そうすることで、マスターの旅の一番終わりまで、\n一緒に歩めなくなるとわかっていても？」
1891 = "「即便知道這樣做會讓自己無法與他白頭偕老，你也願意嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。わかっていても。例えばお応えすることで、\nわたくしの機能が明日止まるとしても、変わりませぬ」
2146 = "「是的，即便如此。即便為達成他的希望，會讓我明天就停止活動，答案也不會改變」" 

# 【西瓜】
# display as 西瓜
# JP: 「どうして、そんな……\nそんなに、強く――」
2175 = "「為什麼，究竟是為什麼……你，能夠如此堅強——」" 

# monologue
# JP: ひどく戸惑い――\nきっと、怯えさせてしまった声。
2744 = "她的聲音透出了相當的不解——想必剛才的話有點嚇到她了。" 

# monologue
# JP: であるというのに、西瓜をぐっと、\nわたくしの近くに感じます。
2610 = "但是，我卻突然覺得和西瓜之間的距離，一下子縮短了許多。" 

# 【西瓜】
# display as 西瓜
# JP: 「ハチロクは機能停止が……。マスターと一緒の全てが\n二度とできなくなることが、怖くはないのですか？」
2089 = "「想到若是自己停止活動的話，和司機在一起的全部，都再也不會有下一次了，你都不覺得害怕的嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「怖いですよ。それは。想像だけで、体が震えてしまう程。\nですけれど――。けれど……わたくし……」
2190 = "「當然害怕啊。光是想像一下，都會怕得渾身發抖。但是——即便如此……我……」" 

# monologue
# JP: 機能停止を迎えてしまった――
2617 = "停止了活動的——" 

# monologue
# JP: あるいは機能のその途中で、\n廃棄・解体されてしまった妹たちを、思い出します。
2893 = "或是尚未停止活動，就被廢棄、解體的妹妹們的身影，浮現在了我的腦海之中。" 

# 【ハチロク】
# display as 八六
# JP: 「ですけれど、西瓜。機能はいつか停止します。\nそのときを、わたくしたちは、決して制御できませぬ」
1855 = "「但是，西瓜也總有一天會停止活動。我們都無法阻止這一天的到來」" 

# 【西瓜】
# display as 西瓜
# JP: 「制御はできない。確かなことです。だけれど悉究して、\n機能停止を迎える日を先延ばしすることは、可能です」
2176 = "「無法控制，確實。但是加以悉究，延後停止活動的大限，還是可以做到的」" 

# 【ハチロク】
# display as 八六
# JP: 「可能でしょうね。\nその試みも、とても尊く、価値あるものとも理解します」
2099 = "「應該是可以吧。為此進行的嘗試也是非常值得尊敬而有價值的」" 

# monologue
# JP: 少しでも長く、マスターのお役に立ち続けること。
3085 = "能夠儘量長久地陪伴司機，為他出力。" 

# monologue
# JP: それこそが、レイルロオドの――\n物の本懐であるのだろうとも、想います。
2886 = "我認為，這才是鐵路人偶的——物品的夙願吧。" 

# 【ハチロク】
# display as 八六
# JP: 「けれども西瓜、わたくしは――\n振り返り見る[わだち]轍の姿を、どうしても思ってしまうのです」
1928 = "「可是西瓜，我也不禁想到，我們回頭張望時看到的轍印」" 

# 【西瓜】
# display as 西瓜
# JP: 「[わだち]轍……車が通ったあとに残る、車輪の跡。\n――動輪たちがレールに残す、かすかな痕跡」
2295 = "「轍印……車輛經過後留下的，車輪的痕跡。列車的話，就是動輪在鐵軌上留下的些微痕跡」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちの残せる轍は、\n本当にかすかな――あえかなものです」
2168 = "「沒錯。我們所留下的轍印是那麼纖細，那麼微不可察」" 

# monologue
# JP: レール削正が行われれば、跡形もなく消えてしまう。\n轍があったことさえも、誰にも思い出されなくなる。
3074 = "而對鐵軌進行拋光的話，這些痕跡便會隨之消失。連轍印曾經存在過這件事，也不再會有人記起。" 

# monologue
# JP: それでも、轍を残したわたくしにだけ……\nわたくしと、双鉄さまにだけは、きっといつでも――
2598 = "但對留下這轍印的我……對我和雙鐵少爺來說，轍印都是永不磨滅的——" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの旅の終着点で、あえかな轍を振り返るとき。\nわたくしは、その上に、これ以上の後悔を見たくはない」
2003 = "「在抵達我的旅途的終點時，回顧那些淺淺的轍印，我不想在其中，看到更多的追悔莫及了」" 

# 【西瓜】
# display as 西瓜
# JP: 「っ！！！」
1972 = "「啊！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「それだけなのです。西瓜。双鉄さまとわたくしの轍を。\nわたくしは、悔いることなく振り返りたいだけなのです」
2033 = "「就是這樣，西瓜。我只是不想在回首雙鐵少爺與我共同留下的轍印時感到後悔而已」" 

# monologue
# JP: 大きく、大きく刻まれた傷。\n決して消えることの無い傷。
3032 = "當初刻下的巨大的，無從掩蓋的傷痕。也是永遠無法消弭的傷痕。" 

# monologue
# JP: 旅の終わりを迎えるときには、あの傷とさえ――\n真正面から向き合えるよう、わたくしは自分を運びたい。
3078 = "而為了在旅途迎來終點時，讓自己能夠昂首挺胸面對那道傷痕，我也要堅持下去。" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜は……」
2233 = "「西瓜……」" 

# monologue
# JP: 言葉が、なかなか続きません。
3142 = "西瓜的話語沒了下文。" 

# monologue
# JP: カタン、コトンと、とても静かな走行音が、\n沈黙の隙間を埋めていきます。
3014 = "片刻的沉默被列車喀嗒轟隆的行進音所填補。" 

# 【西瓜】
# display as 西瓜
# JP: 「確かに、西瓜は悔いるでしょう。\nこのままずっと、志寰を避ける時間を、重ねるのなら」
2200 = "「的確，如果今後和志寰在一起的時間裡，也一直這樣迴避他，西瓜以後一定會後悔的吧」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1967 = "「啊！」" 

# 【西瓜】
# display as 西瓜
# JP: 「っ！！！？　なにかありましたか、ハチロク」
1946 = "「哎！！！？怎麼啦，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、ごめんなさい、その……」
2165 = "「沒什麼，不好意思，就是……」" 

# monologue
# JP: 西瓜の時間を、西瓜の大事な考え事を、\n邪魔してしまい、申し訳なく、恥ずかしいことと思います。
2863 = "我只是覺得，在這屬於西瓜的時間裡，在西瓜思考著如此重要的事情的時候，貿然打擾實在是羞愧萬分。" 

# monologue
