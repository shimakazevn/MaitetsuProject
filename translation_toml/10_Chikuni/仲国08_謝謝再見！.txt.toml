[script]
# lines: 457 
# 【日々姫】
# display as 日日姬
# JP: 「つ……疲れた……」
1625 = "「啊……累死咧……」" 

# monologue
# JP: 力ない声でつぶやいて、日々姫がくったり倒れ込む。
2628 = "日日姬一邊有氣無力地說著，一邊倒在了床上。" 

# monologue
# JP: 『お姫様のベッド』と喜んでいた寝台の上に、\n焼きすぎた餅のごとくに体全部をべたりと崩す。
2426 = "在昨天看到還喜出望外的“公主床”上，我們如烤過頭而溶化的年糕一樣癱倒其中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――さすがに睡眠時間を削ると、\n旅疲れまでもが引きずられて、表に出てきてしまうな」
1644 = "「嗯——果然這睡覺時間保證不了的話，旅行的疲勞就會一下子全爆發出來啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ね～、いっつもとおんなじことばしてるのに、\nこぎゃんこたえるとは思わんかったと～」
1855 = "「是唄～做的事和平常都沒什麼兩樣，這個反應怎麼就差這麼多呢～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん」
1824 = "「抱歉」" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん！」
1433 = "「不過唉！」" 

# monologue
# JP: 下げかけた僕の頭を、声で止めようとするかのように、\n日々姫は慌てた――けれど明るい声をだす。
2595 = "我正要低頭道歉，日日姬彷彿是有意出言阻止一般，突然以明快的聲音打斷了我的話。" 

# 【日々姫】
# display as 日日姬
# JP: 「その分、めーっちゃ楽しかったと！　見てきた全部！\n新しいもの！　一枚の絵に、なんとかだけどまとまって」
1538 = "「卻也開心得不行！見識到的一切！嶄新的事物！總算都塞進一張畫裡啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なら、なによりだ」
1151 = "「……那可太好了」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ね？　にぃに。\n姜さんに送る前に、最終確認、頼んでよかと？」
1806 = "「所以囉，阿哥啊。在交給姜小姐之前的最後檢查就交給你行嗎？」" 

# monologue
# JP: 日々姫の手が、のったりぐったり伸びてくる。
2647 = "日日姬邊說邊把手緩緩向我遞過來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだとも」
1479 = "「你就放心吧」" 

# monologue
# JP: その手からタブレットを受け取って、\n手の甲をぽんとたたけば、日々姫はそのままシーツに沈む。
2593 = "我接下了她手中的平板電腦，然後輕輕拍了拍她的手背，她便順勢徹底攤在了床上。" 

# 【日々姫】
# display as 日日姬
# JP: 「ほんなら、よろしく～」
2062 = "「那就拜託囉～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「帰りの飛行機で熟睡をした方が多分、休まる。\nいま半端に寝ると、そこで眠れなくなるかもしれんぞ」
1682 = "「在回國的航班上好好睡睡大概能休息得更好。你現在就睡，到時候當心睡不著哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと。がんばる。けど――もし万が一寝息たてたら、\n起こしてもらえるとうれしかとー」
2004 = "「謝啦，我努力吧。不過萬一我睡著了的話，可得叫我起來哦——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1518 = "「包在我身上」" 

# 【日々姫】
# display as 日日姬
# JP: 「あとね、ご褒美。んっと……橙汁！\n自販機のでいいから、買ってほしかと」
2054 = "「還有，我要獎勵！我想想……就橙汁吧！自動販賣機的也可以，幫我買一瓶吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それも心得た。お安いご用だ」
2039 = "「這也包在我身上，舉手之勞」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～、やったぁ」
1600 = "「哎嘿嘿～好耶」" 

# monologue
# JP: その声がもう眠気を帯びてる。
2793 = "這話語中已然透著絲絲睡意。" 

# monologue
# JP: 最終確認に集中したいが、\n日々姫の寝息も警戒せねば、だ。
2600 = "我雖然想專心做最後的檢查，但還要留意不要讓日日姬睡著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、すまんが頼めるか？」
1501 = "「八六，不好意思，能幫我一下嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「すまないことなど、なにひとつ。\n喜んでお引き受けいたします」
2095 = "「雙鐵少爺您客氣了，我十分樂意效勞」" 

# monologue
# JP: ハチロクの手が優しく伸びる。
2358 = "八六把手溫柔地伸向日日姬。" 

# monologue
# JP: 寝台に沈む日々姫の乱れた髪を、\nそっとそうっと撫でつける。
2451 = "她輕輕地撫摸著日日姬的秀髮，將其理齊。" 

# 【ハチロク】
# display as 八六
# JP: 「ご苦労の甲斐――\n確実に、実るものかと存じます」
2049 = "「這樣的辛苦，也確實是得到了相應的成果」" 

# monologue
# JP: とても静かで、けれど確信に満ちた声。\n日々姫を優しく見つめていた目が、僕へと動く。
2368 = "八六的聲音無比平靜，而又信心十足。而她溫柔的視線，也從日日姬轉到了我的身上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、同じく感じてはいる」
1139 = "「……我也深以為然」" 

# monologue
# JP: ネットを通じた会議には、遅刻参加や途中退出などもあり、結果として御一夜鉄道関係者、ほぼ全員の参加を得られた。
2330 = "借助網路舉行的會議，有人遲到有人早退，但最終，御一夜鐵路的相關人士幾乎全部都有出席。" 

# monologue
# JP: 仲国で僕らが学んだことと、みなの意見と、アイディアと。\nそれらをまとめあげるのに、今までかかってしまったが。
2422 = "在仲國的所見所聞所想，以及大家的意見和建議。我們將這一切進行整理匯總，一直忙到了現在。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……他の誰でもない“僕ら”を視察に招いてくれた。\nその成果を、この線であれば示せるものと確信している」
1135 = "「……對方特地邀請“我們”前來考察，我想這個成果一定不負他們的期待」" 

# monologue
# JP: まさしく、僕らにしかできぬ提言。\nであるからこそ確実に伝えた上で、正しく評価して欲しい。
2791 = "這確實是只有我們才能完成的提案。正因如此，更需要將方案準確地傳達給對方，以期得到妥當的評價。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、多少の無理を押してでも――\nざっとした物でも、なんとか、朝のうちに送りたいのだ」
1808 = "「所以，哪怕有些勉強，哪怕還不夠詳盡，我還是希望能在早上把方案送出去」" 

# 【ハチロク】
# display as 八六
# JP: 「日ノ本へ帰ってしまいましたら、姜様たちとの\n直接の意見交換などは、難しくなりますものね」
1673 = "「回到日本國的話，和姜小姐她們直接溝通交換意見就沒這麼容易了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1865 = "「是的」" 

# monologue
# JP: ネットを通じての会議も無論、大変有用に機能する。が、\n対面と比れべばどうしても、些かの距離感が出てしまう。
2695 = "網路會議當然是一種非常有效的手段。但較諸面對面的交流，總會產生些許距離感。" 

# monologue
# JP: これほど重要な案件だ。その”些か”さえ取り除き、\n残された時間の許す限り、直接に意見交換したい。
2704 = "而對於如此重要的項目，自然希望排除這些“些許”，在有限的時間裡直接交換意見。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ。実によくまとまっている。\nこの稿を姜さんに送り、正式な提出前の検討を願おう」
1131 = "「……嗯。著實整理得不錯。就把這一稿交給姜小姐，作為正式提出前的溝通草案吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～、なら良かったと」
1599 = "「哎嘿嘿，那就太好啦」" 

# 【ハチロク】
# display as 八六
# JP: 「きっと、お喜びいただけるものかと」
1699 = "「她收到後一定也會很開心吧」" 

# monologue
# JP: 日々姫の声にも、ハチロクの声にも、達成感が滲んでいる。\nポーレットから、最終判断は一任されている。
2633 = "日日姬和八六的話語中，都顯露著完成任務的滿足感——畢竟，波萊特把最終決定權交給了我們。" 

# monologue
# JP: ならば迷いはもはや無い。\nメールとして、姜さんに送信を――――今、完了した。
2799 = "那就無需再做猶豫。發給姜小姐的郵件，也已經發送完成。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――日々姫もハチロクも、本当に良く頑張ってくれた。\nこころより御礼を言わせてほしい。ありがとう」
1089 = "「——日日姬，八六，你們都很努力了。我發自肺腑地感謝你們」" 

# 【日々姫】
# display as 日日姬
# JP: 「お仕事で、チームで、家族で。何よりにぃにやけんね！\nもし万が一気がむかんでも、がんばっちゃうし」
2045 = "「這是工作嘛，我們是團隊，是家人，而且你還是我阿哥哎！哪怕心裡有點不情願，也一樣會全力以赴的嘛」" 

# monologue
# JP: くったりくずれおちたまま、それでも顔をもちあげて。\n日々姫はほやーっと笑顔を浮かべる。
2643 = "日日姬的身體還是繼續癱在床上，但她努力抬起頭來，向我露出了一個燦爛的笑容。" 

# monologue
# JP: 眠たそうだが、しあわせそうだ。\n見ているこちらが癒やされる。
2802 = "雖是睡意朦朧，卻也幸福滿溢。我看在眼中都覺得自己深深地被治癒了。" 

# 【日々姫】
# display as 日日姬
# JP: 「こぎゃんするとは、なんにもなくても楽しかけんね！\nおっきなおーーーーっきな絵ば描けちゃうし」
1494 = "「光是能描繪出這樣大～大的畫作，我就已經老開心咧！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄さま。\nこの上なく楽しく、こころはずむことと感じております」
1768 = "「我也是，雙鐵少爺。這種心動雀躍的感覺無與倫比」" 

# monologue
# JP: ハチロクは体を崩さない。
2355 = "八六並沒有像日日姬那樣癱倒在床上。" 

# monologue
# JP: 寝台の端にちょこんとお行儀よく座り、とても穏やかで\n満ち足りた笑顔で、僕のこころを満たしてくれる。
2448 = "她在床邊正身而坐，臉上洋溢著平和而滿足的笑容，我看在眼裡，暖意同樣滿溢於心中。" 

# 【ハチロク】
# display as 八六
# JP: 「レイルロオドにはありえない、素晴らしい家族旅行を\n経験させていただいて、それが新しいレールにも繋がる」
1960 = "「能夠有幸體驗與通常鐵路人偶無緣的，如此美妙的家庭旅行，這想必會引領我駛向全新的軌道」" 

# monologue
# JP: 黒髪が、揺れる。\n僕に、日々姫に――ハチロクは深々、礼をする。
2363 = "八六的烏黑秀髮隨她的話語輕輕搖曳。而後，她向著我和日日姬，深施一禮。" 

# 【ハチロク】
# display as 八六
# JP: 「この上なく恵まれていて、しあわせで――\nわたくし、少し、怖いほどです」
1819 = "「承蒙此等無上至福，我心中實在有些許不安」" 

# monologue
# JP: ……ああ。確かにだ。恵まれていると、つくづく思う。\n幸せも怖さも感じるし――同時に、とても不思議に思う。
1066 = "……啊。說來也是。越是身處福中，越會這樣覺得。心中既有幸福也有恐懼——同時還有種不可思議的感覺。" 

# monologue
# JP: （僕も、日々姫も、ハチロクさえも。誰ひとり――\n日仲のレールを繋ぐなど、夢見てさえもいなかった）
2823 = "（我也好，日日姬也好，八六也罷，恐怕我們都做夢也無法想像，自己能夠參與到連接日仲兩國軌道的事業中）" 

# monologue
# JP: ただ、右田家への恩返しのため。御一夜の水を守るため。\n偶然の縁を結んだレイルロオドの失くし物を見つけるため。
2587 = "我只是為向右田家報恩，為守護御一夜的清水，為找回偶然結識的鐵路人偶的失物——" 

# monologue
# JP: その時々で、その時々に果たせることを果たしてきた。\nただそれだけのことであるのに――
2788 = "這些零零星星的事情，得到了零零星星的結果。我所做的不過如此，然而——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いつの間に、ずいぶんと遠くへ来たなぁ」
1113 = "「……不知不覺間，竟已遠涉至此」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、わたしも思ったと。\n使ってるのは、ずーっとおんなじスケッチブックなのに」
1620 = "「啊——我也這麼覺得。明明一直用的都是同樣的素描簿」" 

# monologue
# JP: ふふふと、小さな笑い声。
2797 = "邊說，日日姬邊輕笑出聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「最初はくまくま。柱時計とにぃにとねぇね。\nそれだけが、私に描けるものだったのに」
1429 = "「一開始只有隈熊、座鐘、阿哥和阿姐——那時我能畫的也就只有這些了」" 

# monologue
# JP: 兄妹だなと、つくづく思う。\n考え方も感じ方もだんだん似てきて――
2574 = "我也越來越有不是一家人不進一家門的感覺。無論是思考的方式，還是感受到的東西都是如此相似。" 

# 【日々姫】
# display as 日日姬
# JP: 「列車ば描けるようになって。町を描けるようになって。\n今度は――もしかしたら、ふたつの国の未来まで！」
1956 = "「而後漸漸學會了畫列車，再之後是城鎮。而這次，說不定畫下的是兩個國家的未來啊！」" 

# monologue
# JP: それでも決して、見ているものが、果たせることが、\nひとつに重なることはない。
2402 = "即便如此，著眼之處，與著手之處，也絕非簡單等同。" 

# monologue
# JP: 安心できて、居心地がよく、\n心強いと、つくづく思う。
2499 = "安心，愜意，堅定，這樣的感覺不斷湧現。" 

# 【日々姫】
# display as 日日姬
# JP: 「繰り返しば繰り返してるだけなのに、\nどんどん遠くに、どんどん楽しくなってきて――」
1504 = "「其實說起來，也就是在重複做那些事而已，但卻越走越遠，越做越開心了」" 

# monologue
# JP: 眠気を、興奮で追い払いでもできたのだろうか。\n日々姫がひょこんと体を起こし、僕を見つめる。
2277 = "不知是不是興奮起來的關係，日日姬似乎已經睡意全無，她也爬起身來看著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「こぎゃんと、ずっと続けばよかよね。\nわたし、ずーっと続けたかとよ」
1996 = "「要是以後也能一直這樣下去就好了。這是我的願望」" 

# 【双鉄】
# display as 雙鐵
# JP: 「続けたいと願う限りは、きっと続くさ。\nこうした日々も、新しいレールも、なにもかも」
1576 = "「只要我們還想要繼續，那就一定可以。無論是這樣的日子，還是新的鐵軌，有志者事竟成」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうかな。えへへっ。\nほんとにそうなら、嬉しいな！」
1934 = "「真的嗎，哎嘿嘿。要真是這樣的話就太好啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当にそうなるように、日々を重ねていけばいい。\n及ばずながら、僕もいつでも、出来る限りの力を貸そう」
1900 = "「為了這樣的目標，我們更要腳踏實地日積月累。雖然能力有限，但我定會竭盡所能為你出力」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　――えと、わたしも！　わたしもにぃにに！\nわたしのぜぇんぶ、いつでも喜んで差し出すけんね！」
1596 = "「哇，那我也一樣！我也會全力以赴地幫助阿哥的！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、[マイマスター,3]双鉄さま。\nわたくしの全ては、あなたの望みを叶えるために」
1764 = "「我也是，[Ｍｙ　ｍａｓｔｅｒ,3]雙鐵少爺。若為您所期冀，我願傾盡所有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ののぞみ――か」
1798 = "「我的願望……嗎」" 

# monologue
# JP: あの事故以来、そんなものは一度たりとも抱けなかった。\n誰かののぞみを叶えることで、自分の隙間を埋めていた。
2725 = "自那次事故以來，這個想法就從未在我腦海中出現過。我只是一心埋頭在實現他人的願望之中。" 

# monologue
# JP: けれども、今は――たったひとつ。\n確かなのぞみを、自分ののぞみを、抱いている。
2666 = "然而現在，我的心頭卻有唯一成型的願望——屬於我自己的願望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「叶えたいな。それと同時に。僕ののぞみが――\n僕らののぞみであって欲しいと、願ってもいる」
1788 = "「我希望實現大家的願望。與此同時，我也希望我的願望能夠不與大家的願望相左」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま――まことに嬉しうございます。\nそう願って頂けますこと、誇りと、喜びと感じます」
2096 = "「雙鐵少爺能有如此期冀，我真的是非常高興，同時也為您感到自豪」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、私の、私達の――みんなののぞみ！\n絶対、叶うし叶えるけん！！！」
2084 = "「阿哥的，我的，我們大家的——所有的願望，都一定要努力實現，也一定都會實現的！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とてもうれしい。ありがとう」
1786 = "「我好高興，謝謝你們」" 

# monologue
# JP: とはいえ、だ。\n僕もどうやら、いつの間に力みすぎてしまっていたらしい。
2281 = "不過話說回來，我不知不覺間好像也有些緊張過度了。" 

# monologue
# JP: あえて大げさに肩の力を抜いて長い息を吐き出せば、\nハチロクも日々姫も、照れくさそうな笑みを零す。
2602 = "所以當我放鬆雙肩長出一口氣時，八六和日日姬也都不好意思地相視而笑了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今僕たちに出来ることは全て果たした。最後の詰めだけ\n姜さんたちの手を借りたなら、もうそれ以上は頑張れん」
1706 = "「如今我們可謂已備萬事，只欠姜小姐的東風」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはは、そだよねー。この次の一枚ば描くか描かんか。\n決めるのは、私たちじゃなく、姜さんたちだもんねー」
1630 = "「啊哈哈，可不是嗎。接下來這一張能畫還是不能畫，決定權不在咱們，而在姜小姐身上啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうか……最終判断は、その上の人々だろうがな」
2003 = "「話雖如此……做出最終判斷的，應該也是位居姜小姐之上的人吧」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄さま、日々姫。いいえ」
2101 = "「非也，雙鐵少爺，日日姬。並非如此」" 

# monologue
# JP: 僕らの言葉が、とても柔らかに止められる。
2372 = "八六輕柔地介入了我們的對話。" 

# 【ハチロク】
# display as 八六
# JP: 「鉄路の存否を決めるのは、いつだって。ご利用下さり、あるいはお離れになる、乗客の皆様のみです」
1888 = "「決定鐵路生死存亡的，一直都是選擇乘坐或是遠離列車的乘客們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1626 = "「啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか。うん――\nそうだった」
1721 = "「對哦——嗯，確實是這樣」" 

# 【ハチロク】
# display as 八六
# JP: 「だからこそ。この提言はきっと取り入れられようと――\nそう、わたくしは信じるのです」
1885 = "「正因如此，我堅信我們的提案一定會被採納」" 

# monologue
# JP: ハチロクの目も、やはり僕らのものとは違う。
2365 = "八六的眼光，果然與我們不同。" 

# monologue
# JP: 栄光も衰退も、自らの景色として、\nリアルタイムで見てきた瞳だ。
2696 = "繁榮與衰退，在她眼中，不過是穿梭於眼前的景色而已。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、日々姫は。今の鉄路をお使いの方も、\nそうでない方も――確かにご視察されましたから」
2099 = "「雙鐵少爺，還有日日姬，我們這次不光考察了乘坐火車的人們的情況，也考察了不坐火車的人——兼聽則明」" 

# monologue
# JP: その目が、僕を見てくれている。\nいつも、いつでも、見てくれている。
2794 = "這雙眼睛，總是在注視著我，無論到何時都不會改變。" 

# monologue
# JP: 僕がレールであるのなら、軟弱地盤を、難所を誤って\n選ばぬように、いつでもさり気なく正してくれる。
2732 = "若是把我比作鐵軌的話，那她就會時時留意，提醒我不要誤入地基不穩或是急險陡坡的地區。" 

# 【ハチロク】
# display as 八六
# JP: 「皆様ののぞみと、鉄路とが、綺麗に重なるポイントを。\nこの提言は、鮮やかに描き出しておりますから」
2040 = "「這份提案，鮮明地描繪出了群眾的期冀與鐵路完美重疊的願景」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクにそういってもらえるのなら、安心だ」
1148 = "「……能夠得到八六這樣的評價，我倍感安心」" 

# monologue
# JP: だから、思う。\nこころの底から、つくづく思う。
2604 = "所以，我從心底越來越覺得——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……他の誰と旅をしたとて、あるいは同じような\n感慨を持てたのかもしれんとも思うのだが――それでも」
1132 = "「……如果說是和其他人結伴踏上這段旅程，或許也會有同樣的感想——但就算是這樣」" 

# monologue
# JP: ポーレットとなら、れいなとなら。真闇姉と、稀咲となら。\nあるいは凪と、ふかみとなら。
2456 = "如果換作和波萊特、和玲奈、和真闇姐、和稀咲，抑或是和凪、和深美的話——" 

# monologue
# JP: まったく違うものを見て、まったく違う経験を積み。\nまったく違う草案を、きっと組み上げたことだろう。
2605 = "所見所聞，所感所受，進而總結提出的草案，想必都會有所不同吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫とハチロクと。視察ができて本当によかった。\nこれ以上の案は出せんだろうと、今の僕には思えるよ」
1887 = "「此行能與日日姬和八六同行真是太好了。現在我覺得，應該不會有比這更好的提案了」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへへへ～、ならよかったと！！\nわたしも、うん。やりきった感あるけんね！！」
1602 = "「哎嘿嘿～那不是挺好嗎！！我也是，傾盡全力沒有遺憾了！！」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。わたくしも、お示し頂けた役割を\nわたくしなりに、果たしきれたものかと存じます」
1925 = "「的確如此。我也認為我把所擔當的職責，盡全力做到最好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。確かにだ。共感を使い、仲国のレイルロオドと\n――ハチロクはよく、交流し情報を集めてくれた」
1858 = "「是啊，八六通過共鳴，從仲國的鐵路人偶那裡收集了相當多的訊息」" 

# monologue
# JP: ハチロクと西瓜が信頼を深めあってくれたこと。\n言葉には直せぬ情報さえも、共感で伝えあってくれたこと。
2656 = "正因為八六與西瓜間互相建立了很深的信任，就連很多難以用語言描述的訊息，都透過共鳴傳達給了八六。" 

# monologue
# JP: そのおかげで得られた恩恵は、\n計り知れぬほどに大きなものだと、確かに感じる。
2709 = "而我也深感，由此得到的助力實在是無從估量。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクにしか果たし得なかった、大事な役目だ。\n見事な成果を、ありがとう」
2043 = "「這是只有八六才能擔當的職責，成果喜人，非常感謝」" 

# 【ハチロク】
# display as 八六
# JP: 「もったいないお言葉にすぎます。わたくしはただ――\nあら！　噂をすればなんとやら、でございますね」
1752 = "「您實在是過獎了。我只是——啊！說曹操曹操就到啦」" 

# monologue
# JP: さもおかしそうなハチロクの声。
2366 = "八六的聲音一下子變得有些奇怪。" 

# 【ハチロク】
# display as 八六
# JP: 「西瓜からの共感です。\n空港いきの車が、あと30分ほどで到着するとのことです」
1871 = "「是西瓜發來了共鳴。送我們去機場的車還有三十分鐘就到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いよいよ、か。\nハチロク、日々姫。忘れ物などないようにな」
1943 = "「終於要踏上歸途了嗎。八六，日日姬，仔細檢查一下不要忘東西了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　ってか、にぃに。タブレット」
1652 = "「嗯！我說阿哥啊，平板電腦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1626 = "「啊」" 

# monologue
# JP: 日々姫が荷物をまとめ直す。\n僕も、同じく。
2635 = "日日姬和我都各自重新理好了行李。" 

# monologue
# JP: 僕らが立った寝台を、\nシーツの皺に至るまで、ハチロクは丁寧に整え直す。
2371 = "八六趁機把床鋪整理整齊，平整到沒有一絲褶皺。" 

# 【ハチロク】
# display as 八六
# JP: 「うん」
1649 = "「嗯」" 

# monologue
# JP: そうして深々。\n今度は部屋へと、頭を下げる。
2705 = "而後，對著房間深鞠一躬。" 

# 【ハチロク】
# display as 八六
# JP: 「――大変お世話になりました！」
1092 = "「——這兩天承蒙關照了！」" 

# monologue
# JP: 車の中でも、朝粥をいただいた軽食店でも、話せなかった。
2278 = "不管是上了車，還是在上車前吃早餐的小吃店，姜小姐都一言不發。" 

# monologue
# JP: 僕らが直近で送った資料を、姜さんは、無言のままに\nひたすら、ひたすら、読み込み続けてくれていたゆえ。
2418 = "因為她一直埋頭翻閱著我剛剛發送給她的資料。" 

# 【姜】
# display as 姜
# JP: 「……なるほど」
1127 = "「……原來如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1631 = "「啊！」" 

# monologue
# JP: ようやく、その喉が音を発する。
2692 = "終於，姜小姐開口打破了沉默。" 

# 【姜】
# display as 姜
# JP: 「――日ノ本のナインスターズの“その先”を、\n仲国では進める必要がありますか」
1086 = "「——你們在日本國為九星所描繪的“將來”，在仲國也同樣有推行的必要啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、思います」
1867 = "「是的，我們正是這樣想的」" 

# monologue
# JP: 伝わっている。\nただ一言で理解できるゆえ、言葉も率直なものになる。
2453 = "她領會到了。只用一句話便獲得了對方的理解，所以溝通也就簡單明瞭起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今回の視察で僕がまずまっさきに感じたのは、\n『仲国の鉄道は生きている』ということでした」
2050 = "「這次考察中，我首先認識到的是，“仲國的鐵路仍有勃勃生機”」" 

# 【ハチロク】
# display as 八六
# JP: 「北琴駅、北琴西駅、聖都駅。どの駅もまことに見事で、\n乗客も多く。列車も大変に優れたものと感じ入りました」
1531 = "「北琴站、北琴西站、盛都站，都是相當氣派的車站，乘客更都是摩肩接踵，列車也全是相當優秀的車型」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上、貨物の実需もとても大きいというお話です。\nですから逆に、『何故このお話が僕達に』と考えました」
2053 = "「進而，貨運的現實需求也極其龐大。所以，我們反而開始思考“為何會對我們委以重任”」" 

# 【日々姫】
# display as 日日姬
# JP: 「それで私達が思ったのは――『生きている鉄道だけど、\n鉄道離れが急速に進んでいるのかも』、ってことでした」
1841 = "「於是我們想到了一點——“鐵路雖然尚有生機，人們卻在日漸加速遠離”」" 

# monologue
# JP: 飛行機の中で、[ほんこん,1]紅港出身のCAさんが言っていた。\n『レイルロオドを見るのは初めて』だと。
2429 = "在飛機上，箱港出生的空服說她“還是第一次見到鐵路人偶”。" 

# monologue
# JP: 北琴鉄道博物館で目にした仲国国鉄路線図では、\n紅港にも、鉄路は当然、繋がっているにもかかわらず。
2423 = "在北琴的鐵路博物館曾看到過仲國國鐵的路線圖，在那上面，箱港自然也有與之相通的線路，但她卻一次都未曾得見。" 

# 【双鉄】
# display as 雙鐵
# JP: 「長距離は航空機。近距離はエアクラ自動車。\nその使い分けが、特に若い世代には浸透している――」
2079 = "「長距離靠飛機，近距離靠空凝機汽車——這樣的出行方式大行其道，年輕一代尤其如此」" 

# monologue
# JP: 大きな頷き。\n姜さんからだけではなく、西瓜からも、志寰君からも。
2478 = "姜小姐深深點頭。西瓜和志寰也同樣點頭附和。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが鉄道離れの一番大きな原因だと感じました。\nならばこのまま年を経るごとに、鉄道離れは加速する」
1794 = "「我深感這應該是人們遠離鐵路最大的原因。如果放任不管，假以時日，人們遠離鐵路的速度只會越來越快」" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、私達が声をかけてもらえたんだと思いました。\nナインスターズは九洲を繋ぎ、鉄路を繋いだ列車だから」
1791 = "「我想這就是會選中我們的原因吧。因為九星是聯繫九州，連通鐵路的列車啊」" 

# 【姜】
# display as 姜
# JP: 「ご明察です。西瓜からの報告を受け、\n当方は、先生達に託すべきだとの決断を下しました」
1881 = "「果然是明察秋毫。當初就是收到了西瓜這樣的報告，我方才認定值得將此重任，託付給諸位」" 

# monologue
# JP: “当方”は、姜さんとその上席とを意味するのだろう。\nあるいは当方以外の“他方”勢力の主導によって――
1063 = "“我方”應該是指姜小姐，以及她身後更高位的人物吧。或者是除“我方”之外的其他“第三方”——" 

# monologue
# JP: 僕ら同様、視察と提言を求められている\n海外鉄道事業者の存在を匂わせているのかもしれないが。
2446 = "她可能是在提示我們，存在其他跟我們一樣受邀進行考察，而後提交建議的外國鐵路從業者。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし――実際に来て、乗ってみて。\n仲国の広大さが、周遊観光を困難にすると理解しました」
1908 = "「然而真正踏上這土地，乘坐列車穿行其中，我才深刻理解了仲國的土地遼闊，導致周遊觀光難度極大」" 

# monologue
# JP: が、誰かライバルがいるのだとしても、\n僕らの為すべきは変わらない。
2326 = "但即便有其他競爭對手，也不會對我們該做的事造成絲毫影響。" 

# monologue
# JP: 仲国を繋ぎ、仲国と日ノ本をもまた繋ぐ――\nそうした列車の草案を、全力で提言するのみだ。
2508 = "將仲國各地聯繫起來，將仲國與日本國聯繫起來——我們要做的就是全力完成這種列車的提案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「9,597,000[　　　　　２,1]km割ることの、36,750[　　　　　　２,1]km。\n単純な面積比ですと、仲国は九洲の260倍強となります」
1428 = "「一邊是九百五十九萬七千平方公里的仲國，一邊是三萬六千七百五十平方公里的九州，單就面積便相差兩百六十倍」" 

# 【姜】
# display as 姜
# JP: 「そうなりますね」
1926 = "「的確如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、九洲規模の範囲を切り取って旅しても、\n『仲国のごく一部』を周遊することにしかなりません」
1674 = "「因而，若是旅行範圍限定在九州規模，這樣的周遊線路，不過是“對仲國管中窺豹”而已」" 

# monologue
# JP: 1／260。\n大きなパズルの260のピースの中の、たったのひとつ。
2825 = "１／２６０，若把仲國比作２６０片的拼圖，那不過是其中一片而已。" 

# monologue
# JP: それをどのように選んでみたとて、\nパズル全体の絵柄を想像させることは、不可能だろう。
2664 = "無論如何精挑細選，以此通覽全貌也無異於痴人說夢。" 

# 【日々姫】
# display as 日日姬
# JP: 「それでは仲国を代表する観光列車にはなりえませんし\n仲国の皆さんのこころを繋ぐレールは、伸ばせません」
2071 = "「那樣是無法成為代表仲國的觀光列車的，而聯繫起全仲國人民內心的鐵軌，也會無從鋪就」" 

# 【西瓜】
# display as 西瓜
# JP: 「ではどうしますか！？」
2060 = "「那可如何是好！？」" 

# 【志寰】
# display as 志寰
# JP: 「西瓜っ！？　――あっ」
1994 = "「西瓜！？——啊」" 

# monologue
# JP: 思わず飛び出た。そんな風情の西瓜の声を\n止めようとした志寰君が、姜さんによってたしなめられる。
2754 = "西瓜下意識地問出了聲，而欲開口阻攔的志寰，卻在看到姜小姐的眼神後把話咽了回去。" 

# monologue
# JP: 資料を見ていない――予備知識の無い西瓜の生の感じ方を、\n姜さんは、あるいは確かめたいのかもしれん。
2758 = "西瓜沒有看過資料，對於話題的走向一無所知——而姜小姐或許就是想了解一下她的想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1499 = "「八六」" 

# monologue
# JP: 西瓜にならば、ハチロクの声が一番まっすぐ届くだろう。\nその思いでの一言を、ハチロクはすぐ受け止めてくれる。
2509 = "對西瓜的心裡話，八六應該是最合適的解說員了。而八六也對此心領神會，開口解釋起來。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、仲国の広さをまず学び、\n整頓しようと試みました」
1784 = "「我們首先去了解仲國的廣闊，嘗試從中整理思路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「23の省。5つの自治区。直轄市が4。特別行政区が2。\nまずその34を、うまく繋ぎあわせることができないかと」
2123 = "「２３個省，５個自治區，４個直轄市，２個特別行政區——我們首先考慮的是，是否能夠順利將它們聯繫起來」" 

# monologue
# JP: とはいえ、『省』も『自治区』もあまりに広い。
2324 = "但即便如此，各個“省”和“自治區”也還是相當廣闊。" 

# monologue
# JP: 内蒙蛄自治区一つだけでもその面積は1,183,000キロ平米。\n日ノ本全土の総面積、378,000キロ平米の、約三倍だ。
2332 = "僅以內盟古自治區而言，其面積就有一百一十八萬三千平方公里，是日本國全境面積三十七萬八千平方公里的約三倍左右。" 

# 【ハチロク】
# display as 八六
# JP: 「34区域のひとつひとつに観光拠点駅を設定し。\nその全てをめぐる周遊観光列車をと考えたのですが……」
1779 = "「我們原本是設想在全部３４個區域各自設置觀光據點，而後乘周遊觀光列車逐個遊覽……」" 

# monologue
# JP: ハチロクの力無い語尾を、西瓜が掬う。
2367 = "八六的聲音漸漸低沉了下去，西瓜則自然地接過了話柄。" 

# 【西瓜】
# display as 西瓜
# JP: 「仲国の平均的な大型連休は、7日が二回。\n春節、つまり旧正月と、国慶節となります。ので――」
1474 = "「仲國大多數人每年擁有兩次七天長假，春節，即舊曆正月，以及國慶節，因此——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。34拠点駅全てを僅か7日間でめぐろうとすれば、\n乗っているだけ――観光の余裕が全くなくなってしまう」
1659 = "「嗯，若是想要在七天內周遊全部３４個據點站，那就要一路搭車，全無遊覽的餘力了」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も同様に考えます。またそれほどの長時間乗車は、\nどんな客車を用意しようと、乗客の負担が厳しいかとも」
1989 = "「西瓜也這樣覺得。而且連續搭車那麼長時間，無論車廂條件如何，對乘客的負擔都未免過於沉重」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ゆえ、その案は捨て。全く異なる区分を求めた。\nすると『仲国地理大区』というのものがあると教わった」
1864 = "「是的。所以我們也放棄了這個方案，轉而尋求其他的劃分方法。這時我們了解到了“仲國地理大區”的概念」" 

# 【志寰】
# display as 志寰
# JP: 「中南地区、東北地区、華北地区、\n華東地区、西北地区、西南地区の大区分ですね」
1443 = "「中南地區、東北地區、華北地區、華東地區、西北地區、西南地區，這樣的大區劃分是吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば、こぎゃん二つにわけると！！」
1823 = "「把它們像這樣一分為二！！」" 

# monologue
# JP: 仲国を簡易的に描いた地図に、日々姫がさっと線を引く。
2428 = "在簡單畫出的示意地圖上，日日姬橫拉了一條線。" 

# monologue
# JP: 西北・華北・東北と、西南・中南・華東とに――\n仲国全土が、南北二つに切り分けられる。
2741 = "西北、華北和東北，西南、中南和華東——將仲國全境，以南北為界劃為兩大區域。" 

# 【双鉄】
# display as 雙鐵
# JP: 「西北・華北・東北から７つの観光拠点駅を選び、\nそれを７日間で周遊する、『北斗七星』」
1735 = "「從西北、華北、東北選擇七個觀光據點，擬定七天的周遊路線，是為“北斗七星”」" 

# 【日々姫】
# display as 日日姬
# JP: 「西南・中南・華東から6つの観光拠点駅を選んで、\nそいば6日間で周遊する、『南斗六星』！」
1736 = "「從西南、中南、華東選擇六個觀光據點站，擬定六天的周遊路線，就是“南斗六星”咧！」" 

# 【ハチロク】
# display as 八六
# JP: 「北斗と南斗、二つの豪華クルウズトレインを[しつら]設え。\n春節、国慶節等に、それぞれおめぐりいただく」
1517 = "「創立北斗與南斗兩大豪華長途旅行列車，在春節、國慶等節假日，各自開行」" 

# 【志寰】
# display as 志寰
# JP: 「西瓜――」
1971 = "「西瓜——」" 

# monologue
# JP: 志寰君の鋭い声に、西瓜が頷き、目を閉じる。
2559 = "志寰驚呼出聲，西瓜朝他點了點頭，閉目思索起來。" 

# 【西瓜】
# display as 西瓜
# JP: 「8～10時間の夜行移動と、余裕時間での観光と仮定し。\n実現可能。かつ有力そうなダイアを複数想定できます」
1482 = "「假設８到１０小時的夜間行駛，並利用餘下的時間進行觀光遊覽。確實可以制定出若干可行且頗有吸引力的行程」" 

# monologue
# JP: へへっ、と日々姫が小さく笑う。\nごく控えめに拳を作り、ハチロクと瞬時、ぶつけあう。
2644 = "日日姬輕輕一笑，同時輕輕握起手，快速地跟八六碰了個拳。" 

# monologue
# JP: ポーレットたち、御一夜組の精査と確認を受けてはいたが、\nやはり、正直ホっとする。
2804 = "雖然留守在御一夜的波萊特她們已經審核確認過方案了，但能聽到她這麼說還是讓我們鬆了一口氣。" 

# 【志寰】
# display as 志寰
# JP: 「実現可能なら！　それならきっと！\n鉄道への憧れを、若い世代にも抱いてもらえますね」
1842 = "「既然可行的話那不正好嘛！肯定能點燃年輕一代對鐵路的憧憬」" 

# 【西瓜】
# display as 西瓜
# JP: 「とても残念ですけれど、志寰。\n西瓜は、その考えには同意できません」
2109 = "「非常遺憾，志寰。西瓜無法贊同你這樣的想法」" 

# 【志寰】
# display as 志寰
# JP: 「え？」
1609 = "「哎？」" 

# monologue
# JP: けれど、開かれた西瓜の瞳に宿る光は、ごく鈍い。
2760 = "西瓜緩緩睜開雙眼，目光中仍然滿是沉重。" 

# 【西瓜】
# display as 西瓜
# JP: 「北斗七星、南斗六星。両クルーズトレインに対し、\n若い世代が抱く感情は、むしろ疎外感かと推測します」
1529 = "「北斗七星，南斗六星——對這兩列長途旅行列車，對年輕一代而言，疏遠感或許更甚於普通列車」" 

# 【志寰】
# display as 志寰
# JP: 「あ！」
# 1631 = "「啊！」" 

# monologue
# JP: 声を失う志寰君の傍ら、\nハチロク、日々姫が静かに頷く。
2334 = "像是在映襯啞口無言的志寰一般，八六和日日姬也在默默點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「鉄道への親しみが殆ど無いところに最高級の贅沢品を\n見せつけられては、無理からぬことかもしれませんね」
1684 = "「在對鐵路幾乎沒有親近感的情況下一下子拿出最高級的奢侈品，或許倒是太過突兀了」" 

# 【日々姫】
# display as 日日姬
# JP: 「富裕層・高年齢層の豪華鉄道。自分たちは航空機って\n――棲み分けの意識が、むしろ加速しかねないかも」
1931 = "「相反，倒有可能加深“有錢人、歲數大的坐豪華列車，我們就去坐飛機”這樣的割裂感」" 

# 【志寰】
# display as 志寰
# JP: 「！！？　なら。\nならこの案は逆効果になってしまうじゃないですか」
1606 = "「哎！！？那、那這個方案不就起了反效果了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この案だけでは、\nメリットよりもリスクの方が大きかろう」
1924 = "「的確。單靠這個方案的話，很有可能得不償失」" 

# 【西瓜】
# display as 西瓜
# JP: 「っ！　――双鉄先生は、でしたら、他の案も？」
1635 = "「啊！那雙鐵先生莫非還有其他方案？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。北斗七星、南斗六星を走らせるのと同時に、\n若い世代の鉄道利用を促す星も、また掲げればいい」
1648 = "「嗯。在開行北斗七星、南斗六星的同時，點亮促進年輕一代乘坐列車的星星就是了」" 

# 【西瓜】
# display as 西瓜
# JP: 「それは、どのような星ですか？」
2058 = "「那又是怎樣的星星呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「数多瞬く星々だ。6つの仲国地理大区――\nそれぞれに、すくなくとも十以上の星を散りばめたい」
1919 = "「當然是滿天繁星。在六個仲國地理大區，各自散布下至少十顆以上的星星」" 

# 【姜】
# display as 姜
# JP: 「でしたら――」
2048 = "「這樣的話——」" 

# monologue
# JP: 姜さんの唇がふわり、と緩む。\n言葉とともに、小さな笑みが浮き上がる。
2488 = "姜小姐緩緩地開口，臉上逐漸浮起了一絲笑容。" 

# 【姜】
# display as 姜
# JP: 「一〇八星。\n水滸伝になぞらえた星々などはいかがでしょうか？」
1426 = "「一百零八星。水滸傳中出現過的群星，諸位意下如何？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい！　では、うむ――各地理大区の中に、\nそれぞれ18駅ずつを、水滸伝一〇八星になぞらえて」
1642 = "「啊，這個很棒！這樣，嗯……各個地理大區裡，各自設立１８個據點站，比作水滸一百零八星」" 

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「スタンプラリー！」
1815 = "「打卡拉力！」" 

# monologue
# JP: 志寰君と西瓜の声が綺麗に重なる。\nふたりは目と目を見交わせて、実に嬉しげな笑顔を零す。
2544 = "志寰和西瓜異口同聲。兩人相視而笑，喜悅之情溢於言表。" 

# 【日々姫】
# display as 日日姬
# JP: 「そう！　春節と国慶節の間に、108星の駅たちをめぐる\nスタンプラリーを開催するの！　名付けて！」
1890 = "「沒錯！在春節與國慶期間，舉辦巡遊一百零八星車站的打卡拉力，其名曰！」" 

# monologue
# JP: 日々姫がぐりんと僕を見る。\n“名付け”まで、会議では間に合わなかったが――うむ。
2639 = "日日姬的目光投向了我。但“命名”這部分，我們在會上還沒來得及提到——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……。ディスカバー――\n『DISCOVER　CHINA』――というのはどうだろう」
1145 = "「……發現——“Ｄｉｓｃｏｖｅｒ　Ｃｈｉｎａ”這樣如何？」" 

# 【志寰】
# display as 志寰
# JP: 「DISCOVER　CHINA」
2124 = "「Ｄｉｓｃｏｖｅｒ　Ｃｈｉｎａ」" 

# 【西瓜】
# display as 西瓜
# JP: 「仲国を……発見する――\n仲国の魅力を、再確認する？」
1920 = "「發現……仲國——再一次，體會仲國的魅力？」" 

# monologue
# JP: 伝わっている。\nその実感が、僕の舌先をなめらかにする。
2287 = "他們果然能夠理解，而這也讓我更順利地將心中所想全盤托出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国の魅力を確かめ直す旅を通じて、仲国鉄路の魅力を。\nひいては――仲国を旅する自分自身をも、再発見する」
1693 = "「在重新體會仲國魅力的同時，也再次領略仲國鐵路，乃至仲國旅遊自身的魅力」" 

# monologue
# JP: 御一夜での暮らしは、旅は。鉄路は僕に――\n僕自身の今と過去、そして未来も示してくれた。
2654 = "棲身御一夜，其旅遊業，其鐵路，既是我的現在與過去，也昭示著我的未來。" 

# monologue
# JP: それは決して、特別な体験ではないのだとも、\n日々姫やポーレット――御一夜の皆から、僕は学んだ。
2713 = "而這絕不是為我個人所獨有的特別體驗，而是我從日日姬、波萊特，以及御一夜所有人身上學到的人生經驗。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗って旅してもらえるのならば、それだけで。\nこれほどの鉄路と国土です。必ず魅力は伝わります」
1577 = "「只要能吸引年輕人來乘坐，自然便能讓他們感受到這些鐵路線路、國土的魅力」" 

# 【志寰】
# display as 志寰
# JP: 「しかし、今の仲国の若者にだと――\nキャンペーンに興味をもってもらうことが難しそうです」
1476 = "「但如今，想要通過活動吸引仲國年輕人的興趣恐怕並不容易」" 

# 【ハチロク】
# display as 八六
# JP: 「キャンペエンの開催とあわせ、フリイきっぷを発売し、\n若年層の鉄道利用を強く促すことが、効果的かと」
1691 = "「在舉辦活動的同時，發售通票，應該就會更容易吸引年輕人利用鐵路」" 

# 【西瓜】
# display as 西瓜
# JP: 「フリーきっぷ……春節中は仲国国鉄乗り放題、的な？\nそれは――そのきっぷも高価となりそうかと、西瓜は」
2051 = "「通票……比如在春節期間可以自由乘坐仲國國鐵列車嗎？西瓜覺得這通票怕是價格不菲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であらば普通列車の利用、ないしは、六地理大区の\nうちの一区分内有効のみに限定などもできるだろう」
2064 = "「那就限定僅可乘坐普通列車，或者加上只能在六個地理大區之一內部乘坐的限制」" 

# 【志寰】
# display as 志寰
# JP: 「そうか！　そうした低価格帯のフリーきっぷもあれば、\n気軽に鉄道に親しんでもらうことができそうですね」
1723 = "「對哦！輔以這樣價格親民的通票的話，應該可以拉近年輕人與鐵路之間的距離了吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ひとつの地理大区の中の18駅のコンプから、\nスタンプラリーの景品ば出してあげるとよかと思うの」
1724 = "「對，完成一個地理大區裡１８個車站的打卡，就可以得到相應的獎品」" 

# 【西瓜】
# display as 西瓜
# JP: 「魅力的な景品を設定すれば、確かに、参加動機の\nさらなる後押しになりそうに、西瓜も思います」
1992 = "「西瓜覺得選定有吸引力的獎品的確能夠促進人們參加的意願」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1631 = "「啊！」" 

# monologue
# JP: 思い出したように、日々姫がスケッチブックを開く。
2632 = "日日姬似乎想到了什麼，攤開了素描簿翻看起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「北琴鉄道歴史館と、芭岩鉄道と。それぞれ売っとった\nお土産物ば、参考になるかも」
1679 = "「在北琴的鐵路博物館以及在芭岩鐵路出售的紀念品，興許能夠加以借鑑」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1610 = "「哦」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ。車販のワゴンで売られていたものまで――」
1505 = "「其實，車售的東西也同樣可以參考——」" 

# monologue
# JP: さすがは日々姫だ。
2636 = "日日姬果真是心細。" 

# monologue
# JP: そうしたものの内容をチェックしようと――\nそれさえ、僕には思いつけてもいなかった。
2608 = "換作是我的話，或許根本都不會去仔細研究都有些什麼吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……この芭岩鉄道の、昔のきっぷを模したメモ帳や、\n仲国国鉄マークのピンバッチなどが良い参考になるかと」
1149 = "「……芭岩鐵路這個仿造復古車票樣式的筆記本，還有這個仲國國鐵標誌的胸章，感覺都是不錯的樣本」" 

# 【ハチロク】
# display as 八六
# JP: 「この、マグネットシイルも良さそうに思います。\nこれの、東富4の姿のもの。わたくし、購入したいです」
2041 = "「這個冰箱貼我覺得也不錯。你看這個東富４模樣的，我就很想買」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ――一地理大区18駅の制覇に、ピンバッジや\nマグネットなど、ちょうど良さそうに西瓜は感じます」
1618 = "「啊——完成一個地理大區的１８個車站，就能得到胸章、冰箱貼這些獎品，西瓜覺得蠻合適的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「制覇した地理大区の数が増えれば、それぞれの景品に\nプラスし、さらなる記念品をつけるのも、セオリーだな」
2087 = "「隨著完成的地理大區數量增加，除各個大區原本的獎品外，額外再加一些其他的紀念品，這樣也很合理吧」" 

# 【志寰】
# display as 志寰
# JP: 「成程それなら、最初の地理大区を楽しんでくれた人は、\n別の地理大区の旅も、となりますね」
2047 = "「這樣的確很有道理。在完成一個地理大區之後，就還會有動力去其他的地理大區去旅行了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして108駅の全制覇では、偉業達成を称えるに足る、\n長く残るような品を――うむ？」
1906 = "「然後如果完成了全部一百零八站的話，就要有與這堪稱偉業的壯舉相稱，可以長期保存的紀念品——嗯？」" 

# monologue
# JP: 日々姫が、何故か考え込んでいる。
2630 = "日日姬不知為何陷於沉思一言不發。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫」
1746 = "「怎麼了，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん……レトロきっぷの柄のメモ帳――っていうか、\nレトロきっぷのデザイン、景品にするより……」
1646 = "「嗯……復古車票圖案的筆記本——或者說，復古車票這個設計，與其設計成獎品……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1626 = "「啊」" 

# monologue
# JP: 言われて気づく。
2718 = "聽她這麼一說我也意識到了。" 

# monologue
# JP: 確かにこれは、こころを鉄路に誘うようなデザインだ。\nならば旅の記念の品というより、旅のはじめに――
2672 = "的確，這是一個相當吸引人心向神往鐵路的設計。那與其做成旅行結束的紀念品，不如做成旅行開始時的……" 

# 【ハチロク】
# display as 八六
# JP: 「であれば、スタムプラリイのスタムプ帳。\nその裏面の絵柄に使えばよいのでは？」
1431 = "「不如做成打卡拉力的打卡簿背面的圖案如何？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　だな」
1651 = "「嗯！可以有」" 

# 【日々姫】
# display as 日日姬
# JP: 「そか！　やったら――可能だったら、\nきっぷそのものをレトロデザインにするのもいいかも！」
1722 = "「對哦！既然這樣——如果可能的話，通票本身也用復古設計或許也不錯！」" 

# 【姜】
# display as 姜
# JP: 「なるほど。あえて古さを感じさせることで、\n航空機の旅との差別化をより際立てることが出来ますか」
1540 = "「原來如此，通過強調復古的感覺，與乘坐飛機旅行的印象區分開來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1631 = "「啊！」" 

# monologue
# JP: 中立・静観を保ち続けていた姜さんまでもが、\nついに話に参加してくれた。
2657 = "此前一直保持中立旁觀態度的姜小姐，終於也開始發表她的意見了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。そうできるなら、スタンプラリーへの誘導に、\nさらに大きな効果を発揮できそうに思います」
1860 = "「是的。如果能夠實現的話，相信也會是吸引人們參加打卡拉力的一大助力」" 

# 【姜】
# display as 姜
# JP: 「……こうした類のキャンペーンは、\n日ノ本の鉄道が数多く経験していることなのですよね？」
1152 = "「……類似的活動，在日本國鐵路業界常有舉辦嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。僕はさほど詳しくありませんが、ポーレット\n――御一夜鉄道社長の雛衣は豊富な知見を有しています」
1862 = "「是的。我雖然對此不甚了解，但波萊特——也就是御一夜鐵路的社長雛衣小姐對此卻是經驗豐富」" 

# monologue
# JP: 列車がごとりと動き出す――\nあの感触を、体全部が、強く感じる。
2598 = "我突然有種列車的車輪開始轉動的感覺——無比強烈，浸徹肺腑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「北斗七星と南斗六星。\n北天南天を巡る二編成の豪華クルーズトレイン」
1527 = "「北斗七星與南斗六星，巡航北天際與南天際的兩列豪華長途旅行列車」" 

# 【日々姫】
# display as 日日姬
# JP: 「それと、フリーきっぷ――水滸伝108きっぷで\n各地方駅という星々を巡ってもらう、DISCOVER CHINA！」
2021 = "「輔以通票——用水滸傳１０８通票去遊歷象徵滿天繁星的各地車站，Ｄｉｓｃｏｖｅｒｙ　Ｃｈｉｎａ！」" 

# 【ハチロク】
# display as 八六
# JP: 「両者を本務機と後補機とし、春節・国慶節の連休での\nレジャアとしての鉄道利用を、老若両面から促す」
1498 = "「兩者相輔相成，從老少兩個方面促進人們在春節與國慶的長假期間乘坐鐵路出行」" 

# monologue
# JP: 頷き合う。\n僕も日々姫もハチロクも、同じ手応えを感じている。
2572 = "我、日日姬、八六相視點頭。看來我們三人都覺得此計可行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、現時点での仲国国鉄の鉄路復権のために考えた、\n僕たち、御一夜鉄道による提案の草稿となります」
2042 = "「這就是現階段我們御一夜鐵路，就仲國國鐵復興所提出的方案草案」" 

# 【志寰】
# display as 志寰
# JP: 「素晴らしいです！　双鉄先生たちの案には、\n実現の可能性だけでなく希望、発展性もあると感じます」
1697 = "「太棒了！雙鐵先生提出的方案，不只是頗為可行，而且還描繪出了希望與發展的可能性」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も志寰と同じ思いを感じています。その上で単純に\n西瓜も、北斗南斗に乗りたいし、108星を巡りたいです」
1985 = "「西瓜也有和志寰一樣的感覺。而且西瓜現在好想乘坐北斗與南斗列車，也想周遊一百零八星」" 

# 【志寰】
# display as 志寰
# JP: 「だね、西瓜！　そのときは」
1853 = "「是吧，西瓜！到了那時」" 

# 【姜】
# display as 姜
# JP: 「『現時点での』というお言葉からは」
1755 = "「您說“現階段”的話」" 

# 【志寰】
# display as 志寰＆西瓜
# JP: 「！？」\n「！」
1607 = "「哎！？」\\n「啊！」" 

# monologue
# JP: 志寰君の、西瓜の歓声が止められる。\n姜さんの静かな声には、それだけの力が込められている。
2546 = "志寰和西瓜的開心慶祝戛然而止。姜小姐平靜說出的話語，就是蘊含著如此強大的力量。" 

# 【姜】
# display as 姜
# JP: 「『将来的な仲国国鉄の復権』にむけ――他にもご提言を\nいただけそうかと、図々しくも感じてしまいますが」
1898 = "「為了“將來仲國國鐵的復興”——恕我冒昧相問，諸位想必也另有方案吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「提言、などという整ったものではありません。が――\n僕個人の、思いつき……夢想というか、願望でしたら」
1930 = "「目前還完全算不上是方案。不過是我個人的一個想法……或者說是願望、夢想吧」" 

# 【ハチロク】
# display as 八六
# JP: 「！！？」
1654 = "「嗯！！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！？」
2085 = "「阿哥！？」" 

# monologue
# JP: 求められていた仕事の範囲を――\n会議で皆で詰めた結果を、踏み越えている。
2789 = "這已經超出了我們被賦予的工作內容，超出了會議上大家商定的結果。" 

# 【姜】
# display as 姜
# JP: 「では、雑談として――他愛のない世間話、\n夢物語として、それをお聞かせはいただけませんか」
2066 = "「那您是否能當作是朋友間的閒談，與我們聊聊您的夢想呢」" 

# monologue
# JP: そうと理解をしていてもなお\n――言葉を、思いを止められない。
2415 = "哪怕知道這超出了我們的本分，我依然思如泉湧，想要一吐為快。" 

# monologue
# JP: なぜって、これは夢だから。\n終着駅の、その先へと伸びゆく可能性だから。
2419 = "因為這是夢想，因為這是到達終點站之後還能繼續延伸下去的可能性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「考えました。いえ、悉究しました――\n何故、この話が『僕ら』のところに来たのかを」
1792 = "「我想過了，不，應該說悉究過了——為什麼這件事會找上“我們”」" 

# monologue
# JP: ハチロクを見る。
2596 = "我看向八六。" 

# monologue
# JP: 日々姫を見る。
2380 = "再看向日日姬。" 

# monologue
# JP: ふたりとも、もう落ち着いた顔をして。\n静かに、強く、頷いてくれる。
2444 = "她們兩個也從驚訝中平復了下來，對著我靜靜地，深深地點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らであれば将来的に。6つの地理大区全ての拠点駅\n――仲国全土を6日間で周遊する列車をご提案できます」
1781 = "「我們想要提出的，是將來最終實現在六天裡周遊六個地理大區全部據點車站的列車方案」" 

# 【志寰】
# display as 志寰
# JP: 「6日間で周遊！？　それはとても」
1677 = "「在六天裡環遊！？這恐怕是——」" 

# monologue
# JP: 恐らく。無理、と――\n発しかけた言葉を飲み込み、志寰君は苦しげな顔をする。
2568 = "恐怕不可能吧——志寰嚥下了說到一半的話，臉上現出一絲苦笑。" 

# 【志寰】
# display as 志寰
# JP: 「……仮にできたとしても、朝から夜まで全部、\nまるまるずっと乗り続けるだけで、観光なんてとても」
1126 = "「……即便安排出這樣的行程，恐怕也要從早到晚一直搭車，根本稱不上是觀光吧」" 

# 【西瓜】
# display as 西瓜
# JP: 「志寰――」
1742 = "「志寰——」" 

# monologue
# JP: 言って、西瓜が目を閉じる。\nややあり開かれる瞳は今は――強い輝きに彩られている。
2769 = "說到這裡，西瓜閉上了眼睛。而當她再次微微睜開眼睛的時候，眼中綻放出了耀眼的光芒。" 

# 【西瓜】
# display as 西瓜
# JP: 「観光の時間を作ることも……演算上は――可能です。\n可能――だって、御一夜鉄道には\x%lクハ26;#00ffc040;クハ26%l;#;－000編成がある」
1902 = "「為觀光留出時間……在計算上是可能的。因為在御一夜鐵路已經有了\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;－０００編組」" 

# 【志寰】
# display as 志寰
# JP: 「あっ！！！」
1636 = "「啊！！！」" 

# monologue
# JP: 志寰君も、同じ理解にたどり着いたらしい。
2555 = "志寰的理解似乎也跟了上來。" 

# monologue
# JP: それを待っていたかのように、姜さんも、\nあらためて僕に問いかけてくる。
2702 = "而姜小姐似乎是在等待這個時機一般，向我們開口問道。" 

# 【姜】
# display as 姜
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;は、特急系試験\x%l電車;#00ffc040;電車%l;#;。その編成はナインスターズ\n計画のため完全復元された――で、間違いないですね？」
1083 = "「\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;是特快試驗\\x%l電車;#00ffc040;電車%l;#;，而其編組也為九星計劃而進行了完全復原——是這樣沒有錯吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうです。復元のためのデータは、復元実行の前段階で\n例外なしに公開することで関係者の合意を得ています」
1889 = "「沒錯。復原所用的數據，在進行復原前已經在獲得相關人士同意的前提下全部公開了」" 

# monologue
# JP: 帝鉄解体にともなって、権利者そのものが消滅している。\n赤井宮司とニイロクは、残されたデータを私有もできた。
2801 = "隨著帝國鐵路的解體，權利人主體隨之消失。赤井宮司與二六便將留存的數據納為私有。" 

# monologue
# JP: けれど宮司は、関係各位に連絡をとり、データの全てを、\n鉄道発展のそのために、公開することで合意したのだ。
2668 = "然而赤井宮司在與各相關人士聯絡後，一致做出了為鐵路發展而公開全部數據的決定。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;の走るレールは、狭軌、1067mmの軌間です。\n営業運転での最高速は、時速100kmにとどまりますが」
1081 = "「\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;是在窄軌，１０６７毫米的軌距上行駛的。而且商業運營的最高時速也最終確定在了每小時１００公里」" 

# 【ハチロク】
# display as 八六
# JP: 「設計最高速度は時速160km。これは、\n復元後の試験運転でも、余裕をもって達成されました」
1477 = "「但設計最高時速高達每小時１６０公里，這一時速，也在復原後的試運營中輕鬆達到了」" 

# 【志寰】
# display as 志寰
# JP: 「狭軌で時速160km！？　なら、西瓜――\nさっき、『演算上は可能』だといっていたのは……」
1689 = "「在窄軌上達到時速１６０公里！？那西瓜你剛才說的“在計算上是可能的”，莫非是指……」" 

# 【西瓜】
# display as 西瓜
# JP: 「うん。志寰。時速200km以上での営業運転も可能。\n\x%lクハ26;#00ffc040;クハ26%l;#;と東富4Dの、技術とノウハウを組み合わせれば」
1891 = "「沒錯，志寰，時速２００公里以上的商業運營是可能實現的。只要將\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;和東富４Ｄ的技術與經驗加以結合」" 

# 【双鉄】
# display as 雙鐵
# JP: 「我々には\x%l電車;#00ffc040;電車%l;#;特急\x%lクハ26;#00ffc040;クハ26%l;#;があり。仲国国鉄には東富4Dと\n標準軌、1435mm軌での列車運用の豊富な蓄積があります」
1782 = "「我們有特快\\x%l電車;#00ffc040;電車%l;#;的\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;，仲國國鐵有應用東富４Ｄ，以及標準軌１４３５毫米軌距列車的豐富經驗」" 

# 【志寰】
# display as 志寰
# JP: 「つまり――双鉄先生は――」
2072 = "「那雙鐵先生的意思便是——」" 

# monologue
# JP: 志寰君が、僕をみつめる。\nごくり、その喉が大きく動く。
2558 = "志寰緊盯著我，咽了一大口口水。" 

# 【志寰】
# display as 志寰
# JP: 「標準軌完全電化による超高速鉄道を、\n仲国に走らせるよう――おっしゃっているのですか？」
2012 = "「讓全線電力化的超高速鐵路列車，在仲國的標準軌上馳騁嗎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「新・幹線鉄道。志寰」
1833 = "「新·幹線鐵路，志寰」" 

# 【志寰】
# display as 志寰
# JP: 「え？」
# 1609 = "「哎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「新・幹線鉄道。日ノ本ではその名前で、\n同じ列車が、すでに研究され検討されている」
1832 = "「新·幹線鐵路。日本國已經在進行著那樣的列車的探討與研究了，名字就叫新·幹線鐵路」" 

# monologue
# JP: 実に良く調べてくれている。\nそのこと自体は、素直に嬉しい。けれども、今は――
2449 = "她調查得還真是詳盡。這件事本身其實也頗讓我為之自豪，但現在重點不在那裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今の段階では名称は好きでよかろう。新・幹線でも、\n超高速鉄道でも。大切なのは、それで何を為せるかだ」
1916 = "「現在這個階段，名稱其實並不是很重要，不管是新·幹線也好，超高速鐵路也好。關鍵在於它能夠實現什麼」" 

# 【志寰】
# display as 志寰
# JP: 「為せることは……数多くあるように思います」
1959 = "「能夠實現的……我覺得實在是太多了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同様に感じている。が――まずは、将来的な提言。\n先程の“夢物語”を現実化する、ただ一点に絞り込もう」
1772 = "「我也這樣認為，但首先必須提出一個前瞻性的方案。把目光鎖定在如何將方才的“夢想”變為現實」" 

# 【志寰】
# display as 志寰
# JP: 「あ！！！」
# 1636 = "「啊！！！」" 

# monologue
# JP: 志寰君の中でも、全てのポイントが切り替わったようだ。\nたった一つの、たった七文字の解へと向けて。
2554 = "志寰的思路也隨之發生了天翻地覆的變化。只因這短短一句話，七個字的答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――寝台夜行新幹線」
1090 = "「——臥鋪夜間新幹線」" 

# 【志寰】
# display as 志寰
# JP: 「寝台。夜行。――新幹線」
1961 = "「臥鋪，夜間，新幹線」" 

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本では新・幹線――標準軌の専用線を敷かねば\nいけんばってん、仲国は最初から標準軌やけん」
1686 = "「在日本國，新·幹線必須要鋪設專用的標準軌，但仲國打一開始就是標準軌了」" 

# 【ハチロク】
# display as 八六
# JP: 「関連設備にかかる投資は、日ノ本よりもずっと――\n遥かに小さくて済むことでしょう」
1688 = "「在相關設備方面的投資，會遠比日本國少得多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、実現化へのハードルは低い。そして――\n新・幹線――超高速鉄道こそは、真なる鉄道復権を」
1811 = "「所以，實施的難度自然更低。而新·幹線——超高速鐵路，才能真正實現鐵路復興」" 

# monologue
# JP: 志寰君が頷く。\n晴れ晴れとした顔をして。瞳をまっすぐ、僕に向け。
2560 = "志寰點頭認同。他的臉上容光煥發，眼睛筆直地看向我。" 

# 【志寰】
# display as 志寰
# JP: 「富裕層にも、若者たちにも違いなく愛され、実用される\n――全く新しい鉄道になりますね。超高速鉄道は」
2019 = "「超高速鐵路一定會成為無論貧富無論年齡，大家都喜愛而實用的全新鐵路形式」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうと。僕も夢見ている。そして、その夢は、\n日仲両国の技術協力が為れば、きっと叶うと」
1795 = "「我的夢想正是如此。而這個夢想，在日仲兩國的技術合作之下，一定能夠實現」" 

# 【西瓜】
# display as 西瓜
# JP: 「東富が……」
1879 = "「東富會……」" 

# monologue
# JP: 西瓜が、志寰君を見上げる。\n甘えるように、けれども深く、いたわるように。
2757 = "西瓜抬頭看向志寰，眼神中帶著一絲撒嬌的感覺，但更多的是深深的體貼。" 

# 【西瓜】
# display as 西瓜
# JP: 「仲国国鉄が――老師や、志寰や、西瓜たち――\nみんなが生み出し、守って育てた、西瓜たちの機関車が」
1473 = "「仲國國鐵——老師和志寰，還有西瓜以及無數同志們——由大家創造、守護、培養起來的這型機車——」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、西瓜。東富はきっと、新しい鉄路を築く、\nその大きな大きな礎のひとつとなりましょう」
1869 = "「是的，西瓜。東富一定會成為構築嶄新鐵路的堅固基石」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ！」
1650 = "「嗯！」" 

# monologue
# JP: 西瓜が動く。\n志寰君へと抱きついて、その制服に顔を埋める。
2753 = "西瓜一頭撲進了志寰的懷裡。" 

# 【姜】
# display as 姜
# JP: 「……東富は東風となり、北斗と南斗の全天を巡り、\n遥か日ノ本にまで、夜明けを――新時代を運んでいく」
1144 = "「……東富會化作東風，吹遍北斗與南斗的整個周天，遠達日本國，帶來黎明——帶來新時代的氣息」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1631 = "「啊！」" 

# 【姜】
# display as 姜
# JP: 「双鉄先生！！！」
2091 = "「雙鐵先生！！！」" 

# monologue
# JP: 姜さんが、がばりと僕の手を掴む。\n小さな両手で、僕の両手を抱えるように包み込む。
2480 = "姜小姐猛地握住了我的手，她嬌小的雙手緊緊地包住了我的雙手。" 

# 【姜】
# display as 姜
# JP: 「謝謝。双鉄先生。\n私は、これを求めていました」
2011 = "「謝謝，雙鐵先生。這就是我真正需要的」" 

# monologue
# JP: 当方ではなく“私”と言って、\n姜さんは何度も力強く、僕の両手ごとその手を揺する。
2491 = "姜小姐說的並不是“我方”，而是“我”。她一邊說一邊反覆搖晃彼此緊握的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これ、とは」
1753 = "「您是說……」" 

# 【姜】
# display as 姜
# JP: 「双鉄先生の伸ばすレールは、歌い、物語るレールです。\n私は仲国の鉄路の上にも、それを紡いで欲しかった」
2089 = "「雙鐵先生所鋪下的鐵軌，織就歌謠，化作傳奇。我也想在仲國的鐵路上，織就同樣的輝煌」" 

# 【ハチロク】
# display as 八六＆日日姬
# JP: 「ああ」\n「ああ！」
1627 = "「啊」\\n「啊！」" 

# monologue
# JP: 異口同音に、深い納得の声が聞こえる。\n歌う、など……意識したこともなかったが。
2369 = "八六與日日姬異口同聲地表示贊同。歌謠……我自己都從來沒有想過。" 

# 【姜】
# display as 姜
# JP: 「双鉄先生の伸ばす、レールという物語の上を、\n日々姫先生の挿絵――デザインされた列車が走り、彩る」
2090 = "「雙鐵先生鋪下傳奇的鐵軌，而日日姬女士的插畫——她所設計的列車馳騁其上，迸發光芒」" 

# monologue
# JP: 姜さんの言葉自体が、まるで、詩だ。
2485 = "姜小姐的話，簡直如同詩詞一般。" 

# 【姜】
# display as 姜
# JP: 「それこそが――ナインスターズを成功に導いた力だと、\n私は認識していました」
1801 = "「我認為這就是引導九星成功的力量」" 

# monologue
# JP: 絶賛されている。\nとても嬉しい。
2518 = "得到如此無上評價，我心中倍感欣喜。" 

# monologue
# JP: が、だからこそ――\n評価は正しく行われるべきとも、強く感じる。
2328 = "但正因如此，我越來越深感必須加以澄清。" 

# 【双鉄】
# display as 雙鐵
# JP: 「光栄です。が――ナインスターズを成功に導いたのは、\n決して僕の――僕と日々姫の力などではありません」
1820 = "「承蒙賞識無上光榮。但引導九星成功的，絕不只是我和日日姬的力量」" 

# 【日々姫】
# display as 日日姬
# JP: 「ですです！　にぃにはともかく、\n私のしたことなんて、本当にほんのちょっぴりで」
1580 = "「可不可不！阿哥當然稱得上啦，但我真就只是出了點綿薄之力而已」" 

# 【姜】
# display as 姜
# JP: 「その”ちょっぴり”が、大樹の種であり、\nはじめの水の一滴なのです。双鉄先生、日々姫先生」
2055 = "「那“綿薄之力”，便是參天大樹最初的幼苗，以及終將燎原的星星之火，雙鐵先生，日日姬女士」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――はい。\nまことに、左様でございますね」
1621 = "「啊——沒錯，您說的簡直太對了」" 

# monologue
# JP: 幸せそうに、満足そうに、ハチロクは微笑してくれる。
2375 = "八六面帶微笑，洋溢著幸福與滿足。" 

# monologue
# JP: 自分のマスターが、自分の家族が正しく評価され嬉しいと、\n笑顔が、雄弁に物語ってくれている。
2722 = "自己的司機，自己的家人得到了公正的評價——這笑容比世間任何言語都更有說服力。" 

# 【姜】
# display as 姜
# JP: 「よい物語は、理解しやすい。伸びゆく大樹の下には\n数多の叡智が集まる。――ゆえに、私はそれを求めた」
1963 = "「至美故事一定是童叟皆宜，參天大樹下必有睿智齊聚。所以我才會對此不住追求」" 

# monologue
# JP: 姜さんの手がほどかれて、\n今度は日々姫の両手をしっかり、包み込む。
2487 = "姜小姐終於鬆開了我的雙手，轉而握住了日日姬的雙手。" 

# 【姜】
# display as 姜
# JP: 「物語に気づいてもらい、読んでもらうための絵を。\nですので日々姫先生に、仲国でも描いていただきたい」
1904 = "「為讓人能留意到這故事，能夠潛心閱讀，希望日日姬女士能夠揮筆繪下仲國的光明未來」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは――もちろん。正式に発注していただけるなら。\nもちろん引き受けたいですし、引き受けられたら全力で」
2038 = "「這……當然，要是能拿到正式委託，我一定會全力以赴的」" 

# 【姜】
# display as 姜
# JP: 「まずは北斗と南斗の十三星。ついで水滸伝の百八星。\nそうして全天に、日ノ本に、超高速列車を走らせるには」
2111 = "「首先是北斗和南斗的十三星，然後是水滸傳一百零八星。而後是超高速列車駛遍整個周天，乃至日本國」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道だけでは足りない。日ノ本仲国、二つの国の、\nより多くの知恵と技術の集積が必須となるでしょう」
1484 = "「僅憑御一夜鐵路必然是不夠的，這需要將日本國與仲國兩個國家的眾多智慧與技術匯聚於一處才能實現」" 

# 【姜】
# display as 姜
# JP: 「ならば私は出世しましょう。全ての星々を掲げるために、\n東風を日ノ本へと届かせるために発言力を育てましょう」
1901 = "「為能點亮那滿天繁星，為讓東風遠渡日本國，我一定會努力掌握更多的資源，擴大自己的影響力」" 

# monologue
# JP: 再び、姜さんが僕へとその手を差し出してくる。
2474 = "姜小姐再一次向我伸出了手。" 

# monologue
# JP: 無理やり包み込むことはなく、\n右手をまっすぐ――握手を求め、差し出してくる。
2322 = "但並不是不由分說地抓住，而是伸出右手，等待著我的回應。" 

# 【姜】
# display as 姜
# JP: 「ですので、双鉄先生もご出世ください。\n日ノ本の鉄道界を、お束ねください」
1803 = "「所以也請雙鐵先生多加努力，有朝一日統率日本國鐵路界」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！？　僕にはとてもそのような才覚は。先ほども\nお話ししたように、ただ、周囲の協力に恵まれただけで」
1604 = "「哎！！？您實在是過譽了。我也說過，我這所謂的才能不過承蒙身邊人的恩惠而已」" 

# 【姜】
# display as 姜
# JP: 「恵まれたものを使わず死蔵することは、\n恵みを誰にも還元せず、独り占めするのと同じことです」
1731 = "「得才不用，如令明珠蒙塵，實乃君子所不為」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1654 = "「嗯！！？」" 

# monologue
# JP: 姜さんの視線が、言葉が、突き刺さる。
2483 = "姜小姐的眼神和話語，直刺我的心底。" 

# 【姜】
# display as 姜
# JP: 「恵まれたのならば、それを存分に活かすことです。\n活かせばそのまま、恵みは社会全体へと行き渡ります」
1734 = "「得才而用，得才善用，則終將惠及天下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1616 = "「啊——」" 

# monologue
# JP: そのお手本なら、赤井宮司が、淵さんが――\nポーレットが、真闇姉が、稀咲が、元忠さんが――
2778 = "赤井宮司、淵先生、波萊特、真闇姐、稀咲，元忠先生——他們不就都是榜樣嗎？" 

# monologue
# JP: いや、凪もふかみもハチロクもれいなも日々姫も……\n縁を頂いた全てのひとが、僕に示してくれている。
2772 = "豈止是他們，凪也好深美也好，還有八六、玲奈和日日姬……我身邊的每個人，都早已為我指明了道路。" 

# 【姜】
# display as 姜
# JP: 「ですから恵みを、より広く遠くへと還元できるよう。\n双鉄先生――どうぞ、お立場を整えてください」
1812 = "「所以，為讓恩惠廣澤，雙鐵先生，還請務必向更高層邁進」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、今まで与えてもらった全てのものを……\nより広くへと、行き渡らせるため――」
1899 = "「為了能將我所接受到的恩惠傳播得更廣——」" 

# 【姜】
# display as 姜
# JP: 「絵と物語を、現実の物と為す。日ノ本では雛衣、稀咲\n真闇女士たちが果たしたことを、仲国では、きっと私が」
1800 = "「我要將畫作與傳奇化為現實。在日本國經雛衣、稀咲以及真闇女士等實現的，我也一定會在仲國再現」" 

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も、そのための力になります。北斗と南斗に。\nそして超高速鉄道に。西瓜は、志寰と乗りたく思います」
1987 = "「西瓜也要為此而盡自己的綿薄之力。北斗、南斗，還有超高速鐵路，西瓜都想和志寰一同乘坐」" 

# 【志寰】
# display as 志寰
# JP: 「うん。乗ろう。西瓜、必ずふたりで一緒に。\nそのために、僕もできることを全部果たすよ」
1656 = "「嗯，一起去坐吧。西瓜，我們兩個一定可以。為此，我定會竭盡全力」" 

# 【西瓜】
# display as 西瓜
# JP: 「志寰……」
1744 = "「志寰……」" 

# 【志寰】
# display as 志寰
# JP: 「西瓜……」
1973 = "「西瓜……」" 

# monologue
# JP: 志寰君と西瓜の手と手が、恋人繋ぎに結ばれる。
2542 = "志寰和西瓜十指相扣，就如戀人一般。" 

# monologue
# JP: それはなにか、尊いものに――\nとても尊い啓示のように、僕には思える。
2792 = "這純真的感情，在我看來是如此珍貴——同時也給予了我嶄新的啟示。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、本当に恵まれているのだということを。\n今、ようやく理解させて頂いたように感じます」
1141 = "「……我現在終於明白，我究竟是承蒙了何等的恩惠」" 

# monologue
# JP: 姜さんが伸ばし続けてくれていた、\n右手と強く、握手する。
2579 = "我伸出右手，握住了等待了許久的，姜小姐的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「立場を得ることが、その恵みを広くに還す役にたつなら。\n僕はきっと――立場を得ましょう」
1814 = "「手握名聲地位若是為令惠澤廣播，那我一定努力爭取」" 

# 【姜】
# display as 姜
# JP: 「双鉄先生」
2088 = "「雙鐵先生」" 

# 【日々姫】
# display as 日日姬
# JP: 「ね！　姜さん！　ね？　にぃに」
1480 = "「來吧！姜小姐！來吧？阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ！」
1663 = "「嗯？啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、素敵なことですね」
1671 = "「嘻嘻，這還真是個好想法」" 

# monologue
# JP: 姜さんと手を繋ぎなおして、僕の左手を日々姫に預ける。\n日々姫はハチロクと手を繋ぎ、ハチロクは西瓜と手を繋ぐ。
2476 = "姜小姐換了隻手，我則把左手遞給日日姬。而後日日姬牽起八六，八六拉住了西瓜。" 

# 【志寰】
# display as 志寰
# JP: 「なるほど！　これは本当に素敵だ」
1539 = "「原來如此，這的確是個好想法」" 

# monologue
# JP: そして西瓜と手を繋いだままの志寰君が、\n姜さんの手を受け取れば――
2707 = "而志寰一邊牽著西瓜的手，另一邊握住了姜小姐的手後——" 

# 【西瓜】
# display as 西瓜
# JP: 「環状線ですね。とても小さな。\nけれど、日ノ本と仲国を繋ぐ、環状線」
2046 = "「這是環線呀，一個小小的環線。但這環線，聯繫起了日本國與仲國」" 

# monologue
# JP: 僕らがつないだ手の中を、おんなじ熱が走っている。\nおなじのぞみが、列車となって駆け巡っている。
2582 = "我們互相緊握的手中，一股暖流在不住奔騰。而我們共同的願望，亦如列車般疾馳著。" 

# monologue
# JP: その実感は、僕のこころを強くする。\nきっと叶うと――叶えてみせると――思えるほどに。
2790 = "這樣的感覺讓我信心百倍。一定能實現，一定要實現——這樣的想法隨之湧上心頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「新・幹線鉄道を、あるいは超高速鉄道を。\nきっと、ここにある小さな種から、始めの水の[ひとしずく,1]一滴から」
1834 = "「新·幹線鐵路，或者說超高速鐵路，一定會從這小小的幼苗，從這星星之火開始」" 

# 【姜】
# display as 姜
# JP: 「必ず実らせ、茂らせましょう。その根で、枝葉で、\n仲国と日ノ本とを、それぞれの全土を巡らせましょう」
1965 = "「茁壯成長，其根系枝葉，必將遍布仲日兩國」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、どうぞ、鬨の声を」
2098 = "「雙鐵少爺，來帶個頭吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1649 = "「嗯」" 

# monologue
# JP: 頷いてくれる。みなが笑顔で。\nならば今は、僕が音頭を取らせてもらおう。
2442 = "大家都笑著向我點頭。那我也自然不應再推辭了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「きっと、繋ごう。新しいレールを！　ふたつの国を！\n――[えい]曳！　[えい]叡！」
1708 = "「定將鋪就嶄新鐵軌，將兩國相連於一處！Ｙｅａｈ！Ｙｅａｈ！」" 

# 【双鉄】
# display as 全員
# JP: 「王ー！」「王！」「おー！」\n「応！」「オー！」「オー！！」
1612 = "「哦！」「哦！」「噢！」\\n「哦！」「噢！」「噢！！」" 

# monologue
# JP: 声があわさる、こころが重なる。
2717 = "聲聚於一處，心重於一點。" 

# monologue
# JP: そうして、手と手は、再び交わるそのときのため――\nいまは静かに、ほどかれる。
2711 = "而現在平靜的放手，也是為將來能再次執手相牽於一處。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、日々姫先生。\n姜秘書とのご歓談中、大変恐縮なのですけれど」
2092 = "「雙鐵先生，日日姬女士。非常抱歉打擾二位與姜老師暢談……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1616 = "「啊——」" 

# monologue
# JP: できうる限り、細かい点を詰めておきたい。\n望んでしまえば時間など、いくらあっても足りなくなる。
2570 = "想著要儘量落實一些細節，結果一談起來真是再多時間都不夠。" 

# 【西瓜】
# display as 西瓜
# JP: 「出国手続きにかかってしまう時間などを考えると、\nそろそろ」
1953 = "「考慮到出境手續還要花費一些時間，差不多該動身了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1649 = "「嗯」" 

# 【姜】
# display as 姜
# JP: 「……しつこくなってしまうのはわかっていますが、\n滞在のご延長などは」
1136 = "「……恕我贅言，日程真的不能延長了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういっていただけ光栄です。\nですが、今はひとまず、日ノ本へ帰ります」
1816 = "「承蒙厚愛不勝榮幸，但現在我們真的得回日本國了」" 

# 【日々姫】
# display as 日日姬
# JP: 「これ以上素敵なものみたら、もっともっとって欲張って、\n一枚の絵に、きっとまとめきれなくなっちゃいますけん」
1998 = "「要是再這樣看下去，那恐怕看得越多想得越多，一張怕是都要畫不下咧」" 

# 【姜】
# display as 姜
# JP: 「かしこまりました。では、ひとまずは」
1700 = "「好的，那也就不再多做挽留了」" 

# monologue
# JP: 握手する。
2583 = "我們相互握手。" 

# monologue
# JP: 姜さんと、志寰君と、西瓜と。\n今度はとても短い握手を。
2494 = "姜小姐，志寰，西瓜。這次只是短暫的握手。" 

# 【志寰】
# display as 志寰
# JP: 「先生たちのできるだけ早いご再訪を、\n楽しみにお待ちいたします」
1780 = "「我們就靜待雙鐵先生一行再次來訪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。志寰君たちも、\nいつでも御一夜に遊びに来てくれ。全力で歓迎しよう」
1694 = "「多謝。志寰什麼時候再來御一夜玩，我們一定熱烈歡迎」" 

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます！　右田先生！！\n西瓜は、今度は、志寰とふたりっきりで行きたいです」
2103 = "「非常感謝，右田先生！下次西瓜要和志寰兩個人單獨去」" 

# 【志寰】
# display as 志寰
# JP: 「だね。僕もだ、西瓜」
1725 = "「對，我也是這麼想的，西瓜」" 

# monologue
# JP: 姜さんが、くすりと小さな笑いを零す。
2272 = "一旁的姜小姐不禁輕笑起來。" 

# 【姜】
# display as 姜
# JP: 「そういうことなら喜んで。\n私と老師は、仲間はずれにならせてもらいましょう」
1845 = "「既然如此，我和老師也樂得不做電燈泡咯」" 

# 【西瓜】
# display as 西瓜
# JP: 「あっ！？　姜秘書！？　そういう意味ではなくて」
1638 = "「啊！？姜老師！？不是那個意思啦」" 

# 【姜】
# display as 姜
# JP: 「ふふふっ、どういう意味かは、わかっています。\n志寰君。西瓜。おめでとう」
1669 = "「嘻嘻，你什麼意思我還能不知道嗎。恭喜你們，志寰，西瓜」" 

# 【西瓜】
# display as 西瓜
# JP: 「はうっっ！！！」
1598 = "「哈嗚！！！」" 

# 【志寰】
# display as 志寰
# JP: 「ありがとうございます。大事にします。\n必ず、世界一幸せにします」
2104 = "「非常感謝，銘記於心。我們一定會成為世上最幸福的一對的」" 

# 【日々姫】
# display as 日日姬
# JP: 「わあっ！　よかったぁ、おめでとう、ふたりとも」
1586 = "「哇！太好咧，恭喜你們倆呀」" 

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます！」
2102 = "「非常感謝！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふふふっ、旅の素敵な想い出をもう一つ。\nこちらこそ、ありがとうございます」
1665 = "「嘻嘻嘻，這次旅程又多了一件美妙的回憶。我才應該對你們道謝呢」" 

# monologue
# JP: “余計なこと”を、姜さんが鮮やかに引き受けてくれた。
2481 = "姜小姐的“多說”，此刻已不再是“多錯”。" 

# monologue
# JP: 薄々は、志寰君と西瓜の恋が成就したろうと思っていたが、\nこうした形で確認できて、スッキリとした――っと。
2803 = "雖然我們已經隱隱感覺到志寰和西瓜的戀情已經開花結果，但能以這樣的形式加以確認，也算放下了心頭一個擔子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「名残はつきぬが、日々姫、ハチロク」
1757 = "「惜別千里終有時，日日姬，八六」" 

# 【志寰】
# display as 志寰
# JP: 「あ！　記念に！！！　今回の旅の、視察の記念に、\nどうか一枚、集合写真を」
1632 = "「啊！紀念照！來為這次旅途，這次考察，拍一張集體紀念照吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うふふっ！　よかとねー！　ね。にぃに、\nそのくらいの時間だったら、大丈夫よね？」
1667 = "「嘻嘻！好唄！阿哥，這點兒時間總還有的吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、問題なかろう」
1640 = "「啊，應該沒問題吧」" 

# 【志寰】
# display as 志寰
# JP: 「でしたらぜひ。あ！」
2073 = "「那麻煩了，啊！」" 

# monologue
# JP: 通りすがった人に向け、\n志寰君が声をかけ、カメラを預ける。
2549 = "志寰找了一位路過的人，把相機交了過去。" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、レトロなカメラ。\n一周して、すっごくおしゃれでかっこいい」
1592 = "「哇，好復古的相機。時尚是個輪迴，這復古反而顯得時尚而帥氣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1856 = "「是啊」" 

# monologue
# JP: というか、似たものを見たことがある。
2768 = "話說回來，我好像見過類似的相機。" 

# monologue
# JP: あれは確か、\nポーレットのご父君のコレクションにあった――
2571 = "應該是在波萊特父親的藏品中見到的。" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、日々姫女士、ハチロク。\nもしよかったら、これを持っていただけませんか？」
2094 = "「雙鐵先生，日日姬女士，八六，能不能請你們拍照時拿著這個呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　これは、北琴空港での歓迎ボオド」
1590 = "「哇！這是北琴機場那塊歡迎板」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここまでわざわざ持ってきてくれていたのか。\nうん。喜んで掲げさせてもらおう」
1938 = "「竟然還特地帶到這裡來了啊。嗯，當然可以，非常樂意」" 

# monologue
# JP: 8620を模したボードに、\n『歓迎！　御一夜鉄道御一行』の文字。
2432 = "在８６２０形狀的板上，寫著“歡迎御一夜鐵路”。" 

# monologue
# JP: 目にしたときに感じた安心と大きな喜びを、\n昨日のことのようにも、遠い昔のこととも感じる。
2690 = "第一眼見到時的安心感與喜悅，彷彿近在昨天，又似乎遠如隔世。" 

# 【志寰】
# display as 志寰
# JP: 「カメラ、引き受けてもらえました」
1614 = "「商量好請人幫我們拍照了」" 

# 【西瓜】
# display as 西瓜
# JP: 「並んでください並んでください。\n先生たちが真ん中で――」
1481 = "「來，大家排排站好啦。雙鐵先生你們站中間吧」" 

# 【姜】
# display as 姜
# JP: 「西瓜と志寰君も、ふたり並んで」
1991 = "「西瓜和志寰你們站一起吧」" 

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はい、もちろんそうします」\n「はうっ」
1703 = "「好的，那是當然」\\n「哇」" 

# monologue
# JP: 自然と立ち位置が定まれば、カメラを手にした中年女性は、\n人の良さそうな笑顔を浮かべ――
2440 = "大家自然而然地找好位置站下，手持相機的中年女性也露出了和善的笑容——" 

# monologue
# JP: "Say　Cheese"と、明るく大きな声を出す。
2412 = "同時大聲朝我們說“說茄子”。" 

# 【ハチロク】
# display as 八六
# JP: 「ち、チイズ」
1966 = "「茄、茄子」" 

# monologue
# JP: （バシャ！）
2821 = "（喀嚓！）" 

# 【志寰】
# display as 志寰
# JP: 「謝謝、謝謝」
2010 = "「謝謝，謝謝」" 

# monologue
# JP: 志寰君がカメラを受け取り――\nおお、やはり、か。
2551 = "志寰拿回了相機——哦，果然啊。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま！？　あれは――\nカメラが、写真を吐き出しておりますが」
2097 = "「雙鐵少爺！？這是——相機竟然直接吐出了照片」" 

# 【日々姫】
# display as 日日姬
# JP: 「わぁ！　本物のポラ写真！\nわたし、実物見るのば、はじめてと」
1588 = "「哇！真的是拍立得！我還是第一次看到實物」" 

# 【ハチロク】
# display as 八六
# JP: 「ポラ写真、でございますか？」
2044 = "「這是叫……拍立得嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、ポーラーランド社の即席写真の総称だ。\n取ったフィルムがすぐプリントとして吐き出され――」
1662 = "「嗯，那是寶麗來公司的即時成像相機的統稱。拍好的照片會馬上就可以取出成像」" 

# monologue
# JP: 僕の言葉が現実となり、\nハチロクは目を丸くする。
2676 = "看著照片真的如我所說一般，八六的眼睛瞪得老大。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、まぁまぁまぁ！　画像が浮き出て参りました！\nまるで、魔法のようですね」
1594 = "「哇，真是不得了！畫面躍然於紙面上！簡直像魔法一樣」" 

# 【志寰】
# display as 志寰
# JP: 「双鉄先生、日々姫先生、レイルロオド・ハチロク。\nよければ記念に、写真へ一筆いただけませんか？」
2093 = "「雙鐵先生，日日姬女士還有鐵路人偶八六，若不介意的話，請在這照片上簽字留念吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。良い記念になるな、喜んで」
1658 = "「嗯，是個不錯的紀念，非常樂意」" 

# 【日々姫】
# display as 日日姬
# JP: 「サインでよかと？\nえへへ、なんだか照れくさかとねー」
1940 = "「簽名就行了吧？嘻嘻，怪不好意思的」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――その……恐縮ですが、\n記念ということですので、僭越ながら、署名など」
2068 = "「那我……既然是作為紀念，那我也冒昧地署個名吧」" 

# monologue
# JP: 日々姫はいつもデザイン画に入れている、達者なサインを。\nハチロクは、小さく几帳面な字で、ハチロクと書き入れる。
2641 = "日日姬的簽名還是一如既往，附上了簡筆畫，繪畫水平盡顯。而八六則是寫下了小小而工整的“八六”字樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕は！」
1514 = "「到我了，那就……」" 

# monologue
# JP: 今の思いを、ただただ素直に書き表わそう！
2588 = "我把我如今的想法，直接地寫了下來。" 

# 【志寰】
# display as 志寰
# JP: 「おお！」
1611 = "「哦！」" 

# 【西瓜】
# display as 西瓜
# JP: 「わぁ！」
1584 = "「哇！」" 

# 【姜】
# display as 姜
# JP: 「ああ――すばらしいご一筆です」
1624 = "「啊——這可真是相當不錯」" 

# monologue
# JP: 満面の笑顔の志寰君に写真を返す。
2591 = "我把照片遞還給了滿面笑容的志寰。" 

# monologue
# JP: もう一度全員と握手して――\n出国ゲートへ、ハチロクと日々姫と踏み出していく。
2585 = "我再一次和大家逐一握手——而後和八六、日日姬踏進了出境的閘門。" 

# 【双鉄】
# display as ３人
# JP: 「謝謝！　再見！！」
2009 = "「謝謝！再見！！」" 

# monologue
# JP: 写真に残したメッセージを。\n明るい声で、大きな声で――
2581 = "我們一起大聲說出了我寫在照片上的話。" 

# monologue
# JP: 「さようなら、また会いましょう」\n――気持ちと共に、置き土産にして。
1506 = "「再見，後會有期」——我就將這真切的期待，與照片一同留在了這片土地上。" 
