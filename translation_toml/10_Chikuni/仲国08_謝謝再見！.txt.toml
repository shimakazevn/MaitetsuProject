[script]
# lines: 457 
# 【日々姫】
# display as 日日姬
# JP: 「つ……疲れた……」
1625 = "「Mệt…… mệt quá đi mất……」"

# monologue
# JP: 力ない声でつぶやいて、日々姫がくったり倒れ込む。
2628 = "Lẩm bẩm bằng giọng yếu ớt, Hibiki ngã vật\nra."

# monologue
# JP: 『お姫様のベッド』と喜んでいた寝台の上に、\n焼きすぎた餅のごとくに体全部をべたりと崩す。
2426 = "「Ừm——quả nhiên nếu cắt xén thời gian ngủ,\nthì sự mệt mỏi của chuyến đi cũng sẽ kéo\ntheo và bộc lộ ra ngoài nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――さすがに睡眠時間を削ると、\n旅疲れまでもが引きずられて、表に出てきてしまうな」
1644 = "「Đúng vậy á~, rõ ràng là vẫn làm những\nviệc giống hệt mọi khi,\nmà không ngờ lại mệt mỏi đến thế này cơ\nchứ~」"

# 【日々姫】
# display as 日日姬
# JP: 「ね～、いっつもとおんなじことばしてるのに、\nこぎゃんこたえるとは思わんかったと～」
1855 = "「Xin lỗi nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん」
1824 = "「Nhưng mà!」"

# 【日々姫】
# display as 日日姬
# JP: 「ばってん！」
1433 = "「Nhưng mà!」"

# monologue
# JP: 下げかけた僕の頭を、声で止めようとするかのように、\n日々姫は慌てた――けれど明るい声をだす。
2595 = "Như thể muốn dùng giọng nói để ngăn tôi\ncúi đầu,\nHibiki vội vã——nhưng lại cất giọng vui vẻ."

# 【日々姫】
# display as 日日姬
# JP: 「その分、めーっちゃ楽しかったと！　見てきた全部！\n新しいもの！　一枚の絵に、なんとかだけどまとまって」
1538 = "「Bù lại thì cực~ kỳ vui luôn á! Tất cả\nnhững gì đã thấy!\nNhững điều mới mẻ! Dù hơi vất vả nhưng em\nđã gom gọn được vào một bức tranh rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……なら、なによりだ」
1151 = "「……Vậy thì tốt quá rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ね？　にぃに。\n姜さんに送る前に、最終確認、頼んでよかと？」
1806 = "「Cho nên, anh hai nè.\nTrước khi gửi cho chị Jiang, anh kiểm tra\nlại lần cuối giúp em được không?」"

# monologue
# JP: 日々姫の手が、のったりぐったり伸びてくる。
2647 = "Bàn tay của Hibiki chậm chạp, uể oải vươn\nra."

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだとも」
1479 = "「Tất nhiên rồi.」"

# monologue
# JP: その手からタブレットを受け取って、\n手の甲をぽんとたたけば、日々姫はそのままシーツに沈む。
2593 = "Nhận lấy máy tính bảng từ tay em ấy,\ntôi vỗ nhẹ lên mu bàn tay, và Hibiki cứ\nthế chìm vào tấm ga trải giường."

# 【日々姫】
# display as 日日姬
# JP: 「ほんなら、よろしく～」
2062 = "「Vậy thì, nhờ anh nhé~」"

# 【双鉄】
# display as 雙鐵
# JP: 「帰りの飛行機で熟睡をした方が多分、休まる。\nいま半端に寝ると、そこで眠れなくなるかもしれんぞ」
1682 = "「Ngủ say trên chuyến bay về có lẽ sẽ nghỉ\nngơi được tốt hơn.\nBây giờ mà ngủ dở dang thì lên máy bay có\nkhi lại không ngủ được đâu đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ありがと。がんばる。けど――もし万が一寝息たてたら、\n起こしてもらえるとうれしかとー」
2004 = "「Cảm ơn anh. Em sẽ cố. Nhưng mà——nhỡ may\nem mà ngáy ngủ,\nthì anh gọi em dậy nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1518 = "「Đã rõ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あとね、ご褒美。んっと……橙汁！\n自販機のでいいから、買ってほしかと」
2054 = "「Với lại, phần thưởng. Ừm…… nước cam!\nMua ở máy bán hàng tự động cũng được, anh\nmua cho em nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それも心得た。お安いご用だ」
2039 = "「Cũng rõ luôn. Chuyện nhỏ thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～、やったぁ」
1600 = "「Ehehe~, tuyệt quá.」"

# monologue
# JP: その声がもう眠気を帯びてる。
2793 = "Giọng nói đó đã nhuốm màu buồn ngủ."

# monologue
# JP: 最終確認に集中したいが、\n日々姫の寝息も警戒せねば、だ。
2600 = "Dù muốn tập trung vào việc kiểm tra lần\ncuối,\nnhưng tôi cũng phải cảnh giác tiếng ngáy\ncủa Hibiki nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、すまんが頼めるか？」
1501 = "「Hachiroku, xin lỗi nhưng em giúp tôi được\nkhông?」"

# 【ハチロク】
# display as 八六
# JP: 「すまないことなど、なにひとつ。\n喜んでお引き受けいたします」
2095 = "「Không có gì phải xin lỗi đâu ạ.\nEm rất sẵn lòng.」"

# monologue
# JP: ハチロクの手が優しく伸びる。
2358 = "Bàn tay của Hachiroku dịu dàng vươn ra."

# monologue
# JP: 寝台に沈む日々姫の乱れた髪を、\nそっとそうっと撫でつける。
2451 = "Nhẹ nhàng vuốt ve mái tóc rối bời của\nHibiki\nđang chìm trong chiếc giường."

# 【ハチロク】
# display as 八六
# JP: 「ご苦労の甲斐――\n確実に、実るものかと存じます」
2049 = "「Công sức bỏ ra——\nchắc chắn sẽ đơm hoa kết trái thôi ạ.」"

# monologue
# JP: とても静かで、けれど確信に満ちた声。\n日々姫を優しく見つめていた目が、僕へと動く。
2368 = "Một giọng nói rất tĩnh lặng, nhưng tràn\nđầy niềm tin.\nĐôi mắt dịu dàng nhìn Hibiki nay chuyển\nsang nhìn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、同じく感じてはいる」
1139 = "「……Tôi cũng cảm thấy như vậy.」"

# monologue
# JP: ネットを通じた会議には、遅刻参加や途中退出などもあり、結果として御一夜鉄道関係者、ほぼ全員の参加を得られた。
2330 = "Cuộc họp qua mạng có người đến muộn, có\nngười rời đi giữa chừng, nhưng kết quả là\ngần như toàn bộ những người liên quan đến\nĐường sắt Ohito đều đã tham gia."

# monologue
# JP: 仲国で僕らが学んだことと、みなの意見と、アイディアと。\nそれらをまとめあげるのに、今までかかってしまったが。
2422 = "Những gì chúng tôi học được ở Trọng Quốc,\ncùng với ý kiến và ý tưởng của mọi người.\nViệc tổng hợp lại tất cả những thứ đó đã\ntiêu tốn thời gian đến tận bây giờ."

# 【双鉄】
# display as 雙鐵
# JP: 「……他の誰でもない“僕ら”を視察に招いてくれた。\nその成果を、この線であれば示せるものと確信している」
1135 = "「……Họ đã mời \"chúng ta\" chứ không phải ai\nkhác đến thị sát.\nTôi tin chắc rằng nếu theo hướng này,\nchúng ta có thể chứng minh được thành quả\nđó.」"

# monologue
# JP: まさしく、僕らにしかできぬ提言。\nであるからこそ確実に伝えた上で、正しく評価して欲しい。
2791 = "Quả thực, đây là đề xuất mà chỉ chúng tôi\nmới có thể làm được.\nChính vì vậy, tôi muốn truyền đạt nó một\ncách chắc chắn và mong được đánh giá đúng\nđắn."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、多少の無理を押してでも――\nざっとした物でも、なんとか、朝のうちに送りたいのだ」
1808 = "「Vì vậy, dù có hơi quá sức——\ndù chỉ là bản nháp, tôi cũng muốn cố gắng\ngửi đi trong buổi sáng.」"

# 【ハチロク】
# display as 八六
# JP: 「日ノ本へ帰ってしまいましたら、姜様たちとの\n直接の意見交換などは、難しくなりますものね」
1673 = "「Nếu về Hinomoto rồi, thì việc trao đổi ý\nkiến trực tiếp\nvới cô Jiang và những người khác sẽ trở\nnên khó khăn hơn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1865 = "「Đúng vậy.」"

# monologue
# JP: ネットを通じての会議も無論、大変有用に機能する。が、\n対面と比れべばどうしても、些かの距離感が出てしまう。
2695 = "Tất nhiên, họp qua mạng cũng rất hữu ích.\nNhưng\nso với gặp mặt trực tiếp, kiểu gì cũng sẽ\ncó chút khoảng cách."

# monologue
# JP: これほど重要な案件だ。その”些か”さえ取り除き、\n残された時間の許す限り、直接に意見交換したい。
2704 = "Một dự án quan trọng đến thế này. Tôi muốn\nxóa bỏ cả \"chút khoảng cách\" đó,\nvà trao đổi ý kiến trực tiếp trong chừng\nmực thời gian còn lại cho phép."

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ。実によくまとまっている。\nこの稿を姜さんに送り、正式な提出前の検討を願おう」
1131 = "「……Ừm. Tổng hợp thực sự rất tốt.\nHãy gửi bản thảo này cho cô Jiang và nhờ\ncô ấy xem xét trước khi nộp chính thức.」"

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～、なら良かったと」
1599 = "「Ehehe~, vậy thì tốt quá.」"

# 【ハチロク】
# display as 八六
# JP: 「きっと、お喜びいただけるものかと」
1699 = "「Chắc chắn cô ấy sẽ rất vui đó ạ.」"

# monologue
# JP: 日々姫の声にも、ハチロクの声にも、達成感が滲んでいる。\nポーレットから、最終判断は一任されている。
2633 = "Giọng của Hibiki và Hachiroku đều thấm đẫm\ncảm giác thành tựu.\nPaulette đã giao toàn quyền quyết định\ncuối cùng cho chúng tôi."

# monologue
# JP: ならば迷いはもはや無い。\nメールとして、姜さんに送信を――――今、完了した。
2799 = "Vậy thì không còn gì phải do dự nữa.\nGửi email cho cô Jiang――――xong rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「――日々姫もハチロクも、本当に良く頑張ってくれた。\nこころより御礼を言わせてほしい。ありがとう」
1089 = "「——Hibiki và Hachiroku, cả hai đều đã làm\nrất tốt.\nCho tôi gửi lời cảm ơn từ tận đáy lòng.\nCảm ơn hai người.」"

# 【日々姫】
# display as 日日姬
# JP: 「お仕事で、チームで、家族で。何よりにぃにやけんね！\nもし万が一気がむかんでも、がんばっちゃうし」
2045 = "「Vì công việc, vì nhóm, vì gia đình. Quan\ntrọng nhất là vì anh hai mà!\nDù có lỡ không có hứng thì em cũng sẽ cố\ngắng hết mình.」"

# monologue
# JP: くったりくずれおちたまま、それでも顔をもちあげて。\n日々姫はほやーっと笑顔を浮かべる。
2643 = "Dù đang nằm ườn ra, em ấy vẫn ngẩng mặt\nlên.\nHibiki nở một nụ cười rạng rỡ."

# monologue
# JP: 眠たそうだが、しあわせそうだ。\n見ているこちらが癒やされる。
2802 = "Trông có vẻ buồn ngủ, nhưng lại rất hạnh\nphúc.\nNhìn em ấy, tôi cũng cảm thấy được chữa\nlành."

# 【日々姫】
# display as 日日姬
# JP: 「こぎゃんするとは、なんにもなくても楽しかけんね！\nおっきなおーーーーっきな絵ば描けちゃうし」
1494 = "「Làm mấy việc này, dù chẳng có gì cũng\nthấy vui lắm á!\nEm có thể vẽ được một bức tranh to~ thật\nlà to luôn.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄さま。\nこの上なく楽しく、こころはずむことと感じております」
1768 = "「Em cũng vậy thưa ngài Soutetsu.\nEm cảm thấy vô cùng vui vẻ và phấn khích.」"

# monologue
# JP: ハチロクは体を崩さない。
2355 = "Hachiroku không hề tỏ ra uể oải."

# monologue
# JP: 寝台の端にちょこんとお行儀よく座り、とても穏やかで\n満ち足りた笑顔で、僕のこころを満たしてくれる。
2448 = "Ngồi ngoan ngoãn ở mép giường, với một nụ\ncười rất dịu dàng\nvà mãn nguyện, em ấy lấp đầy trái tim tôi."

# 【ハチロク】
# display as 八六
# JP: 「レイルロオドにはありえない、素晴らしい家族旅行を\n経験させていただいて、それが新しいレールにも繋がる」
1960 = "「Được trải nghiệm một chuyến du lịch gia\nđình tuyệt vời mà\nmột Railord khó lòng có được, và điều đó\nlại còn kết nối với một tuyến đường ray\nmới.」"

# monologue
# JP: 黒髪が、揺れる。\n僕に、日々姫に――ハチロクは深々、礼をする。
2363 = "Mái tóc đen khẽ đung đưa.\nHachiroku cúi đầu chào thật sâu——với tôi,\nvà với Hibiki."

# 【ハチロク】
# display as 八六
# JP: 「この上なく恵まれていて、しあわせで――\nわたくし、少し、怖いほどです」
1819 = "「Được ban phước vô bờ bến, hạnh phúc đến\nmức——\nem cảm thấy có chút sợ hãi.」"

# monologue
# JP: ……ああ。確かにだ。恵まれていると、つくづく思う。\n幸せも怖さも感じるし――同時に、とても不思議に思う。
1066 = "……À. Đúng vậy. Tôi cũng thấm thía rằng\nmình thật may mắn.\nCảm nhận được cả hạnh phúc lẫn sự sợ\nhãi——đồng thời, cũng thấy rất kỳ diệu."

# monologue
# JP: （僕も、日々姫も、ハチロクさえも。誰ひとり――\n日仲のレールを繋ぐなど、夢見てさえもいなかった）
2823 = "(Cả tôi, Hibiki, hay thậm chí là\nHachiroku. Không một ai——\ntừng mơ đến việc kết nối tuyến đường ray\ngiữa Hinomoto và Trọng Quốc.)"

# monologue
# JP: ただ、右田家への恩返しのため。御一夜の水を守るため。\n偶然の縁を結んだレイルロオドの失くし物を見つけるため。
2587 = "Chỉ là để đền đáp công ơn của nhà Migita.\nĐể bảo vệ nguồn nước của Ohimitera.\nĐể tìm lại món đồ bị mất của một Railord\ntình cờ kết duyên."

# monologue
# JP: その時々で、その時々に果たせることを果たしてきた。\nただそれだけのことであるのに――
2788 = "Từng lúc từng lúc, tôi chỉ làm những việc\ncó thể làm vào thời điểm đó.\nChỉ có vậy thôi, thế mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「……いつの間に、ずいぶんと遠くへ来たなぁ」
1113 = "「……Không biết từ lúc nào, chúng ta đã đi\nđược một chặng đường khá xa rồi nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、わたしも思ったと。\n使ってるのは、ずーっとおんなじスケッチブックなのに」
1620 = "「A, em cũng nghĩ vậy đó.\nDù cuốn sổ phác thảo em dùng vẫn luôn là\ncuốn này.」"

# monologue
# JP: ふふふと、小さな笑い声。
2797 = "Tiếng cười khanh khách nhỏ nhẹ."

# 【日々姫】
# display as 日日姬
# JP: 「最初はくまくま。柱時計とにぃにとねぇね。\nそれだけが、私に描けるものだったのに」
1429 = "「Ban đầu là Kumakuma. Đồng hồ quả lắc, anh\nhai và chị hai.\nĐó là tất cả những gì em có thể vẽ được.」"

# monologue
# JP: 兄妹だなと、つくづく思う。\n考え方も感じ方もだんだん似てきて――
2574 = "Quả là anh em, tôi thấm thía nghĩ.\nCách suy nghĩ và cảm nhận cũng dần trở nên\ngiống nhau——"

# 【日々姫】
# display as 日日姬
# JP: 「列車ば描けるようになって。町を描けるようになって。\n今度は――もしかしたら、ふたつの国の未来まで！」
1956 = "「Rồi em bắt đầu vẽ được tàu hỏa. Vẽ được\nthị trấn.\nLần này——có lẽ là cả tương lai của hai\nquốc gia nữa!」"

# monologue
# JP: それでも決して、見ているものが、果たせることが、\nひとつに重なることはない。
2402 = "Dù vậy, những gì chúng tôi nhìn thấy,\nnhững gì chúng tôi có thể làm,\ntuyệt đối không bao giờ trùng khớp thành\nmột."

# monologue
# JP: 安心できて、居心地がよく、\n心強いと、つくづく思う。
2499 = "Tôi thực sự cảm thấy an tâm, thoải mái\nvà vững dạ."

# 【日々姫】
# display as 日日姬
# JP: 「繰り返しば繰り返してるだけなのに、\nどんどん遠くに、どんどん楽しくなってきて――」
1504 = "「Rõ ràng chỉ là lặp đi lặp lại những việc\ngiống nhau,\nnhưng lại ngày càng tiến xa hơn, ngày càng\nthấy vui hơn——」"

# monologue
# JP: 眠気を、興奮で追い払いでもできたのだろうか。\n日々姫がひょこんと体を起こし、僕を見つめる。
2277 = "Không biết có phải sự phấn khích đã xua\ntan cơn buồn ngủ hay không.\nHibiki đột nhiên ngồi dậy, nhìn chằm chằm\nvào tôi."

# 【日々姫】
# display as 日日姬
# JP: 「こぎゃんと、ずっと続けばよかよね。\nわたし、ずーっと続けたかとよ」
1996 = "「Cứ thế này mãi thì tốt biết mấy nhỉ.\nEm muốn cứ tiếp tục như thế này mãi thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「続けたいと願う限りは、きっと続くさ。\nこうした日々も、新しいレールも、なにもかも」
1576 = "「Chỉ cần em muốn tiếp tục, thì chắc chắn\nsẽ tiếp tục thôi.\nNhững ngày tháng như thế này, những tuyến\nđường ray mới, tất cả mọi thứ.」"

# 【日々姫】
# display as 日日姬
# JP: 「そうかな。えへへっ。\nほんとにそうなら、嬉しいな！」
1934 = "「Vậy sao. Ehehe.\nNếu thực sự là vậy thì em vui lắm!」"

# 【双鉄】
# display as 雙鐵
# JP: 「本当にそうなるように、日々を重ねていけばいい。\n及ばずながら、僕もいつでも、出来る限りの力を貸そう」
1900 = "「Chỉ cần tích lũy từng ngày để điều đó\nthực sự xảy ra là được.\nDù tài hèn sức mọn, nhưng lúc nào anh cũng\nsẽ giúp em hết sức mình.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ！　――えと、わたしも！　わたしもにぃにに！\nわたしのぜぇんぶ、いつでも喜んで差し出すけんね！」
1596 = "「Oa! ——À ừm, em cũng vậy! Em cũng sẽ giúp\nanh hai!\nTất cả của em, lúc nào em cũng sẵn sàng\ntrao cho anh!」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、[マイマスター,3]双鉄さま。\nわたくしの全ては、あなたの望みを叶えるために」
1764 = "「Em cũng vậy thưa ngài Soutetsu.\nTất cả của em, đều là để thực hiện mong\nmuốn của ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕ののぞみ――か」
1798 = "「Mong muốn của tôi——sao.」"

# monologue
# JP: あの事故以来、そんなものは一度たりとも抱けなかった。\n誰かののぞみを叶えることで、自分の隙間を埋めていた。
2725 = "Kể từ vụ tai nạn đó, tôi chưa từng một lần\nấp ủ thứ gì như vậy.\nTôi chỉ lấp đầy khoảng trống của bản thân\nbằng cách thực hiện mong muốn của người\nkhác."

# monologue
# JP: けれども、今は――たったひとつ。\n確かなのぞみを、自分ののぞみを、抱いている。
2666 = "Nhưng hiện tại——chỉ một điều duy nhất.\nTôi đang ấp ủ một mong muốn chắc chắn, một\nmong muốn của riêng mình."

# 【双鉄】
# display as 雙鐵
# JP: 「叶えたいな。それと同時に。僕ののぞみが――\n僕らののぞみであって欲しいと、願ってもいる」
1788 = "「Tôi muốn thực hiện nó. Và đồng thời, tôi\ncũng mong rằng mong muốn của tôi——\nsẽ là mong muốn của tất cả chúng ta.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま――まことに嬉しうございます。\nそう願って頂けますこと、誇りと、喜びと感じます」
2096 = "「Ngài Soutetsu——em thực sự rất vui.\nViệc ngài mong muốn như vậy, em cảm thấy\nvừa tự hào, vừa sung sướng.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、私の、私達の――みんなののぞみ！\n絶対、叶うし叶えるけん！！！」
2084 = "「Mong muốn của anh hai, của em, của chúng\nta——của tất cả mọi người!\nChắc chắn sẽ thành hiện thực, và chúng ta\nsẽ làm cho nó thành hiện thực!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「とてもうれしい。ありがとう」
1786 = "「Tôi rất vui. Cảm ơn hai người.」"

# monologue
# JP: とはいえ、だ。\n僕もどうやら、いつの間に力みすぎてしまっていたらしい。
2281 = "Dù nói vậy.\nNhưng có vẻ như tôi cũng đã quá căng thẳng\ntừ lúc nào không hay."

# monologue
# JP: あえて大げさに肩の力を抜いて長い息を吐き出せば、\nハチロクも日々姫も、照れくさそうな笑みを零す。
2602 = "Cố tình thả lỏng vai một cách cường điệu\nvà thở hắt ra một hơi dài,\ncả Hachiroku và Hibiki đều nở nụ cười\nngượng ngùng."

# 【双鉄】
# display as 雙鐵
# JP: 「今僕たちに出来ることは全て果たした。最後の詰めだけ\n姜さんたちの手を借りたなら、もうそれ以上は頑張れん」
1706 = "「Bây giờ chúng ta đã làm tất cả những gì\ncó thể. Chỉ còn phần hoàn thiện cuối cùng,\nnếu đã nhờ đến cô Jiang và những người\nkhác, thì chúng ta không thể cố gắng hơn\nđược nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「あはは、そだよねー。この次の一枚ば描くか描かんか。\n決めるのは、私たちじゃなく、姜さんたちだもんねー」
1630 = "「Ahaha, đúng vậy nhỉ. Việc có vẽ tiếp bức\ntranh tiếp theo hay không.\nNgười quyết định không phải chúng ta, mà\nlà cô Jiang và những người khác cơ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうか……最終判断は、その上の人々だろうがな」
2003 = "「Nói đúng hơn là…… quyết định cuối cùng có\nlẽ thuộc về những người cấp cao hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄さま、日々姫。いいえ」
2101 = "「Không đâu, ngài Soutetsu, Hibiki. Không\nphải vậy đâu.」"

# monologue
# JP: 僕らの言葉が、とても柔らかに止められる。
2372 = "Lời nói của chúng tôi bị ngăn lại một cách\nrất nhẹ nhàng."

# 【ハチロク】
# display as 八六
# JP: 「鉄路の存否を決めるのは、いつだって。ご利用下さり、あるいはお離れになる、乗客の皆様のみです」
1888 = "「Người quyết định sự tồn tại của tuyến\nđường sắt, lúc nào cũng vậy. Chỉ có những\nhành khách sử dụng, hoặc rời bỏ nó mà\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1626 = "「À.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか。うん――\nそうだった」
1721 = "「Ra vậy. Ừm——\nĐúng là thế thật.」"

# 【ハチロク】
# display as 八六
# JP: 「だからこそ。この提言はきっと取り入れられようと――\nそう、わたくしは信じるのです」
1885 = "「Chính vì vậy. Đề xuất này chắc chắn sẽ\nđược chấp nhận——\nem tin là như thế.」"

# monologue
# JP: ハチロクの目も、やはり僕らのものとは違う。
2365 = "Ánh mắt của Hachiroku, quả nhiên cũng khác\nvới chúng tôi."

# monologue
# JP: 栄光も衰退も、自らの景色として、\nリアルタイムで見てきた瞳だ。
2696 = "Đó là đôi mắt đã chứng kiến cả sự vinh\nquang lẫn suy tàn\nnhư một phần phong cảnh của chính mình\ntrong thời gian thực."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、日々姫は。今の鉄路をお使いの方も、\nそうでない方も――確かにご視察されましたから」
2099 = "「Ngài Soutetsu, và cả Hibiki nữa. Cả những\nngười đang sử dụng đường sắt hiện tại,\nlẫn những người không sử dụng——đều đã được\nhai người thị sát kỹ lưỡng rồi mà.」"

# monologue
# JP: その目が、僕を見てくれている。\nいつも、いつでも、見てくれている。
2794 = "Đôi mắt ấy, đang nhìn tôi.\nLúc nào cũng vậy, luôn luôn nhìn tôi."

# monologue
# JP: 僕がレールであるのなら、軟弱地盤を、難所を誤って\n選ばぬように、いつでもさり気なく正してくれる。
2732 = "Nếu tôi là đường ray, em ấy sẽ luôn khéo\nléo uốn nắn tôi,\nđể tôi không chọn nhầm những nền đất yếu\nhay những đoạn đường hiểm trở."

# 【ハチロク】
# display as 八六
# JP: 「皆様ののぞみと、鉄路とが、綺麗に重なるポイントを。\nこの提言は、鮮やかに描き出しておりますから」
2040 = "「Điểm giao thoa hoàn hảo giữa mong muốn\ncủa mọi người và đường sắt.\nĐề xuất này đã vẽ ra điều đó một cách vô\ncùng sống động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクにそういってもらえるのなら、安心だ」
1148 = "「……Được Hachiroku nói như vậy, tôi cũng\nyên tâm rồi.」"

# monologue
# JP: だから、思う。\nこころの底から、つくづく思う。
2604 = "Vì vậy, tôi nghĩ.\nTừ tận đáy lòng, tôi thực sự nghĩ vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「……他の誰と旅をしたとて、あるいは同じような\n感慨を持てたのかもしれんとも思うのだが――それでも」
1132 = "「……Dù có đi du lịch với ai khác, có lẽ tôi\ncũng sẽ có\nnhững cảm xúc tương tự——nhưng dù vậy.」"

# monologue
# JP: ポーレットとなら、れいなとなら。真闇姉と、稀咲となら。\nあるいは凪と、ふかみとなら。
2456 = "Nếu là với Paulette, nếu là với Reina. Nếu\nlà với chị Mayami, và Kisaki.\nHoặc nếu là với Nagi, và Fukami."

# monologue
# JP: まったく違うものを見て、まったく違う経験を積み。\nまったく違う草案を、きっと組み上げたことだろう。
2605 = "Chắc chắn tôi sẽ nhìn thấy những thứ hoàn\ntoàn khác, tích lũy những kinh nghiệm hoàn\ntoàn khác.\nVà lập ra một bản thảo hoàn toàn khác."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫とハチロクと。視察ができて本当によかった。\nこれ以上の案は出せんだろうと、今の僕には思えるよ」
1887 = "「Được đi thị sát cùng Hibiki và Hachiroku.\nThật sự rất tuyệt.\nHiện tại tôi nghĩ, có lẽ sẽ không thể đưa\nra phương án nào tốt hơn thế này nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「えへへへへ～、ならよかったと！！\nわたしも、うん。やりきった感あるけんね！！」
1602 = "「Ehehehehe~, vậy thì tốt quá rồi!!\nEm cũng, ừm. Cảm thấy như mình đã làm hết\nsức rồi á!!」"

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。わたくしも、お示し頂けた役割を\nわたくしなりに、果たしきれたものかと存じます」
1925 = "「Đúng vậy ạ. Em cũng nghĩ rằng, với vai\ntrò được giao phó,\nem đã hoàn thành trọn vẹn theo cách của\nriêng mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。確かにだ。共感を使い、仲国のレイルロオドと\n――ハチロクはよく、交流し情報を集めてくれた」
1858 = "「Ừ. Đúng vậy. Bằng cách sử dụng cộng cảm,\nHachiroku đã giao lưu\nvà thu thập thông tin rất tốt từ các\nRailord của Trọng Quốc.」"

# monologue
# JP: ハチロクと西瓜が信頼を深めあってくれたこと。\n言葉には直せぬ情報さえも、共感で伝えあってくれたこと。
2656 = "Việc Hachiroku và Suika đã thắt chặt sự\ntin tưởng lẫn nhau.\nNgay cả những thông tin không thể diễn đạt\nbằng lời, họ cũng truyền đạt cho nhau qua\ncộng cảm."

# monologue
# JP: そのおかげで得られた恩恵は、\n計り知れぬほどに大きなものだと、確かに感じる。
2709 = "Những lợi ích có được nhờ điều đó,\ntôi thực sự cảm thấy to lớn đến mức không\nthể đong đếm được."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクにしか果たし得なかった、大事な役目だ。\n見事な成果を、ありがとう」
2043 = "「Đó là một vai trò quan trọng mà chỉ\nHachiroku mới có thể hoàn thành.\nCảm ơn em vì thành quả tuyệt vời này.」"

# 【ハチロク】
# display as 八六
# JP: 「もったいないお言葉にすぎます。わたくしはただ――\nあら！　噂をすればなんとやら、でございますね」
1752 = "「Ngài quá khen rồi ạ. Em chỉ là——\nÔi! Vừa nhắc tào tháo là tào tháo đến ngay\nkìa.」"

# monologue
# JP: さもおかしそうなハチロクの声。
2366 = "Giọng nói của Hachiroku nghe có vẻ rất kỳ\nlạ."

# 【ハチロク】
# display as 八六
# JP: 「西瓜からの共感です。\n空港いきの車が、あと30分ほどで到着するとのことです」
1871 = "「Cộng cảm từ Suika ạ.\nCô ấy nói xe ra sân bay khoảng 30 phút nữa\nsẽ đến.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いよいよ、か。\nハチロク、日々姫。忘れ物などないようにな」
1943 = "「Cuối cùng cũng đến lúc rồi sao.\nHachiroku, Hibiki. Nhớ kiểm tra lại đồ đạc\nkẻo quên nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　ってか、にぃに。タブレット」
1652 = "「Vâng! Mà nè anh hai. Máy tính bảng kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1626 = "「啊」" 

# monologue
# JP: 日々姫が荷物をまとめ直す。\n僕も、同じく。
2635 = "Hibiki thu xếp lại hành lý.\nTôi cũng vậy."

# monologue
# JP: 僕らが立った寝台を、\nシーツの皺に至るまで、ハチロクは丁寧に整え直す。
2371 = "Hachiroku cẩn thận chỉnh lại chiếc giường\nchúng tôi vừa nằm,\nphẳng phiu đến từng nếp nhăn trên ga trải\ngiường."

# 【ハチロク】
# display as 八六
# JP: 「うん」
1649 = "「Ừm.」"

# monologue
# JP: そうして深々。\n今度は部屋へと、頭を下げる。
2705 = "Sau đó, cúi gập người.\nLần này, em ấy cúi đầu chào căn phòng."

# 【ハチロク】
# display as 八六
# JP: 「――大変お世話になりました！」
1092 = "「——Rất cảm ơn vì đã chăm sóc chúng tôi!」"

# monologue
# JP: 車の中でも、朝粥をいただいた軽食店でも、話せなかった。
2278 = "Cả khi ở trong xe, lẫn lúc ở quán ăn nhẹ\nnơi chúng tôi dùng cháo buổi sáng, đều\nkhông thể nói chuyện."

# monologue
# JP: 僕らが直近で送った資料を、姜さんは、無言のままに\nひたすら、ひたすら、読み込み続けてくれていたゆえ。
2418 = "Bởi vì cô Jiang vẫn luôn giữ im lặng\nvà mải mê đọc đi đọc lại tài liệu mà chúng\ntôi vừa gửi."

# 【姜】
# display as 姜
# JP: 「……なるほど」
1127 = "「……Ra là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1631 = "「!」"

# monologue
# JP: ようやく、その喉が音を発する。
2692 = "Cuối cùng, cô ấy cũng cất tiếng."

# 【姜】
# display as 姜
# JP: 「――日ノ本のナインスターズの“その先”を、\n仲国では進める必要がありますか」
1086 = "「——\"Tương lai\" của Nine Stars ở Hinomoto,\ncó cần thiết phải thúc đẩy ở Trọng Quốc\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、思います」
1867 = "「Tôi nghĩ là, có.」"

# monologue
# JP: 伝わっている。\nただ一言で理解できるゆえ、言葉も率直なものになる。
2453 = "Đã truyền đạt được rồi.\nChỉ cần một lời là có thể hiểu được nhau,\nnên lời nói cũng trở nên thẳng thắn."

# 【双鉄】
# display as 雙鐵
# JP: 「今回の視察で僕がまずまっさきに感じたのは、\n『仲国の鉄道は生きている』ということでした」
2050 = "「Điều đầu tiên tôi cảm nhận được trong\nchuyến thị sát lần này,\nđó là \"đường sắt của Trọng Quốc vẫn đang\nsống\".」"

# 【ハチロク】
# display as 八六
# JP: 「北琴駅、北琴西駅、聖都駅。どの駅もまことに見事で、\n乗客も多く。列車も大変に優れたものと感じ入りました」
1531 = "「Ga Bắc Cầm, ga Tây Bắc Cầm, ga Thánh Đô.\nBất kỳ nhà ga nào cũng vô cùng tráng lệ,\nhành khách cũng rất đông. Tàu hỏa cũng là\nnhững phương tiện cực kỳ xuất sắc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その上、貨物の実需もとても大きいというお話です。\nですから逆に、『何故このお話が僕達に』と考えました」
2053 = "「Hơn nữa, nhu cầu thực tế về vận tải hàng\nhóa cũng rất lớn.\nChính vì vậy, ngược lại, tôi đã tự hỏi\n\"Tại sao chuyện này lại đến tay chúng\ntôi\".」"

# 【日々姫】
# display as 日日姬
# JP: 「それで私達が思ったのは――『生きている鉄道だけど、\n鉄道離れが急速に進んでいるのかも』、ってことでした」
1841 = "「Vì thế chúng tôi đã nghĩ——\"Đường sắt tuy\nvẫn đang sống,\nnhưng có lẽ tình trạng xa lánh đường sắt\nđang diễn ra nhanh chóng\".」"

# monologue
# JP: 飛行機の中で、[ほんこん,1]紅港出身のCAさんが言っていた。\n『レイルロオドを見るのは初めて』だと。
2429 = "Trên máy bay, một nữ tiếp viên hàng không\nxuất thân từ Hồng Cảng đã nói.\n\"Đây là lần đầu tiên tôi nhìn thấy\nRailord\"."

# monologue
# JP: 北琴鉄道博物館で目にした仲国国鉄路線図では、\n紅港にも、鉄路は当然、繋がっているにもかかわらず。
2423 = "Dù trên bản đồ tuyến đường sắt quốc gia\nTrọng Quốc mà tôi thấy ở Bảo tàng Đường\nsắt Bắc Cầm,\nđường sắt hiển nhiên cũng kết nối với Hồng\nCảng."

# 【双鉄】
# display as 雙鐵
# JP: 「長距離は航空機。近距離はエアクラ自動車。\nその使い分けが、特に若い世代には浸透している――」
2079 = "「Đường dài thì dùng máy bay. Đường ngắn\nthì dùng ô tô Aircra.\nSự phân chia cách sử dụng đó đã ăn sâu vào\ntiềm thức, đặc biệt là ở thế hệ trẻ——」"

# monologue
# JP: 大きな頷き。\n姜さんからだけではなく、西瓜からも、志寰君からも。
2478 = "Một cái gật đầu mạnh.\nKhông chỉ từ cô Jiang, mà cả từ Suika và\nZhihuan."

# 【双鉄】
# display as 雙鐵
# JP: 「それが鉄道離れの一番大きな原因だと感じました。\nならばこのまま年を経るごとに、鉄道離れは加速する」
1794 = "「Tôi cảm thấy đó là nguyên nhân lớn nhất\ndẫn đến việc xa lánh đường sắt.\nNếu cứ để như vậy, qua mỗi năm, tình trạng\nnày sẽ càng tăng tốc.」"

# 【日々姫】
# display as 日日姬
# JP: 「だから、私達が声をかけてもらえたんだと思いました。\nナインスターズは九洲を繋ぎ、鉄路を繋いだ列車だから」
1791 = "「Vì vậy, tôi nghĩ đó là lý do chúng tôi\nđược gọi đến.\nBởi vì Nine Stars là chuyến tàu kết nối\nKyushu, kết nối các tuyến đường sắt lại\nvới nhau.」"

# 【姜】
# display as 姜
# JP: 「ご明察です。西瓜からの報告を受け、\n当方は、先生達に託すべきだとの決断を下しました」
1881 = "「Anh quả là tinh ý. Nhận được báo cáo từ\nSuika,\nchúng tôi đã đưa ra quyết định là nên giao\nphó việc này cho các vị.」"

# monologue
# JP: “当方”は、姜さんとその上席とを意味するのだろう。\nあるいは当方以外の“他方”勢力の主導によって――
1063 = "\"Chúng tôi\" có lẽ ám chỉ cô Jiang và cấp\ntrên của cô ấy.\nHoặc là dưới sự chỉ đạo của một thế lực\n\"khác\" ngoài chúng tôi——"

# monologue
# JP: 僕ら同様、視察と提言を求められている\n海外鉄道事業者の存在を匂わせているのかもしれないが。
2446 = "Có thể cô ấy đang ám chỉ đến sự tồn tại\ncủa các nhà điều hành đường sắt nước ngoài\ncũng được yêu cầu thị sát và đề xuất giống\nnhư chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし――実際に来て、乗ってみて。\n仲国の広大さが、周遊観光を困難にすると理解しました」
1908 = "「Nhưng——khi thực sự đến đây và đi thử.\nTôi mới hiểu ra rằng sự rộng lớn của Trọng\nQuốc sẽ gây khó khăn cho việc du lịch vòng\nquanh.」"

# monologue
# JP: が、誰かライバルがいるのだとしても、\n僕らの為すべきは変わらない。
2326 = "Nhưng dù có đối thủ cạnh tranh nào đi\nchăng nữa,\nnhững gì chúng tôi cần làm vẫn không thay\nđổi."

# monologue
# JP: 仲国を繋ぎ、仲国と日ノ本をもまた繋ぐ――\nそうした列車の草案を、全力で提言するのみだ。
2508 = "Kết nối Trọng Quốc, và cũng kết nối Trọng\nQuốc với Hinomoto——\nChúng tôi chỉ cần dốc toàn lực đề xuất một\nbản thảo cho chuyến tàu như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「9,597,000[　　　　　２,1]km割ることの、36,750[　　　　　　２,1]km。\n単純な面積比ですと、仲国は九洲の260倍強となります」
1428 = "「9.597.000 km vuông chia cho 36.750 km\nvuông.\nTính theo tỷ lệ diện tích đơn thuần, Trọng\nQuốc lớn hơn Kyushu khoảng 260 lần.」"

# 【姜】
# display as 姜
# JP: 「そうなりますね」
1926 = "「Đúng là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、九洲規模の範囲を切り取って旅しても、\n『仲国のごく一部』を周遊することにしかなりません」
1674 = "「Vì vậy, dù có khoanh vùng một khu vực có\nquy mô bằng Kyushu để đi du lịch,\nthì cũng chỉ là du lịch vòng quanh \"một\nphần rất nhỏ của Trọng Quốc\" mà thôi.」"

# monologue
# JP: 1／260。\n大きなパズルの260のピースの中の、たったのひとつ。
2825 = "1/260.\nChỉ là một mảnh ghép duy nhất trong số 260\nmảnh của một bức tranh xếp hình khổng lồ."

# monologue
# JP: それをどのように選んでみたとて、\nパズル全体の絵柄を想像させることは、不可能だろう。
2664 = "Dù có chọn mảnh ghép đó như thế nào đi\nchăng nữa,\ncũng không thể nào hình dung ra được bức\ntranh tổng thể."

# 【日々姫】
# display as 日日姬
# JP: 「それでは仲国を代表する観光列車にはなりえませんし\n仲国の皆さんのこころを繋ぐレールは、伸ばせません」
2071 = "「Như vậy thì không thể trở thành chuyến\ntàu du lịch đại diện cho Trọng Quốc được,\nvà cũng không thể kéo dài tuyến đường ray\nkết nối trái tim của người dân Trọng\nQuốc.」"

# 【西瓜】
# display as 西瓜
# JP: 「ではどうしますか！？」
2060 = "「Vậy thì phải làm sao!?」"

# 【志寰】
# display as 志寰
# JP: 「西瓜っ！？　――あっ」
1994 = "「Suika!? ——A」"

# monologue
# JP: 思わず飛び出た。そんな風情の西瓜の声を\n止めようとした志寰君が、姜さんによってたしなめられる。
2754 = "Suika thốt lên một cách vô thức. Zhihuan\nđịnh ngăn giọng nói đầy cảm xúc đó của cô\nbé lại,\nnhưng đã bị cô Jiang cản lại."

# monologue
# JP: 資料を見ていない――予備知識の無い西瓜の生の感じ方を、\n姜さんは、あるいは確かめたいのかもしれん。
2758 = "Có lẽ cô Jiang muốn xác nhận cảm nhận chân\nthực của Suika,\nmột người chưa xem tài liệu——không có kiến\nthức nền tảng về chuyện này."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1499 = "「Hachiroku.」"

# monologue
# JP: 西瓜にならば、ハチロクの声が一番まっすぐ届くだろう。\nその思いでの一言を、ハチロクはすぐ受け止めてくれる。
2509 = "Nếu là với Suika, giọng nói của Hachiroku\ncó lẽ sẽ truyền đạt được trực tiếp nhất.\nHachiroku ngay lập tức tiếp nhận lời nói\nchứa đựng tâm tư đó."

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、仲国の広さをまず学び、\n整頓しようと試みました」
1784 = "「Đầu tiên, chúng tôi tìm hiểu về sự rộng\nlớn của Trọng Quốc,\nvà cố gắng sắp xếp lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「23の省。5つの自治区。直轄市が4。特別行政区が2。\nまずその34を、うまく繋ぎあわせることができないかと」
2123 = "「23 tỉnh. 5 khu tự trị. 4 thành phố trực\nthuộc trung ương. 2 đặc khu hành chính.\nTrước hết, liệu chúng ta có thể kết nối 34\nkhu vực đó lại với nhau một cách khéo léo\nhay không.」"

# monologue
# JP: とはいえ、『省』も『自治区』もあまりに広い。
2324 = "Mặc dù vậy, cả \"tỉnh\" lẫn \"khu tự trị\" đều\nquá rộng lớn."

# monologue
# JP: 内蒙蛄自治区一つだけでもその面積は1,183,000キロ平米。\n日ノ本全土の総面積、378,000キロ平米の、約三倍だ。
2332 = "Chỉ riêng khu tự trị Nội Mông Cổ đã có\ndiện tích 1.183.000 km vuông.\nGấp khoảng ba lần tổng diện tích toàn bộ\nHinomoto là 378.000 km vuông."

# 【ハチロク】
# display as 八六
# JP: 「34区域のひとつひとつに観光拠点駅を設定し。\nその全てをめぐる周遊観光列車をと考えたのですが……」
1779 = "「Chúng tôi đã định thiết lập các nhà ga cứ\nđiểm du lịch ở từng khu vực trong số 34\nkhu vực.\nVà lên ý tưởng về một chuyến tàu du lịch\nvòng quanh tất cả các cứ điểm đó, nhưng\nmà……」"

# monologue
# JP: ハチロクの力無い語尾を、西瓜が掬う。
2367 = "Suika đỡ lấy phần cuối câu yếu ớt của\nHachiroku."

# 【西瓜】
# display as 西瓜
# JP: 「仲国の平均的な大型連休は、7日が二回。\n春節、つまり旧正月と、国慶節となります。ので――」
1474 = "「Kỳ nghỉ dài ngày trung bình ở Trọng Quốc\ngồm hai đợt 7 ngày.\nĐó là Lễ hội mùa xuân, tức là Tết Nguyên\nđán, và Quốc khánh. Vì vậy——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。34拠点駅全てを僅か7日間でめぐろうとすれば、\n乗っているだけ――観光の余裕が全くなくなってしまう」
1659 = "「Ừm. Nếu muốn đi vòng quanh tất cả 34 nhà\nga cứ điểm chỉ trong 7 ngày,\nthì chỉ có ngồi trên tàu thôi——hoàn toàn\nkhông còn thời gian rảnh rỗi để du lịch\nnữa.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も同様に考えます。またそれほどの長時間乗車は、\nどんな客車を用意しようと、乗客の負担が厳しいかとも」
1989 = "「Suika cũng nghĩ như vậy. Hơn nữa, việc\nngồi tàu trong thời gian dài như thế,\ndù có chuẩn bị toa hành khách kiểu gì đi\nnữa, thì gánh nặng lên hành khách cũng rất\nkhắc nghiệt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ゆえ、その案は捨て。全く異なる区分を求めた。\nすると『仲国地理大区』というのものがあると教わった」
1864 = "「Đúng vậy. Do đó, chúng tôi đã từ bỏ\nphương án đó. Và tìm kiếm một cách phân\nchia hoàn toàn khác.\nThế là chúng tôi được biết đến khái niệm\n\"Đại khu địa lý Trọng Quốc\".」"

# 【志寰】
# display as 志寰
# JP: 「中南地区、東北地区、華北地区、\n華東地区、西北地区、西南地区の大区分ですね」
1443 = "「Là các đại khu gồm khu vực Trung Nam, khu\nvực Đông Bắc, khu vực Hoa Bắc,\nkhu vực Hoa Đông, khu vực Tây Bắc, khu vực\nTây Nam đúng không.」"

# 【日々姫】
# display as 日日姬
# JP: 「そいば、こぎゃん二つにわけると！！」
1823 = "「Nếu vậy, chúng ta sẽ chia làm hai như thế\nnày!!」"

# monologue
# JP: 仲国を簡易的に描いた地図に、日々姫がさっと線を引く。
2428 = "Trên bản đồ vẽ đơn giản Trọng Quốc, Hibiki\nnhanh chóng vạch một đường."

# monologue
# JP: 西北・華北・東北と、西南・中南・華東とに――\n仲国全土が、南北二つに切り分けられる。
2741 = "Tây Bắc, Hoa Bắc, Đông Bắc và Tây Nam,\nTrung Nam, Hoa Đông——\nToàn bộ Trọng Quốc được chia làm hai nửa\nNam Bắc."

# 【双鉄】
# display as 雙鐵
# JP: 「西北・華北・東北から７つの観光拠点駅を選び、\nそれを７日間で周遊する、『北斗七星』」
1735 = "「Chọn ra 7 nhà ga cứ điểm du lịch từ Tây\nBắc, Hoa Bắc, Đông Bắc,\nvà đi vòng quanh chúng trong 7 ngày, gọi\nlà \"Bắc Đẩu Thất Tinh\".」"

# 【日々姫】
# display as 日日姬
# JP: 「西南・中南・華東から6つの観光拠点駅を選んで、\nそいば6日間で周遊する、『南斗六星』！」
1736 = "「Chọn ra 6 nhà ga cứ điểm du lịch từ Tây\nNam, Trung Nam, Hoa Đông,\nvà đi vòng quanh chúng trong 6 ngày, gọi\nlà \"Nam Đẩu Lục Tinh\"!」"

# 【ハチロク】
# display as 八六
# JP: 「北斗と南斗、二つの豪華クルウズトレインを[しつら]設え。\n春節、国慶節等に、それぞれおめぐりいただく」
1517 = "「Thiết lập hai chuyến tàu du lịch sang\ntrọng là Bắc Đẩu và Nam Đẩu.\nĐể hành khách có thể lần lượt đi vòng\nquanh vào dịp Lễ hội mùa xuân, Quốc khánh,\nv.v.」"

# 【志寰】
# display as 志寰
# JP: 「西瓜――」
1971 = "「Suika——」"

# monologue
# JP: 志寰君の鋭い声に、西瓜が頷き、目を閉じる。
2559 = "Trước giọng nói sắc bén của Zhihuan, Suika\ngật đầu và nhắm mắt lại."

# 【西瓜】
# display as 西瓜
# JP: 「8～10時間の夜行移動と、余裕時間での観光と仮定し。\n実現可能。かつ有力そうなダイアを複数想定できます」
1482 = "「Giả định thời gian di chuyển ban đêm là 8\nđến 10 tiếng, và thời gian rảnh rỗi để\ntham quan.\nCó thể thực hiện được. Và có thể dự tính\nđược nhiều biểu đồ chạy tàu có vẻ khả\nthi.」"

# monologue
# JP: へへっ、と日々姫が小さく笑う。\nごく控えめに拳を作り、ハチロクと瞬時、ぶつけあう。
2644 = "Hehe, Hibiki cười khúc khích.\nKhẽ nắm chặt tay lại, và chạm tay với\nHachiroku trong tích tắc."

# monologue
# JP: ポーレットたち、御一夜組の精査と確認を受けてはいたが、\nやはり、正直ホっとする。
2804 = "Mặc dù đã được Paulette và nhóm Ohimitera\nkiểm tra kỹ lưỡng và xác nhận,\nnhưng quả thực tôi vẫn cảm thấy nhẹ nhõm."

# 【志寰】
# display as 志寰
# JP: 「実現可能なら！　それならきっと！\n鉄道への憧れを、若い世代にも抱いてもらえますね」
1842 = "「Nếu có thể thực hiện được! Vậy thì chắc\nchắn!\nThế hệ trẻ cũng sẽ nuôi dưỡng niềm khao\nkhát với đường sắt nhỉ.」"

# 【西瓜】
# display as 西瓜
# JP: 「とても残念ですけれど、志寰。\n西瓜は、その考えには同意できません」
2109 = "「Rất tiếc, Zhihuan.\nSuika không thể đồng ý với suy nghĩ đó.」"

# 【志寰】
# display as 志寰
# JP: 「え？」
1609 = "「Hả?」"

# monologue
# JP: けれど、開かれた西瓜の瞳に宿る光は、ごく鈍い。
2760 = "Nhưng, ánh sáng trong đôi mắt mở to của\nSuika lại vô cùng mờ nhạt."

# 【西瓜】
# display as 西瓜
# JP: 「北斗七星、南斗六星。両クルーズトレインに対し、\n若い世代が抱く感情は、むしろ疎外感かと推測します」
1529 = "「Bắc Đẩu Thất Tinh, Nam Đẩu Lục Tinh. Đối\nvới cả hai chuyến tàu du lịch này,\nSuika suy đoán rằng cảm xúc mà thế hệ trẻ\ndành cho chúng, có lẽ lại là sự xa lánh.」"

# 【志寰】
# display as 志寰
# JP: 「あ！」
# 1631 = "「啊！」" 

# monologue
# JP: 声を失う志寰君の傍ら、\nハチロク、日々姫が静かに頷く。
2334 = "Bên cạnh Zhihuan đang lặng thinh,\nHachiroku và Hibiki lặng lẽ gật đầu."

# 【ハチロク】
# display as 八六
# JP: 「鉄道への親しみが殆ど無いところに最高級の贅沢品を\n見せつけられては、無理からぬことかもしれませんね」
1684 = "「Ở nơi mà sự gần gũi với đường sắt gần như\nkhông có, lại phô trương\nnhững món đồ xa xỉ bậc nhất, thì điều đó\ncó lẽ cũng là bất khả kháng nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「富裕層・高年齢層の豪華鉄道。自分たちは航空機って\n――棲み分けの意識が、むしろ加速しかねないかも」
1931 = "「Đường sắt sang trọng dành cho giới thượng\nlưu, người lớn tuổi. Còn bản thân mình thì\nđi máy bay\n——Ý thức phân chia giai cấp có khi lại\ncàng tăng tốc hơn cũng nên.」"

# 【志寰】
# display as 志寰
# JP: 「！！？　なら。\nならこの案は逆効果になってしまうじゃないですか」
1606 = "「!!? Nếu vậy.\nNếu vậy thì phương án này chẳng phải sẽ\nphản tác dụng sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この案だけでは、\nメリットよりもリスクの方が大きかろう」
1924 = "「Đúng vậy. Nếu chỉ có phương án này,\nthì rủi ro có lẽ sẽ lớn hơn lợi ích.」"

# 【西瓜】
# display as 西瓜
# JP: 「っ！　――双鉄先生は、でしたら、他の案も？」
1635 = "「! ——Vậy thưa thầy Soutetsu, thầy còn\nphương án nào khác không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。北斗七星、南斗六星を走らせるのと同時に、\n若い世代の鉄道利用を促す星も、また掲げればいい」
1648 = "「Ừm. Cùng lúc với việc cho Bắc Đẩu Thất\nTinh và Nam Đẩu Lục Tinh chạy,\nchỉ cần giương cao thêm những vì sao thúc\nđẩy thế hệ trẻ sử dụng đường sắt là được.」"

# 【西瓜】
# display as 西瓜
# JP: 「それは、どのような星ですか？」
2058 = "「Đó là những vì sao như thế nào vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「数多瞬く星々だ。6つの仲国地理大区――\nそれぞれに、すくなくとも十以上の星を散りばめたい」
1919 = "「Là vô số những vì sao lấp lánh. 6 đại khu\nđịa lý Trọng Quốc——\nTôi muốn rải ít nhất mười vì sao trở lên\nvào mỗi khu vực.」"

# 【姜】
# display as 姜
# JP: 「でしたら――」
2048 = "「Nếu vậy——」"

# monologue
# JP: 姜さんの唇がふわり、と緩む。\n言葉とともに、小さな笑みが浮き上がる。
2488 = "Đôi môi cô Jiang khẽ mở ra.\nCùng với lời nói, một nụ cười mỉm hiện\nlên."

# 【姜】
# display as 姜
# JP: 「一〇八星。\n水滸伝になぞらえた星々などはいかがでしょうか？」
1426 = "「108 vì sao.\nNhững vì sao mô phỏng theo Thủy Hử thì\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい！　では、うむ――各地理大区の中に、\nそれぞれ18駅ずつを、水滸伝一〇八星になぞらえて」
1642 = "「A, ý kiến hay đấy! Vậy thì, ừm——trong mỗi\nđại khu địa lý,\nchọn ra 18 nhà ga, mô phỏng theo 108 vì\nsao của Thủy Hử.」"

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「スタンプラリー！」
1815 = "「Rally thu thập con dấu!」"

# monologue
# JP: 志寰君と西瓜の声が綺麗に重なる。\nふたりは目と目を見交わせて、実に嬉しげな笑顔を零す。
2544 = "Giọng của Zhihuan và Suika hòa quyện vào\nnhau một cách hoàn hảo.\nHai người nhìn nhau, nở nụ cười thực sự\nvui vẻ."

# 【日々姫】
# display as 日日姬
# JP: 「そう！　春節と国慶節の間に、108星の駅たちをめぐる\nスタンプラリーを開催するの！　名付けて！」
1890 = "「Đúng vậy! Trong dịp Lễ hội mùa xuân và\nQuốc khánh, sẽ tổ chức rally thu thập con\ndấu\nđi vòng quanh 108 nhà ga vì sao! Tên của\nnó là!」"

# monologue
# JP: 日々姫がぐりんと僕を見る。\n“名付け”まで、会議では間に合わなかったが――うむ。
2639 = "Hibiki ngoái đầu nhìn tôi.\nTrong cuộc họp chúng tôi chưa kịp bàn đến\nphần \"đặt tên\"——ừm."

# 【双鉄】
# display as 雙鐵
# JP: 「……。ディスカバー――\n『DISCOVER　CHINA』――というのはどうだろう」
1145 = "「……Discover——\n\"DISCOVER CHINA\"——thì sao.」"

# 【志寰】
# display as 志寰
# JP: 「DISCOVER　CHINA」
2124 = "「DISCOVER CHINA.」"

# 【西瓜】
# display as 西瓜
# JP: 「仲国を……発見する――\n仲国の魅力を、再確認する？」
1920 = "「Khám phá…… Trọng Quốc——\nKhẳng định lại sức hấp dẫn của Trọng\nQuốc?」"

# monologue
# JP: 伝わっている。\nその実感が、僕の舌先をなめらかにする。
2287 = "Đã truyền đạt được rồi.\nCảm giác chân thực đó khiến đầu lưỡi tôi\ntrở nên trơn tru hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国の魅力を確かめ直す旅を通じて、仲国鉄路の魅力を。\nひいては――仲国を旅する自分自身をも、再発見する」
1693 = "「Thông qua chuyến hành trình khẳng định\nlại sức hấp dẫn của Trọng Quốc, để cảm\nnhận sức hấp dẫn của đường sắt Trọng Quốc.\nXa hơn nữa là——tái khám phá chính bản thân\nmình khi đi du lịch Trọng Quốc.」"

# monologue
# JP: 御一夜での暮らしは、旅は。鉄路は僕に――\n僕自身の今と過去、そして未来も示してくれた。
2654 = "Cuộc sống ở Ohimitera, và những chuyến đi.\nĐường sắt đã cho tôi thấy——\nhiện tại, quá khứ, và cả tương lai của\nchính bản thân tôi."

# monologue
# JP: それは決して、特別な体験ではないのだとも、\n日々姫やポーレット――御一夜の皆から、僕は学んだ。
2713 = "Đó tuyệt đối không phải là một trải nghiệm\nđặc biệt nào cả,\ntôi đã học được điều đó từ Hibiki,\nPaulette——và tất cả mọi người ở Ohimitera."

# 【双鉄】
# display as 雙鐵
# JP: 「乗って旅してもらえるのならば、それだけで。\nこれほどの鉄路と国土です。必ず魅力は伝わります」
1577 = "「Chỉ cần họ chịu lên tàu và đi du lịch\nthôi.\nVới tuyến đường sắt và lãnh thổ nhường\nnày. Chắc chắn sức hấp dẫn sẽ được truyền\ntải.」"

# 【志寰】
# display as 志寰
# JP: 「しかし、今の仲国の若者にだと――\nキャンペーンに興味をもってもらうことが難しそうです」
1476 = "「Nhưng, với giới trẻ Trọng Quốc hiện nay\nthì——\ncó vẻ khó để khiến họ hứng thú với chiến\ndịch này.」"

# 【ハチロク】
# display as 八六
# JP: 「キャンペエンの開催とあわせ、フリイきっぷを発売し、\n若年層の鉄道利用を強く促すことが、効果的かと」
1691 = "「Kết hợp với việc tổ chức chiến dịch, phát\nhành vé trọn gói,\nđể thúc đẩy mạnh mẽ giới trẻ sử dụng đường\nsắt, em nghĩ sẽ rất hiệu quả.」"

# 【西瓜】
# display as 西瓜
# JP: 「フリーきっぷ……春節中は仲国国鉄乗り放題、的な？\nそれは――そのきっぷも高価となりそうかと、西瓜は」
2051 = "「Vé trọn gói…… kiểu như đi tàu quốc gia\nTrọng Quốc thoải mái trong dịp Lễ hội mùa\nxuân sao?\nCái đó——Suika nghĩ vé đó có vẻ cũng sẽ rất\nđắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「であらば普通列車の利用、ないしは、六地理大区の\nうちの一区分内有効のみに限定などもできるだろう」
2064 = "「Nếu vậy, có thể giới hạn chỉ sử dụng tàu\nthường, hoặc chỉ\ncó hiệu lực trong một khu vực thuộc sáu\nđại khu địa lý.」"

# 【志寰】
# display as 志寰
# JP: 「そうか！　そうした低価格帯のフリーきっぷもあれば、\n気軽に鉄道に親しんでもらうことができそうですね」
1723 = "「Ra là vậy! Nếu có những loại vé trọn gói\ngiá rẻ như thế,\nthì có vẻ sẽ dễ dàng giúp mọi người gần\ngũi với đường sắt hơn nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ひとつの地理大区の中の18駅のコンプから、\nスタンプラリーの景品ば出してあげるとよかと思うの」
1724 = "「Cho nên, em nghĩ nên bắt đầu trao phần\nthưởng rally thu thập con dấu\ntừ việc hoàn thành 18 nhà ga trong một đại\nkhu địa lý.」"

# 【西瓜】
# display as 西瓜
# JP: 「魅力的な景品を設定すれば、確かに、参加動機の\nさらなる後押しになりそうに、西瓜も思います」
1992 = "「Nếu thiết lập những phần thưởng hấp dẫn,\nthì chắc chắn sẽ\ntạo thêm động lực tham gia, Suika cũng\nnghĩ vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1631 = "「啊！」" 

# monologue
# JP: 思い出したように、日々姫がスケッチブックを開く。
2632 = "Như chợt nhớ ra điều gì, Hibiki mở cuốn sổ\nphác thảo."

# 【日々姫】
# display as 日日姬
# JP: 「北琴鉄道歴史館と、芭岩鉄道と。それぞれ売っとった\nお土産物ば、参考になるかも」
1679 = "「Những món đồ lưu niệm được bán ở Bảo tàng\nLịch sử Đường sắt Bắc Cầm,\nvà Đường sắt Bayan. Có lẽ sẽ hữu ích để\ntham khảo đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1610 = "「Ồ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ。車販のワゴンで売られていたものまで――」
1505 = "「Chà. Cả những thứ được bán trên xe đẩy\nbán hàng trên tàu nữa——」"

# monologue
# JP: さすがは日々姫だ。
2636 = "Quả không hổ danh là Hibiki."

# monologue
# JP: そうしたものの内容をチェックしようと――\nそれさえ、僕には思いつけてもいなかった。
2608 = "Ý định kiểm tra nội dung của những thứ\nđó——\nthậm chí tôi còn chẳng hề nghĩ tới."

# 【双鉄】
# display as 雙鐵
# JP: 「……この芭岩鉄道の、昔のきっぷを模したメモ帳や、\n仲国国鉄マークのピンバッチなどが良い参考になるかと」
1149 = "「……Cuốn sổ tay mô phỏng vé tàu ngày xưa\ncủa Đường sắt Bayan này,\nvà huy hiệu cài áo hình logo đường sắt\nquốc gia Trọng Quốc có lẽ sẽ là tài liệu\ntham khảo tốt.」"

# 【ハチロク】
# display as 八六
# JP: 「この、マグネットシイルも良さそうに思います。\nこれの、東富4の姿のもの。わたくし、購入したいです」
2041 = "「Cái nam châm dán tủ lạnh này trông cũng\nđược lắm ạ.\nLoại có hình Dongfeng 4 này. Em cũng muốn\nmua.」"

# 【西瓜】
# display as 西瓜
# JP: 「ああ――一地理大区18駅の制覇に、ピンバッジや\nマグネットなど、ちょうど良さそうに西瓜は感じます」
1618 = "「A——Để hoàn thành 18 nhà ga trong một đại\nkhu địa lý, thì những phần thưởng\nnhư huy hiệu hay nam châm, Suika cảm thấy\nrất phù hợp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「制覇した地理大区の数が増えれば、それぞれの景品に\nプラスし、さらなる記念品をつけるのも、セオリーだな」
2087 = "「Nếu số lượng đại khu địa lý hoàn thành\ntăng lên, thì cộng thêm\nnhững món đồ lưu niệm khác vào phần thưởng\ntương ứng, cũng là một chiến lược hay.」"

# 【志寰】
# display as 志寰
# JP: 「成程それなら、最初の地理大区を楽しんでくれた人は、\n別の地理大区の旅も、となりますね」
2047 = "「Ra là vậy, nếu thế thì những người đã tận\nhưởng đại khu địa lý đầu tiên,\ncũng sẽ muốn đi du lịch ở đại khu địa lý\nkhác nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そして108駅の全制覇では、偉業達成を称えるに足る、\n長く残るような品を――うむ？」
1906 = "「Và khi hoàn thành toàn bộ 108 nhà ga, sẽ\ncó một món quà\nlưu giữ được lâu dài, xứng đáng để ca ngợi\nthành tựu vĩ đại đó——ừm?」"

# monologue
# JP: 日々姫が、何故か考え込んでいる。
2630 = "Không hiểu sao, Hibiki lại đang trầm ngâm\nsuy nghĩ."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫」
1746 = "「Sao vậy? Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん……レトロきっぷの柄のメモ帳――っていうか、\nレトロきっぷのデザイン、景品にするより……」
1646 = "「Ừm…… cuốn sổ tay có họa tiết vé tàu hoài\ncổ——hay nói đúng hơn,\nthiết kế vé tàu hoài cổ, thay vì làm phần\nthưởng thì……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1626 = "「啊」" 

# monologue
# JP: 言われて気づく。
2718 = "Nghe em ấy nói tôi mới nhận ra."

# monologue
# JP: 確かにこれは、こころを鉄路に誘うようなデザインだ。\nならば旅の記念の品というより、旅のはじめに――
2672 = "Quả thực đây là một thiết kế khơi gợi tâm\nhồn hướng về đường sắt.\nNếu vậy, thay vì làm món đồ kỷ niệm chuyến\nđi, thì ngay từ lúc bắt đầu chuyến đi——"

# 【ハチロク】
# display as 八六
# JP: 「であれば、スタムプラリイのスタムプ帳。\nその裏面の絵柄に使えばよいのでは？」
1431 = "「Nếu vậy, cuốn sổ đóng dấu của rally thu\nthập con dấu.\nDùng nó làm họa tiết cho mặt sau thì sao\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　だな」
1651 = "「Ừm! Đúng vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「そか！　やったら――可能だったら、\nきっぷそのものをレトロデザインにするのもいいかも！」
1722 = "「Ra vậy! Nếu làm thế——nếu có thể,\nthiết kế chính tấm vé đó theo phong cách\nhoài cổ cũng hay đấy!」"

# 【姜】
# display as 姜
# JP: 「なるほど。あえて古さを感じさせることで、\n航空機の旅との差別化をより際立てることが出来ますか」
1540 = "「Ra là vậy. Bằng cách cố tình tạo cảm giác\nhoài cổ,\ncó thể làm nổi bật sự khác biệt so với\nviệc đi du lịch bằng máy bay nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1631 = "「啊！」" 

# monologue
# JP: 中立・静観を保ち続けていた姜さんまでもが、\nついに話に参加してくれた。
2657 = "Ngay cả cô Jiang, người vẫn luôn giữ thái\nđộ trung lập và quan sát,\ncuối cùng cũng tham gia vào câu chuyện."

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。そうできるなら、スタンプラリーへの誘導に、\nさらに大きな効果を発揮できそうに思います」
1860 = "「Đúng vậy. Nếu làm được thế, tôi nghĩ sẽ\nphát huy\nhiệu quả lớn hơn nữa trong việc thu hút\nmọi người tham gia rally thu thập con\ndấu.」"

# 【姜】
# display as 姜
# JP: 「……こうした類のキャンペーンは、\n日ノ本の鉄道が数多く経験していることなのですよね？」
1152 = "「……Những chiến dịch kiểu này,\nngành đường sắt Hinomoto đã có rất nhiều\nkinh nghiệm rồi phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。僕はさほど詳しくありませんが、ポーレット\n――御一夜鉄道社長の雛衣は豊富な知見を有しています」
1862 = "「Đúng vậy. Tôi thì không rành lắm, nhưng\nPaulette\n——Hinai, Giám đốc Đường sắt Ohimitera, có\nkiến thức rất phong phú.」"

# monologue
# JP: 列車がごとりと動き出す――\nあの感触を、体全部が、強く感じる。
2598 = "Đoàn tàu rùng rùng chuyển bánh——\nToàn bộ cơ thể tôi cảm nhận mạnh mẽ được\ncảm giác đó."

# 【双鉄】
# display as 雙鐵
# JP: 「北斗七星と南斗六星。\n北天南天を巡る二編成の豪華クルーズトレイン」
1527 = "「Bắc Đẩu Thất Tinh và Nam Đẩu Lục Tinh.\nHai đoàn tàu du lịch sang trọng đi vòng\nquanh Bắc Thiên và Nam Thiên.」"

# 【日々姫】
# display as 日日姬
# JP: 「それと、フリーきっぷ――水滸伝108きっぷで\n各地方駅という星々を巡ってもらう、DISCOVER CHINA！」
2021 = "「Và cùng với vé trọn gói——vé Thủy Hử 108,\nđể mọi người đi vòng quanh các vì sao là\ncác nhà ga địa phương, DISCOVER CHINA!」"

# 【ハチロク】
# display as 八六
# JP: 「両者を本務機と後補機とし、春節・国慶節の連休での\nレジャアとしての鉄道利用を、老若両面から促す」
1498 = "「Biến cả hai thành đầu máy chính và đầu\nmáy phụ đẩy phía sau, thúc đẩy cả già lẫn\ntrẻ\nsử dụng đường sắt như một phương tiện giải\ntrí trong kỳ nghỉ dài Lễ hội mùa xuân và\nQuốc khánh.」"

# monologue
# JP: 頷き合う。\n僕も日々姫もハチロクも、同じ手応えを感じている。
2572 = "Cùng nhau gật đầu.\nCả tôi, Hibiki và Hachiroku đều cảm nhận\nđược phản hồi tương tự."

# 【双鉄】
# display as 雙鐵
# JP: 「それが、現時点での仲国国鉄の鉄路復権のために考えた、\n僕たち、御一夜鉄道による提案の草稿となります」
2042 = "「Đó là bản thảo đề xuất của chúng tôi,\nĐường sắt Ohimitera,\nnhằm phục hưng đường sắt quốc gia Trọng\nQuốc ở thời điểm hiện tại.」"

# 【志寰】
# display as 志寰
# JP: 「素晴らしいです！　双鉄先生たちの案には、\n実現の可能性だけでなく希望、発展性もあると感じます」
1697 = "「Tuyệt vời quá! Cháu cảm thấy phương án\ncủa thầy Soutetsu\nkhông chỉ có tính khả thi mà còn mang theo\ncả hy vọng và tính phát triển nữa.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も志寰と同じ思いを感じています。その上で単純に\n西瓜も、北斗南斗に乗りたいし、108星を巡りたいです」
1985 = "「Suika cũng có chung suy nghĩ với Zhihuan.\nHơn nữa, đơn giản là\nSuika cũng muốn đi tàu Bắc Đẩu Nam Đẩu, và\nđi vòng quanh 108 vì sao.」"

# 【志寰】
# display as 志寰
# JP: 「だね、西瓜！　そのときは」
1853 = "「Đúng vậy nhỉ, Suika! Đến lúc đó」"

# 【姜】
# display as 姜
# JP: 「『現時点での』というお言葉からは」
1755 = "「Từ cụm từ \"ở thời điểm hiện tại\"」"

# 【志寰】
# display as 志寰＆西瓜
# JP: 「！？」\n「！」
1607 = "「!?」\n「!」"

# monologue
# JP: 志寰君の、西瓜の歓声が止められる。\n姜さんの静かな声には、それだけの力が込められている。
2546 = "Tiếng reo hò của Zhihuan và Suika bị chặn\nlại.\nGiọng nói tĩnh lặng của cô Jiang chứa đựng\nsức mạnh đến nhường ấy."

# 【姜】
# display as 姜
# JP: 「『将来的な仲国国鉄の復権』にむけ――他にもご提言を\nいただけそうかと、図々しくも感じてしまいますが」
1898 = "「Hướng tới \"sự phục hưng của đường sắt\nquốc gia Trọng Quốc trong tương lai\"——tôi\ncó chút trơ trẽn\nkhi cảm thấy rằng, dường như các vị còn có\nđề xuất nào khác nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「提言、などという整ったものではありません。が――\n僕個人の、思いつき……夢想というか、願望でしたら」
1930 = "「Cũng không hẳn là một đề xuất hoàn chỉnh.\nNhưng——\nnếu là ý tưởng của cá nhân tôi…… gọi là\nmộng tưởng, hay mong muốn thì đúng hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「！！？」
1654 = "「!!?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！？」
2085 = "「Anh hai!?」"

# monologue
# JP: 求められていた仕事の範囲を――\n会議で皆で詰めた結果を、踏み越えている。
2789 = "Tôi đang vượt quá phạm vi công việc được\nyêu cầu——\nvượt qua cả kết quả mà mọi người đã thống\nnhất trong cuộc họp."

# 【姜】
# display as 姜
# JP: 「では、雑談として――他愛のない世間話、\n夢物語として、それをお聞かせはいただけませんか」
2066 = "「Vậy thì, coi như là trò chuyện phiếm——một\ncâu chuyện phiếm vô thưởng vô phạt,\nnhư một câu chuyện trong mơ, anh có thể kể\ncho tôi nghe được không.」"

# monologue
# JP: そうと理解をしていてもなお\n――言葉を、思いを止められない。
2415 = "Dù hiểu rõ điều đó, nhưng\n——tôi không thể ngăn lời nói và suy nghĩ\ncủa mình lại."

# monologue
# JP: なぜって、これは夢だから。\n終着駅の、その先へと伸びゆく可能性だから。
2419 = "Bởi vì, đây là một giấc mơ.\nLà khả năng vươn xa hơn nữa từ nhà ga cuối\ncùng."

# 【双鉄】
# display as 雙鐵
# JP: 「考えました。いえ、悉究しました――\n何故、この話が『僕ら』のところに来たのかを」
1792 = "「Tôi đã suy nghĩ. Không, tôi đã suy xét\ncặn kẽ——\nTại sao, chuyện này lại đến tay \"chúng\ntôi\".」"

# monologue
# JP: ハチロクを見る。
2596 = "Nhìn Hachiroku."

# monologue
# JP: 日々姫を見る。
2380 = "Nhìn Hibiki."

# monologue
# JP: ふたりとも、もう落ち着いた顔をして。\n静かに、強く、頷いてくれる。
2444 = "Cả hai đều đã lấy lại vẻ bình tĩnh.\nLặng lẽ, và mạnh mẽ, gật đầu với tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らであれば将来的に。6つの地理大区全ての拠点駅\n――仲国全土を6日間で周遊する列車をご提案できます」
1781 = "「Nếu là chúng tôi thì trong tương lai. Có\nthể đề xuất một chuyến tàu đi vòng quanh\nnhà ga cứ điểm của cả 6 đại khu địa lý\n——toàn bộ Trọng Quốc trong 6 ngày.」"

# 【志寰】
# display as 志寰
# JP: 「6日間で周遊！？　それはとても」
1677 = "「Đi vòng quanh trong 6 ngày!? Cái đó thì\nquá」"

# monologue
# JP: 恐らく。無理、と――\n発しかけた言葉を飲み込み、志寰君は苦しげな顔をする。
2568 = "Có lẽ. Là vô lý, thưa——\nNuốt lại những lời định thốt ra, Zhihuan\nlộ vẻ mặt đau khổ."

# 【志寰】
# display as 志寰
# JP: 「……仮にできたとしても、朝から夜まで全部、\nまるまるずっと乗り続けるだけで、観光なんてとても」
1126 = "「……Giả sử có làm được đi nữa, thì từ sáng\nđến tối,\nchỉ có việc ngồi tàu liên tục, làm sao mà\nđi tham quan được.」"

# 【西瓜】
# display as 西瓜
# JP: 「志寰――」
1742 = "「Zhihuan——」"

# monologue
# JP: 言って、西瓜が目を閉じる。\nややあり開かれる瞳は今は――強い輝きに彩られている。
2769 = "Nói rồi, Suika nhắm mắt lại.\nKhi mở mắt ra, đôi mắt ấy giờ đây——được tô\nđiểm bởi một thứ ánh sáng mạnh mẽ."

# 【西瓜】
# display as 西瓜
# JP: 「観光の時間を作ることも……演算上は――可能です。\n可能――だって、御一夜鉄道には\x%lクハ26;#00ffc040;クハ26%l;#;－000編成がある」
1902 = "「Việc tạo ra thời gian tham quan…… trên\ntính toán thì——là có thể.\nCó thể——bởi vì, Đường sắt Ohimitera có\nđoàn tàu Kuha 26-000.」"

# 【志寰】
# display as 志寰
# JP: 「あっ！！！」
1636 = "「A!!!」"

# monologue
# JP: 志寰君も、同じ理解にたどり着いたらしい。
2555 = "Zhihuan có vẻ cũng đã hiểu ra vấn đề."

# monologue
# JP: それを待っていたかのように、姜さんも、\nあらためて僕に問いかけてくる。
2702 = "Như thể chờ đợi điều đó, cô Jiang\nmột lần nữa đặt câu hỏi cho tôi."

# 【姜】
# display as 姜
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;は、特急系試験\x%l電車;#00ffc040;電車%l;#;。その編成はナインスターズ\n計画のため完全復元された――で、間違いないですね？」
1083 = "「Kuha 26 là tàu điện thử nghiệm tốc hành.\nĐoàn tàu đó đã được\nphục chế hoàn toàn cho kế hoạch Nine\nStars——điều này không sai chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうです。復元のためのデータは、復元実行の前段階で\n例外なしに公開することで関係者の合意を得ています」
1889 = "「Đúng vậy. Dữ liệu phục chế đã được sự\nđồng thuận của các bên liên quan\nbằng cách công khai không ngoại lệ ở giai\nđoạn trước khi thực hiện phục chế.」"

# monologue
# JP: 帝鉄解体にともなって、権利者そのものが消滅している。\n赤井宮司とニイロクは、残されたデータを私有もできた。
2801 = "Cùng với việc giải thể Teitetsu, bản thân\nngười nắm giữ quyền lợi cũng biến mất.\nĐền chủ Akai và Niiroku hoàn toàn có thể\ntư hữu hóa dữ liệu còn sót lại."

# monologue
# JP: けれど宮司は、関係各位に連絡をとり、データの全てを、\n鉄道発展のそのために、公開することで合意したのだ。
2668 = "Nhưng đền chủ đã liên lạc với các bên liên\nquan, và đạt được thỏa thuận\ncông khai toàn bộ dữ liệu vì sự phát triển\ncủa đường sắt."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;の走るレールは、狭軌、1067mmの軌間です。\n営業運転での最高速は、時速100kmにとどまりますが」
1081 = "「Đường ray mà Kuha 26 chạy là khổ hẹp, khổ\nđường sắt 1067mm.\nTốc độ tối đa trong vận hành thương mại\ndừng lại ở mức 100km/h.」"

# 【ハチロク】
# display as 八六
# JP: 「設計最高速度は時速160km。これは、\n復元後の試験運転でも、余裕をもって達成されました」
1477 = "「Tốc độ tối đa theo thiết kế là 160km/h.\nTốc độ này,\nngay cả trong quá trình chạy thử sau khi\nphục chế, cũng đạt được một cách dễ dàng.」"

# 【志寰】
# display as 志寰
# JP: 「狭軌で時速160km！？　なら、西瓜――\nさっき、『演算上は可能』だといっていたのは……」
1689 = "「Khổ hẹp mà chạy 160km/h!? Vậy thì,\nSuika——\ncâu \"trên tính toán thì là có thể\" lúc nãy\ncậu nói là……」"

# 【西瓜】
# display as 西瓜
# JP: 「うん。志寰。時速200km以上での営業運転も可能。\n\x%lクハ26;#00ffc040;クハ26%l;#;と東富4Dの、技術とノウハウを組み合わせれば」
1891 = "「Ừ. Zhihuan. Vận hành thương mại với tốc\nđộ trên 200km/h cũng là có thể.\nNếu kết hợp công nghệ và bí quyết của Kuha\n26 và Dongfeng 4D.」"

# 【双鉄】
# display as 雙鐵
# JP: 「我々には\x%l電車;#00ffc040;電車%l;#;特急\x%lクハ26;#00ffc040;クハ26%l;#;があり。仲国国鉄には東富4Dと\n標準軌、1435mm軌での列車運用の豊富な蓄積があります」
1782 = "「Chúng tôi có Kuha 26 tốc hành tàu điện.\nCòn đường sắt quốc gia Trọng Quốc có\nDongfeng 4D\nvà sự tích lũy phong phú trong việc vận\nhành tàu trên khổ tiêu chuẩn 1435mm.」"

# 【志寰】
# display as 志寰
# JP: 「つまり――双鉄先生は――」
2072 = "「Tức là——thầy Soutetsu——」"

# monologue
# JP: 志寰君が、僕をみつめる。\nごくり、その喉が大きく動く。
2558 = "Zhihuan nhìn chằm chằm vào tôi.\nỰc, yết hầu cậu ấy chuyển động mạnh."

# 【志寰】
# display as 志寰
# JP: 「標準軌完全電化による超高速鉄道を、\n仲国に走らせるよう――おっしゃっているのですか？」
2012 = "「Thầy đang nói——sẽ cho chạy đường sắt siêu\ntốc\nbằng cách điện khí hóa hoàn toàn khổ tiêu\nchuẩn ở Trọng Quốc sao?」"

# 【西瓜】
# display as 西瓜
# JP: 「新・幹線鉄道。志寰」
1833 = "「Đường sắt Tân Cán Tuyến. Zhihuan.」"

# 【志寰】
# display as 志寰
# JP: 「え？」
# 1609 = "「哎？」" 

# 【西瓜】
# display as 西瓜
# JP: 「新・幹線鉄道。日ノ本ではその名前で、\n同じ列車が、すでに研究され検討されている」
1832 = "「Đường sắt Tân Cán Tuyến. Ở Hinomoto,\nchuyến tàu tương tự\nđã và đang được nghiên cứu, xem xét dưới\ncái tên đó.」"

# monologue
# JP: 実に良く調べてくれている。\nそのこと自体は、素直に嬉しい。けれども、今は――
2449 = "Tìm hiểu thực sự rất kỹ.\nBản thân điều đó khiến tôi thực lòng vui\nsướng. Nhưng mà, bây giờ thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「今の段階では名称は好きでよかろう。新・幹線でも、\n超高速鉄道でも。大切なのは、それで何を為せるかだ」
1916 = "「Ở giai đoạn này thì gọi tên là gì cũng\nđược. Dù là Tân Cán Tuyến,\nhay đường sắt siêu tốc. Quan trọng là,\nchúng ta có thể làm được gì với nó.」"

# 【志寰】
# display as 志寰
# JP: 「為せることは……数多くあるように思います」
1959 = "「Những việc có thể làm…… cháu nghĩ là có\nrất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同様に感じている。が――まずは、将来的な提言。\n先程の“夢物語”を現実化する、ただ一点に絞り込もう」
1772 = "「Tôi cũng cảm thấy như vậy. Nhưng——trước\ntiên, là đề xuất cho tương lai.\nHãy tập trung vào một điểm duy nhất, đó là\nhiện thực hóa \"câu chuyện trong mơ\" lúc\nnãy.」"

# 【志寰】
# display as 志寰
# JP: 「あ！！！」
# 1636 = "「啊！！！」" 

# monologue
# JP: 志寰君の中でも、全てのポイントが切り替わったようだ。\nたった一つの、たった七文字の解へと向けて。
2554 = "Có vẻ như mọi suy nghĩ trong đầu Zhihuan\ncũng đã thay đổi.\nHướng tới một đáp án duy nhất, chỉ vỏn vẹn\nbảy chữ."

# 【双鉄】
# display as 雙鐵
# JP: 「――寝台夜行新幹線」
1090 = "「——Tân Cán Tuyến đêm giường nằm.」"

# 【志寰】
# display as 志寰
# JP: 「寝台。夜行。――新幹線」
1961 = "「Giường nằm. Chạy đêm. ——Tân Cán Tuyến.」"

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本では新・幹線――標準軌の専用線を敷かねば\nいけんばってん、仲国は最初から標準軌やけん」
1686 = "「Ở Hinomoto, Tân Cán Tuyến——phải trải\nđường ray chuyên dụng khổ tiêu chuẩn,\nnhưng Trọng Quốc thì ngay từ đầu đã là khổ\ntiêu chuẩn rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「関連設備にかかる投資は、日ノ本よりもずっと――\n遥かに小さくて済むことでしょう」
1688 = "「Vốn đầu tư cho các thiết bị liên quan, so\nvới Hinomoto thì chắc chắn——\nsẽ ít hơn rất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、実現化へのハードルは低い。そして――\n新・幹線――超高速鉄道こそは、真なる鉄道復権を」
1811 = "「Do đó, rào cản để hiện thực hóa là rất\nthấp. Và——\nTân Cán Tuyến——đường sắt siêu tốc mới\nchính là sự phục hưng thực sự của đường\nsắt.」"

# monologue
# JP: 志寰君が頷く。\n晴れ晴れとした顔をして。瞳をまっすぐ、僕に向け。
2560 = "Zhihuan gật đầu.\nVới khuôn mặt rạng rỡ. Ánh mắt hướng thẳng\nvề phía tôi."

# 【志寰】
# display as 志寰
# JP: 「富裕層にも、若者たちにも違いなく愛され、実用される\n――全く新しい鉄道になりますね。超高速鉄道は」
2019 = "「Được cả giới thượng lưu lẫn giới trẻ yêu\nmến, và mang tính thực dụng\n——Sẽ trở thành một loại hình đường sắt\nhoàn toàn mới nhỉ. Đường sắt siêu tốc ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうと。僕も夢見ている。そして、その夢は、\n日仲両国の技術協力が為れば、きっと叶うと」
1795 = "「Tôi cũng mơ như vậy. Và giấc mơ đó,\nnếu có sự hợp tác công nghệ của hai nước\nNhật - Trọng, chắc chắn sẽ thành hiện\nthực.」"

# 【西瓜】
# display as 西瓜
# JP: 「東富が……」
1879 = "「Dongfeng sẽ……」"

# monologue
# JP: 西瓜が、志寰君を見上げる。\n甘えるように、けれども深く、いたわるように。
2757 = "Suika ngước nhìn Zhihuan.\nNhư làm nũng, nhưng lại sâu sắc, như muốn\nan ủi."

# 【西瓜】
# display as 西瓜
# JP: 「仲国国鉄が――老師や、志寰や、西瓜たち――\nみんなが生み出し、守って育てた、西瓜たちの機関車が」
1473 = "「Đường sắt quốc gia Trọng Quốc——Lão sư,\nZhihuan, và nhóm Suika——\nĐầu máy của nhóm Suika, được mọi người tạo\nra, bảo vệ và nuôi dưỡng.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、西瓜。東富はきっと、新しい鉄路を築く、\nその大きな大きな礎のひとつとなりましょう」
1869 = "「Đúng vậy, Suika. Dongfeng chắc chắn sẽ\ntrở thành\nmột trong những nền tảng to lớn để xây\ndựng tuyến đường sắt mới.」"

# 【西瓜】
# display as 西瓜
# JP: 「ああ！」
1650 = "「A!」"

# monologue
# JP: 西瓜が動く。\n志寰君へと抱きついて、その制服に顔を埋める。
2753 = "Suika di chuyển.\nCô bé ôm chầm lấy Zhihuan, vùi mặt vào bộ\nđồng phục của cậu."

# 【姜】
# display as 姜
# JP: 「……東富は東風となり、北斗と南斗の全天を巡り、\n遥か日ノ本にまで、夜明けを――新時代を運んでいく」
1144 = "「……Dongfeng sẽ trở thành ngọn gió đông, đi\nvòng quanh toàn bộ bầu trời của Bắc Đẩu và\nNam Đẩu,\nmang theo bình minh——thời đại mới, đến tận\nHinomoto xa xôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1631 = "「啊！」" 

# 【姜】
# display as 姜
# JP: 「双鉄先生！！！」
2091 = "「Thầy Soutetsu!!!」"

# monologue
# JP: 姜さんが、がばりと僕の手を掴む。\n小さな両手で、僕の両手を抱えるように包み込む。
2480 = "Cô Jiang bất ngờ nắm lấy tay tôi.\nBằng đôi bàn tay nhỏ bé, cô ấy bao bọc lấy\ncả hai bàn tay tôi."

# 【姜】
# display as 姜
# JP: 「謝謝。双鉄先生。\n私は、これを求めていました」
2011 = "「Cảm ơn. Thầy Soutetsu.\nTôi đã luôn tìm kiếm điều này.」"

# monologue
# JP: 当方ではなく“私”と言って、\n姜さんは何度も力強く、僕の両手ごとその手を揺する。
2491 = "Không xưng \"chúng tôi\" mà là \"tôi\",\ncô Jiang dùng sức lắc mạnh đôi bàn tay\nđang nắm lấy tay tôi nhiều lần."

# 【双鉄】
# display as 雙鐵
# JP: 「これ、とは」
1753 = "「Điều này, là sao.」"

# 【姜】
# display as 姜
# JP: 「双鉄先生の伸ばすレールは、歌い、物語るレールです。\n私は仲国の鉄路の上にも、それを紡いで欲しかった」
2089 = "「Đường ray mà thầy Soutetsu vươn dài, là\nđường ray biết hát, biết kể chuyện.\nTôi cũng muốn dệt nên điều đó trên tuyến\nđường sắt của Trọng Quốc.」"

# 【ハチロク】
# display as 八六＆日日姬
# JP: 「ああ」\n「ああ！」
1627 = "「A」\n「A!」"

# monologue
# JP: 異口同音に、深い納得の声が聞こえる。\n歌う、など……意識したこともなかったが。
2369 = "Tôi nghe thấy những giọng nói đồng thanh,\nthể hiện sự thấu hiểu sâu sắc.\nHát, sao…… tôi chưa từng nghĩ tới điều đó."

# 【姜】
# display as 姜
# JP: 「双鉄先生の伸ばす、レールという物語の上を、\n日々姫先生の挿絵――デザインされた列車が走り、彩る」
2090 = "「Trên câu chuyện mang tên đường ray mà\nthầy Soutetsu vươn dài,\nchuyến tàu được thiết kế——bức tranh minh\nhọa của cô Hibiki sẽ chạy qua và tô điểm\ncho nó.」"

# monologue
# JP: 姜さんの言葉自体が、まるで、詩だ。
2485 = "Bản thân lời nói của cô Jiang, giống hệt\nnhư một bài thơ."

# 【姜】
# display as 姜
# JP: 「それこそが――ナインスターズを成功に導いた力だと、\n私は認識していました」
1801 = "「Đó chính là——sức mạnh đã dẫn dắt Nine\nStars đến thành công,\ntôi đã nhận thức được như vậy.」"

# monologue
# JP: 絶賛されている。\nとても嬉しい。
2518 = "Được khen ngợi hết lời.\nTôi rất vui."

# monologue
# JP: が、だからこそ――\n評価は正しく行われるべきとも、強く感じる。
2328 = "Nhưng, chính vì vậy——\ntôi càng cảm thấy mạnh mẽ rằng việc đánh\ngiá cần phải được thực hiện một cách chính\nxác."

# 【双鉄】
# display as 雙鐵
# JP: 「光栄です。が――ナインスターズを成功に導いたのは、\n決して僕の――僕と日々姫の力などではありません」
1820 = "「Thật vinh dự. Nhưng——điều dẫn dắt Nine\nStars đến thành công,\ntuyệt đối không phải là sức mạnh của\ntôi——của tôi và Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「ですです！　にぃにはともかく、\n私のしたことなんて、本当にほんのちょっぴりで」
1580 = "「Đúng vậy đúng vậy! Anh hai thì không nói,\nnhưng những gì em làm, thực sự chỉ là một\nchút xíu thôi.」"

# 【姜】
# display as 姜
# JP: 「その”ちょっぴり”が、大樹の種であり、\nはじめの水の一滴なのです。双鉄先生、日々姫先生」
2055 = "「\"Một chút xíu\" đó, chính là hạt giống của\ncây đại thụ,\nlà giọt nước khởi nguồn đấy. Thầy\nSoutetsu, cô Hibiki.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――はい。\nまことに、左様でございますね」
1621 = "「A——vâng.\nQuả thực là như vậy ạ.」"

# monologue
# JP: 幸せそうに、満足そうに、ハチロクは微笑してくれる。
2375 = "Hachiroku mỉm cười, trông thật hạnh phúc\nvà mãn nguyện."

# monologue
# JP: 自分のマスターが、自分の家族が正しく評価され嬉しいと、\n笑顔が、雄弁に物語ってくれている。
2722 = "Rằng em ấy rất vui khi Master của mình,\ngia đình của mình được đánh giá đúng đắn,\nnụ cười đó đã hùng hồn nói lên tất cả."

# 【姜】
# display as 姜
# JP: 「よい物語は、理解しやすい。伸びゆく大樹の下には\n数多の叡智が集まる。――ゆえに、私はそれを求めた」
1963 = "「Một câu chuyện hay, rất dễ hiểu. Dưới tán\ncây đại thụ đang vươn cao\nsẽ tập hợp vô số trí tuệ. ——Vì vậy, tôi đã\ntìm kiếm điều đó.」"

# monologue
# JP: 姜さんの手がほどかれて、\n今度は日々姫の両手をしっかり、包み込む。
2487 = "Tay cô Jiang buông ra,\nlần này lại bao bọc chặt lấy hai bàn tay\ncủa Hibiki."

# 【姜】
# display as 姜
# JP: 「物語に気づいてもらい、読んでもらうための絵を。\nですので日々姫先生に、仲国でも描いていただきたい」
1904 = "「Bức tranh để mọi người chú ý đến câu\nchuyện, và đọc nó.\nVì vậy, tôi muốn cô Hibiki vẽ ở Trọng Quốc\nnữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは――もちろん。正式に発注していただけるなら。\nもちろん引き受けたいですし、引き受けられたら全力で」
2038 = "「Chuyện đó——tất nhiên rồi. Nếu được đặt\nhàng chính thức.\nTất nhiên là em muốn nhận, và nếu nhận em\nsẽ dốc toàn lực.」"

# 【姜】
# display as 姜
# JP: 「まずは北斗と南斗の十三星。ついで水滸伝の百八星。\nそうして全天に、日ノ本に、超高速列車を走らせるには」
2111 = "「Trước hết là 13 vì sao của Bắc Đẩu và Nam\nĐẩu. Tiếp đến là 108 vì sao của Thủy Hử.\nĐể rồi sau đó cho chạy tàu siêu tốc trên\ntoàn bầu trời, và đến tận Hinomoto.」"

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道だけでは足りない。日ノ本仲国、二つの国の、\nより多くの知恵と技術の集積が必須となるでしょう」
1484 = "「Chỉ Đường sắt Ohimitera thôi thì không\nđủ. Sẽ cần phải tập hợp\nnhiều trí tuệ và công nghệ hơn nữa từ hai\nnước Hinomoto và Trọng Quốc.」"

# 【姜】
# display as 姜
# JP: 「ならば私は出世しましょう。全ての星々を掲げるために、\n東風を日ノ本へと届かせるために発言力を育てましょう」
1901 = "「Vậy thì tôi sẽ thăng tiến. Để giương cao\ntất cả các vì sao,\nđể đưa ngọn gió đông đến Hinomoto, tôi sẽ\nnuôi dưỡng tiếng nói của mình.」"

# monologue
# JP: 再び、姜さんが僕へとその手を差し出してくる。
2474 = "Một lần nữa, cô Jiang lại đưa tay về phía\ntôi."

# monologue
# JP: 無理やり包み込むことはなく、\n右手をまっすぐ――握手を求め、差し出してくる。
2322 = "Không còn là sự bao bọc ép buộc,\nmà là đưa thẳng tay phải ra——yêu cầu một\ncái bắt tay."

# 【姜】
# display as 姜
# JP: 「ですので、双鉄先生もご出世ください。\n日ノ本の鉄道界を、お束ねください」
1803 = "「Vì vậy, thầy Soutetsu cũng hãy thăng tiến\nđi.\nHãy thống nhất giới đường sắt Hinomoto.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！？　僕にはとてもそのような才覚は。先ほども\nお話ししたように、ただ、周囲の協力に恵まれただけで」
1604 = "「!!? Tôi làm gì có tài năng như vậy. Như\nlúc nãy\ntôi đã nói, tôi chỉ may mắn nhận được sự\ngiúp đỡ của mọi người xung quanh thôi.」"

# 【姜】
# display as 姜
# JP: 「恵まれたものを使わず死蔵することは、\n恵みを誰にも還元せず、独り占めするのと同じことです」
1731 = "「Được ban phước mà không sử dụng, để nó\nchết dần chết mòn,\ncũng giống như việc không hoàn trả phước\nlành cho ai, mà giữ khư khư cho riêng mình\nvậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1654 = "「嗯！！？」" 

# monologue
# JP: 姜さんの視線が、言葉が、突き刺さる。
2483 = "Ánh mắt, và lời nói của cô Jiang, như đâm\nthấu tâm can tôi."

# 【姜】
# display as 姜
# JP: 「恵まれたのならば、それを存分に活かすことです。\n活かせばそのまま、恵みは社会全体へと行き渡ります」
1734 = "「Nếu đã được ban phước, thì hãy tận dụng\nnó một cách tối đa.\nNếu tận dụng được, phước lành đó sẽ lan\ntỏa ra toàn xã hội.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1616 = "「A——」"

# monologue
# JP: そのお手本なら、赤井宮司が、淵さんが――\nポーレットが、真闇姉が、稀咲が、元忠さんが――
2778 = "Nếu nói về tấm gương đó, thì đền chủ Akai,\nông Fuchi——\nPaulette, chị Mayami, Kisaki, ông\nMototada——"

# monologue
# JP: いや、凪もふかみもハチロクもれいなも日々姫も……\n縁を頂いた全てのひとが、僕に示してくれている。
2772 = "Không, cả Nagi, Fukami, Hachiroku, Reina\nvà Hibiki nữa……\nTất cả những người mà tôi có duyên gặp gỡ,\nđều đã cho tôi thấy điều đó."

# 【姜】
# display as 姜
# JP: 「ですから恵みを、より広く遠くへと還元できるよう。\n双鉄先生――どうぞ、お立場を整えてください」
1812 = "「Vì vậy, để có thể hoàn trả phước lành\nrộng hơn, xa hơn.\nThầy Soutetsu——xin hãy chuẩn bị sẵn sàng\nvị thế của mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、今まで与えてもらった全てのものを……\nより広くへと、行き渡らせるため――」
1899 = "「Để lan tỏa tất cả những gì tôi đã được\ntrao tặng cho đến nay……\nrộng rãi hơn nữa——」"

# 【姜】
# display as 姜
# JP: 「絵と物語を、現実の物と為す。日ノ本では雛衣、稀咲\n真闇女士たちが果たしたことを、仲国では、きっと私が」
1800 = "「Biến bức tranh và câu chuyện thành hiện\nthực. Những gì Hinai, Kisaki\nvà cô Mayami đã hoàn thành ở Hinomoto, tôi\nchắc chắn sẽ làm được ở Trọng Quốc.」"

# 【西瓜】
# display as 西瓜
# JP: 「西瓜も、そのための力になります。北斗と南斗に。\nそして超高速鉄道に。西瓜は、志寰と乗りたく思います」
1987 = "「Suika cũng sẽ trở thành sức mạnh cho điều\nđó. Lên Bắc Đẩu và Nam Đẩu.\nVà cả đường sắt siêu tốc nữa. Suika muốn\nđi cùng Zhihuan.」"

# 【志寰】
# display as 志寰
# JP: 「うん。乗ろう。西瓜、必ずふたりで一緒に。\nそのために、僕もできることを全部果たすよ」
1656 = "「Ừ. Đi thôi. Suika, chắc chắn hai chúng ta\nsẽ đi cùng nhau.\nVì điều đó, tớ cũng sẽ làm tất cả những gì\ncó thể.」"

# 【西瓜】
# display as 西瓜
# JP: 「志寰……」
1744 = "「Zhihuan……」"

# 【志寰】
# display as 志寰
# JP: 「西瓜……」
1973 = "「Suika……」"

# monologue
# JP: 志寰君と西瓜の手と手が、恋人繋ぎに結ばれる。
2542 = "Bàn tay của Zhihuan và Suika đan vào nhau\nnhư những người yêu nhau."

# monologue
# JP: それはなにか、尊いものに――\nとても尊い啓示のように、僕には思える。
2792 = "Đó là một điều gì đó rất đỗi thiêng\nliêng——\ntôi cảm thấy nó giống như một sự mặc khải\nvô cùng cao quý."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、本当に恵まれているのだということを。\n今、ようやく理解させて頂いたように感じます」
1141 = "「……Việc tôi thực sự được ban phước.\nBây giờ, tôi cảm thấy mình cuối cùng cũng\nđã hiểu ra.」"

# monologue
# JP: 姜さんが伸ばし続けてくれていた、\n右手と強く、握手する。
2579 = "Tôi bắt tay thật chặt với bàn tay phải\nmà cô Jiang vẫn đang đưa ra chờ đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「立場を得ることが、その恵みを広くに還す役にたつなら。\n僕はきっと――立場を得ましょう」
1814 = "「Nếu việc có được vị thế sẽ giúp ích cho\nviệc hoàn trả phước lành đó rộng rãi hơn.\nTôi chắc chắn——sẽ đạt được vị thế đó.」"

# 【姜】
# display as 姜
# JP: 「双鉄先生」
2088 = "「Thầy Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「ね！　姜さん！　ね？　にぃに」
1480 = "「Đúng không! Cô Jiang! Đúng không? Anh\nhai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ！」
1663 = "「Hửm? À!」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、素敵なことですね」
1671 = "「Ufufu, thật là một điều tuyệt vời nhỉ.」"

# monologue
# JP: 姜さんと手を繋ぎなおして、僕の左手を日々姫に預ける。\n日々姫はハチロクと手を繋ぎ、ハチロクは西瓜と手を繋ぐ。
2476 = "Bắt tay lại với cô Jiang, tôi giao tay\ntrái của mình cho Hibiki.\nHibiki nắm tay Hachiroku, Hachiroku nắm\ntay Suika."

# 【志寰】
# display as 志寰
# JP: 「なるほど！　これは本当に素敵だ」
1539 = "「Ra là vậy! Thế này thì thật tuyệt vời.」"

# monologue
# JP: そして西瓜と手を繋いだままの志寰君が、\n姜さんの手を受け取れば――
2707 = "Và Zhihuan, người vẫn đang nắm tay Suika,\nđón lấy tay cô Jiang thì——"

# 【西瓜】
# display as 西瓜
# JP: 「環状線ですね。とても小さな。\nけれど、日ノ本と仲国を繋ぐ、環状線」
2046 = "「Là một tuyến đường vòng tròn nhỉ. Rất\nnhỏ.\nNhưng, là tuyến đường vòng tròn kết nối\nHinomoto và Trọng Quốc.」"

# monologue
# JP: 僕らがつないだ手の中を、おんなじ熱が走っている。\nおなじのぞみが、列車となって駆け巡っている。
2582 = "Một sức nóng đồng điệu đang chạy qua những\nbàn tay đang nắm lấy nhau của chúng tôi.\nCùng một mong ước, hóa thành đoàn tàu chạy\nquanh."

# monologue
# JP: その実感は、僕のこころを強くする。\nきっと叶うと――叶えてみせると――思えるほどに。
2790 = "Cảm giác chân thực đó, khiến trái tim tôi\ntrở nên mạnh mẽ.\nĐến mức tôi nghĩ rằng, chắc chắn sẽ thành\nhiện thực——và tôi sẽ làm cho nó thành hiện\nthực."

# 【双鉄】
# display as 雙鐵
# JP: 「新・幹線鉄道を、あるいは超高速鉄道を。\nきっと、ここにある小さな種から、始めの水の[ひとしずく,1]一滴から」
1834 = "「Đường sắt Tân Cán Tuyến, hay đường sắt\nsiêu tốc.\nChắc chắn, sẽ bắt đầu từ hạt giống nhỏ bé\nở đây, từ giọt nước khởi nguồn.」"

# 【姜】
# display as 姜
# JP: 「必ず実らせ、茂らせましょう。その根で、枝葉で、\n仲国と日ノ本とを、それぞれの全土を巡らせましょう」
1965 = "「Nhất định sẽ đơm hoa kết trái, xum xuê\ncành lá. Bằng bộ rễ đó, bằng cành lá đó,\nhãy để chúng lan tỏa khắp toàn bộ lãnh thổ\ncủa Trọng Quốc và Hinomoto.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、どうぞ、鬨の声を」
2098 = "「Ngài Soutetsu, xin hãy hô vang tiếng reo\nhò chiến thắng đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1649 = "「嗯」" 

# monologue
# JP: 頷いてくれる。みなが笑顔で。\nならば今は、僕が音頭を取らせてもらおう。
2442 = "Mọi người gật đầu với tôi. Với nụ cười\ntrên môi.\nVậy thì bây giờ, hãy để tôi bắt nhịp."

# 【双鉄】
# display as 雙鐵
# JP: 「きっと、繋ごう。新しいレールを！　ふたつの国を！\n――[えい]曳！　[えい]叡！」
1708 = "「Nhất định, chúng ta sẽ kết nối. Tuyến\nđường ray mới! Hai quốc gia!\n——Êi! Êi!」"

# 【双鉄】
# display as 全員
# JP: 「王ー！」「王！」「おー！」\n「応！」「オー！」「オー！！」
1612 = "「Ô!」「Ô!」「Ô!」\n「Ô!」「Ô!」「Ô!!」"

# monologue
# JP: 声があわさる、こころが重なる。
2717 = "Những giọng nói hòa làm một, những trái\ntim đồng điệu."

# monologue
# JP: そうして、手と手は、再び交わるそのときのため――\nいまは静かに、ほどかれる。
2711 = "Và rồi, những bàn tay, vì khoảnh khắc sẽ\nđan vào nhau một lần nữa——\nbây giờ lặng lẽ buông ra."

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、日々姫先生。\n姜秘書とのご歓談中、大変恐縮なのですけれど」
2092 = "「Thầy Soutetsu, cô Hibiki.\nRất xin lỗi vì phải ngắt lời trong lúc hai\nngười đang trò chuyện vui vẻ với cô Jiang,\nnhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1616 = "「啊——」" 

# monologue
# JP: できうる限り、細かい点を詰めておきたい。\n望んでしまえば時間など、いくらあっても足りなくなる。
2570 = "Tôi muốn chốt lại những điểm chi tiết nhất\ncó thể.\nNếu cứ mong muốn thì thời gian có bao\nnhiêu cũng không đủ."

# 【西瓜】
# display as 西瓜
# JP: 「出国手続きにかかってしまう時間などを考えると、\nそろそろ」
1953 = "「Nghĩ đến thời gian làm thủ tục xuất cảnh,\nthì cũng sắp đến lúc rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1649 = "「嗯」" 

# 【姜】
# display as 姜
# JP: 「……しつこくなってしまうのはわかっていますが、\n滞在のご延長などは」
1136 = "「……Tôi biết là mình hơi dai dẳng,\nnhưng việc kéo dài thời gian lưu trú thì\nsao」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういっていただけ光栄です。\nですが、今はひとまず、日ノ本へ帰ります」
1816 = "「Được cô nói vậy tôi rất vinh dự.\nNhưng, bây giờ trước mắt, chúng tôi sẽ về\nHinomoto.」"

# 【日々姫】
# display as 日日姬
# JP: 「これ以上素敵なものみたら、もっともっとって欲張って、\n一枚の絵に、きっとまとめきれなくなっちゃいますけん」
1998 = "「Nếu nhìn thấy thêm những điều tuyệt vời\nhơn nữa, em sẽ lại tham lam muốn nhiều\nhơn,\nvà chắc chắn sẽ không thể tóm gọn vào một\nbức tranh được mất.」"

# 【姜】
# display as 姜
# JP: 「かしこまりました。では、ひとまずは」
1700 = "「Tôi hiểu rồi. Vậy thì, tạm thời」"

# monologue
# JP: 握手する。
2583 = "Bắt tay."

# monologue
# JP: 姜さんと、志寰君と、西瓜と。\n今度はとても短い握手を。
2494 = "Với cô Jiang, với Zhihuan, và với Suika.\nLần này là một cái bắt tay rất ngắn."

# 【志寰】
# display as 志寰
# JP: 「先生たちのできるだけ早いご再訪を、\n楽しみにお待ちいたします」
1780 = "「Chúng tôi sẽ rất mong chờ\nsự trở lại sớm nhất có thể của các vị.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。志寰君たちも、\nいつでも御一夜に遊びに来てくれ。全力で歓迎しよう」
1694 = "「Cảm ơn. Zhihuan và Suika cũng vậy,\nlúc nào cũng có thể đến Ohimitera chơi\nnhé. Chúng tôi sẽ chào đón hết mình.」"

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます！　右田先生！！\n西瓜は、今度は、志寰とふたりっきりで行きたいです」
2103 = "「Cảm ơn thầy rất nhiều! Thầy Migita!!\nLần tới, Suika muốn đi riêng với Zhihuan\nthôi.」"

# 【志寰】
# display as 志寰
# JP: 「だね。僕もだ、西瓜」
1725 = "「Đúng vậy nhỉ. Tớ cũng thế, Suika.」"

# monologue
# JP: 姜さんが、くすりと小さな笑いを零す。
2272 = "Cô Jiang bật cười khúc khích."

# 【姜】
# display as 姜
# JP: 「そういうことなら喜んで。\n私と老師は、仲間はずれにならせてもらいましょう」
1845 = "「Nếu vậy thì tôi rất sẵn lòng.\nTôi và lão sư xin phép được rút lui, không\nlàm kỳ đà cản mũi nữa.」"

# 【西瓜】
# display as 西瓜
# JP: 「あっ！？　姜秘書！？　そういう意味ではなくて」
1638 = "「A!? Cô Jiang!? Không phải ý đó đâu ạ.」"

# 【姜】
# display as 姜
# JP: 「ふふふっ、どういう意味かは、わかっています。\n志寰君。西瓜。おめでとう」
1669 = "「Fufufu, ý gì thì tôi hiểu rõ mà.\nZhihuan. Suika. Chúc mừng hai em.」"

# 【西瓜】
# display as 西瓜
# JP: 「はうっっ！！！」
1598 = "「Hau!!!」"

# 【志寰】
# display as 志寰
# JP: 「ありがとうございます。大事にします。\n必ず、世界一幸せにします」
2104 = "「Cảm ơn cô. Cháu sẽ trân trọng cô ấy.\nChắc chắn, cháu sẽ làm cho cô ấy hạnh phúc\nnhất thế giới.」"

# 【日々姫】
# display as 日日姬
# JP: 「わあっ！　よかったぁ、おめでとう、ふたりとも」
1586 = "「Oa! Tuyệt quá, chúc mừng hai người nha.」"

# 【西瓜】
# display as 西瓜
# JP: 「ありがとうございます！」
2102 = "「Cảm ơn chị!」"

# 【ハチロク】
# display as 八六
# JP: 「うふふふふっ、旅の素敵な想い出をもう一つ。\nこちらこそ、ありがとうございます」
1665 = "「Ufufufufu, lại thêm một kỷ niệm tuyệt vời\nnữa của chuyến đi.\nChính chúng tôi mới phải cảm ơn hai\nngười.」"

# monologue
# JP: “余計なこと”を、姜さんが鮮やかに引き受けてくれた。
2481 = "「Ufufufufu, lại thêm một kỷ niệm tuyệt vời\nnữa của chuyến đi.\nChính chúng tôi mới phải cảm ơn hai\nngười.」"

# monologue
# JP: 薄々は、志寰君と西瓜の恋が成就したろうと思っていたが、\nこうした形で確認できて、スッキリとした――っと。
2803 = "Cô Jiang đã khéo léo gánh vác phần \"việc\nthừa thãi\"."

# 【双鉄】
# display as 雙鐵
# JP: 「名残はつきぬが、日々姫、ハチロク」
1757 = "「Dù vẫn còn lưu luyến, nhưng Hibiki,\nHachiroku.」"

# 【志寰】
# display as 志寰
# JP: 「あ！　記念に！！！　今回の旅の、視察の記念に、\nどうか一枚、集合写真を」
1632 = "「A! Để làm kỷ niệm!!! Để làm kỷ niệm cho\nchuyến đi, cho chuyến thị sát lần này,\nxin hãy chụp chung một bức ảnh tập thể.」"

# 【日々姫】
# display as 日日姬
# JP: 「うふふっ！　よかとねー！　ね。にぃに、\nそのくらいの時間だったら、大丈夫よね？」
1667 = "「Ufufu! Được đó! Nè. Anh hai,\nnếu chỉ tốn chừng đó thời gian thì không\nsao đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、問題なかろう」
1640 = "「Ừ, chắc không vấn đề gì đâu.」"

# 【志寰】
# display as 志寰
# JP: 「でしたらぜひ。あ！」
2073 = "「Vậy thì nhất định phải chụp. A!」"

# monologue
# JP: 通りすがった人に向け、\n志寰君が声をかけ、カメラを預ける。
2549 = "Hướng về phía một người đi ngang qua,\nZhihuan cất tiếng gọi và giao chiếc máy\nảnh."

# 【日々姫】
# display as 日日姬
# JP: 「わ、レトロなカメラ。\n一周して、すっごくおしゃれでかっこいい」
1592 = "「Oa, máy ảnh hoài cổ kìa.\nĐi một vòng lại thấy cực kỳ sành điệu và\nngầu luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1856 = "「Đúng vậy.」"

# monologue
# JP: というか、似たものを見たことがある。
2768 = "Nói đúng hơn là, tôi đã từng nhìn thấy một\nthứ tương tự."

# monologue
# JP: あれは確か、\nポーレットのご父君のコレクションにあった――
2571 = "Chắc chắn là,\ntrong bộ sưu tập của cha Paulette——"

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、日々姫女士、ハチロク。\nもしよかったら、これを持っていただけませんか？」
2094 = "「Thầy Soutetsu, cô Hibiki, Hachiroku.\nNếu được, mọi người có thể cầm cái này\nkhông?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　これは、北琴空港での歓迎ボオド」
1590 = "「Ôi! Đây là tấm bảng chào mừng ở sân bay\nBắc Cầm mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ここまでわざわざ持ってきてくれていたのか。\nうん。喜んで掲げさせてもらおう」
1938 = "「Hai người đã cất công mang đến tận đây\nsao.\nỪ. Tôi rất sẵn lòng giương nó lên.」"

# monologue
# JP: 8620を模したボードに、\n『歓迎！　御一夜鉄道御一行』の文字。
2432 = "Trên tấm bảng mô phỏng dòng 8620,\nlà dòng chữ \"Chào mừng! Đoàn Đường sắt\nOhimitera\"."

# monologue
# JP: 目にしたときに感じた安心と大きな喜びを、\n昨日のことのようにも、遠い昔のこととも感じる。
2690 = "Sự an tâm và niềm vui to lớn mà tôi cảm\nnhận được khi nhìn thấy nó,\nvừa như mới ngày hôm qua, lại vừa như một\nchuyện đã từ rất lâu rồi."

# 【志寰】
# display as 志寰
# JP: 「カメラ、引き受けてもらえました」
1614 = "「Đã nhờ được người chụp ảnh rồi.」"

# 【西瓜】
# display as 西瓜
# JP: 「並んでください並んでください。\n先生たちが真ん中で――」
1481 = "「Mọi người xếp hàng đi xếp hàng đi.\nCác thầy cô đứng ở giữa——」"

# 【姜】
# display as 姜
# JP: 「西瓜と志寰君も、ふたり並んで」
1991 = "「Suika và Zhihuan cũng đứng cạnh nhau đi.」"

# 【西瓜】
# display as 志寰＆西瓜
# JP: 「はい、もちろんそうします」\n「はうっ」
1703 = "「Vâng, tất nhiên là thế rồi.」\n「Hau.」"

# monologue
# JP: 自然と立ち位置が定まれば、カメラを手にした中年女性は、\n人の良さそうな笑顔を浮かべ――
2440 = "Khi vị trí đứng đã tự nhiên được định sẵn,\nngười phụ nữ trung niên cầm máy ảnh\nnở một nụ cười hiền hậu——"

# monologue
# JP: "Say　Cheese"と、明るく大きな声を出す。
2412 = "\"Say Cheese\", bà cất giọng vui vẻ, lớn\ntiếng."

# 【ハチロク】
# display as 八六
# JP: 「ち、チイズ」
1966 = "「Ch-Cheese.」"

# monologue
# JP: （バシャ！）
2821 = "(Tách!)"

# 【志寰】
# display as 志寰
# JP: 「謝謝、謝謝」
2010 = "「Cảm ơn, cảm ơn.」"

# monologue
# JP: 志寰君がカメラを受け取り――\nおお、やはり、か。
2551 = "Zhihuan nhận lại máy ảnh——\nỒ, quả nhiên là vậy sao."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま！？　あれは――\nカメラが、写真を吐き出しておりますが」
2097 = "「Ngài Soutetsu!? Đó là——\nMáy ảnh đang nhả ảnh ra kìa.」"

# 【日々姫】
# display as 日日姬
# JP: 「わぁ！　本物のポラ写真！\nわたし、実物見るのば、はじめてと」
1588 = "「Oa! Ảnh lấy liền thật kìa!\nĐây là lần đầu tiên em nhìn thấy tận mắt\nđó.」"

# 【ハチロク】
# display as 八六
# JP: 「ポラ写真、でございますか？」
2044 = "「Ảnh lấy liền, sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、ポーラーランド社の即席写真の総称だ。\n取ったフィルムがすぐプリントとして吐き出され――」
1662 = "「Ừm, đó là tên gọi chung cho loại ảnh chụp\nlấy ngay của công ty Polaroid.\nPhim sau khi chụp sẽ được in và nhả ra\nngay lập tức——」"

# monologue
# JP: 僕の言葉が現実となり、\nハチロクは目を丸くする。
2676 = "Lời nói của tôi trở thành hiện thực,\nHachiroku tròn xoe mắt ngạc nhiên."

# 【ハチロク】
# display as 八六
# JP: 「まぁ、まぁまぁまぁ！　画像が浮き出て参りました！\nまるで、魔法のようですね」
1594 = "「Ôi, ôi ôi ôi! Hình ảnh hiện lên rồi kìa!\nCứ như là phép thuật vậy.」"

# 【志寰】
# display as 志寰
# JP: 「双鉄先生、日々姫先生、レイルロオド・ハチロク。\nよければ記念に、写真へ一筆いただけませんか？」
2093 = "「Thầy Soutetsu, cô Hibiki, Railord\nHachiroku.\nNếu được, mọi người có thể viết vài dòng\nlên bức ảnh làm kỷ niệm không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。良い記念になるな、喜んで」
1658 = "「Ừ. Sẽ là một kỷ niệm đẹp đây, tôi rất sẵn\nlòng.」"

# 【日々姫】
# display as 日日姬
# JP: 「サインでよかと？\nえへへ、なんだか照れくさかとねー」
1940 = "「Ký tên là được đúng không?\nEhehe, tự dưng thấy hơi ngại ghê á~」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――その……恐縮ですが、\n記念ということですので、僭越ながら、署名など」
2068 = "「Em thì——ừm…… ngại quá,\nnhưng vì là kỷ niệm, nên em xin phép được\nký tên ạ.」"

# monologue
# JP: 日々姫はいつもデザイン画に入れている、達者なサインを。\nハチロクは、小さく几帳面な字で、ハチロクと書き入れる。
2641 = "Hibiki ký một chữ ký điệu nghệ mà em ấy\nvẫn luôn dùng trong các bản vẽ thiết kế.\nHachiroku thì viết chữ \"Hachiroku\" bằng\nnhững nét chữ nhỏ nhắn, nắn nót."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕は！」
1514 = "「Vậy thì, tôi sẽ!」"

# monologue
# JP: 今の思いを、ただただ素直に書き表わそう！
2588 = "Chỉ cần thành thật viết ra những suy nghĩ\nlúc này thôi!"

# 【志寰】
# display as 志寰
# JP: 「おお！」
1611 = "「Ồ!」"

# 【西瓜】
# display as 西瓜
# JP: 「わぁ！」
1584 = "「Oa!」"

# 【姜】
# display as 姜
# JP: 「ああ――すばらしいご一筆です」
1624 = "「A——Một nét bút tuyệt vời.」"

# monologue
# JP: 満面の笑顔の志寰君に写真を返す。
2591 = "Tôi trả lại bức ảnh cho Zhihuan đang cười\nrạng rỡ."

# monologue
# JP: もう一度全員と握手して――\n出国ゲートへ、ハチロクと日々姫と踏み出していく。
2585 = "Bắt tay lại với tất cả mọi người một lần\nnữa——\nTôi cùng Hachiroku và Hibiki bước qua cổng\nxuất cảnh."

# 【双鉄】
# display as ３人
# JP: 「謝謝！　再見！！」
2009 = "「Cảm ơn! Hẹn gặp lại!!」"

# monologue
# JP: 写真に残したメッセージを。\n明るい声で、大きな声で――
2581 = "Lời nhắn để lại trên bức ảnh.\nBằng một giọng nói tươi sáng, lớn tiếng——"

# monologue
# JP: 「さようなら、また会いましょう」\n――気持ちと共に、置き土産にして。
1506 = "\"Tạm biệt, hẹn gặp lại\"\n——Cùng với tâm tư, trở thành món quà lưu\nniệm để lại."
