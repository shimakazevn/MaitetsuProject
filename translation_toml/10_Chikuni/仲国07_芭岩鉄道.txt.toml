[script]
# lines: 381 
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
1362 = "「啊……」" 

# monologue
# JP: 聖都発の高速バスを下りた瞬間、日々姫の目が丸くなる。
1957 = "剛走下從盛都始發的快速公車，日日姬就不禁瞪大了雙眼。" 

# 【日々姫】
# display as 日日姬
# JP: 「……仲国だぁ」
952 = "「……仲國啊」" 

# 【ハチロク】
# display as 八六
# JP: 「まこと……まことに仲国ですね」
1722 = "「這還真是……仲國呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かに。\n――絵に描いたような、仲国だな」
1364 = "「啊……確實。這真是仲國——簡直再標準不過的形象」" 

# 【西瓜】
# display as 西瓜
# JP: 「どうしました？　双鉄先生」
1478 = "「怎麼了？雙鐵先生」" 

# monologue
# JP: 僕らの深い感心に、\nけれども西瓜は、少し困惑したような声をだす。
2286 = "面對我們幾個的感慨，西瓜卻顯得有些不明所以。" 

# 【西瓜】
# display as 西瓜
# JP: 「先生たちは、北琴空港からずっと、\n仲国に入国されていますが」
1331 = "「各位從抵達北琴機場時，就已經在仲國了啊」" 

# 【志寰】
# display as 志寰
# JP: 「そうじゃないよ。西瓜」
1675 = "「說的不是這個啦，西瓜」" 

# 【西瓜】
# display as 西瓜
# JP: 「志寰！」
1476 = "「志寰！」" 

# monologue
# JP: ぶんっ、と西瓜のおさげが踊る。\nなんと驚くべきことに、溢れるような笑顔ともに。
2184 = "聞聲，西瓜的辮子猛地一躍。而她臉上的笑容，也隨之如花綻放。" 

# 【志寰】
# display as 志寰
# JP: 「双鉄先生たちのおっしゃっている仲国は――\nきっと、“日ノ本の皆さんがイメージしている”仲国だ」
1752 = "「雙鐵先生他們所說的仲國，肯定是指“日本國的人們印象中的仲國”」" 

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　なるほど、さすがは志寰です」
1375 = "「啊！原來如此，還是志寰懂」" 

# monologue
# JP: 言うなり西瓜は、志寰君に身を寄せる。\nその腕に頬ずりしそうな勢いだ。
2241 = "西瓜邊說邊走到了志寰身邊，臉蛋都快貼到志寰的手臂上去了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……おお」
963 = "「……哦」" 

# monologue
# JP: 思わず声が出てしまう。\n志寰君の推測に感心させられたこともある。が――
2046 = "我下意識地感嘆出聲。其中雖然有對志寰推斷準確的讚賞，但——" 

# monologue
# JP: その何倍も、\n志寰君と西瓜との、縮まった距離に驚かされて。
2115 = "更讓我在意的是志寰與西瓜間的距離竟一氣縮短到這樣的程度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その……だ。ふたりは」
1334 = "「呃……對了，你們兩個這是」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう！ イメージぴったり！　三輪のタクシーとか！\n食べ物売ってる出店とか！　荷物山積みのバイクとか！」
1596 = "「沒錯！和印象中一模一樣！三輪計程車！街邊賣吃的小攤！馱著小山一樣貨物的摩托車！」" 

# 【ハチロク】
# display as 八六
# JP: 「まさにこうした光景を――北琴空港に降り立つまでは、\nわたくし、思い描いておりました」
1494 = "「我到降落在北琴機場之前，滿腦子裡想的都還是這樣的光景」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1369 = "「啊」" 

# monologue
# JP: 日々姫ハチロクの慌てた口調に気づき、反省させられる。\n驚きの余り僕はまた、“余計なこと”を言いかけていた。
2131 = "注意到日日姬和八六這略顯慌張的口氣，我也意識到自己在驚訝之下，竟又差點“多說多錯”，實在應該反省。" 

# 【姜】
# display as 姜
# JP: 「健為の景色は、仲国の典型的な地方の光景の一つですね。\n成る程。日ノ本の方の仲国のイメージは、この辺ですか」
1271 = "「健為這裡，其實算得上是仲國鄉下典型的樣子了。原來如此，日本國民眾對仲國大致是這樣的印象啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、僕達に知識がなかっただけとは思います。\nただ、その上で、なんというのか、この光景は……」
1208 = "「不不不，我覺得應該只是我們幾個見識太少而已。不過話說回來，這幅光景……」" 

# monologue
# JP: ハチロク日々姫のフォローに気づいてか気づかずか、\nいずれにしても姜さんが、うまく話を膨らませてくれる。
1884 = "也不知她是不是注意到了八六和日日姬在幫我打圓場，不過不管怎樣，話題是順利地被扭了過來。" 

# monologue
# JP: ゆえ僕も、“余計なこと”に気を散らさぬよう、\nあらためて、あたりの景色をじっくり眺める。
2069 = "所以為了不讓注意力被“多說多錯”帶跑，我重新認真環顧起四周的景色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本でいうなら、川の流れと、緑の山々のような……。\nそうした、原風景的な何かを感じもします」
1670 = "「要是以日本國做比較的話，或許就是那種綠水青山……或者說，給人一種原生態的感覺」" 

# 【姜】
# display as 姜
# JP: 「原風景……少し難しい日ノ本語ですが――\n『ふるさとの景色』といった解釈であっていますか？」
1302 = "「原生態……這詞不太好理解啊——可以理解為“鄉土的景色”嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そう！　それです！　うん――\nここの景色、“仲国のふるさと”って感じ、する」
1380 = "「啊！沒錯！就這意思！嗯——這裡的景色，就是給人“仲國的鄉土”的感覺」" 

# monologue
# JP: 日々姫もどうやら余計なことを振り切ったらしい。\nその手は迷いなく、スケッチブックの上を走り始める。
2111 = "日日姬看來也在提防著“多說多錯”。而她的手則毫不猶豫地在素描簿上舞動了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。はじめて来た、はじめて目にする\n景色であるのに――どこか、懐かしく感じるようです」
1631 = "「的確是這樣。明明是初次造訪，初次目睹的景色，卻給人一種無比懷念的感覺」" 

# 【志寰】
# display as 志寰
# JP: 「日ノ本にも、これに近い景色があるのですか？\nあるいは、かつてあったのでしょうか？」
1545 = "「日本國也有與此相像的景色嗎？或者說，曾經有過嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕らの世代だとこころあたりはない。かな」
949 = "「……以我們這一代人的閱歷而言，應該是沒有吧」" 

# monologue
# JP: スケッチの手を止めぬまま、日々姫も僕の言葉に頷く。
2099 = "日日姬並沒有停下手中的筆，同時點頭表示贊同。" 

# monologue
# JP: しかし、それでも僕もやはり、\n遠い懐かしさを確かに感じる。
2247 = "話雖如此，我所感受到那種久違的懷念卻是實實在在的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどうだ？\n100年の記憶のどこかに、これと似たような風景は」
1280 = "「八六你呢？在你那近百年的記憶中，可有與此相似的風景？」" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしの記憶のどこにも、これと似た光景は、\n残念ながら存在しておりません。けれども――」
979 = "「……很遺憾，我的腦海中縱有悠長歲月，卻也難尋相若的光景。不過——」" 

# monologue
# JP: ハチロクの白い指先が、その唇を軽く撫ぜる。\n一瞬閉じ込められた言葉が、再びゆったり、流れ始める。
1936 = "八六白皙的指尖，輕輕在嘴唇上拂過。而話語也在片刻的中斷之後，緩緩道來。" 

# 【ハチロク】
# display as 八六
# JP: 「……西瓜の言葉を借りるのでしたら、音風景。\nどこか似通ったざわめきを、わたくしは記憶しています」
955 = "「……借用西瓜的話來說，就是聲景。在這個方面，倒是有若干似曾相識的記憶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。それはどのようなざわめきだ？」
1352 = "「哦，那具體又是怎麼樣的聲音呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「……日ノ本と帝鉄とが生命力に溢れていた時期。\n高度経済成長期の駅に満ちていた、ざわめきです」
967 = "「……在日本國與帝國鐵路充滿生命力的那個時期，也就是經濟高速發展的時期，那是充斥在車站中的喧囂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なんとなくだが、イメージでしかないのだが。\nハチロクの言わんとすることは、わかるような気がする」
1368 = "「啊……雖然只能大致想像一下，不過八六這麼一說，我大概能明白是怎樣的感覺了」" 

# monologue
# JP: 生命力。あるいは昨今の日ノ本では、\n目立たなくなっているかもしれない、その輝きが――
2148 = "生命力，在現今的日本國，其光芒已遠不如往昔那般耀眼——" 

# monologue
# JP: ここ健為ではあちこちで、\nまばゆい光を放っていると、僕も感じる、それゆえに。
1902 = "但在這裡，在健為，卻處處都閃耀著這樣的光芒。兩下相較，感受越來越強烈。" 

# 【ハチロク】
# display as 八六
# JP: 「喧騒の度合いはまるで異なっておりますけれど、\nそれでも――」
1751 = "「雖說喧囂的程度天壤之別，但是——」" 

# monologue
# JP: ハチロクが唇を結び、目を閉じる。\n僕も、倣う。
1925 = "八六合起雙唇，合起了雙眼。我也隨她一同閉上了眼睛。" 

# monologue
# JP: 自転車の、バイクの、車の、さまざまな音たちに負けず。\n――なんと強く、明るく、この町の人の声は響くのだろう。
2188 = "自行車、摩托車、汽車，然而這些都無法壓過小鎮上人們開朗而堅定的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「やはり、似通って聞こえます。\n人間の皆様の声が……まるで、前進をしているようで」
1577 = "「果然，是似曾相識的聲音。在人們的聲音中，迴響著不斷前進的感覺」" 

# 【姜】
# display as 姜
# JP: 「然り。然り」
1597 = "「沒錯，沒錯」" 

# monologue
# JP: 姜さんが、とても満足そうに頷く。\n珍しく大きな身振りで、両手を広げる。
2024 = "姜小姐不住點頭，可以看出她對此相當滿意。同時，她也少見地大張雙臂——" 

# 【姜】
# display as 姜
# JP: 「北琴や聖都のような大都市だけではなく、こうした\n地方都市も、近年は目覚ましい経済発展を遂げています」
1211 = "「不只是北琴及盛都這樣的大城市，像這樣的鄉下小城鎮，近年來在經濟方面也取得了長足的發展」" 

# 【双鉄】
# display as 雙鐵
# JP: 「経済発展――」
1651 = "「經濟發展——」" 

# monologue
# JP: その一言が、少し意外に聞こえてしまう。
2168 = "突然聽到這個詞，著實讓我有些意外。" 

# monologue
# JP: 溢れるほどの活気が確かに満ち満ちてはいるが……\n建物や、道行く人の服装などは、北琴・聖都と比べると。
2083 = "放眼周遭，的確是活力四射……但這街道，以及路上人們的服飾，與北琴、盛都相比較的話……" 

# 【姜】
# display as 姜
# JP: 「……双鉄先生達は、\n出店の食べ物などへの抵抗をお持ちでしょうか？」
947 = "「……不知各位對路邊小攤的食物能否接受？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？　出店、ですか？」
1345 = "「哎？小攤……嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「食べてみたかと！！！\nおいしそうだし、見たことないし！」
1668 = "「要吃要吃！！！雖然沒見過，但瞅著賊好吃！」" 

# monologue
# JP: ……唐突な出店推しにいささか意表をつかれたが、\n言われてみると、確かに小腹もすいている。
891 = "……突然提出吃路邊攤著實有些意外，但轉念一想，自己也確實是有些餓了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も抵抗はないですし――ああ、そこにある\n厚揚げのようなものは、実においしそうですね」
1485 = "「我也沒問題——啊，那邊那個看起來像炸油豆腐的食物，的確看起來很好吃的樣子」" 

# 【姜】
# display as 姜
# JP: 「かしこまりました。では、人数分頼みましょう。\nハチロクさんと西瓜には、もちろん別途用意があります」
1439 = "「好的。那我就按人數去買了。八六和西瓜我們自然另有安排」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、恐縮でございます」
1720 = "「這真是麻煩了」" 

# monologue
# JP: ハチロクの謝意を微笑で受けて、\n姜さんは、出店のおばさんに仲国語で話しかける。
1887 = "以微笑回應了八六的謝意，姜小姐上前與擺攤的大嬸用仲文交談起來。" 

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は注文をしています。\n注文しているのは揚げ豆腐です」
1457 = "「姜老師在給大家買煎豆腐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「揚げ豆腐。ふむ。\nやはり厚揚げの仲間だったか――ん？」
1612 = "「煎豆腐，果然是和炸油豆腐差不多的東西啊——嗯？」" 

# monologue
# JP: 姜さんがスマホを取り出し、なにか操作し――\n出店のおばさんも応じるようにスマホを取り出したが……
1981 = "只見姜小姐掏出智慧型手機，然後操作了什麼——而擺攤的大嬸也配合著掏出了智慧型手機……" 

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は支払いをすませました。\n今から、揚げ豆腐が作られます」
1456 = "「姜老師剛才是在付款。現在馬上就開始做煎豆腐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「支払いを済ませた？　とは――」
1239 = "「付款？這是——」" 

# 【西瓜】
# display as 西瓜
# JP: 「QRコード決済です。そこに貼ってあるQRコードを\nアプリで撮影し、金額とパスワードを入力し決済です」
1219 = "「二維碼付款。用Ａｐｐ掃描貼在那裡的二維碼，然後輸入金額和密碼就可以付款了」" 

# 【志寰】
# display as 志寰
# JP: 「そうすると、決済記録が受け取り側……この場合\n出店のおばさんにも届きますから、それで会計終了です」
1515 = "「操作完成後，付款記錄就會在收款一方……剛才的情況，就是擺攤的大嬸那邊顯示出來了，這樣就算付好款了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！？　出店でそんなことができるのか？」
1727 = "「這！？連路邊攤都能實現如此便捷的付款方式嗎？」" 

# monologue
# JP: 確かにQRコードのシールが目立つところ貼られているが、\nあれが決済手段になるとは、まるで想像もしていなかった。
2081 = "攤位上貼的二維碼確實頗為醒目，但完全想像不到那竟是付款方式。" 

# 【西瓜】
# display as 西瓜
# JP: 「出店でというか、どこでも出来ます。\n今時は、出来ないお店の方が少ないかと西瓜は思います」
1681 = "「豈止是路邊攤，隨便哪裡都可以。以西瓜所知，如今不支持這樣付款的店已經很少了」" 

# 【志寰】
# display as 志寰
# JP: 「提示された支払い金額を確認して、自分で送金する上。\nパスワードもありますから、現金よりも安全です」
1655 = "「能夠在付款前先確認金額，而且還要輸入密碼，這種方式比現金更安全」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
958 = "「……原來如此」" 

# monologue
# JP: スマホの起動時に決済時。\n最低でも二回、パスワードの確認が求められるわけだ。
2073 = "打開智慧型手機的時候加上付款的時候，至少也要輸入兩次密碼。" 

# monologue
