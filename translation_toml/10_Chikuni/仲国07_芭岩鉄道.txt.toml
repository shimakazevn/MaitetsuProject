1508 = "「%f思源宋体B;[Xin　lỗi　xin　lỗi,3]抱歉抱歉。[Tụi　nó　cứ　tự　tiện　chui　vào　từ　cửa　sổ　đấy,14]它们从车窗跑进来也是常有的事了。\n[Nào　nào,3]好啦好啦、[Ra　đi　ra　đi,3]快出去啦。[Ừm]嗯！　[Được　rồi,1]好了、[Mời　vào,1]您请%f;」"

