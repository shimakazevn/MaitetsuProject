1416 = "「Cần đảo chiều, van tiết lưu hơi, van hãm\ntự động và……cấp nước là cái van này sao?\nỪm. Cái này……đúng là mang lại cảm giác\nnguyên bản của \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; nhỉ.」"

# 【ハチロク】
