# 【双鉄】
# display as 雙鐵
# JP: 「今夜、会議を招集してくれ。集まるメンバーだけでいい。\nが、赤井宮司とニイロクは可能な限り出席を」
1237 = "「今晚幫我召集一個會議吧，能叫到誰就叫誰。哪怕別人都叫不到，也儘量請赤井宮司和……二六出席」" 

# monologue
# JP: ぴたり、日々姫の指が止まる。\nその目を見れば、大丈夫だと頷いてくれる。
2109 = "日日姬的筆尖一滯，而當我看向她的眼睛時，她向我輕輕點頭，彷彿在說“沒問題的”。" 

# monologue
# JP: ハチロクもまっすぐ僕を見る。\nほんの少しだけ恥じ入るように。その何倍も、誇らしげに。
1919 = "八六也同樣緊盯著我，眼光中帶著些許的羞怯，但那也早已淹沒在飽含的驕傲之情中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仲国版ナインスターズに関する提言の――\n僕らが見出した方向性の、可否を検討してほしいのだ」
1743 = "「關於仲國版九星的提案——我們初步找出了方向，希望可以和大家探討一下其可行性」" 
