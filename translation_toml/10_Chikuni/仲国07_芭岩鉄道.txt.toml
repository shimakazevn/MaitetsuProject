913 = "「——還真是，這完全就是盯著手機在看啊」" 

# 【姜】
# display as 姜
# JP: 「……OurChatというアプリのグループチャットで、\n情報共有をしているそうです」
973 = "「……好像是在通過叫薇信的Ａｐｐ裡的群聊功能，在分享訊息的樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「グループチャット？」
1653 = "「群聊？」" 

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、あれを見ればすぐわかるかと」
1756 = "「雙鐵先生，看看這裡您就明白了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ――」
1410 = "「嗯？啊——」" 

# monologue
# JP: 僕らと同じ客車に乗車してくれている\n若い女性のガイドさん――
1989 = "和我們一同搭車的年輕女性嚮導——" 

# monologue
# JP: 芭岩鉄道の職員さんが、スマホをひらひらふりながら、\n人の良さそうな笑顔を浮かべ、画面を僕らに示してくれる。
2006 = "她自然也是芭岩鐵路的工作人員。她輕輕劃了幾下手機，然後帶著溫柔的笑容，把畫面轉過來給我們看。" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、[ダイン,3]dineの仲国版って感じ？\nそかそか、これなら」
1390 = "「啊，感覺是仲國版的ＤＩＮＥ啊？原來如此，那就懂了」" 

# 【ハチロク】
# display as 八六
# JP: 「人間もレイルロオドも、情報共有をリアルタイムで\nできますね。合理的といえば、確かに合理的ですが……」
1715 = "「這樣人類和鐵路人偶就可以即時地分享訊息了。要說合理，倒也的確合理，不過……」" 

# monologue
# JP: 不満気に飲み込まれた、『ですが』の続きは僕にもわかる。\nスマホ操作は乗務中、誰かが前方注視を切るということだ。
2279 = "雖然八六忍住沒有把不滿直接表現出來，但“不過”之後的話想想也知道——操作手機就意味著將視線從前方移開。" 

# monologue
# JP: レイルロオドが共感で情報を受け、\nそれを口頭で伝える方が…………ああ、いや――
2272 = "鐵路人偶通過共鳴接收訊息，而後再口頭轉達……啊，等等——" 

# monologue
# JP: （発信場所と受信場所に必ずレイルロオドがいるとは\n限らんものな。ゆえに僕らも列車無線を使うわけだし）
2310 = "（發送和接受的地方難保同時都有鐵路人偶吧。所以我們也會在列車上配備無線電備用）" 

# monologue
# JP: 無線も無論、集中力を阻害する。\nが、その影響は軽微であるし、情報の重要度は高い。
2143 = "無線電當然也會影響注意力。但那影響畢竟不大，所傳達的訊息也都頗為重要。" 

# monologue
# JP: ゆえ、僕らは無線を安全な通信手段として選択し……\nとなると――スマホ通信の可否も容易には判断できんか。
2068 = "所以我們才把無線電認定為安全的通信手段並選擇了它……但換作智慧型手機的話，怕就很難判斷了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ちなみに今は、\nどのような情報の行き来があったのですか？」
1002 = "「……那剛才是在交換怎樣的訊息呢？」" 

# 【姜】
# display as 姜
# JP: 「いまは――おお――\nちょっと、日ノ本ではないことかもしれませんね」
1294 = "「剛才——哦——這或許是在日本國不太會遇到的事情」" 

# 【西瓜】
# display as 西瓜
# JP: 「仲国国鉄でもあまりない事例かと思います。\n西瓜も、かなりびっくりしました」
1423 = "「在仲國國鐵應該也很少會遇到吧。西瓜也著實嚇了一跳」" 

# monologue
# JP: ガイドさんの仲国語も、かなり楽しげな口調に聞こえる。\n一体何を話しているのか――
1997 = "嚮導所說的仲文，語氣也頗為歡快。她們究竟是在……" 

# 【姜】
# display as 姜
# JP: 「水牛が、かなりレールに接近していたそうです。\n危ないので追い払うよう、飼い主に連絡してほしいと」
1253 = "「似乎有水牛走到了離鐵軌很近的地方。這樣很危險，所以要聯繫飼主來趕走」" 

# 【日々姫】
# display as 日日姬
# JP: 「水牛！！！？　わたし、見逃したと！！」
1592 = "「水牛！！！？我竟然沒注意到！！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも気が付きませんでした。\n機関車ばかりに目を奪われて――」
1486 = "「我也沒有注意到。光顧著看機車了——」" 

# monologue
# JP: みなの視線が、自然と横窓から外へ向く。\n……ああ、なんとのどかな――山岳の田園風景だろう。
2002 = "大家的視線，自然地一起轉向了一側的窗外……啊啊，這是何等悠然的山區田園風情啊。" 

# monologue
# JP: 溜池があり、ちいさな棚田が幾重にも重なり、\nそのあちこちに、アヒルかなにかの姿も見える。
2126 = "水塘和小塊的梯田鱗次櫛比，而不知是鵝是鴨的家禽也散布其中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この辺は、農耕地帯なのですか？」
1724 = "「這附近是以農業為主的嗎？」" 

# monologue
# JP: 問えばすぐさま西瓜がガイドさんへと伝え、\nガイドさんの答えを姜さんが僕らに伝えてくれる。
2057 = "我才一開口，西瓜就迅速地翻譯給了嚮導，而嚮導的答覆則是由姜小姐轉達給我們。" 

# 【姜】
# display as 姜
# JP: 「炭鉱業の他には、畜産、林業、農業、養蜂で\n生活をささえる沿線住民が多いとのことです」
1749 = "「除煤礦以外，沿線居民主要是以林業、農業、畜牧業以及養蜂為生」" 

# 【ハチロク】
# display as 八六
# JP: 「ヨウホウとは、ミツバチを飼う養蜂ですか？」
1763 = "「養蜂……是指飼養蜜蜂嗎？」" 

# 【姜】
# display as 姜
# JP: 「そのとおりですね。この辺の蜂蜜は名物で、\n『[はちみついわえき,3]蜂蜜岩駅』という駅の近くで特に盛んだと」
1559 = "「是的沒錯。這裡出產的蜂蜜很有名的，尤以蜂蜜岩站周邊最為繁盛」" 

# 【日々姫】
# display as 日日姬
# JP: 「っていうか水牛！　水牛、普通に飼われとーと？」
1740 = "「那水牛呢？有很多人家養水牛嗎？」" 

# 【姜】
# display as 姜
# JP: 「……。水田の運営・維持には必要な家畜とのことです。\nこの山間部では、トラクター等の導入は難しいそうです」
991 = "「……水牛是耕作水田必不可少的家畜。這裡的山區，使用拖拉機有著諸多不便之處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日ノ本でも昔は牛馬を、農機具代わりに使って\n……いや、山間部では、今もそうしているかもしれんな」
1395 = "「啊，日本國從前也是使用牛馬而非農機的……等等，在山區的話現在或許也還有吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、なんでそん水牛が、\n轟音立てて列車が走っとーレールに接近してくると？」
1329 = "「可是唉，為什麼那水牛會跑到上面有列車轟隆轟隆跑來跑去的鐵軌邊上呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「確かにですね。\n普通は怖がって逃げそうなものですが……」
1674 = "「說來也是。一般都會被嚇得躲得遠遠的吧……」" 

# monologue
# JP: 姜さんが僕らの疑問を伝えよう――\nとした瞬間に、ガイドさんがまたスマホをいじって、
2026 = "姜小姐把我們的疑問轉達了過去，而嚮導一聽，就又開始在手機上點了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「なにこれ！　かわゆか！　おもしろかー！！」
1709 = "「這什麼啊！忒可愛咧！這好玩呢！！」" 

# monologue
# JP: 日々姫がすぐさまスケッチをする。
2106 = "日日姬拿著筆的手馬上飛舞了起來。" 

# monologue
# JP: ガイドさんがスマホで示した写真の景色――\n水牛がレールを舐めている、実にのどかな光景を。
2181 = "而當我看向嚮導的手機的時候，畫面上顯示的竟是一頭水牛在悠閒地舔著鐵軌。" 

# 【姜】
# display as 姜
# JP: 「……この水牛は、常習犯なのだとのことです。\n蒸気機関車が走ったあとのレールを舐めるのが好きだと」
993 = "「……聽說這頭水牛其實是慣犯了。它就喜歡舔蒸汽機車駛過後的鐵軌」" 

# 【日々姫】
# display as 日日姬
# JP: 「水牛が常習犯！！」
1590 = "「水牛竟然是慣犯！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「常習犯に居座られては、事故や遅延を招きかねんな。\n追い払うよう手配を、というのはごく妥当な安全確保か」
1458 = "「它若是長時間逗留，難保不會造成延誤或事故啊。叫人把它趕走也算是妥當的安全保障手段吧」" 

# monologue
# JP: こくり、とハチロクが小さく頷く。
1946 = "八六輕輕地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「国と鉄道とが変化すれば、アクシデントも連絡手段も、\nさまざまに変化していくものなのですね」
1421 = "「國家、線路不同，甚至於情況不同，都會讓聯絡手段發生相應的變化啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本にはなかと？　動物がレールを舐めたりとか」
1546 = "「日本國沒有的吧？動物跑去舔鐵軌什麼的」" 

# 【ハチロク】
# display as 八六
# JP: 「はい――あ！　いえ！　噂に聞いたことがございます。\n鹿がレイルを舐めに来て、そのため事故が発生すると」
1548 = "「是——啊！不！我聽說過因為鹿來舔鐵軌而發生事故」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そうなのか」
1649 = "「竟然還有這樣的事」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。そのときにはわたくし、笑い話のように捉えて\n……ですので今まで、すっかり失念しておりましたが」
1558 = "「是的。那時我還以為是個段子就沒當真……現在看來當時的想法真是太膚淺了」" 

# monologue
# JP: こくり、ハチロクは小さく頷く。
1920 = "八六又輕輕地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「見た目の印象ほどには変わらないのかもしれませんね。\n日ノ本と仲国と、ふたつの国の鉄道は」
1502 = "「或許，日本國與仲國，兩國鐵路的差別並沒有看起來那麼大」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。もちろん、この車窓風景など、\n日ノ本ではなかなか見られんだろうが――」
1501 = "「或許吧。當然了，這車窗外的風景，在日本國怕是很難見到了」" 

# monologue
# JP: ……ポーレットが“仲国鉄も齧っている”と\n言っていた意味が、今なら少しわかる気がする。
889 = "……波萊特所說的“我對仲國鐵路也只是略知一二”，如今我也多少理解了一些其中的含義。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本ではもう失われた鉄道風景が――\n旧帝鉄の全時代と。あるいは、描けなかった未来図さえ」
1215 = "「不過這裡能看到在日本已經消失的鐵路風景——也就是前帝國鐵路的整個時代。說不定還能看到它未能實現的未來景象」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、あるのかも！　仲国全土を探したら、\n中国の鉄道風景の、いろんなとこにちょっとずつ！」
1361 = "「啊——有可能！走遍全仲國，就能漸漸發現各種不同的仲國鐵路風景！」" 

# 【ハチロク】
# display as 八六
# JP: 「その上きっと、もとより日ノ本には無いものも、\nいくらもあるのでございましょうね」
1283 = "「其中一定也有許許多多在日本國本來就沒有的景象吧」" 

# monologue
# JP: ハチロクの声に、\nまたいくらかの自嘲と羨望が混じってしまう。
1945 = "八六的聲音裡，混雜著一絲不知是自嘲還是羨慕的情感。" 

# 【西瓜】
# display as 西瓜
# JP: 「逆もですよ、ハチロク」
1324 = "「反過來也是一樣哦，八六」" 

# monologue
# JP: それを聞きつけ――あるいは何か共感を受け取ったのか、\n少し慌てたような声で、西瓜が会話に加わってくる。
1878 = "不知是聽了八六的話，還是通過共鳴感受到了什麼，西瓜略顯慌亂的聲音加入了對話中。" 

# 【西瓜】
# display as 西瓜
# JP: 「その逆もまた真実です。\n日ノ本には、仲国の鉄道に無いものがたくさんあります」
1721 = "「這話反過來說也是完全正確的——日本國也有許多仲國鐵路所沒有的東西」" 

# 【志寰】
# display as 志寰
# JP: 「というか、ナインスターズがその代表ではないですか」
1286 = "「其實九星就可以算是其中的代表了吧」" 

# 【姜】
# display as 姜
# JP: 「然り、然り」
# 1597 = "「沒錯，沒錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1369 = "「啊」" 

# monologue
# JP: きょとんとした声がでてしまう。
2048 = "我不禁下意識地喊出了聲。" 

# monologue
# JP: ハチロク日々姫がやはりきょとんとした顔で僕をみて――\nそして全員、同時に小さく吹き出してしまう。
1927 = "八六和日日姬朝我看過來，一臉的茫然——接著所有人不約而同地撲哧一笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――本当にそうですね！」
914 = "「——還真的是這樣！」" 

# monologue
# JP: 仲国の鉄道にしかない強み。\n日ノ本の鉄道にしかない強み。
1900 = "仲國鐵路所獨有的優勢。日本國鐵路所獨有的優勢。" 

# monologue
# JP: そうして両国の鉄道が、ともに有している強み。\nそれらをうまく、組み合わせることができるのならば――
2011 = "如果能把兩國各自獨有的優勢，取長補短相互結合——" 

# monologue
# JP: （ボッ！　ポっ！！！）
2307 = "（啵！啵！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1355 = "「唔」" 

# monologue
# JP: 短い汽笛。合図の汽笛だ。\n途端にガイドさんが最後部座席にしゃがみこみ――
2128 = "汽笛短鳴，這應該是信號。嚮導小姐聞聲便坐到了車廂尾部的座椅那邊去。" 

# 【ハチロク】
# display as 八六
# JP: 「ああ。見逃しておりました。\nあのようなところに、手ブレーキがついていたのですね」
1392 = "「啊，我都沒注意到，在那個位置竟然裝著手剎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「手ブレーキまでかけるということは、長時間停車か？」
1207 = "「上手剎的話，這是要長時間停車嗎？」" 

# 【姜】
# display as 姜
# JP: 「……この駅でいったん、\n観光客車の我々は下車するそうです」
969 = "「……在這個車站，我們這些遊客好像要下一次車」" 

# 【西瓜】
# display as 西瓜
# JP: 「芭岩鉄道で一番の見物を見せてくれるそうです。\n動画撮影がおすすめだと、ガイドさんは言っています」
1516 = "「據說這裡能看到芭岩鐵路最值得一看的地方。嚮導小姐還說建議拍成影片」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって、にぃに。動画の方よろしく」
1399 = "「啊，阿哥，那影片就交給你咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1440 = "「好的」" 

# monologue
# JP: ……客車を降ろされ誘導された先にあるのは、\n見晴台のようなところだ。
879 = "……下車後，我們被帶到了一個像是瞭望台的地方。" 

# monologue
# JP: ガイドさんも一緒に下りて、\nカメラをここにこう構えろと細かく指示までしてくれる。
1996 = "嚮導小姐也一起下了車，之後還仔細地幫我找好了最佳拍攝位置和角度。" 

# 【ハチロク】
# display as 八六
# JP: 「……機関車を逆機から付け直しておりますね。\nここで折り返すということでございましょうか」
987 = "「……機車要掛接回正開的狀態啊。那也就是說要在這裡折返咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの観光客車の後ろにあった、一般客車の乗客も、\nここまでで全ておりたようだし――間違いなかろう」
1425 = "「在我們乘坐的觀光車廂後面的一般車廂裡的乘客也都在這裡下車了，應該是這樣不會錯了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　機関車ば後進して戻っていくと！\nここのカーブで撮影させてくれるサービスとね、これ」
1379 = "「啊！機車倒著開回去了！這個位置是給我們拍它在這段彎道上行駛的樣子吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「らしいな」
