1562 = "「是的，然後上面再淋上陳醋和紅糖。這是在泗川廣受歡迎的點心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1346 = "「哦」" 

# monologue
# JP: 挟まっている具がかなりたっぷりとしているために、\n座って食べんと零してしまいそうではあるが、旨そうだ。
