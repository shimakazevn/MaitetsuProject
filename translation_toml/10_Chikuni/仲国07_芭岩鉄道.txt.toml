1402 = "「問題當然有啊，我們那麼多姐妹就是為此而存在的，至於真造成影響的情況，那就很少了」" 

# 【西瓜】
# display as 西瓜
# JP: 「トラブルはもちろんあるが、深刻な問題になることは\nないとのことです。運用されている\x%l蒸機;#00ffc040;蒸機%l;#;も多いので」
1624 = "「當然有出現情況的可能，但並沒有造成嚴重的影響，這都是因為配備的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;數量有保證」" 

# 【双鉄】
