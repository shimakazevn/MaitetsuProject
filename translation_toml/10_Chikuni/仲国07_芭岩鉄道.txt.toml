# 【ハチロク】
# display as 八六
# JP: 「しかし……それほどの運用があるとなると、\n整備、維持などに問題が出てくるのではありませんか？」
1257 = "「但這樣大量的班次的話，整備、維護都會有諸多問題吧？」" 

# 【双鉄】
