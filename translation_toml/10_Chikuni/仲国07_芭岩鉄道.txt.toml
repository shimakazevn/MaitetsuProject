[script]
# lines: 381 
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
1362 = "「A……」"

# monologue
# JP: 聖都発の高速バスを下りた瞬間、日々姫の目が丸くなる。
1957 = "Ngay khoảnh khắc bước xuống khỏi chiếc xe\nbuýt cao tốc xuất phát từ Thánh đô, mắt\nHibiki tròn xoe."

# 【日々姫】
# display as 日日姬
# JP: 「……仲国だぁ」
952 = "「……Đúng là Trung Quốc á.」"

# 【ハチロク】
# display as 八六
# JP: 「まこと……まことに仲国ですね」
1722 = "「Quả thật……quả thật là Trung Quốc nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かに。\n――絵に描いたような、仲国だな」
1364 = "「À……đúng vậy.\n――Đúng là Trung Quốc như trong tranh vẽ.」"

# 【西瓜】
# display as 西瓜
# JP: 「どうしました？　双鉄先生」
1478 = "「Có chuyện gì vậy ạ? Thầy Soutetsu.」"

# monologue
# JP: 僕らの深い感心に、\nけれども西瓜は、少し困惑したような声をだす。
2286 = "Trước sự cảm thán sâu sắc của chúng tôi,\nSuika lại cất giọng có vẻ hơi bối rối."

# 【西瓜】
# display as 西瓜
# JP: 「先生たちは、北琴空港からずっと、\n仲国に入国されていますが」
1331 = "「Mọi người đã nhập cảnh vào Trung Quốc\ntừ lúc ở sân bay Bắc Cầm rồi mà.」"

# 【志寰】
# display as 志寰
# JP: 「そうじゃないよ。西瓜」
1675 = "「Không phải ý đó đâu, Suika.」"

# 【西瓜】
# display as 西瓜
# JP: 「志寰！」
1476 = "「Zhihuan!」"

# monologue
# JP: ぶんっ、と西瓜のおさげが踊る。\nなんと驚くべきことに、溢れるような笑顔ともに。
2184 = "Bím tóc của Suika nhảy múa vùn vụt.\nĐáng ngạc nhiên là, cùng với một nụ cười\nrạng rỡ."

# 【志寰】
# display as 志寰
# JP: 「双鉄先生たちのおっしゃっている仲国は――\nきっと、“日ノ本の皆さんがイメージしている”仲国だ」
1752 = "「Trung Quốc mà thầy Soutetsu đang nói\nđến――\nchắc chắn là Trung Quốc \"trong trí tưởng\ntượng của người Hinomoto\".」"

# 【西瓜】
# display as 西瓜
# JP: 「ああ！　なるほど、さすがは志寰です」
1375 = "「A! Ra là vậy, quả không hổ danh là\nZhihuan.」"

# monologue
# JP: 言うなり西瓜は、志寰君に身を寄せる。\nその腕に頬ずりしそうな勢いだ。
2241 = "Vừa nói, Suika vừa nép sát vào cậu\nZhihuan.\nVới khí thế như sắp cọ má vào cánh tay cậu\nấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……おお」
963 = "「……Ồ.」"

# monologue
# JP: 思わず声が出てしまう。\n志寰君の推測に感心させられたこともある。が――
2046 = "Bất giác thốt lên.\nCũng có phần thán phục trước suy luận của\ncậu Zhihuan. Nhưng――"

# monologue
# JP: その何倍も、\n志寰君と西瓜との、縮まった距離に驚かされて。
2115 = "Tôi còn ngạc nhiên gấp bội phần,\ntrước khoảng cách đã được thu hẹp giữa cậu\nZhihuan và Suika."

# 【双鉄】
# display as 雙鐵
# JP: 「その……だ。ふたりは」
1334 = "「Chuyện đó……Hai người.」"

# 【日々姫】
# display as 日日姬
# JP: 「そう！ イメージぴったり！　三輪のタクシーとか！\n食べ物売ってる出店とか！　荷物山積みのバイクとか！」
1596 = "「Đúng á! Đúng y chang tưởng tượng luôn!\nNào là taxi ba bánh!\nNào là xe đẩy bán đồ ăn! Nào là xe máy chở\nđầy nhóc đồ!」"

# 【ハチロク】
# display as 八六
# JP: 「まさにこうした光景を――北琴空港に降り立つまでは、\nわたくし、思い描いておりました」
1494 = "「Chính khung cảnh thế này――cho đến khi đáp\nxuống sân bay Bắc Cầm,\ntôi đã luôn mường tượng trong đầu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1369 = "「A.」"

# monologue
# JP: 日々姫ハチロクの慌てた口調に気づき、反省させられる。\n驚きの余り僕はまた、“余計なこと”を言いかけていた。
2131 = "Nhận ra giọng điệu hốt hoảng của Hibiki và\nHachiroku, tôi tự kiểm điểm bản thân.\nVì quá ngạc nhiên mà tôi lại suýt nói\n\"điều thừa thãi\" nữa rồi."

# 【姜】
# display as 姜
# JP: 「健為の景色は、仲国の典型的な地方の光景の一つですね。\n成る程。日ノ本の方の仲国のイメージは、この辺ですか」
1271 = "「Cảnh sắc ở Kiện Vi là một trong những\nkhung cảnh địa phương điển hình của Trung\nQuốc.\nRa là vậy. Hình ảnh Trung Quốc trong mắt\nngười Hinomoto là như thế này sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、僕達に知識がなかっただけとは思います。\nただ、その上で、なんというのか、この光景は……」
1208 = "「À không, tôi nghĩ chỉ là do chúng tôi\nthiếu hiểu biết thôi.\nNhưng mà, phải nói sao nhỉ, khung cảnh\nnày……」"

# monologue
# JP: ハチロク日々姫のフォローに気づいてか気づかずか、\nいずれにしても姜さんが、うまく話を膨らませてくれる。
1884 = "Không biết cô Jiang có nhận ra Hachiroku\nvà Hibiki đang nói đỡ cho tôi hay không,\nnhưng dù sao thì cô ấy cũng đã khéo léo\nphát triển câu chuyện."

# monologue
# JP: ゆえ僕も、“余計なこと”に気を散らさぬよう、\nあらためて、あたりの景色をじっくり眺める。
2069 = "Vì vậy, để không bị phân tâm bởi \"những\nđiều thừa thãi\",\ntôi cũng cẩn thận ngắm nhìn lại cảnh sắc\nxung quanh."

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本でいうなら、川の流れと、緑の山々のような……。\nそうした、原風景的な何かを感じもします」
1670 = "「Nếu ở Hinomoto, nó giống như dòng sông\nchảy và những ngọn núi xanh……\nTôi cảm nhận được điều gì đó mang tính\nnguyên sơ như vậy.」"

# 【姜】
# display as 姜
# JP: 「原風景……少し難しい日ノ本語ですが――\n『ふるさとの景色』といった解釈であっていますか？」
1302 = "「Nguyên sơ……Một từ tiếng Hinomoto hơi\nkhó――\nHiểu theo nghĩa 『Cảnh sắc quê hương』 có\nđúng không ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「ああ！　そう！　それです！　うん――\nここの景色、“仲国のふるさと”って感じ、する」
1380 = "「A! Đúng á! Chính là nó! Ưm――\nCảnh sắc ở đây, mang lại cảm giác như \"quê\nhương của Trung Quốc\" á.」"

# monologue
# JP: 日々姫もどうやら余計なことを振り切ったらしい。\nその手は迷いなく、スケッチブックの上を走り始める。
2111 = "Có vẻ như Hibiki cũng đã rũ bỏ được những\nđiều thừa thãi.\nĐôi tay con bé không chút do dự, bắt đầu\nlướt trên cuốn sổ phác thảo."

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。はじめて来た、はじめて目にする\n景色であるのに――どこか、懐かしく感じるようです」
1631 = "「Đúng vậy nhỉ. Dù là lần đầu tiên đến, lần\nđầu tiên nhìn thấy\nkhung cảnh này――nhưng không hiểu sao lại\ncảm thấy hoài niệm.」"

# 【志寰】
# display as 志寰
# JP: 「日ノ本にも、これに近い景色があるのですか？\nあるいは、かつてあったのでしょうか？」
1545 = "「Ở Hinomoto cũng có cảnh sắc gần giống thế\nnày sao ạ?\nHay là đã từng có?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……僕らの世代だとこころあたりはない。かな」
949 = "「……Thế hệ chúng tôi thì chắc là không biết\nđâu.」"

# monologue
# JP: スケッチの手を止めぬまま、日々姫も僕の言葉に頷く。
2099 = "Vẫn không dừng tay phác thảo, Hibiki cũng\ngật đầu đồng tình với lời tôi."

# monologue
# JP: しかし、それでも僕もやはり、\n遠い懐かしさを確かに感じる。
2247 = "Nhưng, dù vậy tôi quả thực vẫn cảm nhận\nđược\nmột sự hoài niệm xa xăm."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどうだ？\n100年の記憶のどこかに、これと似たような風景は」
1280 = "「Hachiroku thì sao?\nĐâu đó trong ký ức 100 năm của em, có\nphong cảnh nào giống thế này không?」"

# 【ハチロク】
# display as 八六
# JP: 「……わたくしの記憶のどこにも、これと似た光景は、\n残念ながら存在しておりません。けれども――」
979 = "「……Thật đáng tiếc, không có khung cảnh nào\ngiống thế này\ntrong bất kỳ ký ức nào của tôi cả. Nhưng\nmà――」"

# monologue
# JP: ハチロクの白い指先が、その唇を軽く撫ぜる。\n一瞬閉じ込められた言葉が、再びゆったり、流れ始める。
1936 = "Đầu ngón tay trắng ngần của Hachiroku khẽ\nvuốt ve đôi môi.\nLời nói bị kìm nén trong khoảnh khắc, lại\nbắt đầu tuôn chảy từ từ."

# 【ハチロク】
# display as 八六
# JP: 「……西瓜の言葉を借りるのでしたら、音風景。\nどこか似通ったざわめきを、わたくしは記憶しています」
955 = "「……Nếu mượn lời của Suika thì là âm thanh\nphong cảnh.\nTôi nhớ có một sự xôn xao nào đó rất giống\nthế này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。それはどのようなざわめきだ？」
1352 = "「Hô. Đó là sự xôn xao như thế nào?」"

# 【ハチロク】
# display as 八六
# JP: 「……日ノ本と帝鉄とが生命力に溢れていた時期。\n高度経済成長期の駅に満ちていた、ざわめきです」
967 = "「……Thời kỳ mà Hinomoto và Teitetsu tràn\nđầy sức sống.\nLà sự xôn xao tràn ngập các nhà ga trong\nthời kỳ kinh tế phát triển cao độ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なんとなくだが、イメージでしかないのだが。\nハチロクの言わんとすることは、わかるような気がする」
1368 = "「À……chỉ là lờ mờ thôi, chỉ là tưởng tượng\nthôi.\nNhưng tôi nghĩ mình hiểu điều Hachiroku\nmuốn nói.」"

# monologue
# JP: 生命力。あるいは昨今の日ノ本では、\n目立たなくなっているかもしれない、その輝きが――
2148 = "Sức sống. Hay sự tỏa sáng có lẽ\nđã trở nên mờ nhạt ở Hinomoto ngày nay――"

# monologue
# JP: ここ健為ではあちこちで、\nまばゆい光を放っていると、僕も感じる、それゆえに。
1902 = "Khắp nơi ở Kiện Vi này,\nđều đang phát ra ánh sáng chói lọi, tôi\ncũng cảm nhận được điều đó, chính vì vậy."

# 【ハチロク】
# display as 八六
# JP: 「喧騒の度合いはまるで異なっておりますけれど、\nそれでも――」
1751 = "「Dù mức độ ồn ào hoàn toàn khác nhau,\nnhưng mà――」"

# monologue
# JP: ハチロクが唇を結び、目を閉じる。\n僕も、倣う。
1925 = "Hachiroku mím môi, nhắm mắt lại.\nTôi cũng làm theo."

# monologue
# JP: 自転車の、バイクの、車の、さまざまな音たちに負けず。\n――なんと強く、明るく、この町の人の声は響くのだろう。
2188 = "Không hề lép vế trước đủ loại âm thanh của\nxe đạp, xe máy, ô tô.\n――Giọng nói của người dân thị trấn này\nvang lên thật mạnh mẽ và tươi sáng làm\nsao."

# 【ハチロク】
# display as 八六
# JP: 「やはり、似通って聞こえます。\n人間の皆様の声が……まるで、前進をしているようで」
1577 = "「Quả nhiên là nghe rất giống nhau.\nGiọng nói của con người……như thể đang tiến\nvề phía trước vậy.」"

# 【姜】
# display as 姜
# JP: 「然り。然り」
1597 = "「Đúng vậy. Đúng vậy.」"

# monologue
# JP: 姜さんが、とても満足そうに頷く。\n珍しく大きな身振りで、両手を広げる。
2024 = "Cô Jiang gật đầu với vẻ rất hài lòng.\nHiếm khi thấy cô ấy dang rộng hai tay với\ncử chỉ lớn như vậy."

# 【姜】
# display as 姜
# JP: 「北琴や聖都のような大都市だけではなく、こうした\n地方都市も、近年は目覚ましい経済発展を遂げています」
1211 = "「Không chỉ những đô thị lớn như Bắc Cầm\nhay Thánh đô, mà những\nthành phố địa phương thế này, những năm\ngần đây cũng đạt được sự phát triển kinh\ntế đáng kinh ngạc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「経済発展――」
1651 = "「Phát triển kinh tế――」"

# monologue
# JP: その一言が、少し意外に聞こえてしまう。
2168 = "Một câu nói đó, nghe có chút bất ngờ."

# monologue
# JP: 溢れるほどの活気が確かに満ち満ちてはいるが……\n建物や、道行く人の服装などは、北琴・聖都と比べると。
2083 = "Sự nhộn nhịp tràn trề quả thực đang hiện\nhữu nhưng……\nCác tòa nhà, hay trang phục của người qua\nđường, nếu so với Bắc Cầm hay Thánh đô\nthì."

# 【姜】
# display as 姜
# JP: 「……双鉄先生達は、\n出店の食べ物などへの抵抗をお持ちでしょうか？」
947 = "「……Thầy Soutetsu và mọi người,\ncó ngại đồ ăn ở các xe đẩy bán dạo không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「え？　出店、ですか？」
1345 = "「Hả? Xe đẩy bán dạo sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「食べてみたかと！！！\nおいしそうだし、見たことないし！」
1668 = "「Muốn ăn thử á!!!\nTrông ngon quá chừng, mà em cũng chưa thấy\nbao giờ nữa!」"

# monologue
# JP: ……唐突な出店推しにいささか意表をつかれたが、\n言われてみると、確かに小腹もすいている。
891 = "……Lời đề nghị ăn xe đẩy bán dạo đột ngột\nkhiến tôi hơi bất ngờ,\nnhưng nhắc mới nhớ, quả thực tôi cũng đang\nhơi đói."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も抵抗はないですし――ああ、そこにある\n厚揚げのようなものは、実においしそうですね」
1485 = "「Tôi cũng không ngại đâu――À, cái món\ngiống đậu phụ chiên ở đằng kia, trông ngon\nthật đấy.」"

# 【姜】
# display as 姜
# JP: 「かしこまりました。では、人数分頼みましょう。\nハチロクさんと西瓜には、もちろん別途用意があります」
1439 = "「Tôi hiểu rồi. Vậy để tôi gọi đủ cho mọi\nngười nhé.\nTất nhiên là Hachiroku và Suika sẽ có phần\nriêng.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、恐縮でございます」
1720 = "「Chà, thật ngại quá ạ.」"

# monologue
# JP: ハチロクの謝意を微笑で受けて、\n姜さんは、出店のおばさんに仲国語で話しかける。
1887 = "Nhận lấy lời cảm ơn của Hachiroku bằng một\nnụ cười,\ncô Jiang nói chuyện với bà cô bán hàng\nbằng tiếng Trung."

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は注文をしています。\n注文しているのは揚げ豆腐です」
1457 = "「Cô Jiang đang gọi món.\nMón cô ấy gọi là đậu phụ chiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「揚げ豆腐。ふむ。\nやはり厚揚げの仲間だったか――ん？」
1612 = "「Đậu phụ chiên. Hừm.\nQuả nhiên là họ hàng với đậu phụ chiên\ngiòn――hửm?」"

# monologue
# JP: 姜さんがスマホを取り出し、なにか操作し――\n出店のおばさんも応じるようにスマホを取り出したが……
1981 = "Cô Jiang lấy điện thoại thông minh ra,\nthao tác gì đó――\nBà cô bán hàng cũng lấy điện thoại thông\nminh ra để đáp lại nhưng……"

# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は支払いをすませました。\n今から、揚げ豆腐が作られます」
1456 = "「Cô Jiang đã thanh toán xong rồi.\nBây giờ đậu phụ chiên sẽ được làm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「支払いを済ませた？　とは――」
1239 = "「Thanh toán xong rồi? Nghĩa là――」"

# 【西瓜】
# display as 西瓜
# JP: 「QRコード決済です。そこに貼ってあるQRコードを\nアプリで撮影し、金額とパスワードを入力し決済です」
1219 = "「Thanh toán bằng mã QR. Dùng ứng dụng chụp\nlại mã QR\ndán ở kia, nhập số tiền và mật khẩu là\nthanh toán xong.」"

# 【志寰】
# display as 志寰
# JP: 「そうすると、決済記録が受け取り側……この場合\n出店のおばさんにも届きますから、それで会計終了です」
1515 = "「Khi đó, hồ sơ thanh toán sẽ được gửi đến\nngười nhận……trong trường hợp này\nlà bà cô bán hàng, vậy là xong việc tính\ntiền.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！？　出店でそんなことができるのか？」
1727 = "「Cái gì!? Ở xe đẩy bán dạo mà cũng làm\nđược vậy sao?」"

# monologue
# JP: 確かにQRコードのシールが目立つところ貼られているが、\nあれが決済手段になるとは、まるで想像もしていなかった。
2081 = "Quả thật miếng dán mã QR được dán ở nơi dễ\nthấy,\nnhưng tôi hoàn toàn không ngờ đó lại là\nphương thức thanh toán."

# 【西瓜】
# display as 西瓜
# JP: 「出店でというか、どこでも出来ます。\n今時は、出来ないお店の方が少ないかと西瓜は思います」
1681 = "「Không chỉ ở xe đẩy bán dạo, mà ở đâu cũng\ncó thể làm được.\nThời buổi này, Suika nghĩ số cửa hàng\nkhông làm được thế này mới là số ít.」"

# 【志寰】
# display as 志寰
# JP: 「提示された支払い金額を確認して、自分で送金する上。\nパスワードもありますから、現金よりも安全です」
1655 = "「Sau khi xác nhận số tiền thanh toán được\nhiển thị, tự mình chuyển tiền.\nLại còn có mật khẩu nữa, nên an toàn hơn\ntiền mặt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
958 = "「……Ra là vậy.」"

# monologue
# JP: スマホの起動時に決済時。\n最低でも二回、パスワードの確認が求められるわけだ。
2073 = "Lúc khởi động điện thoại và lúc thanh\ntoán.\nNghĩa là yêu cầu xác nhận mật khẩu ít nhất\nhai lần."

# monologue
# JP: 落としたが最後勝手に使われても何の保証もない現金より、\n確かによほど安全だろうし、スマートにも思える。
2124 = "So với tiền mặt, rớt một cái là bị xài\nchùa không có gì đảm bảo,\nthì quả thật an toàn hơn nhiều, và cũng có\nvẻ thông minh hơn."

# 【日々姫】
# display as 日日姬
# JP: 「あー、いうたら姜さん、\n北琴駅できっぷ買うときもスマホで決済とかしてたかも」
1359 = "「A, nhắc mới nhớ, hình như lúc cô Jiang\nmua vé ở ga Bắc Cầm cũng thanh toán bằng\nđiện thoại á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
1371 = "「A!」"

# monologue
# JP: 言われてみれば、そのとおりだ。\n姜さんが現金を扱ってるのを、僕らは未だ目にしていない。
2185 = "Nghe em ấy nói mới nhớ, đúng là vậy.\nChúng tôi vẫn chưa hề thấy cô Jiang dùng\ntiền mặt."

# monologue
# JP: クレジットカード払いかなにかかとぼんやり思い、\n特段気にかけてもいなかったが……
2061 = "Tôi cứ lơ mơ nghĩ là thanh toán bằng thẻ\ntín dụng hay gì đó,\nnên cũng không đặc biệt để tâm nhưng……"

# 【志寰】
# display as 志寰
# JP: 「双鉄先生、そこの食堂でも、ほら、\nテーブルにQRコードが貼られていますよ」
1754 = "「Thầy Soutetsu, ở quán ăn đằng kia, thầy\nxem,\ntrên bàn cũng có dán mã QR kìa.」"

# monologue
# JP: 西瓜の言葉を補強しようとしてであろうか。\nすぐ近くにある食堂を、志寰君は指さし示す。
2042 = "Có lẽ là để củng cố thêm cho lời nói của\nSuika.\nCậu Zhihuan chỉ tay về phía quán ăn ở ngay\ngần đó."

# 【日々姫】
# display as 日日姬
# JP: 「ほんとだ――ってか、コンセント全席についとーと？\nってか！　壁！　FREE　wifiって書いてあるし！！」
1635 = "「Thật á――khoan đã, chỗ ngồi nào cũng có ổ\ncắm điện luôn á?\nKhoan đã! Trên tường! Có ghi FREE wifi\nkìa!!」"

# 【西瓜】
# display as 西瓜
# JP: 「それは日ノ本でもごく普通のことではありませんか？」
1713 = "「Chuyện đó ở Hinomoto không phải là rất\nbình thường sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、チェーン店等では確かに珍しくはないのだが――\nこういう、個人経営の食堂みたいなところでは――！！」
1711 = "「Không, ở các cửa hàng dạng chuỗi thì quả\nthực không hiếm――\nNhưng ở những nơi như quán ăn do cá nhân\nkinh doanh thế này thì――!!」"

# monologue
# JP: ああ、そうか。\n姜さんが立ち食いを――出店での食事を選択したのは。
1990 = "À, ra vậy.\nViệc cô Jiang chọn đứng ăn――chọn ăn ở xe\nđẩy bán dạo là."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……これは素晴らしい経済発展だ」
1723 = "「Quả thực……đây là một sự phát triển kinh\ntế tuyệt vời.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
1336 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わからんか、日々姫。この町では――いや、\n仲国という国全体で、会計全てが一瞬で行われるのだ」
1265 = "「Em không hiểu sao, Hibiki. Ở thị trấn\nnày――không,\ntrên toàn đất nước Trung Quốc, mọi việc\nthanh toán đều diễn ra trong chớp mắt.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
1357 = "「A――」"

# monologue
# JP: ぽん、と思わぬところから、\n手と手を打ち合わせる音が響く。
1995 = "Bốp, một âm thanh vỗ tay\nvang lên từ một nơi không ngờ tới."

# 【ハチロク】
# display as 八六
# JP: 「つまり、洗濯機と同じことですね？」
1728 = "「Nói cách khác, giống như máy giặt phải\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、洗濯機か。うむ。同じだな。\nそれも間違いなく、劇的な経済発展だ」
1398 = "「À, máy giặt sao. Ừm. Giống nhau đấy.\nĐó cũng chắc chắn là một sự phát triển\nkinh tế mang tính bước ngoặt.」"

# 【日々姫】
# display as 日日姬
# JP: 「？？？」
1411 = "「???」"

# monologue
# JP: 首を傾げる日々姫に向けて、\nハチロクは、どこか懐かしそうな声で語りかける。
2287 = "Hướng về phía Hibiki đang nghiêng đầu thắc\nmắc,\nHachiroku cất giọng như mang theo chút\nhoài niệm."

# 【ハチロク】
# display as 八六
# JP: 「かつての機関区では、日々姫。ナッパ服を全て手で、\n洗濯板と固形石鹸でお洗濯していたのです」
1542 = "「Ở khu đầu máy ngày xưa ấy, Hibiki. Toàn\nbộ Dịch vụ trang màu đều được\ngiặt bằng tay, với bàn giặt và xà phòng\ncục đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「ええええ！？」
1335 = "「Hảảảả!?」"

# monologue
# JP: 日々姫の驚きは大げさではない。乗務はまだしも、\n火室掃除などしてしまうなら、真っ黒になるナッパ服。
2110 = "Sự ngạc nhiên của Hibiki không hề phóng\nđại. Lái tàu thì còn đỡ,\nchứ nếu dọn dẹp buồng lửa thì Dịch vụ\ntrang màu sẽ đen thui."

# monologue
# JP: アレを洗濯板で洗濯するなど……\n想像だけで、気が遠くなる労力だ。
2150 = "Giặt thứ đó bằng bàn giặt……\nChỉ tưởng tượng thôi cũng thấy tốn công\nsức đến mức phát ngất."

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;が終わり、復興がはじまり、国が豊かになり。\nそうしてようやく、機関区にも洗濯機が導入されて――」
910 = "「Khi \\x%l大戦;#00ffc040;Đại chiến%l;#; kết thúc, công cuộc tái\nthiết bắt đầu, đất nước trở nên giàu có.\nVà cuối cùng, máy giặt cũng được đưa vào\nkhu đầu máy――」"

# 【日々姫】
# display as 日日姬
# JP: 「わかったと！　手間が省けるのは、時間の余裕が\nできることとおんなじやけん――それも、経済発展」
1498 = "「Em hiểu rồi á! Tiết kiệm được công sức,\ncũng giống như\ncó thêm thời gian rảnh rỗi――đó cũng là,\nphát triển kinh tế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1595 = "「Đúng vậy.」"

# monologue
# JP: ……僕の不明を、実にさりげなく姜さんが補ってくれた。
885 = "……Cô Jiang đã bù đắp sự thiếu hiểu biết\ncủa tôi một cách rất tự nhiên."

# monologue
# JP: 高層ビルや高級ブランドのように目立つものだけが、\n経済発展の形ではないのだ、と。
2176 = "Không chỉ những thứ nổi bật như tòa nhà\nchọc trời hay thương hiệu cao cấp,\nmới là hình thức của sự phát triển kinh\ntế."

# 【姜】
# display as 姜
# JP: 「双鉄先生、日々姫先生。志寰君も」
1755 = "「Thầy Soutetsu, cô Hibiki. Cả cậu Zhihuan\nnữa.」"

# monologue
# JP: 姜さんは全く普段と変わらぬ調子で、\nできたてほやほやの揚げ豆腐を僕らに手渡してくれる。
2028 = "Cô Jiang với thái độ không hề khác ngày\nthường,\nđưa cho chúng tôi những miếng đậu phụ\nchiên nóng hổi vừa mới làm xong."

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すみません。ありがとうございます」
1401 = "「A, xin lỗi cô. Cảm ơn cô ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ！　おいしそ～！　これ、人参と大根の千切り？\nそいば、揚げ豆腐切って挟んであると？」
1343 = "「Oa! Trông ngon quá~! Cái này, là cà rốt\nvà củ cải thái chỉ á?\nKẹp vào giữa miếng đậu phụ chiên đã cắt ra\ná?」"

# 【志寰】
# display as 志寰
# JP: 「ですね。その上から、黒酢と黒砂糖がかかっています。\n汜川では、かなり好まれる軽食です」
1562 = "「Đúng vậy. Sau đó rưới thêm giấm đen và\nđường đen lên trên.\nỞ Tứ Xuyên, đây là món ăn nhẹ khá được ưa\nchuộng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1346 = "「Hô.」"

# monologue
# JP: 挟まっている具がかなりたっぷりとしているために、\n座って食べんと零してしまいそうではあるが、旨そうだ。
1880 = "Vì nhân kẹp bên trong khá nhiều,\nnếu không ngồi ăn thì có vẻ dễ làm rơi\nvãi, nhưng trông ngon thật."

# 【姜】
# display as 姜
# JP: 「[よつい,1]四井までは車を手配してあります。\n移動しながらお食事いただく形で大丈夫でしょうか？」
1305 = "「Tôi đã sắp xếp xe đến Tứ Tỉnh rồi.\nMọi người vừa di chuyển vừa dùng bữa có\nđược không ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「そうしないように気をつけますけど……逆に、\n車の中で零しちゃったりしても大丈夫なのかどうかが」
1492 = "「Bọn em sẽ cẩn thận để không làm\nrơi……nhưng ngược lại,\nnếu lỡ làm rơi trong xe thì có sao không\nạ.」"

# 【姜】
# display as 姜
# JP: 「無問題です。当方の関係先の車ですから」
1213 = "「Không vấn đề gì đâu. Đó là xe của bên\nliên quan với chúng tôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、喜んでそうさせていただきます」
1734 = "「Nếu vậy, chúng tôi rất sẵn lòng.」"

# 【姜】
# display as 姜
# JP: 「では、移動しましょう」
1736 = "「Vậy, chúng ta di chuyển thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「あの……」
1676 = "「Dạ……」"

# monologue
# JP: 歩きだしざま、ハチロクが小声で西瓜に問いかける。
1951 = "Vừa bước đi, Hachiroku vừa hỏi nhỏ Suika."

# 【ハチロク】
# display as 八六
# JP: 「[よつい,1]四井、といま姜様はおっしゃられてましたが――\n日ノ本の、あの、旧財閥の四井と？」
1449 = "「Cô Jiang vừa nhắc đến Tứ Tỉnh――\ncó liên quan gì đến tập đoàn tài phiệt Tứ\nTỉnh cũ của Hinomoto không?」"

# 【西瓜】
# display as 西瓜
# JP: 「それは全く関係ないです。[よつい,1]四井は単純に四本の[たてこう,1]立坑――\n井戸のような深い坑道があるからついた名前だそうです」
1463 = "「Hoàn toàn không liên quan đâu. Tứ Tỉnh\nđơn giản là bốn cái giếng thẳng đứng――\nnghe nói tên gọi đó xuất phát từ việc có\nnhững đường hầm sâu như giếng.」"

# 【ハチロク】
# display as 八六
# JP: 「立坑ですか！？　と、いうことは――\nそこに、いよいよ！」
1682 = "「Giếng thẳng đứng sao!? Nghĩa là――\nCuối cùng cũng đến đó!」"

# monologue
# JP: にっこり、西瓜が笑い、頷く。
2231 = "Suika mỉm cười, gật đầu."

# 【西瓜】
# display as 西瓜
# JP: 「そのとおりです。そこにいよいよ。鉱山町の蒸気機関車\n――[ばがんてつどう,3]芭岩鉄道の機関車たちが、待っています！」
1258 = "「Đúng vậy. Cuối cùng cũng đến đó. Những\nđầu máy hơi nước của thị trấn khai thác mỏ\n――những đầu máy của Đường sắt Ba Nham,\nđang chờ đón chúng ta!」"

# 【ハチロク】
# display as 八六
# JP: 「わ！　わ！　わ！　わっ！！！」
1339 = "「Oa! Oa! Oa! Oaaa!!!」"

# monologue
# JP: 真正面だ。\n前面展望真正面に、小さな\x%l蒸機;#00ffc040;蒸機%l;#;の煙室戸がある。
2172 = "Ngay chính diện.\nNgay chính diện khung cảnh phía trước, có\nmột cửa buồng khói của \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#;\nnhỏ."

# monologue
# JP: 運転台と客車窓とが、とても近い。\n機関士さんの運転操作さえ、前面窓からは良く見えよう。
2293 = "Buồng lái và cửa sổ toa hành khách rất gần\nnhau.\nNgay cả thao tác lái của người lái tàu,\ncũng có thể nhìn thấy rõ từ cửa sổ phía\ntrước."

# 【ハチロク】
# display as 八六
# JP: 「行き道は逆機で走行するのですね！\n面白い！　なんて素敵な光景でしょう」
1308 = "「Lúc đi là chạy lùi phải không ạ!\nThú vị thật! Khung cảnh tuyệt vời làm\nsao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1409 = "「Ừm.」"

# monologue
# JP: 前面ふたつの大窓に、それぞれハチロク、日々姫が、\nがっぷりかぶりついている。
2121 = "Hai cửa sổ lớn phía trước, Hachiroku và\nHibiki mỗi người\nđang bám chặt lấy một bên."

# monologue
# JP: 乗客は僕らだけの貸切状態。\nその他に乗っているのは芭岩鉄道のガイドさんだけ――
2070 = "Hành khách chỉ có chúng tôi, như bao trọn\nchuyến.\nNgười khác trên tàu chỉ có hướng dẫn viên\ncủa Đường sắt Ba Nham――"

# 【双鉄】
# display as 雙鐵
# JP: 「本当に素晴らしい光景だ。\nこれは、大変な贅沢だな」
1633 = "「Thật sự là một khung cảnh tuyệt vời.\nĐây quả là một sự xa xỉ lớn.」"

# monologue
# JP: ハチロクは満面の笑顔で何度もこちらを振り返る。\n日々姫は全く振り向くことなく、物も言わない。
1950 = "Hachiroku với nụ cười rạng rỡ liên tục\nngoảnh lại nhìn tôi.\nHibiki thì hoàn toàn không ngoảnh lại,\ncũng không nói một lời."

# monologue
# JP: ただ一心に、夢中になって、\nスケッチブックへ、目にする全てを刻みつけている。
2005 = "Chỉ một lòng say sưa,\nkhắc ghi mọi thứ nhìn thấy vào cuốn sổ\nphác thảo."

# 【ハチロク】
# display as 八六
# JP: 「小型タンク機ならではの光景かもしれませんね！\nこれほどの速度で、逆機で上り勾配を進むだなんて」
1247 = "「Có lẽ đây là cảnh tượng chỉ có ở đầu máy\nhơi nước thùng nước loại nhỏ thôi nhỉ!\nChạy lùi lên dốc với tốc độ cỡ này cơ mà.」"

# 【姜】
# display as 姜
# JP: 「ギャクキは、初めて耳にする日ノ本語です」
1325 = "「Chạy lùi, là từ tiếng Hinomoto lần đầu\ntiên tôi nghe thấy.」"

# monologue
# JP: 姜さんの声に、西瓜も志寰君も頷く。
2228 = "Trước câu nói của cô Jiang, Suika và cậu\nZhihuan cũng gật đầu."

# monologue
# JP: ハチロクはニコニコ顔で、僕をみつめて唇を閉じる――\nうむ、ならば。ここは、不肖この僕が解説役を務めよう。
1929 = "Hachiroku mỉm cười nhìn tôi, khép hờ đôi\nmôi――\nỪm, nếu vậy. Chỗ này, kẻ bất tài là tôi\nđây sẽ đảm nhận vai trò giải thích."

# 【双鉄】
# display as 雙鐵
# JP: 「蒸気機関車を、ボイラー側、運転台側と分けた場合、\n運転台側を進行方向に向け走行するのが、逆機です」
1662 = "「Nếu chia đầu máy hơi nước thành phía lò\nhơi và phía buồng lái,\nthì việc chạy với phía buồng lái hướng về\nphía trước, gọi là chạy lùi.」"

# 【西瓜】
# display as 西瓜
# JP: 「あー……いまこの機関車がやってる、バック運転が、\nつまり“逆機”ということですね？」
1367 = "「A……việc đầu máy này đang làm bây giờ,\nchạy lùi lại,\ntức là \"chạy lùi\" phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。加減弁やブレーキ弁、逆転機ハンドルなどは当然、\nボイラー側への進行を想定して配置されているため――」
1407 = "「Ừm. Van tiết lưu hơi, van phanh, tay cầm\ncần đảo chiều v.v... tất nhiên,\nđược bố trí giả định cho việc di chuyển về\nphía lò hơi nên――」"

# 【志寰】
# display as 志寰
# JP: 「……体の向きとは逆方向に向けて機関車を走らせる――\n体を捻っての運転操作になるわけですね？　難しそうだ」
981 = "「……Cho đầu máy chạy ngược hướng với cơ\nthể――\nNghĩa là phải vặn người để thao tác lái\nphải không ạ? Có vẻ khó nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。実際に難しいです。8620のように炭水車を持つ\n機関車では、ここまでの速度を出す逆機運転は見ない程」
1564 = "「Vâng. Thực tế là rất khó. Với những đầu\nmáy có toa tiếp than nước như 8620,\nhầu như không thể thấy việc chạy lùi với\ntốc độ cỡ này.」"

# 【西瓜】
# display as 西瓜
# JP: 「炭水車……\nあ！　その分単純に見通しが悪くなるから？」
1613 = "「Toa tiếp than nước……\nA! Vì đơn giản là tầm nhìn sẽ bị cản trở\nbởi nó sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。後ろの短いタンク式、かつ小型であることは、\n逆機運転に有利な条件とはいえる」
1550 = "「Đúng vậy. Việc phía sau là kiểu thùng\nnước ngắn, và lại nhỏ gọn,\ncó thể nói là điều kiện thuận lợi cho việc\nchạy lùi.」"

# 【ハチロク】
# display as 八六
# JP: 「とはいえるのです。けれどそうであっても。なかなか\nここまで見事な、微塵の迷いもない運転は――！？」
1719 = "「Đúng là có thể nói như vậy. Nhưng dù vậy\nđi nữa. Một pha lái\ntuyệt vời đến mức này, không chút do dự\nthì quả là hiếm thấy――!?」"

# monologue
# JP: 不意に、ハチロクの声が止まる。\n同時に日々姫のスケッチする手もいきなり止まり――
1942 = "Bất chợt, giọng của Hachiroku im bặt.\nĐồng thời tay đang phác thảo của Hibiki\ncũng đột ngột dừng lại――"

# 【日々姫】
# display as 日日姬
# JP: 「あの……志寰君？　仲国の鉄道って、\nレイルロオドがスマホいじるの――結構あると？」
1673 = "「Cho chị hỏi……cậu Zhihuan? Ở đường sắt\nTrung Quốc,\nRailord bấm điện thoại――có thường thấy\nkhông á?」"

# 【志寰】
# display as 志寰
# JP: 「スマホですか！？　乗務中にはありえません。\n仲国国鉄であれば規則違反。一発で乗務停止です」
1565 = "「Điện thoại sao!? Trong lúc làm nhiệm vụ\nthì không thể nào.\nNếu là Đường sắt Quốc gia Trung Quốc thì\nđó là vi phạm nội quy. Sẽ bị đình chỉ công\ntác ngay lập tức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「というか、まさか」
1643 = "「Chẳng lẽ, không lẽ nào.」"

# 【ハチロク】
# display as 八六
# JP: 「そのまさかでございます。双鉄様」
1467 = "「Đúng là cái không lẽ nào đó đấy ạ. Ngài\nSoutetsu.」"

# monologue
# JP: ハチロクが体をずらし、\n前面窓の視界を僕にも譲ってくれる。
1931 = "Hachiroku né người sang một bên,\nnhường tầm nhìn từ cửa sổ phía trước cho\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「――ガッツリだな。\nスマホを凝視しているではないか」
913 = "「――Nhìn chằm chằm luôn kìa.\nKhông phải là đang dán mắt vào điện thoại\nsao.」"

# 【姜】
# display as 姜
# JP: 「……OurChatというアプリのグループチャットで、\n情報共有をしているそうです」
973 = "「……Có vẻ như họ đang chia sẻ thông tin\nqua nhóm chat của một ứng dụng tên là\nOurChat.」"

# 【双鉄】
# display as 雙鐵
# JP: 「グループチャット？」
1653 = "「Nhóm chat?」"

# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生、あれを見ればすぐわかるかと」
1756 = "「Thầy Soutetsu, nhìn cái đó là thầy sẽ\nhiểu ngay thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ――」
1410 = "「Hửm? À――」"

# monologue
# JP: 僕らと同じ客車に乗車してくれている\n若い女性のガイドさん――
1989 = "Nữ hướng dẫn viên trẻ tuổi\nđang ngồi cùng toa hành khách với chúng\ntôi――"

# monologue
# JP: 芭岩鉄道の職員さんが、スマホをひらひらふりながら、\n人の良さそうな笑顔を浮かべ、画面を僕らに示してくれる。
2006 = "Nhân viên của Đường sắt Ba Nham, vừa vẫy\nvẫy chiếc điện thoại,\nvừa nở nụ cười hiền lành, đưa màn hình cho\nchúng tôi xem."

# 【日々姫】
# display as 日日姬
# JP: 「あー、[ダイン,3]dineの仲国版って感じ？\nそかそか、これなら」
1390 = "「A, kiểu như phiên bản Trung Quốc của DINE\ná?\nRa vậy ra vậy, nếu là cái này thì.」"

# 【ハチロク】
# display as 八六
# JP: 「人間もレイルロオドも、情報共有をリアルタイムで\nできますね。合理的といえば、確かに合理的ですが……」
1715 = "「Cả con người và Railord đều có thể chia\nsẻ thông tin\ntheo thời gian thực nhỉ. Nói là hợp lý thì\nquả thực là hợp lý, nhưng……」"

# monologue
# JP: 不満気に飲み込まれた、『ですが』の続きは僕にもわかる。\nスマホ操作は乗務中、誰かが前方注視を切るということだ。
2279 = "Vế sau của chữ 『nhưng』 bị nuốt ngược vào\ntrong một cách bất mãn, tôi cũng hiểu\nđược.\nThao tác điện thoại trong lúc làm nhiệm\nvụ, nghĩa là ai đó sẽ phải rời mắt khỏi\nphía trước."

# monologue
# JP: レイルロオドが共感で情報を受け、\nそれを口頭で伝える方が…………ああ、いや――
2272 = "Railord nhận thông tin qua cộng cảm,\nrồi truyền đạt lại bằng miệng thì…………À,\nkhoan đã――"

# monologue
# JP: （発信場所と受信場所に必ずレイルロオドがいるとは\n限らんものな。ゆえに僕らも列車無線を使うわけだし）
2310 = "(Không phải lúc nào nơi phát và nơi nhận\ncũng có Railord.\nĐó là lý do chúng tôi cũng sử dụng bộ đàm\ntrên tàu mà.)"

# monologue
# JP: 無線も無論、集中力を阻害する。\nが、その影響は軽微であるし、情報の重要度は高い。
2143 = "Bộ đàm tất nhiên cũng làm giảm sự tập\ntrung.\nNhưng ảnh hưởng của nó là rất nhỏ, và mức\nđộ quan trọng của thông tin lại cao."

# monologue
# JP: ゆえ、僕らは無線を安全な通信手段として選択し……\nとなると――スマホ通信の可否も容易には判断できんか。
2068 = "Vì vậy, chúng tôi chọn bộ đàm làm phương\ntiện liên lạc an toàn……\nNếu vậy thì――việc cho phép liên lạc bằng\nđiện thoại hay không cũng không dễ đánh\ngiá."

# 【双鉄】
# display as 雙鐵
# JP: 「……ちなみに今は、\nどのような情報の行き来があったのですか？」
1002 = "「……Nhân tiện thì vừa rồi,\nhọ đã trao đổi thông tin gì vậy?」"

# 【姜】
# display as 姜
# JP: 「いまは――おお――\nちょっと、日ノ本ではないことかもしれませんね」
1294 = "「Vừa rồi là――ồ――\nCó lẽ là chuyện không xảy ra ở Hinomoto\nđâu ạ.」"

# 【西瓜】
# display as 西瓜
# JP: 「仲国国鉄でもあまりない事例かと思います。\n西瓜も、かなりびっくりしました」
1423 = "「Em nghĩ ở Đường sắt Quốc gia Trung Quốc\ncũng hiếm có trường hợp này.\nSuika cũng khá ngạc nhiên ạ.」"

# monologue
# JP: ガイドさんの仲国語も、かなり楽しげな口調に聞こえる。\n一体何を話しているのか――
1997 = "Tiếng Trung của cô hướng dẫn viên nghe\ncũng khá vui vẻ.\nRốt cuộc họ đang nói chuyện gì――"

# 【姜】
# display as 姜
# JP: 「水牛が、かなりレールに接近していたそうです。\n危ないので追い払うよう、飼い主に連絡してほしいと」
1253 = "「Có vẻ như có con trâu nước đã đến rất gần\nđường ray.\nVì nguy hiểm nên họ muốn liên lạc với chủ\nđể đuổi nó đi.」"

# 【日々姫】
# display as 日日姬
# JP: 「水牛！！！？　わたし、見逃したと！！」
1592 = "「Trâu nước!!!? Em, bỏ lỡ mất rồi!!」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしも気が付きませんでした。\n機関車ばかりに目を奪われて――」
1486 = "「Tôi cũng không để ý.\nVì mải nhìn đầu máy quá――」"

# monologue
# JP: みなの視線が、自然と横窓から外へ向く。\n……ああ、なんとのどかな――山岳の田園風景だろう。
2002 = "Ánh mắt của mọi người, tự nhiên hướng ra\nngoài từ cửa sổ bên hông.\n……Chà, thật là một phong cảnh điền viên\nmiền núi――thanh bình làm sao."

# monologue
# JP: 溜池があり、ちいさな棚田が幾重にも重なり、\nそのあちこちに、アヒルかなにかの姿も見える。
2126 = "Có ao chứa nước, những thửa ruộng bậc\nthang nhỏ xếp lớp lên nhau,\nđâu đó còn thấy bóng dáng của vịt hay con\ngì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「この辺は、農耕地帯なのですか？」
1724 = "「Khu vực này là vùng nông nghiệp sao?」"

# monologue
# JP: 問えばすぐさま西瓜がガイドさんへと伝え、\nガイドさんの答えを姜さんが僕らに伝えてくれる。
2057 = "Vừa hỏi, Suika lập tức truyền đạt lại cho\ncô hướng dẫn viên,\nrồi cô Jiang dịch lại câu trả lời của cô\nhướng dẫn viên cho chúng tôi."

# 【姜】
# display as 姜
# JP: 「炭鉱業の他には、畜産、林業、農業、養蜂で\n生活をささえる沿線住民が多いとのことです」
1749 = "「Ngoài khai thác than đá, có rất nhiều cư\ndân dọc tuyến đường\nsống dựa vào chăn nuôi, lâm nghiệp, nông\nnghiệp và nuôi ong.」"

# 【ハチロク】
# display as 八六
# JP: 「ヨウホウとは、ミツバチを飼う養蜂ですか？」
1763 = "「Nuôi ong, là nuôi ong mật phải không ạ?」"

# 【姜】
# display as 姜
# JP: 「そのとおりですね。この辺の蜂蜜は名物で、\n『[はちみついわえき,3]蜂蜜岩駅』という駅の近くで特に盛んだと」
1559 = "「Đúng vậy. Mật ong vùng này là đặc sản,\nnghe nói đặc biệt phát triển ở gần ga 『Ga\nĐá Mật Ong』.」"

# 【日々姫】
# display as 日日姬
# JP: 「っていうか水牛！　水牛、普通に飼われとーと？」
1740 = "「Nhưng mà trâu nước á! Trâu nước, được\nnuôi phổ biến lắm hả?」"

# 【姜】
# display as 姜
# JP: 「……。水田の運営・維持には必要な家畜とのことです。\nこの山間部では、トラクター等の導入は難しいそうです」
991 = "「……Nghe nói đó là gia súc cần thiết để\ncanh tác và duy trì ruộng lúa.\nỞ vùng núi này, có vẻ khó đưa máy cày\nv.v... vào sử dụng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日ノ本でも昔は牛馬を、農機具代わりに使って\n……いや、山間部では、今もそうしているかもしれんな」
1395 = "「À, ở Hinomoto ngày xưa cũng dùng trâu\nngựa thay cho nông cụ\n……À không, ở vùng núi, có lẽ bây giờ vẫn\nlàm vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、なんでそん水牛が、\n轟音立てて列車が走っとーレールに接近してくると？」
1329 = "「Nhưng mà, tại sao con trâu nước đó,\nlại đến gần đường ray có đoàn tàu đang\nchạy ầm ầm vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「確かにですね。\n普通は怖がって逃げそうなものですが……」
1674 = "「Đúng vậy nhỉ.\nBình thường thì sẽ sợ hãi mà bỏ chạy mới\nphải……」"

# monologue
# JP: 姜さんが僕らの疑問を伝えよう――\nとした瞬間に、ガイドさんがまたスマホをいじって、
2026 = "Cô Jiang định truyền đạt thắc mắc của\nchúng tôi――\nthì ngay lúc đó, cô hướng dẫn viên lại bấm\nđiện thoại,"

# 【日々姫】
# display as 日日姬
# JP: 「なにこれ！　かわゆか！　おもしろかー！！」
1709 = "「Gì đây! Dễ thương quá! Thú vị ghê á!!」"

# monologue
# JP: 日々姫がすぐさまスケッチをする。
2106 = "Hibiki lập tức phác thảo lại."

# monologue
# JP: ガイドさんがスマホで示した写真の景色――\n水牛がレールを舐めている、実にのどかな光景を。
2181 = "Cảnh tượng trong bức ảnh mà cô hướng dẫn\nviên đưa cho xem qua điện thoại――\nMột con trâu nước đang liếm đường ray, một\nkhung cảnh thật sự thanh bình."

# 【姜】
# display as 姜
# JP: 「……この水牛は、常習犯なのだとのことです。\n蒸気機関車が走ったあとのレールを舐めるのが好きだと」
993 = "「……Nghe nói con trâu nước này là tội phạm\nquen mặt rồi.\nNó thích liếm đường ray sau khi đầu máy\nhơi nước chạy qua.」"

# 【日々姫】
# display as 日日姬
# JP: 「水牛が常習犯！！」
1590 = "「Trâu nước là tội phạm quen mặt!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「常習犯に居座られては、事故や遅延を招きかねんな。\n追い払うよう手配を、というのはごく妥当な安全確保か」
1458 = "「Nếu tội phạm quen mặt cứ lảng vảng ở đó,\ncó thể dẫn đến tai nạn hoặc chậm trễ.\nViệc sắp xếp để đuổi nó đi, quả là một\nbiện pháp đảm bảo an toàn rất thỏa đáng.」"

# monologue
# JP: こくり、とハチロクが小さく頷く。
1946 = "Hachiroku khẽ gật đầu."

# 【ハチロク】
# display as 八六
# JP: 「国と鉄道とが変化すれば、アクシデントも連絡手段も、\nさまざまに変化していくものなのですね」
1421 = "「Khi đất nước và đường sắt thay đổi, thì\nsự cố và phương tiện liên lạc,\ncũng thay đổi theo nhiều cách khác nhau\nnhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「日ノ本にはなかと？　動物がレールを舐めたりとか」
1546 = "「Ở Hinomoto không có hả? Việc động vật\nliếm đường ray á.」"

# 【ハチロク】
# display as 八六
# JP: 「はい――あ！　いえ！　噂に聞いたことがございます。\n鹿がレイルを舐めに来て、そのため事故が発生すると」
1548 = "「Vâng――A! Không! Tôi từng nghe tin đồn.\nRằng hươu đến liếm đường ray, và vì thế mà\nxảy ra tai nạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そうなのか」
1649 = "「Trời, vậy sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。そのときにはわたくし、笑い話のように捉えて\n……ですので今まで、すっかり失念しておりましたが」
1558 = "「Vâng. Lúc đó tôi cứ tưởng đó là chuyện\nđùa\n……nên đến tận bây giờ, tôi đã hoàn toàn\nquên mất.」"

# monologue
# JP: こくり、ハチロクは小さく頷く。
1920 = "Hachiroku khẽ gật đầu."

# 【ハチロク】
# display as 八六
# JP: 「見た目の印象ほどには変わらないのかもしれませんね。\n日ノ本と仲国と、ふたつの国の鉄道は」
1502 = "「Có lẽ không khác biệt nhiều như ấn tượng\nban đầu nhỉ.\nĐường sắt của hai nước, Hinomoto và Trung\nQuốc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。もちろん、この車窓風景など、\n日ノ本ではなかなか見られんだろうが――」
1501 = "「Có lẽ vậy. Tất nhiên, phong cảnh nhìn từ\ncửa sổ tàu này,\nở Hinomoto khó mà thấy được nhưng――」"

# monologue
# JP: ……ポーレットが“仲国鉄も齧っている”と\n言っていた意味が、今なら少しわかる気がする。
889 = "……Tôi cảm thấy giờ mình đã hiểu phần nào ý\nnghĩa câu nói\n\"tôi cũng có tìm hiểu về Đường sắt Trung\nQuốc\" của Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本ではもう失われた鉄道風景が――\n旧帝鉄の全時代と。あるいは、描けなかった未来図さえ」
1215 = "「Phong cảnh đường sắt đã mất ở Hinomoto――\nToàn bộ thời kỳ của Teitetsu cũ. Hoặc thậm\nchí là viễn cảnh tương lai chưa từng được\nvẽ ra.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、あるのかも！　仲国全土を探したら、\n中国の鉄道風景の、いろんなとこにちょっとずつ！」
1361 = "「A, có khi là vậy á! Nếu tìm kiếm khắp\nTrung Quốc,\nthì sẽ thấy phong cảnh đường sắt của Trung\nQuốc, mỗi nơi một chút!」"

# 【ハチロク】
# display as 八六
# JP: 「その上きっと、もとより日ノ本には無いものも、\nいくらもあるのでございましょうね」
1283 = "「Hơn nữa chắc chắn, những thứ vốn dĩ không\ncó ở Hinomoto,\ncũng có rất nhiều phải không ạ.」"

# monologue
# JP: ハチロクの声に、\nまたいくらかの自嘲と羨望が混じってしまう。
1945 = "Trong giọng nói của Hachiroku,\nlại xen lẫn chút tự trào và ghen tị."

# 【西瓜】
# display as 西瓜
# JP: 「逆もですよ、ハチロク」
1324 = "「Ngược lại cũng vậy đấy, Hachiroku.」"

# monologue
# JP: それを聞きつけ――あるいは何か共感を受け取ったのか、\n少し慌てたような声で、西瓜が会話に加わってくる。
1878 = "Nghe thấy vậy――hoặc có lẽ nhận được cộng\ncảm nào đó,\nSuika xen vào cuộc trò chuyện với giọng\nđiệu hơi hoảng hốt."

# 【西瓜】
# display as 西瓜
# JP: 「その逆もまた真実です。\n日ノ本には、仲国の鉄道に無いものがたくさんあります」
1721 = "「Điều ngược lại cũng là sự thật.\nỞ Hinomoto, có rất nhiều thứ mà đường sắt\nTrung Quốc không có.」"

# 【志寰】
# display as 志寰
# JP: 「というか、ナインスターズがその代表ではないですか」
1286 = "「Nói đúng hơn, Nine Stars không phải là\nđại diện cho điều đó sao.」"

# 【姜】
# display as 姜
# JP: 「然り、然り」
# 1597 = "「沒錯，沒錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1369 = "「啊」" 

# monologue
# JP: きょとんとした声がでてしまう。
2048 = "Tôi thốt lên một giọng ngơ ngác."

# monologue
# JP: ハチロク日々姫がやはりきょとんとした顔で僕をみて――\nそして全員、同時に小さく吹き出してしまう。
1927 = "Hachiroku và Hibiki cũng nhìn tôi với vẻ\nmặt ngơ ngác――\nRồi tất cả, đồng loạt bật cười khúc khích."

# 【双鉄】
# display as 雙鐵
# JP: 「――本当にそうですね！」
914 = "「――Đúng là vậy thật!」"

# monologue
# JP: 仲国の鉄道にしかない強み。\n日ノ本の鉄道にしかない強み。
1900 = "Điểm mạnh chỉ có ở đường sắt Trung Quốc.\nĐiểm mạnh chỉ có ở đường sắt Hinomoto."

# monologue
# JP: そうして両国の鉄道が、ともに有している強み。\nそれらをうまく、組み合わせることができるのならば――
2011 = "Và những điểm mạnh mà đường sắt của cả hai\nnước cùng sở hữu.\nNếu có thể kết hợp chúng lại với nhau một\ncách khéo léo thì――"

# monologue
# JP: （ボッ！　ポっ！！！）
2307 = "(Tu! Tu!!!)"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1355 = "「Hửm.」"

# monologue
# JP: 短い汽笛。合図の汽笛だ。\n途端にガイドさんが最後部座席にしゃがみこみ――
2128 = "Tiếng còi ngắn. Là còi báo hiệu.\nNgay lập tức cô hướng dẫn viên ngồi xổm\nxuống ghế sau cùng――"

# 【ハチロク】
# display as 八六
# JP: 「ああ。見逃しておりました。\nあのようなところに、手ブレーキがついていたのですね」
1392 = "「À. Tôi đã bỏ sót.\nỞ chỗ như vậy, lại có lắp phanh tay nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「手ブレーキまでかけるということは、長時間停車か？」
1207 = "「Đạp cả phanh tay, nghĩa là đỗ tàu lâu\nsao?」"

# 【姜】
# display as 姜
# JP: 「……この駅でいったん、\n観光客車の我々は下車するそうです」
969 = "「……Nghe nói ở ga này,\nnhững người đi toa hành khách du lịch như\nchúng ta sẽ xuống xe một lát.」"

# 【西瓜】
# display as 西瓜
# JP: 「芭岩鉄道で一番の見物を見せてくれるそうです。\n動画撮影がおすすめだと、ガイドさんは言っています」
1516 = "「Nghe nói họ sẽ cho xem cảnh đáng xem nhất\ncủa Đường sắt Ba Nham.\nCô hướng dẫn viên khuyên nên quay video.」"

# 【日々姫】
# display as 日日姬
# JP: 「だって、にぃに。動画の方よろしく」
1399 = "「Đó, anh hai. Nhờ anh quay video nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1440 = "「Đã rõ.」"

# monologue
# JP: ……客車を降ろされ誘導された先にあるのは、\n見晴台のようなところだ。
879 = "……Sau khi xuống toa hành khách và được\nhướng dẫn, trước mắt chúng tôi là\nmột nơi giống như đài quan sát."

# monologue
# JP: ガイドさんも一緒に下りて、\nカメラをここにこう構えろと細かく指示までしてくれる。
1996 = "Cô hướng dẫn viên cũng xuống theo,\nvà chỉ dẫn chi tiết cách cầm máy ảnh ở đây\nthế này thế kia."

# 【ハチロク】
# display as 八六
# JP: 「……機関車を逆機から付け直しておりますね。\nここで折り返すということでございましょうか」
987 = "「……Họ đang tháo đầu máy chạy lùi ra và lắp\nlại kìa.\nCó phải là sẽ quay đầu ở đây không ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの観光客車の後ろにあった、一般客車の乗客も、\nここまでで全ておりたようだし――間違いなかろう」
1425 = "「Hành khách ở toa hành khách thường phía\nsau toa du lịch của chúng ta,\ncũng đã xuống hết ở đây rồi――chắc không\nsai đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　機関車ば後進して戻っていくと！\nここのカーブで撮影させてくれるサービスとね、これ」
1379 = "「A! Đầu máy đang lùi lại kìa!\nĐây là dịch vụ cho phép chụp ảnh ở khúc\ncua này á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「らしいな」
1437 = "「Có vẻ vậy.」"

# monologue
# JP: 動画モードにしていたゆえに撮りそこねたが、\n機関車が後進していく姿も確かに、ひとつの絵だった。
1999 = "Vì đang để chế độ quay video nên tôi đã lỡ\nmất khoảnh khắc chụp ảnh,\nnhưng hình ảnh đầu máy lùi lại quả thực\ncũng là một bức tranh đẹp."

# 【姜】
# display as 姜
# JP: 「……このカーブに再び入ってきてくれるそうです。\n『動画をそろそろ撮りはじめてください』と」
986 = "「……Nghe nói đầu máy sẽ tiến vào khúc cua\nnày một lần nữa.\nHọ bảo 『chuẩn bị bắt đầu quay video đi là\nvừa』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。ありがとうございます」
1441 = "「Tôi hiểu rồi. Cảm ơn cô.」"

# monologue
# JP: 動画撮影は慣れていないが、\nポーレットからコツは教わっている。
2280 = "Tôi không quen quay video,\nnhưng đã được Paulette chỉ cho bí quyết."

# monologue
# JP: 確か、『カメラをできるだけ動かさないでくださいね』。\n『撮ってる相手が動くんですから』――であったか。
2008 = "Nhớ không lầm thì, 『cố gắng đừng di chuyển\nmáy ảnh nhé』.\n『Vì đối tượng đang quay sẽ di chuyển\nmà』――là vậy phải không."

# 【ハチロク】
# display as 八六
# JP: 「あ！　参りますね」
1374 = "「A! Tới rồi kìa.」"

# monologue
# JP: （ポ～～ーーーっ！）
2306 = "(Tuuuúúúú!)"

# monologue
# JP: 長い汽笛と、ブラスト音とドラフト音。
2276 = "Tiếng còi dài, cùng tiếng khí thải xi lanh\nvà hút gió lò hơi."

# monologue
# JP: プレートさえ無い小さな小さな機関車が、\n長くて白い煙を牽いて、カーブへゆっくり侵入してくる。
2262 = "Một chiếc đầu máy nhỏ xíu thậm chí không\ncó biển số,\nkéo theo làn khói trắng dài, chầm chậm\ntiến vào khúc cua."

# monologue
# JP: （バシューーーーーーーーーーーーーっ！！！）
2304 = "(Phụttttttttt!!!)"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「おおおっ！！？」\n「これはっ！！！？」
1348 = "「Ồ ồ ồ!!?」\n「Đây là!!!?」"

# monologue
# JP: ブロワーなどというレベルではない。
2263 = "Không chỉ ở mức độ thiết bị thổi gió."

# monologue
# JP: 目に見えるほどの水を含んだ圧倒的な量の蒸気が、\n谷側へ向け、猛然たる勢いで排出され――っ！！！！
1985 = "Một lượng hơi nước khổng lồ chứa lượng\nnước có thể nhìn thấy bằng mắt thường,\nđược xả ra với một thế lực mãnh liệt về\nphía thung lũng――!!!!"

# 【日々姫】
# display as 日日姬
# JP: 「虹っ！！！！」
1475 = "「Cầu vồng!!!!」"

# monologue
# JP: つかの間、ペンの音がとまって、\nまた猛然と走り始める。
2175 = "Trong khoảnh khắc, tiếng bút dừng lại,\nrồi lại bắt đầu chạy mãnh liệt."

# monologue
# JP: カメラを動かさないように、\n僕はそれだけ――ただそれだけに、全神経をそそぎこむ。
1914 = "Cố gắng không di chuyển máy ảnh,\ntôi chỉ――dồn toàn bộ tâm trí vào việc đó."

# 【ハチロク】
# display as 八六
# JP: 「なんて……綺麗な……\nなんと鮮やかで、なんと豪快なことでしょう」
1712 = "「Thật là……đẹp quá……\nThật rực rỡ, thật hào hùng làm sao.」"

# 【西瓜】
# display as 西瓜
# JP: 「……[かんすい,1]罐水を捨てたそうです」
974 = "「……Nghe nói họ đã xả bỏ nước trong lò\nhơi.」"

# monologue
# JP: 西瓜の声も、呆然としている。\n感動にか、少し震えてもいる。
2237 = "Giọng của Suika cũng ngỡ ngàng.\nCó lẽ vì cảm động, giọng cô bé hơi run\nrẩy."

# monologue
# JP: 僕のこころも、震えている。\nこれは決して、日ノ本では目にできないであろう光景だ。
2058 = "Trái tim tôi cũng đang run rẩy.\nĐây chắc chắn là khung cảnh không bao giờ\ncó thể thấy ở Hinomoto."

# 【西瓜】
# display as 西瓜
# JP: 「……ボイラー内のゴミを蒸気とともに大量に排水し、\nある程度のボイラー掃除を、サービスしつつ行った、と」
977 = "「……Xả một lượng lớn nước cùng với rác\ntrong lò hơi ra ngoài,\nvừa làm dịch vụ cho du khách xem vừa dọn\ndẹp lò hơi ở một mức độ nào đó.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ……そのような機構がついているのですね。\nなんと便利なことでしょう」
1337 = "「Chà……có lắp đặt cơ chế như vậy sao.\nThật tiện lợi làm sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……谷底が無人の渓谷だからこそできることだな」
965 = "「……Chỉ có thể làm được vì dưới đáy thung\nlũng là khe suối không người thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、確かに御一夜じゃ無理とね。クマ川にボイラ水、\nなんの処理もなく流せんし、それ以前に危ないし」
1389 = "「A, đúng là ở Ohimitera thì không thể á.\nNước lò hơi xả thẳng xuống sông Kuma\nmà không qua xử lý gì cả, chưa kể là rất\nnguy hiểm nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。クマ川下りを楽しんでいる方たちに、\n頭上から熱湯を浴びせることになりかねん」
1630 = "「Đúng vậy. Có thể sẽ dội nước sôi lên đầu\nnhững người đang thưởng thức chuyến đi\nthuyền trên sông Kuma mất.」"

# monologue
# JP: ほうっと、ため息のようなハチロクの排気。\nけれどもそこから、もう羨望の色は消えている。
1922 = "Hachiroku xả hơi dài như một tiếng thở\ndài.\nNhưng trong đó, sự ghen tị đã biến mất."

# 【ハチロク】
# display as 八六
# JP: 「きっと、わたくしたちには出来ぬことだからこそ、\nこうも魅力的に見えるのでございましょうね」
1484 = "「Chắc chắn, chính vì đó là điều chúng ta\nkhông thể làm được,\nnên nó mới trông hấp dẫn đến vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「出来ぬ……ものかな」
1594 = "「Không thể……sao.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
1757 = "「Hả?」"

# monologue
# JP: 湯医線では確かに無理だが、例えば肥颯線、山線であれば\n――ああいや、あそこでは水は一際貴重な物だ。
2134 = "Ở tuyến Yui thì chắc chắn là không thể,\nnhưng ví dụ như tuyến Hisatsu, hay tuyến\nnúi\n――À không, ở đó nước là một thứ vô cùng\nquý giá."

# monologue
# JP: 炭水車の水が空になりかけることも珍しくない、\nあの極めつけの難所で、こうも大量の水を捨てるなど――
2001 = "Việc nước trong toa tiếp than nước cạn\nkiệt cũng không phải là chuyện hiếm,\nở nơi hiểm trở bậc nhất đó, mà lại xả bỏ\nmột lượng nước lớn thế này thì――"

# 【双鉄】
# display as 雙鐵
# JP: 「……いや。やはりハチロクの言うとおりだな。\nあらゆる意味で、これほどの贅沢は、僕らにはできん」
945 = "「……Không. Quả nhiên đúng như Hachiroku\nnói.\nTheo mọi nghĩa, sự xa xỉ đến mức này,\nchúng ta không thể làm được.」"

# 【日々姫】
# display as 日日姬
