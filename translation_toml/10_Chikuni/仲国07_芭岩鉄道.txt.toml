# monologue
# JP: いささか僕には気になるが、\n西瓜は特に戸惑ったふうもなく通訳していく。
1904 = "Dù tôi hơi bận tâm,\nnhưng Suika vẫn thông dịch mà không có vẻ\ngì là bối rối."

# 【十九号】
# display as No.19
# JP: 「%f思源宋体B;[もちろん出てくるけど,5]问题当然有啊、[そのために姉妹がたくさんいるんだし,14]我们那么多姐妹就是为此而存在的、\n%f思源宋体B;[＞本当に困っちゃうことはあんまりないよ,14]至于真造成影响的情况那就很少了%f;」
1402 = "「%f思源宋体B;[Tất　nhiên　là　có　rồi,5]问题当然有啊、[Chính　vì　thế　nên　mới　có　nhiều　chị　em　chứ,14]我们那么多姐妹就是为此而存在的、\n%f思源宋体B;[Nhưng　thực　sự　gặp　rắc　rối　thì　không　nhiều　đâu,14]至于真造成影响的情况那就很少了%f;」"

# 【西瓜】
# display as 西瓜
# JP: 「トラブルはもちろんあるが、深刻な問題になることは\nないとのことです。運用されている\x%l蒸機;#00ffc040;蒸機%l;#;も多いので」
1624 = "「Rắc rối thì tất nhiên là có, nhưng không\nđến mức thành vấn đề nghiêm trọng.\nVì số lượng \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; đang vận hành\ncũng nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならばなによりだ」
1732 = "「Vậy thì tốt quá rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「部品の調達などは大丈夫なのですか？\n前照灯、仕様の異なるもので代用していたようですが」
1759 = "「Việc mua sắm phụ tùng có ổn không?\nĐèn pha, có vẻ như đang dùng loại có thông\nsố kỹ thuật khác để thay thế thì phải.」"

# monologue
# JP: （ああ――）
2303 = "(À――)"

# monologue
# JP: なるほど、ハチロクはそこに引っかかりを覚えていたのか。\n確かに、かなり目立ってしまってはいたが――
1971 = "Ra là vậy, Hachiroku đang băn khoăn về\nđiều đó sao.\nQuả thực, nó khá là nổi bật nhưng――"

# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。LEDに換えとったとねー」
1387 = "「A, ừm. Đã thay bằng đèn LED á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。あれはLED灯だったか。\nカバーとずいぶん寸法が違うとは思っていたのだが」
1716 = "「Vậy sao. Đó là đèn LED à.\nThảo nào tôi thấy kích thước khác hẳn với\ncái vỏ bọc.」"

# monologue
# JP: 西瓜の通訳。\nとたん、んんん？　と、No.19は大きく大きく首を傾げる。
2316 = "Suika thông dịch.\nNgay lập tức, Số 19 nghiêng đầu thật sâu\nvới vẻ mặt \"Hửm?\"."

# 【十九号】
# display as No.19
# JP: 「%f思源宋体B;[代用ってどういうこと,7]代用是什么意思呢？　[前照灯は、交換しただけだよ。明るくて便利な,14]我们就是把头灯换成方便又明亮的\n%f思源宋体B;[ＬＥＤに,4]ＬＥＤ灯啊。[その方が便利だから,7]这样不是更方便嘛%f;」
1245 = "「%f思源宋体B;[Thay　thế　là　sao,7]代用是什么意思呢？　[Đèn　pha　thì　chỉ　là　thay　mới　thôi.　Bằng　loại　sáng　hơn　và　tiện　lợi　hơn,14]我们就是把头灯换成方便又明亮的\n%f思源宋体B;[Là　LED　đó,4]ＬＥＤ灯啊。[Vì　như　vậy　tiện　lợi　hơn　mà,7]这样不是更方便嘛%f;」"

# 【西瓜】
# display as 西瓜
# JP: 「代用ではなく、明るく便利なLEDに交換しただけだと。\n何故代用と思われたのかを、不思議がっています」
1217 = "「Không phải là thay thế, mà chỉ là đổi\nsang đèn LED sáng và tiện lợi hơn thôi.\nCô ấy đang thắc mắc tại sao lại nghĩ đó là\nđồ thay thế.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1336 = "「咦？」" 

# monologue
# JP: 今度はハチロクが首を傾げる。
2260 = "Lần này đến lượt Hachiroku nghiêng đầu."

# 【ハチロク】
# display as 八六
# JP: 「だって、これほどの貴重な\x%l蒸機;#00ffc040;蒸機%l;#;ですよ？\n原型で保存せねば、文化的な価値が損なわれましょう」
1262 = "「Bởi vì, đây là \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; vô cùng\nquý giá mà?\nNếu không bảo tồn nguyên bản, thì giá trị\nvăn hóa sẽ bị tổn hại mất.」"

# 【西瓜】
# display as 西瓜
# JP: 「あー……」
# 1357 = "「啊——」" 

# monologue
# JP: 西瓜にまでも、困惑顔が伝染していく。\nその顔のままゆるゆると、ハチロクの言葉が訳されていく。
2257 = "Vẻ mặt bối rối lan sang cả Suika.\nVới khuôn mặt đó, cô bé từ từ dịch lại lời\ncủa Hachiroku."

# 【十九号】
# display as No.19
# JP: 「%f思源宋体B;[文化的な価値,3]文化价值？　[って]这……\n%f思源宋体B;[うーんと,4]让我想想哦。[例えば、さ,3]比方说吧――%f;」
1520 = "「%f思源宋体B;Giá trị văn hóa? Cái đó……\n%f思源宋体B;Để tôi nghĩ xem. Ví dụ nhé——%f;」"

# monologue
# JP: No.19の呟きを、西瓜はすぐには訳さない。
2234 = "Suika không lập tức dịch lại lời lầm bầm\ncủa No.19 cho chúng tôi."

# monologue
# JP: 考え込んでいる様子から続く言葉を、\nあるいは待っているのかもしれない。
2314 = "Có lẽ cô bé đang chờ No.19 nói hết câu vì\nthấy cô ấy đang trầm ngâm suy nghĩ."

# 【十九号】
# display as No.19
# JP: 「%f思源宋体B;[最初に扇風機がついてた客車なら、クーラーに交換されるの,15]如果把车厢里原有的电风扇换成空调、\n%f思源宋体B;[日ノ本の列車のお客さんは喜ばないの,12]日本的乘客难道还会不高兴吗？%f;」
1443 = "「%f思源宋体B;Nếu thay quạt điện vốn có trong\ntoa hành khách bằng máy lạnh,\n%f思源宋体B;hành khách đi tàu ở Hinomoto chẳng\nlẽ lại không vui sao?%f;」"

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本の乗客は、扇風機からクーラーへの交換を\n拒んでも、文化的価値を尊重するのですか？　と」
1430 = "「Cô ấy hỏi là, hành khách ở Hinomoto dù có\ntừ chối việc đổi quạt điện sang máy lạnh\nthì vẫn tôn trọng giá trị văn hóa sao?」"

# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「！」\n「あ」
1372 = "「!」\n「A」"

# 【ハチロク】
# display as 八六
# JP: 「それは……一般的にはクウラアの方が好まれましょう。\nが、歴史的な価値を持つ車輌と、そこらの客車では……」
1708 = "「Cái đó…… Nhìn chung thì máy lạnh vẫn được\nưa chuộng hơn ạ.\nNhưng mà, giữa một phương tiện có giá trị\nlịch sử và một toa hành khách bình thường\nthì……」"

# monologue
# JP: ハチロクの声が尻すぼみになる。
1944 = "Giọng của Hachiroku nhỏ dần."

# monologue
# JP: 当然だろう。この路線、生活路線の乗客にとり、\nNo.19たちの列車は当然、一般的なものなのだから。
2258 = "Cũng phải thôi. Đối với những hành khách\ntrên tuyến đường sinh hoạt này,\nđoàn tàu của nhóm No.19 hiển nhiên chỉ là\nmột phương tiện bình thường."

# 【ハチロク】
# display as 八六
# JP: 「……」
924 = "「……」"

# monologue
# JP: ハチロクが、これ以上は言葉が出ないといわんばかりに\n首をふる。
1934 = "Hachiroku lắc đầu, như thể không thốt nên\nlời nào nữa."

# monologue
# JP: その仕草まで、西瓜は律儀に翻訳する。
2264 = "Ngay cả cử chỉ đó, Suika cũng trung thực\ndịch lại."

# 【十九号】
# display as No.19
# JP: 「%f思源宋体B;[歴史的な価値を持つ車輌は、現役でいられないの,15]有历史价值的车辆就不能再服役了吗？\n%f思源宋体B;[日ノ本では昔と今は繋がってないの,17]日本的过去与现在难道不是一脉相承的吗？%f;」
1569 = "「%f思源宋体B;Phương tiện có giá trị lịch sử\nthì không thể tiếp tục phục vụ được nữa\nsao?\n%f思源宋体B;Quá khứ và hiện tại của Hinomoto\nchẳng lẽ không có sự gắn kết sao?%f;」"

# 【西瓜】
# display as 西瓜
# JP: 「日ノ本では歴史は現在と連続していないのですか？　と。\n歴史的価値を持つ車輌は、現役ではいられないのかと」
1429 = "「Cô ấy hỏi là, ở Hinomoto lịch sử và hiện\ntại không tiếp nối nhau sao?\nPhương tiện có giá trị lịch sử thì không\nthể tiếp tục hoạt động được nữa sao?」"

# 【ハチロク】
# display as 八六
# JP: 「――あああ！」
1370 = "「——Aaa!」"

# monologue
# JP: ハチロクが僕へとふりかえる。\nだから、頷く。強く。深く。
1933 = "Hachiroku ngoảnh lại nhìn tôi.\nVì vậy, tôi gật đầu. Thật mạnh. Thật sâu."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに僕らは……僕らの文化にはそうした一面。\n歴史をガラスケースに入れて大事にする部分もあろうな」
1642 = "「Đúng là chúng tôi…… văn hóa của chúng tôi\ncó mặt như vậy.\nCũng có phần trân trọng lịch sử bằng cách\nđặt nó vào tủ kính.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとはそぎゃん趣味の人にはよかかもだけど……\n普通に使いたい人にとったら、迷惑なだけの話よね」
1718 = "「Như vậy thì với những người có sở thích\nđó có thể là tốt, nhưng……\nvới những người muốn sử dụng bình thường\nthì chỉ tổ phiền phức thôi nhỉ.」"

# monologue
# JP: こくこく何度も、なのに力なくハチロクが頷く。
1917 = "Hachiroku gật đầu liên tục, nhưng lại tỏ\nra yếu ớt."

# monologue
# JP: 自らがガラスケースにしまわれて、“過去の遺物”と\n扱われていた――そんな記憶が蘇っているのかもしれない。
2062 = "Có lẽ ký ức về việc bản thân bị cất vào tủ\nkính và bị đối xử như\n\"di vật của quá khứ\"——đang ùa về trong tâm\ntrí em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、仲国では歴史と今は連続している。\n歴史が歴史の重みによって、現在を縛るものではない」
1255 = "「Nhưng ở Trọng Quốc, lịch sử và hiện tại\nlà một chuỗi liên tục.\nLịch sử không dùng sức nặng của nó để trói\nbuộc hiện tại.」"

# monologue
# JP: 聖都のホテルがそうだった。
2155 = "Khách sạn ở Thánh Đô cũng vậy."

# monologue
# JP: あきらかに歴史的建造物でありながら、\n何らの注意事項さえなく、僕らに寝床を与えてくれた。
2270 = "Dù rõ ràng là một công trình kiến trúc\nlịch sử,\nnhưng họ vẫn cho chúng tôi chỗ ngủ mà\nchẳng hề có một lời lưu ý nào."

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくだが、この国では今と過去とは等価なのだ。\nその活用の検討を、歴史は縛らないのであろう」
1266 = "「Có lẽ, ở quốc gia này hiện tại và quá khứ\ncó giá trị ngang nhau.\nLịch sử sẽ không trói buộc việc xem xét\ncách tận dụng chúng.」"

# monologue
# JP: 北琴も健為も、歴史館とレールが語る仲国の鉄道も同様だ。\n“今”という時間を、過去の積み重ねの例外としない――
2144 = "Bắc Cầm hay Kiện Vi, cũng như tuyến đường\nsắt Trọng Quốc mà bảo tàng lịch sử và\nđường ray kể lại, đều giống nhau.\nKhông coi thời gian \"hiện tại\" là ngoại lệ\ncủa sự tích lũy từ quá khứ——"

# monologue
# JP: それは決して、歴史の軽視などではない。\n歴史を今の、今を歴史の一部とし。単に等しく扱うことだ。
2261 = "Đó tuyệt đối không phải là sự coi nhẹ lịch\nsử.\nMà là coi lịch sử là một phần của hiện\ntại, và hiện tại là một phần của lịch sử.\nĐơn giản là đối xử bình đẳng với chúng."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして、きっとこの国は――」
1584 = "「Vì vậy, chắc chắn quốc gia này——」"

# monologue
# JP: 北琴空港を思い出す。\n今考えれば、あの光景も極めて象徴的だった。
2051 = "Tôi nhớ lại sân bay Bắc Cầm.\nGiờ nghĩ lại, khung cảnh đó cũng cực kỳ\nmang tính biểu tượng."

# monologue
# JP: 飛行型エアクラのテクノロジーを鉄輪式鉄道に応用し。\nこの国は……新しい交通機関を、生み出していた。
2035 = "Ứng dụng công nghệ của Aircra bay vào\nđường sắt bánh sắt.\nQuốc gia này…… đã tạo ra một phương tiện\ngiao thông mới."

# 【双鉄】
# display as 雙鐵
# JP: 「未来も、やはり等価なものと扱うだろう。\n現在と、過去と、なんらの差異をつけることなく」
1570 = "「Tương lai, có lẽ cũng sẽ được đối xử bình\nđẳng như vậy.\nKhông hề có sự phân biệt nào với hiện tại\nvà quá khứ.」"

# 【ハチロク】
# display as 八六
# JP: 「理解、できたように思います」
1499 = "「Em nghĩ là…… em hiểu rồi ạ.」"

# monologue
# JP: ハチロクの声は、深く静かだ。
1943 = "Giọng của Hachiroku sâu lắng và tĩnh lặng."

# 【ハチロク】
# display as 八六
# JP: 「でしたら――でしたら双鉄さま。\n仲国版ナインスタアズは」
1523 = "「Nếu vậy——nếu vậy thưa ngài Soutetsu.\nNine Stars phiên bản Trọng Quốc sẽ là」"

# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「っ！！！！！」\n「そっか！！！」
1383 = "「!!!!!」\n「Đúng rồi!!!」"

# monologue
# JP: 完全に動きを止めていた日々姫の腕が、\nまるで鎖を断ち切ったかのように走り始める。
2033 = "Cánh tay vốn đã dừng hẳn lại của Hibiki,\nbắt đầu di chuyển nhanh thoăn thoắt như\nthể vừa đứt xích."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、タブレットを借りるぞ」
1540 = "「Hibiki, cho anh mượn máy tính bảng nhé.」"

# monologue
# JP: 日々姫は確か、ネット環境を維持してくれていた。\nならば、いつものやり方で――
2104 = "Hibiki chắc chắn đã giữ kết nối mạng.\nNếu vậy, cứ theo cách mọi khi thôi——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ポーレット。すまん、僕だ。\n急な話で恐縮なのだが――」
1404 = "「A, Paulette à. Xin lỗi, tôi đây.\nNgại quá vì chuyện hơi đường đột, nhưng\nmà——」"

# monologue
# JP: 薄情だ。連絡不足だ。ネットで会話できるなら、\nメールだけじゃなく今までもそうしてほしかった――
876 = "Thật vô tình. Thiếu liên lạc quá đấy. Nếu\ncó thể nói chuyện qua mạng,\nthì đáng lẽ từ trước đến giờ anh cũng nên\nlàm thế chứ không chỉ gửi mỗi email——"

# monologue
# JP: 画面の向こう、ポーレットの頬が膨れてる。\nまさしくご説ご尤もだが、それは帰国してのち聞こう。
2154 = "Phía bên kia màn hình, má Paulette phồng\nlên.\nĐúng là cô ấy nói có lý, nhưng chuyện đó\nđể về nước rồi nghe tiếp vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「今夜、会議を招集してくれ。集まるメンバーだけでいい。\nが、赤井宮司とニイロクは可能な限り出席を」
1237 = "「Tối nay, hãy triệu tập một cuộc họp giúp\ntôi. Chỉ cần những thành viên có thể tập\ntrung là được.\nNhưng hãy cố gắng mời đền chủ Akai và\nNiiroku tham dự.」"

# monologue
# JP: ぴたり、日々姫の指が止まる。\nその目を見れば、大丈夫だと頷いてくれる。
2109 = "Ngón tay của Hibiki chợt dừng lại.\nNhìn vào mắt em ấy, em ấy gật đầu ra hiệu\nkhông sao."

# monologue
# JP: ハチロクもまっすぐ僕を見る。\nほんの少しだけ恥じ入るように。その何倍も、誇らしげに。
1919 = "Hachiroku cũng nhìn thẳng vào tôi.\nCó chút gì đó ngượng ngùng. Nhưng phần\nnhiều là vẻ tự hào."

# 【双鉄】
# display as 雙鐵
# JP: 「仲国版ナインスターズに関する提言の――\n僕らが見出した方向性の、可否を検討してほしいのだ」
1743 = "「Về đề xuất liên quan đến Nine Stars phiên\nbản Trọng Quốc——\nTôi muốn thảo luận xem hướng đi mà chúng\nta tìm ra có khả thi hay không.」"
