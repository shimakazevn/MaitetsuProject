2176 = "經濟發展的體現，並不只有摩天大樓和高檔品牌這些光鮮的東西。" 

# 【姜】
# display as 姜
# JP: 「双鉄先生、日々姫先生。志寰君も」
1755 = "「雙鐵先生，日日姬女士，還有志寰」" 

