1498 = "Nhìn lại, một lần nữa——!!! Amazing!!!\nBức ảnh mà lúc nãy tôi hoàn toàn, hoàn\ntoàn không hiểu gì cả——"

# monologue
# JP: 「これ、セックスの写真なんだ。わぁ……男の人の男性器、\n女の人の女性器に――そっか、いれてるんだ」
2214 = "「Anh sẽ cho em mượn mà. Nếu là anh\nSoutetsu.\nChắc chắn, áo sơ mi hay thứ gì đó, đại\nloại vậy」"

# 【電車姫】
# display as 奥莉薇
