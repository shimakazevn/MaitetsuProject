2093 = "「Dù làm tình có quan trọng hay tuyệt vời\nđến đâu đi nữa thì với Olivy?\nTôi nghĩ nó Not for me. Không dành cho\nOlivy đâu.」"

# 【ひよこ】
# display as 奥莉薇
# JP: 「ああ――そうですか」
1375 = "「Dù làm tình có quan trọng hay tuyệt vời\nđến đâu đi nữa thì với Olivy?\nTôi nghĩ nó Not for me. Không dành cho\nOlivy đâu.」"

# monologue
