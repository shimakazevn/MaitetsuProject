1336 = "Mới chỉ là lần làm tình thứ hai, vậy mà em\nấy đã nũng nịu đòi mang thai,\nkhao khát hạt giống của tôi đến mức tham\nlam, cố gắng ngậm lấy đầu khấc của tôi."

