53 = "「Hửm? ——A, có vẻ như cô ấy tỉnh rồi.」"
# monologue
# display as 雛
# JP: 「……ん？　……あれ？　フシチョーハカセ？\nそっか、オリヴィ――」
1560 = "「......Ưm? ......Ủa? Tiến sĩ Phoenix? Ra vậy, Olivy——」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「おやおや、再起動ボケですかな？\nオリヴィ氏は今――と、言いますか、つい先程まで」
1528 = "「Chà chà, cô vẫn chưa tỉnh ngủ sau khi khởi động lại sao? Cô Olivy bây giờ——hay nói đúng hơn là, cho đến tận vừa nãy」"
# monologue
# display as 雛
# JP: 「だいじょぶ、オッケー、思い出せてる。\nね？　フシチョーハカセ。オリヴィ、今回って」
1465 = "「Không sao, okay, tôi nhớ ra rồi. Đúng không? Tiến sĩ Phoenix. Olivy, lần này」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「法定検査はクリアしました。とはいえ――」
1711 = "「Đã vượt qua đợt kiểm tra theo luật định. Mặc dù vậy——」"
# monologue
# display as 雛
# JP: フシチョーハカセの顔がちょこっと曇っちゃう。\nああ、やっぱりかぁ。しょーがないよね。自覚もあるし。
1367 = "Khuôn mặt của Tiến sĩ Phoenix hơi tối sầm lại. Ah, quả nhiên là vậy. Hết cách rồi nhỉ. Mình cũng tự nhận thức được mà."
# monologue
# JP: 「ギリギリなんとか通った――っていうか、\nむしろ『通した』、みたいな感じなんでしょ？　きっと」
2103 = "「Vừa vặn vượt qua——hay nói đúng hơn là, có cảm giác như cô đã 『cho qua』 nhỉ? Chắc chắn là vậy rồi.」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「……」
1673 = "「......」"
# monologue
# display as 雛
# JP: 漏れちゃったみたいなタメイキ。ちょっと辛そう。\nフシチョーハカセ、わかってたけどやさしいんだ。
889 = "Một tiếng thở dài buột ra. Trông cô ấy có vẻ hơi đau khổ. Tiến sĩ Phoenix, mình biết mà, cô ấy rất tốt bụng."
# 【ひよこ】
# JP: 「そこまで、でしたか？」
2106 = "「Đến mức đó sao?」"
# monologue
# display as 雛
# JP: 「ま、ね。乗務は頑張ってこなしてるけど、\n休んでるとき、すっごくボーっとしちゃうこと多いし」
1640 = "「À, thì. Dù tôi vẫn đang cố gắng hoàn thành tốt công việc trên tàu, nhưng lúc nghỉ ngơi, tôi lại hay bị thẫn thờ lắm.」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ふむ。\nその点は恐らく改善されているかと思いますがね」
1627 = "「Hừm. Điểm đó có lẽ đã được cải thiện rồi.」"
# monologue
# display as 雛
# JP: 「Really?」
1480 = "「Really?」"
# monologue
# display as 奥莉薇
# JP: 身体、ワンツーって動かしてみる。\nwow!! さすが検査のあとだけあって、けっこー軽い！
1947 = "Tôi thử cử động cơ thể, một hai. Wow!! Quả nhiên là sau khi kiểm tra, cơ thể nhẹ nhàng hẳn lên!"
# monologue
# JP: 「びっくり！　すごいや、いまはカイチョー！\n重いみたいなシブいみたいなの、なくなってる！」
2215 = "「Bất ngờ thật! Tuyệt quá, bây giờ tôi thấy rất khỏe! Cảm giác nặng nề hay cứng đơ đều biến mất rồi!」"
# monologue
# display as 奥莉薇
# JP: えへへ！　うれしい！！\nきっとすぐまた戻っちゃうけど、それでも！
1581 = "Ehehe! Vui quá!! Chắc chắn là sẽ sớm trở lại như cũ thôi, nhưng mà!"
# monologue
# JP: 「ありがとね♪　フシチョーハカセ！」
2164 = "「Cảm ơn cô nha♪ Tiến sĩ Phoenix!」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「お礼を言われるようなことは。オリヴィ氏の点検整備は、\nこちらとしても得られる知識が大変多くありもしますし」
1574 = "「Không có gì đáng để cô phải cảm ơn đâu. Việc kiểm tra và bảo dưỡng cho cô Olivy, cũng mang lại cho tôi rất nhiều kiến thức mà.」"
# monologue
# display as 雛
# JP: 「知識……\nknowledge……」
1733 = "「Kiến thức...... knowledge......」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ふむ？」
1759 = "「Hửm?」"
# monologue
# display as 雛
# JP: フシチョーハカセが眼鏡越し、\nオリヴィのお顔をじーって見てくる。
1561 = "Tiến sĩ Phoenix nhìn chằm chằm vào mặt Olivy qua cặp kính."
# 【ひよこ】
# JP: 「何かあるのですかな？\n気になることや、知りたいことなどが」
2312 = "「Có chuyện gì sao? Cô có điều gì bận tâm hay muốn biết à?」"
# monologue
# display as 雛
# JP: 「あ、ううん！？　いいの。レイルロオドのこととか、\n鉄道のこととかと、全然関係ないことだから……maybe」
1693 = "「A, không!? Không có gì đâu. Vì nó hoàn toàn không liên quan gì đến Railord hay đường sắt cả......maybe」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「たぶん、であるなら関係があるのかもしれませんな。\n答えられるとは限りませんが、試しに質問してみては？」
1508 = "「Nếu đã là 'maybe' thì có lẽ là có liên quan đấy. Chưa chắc tôi đã trả lời được, nhưng cô cứ thử hỏi xem sao?」"
# monologue
# display as 雛
# JP: ……聞いたらヨクナイみたいな感じもしてるけど……\nけどフシチョーハカセなら知ってるかもだそ――うん！
1794 = "......Có cảm giác như không nên hỏi thì hơn...... Nhưng nếu là Tiến sĩ Phoenix thì có thể cô ấy sẽ biết——ừm!"
# monologue
# JP: 「あのね！　えと、ちょっと待ってて。オリヴィ、\nバッグにしまいっぱいなしに……あ、あった！」
2317 = "「Này nhé! Ừm, đợi tôi một chút. Olivy, không cất trong túi xách......a, đây rồi!」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ほう？　かなり念入りにたたまれてますな」
1384 = "「Ồ? Gấp cẩn thận quá nhỉ.」"
# monologue
# display as 雛
# JP: 「うん。放っておいたらイケナイ気がして、\nだけど持ってるのもなんかヤで、ちっちゃくしたの」
1469 = "「Ừm. Tôi có cảm giác không nên vứt nó lung tung, nhưng giữ khư khư thì cũng kỳ, nên tôi đã gấp nhỏ lại.」"
# monologue
# display as 奥莉薇
# JP: 広げてみたら――うわわ、やっぱり。何回みてもこの写真、\nすっごく不思議で、ぞわぞわってするぅ！
1531 = "Mở ra xem thử——oái, quả nhiên là vậy. Dù có nhìn bao nhiêu lần đi nữa, bức ảnh này vẫn thật kỳ lạ, khiến mình sởn cả gai ốc!"
# monologue
# JP: 「あのね、これなの。\n網棚に置き忘れてあった詠字新聞なんだけど――」
2232 = "「Này nhé, là cái này đây. Tờ báo Eiji bị bỏ quên trên giá để hành lý——」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ええ」
1630 = "「Ừm.」"
# monologue
# display as 雛
# JP: 「この写真――これにうつってる男の人と女の人、\nはだかんぼでなにしてるの？」
1534 = "「Bức ảnh này——người đàn ông và người phụ nữ trong ảnh, họ đang trần truồng làm gì vậy?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ああ」
1864 = "「Vâng.」"
# monologue
# display as 雛
# JP: フシチョーハカセ、くすって笑う。なんだかちょっと\n困ったみたいな、だけどどこかは面白そうに。
1859 = "Tiến sĩ Phoenix cười khúc khích. Trông có vẻ hơi bối rối, nhưng phần nào đó lại tỏ ra khá thích thú."
# 【ひよこ】
# JP: 「ふぅん――詠字新聞だけあって、\nなるほど、明瞭に写っておりますなぁ」
2107 = "「Hừm——Quả không hổ danh là báo Eiji, chụp rõ nét thật đấy nhỉ.」"
# monologue
# display as 雛
# JP: 「！」
1748 = "「!」"
# monologue
# display as 奥莉薇
# JP: さすがはフシチョーハカセ！　ドクター・フェニックス！\nやっぱり、これがなんだか知ってるんだ！！
1926 = "Đúng là Tiến sĩ Phoenix! Dr. Phoenix! Quả nhiên là cô ấy biết cái này là gì!!"
# 【ひよこ】
# JP: 「しかし――ふぅむ。\nいったいどこから、どのように説明をしたものか……」
2276 = "「Nhưng mà——hừm. Rốt cuộc phải bắt đầu giải thích từ đâu và như thế nào đây......」"
# monologue
# display as 雛
# JP: フシチョーハカセ、一回メガネを外して拭いて、\nまた戻してから、ひとつタメイキ。
1316 = "Tiến sĩ Phoenix tháo kính ra lau một lần, đeo lại rồi khẽ thở dài một tiếng."
# 【ひよこ】
# JP: 「オリヴィ氏？　ああ……知らない方がいいことや、\n知っても仕方ないことなども世の中にはありはしますが」
2097 = "「Cô Olivy này? À......trên đời này cũng có những chuyện không nên biết, hay có biết cũng chẳng để làm gì đâu.」"
# monologue
# display as 雛
# JP: 「この写真のこといってるの？　オリヴィ、\nこれって何してるのかを、知らない方がいいの？」
1593 = "「Cô đang nói về bức ảnh này sao? Olivy, tốt nhất là không nên biết họ đang làm gì sao?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「その判断は……こちらで下せる物ではありませんな。\n知りたいと仰るのなら……無論、説明は可能」
1818 = "「Việc phán đoán đó......tôi không thể tự mình quyết định được. Nhưng nếu cô nói là muốn biết......thì tất nhiên, tôi có thể giải thích.」"
# monologue
# display as 雛
# JP: 「知らない方がいいんじゃないなら、\nオリヴィ、知りたい」
1855 = "「Nếu không phải là không nên biết, thì Olivy, muốn biết.」"
# monologue
# display as 奥莉薇
# JP: だってオリヴィ、いつ壊れるかわからないんだし、\nそれまでにヨノナカのこと、ちょっとでも多くわかりたい。
1617 = "Bởi vì Olivy không biết bao giờ mình sẽ hỏng, nên trước lúc đó, tôi muốn hiểu thêm về thế giới này, dù chỉ một chút thôi."
# 【ひよこ】
# JP: 「なるほど。ならば方法を……っ！\nああ、今日は丁度、[もみじ,1]紅葉が尋ねてくる日でしたか」
2166 = "「Ra vậy. Nếu vậy thì cách tốt nhất là......! A, hôm nay vừa hay lại là ngày Momiji đến thăm nhỉ.」"
# monologue
# display as 雛
# JP: 「モミジ？」
1328 = "「Momiji?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「電車姫――毛利[あき,1]安芸はご存知ですかな？\n界隈ではなかなか有名な存在かと」
1772 = "「Cô có biết Công chúa Tàu điện——Mouri Aki không? Cô ấy khá nổi tiếng trong giới đấy.」"
# monologue
# display as 雛
# JP: 「会ったことないけど、話したことある！\nオヒトヨ鉄道との提携話が出たとき、ネットの通話で」
1364 = "「Tôi chưa gặp trực tiếp bao giờ, nhưng đã từng nói chuyện rồi! Lúc bàn chuyện hợp tác với Đường sắt Ohitoyo, qua cuộc gọi mạng.」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「面識があるなら話は少しは早い……\nかもわかりませんな。逆方向に働くのかもしれませんが」
1899 = "「Nếu đã từng gặp mặt thì chuyện sẽ nhanh hơn một chút...... Cũng chưa biết chừng. Hoặc có thể sẽ phản tác dụng.」"
# monologue
# display as 雛
# JP: 「？？？」
1814 = "「???」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「紅葉とは、その電車姫のことですな。\n人前では呼ばぬ名ですが、それが彼女の、本当の名です」
1945 = "「Momiji chính là Công chúa Tàu điện đó. Tuy không được gọi trước mặt người khác, nhưng đó là tên thật của cô ấy.」"
# monologue
# display as 雛
# JP: 「そうなんだ。\n人前で呼ばないんなら、なんか秘密のお名前なの？」
1907 = "「Ra vậy. Không gọi trước mặt người khác, bộ đó là cái tên bí mật gì sao?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ふむ――仮に人前で紅葉を紅葉と呼んだところで、\n紅葉は完全に無視をしましょう。そういう名です」
1868 = "「Hừm——Giả sử nếu cô gọi Momiji là Momiji trước mặt người khác, thì Momiji sẽ hoàn toàn phớt lờ cô đấy. Cái tên đó là như vậy.」"
# monologue
# display as 雛
# JP: 「そなんだ。だったらオリヴィは、\n電車姫さまのことは、電車姫さまって呼ぶね？」
1472 = "「Ra vậy. Thế thì Olivy, sẽ gọi Công chúa Tàu điện là Công chúa Tàu điện nhé?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ですな。それがよろしいかと」
1613 = "「Đúng vậy. Thế là tốt nhất.」"
# monologue
# display as 雛
# JP: 「で、で？　さっきの写真のこと、\nもしかして電車姫さまが教えてくれるの？」
1559 = "「Rồi, rồi? Còn chuyện bức ảnh lúc nãy, có phải Công chúa Tàu điện sẽ chỉ cho tôi không?」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「その可能性もある、というだけの話ですが――ああ」
1731 = "「Chỉ là có khả năng đó thôi——à.」"
# monologue
# display as 雛
# JP: またじいって、フシチョーハカセがオリヴィをみる。\nだけど今度の眼鏡の奥は、イタズラっぽく光ってる。
1605 = "Tiến sĩ Phoenix lại nhìn chằm chằm vào Olivy. Nhưng lần này, ánh mắt sau tròng kính lại lóe lên vẻ tinh nghịch."
# 【ひよこ】
# JP: 「その前にひとつだけ、確認をする必要がありました」
2090 = "「Trước đó, có một chuyện tôi cần phải xác nhận.」"
# monologue
# display as 雛
# JP: 「確認？　なぁに？？」
1569 = "「Xác nhận? Chuyện gì cơ??」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「書物と口頭での説明と、実地見学での学習と。\nオリヴィ氏は、どちらをお選びになりますかな？」
1762 = "「Giữa giải thích bằng sách vở, giải thích bằng miệng và học tập qua quan sát thực tế. Cô Olivy, cô sẽ chọn cách nào?」"
# monologue
# display as 雛
# JP: 「どっちか選んでいいならね、of course!　見学っ！！」
1685 = "「Nếu được chọn thì, of course! Quan sát thực tế!!」"
# 【ひよこ】
# display as 奥莉薇
# JP: 「ふむ。そうですか。\nそうなのでしたら――」
1876 = "「Hừm. Vậy sao. Nếu đã vậy thì——」"
# monologue
# display as 雛
# JP: フシチョーハカセの喉がこくって、ちっちゃく動く。
1872 = "Cổ họng Tiến sĩ Phoenix khẽ nuốt nước bọt một cái."
# 【ひよこ】
# JP: 「紅葉に相談し、その結果次第では、あるいは――\nオリヴィ氏のご期待に沿うこともできるかもしれません」
2091 = "「Tôi sẽ bàn bạc với Momiji, tùy thuộc vào kết quả, có lẽ—— tôi có thể đáp ứng được kỳ vọng của cô Olivy đấy.」"
# 【電車姫】
# display as 雛
# JP: 「さてもさてもじゃ。\n直接の初対面が、まさかこのような形になるとはの」
1653 = "「Chà chà. Không ngờ lần đầu gặp mặt trực tiếp lại diễn ra trong hoàn cảnh thế này.」"
# monologue
# display as 電車公主
# JP: 電車姫さま！　Amazing!\nすっごくかわいいし、キモノもキレイ！！！
1356 = "Công chúa Tàu điện! Amazing! Cô ấy dễ thương quá, Kimono cũng đẹp nữa!!!"
# monologue
# JP: 「直接はハジメマシテだね！　よろしく！\nけどけど――コノヨウナカタチ、ってどゆこと？」
2236 = "「Đây là lần đầu tiên chúng ta gặp trực tiếp nhỉ! Rất vui được gặp cô! Nhưng mà nhưng mà——'hoàn cảnh thế này' là sao cơ?」"
# 【電車姫】
# display as 奥莉薇
# JP: 「ふむ？」
1388 = "「Hửm?」"
# monologue
# display as 電車公主
# JP: 電車姫さま、ちょっとふしぎそーな顔になって、\nお口、センスでパって隠しちゃう。
# 1561 = "「嗯？」" 
# 【電車姫】
# JP: 「その様子じゃと、あるいはひよこの冗談か？\nわらわとひよことの[ねやごと,1]閨事を見学したい、なる話は」
2354 = "「Nhìn bộ dạng đó thì, hay là Hiyoko đang nói đùa? Chuyện cô muốn quan sát chuyện phòng the của ta và Hiyoko ấy.」"
# monologue
# display as 電車公主
# JP: 「ネヤゴト？」
1904 = "「Chuyện phòng the?」"
# 【ひよこ】
