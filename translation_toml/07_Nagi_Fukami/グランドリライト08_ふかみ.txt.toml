# lines: 503 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2991 = "（Cọc cạch, cọc cạch, xình xịch, xình xịch——）"
# 【双鉄】
# display as 雙鐵
# JP: 「……これは――」
2227 = "「......Đây là——」"
# 【路子】
# display as 路子
# JP: 「……くぅ……すぅ……」
1244 = "「......Khò......khò......」"
# monologue
# JP: 路子が、寝てる。\nいつもの列車の、いつもの座席で。
2605 = "Michiko đang ngủ. Ở băng ghế quen thuộc, trên chuyến tàu quen thuộc."
# monologue
# JP: 極めて平和なその光景に、けれど、困惑してしまう。
2838 = "Một cảnh tượng cực kỳ bình yên, nhưng lại khiến tôi bối rối."
# monologue
# JP: （夢の中で眠ってしまうと――\nいったい、どこへいくのだろうか）
2998 = "（Nếu chìm vào giấc ngủ trong mơ thì—— rốt cuộc sẽ đi về đâu cơ chứ.）"
# monologue
# JP: 不安になる。これは恐らく僕の夢だと――\nいまここにいる路子自体が、現でないと知っているから。
2693 = "Tôi bắt đầu thấy bất an. Bởi tôi biết đây có lẽ là giấc mơ của tôi—— bản thân Michiko đang ở đây lúc này không phải là hiện thực."
# 【双鉄】
# display as 雙鐵
# JP: 「路子――路子」
2188 = "「Michiko——Michiko.」"
# monologue
# JP: ゆえ、起こす。\nそっと優しく、体を揺する。
2593 = "Thế nên, tôi gọi con bé dậy. Khẽ khàng, nhẹ nhàng lay người con bé."
# 【路子】
# display as 路子
# JP: 「んにゃあ……くゆぅ……すぅ……すぅ」
1793 = "「Nnyaa......khò......khò......khò.」"
# 【双鉄】
# display as 雙鐵
# JP: 「路子。時間だ。\n――ああ、いや。『終点です。お客さん』」
2192 = "「Michiko. Đến giờ rồi. ——A, không phải. 『Đến trạm cuối rồi, quý khách ơi.』」"
# 【路子】
# display as 路子
# JP: 「ふにゅう……むゆ……すぅ……すや……」
# 1793 = "「唔……呼……呼……呼……」" 
# monologue
# JP: ……何度繰り返し揺すっても、\n何をいっても起きてくれない。
1179 = "「Funyuu......muyu......khò......khò......」"
# 【双鉄】
# display as 雙鐵
# JP: 「――やむなしか」
1258 = "......Dù tôi có lay bao nhiêu lần, có nói gì đi nữa con bé cũng không chịu dậy."
# monologue
# JP: 路子がこのまま目覚めないことが、なにより怖い。\nゆえに、いささか気の毒かとも思いはするが――
2686 = "「——Hết cách rồi sao.」"
# monologue
# JP: （むにっ）
2997 = "Việc Michiko cứ thế này không tỉnh lại là điều đáng sợ hơn cả. Thế nên, dù nghĩ làm vậy có hơi tội nghiệp——"
# monologue
# JP: 鼻をつまんで、しばし待つ。\n昔から路子はこうやれば、三十秒もしないうち――！
2682 = "（Bóp）"
# 【路子】
# display as 路子
# JP: 「ふがっ！？　んにゅっ！？　んっ――ふぁっ！\nぷはあっ！！？」
1823 = "Tôi bóp mũi con bé rồi đợi một lát. Từ ngày xưa, chỉ cần làm vậy thì chưa tới ba mươi giây Michiko đã——!"
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、路子。よく眠れたか？」
1707 = "「Fuga!? Nnyu!? Nn——Faa! Puhaa!!?」"
# 【路子】
# display as 路子
# JP: 「あれ？　そーちゃん……？？」
1783 = "「Chào buổi sáng, Michiko. Ngủ ngon không?」"
# monologue
# JP: ぽかんとしている。\n昔とまるっきり同じ反応。
2610 = "「Ủa? Sou-chan......??」"
# monologue
# JP: 懐かしさが猛烈にこみあげてきて――
2949 = "Con bé ngơ ngác. Phản ứng giống hệt như ngày xưa."
# monologue
# JP: （ぱちっ）
2994 = "Cảm giác hoài niệm trào dâng mãnh liệt——"
# 【路子】
# display as 路子
# JP: 「ひゃうっ！？　や、でこぴん～っ」
1772 = "（Búng）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。ついというか、思わずというか」
1790 = "「Hyau!? Ây da, búng trán em kìa~っ」"
# 【路子】
# display as 路子
# JP: 「すまなくないよ～　えへへ～」
2107 = "「A, xin lỗi. Tại tiện tay, hay nói đúng hơn là không kiềm được.」"
# monologue
# JP: おでこをわずかに赤くして、\nなのに路子は、とっても幸せそうに笑う。
2937 = "「Không có lỗi đâu~ E hehe~」"
# 【路子】
# display as 路子
# JP: 「からだはおっきくなっちゃっても。\nそーちゃんは、そーちゃんなんだねぇ」
2287 = "Dù trán hơi ửng đỏ, nhưng Michiko lại cười trông vô cùng hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1795 = "「Dù cơ thể có lớn lên đi chăng nữa. Sou-chan vẫn cứ là Sou-chan nhỉ.」"
# monologue
# JP: なんと、答えればいいのだろうか。\n体さえ、大きくなることができない路子に。
2971 = "「っ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「その……だ」
1918 = "Tôi nên trả lời thế nào đây. Với Michiko, người mà ngay cả cơ thể cũng không thể lớn lên được nữa."
# monologue
# JP: もちろん答えはみつけられずに、\nだから、言葉は逃げてしまう。
2679 = "「Chuyện đó......thì.」"
# 【路子】
# display as 路子
# JP: 「その？」
1824 = "Tất nhiên là không tìm được câu trả lời, thế nên, tôi đành lảng tránh."
# 【双鉄】
# display as 雙鐵
# JP: 「その――路子は、ああ、うん。\n眠っているとき、夢をみたのか？」
1928 = "「Chuyện đó?」"
# 【路子】
# display as 路子
# JP: 「あ！　うん！　見た！　見たって思う！！\nパパとママのゆめ！　見てた気がする！」 
1806 = "「Chuyện đó——Michiko này, à, ừm. Lúc ngủ, em có mơ thấy gì không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんの？」
1694 = "「A! Dạ có! Em nghĩ là có mơ!! Giấc mơ về ba và mẹ! Cảm giác là em đã mơ thấy!」"
# 【路子】
# display as 路子
# JP: 「うん。あのね、パパとママ、きっともうすぐあえるって。\nいいこでまっててって――うん！　うん！　いってた！」
1842 = "「Ba và mẹ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――\n待っているように。そう伝えてくれたのか」
2056 = "「Dạ. Ba mẹ bảo là, chắc chắn sắp được gặp nhau rồi. Bảo em hãy ngoan ngoãn chờ đợi——Đúng rồi! Đúng rồi! Ba mẹ đã nói thế!」"
# 【路子】
# display as 路子
# JP: 「うん！！」
1833 = "「Vậy sao—— Bảo em hãy chờ đợi. Ba mẹ đã nhắn nhủ như thế à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――きっと。\n路子を、絶対に迎えにきてくれるな」
2243 = "「Dạ!!」"
# 【路子】
# display as 路子
# JP: 「うん！！！」
1834 = "「Nếu vậy thì——chắc chắn. Ba mẹ nhất định sẽ đến đón Michiko đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのためにも」
2124 = "「Dạ!!!」"
# 【路子】
# display as 路子
# JP: 「そーちゃんのれっ車！　ナインスターズ！\nじゅんびすごいね、すごいいきおいで動いてるね！」
1925 = "「Và vì thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2049 = "「Chuyến tàu của Sou-chan! Nine Stars! Chuẩn bị hoành tráng quá, đang tiến hành với khí thế hừng hực nhỉ!」"
# monologue
# JP: 苦労が、疲れが、一気に吹き飛ぶ。\n路子が、わくわくしてくれている。
2940 = "「Ừ——」"
# monologue
# JP: 僕の、僕らの列車のことを、\nこれほど眩しいような笑顔で、語ってくれてる。
2629 = "Bao gian khổ, mệt mỏi chợt tan biến hết. Michiko đang háo hức chờ đợi."
# 【路子】
# display as 路子
# JP: 「えきまえ！　なんかできたよね？！\nあれなぁに？？」
2194 = "Con bé đang nói về chuyến tàu của tôi, của chúng tôi, với một nụ cười rạng rỡ đến chói lóa."
# 【双鉄】
# display as 雙鐵
# JP: 「“ガマダス”だな。鉄道資料館を兼務した、\n休憩と観光案内のための施設だ」
2255 = "「Trước nhà ga! Hình như mới xây cái gì đó đúng không?! Cái đó là gì vậy??」"
# 【路子】
# display as 路子
# JP: 「がまだす――カエルさんでてくるの？\nなにいろのカエルさん？？」
2305 = "「Là \"GAMADAS\". Một cơ sở kiêm luôn bảo tàng tư liệu đường sắt, dùng làm nơi nghỉ ngơi và hướng dẫn du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながらガマは出てこん。“がまだす”というのは、\n隈元弁で、“頑張る”というほどの意味だそうだ」
2011 = "「Gamadas——Có bạn ếch nào xuất hiện không? Bạn ếch màu gì vậy??」"
# 【路子】
# display as 路子
# JP: 「そーなんだ！　おもしろぉい！」
2079 = "「Rất tiếc là không có bạn cóc nào đâu. \"Gamadas\", trong phương ngữ Kumamoto, hình như có nghĩa là \"cố gắng\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際。面白い施設だな。日々姫デザインで、\n丸一日でも飽きずに過ごせる空間に仕上がっている」
2259 = "「Ra là vậy! Thú vị quá!」"
# 【路子】
# display as 路子
# JP: 「へぇぇ！」
2060 = "「Thực tế thì. Đúng là một cơ sở thú vị. Do Hibiki thiết kế, hoàn thiện thành một không gian mà có ở cả ngày cũng không chán.」"
# 【双鉄】
# display as 雙鐵
# JP: 「レイルロマネスク湯医線の。そしてナインスターズの。\n起点駅であることを示す、いわば、駅併設の迎賓館だ」
2260 = "「Hể!」"
# 【路子】
# display as 路子
# JP: 「げいひんかん」
2199 = "「Có thể nói, nó giống như một nhà khách đi kèm nhà ga, thể hiện đây là ga khởi điểm của tuyến Rail Romanesque Yui. Và của cả Nine Stars.」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際、オリヴィなどはじめて訪ねた時、\n"wonderful!"と叫んで、丸一日入り浸っていたそうだ」
1867 = "「Nhà khách.」"
# monologue
# JP: 言えば路子は、目を輝かせる。
2898 = "「Thực tế thì, lần đầu tiên Olivy đến thăm, cô bé đã hét lên \"wonderful!\" và nấn ná ở đó suốt cả một ngày đấy.」"
# 【路子】
# display as 路子
# JP: 「金ぱつのちっちゃいこのこと！？　あのこかわいい！\nあのこの機関車も、ちっちゃくてかわいい！」
1932 = "Nghe tôi nói, mắt Michiko sáng rực lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、オリヴィのことも知っていたか。\n機関車の方は、[きゅう]Ⅸ号だ」
1849 = "「Là cô bé nhỏ nhắn tóc vàng đó hả!? Cô bé đó dễ thương quá chừng! Đầu máy của cô bé đó cũng nhỏ xíu dễ thương nữa!」"
# 【路子】
# display as 路子
# JP: 「きゅうごう！　あのこといっしょにのってるおじさんは、\nちょっぴりこわそうだけど」
1661 = "「À, em cũng biết Olivy sao. Còn về phần đầu máy thì là đầu máy số 9.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方\\x%l機関士;#00ffc040;機関士%l;#;は、怖い人ではないぞ。ただ……\nまぁ確かに、愛想には欠けるが、根は親切だ」
1906 = "「Số 9! Chú đi cùng với cô bé đó, trông hơi đáng sợ một chút.」"
# 【路子】
# display as 路子
# JP: 「そおなんだ！　しんせつっていったら、\nなぎちゃんの新しいおともだちもしんせつだよね！」
2080 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata không phải là người đáng sợ đâu. Chỉ là...... ừm thì đúng là, chú ấy hơi thiếu thân thiện, nhưng bản chất lại rất tốt bụng.」"
# monologue
# JP: 凪の新しい――お友達というよりはライバルだろうが、\n中村千景さんのことだろう。
2550 = "「Ra là vậy! Nhắc đến tốt bụng thì, bạn mới của bé Nagi cũng tốt bụng lắm nhỉ!」"
# monologue
# JP: 凪をして、公式大会1勝13敗の対戦成績だという\n少等部時代からの、凪の、剣道の宿敵だ。
2544 = "Bạn mới của Nagi——Nói là đối thủ thì đúng hơn, chắc em ấy đang nhắc đến cô Nakamura Chikage."
# 【双鉄】
# display as 雙鐵
# JP: 「中村さんが、なにか親切を？」
1655 = "Người mà Nagi nói là có thành tích đối đầu 1 thắng 13 thua trong các giải đấu chính thức, là kỳ phùng địch thủ kendo của Nagi từ thời tiểu học."
# 【路子】
# display as 路子
# JP: 「朝早くからひとりでさがしてあげてたよ！\nみんなでいっしょうけんめいさがしものしてた、次のひ」
1868 = "「Cô Nakamura đã làm việc tốt gì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！　コンタクト騒動のときか！！」
1809 = "「Sáng sớm chị ấy đã một mình đi tìm giúp đó! Vào ngày hôm sau, khi mọi người đã cùng nhau cố gắng tìm kiếm.」"
# monologue
# JP: お客様がホームでコンタクトレンズを落とされて、\n総動員して探し回って、見つからなかった騒動だ。
2753 = "「! Là vụ ồn ào mất kính áp tròng sao!!」"
# monologue
# JP: 次の日に、「たまたまみつけた」と、\n中村さんが届けてくれて、大感謝されたことがあったが。
2880 = "Đó là vụ ồn ào khi một hành khách đánh rơi kính áp tròng trên sân ga, mọi người đã huy động toàn bộ lực lượng để tìm kiếm nhưng không thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことをしてくれていたのか――\nまだ、内定段階であるというのに」
1877 = "Hôm sau, cô Nakamura mang đến và bảo là \"tình cờ tìm thấy\", đã được hành khách cảm ơn rối rít."
# 【路子】
# display as 路子
# JP: 「ないてーだんかい？」
1715 = "「Thì ra cô ấy đã làm như vậy sao—— Dù vẫn đang trong giai đoạn nhận quyết định tuyển dụng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「“会社に入る約束はしているが、\nまだ入社はしていない”という状態だな」
1929 = "「Quyết định tuyển dụng?」"
# 【路子】
# display as 路子
# JP: 「そーなんだ」
2078 = "「Là trạng thái \"đã hứa hẹn sẽ vào làm cho công ty, nhưng vẫn chưa chính thức gia nhập\" ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「前職との兼ね合いだなんだがあるらしく、来年4月の\n入社となる。宗方さんとオリヴィも、同様だな」
1873 = "「Ra là vậy.」"
# 【路子】
# display as 路子
# JP: 「へええ。おとなのせかいは、いろいろあるんだねぇ」
2058 = "「Hình như còn phải cân đối với công việc trước đây, nên tháng 4 năm sau mới chính thức vào làm. Chú Munakata và Olivy cũng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ、確かにいろいろ――\nありすぎるほどいろいろある」
2051 = "「Hêê. Thế giới của người lớn, có nhiều chuyện nhỉ.」"
# monologue
# JP: ここのところはようやく順調に全般回り始めたが、\nさりとて少しも油断は出来ない。
2751 = "「Đúng vậy, quả thật có nhiều chuyện—— Nhiều đến mức quá đáng.」"
# 【路子】
# display as 路子
# JP: 「そーちゃん、またたいへんなの？」
1926 = "Dạo gần đây mọi thứ cuối cùng cũng bắt đầu tiến triển thuận lợi, nhưng dẫu vậy cũng không thể lơ là một chút nào."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1801 = "「Sou-chan, lại vất vả nữa hả?」"
# monologue
# JP: いかん。路子の妙におとなびた声につられてしまい、\n余計な心配をかけてしまった。
2484 = "「っ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いろいろあるし、大変でもあるが、辛くはない。\nむしろ、充実しているから安心してくれ」
1665 = "Không ổn. Bị giọng điệu trưởng thành đến kỳ lạ của Michiko cuốn theo, tôi lại khiến con bé phải bận tâm không đâu rồi."
# 【路子】
# display as 路子
# JP: 「けど――」
1761 = "「Có nhiều chuyện, cũng vất vả thật, nhưng không cực khổ đâu. Ngược lại, anh thấy rất trọn vẹn nên em cứ yên tâm đi.」"
# monologue
# JP: 路子が急に沈んでしまう。\n不安でゆれる瞳が僕を、見上げてくる。
2935 = "「Nhưng mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「けれど――どうした？」
1681 = "Michiko chợt chùng xuống. Ánh mắt lay động vì bất an ngước lên nhìn tôi."
# 【路子】
# display as 路子
# JP: 「おどおどちゃん、ふかみちゃん――\nいなくなっちゃったの？　もう、ずっと見てない」
2244 = "「Nhưng mà——sao thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なんだ。そのことを心配してくれたのか」
1789 = "「Chị rụt rè, chị Fukami—— đã đi mất rồi sao? Lâu lắm rồi em không thấy chị ấy.」"
# monologue
# JP: 大丈夫だと、頭を撫でる。
2684 = "「À. Ra vậy. Em đang lo lắng về chuyện đó sao.」"
# monologue
# JP: ――路子の頭は、こんなにも小さなものだったのかと、\n感じつつ。
1148 = "Tôi xoa đầu con bé, bảo rằng không sao đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「そのことであれば心配無用だ。\nふかみは単に、長期研修にでているだけだ」
2221 = "——Trong khi cảm nhận được rằng, đầu của Michiko lại nhỏ bé đến thế này sao."
# 【路子】
# display as 路子
# JP: 「ちょーきけんしゅう？」
2281 = "「Nếu là chuyện đó thì không cần phải lo. Fukami chỉ đơn giản là đang đi thực tập dài hạn thôi.」"
# 【日々姫】
# display as ？？？
# JP: 「――にぃに！　にぃにっ！」
1205 = "「Thực tập dài hạn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1822 = "「——Anh hai! Anh hai!」"
# 【日々姫】
# display as 日日姬
# JP: 「いまうとうとしとったでしょー。疲れとるのわかるけど、\nいけんよ？　講義中にいねむりだとか」
1693 = "「っ!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……うむ。すまん」
1796 = "「Anh vừa mới ngủ gật đúng không. Em biết anh mệt, nhưng không được đâu nha? Ngủ gật trong lúc đang nghe giảng ấy.」"
# monologue
# JP: というか、完全に一瞬寝ていた。\n夢まで見ていたような気がする。
2675 = "「A......ừm. Xin lỗi em.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしはよかけど、ふかみちゃん――\nふかみ先生が気の毒でしょお」
1977 = "Mà nói đúng hơn là, tôi hoàn toàn thiếp đi trong một khoảnh khắc. Cảm giác như tôi còn mơ thấy gì đó nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして同時に、聴き逃してはもったいない。\n講義内容――実際に、すぐにも業務に活かせそうだ」
2054 = "「Em thì không sao, nhưng Fukami—— như thế thì tội nghiệp cô giáo Fukami lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「よね」
# 2049 = "「是啊」" 
# monologue
# JP: 日々姫の手元、開かれてるスケッチブックはもう、\n絵で、図で、メモで、真っ黒に近くなっている。
2740 = "「Đúng vậy. Và đồng thời, bỏ lỡ bài giảng thì thật uổng phí. Nội dung bài giảng——thực sự có vẻ áp dụng ngay vào công việc được.」"
# monologue
# JP: ――ふかみが学び取ってきて、伝えてくれていることが、\n鉄道業にも、デザインにさえも応用できることの証左だ。
1152 = "Cuốn phác thảo đang mở trên tay Hibiki, giờ đã gần như đen kịt những hình vẽ, sơ đồ và ghi chú."
# 【ふかみ】
# display as 深美
# JP: 「[ていおう,1]帝央ホテルにおける一年間の研修で、最も徹底的に\n教えていただけたのは、“背中に目を持つ”ことです」
1858 = "「Đúng không.」"
# monologue
# JP: ……ふかみが不在の一年間。
1200 = "——Những gì Fukami học được và truyền đạt lại cho chúng tôi, chính là minh chứng cho việc nó có thể ứng dụng vào ngành đường sắt, và cả thiết kế."
# monologue
# JP: クマ川下りも極めて厳しかったようだが、\n御一夜鉄道も、大変に苦労させられた。
2604 = "......Một năm Fukami vắng mặt."
# 【ふかみ】
# display as 深美
# JP: 「――背中に目を持つ。見えていないお客様の動きを、\n常に意識し予測する。そのために必要なのは、視点です」
2170 = "「Trong một năm thực tập tại Khách sạn Teio, điều em được dạy dỗ một cách triệt để nhất là, \"phải có mắt ở sau lưng\" ạ.」"
# monologue
# JP: （ふかみがどれほど、目立たぬ部分を、\n地道に埋め続けてくれていたことか――）
2999 = "Hoạt động chèo thuyền xuôi dòng Kuma có vẻ cực kỳ khó khăn, mà Đường sắt Ohito cũng đã phải chật vật rất nhiều."
# monologue
# JP: 凪とのコミュニケーションミスが驚くほどに増加したし、\n実りを得ぬまま散会に至る会議も頻発した。
2958 = "「——Có mắt ở sau lưng. Luôn ý thức và dự đoán hành động của khách hàng mà mình không nhìn thấy. Để làm được điều đó, cần phải có góc nhìn ạ.」"
# monologue
# JP: が、月一でふかみが御一夜に戻ってくると、\nそれが綺麗に解消するのだ。
2519 = "（Fukami đã luôn âm thầm, cần mẫn lấp đầy những phần không nổi bật nhường nào cơ chứ——）"
# 【ふかみ】
# display as 深美
# JP: 「上から見おろす鳥の視点と、地表を動く[あり]蟻の視点とを、\n両立させて、ともに[おろそ]疎かにしないこと」
2176 = "Những lỗi giao tiếp với Nagi gia tăng đến mức đáng kinh ngạc, và những cuộc họp kết thúc mà không thu được kết quả gì cũng thường xuyên xảy ra."
# monologue
# JP: その事実だけで、逆説的に、ふかみがどれほど\n見えないところで、僕らのチームに寄与しているかが――
2570 = "Thế nhưng, mỗi tháng một lần khi Fukami trở về Ohito, những vấn đề đó lại được giải quyết một cách êm đẹp."
# 【ふかみ】
# display as 深美
# JP: 「この視点は、鉄道業にも応用できます。実際に適用する\nことで、[プロジェクト・ナインスターズ,4]九つ星計画の課題の一つ、インバウンド誘致」
2229 = "「Phải kết hợp cả góc nhìn của loài chim nhìn từ trên cao xuống, và góc nhìn của loài kiến di chuyển trên mặt đất, không được bỏ qua bất kỳ góc nhìn nào.」"
# 【凪】
# display as 凪
# JP: 「インバウンド誘致って、なにばい？」
1670 = "Chỉ với sự thật đó, nghịch lý thay, lại cho thấy Fukami đã đóng góp cho đội của chúng tôi nhiều đến mức nào ở những nơi không ai thấy——"
# 【ふかみ】
# display as 深美
# JP: 「それはね？　凪ちゃん」
2222 = "「Góc nhìn này cũng có thể ứng dụng vào ngành đường sắt ạ. Bằng cách áp dụng vào thực tế, một trong những thách thức của Kế hoạch Nine Stars, thu hút khách du lịch quốc tế.」"
# monologue
# JP: ああ――これだ。\n『それはね？　凪ちゃん』『あのね？　凪ちゃん』。
2589 = "「Thu hút khách du lịch quốc tế là sao thế?」"
# monologue
# JP: そこから始まる会話がどれ程、論点整理に役立っているか、\n僕らはまったく、理解も感謝もできてなかった。
2695 = "À——chính là cái này. 『Chuyện đó là thế này nè, Nagi.』 『Em biết không, Nagi.』"
# 【ふかみ】
# display as 深美
# JP: 「インバウンドっていうのは、この場合、日ノ本から見た\n海外――外国から来てくださる観光客さんのこと」
2008 = "Cuộc trò chuyện bắt đầu từ đó đã giúp ích cho việc sắp xếp lại các luận điểm đến mức nào, chúng tôi hoàn toàn không hiểu, cũng không biết ơn em ấy."
# 【凪】
# display as 凪
# JP: 「なーんね、外国人さん誘致のことなら、\nいっつも話とって、全然方法のでんこと――おおお！？」
1669 = "「Trong trường hợp này, khách du lịch quốc tế có nghĩa là, những du khách từ nước ngoài đến thăm Hinomoto đó.」"
# monologue
# JP: 凪の瞳がまんまるになる。
2552 = "「Gì chứ, nếu là chuyện thu hút người nước ngoài, thì lúc nào chúng ta cũng nói tới mà chẳng có cách nào cả——Ô ô ô!?」"
# 【凪】
# display as 凪
# JP: 「そん方法、“背中に目”やらで、\nふかみちゃん、思いついたと？」
2292 = "Mắt Nagi tròn xoe."
# 【ふかみ】
# display as 深美
# JP: 「方法っていうか、少しはヒントになるかもってことなら。\n――うん、思いついた」
1844 = "「Cách đó, nhờ \"mắt ở sau lưng\" gì đó, mà chị Fukami nghĩ ra rồi sao?」"
# monologue
# JP: （ああ――）
2992 = "「Gọi là cách thì không hẳn, nhưng nếu là một chút gợi ý thì. ——Ừm, chị nghĩ ra rồi.」"
# monologue
# JP: 一年間。僕らとも翠さんとも堰さんたちとも。\nそうしてなによりクマ川とも、離れ暮らした研修生活。
2947 = "（A——）"
# monologue
# JP: それがどれほど、ふかみの背筋を伸ばしてくれたか――\n今、鮮やかに示されている。
2895 = "Một năm trời. Sống xa chúng tôi, cô Midori, ông Seki và mọi người. Và trên hết là sống xa dòng sông Kuma, một cuộc sống thực tập xa nhà."
# 【凪】
# display as 凪
# JP: 「どぎゃん方法ばい？」
1671 = "Quãng thời gian đó đã giúp Fukami trưởng thành và tự tin hơn biết bao nhiêu—— Điều đó hiện đang được thể hiện một cách rõ nét."
# 【ふかみ】
# display as 深美
# JP: 「想像してみて、凪ちゃん。ナインスターズの走る線路。\nそれが、全部繋がってる九洲を」
1695 = "「Cách gì thế?」"
# 【凪】
# display as 凪
# JP: 「……想像したばい！　凪様、にーさんとハチロクと、\n九洲中を走り回っとるばい！」
1264 = "「Hãy thử tưởng tượng xem, Nagi. Tuyến đường sắt mà Nine Stars chạy qua. Tất cả những tuyến đường đó kết nối toàn bộ Kyushu.」"
# 【ふかみ】
# display as 深美
# JP: 「それが、蟻の視点。今見えたものを忘れないまま、\n今度は、鳥になって、線路の上を飛んでみて？」
2226 = "「......Em tưởng tượng rồi! Nagi này, cùng với anh hai và chị Hachiroku, đang chạy vòng quanh khắp Kyushu luôn!」"
# 【凪】
# display as 凪
# JP: 「わかったとばい！！」
1879 = "「Đó chính là góc nhìn của loài kiến. Giữ nguyên những gì em vừa thấy, lần này, hãy thử biến thành chim và bay lượn trên tuyến đường sắt xem sao?」"
# monologue
# JP: ……僕も、凪と同じく、蟻の視点で考えていた。\n皆も同じであったのか、ハッとしたような顔をする。
1191 = "「Em hiểu rồi!!」"
# monologue
# JP: 意識を切り替え、鳥の視点――\n上から見ようと試みてみる。
2691 = "......Tôi cũng vậy, giống như Nagi, chỉ suy nghĩ từ góc nhìn của loài kiến. Mọi người có vẻ cũng giống vậy, ai nấy đều tỏ ra bất ngờ."
# 【凪】
# display as 凪
# JP: 「見えたばい！　隈元県が、線路でつながっとるばい！」
2143 = "Tôi chuyển đổi nhận thức, góc nhìn của loài chim—— thử nhìn xuống từ trên cao."
# 【ふかみ】
# display as 深美
# JP: 「もっと高くに飛んで？　九洲全部はどう見える？」
1721 = "「Em thấy rồi! Tỉnh Kumamoto được kết nối bằng đường sắt nè!」"
# 【凪】
# display as 凪
# JP: 「九洲ぐるっと、線路がぜぇんぶつながっとるばい！」
2019 = "「Bay cao hơn chút nữa xem? Toàn bộ Kyushu trông như thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「もっと高く。衛星軌道にまで飛んで？　どう見える？\n[めいこく,1]冥国、[えいこく,1]詠国、[どっこく,1]髑国、フランク、[ちゅうごく,1]仲国、[かんこく,1]汗国とかの線路は」
1722 = "「Xung quanh Kyushu, tất cả đường sắt đều được kết nối với nhau!」"
# 【凪】
# display as 凪
# JP: 「え？　ええっと」
1821 = "「Cao hơn nữa. Bay lên tận quỹ đạo vệ tinh xem? Trông như thế nào? Đường sắt của các nước Meikoku, Eikoku, Dokkoku, Frank, Chuugoku, Kankoku thì sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！　そうか！\nそこ自体が、最大の売りになるのか！！」
1810 = "「Hả? Ờ thì.」"
# 【ふかみ】
# display as 深美
# JP: 「やっぱり！　双鉄おにいさんもそう思いますか！？」
1986 = "「! Ra là vậy! Chính bản thân điều đó sẽ trở thành điểm bán hàng lớn nhất sao!!」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか！　わかった！！！」
2061 = "「Quả nhiên! Anh Soutetsu cũng nghĩ vậy đúng không ạ!?」"
# monologue
# JP: 日々姫が猛然とスケッチブックに絵を描き始め、\nポーレットと稀咲も動き始める。
2744 = "「Ra vậy! Em hiểu rồi!!!」"
# monologue
# JP: 真闇姉はただにこにことして――\nハチロクれいな、凪はその首を傾げたままだ。
2836 = "Hibiki hăm hở bắt đầu vẽ lên cuốn phác thảo, Paulette và Kisaki cũng bắt đầu hành động."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくし、日ノ本以外の国の鉄道事情には、\nまったくくわしくないのですけれど」
2289 = "Chị Mayami thì chỉ mỉm cười—— Hachiroku, Reina và Nagi vẫn nghiêng đầu khó hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「エアクラの更なる躍進。大廃線による鉄道衰退は、\n全世界的な傾向であることは変わっていない」
2162 = "「Ngài Soutetsu. Về tình hình đường sắt ở các nước ngoài Hinomoto, em hoàn toàn không rành chút nào ạ.」"
# monologue
# JP: 必要なのは、ただその事実を思い出すことだけ。
2672 = "「Sự tiến bộ vượt bậc của Aircra. Sự suy thoái của đường sắt do đại bãi bỏ tuyến vẫn là một xu hướng chung trên toàn thế giới, điều đó không hề thay đổi.」"
# monologue
# JP: うんうん悩みこんでたれいなが、\n言った瞬間、うれしげにその顔を持ち上げる。
2899 = "Điều cần thiết, chỉ là nhớ lại sự thật đó."
# 【れいな】
# display as 玲奈
# JP: 「ならなら、日ノ本がいちばぁん最初に、\nそこをぬけられるかもしれないんですねぇ」
2271 = "Reina đang ậm ừ suy nghĩ, ngay khoảnh khắc tôi vừa dứt lời, liền vui vẻ ngẩng mặt lên."
# 【ハチロク】
# display as 八六
# JP: 「ああ！」
# 1801 = "「啊！」" 
# 【凪】
# display as 凪
# JP: 「わかったとばい！　すごかとばい！！」
2035 = "「Vậy thì, Hinomoto có thể sẽ là nơi đầu tiên, thoát khỏi tình trạng đó nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ほえ？　なにがですかぁ？」
1787 = "「A!」"
# monologue
# JP: 殆ど正解を示していながら、\nしかしれいなには見えていない。
2816 = "「Em hiểu rồi! Tuyệt quá đi!!」"
# monologue
# JP: ……れいなの視点はどこまでも、\n日常に添い、それを愛する、蟻の視点であるのだろう。
1201 = "「Hỏe? Chuyện gì vậy ạ?」"
# 【凪】
# display as 凪
# JP: 「日ノ本だけが！　九洲だけが！！　\nこぎゃんと長くつながってる線路を持つとこになるばい」
2017 = "Dù đã đưa ra gần đúng câu trả lời, nhưng Reina vẫn chưa nhìn ra."
# 【ハチロク】
# display as 八六
# JP: 「鉄道に9日間乗り続けられるナインスターズの旅は、\nただそれだけで、“世界で唯一”のものとなるのですね」
1857 = "......Góc nhìn của Reina luôn luôn gắn liền với cuộc sống thường nhật, yêu thương nó, một góc nhìn của loài kiến."
# 【双鉄】
# display as 雙鐵
# JP: 「ホテルクオリティの車内サービスより、こだわり抜いた\n内外装より。一番に打ち出すべきは、そこだったのだな」
2102 = "「Chỉ có Hinomoto! Chỉ có Kyushu!! Mới là nơi có tuyến đường sắt kết nối dài đến thế!」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、海外の鉄道事情、\n念のため海外テツの人に確認してみます！」
1709 = "「Hành trình Nine Stars có thể đi tàu liên tục trong 9 ngày, chỉ riêng điều đó thôi, cũng đủ để trở thành \"duy nhất trên thế giới\" rồi nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、海外に知り合いのおるけん。\nそいば売りになるか、何人かに聞いてみるとね」
1902 = "「Hơn cả dịch vụ trên tàu chất lượng như khách sạn, hơn cả nội ngoại thất được chăm chút tỉ mỉ. Điều nên được đưa lên hàng đầu, chính là điểm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その方向で、構わんか？」
2090 = "「Về tình hình đường sắt ở nước ngoài, để cho chắc, em sẽ thử xác nhận với những người hâm mộ đường sắt ở nước ngoài xem sao!」"
# monologue
# JP: ポーレットに問えばみなが頷く。\nそして、一斉に動き始める。
2677 = "「Chị cũng có người quen ở nước ngoài. Để chị thử hỏi vài người xem cái đó có thành điểm nhấn bán hàng được không nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。なんだかすごいことになりそうですねぇ」
1780 = "「Theo hướng đó, không vấn đề gì chứ?」"
# 【凪】
# display as 凪
# JP: 「凪様！　凪様もなにかするばい！」
1732 = "Tôi hỏi Paulette thì mọi người đều gật đầu. Và rồi, tất cả đồng loạt bắt đầu hành động."
# 【ハチロク】
# display as 八六
# JP: 「なにかも何も乗務でしょう。\n本日は、赤井－凪－ニイロク体制ですよ？」
1697 = "「Ufufu. Có vẻ sắp có chuyện tuyệt vời xảy ra rồi nha.」"
# 【凪】
# display as 凪
# JP: 「そうだったばい！　今度こそハチロクから百点！\nもらえるようにがんばるばい！！」
1663 = "「Nagi! Nagi cũng sẽ làm gì đó!」"
# monologue
# JP: 凪が小走りに駆け出していく。
2548 = "「Làm gì là làm gì, em phải đi làm nhiệm vụ chứ. Hôm nay là đội hình Akai - Nagi - Niiroku mà?」"
# 【凪】
# display as 凪
# JP: 「ばいばいふかみちゃん！　またあとでー！\n話、ちょー面白かったばい！」
2014 = "「Đúng rồi ha! Lần này nhất định phải lấy được 100 điểm từ chị Hachiroku! Em sẽ cố gắng!!」"
# 【ふかみ】
# display as 深美
# JP: 「ありがと、凪ちゃん。気をつけて」
2180 = "Nagi chạy chậm bước ra ngoài."
# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様、いってまいります」
2272 = "「Bye bye chị Fukami! Gặp lại sau nha! Chuyện chị kể thú vị lắm luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ご安全に。よい乗務を」
1839 = "「Cảm ơn em, Nagi. Đi đường cẩn thận nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。気をつけてがんばってきますねぇ」
1886 = "「Vậy thì Ngài Soutetsu, em xin phép đi đây ạ.」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;組が部屋を出ていくと同時。
73 = "「Ừm. Chú ý an toàn. Chúc em một chuyến đi tốt lành.」"
# monologue
# JP: それを待ちかねていたかのように、\n稀咲が僕に近づいてくる。
2863 = "「Vâng ạ. Reina sẽ cẩn thận và cố gắng nha.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄。日々姫とふかみ君もいいかな？　後東氏も交えて、\n帝都の広告代理店との打ち合わせをできるだけ早期に」
2291 = "Nhóm \\x%lレイルロオド;#00ffc040;Railord%l;#; vừa rời khỏi phòng."
# 【ふかみ】
# display as 深美
# JP: 「あ！　ちょっとだけ――あと半日だけ、\nその席を作るかどうかの判断、待ってもらえますか？」
1802 = "Như thể đã chờ đợi điều đó từ lâu, Kisaki tiến lại gần tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ああ――まだ懸念点。\n何か、解消すべき点があるんだね？」
1853 = "「Anh Soutetsu. Hibiki và Fukami cũng rảnh chứ? Cùng với anh Goto, chúng ta cần họp với công ty quảng cáo ở Teito càng sớm càng tốt.」"
# monologue
# JP: ふかみの答えを聞かぬまま、稀咲はあっさり席を立つ。
2861 = "「A! Đợi một chút——chỉ nửa ngày nữa thôi, chị có thể đợi em quyết định xem có nên tổ chức cuộc họp đó hay không được không ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「皆がいるところで持ち出さなかったのだから、\nボクもいない方がいいね？　決まったら知らせて欲しい」
2136 = "「À——vẫn còn điểm đáng lo ngại. Có điểm nào cần phải giải quyết sao?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。ありがとうございます。\n必ずお知らせします、です！」
1887 = "Không đợi câu trả lời của Fukami, Kisaki dứt khoát đứng lên."
# monologue
# JP: よほどほっとしたのだろうか、\n昔のふかみがわずかに覗いた。
2781 = "「Vì em đã không đề cập đến lúc mọi người có mặt ở đây, nên chắc tôi cũng không nên ở lại nhỉ? Quyết định xong thì báo cho tôi nhé.」"
# monologue
# JP: そこにか、他のどこかにか。\n稀咲はほんのりと笑いを浮かべて、部屋を出て行く。
2865 = "「Dạ vâng. Em cảm ơn chị. Nhất định em sẽ báo ạ!」"
# 【ふかみ】
# display as 深美
# JP: 「それで、ですね。日々姫さん」
2003 = "Có lẽ vì đã nhẹ nhõm hơn rất nhiều, một chút Fukami của ngày xưa đã hé lộ."
# 【日々姫】
# display as 日日姬
# JP: 「うん。わかっとー。\nふかみちゃんの話聞いとったら、わかった」
1838 = "Vì điều đó, hay vì một điều gì khác. Kisaki khẽ nở nụ cười rồi rời khỏi phòng."
# monologue
# JP: 日々姫がスケッチブックを閉じる。
2734 = "「Vậy thì. Chị Hibiki.」"
# monologue
# JP: そうして、このガマダス・カフェの雇われマスター、\n山崎さんを、手をあげて呼ぶ。
2809 = "「Ừm. Chị biết rồi. Nghe em nói là chị hiểu rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「山崎さん、すいません。レモンティーをホットで。\nそれと――にぃにとふかみちゃんは？」
1936 = "Hibiki gấp cuốn phác thảo lại."
# 【ふかみ】
# display as 深美
# JP: 「あの、ええと？」
1775 = "Sau đó, em ấy giơ tay gọi quản lý của quán cà phê Gamadas, anh Yamazaki."
# 【日々姫】
# display as 日日姬
# JP: 「頼んどいたほうが良かとよ。ふかみちゃんの話ば、\nナインスターズ。『足りてない』ってことでしょお？」
2233 = "「Anh Yamazaki, phiền anh. Cho em một trà chanh nóng. Với lại——anh hai và Fukami dùng gì?」"
# 【ふかみ】
# display as 深美
# JP: 「――はい。一番簡単にいうと、そうなります」
1256 = "「Dạ, ừm?」"
# monologue
# JP: なるほど。日々姫があれほど真剣にふかみの講義を\n受講していたその理由。
2559 = "「Gọi đồ uống đi thì hơn đó. Theo lời Fukami nói thì, Nine Stars. Đang \"còn thiếu sót\" đúng không?」"
# monologue
# JP: それはつまり、ふかみの示す一流ホテルのもてなしに、\n現行ナインスターズ案では届いていないゆえであったか。
2705 = "「——Dạ vâng. Nói một cách đơn giản nhất thì là vậy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それなら、頼んどこ？　こいば、どー考えても、\n長か話し合いになっちゃうけんね」
2251 = "Ra là vậy. Lý do Hibiki lại chăm chú nghe bài giảng của Fukami đến thế."
# 【ふかみ】
# display as 深美
# JP: 「はい――です。はい」
1880 = "Đó là bởi vì, phương án Nine Stars hiện tại vẫn chưa đạt đến mức độ tiếp đón của một khách sạn hạng nhất như Fukami đã chỉ ra."
# 【日々姫】
# display as 日日姬
# JP: 「で。ふかみちゃん的にも、\nにぃににもいてもらったほうが、よかとでしょ？」
2234 = "「Nếu vậy thì gọi đồ uống nhé? Chuyện này, dù nghĩ thế nào, cũng sẽ thành một cuộc thảo luận dài hơi đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「はい。双鉄おにい――双鉄さん」
2072 = "「Vâng——ạ. Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 
# monologue
# JP: 間近にじっと見つめられ、\n一瞬、心臓がはねてしまう。
2607 = "「Thế. Theo ý Fukami thì, anh hai cũng nên ở lại đúng không?」"
# monologue
# JP: 未熟なころから、ふかみは美人と感じていたが――\n強い志を帯びた瞳の、なんと深く美しいことか。
2599 = "「Dạ vâng. Anh Soutetsu——Anh Soutetsu.」"
# 【ふかみ】
# display as 深美
# JP: 「お願いします。日々姫さんへの相談に、\nどうか、立ち会って欲しいです」
2015 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1878 = "Bị nhìn chằm chằm ở cự ly gần, trong thoáng chốc, tim tôi đập lỡ một nhịp."
# monologue
# JP: 一年一人で頑張って、僕らに不足している多くを、\n御一夜鉄道へと持ち込んでくれた。
2623 = "Từ khi còn non nớt, tôi đã thấy Fukami là một người xinh đẹp—— nhưng đôi mắt ánh lên ý chí mạnh mẽ kia, sao lại sâu thẳm và đẹp đẽ đến nhường này."
# monologue
# JP: その恩にわずかでも報いるためにも、\n無論、できることの全てを尽くそう。
2806 = "「Em nhờ anh ạ. Xin anh hãy cùng tham gia vào cuộc thảo luận với chị Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「喜んで」
1988 = "Một năm nỗ lực một mình, em ấy đã mang về cho Đường sắt Ohito rất nhiều thứ mà chúng tôi còn thiếu sót."
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1222 = "Dù chỉ là một chút để đền đáp công ơn đó, tất nhiên, tôi sẽ cố gắng hết sức mình."
# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1222 = "「……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「そうて――っと」
2131 = "「Rất sẵn lòng.」"
# monologue
# JP: 争点、などと迂闊にいえば、\n今の議論が、争いであったと認識させてしまいかねない。
2911 = "「............」"
# monologue
# JP: 日々姫もふかみも、お互いに譲れぬものを正面に立て、\nまっこうから激しくぶつかりあってはいたが。
2965 = "「Đối lập——thì không phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……論点は、ひとまず出揃ったと考えて構わんか？」
1241 = "「Điểm tranh luậ——à không」"
# 【ふかみ】
# display as 深美
# JP: 「はい――です。わたしは、改善してほしい点は、\n全部おはなしできたかなって、思ってます」
2067 = "Nếu lỡ miệng dùng từ \"điểm tranh luận\", có khi lại khiến hai đứa nghĩ cuộc thảo luận vừa rồi là một trận cãi vã mất."
# 【日々姫】
# display as 日日姬
# JP: 「こっちもよかとよ。できんことはできんって、\nきっちり伝え終えたけん」
1970 = "Dù đúng là cả Hibiki và Fukami đều thẳng thắn bảo vệ quan điểm không thể nhượng bộ của mình, và đã có một cuộc đụng độ khá gay gắt thật."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1794 = "「......Các luận điểm, tạm thời đã được đưa ra đầy đủ rồi chứ?」"
# monologue
# JP: 二人の口調からも、尖った感情が消えている。\nあれほど激しくやりあったのにもかかわらず。
2531 = "「Vâng——ạ. Em nghĩ là mình đã nói hết những điểm muốn được cải thiện rồi.」"
# monologue
# JP: ふかみも日々姫も、健やかに大人になっている――と、\nじんわり、しみじみ、嬉しく思う。
2829 = "「Em cũng xong rồi. Những gì không làm được là không làm được, em đã truyền đạt rõ ràng hết rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、まずは双方が同意した、\n全体への改善提案の方を整頓しよう」
2247 = "「Ừm.」"
# monologue
# JP: 二人の成長に恥じぬよう、\n僕もこの場の最年長者として相応しくふるまおう。
2709 = "Sự gay gắt trong giọng điệu của cả hai cũng đã biến mất. Dù trước đó họ đã tranh luận quyết liệt đến vậy."
# monologue
# JP: 現時点では一致できていない諸点においても、\n最善の着地点へと、必ず落とし込んでいこう。
2558 = "Cả Fukami và Hibiki đều đang trưởng thành một cách lành mạnh―― nhận ra điều đó, tôi chợt cảm thấy một niềm vui âm ỉ, sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズ乗務憲章の策定は、僕も大賛成だ。\nこれは、ふかみに草稿の作成を頼みたい」
1960 = "「Nếu vậy, trước tiên hãy cùng sắp xếp lại những đề xuất cải thiện tổng thể mà cả hai bên đã đồng ý nào.」"
# 【ふかみ】
# display as 深美
# JP: 「はい。喜んで引き受けます、です。けどわたし――\n鉄道特有の部分は、全然勉強足りてないです、から」
1884 = "Để không hổ thẹn với sự trưởng thành của hai đứa, tôi cũng phải cư xử cho xứng đáng với tư cách là người lớn tuổi nhất ở đây mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、その辺は僕と日々姫に、ハチロクれいな、\nポーレットにも加わってもらい、練り込んでいこう」
2140 = "Ngay cả với những điểm hiện tại chưa thể thống nhất, chắc chắn tôi sẽ tìm ra điểm hạ cánh tốt nhất cho chúng."
# monologue
# JP: いいながら、ふと思いつく。Ⅸ号機関車のオリヴィは、\n\\x%l入換;#00ffc040;入換%l;#;の乗務がないとき観光車掌を務めるという。
2920 = "「Anh cũng rất tán thành việc xây dựng Hiến chương phục vụ trên tàu Nine Stars. Anh muốn nhờ Fukami soạn thảo bản nháp cho việc này.」"
# monologue
# JP: ならば、次にオリヴィが研修にくるときに、\nオリヴィと宗方さんにも、草案を見せて意見をもらおう。
2959 = "「Vâng. Em rất sẵn lòng nhận việc này, ạ. Nhưng mà em―― vẫn chưa học đủ những phần đặc thù của đường sắt, nên là.」"
# 【日々姫】
# display as 日日姬
# JP: 「できるだけ多くの人にみてもらって、その上で、\nできるだけシンプルなものにまとめるのが良かとよね」
1714 = "「Tất nhiên, về phần đó thì anh, Hibiki, Hachiroku, Reina, và cả Paulette sẽ cùng tham gia để trau chuốt thêm.」"
# 【ふかみ】
# display as 深美
# JP: 「はい。わたしもそう思います。ですから、最終的な\nブラッシュアップは、稀咲さんにお願いできればと」
1882 = "Vừa nói, tôi chợt nảy ra một ý. Olivy của đầu máy số 9 nghe nói thường làm trưởng tàu du lịch những lúc không có nhiệm vụ \\x%l入換;#00ffc040;dồn toa%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「わたしも同じこと考えとったと！　稀咲先輩、\n無駄を削るのめちゃくちゃうまいけん！」
1966 = "Nếu vậy, lần tới khi Olivy đến thực tập, hãy cho Olivy và anh Munakata xem bản nháp để xin ý kiến luôn."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、この件はそのように進めよう。\n草稿は……どうかな、二週間で作成できるか？」
2263 = "「Nên để càng nhiều người xem càng tốt, và dựa vào đó, tổng hợp lại thành một bản càng đơn giản càng tốt anh nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「一週間あれば大丈夫だと思います。です。帝央ホテルの\n行動憲章――下敷きにできちゃいますですから」
1628 = "「Vâng. Em cũng nghĩ vậy. Do đó, bước trau chuốt cuối cùng, em muốn nhờ chị Kisaki giúp đỡ ạ.」"
# monologue
# JP: （おや）
2990 = "「Em cũng nghĩ y chang vậy luôn! Chị Kisaki lược bỏ những phần thừa siêu giỏi luôn á!」"
# monologue
# JP: 日々姫と向き合っている時と、僕との時でトーンが違う。
2788 = "「Nếu vậy thì cứ tiến hành việc này theo hướng đó đi. Bản nháp thì......sao nhỉ, hai tuần có làm xong được không?」"
# monologue
# JP: 僕と話しているときは、多少安心できるのだろうか？\n昔のふかみが、背伸び無く出てきてしまうようだ。
2926 = "「Em nghĩ một tuần là đủ rồi. Ạ. Hiến chương hành động của khách sạn Teio――có thể dùng làm nền tảng được ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、そのようによろしく頼む。次の――乗務員全員\nへのスマホもしくはタブレット等、専用端末の配布だが」
2250 = "（Ồ）"
# 【ふかみ】
# display as 深美
# JP: 「タイムラグの無い情報共有とコミュニケーションは、\n高質なサービスのご提供のために絶対に必要です」
2122 = "Giọng điệu của em ấy khi đối diện với Hibiki và khi nói với tôi có sự khác biệt."
# 【日々姫】
# display as 日日姬
# JP: 「わたしもそう思うと！　\\x%l客車;#00ffc040;客車%l;#;、冷蔵・電源車は長旅に\nなるけん、そこのチェックと情報共有もして欲しいし」
1964 = "Khi nói chuyện với tôi, em ấy cảm thấy an tâm hơn phần nào chăng? Một Fukami của ngày xưa dường như lại xuất hiện một cách tự nhiên không hề gượng ép."
# 【双鉄】
# display as 雙鐵
# JP: 「となると、共通端末と専用アプリ――\nくらいは用意したくなってくるところか」
2270 = "「Vậy, nhờ em chuyện đó nhé. Tiếp theo――về việc phân phát thiết bị chuyên dụng như điện thoại hoặc máy tính bảng cho toàn bộ nhân viên phục vụ trên tàu.」"
# 【日々姫】
# display as 日日姬
# JP: 「沿線の車両整備拠点には、\n拠点ごとに一端末ずつで十分だと思う」
2098 = "「Việc chia sẻ thông tin và giao tiếp không có độ trễ, là điều tuyệt đối cần thiết để cung cấp dịch vụ chất lượng cao ạ.」"
# 【ふかみ】
# display as 深美
# JP: 「一運行で乗務するサービススタッフは、専務車掌一人。\n客室乗務員４～５人くらいで十分かなって思います」
2099 = "「Em cũng nghĩ vậy! Chuyến đi của \\x%l客車;#00ffc040;toa hành khách%l;#;, toa đông lạnh và toa phát điện sẽ rất dài, nên em cũng muốn kiểm tra và chia sẻ thông tin ở đó nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「専務車掌は通し乗務で全体統括を行い。客室乗務員は、\n一人で客室二つを見るような感じとなるか」
2253 = "「Nếu vậy, chúng ta sẽ cần chuẩn bị thiết bị dùng chung và ứng dụng chuyên dụng――đại loại thế nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「はい。そのイメージです。です」
2071 = "「Ở các cứ điểm bảo dưỡng toa xe dọc tuyến đường, em nghĩ mỗi cứ điểm một thiết bị là đủ rồi.」"
# monologue
# JP: ……ならば、電源車・冷蔵車を見ることも考え、\n客室乗務員５人体制がいいだろう。
1203 = "「Nhân viên phục vụ cho một chuyến đi, thì một trưởng tàu chuyên trách. Và khoảng 4~5 nhân viên phục vụ khoang hành khách là đủ rồi ạ.」"
# monologue
# JP: 乗務員交代のあるときは、タブレット端末まるごと、\nそのまま受け渡し引き継げばよいか。
2494 = "「Trưởng tàu chuyên trách sẽ phục vụ xuyên suốt và tổng quản lý toàn bộ. Nhân viên phục vụ khoang hành khách thì, mỗi người sẽ phụ trách hai phòng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……これも、ポーレットに提案しよう。\n専用アプリの開発にいくらかかるかは検討もつかんが」
1269 = "「Vâng. Đúng như anh hình dung. Ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「鉄道事業者さんの中には、アプリ開発の子会社なり\nなんなり持っとるとこも、きっとあるって思うけん」
2279 = "......Nếu vậy, tính cả việc trông coi toa phát điện và toa đông lạnh, thì đội hình 5 nhân viên phục vụ khoang hành khách sẽ tốt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それは妙案だな。では、参加各事業者に\nこころあたりを訪ね、ダメなら電車姫様にも相談しよう」
2086 = "Khi đổi ca trực, chỉ cần bàn giao nguyên cả máy tính bảng là được nhỉ."
# monologue
# JP: 日々姫もふかみも、即座に頷く。\nここまではいい。ここまでは、まったく問題ない事項だ。
2736 = "「......Cái này anh cũng sẽ đề xuất với Paulette. Dù chưa thể hình dung việc phát triển ứng dụng chuyên dụng sẽ tốn bao nhiêu tiền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「次。『各列車の戸を使わず、\nひとつ大きな、全体のエントランスを作る』だが」
1643 = "「Trong số các doanh nghiệp đường sắt, em nghĩ chắc chắn sẽ có nơi sở hữu công ty con chuyên phát triển ứng dụng hay gì đó.」"
# 【日々姫】
# display as 日日姬＆深美
# JP: 「絶対やった方がよかとよ！！」\n「これはどうしてもやるべきです！」
2224 = "「Ra vậy. Ý hay đấy. Vậy thì, hãy thử hỏi các doanh nghiệp tham gia xem họ có biết ai không, nếu không được thì chúng ta sẽ thảo luận với Denshahime.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
1792 = "Cả Hibiki và Fukami đều lập tức gật đầu. Đến đây thì ổn. Đến đây thì hoàn toàn không có vấn đề gì."
# monologue
# JP: ふかみと日々姫が声を揃えて断言する。\nならば無論、実施した方が良いのであろうが――
2787 = "「Tiếp theo. Về việc 『Không sử dụng cửa của từng toa, mà làm một lối vào lớn, chung cho toàn bộ』.」"
# 【日々姫】
# display as 日日姬
# JP: 「ナインスターズという列車そのものを小さな九洲にする。\nそのためには、[かんもん,1]關門海峡に当たる入り口が欲しかとよ」
2182 = "「Chắc chắn là nên làm vậy!!」 「Cái này dù thế nào cũng phải làm ạ!」"
# 【ふかみ】
# display as 深美
# JP: 「各列車にある戸から入って行くのは、“乗車”です。\nけど、エントランスを設ければ、“宿泊”にできます」
1949 = "「Ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うむ」
1830 = "Fukami và Hibiki đồng thanh khẳng định. Nếu vậy thì tất nhiên là nên thực hiện rồi, nhưng mà――"
# monologue
# JP: ナインスターズ客車各室が九洲九国であるならば、\n関門海峡を渡り、それぞれの部屋に向かうべき。
2711 = "「Biến bản thân đoàn tàu Nine Stars thành một Kyushu thu nhỏ. Để làm được điều đó, chúng ta cần một lối vào đóng vai trò như eo biển Kanmon.」"
# monologue
# JP: ナインスターズ各室をホテルの部屋と考えるのなら、\nエントランスとフロントを経て向かうべき。
2636 = "「Việc đi vào từ cửa của từng toa là “lên tàu”. Nhưng, nếu có lối vào chung, thì nó sẽ trở thành “lưu trú” ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ともに、ナインスターズでの宿泊・旅行体験を、\nもうワンランク上のものにするための提言と理解できる」
1991 = "「――Ừm.」"
# 【ふかみ】
# display as 深美＆日日姬
# JP: 「なら」\n「やったら！」
2026 = "Nếu mỗi phòng trên toa hành khách Nine Stars là một tỉnh của Kyushu, thì hành khách nên băng qua eo biển Kanmon rồi mới đi đến phòng của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「が、得られるメリットとかかるコストのバランスもある。\nまた、万一のときの避難経路の問題も出てくる」
1691 = "Nếu coi mỗi phòng của Nine Stars như một phòng khách sạn, thì hành khách nên đi qua lối vào và quầy lễ tân rồi mới đến phòng."
# 【日々姫】
# display as 日日姬
# JP: 「各車両の戸は殺さないで、うまく内装となじませつつ、\n非常口として確保するけん」
1644 = "「Anh hiểu, cả hai đề xuất này đều nhằm mục đích nâng tầm trải nghiệm lưu trú và du lịch trên Nine Stars lên một bậc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「となると、デザインは全て見直しになろう。\nただでさえ、今でも難航しているのだ」
2264 = "「Vậy thì.」 「Làm thôi!」"
# 【日々姫】
# display as 日日姬
# JP: 「あう」
1800 = "「Nhưng, cũng cần cân bằng giữa lợi ích thu được và chi phí bỏ ra. Hơn nữa, còn có vấn đề về tuyến đường sơ tán trong trường hợp khẩn cấp nữa.」"
# monologue
# JP: ――九洲九国。それぞれの国を、それぞれの客室に。\nこのコンセプトは、どの主要都市にも受け入れられた。
2496 = "「Chúng ta sẽ không loại bỏ cửa của từng toa, mà sẽ khéo léo hòa hợp nó với nội thất, để giữ lại làm lối thoát hiểm.」"
# monologue
# JP: そしてそれゆえ、各地から寄せられる要求は異常な多数\n――10000件を超えるものにまでなってしまった。
2500 = "「Nếu vậy, toàn bộ thiết kế sẽ phải xem xét lại. Bình thường thôi mà giờ cũng đã đang gặp khó khăn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、日々姫のバランス感覚を信じている。できるだけ\n多くの希望を取り入れようとする気持ちも尊重している」
1994 = "「Au.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1830 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「が、ナインスターズは、最悪でもあと四年。\nそこまでで一号列車を走らせねばならん」
1689 = "――Kyushu chín tỉnh. Mỗi tỉnh sẽ được thể hiện trong một phòng khách. Ý tưởng này đã được tất cả các thành phố lớn chấp nhận."
# 【日々姫】
# display as 日日姬
# JP: 「そこは……稀咲先輩からも何度も何度も言われとー。\n期限ば超えたら、持たん事業者さんば出てくるって」
2219 = "Và cũng chính vì thế, những yêu cầu gửi đến từ các địa phương nhiều một cách bất thường ――lên tới hơn 10,000 yêu cầu."
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。稀咲の――日ノ本鉄路の躍進は、\nナインスターズ計画の、大きな希望となっている」
1648 = "「Anh tin vào cảm giác cân bằng của Hibiki. Anh cũng tôn trọng mong muốn tiếp thu càng nhiều nguyện vọng càng tốt của em.」"
# 【ふかみ】
# display as 深美
# JP: 「マイレールファンド。すごいですよね！\n帝央ホテルの人達にも、出資者さん、何人もいました」
2155 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは嬉しいことを聞いた」
2062 = "「Nhưng, Nine Stars chậm nhất cũng chỉ còn bốn năm nữa. Đến lúc đó, chúng ta bắt buộc phải cho đoàn tàu số 1 lăn bánh.」"
# monologue
# JP: 稀咲提案、エアクラ社と隈元銀行、後東急行他多数社の\n支援を受けて指導した、マイレールファンド。
2845 = "「Chuyện đó......chị Kisaki cũng đã nói đi nói lại nhiều lần rồi. Chị ấy bảo nếu vượt quá thời hạn, sẽ có những doanh nghiệp không trụ nổi.」"
# monologue
# JP: ファンドによって集まった資金で、日ノ本鉄路は、\n理想以上の素晴らしい成果をあげつづけている。
2553 = "「Đúng vậy. Sự thăng tiến của Kisaki――của Đường sắt Hinomoto, đang là niềm hy vọng lớn của dự án Nine Stars.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本鉄路が線路を負担したことにより、鉄道事業者は、\nナインスターズ計画を押し進めるだけの余裕をもてた」
2032 = "「Quỹ Đường sắt Tư nhân. Tuyệt thật đấy ạ! Trong số những người ở khách sạn Teio, cũng có không ít người là nhà đầu tư.」"
# 【日々姫】
# display as 日日姬
# JP: 「ばってん。それでも巨額投資が必要やけん、\nどこも補助金や社債や、銀行からの借り入れに頼っとる」
1685 = "「Vậy sao, nghe được chuyện đó anh thấy vui lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ」
2109 = "Quỹ Đường sắt Tư nhân do Kisaki đề xuất, được thành lập dưới sự hỗ trợ của công ty Aircra, Ngân hàng Kumamoto, Hậu Tokyu và nhiều công ty khác."
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1801 = "「啊！」" 
# monologue
# JP: 思わず、といった感じの声。\nあわてて口をつぐんでしまったふかみを目線で促してみる。
2778 = "Nhờ số vốn huy động được từ quỹ, Đường sắt Hinomoto đang liên tục đạt được những thành quả tuyệt vời vượt ngoài mong đợi."
# 【ふかみ】
# display as 深美
# JP: 「……だから、もしも一号列車が走り始めるのが遅れたら。\nそれだけ、その分。利息とかがふくらんじゃう、です？」
1254 = "「Nhờ Đường sắt Hinomoto gánh vác phần đường ray, các doanh nghiệp đường sắt mới có đủ dư dả để thúc đẩy dự án Nine Stars.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして金銭面だけでなく、\nモチベーション面の心配も、同じくでてくる」
2045 = "「Nhưng mà. Dù vậy thì vẫn cần một khoản đầu tư khổng lồ, nên nơi nào cũng phải dựa vào tiền trợ cấp, trái phiếu công ty hay vay vốn ngân hàng.」"
# monologue
# JP: 九洲周遊リレートレイン・ナインスターズ一号列車。\n参加を希望し、大物まいてつも九洲入りを予定している。
2595 = "「Đúng vậy. Do đó.」"
# monologue
# JP: 東日本の看板であった、D51　840\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;『らん』と、\nそのマスターとの[にしてつ,2]二四鉄入りが、その顕著な例だ。
2761 = "「A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「一号列車走行開始というゴールに向けて、事業者も\nまいてつも、息をとめての全力疾走を続けている」
2123 = "Một tiếng kêu buột miệng. Tôi dùng ánh mắt khích lệ Fukami, người vừa vội vã ngậm miệng lại."
# monologue
# JP: それが、この先最長四年。\nどう考えても限界ラインだ。
2514 = "「......Cho nên, nếu đoàn tàu số 1 lăn bánh muộn. Thì tương ứng với khoảng thời gian đó. Tiền lãi các thứ sẽ tăng lên, đúng không ạ?」"
# monologue
# JP: 一つの事業者が、一人のまいてつが挫けてしまえば、\nその時点で、ナインスターズは地に落ち砕けかねない。
2572 = "「Đúng vậy. Hơn nữa không chỉ về mặt tiền bạc, mà nỗi lo về mặt động lực cũng sẽ xuất hiện tương tự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、これ以上のデザイン遅延、車両製造開始遅延に\n繋がる提案には、僕は容易には賛成できない」
1854 = "Đoàn tàu số 1 Nine Stars - Chuyến tàu tiếp sức vòng quanh Kyushu. Những chủ tàu sừng sỏ mong muốn tham gia cũng đang lên kế hoạch tiến vào Kyushu."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの心配はよーくわかったと。\nばってん、それでも、その上で――」
1993 = "Tiêu biểu nhất là việc \\x%lレイルロオド;#00ffc040;Railord%l;#; D51 840 『Ran』, từng là gương mặt đại diện của Đông Nhật Bản, và Master của cô ấy gia nhập Nishitetsu."
# monologue
# JP: 日々姫がじっと、ふかみを見つめる。\n見つめてそうして、ふわりと笑う。
2742 = "「Hướng tới mục tiêu khởi hành đoàn tàu số 1, cả các doanh nghiệp lẫn chủ tàu đều đang nín thở chạy nước rút hết tốc lực.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふかみちゃんのことやけん。きっと――\nううん、絶対。資料、用意してくれておるでしょお？」
1924 = "Thời gian tối đa chỉ còn bốn năm nữa. Dù nghĩ thế nào thì đó cũng là giới hạn cuối cùng rồi."
# 【ふかみ】
# display as 深美
# JP: 「写真と動画で大丈夫なら、たくさん撮ってあります。\n帝央ホテルだけじゃなく、帝都の代表的なとこは全部」
1895 = "Chỉ cần một doanh nghiệp, một chủ tàu bỏ cuộc, thì ngay tại thời điểm đó, Nine Stars có nguy cơ sẽ sụp đổ tan tành."
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1801 = "「啊！」" 
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり」
1984 = "「Vì vậy, với những đề xuất có thể dẫn đến việc chậm trễ thiết kế, chậm trễ khởi công chế tạo toa xe thêm nữa, anh không thể dễ dàng tán thành được.」"
# monologue
# JP: ――日々姫の頷きに思い出す。クマ川流域イラストマップ。\n作成時には、もちろんふかみの手助けに大いに助けられた。
2914 = "「Em rất hiểu nỗi lo của anh hai. Nhưng mà, dù vậy, trên cơ sở đó――」"
# monologue
# JP: あの時間が。そうして、僕の知らない時間が。\nふかみと日々姫の、相互信頼を作っていたのか。
2955 = "Hibiki chăm chú nhìn Fukami. Nhìn một lúc rồi mỉm cười nhẹ nhàng."
# 【日々姫】
# display as 日日姬
# JP: 「エントランスのあるタイプの寝台客車の資料も、\nポーレットさんに借りとる中にあるけん。いけると思う」
1989 = "「Là Fukami mà. Chắc chắn―― à không, tuyệt đối. Cậu đã chuẩn bị sẵn tài liệu rồi đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――\n準備があって、その上での希望というわけか」
1746 = "「Nếu hình ảnh và video là được thì tớ đã chụp rất nhiều. Không chỉ khách sạn Teio, mà toàn bộ những nơi tiêu biểu ở Đế Đô tớ đều chụp hết.」"
# monologue
# JP: 図面を変えれば、安全審査を一から受け直すことになる。\n現行案で納得している各層を、再び刺激もするだろう。
2637 = "「Quả nhiên.」"
# monologue
# JP: ――苦労の増加は目に見えていて。\nそれでも、心が動いてしまう。
2950 = "――Cái gật đầu của Hibiki làm tôi nhớ lại. Bản đồ minh họa lưu vực sông Kuma. Lúc tạo ra nó, tất nhiên là đã nhờ sự giúp đỡ của Fukami rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「今までの会話、全てを含めて改めて聞こう。\n日々姫とふかみは――エントランスを設けるべきと」
2165 = "Khoảng thời gian đó. Và cả những khoảng thời gian tôi không biết. Đã tạo nên sự tin tưởng lẫn nhau giữa Fukami và Hibiki sao."
# 【日々姫】
# display as 日日姬
# JP: 「思う！」
2063 = "「Tài liệu về loại toa giường nằm có lối vào, trong đống mượn của chị Paulette cũng có. Em nghĩ là làm được.」"
# 【ふかみ】
# display as 深美
# JP: 「思います、です！」
2069 = "「Ra vậy―― Nghĩa là đã có sự chuẩn bị, và trên cơ sở đó mới đưa ra nguyện vọng sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば……一週間。申し訳ないがこの時間内に、\n新デザインを、草案でいいので起こしてくれ」
2268 = "Nếu thay đổi bản vẽ, sẽ phải làm lại thẩm định an toàn từ đầu. Việc này cũng sẽ kích động lại các bên vốn đã đồng ý với phương án hiện tại."
# 【日々姫】
# display as 日日姬
# JP: 「一週間っ！！？」
1631 = "――Việc khó khăn tăng lên là điều hiển nhiên. Dù vậy, lòng tôi vẫn bị lay động."
# monologue
# JP: 日々姫が絶句してしまう。\n無理もない。厳しいにもほどがある短期間ゆえ。
2738 = "「Bao gồm tất cả những gì đã nói từ nãy đến giờ, anh sẽ hỏi lại lần nữa. Hibiki và Fukami――hai đứa nghĩ là nên thiết kế lối vào đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それで叶うならば、僕の責任において新案を\nポーレット、そしてその先にも提出しよう。が」
1892 = "「Đúng vậy!」"
# 【日々姫】
# display as 日日姬
# JP: 「一週間――で。要望全部をいれなおして、\n導線と安全性を確保、して――」
1627 = "「Đúng vậy, ạ!」"
# monologue
# JP: ……日々姫を苦しめたくはない。\nそれでも、無理であるなら、諦めるしか無い。
1187 = "「Nếu vậy......một tuần. Anh xin lỗi nhưng trong khoảng thời gian này, hãy phác thảo thiết kế mới đi, bản nháp cũng được.」"
# monologue
# JP: 夢を形にするために――\n追うべきはただひたすらに、現実あるのみなのだから。
2807 = "「Một tuần!!?」"
# 【ふかみ】
# display as 深美
# JP: 「あの、日々姫さん。ええと、ホテル、いろんなホテルの\n非常口と通路の関係とかも、資料、あります。です」
2245 = "Hibiki á khẩu. Cũng phải thôi. Thời gian ngắn đến mức quá khắc nghiệt mà."
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
# 1822 = "「啊？！」" 
# 【ふかみ】
# display as 深美
# JP: 「それと――役にたたなかったらごめんなさいですけど。\n帝都にある物産館とか。九洲のやつは全部、写真と動画」
1760 = "「Nếu làm được, anh sẽ chịu trách nhiệm trình phương án mới cho Paulette, và cả những người ở cấp cao hơn nữa. Nhưng.」"
# 【日々姫】
# display as 日日姬
# JP: 「物産館――アンテナショップ！！！」
2134 = "「Trong――một tuần. Phải đưa toàn bộ yêu cầu vào lại, đảm bảo tuyến di chuyển và tính an toàn, rồi――」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんが――路線を観光カタログにって。\nわたし、それ、すごくいいって思ったから。だから――」
2288 = "......Tôi không muốn làm khó Hibiki. Dù vậy, nếu không thể, thì chỉ còn cách bỏ cuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――それは盲点だった」
2057 = "Để biến ước mơ thành hình―― Thứ cần theo đuổi chỉ đơn thuần là hiện thực mà thôi."
# monologue
# JP: 物産館は、九洲各県の名物と見せ所を、\n各県自体が主体となって作った、いわば、県のカタログだ。
2811 = "「À, Hibiki này. Ừm, khách sạn, mối quan hệ giữa lối thoát hiểm và hành lang của nhiều khách sạn khác nhau, tớ cũng có tài liệu. Ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがとふかみちゃん！　それ全部！　絶対確実に\n役にたつ！！　役にたたないわけがない！！」
2181 = "「Hả!?」"
# 【ふかみ】
# display as 深美
# JP: 「あ……よかった――です」
1797 = "「Với lại――nếu không giúp ích được gì thì tớ xin lỗi. Như là các khu trưng bày đặc sản ở Đế Đô chẳng hạn. Của Kyushu thì tớ có đủ hình ảnh và video.」"
# monologue
# JP: それほど不安だったのだろう。
2826 = "「Khu trưng bày đặc sản――Cửa hàng giới thiệu sản phẩm!!!」"
# monologue
# JP: 日々姫と話しているというのに、\nふかみは昔の、おどおどちゃんに少し戻ってしまっている。
2510 = "「Vì anh Soutetsu đã nói――biến tuyến đường thành một cuốn cẩm nang du lịch. Em, thấy ý tưởng đó rất tuyệt. Nên là――」"
# monologue
# JP: （いや――だよな。\nそう簡単に、本質までもが変わるものか）
2988 = "「Ra vậy――Anh đã không nghĩ tới điểm đó.」"
# monologue
# JP: 成長は、ふかみの背筋を美しく伸ばして、\nふかみの社会性を強化した。
2884 = "Khu trưng bày đặc sản là nơi giới thiệu những đặc sản và điểm tham quan của các tỉnh Kyushu, do chính các tỉnh đó làm chủ đạo tạo ra, nói cách khác, nó là cẩm nang của tỉnh."
# monologue
# JP: けれどやっぱり、根っこはふかみで。\nゆるめば、おどおど。自分の世界にこもりたがるのだ。
2512 = "「Cảm ơn Fukami nha! Tất cả đống đó! Chắc chắn tuyệt đối sẽ có ích!! Không thể nào không có ích được!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうであるのに――慣れぬ帝都で……たった一人で」
1763 = "「A......may quá――ạ.」"
# monologue
# JP: ホテルの業務を、精神を身につけ、御一夜に持ち帰る。\nその時点でもう、かなり厳しい任務であろうに――
2562 = "Chắc hẳn em ấy đã rất bất an."
# monologue
# JP: その上、貴重な休みを使って、僕らの、ナインスターズの\nために、他のホテルや物産館までをめぐってくれた。
2480 = "Dù đang nói chuyện với Hibiki, nhưng Fukami lại hơi trở về dáng vẻ rụt rè của ngày xưa."
# 【日々姫】
# display as 日日姬
# JP: 「やる。やれる！　にぃに。\nわたし一週間でデザイン起こす！」
1979 = "（Không――phải rồi. Bản chất con người đâu dễ thay đổi đến thế.）"
# monologue
# JP: きっと、日々姫はやるだろう。
2732 = "Sự trưởng thành đã giúp lưng Fukami vươn thẳng đẹp đẽ, và củng cố kỹ năng xã hội của em ấy."
# monologue
# JP: 不可能に近かったオーダーに、\nふかみが支えを、大きな支えをくれたのだから。
2532 = "Nhưng suy cho cùng, cội nguồn vẫn là Fukami. Cứ buông lỏng là lại rụt rè. Lại muốn thu mình vào thế giới riêng."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。頼む」
1889 = "「Dù vậy――ở một Đế Đô xa lạ......chỉ có một mình.」"
# monologue
# JP: あがってくるなら、それは条件全てを満たすデザインだ。\nならば――なんとしても通してやろう。
2574 = "Tiếp thu nghiệp vụ và tinh thần của khách sạn, rồi mang về Ohimitera. Chỉ riêng việc đó thôi đã là một nhiệm vụ khá khó nhằn rồi, vậy mà――"
# monologue
# JP: ふかみが夢見た光景を、日々姫がともに形に起こす――\nその新しい列車の姿を、誰より僕が、見てみたいから。
2790 = "Thêm vào đó, em ấy còn dùng ngày nghỉ quý giá của mình, vì chúng tôi, vì Nine Stars, mà đi vòng quanh các khách sạn và khu trưng bày đặc sản khác."
# 【日々姫】
# display as 日日姬
# JP: 「うん！　そこは任された！　ばってん――えと――\nけどね？　ふかみちゃん」
1832 = "「Em làm. Làm được! Anh hai. Em sẽ phác thảo thiết kế trong một tuần!」"
# 【ふかみ】
# display as 深美
# JP: 「はい。日々姫さん」
1704 = "Chắc chắn, Hibiki sẽ làm được."
# monologue
# JP: ふたりの声が、いきなり硬くなってしまう。\nああこれは――あの激論に。
2620 = "Bởi vì với một yêu cầu gần như bất khả thi, Fukami đã mang đến một sự hỗ trợ, một sự hỗ trợ vô cùng to lớn."
# monologue
# JP: 『客室から出たゴミを、一晩捨てずに保管する』かを、\nもう一度話し合うことになってしまうのか。
2621 = "「Anh hiểu rồi. Trông cậy vào em.」"
# 【日々姫】
# display as 日日姬
# JP: 「ゴミの話。オーバーサービスだと思う。ホテルなら、\nまる24時間、捨てるのを待ったっていいだろうけど」
2283 = "Nếu làm ra được, thì đó sẽ là một thiết kế thỏa mãn mọi điều kiện. Nếu vậy――tôi sẽ dùng mọi cách để thông qua nó."
# 【ふかみ】
# display as 深美
# JP: 「出たゴミをどこにしまっておくのか、臭い対策は\nどうするか――そこが難しいのは、聞きました」
1998 = "Khung cảnh mà Fukami mơ ước, Hibiki sẽ cùng em ấy biến nó thành hình―― Bởi vì hơn ai hết, tôi muốn nhìn thấy dáng vẻ của đoàn tàu mới đó."
# monologue
# JP: まずは落ち着けて話に入ろう――\nそう思うより先、ふたりが勝手にはじめてしまう。
2687 = "「Vâng! Cứ giao cho em! Nhưng mà――ừm―― Này nhé? Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「でも、お客さんがゴミ箱にうっかり大事なものを\n捨てちゃうことって、結構――すごく多いんです」
1687 = "「Vâng. Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん。停車駅にゴミ保管所をつくって、\n『24時間必ず保管する』ってルールをつくれば」
2004 = "Giọng của hai đứa bỗng chốc cứng đờ. A, cái này là――trở lại cuộc tranh luận nảy lửa kia rồi."
# 【ふかみ】
# display as 深美
# JP: 「旅行者さんです。取りに戻るの大変ですよ。\nそれに、もしもきっぷを間違って捨てちゃったら」
2193 = "Lại phải thảo luận thêm lần nữa về việc 『Có nên giữ lại rác từ phòng khách một đêm mà không vứt đi không』 sao."
# 【稀咲】
# display as ？？？
# JP: 「双鉄！　まだここに居るっ！？」
2290 = "「Chuyện rác thải. Tớ nghĩ đó là phục vụ quá mức. Nếu là khách sạn, thì đợi tròn 24 tiếng rồi mới vứt cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲か――\nっ！？　――どうした、その顔色は」
2074 = "「Sẽ cất rác ở đâu, xử lý mùi hôi thế nào――tớ nghe nói phần đó rất khó.」"
# monologue
# JP: ふかみと日々姫もぴたりと黙る。\nというか、声を出せなくなってしまったのだろう。
2785 = "Trước tiên cứ bình tĩnh tham gia vào câu chuyện đã―― Chưa kịp nghĩ xong, hai đứa đã tự ý bắt đầu."
# monologue
# JP: 稀咲の顔は、顔色は――\n紙より雪より、なお真っ白だ。
2874 = "「Nhưng mà, chuyện khách hàng vô tình vứt đồ quan trọng vào thùng rác, khá là――rất thường xuyên xảy ra.」"
# 【稀咲】
# display as 稀咲
# JP: 「アクシデントだ。買収済みの用地に陥没が発生した」
1730 = "「Thế nên. Nếu chúng ta làm kho chứa rác ở ga dừng đỗ, và đặt ra quy tắc 『Chắc chắn bảo quản trong 24 giờ』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！！！？」
1672 = "「Họ là khách du lịch mà. Quay lại lấy sẽ rất vất vả đó. Hơn nữa, lỡ như họ vứt nhầm vé tàu thì sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「地盤調査して、線路としての用地許可も得た。けど――\n2キロ以上も先にある、廃坑道の崩壊の影響がでたんだ」
1976 = "「Soutetsu! Cậu vẫn còn ở đây chứ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……確かに災難だ。がしかし――\nその程度であれば、補強をすれば」
2218 = "「Kisaki à―― Hả!? ――Sao thế, sắc mặt cậu.」"
# 【稀咲】
# display as 稀咲
# JP: 「その通りなんだ。双鉄。\nその通りなんだけれど――」
2110 = "Fukami và Hibiki cũng im bặt. Hay đúng hơn là, không thể thốt nên lời."
# monologue
# JP: 稀咲は真新しいコップから、\n喉へと一気に水を落とす。
2870 = "Gương mặt, sắc mặt của Kisaki―― Còn trắng bệch hơn cả giấy, hơn cả tuyết."
# monologue
# JP: ああ――\nふかみが山崎さんに合図して、運んでもらったのか。
2583 = "「Sự cố rồi. Xảy ra sụt lún ở khu đất đã thu mua.」"
# 【稀咲】
# display as 稀咲
# JP: 「――んっ。ああっ」
1245 = "「Gì cơ!!!?」"
# monologue
# JP: それで一息つけたのか。\n稀咲の口調が、かなり落ち着く。
2590 = "「Đã khảo sát địa chất, cũng đã xin được giấy phép sử dụng đất làm đường ray. Nhưng―― Lại bị ảnh hưởng bởi sự sụp đổ của một đường hầm mỏ bỏ hoang cách đó hơn 2 km.」"
# 【稀咲】
# display as 稀咲
# JP: 「補強には、同様の影響を及ぼす可能性がある範囲の全て。\n廃坑道を数キロに渡って埋め戻す他に、手段が無いんだ」
1898 = "「Đó......đúng là tai họa thật. Nhưng mà―― Nếu chỉ ở mức độ đó, thì gia cố lại là được mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなも、先に帰しました。\nひとまずは、最低人数で緊急会議ということで」
1971 = "「Đúng là vậy. Soutetsu. Đúng là vậy, nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 
# monologue
# JP: 扱い方を間違えれば、\nナインスターズが、日ノ本鉄路ごと吹き飛ぶ話だ。
2634 = "Kisaki uống cạn một hơi nước từ chiếc cốc mới tinh."
# monologue
# JP: ポーレット以外は、すでに事情を知っている者だけで、\n最初の対応だけは固めてしまう方がいい。
2818 = "A―― Là Fukami đã ra hiệu cho anh Yamazaki mang tới sao."
# 【ポーレット】
# display as 波萊特
# JP: 「ふかみちゃんは、ご自宅に電話しなくて大丈夫？\n門限とかは」
1921 = "「――Ưm. Haa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 
# monologue
# JP: ポーレットは純粋な善意であろうが、\nこの聞き方はかなり危ない。
2775 = "Nhờ vậy mà thở phào được một hơi chăng. Giọng điệu của Kisaki đã bình tĩnh hơn khá nhiều."
# monologue
# JP: 繊細なふかみのことだ。\n自分が居ないほうがいいのかと考え込んで――
2796 = "「Để gia cố, phải xử lý toàn bộ phạm vi có khả năng gây ảnh hưởng tương tự. Ngoài việc lấp lại đường hầm mỏ bỏ hoang dài vài km, không còn cách nào khác.」"
# 【ふかみ】
# display as 深美
# JP: 「平気です。けど、お気遣いありがとうございます」
2106 = "「Tôi cũng đã cho Reina về trước rồi. Tạm thời, chúng ta sẽ họp khẩn với số lượng người tối thiểu.」"
# monologue
# JP: （ああ）
2993 = "「Ừm.」"
# monologue
# JP: 杞憂であったか。\n本当に、ふかみは成長したのだ。
2825 = "Nếu xử lý sai lầm, thì Nine Stars, cùng với cả Đường sắt Hinomoto sẽ tan thành mây khói."
# monologue
# JP: が、この場での最年少者にも違いない。\n守るべきところはやはり、守ってやらねばと思う。
2522 = "Trừ Paulette ra, tốt nhất là chỉ nên chốt phương án ứng phó ban đầu với những người đã biết rõ sự tình."
# 【双鉄】
# display as 雙鐵
# JP: 「遅くなるようなら僕が送る。\nこの会議は、ふかみにもいてもらった方がいい」
1899 = "「Fukami không cần gọi điện về nhà sao? Giờ giới nghiêm hay gì đó.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
1798 = "Paulette hỏi hoàn toàn vì ý tốt, nhưng cách hỏi này khá nguy hiểm."
# monologue
# JP: 抑えた、けれどほっとしたような声。\nごくごく小さな、小さな頷き。
2793 = "Với một người nhạy cảm như Fukami. Em ấy sẽ suy nghĩ xem liệu mình có nên rời đi không――"
# 【ふかみ】
# display as 深美
# JP: 「このお話、なんですけど」
2284 = "「Em không sao ạ. Nhưng, cảm ơn chị đã quan tâm.」"
# 【稀咲】
# display as 稀咲
# JP: 「！」
# 1801 = "「啊！」" 
# monologue
# JP: よほど安心してくれたのだろうか？
2501 = "（A）"
# monologue
# JP: 誰もが切り出しづらかったところに、\nまさかのふかみが、切り込んでいってくれる。
2615 = "Lo bò trắng răng rồi. Fukami thực sự đã trưởng thành."
# 【ふかみ】
# display as 深美
# JP: 「わたしの、全然わかってない視点からだと――\n今、問題がわかってよかったようにも思う、です」
1983 = "Nhưng, em ấy chắc chắn vẫn là người nhỏ tuổi nhất ở đây. Tôi nghĩ những lúc cần bảo vệ, vẫn phải bảo vệ em ấy."
# 【稀咲】
# display as 稀咲
# JP: 「え？」
1820 = "「Nếu muộn thì anh sẽ đưa về. Cuộc họp này, Fukami cũng nên ở lại.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　そうですよ！　稀咲先輩！！」
1812 = "「A.」"
# monologue
# JP: なるほどと思うと同時、日々姫も強く頷いている。
2639 = "Một giọng nói kìm nén, nhưng dường như đã nhẹ nhõm hơn. Một cái gật đầu thật, thật nhỏ."
# 【日々姫】
# display as 日日姬
# JP: 「もしもっと前に崩壊のことがわかってても。\n結局は、この線路用地以外には、買えないんですから」
1743 = "「Về chuyện này, thì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「たしかにそうですよね。軟弱地盤への埋戻し工事の方が、\n他の用地をゼロから買収しなおすよりも、絶対に安い」
2084 = "Em ấy đã an tâm đến vậy sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。そして、旧炭鉱専用線群の活用なしには、\n福丘県の線路を繋ぐことは、できない」
2048 = "Trong lúc ai cũng khó mở lời, không ngờ Fukami lại là người chủ động lên tiếng."
# monologue
# JP: 稀咲をフォローするためもあろう。
2948 = "「Từ góc nhìn của một người hoàn toàn không hiểu gì như em thì―― Em nghĩ, bây giờ phát hiện ra vấn đề cũng là một điều tốt, ạ.」"
# monologue
# JP: が、みなが口々にいうとおり、究極的には、\nこれは本当に『絶対に回避できない』類の問題なのだ。
2516 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「危険に気づかず営業運転を開始し、その後の事故となる。\n――そうした事態を回避できたことは、むしろ幸運だ」
1893 = "「A! Đúng rồi đó! Chị Kisaki!!」"
# 【稀咲】
# display as 稀咲
# JP: 「それは――うん。確かに、そうだ」
2216 = "Vừa lúc tôi hiểu ra vấn đề, Hibiki cũng gật đầu mạnh mẽ."
# monologue
# JP: なぐさめにもならんであろう言葉だが、\n稀咲は顔をあげてくれる。
2967 = "「Dù có biết về vụ sập hầm từ trước. Thì rốt cuộc, chúng ta cũng không thể mua được khu đất nào khác ngoài khu đất làm đường ray này mà.」"
# monologue
# JP: 笑顔を、多分うかべようとし――\nけれどもそれは、あの完璧な営業スマイルにさえならない。
2619 = "「Đúng là vậy nhỉ. Công trình lấp đất gia cố nền đất yếu, chắc chắn sẽ rẻ hơn việc mua lại khu đất khác từ con số không.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう考えても。だけど、双鉄。\nどう転んでも、資金不足は変わらないよね」
1679 = "「Đúng vậy. Hơn nữa, nếu không tận dụng hệ thống đường ray chuyên dụng của mỏ than cũ, thì không thể kết nối tuyến đường sắt của tỉnh Fukuoka được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……それも、確かにそのとおりだ。\nゆえ、対策を考えるために、会議をしている」
1242 = "Chắc cũng là để nói đỡ cho Kisaki."
# monologue
# JP: ざっとの見積もりで、埋戻し補強工事に、40億弱。\nまったく別途の用地買収を試みるなら、その二十倍。
2882 = "Nhưng, đúng như mọi người nói, suy cho cùng, đây thực sự là loại vấn đề 『Tuyệt đối không thể tránh khỏi』."
# monologue
# JP: ならば、なんとしても40億。\n用立てる他にないのだが――
2960 = "「Không nhận ra nguy hiểm mà bắt đầu vận hành thương mại, rồi sau đó xảy ra tai nạn. ――Tránh được tình huống đó, ngược lại còn là điều may mắn.」"
# 【稀咲】
# display as 稀咲
# JP: 「……隈銀から、これ以上の出資も融資も見込めない」
1262 = "「Chuyện đó――ừm. Đúng là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。元忠さんに隈銀頭取を追われるようなリスクを、\n決して負わせてはならん」
2052 = "Dù là những lời chẳng mang tính an ủi mấy, nhưng Kisaki cũng đã ngẩng mặt lên."
# monologue
# JP: 稀咲と元忠氏とが父子である。\nそれが事実である以上、李下に冠を正してはなるまい。
2875 = "Có lẽ cô ấy đang cố nở nụ cười―― Nhưng nó thậm chí còn chẳng giống nụ cười công nghiệp hoàn hảo thường ngày."
# 【日々姫】
# display as 日日姬
# JP: 「ばってん――マイレールファンドの追加出資も……\n私、よくわからんけど――でもなんとなく」
1764 = "「Dù nghĩ vậy đi nữa. Nhưng mà, Soutetsu. Dù xoay xở thế nào, thì việc thiếu vốn cũng không thay đổi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n率直に言って、やらん方がいいだろう」
1828 = "「......Điều đó, đúng là vậy thật. Nên chúng ta mới đang họp để nghĩ cách giải quyết đây.」"
# monologue
# JP: 投資対象としての日ノ本鉄路は、\n配当を出せるようになるまで、まだ何年もかかってしまう。
2746 = "Ước tính sơ bộ, công trình lấp đất gia cố tốn ngót nghét 4 tỷ. Nếu cố mua một khu đất hoàn toàn khác, thì sẽ gấp hai mươi lần con số đó."
# monologue
# JP: その状態で、アクシデント対応のための追加募集は、\n逆に資金の引き上げを招いてしまいかねない。それに――
2606 = "Nếu vậy, dù thế nào cũng phải xoay cho được 4 tỷ. Không còn cách nào khác ngoài việc chuẩn bị số tiền đó, nhưng――"
# 【ポーレット】
# display as 波萊特
# JP: 「仮に実施しても、効果は望めないだろうって思います。\n熱心な鉄道ファンも、地元の人達も、出資疲れしてる」
1744 = "「......Không thể mong đợi thêm bất kỳ khoản đầu tư hay vốn vay nào từ Kumagin nữa.」"
# monologue
# JP: ――ナインスターズプロジェクトに参加した各自治体、\n各鉄道事業者も、ふるさと納税や[クラウドファンディング,1]ＣＦでの資金調達をした。
2564 = "「Ừ. Tuyệt đối không được để bác Mototada phải gánh chịu rủi ro bị đuổi khỏi ghế giám đốc Kumagin.」"
# monologue
# JP: 支えてくれる鉄道ファン、投資の対象としてみている層。\nそのどちらもが、今は財布を軽くしてしまっている。
2954 = "Kisaki và bác Mototada là cha con. Đó đã là sự thật, thì không nên làm những việc dễ gây hiểu lầm."
# 【ふかみ】
# display as 深美
# JP: 「あの……その話も、わたし、わからなくて。\nだから、すごくズレてたらごめんなさいなんですけど」
1719 = "「Nhưng mà――việc gọi thêm vốn đầu tư từ Quỹ Đường sắt Tư nhân cũng...... Em không rành lắm――nhưng mà có cảm giác.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、聞かせてくれ、ふかみ」
2105 = "「Ừm. Nói thẳng ra là, không nên làm thì hơn.」"
# monologue
# JP: ホテルといえば、人脈と情報との宝庫とも聞く、
2902 = "Với tư cách là một đối tượng đầu tư, Đường sắt Hinomoto sẽ còn mất nhiều năm nữa mới có thể trả cổ tức."
# monologue
# JP: ふかみの掴んだ水源は、\n今はもう、クマ川のみにとどまらぬものとなっていよう。
2663 = "Trong tình trạng đó, việc gọi vốn bổ sung để xử lý sự cố, ngược lại có thể dẫn đến việc bị rút vốn. Hơn nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「どんなアイディアであれ、聞かせて欲しい。\n僕らの知恵も――恐らく、枯渇に近いのだ」
1647 = "「Giả sử có thực hiện, tôi nghĩ cũng không mang lại hiệu quả gì đâu. Những người hâm mộ đường sắt nhiệt huyết, hay người dân địa phương, đều đã cạn kiệt vốn đầu tư rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「あの、すごく単純だから、ええっと――\n期待はずれかもって、わたし、思うんです、けど」
1778 = "――Các chính quyền địa phương, các doanh nghiệp đường sắt tham gia dự án Nine Stars cũng đã huy động vốn thông qua Thuế quê hương và Gọi vốn cộng đồng (CF)."
# monologue
# JP: ふるふる小さく頭を振って。\nそれでもふかみは、続く言葉を発しきる。
2799 = "Những người hâm mộ đường sắt luôn ủng hộ, những người xem đây là đối tượng đầu tư. Cả hai nhóm đó, bây giờ túi tiền đều đã vơi đi nhiều rồi."
# 【ふかみ】
# display as 深美
# JP: 「ええと――だから。インバウンド誘致と同じで」
1777 = "「Dạ......chuyện đó, em cũng không hiểu lắm. Nên nếu em nói sai thì em xin lỗi, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！　海外からの投資を誘引するのか！」
1817 = "「Không sao, nói đi, Fukami.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1801 = "「啊！」" 
# 【日々姫】
# display as 日日姬
# JP: 「それって！　それなら、インバウンドの誘致にも、\nナインスターズの広報告知にもつながるし！」
2154 = "Nói đến khách sạn, thì nghe nói đó là kho tàng của nhân mạch và thông tin."
# monologue
# JP: 僕らの視線が、稀咲に集まる。\n稀咲はけれど――やはり、笑顔を見せてくれない。
2673 = "Nguồn nước mà Fukami nắm giữ, bây giờ có lẽ không chỉ dừng lại ở sông Kuma nữa."
# 【稀咲】
# display as 稀咲
# JP: 「それは……できれば素晴らしいと思う。けど、\n大陸方面――隈銀が強い方面には、もうやってるんだ」
2217 = "「Bất kể là ý tưởng gì, anh cũng muốn nghe. Trí tuệ của chúng ta――có lẽ cũng đã gần cạn kiệt rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲と元忠氏の仲国人脈のことならば知っている。\nというか、その他の国に、ツテはないのか？」
1997 = "「Dạ, vì nó rất đơn giản, nên là―― Em nghĩ có thể mọi người sẽ thất vọng, nhưng mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「鴎州や冥国との、太いパイプはほとんどないね。\n単純な知人であれば、あちらにも少しはいるけど」
2094 = "Lắc đầu nhè nhẹ. Dù vậy, Fukami vẫn nói hết câu."
# 【双鉄】
# display as 雙鐵
# JP: 「であれば――\n後東氏の人脈に頼る……のは――まずいのか？」
2269 = "「Dạ――nên là. Giống như việc thu hút khách du lịch quốc tế (Inbound) vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね。ここぞとばかりに、絶対確実に、\n日ノ本鉄路が買い叩かれる」
1948 = "「! Thu hút đầu tư từ nước ngoài sao!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1801 = "「啊！」" 
# monologue
# JP: 言われた瞬間、ようやく理解する。\n稀咲の顔があれほどに、青ざめていたその理由を。
2901 = "「A!」"
# monologue
# JP: 稀咲は確かに創設者だが、\n現在の立場的には、日ノ本鉄路の取締役にすぎない。
2966 = "「Thế thì! Nếu vậy, nó cũng sẽ kết nối với việc thu hút khách quốc tế, và cả việc quảng bá, thông báo cho Nine Stars nữa!」"
# monologue
# JP: そして社長は――\n後東さんから送り込まれた人物なのだ。
2896 = "Ánh mắt của chúng tôi đổ dồn về phía Kisaki. Nhưng Kisaki――vẫn không nở nụ cười."
# 【双鉄】
# display as 雙鐵
# JP: 「……この情報を、小石川さんは」
2220 = "「Việc đó......nếu làm được thì tuyệt quá. Nhưng mà, phía Đại lục――nơi Kumagin có thế mạnh, thì đã làm rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「彼女が社長だもの。報告をあげないわけにはいかない。\nだから、その前に対策を固められないと、まずい」
1874 = "「Anh biết về nhân mạch ở Trung Quốc của em và bác Mototada. Cơ mà, ở các quốc gia khác, không có mối quan hệ nào sao?」"
# monologue
# JP: 確かに、まずい、小石川さんの能力は、今後の用地買収に\n絶対不可欠――株主総会で追い出すわけにはいかない。
2844 = "「Với Âu Châu hay Minh Quốc thì hầu như không có đường dây liên kết lớn nào cả. Nếu chỉ là người quen đơn thuần, thì bên đó cũng có một chút.」"
# monologue
# JP: が、小石川さんの報告を受け後東氏の――買収屋の血が\n騒いでしまえば、なにが起きても不思議ではない。
2520 = "「Nếu vậy―― Dựa vào nhân mạch của ông Goto......thì――không ổn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……必要なのは、鴎州なり冥国なりへの太いパイプか。\n真闇姉や義父さんも、単純な知り合いならばいようが」
1273 = "「Chắc chắn rồi. Nhân cơ hội này, tuyệt đối chắc chắn, Đường sắt Hinomoto sẽ bị ép giá thê thảm.」"
# 【ふかみ】
# display as 深美
# JP: 「あの……どういう人ならなれるんですか？\nその――投資を誘引する？　窓口に」
2179 = "Ngay khoảnh khắc nghe thấy điều đó, tôi mới hiểu ra. Lý do tại sao khuôn mặt Kisaki lại tái nhợt đến vậy."
# monologue
# JP: ああ、そうだ。\n焦りすぎていた――危うかった。
2587 = "Kisaki đúng là người sáng lập, nhưng xét về lập trường hiện tại, cô ấy chỉ là giám đốc của Đường sắt Hinomoto."
# monologue
# JP: そこをきちんと把握せねば、\n無駄に情報を拡散させてしまうだけのこととなる。
2631 = "Và giám đốc điều hành (CEO)―― là người do ông Goto cài vào."
# 【稀咲】
# display as 稀咲
# JP: 「まずは、その国を母国としている人間。よそ者が\n持ち込むお金の話は、それだけでひどく警戒される」
2295 = "「......Thông tin này, cô Koishikawa đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、ありそう。そういうの」
1851 = "「Cô ấy là giám đốc điều hành mà. Không thể không báo cáo được. Nên nếu không chốt được đối sách trước đó, thì sẽ rất rắc rối.」"
# 【稀咲】
# display as 稀咲
# JP: 「その上で、その国において金融商品を作成できる\n立場であれば、一番理想的だといえるね」
1652 = "Đúng là rắc rối thật, năng lực của cô Koishikawa là tuyệt đối không thể thiếu trong việc thu mua đất sau này――không thể đuổi cô ấy khỏi đại hội cổ đông được."
# 【双鉄】
# display as 雙鐵
# JP: 「そのような知り合いがいるか。真闇姉と義父さんならば、\n絶対に信用できるゆえ、まずあたってみよう」
2146 = "Nhưng, nếu nhận được báo cáo từ cô Koishikawa, máu thâu tóm của ông Goto mà nổi lên, thì chuyện gì xảy ra cũng không có gì lạ."
# 【日々姫】
# display as 日日姬
# JP: 「わたしは――んー……ねぇねと父さん以外だと～」
1981 = "「......Thứ chúng ta cần là một đường dây liên kết lớn tới Âu Châu hoặc Minh Quốc sao. Chị Mayami và cha nuôi thì chắc cũng có những người quen đơn thuần thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、日々姫とふかみはデザインに専念してくれ。\n完成デザインの質の高さは、投資誘引の力となるゆえ」
1651 = "「Dạ......người như thế nào thì mới được ạ? Người――thu hút đầu tư? Làm đầu mối ấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　うん！　わかった！！」
1807 = "A, đúng rồi. Tôi đã quá nóng vội――suýt thì nguy."
# 【ふかみ】
# display as 深美
# JP: 「わたしも、全力でお手伝いします！　です！！」
1962 = "Nếu không nắm rõ điều đó, thì chỉ làm thông tin bị rò rỉ một cách vô ích mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「で、ポーレットは――\nポーレット？」
2130 = "「Trước tiên, phải là người có quốc tịch ở quốc gia đó. Chuyện tiền bạc do người ngoài mang đến, chỉ bấy nhiêu thôi cũng đã bị cảnh giác cao độ rồi.」"
# monologue
# JP: ぎゅっと、唇を噛んでいる。\nぎゅうっと、瞳を閉じている。
2776 = "「A, có vẻ là vậy thật. Kiểu như thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ポーレット」
1953 = "「Hơn nữa, nếu người đó ở vị thế có thể tạo ra các sản phẩm tài chính ở quốc gia đó, thì có thể nói là lý tưởng nhất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――安心して、稀咲。双鉄くん」
1240 = "「Không biết có người quen nào như vậy không. Nếu là chị Mayami và cha nuôi, thì tuyệt đối có thể tin tưởng được, nên trước tiên cứ thử hỏi xem sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「ポーレット？」
2121 = "「Em thì――ưm......ngoài chị hai và bố ra thì~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういう――銀行に、強力にセールスかけられるひと。\nフランクに、わたし、一人だけだけど知ってるから」
2228 = "「Không, Hibiki và Fukami hãy tập trung vào việc thiết kế đi. Bởi vì chất lượng cao của thiết kế hoàn chỉnh sẽ là sức mạnh thu hút đầu tư.」"
# 【双鉄】
# display as 雙鐵＆稀咲
# JP: 「おお！」\n「――っ！」
1846 = "「A! Vâng! Em hiểu rồi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜のこと。わたしのこと。きっと助けてくれるから。\nいまも絶対、愛してくれてるって思うから」
1871 = "「Em cũng sẽ dốc toàn lực giúp đỡ! Ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1798 = "「啊」" 
# 【稀咲】
# display as 稀咲
# JP: 「――ポーレット」
1261 = "「Vậy, Paulette thì sao―― Paulette?」"
# monologue
# JP: ……感じてはいた。\nポーレットも僕と同様、過去に何かをかかえていると。
1192 = "Cô ấy đang cắn chặt môi. Nhắm nghiền đôi mắt."
# monologue
# JP: 稀咲もそれを――いや、稀咲はあるいはその詳細を、\nポーレットから、既に聞かされているのだろうか？
2871 = "「Sao vậy? Paulette.」"
# 【稀咲】
# display as 稀咲
# JP: 「キミは、それで――」
1702 = "「――Yên tâm đi, Kisaki. Cậu Soutetsu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。稀咲。これ、いい機会だって思うから。\nわたしとママとが――もう一回、お話するための」
2104 = "「Paulette?」"
# monologue
# JP: そしてポーレットは手を伸ばす。
2704 = "「Người có thể――chào hàng mạnh mẽ với ngân hàng như thế. Ở Pháp, tôi biết một người, dù chỉ có một người thôi.」"
# monologue
# JP: わずかに震える指先で――\nそれでもしっかり、受話器を掴む。
2626 = "「Ồ!」 「――!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……今日はふかみに、びっくりするほど助けられたな」
1235 = "「Chuyện của Ohimitera. Chuyện của tôi. Chắc chắn người đó sẽ giúp đỡ. Bởi vì tôi nghĩ, ngay cả bây giờ người đó vẫn tuyệt đối yêu thương tôi.」"
# 【ふかみ】
# display as 深美
# JP: 「そんな――そんなことない、です」
2108 = "「――Paulette.」"
# monologue
# JP: ふかみがはにかむ。
2791 = "......Tôi đã cảm nhận được. Paulette cũng giống như tôi, đang mang trong mình một quá khứ nào đó."
# monologue
# JP: 送っていくための帰り道。\nふかみはすっかり、昔に戻ってしまったようだ。
2690 = "Kisaki cũng vậy――không, hay là Kisaki đã được nghe chi tiết từ Paulette rồi chăng?"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは、あるさ。ふかみのおかげだ。\nポーレットとお母様とが、話し合えたのも」
2139 = "「Cậu, như vậy thì――」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　あれは――本当に素敵だった。です。\nちょっとでもきっかけになれたなら……うれしい。です」
1816 = "「Không sao đâu. Kisaki. Tôi nghĩ đây là một cơ hội tốt. Để tôi và mẹ――có thể nói chuyện lại với nhau một lần nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1830 = "「嗯」" 
# monologue
# JP: 確かに、本当に素敵だった。\nこうして思い出すだけで、こころがあたたかになる程に。
2824 = "Rồi Paulette đưa tay ra."
# 【ふかみ】
# display as 深美
# JP: 「マイアさん――ポーレットさんのこと、ずっと、\nずうっと。離れてても、見守ってくれてたんですね」
2232 = "Bằng những ngón tay hơi run rẩy―― Dù vậy vẫn nắm chặt lấy ống nghe điện thoại."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ナインスターズプロジェクトのことどころか、\n日ノ本鉄路のことまで、既に知ってくださっていたとは」
2044 = "「......Hôm nay anh được Fukami giúp đỡ nhiều đến mức ngạc nhiên luôn đấy.」"
# monologue
# JP: ……おかげで話は早かった。
1194 = "「Đâu có――không có chuyện đó đâu, ạ.」"
# monologue
# JP: というかむしろ、ポーレットが頼ってくるのを待っていた。\nそんな印象さえ感じるほどに。
2821 = "Fukami bẽn lẽn."
# 【ふかみ】
# display as 深美
# JP: 「……うまくいきますかね？\nマイアさんが、フランクの銀行紹介してくれるのって」
1265 = "Trên đường đưa em ấy về. Fukami dường như đã hoàn toàn trở lại như ngày xưa."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、うまくいくだろう。\nなにせマイアさんは、あのポーレットのお母様だぞ」
2223 = "「Có chuyện đó mà. Là nhờ Fukami cả đấy. Cả việc Paulette và mẹ cô ấy có thể nói chuyện lại với nhau nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　いわれてみたらそうですね」
1814 = "「A! Chuyện đó――thực sự rất tuyệt vời. Ạ. Nếu em có thể trở thành chất xúc tác dù chỉ một chút......thì em rất vui. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その上、稀咲だ。ご紹介が仮にか細い縁だとしても、\n必ず、話をまとめるさ」
2168 = "Đúng là, thực sự rất tuyệt vời. Đến mức chỉ cần nhớ lại thế này thôi, lòng tôi cũng thấy ấm áp."
# 【ふかみ】
# display as 深美
# JP: 「はい、そうですね！！」
2064 = "「Bác Maia――dù ở xa, vẫn luôn, luôn dõi theo chị Paulette nhỉ.」"
# monologue
# JP: （くぅ～）
2989 = "「Đúng vậy. Không chỉ dự án Nine Stars, mà bác ấy còn biết cả chuyện của Đường sắt Hinomoto nữa chứ.」"
# monologue
# JP: おっと、ふかみの腹がなったか。
2581 = "......Nhờ vậy mà câu chuyện tiến triển rất nhanh."
# monologue
# JP: ああ、ではない。\nこういうときは、僕が泥をかぶって――
2585 = "Hay đúng hơn là, bác ấy đang đợi Paulette nhờ vả. Đến mức tôi có cảm giác như vậy."
# 【ふかみ】
# display as 深美
# JP: 「あはは！　おなか、なっちゃいました。です。\nわたし、安心しちゃったから」
1785 = "「......Liệu có suôn sẻ không anh? Chuyện bác Maia giới thiệu ngân hàng ở Pháp ấy.」"
# monologue
# JP: ――恥ずかしがらずに、閉じこもらずに。\nふかみが笑顔で、お腹の虫を吹き飛ばす。
1149 = "「Chuyện đó, chắc chắn sẽ suôn sẻ thôi. Dù sao thì bác Maia cũng là mẹ của Paulette mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕にも聞こえた。――というか、そうか。\n僕らは夕飯を、まだ食べてないのだなぁ」
1963 = "「A! Anh nói em mới để ý, đúng là vậy nhỉ.」"
# monologue
# JP: 緊張と切迫感とに、空腹さえも飛んでいたが――\nなるほど確かに。安心すれば、腹もすくものだ。
2887 = "「Hơn nữa, còn có Kisaki. Cho dù lời giới thiệu chỉ là một mối duyên mỏng manh, cô ấy chắc chắn cũng sẽ dàn xếp ổn thỏa thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、この時間だとコンビニでしか食事できんな。\nどうだ、ふかみ。イートインでも構わなければ」
1767 = "「Vâng, đúng vậy ạ!!」"
# monologue
# JP: 言った瞬間、ふかみがぽっと、赤くなる。
2900 = "（Rột~）"
# 【ふかみ】
# display as 深美
# JP: 「わたし――双鉄おにいさ――双鉄さんの食事のお誘い、\nとっても、とっても嬉しい、です」
2172 = "Ồ, bụng Fukami vừa kêu à."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2059 = "À, không phải. Những lúc thế này, tôi phải đứng ra nhận lỗi thay――"
# 【ふかみ】
# display as 深美
# JP: 「だけど、今日は帰ります。です。遅くなっちゃったし、\nおかあさん、ご飯作ってくれてるって思いますし」
1683 = "「A ha ha! Bụng em, kêu mất rồi. Ạ. Vì em đã an tâm rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――そうか。ならば、次の機会にだな。\n今日のお礼をきちんとしたい」
1248 = "――Không hề xấu hổ, không hề thu mình lại. Fukami mỉm cười, xua tan tiếng bụng réo."
# 【ふかみ】
# display as 深美
# JP: 「あのっ！」
1999 = "「Anh cũng nghe thấy rồi. ――Cơ mà, đúng nhỉ. Chúng ta vẫn chưa ăn tối mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っ！」
1845 = "Sự căng thẳng và cấp bách đã làm cơn đói bay biến mất―― Nhưng đúng là vậy. Hễ an tâm là bụng lại đói meo."
# monologue
# JP: ふかみが、近い。\nいつの間に、僕のすぐそばによってきている。
2804 = "「Dù vậy, giờ này thì chỉ có thể ăn ở cửa hàng tiện lợi thôi. Sao hả, Fukami. Nếu em không ngại ăn tại chỗ.」"
# monologue
# JP: 大きな瞳で――すみれ色の目で。\n僕を、まっすぐ見つめている。
2625 = "Khoảnh khắc tôi vừa dứt lời, mặt Fukami bỗng đỏ bừng."
# 【ふかみ】
# display as 深美
# JP: 「そのお食事って、ふたりっきりでもいいですか？」
2266 = "「Em――lời mời ăn uống của anh hai Soutet――anh Soutetsu, em rất, rất là vui, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。凪なり誰かと一緒でも、二人きりでも。\nふかみへの礼ゆえ、ふかみの希望にあわせよう」
2138 = "「Vậy sao.」"
# 【ふかみ】
# display as 深美
# JP: 「……あはー」
1246 = "「Nhưng mà, hôm nay em sẽ về. Ạ. Cũng muộn rồi, với lại em nghĩ mẹ đang nấu cơm đợi em.」"
# monologue
# JP: 気の抜けたような妙な笑み。\nそしてふかみは、ぽーんと大きな一歩で僕から距離を取る。
2783 = "「――Vậy sao. Nếu vậy thì để dịp khác nhé. Anh muốn đàng hoàng cảm ơn em vì ngày hôm nay.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、しばらくはまだいーでーす！\nお礼、先にとっといてください！」
2257 = "「Anh ơi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1703 = "「Ừm? ――!」"
# 【ふかみ】
# display as 深美
# JP: 「はいです。わたし、もっともっとがんばって、\n素敵な大人――素敵な女の子になりますです、から」
2137 = "Fukami, đang ở rất gần. Em ấy đã tiến lại sát ngay bên tôi từ lúc nào."
# monologue
# JP: ふかみがはにかむ。下を向く。
2797 = "Bằng đôi mắt to tròn――đôi mắt màu hoa violet. Em ấy đang nhìn thẳng vào tôi."
# monologue
# JP: けれどもそれは一瞬で、\n僕へと向き直した顔は明るく、笑ってる。
2524 = "「Bữa ăn đó, chỉ có hai chúng ta thôi được không ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「だからそのとき！　双鉄さんがわたしのこと、\nふたりっきりで誘いたいって思ってくれたら！」
2007 = "「Tất nhiên rồi. Cùng với Nagi hay ai đó, hoặc chỉ hai chúng ta cũng được. Là để cảm ơn Fukami, nên anh sẽ theo ý muốn của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「そのときは！　素敵なディナー！\nご馳走してもらえたらうれしいです！　です！！」
1735 = "「......A ha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 
# monologue
# JP: なるほど、これは、デートに誘えと言われているのか。
2749 = "Một nụ cười kỳ lạ như thể trút được gánh nặng. Rồi Fukami bước một bước dài lùi ra xa tôi."
# monologue
# JP: ……デートだなんだは、よくわからん。\nゆえ、先のことになるかもしれんが。
1188 = "「Nếu vậy, thì tạm thời vẫn chưa cần đâu ạ! Lời cảm ơn, xin hãy giữ lại cho lần sau nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。そのときにはそうしよう」
1836 = "「Vậy sao?」"
# 【ふかみ】
# display as 深美
# JP: 「嬉しい！　ありがとうございます！\nそうなるように、わたし、頑張っちゃいますね！」
1864 = "「Vâng ạ. Em, sẽ cố gắng hơn nữa, để trở thành một người lớn tuyệt vời――một cô gái tuyệt vời, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1819 = "Fukami bẽn lẽn. Cúi mặt xuống."
# monologue
# JP: ふかみが駆け出す。\n軽やかに、楽しげに――背中で笑っているように。
2802 = "Nhưng điều đó chỉ diễn ra trong nháy mắt, khi quay mặt lại nhìn tôi, khuôn mặt em ấy rạng rỡ, đang mỉm cười."
# 【ふかみ】
# display as 深美
# JP: 「ここまできたら大丈夫です！\nおやすみなさい！　双鉄さん！！」
1737 = "「Nên là lúc đó! Nếu anh Soutetsu nghĩ rằng, muốn mời riêng em đi ăn!」"
# monologue
# JP: ――ああ、本当に。\n本当にふかみは大人になった。
1145 = "「Lúc đó! Một bữa tối tuyệt vời! Được anh đãi thì em sẽ vui lắm! Ạ!!」"
# monologue
# JP: 恐らく僕より、ずうっと早く。
2892 = "Ra vậy, đây là, đang bảo tôi hãy mời em ấy đi hẹn hò sao."
# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、ふかみ。良い夜を」
2082 = "......Hẹn hò các thứ, tôi không rành lắm. Do đó, có lẽ sẽ là chuyện của tương lai xa, nhưng mà."
