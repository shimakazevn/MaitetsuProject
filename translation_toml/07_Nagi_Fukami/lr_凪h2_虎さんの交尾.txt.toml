1583 = "Dễ thương quá. Gợi tình quá. Bộ đồ lót này\nhở hang thật đấy.\nĐôi tai và chiếc đuôi\ncàng làm tăng thêm sự dâm đãng của nó."

# 【凪】
# display as 凪
# JP: 「ネコじゃなかとよ！　虎さんばい！」
1120 = "「Không phải mèo đâu! Là hổ đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「虎。……縞はどこへ消えたのだ？」
1381 = "「Hổ sao. ……Vậy vằn hổ đâu mất rồi?」"

# 【凪】
# display as 凪
# JP: 「通販カタログの写真には、虎縞ちゃーんとあったと！\nばってん、届いたら影も形もなかったばい」
1379 = "「Trong ảnh trên catalog rõ ràng là có vằn\nhổ mà!\nThế nhưng lúc nhận hàng lại chẳng\nthấy bóng dáng đâu cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ。仕様変更というヤツかな」
1223 = "「Hừm. Chắc là do thay đổi thiết kế rồi.」"

# 【凪】
# display as 凪
# JP: 「仕様変更でもミスでも、これじゃ虎感無かけんね！\nやけん凪さま、返品交換してもらおうと」
1121 = "「Dù là thay đổi thiết kế hay làm lỗi thì\nthế này chẳng ra dáng hổ chút nào!\nCho nên\nNagi định sẽ gửi trả để đổi lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「着てしまったのに、か？」
1145 = "「Mặc vào rồi cơ mà?」"

# 【凪】
# display as 凪
# JP: 「へ？」
1279 = "「Hả?」"

# monologue
