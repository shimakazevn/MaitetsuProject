1619 = "Tôi lại ghé mặt, đưa môi sát vào em.\nCứ\ntưởng sẽ bị ghét, nhưng Nagi lại ngoan\nngoãn chấp nhận."

# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちゅっ――ちゅっ――ちゅむっ」
1291 = "「Ưm……chụt——chụt——chụt——chụt」"

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は凪が好きだ。その凪が僕を喜ばせるためだけに、\nあれほどに苦まずいものを口に含み、飲んでさえくれる」
884 = "「……Anh thích Nagi. Chỉ vì muốn làm anh\nvui,\nmà Nagi sẵn sàng ngậm và nuốt thứ\nđắng ngắt, khó uống đến vậy.」"

# 【凪】
# display as 凪
# JP: 「うん」
# 1295 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
