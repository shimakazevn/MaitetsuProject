# 【凪】
# display as 凪
# JP: 「んへへ――にぃさぁん――ちゅっ！　ちゅむっ――\nれろっ――れるううっ――にゅちゅっ――ちゅうっ！」
1308 = "「Nhehe——anh Soutetsu——chụt! Chụt——\nliếm——liếm——nhóp nhép——chụt!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ん」
1216 = "「Ưm……ưm」"

# monologue
# JP: 疲労のあまり崩れれば、凪も崩れつつ僕を抱きしめ、\nもつれあうようなキスになる。
1700 = "Khi tôi gục xuống vì quá mệt mỏi, Nagi\ncũng gục xuống ôm chầm lấy tôi,\nvà chúng\ntôi trao nhau nụ hôn say đắm."

# 【凪】
# display as 凪
# JP: 「ちゅうっ――ちゅむっ――れるっ――れろおっ――\nじゅ――ずじゅうううっ――（こくっ）――ぷあっ」
1285 = "「Chụt——chụt——liếm——liếm——\nju——zujuuu——（Ực）——pua」"

# monologue
# JP: キスをほどけば、凪は鼻先をこすりつけてくる。\nそれだけでなく、ほっぺも、おでこも、顔の全部を。
1617 = "Khi nụ hôn kết thúc, Nagi cọ mũi vào tôi.\nKhông chỉ vậy, em còn cọ cả má, trán, toàn\nbộ khuôn mặt."

# 【凪】
# display as 凪
# JP: 「えへへ、にーさん」
1314 = "「Ehehe, anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、凪？」
1346 = "「Sao vậy, Nagi?」"

# 【凪】
# display as 凪
# JP: 「大好きばいっ♪」
1348 = "「Em yêu anh lắm♪」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1266 = "「啊！」" 

# monologue
# JP: 縞が無い方が正解だった。凪は子猫だ。\n牙と爪とを有していてなお、どこまでだってかわいい子猫。
1719 = "Không có vằn hổ mới là chính xác. Nagi là\nmột chú mèo con.\nDù có nanh vuốt, em vẫn\nmãi là một chú mèo con vô cùng đáng yêu."

# 【凪】
# display as 凪
# JP: 「わ、わわっ！？　えっ！？　ふわっ！？　おちんちん、\nなんでにーさん、あぎゃんとすごいセックスして、また」
1200 = "「Wa, wawa!? Hả!? Fuwa!? Cậu nhỏ,\nsao anh\nlàm tình dữ dội như thế rồi mà lại」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1295 = "「嗯」" 

# monologue
# JP: そうと理解した瞬間に、今度は僕が、虎になる。
1600 = "Khoảnh khắc nhận ra điều đó, lần này đến\nlượt tôi hóa thành mãnh hổ."

