1354 = "「Lỡ mất rồi! Thất bại thảm hại! Khó khăn\nlắm mới có cơ hội,\nđịnh bụng cho anh xem\nmột lần trước khi đem trả lại mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、少しも失敗ではないさ」
1413 = "「Nếu vậy thì, chẳng thất bại chút nào\nđâu.」"

# 【凪】
# display as 凪
# JP: 「ふぇ――ふあ！！？」
1280 = "「Hể——fua!!?」"

# monologue
# JP: ジッパーをおろして性器を思い切り見せつける。\n出すのに苦労するほどに、強く反り返る全力勃起を。
1640 = "Tôi kéo khóa quần xuống và phơi bày bộ\nphận sinh dục của mình ra.\nNó cương cứng\nvà cong vút đến mức tôi phải chật vật mới\nlấy ra được."

# 【凪】
# display as 凪
# JP: 「ふぁ……（ごくっ）――あ！　ふ、ふふふーん！！\nにーさん、凪さまに興奮――発情しちゃったと？」
1258 = "「Fua……（Ực）——A! Fu, fufufu-n!!\nAnh\nSoutetsu, hưng phấn với Nagi——đến phát\ntình rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。可愛い雌虎に、すっかり魅了されてしまった」
1359 = "「Đúng vậy. Anh hoàn toàn bị cô hổ cái dễ\nthương này mê hoặc mất rồi.」"

# 【凪】
# display as 凪
# JP: 「ひゃ――あっ――んっ」
1170 = "「Hya——a——ưm」"

# monologue
# JP: これ見よがしな凪の脇へとキスをする。\n脇の下、くぼみの部分にべっとり唾液を刷り込んでいく。
1519 = "Tôi hôn lên vùng nách Nagi đang cố tình\nphô ra.\nBôi trét đầy nước bọt vào phần hõm\ndưới nách em."

# monologue
# JP: （べちゃっ――ちゅるっ――じゅうっ――ちゅるうっ）
1819 = "（Chụt——chụt——chụt——chụt）"

# 【凪】
# display as 凪
# JP: 「ひゃっ――ンッ――どうして、脇、と？　凪、さま\n――ふぁっ――こぎゃんと――くすぐったか、と――」
1174 = "「Hya——ưm——sao lại, là nách, chứ? Nagi\n——fua——chỗ đó——nhột lắm——」"

# 【双鉄】
# display as 雙鐵
