1415 = "「Nên anh muốn dùng nước bọt của mình để\nxoa dịu chiếc lưỡi của Nagi.\nMuốn em\ntruyền lại vị đắng cho anh, để Nagi cảm\nthấy dễ chịu hơn.」"

# 【凪】
# display as 凪
# JP: 「なら凪さまも同じばい！　凪さまの脇ばぺろぺろした\nにーさんのベロ、凪さまのツバで綺麗にするばい！　ん」
1417 = "「Vậy thì Nagi cũng giống anh! Lưỡi của anh\nvừa liếm nách Nagi,\nNagi sẽ dùng nước bọt\ncủa mình làm sạch nó! Ưm」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1296 = "「!」"

# 【凪】
# display as 凪
# JP: 「れるっ――れろっ――にゅぶっ――じゅるっ――\nんっ――～～～～～～――んっ――ちゅうっ――れるっ」
1283 = "「Liếm——liếm——nhóp nhép——nhóp nhép——\nưm——~~~~~~——ưm——chụt——liếm」"

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ」
1218 = "「Nku」"

# monologue
# JP: 丸めた舌をレールにし、凪は唾液を流し込んでくる。\nすすって味わい、喉へと落とす。勃起がどんどん熱くなる。
1537 = "Nagi uốn cong lưỡi làm rãnh, rót nước bọt\nvào miệng tôi.\nTôi mút lấy, thưởng thức\nrồi nuốt xuống cổ họng. Sự cương cứng càng\nlúc càng nóng rực."

# 【凪】
# display as 凪
# JP: 「れるっ――にゅぶっ――ちゅくっ――ちゅむっ――\n（ずずっ――こくっ）――ちゅっ――ちゅむ、ちゅう」
1284 = "「Liếm——nhóp nhép——chụt——chụt——\n（Mút——ực）——chụt——chụt, chụt」"

# monologue
# JP: キスをしながらゆるやかに、顔が、体がこすりつけられる。\n凪の匂いで凪の温度で、全身がぽかぽか満たされていく。
1616 = "Vừa hôn, khuôn mặt và cơ thể em nhẹ nhàng\ncọ xát vào tôi.\nMùi hương và hơi ấm của\nNagi lấp đầy toàn thân tôi, khiến tôi cảm\nthấy ấm áp vô cùng."

# 【凪】
# display as 凪
# JP: 「ちゅっ――ちゅむうっ――れるっ――れりゅううう――\nちゅむっ――れるっ――ちゅっ――ちゅううっ――ん」
1282 = "「Chụt——chụt——liếm——liếm——\nchụt——liếm——chụt——chụt——ưm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ――ありがとう。凪。\nせっかく綺麗にしてもらえた舌ゆえ――」
1255 = "「Pua——cảm ơn em, Nagi.\nVì em đã cất công\nlàm sạch lưỡi cho anh nên——」"

# monologue
# JP: ベロを突き出しみせつけて。\nそのまま小さく可憐な乳首へ近づけていく。
1613 = "Tôi thè lưỡi ra cho em thấy.\nRồi cứ thế\ntiến lại gần nụ hoa nhỏ nhắn, đáng yêu của\nem."

# 【凪】
# display as 凪
# JP: 「ふあっ――あ、おっぱい――んっ……凪さま、\nキスであっつくなって、汗、かいてきたけん」
1248 = "「Fua——a, ngực——ưm……Nagi,\nnóng rực lên vì\nnụ hôn, đổ cả mồ hôi rồi này」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nならばそれも残らず舐め取ろう――（ぺろっ）」
1363 = "「Vậy sao.\nThế thì anh sẽ liếm sạch không\nchừa một giọt nào——（Liếm nhẹ）」"

# 【凪】
# display as 凪
# JP: 「ひあっっ！！！」
1183 = "「Hya!!!」"

# monologue
# JP: 谷間というほどの起伏もない、けれど確かに柔らかな胸を、\n舌で、唇で、指先で、徹底的に愛撫しまくる。
1553 = "Khe ngực chẳng có lấy một chút nhấp nhô,\nnhưng chắc chắn là mềm mại ấy,\ntôi dùng\nlưỡi, môi và đầu ngón tay để vuốt ve triệt\nđể."

# monologue
# JP: （ちゅっ――ちゅむっ――もみゅ――こリュッ――）
1806 = "（Chụt——chụt——nắn——ngoáy——）"

# 【凪】
# display as 凪
# JP: 「ぁっ――っ――にーさん……エッチ、ばい……ふぁ……\n凪さまの、ちっちゃか、おっぱい――そぎゃん、夢中に」
1241 = "「A——a——anh Soutetsu……dâm đãng, quá……fua……\nSay mê, ngực nhỏ, của Nagi——đến vậy sao」"

# 【双鉄】
# display as 雙鐵
# JP: 「大きさなどは関係無い。\n大好きな凪のおっぱいだから、可愛がりたいのだ――ん」
1407 = "「Kích thước không quan trọng.\nVì đây là\nngực của Nagi mà anh yêu nhất, nên anh\nmuốn yêu chiều nó——ưm」"

# monologue
# JP: （ちゅっ――もミュッ――チュルっ――はむっ）
1807 = "（Chụt——nắn——mút——ngoạm）"

# 【凪】
# display as 凪
# JP: 「ひゃうんっ！」
1177 = "「Hyaun!」"

# monologue
# JP: 歯を唇でカバーして、その唇で乳首を噛めば、\n凪はなんとも、甘酸っぱいような声を出す。
1650 = "Tôi bọc răng lại bằng môi, dùng đôi môi ấy\ncắn nhẹ nhũ hoa em,\nNagi cất lên tiếng rên\nrỉ ngọt ngào xen lẫn chua xót."

# 【凪】
