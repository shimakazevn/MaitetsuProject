# JP: 凪の手が、僕の勃起にゆるく触れ、\n指先で亀頭の形をなぞり始める。
1548 = "Tay Nagi nhẹ nhàng chạm vào sự cương cứng\ncủa tôi,\nđầu ngón tay bắt đầu miết dọc\ntheo hình dáng của quy đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ん――ぷあっ――凪」
1217 = "「Ưm——pua——Nagi」"

# 【凪】
# display as 凪
# JP: 「どぎゃーんしたと？　にーさん」
1347 = "「Sao vậy? Anh Soutetsu」"

# monologue
# JP: 凪は指の動きをとめない。\nそれだけで射精しそうなところを、ぐっと堪える。
1520 = "Nagi vẫn không dừng chuyển động của ngón\ntay.\nChỉ vậy thôi cũng đủ khiến tôi muốn\nxuất tinh, nhưng tôi cố nhịn."

# 【双鉄】
# display as 雙鐵
# JP: 「そろそろ僕も、気持ちよくなりたいと思ってな」
1349 = "「Anh cũng muốn được sung sướng rồi.」"

# 【凪】
# display as 凪
# JP: 「気持ちよくって――ふふっ、こぎゃんふーにと？」
1391 = "「Sung sướng sao——fufu, như thế này hả?」"

# monologue
# JP: （しゅこんっ！！！！）
1855 = "（Tuột!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！！？」
1281 = "「Cái!!?」"

# monologue
# JP: （びゅっ！　びゅくっ！　びゅぶっ！　びゅつっ！！）
1811 = "（Phụt! Phụt! Phụt! Phụt!!）"

# 【凪】
# display as 凪
# JP: 「ひゃうっ！？　ぴゃっ！？　でちゃったとばい！！？」
1178 = "「Hyau!? Pya!? Bắn ra rồi sao!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――うっ――」
1231 = "「Hự——ư——」"

# monologue
# JP: 暴発だ。情けない。恥ずかしい。が、\n射精てしまったなら、射精ているものを活かすよう――
1649 = "Bắn ra mất rồi. Thật thảm hại. Thật xấu\nhổ. Nhưng,\nđã lỡ xuất tinh rồi thì phải\ntận dụng thứ tinh dịch này——"

# monologue
# JP: （びゅっ！　びゅるっ！　ぶびゅっ！　びゅるっ！）
1812 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【凪】
# display as 凪
# JP: 「ひゃっ！？　んっ――お顔――狙っちゃっ――\nいや――わっ！？　口に入ったばい！！！」
1192 = "「Hya!? Ưm——mặt em——bị nhắm trúng——\nkhông——wa!? Vào miệng em rồi!!!」"

# monologue
# JP: ――自ら握って狙いをつけて、そうかと気づく。\n僕の勃起は、慣れぬ手袋の感触に、驚き暴発したのかと。
1664 = "——Tự mình nắm lấy và nhắm bắn, tôi mới\nnhận ra.\nSự cương cứng của tôi, có lẽ vì\nbất ngờ trước cảm giác lạ lẫm của chiếc\ngăng tay, nên mới bùng nổ."

# monologue
# JP: （びゅっ――ぶびゅっ――びゅっ――びゅううっ……）
1809 = "（Phụt——phụt——phụt——phụt……）"

# 【凪】
# display as 凪
# JP: 「ぁうっ――ううう～……ふわ……ぁ…………（ごくっ）\n体中、にーさんの精液でどろっどろばい」
1264 = "「Au——uuu~……fuwa……a…………（Ực）\nKhắp người em,\ndính đầy tinh dịch nhớp nháp của anh rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
1150 = "「Nagi」"

# 【凪】
# display as 凪
# JP: 「ひゃわわっ！？」
1176 = "「Hyawawa!?」"

# monologue
# JP: 凪の体を持ち上げ、尻を向けさせる。\nいまだびくつく勃起で軽く、われめを擦る。
1666 = "Tôi nhấc bổng cơ thể Nagi lên, bắt em xoay\nmông lại.\nDùng dương vật vẫn đang giật\ngiật cọ nhẹ vào khe hở."

# 【凪】
# display as 凪
# JP: 「ふあっ」
1202 = "「Fua」"

# 【双鉄】
# display as 雙鐵
# JP: 「今日の凪は虎なのだろう？\nならば、交尾に似合う格好を。と思ってな」
1130 = "「Hôm nay Nagi là hổ mà đúng không?\nVậy\nthì, phải có tư thế giao phối cho phù hợp\nchứ. Anh nghĩ vậy đấy.」"

# 【凪】
# display as 凪
# JP: 「は……う……交尾――\nにーさんと……交尾……虎さんで、交尾……」
1251 = "「Ha……u……giao phối——\nvới anh Soutetsu……giao\nphối……dưới hình hài hổ, giao phối……」"

# monologue
# JP: 早く挿入してほしいのか、\n凪はぐいぐい、僕へ股間を押し付け押し付け蠢いてくる。
1524 = "Có lẽ vì muốn tôi nhanh chóng cắm vào,\nNagi cứ liên tục ép sát đũng quần vào tôi,\ncọ xát không ngừng."

# 【双鉄】
# display as 雙鐵
# JP: 「凪？　せっかくだ。\n虎らしく、交尾のおねだりをしてみてはくれんか？」
1161 = "「Nagi? Hiếm có dịp mà.\nEm thử nũng nịu đòi\ngiao phối giống như hổ xem nào?」"

# 【凪】
# display as 凪
# JP: 「虎らしく……虎らしくばい？」
1335 = "「Giống như hổ……giống như hổ sao?」"

# monologue
# JP: 凪は大きく首を傾げて、うーんと小さな唸りをあげ――！\nそうして尻を、ゆっくりゆっくり振り始める。
1533 = "Nagi nghiêng đầu thật sâu, khẽ gầm gừ một\ntiếng——!\nSau đó, em bắt đầu lắc mông thật\nchậm, thật chậm."

# 【凪】
# display as 凪
# JP: 「がおー、にーさん。\n[とらなぎ,1]虎凪さまの、おしっぽ持ち上げて欲しかとばい――がお」
1305 = "「Gao~, anh Soutetsu.\nHổ Nagi muốn anh,\nnhấc đuôi lên cho em——gao」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1295 = "「嗯」" 

# monologue
# JP: 言われるままに尻尾を掴んで持ち上げれば――む。\n針金入りか。これは理屈にかなっている。
1646 = "Tôi làm theo lời em, nắm lấy chiếc đuôi\nnhấc lên——hừm.\nBên trong có dây thép sao.\nThiết kế này cũng hợp lý đấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど、見晴らしがよくなった」
886 = "「……Ra vậy, tầm nhìn quang đãng hơn hẳn\nrồi.」"

# 【凪】
# display as 凪
# JP: 「な、なにがみえるようになったばい――がお？」
1384 = "「Anh, anh nhìn thấy gì rồi——gao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論――かわいいアナルが見える」
1377 = "「Đương nhiên là——nhìn thấy lỗ hậu đáng yêu\nrồi.」"

# monologue
# JP: （つんっ！）
1820 = "（Chọc!）"

# 【凪】
# display as 凪
# JP: 「ひゃうっ！？　ふぁっ――あっ――きもち、よか、けど、\nん――いま見てほしいのは――もっと下――がお」
1190 = "「Hyau!? Fua——a——sướng, lắm, nhưng mà,\nưm——bây giờ em muốn anh nhìn——xuống dưới\ncơ——gao」"

# 【双鉄】
# display as 雙鐵
# JP: 「もっと下――ああ、ここか」
1365 = "「Xuống dưới nữa à——À, đây sao.」"

# monologue
# JP: （くいっ――パチンっ！）
1824 = "（Kéo——Tách!）"

# 【凪】
# display as 凪
# JP: 「ひえっ！？」
1214 = "「Hie!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ガーターベルトとストッキング――であっているか？\nよく似合っていて、魅力的だ」
1406 = "「Dây nịt tất và tất da đùi——có đúng không?\nRất hợp với em, trông quyến rũ lắm.」"

# 【凪】
# display as 凪
# JP: 「褒められるのは嬉しかばってん、焦らしちゃいやがお～\nそこよりはもっと上、おまたの付け根のところがお」
1398 = "「Được khen thì vui lắm nhưng đừng trêu em\nnữa gao~\nCao hơn chỗ đó một chút, ở phần\ngốc đùi ấy gao」"

# 【双鉄】
# display as 雙鐵
# JP: 「おまたのつけね――ここかな？」
1389 = "「Phần gốc đùi——chỗ này sao?」"

# monologue
# JP: （くぱあっ）
1840 = "（Mở rộng）"

# 【凪】
# display as 凪
# JP: 「ひゃんっ！！」
1182 = "「Hyan!!」"

# monologue
# JP: 指で開けば、愛液が溢れ出してくる。\n体臭の薄い凪からむわり、雌の匂いが漂ってくる。
1624 = "Vừa dùng ngón tay vạch ra, ái dịch đã tuôn\ntrào.\nTừ cơ thể vốn ít mùi của Nagi tỏa ra\nmột mùi hương đặc trưng của con cái."

# 【双鉄】
# display as 雙鐵
# JP: 「外見は綺麗な一本スジも、内側はすっかり女だな。\nびらびらも、初めて見たときより大きくなって」
1343 = "「Bề ngoài là một đường rãnh tuyệt đẹp,\nnhưng bên trong đã hoàn toàn là phụ nữ\nrồi.\nHai mép thịt cũng lớn hơn so với lần\nđầu tiên anh nhìn thấy.」"

# 【凪】
# display as 凪
# JP: 「そぎゃん実況恥ずかしかとばい！！！\n見るより、しゃべるより、もっと――もっとぉ」
1124 = "「Tường thuật trực tiếp như vậy xấu hổ\nlắm!!!\nĐừng nhìn nữa, đừng nói nữa,\nhãy——nữa đi」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1266 = "「!」"

# monologue
# JP: 意図的になのか偶然か、\n凪の小さな膣口が、深呼吸でもしたかのように大きく動く。
1467 = "Không biết là cố ý hay vô tình,\ncửa âm đạo\nnhỏ nhắn của Nagi chuyển động mạnh như thể\nđang hít thở sâu."

# 【凪】
# display as 凪
# JP: 「に、にーさん、いま開いてるとこ――おまんこの中……\nお尻の穴に一番ちかかところに――ええと……ええと」
1320 = "「A, anh Soutetsu, chỗ vừa mở ra ấy——bên\ntrong cô bé……\nchỗ gần lỗ hậu nhất\nấy——ưm……ưm」"

# monologue
# JP: 凪が言葉に悩んでいる。可愛らしいが、じれったい。\n僕の我慢も限界ゆえに――
1529 = "Nagi đang bối rối tìm từ ngữ. Rất đáng\nyêu, nhưng cũng thật sốt ruột.\nSự chịu\nđựng của tôi cũng đã đến giới hạn rồi——"

# 【双鉄】
# display as 雙鐵
# JP: 「おまんこの中でお尻の穴に一番近い……\nつまりは――ここか」
1394 = "「Bên trong cô bé, chỗ gần lỗ hậu nhất……\nTức là——chỗ này à.」"

# monologue
# JP: （くちっ）
1817 = "（Nhóp nhép）"

# 【凪】
# display as 凪
# JP: 「んひゅんっ！！！」
1299 = "「Nhyun!!!」"

# monologue
# JP: 亀頭を押し当てほんの僅かにめり込ませれば、\n凪は素直な喜びの声を聞かせてくれる。
1632 = "Tôi ép quy đầu vào và ấn nhẹ vào một chút,\nNagi lập tức cất lên tiếng rên rỉ sung\nsướng đầy chân thật."

# 【凪】
# display as 凪
# JP: 「そこばい！　そこが膣口ばい！！　で、にーさんが\nいまあててるの、勃起ちんちんを膣口に入れて、それで」
1341 = "「Chỗ đó đấy! Chỗ đó là cửa âm đạo đấy!!\nRồi, anh hãy\ncho cậu nhỏ đang cương cứng\nmà anh vừa áp vào đó vào cửa âm đạo đi,\nrồi」"

# monologue
# JP: （ずぶううううううううっ！！！！！！！）
1834 = "（Phập!!!!!!!）"

# 【凪】
# display as 凪
# JP: 「ひゃうぅうっ！？　ふぁっ――あっ――」
1188 = "「Hyauuu!? Fua——a——」"

# 【双鉄】
# display as 雙鐵
# JP: 「勃起ちんちんを膣口にいれる――っ、くっ――\nこれで――あっている、かな？」
1339 = "「Cho cậu nhỏ đang cương cứng vào cửa âm\nđạo——hự——\nThế này——đã đúng, chưa?」"

# monologue
# JP: 余裕をもってとぼけたいのだが、凪の膣内が凄すぎる。\n驚いたせいか、潰さんばかりにぎゅうぎゅうしてくる。
1674 = "Tôi muốn tỏ ra thong dong mà trêu chọc em,\nnhưng bên trong âm đạo của Nagi thật quá\ntuyệt vời.\nCó lẽ vì bất ngờ, nó siết chặt\nlấy tôi như muốn nghiền nát."

# 【凪】
# display as 凪
# JP: 「か――はっ――あ――あっとる、ばい――がお。\nそれで、腰を、最初は、ゆっくり、動かし、て――」
1245 = "「Ha——ha——a——đúng rồi, đó——gao.\nRồi sau đó,\nban đầu, hãy từ từ, chuyển động, hông——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1295 = "「嗯」" 

# monologue
# JP: （ずっ――くっ――にゅっ――くぶっ――ぬっ――）
1821 = "（Phập——hự——nhóp nhép——hự——phập——）"

# monologue
# JP: ……窮屈すぎて、締め付けがあまりに強すぎて、\n頼まれずとも、ゆっくり小さくしか動けない。
874 = "……Quá chật chội, sự siết chặt quá mạnh mẽ,\ndù em không yêu cầu, tôi cũng chỉ có thể\ndi chuyển từ từ, từng chút một."

# 【凪】
# display as 凪
# JP: 「そ、それだけじゃなく――おっぱい――んっ――\nおっぱい、やさしく――もみもみ、とか、して――」
1164 = "「Kh, không chỉ vậy đâu——ngực——ưm——\nhãy nhẹ\nnhàng——nắn bóp ngực, nữa đi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっぱいか」
1383 = "「Ngực sao.」"

# monologue
# JP: もみもみするほどのボリュームは、\n下向きになってもやはり感じられない。ゆえ――
1570 = "Kích cỡ để có thể nắn bóp,\ndù em đang nằm\nsấp thì tôi vẫn không cảm nhận được. Thế\nnên——"

# monologue
# JP: （さわっ――さすっ――くりゅ――ふにっ――）
1839 = "（Chạm nhẹ——vuốt nhẹ——ngoáy——nắn——）"

# 【凪】
# display as 凪
# JP: 「ふあっ――あっ！　あ！　あ！　あっ――\nんっ――ふやっ――きもち、よか――んっ――ふっ」
1199 = "「Fua——a! A! A! A——\nƯm——fuya——sướng,\nquá——ưm——fu」"

# monologue
# JP: 手のひらでやわやわさすって押し込んで、指を使って\nやさしくやさしく乳首をつまんでこすって押しつぶ――！
1654 = "Tôi dùng lòng bàn tay vuốt ve mềm mại rồi\nấn vào, dùng ngón tay\nnhẹ nhàng, thật nhẹ\nnhàng nhúm lấy nhũ hoa, cọ xát rồi bóp\nnát——!"

# monologue
# JP: （ずにゅっ――ぐいっ――ずりゅうう――ぐちゅっ！）
1836 = "（Phập——hự——phập——nhóp nhép!）"

# 【凪】
# display as 凪
# JP: 「ふぁ――そう、おちんちん、で――おまんこ、もっと\n――じゅぶじゅぶって――して――んっ――は、あっ」
1254 = "「Fua——đúng rồi, dùng cậu nhỏ——làm cô bé,\nmạnh hơn nữa\n——phập phập——đi——ưm——ha, a」"

# monologue
# JP: 驚きが弱まったせいか、乳首愛撫が効いたのか、\n敵対的な締めがゆるんで、中がじゅるんとうるおい始める。
1465 = "Có lẽ do sự bất ngờ đã giảm bớt, hoặc do\nmàn vuốt ve nhũ hoa phát huy tác dụng,\nsự\nsiết chặt chống cự đã nới lỏng, bên trong\nbắt đầu ướt át trơn tru."

# monologue
# JP: （じゅぶっ――ぐりゅっ！　ジュヌウッ――くしゅっ！）
1818 = "（Phập——phập! Phập——phập!）"

# monologue
# JP: けれども、一気には動かない。\n凪のかわいいおねだりを、もっと、もっと聞きたくて――
1476 = "Thế nhưng, tôi không di chuyển mạnh ngay\nlập tức.\nVì tôi muốn nghe thêm, nghe thêm\nnữa những lời nũng nịu đáng yêu của Nagi——"

# 【凪】
# display as 凪
# JP: 「そしたら――そしたら――ふあっ――あ――（ごくっ）\nにーさんも、虎さんに――ケダモノになって、そうして」
1357 = "「Vậy thì——vậy thì——fua——a——（Ực）\nAnh\nSoutetsu cũng, hãy biến thành hổ——biến\nthành dã thú, rồi làm đi」"

# monologue
# JP: （きゅんっ！）
1845 = "（Siết!）"

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1266 = "「啊！」" 

# monologue
# JP: 膣がきゅうっとすぼまり、蠢く。\n精液を絞る動きが、腰から下の全部をぞわぞわ敏感にする。
1721 = "Âm đạo siết chặt lại, co bóp liên hồi.\nChuyển động vắt kiệt tinh dịch ấy khiến\ntoàn bộ phần thân dưới của tôi trở nên\nnhạy cảm râm ran."

# 【凪】
# display as 凪
# JP: 「一番、奥に――赤ちゃんばつくるお部屋に、おちんちん、\nごんごん――たくさんたくさん、うちつけて――それで」
1351 = "「Tận cùng, bên trong——căn phòng tạo ra em\nbé, hãy đâm cậu nhỏ,\nthình thịch——thật\nnhiều, thật nhiều vào——rồi sau đó」"

# 【双鉄】
# display as 雙鐵
