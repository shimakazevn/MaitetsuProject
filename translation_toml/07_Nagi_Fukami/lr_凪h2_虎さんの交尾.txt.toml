1481 = "儘管現在活動的感覺只和先前差了一點點，但活動腰部的快感卻增強了幾百倍。" 

# 【凪】
# display as 凪
# JP: 「ふぁぁぁぁぁぁぁんっ！！！！」
1278 = "「啊！！！！」" 

# monologue
# JP: 凪の声にもあきらかに、潤いと甘さが増している。\nこの快感を共有できてる――おもえば腰は加速する。
1551 = "凪的聲音顯然帶上了幾分濕潤與甜蜜。我們正在共享快感。想到這裡我就開始加速抽插。" 

# monologue
# JP: （ずぶっ！　ばちゅっ！　ずりゅっ！　ごちゅっ！）
# 1800 = "（出！入！出！入！）" 

# 【凪】
# display as 凪
# JP: 「ふあっ！　あっ！　あっ！　あっ！　そこっ！\nもっと！　赤ちゃんそだてるとこ、もっと――んうっ！」
1271 = "「啊！啊！啊！啊！那裡！用力！養小孩的地方，用力！嗯！」" 

# monologue
# JP: （ばちゅ！　ごちゅっ！　ぶちゅっ！　くりゅっ！）
1814 = "（啾！啾！啾！啾！）" 

# monologue
# JP: 最奥が吸い付き、蠕動は反発し、相乗で絞り取りに来る。\n腰の前後がただ単純に、どうしようもなく気持ちいい。
1692 = "最深處吸吮著，陰道再次蠕動，兩股動作一起開始壓榨我。我的抽插開始變得越來越舒服。" 

# monologue
# JP: （じゅぶっ！　ずちゅっ！！　じゅりゅ！　ごちゅっ！）
# 1814 = "（啾！啾！啾！啾！）" 

# 【凪】
# display as 凪
# JP: 「あっ！　あっ！　ふあっ！　あっ！　きもち、よかっ！\n奥ばっ！　ノックっ――ノック、されるとっ――あっ！」
1269 = "「啊！啊！啊！啊！舒服！裡面被敲打著……啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1221 = "「唔！！」" 

# monologue
# JP: 勃起だけでしか繋がれてないのに僕の全部が包まれている。\n最奥へと挿入することで、凪の全部を抱きしめている。
1668 = "我被包裹住的明明只有勃起，但感覺好像全身都被包裹住了。而插入最深處的我，也由內而外、由外而內地擁抱著凪。" 

# monologue
# JP: （ずぶっ！　じゅばっ！　ごちゅっ！　じゅぶっ！！）
# 1814 = "（啾！啾！啾！啾！）" 

# 【凪】
# display as 凪
# JP: 「あたまっ！　チカって！　しろくっ！　ひかって――\nあ――にーさん！　にーさん！　にーさん！　にーさん」
1387 = "「腦袋過電了！一片空白！還會閃光……啊，大哥哥！大哥哥！大哥哥！大哥哥」" 

# monologue
# JP: その幸せが膨れ上がって、体液全部を押し出そうとする。\n精液も汗も涙も全部、堪えなければ垂れ流しになる。
1593 = "幸福的感覺越來越強烈，幾乎要榨出我所有的體液。要不是我拚命忍耐，怕不是精液、汗水與眼淚都會奔流而出。" 

# 【凪】
# display as 凪
# JP: 「うちの、おまんこ――赤ちゃんの、とこ――全部、\n全部が――にーさん――にーさん、ほしがってる。けん」
1198 = "「咱的下面……造小寶寶的地方，整個……整個都在索求著大哥哥，大哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁ――」
# 1295 = "「嗯」" 

# monologue
# JP: （ばつっ！　ばんっ！　じゅぶっ！　ばつっ！）
1813 = "（啪！啪！啪！啪！）" 

# monologue
# JP: 声さえ、息さえ出せば緩んでしまいそうで。\nけれども凪と一緒がよくて、必死担って引き絞る。
1636 = "我感覺如果出了氣、出了聲，就會不小心漏出來。但我想和凪一起，所以拚死忍耐住。" 

# 【凪】
# display as 凪
# JP: 「おちんちん――精子――ぜんぶっ！　にーさんの、\n精子、精液――んくっ――ふあっ――全部――全部ぅ」
1420 = "「雞雞……精液……都給咱！大哥哥的……精子，精液……嗚，啊……都給咱，都給咱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
1219 = "「唔！」" 

# monologue
# JP: （ずりゅうううううううううううっっっっっっ！！！）
1822 = "（抽！！！）" 

# 【凪】
# display as 凪
# JP: 「うちのおまんこっ――うちの――子宮に――あっ！\n精子ば――全部っ！　びゅうびゅうって、してぇ！」
1337 = "「射進咱的下面……射進……咱的子宮……啊！精液……都給咱！都射出來吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっっ！！！！！！！」
1333 = "「好！！！！！」" 

# monologue
# JP: （じゅぶううっっっっっっっっ！！――ごりゅんっ！！）
1831 = "（插！！轉！！）" 

# 【凪】
# display as 凪
# JP: 「ひゃぐっ！？　っ――ひゅぁぁぁぁぁぁぁあああん！」
1185 = "「呀？！呀！」" 

# monologue
# JP: （きゅゅううううううううっっっっっっっっっ！！！）
1844 = "（緊！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁくっ！！！」
1277 = "「啊！！！」" 

# monologue
# JP: （びゅる！　びゅぶぶっ！　どびゅっ！　びゅるうっ！）
# 1812 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「ふあっ！　あっ！　あっ！　あっ！\nあっ！　あっ！　あっ！　あっ！」
1267 = "「啊！啊！啊！啊！啊！啊！啊！啊！」" 

# monologue
# JP: （びゅるっ！　びゅうっ！　ぼびゅっ！　ぶびゅっ！）
# 1812 = "（咻！咻！咻！咻！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あ――凪――凪っ！」
1233 = "「啊……啊……凪，凪！」" 

# monologue
# JP: 暴発してしまったものよりもよほど濃厚な精液を、\n凪の子宮に――赤ちゃんをつくるところに注ぎこんでる。
1631 = "我將比剛才射出來的更濃郁的精液，注入了凪的子宮——注入了她造小寶寶的房間。" 

# 【凪】
# display as 凪
# JP: 「ふぁっ――あっ――うれしかっ――あつか――[ぬく]温かぁ\n――んっ――たくさん――精液――にいさん、のっ――」
1243 = "「啊……啊……好開心，好暖……溫溫的……嗯……好多精液……都是大哥哥的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ」
# 1259 = "「啊」" 

# monologue
# JP: （びゅっ！　びゅるっ！　びゅう！　びゅぶっ！！）
# 1812 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「ぁあんっ！」
# 1266 = "「啊！」" 

# monologue
# JP: （きゅううううううっっ！）
# 1845 = "（緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
# 1266 = "「啊！」" 

# monologue
# JP: （びゅっ――――びゅるっ………………ぴ…………。）
1810 = "（咻……咻……咻……）" 

# monologue
# JP: 全てを射精た、と思った瞬間ひと絞りされ、\n睾丸全部が痛むくらいに空っぽになる。
1623 = "我剛以為自己射完的一瞬又被壓榨了一回，睪丸裡面現在空空如也，幾乎讓我感到疼痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあ――ぁっ――」
1232 = "「啊……啊……」" 

# monologue
# JP: （どさっ）
1798 = "（倒）" 

# 【凪】
# display as 凪
# JP: 「んへへ――にぃさぁん――ちゅっ！　ちゅむっ――\nれろっ――れるううっ――にゅちゅっ――ちゅうっ！」
1308 = "「嘿嘿嘿……大哥哥，親一個！啾……啾，啾，啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ん」
1216 = "「唔……唔」" 

# monologue
# JP: 疲労のあまり崩れれば、凪も崩れつつ僕を抱きしめ、\nもつれあうようなキスになる。
1700 = "疲憊之中，我身子一軟就倒了，凪也倒下身來抱住我，和我擁吻。" 

# 【凪】
# display as 凪
# JP: 「ちゅうっ――ちゅむっ――れるっ――れろおっ――\nじゅ――ずじゅうううっ――（こくっ）――ぷあっ」
1285 = "「啾……啾，啾，啾……啾，啾……（咕咚）啊……」" 

# monologue
# JP: キスをほどけば、凪は鼻先をこすりつけてくる。\nそれだけでなく、ほっぺも、おでこも、顔の全部を。
1617 = "我們鬆開口之後，凪就將鼻子頂了上來。不僅如此，她還將臉頰、額頭，把整個臉都湊了上來。" 

# 【凪】
# display as 凪
# JP: 「えへへ、にーさん」
1314 = "「嘿嘿嘿，大哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、凪？」
1346 = "「怎麼了，凪？」" 

# 【凪】
# display as 凪
# JP: 「大好きばいっ♪」
1348 = "「愛你♪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1266 = "「啊！」" 

# monologue
# JP: 縞が無い方が正解だった。凪は子猫だ。\n牙と爪とを有していてなお、どこまでだってかわいい子猫。
1719 = "衣服上沒花紋才對。凪是一隻小貓。雖然有牙有爪，但她依然是一隻可愛的小貓。" 

# 【凪】
# display as 凪
# JP: 「わ、わわっ！？　えっ！？　ふわっ！？　おちんちん、\nなんでにーさん、あぎゃんとすごいセックスして、また」
1200 = "「哇、哇哇？！哎？！哇？！雞雞……為什麼大哥哥做得那麼猛，現在又……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1295 = "「嗯」" 

# monologue
# JP: そうと理解した瞬間に、今度は僕が、虎になる。
1600 = "想到這裡，我頓時化身老虎。" 

# 【凪】
# display as 凪
# JP: 「きゃあ♪」
1175 = "「呀♪」" 
