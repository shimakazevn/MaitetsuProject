1521 = "Chiếc lưỡi ngắn đỏ chót của Nagi liếm ướt\nđôi môi mình."

# 【凪】
# display as 凪
# JP: 「お口とか、おっぱいとか、おまんこにしてもらう方が、\nずーっっとずーっと気持ちよかとよ」
1169 = "「Hôn vào miệng, vào ngực, hay vào cô bé,\nchắc chắn sẽ sướng hơn nhiềềều lắm đó.」"

# 【双鉄】
# display as 雙鐵
