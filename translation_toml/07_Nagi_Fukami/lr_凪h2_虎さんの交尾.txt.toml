1125 = "「Không hề. Nói đúng hơn thì anh không\nthích vị của tinh dịch.\nDù chỉ là gián\ntiếp nhưng anh vẫn nhận ra vị đắng và cảm\ngiác ngứa cổ họng.」"

# 【凪】
# display as 凪
# JP: 「そぎゃんとよね！　やったら、なんで？」
1362 = "「Đúng vậy nhỉ! Thế thì, tại sao?」"

