1614 = "Khi tôi đáp lại nụ hôn như em mong muốn,\nNagi liên tục đáp trả bằng những nụ hôn\nngọt ngào, nhẹ nhàng như chú chim nhỏ mổ\nmồi."

# 【凪】
# display as 凪
