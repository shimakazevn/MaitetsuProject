1799 = "她們倆很快回應了我。……凪的反應速度更快，但是深美顯然更理解我的意思。" 

# monologue
# JP: 返事と同時に、ふかみは大きく口を開いて、\n僕の勃起を待ち望んでみせてくれる。
2017 = "話畢，深美就張開口，做出渴求的模樣。" 

# monologue
# JP: （ずろおおおおおおおおおおっ！）
2182 = "（舔！）" 

# 【ふかみ】
# display as 深美
# JP: 「んむっ！！？」
1380 = "「嗯！！？」" 

# 【凪】
# display as 凪
# JP: 「あっ！？　そぎゃんこつばいっ！？」
1356 = "「啊！？是這樣的嗎！？」" 

# monologue
# JP: すぐさま凪も、ひな鳥みたいに大きく口を開いてくれる。
1723 = "凪也立刻把嘴張得像隻雛鳥一樣大。" 

# 【ふかみ】
# display as 深美
# JP: 「んっ――ふっ――んちゅっ――ちゅうっ――ふっ――\nん、ふっ――ほーへふっ――ふぁ、んっ――」
1328 = "「哼……呼……啾……啾……呼……嗯，呼……是的……哈，哼……」" 

# monologue
# JP: （ずりゅっ――ずっ――ちゅぶっ――ずちゅっ）
2157 = "（摩擦……摩擦……啾……啾）" 

# 【ふかみ】
# display as 深美
# JP: 「えうっ――んっ――ちゅ……ちゅずっ――じゅるっ――\nんう……れろ――れるっ――ちゅうっ――ずじゅっ」
1374 = "「嗯……嗯……啾……啾……啾……嗯……啾……啾……啾……啾」" 

# monologue
# JP: けれども、すぐには突っ込めない。\nふかみの工夫を、凪にも学んでもらわなくては。
1673 = "但我沒辦法立刻插進去。我得讓凪好好學習深美的技術。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「凪。ふかみの口元をよぉく見るんだ」
1256 = "「凪，你仔細看看深美的嘴」" 

# 【凪】
# display as 凪
# JP: 「ふひほほ？」
# 1240 = "「什麼？」" 

# monologue
# JP: 律儀にも口を開いたままで、凪は横目でふかみを眺める。
1733 = "凪張著嘴，從側面看著深美。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみの唇は、僕の勃起を痛めないよう、\n歯をカバーしてくれている。それから、舌も――」
1471 = "「深美的嘴唇擋住了牙齒，儘量不傷到我的勃起。而且她的舌頭也……」" 

# 【凪】
# display as 凪
# JP: 「はふぁっふぁ！　ほーはひっ！！」
1455 = "「明白了！沒問題！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「上出来だっ」
1439 = "「很好」" 

# monologue
# JP: （にゅろおおおおん――ずぽおっ！！）
2170 = "（滋溜！！）" 

# 【凪】
# display as 凪
# JP: 「んぶううっ！？　む～っ！　む～っ！！」
1382 = "「嗯！？唔！唔！！」" 

# monologue
# JP: ふかみと同じ感覚で差し込んでみたのだが、\n凪にはそれでは深すぎらしい。
1862 = "我照著跟深美做的感覺插進了凪的嘴裡，但卻比深美插起來要深很多。" 

# monologue
# JP: 喉を勢いで突いてしまって、\n凪の目元に苦しげな涙がこみ上げてくる。
1804 = "她猛地讓我那傢伙沉到喉嚨裡，眼角滲出了痛苦的淚水。" 

# 【凪】
# display as 凪
# JP: 「むうううっ～　むーーーっ」
1331 = "「唔……唔」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ……ぉ」
# 1333 = "「啊……」" 

# monologue
# JP: ゼヒゼヒとあえぐ喉の動きが震える舌が、\n気持ちよすぎて、声が勝手に溢れてしまう。
1741 = "凪的喉嚨跟舌頭顫抖著喘氣，我十分舒服，不禁叫出了聲來。" 

# monologue
# JP: しかし、今すぐ抜かねばならない。\n凪に苦しい思いをさせて得る快感など――
1676 = "但我現在必須拔出來。怎麼能讓自己的快感建立在凪的痛苦之上呢？" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　喉っ。\nあの、双鉄さん――わたし、チャレンジ」
1352 = "「啊！喉嚨。那個，雙鐵先生……我想試試」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1290 = "「呃！」" 

# monologue
# JP: （ぬろおおおおおおおっ！）
2174 = "（硬！）" 

# monologue
# JP: さすが、ふかみは名船頭だ。
1953 = "深美真是個出色的掌棹。" 

# monologue
# JP: 渡りに舟のその一言に、\n僕の体は、浅ましいほどの反射を示す。
1989 = "聽她順水推舟的這麼一句話，我的身體不爭氣地有了反應。" 

# monologue
# JP: （ずぬうううううううううっ！）
2155 = "（插！）" 

# 【ふかみ】
# display as 深美
# JP: 「んぐっ！？　――む。ぷ。んっ――んにゅっ――\nん～～～っく――んぐう――――――――（ぐうっ）」
1381 = "「嗯！？……唔，噗，哼……嗯……嗯……嗯……………………（唔）」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1291 = "「呃！！？」" 

# monologue
# JP: 吸われる！　同時にふかみの喉に噛み付かれっ！！
1931 = "深美在吮吸！她的喉嚨也夾住了我那傢伙！！" 

# 【双鉄H】
# display as 雙鐵
# JP: （なんだ――なんだこれは――）
2145 = "（天啊……這可真是……）" 

# monologue
# JP: 動いてる。ふかみの喉が蠢いている。\n狭くなりまた広くなり、僕を奥へと飲み込むように――
1943 = "深美的喉嚨在蠕動。一下窄，一下寬，就像要將我吞進去一樣……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……そうか――呑んで――いる、の、か――」
1341 = "「啊……明白了……你是……在吞啊……」" 

# 【ふかみ】
# display as 深美
# JP: 「ん、ぐっ――ンッ――はっ――ぐっ――プッ――ん……\nえ、ぐっ――ぐっ――んんっ――んううう～～っ」
1373 = "「嗯……嗯……啊……嗯……噗……嗯……嗯……嗯……嗯哼……嗯」" 

# monologue
# JP: （くぽっ！　がぽっ！）
2135 = "（咕咚！咕咚！）" 

# monologue
# JP: 食道なのか声帯なのか、喉奥をふかみは締め開きして、\n同時に奥へと飲み込む動きで僕の精液を絞ろうとする。
1937 = "深美用喉嚨一開一合，不知那是食道還是聲帶，將我越帶越深，想榨取我的精液。" 

# monologue
# JP: これは……これはもう抗いきれない。\nが――射精するなら、ふかみと、凪と、やはりふたりに！
2034 = "這……這我根本沒辦法抵抗到底。但是……要射，還是應該射給深美和凪兩個人！" 

# monologue
# JP: （ずるうううううううううううっ！！）
2149 = "（拔！！）" 

# 【ふかみ】
# display as 深美
# JP: 「んぎゅうううっ」
# 1378 = "「嗯」" 

# monologue
# JP: 苦しげに啼く喉とビクつく舌とが僕の引き金を引きっ！
1941 = "深美發出難受聲音的喉嚨和顫抖的舌頭點燃了火藥桶！" 

# monologue
# JP: （びゅっ！　びゅるうううっ！　びゅぶっ！　びゅっ！）
2132 = "（呲！呲！呲！呲！）" 

# 【凪】
# display as 凪
# JP: 「ふあっ――出たばいっ！　にーさん――せーえきっ！\nびゅっびゅって！　すごく！　すっごく熱いかとばい！」
1310 = "「哇……射了！　大哥哥的……精液！呲呲的！　好多！　好燙！」" 

# 【ふかみ】
# display as 深美
# JP: 「は……ぁっ……ふあっ――ん――それ――に……\n重くて……ねばっこくって……くさ、く、て――」
1295 = "「呼……啊……呼……嗯……而且……好重……黏糊糊的……味道好大……」" 

# monologue
# JP: 顔面に飛び散る精液を、ふかみは、凪は、\nそれぞれの指と舌とでこそげとり――
1929 = "深美和凪用手指和舌頭捧起射在臉上的精液……" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？　あーん」
1430 = "「小凪，啊」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんも、あ～ん、ばいっ！」
1433 = "「小深你也來，啊！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1319 = "「哇！」" 

# monologue
# JP: そしてお互いの指先を、\n僕の精液をたっぷりこそげた指先を。
1893 = "接著，她們開始互相舔舐沾滿了我精液的手指。" 

# monologue
# JP: ふかみは凪の、凪はふかみの、\nそれぞれの口内に差し込んで――
1955 = "深美舔凪的，凪舔深美的，她們將手指插入對方的嘴裡……" 

# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちょろっ――ちゅるっ――んっ」
1358 = "「啾……啾……啾……嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「れるっ――れろおっ――しゅぶっ――しゃぶぅっ」
1357 = "「啾……啾……啾……啾」" 

# 【凪】
# display as 凪
# JP: 「にーさんのせーえき……ん……ぷぁ――苦か、けん……\nふかみちゃんの、指……よけいに……ちゅっ――甘か」
1405 = "「大哥哥的精液……嗯……呼……好苦……小深的手指……特別……啾……甜」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんの指――んっ――おいひい――ひょぉ……ん、\nちゅっ――ちゅう――れろっ――れるうっ」
1428 = "「小凪的手指……嗯……真好吃……嗯，啾……啾……啾……啾」" 

# monologue
# JP: 可愛らしさと、やらしさと。\nその光景を、ずっと眺めていたくもある、が――
1979 = "眼前的這副景象又可愛又下流。好想永遠看著這樣的她們，不過……" 

# 【双鉄H】
# display as 雙鐵
# JP: （……僕一人だけ蚊帳の外なのは、いささか寂しい）
2060 = "（……把我一個人扔在一邊，感覺有些寂寞）" 

# monologue
# JP: お互いに夢中なふたりの背後に回りこみ、\n不意打ち愛撫でおしおきを――っ！？
1865 = "我繞到正沉浸在互舔的世界裡的她們背後，打算來個出其不意的愛撫……嗯！？" 

# monologue
# JP: （めくりっ）
2183 = "（轉身）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！！！」
1517 = "「！！！」" 

# 【凪】
# display as 凪
# JP: 「うふふ～ん～、にーさーん」
1390 = "「嘻嘻，大哥哥」" 

# 【ふかみ】
# display as 深美
# JP: 「なに、しようと。してる、です？」
1247 = "「你想做什麼？」" 

# monologue
# JP: 水着の股間がめくられる。
1801 = "她們拉開了泳裝的下面。" 

# monologue
# JP: ふかみのおまんこと凪のおまんこ――だけでなく、\nお尻の穴まで全部を鮮やかに見せつけられる。
1902 = "是深美的洞府跟凪的洞府……而且另一個洞我也能清楚地看見。" 

# 【ふかみ】
# display as 凪＆深美
# JP: %69;『「わかってるばーい。にーさん、いよいよお尻の穴ば試したかとよね？」\n「わかってます。です。ここなら、おしっこ――しても汚れない場所。です、から」』
1528 = "『「咱們都明白。大哥哥，你想試試屁眼了吧？」\\n「我懂。在這就算漏尿也不髒。來吧」』" 

# monologue
# JP: まったく異なる内容を、まったく同じタイミングで。
1798 = "她們倆同時說出了不一樣的話。" 

# monologue
# JP: ふたりはそれぞれ口にして、\nこれまた同時に、ギョっとした顔を見合わせる。
2016 = "話畢，她們又同時震驚地看了彼此一眼。" 

# 【凪】
# display as 深美＆凪
# JP: 『「お尻って！？」\n「おしっこばいっ！？」』
1534 = "『「屁眼！？」\\n「漏尿！？」』" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。それぞれとのデートの時に、\nそうした話題が、流れで出たのだ」
1383 = "「嗯，分別約會的時候，我們有聊到這些」" 

# 【凪】
# display as 凪
# JP: 「ふあっ？！　お尻いきなりばいっ！？」
1322 = "「哇？！怎麼突然對我屁股……」" 

# 【ふかみ】
# display as 深美
# JP: 「へっ！？　やっ――指っ！？　双鉄さんの――\n指……先っ――おしり――にっ！？」
1326 = "「哎！？呀……是手指！？是雙鐵先生的……指尖……在屁股……」" 

# monologue
# JP: 故に、僕も勉強をした。\nおしっこについても、アナルについても。
1789 = "因此我也學習了一番。現在我已經習得了關於漏尿和肛交的知識。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「指三本。それがスムーズに入るのならば、\nアナルセックスは概ね可能となるものらしい」
1416 = "「好像只要能輕鬆塞進三根手指，就可以實現肛交」" 

# 【凪】
# display as 凪
# JP: 「に、にーさんの指で三本ばいっ！？」
1487 = "「要、要塞進三根大哥哥的手指！？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……アナ――アナル、セック、ス――って――\n凪、ちゃんって――意外、と」
1342 = "「啊……肛、肛交……小凪……沒想到你……」" 

# monologue
# JP: （きゅううっ）
2179 = "（緊）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む！」
# 1290 = "「呃！」" 

# monologue
# JP: どこでスイッチが入ったのか、\nふかみの尻が唐突に、僕の指先を噛み砕きに来る。
1668 = "不知是刺激到了哪裡，深美的屁股忽然緊緊箍住了我的手指。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぬっ――むっ――」
1288 = "「呃……唔……」" 

# monologue
# JP: それを少しでもほぐすべく、指先を小さく動かしてみる。
1845 = "我想儘量讓她放鬆，於是稍稍動了動指尖。" 

# monologue
# JP: （にゅるっ――ゆるんっ）
2184 = "（轉）" 

# 【凪】
# display as 凪
# JP: 「ひゃっ！？　あっ――にーさんの、指……あっ、\nお尻の――なか、で――まわってる――ばいっ」
1280 = "「呀！？啊……大哥哥的手指……啊，在……屁眼裡面……打轉」" 

# 【ふかみ】
# display as 深美
# JP: 「いっ――んっ――ふうっ――あっ――こ、これ――\n入り口の――とこ――は、あっ――熱――く、てっ」
1271 = "「呀……嗯……呼……啊……這、這個……入口處……呼……好燙」" 

# monologue
# JP: （キチチチチっ）
2165 = "（擠壓擠壓）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1290 = "「呃！」" 

# monologue
# JP: （きゅぽんっ！　ぽんっ！）
2140 = "（啾！啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！」
1273 = "「呀！」" 

# 【凪】
# display as 凪
# JP: 「あ――抜けちゃったばい」
1340 = "「啊……拔出去了」" 

# monologue
# JP: 間違いなく、凪は自主的に修行をしていてくれたのだろう。\n指一本はらくらくだったし、抜いた今でもやわらいでいる。
1753 = "凪顯然自己練過。放一根進去很容易，拔出來以後也沒立刻縮緊。" 

# monologue
# JP: が、ふかみのアナルは――
1680 = "但是深美那邊……" 

# monologue
# JP: （きゅうううううっ）
# 2179 = "（緊）" 

# monologue
# JP: 異物によほど驚いたのか、ガチガチに閉まりきっている。\nこれではアナルセックスなどは、到底出来るものではない。
1880 = "或許是因為異物侵入感到非常緊張，她那裡箍得緊緊的。這樣根本沒辦法肛交。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……アナルセックスは、十分に慣らしておかないと、\n体に障害を残しかねないものだそうだ」
1028 = "「……肛交必須做好足夠準備，不然有可能會留下後遺症」" 

# 【凪】
# display as 凪
# JP: 「障害！？　お尻ば、裂けちゃうばいっ！？」
1440 = "「後遺症！？肛門會裂開嗎！？」" 

# 【ふかみ】
# display as 深美
# JP: 「ひっ――」
1266 = "「呀……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。だからゆっくり慣らしていこう。\n僕らには、まだいくらでも時間がある」
1462 = "「是啊，所以得慢慢放鬆。我們還有很多時間」" 

# 【ふかみ】
# display as 深美
# JP: 「は、はいっ」
1415 = "「好、好的」" 

# monologue
# JP: その一言に安心したのか、ふかみのお尻の緊張が解ける。\nかわりにグっと、ふかみは拳を締めてもみせる。
1990 = "聽我這麼說，深美的屁股放鬆下來了。取而代之的是，她捏緊了拳頭。" 

# 【ふかみ】
# display as 深美
# JP: 「わ、わたしも。凪ちゃんに負けないように、\n今日から、がんばって慣らしてみます」
1446 = "「我、我我也會努力不輸給小凪，從今天開始努力去習慣」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「楽しみだ。が、くれぐれも焦りは禁物だぞ？」
1452 = "「我很期待。但你可千萬不要著急」" 

