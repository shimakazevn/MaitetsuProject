# monologue
# JP: 膣前庭を――尿道口を指先で潰すようにして、\nホースの口を狭める原理で、残尿さえをも遠くに飛ばす。
1803 = "Em ấy dùng đầu ngón tay bóp nghẹt tiền đình âm đạo——cửa niệu đạo, dựa theo nguyên lý bóp hẹp miệng ống nước, để bắn nốt phần nước tiểu còn sót lại ra xa."
# 【凪】
# display as 凪
# JP: 「ま、負けた――ばい――\n完敗ばい！　ふかみちゃんの大勝利ばいっ！」
1304 = "「Th-thua rồi——nha—— Thua tâm phục khẩu phục nha! Đại thắng thuộc về Fukami nha!」"
# 【ふかみ】
# display as 深美
# JP: 「やったぁ！」
1490 = "「Hoan hô!」"
# monologue
# JP: あどけない声。きらめく笑顔。\nそしてふかみは――
1940 = "Giọng nói ngây thơ. Nụ cười rạng rỡ. Và rồi Fukami——"
# monologue
# JP: （くぱあっ）
2137 = "（Tách）"
# monologue
# JP: ――もう一度その指を使って、\n今度は膣口を開いて僕に、見せつける。
1008 = "——Một lần nữa dùng những ngón tay đó, lần này là mở cửa âm đạo ra cho tôi xem."
# 【ふかみ】
# display as 深美
# JP: 「そ、双鉄――さん。あの……勝ったの――\nわたし――です、から――そのっ」
1514 = "「A-anh Soutetsu. Ừm... người thắng—— là em——nên là——cái đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1378 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「ひっ、ぎゅっ！？　いきな、りっ」
1287 = "「Á, ư!? Đột, nhiên」"
# monologue
# JP: （ごっ――ぬるっ――ごりゅっ！　ぬろおおっ）
2153 = "（Phập——trơn tuột——rột! Trơn tuộtttt）"
# 【ふかみ】
# display as 深美
# JP: 「はっ――ひっ――あ、赤ちゃん――の――部屋っ――\nんっ――熱い、のっ――ぐり、って――んんうっ」
1335 = "「Hà——á——ph-phòng của em bé—— ưm——nóng, quá——ngoáy, ngoáy——ưm ưm」"
# monologue
# JP: ふかみの膣も、すでにして、\nすっかり蕩けて出来上がってる。
1950 = "Âm đạo của Fukami, cũng đã, hoàn toàn tan chảy và sẵn sàng rồi."
# monologue
# JP: が、僕の勃起はそれ以上。ほとんど既に限界だ。\nだから無駄撃ちしないよう、子宮にとにかく密着させて。
1678 = "Nhưng, phần cương cứng của tôi còn hơn thế nữa. Gần như đã đến giới hạn rồi. Nên để không lãng phí đạn, tôi cố gắng ép sát vào tử cung hết mức có thể."
# monologue
# JP: （こっ――ここここここっ――こっ――ぐりいっ――こ）
# 2153 = "（插……插……插……插……）" 
# 【ふかみ】
# display as 深美
# JP: 「ふきゅっ！　それ、しゅごっ――んっ――は、あっ、\nこきざみ、され、て――子宮――これっ――しゅき――」
1276 = "「Á! Cái đó, tuyệt quá——ưm——hà, a, bị, nhấp nhấp——tử cung——cái này——thích quá——」"
# monologue
# JP: （こっ――ここここっ――ぬるううううっ――ごんっ！）
2152 = "（Cộc——cộc cộc cộc——trơn tuộtttt——cộc!）"
# 【ふかみ】
# display as 深美
# JP: 「ひっ！？　あっ――深い、のッ――ごつん、てっ――\nこれっ――しゅごっ――あたまっ――チカ、チカっ」
1283 = "「Á!? A——sâu, quá——cộc cộc—— cái này——tuyệt quá——đầu óc——quay, cuồng」"
# monologue
# JP: （きゅううううううっ！）
# 2155 = "（插！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くおっ！」
1397 = "「Ư!」"
# monologue
# JP: 子宮の口が吸い付いてきて膣肉全部がぶるぶる震えるっ！
1810 = "Cửa tử cung mút chặt lấy, toàn bộ thịt âm đạo run lên bần bật!"
# monologue
# JP: おまんこが精子を飲みたがってる、このタイミングで、\nもう一段階、腰をえぐってねじ込んでっ！！
1791 = "Đúng lúc âm đạo đang thèm khát nuốt lấy tinh trùng này, tôi lại dấn hông sâu thêm một bậc nữa!!"
# monologue
# JP: （グリいいいいいいいいいっ！）
# 2155 = "（插！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゅっ！　きゅうううううううううううううんっ！」
1274 = "「Á! Ưmmmmmmmmmmmmmm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1290 = "「呃！」" 
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ！　熱っ――あちゅっ――んうっ！」
1337 = "「Hà——a! Nóng——nóng quá——ưm!」"
# monologue
# JP: （びゅっ！　びゅるるっ！　びゅううっ！　びゅぶっ！）
# 2132 = "（呲！呲！呲！呲！）" 
# monologue
# JP: ぶるりと、ふかみが大きく震え、\n体から力が抜けていく。
1958 = "Fukami run rẩy dữ dội, sức lực dần tuột khỏi cơ thể em ấy."
# monologue
# JP: （ずるうううううううううっ！）
2150 = "（Rúttttt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「待たせたな、凪！」
1236 = "「Để em đợi lâu rồi, Nagi!」"
# 【凪】
# display as 凪
# JP: 「ひえっ！？　にーさんっ！\nまだ、おちんちんばピュッピュして――ふあんっ！！」
1284 = "「Á!? Anh hai! Chim vẫn đang xịt nước ra kìa——phù!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1290 = "「呃！」" 
# monologue
# JP: 凪のおまんこは、やはり強烈に狭すぎる！
1744 = "Âm đạo của Nagi, quả nhiên là hẹp một cách mãnh liệt!"
# monologue
# JP: 狭すぎるのだが、今日は、凪もっ――\n興奮、しまくって――くれて――いる、の、かっ。
2044 = "Hẹp thì hẹp thật, nhưng hôm nay, Nagi cũng—— đang——vô cùng——hưng phấn, mà."
# monologue
# JP: （ず、ちゅっ！　ずちゅっ！　ずぶっ！　ずぶりゅっ！）
2139 = "（Phập, chụt! Phập chụt! Phập! Phập sột!）"
# 【凪】
# display as 凪
# JP: 「ひゃふっ――ふあっ――あっ――ひゃ――あっ」
1267 = "「Á phù——phù——a——á——a」"
# monologue
# JP: 何度か突けばそれだけで、リズムを合わせて凪がゆらめく。\n自分から、凪は腰を振ってくれてる。
1854 = "Chỉ cần thúc vài cái, Nagi đã đung đưa theo nhịp điệu. Nagi đang chủ động lắc hông đón lấy tôi."
# monologue
# JP: おまんこ内部は完全にぬかるみ、\n膣肉も、わずかにだけれどうねって僕を歓迎してる。
2043 = "Bên trong âm đạo hoàn toàn lầy lội, thịt âm đạo cũng khẽ uốn éo như đang chào đón tôi."
# monologue
# JP: （ぬっ――ずっ――ずうっ――こっ…………）
# 2153 = "（插……插……插……插……）" 
# monologue
# JP: 凪の動きを味わいたくて、子宮のドアを押したところで、\nあえて動きを止めてみる。
1846 = "Muốn nếm trải chuyển động của Nagi, tôi nhấn vào cánh cửa tử cung, rồi cố tình dừng lại."
# monologue
# JP: （ぬっ――るっ――ぬるっ――――るっ）
2138 = "（Trơn——tuột——trơn tuột————tuột）"
# 【凪】
# display as 凪
# JP: 「ふ、あ……太か……ばいっ――んっ――にーさん、\nで――おまん、こ――みちみちっ……いっ、ぱい……で」
1300 = "「Phù, a... to quá... nha——ưm——anh hai, đang——lấp đầy... âm, đạo——chật ních... rồi」"
# monologue
# JP: （ぬろおおおおおおおおおおおっ！）
2141 = "（Trơn tuộtttt!）"
# 【凪】
# display as 凪
# JP: 「ひゃうっ！？」
# 1278 = "「呀！？」" 
# monologue
# JP: （ずぶうううううううううううっ！）
# 2141 = "（啾！）" 
# 【凪】
# display as 凪
# JP: 「ひきゅううううううううんんっ！！！」
1277 = "「Á ưmmmmmmmm!!」"
# monologue
# JP: 凪の動きは実にいい。\n控えめで可愛らしくて、いかにも少女で。
1739 = "Chuyển động của Nagi thật sự rất tuyệt. Ngập ngừng, đáng yêu, hệt như một thiếu nữ."
# monologue
# JP: だが、今は、\n今だけはそれではあまりにも物足りなくて！
1686 = "Nhưng, bây giờ, chỉ lúc này thôi thì thế là chưa đủ!"
# monologue
# JP: （ずばっ！　ずばんっ！　ずぱっ！　ずぶううっ！）
2154 = "（Phập! Phập! Phập! Phậppppp!）"
# 【凪】
# display as 凪
# JP: 「いひゅっ！？　んっ――ひ――あっ――に――にーさ\n……んぎゅっ――まっ――まっ……ひぇっ――んうっ！」
1279 = "「Á!? Ưm——á——a——anh——anh hai ...ưm——đợi——đợi... á——ưm!」"
# monologue
# JP: 射精衝動の望みのとおり、\n思うがままに凪を抉って、大きく強く腰を動かす。
1849 = "Thuận theo khao khát của xung động xuất tinh, tôi mặc sức ngoáy sâu vào Nagi, di chuyển hông thật lớn và mạnh mẽ."
# monologue
# JP: 凪は全身を大きく揺らして、\nぜえはぁと、呼吸ももはや、とぎれとぎれになっている。
1728 = "Toàn thân Nagi rung lên bần bật, thở hổn hển, nhịp thở cũng đã trở nên đứt quãng."
# 【凪】
# display as 凪
# JP: 「び、あっ！　あっ――にーさっ――にー、さんっ――ふ、\nウチ、さ――さっきの、で――おまんこ――イっ、て」
1350 = "「Á! A——anh hai——anh, hai——phù, em, á——lúc nãy, là——âm đạo——ra, mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。わかってる――\nだから、僕もっ！」
1386 = "「Ừ. Anh biết—— thế nên, anh cũng!」"
# monologue
# JP: （じゅぶっ！　ごんっ！　ぬぶりゅっ！　ごりいいっ）
# 2154 = "（插！插！插！插！）" 
# 【凪】
# display as 凪
# JP: 「ひ――あっ――のーみそ――あつ、くてっ――\nあつ、くて――ふっ――ひっ――ぐるぐる――って」
1269 = "「Á——a——não——nóng, quá—— nóng, quá——phù——á——quay cuồng——mất」"
# monologue
# JP: （きゅんっ！　きゅきゅきゅきゅきゅんっ！）
2178 = "（Siết chặt! Siết siết siết siết siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！？」
1518 = "「!?」"
# monologue
# JP: おまんこの最奥から入口付近へ。\n膣肉の締めとわななきがリレー電飾のように連鎖する。
1826 = "Từ sâu thẳm bên trong âm đạo cho đến gần lối vào. Sự siết chặt và run rẩy của thớ thịt âm đạo liên kết với nhau như một chuỗi đèn nhấp nháy."
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1290 = "「呃！」" 
# monologue
# JP: （びゅ！　びゅるう！　びゅううっ！　どびゅっ！）
# 2132 = "（呲！呲！呲！呲！）" 
# monologue
# JP: 凪の最奥。\nそこに濃厚な精子を流して、一度押し込みっ――
1858 = "Tận sâu bên trong Nagi. Tôi tuôn trào dòng tinh trùng đặc sệt vào đó, rồi đẩy sâu vào một lần nữa——"
# monologue
# JP: （ぬりゅうううううううっ！）
# 2150 = "（拔！）" 
# 【凪】
# display as 凪
# JP: 「ふえっ！？」
1324 = "「Hả!?」"
# monologue
# JP: （ぶっ！　ぶびゅうっ！　びゅっ！　びゅううっ）
2133 = "（Phụt! Phụtttt! Phụt! Phụtttt）"
# monologue
# JP: そして引き抜き、精子の雨をどぷどぷ降らせる。
1892 = "Sau đó tôi rút ra, trút xuống cơn mưa tinh trùng rào rào."
# monologue
# JP: 最早薄まり、重さも失い。\nそれでも浅ましいほどに、精子は長く、吐かれ続けて――
1987 = "Dù đã loãng ra, chẳng còn sức nặng. Nhưng một cách hèn mọn, tinh trùng vẫn cứ phun ra thành từng dòng dài——"
# 【双鉄H】
# display as 雙鐵
# JP: 「う……あっ――」
1289 = "「Ư... a——」"
# 【凪】
# display as 凪
# JP: 「ふぎゅっ！」
1303 = "「Phù!」"
# 【ふかみ】
# display as 深美
# JP: 「はぁぁぁぁ～～」
1302 = "「Hàààà~~」"
# monologue
# JP: （ばっしゃーーーーーん！）
2163 = "（Ùmmmm!）"
# monologue
# JP: 三人そろって、川面に崩れる。
1836 = "Cả ba chúng tôi cùng ngã xuống mặt sông."
# monologue
# JP: 自分の精液がぷかぷかと浮く浅瀬の水でも、\n加熱しすぎた体には、実に涼しく心地よい。
2045 = "Dù cho dòng nước nông đang nổi lềnh bềnh tinh dịch của chính mình, nhưng đối với cơ thể đã quá nhiệt này, nó thực sự rất mát mẻ và dễ chịu."
# 【ふかみ】
# display as 深美
# JP: 「はぁ……はぁ……はぁっ――は――ああ～っ」
1294 = "「Hà... hà... hà——hà——a~」"
# monologue
# JP: ふかみは、くらげのようになってる。
1939 = "Fukami cứ như biến thành một con sứa vậy."
# 【凪】
# display as 凪
# JP: 「ん……ふっ――ん……にぃ――さん」
1371 = "「Ưm... phù——ưm... anh——hai」"
# monologue
# JP: 凪はさすがの体力で、\nまっすぐ僕を見――やがてゆるゆる苦笑を浮かべる。
1754 = "Nagi với thể lực đáng nể, nhìn thẳng vào tôi——rồi từ từ nở một nụ cười gượng gạo."
# 【凪】
# display as 凪
# JP: 「にーさん、なんか――なんだか、何かに目覚めたと？\n今日は、やけにノリノリだったばい」
1409 = "「Anh hai, sao——có vẻ như, anh mới giác ngộ ra điều gì à nha? Hôm nay, anh hưng phấn lạ thường luôn nha.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「目覚めた――か？\nああ、そう言われれば、確かに目覚めたのかもしれんな」
1366 = "「Giác ngộ——sao? Ừm, nghe em nói vậy, có khi anh giác ngộ thật rồi cũng nên.」"
# 【ふかみ】
# display as 深美
# JP: 「な……なに、に……んっ――目覚めた――です、か？」
1364 = "「G-giác ngộ... về... ưm——cái gì——vậy, ạ?」"
# monologue
# JP: 興味を覚えてくれたのだろう。\nふかみがゆっくり、体を起こす。
1918 = "Chắc hẳn em ấy cảm thấy tò mò. Fukami chậm rãi ngồi dậy."
# monologue
# JP: それが、嬉しい。\n言葉が、心が、限りなく素直になっていく。
1844 = "Điều đó, khiến tôi rất vui. Lời nói, trái tim, dần trở nên vô cùng thành thật."
# 【双鉄H】
# display as 雙鐵
# JP: 「三人でいる幸福に。だ」
1448 = "「Là niềm hạnh phúc khi ba chúng ta ở bên nhau.」"
# 【凪】
# display as 深美＆凪
# JP: 『「あっ！」\n「あっ！」』
1532 = "『「A!」 「A!」』"
# monologue
# JP: ふかみと凪と、目を見交わして、\nふたり同時に、深く頷く。
1927 = "Fukami và Nagi đưa mắt nhìn nhau, rồi cả hai đồng thời gật đầu thật sâu."
# monologue
# JP: おなじ気持ちになれているのだと、\nただそれだけで伝わってくる。
1870 = "Chỉ cần như vậy thôi cũng đủ truyền đạt rằng, chúng tôi đang có chung một cảm xúc."
# 【凪】
# display as 凪
# JP: 「確かに……確かに、今日は、三人でいるの――\nすっごく新鮮で、いつもより楽しかったばい！」
1468 = "「Đúng là... đúng là, hôm nay, ba chúng ta ở bên nhau—— rất mới mẻ, và vui hơn mọi khi nha!」"
# 【ふかみ】
# display as 深美
# JP: 「それぞれでの時間を過ごしたから……\n三人での時間が、中断……少し、してたから」
1399 = "「Vì tụi mình toàn dành thời gian riêng cho nhau... nên thời gian ba người ở cạnh nhau, đã bị gián đoạn... một chút.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。僕も同じだ。それゆえ、気づいた。\nふかみも凪も、それぞれとても魅力的だが――」
1459 = "「Ừ. Anh cũng vậy. Vì thế, anh đã nhận ra. Cả Fukami và Nagi, mỗi người đều rất quyến rũ, nhưng——」"
# 【凪】
# display as 凪
# JP: 「にーさんとふたりきりも悪くなかったばい」
1493 = "「Ở riêng với anh hai cũng không tệ đâu nha.」"
# 【ふかみ】
# display as 深美
# JP: 「だけど――それでも。それでもやっぱり」
1242 = "「Nhưng mà——dù vậy. Dù vậy thì quả nhiên」"
# monologue
# JP: ほんの一瞬。\nふたりが息を合わせる沈黙。
1983 = "Chỉ một thoáng chốc. Sự im lặng ăn ý của hai người."
# monologue
# JP: 僕の言葉を、そうして待っていてくれる。
2036 = "Cứ như vậy chờ đợi lời nói của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ。三人一緒が一番楽しい。\nだから僕は。修学旅行を、もしも終えても、その後も」
1026 = "「——Ừ. Ba người cùng nhau là vui nhất. Thế nên anh. Dù chuyến dã ngoại có kết thúc, thì sau này nữa」"
# 【凪】
# display as 凪
# JP: 「っ！」
1015 = "「!」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄……さん」
1031 = "「Anh... Soutetsu.」"
# monologue
# JP: 見つめられれば、それだけで胸が騒いでしまう。\n唇までもがふるえかけ――
2010 = "Chỉ cần bị nhìn chằm chằm thôi cũng đủ làm lồng ngực tôi xao xuyến. Đến cả đôi môi cũng khẽ run lên——"
# monologue
# JP: だから、ゆっくり。\n一言一言、大事に話す。
1885 = "Vì vậy, thật chậm rãi. Tôi cẩn thận nói từng lời một."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕の人生の、これからを。出来る限りに長く、一緒に。\n――凪と、ふかみと、過ごしたい」
1450 = "「Quãng đời còn lại của anh. Càng lâu càng tốt, cùng nhau. ——Anh muốn trải qua cùng với Nagi, và Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「そ、双鉄さん！？　それって、それって――」
1515 = "「A-anh Soutetsu!? Chuyện đó, chuyện đó là——」"
# 【凪】
# display as 凪
# JP: 「プロポーズばいっ！？」
1402 = "「Cầu hôn á nha!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。プロポーズだ。とはいえ、法的な面など、\nどうクリアしていけばいいのか、まだ具体的には――」
1427 = "「Ừ. Là cầu hôn. Mặc dù về mặt pháp lý, anh vẫn chưa biết cụ thể phải giải quyết thế nào——」"
# 【ふかみ】
# display as 深美
# JP: 「そんなのっ！」
1258 = "「Chuyện đó thì!」"
# 【凪】
# display as 凪
# JP: 「どぎゃんとでもなるばーい！」
1511 = "「Kiểu gì cũng có cách giải quyết hết nha!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお！」
1379 = "「Ồ!」"
# monologue
# JP: 飛び込んでくるふかみを、凪を、胸板一つで受け止める。
1864 = "Tôi dang rộng lồng ngực đón lấy Fukami và Nagi đang lao vào lòng mình."
# monologue
# JP: 三人重なりあってる鼓動が、\n言葉以上の答えを僕に、伝えてくれる。
1667 = "Nhịp đập của ba trái tim hòa quyện vào nhau, đã truyền đạt cho tôi câu trả lời còn hơn cả ngàn lời nói."
# 【ふかみ】
# display as 深美
# JP: 「そんなのほんとに、絶対にどうにでもなりますよ！\n三人寄れば[もんじゅ,1]文殊の知恵――っていいますし」
1503 = "「Mấy chuyện đó thật sự, chắc chắn sẽ có cách giải quyết thôi ạ! Người ta bảo một cây làm chẳng nên non, ba cây chụm lại nên hòn núi cao——mà lị.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　三人でモンジャ焼きばい！」
1464 = "「Đúng thế nha! Ba người cùng nướng bánh Monja nha!」"
# 【ふかみ】
# display as 深美
# JP: 「もう凪ちゃんったら～！」
1429 = "「Thiệt tình bé Nagi này~!」"
# monologue
# JP: ふかみが凪を抱きしめて、\nふたりを僕が抱きあげる。
1933 = "Fukami ôm chặt lấy Nagi, rồi tôi ôm trọn cả hai người lên."
# monologue
# JP: そして三人、めちゃくちゃ笑って、\n手当たりしだいのキスをする。
1837 = "Rồi cả ba chúng tôi, cười phá lên, và trao nhau những nụ hôn tới tấp."
# 【双鉄H】
# display as 雙鐵
# JP: （ああ――僕たちは、これでいいんだ）
2167 = "(À——chúng ta, thế này là đủ rồi.)"
# monologue
# JP: そう理解して、確信する。\n凪と、ふかみと、それから、僕と。
1856 = "Tôi thấu hiểu, và tin chắc điều đó. Nagi, Fukami, và cả tôi."
# monologue
# JP: 僕らはこれからも三人で、\nずっとずうっと――笑顔と時間を、重ねてく。
1838 = "Từ nay về sau, ba chúng tôi sẽ, mãi mãi——cùng nhau chia sẻ nụ cười và thời gian."
