[script]
# lines: 381 
# 【双鉄H】
# display as 雙鐵
# JP: 「よ――っと」
1392 = "「Dô——ta」"
# monologue
# JP: 水棹を引き上げ、\nあとはすべてを流れに任せ――
1852 = "Nhấc mái chèo lên, phần còn lại phó mặc tất cả cho dòng nước——"
# monologue
# JP: （こつんっ）
2136 = "（Cộc）"
# 【凪】
# display as 凪
# JP: 「おおお」
1396 = "「Ồ ồ ồ」"
# monologue
# JP: 感心したような凪の声。
1737 = "Giọng Nagi như đang thán phục."
# monologue
# JP: 着船を僕一人の手に任されていた川下り船は、\nふかみ指定の浅瀬へと、流れのままに滑りこむ。
2037 = "Chiếc thuyền xuôi dòng mà tôi được giao phó toàn quyền cập bến, đã lướt theo dòng nước trôi vào bãi cạn do Fukami chỉ định."
# 【ふかみ】
# display as 深美
# JP: 「うん。上出来です」
1377 = "「Ừm. Tốt lắm ạ.」"
# monologue
# JP: ふかみが手早く艫綱を結び、\n舟を完全に制止させ――
1934 = "Fukami nhanh nhẹn buộc dây neo đuôi thuyền, giữ cho chiếc thuyền dừng lại hoàn toàn——"
# monologue
# JP: そうしてくるり、僕へ振り向き、\n満面の笑顔を浮かべてくれる。
1891 = "Rồi em ấy quay ngoắt lại nhìn tôi, nở một nụ cười rạng rỡ trên môi."
# 【ふかみ】
# display as 深美
# JP: 「合格です！　双鉄さん。これからは、\n正規のともはりさんとしても、よろしくお願いしますね」
1245 = "「Đạt yêu cầu rồi ạ! Anh Soutetsu. Từ giờ trở đi, với tư cách là một người lái đò chính thức, mong anh giúp đỡ nhé.」"
# 【凪】
# display as 凪
# JP: 「やったばーい！　やっと後輩ができたばーい！」
1413 = "「Tuyệt quá nha! Cuối cùng cũng có hậu bối rồi nha!」"
# monologue
# JP: 声と同時に、\n凪は両手を川面に差し込み――っ！！？
2019 = "Cùng lúc với tiếng reo hò, Nagi thọc cả hai tay xuống mặt sông——!!?"
# monologue
# JP: （ばしゃばしゃばしゃっ！）
2162 = "（Tũm tũm tũm!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うおっぷ！？」
1320 = "「Úi!?」"
# 【凪】
# display as 凪
# JP: 「にーさん、ちょこっと目ぇつむるばい！」
1407 = "「Anh hai, nhắm mắt lại một chút đi nha!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、言われずとも強制的に瞑らされたが」
1362 = "「Không, em không bảo thì anh cũng bị ép nhắm mắt lại rồi.」"
# monologue
# JP: （ちゃぷんっ）
2164 = "（Tũm）"
# 【ふかみ】
# display as 深美
# JP: 「よい――しょっ！\n双鉄さん、もういいですよ！　こっち来てくださーい！」
1394 = "「Dô——ta! Anh Soutetsu, xong rồi đó ạ! Lại đây đi ạ!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――うむ？」
1024 = "「——Hửm?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
# 1396 = "「噢」" 
# monologue
# JP: 水着だ。\nならばふたりとも最初から、下に着込んでいたのだろう。
1900 = "Là đồ bơi. Ra là hai em ấy đã mặc sẵn ở bên trong từ đầu rồi."
# monologue
# JP: ふたりの弾ける笑顔の側へと、\n靴だけ脱いで、ざぶざぶ浅瀬を踏み分け歩く。
1871 = "Tiến về phía hai nụ cười rạng rỡ ấy, tôi chỉ cởi giày ra, lội bì bõm qua vùng nước nông."
# 【ふかみ】
# display as 深美
# JP: 「わ……双鉄さん、服着たままとか」
1317 = "「Oa... Anh Soutetsu, anh vẫn mặc nguyên đồ sao.」"
# 【凪】
# display as 凪
# JP: 「濡れちゃうばい！　風邪ひくばい！　早く脱ぐばい！」
1485 = "「Sẽ ướt hết đó nha! Bị cảm bây giờ nha! Mau cởi ra đi nha!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや……まさか川原では脱げんだろう。\n通行人に通報されてしまいかねない」
1360 = "「Không... làm sao mà cởi đồ ở bãi sông được chứ. Lỡ bị người qua đường báo cảnh sát thì sao.」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、双鉄さん？」
1391 = "「Ư hứ hứ, anh Soutetsu?」"
# monologue
# JP: ふかみの妙にねっとりした声。\nその舌先が、ちろりと唇を舐めて湿らす。
1947 = "Giọng nói của Fukami nghe nũng nịu đến lạ. Đầu lưỡi em ấy khẽ liếm làm ướt đôi môi."
# 【ふかみ】
# display as 深美
# JP: 「ここ。……誰も通行しませんよ？」
1504 = "「Ở đây... không có ai đi ngang qua đâu ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？　――ああ」
1388 = "「Hử? ——À.」"
# monologue
# JP: ふかみの視線を追って周囲を見渡せば、\n言われた意味がすぐさま判る。
1876 = "Dõi theo ánh mắt của Fukami nhìn quanh, tôi lập tức hiểu ý em ấy."
# monologue
# JP: 張り出した森と切り立った崖とに囲まれ、\n舟無しでは、この浅瀬を見ることさえも出来そうにない。
1787 = "Được bao bọc bởi khu rừng nhô ra và vách đá dựng đứng, nếu không có thuyền thì có lẽ chẳng ai có thể nhìn thấy bãi cạn này."
# 【凪】
# display as 凪
# JP: 「ここ、ふかみちゃんとのふたりだけの――\n今日からにーさんと三人の、秘密の貸し切りビーチばい」
1506 = "「Chỗ này, là của riêng em với Fukami—— từ hôm nay sẽ là bãi biển bao trọn bí mật của ba chúng ta nha.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ビーチでは――ああ、いや。\nそうか、川辺も確かにビーチか」
1505 = "「Bãi biển thì——à, không. Phải rồi, bờ sông thì đúng là bãi biển thật.」"
# monologue
# JP: だが、重要なのはそこではない。\n“秘密“で“貸し切り”という部分の方だ。
1682 = "Nhưng, đó không phải là điều quan trọng. Quan trọng là phần \"bí mật\" và \"bao trọn\" kìa."
# 【ふかみ】
# display as 深美
# JP: 「って、いうことですから――そのっ、えっと」
1436 = "「Là, như vậy đó ạ——nên là, ừm.」"
# 【凪】
# display as 凪
# JP: 「さっさと脱ぐばーいっ！！」
1441 = "「Mau cởi ra đi nha!!」"
# monologue
# JP: （ずるんっ！）
2142 = "（Tuột!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おわっ！？」
# 1320 = "「哇！？」" 
# 【凪】
# display as 凪
# JP: 「ひゃぴっ！？」
1278 = "「Á!?」"
# 【ふかみ】
# display as 深美
# JP: 「いやぁんっ！！」
1323 = "「Ối!!」"
# monologue
# JP: ズボンとパンツを引きずり降ろされた反動で、\n勃起が凪の鼻先すれすれをブンと跳ね上がる。
1877 = "Quần dài và quần lót bị kéo tuột xuống tạo ra phản lực, khiến phần cương cứng bật lên sượt ngang qua mũi Nagi."
# 【ふかみ】
# display as 深美
# JP: 「す……ご……わ……双鉄、さん――\n……こんな……ビキビキに……おっきく、て」
1412 = "「Kh... khủng... oa... Anh... Soutetsu—— ...Nó... gân guốc... to, thế này.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんとウチの水着で、\nにーさん、興奮しちゃったと？」
1481 = "「Nhìn đồ bơi của Fukami và em, anh hai, hưng phấn rồi á?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n恋する相手の水着姿に、興奮をせぬ者などいまい」
1477 = "「Đương nhiên rồi. Thấy người mình yêu mặc đồ bơi, có ai mà không hưng phấn chứ.」"
# monologue
# JP: （すりっ――すりっ）
2175 = "（Cọ cọ——cọ cọ）"
# 【凪】
# display as 凪
# JP: 「ひゃっ」
1272 = "「Á」"
# monologue
# JP: 論より証拠と、凪のほっぺたを撫ぜてやる。\n手のひらではなく、勃起を使い。
1832 = "Trăm nghe không bằng một thấy, tôi vuốt ve gò má Nagi. Không phải bằng lòng bàn tay, mà bằng phần cương cứng."
# 【ふかみ】
# display as 深美
# JP: 「あ！　ずるいっ、凪ちゃ――ふあっ！？」
1353 = "「A! Ăn gian nha, bé Nagi——á!?」"
# monologue
# JP: （ふにっ――ふにゅっ）
2159 = "（Nắn——nắn nắn）"
# monologue
# JP: 無論、ふかみにも公平に。
1971 = "Tất nhiên, tôi cũng công bằng với cả Fukami nữa."
# monologue
# JP: ふたりの頬に先走り汁を擦りつけたなら、\n否応無しに、その感触の違いを思い知らされる。
1842 = "Bôi chất dịch rỉ ra lên gò má hai người, tôi bất đắc dĩ nhận ra sự khác biệt về xúc giác."
# monologue
# JP: （すりっ――すべっ――すりゅっ――しにゅっ）
# 2159 = "（摩擦摩擦）" 
# 【凪】
# display as 凪
# JP: 「ん……ひ……なんか、にーさん――ふゅっ――\nへ、ヘンタイっぽい……ばいっ――」
1367 = "「Ưm... hì... sao tự dưng, anh hai——phù—— gi-giống biến thái thế... nha——」"
# monologue
# JP: 温度の高い凪の頬には、\n若鮎のごとき張りとなめらかさが共存している。
1743 = "Gò má ấm nóng của Nagi, vừa căng mọng vừa mịn màng như một chú cá hương non."
# monologue
# JP: ピチピチと跳ね返るほどに瑞々しくて、\nなのにすべすべ、上等の絹の肌触りだ。
2035 = "Tươi tắn đến mức chạm vào là nảy lên bần bật, thế mà lại mượt mà, hệt như đang sờ vào tấm lụa thượng hạng."
# monologue
# JP: （むにっ――もちっ――ぷみっ――ふにょん）
# 2159 = "（摩擦摩擦）" 
# 【ふかみ】
# display as 深美
# JP: 「わ……わたし……これも――すごく……好き、です――\nおちんちん、に――いいこいいこ……される、みたいで」
1316 = "「Oa... em... cũng——rất... thích, cái này—— như kiểu, được——chim... vuốt ve... ấy ạ.」"
# monologue
# JP: かたやひんやりふかみの頬は、突いてしばらく寝かせて\nおいて、食べごろに冷えた餅のごとしだ。
1895 = "Trái lại, gò má mát lạnh của Fukami, cứ như chiếc bánh giã xong được để một lúc, nguội vừa đủ độ ngon vậy."
# monologue
# JP: 柔らかさがありしっとりしてて張り付くようで、\n亀頭の先を擦りつけていると、妙な罪悪感さえ覚える。
2026 = "Vừa mềm mại, ẩm ướt lại như bám dính lấy, khiến tôi cảm thấy một thứ tội lỗi kỳ lạ khi cọ xát đầu quy đầu vào đó."
# 【凪】
# display as 凪
# JP: 「あ！　面白かこと考えたばいっ」
1348 = "「A! Em vừa nghĩ ra trò hay lắm nha!」"
# monologue
# JP: （ぷくうっ）
2127 = "（Phồng má）"
# monologue
# JP: いきなり凪が、口内に空気を溜めこんで、\nふかみと隣接してる方の頬をふくらます。
1747 = "Đột nhiên Nagi ngậm đầy không khí vào miệng, làm phồng phần má đang kề sát với Fukami lên."
# 【ふかみ】
# display as 深美
# JP: 「わ――凪ちゃん、頭いい」
1312 = "「Oa——bé Nagi, thông minh ghê.」"
# monologue
# JP: （ぷうっ）
# 2127 = "（吸）" 
# monologue
# JP: ふかみも、凪と同様に。\nこれは、つまりは――
1921 = "Fukami cũng làm giống hệt Nagi. Thế này, có nghĩa là——"
# monologue
# JP: （むりゅっ）
2156 = "（Chen vào）"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「ふあっ」\n「んっ」』
1530 = "『「Phù」 「Ưm」』"
# monologue
# JP: 二人の頬の狭隘に、ねじ込むように勃起を差し込む。
1841 = "Tôi luồn phần cương cứng vào khoảng trống chật hẹp giữa hai gò má."
# monologue
# JP: 右と左から押し寄せてくる、\n肌の感触と体温の差が、性感をぞわりと泡立てる。
1817 = "Sự khác biệt về xúc giác và thân nhiệt ập đến từ hai phía trái phải, làm khoái cảm trào dâng râm ran."
# monologue
# JP: （ずっ――するっ）
2161 = "（Cọ——trượt）"
# 【凪】
# display as 凪
# JP: 「んひゅっ」
1378 = "「Ưm」"
# 【ふかみ】
# display as 深美
# JP: 「あんっ」
1344 = "「A」"
# monologue
# JP: （ズリッ――ずっ――すりりっ――ぷにゅんっ）
2158 = "（Trượt——cọ——cọ xát——mềm nhũn）"
# monologue
# JP: が、勃起を何度か出し入れしたり、\n抉ってみたりしてみても、期待したほどの快感は無い。
1684 = "Nhưng, dù có đưa phần cương cứng ra vào vài lần, hay thử ngoáy đi chăng nữa, thì khoái cảm cũng không như tôi mong đợi."
# monologue
# JP: 空気で膨らむ頬の感触は確かに心地よくあるが、\nただ一様に張ってるだけで、ごく単調で刺激に乏しい。
1992 = "Xúc cảm của đôi má phồng đầy không khí đúng là rất dễ chịu, nhưng nó chỉ căng phồng một cách đồng đều, vô cùng đơn điệu và thiếu kích thích."
# 【双鉄H】
# display as 雙鐵
# JP: 「むぅ」
1332 = "「Hừm.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――」
1333 = "「A——」"
# monologue
# JP: ふかみの、焦ったような声――っ！？
1946 = "Giọng nói có vẻ luống cuống của Fukami——!?"
# monologue
# JP: （くりゅんっっ）
2130 = "（Lướt qua）"
# monologue
# JP: 急に刺激が、横から僕にぶつかってくる。\nうねうね蠢き、勃起の形をなぞろうとする。
1690 = "Bỗng nhiên một sự kích thích đập vào tôi từ bên hông. Nó ngọ nguậy uốn lượn, cố gắng men theo hình dáng phần cương cứng của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「これは……舌か――\nほっぺたの内側から舌を使って」
1501 = "「Đây là... lưỡi sao—— Dùng lưỡi liếm từ mặt trong của má.」"
# 【凪】
# display as 凪
# JP: 「ああ！　そっちの方がずっとよさげばいっ！！」
1426 = "「A! Cách đó có vẻ hay hơn nhiều nha!!」"
# monologue
# JP: （うりゅんっ！！）
2129 = "（Lướt tới!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うぐっ！」
1290 = "「Hự!」"
# monologue
# JP: 頬の柔らかな皮膚ごしに、\nふたりの舌がそれそれ勝手に僕の勃起を舐めまわす。
1800 = "Xuyên qua lớp da má mềm mại, lưỡi của hai người tự ý liếm láp phần cương cứng của tôi."
# 【凪】
# display as 凪
# JP: 「ん……ふにゅっ――んっ――ふくっ――ふっ――\nにゅっ――ぬ～～～っ――えるっ」
1370 = "「Ưm... mềm... ưm... phù... phù... nhũn... ừm~~~... liếm」"
# 【ふかみ】
# display as 深美
# JP: 「……れ……るっ――ふっ――んっ――るろっ――\nろっ――れるうっ――れろっ――れろおおおお」
1030 = "「...Liếm... liếm——phù——ưm——liếm—— liếm——liếm——liếm——liếmmmmm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……んっ」
1023 = "「...Ưm.」"
# monologue
# JP: さっきまでとは格段に、刺激が強くなっている。
1760 = "Kích thích đã trở nên mạnh mẽ hơn hẳn so với ban nãy."
# monologue
# JP: 頬越し、舌になぞられ押される感触はもごもごと、\nランダムで不器用で、予想外の快感を塗りつけてくる。
2007 = "Cảm giác bị lưỡi men theo và đè ép qua lớp má cứ nhồn nhột, ngẫu nhiên và vụng về, mang đến những khoái cảm ngoài sức tưởng tượng."
# 【双鉄H】
# display as 雙鐵
# JP: （それに、気持ちがとても嬉しい。僕の射精を促すために、\n一生懸命、ふたりが工夫をしてくれたのが）
2181 = "（Hơn nữa, tôi cũng rất vui. Vì hai người đã dốc hết sức nghĩ ra đủ cách để giúp tôi xuất tinh.）"
# 【凪】
# display as 凪
# JP: 「ん……ふ……んっ――ふにゅっ……ふはふ……\nはへへふふぇ……ふっ――ほほはひは……ふぁい」
1372 = "「Ưm... phù... ưm——mềm... phù... phù... hà... hê hê... phù——... phù」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃふぁ……んにゅ……にゃに、ひゃん――\nん……にゅゅーっへ……ちゅ……ははほ？」
1299 = "「Hà... ưm... Nagi, này—— ưm... chụt... nhỉ?」"
# 【凪】
# display as 凪
# JP: 「ひょははい！」
1421 = "「Vâng nha!」"
# monologue
# JP: （うにゅうううううううううううっ！！）
2160 = "（Nhu động!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おおお」
# 1396 = "「噢」" 
# monologue
# JP: 凪とふかみが口内の、それぞれの壁に舌を這わせて、\nそれで勃起を、挟むようにして擦ってくれる。
1731 = "Nagi và Fukami lướt lưỡi dọc theo thành miệng của mình, rồi dùng chúng kẹp lấy và cọ xát vào phần cương cứng của tôi."
# 【ふかみ】
# display as 深美
# JP: 「えむっ――れるっ――るっ――れりゅうっ」
1346 = "「Ưm——liếm——liếm——liếm」"
# 【凪】
# display as 凪
# JP: 「んふっ――んんっ――えうううっ――べろおっ」
1297 = "「Ưm phù——ưm——ư——liếm」"
# monologue
# JP: 気持ちいい。確かにかなりいいのだが……\nこの刺激でも、射精に至るのは難しそうだ。
1806 = "Sướng thật. Quả thực là rất tuyệt nhưng... với mức độ kích thích này, e là vẫn khó mà xuất tinh được."
# monologue
# JP: 舌の蠢きを感じてるのに、ぬらつきも濡れも巻きつきも、\n滑りも吸いも――まるで無いのが、もどかしすぎる。
1867 = "Rõ ràng cảm nhận được sự ngọ nguậy của lưỡi, nhưng lại chẳng hề trơn trượt, ướt át hay quấn quýt, cũng chẳng trượt hay mút——thật sự quá bứt rứt."
# 【双鉄H】
# display as 雙鐵
# JP: 「……ふかみっ――凪っ」
1027 = "「...Fukami——Nagi.」"
# 【凪】
# display as 凪
# JP: 「何ばい？」
1240 = "「Gì thế nha?」"
# 【ふかみ】
# display as 深美
# JP: 「わかりましたっ」
1420 = "「Em hiểu rồi ạ.」"
# monologue
# JP: だから零してしまった声に、ふたつの声が応えてくれる。\n――反応速度は凪が上。けれども理解はふかみが上だ。
1799 = "Thế nên, đáp lại tiếng gọi của tôi là hai giọng nói cất lên. ——Nagi phản ứng nhanh hơn. Nhưng Fukami lại hiểu ý tôi hơn."
# monologue
# JP: 返事と同時に、ふかみは大きく口を開いて、\n僕の勃起を待ち望んでみせてくれる。
2017 = "Cùng lúc trả lời, Fukami mở to miệng, cho thấy em ấy đang khao khát phần cương cứng của tôi đến nhường nào."
# monologue
# JP: （ずろおおおおおおおおおおっ！）
2182 = "（Trượt vào!）"
# 【ふかみ】
# display as 深美
# JP: 「んむっ！！？」
1380 = "「Ưm!!?」"
# 【凪】
# display as 凪
# JP: 「あっ！？　そぎゃんこつばいっ！？」
1356 = "「Á!? Là vậy sao nha!?」"
# monologue
# JP: すぐさま凪も、ひな鳥みたいに大きく口を開いてくれる。
1723 = "Nagi cũng lập tức há to miệng như một chú chim non."
# 【ふかみ】
# display as 深美
# JP: 「んっ――ふっ――んちゅっ――ちゅうっ――ふっ――\nん、ふっ――ほーへふっ――ふぁ、んっ――」
1328 = "「Ưm——phù——chụt——chu——phù—— ưm, phù——phù——phù, ưm——」"
# monologue
# JP: （ずりゅっ――ずっ――ちゅぶっ――ずちゅっ）
2157 = "（Trượt——cọ——chụt——chụt）"
# 【ふかみ】
# display as 深美
# JP: 「えうっ――んっ――ちゅ……ちゅずっ――じゅるっ――\nんう……れろ――れるっ――ちゅうっ――ずじゅっ」
1374 = "「Ư——ưm——chụt... chụt——rột—— ưm... liếm——liếm——chu——chụt」"
# monologue
# JP: けれども、すぐには突っ込めない。\nふかみの工夫を、凪にも学んでもらわなくては。
1673 = "Nhưng tôi không thể cắm vào ngay được. Phải để Nagi học hỏi kỹ thuật của Fukami đã."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪。ふかみの口元をよぉく見るんだ」
1256 = "「Nagi. Em nhìn kỹ miệng của Fukami đi.」"
# 【凪】
# display as 凪
# JP: 「ふひほほ？」
# 1240 = "「什麼？」" 
# monologue
# JP: 律儀にも口を開いたままで、凪は横目でふかみを眺める。
1733 = "Nagi ngoan ngoãn giữ nguyên miệng há to, liếc mắt nhìn Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみの唇は、僕の勃起を痛めないよう、\n歯をカバーしてくれている。それから、舌も――」
1471 = "「Môi của Fukami đang che lại răng, để không làm đau chỗ cương cứng của anh. Rồi cả lưỡi nữa——」"
# 【凪】
# display as 凪
# JP: 「はふぁっふぁ！　ほーはひっ！！」
1455 = "「Vâng ạ! Không vấn đề gì nha!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「上出来だっ」
1439 = "「Làm tốt lắm.」"
# monologue
# JP: （にゅろおおおおん――ずぽおっ！！）
2170 = "（Trơn tuột——phập!!）"
# 【凪】
# display as 凪
# JP: 「んぶううっ！？　む～っ！　む～っ！！」
1382 = "「Ưm!? Ưm~! Ưm~!!」"
# monologue
# JP: ふかみと同じ感覚で差し込んでみたのだが、\n凪にはそれでは深すぎらしい。
1862 = "Tôi thử cắm vào với cảm giác giống như khi làm với Fukami, nhưng có vẻ như thế là quá sâu đối với Nagi."
# monologue
# JP: 喉を勢いで突いてしまって、\n凪の目元に苦しげな涙がこみ上げてくる。
1804 = "Cú thúc mạnh vào cổ họng, khiến khóe mắt Nagi ứa ra những giọt lệ đau đớn."
# 【凪】
# display as 凪
# JP: 「むうううっ～　むーーーっ」
1331 = "「Ưmmmmm~ Ưmmmmm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ……ぉ」
# 1333 = "「啊……」" 
# monologue
# JP: ゼヒゼヒとあえぐ喉の動きが震える舌が、\n気持ちよすぎて、声が勝手に溢れてしまう。
1741 = "Chuyển động của cổ họng đang thở hổn hển cùng chiếc lưỡi run rẩy, khiến tôi sướng đến mức tự động bật ra tiếng rên rỉ."
# monologue
# JP: しかし、今すぐ抜かねばならない。\n凪に苦しい思いをさせて得る快感など――
1676 = "Nhưng tôi phải rút ra ngay lập tức. Khoái cảm có được nhờ làm Nagi đau đớn thì——"
# 【ふかみ】
# display as 深美
# JP: 「あ！　喉っ。\nあの、双鉄さん――わたし、チャレンジ」
1352 = "「A! Cổ họng. Ừm, anh Soutetsu——để em, thử thách xem sao.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1290 = "「呃！」" 
# monologue
# JP: （ぬろおおおおおおおっ！）
2174 = "（Trơn tuột!）"
# monologue
# JP: さすが、ふかみは名船頭だ。
1953 = "Quả không hổ danh Fukami là một người chèo thuyền xuất sắc."
# monologue
# JP: 渡りに舟のその一言に、\n僕の体は、浅ましいほどの反射を示す。
1989 = "Trước lời đề nghị như buồn ngủ gặp chiếu manh đó, cơ thể tôi đã phản xạ lại một cách hèn mọn."
# monologue
# JP: （ずぬうううううううううっ！）
2155 = "（Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「んぐっ！？　――む。ぷ。んっ――んにゅっ――\nん～～～っく――んぐう――――――――（ぐうっ）」
1381 = "「Ưm!? ——Ưm. Phù. Ưm——ưm—— ưm~~~——ưm――――――――（Ưm）」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1291 = "「Ư!!?」"
# monologue
# JP: 吸われる！　同時にふかみの喉に噛み付かれっ！！
1931 = "Bị mút lấy! Đồng thời bị cổ họng của Fukami cắn chặt!!"
# 【双鉄H】
# display as 雙鐵
# JP: （なんだ――なんだこれは――）
2145 = "（Cái gì——thế này là sao——）"
# monologue
# JP: 動いてる。ふかみの喉が蠢いている。\n狭くなりまた広くなり、僕を奥へと飲み込むように――
1943 = "Đang chuyển động. Cổ họng của Fukami đang ngọ nguậy. Lúc thì hẹp lại, lúc lại mở rộng ra, như thể muốn nuốt chửng tôi vào sâu bên trong——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……そうか――呑んで――いる、の、か――」
1341 = "「A... ra là vậy——em đang——nuốt, vào, sao——」"
# 【ふかみ】
# display as 深美
# JP: 「ん、ぐっ――ンッ――はっ――ぐっ――プッ――ん……\nえ、ぐっ――ぐっ――んんっ――んううう～～っ」
1373 = "「Ưm, ực——ưm——hà——ực——phụt——ưm... e, ực——ực——ưm——ưmmmm~~」"
# monologue
# JP: （くぽっ！　がぽっ！）
2135 = "（Ực! Ực!）"
# monologue
# JP: 食道なのか声帯なのか、喉奥をふかみは締め開きして、\n同時に奥へと飲み込む動きで僕の精液を絞ろうとする。
1937 = "Không biết là thực quản hay thanh quản, Fukami đóng mở sâu bên trong cổ họng, đồng thời thực hiện động tác nuốt vào trong như muốn vắt kiệt tinh dịch của tôi."
# monologue
# JP: これは……これはもう抗いきれない。\nが――射精するなら、ふかみと、凪と、やはりふたりに！
2034 = "Thế này... thế này thì tôi không thể chống cự nổi nữa rồi. Nhưng——nếu xuất tinh, quả nhiên tôi vẫn muốn dành cho cả hai, cả Fukami và Nagi!"
# monologue
# JP: （ずるうううううううううううっ！！）
2149 = "（Rútttt!!）"
# 【ふかみ】
# display as 深美
# JP: 「んぎゅうううっ」
# 1378 = "「嗯」" 
# monologue
# JP: 苦しげに啼く喉とビクつく舌とが僕の引き金を引きっ！
1941 = "Tiếng nấc nghẹn ngào từ cổ họng cùng chiếc lưỡi run rẩy đã bóp cò súng trong tôi!"
# monologue
# JP: （びゅっ！　びゅるうううっ！　びゅぶっ！　びゅっ！）
2132 = "（Phụt! Phụttttt! Phụt! Phụt!）"
# 【凪】
# display as 凪
# JP: 「ふあっ――出たばいっ！　にーさん――せーえきっ！\nびゅっびゅって！　すごく！　すっごく熱いかとばい！」
1310 = "「Oa——ra rồi nha! Anh hai——tinh dịch! Bắn phụt phụt kìa! Nhiều quá! Nóng lắm luôn á nha!」"
# 【ふかみ】
# display as 深美
# JP: 「は……ぁっ……ふあっ――ん――それ――に……\n重くて……ねばっこくって……くさ、く、て――」
1295 = "「Hà... a... phù——ưm——hơn nữa——... nặng quá... nhầy nhụa quá... lại còn nặng, mùi, nữa——」"
# monologue
# JP: 顔面に飛び散る精液を、ふかみは、凪は、\nそれぞれの指と舌とでこそげとり――
1929 = "Tinh dịch văng tung tóe trên mặt, Fukami, và Nagi, dùng ngón tay và lưỡi của mình gạt lấy——"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？　あーん」
1430 = "「Bé Nagi? A nào.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんも、あ～ん、ばいっ！」
1433 = "「Fukami cũng, a~ nào, nha!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1319 = "「Á!」"
# monologue
# JP: そしてお互いの指先を、\n僕の精液をたっぷりこそげた指先を。
1893 = "Rồi hai người đưa đầu ngón tay của nhau, những đầu ngón tay đã gạt đầy tinh dịch của tôi."
# monologue
# JP: ふかみは凪の、凪はふかみの、\nそれぞれの口内に差し込んで――
1955 = "Fukami cho vào miệng Nagi, Nagi cho vào miệng Fukami, đút vào miệng của đối phương——"
# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちょろっ――ちゅるっ――んっ」
1358 = "「Ưm... chụt——rột——chụt——ưm」"
# 【ふかみ】
# display as 深美
# JP: 「れるっ――れろおっ――しゅぶっ――しゃぶぅっ」
1357 = "「Liếm——liếm——mút——mút」"
# 【凪】
# display as 凪
# JP: 「にーさんのせーえき……ん……ぷぁ――苦か、けん……\nふかみちゃんの、指……よけいに……ちゅっ――甘か」
1405 = "「Tinh dịch của anh hai... ưm... phù——đắng, quá... ngón tay của Fukami... lại càng... chụt——ngọt ngào hơn」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんの指――んっ――おいひい――ひょぉ……ん、\nちゅっ――ちゅう――れろっ――れるうっ」
1428 = "「Ngón tay của bé Nagi——ưm——ngon quá——ư... ưm, chụt——chu——liếm——liếm」"
# monologue
# JP: 可愛らしさと、やらしさと。\nその光景を、ずっと眺めていたくもある、が――
1979 = "Vừa đáng yêu, lại vừa dâm đãng. Tôi cũng muốn cứ thế ngắm nhìn khung cảnh này mãi, nhưng——"
# 【双鉄H】
# display as 雙鐵
# JP: （……僕一人だけ蚊帳の外なのは、いささか寂しい）
2060 = "(...Chỉ mình tôi bị ra rìa thế này, cũng có chút cô đơn.)"
# monologue
# JP: お互いに夢中なふたりの背後に回りこみ、\n不意打ち愛撫でおしおきを――っ！？
1865 = "Tôi vòng ra phía sau hai cô gái đang say sưa với nhau, định tung một đòn vuốt ve bất ngờ để trừng phạt——!?"
# monologue
# JP: （めくりっ）
2183 = "（Lật lên）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！！！」
1517 = "「!!!」"
# 【凪】
# display as 凪
# JP: 「うふふ～ん～、にーさーん」
1390 = "「Ư hứ hứ~, anh hai~」"
# 【ふかみ】
# display as 深美
# JP: 「なに、しようと。してる、です？」
1247 = "「Anh định, làm gì. Đó, ạ?」"
# monologue
# JP: 水着の股間がめくられる。
1801 = "Phần háng của bộ đồ bơi bị lật lên."
# monologue
# JP: ふかみのおまんこと凪のおまんこ――だけでなく、\nお尻の穴まで全部を鮮やかに見せつけられる。
1902 = "Âm đạo của Fukami và âm đạo của Nagi——không chỉ vậy, mà cả lỗ hậu môn, tất cả đều phơi bày rõ ràng trước mắt tôi."
# 【ふかみ】
# display as 凪＆深美
# JP: %69;『「わかってるばーい。にーさん、いよいよお尻の穴ば試したかとよね？」\n「わかってます。です。ここなら、おしっこ――しても汚れない場所。です、から」』
1528 = "『「Bọn em biết tòng tọc rồi nha. Anh hai, cuối cùng cũng muốn thử lỗ hậu môn rồi đúng không?」 「Bọn em biết. Mà. Ở đây thì, có đi tiểu——cũng không làm bẩn chỗ nào. Đâu, ạ.」』"
# monologue
# JP: まったく異なる内容を、まったく同じタイミングで。
1798 = "Hai nội dung hoàn toàn khác nhau, lại được nói ra cùng một lúc."
# monologue
# JP: ふたりはそれぞれ口にして、\nこれまた同時に、ギョっとした顔を見合わせる。
2016 = "Hai người vừa thốt ra lời, lại đồng thời đưa mắt nhìn nhau với vẻ mặt sửng sốt."
# 【凪】
# display as 深美＆凪
# JP: 『「お尻って！？」\n「おしっこばいっ！？」』
1534 = "『「Hậu môn á!?」 「Đi tiểu á!?」』"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。それぞれとのデートの時に、\nそうした話題が、流れで出たのだ」
1383 = "「Ừ. Lúc hẹn hò riêng với từng người, anh đã thuận miệng nhắc đến những chuyện đó.」"
# 【凪】
# display as 凪
# JP: 「ふあっ？！　お尻いきなりばいっ！？」
1322 = "「Oa?! Sao tự nhiên lại nhắm vào hậu môn nha!?」"
# 【ふかみ】
# display as 深美
# JP: 「へっ！？　やっ――指っ！？　双鉄さんの――\n指……先っ――おしり――にっ！？」
1326 = "「Hả!? Á——ngón tay!? Của anh Soutetsu—— đầu... ngón tay——ở hậu môn——sao!?」"
# monologue
# JP: 故に、僕も勉強をした。\nおしっこについても、アナルについても。
1789 = "Vì vậy, tôi cũng đã tìm hiểu. Cả về chuyện đi tiểu, lẫn chuyện hậu môn."
# 【双鉄H】
# display as 雙鐵
# JP: 「指三本。それがスムーズに入るのならば、\nアナルセックスは概ね可能となるものらしい」
