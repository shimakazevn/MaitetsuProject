1273 = "「Á phù!」"
# 【凪】
# display as 凪
# JP: 「あ――抜けちゃったばい」
1340 = "「A——tuột ra mất rồi nha.」"
# monologue
# JP: 間違いなく、凪は自主的に修行をしていてくれたのだろう。\n指一本はらくらくだったし、抜いた今でもやわらいでいる。
1753 = "Không còn nghi ngờ gì nữa, chắc chắn Nagi đã tự mình tập luyện. Một ngón tay vào rất dễ dàng, và ngay cả khi đã rút ra, chỗ đó vẫn mềm mại."
# monologue
# JP: が、ふかみのアナルは――
1680 = "Nhưng, hậu môn của Fukami thì——"
# monologue
# JP: （きゅうううううっ）
# 2179 = "（緊）" 
# monologue
# JP: 異物によほど驚いたのか、ガチガチに閉まりきっている。\nこれではアナルセックスなどは、到底出来るものではない。
1880 = "Có lẽ do quá bất ngờ trước dị vật, nên nó đã đóng chặt cứng lại. Thế này thì quan hệ đường hậu môn là chuyện tuyệt đối không thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「……アナルセックスは、十分に慣らしておかないと、\n体に障害を残しかねないものだそうだ」
1028 = "「...Quan hệ đường hậu môn, nếu không tập cho quen kỹ càng, thì có thể để lại di chứng cho cơ thể đấy.」"
# 【凪】
# display as 凪
