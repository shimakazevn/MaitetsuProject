# JP: だが、今は、\n今だけはそれではあまりにも物足りなくて！
1686 = "但是，現在這點程度完全無法讓我滿足！" 

# monologue
# JP: （ずばっ！　ずばんっ！　ずぱっ！　ずぶううっ！）
2154 = "（插！插！插！插！）" 

# 【凪】
# display as 凪
# JP: 「いひゅっ！？　んっ――ひ――あっ――に――にーさ\n……んぎゅっ――まっ――まっ……ひぇっ――んうっ！」
1279 = "「呀！？哼……呀……啊……大……大哥哥……嗯……等……等……呀……嗯！」" 

# monologue
# JP: 射精衝動の望みのとおり、\n思うがままに凪を抉って、大きく強く腰を動かす。
1849 = "我把自己交給射精的衝動，大力晃腰，盡情享受。" 

# monologue
# JP: 凪は全身を大きく揺らして、\nぜえはぁと、呼吸ももはや、とぎれとぎれになっている。
1728 = "凪則全身搖晃著，呼吸都變得斷斷續續的了。" 

# 【凪】
# display as 凪
# JP: 「び、あっ！　あっ――にーさっ――にー、さんっ――ふ、\nウチ、さ――さっきの、で――おまんこ――イっ、て」
1350 = "「啊！啊……大哥哥……大哥哥……呼，咱……剛才……去了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。わかってる――\nだから、僕もっ！」
1386 = "「嗯，我知道……所以我也要！」" 

# monologue
# JP: （じゅぶっ！　ごんっ！　ぬぶりゅっ！　ごりいいっ）
# 2154 = "（插！插！插！插！）" 

# 【凪】
# display as 凪
# JP: 「ひ――あっ――のーみそ――あつ、くてっ――\nあつ、くて――ふっ――ひっ――ぐるぐる――って」
1269 = "「呀……啊……腦漿……發燙……好燙……呼……呀……在打轉」" 

# monologue
# JP: （きゅんっ！　きゅきゅきゅきゅきゅんっ！）
2178 = "（緊！緊！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！？」
1518 = "「！？」" 

# monologue
# JP: おまんこの最奥から入口付近へ。\n膣肉の締めとわななきがリレー電飾のように連鎖する。
1826 = "從最深處到最淺處，緊緻感與顫抖就像繼電器一樣一路聯通。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1290 = "「呃！」" 

# monologue
# JP: （びゅ！　びゅるう！　びゅううっ！　どびゅっ！）
# 2132 = "（呲！呲！呲！呲！）" 

# monologue
# JP: 凪の最奥。\nそこに濃厚な精子を流して、一度押し込みっ――
1858 = "我暫時將那傢伙推進裡面，在凪的最深處射出精液……" 

# monologue
# JP: （ぬりゅうううううううっ！）
# 2150 = "（拔！）" 

# 【凪】
# display as 凪
# JP: 「ふえっ！？」
1324 = "「哎！？」" 

# monologue
# JP: （ぶっ！　ぶびゅうっ！　びゅっ！　びゅううっ）
2133 = "（呲！呲！呲！呲）" 

# monologue
# JP: そして引き抜き、精子の雨をどぷどぷ降らせる。
1892 = "接著立刻拔出來，降下精子雨滴。" 

# monologue
# JP: 最早薄まり、重さも失い。\nそれでも浅ましいほどに、精子は長く、吐かれ続けて――
1987 = "精液已經變得稀薄，也沒了重量。可我的弟弟依然無恥地噴射著……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「う……あっ――」
1289 = "「呃……啊……」" 

# 【凪】
# display as 凪
# JP: 「ふぎゅっ！」
1303 = "「呼！」" 

# 【ふかみ】
# display as 深美
# JP: 「はぁぁぁぁ～～」
1302 = "「呼」" 

# monologue
# JP: （ばっしゃーーーーーん！）
2163 = "（撲通！）" 

# monologue
# JP: 三人そろって、川面に崩れる。
1836 = "我們三個一起倒在了水面。" 

# monologue
# JP: 自分の精液がぷかぷかと浮く浅瀬の水でも、\n加熱しすぎた体には、実に涼しく心地よい。
2045 = "雖然淺灘的水上漂著我的精液，但我實在是太熱了，得涼快涼快。" 

# 【ふかみ】
# display as 深美
# JP: 「はぁ……はぁ……はぁっ――は――ああ～っ」
1294 = "「呼……呼……呼……呼……啊」" 

# monologue
# JP: ふかみは、くらげのようになってる。
1939 = "深美癱倒成了水母。" 

# 【凪】
# display as 凪
# JP: 「ん……ふっ――ん……にぃ――さん」
1371 = "「嗯……呼……嗯……大哥哥」" 

# monologue
# JP: 凪はさすがの体力で、\nまっすぐ僕を見――やがてゆるゆる苦笑を浮かべる。
1754 = "凪體力驚人，盯著我……慢慢露出了苦笑。" 

# 【凪】
# display as 凪
# JP: 「にーさん、なんか――なんだか、何かに目覚めたと？\n今日は、やけにノリノリだったばい」
1409 = "「大哥哥，感覺……感覺你是不是喜歡上了什麼？今天你特別興奮」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「目覚めた――か？\nああ、そう言われれば、確かに目覚めたのかもしれんな」
1366 = "「喜歡上了什麼？哦，這麼說也確實」" 

# 【ふかみ】
# display as 深美
# JP: 「な……なに、に……んっ――目覚めた――です、か？」
1364 = "「喜、喜歡上了……什麼？」" 

# monologue
# JP: 興味を覚えてくれたのだろう。\nふかみがゆっくり、体を起こす。
1918 = "深美也慢慢坐起身來，她似乎很感興趣。" 

# monologue
# JP: それが、嬉しい。\n言葉が、心が、限りなく素直になっていく。
1844 = "我很高興。於是我的話語與內心都變得非常誠實。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「三人でいる幸福に。だ」
1448 = "「我喜歡上了三個人在一起的幸福」" 

# 【凪】
# display as 深美＆凪
# JP: 『「あっ！」\n「あっ！」』
1532 = "『「啊！」\\n「啊！」』" 

# monologue
# JP: ふかみと凪と、目を見交わして、\nふたり同時に、深く頷く。
1927 = "深美和凪彼此看了一眼，然後用力點了點頭。" 

# monologue
# JP: おなじ気持ちになれているのだと、\nただそれだけで伝わってくる。
1870 = "我能明顯感覺到，她們也深有同感。" 

# 【凪】
# display as 凪
# JP: 「確かに……確かに、今日は、三人でいるの――\nすっごく新鮮で、いつもより楽しかったばい！」
1468 = "「沒錯……是的，今天三個人在一起……很新鮮，比平時更開心！」" 

# 【ふかみ】
# display as 深美
# JP: 「それぞれでの時間を過ごしたから……\n三人での時間が、中断……少し、してたから」
1399 = "「因為老是單獨一起……最近我們三個……沒怎麼齊聚在一起了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。僕も同じだ。それゆえ、気づいた。\nふかみも凪も、それぞれとても魅力的だが――」
1459 = "「是啊，我也覺得。所以我才發現了，你們倆都很有魅力……」" 

# 【凪】
# display as 凪
# JP: 「にーさんとふたりきりも悪くなかったばい」
1493 = "「跟大哥哥兩個人獨處也不錯」" 

# 【ふかみ】
# display as 深美
# JP: 「だけど――それでも。それでもやっぱり」
1242 = "「但是……就算這樣，就算是這樣」" 

# monologue
# JP: ほんの一瞬。\nふたりが息を合わせる沈黙。
1983 = "短短一瞬，她們倆不約而同地沉默了。" 

# monologue
# JP: 僕の言葉を、そうして待っていてくれる。
2036 = "這是在等我開口。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ。三人一緒が一番楽しい。\nだから僕は。修学旅行を、もしも終えても、その後も」
1026 = "「……是啊，三個人一起更開心。所以，就算修學旅行結束了……」" 

# 【凪】
# display as 凪
# JP: 「っ！」
1015 = "「……」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄……さん」
1031 = "「……雙鐵先生」" 

# monologue
# JP: 見つめられれば、それだけで胸が騒いでしまう。\n唇までもがふるえかけ――
2010 = "見她們看著我，我心裡就癢癢的，甚至連嘴唇也開始顫抖……" 

# monologue
# JP: だから、ゆっくり。\n一言一言、大事に話す。
1885 = "所以我開始一句句地慢慢地仔細地說出自己的心裡話。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕の人生の、これからを。出来る限りに長く、一緒に。\n――凪と、ふかみと、過ごしたい」
1450 = "「我希望今後的人生能夠儘量……和你們兩個一起度過」" 

# 【ふかみ】
# display as 深美
# JP: 「そ、双鉄さん！？　それって、それって――」
1515 = "「雙、雙鐵先生！？你的意思……你的意思是……」" 

# 【凪】
# display as 凪
# JP: 「プロポーズばいっ！？」
1402 = "「在求婚！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。プロポーズだ。とはいえ、法的な面など、\nどうクリアしていけばいいのか、まだ具体的には――」
1427 = "「對啊，就是求婚。不過法律那邊是個問題，具體怎麼做還不清楚……」" 

# 【ふかみ】
# display as 深美
# JP: 「そんなのっ！」
1258 = "「別管啦！」" 

# 【凪】
# display as 凪
# JP: 「どぎゃんとでもなるばーい！」
1511 = "「那都是小事！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おお！」
1379 = "「嗯！」" 

# monologue
# JP: 飛び込んでくるふかみを、凪を、胸板一つで受け止める。
1864 = "我用胸口接住撲過來的深美和凪。" 

# monologue
# JP: 三人重なりあってる鼓動が、\n言葉以上の答えを僕に、伝えてくれる。
1667 = "三個人的心跳聲疊在一起，我能感到無聲的回答。" 

# 【ふかみ】
# display as 深美
# JP: 「そんなのほんとに、絶対にどうにでもなりますよ！\n三人寄れば[もんじゅ,1]文殊の知恵――っていいますし」
1503 = "「這種事情肯定可以解決的！常言道，三個臭皮匠賽過諸葛亮」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　三人でモンジャ焼きばい！」
1464 = "「是的！咱們一起做皮匠吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「もう凪ちゃんったら～！」
1429 = "「小凪真是的！」" 

# monologue
# JP: ふかみが凪を抱きしめて、\nふたりを僕が抱きあげる。
1933 = "深美抱著凪，我則抱起她們倆。" 

# monologue
# JP: そして三人、めちゃくちゃ笑って、\n手当たりしだいのキスをする。
1837 = "我們三個放聲大笑著，放肆親吻著。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ああ――僕たちは、これでいいんだ）
2167 = "（是啊……我們就應該這樣）" 

# monologue
# JP: そう理解して、確信する。\n凪と、ふかみと、それから、僕と。
1856 = "我是這樣想的，也是這樣相信的。凪，深美，還有我。" 

# monologue
# JP: 僕らはこれからも三人で、\nずっとずうっと――笑顔と時間を、重ねてく。
1838 = "我們今後也將永遠永遠三個人……永遠歡笑，永遠在一起。" 
