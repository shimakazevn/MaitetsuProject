# 【真闇】
# display as 真闇
# JP: 「そうそう。それで……\n双ちゃんは、なんでこぎゃん時間に起き出したと？」
1930 = "「對了對了。所以……小雙，你為什麼這麼早起床？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪だ」
1886 = "「因為凪啊」" 

# 【真闇】
# display as 真闇
