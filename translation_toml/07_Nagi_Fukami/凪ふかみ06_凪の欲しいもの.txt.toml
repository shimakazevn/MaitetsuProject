# 【双鉄】
# display as 雙鐵
# JP: 「確かに。[ハチロクニイマル,3]8620で始発を代走するのでもなければ、\nこの時間には起き出さんよなぁ」
2018 = "「是啊。除非是要給８６２０的首班車代班，確實不會在這個時間起床」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、お仕事とは関係なかと？\nあ、お茶、飲むとよねぇ？」
2172 = "「那今天和工作沒關係？啊，你要喝茶吧？」" 

# monologue
# JP: 席につくなり尋ねてくる。\nああ、ちょうど湯を沸かしていた――というか……
2575 = "我剛坐下，真闇姐便問我要不要喝茶。噢，水正好燒開了。話說回來……" 

# 【双鉄】
# display as 雙鐵
