[script]
# lines: 458 
# 【双鉄】
# display as 雙鐵
# JP: 「んっ……うぅ」
1839 = "「Ưm…… ư.」"
# monologue
# JP: ……目覚ましが鳴る前に起き出せた。\n窓の外は未だ暗い。
1230 = "……Tôi thức dậy trước khi chuông báo thức reo.\nBên ngoài cửa sổ vẫn còn tối om."
# monologue
# JP: 僕と凪とふかみとが修学旅行を始めて以降、\nハチロクは、日々姫の部屋で寝るようになったが――
2784 = "Từ khi tôi, Nagi và Fukami bắt đầu chuyến tu học,\nHachiroku đã chuyển sang ngủ ở phòng của Hibiki——"
# 【双鉄】
# display as 雙鐵
# JP: 「……鳴らしてしまえば起き出してくる。\n整備体のセンサーでも、人間以上ではあるのだろうな」
1259 = "「……Nếu để chuông reo thì cô ấy sẽ thức dậy mất.\nDù là cảm biến của cơ thể bảo trì, chắc chắn vẫn nhạy bén hơn con người.」"
# monologue
# JP: 僕の休みの日にまで気を使わせてしまうのも気の毒だ。\n目覚ましを止め、音を立てぬよう着替えて居間へと向う。
2778 = "Ngày nghỉ của tôi mà cũng bắt cô ấy phải bận tâm thì thật tội nghiệp.\nTôi tắt báo thức, rón rén thay quần áo rồi đi ra phòng khách."
# 【真闇】
# display as 真闇
# JP: 「ん？　双ちゃん？」
1866 = "「Hửm? Sou-chan?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、もう起きていたのか」
1787 = "「Trời, chị đã dậy rồi sao?」"
# 【真闇】
# display as 真闇
# JP: 「仕込みの大事な時期やけん」
2075 = "「Đang là thời điểm quan trọng để ủ rượu mà lị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「毎度のこととはいえ……大変だな」
2208 = "「Dù biết là chuyện thường tình…… nhưng vất vả cho chị quá.」"
# 【真闇】
# display as 真闇
# JP: 「そいば、うちのお仕事やけんね。\nゆーか、双ちゃんは？　こぎゃんと早くに、珍しい」
2161 = "「Thì đó là công việc của chị mà.\nMà này, Sou-chan thì sao? Dậy sớm thế này hiếm thấy nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに。[ハチロクニイマル,3]8620で始発を代走するのでもなければ、\nこの時間には起き出さんよなぁ」
2018 = "「Đúng vậy. Nếu không phải chạy thay chuyến tàu đầu tiên bằng 8620,\nthì em cũng chẳng dậy vào giờ này đâu.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、お仕事とは関係なかと？\nあ、お茶、飲むとよねぇ？」
2172 = "「Vậy là không liên quan đến công việc hả?\nA, em uống trà chứ?」"
# monologue
# JP: 席につくなり尋ねてくる。\nああ、ちょうど湯を沸かしていた――というか……
2575 = "Vừa ngồi xuống ghế là chị ấy hỏi ngay.\nA, vừa hay nước cũng đang sôi——mà khoan……"
# 【双鉄】
# display as 雙鐵
# JP: 「お茶漬けをつくるところだったのか？」
1665 = "「Chị đang định làm cơm chan nước trà à?」"
# 【真闇】
# display as 真闇
# JP: 「あら。バレちゃった。\n自分だけだし、ちょこーっとバタついてもおるし」
1789 = "「Ây da. Bị lộ mất rồi.\nVì chỉ có mình chị, vả lại cũng hơi bận bịu một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「たまにはお茶漬けも悪くないな。\nなんのお茶漬けだ？」
1686 = "「Thỉnh thoảng ăn cơm chan nước trà cũng không tệ.\nCơm chan nước trà vị gì vậy chị?」"
# 【真闇】
# display as 真闇
# JP: 「高菜でさらさら～って思うとったけど。\n双ちゃんも一緒するなら、もう一手間」
2035 = "「Chị định làm đơn giản với rau cải bẹ xanh thôi.\nNhưng nếu Sou-chan cũng ăn cùng thì chị sẽ làm cầu kỳ hơn một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは悪い。手をかけるなら僕が」
2170 = "「Vậy thì ngại quá. Nếu mất công thì để em làm cho.」"
# 【真闇】
# display as 真闇
# JP: 「よかとよ。そんなん。気分転換にもなるし、\n一人の食事より楽しくも美味しくもなるけんね」
2053 = "「Không sao đâu. Như vậy cũng là cách thay đổi không khí mà,\nvới lại ăn hai người lúc nào cũng vui và ngon miệng hơn ăn một mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、一緒にでどうだろう。\n僕も少しは手伝えるだろうし、眠気も晴らしたい」
2182 = "「Vậy thì, chúng ta cùng làm được không.\nEm cũng có thể giúp được chút ít, sẵn tiện muốn xua đi cơn buồn ngủ nữa.」"
# 【真闇】
# display as 真闇
# JP: 「うふふ、ほんならお願いしちゃおうっと」
1749 = "「Ufufu, vậy thì nhờ em nhé.」"
# monologue
# JP: 冷蔵庫から真闇姉が取り出したのは、鶏のささみ。
2695 = "Thứ chị Mayami lấy ra từ tủ lạnh là ức gà."
# 【真闇】
# display as 真闇
# JP: 「筋取りして、そぎ切りにしてくれる？」
2118 = "「Em lạng bỏ gân rồi thái lát mỏng giúp chị nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1995 = "「Đã rõ.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ウチはその間に～」
2178 = "「Vậy thì, trong lúc đó chị sẽ~」"
# monologue
# JP: 真闇姉は機嫌良さそうに高菜を刻み始める。
2700 = "Chị Mayami vui vẻ bắt đầu thái rau cải bẹ xanh."
# monologue
# JP: 小気味良い包丁の音。漂ってくる高菜の香り。\n――眠気が食欲と入れ替わっていく。
2540 = "Tiếng dao thớt lách cách vui tai. Mùi thơm của rau cải bẹ xanh thoang thoảng.\n——Cơn buồn ngủ dần nhường chỗ cho sự thèm ăn."
# 【真闇】
# display as 真闇
# JP: 「そうそう。それで……\n双ちゃんは、なんでこぎゃん時間に起き出したと？」
1930 = "「À đúng rồi. Vậy……\ntại sao Sou-chan lại dậy vào giờ này thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪だ」
1886 = "「Vì Nagi.」"
# 【真闇】
# display as 真闇
# JP: 「凪ちゃん？」
1931 = "「Bé Nagi á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。修学旅行の一環でな。\n今日は、凪とふたりで遊びにいくことになっている」
1859 = "「Ừm. Nằm trong khuôn khổ chuyến tu học.\nHôm nay, em và Nagi sẽ đi chơi cùng nhau.」"
# 【真闇】
# display as 真闇
# JP: 「こぎゃんと早くからなら――\n遠出しよると？」
2164 = "「Đi từ sớm thế này thì——\nhai đứa định đi xa hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや――っと、少しだけ待ってくれ」
1601 = "「Không——à, đợi em một chút.」"
# monologue
# JP: 全てのささみの筋の両脇に包丁を入れ終えた。
2712 = "Tôi đã dùng dao rạch hai bên gân của toàn bộ miếng ức gà."
# monologue
# JP: ならばと素早く裏返し、\n包丁で押さえるようにし、筋を一気に――引き抜いていく。
2620 = "Sau đó nhanh chóng lật ngược lại,\ndùng dao ấn xuống, rồi kéo tuột gân ra trong một nhát."
# 【真闇】
# display as 真闇
# JP: 「うふふ。お上手」
1744 = "「Ufufu. Khéo tay ghê.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に教えてもらったおかげだ」
2195 = "「Nhờ chị Mayami dạy cho cả đấy.」"
# 【真闇】
# display as 真闇
# JP: 「筋ば取れたらそぎ切りにして、\nレンジつかって蒸しちゃって」
1722 = "「Lấy gân xong thì thái lát mỏng,\nrồi cho vào lò vi sóng hấp lên nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
# 1995 = "「明白了」" 
# monologue
# JP: 皿に青ネギをしいて酒びたしにし、\nその上にフォークで穴を開けた鶏を乗せ、ラップをかける。
2580 = "Tôi lót hành lá thái nhỏ lên đĩa rồi rưới rượu lên,\nđặt miếng gà đã dùng nĩa chọc lỗ lên trên, sau đó bọc màng bọc thực phẩm lại."
# monologue
# JP: あとは三分後に裏返してさらに二分の、簡易蒸し鶏。\nこれも、真闇姉に教えてもらった一品だ。
2331 = "Hấp 3 phút rồi lật lại hấp thêm 2 phút nữa là hoàn thành món gà hấp đơn giản.\nĐây cũng là một món do chị Mayami dạy tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「となると、蒸鶏と高菜の茶漬けになるわけか」
2162 = "「Vậy là sẽ thành món cơm chan nước trà gà hấp rau cải bẹ xanh nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんとよ～、\nしかも！　ただの高菜じゃなくて、ごま高菜」
2009 = "「Đúng rồi đó~\nhơn nữa! Không phải rau cải bẹ xanh bình thường đâu, mà là rau cải bẹ xanh trộn mè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「実にいいな」
2085 = "「Tuyệt thật đấy.」"
# monologue
# JP: 真闇姉は高菜にごま油をまぶし、\nそれをじゃっ、じゃと軽く炒める。
2698 = "Chị Mayami rưới dầu mè lên rau cải bẹ xanh,\nrồi xào xèo xèo trên chảo."
# monologue
# JP: 僕の蒸し鶏ももう出来上がる。\nならば――あとはこれを茶漬けにするだけだ。
2603 = "Gà hấp của tôi cũng sắp xong rồi.\nVậy thì——chỉ việc cho lên cơm làm cơm chan nước trà nữa thôi."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、食べちゃお？\nお話の続きは、ご飯しながら」
2177 = "「Vậy thì, chúng ta ăn thôi nhỉ?\nCâu chuyện vừa rồi cứ vừa ăn vừa nói tiếp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう」
1920 = "「Đồng ý.」"
# monologue
# JP: 白米に、炒めたゴマ高菜をたっぷりと乗せ、\nさらにその上、蒸した鶏ささみをほぐし入れる。
2589 = "Xới cơm trắng ra bát, cho thật nhiều rau cải bẹ xanh xào mè lên trên,\ncuối cùng xé nhỏ ức gà hấp xếp lên trên cùng."
# 【真闇】
# display as 真闇
# JP: 「はぁい。双ちゃん」
1682 = "「Của em đây. Sou-chan.」"
# monologue
# JP: 緑茶がとぷとぷ注がれれば、\nうまそうな匂いがふわり広がる。
2716 = "Trà xanh nóng hổi được rót vào bát,\nmùi thơm hấp dẫn tỏa ra ngào ngạt."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――思わぬご馳走になったな」
1781 = "「Thế này thì——thành một bữa thịnh soạn ngoài mong đợi rồi.」"
# 【真闇】
# display as 真闇
# JP: 「うふふ。うちもこの方がうれしかと。\nそんなら、ね？　いただきます」
1747 = "「Ufufu. Chị cũng thấy vui khi làm thế này mà.\nVậy thì, nhỉ? Xin mời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。いただきます！」
1853 = "「Ừm. Em xin phép!」"
# monologue
# JP: さらさらと、サクサクと。\n上等の茶漬けをかきこむ間には、言葉も全て呑み込まれる。
2583 = "Xì xụp, sột soạt.\nTrong lúc và bát cơm chan nước trà tuyệt hảo, mọi lời nói đều bị nuốt ngược vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ、うまかった、ご馳走様」
1793 = "「——Aaa, ngon quá, cảm ơn chị vì bữa ăn.」"
# 【真闇】
# display as 真闇
# JP: 「はぁい。おそまつさま。ばってん――遠出なら、\nもっとお腹にたまるものの方がよかっとやなか？」
2105 = "「Không có chi. Cơ mà——nếu đi xa,\nthì ăn món gì chắc bụng hơn sẽ tốt hơn chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と。その話が途中だったか」
1823 = "「À. Câu chuyện lúc nãy vẫn còn đang dang dở.」"
# monologue
# JP: 食べることに夢中になって、失念していた。
2563 = "Vì mải mê ăn quá nên tôi quên khuấy mất."
# 【双鉄】
# display as 雙鐵
# JP: 「恐らく、遠出にはならんと思う。\n凪との修学旅行の舞台は、たいがい近場だ」
1958 = "「Chắc là không đi xa đâu.\nĐịa điểm tu học cùng Nagi, đa phần đều ở quanh đây thôi.」"
# 【真闇】
# display as 真闇
# JP: 「近場って……\nこぎゃんと早ぅに近場言うても――」   
2204 = "「Quanh đây á……\nĐi sớm thế này mà ở quanh đây thì——」"
# monologue
# JP: みなまで聞かずとも頷いている。\nこの時間、御一夜で営業しているのはコンビニだけだ。
2598 = "Không cần nghe hết câu tôi cũng gật đầu đồng ý.\nGiờ này, ở Ohimitera chỉ có cửa hàng tiện lợi là mở cửa thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪との修学旅行は、\nいつも計画無しで、凪のしたいことに付き合うのだが」
1968 = "「Chuyến tu học cùng Nagi,\nlúc nào cũng không có kế hoạch gì cả, chỉ là đi cùng để làm những việc Nagi muốn thôi.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
1847 = "「Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「たいがいは剣術修行からの町歩き――とか、\nそんな感じだ。ゆえ、早朝からでも問題はない」
1892 = "「Đại loại là luyện kiếm xong rồi đi dạo quanh thị trấn——\nkiểu kiểu vậy. Nên có bắt đầu từ sáng sớm cũng không vấn đề gì.」"
# 【真闇】
# display as 真闇
# JP: 「問題なかかかもしれんけど――\n修行やらも、もっと明るくなってからでも」
1684 = "「Tuy là không vấn đề gì nhưng——\nluyện kiếm thì đợi trời sáng hơn chút nữa cũng được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『せっかくのウチの日やけん、めいっぱい遊ばんと！』\nと、凪が希望するのだ。ゆえ、早朝からになる」
1240 = "「'Hiếm hoi lắm mới tới ngày của em, phải chơi cho đã đời mới được!'\nNagi đã yêu cầu như vậy đấy. Nên mới bắt đầu từ sáng sớm.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、かわゆかとねぇ。\nほんなら、夜もめいっぱいまで？」
1791 = "「Ây da, dễ thương ghê.\nVậy là chơi cho đến tận đêm muộn luôn hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「門限があるからな。そう遅くはならんが――\n[にじゅういちじ,3]2100ギリギリに駆け足で送ることも少なくはない」
2076 = "「Có giờ giới nghiêm mà. Nên cũng không đến nỗi quá muộn——\nnhưng cũng không ít lần em phải hớt hải đưa con bé về nhà sát nút 21:00.」"
# 【真闇】
# display as 真闇
# JP: 「剣術修行やら街歩きやらで、夜の九時まで！」
1591 = "「Luyện kiếm rồi đi dạo thị trấn, đến tận 9 giờ tối lận!」"
# monologue
# JP: 何故か、真闇姉が目を丸くする。\n特段に、変わったこととも思わんのだが――
2690 = "Chẳng hiểu sao, chị Mayami lại tròn xoe mắt ngạc nhiên.\nTôi thì chẳng thấy có gì đặc biệt kỳ lạ cả——"
# 【双鉄】
# display as 雙鐵
# JP: 「途中で、食事などもするしな。\nそれに、凪は好奇心旺盛で、何でも首を突っ込むから」
1618 = "「Giữa chừng cũng có đi ăn uống nữa mà.\nHơn nữa, Nagi lại tò mò tọc mạch, chuyện gì cũng xía mũi vào.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんも、それに付き合うと？」
1933 = "「Sou-chan cũng hùa theo con bé hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「付き合ったり、ブレーキをかけたりだ。\nなんだかんだで、一日などすぐに過ぎてしまう」
2032 = "「Lúc thì hùa theo, lúc thì kìm hãm lại.\nNói chung là, một ngày trôi qua nhanh lắm.」"
# 【真闇】
# display as 真闇
# JP: 「うふふふふ」
1743 = "「Ufufufufu.」"
# monologue
# JP: 真闇姉が笑う。\n幸せそうに、満足そうに。
2702 = "Chị Mayami bật cười.\nTrông thật hạnh phúc, thật mãn nguyện."
# monologue
# JP: あたたかな目が、僕を捉える。\n出来の悪い弟をほめる姉、きっとそのものの眼差しが。
2523 = "Ánh mắt ấm áp của chị nhìn tôi.\nÁnh mắt của một người chị đang khen ngợi đứa em trai vụng về, chắc chắn là vậy."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、双ちゃんの修学旅行。\nちゃあんと、学びを修めておるとねぇ」
2081 = "「Vậy là, chuyến tu học của Sou-chan.\nĐã học hỏi được đàng hoàng rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　学びを修める、とは――」
1864 = "「Hửm? Học hỏi được, là sao——」"
# 【真闇】
# display as 真闇
# JP: 「そいば、目的でしょ？　笑ったり泣いたりが苦手な\n双ちゃんに、修学旅行を重ねることで、教えてあげる」
1668 = "「Đó chẳng phải là mục đích sao? Thông qua những chuyến tu học,\nđể dạy cho Sou-chan - người không giỏi thể hiện cảm xúc cười khóc - biết cách bộc lộ cảm xúc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2022 = "「À.」"
# monologue
# JP: 言われてみると、当初の目標は確かにそれだった。
2774 = "Chị ấy nói tôi mới nhớ, mục tiêu ban đầu đúng là vậy."
# monologue
# JP: いつの間に、修学旅行という日常が、\nすっかり僕の一部になって、失念していた。
2336 = "Từ lúc nào, những chuyến tu học thường nhật này,\nđã hoàn toàn trở thành một phần của tôi, khiến tôi quên béng mất. Nhưng mà."
# 【真闇】
# display as 真闇
# JP: 「特別なイベント無しに、まる一日を楽しく過ごせる。\nそいば、遊びを、双ちゃんが楽しめるようになったから」
2116 = "「Có thể trải qua một ngày trọn vẹn vui vẻ mà không cần sự kiện gì đặc biệt.\nĐó là vì Sou-chan đã biết cách tận hưởng niềm vui rồi đấy.」"
# monologue
# JP: でしょ？　と、真闇姉の目が問いかけてくる。\nにこにこと――本当に幸せそうな微笑みで。
2697 = "Phải không? Ánh mắt chị Mayami như đang hỏi tôi vậy.\nMỉm cười——một nụ cười thực sự hạnh phúc."
# monologue
# JP: 自然と、僕も幸せになる。\nありがたいなと、ただただ素直にしみじみ思う。
2566 = "Tự nhiên, tôi cũng cảm thấy hạnh phúc lây.\nChỉ biết thành tâm cảm thấy biết ơn sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「なのだろうな。自覚は無いが。\n真闇姉の目から見て、どうかな？　僕は、変わったか？」
1959 = "「Chắc là vậy rồi. Dù em không tự nhận thức được.\nNhưng dưới góc nhìn của chị Mayami thì sao? Em, có thay đổi không?」"
# 【真闇】
# display as 真闇
# JP: 「変わったとよ。まっこと良か方向に。\nばってん、一番心配なとこだけは、変わっとらんけど」
2077 = "「Thay đổi rồi chứ. Theo hướng tốt lên hẳn.\nNhưng mà, duy chỉ có chỗ đáng lo nhất là vẫn chưa thay đổi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一番心配なところ？」
1672 = "「Chỗ đáng lo nhất?」"
# 【真闇】
# display as 真闇
# JP: 「誰かのために、頑張りすぎるところ。\n自分を、あんまり大切にできんところ」
2066 = "「Cái tính cố gắng quá sức vì người khác.\nVà không biết trân trọng bản thân mình ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いや」
1876 = "「A——không.」"
# monologue
# JP: 確かに、以前はそうだった。
2568 = "Đúng là, trước kia tôi từng như vậy."
# monologue
# JP: 自分自身を無価値と感じ、誰かの指示をこなすことで、\nその虚しさを、おそらく埋めようとしてしまっていた。が。
2751 = "Cảm thấy bản thân vô giá trị, nên cố gắng làm theo chỉ thị của người khác,\nđể lấp đầy sự trống rỗng đó. Nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「今は、違うさ。\n僕は、僕を大事にしている」
2074 = "「Bây giờ, khác rồi.\nEm đang rất trân trọng bản thân mình.」"
# 【真闇】
# display as 真闇
# JP: 「そ？」
2026 = "「Thật sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「遊びを楽しむことは、自分を大事にすることだろう。\n凪とふかみとの修学旅行を、僕は、大いに楽しんでいる」
1626 = "「Tận hưởng niềm vui khi đi chơi cũng là trân trọng bản thân mà.\nEm đang rất tận hưởng chuyến tu học cùng Nagi và Fukami đấy.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、よかけど――」
2184 = "「Nếu vậy thì tốt rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと、いささかのんびりしすぎたな」
1796 = "「Ái chà, có vẻ em đã hơi thong thả quá đà rồi.」"
# monologue
# JP: 時計の針は04:30を回っている。
2555 = "Kim đồng hồ đã chỉ qua 4:30."
# monologue
# JP: 今から身支度を整えて――\n05:00の待ち合わせに、もうギリギリとなってしまった。
2666 = "Giờ mới bắt đầu sửa soạn——\nthì chắc sát nút giờ hẹn 5:00 mất."
# 【双鉄】
# display as 雙鐵
# JP: 「ご馳走様。おいしかったしほっとした。\nそれでは、気をつけていってくる」
1897 = "「Cảm ơn chị vì bữa ăn. Rất ngon và ấm bụng.\nVậy em đi đây, chị ở nhà nhé.」"
# 【真闇】
# display as 真闇
# JP: 「あ、双ちゃん」
1826 = "「A, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1869 = "「Hửm?」"
# monologue
# JP: 真闇姉は何かをいいかけ、珍しいことに口ごもる。
2692 = "Chị Mayami định nói gì đó, nhưng hiếm khi lại ngập ngừng."
# monologue
# JP: 唇をしばし、もにもに動かし、\nやがてどこか、困ったような笑みを浮かべる。
2517 = "Đôi môi mấp máy một lúc,\nrồi cuối cùng nở một nụ cười có vẻ hơi bối rối."
# 【真闇】
# display as 真闇
# JP: 「『ご安全に』で、よかと？\n双ちゃんのお仕事の挨拶は」
1244 = "「'Chú ý an toàn', đúng không?\nCâu chào hỏi khi làm việc của Sou-chan ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。よかと、だ。\n真闇姉も、ご安全に。よい乗務を」
1854 = "「Ừm. Đúng rồi.\nChị Mayami cũng vậy, chú ý an toàn nhé. Chúc chị một ca trực tốt lành.」"
# 【真闇】
# display as 真闇
# JP: 「うん。ほんなら。\n『ご安全に、良か乗務を』！」
1860 = "「Ừm. Vậy thì.\n'Chú ý an toàn, ca trực tốt lành' nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
1741 = "「Hự!」"
# monologue
# JP: これは――どうだ、間に合う――かっ！？
2760 = "Thế này——sao đây, có kịp——không!?"
# 【凪】
# display as 凪
# JP: 「あ、にーさん！」
1824 = "「A, anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、ギリギリになってしま――っ\nごほっ！　げほっ！」
1988 = "「Xin lỗi, anh tới sát giờ qu——\nKhụ! Khụ khụ!」"
# 【凪】
# display as 凪
# JP: 「わー！　にーさん慌てすぎばい！\nとにかく座って――今、麦茶出すけん！！」
1783 = "「Oa! Anh hai vội vàng quá đi!\nCứ ngồi xuống đã——em lấy trà lúa mạch cho anh đây!!」"
# monologue
# JP: 凪に引かれて、鍛冶店内――\n蓑笠老人の定位置になっている椅子にこしかける。
2438 = "Bị Nagi kéo vào trong tiệm rèn——\ntôi ngồi xuống chiếc ghế vốn là chỗ ngồi quen thuộc của ông Minokasa."
# 【凪】
# display as 凪
# JP: 「はい！　麦茶ばい！」
1681 = "「Đây! Trà lúa mạch đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「（んくっ――ごくっ――ゴクッ――）\nぷあっ！　あー……あ――すまん。慌てた。助かった」
2222 = "「(Ực——ực——ực——)\nPhù! A... a——xin lỗi nhé. Anh vội quá. Cứu mạng rồi.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと慌てることなかと――……あうっ、\nええと――なかったのに、です」
1607 = "「Anh đâu cần phải vội vàng thế——……a u,\nà ừm——đâu cơ chứ, desu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「“です”」
1237 = "「'Desu'.」"
# monologue
# JP: なんだ、それは。
2772 = "Gì thế kia."
# monologue
# JP: 僕の隣に座る凪を、\n一息ついてまじまじと見て。そうした上で、また思う。
2577 = "Tôi thở phào một hơi rồi nhìn chằm chằm Nagi\nđang ngồi bên cạnh. Sau đó, tôi lại nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「いったいどうした」
1662 = "「Rốt cuộc là em bị sao vậy.」"
# monologue
# JP: 見ているものが、聞いている言葉が把握できない。
2650 = "Tôi không thể nắm bắt được những gì mình đang nhìn thấy, những lời mình đang nghe."
# monologue
# JP: 凪は凪だが、普段どおりの凪ではない。\nどうしていいか、わからなくなる。
2535 = "Nagi vẫn là Nagi, nhưng không phải là Nagi của ngày thường.\nLàm tôi chẳng biết phải làm sao."
# 【凪】
# display as 凪
# JP: 「あれ？　この格好、おかしかと――はあうっ――\nおかしい、です？」
1759 = "「Ủa? Trang phục này, kỳ cục hả——hauu——\nkỳ cục, desu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、格好は素晴らしい。\n大変に凪らしい上に、普段と違ったかわいらしさがある」
1604 = "「Không, trang phục tuyệt lắm.\nRất hợp với Nagi, lại còn có nét dễ thương khác với ngày thường nữa.」"
# 【凪】
# display as 凪
# JP: 「普段と違ったかわいらしさ！？」
2119 = "「Nét dễ thương khác với ngày thường!?」"
# monologue
# JP: 声が弾む。
2527 = "Giọng nói hào hứng hẳn lên."
# monologue
# JP: それだけでグっと凪らしくなり、\nなんだか無性にホっとする。
2324 = "Chỉ cần vậy thôi là lại mang đậm chất Nagi rồi,\ntự dưng tôi thấy nhẹ nhõm hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「女の子らしい、というのかな。\n無論、凪がかわいい女の子だと僕は知っているが――」
2160 = "「Nói là nữ tính hơn chăng.\nTất nhiên, anh luôn biết Nagi là một cô bé dễ thương rồi——」"
# 【凪】
# display as 凪
# JP: 「はうっ///」
1816 = "「Hauu///」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪らしいボーイッシュさの上、さり気ない女性らしさが\n――いや、少女らしい清潔感が重なっている」
1888 = "「Trên nền sự tomboy đậm chất Nagi, lại điểm xuyết thêm nét nữ tính nhẹ nhàng\n——à không, là sự thanh khiết của một thiếu nữ mới đúng.」"
# monologue
# JP: 「少年じみた少女」ではなく、\nおしゃれな少女が、あえてしているボーイッシュ。
2334 = "Không phải là 'thiếu nữ mang dáng dấp thiếu niên',\nmà là một thiếu nữ sành điệu, cố tình chọn phong cách tomboy."
# monologue
# JP: 凪は変わらず、凪であるのに――\nけれど受け取る印象が、目が覚めるほどに変化している。
2382 = "Nagi vẫn không thay đổi, vẫn là Nagi——\nNhưng ấn tượng mang lại đã thay đổi đến ngỡ ngàng."
# 【双鉄】
# display as 雙鐵
# JP: 「センスが良い、とはこのこと――\nああ、日々姫にでも、服を見てもらったのか？」
1942 = "「Đây chính là cái gọi là có gu thẩm mỹ đó——\nÀ, em nhờ Hibiki xem giúp trang phục hả?」"
# 【凪】
# display as 凪
# JP: 「ううん！　日々ねーちゃんじゃなくって、\n稀咲ねーちゃんに見てもらったとば――あうっ――です」
1603 = "「Dạ không! Không phải chị Hibiki,\nmà là nhờ chị Kisaki xem giúp——a u——desu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲にか。そういえば、\n礼儀作法の指導を受けに行くと言っていたな」
2099 = "「Kisaki sao. Nhắc mới nhớ,\nem từng bảo sẽ đi nhờ hướng dẫn về lễ nghi phép tắc mà nhỉ.」"
# monologue
# JP: それで、繋がる。
2770 = "Ra là vậy, mọi chuyện đã kết nối lại với nhau."
# monologue
# JP: 今日の凪が垢抜けている理由と同時に、\n言葉の方が、どうにもギクシャクしている理由も。
2597 = "Lý do hôm nay Nagi trông sành điệu hơn, đồng thời\ncũng là lý do tại sao cách ăn nói lại cứ gượng gạo thế kia."
# monologue
# JP: （そうかそうか。日々姫の日々姫語は、\nなるほど、稀咲の指導の産物であったのか）
2810 = "(Ra là vậy ra là vậy. Ngôn ngữ Hibiki của Hibiki,\nthì ra là sản phẩm từ sự hướng dẫn của Kisaki sao)"
# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃんしてニヤニヤしとー……です？」
1913 = "「Anh hai, sao anh cứ cười tủm tỉm hoài vậy…… desu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、まずは聞かせてくれ。\nいったい稀咲から、どのような指導を受けたのだ？」
2103 = "「Mà thôi, trước tiên kể anh nghe đi.\nRốt cuộc em đã được Kisaki hướng dẫn những gì vậy?」"
# 【凪】
# display as 凪
# JP: 「あ……そいば――ですね」
1811 = "「A…… cái đó thì——desu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……ふむ。……なるほど。ＴＰＯか」
1842 = "「Hừm…… hừm. ……Ra là vậy. TPO sao.」"
# monologue
# JP: 時と場所と場合とをわきまえる。\nその上で、無理な背伸びをせずに振る舞う。
2539 = "Biết phân biệt thời gian, địa điểm và hoàn cảnh.\nTrên cơ sở đó, cư xử một cách tự nhiên không gồng mình."
# monologue
# JP: （しかし……そうか。\nその指導の上で、か――）
2805 = "(Nhưng mà…… ra là vậy.\nLà dựa trên sự hướng dẫn đó sao——)"
# 【凪】
# display as 凪
# JP: 「な、なんねにーさん。\nニヤニヤして、ウチのことじろじろ見て――です」
1949 = "「S-sao vậy anh hai.\nCứ cười tủm tỉm, rồi nhìn chằm chằm em——desu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　ただ、本当にかわいらしいと思ってな」
2055 = "「Không có gì đâu? Chỉ là anh thấy em thực sự rất dễ thương thôi.」"
# 【凪】
# display as 凪
# JP: 「はうううっ」
1837 = "「Hauuu.」"
# monologue
# JP: “時と場所と場合”それをわきまえた結果と思えば、\n凪の服装がますます嬉しい。
2330 = "Nếu nghĩ rằng đây là kết quả của việc phân biệt 'thời gian, địa điểm và hoàn cảnh',\nthì trang phục của Nagi càng làm tôi vui hơn nữa."
# monologue
# JP: 僕とふたりでの修学旅行を、\n凪は大事に思ってくれていると実感できる。
2601 = "Tôi có thể cảm nhận rõ ràng rằng,\nNagi rất coi trọng chuyến tu học chỉ có hai người chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「さすがは稀咲だな。いまの凪に、\nまさしくピッタリの服装であり、指導だと思う」
1597 = "「Quả không hổ danh Kisaki. Anh nghĩ đây là trang phục\nvà sự hướng dẫn hoàn toàn phù hợp với Nagi hiện tại.」"
# 【凪】
# display as 凪
# JP: 「やっぱり！？　にーさんもそぎゃん思うと――です？」
2089 = "「Thật hả!? Anh hai cũng nghĩ vậy——desu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、標準語・敬語指導はいただけないな。\nばい、を、です、に変換するのは、凪には合わん」
1650 = "「Nhưng việc hướng dẫn tiếng phổ thông và kính ngữ thì không ổn lắm.\nViệc chuyển 'bai' thành 'desu' không hợp với Nagi đâu.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと！？　――です？」
1997 = "「Thật sao!? ——desu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まったくな」
1850 = "「Ừm. Hoàn toàn không hợp.」"
# monologue
# JP: 断言する。\n凪がいささかふくれるが、そこは止むを得ぬ犠牲だろう。
2595 = "Tôi khẳng định chắc nịch.\nNagi hơi phồng má phụng phịu, nhưng đó là sự hy sinh không thể tránh khỏi."
# monologue
# JP: 日々姫のアレは、もはや完成の域にあり、\n直せばかえって、魅力を損なう気にさえなるが――
2632 = "Cái kiểu của Hibiki thì đã đạt đến cảnh giới hoàn thiện rồi,\nnếu sửa lại có khi còn làm mất đi sức hấp dẫn cũng nên——"
# 【双鉄】
# display as 雙鐵
# JP: 「隈元弁をいちいち変換するので、余計な一手間が入る。\n言葉も、つっかかってしまいがちになるだろう」
1678 = "「Cứ phải chuyển đổi từng chút một từ giọng Kumamoto, nên mất thêm công đoạn thừa thãi.\nCách nói chuyện cũng sẽ dễ bị vấp váp hơn đúng không.」"
# 【凪】
# display as 凪
# JP: 「あ！　うん！　そぎゃんと、です」
1818 = "「A! Vâng! Đúng vậy, desu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、誰かをお手本とし、\nその敬語を丸呑みして覚えてしまうのが、凪には合おう」
1981 = "「Vì vậy, lấy ai đó làm tấm gương,\nrồi học thuộc lòng nguyên xi kính ngữ của người đó sẽ hợp với Nagi hơn đấy.」"
# 【凪】
# display as 凪
# JP: 「ウチ――わたしもそう思ったです、から、\nハチロクを先生にしようとして」
1765 = "「Em——em cũng nghĩ vậy desu, nên,\nmới định nhờ Hachiroku làm giáo viên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクでは[おおぎょう,1]大仰にすぎよう。\nゆえに、稀咲を真似るものかと思っていた、が――」
1691 = "「Hachiroku thì hơi quá phô trương.\nNên anh mới nghĩ em sẽ bắt chước Kisaki, nhưng mà——」"
# monologue
# JP: しかし、こうなって考えてみると、\n稀咲の言葉づかいにも、際立った特徴がありすぎる。
2352 = "Tuy nhiên, nghĩ lại thì,\ncách dùng từ của Kisaki cũng có quá nhiều đặc trưng nổi bật."
# monologue
# JP: 凪が使えば、あれもまた身に合わぬものとなろう。\nならば――なら、ば…………ああ！
2668 = "Nếu Nagi dùng, chắc chắn cũng sẽ không phù hợp với bản thân con bé.\nNếu vậy——nếu vậy thì………… a!"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットを見習うのがいい。\n凪との接点も多いうえ、実にクセのない標準語だ」
1740 = "「Em học theo Paulette là tốt nhất.\nVừa tiếp xúc với Nagi nhiều, tiếng phổ thông lại rất chuẩn mực không bị pha tạp.」"
# 【凪】
# display as 凪
# JP: 「ん……ポーねーちゃんを真似っ子するとね？　\nあー、あー――『こんな感じで、いいですか？』」
1844 = "「Ưm…… bắt chước chị Paulette hả? \nA, a——'Như thế này, có được không ạ?'」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　いいな。実にいい」
1848 = "「À! Được đấy. Rất tuyệt.」"
# monologue
# JP: こう言ってしまっては申し訳ないような気もするが、\nやはり凪は、頭ではなく、体で覚えていく[たち,1]性質だろう。
2785 = "Nói ra thì có vẻ hơi có lỗi,\nnhưng quả nhiên Nagi là kiểu người học bằng cơ thể chứ không phải bằng đầu óc."
# monologue
# JP: ワンクッションいる変換よりも、\nいっそまるごとコピーの方が、早く正確に身につく筈だ。
2736 = "So với việc phải qua một bước chuyển đổi,\nthì thà copy nguyên xi sẽ học nhanh và chính xác hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「予想より遥かになめらかだ。\nまるで、帝都生まれの帝都育ちの者の言葉と聞こえるぞ」
2142 = "「Trôi chảy hơn anh tưởng nhiều đấy.\nNghe cứ như lời của một người sinh ra và lớn lên ở Đế Đô vậy.」"
# 【凪】
# display as 凪
# JP: 「『うふふ、ほめすぎですよ、双鉄くん。\nわたし、ちょっと照れちゃいます』」
1239 = "「'Ufufu, anh khen quá lời rồi, anh Soutetsu.\nEm thấy hơi ngại đấy ạ.'」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい。その調子でポーレットを見て真似して、\n敬語・標準語を学んでいくとよかろう」
1917 = "「Tuyệt vời. Cứ theo đà đó mà nhìn Paulette rồi bắt chước,\nhọc kính ngữ và tiếng phổ thông là được rồi đấy.」"
# 【凪】
# display as 凪
# JP: 「『はい。わかりました』」
1242 = "「'Vâng ạ. Em hiểu rồi.'」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、今は――」
1611 = "「Nhưng mà, bây giờ thì——」"
# monologue
# JP: 手を伸ばし、凪の頭に手のひらをおく。
2570 = "Tôi đưa tay ra, đặt lòng bàn tay lên đầu Nagi."
# monologue
# JP: いつもだったらくしゃくしゃやるが、\n今日の可愛さに敬意を表して、軽ぅく撫ぜるだけにする。
2617 = "Bình thường thì tôi sẽ vò rối tung lên,\nnhưng để bày tỏ sự tôn trọng với vẻ đáng yêu hôm nay, tôi chỉ nhẹ nhàng vuốt ve thôi."
# 【凪】
# display as 凪
# JP: 「はぅっ」
1817 = "「Hauu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――敬語も標準語もいらん。\n普段通りの凪でいてくれ」
1658 = "「——Không cần kính ngữ hay tiếng phổ thông đâu.\nCứ là Nagi như mọi khi đi.」"
# 【凪】
# display as 凪
# JP: 「どうしてばい？」
2067 = "「Tại sao vậy?」"
# monologue
# JP: 普段の凪だ。\nただそれだけで嬉しくなる。
2428 = "Là Nagi của ngày thường.\nChỉ cần vậy thôi cũng đủ làm tôi thấy vui rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしても何も――\n凪と僕とは、どういう関係であるか、ということだ」
1605 = "「Tại sao gì chứ——\nÝ anh là, mối quan hệ giữa Nagi và anh là gì cơ chứ.」"
# 【凪】
# display as 凪
# JP: 「どういう関係……って……」
1628 = "「Mối quan hệ gì…… là sao……」"
# monologue
# JP: ぱあっと、凪が赤くなる。\nとたんに胸がドキリと騒ぐ。
2452 = "Gương mặt Nagi bỗng chốc đỏ bừng.\nNgay lập tức, tim tôi đập thình thịch."
# monologue
# JP: 今日に凪のかわいらしさとあいまって……ああ、いかん。\n言葉がそれ以上出て来ぬほどに、ただ、かわいらしい。
2491 = "Kết hợp với vẻ đáng yêu của Nagi hôm nay…… A, không ổn rồi.\nĐáng yêu đến mức tôi không thể thốt nên lời nào nữa."
# 【凪】
# display as 凪
# JP: 「ウチ、と――にーさん、は……その……こ、こ――\nこぎゃんと仲良し！　とっても仲良し……で――あ！」
1773 = "「Em, và——anh hai, là…… ừm…… r-rất——\nrất thân thiết! Cực kỳ thân thiết…… luôn——A!」"
# monologue
# JP: ニカっと、笑顔。
2530 = "Một nụ cười rạng rỡ."
# monologue
# JP: はにかみが吹き飛んでしまったのは惜しいが、\n実に凪らしく爽快だ。
2384 = "Dù hơi tiếc nuối vì vẻ bẽn lẽn đã bay biến mất,\nnhưng sự sảng khoái này mới thực sự mang đậm chất Nagi."
# 【凪】
# display as 凪
# JP: 「ウチとにーさんとふかみちゃんは、\n修学旅行の仲間ばい！！」
1775 = "「Em, anh hai và Fukami,\nlà những người bạn đồng hành trong chuyến tu học mà lị!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。では――修学旅行の仲間に対して、敬語で話す。\nこれを、ＴＰＯをわきまえた振る舞いだと感じるか？」
2011 = "「Đúng vậy. Thế thì——nói chuyện bằng kính ngữ với bạn đồng hành trong chuyến tu học.\nEm có cảm thấy đây là cách cư xử biết phân biệt TPO không?」"
# 【凪】
# display as 凪
# JP: 「感じんばい！\n敬語やらなんやら、仲良し同士ならおかしかけん！」
1608 = "「Không hề nha!\nKính ngữ hay gì gì đó, bạn bè thân thiết với nhau mà dùng thì kỳ cục lắm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、僕とふたりきりだったり、\nふかみと三人でいるときは、普段どおりが一番いい」
2056 = "「Chính xác. Vì vậy, khi chỉ có hai chúng ta,\nhay khi có cả Fukami là ba người, thì cứ như bình thường là tốt nhất.」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
1778 = "「Em hiểu rồi!」"
# monologue
# JP: スッキリと、伸びやかに。
2422 = "Thoải mái và tự nhiên."
# monologue
# JP: 普段どおりの凪が全速力で駆け戻ってきたゆえ、\n釘を刺す必要も感じてしまう。
2677 = "Vì Nagi của ngày thường đã lao về với tốc độ tối đa,\nnên tôi cũng cảm thấy cần phải rào trước một câu."
# 【双鉄】
# display as 雙鐵
# JP: 「大切なのは、使い分けだ。職場や接客対応時などには、\n敬語も使えるようになればベストだな」
2197 = "「Quan trọng là biết cách sử dụng linh hoạt. Tại nơi làm việc hay khi tiếp khách,\nnếu em có thể sử dụng được kính ngữ thì là tốt nhất đấy.」"
# 【凪】
# display as 凪
# JP: 「わかったとばい！　がんばるばい！」
1777 = "「Em hiểu rồi! Em sẽ cố gắng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その意気や良し、だ。\nで――」
2132 = "「Tinh thần như vậy là tốt.\nThế——」"
# 【凪】
# display as 凪
# JP: 「で？」
2069 = "「Thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日の修学旅行は、どうする？\nいつもの早朝は、たいがい剣術修行だが――」
1636 = "「Chuyến tu học hôm nay, chúng ta làm gì đây?\nBình thường sáng sớm đa phần là luyện kiếm thuật, nhưng mà——」"
# 【凪】
# display as 凪
# JP: 「あ」
1813 = "「A.」"
# monologue
# JP: 絶句して、凪は自分の体を見下ろす。
2424 = "Cứng họng, Nagi nhìn xuống cơ thể mình."
# monologue
# JP: 運動できなくもなかろうが、\n汗と汚れにまみれさせてしまうのはいかにも勿体ない。
2783 = "Không phải là không thể vận động,\nnhưng để mồ hôi và bụi bẩn bám đầy lên thì thật là lãng phí."
# 【凪】
# display as 凪
# JP: 「なーんも考えとらんかったばい！」
1922 = "「Em chưa nghĩ gì hết luôn á!」"
# monologue
# JP: いって、うつむき――かけたところで、\nその顔がパっと持ちあがる。
2457 = "Nói rồi, con bé định cúi gằm mặt xuống——\nnhưng gương mặt đó lại ngẩng phắt lên."
# 【凪】
# display as 凪
# JP: 「せっかくやけん、にーさんに考えてもらうとばい！\nこん格好をしたうちと、どこに行ってみたかと？」
2210 = "「Hiếm khi mới có dịp, nên anh hai nghĩ giúp em đi!\nAnh muốn đi đâu cùng với em trong trang phục này?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が……か、ふむ」
1967 = "「Anh nghĩ…… sao, hừm.」"
# monologue
# JP: ふかみとふたりの修学旅行は、\nだいたい僕が計画立案を任される。
2493 = "Trong chuyến tu học cùng Fukami,\nđa phần tôi được giao nhiệm vụ lên kế hoạch."
# monologue
# JP: そのデンで――\nと思えばすぐに、ひとつのイメージが頭に浮かぶ。
2550 = "Theo lẽ đó——\ntôi vừa nghĩ vậy thì một hình ảnh lập tức nảy ra trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「真っ先に思いつくのは、喫茶店などの類だな。\nかわいい凪を眺めつつ、のんびり過ごすのは幸福そうだ」
2030 = "「Điều anh nghĩ đến đầu tiên là những nơi như quán cà phê.\nVừa ngắm Nagi dễ thương, vừa thong thả tận hưởng thời gian, có vẻ sẽ hạnh phúc lắm.」"
# 【凪】
# display as 凪
# JP: 「おおお～！　よかとねー！\n凪さま、いちごパフェ食べたかとー！」
1880 = "「Oa oa oa~! Được đó nha!\nNagi ta đây, muốn ăn parfait dâu tây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もご馳走してやりたいが、\nあいにく、まだ時間が早すぎる」
1965 = "「Anh cũng muốn thiết đãi em lắm,\nnhưng tiếc là, thời gian vẫn còn quá sớm.」"
# 【凪】
# display as 凪
# JP: 「あっ！？　開いてるお店のなかとばい！！」
1830 = "「Á!? Làm gì có quán nào mở cửa giờ này!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。この時間、\n御一夜で飲食を扱う店は、コンビニだけしか無い」
2016 = "「Đúng vậy. Giờ này,\nở Ohimitera chỉ có cửa hàng tiện lợi là có bán đồ ăn thức uống thôi.」"
# 【凪】
# display as 凪
# JP: 「凪さま、コンビニのイートインでもよかとよ？」
2036 = "「Nagi ta đây, ăn ở khu vực ăn uống của cửa hàng tiện lợi cũng được nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、それを候補のひとつめとしよう。\nで――他には……ああ、もうすぐ始発が動くな」
2186 = "「Vậy thì, coi đó là ứng cử viên đầu tiên nhé.\nThế——còn gì nữa không…… À, chuyến tàu đầu tiên sắp chạy rồi đấy.」"
# monologue
# JP: 言えば、凪は小首を傾げる。
2456 = "Nghe vậy, Nagi hơi nghiêng đầu thắc mắc."
# 【凪】
# display as 凪
# JP: 「キハ07ば乗って、[ゆのい,1]湯医にいくと？」
1890 = "「Lên KiHa 07, đi đến Yui hả anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。[ごじさんじゅうきゅうふん,3]0539発の[いちでーれっしゃ,1]1dが0622湯医着。\n折り返しの[にーでーれっしゃ,1]2dが0629発の御一夜温泉駅0716着だ」
2021 = "「Đúng vậy. Chuyến 1D khởi hành lúc 05:39 sẽ đến Yui lúc 06:22.\nChuyến khứ hồi 2D khởi hành lúc 06:29 sẽ đến ga suối nước nóng Ohimitera lúc 07:16.」"
# 【凪】
# display as 凪
# JP: 「折り返しば乗らんで、[しちふさ,1]七房山で、\nハイキングやらピクニックやらしてもよかとね！」
1771 = "「Không đi chuyến khứ hồi, mà ở lại núi Ichifusa,\nđi bộ đường dài hay dã ngoại cũng được đó nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それもいいな。それなら、コンビニで買う\nサンドイッチなども、上等の弁当になる」
1858 = "「À, ý đó cũng hay đấy. Nếu vậy thì, sandwich mua ở cửa hàng tiện lợi\ncũng sẽ trở thành hộp bento thượng hạng.」"
# monologue
# JP: では、これが第二候補。\nもう一つ、なにか候補が欲しい。
2782 = "Vậy thì, đây là ứng cử viên thứ hai.\nTôi muốn có thêm một ứng cử viên nữa."
# monologue
# JP: 案出しのときには最低三つ。\n[とう,1]義父さんに、その教育を受けているゆえ。
2505 = "Khi đưa ra phương án thì ít nhất phải có ba cái.\nVì tôi đã được cha nuôi dạy dỗ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あとは――クマ川くだりにもまだ早すぎるし」
2168 = "「Còn lại thì——chèo thuyền trên sông Kuma cũng còn quá sớm.」"
# 【凪】
# display as 凪
# JP: 「やねぇ。\n[せみ,1]瀬見の舟も、早くても七時ころの発船ばい」
2004 = "「Đúng ha.\nThuyền khảo sát cũng phải sớm nhất là tầm 7 giờ mới xuất phát.」"
# 【双鉄】
# display as 雙鐵
# JP: 「セミの船？」
2121 = "「Thuyền khảo sát?」"
# 【凪】
# display as 凪
# JP: 「瀬を見る船で、瀬見の舟ばい。\nようするに……あ！　川の[けんそく,1]検測ばする舟ばい！」
1940 = "「Thuyền đi xem xét vùng nước nông, nên gọi là thuyền khảo sát.\nTóm lại là…… A! Là thuyền kiểm tra đo đạc dòng sông đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「検測車――いや、検測舟か。\nなるほど、川の流れも、常に姿を変えると聞くしな」
1936 = "「Toa xe kiểm tra——à không, thuyền kiểm tra nhỉ.\nRa là vậy, anh cũng nghe nói dòng chảy của sông luôn thay đổi hình dạng mà.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　大雨のあととか、そぎゃんこつがなくても、\n週に一度は航路の検査で、瀬見の舟ば走るとばい！」
2006 = "「Đúng rồi! Sau những trận mưa lớn, hay dù không có chuyện gì xảy ra,\nthì mỗi tuần một lần thuyền khảo sát vẫn chạy để kiểm tra luồng lạch!」"
# 【双鉄】
# display as 雙鐵
# JP: 「叶うことならそれに同乗させてもらうのも楽しそうだが\n……しかし、時間があわぬでは仕方ないな」
1594 = "「Nếu được thì xin đi nhờ chuyến đó có vẻ cũng thú vị đấy\n……Nhưng mà, thời gian không khớp thì cũng đành chịu thôi.」"
# 【凪】
# display as 凪
# JP: 「やねー。残念。凪さま、お客さんでのーんびり川下りも\nしてみたかったとばい！」
2008 = "「Đúng ha. Tiếc ghê. Nagi ta đây, cũng muốn làm khách\nthong dong đi thuyền xuôi dòng một lần á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、なんなら午後にでもすればいい」
2126 = "「Chuyện đó, nếu muốn thì để buổi chiều làm cũng được mà.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんしても良かと！？\nそいばそいで楽しそうばい！」
1732 = "「Làm vậy cũng được hả!?\nThế thì có vẻ vui lắm đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1847 = "「嗯」" 
# monologue
# JP: そこまで興味を持ってくれるとは思わなかった。\nというか、ならば、だ。
2656 = "Tôi không ngờ con bé lại hứng thú đến vậy.\nMà nếu đã vậy, thì."
# 【双鉄】
# display as 雙鐵
# JP: 「のんびり見学がお好みならば――ナビはどうだ？」
1990 = "「Nếu em thích thong dong ngắm cảnh——thì Navi thế nào?」"
# 【凪】
# display as 凪
# JP: 「おおお！　飛行機から御一夜の町を見下ろすとばい！？\nそいも楽しそうばい！！」
1878 = "「Oa oa oa! Ngắm nhìn thị trấn Ohimitera từ trên máy bay hả!?\nNghe cũng vui lắm nha!!」"
# monologue
# JP: そういって凪は立ち上がり、\n店の外に出てすぐ戻ってくる。
2458 = "Nói rồi Nagi đứng dậy,\nchạy ra ngoài cửa tiệm rồi lập tức quay lại."
# 【凪】
# display as 凪
# JP: 「あれれ？　ナビすけば飛んどらんとよ」
1761 = "「Ủa ủa? Không thấy Navi bay ở ngoài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな、最近は――」
1882 = "「À. Đúng rồi, dạo gần đây thì——」"
# 【凪】
# display as 凪
# JP: 「あ！」
1819 = "「A!」"
# monologue
# JP: 凪がその目を丸くする。
2453 = "Nagi tròn xoe mắt ngạc nhiên."
# 【凪】
# display as 凪
# JP: 「言われてみたら、にーさんの頭の上ぐるぐるしとんの、\n最近あんまり見てないような気がしてきたばい！！」
2163 = "「Anh nói em mới để ý, dạo gần đây\nhình như em ít thấy nó bay vòng vòng trên đầu anh hai rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。……いつごろのことだったかな。\n僕も、気になって訪ねたことがあった。すると、ナビは」
1846 = "「Ừm. ……Khoảng bao lâu rồi nhỉ.\nAnh cũng từng thắc mắc nên đã hỏi thử. Thì Navi bảo là」"
# 【凪】
# display as 凪
# JP: 「なんてゆーたと！？」
2131 = "「Nó bảo sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『もう人間の皆様におまかせした方が安全ですので』。\nそういっていた。なんとも嬉しげな声を出してな」
2223 = "「'Bây giờ giao phó cho mọi người thì sẽ an toàn hơn'.\nCô ấy đã nói vậy. Với một giọng điệu vô cùng vui vẻ.」"
# 【凪】
# display as 凪
# JP: 「ふふーん、凪さまとふかみちゃんとがおるけんね！」
1804 = "「Hừ hừm, vì có Nagi ta đây và Fukami mà lị!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。実際にそういうことだと、僕も思う」
2024 = "「Chắc là vậy. Anh cũng nghĩ thực sự là như vậy.」"
# 【凪】
# display as 凪
# JP: 「ほえ！？」
1797 = "「Hả!?」"
# monologue
# JP: 僕の答えがよっぽど意外だったのか、\n凪はびっくりした顔をして――
2447 = "Chắc câu trả lời của tôi nằm ngoài dự đoán,\nnên Nagi lộ vẻ mặt vô cùng ngạc nhiên——"
# monologue
# JP: ああ、また可愛くなる。\nじわじわじわと、頬を赤く染め、はにかみ始める。
2531 = "A, lại trở nên đáng yêu rồi.\nĐôi má con bé từ từ đỏ ửng lên, bắt đầu bẽn lẽn."
# 【凪】
# display as 凪
# JP: 「にーさん……まっこと、\nそぎゃんと思うてくれとーと？」
1905 = "「Anh hai…… thật sự,\nanh nghĩ vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。思う。凪とふかみが――修学旅行が、\n僕を大きく変えてくれたと」
2013 = "「Ừm. Anh nghĩ vậy. Nagi và Fukami——chuyến tu học này,\nđã thay đổi anh rất nhiều.」"
# monologue
# JP: ナビがあれほど過保護に僕を見守ったのは、\nそうしなければ、恐らく僕が“僕”を放棄したから。
2822 = "Sở dĩ Navi bảo vệ tôi một cách thái quá như vậy,\nlà vì nếu không làm thế, có lẽ tôi đã vứt bỏ 'chính mình' rồi."
# monologue
# JP: 自分を失くし、ただただ言われるがままに生きる――\nそうした者になっていたからだと、今ならば思う。
2504 = "Đánh mất bản thân, chỉ biết sống rập khuôn theo những gì được bảo——\nBây giờ tôi nghĩ, đó là vì tôi đã trở thành một người như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……ナビが守ってくれたから、幼い僕は生き延びられた。\nそうして、凪とふかみとが、幼い僕を育ててくれた」
1254 = "「……Nhờ Navi bảo vệ nên anh hồi nhỏ mới có thể sống sót.\nVà rồi, Nagi và Fukami đã nuôi dưỡng anh khôn lớn.」"
# monologue
# JP: 修学旅行の日々を通じて、少しずつ。
2777 = "Thông qua những ngày tháng tu học, từng chút một."
# monologue
# JP: 同じく感じるところがあるのか、\n凪もこっくり、頷いてくれる。
2463 = "Có lẽ cũng cảm nhận được điều tương tự,\nNagi khẽ gật đầu đồng tình."
# 【双鉄】
# display as 雙鐵
# JP: 「大人になりつつある僕には、もう[うば,1]乳母は必要ない\n――そういうことであるかと思う」
2062 = "「Đối với anh đang dần trở thành người lớn, thì nhũ mẫu không còn cần thiết nữa\n——Anh nghĩ là như vậy đấy.」"
# monologue
# JP: …………しばらく待つが、ナビから異論は飛んでこない。\nならばやはり、その解釈で正しいのだろう。
1228 = "…………Tôi đợi một lúc, nhưng không thấy Navi phản bác gì.\nVậy thì chắc chắn, cách giải thích đó là đúng rồi."
# 【凪】
# display as 凪
# JP: 「やったら、凪さまも大人やけんね！\nナビすけに乗るのはよしとくばい！！」
2191 = "「Vậy thì, Nagi ta đây cũng là người lớn mà!\nSẽ không cưỡi Navi nữa đâu!!」"
# monologue
# JP: ……ナビが乳母でも、\n飛行型エアクラが乳母車というわけではあるまい。
1224 = "……Dù Navi có là nhũ mẫu,\nthì Aircra bay cũng đâu phải là xe nôi."
# monologue
# JP: が、誇らしく輝く凪の笑顔に、\n余計な言葉を、あえて混ぜたいとも思わない。
2354 = "Nhưng, trước nụ cười rạng rỡ đầy tự hào của Nagi,\ntôi không muốn chêm thêm lời thừa thãi nào làm mất vui."
# 【凪】
# display as 凪
# JP: 「ばってん……えへへ～！　ナビすけが\nそぎゃんと思うとってくれたの、嬉しかとばい！」
1647 = "「Cơ mà…… ehehe~! Navi\nnghĩ được như vậy, em vui lắm nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2025 = "「Vậy sao.」"
# 【凪】
# display as 凪
# JP: 「ウチもちょっとは、\nにーさんの役に立てておるとね～」
1767 = "「Em cũng giúp ích được cho anh hai\nmột chút xíu ha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ちょっとどころか」
1657 = "「Đâu chỉ một chút xíu.」"
# monologue
# JP: 凪の、らしくもない言葉に驚かされる。
2771 = "Lời nói không giống Nagi chút nào khiến tôi ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「凪には、いつも助けられている。修学旅行はもちろん、\n仕事においても、クマ川くだりの手伝いなどでも」
1961 = "「Anh lúc nào cũng được Nagi giúp đỡ mà. Chuyến tu học thì khỏi bàn rồi,\ncả trong công việc, hay việc phụ giúp chèo thuyền trên sông Kuma nữa.」"
# 【凪】
# display as 凪
# JP: 「なら、うれしかとばい」
2183 = "「Vậy thì, em vui lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪？」
1715 = "「Nagi?」"
# monologue
# JP: いつも見ている凪と違う。
2462 = "Khác với Nagi mà tôi vẫn thường thấy."
# monologue
# JP: 服装うんぬんのことだけではなく、\n表情もいつになく大人びて――いや……
2591 = "Không chỉ là chuyện trang phục,\nmà biểu cảm cũng chững chạc hơn mọi khi——à không……"
# monologue
# JP: （いつもは凪と……\nこんな風には、じっくりと向き合っていなかったな）
2818 = "(Bình thường tôi và Nagi……\nđâu có đối mặt trò chuyện kỹ càng thế này đâu nhỉ)"
# monologue
# JP: 機関士と機関助士として。剣術の稽古をつけながら。\nあるいは、クマ川下りの船上で――
2747 = "Với tư cách là người lái tàu và phụ lái tàu. Trong lúc luyện tập kiếm thuật.\nHoặc là, trên con thuyền xuôi dòng sông Kuma——"
# monologue
# JP: 凪との時間は、どこであろうとどんな形であろうとも、\nいつでも常に、動きとともに経過していた。
2663 = "Thời gian bên Nagi, dù ở đâu hay dưới hình thức nào,\nlúc nào cũng trôi qua cùng với những hoạt động không ngừng nghỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「凪」
1694 = "「Nagi.」"
# monologue
# JP: それゆえきっと、僕は多くを見逃していた。\n凪が大人へ近づいていく、大事なひとときひとときさえも。
2326 = "Vì thế chắc chắn tôi đã bỏ lỡ rất nhiều thứ.\nNgay cả những khoảnh khắc quan trọng khi Nagi đang dần trưởng thành."
# monologue
# JP: そう感じたなら――\n凪ともっと、向き合いたくなる。
2562 = "Khi đã cảm nhận được điều đó——\ntôi lại càng muốn đối mặt với Nagi nhiều hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「なにか、あったか？　あるいはなにか――\n気がかりになっていることでもあるのか？」
2080 = "「Có chuyện gì sao? Hoặc là có điều gì——\nđang khiến em bận tâm à?」"
# 【凪】
# display as 凪
# JP: 「えっ！？　いや、別に、なんにもなかとばい！」
1762 = "「Hả!? Không, không có, em chẳng có chuyện gì hết!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにもないなら一番良いし、\nもしも話したくないなら、無理には聞かん。が――」
2054 = "「Không có chuyện gì thì là tốt nhất,\ncòn nếu em không muốn nói thì anh cũng không ép. Nhưng mà——」"
# monologue
# JP: そういいつつも確信している。\n間違いなく凪には、“何か”があった。
2579 = "Dù nói vậy nhưng tôi vẫn tin chắc.\nChắc chắn Nagi đang có 'chuyện gì đó'."
# monologue
# JP: その何かゆえ、恐らくは、\n礼儀作法や敬語のことも、気にし始めたのだろう。
2560 = "Và có lẽ chính vì 'chuyện gì đó' này,\nmà con bé mới bắt đầu để tâm đến lễ nghi phép tắc và kính ngữ."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、もし何かあり、話したくなったら言ってくれ。\n僕と、凪と、ふかみとは、修学旅行の仲間なのだから」
1654 = "「Nhưng mà, nếu có chuyện gì và muốn tâm sự thì cứ nói với anh nhé.\nVì anh, Nagi và Fukami là những người bạn đồng hành trong chuyến tu học mà.」"
# 【凪】
# display as 凪
# JP: 「あ」
# 1813 = "「啊」" 
# monologue
# JP: 凪の唇が結ばれる。\nとび色の目が、僕を見る。
2444 = "Nagi mím chặt môi.\nĐôi mắt màu nâu đỏ nhìn tôi."
# monologue
# JP: 何も言わずに、ただ僕を見て――\nそして、ニカっ！　と笑顔が弾ける。
2511 = "Không nói lời nào, con bé chỉ nhìn tôi——\nRồi sau đó, một nụ cười rạng rỡ nở rộ trên môi!"
# 【凪】
# display as 凪
# JP: 「にーさん、少しだけ待っとってくれる？\nウチ、道着に着替えてくるけん！」
1915 = "「Anh hai, đợi em một chút xíu nha?\nEm đi thay võ phục đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　それは構わんが――\nせっかくの可愛らしい服だというのに」
1868 = "「Hửm? Anh thì không sao——\nnhưng hiếm khi em mới mặc bộ đồ dễ thương thế này mà.」"
# 【凪】
# display as 凪
# JP: 「また今度着たげるけん！\nそんときのことば、楽しみにしとって！」
1644 = "「Lần sau em sẽ mặc cho anh xem!\nHãy mong chờ đến lúc đó nha!」"
# 【凪】
# display as 凪
# JP: 「今は凪さま！！\n体！　思いっきり動かしたか気分やけんっ！！！」
2041 = "「Bây giờ Nagi ta đây!!\nĐang có tâm trạng muốn vận động cơ thể hết mình!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ」
# 1813 = "「啊」" 
# monologue
# JP: 凪がすっくと立ち上がり、\n駆け足で奥へと消えていく。
2449 = "Nagi bật dậy,\nchạy vụt vào trong rồi khuất bóng."
# 【凪】
# display as 凪
# JP: 「チェーーーーーストーーーーっっっ！！」
1836 = "「CHEEEEEESUTOOOOOOO!!!」"
# monologue
# JP: （ばきっ！）
2812 = "（Chát!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
1805 = "「Ưm.」"
# monologue
# JP: 太刀筋がいい。迷いが無い。
2464 = "Đường kiếm rất tốt. Không hề có chút do dự nào."
# 【凪】
# display as 凪
# JP: 「どぎゃんとっ！？　にーさん」
1951 = "「Sao hả!? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今のは、今日で一番いいな。\n腕を越し、体の芯までがしびれた程だ」
1717 = "「Đường kiếm vừa rồi là tốt nhất trong hôm nay đấy.\nNó truyền qua cánh tay, làm tê rần đến tận tâm can anh luôn.」"
# 【凪】
# display as 凪
# JP: 「まっことばい！？」
2090 = "「Thật hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まことだ」
2087 = "「Thật.」"
# 【凪】
# display as 凪
# JP: 「ふっふーん、よーやっと調子出てきたばい！」
1801 = "「Hứ hừm, cuối cùng cũng lấy lại phong độ rồi!」"
# monologue
# JP: 汗を流すだけ流したせいか、\nさきほど凪に滲み出ていた顔の曇りも、薄らいでみえる。
2339 = "Có lẽ vì đã đổ mồ hôi đầm đìa,\nnên nét u ám trên gương mặt Nagi lúc nãy dường như cũng nhạt đi phần nào."
# 【凪】
# display as 凪
# JP: 「したら、もう一太刀いくとばい！」
2174 = "「Thế thì, làm thêm một hiệp nữa nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、少し休もう」
1613 = "「Không, nghỉ một lát đã.」"
# 【凪】
# display as 凪
# JP: 「えええ～っ！？」
1755 = "「Ê ê ê~!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「飛ばしすぎだ。そら」
2111 = "「Tập quá sức rồi đấy. Nhìn kìa.」"
# monologue
# JP: これはダジャレになってしまうな、と苦笑しつつも、\n竹やぶ越しの空を指差す。
2606 = "Dù đang cười gượng vì câu nói vừa rồi nghe như chơi chữ,\nnhưng tôi vẫn chỉ tay lên bầu trời phía trên rặng tre."
# 【凪】
# display as 凪
# JP: 「あー、もーお昼まわったと？\nあっという間ばい！」
1827 = "「A, đã quá trưa rồi hả?\nNhanh thật đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけ集中していたということだろう」
2136 = "「Điều đó chứng tỏ em đã tập trung đến mức nào.」"
# monologue
# JP: なにかに取り憑かれでもしていたかのように、\nあるいは、何かを振り払おうとするかのように――
2433 = "Cứ như bị thứ gì đó nhập vào,\nhay như đang cố gắng rũ bỏ điều gì đó——"
# monologue
# JP: 一心不乱に、凪は木刀を振り続けていた。\n受け手の、しかも大人の僕が疲労を感じてしまう程。
2509 = "Nagi cứ mải miết vung mộc kiếm không ngừng nghỉ.\nĐến mức một người lớn đóng vai trò đỡ đòn như tôi cũng phải cảm thấy mệt mỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、ひとまずは休め。\n木刀を置いて、手を見せてみろ」
1714 = "「Nagi, nghỉ ngơi một lát đi.\nBỏ mộc kiếm xuống, đưa tay anh xem nào.」"
# 【凪】
# display as 凪
# JP: 「わかったとばい」
2092 = "「Em biết rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……相変わらず素晴らしい手のひらだな」
1256 = "「……Lòng bàn tay vẫn tuyệt vời như ngày nào.」"
# monologue
# JP: これだけ木刀を振っているのに、傷一つ無い。\nもちもちしていて、指の付け根の肉が厚い。
2521 = "Vung mộc kiếm nhiều như vậy mà không có lấy một vết xước.\nMềm mại, phần thịt ở gốc ngón tay rất dày."
# monologue
# JP: マメをつくっては回復し――を、\n無数に繰り返した成果であるのかもしれないが。
2773 = "Có lẽ đây là thành quả của việc\nvô số lần bị chai phồng rồi lại hồi phục."
# 【凪】
# display as 凪
# JP: 「にへへ、もにもにしたらくすぐったかとばい」
1872 = "「Nihehe, anh nắn nắn vậy thấy nhột nhột á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この手があるから、\nあれだけの稽古をこなせるのだろうな」
2034 = "「Chính nhờ đôi bàn tay này,\nmà em mới có thể hoàn thành khối lượng bài tập lớn đến vậy nhỉ.」"
# monologue
# JP: 左手の次は右手を見る。\n時間をかけて慎重に見れば、凪が不思議そうに聞いてくる。
2680 = "Sau tay trái, tôi chuyển sang xem tay phải.\nThấy tôi dành thời gian xem xét cẩn thận, Nagi tò mò hỏi."
# 【凪】
# display as 凪
# JP: 「どぎゃんと？」
1950 = "「Sao vậy anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「両手ともに異常無し。だ。が――」
2209 = "「Cả hai tay đều không có gì bất thường. Nhưng mà——」"
# monologue
# JP: （ぐっ）
2819 = "（Ấn）"
# 【凪】
# display as 凪
# JP: 「いたたたたたたたたっ！？」
2079 = "「Ui da da da da da da!?」"
# monologue
# JP: ツボを押し込めば、思った以上の反応が出る。
2593 = "Khi tôi ấn vào huyệt, phản ứng của con bé còn dữ dội hơn tôi nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「やはり疲労はきているな。\nしっかりと休んだ方がいい」
1674 = "「Quả nhiên là em đang rất mệt mỏi rồi.\nNên nghỉ ngơi cho đàng hoàng đi.」"
# 【凪】
# display as 凪
# JP: 「って、今にーさん何ばしよったと？」
1908 = "「Ủa, mà nãy giờ anh hai làm gì thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、帝都の[はりい,1]鍼医にならったことがあるのだ。\n疲れを見るには、ここ――」
1800 = "「À, anh từng học được từ một thầy châm cứu ở Đế Đô.\nĐể xem mức độ mệt mỏi thì ấn vào đây——」"
# monologue
# JP: 親指と人差し指との付け根の間。\n両方の指の、骨の付け根のくぼみを再び、軽ぅく押す。
2571 = "Ở giữa gốc ngón cái và ngón trỏ.\nTôi lại nhẹ nhàng ấn vào chỗ hõm ở gốc xương của cả hai ngón tay."
# 【凪】
# display as 凪
# JP: 「あ――今度は気持ちよか」
1812 = "「A——Lần này thì dễ chịu quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここのツボが、肩の疲労に効くそうなのだ。\nゆえ、肩に疲労がたまってしまうと、敏感になる」
2159 = "「Nghe nói huyệt ở đây có tác dụng giảm mệt mỏi ở vai.\nVì vậy, khi vai bị tích tụ mệt mỏi, chỗ này sẽ trở nên nhạy cảm.」"
# 【凪】
# display as 凪
# JP: 「ほえー、指と肩とが関係あるとー。\n面白かとねー」
1785 = "「Hả, ngón tay với vai mà cũng liên quan với nhau hả.\nThú vị quá nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際、医学的にどうなのかまではしらんが、\n僕の体感としては、関連があるように思う」
1963 = "「Thực tế về mặt y học thì anh không rõ lắm,\nnhưng theo cảm nhận của bản thân, anh nghĩ là có liên quan đấy.」"
# monologue
# JP: （ぐっ）
# 2819 = "（按）" 
# 【凪】
# display as 凪
# JP: 「んふっ！」
# 1819 = "「啊！」" 
# monologue
# JP: 痛がらせぬようごく軽く、\n人差し指の骨の下へともぐりこませるように押す。
2602 = "Để con bé không bị đau, tôi ấn thật nhẹ,\nnhư thể luồn xuống dưới xương ngón trỏ."
# monologue
# JP: そのまま、五秒。\n力をぬいて二秒休ませ、また五秒。
2613 = "Cứ thế, giữ trong 5 giây.\nThả lỏng nghỉ 2 giây, rồi lại ấn 5 giây."
# 【凪】
# display as 凪
# JP: 「あー、\nなんだか肩がぽっぽしてくるみたいな気がするばい」
1807 = "「A——,\ncảm giác như vai đang nóng dần lên vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、凪にも効果があるか。\n僕らは意外と、体質が似ているのかもしれんな」
2193 = "「Vậy là cũng có tác dụng với Nagi ha.\nKhông chừng thể chất của chúng ta lại giống nhau đến bất ngờ đấy.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと！？　ならなら凪さま、\nお返しににーさんの肩も楽にしたげるばい！」
2027 = "「Thật hả!? Vậy thì Nagi ta đây,\nsẽ trả ơn bằng cách làm cho vai anh hai thoải mái luôn!」"
# monologue
# JP: （ぱっ！）
2813 = "（Bốp!）"
# monologue
# JP: さすがは凪だ。\nあっという間に手を解き、逆に僕の手を捕まえてくる。
2425 = "Quả không hổ danh Nagi.\nThoắt cái đã gỡ tay ra, rồi nắm ngược lại tay tôi."
# 【凪】
# display as 凪
# JP: 「ん……あ！　ここでよかと！？\nなかくぼみになっとるとばい！」
1841 = "「Ưm…… A! Chỗ này đúng không!?\nCó một cái hõm nè!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そこがツボだ」
1861 = "「Ừm. Chỗ đó là huyệt đấy.」"
# 【凪】
# display as 凪
# JP: 「なら押すとばい！　ぎゅーーーっ！」
2180 = "「Vậy em ấn nha! Gyuuu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1821 = "「!!!!!」"
# 【凪】
# display as 凪
# JP: 「あれ？　にーさんにはあんま効かんとばい？\nぎゅうううううっ！！！」
1757 = "「Ủa? Không có tác dụng mấy với anh hai hả?\nGyuuuuu!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――――――っっっ！！！」
1231 = "「——————!!!」"
# 【凪】
# display as 凪
# JP: 「ちぇーっ、つまらんばい！！」
1870 = "「Xùy, chán òm!!」"
# monologue
# JP: 逆、だ。逆。\nあまりに効きすぎ、キツすぎて、体が硬直してしまった。
2387 = "Ngược lại, thì có. Ngược lại.\nVì tác dụng quá mạnh, đau quá mức, nên cơ thể tôi cứng đờ cả lại."
# monologue
# JP: が――そういえば凪は調子に乗ろう。\nここは何でもないフリをして、ひとまず呼吸を落ち着ける。
2355 = "Nhưng mà——nói ra chắc Nagi lại đắc ý cho xem.\nThôi thì cứ giả vờ như không có gì, trước tiên phải điều hòa lại nhịp thở đã."
# 【双鉄】
# display as 雙鐵
# JP: 「とにもかくにも、休養だ。\n肩だけではなく、足腰全身、休ませねばな」
2112 = "「Dù sao đi nữa, giờ là lúc nghỉ ngơi.\nKhông chỉ có vai, mà cả chân, eo, toàn thân đều phải được nghỉ ngơi.」"
# 【凪】
# display as 凪
# JP: 「あ！」
# 1819 = "「啊！」" 
# monologue
# JP: 竹やぶのすみ。平たい石の上に置いていた\nコンビニ袋をひろげれば、凪もすぐさま飛んでくる。
2757 = "Góc rặng tre. Vừa mở túi đồ cửa hàng tiện lợi đặt trên tảng đá phẳng,\nlà Nagi cũng lập tức bay đến ngay."
# 【双鉄】
# display as 雙鐵
# JP: 「凪は、おかかがふたつに鮭ひとつだったな」
1679 = "「Nagi ăn hai cơm nắm cá bào, một cơm nắm cá hồi nhỉ.」"
# 【凪】
# display as 凪
# JP: 「にーさんは何にしたと？」
1909 = "「Anh hai ăn gì thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いくらとしそちりめんだ」
2216 = "「Cơm nắm trứng cá hồi và cá cơm tía tô.」"
# 【凪】
# display as 凪
# JP: 「それだけで足りると？」
2165 = "「Ăn thế thôi có đủ không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、朝もしっかり食べたしな」
2169 = "「À thì, sáng nay anh cũng ăn no rồi mà.」"
# 【凪】
# display as 凪
# JP: 「凪さまも、朝もがっつり食べたばってん、\nおむすび二個じゃもたんとばい！」
2038 = "「Sáng nay Nagi ta đây cũng ăn no căng rốn rồi,\nnhưng hai cái cơm nắm thì không bõ bèn gì đâu!」"
# monologue
# JP: いいながらもう、\nひとつ目のおにぎりをぺろりと平らげている。
2513 = "Miệng thì nói vậy,\nmà đã đánh bay cái cơm nắm đầu tiên cái vèo rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「伸び盛りだなぁ」
1675 = "「Đang tuổi ăn tuổi lớn có khác.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんこつなかと！\nぜーんぜん伸びんとよ？」
1982 = "「Làm gì có chuyện đó!\nEm chẳng cao lên tí nào luôn á?」"
# monologue
# JP: なんとはなしのつぶやきを、\n妙な気迫で勢い混んで、凪がぶんぶん否定する。
2608 = "Một câu nói bâng quơ của tôi,\nlại bị Nagi phủ nhận kịch liệt với một khí thế kỳ lạ."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんとの身長差、\n去年からちょっとも変わっとらんばい！」
1947 = "「Khoảng cách chiều cao với Fukami,\ntừ năm ngoái đến giờ chẳng thay đổi chút nào sất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとの？　別にふかみは関係なかろう。\n凪自身の身長が伸びていないわけではなるまい」
1753 = "「Với Fukami á? Liên quan gì đến Fukami đâu.\nChẳng lẽ chiều cao của bản thân Nagi lại không tăng lên chút nào.」"
# 【凪】
# display as 凪
# JP: 「そいばそーばってん。けど……\nやっぱり、そこんとこは気になるとばい！」
1999 = "「Cái đó thì đúng là vậy. Nhưng mà……\nQuả nhiên là, em vẫn để tâm chuyện đó lắm!」"
# monologue
# JP: （ああ――）
2814 = "(À——)"
# monologue
# JP: そうか――\n凪にとってふかみは、一番身近な存在だけに。
2473 = "Ra là vậy——\nĐối với Nagi, Fukami chính là người gần gũi nhất mà."
# monologue
# JP: （僕にとっての路子と……\nきっと、似たような存在なのか）
2816 = "(Chắc là……\ncũng giống như Michiko đối với tôi vậy)"
# monologue
# JP: 双子で、対等。\nだからこそ、小さな差異にもムキになった。
2649 = "Là chị em sinh đôi, ngang hàng với nhau.\nChính vì vậy, dù chỉ là một khác biệt nhỏ cũng khiến tôi phải hơn thua."
# monologue
# JP: 言いつけなどを路子の方が上手にこなして、\n路子一人が褒められたときなどは、正直、悔しかった。
2653 = "Những lúc Michiko hoàn thành tốt những việc được giao,\nrồi chỉ có một mình con bé được khen ngợi, thành thật mà nói, tôi rất ấm ức."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり凪は、\nふかみに、身長で勝ちたいのか？」
1621 = "「Tóm lại là Nagi,\nmuốn thắng Fukami về chiều cao sao?」"
# 【凪】
# display as 凪
# JP: 「っ！！」
1820 = "「!!」"
# monologue
# JP: だから、尋ねる。率直に。
2621 = "Vì vậy, tôi đã hỏi. Một cách thẳng thắn."
# monologue
# JP: 妙な気遣いをして言葉をひねれば、\n妙な誤解を生じさせかねんと思うから。
2503 = "Vì tôi nghĩ nếu cứ cố uốn nắn câu chữ bằng sự quan tâm kỳ lạ,\nthì có khi lại gây ra những hiểu lầm không đáng có."
# 【凪】
# display as 凪
# JP: 「……別に、勝ちたいとかじゃなかとよ」
1251 = "「……Em cũng chẳng phải là muốn thắng gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1798 = "「Ừm.」"
# 【凪】
# display as 凪
# JP: 「ただ――」
1726 = "「Chỉ là——」"
# monologue
# JP: 凪がふつっと、黙り込む。\n黙ったままで、動かなくなる。
2436 = "Nagi bỗng im bặt.\nCứ thế im lặng, không nhúc nhích."
# monologue
# JP: ゆえ、おにぎりを食べ、お茶を飲む。\n凪ももそもそ、おにぎりを齧り、ゆっくり飲み込む。
2623 = "Thế nên, tôi tiếp tục ăn cơm nắm, uống trà.\nNagi cũng lẳng lặng gặm cơm nắm, rồi từ từ nuốt xuống."
# 【凪】
# display as 凪
# JP: 「ただ――にーさんもふかみちゃんも、凄かけん。\n……置いてかれるのが、ちょこっとだけ……怖かとよ」
1728 = "「Chỉ là——cả anh hai và Fukami đều quá giỏi.\n……Em chỉ hơi…… sợ bị bỏ lại phía sau thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「置いていかれる？」
2125 = "「Bị bỏ lại phía sau?」"
# 【凪】
# display as 凪
# JP: 「だって、うち――なんでも中途半端やけん」
1885 = "「Bởi vì, em——làm gì cũng dở dở ương ương mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「バカな！」
2130 = "「Ngốc nghếch!」"
# monologue
# JP: 喉から言葉が飛び出た瞬間、\n凪がビクリとすくんでしまう。
2586 = "Khoảnh khắc những lời đó thốt ra khỏi miệng,\nNagi giật mình co rúm người lại."
# monologue
# JP: 驚かせてしまうつもりはなかった。\n言葉を、気持ちを、急いで鎮めて、ゆっくり伝える。
2499 = "Tôi không định làm con bé giật mình.\nVội vàng kìm nén lại cảm xúc và lời nói, tôi từ tốn truyền đạt."
# 【双鉄】
# display as 雙鐵
# JP: 「半端どころか、凪は抜群の存在ではないか。\n剣術であれ、投炭であれ、もう完全に一人前の」
1670 = "「Đâu có dở dở ương ương, Nagi là một người vô cùng xuất sắc mà.\nDù là kiếm thuật, hay xúc than, em đều đã hoàn toàn có thể độc lập đảm đương rồi.」"
# 【凪】
# display as 凪
# JP: 「ばってん！　剣道では県大会も勝ち抜けんかったし！」
1734 = "「Nhưng mà! Kiếm đạo thì em cũng có qua nổi giải cấp tỉnh đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1819 = "「啊！」" 
# 【凪】
# display as 凪
# JP: 「機関士は勉強はじめたばっかでまだまだすぎるし、\n機関助士だって、日々ねーちゃんの方が上手かとばい！」
1738 = "「Lái tàu thì mới bắt đầu học, còn non kém lắm,\nđến cả phụ lái tàu, chị Hibiki cũng làm giỏi hơn em mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2158 = "「Chuyện đó thì——」"
# monologue
# JP: 日々姫は、絵描きの目をもっている。\nその目でずうっと、僕を見てきてくれている。
2631 = "Hibiki có đôi mắt của một họa sĩ.\nCon bé đã luôn dõi theo tôi bằng đôi mắt ấy."
# monologue
# JP: 修学旅行で、どれほど濃密な時間を凪と重ねても、\n日々姫が重ね続けたものには、どうしてもまだ及ぶまい。
2664 = "Dù trong chuyến tu học, tôi có trải qua khoảng thời gian gắn bó với Nagi đến nhường nào,\nthì vẫn không thể sánh bằng những gì Hibiki đã tích lũy từ trước đến nay."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、凪がまだ年若いせいだ。\nあと三・四年もすれば、全てがガラリと変わっているさ」
2189 = "「Đó là vì Nagi vẫn còn nhỏ tuổi thôi.\nKhoảng 3, 4 năm nữa, mọi thứ sẽ thay đổi hoàn toàn đấy.」"
# 【凪】
# display as 凪
# JP: 「ばってん！　ふかみちゃんは、うちと同じ年やもん！\n同い年なのに、みんなに認められて結果ば出してっ」
1653 = "「Nhưng mà! Fukami cũng bằng tuổi em mà!\nBằng tuổi nhau, vậy mà cậu ấy được mọi người công nhận, lại còn đạt được thành quả nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1874 = "「À——」"
# monologue
# JP: 確かに――ふかみは年若くとも、\n誰にも負けない、一番のものを持っている。
2674 = "Đúng là——Fukami tuy còn nhỏ tuổi,\nnhưng con bé sở hữu một thứ độc nhất vô nhị, không thua kém bất kỳ ai."
# monologue
# JP: 少なくとも御一夜の観光に対する現場の見地においては、\nいまやふかみの母さえも、ふかみに届いていないだろう。
2735 = "Ít nhất là về góc nhìn thực tế đối với du lịch Ohimitera,\nhiện tại có lẽ đến cả mẹ của Fukami cũng không thể sánh bằng con bé."
# 【凪】
# display as 凪
# JP: 「にーさんもふかみちゃんも凄かけんっ！　やけん、\nうちっ――いろいろ頑張って、頑張っとるのにっ」
1911 = "「Cả anh hai và Fukami đều quá giỏi! Nên là,\nem——đã cố gắng rất nhiều, em đã luôn cố gắng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「結果が……\n望むような結果が、ついてこないか」
1648 = "「Nhưng kết quả……\nlại không được như mong đợi sao.」"
# 【凪】
# display as 凪
# JP: 「ん――」
1838 = "「Vâng——」"
# monologue
# JP: 素直に、頷く。\n凪がとても、小さく見える。
2455 = "Con bé ngoan ngoãn gật đầu.\nTrông Nagi thật bé nhỏ làm sao."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、置いていかれたような気になる。\nふかみに――差をつけられたように感じるのだな？」
1972 = "「Nên em mới có cảm giác bị bỏ lại phía sau.\nCảm thấy bị Fukami——bỏ xa sao?」"
# 【凪】
# display as 凪
# JP: 「んっ」
# 1847 = "「嗯」" 
# monologue
# JP: これほど、凪は小さかったのか。
2472 = "Nagi, lại bé nhỏ đến nhường này sao."
# monologue
# JP: 満ち満ちている元気さが、凪をどれだけ膨らませていたか\n――感じれば、凪を元気づけたくてたまらなくなる。
2519 = "Sự hoạt bát tràn đầy đã phóng đại Nagi lên nhường nào\n——Nhận ra điều đó, tôi lại càng muốn tiếp thêm sức mạnh cho con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「……凪は、僕が凄いと思ってくれているのだな？」
1247 = "「……Nagi, em nghĩ anh rất giỏi sao?」"
# 【凪】
# display as 凪
# JP: 「そぎゃんとは――あったりまえばい。\nうち……にーさんから、まだ一本もとれておらんし」
2192 = "「Chuyện đó——là hiển nhiên rồi.\nEm…… còn chưa giành được điểm nào từ anh hai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ」
1994 = "「Nếu vậy thì.」"
# 【凪】
# display as 凪
# JP: 「ひゃっ」
1786 = "「Hya!」"
# monologue
# JP: 凪のおでこに、中指をぴたりと当てる。押し付ける。
2585 = "Tôi đặt ngón giữa lên trán Nagi. Rồi ấn nhẹ."
# monologue
# JP: 僕の話をしっかり聞けと、\n形で示して、集中させる。
2769 = "Bằng hành động đó, tôi ra hiệu cho con bé\nphải lắng nghe thật kỹ những gì tôi sắp nói, và tập trung vào."
# 【双鉄】
# display as 雙鐵
# JP: 「凪より凄く、凪より強い僕が保証しよう。\n怠らなければ三年以内に、凪は、必ず大きな結果を示す」
1991 = "「Một người giỏi hơn Nagi, mạnh hơn Nagi như anh sẽ đảm bảo.\nNếu không lười biếng, trong vòng 3 năm tới, Nagi chắc chắn sẽ đạt được thành quả to lớn.」"
# 【凪】
# display as 凪
# JP: 「怠らなければ――って」
1730 = "「Không lười biếng——sao.」"
# monologue
# JP: 凪の瞳が上を向く。\n僕とまっすぐ向き合ってくれる。
2442 = "Đôi mắt Nagi ngước lên.\nNhìn thẳng vào tôi."
# 【凪】
# display as 凪
# JP: 「なにを、ばい？」
1600 = "「Là không lười biếng cái gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪が、今の凪であることを。\n心の向う先へと怖じず、全力で当り、取り組むことをだ」
1894 = "「Là Nagi, vẫn cứ là Nagi của hiện tại.\nKhông sợ hãi trước những gì trái tim hướng tới, dốc toàn lực đối mặt và nỗ lực hết mình.」"
# 【凪】
# display as 凪
# JP: 「あ……」
1806 = "「A……」"
# monologue
# JP: 短く、けれど深い息。\n安堵のものとも、戸惑いのものとも僕には聞こえる。
2525 = "Một tiếng thở hắt ngắn ngủi nhưng sâu thẳm.\nNghe như thể xen lẫn giữa sự nhẹ nhõm và sự bối rối."
# 【凪】
# display as 凪
# JP: 「ウチは――今のままでも、良かと？\n手当たり次第にぶつかってくので――大丈夫と？」
1770 = "「Em——cứ giữ nguyên như hiện tại, cũng được sao?\nCứ đụng đâu làm đó——cũng không sao ư?」"
# 【双鉄】
# display as 雙鐵
# JP: 「良かと、だ。間違いなく」
1588 = "「Được chứ. Chắc chắn là vậy.」"
# monologue
# JP: だから、答える。簡潔に。\nそこから、言葉を積み重ねていく。
2622 = "Vì vậy, tôi trả lời. Thật ngắn gọn.\nTừ đó, tôi tiếp tục bồi thêm lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみ、どちらの器が大きな物か、\n無論、僕に計り知れないことではあるが――」
1663 = "「Giữa Nagi và Fukami, ai là người có tố chất lớn hơn,\ntất nhiên, anh không thể nào đo lường được——」"
# 【凪】
# display as 凪
# JP: 「ん……」
# 1838 = "「嗯……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみと凪では、そもそも器の形が違うと僕は思う。\nふかみの器は、観光だけに絞られた、いわば花瓶だ」
1970 = "「Nhưng anh nghĩ, hình dáng tố chất của Fukami và Nagi vốn dĩ đã khác nhau.\nTố chất của Fukami chỉ tập trung vào du lịch, có thể ví như một chiếc bình hoa.」"
# monologue
# JP: 家業であるクマ川下り。それと鉄道との連携。\nそこからさらに展開させて、鉄道自体の観光利用――。
2532 = "Nghề chèo thuyền trên sông Kuma của gia đình. Và sự liên kết với đường sắt.\nTừ đó tiếp tục mở rộng, tận dụng chính đường sắt để phát triển du lịch——."
# monologue
# JP: ふかみの行動は終始一貫、\nひとつの次に取り組むひとつが、綺麗に積み重なっていく。
2659 = "Hành động của Fukami luôn nhất quán từ đầu đến cuối,\nmỗi một bước đi tiếp theo đều được tích lũy một cách hoàn hảo."
# 【双鉄】
# display as 雙鐵
# JP: 「対して、凪の器は底が広い。\nありとあらゆる方面に、広がり伸びて、受けようとする」
2120 = "「Ngược lại, tố chất của Nagi lại có đáy rất rộng.\nMở rộng và vươn ra mọi phương diện, cố gắng tiếp nhận tất cả.」"
# monologue
# JP: 剣術・剣道。機関士・機関助士、船頭・ともはり。\n鍛冶店の手伝いに標準語・敬語の特訓、服飾の勉強。
2470 = "Kiếm thuật, kiếm đạo. Lái tàu, phụ lái tàu, người chèo thuyền, người cầm lái.\nGiúp đỡ tiệm rèn, huấn luyện đặc biệt về tiếng phổ thông và kính ngữ, học về thời trang."
# monologue
# JP: ――凪がぶつかる対象は、あきれるほどに広範で、\nそれぞれの関連性は、どちらかといえば薄くさえある。
2362 = "——Những mục tiêu mà Nagi hướng tới rộng đến mức đáng kinh ngạc,\nvà mối liên hệ giữa chúng, nói đúng ra là khá mờ nhạt."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、同じ量の“努力”を注ぎ込んだとて、\nふかみほど早くに、凪の器の水位はあがらん」
1977 = "「Vì vậy, dù có đổ vào cùng một lượng 'nỗ lực',\nthì mực nước trong tố chất của Nagi cũng không thể dâng lên nhanh như Fukami được.」"
# 【凪】
# display as 凪
# JP: 「おおおおお」
1877 = "「Oa oa oa oa oa.」"
# monologue
# JP: 僕の例えに、よほど得心がいったのか、\n凪は何度も大きく頷く。
2514 = "Chắc là ví dụ của tôi rất thuyết phục,\nnên Nagi gật đầu mạnh liên tục."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、三年。凪のうつわに努力がたまり、\n[いきち,1]閾値を超えるまでにそのくらいはかかるだろう」
1978 = "「Vì thế, 3 năm. Sẽ mất chừng đó thời gian để nỗ lực tích tụ đầy trong tố chất của Nagi,\nvà vượt qua ngưỡng tới hạn.」"
# 【凪】
# display as 凪
# JP: 「いきち？」
2201 = "「Ngưỡng tới hạn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いきち、或いはしきいちだ。\n“一線を超える”の、その一線のことを言う」
1939 = "「Ngưỡng tới hạn, hay còn gọi là điểm bùng phát.\nChính là ranh giới của việc 'vượt qua ranh giới' đấy.」"
# 【凪】
# display as 凪
# JP: 「ウチの――、一線。\n超えねばならん、そぎゃんと、一線」
1779 = "「Ranh giới——của em.\nRanh giới, bắt buộc phải vượt qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。この場合は、結果を得るための一線だ。\nそこを超えれば――全ては恐らく、一気に動くぞ」
2017 = "「Đúng vậy. Trong trường hợp này, đó là ranh giới để đạt được kết quả.\nNếu vượt qua được——có lẽ mọi thứ sẽ thay đổi chóng mặt đấy.」"
# 【凪】
# display as 凪
# JP: 「まっことばい！？」
# 2090 = "「真的？！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、まっことだ」
1855 = "「Ừ, thật đấy.」"
# monologue
# JP: 少なくとも、三年の間に凪は確実に機関士になろうし、\n剣道大会の年齢によるルール制限の範囲も変わる。
2733 = "Ít nhất thì, trong vòng 3 năm tới Nagi chắc chắn sẽ trở thành người lái tàu,\nvà giới hạn độ tuổi trong các giải đấu kiếm đạo cũng sẽ thay đổi."
# monologue
# JP: ゆえ、確信する。三年、凪が怠らずにいて――\n結果を出せない。そんな未来は、ありえない。
2610 = "Vì vậy, tôi tin chắc. 3 năm, nếu Nagi không lười biếng——\nmà không đạt được kết quả gì. Một tương lai như vậy là điều không tưởng."
# 【凪】
# display as 凪
# JP: 「やったら、凪さま！　稽古するばい！！\n剣術も剣道も機関士修行も礼儀作法も！　良か女も！！」
1975 = "「Vậy thì, Nagi ta đây! Sẽ luyện tập!!\nCả kiếm thuật, kiếm đạo, tu luyện lái tàu, lễ nghi phép tắc! Và cả người phụ nữ tuyệt vời nữa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その意気だ」
2133 = "「Khí thế lắm.」"
# 【凪】
# display as 凪
# JP: 「うおおおお！　やる気出てきたとばーい！！」
1834 = "「Uoooo! Động lực tràn trề rồi nha!!」"
# monologue
# JP: 食べかけだったおにぎりを、\nひとつ、ふたつ、みっつと一気にほおばって。
2439 = "Con bé tống một lúc cả 3 cái cơm nắm đang ăn dở\nvào đầy mồm."
# monologue
# JP: お茶でがぶがぶ、飲みくだしていく。\nのどかで元気なその光景に、微笑とともに思ってしまう。
2615 = "Rồi ừng ực uống trà để nuốt trôi.\nNhìn khung cảnh yên bình và tràn đầy năng lượng ấy, tôi vừa mỉm cười vừa nghĩ."
# monologue
# JP: （良か女、とやらだけは、三年での結果は難しそうか）
2807 = "(Chỉ riêng cái mục tiêu người phụ nữ tuyệt vời gì đó, có vẻ hơi khó để đạt được trong 3 năm ha)"
# 【凪】
# display as 凪
# JP: 「まずは、日暮れまで剣術の続きばい！」
2212 = "「Trước tiên là tiếp tục luyện kiếm thuật cho đến lúc mặt trời lặn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1847 = "「嗯」" 
# monologue
# JP: 凪の笑顔が晴れ渡る。\nいつもの凪が輝いている。
2431 = "Nụ cười của Nagi lại rạng rỡ như bầu trời quang đãng.\nNagi của mọi ngày đang tỏa sáng."
# monologue
# JP: その輝きを、二度とは曇らせないように――
2662 = "Để ánh sáng ấy không bao giờ bị che khuất một lần nào nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「来い！　凪！！」
1680 = "「Tới đây! Nagi!!」"
# 【凪】
# display as 凪
# JP: 「チエエエエエエエエエストーーーーーーー！！」
1835 = "「CHEEEEEESUTOOOOOOO!!!」"
# monologue
# JP: （バキッっっっ！）
# 2812 = "（啪嚓！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1921 = "「Tốt!」"
# monologue
# JP: ――ふかみと僕とで、\n必ず、凪を支えてみせよう。
1212 = "——Tôi và Fukami,\nnhất định sẽ nâng đỡ Nagi."
