1618 = "「中途還要吃飯之類的。而且凪的好奇心那麼強，不管有什麼事情都要攪和一下」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんも、それに付き合うと？」
1933 = "「小雙你就陪著她一起？」" 

# 【双鉄】
# display as 雙鐵
