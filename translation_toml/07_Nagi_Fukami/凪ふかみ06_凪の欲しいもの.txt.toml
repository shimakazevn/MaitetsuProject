# 【凪】
# display as 凪
# JP: 「せっかくやけん、にーさんに考えてもらうとばい！\nこん格好をしたうちと、どこに行ってみたかと？」
2210 = "「難得有這麼一次，那就大哥哥來出主意咧！咱穿成這樣，大哥哥想跟咱去哪裡？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が……か、ふむ」
1967 = "「我來想啊……嗯……」" 

# monologue
# JP: ふかみとふたりの修学旅行は、\nだいたい僕が計画立案を任される。
2493 = "和深美出門時幾乎都是我來制訂計劃。" 

# monologue
