# display as 真闇
# JP: 「問題なかかかもしれんけど――\n修行やらも、もっと明るくなってからでも」
1684 = "「做這些可能是沒問題，但是練劍也可以等到天再亮一些」" 

# 【双鉄】
# display as 雙鐵
