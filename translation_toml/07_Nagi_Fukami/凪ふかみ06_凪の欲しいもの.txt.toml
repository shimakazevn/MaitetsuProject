# monologue
# JP: 普段の凪だ。\nただそれだけで嬉しくなる。
2428 = "凪又變回了平時的語氣。僅是這樣就讓我開心起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうしても何も――\n凪と僕とは、どういう関係であるか、ということだ」
1605 = "「不為什麼……你想想，我們是什麼關係？」" 

# 【凪】
# display as 凪
# JP: 「どういう関係……って……」
1628 = "「什麼關係……啊……」" 

# monologue
# JP: ぱあっと、凪が赤くなる。\nとたんに胸がドキリと騒ぐ。
2452 = "凪的小臉忽然變得通紅。我的心跳也隨之加速。" 

# monologue
# JP: 今日に凪のかわいらしさとあいまって……ああ、いかん。\n言葉がそれ以上出て来ぬほどに、ただ、かわいらしい。
2491 = "和她今天可愛的打扮相結合……唉，不行了。可愛到讓我想不出其他的形容詞。" 

# 【凪】
# display as 凪
# JP: 「ウチ、と――にーさん、は……その……こ、こ――\nこぎゃんと仲良し！　とっても仲良し……で――あ！」
1773 = "「咱和……大哥哥……那、那個……關、關係好著咧！　非常非常好……對了！」" 

# monologue
# JP: ニカっと、笑顔。
2530 = "她的臉上綻放出了笑容。" 

# monologue
# JP: はにかみが吹き飛んでしまったのは惜しいが、\n実に凪らしく爽快だ。
2384 = "先前的羞怯消失無蹤雖然有些可惜，但這直爽的笑容著實很符合她的個性。" 

# 【凪】
# display as 凪
# JP: 「ウチとにーさんとふかみちゃんは、\n修学旅行の仲間ばい！！」
1775 = "「咱和大哥哥還有小深，是修學旅行的同伴咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。では――修学旅行の仲間に対して、敬語で話す。\nこれを、ＴＰＯをわきまえた振る舞いだと感じるか？」
2011 = "「是啊。對著一起修學旅行的同伴口氣這麼恭敬，你覺得這符合ＴＰＯ嗎？」" 

# 【凪】
# display as 凪
# JP: 「感じんばい！\n敬語やらなんやら、仲良し同士ならおかしかけん！」
1608 = "「不符合！好朋友之間還這麼拘謹就太奇怪囉！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、僕とふたりきりだったり、\nふかみと三人でいるときは、普段どおりが一番いい」
2056 = "「沒錯。所以我們倆單獨在一起的時候，還有和深美三個人在一起的時候，保持原樣就是最好的」" 

# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
1778 = "「咱明白咧！」" 

# monologue
# JP: スッキリと、伸びやかに。
2422 = "凪一下子放鬆下來，彷彿掙脫了束縛。" 

# monologue
# JP: 普段どおりの凪が全速力で駆け戻ってきたゆえ、\n釘を刺す必要も感じてしまう。
2677 = "看她飛速現出原形，我又感覺有必要再叮囑一下。" 

# 【双鉄】
# display as 雙鐵
