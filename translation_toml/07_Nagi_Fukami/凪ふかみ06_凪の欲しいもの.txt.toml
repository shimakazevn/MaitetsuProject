# display as 真闇
# JP: 「あら。バレちゃった。\n自分だけだし、ちょこーっとバタついてもおるし」
1789 = "「哎呀，你看出來啦。咱想著反正就咱一個人，也沒什麼時間，就隨便弄點吃的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「たまにはお茶漬けも悪くないな。\nなんのお茶漬けだ？」
1686 = "「偶爾吃吃茶泡飯也不錯。用什麼做的？」" 

# 【真闇】
# display as 真闇
