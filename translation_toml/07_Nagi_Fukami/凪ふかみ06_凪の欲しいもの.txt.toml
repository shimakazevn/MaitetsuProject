1777 = "「咱懂咧！　咱會努力的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その意気や良し、だ。\nで――」
2132 = "「說得好。然後呢……」" 

# 【凪】
# display as 凪
# JP: 「で？」
2069 = "「然後？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日の修学旅行は、どうする？\nいつもの早朝は、たいがい剣術修行だが――」
1636 = "「今天的修學旅行要怎麼辦？平時一大早基本都是練劍，但是這次……」" 

# 【凪】
# display as 凪
# JP: 「あ」
1813 = "「啊」" 

# monologue
# JP: 絶句して、凪は自分の体を見下ろす。
2424 = "凪一時目瞪口呆，低頭看了看自己的打扮。" 

# monologue
# JP: 運動できなくもなかろうが、\n汗と汚れにまみれさせてしまうのはいかにも勿体ない。
2783 = "雖然也不是沒辦法運動，但要弄髒這身衣服實在是可惜了些。" 

# 【凪】
# display as 凪
