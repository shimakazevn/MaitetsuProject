2531 = "她的臉頰又染上了羞澀的紅暈，顯得可愛至極。" 

# 【凪】
# display as 凪
# JP: 「にーさん……まっこと、\nそぎゃんと思うてくれとーと？」
1905 = "「大哥哥……你真這麼想？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。思う。凪とふかみが――修学旅行が、\n僕を大きく変えてくれたと」
2013 = "「是啊。我們三個人的修學旅行，徹底地改變了我」" 

