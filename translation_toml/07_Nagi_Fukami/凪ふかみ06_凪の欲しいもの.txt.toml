2186 = "「那就算作一個備選方案吧。然後還有……對了，馬上就有首班車了啊」" 

# monologue
# JP: 言えば、凪は小首を傾げる。
2456 = "凪聽到我的話，疑惑地歪了歪頭。" 

# 【凪】
# display as 凪
# JP: 「キハ07ば乗って、[ゆのい,1]湯医にいくと？」
1890 = "「坐Ｋｉｈａ０７去湯醫？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。[ごじさんじゅうきゅうふん,3]0539発の[いちでーれっしゃ,1]1dが0622湯医着。\n折り返しの[にーでーれっしゃ,1]2dが0629発の御一夜温泉駅0716着だ」
2021 = "「是啊。０５:３９出發的１Ｄ列車０６:２２到達湯醫。返程的２Ｄ列車０６:２９出發，０７:１６到御一夜溫泉站」" 

# 【凪】
# display as 凪
