2032 = "「有時候陪著她，有時候也會攔著她。不知不覺，一天很快就過去了」" 

# 【真闇】
# display as 真闇
# JP: 「うふふふふ」
1743 = "「呵呵呵」" 

# monologue
# JP: 真闇姉が笑う。\n幸せそうに、満足そうに。
