# 【真闇】
# display as 真闇
# JP: 「あらまぁ、かわゆかとねぇ。\nほんなら、夜もめいっぱいまで？」
1791 = "「哎呀，真可愛咧。那是連晚上都要玩到很晚嗎？」" 

# 【双鉄】
# display as 雙鐵
