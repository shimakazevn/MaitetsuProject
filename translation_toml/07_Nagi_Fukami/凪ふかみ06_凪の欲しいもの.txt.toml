1936 = "「就像軌道檢測車啊……不對，應該叫檢測船吧。我懂了，畢竟河流的流向也時常會改變啊」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　大雨のあととか、そぎゃんこつがなくても、\n週に一度は航路の検査で、瀬見の舟ば走るとばい！」
2006 = "「是咧！　比如大雨之後就要開船去檢查，就算一切正常，也至少每週都要檢查一次咧！」" 

# 【双鉄】
# display as 雙鐵
