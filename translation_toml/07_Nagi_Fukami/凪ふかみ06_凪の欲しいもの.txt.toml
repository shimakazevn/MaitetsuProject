1647 = "「但是……嘿嘿～！　Ｎａｖｉ助能這麼想，咱好開心！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2025 = "「是嗎」" 

# 【凪】
# display as 凪
