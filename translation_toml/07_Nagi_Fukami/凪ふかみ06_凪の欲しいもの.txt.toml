# 【双鉄】
# display as 雙鐵
# JP: 「真っ先に思いつくのは、喫茶店などの類だな。\nかわいい凪を眺めつつ、のんびり過ごすのは幸福そうだ」
2030 = "「最先想到的就是去咖啡店坐坐之類的吧。一邊欣賞可愛的你，一邊悠閒度日，這樣應該會很幸福」" 

# 【凪】
# display as 凪
# JP: 「おおお～！　よかとねー！\n凪さま、いちごパフェ食べたかとー！」
1880 = "「噢噢噢～！　好咧！本小姐想吃草莓帕菲！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もご馳走してやりたいが、\nあいにく、まだ時間が早すぎる」
1965 = "「我也想滿足你，但是很可惜，現在時間太早了」" 

# 【凪】
# display as 凪
# JP: 「あっ！？　開いてるお店のなかとばい！！」
1830 = "「啊？！　現在沒有店鋪開門咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この時間、\n御一夜で飲食を扱う店は、コンビニだけしか無い」
2016 = "「是啊。這個時間段能吃東西的店鋪，就只有便利商店了」" 

# 【凪】
# display as 凪
