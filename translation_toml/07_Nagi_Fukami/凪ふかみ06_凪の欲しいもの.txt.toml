# 【凪】
# display as 凪
# JP: 「あれれ？　ナビすけば飛んどらんとよ」
1761 = "「咦？　Ｎａｖｉ助怎麼沒飛過來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな、最近は――」
1882 = "「噢，這個啊，最近……」" 

# 【凪】
# display as 凪
# JP: 「あ！」
1819 = "「啊！」" 

# monologue
# JP: 凪がその目を丸くする。
2453 = "凪瞪大了眼睛。" 

