1668 = "「你忘了自己的目的嗎？　通過修學旅行，去學習自己缺少的歡笑和淚水」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2022 = "「是啊」" 

# monologue
# JP: 言われてみると、当初の目標は確かにそれだった。
2774 = "這麼一說，我當初的目的確實是這個。" 

# monologue
