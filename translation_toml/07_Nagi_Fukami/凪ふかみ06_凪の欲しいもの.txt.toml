2336 = "不知道從什麼時候開始，修學旅行已經完全成為了我生活的一部分，以至於忘記了當初的想法。" 

# 【真闇】
# display as 真闇
# JP: 「特別なイベント無しに、まる一日を楽しく過ごせる。\nそいば、遊びを、双ちゃんが楽しめるようになったから」
2116 = "「能夠開心度過普普通通的一整天，是因為你變得能真心去享受出遊帶來的快樂了」" 

# monologue
