1846 = "「嗯……是什麼時候的事情來著。我也很好奇，就問了一下原因，然後Ｎａｖｉ說……」" 

# 【凪】
# display as 凪
# JP: 「なんてゆーたと！？」
2131 = "「說什麼咧？！」" 

# 【双鉄】
# display as 雙鐵
