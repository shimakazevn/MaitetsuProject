2053 = "「沒事。正好也能轉換一下心情，而且兩個人一起吃更開心，吃得更香咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、一緒にでどうだろう。\n僕も少しは手伝えるだろうし、眠気も晴らしたい」
2182 = "「那就一起做吧。我應該能幫上點忙，順便也想讓腦子清醒一些」" 

# 【真闇】
# display as 真闇
# JP: 「うふふ、ほんならお願いしちゃおうっと」
1749 = "「呵呵，那就麻煩你嘍」" 

# monologue
# JP: 冷蔵庫から真闇姉が取り出したのは、鶏のささみ。
2695 = "真闇姐從冰箱裡拿出雞胸肉。" 

# 【真闇】
# display as 真闇
# JP: 「筋取りして、そぎ切りにしてくれる？」
2118 = "「能幫忙把這些去筋切片嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1995 = "「明白了」" 

# 【真闇】
# display as 真闇
