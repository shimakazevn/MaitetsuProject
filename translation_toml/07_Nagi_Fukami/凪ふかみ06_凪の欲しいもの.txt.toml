2008 = "「是咧，真可惜。本小姐也想當一回客人，悠閒地享受一次漂流咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、なんなら午後にでもすればいい」
2126 = "「要去的話，下午去也可以啊」" 

# 【凪】
# display as 凪
