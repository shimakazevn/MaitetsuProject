1458 = "「Fu!? ――Ưm――fuu――fuuuu――」"
# monologue
# JP: （こっ――ごつっ――ずるっ――ごんっ！）
1749 = "Dùng quy đầu cọ xát xung quanh phần thô ráp.\nCơ thể Fukami ngay lập tức ửng đỏ lên rõ rệt."
# 【ふかみ】
# display as 深美
# JP: 「ひっ――ぃっ――んっ――ん～っ――んっ！\nふぅっ――ふうっ――ふうっ――ふうっ」
968 = "（Phập――phập――phập――cọ――――hự!）"
# monologue
