# monologue
# JP: 瞳で、息で、ふかみが頷く。\n僕から滴って落ちる汗が、ふかみの汗とひとつに混じる。
1547 = "Bằng ánh mắt, bằng hơi thở, Fukami gật đầu.\nNhững giọt mồ hôi rơi xuống từ người tôi, hòa làm một với mồ hôi của Fukami."
# monologue
# JP: 呼吸も、望みも、重なりあってる。\nだからこのまま、腰を思い切り動かすだけで――っ！
1442 = "Cả nhịp thở, cả ước muốn, đều đang hòa quyện vào nhau.\nVì vậy, cứ thế này, chỉ cần dập hông hết sức là——っ!"
# monologue
# JP: （ずぶうううううううッ――――――ゴちゅンっ！！！）
1740 = "（Phập——————Bịch!!!）"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～～っ！！！」
# 996 = "「唔！！！」" 
# monologue
# JP: （きゅううううううううんっ！）
# 1767 = "（緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 981 = "「哇！」" 
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　どびゅっ！）
# 1726 = "（咻！咻！咻！咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「っ～～～～～～～っ！！！」
998 = "「Ư~~~~~~~~ư!!!」"
# monologue
# JP: 僕の手を噛む力が強い。\nはっきりとした痛みを感じる。
1545 = "Lực cắn vào tay tôi rất mạnh.\nTôi cảm nhận được nỗi đau rõ rệt."
# monologue
# JP: だが、その痛みさえ塗りつぶすほどっっ――
1314 = "Nhưng, đến mức lấn át cả nỗi đau đó——"
# monologue
# JP: （きゅううううううううううっっ）
1768 = "（Siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ！」
990 = "「Ư——a!」"
# monologue
# JP: ふかみの膣のうねる締め付け。\nその最奥で、吸いつき甘えて咥える子宮。
1581 = "Sự siết chặt nhấp nhô của âm đạo Fukami.\nỞ nơi sâu nhất, tử cung đang mút lấy, làm nũng và ngậm chặt."
# monologue
# JP: 射精最中の勃起をそうまで刺激されれば、\n喉の奥から、抑えきれぬ声が飛び出そうで――
1524 = "Sự cương cứng đang trong lúc xuất tinh bị kích thích đến mức đó,\ntừ sâu trong cổ họng, một giọng nói không thể kìm nén dường như sắp bật ra——"
# 【双鉄H】
# display as 雙鐵
# JP: 「んぐっ！」
# 993 = "「唔！」" 
# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
1042 = "「Ư!!?」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
# 1726 = "（咻！咻！咻！咻！）" 
# monologue
# JP: だから引き抜き、そのまま精の雨を降らせる。
1485 = "Vì vậy tôi rút ra, và cứ thế giáng xuống một cơn mưa tinh dịch."
# 【ふかみ】
# display as 深美
# JP: 「んっ――んっ――っ――――ふっ――んっ――」
1036 = "「Ưm——ưm——ư————phù——ưm——」"
# monologue
# JP: ぼとぼとと、\n濁った重さが肌へと、髪へと降り注ぐ。
1604 = "Từng giọt từng giọt,\nsự nặng nề đục ngầu trút xuống làn da, xuống mái tóc em."
# monologue
# JP: 涼やかな夕立ちにあったみたいに、ふかみはうっとり\n目を閉じて、僕の白濁のシャワーを浴びる。
1553 = "Giống như gặp phải một cơn mưa rào mát mẻ, Fukami say sưa\nnhắm mắt lại, tắm trong cơn mưa trắng đục của tôi."
# monologue
# JP: （びゅゅっ――びゅっ――ビュルっ――ぴっ――）
1725 = "（Phụt——phụt——phụt——phụt——）"
# 【ふかみ】
# display as 深美
# JP: 「ぷあっ」
1043 = "「Phù」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 986 = "「唔……」" 
# monologue
# JP: ふかみの歯から腕が解放された瞬間、\nぶわりと汗が噴き出してきて――
1365 = "Khoảnh khắc cánh tay được giải phóng khỏi hàm răng của Fukami,\nmồ hôi tuôn ra đầm đìa——"
# monologue
# JP: （くてっ）
1750 = "（Phịch）"
# 【ふかみ】
# display as 深美
# JP: 「きゃんっ」
# 971 = "「呀」" 
# monologue
# JP: ふかみに重なり、崩れ落ちてる。
1482 = "Tôi đè lên người Fukami, ngã gục xuống."
# monologue
# JP: 肌と肌とをこすりあわせて、\n汗をどろどろにブレンドしながら――
1443 = "Da thịt cọ xát vào nhau,\ntrong khi mồ hôi hòa quyện nhơm nhớp——"
# 【ふかみ】
# display as 深美
# JP: 「あ……むっ――ちゅっ――ちゅうっ――ちゅっ」
1012 = "「A……ưm——chụt——chụt——chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……ふっ――むっ――ふ……んっ」、
1029 = "「Ưm……phù——ưm——phù……ưm」,"
# monologue
# JP: それでもふかみをもっと欲しくて、\nふかみも僕を求めてくれて、唾液と唾液を交換しあう。
1310 = "Dù vậy tôi vẫn muốn Fukami nhiều hơn nữa,\nFukami cũng khao khát tôi, chúng tôi trao đổi nước bọt cho nhau."
# 【ふかみ】
# display as 深美
# JP: 「ん……ん、ちゅ――ちゅるっ――んっ――――――\nごくんっ……ん～～～――ぷはっ」
1032 = "「Ưm……ưm, chụt——chụt——ưm——————\nỰc……ưm~~~——phù」"
# monologue
# JP: キスを解いて、僕の胸板に頭を擦り付け。\nそれからふかみは、にへへと満足そうに微笑む。
1361 = "Tách nụ hôn ra, em cọ cọ đầu vào khuôn ngực tôi.\nSau đó Fukami mỉm cười mãn nguyện hì hì."
# 【ふかみ】
# display as 深美
# JP: 「わたしの、お部屋、と。双鉄、さん、の……お部屋。\n両方、で、エッチなこと、して……」
1084 = "「Phòng của em, và. Phòng của…… anh Soutetsu.\nCả hai nơi, đều, làm chuyện người lớn, rồi……」"
# monologue
# JP: もう一度、キス。\nその距離のまま、ふかみの瞳が僕をみつめる。
1440 = "Một nụ hôn nữa.\nGiữ nguyên khoảng cách đó, đôi mắt Fukami nhìn chằm chằm vào tôi."
# 【ふかみ】
# display as 深美
# JP: 「わたし……たち――\n大人の……恋人同士、みたい、――です、よ――ね？」
1083 = "「Chúng…… ta——\nGiống như…… đôi tình nhân, người lớn, ——đúng không, ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「みたいもなにも……少なくとも肉体的には、\n大人の恋人同士だろう、僕らは」
939 = "「Giống gì chứ…… ít nhất về mặt thể xác,\nchúng ta đã là đôi tình nhân người lớn rồi mà」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！？」
1026 = "「A!?」"
# monologue
# JP: 素直な答えに、けれどふかみはびくりと体を引いてしまう。\nその目もなぜか、急に不安げなものになる。
1635 = "Trước câu trả lời thẳng thắn, Fukami lại giật mình lùi người lại.\nĐôi mắt em không hiểu sao cũng đột nhiên trở nên bất an."
# 【ふかみ】
# display as 深美
# JP: 「……あ。ええと……その――\n“僕ら”っていうのは――凪ちゃん、と――双鉄さん？」
747 = "「……A. Ưm…… cái đó——\n\\\"Chúng ta\\\" mà anh nói là—— Nagi, và—— anh Soutetsu?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「凪と僕？　何故そう思う？」
957 = "「Nagi và anh? Sao em lại nghĩ vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「だって！　だって双鉄さん――\n初めての相手……凪ちゃんのこと――選んだ、です、し」
1055 = "「Vì! Vì anh Soutetsu——\nĐối tác đầu tiên…… anh đã chọn—— Nagi, mà, ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
# 991 = "「唔」" 
# monologue
# JP: そのことを、\nそれほどふかみが気にしているとは思わなかった。
1468 = "Chuyện đó,\ntôi không ngờ Fukami lại bận tâm đến thế."
# monologue
# JP: あえていうのもヤボなことかとは思ったが――\n言葉にせねば、誤解を余計に広げてしまう。
1466 = "Tôi nghĩ cố tình nói ra thì có vẻ hơi vô duyên——\nnhưng nếu không nói rõ, sẽ càng làm sự hiểu lầm lan rộng thêm."
# 【双鉄H】
# display as 雙鐵
# JP: 「あの選択は、僕らの普段。\n凪とふかみの“いつも”を僕も、踏襲しただけのことだ」
1086 = "「Lựa chọn đó, là thói quen của chúng ta.\nAnh chỉ làm theo cái \\\"thường ngày\\\" của Nagi và Fukami thôi」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんとわたしのいつも？　――って！　あっ！」
1067 = "「Cái thường ngày của Nagi và em? ——Á! A!」"
# monologue
# JP: 瞳の不安がぱあっと晴れる。\nその反応にほっとしながら、いわずもがなの言葉を続ける。
1597 = "Nỗi bất an trong mắt em bừng sáng lên.\nThở phào nhẹ nhõm trước phản ứng đó, tôi tiếp tục nói những lời không cần thiết phải nói."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだ。いつでもエンジンは凪。\nふかみは、ブレーキとハンドルだから」
1104 = "「Đúng vậy. Lúc nào động cơ cũng là Nagi.\nCòn Fukami là phanh và vô lăng mà」"
# 【ふかみ】
# display as 深美
# JP: 「あ……あー……あ～っ――あ～～っ！」
1011 = "「A…… a…… a~—— a~~!」"
# monologue
# JP: よほど得心がいったのか、ふかみは何度も何度も頷く。
1537 = "Có vẻ như đã hiểu ra vấn đề, Fukami gật đầu liên tục nhiều lần."
# 【ふかみ】
# display as 深美
# JP: 「確かにわたし……あのとき――怖くて――\nけど……凪ちゃんが――『平気』って言ってくれたから」
1134 = "「Đúng là em…… lúc đó—— rất sợ——\nNhưng…… vì Nagi đã bảo—— 『Không sao đâu』」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
# 1042 = "「嗯？！」" 
# monologue
# JP: 今度は、何がどうなったのか――\nふかみの瞳に、大粒の涙が浮きあがってくる。
1299 = "Lần này, không biết chuyện gì đã xảy ra——\nTrong mắt Fukami, những giọt nước mắt lăn dài."
# 【ふかみ】
# display as 深美
# JP: 「なのに、わたし……勘違いして……一人で対抗心出して、\n嫉妬して、焦って――」
966 = "「Thế mà, em…… lại hiểu lầm…… một mình nảy sinh lòng ganh đua,\nghen tị, rồi sốt ruột——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「構わんさ。勘違いして対抗して、嫉妬して焦るふかみも、\nとてもとても魅力的だったからな」
1107 = "「Không sao đâu. Một Fukami hiểu lầm, ganh đua, ghen tị và sốt ruột,\ncũng rất rất quyến rũ mà」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ！！！！」
1022 = "「A ư!!!!」"
# monologue
# JP: 真っ赤になってぷるぷる震え――
1598 = "Đỏ bừng mặt và run rẩy——"
# 【ふかみ】
# display as 深美
# JP: 「あはっ！」
1020 = "「A ha!」"
# monologue
# JP: そしてふかみは、台風一過の青空みたいな笑顔を咲かす。
1505 = "Rồi Fukami nở một nụ cười như bầu trời xanh sau cơn bão."
# 【ふかみ】
# display as 深美
# JP: 「ここまで全部、『いつものわたしたち』な感じですね」
959 = "「Đến tận đây tất cả, đều mang cảm giác 『chúng ta của thường ngày』 anh nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。いわれてみれば」
1039 = "「Ừ, đúng vậy. Nghe em nói mới thấy」"
# 【ふかみ】
# display as 深美
# JP: 「ならっ！」
1158 = "「Vậy thì!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おっと！」
985 = "「Ái chà!」"
# monologue
# JP: 手を引くふかみに素直に従い、立ち上がる。\nふかみの踵は、いまにも弾んで駆け出しそうだ。
1559 = "Ngoan ngoãn làm theo Fukami đang kéo tay, tôi đứng dậy.\nGót chân của Fukami, lúc này như đang nhún nhảy chuẩn bị chạy đi."
# 【ふかみ】
# display as 深美
# JP: 「今日の一日デートの権利。\n残りの半分、凪ちゃんとわけっこしてもいいですか？」
940 = "「Quyền hẹn hò cả ngày hôm nay.\nMột nửa còn lại, em chia sẻ với Nagi được không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ」
1120 = "「Tất nhiên rồi」"
# 【ふかみ】
# display as 深美
# JP: 「よかったぁ！」
1062 = "「Tuyệt quá!」"
# monologue
# JP: 凪の部屋と、僕の部屋と。\nその両方でセックスをして、だから、わかった。
1448 = "Phòng của Nagi, và phòng của tôi.\nVì đã làm tình ở cả hai nơi đó, nên tôi đã hiểu."
# 【双鉄H】
# display as 雙鐵
# JP: （僕らのホームは、もう、\n僕らがそれぞれすごす場所ではなくなったのだ）
1728 = "（Nhà ga của chúng tôi, giờ đây,\nkhông còn là nơi mỗi người chúng tôi sống riêng lẻ nữa）"
# monologue
# JP: だからそこへと、全速力で帰ってく。\nふかみと凪と、そうして僕と。三人一緒にいられる場所へ。
1489 = "Vì vậy tôi sẽ quay về đó với tốc độ tối đa.\nCùng với Fukami và Nagi, và tôi. Về nơi ba người chúng tôi có thể ở bên nhau."
# monologue
# JP: 僕らのホームへ――\n『おかえりなさい』を、言い合うために。
1605 = "Về nhà ga của chúng tôi——\nĐể cùng nói với nhau câu 『Chào mừng đã về nhà』."
