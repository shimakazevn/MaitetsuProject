[script]
# lines: 325 
# 【ふかみ】
# display as 深美
# JP: 「……すっごく――なんていうか、その」
751 = "「......Cực kỳ――phải nói sao nhỉ, ừm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「遠慮をせずに言っていい。\n僕が見ても、昔の僕は目つきが悪い」
934 = "「Em cứ nói thẳng đi, đừng ngại. Ngay cả anh nhìn lại cũng thấy ngày xưa ánh mắt mình trông dữ tợn thật.」"
# 【ふかみ】
# display as 深美
# JP: 「目つきが悪いとか、じゃなく……って――\nその――ええとっ」
932 = "「Không phải là ánh mắt dữ tợn hay gì đâu......mà là―― Ừm――để xem nào」"
# monologue
# JP: 思ったままを話したのだが、\nかえって困らせてしまったらしい。
1480 = "Tôi chỉ nói ra suy nghĩ của mình thôi, nhưng có vẻ lại làm em ấy bối rối rồi."
# monologue
# JP: ふかみはもごもごいいながら、\nアルバムのページを手早くめくる。
1541 = "Fukami vừa lúng búng nói, vừa nhanh tay lật các trang album."
# 【ふかみ】
# display as 深美
# JP: 「あれっ？」
978 = "「Ủa?」"
# monologue
# JP: 困ったようにあちこち揺れてた瞳がいきなり、\nスっと定まる。
1371 = "Đôi mắt đang đảo quanh vẻ bối rối bỗng nhiên, dừng lại ở một điểm."
# 【ふかみ】
# display as 深美
# JP: 「ん……」
986 = "「Ưm......」"
# monologue
# JP: めくったページを、また戻す。
1367 = "Em ấy lật ngược lại trang vừa lật."
# 【ふかみ】
# display as 深美
# JP: 「これって、どういうシチュエーション、で……\n撮った写真たち……なんです、か？」
1145 = "「Mấy bức ảnh này......là chụp trong tình huống nào...... vậy ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「シチュエーションというか……\nほとんどが、[かあ,1]義母さんが撮ったものだな」
1073 = "「Tình huống à...... hầu hết đều là do mẹ nuôi chụp thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「[みぎたいちしゅぞうもと,5]右田一酒造元の……真闇さんの前の、[とうじ,1]杜氏さん？」
1096 = "「Là người quản lý xưởng ủ rượu......của xưởng Migitaichi trước chị Mayami ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや。真闇姉は、そのお祖母様から引き継いだそうだ。\nどうも、義母さんには酒造りの才は無かったらしく」
936 = "「Không phải đâu. Chị Mayami được kế thừa từ bà nội của chị ấy. Có vẻ như mẹ nuôi không có tài ủ rượu thì phải.」"
# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
1101 = "「Vậy ạ.」"
# monologue
# JP: 意外、という風な声を出し。\nけれどもああ、とすぐさま小さく頷きもする。
1536 = "Em ấy cất giọng ngạc nhiên. Nhưng ngay sau đó lại khẽ gật đầu như đã hiểu ra điều gì."
# monologue
# JP: 真闇姉があの若さですでにベテラン杜氏だということが、\n事実を逆から示していると、恐らくは気づいたのだろう。
1376 = "Có lẽ em ấy đã nhận ra sự thật đằng sau việc chị Mayami còn trẻ như vậy mà đã là một người quản lý xưởng ủ rượu dày dặn kinh nghiệm."
# 【双鉄H】
# display as 雙鐵
# JP: 「それゆえ、[とう,1]義父さん以上に忙しく働きまわっていた。\n御一夜にはほとんど戻ってこれないような人でな――」
1050 = "「Vì thế, bà ấy làm việc bận rộn hơn cả bố nuôi. Bà ấy gần như chẳng mấy khi về Ohimitera――」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
1035 = "「Vâng.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「帰ってくれば真闇姉と日々姫とを構いまくって、\nおまけに写真もばっしゃばっしゃと撮っていたのだ」
1046 = "「Mỗi lần về là bà ấy lại quấn lấy chị Mayami và Hibiki, hơn nữa còn chụp ảnh liên tục không ngừng nghỉ.」"
# monologue
# JP: 僕などは、それに巻き込まれていたようなものだが――\nいや、ああ。そうか。
1447 = "Anh chỉ như bị cuốn vào chuyện đó thôi―― À không. Ra là vậy."
# monologue
# JP: 今考えてみれば、なるほど。\n我ながら思う目つきの悪さの、それも一因なのかもしれぬ。
1612 = "Bây giờ nghĩ lại mới thấy, thì ra là thế. Có lẽ đó cũng là một lý do khiến ánh mắt của tôi trông dữ tợn đến vậy."
# 【ふかみ】
# display as 深美
# JP: 「――って、いうことは」
742 = "「――Nói vậy, có nghĩa là」"
# monologue
# JP: ふかみがむむっと眉を潜めて、\nアルバムをまた、めくって戻す。
1595 = "Fukami cau mày lại, lật ngược cuốn album thêm lần nữa."
# 【ふかみ】
# display as 深美
# JP: 「これって、\n双鉄さんの、飾らない普段着な感じですか？」
1146 = "「Mấy bức này, là trang phục thường ngày không chút chải chuốt của anh Soutetsu ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だと思うぞ？　少なくとも、写真を撮るために\n着替えたような記憶を僕は、持ってない」
1078 = "「Anh nghĩ vậy? Ít nhất thì anh không có ký ức nào về việc phải thay đồ chỉ để chụp ảnh cả.」"
# 【ふかみ】
# display as 深美
# JP: 「むむむむむ」
992 = "「Ưm ưm ưm ưm ưm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何故、そのようなことを聞く？」
1112 = "「Sao em lại hỏi vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「アルバムの中、日々姫さん、\nわたしと凪ちゃんと同じくらいの年の頃から……」
1118 = "「Trong album, Hibiki, từ hồi trạc tuổi em và Nagi......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
1041 = "「Hửm?」"
# monologue
# JP: ふかみの言葉につられて僕も、\nアルバムのページを戻して、めくる。
1636 = "Nghe Fukami nói vậy, tôi cũng lật ngược lại các trang album."
# 【双鉄H】
# display as 雙鐵
# JP: 「……む。\nわからん。なにかあるのか？」
745 = "「......Ưm. Anh không hiểu. Có chuyện gì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ――今の双鉄さんでも、気づかないんですね」
1016 = "「A――ngay cả anh Soutetsu bây giờ cũng không nhận ra nhỉ.」"
# monologue
# JP: 嬉しさと、物足りなさとを等分に混じえたような声。\nそれに鼓膜を揺すられたなら、知りたい気持ちを煽られる。
1587 = "Một giọng nói pha lẫn niềm vui và sự hụt hẫng với tỷ lệ ngang nhau. Âm thanh đó lọt vào tai khiến tôi càng thêm tò mò muốn biết."
# 【双鉄H】
# display as 雙鐵
# JP: 「何に、僕は気づいてないのだ？」
1091 = "「Anh không nhận ra điều gì cơ?」"
# 【ふかみ】
# display as 深美
# JP: 「なにって、だから――\nこういうこと、です」
1149 = "「Điều gì á, thì là―― như thế này, ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1023 = "「!」"
# monologue
# JP: アルバムを置き、\nふかみがゆるゆる、スカートをたくしあげていく。
1556 = "Fukami đặt cuốn album xuống, từ từ vén chiếc váy của mình lên."
# monologue
# JP: シンプルなデザインの、ゆえに極めてかわいいパンツが、\n僕の眼前、惜しげもなしにさらされる。
1332 = "Chiếc quần lót với thiết kế đơn giản nhưng lại vô cùng đáng yêu, được phơi bày trước mắt tôi không chút giấu giếm."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1045 = "「A――」"
# monologue
# JP: そこまで示してもらえば、わかる。\n修学旅行を重ねた成果が、今の僕になら答えを示す。
1507 = "Được gợi ý đến mức đó thì tôi cũng hiểu ra rồi. Thành quả của những chuyến dã ngoại giờ đây đã cho tôi câu trả lời."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……年頃になってから、\n日々姫は、急にスカートが短くなっていたのか」
1089 = "「Ra là vậy......từ khi đến tuổi dậy thì, váy của Hibiki đột nhiên ngắn đi sao.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄さん……やっぱり、気づけてなかったんですね」
1164 = "「Anh Soutetsu......quả nhiên là đã không nhận ra nhỉ.」"
# monologue
# JP: 安堵の気持ちと、なにかを咎めるような調子と、\nその両方がふかみの声から伝わってくる。
1586 = "Cảm giác an tâm xen lẫn chút hờn trách, cả hai đều được truyền tải qua giọng nói của Fukami."
# monologue
# JP: 咎める理由を、深く考えたくなくて。\n昔の日々姫に悪い気がして、少しズラした答えを返す。
1433 = "Tôi không muốn nghĩ sâu xa về lý do em ấy hờn trách. Cảm thấy có lỗi với Hibiki ngày xưa, tôi đưa ra một câu trả lời hơi lảng tránh."
# 【双鉄H】
# display as 雙鐵
# JP: 「仕方ない。\nその頃の僕は、ふかみと凪に、出会えてなかった」
1108 = "「Hết cách rồi. Khi đó anh vẫn chưa gặp được em và Nagi mà.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……」
1008 = "「A......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「パンツが、こんなにもいやらしく目を惹く物だと、\n僕は、ふたりに教えられるまで、知らなかったのだから」
1057 = "「Vì cho đến khi được hai người dạy cho, anh không hề biết quần lót lại là thứ khêu gợi và thu hút ánh nhìn đến vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「いやらし……くって……目を、ひきます、か？\nわた、し、の……パン、ツ――」
929 = "「Khêu gợi......và thu hút......ánh nhìn, ạ? Quần, lót......của, em――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。まばたきするのも勿体ないほど、\n魅力的だと感じてるし……もっとたくさんを見たくなる」
1099 = "「Ừ. Quyến rũ đến mức chớp mắt thôi cũng thấy tiếc...... anh muốn được nhìn thấy nhiều hơn nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「もっと、たくさん――」
1061 = "「Nhiều, hơn nữa――」"
# monologue
# JP: （しゅるっ）
1761 = "（Tuột）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1017 = "「っ」"
# monologue
# JP: ふかみが、キャミソールを引き下げて――
1549 = "Fukami kéo chiếc áo hai dây xuống――"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
981 = "「Fua!」"
# monologue
# JP: ずりあげようとしたブラに、\nピンピンに勃起している乳首がこすれたのだろう。
1370 = "Có lẽ nhũ hoa đang cương cứng của em ấy đã cọ xát vào chiếc áo lót khi bị kéo lên."
# monologue
# JP: ふかみは快感の声をあげ、\nパンツの股間の染みの範囲を、広げてしまう。
1384 = "Fukami cất giọng rên rỉ đầy khoái cảm, làm vết ướt ở đũng quần lót càng lan rộng hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「目だけではなく、体も惹かれる。\n見れば見るほど、ふかみに触れたくなってくる」
1139 = "「Không chỉ ánh mắt mà cả cơ thể anh cũng bị thu hút. Càng nhìn, anh lại càng muốn chạm vào Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「な、なら――」
1152 = "「Nế, nếu vậy――」"
# monologue
# JP: もぞりと、ふかみの腰が蠢く。\n頬の赤みが濃くなって、瞳も潤み始めてる。
1589 = "Hông của Fukami khẽ cựa quậy. Đôi gò má ửng hồng hơn, đôi mắt cũng bắt đầu ngấn lệ."
# 【ふかみ】
# display as 深美
# JP: 「す、好きに、触っていい――です、よ？\nわたしの――パ、パンツ」
949 = "「A, anh cứ tùy ý, chạm vào cũng được――đấy, ạ? Quần, lót――của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う……む？」
748 = "「Ư......m?」"
# monologue
# JP: パンツ自体は……\nどんなに可愛くあろうが包装紙に過ぎんような気がする。
1331 = "Bản thân chiếc quần lót...... dù có đáng yêu đến đâu thì tôi cũng có cảm giác nó chỉ là lớp giấy gói mà thôi."
# monologue
# JP: 触れて味わいたいのは当然、\n中身であるに決まっている――が。
1461 = "Thứ tôi muốn chạm vào và thưởng thức, tất nhiên là phần nội dung bên trong rồi――nhưng mà."
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった。\nならば、パンツを触ってみよう」
1065 = "「Anh hiểu rồi. Vậy thì, anh sẽ chạm vào quần lót nhé.」"
# monologue
# JP: （ぐいいいっ！）
1736 = "（Ấn mạnh!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　やっ――双鉄さんっ！？\nパンツ、わたしの、パンツ――食い……込ん――ふあっ」
973 = "「Hya!? A――Anh Soutetsu!? Quần lót, quần lót của em――bị lún......vào――fua」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。\n思い切り引っ張って食い込ませてる」
1038 = "「Ừ, đúng vậy. Anh đang kéo hết cỡ để nó lún vào đấy.」"
# monologue
# JP: （ゆさっ――ゆさっ――）
1758 = "（Đung đưa――đung đưa――）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ……あっ――そんなに――され、たらっ……\nんっ――やっ――わた、しっ――感じ……って」
970 = "「Hyau......a――Bị làm, thế này...... ưm――a――em――sẽ có cảm giác......mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう？」
1102 = "「Hô?」"
# monologue
# JP: （ずりっ）
1752 = "（Cọ）"
# 【ふかみ】
# display as 深美
# JP: 「やんっ！」
972 = "「Yan!」"
# monologue
# JP: 今度はパンツを横にずらして、\nふかみのスジを直接に見て確かめる。
1455 = "Lần này tôi kéo lệch chiếc quần lót sang một bên, để trực tiếp nhìn và kiểm tra rãnh của Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど、確かに……\n溢れる程に濡らして、随分と感じてくれているようだな」
1133 = "「Thì ra là vậy, quả thực...... Ướt đến mức tràn cả ra ngoài, có vẻ như em đang rất có cảm giác nhỉ.」"
# monologue
# JP: （ずっ――ずりっ――ずっ――ぐいいっ）
1753 = "（Cọ――cọ――cọ――ấn mạnh）"
# 【ふかみ】
# display as 深美
# JP: 「ぱあっ！？　ま、またグイって――んっ！　あ――\nパンツでっ……感じちゃう、とかっ――あっ――やぁっ」
983 = "「Paa!? Lạ, lại ấn nữa――ưm! A―― Bị quần lót......làm cho có cảm giác――a――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「イヤと言われては心外だ。\nふかみが、パンツを好きにいじれと」
1135 = "「Nghe em nói không thích mà anh thấy buồn quá. Chính Fukami đã bảo anh cứ tùy ý đùa nghịch quần lót mà.」"
# monologue
# JP: （ぐいっ――ぐっ――ずりゅっ――ずりんっ）
1737 = "（Ấn――ấn――cọ――cọ）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅんっ！」
993 = "「Nkyun!」"
# monologue
# JP: 抗議の気持ちを指先に込め、\nまたもぐいぐい、布地を股間に食い込ませていく。
1457 = "Tôi dồn sự kháng nghị vào đầu ngón tay, lại tiếp tục ấn mạnh lớp vải lún sâu vào giữa hai chân em ấy."
# monologue
# JP: ふかみは荒い息を吐き、\n真っ赤な顔で、上目遣いに僕を見てくる。
1603 = "Fukami thở dốc, khuôn mặt đỏ bừng, ngước mắt lên nhìn tôi."
# 【ふかみ】
# display as 深美
# JP: 「こ、こんな――触られ、かたっ……ん――とか、だ、と、\nグイって――される――と、おしっこ――出ちゃい、そ」
1144 = "「Bị, bị chạm――thế này......ưm――cứ, ấn――như vậy――thì, em――sẽ tè, mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「むっ」
991 = "「Ưm」"
# monologue
# JP: （ぴたっ）
1755 = "（Dừng lại）"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1017 = "「啊」" 
# monologue
# JP: パンツを引く手を止めればすぐさま、淋しげな声。
1445 = "「A」"
# monologue
# JP: それを自覚し、ふかみは真っ赤に染まってしまうが、\n止めた手は、そろそろとパンツから離すしか無い。
1377 = "Vừa dừng tay kéo quần lót lại, em ấy liền cất giọng tiếc nuối."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみのおしっこをする姿にも、大変に興味はあるが。\nさすがに――今は、な」
1088 = "Nhận ra điều đó, khuôn mặt Fukami nhuốm màu đỏ ửng, nhưng bàn tay đã dừng lại của tôi đành phải từ từ rời khỏi chiếc quần lót."
# 【ふかみ】
# display as 深美
# JP: 「あ――はい。はい」
1014 = "「Dù anh cũng rất hứng thú với dáng vẻ lúc tè của Fukami. Nhưng quả thực――bây giờ thì không được.」"
# monologue
# JP: 尿意をまるで閉じ込めようとするかのように、\nふかみはさささとパンツを直して、強く頷く。
1551 = "「A――vâng. Vâng.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、おしっこは――えと――しちゃって――平気な。\nそういうところ、で……見て――ください。です」
1159 = "Như thể muốn giam giữ cơn buồn tiểu lại, Fukami vội vã chỉnh lại quần lót và gật đầu mạnh."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1064 = "「Vậy, chuyện đi tiểu――ừm――nếu tè ra――mà không sao. Thì ở những nơi như vậy......xin anh――hãy nhìn nhé. Ạ.」"
# monologue
# JP: 見せてくれるのなら素直に嬉しい。ありがたい。
1641 = "「Ừ.」"
# monologue
# JP: その喜びが、許可してもらえたことへの自信が、\n僕をもう少し貪欲にする。
1660 = "Nếu em ấy chịu cho xem thì tôi thật sự rất vui. Thật đáng biết ơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「ちなみに、だ。グイグイされるのではないのなら――\nふかみはどんなパンツの触られ方を予想していたのだ？」
963 = "Niềm vui đó, cùng với sự tự tin khi được cho phép, khiến tôi trở nên tham lam hơn một chút."
# 【ふかみ】
# display as 深美
# JP: 「は、はいっ！」
1063 = "「Nhân tiện thì. Nếu không phải là bị ấn mạnh―― thì Fukami đã tưởng tượng sẽ được chạm vào quần lót như thế nào?」"
# monologue
# JP: 愛撫を途中で止められたのが、\nよほどもどかしかったのだろうか？
1435 = "「V, vâng!」"
# monologue
# JP: 飛びつくようにおまんこへ届いた指先が、\nさすさすと、縦スジに沿って動き始める。
1513 = "Việc bị dừng màn vuốt ve giữa chừng, có lẽ đã khiến em ấy vô cùng bứt rứt sao?"
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――んっ――こう、やって――んっ――\nおまんこの……われ、め――すり、すり、した、り」
1031 = "Những đầu ngón tay như chồm lấy lỗ nhỏ, bắt đầu di chuyển dọc theo rãnh dọc."
# monologue
# JP: （しにゅっ）
1721 = "「Ưm......a――ưm――như thế, này――ưm―― Rãnh......của lỗ nhỏ――cọ, cọ, xát, này」"
# monologue
# JP: 指のストロークが長くなる。\nパンツはべっとり濡れ始め、割れ目の形に食い込んでいく。
1509 = "（Cọ）"
# monologue
# JP: 盛り上がってるおまめの部分を、指の根本の腹を使って、\nふかみはしつこく、優しくさする。
1397 = "Quãng di chuyển của ngón tay dài hơn. Quần lót bắt đầu ướt sũng, lún sâu vào hình dáng của khe rãnh."
# 【ふかみ】
# display as 深美
# JP: 「それ……から、クリ、トリス……んっ――あっ――\nこう、やって――こしゅ、こしゅ、したり――あとっ」
1117 = "Sử dụng phần bụng ngón tay ở gốc, Fukami liên tục vuốt ve nhẹ nhàng lên phần hột le đang sưng phồng."
# monologue
# JP: （くぱあっ！）
1747 = "「Sau......đó, âm, vật......ưm――a―― như thế, này――xoa, xoa, này――rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
995 = "（Tách ra!）"
# monologue
# JP: パンツの上から指をあて、パンツに形を浮かせるように、\nふかみは、おまんこを大きく開く。
1601 = "「!!」"
# 【ふかみ】
# display as 深美
# JP: 「パンツ、ごしに――んっ――無理、やり……\nおまん、こ――開い、たり……あ……し、てっ――」
1163 = "Đặt ngón tay lên trên quần lót, như để in hằn hình dáng lên lớp vải, Fukami mở rộng lỗ nhỏ ra."
# monologue
# JP: （くりゅっ――クリュ――くちゅっ――くちゅ）
1754 = "「Cách lớp, quần lót――ưm――ép, buộc...... mở, rộng――lỗ nhỏ, ra......a......này――」"
# monologue
# JP: べったり濡れて張り付くせいで、\n開かれているおまんこ内部の形もパンツに浮き上がる。
1580 = "（Ngoáy――ngoáy――nhóp nhép――nhóp nhép）"
# monologue
# JP: ひときわ濡れが濃い膣口を、何度も何度も何度も何度も、\nふかみの指先はくりくり動いて、ノックを重ねる。
1373 = "Vì lớp vải ướt sũng dính chặt vào, nên hình dáng bên trong lỗ nhỏ đang mở rộng cũng in hằn lên quần lót."
# 【ふかみ】
# display as 深美
# JP: 「それ……でっ――おまんこっ――膣、の……入り口――\nしつ、こく、いじめられ、て――焦らされたり、してっ」
1116 = "Tại cửa âm đạo nơi ướt át nhất, ngón tay của Fukami liên tục, liên tục ngoáy tròn, gõ từng nhịp từng nhịp."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　ふかみっ――声が大きい」
1007 = "「Sau......đó――lỗ nhỏ――cửa......âm đạo―― bị bắt, nạt, liên, tục――làm cho, bứt rứt, này」"
# monologue
# JP: あまりに高度な『正しいパンツの触り方』につい熱中し、\n食い入るように、食い込みに見入ってしまっていたが――
1564 = "「!? Fukami――em nói to quá rồi đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉も日々姫もハチロクも今は蔵だが、\nなにかがあれば、いつでも戻ってくるのだぞ」
1128 = "Tôi đã lỡ say sưa theo dõi 『cách chạm vào quần lót đúng chuẩn』 quá đỗi cao siêu này, đến mức dán mắt vào vết lún sâu ấy, nhưng――"
# 【ふかみ】
# display as 深美
# JP: 「な、なら――です、ね」
1153 = "「Chị Mayami, Hibiki và Hachiroku bây giờ đang ở trong xưởng, nhưng nếu có chuyện gì thì họ có thể quay lại bất cứ lúc nào đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
# 1017 = "「啊」" 
# monologue
# JP: あーんと、ふかみは口を開け、\nその内側を、僕にたっぷり見せつける。
1555 = "「Nế, nếu vậy――thì.」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしの――おくち、をっ……その――双鉄さん、\nの、で――ふさいじゃえば、いい、って……思う、です」
1093 = "Aaaa, Fukami há miệng ra, phô bày trọn vẹn bên trong cho tôi thấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「！！！」
1167 = "「Miệ, miệng――của em......ừm――anh Soutetsu, dùng, cái đó――bịt lại, là được......em nghĩ, vậy.」"
# monologue
# JP: （ずるんっ！）
1770 = "「!!!」"
# monologue
# JP: 言われた瞬間、パンツごとズボンを脱いでいる。
1634 = "（Tuột!）"
# monologue
# JP: 引っかかってしまった勃起が腹を叩いて、\nベチっ、と痛そうな音を出す。
1643 = "Khoảnh khắc nghe em ấy nói vậy, tôi liền cởi phăng cả quần dài lẫn quần lót."
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　\n双鉄さん、い、今の大丈夫なっ！？――んぐっ！？」
977 = "Dương vật đang cương cứng bị vướng lại, đập vào bụng, tạo ra âm thanh chát chúa nghe có vẻ đau đớn."
# 【双鉄H】
# display as 雙鐵
# JP: 「声が、大きい。\nだから、遠慮なく塞がせてもらう」
1137 = "「Hya!? Anh Soutetsu, v, vừa rồi không sao chứ!?――Ngu!?」"
# 【ふかみ】
# display as 深美
# JP: 「んっ――んっ――ん～～っ――ふっ――んっ――\nんむっ――んっ――んぅっ――んっ」
987 = "「Giọng em, to quá. Nên anh sẽ không khách sáo mà bịt nó lại đây.」"
# monologue
# JP: （にゅるっ――はみゅっ）
1772 = "「Ưm――ưm――ưm~~――phù――ưm―― ưm――ưm――ưm――ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1023 = "「啊！」" 
# monologue
# JP: 性衝動のままの行為を、\nけれどもふかみは受け入れる。
1560 = "（Trơn tuột――ngoạm）"
# monologue
# JP: 唇で歯をくるんでくれて、舌を沿わせて。僕の勃起を\n傷つけないよう丁寧に準備してくれる――から！
1382 = "「!」"
# monologue
# JP: （ずっ！　ずぼっ！　ずちょっ！　ぼちゅっ！）
1742 = "Một hành động hoàn toàn theo bản năng tình dục, nhưng Fukami vẫn đón nhận nó."
# 【ふかみ】
# display as 深美
# JP: 「ふぐっ――ぐっ――んぷっ――んっ――ふっ――んっ\nふうっ――んっ――んぎゅっ――ちゅっ――ちゅうう！」
1000 = "Dùng môi bọc lấy răng, đưa lưỡi mơn trớn. Cẩn thận chuẩn bị để không làm tổn thương dương vật của tôi――!"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ」
# 1017 = "「啊」" 
# monologue
# JP: 荒く不規則だった鼻息がじわじわ落ち着いてくると同時に、\n吸引がくる。
1399 = "（Phập! Phập! Nhóp! Nhóp!）"
# 【ふかみ】
# display as 深美
# JP: 「ぼちゅっ！　ぶぢゅっ！　ぢゅっ！　ちゅるっ！\nちゅううっ！　でゅるっ！　ちゅぶっ！　ぼぢゅっ！！」
1027 = "「Fugu――gu――npu――ưm――fu――ưm fuu――ưm――ngyu――chụt――chụtttt!」"
# monologue
# JP: 強く吸われる力に逆らい腰を引き、\n一点今度は素直に応じ、思いっきりに突き入れる。
1463 = "「A」"
# 【ふかみ】
# display as 深美
# JP: 「んぐっ！　んっ――んっ――ふううっ――んっ――\nングッ――んっ――ふうっ――んっ――んっ――ふうっ」
994 = "Cùng lúc với hơi thở gấp gáp và không đều đặn dần dần ổn định lại, một lực mút xuất hiện."
# monologue
# JP: 喉を突いてしまえばえづきのような音。\nそれでもふかみは、懸命に吸い舌を動かす。
1527 = "「Nhóp! Nhóp! Chụt! Chụt! Chụtttt! Chụt! Nhóp! Nhóp!!」"
# 【ふかみ】
# display as 深美
# JP: 「えむっ――んっ――れるっ――れろっ――\nれろおっっ――ふっ――んっ――すっ――すひっ」
1002 = "Tôi chống lại lực mút mạnh mẽ mà rút hông lại, nhưng ngay sau đó lại ngoan ngoãn đáp lại, đâm vào hết sức."
# monologue
# JP: そして苦しげな呼吸に時折り、\nひどく甘やかな息が混じって――
1614 = "「Ngu! Ưm――ưm――fuuu――ưm―― Ngu――ưm――fuu――ưm――ưm――fuu」"
# monologue
# JP: （くちゅっ――ちゅっ――すりっ――すりゅんっ）
# 1754 = "（擦，擦，擦，擦）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ」
749 = "Mỗi khi đâm trúng cổ họng lại phát ra âm thanh như đang nôn khan. Dù vậy, Fukami vẫn liều mạng mút và đưa đẩy lưỡi."
# monologue
# JP: ふかみの指は、とまっていない。
1584 = "「Emu――ưm――reru――rero―― reroo――fu――ưm――su――suhi」"
# monologue
# JP: 僕に口腔を提供し、思うがままに突かれてもなお、\nかわいいおまんこをパンツごし、ずうっと弄り続けてる。
1340 = "Và xen lẫn trong nhịp thở khó nhọc thỉnh thoảng, lại có những hơi thở ngọt ngào đến nao lòng――"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、ふか……みっ――\nイこう……一緒に」
1157 = "（Nhóp nhép――chụt――cọ――cọ）"
# 【ふかみ】
# display as 深美
# JP: 「ん……ふ、あっ――んっ――ふぁひ……んうっ――んっ、\nほーへふ……ふぁん……うくっ――んっ！」
1034 = "「――A」"
# monologue
# JP: （くちゅっ！　ちぷっ！　ちゅぷっ！　ちゅにゅっ！）
1751 = "Ngón tay của Fukami, vẫn không hề dừng lại."
# monologue
# JP: 指が激しく蠢きコスる、\nその水音が、僕の動きも滑らかにする。
1633 = "Dù đang dâng hiến khoang miệng cho tôi, mặc cho tôi đâm vào theo ý muốn, em ấy vẫn liên tục mân mê lỗ nhỏ đáng yêu của mình qua lớp quần lót."
# monologue
# JP: （ずっ！　じゅぶ！　じゅぼっ！　ちゅぱんっ！）
1733 = "「Nếu vậy, Fuka......mi―― Cùng ra......nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――んっ――ぢゅっ――ぢゅちゅるっ――ぐ――\nあっ――ほーへふ、ふぁ――ほーへふ、ふぁんっ！！」
1025 = "「Ưm......fu, a――ưm――fahi......n'u――ưm, Sou-tetsu......san......uku――ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うっ」
# 991 = "「唔」" 
# monologue
# JP: ふかみの舌が、口内が、\n張り付きながらぶるぶる震え――っ！！？
1591 = "（Nhóp nhép! Nhóp! Nhóp! Nhóp nhép!）"
# 【ふかみ】
# display as 深美
# JP: 「ぢゅっ！――ぢゅううううううううううううっ！！」
1028 = "Ngón tay cọ xát dữ dội, âm thanh nhóp nhép ấy khiến chuyển động của tôi cũng trở nên trơn tru hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 981 = "「哇！」" 
# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅうっ！！）
1726 = "（Phập! Phập! Phập! Chụt!）"
# 【ふかみ】
# display as 深美
# JP: 「んぷっ！！？　んっ！　ふぅぅぅぅぅぅぅんっ！！！」
1044 = "「Fa――ưm――dyu――dyuchuru――gu―― a――Sou-tetsu, san――Sou-tetsu, san!!」"
# monologue
# JP: 僕の精液を喉で受け止め、\nふかみの全身が激しくビクつく。
1571 = "「Ưm」"
# 【ふかみ】
# display as 深美
# JP: 「ん……ぷっ……んぷっ――んっ――んうっ――\nん～～っ――んっ！　こくっ――こくっ――ごくっ」
1033 = "Lưỡi của Fukami, khoang miệng của em ấy, vừa dính chặt lấy vừa run rẩy bần bật――!!?"
# monologue
# JP: 絶頂しながら、ふかみは僕の精を飲んでる。
1535 = "「Chụt!――Chụtttttttttttt!!」"
# monologue
# JP: ひどく苦しげに鼻息を出し、\nけれどもすぐに喉を動かし、あふれる精を胃に落としてる。
1385 = "「Kua!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！」
1111 = "（Phụt! Phụt! Phụt! Phụtttt!!）"
# monologue
# JP: （ずるううううっ！）
1745 = "「Npu!!? Ưm! Fuuuuun!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ぷあっ！！？」
982 = "Hứng lấy tinh dịch của tôi bằng cổ họng, toàn thân Fukami co giật dữ dội."
# monologue
# JP: けれども、胃では満足できない。\nふかみの膣へ、子宮へ精子を送り込みたい。
1316 = "「Ưm......pu......npu――ưm――n'u―― ưm~~――ưm! Ực――ực――ực」"
# monologue
# JP: その欲求と、ここは家だという意識。\nそれがギリギリせめぎあい、僕の体を素早く動かす。
1523 = "Vừa lên đỉnh, Fukami vừa nuốt lấy tinh dịch của tôi."
# monologue
# JP: （ぽふんっ）
1746 = "Em ấy thở hắt ra đầy đau đớn, nhưng ngay lập tức cử động cổ họng, nuốt trọn dòng tinh dịch trào ra xuống dạ dày."
# 【ふかみ】
# display as 深美
# JP: 「ひゃんっ」
971 = "「Fukami!」"
# monologue
# JP: 敷布団だけ投げ捨てるように畳に広げ、\nその上に、ふかみの体を横たえる。
