1403 = "「Hi――i――ưm――ưm~――ưm! Fuu――fuu――fuu――fuu」"
# monologue
# JP: （ずっ――ぬっ――ずんっ――ぬるうっ――）
1735 = "Không thể kìm nén được nữa. Fukami há to miệng thở dốc. Dù vậy, bằng cách nào đó em ấy vẫn tiếp tục nén giọng lại――!?"
