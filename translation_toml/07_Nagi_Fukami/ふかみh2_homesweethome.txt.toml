[script]
# lines: 325 
# 【ふかみ】
# display as 深美
# JP: 「……すっごく――なんていうか、その」
751 = "「……Thực sự là——nói sao nhỉ, ừm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「遠慮をせずに言っていい。\n僕が見ても、昔の僕は目つきが悪い」
934 = "「Em cứ nói thẳng ra không cần ngại đâu.\nNgay cả anh nhìn lại, cũng thấy ánh mắt của mình ngày xưa thật hung dữ.」"
# 【ふかみ】
# display as 深美
# JP: 「目つきが悪いとか、じゃなく……って――\nその――ええとっ」
932 = "「Không phải là ánh mắt hung dữ hay gì đâu……mà là——\nỪm——xem nào」"
# monologue
# JP: 思ったままを話したのだが、\nかえって困らせてしまったらしい。
1480 = "Tôi đã nói ra những gì mình nghĩ,\nnhưng có vẻ lại làm em ấy bối rối hơn."
# monologue
# JP: ふかみはもごもごいいながら、\nアルバムのページを手早くめくる。
1541 = "Fukami vừa ấp úng,\nvừa nhanh tay lật các trang album."
# 【ふかみ】
# display as 深美
# JP: 「あれっ？」
978 = "「Ủa?」"
# monologue
# JP: 困ったようにあちこち揺れてた瞳がいきなり、\nスっと定まる。
1371 = "Đôi mắt đang đảo quanh như đang bối rối của em ấy đột nhiên,\ndừng lại ở một điểm."
# 【ふかみ】
# display as 深美
# JP: 「ん……」
986 = "「Ưm……」"
# monologue
# JP: めくったページを、また戻す。
1367 = "Em ấy lật lại trang vừa lật qua."
# 【ふかみ】
# display as 深美
# JP: 「これって、どういうシチュエーション、で……\n撮った写真たち……なんです、か？」
1145 = "「Những bức ảnh này, là chụp trong……\nhoàn cảnh nào……vậy ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「シチュエーションというか……\nほとんどが、[かあ,1]義母さんが撮ったものだな」
1073 = "「Hoàn cảnh sao……\nHầu hết đều do mẹ nuôi anh chụp.」"
# 【ふかみ】
# display as 深美
# JP: 「[みぎたいちしゅぞうもと,5]右田一酒造元の……真闇さんの前の、[とうじ,1]杜氏さん？」
1096 = "「Là Toji……trước chị Mayami, của nhà máy rượu Migitaichi sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや。真闇姉は、そのお祖母様から引き継いだそうだ。\nどうも、義母さんには酒造りの才は無かったらしく」
936 = "「Không. Chị Mayami được kế thừa từ bà nội.\nCó vẻ như, mẹ nuôi anh không có năng khiếu ủ rượu.」"
# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
1101 = "「Vậy sao ạ.」"
# monologue
# JP: 意外、という風な声を出し。\nけれどもああ、とすぐさま小さく頷きもする。
1536 = "Em ấy cất giọng ngạc nhiên.\nNhưng ngay sau đó lại khẽ gật đầu, ra chiều đã hiểu."
# monologue
# JP: 真闇姉があの若さですでにベテラン杜氏だということが、\n事実を逆から示していると、恐らくは気づいたのだろう。
1376 = "Chắc hẳn em ấy đã nhận ra rằng việc chị Mayami đã là một Toji kỳ cựu ở độ tuổi trẻ như vậy,\nchính là minh chứng ngược lại cho sự thật đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「それゆえ、[とう,1]義父さん以上に忙しく働きまわっていた。\n御一夜にはほとんど戻ってこれないような人でな――」
1050 = "「Vì thế, bà ấy làm việc bận rộn hơn cả bố nuôi anh.\nBà ấy hầu như chẳng mấy khi trở về Ohitoyo——」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
1035 = "「Vâng.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「帰ってくれば真闇姉と日々姫とを構いまくって、\nおまけに写真もばっしゃばっしゃと撮っていたのだ」
1046 = "「Khi về nhà, mẹ lại suốt ngày bám lấy chị Mayami và Hibiki,\nhơn nữa còn chụp ảnh lia lịa nữa chứ.」"
# monologue
# JP: 僕などは、それに巻き込まれていたようなものだが――\nいや、ああ。そうか。
1447 = "Tôi cũng bị cuốn vào chuyện đó——\nKhông, à. Ra là vậy."
# monologue
# JP: 今考えてみれば、なるほど。\n我ながら思う目つきの悪さの、それも一因なのかもしれぬ。
1612 = "Bây giờ nghĩ lại, tôi mới hiểu.\nĐó có lẽ cũng là một phần nguyên nhân khiến ánh mắt của tôi trở nên hung dữ như vậy."
# 【ふかみ】
# display as 深美
# JP: 「――って、いうことは」
742 = "「——Vậy, có nghĩa là」"
# monologue
# JP: ふかみがむむっと眉を潜めて、\nアルバムをまた、めくって戻す。
1595 = "Fukami cau mày, ừm một tiếng,\nrồi lại lật album trở về."
# 【ふかみ】
# display as 深美
# JP: 「これって、\n双鉄さんの、飾らない普段着な感じですか？」
1146 = "「Đây là,\nhình ảnh thường ngày không chút giả tạo của anh Soutetsu sao ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だと思うぞ？　少なくとも、写真を撮るために\n着替えたような記憶を僕は、持ってない」
1078 = "「Anh nghĩ vậy? Ít nhất thì, anh không có ký ức\nvề việc phải thay quần áo chỉ để chụp ảnh.」"
# 【ふかみ】
# display as 深美
# JP: 「むむむむむ」
992 = "「Ưm ưm ưm ưm ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何故、そのようなことを聞く？」
1112 = "「Tại sao, em lại hỏi như vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「アルバムの中、日々姫さん、\nわたしと凪ちゃんと同じくらいの年の頃から……」
1118 = "「Trong album, Hibiki,\ntừ lúc tầm tuổi em và bé Nagi……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
1041 = "「Hửm?」"
# monologue
# JP: ふかみの言葉につられて僕も、\nアルバムのページを戻して、めくる。
1636 = "Bị thu hút bởi lời nói của Fukami, tôi cũng\nlật ngược lại các trang album."
# 【双鉄H】
# display as 雙鐵
# JP: 「……む。\nわからん。なにかあるのか？」
745 = "「……Hừm.\nAnh không hiểu. Có chuyện gì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ――今の双鉄さんでも、気づかないんですね」
1016 = "「A——Ngay cả anh Soutetsu của hiện tại, cũng không nhận ra nhỉ.」"
# monologue
# JP: 嬉しさと、物足りなさとを等分に混じえたような声。\nそれに鼓膜を揺すられたなら、知りたい気持ちを煽られる。
1587 = "Giọng nói xen lẫn sự vui vẻ và một chút tiếc nuối.\nKhi màng nhĩ rung lên vì điều đó, cảm giác tò mò trong tôi càng bị kích thích."
# 【双鉄H】
# display as 雙鐵
# JP: 「何に、僕は気づいてないのだ？」
1091 = "「Anh không nhận ra, chuyện gì cơ?」"
# 【ふかみ】
# display as 深美
# JP: 「なにって、だから――\nこういうこと、です」
1149 = "「Chuyện gì ư, thì là——\nChuyện này, đây ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1023 = "「!」"
# monologue
# JP: アルバムを置き、\nふかみがゆるゆる、スカートをたくしあげていく。
1556 = "Đặt cuốn album xuống,\nFukami từ từ vén váy lên."
# monologue
# JP: シンプルなデザインの、ゆえに極めてかわいいパンツが、\n僕の眼前、惜しげもなしにさらされる。
1332 = "Chiếc quần lót với thiết kế đơn giản, nhưng lại vô cùng đáng yêu,\nđược phơi bày trước mắt tôi không chút giấu giếm."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1045 = "「A——」"
# monologue
# JP: そこまで示してもらえば、わかる。\n修学旅行を重ねた成果が、今の僕になら答えを示す。
1507 = "Được chỉ ra đến mức đó, thì tôi cũng hiểu.\nThành quả của những chuyến dã ngoại đã cho tôi câu trả lời lúc này."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……年頃になってから、\n日々姫は、急にスカートが短くなっていたのか」
1089 = "「Ra vậy……từ khi đến tuổi dậy thì,\nváy của Hibiki đột nhiên ngắn lại sao.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄さん……やっぱり、気づけてなかったんですね」
1164 = "「Anh Soutetsu……quả nhiên, đã không nhận ra nhỉ.」"
# monologue
# JP: 安堵の気持ちと、なにかを咎めるような調子と、\nその両方がふかみの声から伝わってくる。
1586 = "Cảm giác an tâm, xen lẫn một chút trách móc,\ncả hai điều đó đều truyền đến từ giọng nói của Fukami."
# monologue
# JP: 咎める理由を、深く考えたくなくて。\n昔の日々姫に悪い気がして、少しズラした答えを返す。
1433 = "Tôi không muốn suy nghĩ sâu xa về lý do bị trách móc.\nCảm thấy có lỗi với Hibiki ngày xưa, tôi đưa ra một câu trả lời hơi lảng tránh."
# 【双鉄H】
# display as 雙鐵
# JP: 「仕方ない。\nその頃の僕は、ふかみと凪に、出会えてなかった」
1108 = "「Đành chịu thôi.\nLúc đó anh chưa gặp được Fukami và Nagi mà.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……」
1008 = "「A……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「パンツが、こんなにもいやらしく目を惹く物だと、\n僕は、ふたりに教えられるまで、知らなかったのだから」
1057 = "「Quần lót là một thứ gợi dục và thu hút ánh nhìn đến vậy,\nanh không hề biết cho đến khi được hai em dạy cho đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「いやらし……くって……目を、ひきます、か？\nわた、し、の……パン、ツ――」
929 = "「Gợi dục……và……thu hút, ánh nhìn, sao ạ?\nCủa, em……quần, lót——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。まばたきするのも勿体ないほど、\n魅力的だと感じてるし……もっとたくさんを見たくなる」
1099 = "「Ừ. Đến mức chớp mắt cũng thấy tiếc,\nanh cảm thấy nó rất quyến rũ……và muốn nhìn nhiều hơn nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「もっと、たくさん――」
1061 = "「Nhiều, hơn nữa——」"
# monologue
# JP: （しゅるっ）
1761 = "（Xoạt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1017 = "「Kh」"
# monologue
# JP: ふかみが、キャミソールを引き下げて――
1549 = "Fukami, kéo áo hai dây xuống——"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
981 = "「Phù ah!」"
# monologue
# JP: ずりあげようとしたブラに、\nピンピンに勃起している乳首がこすれたのだろう。
1370 = "Chiếc áo lót vừa được kéo lên,\nchắc là đã cọ xát vào núm vú đang cương cứng."
# monologue
# JP: ふかみは快感の声をあげ、\nパンツの股間の染みの範囲を、広げてしまう。
1384 = "Fukami cất lên giọng nói đầy khoái cảm,\nlàm vết ướt ở đũng quần lót càng lan rộng ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「目だけではなく、体も惹かれる。\n見れば見るほど、ふかみに触れたくなってくる」
1139 = "「Không chỉ ánh mắt, mà cả cơ thể anh cũng bị thu hút.\nCàng nhìn, anh càng muốn chạm vào Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「な、なら――」
1152 = "「N, nếu vậy——」"
# monologue
# JP: もぞりと、ふかみの腰が蠢く。\n頬の赤みが濃くなって、瞳も潤み始めてる。
1589 = "Eo của Fukami cọ quậy.\nĐôi gò má ửng đỏ hơn, đôi mắt cũng bắt đầu ươn ướt."
# 【ふかみ】
# display as 深美
# JP: 「す、好きに、触っていい――です、よ？\nわたしの――パ、パンツ」
949 = "「A, anh có thể chạm vào, tùy thích——đấy ạ?\nCủa em——q, quần lót」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う……む？」
748 = "「Ư……m?」"
# monologue
# JP: パンツ自体は……\nどんなに可愛くあろうが包装紙に過ぎんような気がする。
1331 = "Bản thân chiếc quần lót……\nDù có đáng yêu đến mấy thì cũng chỉ như lớp giấy gói mà thôi."
# monologue
# JP: 触れて味わいたいのは当然、\n中身であるに決まっている――が。
1461 = "Thứ anh muốn chạm vào và thưởng thức, tất nhiên,\nchắc chắn là phần bên trong rồi——nhưng mà."
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった。\nならば、パンツを触ってみよう」
1065 = "「Anh hiểu rồi.\nVậy thì, anh thử chạm vào quần lót nhé.」"
# monologue
# JP: （ぐいいいっ！）
1736 = "（Ấn mạnh!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　やっ――双鉄さんっ！？\nパンツ、わたしの、パンツ――食い……込ん――ふあっ」
973 = "「Hya!? Ya——anh Soutetsu!?\nQuần lót, quần lót của em——lún……vào——phù ah」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。\n思い切り引っ張って食い込ませてる」
1038 = "「Ừ, đúng vậy.\nAnh đang kéo mạnh và ấn nó lún vào đấy.」"
# monologue
# JP: （ゆさっ――ゆさっ――）
1758 = "（Lắc——lắc——）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ……あっ――そんなに――され、たらっ……\nんっ――やっ――わた、しっ――感じ……って」
970 = "「Hya ư……ah——nếu bị——làm, như vậy……\nƯm——ya——em——sẽ có, cảm giác……mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう？」
1102 = "「Hô?」"
# monologue
# JP: （ずりっ）
1752 = "（Kéo）"
# 【ふかみ】
# display as 深美
# JP: 「やんっ！」
972 = "「Yan!」"
# monologue
# JP: 今度はパンツを横にずらして、\nふかみのスジを直接に見て確かめる。
1455 = "Lần này anh kéo quần lót sang một bên,\nđể trực tiếp nhìn và kiểm tra rãnh dọc của Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど、確かに……\n溢れる程に濡らして、随分と感じてくれているようだな」
1133 = "「Ra vậy, đúng thật là……\nƯớt sũng đến mức tràn ra ngoài, có vẻ em đang cảm thấy rất sướng nhỉ.」"
# monologue
# JP: （ずっ――ずりっ――ずっ――ぐいいっ）
1753 = "（Kéo——kéo——kéo——ấn）"
# 【ふかみ】
# display as 深美
# JP: 「ぱあっ！？　ま、またグイって――んっ！　あ――\nパンツでっ……感じちゃう、とかっ――あっ――やぁっ」
983 = "「Pa ah!? L, lại ấn mạnh nữa——ưm! A——\nBằng quần lót……mà cũng cảm thấy sướng, sao——ah——ya」"
# 【双鉄H】
# display as 雙鐵
# JP: 「イヤと言われては心外だ。\nふかみが、パンツを好きにいじれと」
1135 = "「Bị nói là không thích thì anh tổn thương lắm đấy.\nLà Fukami bảo anh cứ tùy ý nghịch quần lót mà.」"
# monologue
# JP: （ぐいっ――ぐっ――ずりゅっ――ずりんっ）
1737 = "（Ấn——ấn——cọ——cọ）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅんっ！」
993 = "「Ưm kyu!」"
# monologue
# JP: 抗議の気持ちを指先に込め、\nまたもぐいぐい、布地を股間に食い込ませていく。
1457 = "Dồn sự phản kháng vào đầu ngón tay,\nem lại tiếp tục ấn mạnh lớp vải lún sâu vào háng."
# monologue
# JP: ふかみは荒い息を吐き、\n真っ赤な顔で、上目遣いに僕を見てくる。
1603 = "Fukami thở hổn hển,\nkhuôn mặt đỏ bừng, ngước mắt lên nhìn tôi."
# 【ふかみ】
# display as 深美
# JP: 「こ、こんな――触られ、かたっ……ん――とか、だ、と、\nグイって――される――と、おしっこ――出ちゃい、そ」
1144 = "「N, nếu——bị chạm, kiểu này……ưm——hay là, n, nếu,\nBị ấn——mạnh——thì, nước tiểu——sắp, chảy ra, mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「むっ」
991 = "「Ưm」"
# monologue
# JP: （ぴたっ）
1755 = "（Dừng lại）"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1017 = "「啊」" 
# monologue
# JP: パンツを引く手を止めればすぐさま、淋しげな声。
1445 = "Ngay khi tôi dừng tay kéo quần lót, một giọng nói đầy tiếc nuối vang lên."
# monologue
# JP: それを自覚し、ふかみは真っ赤に染まってしまうが、\n止めた手は、そろそろとパンツから離すしか無い。
1377 = "Nhận ra điều đó, khuôn mặt Fukami đỏ bừng lên,\nnhưng tôi chỉ còn cách từ từ rút tay ra khỏi quần lót."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみのおしっこをする姿にも、大変に興味はあるが。\nさすがに――今は、な」
1088 = "「Anh cũng rất hứng thú với cảnh Fukami đi tiểu đấy.\nNhưng mà——bây giờ thì, chưa được.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――はい。はい」
1014 = "「A——vâng. Vâng ạ.」"
# monologue
# JP: 尿意をまるで閉じ込めようとするかのように、\nふかみはさささとパンツを直して、強く頷く。
1551 = "Như thể đang cố gắng kìm nén cơn buồn tiểu,\nFukami vội vàng chỉnh lại quần lót, gật đầu mạnh."
# 【ふかみ】
# display as 深美
# JP: 「なら、おしっこは――えと――しちゃって――平気な。\nそういうところ、で……見て――ください。です」
1159 = "「Vậy thì, đi tiểu——ừm——cứ đi tiểu——thì không sao.\nĐến chỗ như thế……anh hãy——nhìn em. Nhé.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1064 = "「Ừ.」"
# monologue
# JP: 見せてくれるのなら素直に嬉しい。ありがたい。
1641 = "Nếu em ấy cho anh xem thì anh thực sự rất vui. Cảm ơn em."
# monologue
# JP: その喜びが、許可してもらえたことへの自信が、\n僕をもう少し貪欲にする。
1660 = "Niềm vui đó, cùng sự tự tin khi được cho phép,\nkhiến anh trở nên tham lam hơn một chút."
# 【双鉄H】
# display as 雙鐵
# JP: 「ちなみに、だ。グイグイされるのではないのなら――\nふかみはどんなパンツの触られ方を予想していたのだ？」
963 = "「Nhân tiện thì. Nếu không phải là ấn mạnh——\nFukami đã tưởng tượng anh sẽ chạm vào quần lót như thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「は、はいっ！」
1063 = "「V, vâng!」"
# monologue
# JP: 愛撫を途中で止められたのが、\nよほどもどかしかったのだろうか？
1435 = "Việc bị dừng âu yếm giữa chừng,\nchắc hẳn đã khiến em ấy vô cùng bứt rứt sao?"
# monologue
# JP: 飛びつくようにおまんこへ届いた指先が、\nさすさすと、縦スジに沿って動き始める。
1513 = "Đầu ngón tay em ấy vội vã chạm vào âm đạo,\nbắt đầu xoa xoa dọc theo đường rãnh."
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――んっ――こう、やって――んっ――\nおまんこの……われ、め――すり、すり、した、り」
1031 = "「Ưm……ah——ưm——như, thế này——ưm——\nCủa âm đạo……rãnh——cọ, cọ, cọ」"
# monologue
# JP: （しにゅっ）
1721 = "（Trượt）"
# monologue
# JP: 指のストロークが長くなる。\nパンツはべっとり濡れ始め、割れ目の形に食い込んでいく。
1509 = "Hành trình của ngón tay dài ra.\nQuần lót bắt đầu ướt sũng, lún sâu vào hình dáng của khe hở."
# monologue
# JP: 盛り上がってるおまめの部分を、指の根本の腹を使って、\nふかみはしつこく、優しくさする。
1397 = "Sử dụng phần đệm ở gốc ngón tay cọ xát vào hạt đậu đang nhô lên,\nFukami dai dẳng, nhẹ nhàng xoa nắn."
# 【ふかみ】
# display as 深美
# JP: 「それ……から、クリ、トリス……んっ――あっ――\nこう、やって――こしゅ、こしゅ、したり――あとっ」
1117 = "「Sau……đó, âm, vật……ưm——ah——\nNhư, thế này——cọ, cọ, cọ——rồi」"
# monologue
# JP: （くぱあっ！）
1747 = "（Banh ra!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
995 = "「!!」"
# monologue
# JP: パンツの上から指をあて、パンツに形を浮かせるように、\nふかみは、おまんこを大きく開く。
1601 = "Đặt ngón tay lên trên quần lót, như thể muốn in hằn hình dáng lên đó,\nFukami banh rộng âm đạo ra."
# 【ふかみ】
# display as 深美
# JP: 「パンツ、ごしに――んっ――無理、やり……\nおまん、こ――開い、たり……あ……し、てっ――」
1163 = "「Qua lớp, quần lót——ưm——ép, buộc……\nÂm, đạo——banh, ra……a……vậy——」"
# monologue
# JP: （くりゅっ――クリュ――くちゅっ――くちゅ）
1754 = "（Ngoáy——ngoáy——nhóp nhép——nhóp nhép）"
# monologue
# JP: べったり濡れて張り付くせいで、\n開かれているおまんこ内部の形もパンツに浮き上がる。
1580 = "Vì ướt sũng và dính chặt vào da,\nnên hình dáng bên trong âm đạo đang mở rộng cũng in hằn lên quần lót."
# monologue
# JP: ひときわ濡れが濃い膣口を、何度も何度も何度も何度も、\nふかみの指先はくりくり動いて、ノックを重ねる。
1373 = "Ở cửa mình ướt đẫm nhất, hết lần này đến lần khác, đến lần khác nữa,\nđầu ngón tay của Fukami ngoáy liên tục, gõ nhịp liên hồi."
# 【ふかみ】
# display as 深美
# JP: 「それ……でっ――おまんこっ――膣、の……入り口――\nしつ、こく、いじめられ、て――焦らされたり、してっ」
1116 = "「Sau……đó——âm đạo——cửa, của……tử cung——\nBị, bắt nạt, dai dẳng——rồi bị làm cho, khao khát」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　ふかみっ――声が大きい」
1007 = "「!? Fukami——em nói to quá rồi đấy.」"
# monologue
# JP: あまりに高度な『正しいパンツの触り方』につい熱中し、\n食い入るように、食い込みに見入ってしまっていたが――
1564 = "Anh lỡ say sưa vào 『cách chạm quần lót đúng chuẩn』 quá mức điêu luyện này,\nđến nỗi cứ dán mắt vào chỗ lún sâu đó——"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉も日々姫もハチロクも今は蔵だが、\nなにかがあれば、いつでも戻ってくるのだぞ」
1128 = "「Dù bây giờ chị Mayami, Hibiki và Hachiroku đang ở trong kho,\nnhưng lỡ có chuyện gì, họ có thể quay lại bất cứ lúc nào đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「な、なら――です、ね」
1153 = "「N, nếu vậy——thì, nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
# 1017 = "「啊」" 
# monologue
# JP: あーんと、ふかみは口を開け、\nその内側を、僕にたっぷり見せつける。
1555 = "A~, Fukami há miệng ra,\nphô bày trọn vẹn bên trong cho tôi thấy."
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしの――おくち、をっ……その――双鉄さん、\nの、で――ふさいじゃえば、いい、って……思う、です」
1093 = "「M, miệng——của em……cái đó——của anh, Soutetsu,\nCứ, bịt kín lại, là được, mà……em, nghĩ vậy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！！！」
1167 = "「!!!」"
# monologue
# JP: （ずるんっ！）
1770 = "（Tuột!）"
# monologue
# JP: 言われた瞬間、パンツごとズボンを脱いでいる。
1634 = "Ngay khoảnh khắc nghe thấy lời đó, tôi đã cởi cả quần ngoài lẫn quần lót ra."
# monologue
# JP: 引っかかってしまった勃起が腹を叩いて、\nベチっ、と痛そうな音を出す。
1643 = "Dương vật bị vướng lại đập vào bụng,\ntạo ra một tiếng 'bét' nghe có vẻ rất đau."
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　\n双鉄さん、い、今の大丈夫なっ！？――んぐっ！？」
977 = "「Hya!?\nAnh Soutetsu, v, vừa rồi không sao chứ ạ!?——Ưm gu!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「声が、大きい。\nだから、遠慮なく塞がせてもらう」
1137 = "「Em nói to quá.\nNên anh không khách sáo bịt miệng em lại đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「んっ――んっ――ん～～っ――ふっ――んっ――\nんむっ――んっ――んぅっ――んっ」
987 = "「Ưm——ưm——ưm~~~——phù——ưm——\nƯm mu——ưm——ưm ư——ưm」"
# monologue
# JP: （にゅるっ――はみゅっ）
1772 = "（Nhóp nhép——ngoạm）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1023 = "「啊！」" 
# monologue
# JP: 性衝動のままの行為を、\nけれどもふかみは受け入れる。
1560 = "Một hành động hoàn toàn theo xung động tình dục,\nnhưng Fukami vẫn đón nhận."
# monologue
# JP: 唇で歯をくるんでくれて、舌を沿わせて。僕の勃起を\n傷つけないよう丁寧に準備してくれる――から！
1382 = "Dùng môi bọc lấy răng, rồi đưa lưỡi ra liếm dọc theo. Em ấy\nchuẩn bị vô cùng cẩn thận để không làm dương vật của tôi bị thương——!"
# monologue
# JP: （ずっ！　ずぼっ！　ずちょっ！　ぼちゅっ！）
1742 = "（Phập! Phập! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぐっ――ぐっ――んぷっ――んっ――ふっ――んっ\nふうっ――んっ――んぎゅっ――ちゅっ――ちゅうう！」
1000 = "「Phù gu——gu——ưm pu——ưm——phù——ưm\nPhù ư——ưm——ưm gyu——chụt——chụt u u!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ」
# 1017 = "「啊」" 
# monologue
# JP: 荒く不規則だった鼻息がじわじわ落ち着いてくると同時に、\n吸引がくる。
1399 = "Cùng lúc hơi thở gấp gáp, loạn nhịp qua mũi dần dần bình tĩnh lại,\nlực hút cũng bắt đầu."
# 【ふかみ】
# display as 深美
# JP: 「ぼちゅっ！　ぶぢゅっ！　ぢゅっ！　ちゅるっ！\nちゅううっ！　でゅるっ！　ちゅぶっ！　ぼぢゅっ！！」
1027 = "「Bụp! Nhóp nhép! Chụt! Rột!\nChụt u u! Rột! Chụt! Bụp!!」"
# monologue
# JP: 強く吸われる力に逆らい腰を引き、\n一点今度は素直に応じ、思いっきりに突き入れる。
1463 = "Tôi rụt eo lại để chống lại lực mút mạnh mẽ đó,\nnhưng rồi lại ngoan ngoãn chiều theo, đẩy mạnh vào hết cỡ."
# 【ふかみ】
# display as 深美
# JP: 「んぐっ！　んっ――んっ――ふううっ――んっ――\nングッ――んっ――ふうっ――んっ――んっ――ふうっ」
994 = "「Ưm gu! Ưm——ưm——phù u u——ưm——\nƯm gu——ưm——phù ư——ưm——ưm——phù ư」"
# monologue
# JP: 喉を突いてしまえばえづきのような音。\nそれでもふかみは、懸命に吸い舌を動かす。
1527 = "Mỗi khi đâm vào cổ họng, lại phát ra âm thanh như tiếng nôn ọe.\nDù vậy, Fukami vẫn ra sức mút mát và đảo lưỡi."
# 【ふかみ】
# display as 深美
# JP: 「えむっ――んっ――れるっ――れろっ――\nれろおっっ――ふっ――んっ――すっ――すひっ」
1002 = "「E mu——ưm——liếm——liếm——\nLiếm m m——phù——ưm——sụt——sụt hi」"
# monologue
# JP: そして苦しげな呼吸に時折り、\nひどく甘やかな息が混じって――
1614 = "Và xen lẫn trong những nhịp thở khó nhọc đó,\nthỉnh thoảng lại có một hơi thở vô cùng ngọt ngào——"
# monologue
# JP: （くちゅっ――ちゅっ――すりっ――すりゅんっ）
# 1754 = "（擦，擦，擦，擦）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ」
749 = "「——Ah」"
# monologue
# JP: ふかみの指は、とまっていない。
1584 = "Ngón tay của Fukami, vẫn không dừng lại."
# monologue
# JP: 僕に口腔を提供し、思うがままに突かれてもなお、\nかわいいおまんこをパンツごし、ずうっと弄り続けてる。
1340 = "Dù đã dâng hiến khoang miệng cho tôi, dù bị đâm thọc thỏa thích,\nem ấy vẫn liên tục nghịch ngợm âm đạo đáng yêu của mình qua lớp quần lót."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、ふか……みっ――\nイこう……一緒に」
1157 = "「Nếu vậy thì, Fuka……mi——\nLên đỉnh nào……cùng nhau」"
# 【ふかみ】
# display as 深美
# JP: 「ん……ふ、あっ――んっ――ふぁひ……んうっ――んっ、\nほーへふ……ふぁん……うくっ――んっ！」
1034 = "「Ưm……phù, ah——ưm——phù a hi……ưm ư——ưm,\nHo he fu……phù an……ư ku——ưm!」"
# monologue
# JP: （くちゅっ！　ちぷっ！　ちゅぷっ！　ちゅにゅっ！）
1751 = "（Nhóp nhép! Chụt! Chụt! Nhóp nhép!）"
# monologue
# JP: 指が激しく蠢きコスる、\nその水音が、僕の動きも滑らかにする。
1633 = "Những ngón tay điên cuồng cọ xát,\nâm thanh nhóp nhép đó cũng khiến chuyển động của tôi trở nên trơn tru hơn."
# monologue
# JP: （ずっ！　じゅぶ！　じゅぼっ！　ちゅぱんっ！）
1733 = "（Phập! Nhóp nhép! Phập! Chụt pan!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――んっ――ぢゅっ――ぢゅちゅるっ――ぐ――\nあっ――ほーへふ、ふぁ――ほーへふ、ふぁんっ！！」
1025 = "「Phù a——ưm——chụt——chụt rột——gu——\nAh——ho he fu, phù a——ho he fu, phù an!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うっ」
# 991 = "「唔」" 
# monologue
# JP: ふかみの舌が、口内が、\n張り付きながらぶるぶる震え――っ！！？
1591 = "Lưỡi của Fukami, khoang miệng của em ấy,\nvừa dính chặt vừa run rẩy bần bật——!!?"
# 【ふかみ】
# display as 深美
# JP: 「ぢゅっ！――ぢゅううううううううううううっ！！」
1028 = "「Chụt!——Chụt u u u u u u u u u u u u u!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 981 = "「哇！」" 
# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅうっ！！）
1726 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【ふかみ】
# display as 深美
# JP: 「んぷっ！！？　んっ！　ふぅぅぅぅぅぅぅんっ！！！」
1044 = "「Ưm pu!!? Ưm! Phù u u u u u u u u n!!!」"
# monologue
# JP: 僕の精液を喉で受け止め、\nふかみの全身が激しくビクつく。
1571 = "Hứng trọn tinh dịch của tôi bằng cổ họng,\ntoàn thân Fukami co giật dữ dội."
# 【ふかみ】
# display as 深美
# JP: 「ん……ぷっ……んぷっ――んっ――んうっ――\nん～～っ――んっ！　こくっ――こくっ――ごくっ」
1033 = "「Ưm……pu……ưm pu——ưm——ưm ư——\nƯm~~~——ưm! Ực——ực——ực」"
# monologue
# JP: 絶頂しながら、ふかみは僕の精を飲んでる。
1535 = "Vừa lên đỉnh, Fukami vừa uống lấy tinh dịch của tôi."
# monologue
# JP: ひどく苦しげに鼻息を出し、\nけれどもすぐに喉を動かし、あふれる精を胃に落としてる。
1385 = "Em ấy thở hắt ra những hơi vô cùng khó nhọc,\nnhưng ngay lập tức cổ họng lại chuyển động, nuốt trọn dòng tinh dịch đang trào ra xuống dạ dày."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！」
1111 = "「Fukami!」"
# monologue
# JP: （ずるううううっ！）
1745 = "（Trượt sâu u u u u!）"
# 【ふかみ】
# display as 深美
# JP: 「ぷあっ！！？」
982 = "「Phù ah!!?」"
# monologue
# JP: けれども、胃では満足できない。\nふかみの膣へ、子宮へ精子を送り込みたい。
1316 = "Nhưng, dạ dày thì không thể làm tôi thỏa mãn.\nTôi muốn đưa tinh trùng vào âm đạo của Fukami, vào tận tử cung của em ấy."
# monologue
# JP: その欲求と、ここは家だという意識。\nそれがギリギリせめぎあい、僕の体を素早く動かす。
