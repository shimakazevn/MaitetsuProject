998 = "「I――っ――~~~!? Ưm――fu――\nfuu――fu――ưm! Ưm――fu――hihyu」"
# monologue
# JP: 僕の手を噛む力が強い。\nはっきりとした痛みを感じる。
1545 = "Tinh dịch sưng phồng lên và trào dâng."
# monologue
# JP: だが、その痛みさえ塗りつぶすほどっっ――
1314 = "Lỗ nhỏ của Fukami cũng ướt át nóng rực,\nnhững cơn co thắt liên tục diễn ra với nhịp độ dồn dập hơn."
# monologue
# JP: （きゅううううううううううっっ）
1768 = "「――――――――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ！」
990 = "Chỉ mấp máy môi, tôi gọi tên Fukami trong im lặng."
# monologue
# JP: ふかみの膣のうねる締め付け。\nその最奥で、吸いつき甘えて咥える子宮。
1581 = "Với đôi mắt ngấn lệ,\nFukami chớp mạnh, đáp lại tiếng gọi của tôi."
# monologue
# JP: 射精最中の勃起をそうまで刺激されれば、\n喉の奥から、抑えきれぬ声が飛び出そうで――
1524 = "（Nế, u vậy――）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んぐっ！」
# 993 = "「唔！」" 
# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
1042 = "（Trơn――tuột――ưm――ưm――――――）"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
# 1726 = "（咻！咻！咻！咻！）" 
# monologue
# JP: だから引き抜き、そのまま精の雨を降らせる。
1485 = "Dùng toàn bộ dương vật cương cứng như muốn khoét rỗng trần thành bụng,\ntôi từ từ, chậm rãi rút ra cho đến chỗ rãnh quy đầu."
# 【ふかみ】
# display as 深美
# JP: 「んっ――んっ――っ――――ふっ――んっ――」
1036 = "「A――ha――ưm――ưm――ưm!!」"
# monologue
# JP: ぼとぼとと、\n濁った重さが肌へと、髪へと降り注ぐ。
1604 = "Bằng ánh mắt, bằng hơi thở, Fukami gật đầu.\nGiọt mồ hôi rơi xuống từ người tôi hòa quyện làm một với mồ hôi của Fukami."
# monologue
# JP: 涼やかな夕立ちにあったみたいに、ふかみはうっとり\n目を閉じて、僕の白濁のシャワーを浴びる。
1553 = "Cả nhịp thở và khao khát đều hòa chung một nhịp.\nNên cứ thế này, chỉ cần dốc hết sức chuyển động hông là――!"
# monologue
# JP: （びゅゅっ――びゅっ――ビュルっ――ぴっ――）
1725 = "（Phậppppppp――――――Cộcccc!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ぷあっ」
1043 = "「~~~~~~~~~~~!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 986 = "「唔……」" 
# monologue
# JP: ふかみの歯から腕が解放された瞬間、\nぶわりと汗が噴き出してきて――
1365 = "（Siếếếếếết!）"
# monologue
# JP: （くてっ）
1750 = "（Phụt! Phụt! Phụtttt! Phụtttt!）"
# 【ふかみ】
# display as 深美
# JP: 「きゃんっ」
# 971 = "「呀」" 
# monologue
# JP: ふかみに重なり、崩れ落ちてる。
1482 = "「っ~~~~~~~!!!」"
# monologue
# JP: 肌と肌とをこすりあわせて、\n汗をどろどろにブレンドしながら――
1443 = "Lực cắn vào tay tôi rất mạnh.\nTôi cảm nhận được nỗi đau rõ rệt."
# 【ふかみ】
# display as 深美
# JP: 「あ……むっ――ちゅっ――ちゅうっ――ちゅっ」
1012 = "Nhưng, nó mãnh liệt đến mức lấn át cả nỗi đau đó――"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……ふっ――むっ――ふ……んっ」、
1029 = "（Siếếếếếếếếếết）"
# monologue
# JP: それでもふかみをもっと欲しくて、\nふかみも僕を求めてくれて、唾液と唾液を交換しあう。
1310 = "「Ku――a!」"
# 【ふかみ】
# display as 深美
# JP: 「ん……ん、ちゅ――ちゅるっ――んっ――――――\nごくんっ……ん～～～――ぷはっ」
1032 = "Sự co thắt uốn lượn của âm đạo Fukami.\nỞ tận cùng sâu thẳm, tử cung mút mát, nũng nịu ngậm chặt lấy."
# monologue
# JP: キスを解いて、僕の胸板に頭を擦り付け。\nそれからふかみは、にへへと満足そうに微笑む。
1361 = "Dương vật đang xuất tinh bị kích thích đến mức đó,\nnhững âm thanh không thể kìm nén chực chờ bật ra từ sâu trong cổ họng――"
# 【ふかみ】
# display as 深美
# JP: 「わたしの、お部屋、と。双鉄、さん、の……お部屋。\n両方、で、エッチなこと、して……」
1084 = "「Ngu!」"
# monologue
# JP: もう一度、キス。\nその距離のまま、ふかみの瞳が僕をみつめる。
1440 = "「!!?」"
# 【ふかみ】
# display as 深美
# JP: 「わたし……たち――\n大人の……恋人同士、みたい、――です、よ――ね？」
1083 = "（Phụt! Phụt! Phụtttt! Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「みたいもなにも……少なくとも肉体的には、\n大人の恋人同士だろう、僕らは」
939 = "Nên tôi rút ra, cứ thế tưới cơn mưa tinh dịch xuống."
# 【ふかみ】
# display as 深美
# JP: 「あっ！？」
1026 = "「Ưm――ưm――っ――――fu――ưm――」"
# monologue
# JP: 素直な答えに、けれどふかみはびくりと体を引いてしまう。\nその目もなぜか、急に不安げなものになる。
1635 = "Từng giọt, từng giọt,\nnhững giọt đục ngầu nặng trĩu tuôn rơi xuống làn da, mái tóc."
# 【ふかみ】
# display as 深美
# JP: 「……あ。ええと……その――\n“僕ら”っていうのは――凪ちゃん、と――双鉄さん？」
747 = "Như đón nhận một cơn mưa rào mùa hạ mát mẻ, Fukami say sưa\nnhắm mắt lại, tắm trong cơn mưa trắng đục của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪と僕？　何故そう思う？」
957 = "（Phụtttt――phụt――phụt――tí tách――）"
# 【ふかみ】
# display as 深美
# JP: 「だって！　だって双鉄さん――\n初めての相手……凪ちゃんのこと――選んだ、です、し」
1055 = "「Pua」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
# 991 = "「唔」" 
# monologue
# JP: そのことを、\nそれほどふかみが気にしているとは思わなかった。
1468 = "「っ――」"
# monologue
# JP: あえていうのもヤボなことかとは思ったが――\n言葉にせねば、誤解を余計に広げてしまう。
1466 = "Khoảnh khắc cánh tay được giải phóng khỏi hàm răng của Fukami,\nmồ hôi túa ra như tắm――"
# 【双鉄H】
# display as 雙鐵
# JP: 「あの選択は、僕らの普段。\n凪とふかみの“いつも”を僕も、踏襲しただけのことだ」
1086 = "（Phịch）"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんとわたしのいつも？　――って！　あっ！」
1067 = "「Kyan」"
# monologue
# JP: 瞳の不安がぱあっと晴れる。\nその反応にほっとしながら、いわずもがなの言葉を続ける。
1597 = "Tôi đổ gục xuống, đè lên người Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだ。いつでもエンジンは凪。\nふかみは、ブレーキとハンドルだから」
1104 = "Da thịt cọ xát vào nhau,\nmồ hôi nhễ nhại hòa quyện làm một――"
# 【ふかみ】
# display as 深美
# JP: 「あ……あー……あ～っ――あ～～っ！」
1011 = "「A……mu――chụt――chụtttt――chụt」"
# monologue
# JP: よほど得心がいったのか、ふかみは何度も何度も頷く。
1537 = "「Ưm……fu――mu――fu……ưm」"
# 【ふかみ】
# display as 深美
# JP: 「確かにわたし……あのとき――怖くて――\nけど……凪ちゃんが――『平気』って言ってくれたから」
1134 = "Dù vậy tôi vẫn khao khát Fukami hơn nữa,\nFukami cũng mong muốn tôi, chúng tôi trao nhau những giọt nước bọt."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
# 1042 = "「嗯？！」" 
# monologue
# JP: 今度は、何がどうなったのか――\nふかみの瞳に、大粒の涙が浮きあがってくる。
1299 = "「Ưm……ưm, chu――churu――ưm――――――\nực……ưm~~~――puha」"
# 【ふかみ】
# display as 深美
# JP: 「なのに、わたし……勘違いして……一人で対抗心出して、\n嫉妬して、焦って――」
966 = "Dứt nụ hôn, em ấy cọ đầu vào khuôn ngực tôi.\nSau đó, Fukami nở nụ cười mãn nguyện \"nihehe\"."
# 【双鉄H】
# display as 雙鐵
# JP: 「構わんさ。勘違いして対抗して、嫉妬して焦るふかみも、\nとてもとても魅力的だったからな」
1107 = "「Phòng của, em. Và phòng của……anh, Soutetsu.\nCả hai nơi, đều làm, chuyện người lớn, rồi……」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ！！！！」
1022 = "Lại hôn thêm một lần nữa.\nGiữ nguyên khoảng cách đó, đôi mắt Fukami nhìn tôi chằm chằm."
# monologue
# JP: 真っ赤になってぷるぷる震え――
1598 = "「Chúng……ta――\ngiống như……một cặp tình nhân……người lớn, rồi――nhỉ?」"
# 【ふかみ】
# display as 深美
# JP: 「あはっ！」
1020 = "「Giống gì chứ……ít nhất về mặt thể xác,\nchúng ta đã là một cặp tình nhân người lớn rồi mà.」"
# monologue
# JP: そしてふかみは、台風一過の青空みたいな笑顔を咲かす。
1505 = "「A!?」"
# 【ふかみ】
# display as 深美
# JP: 「ここまで全部、『いつものわたしたち』な感じですね」
959 = "Nhận được câu trả lời thẳng thắn, Fukami lại giật mình lùi người lại.\nĐôi mắt em ấy không hiểu sao bỗng trở nên bất an."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。いわれてみれば」
1039 = "「……A. Ừm……thì――\n\"Chúng ta\" mà anh nói là――Nagi, và――anh Soutetsu ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「ならっ！」
1158 = "「Nagi và anh? Sao em lại nghĩ vậy?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おっと！」
985 = "「Tại vì! Tại vì anh Soutetsu――\nngười đầu tiên……anh đã chọn――Nagi, mà」"
# monologue
# JP: 手を引くふかみに素直に従い、立ち上がる。\nふかみの踵は、いまにも弾んで駆け出しそうだ。
1559 = "「Ưm」"
# 【ふかみ】
# display as 深美
# JP: 「今日の一日デートの権利。\n残りの半分、凪ちゃんとわけっこしてもいいですか？」
940 = "Tôi không ngờ,\nFukami lại bận tâm về chuyện đó đến vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ」
1120 = "Dù nghĩ nói ra thì hơi vô duyên――\nnhưng nếu không nói rõ, hiểu lầm sẽ càng lớn hơn."
# 【ふかみ】
# display as 深美
# JP: 「よかったぁ！」
1062 = "「Lựa chọn đó, là thói quen của chúng ta.\nAnh chỉ làm theo \"thường ngày\" của Nagi và Fukami thôi.」"
# monologue
# JP: 凪の部屋と、僕の部屋と。\nその両方でセックスをして、だから、わかった。
1448 = "「Thường ngày của em và Nagi? ――A!」"
# 【双鉄H】
# display as 雙鐵
# JP: （僕らのホームは、もう、\n僕らがそれぞれすごす場所ではなくなったのだ）
1728 = "Sự bất an trong ánh mắt em ấy tan biến.\nThở phào nhẹ nhõm trước phản ứng đó, tôi tiếp tục nói những lời hiển nhiên."
# monologue
# JP: だからそこへと、全速力で帰ってく。\nふかみと凪と、そうして僕と。三人一緒にいられる場所へ。
1489 = "「Đúng vậy. Động cơ lúc nào cũng là Nagi.\nCòn Fukami là phanh và vô lăng mà.」"
# monologue
# JP: 僕らのホームへ――\n『おかえりなさい』を、言い合うために。
1605 = "「A……a……a~――a~~!」"
