[script]
# lines: 325 
# 【ふかみ】
# display as 深美
# JP: 「……すっごく――なんていうか、その」
751 = "「……非常地……怎麼說呢」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「遠慮をせずに言っていい。\n僕が見ても、昔の僕は目つきが悪い」
934 = "「不要客氣，說吧。在我看來，以前的我眼神也很兇惡」" 

# 【ふかみ】
# display as 深美
# JP: 「目つきが悪いとか、じゃなく……って――\nその――ええとっ」
932 = "「不是眼神怎麼樣的問題……怎麼說呢……」" 

# monologue
# JP: 思ったままを話したのだが、\nかえって困らせてしまったらしい。
1480 = "我說出了我自己的感想，但她似乎反而感到了困擾。" 

# monologue
# JP: ふかみはもごもごいいながら、\nアルバムのページを手早くめくる。
1541 = "深美含糊其辭，快速翻著相冊。" 

# 【ふかみ】
# display as 深美
# JP: 「あれっ？」
978 = "「咦？」" 

# monologue
# JP: 困ったようにあちこち揺れてた瞳がいきなり、\nスっと定まる。
1371 = "她困惑地看來看去，突然像是發現了什麼一樣盯住了哪裡。" 

# 【ふかみ】
# display as 深美
# JP: 「ん……」
986 = "「唔……」" 

# monologue
# JP: めくったページを、また戻す。
1367 = "她再次將頁數翻回來。" 

# 【ふかみ】
# display as 深美
# JP: 「これって、どういうシチュエーション、で……\n撮った写真たち……なんです、か？」
1145 = "「這是什麼情境下……拍攝的照片？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「シチュエーションというか……\nほとんどが、[かあ,1]義母さんが撮ったものだな」
1073 = "「情境……大部分都是[母親,1]養母拍的」" 

# 【ふかみ】
# display as 深美
# JP: 「[みぎたいちしゅぞうもと,5]右田一酒造元の……真闇さんの前の、[とうじ,1]杜氏さん？」
1096 = "「是右田一釀酒廠的……真闇小姐之前的掌窖？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや。真闇姉は、そのお祖母様から引き継いだそうだ。\nどうも、義母さんには酒造りの才は無かったらしく」
936 = "「不，真闇姐是從她奶奶那裡繼承的。養母似乎沒有釀酒的天賦」" 

# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
1101 = "「是嗎」" 

# monologue
# JP: 意外、という風な声を出し。\nけれどもああ、とすぐさま小さく頷きもする。
1536 = "深美似乎覺得很意外。不過她很快點了點頭，表示理解。" 

# monologue
# JP: 真闇姉があの若さですでにベテラン杜氏だということが、\n事実を逆から示していると、恐らくは気づいたのだろう。
1376 = "她大概是聯想到了真闇姐這麼年輕就已擔當掌窖多年的事實。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「それゆえ、[とう,1]義父さん以上に忙しく働きまわっていた。\n御一夜にはほとんど戻ってこれないような人でな――」
1050 = "「因此，她工作得比[父親,1]養父還要繁忙。她很少會返回御一夜……」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
1035 = "「嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「帰ってくれば真闇姉と日々姫とを構いまくって、\nおまけに写真もばっしゃばっしゃと撮っていたのだ」
1046 = "「回來之後她就總是和真闇姐、日日姬在一起，而且還會拍一大堆的照片」" 

# monologue
# JP: 僕などは、それに巻き込まれていたようなものだが――\nいや、ああ。そうか。
1447 = "我只是被牽連進去了而已。不對哦。原來是這樣。" 

# monologue
# JP: 今考えてみれば、なるほど。\n我ながら思う目つきの悪さの、それも一因なのかもしれぬ。
1612 = "現在仔細想想，我就明白了。我的眼神之所以那麼兇惡，這就是原因之一。" 

# 【ふかみ】
# display as 深美
# JP: 「――って、いうことは」
742 = "「……也就是說」" 

# monologue
# JP: ふかみがむむっと眉を潜めて、\nアルバムをまた、めくって戻す。
1595 = "深美皺著眉，又把相冊翻了回去。" 

# 【ふかみ】
# display as 深美
# JP: 「これって、\n双鉄さんの、飾らない普段着な感じですか？」
1146 = "「這是雙鐵先生毫無修飾的平常態？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だと思うぞ？　少なくとも、写真を撮るために\n着替えたような記憶を僕は、持ってない」
1078 = "「應該是的。至少印象裡我沒有為了照片特地換過衣服」" 

# 【ふかみ】
# display as 深美
# JP: 「むむむむむ」
992 = "「唔唔唔」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何故、そのようなことを聞く？」
1112 = "「為什麼要問這個？」" 

# 【ふかみ】
# display as 深美
# JP: 「アルバムの中、日々姫さん、\nわたしと凪ちゃんと同じくらいの年の頃から……」
1118 = "「照片裡的日日姬小姐，跟我還有小凪年紀差不多……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
1041 = "「嗯？」" 

# monologue
# JP: ふかみの言葉につられて僕も、\nアルバムのページを戻して、めくる。
1636 = "聽深美這麼說，我也將相冊翻了回去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……む。\nわからん。なにかあるのか？」
745 = "「……唔，看不懂。你看出了什麼嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――今の双鉄さんでも、気づかないんですね」
1016 = "「啊……雙鐵先生到現在也沒注意到呀」" 

# monologue
# JP: 嬉しさと、物足りなさとを等分に混じえたような声。\nそれに鼓膜を揺すられたなら、知りたい気持ちを煽られる。
1587 = "深美的聲音裡帶著幾分開心與幾分失落。聽到她這樣的語氣，我就更加好奇了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何に、僕は気づいてないのだ？」
1091 = "「我沒注意到什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「なにって、だから――\nこういうこと、です」
1149 = "「還能是什麼？就是這個，嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1023 = "「啊！」" 

# monologue
# JP: アルバムを置き、\nふかみがゆるゆる、スカートをたくしあげていく。
1556 = "深美扔下相冊，將裙子掀了起來。" 

# monologue
# JP: シンプルなデザインの、ゆえに極めてかわいいパンツが、\n僕の眼前、惜しげもなしにさらされる。
1332 = "內褲的設計很簡單，因此也非常可愛。現在，這塊內褲徹底暴露在了我的面前。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1045 = "「噢……」" 

# monologue
# JP: そこまで示してもらえば、わかる。\n修学旅行を重ねた成果が、今の僕になら答えを示す。
1507 = "提示到了這個份上，我就懂了。通過修學旅行的學習，現在的我能夠找到答案。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……年頃になってから、\n日々姫は、急にスカートが短くなっていたのか」
1089 = "「我懂了……年紀到了，日日姬的裙子就突然開始變短了」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さん……やっぱり、気づけてなかったんですね」
1164 = "「雙鐵先生……你果然沒有注意到啊」" 

# monologue
# JP: 安堵の気持ちと、なにかを咎めるような調子と、\nその両方がふかみの声から伝わってくる。
1586 = "深美的聲音裡帶著一絲放心，又帶著一絲責怪。" 

# monologue
# JP: 咎める理由を、深く考えたくなくて。\n昔の日々姫に悪い気がして、少しズラした答えを返す。
1433 = "我不願細想她責怪我的原因，因為這樣感覺很對不起以前的日日姬。於是我給出了個比較保險的回答。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「仕方ない。\nその頃の僕は、ふかみと凪に、出会えてなかった」
1108 = "「沒辦法。那時候我還沒遇上你和凪啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……」
1008 = "「啊……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「パンツが、こんなにもいやらしく目を惹く物だと、\n僕は、ふたりに教えられるまで、知らなかったのだから」
1057 = "「在你們兩個告訴我內褲原來是這麼下流這麼吸引人的東西之前，我都沒關注過」" 

# 【ふかみ】
# display as 深美
# JP: 「いやらし……くって……目を、ひきます、か？\nわた、し、の……パン、ツ――」
929 = "「下流……而且吸引人？我的內褲……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。まばたきするのも勿体ないほど、\n魅力的だと感じてるし……もっとたくさんを見たくなる」
1099 = "「是啊，太有魅力了，看得我都捨不得眨眼……越看越想多看看」" 

# 【ふかみ】
# display as 深美
# JP: 「もっと、たくさん――」
1061 = "「多看看……」" 

# monologue
# JP: （しゅるっ）
1761 = "（窸窣）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1017 = "「啊」" 

# monologue
# JP: ふかみが、キャミソールを引き下げて――
1549 = "深美將吊帶衫拉下來……" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
981 = "「哇！」" 

# monologue
# JP: ずりあげようとしたブラに、\nピンピンに勃起している乳首がこすれたのだろう。
1370 = "她嘗試將胸罩拉高，似乎在這個過程中摩擦到了挺立起來的乳頭。" 

# monologue
# JP: ふかみは快感の声をあげ、\nパンツの股間の染みの範囲を、広げてしまう。
1384 = "她發出帶有快感的聲音，內褲被打濕的面積也變大了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「目だけではなく、体も惹かれる。\n見れば見るほど、ふかみに触れたくなってくる」
1139 = "「被吸引的不止是我的眼神，還有我的身體。越看我越是想觸碰你」" 

# 【ふかみ】
# display as 深美
# JP: 「な、なら――」
1152 = "「那、那麼……」" 

# monologue
# JP: もぞりと、ふかみの腰が蠢く。\n頬の赤みが濃くなって、瞳も潤み始めてる。
1589 = "深美的腰開始扭動。她臉頰上的紅暈變得更重，眼神也帶上了幾分水氣。" 

# 【ふかみ】
# display as 深美
# JP: 「す、好きに、触っていい――です、よ？\nわたしの――パ、パンツ」
949 = "「你、你想摸可以隨便摸……我的內褲」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「う……む？」
748 = "「……嗯？」" 

# monologue
# JP: パンツ自体は……\nどんなに可愛くあろうが包装紙に過ぎんような気がする。
1331 = "內褲本身嘛……不管有多可愛，其實就是一層包裝紙。" 

# monologue
# JP: 触れて味わいたいのは当然、\n中身であるに決まっている――が。
1461 = "我想觸碰想品味的，當然是裡面的東西了。但是……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった。\nならば、パンツを触ってみよう」
1065 = "「好的，那我就摸摸內褲吧」" 

# monologue
# JP: （ぐいいいっ！）
1736 = "（按！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　やっ――双鉄さんっ！？\nパンツ、わたしの、パンツ――食い……込ん――ふあっ」
973 = "「呀！討厭……雙鐵先生！內褲，我的內褲……你按進來了……啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。\n思い切り引っ張って食い込ませてる」
1038 = "「嗯，是啊，我一口氣用力按了進去」" 

# monologue
# JP: （ゆさっ――ゆさっ――）
1758 = "（晃，晃）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ……あっ――そんなに――され、たらっ……\nんっ――やっ――わた、しっ――感じ……って」
970 = "「呀……啊……你這樣……嗯……討厭……我……會有感覺的……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ほう？」
1102 = "「是嗎？」" 

# monologue
# JP: （ずりっ）
1752 = "（擦）" 

# 【ふかみ】
# display as 深美
# JP: 「やんっ！」
972 = "「呀！」" 

# monologue
# JP: 今度はパンツを横にずらして、\nふかみのスジを直接に見て確かめる。
1455 = "我將內褲扒開，直接觀察深美的裂縫。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど、確かに……\n溢れる程に濡らして、随分と感じてくれているようだな」
1133 = "「確實……已經濕到漫出來了，很有感覺嘛」" 

# monologue
# JP: （ずっ――ずりっ――ずっ――ぐいいっ）
1753 = "（擦，擦，擦，按）" 

# 【ふかみ】
# display as 深美
# JP: 「ぱあっ！？　ま、またグイって――んっ！　あ――\nパンツでっ……感じちゃう、とかっ――あっ――やぁっ」
983 = "「哇？！又、又按……嗯！啊……被內褲……弄出感覺了……啊……不要……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「イヤと言われては心外だ。\nふかみが、パンツを好きにいじれと」
1135 = "「竟然說不要，真叫人傷心。是你叫我隨便玩內褲的」" 

# monologue
# JP: （ぐいっ――ぐっ――ずりゅっ――ずりんっ）
1737 = "（按，按，擦，擦）" 

# 【ふかみ】
# display as 深美
# JP: 「んきゅんっ！」
993 = "「唔！」" 

# monologue
# JP: 抗議の気持ちを指先に込め、\nまたもぐいぐい、布地を股間に食い込ませていく。
1457 = "我將抗議之情注入手指，接著把布片往下體裡按來按去。" 

# monologue
# JP: ふかみは荒い息を吐き、\n真っ赤な顔で、上目遣いに僕を見てくる。
1603 = "深美鼻息凌亂，她滿面通紅，抬頭看向我。" 

# 【ふかみ】
# display as 深美
# JP: 「こ、こんな――触られ、かたっ……ん――とか、だ、と、\nグイって――される――と、おしっこ――出ちゃい、そ」
1144 = "「這、這樣摸我……嗯……這樣按著……感覺……尿尿會出來的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「むっ」
991 = "「唔」" 

# monologue
# JP: （ぴたっ）
1755 = "（收）" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1017 = "「啊」" 

# monologue
# JP: パンツを引く手を止めればすぐさま、淋しげな声。
1445 = "我剛放開手，深美就發出了失望的聲音。" 

# monologue
# JP: それを自覚し、ふかみは真っ赤に染まってしまうが、\n止めた手は、そろそろとパンツから離すしか無い。
1377 = "她察覺到了這一點，馬上羞紅了臉，但我的手也只能離開她的內褲了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみのおしっこをする姿にも、大変に興味はあるが。\nさすがに――今は、な」
1088 = "「我對你尿尿的場景很感興趣，不過現在還是不行的」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――はい。はい」
1014 = "「啊……是的，是的」" 

# monologue
# JP: 尿意をまるで閉じ込めようとするかのように、\nふかみはさささとパンツを直して、強く頷く。
1551 = "深美就像想將尿意關進去一樣，迅速將內褲穿好，然後用力點了點頭。" 

# 【ふかみ】
# display as 深美
# JP: 「なら、おしっこは――えと――しちゃって――平気な。\nそういうところ、で……見て――ください。です」
1159 = "「那麼，就找個……可以尿尿的地方，到了那種地方……你再看吧，嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1064 = "「好」" 

# monologue
# JP: 見せてくれるのなら素直に嬉しい。ありがたい。
1641 = "能給我看，我當然開心。我很感激。" 

# monologue
# JP: その喜びが、許可してもらえたことへの自信が、\n僕をもう少し貪欲にする。
1660 = "這份喜悅，這份得到允許的自信，刺激了我的貪婪。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ちなみに、だ。グイグイされるのではないのなら――\nふかみはどんなパンツの触られ方を予想していたのだ？」
963 = "「另外，如果不想被按……那你本來是想讓我怎麼摸你的內褲？」" 

# 【ふかみ】
# display as 深美
# JP: 「は、はいっ！」
1063 = "「好、好的！」" 

# monologue
# JP: 愛撫を途中で止められたのが、\nよほどもどかしかったのだろうか？
