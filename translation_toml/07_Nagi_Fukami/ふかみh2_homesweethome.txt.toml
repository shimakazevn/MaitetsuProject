# JP: そのことを、\nそれほどふかみが気にしているとは思わなかった。
1468 = "我沒想到深美竟然會這麼在意這件事情。" 

# monologue
# JP: あえていうのもヤボなことかとは思ったが――\n言葉にせねば、誤解を余計に広げてしまう。
1466 = "我本來覺得這種事情不應該解釋的……看來不解釋解釋，她只會加深誤會。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あの選択は、僕らの普段。\n凪とふかみの“いつも”を僕も、踏襲しただけのことだ」
1086 = "「我做出那樣的選擇，是尊重我們的日常。我在沿襲凪和你日常的習慣」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんとわたしのいつも？　――って！　あっ！」
1067 = "「小凪和我的日常？啊！」" 

# monologue
# JP: 瞳の不安がぱあっと晴れる。\nその反応にほっとしながら、いわずもがなの言葉を続ける。
1597 = "深美眼中的擔憂一下就沒了。我也算是放了心，繼續把不必說的話說了下去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだ。いつでもエンジンは凪。\nふかみは、ブレーキとハンドルだから」
1104 = "「是的，平時你們兩個之中凪是引擎，而你則是剎車和手把」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……あー……あ～っ――あ～～っ！」
1011 = "「啊……哦……噢……噢！」" 

# monologue
# JP: よほど得心がいったのか、ふかみは何度も何度も頷く。
1537 = "深美似乎覺得我這話很妙，她反覆點著頭。" 

# 【ふかみ】
# display as 深美
# JP: 「確かにわたし……あのとき――怖くて――\nけど……凪ちゃんが――『平気』って言ってくれたから」
1134 = "「確實……那時我很害怕……但是……小凪卻告訴我沒事」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
# 1042 = "「嗯？！」" 

# monologue
# JP: 今度は、何がどうなったのか――\nふかみの瞳に、大粒の涙が浮きあがってくる。
1299 = "不知怎麼回事，深美的眼裡浮現了大粒大粒的淚珠。" 

# 【ふかみ】
# display as 深美
# JP: 「なのに、わたし……勘違いして……一人で対抗心出して、\n嫉妬して、焦って――」
966 = "「可是，我卻誤會了……獨自產生了敵對心理，開始嫉妒，開始焦慮……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「構わんさ。勘違いして対抗して、嫉妬して焦るふかみも、\nとてもとても魅力的だったからな」
1107 = "「沒事。誤會，敵對，嫉妒與焦慮的你，也非常非常有魅力啊」" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ！！！！」
1022 = "「啊嗚！！！！」" 

# monologue
# JP: 真っ赤になってぷるぷる震え――
1598 = "深美羞紅了臉，身子也在顫抖。" 

# 【ふかみ】
# display as 深美
# JP: 「あはっ！」
1020 = "「啊哈！」" 

# monologue
# JP: そしてふかみは、台風一過の青空みたいな笑顔を咲かす。
1505 = "接著，她露出了颱風過境後的藍天一般的笑容。" 

# 【ふかみ】
# display as 深美
# JP: 「ここまで全部、『いつものわたしたち』な感じですね」
959 = "「到現在的這些也都是“我們的日常”啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。いわれてみれば」
1039 = "「嗯，是的，仔細想想確實」" 

# 【ふかみ】
# display as 深美
# JP: 「ならっ！」
1158 = "「那麼！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おっと！」
985 = "「哎呀！」" 

# monologue
# JP: 手を引くふかみに素直に従い、立ち上がる。\nふかみの踵は、いまにも弾んで駆け出しそうだ。
1559 = "深美拉著我的手，讓我站了起來。她興奮得要撒開腿跑起來似的。" 

# 【ふかみ】
# display as 深美
# JP: 「今日の一日デートの権利。\n残りの半分、凪ちゃんとわけっこしてもいいですか？」
940 = "「今天一日約會的權利，剩下的一半我可以和小凪分享嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ」
1120 = "「當然可以」" 

# 【ふかみ】
# display as 深美
# JP: 「よかったぁ！」
1062 = "「太好了！」" 

# monologue
# JP: 凪の部屋と、僕の部屋と。\nその両方でセックスをして、だから、わかった。
1448 = "我在深美的房間和自己的房間裡都做過愛，所以我才知道。" 

# 【双鉄H】
# display as 雙鐵
# JP: （僕らのホームは、もう、\n僕らがそれぞれすごす場所ではなくなったのだ）
1728 = "（我們的站台，已經不再是我們各自居住的那個地方了）" 

# monologue
# JP: だからそこへと、全速力で帰ってく。\nふかみと凪と、そうして僕と。三人一緒にいられる場所へ。
1489 = "所以我要全速跑回那裡去。與深美、與凪一起，奔向那個可以讓我們三個人在一起的地方。" 

# monologue
# JP: 僕らのホームへ――\n『おかえりなさい』を、言い合うために。
1605 = "為了能在我們的站台上，對彼此說一句“歡迎回家”。" 
