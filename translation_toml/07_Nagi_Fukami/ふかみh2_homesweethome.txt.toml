# display as 深美
# JP: 「あ……双鉄、さん――んっ」
1015 = "Thế nhưng, chỉ dạ dày thôi thì không thể thỏa mãn được. Tôi muốn đưa tinh trùng vào âm đạo, vào tử cung của Fukami."
