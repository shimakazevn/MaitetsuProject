1767 = "「Hự――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！？」
# 982 = "「哇？！」" 
# 【ふかみ】
# display as 深美
# JP: 「そうてつ、さん……そうてつ、さぁん――んっ」
1165 = "Cơ thể của Fukami hoàn toàn không hiểu tình hình hiện tại."
# monologue
# JP: 肉だけじゃない。\nふかみの心も、僕を欲しがり判断がつかなくなっている。
1297 = "Có lẽ vô cùng bất mãn vì tôi đột ngột dừng lại,\nlớp thịt âm đạo đó co bóp như muốn vắt kiệt tôi."
# monologue
# JP: 日々姫は、しばらくは戻ってこまいが……
