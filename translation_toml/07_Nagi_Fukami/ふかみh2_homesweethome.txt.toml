1401 = "「Hau――ưm――fu, u……fuu――hau」"
# 【双鉄H】
# display as 雙鐵
# JP: （これ――はっ――）
1776 = "Thay đổi chuyển động của hông thành những cú đâm xoáy sâu,\ntôi gửi một nụ hôn chào buổi sáng đến cửa tử cung."
# monologue
# JP: 逆らいきれるものじゃない。\n逆らう意味などなにも無い。
1661 = "（Cộc――cộc――phập――cộc!）"
# monologue
# JP: わななくふかみの膣肉に、\n素直に素直に、誘導される。
1403 = "「Hi――i――ưm――ưm~――ưm!\nFuu――fuu――fuu――fuu」"
# monologue
# JP: （ずっ――ぬっ――ずんっ――ぬるうっ――）
1735 = "Không thể kìm nén được nữa. Fukami há to miệng thở dốc.\nDù vậy, bằng cách nào đó em ấy vẫn tiếp tục nén giọng lại――!?"
# 【ふかみ】
# display as 深美
# JP: 「ひあっ――あっ――んっ――ん――ふうっ――」
975 = "（Siết――siếttttt――siết――siết!）"
# monologue
# JP: 熱い。暑い。
1387 = "Âm đạo của Fukami đột nhiên run rẩy."
# monologue
