[script]
# lines: 500 
# 【双鉄】
# display as 雙鐵
# JP: 「……二人、とも」
1403 = "「......Hai, đứa」"
# 【凪】
# display as 凪＆深美
# JP: 「にーさんっ！？」\n「双鉄おにーさんっ！！」
2104 = "「Anh Soutetsu!?」\n「Anh Soutetsu!!」"
# monologue
# JP: 凪が、ふかみが、駆けよってくれる。
2815 = "Nagi và Fukami vội chạy đến."
# monologue
# JP: 嬉しくて、ぬくもりが欲しくて、布団の上に手を出せば、\nそれをぎゅうっと、ふたりで包み込んでくれる。
2966 = "Vui mừng và khao khát hơi ấm, tôi đưa tay ra khỏi chăn,\nhai đứa liền nắm chặt lấy, bao bọc tay tôi."
# 【凪】
# display as 凪
# JP: 「にーさん！？　痛いとこなかとっ！？\n頭、ぼーっとしたりしとらんと？」
2099 = "「Anh Soutetsu!? Có chỗ nào đau không!?\nĐầu có bị choáng váng gì không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「痛い、ところは――」
2418 = "「Chỗ, đau thì――」"
# monologue
# JP: 自分の体に意識を置く。\n両手は預けたままにして、頭、首、肩、胴、腰――足。
2963 = "Tôi dồn ý thức vào cơ thể mình.\nVẫn để hai tay cho hai đứa nắm, tôi kiểm tra đầu, cổ, vai, thân, eo――chân."
# monologue
# JP: 気にするだけで、体に血が戻るような感覚がある。\n現実感が、じわじわ、形を取り戻していく。
2772 = "Chỉ cần tập trung chú ý, cảm giác như máu đang chảy dần về cơ thể.\nCảm giác chân thực từ từ, từ từ hiện rõ trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ない、な。大丈夫だ。\nが――」
2557 = "「Không có. Anh ổn.\nNhưng mà――」"
# 【凪】
# display as 凪
# JP: 「がっ！？」
1786 = "「Nhưng mà!?」"
# 【ふかみ】
# display as 深美
# JP: 「なんでもいってくださいっ！　小さなことでもっ！」
2350 = "「Anh cứ nói ra đi ạ! Chuyện nhỏ nhặt cũng được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「喉が、ひどく乾いている。すまんが、」
2257 = "「Cổ họng anh, khát khô rồi. Xin lỗi, nhưng mà」"
# 【凪】
# display as 凪
# JP: 「水ばいねっ！」
2479 = "「Nước đúng không!」"
# 【凪】
# display as 凪
# JP: 「持ってきたとっ！！」
2008 = "「Có mang theo đây!!」"
# monologue
# JP: 言うより早く、凪がコップに水を汲んできてくれる。
2727 = "Chưa dứt lời, Nagi đã nhanh nhảu rót một cốc nước mang tới."
# 【凪】
# display as 凪
# JP: 「さ！　いくらでん飲むとっ！」
1863 = "「Nè! Muốn uống bao nhiêu cũng được!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、ちょっと待って。\nよかったら貸して？　凪ちゃん」
2043 = "「A, chờ một chút.\nĐưa mình mượn được không? Nagi.」"
# 【凪】
# display as 凪
# JP: 「ほえっ？　ふかみちゃんも飲みたかと？」
2027 = "「Hả? Bé Fukami cũng muốn uống sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん。双鉄おにいさん、急に体起こしたりするの、\n大変だろうし、ちょっと怖いから」
1775 = "「Không phải. Đột nhiên bảo anh Soutetsu ngồi dậy,\nchắc là vất vả lắm, với lại hơi nguy hiểm nữa.」"
# monologue
# JP: ふかみは凪からコップを受取り――\nその中の水を、小さなガラス器へ移す。
3047 = "Fukami nhận lấy cốc nước từ Nagi――\nRồi rót nước trong cốc sang một chiếc bình thủy tinh nhỏ."
# 【ふかみ】
# display as 深美
# JP: 「はい。どうぞです、双鉄おにいさん。\n慌てないで飲んでくださいね？」
1864 = "「Đây. Mời anh uống, anh Soutetsu.\nAnh đừng vội, uống từ từ thôi nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[すいのみ,1]吸飲か、気が利くな――助かる」
2343 = "「Bình hút nước sao, em chu đáo quá――đỡ quá.」"
# monologue
# JP: 吸飲の細い口から、ちろりちろりと水が流れ込んで来る。\n早すぎず、おそすぎず。
3027 = "Từ cái vòi nhỏ của bình hút, nước từ từ, từ từ chảy vào miệng.\nKhông quá nhanh, cũng không quá chậm."
# monologue
# JP: 心地よくもゆるやかな水の浸透が、\n乾いた喉を、体の芯を、潤してくれる。
3197 = "Dòng nước thấm vào một cách êm dịu và dễ chịu,\nlàm dịu đi cổ họng khô khốc và sâu thẳm bên trong cơ thể tôi."
# 【凪】
# display as 凪
# JP: 「そいば、看病のときに使うやつばいね！\n[みどり]翠おばちゃんの持ってきたと？」
2518 = "「Đó là, cái hay dùng khi chăm sóc người ốm đúng không!\nCậu mang của cô Midori đến à?」"
# monologue
# JP: ああ、そうか。\nふかみがこれほど、水を飲ませるのに慣れているのは――
2867 = "A, ra là vậy.\nFukami quen với việc cho uống nước thế này là vì――"
# monologue
# JP: 翠さん……ふかみのお母様の看病を、\nずっとずうっと、重ね続けてきた経験か。
3013 = "Cô Midori......Chăm sóc cho mẹ của Fukami,\nđó là kinh nghiệm mà em ấy đã tích lũy suốt một thời gian dài sao."
# 【ふかみ】
# display as 深美
# JP: 「ううん。おうちから持ってくる余裕なんてなかったし。\n必要になるかな？　って思って、真闇さんに聞いたの」
1789 = "「Không đâu. Mình làm gì có thời gian về nhà lấy.\nNghĩ là chắc sẽ cần nên mình đã hỏi xin chị Mayami đó.」"
# 【凪】
# display as 凪
# JP: 「ふわー、まっこと気が利くばいねー」
2015 = "「Oa, chu đáo thật sự luôn nha~」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんも一瞬でお水もってきてくれたし。\nチームワークだよ」
1840 = "「Nagi cũng lấy nước đến trong chớp mắt mà.\nĐó là tinh thần làm việc nhóm đấy.」"
# 【凪】
# display as 凪
# JP: 「ふふーん、聞いたと？　にーさん、おいしかと？\nそんお水、チームワークのお水とよ！」
2029 = "「Fufun, anh nghe chưa? Anh Soutetsu, ngon không?\nNước đó, là nước của tinh thần làm việc nhóm đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2057 = "「Ừm.」"
# monologue
# JP: もう一口を飲みたい――思ってわずかに動いただけで、\nふかみが吸飲を含ませてくれる。
2968 = "Muốn uống thêm ngụm nữa――chỉ mới nghĩ vậy và hơi nhúc nhích,\nFukami đã đưa bình hút vào miệng tôi."
# monologue
# JP: 実に、旨い。\n喉から体、心の奥にまで染み通ってくる。
3078 = "Quả thực, rất ngon.\nNước thấm từ cổ họng, lan tỏa khắp cơ thể, đến tận sâu trong tim."
# 【双鉄】
# display as 雙鐵
# JP: 「まさしくチームワークの水だな。ご馳走様だ。旨かった。\nふたりの、優しさの味がした」
2435 = "「Đúng là nước của tinh thần làm việc nhóm nhỉ. Cảm ơn hai đứa. Ngon lắm.\nAnh nếm được hương vị của sự dịu dàng từ hai đứa đấy.」"
# 【凪】
# display as 凪＆深美
# JP: 「にへへー！」\n「ふあっ」
2073 = "「Nihehe~!」\n「Oa」"
# monologue
# JP: 明るい笑顔と、恥じらいを混じえたはにかみと。\nそして冷たい水のおかげで、頭もかなりスッキリしてくる。
2908 = "Nụ cười rạng rỡ, xen lẫn nét thẹn thùng e ấp.\nVà nhờ dòng nước mát lạnh, đầu óc tôi cũng tỉnh táo hơn hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫そうな気がする。\n体を、ゆっくり起こしてみたい」
2219 = "「Anh thấy ổn rồi.\nAnh muốn từ từ ngồi dậy.」"
# 【凪】
# display as 凪
# JP: 「わかったばい！　凪さま背中ささえたげるけんっ！」
2129 = "「Biết rồi! Nagi sẽ đỡ lưng cho anh!」"
# 【ふかみ】
# display as 深美
# JP: 「無理しないでくださいね？\nどこか痛かったら、すぐにいってください」
1929 = "「Đừng cố quá nhé anh?\nNếu thấy đau ở đâu, phải nói ngay cho bọn em biết đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2132 = "「Ừ.」"
# monologue
# JP: ……どうやら、痛むところはない。\n難なく体を起こし終えれば、少し可笑しい気持ちになる。
1381 = "......Có vẻ như không đau ở đâu cả.\nNgồi dậy một cách dễ dàng, tôi cảm thấy hơi buồn cười."
# monologue
# JP: なんと手厚い過保護っぷりか――\n自然と浮かびかけた苦笑を、けれどもすぐに引き締める。
2911 = "Đúng là bảo bọc quá mức mà――\nTôi bất giác mỉm cười gượng gạo, nhưng ngay lập tức thu lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は……それほどにマズい倒れ方をしたのか？」
2223 = "「Anh......đã ngã một cách tệ hại đến vậy sao?」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと！？　ふかみちゃん」
2321 = "「Vậy hả!? Bé Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「いえ――あの、いい倒れ方とマズい倒れ方の違いとか、\nわたし、よくはわからないんですけど――」
1766 = "「Không――ừm, sự khác biệt giữa ngã kiểu tốt và ngã kiểu tệ,\nem cũng không rõ lắm nhưng mà――」"
# monologue
# JP: いいながら、ふかみは右手をL字にまげて、\n肘から先を、ゆっくりと手のひらがわに倒していく。
3173 = "Vừa nói, Fukami vừa gập cánh tay phải thành hình chữ L,\nrồi từ từ đổ phần từ khuỷu tay trở xuống về phía lòng bàn tay."
# 【ふかみ】
# display as 深美
# JP: 「こういう感じ――崩れ落ちるみたいだったと思います。\nわたしも慌ててて、はっきりはしないんです、けど……」
2110 = "「Kiểu như thế này――như là sụp đổ xuống ấy ạ.\nLúc đó em cũng hoảng quá nên không nhớ rõ lắm, nhưng mà......」"
# monologue
# JP: ふかみの丁寧な説明が、記憶を補強してくれる。\n倒れかけ、ふかみが僕を助けようとし、足を滑らせ――
3201 = "Lời giải thích cặn kẽ của Fukami giúp tôi nhớ lại.\nKhi tôi sắp ngã, Fukami định đỡ tôi, nhưng lại trượt chân――"
# 【ふかみ】
# display as 深美
# JP: 「転びそうになったのを双鉄おにいさんがかばってくれて、そこからは、一緒に横倒し――でした」
2325 = "「Lúc em sắp ngã, anh Soutetsu đã che chở cho em, từ đó thì, cả hai cùng ngã nhào――là vậy đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの怪我は？」
1854 = "「Fukami có bị thương không?」"
# 【ふかみ】
# display as 深美
# JP: 「見てのとおり、大丈夫です！　\n双鉄おにいさんが、しっかり、かばってくれたから……」
2135 = "「Như anh thấy đấy, em không sao cả!\nVì anh Soutetsu đã che chắn cho em rất cẩn thận......」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2519 = "「Vậy à.」"
# 【凪】
# display as 凪
# JP: 「なら！　倒れかたよかったとばいね！？\nにーさんもふかみちゃんも！！」
2534 = "「Vậy thì! Cách ngã đó là tốt rồi đúng không!?\nCả anh Soutetsu và bé Fukami đều không sao!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ということになろうな」
2168 = "「Chắc là vậy rồi.」"
# 【凪】
# display as 凪
# JP: 「よかったばーい！」
2116 = "「May quá đi!」"
# monologue
# JP: 凪の、シンプルな安堵の声。
2818 = "Giọng nói thở phào nhẹ nhõm, giản đơn của Nagi."
# monologue
# JP: 僕の気持ちまでホっとして――\nけれど同時に、自責の念が強く色濃く湧き上がってくる。
2938 = "Khiến tâm trạng tôi cũng thư thái theo――\nNhưng đồng thời, cảm giác tự trách mãnh liệt cũng dâng trào."
# 【双鉄】
# display as 雙鐵
# JP: 「助けてくれてありがとう。\n心配をかけてしまって、すまなかった」
2487 = "「Cảm ơn hai đứa đã giúp anh.\nXin lỗi vì đã làm hai đứa lo lắng.」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「いえ、そんなっ！」\n「まっことばい！」
1791 = "「Dạ không, có gì đâu ạ!」\n「Thật tình luôn á!」"
# monologue
# JP: 正反対の言葉同士が、ふかみと凪との間でぶつかる。
3045 = "Hai câu nói mang ý nghĩa trái ngược nhau va chạm giữa Fukami và Nagi."
# monologue
# JP: 凪とふかみは見つめ合い――\nすぐにふかみが、『凪ちゃんどうぞ』と小さく頷く。
2909 = "Nagi và Fukami nhìn nhau――\nNgay lập tức Fukami khẽ gật đầu, như muốn nói 'Nagi nói trước đi'."
# 【凪】
# display as 凪
# JP: 「ばってん、にーさんを倒れさせちゃったの、\nうちらの責任もおっきかとねって、話し合っとったばい」
1823 = "「Cơ mà, việc để anh Soutetsu ngã bệnh,\nbọn em đã bàn bạc và thấy mình cũng có trách nhiệm lớn lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみの責任？」
1851 = "「Trách nhiệm của Nagi và Fukami sao?」"
# 【凪】
# display as 凪
# JP: 「そーばい！」
2337 = "「Đúng vậy!」"
# 【ふかみ】
# display as 深美
# JP: 「あの……わたしたち、それぞれでと、三人でと――\n休みのたびに、出かけたり遊んでたりしてましたよね」
2270 = "「À ừm......chúng em, đi riêng từng người, hoặc đi chung ba người――\nCứ mỗi dịp nghỉ là lại đi ra ngoài chơi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「ウチはふかみちゃんとにーさんが出かけとるとき、\nぐーすかぴーって寝まくっとったし」
2003 = "「Khi bé Fukami và anh Soutetsu đi chơi,\nthì em ngủ say sưa ở nhà luôn.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、凪ちゃんと双鉄おにいさんのおでかけは、\nおうちでゆっくり、やすんですごしてましたけど……」
2237 = "「Em cũng vậy, khi Nagi và anh Soutetsu đi chơi,\nem cũng ở nhà thong thả nghỉ ngơi nhưng mà......」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2057 = "「嗯」" 
# monologue
# JP: 言われて、気づく。
3123 = "Nghe hai đứa nói, tôi mới nhận ra."
# monologue
# JP: これほど単純な事実を失念してしまっていた、\n自分の愚かさに愕然とする。
2984 = "Tôi bàng hoàng trước sự ngu ngốc của bản thân,\nkhi đã quên mất một sự thật đơn giản đến thế."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。僕の体は――修学旅行が始まってからずっと、\n休み……疲労回復の機会を得ずに稼働し続けていたのか」
1932 = "「Ra là vậy. Cơ thể anh――từ lúc bắt đầu chuyến đi dã ngoại đến giờ,\nđã liên tục hoạt động mà không có cơ hội nghỉ ngơi......phục hồi mệt mỏi sao.」"
# 【凪】
# display as 凪
# JP: 「っていうか、にーさん、\n体が重くなったり、無性に眠くなったりせんかったと？」
2462 = "「Mà nói nghe nè, anh Soutetsu,\nanh không thấy cơ thể nặng nề, hay buồn ngủ vô cớ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……特に、普段とは変わらなかったが」
1409 = "「......Cũng không có gì khác biệt so với bình thường cả.」"
# 【凪】
# display as 凪
# JP: 「って！？」
2047 = "「Hả!?」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
2157 = "「Nagi.」"
# monologue
# JP: ふかみと凪はうなずきあって――っ！？
3052 = "Fukami và Nagi gật đầu với nhau――hả!?"
# 【双鉄】
# display as 雙鐵
# JP: 「！？　なにをっ」
2049 = "「!? Làm gì thế.」"
# 【ふかみ】
# display as 深美
# JP: 「動かないでください――って！？　わ！？\nな、なにこの肩っ！　鉄板みたいっ！！」
1922 = "「Anh đừng cử động――hả!? Oa!?\nCái, cái vai này là sao! Cứng như tấm sắt ấy!!」"
# 【凪】
# display as 凪
# JP: 「背中もヒドかとっ！　凪さまの力でも――\nんぎぎぎ――くあ～っ！　指ば少しも沈まんたい！！」
2192 = "「Lưng cũng tệ lắm luôn! Dù Nagi dùng hết sức――\nNgigigi――kua~! Ngón tay cũng không ấn xuống được chút nào!!」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんっ！？　肩たたきとかマッサージとか、\nそういうの、全然したりしないんですか？」
2567 = "「Anh Soutetsu!? Đấm bóp vai hay massage gì đó,\nanh hoàn toàn không làm chút nào sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　マッサージやらストレッチやらは、\n日々姫がちょいちょい」
2072 = "「Hừm? Massage hay giãn cơ thì,\nHibiki vẫn hay làm cho anh mà.」"
# monologue
# JP: いや、違う。
2724 = "Không, khoan đã."
# monologue
# JP: 『凪ちゃんとふかみちゃんに悪かけん』といって、\n日々姫のマッサージは、確か……
2987 = "Hibiki từng nói 'Thế thì ngại với Nagi và bé Fukami lắm',\nvà những buổi massage của Hibiki, hình như là......"
# 【双鉄】
# display as 雙鐵
# JP: 「ではないな。修学旅行が始まったころからは、\n確かに一度も、誰のマッサージも受けていない」
1768 = "「Không phải rồi. Từ khi bắt đầu chuyến đi dã ngoại,\nquả thực anh chưa được ai massage cho lần nào cả.」"
# 【ふかみ】
# display as 深美
# JP: 「てゆうことは…一年以上も！？」
1801 = "「Nói vậy là... hơn một năm rồi sao!?」"
# 【凪】
# display as 凪
# JP: 「あの重労働で、休みなしで――\nそのうえ、まともなケアもいっさいなかったと！？」
2174 = "「Làm việc nặng nhọc như thế, không có ngày nghỉ――\nThêm vào đó, cũng không được chăm sóc tử tế chút nào sao!?」"
# monologue
# JP: 凪とふかみが、絶望したような顔になる。\nその顔同士が向き合って、ゆっくりひとつうなずき合う。
2811 = "Nagi và Fukami lộ vẻ mặt như tuyệt vọng.\nHai khuôn mặt ấy nhìn nhau, rồi từ từ gật đầu một cái."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん。次は、\n休み方の勉強しなくっちゃって思います」
2568 = "「Anh Soutetsu. Lần tới,\nchúng ta phải học cách nghỉ ngơi thôi.」"
# 【凪】
# display as 凪
# JP: 「お師匠さんもゆーとったばい！\n『完全休養もまた、大事な修行』って」
2172 = "「Sư phụ cũng từng nói đó!\n'Nghỉ ngơi hoàn toàn cũng là một sự tu hành quan trọng'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
2320 = "「Ồ?」"
# 【凪】
# display as 凪
# JP: 「休む間に、筋肉の痛みば修復されて、\nそいば成長につながるばい！」
1816 = "「Trong lúc nghỉ ngơi, sự đau nhức của cơ bắp sẽ được phục hồi,\ntừ đó dẫn đến sự phát triển đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「休みがないと、単純に疲労が蓄積され続けて……\nまたおんなじことに、きっとなっちゃうって思います」
2138 = "「Nếu không có ngày nghỉ, đơn giản là sự mệt mỏi sẽ tiếp tục tích tụ......\nRồi chắc chắn sẽ lại xảy ra chuyện tương tự thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2352 = "「Ra là vậy.」"
# monologue
# JP: 言われてみれば、真闇姉も日々姫も折々ごとに、\n休養するよう導いてくれていたなと思い当たる。
3122 = "Nghe nói vậy, tôi mới nhớ ra chị Mayami và Hibiki cũng thỉnh thoảng\nhướng dẫn tôi cách nghỉ ngơi."
# monologue
# JP: 修学旅行を始めてからは――\nそうしたものを、完全に見落としてしまっていた――か。
3130 = "Kể từ khi bắt đầu chuyến đi dã ngoại――\nTôi đã hoàn toàn bỏ qua những điều đó――sao."
# 【双鉄】
# display as 雙鐵
# JP: 「休みについても、\n二人について教えてもらえるのはありがたい」
1848 = "「Về chuyện nghỉ ngơi,\nanh rất biết ơn nếu được hai đứa chỉ dạy.」"
# monologue
# JP: 安堵とともにそう言って。\nけれども言葉が、妙に喉へと絡みつく。
2972 = "Nói vậy cùng với sự nhẹ nhõm.\nNhưng lời nói lại vướng víu ở cổ họng một cách kỳ lạ."
# monologue
# JP: 不意に湧き出した違和感に、\n何故だ――と自分を省みてみる。
2991 = "Trước cảm giác không tự nhiên bất chợt trào dâng,\ntôi tự hỏi tại sao――và nhìn lại bản thân."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1391 = "「............」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄……おにいさん？」
1418 = "「Anh......Soutetsu?」"
# 【凪】
# display as 凪
# JP: 「にーさん？　急にどぎゃんしたと？」
2102 = "「Anh Soutetsu? Tự nhiên bị sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2372 = "「Không――」"
# monologue
# JP: ぼんやりしている。曖昧だ。\nあるいは、単なる悪夢を見ていたのかもしれない。
3126 = "Đầu óc tôi đang lơ đãng. Mơ hồ.\nHoặc có lẽ, tôi chỉ vừa trải qua một cơn ác mộng đơn thuần."
# monologue
# JP: けれども、それが悪夢であるなら、\n恐らく僕の無意識からの、警告ということになるのだろう。
2849 = "Thế nhưng, nếu đó là ác mộng,\nthì có lẽ là một lời cảnh báo từ tiềm thức của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「まず、大前提をわかってほしい。\n僕はふたりといると楽しい。故にふたりとずっといたい」
2579 = "「Trước tiên, anh muốn hai đứa hiểu một tiền đề quan trọng.\nAnh rất vui khi ở bên hai đứa. Do đó, anh muốn ở bên hai đứa mãi mãi.」"
# 【凪】
# display as 凪
# JP: 「凪さまも三人でいると楽しかとよー！」
2353 = "「Nagi cũng thấy vui khi ở cùng ba người đó nha~!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、です」
2233 = "「Em cũng vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その大前提の上で、なのだが――気がかりがある」
2090 = "「Dựa trên tiền đề đó, nhưng mà――anh có một nỗi bận tâm.」"
# 【凪】
# display as 凪
# JP: 「なんね！？　なにが気がかりと？」
1803 = "「Gì vậy!? Nỗi bận tâm gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「心の奥で、声がするのだ。\n『ふかみと凪を、僕が縛ってはいけない』と」
1890 = "「Sâu thẳm trong tim, có một giọng nói vang lên.\n'Mình không được phép trói buộc Fukami và Nagi'.」"
# 【凪】
# display as 凪
# JP: 「縛る――って、どういうことばい？」
2355 = "「Trói buộc――là sao cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみがこれから健やかな大人になる――\nその足かせに、僕がなってはいかん、ということだ」
1849 = "「Fukami và Nagi từ nay sẽ trưởng thành khỏe mạnh――\nAnh không được trở thành vật cản bước chân của hai đứa, ý là vậy.」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「はうっ」\n「どこの誰ばい！　そぎゃんこつぬかすのはー」
2053 = "「Hau」\n「Là kẻ nào hả! Dám ăn nói hàm hồ như thế~」"
# 【双鉄】
# display as 雙鐵
# JP: 「誰、ということもないだろう。\n僕の無意識が、そう警告をしているのかもしれん」
1771 = "「Cũng chẳng phải ai đâu.\nCó lẽ là tiềm thức của anh đang cảnh báo như vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「……」
# 1391 = "「……」" 
# monologue
# JP: ふかみの視線が落ち着かぬ。
3050 = "Ánh mắt của Fukami không hề yên định."
# monologue
# JP: ならばふかみにも、\n何らかのこころあたりがあるのかもしれん。
3074 = "Nếu vậy thì có lẽ Fukami,\ncũng có linh cảm nào đó về chuyện này."
# 【凪】
# display as 凪
# JP: 「無意識？　ってことは、にーさんもなんか、\nそー思うようなこころあたりてきなもんば、あると？」
2441 = "「Tiềm thức? Vậy là, anh Soutetsu cũng có,\nlinh cảm gì đó khiến anh nghĩ như vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだよな」
2062 = "「Ừ, đúng vậy nhỉ.」"
# monologue
# JP: 確かにだ。僕の中に、未だ言葉に整頓されぬ、\n不明瞭な『不安』がきっとあるから……
3016 = "Quả thực là vậy. Trong tôi, chắc chắn có một 'sự bất an' mơ hồ,\nvẫn chưa thể sắp xếp thành lời......"
# 【双鉄】
# display as 雙鐵
# JP: 「…………例えば、それは。\n結婚のこと、という形になるか」
1415 = "「............Ví dụ như, đó là.\nChuyện kết hôn, đại loại vậy.」"
# 【凪】
# display as 凪＆深美
# JP: 「結婚ばい？」\n「ひゃうっ！！？」
2447 = "「Kết hôn á?」\n「Hyau!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。先にも言ったが僕は、凪とふかみと、\nこれからもずっといたいと望んでいる」
2060 = "「Ừm. Như anh đã nói trước đó, anh mong muốn,\ntừ nay về sau vẫn được ở bên cạnh Nagi và Fukami.」"
# 【凪】
# display as 凪
# JP: 「そいばしーっかり聞いたとばい」
1858 = "「Chuyện đó em nghe rõ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ずっと一緒にいるために、社会的に最も有利な方法は\n結婚であろうが――これは、一人としかできない」
2476 = "「Để mãi mãi ở bên nhau, phương pháp có lợi nhất về mặt xã hội\nlà kết hôn――nhưng điều này, chỉ có thể làm với một người.」"
# 【凪】
# display as 凪
# JP: 「にーさんとふかみちゃんが結婚したかったら――っ！」
2140 = "「Nếu anh Soutetsu và bé Fukami muốn kết hôn thì――!」"
# monologue
# JP: 凪の言葉が急に詰まる。
2821 = "Lời của Nagi đột nhiên nghẹn lại."
# monologue
# JP: 梅肉入りだと思っていた飴の、中身がしかし\n唐辛子であったかのように、急に真っ赤になってしまう。
2915 = "Như thể viên kẹo ngỡ là nhân mận,\nnhưng bên trong lại là ớt, khuôn mặt em ấy đột nhiên đỏ bừng lên."
# 【凪】
# display as 凪
# JP: 「別にっ、その――凪さま、ぜーんぜん気にせんけんっ！\nふたりで、結婚すれば――よか、ばいっ！」
2375 = "「Không sao đâu, cái đó――Nagi, hoàn toàn không bận tâm đâu!\nHai người, cứ kết hôn――đi!」"
# 【ふかみ】
# display as 深美
# JP: 「だめだよ凪ちゃん、そんなのっ」
1778 = "「Không được đâu Nagi, như thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もそれはダメだと思う。僕はふかみと凪との間に\n少しの差異もつけたくない、し――」
2238 = "「Anh cũng nghĩ như thế là không được. Anh không muốn tạo ra\ndù chỉ một chút khác biệt nào giữa Fukami và Nagi, và――」"
# 【凪】
# display as 凪
# JP: 「なら、ふたりともと結婚せんで、\nそのまま三人でなら公平ばい！？」
2549 = "「Vậy thì, không kết hôn với ai cả,\ncứ để ba người thế này thì công bằng rồi!?」"
# 【ふかみ】
# display as 深美
# JP: 「かも……だよね。いまよりもっと大人になると……\nいろいろ、それはそれで面倒そうだけど」
2276 = "「Có lẽ......vậy nhỉ. Khi trưởng thành hơn bây giờ......\nNhiều thứ, cứ thế chắc sẽ phiền phức lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「面倒そう、か」
2583 = "「Phiền phức, sao.」"
# monologue
# JP: 確かに、ふかみの言うとおりだろう。\nそんな不安定な状態にふたりを置き続けたくないし――
3053 = "Quả thực, đúng như Fukami nói.\nTôi không muốn tiếp tục để hai người họ trong tình trạng bất ổn như vậy――"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2057 = "「嗯」" 
# monologue
# JP: ではどうすれば、思った瞬間に理解する。
3203 = "Vậy phải làm sao đây, ngay khoảnh khắc nghĩ đến điều đó, tôi đã hiểu ra."
# 【双鉄】
# display as 雙鐵
# JP: 「面倒さなどは全く厭わん。が、\nどちらとも結婚しない未来を、僕は望まん」
2230 = "「Anh hoàn toàn không ngại những chuyện phiền phức. Nhưng mà,\nanh không mong muốn một tương lai không kết hôn với ai cả.」"
# monologue
# JP: そうだ――のぞみだ。
3014 = "Đúng vậy――đó là mong muốn."
# monologue
# JP: 僕の望んでいることなどは、\nどうしようもなく単純なのだ。
2977 = "Những điều tôi mong muốn,\nđơn giản đến mức chẳng thể làm khác được."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はただただ、三人で。凪とふかみと三人で、\n家庭を持ちたい――家族になりたいと思うのだ」
2255 = "「Anh chỉ đơn giản là, muốn ba người chúng ta. Anh, Nagi và Fukami, ba người,\ncùng nhau xây dựng gia đình――anh muốn chúng ta trở thành người một nhà.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――」
2037 = "「A――」"
# monologue
# JP: ふかみが、両手で口を押さえる。
3042 = "Fukami lấy hai tay che miệng."
# monologue
# JP: 僕を見、凪を見、また僕を見て――\nその目が潤む。こくこく、何度も小さく頷く。
2917 = "Nhìn tôi, nhìn Nagi, rồi lại nhìn tôi――\nĐôi mắt ấy ngấn lệ. Cô ấy khẽ gật đầu, nhiều lần."
# 【凪】
# display as 凪
# JP: 「さすがにーさん！　よか考えばいっ！！」
2098 = "「Đúng là anh Soutetsu! Ý tưởng tuyệt vời!!」"
# monologue
# JP: 凪もまた、全開の笑顔で頷いてくれる。
2805 = "Nagi cũng gật đầu với tôi bằng nụ cười tươi rói."
# monologue
# JP: ほっとする。嬉しくなる。\nならば目指すは、この方向だ。
2986 = "Thở phào nhẹ nhõm. Thấy thật vui sướng.\nVậy thì hướng đi tiếp theo, chính là đây."
# 【凪】
# display as 凪
# JP: 「で、具体的にどぎゃんすると？」
2548 = "「Vậy, cụ thể thì phải làm sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さてそこだ」
2050 = "「Chính là chỗ đó.」"
# monologue
# JP: 目的が定まり、叶えたいという意欲も極めて強くある。
3090 = "Mục đích đã định, ý chí muốn hiện thực hóa nó cũng vô cùng mạnh mẽ."
# monologue
# JP: 緩みきっていた頭が一気に加熱して、\n抱え込み、思いついていた断片達を[しゅうれん,1]収斂していく。
2833 = "Đầu óc vốn đang lơ mơ bỗng chốc nóng bừng lên,\ngom nhặt và hội tụ lại những mảnh ghép ý tưởng đã nghĩ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ぼんやりとした案はいくつか浮かんできたが……\n実現可能なものかどうかは、さっぱりわからん」
2269 = "「Anh đã lờ mờ nghĩ ra vài phương án......\nNhưng hoàn toàn không biết liệu có khả thi hay không.」"
# monologue
# JP: 言えば、ふかみが身を乗り出す。
2988 = "Vừa dứt lời, Fukami chồm người tới."
# 【ふかみ】
# display as 深美
# JP: 「それ。どこの誰ならわかりそう、です？」
2513 = "「Chuyện đó. Hỏi ai thì có vẻ sẽ biết, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「身近で言えば、やはりポーレット。\n稀咲と真闇姉も関連してくるかもしれんし――」
2142 = "「Nếu nói người gần gũi nhất, quả nhiên là Paulette.\nKisaki và chị Mayami có lẽ cũng liên quan――」"
# 【凪】
# display as 凪
# JP: 「なら、また全体会議やると？」
2533 = "「Vậy thì, lại mở cuộc họp toàn thể hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「全体会議……というか、有志を募っての相談会、\n意見交換会になろうな。仕事とは関係せんことだし」
2565 = "「Họp toàn thể......hay đúng hơn là buổi thảo luận tập hợp những người quan tâm,\nsẽ trở thành buổi trao đổi ý kiến nhỉ. Vì chuyện này không liên quan đến công việc.」"
# 【凪】
# display as 凪
# JP: 「名前なんかはなんでんかまわんばい！　ね？　にーさん。\nそん席に、うちんじーちゃん呼んでも良かと？」
1984 = "「Tên gọi gì cũng được hết! Nhỉ? Anh Soutetsu.\nChỗ đó, mình gọi ông nội tới cũng được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、大歓迎だ。\nあらためて個別にもご挨拶には伺うが――」
2264 = "「Tất nhiên rồi, rất hoan nghênh.\nAnh cũng sẽ đến chào hỏi riêng từng người sau, nhưng――」"
# 【ふかみ】
# display as 深美
# JP: 「でしたら、うちも！　あの、おかあさんは、まだ、\n外を出歩けるような感じじゃないんですけど」
2538 = "「Nếu vậy, nhà em cũng! À ừm, mẹ em thì, vẫn chưa,\nthể ra ngoài đi lại được đâu nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\nまた改めてお見舞いとご挨拶に行かせてくれ」
2065 = "「Ừm.\nCho anh đến thăm và chào hỏi cô ấy vào dịp khác nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「はい、もちろん！　大喜びするって思います。\nそれで――会議……意見交換会に、おじいちゃんたち」
2133 = "「Vâng, tất nhiên rồi! Em nghĩ mẹ sẽ rất vui đó.\nVậy nên――cuộc họp......buổi trao đổi ý kiến, các ông」"
# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎にきまっている。関係の深い方々のお話や\nご意見など、できるだけ伺いたい」
1862 = "「Tất nhiên là rất hoan nghênh rồi. Anh muốn lắng nghe\ncâu chuyện và ý kiến của những người có liên quan sâu sắc càng nhiều càng tốt.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、わたし、おじいちゃんたちに聞いて、\nなるべく早く、候補日あげます！　です！」
2543 = "「Vậy, em sẽ hỏi các ông,\nvà đưa ra các ngày dự kiến sớm nhất có thể! Ạ!」"
# 【凪】
# display as 凪
# JP: 「うちもそぎゃんとするばい！\nふかみちゃんとうまいこと手分けするけんね！」
1999 = "「Em cũng sẽ làm vậy!\nEm và bé Fukami sẽ chia nhau ra làm cho suôn sẻ nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では僕は」
2536 = "「Vậy anh thì」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「ダメ！　です！！」\n「ダメばいっ！！」
1776 = "「Không được! Đâu ạ!!」\n「Không được đâu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
2017 = "「Uoa!?」"
# monologue
# JP: 四本の手が、僕を布団に押し倒す。\nそのまま腕をしまわれて、毛布を整えられてしまう。
2872 = "Bốn bàn tay đẩy tôi ngã xuống nệm.\nCứ thế giấu luôn hai cánh tay tôi vào trong, rồi đắp chăn lại đàng hoàng."
# 【ふかみ】
# display as 深美
# JP: 「お休みの日に、どうやって体を休めるかとかは、\n次からわたしと凪ちゃんが、教えてあげます！　けど」
1764 = "「Vào ngày nghỉ, phải làm thế nào để cơ thể được nghỉ ngơi,\ntừ lần sau em và Nagi sẽ chỉ cho anh! Nhưng mà」"
# 【凪】
# display as 凪
# JP: 「今日くらいは、にーさん一人で寝てなきゃダメばい！\n大人しく、いいこにしてないといけんよ？」
1821 = "「Ít nhất là hôm nay, anh Soutetsu phải ngủ một mình mới được!\nPhải ngoan ngoãn, làm một đứa trẻ ngoan đấy nhé?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです！　倒れたばっかりなんですから」
2336 = "「Đúng rồi ạ! Anh vừa mới ngã bệnh xong mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はは」
2018 = "「Haha.」"
# monologue
# JP: 乾いたような笑い声。\n一瞬遅れて、それが自分の失笑だと知る。
2975 = "Tiếng cười khô khốc.\nChậm một nhịp, tôi mới nhận ra đó là tiếng cười gượng của chính mình."
# monologue
# JP: まったく僕は、どこまで愚かなのだろう。
2980 = "Thật tình, tôi ngu ngốc đến mức nào chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そうだったな」
2340 = "「Đúng vậy. Đúng là thế nhỉ.」"
# monologue
# JP: 僕の言葉に、ふかみと凪とは安心したように頷きあって。\nそうして、ふすまに手をかける。
3124 = "Nghe tôi nói, Fukami và Nagi gật đầu với nhau như đã an tâm.\nSau đó, hai đứa đặt tay lên cửa lùa."
# 【凪】
# display as 凪
# JP: 「わかんないこととかあったら電話するけん！\n安心して寝といてよかとよー」
2477 = "「Nếu có gì không hiểu tụi em sẽ gọi điện nha!\nAnh cứ yên tâm mà ngủ đi~」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　電話したら起こしちゃう！！」
2159 = "「Nagi! Gọi điện sẽ đánh thức anh ấy mất!!」"
# 【凪】
# display as 凪
# JP: 「あ、そぎゃんとね。そしたら――」
2040 = "「A, đúng rồi ha. Nếu vậy thì――」"
# 【双鉄】
# display as 雙鐵
# JP: 「夕食も取るし、19時から22時の間は起きていよう。\n連絡があるなら、そのときに頼めれば」
2275 = "「Anh cũng phải ăn tối nữa, nên từ 19 giờ đến 22 giờ anh sẽ thức.\nNếu có chuyện gì cần liên lạc, thì lúc đó nhờ hai đứa nhé.」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
2127 = "「Đã rõ!」"
# 【ふかみ】
# display as 深美
# JP: 「それじゃ、わたしたちいきますけど――でも、\n絶対に休んでくださいね！　さっきの時間以外は、寝て」
2540 = "「Vậy thì, bọn em đi đây――nhưng mà,\nanh nhất định phải nghỉ ngơi đấy nhé! Ngoài khoảng thời gian lúc nãy ra thì phải ngủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「起きてるときも、まーねーちゃんとかひびねーちゃんの\nお手伝いしたらいけんよ！　休まんと！！」
2561 = "「Lúc thức cũng không được phụ giúp\nchị Mayami hay chị Hibiki đâu đó! Phải nghỉ ngơi!!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、\nそれちゃんとみんなに念押ししとかないと！」
2161 = "「Nagi,\nchuyện đó chúng ta phải dặn dò kỹ với mọi người mới được!」"
# 【凪】
# display as 凪
# JP: 「そうばいね！　じゃ、そいもてわけしてやるばい！」
2156 = "「Đúng vậy nhỉ! Vậy, chuyện đó tụi mình cũng chia nhau ra làm luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「それじゃ、双鉄おにいさん。わたしたち帰ります。\n携帯、いつでもかけてくださいね、なにもなくても」
2555 = "「Vậy thì, anh Soutetsu. Tụi em về đây.\nAnh cứ gọi điện thoại bất cứ lúc nào nhé, dù không có chuyện gì cũng được.」"
# 【凪】
# display as 凪
# JP: 「うちもいつでもよかけんね！\nひかりの速さですっとんでくるばい！！」
2001 = "「Em cũng lúc nào cũng được nha!\nEm sẽ bay đến với tốc độ ánh sáng luôn!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、わたしのときは、\nナビちゃんのお迎えお願いしまぁす」
2045 = "「A, còn em thì,\nnhờ Navi đến đón nhé~」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、ズルかとー！」
2162 = "「Bé Fukami, ăn gian quá đi~!」"
# 【ふかみ】
# display as 深美
# JP: 「あははっ」
2019 = "「Ahaha.」"
# monologue
# JP: 部屋を出かけて、ふたりがふりむく。\n僕を見る。
2910 = "Chuẩn bị bước ra khỏi phòng, hai đứa ngoảnh lại.\nNhìn tôi."
# monologue
# JP: ただそれだけで、胸がぽかりと暖かくなる。\n離れても、ふたりに守られ、包まれていると感じてる。
3196 = "Chỉ bấy nhiêu thôi, trong ngực tôi đã dâng lên một sự ấm áp lạ thường.\nDù có xa nhau, tôi vẫn cảm nhận được mình đang được hai người bảo vệ, bao bọc."
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも、気をつけて。ありがとう」
1852 = "「Cả hai đi đường cẩn thận nhé. Cảm ơn hai đứa.」"
# 【ふかみ】
# display as 深美
# JP: 「いいえ、です。わたしこそ――\n助けてくれてありがとうございました、です」
2374 = "「Không có chi, ạ. Em mới là người――\nphải cảm ơn anh vì đã giúp em, ạ.」"
# 【凪】
# display as 凪
# JP: 「明日は元気なにーさんに会えるの、\n楽しみにしとるとばい！」
2006 = "「Ngày mai sẽ được gặp anh Soutetsu khỏe mạnh,\nem mong chờ lắm đó!」"
# monologue
# JP: そうして、凪とふかみとは、\n目と目をみあわせ、声をあわせる。
2813 = "Rồi, Nagi và Fukami,\nnhìn nhau, và đồng thanh nói."
# 【凪】
# display as 凪＆深美
# JP: 「お大事に、ばい！」\n「お大事に、です！」
1872 = "「Giữ gìn sức khỏe nhé!」\n「Giữ gìn sức khỏe ạ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「これを……双鉄くんと、ふかみちゃんと凪ちゃんで？」
1838 = "「Cái này......cậu Soutetsu, bé Fukami và Nagi cùng làm sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 
# monologue
# JP: 配布したペーパーから、まず顔をあげたのはポーレット。\nついで稀咲が、ふ、と小さな笑みを浮かべる。
3214 = "Từ xấp giấy được phát, người ngẩng mặt lên đầu tiên là Paulette.\nTiếp theo là Kisaki, cô khẽ nở một nụ cười mỉm."
# 【稀咲】
# display as 稀咲
# JP: 「能く錬られているね。重婚、なんていう切り口で来たら、\n無駄な努力にならないよう引導を渡すつもりでいたけど」
2214 = "「Chuẩn bị kỹ lưỡng đấy. Nếu cậu tiếp cận theo hướng đa thê,\ntôi đã định khuyên can để cậu khỏi uổng công vô ích rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「現行の婚姻制度に反対したいわけではない。\nただ、新しい家族のあり方もあればいいと願うばかりだ」
2251 = "「Tôi không có ý định phản đối chế độ hôn nhân hiện hành.\nChỉ là, tôi mong muốn có thêm một hình thái gia đình mới mà thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「新しい、家族のあり方――」
2443 = "「Hình thái gia đình, mới――」"
# 【れいな】
# display as 玲奈
# JP: 「れいなには、むつかしくてちょっとわかってないかも\nしれないですけどぉ」
2512 = "「Đối với Reina, có lẽ hơi khó hiểu một chút\nnhưng mà~」"
# monologue
# JP: れいながきょとん、と首を傾げる。
3067 = "Reina nghiêng đầu, ngơ ngác."
# monologue
# JP: ポーレットが頭を撫でてやれば、\n安心しきって、言葉の続きをゆるゆる紡ぐ。
3036 = "Khi được Paulette xoa đầu,\ncô bé hoàn toàn yên tâm, từ từ thốt ra những lời tiếp theo."
# 【れいな】
# display as 玲奈
# JP: 「双鉄さんのアイディアが本当になったら、\nポーレットとれいなも、家族になれたりするですかぁ」
2144 = "「Nếu ý tưởng của anh Soutetsu trở thành hiện thực,\nthì chị Paulette và Reina cũng có thể trở thành người một nhà sao ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「……そうできるようになる可能性はある。\nとってもとっても厳しくて難しい道だとは思うけど」
1414 = "「......Cũng có khả năng làm được như vậy.\nDù chị nghĩ đó là một con đường cực kỳ, cực kỳ chông gai và khó khăn.」"
# 【れいな】
# display as 玲奈
# JP: 「わああああ」
2014 = "「Oaaaaa」"
# monologue
# JP: ぱーっと、れいなの顔が輝く。\n明るい一輪の花が咲く。
3063 = "Gương mặt Reina bừng sáng.\nNhư một đóa hoa tươi tắn đang nở rộ."
# monologue
# JP: それだけで、僕らの目指す方向性は、\n間違ってないのだと確信できる。
3199 = "Chỉ bấy nhiêu thôi, cũng đủ để tôi tin chắc rằng,\nhướng đi mà chúng tôi đang nhắm tới không hề sai lầm."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんならきっと出来ますよぉ！\nれいな、応援しちゃいまぁす！」
2566 = "「Nếu là anh Soutetsu thì chắc chắn sẽ làm được thôi ạ!\nReina, sẽ cổ vũ cho anh nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心強いよ。ありがとう」
2113 = "「Vững tâm thật đấy. Cảm ơn em.」"
# 【ハチロク】
# display as 八六
# JP: 「今更申し上げるまでもなく、わたくしは、\nどのような場合であろうと、常に双鉄さまのお味方です」
1770 = "「Giờ có nói thì cũng bằng thừa, nhưng tôi,\ndù trong bất cứ hoàn cảnh nào, cũng luôn đứng về phía ngài Soutetsu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「ですが。今ひとつ今回のご提案の趣旨が飲み込めません。\nわたくしが、婚姻制度？　に[うと]疎いせいかとも存じます」
1836 = "「Tuy nhiên. Tôi vẫn chưa nắm bắt được hết ý chính của đề xuất lần này.\nCó lẽ là do tôi còn mù mờ về chế độ hôn nhân chăng?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 2519 = "「這樣啊」" 
# monologue
# JP: ではあるまい。\n疑問を感じ、けれどもそれを口に出せない――
2733 = "Không phải vậy đâu.\nCảm thấy thắc mắc, nhưng lại không thể nói ra lời――"
# monologue
# JP: そうした参席者を想定し、\nハチロクは、あえて尋ね手に回ってくれているのだ。
2874 = "Dự đoán sẽ có những người tham dự như thế,\nnên Hachiroku mới cố ý đóng vai người đặt câu hỏi giúp tôi."
# 【ハチロク】
# display as 八六
# JP: 「ですので、双鉄様のお言葉で。今回のご提案につき、\nいま少しわかりよくご説明いただけましたらと願います」
2084 = "「Vì vậy, bằng chính lời của ngài Soutetsu. Về đề xuất lần này,\ntôi mong ngài có thể giải thích dễ hiểu hơn một chút nữa ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
# 2132 = "「好的」" 
# monologue
# JP: 姿勢を正し、視線を定める。\nハチロクにではなく――
2971 = "Tôi chỉnh lại tư thế, hướng ánh nhìn.\nKhông phải về phía Hachiroku――"
# monologue
# JP: 一番後ろの一番すみに並んで座る、\n蓑笠老人と堰さんとへ向け
3119 = "Mà là hướng về phía ông Minokasa và ông Seki,\nđang ngồi cạnh nhau ở góc cuối cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、欠陥の多い人間でした。その欠陥を埋めるため、\n早瀬ふかみと蓑笠凪に、力を貸してもらっています」
2263 = "「Cháu là một kẻ có nhiều khiếm khuyết. Để bù đắp những khiếm khuyết đó,\ncháu đang nhờ Hayase Fukami và Minokasa Nagi cho mượn sức mạnh.」"
# 【ハチロク】
# display as 八六
# JP: 「修学旅行――でございますね？」
2167 = "「Chuyến đi dã ngoại――phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が学び得なかったことを学び直すための修学旅行。\nふたりは学習を、そのように定義してくれました」
2121 = "「Chuyến đi dã ngoại để học lại những điều tôi chưa thể học được.\nHai người họ đã định nghĩa việc học tập như vậy đó.」"
# monologue
# JP: すぐ隣りにいる凪、ふかみをちらと見る。\n頷きを返してもらうそれだけで、僕がまっすぐ整えられる。
2979 = "Tôi liếc nhìn Nagi và Fukami đang ở ngay bên cạnh.\nChỉ cần nhận lại cái gật đầu từ họ, tôi đã có thể lấy lại sự vững vàng."
# 【双鉄】
# display as 雙鐵
# JP: 「そのさなか、僕と凪とふかみとは、一つのチームに、\n共同体に育っていったと感じています」
2088 = "「Trong quá trình đó, cháu cảm thấy cháu, Nagi và Fukami,\nđã dần trưởng thành thành một đội, một cộng đồng chung.」"
# 【日々姫】
# display as 日日姬
# JP: 「共同体？」
1894 = "「Cộng đồng chung?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕だけではなく――ふかみにも凪にもやはり、\nそれぞれ欠けてしまっているものは、ある」
2056 = "「Ừ. Không chỉ riêng anh――mà cả Fukami và Nagi,\nmỗi người đều có những thứ còn thiếu sót.」"
# 【蓑笠】
# display as 蓑笠＆堰
# JP: 「ああ」\n「そりゃあのお」
2316 = "「A」\n「Cái đó thì」"
# monologue
# JP: 厳しい顔で沈黙を守ってらしたおふたりが、\n全く同じタイミングで、同意の言葉を漏らしてしまう。
2720 = "Hai người vốn giữ vẻ mặt nghiêm nghị và im lặng nãy giờ,\nlại vô tình buông lời đồng ý cùng một lúc."
# monologue
# JP: ほのかにゆるむ。この場の全てが。\n空気が、ひといき分だけ、やわらかくなる。
3068 = "Khẽ giãn ra. Tất cả mọi thứ ở đây.\nBầu không khí, mềm mại đi đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「僕達は、それを補いあい、相互の成長を促せる――\nそういう関係を築けましたし、結果も出してきました」
2253 = "「Chúng cháu đã bù đắp cho nhau, thúc đẩy sự trưởng thành của nhau――\nChúng cháu đã xây dựng được một mối quan hệ như vậy, và cũng đã mang lại kết quả.」"
# 【真闇】
# display as 真闇
# JP: 「バーベキュートレインとクマ川下りとの連携。\nそいを、御一夜全体の観光・産業への刺激にもつなげた」
2585 = "「Sự liên kết giữa chuyến tàu BBQ và xuôi dòng sông Kuma.\nViệc đó cũng đã tạo cú hích cho toàn bộ ngành du lịch và công nghiệp của Ohito.」"
# 【ポーレット】
# display as 波萊特
# JP: 「確かにそれは、双鉄君たちのアイディアと努力が、\n一番目に見えて発揮されたケースだと思います」
2514 = "「Đó quả thực là trường hợp mà ý tưởng và sự nỗ lực của nhóm cậu Soutetsu,\nđược phát huy một cách rõ rệt nhất đấy.」"
# monologue
# JP: 僕らだけの力であろうはずもないない。\nが、ポーレットは百も承知で、僕らに華を持たせてくれる。
3193 = "Không thể nào chỉ là sức lực của riêng chúng tôi được.\nNhưng Paulette thừa biết điều đó, vẫn nhường phần tỏa sáng cho chúng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道の収入だけでなく、御一夜市の税収も\n前年比で二十パーセント以上の増加をみせました」
2199 = "「Không chỉ doanh thu của Đường sắt Ohito, mà thu nhập thuế của thành phố Ohito\ncũng cho thấy sự gia tăng hơn hai mươi phần trăm so với năm ngoái.」"
# 【稀咲】
# display as 稀咲
# JP: 「驚くべき、劇的とも言える改善だよね。\n僕は、双鉄を非常に高く評価しているよ？」
2458 = "「Một sự cải thiện đáng kinh ngạc, có thể nói là mang tính bước ngoặt đấy.\nTôi đánh giá rất cao Soutetsu đấy nhé?」"
# monologue
# JP: 稀咲も、同様。\nにっと、その目の端が微笑む。
3101 = "Kisaki cũng vậy.\nCô khẽ mỉm cười nơi khóe mắt."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄一人ではどうしたって産み出せない勢いと柔軟さ。\n構想を提案されたとき、ボクは、それを感じた」
1818 = "「Khí thế và sự linh hoạt mà một mình Soutetsu dù thế nào cũng không thể tạo ra được.\nKhi được đề xuất ý tưởng, tôi đã cảm nhận được điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……一人が点なら、ふたりは線。\n三人なら、線から面を描けます」
1400 = "「......Một người là điểm, hai người là đoạn thẳng.\nBa người thì, từ đoạn thẳng có thể vẽ thành mặt phẳng.」"
# monologue
# JP: 稀咲の言葉が、イメージを強化してくれる。\nそういうことかと、言葉に理解が追いついていく。
3102 = "Lời của Kisaki củng cố thêm hình ảnh trong đầu tôi.\nSự thấu hiểu dần bắt kịp với những lời nói, ra là vậy sao."
# 【双鉄】
# display as 雙鐵
# JP: 「面から広がる繋がりは、空間を、立体さえを描きます。\n僕ら三人は、そうした広がりの、一つの核となれたかと」
2193 = "「Sự kết nối lan rộng từ mặt phẳng, sẽ vẽ nên không gian, thậm chí là khối lập thể.\nBa người chúng cháu, có lẽ đã trở thành một hạt nhân của sự lan rộng đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど、面白い解釈だ。確かにキミたち三人は、\nビジネス面でもユニークで効果的なユニットと感じるね」
2070 = "「Ra là vậy, một cách giải thích thú vị. Quả thực ba người các cậu,\ntrong kinh doanh cũng mang lại cảm giác là một tổ hợp độc đáo và hiệu quả đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうした評価もとても嬉しい、ありがとう」
2217 = "「Nhận được đánh giá như vậy tôi cũng rất vui, cảm ơn cô.」"
# 【稀咲】
# display as 稀咲
# JP: 「お世辞じゃないんだ。礼は不要だよ？　双鉄。\nビジネスに関してボクは、事実しか口にしないから」
2228 = "「Không phải nịnh bợ đâu. Không cần cảm ơn đâu nhé? Soutetsu.\nVề kinh doanh, tôi chỉ nói sự thật thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「であれば余計に、深い感謝を覚えるよ」
2545 = "「Nếu vậy thì lại càng phải cảm ơn sâu sắc hơn nữa chứ.」"
# monologue
# JP: 補いあい、成長を促しあえたから。\nお互いがお互いを、常に刺激しあえたから、結果を出せた。
2739 = "Vì đã bù đắp cho nhau, thúc đẩy nhau cùng phát triển.\nVì chúng tôi luôn kích thích lẫn nhau, nên mới tạo ra được kết quả."
# monologue
# JP: そうしたことは、もちろんとても重要だ。\nけれど、僕とって、一番かけがえのないものは――
3194 = "Những điều đó, tất nhiên là rất quan trọng.\nNhưng, đối với tôi, điều không thể thay thế nhất là――"
# 【双鉄】
# display as 雙鐵
# JP: 「ですが、ビジネス面での効果を求めて、\n三人でずっといたい、と願っているわけではありません」
1830 = "「Nhưng mà, cháu không phải vì mưu cầu hiệu quả kinh doanh,\nmà mong muốn được ở bên ba người mãi mãi đâu ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら――どのような理由で、でしょうか？」
2547 = "「Nếu vậy thì――là vì lý do gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「三人でいると、とても楽しい。どんな困難にあたっても、\n三人ならば、それを楽しみに変えてしまえる」
2249 = "「Ở bên nhau ba người, rất vui. Dù gặp phải khó khăn gì,\nnếu là ba người, thì có thể biến nó thành niềm vui.」"
# 【凪】
# display as 凪
# JP: 「にへっ！」
2075 = "「Nihe!」"
# monologue
# JP: 話の邪魔にならぬよう――そう考えてのことだろう。\n沈黙し続けている凪は、思わずといった感じの笑いを零す。
2808 = "Để không làm phiền câu chuyện――chắc em ấy nghĩ vậy.\nNagi, người nãy giờ vẫn giữ im lặng, bất giác bật cười."
# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1391 = "「……」" 
# monologue
# JP: ふかみは変わらず静かなままで、けれどもそうっと、\nこっそりと、僕の服の端をつまむ。
3044 = "Fukami vẫn im lặng như cũ, nhưng nhè nhẹ,\nlén lút, túm lấy vạt áo tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ただ、離れたくないんです。居心地がよくて幸福だから。\nこの関係を、僕は一生の宝にしたいし、守りたい」
2250 = "「Chỉ là, cháu không muốn rời xa. Vì ở bên nhau rất thoải mái và hạnh phúc.\nMối quan hệ này, cháu muốn biến nó thành báu vật cả đời, và muốn bảo vệ nó.」"
# monologue
# JP: 三人、いっしょだ。\nならばもう何も怖くない。
2848 = "Ba người, cùng nhau.\nVậy thì chẳng còn sợ hãi điều gì nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ずっと三人でいられるように、この提案を\n考えました――新しい家族の形を増やす、提案を」
2281 = "「Thế nên, để có thể ở bên nhau ba người mãi mãi, cháu đã suy nghĩ\nvề đề xuất này――đề xuất gia tăng thêm một hình thái gia đình mới.」"
# 【日々姫】
# display as 日日姬
# JP: 「――はいっ！」
1411 = "「――Vâng!」"
# monologue
# JP: 話の区切りに、ほんのすこしの間をおいて、日々姫の挙手。\n少し意外な気もするが、他に手を挙げる者もない。
3172 = "Lúc câu chuyện tạm dừng, sau một khoảng lặng ngắn, Hibiki giơ tay.\nTôi cảm thấy hơi bất ngờ, nhưng cũng không có ai khác giơ tay."
# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、日々姫」
1860 = "「Xin mời, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「新しい家族の形って――今までの家族の枠組みじゃ、\n実現できないもの……なんですか？」
2298 = "「Hình thái gia đình mới ấy――với khuôn khổ gia đình từ trước đến nay,\nlà thứ không thể......thực hiện được sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「旧来の家族制度は、男女を夫婦とし、夫婦が子を為す。\nそうあることを前提としている、家族制度だ」
2474 = "「Chế độ gia đình cũ, nam nữ làm vợ chồng, vợ chồng sinh con.\nĐó là chế độ gia đình lấy điều đó làm tiền đề.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「……そいば、ごくごく自然なことかと思いますがのう」
1407 = "「......Cái đó, tôi nghĩ là một chuyện hết sức tự nhiên mà.」"
# monologue
# JP: 蓑笠老人の、年輪の深みを感じさせる声。\n答える僕の背筋も自然と伸ばされる。
3120 = "Giọng nói mang đậm dấu ấn thời gian của ông Minokasa.\nKhiến sống lưng tôi tự nhiên thẳng lên khi trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「なのであろうと思います。ですので僕も、\nその基本形に触れるつもりは、一切ありません」
2239 = "「Cháu cũng nghĩ là như vậy. Vì thế cháu cũng,\nhoàn toàn không có ý định đụng chạm đến hình thái cơ bản đó.」"
# monologue
# JP: 言えば、ポーレットと稀咲とが同時に頷く。\n――旧来の家族制度を否定したなら、成立しない。
3171 = "Vừa dứt lời, Paulette và Kisaki đồng thời gật đầu.\n――Nếu phủ định chế độ gia đình cũ, thì sẽ không thể thành lập được."
# monologue
# JP: その認識は、ふたりもやはりまず真っ先に\n思ってくれたことなのだろう。
3073 = "Nhận thức đó, quả nhiên cũng là điều\nmà hai người họ đã nghĩ đến đầu tiên."
# 【双鉄】
# display as 雙鐵
# JP: 「ですが今は、生物学的な意味での『自然』から外れた\n――そういう共同体も、増加している時代かと感じます」
1833 = "「Nhưng hiện nay, đã chệch ra khỏi 'tự nhiên' theo nghĩa sinh học\n――cháu cảm thấy đây là thời đại mà những cộng đồng như thế cũng đang gia tăng.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「と、いうんは……」
2520 = "「Nghĩa là......」"
# 【双鉄】
# display as 雙鐵
# JP: 「同性愛の方々もそうであると想像しますし、\n相互を保護し合う、という共同体もあるかと思います」
1979 = "「Cháu tưởng tượng những người đồng tính luyến ái cũng vậy,\nvà cháu nghĩ cũng có những cộng đồng mang tính chất bảo vệ lẫn nhau.」"
# 【堰】
# display as 堰
# JP: 「保護し合う、ちゅうのは、どないな形かのぉ？」
2210 = "「Bảo vệ lẫn nhau, nghĩa là hình thức như thế nào nhỉ?」"
# monologue
# JP: 堰さんも、話に入って来てくれる。
2888 = "Ông Seki cũng tham gia vào câu chuyện."
# monologue
# JP: どなたが相手であろうとも、\n僕はただ、真摯に思いを、僕らの考えを伝えるだけだ。
2729 = "Dù đối phương là ai,\ntôi cũng chỉ chân thành truyền đạt suy nghĩ, ý tưởng của chúng tôi mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、何らかの理由で伴侶を失くした単身者同士が、\nお互いの生活を支え合うことを目的に、共同生活をする」
2368 = "「Ví dụ như, những người độc thân mất đi bạn đời vì một lý do nào đó,\nsống chung với mục đích hỗ trợ cuộc sống của nhau.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「それは……男と男、女と女で、いうことですかのう」
1856 = "「Đó là......giữa đàn ông với đàn ông, phụ nữ với phụ nữ, ý cậu là vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「同性同士のこともありましょうし、異性間のことも、\n複数人での共同生活、ということもあるでしょう」
1961 = "「Cũng có thể là giữa những người cùng giới, hoặc khác giới,\nhay là cuộc sống chung của nhiều người.」"
# 【日々姫】
# display as 日日姬
# JP: 「いわゆる――シェアハウス――あ！　違うか、\nシェルター的？　な感じ？？」
2165 = "「Cái gọi là――nhà chung――a! Không phải sao,\nkiểu như nơi trú ẩn? Cảm giác vậy hả??」"
# 【双鉄】
# display as 雙鐵
# JP: 「も、あるかと想定している」
1800 = "「Anh cũng cho là có những trường hợp như thế.」"
# 【堰】
# display as 堰
# JP: 「ああ――\nそりゃあ、都会の方ではあるかもしれんが――」
2077 = "「A――\nChuyện đó thì, ở trên thành phố có lẽ cũng có nhưng mà――」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜にもあるんですよ。そういうご相談、最近は」
2196 = "「Ở Ohito cũng có đấy ạ. Những lời nhờ tư vấn như vậy, dạo gần đây.」"
# monologue
# JP: 堰さんの『理解できん』といわんばかりの嘆息を、\nポーレットが静かに受け止めてくれる。
2892 = "Tiếng thở dài như muốn nói 'không thể hiểu nổi' của ông Seki,\nđã được Paulette nhẹ nhàng tiếp nhận."
# 【ポーレット】
# display as 波萊特
# JP: 「そういう共同生活を始めようとして。けど、不動産屋が\n物件を貸してくれない――みたいな話。時々あります」
2486 = "「Họ định bắt đầu cuộc sống chung như vậy. Nhưng mà, công ty bất động sản\nlại không cho thuê nhà――những chuyện đại loại thế. Thỉnh thoảng cũng có ạ.」"
# 【堰】
# display as 堰
# JP: 「ほう。こげな田舎にもですか」
2080 = "「Ồ. Ở vùng quê thế này mà cũng có sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「インターネットが発展し、個人が情報発信し、それが\n拡散され共有されるようになった影響かと思います」
2515 = "「Cháu nghĩ đó là ảnh hưởng của việc Internet phát triển, cá nhân tự phát tán thông tin, và những thông tin đó\nđược lan truyền và chia sẻ rộng rãi.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね」
2334 = "「Chắc là vậy rồi.」"
# monologue
# JP: 稀咲が、ふっと遠い目をする。
3104 = "Kisaki chợt nhìn xăm xăm về phía xa."
# 【稀咲】
# display as 稀咲
# JP: 「こういう生き方もある。それが許容される社会がある。\n――孤立が深く色濃いほど、先例は眩しく映ろうからね」
1967 = "「Cũng có những cách sống như thế này. Có những xã hội chấp nhận điều đó.\n――Sự cô lập càng sâu sắc, thì những tiền lệ đi trước sẽ càng phản chiếu chói lọi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、その“先例”が有名になるほど広がるのは――\n実はその先例が、めちゃくちゃレアだから……よね？」
1835 = "「Nhưng mà, những 'tiền lệ' đó lan truyền đến mức nổi tiếng――\nThực ra là vì những tiền lệ đó cực kỳ hiếm có......phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指摘のとおりだと、僕も思う」
2303 = "「Anh cũng nghĩ đúng như Hibiki chỉ ra.」"
# monologue
# JP: 幾重にも助けられ、守られている、\nその実感が、さらなる言葉を押し出していく。
2907 = "Cảm giác được giúp đỡ, được bảo vệ tầng tầng lớp lớp,\nthúc đẩy những lời nói tiếp theo tuôn trào."
# 【双鉄】
# display as 雙鐵
# JP: 「希望とともに踏み出す。けれどそこには何の保証も無い。\nどころか、社会的な不利益を被るケースさえも多い」
2562 = "「Bước tới cùng với hy vọng. Nhưng ở đó chẳng có sự đảm bảo nào cả.\nThậm chí, còn có rất nhiều trường hợp phải gánh chịu những bất lợi mang tính xã hội.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ふーむ」
2034 = "「Hừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、凪にも、ふかみにも。\nそのような不自由な思いや苦労を、させたくないのです」
2227 = "「Cháu, với Nagi, hay với Fukami cũng vậy.\nĐều không muốn để hai em ấy phải chịu đựng sự gò bó hay vất vả như thế.」"
# monologue
# JP: 蓑笠老人も、堰さんも、じっと黙って僕を見る。\n僕の話に、耳を傾けてくれている。
3138 = "Cả ông Minokasa và ông Seki đều im lặng nhìn tôi.\nHọ đang lắng nghe những gì tôi nói."
# 【双鉄】
# display as 雙鐵
# JP: 「だから新しい家族の形を。異性同士一対一の婚姻以外の\n形でも結べる家族契約を。立法化したいと思っています」
2283 = "「Vì vậy, một hình thái gia đình mới. Một hợp đồng gia đình có thể kết nối dưới hình thức khác\nngoài hôn nhân một vợ một chồng khác giới. Cháu muốn lập pháp hóa điều đó.」"
# 【真闇】
# display as 真闇
# JP: 「立法化――」
2439 = "「Lập pháp hóa――」"
# monologue
# JP: ここにきて、ついに真闇姉が声を漏らす。\nただそれだけで、全員の目線が集中する。
3121 = "Đến đây, cuối cùng chị Mayami cũng cất tiếng.\nChỉ bấy nhiêu thôi, ánh mắt của tất cả mọi người đều đổ dồn vào chị."
# monologue
# JP: 堰さんが、蓑笠さんが、真闇姉に向かって会釈する。\n困ったような笑みで頷き、真闇姉が僕に問うてくる。
2891 = "Ông Seki, ông Minokasa, cúi đầu chào chị Mayami.\nGật đầu với nụ cười như có vẻ bối rối, chị Mayami hỏi tôi."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。\n立法化いうんは、そぎゃんと簡単にできゆうものや？」
2271 = "「Này? Sou-chan.\nLập pháp hóa ấy, là chuyện có thể làm dễ dàng thế sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこは、今はまだ精査していない。が――\n国会で成立する法案は、殆どが内閣による提出と聞く」
2516 = "「Chuyện đó, hiện tại em vẫn chưa xem xét kỹ lưỡng. Nhưng mà――\nNghe nói các dự luật được thông qua tại Quốc hội, hầu hết đều do Nội các đệ trình.」"
# 【真闇】
# display as 真闇
# JP: 「内閣によって法案提出してもらう――そいば、\nハードルがとてつもなく高そうな話に思うとやけど」
2216 = "「Nhờ Nội các đệ trình dự luật――cái đó,\nchị nghĩ là một rào cản cao khủng khiếp đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、確かに。ので、社会的な機運を盛り上げ、\n必要性を認知して貰っての、議員立法でと考えている」
2329 = "「Điều đó, quả thực là vậy. Vì thế, em đang nghĩ đến việc lập pháp do nghị sĩ đệ trình,\nsau khi dấy lên làn sóng xã hội và được công nhận về sự cần thiết.」"
# 【真闇】
# display as 真闇
# JP: 「議員立法……国会議員さんが法案ば提出する――\nゆう理解でよかと？」
2491 = "「Lập pháp do nghị sĩ đệ trình......nghị sĩ Quốc hội đệ trình dự luật――\nhiểu vậy là đúng chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、認識しているが――\n確認を頼んでもよいか？　ポーレット」
2290 = "「Em cũng hiểu là vậy nhưng――\nCó thể nhờ cậu xác nhận lại không? Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その認識で問題無いです。地元選出の国会議員の\n先生になら、わたしもパイプ、あるにはあります」
2378 = "「Hiểu như vậy là không có vấn đề gì. Nếu là nghị sĩ Quốc hội được bầu tại địa phương,\nthì tôi cũng có đường dây liên lạc đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2078 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど。ご相談してすぐに、理解を得るのは\n難しいって思います。やっぱり、お年を召した方ですし」
1825 = "「Nhưng mà. Tôi nghĩ rất khó để có được sự thấu hiểu\nngay sau khi bàn bạc. Quả thực, họ cũng là những người lớn tuổi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その理解を得るために、僕は行動したいのだ」
2258 = "「Để có được sự thấu hiểu đó, tôi muốn hành động.」"
# monologue
# JP: 困難があることなどは、わかりきっている。
2982 = "Việc gặp khó khăn là điều đã quá rõ ràng."
# monologue
# JP: が、ふかみと凪がいてくれるなら、\n凪とふかみのためならば――喜んでそれに立ち向かおう。
2746 = "Nhưng, nếu có Fukami và Nagi ở bên,\nnếu là vì Nagi và Fukami――tôi sẵn lòng đương đầu với nó."
# 【双鉄】
# display as 雙鐵
# JP: 「男女一対一の夫婦。それが家族・社会の基本形である\nことに異論はないですし、保護されることにも賛成です」
1760 = "「Vợ chồng một nam một nữ. Cháu không có ý kiến phản đối việc đó là hình thái cơ bản\ncủa gia đình và xã hội, và cháu cũng tán thành việc nó được bảo vệ.」"
# monologue
# JP: そこは何度でも繰り返す。
2958 = "Điều đó tôi sẽ lặp lại bao nhiêu lần cũng được."
# monologue
# JP: 夫婦を否定することは、この国の歴史と現状の、\nほとんど全てを否定すること――受け入れられる筈もない。
2859 = "Phủ định quan hệ vợ chồng, đồng nghĩa với việc phủ định gần như toàn bộ\nlịch sử và hiện trạng của đất nước này――chắc chắn sẽ không được chấp nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうでない形の家族の形成も許してほしい。\n保護までは望みませんが、不利益を回避させて欲しい」
1832 = "「Tuy nhiên, cháu mong muốn việc hình thành những gia đình không theo khuôn mẫu đó cũng được cho phép.\nCháu không mong đến mức được bảo vệ, nhưng mong được tạo điều kiện để tránh những bất lợi.」"
# 【真闇】
# display as 真闇
# JP: 「『不利益を回避する』ことも、また利益。\n――そぎゃんこつ、双ちゃんなら当然理解しとるよねぇ」
2469 = "「'Tránh được bất lợi' cũng là một loại lợi ích.\n――Chuyện đó, Sou-chan chắc chắn phải hiểu rõ rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、無論だ」
2412 = "「Tất nhiên rồi.」"
# monologue
# JP: からの財布に一万円が入ることが利益であるのと、\n一万円の借金が帳消しになることとは変わらない。
3028 = "Việc có thêm một vạn yên vào chiếc ví rỗng là một lợi ích,\ncũng chẳng khác gì việc được xóa nợ một vạn yên."
# monologue
# JP: どちらも等しく、一万円の利益を得ている。
2773 = "Cả hai đều tương đương nhau, đều thu được lợi ích một vạn yên."
# 【真闇】
# display as 真闇
# JP: 「やったら、そん『不利益の回避』を得るため、\n偽装やらなんやらが、横行してしまいそうやけど」
2551 = "「Nếu vậy, để có được 'sự tránh né bất lợi' đó,\nnhững trò ngụy tạo hay gì gì đó, có vẻ sẽ tràn lan mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは結婚も同じだろう。偽装結婚を防止するため、\n婚姻届があり、提出時の身分証提示がある」
2446 = "「Điều đó thì kết hôn cũng giống vậy thôi. Để ngăn chặn kết hôn giả,\nmới có giấy đăng ký kết hôn, và yêu cầu xuất trình giấy tờ tùy thân khi nộp.」"
# 【ポーレット】
# display as 波萊特
# JP: 「婚姻より、もっと条件を厳しくてもいいと思います。\nその方がきっと、実現化のハードルは低くなる」
1956 = "「Tôi nghĩ điều kiện có thể khắt khe hơn cả kết hôn cũng được.\nNhư vậy chắc chắn rào cản để hiện thực hóa sẽ thấp hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと？」
# 2520 = "「這話怎麼說？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「例えば、15歳未満の児童を養子に引き取るときと同じく、\n家庭裁判所への申し立てと許可取得とを必須にするとか」
2366 = "「Ví dụ như, giống với khi nhận nuôi trẻ em dưới 15 tuổi làm con nuôi,\nbắt buộc phải nộp đơn lên Tòa án gia đình và được cấp phép chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。確かに、その方が申請者の真剣味も問われような。\n僕の立場としては、望むところ――ああ」
2036 = "「Hừm. Quả thực, làm vậy sẽ đòi hỏi sự nghiêm túc của người nộp đơn hơn.\nĐứng trên lập trường của tôi, đó chính là điều tôi mong muốn――a.」"
# monologue
# JP: 持つべきものは、友人だ。\nポーレットの言葉が僕に、気付きをくれる。
3018 = "Quả nhiên có bạn bè là tốt nhất.\nLời của Paulette đã gợi cho tôi một sự nhận thức."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　なにか不都合でも」
2572 = "「Soutetsu? Có điều gì bất tiện sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、逆だ。制限の厳しさが早期実現に繋がるのなら、\n『特区申請』はどうかと思った」
1788 = "「Không, ngược lại. Nếu sự hạn chế nghiêm ngặt có thể dẫn đến việc hiện thực hóa sớm,\nthì tôi nghĩ 'Đăng ký Đặc khu' thì sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「とっくしんせー？」
2179 = "「Đăng ký Đặc khu~?」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫、それはね？　ん――と」
2306 = "「Hibiki, cái đó ấy hả? Ừm――thì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「社会的情勢の変化に対応するため、地域活性化に関する\n施策を、特定地域で集中的に推進する。それが特区です」
2391 = "「Để ứng phó với sự thay đổi của tình hình xã hội, các chính sách liên quan đến việc\nhồi sinh khu vực sẽ được tập trung thúc đẩy ở một khu vực nhất định. Đó là Đặc khu.」"
# monologue
# JP: 餅は餅屋。
2934 = "Trăm hay không bằng tay quen."
# monologue
# JP: 稀咲が説明の言葉を探した一瞬に、\nポーレットは至極明快に、特区が何かを説明しつくす。
3106 = "Trong khoảnh khắc Kisaki tìm kiếm từ ngữ để giải thích,\nPaulette đã giải thích cặn kẽ Đặc khu là gì một cách cực kỳ rõ ràng."
# 【日々姫】
# display as 日日姬
# JP: 「あー、なるほど！　じゃあ、『新しい生き方特区』とか\n『新しい家族の形特区』みたいなのを、御一夜に？」
2041 = "「A, ra là vậy! Vậy thì, kiểu như 'Đặc khu Lối sống mới' hay\n'Đặc khu Hình thái Gia đình mới' ở Ohito sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「新しい生き方特区――」
2296 = "「Đặc khu Lối sống mới――」"
# monologue
# JP: 日々姫の言葉がキィンと響く。\nまさしく、それだ。
3008 = "Lời của Hibiki vang vọng trong tâm trí tôi.\nChính xác, là nó đấy."
# monologue
# JP: 新しい生き方――新しい暮らし――新しい家族の形。\n僕たちが求めるものは、その言葉にこそ落ち着こう。
3001 = "Lối sống mới――cuộc sống mới――hình thái gia đình mới.\nNhững gì chúng tôi tìm kiếm, sẽ được đúc kết trọn vẹn trong chính cụm từ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕としてはそう願いたい。\n無論これは、単なる僕の、個人的な願望にすぎぬがな」
2064 = "「Ừm. Đứng trên lập trường của mình, anh mong muốn như vậy.\nTất nhiên, đây chỉ đơn thuần là nguyện vọng cá nhân của riêng anh thôi.」"
# 【凪】
# display as 凪＆深美
# JP: 「個人的じゃなかと！！」\n「個人的じゃないです！！」
2286 = "「Không phải của riêng anh đâu!!」\n「Không phải của cá nhân anh đâu ạ!!」"
# monologue
# JP: ずうっと沈黙を守っていた、\n僕を信じて、全てを任せてくれていた――
2718 = "Hai người nãy giờ vẫn luôn giữ im lặng,\ntin tưởng và giao phó tất cả cho tôi――"
# monologue
# JP: ふかみが、凪が、\n思いのたけを、ほとばしらせる。
3110 = "Fukami, và Nagi,\nđã bộc bạch hết những tâm tư của mình."
# 【ふかみ】
# display as 深美
# JP: 「わたしも、こころから願ってます。\n双鉄おにいさんと凪ちゃんと、ずっと一緒にいたいって」
2231 = "「Em cũng, thật lòng mong muốn như vậy.\nMuốn được ở bên cạnh anh Soutetsu và Nagi mãi mãi.」"
# 【凪】
# display as 凪
# JP: 「ウチも！　やけん、ふかみちゃんがお嫁にいって、\n凪さまはくっついとる形でもよかとって思うたばい」
1996 = "「Em cũng vậy! Nên là, em đã nghĩ bé Fukami làm cô dâu,\ncòn Nagi thì cứ bám theo hai người cũng được mà.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「凪！　お前はなんちゅうアホなことを」
1913 = "「Nagi! Cháu đang nói cái chuyện ngốc nghếch gì thế.」"
# 【凪】
# display as 凪
# JP: 「にーさんにもそぎゃんと叱られたばい！　にーさんは、\nウチもふかみちゃんも、一緒に幸せにしたかとばい！」
2096 = "「Cháu cũng bị anh Soutetsu mắng y chang vậy đó! Anh Soutetsu,\nmuốn mang lại hạnh phúc cho cả cháu và bé Fukami mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪、それは違う」
1916 = "「Nagi, không phải vậy đâu.」"
# 【凪】
# display as 凪
# JP: 「ああ！」
2058 = "「A!」"
# monologue
# JP: にかーっと、凪は満面の笑み。\n言うまでもなくわかってもらえた――それが、嬉しい。
2826 = "Nagi cười tươi rạng rỡ.\nKhông cần nói ra em ấy cũng hiểu được――điều đó, làm tôi rất vui."
# 【凪】
# display as 凪
# JP: 「訂正ばい！　にーさんは、ウチとふかみちゃんと！\nいっしょにしあわせになりたかとばい！！」
2011 = "「Cháu đính chính! Anh Soutetsu muốn, cùng với cháu và bé Fukami!\nCả ba người cùng nhau trở nên hạnh phúc!!」"
# 【ふかみ】
# display as 深美
# JP: 「気持ち。わたしも一緒。です。どんな苦労があったって。\n三人で、誰も悲しい思いをしないで、一緒に、幸せに」
2235 = "「Tâm ý. Em cũng giống vậy. Ạ. Dù có khó khăn gian khổ thế nào.\nBa người chúng ta, sẽ không để ai phải buồn đau, cùng nhau, hạnh phúc.」"
# 【凪】
# display as 凪
# JP: 「ウチもまるきり、ごっそりおんなじ気持ちばーい！」
1995 = "「Mình cũng hoàn toàn, nhất nhất có chung suy nghĩ đó nha!」"
# 【れいな】
# display as 玲奈
# JP: 「いいですねぇ。うらやましいですぅ！\nれいな、応援しちゃいまぁす！！」
2423 = "「Thích thật đấy. Ghen tị quá đi mất~!\nReina, sẽ cổ vũ cho mọi người nha!!」"
# monologue
# JP: ぽかんと、無邪気なれいなの声。
3064 = "Giọng nói ngây thơ, vô tư của Reina vang lên."
# monologue
# JP: 堰さんはれいなを優しく眺め――\nその目のままで、僕をみる。
2895 = "Ông Seki dịu dàng nhìn Reina――\nRồi giữ nguyên ánh mắt đó, nhìn tôi."
# 【堰】
# display as 堰
# JP: 「[みどり]翠は――あれは運の無い娘でのぉ。\nふかみもそれを継ぐんじゃないかと、わしぁ心配で」
2456 = "「Midori――con bé đó là một người không có may mắn.\nÔng chỉ lo, Fukami cũng sẽ nối gót theo con bé.」"
# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんっ」
2402 = "「Ông nội.」"
# 【堰】
# display as 堰
# JP: 「止めて止まる気性じゃあなかけん。\n修学旅行やらも、諦めて送り出したもんじゃったが――」
2124 = "「Tính tình con bé không phải cản là dừng được.\nChuyến đi dã ngoại gì đó, ông cũng đành từ bỏ mà để nó đi, nhưng――」"
# monologue
# JP: 堰さんの目が、引き締まる。
2893 = "Ánh mắt ông Seki trở nên nghiêm nghị."
# 【堰】
# display as 堰
# JP: 「ひとつだけ。聞いてもいいかの、双鉄」
2265 = "「Chỉ một điều thôi. Ông hỏi được chứ, Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんです。何なりと」
2417 = "「Tất nhiên rồi ạ. Bất cứ điều gì.」"
# 【堰】
# display as 堰
# JP: 「双鉄にとって、ワシらの可愛い孫娘は――\nふかみは、いったいどぎゃんと存在じゃ」
2086 = "「Đối với Soutetsu, đứa cháu gái đáng yêu của chúng tôi――\nFukami, rốt cuộc là sự tồn tại như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大好きな人で、守るべき相手で、大事な先輩で、\n可愛い後輩で、妹で、けれど時として姉で、仲間で」
2323 = "「Là người cháu rất yêu, là người cháu phải bảo vệ, là tiền bối quan trọng,\nlà hậu bối dễ thương, là em gái, nhưng đôi khi lại là chị gái, là đồng đội.」"
# monologue
# JP: 言った端から、言葉が、想いが湧き出してくる。\n連鎖していく。
2919 = "Vừa dứt lời, những ngôn từ, những tâm tư cứ thế tuôn trào.\nLiên kết thành một chuỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「恋人で、親友で、相棒で、甘えさせたくて、\n甘えたくて、離したくなくて、見守りたくもある」
2327 = "「Là người yêu, là bạn thân, là cộng sự, là người cháu muốn chiều chuộng,\nmuốn được làm nũng, không muốn rời xa, và cũng muốn dõi theo bảo vệ.」"
# monologue
# JP: 言葉が、想いを際立てていく。\nこれほどにふかみが凪が大切なのだと、自分で驚く。
3164 = "Lời nói, làm nổi bật lên những tâm tư.\nChính tôi cũng ngạc nhiên khi nhận ra Fukami và Nagi lại quan trọng đến nhường này."
# 【双鉄】
# display as 雙鐵
# JP: 「どれほど言葉を尽くしても、語り尽くせぬ存在です。\nだから、ふたりをもっと知りたい。一緒にいたい」
1779 = "「Dù có dùng bao nhiêu từ ngữ, cũng không thể diễn tả hết sự tồn tại ấy.\nVì vậy, cháu muốn hiểu thêm về hai người. Muốn được ở bên nhau.」"
# 【堰】
# display as 堰
# JP: 「ふたり。\nわしゃあ、ウチの孫について聞いたとじゃがの」
2122 = "「Hai người.\nÔng là ông đang hỏi về cháu gái của ông đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、ですが」
2338 = "「Vâng, nhưng mà.」"
# 【堰】
# display as 堰
# JP: 「はっは！　よかよか。まぁ、ふかみも翠と、\n苦労ば多そうな点は、代わり映えしなさそうじゃがのう」
2020 = "「Haha! Được rồi được rồi. Chà, Fukami với Midori,\ncó vẻ điểm giống nhau là đều mang số vất vả nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「もう！　おじいちゃんってば」
2403 = "「Thiệt tình! Ông nội kỳ quá.」"
# 【堰】
# display as 堰
# JP: 「じゃが、伴侶を見つける目だけは、翠以上じゃの。\nお前の選んだ家族は、最高のふたりじゃぞ、ふかみ」
1785 = "「Nhưng mà, riêng khoản nhìn người chọn bạn đời thì còn hơn cả Midori đấy.\nGia đình mà cháu chọn, là hai người tuyệt vời nhất đó, Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんっ」
# 2402 = "「爺爺」" 
# 【堰】
# display as 堰
# JP: 「ふかみや」
2388 = "「Fukami à.」"
# monologue
# JP: ふかみが、飛びつく。\n堰さんが優しく受け止める。
3049 = "Fukami lao đến ôm chầm lấy ông.\nÔng Seki dịu dàng đỡ lấy cô bé."
# 【凪】
# display as 凪
# JP: 「ほあー」
# 2014 = "「哇」" 
# monologue
# JP: それを見て、凪はなんとも羨ましそうなため息を――
2823 = "Thấy cảnh đó, Nagi thở dài một cái đầy vẻ ghen tị――"
# 【凪】
# display as 凪
# JP: 「じいちゃん！　じいちゃんもいって！\nなんかよかこと！！！　よかこといって！」
2404 = "「Ông nội! Ông nội cũng nói gì đi chứ!\nNói câu gì hay hay ấy!!! Câu gì hay hay ấy!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんいい方されたら、\nかえって何もいわれんようになるわ」
2461 = "「Cháu nói thế thì,\nông lại chẳng biết nói gì nữa rồi.」"
# 【凪】
# display as 凪
# JP: 「えーっ」
1773 = "「Ể~」"
# monologue
# JP: ぷうっと、凪の頬がふくれる。\n蓑笠さんの目が細まる。
2820 = "Nagi phồng má hờn dỗi.\nĐôi mắt ông Minokasa híp lại."
# 【蓑笠】
# display as 蓑笠
# JP: 「……まぁ、ワシの言いたかことは、\n修学旅行うんぬんのときに、もう言うてあるけん」
1405 = "「......Chà, những gì ông muốn nói,\nlúc bàn chuyện chuyến đi dã ngoại gì gì đó, ông đã nói hết rồi.」"
# 【凪】
# display as 凪
# JP: 「えっと――『双鉄くんは、ありゃあ良か男じゃ。\n凪が信じてついていくなら、ついていけばよか』」
2010 = "「À thì――'Soutetsu là một chàng trai tốt.\nNếu Nagi đã tin tưởng đi theo, thì cứ đi theo là được'.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なっ！」
2038 = "「Á!」"
# 【凪】
# display as 凪
# JP: 「『ばってん。裏切られたと、傷ついたと感じた時にゃあ、\nこん家に、じいちゃんのとこに、いつでん帰って来い』」
1387 = "「'Cơ mà. Những lúc cảm thấy bị phản bội, bị tổn thương,\nthì cứ về lại ngôi nhà này, về với ông nội bất cứ lúc nào'.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「凪……覚えとって、くれたとか」
1898 = "「Nagi......cháu vẫn còn nhớ, sao.」"
# 【凪】
# display as 凪
# JP: 「もちろんばい！　大事なこと！　って思うたけんね！\n大事でなさそーなことは、すぐ忘れちゃうばってん」
2414 = "「Tất nhiên rồi! Cháu nghĩ đó là! Chuyện quan trọng mà!\nCòn những chuyện có vẻ không quan trọng thì cháu quên ngay lập tức thôi.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なら、よか。ワシん気持ちも、婆さんの気持ちも、\nセガレらの気持ちも、少しもかわっとらんきに」
2530 = "「Vậy thì, tốt rồi. Tâm ý của ông, tâm ý của bà nội,\nhay tâm ý của mấy đứa con trai ông, đều không thay đổi một chút nào cả.」"
# monologue
# JP: 蓑笠老人のくしゃくしゃの手が、\n凪の髪の毛を不器用に撫でる。
3139 = "Bàn tay nhăn nheo của ông Minokasa,\nvụng về xoa mái tóc Nagi."
# monologue
# JP: 子猫のように目を細め――そうして、腕の動きが止まれば、凪はぱっと、一歩を踏み出す。
2807 = "Nagi nheo mắt lại như một chú mèo con――Rồi khi cánh tay ấy dừng lại, Nagi thoắt cái bước lên một bước."
# 【凪】
# display as 凪
# JP: 「ほいじゃじーちゃん！　ウチ、\nにーさんとふかみちゃんと、楽しくやるけん！」
2552 = "「Vậy nha ông nội! Cháu,\nsẽ sống thật vui vẻ cùng anh Soutetsu và bé Fukami!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄くん。凪んことば、どうぞよろしくお願いします」
2571 = "「Cậu Soutetsu. Chuyện của Nagi, trăm sự nhờ cậu nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この身に代えても。必ず大事に、幸せにします」
1959 = "「Dù có phải đánh đổi thân này. Cháu nhất định sẽ trân trọng, và mang lại hạnh phúc cho em ấy.」"
# 【堰】
# display as 堰
# JP: 「ふかみのことば、任せるけぇのぉ」
2389 = "「Chuyện của Fukami, giao cho cậu đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。必ず大事に、幸せにします」
2488 = "「Cháu cảm ơn ông. Cháu nhất định sẽ trân trọng, và mang lại hạnh phúc cho em ấy.」"
# 【凪】
# display as 凪
# JP: 「で！　にーさん！　ウチら、何ばしよればよかと？」
2550 = "「Vậy! Anh Soutetsu! Bọn em, nên làm gì đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことなのだがポーレット」
1859 = "「Tình hình là vậy đấy, Paulette.」"
# monologue
# JP: 言って、急に不安になる。
3170 = "Vừa dứt lời, tôi bỗng thấy bất an."
# monologue
# JP: 特区化構想。\n僕らだけで、勝手に盛り上がってしまったが――
3195 = "Ý tưởng Đặc khu hóa.\nChúng tôi chỉ tự tiện hào hứng với nhau, nhưng mà――"
# 【ポーレット】
# display as 波萊特
# JP: 「普段どおりに。明るく元気に、幸せに。\n双鉄くんたちは、モデルケースになってください」
1870 = "「Cứ như bình thường thôi. Vui vẻ, khỏe mạnh và hạnh phúc.\nNhóm cậu Soutetsu, hãy trở thành trường hợp kiểu mẫu nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「モデルケース？」
2360 = "「Trường hợp kiểu mẫu?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。双鉄くんたちの姿をみて、みんなが、\n『彼らが家族になれないのはおかしい』って思う位に」
2332 = "「Đúng vậy. Để khi nhìn vào hình ảnh của nhóm cậu Soutetsu, mọi người sẽ nghĩ rằng\n'Bọn họ không thể trở thành gia đình thì thật kỳ lạ'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。というか――それは、つまりは――\n特区を目指してくれるのか！」
2131 = "「Đã hiểu. Hay nói đúng hơn――vậy, tức là――\nCậu sẽ hướng tới việc thành lập Đặc khu sao!」"
# 【ポーレット】
# display as 波萊特
# JP: 「当たり前です！\n[わ　　た　　し　　た　　ち　　の　　な　　か,7]初恋の人のお願いじゃないですか」
2413 = "「Tất nhiên rồi!\nĐó là lời thỉnh cầu của [わ　　た　　し　　た　　ち　　の　　な　　か,7]tình đầu mà.」"
# monologue
# JP: ポーレットはぱしっと軽く僕の背中をひとたたきして、\nそれから表情を引き締める。
3037 = "Paulette vỗ nhẹ một cái 'bốp' vào lưng tôi,\nrồi sau đó nét mặt trở nên nghiêm túc."
# 【ポーレット】
# display as 波萊特
# JP: 「それに、これ。\nわたしにも関係があるお話しですし」
2460 = "「Hơn nữa, chuyện này.\nCũng là chuyện có liên quan đến tôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットにも――れいなと、か」
1841 = "「Với Paulette――và Reina, sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。現状、レイルロオドと家族関係を結ぶには、\n法の隙間をつく、みたいな方法しかないんです」
2331 = "「Đúng vậy. Hiện tại, để thiết lập quan hệ gia đình với \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nchỉ có cách lách luật mà thôi.」"
# monologue
# JP: 戸籍創出と、養子縁組。
2744 = "Lập hộ khẩu mới, và nhận con nuôi."
# monologue
# JP: レイルロオドが製造15年以上経過していれば、\n15歳以上とみなし、裁判所の許可は不要と"捉える" 。
3208 = "Nếu \\x%lレイルロオド;#00ffc040;Railord%l;#; đã được chế tạo trên 15 năm,\nsẽ được xem là trên 15 tuổi, và 'được hiểu' là không cần sự cho phép của tòa án."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……そのような方法があるのか」
2033 = "「Hừm......có cách như vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「グレーゾーンです。実際、裁判になったらわからない。\nだから、裁判が起きないように、みんな必死で隠してる」
2517 = "「Đó là vùng xám. Thực tế, nếu ra tòa thì không biết sẽ thế nào.\nVì vậy, để không xảy ra kiện cáo, mọi người đều tuyệt vọng che giấu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 2034 = "「唔」" 
# 【ポーレット】
# display as 波萊特
# JP: 「でも……そこまでしても、\nレイルロオドと家族になりたい人は、いるんです」
1820 = "「Nhưng......dù phải làm đến mức đó,\nvẫn có những người muốn trở thành gia đình với \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、わかる」
2266 = "「Điều đó, tôi hiểu.」"
# monologue
# JP: 例えば僕が、ハチロクに先立ってしまうとして――\nハチロクがその先、食うに困らぬようにはしてやりたい。
3022 = "Ví dụ như, giả sử tôi ra đi trước Hachiroku――\nTôi muốn lo liệu để sau này Hachiroku không phải lo lắng chuyện cơm ăn áo mặc."
# monologue
# JP: 法的に保証された形で遺産を残してやれるのならば、\nどんなに安心なことだろう。
2920 = "Nếu có thể để lại di sản dưới hình thức được pháp luật bảo đảm,\nthì sẽ an tâm biết bao."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、『新しい家族の形特区』で、フォローしたい。レイルロオドに人権を、なんて大げさなことじゃなくて」
2082 = "「Vì vậy, tôi muốn hỗ trợ thông qua 'Đặc khu Hình thái Gia đình mới'. Không phải là chuyện to tát như đòi quyền con người cho \\x%lレイルロオド;#00ffc040;Railord%l;#; đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ただ、保護を。僕らが守れなくなったとしても、\n不利益や理不尽を、被ることがどうか、無きよう」
2252 = "「Chỉ là, sự bảo vệ. Để ngay cả khi chúng ta không thể bảo vệ họ được nữa,\nhọ cũng không phải gánh chịu những bất lợi hay sự bất công.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2569 = "「Ngài Soutetsu――」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ」
2387 = "「Chị Paulette~」"
# monologue
# JP: ハチロクとれいなが頷き合う。
2776 = "Hachiroku và Reina gật đầu với nhau."
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、必ずや双鉄様の夢のお役に。\nなんなりと、いつなりと。どうぞお申し付けください」
2225 = "「Tôi cũng vậy, nhất định sẽ giúp ích cho ước mơ của ngài Soutetsu.\nBất cứ điều gì, bất cứ lúc nào. Xin ngài cứ sai bảo.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、すっごくがんばりますよぉ！」
2406 = "「Reina cũng sẽ, cố gắng hết sức mình luôn nha~!」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど、これは――\n『鉄道の町・御一夜』構想にも深く関わる案件だね？」
2420 = "「Ra là vậy, chuyện này――\nCũng là một dự án liên quan mật thiết đến ý tưởng 'Thành phố Đường sắt Ohito' nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね、稀咲。鉄道の町・御一夜は、人と人が、\n人とレイルロオドとが、新しい形の家族になれる町」
2341 = "「Đúng vậy, Kisaki. Thành phố Đường sắt Ohito là nơi mà con người với con người,\ncon người với \\x%lレイルロオド;#00ffc040;Railord%l;#;, có thể trở thành một gia đình kiểu mới.」"
# 【稀咲】
# display as 稀咲
# JP: 「自由で誰もが等しく暮らせるような町、か。\n実にいいね。協力するよ。個人としても、[バンカー,2]銀行家としても」
1758 = "「Một thành phố tự do, nơi mọi người đều có thể sống bình đẳng, sao.\nThật sự rất tuyệt. Tôi sẽ hợp tác. Cả với tư cách cá nhân, và tư cách một nhân viên ngân hàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2438 = "「Kisaki.」"
# 【日々姫】
# display as 日日姬
# JP: 「広報とか！　そういう方面、わたし、やるけん！！\nこう見えてもプロやけんね！　良か仕事するとよ？」
2150 = "「Mảng quảng bá! Về phương diện đó, cứ để em lo!!\nTrông vậy chứ em là dân chuyên nghiệp đó nha! Sẽ làm tốt công việc đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2302 = "「Hibiki.」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、古か人間やけんねぇ」
2146 = "「Chị là người thuộc thế hệ cũ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2038 = "「啊！」" 
# monologue
# JP: 真闇姉の顔には、表情がない。\nこころの動きを――推し量ることさえ、僕には出来ない。
3084 = "Trên gương mặt chị Mayami, không có biểu cảm gì.\nNgay cả việc phỏng đoán――những chuyển động trong lòng chị, tôi cũng không làm được."
# 【真闇】
# display as 真闇
# JP: 「同じく古か人間に、双ちゃんの気持ちばゆるうり伝える。\nそん手伝いなら、きっと、少しはできゆるやろかねぇ」
2279 = "「Chị sẽ từ từ truyền đạt tâm ý của Sou-chan cho những người cũ kỹ giống chị.\nNếu là việc đó, thì chắc chắn, chị có thể giúp được một chút đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉！！」
2429 = "「Chị Mayami!!」"
# monologue
# JP: ブン――と、聞えよがしな飛行音。\nああ、無論。無論。ナビも、いつもいつでも、僕の味方だ。
2899 = "Vù――tiếng bay cố ý phát ra cho tôi nghe thấy.\nA, tất nhiên. Tất nhiên rồi. Navi cũng, luôn luôn, đứng về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「みんな、本当にありがとう」
1968 = "「Mọi người, thực sự cảm ơn rất nhiều.」"
# monologue
# JP: 感謝しかない。\n厚意を返す方法は、たったひとつしか思いつかない。
2961 = "Không có gì ngoài sự biết ơn.\nCách để đền đáp lòng tốt này, tôi chỉ có thể nghĩ ra một điều duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、為そう」
2553 = "「Vì vậy, hãy làm thôi.」"
# monologue
# JP: ふかみの手を、凪の手を取る。
2969 = "Tôi nắm lấy tay Fukami, tay Nagi."
# monologue
# JP: 僕達三人という小さな面が、\nこれほど大きなつながりに、しっかりとした形となった。
2954 = "Mặt phẳng nhỏ bé mang tên ba người chúng tôi,\nđã tạo thành một hình hài vững chắc cho sự kết nối to lớn nhường này."
# 【双鉄】
# display as 雙鐵
# JP: 「必ず、御一夜を――\n『新しい家族の形特区』に」
2248 = "「Nhất định, sẽ biến Ohito――\nthành 'Đặc khu Hình thái Gia đình mới'.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　凪！　ふかみ！」
2570 = "「Ngài Soutetsu! Nagi! Fukami!」"
# monologue
# JP: 大きな大きなハチロクの声。\n凪とふかみと、あわててキャブへと駆け戻る。
2778 = "Tiếng gọi rất, rất to của Hachiroku.\nNagi và Fukami vội vã chạy trở lại \\x%lキャブ;#00ffc040;buồng lái%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「なにをなさっていたのです。\n発車、間もなくですというのに」
1850 = "「Mọi người đang làm gì vậy ạ.\nSắp đến giờ khởi hành rồi cơ mà.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんと一緒に、落とし物捜索しとったばい」
2005 = "「Mình đang cùng bé Fukami tìm đồ bị đánh rơi.」"
# 【ふかみ】
# display as 深美
# JP: 「あの、ちいさなお客様が泣いちゃって――\nピンバッジがぽろっといっちゃったみたいで」
2351 = "「À ừm, có một vị khách nhỏ tuổi đang khóc――\nHình như chiếc huy hiệu cài áo bị rớt mất.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、それで、見つかったのですか？」
2025 = "「Trời, vậy, đã tìm thấy chưa ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。凪の直感とふかみの経験が噛み合った」
2411 = "「Tất nhiên rồi. Trực giác của Nagi và kinh nghiệm của Fukami đã kết hợp rất ăn ý.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら双鉄様は、発見後すみやかに職務復帰するよう、\n家長としてのつとめをお果たしになるべきでしたね」
2554 = "「Nếu vậy thì ngài Soutetsu đáng lẽ phải làm tròn bổn phận của một trụ cột gia đình,\nlà đốc thúc mọi người nhanh chóng trở lại làm việc sau khi tìm thấy chứ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――まぁ、それは確かにだ。\nいかんな、僕が足を引っ張ってしまったか」
2030 = "「Ưm――chà, điều đó thì đúng thật.\nKhông được rồi, là anh đã ngáng chân mọi người sao.」"
# 【凪】
# display as 凪＆深美
# JP: 「そぎゃんこつなか！」\n「わたしが手間取りすぎちゃって」
2376 = "「Không có chuyện đó đâu!」\n「Là do em làm mất quá nhiều thời gian.」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
1991 = "「Fufu.」"
# monologue
# JP: 途端に僕をかばってくれたふかみと凪とを嬉しげに見て、\nハチロクは、幸せそうな笑みを浮かべる。
2780 = "Nhìn Fukami và Nagi ngay lập tức lên tiếng bênh vực tôi với vẻ mặt vui sướng,\nHachiroku nở một nụ cười ngập tràn hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「足りないところは、補い合う。\n素敵ですね。さすが、双鉄様のご家族です」
2468 = "「Bù đắp cho những thiếu sót của nhau.\nTuyệt vời thật đấy. Quả không hổ danh là gia đình của ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「同時に、ハチロクの家族だろう？」
2120 = "「Đồng thời, cũng là gia đình của Hachiroku đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「うふふふっ、左様ですね。とてもとても幸いなことに」
1992 = "「Ufufufu, đúng là vậy ạ. Thật sự, thật sự rất may mắn.」"
# monologue
# JP: 『認定家族』。四年に一度、裁判所への申請と許諾を\n受ければ維持できる、法的に保護された新形体の家族。
2956 = "Gia đình được chứng nhận'. Một hình thái gia đình mới được pháp luật bảo vệ,\ncó thể duy trì bằng cách nộp đơn và nhận được sự cho phép của tòa án bốn năm một lần."
# monologue
# JP: 僕らが申請第一号になろうとしたとき、ふかみと凪が、\n『ハチロクも家族に』と、誘ってくれた。
2877 = "Khi chúng tôi định trở thành những người đầu tiên nộp đơn, Fukami và Nagi đã,\nrủ 'Cả Hachiroku cũng vào gia đình đi'."
# 【ハチロク】
# display as 八六
# JP: 「石炭よりも、もっとあたたかな家族です。\nわたくしにはもったいないほどの」
2425 = "「Một gia đình còn ấm áp hơn cả than đá nữa.\nĐến mức tôi cảm thấy mình không xứng đáng.」"
# monologue
# JP: 男女間の愛情だけによらぬ、信頼を基にした家族関係。\n――ニーズは、驚くほどにあった。
3198 = "Một mối quan hệ gia đình dựa trên sự tin tưởng, không chỉ phụ thuộc vào tình yêu nam nữ.\n――Nhu cầu, nhiều đến mức đáng kinh ngạc."
# monologue
# JP: 僕らの活動は世論の広い共感を呼び、\nわずか七年でここまでこれた。
2957 = "Hoạt động của chúng tôi đã nhận được sự đồng cảm rộng rãi của dư luận,\nvà chỉ trong vòng bảy năm, chúng tôi đã tiến xa được đến nhường này."
# 【れいな】
# display as 玲奈
# JP: 「右田ハチロクさーん、なにしてるですかぁ？\nひないれいな、ちょっと心配ですよぉ」
1965 = "「Migita Hachiroku ơiii, chị đang làm gì vậy ạ?\nHinai Reina, hơi lo lắng rồi đó nha~」"
# 【ハチロク】
# display as 八六
# JP: 「あら、わたくしとしたことが」
2023 = "「Ôi chà, tôi thật là.」"
# 【凪】
# display as 凪
# JP: 「家族やけんね！　うっかりするのも似て当然ばい！」
2559 = "「Gia đình mà! Tính đãng trí giống nhau cũng là chuyện đương nhiên thôi!」"
# 【ふかみ】
# display as 深美
# JP: 「でも大丈夫。\nその分、わたしたちがフォローするから！」
1784 = "「Nhưng không sao đâu.\nPhần đó, bọn em sẽ hỗ trợ cho!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　なんとこころづよいことでしょう」
2022 = "「Chà! Thật là vững tâm làm sao.」"
# monologue
# JP: 僕とハチロクが喋っていた間に、凪とふかみは手分けして、\n発車前点検の残りを終えてくれている。
3180 = "Trong lúc tôi và Hachiroku nói chuyện, Nagi và Fukami đã chia nhau ra,\nhoàn thành nốt phần kiểm tra trước khi khởi hành."
# monologue
# JP: 僕だけ、なにもできていない。\nだが焦らない、得点も、失点も、全て家族で、共有だから。
2846 = "Chỉ có tôi là chưa làm được gì.\nNhưng tôi không vội, vì điểm cộng hay điểm trừ, tất cả đều là của chung gia đình mà."
# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな！　れいな」
1798 = "「Để em đợi lâu rồi! Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「もう～　呼び捨てはダメダメですよぉ！\nれいなは、ひないれいなでぇす！」
2427 = "「Mồ~ Không được gọi trống không đâu nha!\nReina là, Hinai Reina đó ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。失礼した。\n雛衣れいなさん」
2155 = "「À đúng rồi. Xin lỗi em nhé.\nHinai Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「いえいえですよぉ」
2373 = "「Không có gì đâu ạ~」"
# monologue
# JP: 今日はれいなが駅員だ。
2741 = "Hôm nay Reina làm nhân viên nhà ga."
# monologue
# JP: フライ旗を持ち、にこにこと、しかししっかりと、\n安全確認をとってくれる。
2913 = "Cầm cờ vẫy, em ấy mỉm cười, nhưng vẫn rất nghiêm túc,\nkiểm tra an toàn cho chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「それじゃ、わたしは客車にいきます。\n湯医でまた！」
2541 = "「Vậy, em qua \\x%l客車;#00ffc040;toa hành khách%l;#; đây.\nHẹn gặp lại ở Yui nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、湯医で」
2068 = "「Ừ, hẹn gặp ở Yui.」"
# monologue
# JP: 軽く、拳をぶつけあう。\n僕とふかみ、ふかみと凪、ふかみとハチロク。順番に。
2955 = "Nhẹ nhàng, cụng tay vào nhau.\nTôi và Fukami, Fukami và Nagi, Fukami và Hachiroku. Lần lượt từng người."
# 【ハチロク】
# display as 八六
# JP: 「さて、と、それでは」
2126 = "「Vậy thì, bắt đầu thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 
# monologue
# JP: カマはすっかり整っている。\n凪もワンスコを握り直して――
3108 = "\\x%l窯;#00ffc040;Lò hơi%l;#; đã được chuẩn bị tươm tất.\nNagi cũng nắm chặt lại chiếc xẻng xúc than――"
# 【れいな】
# display as 玲奈
# JP: 「ドア[へい]閉よぉし！　ですよぉ」
2501 = "「Cửa đã đóng tốttttt! Rồi nha~」"
# 【ハチロク】
# display as 八六
# JP: 「時期、よし、です」
2345 = "「Thời gian, tốt, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2058 = "「嗯！」" 
# monologue
# JP: 出発信号機は進行現示。\n逆転機を前進フルギアに。
3071 = "Đèn tín hiệu xuất phát hiển thị cho phép đi.\nTôi kéo \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; sang \\x%l満檔前進;#00ffc040;cài hết số tiến%l;#;."
# monologue
# JP: そうして手早く、単弁を運転位置へと持っていく。
2996 = "Rồi nhanh tay, gạt \\x%l単弁;#00ffc040;van hãm đơn%l;#; về \\x%l行駛位置;#00ffc040;vị trí chạy tàu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「出発！　進行！！！」
1919 = "「Xuất phát! Tiến lên!!!」"
# monologue
# JP: ハチロクの動輪が軽く震えて、\nゆっくり、ゆっくり、回りはじめる。
2782 = "\\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; của Hachiroku khẽ rung lên,\nrồi chầm chậm, chầm chậm bắt đầu quay."
# 【凪】
# display as 凪
# JP: 「家族になっても、なーんも、少しも変わらんばいね！」
2221 = "「Dù đã trở thành gia đình, nhưng chẳng có gì, chẳng có chút gì thay đổi nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、少しずつ変わっているのさ」
1796 = "「Không đâu, đang thay đổi từng chút một đấy chứ.」"
# monologue
# JP: 無論、よりよい方向へ。\n自覚できぬほど少しずつでも、確実に。
3132 = "Tất nhiên là, theo hướng tốt đẹp hơn.\nDù là từng chút một đến mức không thể nhận ra, nhưng chắc chắn là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「同じレ－ルの上をどれほど、\n繰り返し繰り返し走っていても、な！」
1931 = "「Dù có chạy đi chạy lại bao nhiêu lần,\ntrên cùng một đường ray đi chăng nữa!」"
# monologue
# JP: （ぽーーーーーーーーーっ！）
3217 = "（Tuúúúúúúúúú!）"
# monologue
# JP: そして僕らは加速していく。
2937 = "Và rồi chúng tôi tăng tốc."
# monologue
# JP: 家族という名の新しい列車に乗って。\nさらに輝く――未来へと。
2735 = "Lên chuyến \\x%l列車;#00ffc040;tàu%l;#; mới mang tên gia đình.\nHướng tới――một tương lai rực rỡ hơn."
