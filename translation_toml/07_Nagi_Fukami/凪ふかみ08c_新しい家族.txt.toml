1775 = "「不是的。突然要雙鐵哥哥坐起來，肯定不容易，而且我怕出事」" 

# monologue
# JP: ふかみは凪からコップを受取り――\nその中の水を、小さなガラス器へ移す。
3047 = "深美從凪手裡接過杯子，將裡面的水倒進一個小小的玻璃容器裡。" 

# 【ふかみ】
# display as 深美
# JP: 「はい。どうぞです、双鉄おにいさん。\n慌てないで飲んでくださいね？」
1864 = "「來，雙鐵哥哥你喝吧。別喝太急哦」" 

# 【双鉄】
# display as 雙鐵
