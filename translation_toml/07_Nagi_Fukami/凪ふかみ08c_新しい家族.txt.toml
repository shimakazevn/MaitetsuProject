# display as 深美
# JP: 「双鉄おにいさんっ！？　肩たたきとかマッサージとか、\nそういうの、全然したりしないんですか？」
2567 = "「雙鐵哥哥！你從沒讓人捶肩或者按摩吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　マッサージやらストレッチやらは、\n日々姫がちょいちょい」
2072 = "「嗯？日日姬偶爾會幫我按摩或者拉伸」" 

# monologue
# JP: いや、違う。
2724 = "不對。" 

# monologue
# JP: 『凪ちゃんとふかみちゃんに悪かけん』といって、\n日々姫のマッサージは、確か……
2987 = "我記得日日姬好像說“我不想做對不起小凪和小深的事”，然後就再也沒給我按摩了……" 

# 【双鉄】
# display as 雙鐵
# JP: 「ではないな。修学旅行が始まったころからは、\n確かに一度も、誰のマッサージも受けていない」
1768 = "「不對，修學旅行開始之後， 就沒人給我按摩過了」" 

# 【ふかみ】
# display as 深美
