2420 = "「看來，這跟“鐵路之城御一夜”構想也有很大的關係吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、稀咲。鉄道の町・御一夜は、人と人が、\n人とレイルロオドとが、新しい形の家族になれる町」
2341 = "「是的，稀咲。鐵路之城御一夜，是一座人與人之間、人與鐵路人偶之間能夠組建新型家庭的城市」" 

# 【稀咲】
# display as 稀咲
# JP: 「自由で誰もが等しく暮らせるような町、か。\n実にいいね。協力するよ。個人としても、[バンカー,2]銀行家としても」
1758 = "「一座自由的、大家都能平等地生活的城市啊。挺好的，算我一個。不論是以個人身份，還是以銀行家身份，我都有興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2438 = "「稀咲」" 

# 【日々姫】
# display as 日日姬
# JP: 「広報とか！　そういう方面、わたし、やるけん！！\nこう見えてもプロやけんね！　良か仕事するとよ？」
2150 = "「宣傳方面的，都可以交給我！！別看我這樣，我可是專業的，肯定能做好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2302 = "「日日姬」" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、古か人間やけんねぇ」
2146 = "「姐姐我是個守舊的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2038 = "「啊！」" 

# monologue
# JP: 真闇姉の顔には、表情がない。\nこころの動きを――推し量ることさえ、僕には出来ない。
3084 = "真闇姐面無表情。我甚至無法推測她內心究竟在想什麼。" 

# 【真闇】
# display as 真闇
# JP: 「同じく古か人間に、双ちゃんの気持ちばゆるうり伝える。\nそん手伝いなら、きっと、少しはできゆるやろかねぇ」
2279 = "「所以我可以把你的想法轉換一種方式傳達給同樣守舊的人。這方面的忙，咱還是幫得上的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉！！」
2429 = "「真闇姐！！」" 

# monologue
# JP: ブン――と、聞えよがしな飛行音。\nああ、無論。無論。ナビも、いつもいつでも、僕の味方だ。
2899 = "天上傳來飛行物的聲音。嗯，當然了，Ｎａｖｉ也永遠是站在我這邊的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みんな、本当にありがとう」
1968 = "「各位，真是太謝謝了」" 

# monologue
# JP: 感謝しかない。\n厚意を返す方法は、たったひとつしか思いつかない。
2961 = "我只能表達自己的感謝。除此之外，我完全想不出其他回報他們好意的方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、為そう」
2553 = "「那麼，讓我們開始吧」" 

# monologue
# JP: ふかみの手を、凪の手を取る。
2969 = "我抓起深美和凪的手。" 

# monologue
# JP: 僕達三人という小さな面が、\nこれほど大きなつながりに、しっかりとした形となった。
2954 = "我們三個人形成的小平面，串聯起了這樣大的一個集體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「必ず、御一夜を――\n『新しい家族の形特区』に」
2248 = "「我們一定要讓御一夜成為“新家庭特區”」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　凪！　ふかみ！」
2570 = "「雙鐵少爺！凪！深美！」" 

# monologue
# JP: 大きな大きなハチロクの声。\n凪とふかみと、あわててキャブへと駆け戻る。
2778 = "八六大聲喊道。凪和深美都慌慌張張地跑回駕駛室。" 

# 【ハチロク】
# display as 八六
# JP: 「なにをなさっていたのです。\n発車、間もなくですというのに」
1850 = "「你們在幹什麼呢，馬上就要發車了」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんと一緒に、落とし物捜索しとったばい」
2005 = "「咱在跟小深一起找遺失物」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、ちいさなお客様が泣いちゃって――\nピンバッジがぽろっといっちゃったみたいで」
2351 = "「有個小乘客在哭……她的徽章掉了」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、それで、見つかったのですか？」
2025 = "「哎呀，那你們找到了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。凪の直感とふかみの経験が噛み合った」
2411 = "「當然。有凪的直覺和深美的經驗配合嘛」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら双鉄様は、発見後すみやかに職務復帰するよう、\n家長としてのつとめをお果たしになるべきでしたね」
2554 = "「那麼，身為家長，雙鐵少爺應當在解決之後立刻回崗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――まぁ、それは確かにだ。\nいかんな、僕が足を引っ張ってしまったか」
2030 = "「唔……嗯，沒錯。不行啊，我居然拖後腿了」" 

# 【凪】
# display as 凪＆深美
# JP: 「そぎゃんこつなか！」\n「わたしが手間取りすぎちゃって」
2376 = "「沒這回事！」\\n「都怪我花了太多時間」" 

# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
1991 = "「呵呵」" 

# monologue
# JP: 途端に僕をかばってくれたふかみと凪とを嬉しげに見て、\nハチロクは、幸せそうな笑みを浮かべる。
2780 = "八六欣慰地看著公然袒護我的深美和凪，露出一臉幸福的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「足りないところは、補い合う。\n素敵ですね。さすが、双鉄様のご家族です」
2468 = "「能相互填補不足之處。雙鐵少爺的家人真棒啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同時に、ハチロクの家族だろう？」
2120 = "「她們不也是你的家人嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふふっ、左様ですね。とてもとても幸いなことに」
1992 = "「呵呵，是的。真是一件幸事」" 

# monologue
# JP: 『認定家族』。四年に一度、裁判所への申請と許諾を\n受ければ維持できる、法的に保護された新形体の家族。
2956 = "我們是“特許家庭”。這是一種新型家庭，只要每四年向家事法庭遞交一次申請並獲得批准，即可受法律保護。" 

# monologue
# JP: 僕らが申請第一号になろうとしたとき、ふかみと凪が、\n『ハチロクも家族に』と、誘ってくれた。
2877 = "在我們準備遞交全國第一份申請的時候，深美和凪提議讓八六也加入。" 

# 【ハチロク】
# display as 八六
# JP: 「石炭よりも、もっとあたたかな家族です。\nわたくしにはもったいないほどの」
2425 = "「真是個比煤炭還要溫暖的家庭，我太有福氣了」" 

# monologue
# JP: 男女間の愛情だけによらぬ、信頼を基にした家族関係。\n――ニーズは、驚くほどにあった。
3198 = "這種基於信任的家庭，並不倚靠於男女之間的感情。支持者遠超我的想像。" 

# monologue
# JP: 僕らの活動は世論の広い共感を呼び、\nわずか七年でここまでこれた。
2957 = "我們的活動引發了輿論的廣泛共鳴，短短七年就走到了今天這一步。" 

# 【れいな】
# display as 玲奈
# JP: 「右田ハチロクさーん、なにしてるですかぁ？\nひないれいな、ちょっと心配ですよぉ」
1965 = "「右田八六，你在做什麼呢？雛衣玲奈有點擔心哦」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、わたくしとしたことが」
2023 = "「哎呀，我可真是的」" 

# 【凪】
# display as 凪
# JP: 「家族やけんね！　うっかりするのも似て当然ばい！」
2559 = "「都是一家人！當然也會一樣丟三落四哩！」" 

# 【ふかみ】
# display as 深美
# JP: 「でも大丈夫。\nその分、わたしたちがフォローするから！」
1784 = "「不過沒關係，一個人丟的，三個人補！」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　なんとこころづよいことでしょう」
2022 = "「哎呀！真是太可靠了」" 

# monologue
# JP: 僕とハチロクが喋っていた間に、凪とふかみは手分けして、\n発車前点検の残りを終えてくれている。
3180 = "趁我和八六說話的時候，凪和深美已經一起完成了發車前的檢查。" 

# monologue
# JP: 僕だけ、なにもできていない。\nだが焦らない、得点も、失点も、全て家族で、共有だから。
2846 = "只有我一個什麼都沒做。但我不急。不論是得分還是丟分，都是一家人的分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな！　れいな」
1798 = "「久等了，玲奈！」" 

# 【れいな】
# display as 玲奈
# JP: 「もう～　呼び捨てはダメダメですよぉ！\nれいなは、ひないれいなでぇす！」
2427 = "「真是的，不能只叫名字！玲奈叫雛衣玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。失礼した。\n雛衣れいなさん」
2155 = "「對哦，真抱歉，雛衣玲奈小姐」" 

# 【れいな】
# display as 玲奈
# JP: 「いえいえですよぉ」
2373 = "「沒事沒事」" 

# monologue
# JP: 今日はれいなが駅員だ。
2741 = "今天玲奈是站務員。" 

# monologue
# JP: フライ旗を持ち、にこにこと、しかししっかりと、\n安全確認をとってくれる。
2913 = "她拿著手旗，笑眯眯地、仔仔細細地確認安全。" 

# 【ふかみ】
# display as 深美
# JP: 「それじゃ、わたしは客車にいきます。\n湯医でまた！」
2541 = "「那我去客車車廂了。我們湯醫站再見！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、湯医で」
2068 = "「嗯，湯醫站再見」" 

# monologue
# JP: 軽く、拳をぶつけあう。\n僕とふかみ、ふかみと凪、ふかみとハチロク。順番に。
2955 = "我們互相擊拳。先是我跟深美，然後深美跟凪，深美跟八六，一個不落。" 

# 【ハチロク】
# display as 八六
# JP: 「さて、と、それでは」
2126 = "「好了，做好準備」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 

# monologue
# JP: カマはすっかり整っている。\n凪もワンスコを握り直して――
3108 = "窯整理得很乾淨。凪也緊握著公斤鍬……" 

# 【れいな】
# display as 玲奈
# JP: 「ドア[へい]閉よぉし！　ですよぉ」
2501 = "「車廂門已關閉！」" 

# 【ハチロク】
# display as 八六
# JP: 「時期、よし、です」
2345 = "「時間確認完畢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2058 = "「嗯！」" 

# monologue
# JP: 出発信号機は進行現示。\n逆転機を前進フルギアに。
3071 = "發車信號機顯示可以行進。我將迴轉機打到滿檔前進。" 

# monologue
# JP: そうして手早く、単弁を運転位置へと持っていく。
2996 = "接著立刻將單剎拉到行駛位置。" 

# 【双鉄】
# display as 雙鐵
# JP: 「出発！　進行！！！」
1919 = "「出發！前進！！！」" 

# monologue
# JP: ハチロクの動輪が軽く震えて、\nゆっくり、ゆっくり、回りはじめる。
2782 = "八六的動輪顫了顫，隨即開始慢慢地轉動。" 

# 【凪】
# display as 凪
# JP: 「家族になっても、なーんも、少しも変わらんばいね！」
2221 = "「成了家人之後，咱們還是什麼都沒變咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、少しずつ変わっているのさ」
1796 = "「不，還是在慢慢改變的」" 

# monologue
# JP: 無論、よりよい方向へ。\n自覚できぬほど少しずつでも、確実に。
3132 = "自然是朝著更好的方向改變。雖然這樣的改變細微到難以察覺，但真的存在。" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じレ－ルの上をどれほど、\n繰り返し繰り返し走っていても、な！」
1931 = "「即使我們只是一直在同一條軌道上反覆奔走！」" 

# monologue
# JP: （ぽーーーーーーーーーっ！）
3217 = "（嗚——！）" 

# monologue
# JP: そして僕らは加速していく。
2937 = "就這樣，我們不斷加速。" 

# monologue
# JP: 家族という名の新しい列車に乗って。\nさらに輝く――未来へと。
2735 = "乘著一輛名為家庭的新列車，向著更加閃耀的未來前進。" 
