# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみの責任？」
1851 = "「你們有責任？」" 

# 【凪】
# display as 凪
# JP: 「そーばい！」
2337 = "「是的！」" 

# 【ふかみ】
# display as 深美
