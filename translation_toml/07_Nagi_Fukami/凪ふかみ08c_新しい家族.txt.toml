2237 = "「我也是，小凪跟雙鐵哥哥出門的時候，我會在家裡好好休息……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2057 = "「嗯」" 

# monologue
# JP: 言われて、気づく。
3123 = "聽她們這麼說，我這才注意到……" 

# monologue
