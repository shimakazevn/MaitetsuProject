2270 = "「我說……我們每次休假的時候，都會分成兩人單獨出去玩，和三個人一起出去玩吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2057 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「ウチはふかみちゃんとにーさんが出かけとるとき、\nぐーすかぴーって寝まくっとったし」
2003 = "「咱在小深跟大哥哥出去玩的時候，都會在家香香地睡上一覺」" 

# 【ふかみ】
# display as 深美
