2772 = "光是這樣，我就覺得身體恢復了血氣，感覺周遭事物逐漸清晰了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ない、な。大丈夫だ。\nが――」
2557 = "「都不痛，我沒事。不過……」" 

# 【凪】
# display as 凪
# JP: 「がっ！？」
1786 = "「不過？！」" 

# 【ふかみ】
# display as 深美
# JP: 「なんでもいってくださいっ！　小さなことでもっ！」
2350 = "「有什麼問題儘管說！哪怕是小問題！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「喉が、ひどく乾いている。すまんが、」
2257 = "「我喉嚨很乾，你們……」" 

# 【凪】
# display as 凪
# JP: 「水ばいねっ！」
2479 = "「要水是吧！」" 

# 【凪】
# display as 凪
