2534 = "「那就是說你們倆都摔倒的姿勢還算好！！對不對！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ということになろうな」
2168 = "「差不多吧」" 

# 【凪】
# display as 凪
# JP: 「よかったばーい！」
2116 = "「太好囉！」" 

