2984 = "我竟然這麼傻，連這麼簡單的事情都沒注意到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。僕の体は――修学旅行が始まってからずっと、\n休み……疲労回復の機会を得ずに稼働し続けていたのか」
1932 = "「原來，自從修學旅行開始，我就……從來沒有好好休息過，一直在全力運轉啊」" 

# 【凪】
# display as 凪
# JP: 「っていうか、にーさん、\n体が重くなったり、無性に眠くなったりせんかったと？」
2462 = "「聽咱說，大哥哥，你就沒覺得身子很重，或者覺得莫名其妙想睡嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……特に、普段とは変わらなかったが」
1409 = "「……我感覺跟平時沒什麼區別」" 

# 【凪】
# display as 凪
# JP: 「って！？」
2047 = "「啊？！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん」
2157 = "「小凪」" 

