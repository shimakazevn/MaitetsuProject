2281 = "「所以為了能讓我們三個能在一起，我特地提出了這個方案——增加新的家庭形式」" 

# 【日々姫】
# display as 日日姬
# JP: 「――はいっ！」
1411 = "「……提問！」" 

# monologue
# JP: 話の区切りに、ほんのすこしの間をおいて、日々姫の挙手。\n少し意外な気もするが、他に手を挙げる者もない。
3172 = "說到這裡，該說的也差不多說完了。幾秒後，日日姬舉起了手。我覺得有點意外，但是除了她之外沒人舉手了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、日々姫」
1860 = "「你說，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「新しい家族の形って――今までの家族の枠組みじゃ、\n実現できないもの……なんですか？」
2298 = "「新的家庭形式，是一種在現有家庭定義下無法實現的東西嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧来の家族制度は、男女を夫婦とし、夫婦が子を為す。\nそうあることを前提としている、家族制度だ」
2474 = "「舊有家庭制度的核心，是男女結為夫妻，夫妻生兒育女」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「……そいば、ごくごく自然なことかと思いますがのう」
1407 = "「……我倒覺得這很自然」" 

# monologue
# JP: 蓑笠老人の、年輪の深みを感じさせる声。\n答える僕の背筋も自然と伸ばされる。
3120 = "聽到蓑笠爺爺蒼老的聲音，我不由得挺了挺背。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのであろうと思います。ですので僕も、\nその基本形に触れるつもりは、一切ありません」
2239 = "「我也覺得很自然。所以我不打算改動這個基本形式」" 

# monologue
# JP: 言えば、ポーレットと稀咲とが同時に頷く。\n――旧来の家族制度を否定したなら、成立しない。
3171 = "說到這裡，波萊特和稀咲同時點了點頭。如果否定既有的家庭制度，那我的提議將無法成立。" 

# monologue
# JP: その認識は、ふたりもやはりまず真っ先に\n思ってくれたことなのだろう。
3073 = "看來她們倆首先想到的果然也是這一點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですが今は、生物学的な意味での『自然』から外れた\n――そういう共同体も、増加している時代かと感じます」
1833 = "「但是，當今時代，越來越多的共同體逐漸超脫於生物學意義上的“自然”」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「と、いうんは……」
2520 = "「這話怎麼說？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同性愛の方々もそうであると想像しますし、\n相互を保護し合う、という共同体もあるかと思います」
1979 = "「同性戀人士應該就是如此，此外，還有以相互庇護為理念構建的共同體」" 

# 【堰】
# display as 堰
# JP: 「保護し合う、ちゅうのは、どないな形かのぉ？」
2210 = "「怎樣相互庇護？」" 

# monologue
# JP: 堰さんも、話に入って来てくれる。
2888 = "堰先生加入了對話。" 

# monologue
# JP: どなたが相手であろうとも、\n僕はただ、真摯に思いを、僕らの考えを伝えるだけだ。
2729 = "不論對方是誰，我只要將自己真誠的想法傳達給他就行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、何らかの理由で伴侶を失くした単身者同士が、\nお互いの生活を支え合うことを目的に、共同生活をする」
2368 = "「比如，因為一些原因失去了伴侶的孤寡，可以共同生活，以期在生活方面相互扶助」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「それは……男と男、女と女で、いうことですかのう」
1856 = "「你的意思……是男跟男，女跟女？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同性同士のこともありましょうし、異性間のことも、\n複数人での共同生活、ということもあるでしょう」
1961 = "「可以是同性，也可以是幾個異性一起」" 

# 【日々姫】
# display as 日日姬
# JP: 「いわゆる――シェアハウス――あ！　違うか、\nシェルター的？　な感じ？？」
2165 = "「就像合租……啊，不對，就像避難所一樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「も、あるかと想定している」
1800 = "「也可以像那樣」" 

# 【堰】
# display as 堰
# JP: 「ああ――\nそりゃあ、都会の方ではあるかもしれんが――」
2077 = "「噢……這種的話，大城市裡應該是有的……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜にもあるんですよ。そういうご相談、最近は」
2196 = "「御一夜也有。最近有人找我們諮詢這方面的問題」" 

# monologue
# JP: 堰さんの『理解できん』といわんばかりの嘆息を、\nポーレットが静かに受け止めてくれる。
2892 = "堰先生嘆了口氣，一臉無法理解。波萊特則一臉平靜。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういう共同生活を始めようとして。けど、不動産屋が\n物件を貸してくれない――みたいな話。時々あります」
2486 = "「諮詢的問題一般是關於想要和他人共同生活，但是中介不願意把房子租給他們」" 

# 【堰】
# display as 堰
# JP: 「ほう。こげな田舎にもですか」
2080 = "「嚯，這麼鄉下的地方都有了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「インターネットが発展し、個人が情報発信し、それが\n拡散され共有されるようになった影響かと思います」
2515 = "「這應該是因為網路逐漸發達，大家可以更方便地發送、擴散和共享個人訊息」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね」
2334 = "「是的」" 

# monologue
# JP: 稀咲が、ふっと遠い目をする。
3104 = "稀咲眯了眯眼。" 

# 【稀咲】
# display as 稀咲
# JP: 「こういう生き方もある。それが許容される社会がある。\n――孤立が深く色濃いほど、先例は眩しく映ろうからね」
1967 = "「各人有各人的活法。有的地方會包容這些不同。偏見越是強烈，開闢先河的前例就越是耀眼」" 

# 【日々姫】
# display as 日日姬
# JP: 「けど、その“先例”が有名になるほど広がるのは――\n実はその先例が、めちゃくちゃレアだから……よね？」
1835 = "「但是，這種先例之所以會那麼出名，不就是因為這種先例……特別少見嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指摘のとおりだと、僕も思う」
2303 = "「日日姬說得對」" 

# monologue
# JP: 幾重にも助けられ、守られている、\nその実感が、さらなる言葉を押し出していく。
2907 = "她們一次又一次幫助我，保護我。這讓我組織出了接下來的話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「希望とともに踏み出す。けれどそこには何の保証も無い。\nどころか、社会的な不利益を被るケースさえも多い」
2562 = "「開拓者懷揣著希望邁出腳步，但沒人能保證未來如何。不僅如此，在社會上還會經常吃虧」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ふーむ」
2034 = "「唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、凪にも、ふかみにも。\nそのような不自由な思いや苦労を、させたくないのです」
2227 = "「我不希望凪和深美遭受這樣的束縛與勞累」" 

# monologue
# JP: 蓑笠老人も、堰さんも、じっと黙って僕を見る。\n僕の話に、耳を傾けてくれている。
3138 = "蓑笠爺爺、堰先生都沉默著看向我。他們在傾聽我的發言。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから新しい家族の形を。異性同士一対一の婚姻以外の\n形でも結べる家族契約を。立法化したいと思っています」
2283 = "「所以，我提出了一種新的家庭形式。一種脫離一男一女的傳統婚姻形式的家庭契約。我想把它立法」" 

# 【真闇】
# display as 真闇
# JP: 「立法化――」
2439 = "「立法……」" 

# monologue
# JP: ここにきて、ついに真闇姉が声を漏らす。\nただそれだけで、全員の目線が集中する。
3121 = "聽到這裡，真闇姐才說出了第一句話。但僅僅是這短短的複述，就吸引了全場人的目光。" 

# monologue
# JP: 堰さんが、蓑笠さんが、真闇姉に向かって会釈する。\n困ったような笑みで頷き、真闇姉が僕に問うてくる。
2891 = "堰先生和蓑笠先生向真闇姐點了點頭。真闇姐也一臉為難地笑著點了點頭，開始向我發問。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。\n立法化いうんは、そぎゃんと簡単にできゆうものや？」
2271 = "「我說，小雙。要立法，有那麼簡單嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、今はまだ精査していない。が――\n国会で成立する法案は、殆どが内閣による提出と聞く」
2516 = "「這方面我還沒仔細了解，但是……聽說在國會通過的法案幾乎都是由內閣提出的」" 

# 【真闇】
# display as 真闇
# JP: 「内閣によって法案提出してもらう――そいば、\nハードルがとてつもなく高そうな話に思うとやけど」
2216 = "「想辦法讓內閣提出法案……咱覺得這難度挺高的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、確かに。ので、社会的な機運を盛り上げ、\n必要性を認知して貰っての、議員立法でと考えている」
2329 = "「是的。因此，我希望推動社會理解，請議員參與立法」" 

# 【真闇】
# display as 真闇
# JP: 「議員立法……国会議員さんが法案ば提出する――\nゆう理解でよかと？」
2491 = "「議員立法……就是國會議員提出法案，咱沒理解錯吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、認識しているが――\n確認を頼んでもよいか？　ポーレット」
2290 = "「據我所知是這樣的……應該沒錯吧，波萊特？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その認識で問題無いです。地元選出の国会議員の\n先生になら、わたしもパイプ、あるにはあります」
2378 = "「沒錯。我也有一些渠道聯繫本地選出來的國會議員」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2078 = "「噢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど。ご相談してすぐに、理解を得るのは\n難しいって思います。やっぱり、お年を召した方ですし」
1825 = "「但是，不要認為簡單地談一談就能得到對方理解。對方也是上了年紀的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その理解を得るために、僕は行動したいのだ」
2258 = "「我希望能採取行動得到他的理解」" 

# monologue
# JP: 困難があることなどは、わかりきっている。
2982 = "我知道肯定會有困難。" 

# monologue
# JP: が、ふかみと凪がいてくれるなら、\n凪とふかみのためならば――喜んでそれに立ち向かおう。
2746 = "但是只要有深美和凪陪著我，只要是為了凪和深美……我不怕面對任何困難。" 

# 【双鉄】
# display as 雙鐵
# JP: 「男女一対一の夫婦。それが家族・社会の基本形である\nことに異論はないですし、保護されることにも賛成です」
1760 = "「一男一女的夫妻，這是家庭與社會的基本形態，我贊成這一點，也認為這種形態需要得到保護」" 

# monologue
# JP: そこは何度でも繰り返す。
2958 = "我再次強調了這一點。" 

# monologue
# JP: 夫婦を否定することは、この国の歴史と現状の、\nほとんど全てを否定すること――受け入れられる筈もない。
2859 = "否定夫妻，幾乎等同於徹底否定這個國家的歷史與現狀，不會有人願意接受這種否定的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうでない形の家族の形成も許してほしい。\n保護までは望みませんが、不利益を回避させて欲しい」
1832 = "「但是，我希望國家能夠允許以另一種形式組建家庭。我不期待受到保護，我只期待能夠規避麻煩」" 

# 【真闇】
# display as 真闇
# JP: 「『不利益を回避する』ことも、また利益。\n――そぎゃんこつ、双ちゃんなら当然理解しとるよねぇ」
2469 = "「能規避麻煩，本身就是一種收穫。這方面你肯定是明白的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、無論だ」
2412 = "「當然了」" 

# monologue
# JP: からの財布に一万円が入ることが利益であるのと、\n一万円の借金が帳消しになることとは変わらない。
3028 = "沒錢的時候得到一萬日元，跟勾銷一萬日元欠款一樣。" 

# monologue
# JP: どちらも等しく、一万円の利益を得ている。
2773 = "兩邊都是得到了一萬日元的收穫。" 

# 【真闇】
# display as 真闇
# JP: 「やったら、そん『不利益の回避』を得るため、\n偽装やらなんやらが、横行してしまいそうやけど」
2551 = "「那麼，為了規避麻煩，可能會有人假借名義，而且還不會是少數」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは結婚も同じだろう。偽装結婚を防止するため、\n婚姻届があり、提出時の身分証提示がある」
2446 = "「結婚也一樣。為了防止假結婚，才會有結婚登記制度，登記時才需要出示身份證明」" 

# 【ポーレット】
# display as 波萊特
# JP: 「婚姻より、もっと条件を厳しくてもいいと思います。\nその方がきっと、実現化のハードルは低くなる」
1956 = "「只要制定比結婚更嚴格的條件就行了。這樣也方便推行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと？」
# 2520 = "「這話怎麼說？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「例えば、15歳未満の児童を養子に引き取るときと同じく、\n家庭裁判所への申し立てと許可取得とを必須にするとか」
2366 = "「比如，參照收養未滿十五歲的兒童為養子女的條件，申請人必須向家事法庭提出申請並獲得批准」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。確かに、その方が申請者の真剣味も問われような。\n僕の立場としては、望むところ――ああ」
2036 = "「唔，確實，這樣申請人必須足夠認真足夠堅定才行。從我的角度出發，我覺得這樣很好……啊」" 

# monologue
# JP: 持つべきものは、友人だ。\nポーレットの言葉が僕に、気付きをくれる。
3018 = "朋友總會在關鍵時刻拉自己一把。聽波萊特說到這裡，我忽然發覺一件事。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　なにか不都合でも」
2572 = "「雙鐵，發生什麼問題了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、逆だ。制限の厳しさが早期実現に繋がるのなら、\n『特区申請』はどうかと思った」
1788 = "「不，不是的。如果限制越嚴格越容易實現，那麼建立特區是個好主意」" 

# 【日々姫】
# display as 日日姬
# JP: 「とっくしんせー？」
2179 = "「建立特區？」" 

# 【稀咲】
# display as 稀咲
# JP: 「日々姫、それはね？　ん――と」
2306 = "「日日姬，這個啊，就是……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「社会的情勢の変化に対応するため、地域活性化に関する\n施策を、特定地域で集中的に推進する。それが特区です」
2391 = "「為了應對社會變化，活躍地區經濟文化，在某個特定地區集中推進某些政策，這樣的地區叫特區」" 

# monologue
# JP: 餅は餅屋。
2934 = "專業的就是可靠。" 

# monologue
# JP: 稀咲が説明の言葉を探した一瞬に、\nポーレットは至極明快に、特区が何かを説明しつくす。
3106 = "稀咲還在思索怎樣解說呢，波萊特立刻就簡單明快地解釋清楚了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、なるほど！　じゃあ、『新しい生き方特区』とか\n『新しい家族の形特区』みたいなのを、御一夜に？」
2041 = "「啊，原來是這樣！那就是要在御一夜建立“新生活特區”或者“新家庭特區”？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「新しい生き方特区――」
2296 = "「新生活特區……」" 

# monologue
# JP: 日々姫の言葉がキィンと響く。\nまさしく、それだ。
3008 = "日日姬這話說得我靈機一動。沒錯，這個特別好。" 

# monologue
# JP: 新しい生き方――新しい暮らし――新しい家族の形。\n僕たちが求めるものは、その言葉にこそ落ち着こう。
3001 = "新的生活，新的家庭。這個詞剛好可以囊括我們的訴求。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕としてはそう願いたい。\n無論これは、単なる僕の、個人的な願望にすぎぬがな」
