2966 = "我很高興，於是將手從被窩中伸出，想觸及她們的溫暖。她們倆則緊緊握住了我的手。" 

# 【凪】
# display as 凪
# JP: 「にーさん！？　痛いとこなかとっ！？\n頭、ぼーっとしたりしとらんと？」
2099 = "「大哥哥！你有沒有哪裡痛？！腦袋會不會暈？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛い、ところは――」
2418 = "「疼的地方……」" 

# monologue
# JP: 自分の体に意識を置く。\n両手は預けたままにして、頭、首、肩、胴、腰――足。
2963 = "我將注意力轉移到自己的身體上。轉移到除了被抓住的雙手之外的頭、脖、肩、腹、腰，乃至腿。" 

