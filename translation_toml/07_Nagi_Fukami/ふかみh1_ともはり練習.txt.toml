1514 = "Khi tôi liếm cô bé của Fukami, nơi đó run\nlên bần bật,\nngay lập tức khoái cảm đáp\ntrả lại bao trùm lấy sự cương cứng của\ntôi."

# 【ふかみ】
# display as 深美
# JP: 「れるっ――ぢゅっ！　ぢゅぼっ！　ぼちゅっ！\nじゅるっ！　じゅっ！　じゅうっ！　じゅるんっ！！」
1036 = "Lưỡi của Fukami run rẩy thở dốc trong\nkhoái cảm, truyền sự rung động đó\ntrở lại\ncho tôi——cả hai cùng nhau khuếch đại cảm\ngiác sung sướng."

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――れろっ――くっ――ご、くっ――」
1051 = "「Chụt! Mút! Phập! Chụt!\nƯm——liếm——liếm——liếm——phập!」"

# 【ふかみ】
# display as 深美
