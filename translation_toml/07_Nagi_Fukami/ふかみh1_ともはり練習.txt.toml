1317 = "Những ngón tay của Fukami thoăn thoắt di\nchuyển,\ntháo cúc quần của tôi ra."

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんの、お、おちん、ちん……あんなに、ごしごし、\n拭いたのに。すごく、てらてら……濡れちゃって、ます」
1134 = "「Fua!」"

# monologue
# JP: ……確かに、濡れているだろう。\n先走り汁が滲んできたのを、随分前から感じてた。
766 = "Ngay khi vừa kéo quần và đồ lót xuống, để\nlộ ra sự cương cứng,\nmột hơi thở dồn dập\nđã mơn trớn quy đầu tôi thật mạnh mẽ và\nngọt ngào."

# 【ふかみ】
# display as 深美
# JP: 「拭くだけじゃ……だめ……。おちんちん……からからに、\nなるまで……絞らない、と……きっと、ダメ、ですよね」
1119 = "「Cậu, cậu nhỏ……của anh Soutetsu……dù em đã,\nchà xát,\nlau kỹ đến thế. Mà giờ lại, bóng\nnhẫy……ướt sũng, rồi」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そう、だな」
1101 = "……Quả thực là đang ướt sũng.\nTôi đã cảm\nnhận được chất dịch bôi trơn rỉ ra từ nãy\nđến giờ rồi."

# monologue
# JP: ふかみが、勃起を絞ってくれる。\nからからに乾いてしまうまで――
1486 = "「Chỉ lau thôi thì……không được……. Phải vắt\nkiệt……cậu nhỏ,\ncho đến khi……khô khốc……thì\nmới, được, đúng không ạ」"

# monologue
# JP: 凄まじく魅力的なその提案を、\nけれども僕は、ほんの一部だけ退ける。
1589 = "「Đúng, vậy nhỉ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「が、完全にカラカラにするのは勘弁してくれ。\nふかみの膣を満たす分は、残しておきたく思うから」
948 = "Fukami, sẽ vắt kiệt sự cương cứng của tôi.\nCho đến khi nó khô khốc——"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
1022 = "Một lời đề nghị vô cùng hấp dẫn,\nnhưng tôi\nđành phải từ chối một phần nhỏ."

# monologue
# JP: ふかみの後頭部が揺れる。\n目の前にあるおまんこまでも、強い頷きにあわせて揺れる。
1494 = "「Nhưng, xin đừng vắt kiệt hoàn toàn.\nVì\nanh muốn giữ lại một phần để lấp đầy âm\nđạo của Fukami nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「そうですね！　そうだ、うん。そう。絶対必要。\n了解です。わたし、がんばって調整しますね」
1075 = "「A!」"

# monologue
