1049 = "「嗯……啊……裡面……被……推著……哇……呀……像是……在轉……」" 

# monologue
# JP: だが、焦らない。\nふかみだってまだ、二回目のセックスに過ぎんのだ。
1355 = "我並不著急。這只是我跟深美的第二次性交。" 

