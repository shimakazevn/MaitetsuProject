1181 = "ふかみ"

[character_subs]
1591 = "雙鐵"
1444 = "深美"

[script]
# lines: 289 
# 【双鉄H】
# display as 雙鐵
# JP: 「っと！」
1065 = "「Tình yêu! Hoàn toàn có thể làm được mà!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、上手です。双鉄さん。\n今のだったら、揺らさずに瀬を乗り越えられます」
1034 = "「Chà!」"
# monologue
# JP: この瀬を抜ければしばらくは、\n流されるままに漂うだけだ。
1496 = "「A, giỏi quá. Anh Soutetsu.\nNếu làm như vừa nãy, anh có thể vượt qua dòng thác mà không bị tròng trành đấy.」"
# monologue
# JP: 乗り切ったという感覚に、ついつい口も軽くなる。
1387 = "Vượt qua dòng thác này, một lúc sau,\nchỉ cần để thuyền trôi lững lờ theo dòng nước là được."
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし……川下り船でとはな」
942 = "Cảm giác vượt qua được thử thách khiến tôi vô tình thốt lên những lời nhẹ nhõm."
# monologue
# JP: ふかみと、凪と。\nそれぞれと僕との、ふたりきりでの一日デート。
1385 = "「Nhưng mà……không ngờ lại làm chuyện này trên thuyền xuôi dòng.」"
# monologue
# JP: ふかみの希望は、僕のともはり練習を、\nふたりっきりでたっぷり行うことだった。
1455 = "Với Fukami, và Nagi.\nMột buổi hẹn hò trọn vẹn một ngày chỉ có hai người với từng người."
# 【ふかみ】
# display as 深美
# JP: 「二回もチャンスがあるんだから、\n一回目は、自分のホームで――って、思ったんです」
1118 = "Mong muốn của Fukami là,\nđược cùng tôi luyện tập chèo thuyền, chỉ có hai người với nhau."
# monologue
# JP: 三者……というか、実質的にはふかみと凪との合議により、\nふかみ二回、凪一回というデート回数でまとまった。
1533 = "「Vì có tận hai cơ hội mà,\nnên em nghĩ, lần đầu tiên sẽ ở sân nhà của mình——」"
# monologue
# JP: 何故に回数が同じでないのか、ふたりに説明されるまで、\n不思議に思ったものであったが……
1307 = "Ba người……hay nói đúng hơn là, theo thỏa thuận thực tế giữa Fukami và Nagi,\nsố lần hẹn hò được chốt lại là Fukami hai lần, Nagi một lần."
# 【双鉄H】
# display as 雙鐵
# JP: 「……“平等でなくとも公平”――か」
772 = "Tại sao số lần lại không bằng nhau, cho đến khi được hai người giải thích,\ntôi vẫn cảm thấy thật kỳ lạ, nhưng mà……"
# 【ふかみ】
# display as 深美
# JP: 「ですね。[じゅっぷん,1]十分の差も無いことですけど、\n双鉄さんの、初めてのエッチの相手は……凪ちゃん」
1100 = "「……“Dù không bình đẳng nhưng vẫn công bằng”——sao.」"
# monologue
# JP: 淡々とした口調で、事実を述べている。
1451 = "「Đúng vậy. Dù chênh lệch chưa đến mười phút,\nnhưng người đầu tiên làm tình với anh Soutetsu là……bé Nagi.」"
# monologue
# JP: ただそれだけのことなのに、\n言うに言われぬ迫力を何故か、感じてしまう。
1588 = "Em ấy đang nói ra sự thật với giọng điệu đều đều."
# 【ふかみ】
# display as 深美
# JP: 「だから、ふたりきりデートは、わたしが二回で、\n凪ちゃんが一回。これで、ぎりぎり公平かなって」
1087 = "Chỉ là vậy thôi, nhưng không hiểu sao\ntôi lại cảm nhận được một sức ép khó tả."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1129 = "「Vì vậy, hẹn hò riêng hai người, em sẽ được hai lần,\ncòn bé Nagi một lần. Thế này là vừa đủ công bằng rồi nhỉ.」"
# monologue
# JP: ふかみと凪との、それが決定事項なら、\n僕があれこれ口をはさむべきことでも無い。
1431 = "「Vậy sao.」"
# monologue
# JP: ふかみの声からも謎の迫力が綺麗に失せて、\nむしろ楽しげに弾み始める。
1473 = "Nếu đó là quyết định của Fukami và Nagi,\nthì tôi cũng không nên xen mồm vào làm gì."
# 【ふかみ】
# display as 深美
# JP: 「それでわたし、一回目は見てもらおうって思ったんです。\n自分のホームで、船頭をしてるわたしの姿――」
1088 = "Sức ép bí ẩn trong giọng nói của Fukami cũng hoàn toàn biến mất,\nthay vào đó, em ấy bắt đầu trở nên vui vẻ, hào hứng."
# monologue
# JP: 言ってふかみは、舳先でしゃん、と背筋を伸ばす。\n伸ばしながらもその頬が、じわじわ赤に染まってく。
1561 = "「Vì vậy, em muốn anh xem lần đầu tiên.\nHình ảnh em đang chèo thuyền trên sân nhà của mình——」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんが、う、美しいって……言ってくれたわたしで。\n双鉄さんに……す、好きに、なって、もらいたく、って」
1135 = "Nói rồi, Fukami đứng thẳng lưng ở mũi thuyền.\nDù đang vươn thẳng người, đôi gò má em vẫn dần ửng đỏ."
# 【双鉄H】
# display as 雙鐵
# JP: 「“好きになる”のか？　それは無理だ」
1123 = "「Một em, đã được anh Soutetsu……khen là đ, đẹp.\nEm muốn……anh Soutetsu……sẽ, sẽ thích, em, hơn nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「え！？　ええっ！？　な、なんで――です、か？」
1031 = "「“Thích em hơn” sao? Chuyện đó là không thể nào.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
990 = "「Hả!? Ơ!? T, tại sao——vậy, ạ?」"
# monologue
# JP: 舟が揺れる、瀬でも無いのに激しく。\nその反応に、自分の言葉が著しく不足していたと知る。
1546 = "「Uoa!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何故って、僕は、すでにふかみを好きだからだ」
1117 = "Chiếc thuyền rung lắc dữ dội dù không phải ở chỗ nước chảy xiết.\nPhản ứng đó khiến tôi nhận ra lời nói của mình thiếu sót trầm trọng."
# 【ふかみ】
# display as 深美
# JP: 「ふえっ！！？」
993 = "「Tại sao á, vì anh đã thích Fukami mất rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「“もっと好き”“更に好き”にならなれるだろうが……\n既にふかみを好きな僕が、“好きになる”のは不可能だ」
1081 = "「Hể!!?」"
# 【ふかみ】
# display as 深美
# JP: 「好き……好きって……双鉄さんが、わたしのことを――\nすでに好き、って……ふあ、ぁっ」
1039 = "「Chắc chắn là sẽ “thích nhiều hơn”, “thích hơn nữa”……\nNhưng một người đã thích Fukami như anh, thì làm sao có chuyện “bắt đầu thích” được nữa.」"
# monologue
# JP: （ぐらっ！）
1678 = "「Thích……thích……Anh Soutetsu, đối với em——\nĐã thích em rồi, sao……phù, ah.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！？」
1116 = "（Tròng trành!）"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　あっ！　双鉄さん、今こっちに来ちゃっ――\nきゃっ！？　わあああああっ！？」
995 = "「Fukami!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んぬっ！？」
1059 = "「Hả!? A! Anh Soutetsu, khoan hẵng qua đây——\nÁ!? Oa a a a a a a a!?」"
# monologue
# JP: （ざっぼーーーーーーーーんっ！！！）
1675 = "「Ưm!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……う……むっ…………ぬっ…………」
781 = "（Ùm m m m m m m m m m m m!!!）"
# 【ふかみ】
# display as 深美
# JP: 「よいしょ、よいしょ――ごし、ごし――ごし、ごし」
1064 = "「……Ư……ưm…………ưm…………」"
# monologue
# JP: ……懸命に、ふかみが僕を拭ってくれてる。\n拭ってくれているのは実に、ありがたいのだが――
762 = "「Ây da, ây da——chà, chà——chà, chà.」"
# 【ふかみ】
# display as 深美
# JP: 「ごし、ごし――ふき、ふき――ん……どうでしょう？\nだいぶ、双鉄さん乾きましたか？」
1093 = "……Fukami đang ra sức lau người cho tôi.\nĐược em ấy lau cho thì đúng là biết ơn thật đấy, nhưng mà——"
# 【双鉄H】
# display as 雙鐵
# JP: 「う……うむ」
1053 = "「Chà, chà——lau, lau——ưm……sao rồi ạ?\nAnh Soutetsu đã khô bớt chút nào chưa?」"
# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。お風呂沸かしてるんですけど……\n時間、まだまだかかっちゃいますから」
1074 = "「Ư……ưm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや……うむ」
981 = "「Em xin lỗi. Em đang đun nước tắm rồi nhưng……\nChắc là vẫn còn phải mất thêm một lúc nữa.」"
# monologue
# JP: 隆盛を極めていた頃には、冬場の川下りも大繁盛で、\n冷えきった船頭さんたちに仕事後の風呂を提供していた。
1312 = "「Không sao……ưm.」"
# monologue
# JP: ゆえに、ここの風呂は非常に湯船が大きくて、\n沸かすのにも相当な時間が掛かってしまう――のだそうだ。
1581 = "Vào thời kỳ hưng thịnh, dịch vụ đi thuyền xuôi dòng vào mùa đông rất đắt khách,\nhọ thường cung cấp nước tắm sau giờ làm việc cho những người lái đò bị lạnh cóng."
# 【ふかみ】
# display as 深美
# JP: 「あ……まだこの辺、全然拭けて無いですね。\nごめんなさい――ん……よいしょ、よい、っしょ」
1018 = "Vì thế, bồn tắm ở đây cực kỳ lớn,\nnên việc đun nước cũng mất khá nhiều thời gian——nghe nói là vậy."
# monologue
# JP: だから、ふかみは僕を拭く。\n濡れてスケスケの服を、下着を、そのまま身につけながら。
1484 = "「A……chỗ này vẫn chưa lau được chút nào cả.\nEm xin lỗi——ưm……ây da, ây, da.」"
# monologue
# JP: 無駄な水滴を飛ばさないよう僕を寝かせて、\nその上で、一生懸命、腰をふりふり、僕を拭く。
1500 = "Vì thế, Fukami đang lau người cho tôi.\nTrong khi vẫn đang mặc nguyên bộ quần áo, đồ lót ướt sũng, mỏng tang."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんに、風邪とかひかせたら申し訳ないですし。\nわたし、いくらでも拭きますから」
1121 = "Để tránh làm văng những giọt nước thừa thãi, em ấy bảo tôi nằm xuống,\nrồi ngồi lên trên, ra sức lắc lư eo, lau người cho tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――風邪をひく心配はなかろうさ」
1107 = "「Nếu để anh Soutetsu bị cảm lạnh thì em thấy có lỗi lắm.\nEm sẽ lau cho anh bao nhiêu cũng được.」"
# monologue
# JP: 目の前に、ふかみのパンツの股間が広がる。\n水をたっぷり含んで張り付き、濡れている。
1520 = "「Không sao đâu——chắc là không lo bị cảm lạnh đâu.」"
# monologue
# JP: 拭く動きにつれ、それが近づき、遠ざかっては、\nぽたりぽたりと僕の顔面に滴を落とす。
1319 = "Ngay trước mắt tôi, là phần háng quần lót của Fukami đang banh rộng.\nNó ướt sũng, ngậm đầy nước và dính chặt vào da."
# 【双鉄H】
# display as 雙鐵
# JP: 「一生懸命拭いてもらえたおかげで僕は――\nすっかり、熱くなってしまった」
952 = "Theo từng nhịp lau, nó cứ tiến lại gần rồi lại lùi ra xa,\ntừng giọt, từng giọt nước nhỏ xuống mặt tôi."
# 【ふかみ】
# display as 深美
# JP: 「あ――」
1019 = "「Nhờ em lau người cho nhiệt tình quá nên anh——\nĐã hoàn toàn nóng lên mất rồi.」"
# monologue
# JP: ふかみの鼻先、すぐのところで、\n僕の勃起がズボンを大きく持ち上げている。
1379 = "「A——」"
# monologue
# JP: ふかみはそれを認識し、少しも顔をそらしはしない。\nならば、やはり――これは、誘惑に違いなかろう。
1465 = "Ngay sát chóp mũi của Fukami,\ndương vật đang cương cứng của tôi đã nhô cao lên lớp quần."
# 【双鉄H】
# display as 雙鐵
# JP: 「むしろ、ふかみがぐしょぐしょに濡れてしまってる。\n僕でよければ――拭くのを、喜んで手伝うが？」
1083 = "Fukami nhận ra điều đó, nhưng không hề ngoảnh mặt đi.\nNếu vậy thì, quả nhiên——đây chắc chắn là một sự cám dỗ rồi."
# 【ふかみ】
# display as 深美
# JP: 「あっ！　はい！　はい！　おねがいしますっ！！」
1026 = "「Đúng hơn là, Fukami đang ướt sũng rồi kìa.\nNếu em không phiền——anh rất sẵn lòng giúp em lau người đấy?」"
# monologue
# JP: 弾む声。
1453 = "「A! Vâng! Vâng! Trăm sự nhờ anh ạ!!」"
# monologue
# JP: 誘惑かどうかの判断をなかなかつけかねていたせいで、\nふかみを焦らす形になってしまっていたかと思わせられる。
1305 = "Giọng nói vui vẻ, hào hứng."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば」
1068 = "Vì tôi mãi không thể xác định được đó có phải là cám dỗ hay không,\nnên có vẻ như tôi đã vô tình khiến Fukami phải nóng lòng chờ đợi."
# monologue
# JP: （じゅぶるっ！！）
1655 = "「Nếu vậy thì.」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！」
969 = "（Nhóp nhép!!）"
# monologue
# JP: （じゅっ――じゅるっ――れろっ――れろおおっ）
1654 = "「Hya fu!」"
# monologue
# JP: 焦らしてしまったことを少しでもお詫びしたくて。
1263 = "（Chụt——rột——liếm——liếm liếm liếm）"
# monologue
# JP: 最初からもう全開で、パンツ越しに張り付き浮かぶ縦すじに、\nキスしてそのまま、思いっきりに舌を這わせる。
1382 = "Chỉ muốn bù đắp một chút cho việc đã khiến em ấy phải chờ đợi."
# 【ふかみ】
# display as 深美
# JP: 「ふぁ、あっ――べろ……あったか……いっ……んうっ」
992 = "Ngay từ đầu đã tung hết sức, tôi hôn lên đường rãnh dọc đang in hằn qua lớp quần lót,\nrồi cứ thế thè lưỡi liếm láp thật mạnh."
# monologue
# JP: （れるっ！　れろっ――じゅうううっ――はむっ！」
1553 = "「Phù, ah——lưỡi……ấm……quá……ưm.」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あっ――わたしの――おまんこっ――\n双鉄、さんの――おくちっ――おくち、でっ――」
987 = "（Liếm! Liếm——chụt——ngoạm!」"
# monologue
# JP: 瑞々しい、というよりもむしろ水そのものの味が広がり。
1300 = "「Phù——ah——của em——âm đạo——\nMiệng của——anh Soutetsu——bằng miệng——」"
# monologue
# JP: けれどもそこにすぐさまに、\n熱さを帯びた薄い酸味の、ぬらつく蜜が混じり始める。
1253 = "Không hẳn là tươi mát, mà đúng hơn là hương vị của nước lan tỏa trong miệng."
# monologue
# JP: （ぺろっ！　れろっ！　れりゅっ！　にゅるうっ！）
1681 = "Nhưng ngay sau đó,\nvị mật ngòn ngọt, mang theo chút hơi ấm bắt đầu hòa quyện vào."
# 【ふかみ】
# display as 深美
# JP: 「あ……や……しみ、てるっ――ん――わたし、おまんこ――双鉄さんの、ツバが……、しみ、て――あつ、くて」
1001 = "（Liếm! Liếm! Liếm! Nhóp nhép!）"
# monologue
# JP: （じゅるっ――じゅううっ！　じゅぶうっ！　ごくっ！）
1651 = "「A……ya……thấm, vào rồi——ưm——em, âm đạo——nước bọt của anh Soutetsu……, thấm, vào——nóng, quá.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――ふっ――やけ、て――とけ、ちゃうっ――\nわた、しの――おまんこっ――ん――とけちゃう、よぉ」
1003 = "（Rột——chụt! Nhóp nhép! Ực!）"
# monologue
# JP: 溶かしてやりたい。もっと、もっとに舐めしゃぶり。\nだが、そうするにはこの薄衣が――
1326 = "「Ah——phù——cháy, mất——tan chảy, mất——\nCủa, em——âm đạo——ưm——tan chảy, mất thôi.」"
# monologue
# JP: 厚さ数ミリにも満たぬであろう、\n濡れて張り付くパンツがどうにも、邪魔すぎる。
1580 = "Anh muốn làm em tan chảy. Liếm láp, mút mát nhiều hơn, nhiều hơn nữa.\nNhưng để làm được điều đó, thì lớp vải mỏng này——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷぁ。随分と濡れてしまっているな。\nこれは脱がんと……ふかみこそ風邪を引きかねん」
1045 = "Dù độ dày có lẽ chưa đến vài milimet,\nnhưng chiếc quần lót ướt sũng dính chặt này thực sự quá vướng víu."
# 【ふかみ】
# display as 深美
# JP: 「あ……は、はい。――そう、ですよね。\nわた……し、こんなに――ぐしょぐしょ……で」
1014 = "「Ưm——phù. Em ướt sũng hết cả rồi.\nThế này mà không cởi ra……thì Fukami sẽ bị cảm lạnh mất.」"
# monologue
# JP: ぽた――り。
1499 = "「A……v, vâng. ——Đúng, vậy nhỉ.\nEm……cũng, ướt nhẹp……thế này, rồi.」"
# monologue
# JP: 股間から糸をひくように滴が落ちる。\nふかみの腰が、またもじもじと揺れ動く。
1476 = "Tỏng——tỏng."
# 【ふかみ】
# display as 深美
# JP: 「あ、あの――わたし――上は、自分――自分で、脱ぐっ\nその――脱ぎます、から――」
1133 = "Từng giọt nước nhỏ xuống từ háng em như kéo thành sợi.\nEo của Fukami lại bắt đầu đung đưa, cọ quậy."
# monologue
# JP: 匂いが濃くなる。
1440 = "「A, ừm——em——phần trên, em sẽ tự——tự cởi,\nừm——em sẽ cởi, nên——」"
# monologue
# JP: 体がどんどん熱くなり、\n肌と肌とが触れ合う部分が、お互いの汗にぬらついていく。
1378 = "Mùi hương trở nên nồng đậm hơn."
# 【ふかみ】
# display as 深美
# JP: 「だから……下……あの、下、は――できっ、でき――\nでき、たら……そのっ！　双鉄、さん――に……」
1085 = "Cơ thể ngày càng nóng lên,\nnhững phần da thịt chạm vào nhau ướt đẫm mồ hôi của cả hai."
# 【双鉄H】
# display as 雙鐵
# JP: 「望むところだ」
1106 = "「Vì thế……phần dưới……ừm, phần dưới——nếu, nếu——\nNếu được……ừm! Nhờ anh, Soutetsu——làm, giúp em……」"
# 【ふかみ】
# display as 深美
# JP: 「あっ」
# 1019 = "「啊」" 
# monologue
# JP: 嬉しげな声に心地よく鼓膜を揺すられながら、\n張り付く布をゆっくり剥がし、ふかみの下を全部脱がせる。
1535 = "「Chính là điều anh đang mong đợi đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……わた、し……わた、し……おま、んこ……\n双鉄さんの……お顔の……こんな……こんな近く、で」
1015 = "Màng nhĩ tôi rung lên dễ chịu bởi giọng nói đầy vui sướng,\ntôi từ từ lột lớp vải đang dính chặt ra, cởi sạch phần dưới của Fukami."
# monologue
# JP: 剥き出しになったおまんこを、\nあらためてまじ、と見てみれば――
1358 = "「A……của, em……của, em……âm, đạo……\nKhuôn mặt của……anh Soutetsu……gần……gần thế này.」"
# 【双鉄H】
# display as 雙鐵
# JP: （おお……）
1659 = "Nhìn lại một lần nữa vào âm đạo đã hoàn toàn phơi bày,\ntôi chăm chú quan sát——"
# monologue
# JP: ふかみのおまんこの、その向こう。
1442 = "（Ồ……）"
# monologue
# JP: 完全にフラットな腹のラインの先にぷるん、と、\n小ぶりなお椀の形の胸が、ピンクの乳首が見えている。
1309 = "Phía bên kia âm đạo của Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: 「……ふかみの肉には、無駄がない。\n顔もそうだが、体も本当に綺麗だな」
779 = "「……Cơ thể của Fukami, không có lấy một chỗ thừa.\nKhuôn mặt đã đành, nhưng cơ thể cũng thật sự rất đẹp.」"
# 【ふかみ】
# display as 深美
# JP: 「ひえっ！？　えっ！？　ふわっ――あっ！\nわた――わた――わたしっ――そんなっ！！」
976 = "「Hi e!? Ơ!? Phù ah——a!\nE——e——em——sao có thể!!」"
# monologue
# JP: （ぎゅうっ！）
1660 = "（Áp sát!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1054 = "「Ưm!」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
# 969 = "「呀！」" 
# monologue
# JP: 照れたふかみは顔をとっさに埋めようとし、\n僕の勃起に、思いっきりの頬ずりをする。
1446 = "Fukami xấu hổ, vội vàng cúi mặt xuống,\nrồi áp chặt má vào dương vật đang cương cứng của tôi."
# monologue
# JP: 待ちかねていた快感に勃起はびくりと暴れてしまい、\nふかみは驚いて顔をあげ――
1304 = "Khoái cảm chờ đợi từ lâu khiến dương vật giật nảy lên,\nFukami giật mình ngẩng mặt lên——"
# 【ふかみ】
# display as 深美
# JP: 「こ……れ……」
1128 = "「Cái……này……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕のも、ふかみに脱がせて欲しい」
944 = "「Anh cũng muốn Fukami cởi cho anh.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、はい」
1032 = "「A, vâng.」"
# monologue
# JP: いそいそと、ふかみの指が蠢いて、\n僕のズボンのボタンを外す。
1493 = "Những ngón tay của Fukami thoăn thoắt cử động,\ntháo cúc quần của tôi."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
989 = "「Phù ah!」"
# monologue
# JP: ズボンと下着をずりおろし、勃起を露出させた途端に、\n弾んだ息が、亀頭を強く、甘くくすぐる。
1317 = "Ngay khi quần ngoài và quần lót được tuột xuống, dương vật lộ ra,\nhơi thở gấp gáp của em ấy phả vào, mơn trớn quyến rũ đầu khấc."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんの、お、おちん、ちん……あんなに、ごしごし、\n拭いたのに。すごく、てらてら……濡れちゃって、ます」
1134 = "「C, chim của……anh Soutetsu……rõ ràng là, em đã lau,\nrất kỹ rồi mà. Thế mà vẫn, bóng loáng……ướt sũng, rồi ạ.」"
# monologue
# JP: ……確かに、濡れているだろう。\n先走り汁が滲んできたのを、随分前から感じてた。
766 = "「……Chắc chắn là ướt rồi.\nAnh đã cảm nhận được dâm thủy rỉ ra từ nãy đến giờ rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「拭くだけじゃ……だめ……。おちんちん……からからに、\nなるまで……絞らない、と……きっと、ダメ、ですよね」
1119 = "「Chỉ lau thôi thì……không được đâu…… Chim……phải vắt,\ncho đến khi……khô kiệt……nếu không……chắc chắn là, không được, đúng không ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そう、だな」
1101 = "「Đúng, vậy nhỉ.」"
# monologue
# JP: ふかみが、勃起を絞ってくれる。\nからからに乾いてしまうまで――
1486 = "Fukami, sẽ vắt kiệt dương vật đang cương cứng của tôi.\nCho đến khi khô kiệt hoàn toàn——"
# monologue
# JP: 凄まじく魅力的なその提案を、\nけれども僕は、ほんの一部だけ退ける。
1589 = "Lời đề nghị vô cùng hấp dẫn đó,\nnhưng tôi chỉ từ chối một phần nhỏ."
# 【双鉄H】
# display as 雙鐵
# JP: 「が、完全にカラカラにするのは勘弁してくれ。\nふかみの膣を満たす分は、残しておきたく思うから」
948 = "「Nhưng mà, xin em đừng vắt khô kiệt hoàn toàn nhé.\nAnh muốn giữ lại một phần để lấp đầy âm đạo của Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
1022 = "「A!」"
# monologue
# JP: ふかみの後頭部が揺れる。\n目の前にあるおまんこまでも、強い頷きにあわせて揺れる。
1494 = "Đầu Fukami gật mạnh.\nNgay cả âm đạo trước mắt cũng rung lên theo cái gật đầu mạnh mẽ đó."
# 【ふかみ】
# display as 深美
# JP: 「そうですね！　そうだ、うん。そう。絶対必要。\n了解です。わたし、がんばって調整しますね」
1075 = "「Đúng vậy nhỉ! Đúng rồi, vâng. Đúng vậy. Tuyệt đối cần thiết.\nEm hiểu rồi ạ. Em, sẽ cố gắng điều chỉnh nhé.」"
# monologue
# JP: 力んだ声。\nふんふん荒い鼻息は、勃起を揺らしかねない程の勢いだ。
1474 = "Giọng nói đầy quyết tâm.\nHơi thở gấp gáp, mạnh mẽ đến mức làm rung chuyển cả dương vật."
# 【ふかみ】
# display as 深美
# JP: 「それじゃ……軽めに。軽めに、いきます――\nん……っと――（ちゅっ！）」
1130 = "「Vậy thì……em sẽ làm nhẹ nhàng thôi. Nhẹ nhàng, thôi ạ——\nƯm……(Chụt!)」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
# 1054 = "「嗯！」" 
# monologue
# JP: 勃起の先端にキスされて、\n痺れに近い快感が、腰の骨にまで染みてくる。
1244 = "Đầu dương vật được hôn một cái,\nmột khoái cảm gần như tê dại thấm sâu vào tận xương chậu."
# 【ふかみ】
# display as 深美
# JP: 「わ……ビクって、こんなに大きく動くんですね。\nこれって……感じてくれてる、ってことですよね？」
985 = "「Oa……giật nảy lên, chuyển động mạnh thế này cơ ạ.\nThế này là……anh đang cảm thấy sướng, đúng không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。素晴らしく気持ちいい」
1102 = "「Ừ. Vô cùng sung sướng.」"
# 【ふかみ】
# display as 深美
# JP: 「うふふ、嬉しいです。もっと……からっぽにならない\nギリギリくらいに、気持ちよくなって下さいね？」
1063 = "「Ufufu, em vui lắm. Hãy……cảm thấy sướng,\nđến mức suýt soát……sắp cạn kiệt luôn nhé?」"
# monologue
# JP: 言葉に遅れて、ん……っと鼻が鳴るような音。\nそうして勃起に、口からのゆるい息がかかって――
1562 = "Theo sau lời nói là âm thanh ưm……như tiếng rên mũi.\nSau đó, hơi thở nhẹ nhàng từ miệng phả vào dương vật——"
# 【ふかみ】
# display as 深美
# JP: 「あむっ！　――んっ……ん～～～――ちゅっ！――\nちゅるっ――ちゅっ――ちゅうっ――じゅるるっ！！」
1021 = "「A ngoạm! ——Ưm……ưm~~~——chụt!——\nChụt rột——chụt——chụt——rột rột!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あ……」
980 = "「Kh——a……」"
# monologue
# JP: ふかみの口は僕の勃起より温度が低い。
1466 = "Miệng của Fukami có nhiệt độ thấp hơn dương vật của tôi."
# monologue
# JP: が、包んでもらえば時間につれて、\nじわりじわりと温かになる。
1249 = "Nhưng khi được ngậm lấy, theo thời gian,\nnó dần dần, dần dần trở nên ấm áp hơn."
# 【双鉄H】
# display as 雙鐵
# JP: （勃起の熱が――ふかみの口内を侵してるのか）
1676 = "（Hơi nóng của dương vật——đang xâm chiếm khoang miệng của Fukami sao.）"
# monologue
# JP: 気付きが、僕を更に発熱させていく。\nもっと、ふかみを熱くしたい。おまんこも熱く燃やしたい。
1583 = "Nhận ra điều đó khiến tôi càng thêm nóng rực.\nTôi muốn làm Fukami nóng hơn nữa. Muốn âm đạo của em ấy cũng bốc cháy."
# monologue
# JP: ――思いは、すぐさま動きに変わる。
758 = "——Suy nghĩ đó, ngay lập tức biến thành hành động."
# monologue
# JP: （じゅぶるううううっ！！）
# 1655 = "（啾！！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゅあ！？――ンッ――むっ――んっ――ちゅううっ！\nちゅるっ――ぢゅむっ！　じゅぷっ！　ぢゅろっ！！」
974 = "「Hyu a!?——Ưm——ưm——ưm——chụt ưm!\nChụt rột——rột! Nhóp nhép! Nhóp nhép!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――」
1040 = "「Ưm——」"
# monologue
# JP: ふかみのおまんこを舐めればそこは大きく震え、\nすぐさまおかえしの快感が僕の勃起をくるんで満たす。
1372 = "Khi tôi liếm âm đạo của Fukami, chỗ đó rung lên mạnh mẽ,\nngay lập tức khoái cảm đáp trả bao trùm và lấp đầy dương vật của tôi."
# monologue
# JP: ふかみの舌は快感にわななきあえぎつつ、その振動を\n僕へと返し――お互いが、性感を増幅させていく。
1480 = "Lưỡi của Fukami run rẩy rên rỉ trong khoái cảm, truyền sự rung động đó\nđến tôi——cả hai cùng nhau, khuếch đại cảm giác sung sướng."
# 【ふかみ】
# display as 深美
# JP: 「じゅっ！　じゅるっ！　でゅぶっ！　じゅうっ！\nんっ――れろっ――れるっ――れろおおっ――ぢゅぶ！」
1037 = "「Chụt! Chụt rột! Rột! Chụt!\nƯm——liếm——liếm——liếm liếm liếm——nhóp nhép!」"
# monologue
# JP: ふかみの蜜が溢れすぎ、やむなく飲み込むその一挙動が、\n舌の動きを緩慢にする。
1514 = "Mật ngọt của Fukami tràn ra quá nhiều, buộc tôi phải nuốt xuống,\nhành động đó làm chuyển động của lưỡi chậm lại."
# 【ふかみ】
# display as 深美
# JP: 「れるっ――ぢゅっ！　ぢゅぼっ！　ぼちゅっ！\nじゅるっ！　じゅっ！　じゅうっ！　じゅるんっ！！」
1036 = "「Liếm——chụt! Nhóp nhép! Bụp!\nChụt rột! Chụt! Chụt! Chụt rột!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――れろっ――くっ――ご、くっ――」
1051 = "「Ưm——liếm——kh——ự, c——」"
# 【ふかみ】
# display as 深美
# JP: 「ひもひひょふはっへふははひ……んっ――れろっ――\nじゅっ――ほーへふはん……ちゅむっ――」
1077 = "「Hi mo hi hyo fu ha he fu ha ha hi……ưm——liếm——\nChụt——ho he fu han……chụt ưm——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ……」
# 980 = "「呃……啊……」" 
# monologue
# JP: コツを掴んだか、勃起の形を口が完全に把握したのか、\nふかみの口はうねり蠢き、僕の精液を絞りに来てる。
1245 = "Không biết là đã nắm được bí quyết, hay miệng em ấy đã hoàn toàn nắm bắt được hình dáng của dương vật,\nmiệng Fukami uốn lượn, luồn lách, đến để vắt kiệt tinh dịch của tôi."
# monologue
# JP: このままだったら、一方的にイかされる。\nそれはそれで、幸福なことにも思えるのだが――
1582 = "Cứ thế này, tôi sẽ bị ép lên đỉnh một chiều mất.\nDù điều đó cũng có thể coi là hạnh phúc, nhưng mà——"
# monologue
# JP: （つんっ、つん――つつん）
1648 = "（Chọc, chọc——chọc chọc）"
# monologue
# JP: ――だが、僕とてふかみをイカせたい。\n舌先を軽く尖らせ、ふかみの膣口に浅く差し込んでみる。
755 = "——Nhưng mà, tôi cũng muốn làm Fukami lên đỉnh.\nTôi hơi nhọn đầu lưỡi, thử đút nông vào cửa mình của Fukami."
# monologue
# JP: （きゅ――きゅきゅっ！）
1652 = "（Kyu——kyu kyu!）"
# monologue
# JP: 途端に舌は締め付けられるが、これなら進める。\n確信すると同時に舌を、思いっきりに固くし伸ばして！
1376 = "Ngay lập tức lưỡi tôi bị siết chặt, nhưng thế này thì vẫn tiến vào được.\nĐồng thời với sự tự tin đó, tôi làm cứng lưỡi hết cỡ và đẩy sâu vào!"
# monologue
# JP: （ぬろおおおおおおおっ！！！）
1683 = "（Liếm m m m m m m m m!!!）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅぅっ！！」
1057 = "「Ưm kyuuu!!」"
# monologue
# JP: 勃起ほどには奥を突けない。\nだからそのまま、届く限りの範囲を一気に舐め回すっ！
1543 = "Không thể đâm sâu như dương vật được.\nNên cứ thế, tôi liếm láp một mạch trong phạm vi có thể chạm tới!"
# monologue
# JP: （べおおおっ！　べろっ！　にゅりゅうっ！　ざりゅ！）
1682 = "（Liếm m m m! Liếm! Liếm m m! Rột!）"
# 【ふかみ】
# display as 深美
# JP: 「っ！！？――あひゅうううううんっ！！！」
1058 = "「!!?——A hyu u u u u u ưm!!!」"
# monologue
# JP: （ぶるっ！）
1658 = "（Rùng mình!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くおっ！」
982 = "「Kh oa!」"
# monologue
# JP: 粒だったような感触を、舌の腹広くがとらえた瞬間、\nふかみの舌が大きく震え僕の射精の引き金を引くっ！
1311 = "Khoảnh khắc phần lớn bề mặt lưỡi tôi chạm vào cảm giác sần sùi như những hạt nhỏ,\nlưỡi Fukami rung lên dữ dội, bóp cò cho tôi xuất tinh!"
# monologue
# JP: （びゅっ！　んびゅっ！　びゅるっ！　びゅうううっ！）
1645 = "（Phụt! Ưm phụt! Phụt! Phụt t t t!）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅっ――ひっ――イっ――んんん～～んっ！\nんくっ――ごくっ――じゅううっ――ごきゅっ」
1042 = "「Ưm kyu——hi——lên——ưm ưm ưm~~ưm!\nƯm kh——ực——chụt——ực」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ……あっ――ああっ――あ――」
1004 = "「A……ah——ahhh——a——」"
# monologue
# JP: （びゅうっ！　びゅるっ！　ぶびゅっ！　びゅっ！）
# 1645 = "（呲！呲！呲！呲！）" 
# monologue
# JP: ふかみを、イかせた。\n同時に、イけた。
1392 = "Tôi đã làm Fukami, lên đỉnh.\nĐồng thời, tôi cũng lên đỉnh."
# monologue
# JP: その感動は、けれどもすぐさま、\nもっと大きな感動によって塗りつぶされる。
1579 = "Sự cảm động đó, nhưng ngay lập tức,\nđã bị bao trùm bởi một sự cảm động lớn lao hơn."
# 【ふかみ】
# display as 深美
# JP: 「ごくっ――ごくんっ――んぷっ――ごくっ――\nじゅっ――じゅるうるっ――ん、くっ――ごくんっ」
984 = "「Ực——ực——ưm bụp——ực——\nChụt——chụt rột——ưm, kh——ực」"
# monologue
# JP: どくどくと出て行く精液が、\n出て行く端から、ごくごく飲まれる。
1532 = "Tinh dịch tuôn ra ùng ục,\nvừa trào ra đến đâu, liền bị uống ực ực đến đó."
# monologue
# JP: ふかみが僕の精液を、吸いだしてまで、\nあのか細い喉に、落としてくれてる――
1448 = "Fukami hút lấy tinh dịch của tôi,\nrồi nuốt xuống cái cổ họng thanh mảnh ấy——"
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――ぷ、あ……あっ――」
1047 = "「Ưm……ah——phù, a……ah——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！」
1115 = "「Fukami!」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！！」
1029 = "「A!!」"
# monologue
# JP: 体を起こし、ふかみを抱き寄せ、キスしてる。
1364 = "Tôi nhổm dậy, ôm Fukami vào lòng và hôn."
# 【ふかみ】
# display as 深美
# JP: 「あ……んっ――ちゅっ――ん――むっ――」
1012 = "「A……ưm——chụt——ưm——ưm——」"
# 【双鉄H】
# display as 雙鐵
# JP: （ぉっ――むっ――）
1650 = "（Ồ——ưm——）"
# monologue
# JP: ふかみの口内、驚くほどに粘度の高いエグみが\nこびりつき残ってる。
1468 = "Bên trong khoang miệng Fukami, vị chát với độ nhớt cao đến kinh ngạc\nvẫn còn bám dính lại."
# monologue
# JP: それを丁寧に舌先を使いこそぎとり、\n感謝の気持ちと思いとを、僕なりの形に示してく。
1367 = "Tôi cẩn thận dùng đầu lưỡi cạo sạch nó,\nthể hiện lòng biết ơn và tình cảm theo cách riêng của mình."
# 【ふかみ】
# display as 深美
# JP: 「ん……はっ――ふあぁ……ぷあっ」
1048 = "「Ưm……ha——phù ah……phù ah」"
# monologue
# JP: （にゅるっ――ぬるっ）
1653 = "（Nhóp nhép——nhóp nhép）"
# monologue
# JP: 無意識にだろうか。\nふかみの腰が動いてる。
1459 = "Không biết có phải là vô thức hay không.\nEo của Fukami đang cử động."
# monologue
# JP: 僕の勃起を小さなおまんこで押しつぶし、\nその姿勢のまま、蜜を丹念に塗りつけにくる。
1321 = "Em ấy dùng âm đạo nhỏ bé ép chặt lấy dương vật đang cương cứng của tôi,\nvà trong tư thế đó, em ấy cẩn thận bôi mật dịch lên."
# 【双鉄H】
# display as 雙鐵
# JP: （ぐちゅぐちゅに蕩け、ほぐれているな。\nこれなら……）
1661 = "（Đã mềm nhũn và ướt sũng rồi.\nThế này thì……）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみ――このまま、挿れるぞ？」
1112 = "「Fukami——cứ thế này, anh đút vào nhé?」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　はいっ！　来てください、双鉄さん」
1070 = "「Vâng! Vâng ạ! Xin anh hãy vào đi, anh Soutetsu.」"
# monologue
# JP: 言葉と同時に、腰が蠢く。\n心も体も、僕を求めてくれている。
1565 = "Cùng lúc với lời nói, eo em ấy cọ quậy.\nCả tâm hồn và thể xác, đều đang khao khát tôi."
# monologue
# JP: 僕の心身もそれに答える。\nふかみを欲しがる気持ちが素直に、動きに変わる。
1356 = "Tâm trí và cơ thể tôi cũng đáp lại điều đó.\nCảm giác khao khát Fukami thành thật chuyển hóa thành hành động."
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――ふ……うっ」
1046 = "「Ưm……ah——phù……ư」"
# monologue
# JP: （きち……ち……）
1680 = "（Khít……khít……）"
# monologue
# JP: 落ち着いてじっくり挿入すれば、感じる。
1354 = "Bình tĩnh và từ từ đút vào, tôi mới cảm nhận được."
# monologue
# JP: 凪が余りに狭すぎるゆえ、初めてのときは感じなかったが\n……ふかみの膣も、やはり相当に狭く、きつい。
1276 = "Vì của Nagi quá chật hẹp, nên lần đầu tiên tôi không cảm nhận được\n……nhưng âm đạo của Fukami, quả nhiên cũng khá hẹp và khít."
# 【ふかみ】
# display as 深美
# JP: 「あ……んっ――はっ――おっきい、ですっ――\n双鉄、さん、の――んっ――おなか――ささ、って――」
1011 = "「A……ưm——ha——to, quá ạ——\nBụng——của anh Soutetsu——đang đâm, vào——」"
# monologue
# JP: 切れ切れの声。\nだが、辛そうなものとは感じない。
1475 = "Giọng nói đứt quãng.\nNhưng tôi không cảm thấy em ấy đang đau đớn."
# monologue
# JP: 狭くてキツイ膣ではあるが、\n強いぬかるみと和らぎとが、僕の進みを援けてくれる。
1590 = "Dù là một âm đạo chật hẹp và khít khao,\nnhưng sự trơn ướt và mềm mại mạnh mẽ, đã giúp tôi tiến vào dễ dàng hơn."
# monologue
# JP: （ぬっ――ずっ――ずうっ――ズッ――）
1665 = "（Phập——phập——phập——phập——）"
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――なか……が――おされ――て――\nふあっ――ひっ――めく、れる……みたい――でっ」
1049 = "「Ưm……ah——bên trong……bị đẩy——vào——\nPhù ah——hi——như bị, lộn ngược……vậy——」"
# monologue
# JP: だが、焦らない。\nふかみだってまだ、二回目のセックスに過ぎんのだ。
1355 = "Nhưng, tôi không vội vàng.\nBởi vì đây mới chỉ là lần làm tình thứ hai của Fukami thôi."
# monologue
# JP: 痛む部分が、傷が残っているかもしれん。\nそれを懸念しゆっくりゆっくり、探るようにして進んでく。
1404 = "Có thể vẫn còn những chỗ bị đau, những vết thương còn sót lại.\nLo lắng điều đó, tôi chầm chậm, chầm chậm tiến vào như đang thăm dò."
# monologue
# JP: （ぬっ――ろっ――りゅっ――くりゅんっ）
1666 = "（Phập——rột——rột——cọ xát）"
# 【ふかみ】
# display as 深美
# JP: 「ひゅあんっ！？　あっ――そこ――いま――そこっ――\nぐりって――くりゅん、って！」
977 = "「Hyu ah!? Ah——chỗ đó——vừa rồi——chỗ đó——\nCọ xát——cọ xát, rồi!」"
# monologue
# JP: （きゅうううううううっ！！！）
1664 = "（Co thắt!!!!!!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
998 = "「Ư!」"
# monologue
# JP: 腰を回して粒立つ部分をコスってみれば、\nふかみは大きく体を弾ませ、膣の締め付けを強くする。
1396 = "Khi tôi xoay eo và cọ xát vào phần sần sùi,\ncơ thể Fukami nảy lên mạnh mẽ, âm đạo siết chặt hơn."
# monologue
# JP: その反応に気を良くし、\n同じ動きを、もう何度でも繰り返してみる。
1388 = "Thấy phản ứng đó cũng tốt,\ntôi thử lặp lại chuyển động đó thêm nhiều lần nữa."
# monologue
# JP: （こりゅっ――くりゅっ――くにっ――ぎゅりゅっ）
1684 = "（Ngoáy——ngoáy——cọ——cọ xát）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ――あっ――すごっっ――そこっ――\nおまん、こっ――あつく、て――どろって――んうっ」
964 = "「Hya——ah——tuyệt quá——chỗ đó——\nÂm, đạo——nóng, quá——nhầy nhụa——ưm」"
# monologue
# JP: 快感が強烈すぎるのか、\nふかみがイヤイヤと頭を振っ――っ！
1403 = "Có lẽ vì khoái cảm quá mãnh liệt,\nFukami lắc đầu nguầy nguậy——!"
# monologue
# JP: （ばさっ）
1641 = "（Xoã!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んぷっ！」
# 1022 = "「啊！」" 
# monologue
# JP: 揺れて踊ったふかみの髪に、顔面を軽く払われ――\nうむ？
1457 = "Mái tóc đung đưa nhảy múa của Fukami khẽ lướt qua mặt tôi——\nƯm?"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみ――髪留めが外れそうだぞ？」
1110 = "「Fukami——kẹp tóc sắp tuột ra rồi kìa?」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1019 = "「啊」" 
# monologue
# JP: 髪留めの緩んだ部分を探してるのか、\nふかみが、小さく首を動かし。
1490 = "Chắc là đang tìm xem phần kẹp tóc bị lỏng ở đâu,\nFukami khẽ cử động đầu."
# monologue
# JP: そうしてそれは、とても静かな頷きになる。
1426 = "Và rồi em ấy gật đầu một cái thật khẽ."
# 【ふかみ】
# display as 深美
# JP: 「とって……ください。とって、外して。\nわたし、全部を――はだか――裸、に」
1124 = "「Lấy ra……giúp em. Lấy ra, tháo nó ra.\nEm muốn, toàn bộ——trần truồng——trần truồng, luôn」"
# 【双鉄H】
# display as 雙鐵
# JP: 「心得た――」
1069 = "「Anh hiểu rồi——」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
999 = "「A——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1137 = "「!!!」"
# monologue
# JP: ただそれだけで大きく広がる。
1395 = "Chỉ một hành động đó thôi, mái tóc xõa tung ra."
# monologue
# JP: ふかみの髪が、髪の匂いが、\nそこから漂う――女の、色香が。
1323 = "Mái tóc của Fukami, mùi hương từ mái tóc,\ntỏa ra từ đó——sự quyến rũ, sắc sảo của một người phụ nữ."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみは、少女で……同時に女でもあるのだな」
1114 = "「Fukami, là một thiếu nữ……đồng thời cũng là một người phụ nữ nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「え？　あの……そんなの、あたりまえ」
997 = "「Hả? Dạ……chuyện đó, là đương nhiên mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか？」
1103 = "「Vậy sao?」"
# monologue
# JP: 女へと脱皮しかけてる――\nその曖昧な美しさを、ふかみは自覚していない。
1461 = "Đang trong quá trình lột xác để trở thành một người phụ nữ——\nVẻ đẹp mơ hồ đó, bản thân Fukami vẫn chưa tự nhận thức được."
# monologue
# JP: 自覚をしたならその瞬間に、\nふかみはきっと、女になるのだ。
1513 = "Nếu như em ấy tự nhận thức được, thì khoảnh khắc đó,\nFukami chắc chắn, sẽ trở thành một người phụ nữ thực thụ."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。\nごくあたりまえのことだった」
1098 = "「Đúng vậy nhỉ.\nĐó là một điều hết sức đương nhiên.」"
# monologue
# JP: だから、自覚を促さない。
1409 = "Vì thế, tôi không thúc giục em ấy tự nhận thức."
# monologue
# JP: 恐らくは短いこの季節を、今しか味わえぬだろう果実を、\nたっぷりと、堪能しつくすそのために。
1401 = "Có lẽ để được thưởng thức trọn vẹn, thỏa thích trái ngọt\nchỉ có thể nếm thử vào ngay lúc này, trong cái mùa ngắn ngủi này."
# 【ふかみ】
# display as 深美
# JP: 「そ、そうですよ？\n双鉄さん、なんか、ちょっとヘン」
1095 = "「Đ, đúng vậy mà?\nAnh Soutetsu, cứ sao sao ấy, hơi kỳ lạ.」"
# monologue
# JP: （ぐいいいっ！！！）
1673 = "（Đâm sâu!!!）"
# 【ふかみ】
# display as 深美
# JP: 「んぎゅっ？！　ひ、あっ――いき、なりっ――」
1061 = "「Ưm gyu!? Hi, ah——đột, nhiên——」"
# monologue
# JP: （ごっ！　ごりゅんっ！！）
1672 = "（Phập! Ngoáy mạnh!!）"
# monologue
# JP: ふかみを大きくのけぞらせ、\nさっきの話題を快感で無理やり流してしまう。
1391 = "Tôi làm Fukami ngửa hẳn người ra sau,\ndùng khoái cảm để ép em ấy quên đi chủ đề vừa nãy."
# 【ふかみ】
# display as 深美
# JP: 「んひゅっ！　おくっ！　奥っ！　子宮っ！\n子、宮っっ――ごっ――って――ん、ごつん、って！！」
1055 = "「Ưm hyu! Sâu quá! Bên trong! Tử cung!\nTử, cung——phập——ưm, đâm trúng, rồi!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……ヘンであるのも、当然だろう。\nふかみの魅力に、僕は恐らく、狂っているのだ」
782 = "「……Trở nên kỳ lạ, cũng là điều đương nhiên thôi.\nCó lẽ, anh đã phát điên vì sự quyến rũ của Fukami mất rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「み……魅力って――んっ！」
1136 = "「M……quyến rũ——ưm!」"
# monologue
# JP: （きゅううううっ！）
1656 = "（Co thắt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！！」
# 1029 = "「啊！！」" 
# monologue
# JP: 子宮が喜び吸い付いてくる。
1334 = "Tử cung vui sướng mút chặt lấy tôi."
# monologue
# JP: たった二回目のセックスで、妊娠したいと甘えすがって、\n貪欲なまでに子種を求め、僕の亀頭をくわえようとする。
1336 = "Mới chỉ là lần làm tình thứ hai, vậy mà em ấy đã nũng nịu đòi mang thai,\nkhao khát hạt giống của tôi đến mức tham lam, cố gắng ngậm lấy đầu khấc của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
979 = "「Kh——」"
# monologue
# JP: （ずるうううううううっ！）
1674 = "（Trượt sâu u u u u u!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃああんんっ」
967 = "「Hya ah ưm」"
# monologue
# JP: だが、射精しない。\nこの快感を終わらせるなど、もったいなくて射精できない。
1251 = "Nhưng, tôi không xuất tinh.\nChấm dứt khoái cảm này thật sự quá uổng phí, tôi không thể xuất tinh được."
# monologue
# JP: わななく勃起を無理やり引いて、\n浅いところでぐりぐりまわして、ふかみを味わう。
1399 = "Tôi cố tình rút dương vật đang run rẩy ra,\nngoáy tròn ở chỗ nông, để thưởng thức Fukami."
# 【ふかみ】
# display as 深美
# JP: 「やっ――そこっ――おまんこ――入り口――そこ、だめ、\nだめ、ですぅっ――そこでイクの、ヤっ――イク、なら」
965 = "「Ya——chỗ đó——âm đạo——lối vào——chỗ đó, không được,\nkhông được, đâu ạ——lên đỉnh ở đó, ghét lắm——nếu, lên đỉnh」"
# monologue
# JP: （ずんっ！）
# 1674 = "（插！）" 
# monologue
# JP: 突けば、わななく。\nふかみの全部が、喜び震える。
1570 = "Mỗi lần tôi đâm vào, em ấy lại run rẩy.\nToàn bộ cơ thể Fukami, rung lên vì sung sướng."
# monologue
# JP: そこまで、僕を求めてくれてる――\n幸福感が脳を満たして、体の動きに力を与えるっ！
1325 = "Em ấy khao khát tôi, đến mức đó——\nCảm giác hạnh phúc lấp đầy não bộ, truyền thêm sức mạnh cho từng chuyển động của cơ thể!"
# monologue
# JP: （ずんっ！　ずうっ！　ごりゅっ！　ごちゅんっ！）
1670 = "（Phập! Phập! Cọ xát! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「はぁんっ！　そこっ！　そこおおっ！\n赤ちゃんの、部屋っ――子宮！　子宮でっ！！！」
1027 = "「Haa ah! Chỗ đó! Chỗ đó o o o!\nCăn phòng, của em bé——Tử cung! Ở tử cung!!!」"
# monologue
# JP: （ずっ！　ずぶっ！　ずるっ！　ずばんっ！！）
1669 = "（Phập! Phập! Trượt! Phập!!）"
# monologue
# JP: 黒髪を踊らせ体を震わすふかみは完全に、\n女の顔で、女の体だ。
1464 = "Fukami với mái tóc đen tung bay và cơ thể run rẩy, hoàn toàn,\nlà khuôn mặt của một người phụ nữ, cơ thể của một người phụ nữ."
# monologue
# JP: 挿入したとき感じた少女の窮屈をより強くしつつも、\n女の肉のとろみとうねりは、その上にどろり重なっている。
1488 = "Dù sự chật hẹp của một thiếu nữ mà tôi cảm nhận được khi đút vào đã trở nên mạnh mẽ hơn,\nnhưng sự mềm mại và nhịp điệu của da thịt phụ nữ, lại dính nhớp nháp đè lên trên đó."
# monologue
# JP: （ずばんっ！　ずぶうっ！　ずぱっ！　じゅちゅんっ！）
# 1670 = "（插！插！插！插！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！　はっ――い――いいっ！　好きっ、好きっ！\nずぶって――されるの――されるの――好き、なのっ」
971 = "「Hya! Ha——sướng——sướng quá! Thích lắm, thích lắm!\nBị đâm——bị đâm sâu——sâu thế này——em thích, lắm」"
# monologue
# JP: （ぐりゅんっ！　ぬ――ずぶんっ！　ぐりいいっ！）
1668 = "（Ngoáy! Phập——phập! Ngoáy!）"
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ！　ぐりって――また――これっ！！\n子宮に、キス――好きっ――きもち――よす、ぎるっ」
1009 = "「Ha——ah! Bị ngoáy——lại——thế này nữa!!\nHôn vào, tử cung——thích quá——sướng——sướng quá, đi mất」"
# monologue
# JP: ふかみの声より肉よりもなお、僕の脳みそがとろけてる。
1483 = "Hơn cả giọng nói và da thịt của Fukami, não bộ của tôi đang tan chảy."
# monologue
# JP: 少女と女を両立させたふかみまんこは、\n僕を完全に支配して、腰の動きを強制していく。
1271 = "Âm đạo của Fukami, nơi hội tụ cả vẻ thiếu nữ và người phụ nữ,\nđã hoàn toàn chi phối tôi, cưỡng ép chuyển động eo của tôi."
# monologue
# JP: （ずばっ！　ずばんっ！　じゅぶっ！　じゅぼっ！）
# 1670 = "（插！插！插！插！）" 
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　あっ！　あっ！　そう、てつ、さんっ、\nわたしっ――わたしっ――わたしっ！　もう、もうっ！」
1024 = "「Ha! Ah! Ah! Ah! Anh, Sou, tetsu,\nem——em——em! Không, không được nữa rồi!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕、も――だ。ふかみっ！」
1079 = "「Anh, cũng——vậy. Fukami!」"
# monologue
# JP: とっくに射精を複数回、強いられててもおかしくはない。
1435 = "Dù có bị ép xuất tinh nhiều lần từ nãy đến giờ cũng không có gì lạ."
# monologue
# JP: けれどふかみのおまんこは、同時に絶頂しなさいと、\n緩みわななききつく締め、僕を完全に制御する、からっ！
1295 = "Nhưng âm đạo của Fukami, như muốn nói hãy lên đỉnh cùng lúc,\nnới lỏng rồi lại run rẩy siết chặt, hoàn toàn kiểm soát tôi!"
# monologue
# JP: （ずんんんっ！　ぐりいいいいいいいっ！！！）
1671 = "（Phập p p p! Ngoáy y y y y y y y y y y y!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃんっ！　――んっ！！」
968 = "「Hyan! ——Ưm!!」"
# monologue
# JP: （くぷうううううううううっ！）
# 1674 = "（插！）" 
# 【ふかみ】
# display as 深美
# JP: 「んきゅうううううううううううううぅぅぅぅんっ！！」
# 1057 = "「嗯！！」" 
# monologue
# JP: 子宮に強く押される感覚。同時に響くふかみの嬌声。\nそれが許しと、本能がすぐ理解し弾けるっ！
1370 = "Cảm giác bị tử cung đẩy mạnh. Cùng lúc đó là tiếng thét kiều diễm của Fukami vang lên.\nBản năng lập tức hiểu rằng đó là sự cho phép, và bùng nổ!"
# 【双鉄H】
# display as 雙鐵
# JP: 「くぁっ！」
983 = "「Kh ah!」"
# monologue
# JP: （びゅうううっ！　びゅるっ！　どびゅうううっ！！）
1647 = "（Phụt! Phụt! Phụt t t t t!!）"
# 【ふかみ】
# display as 深美
# JP: 「ひあっ！？　――あっ！　あつい――あついのっ――\nびゅうって――おなかっ――子宮っ――叩い――んっ！」
973 = "「Hi ah!? ——Ah! Nóng quá——nóng quá——\nPhụt phụt——trong bụng——tử cung——bị gõ——ưm!」"
# monologue
# JP: 瞬間、和らぐ。
1585 = "Khoảnh khắc đó, mọi thứ dịu lại."
# monologue
# JP: 精が満たすのを感じてか、\nふかみのおまんこは僕を自由にしてくれる――から！
1402 = "Chắc là cảm nhận được tinh dịch đã lấp đầy,\nâm đạo của Fukami thả lỏng, trả lại sự tự do cho tôi——nhưng!"
# monologue
# JP: （ぐうううううっ！）
# 1674 = "（插！）" 
# 【ふかみ】
# display as 深美
# JP: 「あぎゅっ！」
# 1022 = "「啊！」" 
# monologue
# JP: だから自分で、自分の意思で、一ミクロンの隙もなく、\n子宮の口と勃起の先とを密着させて押し付け続ける。
1410 = "Chính vì thế, bằng chính ý chí của mình, không để hở một micromet nào,\ntôi tiếp tục ép chặt đầu khấc vào cửa tử cung."
# monologue
# JP: （びゅうっ！　びゅるうっ！　びゅびゅっ！　どびゅっ）
1646 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 押し付けたまま、射精する。
1427 = "Cứ ép chặt như vậy, và xuất tinh."
# monologue
# JP: 精液全部を、ふかみの子宮に――\n赤ちゃんをつくる愛しい場所にひたすら注ぎ込みつづける。
1340 = "Toàn bộ tinh dịch, vào tử cung của Fukami——\nTôi không ngừng rót vào nơi yêu thương để tạo ra em bé."
# monologue
# JP: （びゅっ――びゅう――――びゅるっ――――ぴゅっっ）
1644 = "（Phụt——phụt――――phụt――――phụt）"
# 【ふかみ】
# display as 深美
# JP: 「は……あっ……いっぱい……いっぱい……んっ――\nそう、てつ……さん、の……あつい、の……いっぱいぃ」
1007 = "「Ha……ah……nhiều quá……nhiều quá……ưm——\nCủa, anh……Sou, tetsu……nóng, quá……nhiều quá đi mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ」
# 1019 = "「啊」" 
# monologue
# JP: 体の力を使い切り、僕が後ろに崩れ落ちれば、\n繋がっているそのままに、ふかみもくたりと崩れてしまう。
1384 = "Vắt kiệt toàn bộ sức lực, khi tôi gục ngã ra phía sau,\nFukami cũng mềm nhũn ngã theo, trong khi chúng tôi vẫn đang kết nối với nhau."
# 【ふかみ】
# display as 深美
# JP: 「は……ぁ……あっ――あっ」
1005 = "「Ha……ah……ah——ah」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……っっ――んっ――ふっ――んっ」
1043 = "「Ưm……kh——ưm——phù——ưm」"
# 【ふかみ】
# display as 深美
# JP: 「ちゅむっ――ちゅっ――ちゅうう――ちゅるっ――\nれるっ――れろっ――れろおおっ――ちゅううっ」
1035 = "「Chụt bụp——chụt——chụt——chụt——\nLiếm——liếm——liếm liếm liếm——chụt」"
# monologue
# JP: 名を呼ぶ声さえ出す力がない。\nその状況でもお互いが求め合うまま、キスを重ねる。
1361 = "Ngay cả sức lực để gọi tên nhau cũng không còn.\nNgay cả trong hoàn cảnh đó, chúng tôi vẫn khao khát nhau, trao nhau những nụ hôn."
# monologue
# JP: ふかみの舌が、僕の脳まで舐めてるようで、\nどんどん――ふかみに染められている。
1481 = "Lưỡi của Fukami, như thể đang liếm đến tận não tôi,\ndần dần——bị nhuốm màu của Fukami."
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……けれど――）
1649 = "（A……nhưng mà——）"
# monologue
# JP: 僕の中、完全に染まらぬ形が残る。\nそれは鮮やかでまぶしくて。
1374 = "Bên trong tôi, vẫn còn một hình bóng không hoàn toàn bị nhuốm màu.\nNó thật sống động và chói lóa."
# monologue
# JP: どろどろの性に曇ってるような今の思考で、形を追うのは\n――なにか、申し訳ないような気さえして。
1511 = "Với suy nghĩ đang bị lu mờ bởi nhục dục dính nhớp nháp lúc này, việc đuổi theo hình bóng đó\n——không hiểu sao, tôi lại cảm thấy có chút tội lỗi."
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅうっ――ちゅっ」
1052 = "「Ưm……chụt——chụt——chụt」"
# monologue
# JP: だから、今は、\nただただぐずぐず溶けていく。
1413 = "Vì thế, bây giờ,\ntôi chỉ muốn cứ thế tan chảy dần dần."
# monologue
# JP: ふかみのキスに溶かされながら、\n重なっている一瞬を――ひたすら味わい、噛み締め続ける。
1363 = "Vừa bị nụ hôn của Fukami làm tan chảy,\nvừa——không ngừng thưởng thức, gặm nhấm khoảnh khắc hòa quyện này."
