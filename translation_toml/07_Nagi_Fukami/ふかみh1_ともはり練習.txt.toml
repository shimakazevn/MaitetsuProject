1474 = "Phía sau đầu Fukami đung đưa.\nNgay cả cô\nbé ngay trước mắt tôi cũng rung lên theo\ncái gật đầu mạnh mẽ của em."

# 【ふかみ】
# display as 深美
# JP: 「それじゃ……軽めに。軽めに、いきます――\nん……っと――（ちゅっ！）」
1130 = "「Đúng vậy nhỉ! Đúng rồi, vâng. Đúng vậy.\nTuyệt đối cần thiết.\nEm hiểu rồi ạ. Em sẽ\ncố gắng điều chỉnh nhé.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
# 1054 = "「嗯！」" 

# monologue
# JP: 勃起の先端にキスされて、\n痺れに近い快感が、腰の骨にまで染みてくる。
1244 = "Giọng nói đầy quyết tâm.\nHơi thở gấp gáp\nphập phồng từ mũi em mạnh đến mức làm sự\ncương cứng của tôi rung rinh."

# 【ふかみ】
# display as 深美
# JP: 「わ……ビクって、こんなに大きく動くんですね。\nこれって……感じてくれてる、ってことですよね？」
985 = "「Vậy thì……nhẹ nhàng thôi. Em sẽ làm, nhẹ\nnhàng thôi——\nưm……thế này——（Chụt!）」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。素晴らしく気持ちいい」
1102 = "Đầu dương vật cương cứng được em hôn lên,\nmột khoái cảm gần như tê dại thấm sâu vào\ntận xương chậu."

# 【ふかみ】
# display as 深美
# JP: 「うふふ、嬉しいです。もっと……からっぽにならない\nギリギリくらいに、気持ちよくなって下さいね？」
1063 = "「Wa……nó giật nảy lên, chuyển động mạnh thế\nnày cơ ạ.\nThế này có nghĩa là……anh đang\ncảm nhận được, đúng không ạ?」"

# monologue
# JP: 言葉に遅れて、ん……っと鼻が鳴るような音。\nそうして勃起に、口からのゆるい息がかかって――
1562 = "「Ừm. Sướng tuyệt vời luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「あむっ！　――んっ……ん～～～――ちゅっ！――\nちゅるっ――ちゅっ――ちゅうっ――じゅるるっ！！」
1021 = "「Ufufu, em vui lắm. Hãy sướng hơn nữa……\nđến mức suýt chút nữa là trống rỗng luôn,\nnhé?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「く――あ……」
980 = "Sau lời nói là âm thanh ưm……phát ra từ mũi\nem.\nRồi sau đó, hơi thở nhẹ nhàng từ miệng\nem phả vào sự cương cứng của tôi——"

# monologue
# JP: ふかみの口は僕の勃起より温度が低い。
1466 = "「Amu! ——Ưm……ưm~~~——chụt!——\nmút——chụt——chụt——sột soạt!!」"

# monologue
# JP: が、包んでもらえば時間につれて、\nじわりじわりと温かになる。
1249 = "「Ku——a……」"

# 【双鉄H】
# display as 雙鐵
# JP: （勃起の熱が――ふかみの口内を侵してるのか）
1676 = "Miệng Fukami có nhiệt độ thấp hơn sự cương\ncứng của tôi."

# monologue
# JP: 気付きが、僕を更に発熱させていく。\nもっと、ふかみを熱くしたい。おまんこも熱く燃やしたい。
1583 = "Nhưng khi được em ngậm lấy, theo thời\ngian,\nnó dần dần, từ từ ấm lên."

# monologue
