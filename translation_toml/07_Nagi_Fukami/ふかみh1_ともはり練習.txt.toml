758 = "（Hơi nóng từ sự cương cứng——đang xâm chiếm\nkhoang miệng của Fukami sao）"

# monologue
# JP: （じゅぶるううううっ！！）
# 1655 = "（啾！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゅあ！？――ンッ――むっ――んっ――ちゅううっ！\nちゅるっ――ぢゅむっ！　じゅぷっ！　ぢゅろっ！！」
974 = "Sự nhận ra đó càng khiến tôi phát nhiệt\nhơn.\nTôi muốn làm Fukami nóng hơn nữa.\nMuốn đốt cháy cả cô bé của em."

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――」
1040 = "——Suy nghĩ ấy ngay lập tức chuyển thành\nhành động."

# monologue
# JP: ふかみのおまんこを舐めればそこは大きく震え、\nすぐさまおかえしの快感が僕の勃起をくるんで満たす。
1372 = "（Chụt!!）"

# monologue
# JP: ふかみの舌は快感にわななきあえぎつつ、その振動を\n僕へと返し――お互いが、性感を増幅させていく。
1480 = "「Hyua!?——Ưm——mu——ưm——chụt!\nMút——chụt!\nPhập! Mút!!」"

# 【ふかみ】
# display as 深美
# JP: 「じゅっ！　じゅるっ！　でゅぶっ！　じゅうっ！\nんっ――れろっ――れるっ――れろおおっ――ぢゅぶ！」
1037 = "「Ưm——」"

# monologue
