[script]
# lines: 289 
# 【双鉄H】
# display as 雙鐵
# JP: 「っと！」
1065 = "「Ây da!」"

# 【ふかみ】
# display as 深美
# JP: 「あ、上手です。双鉄さん。\n今のだったら、揺らさずに瀬を乗り越えられます」
1034 = "「A, giỏi lắm ạ. Anh Soutetsu.\nNếu giữ vững\nnhư vừa rồi, thuyền sẽ vượt qua ghềnh mà\nkhông bị tròng trành đâu ạ.」"

# monologue
# JP: この瀬を抜ければしばらくは、\n流されるままに漂うだけだ。
1496 = "Vượt qua đoạn ghềnh này, thuyền sẽ chỉ\ntrôi lênh đênh theo dòng nước một lúc."

# monologue
# JP: 乗り切ったという感覚に、ついつい口も軽くなる。
1387 = "Cảm giác vượt qua thử thách khiến tôi bất\ngiác mở lời nhẹ nhàng hơn."

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし……川下り船でとはな」
942 = "「Nhưng mà……không ngờ lại là trên thuyền\nxuôi dòng thế này.」"

# monologue
# JP: ふかみと、凪と。\nそれぞれと僕との、ふたりきりでの一日デート。
1385 = "Cùng Fukami, và Nagi.\nNhững buổi hẹn hò\nriêng một ngày của tôi với từng người."

# monologue
# JP: ふかみの希望は、僕のともはり練習を、\nふたりっきりでたっぷり行うことだった。
1455 = "Nguyện vọng của Fukami là được cùng tôi\ntập luyện chèo thuyền riêng tư thật nhiều."

# 【ふかみ】
# display as 深美
# JP: 「二回もチャンスがあるんだから、\n一回目は、自分のホームで――って、思ったんです」
1118 = "「Vì có tận hai cơ hội, nên em nghĩ\nlần đầu\ntiên nên ở sân nhà của mình——ạ.」"

# monologue
# JP: 三者……というか、実質的にはふかみと凪との合議により、\nふかみ二回、凪一回というデート回数でまとまった。
1533 = "Ba người……nói đúng hơn là theo thỏa thuận\nthực tế giữa Fukami và Nagi,\nsố lần hẹn hò\nđã được chốt lại là Fukami hai lần, Nagi\nmột lần."

# monologue
# JP: 何故に回数が同じでないのか、ふたりに説明されるまで、\n不思議に思ったものであったが……
1307 = "Cho đến khi được hai em giải thích lý do\ntại sao số lần lại không bằng nhau,\ntôi\nvẫn luôn thắc mắc……"

# 【双鉄H】
# display as 雙鐵
# JP: 「……“平等でなくとも公平”――か」
772 = "「……'Không bình đẳng nhưng công\nbằng'——sao.」"

# 【ふかみ】
# display as 深美
# JP: 「ですね。[じゅっぷん,1]十分の差も無いことですけど、\n双鉄さんの、初めてのエッチの相手は……凪ちゃん」
1100 = "「Vâng ạ. Dù chỉ chênh nhau chưa đến 10\nphút, nhưng\nđối tác làm tình đầu tiên của\nanh Soutetsu là……Nagi.」"

# monologue
# JP: 淡々とした口調で、事実を述べている。
1451 = "Em ấy trần thuật lại sự thật bằng một\ngiọng điệu bình thản."

# monologue
# JP: ただそれだけのことなのに、\n言うに言われぬ迫力を何故か、感じてしまう。
1588 = "Chỉ có vậy thôi,\nnhưng không hiểu sao tôi\nlại cảm nhận được một áp lực khó tả."

# 【ふかみ】
# display as 深美
# JP: 「だから、ふたりきりデートは、わたしが二回で、\n凪ちゃんが一回。これで、ぎりぎり公平かなって」
1087 = "「Thế nên, hẹn hò riêng hai người, em sẽ có\nhai lần,\ncòn Nagi một lần. Như vậy chắc là\nvừa vặn công bằng ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1129 = "「Vậy sao.」"

# monologue
# JP: ふかみと凪との、それが決定事項なら、\n僕があれこれ口をはさむべきことでも無い。
1431 = "Nếu đó đã là quyết định của Fukami và\nNagi,\nthì tôi cũng không nên xen vào làm\ngì."

# monologue
# JP: ふかみの声からも謎の迫力が綺麗に失せて、\nむしろ楽しげに弾み始める。
1473 = "Áp lực bí ẩn trong giọng nói của Fukami\ncũng biến mất hoàn toàn,\nthay vào đó là sự\nvui vẻ, hào hứng."

# 【ふかみ】
# display as 深美
# JP: 「それでわたし、一回目は見てもらおうって思ったんです。\n自分のホームで、船頭をしてるわたしの姿――」
1088 = "「Vì vậy, em nghĩ lần đầu tiên sẽ cho anh\nxem.\nHình ảnh em làm người lái đò trên sân\nnhà của mình——」"

# monologue
# JP: 言ってふかみは、舳先でしゃん、と背筋を伸ばす。\n伸ばしながらもその頬が、じわじわ赤に染まってく。
1561 = "Nói rồi, Fukami đứng thẳng lưng ở mũi\nthuyền.\nDù đứng thẳng nhưng đôi má em lại\ndần dần ửng đỏ."

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんが、う、美しいって……言ってくれたわたしで。\n双鉄さんに……す、好きに、なって、もらいたく、って」
1135 = "「Vì em là người……được anh Soutetsu khen là\nx, xinh đẹp.\nNên em muốn……được anh\nSoutetsu……th, thích mình」"

# 【双鉄H】
# display as 雙鐵
# JP: 「“好きになる”のか？　それは無理だ」
1123 = "「'Thích mình' sao? Chuyện đó là không thể\nnào.」"

# 【ふかみ】
# display as 深美
# JP: 「え！？　ええっ！？　な、なんで――です、か？」
1031 = "「Hả!? Ể!? T, tại sao——vậy, ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
990 = "「Uo!?」"

# monologue
# JP: 舟が揺れる、瀬でも無いのに激しく。\nその反応に、自分の言葉が著しく不足していたと知る。
1546 = "Chiếc thuyền rung lắc dữ dội dù không hề\ncó ghềnh đá.\nNhìn phản ứng đó, tôi mới\nnhận ra lời nói của mình thiếu sót trầm\ntrọng."

# 【双鉄H】
# display as 雙鐵
# JP: 「何故って、僕は、すでにふかみを好きだからだ」
1117 = "「Tại sao ư, là vì anh đã thích Fukami mất\nrồi.」"

# 【ふかみ】
# display as 深美
# JP: 「ふえっ！！？」
993 = "「Huể!!?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「“もっと好き”“更に好き”にならなれるだろうが……\n既にふかみを好きな僕が、“好きになる”のは不可能だ」
1081 = "「Có thể sẽ 'thích hơn nữa' 'càng thích hơn\nnữa' nhưng……\nMột người đã thích Fukami như\nanh, thì không thể 'bắt đầu thích' em được\nnữa.」"

# 【ふかみ】
# display as 深美
# JP: 「好き……好きって……双鉄さんが、わたしのことを――\nすでに好き、って……ふあ、ぁっ」
1039 = "「Thích……thích sao……anh Soutetsu, đã——\nthích em, từ trước rồi……fua, a」"

# monologue
# JP: （ぐらっ！）
1678 = "（Tròng trành!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！？」
1116 = "「Fukami!?」"

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　あっ！　双鉄さん、今こっちに来ちゃっ――\nきゃっ！？　わあああああっ！？」
995 = "「Hả!? A! Anh Soutetsu, bây giờ đừng qua\nđây——\nKya!? Waaaaa!?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「んぬっ！？」
1059 = "「Nnu!?」"

# monologue
# JP: （ざっぼーーーーーーーーんっ！！！）
1675 = "（Ùmmmmmmmm!!!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「……う……むっ…………ぬっ…………」
781 = "「……Ư……mu…………nu…………」"

# 【ふかみ】
# display as 深美
# JP: 「よいしょ、よいしょ――ごし、ごし――ごし、ごし」
1064 = "「Yoisho, yoisho——lau, lau——lau, lau」"

# monologue
# JP: ……懸命に、ふかみが僕を拭ってくれてる。\n拭ってくれているのは実に、ありがたいのだが――
762 = "……Fukami đang ra sức lau người cho tôi.\nĐược em ấy lau cho thì thật sự rất biết\nơn, nhưng mà——"

# 【ふかみ】
# display as 深美
# JP: 「ごし、ごし――ふき、ふき――ん……どうでしょう？\nだいぶ、双鉄さん乾きましたか？」
1093 = "「Lau, lau——chà, chà——ưm……sao rồi ạ?\nAnh\nSoutetsu đã khô bớt chưa?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「う……うむ」
1053 = "「Ư……ừm.」"

# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。お風呂沸かしてるんですけど……\n時間、まだまだかかっちゃいますから」
1074 = "「Em xin lỗi. Em đang đun nước tắm rồi\nnhưng mà……\nSẽ phải mất một lúc lâu nữa mới\nxong cơ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「いや……うむ」
981 = "「Không……ừm.」"

# monologue
# JP: 隆盛を極めていた頃には、冬場の川下りも大繁盛で、\n冷えきった船頭さんたちに仕事後の風呂を提供していた。
1312 = "Vào thời kỳ hưng thịnh nhất, tour xuôi\ndòng sông mùa đông cũng rất đắt khách,\nhọ\nthường cung cấp bồn tắm cho những người\nlái đò lạnh cóng sau khi làm việc."

# monologue
# JP: ゆえに、ここの風呂は非常に湯船が大きくて、\n沸かすのにも相当な時間が掛かってしまう――のだそうだ。
1581 = "Chính vì vậy, bồn tắm ở đây cực kỳ lớn,\nvà\nviệc đun sôi nước cũng mất một khoảng thời\ngian khá dài——nghe nói là vậy."

# 【ふかみ】
# display as 深美
# JP: 「あ……まだこの辺、全然拭けて無いですね。\nごめんなさい――ん……よいしょ、よい、っしょ」
1018 = "「A……chỗ này vẫn chưa lau được tí nào nhỉ.\nEm xin lỗi——ưm……yoisho, yoi, sho」"

# monologue
# JP: だから、ふかみは僕を拭く。\n濡れてスケスケの服を、下着を、そのまま身につけながら。
1484 = "Vì thế, Fukami đang lau người cho tôi.\nTrong khi vẫn mặc nguyên bộ quần áo và đồ\nlót ướt sũng, mỏng tang nhìn thấu bên\ntrong."

# monologue
# JP: 無駄な水滴を飛ばさないよう僕を寝かせて、\nその上で、一生懸命、腰をふりふり、僕を拭く。
1500 = "Để những giọt nước thừa không bắn tung\ntóe, em bắt tôi nằm xuống,\nrồi ngồi lên\ntrên, ra sức lắc lư hông để lau người cho\ntôi."

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんに、風邪とかひかせたら申し訳ないですし。\nわたし、いくらでも拭きますから」
1121 = "「Nếu để anh Soutetsu bị cảm thì em thấy có\nlỗi lắm.\nNên em sẽ lau cho anh bao nhiêu\ncũng được.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「いや――風邪をひく心配はなかろうさ」
1107 = "「Không——chắc không phải lo bị cảm đâu.」"

# monologue
# JP: 目の前に、ふかみのパンツの股間が広がる。\n水をたっぷり含んで張り付き、濡れている。
1520 = "Ngay trước mắt tôi là phần đũng quần lót\ncủa Fukami.\nNó ngậm đầy nước, ướt đẫm và\ndính sát vào người em."

# monologue
# JP: 拭く動きにつれ、それが近づき、遠ざかっては、\nぽたりぽたりと僕の顔面に滴を落とす。
1319 = "Theo từng nhịp lau, nó lúc tiến lại gần,\nlúc lùi ra xa,\nnhỏ từng giọt, từng giọt\nnước xuống mặt tôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「一生懸命拭いてもらえたおかげで僕は――\nすっかり、熱くなってしまった」
952 = "「Nhờ em cất công lau người cho anh mà\nanh——\nđã hoàn toàn, nóng rực lên rồi đây.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
1019 = "「A——」"

# monologue
# JP: ふかみの鼻先、すぐのところで、\n僕の勃起がズボンを大きく持ち上げている。
1379 = "Ngay sát đầu mũi của Fukami,\nsự cương cứng\ncủa tôi đang đội chiếc quần lên thật cao."

# monologue
# JP: ふかみはそれを認識し、少しも顔をそらしはしない。\nならば、やはり――これは、誘惑に違いなかろう。
1465 = "Fukami nhận ra điều đó, nhưng không hề\nngoảnh mặt đi.\nNếu vậy thì, quả nhiên——đây\nchắc chắn là một sự cám dỗ."

# 【双鉄H】
# display as 雙鐵
# JP: 「むしろ、ふかみがぐしょぐしょに濡れてしまってる。\n僕でよければ――拭くのを、喜んで手伝うが？」
1083 = "「Ngược lại, Fukami mới là người đang ướt\nsũng đấy.\nNếu em không phiền——anh rất sẵn\nlòng giúp em lau khô nhé?」"

# 【ふかみ】
# display as 深美
# JP: 「あっ！　はい！　はい！　おねがいしますっ！！」
1026 = "「A! Vâng! Vâng! Trăm sự nhờ anh!!」"

# monologue
# JP: 弾む声。
1453 = "Giọng nói đầy vẻ háo hức."

# monologue
# JP: 誘惑かどうかの判断をなかなかつけかねていたせいで、\nふかみを焦らす形になってしまっていたかと思わせられる。
1305 = "Có vẻ như vì tôi chần chừ không biết đây\ncó phải là cám dỗ hay không,\nmà vô tình\nlại thành ra trêu chọc sự chờ đợi của\nFukami."

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば」
1068 = "「Vậy thì」"

# monologue
# JP: （じゅぶるっ！！）
1655 = "（Chụt!!）"

# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！」
969 = "「Hyafu!」"

# monologue
# JP: （じゅっ――じゅるっ――れろっ――れろおおっ）
1654 = "（Chụt——chụt——liếm——liếm）"

# monologue
# JP: 焦らしてしまったことを少しでもお詫びしたくて。
1263 = "Tôi muốn bù đắp dù chỉ một chút cho việc\nđã bắt em phải chờ đợi."

# monologue
# JP: 最初からもう全開で、パンツ越しに張り付き浮かぶ縦すじに、\nキスしてそのまま、思いっきりに舌を這わせる。
1382 = "Ngay từ đầu đã bung hết sức, tôi hôn lên\nđường rãnh dọc hằn rõ qua lớp quần lót\ndính sát,\nvà cứ thế thỏa sức trườn lưỡi\nliếm láp."

# 【ふかみ】
# display as 深美
# JP: 「ふぁ、あっ――べろ……あったか……いっ……んうっ」
992 = "「Fua, a——lưỡi……ấm……quá……ưm」"

# monologue
# JP: （れるっ！　れろっ――じゅうううっ――はむっ！」
1553 = "（Liếm! Liếm——mút——ngoạm!）"

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あっ――わたしの――おまんこっ――\n双鉄、さんの――おくちっ――おくち、でっ――」
987 = "「Fua——a——cô bé——của em——\nbằng miệng——miệng\ncủa——anh, Soutetsu——」"

# monologue
# JP: 瑞々しい、というよりもむしろ水そのものの味が広がり。
1300 = "Hương vị lan tỏa trong miệng tôi, nói là\ntươi mát thì đúng hơn là vị của nước."

# monologue
# JP: けれどもそこにすぐさまに、\n熱さを帯びた薄い酸味の、ぬらつく蜜が混じり始める。
1253 = "Thế nhưng ngay lập tức,\nthứ mật dịch trơn\ntuột, mang theo hơi nóng và vị chua nhè\nnhẹ bắt đầu hòa lẫn vào."

# monologue
# JP: （ぺろっ！　れろっ！　れりゅっ！　にゅるうっ！）
1681 = "（Liếm! Liếm! Liếm! Nhóp nhép!）"

# 【ふかみ】
# display as 深美
# JP: 「あ……や……しみ、てるっ――ん――わたし、おまんこ――双鉄さんの、ツバが……、しみ、て――あつ、くて」
1001 = "「A……á……thấm, vào rồi——ưm——cô bé, của\nem——nước bọt, của anh Soutetsu……, thấm,\nvào——nóng, quá」"

# monologue
# JP: （じゅるっ――じゅううっ！　じゅぶうっ！　ごくっ！）
1651 = "（Chụt——mút! Phập! Ực!）"

# 【ふかみ】
# display as 深美
# JP: 「あっ――ふっ――やけ、て――とけ、ちゃうっ――\nわた、しの――おまんこっ――ん――とけちゃう、よぉ」
1003 = "「A——fu——nóng, quá——tan chảy, mất thôi——\ncô\nbé——của, em——ưm——tan chảy mất, thôi」"

# monologue
# JP: 溶かしてやりたい。もっと、もっとに舐めしゃぶり。\nだが、そうするにはこの薄衣が――
1326 = "Tôi muốn làm em tan chảy. Bằng cách liếm\nmút nhiều hơn, nhiều hơn nữa.\nNhưng để làm\nđược điều đó thì lớp áo mỏng này——"

# monologue
# JP: 厚さ数ミリにも満たぬであろう、\n濡れて張り付くパンツがどうにも、邪魔すぎる。
1580 = "Chiếc quần lót ướt đẫm, dính sát, có lẽ\ndày chưa tới vài milimet này,\nthật sự quá\nvướng víu."

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷぁ。随分と濡れてしまっているな。\nこれは脱がんと……ふかみこそ風邪を引きかねん」
1045 = "「Ưm——pua. Em ướt sũng mất rồi.\nPhải cởi ra\nthôi……kẻo Fukami lại bị cảm mất.」"

# 【ふかみ】
# display as 深美
# JP: 「あ……は、はい。――そう、ですよね。\nわた……し、こんなに――ぐしょぐしょ……で」
1014 = "「A……v, vâng. ——Đúng, vậy nhỉ.\nEm……đã ướt\nsũng——thế này……rồi」"

# monologue
# JP: ぽた――り。
1499 = "Tí——tách."

# monologue
# JP: 股間から糸をひくように滴が落ちる。\nふかみの腰が、またもじもじと揺れ動く。
1476 = "Những giọt nước nhỏ xuống từ đũng quần như\nkéo thành sợi.\nHông của Fukami lại bẽn lẽn\nlắc lư."

# 【ふかみ】
# display as 深美
# JP: 「あ、あの――わたし――上は、自分――自分で、脱ぐっ\nその――脱ぎます、から――」
1133 = "「À, ừm——em——phần trên, em sẽ tự——tự, cởi\nà\nthì——em sẽ tự cởi, nên là——」"

# monologue
# JP: 匂いが濃くなる。
1440 = "Mùi hương trở nên nồng đậm hơn."

# monologue
# JP: 体がどんどん熱くなり、\n肌と肌とが触れ合う部分が、お互いの汗にぬらついていく。
1378 = "Cơ thể ngày càng nóng rực lên,\nnhững phần\nda thịt chạm vào nhau trở nên nhớp nháp\nbởi mồ hôi của cả hai."

# 【ふかみ】
# display as 深美
# JP: 「だから……下……あの、下、は――できっ、でき――\nでき、たら……そのっ！　双鉄、さん――に……」
1085 = "「Cho nên……phần dưới……ừm, phần dưới,\nthì——nếu, nếu——\nnếu được……thì! Anh,\nSoutetsu——hãy……」"

# 【双鉄H】
# display as 雙鐵
# JP: 「望むところだ」
1106 = "「Đúng ý anh rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「あっ」
# 1019 = "「啊」" 

# monologue
# JP: 嬉しげな声に心地よく鼓膜を揺すられながら、\n張り付く布をゆっくり剥がし、ふかみの下を全部脱がせる。
1535 = "「A」"

# 【ふかみ】
# display as 深美
# JP: 「あ……わた、し……わた、し……おま、んこ……\n双鉄さんの……お顔の……こんな……こんな近く、で」
1015 = "Màng nhĩ tôi rung lên dễ chịu bởi giọng\nnói đầy vui sướng của em,\ntôi từ từ lột\nlớp vải dính sát ra, cởi bỏ hoàn toàn phần\ndưới của Fukami."

# monologue
# JP: 剥き出しになったおまんこを、\nあらためてまじ、と見てみれば――
1358 = "「A……của, em……của, em……cô, bé……\nở ngay……gần\nsát……khuôn mặt……của anh Soutetsu, thế này」"

# 【双鉄H】
# display as 雙鐵
# JP: （おお……）
1659 = "Nhìn chằm chằm vào cô bé đang phơi bày\ntrần trụi,\nmột lần nữa tôi lại thấy——"

# monologue
# JP: ふかみのおまんこの、その向こう。
1442 = "（Ồ……）"

# monologue
# JP: 完全にフラットな腹のラインの先にぷるん、と、\n小ぶりなお椀の形の胸が、ピンクの乳首が見えている。
1309 = "Phía bên kia cô bé của Fukami."

# 【双鉄H】
# display as 雙鐵
# JP: 「……ふかみの肉には、無駄がない。\n顔もそうだが、体も本当に綺麗だな」
779 = "Nơi tận cùng của đường nét vùng bụng hoàn\ntoàn phẳng lì, là một cặp ngực hình bát úp\nnhỏ nhắn,\ncăng mọng, để lộ ra hai đầu nhũ\nhoa màu hồng."

# 【ふかみ】
# display as 深美
# JP: 「ひえっ！？　えっ！？　ふわっ――あっ！\nわた――わた――わたしっ――そんなっ！！」
976 = "「……Cơ thể Fukami, chẳng có lấy một chút mỡ\nthừa nào.\nKhuôn mặt đã đành, nhưng cơ thể\nem cũng thực sự rất đẹp.」"

# monologue
# JP: （ぎゅうっ！）
1660 = "「Hie!? Hả!? Fuwa——a!\nEm——em——em——không có\nđâu!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1054 = "（Ép chặt!）"

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
# 969 = "「呀！」" 

# monologue
# JP: 照れたふかみは顔をとっさに埋めようとし、\n僕の勃起に、思いっきりの頬ずりをする。
1446 = "「Ưm!」"

# monologue
