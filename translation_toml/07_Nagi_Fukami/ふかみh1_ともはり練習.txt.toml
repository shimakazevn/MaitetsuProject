# monologue
# JP: ふかみの舌が、僕の脳まで舐めてるようで、\nどんどん――ふかみに染められている。
1481 = "深美的舌頭彷彿在舔舐我的大腦一樣，我的大腦也漸漸沾上了深美的味道。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ああ……けれど――）
1649 = "（啊……可是……）" 

# monologue
# JP: 僕の中、完全に染まらぬ形が残る。\nそれは鮮やかでまぶしくて。
1374 = "我的腦中卻留著個一塵不染的形狀。那形狀鮮明而耀眼。" 

# monologue
# JP: どろどろの性に曇ってるような今の思考で、形を追うのは\n――なにか、申し訳ないような気さえして。
1511 = "甚至讓處於快感之中的我因為想到了它……而感到十分抱歉。" 

# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅうっ――ちゅっ」
1052 = "「嗯……啾……啾……啾」" 

# monologue
# JP: だから、今は、\nただただぐずぐず溶けていく。
1413 = "所以，我選擇了讓自己溶化。" 

# monologue
# JP: ふかみのキスに溶かされながら、\n重なっている一瞬を――ひたすら味わい、噛み締め続ける。
1363 = "我回味著交融的時刻，溶化在深美的親吻中……" 
