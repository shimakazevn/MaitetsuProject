1304 = "「Kya!」"

# 【ふかみ】
# display as 深美
# JP: 「こ……れ……」
1128 = "Fukami xấu hổ vội vàng vùi mặt xuống,\ncọ\nxát mạnh má vào sự cương cứng của tôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「僕のも、ふかみに脱がせて欲しい」
944 = "Nhận được khoái cảm đã mong chờ từ lâu, sự\ncương cứng của tôi giật nảy lên dữ dội,\nkhiến Fukami giật mình ngẩng mặt lên——"

# 【ふかみ】
# display as 深美
# JP: 「あ、はい」
1032 = "「Cái……này……」"

# monologue
# JP: いそいそと、ふかみの指が蠢いて、\n僕のズボンのボタンを外す。
1493 = "「Anh cũng muốn, Fukami cởi cho anh.」"

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
989 = "「A, vâng.」"

# monologue
