1683 = "（Chọc, chọc——chọc chọc）"

# 【ふかみ】
# display as 深美
# JP: 「んきゅぅっ！！」
1057 = "——Nhưng mà, tôi cũng muốn làm Fukami ra.\nTôi khẽ nhọn đầu lưỡi, thử cắm nông vào\ncửa âm đạo của Fukami."

# monologue
# JP: 勃起ほどには奥を突けない。\nだからそのまま、届く限りの範囲を一気に舐め回すっ！
1543 = "（Kyu——kyukyu!）"

# monologue
# JP: （べおおおっ！　べろっ！　にゅりゅうっ！　ざりゅ！）
1682 = "Ngay lập tức lưỡi tôi bị siết chặt, nhưng\nthế này thì vẫn tiến vào được.\nKhoảnh khắc\ntin chắc điều đó, tôi làm cứng lưỡi hết cỡ\nvà vươn dài ra!"

# 【ふかみ】
# display as 深美
# JP: 「っ！！？――あひゅうううううんっ！！！」
1058 = "（Trượttttt!!!）"

# monologue
# JP: （ぶるっ！）
1658 = "「Nkyu!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「くおっ！」
982 = "Không thể đâm sâu được như khi dùng sự\ncương cứng.\nThế nên tôi cứ vậy, liếm láp\nmột mạch trong phạm vi có thể chạm tới!"

# monologue
# JP: 粒だったような感触を、舌の腹広くがとらえた瞬間、\nふかみの舌が大きく震え僕の射精の引き金を引くっ！
1311 = "（Liếm! Liếm! Nhóp nhép! Trượt!）"

# monologue
# JP: （びゅっ！　んびゅっ！　びゅるっ！　びゅうううっ！）
1645 = "「!!?——Ahyuuuuun!!!」"

# 【ふかみ】
# display as 深美
# JP: 「んきゅっ――ひっ――イっ――んんん～～んっ！\nんくっ――ごくっ――じゅううっ――ごきゅっ」
1042 = "（Run rẩy!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「あ……あっ――ああっ――あ――」
1004 = "「Kuo!」"

# monologue
# JP: （びゅうっ！　びゅるっ！　ぶびゅっ！　びゅっ！）
# 1645 = "（呲！呲！呲！呲！）" 

# monologue
# JP: ふかみを、イかせた。\n同時に、イけた。
1392 = "Khoảnh khắc phần giữa lưỡi chạm vào một\ncảm giác như hạt sần sùi,\nlưỡi Fukami run\nlên bần bật, kéo cò cho sự xuất tinh của\ntôi!"

# monologue
# JP: その感動は、けれどもすぐさま、\nもっと大きな感動によって塗りつぶされる。
1579 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【ふかみ】
# display as 深美
# JP: 「ごくっ――ごくんっ――んぷっ――ごくっ――\nじゅっ――じゅるうるっ――ん、くっ――ごくんっ」
984 = "「Nkyu——hi——ra——ưm~~~ưm!\nNku——ực——mút——ực」"

# monologue
# JP: どくどくと出て行く精液が、\n出て行く端から、ごくごく飲まれる。
1532 = "「A……a——aa——a——」"

# monologue
# JP: ふかみが僕の精液を、吸いだしてまで、\nあのか細い喉に、落としてくれてる――
1448 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――ぷ、あ……あっ――」
1047 = "Tôi đã làm Fukami, ra rồi.\nĐồng thời, tôi\ncũng ra."

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！」
1115 = "Sự cảm động đó, tuy nhiên ngay lập tức,\nđã\nbị bao trùm bởi một sự cảm động lớn lao\nhơn."

# 【ふかみ】
# display as 深美
# JP: 「あっ！！」
1029 = "「Ực——ực——npu——ực——\nchụt——mút——ưm, ku——ực」"

# monologue
# JP: 体を起こし、ふかみを抱き寄せ、キスしてる。
1364 = "Tinh dịch tuôn ra ừng ực,\nvừa mới trào ra\nđã bị nuốt chửng ừng ực."

# 【ふかみ】
# display as 深美
# JP: 「あ……んっ――ちゅっ――ん――むっ――」
1012 = "Fukami mút lấy tinh dịch của tôi,\nrồi nuốt\nxuống cái cổ họng thanh mảnh ấy——"

# 【双鉄H】
# display as 雙鐵
# JP: （ぉっ――むっ――）
1650 = "「Ưm……a——pu, a……a——」"

# monologue
# JP: ふかみの口内、驚くほどに粘度の高いエグみが\nこびりつき残ってる。
1468 = "「Fukami!」"

# monologue
# JP: それを丁寧に舌先を使いこそぎとり、\n感謝の気持ちと思いとを、僕なりの形に示してく。
1367 = "「A!!」"

# 【ふかみ】
# display as 深美
# JP: 「ん……はっ――ふあぁ……ぷあっ」
1048 = "Tôi bật dậy, ôm chầm lấy Fukami và trao em\nmột nụ hôn."

# monologue
# JP: （にゅるっ――ぬるっ）
1653 = "「A……ưm——chụt——ưm——mu——」"

# monologue
# JP: 無意識にだろうか。\nふかみの腰が動いてる。
1459 = "（O——mu——）"

# monologue
# JP: 僕の勃起を小さなおまんこで押しつぶし、\nその姿勢のまま、蜜を丹念に塗りつけにくる。
1321 = "Trong khoang miệng Fukami, một vị chát đặc\nquánh đến kinh ngạc\nvẫn còn bám dính lại."

# 【双鉄H】
# display as 雙鐵
# JP: （ぐちゅぐちゅに蕩け、ほぐれているな。\nこれなら……）
1661 = "Tôi cẩn thận dùng đầu lưỡi cạo sạch nó đi,\nthể hiện lòng biết ơn và tâm tư của mình\ntheo cách riêng."

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみ――このまま、挿れるぞ？」
1112 = "「Ưm……ha——fuaa……pua」"

# 【ふかみ】
# display as 深美
# JP: 「はい！　はいっ！　来てください、双鉄さん」
1070 = "（Trơn tuột——trơn tuột）"

# monologue
# JP: 言葉と同時に、腰が蠢く。\n心も体も、僕を求めてくれている。
1565 = "Không biết có phải vô thức hay không.\nHông\nFukami đang chuyển động."

# monologue
# JP: 僕の心身もそれに答える。\nふかみを欲しがる気持ちが素直に、動きに変わる。
1356 = "Em đè bẹp sự cương cứng của tôi bằng cô bé\nnhỏ nhắn,\nvà cứ giữ nguyên tư thế đó, cẩn\nthận bôi trét mật dịch lên."

# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――ふ……うっ」
1046 = "（Đã tan chảy ướt át, mềm nhũn ra rồi nhỉ.\nThế này thì……）"

# monologue
# JP: （きち……ち……）
1680 = "「Fukami——cứ thế này, anh cắm vào nhé?」"

# monologue
# JP: 落ち着いてじっくり挿入すれば、感じる。
1354 = "「Vâng! Vâng! Xin hãy vào đi, anh\nSoutetsu.」"

# monologue
# JP: 凪が余りに狭すぎるゆえ、初めてのときは感じなかったが\n……ふかみの膣も、やはり相当に狭く、きつい。
1276 = "Cùng lúc với lời nói, hông em ngọ nguậy.\nCả tâm hồn và thể xác em đều đang khao\nkhát tôi."

# 【ふかみ】
# display as 深美
# JP: 「あ……んっ――はっ――おっきい、ですっ――\n双鉄、さん、の――んっ――おなか――ささ、って――」
1011 = "Tâm hồn và thể xác tôi cũng đáp lại điều\nđó.\nNỗi khao khát Fukami thành thật chuyển\nhóa thành hành động."

# monologue
# JP: 切れ切れの声。\nだが、辛そうなものとは感じない。
1475 = "「Ưm……a——fu……u」"

# monologue
# JP: 狭くてキツイ膣ではあるが、\n強いぬかるみと和らぎとが、僕の進みを援けてくれる。
1590 = "（Chật……chật……）"

# monologue
# JP: （ぬっ――ずっ――ずうっ――ズッ――）
1665 = "Bình tĩnh và từ từ cắm vào, tôi cảm nhận\nđược."

# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――なか……が――おされ――て――\nふあっ――ひっ――めく、れる……みたい――でっ」
1049 = "Vì của Nagi quá hẹp nên lần đầu tiên tôi\nkhông cảm nhận được\n……nhưng âm đạo của\nFukami, quả thực cũng khá hẹp và chật."

# monologue
# JP: だが、焦らない。\nふかみだってまだ、二回目のセックスに過ぎんのだ。
1355 = "「A……ưm——ha——to, quá——\ncủa anh,\nSoutetsu——ưm——bụng——đâm, vào——」"

# monologue
# JP: 痛む部分が、傷が残っているかもしれん。\nそれを懸念しゆっくりゆっくり、探るようにして進んでく。
1404 = "Giọng nói đứt quãng.\nNhưng tôi không cảm\nthấy em đang đau đớn."

# monologue
# JP: （ぬっ――ろっ――りゅっ――くりゅんっ）
1666 = "Dù âm đạo hẹp và chật chội,\nnhưng sự trơn\nướt và mềm mại mãnh liệt đang giúp tôi\ntiến vào."

# 【ふかみ】
# display as 深美
# JP: 「ひゅあんっ！？　あっ――そこ――いま――そこっ――\nぐりって――くりゅん、って！」
977 = "（Phập——phập——phập——phập——）"

# monologue
# JP: （きゅうううううううっ！！！）
1664 = "「Ưm……a——bên trong……bị——đẩy——\nfua——hi——như\nbị, lật tung……lên——vậy」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
998 = "Nhưng, tôi không vội.\nVì đây mới chỉ là\nlần làm tình thứ hai của Fukami thôi."

# monologue
# JP: 腰を回して粒立つ部分をコスってみれば、\nふかみは大きく体を弾ませ、膣の締め付けを強くする。
1396 = "Có thể vẫn còn chỗ đau, vẫn còn vết\nthương.\nLo lắng điều đó, tôi từ từ, thật\ntừ từ tiến vào như đang dò dẫm."

# monologue
# JP: その反応に気を良くし、\n同じ動きを、もう何度でも繰り返してみる。
1388 = "（Phập——phập——phập——ngoáy）"

# monologue
# JP: （こりゅっ――くりゅっ――くにっ――ぎゅりゅっ）
1684 = "「Hyuan!? A——chỗ đó——vừa nãy——chỗ đó——\nbị\nngoáy——ngoáy, vào!」"

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ――あっ――すごっっ――そこっ――\nおまん、こっ――あつく、て――どろって――んうっ」
964 = "（Siết!!!）"

# monologue
# JP: 快感が強烈すぎるのか、\nふかみがイヤイヤと頭を振っ――っ！
1403 = "「!」"

# monologue
# JP: （ばさっ）
1641 = "Tôi xoay hông cọ xát vào phần sần sùi,\nFukami nảy người lên thật mạnh, âm đạo\nsiết chặt hơn."

# 【双鉄H】
# display as 雙鐵
# JP: 「んぷっ！」
# 1022 = "「啊！」" 

# monologue
# JP: 揺れて踊ったふかみの髪に、顔面を軽く払われ――\nうむ？
1457 = "Cảm thấy thích thú trước phản ứng đó,\ntôi\nthử lặp lại chuyển động ấy vô số lần."

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみ――髪留めが外れそうだぞ？」
1110 = "（Ngoáy——ngoáy——nhấn——ngoáy）"

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1019 = "「啊」" 

# monologue
# JP: 髪留めの緩んだ部分を探してるのか、\nふかみが、小さく首を動かし。
1490 = "「Hya——a——tuyệt quá——chỗ đó——\ncô, bé——nóng,\nquá——nhớt nháp——ưm」"

# monologue
# JP: そうしてそれは、とても静かな頷きになる。
1426 = "Có lẽ khoái cảm quá đỗi mãnh liệt,\nFukami\nlắc đầu quầy quậy——!"

# 【ふかみ】
# display as 深美
# JP: 「とって……ください。とって、外して。\nわたし、全部を――はだか――裸、に」
1124 = "（Phập phồng）"

# 【双鉄H】
# display as 雙鐵
# JP: 「心得た――」
1069 = "「Npu!」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
999 = "Mái tóc tung bay nhảy múa của Fukami khẽ\nsượt qua mặt tôi——\nHửm?"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1137 = "「Fukami——Kẹp tóc của em sắp tuột rồi kìa?」"

# monologue
# JP: ただそれだけで大きく広がる。
1395 = "「A」"

# monologue
# JP: ふかみの髪が、髪の匂いが、\nそこから漂う――女の、色香が。
1323 = "Có vẻ đang tìm chỗ kẹp tóc bị lỏng,\nFukami\nkhẽ cựa quậy cổ."

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみは、少女で……同時に女でもあるのだな」
1114 = "Và rồi, cử động đó trở thành một cái gật\nđầu thật khẽ khàng."

# 【ふかみ】
# display as 深美
# JP: 「え？　あの……そんなの、あたりまえ」
997 = "「Hãy lấy……nó ra đi ạ. Lấy ra, tháo nó ra.\nEm muốn, trút bỏ tất cả——khỏa thân——khỏa\nthân, hoàn toàn」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか？」
1103 = "「Anh hiểu rồi——」"

# monologue
# JP: 女へと脱皮しかけてる――\nその曖昧な美しさを、ふかみは自覚していない。
1461 = "「!!!」"

# monologue
# JP: 自覚をしたならその瞬間に、\nふかみはきっと、女になるのだ。
1513 = "Chỉ thế thôi mà nó đã bung xõa rộng ra."

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。\nごくあたりまえのことだった」
1098 = "Mái tóc của Fukami, mùi hương từ mái tóc\nem,\ntỏa ra từ đó——sự quyến rũ, của một\nngười phụ nữ."

# monologue
# JP: だから、自覚を促さない。
1409 = "「Fukami, là một thiếu nữ……nhưng đồng thời\ncũng là một người phụ nữ nhỉ.」"

# monologue
# JP: 恐らくは短いこの季節を、今しか味わえぬだろう果実を、\nたっぷりと、堪能しつくすそのために。
1401 = "「Hả? Dạ……chuyện đó, là đương nhiên mà.」"

# 【ふかみ】
# display as 深美
# JP: 「そ、そうですよ？\n双鉄さん、なんか、ちょっとヘン」
1095 = "「Vậy sao?」"

# monologue
# JP: （ぐいいいっ！！！）
1673 = "Đang lột xác để trở thành phụ nữ——\nVẻ đẹp\nmơ hồ ấy, bản thân Fukami vẫn chưa tự nhận\nthức được."

# 【ふかみ】
# display as 深美
# JP: 「んぎゅっ？！　ひ、あっ――いき、なりっ――」
1061 = "Nếu em nhận ra, thì ngay khoảnh khắc đó,\nchắc chắn Fukami sẽ trở thành một người\nphụ nữ thực thụ."

# monologue
# JP: （ごっ！　ごりゅんっ！！）
1672 = "「Đúng vậy nhỉ.\nLà một chuyện hết sức hiển\nnhiên.」"

# monologue
# JP: ふかみを大きくのけぞらせ、\nさっきの話題を快感で無理やり流してしまう。
1391 = "Thế nên, tôi sẽ không hối thúc em nhận ra\nđiều đó."

# 【ふかみ】
# display as 深美
# JP: 「んひゅっ！　おくっ！　奥っ！　子宮っ！\n子、宮っっ――ごっ――って――ん、ごつん、って！！」
1055 = "Có lẽ là để tận hưởng trọn vẹn, thỏa thích\nthứ trái ngọt\nmà chỉ có thể nếm thử trong\nmùa ngắn ngủi này."

# 【双鉄H】
# display as 雙鐵
# JP: 「……ヘンであるのも、当然だろう。\nふかみの魅力に、僕は恐らく、狂っているのだ」
782 = "「Đ, đúng vậy mà?\nAnh Soutetsu, sao trông,\nhơi lạ lạ vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「み……魅力って――んっ！」
1136 = "（Ấn mạnh!!!）"

# monologue
# JP: （きゅううううっ！）
1656 = "「Ngyu?! Hi, a――tự, nhiên lại――」"

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！！」
# 1029 = "「啊！！」" 

# monologue
# JP: 子宮が喜び吸い付いてくる。
1334 = "（Khít! Khít khịt!!）"

# monologue
# JP: たった二回目のセックスで、妊娠したいと甘えすがって、\n貪欲なまでに子種を求め、僕の亀頭をくわえようとする。
1336 = "Làm Fukami ưỡn người ra sau một khoảng\nlớn,\ndùng khoái cảm để ép câu chuyện lúc\nnãy trôi đi mất."

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
979 = "「Nhyu! Sâu! Sâu quá! Tử cung!\nTử,\ncung――khít――lại――ưm, cộc, cộc!!」"

# monologue
# JP: （ずるうううううううっ！）
1674 = "「……Trở nên kỳ lạ cũng là chuyện đương\nnhiên thôi.\nAnh e là mình đã phát điên vì\nsức hấp dẫn của Fukami mất rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「ひゃああんんっ」
967 = "「Sức……sức hấp dẫn á――ưm!」"

# monologue
# JP: だが、射精しない。\nこの快感を終わらせるなど、もったいなくて射精できない。
1251 = "（Siếếếếết!）"

# monologue
# JP: わななく勃起を無理やり引いて、\n浅いところでぐりぐりまわして、ふかみを味わう。
1399 = "「Kua!!」"

# 【ふかみ】
# display as 深美
# JP: 「やっ――そこっ――おまんこ――入り口――そこ、だめ、\nだめ、ですぅっ――そこでイクの、ヤっ――イク、なら」
965 = "Tử cung sung sướng hút chặt lấy tôi."

# monologue
# JP: （ずんっ！）
# 1674 = "（插！）" 

# monologue
# JP: 突けば、わななく。\nふかみの全部が、喜び震える。
1570 = "Mới chỉ là lần làm tình thứ hai, mà em ấy\nđã làm nũng đòi mang thai,\ntham lam khao\nkhát hạt giống của tôi, như muốn ngậm chặt\nlấy quy đầu của tôi vậy."

# monologue
# JP: そこまで、僕を求めてくれてる――\n幸福感が脳を満たして、体の動きに力を与えるっ！
1325 = "「っ――」"

# monologue
# JP: （ずんっ！　ずうっ！　ごりゅっ！　ごちゅんっ！）
1670 = "（Phậppppppp!）"

# 【ふかみ】
# display as 深美
# JP: 「はぁんっ！　そこっ！　そこおおっ！\n赤ちゃんの、部屋っ――子宮！　子宮でっ！！！」
1027 = "「Hyaaaannn」"

# monologue
# JP: （ずっ！　ずぶっ！　ずるっ！　ずばんっ！！）
1669 = "Nhưng, tôi không xuất tinh.\nViệc kết thúc\nkhoái cảm này thật quá lãng phí nên tôi\nkhông thể xuất tinh được."

# monologue
# JP: 黒髪を踊らせ体を震わすふかみは完全に、\n女の顔で、女の体だ。
1464 = "Tôi miễn cưỡng rút dương vật đang run rẩy\nra,\nngoáy tròn ở chỗ nông để thưởng thức\nFukami."

# monologue
# JP: 挿入したとき感じた少女の窮屈をより強くしつつも、\n女の肉のとろみとうねりは、その上にどろり重なっている。
1488 = "「A――chỗ đó――lỗ nhỏ――cửa mình――chỗ đó,\nkhông được,\nkhông được, đâu ạ――ra ở đó,\nghét lắm――nếu, ra thì」"

# monologue
# JP: （ずばんっ！　ずぶうっ！　ずぱっ！　じゅちゅんっ！）
# 1670 = "（插！插！插！插！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！　はっ――い――いいっ！　好きっ、好きっ！\nずぶって――されるの――されるの――好き、なのっ」
971 = "（Phập!）"

# monologue
# JP: （ぐりゅんっ！　ぬ――ずぶんっ！　ぐりいいっ！）
1668 = "Mỗi cú đâm, em ấy lại run rẩy.\nToàn bộ con\nngười Fukami đang run lên vì sung sướng."

# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ！　ぐりって――また――これっ！！\n子宮に、キス――好きっ――きもち――よす、ぎるっ」
1009 = "Em ấy khao khát tôi đến mức đó――\nCảm giác\nhạnh phúc ngập tràn tâm trí, tiếp thêm sức\nmạnh cho từng chuyển động của cơ thể tôi!"

# monologue
# JP: ふかみの声より肉よりもなお、僕の脳みそがとろけてる。
1483 = "（Phập! Phập! Khịt! Phập!）"

# monologue
# JP: 少女と女を両立させたふかみまんこは、\n僕を完全に支配して、腰の動きを強制していく。
1271 = "「Haaan! Chỗ đó! Chỗ đóoo!\nPhòng của, em\nbé――tử cung! Ở tử cung!!!」"

# monologue
# JP: （ずばっ！　ずばんっ！　じゅぶっ！　じゅぼっ！）
# 1670 = "（插！插！插！插！）" 

# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　あっ！　あっ！　そう、てつ、さんっ、\nわたしっ――わたしっ――わたしっ！　もう、もうっ！」
1024 = "（Phập! Phập! Phập! Phập!!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「僕、も――だ。ふかみっ！」
1079 = "Mái tóc đen tung bay, cơ thể run rẩy,\nFukami giờ đây hoàn toàn\nmang khuôn mặt\ncủa một người phụ nữ, cơ thể của một người\nphụ nữ."

# monologue
# JP: とっくに射精を複数回、強いられててもおかしくはない。
1435 = "Cảm giác chật chội của thiếu nữ khi mới\nđưa vào càng trở nên mạnh mẽ hơn,\nnhưng sự\nmềm mại và uốn lượn của da thịt phụ nữ lại\nđè lên trên lớp cảm giác đó."

# monologue
# JP: けれどふかみのおまんこは、同時に絶頂しなさいと、\n緩みわななききつく締め、僕を完全に制御する、からっ！
1295 = "（Phập! Phập! Phập! Phập!）"

# monologue
# JP: （ずんんんっ！　ぐりいいいいいいいっ！！！）
1671 = "「Hya! Ha――ư――thích quá! Thích, thích lắm!\nBị――đâm sâu――bị đâm sâu――thích, lắm」"

# 【ふかみ】
# display as 深美
# JP: 「ひゃんっ！　――んっ！！」
968 = "（Ngoáy! Phập――phập! Ngoáyyyy!）"

# monologue
# JP: （くぷうううううううううっ！）
# 1674 = "（插！）" 

# 【ふかみ】
# display as 深美
# JP: 「んきゅうううううううううううううぅぅぅぅんっ！！」
# 1057 = "「嗯！！」" 

# monologue
# JP: 子宮に強く押される感覚。同時に響くふかみの嬌声。\nそれが許しと、本能がすぐ理解し弾けるっ！
1370 = "「Ha――a! Ngoáy ngoáy――lại――thế này!!\nHôn\nvào, tử cung――thích quá――sướng――quá, đi\nmất」"

# 【双鉄H】
# display as 雙鐵
# JP: 「くぁっ！」
983 = "Tâm trí tôi còn tan chảy hơn cả âm thanh\nvà da thịt của Fukami."

# monologue
# JP: （びゅうううっ！　びゅるっ！　どびゅうううっ！！）
1647 = "Lỗ nhỏ của Fukami mang trong mình cả sự\nngây thơ của thiếu nữ lẫn sự trưởng thành\ncủa phụ nữ,\nđã hoàn toàn chi phối tôi, ép\nbuộc hông tôi phải chuyển động."

# 【ふかみ】
# display as 深美
# JP: 「ひあっ！？　――あっ！　あつい――あついのっ――\nびゅうって――おなかっ――子宮っ――叩い――んっ！」
973 = "（Phập! Phập! Phập! Phập!）"

# monologue
# JP: 瞬間、和らぐ。
1585 = "「Ha! A! A! A! Anh, Soutetsu,\nem――em――em!\nKhông, không chịu nổi nữa!」"

# monologue
# JP: 精が満たすのを感じてか、\nふかみのおまんこは僕を自由にしてくれる――から！
1402 = "「Anh, cũng――vậy. Fukami!」"

# monologue
# JP: （ぐうううううっ！）
# 1674 = "（插！）" 

# 【ふかみ】
# display as 深美
# JP: 「あぎゅっ！」
# 1022 = "「啊！」" 

# monologue
# JP: だから自分で、自分の意思で、一ミクロンの隙もなく、\n子宮の口と勃起の先とを密着させて押し付け続ける。
1410 = "Lẽ ra tôi đã bị ép phải xuất tinh nhiều\nlần từ lâu rồi mới phải."

# monologue
# JP: （びゅうっ！　びゅるうっ！　びゅびゅっ！　どびゅっ）
1646 = "Nhưng lỗ nhỏ của Fukami lại nới lỏng, run\nrẩy rồi siết chặt lại,\nhoàn toàn khống chế\ntôi, như muốn bảo tôi hãy cùng lên đỉnh\nmột lúc!"

# monologue
# JP: 押し付けたまま、射精する。
1427 = "（Phậpppp! Ngoáyyyyyyy!!!）"

# monologue
# JP: 精液全部を、ふかみの子宮に――\n赤ちゃんをつくる愛しい場所にひたすら注ぎ込みつづける。
1340 = "「Hyan! ――Ưm!!」"

# monologue
# JP: （びゅっ――びゅう――――びゅるっ――――ぴゅっっ）
1644 = "（Ứa nướccccccccc!）"

# 【ふかみ】
# display as 深美
# JP: 「は……あっ……いっぱい……いっぱい……んっ――\nそう、てつ……さん、の……あつい、の……いっぱいぃ」
1007 = "「Nkyuuuuuuuuuuuuuuuuuuun!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ」
# 1019 = "「啊」" 

# monologue
# JP: 体の力を使い切り、僕が後ろに崩れ落ちれば、\n繋がっているそのままに、ふかみもくたりと崩れてしまう。
1384 = "Cảm giác bị tử cung đẩy mạnh. Đồng thời là\ntiếng rên rỉ của Fukami vang lên.\nBản năng\nlập tức hiểu rằng đó là sự cho phép, và\nbùng nổ!"

# 【ふかみ】
# display as 深美
# JP: 「は……ぁ……あっ――あっ」
1005 = "「Kua!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……っっ――んっ――ふっ――んっ」
1043 = "（Phụt! Phụt! Phụtttttt!!）"

# 【ふかみ】
# display as 深美
# JP: 「ちゅむっ――ちゅっ――ちゅうう――ちゅるっ――\nれるっ――れろっ――れろおおっ――ちゅううっ」
1035 = "「Hia!? ――A! Nóng――nóng quá――\nBắn\nvào――bụng――tử cung――đập vào――ưm!」"

# monologue
# JP: 名を呼ぶ声さえ出す力がない。\nその状況でもお互いが求め合うまま、キスを重ねる。
1361 = "Khoảnh khắc đó, tôi cảm thấy bình yên."

# monologue
# JP: ふかみの舌が、僕の脳まで舐めてるようで、\nどんどん――ふかみに染められている。
1481 = "Có lẽ vì cảm nhận được tinh dịch đang lấp\nđầy,\nlỗ nhỏ của Fukami đã giải phóng cho\ntôi――!"

# 【双鉄H】
# display as 雙鐵
# JP: （ああ……けれど――）
1649 = "（Ưmmmmmm!）"

# monologue
# JP: 僕の中、完全に染まらぬ形が残る。\nそれは鮮やかでまぶしくて。
1374 = "「Agyu!」"

# monologue
# JP: どろどろの性に曇ってるような今の思考で、形を追うのは\n――なにか、申し訳ないような気さえして。
1511 = "Vì vậy, bằng chính ý chí của mình, tôi\ntiếp tục ép sát đỉnh dương vật vào cửa tử\ncung\nmà không để hở dù chỉ một micromet."

# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅうっ――ちゅっ」
1052 = "（Phụt! Phụt! Phụt! Phụtttt）"

# monologue
# JP: だから、今は、\nただただぐずぐず溶けていく。
1413 = "Tôi cứ thế ép sát và xuất tinh."

# monologue
# JP: ふかみのキスに溶かされながら、\n重なっている一瞬を――ひたすら味わい、噛み締め続ける。
1363 = "Toàn bộ tinh dịch, tôi không ngừng rót hết\nvào tử cung của Fukami――\nvào nơi tạo ra em\nbé đáng yêu đó."
