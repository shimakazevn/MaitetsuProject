# ふかみh1_ともはり練習.txt 
[info]

[characters]
1293 = "双鉄H"
1181 = "ふかみ"

[character_subs]
1591 = "雙鐵"
1444 = "深美"

[script]
# lines: 289 
# 【双鉄H】
# display as 雙鐵
# JP: 「っと！」
1065 = "「嘿！」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、上手です。双鉄さん。\n今のだったら、揺らさずに瀬を乗り越えられます」
1034 = "「啊，真漂亮，雙鐵先生。照剛才這樣操作，肯定可以平緩渡過急流」" 

# monologue
# JP: この瀬を抜ければしばらくは、\n流されるままに漂うだけだ。
1496 = "渡過這處急流後，暫時只要乘著水流向下游漂就行了。" 

# monologue
# JP: 乗り切ったという感覚に、ついつい口も軽くなる。
1387 = "我覺得自己彷彿度過了難關，口氣也變得輕鬆起來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし……川下り船でとはな」
942 = "「不過……漂流啊」" 

# monologue
# JP: ふかみと、凪と。\nそれぞれと僕との、ふたりきりでの一日デート。
1385 = "我要分別和深美還有凪約會一天。" 

# monologue
# JP: ふかみの希望は、僕のともはり練習を、\nふたりっきりでたっぷり行うことだった。
1455 = "深美想和我一起，兩個人單獨訓練掌櫓。" 

# 【ふかみ】
# display as 深美
# JP: 「二回もチャンスがあるんだから、\n一回目は、自分のホームで――って、思ったんです」
1118 = "「畢竟有兩次機會，所以我覺得第一次還是在自己的主場比較好」" 

# monologue
# JP: 三者……というか、実質的にはふかみと凪との合議により、\nふかみ二回、凪一回というデート回数でまとまった。
1533 = "經過三個人……其實也就是跟深美和凪兩個人的協商，約會的次數最後定為深美兩次，凪一次。" 

# monologue
# JP: 何故に回数が同じでないのか、ふたりに説明されるまで、\n不思議に思ったものであったが……
1307 = "在她們倆跟我解釋之前，我還奇怪為什麼次數不一樣呢……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……“平等でなくとも公平”――か」
772 = "「……“雖然不平等，但是很公平”啊」" 

# 【ふかみ】
# display as 深美
# JP: 「ですね。[じゅっぷん,1]十分の差も無いことですけど、\n双鉄さんの、初めてのエッチの相手は……凪ちゃん」
1100 = "「是啊。雖然前後相差不到十分鐘，但是你第一次上的是……小凪」" 

# monologue
# JP: 淡々とした口調で、事実を述べている。
1451 = "深美平靜地陳述著事實。" 

# monologue
# JP: ただそれだけのことなのに、\n言うに言われぬ迫力を何故か、感じてしまう。
1588 = "雖然她沒什麼別的動作，但我卻感受到了異樣的壓迫感。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、ふたりきりデートは、わたしが二回で、\n凪ちゃんが一回。これで、ぎりぎり公平かなって」
1087 = "「所以，單獨的約會，我兩次，小凪一次。這樣就勉強公平了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1129 = "「這樣啊」" 

# monologue
# JP: ふかみと凪との、それが決定事項なら、\n僕があれこれ口をはさむべきことでも無い。
1431 = "既然她們倆這樣決定了，那我也沒辦法插嘴。" 

# monologue
# JP: ふかみの声からも謎の迫力が綺麗に失せて、\nむしろ楽しげに弾み始める。
1473 = "深美的聲音也不再帶有神秘的壓迫感，反倒開心起來。" 

# 【ふかみ】
# display as 深美
# JP: 「それでわたし、一回目は見てもらおうって思ったんです。\n自分のホームで、船頭をしてるわたしの姿――」
1088 = "「所以，我才希望第一次約會能請你來看看我在自己的主場掌櫓的樣子」" 

# monologue
# JP: 言ってふかみは、舳先でしゃん、と背筋を伸ばす。\n伸ばしながらもその頬が、じわじわ赤に染まってく。
1561 = "話畢，深美站在船頭挺了挺背。與此同時，她的臉也越來越紅。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんが、う、美しいって……言ってくれたわたしで。\n双鉄さんに……す、好きに、なって、もらいたく、って」
1135 = "「雙鐵先生都、都說我……漂亮了。當然要讓雙鐵先生……喜、喜歡上我了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「“好きになる”のか？　それは無理だ」
1123 = "「要我喜歡上你？那怎麼可能」" 

# 【ふかみ】
# display as 深美
# JP: 「え！？　ええっ！？　な、なんで――です、か？」
1031 = "「啊！？哎！？為、為什麼……會這樣？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
990 = "「哇！？」" 

# monologue
# JP: 舟が揺れる、瀬でも無いのに激しく。\nその反応に、自分の言葉が著しく不足していたと知る。
1546 = "船搖了起來。這裡沒有急流，卻晃得這麼厲害。見她這樣，我才明白自己的措辭問題很大。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何故って、僕は、すでにふかみを好きだからだ」
1117 = "「為什麼？當然是因為我已經喜歡上你了」" 

# 【ふかみ】
# display as 深美
# JP: 「ふえっ！！？」
993 = "「哎！！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「“もっと好き”“更に好き”にならなれるだろうが……\n既にふかみを好きな僕が、“好きになる”のは不可能だ」
1081 = "「我可以變得更喜歡你……但我已經喜歡上你了，所以我不可能再喜歡上你啦」" 

# 【ふかみ】
# display as 深美
# JP: 「好き……好きって……双鉄さんが、わたしのことを――\nすでに好き、って……ふあ、ぁっ」
1039 = "「喜歡……喜歡……雙鐵先生已經……喜歡上我了……哇」" 

# monologue
# JP: （ぐらっ！）
1678 = "（晃）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！？」
1116 = "「深美！？」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　あっ！　双鉄さん、今こっちに来ちゃっ――\nきゃっ！？　わあああああっ！？」
995 = "「哎！？啊！雙鐵先生，現在千萬別過來……呀！？哇！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んぬっ！？」
1059 = "「嗯！？」" 

# monologue
# JP: （ざっぼーーーーーーーーんっ！！！）
1675 = "（撲通！！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……う……むっ…………ぬっ…………」
781 = "「……呃……唔…………唔…………」" 

# 【ふかみ】
# display as 深美
# JP: 「よいしょ、よいしょ――ごし、ごし――ごし、ごし」
1064 = "「嘿咻，嘿咻……擦呀擦……擦呀擦」" 

# monologue
# JP: ……懸命に、ふかみが僕を拭ってくれてる。\n拭ってくれているのは実に、ありがたいのだが――
762 = "……深美正在用力擦拭我。我也不是不喜歡她擦拭我……" 

# 【ふかみ】
# display as 深美
# JP: 「ごし、ごし――ふき、ふき――ん……どうでしょう？\nだいぶ、双鉄さん乾きましたか？」
1093 = "「擦呀擦……擦呀擦……怎麼樣？是不是幹得差不多了？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「う……うむ」
1053 = "「嗯……嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。お風呂沸かしてるんですけど……\n時間、まだまだかかっちゃいますから」
1074 = "「對不起。我在燒洗澡水……不過還需要一段時間」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや……うむ」
981 = "「呃……嗯」" 

# monologue
# JP: 隆盛を極めていた頃には、冬場の川下りも大繁盛で、\n冷えきった船頭さんたちに仕事後の風呂を提供していた。
1312 = "在繁榮時期，冬季也有許多客人來漂流，因此經營者為掌棹提供了工作結束後可以享用的澡堂。" 

# monologue
# JP: ゆえに、ここの風呂は非常に湯船が大きくて、\n沸かすのにも相当な時間が掛かってしまう――のだそうだ。
1581 = "這座澡堂非常大，因而燒熱也需要耗費很長一段時間――據說是這樣的。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……まだこの辺、全然拭けて無いですね。\nごめんなさい――ん……よいしょ、よい、っしょ」
1018 = "「啊……這附近還完全沒擦乾呢。對不起，嗯……嘿咻，嘿咻」" 

# monologue
# JP: だから、ふかみは僕を拭く。\n濡れてスケスケの服を、下着を、そのまま身につけながら。
1484 = "深美繼續擦拭著我。她身上的衣服和內褲也被水打濕，變得半透不透。" 

# monologue
# JP: 無駄な水滴を飛ばさないよう僕を寝かせて、\nその上で、一生懸命、腰をふりふり、僕を拭く。
1500 = "為了不讓水漫開，她讓我躺下，坐在我身上晃著腰用力地擦拭著我。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんに、風邪とかひかせたら申し訳ないですし。\nわたし、いくらでも拭きますから」
1121 = "「萬一讓你感冒了多不好意思呀。我會努力擦乾淨的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや――風邪をひく心配はなかろうさ」
1107 = "「沒事，應該不會感冒的」" 

# monologue
# JP: 目の前に、ふかみのパンツの股間が広がる。\n水をたっぷり含んで張り付き、濡れている。
1520 = "眼前是深美雙腿之間的內褲。水靈靈、鼓囊囊的，都濕透了。" 

# monologue
# JP: 拭く動きにつれ、それが近づき、遠ざかっては、\nぽたりぽたりと僕の顔面に滴を落とす。
1319 = "她每次擦拭的時候，內褲都會靠近一下又遠離一下，水珠則滴滴答答地掉在我臉上。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「一生懸命拭いてもらえたおかげで僕は――\nすっかり、熱くなってしまった」
952 = "「你擦得這麼用力，我都熱起來了」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
1019 = "「啊」" 

# monologue
# JP: ふかみの鼻先、すぐのところで、\n僕の勃起がズボンを大きく持ち上げている。
1379 = "我硬起來的東西已經在褲子裡撐起了帳篷，探到了深美的鼻子前面不遠處。" 

# monologue
# JP: ふかみはそれを認識し、少しも顔をそらしはしない。\nならば、やはり――これは、誘惑に違いなかろう。
1465 = "深美發現了，但她完全沒有躲開。那我就明白了。這肯定是在誘惑我。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「むしろ、ふかみがぐしょぐしょに濡れてしまってる。\n僕でよければ――拭くのを、喜んで手伝うが？」
1083 = "「我看你更是濕得不行了。如果不你介意的話，我來幫你擦擦吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！　はい！　はい！　おねがいしますっ！！」
1026 = "「啊！好的！好的！拜託了！！」" 

# monologue
# JP: 弾む声。
1453 = "深美很開心。" 

# monologue
# JP: 誘惑かどうかの判断をなかなかつけかねていたせいで、\nふかみを焦らす形になってしまっていたかと思わせられる。
1305 = "因為我一直不太好判斷她到底是不是在誘惑我，所以造成的結果就是我讓她苦等了一陣子。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば」
1068 = "「好吧」" 

# monologue
# JP: （じゅぶるっ！！）
1655 = "（啾！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！」
969 = "「呀！」" 

# monologue
# JP: （じゅっ――じゅるっ――れろっ――れろおおっ）
1654 = "（啾啾）" 

# monologue
# JP: 焦らしてしまったことを少しでもお詫びしたくて。
1263 = "做了對不起人的事，就該好好道歉。" 

# monologue
# JP: 最初からもう全開で、パンツ越しに張り付き浮かぶ縦すじに、\nキスしてそのまま、思いっきりに舌を這わせる。
1382 = "我立刻拿出最大的力道，隔著內褲吻了一下那條豎線，接著立刻伸出舌頭舔弄起來。" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁ、あっ――べろ……あったか……いっ……んうっ」
992 = "「哇，啊……舌頭……好暖……呀……嗯」" 

# monologue
# JP: （れるっ！　れろっ――じゅうううっ――はむっ！」
1553 = "要被……啾……啾……啊嗚！」" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あっ――わたしの――おまんこっ――\n双鉄、さんの――おくちっ――おくち、でっ――」
987 = "「哇……啊……我的……那裡……正在被……雙鐵先生的嘴巴……嘴巴……」" 

# monologue
# JP: 瑞々しい、というよりもむしろ水そのものの味が広がり。
1300 = "嘴裡一股水味。應該就是水。" 

# monologue
# JP: けれどもそこにすぐさまに、\n熱さを帯びた薄い酸味の、ぬらつく蜜が混じり始める。
1253 = "但是很快，水裡就沾上了帶有溫度和輕微酸味的蜜汁。" 

# monologue
# JP: （ぺろっ！　れろっ！　れりゅっ！　にゅるうっ！）
1681 = "（舔啊舔！）" 

# 【ふかみ】
# display as 深美
# JP: 「あ……や……しみ、てるっ――ん――わたし、おまんこ――双鉄さんの、ツバが……、しみ、て――あつ、くて」
1001 = "「啊……呀……濕透了……嗯……我的下面……沾上了……雙鐵先生的口水……好燙」" 

# monologue
# JP: （じゅるっ――じゅううっ！　じゅぶうっ！　ごくっ！）
1651 = "（啾……啾！啾！噗！）" 

# 【ふかみ】
# display as 深美
# JP: 「あっ――ふっ――やけ、て――とけ、ちゃうっ――\nわた、しの――おまんこっ――ん――とけちゃう、よぉ」
1003 = "「啊……呼……好燙……要溶化了……我的……下面……嗯……要溶化了」" 

# monologue
# JP: 溶かしてやりたい。もっと、もっとに舐めしゃぶり。\nだが、そうするにはこの薄衣が――
1326 = "好想溶化了她。我繼續用力舔。可舔著舔著這塊薄布好礙事……" 

# monologue
# JP: 厚さ数ミリにも満たぬであろう、\n濡れて張り付くパンツがどうにも、邪魔すぎる。
1580 = "這塊沒幾毫米厚的、濕漉漉地貼在深美下面的內褲真是太礙事了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷぁ。随分と濡れてしまっているな。\nこれは脱がんと……ふかみこそ風邪を引きかねん」
1045 = "「嗯……呼。你都濕透了，這不脫可不行啊……感冒了怎麼辦」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……は、はい。――そう、ですよね。\nわた……し、こんなに――ぐしょぐしょ……で」
1014 = "「啊……好、好的。……也對。我……已經……濕透了……」" 

# monologue
# JP: ぽた――り。
1499 = "滴答……" 

# monologue
# JP: 股間から糸をひくように滴が落ちる。\nふかみの腰が、またもじもじと揺れ動く。
1476 = "深美的臀部低下水珠，那水珠拉起長長的線條。她的腰也像是在忍耐什麼一樣搖晃起來。" 

# 【ふかみ】
# display as 深美
# JP: 「あ、あの――わたし――上は、自分――自分で、脱ぐっ\nその――脱ぎます、から――」
1133 = "「那、那個……我……自己……自己脫上衣，呃……我自己來脫吧……」" 

# monologue
# JP: 匂いが濃くなる。
1440 = "氣味變重了。" 

# monologue
# JP: 体がどんどん熱くなり、\n肌と肌とが触れ合う部分が、お互いの汗にぬらついていく。
1378 = "我的身體也越來越熱，我們相互接觸著的肌膚沾滿了彼此的汗水。" 

# 【ふかみ】
# display as 深美
# JP: 「だから……下……あの、下、は――できっ、でき――\nでき、たら……そのっ！　双鉄、さん――に……」
1085 = "「所以……下面……那個，下面……可以，可以……可以的話……就請雙鐵先生……來……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「望むところだ」
1106 = "「求之不得啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ」
# 1019 = "「啊」" 

# monologue
# JP: 嬉しげな声に心地よく鼓膜を揺すられながら、\n張り付く布をゆっくり剥がし、ふかみの下を全部脱がせる。
1535 = "聽深美這樣說，我很愉快，於是立刻將貼在她下體的那塊布慢慢剝了下來。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……わた、し……わた、し……おま、んこ……\n双鉄さんの……お顔の……こんな……こんな近く、で」
1015 = "「啊……我……我……的那裡……就在雙鐵先生……臉的……旁……旁邊」" 

# monologue
# JP: 剥き出しになったおまんこを、\nあらためてまじ、と見てみれば――
1358 = "我仔細地端詳著暴露在空氣中的陰部……" 

# 【双鉄H】
# display as 雙鐵
# JP: （おお……）
1659 = "（噢……）" 

