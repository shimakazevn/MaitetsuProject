1276 = "凪的下面特別窄，所以我跟深美第一次做的時候沒有怎麼感覺到……現在感覺深美下面也很緊很窄啊。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……んっ――はっ――おっきい、ですっ――\n双鉄、さん、の――んっ――おなか――ささ、って――」
1011 = "「啊……嗯……啊……好大……雙鐵先生的……嗯……插到了……我的裡面……」" 

# monologue
# JP: 切れ切れの声。\nだが、辛そうなものとは感じない。
1475 = "深美的聲音斷斷續續的。但聽起來她並不痛苦。" 

# monologue
# JP: 狭くてキツイ膣ではあるが、\n強いぬかるみと和らぎとが、僕の進みを援けてくれる。
1590 = "雖說陰道很窄很緊，但是因為足夠潤滑，那並沒有阻礙我的插入。" 

# monologue
