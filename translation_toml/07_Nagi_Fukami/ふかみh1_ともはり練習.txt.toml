1077 = "Mật dịch của Fukami tràn ra quá nhiều,\nbuộc em phải nuốt xuống, chính cử động đó,\nđã làm chậm lại chuyển động của lưỡi."

# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ……」
# 980 = "「呃……啊……」" 

# monologue
# JP: コツを掴んだか、勃起の形を口が完全に把握したのか、\nふかみの口はうねり蠢き、僕の精液を絞りに来てる。
1245 = "「Liếm——chụt! Phập! Phập!\nMút! Chụt! Chụt!\nMút!!」"

# monologue
# JP: このままだったら、一方的にイかされる。\nそれはそれで、幸福なことにも思えるのだが――
1582 = "「Ưm——liếm——hự——ự, c——」"

# monologue
# JP: （つんっ、つん――つつん）
1648 = "「Kimochiyoku natte kureta kana……ưm——liếm——\nchụt——Soutetsu-san……chụt——」"

# monologue
# JP: ――だが、僕とてふかみをイカせたい。\n舌先を軽く尖らせ、ふかみの膣口に浅く差し込んでみる。
755 = "「Ku——a……」"

# monologue
# JP: （きゅ――きゅきゅっ！）
1652 = "Có lẽ em đã nắm được bí quyết, hoặc miệng\nem đã hoàn toàn quen với hình dáng của sự\ncương cứng,\nmiệng Fukami cuộn trào co bóp,\nchực chờ vắt kiệt tinh dịch của tôi."

# monologue
# JP: 途端に舌は締め付けられるが、これなら進める。\n確信すると同時に舌を、思いっきりに固くし伸ばして！
1376 = "Cứ đà này, tôi sẽ bị ép ra mất.\nNghĩ đi\nnghĩ lại thì, đó cũng là một niềm hạnh\nphúc——"

# monologue
