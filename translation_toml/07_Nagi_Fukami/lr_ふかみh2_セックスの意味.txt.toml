1510 = "Vì vậy, tôi bắt đầu di chuyển. Hướng đến nơi sâu nhất của Fukami mà từ nãy đến giờ tôi vẫn cố tình tránh."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっっ！　あっ！　ンッ――くっ――\nあっ！　わたし、なかっ――えぐれ――んうううっ！」
1273 = "「Ha! A! A! Ưm——hự—— A! Bên trong, em——bị khoét sâu——ưmuuu!」"
# monologue
# JP: （ぢゅぼおおおおおおおおおおおおおっ――ごちゅっ！）
1757 = "(Chubooooooooooooo——cụp!)"
# 【ふかみ】
# display as 深美
# JP: 「ふきゅんっ！！！！」
1095 = "「Fukyun!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここだな――この奥で、僕らの赤ちゃんが育つのだな」
1183 = "「Là chỗ này nhỉ——Sâu bên trong này, em bé của chúng ta sẽ lớn lên.」"
# monologue
# JP: （ぐっ！　ぐりっ！　ぐいっ！　ぐぐっ！！！）
1746 = "(Hự! Ngoáy! Hự! Hự hự!!!)"
# monologue
# JP: ようやく迎えた亀頭へと、子宮口がべったりキスしてくる。\nくぱくぱ吸われる快感に、精子が激しく暴れだす。
1433 = "Cổ tử cung dính chặt lấy và hôn lên quy đầu vừa mới tiến đến. Trước khoái cảm bị mút mát liên tục, tinh trùng bắt đầu vùng vẫy dữ dội."
# 【ふかみ】
# display as 深美
# JP: 「はうっ――あっ――ですっ――ですうっ！！\nんっ――奥っ――子宮――赤ちゃんの――おへやっ」
1061 = "「Hau——a——vâng——vâng ạ!! Ưm——bên trong——tử cung——căn phòng——của em bé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はその最奥に、ふかみの大事な大事な卵子に。\n僕の一番強く賢い精子を届け――受精させよう」
1290 = "「Vậy thì tôi sẽ đưa tinh trùng mạnh nhất, thông minh nhất của tôi. Vào tận cùng bên trong, vào trứng vô cùng quan trọng của Fukami——để thụ tinh.」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　はいっ！　お願いしますっ！　わたし、\nわたし！　絶対絶対、赤ちゃん大事に――守りますから」
1142 = "「Vâng! Vâng! Xin anh đấy! Em, em! Tuyệt đối tuyệt đối, sẽ trân trọng——và bảo vệ em bé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！」
1231 = "「Fukami!」"
# monologue
# JP: （ずりゅうううううううううっっっっっっっ！！！）
1766 = "(Sột soạttttttt!!!)"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～っ！！！」
1127 = "「~~~~~~~~~!!!」"
# monologue
# JP: （じゅぶううううううううううううっ！！　ごりゅっ！）
# 1757 = "（啾嚕嚕嚕，咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「かっ――はっ――！！」
1079 = "「Ka——ha——!!」"
# monologue
# JP: （ず！　ごっ！　ぢゅっ！　ごちゅっ！　りゅ！　ご！）
1744 = "(Phập! Cụp! Chụt! Cụp! Ryu! Cụp!)"
# monologue
# JP: もはや大きくスライドしない。甘く締め付ける膣壁が、\n吸い付いてくる子宮口が、大きな動きを許しもしない。
1476 = "Không còn trượt dài nữa. Thành âm đạo đang siết chặt ngọt ngào, cổ tử cung đang hút lấy, không hề cho phép những chuyển động lớn."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あっ！　あっ！　あっ！！\nひっ！　あっ！　しょこっ！　んっ――ぁ――ふうっ」
1270 = "「Ha! A! A! A! A!!\nHí! A! Chỗ đó! Ưm——a——fuu.」"
# monologue
# JP: （ぐっ！　ご！　ぢゅ！　ぶっ！　ぢゅ！　ごりゅっ！）
1742 = "(Hự! Cụp! Chụt! Phập! Chụt! Cụp!)"
# 【ふかみ】
# display as 深美
# JP: 「おにいひゃっ――はうっ――そうてつ、おにいさ――\nあっ――ふっ――あっ――あっ――ん～～～っっっ！」
1063 = "「Anh——hau——Soutetsu, anh——\nA——fu——a——a——ưm~~~!!!」"
# monologue
# JP: よだれが、汗がシーツにぼとぼと垂れ落ちる。\n赤く可愛くはみ出る舌に、思い切り舌を絡めたい。が
1403 = "Nước dãi, mồ hôi rơi lã chã xuống ga trải giường. Tôi muốn quấn lấy chiếc lưỡi đỏ hồng đáng yêu đang thò ra kia bằng tất cả sức lực. Nhưng"
# monologue
# JP: （ずっ！　ごちゅっ！　ぷっ！　ぐ！　ず！　ごりっ）
1743 = "（Phập! Nhóp nhép! Phập! Hự! Phập! Cọ xát!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっう！　おくっ！　しきゅうこう――だけっ！\nあっ！　っ！　そんな、しつこく！　ごちゅごちゅって」
1018 = "「Á! Sâu quá! Tới tận cổ tử cung——rồi! Ah! Ah! Đừng đâm, liên tục! Kêu nhóp nhép thế kia!」"
# 【双鉄】
# display as 雙鐵
# JP: 「子宮口、から――離し、たく、ないっ――くっ――\nできる――かぎりに――深くっ――近く、で――射精」
1195 = "「Cổ tử cung, anh không muốn——rời ra, đâu——ư—— Anh sẽ bắn——sâu nhất——gần nhất——có thể」"
# monologue
# JP: （ぐいっ！）
1768 = "（Giật mạnh!）"
# 【ふかみ】
# display as 深美
# JP: 「ふやんっ！！！」
1087 = "「Ahhh!!!」"
# monologue
# JP: キスの代わりに、ハグの代わりに、腰を持ち上げ支える\n手指に思いっきりの力を込める。
1505 = "Thay vì hôn, thay vì ôm, tôi dùng những ngón tay đang đỡ lấy eo em truyền vào đó toàn bộ sức lực."
# 【ふかみ】
# display as 深美
# JP: 「ぁ――あ――精液、せい、えきっ――ンッ――この、\n姿勢、なら――おまんこ、子宮の、上、だから――ぁ」
1075 = "「Ah——ah——Tinh dịch, tinh, dịch——ưm——Tư thế, này——âm đạo, nằm trên, cổ tử cung, nên——ah」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――こぼさず、に――一滴、残らず――\n僕の、精子を――ふかみの、子宮の――一番、奥、へ」
1145 = "「Ừ——không để trào ra, ngoài——không sót lại, một giọt nào—— Tinh trùng, của anh——sẽ vào tận, nơi sâu nhất——trong tử cung, của Fukami」"
# monologue
# JP: （ぴちぃぃぃぃぃぃぃぃぃぃぃっっっっっ！！）
1774 = "（Co thắt!!!!!!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1108 = "「啊？！」" 
# monologue
# JP: 体全部の産毛が逆立つような感覚。
1526 = "Cảm giác như toàn bộ lông măng trên cơ thể đều dựng đứng."
# 【ふかみ】
# display as 雙鐵＆深美
# JP: 「ふあっ！！？」\n「ひゃうっ！！？」
1101 = "「Á!!?」\n「Ah!!?」"
# monologue
# JP: 遅れて、快感。総毛立つ。勃起全部とふかみの膣の一体感。\n愛液一滴の隙間さえなく密着しきっているような――
1635 = "Khoái cảm ập đến chậm hơn một nhịp. Nổi cả da gà. Cảm giác hòa làm một giữa toàn bộ dương vật đang cương cứng và âm đạo của Fukami. Chúng tôi dính sát vào nhau không còn kẽ hở cho dù chỉ là một giọt dâm thủy——"
# 【ふかみ】
# display as 深美
# JP: 「はうっ――ァ――あっ――あっ――おまんこ――これ、\nわたし――わたしの――おまんこ――おまんこ――」
1060 = "「Ah——ah——ah——ah——âm đạo——đây là, của em——của em——âm đạo——âm đạo——」"
# monologue
# JP: 同じ感覚、この快感を覚えているのか、ふかみの声は\nぼーっとしていて、けれど、けれどもその奥底に――
1552 = "Cùng một cảm giác, không biết có phải em cũng đang nhớ lại khoái cảm này hay không, giọng nói của Fukami nghe có vẻ mơ màng, nhưng, nhưng tận sâu trong đó——"
# 【ふかみ】
# display as 深美
# JP: 「おまんこ、いまっ――双鉄おにいさん、かたち、に――\n双鉄おにいさんの、ため、だけの――ふ……ぁ……嬉し」
1179 = "「Âm đạo, bây giờ——đã biến thành, hình dạng——của anh Soutetsu—— Chỉ dành, cho——anh Soutetsu, thôi——ah……vui quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: 強い喜び。それが表出した瞬間に、僕の感情も弾け出る。\n嬉しい、楽しい、気持ちいい――僕はふかみをっ――
1463 = "Niềm vui sướng mãnh liệt. Khoảnh khắc nó bộc lộ, cảm xúc của tôi cũng vỡ òa. Vui sướng, hạnh phúc, sung sướng——Tôi muốn Fukami——"
# monologue
# JP: （じゅぶっ！　ばぢゅっ！　ぢゅむっ！　ぶちゅっ！）
1726 = "（Nhóp nhép! Nhóp nhép! Nhóp nhép! Nhóp nhép!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！　ふかみっ！　ふかみっ！　ふかみっ！」
1232 = "「Fukami! Fukami! Fukami! Fukami!」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさっ――ぁ――っ！！　――\nそう、てつ、さっ――あ――双鉄、さん――双鉄さぁん」
1296 = "「Anh Soutetsu——ah——!! —— Sou, tetsu——ah——Anh Soutetsu——Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1071 = "「Ư!!!!!!」"
# monologue
# JP: 同じ目線に来てくれた。常に一歩下がってた――\n僕をたててたふかみがこのセックスの一瞬だけでも――
1572 = "Em ấy đã nhìn tôi bằng ánh mắt ngang hàng. Fukami, người luôn lùi lại một bước—— người luôn tôn trọng tôi, dù chỉ trong khoảnh khắc làm tình này——"
# 【双鉄】
# display as 雙鐵
# JP: 「好きだ！　僕は、ふかみが好きだっ！　大好きだっ！！\nこれからずっと――一生、ふかみとっ――添い遂げるっ」
1197 = "「Anh yêu em! Anh yêu em, Fukami! Yêu em rất nhiều!! Từ nay về sau——cả đời này, anh sẽ——bên cạnh Fukami」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　ですっ！　うれしいっ――わたし――一生\nずっと。ずうっと――ずっと、あなたと、一緒ですっ！」
1167 = "「Vâng! Dạ! Em vui lắm——em——cả đời này Sẽ luôn. Luôn luôn——luôn luôn, ở bên anh!」"
# monologue
# JP: （きゅううううううううんっっっっっっ！！！！！）
1772 = "（Co thắt!!!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: 絞られてるがキツさはない。\n密着されつつの蠕動を、より一層に感じるだけだ。
1542 = "Bị siết chặt nhưng không hề thấy đau. Tôi chỉ cảm nhận được rõ ràng hơn sự co bóp trong khi vẫn đang dính sát vào nhau."
# monologue
# JP: （ずぶっ！　ぶぢゅっ！！　ぢゅるっ！　ばちゅっ！）
1745 = "（Phập! Nhóp nhép!! Nhóp nhép! Nhóp nhép!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　あっ！　あっ！　ふあっ！　ねっ！！\nもっと――もっと――もっと――もっとぉっ！！」
1094 = "「Ah! Ah! Ah! Ah! Nữa đi!! Nữa đi——nữa đi——nữa đi——nữa đi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1070 = "「唔！！！！」" 
# monologue
# JP: （ず！　ご！　ち！　ご！　ぶっ！　ご！　ぬ！　ご！）
1749 = "（Phập! Phập! Phập! Phập! Phập! Phập! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　それっ！　そこっ！　おくっ！　しゅき！\nおくっ！　しきゅう！　もっとぉっ！！！」
1276 = "「Ah! Đúng rồi! Chỗ đó! Sâu nữa! Thích quá! Sâu nữa! Tử cung! Nữa đi!!!」"
# monologue
# JP: （ずちゅっ！　ごちゅっ！　ごりっ！　ぐくっ！！！）
1747 = "（Nhóp nhép! Nhóp nhép! Cọ xát! Hự!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　あっ！！　ささっ――て――えぐ、って\n――かたち――わたし――かえられ、ちゃうっ――っ！」
1022 = "「Á!? Ah!! Cọ xát——vào——khoét sâu, vào ——hình dạng——của em——sắp bị đổi, mất rồi——!」"
# 【双鉄】
# display as 雙鐵
# JP: 「かわって――いい、さ――それに、応じて――\n僕も――かならずっ――変わるっ――ゆえっ――」
1224 = "「Đổi——cũng được, mà——đáp lại, điều đó—— Anh cũng——chắc chắn——sẽ thay đổi——nên——」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
# 1277 = "「蛤啊！！」" 
