1063 = "Âm đạo và dương vật hòa quyện vào nhau\n\"guchu guchu\", không còn nhận ra ranh giới\nnữa.\nTôi chỉ cảm nhận rõ rệt tinh trùng\nđang sục sôi trong tinh hoàn."

# monologue
# JP: よだれが、汗がシーツにぼとぼと垂れ落ちる。\n赤く可愛くはみ出る舌に、思い切り舌を絡めたい。が
1403 = "「Từ giờ. Chúng ta. Sẽ trở thành bố, và mẹ\n――của đứa con mà chúng ta chắc chắn sẽ có\nđược」"

# monologue
