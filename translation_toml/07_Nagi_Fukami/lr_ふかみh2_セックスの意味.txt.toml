1269 = "「蛤啊啊！啊啊！我……我不行了……高潮太多次了……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああっ」
# 1140 = "「嗯」" 

# monologue
# JP: どの動きにもふかみの膣がぴたり応えて蠢いてくれ――\nいや、ふかみと僕と、ふたりの体が同じ動きを望んでる。
1486 = "我任何一個細微的動作，都能讓肉壁產生反應。不，是我們的身體都在渴望同一件事。" 

# monologue
# JP: （ずびゅっ！　ぼちゅ！　ごっ！　ぎりゅっ！　くゅ！）
# 1726 = "（咕啾、咕啾、咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「ゃぁぁぁぁぁっ！　かはっ！　はっ！　あっ！　また！\n奥っ！　子宮っ！　ごりゅごりゅ！　えぐるの！　ふぁ」
1016 = "「呀啊啊啊！蛤啊！又來了！小穴深處！子宮！一直被撞擊……蛤啊！」" 

# monologue
# JP: ふかみの膣は変わらずぴったり貼り付いて、\n貼り付きながら蠕動し、精液の濃度と粘度を高め続ける。
1443 = "小穴依舊緊緊貼著肉棒，同時不停蠕動，提高精子的濃度與黏稠度。" 

# monologue
# JP: （ずっ！　ごっ！　ちゅっ！　ごりゅ！　ぶっ！　ご！）
1748 = "（啪！啪！啪！啪！！）" 

# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　しょれっ！　こきざみっ！　ぁっ！\nんっ！　んっ！　んっ！　んっ！　ふぁっ！　あっ！」
1272 = "「蛤啊！啊啊！這麼快！啊啊啊！嗯！嗯！嗯啊啊啊！」" 

# monologue
# JP: 密着ではなく一体化。肌を重ねた先にある契るということ。\n[つが]番うということ、妻と夫になるということ――
1489 = "我們不只是身體緊貼，而是融為了一體。成為了妻子與丈夫的關係。" 

# monologue
# JP: （じゅ！　お！　ぶっ！　ごっ！　ぐっ！　ごりゅっ！）
# 1748 = "（啪！啪！啪！啪！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　またっ！　わらひっ！　またっ！　これ、\nもうっ！　らめっ！　たいりょく！　限界、らからぁ！」
1019 = "「呀啊！又來了！我、我又要！不行了！體力到極限了！」" 

# monologue
# JP: （きちゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっ！！）
# 1774 = "（縮緊！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！！！」
# 1106 = "「啊！！！」" 

# monologue
# JP: 僕とてとっくに限界だ。けれども少し、もう少しだけ\n歯と鈴口とを食いしばる。ふかみに精子を、余さずに！
1482 = "我也早就忍不住了，但是一直在咬牙堅持。就是現在了，我將所有精液射向她的體內！" 

# monologue
# JP: （じゅりゅうううううううっっっっっっっっっっ！！！）
1756 = "（啾嚕嚕嚕嚕嚕嚕！！！）" 

# 【ふかみ】
# display as 深美
# JP: 「きゅゃぁぁぁぁぁっぁぁぁぁぁぁぁぁぁぁうっっ！！」
1125 = "「嗚啊啊啊啊啊！！」" 

# monologue
# JP: 悲鳴のようにも聞こえるふかみの歓喜のあえぎ。\n僕の体も、まったく同じ響きで震え、喘いでる。ゆえ！
1568 = "深美歡愉的呻吟近乎尖叫。我的體內也迴響著同樣的情感，因此顫抖著、喘息著。" 

# monologue
# JP: （ぢゅぼぉぉぉぉぉぉぉぉぉぉぉぉ――ごりゅぅっ！！）
1732 = "（咕啾咕啾，啾嚕嚕！！）" 

# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！！！」
1099 = "「啊嗯～～～～～～～～～～～～～～～～～～！！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っぁっ！！！」
# 1106 = "「啊！！！」" 

# monologue
# JP: （ぼびゅっ！　びゅるるるっ！　ぶりゅっ！　どびゅ！）
1739 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ――ぁっ――ぁっ！　ぁぁっ！！！！」
1084 = "「啊啊、啊啊啊！！！！」" 

# monologue
# JP: （びゅぶ！　ぶびゅっ！　びゅううっ！　どびゅうっ！）
# 1739 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「なにこれ――なに、これっ――ふあっ――精子――\nなかだし――あつい――いつもと、おんなじ、なのにぃ」
1191 = "「怎麼回事……怎麼回事……蛤啊……精子……射在裡面……好熱……明明和平時沒有區別」" 

# monologue
# JP: 僕も感じる。ふかみの膣内に射精す快感はいつもと同じ、\n最高の密着感であるのに――そこより深い何かを確かに。
1479 = "我也感覺到了。內射的快感與平時一樣，緊緊貼合的感覺依然無比舒爽。但比起這些，我還感受到了更深沉的事物。" 

# monologue
# JP: （びゅうっ！　びゅっ！　ぼびゅっ！　びゅるっ！！）
1738 = "（咻咻、咻咻！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――これ……妊娠――受精……届いて、るっ――\nんっ――感じ、するっ――なに――これ――しゅご、い」
1266 = "「蛤啊……這就是懷孕、受精……怎麼會這樣……這樣……好棒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみ――ふかみ――ふかみっ――」
1230 = "「深美、深美、深美、深美……」" 

# monologue
# JP: （びゅっ！　びゅうっ！　どびゅっ――ぼ――ぴっ――）
# 1739 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「はい……です――双鉄、おにいさん――えへへっ――\nわたしの――わたしだけの――だんなさま」
1199 = "「我在呢，雙鐵哥哥……嘿嘿。我的……只屬於我的……夫君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 

# monologue
# JP: 双鉄おにいさんに戻ってしまった。それも嬉しく愛おしく、\n体を崩して、べとりとくっつき、キスをする。
1423 = "她又叫回雙鐵哥哥了。這個稱呼也讓我很開心，我放鬆身體，跟她吻在了一起。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……ん……チュッ――ちゅうっ……ちゅむっ――\nちゅっ――れろっ――ちゅうっ――じゅる――ちゅっ」
1090 = "「啊嗯……啾，啾嚕……啊嗯……啾……啾嚕……啾嚕嚕」" 

# monologue
# JP: 一体感が、キスでゆるやかに溶け合うことで解けてく。\nそれでも確かに変わらず残る――番ったという感覚がある。
1621 = "融為一體的感覺在親吻下漸漸消散。但有一樣東西依舊不變——我們依然親密地聯繫在一起。" 

# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ぷあっ。\nえへへっ。えへへ～、双鉄おにいさん？」
1136 = "「嗯……啾……噗哈。嘿嘿，雙鐵哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ふかみ」
1190 = "「怎麼了，深美」" 

# monologue
# JP: 番うということ、契るということ。夫婦ということ。\nそして本当のセックスの意味。それを僕らは、理解した。
1368 = "什麼是結為連理，什麼是互定終生，以及性愛真正的意義。我們……終於理解了這些。" 

# 【ふかみ】
# display as 深美
# JP: 「だぁいすきです！\n…………。…………。愛して、います」
1219 = "「最喜歡你了！我……我愛你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1143 = "「嗯，我也是」" 

# monologue
# JP: 恐らく、恐らく――願わくば。父と、母とになるために。\nそうあるための、大事な大事な――ステップとして。
1365 = "也許……要想成為父親母親，這就是必經之路吧。" 
