1101 = "「Nếu vậy anh sẽ đưa những tinh trùng khỏe\nnhất, thông minh nhất của mình,\nvào tận\ncùng đó, vào quả trứng vô cùng quan trọng\ncủa Fukami――và để nó thụ tinh」"

