# JP: 密着ではなく一体化。肌を重ねた先にある契るということ。\n[つが]番うということ、妻と夫になるということ――
1489 = "「Anh yêu em! Anh, yêu Fukami! Rất yêu em!!\nTừ giờ trở đi――suốt đời, anh sẽ――bên cạnh\nFukami」"

# monologue
# JP: （じゅ！　お！　ぶっ！　ごっ！　ぐっ！　ごりゅっ！）
# 1748 = "（啪！啪！啪！啪！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　またっ！　わらひっ！　またっ！　これ、\nもうっ！　らめっ！　たいりょく！　限界、らからぁ！」
1019 = "「Vâng! Ạ! Em vui lắm――em――suốt đời\nluôn\nluôn. Mãi mãi――luôn luôn, ở bên, anh!」"

# monologue
# JP: （きちゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっ！！）
# 1774 = "（縮緊！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！！！」
# 1106 = "「啊！！！」" 

# monologue
# JP: 僕とてとっくに限界だ。けれども少し、もう少しだけ\n歯と鈴口とを食いしばる。ふかみに精子を、余さずに！
1482 = "（Thítttttttttttttttttt!!!!!）"

# monologue
# JP: （じゅりゅうううううううっっっっっっっっっっ！！！）
1756 = "「Ưm!!!」"

# 【ふかみ】
# display as 深美
# JP: 「きゅゃぁぁぁぁぁっぁぁぁぁぁぁぁぁぁぁうっっ！！」
1125 = "Bị vắt kiệt nhưng không thấy khó chịu.\nChỉ\ncảm nhận rõ rệt hơn sự nhu động trong khi\náp sát."

# monologue
# JP: 悲鳴のようにも聞こえるふかみの歓喜のあえぎ。\n僕の体も、まったく同じ響きで震え、喘いでる。ゆえ！
1568 = "（Phập! Phập!! Chụt! Bạch!）"

# monologue
# JP: （ぢゅぼぉぉぉぉぉぉぉぉぉぉぉぉ――ごりゅぅっ！！）
1732 = "「Hyau! Á! Á! Phua! Này!!\nHơn nữa――hơn\nnữa――hơn nữa――hơn nữa đi!!」"

# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！！！」
1099 = "「!!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っぁっ！！！」
# 1106 = "「啊！！！」" 

# monologue
# JP: （ぼびゅっ！　びゅるるるっ！　ぶりゅっ！　どびゅ！）
1739 = "（Thút! Cộp! Chụt! Cộp! Phập! Cộp! Trơn!\nCộp!）"

# 【ふかみ】
# display as 深美
# JP: 「ぁ――ぁっ――ぁっ！　ぁぁっ！！！！」
1084 = "「Phua! Cái đó! Chỗ đó! Tận cùng! Thích\nlắm!\nTận cùng! Tử cung! Hơn nữa đi!!!」"

# monologue
# JP: （びゅぶ！　ぶびゅっ！　びゅううっ！　どびゅうっ！）
# 1739 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「なにこれ――なに、これっ――ふあっ――精子――\nなかだし――あつい――いつもと、おんなじ、なのにぃ」
1191 = "（Phập! Cộp! Ngoáy! Hự!!!）"

# monologue
# JP: 僕も感じる。ふかみの膣内に射精す快感はいつもと同じ、\n最高の密着感であるのに――そこより深い何かを確かに。
1479 = "「Hya!? Á!! Đâm――vào――khoét, sâu\n――hình\ndạng――em――bị thay đổi, mất――!」"

# monologue
# JP: （びゅうっ！　びゅっ！　ぼびゅっ！　びゅるっ！！）
1738 = "「Thay đổi――cũng được, mà――để đáp lại, điều\nđó――\nAnh cũng――chắc chắn――sẽ thay\nđổi――nên――」"

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――これ……妊娠――受精……届いて、るっ――\nんっ――感じ、するっ――なに――これ――しゅご、い」
1266 = "（Kyun! Kyu kyun! Thítttttttt!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみ――ふかみ――ふかみっ――」
1230 = "「Ua!!!!」"

# monologue
# JP: （びゅっ！　びゅうっ！　どびゅっ――ぼ――ぴっ――）
# 1739 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「はい……です――双鉄、おにいさん――えへへっ――\nわたしの――わたしだけの――だんなさま」
1199 = "（Trượtttttttttttttttttttttt!!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 

# monologue
# JP: 双鉄おにいさんに戻ってしまった。それも嬉しく愛おしく、\n体を崩して、べとりとくっつき、キスをする。
1423 = "「Ưm yuuuuuuuuu~~~~!!!」"

# 【ふかみ】
# display as 深美
# JP: 「あ……ん……チュッ――ちゅうっ……ちゅむっ――\nちゅっ――れろっ――ちゅうっ――じゅる――ちゅっ」
1090 = "（Phập chụuuuuuuuuuuu~ ngoáy!!）"

# monologue
# JP: 一体感が、キスでゆるやかに溶け合うことで解けてく。\nそれでも確かに変わらず残る――番ったという感覚がある。
1621 = "「A――hi――kuha! Hà! Hà! Kehyu!?」"

# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ぷあっ。\nえへへっ。えへへ～、双鉄おにいさん？」
1136 = "（Bạch! Cộp! Phập! Ngoáy!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ふかみ」
1190 = "「Phua! Á! Á! Á! Em――\nKhông được! Không\nđược――em, ra, nhiều quá, rồi――」"

# monologue
# JP: 番うということ、契るということ。夫婦ということ。\nそして本当のセックスの意味。それを僕らは、理解した。
1368 = "「A á」"

# 【ふかみ】
# display as 深美
# JP: 「だぁいすきです！\n…………。…………。愛して、います」
1219 = "Mọi chuyển động đều được âm đạo Fukami đáp\nlại hoàn hảo và cựa quậy――\nKhông, cơ thể\ncủa tôi và Fukami, cả hai đều đang khao\nkhát cùng một chuyển động."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1143 = "（Phập! Bạch! Cộp! Ngoáy! Kyu!）"

# monologue
# JP: 恐らく、恐らく――願わくば。父と、母とになるために。\nそうあるための、大事な大事な――ステップとして。
1365 = "「Yaaaaa! Kaha! Hà! Á! Lại nữa!\nTận cùng!\nTử cung! Ngoáy ngoáy! Khoét sâu! Phua」"
