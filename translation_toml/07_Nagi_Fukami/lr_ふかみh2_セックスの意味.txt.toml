# JP: （ばぢゅっ！　ごちゅっ！　ぢゅぶ！　ごりゅっ！！）
1721 = "Không biết Fukami có nhớ cùng một cảm\ngiác, cùng một khoái cảm này không,\ngiọng\nem ấy thẫn thờ, nhưng, nhưng tận sâu thẳm\ntrong đó――"

