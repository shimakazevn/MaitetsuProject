# display as 雙鐵
# JP: 「強すぎるのか――ならば――っ」
1162 = "「Kuha!!!」"
# monologue
# JP: （つうっ）
1740 = "「Aaaaaaaaaaaaaaaaaaaaaaaaaaa!!!」"
# 【ふかみ】
# display as 深美
# JP: 「にゃうっ！！！！？」
1088 = "Sự co thắt mãnh liệt của âm đạo, cùng với tiếng hét như đang bối rối.\nCó lẽ Fukami đã đạt đỉnh. Nhưng――"
# monologue
# JP: （きゅんっ！）
# 1775 = "（縮緊！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1158 = "「Hự! Á――」"
# monologue
# JP: とっさの思いつきであったが、爪側で軽く撫ぜるだけ。\nこれが今のふかみには、ちょうど良さそうな感じなのかも。
1495 = "（Thít! Kyun! Thít!）"
# monologue
# JP: （つーーーーーーっ、つん、つん、つーーーーーーーっ）
# 1764 = "（摩擦）" 
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　きもち、いいっ――それ、しゅきっ、\nんっ――もっと、ねっ――もっと――ゆっくりっ――」
1274 = "Mặc dù chỉ mới cắm vào một phần rất nông,\nâm đạo đã bám chặt, thít chặt và cố gắng mời gọi tôi vào sâu hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1140 = "「嗯」" 
# monologue
# JP: （つーーーーーーーーーーーーーーーーっっっ、つんっ）
# 1764 = "（摩擦）" 
# 【ふかみ】
# display as 深美
# JP: 「あっ！　ふあっ！　ぞくぞくって、ぞくぞくってする、\nんっ！　おつゆ、よだれ、やらっ――たれちゃう――ん」
1104 = "Cứ thế này, tôi sẽ bắn tinh mất――\nPhải làm cách nào đó để Fukami thả lỏng ra――a,"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。なら、もっともっと垂らしてほしい」
1215 = "（Ngoáy!）"
# monologue
# JP: （ぐちゅっ――しりゅっ――すりゅんっ――くいいっ）
# 1729 = "（咕啾、咕啾）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　またっ！　また、それっ――は、ぁっ！\nそこっ――わたしっ――弱くてっ――感じ、すぎ――！」
1097 = "「Ưm hyu!!? Khoan――khoan đã――au――\nKhông được――bây giờ, âm vật――quá mạnh――a!」"
# monologue
# JP: （ついーーーーーーーーーーーーーーーーっっ、つんっ）
# 1764 = "（摩擦）" 
# 【ふかみ】
# display as 深美
# JP: 「やああっ！？　無理っ！　らめっ！　またっ、またっ！\nだって！？　にかいっ！　、にかいも、こんな、すぐっ」
1023 = "「Đau à? Anh xin lỗi」"
# monologue
# JP: （しりゅっ――くりりゅ――すりゅう――くいっ）
# 1729 = "（咕啾、咕啾）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　あっ！　待っ！　まって！　らめっ、\nほんとっ――いま――わたし――ばかに、なっちゃうっ」
1027 = "「Irakura, ưm――không đau đâu ạ――nhưng mà――\nPhua――á! Cảm nhận――cảm nhận quá mức rồi――」"
# monologue
# JP: （つうううううううううううっっっっ――つんっ！！）
1767 = "（Thítttttttt!!!）"
