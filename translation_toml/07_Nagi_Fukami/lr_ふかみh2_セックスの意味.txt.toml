1183 = "Sự run rẩy của âm đạo đã thả lỏng hoàn\ntoàn và biến mất sự căng cứng.\nBám chặt\nlấy \"kyuu kyuu\", nhu động vừa vắt kiệt vừa\nmời gọi vào sâu hơn."

# monologue
# JP: （ぐっ！　ぐりっ！　ぐいっ！　ぐぐっ！！！）
1746 = "「Hà――hà――hà――ya――yaa――em,\nmột\nmình――em――một mình――một mình――tận hai lần」"

# monologue
# JP: ようやく迎えた亀頭へと、子宮口がべったりキスしてくる。\nくぱくぱ吸われる快感に、精子が激しく暴れだす。
1433 = "「Cũng không có gì đáng bận tâm đâu」"

# 【ふかみ】
# display as 深美
# JP: 「はうっ――あっ――ですっ――ですうっ！！\nんっ――奥っ――子宮――赤ちゃんの――おへやっ」
1061 = "Thực tế, nếu không cắm nông thế này thì\ntôi cũng đã bắn tinh rồi.\nĐể giọng không\nbị lạc đi, ngay lúc này tôi cũng đang\ntuyệt vọng kìm nén."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はその最奥に、ふかみの大事な大事な卵子に。\n僕の一番強く賢い精子を届け――受精させよう」
1290 = "「Là cuộc ái ân để tạo ra em bé mà.\nNếu\nkhông cảm nhận và thả lỏng hơn bình thường\nthì gay go đấy」"

# 【ふかみ】
# display as 深美
