1388 = "「Ồ」"
# 【双鉄】
# display as 雙鐵
# JP: 「こどもを作ろうというセックスだ。\n普段のものより、感じ、緩んでくれねば困る」
1243 = "Chỉ là ý nghĩ chợt lóe lên, tôi chỉ dùng mặt móng tay vuốt ve nhẹ nhàng.\nCó lẽ điều này lại mang đến cảm giác vừa vặn với Fukami lúc này."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
1039 = "（Trượtttttt, cọ, cọ, trượttttttt）"
# monologue
# JP: ふかみの顔が更に赤らみ、ようやく、気づく。
1585 = "「Hà! Á! Sướng, quá――cái đó, thích lắm,\nƯm――hơn nữa, nhé――hơn nữa――chậm rãi thôi――」"
# 【ふかみ】
# display as 深美
# JP: 「はぁっ――はぁ――はあっ――はあっ――（ごくっ）\nん……ふっ――あっ――はあっ――はあっ――はあっ」
1264 = "「Ừm」"
# monologue
