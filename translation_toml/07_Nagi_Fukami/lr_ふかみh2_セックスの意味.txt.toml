1079 = "「Thật đẹp làm sao……\nFukami giờ đây, đã\nhoàn toàn là một người phụ nữ rồi」"

# monologue
# JP: （ず！　ごっ！　ぢゅっ！　ごちゅっ！　りゅ！　ご！）
1744 = "「Hà――hà――chuyện đó――tất nhiên――tất nhiên\nrồi, ạ.\nBị anh――Soutetsu――làm tình――nhiều\nđến thế này, mà」"

# monologue
# JP: もはや大きくスライドしない。甘く締め付ける膣壁が、\n吸い付いてくる子宮口が、大きな動きを許しもしない。
1476 = "Hơi thở ngọt ngào. Nhu động ngọt ngào. Mùi\nhương nồng đậm của Fukami cũng ngọt ngào.\nGiọng nói ngọt ngào thấm đẫm vào tận cùng\ntôi, kẻ đang bị sự ngọt ngào ấy trói buộc."

# 【ふかみ】
# display as 深美
