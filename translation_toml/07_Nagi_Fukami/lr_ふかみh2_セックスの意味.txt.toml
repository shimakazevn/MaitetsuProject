1737 = "Theo sau đó là khoái cảm. Nổi gai ốc. Cảm\ngiác hòa làm một giữa toàn bộ dương vật và\nâm đạo của Fukami.\nNhư thể áp sát vào nhau\nkhông còn một khe hở nào dù chỉ là một\ngiọt dâm thủy――"

