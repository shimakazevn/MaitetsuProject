1195 = "Vì vậy, tôi di chuyển.\nHướng đến nơi sâu\nnhất của Fukami, nơi mà từ nãy đến giờ tôi\nvẫn cố tình né tránh."

# monologue
# JP: （ぐいっ！）
1768 = "「Phua! Á! Á! Ưm――hự――\nÁ! Bên trong, em――bị\nkhoét sâu――ưm ư ư!」"

# 【ふかみ】
