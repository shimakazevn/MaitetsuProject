[script]
# lines: 335 
# 【双鉄】
# display as 雙鐵
# JP: 「甘酒、だよな」
1216 = "「Là rượu ngọt, nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「んふふっ。でしたよぉ。甘酒でしたぁ」
1064 = "「Ưm fufu. Là rượu ngọt đó. Là rượu ngọt mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、だ」
1282 = "「Dù là vậy, thì」"
# monologue
# JP: ふかみはどう見ても酔っている。\n顔も赤いし、汗ばんでるし、呼吸も荒い。
1564 = "Nhìn kiểu gì thì Fukami cũng đang say.\nMặt đỏ bừng, vã mồ hôi, nhịp thở cũng gấp gáp."
# 【双鉄】
# display as 雙鐵
# JP: 「……あるいは、大量に呑んだのか？」
757 = "「......Hay là, em đã uống một lượng lớn?」"
# monologue
# JP: デート帰りにぶらり立ち寄った酒造見学。\nふかみに焼酎はまだ早かろうと甘酒を出して貰ったのだが。
1608 = "Trên đường đi hẹn hò về, chúng tôi tạt qua tham quan xưởng nấu rượu.\nNghĩ rằng rượu shochu vẫn còn quá sớm với Fukami nên tôi đã xin cho em ấy rượu ngọt."
# 【ふかみ】
# display as 深美
# JP: 「大量になんて呑んでないでぇす。\n試飲用のちいっちゃなカップに、三杯だけでぇす」
1223 = "「Em đâu có uống lượng lớn đâu.\nChỉ ba ly nhỏ xíu dùng để uống thử thôi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「三杯か」
985 = "「Ba ly sao」"
# monologue
# JP: 右田一でも試飲に使うあのプラカップは、60ml容量だ。\n三杯呑んでも、普通のコップ一杯にもみたぬ量だが――
1406 = "Ly nhựa dùng để uống thử ở Migita System có dung tích 60ml.\nDù uống ba ly thì lượng đó cũng chưa đầy một cốc bình thường――"
# 【双鉄】
# display as 雙鐵
# JP: 「とすると、甘酒でないものを間違って呑んだとか？\n例えば、無濾過の――」
1286 = "「Nếu vậy, hay là em uống nhầm thứ không phải rượu ngọt?\nVí dụ như, loại chưa lọc――」"
# 【ふかみ】
# display as 深美
# JP: 「ちゃあんと甘酒でしたよぉ？　甘かったですしぃ。\nあ！　うふふっ――証拠、いまから見せちゃいますねぇ」
1181 = "「Đúng là rượu ngọt mà? Ngọt lắm luôn.\nA! Ufufu――bằng chứng, bây giờ em sẽ cho anh xem nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1072 = "「――」"
# monologue
# JP: 湿ったぷりぷりの唇に、声と言葉を閉じ込められる。
1570 = "Giọng nói và lời nói của tôi bị khóa chặt bởi đôi môi ẩm ướt căng mọng."
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅむっ――ちゅうっ――\nれ――りゅっ――れりゅうううっ――ちゅりゅううっ」
1134 = "「Ưm......chụt――chụt――chụt――\nre――ryu――reryuuuu――churyuuu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……は……」
1130 = "「Ưm......hà......」"
# monologue
# JP: 熱い吐息を吹き込みながら、ふかみは舌を割入らせてくる。\n確かに、甘い――酒の香も、極めてわずかだ――っ！！
1558 = "Vừa thổi hơi thở nóng hổi, Fukami vừa đưa lưỡi chen vào.\nQuả thật, rất ngọt――mùi rượu cũng cực kỳ nhạt――!!"
# monologue
# JP: （さわっ――さすっ――もみゅっ――くりゅっ）
1765 = "（Chạm――vuốt――xoa――vê）"
# 【ふかみ】
# display as 深美
# JP: 「んちゅ――ちゅうっ――ジュルっ――じゅるるっ――\nれりゅっ――じゅううっっ――（こくっ）――ん、ちゅ」
1110 = "「Ưm chụt――chụt――chụt――chụt――\nreryu――juuuu――（Ực）――ưm, chụt」"
# monologue
# JP: キスをしながら、ふかみの指が僕の股間をまさぐってくる。\nズボンの上から亀頭の位置を確かめて、カリ首を指で弄ぶ。
1596 = "Vừa hôn, những ngón tay của Fukami vừa sờ soạng háng tôi.\nXác định vị trí quy đầu qua lớp quần, rồi dùng ngón tay trêu đùa khấc quy đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――ぷぁ、ふかみ」
1139 = "「Ưm――pua, Fukami」"
# 【ふかみ】
# display as 深美
# JP: 「甘かったでしょお？　わたしのキス――べろ。\n甘酒の味、したでしょお？」
1185 = "「Ngọt lắm đúng không? Nụ hôn của em――cái lưỡi này.\nCó vị rượu ngọt đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1150 = "「Hử? Ừ」"
# monologue
# JP: このままセックスになだれ込むのかと思ったところに、\nあどけない顔で、あどけない質問。
1503 = "Đang nghĩ rằng cứ thế này sẽ lao vào làm tình,\nthì em ấy lại hỏi một câu ngây thơ với vẻ mặt ngây thơ."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに甘さを感じた気がした。\nそれとわずかな――酒粕独特のアルコール感も」
1250 = "「Đúng là anh có cảm nhận được vị ngọt.\nVà một chút――cảm giác cồn đặc trưng của bã rượu nữa」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、甘酒、とっても素敵ですよね～\n甘くて、おいしくて、きもちよくなれて」
1157 = "「Ufufu, rượu ngọt, tuyệt vời lắm đúng không~\nNgọt ngào, ngon miệng, lại còn làm mình thấy lâng lâng nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。僕はもう、あまり飲む機会もないが」
990 = "「Có lẽ vậy. Anh thì đã không còn nhiều cơ hội uống nữa rồi」"
# 【ふかみ】
# display as 深美
# JP: 「だけどぉ――えいっ！」
994 = "「Nhưng mà――ây da!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1105 = "「!!」"
# monologue
# JP: 他愛ない会話に緩んだ瞬間、\nふかみは僕にしなだれかかり、ズボンと下着を引き下ろす。
1532 = "Ngay khoảnh khắc tôi nới lỏng cảnh giác trước cuộc trò chuyện bâng quơ,\nFukami ngả người vào tôi, kéo tụt cả quần ngoài lẫn quần lót xuống."
# 【ふかみ】
# display as 深美
# JP: 「わたしてきにはぁ――えへへっ――\n双鉄おにいさんが作ってくれる～　(ぺろっ！）」
1177 = "「Theo ý em thì――ehehe――\nrượu do anh Soutetsu làm ra~ (Liếm!)」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっ！」
1067 = "「Ư!」"
# monologue
# JP: 甘酒エキスを唾液に混ぜてふかみが亀頭に擦り込んでくる。
1578 = "Fukami hòa trộn tinh chất rượu ngọt với nước bọt rồi cọ xát vào quy đầu tôi."
# monologue
# JP: （くっ――くいっ――グッ――もみゅっ――）
1729 = "（Hự――kéo――hự――xoa――）"
# monologue
# JP: 恐らく半ば無意識にだろう。僕の太ももに押し付けられる\nふかみのおっぱいの先端は、もう完全に勃起している。
1560 = "Có lẽ là nửa vô thức. Đỉnh bầu ngực của Fukami\nđang ép vào đùi tôi đã hoàn toàn cương cứng."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの～　しぼりたての～――（ちゅっ）\nうふふっ――熱くて濃ぉいにごり酒の方が～（れろっ）」
1297 = "「Rượu đục~ mới vắt~ của anh Soutetsu――（Chụt）\nUfufu――nóng hổi và đặc sánh mới là thứ em thích hơn~（Rero）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――」
# 1072 = "「啊……」" 
# monologue
# JP: 半勃ちだった僕の性器が、いとも容易くフル勃起する。\nふかみは軽く手を動かして、勃起をいいこいいこする。
1493 = "「A――á――」"
# monologue
# JP: （なで――さすっ――しゅこっ――しゅこっ――）
1764 = "Dương vật mới cương một nửa của tôi dễ dàng cương cứng hoàn toàn.\nFukami nhẹ nhàng cử động tay, dỗ dành dương vật đang cương cứng."
# 【ふかみ】
# display as 深美
# JP: 「ずっとずうっと甘くて、おいしくて――\n気持ちよーくしてもらえちゃうから、大好きです。ん…」
983 = "（Vuốt――xoa――tuốt――tuốt――）"
# monologue
# JP: ふかみの口から舌がてろりと姿を表す。\nけれどもそれは勃起に触れず――
1554 = "「Lúc nào cũng ngọt ngào, ngon miệng――\nvà còn làm em sướng rân lên nữa, nên em thích lắm. Ưm...」"
# 【ふかみ】
# display as 深美
# JP: 「見学のとき聞きました！　確か、ええっと……\n最初は種を、暖かくして湿めらせて――繁殖させる？」
1004 = "Lưỡi của Fukami lấp ló thò ra khỏi miệng.\nNhưng nó không hề chạm vào dương vật đang cương cứng――"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あっている。そうして\n種麹の中の麹菌の数を増やして、米麹をつくっ――あ！」
1148 = "「Lúc đi tham quan em có nghe rồi! Hình như là, ừm......\nĐầu tiên phải ủ ấm và làm ẩm hạt giống――để nó sinh sôi nảy nở?」"
# 【ふかみ】
# display as 深美
# JP: 「ん～～～～～～」
1151 = "「Ừ, đúng rồi. Sau đó\nlàm tăng số lượng nấm men kōji trong men kōji giống, tạo ra gạo lên men――a!」"
# monologue
# JP: 舌をレールに、唾液がとろとろ僕の勃起に注がれる。\nホットケーキの蜜の如くに、折り重なって滴っていく。
1591 = "「Ưm~~~~~~」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ～　あったかくなれ～　あったかくなれ～」
1154 = "Lấy lưỡi làm đường ray, nước bọt sền sệt chảy xuống dương vật của tôi.\nNhư mật ong rưới lên bánh pancake, từng lớp từng lớp nhỏ giọt xuống."
# monologue
# JP: （しゅこ――しゅこ――ぐちゅ――ぐちゅっ――）
1720 = "「Ufufu~ Ấm lên đi nào~ Ấm lên đi nào~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぁ……」
1031 = "（Tuốt――tuốt――nhóp nhép――nhóp nhép――）"
# monologue
# JP: 気持ちいい。意識の全てが勃起に一気に持っていかれる。\nけれど、けれど――これが酒造りを模するのならば、だ。
1421 = "「Ưm......a......」"
# monologue
# JP: （くちゅっ！）
1734 = "Sướng quá. Toàn bộ ý thức bị dương vật hút lấy trong nháy mắt.\nNhưng mà, nhưng mà――nếu đây là mô phỏng quá trình nấu rượu, thì."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
1277 = "（Nhóp nhép!）"
# monologue
# JP: まくれあがってるスカートの奥、\nパンツの上からそっと触れれば、既に湿気ってぬめってる。
1487 = "「Phua!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……麹が、もろみが、どれほど質よくしあがろうとも、\n蒸留器の手入れが悪ければ、よい焼酎は生まれない」
758 = "Sâu bên trong chiếc váy đang bị xắn lên,\nchạm nhẹ qua lớp quần lót, đã thấy ẩm ướt trơn trượt rồi."
# monologue
# JP: （すりっ――しにゅっ――くちゅっ――ちゅぷっっ）
# 1729 = "（咕啾、咕啾）" 
# 【ふかみ】
# display as 深美
# JP: 「蒸留……器……わたしの、おまんこ、が――んっ――\n双鉄、おにいさんの……種を、蒸留する……うつわ」
1256 = "「......Dù men kōji, dù cơm rượu có chất lượng tốt đến đâu,\nnếu nhà xưởng ủ rượu không được bảo dưỡng tốt, thì cũng không thể cho ra rượu shochu ngon được」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1069 = "「Nhà xưởng......ủ rượu......âm đạo, của em――ưm――\nlà nơi......chưng cất......hạt giống, của anh Soutetsu」"
# monologue
# JP: うっとりと濡れたふかみの声が、鼓膜から脳に染みてくる。\n自分の言葉がふかみを経由し、一層深い理解に変わる。
1556 = "「!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の種が、ふかみのおまんこで蒸留され――\nその精髄たる一滴が、子宮に達し、熟成される」
1241 = "Giọng nói ướt át đầy say đắm của Fukami thấm từ màng nhĩ vào não.\nLời nói của bản thân thông qua Fukami, biến thành một sự thấu hiểu sâu sắc hơn."
# 【ふかみ】
# display as 深美
# JP: 「わたし……わたし――ンッ――種、も――最高の――\n一番、いいの――もらいたい、です、しっ――」
1193 = "「Hạt giống của anh, được chưng cất trong âm đạo của Fukami――\nGiọt tinh túy đó, chạm đến tử cung, và được ủ chín」"
# monologue
# JP: （じゅこっ！　ぢゅっ！　ぐぢゅっ！　じゅっ！！）
1728 = "「Em......em――ưm――cũng muốn, nhận được――hạt giống――tuyệt vời nhất――\ntốt nhất――ạ, và――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1068 = "（Tuốt! Chụt! Nhóp nhép! Chụt!!）"
# monologue
# JP: ふかみが勃起を扱くたび、音がどんどん湿ってく。\n濃密に垂らされた唾液に加え、先走り汁も次々加わる。
1562 = "Mỗi lần Fukami tuốt dương vật, âm thanh ngày càng trở nên ướt át.\nNgoài lượng nước bọt đặc quánh nhỏ xuống, chất nhờn rỉ ra cũng liên tục hòa quyện vào."
# 【ふかみ】
# display as 深美
# JP: 「それに、もちろん――大事な、大事な、精子――っ！\n精子、を、受け取る――おまんこ――うつわ、も――」
1285 = "「Hơn nữa, tất nhiên――tinh trùng, quan trọng, vô cùng quan trọng――!\nNơi, tiếp nhận, tinh trùng――âm đạo――nơi chứa đựng, cũng――」"
# monologue
# JP: （すっ――しにゅっ――グチュッ――チュぶっ――）
1717 = "（Vuốt――ép――nhóp nhép――chụt――）"
# monologue
# JP: 同じイメージで高まったのか、ふかみの愛液も増している。\n指先を軽く膣口に当てれば、ちぷと可愛く吸い付いてくる。
1550 = "Có lẽ vì cùng hưng phấn với một hình ảnh, dâm thủy của Fukami cũng tuôn ra nhiều hơn.\nChỉ cần chạm nhẹ đầu ngón tay vào cửa mình, nó liền mút lấy \"chipu\" thật đáng yêu."
# 【ふかみ】
# display as 深美
# JP: 「お手入れ、ちゃあんと――出来て、いる、のか――\n双鉄、おにいさんに――確かめて――ほしっ――んあ！」
1220 = "「Việc bảo dưỡng, đã được――thực hiện, đàng hoàng, chưa――\nEm muốn――anh Soutetsu――kiểm tra――giúp em――ư a!」"
# monologue
# JP: （グッ――ぢゅぶっ）
1719 = "（Hự――phập）"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。丁寧に、確認させていただこう」
1168 = "「Anh hiểu rồi. Anh sẽ kiểm tra thật cẩn thận」"
# monologue
# JP: （くっ――ぱっ――）
1741 = "（Tách――ra――）"
# monologue
# JP: 指をＶ字に大きくひろげ、ふかみの膣道に外気を導く。\nそれからふたたび指を閉じ――
1498 = "Tôi mở rộng hai ngón tay thành hình chữ V, dẫn không khí bên ngoài vào đường âm đạo của Fukami.\nSau đó lại khép ngón tay lại――"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あんっ――」
1262 = "「Phua――a――」"
# monologue
# JP: （ずっっ――ヂュルッ――ずぶっ――ぢゅぬるっ――）
1754 = "（Thút――chụt――phập――trơn tuột――）"
# monologue
# JP: 普段と違って左手だ。\n大事な大事なおまんこにうかつなことはできないが――
1632 = "Khác với bình thường, lần này là tay trái.\nKhông thể bất cẩn với chiếc âm đạo vô cùng quan trọng này được, nhưng――"
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――指……指ぃ――んっ！？　あっ――\nなかで、やっ！　別々に、動かすの――ダメ、ですぅ」
1132 = "「Ưm......á――ngón tay......ngón tay――ưm!? Á――\nỞ bên trong, á! Cử động, tách rời nhau ra――không được, đâu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばひとまとめにし――っ！？」
1214 = "「Vậy sao. Thế thì gộp lại làm một――!?」"
# monologue
# JP: （ぢゅゅこんっ！！！）
1733 = "（Phập!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1106 = "「Kua!!!」"
# monologue
# JP: 指の動きを鈍らせようと考えたのか、\nふかみの手指が強く素早く僕の勃起を愛撫する。
1575 = "Không biết có phải muốn làm chậm chuyển động ngón tay của tôi hay không,\nnhững ngón tay của Fukami vuốt ve dương vật của tôi một cách mạnh bạo và nhanh chóng."
# monologue
# JP: （ぢゅこっ！　ぢゅにゅっ！　ぢゅぶっ！　ぢゅっ！）
1722 = "（Tuốt! Nắn! Phập! Chụt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: ならば、僕もだ。指をまとめてただ単純に、\nできるだけ深みの奥深くへと――
1637 = "Nếu vậy, tôi cũng thế. Gộp các ngón tay lại và đơn giản là,\nđưa vào sâu nhất có thể bên trong Fukami――"
# monologue
# JP: （ずりゅううううううううっ！！！）
1730 = "（Trượtttttttt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふああああああんっ！！」
1268 = "「Phuaaaaaaaan!!」"
# monologue
# JP: （しゅこっ――でゅこっ――ぢゅこっ――しゅこっ――）\n（ずぶっ――じゅるっ――じゅぶっ――ずにゅっ――）
1725 = "（Tuốt――tuốt――tuốt――tuốt――）\n（Phập――chụt――phập――nắn――）"
# monologue
# JP: 呼吸が荒ぐ。水音と臭気がどんどん濃くなっていく。\n加速し、加熱し――けれどふかみは、ふと手を緩める。
1490 = "Nhịp thở trở nên thô bạo. Tiếng nước và mùi hương ngày càng nồng đậm.\nTăng tốc, nóng lên――nhưng Fukami chợt nới lỏng tay."
# 【ふかみ】
# display as 深美
# JP: 「は……ぁ――どう、です――か――んっ……\nわたし――ふかみ――の――蒸留器――は……」
1261 = "「Hà......a――thế, nào――ạ――ưm......\nNhà xưởng ủ rượu――của em――của Fukami――thì......」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。いま――最終の、確認中だ――」
1147 = "「Ừ. Bây giờ――đang trong quá trình, xác nhận cuối cùng――」"
# monologue
# JP: （ぐにゅっ――ずりゅっ――ギチュッ――くちゅっ）
1723 = "（Nắn――trượt――co thắt――nhóp nhép）"
# 【ふかみ】
# display as 深美
# JP: 「や――あっ――指っ――ん……双鉄、おにいさんの――\nおゆびが――ん、あっ――おまんこの、中――探って」
1014 = "「A――á――ngón tay――ưm......của anh, Soutetsu――\nNgón tay――ưm, á――đang tìm kiếm――bên trong, âm đạo」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい密閉性だな。指にぴったり貼り付いてくる。\nそれに――ん――圧も強く、て――申し分、ない」
1175 = "「Độ kín tuyệt vời thật đấy. Bám chặt lấy ngón tay.\nHơn nữa――ưm――áp lực cũng rất mạnh――không có gì, để chê cả」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あ……それ、なら――よかった――です。\nん……っ――ね？　なら……双鉄、おにい、さん」
1267 = "「Phua――a......nếu, vậy――thì tốt――quá.\nƯm......này? Vậy thì......anh, Soutetsu」"
# monologue
# JP: （しゅこん――しにゅっ――ちゅこっ――しゅこんっ）
# 1723 = "（咕啾、咕啾、咕啾、咕啾）" 
# monologue
# JP: 指がいっそう速度を落とす。焦らす動きに変化する。\n明らかに、挿入をおねだりされている――が――
1504 = "Ngón tay càng giảm tốc độ. Chuyển sang chuyển động trêu chọc.\nRõ ràng là đang vòi vĩnh tôi cắm vào――nhưng――"
# monologue
# JP: （ぢゅぽっ）
1735 = "（Bộp）"
# 【ふかみ】
# display as 深美
# JP: 「んうっ！！？」
1108 = "「Ưm ư!!?」"
# monologue
# JP: ふかみの膣から引き抜いた指をねっとりしゃぶる。
1497 = "Tôi rút ngón tay khỏi âm đạo Fukami rồi mút lấy một cách ướt át."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の種麹は、もう少し熟成させてほしいらしい。\nそれと――[こうじむろ,1]麹室を――」
1205 = "「Men kōji giống của anh, có vẻ muốn được ủ chín thêm một chút nữa.\nVà cả――nhà xưởng ủ rượu――」"
# monologue
# JP: 伝わるかどうか自信を持てず、\n勃起を動かしアピールしてみる。
1477 = "Không tự tin liệu em ấy có hiểu ý không,\ntôi thử cử động dương vật để ra hiệu."
# 【双鉄】
# display as 雙鐵
# JP: 「麹室を、もっとあたため――滅菌消毒してもらえれば」
1278 = "「Nhà xưởng ủ rượu, nếu được làm ấm hơn nữa――và tiệt trùng khử khuẩn thì」"
# 【ふかみ】
# display as 深美
# JP: 「あ……（こくっ）――つまり……\nこういうこと、です、か？　んっ――ぺろっ」
1081 = "「A......（Gật đầu）――tóm lại là......\nnhư thế này, đúng không, ạ? Ưm――liếm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁ」
1082 = "「Úa」"
# 【ふかみ】
# display as 深美
# JP: 「ふふっ。あってるんなら――ん……もーっと消毒……――\nん……チュッ――チュむっ――ちゅるっ――ちゅりゅっ」
1153 = "「Fufu. Nếu đúng rồi thì――ưm......khử trùng nhiều hơn nữa......――\nƯm......chụt――chụt――chụt――chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
1066 = "「Ưm......hự――」"
# monologue
# JP: ねっとりべったり丁寧で――それだけに、\nむず痒いような物足りなさもこみ上げてくる舌使い。
1589 = "Ướt át, dính dấp và cẩn thận――chính vì vậy,\ncách dùng lưỡi này cũng gợi lên một sự thiếu thốn ngứa ngáy."
# 【ふかみ】
# display as 深美
# JP: 「ぺちゅううっ――れるんっ――ん……（こくっ）\n消毒と一緒に、種麹ももっとあっためてぇ――（さわ）」
1123 = "「Pechuuu――rerun――ưm......（Gật đầu）\nCùng với việc khử trùng, làm ấm men kōji giống hơn nữa nha――（Chạm）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
1100 = "「Á!」"
# monologue
# JP: 指をまとめて手をまるめ、睾丸にその手を寄り添わせ、\nふんわりやさしく包んでくれる。
1547 = "Chụm các ngón tay lại và cuộn tròn bàn tay, áp tay vào tinh hoàn,\nnhẹ nhàng và âu yếm bao bọc lấy nó."
# monologue
# JP: （まるで――卵を温める母鳥の羽――っ！！？）
1770 = "（Cứ như thể――đôi cánh của chim mẹ đang ấp trứng vậy――!!?）"
# 【ふかみ】
# display as 深美
# JP: 「ぢゅぼおおおおおおおおおおおおおおおおっ！！！」
1124 = "「Chubooooooooooooooooooo!!!」"
# monologue
# JP: ふかみがいきなり深くまで――\n僕の勃起の全部を一気に口いっぱいに収めてくれ――っ！
1588 = "Đột nhiên Fukami ngậm sâu――\nnuốt trọn toàn bộ dương vật của tôi vào đầy khoang miệng trong một nhịp――!"
# 【ふかみ】
# display as 深美
# JP: 「じゅぶっ！　じゅぼっ！　れるっ！　ぶちゅっ！！\nじゅばっ！　ぢゅうぅっ！　ぼちゅっ！　ぢゅぼっ！！」
1121 = "「Phập! Chụt! Reru! Bạch!!\nPhập! Chụt! Bạch! Chụt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1107 = "「!!!!!!」"
# monologue
# JP: ふかみの口が経験の無い強さと速度で上下する。\n唇でぎゅっと締め付けながら、舌をレールに長く使って
1574 = "Miệng Fukami di chuyển lên xuống với sức mạnh và tốc độ tôi chưa từng trải nghiệm.\nVừa dùng môi siết chặt, vừa lấy lưỡi làm đường ray kéo dài"
# 【ふかみ】
# display as 深美
# JP: 「じゅぼっ！　ばちゅっ！　ごちゅっ！　ぢゅぶっ！！\nじゅぶっ！　ぢゅうっ！　じゅぼっ！　ぼちゅっ！！」
1120 = "「Chụt! Bạch! Phập! Phập!!\nPhập! Chụt! Chụt! Bạch!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみっ！？　――ちょっ――うぁっ！」
1229 = "「Fukami――Fukami!? ――Khoan――ua!」"
# monologue
# JP: あまりに強い勢いに、亀頭が喉奥にあたってしまう。\n背徳感と快感が、背骨を通じ脳までぐらぐら――っ！！！
1598 = "Màn bú mút mãnh liệt đến mức tôi tưởng chừng như đang đâm vào tận cuống họng.\nCảm giác tội lỗi và khoái cảm xuyên từ sống lưng lên não làm tôi hoa cả mắt――hự!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――これは、撹拌、かっ」
1203 = "「Anh hiểu rồi......đây là, quá trình khuấy trộn」"
# monologue
# JP: （ふにっ――もみゅっ――コリュ――さすっ）
1760 = "Lực bú mút quá mạnh khiến quy đầu đâm vào tận cuống họng.\nCảm giác tội lỗi và khoái cảm chạy dọc sống lưng lên não làm tôi choáng váng――!!!"
# monologue
# JP: 正解のご褒美なのか、やわやわタマが揉まれて温められる。
1427 = "「Ra vậy――đây là, quá trình khuấy trộn, sao」"
# 【ふかみ】
# display as 深美
# JP: 「じゅっ――じゅろっ――れるウウッ――じゅルッ――\nじゅっ――にゅるううううっ――れるウウッ――ちゅっ」
1119 = "（Mềm mại――xoa――vê――vuốt）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ」
# 1072 = "「啊……」" 
# monologue
# JP: 口の動きも手に呼応して柔らかで優しいものになる。\n舌をつかって大きくゆるい動きにあわせて吸引し――！
1425 = "Không biết có phải là phần thưởng cho câu trả lời đúng hay không, tinh hoàn mềm mại của tôi được xoa nắn và ủ ấm."
# monologue
# JP: （くっ――ぐいっ――きゅにゅっ――くゆんっ――）
# 1729 = "（咕啾、咕啾）" 
# monologue
# JP: 胸もぐいぐい押し付けられる。乳首がこりこり腿を擦る。\n服越し感じるふかみの温度が上昇している。
1431 = "「Chụt――chụt――reruuuu――chụt――\nchụt――nyuruuuu――reruuuu――chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留器の加熱も……してくれているのか――っ！」
1257 = "「A――á」"
# 【ふかみ】
# display as 深美
# JP: 「じゅずっ――ずりゅううううううっ――じゅぽっ！\nれるううっ――ずろおおおおおおおおっ！　じゅぶ！」
1118 = "Chuyển động của miệng cũng hô ứng với tay, trở nên mềm mại và dịu dàng.\nDùng lưỡi kết hợp với những chuyển động lớn và chậm rãi để mút lấy――!"
# monologue
# JP: 返事であるのか、ふかみの動きがまた変化する。\nタマを優しく撫ぜるペースで、頭はけれど大きく動く。
1580 = "（Hự――đẩy――nắn――vê――）"
# 【ふかみ】
# display as 深美
# JP: 「れりゅうっ――ずろおおおおおおっっ――じゅぶっ！\nん――ぺろっ、ペロッ――じゅうぅぅっ！――ぬぶっ！」
1122 = "Bầu ngực cũng ép chặt vào tôi. Núm vú cọ xát vào đùi tôi sần sật.\nCảm nhận qua lớp quần áo, nhiệt độ của Fukami đang tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「く――あ……ふか、み――」
1078 = "「Việc làm nóng nhà xưởng ủ rượu......em cũng đang làm sao――!」"
# monologue
# JP: 唇と喉と舌と唾液と、指と手のひらに、乳首まで。\n贅沢で完璧なふかみの愛撫に、射精欲求はぐんぐん高まる。
1419 = "「Chụt――trượtttttt――chụt!\nReruuuu――trượtttttt! Chụt!」"
# 【ふかみ】
# display as 深美
# JP: 「ん――ぷぁっ――ぁ……なん、です？\nそうてつおにいさぁん」
1138 = "Như một lời đáp lại, chuyển động của Fukami lại thay đổi.\nVới nhịp độ vuốt ve tinh hoàn nhẹ nhàng, nhưng đầu lại chuyển động với biên độ lớn."
# monologue
# JP: （しこっ――シコッ――しにゅっ――すりゅ）
# 1764 = "（摩擦）" 
# monologue
# JP: 口での愛撫を休むやいなやで、手コキを再開してくれる。\n口とはまるで違う摩擦に、精液水位をもちあげられる。
1401 = "「Reryuu――trượtttttt――chụt!\nƯm――rero, rero――juuuu!――Phập!」"
# 【双鉄】
# display as 雙鐵
# JP: 「準備は――すっかり、整った」
1235 = "「Hự――a......Fuka, mi――」"
# monologue
# JP: 正直このまま射精したい。呑みきれないほど射精して、\nほろ酔いしてる頬の赤みに、濁った白の化粧をしたい。
1622 = "Bờ môi, cổ họng, chiếc lưỡi, nước bọt, những ngón tay, lòng bàn tay, và cả núm vú.\nTrước màn ái ân xa xỉ và hoàn hảo của Fukami, khao khát bắn tinh ngày một dâng cao."
# 【ふかみ】
# display as 深美
# JP: 「あっ――」
# 1072 = "「啊……」" 
# monologue
# JP: もじっと、太ももが擦り合わされる。\nそれだけで濃くなる女の匂いが――別の欲求を煽り立てる。
1586 = "「Ưm――pua――a......sao, thế ạ?\nAnh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから――僕の種麹を、ふかみの蒸留器――\nふかみのおまんこの、最奥に――」
1207 = "（Tuốt――tuốt――nắn――trượt）"
# 【ふかみ】
# display as 深美
# JP: 「はい。です……。\nん――」
1165 = "Vừa nghỉ ngơi màn ái ân bằng miệng, em ấy lại tiếp tục dùng tay tuốt lấy.\nSự ma sát hoàn toàn khác biệt so với bằng miệng khiến mức tinh dịch trào dâng."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――こっちへ」
1234 = "「Sự chuẩn bị――đã hoàn tất rồi」"
# monologue
# JP: ふかみが全てを脱ぎ終えることさえ待ちきれず、\nか細い腰を引き寄せグっと持ち上げる。
1507 = "Thú thực tôi muốn bắn tinh ngay bây giờ. Bắn đến mức không nuốt xuể,\nvà điểm trang một lớp phấn trắng đục lên đôi má ửng hồng vì say rượu của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは精子を、種麹だと例えたが――」
1209 = "「Á――」"
# monologue
# JP: 例え話で、ふかみは、[いざな]誘ってくれている。\nそうと確信できたからこそ、自分の言葉で伝えたい。
1565 = "Em ấy khẽ cựa quậy, hai đùi cọ xát vào nhau.\nChỉ bấy nhiêu thôi, mùi hương nữ tính nồng đậm――đã thổi bùng lên một dục vọng khác."
# 【双鉄】
# display as 雙鐵
# JP: 「例え話にとどまらず。そろそろ僕らも、\n子供を作っていい時期ではないかと、僕は思う」
989 = "「Cho nên――hãy đưa men kōji giống của anh, vào nhà xưởng ủ rượu của Fukami――\nvào tận cùng âm đạo của Fukami――」"
# 【ふかみ】
# display as 深美
# JP: 「――っ」
# 1072 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1067 = "「唔！」" 
# monologue
# JP: 勃起に来る。ふかみの剥き出しの感情が、言葉よりも速く。\n嬉し泣きでもするかのように、膣口が甘くわなないている。
1595 = "「Vâng. Ạ.......\nƯm――」"
# 【ふかみ】
# display as 深美
# JP: 「嬉しい、です――です。わたしも、ずっと――\n双鉄おにいさんの、赤ちゃん、ほしくて――」
1201 = "「Fukami――lại đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1140 = "Không thể đợi đến lúc Fukami cởi bỏ toàn bộ đồ,\ntôi kéo chiếc eo thon thả lại gần rồi nhấc bổng lên."
# monologue
# JP: 酔った振りでのおねだりだったと確信し直し、ふと思う。\n今まで幾つのおねだりを、僕は見逃してきたのだろう。
1630 = "「Fukami đã ví tinh trùng như men kōji giống――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、このまま――いや、ここからもう一度改めて。\n僕らのセックス――僕らの子作りを始めよう」
1288 = "Thông qua câu chuyện ví von, Fukami đang quyến rũ tôi.\nChính vì tin chắc điều đó, tôi muốn truyền đạt lại bằng chính lời nói của mình."
# 【ふかみ】
# display as 深美
# JP: 「は、い……」
1128 = "「Không chỉ dừng lại ở chuyện ví von. Anh nghĩ, cũng đã đến lúc chúng ta,\ncó thể sinh em bé được rồi」"
# monologue
# JP: （くっ――ぐっ――）
1763 = "「――」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁ……あ――双鉄、おにいさんの――おちんちんの、\nさきっぽ――ん――いっつも、よりも――ふくれ、てて」
1260 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみのおかげだ。あれほど丁寧なフェラチオと\n指での愛撫を重ねてもらえば――」
1295 = "Dương vật cảm nhận được. Cảm xúc phơi bày của Fukami, còn nhanh hơn cả lời nói.\nCửa âm đạo đang run rẩy ngọt ngào như thể sắp khóc vì sung sướng."
# monologue
# JP: （ぐっ――ぢゅっ――ずっ――くっ）
# 1729 = "（咕啾、咕啾）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――あっ――んっ――精液、たちも――\nはりきって――全力で――喜びまくって、いる、ゆえに」
1077 = "「Em vui, lắm――ạ. Em cũng, luôn――\nmuốn có, em bé, của anh Soutetsu――」"
# monologue
# JP: 歓喜に踊る精液たちは、勃起の中を駆け巡ってる。\nその暴発を防ぐため、ふかみの腰を持ち上げながら――
1530 = "「Ừ」"
# monologue
# JP: （ずっ――にゅ――）
1755 = "Lại một lần nữa tôi tin chắc rằng việc giả vờ say để vòi vĩnh là thật, và chợt nghĩ.\nTừ trước đến nay, tôi đã bỏ lỡ bao nhiêu lời vòi vĩnh của em ấy rồi."
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　あっ！　来てるっ！　んっ！\nちょっと、ずつ――ふぁっ――や、ぁ――熱っ、くて」
1275 = "「Nếu vậy, cứ thế này――không, bắt đầu lại từ đây một lần nữa.\nHãy bắt đầu cuộc ái ân của chúng ta――việc tạo ra em bé của chúng ta」"
# monologue
# JP: （ぐっ――くっ――こしゅっ！）
1718 = "「V-Vâng......」"
# 【ふかみ】
# display as 深美
# JP: 「んひゅっ！！！？」
1096 = "（Hự――hự――）"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1100 = "「啊！」" 
# monologue
# JP: 普段よりずっと反応がいい。\nああいや、腰を抱えているのがあるいは当たり方に――
1583 = "「Phua......a――phần đầu――dương vật, của anh Soutetsu――\nƯm――sưng to――hơn mọi khi」"
# monologue
# JP: （ずっ――こちゅ――ちゅぶっ――くしゅっ）
1727 = "「Là nhờ Fukami cả đấy. Được em thực hiện màn bú mút cẩn thận\nvà vuốt ve bằng ngón tay liên tục như thế――」"
# 【ふかみ】
# display as 深美
# JP: 「ヒッ――あっ――なにっ――なにっ――あうっ――\nそこっ――わたしっ――いっつもよりも――ずうっと」
1033 = "（Hự――chụt――thút――hự）"
# 【双鉄】
# display as 雙鐵
# JP: 「そこ――とは――どこだ？」
1292 = "「Ư――á――ưm――những tinh trùng, cũng――\nđang hăng hái――hết sức――và vô cùng sung sướng, nên」"
# monologue
# JP: （ぐっ――こしゅっ――くっ――ぐりゅっ――）
# 1727 = "（咕啾、咕啾、咕啾）" 
# monologue
# JP: ふかみの中の粘膜は、とにかく甘えて貼り付いてくる。\nべったべったに密着されてもとより膣もかなり狭くて――
1546 = "Những tinh trùng nhảy múa trong niềm hân hoan, đang chạy quanh bên trong dương vật cương cứng.\nĐể ngăn chặn sự bùng phát đó, tôi vừa nâng hông Fukami lên――"
# 【ふかみ】
# display as 深美
# JP: 「あっ――わかんないっ――わかんない――けどっ――\nさっき――ぞわって――凄いの――知らないの――っ！」
1092 = "（Thút――trượt――）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1106 = "「啊！！！」" 
# monologue
# JP: その窮屈な膣道全部がきゅうんと締まる。\n膣内の他のところと、特段変わった感じはないが――
1606 = "「Phua! Á! Đang vào! Ưm!\nTừng chút, một――phua――a, a――nóng, quá」"
# monologue
# JP: （ずりゅっ――くっ――ぐりりっ――ぐいっ）
# 1727 = "（咕啾、咕啾、咕啾）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！？　ふあっ！　そこっ！？　なにっ――\nわたし――わたし――こんなの――はじ、めてっ――！」
1030 = "（Hự――hự――phập!）"
# monologue
# JP: （きゅううううっ！　きゅん！　きゅんっ！　きゅっ！）
1775 = "「Ưm hyu!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
1034 = "「!」"
# 【ふかみ】
# display as 深美
# JP: 「あぁぁぁぁぁぁぁぁああああああああああっっ！！！」
1085 = "Phản ứng tốt hơn bình thường rất nhiều.\nA không, có lẽ việc tôi ôm hông em ấy đã làm thay đổi cách va chạm――"
# monologue
# JP: 膣の激しい収縮と、戸惑ったような絶叫と。\nふかみは恐らく達して。けれどっ――
1445 = "（Thút――cộp――chụt――phập）"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！　あっ――」
# 1066 = "「唔……」" 
# monologue
# JP: （きゅううううっ！　きゅん！　きゅううううっ！）
1771 = "「Hí――á――gì thế――gì thế――au――\nChỗ đó――em――so với mọi khi――nhiều hơn hẳn」"
# monologue
# JP: ごくごく浅い所までしか未だ挿入していないのに、\n膣がびったり貼り付け締め付け、奥へと誘おうとする。
1501 = "「Chỗ đó――là――chỗ nào?」"
# monologue
# JP: このままいれば、射精する――\nなんとかふかみを緩めなくては――ああ、
1631 = "（Hự――phập――hự――ngoáy――）"
# monologue
# JP: （くりゅっ！）
1759 = "Lớp niêm mạc bên trong Fukami, nói chung là đang làm nũng và bám chặt lấy.\nDù bị áp sát dính dấp, vốn dĩ âm đạo cũng khá hẹp――"
# 【ふかみ】
# display as 深美
