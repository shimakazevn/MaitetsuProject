1606 = "窄小的陰道整體都縮得很緊。感覺跟小穴內其他部分並沒有多大的區別，不過……" 

# monologue
# JP: （ずりゅっ――くっ――ぐりりっ――ぐいっ）
# 1727 = "（咕啾、咕啾、咕啾）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃふっ！？　ふあっ！　そこっ！？　なにっ――\nわたし――わたし――こんなの――はじ、めてっ――！」
1030 = "「呀啊？！蛤啊！這裡，怎麼回事……我……我第一次有這種感覺！」" 

# monologue
# JP: （きゅううううっ！　きゅん！　きゅんっ！　きゅっ！）
1775 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
1034 = "「呃啊！！！」" 

# 【ふかみ】
# display as 深美
# JP: 「あぁぁぁぁぁぁぁぁああああああああああっっ！！！」
1085 = "「啊啊啊啊啊啊啊啊！！！」" 

# monologue
# JP: 膣の激しい収縮と、戸惑ったような絶叫と。\nふかみは恐らく達して。けれどっ――
1445 = "小穴急劇收縮，深美在困惑中浪叫起來。她應該是高潮了，但是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！　あっ――」
# 1066 = "「唔……」" 

# monologue
# JP: （きゅううううっ！　きゅん！　きゅううううっ！）
1771 = "（縮緊！縮緊！）" 

# monologue
# JP: ごくごく浅い所までしか未だ挿入していないのに、\n膣がびったり貼り付け締め付け、奥へと誘おうとする。
1501 = "我明明才剛插入半截，肉壁就緊緊貼著肉棒，想要邀我進入深處。" 

# monologue
# JP: このままいれば、射精する――\nなんとかふかみを緩めなくては――ああ、
1631 = "這樣下去要射出來了……我得想辦法讓深美放鬆下來……對了！" 

# monologue
# JP: （くりゅっ！）
1759 = "（捏！）" 

# 【ふかみ】
# display as 深美
# JP: 「んひゅっ！！？　ちょっ――ちょっ待っ――あうっ――\nらめっ――いま、クリトリスは――強すぎっ――あ！」
1029 = "「呀啊？！等、等一下……不要啦……現在碰陰蒂……太刺激了……啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛むか？　すまん」
1187 = "「很痛嗎？抱歉」" 

# 【ふかみ】
# display as 深美
# JP: 「いらくらっ、ん――痛くないれしゅっ――けどっ――\nふあっ――あっ！　かんじ――感じすぎちゃって――っ」
987 = "「不痛……啊嗯……不痛啦……但是……蛤啊！啊啊！感覺……太刺激了」" 

# monologue
# JP: （きゅううううううっっっっ！！！）
1773 = "（縮緊！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1105 = "「啊！！」" 

# monologue
# JP: 怯えたこどもがすがりついてくるような、\nただただひたすら直線的な膣の締付け――
1440 = "小穴一個勁地收縮著，就像是小孩子害怕時緊緊抓住別人一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「強すぎるのか――ならば――っ」
1162 = "「太刺激了嗎，那就這樣……」" 

# monologue
# JP: （つうっ）
1740 = "（唰）" 

# 【ふかみ】
# display as 深美
# JP: 「にゃうっ！！！！？」
1088 = "「啊嗚！！！！」" 

# monologue
# JP: （きゅんっ！）
# 1775 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1158 = "「噢」" 

# monologue
# JP: とっさの思いつきであったが、爪側で軽く撫ぜるだけ。\nこれが今のふかみには、ちょうど良さそうな感じなのかも。
1495 = "我只是靈光一閃，用指甲輕輕刮了一下。這樣愛撫她說不定正好。" 

# monologue
# JP: （つーーーーーーっ、つん、つん、つーーーーーーーっ）
# 1764 = "（摩擦）" 

# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　きもち、いいっ――それ、しゅきっ、\nんっ――もっと、ねっ――もっと――ゆっくりっ――」
1274 = "「蛤啊！啊！好舒服……嗯……繼續吧……啊嗯……繼續……慢一點……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1140 = "「嗯」" 

# monologue
# JP: （つーーーーーーーーーーーーーーーーっっっ、つんっ）
# 1764 = "（摩擦）" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！　ふあっ！　ぞくぞくって、ぞくぞくってする、\nんっ！　おつゆ、よだれ、やらっ――たれちゃう――ん」
1104 = "「啊！蛤啊！都起雞皮疙瘩了……啊嗯……嘴巴和下面……都要流口水了……啊嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。なら、もっともっと垂らしてほしい」
1215 = "「是嗎，那就儘管流出來吧」" 

# monologue
# JP: （ぐちゅっ――しりゅっ――すりゅんっ――くいいっ）
# 1729 = "（咕啾、咕啾）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　またっ！　また、それっ――は、ぁっ！\nそこっ――わたしっ――弱くてっ――感じ、すぎ――！」
1097 = "「啊嗯？！又來了……啊嗯……這樣……蛤啊！那裡好敏感……太刺激了！」" 

# monologue
# JP: （ついーーーーーーーーーーーーーーーーっっ、つんっ）
# 1764 = "（摩擦）" 

# 【ふかみ】
# display as 深美
# JP: 「やああっ！？　無理っ！　らめっ！　またっ、またっ！\nだって！？　にかいっ！　、にかいも、こんな、すぐっ」
1023 = "「呀啊？不行啦！又、又來了！這、這是第二次了！這麼快就又要……」" 

# monologue
# JP: （しりゅっ――くりりゅ――すりゅう――くいっ）
# 1729 = "（咕啾、咕啾）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　あっ！　待っ！　まって！　らめっ、\nほんとっ――いま――わたし――ばかに、なっちゃうっ」
1027 = "「呀啊？！啊！等一下！不行啦。現在再高潮……我的腦子都要亂了」" 

# monologue
# JP: （つうううううううううううっっっっ――つんっ！！）
1767 = "（用力摩擦！）" 

# 【ふかみ】
# display as 深美
# JP: 「んひゅううううううううううううううっっっっっ！！」
1126 = "「嗚嗚嗚嗚嗚！！」" 

# monologue
# JP: （ぎちゅっ！　きゅううううっ！　きゅんっ！！！）
# 1773 = "（縮緊！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！！」
1070 = "「唔！！！！」" 

# monologue
# JP: 十分ゆるんで固さの消えた膣のわななき。\nきゅうきゅう貼り付き、絞りつつ奥へと誘う蠕動。
1643 = "高潮後的小穴徹底放鬆下來，不停顫抖。肉壁緊貼上來，蠕動著邀我插入深處。" 

# 【ふかみ】
# display as 深美
# JP: 「はっ――はっ――はっ――や――やあっ――わらひっ、\nわたし――だけ――ひとりで――ひとりで――二回、も」
1263 = "「蛤啊……蛤啊……蛤啊……只有我……高潮了兩次」" 

# 【双鉄】
# display as 雙鐵
# JP: 「特段、気に病むことでもない」
1225 = "「沒關係，不用介意」" 

# monologue
# JP: 実際僕も、これほど浅い挿入でなければ射精していた。\n声が裏返らないよう、今とて必死で気を鎮めてる。
1388 = "即便只是淺淺插入，我就快要射出來了。我現在也是在拚命忍耐，讓聲音不變調。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こどもを作ろうというセックスだ。\n普段のものより、感じ、緩んでくれねば困る」
1243 = "「畢竟我們是要造小寶寶。如果還不如平時刺激，那就不好了」" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
1039 = "「哇！」" 

# monologue
# JP: ふかみの顔が更に赤らみ、ようやく、気づく。
1585 = "深美的臉蛋越來越紅，她終於察覺到了。" 

# 【ふかみ】
# display as 深美
# JP: 「はぁっ――はぁ――はあっ――はあっ――（ごくっ）\nん……ふっ――あっ――はあっ――はあっ――はあっ」
1264 = "「蛤啊……蛤啊……蛤啊……（咽口水）。嗯……蛤啊……蛤啊……」" 

# monologue
# JP: 汗と唾液と涙と愛液。ふかみの体はもうどろどろだ。\nクリームよりも蕩けた体は熱気に満ちてピンクに染まり、
1541 = "汗水、唾液、眼淚、愛液，深美的身上已經一片狼藉，她火熱的身軀染上了一層粉紅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと綺麗な……\nふかみはもう、完全に女なのだな」
1245 = "「真漂亮……深美，你已經成了一個成熟的女人了」" 

# 【ふかみ】
# display as 深美
# JP: 「はぁっ――はあっ――そんなの――当然――当然、です。\nこれだけ――双鉄、おにいさんに――エッチ、され、て」
1265 = "「蛤啊……蛤啊……那當然了，嗯。我被雙鐵哥哥……做了這麼多色色的事情嘛」" 

# monologue
# JP: （きゅんっ！）
# 1775 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
