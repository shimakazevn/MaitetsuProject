1271 = "「Ah——hi——ah! Haa! Haa! Khục!?」"
# monologue
# JP: （ばぢゅっ！　ごちゅっ！　ぢゅぶ！　ごりゅっ！！）
1721 = "（Nhóp nhép! Nhóp nhép! Nhóp nhép! Cọ xát!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あっ！　あっ！　わらひっ――\nもうっ！　らめっ――もう、イキ、すぎ、てっ――」
1269 = "「Ah! Ah! Ah! Ah! Em—— Không được! Không được——em, lên đỉnh, nhiều quá, rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ」
# 1140 = "「嗯」" 
# monologue
# JP: どの動きにもふかみの膣がぴたり応えて蠢いてくれ――\nいや、ふかみと僕と、ふたりの体が同じ動きを望んでる。
1486 = "Âm đạo của Fukami đáp lại từng chuyển động của tôi bằng cách co bóp liên tục—— Không, cơ thể của cả hai chúng tôi đều đang khao khát cùng một chuyển động."
# monologue
# JP: （ずびゅっ！　ぼちゅ！　ごっ！　ぎりゅっ！　くゅ！）
# 1726 = "（咕啾、咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ゃぁぁぁぁぁっ！　かはっ！　はっ！　あっ！　また！\n奥っ！　子宮っ！　ごりゅごりゅ！　えぐるの！　ふぁ」
1016 = "「Ahhh! Haa! Haa! Ah! Lại nữa! Sâu quá! Tử cung! Bị cọ xát! Bị khoét sâu! Ah」"
# monologue
# JP: ふかみの膣は変わらずぴったり貼り付いて、\n貼り付きながら蠕動し、精液の濃度と粘度を高め続ける。
1443 = "Âm đạo của Fukami vẫn dính chặt lấy tôi không rời, vừa dính chặt vừa co bóp, liên tục làm tăng nồng độ và độ nhớt của tinh dịch."
# monologue
# JP: （ずっ！　ごっ！　ちゅっ！　ごりゅ！　ぶっ！　ご！）
1748 = "（Phập! Phập! Nhóp nhép! Cọ xát! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　しょれっ！　こきざみっ！　ぁっ！\nんっ！　んっ！　んっ！　んっ！　ふぁっ！　あっ！」
1272 = "「Ah! Ah! Chỗ đó! Nhanh lên! Ah! Ưm! Ưm! Ưm! Ưm! Ah! Ah!」"
# monologue
# JP: 密着ではなく一体化。肌を重ねた先にある契るということ。\n[つが]番うということ、妻と夫になるということ――
1489 = "Không phải là dính chặt mà là hòa làm một. Sự gắn kết vượt lên trên cả việc da thịt kề nhau. Trở thành bạn đời, trở thành vợ chồng——"
# monologue
# JP: （じゅ！　お！　ぶっ！　ごっ！　ぐっ！　ごりゅっ！）
# 1748 = "（啪！啪！啪！啪！！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　またっ！　わらひっ！　またっ！　これ、\nもうっ！　らめっ！　たいりょく！　限界、らからぁ！」
1019 = "「Ah! Lại nữa! Em! Lại nữa! Thế này, không được! Không được! Thể lực! Đến giới hạn, rồi!」"
# monologue
# JP: （きちゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっ！！）
# 1774 = "（縮緊！！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！！！」
# 1106 = "「啊！！！」" 
# monologue
# JP: 僕とてとっくに限界だ。けれども少し、もう少しだけ\n歯と鈴口とを食いしばる。ふかみに精子を、余さずに！
1482 = "Tôi cũng đã đến giới hạn từ lâu. Nhưng tôi cắn răng, kìm nén thêm một chút, một chút nữa thôi. Để bắn toàn bộ tinh trùng vào trong Fukami!"
# monologue
# JP: （じゅりゅうううううううっっっっっっっっっっ！！！）
1756 = "（Phụt!!!!!!!）"
# 【ふかみ】
# display as 深美
# JP: 「きゅゃぁぁぁぁぁっぁぁぁぁぁぁぁぁぁぁうっっ！！」
1125 = "「Á á á á á á á á á á á á á á á á á á!!」"
# monologue
# JP: 悲鳴のようにも聞こえるふかみの歓喜のあえぎ。\n僕の体も、まったく同じ響きで震え、喘いでる。ゆえ！
1568 = "Tiếng rên rỉ vì sung sướng của Fukami nghe như một tiếng thét. Cơ thể tôi cũng run rẩy và thở dốc với cùng một nhịp điệu. Bởi vì!"
# monologue
# JP: （ぢゅぼぉぉぉぉぉぉぉぉぉぉぉぉ――ごりゅぅっ！！）
1732 = "（Nhóp nhép—— Cọ xát!!）"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！！！」
1099 = "「~~~~~~~~~~~~!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っぁっ！！！」
# 1106 = "「啊！！！」" 
# monologue
# JP: （ぼびゅっ！　びゅるるるっ！　ぶりゅっ！　どびゅ！）
1739 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ぁっ――ぁっ！　ぁぁっ！！！！」
1084 = "「Ah——ah——ah! Ahhh!!!!」"
# monologue
# JP: （びゅぶ！　ぶびゅっ！　びゅううっ！　どびゅうっ！）
# 1739 = "（咻咻、咻咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「なにこれ――なに、これっ――ふあっ――精子――\nなかだし――あつい――いつもと、おんなじ、なのにぃ」
1191 = "「Gì thế này——gì, thế này——ah——tinh trùng—— bắn vào trong——nóng quá——rõ ràng là, giống như mọi khi, mà」"
# monologue
# JP: 僕も感じる。ふかみの膣内に射精す快感はいつもと同じ、\n最高の密着感であるのに――そこより深い何かを確かに。
1479 = "Tôi cũng cảm nhận được. Khoái cảm khi xuất tinh vào trong âm đạo của Fukami vẫn giống như mọi khi, vẫn là cảm giác dính chặt tuyệt vời nhất——nhưng chắc chắn có thứ gì đó sâu sắc hơn thế."
# monologue
# JP: （びゅうっ！　びゅっ！　ぼびゅっ！　びゅるっ！！）
1738 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――これ……妊娠――受精……届いて、るっ――\nんっ――感じ、するっ――なに――これ――しゅご、い」
1266 = "「Ah——thế này……mang thai——thụ tinh……đến, nơi rồi—— ưm——cảm nhận, được rồi——gì thế——này——tuyệt, quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみ――ふかみ――ふかみっ――」
1230 = "「Fukami——Fukami——Fukami——Fukami——」"
# monologue
# JP: （びゅっ！　びゅうっ！　どびゅっ――ぼ――ぴっ――）
# 1739 = "（咻咻、咻咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「はい……です――双鉄、おにいさん――えへへっ――\nわたしの――わたしだけの――だんなさま」
1199 = "「Vâng……dạ——Anh, Soutetsu——ehehe—— Của em——của riêng, em——phu quân」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 
# monologue
# JP: 双鉄おにいさんに戻ってしまった。それも嬉しく愛おしく、\n体を崩して、べとりとくっつき、キスをする。
1423 = "Lại trở về cách gọi anh Soutetsu rồi. Điều đó cũng khiến tôi thấy vui vẻ và yêu thương, tôi thả lỏng cơ thể, dính chặt lấy em và trao một nụ hôn."
# 【ふかみ】
# display as 深美
# JP: 「あ……ん……チュッ――ちゅうっ……ちゅむっ――\nちゅっ――れろっ――ちゅうっ――じゅる――ちゅっ」
1090 = "「Ah……ưm……chụt——chụt……chụt—— chụt——rộp——chụt——rột——chụt」"
# monologue
# JP: 一体感が、キスでゆるやかに溶け合うことで解けてく。\nそれでも確かに変わらず残る――番ったという感覚がある。
1621 = "Cảm giác hòa làm một dần tan biến theo nụ hôn. Nhưng chắc chắn vẫn còn lại cảm giác không đổi——cảm giác đã trở thành bạn đời của nhau."
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ぷあっ。\nえへへっ。えへへ～、双鉄おにいさん？」
1136 = "「Ưm……chụt——phù.\nEhehe. Ehehe~, anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ふかみ」
1190 = "「Sao vậy? Fukami」"
# monologue
# JP: 番うということ、契るということ。夫婦ということ。\nそして本当のセックスの意味。それを僕らは、理解した。
1368 = "Trở thành bạn đời, gắn kết với nhau. Trở thành vợ chồng. Và ý nghĩa thực sự của việc làm tình. Chúng tôi đã hiểu được điều đó."
# 【ふかみ】
# display as 深美
# JP: 「だぁいすきです！\n…………。…………。愛して、います」
1219 = "「Em yêu anh lắm!\n…………。…………。Em yêu, anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1143 = "「Ừ, anh cũng vậy」"
# monologue
# JP: 恐らく、恐らく――願わくば。父と、母とになるために。\nそうあるための、大事な大事な――ステップとして。
1365 = "Có lẽ, có lẽ——hy vọng là vậy. Để trở thành cha, và mẹ. Như một bước đệm——vô cùng, vô cùng quan trọng để đạt được điều đó."
