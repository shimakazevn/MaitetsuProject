# display as 深美
# JP: 「んひゅううううううううううううううっっっっっ！！」
1126 = "Giống như một đứa trẻ đang sợ hãi bám víu lấy,\nâm đạo thít chặt một cách trực diện và liên tục――"
# monologue
# JP: （ぎちゅっ！　きゅううううっ！　きゅんっ！！！）
# 1773 = "（縮緊！！！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！！」
1070 = "「Quá mạnh sao――nếu vậy――」"
# monologue
# JP: 十分ゆるんで固さの消えた膣のわななき。\nきゅうきゅう貼り付き、絞りつつ奥へと誘う蠕動。
1643 = "（Trượt nhẹ）"
# 【ふかみ】
# display as 深美
