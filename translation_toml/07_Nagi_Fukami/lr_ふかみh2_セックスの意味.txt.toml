1766 = "「Hà――hà――hà――hà――（Ực）\nƯm……phu――á――hà――hà――hà」"

# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～っ！！！」
1127 = "Mồ hôi, nước bọt, nước mắt và dâm thủy. Cơ\nthể Fukami đã ướt nhẹp.\nCơ thể tan chảy\nhơn cả kem tràn đầy hơi nóng và nhuộm màu\nhồng nhạt,"

# monologue
