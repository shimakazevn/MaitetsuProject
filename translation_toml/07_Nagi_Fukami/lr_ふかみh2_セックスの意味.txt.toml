# lines: 335 
# 【双鉄】
# display as 雙鐵
# JP: 「甘酒、だよな」
1216 = "「Là rượu ngọt, nhỉ」"

# 【ふかみ】
# display as 深美
# JP: 「んふふっ。でしたよぉ。甘酒でしたぁ」
1064 = "「Ưm fufu. Là rượu ngọt đó. Là rượu ngọt\nmà」"

# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、だ」
1282 = "「Dù là vậy, thì」"

# monologue
# JP: ふかみはどう見ても酔っている。\n顔も赤いし、汗ばんでるし、呼吸も荒い。
1564 = "Nhìn kiểu gì thì Fukami cũng đang say.\nMặt\nđỏ bừng, vã mồ hôi, nhịp thở cũng gấp gáp."

# 【双鉄】
# display as 雙鐵
# JP: 「……あるいは、大量に呑んだのか？」
757 = "「……Hay là, em đã uống một lượng lớn?」"

# monologue
# JP: デート帰りにぶらり立ち寄った酒造見学。\nふかみに焼酎はまだ早かろうと甘酒を出して貰ったのだが。
1608 = "Trên đường đi hẹn hò về, chúng tôi tạt qua\ntham quan xưởng nấu rượu.\nNghĩ rằng rượu\nshochu vẫn còn quá sớm với Fukami nên tôi\nđã xin cho em ấy rượu ngọt."

# 【ふかみ】
# display as 深美
# JP: 「大量になんて呑んでないでぇす。\n試飲用のちいっちゃなカップに、三杯だけでぇす」
1223 = "「Em đâu có uống lượng lớn đâu.\nChỉ ba ly\nnhỏ xíu dùng để uống thử thôi mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「三杯か」
985 = "「Ba ly sao」"

# monologue
# JP: 右田一でも試飲に使うあのプラカップは、60ml容量だ。\n三杯呑んでも、普通のコップ一杯にもみたぬ量だが――
1406 = "Ly nhựa dùng để uống thử ở Migita System\ncó dung tích 60ml.\nDù uống ba ly thì lượng\nđó cũng chưa đầy một cốc bình thường――"

# 【双鉄】
# display as 雙鐵
# JP: 「とすると、甘酒でないものを間違って呑んだとか？\n例えば、無濾過の――」
1286 = "「Nếu vậy, hay là em uống nhầm thứ không\nphải rượu ngọt?\nVí dụ như, loại chưa\nlọc――」"

# 【ふかみ】
# display as 深美
# JP: 「ちゃあんと甘酒でしたよぉ？　甘かったですしぃ。\nあ！　うふふっ――証拠、いまから見せちゃいますねぇ」
1181 = "「Đúng là rượu ngọt mà? Ngọt lắm luôn.\nA!\nUfufu――bằng chứng, bây giờ em sẽ cho anh\nxem nhé」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1072 = "「――」"

# monologue
# JP: 湿ったぷりぷりの唇に、声と言葉を閉じ込められる。
1570 = "Giọng nói và lời nói của tôi bị khóa chặt\nbởi đôi môi ẩm ướt căng mọng."

# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅむっ――ちゅうっ――\nれ――りゅっ――れりゅうううっ――ちゅりゅううっ」
1134 = "「Ưm……chụt――chụt――chụt――\nre――ryu――reryuuuu――churyuuu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……は……」
1130 = "「Ưm……hà……」"

# monologue
# JP: 熱い吐息を吹き込みながら、ふかみは舌を割入らせてくる。\n確かに、甘い――酒の香も、極めてわずかだ――っ！！
1558 = "Vừa thổi hơi thở nóng hổi, Fukami vừa đưa\nlưỡi chen vào.\nQuả thật, rất ngọt――mùi\nrượu cũng cực kỳ nhạt――!!"

# monologue
# JP: （さわっ――さすっ――もみゅっ――くりゅっ）
1765 = "（Chạm――vuốt――xoa――vê）"

# 【ふかみ】
# display as 深美
# JP: 「んちゅ――ちゅうっ――ジュルっ――じゅるるっ――\nれりゅっ――じゅううっっ――（こくっ）――ん、ちゅ」
1110 = "「Ưm chụt――chụt――chụt――chụt――\nreryu――juuuu――（Ực）――ưm, chụt」"

# monologue
# JP: キスをしながら、ふかみの指が僕の股間をまさぐってくる。\nズボンの上から亀頭の位置を確かめて、カリ首を指で弄ぶ。
1596 = "Vừa hôn, những ngón tay của Fukami vừa sờ\nsoạng háng tôi.\nXác định vị trí quy đầu\nqua lớp quần, rồi dùng ngón tay trêu đùa\nkhấc quy đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――ぷぁ、ふかみ」
1139 = "「Ưm――pua, Fukami」"

# 【ふかみ】
# display as 深美
# JP: 「甘かったでしょお？　わたしのキス――べろ。\n甘酒の味、したでしょお？」
1185 = "「Ngọt lắm đúng không? Nụ hôn của em――cái\nlưỡi này.\nCó vị rượu ngọt đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1150 = "「Hử? Ừ」"

# monologue
# JP: このままセックスになだれ込むのかと思ったところに、\nあどけない顔で、あどけない質問。
1503 = "Đang nghĩ rằng cứ thế này sẽ lao vào làm\ntình,\nthì em ấy lại hỏi một câu ngây thơ\nvới vẻ mặt ngây thơ."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに甘さを感じた気がした。\nそれとわずかな――酒粕独特のアルコール感も」
1250 = "「Đúng là anh có cảm nhận được vị ngọt.\nVà\nmột chút――cảm giác cồn đặc trưng của bã\nrượu nữa」"

# 【ふかみ】
# display as 深美
# JP: 「うふふっ、甘酒、とっても素敵ですよね～\n甘くて、おいしくて、きもちよくなれて」
1157 = "「Ufufu, rượu ngọt, tuyệt vời lắm đúng\nkhông~\nNgọt ngào, ngon miệng, lại còn làm\nmình thấy lâng lâng nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。僕はもう、あまり飲む機会もないが」
990 = "「Có lẽ vậy. Anh thì đã không còn nhiều cơ\nhội uống nữa rồi」"

# 【ふかみ】
# display as 深美
# JP: 「だけどぉ――えいっ！」
994 = "「Nhưng mà――ây da!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1105 = "「!!」"

# monologue
# JP: 他愛ない会話に緩んだ瞬間、\nふかみは僕にしなだれかかり、ズボンと下着を引き下ろす。
1532 = "Ngay khoảnh khắc tôi nới lỏng cảnh giác\ntrước cuộc trò chuyện bâng quơ,\nFukami ngả\nngười vào tôi, kéo tụt cả quần ngoài lẫn\nquần lót xuống."

# 【ふかみ】
# display as 深美
# JP: 「わたしてきにはぁ――えへへっ――\n双鉄おにいさんが作ってくれる～　(ぺろっ！）」
1177 = "「Theo ý em thì――ehehe――\nrượu do anh\nSoutetsu làm ra~ (Liếm!)」"

# 【双鉄】
# display as 雙鐵
# JP: 「うっ！」
1067 = "「Ư!」"

# monologue
# JP: 甘酒エキスを唾液に混ぜてふかみが亀頭に擦り込んでくる。
1578 = "Fukami hòa trộn tinh chất rượu ngọt với\nnước bọt rồi cọ xát vào quy đầu tôi."

# monologue
# JP: （くっ――くいっ――グッ――もみゅっ――）
1729 = "（Hự――kéo――hự――xoa――）"

# monologue
# JP: 恐らく半ば無意識にだろう。僕の太ももに押し付けられる\nふかみのおっぱいの先端は、もう完全に勃起している。
1560 = "Có lẽ là nửa vô thức. Đỉnh bầu ngực của\nFukami\nđang ép vào đùi tôi đã hoàn toàn\ncương cứng."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの～　しぼりたての～――（ちゅっ）\nうふふっ――熱くて濃ぉいにごり酒の方が～（れろっ）」
1297 = "「Rượu đục~ mới vắt~ của anh\nSoutetsu――（Chụt）\nUfufu――nóng hổi và đặc\nsánh mới là thứ em thích hơn~（Rero）」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――」
# 1072 = "「啊……」" 

# monologue
# JP: 半勃ちだった僕の性器が、いとも容易くフル勃起する。\nふかみは軽く手を動かして、勃起をいいこいいこする。
1493 = "「A――á――」"

# monologue
# JP: （なで――さすっ――しゅこっ――しゅこっ――）
1764 = "Dương vật mới cương một nửa của tôi dễ\ndàng cương cứng hoàn toàn.\nFukami nhẹ\nnhàng cử động tay, dỗ dành dương vật đang\ncương cứng."

# 【ふかみ】
# display as 深美
# JP: 「ずっとずうっと甘くて、おいしくて――\n気持ちよーくしてもらえちゃうから、大好きです。ん…」
983 = "（Vuốt――xoa――tuốt――tuốt――）"

# monologue
# JP: ふかみの口から舌がてろりと姿を表す。\nけれどもそれは勃起に触れず――
1554 = "「Lúc nào cũng ngọt ngào, ngon miệng――\nvà\ncòn làm em sướng rân lên nữa, nên em thích\nlắm. Ưm...」"

# 【ふかみ】
# display as 深美
# JP: 「見学のとき聞きました！　確か、ええっと……\n最初は種を、暖かくして湿めらせて――繁殖させる？」
1004 = "Lưỡi của Fukami lấp ló thò ra khỏi miệng.\nNhưng nó không hề chạm vào dương vật đang\ncương cứng――"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あっている。そうして\n種麹の中の麹菌の数を増やして、米麹をつくっ――あ！」
1148 = "「Lúc đi tham quan em có nghe rồi! Hình như\nlà, ừm……\nĐầu tiên phải ủ ấm và làm ẩm hạt\ngiống――để nó sinh sôi nảy nở?」"

# 【ふかみ】
# display as 深美
# JP: 「ん～～～～～～」
1151 = "「Ừ, đúng rồi. Sau đó\nlàm tăng số lượng nấm\nmen kōji trong men kōji giống, tạo ra gạo\nlên men――a!」"

# monologue
# JP: 舌をレールに、唾液がとろとろ僕の勃起に注がれる。\nホットケーキの蜜の如くに、折り重なって滴っていく。
1591 = "「Ưm~~~~~~」"

# 【ふかみ】
# display as 深美
# JP: 「うふふっ～　あったかくなれ～　あったかくなれ～」
1154 = "Lấy lưỡi làm đường ray, nước bọt sền sệt\nchảy xuống dương vật của tôi.\nNhư mật ong\nrưới lên bánh pancake, từng lớp từng lớp\nnhỏ giọt xuống."

# monologue
# JP: （しゅこ――しゅこ――ぐちゅ――ぐちゅっ――）
1720 = "「Ufufu~ Ấm lên đi nào~ Ấm lên đi nào~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぁ……」
1031 = "（Tuốt――tuốt――nhóp nhép――nhóp nhép――）"

# monologue
# JP: 気持ちいい。意識の全てが勃起に一気に持っていかれる。\nけれど、けれど――これが酒造りを模するのならば、だ。
1421 = "「Ưm……a……」"

# monologue
# JP: （くちゅっ！）
1734 = "Sướng quá. Toàn bộ ý thức bị dương vật hút\nlấy trong nháy mắt.\nNhưng mà, nhưng\nmà――nếu đây là mô phỏng quá trình nấu\nrượu, thì."

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
1277 = "（Nhóp nhép!）"

# monologue
# JP: まくれあがってるスカートの奥、\nパンツの上からそっと触れれば、既に湿気ってぬめってる。
1487 = "「Phua!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……麹が、もろみが、どれほど質よくしあがろうとも、\n蒸留器の手入れが悪ければ、よい焼酎は生まれない」
758 = "Sâu bên trong chiếc váy đang bị xắn lên,\nchạm nhẹ qua lớp quần lót, đã thấy ẩm ướt\ntrơn trượt rồi."

# monologue
# JP: （すりっ――しにゅっ――くちゅっ――ちゅぷっっ）
# 1729 = "（咕啾、咕啾）" 

# 【ふかみ】
# display as 深美
# JP: 「蒸留……器……わたしの、おまんこ、が――んっ――\n双鉄、おにいさんの……種を、蒸留する……うつわ」
1256 = "「……Dù men kōji, dù cơm rượu có chất lượng\ntốt đến đâu,\nnếu nhà xưởng ủ rượu không\nđược bảo dưỡng tốt, thì cũng không thể cho\nra rượu shochu ngon được」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1069 = "「Nhà xưởng……ủ rượu……âm đạo, của em――ưm――\nlà nơi……chưng cất……hạt giống, của anh\nSoutetsu」"

# monologue
# JP: うっとりと濡れたふかみの声が、鼓膜から脳に染みてくる。\n自分の言葉がふかみを経由し、一層深い理解に変わる。
1556 = "「!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の種が、ふかみのおまんこで蒸留され――\nその精髄たる一滴が、子宮に達し、熟成される」
1241 = "Giọng nói ướt át đầy say đắm của Fukami\nthấm từ màng nhĩ vào não.\nLời nói của bản\nthân thông qua Fukami, biến thành một sự\nthấu hiểu sâu sắc hơn."

# 【ふかみ】
# display as 深美
# JP: 「わたし……わたし――ンッ――種、も――最高の――\n一番、いいの――もらいたい、です、しっ――」
1193 = "Giọng nói ướt át đầy say đắm của Fukami\nthấm từ màng nhĩ vào não.\nLời nói của bản\nthân thông qua Fukami, biến thành một sự\nthấu hiểu sâu sắc hơn."

# monologue
# JP: （じゅこっ！　ぢゅっ！　ぐぢゅっ！　じゅっ！！）
1728 = "「Hạt giống của anh, được chưng cất trong\nâm đạo của Fukami――\nGiọt tinh túy đó, chạm\nđến tử cung, và được ủ chín」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1068 = "「Em……em――ưm――cũng muốn, nhận được――hạt\ngiống――tuyệt vời nhất――\ntốt nhất――ạ, và――」"

# monologue
# JP: ふかみが勃起を扱くたび、音がどんどん湿ってく。\n濃密に垂らされた唾液に加え、先走り汁も次々加わる。
1562 = "（Tuốt! Chụt! Nhóp nhép! Chụt!!）"

# 【ふかみ】
# display as 深美
# JP: 「それに、もちろん――大事な、大事な、精子――っ！\n精子、を、受け取る――おまんこ――うつわ、も――」
1285 = "Mỗi lần Fukami tuốt dương vật, âm thanh\nngày càng trở nên ướt át.\nNgoài lượng nước\nbọt đặc quánh nhỏ xuống, chất nhờn rỉ ra\ncũng liên tục hòa quyện vào."

# monologue
# JP: （すっ――しにゅっ――グチュッ――チュぶっ――）
1717 = "「Hơn nữa, tất nhiên――tinh trùng, quan\ntrọng, vô cùng quan trọng――!\nNơi, tiếp\nnhận, tinh trùng――âm đạo――nơi chứa đựng,\ncũng――」"

# monologue
# JP: 同じイメージで高まったのか、ふかみの愛液も増している。\n指先を軽く膣口に当てれば、ちぷと可愛く吸い付いてくる。
1550 = "（Vuốt――ép――nhóp nhép――chụt――）"

# 【ふかみ】
# display as 深美
# JP: 「お手入れ、ちゃあんと――出来て、いる、のか――\n双鉄、おにいさんに――確かめて――ほしっ――んあ！」
1220 = "Có lẽ vì cùng hưng phấn với một hình ảnh,\ndâm thủy của Fukami cũng tuôn ra nhiều\nhơn.\nChỉ cần chạm nhẹ đầu ngón tay vào cửa\nmình, nó liền mút lấy \"chipu\" thật đáng\nyêu."

# monologue
# JP: （グッ――ぢゅぶっ）
1719 = "「Việc bảo dưỡng, đã được――thực hiện, đàng\nhoàng, chưa――\nEm muốn――anh Soutetsu――kiểm\ntra――giúp em――ư a!」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。丁寧に、確認させていただこう」
1168 = "（Hự――phập）"

# monologue
# JP: （くっ――ぱっ――）
1741 = "「Anh hiểu rồi. Anh sẽ kiểm tra thật cẩn\nthận」"

# monologue
# JP: 指をＶ字に大きくひろげ、ふかみの膣道に外気を導く。\nそれからふたたび指を閉じ――
1498 = "（Tách――ra――）"

# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あんっ――」
1262 = "Tôi mở rộng hai ngón tay thành hình chữ V,\ndẫn không khí bên ngoài vào đường âm đạo\ncủa Fukami.\nSau đó lại khép ngón tay lại――"

# monologue
# JP: （ずっっ――ヂュルッ――ずぶっ――ぢゅぬるっ――）
1754 = "「Phua――a――」"

# monologue
