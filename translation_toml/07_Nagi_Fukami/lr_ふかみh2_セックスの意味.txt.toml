1029 = "「Á――em không biết――không biết――nhưng mà――\nLúc nãy――sởn gai ốc――tuyệt lắm――em chưa từng biết――!」"
# 【双鉄】
# display as 雙鐵
# JP: 「痛むか？　すまん」
1187 = "Toàn bộ đường âm đạo chật hẹp đó thít chặt lại \"kyuun\".\nTuy không có cảm giác gì đặc biệt khác lạ so với những chỗ khác trong âm đạo――"
# 【ふかみ】
# display as 深美
# JP: 「いらくらっ、ん――痛くないれしゅっ――けどっ――\nふあっ――あっ！　かんじ――感じすぎちゃって――っ」
987 = "（Trượt――hự――ngoáy――đẩy）"
# monologue
# JP: （きゅううううううっっっっ！！！）
1773 = "「Hya phu!? Phua! Chỗ đó!? Gì thế――\nEm――em――cảm giác này――lần, đầu tiên――!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1105 = "「啊！！」" 
# monologue
