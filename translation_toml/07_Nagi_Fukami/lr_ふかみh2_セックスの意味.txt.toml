1428 = "她的呼吸，她的顫動，她的氣味，一切都是那麼甜美。這份甜美直達我的心靈，嬌聲滲透到我的最深處。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんが、わたしを女にしてくれて。\nふたりでこれから――こづくりセックスするんですから」
1217 = "「是雙鐵哥哥把我變成了女人。因為我們接下來……要開始製造小寶寶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 

# monologue
# JP: 膣と勃起がぐぢゅぐぢゅ混じり、もう境目さえわからない。\n睾丸の中、精子がグツグツ煮える感覚だけを確かと感じる。
1446 = "小穴與肉棒貼合在一起，彷彿已經不分彼此。我能感受到睪丸內的精子在蠢蠢欲動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これから。僕らは。きっと授かる僕らのこどもの\n――お父さんと、お母さんとになるのだ」
993 = "「今後，我們一定會成為爸爸媽媽，擁有屬於我們的孩子」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！　――あっ！！！」
1213 = "「是啊……啊！！！」" 

# monologue
# JP: （ずっっっっ！！！）
1762 = "（插入！！！）" 

# monologue
# JP: 故に、動かす。\nいままで敢えて避けていた、ふかみの一番深く目指して。
1510 = "所以我動了起來，插向之前一直迴避的最深處。" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっっ！　あっ！　ンッ――くっ――\nあっ！　わたし、なかっ――えぐれ――んうううっ！」
1273 = "「蛤啊！啊！啊！啊嗯！啊！插到我的……裡面吧！」" 

# monologue
# JP: （ぢゅぼおおおおおおおおおおおおおっ――ごちゅっ！）
1757 = "（啾嚕嚕嚕，咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「ふきゅんっ！！！！」
1095 = "「啊嗯！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここだな――この奥で、僕らの赤ちゃんが育つのだな」
1183 = "「就是這裡吧，孕育我們孩子的地方」" 

# monologue
# JP: （ぐっ！　ぐりっ！　ぐいっ！　ぐぐっ！！！）
1746 = "（啪、啪、啪！！！）" 

# monologue
# JP: ようやく迎えた亀頭へと、子宮口がべったりキスしてくる。\nくぱくぱ吸われる快感に、精子が激しく暴れだす。
1433 = "子宮口熱情地親吻著龜頭。吮吸般的快感讓精子開始躁動不安。" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ――あっ――ですっ――ですうっ！！\nんっ――奥っ――子宮――赤ちゃんの――おへやっ」
1061 = "「哈嗚，啊嗯……是、是的！！啊嗯……最深處……是子宮……是小寶寶的房間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はその最奥に、ふかみの大事な大事な卵子に。\n僕の一番強く賢い精子を届け――受精させよう」
1290 = "「那我就得把我最強壯最優秀的精子，射進最深處，射進你最寶貴的卵子裡，讓你受精」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！　はいっ！　お願いしますっ！　わたし、\nわたし！　絶対絶対、赤ちゃん大事に――守りますから」
1142 = "「嗯，好！拜託你了！我、我！我一定會保護好小寶寶的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！」
1231 = "「深美！」" 

# monologue
# JP: （ずりゅうううううううううっっっっっっっ！！！）
1766 = "（猛插！！！）" 

# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～っ！！！」
1127 = "「嗚嗚～～～～～～～～～！！！」" 

# monologue
# JP: （じゅぶううううううううううううっ！！　ごりゅっ！）
# 1757 = "（啾嚕嚕嚕，咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「かっ――はっ――！！」
1079 = "「啊……蛤啊！！」" 

# monologue
# JP: （ず！　ごっ！　ぢゅっ！　ごちゅっ！　りゅ！　ご！）
1744 = "（啪、啪、啪、啪、啪！）" 

