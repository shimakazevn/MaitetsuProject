1476 = "我不再大幅度地抽插。緊緊貼合的肉壁，以及飢渴吮吸著的子宮口，都不允許我做出大幅度的動作。" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あっ！　あっ！　あっ！！\nひっ！　あっ！　しょこっ！　んっ――ぁ――ふうっ」
1270 = "「蛤啊！啊啊啊啊！！呀啊！啊！啊啊啊！啊嗯！」" 

# monologue
# JP: （ぐっ！　ご！　ぢゅ！　ぶっ！　ぢゅ！　ごりゅっ！）
1742 = "（啪、啪、啪、啪、啪、啪！）" 

# 【ふかみ】
# display as 深美
# JP: 「おにいひゃっ――はうっ――そうてつ、おにいさ――\nあっ――ふっ――あっ――あっ――ん～～～っっっ！」
1063 = "「哥哥……啊嗚……雙鐵哥哥。啊……唔……啊嗯！」" 

# monologue
# JP: よだれが、汗がシーツにぼとぼと垂れ落ちる。\n赤く可愛くはみ出る舌に、思い切り舌を絡めたい。が
1403 = "口水與汗水滴落在床單上。我好想盡情親吻她伸出的粉嫩小舌，但是……" 

# monologue
# JP: （ずっ！　ごちゅっ！　ぷっ！　ぐ！　ず！　ごりっ）
1743 = "（啪、啪、啪、啪、啪、啪）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃっう！　おくっ！　しきゅうこう――だけっ！\nあっ！　っ！　そんな、しつこく！　ごちゅごちゅって」
1018 = "「呀啊！一直插到深處，插到子宮口！啊！啊嗯！發出咕啾咕啾的聲音！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「子宮口、から――離し、たく、ないっ――くっ――\nできる――かぎりに――深くっ――近く、で――射精」
1195 = "「我不想離開子宮口了……唔……我想儘量……射在最深處」" 

# monologue
# JP: （ぐいっ！）
1768 = "（用力！）" 

# 【ふかみ】
# display as 深美
# JP: 「ふやんっ！！！」
1087 = "「啊啊！！！」" 

# monologue
# JP: キスの代わりに、ハグの代わりに、腰を持ち上げ支える\n手指に思いっきりの力を込める。
1505 = "我的手指用力抓住她的腰部，以此來代替親吻，代替擁抱。" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ――あ――精液、せい、えきっ――ンッ――この、\n姿勢、なら――おまんこ、子宮の、上、だから――ぁ」
1075 = "「啊……啊……精液……這個姿勢的話……小穴……在子宮的上面……所以……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――こぼさず、に――一滴、残らず――\n僕の、精子を――ふかみの、子宮の――一番、奥、へ」
1145 = "「嗯，我會把每一滴精子都注入進去，射到你的子宮最深處」" 

# monologue
# JP: （ぴちぃぃぃぃぃぃぃぃぃぃぃっっっっっ！！）
1774 = "（縮緊！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1108 = "「啊？！」" 

# monologue
# JP: 体全部の産毛が逆立つような感覚。
1526 = "有種全身汗毛倒豎的感覺。" 

# 【ふかみ】
# display as 雙鐵＆深美
# JP: 「ふあっ！！？」\n「ひゃうっ！！？」
1101 = "「啊！」\\n「啊嗯！」" 

# monologue
# JP: 遅れて、快感。総毛立つ。勃起全部とふかみの膣の一体感。\n愛液一滴の隙間さえなく密着しきっているような――
1635 = "遲來的快感讓我豎起汗毛，肉棒與小穴宛如融合在了一起。我們緊緊貼合，彷彿沒有絲毫空隙。" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ――ァ――あっ――あっ――おまんこ――これ、\nわたし――わたしの――おまんこ――おまんこ――」
1060 = "「哈嗚……啊……啊啊……小穴……我、我的小穴……小穴」" 

# monologue
# JP: 同じ感覚、この快感を覚えているのか、ふかみの声は\nぼーっとしていて、けれど、けれどもその奥底に――
1552 = "深美似乎也感受到了同樣的快感，她的聲音有些迷離，但最深處……" 

# 【ふかみ】
# display as 深美
# JP: 「おまんこ、いまっ――双鉄おにいさん、かたち、に――\n双鉄おにいさんの、ため、だけの――ふ……ぁ……嬉し」
1179 = "「小穴……變成了雙鐵哥哥的形狀……變成只屬於雙鐵哥哥的東西了……好開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1069 = "「唔！！！」" 

# monologue
# JP: 強い喜び。それが表出した瞬間に、僕の感情も弾け出る。\n嬉しい、楽しい、気持ちいい――僕はふかみをっ――
1463 = "強烈的欣喜從我心底炸裂開來。開心、愉快、舒爽……我不禁想把深美……" 

# monologue
# JP: （じゅぶっ！　ばぢゅっ！　ぢゅむっ！　ぶちゅっ！）
1726 = "（咕啾、咕啾、咕啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！　ふかみっ！　ふかみっ！　ふかみっ！」
1232 = "「深美！深美！深美！深美！」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさっ――ぁ――っ！！　――\nそう、てつ、さっ――あ――双鉄、さん――双鉄さぁん」
1296 = "「雙鐵哥哥……啊！！雙鐵……雙鐵先生……雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1071 = "「唔！！！！！！」" 

# monologue
# JP: 同じ目線に来てくれた。常に一歩下がってた――\n僕をたててたふかみがこのセックスの一瞬だけでも――
1572 = "深美用了與我平等對話的語氣。她平時總是自降一級，就算只有在做愛時的這一瞬間也很讓我高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「好きだ！　僕は、ふかみが好きだっ！　大好きだっ！！\nこれからずっと――一生、ふかみとっ――添い遂げるっ」
1197 = "「我喜歡你，深美！我愛死你了！！我想要一輩子跟你在一起」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！　ですっ！　うれしいっ――わたし――一生\nずっと。ずうっと――ずっと、あなたと、一緒ですっ！」
1167 = "「好的！嗯！我很開心……我也想要永遠、永遠跟你在一起！」" 

# monologue
# JP: （きゅううううううううんっっっっっっ！！！！！）
1772 = "（縮緊！！！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！！！」
# 1069 = "「唔！！！」" 

# monologue
# JP: 絞られてるがキツさはない。\n密着されつつの蠕動を、より一層に感じるだけだ。
1542 = "沒有被勒住的壓迫感。只是更加清晰地感受到了肉壁的蠕動。" 

# monologue
# JP: （ずぶっ！　ぶぢゅっ！！　ぢゅるっ！　ばちゅっ！）
1745 = "（啪、啪、啪、啪！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　あっ！　あっ！　ふあっ！　ねっ！！\nもっと――もっと――もっと――もっとぉっ！！」
1094 = "「啊嗯！啊！蛤啊！啊啊！！繼續……用力、用力插我！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1070 = "「唔！！！！」" 

# monologue
# JP: （ず！　ご！　ち！　ご！　ぶっ！　ご！　ぬ！　ご！）
1749 = "（啪！啪！啪！啪！）" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　それっ！　そこっ！　おくっ！　しゅき！\nおくっ！　しきゅう！　もっとぉっ！！！」
1276 = "「蛤啊！就是那裡，插到深處……好舒服！深處……好舒服……我還要！！！」" 

# monologue
# JP: （ずちゅっ！　ごちゅっ！　ごりっ！　ぐくっ！！！）
1747 = "（啪！啪！啪！啪！！！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　あっ！！　ささっ――て――えぐ、って\n――かたち――わたし――かえられ、ちゃうっ――っ！」
1022 = "「呀啊！啊！一直摩擦著……我的小穴……都要變形了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かわって――いい、さ――それに、応じて――\n僕も――かならずっ――変わるっ――ゆえっ――」
1224 = "「沒關係……與此相對……我也一定……會配合你……所以……」" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
# 1277 = "「蛤啊！！」" 

# monologue
# JP: （きゅん！　きゅきゅんっ！　きゅうううううっっっ！）
# 1775 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！！！！」
1035 = "「呃啊！！！！」" 

# monologue
# JP: （ずりゅううううっっっっっっっっっっ！！！！！）
1761 = "（插入！！！！！）" 

