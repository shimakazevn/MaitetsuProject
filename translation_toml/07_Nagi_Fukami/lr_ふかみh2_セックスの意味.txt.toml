1095 = "「Hự!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここだな――この奥で、僕らの赤ちゃんが育つのだな」
1183 = "Sự run rẩy của âm đạo đã thả lỏng hoàn toàn và biến mất sự căng cứng.\nBám chặt lấy \"kyuu kyuu\", nhu động vừa vắt kiệt vừa mời gọi vào sâu hơn."
# monologue
# JP: （ぐっ！　ぐりっ！　ぐいっ！　ぐぐっ！！！）
1746 = "「Hà――hà――hà――ya――yaa――em,\nmột mình――em――một mình――một mình――tận hai lần」"
# monologue
# JP: ようやく迎えた亀頭へと、子宮口がべったりキスしてくる。\nくぱくぱ吸われる快感に、精子が激しく暴れだす。
1433 = "「Cũng không có gì đáng bận tâm đâu」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ――あっ――ですっ――ですうっ！！\nんっ――奥っ――子宮――赤ちゃんの――おへやっ」
1061 = "Thực tế, nếu không cắm nông thế này thì tôi cũng đã bắn tinh rồi.\nĐể giọng không bị lạc đi, ngay lúc này tôi cũng đang tuyệt vọng kìm nén."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はその最奥に、ふかみの大事な大事な卵子に。\n僕の一番強く賢い精子を届け――受精させよう」
1290 = "「Là cuộc ái ân để tạo ra em bé mà.\nNếu không cảm nhận và thả lỏng hơn bình thường thì gay go đấy」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　はいっ！　お願いしますっ！　わたし、\nわたし！　絶対絶対、赤ちゃん大事に――守りますから」
1142 = "「Phua!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！」
1231 = "Mặt Fukami càng đỏ bừng hơn, và cuối cùng, em ấy cũng nhận ra."
# monologue
# JP: （ずりゅうううううううううっっっっっっっ！！！）
1766 = "「Hà――hà――hà――hà――（Ực）\nƯm......phu――á――hà――hà――hà」"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～っ！！！」
1127 = "Mồ hôi, nước bọt, nước mắt và dâm thủy. Cơ thể Fukami đã ướt nhẹp.\nCơ thể tan chảy hơn cả kem tràn đầy hơi nóng và nhuộm màu hồng nhạt,"
# monologue
# JP: （じゅぶううううううううううううっ！！　ごりゅっ！）
# 1757 = "（啾嚕嚕嚕，咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「かっ――はっ――！！」
1079 = "「Thật đẹp làm sao......\nFukami giờ đây, đã hoàn toàn là một người phụ nữ rồi」"
# monologue
# JP: （ず！　ごっ！　ぢゅっ！　ごちゅっ！　りゅ！　ご！）
1744 = "「Hà――hà――chuyện đó――tất nhiên――tất nhiên rồi, ạ.\nBị anh――Soutetsu――làm tình――nhiều đến thế này, mà」"
# monologue
# JP: もはや大きくスライドしない。甘く締め付ける膣壁が、\n吸い付いてくる子宮口が、大きな動きを許しもしない。
1476 = "Hơi thở ngọt ngào. Nhu động ngọt ngào. Mùi hương nồng đậm của Fukami cũng ngọt ngào.\nGiọng nói ngọt ngào thấm đẫm vào tận cùng tôi, kẻ đang bị sự ngọt ngào ấy trói buộc."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あっ！　あっ！　あっ！！\nひっ！　あっ！　しょこっ！　んっ――ぁ――ふうっ」
1270 = "「Anh Soutetsu, đã biến em thành phụ nữ.\nVì từ giờ hai chúng ta――sẽ làm tình để tạo em bé mà」"
# monologue
# JP: （ぐっ！　ご！　ぢゅ！　ぶっ！　ぢゅ！　ごりゅっ！）
1742 = "「Ừ」"
# 【ふかみ】
# display as 深美
# JP: 「おにいひゃっ――はうっ――そうてつ、おにいさ――\nあっ――ふっ――あっ――あっ――ん～～～っっっ！」
1063 = "Âm đạo và dương vật hòa quyện vào nhau \"guchu guchu\", không còn nhận ra ranh giới nữa.\nTôi chỉ cảm nhận rõ rệt tinh trùng đang sục sôi trong tinh hoàn."
# monologue
# JP: よだれが、汗がシーツにぼとぼと垂れ落ちる。\n赤く可愛くはみ出る舌に、思い切り舌を絡めたい。が
1403 = "「Từ giờ. Chúng ta. Sẽ trở thành bố, và mẹ\n――của đứa con mà chúng ta chắc chắn sẽ có được」"
# monologue
# JP: （ずっ！　ごちゅっ！　ぷっ！　ぐ！　ず！　ごりっ）
1743 = "「Vâng! ――Á!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっう！　おくっ！　しきゅうこう――だけっ！\nあっ！　っ！　そんな、しつこく！　ごちゅごちゅって」
1018 = "（Thútttt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「子宮口、から――離し、たく、ないっ――くっ――\nできる――かぎりに――深くっ――近く、で――射精」
1195 = "Vì vậy, tôi di chuyển.\nHướng đến nơi sâu nhất của Fukami, nơi mà từ nãy đến giờ tôi vẫn cố tình né tránh."
# monologue
# JP: （ぐいっ！）
1768 = "「Phua! Á! Á! Ưm――hự――\nÁ! Bên trong, em――bị khoét sâu――ưm ư ư!」"
# 【ふかみ】
# display as 深美
# JP: 「ふやんっ！！！」
1087 = "（Chubooooooooooooooooooo――cộp!）"
# monologue
# JP: キスの代わりに、ハグの代わりに、腰を持ち上げ支える\n手指に思いっきりの力を込める。
1505 = "「Fukyun!!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――あ――精液、せい、えきっ――ンッ――この、\n姿勢、なら――おまんこ、子宮の、上、だから――ぁ」
1075 = "「Chính là chỗ này――trong tận cùng này, em bé của chúng ta sẽ lớn lên nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――こぼさず、に――一滴、残らず――\n僕の、精子を――ふかみの、子宮の――一番、奥、へ」
1145 = "（Hự! Ngoáy! Đẩy! Hự hự!!!）"
# monologue
# JP: （ぴちぃぃぃぃぃぃぃぃぃぃぃっっっっっ！！）
1774 = "Cổ tử cung hôn đắm đuối lên quy đầu vừa mới tiến đến.\nTrước khoái cảm bị mút lấy \"kupakupa\", tinh trùng bắt đầu quậy phá dữ dội."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1108 = "「啊？！」" 
# monologue
# JP: 体全部の産毛が逆立つような感覚。
1526 = "「Hau――á――vâng ạ――vâng ạ!!\nƯm――tận cùng――tử cung――căn phòng――của em bé」"
# 【ふかみ】
# display as 雙鐵＆深美
# JP: 「ふあっ！！？」\n「ひゃうっ！！？」
1101 = "「Nếu vậy anh sẽ đưa những tinh trùng khỏe nhất, thông minh nhất của mình,\nvào tận cùng đó, vào quả trứng vô cùng quan trọng của Fukami――và để nó thụ tinh」"
# monologue
# JP: 遅れて、快感。総毛立つ。勃起全部とふかみの膣の一体感。\n愛液一滴の隙間さえなく密着しきっているような――
1635 = "「Vâng! Vâng! Xin anh đấy! Em,\nem! Tuyệt đối tuyệt đối, sẽ bảo vệ――em bé thật cẩn thận」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ――ァ――あっ――あっ――おまんこ――これ、\nわたし――わたしの――おまんこ――おまんこ――」
1060 = "「Fukami!」"
# monologue
# JP: 同じ感覚、この快感を覚えているのか、ふかみの声は\nぼーっとしていて、けれど、けれどもその奥底に――
1552 = "（Trượtttttttttttttttttttttt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「おまんこ、いまっ――双鉄おにいさん、かたち、に――\n双鉄おにいさんの、ため、だけの――ふ……ぁ……嬉し」
1179 = "「~~~~~~~~~!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: 強い喜び。それが表出した瞬間に、僕の感情も弾け出る。\n嬉しい、楽しい、気持ちいい――僕はふかみをっ――
1463 = "（Phậpppppppppppppppppp!! Ngoáy!）"
# monologue
# JP: （じゅぶっ！　ばぢゅっ！　ぢゅむっ！　ぶちゅっ！）
1726 = "「Kha――ha――!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！　ふかみっ！　ふかみっ！　ふかみっ！」
1232 = "（Thút! Cộp! Chụt! Cộp! Trượt! Cộp!）"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさっ――ぁ――っ！！　――\nそう、てつ、さっ――あ――双鉄、さん――双鉄さぁん」
1296 = "Không còn trượt dài nữa. Vách âm đạo thít chặt ngọt ngào,\ncổ tử cung đang mút lấy, cũng không cho phép những chuyển động lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1071 = "「Phua! Á! Á! Á! Á!!\nHí! Á! Chỗ đó! Ưm――a――phù」"
# monologue
# JP: 同じ目線に来てくれた。常に一歩下がってた――\n僕をたててたふかみがこのセックスの一瞬だけでも――
1572 = "（Hự! Cộp! Chụt! Phập! Chụt! Ngoáy!）"
# 【双鉄】
# display as 雙鐵
# JP: 「好きだ！　僕は、ふかみが好きだっ！　大好きだっ！！\nこれからずっと――一生、ふかみとっ――添い遂げるっ」
1197 = "「Anh hya――hau――Soutetsu, anh――\nÁ――phu――á――á――ưm~~~!」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　ですっ！　うれしいっ――わたし――一生\nずっと。ずうっと――ずっと、あなたと、一緒ですっ！」
1167 = "Nước bọt, mồ hôi nhỏ giọt xuống ga giường.\nTôi muốn quấn lấy chiếc lưỡi đỏ hồng đáng yêu đang thò ra kia. Nhưng"
# monologue
# JP: （きゅううううううううんっっっっっっ！！！！！）
1772 = "（Thút! Cộp! Phập! Hự! Thút! Ngoáy）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: 絞られてるがキツさはない。\n密着されつつの蠕動を、より一層に感じるだけだ。
1542 = "「Hyau! Tận cùng! Cổ tử cung――thôi!\nÁ! ! Cứ liên tục! Cộp cộp như thế」"
# monologue
# JP: （ずぶっ！　ぶぢゅっ！！　ぢゅるっ！　ばちゅっ！）
1745 = "「Từ cổ tử cung――anh không muốn, rời ra――hự――\nAnh muốn bắn tinh――ở nơi sâu nhất――gần nhất――có thể」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　あっ！　あっ！　ふあっ！　ねっ！！\nもっと――もっと――もっと――もっとぉっ！！」
1094 = "（Đẩy!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1070 = "「唔！！！！」" 
# monologue
# JP: （ず！　ご！　ち！　ご！　ぶっ！　ご！　ぬ！　ご！）
1749 = "「Fuyan!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　それっ！　そこっ！　おくっ！　しゅき！\nおくっ！　しきゅう！　もっとぉっ！！！」
1276 = "Thay cho nụ hôn, thay cho cái ôm, tôi dùng hết sức vào những ngón tay\nđang nâng đỡ hông em ấy."
# monologue
# JP: （ずちゅっ！　ごちゅっ！　ごりっ！　ぐくっ！！！）
1747 = "「A――a――tinh dịch, tinh, dịch――ưm――tư thế,\nnày, thì――âm đạo, nằm trên, tử cung, nên――a」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？　あっ！！　ささっ――て――えぐ、って\n――かたち――わたし――かえられ、ちゃうっ――っ！」
1022 = "「Ừ――không để rơi vãi――không sót lại, một giọt nào――\nĐưa tinh trùng, của anh――vào tận, sâu nhất――tử cung, của Fukami」"
# 【双鉄】
# display as 雙鐵
# JP: 「かわって――いい、さ――それに、応じて――\n僕も――かならずっ――変わるっ――ゆえっ――」
1224 = "（Pichiiiiiiiiiiiiiiiiii!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
# 1277 = "「蛤啊！！」" 
# monologue
# JP: （きゅん！　きゅきゅんっ！　きゅうううううっっっ！）
# 1775 = "（縮緊！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！！！！」
1035 = "「!?」"
# monologue
# JP: （ずりゅううううっっっっっっっっっっ！！！！！）
1761 = "Cảm giác như toàn bộ lông tơ trên cơ thể dựng đứng lên."
# 【ふかみ】
# display as 深美
# JP: 「んゆぅぅぅぅぅぅぅぅぅ～～～～っ！！！」
1086 = "「Phua!!?」\n「Hyau!!?」"
# monologue
# JP: （ぶっヂュうぅぅぅぅぅぅぅぅぅぅぅぅ～ごりゅっ！！）
1737 = "Theo sau đó là khoái cảm. Nổi gai ốc. Cảm giác hòa làm một giữa toàn bộ dương vật và âm đạo của Fukami.\nNhư thể áp sát vào nhau không còn một khe hở nào dù chỉ là một giọt dâm thủy――"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ひ――くはっ！　はぁ！　はぁ！　けひゅ！？」
1271 = "「Hau――a――á――á――âm đạo――cái này,\nem――của em――âm đạo――âm đạo――」"
# monologue
# JP: （ばぢゅっ！　ごちゅっ！　ぢゅぶ！　ごりゅっ！！）
1721 = "Không biết Fukami có nhớ cùng một cảm giác, cùng một khoái cảm này không,\ngiọng em ấy thẫn thờ, nhưng, nhưng tận sâu thẳm trong đó――"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あっ！　あっ！　わらひっ――\nもうっ！　らめっ――もう、イキ、すぎ、てっ――」
1269 = "「Âm đạo, bây giờ――thành hình, của anh Soutetsu――\nChỉ dành, cho, anh Soutetsu――phu......a......vui quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ」
# 1140 = "「嗯」" 
# monologue
# JP: どの動きにもふかみの膣がぴたり応えて蠢いてくれ――\nいや、ふかみと僕と、ふたりの体が同じ動きを望んでる。
1486 = "Niềm vui sướng tột độ. Khoảnh khắc nó bộc lộ ra, cảm xúc của tôi cũng vỡ òa.\nVui sướng, hạnh phúc, đê mê――tôi yêu Fukami――"
# monologue
# JP: （ずびゅっ！　ぼちゅ！　ごっ！　ぎりゅっ！　くゅ！）
# 1726 = "（咕啾、咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ゃぁぁぁぁぁっ！　かはっ！　はっ！　あっ！　また！\n奥っ！　子宮っ！　ごりゅごりゅ！　えぐるの！　ふぁ」
1016 = "（Phập! Bạch! Chụt! Phập!）"
# monologue
# JP: ふかみの膣は変わらずぴったり貼り付いて、\n貼り付きながら蠕動し、精液の濃度と粘度を高め続ける。
1443 = "「Fukami! Fukami! Fukami! Fukami!」"
# monologue
# JP: （ずっ！　ごっ！　ちゅっ！　ごりゅ！　ぶっ！　ご！）
1748 = "「Anh Soutetsu――a――!! ――\nSou, tetsu――a――anh, Soutetsu――anh Soutetsu」"
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　しょれっ！　こきざみっ！　ぁっ！\nんっ！　んっ！　んっ！　んっ！　ふぁっ！　あっ！」
1272 = "Em ấy đã đến cùng một tầm mắt với tôi. Fukami, người luôn lùi lại một bước――\nluôn tôn trọng tôi, dù chỉ trong khoảnh khắc làm tình này――"
# monologue
# JP: 密着ではなく一体化。肌を重ねた先にある契るということ。\n[つが]番うということ、妻と夫になるということ――
1489 = "「Anh yêu em! Anh, yêu Fukami! Rất yêu em!!\nTừ giờ trở đi――suốt đời, anh sẽ――bên cạnh Fukami」"
# monologue
# JP: （じゅ！　お！　ぶっ！　ごっ！　ぐっ！　ごりゅっ！）
# 1748 = "（啪！啪！啪！啪！！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　またっ！　わらひっ！　またっ！　これ、\nもうっ！　らめっ！　たいりょく！　限界、らからぁ！」
1019 = "「Vâng! Ạ! Em vui lắm――em――suốt đời\nluôn luôn. Mãi mãi――luôn luôn, ở bên, anh!」"
# monologue
# JP: （きちゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっ！！）
# 1774 = "（縮緊！！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！！！」
# 1106 = "「啊！！！」" 
# monologue
# JP: 僕とてとっくに限界だ。けれども少し、もう少しだけ\n歯と鈴口とを食いしばる。ふかみに精子を、余さずに！
1482 = "（Thítttttttttttttttttt!!!!!）"
# monologue
# JP: （じゅりゅうううううううっっっっっっっっっっ！！！）
1756 = "「Ưm!!!」"
# 【ふかみ】
# display as 深美
# JP: 「きゅゃぁぁぁぁぁっぁぁぁぁぁぁぁぁぁぁうっっ！！」
1125 = "Bị vắt kiệt nhưng không thấy khó chịu.\nChỉ cảm nhận rõ rệt hơn sự nhu động trong khi áp sát."
# monologue
# JP: 悲鳴のようにも聞こえるふかみの歓喜のあえぎ。\n僕の体も、まったく同じ響きで震え、喘いでる。ゆえ！
1568 = "（Phập! Phập!! Chụt! Bạch!）"
# monologue
# JP: （ぢゅぼぉぉぉぉぉぉぉぉぉぉぉぉ――ごりゅぅっ！！）
1732 = "「Hyau! Á! Á! Phua! Này!!\nHơn nữa――hơn nữa――hơn nữa――hơn nữa đi!!」"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～～～～～～～～～っ！！！！！」
1099 = "「!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っぁっ！！！」
# 1106 = "「啊！！！」" 
# monologue
# JP: （ぼびゅっ！　びゅるるるっ！　ぶりゅっ！　どびゅ！）
1739 = "（Thút! Cộp! Chụt! Cộp! Phập! Cộp! Trơn! Cộp!）"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ぁっ――ぁっ！　ぁぁっ！！！！」
1084 = "「Phua! Cái đó! Chỗ đó! Tận cùng! Thích lắm!\nTận cùng! Tử cung! Hơn nữa đi!!!」"
# monologue
# JP: （びゅぶ！　ぶびゅっ！　びゅううっ！　どびゅうっ！）
# 1739 = "（咻咻、咻咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「なにこれ――なに、これっ――ふあっ――精子――\nなかだし――あつい――いつもと、おんなじ、なのにぃ」
1191 = "（Phập! Cộp! Ngoáy! Hự!!!）"
# monologue
# JP: 僕も感じる。ふかみの膣内に射精す快感はいつもと同じ、\n最高の密着感であるのに――そこより深い何かを確かに。
1479 = "「Hya!? Á!! Đâm――vào――khoét, sâu\n――hình dạng――em――bị thay đổi, mất――!」"
# monologue
# JP: （びゅうっ！　びゅっ！　ぼびゅっ！　びゅるっ！！）
1738 = "「Thay đổi――cũng được, mà――để đáp lại, điều đó――\nAnh cũng――chắc chắn――sẽ thay đổi――nên――」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――これ……妊娠――受精……届いて、るっ――\nんっ――感じ、するっ――なに――これ――しゅご、い」
1266 = "（Kyun! Kyu kyun! Thítttttttt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみ――ふかみ――ふかみっ――」
1230 = "「Ua!!!!」"
# monologue
# JP: （びゅっ！　びゅうっ！　どびゅっ――ぼ――ぴっ――）
# 1739 = "（咻咻、咻咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「はい……です――双鉄、おにいさん――えへへっ――\nわたしの――わたしだけの――だんなさま」
1199 = "（Trượtttttttttttttttttttttt!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 
# monologue
# JP: 双鉄おにいさんに戻ってしまった。それも嬉しく愛おしく、\n体を崩して、べとりとくっつき、キスをする。
1423 = "「Ưm yuuuuuuuuu~~~~!!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ……ん……チュッ――ちゅうっ……ちゅむっ――\nちゅっ――れろっ――ちゅうっ――じゅる――ちゅっ」
1090 = "（Phập chụuuuuuuuuuuu~ ngoáy!!）"
# monologue
# JP: 一体感が、キスでゆるやかに溶け合うことで解けてく。\nそれでも確かに変わらず残る――番ったという感覚がある。
1621 = "「A――hi――kuha! Hà! Hà! Kehyu!?」"
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ぷあっ。\nえへへっ。えへへ～、双鉄おにいさん？」
1136 = "（Bạch! Cộp! Phập! Ngoáy!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ふかみ」
1190 = "「Phua! Á! Á! Á! Em――\nKhông được! Không được――em, ra, nhiều quá, rồi――」"
# monologue
# JP: 番うということ、契るということ。夫婦ということ。\nそして本当のセックスの意味。それを僕らは、理解した。
1368 = "「A á」"
# 【ふかみ】
# display as 深美
# JP: 「だぁいすきです！\n…………。…………。愛して、います」
1219 = "Mọi chuyển động đều được âm đạo Fukami đáp lại hoàn hảo và cựa quậy――\nKhông, cơ thể của tôi và Fukami, cả hai đều đang khao khát cùng một chuyển động."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1143 = "（Phập! Bạch! Cộp! Ngoáy! Kyu!）"
# monologue
# JP: 恐らく、恐らく――願わくば。父と、母とになるために。\nそうあるための、大事な大事な――ステップとして。
1365 = "「Yaaaaa! Kaha! Hà! Á! Lại nữa!\nTận cùng! Tử cung! Ngoáy ngoáy! Khoét sâu! Phua」"
