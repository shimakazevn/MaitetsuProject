[script]
# lines: 335 
# 【双鉄】
# display as 雙鐵
# JP: 「甘酒、だよな」
1216 = "「Rượu ngọt, nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「んふふっ。でしたよぉ。甘酒でしたぁ」
1064 = "「Nfufu. Đúng vậy ạ. Là rượu ngọt ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、だ」
1282 = "「Dù là vậy, nhưng.」"
# monologue
# JP: ふかみはどう見ても酔っている。\n顔も赤いし、汗ばんでるし、呼吸も荒い。
1564 = "Nhìn thế nào Fukami cũng đang say. Mặt đỏ bừng, đẫm mồ hôi, nhịp thở gấp gáp."
# 【双鉄】
# display as 雙鐵
# JP: 「……あるいは、大量に呑んだのか？」
757 = "「……Hay là, em uống nhiều lắm à?」"
# monologue
# JP: デート帰りにぶらり立ち寄った酒造見学。\nふかみに焼酎はまだ早かろうと甘酒を出して貰ったのだが。
1608 = "Chuyến tham quan nhà máy nấu rượu chúng tôi ghé qua trên đường đi hẹn hò về. Nghĩ rằng rượu shochu vẫn còn quá sớm với Fukami nên tôi đã lấy rượu ngọt cho em ấy."
# 【ふかみ】
# display as 深美
# JP: 「大量になんて呑んでないでぇす。\n試飲用のちいっちゃなカップに、三杯だけでぇす」
1223 = "「Em không có uống nhiều đâu ạ. Chỉ uống ba ly nhỏ xíu dùng để uống thử thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「三杯か」
985 = "「Ba ly sao.」"
# monologue
# JP: 右田一でも試飲に使うあのプラカップは、60ml容量だ。\n三杯呑んでも、普通のコップ一杯にもみたぬ量だが――
1406 = "Cốc nhựa dùng để uống thử ở Migita System có dung tích 60ml. Dù uống ba ly thì cũng chưa đầy một cốc bình thường——"
# 【双鉄】
# display as 雙鐵
# JP: 「とすると、甘酒でないものを間違って呑んだとか？\n例えば、無濾過の――」
1286 = "「Nếu vậy, hay là em uống nhầm thứ gì đó không phải rượu ngọt? Ví dụ như, loại chưa lọc——」"
# 【ふかみ】
# display as 深美
# JP: 「ちゃあんと甘酒でしたよぉ？　甘かったですしぃ。\nあ！　うふふっ――証拠、いまから見せちゃいますねぇ」
1181 = "「Đúng là rượu ngọt mà? Ngọt lắm luôn á. A! Ufufu——Bằng chứng, bây giờ em sẽ cho anh xem nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1072 = "「——」"
# monologue
# JP: 湿ったぷりぷりの唇に、声と言葉を閉じ込められる。
1570 = "Giọng nói và lời nói bị khóa chặt bởi đôi môi ẩm ướt, căng mọng."
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――ちゅむっ――ちゅうっ――\nれ――りゅっ――れりゅうううっ――ちゅりゅううっ」
1134 = "「Ưm…… chụt——chụt——chụt——\nre——ryu——reryuuuu——churyuuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……は……」
1130 = "「Ưm…… ha……」"
# monologue
# JP: 熱い吐息を吹き込みながら、ふかみは舌を割入らせてくる。\n確かに、甘い――酒の香も、極めてわずかだ――っ！！
1558 = "Vừa phả ra hơi thở nóng hổi, Fukami vừa luồn lưỡi vào. Đúng là, ngọt thật——hương rượu cũng cực kỳ nhạt——!!"
# monologue
# JP: （さわっ――さすっ――もみゅっ――くりゅっ）
1765 = "(Chạm nhẹ——vuốt ve——xoa nắn——vê vê)"
# 【ふかみ】
# display as 深美
# JP: 「んちゅ――ちゅうっ――ジュルっ――じゅるるっ――\nれりゅっ――じゅううっっ――（こくっ）――ん、ちゅ」
1110 = "「Nchu——chụt——juru——jururu—— reryu——juuu——(Ực)——ưm, chụt.」"
# monologue
# JP: キスをしながら、ふかみの指が僕の股間をまさぐってくる。\nズボンの上から亀頭の位置を確かめて、カリ首を指で弄ぶ。
1596 = "Vừa hôn, những ngón tay của Fukami vừa sờ soạng đũng quần tôi. Xác định vị trí quy đầu qua lớp quần, rồi dùng ngón tay đùa giỡn với phần đầu khấc."
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――ぷぁ、ふかみ」
1139 = "「Ưm——pua, Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「甘かったでしょお？　わたしのキス――べろ。\n甘酒の味、したでしょお？」
1185 = "「Ngọt đúng không? Nụ hôn——cái lưỡi của em. Có vị rượu ngọt đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1150 = "「Hửm? Ừ.」"
# monologue
# JP: このままセックスになだれ込むのかと思ったところに、\nあどけない顔で、あどけない質問。
1503 = "Tôi cứ tưởng em ấy sẽ lao vào làm tình luôn, nhưng em ấy lại hỏi một câu ngây thơ với vẻ mặt ngây thơ."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに甘さを感じた気がした。\nそれとわずかな――酒粕独特のアルコール感も」
1250 = "「Đúng là tôi có cảm thấy vị ngọt. Và một chút——vị cồn đặc trưng của bã rượu nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、甘酒、とっても素敵ですよね～\n甘くて、おいしくて、きもちよくなれて」
1157 = "「Ufufu, rượu ngọt tuyệt lắm đúng không anh~ Vừa ngọt, vừa ngon, lại còn khiến người ta thấy lâng lâng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。僕はもう、あまり飲む機会もないが」
990 = "「Có lẽ vậy. Dù tôi không có nhiều cơ hội để uống nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「だけどぉ――えいっ！」
994 = "「Nhưng mà——ây da!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1105 = "「!!」"
# monologue
# JP: 他愛ない会話に緩んだ瞬間、\nふかみは僕にしなだれかかり、ズボンと下着を引き下ろす。
1532 = "Khoảnh khắc tôi lơi lỏng cảnh giác trước cuộc trò chuyện vô thưởng vô phạt, Fukami chồm lên người tôi, kéo tuột quần dài và quần lót của tôi xuống."
# 【ふかみ】
# display as 深美
# JP: 「わたしてきにはぁ――えへへっ――\n双鉄おにいさんが作ってくれる～　(ぺろっ！）」
1177 = "「Đối với em thì——ehehe—— thứ do anh Soutetsu tạo ra~ (Liếm!)」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっ！」
1067 = "「Ư!」"
# monologue
# JP: 甘酒エキスを唾液に混ぜてふかみが亀頭に擦り込んでくる。
1578 = "Fukami trộn lẫn tinh chất rượu ngọt với nước bọt rồi xoa lên quy đầu của tôi."
# monologue
# JP: （くっ――くいっ――グッ――もみゅっ――）
1729 = "(Hự——kéo——hự——xoa nắn——)"
# monologue
# JP: 恐らく半ば無意識にだろう。僕の太ももに押し付けられる\nふかみのおっぱいの先端は、もう完全に勃起している。
1560 = "Có lẽ là nửa vô thức. Đầu vú của Fukami đang ép chặt vào đùi tôi đã hoàn toàn cương cứng."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの～　しぼりたての～――（ちゅっ）\nうふふっ――熱くて濃ぉいにごり酒の方が～（れろっ）」
1297 = "「Rượu đục vừa mới vắt~ của anh Soutetsu~——(Chụt) Ufufu——vừa nóng vừa đặc, em thích loại này hơn~ (Liếm)」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――」
# 1072 = "「啊……」" 
# monologue
# JP: 半勃ちだった僕の性器が、いとも容易くフル勃起する。\nふかみは軽く手を動かして、勃起をいいこいいこする。
1493 = "Bộ phận sinh dục đang bán cương của tôi dễ dàng cương cứng hoàn toàn. Fukami nhẹ nhàng cử động tay, vuốt ve sự cương cứng đó."
# monologue
# JP: （なで――さすっ――しゅこっ――しゅこっ――）
1764 = "(Vuốt——xoa——sục——sục——)"
# 【ふかみ】
# display as 深美
# JP: 「ずっとずうっと甘くて、おいしくて――\n気持ちよーくしてもらえちゃうから、大好きです。ん…」
983 = "「Lúc nào cũng ngọt ngào, thơm ngon—— và khiến em cảm thấy thật sướng, nên em thích lắm. Ưm...」"
# monologue
# JP: ふかみの口から舌がてろりと姿を表す。\nけれどもそれは勃起に触れず――
1554 = "Chiếc lưỡi thò ra từ miệng Fukami. Nhưng nó không hề chạm vào sự cương cứng——"
# 【ふかみ】
# display as 深美
# JP: 「見学のとき聞きました！　確か、ええっと……\n最初は種を、暖かくして湿めらせて――繁殖させる？」
1004 = "「Lúc tham quan em đã nghe rồi! Hình như là, ừm…… Đầu tiên phải giữ ấm và làm ẩm hạt giống——để chúng sinh sôi nảy nở?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あっている。そうして\n種麹の中の麹菌の数を増やして、米麹をつくっ――あ！」
1148 = "「À, đúng rồi. Cứ như vậy làm tăng số lượng vi khuẩn koji trong men giống, để tạo ra men gạo——a!」"
# 【ふかみ】
# display as 深美
# JP: 「ん～～～～～～」
1151 = "「Ưm~~~~~~」"
# monologue
# JP: 舌をレールに、唾液がとろとろ僕の勃起に注がれる。\nホットケーキの蜜の如くに、折り重なって滴っていく。
1591 = "Lấy lưỡi làm đường ray, nước bọt từ từ rót xuống sự cương cứng của tôi. Nhỏ giọt tầng tầng lớp lớp, giống như mật ong rưới lên bánh pancake vậy."
# 【ふかみ】
# display as 深美
# JP: 「うふふっ～　あったかくなれ～　あったかくなれ～」
1154 = "「Ufufu~ Ấm lên nào~ Ấm lên nào~」"
# monologue
# JP: （しゅこ――しゅこ――ぐちゅ――ぐちゅっ――）
1720 = "(Sục——sục——nhóp nhép——nhóp nhép——)"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぁ……」
1031 = "「Ưm…… a……」"
# monologue
# JP: 気持ちいい。意識の全てが勃起に一気に持っていかれる。\nけれど、けれど――これが酒造りを模するのならば、だ。
1421 = "Sướng quá. Toàn bộ ý thức của tôi dồn hết vào sự cương cứng. Nhưng, nhưng——nếu đây là mô phỏng quá trình ủ rượu, thì."
# monologue
# JP: （くちゅっ！）
1734 = "(Nhóp nhép!)"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！！」
1277 = "「Ha!!」"
# monologue
# JP: まくれあがってるスカートの奥、\nパンツの上からそっと触れれば、既に湿気ってぬめってる。
1487 = "Sâu bên trong chiếc váy đang vén lên, chỉ khẽ chạm qua lớp quần lót, đã thấy ướt át trơn tuột."
# 【双鉄】
# display as 雙鐵
# JP: 「……麹が、もろみが、どれほど質よくしあがろうとも、\n蒸留器の手入れが悪ければ、よい焼酎は生まれない」
758 = "「……Dù men koji, cơm rượu có chất lượng tốt đến đâu, nếu thiết bị chưng cất không được bảo dưỡng tốt, thì cũng không thể cho ra loại rượu shochu ngon được.」"
# monologue
# JP: （すりっ――しにゅっ――くちゅっ――ちゅぷっっ）
# 1729 = "（咕啾、咕啾）" 
# 【ふかみ】
# display as 深美
# JP: 「蒸留……器……わたしの、おまんこ、が――んっ――\n双鉄、おにいさんの……種を、蒸留する……うつわ」
1256 = "「Thiết bị…… chưng cất…… âm đạo, của em——ưm—— là bình chứa…… chưng cất…… hạt giống của anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1069 = "「!!!」"
# monologue
# JP: うっとりと濡れたふかみの声が、鼓膜から脳に染みてくる。\n自分の言葉がふかみを経由し、一層深い理解に変わる。
1556 = "Giọng nói ướt át đầy mê đắm của Fukami thấm qua màng nhĩ vào não bộ. Lời nói của chính tôi khi qua miệng Fukami, lại mang một ý nghĩa sâu sắc hơn hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の種が、ふかみのおまんこで蒸留され――\nその精髄たる一滴が、子宮に達し、熟成される」
1241 = "「Hạt giống của tôi, được chưng cất trong âm đạo của Fukami—— và giọt tinh túy nhất, sẽ chạm đến tử cung, rồi được ủ chín.」"
# 【ふかみ】
# display as 深美
# JP: 「わたし……わたし――ンッ――種、も――最高の――\n一番、いいの――もらいたい、です、しっ――」
1193 = "「Em…… em——ưm——cũng muốn nhận được—— hạt giống——tuyệt vời nhất——tốt nhất——ạ.」"
# monologue
# JP: （じゅこっ！　ぢゅっ！　ぐぢゅっ！　じゅっ！！）
1728 = "(Sùng sục! Chụt! Nhóp nhép! Chụt!!)"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1068 = "「!!」"
# monologue
# JP: ふかみが勃起を扱くたび、音がどんどん湿ってく。\n濃密に垂らされた唾液に加え、先走り汁も次々加わる。
1562 = "Mỗi lần Fukami tuốt lấy sự cương cứng, âm thanh lại càng thêm ướt át. Ngoài lượng nước bọt đặc sệt nhỏ xuống, chất dịch bôi trơn cũng liên tục túa ra."
# 【ふかみ】
# display as 深美
# JP: 「それに、もちろん――大事な、大事な、精子――っ！\n精子、を、受け取る――おまんこ――うつわ、も――」
1285 = "「Hơn nữa, tất nhiên——tinh trùng, rất rất, quan trọng——! Âm đạo——bình chứa——đón nhận, tinh trùng, cũng——」"
# monologue
# JP: （すっ――しにゅっ――グチュッ――チュぶっ――）
1717 = "(Sột soạt——nhóp nhép——nhóp nhép——chụt——)"
# monologue
# JP: 同じイメージで高まったのか、ふかみの愛液も増している。\n指先を軽く膣口に当てれば、ちぷと可愛く吸い付いてくる。
1550 = "Có lẽ vì cùng tưởng tượng ra cảnh đó nên ái dịch của Fukami cũng túa ra nhiều hơn. Chỉ cần chạm nhẹ đầu ngón tay vào cửa mình, nó liền đáng yêu mút lấy."
# 【ふかみ】
# display as 深美
# JP: 「お手入れ、ちゃあんと――出来て、いる、のか――\n双鉄、おにいさんに――確かめて――ほしっ――んあ！」
1220 = "「Bảo dưỡng, cẩn thận——đã làm, xong chưa—— muốn anh Soutetsu——kiểm tra, giúp em——ưm a!」"
# monologue
# JP: （グッ――ぢゅぶっ）
1719 = "(Hự——cụp)"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。丁寧に、確認させていただこう」
1168 = "「Tôi hiểu rồi. Tôi sẽ kiểm tra thật cẩn thận.」"
# monologue
# JP: （くっ――ぱっ――）
1741 = "(Tách——ra——)"
# monologue
# JP: 指をＶ字に大きくひろげ、ふかみの膣道に外気を導く。\nそれからふたたび指を閉じ――
1498 = "Mở rộng hai ngón tay thành hình chữ V, đưa không khí bên ngoài vào đường âm đạo của Fukami. Sau đó lại khép ngón tay lại——"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あんっ――」
1262 = "「Ha——an——」"
# monologue
# JP: （ずっっ――ヂュルッ――ずぶっ――ぢゅぬるっ――）
1754 = "(Phập——chụt——phập——chụt——)"
# monologue
# JP: 普段と違って左手だ。\n大事な大事なおまんこにうかつなことはできないが――
1632 = "Khác với mọi khi, lần này là tay trái. Không thể bất cẩn với cái âm đạo vô cùng vô cùng quan trọng này được, nhưng——"
# 【ふかみ】
# display as 深美
# JP: 「ん……あっ――指……指ぃ――んっ！？　あっ――\nなかで、やっ！　別々に、動かすの――ダメ、ですぅ」
1132 = "「Ưm…… a——ngón tay…… ngón tay——ưm!? A—— bên trong, á! Đừng cử động, tách rời nhau——không được, đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばひとまとめにし――っ！？」
1214 = "「Vậy sao. Nếu thế thì tôi gộp lại nhé——!?」"
# monologue
# JP: （ぢゅゅこんっ！！！）
1733 = "(Sùng sục!!!)"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1106 = "「Kua!!!」"
# monologue
# JP: 指の動きを鈍らせようと考えたのか、\nふかみの手指が強く素早く僕の勃起を愛撫する。
1575 = "Không biết có phải muốn làm chậm chuyển động ngón tay của tôi hay không, nhưng những ngón tay của Fukami đang vuốt ve sự cương cứng của tôi thật mạnh và nhanh."
# monologue
# JP: （ぢゅこっ！　ぢゅにゅっ！　ぢゅぶっ！　ぢゅっ！）
1722 = "(Sùng sục! Nhóp nhép! Cụp! Chụt!)"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1069 = "「唔！！！」" 
# monologue
# JP: ならば、僕もだ。指をまとめてただ単純に、\nできるだけ深みの奥深くへと――
1637 = "Nếu vậy, thì tôi cũng thế. Đơn giản là chụm các ngón tay lại, và tiến vào sâu nhất có thể bên trong Fukami——"
# monologue
# JP: （ずりゅううううううううっ！！！）
1730 = "(Sột soạttttt!!!)"
# 【ふかみ】
# display as 深美
# JP: 「ふああああああんっ！！」
1268 = "「Haaaaaaaaan!!」"
# monologue
# JP: （しゅこっ――でゅこっ――ぢゅこっ――しゅこっ――）\n（ずぶっ――じゅるっ――じゅぶっ――ずにゅっ――）
1725 = "(Sục——sục——sục——sục——)\n(Phập——chụt——phập——nhóp nhép——)"
# monologue
# JP: 呼吸が荒ぐ。水音と臭気がどんどん濃くなっていく。\n加速し、加熱し――けれどふかみは、ふと手を緩める。
1490 = "Hơi thở trở nên thô bạo. Tiếng nước và mùi hương ngày càng đậm đặc. Tăng tốc, nóng dần lên——nhưng Fukami đột nhiên nới lỏng tay."
# 【ふかみ】
# display as 深美
# JP: 「は……ぁ――どう、です――か――んっ……\nわたし――ふかみ――の――蒸留器――は……」
1261 = "「Ha…… a——sao, rồi——ạ——ưm…… Thiết bị chưng cất——của em——Fukami——thì……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。いま――最終の、確認中だ――」
1147 = "「À. Bây giờ——tôi đang, kiểm tra lần cuối——」"
# monologue
# JP: （ぐにゅっ――ずりゅっ――ギチュッ――くちゅっ）
1723 = "(Nhóp nhép——sột soạt——kít——nhóp nhép)"
# 【ふかみ】
# display as 深美
# JP: 「や――あっ――指っ――ん……双鉄、おにいさんの――\nおゆびが――ん、あっ――おまんこの、中――探って」
1014 = "「A——a——ngón tay——ưm…… ngón tay—— của anh Soutetsu——ưm, a——đang mò mẫm——bên trong, âm đạo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい密閉性だな。指にぴったり貼り付いてくる。\nそれに――ん――圧も強く、て――申し分、ない」
1175 = "「Độ kín tuyệt vời thật đấy. Bám chặt lấy ngón tay tôi. Hơn nữa——ưm——áp lực cũng mạnh——không có gì, để chê cả.」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あ……それ、なら――よかった――です。\nん……っ――ね？　なら……双鉄、おにい、さん」
1267 = "「Ha——a…… Nếu, vậy thì——tốt quá——rồi. Ưm…… đúng không? Nếu vậy…… anh, Soutetsu.」"
# monologue
# JP: （しゅこん――しにゅっ――ちゅこっ――しゅこんっ）
# 1723 = "（咕啾、咕啾、咕啾、咕啾）" 
# monologue
# JP: 指がいっそう速度を落とす。焦らす動きに変化する。\n明らかに、挿入をおねだりされている――が――
1504 = "Ngón tay càng giảm tốc độ hơn nữa. Chuyển sang động tác trêu chọc. Rõ ràng là em ấy đang cầu xin tôi cắm vào——nhưng——"
# monologue
# JP: （ぢゅぽっ）
1735 = "(Phụt)"
# 【ふかみ】
# display as 深美
# JP: 「んうっ！！？」
1108 = "「Ưm!!?」"
# monologue
# JP: ふかみの膣から引き抜いた指をねっとりしゃぶる。
1497 = "Tôi mút mát ngón tay vừa rút ra từ âm đạo của Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の種麹は、もう少し熟成させてほしいらしい。\nそれと――[こうじむろ,1]麹室を――」
1205 = "「Có vẻ như men giống của tôi muốn được ủ thêm một chút nữa. Và——căn phòng ủ men——」"
# monologue
# JP: 伝わるかどうか自信を持てず、\n勃起を動かしアピールしてみる。
1477 = "Không tự tin là em ấy có hiểu hay không, tôi thử cử động sự cương cứng để ra hiệu."
# 【双鉄】
# display as 雙鐵
# JP: 「麹室を、もっとあたため――滅菌消毒してもらえれば」
1278 = "「Nếu em có thể làm ấm phòng ủ men hơn nữa——và tiệt trùng khử trùng cho nó.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……（こくっ）――つまり……\nこういうこと、です、か？　んっ――ぺろっ」
1081 = "「A…… (Ực)——tức là…… như thế này, phải không, ạ? Ưm——liếm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁ」
1082 = "「Ưa.」"
# 【ふかみ】
# display as 深美
# JP: 「ふふっ。あってるんなら――ん……もーっと消毒……――\nん……チュッ――チュむっ――ちゅるっ――ちゅりゅっ」
1153 = "「Fufu. Nếu đúng rồi thì——ưm…… khử trùng thêm nữa nào……—— Ưm…… chụt——chụt——chụt——chụt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
1066 = "「Ưm…… hự——」"
# monologue
# JP: ねっとりべったり丁寧で――それだけに、\nむず痒いような物足りなさもこみ上げてくる舌使い。
1589 = "Cẩn thận, nhớp nháp, dính dấp——chính vì thế, cách dùng lưỡi này lại dấy lên một cảm giác thiếu thốn ngứa ngáy."
# 【ふかみ】
# display as 深美
# JP: 「ぺちゅううっ――れるんっ――ん……（こくっ）\n消毒と一緒に、種麹ももっとあっためてぇ――（さわ）」
1123 = "「Chụt——reryun——ưm…… (Ực) Cùng với việc khử trùng, phải làm ấm men giống hơn nữa chứ——(Chạm nhẹ)」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
1100 = "「A!」"
# monologue
# JP: 指をまとめて手をまるめ、睾丸にその手を寄り添わせ、\nふんわりやさしく包んでくれる。
1547 = "Chụm các ngón tay lại thành hình khum khum, áp bàn tay đó vào tinh hoàn, và nhẹ nhàng, mềm mại bao bọc lấy nó."
# monologue
# JP: （まるで――卵を温める母鳥の羽――っ！！？）
1770 = "(Cứ như là——bộ lông của chim mẹ đang ấp trứng vậy——!!?)"
# 【ふかみ】
# display as 深美
# JP: 「ぢゅぼおおおおおおおおおおおおおおおおっ！！！」
1124 = "「Chubooooooooooooooooooo!!!」"
# monologue
# JP: ふかみがいきなり深くまで――\n僕の勃起の全部を一気に口いっぱいに収めてくれ――っ！
1588 = "Đột nhiên Fukami ngậm sâu vào—— Thu trọn toàn bộ sự cương cứng của tôi vào miệng cùng một lúc——!"
# 【ふかみ】
# display as 深美
# JP: 「じゅぶっ！　じゅぼっ！　れるっ！　ぶちゅっ！！\nじゅばっ！　ぢゅうぅっ！　ぼちゅっ！　ぢゅぼっ！！」
1121 = "「Chụt! Chụt! Reru! Phụt!!\nChụt! Chuuu! Phụt! Chụt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1107 = "「!!!!!!」"
# monologue
# JP: ふかみの口が経験の無い強さと速度で上下する。\n唇でぎゅっと締め付けながら、舌をレールに長く使って
1574 = "Miệng Fukami di chuyển lên xuống với tốc độ và cường độ chưa từng có. Vừa dùng môi siết chặt, vừa lấy lưỡi làm đường ray dài."
# 【ふかみ】
# display as 深美
# JP: 「じゅぼっ！　ばちゅっ！　ごちゅっ！　ぢゅぶっ！！\nじゅぶっ！　ぢゅうっ！　じゅぼっ！　ぼちゅっ！！」
1120 = "「Chụt! Bạch! Cụp! Chụt!!\nChụt! Chuu! Chụt! Phụt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみっ！？　――ちょっ――うぁっ！」
1229 = "「Fukami——Fukami!? ——Khoan đã——ua!」"
# monologue
# JP: あまりに強い勢いに、亀頭が喉奥にあたってしまう。\n背徳感と快感が、背骨を通じ脳までぐらぐら――っ！！！
1598 = "Do lực quá mạnh, quy đầu đâm thẳng vào tận cùng cổ họng. Cảm giác tội lỗi và khoái cảm chạy dọc sống lưng lên não khiến tôi choáng váng——!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――これは、撹拌、かっ」
1203 = "「Ra vậy——đây là, khuấy trộn, sao.」"
# monologue
# JP: （ふにっ――もみゅっ――コリュ――さすっ）
1760 = "(Mềm mại——xoa nắn——cọ xát——vuốt ve)"
# monologue
# JP: 正解のご褒美なのか、やわやわタマが揉まれて温められる。
1427 = "Không biết có phải là phần thưởng vì đã đoán đúng không, mà hòn bi của tôi được nhào nặn và ủ ấm thật mềm mại."
# 【ふかみ】
# display as 深美
# JP: 「じゅっ――じゅろっ――れるウウッ――じゅルッ――\nじゅっ――にゅるううううっ――れるウウッ――ちゅっ」
1119 = "「Chụt——chụt——reruuuu——chụt—— chụt——nyuruuuu——reruuuu——chụt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ」
# 1072 = "「啊……」" 
# monologue
# JP: 口の動きも手に呼応して柔らかで優しいものになる。\n舌をつかって大きくゆるい動きにあわせて吸引し――！
1425 = "Chuyển động của miệng cũng phối hợp với tay, trở nên mềm mại và dịu dàng hơn. Dùng lưỡi để mút mát theo những chuyển động lớn và chậm rãi——!"
# monologue
# JP: （くっ――ぐいっ――きゅにゅっ――くゆんっ――）
# 1729 = "（咕啾、咕啾）" 
# monologue
# JP: 胸もぐいぐい押し付けられる。乳首がこりこり腿を擦る。\n服越し感じるふかみの温度が上昇している。
1431 = "Ngực cũng liên tục ép sát vào. Núm vú cứng ngắc cọ xát vào đùi. Xuyên qua lớp áo, tôi cảm nhận được nhiệt độ của Fukami đang tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留器の加熱も……してくれているのか――っ！」
1257 = "「Em đang…… đun nóng cả thiết bị chưng cất luôn sao——!」"
# 【ふかみ】
# display as 深美
# JP: 「じゅずっ――ずりゅううううううっ――じゅぽっ！\nれるううっ――ずろおおおおおおおおっ！　じゅぶ！」
1118 = "「Chụt——zuryuuuuuu——chụt!\nReruuu——zurooooooooo! Chụt!」"
# monologue
# JP: 返事であるのか、ふかみの動きがまた変化する。\nタマを優しく撫ぜるペースで、頭はけれど大きく動く。
1580 = "Không biết có phải là câu trả lời hay không, mà chuyển động của Fukami lại thay đổi. Vuốt ve hòn bi với nhịp độ nhẹ nhàng, nhưng đầu thì lại di chuyển với biên độ lớn."
# 【ふかみ】
# display as 深美
# JP: 「れりゅうっ――ずろおおおおおおっっ――じゅぶっ！\nん――ぺろっ、ペロッ――じゅうぅぅっ！――ぬぶっ！」
1122 = "「Reryuu——zurooooooo——chụt! Ưm——liếm, liếm——juuuu! ——Nubu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「く――あ……ふか、み――」
1078 = "「Kh——a…… Fuka, mi——」"
# monologue
# JP: 唇と喉と舌と唾液と、指と手のひらに、乳首まで。\n贅沢で完璧なふかみの愛撫に、射精欲求はぐんぐん高まる。
1419 = "Môi, họng, lưỡi, nước bọt, ngón tay, lòng bàn tay, và cả núm vú. Trước sự vuốt ve xa xỉ và hoàn hảo của Fukami, ham muốn xuất tinh ngày càng dâng cao."
# 【ふかみ】
# display as 深美
# JP: 「ん――ぷぁっ――ぁ……なん、です？\nそうてつおにいさぁん」
1138 = "「Ưm——pua——a…… sao, vậy ạ?\nAnh Soutetsu.」"
# monologue
# JP: （しこっ――シコッ――しにゅっ――すりゅ）
# 1764 = "（摩擦）" 
# monologue
# JP: 口での愛撫を休むやいなやで、手コキを再開してくれる。\n口とはまるで違う摩擦に、精液水位をもちあげられる。
1401 = "Vừa mới ngừng âu yếm bằng miệng, em ấy lại tiếp tục dùng tay tuốt lấy. Sự cọ xát hoàn toàn khác biệt so với miệng, khiến mực nước tinh dịch dâng trào."
# 【双鉄】
# display as 雙鐵
# JP: 「準備は――すっかり、整った」
1235 = "「Chuẩn bị——đã hoàn tất rồi.」"
# monologue
# JP: 正直このまま射精したい。呑みきれないほど射精して、\nほろ酔いしてる頬の赤みに、濁った白の化粧をしたい。
1622 = "Thành thật mà nói, tôi muốn bắn tinh ngay bây giờ. Bắn nhiều đến mức em ấy không nuốt kịp, và tô điểm một lớp trang điểm trắng đục lên đôi má ửng hồng vì say rượu kia."
# 【ふかみ】
# display as 深美
# JP: 「あっ――」
# 1072 = "「啊……」" 
# monologue
# JP: もじっと、太ももが擦り合わされる。\nそれだけで濃くなる女の匂いが――別の欲求を煽り立てる。
1586 = "Hai bắp đùi cọ xát vào nhau một cách ngượng ngùng. Chỉ bấy nhiêu thôi cũng đủ làm mùi hương phụ nữ trở nên đậm đặc——thổi bùng lên một ham muốn khác."
# 【双鉄】
# display as 雙鐵
# JP: 「だから――僕の種麹を、ふかみの蒸留器――\nふかみのおまんこの、最奥に――」
1207 = "「Vì vậy——hãy để men giống của tôi, vào tận cùng thiết bị chưng cất của Fukami—— vào tận cùng âm đạo của Fukami——」"
# 【ふかみ】
# display as 深美
# JP: 「はい。です……。\nん――」
1165 = "「Vâng. Ạ…….\nƯm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――こっちへ」
1234 = "「Fukami——lại đây.」"
# monologue
# JP: ふかみが全てを脱ぎ終えることさえ待ちきれず、\nか細い腰を引き寄せグっと持ち上げる。
1507 = "Không thể chờ đợi đến lúc Fukami cởi hết đồ, tôi kéo vòng eo thon thả của em ấy lại và nhấc bổng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは精子を、種麹だと例えたが――」
1209 = "「Fukami đã ví tinh trùng như men giống, nhưng——」"
# monologue
# JP: 例え話で、ふかみは、[いざな]誘ってくれている。\nそうと確信できたからこそ、自分の言葉で伝えたい。
1565 = "Bằng những câu chuyện ví von, Fukami đang dụ dỗ tôi. Chính vì tin chắc điều đó, nên tôi muốn truyền đạt bằng chính lời lẽ của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「例え話にとどまらず。そろそろ僕らも、\n子供を作っていい時期ではないかと、僕は思う」
989 = "「Không chỉ dừng lại ở những câu chuyện ví von. Tôi nghĩ, cũng đã đến lúc chúng ta nên có một đứa con rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「――っ」
# 1072 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1067 = "「唔！」" 
# monologue
# JP: 勃起に来る。ふかみの剥き出しの感情が、言葉よりも速く。\n嬉し泣きでもするかのように、膣口が甘くわなないている。
1595 = "Truyền đến sự cương cứng. Cảm xúc trần trụi của Fukami, còn nhanh hơn cả lời nói. Cửa mình run rẩy một cách ngọt ngào, như thể em ấy đang khóc vì sung sướng."
# 【ふかみ】
# display as 深美
# JP: 「嬉しい、です――です。わたしも、ずっと――\n双鉄おにいさんの、赤ちゃん、ほしくて――」
1201 = "「Em vui, lắm——ạ. Em cũng, luôn luôn—— muốn có em bé, của anh Soutetsu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1140 = "「Ừ.」"
# monologue
# JP: 酔った振りでのおねだりだったと確信し直し、ふと思う。\n今まで幾つのおねだりを、僕は見逃してきたのだろう。
