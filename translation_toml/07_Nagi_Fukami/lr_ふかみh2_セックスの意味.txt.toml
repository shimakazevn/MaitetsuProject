1265 = "「Vậy sao. Thế thì, anh muốn em chảy ra nhiều hơn nữa」"
# monologue
# JP: （きゅんっ！）
# 1775 = "（縮緊！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1105 = "「啊！！」" 
# monologue
# JP: 息が甘い。蠕動が甘い。濃厚なふかみの匂いが甘い。\n甘さに絡め取られた僕の最奥に、甘やかな声が浸透する。
1428 = "（Nhóp nhép――trượt――trượt――đẩy）"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんが、わたしを女にしてくれて。\nふたりでこれから――こづくりセックスするんですから」
1217 = "「Hyau!? Lại nữa! Lại, cái đó――hà, á!\nChỗ đó――em――yếu ớt lắm――cảm nhận, quá mức――!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1140 = "「嗯」" 
# monologue
# JP: 膣と勃起がぐぢゅぐぢゅ混じり、もう境目さえわからない。\n睾丸の中、精子がグツグツ煮える感覚だけを確かと感じる。
1446 = "（Trượtttttttttttttttttttttt, cọ）"
# 【双鉄】
# display as 雙鐵
# JP: 「これから。僕らは。きっと授かる僕らのこどもの\n――お父さんと、お母さんとになるのだ」
993 = "「Yaaa!? Không được! Không được! Lại nữa, lại nữa!\nTại vì!? Hai lần! , hai lần, nhanh như vậy, sao」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　――あっ！！！」
1213 = "（Trượt――ngoáy――trượt――đẩy）"
# monologue
# JP: （ずっっっっ！！！）
1762 = "「Hya!? Á! Đợi! Đợi đã! Không được,\nthật đấy――bây giờ――em――sẽ thành, đồ ngốc mất」"
# monologue
# JP: 故に、動かす。\nいままで敢えて避けていた、ふかみの一番深く目指して。
1510 = "（Trượtttttttttttttttttttttt――cọ!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっっ！　あっ！　ンッ――くっ――\nあっ！　わたし、なかっ――えぐれ――んうううっ！」
1273 = "「Ưm hyuuuuuuuuuuuuuuuuuuuuu!!」"
# monologue
# JP: （ぢゅぼおおおおおおおおおおおおおっ――ごちゅっ！）
1757 = "（Co thắt! Thítttttt! Kyun!!!）"
# 【ふかみ】
# display as 深美
