# display as 雙鐵
# JP: 「うあっ！！！！」
1035 = "「Ư ah!!!!」"
# monologue
# JP: （ずりゅううううっっっっっっっっっっ！！！！！）
1761 = "（Phập!!!!!!!）"
# 【ふかみ】
# display as 深美
# JP: 「んゆぅぅぅぅぅぅぅぅぅ～～～～っ！！！」
1086 = "「Ư ah~~~~!!!」"
# monologue
# JP: （ぶっヂュうぅぅぅぅぅぅぅぅぅぅぅぅ～ごりゅっ！！）
1737 = "（Nhóp nhép~~~~~ Cọ xát!!）"
# 【ふかみ】
# display as 深美
