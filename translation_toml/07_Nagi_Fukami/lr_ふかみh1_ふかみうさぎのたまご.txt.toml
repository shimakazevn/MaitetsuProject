1301 = "「Á――phua――ngón tay, của anh, Soutetsu――\nthô ráp――em thích lắm――to lớn, và ấm áp」"
# monologue
# JP: （きゅんっ！）
1968 = "「Nếu được vậy thì, thật vinh hạnh」"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！」
# 1305 = "「嗚！！！」" 
# monologue
# JP: 亀頭先端がくぽくぽ吸われ、蠕動はさら奥ヘ奥へと蠢いて、\n愚直に愚直に僕の思考を射精一色に染めようとする。
1627 = "（Vuốt――nắn――xoa――vuốt）"
# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずちゅっ！　ばつっっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
