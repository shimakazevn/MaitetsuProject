# display as 雙鐵
# JP: 「うあっ！！」
1225 = "Đỉnh quy đầu bị hút lấy \"kupokupo\", nhu động càng lúc càng luồn sâu hơn nữa,\ncứ khăng khăng muốn nhuộm suy nghĩ của tôi thành một màu bắn tinh duy nhất."
# monologue
