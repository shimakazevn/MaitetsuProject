# monologue
# JP: 揉みしだきたい気持ちを抑え、ゆっくりやわやわ、\n小鳥の雛を扱うように、優しく包み撫でさせる。
1675 = "我按捺住用力揉搓的衝動，輕輕地用手掌包裹住她的胸部，就像呵護初生的小鳥一樣。" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ――ンッ――うれしい――しあわせ――\nあったくって――双鉄おにいさん――すごく、感じて」
1463 = "「蛤啊……嗯……好開心……好幸福。能感覺到……雙鐵哥哥的溫暖」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もっと、もっとだ。感じてほしい」
1398 = "「我還想讓你感受得更清晰」" 

# monologue
# JP: （さわっ――もみゅっ――くりゅっ――くにっ！！）
1956 = "（揉捏！！）" 

# 【ふかみ】
# display as 深美
# JP: 「んっ！！！！」
1313 = "「嗯！！！！」" 

# monologue
# JP: 乳首を強めに潰してみれば、ふかみの膣が大きくわななく。\n亀頭が牽かれ、腰が勝手に進んでしまう。
1686 = "我用力捏了捏她的乳頭，她的小穴也隨之產生劇烈的反應。龜頭在小穴的收縮下被拉向深處，我的腰不受控制地向前挺。" 

# monologue
# JP: （ずりゅうううっ――じゅぶっ――ごりゅっつ）
1941 = "（啾嚕嚕嚕）" 

# 【ふかみ】
# display as 深美
# JP: 「くひゅんっ！！！！！」
1286 = "「啊嗯！！！！！」" 

# monologue
# JP: 甘い声。甘い蠕動。鼓膜と勃起が揺すぶられ、\n背骨に脳に、ゾクゾクと快感と混じる衝動が来る。
1601 = "嬌喘與蠕動的小穴分別進攻著我的鼓膜與肉棒，強烈的快感與衝動攀升向我的腦海。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ！　ふかみ！　ふかみ！　ふかみっ」
1434 = "「深美！深美！深美！深美！」" 

# monologue
# JP: （じゅぶっ！　ばちゅっ！　じゅるっ！　ごちゅっ！）
# 1913 = "（咕啾、咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「好き――好きっ――大好きっ！　んっ――はっ――\nおにい、さん――わたしの――双鉄、おにいさぁんっ」
1301 = "「喜歡、喜歡、最喜歡你了！啊嗯……雙鐵哥哥……屬於我的……雙鐵哥哥！」" 

# monologue
# JP: （きゅんっ！）
1968 = "（縮緊！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！」
# 1305 = "「嗚！！！」" 

# monologue
# JP: 亀頭先端がくぽくぽ吸われ、蠕動はさら奥ヘ奥へと蠢いて、\n愚直に愚直に僕の思考を射精一色に染めようとする。
1627 = "小穴的褶皺吮吸著龜頭，蠕動著引導我插向更深處，試圖讓我一片空白的大腦只剩下射精這個念頭。" 

# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずちゅっ！　ばつっっ！）
# 1913 = "（咕啾、咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　あっ！　あっ！　おにい、さんっ！\nわたし――平気――です、からっ――もっと、強くっ！」
1466 = "「蛤啊！啊啊啊！雙鐵哥哥！我沒關係的……所以……再激烈一點吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1260 = "「唔！！！！」" 

# monologue
# JP: （ぎゅうっ！）
1951 = "（抓住！）" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 1288 = "「啊！」" 

# monologue
# JP: 腰へと添えていた指を、支えるではなく掴むに換える。\nふかみの体全部を腕ごと僕へと引き寄せっ――っ！！
1681 = "我搭在深美腰上的雙手用上了力氣，緊緊抓住了她。然後摟過她的身體……唔！！" 

# monologue
# JP: （ず！　ぶっ！　ばちゅっ！　ずぶっ！　ず！　ごっ！）
1933 = "（啪、啪、啪、啪！）" 

# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　あっ！　あっ！　しゅごっ！\nこれっ！　頭っ！　おまんこっ！　ガクガク、してっ」
1470 = "「蛤啊！蛤啊啊啊！好棒！腦袋和小穴……都酥酥麻麻的……」" 

# monologue
# JP: （ず！　ば！　ご！　ぢゅ！　ば！　ゅ！　ず！　ぶ！）
# 1933 = "（啪、啪、啪、啪！）" 

# monologue
# JP: 加速する。体の力の全部を勃起と腰と手指に集中させる。\nふかみのぬかるむ膣内を、速度でぐちゃぐちゃにかき乱す。
1699 = "我進一步加速，將力氣全部集中在腰、手以及肉棒上，不停攪弄深美濕潤的小穴。" 

# monologue
# JP: （ば！　ぢゅ！　ご！　ぶ！　ご！　ご！　ご！　ご！）
# 1933 = "（啪、啪、啪、啪！）" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　あっ！　そうてつ！　おにいさっ！　あっ！\nわたしっ！　わたしっ！　おまんこっ！　もう、もう！」
1468 = "「蛤啊！啊！雙鐵哥哥！！我、我！小穴已經、已經要……！」" 

# monologue
# JP: （きゅううううううっっっ！！）
1966 = "（用力！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くううっっ！！」
# 1259 = "「唔！！」" 

# monologue
# JP: （ずゆぶうううううううううううううっっっっ！！）
1954 = "（抓緊！！）" 

# monologue
# JP: 思いっきりに腰を引き、腕の力でふかみの腰を固定する。
1684 = "我用力抽腰，雙手則抓住深美的腰。" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ」
1271 = "「啊」" 

# monologue
# JP: 目と目が合う。すみれ色の目が、半開きの口が、\nふかみの奥へ、もっと奥へと僕を誘い引き込んで――！！
1661 = "我們對視了一眼。她雙目似堇，紅唇半張，彷彿在邀請我插向更深處……唔！！" 

# monologue
# JP: （ぐぢゅぅぅぅぅぅぅぅぅぅぅぅぅっ！――ごりゅっ！）
1920 = "（咕啾咕啾咕啾！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひゅぁぁぁぁぁぁぁっぁぁぁぁぁぁぁっぁぁぁん！！」
1224 = "「呀啊啊啊啊啊！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！！」
1225 = "「呃啊！！」" 

# monologue
# JP: （びゅくっ！　どびゅっ！　びゅるっ！　ぼびゅっ！！）
1931 = "（咻咻咻咻！！）" 

# monologue
# JP: 思いっきりに膣の最奥に精をぶつけて――\n瞬間、脳が理性と記憶を取り戻す。
1693 = "我盡情在她的體內釋放出一切……然後突然喚回了理性與記憶。" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁ！　あっ！　すごい！　子宮――おまんこ――\n精子――たくさん、ごくごく――わたしっ、のんで、る」
1467 = "「蛤啊！啊啊！好棒……子宮、小穴裡……射進來好多好多……精子……」" 

# monologue
# JP: [だ,1]射精したて一番の精液は、もはや子宮に呑まれてしまった。\nが、今からでも、ふかみの体に注ぐためっ――っ！？！
1613 = "射出的第一股精液已經被子宮吞下。但現在還來得及射在她身上……啊？！" 

# monologue
# JP: （ぶびゅっ！　びゅるうっ！　びゅうっ！　ぼびゅっ！）
# 1930 = "（咻咻、咻咻！）" 

# 【ふかみ】
# display as 深美
# JP: 「熱い、おいしいっ――精液――精液っ――ンッ――\nわたしの、ため、だけの――双鉄、おにいさんの、精子」
1345 = "「好熱、好美味……精液、精液……只屬於我的雙鐵哥哥……射出的精子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふ――かみ――緩めて、くれないとっ――ぁあっ！！」
1432 = "「深美……快放開我……呃！！」" 

# monologue
# JP: （びゅぶっ！　びゅっ！　びゅう！　どびゅっ！！）
1929 = "（咻咻、咻咻！！！）" 

# monologue
# JP: ふかみの子宮口が僕の亀頭をぴったりホールドしてしまう。\n膣道もみっちり張り付き、痛いくらいに締め付けてくる、
1611 = "子宮口與龜頭完美契合在一起。小穴也緊緊包裹住肉棒，勒得我甚至有點痛。" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ――あっ――あんっ――ふあっ――あっ――あ――」
1267 = "「啊……啊嗯、啊嗯……蛤啊……」" 

# monologue
# JP: （びゅっ！　どびゅっ！　びゅるううっ！ぼびゅっ！）
# 1930 = "（咻咻、咻咻！）" 

# monologue
# JP: 満足の他に開放の手段はない。故に亀頭をあえて押し込み、\n子宮口へとただただぐりぐり亀頭先端を貼り付け動かし
1797 = "看來只能徹底滿足她了。於是我用力將龜頭插入，按在子宮口上一個勁地摩擦。" 

# 【ふかみ】
# display as 深美
# JP: 「は……ぁっ――ふぁぅ……んっ――えへへっ――\nそうてつおにいさん――わたしの、双鉄おにいさぁん」
1460 = "「蛤啊……啊嗯……嘿嘿……雙鐵哥哥……只屬於我的，雙鐵哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1308 = "「嗯」" 

# monologue
# JP: （ぴゅ……ぴゅるっ……ぷ……ぴ………………）
1928 = "（咻咻、咻咻……）" 

# monologue
# JP: 精液全部が出尽くして。ようやくふかみの膣が緩む。\n甘えた声は明確に、どろどろのキスをせがんでる。
1811 = "精液射空之後，深美的小穴終於放鬆下來。她的嬌聲明顯是在索求深吻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。あれほど偉そうなことを言っておきながら、\n僕もセックス――ふかみに夢中になってしまって」
975 = "「……抱歉，我剛才口氣那麼大，結果也跟你一樣沉迷於做愛了」" 

# 【ふかみ】
# display as 深美
# JP: 「ふぇ？――あ！　そんなの、全然謝ることじゃないです。\nだって――ねぇ？　双鉄おにいさん」
1252 = "「哎？啊！不需要道歉啊。因為……你懂吧？雙鐵哥哥」" 

# monologue
# JP: （きゅっ）
1950 = "（夾緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1295 = "「啊！！」" 

# monologue
# JP: ふかみは恐らく自分の意思で、膣を甘やかに狭めてみせた。\nぐったりと項垂れる僕の亀頭を、いいこいいこし励ました。
1763 = "深美故意用小穴夾了一下我的肉棒。彷彿在安撫著我垂頭喪氣的龜頭。" 

# 【ふかみ】
# display as 深美
# JP: 「次の射精で、たくさんかけて――精液の匂いたくさん、\nわたしに嗅がせてくれるので、それで最高に幸せですし」
1183 = "「下次射精的時候，滿滿地射在我身上，讓我聞個夠，那我就幸福到極點了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1390 = "「我答應你」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、けど――その前に」
1299 = "「啊，對了，在那之前……」" 

# monologue
# JP: ふかみがはにかみ振り返る。\n兎の耳が、ひょこん、と僕に会釈する。
1747 = "深美害羞地回過頭，頭上的兔耳輕輕搖擺了一下。" 

# 【ふかみ】
# display as 深美
# JP: 「キス――ね？　わたし、たくさんたくさん、\n甘いのたくさん――してほしい。です――です」
1473 = "「親我吧。我想跟雙鐵哥哥來好多好多，好多好多個甜甜的吻，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「奇遇だな。僕もふかみとキスしたかった」
1445 = "「真巧，我也想吻你」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1308 = "「嗯」" 

# monologue
# JP: 深く。唇と舌を重ねて――そうして僕らは今度こそ、\n三度目の正直を叶えるために、動き始める。
1662 = "我們深深一吻，唇舌交纏在一起。為了實現最初的諾言，我們再次親熱起來。" 
