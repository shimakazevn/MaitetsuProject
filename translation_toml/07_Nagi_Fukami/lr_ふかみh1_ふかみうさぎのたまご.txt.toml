1466 = "Kìm nén cảm giác muốn xoa nắn mạnh bạo, tôi chậm rãi, nhẹ nhàng,\nbao bọc và vuốt ve âu yếm như đang nâng niu một chú chim non."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1260 = "「唔！！！！」" 
# monologue
# JP: （ぎゅうっ！）
1951 = "「Phua――ưm――vui quá――hạnh phúc quá――\nẤm áp quá――anh Soutetsu――cảm nhận được, rất rõ」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 1288 = "「啊！」" 
# monologue
# JP: 腰へと添えていた指を、支えるではなく掴むに換える。\nふかみの体全部を腕ごと僕へと引き寄せっ――っ！！
1681 = "「Hơn nữa, hơn nữa đi. Anh muốn em cảm nhận được」"
# monologue
# JP: （ず！　ぶっ！　ばちゅっ！　ずぶっ！　ず！　ごっ！）
1933 = "（Chạm――xoa――vuốt――nắn!!）"
# 【ふかみ】
# display as 深美
