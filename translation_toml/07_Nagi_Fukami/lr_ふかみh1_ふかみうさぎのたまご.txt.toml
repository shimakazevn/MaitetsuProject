[script]
# lines: 317 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？……むっ――」
1316 = "「Hửm?…… Ưm——」"
# monologue
# JP: ……体が重い。\nいや、違う――体に、なにかが乗っている。
1841 = "……Cơ thể nặng trĩu.\nKhông, không phải——có thứ gì đó đang đè lên người tôi."
# 【ふかみ】
# display as 深美
# JP: 「ん、しょ――えと――」
1317 = "「Ưm, dô——ừm——」"
# monologue
# JP: 聞き慣れた声。ふかみの声。\nここは？　……ああ、いや、僕はうたた寝を――っ！？
1651 = "Một giọng nói quen thuộc. Giọng của Fukami.\nĐây là đâu? ……A, không, mình đang ngủ gật mà——!?"
# 【ふかみ】
# display as 深美
# JP: 「ん……っと、あとは――\nあとは――ぱ、ぱ、ぱ、パンツ、だけ――（ごくっ）」
1319 = "「Ưm…… rồi, tiếp theo là——\ntiếp theo là——chỉ, chỉ, chỉ, chỉ còn quần lót, thôi——（Ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにが――パンツだけなのだ」
1193 = "「Cái gì——chỉ còn quần lót cơ.」"
# 【ふかみ】
# display as 深美
# JP: 「ひえっ！！？」
1234 = "「Hí!!?」"
# monologue
# JP: ふかみがじたばた動き出すゆえ、\n腿を掴んでひとまず抑える。
1757 = "Thấy Fukami bắt đầu vùng vẫy,\ntôi liền nắm lấy đùi em ấy để giữ lại trước đã."
# 【双鉄】
# display as 雙鐵
# JP: 「慌てずともいい。逃げずともいい。\n僕には、ふかみを責めようなどという気持ちは一切ない」
1187 = "「Không cần phải hoảng hốt. Cũng không cần phải chạy trốn.\nTôi hoàn toàn không có ý định trách mắng Fukami đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「……」
961 = "「……」"
# monologue
# JP: 掴んだ腿の固さが緩む。ふかみは明らかにホッとしている。\nということはつまり――後ろめたさがあるのだろう。
1599 = "Cặp đùi đang bị tôi nắm lấy dần nới lỏng sự căng cứng. Fukami rõ ràng đã thở phào nhẹ nhõm.\nĐiều đó có nghĩa là——em ấy đang cảm thấy tội lỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「責める以前に、僕には、\n今一つ状況がつかめていないのだ」
1325 = "「Trước khi trách mắng, thì\ntôi vẫn chưa nắm bắt được tình hình hiện tại.」"
# monologue
# JP: 真闇姉が出張で、日々姫はハチロクを連れて研修で。\n一人では不便だろうと、ふかみが泊まりに来て――ん？
1804 = "Chị Mayami đi công tác, Hibiki thì dẫn Hachiroku đi tập huấn.\nSợ tôi ở một mình bất tiện, nên Fukami đã đến ngủ lại——hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「とてもかわいい格好をしているな。\n……それは――そのうさぎは、下着か？　寝間着か？」
1206 = "「Trang phục của em dễ thương quá nhỉ.\n……Đó là——con thỏ đó, là đồ lót sao? Hay là đồ ngủ?」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ、あの、ランジェリーです。です。\nそのっ、ウサギ――イースターバニーがモチーフの」
1281 = "「Hau, dạ, là nội y ạ. Vâng.\nCái đó, thỏ——lấy cảm hứng từ Thỏ Phục Sinh ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「イースターバニー」
1361 = "「Thỏ Phục Sinh.」"
# monologue
# JP: イースター、復活祭というヤツか。\n復活祭の兎といえば――っ！
1835 = "Easter, là Lễ Phục Sinh nhỉ.\nNhắc đến thỏ Phục Sinh thì——!"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、詳しくは知らんのだが――どんなものなのだ？\nその、イースターバニーとやらは」
1376 = "「Tôi không rành lắm——nó là thứ như thế nào vậy?\nCái gọi là Thỏ Phục Sinh ấy.」"
# monologue
# JP: 詳しく知らんが、ぼんやりした知識ならある。\nゆえに尋ねる、確かめる。ふかみの口から聞きたくて。
1844 = "Dù không rành lắm, nhưng tôi cũng có chút kiến thức mơ hồ về nó.\nVì vậy tôi mới hỏi, để xác nhận. Tôi muốn nghe từ chính miệng Fukami."
# 【ふかみ】
# display as 深美
# JP: 「えとっ！？　あの、その、イースターバニーは、\nうさぎさん、です。復活祭の日の兎さん……で――」
1231 = "「Ơ!? Dạ, cái đó, Thỏ Phục Sinh là,\nlà bạn thỏ ạ. Là bạn thỏ trong ngày Lễ Phục Sinh…… ạ——」"
# monologue
# JP: ふかみの肌の赤みが増す。\n腰がもぞもぞ蠢いて、呼吸も荒くなりはじめる。
1774 = "Làn da của Fukami càng thêm ửng đỏ.\nPhần hông ngọ nguậy cựa quậy, hơi thở cũng bắt đầu trở nên gấp gáp."
# 【ふかみ】
# display as 深美
# JP: 「復活祭の日に……ンッ――イースター、エッグ……\n卵を、えと――良い子に、届けてくれるんです」
1363 = "「Vào ngày Lễ Phục Sinh…… Ưm——Easter, Egg……\nSẽ mang trứng, dạ——đến cho những đứa trẻ ngoan ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「卵を、か」
1456 = "「Mang trứng, sao.」"
# monologue
# JP: 僕の記憶に間違いはなかったようだ。兎は、多産。\nゆえに象徴するものは、安産――そうして、好色だ。
1798 = "Có vẻ trí nhớ của tôi không sai. Thỏ là loài sinh sản nhiều.\nDo đó nó tượng trưng cho sự sinh đẻ thuận lợi——và, sự dâm đãng."
# 【双鉄】
# display as 雙鐵
# JP: 「どうも卵が見当たらんようだが……\n届けてもらえぬ程、僕は、悪い子だったということかな」
1220 = "「Hình như không thấy quả trứng nào thì phải……\nChẳng lẽ tôi là một đứa trẻ hư đến mức không được mang trứng đến sao.」"
# 【ふかみ】
# display as 深美
# JP: 「違います！　あります！　たまご。ふかみうさぎの――\nえと……双鉄おにいさん専用の……たまご――んっ」
1185 = "「Không phải đâu ạ! Có mà! Trứng. Của thỏ Fukami——\ndạ…… trứng…… dành riêng cho anh Soutetsu——ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1288 = "「!」"
# monologue
# JP: ふかみがわずかに腰を浮かして、\n可愛らしいパンツをするする脱ぎ捨てていく――っ！？
1780 = "Fukami hơi nhấc hông lên,\nvà nhanh chóng cởi bỏ chiếc quần lót dễ thương——!?"
# 【ふかみ】
# display as 深美
# JP: 「んしょっ――んっ――よい、しょっ」
1318 = "「Ưm, dô——ưm——dô, ta.」"
# monologue
# JP: それが当然であるかのように、僕のパンツもずり下げる。\n異論はまったく無いゆえに、僕も協力し腰を浮かせる。
1597 = "Như một lẽ đương nhiên, em ấy cũng kéo luôn quần lót của tôi xuống.\nHoàn toàn không có dị nghị gì, nên tôi cũng hợp tác nhấc hông lên."
# 【ふかみ】
# display as 深美
# JP: 「たまご……ここ、です」
1362 = "「Trứng…… ở đây, ạ.」"
# monologue
# JP: （くちっ）
1944 = "(Nhóp nhép)"
# monologue
# JP: ふかみは股間を見せつけながら、僕の勃起を押しつぶす。\nにちゃりと湿った音が立ち、ふかみの熱が伝わってくる。
1761 = "Vừa phô bày vùng kín, Fukami vừa đè bẹp sự cương cứng của tôi.\nMột âm thanh ướt át nhớp nháp vang lên, và hơi nóng của Fukami truyền đến."
# 【ふかみ】
# display as 深美
# JP: 「わたしのたまご……\n双鉄おにいさんのものにしてほしくて、それで、わたし」
1385 = "「Trứng của em……\nEm muốn nó trở thành của anh Soutetsu, vì vậy, em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うたた寝をしている僕にのしかかり――\n服を脱がせていったのか？」
1406 = "「Nên em đã đè lên người tôi lúc tôi đang ngủ gật——\nvà cởi quần áo của tôi ra sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あのっ！　その、\n最初はそんなつもりじゃなかったんです！」
1493 = "「Dạ! Chuyện đó,\nban đầu em không có ý định như vậy đâu ạ!」"
# monologue
# JP: 慌てたふかみが体を揺らす。性器同士がこすれあい、\n甘く濁った快感が、睾丸の中に集まっていく。
1755 = "Fukami hoảng hốt lắc lư cơ thể. Bộ phận sinh dục cọ xát vào nhau,\nmột khoái cảm ngọt ngào, đục ngầu đang tụ lại trong tinh hoàn."
# 【ふかみ】
# display as 深美
# JP: 「わたし、あの、普通に双鉄おにいさんのこと……\n誘惑、したいなって思って……このランジェリー着て」
1371 = "「Em, dạ, em chỉ định bình thường……\nquyến rũ anh Soutetsu thôi ạ…… bằng cách mặc bộ nội y này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の部屋に入ったら、僕がうたたねをしていた？」
1452 = "「Nhưng khi vào phòng tôi, thì thấy tôi đang ngủ gật?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。それでわたし拍子抜けして、がっかりして。\n双鉄おにいさんに毛布、かけてあげようと思って――ん」
1423 = "「Đúng vậy ạ. Thế là em chưng hửng, và thất vọng.\nĐịnh đắp chăn cho anh Soutetsu——ưm.」"
# monologue
# JP: 無意識にだろうか、それともこれが“誘惑”なのか――\nふかみの腰がゆるゆると、小さく、遅く前後している。
1778 = "Là vô thức, hay đây chính là \"quyến rũ\"——\nPhần hông của Fukami đang chậm rãi, nhẹ nhàng di chuyển tới lui."
# 【ふかみ】
# display as 深美
# JP: 「そしたら、匂い――双鉄おにいさんの匂い、して……\nもっと……っ――濃い、の、わたし――かぎたくなって」
1438 = "「Sau đó, mùi hương——mùi của anh Soutetsu, thoảng qua……\nEm lại càng…… muốn——ngửi thấy mùi, đậm hơn, nữa.」"
# monologue
# JP: （にちゅっ――ちゅむっ――ちゅっ――くちゅっ――）
1910 = "(Nhóp nhép——chụt——chụt——chụt——)"
# monologue
# JP: こすれあってる部分から、ふかみの蜜が腹にこぼれる。\n甘ったるいふかみの匂いが、僕と部屋とを染めていく。
1784 = "Từ phần cọ xát, mật dịch của Fukami tràn xuống bụng tôi.\nMùi hương ngọt lịm của Fukami đang nhuộm đẫm cả tôi và căn phòng."
# 【ふかみ】
# display as 深美
# JP: 「ちょっとだけって思って、胸元のボタン外したら……\nんっ――なんか――止まらなくなっちゃって――ふ、あ」
1379 = "「Em chỉ định một chút thôi, nên đã tháo cúc áo ở ngực ra……\nƯm——không hiểu sao——lại không thể dừng lại được nữa——fu, a.」"
# monologue
# JP: ふかみの腰も止まらない。動きが明確に大きくなってる。\nかわいいブラのおっぱいも、控えめにだが揺れ動いてる。
1777 = "Hông của Fukami cũng không dừng lại. Chuyển động rõ ràng đã lớn hơn.\nBộ ngực trong chiếc áo lót dễ thương cũng đang rung rinh dù khá khiêm tốn."
# 【双鉄】
# display as 雙鐵
# JP: 「こうして下から見上げると……\n控えめではあるものの、たしかにおっぱいと感じるな」
1358 = "「Nhìn từ dưới lên thế này……\ndù hơi khiêm tốn, nhưng quả thực vẫn mang lại cảm giác của một bộ ngực nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1288 = "「啊！」" 
# monologue
# JP: とても嬉しげな声を出し、ふかみがよいしょ、と\nブラを外して、未成熟な胸を晒してくれる。
1775 = "Phát ra một giọng nói vô cùng vui sướng, Fukami khẽ hô \"dô ta\",\ntháo áo lót ra, phơi bày bộ ngực chưa trưởng thành của mình."
# 【ふかみ】
# display as 深美
# JP: 「えへへ、どう、です？　わたしの、おっぱい」
1322 = "「Ehehe, sao, ạ? Ngực, của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とても綺麗で、愛らしい。この体勢でないのなら、\n今すぐにでもむしゃぶりつきたい」
1356 = "「Rất đẹp, và đáng yêu. Nếu không phải đang ở tư thế này,\nthì ngay bây giờ tôi muốn ngấu nghiến nó.」"
# 【ふかみ】
# display as 深美
# JP: 「たぶん、きっとそんな感じで――\nわたしも、たまらなくなっちゃったんです。です」
1337 = "「Có lẽ, chắc chắn là cảm giác giống như vậy——\nEm cũng, không thể chịu đựng được nữa rồi ạ. Vâng.」"
# monologue
# JP: 未成熟だがたしかな丸みのおっぱいの、\nその先端はピンと勃起し、ふかみの興奮を伝えてくれる。
1579 = "Dù chưa trưởng thành nhưng bộ ngực vẫn có độ tròn trịa nhất định,\nphần đỉnh nhô lên căng cứng, truyền đạt sự hưng phấn của Fukami."
# 【ふかみ】
# display as 深美
# JP: 「もっと――濃い、一番強い、双鉄おにいさんの、匂い\n――んっ――わたし、どうしても、嗅ぎたくなって――」
1397 = "「Mùi hương, đậm hơn——mạnh nhất, của anh Soutetsu\n——Ưm——bằng mọi giá, em muốn ngửi thấy——」"
# monologue
# JP: （ゆさっ――くっっ――くにゅっ――くちっ）
1959 = "(Lắc lư——hự——nhóp nhép——nhóp nhép)"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！　――ぁ――自分、では――\n自分の――匂いの、ことは――わからぬ、もの、だが」
1312 = "「Ưm! ——A——Bản thân, thì——\nsẽ không, nhận ra——mùi hương của, chính mình, đâu, nhưng mà.」"
# monologue
# JP: 腰の動きに角度がつく。ふかみは自分のクリトリスを、\n僕のカリ首に当てて引き――僕の勃起でオナニーしている。
1751 = "Chuyển động của hông bắt đầu có góc độ. Fukami ấn âm vật của mình\nvào phần đầu khấc của tôi rồi kéo qua lại——em ấy đang thủ dâm bằng sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――くっ――あ――。\n……一番、濃い、僕の匂いは――いったい、どんな」
1307 = "「Ưm——hự——a——.\n……Mùi hương, đậm nhất, của tôi——rốt cuộc, là mùi như thế nào.」"
# 【ふかみ】
# display as 深美
# JP: 「精液、です――びゅうびゅうって、おちんちんから\n飛び出してきたばっかりの――あっつい精液の、匂い」
1425 = "「Tinh dịch, ạ——mùi tinh dịch, nóng hổi——\nvừa mới phóng ra, từ dương vật.」"
# monologue
# JP: （くっ――ぐくっ――くりゅっ――じゅむっ――）
# 1910 = "（咕啾……咕啾……）" 
# monologue
# JP: 僕の言葉を途中で切って。べっとり濡れた唇から、\n熱に浮かされているような言葉をふかみはこぼし続ける。
1759 = "Ngắt lời tôi giữa chừng. Từ đôi môi ướt át nhớp nháp,\nFukami liên tục thốt ra những lời nói như đang chìm trong cơn sốt."
# 【ふかみ】
# display as 深美
# JP: 「だから、わたし――双鉄おにいさん、のっ――んっ\n――精液、びゅうびゅう、して、ほしくなって――ぁ」
1409 = "「Vì vậy, em——muốn anh Soutetsu——ưm\n——phóng tinh dịch, ra——a.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。少し待ってほしい」
1436 = "「Fukami. Đợi một chút đã.」"
# monologue
# JP: （くっ）
1952 = "(Hự)"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1229 = "「Hả!?」"
# monologue
# JP: 腿を抑えてふかみに動きを止めてもらえば、\nふかみはアイスを落としてしまったこどものような顔になる。
1672 = "Giữ đùi lại để Fukami dừng chuyển động,\nkhuôn mặt em ấy liền trở nên giống như một đứa trẻ vừa làm rơi cây kem."
# 【ふかみ】
# display as 深美
# JP: 「あの、わたし――なにか、いけないこととか、\n間違ったこととか――あうっ！？」
1492 = "「Dạ, em——đã làm gì, không được phép,\nhay sai trái sao——au!?」"
# monologue
# JP: 夜這いはいけない。寝込みを襲うのも間違っていよう。\n自覚したのかふかみが固まる。
1735 = "Lẻn vào phòng ban đêm là không được. Tấn công người đang ngủ cũng là sai.\nCó lẽ vì tự nhận thức được điều đó nên Fukami cứng đờ người."
# 【双鉄】
# display as 雙鐵
# JP: 「こうしたことで、ふかみがどれ程突っ走ろうとも、\n僕は嬉しいし大歓迎だ。そこならば気にせずともよい」
1328 = "「Trong chuyện này, dù Fukami có làm tới mức nào đi nữa,\ntôi cũng rất vui và cực kỳ hoan nghênh. Chuyện đó thì em không cần phải bận tâm đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……よかった……。\nよかった――です」
1297 = "「A…… may quá…….\nMay quá——ạ.」"
# monologue
# JP: （ぬるんっ）
1973 = "(Trơn tuột)"
# monologue
# JP: 止まった腰がもう動く。\n言った手前、腿を抑えている手を僕も、離す他ない。
1740 = "Phần hông vừa dừng lại đã tiếp tục chuyển động.\nĐã lỡ nói vậy rồi, nên tôi cũng đành phải buông tay đang giữ đùi em ấy ra."
# monologue
# JP: （ぬっ！　ぬるっ！　くにゅっ！　じゅぶっ！！）
1923 = "(Trơn! Trượt! Nhóp nhép! Sùng sục!!)"
# 【ふかみ】
# display as 深美
# JP: 「けど――んっ――それなら、なんで――ふ、ぁ――\n双鉄――おにいさっ――ぁ――わたし――とめ、てっ」
1223 = "「Nhưng——ưm——nếu vậy, thì tại sao——fu, a——\nanh Soutetsu——a——lại cản, em, lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやなに――ん……ぁ――ごく単純な疑問を――\n整理、したかった、だけ、だ――」
1486 = "「Không có gì——ưm…… a——chỉ là một thắc mắc rất đơn giản——\ntôi chỉ muốn, sắp xếp lại, một chút, thôi——」"
# 【ふかみ】
# display as 深美
# JP: 「せいり……。せいり……双鉄おにいさんが、せいり……\nん――は、ぁ――双鉄おにいさんの――せい、りっ」
1441 = "「Sắp xếp……. Sắp xếp…… anh Soutetsu, sắp xếp……\nƯm——ha, a——của anh Soutetsu——sắp, xếp.」"
# monologue
# JP: （ぞくっ）
1971 = "(Sởn gai ốc)"
# monologue
# JP: 快感ではない、次元のことなる何かに背筋が怖気立つ。\nふかみの妄想を止めねばならぬ。それが如何なる物であれ。
1695 = "Sống lưng tôi sởn gai ốc vì một thứ gì đó ở một chiều không gian khác, không phải là khoái cảm.\nPhải ngăn cản sự hoang tưởng của Fukami lại. Dù nó có là gì đi chăng nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、どちらが良いのかと思ったのだ――\nふかみのたまごを――僕が、おいしくいただくことと」
1381 = "「Tóm lại, tôi đang nghĩ xem cái nào thì tốt hơn——\nGiữa việc tôi, thưởng thức thật ngon lành——trứng của Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！！！」
1296 = "「A!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1262 = "「!?」"
# monologue
# JP: 瞬間、ふかみが軽く震える。密着しているふかみの小さな\nおまんこが、きゅうん、と、吸い付く刺激を伝える。
1782 = "Ngay khoảnh khắc đó, Fukami khẽ run rẩy. Cô bé nhỏ nhắn đang dính sát vào tôi\ntruyền đến một kích thích hút chặt, kyuun."
# 【ふかみ】
# display as 深美
# JP: 「貰って、染めてほしいです――んっ――双鉄おにいさん\n専用、の――わたしの――ふかみの――おまんこたまご」
1384 = "「Hãy nhận lấy, và nhuộm màu cho nó đi ạ——ưm——dành riêng\ncho anh Soutetsu——trứng âm đạo——của em——của Fukami.」"
# monologue
# JP: 染める――ふかみの卵を染める。僕の精子で染め付ける。\n“染色体”の３文字を、性的なものと初めて感じる。
1721 = "Nhuộm màu——nhuộm màu trứng của Fukami. Nhuộm bằng tinh trùng của tôi.\nLần đầu tiên tôi cảm thấy 3 chữ \"nhiễm sắc thể\" lại mang ý nghĩa tình dục đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、思いっきりに染め付けたいのはやまやまだ。\nけれど同時にもう一つ、ふかみは望んでいたではないか」
972 = "「……Tôi cũng rất muốn nhuộm nó một cách thỏa thích.\nNhưng đồng thời, chẳng phải Fukami còn một mong muốn khác sao.」"
# monologue
# JP: （ぐくっ！）
1961 = "(Thọc mạnh!)"
# 【ふかみ】
# display as 深美
# JP: 「んきゅっ！！！」
1305 = "「Ưm kyu!!!」"
# monologue
# JP: 腰を浮かせて勃起をさらにふかみの割れ目に食い込ませる。\n密着している膣前庭のわななきが、更にはっきり強くなる。
1670 = "Nhấc hông lên và để dương vật cương cứng lún sâu hơn vào khe hở của Fukami.\nSự run rẩy của tiền đình âm đạo đang dính chặt càng trở nên rõ ràng và mạnh mẽ hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の一番強い匂いを――射精したばかりの精液の匂いを\n嗅ぎたい、とも」
1201 = "「Em nói là muốn ngửi mùi hương mạnh nhất của tôi——\nmùi tinh dịch vừa mới bắn ra cơ mà.」"
# 【ふかみ】
# display as 深美
# JP: 「嗅ぎたい！　嗅ぎたいです、です！　たくさんたくさん、\nたくさん！　双鉄おにいさんの――ん――精液の、匂い」
1387 = "「Muốn ngửi! Em muốn ngửi, ạ! Thật nhiều thật nhiều,\nthật nhiều! Mùi tinh dịch——ưm——của anh Soutetsu.」"
# monologue
# JP: （じゅるっ！　ぶちゅっ！　ずりゅっ！　じゅくっ！）
1942 = "(Chụt! Phụt! Sột soạt! Sùng sục!)"
# monologue
# JP: ふかみの腰が再び大きく強くスライドしはじめる。\n更に強まる密着感が、挿入してると脳を錯覚させかける。
1742 = "Hông của Fukami lại bắt đầu trượt mạnh và lớn hơn.\nCảm giác dính sát ngày càng tăng khiến não bộ tôi sinh ra ảo giác như đang cắm vào."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえにどちらを選ぶのか、ふかみに一度確認しようと」
1408 = "「Vì vậy, tôi muốn xác nhận lại một lần xem Fukami chọn cái nào.」"
# 【ふかみ】
# display as 深美
# JP: 「両方、両方に決まってます。です！」
1370 = "「Cả hai, chắc chắn là cả hai rồi. Ạ!」"
# monologue
# JP: 勢いこんでそう言って。ふっと、\nふかみは我に返りでもしたかのように、瞳を伏せる。
1765 = "Mạnh dạn nói vậy. Rồi chợt,\nnhư thể bừng tỉnh, Fukami cụp mắt xuống."
# 【ふかみ】
# display as 深美
# JP: 「もちろん、双鉄おにいさんがイヤじゃなくって――\n体力的にとか、平気なら、の話ですけど――です」
1444 = "「Tất nhiên, nếu anh Soutetsu không ghét——\nvà nếu thể lực của anh không sao, thì mới được——ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「イヤどころか」
1443 = "「Sao mà ghét được.」"
# monologue
# JP: （ぐりゅっ！！）
1958 = "(Sùng sục!!)"
# 【ふかみ】
# display as 深美
# JP: 「んひゅんっ！！！」
1277 = "「Ưm hyun!!!」"
# monologue
# JP: 下から腰を突き上げて、もうぐちょぐちょのおまんこに、\n勃起をぐりぐりめり込ませる。
1669 = "Đẩy hông từ dưới lên, và ấn mạnh sự cương cứng\nvào cái lồn đã ướt sũng."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみに幾度も射精するのはむしろ望むところだし。\n体力的にも、まったく問題なかろうと思う」
1333 = "「Được bắn tinh nhiều lần vào Fukami mới là điều tôi mong muốn.\nVề mặt thể lực, tôi nghĩ cũng hoàn toàn không có vấn đề gì.」"
# monologue
# JP: 実際、いますぐにでもゆるめれば射精しそうなほどだ。
1836 = "Thực tế, chỉ cần thả lỏng ngay lúc này là tôi có thể bắn ra ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、に。ふかみに決めてほしい」
1411 = "「Vì, vậy. Tôi muốn Fukami quyết định.」"
# monologue
# JP: （ぐっ！　ぐりゅっ！　ずりゅっ！　しにゅっ！）
1924 = "(Hự! Sùng sục! Sột soạt! Phụt!)"
# 【ふかみ】
# display as 深美
# JP: 「はぁ――ぁっ――ん……わたし、きめるっ――んっ」
1459 = "「Ha——a——ưm…… em, quyết định——ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。今日の射精の一発目を、一体、どこに」
1315 = "「À, đúng rồi. Phát bắn tinh đầu tiên của ngày hôm nay, rốt cuộc là, ở đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「お外――お外に射精して、わたしにたくさん！\n濃くて、熱くて、臭う精液、かけてください」
1351 = "「Bên ngoài——bắn ra ngoài, và cho em thật nhiều!\nHãy bắn thứ tinh dịch đặc sệt, nóng hổi, bốc mùi đó lên người em đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっ――っ！！！！？」
1339 = "「Hiểu——!!!!?」"
# monologue
# JP: （じゅぶううううううううううううっ！！！！！）
1940 = "(Sùng sục sùng sục sùng sục!!!!!)"
# 【ふかみ】
# display as 深美
# JP: 「んうっ！！！！！！！」
1287 = "「Ưm!!!!!!!」"
# monologue
# JP: 体にかけてといいながら、ふかみは素早く腰をうかして、\n蕩ける小さなおまんこで、僕の勃起を飲み込んでくる！
1731 = "Miệng thì bảo bắn lên người, nhưng Fukami lại nhanh chóng nhấc hông lên,\nvà dùng cái lồn nhỏ bé đang tan chảy nuốt chửng sự cương cứng của tôi!"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかっ――っ！！！！！」
1435 = "「Fuka——!!!!!」"
# monologue
# JP: （こちゅんっ！）
1943 = "(Cụp!)"
# 【ふかみ】
# display as 深美
# JP: 「んきゅううっ！！」
1304 = "「Ưm kyuuu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！」
1258 = "「Ua!」"
# monologue
# JP: 最奥へとあたった瞬間、かぷりと咥えられるような感覚。\nふかみの子宮口は貪欲に、僕の精液を呑みたがってる。
1705 = "Khoảnh khắc chạm đến tận cùng, một cảm giác như bị ngậm lấy.\nCổ tử cung của Fukami đang tham lam muốn nuốt trọn tinh dịch của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そ、[そと,1]膣外に射精す――体にかけてほしいと――\nくっ、は――言われたばかりのような、気が、したが」
1365 = "「Bắn, bắn tinh ra ngoài——muốn tôi bắn lên người——\nhự, ha——hình như, em vừa mới nói vậy, mà nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「かけて、くだ、さいっ――ンッ――あっ――\n精液、双鉄、おにいさんの――あついの――わたしにっ」
1474 = "「Hãy bắn, lên, người em——ưm——a——\ntinh dịch, của anh Soutetsu——nóng hổi——lên người em.」"
# monologue
# JP: （ずりゅっ――じゅぶっ！　ずにゅうっ――にゅぶっ！）
1921 = "(Sột soạt——sùng sục! Phụt——sùng sục!)"
# monologue
# JP: ゆっくりあげて素早く落とす。\nふかみの腰は、すでにリズムを生みはじめている。
1812 = "Nâng lên từ từ rồi hạ xuống thật nhanh.\nHông của Fukami đã bắt đầu tạo ra nhịp điệu."
# 【ふかみ】
# display as 深美
# JP: 「たくさん、たくさん、あっつい、精液――わたし、をっ\n双鉄――おにいさんの――んっ――におい、で――」
1353 = "「Thật nhiều, thật nhiều, tinh dịch, nóng hổi——nhuộm, em\nbằng mùi hương——ưm——của anh Soutetsu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが――ぁっ――このまま、で、はっ――」
1196 = "「Nhưng——a——cứ thế này, thì——」"
# monologue
# JP: （ずくりゅ――にゅぶっ！　ず、りゅっ――ぬぢゅっ！）
1913 = "(Sùng sục——phụt! Sột, soạt——nhóp nhép!)"
# monologue
# JP: 膣壁で亀頭が擦られる角度を、ふかみは微妙に変えてくる。\n一擦りごと異なる快感が背筋から脳に這い登ってくる。
1753 = "Fukami tinh tế thay đổi góc độ để quy đầu cọ xát vào thành âm đạo.\nMỗi lần cọ xát lại mang đến một khoái cảm khác nhau bò dọc từ sống lưng lên não."
# 【双鉄】
# display as 雙鐵
# JP: 「っ――っ、くっ――ほぼ、間違いなく――\n膣内で――射精、してしまうのだがっ」
1257 = "「——, hự——gần như, chắc chắn——\ntôi sẽ——bắn tinh, vào bên trong mất thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「イク――とき――んっ！　双鉄、おにい、さん、がっ\n射精、するとき――いって、くれたら――そしたっ、ら」
1496 = "「Lúc——ra——ưm! Khi anh Soutetsu\nbắn tinh——nếu anh, nói cho em biết——vậy, thì.」"
# monologue
# JP: （ずりゅっう――ごちゅっ！　ぬりゅう！　ぶちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　ここっ――ここ、しゅきっ――んっ！！」
1471 = "「Ha! Chỗ này——chỗ này, thích quá——ưm!!」"
# monologue
# JP: 角度が定まり、腰の動きがぎりぎりにまで大きくなる。\nそうして徐々に、速度が、熱が、水音とともに増していく。
1738 = "Góc độ đã được cố định, chuyển động của hông mở rộng đến mức tối đa.\nVà rồi dần dần, tốc độ, sức nóng, cùng với tiếng nước nhóp nhép tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　くっ！！」
1259 = "「! Hự!!」"
# monologue
# JP: 余裕がない。腰振りに夢中になるふかみは可愛らしいが、\nこのままいれば、膣内射精を免れ得ない。
1666 = "Không còn dư dả nữa. Fukami say sưa lắc hông trông rất đáng yêu,\nnhưng nếu cứ tiếp tục thế này, việc xuất tinh trong là không thể tránh khỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が――射精を――イキそうになるのを――\n伝えた、ら――どう、なるのだっ――っ！」
1374 = "「Nếu tôi——báo cho em biết——lúc tôi sắp ra——\nthì——sẽ thế nào——!」"
# 【ふかみ】
# display as 深美
# JP: 「ふぇっ？　あ――あ！　そしたら、大丈夫。わたし、\nおちんちん、抜き、ます、から――射精、びゅうびゅう」
1254 = "「Hả? A——a! Lúc đó, không sao đâu. Em sẽ,\nrút, dương vật, ra——rồi anh bắn tinh, tung tóe.」"
# monologue
# JP: （きゅうううっ！！　きゅっ！）
1949 = "(Kyuuu!! Kyu!)"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1258 = "「唔！」" 
# monologue
# JP: きゅうんと締まる。ぞわぞわざわめく。\n僕の射精のイメージが、ふかみの膣に伝わったらしい。
1629 = "Thắt chặt lại. Run rẩy râm ran.\nCó vẻ như hình ảnh tôi bắn tinh đã truyền đến âm đạo của Fukami."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　そうてつ、おにいさんの、おちん、ちんっ\n――んっ！　おまんこ――おまんこ――いっぱい、で」
1472 = "「Ha! Dương, vật, của anh Soutetsu\n——ưm! Âm đạo——âm đạo——đã lấp đầy, rồi.」"
# monologue
# JP: （ぎちゅっ！　じゅこっ！　きぢゅうっ！　ずびゅっ！）
# 1924 = "（咕啾！咕啾！）" 
# monologue
# JP: 膣があまりにキチキチすぎてぶわりと汗が吹き出してくる。\n密着感は凄まじいのに、計画はあまりにガバガバだ。
1713 = "Âm đạo quá khít khiến mồ hôi túa ra đầm đìa.\nCảm giác dính chặt thì kinh khủng, nhưng kế hoạch thì lại quá lỏng lẻo."
# 【双鉄】
# display as 雙鐵
# JP: 「抜ける、のか？　本当に――僕が、射精、を――\nその、タイミングを――ふかみに――伝え、たのならば」
1455 = "「Có rút ra được, không? Thật sự——nếu tôi——\nbáo cho Fukami——thời điểm——tôi, bắn tinh.」"
# 【ふかみ】
# display as 深美
# JP: 「大丈夫、ダイジョブ、です――ん！　だって、わたし\n浴びたい、からっ――双鉄、おにいさんの、匂い、精液」
1428 = "「Không sao, không sao đâu, ạ——ưm! Bởi vì, em\nmuốn được tắm, trong——mùi hương, tinh dịch, của anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1341 = "「Hiểu rồi.」"
# monologue
# JP: （ずんっっ！！）
1964 = "(Phập!!)"
# 【ふかみ】
# display as 深美
# JP: 「ひうっ！！！！！」
1280 = "「Hí!!!!!」"
# monologue
# JP: 踊るふかみの腰にあわせて、思い切り腰を突き上げる。
1701 = "Bắt nhịp với cái hông đang nhảy múa của Fukami, tôi đẩy mạnh hông lên."
# monologue
# JP: （じゅぶっ！　ごちゅっ！　じゅぶっ！　ばちゅっ！！）
1912 = "(Sùng sục! Cụp! Sùng sục! Bạch!!)"
# monologue
# JP: 愛液がぷしゃりと弾け出る。\n温度の高い汗が、唾液が、僕の体にぼたぼた落ちる。
1650 = "Ái dịch bắn tung tóe.\nNhững giọt mồ hôi nóng hổi, nước bọt, rơi lã chã xuống người tôi."
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　急にっ！　急にっ、そんなっ！　そんなっ、\nんっ、くっ！　あっ！　強いのっ！　強いのぉ！！」
1469 = "「Ha! Đột nhiên! Đột nhiên, như vậy! Như vậy,\nưm, hự! A! Mạnh quá! Mạnh quá đi!!」"
# monologue
# JP: 喘ぎ乱れて、それでもふかみの腰の動きは止まらない。\n呼吸があってるそれだけで、快感はさらに膨れてく。
1766 = "Dù thở dốc hỗn loạn, nhưng chuyển động hông của Fukami vẫn không dừng lại.\nChỉ cần nhịp thở đồng điệu, khoái cảm lại càng bành trướng thêm."
# monologue
# JP: （ずりゅんっ！　ぎちゅっ！　じゅぶっ！　ぱちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　あっ！　おくっ！　奥っ！　すごいっ！\nあたってっ！　つよくっ！　えぐって――んううっ！！」
1285 = "「Hyau! A! Sâu! Sâu quá! Tuyệt quá!\nChạm rồi! Mạnh lên! Khoét sâu vào——ưm!!」"
# monologue
# JP: （ずびゅっ！　ぶちゅっ！！　じにゅっ！　ごちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# monologue
# JP: 子宮口を破るのではないかと怖くなるほど、\n亀頭がぐちゅんと一番奥で分厚い肉とぶつかり潰れる。
1846 = "Đến mức tôi sợ sẽ làm rách cổ tử cung,\nquy đầu đâm sầm vào lớp thịt dày ở tận cùng bên trong."
# 【ふかみ】
# display as 深美
# JP: 「あっ！　んっ！　きゅっ！！　あっ！　あっ！ふあっ！\nあっ！　だめっ！　わたしっ！　これ、らめぇっ！！」
1283 = "「A! Ưm! Kyu!! A! A! Ha!\nA! Không được! Em! Thế này, không được đâu!!」"
# monologue
# JP: ふかみの膣がぎちぎちと勃起全部を絞りにきてる。\nか細い指も、めいっぱいの力で僕の体をしっかり掴む。
1772 = "Âm đạo của Fukami siết chặt lấy toàn bộ sự cương cứng.\nNhững ngón tay gầy guộc cũng dùng hết sức bám chặt lấy cơ thể tôi."
# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずぢゅっ！　ばちゅっ！）
1926 = "(Sùng sục! Cụp! Sột soạt! Bạch!)"
# 【ふかみ】
# display as 深美
# JP: 「あっ！　あっ！　あっ！　あっ！　おまんこっ！\nあっ――わた、しっ！　わたしっ、おまんこっ！」
1276 = "「A! A! A! A! Âm đạo!\nA——em! Em, âm đạo!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――僕も――限界、だっ！！！」
1433 = "「Fukami——tôi cũng——đến giới hạn, rồi!!!」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　です！　わたしも！　あっ！　んっ！！\nだからっ！　だからっ！　あっ！　おにい――さんっ！」
1347 = "「Vâng! Ạ! Em cũng vậy! A! Ưm!!\nVì vậy! Vì vậy! A! Anh——Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1260 = "「!!!!」"
# monologue
# JP: 引き抜き全身にぶっかける。そうするために呼吸をずらし、\nふかみが上昇するタイミングで――っ！！！？
1682 = "Rút ra và bắn lên toàn thân. Để làm điều đó, tôi lệch nhịp thở,\nvà đúng lúc Fukami nâng người lên——!!!?"
# monologue
# JP: （ぎゅうううううううううううううううっっっっ！！）
1948 = "(Siếtttttt!!)"
# monologue
# JP: 捕まえられる。締め付けられる。絞られる。\n勃起が膣に、腿が手指に、胴もがっしり太ももにっ――！
1692 = "Bị bắt lấy. Bị siết chặt. Bị vắt kiệt.\nSự cương cứng trong âm đạo, đùi bị những ngón tay bấu chặt, thân mình cũng bị kẹp chặt bởi hai đùi——!"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！？」
1226 = "「Kua!!?」"
# monologue
# JP: （びゅっ！　ぶゆるっ！　ぶびゅっ！　どびゅうっ！！）
1932 = "(Phụt! Phụt! Phụt! Phụt!!)"
# 【ふかみ】
# display as 深美
# JP: 「んっ！　ゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅんんっ！」
1310 = "「Ưm! Yuuuuuuuuuuuuuun!」"
# monologue
# JP: （ぎちゅちゅっ！　きゅうっ！　きゅうんっ！！）
1967 = "(Gichuchu! Kyu! Kyuun!!)"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 1288 = "「啊！」" 
# monologue
# JP: ガチガチに締め付けられた膣内で、貼り付いてくる膣壁が、\n蠕動をして僕の勃起をぎゅうぎゅう幾度も乳搾りする。
1817 = "Trong âm đạo bị siết chặt cứng, thành âm đạo bám dính lấy,\nnhu động và vắt kiệt sự cương cứng của tôi hết lần này đến lần khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ！　あっ！　あっ！　あっ！」
1464 = "「Ha! A! A! A!」"
# monologue
# JP: （びゅうっ！　びゅるっ！　びゅぶっ！　ぶびゅるっ！）
1930 = "(Phụt! Phụt! Phụt! Phụt!)"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――しゅごい！　たくさん――精液っ――んっ、\nあつい、の――びゅうびゅうっ、おなか――たたい、て」
1233 = "「Ha——tuyệt quá! Thật nhiều——tinh dịch——ưm,\nnóng hổi——phụt phụt, đánh, vào bụng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふ――か……みっ」
1430 = "「Fu——ka…… mi.」"
# monologue
# JP: （びゅるっ――びゅう――ぴゅっ…………ぴるっ）
1927 = "(Phụt——phụt——phụt………… phụt)"
# 【ふかみ】
# display as 深美
# JP: 「は――あっ――んっ――（ごくっ）――\nはぁっ――はぁっ――はぁっ――はぁっ――」
1462 = "「Ha——a——ưm——(Ực)——\nHa——ha——ha——ha——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅ……あ――」
1255 = "「Ư…… a——」"
# monologue
# JP: 射精し尽くした勃起をなおも、\nふかみの膣はゆるゆるごきゅごきゅ絞り続ける。
1665 = "Dù đã bắn cạn kiệt tinh dịch,\nâm đạo của Fukami vẫn tiếp tục từ từ vắt kiệt sự cương cứng của tôi."
# 【ふかみ】
# display as 深美
# JP: 「……しゅご――んっ――すごい、です――はぁっ――\nそうてつ、おにいさん――こんなに、たくさん――精液」
969 = "「……Tuyệt——ưm——tuyệt quá, ạ——ha——\nanh Soutetsu——thật nhiều——tinh dịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その、精液、だが……」
1485 = "「Về, tinh dịch đó, thì……」"
# monologue
# JP: 射精が収まり呼吸が落ち着き、\nようやく、言葉を喉から出せる。
1616 = "Cơn xuất tinh lắng xuống, nhịp thở ổn định lại,\ncuối cùng tôi cũng có thể cất lời."
# 【双鉄】
# display as 雙鐵
# JP: 「僕がイクことを伝えたら、腰を外すと――\n全身にかけてほしいと――さきほど、ふかみは」
1200 = "「Lúc nãy, Fukami bảo——nếu tôi báo sắp ra, em sẽ nhấc hông lên——\nđể tôi bắn lên toàn thân cơ mà.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！？　やだ、わたしっ！？\nついつい夢中になっちゃってっ」
1290 = "「A!? Chết rồi, em!?\nLỡ say sưa quá mất rồi.」"
# monologue
# JP: （にちょおっ！）
1925 = "(Nhóp nhép!)"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1288 = "「啊！」" 
# monologue
# JP: ふかみは指を三本まとめてスプーンにして、\n接合部から溢れ出してる精液をねろりと掬い――
1750 = "Fukami chụm ba ngón tay lại thành hình chiếc thìa,\nvà hớt lấy dòng tinh dịch đang tràn ra từ chỗ kết nối——"
# 【ふかみ】
# display as 深美
# JP: 「（くん、くんっ――くんくんっ）――あ……だめ。\n精液、わたしのと混じっちゃってて――匂い、薄い」
1499 = "「(Khịt, khịt——khịt khịt)——A…… không được rồi.\nTinh dịch, bị trộn lẫn với của em rồi——mùi, nhạt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばっ！！！」
1495 = "「Nếu vậy thì!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　双鉄おにいさんっ！！？」
1294 = "「Hyau!? Anh Soutetsu!!?」"
# monologue
# JP: ふかみを立たせて僕へと背中を向けさせる。
1696 = "Bắt Fukami đứng dậy và quay lưng về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「手袋があれば擦れることもないか。\nふかみ、両手を壁につくんだ」
1402 = "「Nếu có găng tay thì sẽ không bị cọ xát nhỉ.\nFukami, chống hai tay lên tường đi.」"
# 【ふかみ】
# display as 深美
# JP: 「は、はいです。――です」
1340 = "「V-vâng ạ. ——Ạ.」"
# monologue
# JP: ふかみが壁に両手をつけば、\n精液をまだとろとろ零すおまんこが、僕の勃起の前に来る。
1785 = "Khi Fukami chống hai tay lên tường,\ncái âm đạo vẫn đang rỉ tinh dịch sền sệt hiện ra trước sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「亀頭のくびれ――カリ首は、前にだされた精液を\n掻き出すための形状だ、などと何かの書物で目にしたが」
1393 = "「Chỗ thắt lại của quy đầu——phần đầu khấc, có hình dạng\nđể vét tinh dịch đã bắn ra trước đó, tôi từng đọc được ở cuốn sách nào đó thì phải.」"
# monologue
# JP: （ずりっ――すりっ――すりっ――すりゅんっ）
1960 = "(Sột soạt——sột soạt——sột soạt——trơn tuột)"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ……あ……う……そう、なんです、か？」
1461 = "「Ha…… a…… ư…… vậy, sao, ạ?」"
# monologue
# JP: 勃起でおまんこを長く撫ぜれば、\nふかみはもじもじ、焦れったそうに尻を振る。
1688 = "Dùng sự cương cứng vuốt ve dọc theo âm đạo,\nFukami vặn vẹo, lắc lư mông một cách sốt ruột."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、今挿入して腰を使って掻き出したとしても――\nその精液の匂いでは、ふかみは不満なのだろう？」
1198 = "「Nhưng, cho dù bây giờ có cắm vào và dùng hông để vét ra——\nthì với mùi tinh dịch đó, Fukami cũng không thỏa mãn đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「だってもうわたしの――わたしのいろんな――その……\nいろんなおつゆとかと、ガッツリ混じっちゃってますし」
1324 = "「Bởi vì nó đã trộn lẫn với của em——nhiều thứ của em——dạ……\ntrộn lẫn hoàn toàn với nhiều loại nước rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まあな」
1421 = "「Cũng phải.」"
# monologue
# JP: （すりゅっ――じゅりゅっ――くりゅっ――ちゅりゅっ）
1914 = "(Sột soạt——sùng sục——cụp——chụt)"
# monologue
# JP: リアルタイムでとろとろと、\nふかみの愛液は僕の勃起をも濡らしまくってる。
1770 = "Ái dịch của Fukami đang liên tục rỉ ra,\nlàm ướt sũng cả sự cương cứng của tôi."
# 【ふかみ】
# display as 深美
# JP: 「だから、その――やっぱり、ええと――射精――体とか、お顔とかに直接かけてもらうのが、匂い的には、一番」
1404 = "「Vì vậy, dạ——quả nhiên, ừm——bắn tinh——bắn trực tiếp lên người, hay lên mặt, về mặt mùi hương, là tuyệt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。\n最初にそう聞いていたので、僕も応えようとしたのだが」
1420 = "「Đúng vậy nhỉ.\nLúc đầu nghe em nói thế, tôi cũng đã định đáp ứng rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「あうっ」
1278 = "「Au.」"
# monologue
# JP: 申し訳無さそうな声と同じに、おまんこまでも恐縮する。\nひっついたまま縮む動きが、かえって勃起を熱くする。
1732 = "Cùng với giọng nói đầy vẻ hối lỗi, ngay cả âm đạo cũng co rúm lại.\nChuyển động co bóp trong khi vẫn đang dính chặt, lại càng làm sự cương cứng nóng thêm."
# monologue
# JP: （ずりっ――ぺりゅっ――ずりゅっ――ペチュッ――）
1911 = "(Sột soạt——phụt——sột soạt——bạch——)"
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――ふ、あっ――双鉄――おにいさん――\nんっ――これ――わたし――焦れっ、たくって――あ！」
1458 = "「Ha——a——fu, a——anh——Soutetsu——\nưm——thế này——em——sốt ruột, lắm——a!」"
# monologue
# JP: このまま擦って射精するのも悪くはないのだが、この声だ。\n挿入せずに達することは、別の不満を招きかねない、ゆえ
1843 = "Cứ thế này cọ xát rồi bắn tinh cũng không tệ, nhưng nghe giọng nói này.\nNếu ra mà không cắm vào, có thể sẽ chuốc lấy sự bất mãn khác, do đó."
# monologue
# JP: （ぐっ――じゅにゅっ！　――ずっ――）
1916 = "(Hự——phụt! ——Sột soạt——)"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ふぁっ――来た！　先っぽ――っ――亀頭――\nさっき、よりも――もっと――太く、なってる、みたい」
1268 = "「A——ha——vào rồi! Phần đầu——quy đầu——\nhình như, còn——to hơn——lúc nãy, nữa.」"
# monologue
# JP: というか、ふかみがいっそう狭い。\n精液を更に欲しがって、きゅんきゅんぐいぐい締めてくる。
1655 = "Nói đúng hơn là, Fukami càng khít hơn.\nKhao khát tinh dịch hơn nữa, em ấy siết chặt lấy tôi, kyuun kyuun."
# 【双鉄】
# display as 雙鐵
# JP: 「こうしてセックスすればもう、膣も子宮もふかみ自身も、\n夢中になって、自分の欲さえ見失ってしまうようだから」
1487 = "「Làm tình thế này thì cả âm đạo, tử cung lẫn bản thân Fukami,\nđều sẽ say sưa đến mức quên luôn cả mong muốn của mình mất.」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい――それは――そのとおり――\nあ！　だから、なんですか？　この格好」
1417 = "「V-vâng——chuyện đó——đúng là vậy——\nA! Vì vậy, nên mới có tư thế này, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ」
1447 = "「Đoán hay lắm.」"
# monologue
# JP: （ずっ――ぶっ――ぞりゅっ）
# 1914 = "（咕啾、咕啾）" 
# monologue
# JP: ご褒美がわりに腰を進めて、\n途中で止めて小刻みに振って動かしてみる。
1677 = "Đẩy hông vào thay cho phần thưởng,\ndừng lại giữa chừng rồi thử rung lắc nhẹ."
# 【ふかみ】
# display as 深美
# JP: 「あっ！　そこっ――そこ、ぐりって、されるの――\n好き――んっ――きもち――いいっ――」
1292 = "「A! Chỗ đó——chỗ đó, bị ngoáy vào——\nthích quá——ưm——sướng——quá——」"
# monologue
# JP: （ぞりゅっ――ぐりゅっ――ぞぶっ――ぐにゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# monologue
