# 1930 = "（咻咻、咻咻！）" 
# monologue
# JP: 満足の他に開放の手段はない。故に亀頭をあえて押し込み、\n子宮口へとただただぐりぐり亀頭先端を貼り付け動かし
1797 = "Không có cách nào khác để giải thoát ngoài việc thỏa mãn em ấy. Do đó tôi cố tình đẩy quy đầu vào,\nvà chỉ ngoáy đầu quy đầu dính sát vào cổ tử cung."
# 【ふかみ】
# display as 深美
# JP: 「は……ぁっ――ふぁぅ……んっ――えへへっ――\nそうてつおにいさん――わたしの、双鉄おにいさぁん」
1460 = "「Ha…… a——hau…… ưm——ehehe——\nanh Soutetsu——của em, anh Soutetsu của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1308 = "「嗯」" 
# monologue
# JP: （ぴゅ……ぴゅるっ……ぷ……ぴ………………）
1928 = "(Phụt…… phụt…… phụt…… phụt………………)"
# monologue
# JP: 精液全部が出尽くして。ようやくふかみの膣が緩む。\n甘えた声は明確に、どろどろのキスをせがんでる。
1811 = "Toàn bộ tinh dịch đã được vắt kiệt. Cuối cùng âm đạo của Fukami cũng nới lỏng.\nGiọng nói nũng nịu rõ ràng đang đòi hỏi một nụ hôn ướt át."
# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。あれほど偉そうなことを言っておきながら、\n僕もセックス――ふかみに夢中になってしまって」
975 = "「……Xin lỗi. Vừa nãy còn nói những lời ra vẻ ta đây,\nthế mà tôi cũng mải mê làm tình——say đắm Fukami mất rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「ふぇ？――あ！　そんなの、全然謝ることじゃないです。\nだって――ねぇ？　双鉄おにいさん」
1252 = "「Hả? ——A! Chuyện đó, hoàn toàn không có gì phải xin lỗi đâu ạ.\nBởi vì——đúng không? Anh Soutetsu.」"
# monologue
# JP: （きゅっ）
1950 = "(Kyu!)"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1295 = "「啊！！」" 
# monologue
# JP: ふかみは恐らく自分の意思で、膣を甘やかに狭めてみせた。\nぐったりと項垂れる僕の亀頭を、いいこいいこし励ました。
1763 = "Fukami có lẽ đã tự chủ động thu hẹp âm đạo lại một cách ngọt ngào.\nVuốt ve an ủi quy đầu đang ủ rũ rũ rượi của tôi."
# 【ふかみ】
# display as 深美
# JP: 「次の射精で、たくさんかけて――精液の匂いたくさん、\nわたしに嗅がせてくれるので、それで最高に幸せですし」
1183 = "「Lần bắn tinh tiếp theo, hãy bắn thật nhiều——cho em ngửi thật nhiều mùi tinh dịch,\nvới em như vậy là hạnh phúc nhất rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1390 = "「Đã rõ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、けど――その前に」
1299 = "「A, nhưng mà——trước đó.」"
# monologue
# JP: ふかみがはにかみ振り返る。\n兎の耳が、ひょこん、と僕に会釈する。
1747 = "Fukami bẽn lẽn ngoái lại nhìn.\nĐôi tai thỏ khẽ vểnh lên, như đang chào tôi."
# 【ふかみ】
# display as 深美
# JP: 「キス――ね？　わたし、たくさんたくさん、\n甘いのたくさん――してほしい。です――です」
1473 = "「Hôn——nhé? Em, muốn anh hôn thật nhiều thật nhiều,\nthật ngọt ngào. Ạ——ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「奇遇だな。僕もふかみとキスしたかった」
1445 = "「Trùng hợp thật. Tôi cũng muốn hôn Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1308 = "「嗯」" 
# monologue
# JP: 深く。唇と舌を重ねて――そうして僕らは今度こそ、\n三度目の正直を叶えるために、動き始める。
1662 = "Thật sâu. Môi và lưỡi quấn lấy nhau——và rồi lần này,\nchúng tôi bắt đầu chuyển động để thực hiện lần thứ ba thành công."
