# 1933 = "（啪、啪、啪、啪！）" 
# monologue
# JP: 加速する。体の力の全部を勃起と腰と手指に集中させる。\nふかみのぬかるむ膣内を、速度でぐちゃぐちゃにかき乱す。
1699 = "Thử bóp mạnh núm vú một chút, âm đạo của Fukami liền run lên bần bật.\nQuy đầu bị kéo theo, hông tôi tự động đẩy tới."
# monologue
# JP: （ば！　ぢゅ！　ご！　ぶ！　ご！　ご！　ご！　ご！）
# 1933 = "（啪、啪、啪、啪！）" 
# 【ふかみ】
