1468 = "（Trượtttt――phập――ngoáy）"
# monologue
# JP: （きゅううううううっっっ！！）
1966 = "「Khu hyun!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くううっっ！！」
# 1259 = "「唔！！」" 
# monologue
# JP: （ずゆぶうううううううううううううっっっっ！！）
1954 = "Giọng nói ngọt ngào. Nhu động ngọt ngào. Màng nhĩ và dương vật bị rung chuyển,\nmột sự thôi thúc lẫn với khoái cảm rần rần truyền từ sống lưng lên não."
# monologue
# JP: 思いっきりに腰を引き、腕の力でふかみの腰を固定する。
1684 = "「Fukami! Fukami! Fukami! Fukami!」"
