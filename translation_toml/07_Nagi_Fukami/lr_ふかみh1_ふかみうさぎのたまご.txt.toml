[script]
# lines: 317 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？……むっ――」
1316 = "「Hử?......Ưm――」"
# monologue
# JP: ……体が重い。\nいや、違う――体に、なにかが乗っている。
1841 = "......Cơ thể nặng trĩu.\nKhông, không phải――có cái gì đó đang đè lên người tôi."
# 【ふかみ】
# display as 深美
# JP: 「ん、しょ――えと――」
1317 = "「Ây, da――ờm――」"
# monologue
# JP: 聞き慣れた声。ふかみの声。\nここは？　……ああ、いや、僕はうたた寝を――っ！？
1651 = "Giọng nói quen thuộc. Giọng của Fukami.\nĐây là đâu? ......A, không, tôi đang ngủ gật――!?"
# 【ふかみ】
# display as 深美
# JP: 「ん……っと、あとは――\nあとは――ぱ、ぱ、ぱ、パンツ、だけ――（ごくっ）」
1319 = "「Ưm......rồi, tiếp theo là――\ntiếp theo là――quần, quần, quần, lót, thôi――（Ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにが――パンツだけなのだ」
1193 = "「Cái gì――chỉ còn quần lót cơ」"
# 【ふかみ】
# display as 深美
# JP: 「ひえっ！！？」
1234 = "「Hí!!?」"
# monologue
# JP: ふかみがじたばた動き出すゆえ、\n腿を掴んでひとまず抑える。
1757 = "Thấy Fukami bắt đầu giãy giụa,\ntôi nắm lấy đùi cô ấy để giữ lại."
# 【双鉄】
# display as 雙鐵
# JP: 「慌てずともいい。逃げずともいい。\n僕には、ふかみを責めようなどという気持ちは一切ない」
1187 = "「Không cần hoảng hốt. Không cần bỏ chạy.\nAnh hoàn toàn không có ý định trách móc Fukami đâu」"
# 【ふかみ】
# display as 深美
# JP: 「……」
961 = "「......」"
# monologue
# JP: 掴んだ腿の固さが緩む。ふかみは明らかにホッとしている。\nということはつまり――後ろめたさがあるのだろう。
1599 = "Sự căng cứng ở đùi cô ấy dịu đi. Fukami rõ ràng đã thở phào nhẹ nhõm.\nĐiều đó có nghĩa là――cô ấy đang cảm thấy tội lỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「責める以前に、僕には、\n今一つ状況がつかめていないのだ」
1325 = "「Trước khi trách móc, anh\nvẫn chưa nắm bắt được tình hình hiện tại」"
# monologue
# JP: 真闇姉が出張で、日々姫はハチロクを連れて研修で。\n一人では不便だろうと、ふかみが泊まりに来て――ん？
1804 = "Chị Mayami đi công tác, Hibiki dẫn Hachiroku đi thực tập.\nSợ tôi ở một mình bất tiện, Fukami đến ngủ lại――hử?"
# 【双鉄】
# display as 雙鐵
# JP: 「とてもかわいい格好をしているな。\n……それは――そのうさぎは、下着か？　寝間着か？」
1206 = "「Em mặc đồ dễ thương quá.\n......Cái đó――con thỏ đó, là đồ lót à? Hay đồ ngủ?」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ、あの、ランジェリーです。です。\nそのっ、ウサギ――イースターバニーがモチーフの」
1281 = "「Hau, dạ, là nội y ạ. Vâng.\nĐó, thỏ――lấy họa tiết từ Thỏ Phục Sinh ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「イースターバニー」
1361 = "「Thỏ Phục Sinh」"
# monologue
# JP: イースター、復活祭というヤツか。\n復活祭の兎といえば――っ！
1835 = "Easter, là Lễ Phục Sinh sao.\nNhắc đến thỏ Phục Sinh thì――!"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、詳しくは知らんのだが――どんなものなのだ？\nその、イースターバニーとやらは」
1376 = "「Anh không rành lắm――nhưng nó là cái gì vậy?\nCái gọi là Thỏ Phục Sinh ấy」"
# monologue
# JP: 詳しく知らんが、ぼんやりした知識ならある。\nゆえに尋ねる、確かめる。ふかみの口から聞きたくて。
1844 = "Không rành chi tiết, nhưng tôi cũng biết mang máng.\nVì vậy tôi mới hỏi, để xác nhận. Tôi muốn nghe từ chính miệng Fukami."
# 【ふかみ】
# display as 深美
# JP: 「えとっ！？　あの、その、イースターバニーは、\nうさぎさん、です。復活祭の日の兎さん……で――」
1231 = "「Dạ!? Dạ, ừm, Thỏ Phục Sinh là,\nbé thỏ ạ. Bé thỏ trong ngày Lễ Phục Sinh......là――」"
# monologue
# JP: ふかみの肌の赤みが増す。\n腰がもぞもぞ蠢いて、呼吸も荒くなりはじめる。
1774 = "Da Fukami càng thêm ửng đỏ.\nHông cô ấy cựa quậy, nhịp thở cũng bắt đầu gấp gáp hơn."
# 【ふかみ】
# display as 深美
# JP: 「復活祭の日に……ンッ――イースター、エッグ……\n卵を、えと――良い子に、届けてくれるんです」
1363 = "「Vào ngày Lễ Phục Sinh......ưm――Easter, Egg......\nSẽ mang, dạ――trứng đến, cho những đứa trẻ ngoan ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「卵を、か」
1456 = "「Trứng sao」"
# monologue
# JP: 僕の記憶に間違いはなかったようだ。兎は、多産。\nゆえに象徴するものは、安産――そうして、好色だ。
1798 = "Có vẻ trí nhớ của tôi không sai. Thỏ sinh sản rất nhiều.\nVì vậy nó tượng trưng cho sự sinh đẻ thuận lợi――và cả sự dâm đãng."
# 【双鉄】
# display as 雙鐵
# JP: 「どうも卵が見当たらんようだが……\n届けてもらえぬ程、僕は、悪い子だったということかな」
1220 = "「Nhưng hình như anh không thấy trứng đâu cả......\nKhông được tặng, nghĩa là anh là một đứa trẻ hư sao」"
# 【ふかみ】
# display as 深美
# JP: 「違います！　あります！　たまご。ふかみうさぎの――\nえと……双鉄おにいさん専用の……たまご――んっ」
1185 = "「Không phải ạ! Có ạ! Trứng. Của thỏ Fukami――\nDạ......trứng......dành riêng cho anh Soutetsu――ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1288 = "「!」"
# monologue
# JP: ふかみがわずかに腰を浮かして、\n可愛らしいパンツをするする脱ぎ捨てていく――っ！？
1780 = "Fukami hơi nhấc hông lên,\nnhanh chóng cởi bỏ chiếc quần lót dễ thương――!?"
# 【ふかみ】
# display as 深美
# JP: 「んしょっ――んっ――よい、しょっ」
1318 = "「Ây da――ưm――ây, da」"
# monologue
# JP: それが当然であるかのように、僕のパンツもずり下げる。\n異論はまったく無いゆえに、僕も協力し腰を浮かせる。
1597 = "Như một lẽ đương nhiên, cô ấy cũng lột luôn quần lót của tôi.\nHoàn toàn không có ý kiến phản đối, tôi cũng hợp tác nhấc hông lên."
# 【ふかみ】
# display as 深美
# JP: 「たまご……ここ、です」
1362 = "「Trứng......ở đây, ạ」"
# monologue
# JP: （くちっ）
1944 = "（Nhóp nhép）"
# monologue
# JP: ふかみは股間を見せつけながら、僕の勃起を押しつぶす。\nにちゃりと湿った音が立ち、ふかみの熱が伝わってくる。
1761 = "Fukami vừa phô bày háng mình, vừa ép chặt lấy dương vật đang cương cứng của tôi.\nMột âm thanh ướt át vang lên, hơi nóng của Fukami truyền sang."
# 【ふかみ】
# display as 深美
# JP: 「わたしのたまご……\n双鉄おにいさんのものにしてほしくて、それで、わたし」
1385 = "「Trứng của em......\nEm muốn nó trở thành của anh Soutetsu, nên, em」"
# 【双鉄】
# display as 雙鐵
# JP: 「うたた寝をしている僕にのしかかり――\n服を脱がせていったのか？」
1406 = "「Nên em đè lên người anh khi anh đang ngủ gật――\nvà cởi quần áo anh ra sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あのっ！　その、\n最初はそんなつもりじゃなかったんです！」
1493 = "「Dạ! Ừm,\nBan đầu em không định làm thế đâu ạ!」"
# monologue
# JP: 慌てたふかみが体を揺らす。性器同士がこすれあい、\n甘く濁った快感が、睾丸の中に集まっていく。
1755 = "Fukami luống cuống lắc lư cơ thể. Hai cơ quan sinh dục cọ xát vào nhau,\nmột khoái cảm ngọt ngào đục ngầu tụ lại trong tinh hoàn tôi."
# 【ふかみ】
# display as 深美
# JP: 「わたし、あの、普通に双鉄おにいさんのこと……\n誘惑、したいなって思って……このランジェリー着て」
1371 = "「Em, dạ, bình thường em chỉ muốn......\nquyến rũ anh Soutetsu......nên mới mặc bộ nội y này」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の部屋に入ったら、僕がうたたねをしていた？」
1452 = "「Vào phòng anh thì thấy anh đang ngủ gật sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。それでわたし拍子抜けして、がっかりして。\n双鉄おにいさんに毛布、かけてあげようと思って――ん」
1423 = "「Vâng vâng. Lúc đó em hụt hẫng, thất vọng lắm.\nĐịnh đắp chăn cho anh Soutetsu――ưm」"
# monologue
# JP: 無意識にだろうか、それともこれが“誘惑”なのか――\nふかみの腰がゆるゆると、小さく、遅く前後している。
1778 = "Không biết là vô thức, hay đây chính là \"quyến rũ\"――\nHông Fukami đang di chuyển trước sau một cách chậm rãi, nhẹ nhàng."
# 【ふかみ】
# display as 深美
# JP: 「そしたら、匂い――双鉄おにいさんの匂い、して……\nもっと……っ――濃い、の、わたし――かぎたくなって」
1438 = "「Sau đó, mùi hương――mùi hương của anh Soutetsu, tỏa ra......\nEm muốn――ngửi thấy mùi, đậm hơn, nữa......」"
# monologue
# JP: （にちゅっ――ちゅむっ――ちゅっ――くちゅっ――）
1910 = "（Nhóp nhép――chụt――chụt――nhóp nhép――）"
# monologue
# JP: こすれあってる部分から、ふかみの蜜が腹にこぼれる。\n甘ったるいふかみの匂いが、僕と部屋とを染めていく。
1784 = "Từ chỗ cọ xát, mật ngọt của Fukami tràn xuống bụng tôi.\nMùi hương ngọt lịm của Fukami nhuộm kín cả tôi và căn phòng."
# 【ふかみ】
# display as 深美
# JP: 「ちょっとだけって思って、胸元のボタン外したら……\nんっ――なんか――止まらなくなっちゃって――ふ、あ」
1379 = "「Em chỉ định ngửi một chút thôi, nên cởi cúc áo ngực ra......\nƯm――không hiểu sao――em không dừng lại được nữa――phu, a」"
# monologue
# JP: ふかみの腰も止まらない。動きが明確に大きくなってる。\nかわいいブラのおっぱいも、控えめにだが揺れ動いてる。
1777 = "Hông Fukami cũng không dừng lại. Chuyển động rõ ràng đã lớn hơn.\nBầu ngực trong chiếc áo lót dễ thương cũng đang rung rinh nhè nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「こうして下から見上げると……\n控えめではあるものの、たしかにおっぱいと感じるな」
1358 = "「Nhìn từ dưới lên thế này......\nTuy khiêm tốn, nhưng đúng là cảm nhận được đó là vú đấy」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1288 = "「啊！」" 
# monologue
# JP: とても嬉しげな声を出し、ふかみがよいしょ、と\nブラを外して、未成熟な胸を晒してくれる。
1775 = "「A!」"
# 【ふかみ】
# display as 深美
# JP: 「えへへ、どう、です？　わたしの、おっぱい」
1322 = "Phát ra một tiếng kêu đầy sung sướng, Fukami \"ây da\" một tiếng\nrồi cởi áo lót, phơi bày bầu ngực chưa trưởng thành của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「とても綺麗で、愛らしい。この体勢でないのなら、\n今すぐにでもむしゃぶりつきたい」
1356 = "「Ehehe, thế nào, ạ? Vú, của em」"
# 【ふかみ】
# display as 深美
# JP: 「たぶん、きっとそんな感じで――\nわたしも、たまらなくなっちゃったんです。です」
1337 = "「Rất đẹp, và đáng yêu. Nếu không phải đang ở tư thế này,\nanh muốn lao vào ngấu nghiến ngay lập tức đấy」"
# monologue
# JP: 未成熟だがたしかな丸みのおっぱいの、\nその先端はピンと勃起し、ふかみの興奮を伝えてくれる。
1579 = "「Chắc là, chắc chắn là cảm giác đó――\nEm cũng, không chịu nổi nữa rồi. Vâng」"
# 【ふかみ】
# display as 深美
# JP: 「もっと――濃い、一番強い、双鉄おにいさんの、匂い\n――んっ――わたし、どうしても、嗅ぎたくなって――」
1397 = "Bầu ngực tuy chưa trưởng thành nhưng vẫn có độ tròn trịa nhất định,\nphần đỉnh đã cương cứng, truyền tải sự hưng phấn của Fukami."
# monologue
# JP: （ゆさっ――くっっ――くにゅっ――くちっ）
1959 = "「Mùi hương――đậm hơn, mạnh nhất, của anh Soutetsu\n――ưm――dù thế nào, em cũng muốn ngửi――」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！　――ぁ――自分、では――\n自分の――匂いの、ことは――わからぬ、もの、だが」
1312 = "（Lắc――hự――nắn――nhóp nhép）"
# monologue
# JP: 腰の動きに角度がつく。ふかみは自分のクリトリスを、\n僕のカリ首に当てて引き――僕の勃起でオナニーしている。
1751 = "「Ưm! ――A――Bản thân, anh――\nkhông thể, biết được――mùi hương, của mình, đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――くっ――あ――。\n……一番、濃い、僕の匂いは――いったい、どんな」
1307 = "Chuyển động hông thay đổi góc độ. Fukami áp âm vật của mình\nvào khấc quy đầu của tôi rồi cọ xát――cô ấy đang thủ dâm bằng sự cương cứng của tôi."
# 【ふかみ】
# display as 深美
# JP: 「精液、です――びゅうびゅうって、おちんちんから\n飛び出してきたばっかりの――あっつい精液の、匂い」
1425 = "「Ưm――hự――a――.\n......Mùi hương, đậm nhất, của anh――rốt cuộc, là như thế nào」"
# monologue
# JP: （くっ――ぐくっ――くりゅっ――じゅむっ――）
# 1910 = "（咕啾……咕啾……）" 
# monologue
# JP: 僕の言葉を途中で切って。べっとり濡れた唇から、\n熱に浮かされているような言葉をふかみはこぼし続ける。
1759 = "「Là tinh dịch, ạ――mùi tinh dịch nóng hổi――vừa mới\nbắn ra vùn vụt từ dương vật――」"
# 【ふかみ】
# display as 深美
# JP: 「だから、わたし――双鉄おにいさん、のっ――んっ\n――精液、びゅうびゅう、して、ほしくなって――ぁ」
1409 = "（Hự――hự――ngoáy――chụt――）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。少し待ってほしい」
1436 = "Cắt ngang lời tôi. Từ đôi môi ướt đẫm,\nFukami liên tục thốt ra những lời nói như đang phát sốt."
# monologue
# JP: （くっ）
1952 = "「Cho nên, em――muốn anh Soutetsu――ưm\n――bắn tinh dịch, vùn vụt, ra――a」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1229 = "「Fukami. Anh muốn em đợi một chút」"
# monologue
# JP: 腿を抑えてふかみに動きを止めてもらえば、\nふかみはアイスを落としてしまったこどものような顔になる。
1672 = "（Hự）"
# 【ふかみ】
# display as 深美
# JP: 「あの、わたし――なにか、いけないこととか、\n間違ったこととか――あうっ！？」
1492 = "Tôi giữ đùi Fukami lại để cô ấy dừng chuyển động,\nFukami làm vẻ mặt như một đứa trẻ vừa làm rơi cây kem."
# monologue
# JP: 夜這いはいけない。寝込みを襲うのも間違っていよう。\n自覚したのかふかみが固まる。
1735 = "「Dạ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうしたことで、ふかみがどれ程突っ走ろうとも、\n僕は嬉しいし大歓迎だ。そこならば気にせずともよい」
1328 = "「Dạ, em――đã làm gì, không được,\nhay làm sai chuyện gì sao――au!?」"
# 【ふかみ】
# display as 深美
# JP: 「あ……よかった……。\nよかった――です」
1297 = "Lẻn vào ban đêm là không được. Đột kích lúc đang ngủ cũng là sai.\nNhận ra điều đó, Fukami cứng đờ người."
# monologue
# JP: （ぬるんっ）
1973 = "「Trong chuyện này, dù Fukami có đi xa đến đâu,\nanh cũng rất vui và hoan nghênh. Em không cần phải bận tâm về chuyện đó」"
# monologue
# JP: 止まった腰がもう動く。\n言った手前、腿を抑えている手を僕も、離す他ない。
1740 = "「A......may quá.......\nMay quá――ạ」"
# monologue
# JP: （ぬっ！　ぬるっ！　くにゅっ！　じゅぶっ！！）
1923 = "（Trơn tuột）"
# 【ふかみ】
# display as 深美
# JP: 「けど――んっ――それなら、なんで――ふ、ぁ――\n双鉄――おにいさっ――ぁ――わたし――とめ、てっ」
1223 = "Hông vừa dừng lại đã chuyển động tiếp.\nĐã nói thế rồi, tôi cũng đành phải buông tay đang giữ đùi cô ấy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「いやなに――ん……ぁ――ごく単純な疑問を――\n整理、したかった、だけ、だ――」
1486 = "（Trượt! Trơn tuột! Nắn! Phập!!）"
# 【ふかみ】
# display as 深美
# JP: 「せいり……。せいり……双鉄おにいさんが、せいり……\nん――は、ぁ――双鉄おにいさんの――せい、りっ」
1441 = "「Nhưng――ưm――nếu vậy, tại sao――phu, a――\nAnh Soutetsu――a――lại ngăn, em, lại」"
# monologue
# JP: （ぞくっ）
1971 = "「Không có gì――ưm......a――chỉ là một thắc mắc rất đơn giản――\nAnh muốn, sắp xếp lại, một chút, thôi――」"
# monologue
# JP: 快感ではない、次元のことなる何かに背筋が怖気立つ。\nふかみの妄想を止めねばならぬ。それが如何なる物であれ。
1695 = "「Sắp xếp....... Sắp xếp......Anh Soutetsu, sắp xếp......\nƯm――hà, a――sự sắp, xếp――của anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、どちらが良いのかと思ったのだ――\nふかみのたまごを――僕が、おいしくいただくことと」
1381 = "（Sởn gai ốc）"
# 【ふかみ】
# display as 深美
# JP: 「あっ！！！」
1296 = "Không phải khoái cảm, mà là một thứ gì đó ở chiều không gian khác khiến tôi ớn lạnh sống lưng.\nPhải ngăn chặn sự hoang tưởng của Fukami lại. Dù nó là bất cứ thứ gì."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1262 = "「Tóm lại, anh đang nghĩ xem cách nào thì tốt hơn――\nTrứng của Fukami――anh sẽ thưởng thức nó thật ngon lành」"
# monologue
# JP: 瞬間、ふかみが軽く震える。密着しているふかみの小さな\nおまんこが、きゅうん、と、吸い付く刺激を伝える。
1782 = "「Á!!!」"
# 【ふかみ】
# display as 深美
# JP: 「貰って、染めてほしいです――んっ――双鉄おにいさん\n専用、の――わたしの――ふかみの――おまんこたまご」
1384 = "「!?」"
# monologue
# JP: 染める――ふかみの卵を染める。僕の精子で染め付ける。\n“染色体”の３文字を、性的なものと初めて感じる。
1721 = "Khoảnh khắc đó, Fukami khẽ run lên. Âm đạo nhỏ bé của Fukami đang áp sát\ntruyền đến một sự kích thích mút chặt, \"kyuun\"."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、思いっきりに染め付けたいのはやまやまだ。\nけれど同時にもう一つ、ふかみは望んでいたではないか」
972 = "「Em muốn anh nhận lấy, và nhuộm màu cho nó――ưm――\nTrứng âm đạo――của em――của Fukami――dành riêng cho anh Soutetsu」"
# monologue
# JP: （ぐくっ！）
1961 = "Nhuộm――nhuộm trứng của Fukami. Nhuộm bằng tinh trùng của tôi.\nLần đầu tiên tôi cảm nhận được 3 chữ \"nhiễm sắc thể\" mang tính dục đến vậy."
# 【ふかみ】
# display as 深美
# JP: 「んきゅっ！！！」
1305 = "「......Anh cũng rất muốn nhuộm nó thỏa thích.\nNhưng đồng thời, Fukami cũng đang mong muốn một điều khác nữa mà」"
# monologue
# JP: 腰を浮かせて勃起をさらにふかみの割れ目に食い込ませる。\n密着している膣前庭のわななきが、更にはっきり強くなる。
1670 = "（Hự!）"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の一番強い匂いを――射精したばかりの精液の匂いを\n嗅ぎたい、とも」
1201 = "「Ưm kyu!!!」"
# 【ふかみ】
# display as 深美
# JP: 「嗅ぎたい！　嗅ぎたいです、です！　たくさんたくさん、\nたくさん！　双鉄おにいさんの――ん――精液の、匂い」
1387 = "Nhấc hông lên, tôi ép dương vật lún sâu hơn vào khe hở của Fukami.\nSự run rẩy của tiền đình âm đạo đang áp sát càng trở nên rõ ràng và mạnh mẽ hơn."
# monologue
# JP: （じゅるっ！　ぶちゅっ！　ずりゅっ！　じゅくっ！）
1942 = "「Em nói muốn ngửi mùi hương mạnh nhất của anh――\nmùi tinh dịch vừa mới bắn ra, đúng không」"
# monologue
# JP: ふかみの腰が再び大きく強くスライドしはじめる。\n更に強まる密着感が、挿入してると脳を錯覚させかける。
1742 = "「Muốn ngửi! Em muốn ngửi, ạ! Thật nhiều thật nhiều,\nthật nhiều! Mùi tinh dịch――ưm――của anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえにどちらを選ぶのか、ふかみに一度確認しようと」
1408 = "（Chụt! Bạch! Trượt! Nhóp nhép!）"
# 【ふかみ】
# display as 深美
# JP: 「両方、両方に決まってます。です！」
1370 = "Hông Fukami lại bắt đầu trượt mạnh và biên độ lớn hơn.\nCảm giác áp sát càng thêm mãnh liệt, khiến não bộ tôi ảo tưởng rằng mình đang cắm vào."
# monologue
# JP: 勢いこんでそう言って。ふっと、\nふかみは我に返りでもしたかのように、瞳を伏せる。
1765 = "「Vì vậy, anh muốn xác nhận lại xem Fukami sẽ chọn cái nào」"
# 【ふかみ】
# display as 深美
# JP: 「もちろん、双鉄おにいさんがイヤじゃなくって――\n体力的にとか、平気なら、の話ですけど――です」
1444 = "「Cả hai, chắc chắn là cả hai rồi. Ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「イヤどころか」
1443 = "Mạnh miệng nói vậy. Nhưng chợt,\nFukami cụp mắt xuống như thể vừa tỉnh mộng."
# monologue
# JP: （ぐりゅっ！！）
1958 = "「Tất nhiên, nếu anh Soutetsu không ghét――\nvà nếu thể lực của anh không sao――ạ」"
# 【ふかみ】
# display as 深美
# JP: 「んひゅんっ！！！」
1277 = "「Đâu chỉ không ghét」"
# monologue
# JP: 下から腰を突き上げて、もうぐちょぐちょのおまんこに、\n勃起をぐりぐりめり込ませる。
1669 = "（Ngoáy!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみに幾度も射精するのはむしろ望むところだし。\n体力的にも、まったく問題なかろうと思う」
1333 = "「Ưm hyun!!!」"
# monologue
# JP: 実際、いますぐにでもゆるめれば射精しそうなほどだ。
1836 = "Tôi đẩy hông từ dưới lên, ép dương vật cương cứng\nngoáy sâu vào âm đạo đã ướt sũng."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、に。ふかみに決めてほしい」
1411 = "「Được bắn tinh vào Fukami nhiều lần mới là điều anh mong muốn.\nVề mặt thể lực, anh nghĩ cũng hoàn toàn không có vấn đề gì」"
# monologue
# JP: （ぐっ！　ぐりゅっ！　ずりゅっ！　しにゅっ！）
1924 = "Thực tế, nếu bây giờ thả lỏng thì tôi có thể bắn ngay lập tức."
# 【ふかみ】
# display as 深美
# JP: 「はぁ――ぁっ――ん……わたし、きめるっ――んっ」
1459 = "「Vì vậy. Anh muốn Fukami quyết định」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。今日の射精の一発目を、一体、どこに」
1315 = "（Hự! Ngoáy! Trượt! Ép!）"
# 【ふかみ】
# display as 深美
# JP: 「お外――お外に射精して、わたしにたくさん！\n濃くて、熱くて、臭う精液、かけてください」
1351 = "「Hà――á――ưm......em, sẽ quyết định――ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっ――っ！！！！？」
1339 = "「Ừ, đúng vậy. Phát bắn tinh đầu tiên của hôm nay, rốt cuộc, sẽ bắn vào đâu」"
# monologue
# JP: （じゅぶううううううううううううっ！！！！！）
1940 = "「Bên ngoài――bắn ra ngoài, thật nhiều lên người em!\nHãy bắn tinh dịch đặc, nóng và nồng mùi lên người em đi ạ」"
# 【ふかみ】
# display as 深美
# JP: 「んうっ！！！！！！！」
1287 = "「Anh hiểu――!!!!?」"
# monologue
# JP: 体にかけてといいながら、ふかみは素早く腰をうかして、\n蕩ける小さなおまんこで、僕の勃起を飲み込んでくる！
1731 = "（Phậpppppppppp!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかっ――っ！！！！！」
1435 = "「Ưm!!!!!!!!!」"
# monologue
# JP: （こちゅんっ！）
1943 = "Miệng thì bảo bắn lên người, nhưng Fukami lại nhanh chóng nhấc hông lên,\ndùng chiếc âm đạo nhỏ bé đang tan chảy nuốt chửng dương vật của tôi!"
# 【ふかみ】
# display as 深美
# JP: 「んきゅううっ！！」
1304 = "「Fuka――!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うあっ！」
1258 = "（Phập!）"
# monologue
# JP: 最奥へとあたった瞬間、かぷりと咥えられるような感覚。\nふかみの子宮口は貪欲に、僕の精液を呑みたがってる。
1705 = "「Ưm kyuu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そ、[そと,1]膣外に射精す――体にかけてほしいと――\nくっ、は――言われたばかりのような、気が、したが」
1365 = "「Ua!」"
# 【ふかみ】
# display as 深美
# JP: 「かけて、くだ、さいっ――ンッ――あっ――\n精液、双鉄、おにいさんの――あついの――わたしにっ」
1474 = "Khoảnh khắc chạm đến tận cùng, tôi có cảm giác như bị ngậm chặt lấy.\nCổ tử cung của Fukami đang tham lam muốn nuốt trọn tinh dịch của tôi."
# monologue
# JP: （ずりゅっ――じゅぶっ！　ずにゅうっ――にゅぶっ！）
1921 = "「B, bắn tinh ra ngoài――muốn anh bắn lên người――\nHự, hà――anh có cảm giác, em vừa mới nói như vậy mà」"
# monologue
# JP: ゆっくりあげて素早く落とす。\nふかみの腰は、すでにリズムを生みはじめている。
1812 = "「Hãy bắn, lên, người em――ưm――á――\nTinh dịch, của anh, Soutetsu――nóng hổi――lên người em」"
# 【ふかみ】
# display as 深美
# JP: 「たくさん、たくさん、あっつい、精液――わたし、をっ\n双鉄――おにいさんの――んっ――におい、で――」
1353 = "（Trượt――phập! Trượt――phập!）"
# 【双鉄】
# display as 雙鐵
# JP: 「だが――ぁっ――このまま、で、はっ――」
1196 = "Nhấc lên từ từ rồi hạ xuống thật nhanh.\nHông Fukami đã bắt đầu tạo ra nhịp điệu."
# monologue
# JP: （ずくりゅ――にゅぶっ！　ず、りゅっ――ぬぢゅっ！）
1913 = "「Thật nhiều, thật nhiều, tinh dịch, nóng hổi――nhuộm, em\nbằng mùi hương――ưm――của anh――Soutetsu――」"
# monologue
# JP: 膣壁で亀頭が擦られる角度を、ふかみは微妙に変えてくる。\n一擦りごと異なる快感が背筋から脳に這い登ってくる。
1753 = "「Nhưng――á――cứ thế, này, thì――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――っ、くっ――ほぼ、間違いなく――\n膣内で――射精、してしまうのだがっ」
1257 = "（Trượt ngoáy――phập! Trượt――phập!）"
# 【ふかみ】
# display as 深美
# JP: 「イク――とき――んっ！　双鉄、おにい、さん、がっ\n射精、するとき――いって、くれたら――そしたっ、ら」
1496 = "Fukami khéo léo thay đổi góc độ để thành âm đạo cọ xát vào quy đầu.\nMỗi lần cọ xát là một khoái cảm khác nhau truyền từ sống lưng lên não."
# monologue
# JP: （ずりゅっう――ごちゅっ！　ぬりゅう！　ぶちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　ここっ――ここ、しゅきっ――んっ！！」
1471 = "「――hự――gần như, chắc chắn――\nAnh sẽ bắn tinh――vào trong âm đạo, mất」"
# monologue
# JP: 角度が定まり、腰の動きがぎりぎりにまで大きくなる。\nそうして徐々に、速度が、熱が、水音とともに増していく。
1738 = "「Lúc――ra――ưm! Lúc anh, Soutetsu,\nbắn tinh――nếu anh nói, cho em biết――khi đó, thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　くっ！！」
1259 = "（Trượtttt――phập! Trơn tuột! Bạch!）"
# monologue
# JP: 余裕がない。腰振りに夢中になるふかみは可愛らしいが、\nこのままいれば、膣内射精を免れ得ない。
1666 = "「Phua! Chỗ này――chỗ này, thích lắm――ưm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が――射精を――イキそうになるのを――\n伝えた、ら――どう、なるのだっ――っ！」
1374 = "Góc độ đã ổn định, biên độ chuyển động hông tăng lên đến mức tối đa.\nVà rồi dần dần, tốc độ, sức nóng, cùng với âm thanh nhóp nhép ngày càng tăng."
# 【ふかみ】
# display as 深美
# JP: 「ふぇっ？　あ――あ！　そしたら、大丈夫。わたし、\nおちんちん、抜き、ます、から――射精、びゅうびゅう」
1254 = "「! Hự!!」"
# monologue
# JP: （きゅうううっ！！　きゅっ！）
1949 = "Không còn thời gian nữa. Fukami say sưa vung hông trông thật đáng yêu,\nnhưng cứ thế này thì không thể tránh khỏi việc bắn tinh vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1258 = "「唔！」" 
# monologue
# JP: きゅうんと締まる。ぞわぞわざわめく。\n僕の射精のイメージが、ふかみの膣に伝わったらしい。
1629 = "「Nếu anh――báo cho em biết――khi anh sắp bắn――\nThì――sẽ thế nào――!」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　そうてつ、おにいさんの、おちん、ちんっ\n――んっ！　おまんこ――おまんこ――いっぱい、で」
1472 = "「Phê? A――a! Khi đó thì, không sao đâu. Em sẽ,\nrút dương vật, ra, mà――rồi bắn tinh, vùn vụt」"
# monologue
# JP: （ぎちゅっ！　じゅこっ！　きぢゅうっ！　ずびゅっ！）
# 1924 = "（咕啾！咕啾！）" 
# monologue
# JP: 膣があまりにキチキチすぎてぶわりと汗が吹き出してくる。\n密着感は凄まじいのに、計画はあまりにガバガバだ。
1713 = "（Thít chặt!! Thít!）"
# 【双鉄】
# display as 雙鐵
# JP: 「抜ける、のか？　本当に――僕が、射精、を――\nその、タイミングを――ふかみに――伝え、たのならば」
1455 = "「Hự!」"
# 【ふかみ】
# display as 深美
# JP: 「大丈夫、ダイジョブ、です――ん！　だって、わたし\n浴びたい、からっ――双鉄、おにいさんの、匂い、精液」
1428 = "Co thắt lại \"kyuun\". Râm ran xao xuyến.\nCó vẻ hình ảnh tôi bắn tinh đã truyền đến âm đạo của Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1341 = "「Phua! Dương, vật, của anh, Soutetsu\n――ưm! Âm đạo――âm đạo――đầy ắp, rồi」"
# monologue
# JP: （ずんっっ！！）
1964 = "（Co thắt! Phập! Thít chặt! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「ひうっ！！！！！」
1280 = "Âm đạo quá khít khiến mồ hôi tôi túa ra.\nCảm giác áp sát thật kinh khủng, nhưng kế hoạch lại quá lỏng lẻo."
# monologue
# JP: 踊るふかみの腰にあわせて、思い切り腰を突き上げる。
1701 = "「Rút ra, được không? Thật sự――nếu anh, báo cho――\nFukami――biết thời điểm――anh, bắn tinh」"
# monologue
# JP: （じゅぶっ！　ごちゅっ！　じゅぶっ！　ばちゅっ！！）
1912 = "「Không sao, không sao, đâu ạ――ưm! Vì, em\nmuốn tắm mình, trong đó mà――mùi hương, tinh dịch, của anh, Soutetsu」"
# monologue
# JP: 愛液がぷしゃりと弾け出る。\n温度の高い汗が、唾液が、僕の体にぼたぼた落ちる。
1650 = "「Anh hiểu rồi」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ！　急にっ！　急にっ、そんなっ！　そんなっ、\nんっ、くっ！　あっ！　強いのっ！　強いのぉ！！」
1469 = "（Phập!!）"
# monologue
# JP: 喘ぎ乱れて、それでもふかみの腰の動きは止まらない。\n呼吸があってるそれだけで、快感はさらに膨れてく。
1766 = "「Hiu!!!!!」"
# monologue
# JP: （ずりゅんっ！　ぎちゅっ！　じゅぶっ！　ぱちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！　あっ！　おくっ！　奥っ！　すごいっ！\nあたってっ！　つよくっ！　えぐって――んううっ！！」
1285 = "Phối hợp với điệu nhảy của hông Fukami, tôi dùng hết sức đẩy hông lên."
# monologue
# JP: （ずびゅっ！　ぶちゅっ！！　じにゅっ！　ごちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# monologue
# JP: 子宮口を破るのではないかと怖くなるほど、\n亀頭がぐちゅんと一番奥で分厚い肉とぶつかり潰れる。
1846 = "（Phập! Phập! Phập! Bạch!!）"
# 【ふかみ】
# display as 深美
# JP: 「あっ！　んっ！　きゅっ！！　あっ！　あっ！ふあっ！\nあっ！　だめっ！　わたしっ！　これ、らめぇっ！！」
1283 = "Dâm thủy bắn ra tung tóe.\nMồ hôi nóng hổi, nước bọt, nhỏ giọt xuống cơ thể tôi."
# monologue
# JP: ふかみの膣がぎちぎちと勃起全部を絞りにきてる。\nか細い指も、めいっぱいの力で僕の体をしっかり掴む。
1772 = "「Phua! Đột nhiên! Đột nhiên, như thế! Như thế,\nƯm, hự! Á! Mạnh quá! Mạnh quá!!」"
# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずぢゅっ！　ばちゅっ！）
1926 = "Thở dốc rối loạn, nhưng hông Fukami vẫn không dừng lại.\nChỉ cần nhịp thở đồng điệu, khoái cảm lại càng phình to."
# 【ふかみ】
# display as 深美
# JP: 「あっ！　あっ！　あっ！　あっ！　おまんこっ！\nあっ――わた、しっ！　わたしっ、おまんこっ！」
1276 = "（Trượt! Co thắt! Phập! Bạch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――僕も――限界、だっ！！！」
1433 = "「Hyau! Á! Sâu quá! Sâu quá! Tuyệt quá!\nChạm vào rồi! Mạnh quá! Khoét sâu vào――ưm ư!!」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　です！　わたしも！　あっ！　んっ！！\nだからっ！　だからっ！　あっ！　おにい――さんっ！」
1347 = "（Phập! Bạch!! Phập! Phập!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1260 = "Sợ đến mức tưởng chừng như xé rách cổ tử cung,\nquy đầu va chạm và nghiền nát lớp thịt dày ở tận cùng với âm thanh \"guchun\"."
# monologue
# JP: 引き抜き全身にぶっかける。そうするために呼吸をずらし、\nふかみが上昇するタイミングで――っ！！！？
1682 = "「Á! Ưm! Kyu!! Á! Á! Phua!\nÁ! Không được! Em! Cái này, không được đâu!!」"
# monologue
# JP: （ぎゅうううううううううううううううっっっっ！！）
1948 = "Âm đạo Fukami thít chặt vắt kiệt toàn bộ sự cương cứng.\nNhững ngón tay gầy guộc cũng dùng hết sức bám chặt lấy cơ thể tôi."
# monologue
# JP: 捕まえられる。締め付けられる。絞られる。\n勃起が膣に、腿が手指に、胴もがっしり太ももにっ――！
1692 = "（Phập! Phập! Phập! Bạch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！？」
1226 = "「Á! Á! Á! Á! Âm đạo!\nÁ――em, ! Em, âm đạo!」"
# monologue
# JP: （びゅっ！　ぶゆるっ！　ぶびゅっ！　どびゅうっ！！）
1932 = "「Fukami――anh cũng――đến giới hạn, rồi!!!」"
# 【ふかみ】
# display as 深美
# JP: 「んっ！　ゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅんんっ！」
1310 = "「Vâng! Ạ! Em cũng vậy! Á! Ưm!!\nCho nên! Cho nên! Á! Anh――Soutetsu!」"
# monologue
# JP: （ぎちゅちゅっ！　きゅうっ！　きゅうんっ！！）
1967 = "「!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 1288 = "「啊！」" 
# monologue
# JP: ガチガチに締め付けられた膣内で、貼り付いてくる膣壁が、\n蠕動をして僕の勃起をぎゅうぎゅう幾度も乳搾りする。
1817 = "Rút ra và bắn lên toàn thân. Để làm được điều đó, tôi điều chỉnh nhịp thở,\nvà đúng lúc Fukami nhô lên――!!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ！　あっ！　あっ！　あっ！」
1464 = "（Thítttttttttttttttttttt!!）"
# monologue
# JP: （びゅうっ！　びゅるっ！　びゅぶっ！　ぶびゅるっ！）
1930 = "Bị bắt lấy. Bị thít chặt. Bị vắt kiệt.\nDương vật bị âm đạo, đùi bị ngón tay, thân mình bị đùi kẹp chặt――!"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――しゅごい！　たくさん――精液っ――んっ、\nあつい、の――びゅうびゅうっ、おなか――たたい、て」
1233 = "「Kua!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふ――か……みっ」
1430 = "（Phụt! Phụt! Phụt! Phụt!!）"
# monologue
# JP: （びゅるっ――びゅう――ぴゅっ…………ぴるっ）
1927 = "「Ưm! Yưưưưưưưưưưưưưưưưưm!」"
# 【ふかみ】
# display as 深美
# JP: 「は――あっ――んっ――（ごくっ）――\nはぁっ――はぁっ――はぁっ――はぁっ――」
1462 = "（Co thắt! Thít! Thít chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅ……あ――」
1255 = "「Á!」"
# monologue
# JP: 射精し尽くした勃起をなおも、\nふかみの膣はゆるゆるごきゅごきゅ絞り続ける。
1665 = "Bên trong âm đạo bị thít chặt cứng, vách âm đạo bám sát vào,\nnhu động và vắt kiệt dương vật của tôi vô số lần."
# 【ふかみ】
# display as 深美
# JP: 「……しゅご――んっ――すごい、です――はぁっ――\nそうてつ、おにいさん――こんなに、たくさん――精液」
969 = "「Phua! Á! Á! Á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その、精液、だが……」
1485 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 射精が収まり呼吸が落ち着き、\nようやく、言葉を喉から出せる。
1616 = "「Phua――tuyệt quá! Thật nhiều――tinh dịch――ưm,\nnóng hổi――vùn vụt, đang đập――vào bụng」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がイクことを伝えたら、腰を外すと――\n全身にかけてほしいと――さきほど、ふかみは」
1200 = "「Fu――ka......mi」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！？　やだ、わたしっ！？\nついつい夢中になっちゃってっ」
1290 = "（Phụt――phụt――phụt............phụt）"
# monologue
# JP: （にちょおっ！）
1925 = "「Hà――á――ưm――（Ực）――\nHà――hà――hà――hà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1288 = "「啊！」" 
# monologue
# JP: ふかみは指を三本まとめてスプーンにして、\n接合部から溢れ出してる精液をねろりと掬い――
1750 = "「Ư......a――」"
# 【ふかみ】
# display as 深美
# JP: 「（くん、くんっ――くんくんっ）――あ……だめ。\n精液、わたしのと混じっちゃってて――匂い、薄い」
1499 = "Dù dương vật đã bắn cạn tinh dịch,\nâm đạo của Fukami vẫn tiếp tục vắt kiệt với âm thanh ùng ục."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばっ！！！」
1495 = "「......Tuyệt――ưm――tuyệt quá, ạ――hà――\nAnh Soutetsu――thật nhiều――tinh dịch」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　双鉄おにいさんっ！！？」
1294 = "「Về chuyện, tinh dịch đó......」"
# monologue
# JP: ふかみを立たせて僕へと背中を向けさせる。
1696 = "Sau khi bắn xong, nhịp thở dần ổn định,\ncuối cùng tôi cũng có thể cất lời."
# 【双鉄】
# display as 雙鐵
# JP: 「手袋があれば擦れることもないか。\nふかみ、両手を壁につくんだ」
1402 = "「Em bảo khi anh nói sắp ra, em sẽ rút hông ra――\nvà muốn anh bắn lên toàn thân――lúc nãy, Fukami đã nói vậy mà」"
# 【ふかみ】
# display as 深美
# JP: 「は、はいです。――です」
1340 = "「Á!? Chết rồi, em!?\nEm vô tình say sưa quá」"
# monologue
# JP: ふかみが壁に両手をつけば、\n精液をまだとろとろ零すおまんこが、僕の勃起の前に来る。
1785 = "（Nhóp nhép!）"
# 【双鉄】
# display as 雙鐵
# JP: 「亀頭のくびれ――カリ首は、前にだされた精液を\n掻き出すための形状だ、などと何かの書物で目にしたが」
1393 = "Fukami chụm ba ngón tay lại thành hình chiếc thìa,\nnhớt nhát múc lấy tinh dịch đang trào ra từ chỗ kết nối――"
# monologue
# JP: （ずりっ――すりっ――すりっ――すりゅんっ）
1960 = "「（Ngửi, ngửi――ngửi ngửi）――a......không được rồi.\nTinh dịch, trộn lẫn với của em mất rồi――mùi, nhạt quá」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ……あ……う……そう、なんです、か？」
1461 = "「Nếu vậy!!!」"
# monologue
# JP: 勃起でおまんこを長く撫ぜれば、\nふかみはもじもじ、焦れったそうに尻を振る。
1688 = "「Hyau!? Anh Soutetsu!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、今挿入して腰を使って掻き出したとしても――\nその精液の匂いでは、ふかみは不満なのだろう？」
1198 = "Tôi đỡ Fukami đứng dậy và xoay lưng về phía tôi."
# 【ふかみ】
# display as 深美
# JP: 「だってもうわたしの――わたしのいろんな――その……\nいろんなおつゆとかと、ガッツリ混じっちゃってますし」
1324 = "「Nếu có găng tay thì sẽ không bị xước đâu.\nFukami, chống hai tay vào tường đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「まあな」
1421 = "「V-Vâng ạ. ――ạ」"
# monologue
# JP: （すりゅっ――じゅりゅっ――くりゅっ――ちゅりゅっ）
1914 = "Khi Fukami chống hai tay vào tường,\nâm đạo vẫn đang nhỏ giọt tinh dịch sền sệt hiện ra trước dương vật đang cương cứng của tôi."
# monologue
# JP: リアルタイムでとろとろと、\nふかみの愛液は僕の勃起をも濡らしまくってる。
1770 = "「Chỗ lõm của quy đầu――khấc quy đầu có hình dạng để cào tinh dịch đã bắn ra trước đó,\nanh từng đọc được điều này trong một cuốn sách nào đó」"
# 【ふかみ】
# display as 深美
# JP: 「だから、その――やっぱり、ええと――射精――体とか、お顔とかに直接かけてもらうのが、匂い的には、一番」
1404 = "（Trượt――cọ――cọ――trượt）"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。\n最初にそう聞いていたので、僕も応えようとしたのだが」
1420 = "「Phua......a......ư......vậy, sao, ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「あうっ」
1278 = "Khi tôi dùng dương vật vuốt ve âm đạo một đường dài,\nFukami vặn vẹo, lắc mông vẻ sốt ruột."
# monologue
# JP: 申し訳無さそうな声と同じに、おまんこまでも恐縮する。\nひっついたまま縮む動きが、かえって勃起を熱くする。
1732 = "「Nhưng, dù bây giờ anh có cắm vào và dùng hông cào ra――\nFukami cũng không hài lòng với mùi tinh dịch đó đúng không?」"
# monologue
# JP: （ずりっ――ぺりゅっ――ずりゅっ――ペチュッ――）
1911 = "「Vì nó đã bị――nhiều thứ của em――cái đó......\nTrộn lẫn hoàn toàn với nhiều loại nước của em rồi mà」"
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――ふ、あっ――双鉄――おにいさん――\nんっ――これ――わたし――焦れっ、たくって――あ！」
1458 = "「Cũng đúng」"
# monologue
# JP: このまま擦って射精するのも悪くはないのだが、この声だ。\n挿入せずに達することは、別の不満を招きかねない、ゆえ
1843 = "（Trượt――chụt――cọ――chụt）"
# monologue
# JP: （ぐっ――じゅにゅっ！　――ずっ――）
1916 = "Dâm thủy của Fukami liên tục trào ra sền sệt,\nlàm ướt đẫm cả dương vật của tôi."
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ふぁっ――来た！　先っぽ――っ――亀頭――\nさっき、よりも――もっと――太く、なってる、みたい」
1268 = "「Cho nên, ừm――vẫn là, dạ――bắn tinh――bắn trực tiếp lên cơ thể hay khuôn mặt, thì mùi hương, là tuyệt nhất」"
# monologue
# JP: というか、ふかみがいっそう狭い。\n精液を更に欲しがって、きゅんきゅんぐいぐい締めてくる。
1655 = "「Đúng vậy nhỉ.\nBan đầu nghe em nói thế, anh cũng định đáp lại nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうしてセックスすればもう、膣も子宮もふかみ自身も、\n夢中になって、自分の欲さえ見失ってしまうようだから」
1487 = "「Au」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい――それは――そのとおり――\nあ！　だから、なんですか？　この格好」
1417 = "Cùng với giọng nói đầy vẻ áy náy, cả âm đạo cũng co rúm lại.\nChuyển động co thắt trong khi vẫn bám chặt lấy, lại càng làm dương vật thêm nóng rực."
# 【双鉄】
# display as 雙鐵
# JP: 「ご明察だ」
1447 = "（Trượt――chụt――trượt――nhóp nhép――）"
# monologue
# JP: （ずっ――ぶっ――ぞりゅっ）
# 1914 = "（咕啾、咕啾）" 
# monologue
# JP: ご褒美がわりに腰を進めて、\n途中で止めて小刻みに振って動かしてみる。
1677 = "「Hà――á――phu, á――Anh――Soutetsu――\nƯm――thế này――em――sốt ruột, lắm rồi――a!」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！　そこっ――そこ、ぐりって、されるの――\n好き――んっ――きもち――いいっ――」
1292 = "Cứ thế này cọ xát rồi bắn tinh cũng không tệ, nhưng nghe giọng điệu này.\nNếu đạt đỉnh mà không cắm vào, có thể sẽ chuốc lấy sự bất mãn khác, vì vậy"
# monologue
# JP: （ぞりゅっ――ぐりゅっ――ぞぶっ――ぐにゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# monologue
# JP: 浅いところの腹側にある粒立つ部分を亀頭の先で\n押しつぶすようにして往復しながら刺激する。
1625 = "（Hự――phập! ――Thút――）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あっ――きもち、いい――きもちいいよぉ\n――ん――ぁっ――けど――けどぉ――ん……ぁっ」
1457 = "「A――phua――đến rồi! Phần đầu――quy đầu――\nHình như――còn to hơn――cả lúc nãy――nữa」"
# monologue
# JP: （きゅっ！　きゅうううっ！　きゅんっ！　きゅうん！）
# 1949 = "（夾緊！）" 
# monologue
# JP: あえぎに紛れたふかみの語尾を、膣が代弁してくれる。\n奥へ奥へと。そして子宮へ精液を、と。
1622 = "Phải nói là, Fukami càng lúc càng khít hơn.\nKhao khát tinh dịch hơn nữa, cô ấy liên tục thít chặt \"kyun kyuun\"."
# 【双鉄】
# display as 雙鐵
# JP: 「この欲張りなおまんこだ。精液全部を飲まれぬように、\n僕の方で制御する他に、手はなかろうと考えたのだ」
1391 = "「Làm tình thế này thì, cả âm đạo, tử cung và chính bản thân Fukami,\nđều sẽ say sưa đến mức đánh mất cả dục vọng của chính mình mất」"
# 【ふかみ】
# display as 深美
# JP: 「はい。です。そうしてほしい、です――わたしおまんこ\n……おまんことっても、欲ばりだから――だから」
1349 = "「V-Vâng――đúng là――như vậy――\nA! Cho nên, mới thế này sao? Tư thế này ấy」"
# monologue
# JP: ごくりとふかみが唾を飲む。\n振り返る眼もまなざしも、とろとろに溶け、濡れている。
1745 = "「Em đoán đúng rồi đấy」"
# 【ふかみ】
# display as 深美
# JP: 「精液、かけてもらうまで――は――おちん、ちん――\nたくさん、じゅぼじゅぼ――おまんこ、可愛がってほし」
1475 = "（Thút――phập――trượt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1261 = "Thay cho phần thưởng, tôi đẩy hông vào,\ndừng lại giữa chừng rồi thử rung lắc nhẹ nhàng."
# monologue
# JP: （ずっ――ぐっっっっ――ごちゅううううううっっ！）
1965 = "「Á! Chỗ đó――chỗ đó, bị ngoáy――\nthích lắm――ưm――sướng――quá――」"
# 【ふかみ】
# display as 深美
# JP: 「きゃふうううううううっ！！」
1279 = "（Trượt――ngoáy――phập――nắn!）"
# monologue
# JP: ご希望どおりに腰を再奥へ進めれば、\nふかみの体の全部が喜びまくって震えてくれる。
1679 = "Tôi dùng đầu quy đầu ép chặt vào phần nhô lên lấm tấm ở phía bụng chỗ nông\nvừa di chuyển qua lại vừa kích thích."
# 【ふかみ】
# display as 深美
# JP: 「ふああっ！　来た、来たっ！　おちんちん！　んっ――\nスタンプ――ぐりぐり――、おまんこ――一番、奥、に」
1465 = "「Phua――á――sướng, quá――sướng quá đi\n――ưm――á――nhưng mà――nhưng mà――ưm......á」"
# monologue
# JP: 子宮口が飽きること無く噛み付いてくる。\n亀頭を確保し、精液全部を一滴たりとも逃すまいとし。
1610 = "（Thít! Thít chặt! Kyun! Kyuun!）"
# monologue
# JP: （ずりゅううううううっっっっっっっ）
1939 = "Âm đạo đã thay lời Fukami nói nốt phần đuôi câu lẫn trong tiếng rên rỉ.\nSâu hơn, sâu hơn nữa. Và hãy rót tinh dịch vào tử cung đi."
# monologue
# JP: ゆえに、引く。\n粘膜全てを引きずるように、カリで膣道を逆剃りしていく。
1714 = "「Cái âm đạo tham lam này. Để không bị nuốt trọn toàn bộ tinh dịch,\nanh nghĩ không còn cách nào khác ngoài việc tự mình kiểm soát」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――やっ――ゆっくり、グイっ――って、んっ――\nゆっくりされると――せなか――ゾク、って――ぅあっ」
1264 = "「Vâng. Ạ. Em muốn anh làm thế, ạ――âm đạo của em\n......âm đạo của em rất, tham lam――cho nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1258 = "「唔！」" 
# monologue
# JP: （じゅぶううううううううっ――ご、ちゅうううっっ）
1919 = "Fukami \"ực\" một tiếng nuốt nước bọt.\nÁnh mắt ngoái lại nhìn cũng đã ướt át, tan chảy lờ đờ."
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！」
# 1464 = "「蛤啊啊！」" 
# monologue
# JP: （ぐいっ！　ごりゅっ！　ぐりゅっ！　ぐにっ！）
1917 = "「Cho đến khi――được bắn tinh dịch lên người――dương, vật――\nhãy chịch thật nhiều――vào âm đạo, hãy yêu chiều nó đi ạ」"
# 【ふかみ】
# display as 深美
# JP: 「スタンプ――すごいっ！　んっ！　何度も、ぐりぐり、\nちゅっちゅっちゅって！　一番、奥に――子宮に――あ」
1400 = "「!!!!!!」"
# monologue
# JP: 子宮口へと亀頭をぐいぐい押し付けまくれば、\nふかみは大きく背中を震わせ、熱くて長い息を吐く。
1689 = "（Thút――hự――phậpppppppp!）"
# 【ふかみ】
# display as 深美
# JP: 「……気持ちいい……気持ちいいよぉ――んっ、好きっ\n――しゅき――だいすき――ん――双鉄、おにいさぁん」
971 = "「Kya phuuuuuuu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1308 = "Đẩy hông vào tận cùng đúng như ý nguyện của cô ấy,\ntoàn bộ cơ thể Fukami run rẩy trong sự sung sướng tột độ."
# monologue
# JP: 名を呼ばれれば単純に、嬉しくなるし愛おしくなる。
1590 = "「Phuaa! Đến rồi, đến rồi! Dương vật! Ưm――\nĐóng dấu――ngoáy mạnh――vào tận, sâu nhất――của âm đạo」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も好きだし、幸せだ。だからもっと――\nもっとふかみの近くにいたい。重なり合いたい」
1377 = "Cổ tử cung cắn chặt lấy không biết chán.\nGiữ rịt lấy quy đầu, không để sót lại dù chỉ một giọt tinh dịch."
# monologue
# JP: （さわっ）
1962 = "（Trượtttttttttttttttt）"
# 【ふかみ】
# display as 深美
# JP: 「あっ！！」
1295 = "Vì vậy, tôi rút ra.\nNhư muốn kéo theo toàn bộ niêm mạc, dùng khấc quy đầu cạo ngược lại đường âm đạo."
# monologue
# JP: 手を伸ばし、ふかみのおっぱい――ふくらみはじめで\nあるのだろうが、それでも確かなおっぱいを揉む。
1660 = "「Á――a――chậm rãi, đẩy mạnh――ưm――\nBị làm chậm rãi thế này――lưng em――sởn gai ốc――úa」"
# monologue
# JP: （ふにっ――ふにゅっ――もみゅっ――くりゅんっ！）
1957 = "（Phậpppppppp――phậppppp）"
# 【ふかみ】
# display as 深美
# JP: 「あっ――ふあっ――双鉄、おにいさんの、指――\nごつごつ、して――好き――おっきくて、あったかくて」
1270 = "「Hà! Á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら、光栄だ」
1203 = "（Đẩy! Ngoáy! Ngoáy! Nắn!）"
# monologue
# JP: （こりゅっ――ふにゅっ――もみゅっ――さすっ）
# 1962 = "（撫摸）" 
# monologue
# JP: 揉みしだきたい気持ちを抑え、ゆっくりやわやわ、\n小鳥の雛を扱うように、優しく包み撫でさせる。
1675 = "「Đóng dấu――tuyệt quá! Ưm! Hết lần này đến lần khác, ngoáy mạnh,\nchụt chụt chụt! Vào tận, sâu nhất――vào tử cung――a」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――ンッ――うれしい――しあわせ――\nあったくって――双鉄おにいさん――すごく、感じて」
1463 = "Liên tục ép mạnh quy đầu vào cổ tử cung,\nFukami rung bần bật tấm lưng, thở ra một hơi dài nóng hổi."
# 【双鉄】
# display as 雙鐵
# JP: 「もっと、もっとだ。感じてほしい」
1398 = "「......Sướng quá......sướng quá đi――ưm, yêu anh\n――yêu anh――yêu anh lắm――ưm――anh, Soutetsu」"
# monologue
# JP: （さわっ――もみゅっ――くりゅっ――くにっ！！）
1956 = "「Ừ」"
# 【ふかみ】
# display as 深美
# JP: 「んっ！！！！」
1313 = "Đơn giản là khi được gọi tên, tôi thấy vui sướng và yêu thương vô cùng."
# monologue
# JP: 乳首を強めに潰してみれば、ふかみの膣が大きくわななく。\n亀頭が牽かれ、腰が勝手に進んでしまう。
1686 = "「Anh cũng yêu em, và rất hạnh phúc. Vì vậy anh muốn――\nmuốn ở gần Fukami hơn nữa. Muốn hòa quyện vào nhau」"
# monologue
# JP: （ずりゅうううっ――じゅぶっ――ごりゅっつ）
1941 = "（Chạm nhẹ）"
# 【ふかみ】
# display as 深美
# JP: 「くひゅんっ！！！！！」
1286 = "「Á!!」"
# monologue
# JP: 甘い声。甘い蠕動。鼓膜と勃起が揺すぶられ、\n背骨に脳に、ゾクゾクと快感と混じる衝動が来る。
1601 = "Tôi vươn tay ra, xoa nắn bầu ngực của Fukami――tuy chỉ mới\nbắt đầu nhú lên, nhưng vẫn đích thực là một bầu ngực."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ！　ふかみ！　ふかみ！　ふかみっ」
1434 = "（Mềm mại――nắn nắn――xoa――vê!）"
# monologue
# JP: （じゅぶっ！　ばちゅっ！　じゅるっ！　ごちゅっ！）
# 1913 = "（咕啾、咕啾！）" 
# 【ふかみ】
# display as 深美
