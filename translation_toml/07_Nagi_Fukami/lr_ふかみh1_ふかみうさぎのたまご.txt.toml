1928 = "「Kuuuu!!」"
# monologue
# JP: 精液全部が出尽くして。ようやくふかみの膣が緩む。\n甘えた声は明確に、どろどろのキスをせがんでる。
1811 = "（Phậpppppppppppppp!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。あれほど偉そうなことを言っておきながら、\n僕もセックス――ふかみに夢中になってしまって」
975 = "Tôi dùng hết sức rút hông lại, dùng lực cánh tay cố định hông Fukami."
# 【ふかみ】
# display as 深美
# JP: 「ふぇ？――あ！　そんなの、全然謝ることじゃないです。\nだって――ねぇ？　双鉄おにいさん」
1252 = "「A」"
# monologue
# JP: （きゅっ）
1950 = "Bốn mắt nhìn nhau. Đôi mắt màu hoa violet, đôi môi hé mở,\nđang mời gọi, lôi kéo tôi vào sâu hơn, sâu hơn nữa bên trong Fukami――!!"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1295 = "「啊！！」" 
# monologue
# JP: ふかみは恐らく自分の意思で、膣を甘やかに狭めてみせた。\nぐったりと項垂れる僕の亀頭を、いいこいいこし励ました。
1763 = "（Phậpppppppppppp!――Ngoáy!）"
# 【ふかみ】
# display as 深美
# JP: 「次の射精で、たくさんかけて――精液の匂いたくさん、\nわたしに嗅がせてくれるので、それで最高に幸せですし」
1183 = "「Hyuaaaaaaaaaaaaaaaaaaaaaaaaaan!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1390 = "「Ua!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、けど――その前に」
1299 = "（Phụt! Phụt! Phụt! Phụt!!）"
# monologue
# JP: ふかみがはにかみ振り返る。\n兎の耳が、ひょこん、と僕に会釈する。
1747 = "Bắn mạnh tinh dịch vào tận cùng âm đạo――\nKhoảnh khắc đó, não bộ tôi lấy lại được lý trí và ký ức."
# 【ふかみ】
# display as 深美
# JP: 「キス――ね？　わたし、たくさんたくさん、\n甘いのたくさん――してほしい。です――です」
1473 = "「Phua! Á! Tuyệt quá! Tử cung――âm đạo――\nTinh trùng――thật nhiều, ừng ực――em, đang nuốt, lấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「奇遇だな。僕もふかみとキスしたかった」
1445 = "Lượng tinh dịch đầu tiên vừa bắn ra đã bị tử cung nuốt trọn mất rồi.\nNhưng, dù là bây giờ, để rót lên cơ thể Fukami――!?!!"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1308 = "「嗯」" 
# monologue
# JP: 深く。唇と舌を重ねて――そうして僕らは今度こそ、\n三度目の正直を叶えるために、動き始める。
1662 = "（Phụt! Phụt! Phụt! Phụt!）"
