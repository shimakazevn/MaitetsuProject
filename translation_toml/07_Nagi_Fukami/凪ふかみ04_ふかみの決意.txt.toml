[script]
# lines: 490 
# monologue
# JP: ……レールショップ、事務員さんしかいなかった。\nポーレットさん、駅の方、かな？
1537 = "...Cửa hàng đường sắt, chỉ có nhân viên ở đó.\nChị Paulette, ở phía nhà ga, chăng?"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
2229 = "「A!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご乗車ありがとうございました」
2383 = "「Cảm ơn quý khách đã đi tàu」"
# monologue
# JP: いた、ポーレットさん。\n\x%lキハ07s;#00ffc040;キハ07s%l;#;、ちょうど戻ってきたとこみたい。
3101 = "Thấy rồi, chị Paulette.\n\\x%lキハ07s;#00ffc040;Kiha 07S%l;#;, có vẻ vừa mới quay lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ご乗車ありがとうございました。\n――ありがとうございました」
2382 = "「Cảm ơn quý khách đã đi tàu.\n——Cảm ơn quý khách」"
# monologue
# JP: 運転してきたばっかりなのに、\n下りるお客さんから、きっぷを受け取って回収してる。
2991 = "Vừa mới lái tàu xong,\nvậy mà đã đứng nhận và thu lại vé từ khách xuống tàu rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうござ――あ！\nお客様？　定期券の期限が」
2572 = "「Cảm ơn quý kh——a!\nQuý khách ơi? Vé tháng của quý khách hết hạn rồi ạ」"
# 【会社員】
# display as 公司職員
# JP: 「うわ、ごめんねぇ。うっかりしちゃった」
2149 = "「Oa, xin lỗi nhé. Tôi sơ ý quá」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのい,1]湯医からの片道で、690円になります。\n定期券の更新は、レールショップでおねがいします」
2499 = "「Vé một chiều từ Yunoi là 690 yên ạ.\nQuý khách vui lòng gia hạn vé tháng ở Cửa hàng đường sắt nhé」"
# 【会社員】
# display as 公司職員
# JP: 「わかりました。じゃ、1000円で」
2323 = "「Tôi hiểu rồi. Vậy, gửi cô 1000 yên」"
# 【ポーレット】
# display as 波萊特
# JP: 「310円のお返しになります。ありがとうございます」
2418 = "「Tiền thừa của quý khách là 310 yên ạ. Cảm ơn quý khách」"
# monologue
# JP: ……ポーレットさん、お会計しながらも、\n他のお客さんのきっぷを受け取って、定期券も見てる。
1526 = "...Chị Paulette, vừa thanh toán,\nvừa nhận vé của khách khác, vừa kiểm tra vé tháng nữa."
# monologue
# JP: すごい、な、ホントに。\nいっつものことだから、全然気がつかなかったけど……
3188 = "Giỏi thật đấy, thực sự luôn.\nVì là chuyện thường ngày nên tôi hoàn toàn không để ý..."
# 【日々姫】
# display as 日日姬
# JP: 「あれ？　ふかみちゃんだ」
2162 = "「Ủa? Fukami kìa」"
# 【ふかみ】
# display as 深美
# JP: 「あ、日々姫さん。こんにちわ」
2244 = "「A, chị Hibiki. Chào chị ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「こんにちわ！　今日、学園？」
2055 = "「Chào em! Hôm nay, em đi học hả?」"
# 【ふかみ】
# display as 深美
# JP: 「いえ、おやすみです。です。\nだけど、あの――」
1997 = "「Dạ không, em được nghỉ ạ. Ạ.\nNhưng mà, ờm——」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに――んんっ、兄さんに用事？\nそれとも、凪ちゃん？」
2233 = "「A, tìm anh hai——ưm, tìm anh trai chị có việc hả?\nHay là, tìm Nagi?」"
# 【ふかみ】
# display as 深美
# JP: 「そうじゃない――けど――\nえと、あのふたり、今、一緒……です、か？」
1995 = "「Không phải ạ——nhưng mà——\nờm, hai người đó, bây giờ, đang ở cùng nhau... phải không, ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。あと二時間ちょっとで、\n午後のもくもくハチロク号走るけんね。点検しとーと」
2258 = "「Ừ. Hơn hai tiếng nữa,\nchuyến Mokumoku Hachiroku buổi chiều sẽ chạy mà. Đang kiểm tra đó」"
# 【ふかみ】
# display as 深美
# JP: 「じゃあ、日々姫さんも？」
2052 = "「Vậy, chị Hibiki cũng vậy ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん。今日はオフ。\nちょっとポーレットさんにお話あって」
2008 = "「Không. Hôm nay chị nghỉ.\nChị có chút chuyện muốn nói với chị Paulette」"
# 【ふかみ】
# display as 深美
# JP: 「ポーレットさんに！」
2074 = "「Chị Paulette ạ!」"
# monologue
# JP: すごい。\nなんだかすごいタイミング。
3186 = "Tuyệt quá.\nKhông hiểu sao lại đúng lúc thế này."
# monologue
# JP: どうやってお話切り出そうって悩んでたけど――\nでも、日々姫さんが一緒なら。なら！
3088 = "Tôi đang đau đầu không biết mở lời thế nào——\nNhưng, nếu có chị Hibiki đi cùng. Thì!"
# 【日々姫】
# display as 日日姬
# JP: 「あれ？　ふかみちゃんもポーレットさんに用事？」
2161 = "「Ủa? Fukami cũng có việc tìm chị Paulette hả?」"
# 【ふかみ】
# display as 深美
# JP: 「わ、どうしてわかっちゃった。です？」
2050 = "「Oa, sao chị biết hay vậy. Ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「『助かったー』っていう顔したけん。\nなんか、頼みづらい用事でもあるのかな、って」
2390 = "「Vì em làm cái mặt kiểu 『May quá đi mất』 ấy.\nChắc là có việc gì khó nhờ vả đúng không」"
# 【ふかみ】
# display as 深美
# JP: 「わ！　すごい。さすが絵描きさん。です」
2186 = "「Oa! Giỏi quá. Quả không hổ danh là họa sĩ. Ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「んー、ふかみちゃんがわかりやすいだけ、かな？\nま、とにかく先にレールショップいってよ？」
2252 = "「Ưm, chắc tại Fukami dễ đoán quá thôi?\nMà, tóm lại là cứ đến Cửa hàng đường sắt trước nhé?」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2208 = "「A——」"
# monologue
# JP: わ、わ。どうしよ。\nいざとなったら、やっぱり、足がすくんじゃう。
3067 = "Oa, oa. Làm sao đây.\nĐến lúc quan trọng, quả nhiên chân tôi lại chùn bước."
# monologue
# JP: けど――けど！　みかん鉄道の旅で思って、\nそれからずっと、しっかり考えてきたこと。……だし。
2961 = "Nhưng——nhưng mà! Nghĩ về chuyến đi đường sắt Mikan,\ntừ lúc đó đến giờ, tôi đã suy nghĩ rất kỹ rồi... cơ mà."
# 【ふかみ】
# display as 深美
# JP: 「――あ、あの。ありがとうございます。\nおねがいします、です！」
1546 = "「——À, ờm. Cảm ơn chị ạ.\nNhờ chị giúp đỡ, ạ!」"
# 【日々姫】
# display as 日日姬
# JP: 「こっちこそありがと。助かる」
2401 = "「Chị mới là người phải cảm ơn. May quá」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
2031 = "「Hả?」"
# monologue
# JP: お礼をいわれて、きょとんとしちゃう。
3196 = "Được cảm ơn, tôi ngẩn tò te."
# monologue
# JP: だって、わたし……\n連れていってもらうだけ――じゃ、ない、の？
3070 = "Bởi vì, tôi...\nchỉ là được dẫn đi cùng thôi——mà, nhỉ?"
# 【ふかみ】
# display as 深美
# JP: 「あの、えと……助かるって、なにが、です？」
2611 = "「Ờm, dạ... may quá, là sao, ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「それはナイショ。いまはまだ。\nポーレットさんとも相談しなくちゃだし」
2598 = "「Cái đó là bí mật. Bây giờ thì chưa được.\nChị cũng phải bàn bạc với chị Paulette nữa」"
# 【ふかみ】
# display as 深美
# JP: 「はい……」
2314 = "「Vâng...」"
# 【日々姫】
# display as 日日姬
# JP: 「へーきよ、ふかみちゃん！\n難しかことはちょっともなかけん！」
2427 = "「Không sao đâu, Fukami!\nChẳng có gì khó khăn cả đâu!」"
# monologue
# JP: 隈元弁。\n凪ちゃんが話しかけてくれるみたいで、少し落ち着く。
3166 = "Tiếng Kumamoto.\nCứ như Nagi đang nói chuyện với tôi vậy, tôi thấy bình tĩnh hơn chút."
# monologue
# JP: っていうか多分日々姫さん、\n意識して、わざとそうしてくれたんだ。
3120 = "Hay nói đúng hơn, có lẽ chị Hibiki,\nđã cố tình làm vậy để giúp tôi."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、いこ？」
2624 = "「Vậy, đi thôi?」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！　おともします！　です！！」　
2317 = "「Vâng! Ạ!! Em sẽ đi cùng chị! Ạ!!」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、紅茶ですよぉ」
2077 = "「Vâng, hồng trà đây ạ」"
# 【ふかみ】
# display as 深美
# JP: 「あ、ありがとう、れいなちゃん」
2571 = "「A, cảm ơn em nhé, Reina」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。どういたしましてですよぉ」
2278 = "「Ufufu. Không có chi đâu ạ」"
# 【ふかみ】
# display as 深美
# JP: 「いただきます――んっ……」
2393 = "「Chị xin phép——ưm...」"
# monologue
# JP: ……れいなちゃんの紅茶、おいしい。
1527 = "...Hồng trà của Reina, ngon quá."
# monologue
# JP: わたしの好み、\nレモンティーにして砂糖はなしも、覚えてくれてる。
2997 = "Sở thích của tôi,\ntrà chanh không đường, em ấy cũng nhớ nữa."
# 【ふかみ】
# display as 深美
# JP: 「ああ……癒されるなぁ」
2153 = "「A... cảm giác thật thư thái」"
# monologue
# JP: れいなちゃんとのティータイム。\nまあるくて、ふんわりしててあったかな時間。
3223 = "Giờ uống trà cùng Reina.\nMột khoảng thời gian êm đềm, nhẹ nhàng và ấm áp."
# monologue
# JP: このままずーっとお茶してたいなって、\nそんな気持ちも正直感じる――けど……
3239 = "Cứ muốn uống trà thế này mãi thôi,\nthành thật mà nói tôi cũng có cảm giác đó——nhưng..."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットと日々姫さん、おそいですねぇ。\nすぐ終わる、ってゆってたのにぃ」
2489 = "「Chị Paulette và chị Hibiki, lâu quá nhỉ.\nĐã bảo là xong ngay mà」"
# 【ふかみ】
# display as 深美
# JP: 「うん……」
2250 = "「Ừm...」"
# monologue
# JP: ポーレットさんと日々姫さんがそう言って\n奥に引っ込んでから、三十分以上たっちゃった。
2856 = "Từ lúc chị Paulette và chị Hibiki nói vậy\nrồi đi vào trong, đã hơn 30 phút rồi."
# monologue
# JP: 待たされてると……ああ……やだ、だめ。だけど――\n『やっぱりわたしなんて』って、思えてきちゃう。
3227 = "Bị bắt chờ thế này thì... a... không được, không được nghĩ vậy. Nhưng——\nTôi lại bắt đầu nghĩ 『Quả nhiên mình chẳng là gì cả』."
# 【ふかみ】
# display as 深美
# JP: 「ん……と。\nやっぱり出直した方がいいかな？」
2143 = "「Ưm... ờm.\nHay là chị nên quay lại sau nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「えええ！　それはわるいですよぉ。\nれいな、ちょっと聞いてきますねぇ」
2597 = "「Ế ế ế! Thế thì tệ lắm ạ.\nReina đi hỏi thử một chút nhé」"
# 【ふかみ】
# display as 深美
# JP: 「え！　いい、そんなの。大丈夫っ。\nそのっ、ふたりのお話、邪魔しちゃったら、悪いし」
2199 = "「Hả! Thôi, không cần đâu. Không sao đâu.\nỜm, nhỡ làm phiền hai người nói chuyện thì ngại lắm」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレット、絶対にじゃまになんてしませんよぉ。\nれいなのことも、ふかみさんのことも」
2488 = "「Chị Paulette tuyệt đối không thấy phiền đâu ạ.\nCả chuyện của Reina, và cả chuyện của chị Fukami nữa」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
2218 = "「A」"
# monologue
# JP: にこにこ、ぽかぽか、どこまでだってあったかな笑顔。\n曇りも迷いも、全然ない。信頼が固まって笑顔になってる。
3180 = "Nụ cười tươi tắn, rạng rỡ, ấm áp vô cùng.\nKhông một chút u ám hay chần chừ. Sự tin tưởng đúc kết thành nụ cười."
# monologue
# JP: うらやましいなって、やっぱり思う。\nわたしも――仲間に、本当の仲間になりたいな、って。
3190 = "Quả nhiên tôi thấy ghen tị.\nTôi cũng——muốn trở thành đồng đội, một người đồng đội thực sự."
# 【れいな】
# display as 玲奈
# JP: 「それじゃ、れいな、ちょっと聞いてきますねぇ」
2625 = "「Vậy thì, Reina đi hỏi thử một chút nhé」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい！　おねがいします、です」
2309 = "「V, vâng! Nhờ em nhé, ạ」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ふかみさん、\nいっつもとちょっとちがうですねぇ」
2285 = "「Ufufu, chị Fukami,\nhôm nay hơi khác mọi khi nhỉ」"
# monologue
# JP: にこにこしながら、れいなちゃんが立ってぽてぽて――
3176 = "Vừa cười tươi rói, Reina vừa đứng dậy lạch bạch bước đi——"
# 【れいな】
# display as 玲奈
# JP: 「わ！？」
2191 = "「Oa!?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ふかみちゃん、ちょっといい？\nれいなにも意見もらえたらうれしい」
2224 = "「A! Fukami, em rảnh một chút không?\nChị cũng muốn nghe ý kiến của Reina nữa」"
# monologue
# JP: 日々姫さん、スケッチブックを広げたままで、\nどんどんこっちに近づいてくる。
3124 = "Chị Hibiki, vẫn mở tung cuốn phác thảo,\nđang đi về phía này."
# monologue
# JP: ポーレットさんも苦笑しながら、\n日々姫さんについてくる。
3154 = "Chị Paulette cũng cười khổ,\ndi theo sau chị Hibiki."
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな、意見あげちゃいますよぉ」
2327 = "「Vâng ạ. Reina sẽ cho ý kiến nha」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしも大丈夫。です。けど――ええ、と？」
2389 = "「E, em cũng không sao. Ạ. Nhưng mà——ờm, là chuyện gì ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「ふかみちゃん、この間にぃに――んんっ、\n兄さんと凪ちゃんと旅行にいったでしょ？　みかん鉄道」
2359 = "「Fukami, dạo trước em cùng anh hai——ưm,\ncùng anh trai chị và Nagi đi du lịch đúng không? Đường sắt Mikan ấy」"
# 【ふかみ】
# display as 深美
# JP: 「あ……はい、です」
2216 = "「A... vâng, ạ」"
# 【ポーレット】
# display as 波萊特
# JP: 「あのとき、双鉄くんが、\n向こうさんのお手伝いをしたってことは――」
2645 = "「Lúc đó, Soutetsu đã\ngiúp đỡ người bên đó——」"
# 【ふかみ】
# display as 深美
# JP: 「知ってます。です。\n目の前での出来事でしたから。えと……」
2411 = "「Em biết. Ạ.\nVì nó xảy ra ngay trước mắt em mà. Ờm...」"
# 【日々姫】
# display as 日日姬
# JP: 「聞かせてくれる？\nふかみちゃんが体験したこと」
2555 = "「Kể cho chị nghe được không?\nNhững gì Fukami đã trải nghiệm ấy」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい。です。ええと――オリヴィちゃん、\nレイルロオドのこが、車掌さんの代理をしてて――」
2311 = "「V, vâng. Ạ. Ờm——bé Olivy,\nmột Railord, đang làm đại diện cho trưởng tàu——」"
# monologue
# JP: ポーレットさんも日々姫さんももう知ってるみたいだけど、\n一応は、わたしが見たことを全部残らず話しとく。
2988 = "Có vẻ như chị Paulette và chị Hibiki đã biết chuyện rồi,\nnhưng tôi vẫn kể lại không sót chữ nào những gì mình đã thấy."
# monologue
# JP: わたしのためにも、\nきっと、あとで役にたつことっても思うし。
3255 = "Vì bản thân tôi nữa,\ntôi nghĩ chắc chắn sau này nó sẽ có ích."
# 【ポーレット】
# display as 波萊特
# JP: 「……そうだったのね、ありがとう」
1556 = "「...Thì ra là vậy, cảm ơn em」"
# 【ふかみ】
# display as 深美
# JP: 「あ、いえ。です」
2210 = "「A, không có gì đâu. Ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「なんで聞いたかっていうとね？\n思い出してもらいたかったの、みかん鉄道のこと」
2064 = "「Tại sao chị lại hỏi thế hả?\nVì chị muốn em nhớ lại chuyện ở đường sắt Mikan thôi」"
# 【ふかみ】
# display as 深美
# JP: 「思い出して欲しい……って、どうして、です？」
2144 = "「Muốn em nhớ lại... là sao, ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「みかん鉄道さんから、お礼状が送られてきて。\nそこきっかけで、お話が一つ進んでるの」
2472 = "「Đường sắt Mikan đã gửi thư cảm ơn đến.\nNhân cơ hội đó, có một chuyện đang được tiến hành」"
# 【ふかみ】
# display as 深美
# JP: 「お話？」
2027 = "「Chuyện gì ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「みかん鉄道さん、観光列車を走らせる計画を立ててて、\nそれで、私にもデザイン案を出さないか――って」
2471 = "「Bên đường sắt Mikan đang lên kế hoạch cho chạy một chuyến tàu du lịch,\nrồi họ hỏi chị có muốn đưa ra bản thiết kế không——kiểu vậy」"
# 【ふかみ】
# display as 深美
# JP: 「わ！」
2189 = "「Oa!」"
# 【ポーレット】
# display as 波萊特
# JP: 「バーベキュー客車の改装、まいてつ界隈で評判なの。\nそれで、よろしければ是非デザインをっていうことで」
2664 = "「Việc cải tạo toa hành khách BBQ đang rất nổi tiếng trong giới đường sắt đấy.\nThế nên họ mới ngỏ ý nhờ chúng ta thiết kế giúp」"
# 【ふかみ】
# display as 深美
# JP: 「わぁぁ……日々姫さん、さすがですねぇ」
2182 = "「Oaaa... Chị Hibiki giỏi quá đi」"
# monologue
# JP: 自分のしたお仕事が、全然知らない人に認められる。\n全然知らない人から、それでお仕事の問い合わせが来る。
3219 = "Công việc mình làm được những người hoàn toàn xa lạ công nhận.\nTừ những người hoàn toàn xa lạ đó, lại nhận được lời mời làm việc."
# monologue
# JP: ……どういう気持ちなんだろう。\nなんだか、すごく憧れる。
1536 = "...Cảm giác đó sẽ thế nào nhỉ.\nSao mà ngưỡng mộ quá."
# 【日々姫】
# display as 日日姬
# JP: 「で、前の乗務のときに、にぃにと凪ちゃんには、\n乗車したときの感想……聞くには聞いたんだけど――」
1989 = "「Rồi, trong lần làm nhiệm vụ trước, chị có hỏi anh hai và Nagi,\ncảm nhận khi đi tàu... Hỏi thì hỏi rồi nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「あー」
2209 = "「A——」"
# monologue
# JP: それだけでなんだかわかっちゃう。\nだって……双鉄おにいさんと、凪ちゃんだし。
2994 = "Chỉ thế thôi là tôi cũng lờ mờ hiểu ra.\nVì... là anh Soutetsu và Nagi mà."
# 【ふかみ】
# display as 深美
# JP: 「あんまり感想――\n伝わってくるものがなかった、です？」
2038 = "「Cảm nhận thì——\nkhông truyền đạt được gì nhiều, đúng không ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「伝わってくるのは伝わってくるの、『楽しかった』って。\nけど、具体的にどこがどうとかが、全然」
2565 = "「Truyền đạt thì có truyền đạt, là 『Rất vui』.\nNhưng cụ thể là vui chỗ nào, ra sao thì hoàn toàn không」"
# 【ふかみ】
# display as 深美
# JP: 「だったら、わたし。\n少しは役にたてるかもって、思います」
2622 = "「Nếu vậy thì, em.\nNghĩ là mình có thể giúp ích được một chút」"
# 【日々姫】
# display as 日日姬
# JP: 「だよね！」
2315 = "「Đúng chứ!」"
# monologue
# JP: ぱって、日々姫さんのスケッチブックが広がる。
3123 = "Chị Hibiki lật tung cuốn phác thảo ra."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、聞かせて？　まずは――\n旅して、ふかみちゃんの一番の印象に残った景色は？」
2618 = "「Vậy, kể chị nghe đi? Trước tiên——\nCảnh sắc nào để lại ấn tượng sâu đậm nhất với Fukami trong chuyến đi?」"
# 【ふかみ】
# display as 深美
# JP: 「ベンチ！　です。多分、展望台かなにかの、\nちいさくて可愛い、海を見下ろせるベンチ」
2636 = "「Ghế đá! Ạ. Chắc là ở đài quan sát hay gì đó,\nmột chiếc ghế đá nhỏ nhắn dễ thương, có thể nhìn xuống biển」"
# 【ポーレット】
# display as 波萊特
# JP: 「ベンチ？」
2637 = "「Ghế đá?」"
# monologue
# JP: 日々姫さんとポーレットさんが顔と顔とを見合わせる。\nきっと、初耳なんだと思う。
2989 = "Chị Hibiki và chị Paulette nhìn nhau.\nChắc chắn đây là lần đầu tiên họ nghe thấy."
# monologue
# JP: ちょっと残念。双鉄おにいさんも凪ちゃんも、\nあのベンチのこと、それほど印象に残らなかったのかな。
3130 = "Hơi tiếc thật. Anh Soutetsu và Nagi,\nchắc không ấn tượng gì mấy với chiếc ghế đá đó nhỉ."
# 【日々姫】
# display as 日日姬
# JP: 「そのベンチは、何か特別なベンチなの？」
2075 = "「Chiếc ghế đá đó có gì đặc biệt sao?」"
# 【ふかみ】
# display as 深美
# JP: 「見た目とかは、普通のベンチです。\n白いペンキが塗られてて――素朴な感じで」
2297 = "「Nhìn bề ngoài thì chỉ là chiếc ghế đá bình thường thôi ạ.\nĐược sơn màu trắng——cảm giác rất mộc mạc」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん」
2253 = "「Ừ ừ」"
# 【ふかみ】
# display as 深美
# JP: 「でも、そのベンチの向こうが海で――綺麗で――\nあー、あと、多分、ですけど」
2044 = "「Nhưng mà, phía bên kia chiếc ghế là biển——đẹp lắm——\nA, với lại, có lẽ là vậy thôi, nhưng」"
# 【ポーレット】
# display as 波萊特
# JP: 「多分、なぁに？」
# 2031 = "「什麼？」" 
# 【ふかみ】
# display as 深美
# JP: 「わたし、ちょっと疲れちゃってたんだと思います。\nだからすごく、『あそこに座ってみたいな』って」
2407 = "「Em nghĩ lúc đó em hơi mệt.\nNên em rất muốn, 『Thử ngồi đó xem sao』」"
# 【ポーレット】
# display as 波萊特
# JP: 「疲れるって……乗り疲れ？」
2544 = "「Mệt á... mệt vì đi tàu sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。[せんだい,1]千内まではエアクラで、\n千内からも、ずっと列車に乗りっぱなしで――」
2438 = "「Đúng rồi ạ. Bọn em đi Aircra đến Sendai,\nrồi từ Sendai lại cứ ngồi tàu suốt——」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2253 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「腰とかだるくて、体、少し動かしたいなって思って。\nそうしたら、すごく素敵なベンチ、線路沿いにあって」
2296 = "「Mỏi lưng quá, nên em muốn vận động cơ thể một chút.\nRồi em thấy một chiếc ghế đá rất đẹp nằm dọc theo đường ray」"
# monologue
# JP: ……確か、言ってた。オリヴィちゃんが。\nどこかからならすぐ近く――とか――あ！
1517 = "...Hình như, bé Olivy có nói.\nTừ đâu đó thì rất gần——hay gì đó——a!"
# 【ふかみ】
# display as 深美
# JP: 「サツマタキ！　っていってました。\nそこからなら、歩いてすぐ、って」
2432 = "「Là Satsumataki! Em ấy bảo thế.\nTừ đó đi bộ một chút là tới」"
# 【ポーレット】
# display as 波萊特
# JP: 「[さつまたき,3]颯馬高城駅？\nなら、そこで観光停車とか。……遊歩道とかあるのかな」
2560 = "「Ga Satsumataki?\nVậy thì, có thể dừng chân tham quan ở đó. ...Không biết có đường dạo bộ không nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　それ最高だと思います。海と空がホント近くて。\nあそこお散歩できたら、絶対リフレッシュできちゃう！」
2187 = "「A! Em nghĩ thế là tuyệt nhất luôn. Biển và trời thật sự rất gần.\nNếu được đi dạo ở đó, chắc chắn sẽ sảng khoái lắm!」"
# 【日々姫】
# display as 日日姬
# JP: 「リフレッシュってことは――疲れだけじゃない？\n道中、結構退屈だったりもする？」
2505 = "「Sảng khoái nghĩa là——không chỉ mệt mỏi thôi sao?\nTrên đường đi cũng khá nhàm chán à?」"
# 【ふかみ】
# display as 深美
# JP: 「あー……ん……それは……途中までは、\n結構、空気が重かったのもあって……だし」
2213 = "「A... ưm... cái đó thì... đến giữa chừng,\nbầu không khí cũng khá là nặng nề... nữa」"
# monologue
# JP: でも、だからこそ、わたし、一生懸命探してた。
3097 = "Nhưng, chính vì thế, em đã cố gắng tìm kiếm."
# monologue
# JP: きれいなもの、素敵なこと。\n凪ちゃんに、話しかけられるきっかけが何かないかって。
3015 = "Những thứ xinh đẹp, những điều tuyệt vời.\nXem có gì làm cớ để bắt chuyện với Nagi không."
# 【ふかみ】
# display as 深美
# JP: 「でも――うん。正直いうと、[やつしろかい,3]八ツ城海は最高ですけど\n……それが見えるまでは、結構退屈、かも、です」
2005 = "「Nhưng——vâng. Thành thật mà nói, biển Yatsushiro thì tuyệt vời thật,\nnhưng... trước khi nhìn thấy nó thì khá là nhàm chán, ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「そっかー。ならやっぱり海のイメージだよね……\nそこを主役にするのは間違いなくって……」
2603 = "「Ra vậy. Thế thì quả nhiên vẫn là hình ảnh biển cả nhỉ...\nLấy đó làm chủ đạo thì chắc chắn không sai rồi...」"
# monologue
# JP: ぶつぶついって、\n日々姫さんがスケッチブックにペンを走らせ始める。
3118 = "Lẩm bẩm một mình,\nchị Hibiki bắt đầu múa bút trên cuốn phác thảo."
# monologue
# JP: ポーレットさんも、真剣な目でそれを見つめる。
3152 = "Chị Paulette cũng nhìn chăm chú với ánh mắt nghiêm túc."
# 【れいな】
# display as 玲奈
# JP: 「海が見えたら、退屈じゃなくなったですかぁ？」
2518 = "「Thấy biển rồi thì không còn chán nữa sao ạ?」"
# monologue
# JP: ふんわり、れいなちゃんの声。\nそれだけでもう、ほっとする。
3177 = "Giọng nói êm ái của Reina.\nChỉ vậy thôi cũng đủ làm tôi nhẹ nhõm."
# 【ふかみ】
# display as 深美
# JP: 「うん。海が見えたし――と、そっか。\nそこから先は、オリヴィちゃんが話しかけてくれたから」
2262 = "「Ừ. Vừa thấy biển——à, đúng rồi.\nTừ lúc đó trở đi, bé Olivy đã bắt chuyện với bọn chị mà」"
# 【れいな】
# display as 玲奈
# JP: 「どんなことをおはなししたんですかぁ」
2629 = "「Mọi người đã nói chuyện gì vậy ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「[やつしろかい,3]八ツ城海がどんなに綺麗かとか、みかん鉄道は最高とか、\nそういうこと。すごく、愛情たっぷりに」
2306 = "「Biển Yatsushiro đẹp ra sao, đường sắt Mikan tuyệt vời thế nào,\nđại loại vậy. Vô cùng, tràn đầy tình yêu thương luôn」"
# 【れいな】
# display as 玲奈
# JP: 「愛情たっぷり、すてきですねぇ」
2650 = "「Tràn đầy tình yêu thương, tuyệt quá nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「うん。素敵だった。だから八ツ城海、きっと、\n実物よりももっとキラキラ、輝いてみえた」
2267 = "「Ừ. Tuyệt lắm. Thế nên biển Yatsushiro, chắc chắn,\nnhìn còn lấp lánh, rực rỡ hơn cả thực tế nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー、観光案内……車内アナウンスの質も重要よね。\n列車が長距離になればなるほど」
2241 = "「A, hướng dẫn du lịch... chất lượng phát thanh trên tàu cũng quan trọng nhỉ.\nTàu chạy càng xa thì càng quan trọng」"
# 【ふかみ】
# display as 深美
# JP: 「かもです。でも、うるさいと逆に観光邪魔しちゃうし\n……アナウンスだけじゃなく、こう、もっとメリハリ」
2448 = "「Có lẽ vậy ạ. Nhưng nếu ồn ào quá thì ngược lại sẽ làm phiền việc ngắm cảnh mất\n...Không chỉ là phát thanh, mà kiểu, cần có điểm nhấn hơn」"
# 【ポーレット】
# display as 波萊特
# JP: 「メリハリ？」
2568 = "「Điểm nhấn?」"
# 【ふかみ】
# display as 深美
# JP: 「例えば、川くだりだと、歌、歌うんです。\n話してばっかりだと、お客さん聞いてくれなくなるから」
2478 = "「Ví dụ như lúc chèo thuyền xuôi dòng, bọn em sẽ hát.\nCứ nói mãi thì khách sẽ không muốn nghe nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、歌はいいかも。\n歌とか――生演奏とか、そういうの」
2259 = "「A, hát có khi hay đấy.\nHát hò——hay biểu diễn trực tiếp gì đó」"
# 【ふかみ】
# display as 深美
# JP: 「いいと思います、すごく！\n生演奏をバックに、あの景色を眺められたら……」
2313 = "「Em nghĩ là rất hay luôn! Cực kỳ hay!\nNếu được ngắm cảnh đó trên nền nhạc biểu diễn trực tiếp thì...」"
# monologue
# JP: ムード、最高なんていうものじゃない。\n凪ちゃんはきっと、ピアノ演奏、すぐ寝ちゃうから……
3264 = "Bầu không khí, không chỉ là tuyệt vời nữa.\nNagi chắc chắn sẽ ngủ gật ngay khi nghe tiếng đàn piano mất..."
# monologue
# JP: そうしたら、双鉄おにいさん――\nきっと、わたしの瞳を見つめて、肩とか、抱いて――
3165 = "Lúc đó, anh Soutetsu——\nchắc chắn sẽ nhìn sâu vào mắt tôi, rồi ôm lấy vai tôi——"
# 【れいな】
# display as 玲奈
# JP: 「わ！？\nふかみさん、よだれ！　よだれたれてますよぉ！」
2230 = "「Oa!?\nChị Fukami, nước dãi! Chị chảy nước dãi kìa!」"
# 【ふかみ】
# display as 深美
# JP: 「え？！　きゃ！　やだ、わたしっ」
2167 = "「Hả?! Á! Chết mất, mình thật là」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\nおいしいものの想像でもしちゃいましたかぁ？」
2280 = "「Ufufu.\nChị lại tưởng tượng ra món gì ngon đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「う、うん！　おいしいもの。\nすごく、おいしそうで――よだれでちゃって」
2430 = "「Ừ, ừ! Đồ ăn ngon.\nTrông ngon lắm luôn——nên chảy cả nước dãi」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうよね、長距離になればなるほど食事は重要。\n車販にするか――ビュッフェをつけちゃうか」
2451 = "「Đúng vậy nhỉ, đường càng dài thì bữa ăn càng quan trọng.\nBán hàng trên xe hay là——mở luôn quầy \\x%lビュッフェ;#00ffc040;buffet%l;#; nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「それか……ええと、大人の人がお酒飲む――\nあの、バー、でいいのかなぁ？　ああいう」
2601 = "「Hoặc là... ờm, người lớn uống rượu——\nờm, quán bar, được không nhỉ? Kiểu như vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、バー・カウンター？」
2235 = "「A, quầy bar?」"
# 【ふかみ】
# display as 深美
# JP: 「だと思います！　映画にでてくるみたいな。\nああいうの、ムードあるところだと最高かなって」
2345 = "「Em nghĩ là vậy! Giống như trong phim ấy.\nMấy chỗ như thế, nếu có bầu không khí thì tuyệt lắm」"
# 【れいな】
# display as 玲奈
# JP: 「わかった！　れいなもわかったですよぉ。\nロマンチックな、上品な雰囲気のお酒飲むとこですねぇ」
2509 = "「Em hiểu rồi! Reina cũng hiểu rồi nha.\nLà chỗ uống rượu có bầu không khí lãng mạn, thanh lịch đúng không ạ」"
# 【ふかみ】
# display as 深美
# JP: 「そう、それ！　だから、ご家族連れっていうよりも、\nカップルとかご夫婦むけみたいなのがしっくりかなって」
2346 = "「Đúng, đúng rồi! Vì thế, thay vì đi theo gia đình,\nthì kiểu dành cho các cặp đôi hay vợ chồng sẽ hợp hơn」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ……すごい」
2184 = "「Oa... tuyệt quá」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
# 2031 = "「什麼？」" 
# monologue
# JP: なんでなんだろ？\nポーレットさん、わたしの顔……まじまじ……見てる。
3257 = "Sao thế nhỉ?\nChị Paulette... cứ nhìn chằm chằm... vào mặt tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「さすが、クマ川くだりの――\n一線級の観光業者の、実質的な経営者」
2521 = "「Quả không hổ danh là người quản lý thực tế của tuyến chèo thuyền trên sông Kuma——\nmột doanh nghiệp du lịch hàng đầu」"
# 【ふかみ】
# display as 深美
# JP: 「いえ！　とんでもないです、そんなの――\nこんなの、わたしの、勝手な感想なだけです、し」
2206 = "「Dạ không! Làm gì có chuyện đó——\nĐây chỉ là, cảm nhận cá nhân của em thôi, ạ」"
# monologue
# JP: それに……それに！
3205 = "Hơn nữa... hơn nữa!"
# 【ふかみ】
# display as 深美
# JP: 「ママも、病気よくなって、クマ川下り見てくれて。\n船頭さんとかも復帰して、だから、今は経営者とかでも」
2332 = "「Mẹ em cũng khỏi bệnh rồi, mẹ đang lo liệu việc chèo thuyền trên sông Kuma.\nCác bác lái đò cũng quay lại làm việc rồi, nên bây giờ em đâu phải người quản lý gì đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、すごかと。ふかみちゃんが言うたこと、\nみかん鉄道さんからのオーダー、ピタリだから」
2011 = "「Không đâu, giỏi lắm đấy. Những gì Fukami nói,\nhoàn toàn khớp với yêu cầu từ đường sắt Mikan luôn」"
# 【ふかみ】
# display as 深美
# JP: 「え？　オーダーぴったり、って――」
2030 = "「Hả? Hoàn toàn khớp với yêu cầu, là sao——」"
# 【日々姫】
# display as 日日姬
# JP: 「高価格帯、高級路線。カップルやご夫婦が、記念日の、\n張り込んだ、ワンランク上の旅をするための観光列車」
2587 = "「Phân khúc giá cao, tuyến đường cao cấp. Tàu du lịch dành cho các cặp đôi hay vợ chồng,\nmuốn có một chuyến đi xa xỉ, đẳng cấp hơn trong ngày kỷ niệm」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　それです！　それ！！　それこそが、\nあの路線に一番ぴったりくる観光プランって思います！」
2225 = "「A! Là nó đó! Chính là nó!! Em nghĩ đó chính là\nkế hoạch du lịch phù hợp nhất với tuyến đường đó!」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば、あの路線を熟知しとるみかん鉄道さんの\nオーダーイメージやけん。ふかみちゃん、凄かとよ」
2344 = "「Đó là hình ảnh yêu cầu của bên đường sắt Mikan,\nnhững người hiểu rất rõ về tuyến đường đó đấy. Fukami, em giỏi lắm」"
# 【ポーレット】
# display as 波萊特
# JP: 「たった一回の旅で、そこまで本質をつかめるって……\nセンス、というより、才能だと思う。本当に凄い」
2080 = "「Chỉ qua một chuyến đi mà nắm bắt được bản chất đến mức đó...\nChị nghĩ đó là tài năng chứ không chỉ là khiếu thẩm mỹ đâu. Thật sự rất tuyệt」"
# 【ふかみ】
# display as 深美
# JP: 「は……はぅ……\nそ、そんな……わたっ――」
2178 = "「Ha... hau...\nK, không có... em——」"
# monologue
# JP: 『わたしなんて』って言いかけたのを、グって飲み込む。\nそんなこと言ったら、わたしの大事なひとたちに――
3074 = "Tôi nuốt ực câu 『Cỡ như em thì』 đang chực trào ra.\nNếu nói thế, sẽ thật có lỗi với những người quan trọng của tôi——"
# monologue
# JP: 双鉄おにいさんに、凪ちゃんに、おかあさんやみんなに、\nとってもとっても失礼だって、わかったから。
3017 = "Với anh Soutetsu, với Nagi, với mẹ và mọi người,\nnhư vậy là vô cùng, vô cùng thất lễ, tôi hiểu điều đó."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ふかみさん、すごいですねぇ。\nね、ポーレットぉ、御一夜鉄道にもし、次の観光列車が」
2283 = "「Ufufu, chị Fukami, giỏi quá đi.\nNày chị Paulette, nếu đường sắt Ohito có chuyến tàu du lịch tiếp theo」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　それいい！　うん。ふかみちゃんに、\n御一夜鉄道沿線の魅力、もう一度チェックしてもらって」
2221 = "「A! Ý hay đấy! Ừ. Nhờ Fukami\nkiểm tra lại sức hấp dẫn dọc tuyến đường sắt Ohito một lần nữa」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2229 = "「啊！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
2377 = "「Hả?」"
# monologue
# JP: そうだ、わたし、そのお話を――\nううん、お願いをしにきたんだった。
3016 = "Đúng rồi, tôi đến đây là để nói chuyện đó——\nKhông, là để nhờ vả."
# 【ふかみ】
# display as 深美
# JP: 「あの、わたし、喜んでやります。沿線チェックでも、\nなんでも、一生懸命やります、です。だから――」
2612 = "「Dạ, em, rất sẵn lòng làm ạ. Dù là kiểm tra dọc tuyến,\nhay bất cứ việc gì, em cũng sẽ cố gắng hết sức, ạ. Vì thế——」"
# monologue
# JP: おっかないし、恥ずかしい。\n今さら……って、自分の中でも声が聴こえる。
3084 = "Sợ hãi, và xấu hổ.\nĐến giờ này rồi còn... một giọng nói vang lên trong tôi."
# monologue
# JP: けど、こんなチャンスって二度とない。\nいま言わなくちゃ、わたし一生、きっと言えない！
2885 = "Nhưng, cơ hội thế này sẽ không có lần thứ hai.\nNếu bây giờ không nói, chắc chắn cả đời này tôi sẽ không thể nói ra!"
# 【ふかみ】
# display as 深美
# JP: 「だから、わたしを――御一夜鉄道のほんとの仲間に。\n――車掌さんに！　してくださいっ！！！」
2416 = "「Vì thế, xin hãy cho em——trở thành một người đồng đội thực sự của đường sắt Ohito.\n——Trở thành trưởng tàu! Đi ạ!!!」"
# 【凪】
# display as 凪
# JP: 「あれ！？　ふかみちゃん」
2157 = "「Ủa!? Fukami」"
# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃん。双鉄おにいさんも」
2243 = "「A, Nagi. Cả anh Soutetsu nữa」"
# monologue
# JP: 凪ちゃんも双鉄おにいさんもナッパ服。\nこれから、8620に乗務するんだ。
2876 = "Nagi và anh Soutetsu đều mặc đồng phục bảo hộ.\nTừ giờ, họ sẽ làm nhiệm vụ trên chiếc 8620."
# 【凪】
# display as 凪
# JP: 「なにしとーと？　こぎゃんところで」
2062 = "「Cậu đang làm gì thế? Ở chỗ này」"
# 【ふかみ】
# display as 深美
# JP: 「なにって……見たまんまだよ？　お掃除」
2139 = "「Làm gì á... như cậu thấy đấy? Đang dọn dẹp」"
# 【凪】
# display as 凪
# JP: 「いや、お掃除はわかるばってん――」
1999 = "「Không, dọn dẹp thì tớ biết rồi nhưng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪が言いたいのはつまり……\n服装、のことだよな」
2107 = "「Ý Nagi là...\nvề trang phục của em ấy」"
# monologue
# JP: 言って、双鉄おにいさんがわたしを見てくれる。\n頭のてっぺんから靴の先まで。
3272 = "Nói rồi, anh Soutetsu nhìn tôi.\nTừ đỉnh đầu đến mũi giày."
# monologue
# JP: 着こなし、ポーレットさんにチェックしてもらってるし\n――あ、コロン、石鹸のやつつけてきた方がよかったかな。
3076 = "Cách ăn mặc, chị Paulette đã kiểm tra giúp rồi\n——A, nước hoa, dùng loại mùi xà phòng thì tốt hơn nhỉ."
# 【凪】
# display as 凪
# JP: 「そうばい！　ふかみちゃん、ちょお似合ってると！\nまるで、本物の駅員さんみたいばい！！」
2363 = "「Đúng vậy! Fukami, hợp lắm luôn á!\nCứ như nhân viên nhà ga thứ thiệt vậy!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2209 = "「啊……」" 
# monologue
# JP: ほっとする。\nちょっと、自信がわいてくる。
2985 = "Nhẹ nhõm quá.\nTôi bắt đầu thấy tự tin hơn chút."
# monologue
# JP: 凪ちゃんに褒めてもらえて――\n双鉄おにいさんも、真面目な顔で頷いてくれて。
3040 = "Được Nagi khen——\nAnh Soutetsu cũng gật đầu với vẻ mặt nghiêm túc."
# 【ふかみ】
# display as 深美
# JP: 「ありがと、凪ちゃん。けどね？　わたし――\n『まるで』じゃなくて、本物の駅員さんなの」
2573 = "「Cảm ơn cậu, Nagi. Nhưng mà này? Tớ——\nKhông phải 『cứ như』 đâu, tớ là nhân viên nhà ga thứ thiệt đó」"
# 【凪】
# display as 凪
# JP: 「えっ！？　本物って」
2160 = "「Hả!? Thứ thiệt á」"
# 【ふかみ】
# display as 深美
# JP: 「まだ見習いの、それも試用……テスト期間だけど。\nって、あ！　だからっ」
2644 = "「Vẫn đang học việc, với lại còn đang thử việc... trong thời gian kiểm tra thôi.\nÀ, a! Thế nên」"
# monologue
# JP: いけない。わたし、おしゃべりなんてできる立場じゃ\n全然ないんだ。
2863 = "Không được. Mình hoàn toàn không ở vị trí\ncó thể đứng buôn chuyện được."
# monologue
# JP: お掃除、手早く丁寧に。\n今はそれだけしかできないから。
3042 = "Dọn dẹp, nhanh chóng và cẩn thận.\nVì bây giờ mình chỉ có thể làm được thế thôi."
# 【ふかみ】
# display as 深美
# JP: 「ごめんね。お話、またあとででいい？」
2421 = "「Xin lỗi nhé. Nói chuyện sau được không?」"
# 【凪】
# display as 凪
# JP: 「あ、そりゃそーばい！\nお仕事の邪魔しちゃいけんけんねー」
2247 = "「A, đúng vậy ha!\nKhông được cản trở công việc của cậu chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕らは僕らの仕事をだ。凪」
2450 = "「Đúng vậy. Chúng ta cũng có việc của mình. Nagi」"
# 【凪】
# display as 凪
# JP: 「わかっとるばーい！」
2316 = "「Em biết rồiiii!」"
# monologue
# JP: あ――今、ちょっとだけ胸、ズキってしちゃった。\n“僕ら”の中に、わたし、ここでは入れないから。
2968 = "A——vừa nãy, tim tôi hơi nhói lên một chút.\nVì trong chữ \"chúng ta\" đó, không có tôi ở đây."
# monologue
# JP: わかってたけど――\nううん、わかってるから、頑張らなくちゃ！
3270 = "Tôi biết chứ——\nKhông, vì biết nên mới phải cố gắng!"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、双鉄おにいさん」
2352 = "「Nagi, anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2277 = "「Ưm?」"
# 【凪】
# display as 凪
# JP: 「何ばい？　ふかみちゃん」
2376 = "「Gì thế? Fukami」"
# monologue
# JP: あ――呼びかけちゃったの、失敗した、かも。\nこんなにまじまじ見られちゃったら恥ずかしい。
2966 = "A——lỡ gọi mất rồi, chắc là, thất bại rồi.\nBị nhìn chằm chằm thế này xấu hổ quá."
# monologue
# JP: けど……いいたくて、伝えたくって――\nずっと、あこがれてたことだから。
2881 = "Nhưng... tôi muốn nói, muốn truyền đạt——\nVì đó là điều tôi luôn ao ước."
# 【ふかみ】
# display as 深美
# JP: 「ご、ご安全、にっ――\nえと――良い乗務をっ！」
2493 = "「C, chúc an toàn——\nỜm——chúc một chuyến đi tốt đẹp!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃーーーーん！」
2357 = "「Fukamiiiii!」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
2132 = "「Á!」"
# monologue
# JP: 凪ちゃん、抱きついてきてくれる。\n尻尾をふってる子犬みたいに！
3019 = "Nagi lao đến ôm chầm lấy tôi.\nNhư một chú cún con đang vẫy đuôi vậy!"
# monologue
# JP: いいこいいこって頭を撫でたら、\nごろごろいって、今度はまるで子猫みたい！
3106 = "Tôi vuốt ve đầu khen ngoan ngoãn,\nthì em ấy lại rừ rừ, giờ thì giống hệt mèo con luôn!"
# 【凪】
# display as 凪
# JP: 「なんか、なんだか感動ばい！！」
2171 = "「Sao tự nhiên, thấy cảm động quá đi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。良いものだな。\nふかみに――駅員さんのふかみに見送ってもらえるのは」
2455 = "「Đúng vậy. Tuyệt thật đấy.\nĐược Fukami——nhân viên nhà ga Fukami tiễn đi thế này」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2218 = "「啊」" 
# monologue
# JP: よかった。\nすごく喜んでもらえてる！
2983 = "May quá.\nHai người họ rất vui!"
# monologue
# JP: 嬉しい、これって。いっしょに運転できなくっても、\nわたし、自分から、“僕ら”に入れた！
3191 = "Vui quá, cảm giác này. Dù không thể cùng nhau lái tàu,\nnhưng tự tôi, đã bước vào \"chúng ta\" rồi!"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんのためにもがんばるけんね！\n投炭ばっちり、安全にスムーズに戻ってくるばい！」
2501 = "「Tớ cũng sẽ cố gắng vì Fukami nữa!\nXúc than thật chuẩn, trở về an toàn và suôn sẻ nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「うんっ！」
2255 = "「Ừm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いい意気込みだが、今日は恐らく僕が投炭だぞ？\n凪の機関士訓練が始まるのだからな」
2567 = "「Quyết tâm tốt đấy, nhưng hôm nay chắc anh mới là người xúc than cơ?\nVì buổi huấn luyện lái tàu của Nagi sẽ bắt đầu mà」"
# 【凪】
# display as 凪
# JP: 「ふわわ！？　そうだったとばい！！」
2219 = "「Oaaa!? Đúng rồi ha!!」"
# monologue
# JP: 双鉄おにいさんのひとことで、\n凪ちゃんの笑顔が慌てた顔に変わっちゃう。
3279 = "Chỉ một câu của anh Soutetsu,\nnụ cười của Nagi đã biến thành vẻ mặt hoảng hốt."
# 【凪】
# display as 凪
# JP: 「あうあう、どぎゃんしよー！\nあんまり準備ばできとらんばい～」
2197 = "「Auu, làm sao đây!\nTớ chưa chuẩn bị gì nhiều cả~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに。ハチロクの指示に従って動けばいいだけだ。\n僕もついている。そう力むことはない」
2379 = "「Gì chứ. Cứ làm theo chỉ dẫn của Hachiroku là được thôi.\nAnh cũng ở đó mà. Đừng căng thẳng quá」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　わたし！　私もついてる！\n凪ちゃんの帰り、ぴかぴかの駅で待ってるから！」
2348 = "「Nagi! Tớ! Tớ cũng ở đây!\nTớ sẽ đợi Nagi trở về ở một nhà ga sáng bóng!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃ～ん！　ありがとばーい！」
2355 = "「Fukami ơiii! Cảm ơn cậu nhaaa!」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ」
2131 = "「Á」"
# monologue
# JP: 凪ちゃんはまた、わたしを強くぎゅーってして――\nそしたら、顔も引き締まる。
3021 = "Nagi lại ôm chặt lấy tôi một lần nữa——\nRồi sau đó, nét mặt em ấy trở nên nghiêm túc."
# 【凪】
# display as 凪
# JP: 「にーさん、いくばい！\nハチロクに良かとこ見せてやるばい！！」
2300 = "「Anh hai, đi thôi!\nPhải cho Hachiroku thấy bản lĩnh của em mới được!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その意気だ」
2566 = "「Tinh thần đó đấy」"
# monologue
# JP: 凪ちゃんと双鉄おにいさん、もう前だけしか見ていない。\n駅員さんって……なんだかちょっと、寂しいかも。
2877 = "Nagi và anh Soutetsu, giờ chỉ nhìn thẳng về phía trước.\nNhân viên nhà ga... không hiểu sao lại thấy hơi cô đơn."
# monologue
# JP: 車掌さんになれれば、\nふたりと一緒にレールの向こうに走っていけるのに。
2999 = "Nếu trở thành trưởng tàu,\ntôi có thể cùng hai người họ chạy về phía bên kia đường ray."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、がんばってますねぇ」
2286 = "「Ufufu, đang cố gắng lắm nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「れいなちゃ――えと、れいな……先輩？」
2506 = "「Reina——ờm, tiền bối... Reina?」"
# 【れいな】
# display as 玲奈
# JP: 「いつもどおりでいいですよぉ。\nれいな、レイルロオドなんですからぁ」
2001 = "「Cứ gọi như bình thường là được rồi ạ.\nReina là Railord mà」"
# 【ふかみ】
# display as 深美
# JP: 「うん。ありがと、れいなちゃん」
2273 = "「Ừ. Cảm ơn em nhé, Reina」"
# monologue
# JP: れいなちゃん、いつだって本当にれいなちゃん。\nお話ちょっとしただけで、寂しい気持ちを溶かしてくれる。
3174 = "Reina, lúc nào cũng thật sự là Reina.\nChỉ cần nói chuyện một chút thôi, cảm giác cô đơn đã tan biến."
# 【れいな】
# display as 玲奈
# JP: 「お礼をいうのはこっちですよぉ。ふかみさん、\nとーっても素敵なお仕事してくれましたからぁ」
2511 = "「Người phải cảm ơn là em mới đúng ạ. Chị Fukami,\nđã làm một công việc tuyệt vời lắm luôn」"
# 【ふかみ】
# display as 深美
# JP: 「え？　わたし、別になにも――」
2165 = "「Hả? Chị có làm gì đâu——」"
# 【れいな】
# display as 玲奈
# JP: 「駅係員さんのおしごとで大事なことがなにか、\nポーレットがおしえてくれたの、おぼえてますかぁ？」
2491 = "「Điều quan trọng trong công việc của nhân viên nhà ga là gì,\nchị Paulette đã dạy chị rồi, chị còn nhớ không ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、うん。――はい。\n覚えてる――覚えてます、です」
2240 = "「A, ừ. ——Vâng.\nChị nhớ——chị nhớ chứ, ạ」"
# monologue
# JP: 車掌になるには、まず駅係員から。\n駅係員の一番始めは、掃除から――
3231 = "Để trở thành trưởng tàu, trước tiên phải bắt đầu từ nhân viên nhà ga.\nViệc đầu tiên của nhân viên nhà ga, là dọn dẹp——"
# monologue
# JP: その理由、ポーレットさんは、\nすごく丁寧に、納得して取り組めるように教えてくれた。
3153 = "Lý do đó, chị Paulette đã\ndạy cho tôi rất cẩn thận, để tôi có thể hiểu và bắt tay vào làm."
# 【ふかみ】
# display as 深美
# JP: 「駅を清潔に、いつもどおりの秩序ある状態に保つこと。\nそれはつまり鉄道にとって一番大事な、安全を保つこと」
2466 = "「Giữ cho nhà ga luôn sạch sẽ, ngăn nắp như thường lệ.\nĐiều đó có nghĩa là duy trì sự an toàn, điều quan trọng nhất đối với đường sắt」"
# 【れいな】
# display as 玲奈
# JP: 「わ、すごいですねぇ。\nかんぺきな答えですよぉ」
2193 = "「Oa, giỏi quá ạ.\nCâu trả lời hoàn hảo luôn」"
# 【ふかみ】
# display as 深美
# JP: 「えと……だってそれ――うちのお仕事。\nクマ川くだりでも、結構、おんなじことかも、だから」
2137 = "「Ờm... vì đó——cũng là công việc nhà chị.\nChèo thuyền trên sông Kuma cũng khá giống vậy, nên là」"
# monologue
# JP: ゴミや汚れを放置してたら、航路の妨げになっちゃうから、\n悪い流れを呼び寄せちゃうから。
3001 = "Nếu cứ để rác rưởi và bụi bẩn bám đầy, sẽ gây cản trở tuyến đường thủy,\ngây ra những luồng chảy xấu."
# monologue
# JP: いつも綺麗にしておくことが、どれほど大事なことなのか、\nわたし自身も、体で知ってることだから。
2888 = "Việc luôn giữ gìn sạch sẽ quan trọng đến mức nào,\nbản thân tôi cũng tự cảm nhận được."
# 【れいな】
# display as 玲奈
# JP: 「なるほどですよぉ」
2599 = "「Ra là vậy ạ」"
# monologue
# JP: うんうんかわいく頷いて、にこおって、\nれいなちゃんはおひさまみたいな笑顔を浮かべる。
3169 = "Ừ ừ gật đầu đáng yêu, cười tít mắt,\nReina nở nụ cười rạng rỡ như ánh mặt trời."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ふかみさんがさっきしてくれたおしごとも、\nきっと、『けっこうおんなじこと』ですよぉ」
2290 = "「Ufufu. Công việc mà chị Fukami vừa làm lúc nãy,\nchắc chắn cũng 『khá giống vậy』 đó ạ」"
# 【ふかみ】
# display as 深美
# JP: 「え？　えと……クマ川くだりのお仕事、と？」
2029 = "「Hả? Ờm... công việc chèo thuyền trên sông Kuma, á?」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。川下りでも、乗務員さん、\nきんちょうしてたら、きっとすっごくあぶないですよね」
2440 = "「Đúng vậy ạ. Dù là chèo thuyền, người lái đò\nmà căng thẳng thì chắc chắn sẽ rất nguy hiểm đúng không ạ」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2229 = "「啊！」" 
# monologue
# JP: わかった。わたしがした――ううん、\nいつもと同じにしていたら、結果的にはできてたお仕事。
3082 = "Tôi hiểu rồi. Điều tôi đã làm——không,\nlàm như mọi khi, kết quả là công việc đã hoàn thành."
# 【ふかみ】
# display as 深美
# JP: 「わたし……凪ちゃんの役にたてたんだ」
2387 = "「Mình... đã giúp ích được cho Nagi rồi」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。機関士訓練の初日でも、\n凪さんきっと、落ち着いてしっかり取り組めますよぉ」
2436 = "「Đúng vậy ạ. Dù là ngày đầu tiên huấn luyện lái tàu,\nchị Nagi chắc chắn cũng sẽ bình tĩnh và làm tốt thôi ạ」"
# 【ふかみ】
# display as 深美
# JP: 「そっか……そうなんだ」
2600 = "「Ra vậy... là thế à」"
# monologue
# JP: 川がレールで、舟が列車。\nそうして、駅は発船所。
3145 = "Sông là đường ray, thuyền là tàu.\nVà nhà ga chính là bến đò."
# 【ふかみ】
# display as 深美
# JP: 「鉄道も、川下りとおんなじなんだ。全部が大事で――\n大事じゃないところなんて、ひとつもない」
2634 = "「Đường sắt cũng giống như chèo thuyền trên sông vậy. Mọi thứ đều quan trọng——\nKhông có chỗ nào là không quan trọng cả」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。鉄道は、システムですからぁ」
2443 = "「Đúng vậy ạ. Đường sắt, là một hệ thống mà」"
# 【ふかみ】
# display as 深美
# JP: 「システム」
2542 = "「Hệ thống」"
# monologue
# JP: 川のこと、生態系のことを勉強した時、\nシステムについても教わった。
2974 = "Khi học về sông ngòi, về hệ sinh thái,\ntôi cũng được dạy về hệ thống."
# monologue
# JP: 部分部分がお互いに影響しあって、全体をつくる。\n川も、システム。鉄道も。どこかが狂えば、全部が狂う。
3140 = "Từng bộ phận ảnh hưởng lẫn nhau, tạo nên một tổng thể.\nSông cũng là hệ thống. Đường sắt cũng vậy. Một chỗ trục trặc, tất cả sẽ trục trặc theo."
# 【ふかみ】
# display as 深美
# JP: 「れいなちゃん、ありがとう。わたし、お掃除の大事さ、\nさっきよりもっと、深くわかった」
2512 = "「Reina, cảm ơn em. Chị đã hiểu sâu sắc hơn về\ntầm quan trọng của việc dọn dẹp so với lúc nãy rồi」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、とーってもたのもしいですぅ。\nそれじゃあ、よろしくおねがいしますねぇ」
2288 = "「Ufufu, đáng tin cậy lắm luôn ạ.\nVậy thì, trăm sự nhờ chị nhé」"
# 【ふかみ】
# display as 深美
# JP: 「うん！　れいなちゃんもご安全に！」
2254 = "「Ừ! Reina cũng chú ý an toàn nhé!」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、ですよぉ」
2528 = "「Vâng, ạ」"
# monologue
# JP: れいなちゃんもぽてぽてのんびり、\n機関庫のわき、留置線の方にむかってく。
3172 = "Reina cũng thong thả bước đi,\nhướng về phía đường tránh bên cạnh xưởng đầu máy."
# monologue
# JP: 8620が機関庫からでたら機関庫に入って、\nそして、発車前の整備をするんだ。
3296 = "8620 ra khỏi xưởng thì sẽ vào xưởng,\nvà tiến hành bảo dưỡng trước khi xuất phát."
# 【ふかみ】
# display as 深美
# JP: 「……いっつもぼんやりは見てたけど。意味がわかると\n……意味を考えると、景色、全然違ってくる」
1557 = "「...Lúc nào cũng chỉ nhìn bâng quơ. Khi hiểu được ý nghĩa\n...khi nghĩ về ý nghĩa của nó, cảnh vật trông hoàn toàn khác biệt」"
# monologue
# JP: 全部が、ひとつに繋がってる。
2855 = "Tất cả, đều được kết nối thành một."
# monologue
# JP: ちゃんと整備をしておかなくちゃ、\n一両がもし止まっちゃったら、次の列車も動かなくなる。
3002 = "Nếu không bảo dưỡng đàng hoàng,\nmột toa mà dừng lại, chuyến tàu tiếp theo cũng không thể chạy được."
# 【ふかみ】
# display as 深美
# JP: 「わたしのお仕事も、大事なんだ」
2409 = "「Công việc của mình, cũng rất quan trọng」"
# monologue
# JP: 駅での小さなトラブルも、列車全部を止めちゃいかねない。\n列車がもしも止まったら、いろんなことに影響していく。
3247 = "Một sự cố nhỏ ở nhà ga cũng có thể khiến toàn bộ đoàn tàu dừng lại.\nNếu tàu dừng lại, sẽ ảnh hưởng đến rất nhiều thứ."
# 【ふかみ】
# display as 深美
# JP: 「わたしにできること。\n今は、まだほんの少しだけしかないけど――」
2643 = "「Những việc mình có thể làm.\nBây giờ, tuy vẫn chỉ có một chút thôi nhưng——」"
# monologue
# JP: だからこそ、焦らず丁寧にやっていこう。\nひとつ、ひとつを、確かめながら重ねていこう。
2865 = "Chính vì thế, không được vội vàng mà phải làm thật cẩn thận.\nTừng việc, từng việc một, vừa xác nhận vừa tích lũy."
# 【ふかみ】
# display as 深美
# JP: 「そうしたらきっと――わたしのレールも伸びていく」
2547 = "「Nếu vậy thì chắc chắn——đường ray của em cũng sẽ kéo dài ra」"
# monologue
# JP: 双鉄おにいさんのレールを、\n凪ちゃんのレールを追いかけて。
3164 = "Đuổi theo đường ray của anh Soutetsu,\nđường ray của Nagi."
# monologue
# JP: ずっとずうっと――\nどうか一緒に、走れるように。
3158 = "Mãi mãi, mãi mãi——\nCầu mong sao có thể cùng nhau chạy tiếp."
# monologue
# JP: （ぷぁん！）
3294 = "（Tuýt!）"
# 【ふかみ】
# display as 深美
# JP: 「いってらっしゃーい！　です！！」
1986 = "「Đi đường bình an nhé! Ạ!!」"
# monologue
# JP: ……緑の旗と赤の旗、\n結局、一度もふらないですんだ。
1522 = "...Cờ xanh và cờ đỏ,\nrốt cuộc tôi chẳng phải phất lần nào."
# monologue
# JP: みんな、マナーのいいお客さんだし、\n駆け込み乗車とかも全然ないし。
2871 = "Mọi người đều là những hành khách lịch sự,\ncũng không có ai chen lấn lên tàu cả."
# 【ふかみ】
# display as 深美
# JP: 「あとは、お掃除済んだらおしまい！」
2424 = "「Giờ thì, dọn dẹp xong là xong việc!」"
# monologue
# JP: ……勤務時間、あっという間だった。
1512 = "...Thời gian làm việc, trôi qua nhanh như chớp."
# monologue
# JP: 本当は、\x%lキハ07s;#00ffc040;キハ07s%l;#;の戻ってくるのを待って、\n改札までお手伝いしていきたかったんだけど――
3131 = "Thực ra, tôi muốn đợi \\x%lキハ07s;#00ffc040;Kiha 07S%l;#; quay lại,\nđể giúp soát vé luôn cơ, nhưng mà——"
# 【ふかみ】
# display as 深美
# JP: 「ポーレットさんに言われちゃったし。\n休むときにはしっかり休むことも、安全のためって」
2490 = "「Chị Paulette đã dặn rồi.\nLúc nghỉ ngơi thì phải nghỉ ngơi đàng hoàng, cũng là vì sự an toàn mà」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、なかなかさまになっとーばい！」
2360 = "「Fukami, ra dáng phết đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「ふわっ！？　凪ちゃん」
2190 = "「Oa!? Nagi」"
# monologue
# JP: びっくりしちゃう。\nいきなり後ろから声かけられて――って、あ。
3029 = "Làm tôi giật cả mình.\nĐột nhiên bị gọi từ phía sau——ơ, a."
# monologue
# JP: 双鉄おにいさんも、一緒。\nふたりとも、服にも顔にも、ススついちゃってる。
3273 = "Cả anh Soutetsu nữa.\nCả hai người, quần áo và mặt mũi đều lấm lem nhọ nồi."
# 【双鉄】
# display as 雙鐵
# JP: 「なかなかどころか、見事なものだ。\n実際、さまになっているぞ」
2585 = "「Đâu chỉ ra dáng, mà là xuất sắc luôn ấy chứ.\nThực sự, rất ra dáng đấy」"
# 【ふかみ】
# display as 深美
# JP: 「あ……ありがとうございます、です」
2570 = "「A... em cảm ơn, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「とても初日とは思えぬ落ち着きだ。\nクマ川下りでの接客経験が物を言っているのだろうな」
2058 = "「Bình tĩnh đến mức không ai nghĩ đây là ngày đầu tiên.\nChắc là nhờ kinh nghiệm tiếp khách lúc chèo thuyền trên sông Kuma đây mà」"
# 【ふかみ】
# display as 深美
# JP: 「それは……はい、です。\nやっぱり、あるって思います」
2596 = "「Chuyện đó... vâng, ạ.\nEm nghĩ là, đúng là có ảnh hưởng ạ」"
# monologue
# JP: だって、クマ川下りがわたしの全部の始まりだから。
2972 = "Vì chèo thuyền trên sông Kuma là khởi đầu cho mọi thứ của tôi mà."
# monologue
# JP: クマ川下りがなかったら、\n凪ちゃんとも、双鉄おにいさんとも会えてないから。
3003 = "Nếu không có chèo thuyền trên sông Kuma,\ntôi đã không gặp được Nagi và anh Soutetsu."
# 【ふかみ】
# display as 深美
# JP: 「けど、やっぱりクマ川下りとは、\n違うところもたくさん、です――っていうか！」
2007 = "「Nhưng mà, so với chèo thuyền trên sông Kuma,\nthì cũng có rất nhiều điểm khác biệt, ạ——mà khoan đã!」"
# monologue
# JP: 双鉄おにいさんも凪ちゃんも、\n乗務を終えてすぐなのに――
3274 = "Cả anh Soutetsu và Nagi,\nvừa mới làm nhiệm vụ xong mà——"
# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい、わたし、引き止めちゃって。\n8620のお手入れとか、まだまだきっとたくさんあるのに」
2340 = "「Xin lỗi, em lại giữ hai người lại.\nChắc vẫn còn rất nhiều việc phải làm, như bảo dưỡng 8620 chẳng hạn」"
# 【凪】
# display as 凪
# JP: 「そいば、\nハチロクと日々ねーちゃんがやってくれとるばい」
2096 = "「Chuyện đó thì,\nHachiroku và chị Hibiki đang làm giúp rồi」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
# 2031 = "「什麼？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「『ふかみ様の初めての駅務なのです。\nどうか、手伝ってあげてください』と言っていたな」
2097 = "「『Đây là ngày đầu tiên cô Fukami làm việc ở nhà ga.\nXin hai người hãy đến giúp cô ấy một tay』, em ấy đã nói vậy đấy」"
# 【凪】
# display as 凪
# JP: 「『こっちはわたしたちに任せて！　ほらほら！』って、\n日々ねーちゃんのああいうとこ、カッコよかばい！」
2428 = "「『Chỗ này cứ giao cho bọn chị! Đi đi, đi đi!』,\nchị Hibiki những lúc như thế ngầu lắm luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「そうなんだ……」
# 2600 = "「這樣啊……」" 
# monologue
# JP: 嬉しい、すごく。\nみんながわたしを気遣ってくれて。
2979 = "Vui quá, thực sự rất vui.\nMọi người đều quan tâm đến tôi."
# monologue
# JP: たった一日のことなのに、昨日よりもっと、ずうっと、\n“仲間”になれたような気がする！
3126 = "Dù chỉ mới một ngày, nhưng tôi cảm thấy mình đã trở thành\n\"đồng đội\" hơn ngày hôm qua rất nhiều!"
# 【凪】
# display as 凪
# JP: 「で？　ふかみちゃんは、駅とクマ川下りと、\nどの辺が違って大変だっておもーとるばい？」
2414 = "「Rồi sao? Fukami thấy nhà ga và chèo thuyền trên sông Kuma,\nkhác nhau chỗ nào mà vất vả thế?」"
# 【ふかみ】
# display as 深美
# JP: 「あ……うん。まずは――\nやっぱり、単純に利用人数が多いなって」
2215 = "「A... ừ. Trước tiên là——\nđơn giản là số lượng người sử dụng đông hơn hẳn」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。今日は休みゆえ、観光客が多かった上……、\n通学客が無いのに、地元の方々の利用も目立っていたな」
2446 = "「Đúng vậy. Hôm nay là ngày nghỉ nên khách du lịch đông...\nHơn nữa, dù không có học sinh đi học, nhưng người dân địa phương đi lại cũng rất đáng kể」"
# 【凪】
# display as 凪
# JP: 「ハイキングとかダム見学ばい！\n[ゆのい,1]湯医は湯医で、観光がんばっとるけんね！！」
2039 = "「Họ đi leo núi dã ngoại hay tham quan đập nước đấy!\nYunoi cũng đang rất nỗ lực làm du lịch mà!!」"
# monologue
# JP: それも、双鉄おにいさんたちの――\nバーベキュー列車のおかげ。
3256 = "Đó cũng là nhờ chuyến tàu BBQ——\ncủa nhóm anh Soutetsu."
# monologue
# JP: せっかく来た人達がすぐ川下りか折り返しで帰っちゃうの、\nもったいないって、あれこれ工夫をしてくれてる。
3261 = "Khách cất công đến đây mà chỉ đi thuyền rồi về ngay thì phí quá,\nnên mọi người đã nghĩ ra đủ cách để giữ chân họ."
# 【双鉄】
# display as 雙鐵
# JP: 「大変にありがたいことだな。やはり、点ではなく、\n線での発展こそが、鉄道の目指すべきところだろう」
2522 = "「Thật đáng mừng. Quả nhiên, phát triển theo tuyến\nchứ không phải theo điểm, mới là mục tiêu mà đường sắt hướng tới」"
# 【ふかみ】
# display as 深美
# JP: 「でも……発展にお掃除が追いついてないのかも、です。\n結構、おトイレの汚れめだっちゃうかも、って」
2126 = "「Nhưng mà... có lẽ việc dọn dẹp chưa theo kịp sự phát triển, ạ.\nEm thấy nhà vệ sinh có vẻ khá bẩn」"
# 【凪】
# display as 凪
# JP: 「おトイレの汚れ……って！　ふかみちゃん！？\nトイレ掃除ばしとるばい！？」
2495 = "「Nhà vệ sinh bẩn... hả! Fukami!?\nCậu đi dọn nhà vệ sinh luôn á!?」"
# 【ふかみ】
# display as 深美
# JP: 「うん。だってお掃除、お仕事だし」
2264 = "「Ừ. Vì dọn dẹp là công việc của tớ mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……トイレに関しては、確か\nボランティアの方々の仕事であった筈だが」
2140 = "「Không... về nhà vệ sinh, anh nhớ không nhầm thì\nđó là công việc của các tình nguyện viên mà」"
# 【ふかみ】
# display as 深美
# JP: 「えと、わたしまだ駅のことほとんどわからないし――\nだからおトイレ、しっかり細かくみたかったから」
2514 = "「Ờm, em vẫn chưa biết gì nhiều về nhà ga——\nNên em muốn xem xét nhà vệ sinh thật kỹ càng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　その言い方だと――\nトイレを見れば駅がわかる、というように聞こえるが」
2276 = "「Hửm? Em nói vậy——\nnghe cứ như nhìn nhà vệ sinh là biết được nhà ga vậy」"
# 【ふかみ】
# display as 深美
# JP: 「駅が、っていうか。その場所が、です。\n結構、わかるものですよ？」
1990 = "「Không chỉ nhà ga đâu. Mà là nơi đó, ạ.\nCó thể biết được khá nhiều điều đấy?」"
# 【凪】
# display as 凪
# JP: 「トイレから、いったい何がわかると？」
2554 = "「Từ nhà vệ sinh thì biết được cái gì chứ?」"
# 【ふかみ】
# display as 深美
# JP: 「一番汚れやすいところだから――\nその場所が、どれだけ大事にされてるか――とか」
2494 = "「Vì đó là nơi dễ bẩn nhất——\nNên có thể thấy được nơi đó được trân trọng đến mức nào——chẳng hạn」"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ」
2148 = "「Ưm」"
# 【凪】
# display as 凪
# JP: 「あうう～」
2207 = "「Auu~」"
# monologue
# JP: 言った途端に、凪ちゃんも双鉄おにいさんも、\nすごく、バツの悪そうな顔になっちゃう。
3075 = "Vừa dứt lời, cả Nagi và anh Soutetsu,\nđều lộ vẻ mặt rất khó xử."
# 【双鉄】
# display as 雙鐵
# JP: 「駅は……確かに、任せきりにしてしまっているな。\n僕らの領分は、機関車と機関庫までという意識がある」
2538 = "「Nhà ga... đúng là chúng ta đã phó mặc hoàn toàn cho người khác.\nTrong tiềm thức, chúng ta luôn nghĩ lãnh địa của mình chỉ đến đầu máy và xưởng đầu máy thôi」"
# 【ふかみ】
# display as 深美
# JP: 「そこは！　全然！！　役割分担って思います。\nわたし、機関車のお掃除きっとできないし――」
2397 = "「Chuyện đó! Hoàn toàn!! Em nghĩ là do phân công vai trò thôi.\nEm chắc chắn không thể dọn dẹp đầu máy được——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうかもしれんが――\nしかし、そうだな。トイレは言われてみると、実際……」
2015 = "「Có lẽ vậy——\nNhưng mà, đúng thế. Nhắc đến nhà vệ sinh, thực ra...」"
# 【凪】
# display as 凪
# JP: 「ストーブ客車も07sもおトイレついとらんけんね。\nお客さんも、急かされて使っとる感じと思うばい」
2293 = "「Toa hành khách có lò sưởi và 07S đều không có nhà vệ sinh mà.\nChắc hành khách cũng phải dùng trong vội vã thôi」"
# 【ふかみ】
# display as 深美
# JP: 「それは……きっと、旅の楽しさ減らしちゃうよね。\n入ったトイレがちょっとでも汚かったら、それだけで」
2602 = "「Như vậy... chắc chắn sẽ làm giảm đi niềm vui của chuyến đi.\nChỉ cần bước vào nhà vệ sinh hơi bẩn một chút thôi, là đủ rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。僕らにとっては、普段の景色であっても、\n旅人にとっては、旅の想い出の一コマなわけだし」
2458 = "「Đúng vậy. Đối với chúng ta, đó có thể là cảnh vật thường ngày,\nnhưng với du khách, đó là một phần trong kỷ niệm chuyến đi của họ」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。だからおトイレ、掃除してよかったです」
2442 = "「Đúng vậy ạ. Thế nên em dọn dẹp nhà vệ sinh là đúng rồi」"
# 【凪】
# display as 凪
# JP: 「あううう～そんなん、\nちょっとも気づかんかったとよー」
2249 = "「Auuu~ Chuyện đó,\ntớ hoàn toàn không nhận ra luôn」"
# monologue
# JP: 凪ちゃんが頭を抱えちゃう。\nと思ったら、次の瞬間には腕まくりっ！？
3025 = "Nagi ôm đầu.\nNhưng ngay giây tiếp theo, cậu ấy đã xắn tay áo lên!?"
# 【凪】
# display as 凪
# JP: 「うち、今からいってトイレ掃除ばしてくるばいっ！」
2173 = "「Tớ, bây giờ sẽ đi dọn nhà vệ sinh đây!」"
# 【ふかみ】
# display as 深美
# JP: 「その気持ちだけで十分だよ！　凪ちゃん！\n双鉄おにいさんにもいったけど、そこは役割分担だし」
2072 = "「Chỉ cần có tấm lòng đó là đủ rồi! Nagi!\nTớ cũng đã nói với anh Soutetsu rồi, đó là phân công công việc mà」"
# 【凪】
# display as 凪
# JP: 「やけん！　今のふかみちゃんの役割、\nお手伝いして助けるけん！！」
2175 = "「Thì thế! Tớ sẽ giúp một tay\ncho công việc hiện tại của Fukami!!」"
# 【ふかみ】
# display as 深美
# JP: 「でもでも、おトイレ掃除おわったばっかりだし！\nそれに……ちゃんと、全体で取り組まなくちゃだから」
2128 = "「Nhưng mà, tớ vừa mới dọn xong nhà vệ sinh mà!\nHơn nữa... phải giải quyết vấn đề này một cách tổng thể cơ」"
# 【凪】
# display as 凪
# JP: 「全体で取り組むって――どういう意味ばい？」
2368 = "「Giải quyết tổng thể——là sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ええと――一番簡単なこといったら、凪ちゃんが\n乗務の間は、凪ちゃんおトイレ掃除できないでしょう？」
2145 = "「Ờm——nói đơn giản nhất nhé, trong lúc Nagi\nđang làm nhiệm vụ trên tàu, cậu đâu có dọn nhà vệ sinh được đúng không?」"
# 【凪】
# display as 凪
# JP: 「そりゃそうばい」
2627 = "「Thì đúng là vậy」"
# 【ふかみ】
# display as 深美
# JP: 「だから、凪ちゃんだけががんばっても、\nわたしだけががんばっても、問題の解決にはならない」
2413 = "「Thế nên, dù chỉ có Nagi cố gắng,\nhay chỉ mình tớ cố gắng, thì cũng không giải quyết được vấn đề」"
# 【凪】
# display as 凪
# JP: 「あー、うん。ピカピカのときもあって、\n汚れてるときもあるトイレになっちゃうだけばい」
2266 = "「A, ừ. Nhà vệ sinh sẽ thành cái kiểu lúc thì sạch bong,\nlúc thì bẩn thỉu thôi」"
# 【ふかみ】
# display as 深美
# JP: 「でしょ？　だから、誰か一人の力でじゃなくて。\n御一夜鉄道で――組織で改善していくべきって思うの」
2433 = "「Đúng không? Vì vậy, không phải chỉ dựa vào sức của một người.\nMà đường sắt Ohito——phải cải thiện vấn đề này với tư cách là một tổ chức」"
# 【凪】
# display as 凪
# JP: 「組織として……ばい？」
1558 = "「Với tư cách là tổ chức... sao?」"
# 【ふかみ】
# display as 深美
# JP: 「うん。基本的には……列車が入って来る前に、\n毎回おトイレ掃除を済ませておければ、一番いいよね」
2270 = "「Ừ. Về cơ bản thì... trước khi tàu vào ga,\nmỗi lần đều dọn dẹp nhà vệ sinh xong xuôi là tốt nhất nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\nそれならば旅客は常に清潔なトイレを使えるな」
2116 = "「Ra vậy,\nnếu thế thì hành khách lúc nào cũng được dùng nhà vệ sinh sạch sẽ」"
# 【ふかみ】
# display as 深美
# JP: 「だから、手が空いた人が交代でとか、それが無理なら、\nシルバー人材センターにおねがいして、とか」
2574 = "「Vì thế, những người rảnh rỗi có thể luân phiên nhau, nếu không được,\nthì nhờ Trung tâm nhân lực người cao tuổi, chẳng hạn」"
# 【凪】
# display as 凪
# JP: 「ふわわ……ふかみちゃん、すごかとねー」
2180 = "「Oaaa... Fukami, cậu giỏi quá nha」"
# monologue
# JP: 凪ちゃんだから、からかったりなんて絶対してない。\nけど――
3080 = "Vì là Nagi nên chắc chắn không phải đang trêu chọc tôi.\nNhưng——"
# 【ふかみ】
# display as 深美
# JP: 「なにが……どこが凄いの？」
1552 = "「Giỏi... ở chỗ nào cơ?」"
# 【凪】
# display as 凪
# JP: 「うちたち、ずーっと駅におったばってん、\nそぎゃんこと、全然見えとらんかったけん」
2169 = "「Bọn tớ, ở nhà ga suốt mà,\nhoàn toàn không nhìn ra mấy chuyện đó luôn」"
# 【ふかみ】
# display as 深美
# JP: 「その分、\n凪ちゃんにはわたしに見えないものが見えるでしょ？」
2043 = "「Bù lại,\nNagi cũng nhìn thấy những thứ mà tớ không thấy được đúng không?」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんに、見えんもの？？」
2066 = "「Thứ mà Fukami, không nhìn thấy á??」"
# 【ふかみ】
# display as 深美
# JP: 「どんな石炭がよく燃えるかとか、煙の色の違いとか、\n[ハチロクニイマル,3]8620のご機嫌だとか、そういうの」
2476 = "「Ví dụ như than nào cháy tốt, sự khác biệt về màu khói,\nhay tâm trạng của 8620, những thứ như vậy」"
# 【凪】
# display as 凪
# JP: 「あ！　そりゃ、そんなんは見えるばってん」
2228 = "「A! Cái đó thì, tớ nhìn ra được」"
# 【ふかみ】
# display as 深美
# JP: 「わたしには、おトイレのことが、『そんなん』なの。\n小さなころから、ママに教わってただけのことだから」
2342 = "「Với tớ, chuyện nhà vệ sinh cũng giống như 『cái đó』 vậy.\nChỉ là từ nhỏ tớ đã được mẹ dạy cho thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2115 = "「Ra là vậy」"
# monologue
# JP: 双鉄おにいさんが、深く頷く。\nそれからじ――って、わたしの目を見る。
3277 = "Anh Soutetsu gật gù.\nRồi nhìn chằm chằm——vào mắt tôi."
# monologue
# JP: 胸がドキドキしはじめて――\nそれでも、まだじいっと見ていてくれてる。
3090 = "Tim tôi bắt đầu đập thình thịch——\nDù vậy, anh ấy vẫn nhìn tôi chăm chú."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの目は、観光事業者としての『目』なのだな。\nその目に見えるものは確かに、僕らの景色とは違おう」
2070 = "「Ánh mắt của Fukami, là 『ánh mắt』 của một người làm du lịch nhỉ.\nNhững gì em nhìn thấy chắc chắn khác với cảnh vật mà bọn anh thấy」"
# 【ふかみ】
# display as 深美
# JP: 「はい……です」
2463 = "「Vâng... ạ」"
# monologue
# JP: あ、やだ。胸、しゅんとして、ズキンってしちゃう。\n双鉄おにいさん、わたしをほめてくれているのに――
3214 = "A, không. Ngực tôi chợt hẫng đi, nhói đau.\nAnh Soutetsu đang khen tôi, vậy mà——"
# monologue
# JP: 自分でいった、わかりきってることなのに――\n双鉄おにいさんの“僕ら”に、わたし、入ってなくて。
3222 = "Chính tôi đã nói ra, một điều hiển nhiên——\nTrong chữ \"chúng ta\" của anh Soutetsu, không có tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「頼りにしているぞ。その目で僕らに足りないところを、どんどん見つけて、指摘してくれ」
2631 = "「Anh trông cậy vào em đấy. Hãy dùng đôi mắt đó để tìm ra và chỉ cho bọn anh\nnhững thiếu sót của mình nhé」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2218 = "「啊」" 
# 【凪】
# display as 凪
# JP: 「そうばい！　そしたらきっと凪さま！\nふかみちゃんに、もっと綺麗な景色ば見せるけん！」
2460 = "「Đúng vậy! Nếu thế thì chắc chắn Nagi này!\nSẽ cho Fukami thấy những cảnh sắc đẹp hơn nữa!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！！」
2256 = "「Ừm!!」"
# monologue
# JP: だけど。だから。\n見えてるものが違うから、わたしが入れる“僕ら”もある。
2887 = "Nhưng. Vì thế.\nVì nhìn thấy những thứ khác nhau, nên cũng có chữ \"chúng ta\" mà tôi có thể bước vào."
# monologue
# JP: その幸せを大事にしよう。\n足りないものを、掴めないものを欲しがるんじゃなく。
3182 = "Hãy trân trọng niềm hạnh phúc đó.\nChứ không phải khao khát những thứ còn thiếu, những thứ không thể với tới."
# monologue
# JP: （ぶーっ！　ぶーっ！　ぶーーーっ！）
3292 = "（Buuu! Buuu! Buuuuuu!）"
# 【凪】
# display as 凪
# JP: 「ひゃん！！」
2133 = "「Á!!」"
# 【ふかみ】
# display as 深美
# JP: 「どうしたの！？　凪ちゃん！」
2350 = "「Sao vậy!? Nagi!」"
# 【凪】
# display as 凪
# JP: 「ごめん、ふかみちゃん！　時間ばい！！」
2341 = "「Xin lỗi nha Fukami! Đến giờ rồi!!」"
# 【ふかみ】
# display as 深美
# JP: 「時間、って？」
2465 = "「Đến giờ, là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「道場だ。御一夜の町の、剣道場」
2111 = "「Đạo đường. Đạo đường kiếm đạo ở thị trấn Ohito」"
# 【ふかみ】
# display as 深美
# JP: 「え！？　剣術じゃなくて、剣道の？」
2156 = "「Hả!? Không phải kiếm thuật, mà là kiếm đạo sao?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　うち、あんまり頭のよくなかけん。\nどぎゃん道が一番よかとか――わからんくて」
2462 = "「Đúng vậy! Tớ không được thông minh cho lắm.\nNên không biết con đường nào là tốt nhất——」"
# 【ふかみ】
# display as 深美
# JP: 「まさか……それで……わかるまで、\n全部ためしてる、の？」
2647 = "「Không lẽ... vì thế... cho đến khi hiểu ra,\ncậu định thử hết mọi thứ sao?」"
# 【凪】
# display as 凪
# JP: 「さすがふかみちゃん、大正解ばい！」
2525 = "「Quả là Fukami, chính xác luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「わ！」
# 2189 = "「哇！」" 
# monologue
# JP: （パンっ！）
3291 = "（Bốp!）"
# monologue
# JP: ハイタッチ！
3107 = "Đập tay!"
# monologue
