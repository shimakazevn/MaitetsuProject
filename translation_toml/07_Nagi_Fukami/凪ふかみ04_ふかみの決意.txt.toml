2061 = "「Sự nổi tiếng đấy. Vì em là một nhân viên nhà ga dễ thương và dễ gần mà.\nAi cũng muốn đến hỏi chuyện em cả」"
# 【ふかみ】
# display as 深美
# JP: 「ふわっ、えっ！？　わ！！！」
2028 = "「Oa, hả!? Oaaa!!!」"
# monologue
