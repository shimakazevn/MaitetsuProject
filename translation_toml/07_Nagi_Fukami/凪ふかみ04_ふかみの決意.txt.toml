3023 = "Nagi vung tay ra,\nnên tôi cũng đập tay lại gần như phản xạ có điều kiện."
# monologue
# JP: （パンっ！！）
3290 = "（Bốp!!）"
# monologue
# JP: そのまま凪ちゃんは双鉄おにいさんともハイタッチして、\n荷物をまとめて――もう走り出してる！
2993 = "Nagi cứ thế đập tay với cả anh Soutetsu,\nthu dọn đồ đạc——và chạy vụt đi mất rồi!"
# 【凪】
# display as 凪
# JP: 「そしたら、お先に失礼ばーーい！」
2613 = "「Vậy thì, em xin phép đi trướcccc!」"
# 【双鉄】
# display as 雙鐵
# JP: 「先生に失礼のないようにな！\n僕も、上がり次第で向かう！！」
2343 = "「Nhớ đừng thất lễ với thầy nhé!\nAnh xong việc cũng sẽ qua đó ngay!!」"
# 【凪】
# display as 凪
# JP: 「待っとるばーーーい！」
2174 = "「Em đợi anh nhaaaa!」"
# 【ふかみ】
# display as 深美
# JP: 「ばいばい、凪ちゃん！　気をつけて！」
2423 = "「Bye bye Nagi! Đi cẩn thận nhé!」"
# 【凪】
# display as 凪
# JP: 「ばいばいばーい！！」
2422 = "「Bye bye nhaaa!!」"
# 【ふかみ】
# display as 深美
# JP: 「もういいから！　前見て！　前っ！！」
2108 = "「Được rồi! Nhìn phía trước đi! Phía trướcccc!!」"
# monologue
# JP: にっこり笑顔だけを残して、\n凪ちゃん、そのまま駆けていっちゃう。
3027 = "Chỉ để lại một nụ cười rạng rỡ,\nNagi cứ thế chạy vụt đi."
# monologue
# JP: ……っていうか、双鉄おにいさん。\n凪ちゃんの剣道、やっぱり見てあげてるんだ。
1533 = "...Mà này, anh Soutetsu.\nQuả nhiên là đang theo dõi việc học kiếm đạo của Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ふかみ。\n僕は、何を手伝えばいい？」
2375 = "「Sao thế? Fukami.\nAnh có thể giúp gì được không?」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2218 = "「啊」" 
# monologue
# JP: じゃ、ない。わたし。\nこれもおんなじ。
2925 = "Không phải. Mình.\nCái này cũng giống vậy."
# monologue
# JP: 無い物ねだりするんじゃなくて、\n今この時間を大事にしなきゃ。
3141 = "Không phải là đòi hỏi những thứ mình không có,\nmà phải trân trọng khoảng thời gian hiện tại."
# 【ふかみ】
# display as 深美
# JP: 「それじゃ、ホームのお掃除の……えと、\n湯医に向かっていく方の半分、お願いできますか？」
2617 = "「Vậy thì, việc dọn dẹp sân ga... ờm,\nanh có thể giúp em một nửa phía hướng đi Yunoi được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[ゆのいかた,2]湯医方だな。任された」
2500 = "「Hướng Yunoi nhỉ. Giao cho anh」"
# monologue
# JP: ……双鉄おにいさん、すごくあっさり向こうにいっちゃう。\nちょっとさみしい気持ちもするけど――
1539 = "...Anh Soutetsu quay đi một cách rất dứt khoát.\nTuy có chút cảm giác hụt hẫng nhưng——"
# monologue
# JP: だけど、それでも引き締めなくちゃ。\nホームを綺麗にすることが、わたしに出来るお手伝い！
2867 = "Nhưng dù vậy, mình vẫn phải xốc lại tinh thần.\nLàm sạch sân ga chính là sự giúp đỡ mà mình có thể làm!"
# 【おっさん】
# display as 大叔
# JP: 「お嬢ちゃん、ちょっと聞きたいんだが、\nきっぷの払いもどしはどこでやれば？」
2353 = "「Cô bé ơi, cho bác hỏi một chút,\nmuốn hoàn tiền vé thì phải đến đâu?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、はい！\nそれは、えと、レールショップになります。です」
2237 = "「A, vâng!\nCái đó, ờm, bác đến Cửa hàng đường sắt ạ. Ạ」"
# monologue
# JP: あと、これも。\nご案内も、わたしにできるお手伝い。
3104 = "Còn nữa, cái này.\nHướng dẫn cho khách cũng là sự giúp đỡ mà tôi có thể làm."
# monologue
# JP: （くいくいっ）
3293 = "（Kéo kéo）"
# 【ふかみ】
# display as 深美
# JP: 「え？」
2166 = "「Hả?」"
# 【児童】
# display as 兒童
# JP: 「おねーちゃんおねーちゃん、おといれ、どこぉ？」
2305 = "「Chị ơi chị ơi, nhà vệ sinh ở đâu ạ?」"
# 【ふかみ】
# display as 深美
# JP: 「おトイレはね？　ホームの向こう側の……\nみえる？　あの自動販売機の向こうに」
2068 = "「Nhà vệ sinh hả? Ở phía bên kia sân ga...\nEm thấy không? Ở phía sau máy bán hàng tự động kia kìa」"
# 【児童】
# display as 兒童
# JP: 「あ、わかったぁ。ありがとおおねーちゃん」
2245 = "「A, em biết rồi. Cảm ơn chị nha」"
# 【ふかみ】
# display as 深美
# JP: 「うふふ、どういたしまして」
# 2278 = "「嘿嘿，不用謝」" 
# monologue
# JP: かわいいこ。
3185 = "Đứa bé đáng yêu quá."
# monologue
# JP: じゃなくて、お掃除！\n今度こそちゃんとしなくっちゃ――って！？
2859 = "Không phải, phải dọn dẹp!\nLần này phải làm cho đàng hoàng mới được——ủa!?"
# 【ご老人】
# display as 老人
# JP: 「駅員さん駅員さん。\nこの鉄道には乗り放題きっぷのようなものはあるかねぇ」
2541 = "「Cô nhân viên nhà ga ơi.\nTuyến đường sắt này có loại vé đi không giới hạn không nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「えと……それは――」
2147 = "「Ờm... chuyện đó thì——」"
# monologue
# JP: だめ、これはわたしにはわからない。
3200 = "Chết rồi, cái này thì tôi không biết."
# monologue
# JP: だから、お客さんにご迷惑をかけないように、\n恥ずかしがらずに！
2860 = "Vì thế, để không làm phiền khách hàng,\nkhông được xấu hổ!"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おに――ああう、\nじゃなくて――右田さん！　右田機関士！！」
2646 = "「Anh Soutetsu——Aaa,\nkhông phải——Anh Migita! Lái tàu Migita!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、なんでしょう」
2395 = "「Vâng, có chuyện gì vậy」"
# monologue
# JP: 双鉄おにいさん、すぐ来てくれる。\nおばあさんも、すごく安心した感じになる。
3281 = "Anh Soutetsu đến ngay lập tức.\nBà lão cũng có vẻ rất an tâm."
# 【ご老人】
# display as 老人
# JP: 「ああ、乗り放題きっぷが欲しいんだけど――」
2400 = "「À, tôi muốn mua loại vé đi không giới hạn——」"
# 【双鉄】
# display as 雙鐵
# JP: 「念のためですが、御一夜鉄道[ゆのいせん,2]湯医線には、\n現在、御一夜と湯医の二駅しかありませんので――」
2086 = "「Để chắc chắn thì, tuyến Yunoi của đường sắt Ohito,\nhiện tại chỉ có hai ga là Ohito và Yunoi thôi ạ——」"
# 【ご老人】
# display as 老人
# JP: 「事情があって、[ゆのい,1]湯医までいってまた戻って、\nもう一度湯医にいかねばいけんのよ」
2405 = "「Tôi có chút việc, phải đi đến Yunoi rồi quay lại,\nsau đó lại phải đi Yunoi một chuyến nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどそれは失礼しました。\nそのご利用でしたら、乗り放題きっぷの方がお得です」
2117 = "「Ra là vậy, xin lỗi bà ạ.\nNếu bà đi như thế thì vé đi không giới hạn sẽ rẻ hơn ạ」"
# monologue
# JP: あ、いまの――\nお客さんが損をしないようにって、確かめたんだ。
2964 = "A, vừa nãy——\nAnh ấy đã xác nhận lại để khách hàng không bị thiệt thòi."
# 【双鉄】
# display as 雙鐵
# JP: 「あちらに渡りまして、レールショップで、\n『御一夜[ひとよ,1]一夜きっぷ』をお求めください」
2569 = "「Bà đi qua bên kia, đến Cửa hàng đường sắt,\nrồi hỏi mua 『Vé Ohito Một Đêm』 nhé」"
# 【ご老人】
# display as 老人
# JP: 「ああ、あるんだねぇ。ありがとう」
2204 = "「À, có loại đó nhỉ. Cảm ơn cậu」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁ……」
2177 = "「Oa...」"
# monologue
# JP: 双鉄おにいさん、かっこいい！
3275 = "Anh Soutetsu, ngầu quá!"
# monologue
# JP: 機関士さんなのに、きっぷのこともばっちりで、\n接客態度もすごく綺麗で！
3242 = "Là lái tàu mà lại rành rẽ chuyện vé tàu,\nthái độ tiếp khách cũng vô cùng lịch thiệp!"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。どうやら少し、落ち着いたか?\nしかし――さすがだな、ふかみは」
2272 = "「Ưm. Có vẻ em đã bình tĩnh lại một chút rồi nhỉ?\nNhưng mà——Fukami giỏi thật đấy」"
# 【ふかみ】
# display as 深美
# JP: 「ひえっ！？　わたっ、わたし、の――\nわたしの、なにが――さすが――ですっ！？」
2158 = "「Hiee!? E, em, thì——\nem có gì——mà giỏi——ạ!?」"
# 【双鉄】
# display as 雙鐵
