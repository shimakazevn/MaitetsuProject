# 【ふかみ】
# display as 深美
# JP: 「わたし、教えて欲しい、です。\n駅にいたら聞かれることとか、その答えとか、全部」
2200 = "「哥哥來教教我吧，嗯。乘客們會問的問題的所有答案」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全部か。全部は僕にもわからんし、\n一度に伝えることも無理だが――少しずつでよければ」
2093 = "「全部啊，我也不是什麼都懂，一次性全部教給你也不太可能，慢慢來吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　よいです！　少しずつ――何日も何ヶ月も\n何年もかけて――って、それじゃお客様に御迷惑っ！」
2326 = "「好！　我會慢慢學習，不管要花幾天、幾個月、還是幾年——啊，學太久也會給乘客們造成困擾的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、焦ることはない。教えるのは僕だけでなし。\nそんなに時間をかけずともふかみなら覚えられるさ」
2195 = "「哈哈，不用急。不只是我一個人教你。你這麼聰明，花不了多少時間就能記住的」" 

# 【ふかみ】
# display as 深美
# JP: 「はい――です。\nわたし、がんばります！　ですっ」
2322 = "「好的，嗯。我會努力的，嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばまずは、掃除を終わらせ――\nその帰り道から始めることとするか」
2615 = "「那就先搞定清潔工作，回家路上我就開始教你吧」" 

# monologue
# JP: 帰り道！！\nあ――でも、双鉄おにいさん道場にいっちゃうから……
2970 = "回家路上！！啊，可是雙鐵哥哥還要去道場……" 

# monologue
# JP: ううん、それでも構わない、\nそれまでの時間の双鉄おにいさんに甘えちゃおう。
3143 = "沒關係，還是專心享受屬於我們的獨處時間吧。" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　それでおねがいします、です！」
2319 = "「好的！　那就麻煩你了，嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。では、掃除を再開しよう」
2329 = "「好，那就繼續打掃吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！！」
2320 = "「好的！！」" 

# monologue
# JP: さらさらさらって、川の音。\nわたしの、一番好きな音。
3208 = "耳邊傳來悅耳的水流聲，是我最喜歡的聲音。" 

# monologue
# JP: 大きな舟に揺すられて――\nあれ？　違うこれ――舟――じゃない。
2980 = "大船輕輕搖擺著……咦？　不對，這不是船。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……ふかみがペース配分を間違えるとはな」
2006 = "「不過……真沒想到深美會掌握不好工作節奏啊」" 

# monologue
# JP: 背中。おっきい――\n双鉄おにいさんの、おっきな背中。
3193 = "眼前是雙鐵哥哥寬闊的脊背。" 

# monologue
# JP: だから――わたし――おんぶされてる！？\nあうっ――わたし、えと――どうしようっ！？
3099 = "所以雙鐵哥哥這是在背著我走路嗎！？我、我該怎麼辦！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのまま寝ていろ。家まで送る」
2548 = "「繼續睡吧，我送你回家」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2218 = "「啊」" 

# monologue
# JP: わたし、起きたのバレちゃった。\nバレちゃったけど――このままでいいって、言ってくれた。
3276 = "雙鐵哥哥已經發現我醒了。但他還是讓我繼續這樣待著。" 

# monologue
# JP: すごく、うれしい。ふわふわする。\n双鉄おにいさんの背中、とってもあったかい。
3094 = "我開心得都有些飄飄然了。他的後背好溫暖。" 

# 【ふかみ】
# display as 深美
# JP: 「あの……わたし、いつ？」
2610 = "「那個……我什麼時候睡著的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「張り切りすぎだろうな。きっぷの説明をしていたら、\n見るからにもう、眠くてたまらんという風情になって」
2057 = "「你工作太賣力了吧。我在介紹車票時看了你一眼，發現你已經快睡著了」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……」
# 2209 = "「啊……」" 

# monologue
# JP: 言われたらちょっと思い出す。そうだ、わたし――\n歩きながら、いろいろなこと教えてもらって……
3258 = "這麼一說好像有些印象。對了，我邊走邊聽雙鐵哥哥教我……" 

# monologue
# JP: そしたら、お話したいのに、\nあたまがぽーって、ふわふわしてきて……
3086 = "我明明想回應他幾句，但腦袋迷迷糊糊……" 

# 【ふかみ】
# display as 深美
# JP: 「おんぶしてもらって――\nすぐ、寝ちゃったんですか？　わたし」
2504 = "「然後雙鐵哥哥把我背起來，我就馬上睡著了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだけ安心してくれたのだろう。\n光栄なことだ」
2516 = "「看來你在我身邊感到很放鬆啊，真是榮幸」" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ」
# 2218 = "「啊」" 

# monologue
# JP: 双鉄おにいさん。\nどうしてこういうこと言えちゃうんだろう。
3278 = "雙鐵哥哥為什麼會這麼說呢。" 

# monologue
# JP: 安心、なんて、わたし全然してないのに。\nドキドキ、こんなにしちゃってるのに。
3092 = "我的心都怦怦直跳了，一點也不放鬆啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当はもっと寝かしておいてやりたかったが――\nゆっくり歩いても、やはり発船所は近すぎる」
2100 = "「其實還想讓你多睡一會的，但是發船點實在太近，就算放慢速度，還是很快就到了」" 

# monologue
# JP: ……普通に歩いて、１５分。\n近いっていう距離じゃない。
1524 = "……正常步行到發船點大約要十五分鐘。這距離怎麼都算不上近。" 

# monologue
# JP: だけど、わたしもおんなじ気持ち。\n１５分なんて、ほんの一瞬――――って、あ！
2882 = "但我也有同感，十五分鐘簡直轉眼就過去了……對了！" 

# 【ふかみ】
# display as 深美
# JP: 「だけど、双鉄おにいさん――\nあの、道場、方角、反対側っ」
2130 = "「可是，雙鐵哥哥……這是道場的反方向吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何ほどのこともない。ふかみを送ったらすぐ着水させ、\nそのまま道場へ送ってもらう」
2482 = "「沒關係。把你送到以後，我就讓Ｎａｖｉ降落，直接送我去道場」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――ナビちゃん」
2202 = "「哦，坐Ｎａｖｉ去啊」" 

# monologue
# JP: 納得したら、ふしぎになる。\nそれなら、わたしのことだって――
3128 = "明白他的意思之後，我又有些疑惑。既然要坐Ｎａｖｉ——" 

# 【ふかみ】
# display as 深美
# JP: 「乗れます、よね？\nわたしと、双鉄おにいさんと、ふたりくらい」
2667 = "「Ｎａｖｉ應該坐得下我們兩個吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに乗れるが――乗りたかったか？」
2539 = "「確實坐得下……你想坐嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「ううん！　全然っ！　あ、ちがくて、ナビちゃんに\n乗りたくないってことじゃなくって！！」
1993 = "「不想！　完全不想！　啊，不對，我不是嫌棄Ｎａｖｉ！！」" 

# monologue
# JP: クスって、双鉄お兄さんが笑う。背中で。\nだから、ぎゅうってしがみついちゃう。
3280 = "雙鐵哥哥輕聲笑出來，引得後背都抖了抖。於是我更加用力地抓緊他。" 

# 【ふかみ】
# display as 深美
# JP: 「降りたくないっていう意味です。\n双鉄おにいさんの背中から――」
2404 = "「我是不想從雙鐵哥哥的背上下來」" 

# monologue
# JP: 双鉄おにいさんの匂いがする。\n汗の匂い。炭の匂い。油の匂い。
3093 = "我聞到了雙鐵哥哥的氣味。那是由汗水、煤炭、油交織而成的氣味。" 

# monologue
# JP: お風呂にもまだ入らないまま、\nわたしと凪ちゃんのために頑張ってくれちゃう匂いが。
3262 = "還未洗去的這股氣味，代表著他為我和小凪所付出的努力。" 

# 【ふかみ】
# display as 深美
# JP: 「今だけは、わたしだけの。\nわたしひとりの――特等席だから」
2294 = "「因為，現在這裡是只屬於我的特等席」" 
