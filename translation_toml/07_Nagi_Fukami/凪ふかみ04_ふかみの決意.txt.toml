3161 = "Dù có phải là sự thật hay không cũng không quan trọng——Anh Soutetsu,\nnghĩ về tôi như vậy khiến tôi vô cùng hạnh phúc!!"
# 【双鉄】
# display as 雙鐵
# JP: 「僕になど、誰一人声をかけん。\nおかげで、掃除がはかどりはしたが」
2081 = "「Chẳng có ai bắt chuyện với anh cả.\nNhờ vậy mà anh dọn dẹp được kha khá rồi」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの！　わたしっ！！」
2606 = "「A, ờm! Em!!」"
# monologue
# JP: 単なる偶然って思うけど、\nでももしもそうなら、わたし、そこだって活かしたい。
3269 = "Dù nghĩ đó chỉ là sự tình cờ,\nnhưng nếu thực sự là vậy, tôi cũng muốn tận dụng ưu điểm đó."
# monologue
# JP: もしもわたしが話しかけやすい駅員さんなら、\nどんな質問にだって、ちゃんと答えられるようになりたい。
2891 = "Nếu tôi là một nhân viên nhà ga dễ bắt chuyện,\ntôi muốn mình có thể trả lời thỏa đáng mọi câu hỏi."
# 【ふかみ】
# display as 深美
# JP: 「わたし、教えて欲しい、です。\n駅にいたら聞かれることとか、その答えとか、全部」
2200 = "「Em, muốn anh dạy cho em, ạ.\nNhững điều sẽ bị hỏi khi ở nhà ga, và câu trả lời, tất cả mọi thứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「全部か。全部は僕にもわからんし、\n一度に伝えることも無理だが――少しずつでよければ」
2093 = "「Tất cả sao. Tất cả thì anh cũng không biết hết được,\ntruyền đạt hết trong một lần cũng không thể nào——nhưng nếu mỗi lần một chút thì được」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　よいです！　少しずつ――何日も何ヶ月も\n何年もかけて――って、それじゃお客様に御迷惑っ！」
2326 = "「Vâng! Được ạ! Mỗi lần một chút——Dành ra bao nhiêu ngày, bao nhiêu tháng,\nbao nhiêu năm cũng——ơ, thế thì làm phiền khách hàng mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、焦ることはない。教えるのは僕だけでなし。\nそんなに時間をかけずともふかみなら覚えられるさ」
2195 = "「Haha, không cần phải vội. Không chỉ có mình anh dạy em đâu.\nFukami thì chẳng cần mất nhiều thời gian cũng nhớ được thôi」"
# 【ふかみ】
# display as 深美
# JP: 「はい――です。\nわたし、がんばります！　ですっ」
2322 = "「Vâng——ạ.\nEm, sẽ cố gắng! Ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばまずは、掃除を終わらせ――\nその帰り道から始めることとするか」
2615 = "「Vậy thì trước tiên, hãy dọn dẹp cho xong——\nRồi chúng ta sẽ bắt đầu trên đường về nhé」"
# monologue
# JP: 帰り道！！\nあ――でも、双鉄おにいさん道場にいっちゃうから……
2970 = "Đường về!!\nA——nhưng mà, anh Soutetsu phải đến đạo đường mà..."
# monologue
# JP: ううん、それでも構わない、\nそれまでの時間の双鉄おにいさんに甘えちゃおう。
3143 = "Không, dù vậy cũng không sao,\ntôi sẽ làm nũng với anh Soutetsu trong khoảng thời gian đó."
# 【ふかみ】
# display as 深美
# JP: 「はい！　それでおねがいします、です！」
2319 = "「Vâng! Nhờ anh ạ, ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。では、掃除を再開しよう」
2329 = "「Đã rõ. Vậy, tiếp tục dọn dẹp nào」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！！」
2320 = "「Vâng ạ!!」"
# monologue
# JP: さらさらさらって、川の音。\nわたしの、一番好きな音。
3208 = "Tiếng nước róc rách.\nÂm thanh mà tôi thích nhất."
# monologue
# JP: 大きな舟に揺すられて――\nあれ？　違うこれ――舟――じゃない。
2980 = "Bị con thuyền lớn đung đưa——\nỦa? Không phải, đây——không phải——thuyền."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……ふかみがペース配分を間違えるとはな」
2006 = "「Nhưng mà... không ngờ Fukami lại phân bổ sức lực sai lầm thế này」"
# monologue
# JP: 背中。おっきい――\n双鉄おにいさんの、おっきな背中。
3193 = "Tấm lưng. Rộng lớn——\nTấm lưng rộng lớn của anh Soutetsu."
# monologue
# JP: だから――わたし――おんぶされてる！？\nあうっ――わたし、えと――どうしようっ！？
3099 = "Vậy ra——mình——đang được cõng!?\nAuu——mình, ờm——phải làm sao đây!?"
# 【双鉄】
# display as 雙鐵
# JP: 「そのまま寝ていろ。家まで送る」
2548 = "「Cứ ngủ tiếp đi. Anh đưa em về nhà」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2218 = "「啊」" 
# monologue
# JP: わたし、起きたのバレちゃった。\nバレちゃったけど――このままでいいって、言ってくれた。
3276 = "Tôi bị phát hiện là đã thức dậy rồi.\nBị phát hiện rồi——nhưng anh ấy bảo cứ thế này cũng được."
# monologue
# JP: すごく、うれしい。ふわふわする。\n双鉄おにいさんの背中、とってもあったかい。
3094 = "Vui quá. Cảm giác cứ bồng bềnh.\nTấm lưng của anh Soutetsu, ấm áp vô cùng."
# 【ふかみ】
# display as 深美
# JP: 「あの……わたし、いつ？」
2610 = "「Ờm... em ngủ, từ lúc nào vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「張り切りすぎだろうな。きっぷの説明をしていたら、\n見るからにもう、眠くてたまらんという風情になって」
2057 = "「Chắc là em hăng hái quá đấy. Lúc anh đang giải thích về vé tàu,\nnhìn em có vẻ buồn ngủ không chịu nổi nữa rồi」"
# 【ふかみ】
# display as 深美
# JP: 「あ……」
# 2209 = "「啊……」" 
# monologue
# JP: 言われたらちょっと思い出す。そうだ、わたし――\n歩きながら、いろいろなこと教えてもらって……
3258 = "Nghe anh ấy nói tôi mới nhớ ra một chút. Đúng rồi, tôi——\nvừa đi vừa được anh ấy dạy cho rất nhiều thứ..."
# monologue
# JP: そしたら、お話したいのに、\nあたまがぽーって、ふわふわしてきて……
3086 = "Thế rồi, tôi muốn nói chuyện lắm,\nnhưng đầu óc cứ lâng lâng, mơ màng..."
# 【ふかみ】
# display as 深美
# JP: 「おんぶしてもらって――\nすぐ、寝ちゃったんですか？　わたし」
2504 = "「Được anh cõng——\nrồi em ngủ thiếp đi luôn ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけ安心してくれたのだろう。\n光栄なことだ」
2516 = "「Chứng tỏ em rất an tâm khi ở bên anh.\nĐó là một vinh dự đấy」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ」
# 2218 = "「啊」" 
# monologue
# JP: 双鉄おにいさん。\nどうしてこういうこと言えちゃうんだろう。
3278 = "Anh Soutetsu.\nSao anh ấy có thể nói ra những lời như vậy nhỉ."
# monologue
# JP: 安心、なんて、わたし全然してないのに。\nドキドキ、こんなにしちゃってるのに。
3092 = "An tâm gì chứ, tôi hoàn toàn không thấy vậy mà.\nTim tôi đang đập thình thịch thế này cơ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「本当はもっと寝かしておいてやりたかったが――\nゆっくり歩いても、やはり発船所は近すぎる」
2100 = "「Thực ra anh muốn cho em ngủ thêm một chút nữa——\nnhưng dù có đi chậm thì bến đò vẫn quá gần」"
# monologue
# JP: ……普通に歩いて、１５分。\n近いっていう距離じゃない。
1524 = "...Đi bộ bình thường mất 15 phút.\nCũng đâu phải là khoảng cách gần."
# monologue
# JP: だけど、わたしもおんなじ気持ち。\n１５分なんて、ほんの一瞬――――って、あ！
2882 = "Nhưng mà, tôi cũng có cùng cảm giác.\n15 phút, chỉ như một cái chớp mắt——ơ, a!"
# 【ふかみ】
# display as 深美
# JP: 「だけど、双鉄おにいさん――\nあの、道場、方角、反対側っ」
2130 = "「Nhưng mà, anh Soutetsu——\nđạo đường, ở hướng ngược lại mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「何ほどのこともない。ふかみを送ったらすぐ着水させ、\nそのまま道場へ送ってもらう」
2482 = "「Không sao đâu. Đưa Fukami về xong anh sẽ cho hạ cánh ngay,\nrồi nhờ đưa thẳng đến đạo đường luôn」"
# 【ふかみ】
# display as 深美
# JP: 「あ――ナビちゃん」
2202 = "「A——bé Navi」"
# monologue
# JP: 納得したら、ふしぎになる。\nそれなら、わたしのことだって――
3128 = "Hiểu ra rồi, tôi lại thấy kỳ lạ.\nNếu vậy, việc đưa tôi về cũng——"
# 【ふかみ】
# display as 深美
# JP: 「乗れます、よね？\nわたしと、双鉄おにいさんと、ふたりくらい」
2667 = "「Có thể ngồi được, đúng không ạ?\nEm và anh Soutetsu, khoảng hai người」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに乗れるが――乗りたかったか？」
2539 = "「Đúng là ngồi được——em muốn đi chung sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん！　全然っ！　あ、ちがくて、ナビちゃんに\n乗りたくないってことじゃなくって！！」
1993 = "「Không ạ! Hoàn toàn không! A, không phải,\nkhông phải là em không muốn ngồi Navi đâu!!」"
# monologue
# JP: クスって、双鉄お兄さんが笑う。背中で。\nだから、ぎゅうってしがみついちゃう。
3280 = "Anh Soutetsu bật cười khúc khích. Ở trên lưng.\nNên tôi lại ôm chặt lấy anh ấy hơn."
# 【ふかみ】
# display as 深美
# JP: 「降りたくないっていう意味です。\n双鉄おにいさんの背中から――」
2404 = "「Ý em là em không muốn xuống.\nKhỏi lưng của anh Soutetsu——」"
# monologue
# JP: 双鉄おにいさんの匂いがする。\n汗の匂い。炭の匂い。油の匂い。
3093 = "Có mùi của anh Soutetsu.\nMùi mồ hôi. Mùi than. Mùi dầu."
# monologue
# JP: お風呂にもまだ入らないまま、\nわたしと凪ちゃんのために頑張ってくれちゃう匂いが。
3262 = "Vẫn chưa kịp đi tắm,\nmùi hương của sự cố gắng vì tôi và Nagi."
# 【ふかみ】
# display as 深美
# JP: 「今だけは、わたしだけの。\nわたしひとりの――特等席だから」
2294 = "「Bởi vì, chỉ lúc này thôi, đây là chỗ ngồi đặc biệt của riêng em...\nchỉ của một mình em thôi.」"
