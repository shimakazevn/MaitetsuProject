2154 = "「Nếu ngài Soutetsu và Hibiki có gì không\nhiểu,\nthì cứ hỏi tôi bất cứ lúc nào nhé?」"

# monologue
# JP: 言うやいなやで凪はさっさとキャブから出ていく。\nハチロクも、ゆったりとした足取りでその後ろから。
2779 = "Vừa dứt lời, Nagi đã nhanh chóng chạy ra\nkhỏi buồng lái.\nHachiroku cũng thong thả bước theo sau."

# 【ふかみ】
# display as 深美
# JP: 「あぅぅっ」
2099 = "「Auuu.」"

# monologue
