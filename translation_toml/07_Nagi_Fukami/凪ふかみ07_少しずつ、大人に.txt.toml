2520 = "「都是過去的事，現在的她已經不一樣了。她長大了，而且正在努力成為一個淑女」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
2075 = "「啊！」" 

# monologue
# JP: ふかみにも――\nいや、ふかみなら、僕よりよほど思い当たるのだろう。
2977 = "深美也感覺到了……不，她心裡一定比我更有數吧。" 

# monologue
# JP: 返されるうなずきは、少し驚くほど力強い。
2827 = "她用力地點頭回應了我。" 

# 【ふかみ】
