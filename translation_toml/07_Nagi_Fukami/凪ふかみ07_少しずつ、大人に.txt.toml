2222 = "「我們第一次見面的時候，你還是個畏首畏尾、膽小怕生的女孩子」" 

# 【ふかみ】
# display as 深美
# JP: 「あうっ」
# 2099 = "「嗚……」" 

# 【双鉄】
# display as 雙鐵
