2520 = "「Chuyện quá khứ thôi. Nagi bây giờ đã khác\nxưa rồi.\nĐã trưởng thành hơn――và đang nỗ\nlực để trở thành một quý cô.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
2075 = "「A!」"

# monologue
# JP: ふかみにも――\nいや、ふかみなら、僕よりよほど思い当たるのだろう。
2977 = "Cả Fukami cũng――\nKhông, nếu là Fukami, hẳn\nem ấy còn nhận ra rõ hơn tôi."

# monologue
