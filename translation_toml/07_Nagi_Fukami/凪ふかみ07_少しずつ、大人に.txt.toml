# lines: 488 
# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃに、ふかみちゃん、いらっしゃーい」
2074 = "「A! Anh hai, bé Fukami, chào mừng đến đây nha~」"
# 【凪】
# display as 凪
# JP: 「わーい！　ふかみちゃんばい！！」
2040 = "「Oa! Là Fukami kìa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あがってくれ。狭いところで申し訳ないが」
2491 = "「Lên đây đi. Hơi chật chội chút, xin lỗi nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「い、いえ――あの、お邪魔します。ですっ」
2360 = "「D-dạ không——à ừm, làm phiền mọi người ạ. Desu.」"
# monologue
# JP: 緊張しきった声を出し、\nふかみは足を、運転台へとそうっと運ぶ。
3044 = "Bằng một giọng nói đầy căng thẳng, Fukami rón rén bước lên buồng lái."
# 【ふかみ】
# display as 深美
# JP: 「わぁあ」
2038 = "「Oaaa.」"
# monologue
# JP: 感嘆の声が零れ出る。
3005 = "Tiếng cảm thán thốt ra."
# monologue
# JP: 凪の、ハチロクの、日々姫の顔がうふふと緩む。\n恐らく僕も、似たような顔をしているだろう。
2758 = "Gương mặt Nagi, Hachiroku và Hibiki giãn ra với nụ cười 'ufufu'. Có lẽ tôi cũng đang làm vẻ mặt tương tự."
# 【ふかみ】
# display as 深美
# JP: 「すごい……です。レトロなのに新しい感じ。\n機械がむき出しで……綺麗……かっこいい――」
2143 = "「Tuyệt quá…… desu. Rõ ràng là cổ điển nhưng lại mang cảm giác rất mới mẻ. Máy móc lộ hẳn ra ngoài…… đẹp quá…… ngầu quá——」"
# 【凪】
# display as 凪
# JP: 「さっすがふかみちゃん！　良ぉわかっとるばい！」
1886 = "「Quả không hổ danh Fukami! Hiểu biết ghê nha!」"
# 【ハチロク】
# display as 八六
# JP: 「まことに、ですね。[ハチロクニイマル,3]8620は――全ての蒸気機関車は、\n大変に格好良く、美しい機械なのです」
2452 = "「Đúng vậy nhỉ. 8620——và tất cả các đầu máy hơi nước, đều là những cỗ máy vô cùng tuyệt vời và đẹp đẽ.」"
# monologue
# JP: ハチロクの指先が誇らしそうに、水面計のガラスを撫ぜる。
2752 = "Ngón tay Hachiroku đầy tự hào vuốt ve mặt kính của đồng hồ đo mực nước."
# 【ハチロク】
# display as 八六
# JP: 「組み合わさった無数の部品に、一つの無駄もありません。\n機能美という言葉の結晶。それが、わたくしの[このこ,3]8620です」
2432 = "「Vô số bộ phận được lắp ráp lại với nhau, không có một chi tiết nào thừa thãi. Là kết tinh của cụm từ 'vẻ đẹp công năng'. Đó chính là 8620 của tôi.」"
# 【ふかみ】
# display as 深美
# JP: 「機能美――うん。機能美」
2349 = "「Vẻ đẹp công năng——ừm. Vẻ đẹp công năng.」"
# monologue
# JP: ふかみは小さく頷いて、\nあらためてぐるり――運転台の中を見回す。
3053 = "Fukami khẽ gật đầu, rồi lại một lần nữa đảo mắt——nhìn quanh buồng lái."
# 【凪】
# display as 凪
# JP: 「どぎゃんと？　ふかみちゃん」
2199 = "「Thấy sao hả? Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「うん。[しょううちゅう,2]小宇宙――っていう感じがする。\nこの空間に、世界がギュって詰まってる感じ」
2101 = "「Ừm. Có cảm giác như một tiểu vũ trụ——vậy. Như thể cả thế giới được nén chặt lại trong không gian này.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁまぁ！　なんと豊かな表現力でしょう！\nさすが、ふかみ様は読書家でいらっしゃいますね」
2047 = "「Trời ơi trời ơi trời ơi! Sức biểu cảm thật phong phú làm sao! Quả không hổ danh tiểu thư Fukami là một người yêu sách nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの――ハチロク、ちゃん。\nふかみ、様は……えと、やめて欲しい、かも。です」
2498 = "「À, ừm——Hachiroku. Tiểu thư Fukami thì…… ừm, chị đừng gọi em như vậy nữa, được không ạ. Desu.」"
# 【ハチロク】
# display as 八六
# JP: 「はい？」
1912 = "「Dạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2303 = "「À.」"
# monologue
# JP: 僕にはわかる。
2926 = "Tôi hiểu mà."
# monologue
# JP: ハチロクが戸惑ってしまった理由も、\nふかみがそうと申し出た理由も。
3067 = "Cả lý do khiến Hachiroku bối rối, lẫn lý do Fukami lại yêu cầu như vậy."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　明日から見習いじゃなくなるけん！\n御一夜鉄道の仲間やけんね！！」
2175 = "「Fukami! Từ ngày mai cậu sẽ không còn là thực tập sinh nữa! Mà là thành viên của Đường sắt Ohito rồi nha!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
2065 = "「A.」"
# monologue
# JP: 凪も、やはりわかっていた。\n力強い支援をうけて、ふかみの顔がほうっと緩む。
2775 = "Quả nhiên Nagi cũng hiểu. Nhận được sự hỗ trợ mạnh mẽ đó, gương mặt Fukami giãn ra nhẹ nhõm."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、おめでとう、ふかみ」
2107 = "「Chà, chúc mừng em nhé, Fukami.」"
# 【日々姫】
# display as 日日姬
# JP: 「おめでとー！　ふかみちゃん。\n見習い期間、最短でクリアでしょ？　さすが！」
2193 = "「Chúc mừng nha! Bé Fukami. Em vượt qua kỳ thực tập với thời gian ngắn nhất đúng không? Đỉnh quá!」"
# 【ふかみ】
# display as 深美
# JP: 「いえっ、そんな」
2362 = "「Dạ không, đâu có ạ.」"
# 【凪】
# display as 凪
# JP: 「ポーねーちゃんもほめとったばい！！\n接客の経験値が違いすぎるって！」
2375 = "「Chị Paulette cũng khen cậu lắm đó nha!! Bảo là kinh nghiệm tiếp khách khác biệt hoàn toàn luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたし――あのっ――そんなっ……\nふしゅうううう～～」
2208 = "「T-tớ——à ừm——đâu có……\nFushuuuuuu~~」"
# monologue
# JP: さりげなく、明るく受け入れられて、歓迎されて、\nふかみが真っ赤になってしまう。
2871 = "Được chào đón và tiếp nhận một cách tự nhiên và tươi sáng, Fukami đỏ bừng cả mặt."
# monologue
# JP: 可愛らしいが、気の毒だ。\nそれに加えて――
3161 = "Đáng yêu thì đáng yêu thật, nhưng cũng tội nghiệp con bé. Thêm vào đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「祝福には大感謝だが、時間にも限りがある。\n今はふかみに、じっくり見学させてやってはくれんか？」
2205 = "「Rất cảm ơn mọi người đã chúc mừng, nhưng thời gian có hạn. Bây giờ mọi người cứ để Fukami từ từ tham quan được không?」"
# 【凪】
# display as 凪
# JP: 「あ！　そりゃそーばい！　したら凪さま、\n油さしてくるとばい！　まだ途中だったけん！」
2071 = "「A! Đúng rồi ha! Vậy Nagi ta đây, đi tra dầu đây! Vẫn đang làm dở mà!」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。それが合理的判断かと」
2317 = "「Đúng vậy nhỉ. Đó là một quyết định hợp lý đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃん！？　――ハチロクちゃんも！？」
2082 = "「A, Nagi!? ——Cả Hachiroku nữa!?」"
# 【凪】
# display as 凪
# JP: 「ごゆっくりばい！！」
1934 = "「Cứ từ từ tham quan nha!!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様と日々姫でわからないことがあったら、\nいつでもわたくしに尋ねてくれてかまいませんよ？」
2154 = "「Nếu ngài Soutetsu và Hibiki có gì không hiểu, thì cứ hỏi tôi bất cứ lúc nào nhé?」"
# monologue
# JP: 言うやいなやで凪はさっさとキャブから出ていく。\nハチロクも、ゆったりとした足取りでその後ろから。
2779 = "Vừa dứt lời, Nagi đã nhanh chóng chạy ra khỏi buồng lái. Hachiroku cũng thong thả bước theo sau."
# 【ふかみ】
# display as 深美
# JP: 「あぅぅっ」
2099 = "「Auuu.」"
# monologue
# JP: ふかみの苦笑。\n困惑と喜びとが入り混じっているように見える。
3035 = "Fukami cười khổ. Trông có vẻ như đang xen lẫn giữa sự bối rối và niềm vui."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんに気をつかわせたくなかったのに～」
2231 = "「Tớ không muốn làm Nagi phải bận tâm đâu mà~」"
# 【日々姫】
# display as 日日姬
# JP: 「気ばつかっただけじゃなかとよ。\nハチロクもいうとったけど、こいばこいで、合理的判断」
1881 = "「Không chỉ là bận tâm đâu. Như Hachiroku cũng đã nói rồi đó, đây là một quyết định hợp lý.」"
# 【ふかみ】
# display as 深美
# JP: 「合理的判断、です？」
2015 = "「Quyết định hợp lý, desu?」"
# 【日々姫】
# display as 日日姬
# JP: 「そ。見習いとはいえ、今日は凪ちゃんが機関士やけんね。\nオイルチェックと走行部点検も、凪ちゃんのお仕事」
2161 = "「Ừm. Dù là thực tập sinh, nhưng hôm nay Nagi là người lái tàu mà. Việc kiểm tra dầu và kiểm tra bộ phận chạy cũng là công việc của Nagi.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――だから、今のうちに。です？」
2060 = "「A——nên mới tranh thủ lúc này. Desu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。発車前には、運転台の中にも外にも、\n確認し準備するべき事柄がいくつもある」
2300 = "「Đúng vậy. Trước khi khởi hành, dù là trong hay ngoài buồng lái, đều có rất nhiều việc cần phải xác nhận và chuẩn bị.」"
# 【日々姫】
# display as 日日姬
# JP: 「助士だっておんなじ。[こないしゅ,2]庫内手の手もたりとらんけん、\n給水給炭から手伝わないけんけんねー」
2012 = "「Phụ lái tàu cũng vậy. Nhân viên vệ sinh xưởng cũng không đủ tay, nên phải phụ giúp từ việc cấp nước cấp than nữa nha~」"
# 【ふかみ】
# display as 深美
# JP: 「あわわ――わたし、そんな忙しいときに、\nのんきに見学だなんてっ」
2058 = "「Awawa——Tớ, trong lúc bận rộn thế này, mà lại thong dong đi tham quan.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん。ぜぇんぜん！　大歓迎！\nそれに――」
2366 = "「Không đâu. Hoàn toàn không! Rất hoan nghênh là đằng khác! Hơn nữa——」"
# monologue
# JP: ニヤっと、日々姫の笑顔はどこか、いたずらめいてる。
2953 = "Nụ cười toe toét của Hibiki có chút gì đó tinh nghịch."
# 【日々姫】
# display as 日日姬
# JP: 「ふかみちゃんのしたか“見学”ば、忙しいとき――\n[このこ,3]8620が[いき,1]呼吸しとるときしか、できんでしょお？」
2173 = "「Chuyến 'tham quan' mà bé Fukami muốn, chẳng phải chỉ có thể thực hiện lúc bận rộn—— lúc 8620 đang 'thở' thôi sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2055 = "「A——」"
# monologue
# JP: じんわりと、\nうれしげな笑みが、ふかみの顔いっぱいに広がっていく。
3049 = "Chầm chậm, một nụ cười rạng rỡ vì vui sướng lan tỏa khắp gương mặt Fukami."
# 【ふかみ】
# display as 深美
# JP: 「はい！　はい、です！」
2329 = "「Vâng! Vâng, desu!」"
# monologue
# JP: ……僕にはいまひとつわからんが、\n日々姫の言葉は、怯みかけたふかみの背中を押したようだ。
1456 = "……Dù tôi không hiểu lắm, nhưng có vẻ lời nói của Hibiki đã tiếp thêm động lực cho Fukami đang chùn bước."
# 【ふかみ】
# display as 深美
# JP: 「それなら、わたし――\n遠慮なく、見学させてもらっちゃいます――です！」
2509 = "「Nếu vậy thì, em—— xin phép không khách sáo, được tham quan ạ——desu!」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　どうぞどうぞ」
2105 = "「Ừm! Cứ tự nhiên nhé.」"
# monologue
# JP: 思いつくまま、目の向くままにという感じなのだろう。\nあちこちきょろきょろ眺めまわして覗き込み――
2982 = "Có vẻ như con bé đang ngắm nhìn theo cảm tính, ánh mắt đưa đẩy tự do. Ngó nghiêng xung quanh, dòm ngó chỗ này chỗ kia——"
# 【ふかみ】
# display as 深美
# JP: 「………ふわぁ」
1501 = "「………Oaaa.」"
# monologue
# JP: ――やがてふかみは、感嘆しきりの息を吐く。
1435 = "——Chẳng mấy chốc, Fukami thở ra một hơi đầy cảm thán."
# 【ふかみ】
# display as 深美
# JP: 「凄い、です。こんなにたくさんの部品が……\n機械達が、連動しあって――動くんですよね」
2144 = "「Tuyệt quá, desu. Rất nhiều bộ phận…… máy móc liên kết với nhau——và chuyển động nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。逆転機の回し方一つ、加減弁テコの引き方一つが、\n直接的に、蒸気の流れ、機関車の動きを決めていく」
2298 = "「Đúng vậy. Chỉ một thao tác xoay cần đảo chiều, một cái kéo tay gạt van tiết lưu hơi, cũng trực tiếp quyết định luồng hơi nước và chuyển động của đầu máy.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん。蒸気機関車の運転ば、本当に手作業。\n多分――ふかみちゃんの舟と同じくらいに、ダイレクト」
2248 = "「Bởi vậy. Lái đầu máy hơi nước thực sự là công việc thủ công. Chắc là——cũng trực tiếp giống như con thuyền của bé Fukami vậy đó.」"
# 【ふかみ】
# display as 深美
# JP: 「手作業で……手の感覚で、\nこんなに大きくて、複雑なものを――」
2267 = "「Công việc thủ công…… Bằng cảm giác của đôi tay, mà có thể điều khiển một thứ to lớn và phức tạp thế này——」"
# monologue
# JP: ふかみが、あらためてぐるりと見渡す。\nそれからどこか、きょとんとした目で僕を見る。
2985 = "Fukami lại một lần nữa nhìn quanh buồng lái. Sau đó, con bé nhìn tôi bằng ánh mắt có chút ngơ ngác."
# 【ふかみ】
# display as 深美
# JP: 「あたりまえですけど――すごい、お仕事なんですね。\nすごく大変で、むつかしそうで――かっこいい、です」
2243 = "「Dù là điều hiển nhiên nhưng——đúng là một công việc tuyệt vời nhỉ. Trông rất vất vả, rất khó khăn——và rất ngầu, desu.」"
# 【日々姫】
# display as 日日姬
# JP: 「むつかしいのは確かよねー。やけん、ふかみちゃんが\n車掌ば目指してくれるとは、まっこと心強かとよ！」
2425 = "「Đúng là khó thật nha. Thế nên, việc bé Fukami hướng tới mục tiêu trở thành trưởng tàu, thực sự khiến chị rất yên tâm đó!」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ」
2067 = "「Hauu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日々姫もふかみが車掌志望だと、\nそういえば知っていたのだよな」
2096 = "「À, nhắc mới nhớ, Hibiki cũng biết Fukami muốn làm trưởng tàu nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとよー。聞いとったもん。その場で。\nふかみちゃんの、『わたしを車掌にしてください』って」
2403 = "「Đúng rồi đó. Em đã nghe thấy mà. Ngay tại chỗ luôn. Câu 'Xin hãy cho em làm trưởng tàu' của bé Fukami ấy.」"
# 【ふかみ】
# display as 深美
# JP: 「わーわーわー！！」
2039 = "「Oa oa oa!!」"
# monologue
# JP: あわてたふかみがバタバタ手を振る。
3013 = "Fukami cuống cuồng xua tay loạn xạ."
# 【ふかみ】
# display as 深美
# JP: 「そ、そのときのことは、恥ずかしい、です！\nあの、ナイショ！　ナイショでお願いします！」
1981 = "「Ch, chuyện lúc đó xấu hổ lắm ạ! Nên là, bí mật! Xin anh hãy giữ bí mật nhé!」"
# 【日々姫】
# display as 日日姬
# JP: 「あらま。\n――だって、どぎゃんすっと？　にぃに」
2044 = "「Ây dà.\n――Anh thấy sao hả? Anh hai」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみがナイショといっているのだ。\n無理に聞き出すこともあるまい」
2380 = "「Fukami đã bảo là bí mật rồi mà. Anh cũng sẽ không cố gặng hỏi đâu.」"
# monologue
# JP: 言いながら、ふかみの頭をぽんっと撫でる。\n見るからにもう、ふかみは安心した顔になる。
2930 = "Vừa nói, tôi vừa xoa nhẹ lên đầu Fukami. Nhìn là thấy ngay, gương mặt em ấy đã trở nên an tâm hơn hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「……帰宅してから、こっそり聞かせてくれればいいさ」
1503 = "「……Về nhà rồi em lén kể cho anh nghe là được」"
# 【ふかみ】
# display as 深美
# JP: 「ええええええっ！？」
2049 = "「Ể ể ể ể ể ể ể!?」"
# 【日々姫】
# display as 日日姬
# JP: 「了解っ！」
2280 = "「Đã rõ!」"
# 【ふかみ】
# display as 深美
# JP: 「って、日々姫さんまで～っ！？」
2084 = "「Đến cả chị Hibiki cũng hùa theo á~!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。少しからかいたくなっただけだ。\n焦るふかみが、かわいらしくてな」
2269 = "「Xin lỗi. Anh chỉ muốn trêu em một chút thôi. Tại dáng vẻ cuống quýt của Fukami đáng yêu quá mà.」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
2042 = "「Oa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そういえばちゃんとは聞いていなかったな」
1892 = "「Nhưng mà…… nhắc mới nhớ, anh vẫn chưa hỏi kỹ em chuyện này nhỉ.」"
# monologue
# JP: 思えば、気になる。\nだから尋ねる。
2944 = "Nghĩ lại thì, tôi cũng tò mò thật.\nNên tôi bèn hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは何故、車掌になろうと考えたのだ？\nみかん鉄道乗車がきっかけとは知っているが……」
1935 = "「Tại sao Fukami lại muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#; vậy? Anh biết cơ duyên là từ lần đi tàu Đường sắt Mikan rồi nhưng mà……」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　そこ！　わたしも気になるっ！」
2070 = "「A! Chỗ đó! Em cũng tò mò lắm!」"
# monologue
# JP: 言ってはなんだが、\nあのオリヴィというレイルロオド。
3122 = "Nói ra thì hơi kỳ, nhưng\ncô Railord tên Olivy đó."
# monologue
# JP: 臨時・急遽の代理車掌と自身でいっていたとおり、\n憧れるほどの仕事ぶりとは思えなかったが――
2851 = "Đúng như cô ấy tự nhận mình chỉ là \\x%l車掌;#00ffc040;trưởng tàu%l;#; đại diện lâm thời, khẩn cấp, tôi không nghĩ phong cách làm việc của cô ấy lại đáng ngưỡng mộ đến thế――"
# 【ふかみ】
# display as 深美
# JP: 「あの……それは――ですね」
2020 = "「Dạ…… Chuyện đó――là vì」"
# monologue
# JP: ふかみがきょろきょろ、あたりをうかがう。\nああ、と察して、運転台の側面窓から見下ろしてみる。
3022 = "Fukami dáo dác nhìn quanh quất. A, hiểu ý em ấy, tôi bèn nhìn xuống từ cửa sổ bên hông buồng lái."
# 【双鉄】
# display as 雙鐵
# JP: 「……凪とハチロクは炭水車を見ている。\n声が聞こえる距離ではないぞ」
1486 = "「……Nagi và Hachiroku đang kiểm tra \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;. Khoảng cách này không nghe thấy tiếng đâu.」"
# monologue
# JP: 言った瞬間、ふかみがほうっと息を吐く。
3045 = "Ngay khoảnh khắc tôi nói vậy, Fukami thở phào nhẹ nhõm."
# 【ふかみ】
# display as 深美
# JP: 「別に……これはナイショでもなんでもないんですけど。\nでも、凪ちゃんにヘンに気をつかわせちゃったら、ヤで」
2361 = "「Cũng không có gì…… Chuyện này không phải bí mật hay gì đâu ạ. Nhưng mà, nếu để Nagi phải bận tâm kỳ lạ thì em không thích đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、動機は凪がらみか？」
2515 = "「Vậy ra, động cơ của em có liên quan đến Nagi à?」"
# 【ふかみ】
# display as 深美
# JP: 「です、ね。わたし――やっぱり羨ましかったんです。\n双鉄おにいさんと、凪ちゃんとがしてるお仕事が」
2296 = "「Vâng, ạ. Em――quả nhiên là đã rất ghen tị. Với công việc mà anh Soutetsu và Nagi đang làm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2103 = "「Hừm.」"
# 【ふかみ】
# display as 深美
# JP: 「時間、三人で平等にって決めて、守ってますけど――。\nお仕事の時間って、やっぱり密度が違うと思うんです」
2521 = "「Dù chúng ta đã quyết định và tuân thủ việc chia đều thời gian cho cả ba người――. Nhưng thời gian làm việc, em nghĩ mức độ gắn kết vẫn khác biệt lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かな。凪にせよ、日々姫にせよ、ハチロクにせよ。\nともに乗務をする者は、運命共同体だとも感じる」
2315 = "「Đúng vậy. Dù là Nagi, Hibiki hay Hachiroku. Những người cùng làm nhiệm vụ trên tàu, anh đều cảm thấy như một cộng đồng chung vận mệnh.」"
# 【日々姫】
# display as 日日姬
# JP: 「大げさじゃなく、命を預け合うわけだし――\nお客様の命も、みんなで預かるわけやけん」
2482 = "「Không hề nói quá đâu, chúng ta giao phó sinh mạng cho nhau mà―― Sinh mạng của hành khách cũng do tất cả cùng gánh vác nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「わかります」
2233 = "「Em hiểu ạ.」"
# monologue
# JP: きっぱりと言う。\n強いまなざしで僕を捉える。
2987 = "Em ấy dứt khoát nói. Ánh mắt mạnh mẽ nhìn thẳng vào tôi."
# 【ふかみ】
# display as 深美
# JP: 「そこ、舟と同じですから。双鉄おにいさんや凪ちゃんに\n手伝って貰えてた頃は、だからあんまり気にならなくて」
2134 = "「Điểm đó, cũng giống như chèo thuyền vậy. Nên hồi còn được anh Soutetsu và Nagi giúp đỡ, em không bận tâm lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2103 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「でも、お母さんの病気がなおって、クマ川くだりも\n持ちなおしてきて、船頭さん達が復帰してくれて――」
1925 = "「Nhưng mà, mẹ em đã khỏi bệnh, chuyến xuôi dòng sông Kuma cũng đã phục hồi, các bác lái đò cũng đã quay lại làm việc――」"
# monologue
# JP: 本職のベテランさんたちと比べてしまえば、\n僕はもちろん、凪もやっぱり素人だ。
3137 = "Nếu so sánh với những người thợ lành nghề, tôi và cả Nagi dĩ nhiên vẫn chỉ là dân nghiệp dư."
# monologue
# JP: 手伝いの必要が薄れてしまえば、\n僕らはその分、そのまま鉄道に注力をした。
2864 = "Khi không còn cần chúng tôi giúp đỡ nhiều nữa, chúng tôi dồn toàn bộ sức lực vào đường sắt."
# 【ふかみ】
# display as 深美
# JP: 「そしたら、寂しくなっちゃって。やっぱり一緒に\nお仕事したい――置いて行かれたくないって、思って」
2393 = "「Sau đó, em thấy cô đơn lắm. Quả nhiên em vẫn muốn làm việc cùng mọi người――Em không muốn bị bỏ lại phía sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2103 = "「嗯」" 
# monologue
# JP: 置いて行かれたくない――\n凪もまったくおんなじことをいっていた。
2708 = "Không muốn bị bỏ lại phía sau―― Nagi cũng từng nói y hệt như vậy."
# monologue
# JP: 凪とふかみは親友で、同時にライバルであるのだと、\nいまさらながらにつくづく思う。
2835 = "Bây giờ tôi mới thấm thía nhận ra rằng, Nagi và Fukami vừa là bạn thân, lại vừa là đối thủ của nhau."
# 【日々姫】
# display as 日日姬
# JP: 「一緒にだったら、機関士目指した方がよくない？\nあー、でも、接客スキルがもったいない？」
2197 = "「Nếu muốn ở cùng nhau thì hướng tới mục tiêu làm \\x%l機関士;#00ffc040;lái tàu%l;#; chẳng phải tốt hơn sao? A, nhưng mà, kỹ năng tiếp khách của em bỏ xó thì uổng quá nhỉ?」"
# 【ふかみ】
# display as 深美
# JP: 「もったいないとかそういうことより――運転台の中を、凪ちゃんの居場所を、邪魔したくないって思うから」
2484 = "「Uổng phí hay không thì em không nghĩ tới――nhưng em không muốn cản trở vị trí của Nagi trong buồng lái đâu.」"
# monologue
# JP: 言って、あははと、\nふかみは少し、作ったような感じに笑う。
3123 = "Nói rồi, Fukami cười \"ahaha\", một nụ cười có phần gượng gạo."
# 【ふかみ】
# display as 深美
# JP: 「あと！　わたし、水属性ですし！　暑いの苦手で――\n火のこんなに近くだとか、とても無理、です」
2439 = "「Với lại! Em thuộc hệ thủy mà! Em chịu nóng kém lắm―― Lại còn ở gần lửa thế này thì, không thể nào làm được đâu ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、そっか。水属性じゃしかたなかとねー」
2162 = "「A, ra vậy. Hệ thủy thì hết cách rồi ha~」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。だから、わたしは。\n車掌さんになりたいなって、思ったんです」
2288 = "「Vâng vâng. Vì vậy nên, em. Mới nghĩ là, mình muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;.」"
# monologue
# JP: ふうわり、と――\nふかみの顔に浮かんだ笑みは、今度はとても自然なものだ。
3155 = "Nhẹ nhàng―― Nụ cười nở trên môi Fukami lần này lại vô cùng tự nhiên."
# 【ふかみ】
# display as 深美
# JP: 「教えてもらったから。車掌さんでも一緒に走れるって。\n一緒に走って、みんなの力になれるんだって」
2132 = "「Vì em đã được dạy rằng. Dù là \\x%l車掌;#00ffc040;trưởng tàu%l;#; thì vẫn có thể đồng hành cùng nhau. Đồng hành cùng nhau, và trở thành sức mạnh của mọi người.」"
# monologue
# JP: （ああ――）
3182 = "（A――）"
# monologue
# JP: 僕らと一緒に働きたい。それはつまりは、\n力になりたい――僕らを助けたいということなのか。
3008 = "Muốn làm việc cùng chúng tôi. Điều đó có nghĩa là, muốn trở thành sức mạnh――muốn giúp đỡ chúng tôi sao."
# monologue
# JP: 川下りが一番苦しかった時期のふかみを、凪がひとりで、\nとても無邪気に――支えたように。
2849 = "Giống như lúc chuyến xuôi dòng gặp khó khăn nhất, Nagi đã một mình, vô cùng ngây thơ――giúp đỡ Fukami vậy."
# 【日々姫】
# display as 日日姬
# JP: 「良かとね。それ」
2408 = "「Tuyệt quá nhỉ. Suy nghĩ đó ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、実にいいな。ありがたい」
2112 = "「Ừm, thật sự rất tuyệt. Đáng quý lắm.」"
# monologue
# JP: ふかみと凪と。凪とふかみと。\nその絆の中、僕も一緒に在ることが出来て。
3082 = "Fukami và Nagi. Nagi và Fukami. Trong mối liên kết ấy, tôi cũng có thể ở cùng."
# monologue
# JP: お互いを思いやり支え合う――\nその輪の中に、僕が、僕らがいることが出来て。
3081 = "Quan tâm và hỗ trợ lẫn nhau―― Trong vòng tròn ấy, có tôi, có chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「あ！　でもでも、クマ川下りのためでもあるんです。\n御一夜鉄道でお仕事したいの、実のところは！」
2069 = "「A! Nhưng mà, cũng là vì chuyến xuôi dòng sông Kuma nữa ạ. Thực ra, em muốn làm việc ở Đường sắt Ohito!」"
# monologue
# JP: 照れ隠しなのか、ふかみが少し早口になる。\nしかし……そんなことを今更いわれても――
3038 = "Có lẽ vì muốn che giấu sự xấu hổ, Fukami nói nhanh hơn một chút. Nhưng mà…… giờ mới nói điều đó thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう。ふかみなのだし」
1941 = "「Chắc chắn là vậy rồi. Vì em là Fukami mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「よねぇ。ふかみちゃんの一番ば、\nどーやったって、クマ川下りだろうと思うし」
2322 = "「Đúng vậy. Dù thế nào đi nữa, ưu tiên số một của bé Fukami vẫn là chuyến xuôi dòng sông Kuma mà.」"
# 【ふかみ】
# display as 深美
# JP: 「え？　あれ？　もうバレちゃってました？」
2030 = "「Hả? Ơ? Mọi người nhận ra rồi ạ?」"
# 【凪】
# display as 凪
# JP: 「なになに！？\nふかみちゃんのワルダクミばバレよったと！？」
1909 = "「Gì gì!?\nÂm mưu đen tối của bé Fukami bị lộ rồi hả!?」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、それは[おおごと,1]大事ですね」
2048 = "「Chà, đó đúng là chuyện lớn nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたし！　悪だくみなんてしないもんっ！\nもう、凪ちゃんのいじわるっ！」
2209 = "「E, em! Em không có âm mưu đen tối gì đâu nhé! Thật tình, Nagi xấu tính quá!」"
# 【凪】
# display as 凪
# JP: 「って！？　ふかみちゃん！　そんなんちゃんと\nわかっとるばい！　冗談ばい！！」
2090 = "「Ơ!? Bé Fukami! Chuyện đó thì em biết thừa rồi mà! Em chỉ đùa thôi!!」"
# 【ふかみ】
# display as 深美
# JP: 「うん。わたしもわかってる。だから、冗談！\nいじわる、ちょっとだけおかえししちゃった！」
2109 = "「Ừm. Chị cũng biết mà. Nên là, chị đùa thôi! Trả đũa em tội xấu tính một chút xíu thôi!」"
# 【凪】
# display as 凪
# JP: 「なんねー！　やっぱふかみちゃん\nワルダクミしよったばーい！」
1911 = "「Cái gì chứ! Quả nhiên bé Fukami đang ủ mưu đen tối kìa!」"
# monologue
# JP: あははと、笑う。
2922 = "Tôi bật cười ha hả."
# monologue
# JP: 平凡でごく他愛ないやりとりが、\n実に暖かく、尊いものと聞こえる。
2825 = "Những cuộc trò chuyện bình dị và ngây ngô, nghe thật ấm áp và quý giá làm sao."
# 【凪】
# display as 凪
# JP: 「そぎゃんとご機嫌だったら、\nよか見学ばできたとね？」
2407 = "「Tâm trạng chị vui vẻ thế này, chắc buổi tham quan tốt đẹp lắm nhỉ?」"
# 【日々姫】
# display as 日日姬＆深美
# JP: 「ああっ！　見学っ！？」\n「うん！　できた」
2078 = "「A! Tham quan!?」\n「Ừm! Tốt lắm.」"
# monologue
# JP: あわてふためく日々姫をよそに、\nふかみは力強くうなずき返す。
2951 = "Mặc kệ Hibiki đang luống cuống, Fukami gật đầu mạnh mẽ đáp lại."
# 【ふかみ】
# display as 深美
# JP: 「出来たよ？　見学。ばっちりわかった」
2189 = "「Được rồi mà? Tham quan ấy. Chị hiểu rõ rồi.」"
# 【凪】
# display as 凪
# JP: 「わひゃっ！？」
2043 = "「Oái!?」"
# monologue
# JP: まだ見習いの凪の作業は、ハチロクがしっかり見ている。\n作業の手抜きや手落ちなど、無論、許されるはずもない。
2725 = "Công việc của Nagi, người vẫn đang học việc, được Hachiroku theo dõi sát sao. Dĩ nhiên, việc làm qua loa hay sai sót là không thể chấp nhận được."
# monologue
# JP: ゆえ、その範囲での最善、最速を目指したのだろう。\n凪は軍手をしたままで、あちこち黒くしてしまっている。
2932 = "Vì thế, có lẽ em ấy đã cố gắng hết sức và nhanh nhất trong khả năng của mình. Nagi vẫn đeo găng tay lao động, người dính đầy những vết đen."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お顔にまで油ついちゃってる。\nどんなにがんばってるのか――わたし、見学できた」
2168 = "「Nagi, dầu dính lên cả mặt rồi kìa. Em đã cố gắng đến nhường nào――chị đều thấy cả rồi.」"
# 【凪】
# display as 凪
# JP: 「ハンカチ、よごれちゃうばい！！」
2265 = "「Khăn tay, bẩn mất thôi!!」"
# 【ふかみ】
# display as 深美
# JP: 「知らないの？　凪ちゃん。ハンカチは、\n人の代わりによごれるためにあるんだよ？」
1931 = "「Em không biết sao? Nagi. Khăn tay, là để chịu bẩn thay cho con người mà?」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん」
2169 = "「Bé Fukamiii.」"
# 【ふかみ】
# display as 深美
# JP: 「はい、凪ちゃん。綺麗になった！」
2145 = "「Xong rồi, Nagi. Sạch sẽ rồi nhé!」"
# monologue
# JP: 言って、ふかみが身をひるがえす。
3050 = "Nói rồi, Fukami xoay người lại."
# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、またね？　凪ちゃん。\nお仕事がんばって！」
2502 = "「Vậy, hẹn gặp lại nhé? Nagi.\nChúc em làm việc tốt!」"
# 【凪】
# display as 凪
# JP: 「もちろんばい！　ちょーがんばるばい！！」
2401 = "「Tất nhiên rồi! Em sẽ cố gắng hết mình!!」"
# 【ふかみ】
# display as 深美
# JP: 「日々姫さんとハチロクちゃんも、お邪魔しました。\n見学させてくれて、ありがとうございました」
1914 = "「Chị Hibiki và Hachiroku nữa, em xin phép ạ. Cảm ơn mọi người đã cho em tham quan.」"
# 【日々姫】
# display as 日日姬
# JP: 「次は、もっといろいろ説明するけんね！\nね？　また遊びに来て！」
1877 = "「Lần tới chị sẽ giải thích nhiều hơn nữa nhé! Nha? Nhớ đến chơi nữa đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「ふかみも、どうぞ素敵な今日を」
2384 = "「Fukami cũng vậy, chúc em có một ngày tuyệt vời nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「はい！」
2150 = "「Vâng!」"
# monologue
# JP: （くっ）
3189 = "（Giật nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「お」
2122 = "「Ồ.」"
# monologue
# JP: ほんの一瞬、服の裾がつままれ、引っ張られる。\nかわいらしいな、と頬がほころぶ。
3003 = "Chỉ trong một khoảnh khắc, vạt áo tôi bị túm lấy và kéo đi. Đáng yêu thật đấy, tôi bất giác mỉm cười."
# monologue
# JP: そんなことなどしなくとも、\n今日は一日、ふかみと一緒に決まっているのに。
2853 = "Dù em ấy không làm vậy, tôi cũng đã quyết định hôm nay sẽ ở bên Fukami cả ngày rồi mà."
# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます、です。\n急に、予定変更しちゃったのに見学させてくれて」
2454 = "「Cảm ơn anh, ạ. Dù em đột ngột thay đổi kế hoạch mà anh vẫn cho em tham quan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに。日々姫も言っていたが、\n見学くらいはいつだって大歓迎だ」
2157 = "「Có gì đâu. Hibiki cũng nói rồi đấy, chuyện tham quan thì lúc nào bọn anh cũng hoan nghênh.」"
# monologue
# JP: ポーレットからふかみへの、見習い終了の通達は、\n昨日の夕方のことだった。
2956 = "Thông báo kết thúc thời gian học việc của Fukami từ Paulette, là vào chiều tối hôm qua."
# monologue
# JP: 大喜びで報告にきたふかみの希望で、\n今日の予定を変更し、運転台見学としたのだが――
2988 = "Theo nguyện vọng của Fukami, người đã vui sướng đến báo tin, tôi đã thay đổi lịch trình hôm nay thành tham quan buồng lái――"
# 【双鉄】
# display as 雙鐵
# JP: 「で、これからどうする？\nふかみに他の希望があれば、あわせるぞ？」
2392 = "「Thế, tiếp theo chúng ta làm gì? Nếu Fukami có nguyện vọng khác, anh sẽ chiều theo em.」"
# monologue
# JP: ペットボトルの水を飲みつつ、\n観光客向けの休憩ベンチで、のんびり尋ねる。
2904 = "Vừa uống nước trong chai nhựa, tôi vừa thong thả hỏi em ấy trên băng ghế nghỉ dành cho khách du lịch."
# monologue
# JP: ほどなくバーベキュー列車が走るからだろう、\n御一夜の町には今は、行き交う人の姿も少ない。
2803 = "Có lẽ vì chuyến tàu BBQ sắp khởi hành, nên thị trấn Ohimitera lúc này thưa thớt người qua lại."
# 【ふかみ】
# display as 深美
# JP: 「あの……双鉄おにいさんの最初のプランだと、\n今日は、どこにつれてってもらえるんだったんですか？」
2500 = "「Dạ…… Theo kế hoạch ban đầu của anh Soutetsu, thì hôm nay anh định dẫn em đi đâu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「昨日の夜に希望を聞こうと思っていたのだ。\nぼんやりとは、映画館なり動物園なりと考えていた」
2338 = "「Tối qua anh định hỏi xem em muốn đi đâu. Trong đầu anh chỉ lờ mờ nghĩ đến rạp chiếu phim hay sở thú thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「あー、[やつしろ,2]八ツ城か[くまもと,1]隈元までおでかけできたんですねー」
2063 = "「A, thế là mình có thể đi Yatsushiro hay Kumamoto rồi ha.」"
# monologue
# JP: 残念そうにふかみがつぶやく。\nなんだかんだでもう昼すぎだ。
3030 = "Fukami lẩm bẩm đầy tiếc nuối. Dù sao thì cũng đã quá trưa rồi."
# monologue
# JP: 今からでもその気になれば向かえるが、出かけた先で、\nいささか慌ただしく過ごすことになってしまおう。
3073 = "Bây giờ nếu muốn thì vẫn có thể đi được, nhưng đến nơi, chắc chắn chúng tôi sẽ phải trải qua một cách khá vội vã."
# 【ふかみ】
# display as 深美
# JP: 「でも、それって逆にいったら、\n結構ノープランに近かった？」
2008 = "「Nhưng mà, nói ngược lại thì, gần như là anh chẳng có kế hoạch gì luôn à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「率直にいえば、そうだな。一年以上修学旅行を重ねると、\nどこでもいいかという気にはなる」
2451 = "「Thẳng thắn mà nói thì đúng là vậy. Sau hơn một năm đi dã ngoại liên tục, anh bắt đầu có cảm giác đi đâu cũng được.」"
# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
2091 = "「Ể ể!?」"
# monologue
# JP: ふかみがショックを受けている。\nお芝居じみた感じではない――ああいや、そうか。
2975 = "Fukami đang bị sốc. Không giống như đang diễn kịch――À không, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。言い方が悪かった。\n手抜きのように聞こえたのなら、申し訳ない」
2271 = "「Xin lỗi. Anh dùng từ không đúng. Nếu nghe có vẻ như anh làm qua loa, thì anh xin lỗi.」"
# 【ふかみ】
# display as 深美
# JP: 「え……と？」
1481 = "「Dạ…… là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとともに楽しく過ごせるなら。ふかみが笑顔に\nなるのなら、行き先など、例えどこでもかまわない」
2004 = "「Chỉ cần được vui vẻ bên cạnh Fukami. Chỉ cần Fukami nở nụ cười, thì đi đâu anh cũng không bận tâm.」"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ」
# 2038 = "「哇」" 
# 【双鉄】
# display as 雙鐵
# JP: 「最初からそういうべきだったのだな。\n言葉の選び方がよろしくなかった」
1985 = "「Đáng lẽ ngay từ đầu anh nên nói như vậy. Cách chọn từ của anh không tốt.」"
# 【ふかみ】
# display as 深美
# JP: 「いえ、あのっ！\nわたしがヘンな聞き方しちゃったから」
2365 = "「Dạ không, chuyện đó!\nLà do em hỏi hơi kỳ cục thôi.」"
# monologue
# JP: 真っ赤になって手を振って――
3024 = "Em ấy đỏ bừng mặt, xua xua tay――"
# monologue
# JP: （ぴとっ）
3192 = "（Áp sát）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2094 = "「Ồ.」"
# monologue
# JP: ふかみは顔を、僕の二の腕に寄せてくる。
3017 = "Fukami áp mặt vào bắp tay tôi."
# monologue
# JP: ふわりと、ささやかで甘やかな匂いが漂う。\n人知れず咲く花のような、いつもと同じ、ふかみの匂いが。
2828 = "Một mùi hương thoang thoảng, ngọt ngào lan tỏa. Giống như một đóa hoa nở thầm lặng, vẫn là mùi hương thường ngày của Fukami."
# 【ふかみ】
# display as 深美
# JP: 「わたしも、です」
2213 = "「Em cũng vậy, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2118 = "「Hửm?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、おんなじ気持ちです。双鉄おにいさんが\n笑ってくれれば――どこにいたって、楽しい、です」
2215 = "「Em cũng có cùng cảm giác đó. Chỉ cần anh Soutetsu mỉm cười――thì dù ở đâu, em cũng thấy vui, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2487 = "「Vậy sao.」"
# 【ふかみ】
# display as 深美
# JP: 「その意味でも、今日。思い切って、運転台を見学できて\n――させてもらえて、とってもよかった、です」
2190 = "「Về mặt ý nghĩa đó, thì hôm nay. Quyết tâm xin đi tham quan buồng lái ――được cho phép tham quan, thật sự rất tuyệt, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その意味でも？　か？　……ふむ。\n運転台では、むしろ厳しい顔でいるかと自分では思うが」
2319 = "「Ý nghĩa đó sao? Hừm. Anh lại nghĩ lúc ở buồng lái mặt anh trông nghiêm khắc lắm chứ.」"
# 【ふかみ】
# display as 深美
# JP: 「お顔は、たしかにそうでしたけど」
2448 = "「Gương mặt anh thì đúng là vậy thật.」"
# monologue
# JP: ふかみの指が伸びてくる。\n僕のあごの線をつたって、のぼって――
2979 = "Ngón tay Fukami vươn tới. Trượt dọc theo đường cằm của tôi, rồi đi lên――"
# monologue
# JP: （もにっ）
3187 = "（Nắn nắn）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
# 2118 = "「嗯？」" 
# 【ふかみ】
# display as 深美
# JP: 「ほんとは、すっごくにこにこだったでしょ？\n双鉄おにいさん。わたし、そう感じました、です」
1946 = "「Thực ra, trong lòng anh đang cười rất tươi đúng không? Anh Soutetsu. Em đã cảm thấy như vậy đó, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……言われてみれば、そうかもしれんな」
1511 = "「……Nghe em nói vậy, có lẽ đúng là thế thật.」"
# monologue
# JP: ふかみが、僕の仕事場を見に来てくれた。\n凪はもちろん、ハチロクも日々姫も大歓迎で迎えてくれた。
2983 = "Fukami đã đến xem nơi làm việc của tôi. Nagi dĩ nhiên là vậy, cả Hachiroku và Hibiki cũng vô cùng hoan nghênh đón tiếp em ấy."
# monologue
# JP: それは、単純に嬉しいことだし――
3154 = "Đó là một niềm vui giản đơn, và――"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが、[ハチロクニイマル,3]8620に興味を持ってくれている、と。\nそうわかったことも、実に単純に嬉しかった」
2414 = "「Việc biết được Fukami cũng đang có hứng thú với đầu máy 8620. Anh thực sự thấy rất vui.」"
# monologue
# JP: いえばほんのり、ふかみがはにかむ。
3046 = "Nghe tôi nói, Fukami khẽ cười bẽn lẽn."
# monologue
# JP: “凪の居場所の邪魔をしないため”――\n聞かせてくれた、その瞬間とおんなじ顔で。
1442 = "“Để không cản trở vị trí của Nagi”―― Giống hệt gương mặt lúc em ấy nói cho tôi nghe điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「それに、気持ちも嬉しかった。車掌を目指しているのが、\n僕たちを支えるためだと――ともに走るためだと聞けて」
2438 = "「Hơn nữa, anh cũng rất vui khi biết tấm lòng của em. Rằng em muốn làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; là để hỗ trợ chúng anh――để cùng nhau đồng hành.」"
# 【ふかみ】
# display as 深美
# JP: 「支えるだなんて！　そんな、わたし、\nそんな力、全然ないですっ！」
2051 = "「Hỗ trợ gì chứ! Chuyện đó, em, em hoàn toàn không có sức mạnh đó đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、今のところは、だろう」
2002 = "「Chỉ là ở hiện tại thôi.」"
# monologue
# JP: 言えば、懐かしく思い出される。
3124 = "Nói ra, tôi lại nhớ về những kỷ niệm."
# monologue
# JP: まだ三年も経っていない――\nたったそれだけしか経っていないのに。
3151 = "Vẫn chưa đầy ba năm―― Mới chỉ trôi qua chừng ấy thời gian thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「初めて会った頃のふかみは、\n背筋をまるめて、おどおどしている女の子だった」
2222 = "「Fukami lúc chúng ta mới gặp, là một cô bé hay khom lưng, lúc nào cũng rụt rè sợ sệt.」"
# 【ふかみ】
# display as 深美
# JP: 「あうっ」
# 2099 = "「嗚……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「凪もそうだな。無鉄砲で考えなしで――\n自分の正義が100\%の……言ってしまえば、ガキだった」
1968 = "「Nagi cũng vậy. Bốc đồng, thiếu suy nghĩ―― Luôn cho chính nghĩa của mình là tuyệt đối…… Nói thẳng ra, là một đứa nhóc.」"
# 【ふかみ】
# display as 深美
# JP: 「ガキって、そんな――\nさすがに凪ちゃんかわいそうですよ」
2192 = "「Nhóc sao, thế thì――\nNói vậy tội nghiệp Nagi lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「過去の話だ。今の凪は、見違えた。\n大人になったし――レディになろうと努力している」
2520 = "「Chuyện quá khứ thôi. Nagi bây giờ đã khác xưa rồi. Đã trưởng thành hơn――và đang nỗ lực để trở thành một quý cô.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
2075 = "「A!」"
# monologue
# JP: ふかみにも――\nいや、ふかみなら、僕よりよほど思い当たるのだろう。
2977 = "Cả Fukami cũng―― Không, nếu là Fukami, hẳn em ấy còn nhận ra rõ hơn tôi."
# monologue
# JP: 返されるうなずきは、少し驚くほど力強い。
2827 = "Cái gật đầu đáp lại của em ấy mạnh mẽ đến mức khiến tôi hơi ngạc nhiên."
# 【ふかみ】
# display as 深美
# JP: 「ですね。凪ちゃん、大人になったし――綺麗になった。\n今日も、とっても綺麗だった」
2301 = "「Đúng vậy ạ. Nagi đã trưởng thành――và xinh đẹp hơn. Hôm nay, em ấy cũng rất xinh đẹp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日の凪がか？\n油まみれでナッパ服だったではないか」
1916 = "「Nagi của ngày hôm nay á? Chẳng phải em ấy đang mặc bộ \\x%l彩頁服;#00ffc040;đồng phục làm việc%l;#; lấm lem dầu mỡ sao?」"
# 【ふかみ】
# display as 深美
# JP: 「だから、ですよ？　双鉄おにーさん？」
2257 = "「Chính vì thế đó, anh Soutetsu?」"
# monologue
# JP: まるっきりわかってない子に、一から九九を教えるように。\nふかみが妙に、教師じみている態度を見せる。
3001 = "Giống như đang dạy bảng cửu chương từ đầu cho một đứa trẻ không biết gì. Fukami bỗng dưng tỏ thái độ giống hệt một giáo viên."
# 【ふかみ】
# display as 深美
# JP: 「着飾ってないから、飾ってないから。\n本当の綺麗さが見えるんです」
2354 = "「Bởi vì không chải chuốt, không tô điểm. Nên mới thấy được vẻ đẹp thực sự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2320 = "「Là vậy sao?」"
# 【ふかみ】
# display as 深美
# JP: 「ふふっ、多分、双鉄おにいさんは――\n見慣れちゃってるから、気づけないんですよ」
2119 = "「Fufu, có lẽ, anh Soutetsu―― Nhìn quen quá rồi nên không nhận ra đó thôi.」"
# monologue
# JP: 甘えてもたれっぱなしだった体を、\nふかみがパっと、離してしまう。
3041 = "Cơ thể vẫn đang nũng nịu dựa dẫm vào tôi, Fukami bỗng tách ra."
# 【ふかみ】
# display as 深美
# JP: 「一番キラキラしてる凪ちゃんの姿。\n運転台の中ではきっと、双鉄おにいさんもおんなじ」
2512 = "「Đó là dáng vẻ tỏa sáng nhất của Nagi. Trong buồng lái, chắc chắn anh Soutetsu cũng vậy.」"
# monologue
# JP: ……確かに、それはそうかもしれん。
1446 = "……Quả thật, có lẽ là vậy."
# monologue
# JP: 運転中は、\n前方注視を解かぬゆえ、凪を見ている余裕も無いが――
2710 = "Trong lúc lái tàu, tôi phải luôn chú ý phía trước, không có thời gian rảnh rỗi để nhìn Nagi――"
# 【双鉄】
# display as 雙鐵
# JP: 「キラキラと言われれば、こころあたるな。\n乗務を終えたあと笑顔などは、文字通りにキラキラだ」
2450 = "「Nói là tỏa sáng thì, anh cũng hiểu. Nụ cười của em ấy sau khi hoàn thành nhiệm vụ, đúng nghĩa là tỏa sáng luôn.」"
# 【ふかみ】
# display as 深美
# JP: 「だからわたし――凪ちゃんのことが羨ましくって。\n支えるなんて、大それたことは思ってなくって」
2253 = "「Nên em――mới ghen tị với Nagi. Em không nghĩ đến chuyện lớn lao như hỗ trợ mọi người đâu.」"
# monologue
# JP: ふかみの手が、きゅっと一瞬、にぎられる。
3029 = "Bàn tay Fukami khẽ nắm chặt lại trong giây lát."
# 【ふかみ】
# display as 深美
# JP: 「一緒に走って、わたしもキラキラになりたいだけです。\n凪ちゃんと双鉄おにいさんに置いていかれたくないから」
2224 = "「Em chỉ muốn cùng chạy với mọi người, và cũng trở nên tỏa sáng. Vì em không muốn bị Nagi và anh Soutetsu bỏ lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「置いて行かれたくない、か」
1885 = "「Không muốn bị bỏ lại sao.」"
# monologue
# JP: 言っていいのか、瞬間、悩む。\n普段は、ふたりの時間のときは――
2919 = "Tôi thoáng phân vân không biết có nên nói ra hay không. Bình thường, khi chỉ có hai người――"
# monologue
# JP: 凪といればふかみの話を、ふかみといれば凪の話を、\nお互い、なんとなく避けているゆえ。
3136 = "Ở cạnh Nagi thì chúng tôi tránh nói chuyện về Fukami, ở cạnh Fukami thì tránh nói về Nagi, cả hai chúng tôi đều vô tình lảng tránh điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「凪も、同じようなことをいっていたな」
1970 = "「Nagi cũng từng nói điều tương tự đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが！？　ですか？？」
2165 = "「Nagi á!? Thật ạ??」"
# monologue
# JP: きょとんとしている。驚いている。\n伝えてよかった――そう思う。
3011 = "Em ấy ngẩn người ra. Có vẻ rất ngạc nhiên. Thật tốt vì đã nói cho em ấy biết――Tôi nghĩ vậy."
# monologue
# JP: どれほど仲がよかろうとも、仲がよすぎれば或いは逆に、\n伝わらないこと、伝えられないことも、やはりあるのだ。
3066 = "Dù có thân thiết đến mấy, hay có lẽ chính vì quá thân thiết, mà vẫn có những điều không thể truyền đạt, không thể nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「凪も、ふかみに置いて行かれたくないと。\n『ふかみちゃんはすごい』と、いっていた」
1969 = "「Nagi cũng không muốn bị Fukami bỏ lại. Em ấy từng nói 『Bé Fukami giỏi lắm』.」"
# 【ふかみ】
# display as 深美
# JP: 「え？　うそ？　なんで？\nわたし――だって、全然なんにも」
2028 = "「Hả? Thật không? Tại sao chứ?\nEm――có làm được gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「自分のことは、自分ではわからんものなのだなぁ」
1906 = "「Đúng là con người khó mà hiểu rõ về bản thân mình nhỉ.」"
# monologue
# JP: ポーレットに頼りにされている。\n御一夜市の観光行政に、ダイレクトな影響力を持っている。
2999 = "Em ấy được Paulette tin tưởng. Có sức ảnh hưởng trực tiếp đến ngành du lịch của thành phố Ohimitera."
# monologue
# JP: ふかみの年で――いや、例えずうっと年上であっても、\nそれは決して、『なんにも』などとはいえないことだ。
2726 = "Ở độ tuổi của Fukami――không, dù có lớn tuổi hơn nhiều đi chăng nữa, những điều đó tuyệt đối không thể nói là 『không làm được gì』."
# 【双鉄】
# display as 雙鐵
# JP: 「凪は言っていた。『ふかみちゃんは一番を持っている』\n『自分はまだ一番を持っていない』と」
1974 = "「Nagi từng nói. 『Bé Fukami có điểm mạnh nhất』 『Còn mình thì chưa có』.」"
# monologue
# JP: だから、伝える。\n僕の覚えていることを、ただただそのままふかみへと。
2934 = "Nên tôi đã kể lại. Kể lại y nguyên những gì tôi nhớ cho Fukami nghe."
# monologue
# JP: ふかみが凪を思うように、凪もふかみを思っていて――\nそれゆえ、焦ってしまっていた、と。
2927 = "Rằng Nagi cũng nghĩ về Fukami, giống như Fukami nghĩ về Nagi―― Và vì thế, em ấy mới trở nên sốt ruột."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが……そんなことを――\nそんな風に、思ってくれてただなんて」
2164 = "「Nagi…… lại nghĩ như vậy――\nLại nghĩ về em như thế.」"
# monologue
# JP: ふかみの頬がピンクに輝く。\n目にとても強い光が宿る。
3033 = "Đôi má Fukami ửng hồng rạng rỡ. Trong ánh mắt ánh lên một tia sáng vô cùng mạnh mẽ."
# monologue
# JP: 伝えてよかった――そう思う。\n今ふかみと話したことも、必ず凪に、伝えてやろう。
2807 = "Thật tốt vì đã nói cho em ấy biết――Tôi nghĩ vậy. Những điều vừa nói với Fukami, nhất định tôi cũng sẽ kể cho Nagi nghe."
# 【ふかみ】
# display as 深美
# JP: 「わたし！　やる気、でました！　です。\n双鉄おにいさん――つきあってもらって、いいですか？」
2237 = "「Em! Có động lực rồi! Ạ. Anh Soutetsu――anh đi cùng em, được không ạ?」"
# monologue
# JP: ふかみがすっくと立ち上がる。\n背筋がピッと伸びている。
3025 = "Fukami đứng bật dậy.\nLưng vươn thẳng tắp."
# monologue
# JP: ああ、綺麗だと――確かに思う。\n着飾り方も飾り方も、一切の変化はないというのに。
2831 = "A, em ấy thật đẹp――tôi quả thực nghĩ vậy. Dù cách ăn mặc, cách trang điểm, chẳng có chút gì thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\n今日一日、僕はなんでもふかみに付き合うぞ」
2400 = "「Tất nhiên rồi. Hôm nay, anh sẽ đồng hành cùng Fukami trong mọi việc.」"
# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます！　あの、わたし、自分でも\nちょっと、勉強したり、調べたりしてて」
2453 = "「Cảm ơn anh ạ! Dạ, bản thân em cũng đã tự học hỏi và tìm hiểu một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2118 = "「嗯？」" 
# 【ふかみ】
# display as 深美
# JP: 「車掌さんのお仕事、です。運転台には入らなくても、\n車掌さん、運転のお手伝いもするって聞いて」
2240 = "「Về công việc của \\x%l車掌;#00ffc040;trưởng tàu%l;#; ạ. Dù không vào buồng lái, nhưng em nghe nói \\x%l車掌;#00ffc040;trưởng tàu%l;#; cũng có thể hỗ trợ việc lái tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうらしいな」
2140 = "「Có vẻ là vậy.」"
# monologue
# JP: いつか、線路がつながっていくそのときのため、\n僕もあれこれ、ハチロクに教えてもらっている。
3062 = "Vì một ngày nào đó, khi tuyến đường sắt được nối liền, tôi cũng đang học hỏi đủ thứ từ Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「本来は、編成の最後に\x%l車掌車;#00ffc040;車掌車%l;#;という物をつけるそうだな。\nそして、\x%l車掌車;#00ffc040;車掌車%l;#;にはブレーキがついている」
2339 = "「Vốn dĩ, người ta sẽ gắn một toa gọi là \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; ở cuối \\x%l編成;#00ffc040;đoàn tàu%l;#;. Và \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; có trang bị phanh hãm.」"
# 【ふかみ】
# display as 深美
# JP: 「『赤を切る』っていうヤツですよね？\nあの列車を止めた時、オリヴィちゃんが言っていた」
2504 = "「Có phải là 『Kéo van đỏ』 không ạ? Lúc dừng đoàn tàu đó lại, Olivy đã nói vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それが車掌の、最大の仕事であると」
2114 = "「Ừm. Đó chính là công việc quan trọng nhất của \\x%l車掌;#00ffc040;trưởng tàu%l;#;.」"
# monologue
# JP: 赤を切る――異常事態が生じた時に、\n車掌が自らの判断で、非常ブレーキをかけること。
2937 = "Kéo van đỏ――Khi có tình huống bất thường xảy ra, \\x%l車掌;#00ffc040;trưởng tàu%l;#; sẽ tự mình đưa ra quyết định kéo phanh khẩn cấp."
# monologue
# JP: 安全のため、危険を未然に防止するため。\n列車の運行の権利を、他の誰からも奪い取ることだ。
3063 = "Vì sự an toàn, vì để ngăn ngừa nguy hiểm xảy ra. Là việc đoạt lấy quyền điều hành đoàn tàu từ bất kỳ ai khác."
# 【双鉄】
# display as 雙鐵
# JP: 「『赤を切る勇気』。車掌に何よりも必要なのは、\nまさにそれなのだとも、僕は、ハチロクに教わった」
1944 = "「『Dũng khí kéo van đỏ』. Điều \\x%l車掌;#00ffc040;trưởng tàu%l;#; cần hơn bất cứ thứ gì, chính là điều đó, anh đã được Hachiroku dạy như vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「れいなちゃんも、ポーレットさんも言ってました。\nけど、わたし……それが出来るか、自信がなくって」
2397 = "「Reina và chị Paulette cũng từng nói thế. Nhưng mà, em…… không tự tin là mình có làm được hay không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに難しかろうな。機関士・運転士とは違い、\n車掌は進路前方を見ることも出来ない」
2489 = "「Chắc chắn là khó rồi. Khác với \\x%l機関士;#00ffc040;lái tàu%l;#;, \\x%l車掌;#00ffc040;trưởng tàu%l;#; không thể nhìn thấy phía trước lộ trình.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
2326 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドのように共感がとれるわけでもないし……\n恐らくは限られた情報内で、瞬時に判断する他にない」
1898 = "「Cũng không thể \\x%l共感;#00ffc040;cộng cảm%l;#; như Railord được…… Có lẽ chỉ còn cách đưa ra quyết định tức thời trong giới hạn thông tin ít ỏi.」"
# monologue
# JP: ブレーキひとつに勇気とは、いささか大げさすぎようと、\nハチロクに聞かされたときは、そうも感じてしまったが。
3101 = "Khi nghe Hachiroku nói, tôi từng cảm thấy chỉ một cái phanh mà cần đến dũng khí thì có hơi nói quá."
# monologue
# JP: しかしなるほど、ふかみの身に置き換えて考えてみれば、\nそれはまさしく、勇敢でなければできないことだ。
2732 = "Nhưng quả thực, nếu đặt mình vào vị trí của Fukami mà suy nghĩ, đó đúng là việc không thể làm được nếu thiếu đi lòng dũng cảm."
# 【双鉄】
# display as 雙鐵
# JP: 「……列車を時速60キロで走行させているのなら、\n一秒間には、16.6メートル強も進んでしまう」
1504 = "「……Nếu tàu đang chạy với tốc độ 60km/h, thì trong một giây, nó đã tiến tới hơn 16,6 mét rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「は……い。です」
2325 = "「Vâ……ng. Ạ.」"
# monologue
# JP: ふかみの声が小さくなってしまう。
3031 = "Giọng Fukami nhỏ dần."
# monologue
# JP: 時間が、距離が安全のためにどれほど重要なものなのか、\nわかってくれているのだと感じる。
2915 = "Tôi cảm nhận được rằng, em ấy hiểu thời gian và khoảng cách quan trọng đến nhường nào đối với sự an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、そのときにはためらわずやってくれ。\n止まって何もなければ、それが一番いいことだから」
2247 = "「Do đó, lúc ấy em đừng ngần ngại mà hãy làm đi. Dừng lại mà không có chuyện gì xảy ra, đó mới là điều tốt nhất.」"
# 【ふかみ】
# display as 深美
# JP: 「理屈では……頭では、わかってるように思うんです。\nけど……わたし――実際にそれが出来るかどうか」
2495 = "「Về lý thuyết…… thì trong đầu em cũng hiểu rồi ạ. Nhưng mà…… em――không biết thực tế mình có làm được hay không nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、今はできんだろう」
2405 = "「Tất nhiên, bây giờ thì em chưa làm được đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
2033 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「できるのであれば最初から、\nポーレットはふかみを車掌にしているさ」
2152 = "「Nếu làm được thì ngay từ đầu, Paulette đã để Fukami làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2056 = "「A――」"
# monologue
# JP: ハチロクは反対するであろうが、\nそれでもポーレットは押し切ろう。
2855 = "Dù Hachiroku có phản đối đi chăng nữa, thì Paulette vẫn sẽ nhất quyết làm thế."
# monologue
# JP: 人を見る目と、決断力と。それがあるゆえポーレットは、\nあの細腕で、市と会社とを支え続けていられるのだ。
2972 = "Con mắt nhìn người, và sự quyết đoán. Nhờ có những điều đó, mà Paulette mới có thể dùng đôi vai gầy guộc ấy tiếp tục chống đỡ cho cả thành phố và công ty."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今はそうできない。だから、ポーレットは\nふかみに駅員見習いからスタートさせた」
1923 = "「Nhưng mà, bây giờ thì chưa được. Vì vậy nên Paulette mới để Fukami bắt đầu từ vị trí nhân viên nhà ga học việc.」"
# 【ふかみ】
# display as 深美
# JP: 「は、い」
2324 = "「Vâ, ng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「駅員見習いをしてみて、どうだ？　始める前と、\n駅や列車――鉄道の見え方は、変わったか？」
2158 = "「Làm nhân viên nhà ga học việc thì thấy thế nào? So với trước khi bắt đầu, cách em nhìn nhận nhà ga và đoàn tàu――hay đường sắt, có thay đổi không?」"
# 【ふかみ】
# display as 深美
# JP: 「それはもう！　すごく、全然かわりました！　です！」
2404 = "「Tất nhiên rồi ạ! Thay đổi rất nhiều, hoàn toàn khác luôn! Ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どんなふうに？」
2335 = "「Thay đổi như thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「きっぷを売ったり改札したり、ご案内するだけじゃなく。\n駅員も安全を支えてるんだって――わたし、わかって」
2235 = "「Không chỉ bán vé, \\x%l改札;#00ffc040;bấm vé%l;#;, hay hướng dẫn cho hành khách. Mà nhân viên nhà ga cũng đang duy trì sự an toàn――em đã hiểu ra điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2094 = "「喔」" 
# 【ふかみ】
# display as 深美
# JP: 「お客さんのときはあんまり意識してなかったけど――\n黄色い線、踏まれるの怖いって思うようになりました」
2218 = "「Hồi còn là hành khách em không để ý lắm―― Nhưng giờ em đã thấy sợ khi có người giẫm lên vạch vàng rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。入線のとき、黄色い線を踏み越えている者が\nいれば、汽笛を鳴らさざるを得ない」
2424 = "「Đúng vậy. Lúc tàu vào ga, nếu có người giẫm qua vạch vàng, thì bắt buộc phải kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#;.」"
# 【ふかみ】
# display as 深美
# JP: 「だから、どけます。お客様でも、注意して。\nそれが安全を――お客様を守ることにつながりますから」
2255 = "「Nên em sẽ yêu cầu họ lùi lại. Dù là hành khách thì em vẫn sẽ nhắc nhở. Vì điều đó gắn liền với sự an toàn――là bảo vệ chính hành khách mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2103 = "「嗯」" 
# monologue
# JP: ふかみは、しっかりと理解している。\nそう感じれば、もう一歩だけ進みたくなる。
2995 = "Fukami đã hiểu rất rõ. Cảm nhận được điều đó, tôi lại muốn tiến thêm một bước nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ではもし、ふかみの目の前に、黄色い線を踏み越えて、\n写真を撮ろうとしている男がいたら――どうする？」
1929 = "「Vậy giả sử, trước mặt Fukami, có một người đàn ông giẫm qua vạch vàng, để chụp ảnh thì――em sẽ làm gì?」"
# 【ふかみ】
# display as 深美
# JP: 「注意して、説明して、さがってもらいます、です」
2272 = "「Em sẽ nhắc nhở, giải thích và yêu cầu người đó lùi lại, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無視される。大男で、ふかみ一人では動かせない。\n助けてくれる人はいない。列車はどんどん近づいてくる」
1927 = "「Người đó phớt lờ em. Một người đàn ông to lớn mà một mình Fukami không thể lay chuyển được. Không có ai giúp đỡ. Đoàn tàu thì đang tiến lại gần.」"
# 【ふかみ】
# display as 深美
# JP: 「そのときには――振ります。赤の旗。\n列車、入ってきたらその人、死んじゃうかもしれないし」
2513 = "「Lúc đó thì――em sẽ phất cờ. Cờ đỏ. Vì nếu tàu tiến vào ga, người đó có thể sẽ chết mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、ふかみは、駅員の仕事としてなら、\nもう、『赤を切る』ことができるわけだ」
1900 = "「Nói cách khác, nếu là công việc của nhân viên nhà ga, thì Fukami đã có thể 『Kéo van đỏ』 rồi đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2075 = "「啊！」" 
# monologue
# JP: ひどく驚いた顔をして。
3057 = "Em ấy lộ vẻ mặt vô cùng kinh ngạc."
# monologue
# JP: その顔が、照れくさそうに、嬉しそうに、\nじんわり、ふにゃりと溶けていく。
3100 = "Gương mặt ấy, dần dần, mềm mại tan ra, trông có vẻ ngượng ngùng, lại có vẻ vui sướng."
# 【ふかみ】
# display as 深美
# JP: 「かも、です。駅のお仕事だったら――\n夢中になって、できる、かも」
1902 = "「Có lẽ là vậy, ạ. Nếu là công việc ở nhà ga thì―― em sẽ tập trung hết sức, và có thể làm được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはふかみが、駅を知ったからだ。\nゆえに、ポーレットはふかみから“見習い”を外した」
2485 = "「Đó là vì Fukami đã hiểu rõ về nhà ga. Do đó, Paulette mới gỡ bỏ chữ \"học việc\" của em.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2103 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ならば焦らず、一歩一歩を積み重ねればいい。いまの\nふかみに車掌が務まらぬのは、単に列車を知らんからだ」
2245 = "「Vậy thì đừng vội, cứ từng bước một tích lũy là được. Fukami bây giờ chưa thể đảm đương vị trí \\x%l車掌;#00ffc040;trưởng tàu%l;#;, đơn giản là vì em chưa hiểu rõ về đoàn tàu thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「列車を、知らない……」
1883 = "「Chưa hiểu rõ về đoàn tàu……」"
# monologue
# JP: 緩んでいた顔が、引き締まる。\nふかみは学びに貪欲なのだと、改めて強く感じる。
3037 = "Gương mặt vừa mới giãn ra lại trở nên căng thẳng. Tôi lại một lần nữa cảm nhận sâu sắc rằng Fukami rất ham học hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「駅務をこなし、その合間に添乗をして、学べばいい。\n列車のことを、線路のことを。そうすれば――」
2433 = "「Cứ hoàn thành tốt công việc ở ga, tranh thủ lúc rảnh rỗi lên tàu để học hỏi là được. Về đoàn tàu, về tuyến đường sắt. Cứ làm thế thì――」"
# 【ふかみ】
# display as 深美
# JP: 「そうすれば――わたしも覚えられますか？\n列車のことを、線路のこと。勉強したら」
2006 = "「Làm thế thì――em cũng sẽ nhớ được chứ? Về đoàn tàu, về tuyến đường sắt. Nếu em học.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。できるようになる。間違いなく。\n駅の仕事とおんなじように、必ず学べる」
2363 = "「Ừ. Em sẽ làm được thôi. Chắc chắn đấy. Giống như công việc ở nhà ga, nhất định em sẽ học được.」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！」
2147 = "「Vâng! Ạ!!」"
# monologue
# JP: （ぐいっ！）
3188 = "（Giật mạnh!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
# 2122 = "「噢」" 
# monologue
# JP: ふかみが、僕の手を引いてくる。\n明るい笑顔で、伸びやかな一歩を踏み出しながら。
3019 = "Fukami kéo tay tôi. Với nụ cười rạng rỡ, em ấy sải một bước dài tự do tự tại."
# 【ふかみ】
# display as 深美
# JP: 「それなら、教えてほしいです！　駅のこと、線路のこと。ちょっとずつでも、今すぐ覚えられることから！」
2518 = "「Nếu vậy thì, hãy dạy cho em đi! Về nhà ga, về tuyến đường sắt. Dù chỉ từng chút một, bắt đầu từ những thứ em có thể nhớ được ngay bây giờ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2103 = "「嗯」" 
# monologue
# JP: だから、僕も大きく踏み出す。\nふかみにぴったり、歩幅を合わせて。
2941 = "Nên tôi cũng sải bước dài. Vừa vặn khớp với nhịp bước của Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「喜んで！」
2230 = "「Rất sẵn lòng!」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁああ……くたくた、です」
2026 = "「Phaaaa…… mệt rã rời rồi, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。たっぷり汗をかいてしまった」
2216 = "「Anh cũng vậy. Đổ bao nhiêu là mồ hôi rồi.」"
# monologue
# JP: ふかみを送る足さえも、いささか重い。\n体力にだけは、そこそこ以上の自信を持っているのだが。
2916 = "Ngay cả đôi chân đưa Fukami về cũng có chút nặng nề. Dù tôi khá tự tin vào thể lực của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「少し――いや、かなり暑いな。\nなにか飲むか？」
2200 = "「Hơi――không, khá là nóng đấy. Em có muốn uống gì không?」"
# monologue
# JP: 休憩したいところなのだが、\nふかみは首を横に振る。
2911 = "Tôi đang muốn nghỉ ngơi,\nnhưng Fukami lại lắc đầu."
# 【ふかみ】
# display as 深美
# JP: 「涼むんだったら、川、どうですか？」
2198 = "「Nếu muốn hóng mát thì, ra sông được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「川下りか？」
1991 = "「Xuôi dòng sông sao?」"
# 【ふかみ】
# display as 深美
# JP: 「いえ、新しいサービスにできないかなってアイディアが、\n実は、ひとつあって」
1889 = "「Dạ không, thực ra em có một ý tưởng, không biết có thể làm thành dịch vụ mới được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2094 = "「喔」" 
# monologue
# JP: それは完全に初耳だ。\n興味が気力を回復させる。
3156 = "Đó là chuyện tôi hoàn toàn chưa từng nghe. Sự tò mò đã giúp tôi khôi phục lại tinh thần."
# 【ふかみ】
# display as 深美
# JP: 「まだ全然未整備だから、もうちょっと磨いてからとも\n思ってたんですけど。でも、汗もかいちゃいましたし」
2496 = "「Vì vẫn chưa chuẩn bị gì cả, nên em định chờ hoàn thiện thêm một chút nữa. Nhưng mà, dù sao chúng ta cũng đổ mồ hôi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汗を流せるような感じか？」
2323 = "「Là kiểu có thể xả mồ hôi được sao?」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、流せるのはきっと、ちょっとだけ、です。\nけど、思いっきり涼しいですよ？　間違いなく」
2023 = "「Ufufu, chắc là chỉ xả được một chút thôi, ạ. Nhưng mà, sẽ vô cùng mát mẻ đấy? Chắc chắn luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。では試させてもらいたい」
2116 = "「Hừm. Vậy cho anh thử xem sao.」"
# monologue
# JP: 言えばぱあっと、ふかみの笑顔が花開く。
3047 = "Tôi vừa dứt lời, nụ cười của Fukami liền nở rộ rạng rỡ."
# 【ふかみ】
# display as 深美
# JP: 「はい！　大歓迎です！！」
2149 = "「Vâng! Rất hoan nghênh ạ!!」"
# monologue
# JP: （サァァァァァァ）
3185 = "（Rào rào rào rào）"
# 【双鉄】
# display as 雙鐵
# JP: 「と、っと――」
2121 = "「Ây, da――」"
# 【ふかみ】
# display as 深美
# JP: 「大股になっちゃダメですよー！\n小足、小股で、足の裏をあんまり持ち上げないように」
2356 = "「Không được bước sải dài đâu nha~! Bước nhỏ thôi, bước ngắn thôi, cố gắng đừng nhấc gót chân lên quá cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2100 = "「Ừ, m.」"
# monologue
# JP: ……ふかみの教えに従って、小足、小股を意識する。
1451 = "……Làm theo lời dạy của Fukami, tôi chú ý bước từng bước nhỏ, sải ngắn."
# 【双鉄】
# display as 雙鐵
# JP: 「おお。確かに――これだけでかなり変わってくるな」
2124 = "「Ồ. Quả thực――chỉ cần vậy thôi đã khác hẳn rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「うふふ。上手ですよ？　双鉄おにいさん。\nあんよは上手、おにーさん、こちら」
2025 = "「Ufufu. Anh làm tốt lắm đó? Anh Soutetsu. Giỏi lắm giỏi lắm, anh ơi, hướng này ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いわれても捕まえられん」
1893 = "「Dù em có nói vậy thì anh cũng không bắt được đâu.」"
# monologue
# JP: 少しでも急ごうとすれば、足が浮く。\n浅瀬であっても、クマ川の流れはなかなか強い。
2895 = "Chỉ cần hơi vội một chút là chân tôi lại bồng bềnh. Dù là vùng nước nông, nhưng dòng chảy của sông Kuma cũng khá mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「このウォーターシューズというのにも……\n滑らんのは助かるが――なかなか慣れん、な」
2490 = "「Cả cái đôi giày đi nước này nữa…… Không bị trơn trượt thì tốt thật đấy――nhưng mãi mà chưa quen được.」"
# 【ふかみ】
# display as 深美
# JP: 「すぐ慣れますよ。双鉄おにいさんなら。\nわたしだって大丈夫なんですし」
1937 = "「Sẽ quen ngay thôi ạ. Nếu là anh Soutetsu. Đến cả em còn đi được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは川歩きの経験値が違いすぎよう。\nなんのあてにもならんさ」
2221 = "「Kinh nghiệm lội sông của Fukami khác biệt quá xa rồi. Chẳng thể lấy ra làm chuẩn được đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「それは、ちょっとは違いますけど……\nでも、大丈夫ですよ。バランス感覚いいんですし」
2426 = "「Cái đó thì, đúng là có khác một chút…… Nhưng mà, không sao đâu ạ. Anh giữ thăng bằng tốt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほめてもらえるのは嬉しいが――」
2441 = "「Được em khen thì anh vui lắm nhưng mà――」"
# monologue
# JP: これがどうにも難しい。\n川の中を歩いていくなど、いままでなかった経験だ。
3150 = "Cái này khó quá đi mất. Đi bộ dưới sông thế này, là trải nghiệm mà tôi chưa từng có."
# monologue
# JP: 僕のバランス感覚が、仮に人よりすぐれていても――\nああ。
2857 = "Dù cho khả năng giữ thăng bằng của tôi có nhỉnh hơn người bình thường đi chăng nữa―― A."
# 【双鉄】
# display as 雙鐵
# JP: 「凪は、どうだ？　凪ならやはり、\nこのリバーウォークとやらにも、すぐ馴染んだのか？」
1973 = "「Nagi thì sao? Nếu là Nagi thì chắc là, cũng quen ngay với cái trò lội sông này hả?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃんも、これはまだです。\n双鉄おにいさんが、一番最初で、はじめてですよ？」
2080 = "「A, Nagi cũng chưa thử trò này đâu ạ. Anh Soutetsu là người đầu tiên, là người mở màn đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。それは光栄だな」
2318 = "「Vậy sao. Thật vinh hạnh quá.」"
# monologue
# JP: ふふっと小さな笑い声。
3052 = "Một tiếng cười khúc khích nhỏ nhẹ vang lên."
# monologue
# JP: どんな笑顔か、その瞬間を捉えたいのに、\n今の僕では目線さえ、そろそろとしか動かせない。
2906 = "Tôi muốn bắt lấy khoảnh khắc ấy, xem đó là nụ cười như thế nào, nhưng tôi lúc này đến cả ánh mắt cũng chỉ có thể đảo qua đảo lại từ từ."
# 【ふかみ】
# display as 深美
# JP: 「……さっきもいったけど。まだ全然なんです。\nコースだって、今は決まってないですし」
1491 = "「……Lúc nãy em cũng nói rồi đó. Vẫn chưa chuẩn bị gì đâu ạ. Cả lộ trình, bây giờ cũng chưa quyết định xong nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、全く迷う様子もないが」
2009 = "「Nói vậy mà, trông em chẳng có vẻ gì là đang do dự cả.」"
# 【ふかみ】
# display as 深美
# JP: 「ここは、絶対に入れようって思ってますから。\n川の中からSLの通過を見上げるの――最高でしょう？」
2131 = "「Vì em nghĩ, nhất định phải đưa đoạn này vào. Từ dưới sông ngước nhìn SL đi qua――tuyệt vời lắm đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2289 = "「Ừ……」"
# monologue
# JP: 想像するだけでワクワクしてくる。
2888 = "Chỉ mới tưởng tượng thôi mà đã thấy háo hức rồi."
# monologue
# JP: 8620が通過する振動で、はたして川は揺れるのだろうか？\n汽笛が響けば、川面はうわん、と波立つだろうか？
3193 = "Liệu dòng sông có rung chuyển theo độ rung khi 8620 đi qua không? Nếu \\x%l汽笛;#00ffc040;còi hơi nước%l;#; vang lên, liệu mặt sông có gợn sóng lăn tăn không?"
# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。実にいい」
2483 = "「Tuyệt thật đấy. Thực sự rất tuyệt.」"
# 【ふかみ】
# display as 深美
# JP: 「じゃ！　やっぱりここは確定にしちゃいます。\nあとは、ここを起点にするか、終点にするか――とか」
2517 = "「Vậy! Quả nhiên đoạn này phải chốt thôi. Còn lại là, chọn đây làm điểm xuất phát, hay điểm kết thúc――kiểu vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……景観なども気にしないといかんのか」
2486 = "「Ra vậy…… Còn phải bận tâm đến cảnh quan nữa nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「ですね。ただ歩いてもらうだけで楽しいのなんて、\n川に入った一瞬だけかなって、思いますし」
2309 = "「Đúng vậy ạ. Em nghĩ việc chỉ đi bộ thôi mà cũng thấy vui, chắc chỉ là khoảnh khắc lúc mới xuống sông thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、普通はそうだろうな」
2110 = "「Chà, bình thường thì là vậy.」"
# monologue
# JP: 確かに僕も、水の冷たさ、感触を楽しめたのは一瞬だった。\n歩きはじめてしまえばすぐに、歩きづらさに気を取られた。
2901 = "Quả thực tôi cũng vậy, chỉ tận hưởng được sự mát lạnh và cảm giác của nước trong chốc lát. Khi bắt đầu bước đi, tôi lập tức bị phân tâm bởi sự khó khăn khi di chuyển."
# 【ふかみ】
# display as 深美
# JP: 「だから、景観を楽しめたり、面白いガイドを出来たり。\nその上で、子供さんやお年寄りも安全に歩けないとだし」
2260 = "「Vì thế, phải làm sao để thưởng thức được cảnh quan, hoặc có hướng dẫn viên thú vị. Hơn nữa, còn phải đảm bảo trẻ em và người già cũng có thể đi bộ an toàn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
# 2487 = "「這樣啊」" 
# monologue
# JP: 『全然未整備』――
1430 = "『Hoàn toàn chưa chuẩn bị gì cả』――"
# monologue
# JP: ふかみのさきほどの言葉の意味が、\nようやく僕にも伝わってくる。
2924 = "Ý nghĩa trong câu nói ban nãy của Fukami, cuối cùng tôi cũng đã hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「コースの選び方一つで、観光として成立するか否かが\n大きく変化してしまうのか」
2463 = "「Chỉ một cách chọn lộ trình thôi, mà có thể thay đổi lớn đến việc nó có thành công như một dịch vụ du lịch hay không sao.」"
# 【ふかみ】
# display as 深美
# JP: 「です。ですから、ほんとはコースもう少し練り込んで。\nそれから双鉄おにいさんをご招待したかったんですけど」
2312 = "「Vâng. Vì vậy nên, thực ra em định trau chuốt lộ trình thêm một chút nữa. Rồi sau đó mới mời anh Soutetsu đến chơi.」"
# monologue
# JP: ぱしゃり、とふかみが水を蹴る。
2812 = "Tõm một tiếng, Fukami đá nước."
# monologue
# JP: かなり高くまで足をあげ――\nそれでも微塵も、そのバランスは崩れない。
2833 = "Nhấc chân lên khá cao―― Nhưng em ấy vẫn không hề mất thăng bằng dù chỉ một chút."
# 【ふかみ】
# display as 深美
# JP: 「走るの、付き合ってもらっちゃいましたから。\n足、疲れを取るのにもちょうどいいかな、って思って」
2130 = "「Vì anh đã đi cùng em, lúc em chạy mà. Nên em nghĩ, thế này cũng vừa hay để giảm bớt mệt mỏi cho đôi chân.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、驚いたぞ。\nまさかいきなり、\x%l列車防護;#00ffc040;列車防護%l;#;の実習になるとはなぁ」
2306 = "「À, anh ngạc nhiên lắm đấy. Không ngờ lại đột nhiên thành buổi thực hành \\x%l列車防護;#00ffc040;phòng vệ tàu%l;#; luôn.」"
# 【ふかみ】
# display as 深美
# JP: 「――自分の列車が停止したとき、\n確実に関係列車が停止できる安全距離は、600メートル」
1459 = "「――Khi đoàn tàu của mình dừng lại, khoảng cách an toàn để đảm bảo các đoàn tàu liên quan có thể dừng lại là 600 mét.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2103 = "「嗯」" 
# monologue
# JP: さきほど教えたばかりのことを、\nふかみは正確に復唱していく。
3016 = "Những điều tôi vừa dạy ban nãy, Fukami nhắc lại một cách chính xác."
# 【ふかみ】
# display as 深美
# JP: 「だから[とうがい,1]当該列車の車掌は、停止位置から600メートルを\n\x%l信号炎管;#00ffc040;信号炎管%l;#;を示しつつ、全力で走りきらなければならない」
2258 = "「Vì vậy \\x%l車掌;#00ffc040;trưởng tàu%l;#; của đoàn tàu đó, phải chạy hết tốc lực 600 mét từ vị trí dừng, đồng thời giơ cao \\x%l信号炎管;#00ffc040;ống pháo hiệu%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。一発でよく覚えたな」
2364 = "「Chính xác. Mới một lần mà em đã nhớ kỹ rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「それは、だって。\n体をつかって、覚えましたから、です！」
2133 = "「Đó là, tại vì.\nEm đã dùng cơ thể để ghi nhớ mà, ạ!」"
# monologue
# JP: 一歩ずつ、今できることから列車のことを、\n線路のことを学びたい。
3009 = "Tôi muốn học hỏi về đoàn tàu, về tuyến đường sắt từng bước một, bắt đầu từ những việc mình có thể làm ngay bây giờ."
# monologue
# JP: ……まさか自分が臨時講師を務めるとは思ってなかったが、\nふかみは見事に、合格点をあげてくれた。
1452 = "……Không ngờ mình lại làm giảng viên lâm thời, nhưng Fukami đã xuất sắc đạt điểm đậu."
# 【双鉄】
# display as 雙鐵
# JP: 「それなら、僕も教えがいがある」
2506 = "「Nếu vậy thì, anh cũng thấy bõ công dạy.」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　双鉄教官！\nこれからもお願いします！　です！！」
2328 = "「Vâng! Giáo quan Soutetsu! Từ nay về sau cũng xin được nhờ anh chỉ giáo! Ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「車掌の業務については知識でしか知らんが――\nその範囲で教えられることはもちろん、全て教えるさ」
2228 = "「Về nghiệp vụ của \\x%l車掌;#00ffc040;trưởng tàu%l;#; thì anh chỉ biết qua kiến thức sách vở thôi―― Nhưng trong phạm vi đó, tất nhiên anh sẽ dạy em tất cả những gì có thể.」"
# 【ふかみ】
# display as 深美
# JP: 「やったぁ」
2139 = "「Tuyệt quá.」"
# monologue
# JP: ぱしゃん、と跳ねる。\n水面から両足が綺麗に飛び出す――
3056 = "Bắn tung tóe, em ấy nhảy lên. Đôi chân xinh đẹp vút lên khỏi mặt nước――"
# monologue
# JP: 魚のように、人魚のように。
2847 = "Giống như một chú cá, giống như một nàng tiên cá."
# 【双鉄】
# display as 雙鐵
# JP: 「……若いなぁ」
1509 = "「……Trẻ trung thật đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「や！　何言ってるんですか双鉄おにいさん。\n自分だって、全然若いじゃないですか！」
2017 = "「Da! Anh Soutetsu nói gì vậy. Bản thân anh cũng còn trẻ chán mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふかみや凪のような――\nみずみずしいほどの若さはないさ」
1894 = "「Không đâu, anh không còn sức trẻ tươi mới như Fukami hay Nagi nữa rồi.」"
# monologue
# JP: 川の流れにさらされ、冷やされ、\nそれでも、足は軽くならない。
3162 = "Dù đã được dòng sông xoa dịu, làm mát, nhưng đôi chân vẫn chẳng nhẹ nhàng hơn chút nào."
# monologue
# JP: 回復が遅くなっているのは、\nまさしく、加齢の影響だろう。
2891 = "Việc hồi phục chậm lại, chắc chắn là do ảnh hưởng của tuổi tác rồi."
# monologue
# JP: （ああ！　真闇姉がいっていた、\n『自分を大事に』とはこのことか――）
3183 = "（A! Lời chị Mayami dặn, 『Phải biết giữ gìn sức khỏe』 là thế này đây sao――）"
# monologue
# JP: このタイミングで思い出してしまったことが、\n申し訳なくも、少しおかしい。
3153 = "Việc nhớ lại vào đúng lúc này, thật có lỗi nhưng cũng hơi buồn cười."
# 【ふかみ】
# display as 深美
# JP: 「なにか、面白いことでもありました？　です？」
2337 = "「Có chuyện gì thú vị sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、なに――」
1896 = "「Không, có gì đâu――」"
# monologue
# JP: まさか、正直なところは言えない。\nかといって嘘もつきたくない。
2842 = "Tôi không thể nói thật được. Nhưng cũng không muốn nói dối."
# monologue
# JP: さて……と思えば、\nすぐに言葉が浮き上がってくる。
2908 = "Nghĩ xem nên nói gì…… Thì ngay lập tức một câu nói nảy ra trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「ただ、しあわせだと思っただけだ」
2225 = "「Chỉ là, anh thấy mình thật hạnh phúc thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「なにが、です？」
1910 = "「Hạnh phúc chuyện gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「この時間が。この時間へとつながってくれた――\n全ての時間が、しあわせだ」
2488 = "「Khoảng thời gian này. Và tất cả những khoảng thời gian―― đã kết nối để tạo nên khoảnh khắc này, đều thật hạnh phúc.」"
# monologue
# JP: そう思える。とても素直に。\n過去の傷さえ、洗い流せると思えるほどに。
3152 = "Tôi có thể cảm nhận như vậy. Rất chân thành. Đến mức tôi nghĩ nó có thể gột rửa cả những vết thương trong quá khứ."
# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行に、誘ってもらえてとてもよかった。\nあの瞬間から――僕は、大きく変われたのだと思う」
2443 = "「Được rủ đi chuyến dã ngoại đó, thật sự rất tuyệt. Từ khoảnh khắc đó――anh nghĩ mình đã thay đổi rất nhiều.」"
# monologue
# JP: ふかみが、凪が、変えてくれた。\nともに楽しむ、自ら楽しむ、その喜びを教えてくれた。
2958 = "Fukami, và Nagi, đã thay đổi tôi. Đã dạy tôi niềm vui khi cùng nhau tận hưởng, tự mình tận hưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「感謝している。本当に。\nふかみに、凪に。そして、みんなに」
2238 = "「Anh thực sự rất biết ơn. Fukami, Nagi. Và tất cả mọi người.」"
# 【ふかみ】
# display as 深美
# JP: 「や、やだ！　双鉄おにいさん。急にそんな――\nそんなこと言われたら、わたし、照れちゃいます、です」
2449 = "「T, thôi đi! Anh Soutetsu. Đột nhiên lại―― Nói mấy lời đó, làm em, ngại lắm đấy, ạ.」"
# monologue
# JP: ふかみがくるりと向こうを向く。\nその首すじが、赤くなってる。
3058 = "Fukami quay ngoắt sang hướng khác. Cổ em ấy đỏ ửng lên."
# monologue
# JP: 照れさせるつもりはなかったのだが――\n照れてもらえて、それはそれでやはり、嬉しく思う。
3125 = "Tôi không định làm em ấy ngại―― Nhưng thấy em ấy ngại ngùng thế này, tôi lại thấy vui."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2379 = "「Fukami.」"
# monologue
# JP: ふれあいたいな、と自然に思う。\nふかみの温度を、恋しく思う。
2810 = "Tôi bỗng có cảm giác muốn chạm vào em ấy một cách tự nhiên. Thấy nhớ hơi ấm của Fukami."
# monologue
# JP: ほんの数歩のふかみとの距離が、\n無限に遠いものと感じる。
2748 = "Khoảng cách chỉ vài bước chân giữa tôi và Fukami, lại có cảm giác xa xăm vô tận."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかっ――おおうっ！！？」
2378 = "「Fuka――Oái!!?」"
# monologue
# JP: いかん、滑った！\n足が、いつの間に大股にっ――
2704 = "Chết dở, trượt chân rồi! Không biết từ lúc nào tôi đã sải bước dài――"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんっ！！？」
2524 = "「Anh Soutetsu!!?」"
# monologue
# JP: ふかみが振り向く。\n僕に向かって手をのばす――
2994 = "Fukami quay lại.\nVươn tay về phía tôi――"
# monologue
# JP: （しかし、この手をつかんだらっ）
3178 = "（Nhưng nếu nắm lấy tay em ấy）"
# monologue
# JP: ふかみを巻き込みたくなくて、\nとっさに腕をひっこめてしまう。
2896 = "Không muốn kéo theo Fukami ngã cùng, tôi vội rụt tay lại."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさ！？　――きゃあっ！！？」
2523 = "「Anh Soutets!? ――Kyaa!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！！！」
2382 = "「Fukami!!!」"
# monologue
# JP: いかん。裏目に出てしまった。
3091 = "Nguy rồi. Phản tác dụng mất rồi."
# monologue
# JP: 引っ込めた手をそれでもふかみはつかもうと――\n無理に体を伸ばしきり、結果、自らも滑ってしまう！
2747 = "Fukami vẫn cố vươn tới nắm lấy bàn tay tôi vừa rụt lại―― Cố sức rướn người, kết quả là tự mình cũng bị trượt ngã!"
# monologue
# JP: かばうため、慌てていまさら手を伸ばしっ――
3060 = "Để bảo vệ em ấy, tôi vội vàng vươn tay ra――"
# 【双鉄】
# display as 雙鐵＆深美
# JP: 「うっ！」\n「きゃあっ！！！」
2053 = "「Ư!」\n「Kyaa!!!」"
# monologue
# JP: （ばちゃんっ！！！！！）
3186 = "（Tùm!!!!!）"
# monologue
# JP: 水――だ。冷たい。\nひどく冷たく、ここちいい。
2970 = "Là――nước. Lạnh quá. Vô cùng lạnh, nhưng cũng rất dễ chịu."
# 【ふかみ】
# display as 深美
# JP: 「あうぅ、やだ、濡れちゃった――\nけど、双鉄おにいさんが守ってくれたから――」
2061 = "「Auu, ôi không, ướt hết rồi―― Nhưng mà, nhờ anh Soutetsu đã bảo vệ em――」"
# monologue
# JP: 体が、重い。ずぶずぶ沈む感覚がする。\nこんな浅瀬で、溺れるなどはありえない。
3140 = "Cơ thể, nặng trĩu. Có cảm giác đang chìm dần. Ở vùng nước nông thế này, không thể nào chết đuối được."
# monologue
# JP: そうとはわかっているのだけれど――
2940 = "Dù biết là vậy nhưng――"
# 【ふかみ】
# display as 深美
# JP: 「あれ？　ちょっと？　双鉄、双鉄おにいさん！？\nちょっと！　目！　目、あけてくださいっ！！」
2032 = "「Ơ? Khoan đã? Soutetsu, anh Soutetsu!? Khoan đã! Mắt! Anh mở mắt ra đi!!」"
# monologue
# JP: いわれて、気付く。\n僕は目を閉じているのだと。
3102 = "Nghe gọi, tôi mới nhận ra.\nMình đang nhắm mắt."
# 【ふかみ】
# display as 深美
# JP: 「ちょっ――これ――とにかく、岸に――\nあげない、とっ！！」
2481 = "「Khoan――chuyện này――dù sao cũng phải―― kéo lên, bờ đã!!」"
# monologue
# JP: いかん。ふかみが怯えている。\n僕の体を、必死になってひっぱっている。
2702 = "Không được rồi. Fukami đang sợ hãi. Em ấy đang tuyệt vọng kéo cơ thể tôi."
# monologue
# JP: 無理をさせたくなんてない。不安にさせたくなんてない。\nだから、目を開けて動きたい。のに――
2899 = "Tôi không muốn em ấy phải cố sức. Không muốn làm em ấy lo lắng. Nên tôi muốn mở mắt ra và cử động. Thế nhưng――"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？　大丈夫ですから。\nすぐ、人を呼んできますから！！！」
2522 = "「Anh Soutetsu? Không sao đâu ạ. Em sẽ đi gọi người đến ngay!!!」"
# 【凪】
# display as 凪
# JP: 「――が、いっつも引っ張り回したせい――」
1458 = "「――Đều là tại em cứ kéo anh ấy đi khắp nơi――」"
# 【ふかみ】
# display as 深美
# JP: 「――なことないよ。凪ちゃ――たし、も――」
1461 = "「――Không phải đâu. Nagi――chị, cũng――」"
# monologue
# JP: 声が、聞こえる。
2925 = "Tôi nghe thấy tiếng nói."
# monologue
# JP: にぎやかな声。柔らかな声。\n僕の大好きな、響き合う声が。
2700 = "Một giọng nói náo nhiệt. Một giọng nói dịu dàng. Những giọng nói hòa quyện vào nhau mà tôi vô cùng yêu thích."
# 【凪】
# display as 凪
# JP: 「……うち、いつだって目一杯、くたくたになるまで、\n稽古ばつけてもらって、遊んでもらって――」
1500 = "「……Lúc nào em cũng chơi đùa, bắt anh ấy tập kiếm cùng cho đến khi mệt rã rời――」"
# 【ふかみ】
# display as 深美
# JP: 「そんなの、わたしだってだよ！　双鉄おにいさんに、\nいつだって甘えて、支えてもらって――」
2212 = "「Chuyện đó, chị cũng vậy mà! Lúc nào cũng nũng nịu, và được anh Soutetsu giúp đỡ――」"
# monologue
# JP: 大好きな声が、けれども今は辛く聞こえる。\n哀しみ同士が、後悔が、切なく響き合ってしまっている。
2749 = "Những giọng nói tôi yêu thích, giờ đây nghe thật xót xa. Những nỗi buồn, những niềm hối hận, đang cộng hưởng đầy bi thương."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんとにーさんの修学旅行のときば、\nうち、のーんびり休んどったばってん」
2171 = "「Lúc bé Fukami và anh hai đi chuyến dã ngoại, em đã được nghỉ ngơi thoải mái mà」"
# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。わたしも。――だけど、双鉄お兄さんは。\nお仕事をして、お休みの日には、必ずわたしたちのこと」
2294 = "「Đúng vậy, nhỉ. Chị cũng thế. ――Nhưng mà, anh Soutetsu thì. Vừa phải làm việc, đến ngày nghỉ thì lúc nào cũng dành thời gian cho chúng ta」"
# 【凪】
# display as 凪
# JP: 「構って、遊んでくれとったばい。\nいっつも変わらず、うちを受け止めてくれとったばい」
1921 = "「Anh ấy luôn quan tâm, chơi đùa cùng em. Lúc nào cũng vậy, luôn đón nhận em.」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんだけじゃないよ。わたしのことも支えてくれた。\nいつだって――どんなときでも、必ず支えてくれた」
1879 = "「Không chỉ riêng Nagi đâu. Anh ấy cũng đã hỗ trợ chị. Lúc nào cũng vậy――dù trong hoàn cảnh nào, anh ấy cũng nhất định giúp đỡ chị.」"
# 【凪】
# display as 凪
# JP: 「うち……たち。\nにーさんに、甘えて――ずっと、甘えまくって――」
2037 = "「Chúng…… ta. Đã quá dựa dẫm vào anh hai――lúc nào cũng nũng nịu――」"
# 【ふかみ】
# display as 深美
# JP: 「一方的に……\n甘やかされて――支えて、もらってただけで」
2098 = "「Chỉ đơn phương…… được chiều chuộng――được anh ấy giúp đỡ thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――――――」
1471 = "「――――――」"
# monologue
# JP: それは違うと、言いたいけれど声が出ない。
2913 = "Tôi muốn nói rằng không phải vậy, nhưng lại không cất nên lời."
# monologue
# JP: 体が、ぴくりとも動かない。\n力の入れ方が、わからない。
3141 = "Cơ thể không nhúc nhích dù chỉ một chút. Tôi không biết phải dùng sức thế nào."
# 【凪】
# display as 凪
# JP: 「……うち、たち。こどもすぎたばい。甘えるだけで――にーさんに、なーんもおかえしせんままで」
1496 = "「……Chúng ta. Trẻ con quá rồi. Chỉ biết nũng nịu――mà chẳng đền đáp lại anh hai được gì.」"
# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。凪ちゃん。それじゃ、いけない。\nわたしたち――もっと大人に、ならなくちゃ」
2292 = "「Đúng vậy, nhỉ. Nagi. Cứ thế này thì không được. Chúng ta――phải trưởng thành hơn nữa.」"
# monologue
# JP: 違う。僕も甘やかされてた。\nふたりとともに過ごす時間に、大きなしあわせを貰ってた。
2706 = "Không phải. Tôi cũng đã được chiều chuộng. Trong khoảng thời gian ở bên hai em, tôi đã nhận được một niềm hạnh phúc to lớn."
# monologue
# JP: あまりにしあわせで楽しくて――\n体がくたくたであることに、気づけなくなってしまうほど。
2960 = "Quá đỗi hạnh phúc và vui vẻ―― Đến mức tôi không còn nhận ra cơ thể mình đã mệt mỏi rã rời."
# 【凪】
# display as 凪
# JP: 「……いつまでも、こどものままではおれん、けん。\n遊びの時間ば、ずっーとは続けておれんけん」
1495 = "「……Chúng ta không thể cứ mãi là trẻ con được. Thời gian vui chơi, không thể cứ kéo dài mãi được.」"
# 【ふかみ】
# display as 深美
# JP: 「だね。凪ちゃん。\nどんなに楽しい旅だって――終わらせなくちゃ」
2311 = "「Đúng vậy. Nagi. Dù chuyến đi có vui vẻ đến đâu――cũng phải có lúc kết thúc.」"
# 【凪】
# display as 凪
# JP: 「あ――」
# 2056 = "「啊……」" 
# monologue
# JP: 確かに、旅は……終わらせなければならないものだ。\n終着駅につかないのなら、どんな旅でも苦痛に変わる。
3077 = "Quả thực, chuyến đi là thứ…… bắt buộc phải kết thúc. Nếu không có bến đỗ, thì chuyến đi nào rồi cũng sẽ trở thành nỗi đau."
# 【凪】
# display as 凪
# JP: 「……わかっとるけど。さみしかとねぇ」
1498 = "「……Em hiểu chứ. Nhưng mà buồn lắm.」"
# 【ふかみ】
# display as 深美
# JP: 「そう、だね。凪ちゃん」
2290 = "「Đúng, vậy nhỉ. Nagi.」"
# monologue
# JP: ――だからこそ。ずっと続けていたかった。\n凪とふかみとの修学旅行を。
1432 = "――Chính vì thế. Tôi mới muốn kéo dài mãi. Chuyến dã ngoại cùng Nagi và Fukami."
# monologue
# JP: 賑やかで、良くも悪しくも刺激にみちて、しあわせな――\n僕が手に入れ損ねた時間を、ふたりに与えてもらう旅行を。
2824 = "Náo nhiệt, tràn đầy kích thích dù tốt hay xấu, và hạnh phúc―― Chuyến đi mà hai em ấy đã ban tặng cho tôi khoảng thời gian mà tôi từng đánh mất."
# 【ふかみ】
# display as 深美
# JP: 「……修学旅行が終わっても。大人に……なっても。\n双鉄おにいさんと……もしも三人でいられなくなっても」
1507 = "「……Dù chuyến dã ngoại kết thúc. Dù chúng ta có…… trưởng thành. Dù không thể ở bên cạnh anh Soutetsu…… cùng nhau ba người được nữa.」"
# 【凪】
# display as 凪
# JP: 「っ！！？」
# 2091 = "「啊？！」" 
# 【ふかみ】
# display as 深美
# JP: 「それでも――ずっと！\nわたしたち、ずっとともだちだよね？　凪ちゃん」
2179 = "「Dù vậy――mãi mãi! Chúng ta vẫn sẽ luôn là bạn của nhau đúng không? Nagi.」"
# monologue
# JP: 凪は、瞬間だまりこむ。\nすっと大きく――息を吸い込む音が聞こえる。
2778 = "Nagi im lặng trong giây lát. Tôi nghe thấy tiếng em ấy――hít một hơi thật sâu."
# 【凪】
# display as 凪
# JP: 「あったりまえばい！　ふかみちゃん！\nおとなになっても、ずっと、ずーっと大親友ばい！」
2402 = "「Tất nhiên rồi! Bé Fukami! Dù có lớn lên, chúng ta vẫn sẽ mãi mãi, mãi mãi là bạn thân nhất của nhau!」"
# 【ふかみ】
# display as 深美
# JP: 「――だったら、平気。\nわたし、修学旅行がおわっても」
1514 = "「――Nếu vậy thì, không sao cả. Dù chuyến dã ngoại có kết thúc.」"
# 【凪】
# display as 凪
# JP: 「うちもばい。旅の終わりは、さみしかばってん――\nもっと楽しか旅が、きっとうちたちを待っとるばい！」
2035 = "「Em cũng thế. Chuyến đi kết thúc thì buồn thật―― Nhưng chắc chắn sẽ có một chuyến đi thú vị hơn đang chờ đợi chúng ta!」"
# 【ふかみ】
# display as 深美
# JP: 「うんっ！」
2106 = "「Ừm!」"
# monologue
# JP: ああ、けれど――凪は、ふかみは、羽化しかけてる。
2734 = "A, nhưng mà――Nagi, và Fukami, đang bắt đầu lột xác."
# monologue
# JP: 大人になって羽ばたくために、\n甘く楽しい魔法の時間に、自ら区切りをつけている。
3061 = "Để trưởng thành và tung cánh bay cao, các em ấy đang tự mình đặt dấu chấm hết cho khoảng thời gian phép thuật ngọt ngào và vui vẻ này."
# monologue
# JP: （だったら――僕、も――）
3190 = "（Nếu vậy thì――mình, cũng phải――）"
# monologue
# JP: 動かなくては。歩かなくては。\n羽ばたかなくては――どんな大人にさえもなれない。
2837 = "Phải cử động. Phải bước đi. Phải tung cánh――Nếu không thì chẳng thể trở thành một người lớn đúng nghĩa."
# monologue
# JP: 例えひととき、どれほどの寂しさを味わおうとも――\n大人になるため、次の旅へと、向かっていきたい。
2788 = "Dù có phải nếm trải bao nhiêu nỗi cô đơn trong một khoảnh khắc―― Vì sự trưởng thành, tôi cũng muốn hướng tới chuyến đi tiếp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
2052 = "「Ưm…… hự――」"
# 【凪】
# display as 凪＆深美
# JP: 「っ！！？　にーさん！！？」\n「双鉄お兄さんっ！！？」
2086 = "「!!? Anh hai!!?」\n「Anh Soutetsu!!?」"
# monologue
# JP: まぶたが、開く。\n体が、動く。
2921 = "Mí mắt tôi mở ra.\nCơ thể cử động."
# monologue
# JP: そしてようやく――声が出る。
2717 = "Và cuối cùng――tôi đã có thể cất tiếng."
