2500 = "「Dạ…… Theo kế hoạch ban đầu của anh\nSoutetsu,\nthì hôm nay anh định dẫn em đi\nđâu ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「昨日の夜に希望を聞こうと思っていたのだ。\nぼんやりとは、映画館なり動物園なりと考えていた」
2338 = "「Tối qua anh định hỏi xem em muốn đi đâu.\nTrong đầu anh chỉ lờ mờ nghĩ đến rạp chiếu\nphim hay sở thú thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「あー、[やつしろ,2]八ツ城か[くまもと,1]隈元までおでかけできたんですねー」
2063 = "「A, thế là mình có thể đi Yatsushiro hay\nKumamoto rồi ha.」"

# monologue
# JP: 残念そうにふかみがつぶやく。\nなんだかんだでもう昼すぎだ。
3030 = "Fukami lẩm bẩm đầy tiếc nuối.\nDù sao thì\ncũng đã quá trưa rồi."

# monologue
