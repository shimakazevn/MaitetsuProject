2047 = "「Trời ơi trời ơi trời ơi! Sức biểu cảm\nthật phong phú làm sao!\nQuả không hổ danh tiểu thư Fukami là một\nngười yêu sách nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、あの――ハチロク、ちゃん。\nふかみ、様は……えと、やめて欲しい、かも。です」
2498 = "「À, ừm——Hachiroku.\nTiểu thư Fukami thì…… ừm, chị đừng gọi em\nnhư vậy nữa, được không ạ. Desu.」"

# 【ハチロク】
# display as 八六
# JP: 「はい？」
1912 = "「Dạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2303 = "「À.」"

# monologue
# JP: 僕にはわかる。
2926 = "Tôi hiểu mà."

# monologue
# JP: ハチロクが戸惑ってしまった理由も、\nふかみがそうと申し出た理由も。
3067 = "Cả lý do khiến Hachiroku bối rối,\nlẫn lý do Fukami lại yêu cầu như vậy."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　明日から見習いじゃなくなるけん！\n御一夜鉄道の仲間やけんね！！」
2175 = "「Fukami! Từ ngày mai cậu sẽ không còn là\nthực tập sinh nữa!\nMà là thành viên của Đường sắt Ohito rồi\nnha!!」"

# 【ふかみ】
# display as 深美
# JP: 「あ」
2065 = "「A.」"

# monologue
# JP: 凪も、やはりわかっていた。\n力強い支援をうけて、ふかみの顔がほうっと緩む。
2775 = "Quả nhiên Nagi cũng hiểu.\nNhận được sự hỗ trợ mạnh mẽ đó, gương mặt\nFukami giãn ra nhẹ nhõm."

# 【ハチロク】
# display as 八六
# JP: 「まぁ、おめでとう、ふかみ」
2107 = "「Chà, chúc mừng em nhé, Fukami.」"

# 【日々姫】
# display as 日日姬
# JP: 「おめでとー！　ふかみちゃん。\n見習い期間、最短でクリアでしょ？　さすが！」
2193 = "「Chúc mừng nha! Bé Fukami.\nEm vượt qua kỳ thực tập với thời gian ngắn\nnhất đúng không? Đỉnh quá!」"

# 【ふかみ】
# display as 深美
# JP: 「いえっ、そんな」
2362 = "「Dạ không, đâu có ạ.」"

# 【凪】
# display as 凪
# JP: 「ポーねーちゃんもほめとったばい！！\n接客の経験値が違いすぎるって！」
2375 = "「Chị Paulette cũng khen cậu lắm đó nha!!\nBảo là kinh nghiệm tiếp khách khác biệt\nhoàn toàn luôn!」"

# 【ふかみ】
# display as 深美
# JP: 「わ、わたし――あのっ――そんなっ……\nふしゅうううう～～」
2208 = "「T-tớ——à ừm——đâu có……\nFushuuuuuu~~」"

# monologue
# JP: さりげなく、明るく受け入れられて、歓迎されて、\nふかみが真っ赤になってしまう。
2871 = "Được chào đón và tiếp nhận một cách tự\nnhiên và tươi sáng,\nFukami đỏ bừng cả mặt."

# monologue
# JP: 可愛らしいが、気の毒だ。\nそれに加えて――
3161 = "Đáng yêu thì đáng yêu thật, nhưng cũng tội\nnghiệp con bé.\nThêm vào đó——"

# 【双鉄】
# display as 雙鐵
# JP: 「祝福には大感謝だが、時間にも限りがある。\n今はふかみに、じっくり見学させてやってはくれんか？」
2205 = "「Rất cảm ơn mọi người đã chúc mừng, nhưng\nthời gian có hạn.\nBây giờ mọi người cứ để Fukami từ từ tham\nquan được không?」"

# 【凪】
# display as 凪
# JP: 「あ！　そりゃそーばい！　したら凪さま、\n油さしてくるとばい！　まだ途中だったけん！」
2071 = "「A! Đúng rồi ha! Vậy Nagi ta đây,\nđi tra dầu đây! Vẫn đang làm dở mà!」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。それが合理的判断かと」
2317 = "「Đúng vậy nhỉ. Đó là một quyết định hợp lý\nđấy.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃん！？　――ハチロクちゃんも！？」
2082 = "「A, Nagi!? ——Cả Hachiroku nữa!?」"

# 【凪】
# display as 凪
# JP: 「ごゆっくりばい！！」
1934 = "「Cứ từ từ tham quan nha!!」"

# 【ハチロク】
# display as 八六
