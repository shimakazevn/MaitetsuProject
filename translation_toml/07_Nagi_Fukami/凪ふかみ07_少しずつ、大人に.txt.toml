3041 = "深美突然移開了倚靠著我的身體。" 

# 【ふかみ】
# display as 深美
# JP: 「一番キラキラしてる凪ちゃんの姿。\n運転台の中ではきっと、双鉄おにいさんもおんなじ」
2512 = "「那是小凪最為耀眼的模樣。在駕駛台內的時候，雙鐵哥哥你一定也是一樣的」" 

# monologue
# JP: ……確かに、それはそうかもしれん。
1446 = "……也許就像她說的那樣吧。" 

# monologue
# JP: 運転中は、\n前方注視を解かぬゆえ、凪を見ている余裕も無いが――
2710 = "不過駕駛時必須時刻注視前方，我沒時間去觀察凪。" 

# 【双鉄】
# display as 雙鐵
