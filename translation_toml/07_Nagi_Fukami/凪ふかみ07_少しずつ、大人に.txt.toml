# JP: 「ですね。凪ちゃん、大人になったし――綺麗になった。\n今日も、とっても綺麗だった」
2301 = "「是啊。小凪長大了，也變漂亮了。今天的打扮也非常漂亮」" 

# 【双鉄】
# display as 雙鐵
