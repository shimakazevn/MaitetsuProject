2222 = "「Fukami lúc chúng ta mới gặp,\nlà một cô bé\nhay khom lưng, lúc nào cũng rụt rè sợ\nsệt.」"

# 【ふかみ】
# display as 深美
# JP: 「あうっ」
# 2099 = "「嗚……」" 

