2365 = "「Dạ không, chuyện đó!\nLà do em hỏi hơi kỳ\ncục thôi.」"

# monologue
# JP: 真っ赤になって手を振って――
3024 = "Em ấy đỏ bừng mặt, xua xua tay――"

# monologue
# JP: （ぴとっ）
3192 = "（Áp sát）"

# 【双鉄】
