1968 = "「Nagi cũng vậy. Bốc đồng, thiếu suy nghĩ――\nLuôn cho chính nghĩa của mình là tuyệt\nđối…… Nói thẳng ra, là một đứa nhóc.」"

# 【ふかみ】
