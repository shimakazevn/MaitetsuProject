3035 = "Fukami cười khổ.\nTrông có vẻ như đang xen lẫn giữa sự bối\nrối và niềm vui."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんに気をつかわせたくなかったのに～」
2231 = "「Tớ không muốn làm Nagi phải bận tâm đâu\nmà~」"

# 【日々姫】
# display as 日日姬
# JP: 「気ばつかっただけじゃなかとよ。\nハチロクもいうとったけど、こいばこいで、合理的判断」
1881 = "「Không chỉ là bận tâm đâu.\nNhư Hachiroku cũng đã nói rồi đó, đây là\nmột quyết định hợp lý.」"

# 【ふかみ】
# display as 深美
# JP: 「合理的判断、です？」
2015 = "「Quyết định hợp lý, desu?」"

# 【日々姫】
# display as 日日姬
# JP: 「そ。見習いとはいえ、今日は凪ちゃんが機関士やけんね。\nオイルチェックと走行部点検も、凪ちゃんのお仕事」
2161 = "「Ừm. Dù là thực tập sinh, nhưng hôm nay\nNagi là người lái tàu mà.\nViệc kiểm tra dầu và kiểm tra bộ phận chạy\ncũng là công việc của Nagi.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――だから、今のうちに。です？」
2060 = "「A——nên mới tranh thủ lúc này. Desu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。発車前には、運転台の中にも外にも、\n確認し準備するべき事柄がいくつもある」
2300 = "「Đúng vậy. Trước khi khởi hành, dù là\ntrong hay ngoài buồng lái,\nđều có rất nhiều việc cần phải xác nhận và\nchuẩn bị.」"

# 【日々姫】
# display as 日日姬
# JP: 「助士だっておんなじ。[こないしゅ,2]庫内手の手もたりとらんけん、\n給水給炭から手伝わないけんけんねー」
2012 = "「Phụ lái tàu cũng vậy. Nhân viên vệ sinh\nxưởng cũng không đủ tay,\nnên phải phụ giúp từ việc cấp nước cấp\nthan nữa nha~」"

# 【ふかみ】
# display as 深美
# JP: 「あわわ――わたし、そんな忙しいときに、\nのんきに見学だなんてっ」
2058 = "「Awawa——Tớ, trong lúc bận rộn thế này,\nmà lại thong dong đi tham quan.」"

# 【日々姫】
# display as 日日姬
# JP: 「ううん。ぜぇんぜん！　大歓迎！\nそれに――」
2366 = "「Không đâu. Hoàn toàn không! Rất hoan\nnghênh là đằng khác!\nHơn nữa——」"

# monologue
# JP: ニヤっと、日々姫の笑顔はどこか、いたずらめいてる。
2953 = "Nụ cười toe toét của Hibiki có chút gì đó\ntinh nghịch."

# 【日々姫】
# display as 日日姬
# JP: 「ふかみちゃんのしたか“見学”ば、忙しいとき――\n[このこ,3]8620が[いき,1]呼吸しとるときしか、できんでしょお？」
2173 = "「Chuyến 'tham quan' mà bé Fukami muốn,\nchẳng phải chỉ có thể thực hiện lúc bận\nrộn——\nlúc 8620 đang 'thở' thôi sao?」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2055 = "「A——」"

# monologue
# JP: じんわりと、\nうれしげな笑みが、ふかみの顔いっぱいに広がっていく。
3049 = "Chầm chậm,\nmột nụ cười rạng rỡ vì vui sướng lan tỏa\nkhắp gương mặt Fukami."

# 【ふかみ】
# display as 深美
# JP: 「はい！　はい、です！」
2329 = "「Vâng! Vâng, desu!」"

# monologue
# JP: ……僕にはいまひとつわからんが、\n日々姫の言葉は、怯みかけたふかみの背中を押したようだ。
1456 = "……Dù tôi không hiểu lắm,\nnhưng có vẻ lời nói của Hibiki đã tiếp\nthêm động lực cho Fukami đang chùn bước."

# 【ふかみ】
# display as 深美
# JP: 「それなら、わたし――\n遠慮なく、見学させてもらっちゃいます――です！」
2509 = "「Nếu vậy thì, em——\nxin phép không khách sáo, được tham quan\nạ——desu!」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　どうぞどうぞ」
2105 = "「Ừm! Cứ tự nhiên nhé.」"

# monologue
# JP: 思いつくまま、目の向くままにという感じなのだろう。\nあちこちきょろきょろ眺めまわして覗き込み――
2982 = "Có vẻ như con bé đang ngắm nhìn theo cảm\ntính, ánh mắt đưa đẩy tự do.\nNgó nghiêng xung quanh, dòm ngó chỗ này\nchỗ kia——"

# 【ふかみ】
# display as 深美
# JP: 「………ふわぁ」
1501 = "「………Oaaa.」"

# monologue
# JP: ――やがてふかみは、感嘆しきりの息を吐く。
1435 = "——Chẳng mấy chốc, Fukami thở ra một hơi\nđầy cảm thán."

# 【ふかみ】
# display as 深美
# JP: 「凄い、です。こんなにたくさんの部品が……\n機械達が、連動しあって――動くんですよね」
2144 = "「Tuyệt quá, desu. Rất nhiều bộ phận……\nmáy móc liên kết với nhau——và chuyển động\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。逆転機の回し方一つ、加減弁テコの引き方一つが、\n直接的に、蒸気の流れ、機関車の動きを決めていく」
2298 = "「Đúng vậy. Chỉ một thao tác xoay cần đảo\nchiều, một cái kéo tay gạt van tiết lưu\nhơi,\ncũng trực tiếp quyết định luồng hơi nước\nvà chuyển động của đầu máy.」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん。蒸気機関車の運転ば、本当に手作業。\n多分――ふかみちゃんの舟と同じくらいに、ダイレクト」
2248 = "「Bởi vậy. Lái đầu máy hơi nước thực sự là\ncông việc thủ công.\nChắc là——cũng trực tiếp giống như con\nthuyền của bé Fukami vậy đó.」"

# 【ふかみ】
# display as 深美
# JP: 「手作業で……手の感覚で、\nこんなに大きくて、複雑なものを――」
2267 = "「Công việc thủ công…… Bằng cảm giác của\nđôi tay,\nmà có thể điều khiển một thứ to lớn và\nphức tạp thế này——」"

# monologue
# JP: ふかみが、あらためてぐるりと見渡す。\nそれからどこか、きょとんとした目で僕を見る。
2985 = "Fukami lại một lần nữa nhìn quanh buồng\nlái.\nSau đó, con bé nhìn tôi bằng ánh mắt có\nchút ngơ ngác."

# 【ふかみ】
# display as 深美
# JP: 「あたりまえですけど――すごい、お仕事なんですね。\nすごく大変で、むつかしそうで――かっこいい、です」
2243 = "「Dù là điều hiển nhiên nhưng——đúng là một\ncông việc tuyệt vời nhỉ.\nTrông rất vất vả, rất khó khăn——và rất\nngầu, desu.」"

# 【日々姫】
# display as 日日姬
# JP: 「むつかしいのは確かよねー。やけん、ふかみちゃんが\n車掌ば目指してくれるとは、まっこと心強かとよ！」
2425 = "「Đúng là khó thật nha. Thế nên, việc bé\nFukami\nhướng tới mục tiêu trở thành trưởng tàu,\nthực sự khiến chị rất yên tâm đó!」"

# 【ふかみ】
# display as 深美
# JP: 「はうっ」
2067 = "「Hauu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日々姫もふかみが車掌志望だと、\nそういえば知っていたのだよな」
2096 = "「À, nhắc mới nhớ,\nHibiki cũng biết Fukami muốn làm trưởng\ntàu nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとよー。聞いとったもん。その場で。\nふかみちゃんの、『わたしを車掌にしてください』って」
2403 = "「Đúng rồi đó. Em đã nghe thấy mà. Ngay tại\nchỗ luôn.\nCâu 'Xin hãy cho em làm trưởng tàu' của bé\nFukami ấy.」"

# 【ふかみ】
# display as 深美
# JP: 「わーわーわー！！」
2039 = "「Oa oa oa!!」"

# monologue
# JP: あわてたふかみがバタバタ手を振る。
3013 = "Fukami cuống cuồng xua tay loạn xạ."

# 【ふかみ】
# display as 深美
# JP: 「そ、そのときのことは、恥ずかしい、です！\nあの、ナイショ！　ナイショでお願いします！」
1981 = "「Ch, chuyện lúc đó xấu hổ lắm ạ!\nNên là,\nbí mật! Xin anh hãy giữ bí mật nhé!」"

# 【日々姫】
# display as 日日姬
# JP: 「あらま。\n――だって、どぎゃんすっと？　にぃに」
2044 = "「Ây dà.\n――Anh thấy sao hả? Anh hai」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみがナイショといっているのだ。\n無理に聞き出すこともあるまい」
2380 = "「Fukami đã bảo là bí mật rồi mà.\nAnh cũng\nsẽ không cố gặng hỏi đâu.」"

# monologue
# JP: 言いながら、ふかみの頭をぽんっと撫でる。\n見るからにもう、ふかみは安心した顔になる。
2930 = "Vừa nói, tôi vừa xoa nhẹ lên đầu Fukami.\nNhìn là thấy ngay, gương mặt em ấy đã trở\nnên an tâm hơn hẳn."

# 【双鉄】
# display as 雙鐵
# JP: 「……帰宅してから、こっそり聞かせてくれればいいさ」
1503 = "「……Về nhà rồi em lén kể cho anh nghe là\nđược」"

# 【ふかみ】
# display as 深美
# JP: 「ええええええっ！？」
2049 = "「Ể ể ể ể ể ể ể!?」"

# 【日々姫】
# display as 日日姬
# JP: 「了解っ！」
2280 = "「Đã rõ!」"

# 【ふかみ】
# display as 深美
# JP: 「って、日々姫さんまで～っ！？」
2084 = "「Đến cả chị Hibiki cũng hùa theo á~!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。少しからかいたくなっただけだ。\n焦るふかみが、かわいらしくてな」
2269 = "「Xin lỗi. Anh chỉ muốn trêu em một chút\nthôi.\nTại dáng vẻ cuống quýt của Fukami\nđáng yêu quá mà.」"

# 【ふかみ】
# display as 深美
# JP: 「ふあっ！」
2042 = "「Oa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そういえばちゃんとは聞いていなかったな」
1892 = "「Nhưng mà…… nhắc mới nhớ, anh vẫn chưa hỏi\nkỹ em chuyện này nhỉ.」"

# monologue
# JP: 思えば、気になる。\nだから尋ねる。
2944 = "Nghĩ lại thì, tôi cũng tò mò thật.\nNên tôi\nbèn hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは何故、車掌になろうと考えたのだ？\nみかん鉄道乗車がきっかけとは知っているが……」
1935 = "「Tại sao Fukami lại muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nvậy?\nAnh biết cơ duyên là từ lần đi tàu Đường\nsắt Mikan rồi nhưng mà……」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そこ！　わたしも気になるっ！」
2070 = "「A! Chỗ đó! Em cũng tò mò lắm!」"

# monologue
# JP: 言ってはなんだが、\nあのオリヴィというレイルロオド。
3122 = "Nói ra thì hơi kỳ, nhưng\ncô Railord tên\nOlivy đó."

# monologue
# JP: 臨時・急遽の代理車掌と自身でいっていたとおり、\n憧れるほどの仕事ぶりとは思えなかったが――
2851 = "Đúng như cô ấy tự nhận mình chỉ là \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nđại\ndiện lâm thời, khẩn cấp,\ntôi không nghĩ\nphong cách làm việc của cô ấy lại đáng\nngưỡng mộ đến thế――"

# 【ふかみ】
# display as 深美
# JP: 「あの……それは――ですね」
2020 = "「Dạ…… Chuyện đó――là vì」"

# monologue
# JP: ふかみがきょろきょろ、あたりをうかがう。\nああ、と察して、運転台の側面窓から見下ろしてみる。
3022 = "Fukami dáo dác nhìn quanh quất.\nA, hiểu ý\nem ấy, tôi bèn nhìn xuống từ cửa sổ bên\nhông buồng lái."

# 【双鉄】
# display as 雙鐵
# JP: 「……凪とハチロクは炭水車を見ている。\n声が聞こえる距離ではないぞ」
1486 = "「……Nagi và Hachiroku đang kiểm tra \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;\n.\nKhoảng cách này không nghe thấy tiếng\nđâu.」"

# monologue
# JP: 言った瞬間、ふかみがほうっと息を吐く。
3045 = "Ngay khoảnh khắc tôi nói vậy, Fukami thở\nphào nhẹ nhõm."

# 【ふかみ】
# display as 深美
# JP: 「別に……これはナイショでもなんでもないんですけど。\nでも、凪ちゃんにヘンに気をつかわせちゃったら、ヤで」
2361 = "「Cũng không có gì…… Chuyện này không phải\nbí mật hay gì đâu ạ.\nNhưng mà, nếu để Nagi\nphải bận tâm kỳ lạ thì em không thích\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、動機は凪がらみか？」
2515 = "「Vậy ra, động cơ của em có liên quan đến\nNagi à?」"

# 【ふかみ】
# display as 深美
# JP: 「です、ね。わたし――やっぱり羨ましかったんです。\n双鉄おにいさんと、凪ちゃんとがしてるお仕事が」
2296 = "「Vâng, ạ. Em――quả nhiên là đã rất ghen tị.\nVới công việc mà anh Soutetsu và Nagi đang\nlàm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2103 = "「Hừm.」"

# 【ふかみ】
# display as 深美
# JP: 「時間、三人で平等にって決めて、守ってますけど――。\nお仕事の時間って、やっぱり密度が違うと思うんです」
2521 = "「Dù chúng ta đã quyết định và tuân thủ\nviệc chia đều thời gian cho cả ba người――.\nNhưng thời gian làm việc, em nghĩ mức độ\ngắn kết vẫn khác biệt lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かな。凪にせよ、日々姫にせよ、ハチロクにせよ。\nともに乗務をする者は、運命共同体だとも感じる」
2315 = "「Đúng vậy. Dù là Nagi, Hibiki hay\nHachiroku.\nNhững người cùng làm nhiệm vụ\ntrên tàu, anh đều cảm thấy như một cộng\nđồng chung vận mệnh.」"

# 【日々姫】
# display as 日日姬
# JP: 「大げさじゃなく、命を預け合うわけだし――\nお客様の命も、みんなで預かるわけやけん」
2482 = "「Không hề nói quá đâu, chúng ta giao phó\nsinh mạng cho nhau mà――\nSinh mạng của hành\nkhách cũng do tất cả cùng gánh vác nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「わかります」
2233 = "「Em hiểu ạ.」"

# monologue
# JP: きっぱりと言う。\n強いまなざしで僕を捉える。
2987 = "Em ấy dứt khoát nói.\nÁnh mắt mạnh mẽ nhìn\nthẳng vào tôi."

# 【ふかみ】
# display as 深美
# JP: 「そこ、舟と同じですから。双鉄おにいさんや凪ちゃんに\n手伝って貰えてた頃は、だからあんまり気にならなくて」
2134 = "「Điểm đó, cũng giống như chèo thuyền vậy.\nNên hồi còn được anh Soutetsu và Nagi\ngiúp\nđỡ, em không bận tâm lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2103 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「でも、お母さんの病気がなおって、クマ川くだりも\n持ちなおしてきて、船頭さん達が復帰してくれて――」
1925 = "「Nhưng mà, mẹ em đã khỏi bệnh, chuyến xuôi\ndòng sông Kuma cũng\nđã phục hồi, các bác\nlái đò cũng đã quay lại làm việc――」"

# monologue
# JP: 本職のベテランさんたちと比べてしまえば、\n僕はもちろん、凪もやっぱり素人だ。
3137 = "Nếu so sánh với những người thợ lành nghề,\ntôi và cả Nagi dĩ nhiên vẫn chỉ là dân\nnghiệp dư."

# monologue
# JP: 手伝いの必要が薄れてしまえば、\n僕らはその分、そのまま鉄道に注力をした。
2864 = "Khi không còn cần chúng tôi giúp đỡ nhiều\nnữa,\nchúng tôi dồn toàn bộ sức lực vào\nđường sắt."

# 【ふかみ】
# display as 深美
# JP: 「そしたら、寂しくなっちゃって。やっぱり一緒に\nお仕事したい――置いて行かれたくないって、思って」
2393 = "「Sau đó, em thấy cô đơn lắm. Quả nhiên em\nvẫn muốn\nlàm việc cùng mọi người――Em không\nmuốn bị bỏ lại phía sau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2103 = "「嗯」" 

# monologue
# JP: 置いて行かれたくない――\n凪もまったくおんなじことをいっていた。
2708 = "Không muốn bị bỏ lại phía sau――\nNagi cũng\ntừng nói y hệt như vậy."

# monologue
# JP: 凪とふかみは親友で、同時にライバルであるのだと、\nいまさらながらにつくづく思う。
2835 = "Bây giờ tôi mới thấm thía nhận ra rằng,\nNagi và Fukami vừa là bạn thân, lại vừa là\nđối thủ của nhau."

# 【日々姫】
# display as 日日姬
# JP: 「一緒にだったら、機関士目指した方がよくない？\nあー、でも、接客スキルがもったいない？」
2197 = "「Nếu muốn ở cùng nhau thì hướng tới mục\ntiêu làm \\x%l機関士;#00ffc040;lái tàu%l;#; chẳng phải tốt hơn sao?\nA, nhưng\nmà, kỹ năng tiếp khách của em bỏ xó thì\nuổng quá nhỉ?」"

# 【ふかみ】
# display as 深美
# JP: 「もったいないとかそういうことより――運転台の中を、凪ちゃんの居場所を、邪魔したくないって思うから」
2484 = "「Uổng phí hay không thì em không nghĩ\ntới――nhưng em không muốn cản trở vị trí\ncủa Nagi trong buồng lái đâu.」"

# monologue
# JP: 言って、あははと、\nふかみは少し、作ったような感じに笑う。
3123 = "Nói rồi, Fukami cười \"ahaha\",\nmột nụ cười\ncó phần gượng gạo."

# 【ふかみ】
# display as 深美
# JP: 「あと！　わたし、水属性ですし！　暑いの苦手で――\n火のこんなに近くだとか、とても無理、です」
2439 = "「Với lại! Em thuộc hệ thủy mà! Em chịu\nnóng kém lắm――\nLại còn ở gần lửa thế này\nthì, không thể nào làm được đâu ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、そっか。水属性じゃしかたなかとねー」
2162 = "「A, ra vậy. Hệ thủy thì hết cách rồi ha~」"

# 【ふかみ】
# display as 深美
# JP: 「ですです。だから、わたしは。\n車掌さんになりたいなって、思ったんです」
2288 = "「Vâng vâng. Vì vậy nên, em.\nMới nghĩ là,\nmình muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;.」"

# monologue
# JP: ふうわり、と――\nふかみの顔に浮かんだ笑みは、今度はとても自然なものだ。
3155 = "Nhẹ nhàng――\nNụ cười nở trên môi Fukami lần\nnày lại vô cùng tự nhiên."

# 【ふかみ】
# display as 深美
# JP: 「教えてもらったから。車掌さんでも一緒に走れるって。\n一緒に走って、みんなの力になれるんだって」
2132 = "「Vì em đã được dạy rằng. Dù là \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nthì vẫn có\nthể đồng hành cùng nhau.\nĐồng hành cùng\nnhau, và trở thành sức mạnh của mọi\nngười.」"

# monologue
# JP: （ああ――）
3182 = "（A――）"

# monologue
# JP: 僕らと一緒に働きたい。それはつまりは、\n力になりたい――僕らを助けたいということなのか。
3008 = "Muốn làm việc cùng chúng tôi. Điều đó có\nnghĩa là,\nmuốn trở thành sức mạnh――muốn\ngiúp đỡ chúng tôi sao."

# monologue
# JP: 川下りが一番苦しかった時期のふかみを、凪がひとりで、\nとても無邪気に――支えたように。
2849 = "Giống như lúc chuyến xuôi dòng gặp khó\nkhăn nhất, Nagi đã một mình,\nvô cùng ngây\nthơ――giúp đỡ Fukami vậy."

# 【日々姫】
# display as 日日姬
# JP: 「良かとね。それ」
2408 = "「Tuyệt quá nhỉ. Suy nghĩ đó ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん、実にいいな。ありがたい」
2112 = "「Ừm, thật sự rất tuyệt. Đáng quý lắm.」"

# monologue
# JP: ふかみと凪と。凪とふかみと。\nその絆の中、僕も一緒に在ることが出来て。
3082 = "Fukami và Nagi. Nagi và Fukami.\nTrong mối\nliên kết ấy, tôi cũng có thể ở cùng."

# monologue
# JP: お互いを思いやり支え合う――\nその輪の中に、僕が、僕らがいることが出来て。
3081 = "Quan tâm và hỗ trợ lẫn nhau――\nTrong vòng\ntròn ấy, có tôi, có chúng tôi."

# 【ふかみ】
# display as 深美
# JP: 「あ！　でもでも、クマ川下りのためでもあるんです。\n御一夜鉄道でお仕事したいの、実のところは！」
2069 = "「A! Nhưng mà, cũng là vì chuyến xuôi dòng\nsông Kuma nữa ạ.\nThực ra, em muốn làm việc\nở Đường sắt Ohito!」"

# monologue
# JP: 照れ隠しなのか、ふかみが少し早口になる。\nしかし……そんなことを今更いわれても――
3038 = "Có lẽ vì muốn che giấu sự xấu hổ, Fukami\nnói nhanh hơn một chút.\nNhưng mà…… giờ mới\nnói điều đó thì――"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう。ふかみなのだし」
1941 = "「Chắc chắn là vậy rồi. Vì em là Fukami\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「よねぇ。ふかみちゃんの一番ば、\nどーやったって、クマ川下りだろうと思うし」
2322 = "「Đúng vậy. Dù thế nào đi nữa,\nưu tiên số\nmột của bé Fukami vẫn là chuyến xuôi dòng\nsông Kuma mà.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　あれ？　もうバレちゃってました？」
2030 = "「Hả? Ơ? Mọi người nhận ra rồi ạ?」"

# 【凪】
# display as 凪
# JP: 「なになに！？\nふかみちゃんのワルダクミばバレよったと！？」
1909 = "「Gì gì!?\nÂm mưu đen tối của bé Fukami bị\nlộ rồi hả!?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、それは[おおごと,1]大事ですね」
2048 = "「Chà, đó đúng là chuyện lớn nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「わ、わたし！　悪だくみなんてしないもんっ！\nもう、凪ちゃんのいじわるっ！」
2209 = "「E, em! Em không có âm mưu đen tối gì đâu\nnhé!\nThật tình, Nagi xấu tính quá!」"

# 【凪】
# display as 凪
# JP: 「って！？　ふかみちゃん！　そんなんちゃんと\nわかっとるばい！　冗談ばい！！」
2090 = "「Ơ!? Bé Fukami! Chuyện đó thì\nem biết thừa\nrồi mà! Em chỉ đùa thôi!!」"

# 【ふかみ】
# display as 深美
# JP: 「うん。わたしもわかってる。だから、冗談！\nいじわる、ちょっとだけおかえししちゃった！」
2109 = "「Ừm. Chị cũng biết mà. Nên là, chị đùa\nthôi!\nTrả đũa em tội xấu tính một chút xíu\nthôi!」"

# 【凪】
# display as 凪
# JP: 「なんねー！　やっぱふかみちゃん\nワルダクミしよったばーい！」
1911 = "「Cái gì chứ! Quả nhiên bé Fukami\nđang ủ\nmưu đen tối kìa!」"

# monologue
# JP: あははと、笑う。
2922 = "Tôi bật cười ha hả."

# monologue
# JP: 平凡でごく他愛ないやりとりが、\n実に暖かく、尊いものと聞こえる。
2825 = "Những cuộc trò chuyện bình dị và ngây ngô,\nnghe thật ấm áp và quý giá làm sao."

# 【凪】
# display as 凪
# JP: 「そぎゃんとご機嫌だったら、\nよか見学ばできたとね？」
2407 = "「Tâm trạng chị vui vẻ thế này,\nchắc buổi\ntham quan tốt đẹp lắm nhỉ?」"

# 【日々姫】
# display as 日日姬＆深美
# JP: 「ああっ！　見学っ！？」\n「うん！　できた」
2078 = "「A! Tham quan!?」\n「Ừm! Tốt lắm.」"

# monologue
# JP: あわてふためく日々姫をよそに、\nふかみは力強くうなずき返す。
2951 = "Mặc kệ Hibiki đang luống cuống,\nFukami gật\nđầu mạnh mẽ đáp lại."

# 【ふかみ】
# display as 深美
# JP: 「出来たよ？　見学。ばっちりわかった」
2189 = "「Được rồi mà? Tham quan ấy. Chị hiểu rõ\nrồi.」"

# 【凪】
# display as 凪
