2807 = "告訴深美真是太好了。我和深美的這番對話，下次也一定要轉達給凪。" 

# 【ふかみ】
# display as 深美
# JP: 「わたし！　やる気、でました！　です。\n双鉄おにいさん――つきあってもらって、いいですか？」
2237 = "「我有幹勁了，嗯！雙鐵哥哥……你能陪我一下嗎？」" 

# monologue
# JP: ふかみがすっくと立ち上がる。\n背筋がピッと伸びている。
3025 = "深美猛地站起身，挺直了身板。" 

# monologue
# JP: ああ、綺麗だと――確かに思う。\n着飾り方も飾り方も、一切の変化はないというのに。
2831 = "她這副樣子真美……儘管打扮完全沒變，我心裡卻突然生出這番感慨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\n今日一日、僕はなんでもふかみに付き合うぞ」
2400 = "「當然。今天不管要做什麼，我都會陪著你」" 

# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます！　あの、わたし、自分でも\nちょっと、勉強したり、調べたりしてて」
2453 = "「謝謝！　那個……我也稍微學習、調查了一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2118 = "「嗯？」" 

# 【ふかみ】
# display as 深美
# JP: 「車掌さんのお仕事、です。運転台には入らなくても、\n車掌さん、運転のお手伝いもするって聞いて」
2240 = "「我調查了一下列車長的職責，嗯。我聽說就算不能進駕駛台，列車長還是能給駕駛工作幫忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうらしいな」
2140 = "「好像是吧」" 

# monologue
# JP: いつか、線路がつながっていくそのときのため、\n僕もあれこれ、ハチロクに教えてもらっている。
3062 = "為了有朝一日能夠把線路串聯起來，八六也教了我許多。" 

# 【双鉄】
