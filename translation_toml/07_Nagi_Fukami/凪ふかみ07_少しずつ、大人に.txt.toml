2975 = "深美一副受打擊的樣子，不像是裝出來的。哦，我明白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。言い方が悪かった。\n手抜きのように聞こえたのなら、申し訳ない」
2271 = "「抱歉，我措辭有問題。要是讓你覺得我不把這事放心上了，那我向你道歉」" 

# 【ふかみ】
# display as 深美
# JP: 「え……と？」
1481 = "「……什麼意思？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとともに楽しく過ごせるなら。ふかみが笑顔に\nなるのなら、行き先など、例えどこでもかまわない」
2004 = "「只要能和你開心地度過，只要你能展露出笑容，去什麼地方我都不介意」" 

# 【ふかみ】
# display as 深美
# JP: 「ふあっ」
# 2038 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最初からそういうべきだったのだな。\n言葉の選び方がよろしくなかった」
1985 = "「剛才我就應該這麼說啊，措辭選得有問題」" 

# 【ふかみ】
# display as 深美
# JP: 「いえ、あのっ！\nわたしがヘンな聞き方しちゃったから」
2365 = "「沒關係！是我的問法有問題」" 

# monologue
# JP: 真っ赤になって手を振って――
3024 = "深美滿臉通紅地擺擺手。" 

# monologue
# JP: （ぴとっ）
3192 = "（靠）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2094 = "「喔」" 

# monologue
# JP: ふかみは顔を、僕の二の腕に寄せてくる。
3017 = "深美把頭靠在了我的手臂上。" 

# monologue
# JP: ふわりと、ささやかで甘やかな匂いが漂う。\n人知れず咲く花のような、いつもと同じ、ふかみの匂いが。
2828 = "她的身上一如往常飄來淡淡的香甜氣息，如同山間靜靜盛開的野花。" 

# 【ふかみ】
# display as 深美
# JP: 「わたしも、です」
2213 = "「我也是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2118 = "「嗯？」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしも、おんなじ気持ちです。双鉄おにいさんが\n笑ってくれれば――どこにいたって、楽しい、です」
2215 = "「我也是這麼想的。只要雙鐵哥哥能露出笑容，不管去哪裡，我都很開心，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2487 = "「這樣啊」" 

# 【ふかみ】
# display as 深美
# JP: 「その意味でも、今日。思い切って、運転台を見学できて\n――させてもらえて、とってもよかった、です」
2190 = "「從這層意義來看，今天在駕駛台仔細參觀了一番……也算非常有價值了，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その意味でも？　か？　……ふむ。\n運転台では、むしろ厳しい顔でいるかと自分では思うが」
2319 = "「是嗎？　嗯……我感覺自己在駕駛台上的時候，表情應該挺嚴肅吧」" 

# 【ふかみ】
# display as 深美
# JP: 「お顔は、たしかにそうでしたけど」
2448 = "「表情確實是挺嚴肅的」" 

# monologue
# JP: ふかみの指が伸びてくる。\n僕のあごの線をつたって、のぼって――
2979 = "深美伸出手指按在我的下巴上，慢慢順著我的臉向上滑——" 

# monologue
# JP: （もにっ）
3187 = "（戳）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
# 2118 = "「嗯？」" 

# 【ふかみ】
# display as 深美
# JP: 「ほんとは、すっごくにこにこだったでしょ？\n双鉄おにいさん。わたし、そう感じました、です」
1946 = "「其實你當時很開心吧，雙鐵哥哥。我有這種感覺，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……言われてみれば、そうかもしれんな」
1511 = "「……聽你這麼一說，我也感覺或許是的」" 

# monologue
# JP: ふかみが、僕の仕事場を見に来てくれた。\n凪はもちろん、ハチロクも日々姫も大歓迎で迎えてくれた。
2983 = "深美來參觀了我的職場。不僅是凪，連八六和日日姬也表示了熱烈歡迎。" 

# monologue
# JP: それは、単純に嬉しいことだし――
3154 = "這本身就是件值得高興的事，而且……" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが、[ハチロクニイマル,3]8620に興味を持ってくれている、と。\nそうわかったことも、実に単純に嬉しかった」
2414 = "「知道了你對８６２０感興趣，這很讓我高興」" 

# monologue
# JP: いえばほんのり、ふかみがはにかむ。
3046 = "深美聽到我的話，顯得有些害羞起來。" 

# monologue
# JP: “凪の居場所の邪魔をしないため”――\n聞かせてくれた、その瞬間とおんなじ顔で。
1442 = "“我不想打擾到駕駛台內那片屬於小凪的空間。”——她現在的表情就像在說那句話時一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに、気持ちも嬉しかった。車掌を目指しているのが、\n僕たちを支えるためだと――ともに走るためだと聞けて」
2438 = "「而且聽到你說想當列車長是為了幫助我們——為了和我們一起前行，這也很讓我高興」" 

# 【ふかみ】
# display as 深美
# JP: 「支えるだなんて！　そんな、わたし、\nそんな力、全然ないですっ！」
2051 = "「哪有那麼了不起！我沒有那麼強的能力！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、今のところは、だろう」
2002 = "「只是現在沒有吧」" 

# monologue
# JP: 言えば、懐かしく思い出される。
3124 = "說完這句話，我不禁想起了令人懷念的過去。" 

# monologue
# JP: まだ三年も経っていない――\nたったそれだけしか経っていないのに。
3151 = "這才不到三年……明明只過了這麼點時間啊。" 

# 【双鉄】
