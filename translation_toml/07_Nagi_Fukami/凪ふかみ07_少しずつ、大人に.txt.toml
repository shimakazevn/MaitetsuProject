1916 = "「今天的打扮？她不是穿著一身沾滿油漬的彩頁服嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「だから、ですよ？　双鉄おにーさん？」
2257 = "「所以才漂亮呀，雙鐵哥哥」" 

# monologue
