2726 = "以深美的年紀——不，就算年紀再大一截，她也絕對不能算是一無是處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪は言っていた。『ふかみちゃんは一番を持っている』\n『自分はまだ一番を持っていない』と」
1974 = "「凪說你有無人能比的長處，而她還沒有」" 

# monologue
# JP: だから、伝える。\n僕の覚えていることを、ただただそのままふかみへと。
2934 = "所以我要將記憶中的事情，都如實轉述給深美。" 

# monologue
# JP: ふかみが凪を思うように、凪もふかみを思っていて――\nそれゆえ、焦ってしまっていた、と。
2927 = "我要告訴她，凪也有同樣的想法，並且也為此感到焦躁。" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが……そんなことを――\nそんな風に、思ってくれてただなんて」
2164 = "「小凪……居然會這麼想」" 

# monologue
# JP: ふかみの頬がピンクに輝く。\n目にとても強い光が宿る。
3033 = "深美的臉頰紅潤起來，眼瞳中閃耀著堅定的光芒。" 

