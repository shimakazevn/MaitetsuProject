2853 = "Dù em ấy không làm vậy,\ntôi cũng đã quyết\nđịnh hôm nay sẽ ở bên Fukami cả ngày rồi\nmà."

# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます、です。\n急に、予定変更しちゃったのに見学させてくれて」
2454 = "「Cảm ơn anh, ạ.\nDù em đột ngột thay đổi kế\nhoạch mà anh vẫn cho em tham quan.」"

# 【双鉄】
# display as 雙鐵
