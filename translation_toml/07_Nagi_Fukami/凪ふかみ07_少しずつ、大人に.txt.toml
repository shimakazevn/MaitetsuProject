2354 = "「正是因為不加修飾，才能看到真正的美麗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2320 = "「是嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「ふふっ、多分、双鉄おにいさんは――\n見慣れちゃってるから、気づけないんですよ」
2119 = "「嘻嘻，估計是雙鐵哥哥已經看習慣了，所以才沒注意到」" 

# monologue
