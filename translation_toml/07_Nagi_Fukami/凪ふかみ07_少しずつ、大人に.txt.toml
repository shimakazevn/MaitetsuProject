2253 = "「所以我只是羨慕小凪。而不是抱著“幫助大家”這麼不自量力的想法」" 

# monologue
# JP: ふかみの手が、きゅっと一瞬、にぎられる。
3029 = "深美的手忽然握緊了一下。" 

# 【ふかみ】
# display as 深美
# JP: 「一緒に走って、わたしもキラキラになりたいだけです。\n凪ちゃんと双鉄おにいさんに置いていかれたくないから」
2224 = "「我只是想和你們一起前行，變得和你們一樣耀眼。因為我不想被你們拋下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「置いて行かれたくない、か」
1885 = "「不想被拋下啊……」" 

# monologue
# JP: 言っていいのか、瞬間、悩む。\n普段は、ふたりの時間のときは――
2919 = "我猶豫了一下該不該說出口。平時二人獨處的時候——" 

