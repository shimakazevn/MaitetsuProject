2827 = "Cái gật đầu đáp lại của em ấy mạnh mẽ đến\nmức khiến tôi hơi ngạc nhiên."

# 【ふかみ】
# display as 深美
# JP: 「ですね。凪ちゃん、大人になったし――綺麗になった。\n今日も、とっても綺麗だった」
2301 = "「Đúng vậy ạ. Nagi đã trưởng thành――và xinh\nđẹp hơn.\nHôm nay, em ấy cũng rất xinh\nđẹp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今日の凪がか？\n油まみれでナッパ服だったではないか」
1916 = "「Nagi của ngày hôm nay á?\nChẳng phải em ấy\nđang mặc bộ \\x%l彩頁服;#00ffc040;đồng phục làm việc%l;#; lấm lem dầu\nmỡ sao?」"

# 【ふかみ】
# display as 深美
# JP: 「だから、ですよ？　双鉄おにーさん？」
2257 = "「Chính vì thế đó, anh Soutetsu?」"

# monologue
# JP: まるっきりわかってない子に、一から九九を教えるように。\nふかみが妙に、教師じみている態度を見せる。
3001 = "Giống như đang dạy bảng cửu chương từ đầu\ncho một đứa trẻ không biết gì.\nFukami bỗng\ndưng tỏ thái độ giống hệt một giáo viên."

# 【ふかみ】
# display as 深美
# JP: 「着飾ってないから、飾ってないから。\n本当の綺麗さが見えるんです」
2354 = "「Bởi vì không chải chuốt, không tô điểm.\nNên mới thấy được vẻ đẹp thực sự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2320 = "「Là vậy sao?」"

# 【ふかみ】
# display as 深美
# JP: 「ふふっ、多分、双鉄おにいさんは――\n見慣れちゃってるから、気づけないんですよ」
2119 = "「Fufu, có lẽ, anh Soutetsu――\nNhìn quen quá\nrồi nên không nhận ra đó thôi.」"

# monologue
# JP: 甘えてもたれっぱなしだった体を、\nふかみがパっと、離してしまう。
3041 = "Cơ thể vẫn đang nũng nịu dựa dẫm vào tôi,\nFukami bỗng tách ra."

# 【ふかみ】
# display as 深美
# JP: 「一番キラキラしてる凪ちゃんの姿。\n運転台の中ではきっと、双鉄おにいさんもおんなじ」
2512 = "「Đó là dáng vẻ tỏa sáng nhất của Nagi.\nTrong buồng lái, chắc chắn anh Soutetsu\ncũng vậy.」"

# monologue
# JP: ……確かに、それはそうかもしれん。
1446 = "……Quả thật, có lẽ là vậy."

# monologue
# JP: 運転中は、\n前方注視を解かぬゆえ、凪を見ている余裕も無いが――
2710 = "Trong lúc lái tàu,\ntôi phải luôn chú ý\nphía trước, không có thời gian rảnh rỗi để\nnhìn Nagi――"

# 【双鉄】
# display as 雙鐵
# JP: 「キラキラと言われれば、こころあたるな。\n乗務を終えたあと笑顔などは、文字通りにキラキラだ」
2450 = "「Nói là tỏa sáng thì, anh cũng hiểu.\nNụ\ncười của em ấy sau khi hoàn thành nhiệm\nvụ, đúng nghĩa là tỏa sáng luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「だからわたし――凪ちゃんのことが羨ましくって。\n支えるなんて、大それたことは思ってなくって」
2253 = "「Nên em――mới ghen tị với Nagi.\nEm không\nnghĩ đến chuyện lớn lao như hỗ trợ mọi\nngười đâu.」"

# monologue
# JP: ふかみの手が、きゅっと一瞬、にぎられる。
3029 = "Bàn tay Fukami khẽ nắm chặt lại trong giây\nlát."

# 【ふかみ】
# display as 深美
# JP: 「一緒に走って、わたしもキラキラになりたいだけです。\n凪ちゃんと双鉄おにいさんに置いていかれたくないから」
2224 = "「Em chỉ muốn cùng chạy với mọi người, và\ncũng trở nên tỏa sáng.\nVì em không muốn bị\nNagi và anh Soutetsu bỏ lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「置いて行かれたくない、か」
1885 = "「Không muốn bị bỏ lại sao.」"

# monologue
# JP: 言っていいのか、瞬間、悩む。\n普段は、ふたりの時間のときは――
2919 = "Tôi thoáng phân vân không biết có nên nói\nra hay không.\nBình thường, khi chỉ có hai\nngười――"

# monologue
# JP: 凪といればふかみの話を、ふかみといれば凪の話を、\nお互い、なんとなく避けているゆえ。
3136 = "Ở cạnh Nagi thì chúng tôi tránh nói chuyện\nvề Fukami, ở cạnh Fukami thì tránh nói về\nNagi,\ncả hai chúng tôi đều vô tình lảng\ntránh điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、同じようなことをいっていたな」
1970 = "「Nagi cũng từng nói điều tương tự đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが！？　ですか？？」
2165 = "「Nagi á!? Thật ạ??」"

# monologue
# JP: きょとんとしている。驚いている。\n伝えてよかった――そう思う。
3011 = "Em ấy ngẩn người ra. Có vẻ rất ngạc nhiên.\nThật tốt vì đã nói cho em ấy biết――Tôi\nnghĩ vậy."

# monologue
# JP: どれほど仲がよかろうとも、仲がよすぎれば或いは逆に、\n伝わらないこと、伝えられないことも、やはりあるのだ。
3066 = "Dù có thân thiết đến mấy, hay có lẽ chính\nvì quá thân thiết,\nmà vẫn có những điều\nkhông thể truyền đạt, không thể nói ra."

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、ふかみに置いて行かれたくないと。\n『ふかみちゃんはすごい』と、いっていた」
1969 = "「Nagi cũng không muốn bị Fukami bỏ lại.\nEm\nấy từng nói 『Bé Fukami giỏi lắm』.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　うそ？　なんで？\nわたし――だって、全然なんにも」
2028 = "「Hả? Thật không? Tại sao chứ?\nEm――có làm\nđược gì đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「自分のことは、自分ではわからんものなのだなぁ」
1906 = "「Đúng là con người khó mà hiểu rõ về bản\nthân mình nhỉ.」"

# monologue
# JP: ポーレットに頼りにされている。\n御一夜市の観光行政に、ダイレクトな影響力を持っている。
2999 = "Em ấy được Paulette tin tưởng.\nCó sức ảnh\nhưởng trực tiếp đến ngành du lịch của\nthành phố Ohimitera."

# monologue
# JP: ふかみの年で――いや、例えずうっと年上であっても、\nそれは決して、『なんにも』などとはいえないことだ。
2726 = "Ở độ tuổi của Fukami――không, dù có lớn\ntuổi hơn nhiều đi chăng nữa,\nnhững điều đó\ntuyệt đối không thể nói là 『không làm được\ngì』."

# 【双鉄】
# display as 雙鐵
# JP: 「凪は言っていた。『ふかみちゃんは一番を持っている』\n『自分はまだ一番を持っていない』と」
1974 = "「Nagi từng nói. 『Bé Fukami có điểm mạnh\nnhất』\n『Còn mình thì chưa có』.」"

# monologue
# JP: だから、伝える。\n僕の覚えていることを、ただただそのままふかみへと。
2934 = "Nên tôi đã kể lại.\nKể lại y nguyên những\ngì tôi nhớ cho Fukami nghe."

# monologue
# JP: ふかみが凪を思うように、凪もふかみを思っていて――\nそれゆえ、焦ってしまっていた、と。
2927 = "Rằng Nagi cũng nghĩ về Fukami, giống như\nFukami nghĩ về Nagi――\nVà vì thế, em ấy mới\ntrở nên sốt ruột."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが……そんなことを――\nそんな風に、思ってくれてただなんて」
2164 = "「Nagi…… lại nghĩ như vậy――\nLại nghĩ về em\nnhư thế.」"

# monologue
# JP: ふかみの頬がピンクに輝く。\n目にとても強い光が宿る。
3033 = "Đôi má Fukami ửng hồng rạng rỡ.\nTrong ánh\nmắt ánh lên một tia sáng vô cùng mạnh mẽ."

# monologue
# JP: 伝えてよかった――そう思う。\n今ふかみと話したことも、必ず凪に、伝えてやろう。
2807 = "Thật tốt vì đã nói cho em ấy biết――Tôi\nnghĩ vậy.\nNhững điều vừa nói với Fukami,\nnhất định tôi cũng sẽ kể cho Nagi nghe."

# 【ふかみ】
# display as 深美
# JP: 「わたし！　やる気、でました！　です。\n双鉄おにいさん――つきあってもらって、いいですか？」
2237 = "「Em! Có động lực rồi! Ạ.\nAnh Soutetsu――anh\nđi cùng em, được không ạ?」"

# monologue
# JP: ふかみがすっくと立ち上がる。\n背筋がピッと伸びている。
3025 = "Fukami đứng bật dậy.\nLưng vươn thẳng tắp."

# monologue
# JP: ああ、綺麗だと――確かに思う。\n着飾り方も飾り方も、一切の変化はないというのに。
2831 = "A, em ấy thật đẹp――tôi quả thực nghĩ vậy.\nDù cách ăn mặc, cách trang điểm, chẳng có\nchút gì thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\n今日一日、僕はなんでもふかみに付き合うぞ」
2400 = "「Tất nhiên rồi.\nHôm nay, anh sẽ đồng hành\ncùng Fukami trong mọi việc.」"

# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます！　あの、わたし、自分でも\nちょっと、勉強したり、調べたりしてて」
2453 = "「Cảm ơn anh ạ! Dạ, bản thân em\ncũng đã tự\nhọc hỏi và tìm hiểu một chút.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2118 = "「嗯？」" 

# 【ふかみ】
# display as 深美
# JP: 「車掌さんのお仕事、です。運転台には入らなくても、\n車掌さん、運転のお手伝いもするって聞いて」
2240 = "「Về công việc của \\x%l車掌;#00ffc040;trưởng tàu%l;#; ạ. Dù không\nvào buồng\nlái,\nnhưng em nghe nói \\x%l車掌;#00ffc040;trưởng tàu%l;#; cũng có thể\nhỗ trợ\nviệc lái tàu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうらしいな」
2140 = "「Có vẻ là vậy.」"

# monologue
# JP: いつか、線路がつながっていくそのときのため、\n僕もあれこれ、ハチロクに教えてもらっている。
3062 = "Vì một ngày nào đó, khi tuyến đường sắt\nđược nối liền,\ntôi cũng đang học hỏi đủ\nthứ từ Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「本来は、編成の最後に\x%l車掌車;#00ffc040;車掌車%l;#;という物をつけるそうだな。\nそして、\x%l車掌車;#00ffc040;車掌車%l;#;にはブレーキがついている」
2339 = "「Vốn dĩ, người ta sẽ gắn một toa gọi là \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;\nở\ncuối \\x%l編成;#00ffc040;đoàn tàu%l;#;.\nVà \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; có trang bị phanh\nhãm.」"

# 【ふかみ】
# display as 深美
# JP: 「『赤を切る』っていうヤツですよね？\nあの列車を止めた時、オリヴィちゃんが言っていた」
2504 = "「Có phải là 『Kéo van đỏ』 không ạ?\nLúc dừng\nđoàn tàu đó lại, Olivy đã nói vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それが車掌の、最大の仕事であると」
2114 = "「Ừm. Đó chính là công việc quan trọng nhất\ncủa \\x%l車掌;#00ffc040;trưởng tàu%l;#;.」"

# monologue
# JP: 赤を切る――異常事態が生じた時に、\n車掌が自らの判断で、非常ブレーキをかけること。
2937 = "Kéo van đỏ――Khi có tình huống bất thường\nxảy ra,\n\\x%l車掌;#00ffc040;trưởng tàu%l;#; sẽ tự mình đưa ra quyết định\nkéo\nphanh khẩn cấp."

# monologue
# JP: 安全のため、危険を未然に防止するため。\n列車の運行の権利を、他の誰からも奪い取ることだ。
3063 = "Vì sự an toàn, vì để ngăn ngừa nguy hiểm\nxảy ra.\nLà việc đoạt lấy quyền điều hành\nđoàn tàu từ bất kỳ ai khác."

# 【双鉄】
# display as 雙鐵
# JP: 「『赤を切る勇気』。車掌に何よりも必要なのは、\nまさにそれなのだとも、僕は、ハチロクに教わった」
1944 = "「『Dũng khí kéo van đỏ』. Điều \\x%l車掌;#00ffc040;trưởng tàu%l;#;\ncần hơn bất\ncứ thứ gì,\nchính là điều đó, anh đã được\nHachiroku dạy như vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「れいなちゃんも、ポーレットさんも言ってました。\nけど、わたし……それが出来るか、自信がなくって」
2397 = "「Reina và chị Paulette cũng từng nói thế.\nNhưng mà, em…… không tự tin là mình có làm\nđược hay không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに難しかろうな。機関士・運転士とは違い、\n車掌は進路前方を見ることも出来ない」
2489 = "「Chắc chắn là khó rồi. Khác với \\x%l機関士;#00ffc040;lái tàu%l;#;,\n\\x%l車掌;#00ffc040;trưởng tàu%l;#; không\nthể nhìn thấy phía trước lộ trình.」"

# 【ふかみ】
# display as 深美
# JP: 「はい」
2326 = "「Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドのように共感がとれるわけでもないし……\n恐らくは限られた情報内で、瞬時に判断する他にない」
1898 = "「Cũng không thể \\x%l共感;#00ffc040;cộng cảm%l;#; như Railord\nđược……\nCó lẽ\nchỉ còn cách đưa ra quyết định tức thời\ntrong giới hạn thông tin ít ỏi.」"

# monologue
# JP: ブレーキひとつに勇気とは、いささか大げさすぎようと、\nハチロクに聞かされたときは、そうも感じてしまったが。
3101 = "Khi nghe Hachiroku nói, tôi từng cảm thấy\nchỉ một cái phanh mà cần đến dũng khí thì\ncó hơi nói quá."

# monologue
# JP: しかしなるほど、ふかみの身に置き換えて考えてみれば、\nそれはまさしく、勇敢でなければできないことだ。
2732 = "Nhưng quả thực, nếu đặt mình vào vị trí\ncủa Fukami mà suy nghĩ,\nđó đúng là việc\nkhông thể làm được nếu thiếu đi lòng dũng\ncảm."

# 【双鉄】
# display as 雙鐵
# JP: 「……列車を時速60キロで走行させているのなら、\n一秒間には、16.6メートル強も進んでしまう」
1504 = "「……Nếu tàu đang chạy với tốc độ 60km/h,\nthì trong một giây, nó đã tiến tới hơn\n16,6 mét rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「は……い。です」
2325 = "「Vâ……ng. Ạ.」"

# monologue
# JP: ふかみの声が小さくなってしまう。
3031 = "Giọng Fukami nhỏ dần."

# monologue
# JP: 時間が、距離が安全のためにどれほど重要なものなのか、\nわかってくれているのだと感じる。
2915 = "Tôi cảm nhận được rằng, em ấy hiểu\nthời\ngian và khoảng cách quan trọng đến nhường\nnào đối với sự an toàn."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、そのときにはためらわずやってくれ。\n止まって何もなければ、それが一番いいことだから」
2247 = "「Do đó, lúc ấy em đừng ngần ngại mà hãy\nlàm đi.\nDừng lại mà không có chuyện gì xảy\nra, đó mới là điều tốt nhất.」"

# 【ふかみ】
# display as 深美
# JP: 「理屈では……頭では、わかってるように思うんです。\nけど……わたし――実際にそれが出来るかどうか」
2495 = "「Về lý thuyết…… thì trong đầu em cũng hiểu\nrồi ạ.\nNhưng mà…… em――không biết thực tế\nmình có làm được hay không nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、今はできんだろう」
2405 = "「Tất nhiên, bây giờ thì em chưa làm được\nđâu.」"

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
2033 = "「Hả!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「できるのであれば最初から、\nポーレットはふかみを車掌にしているさ」
2152 = "「Nếu làm được thì ngay từ đầu,\nPaulette đã\nđể Fukami làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2056 = "「A――」"

# monologue
# JP: ハチロクは反対するであろうが、\nそれでもポーレットは押し切ろう。
2855 = "Dù Hachiroku có phản đối đi chăng nữa,\nthì\nPaulette vẫn sẽ nhất quyết làm thế."

# monologue
# JP: 人を見る目と、決断力と。それがあるゆえポーレットは、\nあの細腕で、市と会社とを支え続けていられるのだ。
2972 = "Con mắt nhìn người, và sự quyết đoán. Nhờ\ncó những điều đó,\nmà Paulette mới có thể\ndùng đôi vai gầy guộc ấy tiếp tục chống đỡ\ncho cả thành phố và công ty."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今はそうできない。だから、ポーレットは\nふかみに駅員見習いからスタートさせた」
1923 = "「Nhưng mà, bây giờ thì chưa được. Vì vậy\nnên Paulette\nmới để Fukami bắt đầu từ vị\ntrí nhân viên nhà ga học việc.」"

# 【ふかみ】
# display as 深美
# JP: 「は、い」
2324 = "「Vâ, ng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「駅員見習いをしてみて、どうだ？　始める前と、\n駅や列車――鉄道の見え方は、変わったか？」
2158 = "「Làm nhân viên nhà ga học việc thì thấy\nthế nào? So với trước khi bắt đầu,\ncách em\nnhìn nhận nhà ga và đoàn tàu――hay đường\nsắt, có thay đổi không?」"

# 【ふかみ】
# display as 深美
# JP: 「それはもう！　すごく、全然かわりました！　です！」
2404 = "「Tất nhiên rồi ạ! Thay đổi rất nhiều, hoàn\ntoàn khác luôn! Ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「どんなふうに？」
2335 = "「Thay đổi như thế nào?」"

# 【ふかみ】
# display as 深美
# JP: 「きっぷを売ったり改札したり、ご案内するだけじゃなく。\n駅員も安全を支えてるんだって――わたし、わかって」
2235 = "「Không chỉ bán vé, \\x%l改札;#00ffc040;bấm vé%l;#;, hay hướng dẫn\ncho\nhành khách.\nMà nhân viên nhà ga cũng đang\nduy trì sự an toàn――em đã hiểu ra điều\nđó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2094 = "「喔」" 

# 【ふかみ】
# display as 深美
# JP: 「お客さんのときはあんまり意識してなかったけど――\n黄色い線、踏まれるの怖いって思うようになりました」
2218 = "「Hồi còn là hành khách em không để ý lắm――\nNhưng giờ em đã thấy sợ khi có người giẫm\nlên vạch vàng rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。入線のとき、黄色い線を踏み越えている者が\nいれば、汽笛を鳴らさざるを得ない」
2424 = "「Đúng vậy. Lúc tàu vào ga, nếu có người\ngiẫm qua vạch vàng,\nthì bắt buộc phải kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#;\n.」"

# 【ふかみ】
# display as 深美
# JP: 「だから、どけます。お客様でも、注意して。\nそれが安全を――お客様を守ることにつながりますから」
2255 = "「Nên em sẽ yêu cầu họ lùi lại. Dù là hành\nkhách thì em vẫn sẽ nhắc nhở.\nVì điều đó\ngắn liền với sự an toàn――là bảo vệ chính\nhành khách mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2103 = "「嗯」" 

# monologue
# JP: ふかみは、しっかりと理解している。\nそう感じれば、もう一歩だけ進みたくなる。
2995 = "Fukami đã hiểu rất rõ.\nCảm nhận được điều\nđó, tôi lại muốn tiến thêm một bước nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ではもし、ふかみの目の前に、黄色い線を踏み越えて、\n写真を撮ろうとしている男がいたら――どうする？」
1929 = "「Vậy giả sử, trước mặt Fukami, có một\nngười đàn ông giẫm qua vạch vàng,\nđể chụp\nảnh thì――em sẽ làm gì?」"

# 【ふかみ】
# display as 深美
# JP: 「注意して、説明して、さがってもらいます、です」
2272 = "「Em sẽ nhắc nhở, giải thích và yêu cầu\nngười đó lùi lại, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無視される。大男で、ふかみ一人では動かせない。\n助けてくれる人はいない。列車はどんどん近づいてくる」
1927 = "「Người đó phớt lờ em. Một người đàn ông to\nlớn mà một mình Fukami không thể lay\nchuyển được.\nKhông có ai giúp đỡ. Đoàn tàu\nthì đang tiến lại gần.」"

# 【ふかみ】
# display as 深美
# JP: 「そのときには――振ります。赤の旗。\n列車、入ってきたらその人、死んじゃうかもしれないし」
2513 = "「Lúc đó thì――em sẽ phất cờ. Cờ đỏ.\nVì nếu\ntàu tiến vào ga, người đó có thể sẽ chết\nmất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、ふかみは、駅員の仕事としてなら、\nもう、『赤を切る』ことができるわけだ」
1900 = "「Nói cách khác, nếu là công việc của nhân\nviên nhà ga,\nthì Fukami đã có thể 『Kéo van\nđỏ』 rồi đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2075 = "「啊！」" 

# monologue
# JP: ひどく驚いた顔をして。
3057 = "Em ấy lộ vẻ mặt vô cùng kinh ngạc."

# monologue
# JP: その顔が、照れくさそうに、嬉しそうに、\nじんわり、ふにゃりと溶けていく。
3100 = "Gương mặt ấy, dần dần, mềm mại tan ra,\ntrông có vẻ ngượng ngùng, lại có vẻ vui\nsướng."

# 【ふかみ】
# display as 深美
# JP: 「かも、です。駅のお仕事だったら――\n夢中になって、できる、かも」
1902 = "「Có lẽ là vậy, ạ. Nếu là công việc ở nhà\nga thì――\nem sẽ tập trung hết sức, và có\nthể làm được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはふかみが、駅を知ったからだ。\nゆえに、ポーレットはふかみから“見習い”を外した」
2485 = "「Đó là vì Fukami đã hiểu rõ về nhà ga.\nDo\nđó, Paulette mới gỡ bỏ chữ \"học việc\" của\nem.」"

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2103 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば焦らず、一歩一歩を積み重ねればいい。いまの\nふかみに車掌が務まらぬのは、単に列車を知らんからだ」
2245 = "「Vậy thì đừng vội, cứ từng bước một tích\nlũy là được. Fukami bây giờ\nchưa thể đảm\nđương vị trí \\x%l車掌;#00ffc040;trưởng tàu%l;#;, đơn giản là vì em\nchưa hiểu\nrõ về đoàn tàu thôi.」"

# 【ふかみ】
# display as 深美
# JP: 「列車を、知らない……」
1883 = "「Chưa hiểu rõ về đoàn tàu……」"

# monologue
# JP: 緩んでいた顔が、引き締まる。\nふかみは学びに貪欲なのだと、改めて強く感じる。
3037 = "Gương mặt vừa mới giãn ra lại trở nên căng\nthẳng.\nTôi lại một lần nữa cảm nhận sâu\nsắc rằng Fukami rất ham học hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「駅務をこなし、その合間に添乗をして、学べばいい。\n列車のことを、線路のことを。そうすれば――」
2433 = "「Cứ hoàn thành tốt công việc ở ga, tranh\nthủ lúc rảnh rỗi lên tàu để học hỏi là\nđược.\nVề đoàn tàu, về tuyến đường sắt. Cứ\nlàm thế thì――」"

# 【ふかみ】
# display as 深美
# JP: 「そうすれば――わたしも覚えられますか？\n列車のことを、線路のこと。勉強したら」
2006 = "「Làm thế thì――em cũng sẽ nhớ được chứ?\nVề\nđoàn tàu, về tuyến đường sắt. Nếu em học.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。できるようになる。間違いなく。\n駅の仕事とおんなじように、必ず学べる」
2363 = "「Ừ. Em sẽ làm được thôi. Chắc chắn đấy.\nGiống như công việc ở nhà ga, nhất định em\nsẽ học được.」"

# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！」
2147 = "「Vâng! Ạ!!」"

# monologue
# JP: （ぐいっ！）
3188 = "（Giật mạnh!）"

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
# 2122 = "「噢」" 

# monologue
# JP: ふかみが、僕の手を引いてくる。\n明るい笑顔で、伸びやかな一歩を踏み出しながら。
3019 = "Fukami kéo tay tôi.\nVới nụ cười rạng rỡ,\nem ấy sải một bước dài tự do tự tại."

# 【ふかみ】
# display as 深美
# JP: 「それなら、教えてほしいです！　駅のこと、線路のこと。ちょっとずつでも、今すぐ覚えられることから！」
2518 = "「Nếu vậy thì, hãy dạy cho em đi! Về nhà\nga, về tuyến đường sắt. Dù chỉ từng chút\nmột, bắt đầu từ những thứ em có thể nhớ\nđược ngay bây giờ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2103 = "「嗯」" 

# monologue
# JP: だから、僕も大きく踏み出す。\nふかみにぴったり、歩幅を合わせて。
2941 = "Nên tôi cũng sải bước dài.\nVừa vặn khớp\nvới nhịp bước của Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「喜んで！」
2230 = "「Rất sẵn lòng!」"

# 【ふかみ】
# display as 深美
# JP: 「ふぁああ……くたくた、です」
2026 = "「Phaaaa…… mệt rã rời rồi, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。たっぷり汗をかいてしまった」
2216 = "「Anh cũng vậy. Đổ bao nhiêu là mồ hôi\nrồi.」"

# monologue
# JP: ふかみを送る足さえも、いささか重い。\n体力にだけは、そこそこ以上の自信を持っているのだが。
2916 = "Ngay cả đôi chân đưa Fukami về cũng có\nchút nặng nề.\nDù tôi khá tự tin vào thể\nlực của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「少し――いや、かなり暑いな。\nなにか飲むか？」
2200 = "「Hơi――không, khá là nóng đấy.\nEm có muốn\nuống gì không?」"

# monologue
# JP: 休憩したいところなのだが、\nふかみは首を横に振る。
2911 = "Tôi đang muốn nghỉ ngơi,\nnhưng Fukami lại\nlắc đầu."

# 【ふかみ】
# display as 深美
# JP: 「涼むんだったら、川、どうですか？」
2198 = "「Nếu muốn hóng mát thì, ra sông được không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「川下りか？」
1991 = "「Xuôi dòng sông sao?」"

# 【ふかみ】
# display as 深美
# JP: 「いえ、新しいサービスにできないかなってアイディアが、\n実は、ひとつあって」
1889 = "「Dạ không, thực ra em có một ý tưởng,\nkhông biết có thể làm thành dịch vụ mới\nđược không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2094 = "「喔」" 

# monologue
# JP: それは完全に初耳だ。\n興味が気力を回復させる。
3156 = "Đó là chuyện tôi hoàn toàn chưa từng nghe.\nSự tò mò đã giúp tôi khôi phục lại tinh\nthần."

# 【ふかみ】
# display as 深美
# JP: 「まだ全然未整備だから、もうちょっと磨いてからとも\n思ってたんですけど。でも、汗もかいちゃいましたし」
2496 = "「Vì vẫn chưa chuẩn bị gì cả, nên em định\nchờ hoàn thiện thêm một chút nữa. Nhưng\nmà, dù sao chúng ta cũng đổ mồ hôi rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「汗を流せるような感じか？」
2323 = "「Là kiểu có thể xả mồ hôi được sao?」"

# 【ふかみ】
# display as 深美
# JP: 「うふふっ、流せるのはきっと、ちょっとだけ、です。\nけど、思いっきり涼しいですよ？　間違いなく」
2023 = "「Ufufu, chắc là chỉ xả được một chút thôi,\nạ.\nNhưng mà, sẽ vô cùng mát mẻ đấy? Chắc\nchắn luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。では試させてもらいたい」
2116 = "「Hừm. Vậy cho anh thử xem sao.」"

# monologue
# JP: 言えばぱあっと、ふかみの笑顔が花開く。
3047 = "Tôi vừa dứt lời, nụ cười của Fukami liền\nnở rộ rạng rỡ."

# 【ふかみ】
# display as 深美
# JP: 「はい！　大歓迎です！！」
2149 = "「Vâng! Rất hoan nghênh ạ!!」"

# monologue
# JP: （サァァァァァァ）
3185 = "（Rào rào rào rào）"

# 【双鉄】
# display as 雙鐵
# JP: 「と、っと――」
2121 = "「Ây, da――」"

# 【ふかみ】
# display as 深美
# JP: 「大股になっちゃダメですよー！\n小足、小股で、足の裏をあんまり持ち上げないように」
2356 = "「Không được bước sải dài đâu nha~!\nBước\nnhỏ thôi, bước ngắn thôi, cố gắng đừng\nnhấc gót chân lên quá cao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2100 = "「Ừ, m.」"

# monologue
# JP: ……ふかみの教えに従って、小足、小股を意識する。
1451 = "……Làm theo lời dạy của Fukami, tôi chú ý\nbước từng bước nhỏ, sải ngắn."

# 【双鉄】
# display as 雙鐵
# JP: 「おお。確かに――これだけでかなり変わってくるな」
2124 = "「Ồ. Quả thực――chỉ cần vậy thôi đã khác hẳn\nrồi.」"

# 【ふかみ】
# display as 深美
# JP: 「うふふ。上手ですよ？　双鉄おにいさん。\nあんよは上手、おにーさん、こちら」
2025 = "「Ufufu. Anh làm tốt lắm đó? Anh Soutetsu.\nGiỏi lắm giỏi lắm, anh ơi, hướng này ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、いわれても捕まえられん」
1893 = "「Dù em có nói vậy thì anh cũng không bắt\nđược đâu.」"

# monologue
# JP: 少しでも急ごうとすれば、足が浮く。\n浅瀬であっても、クマ川の流れはなかなか強い。
2895 = "Chỉ cần hơi vội một chút là chân tôi lại\nbồng bềnh.\nDù là vùng nước nông, nhưng\ndòng chảy của sông Kuma cũng khá mạnh."

# 【双鉄】
# display as 雙鐵
# JP: 「このウォーターシューズというのにも……\n滑らんのは助かるが――なかなか慣れん、な」
2490 = "「Cả cái đôi giày đi nước này nữa……\nKhông\nbị trơn trượt thì tốt thật đấy――nhưng mãi\nmà chưa quen được.」"

# 【ふかみ】
# display as 深美
# JP: 「すぐ慣れますよ。双鉄おにいさんなら。\nわたしだって大丈夫なんですし」
1937 = "「Sẽ quen ngay thôi ạ. Nếu là anh Soutetsu.\nĐến cả em còn đi được mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは川歩きの経験値が違いすぎよう。\nなんのあてにもならんさ」
2221 = "「Kinh nghiệm lội sông của Fukami khác biệt\nquá xa rồi.\nChẳng thể lấy ra làm chuẩn\nđược đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「それは、ちょっとは違いますけど……\nでも、大丈夫ですよ。バランス感覚いいんですし」
2426 = "「Cái đó thì, đúng là có khác một chút……\nNhưng mà, không sao đâu ạ. Anh giữ thăng\nbằng tốt mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほめてもらえるのは嬉しいが――」
2441 = "「Được em khen thì anh vui lắm nhưng mà――」"

# monologue
# JP: これがどうにも難しい。\n川の中を歩いていくなど、いままでなかった経験だ。
3150 = "Cái này khó quá đi mất.\nĐi bộ dưới sông\nthế này, là trải nghiệm mà tôi chưa từng\ncó."

# monologue
# JP: 僕のバランス感覚が、仮に人よりすぐれていても――\nああ。
2857 = "Dù cho khả năng giữ thăng bằng của tôi có\nnhỉnh hơn người bình thường đi chăng nữa――\nA."

# 【双鉄】
# display as 雙鐵
# JP: 「凪は、どうだ？　凪ならやはり、\nこのリバーウォークとやらにも、すぐ馴染んだのか？」
1973 = "「Nagi thì sao? Nếu là Nagi thì chắc là,\ncũng quen ngay với cái trò lội sông này\nhả?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃんも、これはまだです。\n双鉄おにいさんが、一番最初で、はじめてですよ？」
2080 = "「A, Nagi cũng chưa thử trò này đâu ạ.\nAnh\nSoutetsu là người đầu tiên, là người mở\nmàn đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。それは光栄だな」
2318 = "「Vậy sao. Thật vinh hạnh quá.」"

# monologue
# JP: ふふっと小さな笑い声。
3052 = "Một tiếng cười khúc khích nhỏ nhẹ vang\nlên."

# monologue
# JP: どんな笑顔か、その瞬間を捉えたいのに、\n今の僕では目線さえ、そろそろとしか動かせない。
2906 = "Tôi muốn bắt lấy khoảnh khắc ấy, xem đó là\nnụ cười như thế nào,\nnhưng tôi lúc này đến\ncả ánh mắt cũng chỉ có thể đảo qua đảo lại\ntừ từ."

# 【ふかみ】
# display as 深美
# JP: 「……さっきもいったけど。まだ全然なんです。\nコースだって、今は決まってないですし」
1491 = "「……Lúc nãy em cũng nói rồi đó. Vẫn chưa\nchuẩn bị gì đâu ạ.\nCả lộ trình, bây giờ\ncũng chưa quyết định xong nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、全く迷う様子もないが」
2009 = "「Nói vậy mà, trông em chẳng có vẻ gì là\nđang do dự cả.」"

# 【ふかみ】
# display as 深美
# JP: 「ここは、絶対に入れようって思ってますから。\n川の中からSLの通過を見上げるの――最高でしょう？」
2131 = "「Vì em nghĩ, nhất định phải đưa đoạn này\nvào.\nTừ dưới sông ngước nhìn SL đi\nqua――tuyệt vời lắm đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2289 = "「Ừ……」"

# monologue
# JP: 想像するだけでワクワクしてくる。
2888 = "Chỉ mới tưởng tượng thôi mà đã thấy háo\nhức rồi."

# monologue
# JP: 8620が通過する振動で、はたして川は揺れるのだろうか？\n汽笛が響けば、川面はうわん、と波立つだろうか？
3193 = "Liệu dòng sông có rung chuyển theo độ rung\nkhi 8620 đi qua không?\nNếu \\x%l汽笛;#00ffc040;còi hơi nước%l;#; vang lên, liệu\nmặt sông có gợn sóng lăn tăn không?"

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。実にいい」
2483 = "「Tuyệt thật đấy. Thực sự rất tuyệt.」"

# 【ふかみ】
# display as 深美
# JP: 「じゃ！　やっぱりここは確定にしちゃいます。\nあとは、ここを起点にするか、終点にするか――とか」
2517 = "「Vậy! Quả nhiên đoạn này phải chốt thôi.\nCòn lại là, chọn đây làm điểm xuất phát,\nhay điểm kết thúc――kiểu vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……景観なども気にしないといかんのか」
2486 = "「Ra vậy…… Còn phải bận tâm đến cảnh quan\nnữa nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「ですね。ただ歩いてもらうだけで楽しいのなんて、\n川に入った一瞬だけかなって、思いますし」
2309 = "「Đúng vậy ạ. Em nghĩ việc chỉ đi bộ thôi\nmà cũng thấy vui,\nchắc chỉ là khoảnh khắc\nlúc mới xuống sông thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、普通はそうだろうな」
2110 = "「Chà, bình thường thì là vậy.」"

# monologue
# JP: 確かに僕も、水の冷たさ、感触を楽しめたのは一瞬だった。\n歩きはじめてしまえばすぐに、歩きづらさに気を取られた。
2901 = "Quả thực tôi cũng vậy, chỉ tận hưởng được\nsự mát lạnh và cảm giác của nước trong\nchốc lát.\nKhi bắt đầu bước đi, tôi lập tức\nbị phân tâm bởi sự khó khăn khi di chuyển."

# 【ふかみ】
# display as 深美
# JP: 「だから、景観を楽しめたり、面白いガイドを出来たり。\nその上で、子供さんやお年寄りも安全に歩けないとだし」
2260 = "「Vì thế, phải làm sao để thưởng thức được\ncảnh quan, hoặc có hướng dẫn viên thú vị.\nHơn nữa, còn phải đảm bảo trẻ em và người\ngià cũng có thể đi bộ an toàn nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
# 2487 = "「這樣啊」" 

# monologue
# JP: 『全然未整備』――
1430 = "『Hoàn toàn chưa chuẩn bị gì cả』――"

# monologue
# JP: ふかみのさきほどの言葉の意味が、\nようやく僕にも伝わってくる。
2924 = "Ý nghĩa trong câu nói ban nãy của Fukami,\ncuối cùng tôi cũng đã hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「コースの選び方一つで、観光として成立するか否かが\n大きく変化してしまうのか」
2463 = "「Chỉ một cách chọn lộ trình thôi, mà có\nthể thay đổi lớn đến việc\nnó có thành công\nnhư một dịch vụ du lịch hay không sao.」"

# 【ふかみ】
# display as 深美
# JP: 「です。ですから、ほんとはコースもう少し練り込んで。\nそれから双鉄おにいさんをご招待したかったんですけど」
2312 = "「Vâng. Vì vậy nên, thực ra em định trau\nchuốt lộ trình thêm một chút nữa.\nRồi sau\nđó mới mời anh Soutetsu đến chơi.」"

# monologue
# JP: ぱしゃり、とふかみが水を蹴る。
2812 = "Tõm một tiếng, Fukami đá nước."

# monologue
# JP: かなり高くまで足をあげ――\nそれでも微塵も、そのバランスは崩れない。
2833 = "Nhấc chân lên khá cao――\nNhưng em ấy vẫn\nkhông hề mất thăng bằng dù chỉ một chút."

# 【ふかみ】
# display as 深美
# JP: 「走るの、付き合ってもらっちゃいましたから。\n足、疲れを取るのにもちょうどいいかな、って思って」
2130 = "「Vì anh đã đi cùng em, lúc em chạy mà.\nNên\nem nghĩ, thế này cũng vừa hay để giảm bớt\nmệt mỏi cho đôi chân.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、驚いたぞ。\nまさかいきなり、\x%l列車防護;#00ffc040;列車防護%l;#;の実習になるとはなぁ」
2306 = "「À, anh ngạc nhiên lắm đấy.\nKhông ngờ lại\nđột nhiên thành buổi thực hành \\x%l列車防護;#00ffc040;phòng vệ tàu%l;#;\nluôn.」"

# 【ふかみ】
# display as 深美
# JP: 「――自分の列車が停止したとき、\n確実に関係列車が停止できる安全距離は、600メートル」
1459 = "「――Khi đoàn tàu của mình dừng lại,\nkhoảng\ncách an toàn để đảm bảo các đoàn tàu liên\nquan có thể dừng lại là 600 mét.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2103 = "「嗯」" 

# monologue
# JP: さきほど教えたばかりのことを、\nふかみは正確に復唱していく。
3016 = "Những điều tôi vừa dạy ban nãy,\nFukami\nnhắc lại một cách chính xác."

# 【ふかみ】
# display as 深美
# JP: 「だから[とうがい,1]当該列車の車掌は、停止位置から600メートルを\n\x%l信号炎管;#00ffc040;信号炎管%l;#;を示しつつ、全力で走りきらなければならない」
2258 = "「Vì vậy \\x%l車掌;#00ffc040;trưởng tàu%l;#; của đoàn tàu đó, phải\nchạy hết\ntốc lực 600 mét từ vị trí dừng,\nđồng thời\ngiơ cao \\x%l信号炎管;#00ffc040;ống pháo hiệu%l;#;.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。一発でよく覚えたな」
2364 = "「Chính xác. Mới một lần mà em đã nhớ kỹ\nrồi.」"

# 【ふかみ】
# display as 深美
# JP: 「それは、だって。\n体をつかって、覚えましたから、です！」
2133 = "「Đó là, tại vì.\nEm đã dùng cơ thể để ghi\nnhớ mà, ạ!」"

# monologue
# JP: 一歩ずつ、今できることから列車のことを、\n線路のことを学びたい。
3009 = "Tôi muốn học hỏi về đoàn tàu, về tuyến\nđường sắt\ntừng bước một, bắt đầu từ những\nviệc mình có thể làm ngay bây giờ."

# monologue
# JP: ……まさか自分が臨時講師を務めるとは思ってなかったが、\nふかみは見事に、合格点をあげてくれた。
1452 = "……Không ngờ mình lại làm giảng viên lâm\nthời,\nnhưng Fukami đã xuất sắc đạt điểm\nđậu."

# 【双鉄】
# display as 雙鐵
# JP: 「それなら、僕も教えがいがある」
2506 = "「Nếu vậy thì, anh cũng thấy bõ công dạy.」"

# 【ふかみ】
# display as 深美
# JP: 「はい！　双鉄教官！\nこれからもお願いします！　です！！」
2328 = "「Vâng! Giáo quan Soutetsu!\nTừ nay về sau\ncũng xin được nhờ anh chỉ giáo! Ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「車掌の業務については知識でしか知らんが――\nその範囲で教えられることはもちろん、全て教えるさ」
2228 = "「Về nghiệp vụ của \\x%l車掌;#00ffc040;trưởng tàu%l;#; thì anh chỉ\nbiết qua\nkiến thức sách vở thôi――\nNhưng trong phạm\nvi đó, tất nhiên anh sẽ dạy em tất cả\nnhững gì có thể.」"

# 【ふかみ】
# display as 深美
# JP: 「やったぁ」
2139 = "「Tuyệt quá.」"

# monologue
# JP: ぱしゃん、と跳ねる。\n水面から両足が綺麗に飛び出す――
3056 = "Bắn tung tóe, em ấy nhảy lên.\nĐôi chân\nxinh đẹp vút lên khỏi mặt nước――"

# monologue
# JP: 魚のように、人魚のように。
2847 = "Giống như một chú cá, giống như một nàng\ntiên cá."

# 【双鉄】
# display as 雙鐵
# JP: 「……若いなぁ」
1509 = "「……Trẻ trung thật đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「や！　何言ってるんですか双鉄おにいさん。\n自分だって、全然若いじゃないですか！」
2017 = "「Da! Anh Soutetsu nói gì vậy.\nBản thân anh\ncũng còn trẻ chán mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふかみや凪のような――\nみずみずしいほどの若さはないさ」
1894 = "「Không đâu, anh không còn sức trẻ\ntươi mới\nnhư Fukami hay Nagi nữa rồi.」"

# monologue
# JP: 川の流れにさらされ、冷やされ、\nそれでも、足は軽くならない。
3162 = "Dù đã được dòng sông xoa dịu, làm mát,\nnhưng đôi chân vẫn chẳng nhẹ nhàng hơn\nchút nào."

# monologue
# JP: 回復が遅くなっているのは、\nまさしく、加齢の影響だろう。
2891 = "Việc hồi phục chậm lại,\nchắc chắn là do\nảnh hưởng của tuổi tác rồi."

# monologue
# JP: （ああ！　真闇姉がいっていた、\n『自分を大事に』とはこのことか――）
3183 = "（A! Lời chị Mayami dặn,\n『Phải biết giữ gìn\nsức khỏe』 là thế này đây sao――）"

# monologue
# JP: このタイミングで思い出してしまったことが、\n申し訳なくも、少しおかしい。
3153 = "Việc nhớ lại vào đúng lúc này,\nthật có lỗi\nnhưng cũng hơi buồn cười."

# 【ふかみ】
# display as 深美
# JP: 「なにか、面白いことでもありました？　です？」
2337 = "「Có chuyện gì thú vị sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、なに――」
1896 = "「Không, có gì đâu――」"

# monologue
# JP: まさか、正直なところは言えない。\nかといって嘘もつきたくない。
2842 = "Tôi không thể nói thật được.\nNhưng cũng\nkhông muốn nói dối."

# monologue
# JP: さて……と思えば、\nすぐに言葉が浮き上がってくる。
2908 = "Nghĩ xem nên nói gì……\nThì ngay lập tức một\ncâu nói nảy ra trong đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、しあわせだと思っただけだ」
2225 = "「Chỉ là, anh thấy mình thật hạnh phúc\nthôi.」"

# 【ふかみ】
# display as 深美
# JP: 「なにが、です？」
1910 = "「Hạnh phúc chuyện gì ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「この時間が。この時間へとつながってくれた――\n全ての時間が、しあわせだ」
2488 = "「Khoảng thời gian này. Và tất cả những\nkhoảng thời gian――\nđã kết nối để tạo nên\nkhoảnh khắc này, đều thật hạnh phúc.」"

# monologue
# JP: そう思える。とても素直に。\n過去の傷さえ、洗い流せると思えるほどに。
3152 = "Tôi có thể cảm nhận như vậy. Rất chân\nthành.\nĐến mức tôi nghĩ nó có thể gột rửa\ncả những vết thương trong quá khứ."

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行に、誘ってもらえてとてもよかった。\nあの瞬間から――僕は、大きく変われたのだと思う」
2443 = "「Được rủ đi chuyến dã ngoại đó, thật sự\nrất tuyệt.\nTừ khoảnh khắc đó――anh nghĩ\nmình đã thay đổi rất nhiều.」"

# monologue
# JP: ふかみが、凪が、変えてくれた。\nともに楽しむ、自ら楽しむ、その喜びを教えてくれた。
2958 = "Fukami, và Nagi, đã thay đổi tôi.\nĐã dạy\ntôi niềm vui khi cùng nhau tận hưởng, tự\nmình tận hưởng."

# 【双鉄】
# display as 雙鐵
# JP: 「感謝している。本当に。\nふかみに、凪に。そして、みんなに」
2238 = "「Anh thực sự rất biết ơn.\nFukami, Nagi. Và\ntất cả mọi người.」"

# 【ふかみ】
# display as 深美
# JP: 「や、やだ！　双鉄おにいさん。急にそんな――\nそんなこと言われたら、わたし、照れちゃいます、です」
2449 = "「T, thôi đi! Anh Soutetsu. Đột nhiên lại――\nNói mấy lời đó, làm em, ngại lắm đấy, ạ.」"

# monologue
# JP: ふかみがくるりと向こうを向く。\nその首すじが、赤くなってる。
3058 = "Fukami quay ngoắt sang hướng khác.\nCổ em\nấy đỏ ửng lên."

# monologue
# JP: 照れさせるつもりはなかったのだが――\n照れてもらえて、それはそれでやはり、嬉しく思う。
3125 = "Tôi không định làm em ấy ngại――\nNhưng thấy\nem ấy ngại ngùng thế này, tôi lại thấy\nvui."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2379 = "「Fukami.」"

# monologue
# JP: ふれあいたいな、と自然に思う。\nふかみの温度を、恋しく思う。
2810 = "Tôi bỗng có cảm giác muốn chạm vào em ấy\nmột cách tự nhiên.\nThấy nhớ hơi ấm của\nFukami."

# monologue
# JP: ほんの数歩のふかみとの距離が、\n無限に遠いものと感じる。
2748 = "Khoảng cách chỉ vài bước chân giữa tôi và\nFukami,\nlại có cảm giác xa xăm vô tận."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかっ――おおうっ！！？」
2378 = "「Fuka――Oái!!?」"

# monologue
# JP: いかん、滑った！\n足が、いつの間に大股にっ――
2704 = "Chết dở, trượt chân rồi!\nKhông biết từ lúc\nnào tôi đã sải bước dài――"

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんっ！！？」
2524 = "「Anh Soutetsu!!?」"

# monologue
# JP: ふかみが振り向く。\n僕に向かって手をのばす――
2994 = "Fukami quay lại.\nVươn tay về phía tôi――"

# monologue
# JP: （しかし、この手をつかんだらっ）
3178 = "（Nhưng nếu nắm lấy tay em ấy）"

# monologue
# JP: ふかみを巻き込みたくなくて、\nとっさに腕をひっこめてしまう。
2896 = "Không muốn kéo theo Fukami ngã cùng,\ntôi\nvội rụt tay lại."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさ！？　――きゃあっ！！？」
2523 = "「Anh Soutets!? ――Kyaa!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！！！」
2382 = "「Fukami!!!」"

# monologue
# JP: いかん。裏目に出てしまった。
3091 = "Nguy rồi. Phản tác dụng mất rồi."

# monologue
# JP: 引っ込めた手をそれでもふかみはつかもうと――\n無理に体を伸ばしきり、結果、自らも滑ってしまう！
2747 = "Fukami vẫn cố vươn tới nắm lấy bàn tay tôi\nvừa rụt lại――\nCố sức rướn người, kết quả\nlà tự mình cũng bị trượt ngã!"

# monologue
# JP: かばうため、慌てていまさら手を伸ばしっ――
3060 = "Để bảo vệ em ấy, tôi vội vàng vươn tay\nra――"

# 【双鉄】
# display as 雙鐵＆深美
# JP: 「うっ！」\n「きゃあっ！！！」
2053 = "「Ư!」\n「Kyaa!!!」"

# monologue
# JP: （ばちゃんっ！！！！！）
3186 = "（Tùm!!!!!）"

# monologue
# JP: 水――だ。冷たい。\nひどく冷たく、ここちいい。
2970 = "Là――nước. Lạnh quá.\nVô cùng lạnh, nhưng\ncũng rất dễ chịu."

# 【ふかみ】
# display as 深美
# JP: 「あうぅ、やだ、濡れちゃった――\nけど、双鉄おにいさんが守ってくれたから――」
2061 = "「Auu, ôi không, ướt hết rồi――\nNhưng mà,\nnhờ anh Soutetsu đã bảo vệ em――」"

# monologue
# JP: 体が、重い。ずぶずぶ沈む感覚がする。\nこんな浅瀬で、溺れるなどはありえない。
3140 = "Cơ thể, nặng trĩu. Có cảm giác đang chìm\ndần.\nỞ vùng nước nông thế này, không thể\nnào chết đuối được."

# monologue
# JP: そうとはわかっているのだけれど――
2940 = "Dù biết là vậy nhưng――"

# 【ふかみ】
# display as 深美
# JP: 「あれ？　ちょっと？　双鉄、双鉄おにいさん！？\nちょっと！　目！　目、あけてくださいっ！！」
2032 = "「Ơ? Khoan đã? Soutetsu, anh Soutetsu!?\nKhoan đã! Mắt! Anh mở mắt ra đi!!」"

# monologue
# JP: いわれて、気付く。\n僕は目を閉じているのだと。
3102 = "Nghe gọi, tôi mới nhận ra.\nMình đang nhắm\nmắt."

# 【ふかみ】
# display as 深美
# JP: 「ちょっ――これ――とにかく、岸に――\nあげない、とっ！！」
2481 = "「Khoan――chuyện này――dù sao cũng phải――\nkéo\nlên, bờ đã!!」"

# monologue
# JP: いかん。ふかみが怯えている。\n僕の体を、必死になってひっぱっている。
2702 = "Không được rồi. Fukami đang sợ hãi.\nEm ấy\nđang tuyệt vọng kéo cơ thể tôi."

# monologue
# JP: 無理をさせたくなんてない。不安にさせたくなんてない。\nだから、目を開けて動きたい。のに――
2899 = "Tôi không muốn em ấy phải cố sức. Không\nmuốn làm em ấy lo lắng.\nNên tôi muốn mở\nmắt ra và cử động. Thế nhưng――"

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？　大丈夫ですから。\nすぐ、人を呼んできますから！！！」
2522 = "「Anh Soutetsu? Không sao đâu ạ.\nEm sẽ đi\ngọi người đến ngay!!!」"

# 【凪】
# display as 凪
# JP: 「――が、いっつも引っ張り回したせい――」
1458 = "「――Đều là tại em cứ kéo anh ấy đi khắp\nnơi――」"

# 【ふかみ】
# display as 深美
# JP: 「――なことないよ。凪ちゃ――たし、も――」
1461 = "「――Không phải đâu. Nagi――chị, cũng――」"

# monologue
# JP: 声が、聞こえる。
2925 = "Tôi nghe thấy tiếng nói."

# monologue
# JP: にぎやかな声。柔らかな声。\n僕の大好きな、響き合う声が。
2700 = "Một giọng nói náo nhiệt. Một giọng nói dịu\ndàng.\nNhững giọng nói hòa quyện vào nhau\nmà tôi vô cùng yêu thích."

# 【凪】
# display as 凪
# JP: 「……うち、いつだって目一杯、くたくたになるまで、\n稽古ばつけてもらって、遊んでもらって――」
1500 = "「……Lúc nào em cũng chơi đùa, bắt anh ấy\ntập kiếm cùng\ncho đến khi mệt rã rời――」"

# 【ふかみ】
# display as 深美
# JP: 「そんなの、わたしだってだよ！　双鉄おにいさんに、\nいつだって甘えて、支えてもらって――」
2212 = "「Chuyện đó, chị cũng vậy mà! Lúc nào cũng\nnũng nịu, và được anh Soutetsu giúp đỡ――」"

# monologue
# JP: 大好きな声が、けれども今は辛く聞こえる。\n哀しみ同士が、後悔が、切なく響き合ってしまっている。
2749 = "Những giọng nói tôi yêu thích, giờ đây\nnghe thật xót xa.\nNhững nỗi buồn, những\nniềm hối hận, đang cộng hưởng đầy bi\nthương."

# 【凪】
# display as 凪
# JP: 「ふかみちゃんとにーさんの修学旅行のときば、\nうち、のーんびり休んどったばってん」
2171 = "「Lúc bé Fukami và anh hai đi chuyến dã\nngoại,\nem đã được nghỉ ngơi thoải mái mà」"

# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。わたしも。――だけど、双鉄お兄さんは。\nお仕事をして、お休みの日には、必ずわたしたちのこと」
2294 = "「Đúng vậy, nhỉ. Chị cũng thế. ――Nhưng mà,\nanh Soutetsu thì.\nVừa phải làm việc, đến\nngày nghỉ thì lúc nào cũng dành thời gian\ncho chúng ta」"

# 【凪】
# display as 凪
# JP: 「構って、遊んでくれとったばい。\nいっつも変わらず、うちを受け止めてくれとったばい」
1921 = "「Anh ấy luôn quan tâm, chơi đùa cùng em.\nLúc nào cũng vậy, luôn đón nhận em.」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんだけじゃないよ。わたしのことも支えてくれた。\nいつだって――どんなときでも、必ず支えてくれた」
1879 = "「Không chỉ riêng Nagi đâu. Anh ấy cũng đã\nhỗ trợ chị.\nLúc nào cũng vậy――dù trong\nhoàn cảnh nào, anh ấy cũng nhất định giúp\nđỡ chị.」"

# 【凪】
# display as 凪
# JP: 「うち……たち。\nにーさんに、甘えて――ずっと、甘えまくって――」
2037 = "「Chúng…… ta.\nĐã quá dựa dẫm vào anh\nhai――lúc nào cũng nũng nịu――」"

# 【ふかみ】
# display as 深美
# JP: 「一方的に……\n甘やかされて――支えて、もらってただけで」
2098 = "「Chỉ đơn phương……\nđược chiều chuộng――được\nanh ấy giúp đỡ thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――――――」
1471 = "「――――――」"

# monologue
# JP: それは違うと、言いたいけれど声が出ない。
2913 = "Tôi muốn nói rằng không phải vậy, nhưng\nlại không cất nên lời."

# monologue
# JP: 体が、ぴくりとも動かない。\n力の入れ方が、わからない。
3141 = "Cơ thể không nhúc nhích dù chỉ một chút.\nTôi không biết phải dùng sức thế nào."

# 【凪】
# display as 凪
# JP: 「……うち、たち。こどもすぎたばい。甘えるだけで――にーさんに、なーんもおかえしせんままで」
1496 = "「……Chúng ta. Trẻ con quá rồi. Chỉ biết\nnũng nịu――mà chẳng đền đáp lại anh hai\nđược gì.」"

# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。凪ちゃん。それじゃ、いけない。\nわたしたち――もっと大人に、ならなくちゃ」
2292 = "「Đúng vậy, nhỉ. Nagi. Cứ thế này thì không\nđược.\nChúng ta――phải trưởng thành hơn\nnữa.」"

# monologue
# JP: 違う。僕も甘やかされてた。\nふたりとともに過ごす時間に、大きなしあわせを貰ってた。
2706 = "Không phải. Tôi cũng đã được chiều chuộng.\nTrong khoảng thời gian ở bên hai em, tôi\nđã nhận được một niềm hạnh phúc to lớn."

# monologue
# JP: あまりにしあわせで楽しくて――\n体がくたくたであることに、気づけなくなってしまうほど。
2960 = "Quá đỗi hạnh phúc và vui vẻ――\nĐến mức tôi\nkhông còn nhận ra cơ thể mình đã mệt mỏi\nrã rời."

# 【凪】
# display as 凪
# JP: 「……いつまでも、こどものままではおれん、けん。\n遊びの時間ば、ずっーとは続けておれんけん」
1495 = "「……Chúng ta không thể cứ mãi là trẻ con\nđược.\nThời gian vui chơi, không thể cứ kéo\ndài mãi được.」"

# 【ふかみ】
# display as 深美
# JP: 「だね。凪ちゃん。\nどんなに楽しい旅だって――終わらせなくちゃ」
2311 = "「Đúng vậy. Nagi.\nDù chuyến đi có vui vẻ\nđến đâu――cũng phải có lúc kết thúc.」"

# 【凪】
# display as 凪
# JP: 「あ――」
# 2056 = "「啊……」" 

# monologue
# JP: 確かに、旅は……終わらせなければならないものだ。\n終着駅につかないのなら、どんな旅でも苦痛に変わる。
3077 = "Quả thực, chuyến đi là thứ…… bắt buộc phải\nkết thúc.\nNếu không có bến đỗ, thì chuyến\nđi nào rồi cũng sẽ trở thành nỗi đau."

# 【凪】
# display as 凪
# JP: 「……わかっとるけど。さみしかとねぇ」
1498 = "「……Em hiểu chứ. Nhưng mà buồn lắm.」"

# 【ふかみ】
# display as 深美
# JP: 「そう、だね。凪ちゃん」
2290 = "「Đúng, vậy nhỉ. Nagi.」"

# monologue
# JP: ――だからこそ。ずっと続けていたかった。\n凪とふかみとの修学旅行を。
1432 = "――Chính vì thế. Tôi mới muốn kéo dài mãi.\nChuyến dã ngoại cùng Nagi và Fukami."

# monologue
# JP: 賑やかで、良くも悪しくも刺激にみちて、しあわせな――\n僕が手に入れ損ねた時間を、ふたりに与えてもらう旅行を。
2824 = "Náo nhiệt, tràn đầy kích thích dù tốt hay\nxấu, và hạnh phúc――\nChuyến đi mà hai em ấy\nđã ban tặng cho tôi khoảng thời gian mà\ntôi từng đánh mất."

# 【ふかみ】
# display as 深美
# JP: 「……修学旅行が終わっても。大人に……なっても。\n双鉄おにいさんと……もしも三人でいられなくなっても」
1507 = "「……Dù chuyến dã ngoại kết thúc. Dù chúng\nta có…… trưởng thành.\nDù không thể ở bên\ncạnh anh Soutetsu…… cùng nhau ba người\nđược nữa.」"

# 【凪】
# display as 凪
# JP: 「っ！！？」
# 2091 = "「啊？！」" 

# 【ふかみ】
# display as 深美
# JP: 「それでも――ずっと！\nわたしたち、ずっとともだちだよね？　凪ちゃん」
2179 = "「Dù vậy――mãi mãi!\nChúng ta vẫn sẽ luôn là\nbạn của nhau đúng không? Nagi.」"

# monologue
# JP: 凪は、瞬間だまりこむ。\nすっと大きく――息を吸い込む音が聞こえる。
2778 = "Nagi im lặng trong giây lát.\nTôi nghe thấy\ntiếng em ấy――hít một hơi thật sâu."

# 【凪】
# display as 凪
# JP: 「あったりまえばい！　ふかみちゃん！\nおとなになっても、ずっと、ずーっと大親友ばい！」
2402 = "「Tất nhiên rồi! Bé Fukami!\nDù có lớn lên,\nchúng ta vẫn sẽ mãi mãi, mãi mãi là bạn\nthân nhất của nhau!」"

# 【ふかみ】
# display as 深美
# JP: 「――だったら、平気。\nわたし、修学旅行がおわっても」
1514 = "「――Nếu vậy thì, không sao cả.\nDù chuyến dã\nngoại có kết thúc.」"

# 【凪】
# display as 凪
# JP: 「うちもばい。旅の終わりは、さみしかばってん――\nもっと楽しか旅が、きっとうちたちを待っとるばい！」
2035 = "「Em cũng thế. Chuyến đi kết thúc thì buồn\nthật――\nNhưng chắc chắn sẽ có một chuyến đi\nthú vị hơn đang chờ đợi chúng ta!」"

# 【ふかみ】
# display as 深美
# JP: 「うんっ！」
2106 = "「Ừm!」"

# monologue
# JP: ああ、けれど――凪は、ふかみは、羽化しかけてる。
2734 = "A, nhưng mà――Nagi, và Fukami, đang bắt đầu\nlột xác."

# monologue
# JP: 大人になって羽ばたくために、\n甘く楽しい魔法の時間に、自ら区切りをつけている。
3061 = "Để trưởng thành và tung cánh bay cao,\ncác\nem ấy đang tự mình đặt dấu chấm hết cho\nkhoảng thời gian phép thuật ngọt ngào và\nvui vẻ này."

# monologue
# JP: （だったら――僕、も――）
3190 = "（Nếu vậy thì――mình, cũng phải――）"

# monologue
# JP: 動かなくては。歩かなくては。\n羽ばたかなくては――どんな大人にさえもなれない。
2837 = "Phải cử động. Phải bước đi.\nPhải tung\ncánh――Nếu không thì chẳng thể trở thành\nmột người lớn đúng nghĩa."

# monologue
# JP: 例えひととき、どれほどの寂しさを味わおうとも――\n大人になるため、次の旅へと、向かっていきたい。
2788 = "Dù có phải nếm trải bao nhiêu nỗi cô đơn\ntrong một khoảnh khắc――\nVì sự trưởng\nthành, tôi cũng muốn hướng tới chuyến đi\ntiếp theo."

# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
2052 = "「Ưm…… hự――」"

# 【凪】
# display as 凪＆深美
# JP: 「っ！！？　にーさん！！？」\n「双鉄お兄さんっ！！？」
2086 = "「!!? Anh hai!!?」\n「Anh Soutetsu!!?」"

# monologue
# JP: まぶたが、開く。\n体が、動く。
2921 = "Mí mắt tôi mở ra.\nCơ thể cử động."

# monologue
# JP: そしてようやく――声が出る。
2717 = "Và cuối cùng――tôi đã có thể cất tiếng."
