# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃに、ふかみちゃん、いらっしゃーい」
2074 = "「A! Anh hai, bé Fukami, chào mừng đến đây\nnha~」"

# 【凪】
# display as 凪
# JP: 「わーい！　ふかみちゃんばい！！」
2040 = "「Oa! Là Fukami kìa!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あがってくれ。狭いところで申し訳ないが」
2491 = "「Lên đây đi. Hơi chật chội chút, xin lỗi\nnhé.」"

# 【ふかみ】
# display as 深美
# JP: 「い、いえ――あの、お邪魔します。ですっ」
2360 = "「D-dạ không——à ừm, làm phiền mọi người ạ.\nDesu.」"

# monologue
# JP: 緊張しきった声を出し、\nふかみは足を、運転台へとそうっと運ぶ。
3044 = "Bằng một giọng nói đầy căng thẳng,\nFukami rón rén bước lên buồng lái."

# 【ふかみ】
# display as 深美
# JP: 「わぁあ」
2038 = "「Oaaa.」"

# monologue
# JP: 感嘆の声が零れ出る。
3005 = "Tiếng cảm thán thốt ra."

# monologue
# JP: 凪の、ハチロクの、日々姫の顔がうふふと緩む。\n恐らく僕も、似たような顔をしているだろう。
2758 = "Gương mặt Nagi, Hachiroku và Hibiki giãn\nra với nụ cười 'ufufu'.\nCó lẽ tôi cũng đang làm vẻ mặt tương tự."

# 【ふかみ】
# display as 深美
# JP: 「すごい……です。レトロなのに新しい感じ。\n機械がむき出しで……綺麗……かっこいい――」
2143 = "「Tuyệt quá…… desu. Rõ ràng là cổ điển\nnhưng lại mang cảm giác rất mới mẻ.\nMáy móc lộ hẳn ra ngoài…… đẹp quá…… ngầu\nquá——」"

# 【凪】
# display as 凪
# JP: 「さっすがふかみちゃん！　良ぉわかっとるばい！」
1886 = "「Quả không hổ danh Fukami! Hiểu biết ghê\nnha!」"

# 【ハチロク】
# display as 八六
# JP: 「まことに、ですね。[ハチロクニイマル,3]8620は――全ての蒸気機関車は、\n大変に格好良く、美しい機械なのです」
2452 = "「Đúng vậy nhỉ. 8620——và tất cả các đầu máy\nhơi nước,\nđều là những cỗ máy vô cùng tuyệt vời và\nđẹp đẽ.」"

# monologue
# JP: ハチロクの指先が誇らしそうに、水面計のガラスを撫ぜる。
2752 = "Ngón tay Hachiroku đầy tự hào vuốt ve mặt\nkính của đồng hồ đo mực nước."

# 【ハチロク】
# display as 八六
# JP: 「組み合わさった無数の部品に、一つの無駄もありません。\n機能美という言葉の結晶。それが、わたくしの[このこ,3]8620です」
2432 = "「Vô số bộ phận được lắp ráp lại với nhau,\nkhông có một chi tiết nào thừa thãi.\nLà kết tinh của cụm từ 'vẻ đẹp công năng'.\nĐó chính là 8620 của tôi.」"

# 【ふかみ】
# display as 深美
# JP: 「機能美――うん。機能美」
2349 = "「Vẻ đẹp công năng——ừm. Vẻ đẹp công năng.」"

# monologue
# JP: ふかみは小さく頷いて、\nあらためてぐるり――運転台の中を見回す。
3053 = "Fukami khẽ gật đầu,\nrồi lại một lần nữa đảo mắt——nhìn quanh\nbuồng lái."

# 【凪】
# display as 凪
# JP: 「どぎゃんと？　ふかみちゃん」
2199 = "「Thấy sao hả? Fukami.」"

# 【ふかみ】
# display as 深美
# JP: 「うん。[しょううちゅう,2]小宇宙――っていう感じがする。\nこの空間に、世界がギュって詰まってる感じ」
2101 = "「Ừm. Có cảm giác như một tiểu vũ trụ——vậy.\nNhư thể cả thế giới được nén chặt lại\ntrong không gian này.」"

# 【ハチロク】
# display as 八六
