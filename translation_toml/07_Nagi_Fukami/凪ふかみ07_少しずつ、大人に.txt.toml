3136 = "跟凪或深美獨處的時候，我們都會在無意間避免提起不在場的那個人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、同じようなことをいっていたな」
1970 = "「凪也說過同樣的話」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが！？　ですか？？」
2165 = "「小凪她也說過？？」" 

