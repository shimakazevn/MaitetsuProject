1877 = "「Lần tới chị sẽ giải thích nhiều hơn nữa\nnhé!\nNha? Nhớ đến chơi nữa đấy!」"

# 【ハチロク】
# display as 八六
# JP: 「ふかみも、どうぞ素敵な今日を」
2384 = "「Fukami cũng vậy, chúc em có một ngày\ntuyệt vời nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「はい！」
2150 = "「Vâng!」"

# monologue
# JP: （くっ）
3189 = "（Giật nhẹ）"

# 【双鉄】
# display as 雙鐵
# JP: 「お」
2122 = "「Ồ.」"

