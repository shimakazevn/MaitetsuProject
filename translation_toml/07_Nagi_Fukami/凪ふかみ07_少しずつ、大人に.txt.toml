# JP: 臨時・急遽の代理車掌と自身でいっていたとおり、\n憧れるほどの仕事ぶりとは思えなかったが――
2851 = "就像那位臨時代理列車長對自身的評價一樣，她的工作水平並不足以讓人迷上這份工作。" 

# 【ふかみ】
# display as 深美
