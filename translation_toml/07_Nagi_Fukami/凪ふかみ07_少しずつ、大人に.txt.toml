# monologue
# JP: 今からでもその気になれば向かえるが、出かけた先で、\nいささか慌ただしく過ごすことになってしまおう。
3073 = "現在想去倒是也能去，但是到了目的地以後就沒有時間悠閒享受了。" 

# 【ふかみ】
# display as 深美
# JP: 「でも、それって逆にいったら、\n結構ノープランに近かった？」
2008 = "「可是反過來說的話，這次幾乎算是沒有計劃吧？」" 

# 【双鉄】
