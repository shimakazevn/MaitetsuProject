2451 = "「說實話確實沒什麼計劃。經過這一年多的修學旅行之後，感覺去哪裡都無所謂了」" 

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
2091 = "「啊？！」" 

# monologue
