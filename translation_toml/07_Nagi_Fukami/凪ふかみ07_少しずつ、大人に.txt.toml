3066 = "無論友情多深，她們二人的心意果然還是存在沒能互通的部分……也許就是因為感情太過深厚，反而難以啟齒吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、ふかみに置いて行かれたくないと。\n『ふかみちゃんはすごい』と、いっていた」
1969 = "「凪也一樣，她說你很厲害，不想被你拋下」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　うそ？　なんで？\nわたし――だって、全然なんにも」
2028 = "「咦？　不會吧？　為什麼？我……完全沒有任何優點啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分のことは、自分ではわからんものなのだなぁ」
1906 = "「人確實很難了解自己啊」" 

# monologue
# JP: ポーレットに頼りにされている。\n御一夜市の観光行政に、ダイレクトな影響力を持っている。
2999 = "深美很受波萊特的器重，對御一夜市的旅遊行政也擁有直接影響力。" 

# monologue
