1931 = "「Em không biết sao? Nagi. Khăn tay,\nlà để\nchịu bẩn thay cho con người mà?」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん」
2169 = "「Bé Fukamiii.」"

# 【ふかみ】
# display as 深美
# JP: 「はい、凪ちゃん。綺麗になった！」
2145 = "「Xong rồi, Nagi. Sạch sẽ rồi nhé!」"

# monologue
# JP: 言って、ふかみが身をひるがえす。
3050 = "Nói rồi, Fukami xoay người lại."

# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、またね？　凪ちゃん。\nお仕事がんばって！」
2502 = "「Vậy, hẹn gặp lại nhé? Nagi.\nChúc em làm\nviệc tốt!」"

# 【凪】
# display as 凪
# JP: 「もちろんばい！　ちょーがんばるばい！！」
2401 = "「Tất nhiên rồi! Em sẽ cố gắng hết mình!!」"

# 【ふかみ】
