# 【ふかみ】
# display as 深美
# JP: 「すぐ慣れますよ。双鉄おにいさんなら。\nわたしだって大丈夫なんですし」
1937 = "「你肯定很快就能習慣的。連我都能習慣嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは川歩きの経験値が違いすぎよう。\nなんのあてにもならんさ」
2221 = "「我們倆在河裡走路的經驗差距太大了吧，完全沒辦法比」" 

# 【ふかみ】
# display as 深美
# JP: 「それは、ちょっとは違いますけど……\nでも、大丈夫ですよ。バランス感覚いいんですし」
2426 = "「確實有點差距……但是沒問題的，你平衡感很強嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほめてもらえるのは嬉しいが――」
2441 = "「聽你誇獎我是很高興啦，可是……」" 

# monologue
# JP: これがどうにも難しい。\n川の中を歩いていくなど、いままでなかった経験だ。
3150 = "這實在太難了，我從來沒有在河裡行走過。" 

# monologue
# JP: 僕のバランス感覚が、仮に人よりすぐれていても――\nああ。
2857 = "就算我的平衡感真的優於常人……對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪は、どうだ？　凪ならやはり、\nこのリバーウォークとやらにも、すぐ馴染んだのか？」
1973 = "「凪怎麼樣呢？　她在河裡走路也能很快習慣吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃんも、これはまだです。\n双鉄おにいさんが、一番最初で、はじめてですよ？」
2080 = "「啊，小凪也沒來這裡玩過。雙鐵哥哥你是第一個來的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。それは光栄だな」
2318 = "「是嗎，那真是榮幸啊」" 

# monologue
# JP: ふふっと小さな笑い声。
3052 = "深美輕聲嬌笑起來。" 

# monologue
# JP: どんな笑顔か、その瞬間を捉えたいのに、\n今の僕では目線さえ、そろそろとしか動かせない。
2906 = "我多想看看她此時的笑容，但現在根本沒有餘力看向別處。" 

# 【ふかみ】
# display as 深美
# JP: 「……さっきもいったけど。まだ全然なんです。\nコースだって、今は決まってないですし」
1491 = "「……剛才我也說了，還完全沒有準備好呢。就連路線也都還沒決定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それにしては、全く迷う様子もないが」
2009 = "「可是看你走起來一點也不猶豫啊」" 

# 【ふかみ】
# display as 深美
# JP: 「ここは、絶対に入れようって思ってますから。\n川の中からSLの通過を見上げるの――最高でしょう？」
2131 = "「因為我已經把這段路定下來了。在河裡仰望著蒸汽機車通過——你不覺得這很棒嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2289 = "「是啊……」" 

# monologue
# JP: 想像するだけでワクワクしてくる。
2888 = "想像一下就讓我興奮起來了。" 

# monologue
# JP: 8620が通過する振動で、はたして川は揺れるのだろうか？\n汽笛が響けば、川面はうわん、と波立つだろうか？
3193 = "８６２０透過時的震動會讓河流泛起水波嗎？鳴起汽笛會讓水面起伏嗎？" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。実にいい」
2483 = "「這主意真不錯」" 

# 【ふかみ】
# display as 深美
# JP: 「じゃ！　やっぱりここは確定にしちゃいます。\nあとは、ここを起点にするか、終点にするか――とか」
2517 = "「那這裡就定下來了！剩下就是決定把這裡當作起點還是終點了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……景観なども気にしないといかんのか」
2486 = "「這樣啊……路上的風景也要有講究嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「ですね。ただ歩いてもらうだけで楽しいのなんて、\n川に入った一瞬だけかなって、思いますし」
2309 = "「是啊，只有在剛走進水的時候，遊客才會覺得單純地走在水裡很開心吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、普通はそうだろうな」
2110 = "「嗯，正常來說是這樣」" 

# monologue
# JP: 確かに僕も、水の冷たさ、感触を楽しめたのは一瞬だった。\n歩きはじめてしまえばすぐに、歩きづらさに気を取られた。
2901 = "我剛入水時的確也很享受河水冰涼的觸感。但開始行走後，注意力全被行走的困難吸引走了。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、景観を楽しめたり、面白いガイドを出来たり。\nその上で、子供さんやお年寄りも安全に歩けないとだし」
2260 = "「所以要讓遊客能夠享受風景，配合上風趣的解說。而且還要保證小孩和老人的安全」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
# 2487 = "「這樣啊」" 

# monologue
# JP: 『全然未整備』――
1430 = "——“完全沒準備好”。" 

# monologue
# JP: ふかみのさきほどの言葉の意味が、\nようやく僕にも伝わってくる。
2924 = "我總算明白了深美剛才那句話的意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「コースの選び方一つで、観光として成立するか否かが\n大きく変化してしまうのか」
2463 = "「路線的選擇會很大程度影響到整個項目能否成立嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「です。ですから、ほんとはコースもう少し練り込んで。\nそれから双鉄おにいさんをご招待したかったんですけど」
2312 = "「是啊，所以我本來想多推敲一下路線，然後再請你來玩」" 

# monologue
# JP: ぱしゃり、とふかみが水を蹴る。
2812 = "嘩啦……深美踢起了一波水花。" 

# monologue
# JP: かなり高くまで足をあげ――\nそれでも微塵も、そのバランスは崩れない。
2833 = "她高高抬起了腳，但完全沒有失去平衡的跡象。" 

# 【ふかみ】
# display as 深美
# JP: 「走るの、付き合ってもらっちゃいましたから。\n足、疲れを取るのにもちょうどいいかな、って思って」
2130 = "「因為你陪我跑了那麼久嘛。我想著來這裡正好可以消除腿上的疲勞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、驚いたぞ。\nまさかいきなり、\x%l列車防護;#00ffc040;列車防護%l;#;の実習になるとはなぁ」
2306 = "「是啊，剛才真是嚇了我一跳。沒想到你突然要練習\\x%l列車防護;#00ffc040;列車防護%l;#;」" 

# 【ふかみ】
# display as 深美
# JP: 「――自分の列車が停止したとき、\n確実に関係列車が停止できる安全距離は、600メートル」
1459 = "「——我記得自己負責的列車停下時，可供後方列車安全停車的距離是６００公尺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2103 = "「嗯」" 

# monologue
# JP: さきほど教えたばかりのことを、\nふかみは正確に復唱していく。
3016 = "深美把我剛教她的東西正確複述了一遍。" 

# 【ふかみ】
# display as 深美
# JP: 「だから[とうがい,1]当該列車の車掌は、停止位置から600メートルを\n\x%l信号炎管;#00ffc040;信号炎管%l;#;を示しつつ、全力で走りきらなければならない」
2258 = "「所以當事列車的列車長要舉著\\x%l信号炎管;#00ffc040;信號火炬%l;#;，從停車位置全力奔跑６００公尺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。一発でよく覚えたな」
2364 = "「沒錯，說了一遍你就記住了啊」" 

# 【ふかみ】
# display as 深美
# JP: 「それは、だって。\n体をつかって、覚えましたから、です！」
2133 = "「因為我用身體記住了嘛，嗯！」" 

# monologue
# JP: 一歩ずつ、今できることから列車のことを、\n線路のことを学びたい。
3009 = "深美想從自己力所能及的事情開始，循序漸進地學習鐵路知識。" 

# monologue
# JP: ……まさか自分が臨時講師を務めるとは思ってなかったが、\nふかみは見事に、合格点をあげてくれた。
1452 = "……沒想到自己會客串一把臨時講師，深美這次交上了一份合格的答卷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それなら、僕も教えがいがある」
2506 = "「那我也算是沒白教你」" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　双鉄教官！\nこれからもお願いします！　です！！」
2328 = "「是的！　雙鐵教官！今後也請多指教！　嗯！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「車掌の業務については知識でしか知らんが――\nその範囲で教えられることはもちろん、全て教えるさ」
2228 = "「我對列車長的工作也只停留在紙面上的知識——不過我會把知道的全都教給你」" 

# 【ふかみ】
# display as 深美
# JP: 「やったぁ」
2139 = "「太好啦」" 

# monologue
# JP: ぱしゃん、と跳ねる。\n水面から両足が綺麗に飛び出す――
3056 = "深美開心地雀躍起來，雙腳都躍出了水面——" 

# monologue
# JP: 魚のように、人魚のように。
2847 = "就像是一隻美人魚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……若いなぁ」
1509 = "「……年輕人真有活力啊」" 

# 【ふかみ】
# display as 深美
# JP: 「や！　何言ってるんですか双鉄おにいさん。\n自分だって、全然若いじゃないですか！」
2017 = "「呀！　說什麼呢，雙鐵哥哥。你也很年輕啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふかみや凪のような――\nみずみずしいほどの若さはないさ」
1894 = "「不，我已經過了你和凪那樣朝氣蓬勃的年紀了」" 

# monologue
# JP: 川の流れにさらされ、冷やされ、\nそれでも、足は軽くならない。
3162 = "雙腿得到了水流的滋養，涼爽了許多，但腳步還是和之前一樣沉重。" 

# monologue
# JP: 回復が遅くなっているのは、\nまさしく、加齢の影響だろう。
2891 = "應該是因為上年紀了，體力恢復的速度才越來越慢了。" 

# monologue
# JP: （ああ！　真闇姉がいっていた、\n『自分を大事に』とはこのことか――）
3183 = "（啊！　真闇姐說要愛惜自己，指的就是這麼回事啊）" 

# monologue
# JP: このタイミングで思い出してしまったことが、\n申し訳なくも、少しおかしい。
3153 = "這時候想起真闇姐的話，真是讓我心裡又過意不去，同時又覺得好笑。" 

# 【ふかみ】
# display as 深美
# JP: 「なにか、面白いことでもありました？　です？」
2337 = "「有什麼有趣的事情嗎？　嗯？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、なに――」
1896 = "「不，沒什麼……」" 

# monologue
# JP: まさか、正直なところは言えない。\nかといって嘘もつきたくない。
2842 = "實話說不出口，但我又不想說謊。" 

# monologue
# JP: さて……と思えば、\nすぐに言葉が浮き上がってくる。
2908 = "我思索了一下，腦中馬上浮現出一句話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、しあわせだと思っただけだ」
2225 = "「我只是覺得很幸福」" 

# 【ふかみ】
# display as 深美
# JP: 「なにが、です？」
1910 = "「什麼幸福？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この時間が。この時間へとつながってくれた――\n全ての時間が、しあわせだ」
2488 = "「這段時光很幸福。還有這段時光之前的所有過往……都很幸福」" 

# monologue
# JP: そう思える。とても素直に。\n過去の傷さえ、洗い流せると思えるほどに。
3152 = "這是我真實的想法，彷彿連過去的傷痕都被洗去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行に、誘ってもらえてとてもよかった。\nあの瞬間から――僕は、大きく変われたのだと思う」
2443 = "「能受邀參加你們的修學旅行真是太好了。從那一刻之後——我有了徹頭徹尾的改變」" 

# monologue
# JP: ふかみが、凪が、変えてくれた。\nともに楽しむ、自ら楽しむ、その喜びを教えてくれた。
2958 = "是她們改變了我。教會了我與朋友分享快樂，也教會我尋找生活中的樂趣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「感謝している。本当に。\nふかみに、凪に。そして、みんなに」
2238 = "「我真的很感謝你和凪，還有大家」" 

# 【ふかみ】
# display as 深美
# JP: 「や、やだ！　双鉄おにいさん。急にそんな――\nそんなこと言われたら、わたし、照れちゃいます、です」
2449 = "「討、討厭！　雙鐵哥哥，你突然說這種話……我都要害羞了，嗯」" 

# monologue
# JP: ふかみがくるりと向こうを向く。\nその首すじが、赤くなってる。
3058 = "深美馬上轉過身子，臉都紅到了脖子根。" 

# monologue
# JP: 照れさせるつもりはなかったのだが――\n照れてもらえて、それはそれでやはり、嬉しく思う。
3125 = "讓她害羞不是我的本意……不過看到她的反應，我還是挺開心的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2379 = "「深美」" 

# monologue
# JP: ふれあいたいな、と自然に思う。\nふかみの温度を、恋しく思う。
2810 = "和她相互觸碰的念頭從我心底油然而生，忍不住想要感受她的溫暖。" 

# monologue
# JP: ほんの数歩のふかみとの距離が、\n無限に遠いものと感じる。
2748 = "兩人之間只有短短幾步的距離，卻讓我感覺距離遠如天與地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかっ――おおうっ！！？」
2378 = "「深美……呃啊？！」" 

# monologue
# JP: いかん、滑った！\n足が、いつの間に大股にっ――
2704 = "不好，腳滑了，一不小心邁大了步子……" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんっ！！？」
2524 = "「雙鐵哥哥？！」" 

# monologue
# JP: ふかみが振り向く。\n僕に向かって手をのばす――
2994 = "深美回過頭向我伸出手——" 

# monologue
# JP: （しかし、この手をつかんだらっ）
3178 = "（但我要是抓住深美的手，就會連累到她）" 

# monologue
# JP: ふかみを巻き込みたくなくて、\nとっさに腕をひっこめてしまう。
2896 = "我不想讓深美也跟著遭殃，突然又將手縮了回去。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさ！？　――きゃあっ！！？」
2523 = "「雙鐵哥哥？！　——呀啊？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ！！！」
2382 = "「深美！！！」" 

# monologue
# JP: いかん。裏目に出てしまった。
3091 = "糟糕，情況反而更加惡化了。" 

# monologue
# JP: 引っ込めた手をそれでもふかみはつかもうと――\n無理に体を伸ばしきり、結果、自らも滑ってしまう！
2747 = "儘管我縮回了手，深美還是拚命探出身子要抓住我，結果她自己也腳底打滑了。" 

# monologue
# JP: かばうため、慌てていまさら手を伸ばしっ――
3060 = "為了保護她，我又急忙伸出手——" 

# 【双鉄】
# display as 雙鐵＆深美
# JP: 「うっ！」\n「きゃあっ！！！」
2053 = "「唔！」\\n「呀啊！！！」" 

# monologue
# JP: （ばちゃんっ！！！！！）
3186 = "（嘩啦！！！！！）" 

# monologue
# JP: 水――だ。冷たい。\nひどく冷たく、ここちいい。
2970 = "河水……好涼爽，好舒適。" 

# 【ふかみ】
# display as 深美
# JP: 「あうぅ、やだ、濡れちゃった――\nけど、双鉄おにいさんが守ってくれたから――」
2061 = "「啊……討厭，都弄濕了……不過幸好有雙鐵哥哥保護我……」" 

# monologue
# JP: 体が、重い。ずぶずぶ沈む感覚がする。\nこんな浅瀬で、溺れるなどはありえない。
3140 = "身體好重，感覺自己在慢慢下沉。在這種淺灘不可能會溺水才對。" 

# monologue
# JP: そうとはわかっているのだけれど――
2940 = "按道理是這樣，但是——" 

# 【ふかみ】
# display as 深美
# JP: 「あれ？　ちょっと？　双鉄、双鉄おにいさん！？\nちょっと！　目！　目、あけてくださいっ！！」
2032 = "「咦？　喂？　雙、雙鐵哥哥？！醒醒！　快睜開眼睛啊！！」" 

# monologue
# JP: いわれて、気付く。\n僕は目を閉じているのだと。
3102 = "聽到她這麼說，我才發現自己閉著眼睛。" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ――これ――とにかく、岸に――\nあげない、とっ！！」
2481 = "「這……總之……得先拉到岸上！！」" 

# monologue
# JP: いかん。ふかみが怯えている。\n僕の体を、必死になってひっぱっている。
2702 = "不好，深美開始慌張了。她拚命地拖動著我的身體。" 

# monologue
# JP: 無理をさせたくなんてない。不安にさせたくなんてない。\nだから、目を開けて動きたい。のに――
2899 = "我不願讓她勉強自己，也不想讓她擔心受怕。所以我試圖睜開眼睛移動身子，但是……" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？　大丈夫ですから。\nすぐ、人を呼んできますから！！！」
2522 = "「雙鐵哥哥？　沒事的，我馬上叫人過來！！！」" 

# 【凪】
# display as 凪
# JP: 「――が、いっつも引っ張り回したせい――」
1458 = "「——因為咱總是拉著大哥哥到處——」" 

# 【ふかみ】
# display as 深美
# JP: 「――なことないよ。凪ちゃ――たし、も――」
1461 = "「——沒這回事。小凪——我也——」" 

# monologue
# JP: 声が、聞こえる。
2925 = "我聽到了兩道聲音。" 

# monologue
# JP: にぎやかな声。柔らかな声。\n僕の大好きな、響き合う声が。
2700 = "一道熱烈似火，一道柔和似水，是我最愛的組合。" 

# 【凪】
# display as 凪
# JP: 「……うち、いつだって目一杯、くたくたになるまで、\n稽古ばつけてもらって、遊んでもらって――」
1500 = "「……咱總是讓大哥哥陪咱練劍、瘋玩到累趴下」" 

# 【ふかみ】
# display as 深美
# JP: 「そんなの、わたしだってだよ！　双鉄おにいさんに、\nいつだって甘えて、支えてもらって――」
2212 = "「我也一樣啊！　我總是依靠著雙鐵哥哥」" 

# monologue
# JP: 大好きな声が、けれども今は辛く聞こえる。\n哀しみ同士が、後悔が、切なく響き合ってしまっている。
2749 = "兩道我最喜歡的嗓音，此時卻透露出無限的痛苦。兩位悲傷的少女各自傾訴著心中的後悔。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんとにーさんの修学旅行のときば、\nうち、のーんびり休んどったばってん」
2171 = "「小深你和大哥哥去修學旅行的時候，咱就安心休息了」" 

# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。わたしも。――だけど、双鉄お兄さんは。\nお仕事をして、お休みの日には、必ずわたしたちのこと」
2294 = "「是啊……我也一樣。可是雙鐵哥哥無論工作還是休息，都一定陪著我們」" 

# 【凪】
# display as 凪
# JP: 「構って、遊んでくれとったばい。\nいっつも変わらず、うちを受け止めてくれとったばい」
1921 = "「他總是陪著咱玩鬧。不管什麼時候，他都會配合咱的行動」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんだけじゃないよ。わたしのことも支えてくれた。\nいつだって――どんなときでも、必ず支えてくれた」
1879 = "「不只是你，我也一直受雙鐵哥哥的幫助。不管什麼時候……他都一定會來幫助我」" 

# 【凪】
# display as 凪
# JP: 「うち……たち。\nにーさんに、甘えて――ずっと、甘えまくって――」
2037 = "「咱們……總是一個勁依靠著大哥哥……」" 

# 【ふかみ】
# display as 深美
# JP: 「一方的に……\n甘やかされて――支えて、もらってただけで」
2098 = "「單方面……依賴著他，享受他的幫助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――――――」
1471 = "「……」" 

# monologue
# JP: それは違うと、言いたいけれど声が出ない。
2913 = "我想否定她們，卻發不出聲音。" 

# monologue
# JP: 体が、ぴくりとも動かない。\n力の入れ方が、わからない。
3141 = "身體完全不聽使喚，甚至忘記了該如何使力。" 

# 【凪】
# display as 凪
# JP: 「……うち、たち。こどもすぎたばい。甘えるだけで――にーさんに、なーんもおかえしせんままで」
1496 = "「……咱們太孩子氣了。只知道撒嬌……完全沒有回報大哥哥」" 

# 【ふかみ】
# display as 深美
# JP: 「だよ、ね。凪ちゃん。それじゃ、いけない。\nわたしたち――もっと大人に、ならなくちゃ」
2292 = "「是啊……小凪，我們不能這樣。我們……必須變得更成熟」" 

# monologue
# JP: 違う。僕も甘やかされてた。\nふたりとともに過ごす時間に、大きなしあわせを貰ってた。
2706 = "不對，我也依靠著她們。在與她們共度的這段時光中，我得到了莫大的幸福。" 

# monologue
# JP: あまりにしあわせで楽しくて――\n体がくたくたであることに、気づけなくなってしまうほど。
2960 = "是這段時光太過幸福……幸福到我甚至沒能發現身體的疲憊。" 

# 【凪】
# display as 凪
# JP: 「……いつまでも、こどものままではおれん、けん。\n遊びの時間ば、ずっーとは続けておれんけん」
1495 = "「……咱們不能一直這麼孩子氣。玩鬧的時間也不可能永遠持續下去」" 

# 【ふかみ】
# display as 深美
# JP: 「だね。凪ちゃん。\nどんなに楽しい旅だって――終わらせなくちゃ」
2311 = "「是啊，小凪。不管是多麼快樂的旅程……都必須要結束」" 

# 【凪】
# display as 凪
# JP: 「あ――」
# 2056 = "「啊……」" 

# monologue
# JP: 確かに、旅は……終わらせなければならないものだ。\n終着駅につかないのなら、どんな旅でも苦痛に変わる。
3077 = "的確，旅行必須要有終點。如果不設終點站，再快樂的旅程都會變為痛苦的負擔。" 

# 【凪】
# display as 凪
# JP: 「……わかっとるけど。さみしかとねぇ」
1498 = "「……咱明白，只是很捨不得」" 

# 【ふかみ】
# display as 深美
# JP: 「そう、だね。凪ちゃん」
2290 = "「是啊……小凪」" 

# monologue
# JP: ――だからこそ。ずっと続けていたかった。\n凪とふかみとの修学旅行を。
1432 = "——所以，我才想讓我們三個的修學旅行永遠持續下去。" 

# monologue
# JP: 賑やかで、良くも悪しくも刺激にみちて、しあわせな――\n僕が手に入れ損ねた時間を、ふたりに与えてもらう旅行を。
2824 = "她們給予我的這段熱鬧、幸福而充滿刺激的旅程，是我人生中錯過的精彩，我不想宣告這段時光的結束。" 

# 【ふかみ】
# display as 深美
# JP: 「……修学旅行が終わっても。大人に……なっても。\n双鉄おにいさんと……もしも三人でいられなくなっても」
1507 = "「……就算修學旅行結束，就算我們長大成人，就算我們和雙鐵哥哥……不能繼續三個人在一起」" 

# 【凪】
# display as 凪
# JP: 「っ！！？」
# 2091 = "「啊？！」" 

# 【ふかみ】
# display as 深美
# JP: 「それでも――ずっと！\nわたしたち、ずっとともだちだよね？　凪ちゃん」
2179 = "「就算這樣……我們也永遠是朋友吧？小凪」" 

# monologue
# JP: 凪は、瞬間だまりこむ。\nすっと大きく――息を吸い込む音が聞こえる。
2778 = "凪突然陷入沉默，然後大聲吸了一口氣。" 

# 【凪】
# display as 凪
# JP: 「あったりまえばい！　ふかみちゃん！\nおとなになっても、ずっと、ずーっと大親友ばい！」
2402 = "「當然咧！　小深！就算咱們長大了，也永遠永遠是好朋友！」" 

# 【ふかみ】
# display as 深美
# JP: 「――だったら、平気。\nわたし、修学旅行がおわっても」
1514 = "「……那就沒關係了。我不介意結束修學旅行」" 

# 【凪】
# display as 凪
# JP: 「うちもばい。旅の終わりは、さみしかばってん――\nもっと楽しか旅が、きっとうちたちを待っとるばい！」
2035 = "「咱也是。雖然很捨不得結束旅行……但是一定會有更美妙的旅程在等著咱們！」" 

# 【ふかみ】
# display as 深美
# JP: 「うんっ！」
2106 = "「嗯！」" 

# monologue
# JP: ああ、けれど――凪は、ふかみは、羽化しかけてる。
2734 = "但是凪和深美……都迎來了羽化蛻變。" 

# monologue
# JP: 大人になって羽ばたくために、\n甘く楽しい魔法の時間に、自ら区切りをつけている。
3061 = "為了成長翱翔，她們選擇主動結束這段甜蜜而夢幻的旅程。" 

# monologue
# JP: （だったら――僕、も――）
3190 = "（那我也必須……）" 

# monologue
# JP: 動かなくては。歩かなくては。\n羽ばたかなくては――どんな大人にさえもなれない。
2837 = "如果止步不前，安於現狀……是絕對無法成長的。" 

# monologue
# JP: 例えひととき、どれほどの寂しさを味わおうとも――\n大人になるため、次の旅へと、向かっていきたい。
2788 = "即便有時會感到強烈的不捨——為了成長，我還是想要鼓起勇氣邁向下一段旅程。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
2052 = "「唔……呃……」" 

# 【凪】
# display as 凪＆深美
# JP: 「っ！！？　にーさん！！？」\n「双鉄お兄さんっ！！？」
2086 = "「啊？！　大哥哥？！」\\n「雙鐵哥哥？！」" 

# monologue
# JP: まぶたが、開く。\n体が、動く。
2921 = "我睜開雙眼，終於恢復了對身體的控制。" 

# monologue
# JP: そしてようやく――声が出る。
2717 = "也終於能夠開口說話了。" 
