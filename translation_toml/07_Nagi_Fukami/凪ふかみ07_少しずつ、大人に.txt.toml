2438 = "「Hơn nữa, anh cũng rất vui khi biết tấm\nlòng của em. Rằng em muốn làm \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nlà để hỗ\ntrợ chúng anh――để cùng nhau đồng hành.」"

# 【ふかみ】
# display as 深美
