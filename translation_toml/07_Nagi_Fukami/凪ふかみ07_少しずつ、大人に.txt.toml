2904 = "Vừa uống nước trong chai nhựa,\ntôi vừa\nthong thả hỏi em ấy trên băng ghế nghỉ\ndành cho khách du lịch."

# monologue
# JP: ほどなくバーベキュー列車が走るからだろう、\n御一夜の町には今は、行き交う人の姿も少ない。
2803 = "Có lẽ vì chuyến tàu BBQ sắp khởi hành,\nnên\nthị trấn Ohimitera lúc này thưa thớt người\nqua lại."

# 【ふかみ】
