2725 = "Công việc của Nagi, người vẫn đang học\nviệc, được Hachiroku theo dõi sát sao.\nDĩ\nnhiên, việc làm qua loa hay sai sót là\nkhông thể chấp nhận được."

# monologue
# JP: ゆえ、その範囲での最善、最速を目指したのだろう。\n凪は軍手をしたままで、あちこち黒くしてしまっている。
2932 = "Vì thế, có lẽ em ấy đã cố gắng hết sức và\nnhanh nhất trong khả năng của mình.\nNagi\nvẫn đeo găng tay lao động, người dính đầy\nnhững vết đen."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お顔にまで油ついちゃってる。\nどんなにがんばってるのか――わたし、見学できた」
2168 = "「Nagi, dầu dính lên cả mặt rồi kìa.\nEm đã\ncố gắng đến nhường nào――chị đều thấy cả\nrồi.」"

# 【凪】
# display as 凪
