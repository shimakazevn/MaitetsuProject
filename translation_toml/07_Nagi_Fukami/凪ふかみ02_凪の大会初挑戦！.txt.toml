3212 = "那太恐怖了，而且哪怕只慢了一瞬間都會被擊中，如果是我就絕對做不到。" 

# 【ふかみ】
# display as 深美
# JP: 「相手の子も……すごい、です、ね」
2183 = "「對手……也很強，對吧」" 

# 【双鉄】
# display as 雙鐵
