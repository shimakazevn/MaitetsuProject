# 【凪】
# display as 凪
# JP: 「チェェストオオオオー！」
2103 = "「喝啊啊啊啊啊啊！」" 

# 【中村】
# display as 選手Ａ
# JP: 「りゃああああああああっ！！」
2076 = "「啊啊啊啊啊啊啊啊！！」" 

