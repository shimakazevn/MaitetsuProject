# JP: 聞いたとたんに、凪ちゃんがぱんっ！\n両手で自分の顔を挟むみたいにしてたたく。
2899 = "小凪一聽到聲音，就用雙手用力拍了一下自己的臉頰。" 

# 【凪】
# display as 凪
# JP: 「いよいよばいね！　決勝戦！！」
2388 = "「終於要來咧！　決賽！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「積み重ねてきた凪を正しく出すんだ。\n剣術ではなく、剣道であることを忘れずに」
2210 = "「展示出自己修行的成果吧。不要忘記比的不是劍術，而是劍道」" 

# monologue
# JP: 凪ちゃんが汗で湿ってる髪をゆっくり、\n手ぬぐいで包んでまとめてく。
3027 = "我輕輕用手巾裹起小凪汗濕的頭髮。" 

# monologue
# JP: 髪をまとめた手ぬぐいの上に、面をつけてく。
3091 = "然後幫她戴上頭盔。" 

# monologue
# JP: （凪ちゃん……）
3295 = "（小凪……）" 

# monologue
# JP: その横顔に、一瞬、みとれる。\n静かで、綺麗で――汗の粒さえ、宝石みたい。
2857 = "她恬靜秀麗的側臉不禁讓我看呆了，就連汗珠都像寶石一樣閃耀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そうすれば、結果は必ずついてくる。\n自分を信じ、お師匠さんを信じ、僕を信じろ」
1479 = "「——這樣就一定能收穫成果。相信自己，相信師父，也相信我吧」" 

# 【凪】
# display as 凪
# JP: 「はいっ！」
2170 = "「好！」" 

# monologue
# JP: 凪ちゃんが立つ。\n双鉄おにいさんが竹刀を渡す。
2956 = "小凪站起身子，雙鐵哥哥把竹刀遞給了她。" 

# monologue
# JP: 静かに、凪ちゃんが進んでく。\n試合会場の中心にある、開始の線の前に立つ。
2872 = "她靜靜走向比賽會場的中心，站在起點的白線前。" 

# 【ふかみ】
# display as 深美
# JP: 「がんばって、凪ちゃん！」
1970 = "「加油，小凪！」" 

# monologue
# JP: 凪ちゃんがしゃがむ。\n“そんきょ”っていう姿勢。
2910 = "小凪原地蹲下，行了蹲踞之禮。" 

# monologue
# JP: 相手の子も、そんきょ。\n体と体、竹刀と竹刀がまっすぐ向き合う。
2893 = "對手也行了一禮，然後與小凪持竹刀正面對峙。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪より小柄か」
1902 = "「個子比凪還要小啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、ほんと」
2088 = "「啊，真的耶」" 

# monologue
# JP: 立ち上がったらはっきりわかる。\n相手の子、ちっちゃい。
2945 = "小凪的對手站起身，能明顯看出身材更加嬌小。" 

# monologue
# JP: 今度も、凪ちゃんは[しろだすき,1]白襷。\n相手の子の赤襷が、何だかかわいらしくはかなく見える。
3202 = "這次小凪依然是白方。對手身上則繫著紅帶子，看起來還有些可愛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪には、慣れん相手となるな」
2356 = "「看來是個凪不熟悉的類型啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ。確かに、です」
2090 = "「啊，確實是，嗯」" 

# monologue
# JP: 凪ちゃん、お師匠さんとか双鉄おにいさんとか、\n大人のひととばっかり、いっつも練習してるから――
2839 = "因為小凪總是和師父、雙鐵哥哥這樣的年長者對練。" 

# 【主審】
# display as 主裁判
# JP: 「はじめっ！」
2476 = "「開始！」" 

# 【凪】
# display as 凪
# JP: 「チェーーーーーーーストーーーーっ！！！」
# 2105 = "「喝啊！！！」" 

# monologue
# JP: 凪ちゃん、平気だ！\nいつもと全然変わらない！！
2970 = "小凪，沒問題的！和平時一樣！" 

# monologue
# JP: 一気に大きく振りかぶって、そのまま相手に――っ！？
2688 = "全力將竹刀舉起，直接將對手——！？" 

# 【中村】
# display as 選手Ａ
# JP: 「やああああああっ！」
1996 = "「呀啊啊啊啊啊！」" 

# monologue
# JP: （がちっ！！！！）
3285 = "（喀嚓！！！！）" 

# monologue
# JP: 速い！　このこもっ！
2892 = "對手也好快！" 

# monologue
# JP: 体当たりみたいに凪ちゃんに向かってくっついて、\n凪ちゃん、竹刀を振り下ろせなくなっちゃった。
2895 = "對手猛撲上來拉近距離，小凪沒能揮下竹刀。" 

# 【凪】
# display as 凪
# JP: 「っ――くっ――」
2061 = "「唔——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む。対策されているな」
2117 = "「嗯，對手做了針對啊」" 

# monologue
# JP: 双鉄おにいさんの視線の先――\n試合場の向かい側には、いかにもベテランのおじいさん。
3029 = "我順著雙鐵哥哥的視線望去，看到賽場對面有一位彷彿身經百戰的老爺爺。" 

# monologue
# JP: 対策……とか言われちゃうと、\nなんだか、すごくヤな感じがする。
3151 = "聽雙鐵哥哥說被針對了……我忽然有種不好的預感。" 

# 【ふかみ】
# display as 深美
# JP: 「対策って」
1863 = "「什麼針對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「バイ捨流の基本にして究極は右半開からの袈裟懸けだ。\nしかし、それは禁じ手ゆえに、凪の剣筋は制限される」
2482 = "「體舍流的基礎以及最強的一招，就是右半開後的斜劈斬。但這卻是禁止使用的招數，所以凪的劍法會受到限制」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2112 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
