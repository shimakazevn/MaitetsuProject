# 2103 = "「喝啊啊啊啊啊啊！」" 

# 【中村】
# display as 選手Ａ
# JP: 「やああっ！」
1999 = "「呀啊！」" 

# 【主審】
# display as 主裁判
# JP: 「待てっ！　――離れて」
1906 = "「停手！　兩位選手分開」" 

# 【ふかみ】
# display as 深美
# JP: 「え？」
2020 = "「咦？」" 

# monologue
# JP: 主審の人が、待てって大きな声でいって、\n凪ちゃんと相手の子を、最初の――開始線まで戻す。
2651 = "主裁判大聲喊停，讓雙方都回到了起點線上。" 

# monologue
# JP: どうして？　時間、まだ残ってるのに――\nあ！
3082 = "為什麼？明明還沒到時間啊……對了！" 

# 【双鉄】
# display as 雙鐵
