2332 = "「沒錯。所以她在這次大賽上，反覆施展著這一招闖到了決賽」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2081 = "「啊！」" 

# monologue
# JP: だから……見られた。\n見られて――こうやって、対策された。
3032 = "所以……對方看到了這招，並做出了針對。" 

# 【凪】
# display as 凪
# JP: 「っ――うぬぅぅ～っ」
# 2061 = "「唔——」" 

# 【双鉄】
# display as 雙鐵
