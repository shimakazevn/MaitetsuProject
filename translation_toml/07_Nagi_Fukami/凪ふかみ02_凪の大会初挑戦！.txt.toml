3073 = "Hổ......thì có vẻ hơi quá lời. Nhưng mà, mình thực sự đã rất sợ."
# monologue
# JP: 例えば凪ちゃんの殺気――っていうのが、虎じゃなく、\nお腹を空かせたノラ犬くらいのものだとしても……
2773 = "Ví dụ như sát khí của Nagi——không phải là hổ, mà chỉ ngang với một con chó hoang đang đói bụng đi chăng nữa......"
# 【ふかみ】
# display as 深美
# JP: 「すくんじゃうと思う。殺気、とか、そういうの、\nもしもぶつけられたら、相手の動きを読むとかより前に」
2469 = "「Mình nghĩ họ sẽ cứng đờ người lại thôi. Sát khí, hay những thứ đại loại thế, nếu bị nhắm vào, trước cả khi kịp đọc được chuyển động của đối phương.」"
# 【凪】
# display as 凪
# JP: 「やけん、\nそれはふかみちゃんが剣術ばならっとらんけん」
2472 = "「Đã bảo rồi mà, đó là do Fukami không học kiếm thuật thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「習ってても……」
2173 = "「Dù có học đi nữa thì......」"
# monologue
# JP: おなかをすかせたノラ犬が、うーってうなって、\n自分の目の前の道に立ち塞がってる。
2684 = "Một con chó hoang đang đói bụng, gầm gừ, và chặn ngay trước con đường mình đang đi."
# monologue
# JP: そんな状況、剣道をもし習ってても――\nわたしなら、やっぱりきっと、動けなくなる。
2975 = "Trong tình huống đó, dù có học kiếm đạo đi chăng nữa—— Nếu là mình, chắc chắn vẫn sẽ không thể nhúc nhích được."
# 【ふかみ】
# display as 深美
# JP: 「出てくるのかな？　そんなこ。\n凪ちゃんとか、双鉄おにいさんくらいに出来る人って」
2374 = "「Liệu có xuất hiện không nhỉ? Những người như thế. Những người giỏi cỡ Nagi hay anh Soutetsu ấy.」"
# 【凪】
# display as 凪
# JP: 「出てくるばい。必ず。\nお師匠さんに聞いた全国ば、そういう場所ばい」
1827 = "「Sẽ xuất hiện thôi. Chắc chắn. Theo như sư phụ nói thì toàn quốc là một nơi như vậy đó.」"
# 【ふかみ】
# display as 深美
# JP: 「！」
2081 = "「!」"
# monologue
# JP: 凪ちゃんがキリって引き締まる。\n空気が変わる。
2923 = "Vẻ mặt Nagi trở nên nghiêm túc. Bầu không khí thay đổi."
# 【凪】
# display as 凪
# JP: 「うちよりずっと、もっと強かとがぞろぞろおるばい。\nそうでなきゃ、少しも修行にならんとよ」
2319 = "「Có đầy rẫy những người mạnh hơn mình rất rất nhiều. Nếu không thì, chẳng còn là tu luyện chút nào nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2065 = "「A——」"
# monologue
# JP: 聞いた瞬間、ちょっと背中がゾクってする。
3150 = "Khoảnh khắc nghe thấy điều đó, sống lưng mình hơi lạnh đi."
# monologue
# JP: 凪ちゃんが大会に出るのって、優勝したいからじゃなく、\n強い相手と戦いたい……修行をしたいからなんだ。
2912 = "Việc Nagi tham gia đại hội, không phải vì muốn vô địch, mà là vì muốn chiến đấu với đối thủ mạnh......vì muốn tu luyện."
# 【ふかみ】
# display as 深美
# JP: 「……すごいね、凪ちゃん」
1504 = "「......Cậu tuyệt thật đấy, Nagi.」"
# monologue
# JP: 改めて考えてみたら、ほんとにすごい。\nこんなにちっちゃな体で、何トンも石炭を投げ込んで。
2667 = "Nghĩ lại mới thấy, cậu ấy thật sự rất tuyệt. Với cơ thể nhỏ bé thế này, mà xúc vào hàng tấn than."
# monologue
# JP: あんなにおっきな8620をちゃんと動かして、\nその上、クマ川下りの船頭さんだってできて――
3156 = "Làm cho chiếc 8620 to lớn như vậy hoạt động trơn tru, hơn nữa, còn làm được cả người lái đò xuôi dòng sông Kuma——"
# 【凪】
# display as 凪
# JP: 「すごくなかとよ！　お師匠さんにも、にーさんにも、\nふかみちゃんにも、かなわんことばっかりやけん」
2264 = "「Không tuyệt chút nào đâu! Cả sư phụ, cả anh hai, lẫn Fukami, có đầy chuyện mình không bằng mọi người mà.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしに！？」
2318 = "「Không bằng mình á!?」"
# monologue
# JP: びっくりするけど、\n凪ちゃん、からかってるみたいな感じじゃない。
3018 = "Dù rất ngạc nhiên, nhưng Nagi không có vẻ gì là đang trêu đùa cả."
# 【ふかみ】
# display as 深美
# JP: 「わたしに……凪ちゃんが『かなわない』って思うような\nとこ――あ、身長とかそういうの？　胸の大きさとか」
2394 = "「Mình có điểm gì......khiến Nagi nghĩ là 『không bằng』 cơ chứ ——A, chiều cao hay mấy cái tương tự hả? Cỡ ngực chẳng hạn.」"
# 【凪】
# display as 凪
# JP: 「な、なんばいいよっとー！？」
2412 = "「C-cậu đang nói cái gì vậy!?」"
# monologue
# JP: 今度は凪ちゃんがびっくり顔。
3203 = "Lần này đến lượt Nagi làm bộ mặt ngạc nhiên."
# monologue
# JP: 胸のとこ、ぺたぺた、自分で、\nちょっとだけふくれた顔して、確かめてる。
2874 = "Cậu ấy tự vỗ vỗ vào ngực mình, với khuôn mặt hơi phụng phịu, để xác nhận lại."
# 【凪】
# display as 凪
# JP: 「……そりゃ、そういうことも今は負けとるけど。\nうちがゆーとるのは、そぎゃん意味じゃなかとよー」
1518 = "「......Thì, mấy cái đó bây giờ mình đúng là thua thật. Nhưng ý mình không phải là mấy chuyện đó đâu~」"
# 【ふかみ】
# display as 深美
# JP: 「じゃ、どういう意味？　どういうところ？\nわたしが、凪ちゃんに勝ってるのって」
2466 = "「Vậy, ý cậu là sao? Ở điểm nào cơ? Việc mình hơn Nagi ấy.」"
# 【凪】
# display as 凪
# JP: 「そい、ば――」
2443 = "「Chuyện, đó——」"
# monologue
# JP: 声が急にちっちゃくなって。\nじわって、凪ちゃんのほっぺが赤くなる。
2952 = "Giọng cậu ấy đột nhiên nhỏ lại. Hai má Nagi từ từ ửng đỏ."
# monologue
# JP: 凪ちゃん、かわいい。\nたぬきのじゃなくって、おんなのこのかわいさ、すごく。
2861 = "Nagi, đáng yêu quá. Không phải kiểu dễ thương của lửng chó, mà là sự đáng yêu của một người con gái."
# 【凪】
# display as 凪
# JP: 「……そいば、たとえば――にーさん、と」
1514 = "「......Chuyện đó, ví dụ như——với anh hai.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんと？」
2480 = "「Với anh Soutetsu á?」"
# 【凪】
# display as 凪
# JP: 「その……\nにーさんに、女の子扱いばしてもらう」
2198 = "「Thì là...... được anh hai đối xử như một người con gái.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、待たせてしまったな！」
2265 = "「Xin lỗi, để hai đứa đợi lâu rồi!」"
# 【凪】
# display as 凪＆深美
# JP: 「ぴきゃうっ！！」\n「双鉄おにいさん！」
2042 = "「Ái da!!」 「Anh Soutetsu!」"
# monologue
# JP: （がさっ）
3276 = "（Xoạt）"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう……なるほど」
2095 = "「Hô......ra là vậy.」"
# monologue
# JP: 双鉄おにいさん、長い袋をかかえてる。\n竹藪全体をぐるうって見て、感心したみたいな低い声。
3226 = "Anh Soutetsu đang ôm một cái túi dài. Anh ấy nhìn quanh cả bụi tre, rồi cất giọng trầm ấm như đang thán phục."
# 【双鉄】
# display as 雙鐵
# JP: 「さすが、修行に適していそうな場所だな」
1843 = "「Quả nhiên là một nơi có vẻ rất thích hợp để tu luyện nhỉ.」"
# 【凪】
# display as 凪
# JP: 「でしょお！」
2202 = "「Đúng không!」"
# monologue
# JP: うふふ、さっきまであわあわしてたのに、\n凪ちゃん、にこにこにパって変わった！
2905 = "Fufufu, mới lúc nãy còn luống ca luống cuống, thế mà giờ Nagi đã cười tươi rói luôn rồi!"
# monologue
# JP: こどもみたいで、すっごく可愛い。\nほめてもらえて、笑顔全開で嬉しそう！
3128 = "Cứ như trẻ con vậy, đáng yêu hết sức. Được khen nên cậu ấy cười toe toét, trông vui lắm!"
# 【凪】
# display as 凪
# JP: 「足場のめちゃくちゃ悪かけんねー！\nバイ[しゃりゅう,1]捨流の修行には最高ばい！！」
2138 = "「Chỗ đứng ở đây cực kỳ tệ luôn! Nên rất tuyệt vời để tu luyện Thể Xá Lưu đó!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
2070 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2120 = "「Hửm?」"
# 【凪】
# display as 凪
# JP: 「どぎゃんしたと？」
2235 = "「Sao vậy?」"
# monologue
# JP: 凪ちゃんのおはなしの邪魔するつもりなんてなかったのに、\n声が出ちゃった。
3019 = "Mình không hề có ý định cắt ngang câu chuyện của Nagi, nhưng lỡ thốt lên mất rồi."
# monologue
# JP: こうなっちゃったらせっかくだし、\n聞いちゃった方がいい気がしてくる。
3048 = "Đã lỡ vậy rồi thì nhân tiện, mình cảm thấy nên hỏi luôn cho rồi."
# 【ふかみ】
# display as 深美
# JP: 「その……バイ[しゃりゅう,1]捨流？　わたし名前しか知らないから、\nどんな感じなのかな、って、思って」
2458 = "「Cái đó......Thể Xá Lưu á? Mình chỉ biết mỗi cái tên thôi, nên đang nghĩ không biết nó như thế nào.」"
# 【凪】
# display as 凪
# JP: 「[ひゃくぶん,1]百聞は[いっけん,1]一見にしかずばい！！\n[ひとたち,2]一太刀あびせるけん！　見とって！　にーさんも！！」
2352 = "「Trăm nghe không bằng một thấy!! Mình sẽ tung một nhát kiếm! Nhìn cho kỹ nha! Cả anh hai nữa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。大会に向けての準備のためにも、\nじっくりと見せてもらおう」
2111 = "「Ừm. Cũng là để chuẩn bị cho đại hội, hãy cho anh xem thật kỹ nhé.」"
# 【凪】
# display as 凪
# JP: 「まかせろばい！　――（すうっ）」
1853 = "「Cứ giao cho em! ——（Hít——）」"
# 【ふかみ】
# display as 深美
# JP: 「！」
# 2081 = "「啊！」" 
# monologue
# JP: 凪ちゃん、深く息を吸ったら、目つきが変わる。
2938 = "Nagi hít một hơi thật sâu, ánh mắt liền thay đổi."
# monologue
# JP: 見てるわたしの背筋までピンって伸びるくらいに、\n空気が、キリって引き締まる。
3077 = "Bầu không khí trở nên căng thẳng, đến mức người đứng xem như mình cũng phải vươn thẳng lưng lên."
# 【凪】
# display as 凪
# JP: 「――っ」
1471 = "「——」"
# monologue
# JP: 木刀をとって、右肩に担ぐみたいにして構える。
2957 = "Cậu ấy cầm lấy thanh kiếm gỗ, vác lên vai phải và thủ thế."
# monologue
# JP: わたしの知ってる、\nマンガとかでよく見る剣の構え方と、全然違う――
3206 = "Khác hoàn toàn với cách cầm kiếm mà mình hay thấy trong manga——"
# 【双鉄】
# display as 雙鐵
# JP: 「[みぎはっそう,2]右八相の構え。バイ[しゃりゅう,1]捨流では確か、\n[みぎはんかい,2]右半開と呼ばれる構えだ」
1991 = "「Tư thế Hữu Bát Tướng. Trong Thể Xá Lưu, nếu anh nhớ không lầm, thì nó được gọi là Hữu Bán Khai.」"
# 【ふかみ】
# display as 深美
# JP: 「みぎはんかい――」
1993 = "「Hữu Bán Khai——」"
# monologue
# JP: はんかいって、多分、半分ひらく、なんだと思う。\n凪ちゃんの体、名前の通り半身になって――っ！
2771 = "Bán khai, chắc có nghĩa là mở một nửa. Cơ thể của Nagi, đúng như cái tên, xoay nửa người lại——!"
# 【凪】
# display as 凪
# JP: 「チェェストーーーーーーーーーーーーーーーーーー」
2102 = "「Cheeeeessstoooooooooooooooooo」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
2000 = "「Á!」"
# monologue
# JP: やっぱり、虎！\n凪ちゃん、すごい、凄い勢いっ！！
3061 = "Quả nhiên là hổ mà! Nagi, thật tuyệt vời, khí thế quá dữ dội!!"
# monologue
# JP: 足場、ものすごく悪いのに、\n竹がたくさんたくさん生えて隙間なんて無いくらいなのに
3204 = "Dù chỗ đứng cực kỳ tệ, tre lại mọc dày đặc đến mức gần như không có khe hở nào."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2096 = "「Hô.」"
# monologue
# JP: （ザザザザザザザっ！）
3277 = "（Rào rào rào rào rào!）"
# monologue
# JP: 凪ちゃんが、その無い隙間をすり抜けて、\n風みたいになって走る、走る――
2908 = "Thế mà Nagi lại lách qua những khe hở tưởng như không có đó, lao đi, lao đi như một cơn gió——"
# monologue
# JP: 構えが全然崩れないまま、引き絞ったみたいなままで、\nすり抜けてるのに、一直線に！　矢みたいに！！
2867 = "Tư thế không hề bị phá vỡ, cơ thể vẫn giữ nguyên trạng thái căng cứng, lách qua mọi thứ nhưng lại lao đi trên một đường thẳng! Như một mũi tên vậy!!"
# 【凪】
# display as 凪
# JP: 「ーーーーーーーっっ！！！」
# 2105 = "「喝啊！！！」" 
# monologue
# JP: （ガキっ！！！！！）
3278 = "（Cạch!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2126 = "「Ồ!」"
# 【ふかみ】
# display as 深美
# JP: 「わ！」
# 2040 = "「哇！」" 
# monologue
# JP: うそ……凄い！\n凪ちゃんが振り下ろした木刀――
2847 = "Không thể nào......Giỏi quá! Thanh kiếm gỗ mà Nagi vung xuống——"
# 【双鉄】
# display as 雙鐵
# JP: 「見事だ。[なまだけ,1]生竹をたたき割るのか」
1976 = "「Đẹp mắt lắm. Chém nứt cả cây tre tươi cơ à.」"
# monologue
# JP: ――すごく太い竹の中に、割ったっていうか、\n木刀なのに切ったっていうか――半分くらいめり込んでる。
3215 = "——Nó găm vào giữa một thân tre rất to, nói là chẻ đôi cũng được, mà nói là chém đứt bằng kiếm gỗ cũng chẳng sai——Nó lún vào khoảng một nửa."
# monologue
# JP: 素人のわたしにだって、凄いってわかる。\n竹に跳ね返されないで、そのまま、木刀で切ったこと。
2775 = "Ngay cả một người ngoại đạo như mình cũng hiểu được nó lợi hại đến mức nào. Không bị thân tre dội ngược lại, mà cứ thế dùng kiếm gỗ chém đứt nó."
# 【凪】
# display as 凪
# JP: 「ダメばーい！　やっぱり一刀両断できんばい！」
1840 = "「Không được rồi! Quả nhiên là không thể một nhát chém đôi được!」"
# 【ふかみ】
# display as 深美
# JP: 「えええっ！？」
2012 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか――凪のお師匠は、出来るのか？」
2481 = "「Không lẽ——sư phụ của Nagi, làm được sao?」"
# 【凪】
# display as 凪
# JP: 「できとーよ？\nそこらのが、お師匠さんの斬った竹ばい！」
2396 = "「Làm được chứ? Mấy cây quanh đây đều là do sư phụ chém đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「これを――木刀でか」
1982 = "「Cái này á——bằng kiếm gỗ sao.」"
# 【凪】
# display as 凪
# JP: 「そうばい！」
2281 = "「Đúng vậy!」"
# 【ふかみ】
# display as 深美
# JP: 「え！？　うそ！　うそっ！！！」
2053 = "「Hả!? Điêu! Nói điêu!!!」"
# monologue
# JP: だって、切り口――すごいスッパリ！
3122 = "Bởi vì, mặt cắt——phẳng lì luôn!"
# monologue
# JP: TVアニメの昔話の、\nかぐや姫がはいってる竹みたいな感じに切れてるし！
2973 = "Nó bị cắt đứt hệt như cây tre có công chúa Kaguya bên trong ở mấy câu chuyện cổ tích trên anime TV ấy!"
# 【ふかみ】
# display as 深美
# JP: 「木刀で、こんなことできるの！？」
2305 = "「Dùng kiếm gỗ mà làm được như vầy sao!?」"
# 【凪】
# display as 凪
# JP: 「うちはまだ出来んと。けど、まじめに修行ばしとったら、\n出来るよーになるって、お師匠さんが」
2029 = "「Mình thì vẫn chưa làm được. Nhưng sư phụ bảo nếu chăm chỉ tu luyện, thì rồi sẽ làm được thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「すごいすごいすごい！　凪ちゃんすごい！\nバイ捨流って、すごいんだね！！！」
2163 = "「Tuyệt quá tuyệt quá tuyệt quá! Nagi giỏi quá! Thể Xá Lưu, đỉnh thật đấy!!!」"
# 【凪】
# display as 凪
# JP: 「そうばい！　バイ捨流は日ノ本一たい！\nふかみちゃんに褒められて、[くらんど,1]蔵人さんも喜んどるばい！」
2287 = "「Đúng vậy! Thể Xá Lưu là số một Hinomoto! Được Fukami khen, ngài Kurando chắc cũng vui lắm đó!」"
# 【ふかみ】
# display as 深美
# JP: 「くらんどさん？」
2398 = "「Ngài Kurando?」"
# 【凪】
# display as 凪
# JP: 「[かくめ,1]角目蔵人！　バイ捨流のご開祖様ばい！\nこん竹藪のすぐ近くに、蔵人さんのお墓あるとよ！」
2409 = "「Kakume Kurando! Sư tổ sáng lập Thể Xá Lưu đó! Ngay gần bụi tre này có mộ của ngài Kurando đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「ほんと！？　じゃ、あとでつれてって、凪ちゃん。\nおまいりしたら、なんだか凄く[ごりやく,2]御利益ありそう！」
2372 = "「Thật hả!? Vậy lát nữa dẫn mình đi nha, Nagi. Đến viếng mộ chắc chắn sẽ được phù hộ nhiều lắm đây!」"
# 【凪】
# display as 凪
# JP: 「喜んでばーい！！」
2166 = "「Rất sẵn lòng!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2112 = "「Ưm.」"
# monologue
# JP: あ――
2833 = "A——"
# monologue
# JP: 双鉄おにいさん、凪ちゃんが木刀を引き抜いた、\nその切り口を、しゃがみこんで、じっくり見てる。
3232 = "Anh Soutetsu ngồi xổm xuống, chăm chú quan sát mặt cắt nơi Nagi vừa rút thanh kiếm gỗ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「凪の太刀筋の鋭さは知っていたが――\nいや、驚いた。ここまで成長しているとはな」
2256 = "「Anh vốn biết đường kiếm của Nagi rất sắc bén—— Nhưng không ngờ đấy. Em đã trưởng thành đến mức này rồi sao.」"
# 【凪】
# display as 凪
# JP: 「成長せんわけなかとよー！　修行も投炭も\nクマ川くだりも学園も！　がんばっとるけん！！」
2349 = "「Làm sao mà không trưởng thành cho được! Cả tu luyện, xúc than, chèo thuyền trên sông Kuma lẫn việc học! Em đều rất cố gắng mà!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのすべてが、\nいい方向に連鎖しているのだろうな」
2442 = "「Tất cả những thứ đó, chắc hẳn đã tạo nên một chuỗi liên kết theo hướng tích cực nhỉ.」"
# 【凪】
# display as 凪
# JP: 「ふっふーん、もっともーっと褒めてよかとよ！」
2060 = "「Hứ hừm, anh cứ khen em nhiều hơn nữa đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならばお言葉に甘えよう」
2128 = "「Vậy sao? Thế thì anh không khách sáo đâu.」"
# 【凪】
# display as 凪＆深美
# JP: 「ひゃっ！」\n「あ」
2001 = "「Á!」 「A.」"
# monologue
# JP: 双鉄おにいさん、凪ちゃんの頭をなでてあげてる。\nやさしく、やさしく、子犬のお腹をなでるみたいに。
3227 = "Anh Soutetsu đang xoa đầu Nagi. Thật nhẹ nhàng, thật dịu dàng, như đang vuốt ve bụng của một chú cún con vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「日々の鍛錬を、たゆまずおごらず重ねたのだな。\nその成果をきちんと身につけている。実に見事だ」
1890 = "「Em đã không ngừng rèn luyện mỗi ngày mà không hề kiêu ngạo nhỉ. Thành quả đó đã thực sự thấm vào người em rồi. Thật sự rất tuyệt vời.」"
# 【凪】
# display as 凪
# JP: 「えへっ……えへへへへー」
2121 = "「Ehe......ehehehehe~」"
# monologue
# JP: いいなぁ。\n凪ちゃん、すっごく嬉しそう。
2848 = "Thích ghê. Trông Nagi có vẻ rất vui."
# monologue
# JP: わたし……わたしもほめてもらえてるけど、\nあんな風に、あんまりなでなでとか、してもらえないし。
2995 = "Mình......mình cũng từng được khen, nhưng chưa bao giờ được xoa đầu nhiều như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
2209 = "「Thế này nhé.」"
# 【凪】
# display as 凪
# JP: 「あぅ」
# 2070 = "「啊」" 
# monologue
# JP: 撫でおわりに、ぽぉんて軽く凪ちゃんの髪をたたいて、\n双鉄おにいさんの顔が変わる。
3223 = "Sau khi xoa xong, anh Soutetsu vỗ nhẹ lên tóc Nagi một cái, rồi nét mặt anh thay đổi."
# monologue
# JP: キリっとした顔。まじめな顔。\nわたしの、一番大好きな顔に。
3175 = "Một khuôn mặt sắc sảo. Một khuôn mặt nghiêm túc. Khuôn mặt mà mình yêu thích nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「凪の師匠が、大会の優勝を修行の課題とした理由が、\n僕にも、いくらかはわかった気がした」
2247 = "「Lý do sư phụ của Nagi lấy việc vô địch đại hội làm bài tập tu luyện, anh cảm thấy mình cũng phần nào hiểu được rồi.」"
# 【凪】
# display as 凪
# JP: 「理由！　あるなら知りたかとばい！！」
1862 = "「Lý do! Nếu có thì em cũng muốn biết!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の想像に過ぎんがな。\n恐らくは――“優勝は極めてむつかしい”からだ」
2444 = "「Đó chỉ là suy đoán của anh thôi. Có lẽ là vì——“Vô địch là cực kỳ khó khăn”.」"
# 【ふかみ】
# display as 深美
# JP: 「えええっ！」
1864 = "「Hảảả!」"
# monologue
# JP: 思わず声が飛び出しちゃって、\n凪ちゃんがびっくりした顔になる。
2999 = "Mình bất giác thốt lên, làm Nagi giật mình ngạc nhiên."
# monologue
# JP: だけど、聞かないでいられない。\nだって、だって、だって凪ちゃんっ――
2672 = "Nhưng mà, mình không thể không hỏi được. Bởi vì, bởi vì, bởi vì Nagi——"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、こんなに凄いのに！\n全国って、そんなに、そこまで物凄いんですか！？」
2185 = "「Nagi giỏi đến thế này cơ mà! Giải toàn quốc, lại ghê gớm, khủng khiếp đến mức đó sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、相手どうこうという話ではない。\nこの竹[やぶ]藪で、木刀で勝負をするのなら――」
1845 = "「Không, vấn đề không phải ở đối thủ. Nếu đấu bằng kiếm gỗ trong bụi tre này thì——」"
# monologue
# JP: 双鉄おにいさんが足下をみて、竹ヤブをみて、\nそれから、凪ちゃんをじっと見る。
3229 = "Anh Soutetsu nhìn xuống chân, nhìn quanh bụi tre, rồi nhìn chằm chằm vào Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「――僕で恐らく、十戦に一勝拾えるかどうか。\n初等部の女子で凪に勝てる者も、まずいなかろう」
1475 = "「——Anh e là, mười trận họa may anh mới thắng được một. Nữ sinh cấp Tiểu học chắc cũng chẳng ai đánh bại được Nagi đâu.」"
# 【凪】
# display as 凪
# JP: 「まっことばい！？」
2373 = "「Thật hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「元からの身体能力と運動センスが、\n投炭と、くま川下りと修行とで、極めて高く[れんま,1]錬磨された」
1893 = "「Khả năng thể chất và khiếu vận động bẩm sinh của em, đã được rèn giũa cực kỳ cao độ qua việc xúc than, chèo thuyền trên sông Kuma và tu luyện.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2070 = "「啊」" 
# monologue
# JP: そうなんだって、すごく思う。\n投炭がパワー。くま川くだりがバランス。
3003 = "Mình cũng nghĩ đúng là như vậy. Xúc than rèn sức mạnh. Chèo thuyền rèn thăng bằng."
# monologue
# JP: それで、この竹藪の修行で、きっと\nテクニックとスピードだって磨かれてる。
3123 = "Và qua việc tu luyện trong bụi tre này, chắc chắn kỹ thuật và tốc độ cũng được mài giũa."
# 【双鉄】
# display as 雙鐵
# JP: 「お世辞抜きで、凪は強い。バイ捨流を使えるのなら、\n恐らく、竹藪でなく道場であっても、全国で戦えよう」
2179 = "「Không hề nói nịnh đâu, Nagi rất mạnh. Nếu có thể sử dụng Thể Xá Lưu, có lẽ dù không phải trong bụi tre mà là ở võ đường, em cũng đủ sức thi đấu toàn quốc.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんとほめられたら、\n凪さま調子にのっちゃうばーーーい……って、んぅ？」
2411 = "「Được khen như vậy, Nagi-sama sẽ đắc ý lắm đó nhaaaa......Ơ, hửm?」"
# 【ふかみ】
# display as 深美
# JP: 「バイ捨流を使えるのなら――って」
1491 = "「Nếu có thể sử dụng Thể Xá Lưu——sao.」"
# monologue
# JP: 聞き間違いじゃないよね？　って、\n凪ちゃんを見たら、目と目が合う。
3012 = "Không nghe nhầm đúng không? Mình quay sang nhìn Nagi, hai đứa chạm mắt nhau."
# monologue
# JP: ふたり一緒にくるんって、\n双鉄おにいさんに目を向ける。
3088 = "Rồi cả hai cùng đồng loạt, hướng ánh mắt về phía anh Soutetsu."
# 【双鉄】
# display as 雙鐵
# JP: 「使えんのだ、大会でバイ捨流は。初等部の出場選手は、\nすべて中段、[せいがん,1]正眼の構えで戦わねばならんゆえ」
2153 = "「Không thể sử dụng Thể Xá Lưu trong đại hội được. Vì các tuyển thủ tham gia cấp Tiểu học, tất cả đều phải chiến đấu bằng tư thế Trung Đoạn Chính Nhãn.」"
# 【凪】
# display as 凪
# JP: 「えええっ！？」
1865 = "「Hảảả!?」"
# 【ふかみ】
# display as 深美
# JP: 「せいがん？　って――」
2313 = "「Chính Nhãn? Là sao——」"
# 【双鉄】
# display as 雙鐵
# JP: 「今見せよう」
2416 = "「Để anh cho xem.」"
# monologue
# JP: 双鉄おにいさんが、もってた袋からなにかを取り出す。\nあ――これって、剣道で使う――
3225 = "Anh Soutetsu lấy ra thứ gì đó từ trong chiếc túi mang theo. A——đây là thứ dùng trong kiếm đạo——"
# 【凪】
# display as 凪
# JP: 「[しない,1]竹刀ばい！」
2385 = "「Kiếm tre!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕との稽古は、大会に備え竹刀で行ってもらう。\n大会ではもちろん、竹刀を用いるのだからな」
2333 = "「Ừm. Để chuẩn bị cho đại hội, em sẽ dùng kiếm tre để luyện tập với anh. Vì trong đại hội, đương nhiên là phải dùng kiếm tre mà.」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
2375 = "「Em hiểu rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪の分も持ってきてある。\n正眼に構えてみろ」
2255 = "「Anh có mang theo phần của Nagi đây. Thử thủ thế Chính Nhãn xem nào.」"
# 【凪】
# display as 凪
# JP: 「構えるばい！！」
# 2166 = "「好咧！！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2112 = "「嗯」" 
# monologue
# JP: （すっ――）
3274 = "（Vút——）"
# 【ふかみ】
# display as 深美
# JP: 「わ」
2037 = "「Oa.」"
# monologue
# JP: 正眼と、正眼。双鉄おにいさんと凪ちゃんと。\n真っ正面から向かい合って、竹刀、構え合ってる。
3224 = "Chính Nhãn đối đầu Chính Nhãn. Anh Soutetsu và Nagi. Hai người đối mặt trực diện, cùng giương kiếm tre thủ thế."
# monologue
# JP: すごい――ピシッて決まっててかっこいい。\n見てたら、思う。双鉄おにいさんも、強いんだな、って。
2689 = "Tuyệt quá——tư thế thật vững chãi và oai phong. Nhìn hai người, mình thầm nghĩ. Anh Soutetsu cũng mạnh thật đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……良いな。きちんとした構えだ。\n本当に良い師にめぐまれているのだな」
1501 = "「......Tốt lắm. Tư thế rất chuẩn xác. Em thực sự đã may mắn có được một người thầy tốt đấy.」"
# 【凪】
# display as 凪
# JP: 「[せいがん,1]正眼の構えもバイ捨流の中にはあるけんね！\nバイ捨流ば！　[いっとう,1]壱刀流の流れやけん」
2483 = "「Tư thế Chính Nhãn cũng có trong Thể Xá Lưu mà! Vì Thể Xá Lưu! Là một nhánh của Nhất Đao Lưu đó.」"
# 【ふかみ】
# display as 深美
# JP: 「[いっとう,1]壱刀流って――あの、幕末もののビーエ――\nこほんっ！　じ、時代劇とかでよくでてくるやつ？」
1820 = "「Nhất Đao Lưu á——là cái hay xuất hiện trong mấy bộ BL thời Mạc mạt—— Khụ khụ! Là, là cái hay xuất hiện trong phim cổ trang ấy hả?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　壱刀流からバイ捨流ば産まれて、\nそのバイ捨流からまた産まれたのが、[じげん,1]次元流ばい！！」
2280 = "「Đúng vậy! Thể Xá Lưu bắt nguồn từ Nhất Đao Lưu, rồi từ Thể Xá Lưu lại sinh ra Thứ Nguyên Lưu đó!!」"
# monologue
# JP: 次元流！　知ってる！！\nわたし、薄い本で良く勉強してる！！
3109 = "Thứ Nguyên Lưu! Mình biết!! Mình hay học hỏi từ mấy cuốn doujinshi lắm!!"
# 【ふかみ】
# display as 深美
# JP: 「一太刀で相手を倒す、っていうのに\nすべてをかける剣術だよね？　[じげん,1]次元流」
2377 = "「Đó là môn kiếm thuật đặt cược tất cả vào việc hạ gục đối thủ bằng một nhát chém duy nhất phải không? Thứ Nguyên Lưu ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、ふかみも存外詳しいのだな」
2098 = "「Hô, không ngờ Fukami cũng rành nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……あはは。です。はぅ」
2068 = "「A......Ahaha. Vâng ạ. Hảu.」"
# monologue
# JP: いけない。\nどこから勉強してるのかとか確かめられたら困っちゃう！
2636 = "Không được. Nếu bị gặng hỏi học từ đâu thì phiền lắm!"
# monologue
# JP: 話、早く変えないと――\nっていうか、そうだ！
2981 = "Phải mau đổi chủ đề thôi—— À, đúng rồi!"
# 【ふかみ】
# display as 深美
# JP: 「なんで、そんなに――ええと、剣術、\nいろいろ産まれたりとかしたんです？」
2457 = "「Tại sao lại——ưm, có nhiều loại kiếm thuật được sinh ra như vậy ạ?」"
# 【凪】
# display as 凪
# JP: 「壱刀流ば、剣だけの剣術で実戦的じゃなかとばい！\nやけん、[じっせんわざ,2]実戦技を組み込んで産まれたのがバイ捨流ばい」
1822 = "「Nhất Đao Lưu chỉ dùng kiếm nên không mang tính thực chiến! Vì vậy, người ta đã kết hợp thêm các kỹ năng thực chiến để tạo ra Thể Xá Lưu đó.」"
# 【ふかみ】
# display as 深美
# JP: 「じっせんわざって？」
2178 = "「Kỹ năng thực chiến là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「主に蹴り、手刀など、体術の類いだと聞くが」
2270 = "「Anh nghe nói chủ yếu là các loại thể thuật như đá, chặt tay các kiểu.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　バイ捨流ば、\n勝つためなら刀以外も積極的に使ってく剣術ばい！！」
2279 = "「Đúng vậy! Thể Xá Lưu là môn kiếm thuật tích cực sử dụng cả những thứ khác ngoài đao kiếm để giành chiến thắng!!」"
# 【ふかみ】
# display as 深美
# JP: 「じゃ、凪ちゃんもそういうの出来るの？」
2456 = "「Vậy Nagi cũng làm được mấy cái đó hả?」"
# 【凪】
# display as 凪
# JP: 「できるとよ！　凪さま、投げ技得意ばい！！」
2298 = "「Được chứ! Nagi-sama cực kỳ rành mấy đòn vật luôn nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと。念のためだが、大会では体術の類いは\n全面的に禁止だぞ。それと、突きもだ。使ってはならん」
2087 = "「À. Đề phòng thôi, nhưng trong đại hội, các loại thể thuật bị cấm hoàn toàn đấy. Cả đâm nữa. Không được phép dùng đâu.」"
# 【凪】
# display as 凪
# JP: 「ええええええ！？」
2011 = "「Hảảảả!?」"
# monologue
# JP: 凪ちゃん、びっくりしてわたわたしちゃう。
2897 = "Nagi giật mình, cuống cuồng cả lên."
# 【凪】
# display as 凪
# JP: 「体術禁止はしっとったけど、突きもいけんの！？」
2024 = "「Cấm thể thuật thì em biết, nhưng cả đâm cũng không được luôn hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。忠等部以下では、\nケガの危険が大きいということで、全面禁止だ」
2331 = "「Ừm. Đối với cấp Trung học cơ sở trở xuống, vì nguy cơ chấn thương cao nên bị cấm hoàn toàn.」"
# 【凪】
# display as 凪
# JP: 「はう――めちゃくちゃ不自由ばい！」
2063 = "「Hau——thế thì gò bó quá đi mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「剣術ではなく剣道だからな。\n手段を選ばず、相手を倒すことが目的ではない」
2348 = "「Vì đây là kiếm đạo chứ không phải kiếm thuật mà. Mục đích không phải là hạ gục đối thủ bằng mọi giá.」"
# 【凪】
# display as 凪
# JP: 「そいばわかっとーけど――\nあうう、竹刀も軽すぎてうわずりそうばい！」
2032 = "「Cái đó thì em biết, nhưng mà—— A ư ư, kiếm tre cũng nhẹ quá làm em thấy chông chênh quá!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこを馴染ませるために、稽古するのだ」
2203 = "「Chính vì để làm quen với điều đó nên mới cần luyện tập.」"
# 【ふかみ】
# display as 深美
# JP: 「剣道と……剣術」
1969 = "「Kiếm đạo và......kiếm thuật.」"
# monologue
# JP: あんまり深く考えないで、なんとなく聞き流してたけど、\n今の聞いてたら、少し、なんだかわかった気がする。
3015 = "Mình không suy nghĩ sâu xa lắm, chỉ nghe loáng thoáng thôi, nhưng nghe xong những lời vừa rồi, mình cảm giác như đã hiểu ra đôi chút."
# 【ふかみ】
# display as 深美
# JP: 「剣術は、相手を倒すための……きっと、戦いの方法で。\nだから、剣道とは全然ちがうんだ」
1968 = "「Kiếm thuật là để hạ gục đối thủ......chắc chắn là một phương pháp chiến đấu. Nên nó hoàn toàn khác với kiếm đạo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。剣術は、剣を操る術を極めることを目指し、\n剣道は、剣を通じて人の道を修めることを目指す物かと」
2289 = "「Đúng vậy. Kiếm thuật hướng tới việc đạt đến đỉnh cao của kỹ thuật điều khiển kiếm, còn kiếm đạo hướng tới việc tu dưỡng đạo làm người thông qua thanh kiếm.」"
# 【ふかみ】
# display as 深美
# JP: 「人の、道……だから、ルールを厳しく、より安全に、\nって感じなんですね、きっと」
1901 = "「Đạo làm người......vậy nên luật lệ mới nghiêm ngặt và an toàn hơn, chắc là vậy rồi.」"
# 【凪】
# display as 凪
# JP: 「ううう～……なんだかひどくきゅうくつばってん、\nこれも修行と思うばい！」
2109 = "「Ư ư ư~......Cảm giác gò bó quá đi mất, nhưng đành coi đây cũng là tu luyện vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2290 = "「Đúng thế.」"
# monologue
# JP: 双鉄おにいさんが、こっくり頷く。\n口元、さっきより優しい感じにほころんでる。
3235 = "Anh Soutetsu gật đầu cái rụp. Khóe miệng anh ấy nở một nụ cười dịu dàng hơn lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくは、これこそが修行――\n凪のお師匠さんが、凪に課した修行なのだろう」
1851 = "「Có lẽ, đây mới chính là tu luyện—— Là bài tập tu luyện mà sư phụ của Nagi đã giao cho em.」"
# 【凪】
# display as 凪
# JP: 「！」
# 2081 = "「啊！」" 
# monologue
# JP: 凪ちゃん、目が変わった。
2951 = "Ánh mắt Nagi thay đổi."
# monologue
# JP: まっすぐまっすぐ――\n刺さりそうなほど双鉄おにいさんのこと見てる。
2864 = "Nhìn thẳng, thật thẳng—— Cậu ấy nhìn anh Soutetsu chằm chằm như muốn xuyên thấu vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「[たい]体は変わらずとも、[ぎ]技は著しく縛られる。\nその中で、どれだけ[しん]心の強さを見せられるか」
2478 = "「Dù [Thể] không đổi, nhưng [Kỹ] lại bị trói buộc đáng kể. Trong hoàn cảnh đó, em có thể thể hiện sức mạnh của [Tâm] đến mức nào.」"
# 【凪】
# display as 凪
# JP: 「心。技。体」
2228 = "「Tâm. Kỹ. Thể.」"
# 【ふかみ】
# display as 深美
# JP: 「！」
# 2040 = "「哇！」" 
# monologue
# JP: 凪ちゃん……\nいつもの無邪気な凪ちゃんじゃない。
2959 = "Nagi...... Không phải là Nagi ngây thơ thường ngày nữa."
# monologue
# JP: だからといって、動物みたいな凪ちゃんでもない。
2669 = "Nhưng cũng không phải là Nagi hoang dã như động vật."
# 【凪】
# display as 凪
# JP: 「バイ捨流ば縛られた中でも、自分の剣ばふるって勝つ。\n[こころ]心ばきちんと保てれば――そいば、出来ると？」
2207 = "「Ngay cả khi Thể Xá Lưu bị trói buộc, vẫn vung thanh kiếm của mình để giành chiến thắng. Chỉ cần giữ vững [Tâm]——thì có thể làm được sao?」"
# monologue
# JP: いつもの凪ちゃんより大人の凪ちゃん。\nわたしの知らない、凪ちゃんがいる。
2920 = "Một Nagi trưởng thành hơn Nagi thường ngày. Một Nagi mà mình chưa từng biết đang hiện diện ở đây."
# 【双鉄】
# display as 雙鐵
# JP: 「勝敗は[へいか,1]兵家の[つね]常だ。今の凪の最高を示しても、\nなお勝ちには及ばぬ――という結果もあるやもしれん」
1974 = "「Thắng bại là chuyện thường tình của binh gia. Dù em có thể hiện hết khả năng hiện tại của mình, nhưng vẫn không thể với tới chiến thắng——kết quả đó cũng có thể xảy ra.」"
# 【凪】
# display as 凪
# JP: 「――うん」
1472 = "「——Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、まずは凪の最高を示すことだけを考えろ。\nルールの中で。その手伝いなら、僕にも出来る」
2258 = "「Vì vậy, trước mắt hãy chỉ nghĩ đến việc thể hiện hết khả năng của mình thôi. Trong khuôn khổ luật lệ. Nếu là việc giúp đỡ đó, anh cũng làm được.」"
# 【凪】
# display as 凪
# JP: 「はい」
2164 = "「Vâng.」"
# monologue
# JP: すうって、凪ちゃんが息を吸う。\n吸って静かに目を閉じて、ゆっくり息をまた吐いて――
2937 = "Nagi hít một hơi thật sâu. Hít vào, lặng lẽ nhắm mắt lại, rồi từ từ thở ra——"
# 【凪】
# display as 凪
# JP: 「――お願いします」
1477 = "「——Trăm sự nhờ anh.」"
# monologue
# JP: 目を開く。
2869 = "Mở mắt ra."
# monologue
# JP: 凪ちゃんが、双鉄おにいさんに頭を下げる。\n深く、深く。腰をぴしっと、直角にして。
3089 = "Nagi cúi đầu trước anh Soutetsu. Thật sâu, thật sâu. Lưng gập hẳn thành một góc vuông."
# 【凪】
# display as 凪
# JP: 「うちに、稽古ばつけてください」
2415 = "「Xin hãy cùng em luyện tập.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2273 = "「Đã rõ.」"
# monologue
# JP: （ああ――いっつも一緒にいるから……\nだから、わたし、気がつかなかった）
3290 = "（A——vì lúc nào cũng ở bên nhau...... Nên mình đã không nhận ra.）"
# monologue
# JP: 凪ちゃんが、こんなに大人になっていること。
2776 = "Rằng Nagi đã trở nên trưởng thành đến thế này."
# monologue
# JP: わたしの知らない凪ちゃんで、\n双鉄おにいさんと、対等にお話してること。
2855 = "Một Nagi mà mình không hề biết, đang nói chuyện ngang hàng với anh Soutetsu."
# monologue
# JP: （大人の凪ちゃん――\nきっとこれが、双鉄おにいさんのいってた成長なんだ）
3297 = "（Nagi trưởng thành—— Chắc chắn đây chính là sự trưởng thành mà anh Soutetsu đã nói.）"
# monologue
# JP: わたしは、どうなのかなって思う。\n成長、凪ちゃんほどに出来てるのかなって。
3142 = "Mình tự hỏi, bản thân thì sao nhỉ. Liệu mình có trưởng thành được như Nagi không."
# monologue
# JP: 身長ばっかり大きいけど――\nこころの中身は、どうなんだろう……
3111 = "Chỉ được mỗi cái cao to—— Nhưng sâu thẳm trong tim thì thế nào nhỉ......"
# 【凪】
# display as 凪
# JP: 「……かみちゃん？　ふかみちゃーん！！」
1511 = "「......kami? Fukami ơiii!!」"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！！？」
2083 = "「Hiau!!?」"
# 【凪】
# display as 凪
# JP: 「どぎゃんしたと？\n今の話、聞こえとったと？」
1889 = "「Cậu sao vậy? Có nghe thấy chuyện lúc nãy không đó?」"
# 【ふかみ】
# display as 深美
# JP: 「え？　あ――ごめん。なぁに？」
2057 = "「Hả? A——xin lỗi nha. Chuyện gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これから凪と稽古をするのだが――」
2248 = "「Ừm. Từ giờ tôi sẽ luyện tập với Nagi, nhưng mà——」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんにもここに来てもらっとったの、\n安全対策のためだったばい」
2193 = "「Tớ nhờ Fukami-chan đến đây cũng là vì biện pháp an toàn đó nha.」"
# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2112 = "「嗯」" 
# monologue
# JP: 今日の凪ちゃんを見るまえだったら、\n“安全対策？”って、きっとなってた。
2880 = "Nếu chưa nhìn thấy Nagi-chan của ngày hôm nay, chắc chắn tôi đã thắc mắc \"Biện pháp an toàn á?\"."
# monologue
# JP: けど、今ならわかる。
2674 = "Nhưng bây giờ thì tôi đã hiểu."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんと、双鉄おにいさん。\nふたりともケガしたりしちゃったときのため、だよね」
2189 = "「Là để đề phòng trường hợp cả Nagi-chan và anh Soutetsu đều bị thương, đúng không ạ?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　ばってん、今日は、構えと足さばきと、\n素振りしか、稽古せんっていう話やけん」
2283 = "「Đúng rồi đó! Nhưng mà, hôm nay chúng ta chỉ luyện tập tư thế, bước chân và vung kiếm thôi á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もしもふかみが退屈するようなら」
1885 = "「Nếu như Fukami thấy chán thì——」"
# 【ふかみ】
# display as 深美
# JP: 「しません。退屈なんて、絶対」
1836 = "「Không đâu ạ. Tuyệt đối không chán đâu ạ.」"
# monologue
# JP: だって、凪ちゃんの大舞台への準備なんだから。
3199 = "Bởi vì, đây là bước chuẩn bị cho sân khấu lớn của Nagi-chan mà."
# monologue
# JP: どんなに小さなことだって、\nわたしもできるお手伝い、絶対あるって思うから。
3083 = "Dù là việc nhỏ nhặt đến đâu, tôi tin chắc chắn cũng có việc tôi có thể giúp được."
# 【ふかみ】
# display as 深美
# JP: 「けど、お稽古が長くなるようなら――\nナビちゃんに乗せてもらってもいいですか？」
1842 = "「Nhưng nếu buổi tập kéo dài—— Cho em đi nhờ Navi được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はかまわん。\n――ナビも、喜んでといっている」
2243 = "「Tôi không phiền đâu. ——Navi cũng nói là rất sẵn lòng đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、いったん、わたし、おうちに帰って、\nすぐにまた戻ってきます」
2463 = "「Vậy thì, em sẽ về nhà một chuyến, rồi quay lại ngay ạ.」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！　気をつけて！」
2165 = "「Biết rồi nha! Cậu đi cẩn thận nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「うん。凪ちゃんこそ、気をつけて、がんばってね！」
2115 = "「Ừm. Nagi-chan cũng cẩn thận và cố lên nhé!」"
# 【凪】
# display as 凪
# JP: 「がんばるとばーい！」
2026 = "「Tớ sẽ cố gắng hết sức nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、凪。まずは礼からはじめよう。\n『お願いします』」
2462 = "「Vậy thì, Nagi. Chúng ta bắt đầu từ việc chào hỏi nhé. 『Xin chỉ giáo』」"
# 【凪】
# display as 凪
# JP: 「お願いします！」
2414 = "「Xin chỉ giáo!」"
# monologue
# JP: わたしに出来るお手伝い。\n救急箱と、レモンの蜂蜜づけと、スポーツドリンク。
3026 = "Việc mà tôi có thể giúp. Hộp cứu thương, chanh ngâm mật ong, và nước uống thể thao."
# monologue
# JP: それから、それから――
3211 = "Và sau đó, sau đó——"
# monologue
# JP: （きっとある。もっと、お手伝いできること。\n凪ちゃんのために、双鉄おにいさんのために――）
3302 = "（Chắc chắn vẫn còn. Những việc mình có thể giúp thêm. Vì Nagi-chan, vì anh Soutetsu——）"
# monologue
# JP: そうして、きっと。\n私自身が、いまよりもっと、素敵な大人になるために。
2655 = "Và chắc chắn, Cũng là để bản thân mình trở thành một người lớn tuyệt vời hơn bây giờ."
# 【凪】
# display as 凪
# JP: 「チェーストーーーーっ！！！」
# 2105 = "「喝啊！！！」" 
# monologue
# JP: （バッ！）　（バッ！）　（バッ！）
3283 = "（Phất!） （Phất!） （Phất!）"
# monologue
# JP: 旗っ！\n白、白、白っ！！
2631 = "Cờ kìa! Trắng, trắng, trắng!!"
# 【ふかみ】
# display as 深美
# JP: 「やったぁ凪ちゃん！」
2158 = "「Làm tốt lắm Nagi-chan!」"
# 【双鉄】
# display as 雙鐵
# JP: 「やや[かつ]担いだが、あの[だとつ,1]打突では旗をあげざるを得んな。\n[ざんしん,1]残心も気迫に満ち満ちていた」
2479 = "「Dù tư thế vác kiếm hơi lệch, nhưng đòn đánh đó thì không thể không giương cờ được. Tàn tâm cũng tràn đầy khí thế.」"
# monologue
# JP: 専門用語はわからないけど、\n凪ちゃんが綺麗だったの、わたしにもすごくわかる！
3220 = "Dù không hiểu các thuật ngữ chuyên môn, nhưng tôi cũng thấy rõ Nagi-chan đánh rất đẹp mắt!"
# monologue
# JP: 線に戻って、お辞儀して。\n凪ちゃん、こっちに戻ってくる！！
2916 = "Quay lại vạch xuất phát, cúi chào. Nagi-chan đang chạy về phía này!!"
# 【凪】
# display as 凪
# JP: 「ぶはぁ！　面ばかぶるの慣れんばい！\n暑くてくさくて、くさくてくさくてたまらんばーい！」
2123 = "「Phù ha! Tớ không quen đội mũ bảo hộ chút nào á! Vừa nóng vừa hôi, hôi không chịu nổi luôn nè!」"
# 【ふかみ】
# display as 深美
# JP: 「かっこよかったよ凪ちゃん！\nいま汗ふくね！」
2225 = "「Cậu ngầu lắm đó Nagi-chan! Để tớ lau mồ hôi cho nhé!」"
# 【凪】
# display as 凪
# JP: 「そんなん、自分でふけるけーん」
2034 = "「Mấy việc đó tớ tự lau được mà~」"
# 【ふかみ】
# display as 深美
# JP: 「いいからいいから、座って座って！\nあ、レモンの蜂蜜づけもドリンクもあるよ」
2168 = "「Không sao không sao, cậu cứ ngồi xuống đi! À, tớ có chuẩn bị chanh ngâm mật ong với nước uống đây.」"
# 【凪】
# display as 凪
# JP: 「なんだかいたれりつくせりばい」
2367 = "「Cậu chu đáo quá đi á.」"
# monologue
# JP: レモンをつまんでお口に入れて、\n凪ちゃんの目が、スタンドを探す。
