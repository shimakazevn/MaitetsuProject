2130 = "「回到起點加賽，直到某一方拿分為止」" 

# 【ふかみ】
# display as 深美
# JP: 「なら――」
2447 = "「這樣的話——」" 

# monologue
# JP: このまま焦らず、延長戦を待った方がいい気がする。
2992 = "感覺不急不躁等到加賽比較好。" 

