3175 = "變得一絲不苟、精明幹練，是我最喜歡的神情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪の師匠が、大会の優勝を修行の課題とした理由が、\n僕にも、いくらかはわかった気がした」
2247 = "「我似乎明白了，你師父將大賽奪冠作為修行課題的理由」" 

# 【凪】
# display as 凪
# JP: 「理由！　あるなら知りたかとばい！！」
1862 = "「什麼理由！　咱也想知道咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の想像に過ぎんがな。\n恐らくは――“優勝は極めてむつかしい”からだ」
2444 = "「這只是我的推測而已，也許是因為“奪冠極為困難”吧」" 

# 【ふかみ】
# display as 深美
# JP: 「えええっ！」
1864 = "「什麼！」" 

# monologue
# JP: 思わず声が飛び出しちゃって、\n凪ちゃんがびっくりした顔になる。
2999 = "我不禁叫出聲，小凪被我嚇了一跳。" 

# monologue
# JP: だけど、聞かないでいられない。\nだって、だって、だって凪ちゃんっ――
2672 = "但我實在掩飾不住自己的疑問，因為……因為小凪她——" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、こんなに凄いのに！\n全国って、そんなに、そこまで物凄いんですか！？」
2185 = "「小凪都已經這麼厲害了！全國大賽有那麼誇張嗎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、相手どうこうという話ではない。\nこの竹[やぶ]藪で、木刀で勝負をするのなら――」
1845 = "「不，問題不在於對手。如果是在這片竹林裡，以木刀跟凪決勝負——」" 

# monologue
# JP: 双鉄おにいさんが足下をみて、竹ヤブをみて、\nそれから、凪ちゃんをじっと見る。
3229 = "雙鐵哥哥看了看腳下的土地以及周圍的竹林，然後轉頭凝視著小凪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――僕で恐らく、十戦に一勝拾えるかどうか。\n初等部の女子で凪に勝てる者も、まずいなかろう」
1475 = "「——我恐怕是十戰九敗，小學組的女生面對你更是完全沒有勝算吧」" 

# 【凪】
# display as 凪
# JP: 「まっことばい！？」
2373 = "「真的嗎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「元からの身体能力と運動センスが、\n投炭と、くま川下りと修行とで、極めて高く[れんま,1]錬磨された」
1893 = "「你的身體素質與運動能力，都在加煤、隈河漂流和修行的過程中得到了極大的磨練」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2070 = "「啊」" 

# monologue
# JP: そうなんだって、すごく思う。\n投炭がパワー。くま川くだりがバランス。
3003 = "我也深以為然。加煤鍛鍊力量，隈河漂流增強平衡。" 

# monologue
# JP: それで、この竹藪の修行で、きっと\nテクニックとスピードだって磨かれてる。
3123 = "竹林內的修行也一定提高了小凪的技巧與速度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お世辞抜きで、凪は強い。バイ捨流を使えるのなら、\n恐らく、竹藪でなく道場であっても、全国で戦えよう」
2179 = "「實話實說，你很強。如果能用體舍流，就算是在道場內，你也有與全國高手一戰的實力」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんとほめられたら、\n凪さま調子にのっちゃうばーーーい……って、んぅ？」
2411 = "「誇得這麼狠，咱都要得意忘形咧……什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「バイ捨流を使えるのなら――って」
1491 = "「“如果”能用體舍流……」" 

# monologue
# JP: 聞き間違いじゃないよね？　って、\n凪ちゃんを見たら、目と目が合う。
3012 = "我和小凪面面相覷，確認剛才沒有聽錯。" 

# monologue
# JP: ふたり一緒にくるんって、\n双鉄おにいさんに目を向ける。
3088 = "然後又同時看向雙鐵哥哥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「使えんのだ、大会でバイ捨流は。初等部の出場選手は、\nすべて中段、[せいがん,1]正眼の構えで戦わねばならんゆえ」
2153 = "「大賽中不能使用體舍流。因為小學組的出場選手，都必須使用中段正眼架勢」" 

# 【凪】
# display as 凪
# JP: 「えええっ！？」
1865 = "「什麼！？」" 

# 【ふかみ】
# display as 深美
# JP: 「せいがん？　って――」
2313 = "「正眼？　那是什麼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今見せよう」
2416 = "「讓你見識一下吧」" 

# monologue
# JP: 双鉄おにいさんが、もってた袋からなにかを取り出す。\nあ――これって、剣道で使う――
3225 = "雙鐵哥哥從袋子裡取出某樣東西。啊，這是用在劍道上的——" 

# 【凪】
# display as 凪
# JP: 「[しない,1]竹刀ばい！」
2385 = "「竹刀！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕との稽古は、大会に備え竹刀で行ってもらう。\n大会ではもちろん、竹刀を用いるのだからな」
2333 = "「沒錯，比賽時自然是用竹刀的，所以我們練習時也要用竹刀備戰」" 

# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
2375 = "「知道咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪の分も持ってきてある。\n正眼に構えてみろ」
2255 = "「我還幫你帶了一把竹刀，擺出正眼的架勢看看」" 

# 【凪】
# display as 凪
# JP: 「構えるばい！！」
# 2166 = "「好咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2112 = "「嗯」" 

# monologue
# JP: （すっ――）
3274 = "（呼――）" 

# 【ふかみ】
# display as 深美
# JP: 「わ」
2037 = "「哇」" 

# monologue
# JP: 正眼と、正眼。双鉄おにいさんと凪ちゃんと。\n真っ正面から向かい合って、竹刀、構え合ってる。
3224 = "雙鐵哥哥和小凪分別擺出正眼的架勢，以竹刀正面相對。" 

# monologue
# JP: すごい――ピシッて決まっててかっこいい。\n見てたら、思う。双鉄おにいさんも、強いんだな、って。
2689 = "兩人持劍的姿勢有模有樣，非常帥氣。不由得感受到雙鐵哥哥也好厲害。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……良いな。きちんとした構えだ。\n本当に良い師にめぐまれているのだな」
1501 = "「……不錯，架勢很端正。你真是有個好老師啊」" 

# 【凪】
# display as 凪
# JP: 「[せいがん,1]正眼の構えもバイ捨流の中にはあるけんね！\nバイ捨流ば！　[いっとう,1]壱刀流の流れやけん」
2483 = "「體舍流裡也有正眼！畢竟是從一刀流發展出來的流派嘛」" 

# 【ふかみ】
# display as 深美
# JP: 「[いっとう,1]壱刀流って――あの、幕末もののビーエ――\nこほんっ！　じ、時代劇とかでよくでてくるやつ？」
1820 = "「一刀流……我在幕末類的ＢＬ……咳咳！就、就是經常出現在時代劇裡的那個嗎？」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　壱刀流からバイ捨流ば産まれて、\nそのバイ捨流からまた産まれたのが、[じげん,1]次元流ばい！！」
2280 = "「是咧！　體舍流源自一刀流，後續還演變出了示現流咧！！」" 

# monologue
# JP: 次元流！　知ってる！！\nわたし、薄い本で良く勉強してる！！
3109 = "示現流！　這個我知道！！在小本子裡沒少見識！！" 

# 【ふかみ】
# display as 深美
# JP: 「一太刀で相手を倒す、っていうのに\nすべてをかける剣術だよね？　[じげん,1]次元流」
2377 = "「示現流就是在第一招傾盡全力，一擊斃敵的劍術流派，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、ふかみも存外詳しいのだな」
2098 = "「喔，你還挺懂啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……あはは。です。はぅ」
2068 = "「啊……啊哈哈，嗯，還好啦」" 

# monologue
# JP: いけない。\nどこから勉強してるのかとか確かめられたら困っちゃう！
2636 = "不行，要是被追問從哪學來這些知識就麻煩了！" 

# monologue
# JP: 話、早く変えないと――\nっていうか、そうだ！
2981 = "得趕緊換個話題……對了！" 

# 【ふかみ】
# display as 深美
# JP: 「なんで、そんなに――ええと、剣術、\nいろいろ産まれたりとかしたんです？」
2457 = "「那個……呃……為什麼劍術會發展出那麼多流派呢？」" 

# 【凪】
# display as 凪
# JP: 「壱刀流ば、剣だけの剣術で実戦的じゃなかとばい！\nやけん、[じっせんわざ,2]実戦技を組み込んで産まれたのがバイ捨流ばい」
1822 = "「一刀流是只限於劍的劍術，不夠貼近實戰咧！加入實戰技巧後就誕生了體舍流」" 

# 【ふかみ】
# display as 深美
# JP: 「じっせんわざって？」
2178 = "「實戰技巧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「主に蹴り、手刀など、体術の類いだと聞くが」
2270 = "「據說主要是踢擊、手刀之類的體術」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　バイ捨流ば、\n勝つためなら刀以外も積極的に使ってく剣術ばい！！」
2279 = "「是咧！　體舍流不拘泥於劍術，為了獲勝可以竭盡一切手段！！」" 

# 【ふかみ】
# display as 深美
# JP: 「じゃ、凪ちゃんもそういうの出来るの？」
2456 = "「那你也會體術嗎？」" 

# 【凪】
# display as 凪
# JP: 「できるとよ！　凪さま、投げ技得意ばい！！」
2298 = "「會咧！　本小姐很擅長投技的！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと。念のためだが、大会では体術の類いは\n全面的に禁止だぞ。それと、突きもだ。使ってはならん」
2087 = "「啊，為防萬一提醒你一下，大賽中是完全禁止體術的，而且突刺也不能用」" 

# 【凪】
# display as 凪
# JP: 「ええええええ！？」
2011 = "「咦咦咦咦咦咦！？」" 

# monologue
# JP: 凪ちゃん、びっくりしてわたわたしちゃう。
2897 = "小凪一下子就慌了神。" 

# 【凪】
# display as 凪
# JP: 「体術禁止はしっとったけど、突きもいけんの！？」
2024 = "「咱倒是知道禁止用體術，可是連突刺都不行嗎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。忠等部以下では、\nケガの危険が大きいということで、全面禁止だ」
2331 = "「沒錯。中等部組以下很容易因此受傷，所以完全禁止使用突刺」" 

# 【凪】
# display as 凪
# JP: 「はう――めちゃくちゃ不自由ばい！」
2063 = "「唔……根本施展不開手腳咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「剣術ではなく剣道だからな。\n手段を選ばず、相手を倒すことが目的ではない」
2348 = "「畢竟這不是劍術大賽，而是劍道大賽啊。不擇手段擊倒對手不是劍道的目的」" 

# 【凪】
# display as 凪
# JP: 「そいばわかっとーけど――\nあうう、竹刀も軽すぎてうわずりそうばい！」
2032 = "「咱知道啦……嗚嗚，竹刀太輕了感覺好飄！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこを馴染ませるために、稽古するのだ」
2203 = "「就是為了習慣這些，所以才需要練習」" 

# 【ふかみ】
# display as 深美
# JP: 「剣道と……剣術」
1969 = "「劍道……和劍術」" 

# monologue
# JP: あんまり深く考えないで、なんとなく聞き流してたけど、\n今の聞いてたら、少し、なんだかわかった気がする。
3015 = "我有一搭沒一搭聽著他們的對話，現在似乎稍稍理解了其中的意義。" 

# 【ふかみ】
# display as 深美
# JP: 「剣術は、相手を倒すための……きっと、戦いの方法で。\nだから、剣道とは全然ちがうんだ」
1968 = "「劍術是為了擊倒對方……也就屬於戰鬥方法吧，所以和劍道完全不同」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。剣術は、剣を操る術を極めることを目指し、\n剣道は、剣を通じて人の道を修めることを目指す物かと」
2289 = "「是啊。劍術的目標是極盡用劍的技術，而劍道是透過劍來修身養性」" 

# 【ふかみ】
# display as 深美
# JP: 「人の、道……だから、ルールを厳しく、より安全に、\nって感じなんですね、きっと」
1901 = "「修身養性……所以才制定嚴格的規則，更加注重安全吧」" 

# 【凪】
# display as 凪
# JP: 「ううう～……なんだかひどくきゅうくつばってん、\nこれも修行と思うばい！」
2109 = "「嗚嗚嗚……真是束手束腳，但這也是修行的一部分！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2290 = "「是啊」" 

# monologue
# JP: 双鉄おにいさんが、こっくり頷く。\n口元、さっきより優しい感じにほころんでる。
3235 = "雙鐵哥哥點了點頭，嘴角勾出溫柔的微笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくは、これこそが修行――\n凪のお師匠さんが、凪に課した修行なのだろう」
1851 = "「也許這才是真正的修行——是你師父留下的課題吧」" 

# 【凪】
# display as 凪
# JP: 「！」
# 2081 = "「啊！」" 

# monologue
# JP: 凪ちゃん、目が変わった。
2951 = "小凪的眼神忽然變了。" 

# monologue
# JP: まっすぐまっすぐ――\n刺さりそうなほど双鉄おにいさんのこと見てる。
2864 = "她用鋒利如劍的目光注視著雙鐵哥哥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[たい]体は変わらずとも、[ぎ]技は著しく縛られる。\nその中で、どれだけ[しん]心の強さを見せられるか」
2478 = "「雖然“體”依然不變，“技”卻受到很大的束縛。這時候就要看你的“心”有多麼強大」" 

# 【凪】
# display as 凪
# JP: 「心。技。体」
2228 = "「心、技、體」" 

# 【ふかみ】
# display as 深美
# JP: 「！」
# 2040 = "「哇！」" 

# monologue
# JP: 凪ちゃん……\nいつもの無邪気な凪ちゃんじゃない。
2959 = "小凪褪去了平時那副天真無邪的模樣。" 

# monologue
# JP: だからといって、動物みたいな凪ちゃんでもない。
2669 = "但也並沒有散發出野生動物一般的氣質。" 

# 【凪】
# display as 凪
# JP: 「バイ捨流ば縛られた中でも、自分の剣ばふるって勝つ。\n[こころ]心ばきちんと保てれば――そいば、出来ると？」
2207 = "「就算體舍流受到禁止，也要憑藉自己的劍獲勝。只要堅守住“心”，咱就能獲勝嗎？」" 

# monologue
# JP: いつもの凪ちゃんより大人の凪ちゃん。\nわたしの知らない、凪ちゃんがいる。
2920 = "小凪展現出了我未曾見過的一面，顯得更加成熟穩重。" 

# 【双鉄】
# display as 雙鐵
# JP: 「勝敗は[へいか,1]兵家の[つね]常だ。今の凪の最高を示しても、\nなお勝ちには及ばぬ――という結果もあるやもしれん」
1974 = "「勝敗乃兵家常事。就算你發揮出了現在的最高水準，也不一定能取勝」" 

# 【凪】
# display as 凪
# JP: 「――うん」
1472 = "「——嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、まずは凪の最高を示すことだけを考えろ。\nルールの中で。その手伝いなら、僕にも出来る」
2258 = "「所以你只需要想辦法在規則範圍內，發揮出自己的最高水準。我也會盡力幫你」" 

# 【凪】
# display as 凪
# JP: 「はい」
2164 = "「好咧」" 

# monologue
# JP: すうって、凪ちゃんが息を吸う。\n吸って静かに目を閉じて、ゆっくり息をまた吐いて――
2937 = "小凪深吸一口氣，然後閉上雙眼緩緩呼出一口氣——" 

# 【凪】
# display as 凪
# JP: 「――お願いします」
1477 = "「——拜託你了」" 

# monologue
# JP: 目を開く。
2869 = "她睜開雙眼。" 

# monologue
# JP: 凪ちゃんが、双鉄おにいさんに頭を下げる。\n深く、深く。腰をぴしっと、直角にして。
3089 = "然後向雙鐵哥哥低下頭，深深一鞠躬。" 

# 【凪】
# display as 凪
# JP: 「うちに、稽古ばつけてください」
2415 = "「請陪咱練習劍道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2273 = "「明白了」" 

# monologue
# JP: （ああ――いっつも一緒にいるから……\nだから、わたし、気がつかなかった）
3290 = "（因為我們總是待在一起，所以才沒能察覺到）" 

# monologue
# JP: 凪ちゃんが、こんなに大人になっていること。
