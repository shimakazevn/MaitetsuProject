1962 = "「Hiện tại thì cũng tạm ổn, nhưng ở hiệp thứ hai vừa nãy, thói quen của phái Taisha đã bộc lộ. Em đã vác kiếm lên vai phải khi vung đấy.」"
# 【凪】
# display as 凪
# JP: 「ああ――頭の上に振りかぶらんと、\n剣道では良くなかとよね」
2125 = "「A——Phải vung kiếm qua đầu, trong Kendo như vậy mới đúng á.」"
# 【双鉄】
# display as 雙鐵
