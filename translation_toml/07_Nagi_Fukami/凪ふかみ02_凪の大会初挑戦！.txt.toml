2030 = "「Chuyện đó thì em biết chứ, nhưng cả hai người họ—— Cả chị Paulette và Reina cũng đã huấn luyện em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪」
1923 = "「Nagi.」"
# 【凪】
# display as 凪
# JP: 「ひゃうっ！？」
2045 = "「Hya!?」"
