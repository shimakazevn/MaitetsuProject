2896 = "對手的體力消耗一定比小凪更大，這樣一來就不會再像剛才一樣敏捷地衝到小凪的身旁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　焦るな！！\n焦らなければ、お前のペースだ！！」
1947 = "「凪！　別急！！只要不急躁，比賽節奏就在你的掌控中！！」" 

# 【凪】
# display as 凪
# JP: 「――」
# 1470 = "「——」" 

# monologue
# JP: 返事なんてない。できるわけない。\nけど、ちゃんと、凪ちゃんにも聞こえてるってわかる。
2942 = "小凪當然沒有餘力回答，但她一定聽到了雙鐵哥哥的指點。" 

# monologue
