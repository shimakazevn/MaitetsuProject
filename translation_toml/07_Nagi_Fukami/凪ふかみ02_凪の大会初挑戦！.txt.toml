2134 = "「Cho đến khi tốt nghiệp trung học cơ sở thì luật là như vậy. Chắc họ đánh giá đòn chém chéo có tỷ lệ gây tai nạn cao.」"
# 【凪】
# display as 凪
# JP: 「気をつけるばい。剣道ルールで、ちゃんと勝つばい」
2027 = "「Em sẽ cẩn thận á. Em sẽ thắng đàng hoàng bằng luật Kendo nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その意気だ」
2413 = "「Khí thế lắm.」"
# monologue
# JP: （あ――）
3280 = "（A——）"
# monologue
# JP: 違う。わたし。
2635 = "Không đúng. Mình."
