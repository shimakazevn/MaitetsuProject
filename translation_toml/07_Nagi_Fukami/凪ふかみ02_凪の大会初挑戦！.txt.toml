1942 = "「凪完全不習慣與對手交鍔。對方看穿這一點，提前設下了局」" 

# 【ふかみ】
# display as 深美
# JP: 「狙われると、どうなっちゃう。です。か？」
2184 = "「對方設了局，會很不妙，是嗎？」" 

# monologue
# JP: 凪ちゃん、見るからに嫌がってる。
2934 = "小凪明顯變得煩躁起來。" 

