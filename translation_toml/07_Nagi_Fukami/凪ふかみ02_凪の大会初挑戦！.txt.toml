2429 = "「踏步時從正眼上撩轉為大上段架勢，接著直接擊面。這樣一來就能讓凪的劍法施展出來」" 

# 【ふかみ】
# display as 深美
# JP: 「それなら、反則にもならない、です。よね？」
2446 = "「這樣就不算犯規了，嗯，對吧？」" 

# 【双鉄】
# display as 雙鐵
