# 【ふかみ】
# display as 深美
# JP: 「対策って」
1863 = "「Bắt bài là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「バイ捨流の基本にして究極は右半開からの袈裟懸けだ。\nしかし、それは禁じ手ゆえに、凪の剣筋は制限される」
2482 = "「Căn bản và cũng là tuyệt kỹ của phái Taisha là chém chéo từ tư thế mở nửa người sang phải. Nhưng vì đó là đòn cấm, nên đường kiếm của Nagi bị hạn chế.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2112 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「踏み出しにあわせ、正眼から振りかぶって大上段。\nそのまま止まらずに面打ちならば、凪の剣は活きる」
2429 = "「Kết hợp với bước chân, từ thế Seigan vung kiếm lên Daijodan. Rồi không dừng lại mà đánh thẳng vào mặt thì kiếm của Nagi mới phát huy được.」"
# 【ふかみ】
# display as 深美
# JP: 「それなら、反則にもならない、です。よね？」
2446 = "「Nếu vậy thì, cũng không bị tính là phạm lỗi, đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆえに凪は今大会、\nその剣だけを振るいここまで勝ち進んできた」
2332 = "「Ừm. Do đó ở giải đấu lần này, Nagi chỉ tung ra mỗi đường kiếm đó và tiến sâu đến tận đây.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2081 = "「啊！」" 
# monologue
# JP: だから……見られた。\n見られて――こうやって、対策された。
3032 = "Cho nên... đã bị nhìn thấu. Bị nhìn thấu——và bị bắt bài như thế này."
# 【凪】
# display as 凪
# JP: 「っ――うぬぅぅ～っ」
# 2061 = "「唔——」" 
# 【双鉄】
# display as 雙鐵
# JP: 「振りかぶりに潜り込んでのつばぜり合い――\n一瞬でも迷っては、為せぬことだ」
2403 = "「Lao vào áp sát ngay khi đối phương vung kiếm lên để tạo thế giằng co—— Chỉ cần do dự một khoảnh khắc thôi là không thể làm được.」"
# 【ふかみ】
# display as 深美
# JP: 「――っ」
# 2065 = "「啊——」" 
# monologue
# JP: 本当にそうやってくるってわかってたって、\n凪ちゃんのあの振りかぶったとこに潜り込むとか――
2977 = "Dù biết chắc đối phương sẽ đánh như vậy, nhưng để lao vào ngay lúc Nagi-chan vung kiếm lên thì——"
# monologue
# JP: 怖いし、一瞬でも遅れたらバシってされるし、\nわたしだったら、絶対できない。
3212 = "Rất đáng sợ, chỉ cần chậm một giây thôi là sẽ bị đánh trúng, nếu là tôi, tuyệt đối không thể làm được."
# 【ふかみ】
# display as 深美
# JP: 「相手の子も……すごい、です、ね」
2183 = "「Cô bé đối thủ... cũng giỏi quá, anh nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でなければ、決勝戦まで残れぬさ。\nその上――」
2217 = "「Nếu không thì đã chẳng trụ lại được đến trận chung kết. Hơn nữa——」"
# monologue
# JP: 双鉄おにいさんの目がまた一瞬、\n試合場の向こう、指導者っぽいおじいさんを見る。
3228 = "Ánh mắt anh Soutetsu lại lóe lên một khoảnh khắc, nhìn về phía ông lão có vẻ là huấn luyện viên ở bên kia sân đấu."
# 【双鉄】
# display as 雙鐵
# JP: 「つばぜり合いに、凪はまったく慣れていない。\nそこを見透かされ、狙われたな」
1942 = "「Nagi hoàn toàn không quen với thế giằng co Tsubazeriai. Điểm yếu đó đã bị nhìn thấu và nhắm vào rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「狙われると、どうなっちゃう。です。か？」
2184 = "「Bị nhắm vào thì, sẽ ra sao, ạ?」"
# monologue
# JP: 凪ちゃん、見るからに嫌がってる。
2934 = "Trông Nagi-chan có vẻ rất khó chịu."
# monologue
# JP: 突き飛ばそうと、離そうとして何度も動いて、\nなのに相手は離れてくれない。
3054 = "Cố gắng đẩy ra, cố gắng tách ra không biết bao nhiêu lần, nhưng đối thủ vẫn không chịu buông."
# 【双鉄】
# display as 雙鐵
# JP: 「凪！　焦るなっ！！　荒く動くな！　体力ならお前だ！\nつばぜり合いを、正々堂々、受けて立てっ！」
1945 = "「Nagi! Đừng nôn nóng!! Đừng di chuyển loạn xạ! Thể lực là thế mạnh của em! Hãy đường đường chính chính tiếp nhận thế giằng co này đi!」"
# monologue
# JP: 双鉄おにいさんの大きな声。\nそしたらピタって、凪ちゃんのもぞもぞが収まる。
3234 = "Tiếng hét lớn của anh Soutetsu. Ngay sau đó, sự bồn chồn của Nagi-chan lập tức dừng lại."
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 
# monologue
# JP: さすが、双鉄おにいさん。\nわかった気がする。わたしにも。
3230 = "Quả không hổ danh là anh Soutetsu. Hình như tôi cũng hiểu ra rồi."
# monologue
# JP: 振りほどこうと乱暴に大きく動いたりしたら、\nきっと、そこが隙――相手の狙い目になっちゃうんだ。
2882 = "Nếu cố gắng vung vẫy mạnh bạo để thoát ra, chắc chắn sẽ tạo ra sơ hở——trở thành mục tiêu của đối thủ."
# monologue
# JP: （だから双鉄おにいさんは、\nわざと相手に聞こえるように、大きな声で言ったんだ）
3300 = "（Thế nên anh Soutetsu mới cố tình nói lớn để đối thủ nghe thấy.）"
# monologue
# JP: ツバゼリアイって、あれ、見るからにキツそうだから。\n体力勝負なら、凪ちゃんが負けるわけないから。
2657 = "Cái thế Tsubazeriai đó, nhìn thôi đã thấy mệt rồi. Nếu thi gan lỳ thể lực, Nagi-chan không đời nào thua được."
# monologue
# JP: だから凪ちゃんに受けて立てって、\n相手が自分から離れるの待て、って、きっと！
2837 = "Vậy nên mới bảo Nagi-chan hãy tiếp nhận nó, và đợi đối thủ tự tách ra, chắc chắn là vậy!"
# 【凪】
# display as 凪
# JP: 「チェェストオオオオー！」
2103 = "「Chéééssssstoooooooo!」"
# 【中村】
# display as 選手Ａ
# JP: 「りゃああああああああっ！！」
2076 = "「Ryaaaaaaaaa!!」"
# monologue
# JP: 竹刀と竹刀が噛みあったみたいに動かない。\nその中で。声で、気迫で戦ってる。
2656 = "Hai thanh kiếm tre như cắn chặt vào nhau không nhúc nhích. Trong thế trận đó. Họ đang chiến đấu bằng tiếng thét, bằng khí thế."
# monologue
# JP: 凪ちゃんの白襷がひらひら揺れる。\n見た目には動かなくても――力、凄く競り合ってるんだ。
2961 = "Dải băng trắng của Nagi-chan tung bay phấp phới. Dù bề ngoài có vẻ tĩnh lặng——nhưng lực lượng đang giằng co rất quyết liệt."
# 【凪】
# display as 凪
# JP: 「ふうっ――ふうっ――ふうっ――」
2010 = "「Phù——phù——phù——」"
# 【中村】
# display as 選手Ａ
# JP: 「はぁ――はぁ――はぁ――はぁ」
2401 = "「Hà——hà——hà——hà」"
# monologue
# JP: 時間、どんどん無くなっていく。\nなのに、ふたりとも動かない。……動けない。
3057 = "Thời gian cứ thế trôi đi. Vậy mà, cả hai vẫn không hề di chuyển. ......Không thể di chuyển."
# 【ふかみ】
# display as 深美
# JP: 「このまま、時間切れになったらどうなるんですか？」
1916 = "「Cứ thế này, nếu hết giờ thì sẽ ra sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「開始線まで戻されて、延長戦だ。\nどちらかが一本を取ればその時点で試合終了」
2130 = "「Sẽ bị đưa về vạch xuất phát, và bước vào hiệp phụ. Nếu một trong hai bên ghi được một điểm (Ippon) thì trận đấu sẽ kết thúc ngay lúc đó.」"
# 【ふかみ】
# display as 深美
# JP: 「なら――」
2447 = "「Nếu vậy——」"
# monologue
# JP: このまま焦らず、延長戦を待った方がいい気がする。
2992 = "Cứ thế này không cần vội vàng, chờ hiệp phụ có vẻ tốt hơn."
# monologue
# JP: 相手は絶対、凪ちゃんよりも消耗してるし、\nそしたらきっと、さっきみたいには飛び込めない。
2896 = "Đối thủ chắc chắn đang hao tổn thể lực hơn Nagi-chan, thế thì chắc chắn sẽ không thể lao vào như lúc nãy nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「凪！　焦るな！！\n焦らなければ、お前のペースだ！！」
1947 = "「Nagi! Đừng nôn nóng!! Chỉ cần không nôn nóng, nhịp độ trận đấu sẽ thuộc về em!!」"
# 【凪】
# display as 凪
# JP: 「――」
# 1470 = "「——」" 
# monologue
# JP: 返事なんてない。できるわけない。\nけど、ちゃんと、凪ちゃんにも聞こえてるってわかる。
2942 = "Không có tiếng đáp lại. Làm sao mà trả lời được cơ chứ. Nhưng tôi biết, Nagi-chan vẫn nghe thấy rất rõ."
# monologue
# JP: 肩の上下が小さくなるから、\n呼吸を、凪ちゃんが鎮めてるって、見えるから。
2840 = "Vì bờ vai nhấp nhô của cậu ấy đang nhỏ dần lại, tôi có thể thấy, Nagi-chan đang cố gắng ổn định nhịp thở."
# 【凪】
# display as 凪
# JP: 「チェェエエストォォォ！」
# 2103 = "「喝啊啊啊啊啊啊！」" 
# 【中村】
# display as 選手Ａ
# JP: 「やああっ！」
1999 = "「Yaaa!」"
# 【主審】
# display as 主裁判
# JP: 「待てっ！　――離れて」
1906 = "「Đợi đã! ——Tách ra đi.」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
2020 = "「Hả?」"
# monologue
# JP: 主審の人が、待てって大きな声でいって、\n凪ちゃんと相手の子を、最初の――開始線まで戻す。
2651 = "Trọng tài chính hô lớn bảo dừng lại, và đưa Nagi-chan cùng cô bé đối thủ trở về——vạch xuất phát ban đầu."
# monologue
# JP: どうして？　時間、まだ残ってるのに――\nあ！
3082 = "Tại sao chứ? Vẫn còn thời gian mà—— A!"
# 【双鉄】
# display as 雙鐵
# JP: 「汗か」
2132 = "「Mồ hôi sao.」"
# 【ふかみ】
# display as 深美
# JP: 「床、びしょびしょ。\nあんなの、滑ってケガしちゃう」
2136 = "「Sàn nhà, ướt sũng rồi. Như thế thì, trượt ngã bị thương mất.」"
# monologue
# JP: 主審の人が、会場の人に指示をして、\n床の汗を拭き取らせてくれる。
2653 = "Trọng tài chính ra hiệu cho nhân viên hội trường, nhờ họ lau sạch mồ hôi trên sàn."
# monologue
# JP: はぁって、大きな息が聞こえる。\n凪ちゃんからの、相手の子からの、きっと会場全部からの。
3023 = "Có thể nghe thấy tiếng thở hắt ra thật lớn. Từ Nagi-chan, từ cô bé đối thủ, và chắc chắn là từ cả hội trường."
# 【主審】
# display as 主裁判
# JP: 「試合を再開します」
2321 = "「Trận đấu tiếp tục.」"
# 【凪】
# display as 凪
# JP: 「はいっ！」
2169 = "「Vâng ạ!」"
# 【中村】
# display as 選手Ａ
# JP: 「……はい」
1509 = "「......Vâng.」"
# monologue
# JP: 相手の子、しんどそう。
2894 = "Cô bé đối thủ, có vẻ đuối sức rồi."
# monologue
# JP: でも、だから――\nこれって絶対！　凪ちゃんのチャンス！！
3038 = "Nhưng, cũng vì thế—— Đây tuyệt đối! Là cơ hội của Nagi-chan!!"
# 【双鉄】
# display as 雙鐵
# JP: 「元の姿勢には――戻さんな」
2355 = "「Tư thế ban đầu——không lấy lại được rồi.」"
# monologue
# JP: 双鉄おにいさんの声にも、感じる。\nこれって、やっぱり、チャンスなんだ！！
3024 = "Qua giọng nói của anh Soutetsu, tôi cũng cảm nhận được. Quả nhiên, đây chính là cơ hội!!"
# 【双鉄】
# display as 雙鐵
# JP: 「凪！　焦るなよ！　そして担ぐな！！」
1944 = "「Nagi! Đừng nôn nóng! Và không được vác kiếm lên vai!!」"
# monologue
# JP: こっくり。\n小さくだけど凪ちゃんが頷く。
2962 = "Gật đầu. Nagi-chan khẽ gật đầu."
# monologue
# JP: 聞こえてる！\n聞こえるってことは、舞い上がってない！
2870 = "Nghe thấy rồi! Nghe thấy tức là, cậu ấy không hề mất bình tĩnh!"
# 【主審】
# display as 主裁判
# JP: 「はじめっ！」
# 2476 = "「開始！」" 
# 【凪】
# display as 凪
# JP: 「チェエストーーーーーーーっ！！！」
2104 = "「Chéééssssstoooooooo!!!」"
# 【中村】
# display as 選手Ａ
# JP: 「やっ！」
# 2000 = "「呀！」" 
# monologue
# JP: （すぱーーーーーーーんっ！！）
3303 = "（Chátttt!!）"
# 【ふかみ】
# display as 深美
# JP: 「やった！！！」
2171 = "「Tuyệt quá!!!」"
# monologue
# JP: 凪ちゃん、担がなかった！！
2949 = "Nagi-chan, không vác kiếm lên vai!!"
# monologue
# JP: ちゃんと大きくまっすぐに振りかぶって、\nそれで面打ち！　綺麗に決めたっ！！！！
3118 = "Vung kiếm thật lớn và thẳng thớm, rồi đánh thẳng vào mặt! Một đòn quyết định tuyệt đẹp!!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「……ぁあ――」
# 2066 = "「啊……」" 
# monologue
# JP: ばっ！！　って、\n一斉に旗があがる！！
2633 = "Phất!! Cờ đồng loạt giương lên!!"
# monologue
# JP: 赤！　赤！　赤っ！！　
3129 = "Đỏ! Đỏ! Đỏ!!"
# 【ふかみ】
# display as 深美
# JP: 「――えっ？」
# 2020 = "「咦？」" 
# monologue
# JP: なんで、赤？
3080 = "Tại sao, lại là đỏ?"
# monologue
# JP: なんでっ！？　どうしてっ！！？\n凪ちゃんの色、白なのにっ！！
3081 = "Tại sao!? Sao lại thế!!? Màu của Nagi-chan, là màu trắng cơ mà!!"
# 【双鉄】
# display as 雙鐵
# JP: 「やられた――最初からこれが狙いか」
1848 = "「Bị lừa rồi——ngay từ đầu đây đã là mục đích sao.」"
# 【ふかみ】
# display as 深美
# JP: 「ねらい、って――」
2362 = "「Mục đích, là sao ạ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「最初の踏み込み――つばぜり合いが[ま]撒き餌だったのだ。\nあれで僕は、離れ際を狙われていると思い込んだ」
2296 = "「Pha lao vào lúc đầu——thế giằng co đó chỉ là mồi nhử. Nó làm anh lầm tưởng rằng đối phương đang nhắm vào khoảnh khắc tách ra.」"
# 【ふかみ】
# display as 深美
# JP: 「そうじゃ……なかったんですか？」
1835 = "「Không phải... vậy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論。離れ技も狙っていたのだろう。\nが――そこを未然に防げたがゆえに、油断した」
2350 = "「Tất nhiên. Chắc chắn đối phương cũng nhắm đến đòn đánh lúc tách ra. Nhưng——chính vì phòng ngừa được điều đó từ trước, nên anh đã chủ quan.」"
# 【ふかみ】
# display as 深美
# JP: 「油断……」
2150 = "「Chủ quan...」"
# monologue
# JP: わたしも、した。\nホっとしちゃった。
3001 = "Tôi cũng vậy. Tôi đã thở phào nhẹ nhõm."
# monologue
# JP: 凪ちゃんが嫌がってたこと、審判の人が離してくれて――\nこれで勝てるってきっと思った。
2941 = "Nagi-chan vốn rất khó chịu với điều đó, nhưng trọng tài đã tách họ ra—— Nên tôi đinh ninh rằng thế này là nắm chắc phần thắng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「油断は剣を鈍らせるうえ――\n僕のアドバイスもよくなかった。『担ぐな』と」
2152 = "「Sự chủ quan làm đường kiếm trở nên cùn mòn—— Hơn nữa lời khuyên của anh cũng không tốt. Lại bảo là 『Không được vác kiếm』.」"
# 【ふかみ】
# display as 深美
# JP: 「でも、担いじゃったら反則に――」
1988 = "「Nhưng, nếu vác kiếm lên thì sẽ bị phạm quy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪にもそう意識させてしまった。ゆえ、[ことさら]更に剣は鈍り、\n[しょだち,2]初太刀のときは捉えられなかった[でぎわ,1]出際をやられた」
2470 = "「Anh đã làm Nagi để tâm đến chuyện đó. Thế nên, đường kiếm lại càng thêm chậm chạp, và đối phương đã nhắm trúng khoảnh khắc xuất chiêu mà đòn đánh đầu tiên không nắm bắt được.」"
# 【ふかみ】
# display as 深美
# JP: 「でぎわ？」
2422 = "「Khoảnh khắc xuất chiêu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今、決められたそのものだ。\n凪の振りかぶりの出鼻を狙っての、小手打ちだ」
2201 = "「Chính là đòn quyết định vừa nãy đấy. Một đòn đánh vào cổ tay (Kote) ngay khi Nagi vừa vung kiếm lên.」"
# 【ふかみ】
# display as 深美
# JP: 「小手」
2269 = "「Cổ tay...」"
# monologue
# JP: その位は、わたしも知ってる。\n手のこと、手首のこと――けどっ！
3205 = "Chừng đó thì, tôi cũng biết. Là nói về tay, về cổ tay——Nhưng mà!"
# 【ふかみ】
# display as 深美
# JP: 「小手って――そんなの、\nそんなの、わたし、見えなかったし」
1983 = "「Đánh vào cổ tay——Cái đó, cái đó, em, không hề nhìn thấy mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕には見えた。審判たちにも。\nそれ以上に、他の誰より――はっきり、凪に」
2252 = "「Anh đã nhìn thấy. Các trọng tài cũng vậy. Hơn thế nữa, rõ ràng hơn bất kỳ ai——Nagi đã thấy.」"
# 【凪】
# display as 凪
# JP: 「うん。ものの見事にやられたとー」
2118 = "「Ừm. Bị hạ gục một cách tâm phục khẩu phục luôn á~」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 
# monologue
# JP: 凪ちゃん、いつの間にか戻ってきてる。
2901 = "Nagi-chan, đã quay lại từ lúc nào."
# monologue
# JP: 面も手ぬぐいも全部外して……\n汗だくで――表情、笑って――無理やり笑い、作ってる。
3240 = "Tháo hết cả mặt nạ bảo hộ lẫn khăn tay ra... Mồ hôi nhễ nhại——Vẻ mặt, đang cười——một nụ cười gượng gạo, cố nặn ra."
# 【凪】
# display as 凪
# JP: 「上手だったばい。\nあぎゃん小手、今のうちには打てんばい」
2360 = "「Cậu ấy giỏi thật á. Cú đánh cổ tay như vậy, tớ bây giờ chưa thể làm được nè.」"
# 【ふかみ】
# display as 深美
# JP: 「けどっ！　凪ちゃん、そのまま振りかぶったし、\n面だって打ったし！　だから、それって効いてなくって」
1986 = "「Nhưng mà! Nagi-chan, cậu vẫn vung kiếm lên, và đánh trúng mặt đối thủ mà! Nên là, đòn đó đâu có tác dụng...」"
# 【双鉄】
# display as 雙鐵
# JP: 「竹刀だから、そうできたというだけだ。\nもしこれが、真剣勝負であったなら――」
2460 = "「Đó là vì dùng kiếm tre nên mới làm được như vậy thôi. Nếu đây là một trận đấu bằng kiếm thật thì——」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 
# monologue
# JP: 刀だったら、凪ちゃん、振りかぶるなんて出来てないんだ。\n小手って、手首を――切っちゃうみたいなことなんだから。
2879 = "Nếu là kiếm thật, Nagi-chan, đã không thể vung kiếm lên được. Đánh vào cổ tay, tức là——giống như chém đứt cổ tay vậy."
# 【凪】
# display as 凪
# JP: 「そういうことばい！　やけん、負け！！\nうちの負けばい！　完敗ばいっ！！」
2205 = "「Là vậy đó! Nên là, tớ thua!! Là tớ thua á! Thất bại hoàn toàn!!」"
# 【ふかみ】
# display as 深美
# JP: 「あぁっ」
# 2070 = "「啊」" 
# 【凪】
# display as 凪
# JP: 「え？　あ――あ、あははっ」
2015 = "「Hả? A——A, ahaha.」"
# monologue
# JP: 凪ちゃん、気づいて、作り笑いで止めようとする\nけど、止まらない。止まるわけない。
2917 = "Nagi-chan, nhận ra điều đó, cố dùng nụ cười gượng gạo để ngăn lại nhưng, không thể dừng lại được. Làm sao mà dừng được chứ."
# monologue
# JP: だってぼろぼろ、こんなにボロボロ。\n涙、溢れちゃってるんだから。
2841 = "Bởi vì nước mắt đã rơi lã chã, lã chã thế này. Trào ra mất rồi."
# 【凪】
# display as 凪
# JP: 「あ、はは――これ、が――\nこれが、負け、とね――悔しか――とねぇ」
2049 = "「A, haha——Đây, là—— Đây là, cảm giác thua cuộc, nhỉ——Tức tưởi quá——nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。悔しいな。そして、悲しい」
2292 = "「Ừ. Tức tưởi lắm. Và cũng, buồn nữa.」"
# 【凪】
# display as 凪
# JP: 「ふ……うっ……ふあっ」
2107 = "「Hức... Ư... Oa...」"
# monologue
# JP: 凪ちゃんの顔がゆがんじゃう。
2954 = "Gương mặt Nagi-chan nhăn nhó lại."
# monologue
# JP: 笑おうって一生懸命してたのに、\n涙がそれを、どんどん崩して溶かしちゃう。
2858 = "Rõ ràng đã cố gắng hết sức để cười, nhưng những giọt nước mắt cứ thế phá vỡ và làm tan chảy nụ cười ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「おいで、凪」
2449 = "「Lại đây, Nagi.」"
# 【凪】
# display as 凪
# JP: 「にーーーさーーーーん！！！！」
2149 = "「Anh haiiiiiiiii!!!!」"
# monologue
# JP: 凪ちゃんが、\n双鉄おにいさんに体当たりする。
2930 = "Nagi-chan, lao sầm vào người anh Soutetsu."
# monologue
# JP: 体あたりしてそのまま、\n顔を胸に埋めて――
3090 = "Cứ thế lao vào, vùi mặt vào ngực anh ấy——"
# 【凪】
# display as 凪
# JP: 「うわぁぁぁぁああああんっ！」
2108 = "「Oaaaaaaa!」"
# monologue
# JP: （あ……ダメ。今は、ダメ。\nわたしは、今は、泣いちゃダメ）
3282 = "（A... Không được. Bây giờ, không được. Mình, bây giờ, không được khóc.）"
# monologue
# JP: 負けちゃったのは凪ちゃんだから。\n一番悔しくて悲しいのは凪ちゃんだから。
2963 = "Bởi vì người thua cuộc là Nagi-chan. Người tức tưởi và buồn bã nhất là Nagi-chan mà."
# monologue
# JP: 双鉄おにいさんの胸――\nだから今は、凪ちゃんひとりの、ものなんだから。
3034 = "Lồng ngực của anh Soutetsu—— Vì thế bây giờ, là của riêng một mình Nagi-chan."
