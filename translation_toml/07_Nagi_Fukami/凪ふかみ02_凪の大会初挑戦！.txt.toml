2961 = "小凪身後繫著的白色帶子不停搖擺。雖然表面上沒有動靜，但她們的確在全力比拼。" 

# 【凪】
# display as 凪
# JP: 「ふうっ――ふうっ――ふうっ――」
2010 = "「呼……呼……呼……」" 

# 【中村】
# display as 選手Ａ
# JP: 「はぁ――はぁ――はぁ――はぁ」
2401 = "「蛤啊……蛤啊……蛤啊……」" 

# monologue
# JP: 時間、どんどん無くなっていく。\nなのに、ふたりとも動かない。……動けない。
3057 = "時間一分一秒地流逝，但場上的兩人依然一動不動……應該說是動彈不得。" 

# 【ふかみ】
# display as 深美
# JP: 「このまま、時間切れになったらどうなるんですか？」
1916 = "「僵持到時間耗盡會怎麼樣呢？」" 

# 【双鉄】
# display as 雙鐵
