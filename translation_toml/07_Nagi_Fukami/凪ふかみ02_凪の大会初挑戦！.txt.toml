2136 = "「地板濕漉漉的，那樣會滑倒受傷吧」" 

# monologue
# JP: 主審の人が、会場の人に指示をして、\n床の汗を拭き取らせてくれる。
2653 = "主裁判指示會場工作人員把地板上的汗水擦去。" 

# monologue
# JP: はぁって、大きな息が聞こえる。\n凪ちゃんからの、相手の子からの、きっと会場全部からの。
3023 = "我聽到了響亮的呼吸聲。這一定是小凪以及她的對手，甚至是整個會場發出的喘息。" 

# 【主審】
# display as 主裁判
# JP: 「試合を再開します」
2321 = "「比賽繼續」" 

# 【凪】
# display as 凪
# JP: 「はいっ！」
2169 = "「好的！」" 

# 【中村】
# display as 選手Ａ
# JP: 「……はい」
1509 = "「……好的」" 

# monologue
# JP: 相手の子、しんどそう。
2894 = "對手好像快撐不住了。" 

# monologue
# JP: でも、だから――\nこれって絶対！　凪ちゃんのチャンス！！
3038 = "所以這一定是小凪取勝的好時機！" 

# 【双鉄】
# display as 雙鐵
# JP: 「元の姿勢には――戻さんな」
2355 = "「看來……沒有原來的氣勢了啊」" 

# monologue
# JP: 双鉄おにいさんの声にも、感じる。\nこれって、やっぱり、チャンスなんだ！！
3024 = "我聽得出雙鐵哥哥的高興的聲音，這一定就是取勝的機會！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　焦るなよ！　そして担ぐな！！」
1944 = "「凪！　不要急！　舉劍的架勢也別偏！！」" 

# monologue
# JP: こっくり。\n小さくだけど凪ちゃんが頷く。
2962 = "小凪輕輕點了點頭。" 

# monologue
# JP: 聞こえてる！\n聞こえるってことは、舞い上がってない！
2870 = "她聽到了！說明她沒有鬆懈！" 

# 【主審】
# display as 主裁判
# JP: 「はじめっ！」
# 2476 = "「開始！」" 

# 【凪】
# display as 凪
# JP: 「チェエストーーーーーーーっ！！！」
2104 = "「喝啊啊啊啊！！！」" 

# 【中村】
# display as 選手Ａ
# JP: 「やっ！」
# 2000 = "「呀！」" 

# monologue
# JP: （すぱーーーーーーーんっ！！）
3303 = "（砰！！）" 

# 【ふかみ】
# display as 深美
# JP: 「やった！！！」
2171 = "「好！！！」" 

# monologue
# JP: 凪ちゃん、担がなかった！！
2949 = "小凪的架勢沒有問題！！" 

# monologue
# JP: ちゃんと大きくまっすぐに振りかぶって、\nそれで面打ち！　綺麗に決めたっ！！！！
3118 = "端正筆直的大幅度舉劍擊面！漂亮地拿下比賽！！！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ぁあ――」
# 2066 = "「啊……」" 

# monologue
# JP: ばっ！！　って、\n一斉に旗があがる！！
2633 = "三位裁判的旗幟齊刷刷地舉起！！" 

# monologue
# JP: 赤！　赤！　赤っ！！　
3129 = "紅！　紅！　紅！！" 

# 【ふかみ】
# display as 深美
# JP: 「――えっ？」
# 2020 = "「咦？」" 

# monologue
# JP: なんで、赤？
3080 = "為什麼是紅旗？" 

# monologue
# JP: なんでっ！？　どうしてっ！！？\n凪ちゃんの色、白なのにっ！！
3081 = "為什麼！？為什麼啊！！？小凪是白旗才對啊！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「やられた――最初からこれが狙いか」
1848 = "「中計了……這才是對方的真實意圖啊」" 

# 【ふかみ】
# display as 深美
# JP: 「ねらい、って――」
2362 = "「真實意圖？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最初の踏み込み――つばぜり合いが[ま]撒き餌だったのだ。\nあれで僕は、離れ際を狙われていると思い込んだ」
2296 = "「最初的近身交鍔是對方撒下的誘餌。我以為對方是想抓住拉開距離時的破綻」" 

# 【ふかみ】
# display as 深美
# JP: 「そうじゃ……なかったんですか？」
1835 = "「不是這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論。離れ技も狙っていたのだろう。\nが――そこを未然に防げたがゆえに、油断した」
2350 = "「當然，這也是對方的意圖之一。但正因為破解了對方的計策，才出現了大意」" 

# 【ふかみ】
# display as 深美
# JP: 「油断……」
2150 = "「大意……」" 

# monologue
# JP: わたしも、した。\nホっとしちゃった。
3001 = "我也一樣，當時懸著的心都放下來了。" 

# monologue
# JP: 凪ちゃんが嫌がってたこと、審判の人が離してくれて――\nこれで勝てるってきっと思った。
2941 = "小凪當時很煩躁，裁判將二人分開後，我以為比賽已經十拿九穩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「油断は剣を鈍らせるうえ――\n僕のアドバイスもよくなかった。『担ぐな』と」
2152 = "「大意會讓劍失去鋒芒——而且我還提醒了她架勢不要出錯，這也是道敗筆」" 

# 【ふかみ】
# display as 深美
# JP: 「でも、担いじゃったら反則に――」
1988 = "「可是架勢歪了就犯規了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪にもそう意識させてしまった。ゆえ、[ことさら]更に剣は鈍り、\n[しょだち,2]初太刀のときは捉えられなかった[でぎわ,1]出際をやられた」
2470 = "「都怪我讓她這麼在意姿勢，所以她手中的劍更遲鈍了，第一擊起手時對方沒能抓到破綻，但第二次就不一樣了」" 

# 【ふかみ】
# display as 深美
# JP: 「でぎわ？」
2422 = "「起手？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、決められたそのものだ。\n凪の振りかぶりの出鼻を狙っての、小手打ちだ」
2201 = "「就是剛才決定勝負的一擊。在凪舉劍的瞬間，使出擊手」" 

# 【ふかみ】
# display as 深美
# JP: 「小手」
2269 = "「擊手……」" 

# monologue
# JP: その位は、わたしも知ってる。\n手のこと、手首のこと――けどっ！
3205 = "這詞的意思連我也知道，指的是擊打手腕……可是不應該會這樣啊！" 

# 【ふかみ】
# display as 深美
# JP: 「小手って――そんなの、\nそんなの、わたし、見えなかったし」
1983 = "「可是……可是我沒有看到小凪的手腕中劍啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕には見えた。審判たちにも。\nそれ以上に、他の誰より――はっきり、凪に」
2252 = "「我看到了，裁判們一樣也看到了。對此最為清楚的人——就是凪」" 

# 【凪】
# display as 凪
# JP: 「うん。ものの見事にやられたとー」
2118 = "「嗯，真是輸得心服口服咧」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 

# monologue
# JP: 凪ちゃん、いつの間にか戻ってきてる。
2901 = "小凪不知什麼時候回來了。" 

# monologue
# JP: 面も手ぬぐいも全部外して……\n汗だくで――表情、笑って――無理やり笑い、作ってる。
3240 = "頭盔和頭巾都摘了下來，滿頭大汗的她露出了笑容——那只是強顏歡笑。" 

# 【凪】
# display as 凪
# JP: 「上手だったばい。\nあぎゃん小手、今のうちには打てんばい」
2360 = "「真厲害咧。那麼精彩的擊手，咱現在還做不到咧」" 

# 【ふかみ】
# display as 深美
# JP: 「けどっ！　凪ちゃん、そのまま振りかぶったし、\n面だって打ったし！　だから、それって効いてなくって」
1986 = "「可是你也成功舉起劍，擊中了她的臉部啊！所以她那招沒有奏效」" 

# 【双鉄】
# display as 雙鐵
# JP: 「竹刀だから、そうできたというだけだ。\nもしこれが、真剣勝負であったなら――」
2460 = "「那只是因為用的是竹刀而已。如果是真刀真槍的實戰——」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 

# monologue
# JP: 刀だったら、凪ちゃん、振りかぶるなんて出来てないんだ。\n小手って、手首を――切っちゃうみたいなことなんだから。
2879 = "如果是實戰，小凪的手腕會被直接斬斷，根本舉不起劍。" 

# 【凪】
# display as 凪
# JP: 「そういうことばい！　やけん、負け！！\nうちの負けばい！　完敗ばいっ！！」
2205 = "「就是這樣咧！　所以是咱輸咧！　完敗！！」" 

# 【ふかみ】
# display as 深美
# JP: 「あぁっ」
# 2070 = "「啊」" 

# 【凪】
# display as 凪
# JP: 「え？　あ――あ、あははっ」
2015 = "「咦？　哈……哈哈」" 

# monologue
# JP: 凪ちゃん、気づいて、作り笑いで止めようとする\nけど、止まらない。止まるわけない。
2917 = "小凪察覺到了，於是想要停下強行擠出的笑聲，但一切都控制不住了。" 

# monologue
# JP: だってぼろぼろ、こんなにボロボロ。\n涙、溢れちゃってるんだから。
2841 = "因為淚水從她的眼眶內止不住地落下。" 

# 【凪】
# display as 凪
# JP: 「あ、はは――これ、が――\nこれが、負け、とね――悔しか――とねぇ」
2049 = "「哈哈……這、這就是失敗啊……這就叫不甘心吧……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。悔しいな。そして、悲しい」
2292 = "「是啊，很不甘心，很難過吧」" 

# 【凪】
# display as 凪
# JP: 「ふ……うっ……ふあっ」
2107 = "「嗚……嗚嗚……嗚啊啊啊」" 

# monologue
# JP: 凪ちゃんの顔がゆがんじゃう。
2954 = "小凪的表情扭作一團。" 

# monologue
# JP: 笑おうって一生懸命してたのに、\n涙がそれを、どんどん崩して溶かしちゃう。
2858 = "她拚命想要露出笑容，奔湧而出的淚水卻洗去了她的偽裝。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おいで、凪」
2449 = "「過來吧，凪」" 

# 【凪】
# display as 凪
# JP: 「にーーーさーーーーん！！！！」
2149 = "「大哥哥！！！！」" 

# monologue
# JP: 凪ちゃんが、\n双鉄おにいさんに体当たりする。
2930 = "小凪撲到雙鐵哥哥身上。" 

# monologue
# JP: 体あたりしてそのまま、\n顔を胸に埋めて――
3090 = "然後將臉埋進他的胸口——" 

# 【凪】
# display as 凪
# JP: 「うわぁぁぁぁああああんっ！」
2108 = "「嗚啊啊啊啊啊啊！」" 

# monologue
# JP: （あ……ダメ。今は、ダメ。\nわたしは、今は、泣いちゃダメ）
3282 = "（啊……不行，我現在不能哭）" 

# monologue
# JP: 負けちゃったのは凪ちゃんだから。\n一番悔しくて悲しいのは凪ちゃんだから。
2963 = "小凪輸掉了比賽，最不甘、最難過的是她才對。" 

# monologue
# JP: 双鉄おにいさんの胸――\nだから今は、凪ちゃんひとりの、ものなんだから。
3034 = "所以……現在就讓她獨占雙鐵哥哥的胸膛吧。" 
