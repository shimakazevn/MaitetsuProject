3234 = "雙鐵哥哥高聲發出提醒，接著小凪身上的急躁氣息也漸漸收斂。" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 2065 = "「啊——」" 

# monologue
# JP: さすが、双鉄おにいさん。\nわかった気がする。わたしにも。
3230 = "雙鐵哥哥真是厲害，連我也明白了其中深意。" 

# monologue
# JP: 振りほどこうと乱暴に大きく動いたりしたら、\nきっと、そこが隙――相手の狙い目になっちゃうんだ。
2882 = "如果為了甩開對手而魯莽行動，一定會出現對方所等待的破綻。" 

# monologue
# JP: （だから双鉄おにいさんは、\nわざと相手に聞こえるように、大きな声で言ったんだ）
3300 = "（所以雙鐵哥哥才要大聲喊出來，故意讓對手也聽到）" 

# monologue
# JP: ツバゼリアイって、あれ、見るからにキツそうだから。\n体力勝負なら、凪ちゃんが負けるわけないから。
2657 = "交鍔看起來就非常消耗體力，但在體力這個方面，小凪是不可能落敗的。" 

# monologue
# JP: だから凪ちゃんに受けて立てって、\n相手が自分から離れるの待て、って、きっと！
