[script]
# lines: 709 
# 【ふかみ】
# display as 深美
# JP: 「陽射し、強くて気持ちいい、です」
2898 = "「Ánh nắng, chói chang thật dễ chịu, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2432 = "「Ừm.」"

# monologue
# JP: ワンピースと麦わら帽子を新調したので、\nお出かけしたい。
3525 = "Vì mới mua váy liền và mũ rơm mới,\nnên em\nấy muốn đi chơi."

# monologue
# JP: ふかみの普段の好みからして、街歩き――\nそう予測して、身支度を整えてきたのだが。
3437 = "Dựa vào sở thích thường ngày của Fukami,\nchắc là đi dạo phố――\nĐoán vậy nên tôi đã\nchuẩn bị sẵn sàng, thế nhưng."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん。服、暑くないですか？」
2905 = "「Anh Soutetsu. Quần áo, không nóng ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「機関士だからな。暑さには強い」
2562 = "「Anh là nhân viên cơ vụ mà. Chịu nóng giỏi\nlắm.」"

# monologue
# JP: 僕はいつもと同じ恰好。暑さは感じてないにせよ、\n保線まわりには、いささか場違いな感がある。
3453 = "Tôi vẫn mặc trang phục như mọi khi. Dù\nkhông thấy nóng,\nnhưng đi quanh khu vực\nbảo trì đường ray thì có vẻ hơi lạc lõng."

# monologue
# JP: それに引き換え――
3741 = "Ngược lại thì――"

# 【双鉄】
# display as 雙鐵
# JP: 「意外なほど、絵になるものだな」
2534 = "「Đẹp như tranh vẽ đến bất ngờ luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「絵に、って、何が……です？」
2134 = "「Đẹp như tranh, là sao……ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみがだ。\n麦わら帽子。真っ白なワンピース。夏の終わりの線路」
2505 = "「Là Fukami đấy.\nMũ rơm. Váy liền trắng\nmuốt. Đường ray cuối hè.」"

# monologue
# JP: 驚いたように、ふかみの足がぴたりと止まる。
3667 = "Như thể ngạc nhiên, bước chân của Fukami\nđột ngột dừng lại."

# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いを散歩したいと言われたときは正直驚いた。\nが……いや、これは素晴らしいデートだな」
2786 = "「Thú thật là anh đã rất ngạc nhiên khi em\nnói muốn đi dạo dọc đường ray.\nNhưng……không, đây quả là một buổi hẹn hò\ntuyệt vời.」"

# 【ふかみ】
# display as 深美
# JP: 「はぅぅ」
2427 = "「Hauu」"

# monologue
# JP: 照れたのか、ふかみは一瞬身をすくめ、\n逃げ出すようにまた歩き出す。
3567 = "Có lẽ vì xấu hổ, Fukami khẽ co rúm người\nlại một chút,\nrồi lại bước đi như thể muốn\ntrốn chạy."

# monologue
# JP: スカートがひるがえるその様さえが、やはり、絵だ。
3302 = "Ngay cả bóng dáng chiếc váy tung bay ấy,\nquả thực, cũng đẹp như tranh."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは、自分でわかっていたのか？」
2216 = "「Fukami, em tự biết điều đó sao?」"

# 【ふかみ】
# display as 深美
# JP: 「わ、わかってたって、なにが、です？」
2719 = "「Bi, biết gì, cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いと、今日のふかみが、\nこれほど鮮やかな絵になることが、だ」
2752 = "「Việc cảnh dọc đường ray và Fukami hôm\nnay,\nlại tạo thành một bức tranh sống động\nđến nhường này.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　そんなことで全然。\nただ――わたし、ただ知りたくて、知ってみたくて」
2418 = "「Dạ? Hoàn toàn không phải vậy đâu.\nChỉ\nlà――em, chỉ muốn biết, muốn thử tìm hiểu\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なにをだ？」
2155 = "「Tìm hiểu gì cơ?」"

# 【ふかみ】
# display as 深美
# JP: 「あの、なにって――だから、線路とか、\n鉄道のこととか、です」
2859 = "「Dạ, là gì á――thì là, đường ray,\nhay những\nchuyện về đường sắt, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2635 = "「Hô?」"

# 【ふかみ】
# display as 深美
# JP: 「わ」
2305 = "「Oa.」"

# monologue
# JP: ふかみが瞳を丸くする。\nそして楽しげな笑みを浮かべる。
3634 = "Fukami tròn xoe mắt.\nSau đó nở một nụ cười\nvui vẻ."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんは、どうして、です？」
2902 = "「Anh Soutetsu, sao vậy, ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうして、とは？」
2701 = "「Sao vậy, là sao?」"

# 【ふかみ】
# display as 深美
# JP: 「嬉しそうな顔。すっごく。いま、にこぉって」
2212 = "「Khuôn mặt trông rất vui. Vui lắm luôn.\nVừa nãy, anh cười tủm tỉm kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんな顔をしたか」
2565 = "「Anh làm bộ mặt như vậy sao.」"

# monologue
# JP: 自覚が無かった。思わず、自分の顔に触れてしまう。\nその仕草を見て、ふかみがくすくす、また笑う。
3462 = "Tôi không hề nhận ra. Bất giác, tôi đưa\ntay chạm lên mặt mình.\nNhìn thấy điệu bộ\nđó, Fukami lại khúc khích cười."

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、単純に嬉しかったからだろう。\n僕とて、鉄道に深く関わるものだからな」
1694 = "「……Đó là vì anh thấy vui thật sự thôi.\nDù\nsao thì anh cũng là người gắn bó sâu sắc\nvới đường sắt mà.」"

# monologue
# JP: ゆえ、ポーレット、ハチロク、れいなに相談し、\n戸惑いつつも、ふかみの望みをすぐに叶えた。
3488 = "Do đó, tôi đã bàn bạc với Paulette,\nHachiroku và Reina,\ndù hơi bối rối nhưng\ncũng lập tức đáp ứng mong muốn của Fukami."

# monologue
# JP: 保線見学。\nその名目での、ふかみの立ち入り許可を得た。
3166 = "Tham quan bảo trì đường ray.\nDưới danh\nnghĩa đó, tôi đã xin được giấy phép vào\ntrong cho Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「車両や駅ではなく、線路。鉄道の背骨であるのに、\n人の興味がそれ自体にはあまり向かない、地味な存在」
2889 = "「Không phải toa xe hay nhà ga, mà là đường\nray. Dù là xương sống của đường sắt,\nnhưng\nlại là một sự tồn tại mờ nhạt, chẳng mấy\nai quan tâm đến nó.」"

# monologue
# JP: 口にしていて、ふと思う。\n双鉄――線路を意味する、僕の名を。
3783 = "Vừa nói, tôi chợt nghĩ.\nSoutetsu――tên của\ntôi, mang ý nghĩa là đường ray đôi."

# monologue
# JP: あるいは僕の両親は、「かくあれかし」と願いつつ、\n授けてくれたのではなかろうか。
3484 = "Có lẽ bố mẹ tôi đã đặt cái tên này,\nvới\nmong muốn \"hãy trở thành một người như\nthế\"."

# 【双鉄】
# display as 雙鐵
# JP: 「そこを歩いて、親しみたいと――惚れた女が、\nふかみが願ってくれたのだから、嬉しくない筈が無い」
2560 = "「Người con gái anh yêu――Fukami lại mong\nmuốn được đi dạo ở đó,\nđược làm quen với\nnó, thì làm sao anh lại không vui cho\nđược.」"

# 【ふかみ】
# display as 深美
# JP: 「ふわっ！！」
2309 = "「Fua!!」"

# monologue
# JP: ふかみが耳まで赤くなる。\n心臓を両手で押さえ、ぱたぱた自分で自分を仰ぎ。
3642 = "Fukami đỏ bừng đến tận mang tai.\nEm ấy\ndùng hai tay ôm lấy tim, tự quạt cho mình\nphành phạch."

# monologue
# JP: 深い呼吸を繰り返し、やだもうと小さくつぶやいて、\nそれから――ようやく僕へと視線を戻してくれる。
3135 = "Liên tục hít thở sâu, khẽ lẩm bẩm \"thôi đi\nmà\",\nsau đó――cuối cùng em ấy cũng đưa mắt\nnhìn về phía tôi."

# 【ふかみ】
# display as 深美
# JP: 「あの、わたし。そんなに立派なこと考えてたりとか、\nえと、してない――です」
2860 = "「Dạ, em. Không có nghĩ những điều cao cả\nđến thế đâu,\nừm, không có――ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかしこうして実際に」
2268 = "「Không, nhưng thực tế là em đang」"

# 【ふかみ】
# display as 深美
# JP: 「わたし、ただ――その、凪ちゃんだけ、鉄道のこと、\n双鉄さんといっしょにしてるのが、うらやましくて」
2552 = "「Em, chỉ là――ừm, thấy ghen tị vì chỉ có\nNagi,\nlà được làm những chuyện về đường\nsắt cùng anh Soutetsu thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2450 = "「À――」"

# 【ふかみ】
# display as 深美
# JP: 「それで、わたしも――双鉄さんと凪ちゃんの世界、\nちょっとでも知れたらいいなって、そう思って」
2590 = "「Vì thế, em cũng――muốn biết được dù chỉ\nmột chút,\nvề thế giới của anh Soutetsu và\nNagi, em đã nghĩ vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、乗ってみるか？　8620の運転台に。\n見学なら、いつでも大歓迎だ」
2855 = "「Vậy, em có muốn ngồi thử không? Lên buồng\nlái của 8620 ấy.\nNếu là tham quan thì lúc\nnào cũng hoan nghênh.」"

# 【ふかみ】
# display as 深美
# JP: 「わ！　それ、うれしいです！！」
2308 = "「Oa! Nếu được vậy thì em vui lắm!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では――\nそうだな17:10までに御一夜温泉駅に戻って」
2638 = "「Vậy sao, thế thì――\nđể xem nào, hãy quay\nlại ga Ohimitera Onsen trước 17:10 nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、今日はダメ！　今日は無理、ですっ」
2400 = "「A, hôm nay không được đâu! Hôm nay không\nđược, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なぜだ」
2447 = "「Hửm? Tại sao?」"

# 【ふかみ】
# display as 深美
# JP: 「だって、あの――えと――そのっ――あの」
2465 = "「Tại vì, cái đó――ừm――chuyện đó――cái đó」"

# monologue
# JP: ふかみのひとみがぐるぐる動く。\n何故かちらちら空を見上げて、自身の体に落ちて――
3615 = "Mắt Fukami đảo quanh liên tục.\nKhông hiểu\nsao em ấy cứ thỉnh thoảng ngước lên trời,\nrồi lại cúi nhìn cơ thể mình――"

# 【ふかみ】
# display as 深美
# JP: 「服、だって。おろしたてで、真っ白で」
2769 = "「Tại vì, quần áo. Vừa mới mua, lại còn\ntrắng tinh nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かに。煤でよごしてしまうのは、\nあまりにももったいない――ふむ」
2452 = "「À, cũng đúng. Nếu bị muội than làm bẩn,\nthì quả là quá đáng tiếc――ưm.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　どうしました？」
2411 = "「Dạ? Có chuyện gì sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ならばふかみが運転台を見学するときは、\n日々姫にナッパを借りるのが良いかと思ってな」
2690 = "「Không, anh chỉ nghĩ nếu Fukami tham quan\nbuồng lái,\nthì nên mượn trang phục làm\nviệc của Hibiki thì hơn.」"

# 【ふかみ】
# display as 深美
# JP: 「わ！　ナッパ服。\nあれ、わたし、一回着てみたい、です」
2306 = "「Oa! Trang phục làm việc.\nBộ đồ đó, em\ncũng muốn mặc thử một lần, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、そのときにはそう手配しよう。\n……ああした服も、ふかみには案外似合いそうだな」
2863 = "「Vậy, đến lúc đó anh sẽ sắp xếp nhé.\n……Mấy\nbộ đồ như vậy, có khi lại hợp với Fukami\nngoài sức tưởng tượng đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「そ、そう――です、か？」
2660 = "「C, có thật――vậy, không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、思うのだがな――\nちょっと、そこに立って見てくれ」
2566 = "「Anh nghĩ vậy đấy――\nEm thử đứng ra kia xem\nnào.」"

# 【ふかみ】
# display as 深美
# JP: 「は、はい。です」
2475 = "「V, vâng. Ạ.」"

# monologue
# JP: おずおず、ふかみが僕と向き合う。
3590 = "Fukami rụt rè đứng đối diện với tôi."

# monologue
# JP: 目と目があえばハっとして、\nすぐに背筋を伸ばしてくれる。
3542 = "Mỗi khi ánh mắt chạm nhau, em ấy lại giật\nmình,\nvà ngay lập tức vươn thẳng lưng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。その方が美しい」
2517 = "「Đúng rồi đấy. Như thế đẹp hơn nhiều.」"

# 【ふかみ】
# display as 深美
# JP: 「…………っ」
1664 = "「…………」"

# monologue
# JP: はにかんで、頬がじわりと赤くなる。\nけれども、顔はうつむかせない。
3630 = "Em ấy ngượng ngùng, đôi gò má dần ửng đỏ.\nThế nhưng, em ấy không hề cúi mặt xuống."

# monologue
# JP: 成長したなと、しみじみ思う。\nそうして、その健やかな成長は――
3471 = "Tôi cảm nhận sâu sắc rằng em ấy đã trưởng\nthành.\nVà sự trưởng thành khỏe mạnh đó――"

# 【双鉄】
# display as 雙鐵
# JP: 「……とても、綺麗だ。単純な外観の美しさなら、\nハチロクはひとつの完成形と思っているが――」
1685 = "「……Rất, xinh đẹp. Nếu chỉ xét vẻ đẹp ngoại\nhình đơn thuần,\nanh nghĩ Hachiroku là một\nhình mẫu hoàn hảo――」"

# 【ふかみ】
# display as 深美
# JP: 「は、ハチロクちゃんは、だって……\nレイルロオドで、トップナンバー、ですし」
2228 = "「Ha, Hachiroku thì, tại vì……\nchị ấy là\nRailord, số hiệu đầu tiên, mà ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、美しくて当然だ」
2625 = "「Ừ, xinh đẹp là lẽ đương nhiên.」"

# monologue
# JP: 国産量産、第一号機、まさに日ノ本一国の、\n威厳と誇りと、美しささえをも示すもの。
3178 = "Đầu máy số 1 sản xuất hàng loạt trong\nnước, thực sự thể hiện\nsự uy nghiêm, niềm\ntự hào và cả vẻ đẹp của toàn đất nước\nHinomoto."

# monologue
# JP: 後に続く全ての妹たちの規範となるに相応しい――\nレイルロオド・ハチロクは、まさにそうした存在だ。
3811 = "Hoàn toàn xứng đáng làm chuẩn mực cho tất\ncả các em gái theo sau――\nRailord\nHachiroku, chính là một sự tồn tại như\nvậy."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ふかみもハチロクに劣らず、美しい。\nいや……僕の目には、より美しくさえ映る」
2185 = "「Nhưng mà, Fukami cũng xinh đẹp không kém\nHachiroku đâu.\nKhông……trong mắt anh, em\ncòn đẹp hơn thế nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「えええっ！？」
2318 = "「Ể!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほら、そういう顔などだ」
2509 = "「Đấy, chính là những biểu cảm như vậy\nđấy.」"

# monologue
# JP: みずみずしさ、あどけなさ、純真さ。
3294 = "Sự tươi trẻ, nét ngây thơ, vẻ thuần khiết."

# monologue
# JP: 長い長い時間を稼働し、数多を見てきたハチロクは、\n――いや、僕も既に失くしていよう、無邪気な表情。
3815 = "Hoạt động suốt một thời gian dài đằng\nđẵng, chứng kiến biết bao điều,\nHachiroku――\nkhông, ngay cả tôi cũng đã\nđánh mất rồi, những biểu cảm ngây thơ ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「[いのち,1]生命そのものの美しさとさえ感じるよ。\nふかみには、伸びゆくものの美が宿っている」
2572 = "「Anh thậm chí còn cảm nhận được vẻ đẹp của\nchính sinh mệnh.\nTrong Fukami, ẩn chứa vẻ\nđẹp của sự trưởng thành.」"

# 【ふかみ】
# display as 深美
# JP: 「伸びゆくもの……\nなら、それ、凪ちゃんにも、ですよね、きっと」
2539 = "「Sự trưởng thành……\nVậy, điều đó, chắc chắn\ncũng có ở Nagi, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今日は随分と凪にこだわるな」
2527 = "「Sao vậy? Hôm nay em để tâm đến Nagi nhiều\nthế.」"

# monologue
# JP: 三人ですごす時間を基本とし、\n凪とふかみ、凪と僕、ふかみと僕――
3383 = "Về cơ bản là dành thời gian cho cả ba\nngười,\nNagi và Fukami, Nagi và tôi, Fukami\nvà tôi――"

# monologue
# JP: それぞれの組み合わせの時間は、できるだけ\n均等になるよう、週ごとに予定を調整している。
3206 = "Thời gian cho từng cặp đôi, chúng tôi cố\ngắng\nđiều chỉnh lịch trình hàng tuần sao\ncho đồng đều nhất có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとふたりでいるときは、凪の話はしない――\nそうした方がいいものかと僕は思っていたが？」
2568 = "「Khi chỉ có hai người chúng ta, sẽ không\nnhắc đến chuyện của Nagi――\nAnh cứ nghĩ làm\nnhư vậy sẽ tốt hơn chứ?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、それはそうです。その方が、\nふたりきりを楽しめます、から――でも……」
2404 = "「A, đúng là vậy ạ. Làm thế thì,\nmới tận\nhưởng được không gian hai người,\nmà――nhưng……」"

# monologue
# JP: ごにょごにょと、そこから先は聞き取れない。\n背筋もまるまり、顔もうつむいてしまってる。
3573 = "Em ấy lí nhí trong miệng, đoạn sau tôi\nkhông nghe rõ.\nLưng cũng còng xuống, khuôn\nmặt cúi gằm."

# 【双鉄】
# display as 雙鐵
# JP: 「そんなしょぼくれた表情さえも、\nふかみのものならば美しい」
2244 = "「Ngay cả vẻ mặt ủ rũ đó,\nnếu là của Fukami\nthì cũng rất đẹp.」"

# 【ふかみ】
# display as 深美
# JP: 「ひぇっ！？」
2290 = "「Hie!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「驚いた顔もだ。嬉しいな。\n今日はとりわけ、いろんな顔を見せてくれる」
2218 = "「Cả khuôn mặt ngạc nhiên cũng vậy. Vui\nthật đấy.\nHôm nay đặc biệt được thấy rất\nnhiều biểu cảm của em.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、あの――あの……双鉄おにいさん。\nほめてもらえて、嬉しいです。嬉しいです、けど――」
2843 = "「A, dạ――dạ……anh Soutetsu.\nĐược khen, em\nvui lắm. Vui lắm, nhưng mà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
2269 = "「Nhưng mà?」"

# monologue
# JP: ふかみの両手が、ほっそりした頬をぐにぐに動かす。
3561 = "Hai tay Fukami xoa xoa đôi má gầy của\nmình."

# 【ふかみ】
# display as 深美
# JP: 「そ、そんなこと言われちゃったら。わたし……\nどんな顔していいか、わからなくなっちゃう――です」
2193 = "「Bị, bị nói như vậy. Em……\nkhông biết phải\nlàm vẻ mặt thế nào nữa――ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2330 = "「Ưm.」"

# monologue
# JP: 困らせるつもりは毛頭ない。
3401 = "Tôi hoàn toàn không có ý làm em ấy bối\nrối."

# monologue
# JP: ふかみに笑ってもらうには――\n思ったことが、既に答えだ。
3773 = "Để Fukami mỉm cười――\nNhững gì tôi nghĩ, đã\nlà câu trả lời rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、笑っていて欲しい。\nしあわせそうな笑顔が、やはりいちばん美しい」
2854 = "「Nếu vậy, anh muốn em mỉm cười.\nNụ cười\nhạnh phúc, quả nhiên vẫn là đẹp nhất.」"

# 【ふかみ】
# display as 深美
# JP: 「しあわせそうに……です？」
2512 = "「Hạnh phúc……ạ?」"

# monologue
# JP: ふかみが、笑顔を作ってみせる。
3571 = "Fukami cố nặn ra một nụ cười."

# monologue
# JP: 浮かべて、ではなく、\n作ってと、感じてしまうぎこちなさだ。
3144 = "Không phải là nụ cười tự nhiên,\nmà là một\nnụ cười gượng gạo, đầy gượng ép."

# 【ふかみ】
# display as 深美
# JP: 「はぅ……難し――あ！\nって、いうかですね？　双鉄おにいさん」
2426 = "「Hau……khó quá――a!\nÀ, mà này? Anh\nSoutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？」
2526 = "「Chuyện gì vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「しあわせ――あの、双鉄おにいさんがくれたら、\nわたし、笑顔……自然になれるって、思う。です」
2486 = "「Hạnh phúc――dạ, nếu anh Soutetsu trao cho\nem,\nem nghĩ, nụ cười……sẽ trở nên tự nhiên\nthôi. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、道理だ。\nしかし、しあわせと言われても――っ！」
2728 = "「Ra là vậy, có lý lắm.\nNhưng, nói là hạnh\nphúc thì――!」"

# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1664 = "「……」" 

# monologue
# JP: ふかみが、僕を見、すぐ目をとじる。\nしあわせは――ひどく、わかりやすい形のようだ。
3631 = "「…………」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2695 = "Fukami nhìn tôi, rồi nhắm nghiền mắt lại.\nHạnh phúc――có vẻ như mang một hình hài vô\ncùng dễ hiểu."

# monologue
# JP: ごくさり気なく抱き寄せて、\n線路から、安全十分の距離を取る。
3481 = "「Fukami.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁ……」
2336 = "Tôi ôm em ấy vào lòng một cách thật tự\nnhiên,\nvà giữ một khoảng cách an toàn vừa\nđủ với đường ray."

# monologue
# JP: 軽い、キス。\nふかみはそれでも、瞳を閉じたまま動かない。
3503 = "「A……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
# 2432 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「ふか……んっ――ん……んちゅっ」
2694 = "Một nụ hôn nhẹ.\nFukami vẫn nhắm nghiền\nmắt, không nhúc nhích."

# monologue
# JP: キス、キス、キス。\n何度か軽く繰り返すうち、体の中が熱くなる。
3238 = "「Ưm……」"

# 【双鉄】
# display as 雙鐵
# JP: 「……っ」
1677 = "「Fuka……ưm――ưm……nchu」"

# 【ふかみ】
# display as 深美
# JP: 「ぁっ……ふあっ――んっ――ちゅっ――ちゅむっ、\nちゅっ――ちゅうっ――ちゅるっ――ちゅずっ」
2338 = "Hôn, hôn, hôn.\nSau vài lần lặp lại nhẹ\nnhàng, cơ thể tôi bắt đầu nóng lên."

# monologue
# JP: 唇を割り、ふかみの舌を自分の舌で軽くつつけば、\nすぐさまふかみは、僕の口内に逆進してくる。
3390 = "「……」"

# 【ふかみ】
# display as 深美
# JP: 「ちゅむっ――ちゅるっ――ちゅっ――っちゅぷっ、\nちゅうっ――ちゅずっ――ずちゅるっ――ちゅうっ」
2425 = "「A……fua――ưm――chụt――chumu,\nchụt――chụtttt――churu――chuzu」"

# monologue
# JP: ふかみの体が、くっついてくる。\nふかみの熱が、つたわってくる。
3628 = "Hé mở đôi môi, dùng lưỡi khẽ chạm vào lưỡi\nFukami,\nngay lập tức, em ấy tiến sâu vào\nkhoang miệng tôi."

# monologue
# JP: 夏の昼間の線路沿い――見通しのよい場所でなければ、\nこのまま熱に、浮かされてしまいたい気もする、が。
3771 = "「Chumu――churu――chụt――chupu,\nchụtttt――chuzu――zuchuru――chụtttt」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん」
# 2432 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！　――ぷあっ」
2385 = "Cơ thể Fukami áp sát vào tôi.\nHơi ấm của\nem ấy truyền sang tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「時間も、場所もまずかろう」
2653 = "Dọc đường ray vào buổi trưa hè――nếu không\nphải là nơi dễ bị nhìn thấy thế này,\ntôi\ncũng muốn cứ thế đắm chìm trong hơi nóng\nnày, nhưng mà."

# 【ふかみ】
# display as 深美
# JP: 「あ……そ、そうですよね。わたしつい、気持ちよっ\n――えと、しあわせで、夢中になっちゃって」
2369 = "「Ưm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2547 = "「! ――Pua」"

# 【ふかみ】
# display as 深美
# JP: 「そ、そうですか？　えへへっ」
2605 = "「Cả thời gian và địa điểm đều không tiện\nđâu.」"

# monologue
# JP: ふかみが、はにかむ。
3644 = "「A……đ, đúng vậy nhỉ. Em lỡ, sướng quá\n――ừm, hạnh phúc quá, nên chìm đắm mất.」"

# monologue
# JP: 含羞と嬉しさとを入り混じらせて――\nああ、これこそがふかみの顔だと、しみじみ思う。
3284 = "「Anh cũng vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうする？\nまだ歩き始めたばかりだが」
2880 = "「V, vậy ạ? E hehe.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、歩きます、です。\n先、見てみたいですし」
2544 = "Fukami cười bẽn lẽn."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2479 = "Pha lẫn giữa sự ngượng ngùng và niềm vui\nsướng――\nA, tôi thầm nghĩ, đây mới chính là\nkhuôn mặt của Fukami."

# monologue
# JP: ふかみが前、僕が後ろで歩き出す。
3654 = "「Vậy, tính sao đây?\nChúng ta mới chỉ bắt\nđầu đi dạo thôi mà.」"

# monologue
# JP: 本当は手をつなぎ並んで歩きたいところだが、\n線路脇だ、それほどの余裕が無い場所も多い。
3439 = "「Đ, đi tiếp, ạ.\nEm cũng muốn xem phía\ntrước có gì nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「結構――葉っぱ、しげってますね」
2533 = "「Vậy sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「夏場はどうしても、な。木の枝よりも、\n草むしりを優先せねばならんしな」
2716 = "Fukami đi trước, tôi bước theo sau."

# 【ふかみ】
# display as 深美
# JP: 「草むしり」
2897 = "Thực ra tôi muốn nắm tay đi cạnh em ấy,\nnhưng bên cạnh đường ray, có nhiều chỗ\nkhông đủ rộng rãi."

# monologue
# JP: 不思議そうに、ふかみは自分の足元を――
3666 = "「Lá cây――mọc rậm rạp quá nhỉ.」"

# monologue
# JP: 雑草一つの無いバラストを、\n堰さんたちの、日々の努力の結晶を見る。
3549 = "「Mùa hè thì đành chịu thôi. So với cành\ncây,\nthì phải ưu tiên nhổ cỏ dại trước.」"

# 【双鉄】
# display as 雙鐵
# JP: 「バラストは、列車の振動を緩和するためだけの\nものではない。線路を、雑草からも守っている」
2837 = "「Nhổ cỏ dại ạ.」"

# monologue
# JP: バラスト――線路下、枕木を守り敷き詰められてる\n砕石を、僕も歩きつつ踏んで見る。
3335 = "Vẻ khó hiểu, Fukami nhìn xuống chân mình――"

# monologue
# JP: 軽く沈み込む踏みごたえ。けれどもズレない。\n実に良く搗き固められている。
3791 = "Nhìn vào lớp đá ba-lát không một ngọn cỏ\ndại,\nnhìn vào kết tinh nỗ lực từng ngày\ncủa nhóm ông Seki."

# 【ふかみ】
# display as 深美
# JP: 「線路を、雑草から守る、って……\nでも、線路は鉄で、雑草は草……ですよ、ね？」
2222 = "「Đá ba-lát, không chỉ có tác dụng giảm\nchấn động của đoàn tàu.\nMà còn bảo vệ\nđường ray khỏi cỏ dại nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「鉄はレールだ。線路とは、レールや枕木、\nそれにバラストなどを、一体化した呼び方だ」
2261 = "Đá ba-lát――lớp đá vụn trải dày bảo vệ tà\nvẹt dưới đường ray,\ntôi vừa đi vừa thử\ngiẫm lên."

# 【ふかみ】
# display as 深美
# JP: 「あ――レールだけじゃなく、その下も全部合わせて、\nこの[みち]路そのものが、線路」
2374 = "Cảm giác lún nhẹ khi giẫm lên. Nhưng không\nhề bị xô lệch.\nQuả thực được đầm nén rất\ntốt."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そして、雑草を放置すれば、\n線路はあっけなく崩壊してしまいかねんのだ」
2644 = "「Bảo vệ đường ray khỏi cỏ dại, á……\nNhưng,\nđường ray làm bằng sắt, còn cỏ dại chỉ là\ncỏ……thôi mà, nhỉ?」"

# 【ふかみ】
# display as 深美
# JP: 「ええ！？　崩壊って――だって、草くらいで」
2398 = "「Bằng sắt là thanh ray. Đường ray là tên\ngọi chung,\nbao gồm cả thanh ray, tà vẹt và\nđá ba-lát nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「草が生えれば、バラスト、砂利は押しのけられる。\nそうなると、そこは水を保つようになってしまう」
2893 = "「A――không chỉ thanh ray, mà tính cả toàn\nbộ phần bên dưới,\nchính con đường này, gọi\nlà đường ray.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
2386 = "「Đúng vậy. Và nếu cứ để mặc cỏ dại,\nđường\nray có thể sẽ sụp đổ một cách dễ dàng\nđấy.」"

# monologue
# JP: 言った瞬間、大きな頷き。
3668 = "「Ể!? Sụp đổ á――nhưng, chỉ là cỏ thôi mà.」"

# 【ふかみ】
# display as 深美
# JP: 「そっか！　このバラストって――\n排水を良くする効果もあるんですね！」
2503 = "「Cỏ mọc lên sẽ đẩy đá ba-lát, sỏi dạt ra.\nKhi đó, chỗ ấy sẽ trở nên giữ nước.」"

# 【双鉄】
# display as 雙鐵
# JP: 「さすがだな。そのとおりだ」
2247 = "「A!」"

# monologue
# JP: 水の怖さを、ふかみは僕よりよほど知ってる。\nここから先は、ほとんど説明の必要もなかろうが。
3597 = "Khoảnh khắc vừa nói xong, em ấy gật đầu\nmạnh."

# 【双鉄】
# display as 雙鐵
# JP: 「草が水を保つようになれば、草はさらに繁茂し、\n根を張って、あるべき道床の姿を変えてしまう」
2765 = "「Ra là vậy! Lớp đá ba-lát này――\ncòn có tác\ndụng giúp thoát nước tốt nữa nhỉ!」"

# 【ふかみ】
# display as 深美
# JP: 「どうしょう？」
2792 = "「Quả không hổ danh. Đúng là vậy đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「線路を支える地面のことだ。御一夜鉄道のように、\nバラストを敷いてある道床は、『バラスト道床』だな」
2506 = "Sự đáng sợ của nước, Fukami còn hiểu rõ\nhơn cả tôi.\nĐoạn sau này, chắc cũng chẳng\ncần giải thích nhiều nữa."

# 【ふかみ】
# display as 深美
# JP: 「なら、\nその道床の姿が根っこで変えられちゃったら」
2881 = "「Khi cỏ giữ nước, cỏ sẽ càng mọc um tùm\nhơn,\nbám rễ sâu, và làm thay đổi hình dáng\nvốn có của nền đường sắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「予定された排水路とは別の[みずみち,1]水路が\n生まれてしまう可能性がある」
2271 = "「Nền đường sắt ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「[みずみち,1]水路なんて出来ちゃったら――\n砂利も土も、水と一緒に運ばれちゃいます、です」
2773 = "「Là phần mặt đất nâng đỡ đường ray. Như\nĐường sắt Ohito,\nnền đường được trải đá\nba-lát thì gọi là 'nền đường đá ba-lát'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「枕木周辺の土が沈めば、枕木もレールも沈む。\n傾きは列車通過時によってさらに押されて――」
2775 = "「Vậy,\nnếu hình dáng nền đường bị rễ cây\nlàm thay đổi thì sao ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「もっとどんどん傾いて、\nそしたらきっと、いつか――っ！」
2596 = "「Có khả năng sẽ hình thành những dòng nước\nkhác với mương thoát nước đã được thiết\nkế.」"

# monologue
# JP: 恐らく、脱線といいかけて、\nふかみがあわてて言葉を飲み込む。
3563 = "「Nếu hình thành dòng nước――\nthì cả sỏi và\nđất cũng sẽ bị cuốn trôi theo nước mất,\nạ.」"

# monologue
# JP: そこまで気にすることはない――\n伝えるためにも、僕が飲まれた言葉を続ける。
3671 = "「Đất quanh tà vẹt lún xuống thì tà vẹt và\nthanh ray cũng lún theo.\nĐộ nghiêng sẽ\ncàng bị đè nặng hơn mỗi khi có tàu chạy\nqua――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、事故さえを引き起こしかねない。\nゆえに、草むしりが最優先となってしまうのだ」
2629 = "「Sẽ càng lúc càng nghiêng hơn,\nrồi chắc\nchắn, đến một lúc nào đó――!」"

# monologue
# JP: おい茂る葉が車体に触れることで\n事故が発生したケースなど、聞いたこともない。
3440 = "Có lẽ định nói là trật bánh,\nnhưng Fukami\nhoảng hốt nuốt lại lời."

# monologue
# JP: 優先すべきは、常に安全。\n取捨選択の基準は、一定不変だ。
3523 = "Không cần phải bận tâm đến mức đó đâu――\nĐể\ntruyền đạt điều đó, tôi tiếp lời em ấy."

# 【ふかみ】
# display as 深美
# JP: 「すごい……です、ね、鉄道って。\n20キロ以上ある線路、そんなに丁寧にお手入れして」
2887 = "「Ừ, thậm chí có thể gây ra tai nạn.\nVì\nvậy, nhổ cỏ dại mới trở thành ưu tiên hàng\nđầu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かに凄いと思う。が、その凄さは、\nクマ川下り――舟運も変わらんだろう」
2435 = "Tôi chưa từng nghe thấy trường hợp nào xảy\nra tai nạn\ndo lá cây mọc um tùm chạm vào\nthân tàu cả."

# 【ふかみ】
# display as 深美
# JP: 「え？！　うちが、です？」
2320 = "Điều cần ưu tiên, luôn là sự an toàn.\nTiêu\nchuẩn để lựa chọn, là bất biến."

# 【双鉄】
# display as 雙鐵
# JP: 「以前聞かせてくれたではないか。水路を保つため、\n川に入って、川底の岩を転がすと」
2148 = "「Đường sắt, tuyệt thật……nhỉ.\nĐường ray dài\nhơn 20km, mà được chăm sóc kỹ lưỡng đến\nthế.」"

# 【ふかみ】
# display as 深美
# JP: 「あ」
2376 = "「Ừm. Anh cũng thấy tuyệt thật. Nhưng sự\ntuyệt vời đó,\nchắc cũng không khác gì xuôi\ndòng Kumagawa――vận tải đường thủy đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「安全確保のため、為すべきことを、怠らず為す。\n線路と水路の差こそあれ、その本質は同じと思う」
2700 = "「Ể?! Chỗ em, á?」"

# 【ふかみ】
# display as 深美
# JP: 「…………」
1662 = "「Trước đây em đã kể cho anh nghe rồi mà.\nĐể duy trì luồng lạch,\nmọi người phải lội\nxuống sông, lăn những tảng đá dưới đáy\nđi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2443 = "「A.」"

# monologue
# JP: ふかみが頬を染めている。\nしあわせそうにはにかみながら、うつむいている。
3648 = "「Vì sự an toàn, phải làm những việc cần\nlàm, không được lơ là.\nDù là đường ray hay\nluồng lạch, anh nghĩ bản chất đều giống\nnhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ふかみ」
2525 = "「Hửm?」"

# monologue
# JP: 問うやいなやで、パッとふかみの顔があがる。\n小さな汗が跳ね飛び光の粒となる。
3744 = "Fukami đang đỏ mặt.\nEm ấy mỉm cười bẽn lẽn\nđầy hạnh phúc, rồi cúi gằm mặt xuống."

# 【ふかみ】
# display as 深美
# JP: 「わ、わたしがちょっと話しただけのこと――\n双鉄おにいさんが覚えててくれて、嬉しい。です」
2541 = "「Sao vậy? Fukami.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2635 = "「是嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「線路も、川とおなじもの。\nそう考えたら、まえよりもっと、綺麗に見えます！」
2747 = "Vừa hỏi xong, Fukami ngẩng phắt mặt lên.\nNhững giọt mồ hôi nhỏ xíu bắn ra, hóa\nthành những hạt sáng lấp lánh."

# monologue
# JP: （ああ――）
3911 = "「C, chuyện em chỉ tiện miệng kể――\nmà anh\nSoutetsu vẫn nhớ, em vui lắm. Ạ.」"

# monologue
# JP: ふかみが大きく踏み出す一歩を、\n跳ねるようだと、強く感じる。
3599 = "「Đường ray, cũng giống như dòng sông.\nNghĩ\nvậy, em thấy nó còn đẹp hơn trước nữa!」"

# monologue
# JP: 船上にいるときのふかみがここに、\n僕の目の前で輝いている。
3761 = "（A――）"

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？\nおいてっちゃいますよー？」
2903 = "Fukami sải bước dài về phía trước,\ntôi có\ncảm giác mạnh mẽ như em ấy đang bật nhảy."

# 【双鉄】
# display as 雙鐵
# JP: 「それはダメだ！　ふかみ、僕から離れるな」
2823 = "Fukami khi ở trên thuyền đang ở ngay đây,\ntỏa sáng ngay trước mắt tôi."

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2318 = "「哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「慣れてはいけない。ここが線路である以上、\n臨時列車が走ってくる可能性は常にある」
2233 = "「Anh Soutetsu?\nEm bỏ anh lại đó nha?」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2386 = "「啊！」" 

# monologue
# JP: ふかみが戻って、僕のすぐ前――\n一番最初に示したポジションに復帰する。
3656 = "「Không được đâu! Fukami, đừng rời xa anh.」"

# monologue
# JP: ならば、よい。このまま、ふかみが満足するまで、\n安全に、線路巡視を続けよう。
3363 = "「Ể!?」"

# 【ふかみ】
# display as 深美
# JP: 「線路も、川も、おなじこと。\n油断をしても、慣れてもいけない」
2753 = "「Không được chủ quan. Chừng nào đây vẫn là\nđường ray,\nthì luôn có khả năng tàu tạm\nthời sẽ chạy tới.」"

# monologue
# JP: 自分の言葉に落とし込み、\n理解を深めてくれたのだろう。
3288 = "Fukami quay lại, ngay trước mặt tôi――\ntrở\nvề vị trí mà tôi đã chỉ định lúc đầu."

# monologue
# JP: ふかみの視線も、単なる見学者のものではなく、\nまるで巡視をしているかのように鋭くなってる。
3621 = "Vậy thì, tốt rồi. Cứ thế này, cho đến khi\nFukami thỏa mãn,\nhãy tiếp tục tuần tra\ntuyến một cách an toàn nào."

# 【ふかみ】
# display as 深美
# JP: 「そう考えたら、結構、いろいろ見えてきます。です。\nなんか、枕木？　に書いてある印とか」
2895 = "「Đường ray, cũng giống như dòng sông.\nKhông được lơ là, cũng không được chủ\nquan.」"

# 【双鉄】
# display as 雙鐵
# JP: 「枕木交換の目安だな。X印が次の次。\nそれを○で囲んだものが、次の交換時での、交換だ」
2871 = "Em ấy tự ngẫm lại bằng ngôn từ của mình,\nchắc hẳn đã hiểu sâu sắc hơn rồi."

# 【ふかみ】
# display as 深美
# JP: 「あそこ――なんで急に柵、あるんですか？」
2878 = "Ánh mắt của Fukami cũng không còn là của\nmột người tham quan đơn thuần nữa,\nmà trở\nnên sắc bén như thể đang thực sự đi tuần\ntra."

# 【双鉄】
# display as 雙鐵
# JP: 「敷地の境界を示すためだな。あの向こうは確か、\n天然のわらびを採って販売しているとかなんとかだ」
2770 = "「Nghĩ như vậy, em thấy được khá nhiều thứ.\nẠ.\nKiểu như, mấy dấu hiệu viết trên tà\nvẹt? ấy ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「ああ、それでひとが勝手に入ってこないように\n――あ」
2455 = "「Đó là dấu hiệu để thay tà vẹt. Dấu X là\nlần sau nữa.\nDấu X được khoanh tròn là sẽ\nthay trong lần thay tiếp theo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2330 = "「唔」" 

# monologue
# JP: ふかみの足がぴたりと止まる。\n理由は、僕にもすぐわかる。
3582 = "「Chỗ kia――sao tự nhiên lại có hàng rào vậy\nạ?」"

# 【ふかみ】
# display as 深美
# JP: 「この切り株……凪ちゃんの」
2830 = "「Là để phân định ranh giới khu đất đấy.\nPhía bên kia hình như,\nlà nơi người ta hái\ndương xỉ tự nhiên để bán hay sao ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2622 = "「À, ra là để người ngoài không tự ý xông\nvào\n――a.」"

# monologue
# JP: その周辺だけ、\nやはり、空気が違う気がする。
3244 = "「Ưm.」"

# monologue
# JP: 切られた、ではなく、\n叩き折られた痕跡を、まざまざ今も残す切り株。
3261 = "Bước chân của Fukami đột ngột dừng lại.\nLý\ndo, tôi cũng lập tức nhận ra."

# 【ふかみ】
# display as 深美
# JP: 「こんなところにあったんだ――\nわたし、全然知らなかった」
2733 = "「Gốc cây này……của Nagi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　ああいや、\nわざわざ見に来る場所でもないか」
2640 = "「Đúng vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「そうですし……\nそれに、わたしが――ってっ！？」
2617 = "Chỉ riêng khu vực xung quanh đó,\nquả\nnhiên, tôi cảm thấy bầu không khí có chút\nkhác biệt."

# monologue
# JP: ふかみが、いきなり一歩退く。
3636 = "Không phải bị cắt, mà là\ngốc cây vẫn còn\nin hằn rõ mồn một dấu vết bị đập gãy."

# monologue
# JP: 罪深いことでもしたかのように、\nふるえて、こちらを振り返る。
3291 = "「Thì ra nó nằm ở chỗ này――\nEm, hoàn toàn\nkhông biết luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうしたふかみ？」
# 2525 = "「怎麼了，深美？」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、ここ――双鉄お兄さんと、凪ちゃんの、\nとっても大切な思い出の場所っ」
2861 = "「Vậy sao? À không,\ncũng chẳng phải là nơi\nđáng để cất công đến xem nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 2622 = "「是啊」" 

# monologue
# JP: あの事件が発生しなければ、\n凪と結ばれることは決してなかったろう。
3306 = "「Đúng là vậy ạ……\nHơn nữa, em――ơ!?」"

# monologue
# JP: それはすなわち、ふかみと結ばれるきっかけも、\n決して訪れなかっただろうことを意味してもいる。
3506 = "Fukami, đột nhiên lùi lại một bước."

# 【ふかみ】
# display as 深美
# JP: 「なのに、わたし――その大切な場所に、\nうっかり土足で入っちゃうみたいなことしちゃって」
2266 = "Như thể vừa làm chuyện gì đó tội lỗi lắm,\nem ấy run rẩy, ngoảnh lại nhìn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「構わんだろう。その方が思い出も深くなる」
2689 = "「Sao vậy Fukami?」"

# 【ふかみ】
# display as 深美
# JP: 「え？！」
2421 = "「Dạ, nơi này――là nơi chứa đựng kỷ niệm,\nvô\ncùng quan trọng của anh Soutetsu và Nagi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大事に抱え込んでしまえば、思い出は自分の中で、\n歪み、変質してしまうものかと思うからな」
2487 = "「Đúng thế.」"

# 【ふかみ】
# display as 深美
# JP: 「歪む、って……」
2591 = "Nếu sự kiện đó không xảy ra,\nchắc chắn tôi\nđã không thể đến với Nagi."

# monologue
# JP: ふかみが、深刻な顔をしている。\n感覚がかなり違うと気づき、言葉を慎重なものにする。
3557 = "Điều đó cũng đồng nghĩa với việc, cơ hội\nđể đến với Fukami,\nchắc chắn cũng sẽ không\nbao giờ xuất hiện."

# 【双鉄】
# display as 雙鐵
# JP: 「歪むでは……表現が強すぎるかもしれんが……。\n思い出をしまいこみ、大事に抱え込みすぎてしまうと」
2777 = "「Thế mà, em――lại vô ý xông vào,\nnơi quan\ntrọng đó như thể đi cả giày dơ vào nhà\nngười khác vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2432 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……抱え込んでいる思い出が、自分の中で、\n強調されすぎ、本来の形を失っていくように思うのだ」
1682 = "「Có sao đâu. Như vậy kỷ niệm sẽ càng sâu\nsắc hơn.」"

# monologue
# JP: 少なくとも僕はそうだった。
3757 = "「Ể?!」"

# monologue
# JP: 罪悪感というタールの中に路子の思い出を沈め込み、\n本当の路子の姿を、願いを、捻じ曲げていた。
3252 = "「Nếu cứ khư khư ôm giữ lấy, anh nghĩ kỷ\nniệm trong bản thân mình,\nsẽ bị bóp méo và\nbiến chất đi mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、思い出はしまいこまない方がいい。\n刺激を受けて、掻き回される方がずっといい」
2462 = "「Bóp méo, là sao ạ……」"

# 【ふかみ】
# display as 深美
# JP: 「それ……でも――」
2817 = "Fukami đang làm vẻ mặt nghiêm trọng.\nNhận\nra cảm nhận của em ấy khá khác biệt, tôi\ncẩn trọng lựa lời."

# monologue
# JP: ふかみが、珍しく不満げだ。
3639 = "「Dùng từ bóp méo thì……có lẽ hơi mạnh quá……\nNếu cứ cất giấu kỷ niệm, và ôm giữ nó quá\nmức cẩn thận.」"

# monologue
# JP: 素直な気持ちを聞きたくて、\n続く言葉を、ゆっくりと待つ。
3419 = "「Vâng.」"

# 【ふかみ】
# display as 深美
# JP: 「そういうの――双鉄おにいさんらしいですけど……\nわたしだったら、ちょっとだけ、寂しいかも、です」
2832 = "「……Anh nghĩ những kỷ niệm đang được ôm giữ\nấy, trong bản thân mình,\nsẽ bị nhấn mạnh\nquá mức, và dần đánh mất đi hình dạng ban\nđầu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「寂しい？」
2495 = "Ít nhất thì tôi đã từng như vậy."

# 【ふかみ】
# display as 深美
# JP: 「わたしだったら……双鉄おにいさんと、初めて、\nふたりだけ、で……その、部屋だとか……あの」
2489 = "Nhấn chìm những kỷ niệm về Michiko vào\ntrong vũng hắc ín mang tên cảm giác tội\nlỗi,\ntôi đã bóp méo hình ảnh thật sự, cũng\nnhư những ước nguyện của Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2321 = "「Vì vậy, tốt nhất là đừng nên cất giấu kỷ\nniệm.\nĐược đón nhận kích thích, được khuấy\nđộng lên sẽ tốt hơn nhiều.」"

# monologue
# JP: ひどく照れ、ごにょごにょ話しているがゆえ、\n何を言わんとしているかがかえって伝わってくる。
3665 = "「Nhưng……mà――」"

# 【ふかみ】
# display as 深美
# JP: 「えと――ふたりの、大事な思い出の場所だから……\n凪ちゃんだけには……入って来てほしくない、かも」
2329 = "Fukami, hiếm khi tỏ vẻ bất mãn."

# 【双鉄】
# display as 雙鐵
# JP: 「それは、何故だ？」
2828 = "Muốn nghe cảm xúc chân thật của em ấy,\ntôi\ntừ từ chờ đợi những lời tiếp theo."

# 【ふかみ】
# display as 深美
# JP: 「なぜって、だって――大事な思い出……\n凪ちゃんの明るいのに、上書きされちゃいそう、で」
2463 = "「Điều đó――rất giống tính cách của anh\nSoutetsu nhưng……\nnếu là em, có lẽ em sẽ\nthấy hơi, buồn một chút, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……」
2326 = "「Buồn sao?」"

# monologue
# JP: 繊細で、感受性が強いのだなとつくづく思う。\n僕とは大きく異なっている。
3472 = "「Nếu là em……lần đầu tiên cùng anh\nSoutetsu,\nchỉ có hai người, ở……ừm, trong\nphòng hay gì đó……dạ.」"

# monologue
# JP: そうした部分も愛おしいゆえ、\nただ正直に、自分の思いをふかみに伝える。
3296 = "「À.」"

# 【双鉄】
# display as 雙鐵
# JP: 「上書きされて、塗りつぶされる程度ならば、\nそれは最初から、大した思い出ではないのだと思う」
2492 = "Vì em ấy vô cùng ngượng ngùng, nói năng lí\nnhí,\nnên tôi lại càng hiểu rõ em ấy đang\nđịnh nói gì."

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
# 2421 = "「啊？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この切り株での凪との思い出もそうだし、無論、\nふかみとのふたりきりでの思い出もそうだが――」
2241 = "「Dạ――vì đó là nơi chứa đựng kỷ niệm quan\ntrọng của hai người……\nnên có lẽ em……không\nmuốn chỉ riêng Nagi bước vào đó.」"

# 【ふかみ】
# display as 深美
# JP: 「はうっ」
2383 = "「Đó là, tại sao?」"

# monologue
# JP: 驚き固まっていた顔が、今度は含羞の華を咲かせる。
3218 = "「Tại sao á, tại vì――kỷ niệm quan trọng……\ncó vẻ như sẽ bị sự tươi sáng của Nagi, ghi\nđè lên mất, ạ.」"

# monologue
# JP: 言葉を、全て伝えたときに、\nふかみがどんな顔になるのか――見たいと、思う。
3413 = "「Ưm……」"

# 【双鉄】
# display as 雙鐵
# JP: 「確信出来る。本当に大事な思い出は、何があろうと、\n決して塗りつぶされも、損なわれもしない」
2554 = "Tôi chợt nhận ra em ấy thật tinh tế và\nnhạy cảm.\nKhác xa với tôi."

# 【ふかみ】
# display as 深美
# JP: 「でも、新しいことがあったら、前の思い出、\n変わらなくても……余分が混じっちゃうっていうか」
2188 = "Cũng vì yêu cả những khía cạnh đó,\nnên tôi\nchỉ thành thật truyền đạt suy nghĩ của\nmình cho Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「余分とさえもならんだろう。\n少なくとも、ふかみと、凪と、僕とであるなら」
2873 = "「Nếu chỉ ở mức độ bị ghi đè, bị bôi xóa,\nthì anh nghĩ ngay từ đầu, đó đã không phải\nlà một kỷ niệm đáng giá rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「……そうなら、いいんですけど」
1680 = "「Ể!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「現に、今もだ。凪との大切な思い出の場所に、\nふかみとの、鮮やかな思い出が加わって――」
2712 = "「Kỷ niệm với Nagi ở gốc cây này cũng vậy,\nvà tất nhiên,\ncả những kỷ niệm khi chỉ có\nhai người với Fukami cũng thế――」"

# monologue
# JP: 瞬間、閃く。\nそうだ、これは……これは、例えば絵なのだと。
3456 = "「Hau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が絵を描くところを間近にじっくり\n見たことがあるか？」
2200 = "Khuôn mặt đang cứng đờ vì ngạc nhiên, giờ\nlại nở rộ nụ hoa e lệ."

# 【ふかみ】
# display as 深美
# JP: 「え？　いえ――そんなの無理です。だって、\n日々姫さん、わたしとかが見ようとしたって」
2417 = "Khi tôi truyền đạt hết mọi lời muốn nói,\nFukami sẽ có biểu cảm như thế nào đây――tôi\nmuốn nhìn thấy nó."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、今でもそうなのか。まぁ、では想像してくれ。\nことばで、なんとか説明してみる」
2325 = "「Anh có thể khẳng định. Những kỷ niệm thực\nsự quan trọng, dù có chuyện gì xảy ra,\ncũng tuyệt đối không bao giờ bị bôi xóa\nhay phai mờ.」"

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2479 = "「好的」" 

# monologue
# JP: ふかみが、そっと目を閉じる。
3661 = "「Nhưng, nếu có chuyện mới xảy ra, kỷ niệm\ncũ,\ndù không thay đổi……thì cũng sẽ bị lẫn\nlộn những thứ dư thừa vào, ạ.」"

# monologue
# JP: 健気だ、かわいい、キスしたい――\n反射で思うが、今、唇には、別の大事な用がある。
3300 = "「Sẽ chẳng có gì là dư thừa cả đâu.\nÍt nhất\nlà, nếu đó là Fukami, Nagi, và anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が川の絵を描いている。\nとても美しい水色を置く。それが最初の思い出だ」
2602 = "「……Nếu được vậy, thì tốt quá.」"

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2479 = "「好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこに日々姫は、まったく別の色を重ねるのだ。\n例えばそれは緑、白。ときには、黄色や赤さえも」
2706 = "「Thực tế là, ngay lúc này đây. Tại nơi\nchứa đựng kỷ niệm quan trọng với Nagi,\nlại\ncó thêm một kỷ niệm sống động với\nFukami――」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2386 = "「啊！」" 

# monologue
# JP: なにか、思い当たるところがあるのだろか？\nふかみの声は、驚きよりは納得に近いものに聞こえる。
3565 = "Khoảnh khắc đó, tôi chợt lóe lên một ý\nnghĩ.\nĐúng rồi, điều này……điều này, ví dụ\nnhư một bức tranh vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして新しい色を重ねていく。幾重にも幾重にも。\nそれがいつしか、いつの間に、ひとつの調和を生み」
2705 = "「Em đã từng ở gần và chăm chú xem\nHibiki\nvẽ tranh bao giờ chưa?」"

# 【ふかみ】
# display as 深美
# JP: 「単純な水の色じゃない。本当の、川の色になってる」
2845 = "「Dạ? Không――chuyện đó là không thể nào đâu\nạ. Bởi vì,\nHibiki á, dù cho em hay ai khác\ncó muốn xem đi nữa thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。水色は青に。\n青は、よりふかみを得た碧になる」
2144 = "「À, bây giờ con bé vẫn vậy sao. Thôi thì,\nem hãy tưởng tượng nhé.\nAnh sẽ cố gắng\ngiải thích bằng lời vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 2386 = "「啊！」" 

# monologue
# JP: ああ、この顔か。\nふかみの顔は笑顔でもなく、無論、泣き顔でもなくて。
3519 = "Fukami, khẽ nhắm mắt lại."

# monologue
# JP: 水が器を満たすがごときよろこびを――\n表情というより、むしろあたたかさをたたえている。
3298 = "Thật ngoan ngoãn, đáng yêu quá, muốn hôn\nem ấy ghê――\nTôi phản xạ nghĩ vậy, nhưng\nbây giờ, đôi môi tôi còn có một việc quan\ntrọng khác phải làm."

# 【双鉄】
# display as 雙鐵
# JP: 「思い出も、色のようなものかと思う。\n塗り潰すのではなく塗り重ね、唯一無二の物になる」
2457 = "「Hibiki đang vẽ một bức tranh về dòng\nsông.\nCon bé tô một màu xanh nước biển\ntuyệt đẹp. Đó là kỷ niệm đầu tiên.」"

# 【ふかみ】
# display as 深美
# JP: 「はいっ！」
2645 = "「Lên trên màu xanh đó, Hibiki tô đè lên\nnhững màu sắc hoàn toàn khác biệt.\nVí dụ\nnhư màu xanh lá cây, màu trắng. Đôi khi,\nthậm chí là cả màu vàng hay màu đỏ nữa.」"

# monologue
# JP: 大きな頷き。\nそしてふかみは、そっと切り株に手を添える。
3602 = "Có lẽ em ấy đã chợt nhận ra điều gì đó\nchăng?\nGiọng nói của Fukami nghe giống như\nsự thấu hiểu hơn là ngạc nhiên."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんと双鉄おにいさんの大事な思い出に、\n今わたしたちが、きっと、おもいでをかさねてる」
2713 = "「Và cứ thế tô đè những màu sắc mới lên.\nHết lớp này đến lớp khác.\nĐể rồi không\nbiết từ lúc nào, chúng tạo ra một sự hài\nhòa,」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。それは恐らく――\nとてもしあわせなことだと思う」
2619 = "「Không còn là màu nước đơn thuần nữa. Mà\ntrở thành màu của dòng sông thực sự.」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2432 = "「嗯」" 

# monologue
# JP: ふかみが頷く。
# 3668 = "深美點了點頭。" 

# monologue
# JP: そうしてくるり、振り返り、\nまた跳ねるような一歩を踏み出す。
3501 = "「Đúng vậy đấy. Màu nước biển sẽ hòa vào\nmàu xanh lam.\nMàu xanh lam, sẽ trở thành\nmàu xanh biếc có chiều sâu hơn.」"

# 【ふかみ】
# display as 深美
# JP: 「だったら、わたし、重ねたいです。\n凪ちゃんとの思い出の上に、もっと新しい思い出を」
2829 = "「!」"

# 【双鉄】
# display as 雙鐵
# JP: 「のぞむところだ。重ねていこう」
2685 = "À, ra là biểu cảm này sao.\nKhuôn mặt\nFukami không phải là nụ cười, và tất\nnhiên, cũng không phải là khuôn mặt đang\nkhóc."

# monologue
# JP: ふかみと、歩く。ゆっくり歩く。
3464 = "Đó là niềm vui sướng như khi nước lấp đầy\nchiếc bình――\nHơn cả một biểu cảm, nó toát\nlên một sự ấm áp."

# monologue
# JP: 森のトンネルをくぐりぬければ、\n陽射しを遮るものがなくなる。
3697 = "「Anh nghĩ kỷ niệm, cũng giống như màu sắc\nvậy.\nKhông phải là bôi xóa đi mà là tô đè\nlên, để trở thành một thứ độc nhất vô\nnhị.」"

# 【双鉄】
# display as 雙鐵
# JP: 「暑くはないか？」
2707 = "「Vâng ạ!」"

# 【ふかみ】
# display as 深美
# JP: 「暑くない……っていったら、\nウソになっちゃうです」
2776 = "Một cái gật đầu thật mạnh.\nVà rồi Fukami,\nkhẽ đặt tay lên gốc cây."

# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ」
2570 = "「Lên trên kỷ niệm quan trọng của Nagi và\nanh Soutetsu,\nbây giờ chúng ta, chắc chắn,\nđang tô đè thêm kỷ niệm của mình lên đó.」"

# monologue
# JP: さきほどからふかみの足取りが、\nじわじわ重くなっている。
3366 = "「Đúng vậy. Anh nghĩ điều đó có lẽ――\nlà một\nchuyện vô cùng hạnh phúc.」"

# monologue
# JP: ならば、だ。
3513 = "「Vâng.」"

# monologue
# JP: （ぴとっ）
3922 = "Fukami gật đầu."

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！！？　なっ、なにっ！？」
2295 = "Sau đó em ấy xoay người, ngoảnh lại,\nvà\nlại bước một bước như đang bật nhảy."

# 【双鉄】
# display as 雙鐵
# JP: 「水だ。補給した方がいい」
2681 = "「Nếu vậy, em, muốn được tô đè lên ạ.\nLên\ntrên kỷ niệm với Nagi, những kỷ niệm mới\nmẻ hơn nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「わ、助かります。\n双鉄おにいさん、買っておいてくれたんですね」
2311 = "「Đúng như anh mong muốn. Cùng nhau tô đè\nlên nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。線路沿いの自販機の位置ならば、\nおそらくほとんど把握しているぞ」
2620 = "Cùng Fukami, bước đi. Chầm chậm bước đi."

# monologue
# JP: とはいえ、今日はふかみと一緒だ。
3782 = "Băng qua đường hầm rừng cây,\nkhông còn gì\nche chắn ánh nắng mặt trời nữa."

# monologue
# JP: 線路沿いに置き去りなどできないがゆえ、\nあらかじめ、出る前に準備しておいた。
3374 = "「Em có thấy nóng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぬるくなってしまったがな。飲め」
2143 = "「Bảo không nóng……\nthì là nói dối mất, ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「ぬるい方が嬉しい、です。\n今いきなり冷たいのとか、おなか、こわしちゃいそう」
2659 = "「Chắc vậy rồi.」"

# monologue
# JP: 言いながら、ふかみはペットボトルを開けて、\nゆるゆる、喉へと水を落とす。
3784 = "Từ lúc nãy, bước chân của Fukami,\nđã dần\ndần trở nên nặng nề hơn."

# 【ふかみ】
# display as 深美
# JP: 「んくッ――んくっ――んくっ――ぷあぁ」
2302 = "Nếu vậy, thì."

# monologue
# JP: 半分ほどを一気に飲んで口を離して、\nそれからはっと気づいたように――
3282 = "（Chạm nhẹ）"

# monologue
# JP: （つうっ）
3909 = "「Hya!!? G, gì vậy!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2386 = "「啊！」" 

# monologue
# JP: 小指の先で、ペットボトルの口を拭く。
3817 = "「Nước đây. Em nên bổ sung nước đi.」"

# monologue
# JP: わざわざそうして見せてから、\n僕へと、ボトルを差し出してくる。
3259 = "「Oa, may quá.\nAnh Soutetsu, đã mua sẵn rồi\nnhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……双鉄おにいさんも、お水」
2858 = "「À ừ. Vị trí của các máy bán hàng tự động\ndọc đường ray,\nanh gần như nắm rõ hết mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いただこう」
2434 = "Mặc dù vậy, hôm nay có Fukami đi cùng."

# monologue
# JP: 天然の色香というのか――こういう仕草を見るたびに、\nふかみはふかみとつくづく思う。
3544 = "Vì không thể bỏ mặc em ấy dọc đường ray\nđược,\nnên tôi đã chuẩn bị sẵn trước khi\nxuất phát."

# monologue
# JP: 他の誰からも感じない、“おんな”の深さを、\nかくも年若いふかみが何ゆえ有するものか――
3804 = "「Nước hơi ấm rồi đấy. Uống đi em.」"

# 【ふかみ】
# display as 深美
# JP: 「ん……」
# 2326 = "「唔……」" 

# monologue
# JP: とんとんと、ふかみが自分の足を、\nふくらはぎを叩いていく。
3595 = "「Nước ấm lại càng tốt, ạ.\nBây giờ mà uống\nnước lạnh đột ngột, chắc em đau bụng mất.」"

# monologue
# JP: ごく無造作に前屈するから、\n裾が長いといえどもやはり、足はそれなりに露出する。
3304 = "Vừa nói, Fukami vừa mở chai nhựa,\ntừ từ,\nnuốt từng ngụm nước xuống cổ họng."

# monologue
# JP: （白い……な、本当にすらりとしている）
3887 = "「Ực――ực――ực――puaa」"

# monologue
# JP: 女性美と、\nいまだ女になりきらぬ、厚みを持たぬ肉付きと。
3803 = "Uống một hơi hết khoảng một nửa rồi rời\nmiệng khỏi chai,\nsau đó như chợt nhận ra\nđiều gì――"

# 【ふかみ】
# display as 深美
# JP: 「ん～っ！」
2433 = "（Quẹt）"

# monologue
# JP: 今度は大きく腕を伸ばす。\nワンピースの背が汗で張り付き――
3502 = "Em ấy dùng đầu ngón út, lau miệng chai\nnhựa."

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2333 = "Cố tình làm vậy cho tôi thấy, rồi\nđưa chai\nnước về phía tôi."

# monologue
# JP: なんだ、今何か違和感が――
3370 = "「Dạ……anh Soutetsu cũng, uống nước đi ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？」
2906 = "「Ừ, anh xin nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
2322 = "Gọi là sự quyến rũ bẩm sinh hay sao――mỗi\nkhi nhìn thấy những cử chỉ thế này,\ntôi\nlại càng thấm thía rằng Fukami chính là\nFukami."

# monologue
# JP: 違和感の正体をつきとめるより、\n先にやるべきことがある。
3685 = "Sự sâu sắc của một \"người phụ nữ\" mà tôi\nkhông cảm nhận được từ bất kỳ ai khác,\ntại\nsao một Fukami còn trẻ tuổi như vậy lại sở\nhữu nó chứ――"

# 【双鉄】
# display as 雙鐵
# JP: 「歩きつかれたか」
2217 = "Tonton, Fukami dùng tay,\nđấm nhẹ lên bắp\nchân của mình."

# 【ふかみ】
# display as 深美
# JP: 「です、ね。ちょっと……\n座って、やすみたいかも、です」
2647 = "Vì em ấy cúi gập người một cách rất tự\nnhiên,\nnên dù gấu váy có dài thì đôi chân\nvẫn lộ ra khá nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「もう少しだけは歩けるか？　――ああ、いや」
2875 = "（Trắng quá……thật sự rất thon thả.）"

# monologue
# JP: あと一キロもいかないうちに、\n状態のよい廃駅がひとつある。
3257 = "Vẻ đẹp của phụ nữ, cùng với\nlớp da thịt\nmỏng manh, chưa hoàn toàn trở thành phụ\nnữ."

# monologue
# JP: その程度の距離なら、なにほどもない。
3805 = "「Ưm~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おぶっていこう。背中に乗れ」
2575 = "Lần này em ấy vươn tay duỗi người thật\nrộng.\nPhần lưng của chiếc váy liền dính\nbết mồ hôi――"

# monologue
# JP: 瞬間、ふかみの笑顔が弾ける。\nふわりと僕に近づいてきて、甘い匂いが――
3694 = "Gì thế này, vừa rồi tôi có cảm giác hơi kỳ\nlạ――"

# monologue
# JP: せっけんと、おひさまと、汗とが混じった匂いが、\n一瞬に、僕に貼り付き、包み込む。
3827 = "「Anh Soutetsu?」"

# 【ふかみ】
# display as 深美
# JP: 「はい！！」
2480 = "「À, không có gì.」"

# 【ふかみ】
# display as 深美
# JP: 「わぁ」
# 2305 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よし、ここまでだ」
2484 = "Thay vì tìm ra nguyên nhân của cảm giác kỳ\nlạ đó,\ncòn có việc cần phải làm trước."

# monologue
# JP: ホームにあがってふかみを下ろせば、\n薄紅の頬がぷっと膨らむ。
3789 = "「Em đi bộ mệt rồi à?」"

# 【ふかみ】
# display as 深美
# JP: 「もう少しだけ……\nおんぶしてて欲しかった、かもです」
2580 = "「Dạ, vâng. Em hơi……\nmuốn ngồi xuống, nghỉ\nngơi một chút, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、それは帰りのお楽しみだ。\n今は、少し座って、足を伸ばして休め」
2865 = "「Em cố đi thêm một chút nữa được không?\n――À, không.」"

# 【ふかみ】
# display as 深美
# JP: 「はぁい」
# 2479 = "「好的」" 

# monologue
# JP: 甘えた声で、スネたふり。\nふかみはベンチに腰掛けて――
3742 = "Đi chưa đầy một kilomet nữa,\nsẽ có một nhà\nga bỏ hoang còn khá nguyên vẹn."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？\nわたしのとなり、空いてますよ？」
2904 = "Khoảng cách cỡ đó thì chẳng nhằm nhò gì."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば失礼しよう」
2637 = "「Anh cõng em đi nhé. Lên lưng anh nào.」"

# monologue
# JP: 並んでベンチに腰掛けたなら、\nふかみはきょろきょろ、興味深そうにあたりを見渡す。
3393 = "Khoảnh khắc đó, nụ cười của Fukami bừng\nsáng.\nEm ấy nhẹ nhàng tiến lại gần tôi, và\nmột mùi hương ngọt ngào――"

# 【ふかみ】
# display as 深美
# JP: 「窓からしか、見たことなかったけど……\nこれが――廃駅、です？」
2550 = "Mùi xà phòng, mùi nắng, hòa quyện cùng mùi\nmồ hôi,\ntrong nháy mắt, bám lấy tôi, bao\nbọc lấy tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。大廃線が来る直前に、地元の強い要望で\n整備されたばかりだったものと聞いている」
2630 = "「Vâng!!」"

# 【ふかみ】
# display as 深美
# JP: 「地元の、強い、要望？」
2664 = "「Oa.」"

# monologue
# JP: 実に不思議そうな声。ひとまわりも離れていないのに、\n世代の壁を感じてしまう。
3568 = "「Được rồi, đến đây thôi.」"

# monologue
# JP: 少なくとも僕らと知り合う前のふかみにとって、\n鉄道は、完全な遺物だったのだろう。
3755 = "Lên đến sân ga, tôi đặt Fukami xuống,\nđôi\ngò má phơn phớt hồng của em ấy phồng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道にも、そうした時期があったのだ。\n公共の交通手段として、大いに期待されていた時代が」
2888 = "「Em muốn……\nđược cõng thêm một chút nữa,\ncơ.」"

# 【ふかみ】
# display as 深美
# JP: 「だから、わりと綺麗……っていうか、\n屋根とかちゃんとありますもんね、ここ」
2588 = "「Nếu vậy thì, hãy để dành niềm vui đó lúc\nvề nhé.\nBây giờ, em ngồi xuống, duỗi chân\nra nghỉ ngơi một chút đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。\nここなど、非常に簡易的ではあるが、待合室だ」
2634 = "「Vâng ạ.」"

# monologue
# JP: 通学のため、とかそんな理由で\n設置された駅であったかと記憶している。
3467 = "Giọng nói nũng nịu, giả vờ hờn dỗi.\nFukami\nngồi xuống băng ghế――"

# monologue
# JP: 大人四人も座れないこの待合室の小さなベンチを、\n学園生が奪い合う。そんな時間もあったのだろうか。
3678 = "「Anh Soutetsu?\nChỗ bên cạnh em, còn trống\nnày?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、双鉄おにいさん、これ！\n落書き、のこってます」
2405 = "「Vậy sao. Thế thì anh không khách sáo\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。相合傘か」
2839 = "Ngồi cạnh nhau trên băng ghế,\nFukami ngó\nnghiêng, tò mò nhìn quanh."

# 【ふかみ】
# display as 深美
# JP: 「けんじさんと、まなみちゃん――。\nふたり、今はどうしてるんでしょうね？」
2224 = "「Em mới chỉ nhìn qua cửa sổ thôi……\nĐây\nlà――nhà ga bỏ hoang, ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まるで検討もつかん――が……」
2826 = "「Ừ. Anh nghe nói ngay trước khi Đại bãi bỏ\ncác tuyến đường sắt diễn ra,\nnó vừa mới\nđược tu sửa theo nguyện vọng tha thiết của\nngười dân địa phương.」"

# monologue
# JP: 相合傘が書かれているのは、\n駅の廃止を告知しているポスターの端。
3684 = "「Nguyện vọng, tha thiết, của người dân địa\nphương ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「……もう、お別れしちゃってるかもしれませんね。\n『さよなら』って書かれてるポスターに相合傘とか」
2583 = "Một giọng nói vô cùng ngạc nhiên. Dù cách\nnhau chưa đến một giáp,\nnhưng tôi vẫn cảm\nnhận được rào cản thế hệ."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、配慮がなさすぎる気もするが――\nどうかな。案外、逆かもしれんぞ？」
2729 = "Ít nhất thì đối với Fukami trước khi quen\nbiết chúng tôi,\nđường sắt, hoàn toàn là\nmột di tích của quá khứ."

# 【ふかみ】
# display as 深美
# JP: 「逆？　ですか？」
2717 = "「Đường sắt, cũng từng có thời kỳ như vậy.\nThời kỳ mà nó được kỳ vọng rất nhiều với\ntư cách là phương tiện giao thông công\ncộng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。例えば……そうだな。\nこっそり付き合ってるカップルなどだ」
2438 = "「Thảo nào, chỗ này khá sạch sẽ……hay phải\nnói là,\nmái che các thứ vẫn còn nguyên vẹn\nnhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「こっそり……男の子同士とか？」
2530 = "「Đúng vậy.\nChỗ này tuy rất sơ sài, nhưng\ncũng là phòng chờ đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「男の子同士」
2882 = "Tôi nhớ mang máng đây là nhà ga được xây\ndựng\nvới lý do phục vụ cho việc đi học hay\ngì đó."

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　いまわたし、声っ」
2413 = "Băng ghế nhỏ trong phòng chờ này, đến bốn\nngười lớn ngồi còn không đủ,\ncác học sinh\ntranh giành nhau. Đã từng có khoảng thời\ngian như vậy sao."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、その可能性もあるかもしれんな。が、\n僕が想定していたのは、受験で交際を禁じられてる」
2649 = "「A, anh Soutetsu, nhìn này!\nVẫn còn hình\nvẽ bậy này.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　ですね！！　そっち！\n多分わたしも、そっちの方だと思います！　です！」
2396 = "「Đúng thật. Là ô che chung sao.」"

# monologue
# JP: ひどく慌てて、わたわた手を振り。\nごまかすように、ふかみはポスターへと視線を戻す。
3588 = "「Anh Kenji, và bé Manami――.\nHai người họ,\nbây giờ thế nào rồi nhỉ?」"

# 【ふかみ】
# display as 深美
# JP: 「でもでも！　こっそりつきあってるからって、\nなんで廃駅のポスターに――――あ」
2180 = "「Anh hoàn toàn không đoán được――nhưng……」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう。それは恐らく、駅ごと壊され、破棄される。\nそうしたものだと、想像されるであろうから」
2502 = "Hình ô che chung được vẽ ở,\ngóc của tấm áp\nphích thông báo việc nhà ga ngừng hoạt\nđộng."

# 【ふかみ】
# display as 深美
# JP: 「人に知られちゃいけない関係。だけど、\n思い出をどこかにこっそり刻んでおきたい」
2172 = "「……Có khi, họ đã chia tay rồi cũng nên.\nVẽ\nô che chung lên tấm áp phích ghi chữ \"Tạm\nbiệt\" thế này mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いつも通学に使っていた駅の思い出とともに――\nこっそり刻んだ思い出は、永遠に眠り続ける」
2173 = "「Đúng là có cảm giác hơi thiếu tế nhị\nthật――\nnhưng ai biết được. Có khi lại\nngược lại đấy?」"

# 【ふかみ】
# display as 深美
# JP: 「それって！　それってすごくロマンチックです！」
2820 = "「Ngược lại? Là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「駅舎やその付随設備への落書きは、鉄道事業者の\n一員として、ご遠慮願いたいところではあるのだが」
2142 = "「Ừm. Ví dụ như……để xem nào.\nMột cặp đôi\nđang lén lút hẹn hò chẳng hạn.」"

# monologue
# JP: しかし……まぁ、\n丸みを帯びた、おそらくは若者の文字だ。
3146 = "「Lén lút……hai bạn nam với nhau ạ?」"

# monologue
# JP: 役割を終え、剥がされるであろうポスタ－に、\nというところにも、目こぼしの余地を感じはする。
3737 = "「Hai bạn nam với nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、ロマンチックであるかもしれんな。\nふたりが今も続いて欲しいという気持ちはするよ」
1690 = "「Ể!? Vừa nãy em, lỡ nói to quá」"

# 【ふかみ】
# display as 深美
# JP: 「ですよね！」
2623 = "「Đúng là cũng có khả năng đó. Nhưng,\nanh\nđang giả định trường hợp bị cấm hẹn hò vì\nkỳ thi tuyển sinh cơ.」"

# monologue
# JP: ふかみの瞳が、いっそう熱心にきょろきょろ動く。
3629 = "「A! Đúng rồi!! Là cái đó!\nChắc em cũng,\nnghĩ theo hướng đó! Ạ!」"

# monologue
# JP: が、ほどなくして僕の顔へと。\nどこか、しゅうんとしてしまってる。
3171 = "Fukami hoảng hốt khua tay múa chân.\nNhư để\nđánh trống lảng, em ấy dời mắt về phía tấm\náp phích."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
# 2526 = "「怎麼了？」" 

# 【ふかみ】
# display as 深美
# JP: 「見つからなくて。わたしと双鉄おにいさんで、\nなにか、ここで、思い出を重ねられるようなもの」
2593 = "「Nhưng mà! Cho dù có lén lút hẹn hò đi\nnữa,\nthì tại sao lại vẽ lên áp phích nhà\nga bỏ hoang――――a.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。廃がつくとはいえ駅だしな。\n今もまだ、御一夜鉄道の資産のはずであろうし」
2442 = "「Đúng vậy. Có lẽ là vì, cả nhà ga sẽ bị\nphá hủy và vứt bỏ.\nHọ đã tưởng tượng ra\nviễn cảnh đó.」"

# 【ふかみ】
# display as 深美
# JP: 「それは、わかってます。です」
2827 = "「Một mối quan hệ không được để ai biết.\nNhưng,\nhọ vẫn muốn lén lút khắc ghi kỷ\nniệm ở một nơi nào đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。そこを無視するなら、\nいくらでも選択肢はあるのだろうが――」
2627 = "「Cùng với kỷ niệm về nhà ga luôn gắn bó\nvới quãng đời học sinh――\nkỷ niệm được lén\nlút khắc ghi ấy, sẽ ngủ yên mãi mãi.」"

# monologue
# JP: ふかみの頭を、くしくし撫でる。
3430 = "「Như vậy! Như vậy lãng mạn quá đi mất!」"

# 【ふかみ】
# display as 深美
# JP: 「わ！？　いきなり、どうしたんです？」
2316 = "「Việc vẽ bậy lên nhà ga và các thiết bị đi\nkèm,\nvới tư cách là một thành viên của\ncông ty đường sắt, anh không hoan nghênh\nchút nào đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふかみは賢く、良い子で。\nゆえに、我慢をしてくれるのだと思ってな」
2688 = "Tuy nhiên……chà,\nnhững nét chữ tròn trịa\nnày, có lẽ là của những người trẻ tuổi."

# 【ふかみ】
# display as 深美
# JP: 「あ――……えへ、へ」
2367 = "Hơn nữa lại vẽ lên tấm áp phích sắp bị bóc\nđi vì đã hết giá trị sử dụng,\nđiều đó cũng\nkhiến tôi cảm thấy có thể nhắm mắt làm ngơ\nđược."

# monologue
# JP: ふかみの瞳が、いかにも心地よさげに細まる。\nくったり僕に体を預け、もっと撫でろと要求してくる。
3586 = "「……Đúng là, có lẽ cũng lãng mạn thật.\nAnh\ncũng mong hai người họ bây giờ vẫn còn ở\nbên nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「髪の手触りが、いつもと違うな。\nこれはこれで、ここちいい」
2210 = "「Đúng không ạ!」"

# 【ふかみ】
# display as 深美
# JP: 「え？　そうですか？\nシャンプーとか、別に変えたりしてないですけど」
2416 = "Đôi mắt Fukami càng thêm háo hức ngó\nnghiêng xung quanh."

# 【双鉄】
# display as 雙鐵
# JP: 「汗か、あるいは湿度だろうな」
2642 = "Nhưng chẳng bao lâu sau lại hướng về phía\nkhuôn mặt tôi.\nTrông có vẻ ỉu xìu đi đôi\nchút."

# monologue
# JP: いつもは絹糸のごとき髪だが、\n今日はわずかにじゃれついてくる。
3352 = "「Sao vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……っと、すまんな。思わず撫でてしまった。\n髪形を乱してしまいかねんか」
1679 = "「Em không tìm thấy. Thứ gì đó,\nđể em và\nanh Soutetsu, có thể tô đè kỷ niệm của\nchúng ta lên đây.」"

# 【ふかみ】
# display as 深美
# JP: 「乱して、いい、です。\nそれもきっと、重なる、素敵な思い出だから」
2515 = "「Ừm. Dù có thêm chữ 'bỏ hoang' thì nó vẫn\nlà nhà ga mà.\nBây giờ chắc chắn nó vẫn là\ntài sản của Đường sắt Ohito.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん、そうだな」
2615 = "「Chuyện đó, em biết chứ. Ạ.」"

# monologue
# JP: ふかみは、賢い。\n僕が思っているより、ずっと。
3579 = "「Cũng phải. Nếu phớt lờ chuyện đó,\nthì có\nvô vàn lựa chọn khác nhau, nhưng――」"

# monologue
