[script]
# lines: 709 
# 【ふかみ】
# display as 深美
# JP: 「陽射し、強くて気持ちいい、です」
2898 = "「Ánh nắng, thật chói chang và dễ chịu, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2432 = "「Ừm」"
# monologue
# JP: ワンピースと麦わら帽子を新調したので、\nお出かけしたい。
3525 = "Vừa mới mua một chiếc váy liền và mũ rơm mới,\nnên em muốn đi chơi."
# monologue
# JP: ふかみの普段の好みからして、街歩き――\nそう予測して、身支度を整えてきたのだが。
3437 = "Dựa vào sở thích thường ngày của Fukami, dạo phố——\nDự đoán như vậy, nên tôi đã chuẩn bị trang phục sẵn sàng."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん。服、暑くないですか？」
2905 = "「Anh Soutetsu. Mặc thế này, không nóng sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「機関士だからな。暑さには強い」
2562 = "「Anh là \\\\x%l機関士;#00ffc040;lái tàu%l;#; mà. Chịu nóng rất giỏi」"
# monologue
# JP: 僕はいつもと同じ恰好。暑さは感じてないにせよ、\n保線まわりには、いささか場違いな感がある。
3453 = "Tôi vẫn ăn mặc như thường lệ. Dù không cảm thấy nóng,\nnhưng quanh khu vực \\\\x%l保線;#00ffc040;bảo trì đường ray%l;#; này, có vẻ hơi lạc lõng."
# monologue
# JP: それに引き換え――
3741 = "Ngược lại với tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「意外なほど、絵になるものだな」
2534 = "「Đẹp như một bức tranh, đến mức bất ngờ đấy」"
# 【ふかみ】
# display as 深美
# JP: 「絵に、って、何が……です？」
2134 = "「Bức tranh, là, cái gì cơ…… ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみがだ。\n麦わら帽子。真っ白なワンピース。夏の終わりの線路」
2505 = "「Là Fukami đó.\nMũ rơm. Váy trắng tinh khôi. Và tuyến đường sắt cuối mùa hè」"
# monologue
# JP: 驚いたように、ふかみの足がぴたりと止まる。
3667 = "Như thể ngạc nhiên, bước chân của Fukami đột ngột dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いを散歩したいと言われたときは正直驚いた。\nが……いや、これは素晴らしいデートだな」
2786 = "「Khi em nói muốn đi dạo dọc theo tuyến đường sắt, thành thật mà nói anh rất ngạc nhiên.\nNhưng…… chà, đây đúng là một buổi hẹn hò tuyệt vời」"
# 【ふかみ】
# display as 深美
# JP: 「はぅぅ」
2427 = "「A ư」"
# monologue
# JP: 照れたのか、ふかみは一瞬身をすくめ、\n逃げ出すようにまた歩き出す。
3567 = "Chắc là xấu hổ, Fukami rụt người lại trong chốc lát,\nrồi lại bước đi như muốn trốn chạy."
# monologue
# JP: スカートがひるがえるその様さえが、やはり、絵だ。
3302 = "Ngay cả dáng vẻ tung bay của chiếc váy, quả thực, cũng đẹp như một bức tranh."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは、自分でわかっていたのか？」
2216 = "「Fukami, em tự biết điều đó sao?」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わかってたって、なにが、です？」
2719 = "「Biết, biết gì cơ, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いと、今日のふかみが、\nこれほど鮮やかな絵になることが、だ」
2752 = "「Việc tuyến đường sắt và Fukami của ngày hôm nay,\nlại trở thành một bức tranh sống động đến thế này」"
# 【ふかみ】
# display as 深美
# JP: 「え？　そんなことで全然。\nただ――わたし、ただ知りたくて、知ってみたくて」
2418 = "「Hả? Không hề có chuyện đó đâu.\nChỉ là—— em, chỉ muốn biết, muốn thử tìm hiểu xem sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにをだ？」
2155 = "「Tìm hiểu cái gì?」"
# 【ふかみ】
# display as 深美
# JP: 「あの、なにって――だから、線路とか、\n鉄道のこととか、です」
2859 = "「Dạ, cái gì là—— thì, tuyến đường sắt,\nhay những chuyện về đường sắt, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2635 = "「Ồ」"
# 【ふかみ】
# display as 深美
# JP: 「わ」
2305 = "「Oa」"
# monologue
# JP: ふかみが瞳を丸くする。\nそして楽しげな笑みを浮かべる。
3634 = "Fukami tròn xoe mắt.\nRồi nở một nụ cười vui vẻ."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんは、どうして、です？」
2902 = "「Anh Soutetsu, sao vậy, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうして、とは？」
2701 = "「Sao vậy, là sao?」"
# 【ふかみ】
# display as 深美
# JP: 「嬉しそうな顔。すっごく。いま、にこぉって」
2212 = "「Khuôn mặt trông rất vui. Cực kỳ vui luôn. Vừa nãy, anh cười mỉm đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな顔をしたか」
2565 = "「Anh làm vẻ mặt đó sao」"
# monologue
# JP: 自覚が無かった。思わず、自分の顔に触れてしまう。\nその仕草を見て、ふかみがくすくす、また笑う。
3462 = "Tôi không hề tự nhận thức được. Bất giác, tôi chạm tay lên mặt mình.\nNhìn thấy hành động đó, Fukami lại cười khúc khích."
# 【双鉄】
# display as 雙鐵
# JP: 「……それは、単純に嬉しかったからだろう。\n僕とて、鉄道に深く関わるものだからな」
1694 = "「……Đó, đơn giản là vì anh thấy vui thôi.\nBởi vì anh cũng là người có gắn bó sâu sắc với đường sắt mà」"
# monologue
# JP: ゆえ、ポーレット、ハチロク、れいなに相談し、\n戸惑いつつも、ふかみの望みをすぐに叶えた。
3488 = "Vì vậy, tôi đã bàn bạc với Paulette, Hachiroku, Reina,\nvà dù có chút bối rối, tôi đã ngay lập tức thực hiện mong muốn của Fukami."
# monologue
# JP: 保線見学。\nその名目での、ふかみの立ち入り許可を得た。
3166 = "Tham quan \\\\x%l保線;#00ffc040;bảo trì đường ray%l;#;.\nDưới danh nghĩa đó, tôi đã xin được giấy phép vào khu vực này cho Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「車両や駅ではなく、線路。鉄道の背骨であるのに、\n人の興味がそれ自体にはあまり向かない、地味な存在」
2889 = "「Không phải toa xe hay nhà ga, mà là tuyến đường sắt. Mặc dù là xương sống của đường sắt,\nnhưng lại là một sự tồn tại mờ nhạt, ít được mọi người quan tâm đến bản thân nó」"
# monologue
# JP: 口にしていて、ふと思う。\n双鉄――線路を意味する、僕の名を。
3783 = "Vừa nói, tôi chợt nghĩ.\nSoutetsu—— cái tên của tôi, mang ý nghĩa là tuyến đường sắt song song."
# monologue
# JP: あるいは僕の両親は、「かくあれかし」と願いつつ、\n授けてくれたのではなかろうか。
3484 = "Hoặc có lẽ cha mẹ tôi, vừa mong muốn \\\"hãy trở thành như vậy\\\",\nvừa ban tặng cái tên này cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そこを歩いて、親しみたいと――惚れた女が、\nふかみが願ってくれたのだから、嬉しくない筈が無い」
2560 = "「Người con gái anh yêu, Fukami, đã mong muốn được đi dạo ở đó,\nđược gần gũi với nó—— thì làm sao anh lại không vui cho được」"
# 【ふかみ】
# display as 深美
# JP: 「ふわっ！！」
2309 = "「Oa!!」"
# monologue
# JP: ふかみが耳まで赤くなる。\n心臓を両手で押さえ、ぱたぱた自分で自分を仰ぎ。
3642 = "Fukami đỏ mặt đến tận mang tai.\nEm ôm tim bằng cả hai tay, rồi tự quạt phành phạch cho mình."
# monologue
# JP: 深い呼吸を繰り返し、やだもうと小さくつぶやいて、\nそれから――ようやく僕へと視線を戻してくれる。
3135 = "Hít thở sâu liên tục, khẽ lẩm bẩm \\\"thật tình\\\",\nrồi sau đó—— cuối cùng em cũng đưa mắt nhìn về phía tôi."
# 【ふかみ】
# display as 深美
# JP: 「あの、わたし。そんなに立派なこと考えてたりとか、\nえと、してない――です」
2860 = "「Dạ, em. Không có nghĩ đến những điều lớn lao như vậy đâu,\nưm, không có—— ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかしこうして実際に」
2268 = "「Không, nhưng thực tế là như thế này mà」"
# 【ふかみ】
# display as 深美
# JP: 「わたし、ただ――その、凪ちゃんだけ、鉄道のこと、\n双鉄さんといっしょにしてるのが、うらやましくて」
2552 = "「Em, chỉ là—— chuyện về đường sắt, chỉ có Nagi,\nđược làm cùng với anh Soutetsu, em thấy ghen tị thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2450 = "「À——」"
# 【ふかみ】
# display as 深美
# JP: 「それで、わたしも――双鉄さんと凪ちゃんの世界、\nちょっとでも知れたらいいなって、そう思って」
2590 = "「Nên, em cũng—— muốn biết thêm một chút,\nvề thế giới của anh Soutetsu và Nagi, em đã nghĩ vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、乗ってみるか？　8620の運転台に。\n見学なら、いつでも大歓迎だ」
2855 = "「Vậy, em có muốn thử lên không? Lên \\\\x%l運転台;#00ffc040;buồng lái%l;#; của chiếc 8620.\nNếu là tham quan thì lúc nào cũng hoan nghênh」"
# 【ふかみ】
# display as 深美
# JP: 「わ！　それ、うれしいです！！」
2308 = "「Oa! Thế thì, em vui lắm ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、では――\nそうだな17:10までに御一夜温泉駅に戻って」
2638 = "「Vậy à, thế thì——\nĐúng rồi, hãy quay lại ga Ohitera Onsen trước 17:10 nhé」"
# 【ふかみ】
# display as 深美
# JP: 「あ、今日はダメ！　今日は無理、ですっ」
2400 = "「A, hôm nay không được! Hôm nay không được đâu, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なぜだ」
2447 = "「Hửm? Tại sao?」"
# 【ふかみ】
# display as 深美
# JP: 「だって、あの――えと――そのっ――あの」
2465 = "「Tại vì, cái đó—— ưm—— chuyện đó—— cái đó」"
# monologue
# JP: ふかみのひとみがぐるぐる動く。\n何故かちらちら空を見上げて、自身の体に落ちて――
3615 = "Đôi mắt Fukami đảo quanh liên tục.\nKhông hiểu sao em cứ thỉnh thoảng ngước nhìn lên trời, rồi lại nhìn xuống cơ thể mình——"
# 【ふかみ】
# display as 深美
# JP: 「服、だって。おろしたてで、真っ白で」
2769 = "「Quần áo, mà. Vừa mới mua, lại còn trắng tinh nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かに。煤でよごしてしまうのは、\nあまりにももったいない――ふむ」
2452 = "「À, đúng thật. Bị dính muội than bẩn thì,\nquá là lãng phí—— hừm」"
# 【ふかみ】
# display as 深美
# JP: 「え？　どうしました？」
2411 = "「Hả? Sao vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ならばふかみが運転台を見学するときは、\n日々姫にナッパを借りるのが良いかと思ってな」
2690 = "「Không, nếu vậy khi Fukami tham quan \\\\x%l運転台;#00ffc040;buồng lái%l;#;,\nanh nghĩ mượn \\\\x%lナッパ;#00ffc040;trang phục bảo hộ%l;#; của Hibiki sẽ tốt hơn」"
# 【ふかみ】
# display as 深美
# JP: 「わ！　ナッパ服。\nあれ、わたし、一回着てみたい、です」
2306 = "「Oa! \\\\x%lナッパ服;#00ffc040;Trang phục bảo hộ%l;#;.\nBộ đó, em, cũng muốn mặc thử một lần, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、そのときにはそう手配しよう。\n……ああした服も、ふかみには案外似合いそうだな」
2863 = "「Vậy, lúc đó anh sẽ sắp xếp như thế.\n……Bộ quần áo như vậy, không ngờ lại có vẻ hợp với Fukami đấy」"
# 【ふかみ】
# display as 深美
# JP: 「そ、そう――です、か？」
2660 = "「V, vậy—— sao, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、思うのだがな――\nちょっと、そこに立って見てくれ」
2566 = "「Anh nghĩ vậy đó——\nThử đứng ở đó một chút xem nào」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい。です」
2475 = "「V, vâng. Ạ」"
# monologue
# JP: おずおず、ふかみが僕と向き合う。
3590 = "Rụt rè, Fukami đối mặt với tôi."
# monologue
# JP: 目と目があえばハっとして、\nすぐに背筋を伸ばしてくれる。
3542 = "Bốn mắt chạm nhau, em khẽ giật mình,\nvà ngay lập tức đứng thẳng lưng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。その方が美しい」
2517 = "「Đúng rồi. Như vậy trông đẹp hơn」"
# 【ふかみ】
# display as 深美
# JP: 「…………っ」
1664 = "「…………」"
# monologue
# JP: はにかんで、頬がじわりと赤くなる。\nけれども、顔はうつむかせない。
3630 = "Xấu hổ, đôi má em dần đỏ ửng lên.\nNhưng, em không cúi gằm mặt xuống."
# monologue
# JP: 成長したなと、しみじみ思う。\nそうして、その健やかな成長は――
3471 = "Tôi thấm thía cảm nhận được em đã trưởng thành.\nVà, sự trưởng thành khỏe mạnh đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「……とても、綺麗だ。単純な外観の美しさなら、\nハチロクはひとつの完成形と思っているが――」
1685 = "「……Rất, đẹp. Nếu chỉ nói về vẻ đẹp ngoại hình đơn thuần,\nanh nghĩ Hachiroku là một hình mẫu hoàn hảo, nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「は、ハチロクちゃんは、だって……\nレイルロオドで、トップナンバー、ですし」
2228 = "「H, Hachiroku thì, tại vì……\nLà \\\\x%lレイルロオド;#00ffc040;Railord%l;#;, lại còn là số 1, mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、美しくて当然だ」
2625 = "「Ừ, đẹp là chuyện đương nhiên」"
# monologue
# JP: 国産量産、第一号機、まさに日ノ本一国の、\n威厳と誇りと、美しささえをも示すもの。
3178 = "Sản xuất hàng loạt trong nước, cỗ máy số 1, thực sự thể hiện\nsự uy nghiêm, niềm tự hào, và cả vẻ đẹp của toàn bộ đất nước Hinomoto."
# monologue
# JP: 後に続く全ての妹たちの規範となるに相応しい――\nレイルロオド・ハチロクは、まさにそうした存在だ。
3811 = "Xứng đáng trở thành chuẩn mực cho tất cả những người em gái tiếp bước theo sau——\n\\\\x%lレイルロオド;#00ffc040;Railord%l;#; Hachiroku, chính là một sự tồn tại như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ふかみもハチロクに劣らず、美しい。\nいや……僕の目には、より美しくさえ映る」
2185 = "「Nhưng, Fukami cũng đẹp không kém gì Hachiroku.\nKhông…… trong mắt anh, em thậm chí còn đẹp hơn」"
# 【ふかみ】
# display as 深美
# JP: 「えええっ！？」
2318 = "「Hảảả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、そういう顔などだ」
2509 = "「Đấy, khuôn mặt như thế này chẳng hạn」"
# monologue
# JP: みずみずしさ、あどけなさ、純真さ。
3294 = "Sự tươi trẻ, ngây thơ, thuần khiết."
# monologue
# JP: 長い長い時間を稼働し、数多を見てきたハチロクは、\n――いや、僕も既に失くしていよう、無邪気な表情。
3815 = "Hoạt động trong một thời gian dài đằng đẵng, chứng kiến biết bao điều, Hachiroku,\n——không, ngay cả tôi có lẽ cũng đã đánh mất, biểu cảm ngây thơ ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「[いのち,1]生命そのものの美しさとさえ感じるよ。\nふかみには、伸びゆくものの美が宿っている」
2572 = "「Anh thậm chí còn cảm nhận được vẻ đẹp của chính sinh mệnh.\nTrong Fukami, có ẩn chứa vẻ đẹp của sự vươn lên」"
# 【ふかみ】
# display as 深美
# JP: 「伸びゆくもの……\nなら、それ、凪ちゃんにも、ですよね、きっと」
2539 = "「Sự vươn lên……\nVậy thì, điều đó, Nagi cũng có, đúng không ạ, chắc chắn là vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今日は随分と凪にこだわるな」
2527 = "「Sao thế? Hôm nay em để ý đến Nagi nhiều nhỉ」"
# monologue
# JP: 三人ですごす時間を基本とし、\n凪とふかみ、凪と僕、ふかみと僕――
3383 = "Lấy thời gian ba người ở bên nhau làm cơ bản,\nNagi và Fukami, Nagi và tôi, Fukami và tôi——"
# monologue
# JP: それぞれの組み合わせの時間は、できるだけ\n均等になるよう、週ごとに予定を調整している。
3206 = "Thời gian cho mỗi cặp đôi, được điều chỉnh lịch trình hàng tuần\nsao cho đồng đều nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとふたりでいるときは、凪の話はしない――\nそうした方がいいものかと僕は思っていたが？」
2568 = "「Khi ở riêng hai người với Fukami, sẽ không nói chuyện về Nagi——\nAnh đã nghĩ làm như vậy sẽ tốt hơn cơ mà?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、それはそうです。その方が、\nふたりきりを楽しめます、から――でも……」
2404 = "「A, điều đó thì đúng ạ. Làm như vậy,\nsẽ tận hưởng được thời gian chỉ có hai người, mà—— nhưng……」"
# monologue
# JP: ごにょごにょと、そこから先は聞き取れない。\n背筋もまるまり、顔もうつむいてしまってる。
3573 = "Lầm bầm lí nhí, phần sau đó tôi không nghe rõ.\nLưng em cong lại, mặt cũng cúi gằm xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「そんなしょぼくれた表情さえも、\nふかみのものならば美しい」
2244 = "「Ngay cả biểu cảm tiu nghỉu như vậy,\nnếu là của Fukami thì cũng đẹp」"
# 【ふかみ】
# display as 深美
# JP: 「ひぇっ！？」
2290 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「驚いた顔もだ。嬉しいな。\n今日はとりわけ、いろんな顔を見せてくれる」
2218 = "「Khuôn mặt ngạc nhiên cũng vậy. Anh vui lắm.\nHôm nay đặc biệt, em cho anh thấy rất nhiều biểu cảm khác nhau」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの――あの……双鉄おにいさん。\nほめてもらえて、嬉しいです。嬉しいです、けど――」
2843 = "「A, cái đó—— cái đó…… anh Soutetsu.\nĐược anh khen, em vui lắm. Vui lắm, nhưng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
2269 = "「Nhưng?」"
# monologue
# JP: ふかみの両手が、ほっそりした頬をぐにぐに動かす。
3561 = "Hai bàn tay Fukami xoa xoa nhào nặn đôi má thon thả của mình."
# 【ふかみ】
# display as 深美
# JP: 「そ、そんなこと言われちゃったら。わたし……\nどんな顔していいか、わからなくなっちゃう――です」
2193 = "「B, bị nói như vậy. Em……\nkhông biết nên làm vẻ mặt nào nữa—— ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2330 = "「Hừm」"
# monologue
# JP: 困らせるつもりは毛頭ない。
3401 = "Tôi không hề có ý định làm em bối rối."
# monologue
# JP: ふかみに笑ってもらうには――\n思ったことが、既に答えだ。
3773 = "Để Fukami cười thì——\nNhững gì tôi nghĩ, đã là câu trả lời rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、笑っていて欲しい。\nしあわせそうな笑顔が、やはりいちばん美しい」
2854 = "「Vậy thì, anh muốn em cười.\nNụ cười hạnh phúc, quả nhiên vẫn là đẹp nhất」"
# 【ふかみ】
# display as 深美
# JP: 「しあわせそうに……です？」
2512 = "「Hạnh phúc…… ạ?」"
# monologue
# JP: ふかみが、笑顔を作ってみせる。
3571 = "Fukami cố nặn ra một nụ cười."
# monologue
# JP: 浮かべて、ではなく、\n作ってと、感じてしまうぎこちなさだ。
3144 = "Không phải là nở nụ cười tự nhiên,\nmà là sự gượng gạo khiến người ta cảm thấy như đang cố nặn ra."
# 【ふかみ】
# display as 深美
# JP: 「はぅ……難し――あ！\nって、いうかですね？　双鉄おにいさん」
2426 = "「Hưm…… khó quá—— a!\nMà, nói sao nhỉ? Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？」
2526 = "「Sao vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「しあわせ――あの、双鉄おにいさんがくれたら、\nわたし、笑顔……自然になれるって、思う。です」
2486 = "「Hạnh phúc—— dạ, nếu anh Soutetsu trao cho em,\nem nghĩ, nụ cười…… sẽ trở nên tự nhiên. Ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、道理だ。\nしかし、しあわせと言われても――っ！」
2728 = "「Ra vậy, có lý.\nNhưng, nói là hạnh phúc thì——!」"
# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1664 = "「……」" 
# monologue
# JP: ふかみが、僕を見、すぐ目をとじる。\nしあわせは――ひどく、わかりやすい形のようだ。
3631 = "Fukami nhìn tôi, rồi lập tức nhắm mắt lại.\nHạnh phúc—— dường như mang một hình dáng cực kỳ dễ hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2695 = "「Fukami」"
# monologue
# JP: ごくさり気なく抱き寄せて、\n線路から、安全十分の距離を取る。
3481 = "Ôm em vào lòng một cách rất tự nhiên,\nvà giữ khoảng cách đủ an toàn với tuyến đường sắt."
# 【ふかみ】
# display as 深美
# JP: 「ぁ……」
2336 = "「A……」"
# monologue
# JP: 軽い、キス。\nふかみはそれでも、瞳を閉じたまま動かない。
3503 = "Một nụ hôn nhẹ.\nFukami vẫn nhắm nghiền mắt, không nhúc nhích."
# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
# 2432 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「ふか……んっ――ん……んちゅっ」
2694 = "「Fuka…… ưm—— ưm…… chụt」"
# monologue
# JP: キス、キス、キス。\n何度か軽く繰り返すうち、体の中が熱くなる。
3238 = "Hôn, hôn, hôn.\nLặp lại nhẹ nhàng vài lần, bên trong cơ thể tôi nóng dần lên."
# 【双鉄】
# display as 雙鐵
# JP: 「……っ」
1677 = "「……」"
# 【ふかみ】
# display as 深美
# JP: 「ぁっ……ふあっ――んっ――ちゅっ――ちゅむっ、\nちゅっ――ちゅうっ――ちゅるっ――ちゅずっ」
2338 = "「A…… phù—— ưm—— chụt—— chụt,\nchụt—— chụt—— chụt—— chụt」"
# monologue
# JP: 唇を割り、ふかみの舌を自分の舌で軽くつつけば、\nすぐさまふかみは、僕の口内に逆進してくる。
3390 = "Tách đôi môi em ra, dùng lưỡi mình khẽ chạm vào lưỡi Fukami,\nngay lập tức em tiến ngược vào trong khoang miệng tôi."
# 【ふかみ】
# display as 深美
# JP: 「ちゅむっ――ちゅるっ――ちゅっ――っちゅぷっ、\nちゅうっ――ちゅずっ――ずちゅるっ――ちゅうっ」
2425 = "「Chụt—— chụt—— chụt—— chụt,\nchụt—— chụt—— chụt—— chụt」"
# monologue
# JP: ふかみの体が、くっついてくる。\nふかみの熱が、つたわってくる。
3628 = "Cơ thể Fukami dính sát vào tôi.\nHơi nóng của em truyền sang tôi."
# monologue
# JP: 夏の昼間の線路沿い――見通しのよい場所でなければ、\nこのまま熱に、浮かされてしまいたい気もする、が。
3771 = "Dọc theo tuyến đường sắt vào buổi trưa hè—— Nếu không phải là một nơi quang đãng dễ nhìn thấy,\ntôi cũng muốn cứ thế này đắm chìm trong cơn sốt, nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「ん」
# 2432 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「っ！　――ぷあっ」
2385 = "「Ư! ——Phù」"
# 【双鉄】
# display as 雙鐵
# JP: 「時間も、場所もまずかろう」
2653 = "「Thời gian và địa điểm đều không ổn đâu」"
# 【ふかみ】
# display as 深美
# JP: 「あ……そ、そうですよね。わたしつい、気持ちよっ\n――えと、しあわせで、夢中になっちゃって」
2369 = "「A…… đ, đúng vậy nhỉ. Em lỡ, thấy sướng\n——ưm, hạnh phúc quá, nên bị cuốn theo mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2547 = "「Anh cũng vậy」"
# 【ふかみ】
# display as 深美
# JP: 「そ、そうですか？　えへへっ」
2605 = "「V, vậy sao ạ? Hehe」"
# monologue
# JP: ふかみが、はにかむ。
3644 = "Fukami bẽn lẽn."
# monologue
# JP: 含羞と嬉しさとを入り混じらせて――\nああ、これこそがふかみの顔だと、しみじみ思う。
3284 = "Xấu hổ và vui sướng hòa lẫn vào nhau——\nA, tôi thấm thía nhận ra, đây mới chính là khuôn mặt của Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうする？\nまだ歩き始めたばかりだが」
2880 = "「Vậy, tính sao đây?\nChúng ta mới chỉ bắt đầu đi dạo thôi mà」"
# 【ふかみ】
# display as 深美
# JP: 「あ、歩きます、です。\n先、見てみたいですし」
2544 = "「A, em sẽ đi bộ, ạ.\nEm cũng muốn xem phía trước nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2479 = "「Vậy à」"
# monologue
# JP: ふかみが前、僕が後ろで歩き出す。
3654 = "Fukami đi trước, tôi đi sau."
# monologue
# JP: 本当は手をつなぎ並んで歩きたいところだが、\n線路脇だ、それほどの余裕が無い場所も多い。
3439 = "Thực ra tôi muốn nắm tay em đi song song,\nnhưng bên cạnh tuyến đường sắt, có nhiều chỗ không đủ rộng rãi."
# 【ふかみ】
# display as 深美
# JP: 「結構――葉っぱ、しげってますね」
2533 = "「Khá là—— nhiều lá cây rậm rạp nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「夏場はどうしても、な。木の枝よりも、\n草むしりを優先せねばならんしな」
2716 = "「Mùa hè thì đành chịu thôi. So với cành cây,\nthì việc nhổ cỏ phải được ưu tiên hơn mà」"
# 【ふかみ】
# display as 深美
# JP: 「草むしり」
2897 = "「Nhổ cỏ」"
# monologue
# JP: 不思議そうに、ふかみは自分の足元を――
3666 = "Trông có vẻ khó hiểu, Fukami nhìn xuống chân mình——"
# monologue
# JP: 雑草一つの無いバラストを、\n堰さんたちの、日々の努力の結晶を見る。
3549 = "Nhìn vào lớp \\\\x%lバラスト;#00ffc040;đá ba-lát%l;#; không có lấy một ngọn cỏ dại,\nkết tinh từ những nỗ lực hàng ngày của nhóm ông Seki."
# 【双鉄】
# display as 雙鐵
# JP: 「バラストは、列車の振動を緩和するためだけの\nものではない。線路を、雑草からも守っている」
2837 = "「\\\\x%lバラスト;#00ffc040;Đá ba-lát%l;#; không chỉ dùng để giảm chấn động của tàu.\nNó còn bảo vệ tuyến đường sắt khỏi cỏ dại nữa」"
# monologue
# JP: バラスト――線路下、枕木を守り敷き詰められてる\n砕石を、僕も歩きつつ踏んで見る。
3335 = "\\\\x%lバラスト;#00ffc040;Đá ba-lát%l;#;—— những viên đá dăm được rải dưới tuyến đường sắt,\nbảo vệ \\\\x%l枕木;#00ffc040;tà vẹt%l;#;, tôi cũng vừa đi vừa thử giẫm lên."
# monologue
# JP: 軽く沈み込む踏みごたえ。けれどもズレない。\n実に良く搗き固められている。
3791 = "Cảm giác lún nhẹ khi giẫm xuống. Nhưng không bị trượt.\nThực sự đã được nén rất chặt."
# 【ふかみ】
# display as 深美
# JP: 「線路を、雑草から守る、って……\nでも、線路は鉄で、雑草は草……ですよ、ね？」
2222 = "「Bảo vệ tuyến đường sắt khỏi cỏ dại, là sao……\nNhưng, tuyến đường sắt làm bằng sắt, còn cỏ dại là cỏ…… mà, đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄はレールだ。線路とは、レールや枕木、\nそれにバラストなどを、一体化した呼び方だ」
2261 = "「Chỉ có đường ray mới làm bằng sắt thôi. Tuyến đường sắt là tên gọi chung,\nbao gồm cả đường ray, \\\\x%l枕木;#00ffc040;tà vẹt%l;#; và \\\\x%lバラスト;#00ffc040;đá ba-lát%l;#; nữa」"
# 【ふかみ】
# display as 深美
# JP: 「あ――レールだけじゃなく、その下も全部合わせて、\nこの[みち]路そのものが、線路」
2374 = "「A—— không chỉ đường ray, mà gộp cả phần bên dưới nữa,\nchính con đường này, mới là tuyến đường sắt」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。そして、雑草を放置すれば、\n線路はあっけなく崩壊してしまいかねんのだ」
2644 = "「Đúng vậy. Và nếu cứ để mặc cỏ dại mọc,\ntuyến đường sắt có thể sẽ dễ dàng sụp đổ đấy」"
# 【ふかみ】
# display as 深美
# JP: 「ええ！？　崩壊って――だって、草くらいで」
2398 = "「Hả!? Sụp đổ sao—— nhưng, chỉ là cỏ thôi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「草が生えれば、バラスト、砂利は押しのけられる。\nそうなると、そこは水を保つようになってしまう」
2893 = "「Nếu cỏ mọc lên, \\\\x%lバラスト;#00ffc040;đá ba-lát%l;#; và sỏi sẽ bị đẩy sang một bên.\nKhi đó, chỗ đó sẽ trở thành nơi đọng nước」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
2386 = "「A!」"
# monologue
# JP: 言った瞬間、大きな頷き。
3668 = "Vừa nói xong, em gật đầu thật mạnh."
# 【ふかみ】
# display as 深美
# JP: 「そっか！　このバラストって――\n排水を良くする効果もあるんですね！」
2503 = "「Ra vậy! \\\\x%lバラスト;#00ffc040;Đá ba-lát%l;#; này——\ncòn có tác dụng thoát nước tốt nữa nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすがだな。そのとおりだ」
2247 = "「Quả không hổ danh em. Đúng là vậy」"
# monologue
# JP: 水の怖さを、ふかみは僕よりよほど知ってる。\nここから先は、ほとんど説明の必要もなかろうが。
3597 = "Fukami hiểu rõ sự đáng sợ của nước hơn tôi nhiều.\nTừ đây trở đi, có lẽ hầu như không cần phải giải thích thêm nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「草が水を保つようになれば、草はさらに繁茂し、\n根を張って、あるべき道床の姿を変えてしまう」
2765 = "「Nếu cỏ bắt đầu giữ nước, nó sẽ càng mọc um tùm hơn,\nbám rễ sâu, và làm biến dạng mặt nền đường sắt vốn có」"
# 【ふかみ】
# display as 深美
# JP: 「どうしょう？」
2792 = "「Mặt nền đường sắt?」"
# 【双鉄】
# display as 雙鐵
# JP: 「線路を支える地面のことだ。御一夜鉄道のように、\nバラストを敷いてある道床は、『バラスト道床』だな」
2506 = "「Là mặt đất nâng đỡ tuyến đường sắt. Giống như Đường sắt Ohitera,\nmặt nền được rải \\\\x%lバラスト;#00ffc040;đá ba-lát%l;#; thì gọi là 『mặt nền ba-lát』」"
# 【ふかみ】
# display as 深美
# JP: 「なら、\nその道床の姿が根っこで変えられちゃったら」
2881 = "「Vậy,\nnếu hình dạng mặt nền đó bị rễ cây làm thay đổi thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「予定された排水路とは別の[みずみち,1]水路が\n生まれてしまう可能性がある」
2271 = "「Có khả năng sẽ hình thành những dòng nước\nkhác với rãnh thoát nước đã được dự tính」"
# 【ふかみ】
# display as 深美
# JP: 「[みずみち,1]水路なんて出来ちゃったら――\n砂利も土も、水と一緒に運ばれちゃいます、です」
2773 = "「Nếu những dòng nước đó hình thành——\nthì sỏi và đất cũng sẽ bị cuốn trôi theo nước mất, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「枕木周辺の土が沈めば、枕木もレールも沈む。\n傾きは列車通過時によってさらに押されて――」
2775 = "「Nếu đất quanh \\\\x%l枕木;#00ffc040;tà vẹt%l;#; lún xuống, \\\\x%l枕木;#00ffc040;tà vẹt%l;#; và đường ray cũng lún theo.\nĐộ nghiêng sẽ càng bị đè nặng thêm mỗi khi tàu chạy qua——」"
# 【ふかみ】
# display as 深美
# JP: 「もっとどんどん傾いて、\nそしたらきっと、いつか――っ！」
2596 = "「Nó sẽ ngày càng nghiêng hơn,\nvà rồi chắc chắn, một lúc nào đó——!」"
# monologue
# JP: 恐らく、脱線といいかけて、\nふかみがあわてて言葉を飲み込む。
3563 = "Có lẽ định nói là trật bánh,\nnhưng Fukami vội vàng nuốt lại lời nói."
# monologue
# JP: そこまで気にすることはない――\n伝えるためにも、僕が飲まれた言葉を続ける。
3671 = "Không cần phải bận tâm đến mức đó đâu——\nĐể truyền đạt điều đó, tôi tiếp tục câu nói mà em vừa nuốt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、事故さえを引き起こしかねない。\nゆえに、草むしりが最優先となってしまうのだ」
2629 = "「Ừ, thậm chí có thể gây ra tai nạn.\nVì vậy, nhổ cỏ mới trở thành ưu tiên hàng đầu」"
# monologue
# JP: おい茂る葉が車体に触れることで\n事故が発生したケースなど、聞いたこともない。
3440 = "Việc lá cây mọc um tùm chạm vào thân xe\ngây ra tai nạn, tôi chưa từng nghe thấy bao giờ."
# monologue
# JP: 優先すべきは、常に安全。\n取捨選択の基準は、一定不変だ。
3523 = "Điều cần ưu tiên, luôn là sự an toàn.\nTiêu chuẩn để lựa chọn, luôn luôn không thay đổi."
# 【ふかみ】
# display as 深美
# JP: 「すごい……です、ね、鉄道って。\n20キロ以上ある線路、そんなに丁寧にお手入れして」
2887 = "「Đường sắt, tuyệt thật…… đấy ạ.\nTuyến đường dài hơn 20km, mà được chăm sóc kỹ lưỡng đến vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かに凄いと思う。が、その凄さは、\nクマ川下り――舟運も変わらんだろう」
2435 = "「Ừm. Anh cũng thấy rất tuyệt. Nhưng, sự tuyệt vời đó,\nchắc cũng không khác gì chèo thuyền xuôi dòng Kuma—— \\\\x%l舟運;#00ffc040;vận tải đường thủy%l;#; đâu」"
# 【ふかみ】
# display as 深美
# JP: 「え？！　うちが、です？」
2320 = "「Hả?! Chỗ em, á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前聞かせてくれたではないか。水路を保つため、\n川に入って、川底の岩を転がすと」
2148 = "「Trước đây em đã kể cho anh nghe rồi mà. Để duy trì luồng lạch,\nphải lội xuống sông, lăn những tảng đá dưới đáy sông đi」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
2376 = "「A」"
# 【双鉄】
# display as 雙鐵
# JP: 「安全確保のため、為すべきことを、怠らず為す。\n線路と水路の差こそあれ、その本質は同じと思う」
2700 = "「Để đảm bảo an toàn, phải làm những việc cần làm mà không được lơ là.\nDù là đường sắt hay đường thủy, anh nghĩ bản chất đều giống nhau」"
# 【ふかみ】
# display as 深美
# JP: 「…………」
1662 = "「…………」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2443 = "「Hửm?」"
# monologue
# JP: ふかみが頬を染めている。\nしあわせそうにはにかみながら、うつむいている。
3648 = "Đôi má Fukami ửng hồng.\nEm bẽn lẽn trông thật hạnh phúc, cúi gằm mặt xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ふかみ」
2525 = "「Sao vậy? Fukami」"
# monologue
# JP: 問うやいなやで、パッとふかみの顔があがる。\n小さな汗が跳ね飛び光の粒となる。
3744 = "Vừa hỏi xong, Fukami ngẩng phắt mặt lên.\nNhững giọt mồ hôi nhỏ xíu bắn ra, lấp lánh như những hạt sáng."
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしがちょっと話しただけのこと――\n双鉄おにいさんが覚えててくれて、嬉しい。です」
2541 = "「C, chuyện em chỉ tình cờ kể một chút——\nAnh Soutetsu vẫn nhớ, em vui lắm. Ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2635 = "「是嗎」" 
# 【ふかみ】
# display as 深美
# JP: 「線路も、川とおなじもの。\nそう考えたら、まえよりもっと、綺麗に見えます！」
2747 = "「Tuyến đường sắt, cũng giống như dòng sông.\nNghĩ vậy, em thấy nó đẹp hơn trước nhiều lắm!」"
# monologue
# JP: （ああ――）
3911 = "（A——）"
# monologue
# JP: ふかみが大きく踏み出す一歩を、\n跳ねるようだと、強く感じる。
3599 = "Bước chân sải dài của Fukami,\ntôi cảm giác mạnh mẽ như em đang nhảy múa vậy."
# monologue
# JP: 船上にいるときのふかみがここに、\n僕の目の前で輝いている。
3761 = "Fukami khi ở trên thuyền, giờ đang ở đây,\ntỏa sáng rực rỡ ngay trước mắt tôi."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？\nおいてっちゃいますよー？」
2903 = "「Anh Soutetsu?\nEm bỏ anh lại đó nha~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはダメだ！　ふかみ、僕から離れるな」
2823 = "「Thế thì không được! Fukami, đừng rời xa anh」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2318 = "「哎！？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「慣れてはいけない。ここが線路である以上、\n臨時列車が走ってくる可能性は常にある」
2233 = "「Không được chủ quan. Chừng nào đây vẫn là tuyến đường sắt,\nthì khả năng tàu chạy tăng cường chạy qua vẫn luôn hiện hữu」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2386 = "「啊！」" 
# monologue
# JP: ふかみが戻って、僕のすぐ前――\n一番最初に示したポジションに復帰する。
3656 = "Fukami quay lại, ngay phía trước tôi——\ntrở về vị trí mà tôi đã chỉ định lúc đầu."
# monologue
# JP: ならば、よい。このまま、ふかみが満足するまで、\n安全に、線路巡視を続けよう。
3363 = "Nếu vậy thì tốt. Cứ thế này, cho đến khi Fukami thỏa mãn,\nhãy tiếp tục tuần tra tuyến đường sắt một cách an toàn nào."
# 【ふかみ】
# display as 深美
# JP: 「線路も、川も、おなじこと。\n油断をしても、慣れてもいけない」
2753 = "「Đường sắt, hay dòng sông, cũng giống nhau.\nKhông được lơ là, cũng không được chủ quan」"
# monologue
# JP: 自分の言葉に落とし込み、\n理解を深めてくれたのだろう。
3288 = "Chắc em đang tự nhẩm lại những lời tôi nói,\nđể khắc sâu thêm sự hiểu biết."
# monologue
# JP: ふかみの視線も、単なる見学者のものではなく、\nまるで巡視をしているかのように鋭くなってる。
3621 = "Ánh mắt của Fukami, không còn đơn thuần là của một người tham quan nữa,\nmà trở nên sắc sảo như thể đang thực sự đi tuần tra vậy."
# 【ふかみ】
# display as 深美
# JP: 「そう考えたら、結構、いろいろ見えてきます。です。\nなんか、枕木？　に書いてある印とか」
2895 = "「Nghĩ vậy rồi, em thấy được khá nhiều thứ. Ạ.\nKiểu như, những ký hiệu được viết trên \\\\x%l枕木;#00ffc040;tà vẹt%l;#;? chẳng hạn」"
# 【双鉄】
# display as 雙鐵
# JP: 「枕木交換の目安だな。X印が次の次。\nそれを○で囲んだものが、次の交換時での、交換だ」
2871 = "「Đó là mốc thời gian để thay \\\\x%l枕木;#00ffc040;tà vẹt%l;#;. Dấu X là lần thay sau của lần thay tới.\nCòn nếu khoanh tròn chữ X đó lại, thì là sẽ thay vào lần thay tới」"
# 【ふかみ】
# display as 深美
# JP: 「あそこ――なんで急に柵、あるんですか？」
2878 = "「Đằng kia—— sao tự nhiên lại có hàng rào vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「敷地の境界を示すためだな。あの向こうは確か、\n天然のわらびを採って販売しているとかなんとかだ」
2770 = "「Để chỉ ranh giới khu đất đấy. Phía bên kia hình như,\nlà nơi họ hái và bán dương xỉ tự nhiên hay sao ấy」"
# 【ふかみ】
# display as 深美
# JP: 「ああ、それでひとが勝手に入ってこないように\n――あ」
2455 = "「À, ra là để ngăn người ta tự ý vào\n——a」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2330 = "「唔」" 
# monologue
# JP: ふかみの足がぴたりと止まる。\n理由は、僕にもすぐわかる。
3582 = "Bước chân của Fukami đột ngột dừng lại.\nLý do, tôi cũng lập tức hiểu ra."
# 【ふかみ】
# display as 深美
# JP: 「この切り株……凪ちゃんの」
2830 = "「Cái gốc cây này…… của Nagi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2622 = "「Đúng vậy」"
# monologue
# JP: その周辺だけ、\nやはり、空気が違う気がする。
3244 = "Chỉ có khu vực xung quanh đó,\nquả nhiên, tôi cảm thấy bầu không khí có chút khác biệt."
# monologue
# JP: 切られた、ではなく、\n叩き折られた痕跡を、まざまざ今も残す切り株。
3261 = "Không phải bị cưa đứt,\nmà là bị đập gãy, gốc cây vẫn còn lưu lại dấu vết rõ mồn một."
# 【ふかみ】
# display as 深美
# JP: 「こんなところにあったんだ――\nわたし、全然知らなかった」
2733 = "「Hóa ra nó nằm ở chỗ này——\nEm, hoàn toàn không biết luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　ああいや、\nわざわざ見に来る場所でもないか」
2640 = "「Vậy sao? À mà cũng đúng,\nđây đâu phải nơi để cất công đến xem chứ」"
# 【ふかみ】
# display as 深美
# JP: 「そうですし……\nそれに、わたしが――ってっ！？」
2617 = "「Đúng là vậy ạ……\nHơn nữa, em lại—— ơ!?」"
# monologue
# JP: ふかみが、いきなり一歩退く。
3636 = "Fukami, đột nhiên lùi lại một bước."
# monologue
# JP: 罪深いことでもしたかのように、\nふるえて、こちらを振り返る。
3291 = "Như thể vừa làm ra chuyện gì tội lỗi lắm,\nem run rẩy, ngoảnh lại nhìn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたふかみ？」
# 2525 = "「怎麼了，深美？」" 
# 【ふかみ】
# display as 深美
# JP: 「あの、ここ――双鉄お兄さんと、凪ちゃんの、\nとっても大切な思い出の場所っ」
2861 = "「Dạ, nơi này—— là nơi chứa đựng kỷ niệm,\nrất quan trọng của anh Soutetsu và Nagi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 2622 = "「是啊」" 
# monologue
# JP: あの事件が発生しなければ、\n凪と結ばれることは決してなかったろう。
3306 = "Nếu sự kiện đó không xảy ra,\nchắc chắn tôi đã không thể gắn kết với Nagi."
# monologue
# JP: それはすなわち、ふかみと結ばれるきっかけも、\n決して訪れなかっただろうことを意味してもいる。
3506 = "Điều đó cũng có nghĩa là, cơ hội để gắn kết với Fukami,\nchắc chắn cũng sẽ không bao giờ đến."
# 【ふかみ】
# display as 深美
# JP: 「なのに、わたし――その大切な場所に、\nうっかり土足で入っちゃうみたいなことしちゃって」
2266 = "「Thế mà, em—— lại vô tình bước chân vào,\nnơi quan trọng đó như chốn không người vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わんだろう。その方が思い出も深くなる」
2689 = "「Không sao đâu. Làm vậy thì kỷ niệm sẽ càng sâu sắc hơn mà」"
# 【ふかみ】
# display as 深美
# JP: 「え？！」
2421 = "「Hả?!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大事に抱え込んでしまえば、思い出は自分の中で、\n歪み、変質してしまうものかと思うからな」
2487 = "「Vì anh nghĩ, nếu cứ khư khư ôm giữ lấy, kỷ niệm sẽ bị bóp méo,\nvà biến chất trong tâm trí mình」"
# 【ふかみ】
# display as 深美
# JP: 「歪む、って……」
2591 = "「Bóp méo, là sao ạ……」"
# monologue
# JP: ふかみが、深刻な顔をしている。\n感覚がかなり違うと気づき、言葉を慎重なものにする。
3557 = "Fukami đang làm vẻ mặt rất nghiêm trọng.\nNhận ra cảm nhận của em khá khác biệt, tôi cẩn trọng lựa lời hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「歪むでは……表現が強すぎるかもしれんが……。\n思い出をしまいこみ、大事に抱え込みすぎてしまうと」
2777 = "「Dùng từ bóp méo thì…… có lẽ hơi quá mạnh…….\nNếu cứ cất giấu kỷ niệm, ôm giữ nó quá mức」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2432 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「……抱え込んでいる思い出が、自分の中で、\n強調されすぎ、本来の形を失っていくように思うのだ」
1682 = "「……Anh nghĩ, kỷ niệm được ôm giữ đó, sẽ bị nhấn mạnh quá mức\ntrong tâm trí mình, và dần đánh mất đi hình dáng vốn có」"
# monologue
# JP: 少なくとも僕はそうだった。
3757 = "Ít nhất thì tôi đã từng như vậy."
# monologue
# JP: 罪悪感というタールの中に路子の思い出を沈め込み、\n本当の路子の姿を、願いを、捻じ曲げていた。
3252 = "Nhấn chìm ký ức về Michiko trong lớp hắc ín mang tên cảm giác tội lỗi,\ntôi đã bóp méo đi hình bóng và ước nguyện thực sự của con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、思い出はしまいこまない方がいい。\n刺激を受けて、掻き回される方がずっといい」
2462 = "「Vì vậy, tốt nhất là không nên cất giấu kỷ niệm.\nCứ để nó tiếp nhận kích thích, bị khuấy động lên thì tốt hơn nhiều」"
# 【ふかみ】
# display as 深美
# JP: 「それ……でも――」
2817 = "「Chuyện đó…… nhưng——」"
# monologue
# JP: ふかみが、珍しく不満げだ。
3639 = "Fukami, hiếm khi tỏ vẻ bất mãn."
# monologue
# JP: 素直な気持ちを聞きたくて、\n続く言葉を、ゆっくりと待つ。
3419 = "Muốn nghe những cảm xúc chân thật của em,\ntôi chậm rãi chờ đợi những lời tiếp theo."
# 【ふかみ】
# display as 深美
# JP: 「そういうの――双鉄おにいさんらしいですけど……\nわたしだったら、ちょっとだけ、寂しいかも、です」
2832 = "「Cách nghĩ đó—— rất giống anh Soutetsu nhưng……\nNếu là em, chắc em sẽ thấy hơi buồn một chút, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「寂しい？」
2495 = "「Buồn sao?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしだったら……双鉄おにいさんと、初めて、\nふたりだけ、で……その、部屋だとか……あの」
2489 = "「Nếu là em…… lần đầu tiên ở cùng anh Soutetsu,\nchỉ có hai người, ở…… cái đó, trong phòng chẳng hạn…… dạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2321 = "「À」"
# monologue
# JP: ひどく照れ、ごにょごにょ話しているがゆえ、\n何を言わんとしているかがかえって伝わってくる。
3665 = "Vì em vô cùng xấu hổ, cứ lúng búng trong miệng,\nnên tôi lại càng hiểu rõ em đang định nói gì."
# 【ふかみ】
# display as 深美
# JP: 「えと――ふたりの、大事な思い出の場所だから……\n凪ちゃんだけには……入って来てほしくない、かも」
2329 = "「Ưm—— vì đó là nơi chứa đựng kỷ niệm quan trọng của hai người……\nNên có lẽ em…… không muốn Nagi bước vào đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、何故だ？」
2828 = "「Tại sao lại thế?」"
# 【ふかみ】
# display as 深美
# JP: 「なぜって、だって――大事な思い出……\n凪ちゃんの明るいのに、上書きされちゃいそう、で」
2463 = "「Tại sao ư, tại vì—— kỷ niệm quan trọng đó……\nCó vẻ như sẽ bị sự tươi sáng của Nagi, ghi đè lên mất, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……」
2326 = "「Hừm……」"
# monologue
# JP: 繊細で、感受性が強いのだなとつくづく思う。\n僕とは大きく異なっている。
3472 = "Tôi thấm thía nhận ra em thật tinh tế và nhạy cảm.\nHoàn toàn khác biệt với tôi."
# monologue
# JP: そうした部分も愛おしいゆえ、\nただ正直に、自分の思いをふかみに伝える。
3296 = "Vì những khía cạnh đó cũng rất đáng yêu,\nnên tôi chỉ thành thật, truyền đạt suy nghĩ của mình cho Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「上書きされて、塗りつぶされる程度ならば、\nそれは最初から、大した思い出ではないのだと思う」
2492 = "「Nếu chỉ đến mức bị ghi đè, bị bôi xóa mất,\nthì anh nghĩ ngay từ đầu, đó đã không phải là một kỷ niệm gì to tát rồi」"
# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
# 2421 = "「啊？！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「この切り株での凪との思い出もそうだし、無論、\nふかみとのふたりきりでの思い出もそうだが――」
2241 = "「Kỷ niệm với Nagi ở gốc cây này cũng vậy, và tất nhiên,\nkỷ niệm khi chỉ có hai người với Fukami cũng thế——」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ」
2383 = "「A ư」"
# monologue
# JP: 驚き固まっていた顔が、今度は含羞の華を咲かせる。
3218 = "Khuôn mặt đang cứng đờ vì ngạc nhiên, giờ lại nở rộ nét bẽn lẽn."
# monologue
# JP: 言葉を、全て伝えたときに、\nふかみがどんな顔になるのか――見たいと、思う。
3413 = "Khi tôi truyền đạt xong mọi lời muốn nói,\nFukami sẽ làm vẻ mặt như thế nào đây—— tôi muốn nhìn thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「確信出来る。本当に大事な思い出は、何があろうと、\n決して塗りつぶされも、損なわれもしない」
2554 = "「Anh có thể khẳng định. Những kỷ niệm thực sự quan trọng, dù có chuyện gì xảy ra,\ncũng tuyệt đối không bao giờ bị bôi xóa, hay bị tổn hại」"
# 【ふかみ】
# display as 深美
# JP: 「でも、新しいことがあったら、前の思い出、\n変わらなくても……余分が混じっちゃうっていうか」
2188 = "「Nhưng, nếu có chuyện mới xảy ra, kỷ niệm cũ,\ndù không thay đổi…… nhưng sẽ bị trộn lẫn thêm những thứ thừa thãi vào」"
# 【双鉄】
# display as 雙鐵
# JP: 「余分とさえもならんだろう。\n少なくとも、ふかみと、凪と、僕とであるなら」
2873 = "「Thậm chí còn chẳng phải là thứ thừa thãi đâu.\nÍt nhất, nếu đó là Fukami, Nagi và anh」"
# 【ふかみ】
# display as 深美
# JP: 「……そうなら、いいんですけど」
1680 = "「……Nếu được như vậy, thì tốt quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「現に、今もだ。凪との大切な思い出の場所に、\nふかみとの、鮮やかな思い出が加わって――」
2712 = "「Thực tế, bây giờ cũng vậy mà. Ở nơi chứa đựng kỷ niệm quan trọng với Nagi,\nlại được điểm thêm những kỷ niệm sống động với Fukami——」"
# monologue
# JP: 瞬間、閃く。\nそうだ、これは……これは、例えば絵なのだと。
3456 = "Khoảnh khắc đó, tôi chợt lóe lên một suy nghĩ.\nĐúng rồi, chuyện này…… ví dụ như, một bức tranh chẳng hạn."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が絵を描くところを間近にじっくり\n見たことがあるか？」
2200 = "「Em đã từng nhìn thật kỹ lúc Hibiki vẽ tranh\nở khoảng cách gần bao giờ chưa?」"
# 【ふかみ】
# display as 深美
# JP: 「え？　いえ――そんなの無理です。だって、\n日々姫さん、わたしとかが見ようとしたって」
2417 = "「Hả? Dạ chưa—— chuyện đó sao mà được. Tại vì,\nchị Hibiki ấy, nếu có người như em định xem thì chị ấy sẽ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、今でもそうなのか。まぁ、では想像してくれ。\nことばで、なんとか説明してみる」
2325 = "「À, đến giờ vẫn vậy sao. Thôi được, vậy em hãy tưởng tượng nhé.\nAnh sẽ cố gắng dùng lời nói để giải thích」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2479 = "「好的」" 
# monologue
# JP: ふかみが、そっと目を閉じる。
3661 = "Fukami, khẽ nhắm mắt lại."
# monologue
# JP: 健気だ、かわいい、キスしたい――\n反射で思うが、今、唇には、別の大事な用がある。
3300 = "Đáng yêu quá, dễ thương quá, muốn hôn quá——\nTôi phản xạ nghĩ vậy, nhưng bây giờ, đôi môi này còn có việc quan trọng khác phải làm."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が川の絵を描いている。\nとても美しい水色を置く。それが最初の思い出だ」
2602 = "「Hibiki đang vẽ một bức tranh về dòng sông.\nCon bé tô lên một màu xanh nước biển tuyệt đẹp. Đó là kỷ niệm đầu tiên」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2479 = "「好的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「そこに日々姫は、まったく別の色を重ねるのだ。\n例えばそれは緑、白。ときには、黄色や赤さえも」
2706 = "「Sau đó, Hibiki lại tô chồng lên một màu hoàn toàn khác.\nVí dụ như màu xanh lá, màu trắng. Đôi khi, cả màu vàng hay màu đỏ nữa」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2386 = "「啊！」" 
# monologue
# JP: なにか、思い当たるところがあるのだろか？\nふかみの声は、驚きよりは納得に近いものに聞こえる。
3565 = "Chắc em đã nghĩ ra điều gì đó chăng?\nGiọng nói của Fukami, nghe giống như đã thấu hiểu hơn là ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして新しい色を重ねていく。幾重にも幾重にも。\nそれがいつしか、いつの間に、ひとつの調和を生み」
2705 = "「Cứ thế, những màu sắc mới được tô chồng lên. Hết lớp này đến lớp khác.\nRồi đến một lúc nào đó, không biết từ bao giờ, chúng tạo ra một sự hài hòa」"
# 【ふかみ】
# display as 深美
# JP: 「単純な水の色じゃない。本当の、川の色になってる」
2845 = "「Không còn là màu nước đơn thuần nữa. Mà trở thành, màu của dòng sông thực sự」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。水色は青に。\n青は、よりふかみを得た碧になる」
2144 = "「Đúng là vậy. Màu nước biển hòa vào màu xanh lam.\nMàu xanh lam, trở thành màu xanh biếc có chiều sâu hơn」"
# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 2386 = "「啊！」" 
# monologue
# JP: ああ、この顔か。\nふかみの顔は笑顔でもなく、無論、泣き顔でもなくて。
3519 = "A, là khuôn mặt này sao.\nKhuôn mặt Fukami không phải đang cười, và tất nhiên, cũng không phải đang khóc."
# monologue
# JP: 水が器を満たすがごときよろこびを――\n表情というより、むしろあたたかさをたたえている。
3298 = "Một niềm vui sướng như nước lấp đầy chiếc bình——\nHơn cả một biểu cảm, nó toát lên sự ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「思い出も、色のようなものかと思う。\n塗り潰すのではなく塗り重ね、唯一無二の物になる」
2457 = "「Anh nghĩ kỷ niệm cũng giống như màu sắc vậy.\nKhông phải bôi xóa đi, mà là tô điểm thêm, để trở thành một thứ độc nhất vô nhị」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！」
2645 = "「Vâng ạ!」"
# monologue
# JP: 大きな頷き。\nそしてふかみは、そっと切り株に手を添える。
3602 = "Em gật đầu thật mạnh.\nRồi Fukami khẽ đặt tay lên gốc cây."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんと双鉄おにいさんの大事な思い出に、\n今わたしたちが、きっと、おもいでをかさねてる」
2713 = "「Lên kỷ niệm quan trọng của Nagi và anh Soutetsu,\nbây giờ chúng ta, chắc chắn, đang tô điểm thêm kỷ niệm của mình」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。それは恐らく――\nとてもしあわせなことだと思う」
2619 = "「Đúng vậy. Điều đó có lẽ——\nAnh nghĩ là một điều rất hạnh phúc」"
# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2432 = "「嗯」" 
# monologue
# JP: ふかみが頷く。
# 3668 = "深美點了點頭。" 
# monologue
# JP: そうしてくるり、振り返り、\nまた跳ねるような一歩を踏み出す。
3501 = "Rồi em xoay người lại,\nlại bước một bước như đang nhún nhảy."
# 【ふかみ】
# display as 深美
# JP: 「だったら、わたし、重ねたいです。\n凪ちゃんとの思い出の上に、もっと新しい思い出を」
2829 = "「Nếu vậy, em, muốn tô điểm thêm.\nLên trên những kỷ niệm với Nagi, thêm nhiều kỷ niệm mới nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「のぞむところだ。重ねていこう」
2685 = "「Đúng ý anh đấy. Hãy cùng nhau tô điểm thêm nào」"
# monologue
# JP: ふかみと、歩く。ゆっくり歩く。
3464 = "Tôi đi bộ cùng Fukami. Bước đi chầm chậm."
# monologue
# JP: 森のトンネルをくぐりぬければ、\n陽射しを遮るものがなくなる。
3697 = "Vượt qua đường hầm rừng cây,\nkhông còn gì che chắn ánh nắng mặt trời nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「暑くはないか？」
2707 = "「Em không thấy nóng sao?」"
# 【ふかみ】
# display as 深美
# JP: 「暑くない……っていったら、\nウソになっちゃうです」
2776 = "「Nếu nói không nóng……\nthì là nói dối mất, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ」
2570 = "「Anh cũng đoán vậy」"
# monologue
# JP: さきほどからふかみの足取りが、\nじわじわ重くなっている。
3366 = "Từ nãy đến giờ, bước chân của Fukami,\nđang dần trở nên nặng nề hơn."
# monologue
# JP: ならば、だ。
3513 = "Nếu vậy thì."
# monologue
# JP: （ぴとっ）
3922 = "（Chạm nhẹ）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！！？　なっ、なにっ！？」
2295 = "「Hya!!? G, gì vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「水だ。補給した方がいい」
2681 = "「Nước đây. Em nên bổ sung đi」"
# 【ふかみ】
# display as 深美
# JP: 「わ、助かります。\n双鉄おにいさん、買っておいてくれたんですね」
2311 = "「Oa, đỡ quá.\nAnh Soutetsu, đã mua sẵn cho em nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。線路沿いの自販機の位置ならば、\nおそらくほとんど把握しているぞ」
2620 = "「Ừm. Nếu là vị trí các máy bán hàng tự động dọc tuyến đường sắt,\nthì anh nắm rõ gần hết đấy」"
# monologue
# JP: とはいえ、今日はふかみと一緒だ。
3782 = "Mặc dù vậy, hôm nay tôi đi cùng Fukami."
# monologue
# JP: 線路沿いに置き去りなどできないがゆえ、\nあらかじめ、出る前に準備しておいた。
3374 = "Không thể bỏ em lại dọc đường sắt được,\nnên tôi đã chuẩn bị sẵn trước khi xuất phát."
# 【双鉄】
# display as 雙鐵
# JP: 「ぬるくなってしまったがな。飲め」
2143 = "「Dù nước đã nguội bớt rồi. Uống đi」"
# 【ふかみ】
# display as 深美
# JP: 「ぬるい方が嬉しい、です。\n今いきなり冷たいのとか、おなか、こわしちゃいそう」
2659 = "「Nước nguội em lại thích hơn, ạ.\nBây giờ mà uống nước lạnh đột ngột, chắc em đau bụng mất」"
# monologue
# JP: 言いながら、ふかみはペットボトルを開けて、\nゆるゆる、喉へと水を落とす。
3784 = "Vừa nói, Fukami vừa mở chai nhựa,\ntừ từ, rót nước xuống cổ họng."
# 【ふかみ】
# display as 深美
# JP: 「んくッ――んくっ――んくっ――ぷあぁ」
2302 = "「Ực—— ực—— ực—— phù」"
# monologue
# JP: 半分ほどを一気に飲んで口を離して、\nそれからはっと気づいたように――
3282 = "Uống một hơi hết khoảng một nửa rồi rời môi khỏi chai,\nsau đó như chợt nhận ra điều gì——"
# monologue
# JP: （つうっ）
3909 = "（Lau nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2386 = "「啊！」" 
# monologue
# JP: 小指の先で、ペットボトルの口を拭く。
3817 = "Em dùng đầu ngón út, lau miệng chai nhựa."
# monologue
# JP: わざわざそうして見せてから、\n僕へと、ボトルを差し出してくる。
3259 = "Cố tình làm vậy cho tôi xem,\nrồi mới đưa chai nước về phía tôi."
# 【ふかみ】
# display as 深美
# JP: 「あの……双鉄おにいさんも、お水」
2858 = "「Dạ…… anh Soutetsu, cũng uống nước đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いただこう」
2434 = "「Ừ, anh xin nhé」"
# monologue
# JP: 天然の色香というのか――こういう仕草を見るたびに、\nふかみはふかみとつくづく思う。
3544 = "Có thể gọi là sức quyến rũ bẩm sinh chăng—— mỗi lần nhìn thấy những cử chỉ này,\ntôi lại càng thấm thía Fukami quả đúng là Fukami."
# monologue
# JP: 他の誰からも感じない、“おんな”の深さを、\nかくも年若いふかみが何ゆえ有するものか――
3804 = "Sự sâu sắc của một \\\"người phụ nữ\\\" mà tôi không cảm nhận được từ ai khác,\ntại sao một Fukami còn trẻ tuổi như vậy lại có được chứ——"
# 【ふかみ】
# display as 深美
# JP: 「ん……」
# 2326 = "「唔……」" 
# monologue
# JP: とんとんと、ふかみが自分の足を、\nふくらはぎを叩いていく。
3595 = "Bồm bộp, Fukami tự vỗ vào chân,\nvào bắp chân của mình."
# monologue
# JP: ごく無造作に前屈するから、\n裾が長いといえどもやはり、足はそれなりに露出する。
3304 = "Vì em cúi gập người một cách rất vô tư,\nnên dù vạt váy có dài đi chăng nữa, đôi chân vẫn lộ ra khá rõ."
# monologue
# JP: （白い……な、本当にすらりとしている）
3887 = "（Trắng quá…… mà, chân em thon thả thật đấy）"
# monologue
# JP: 女性美と、\nいまだ女になりきらぬ、厚みを持たぬ肉付きと。
3803 = "Vẻ đẹp nữ tính,\ncùng với da thịt chưa phát triển đầy đặn của một cô gái chưa trưởng thành hẳn."
# 【ふかみ】
# display as 深美
# JP: 「ん～っ！」
2433 = "「Ưm~!」"
# monologue
# JP: 今度は大きく腕を伸ばす。\nワンピースの背が汗で張り付き――
3502 = "Lần này em vươn tay ra thật rộng.\nPhần lưng váy dính chặt vào người vì mồ hôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2333 = "「Hửm?」"
# monologue
# JP: なんだ、今何か違和感が――
3370 = "Gì thế này, vừa rồi có cảm giác gì đó là lạ——"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？」
2906 = "「Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
2322 = "「À, không có gì」"
# monologue
# JP: 違和感の正体をつきとめるより、\n先にやるべきことがある。
3685 = "Thay vì tìm ra nguồn gốc của cảm giác kỳ lạ đó,\ntôi có việc cần phải làm trước."
# 【双鉄】
# display as 雙鐵
# JP: 「歩きつかれたか」
2217 = "「Em đi bộ mệt rồi à」"
# 【ふかみ】
# display as 深美
# JP: 「です、ね。ちょっと……\n座って、やすみたいかも、です」
2647 = "「Đúng, vậy ạ. Em hơi……\nmuốn ngồi nghỉ một chút, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう少しだけは歩けるか？　――ああ、いや」
2875 = "「Em có thể đi thêm một chút nữa không? ——À, không」"
# monologue
# JP: あと一キロもいかないうちに、\n状態のよい廃駅がひとつある。
3257 = "Chưa đầy một km nữa,\ncó một nhà ga bỏ hoang vẫn còn trong tình trạng tốt."
# monologue
# JP: その程度の距離なら、なにほどもない。
3805 = "Khoảng cách chừng đó thì chẳng nhằm nhò gì."
# 【双鉄】
# display as 雙鐵
# JP: 「おぶっていこう。背中に乗れ」
2575 = "「Để anh cõng đi. Lên lưng anh nào」"
# monologue
# JP: 瞬間、ふかみの笑顔が弾ける。\nふわりと僕に近づいてきて、甘い匂いが――
3694 = "Khoảnh khắc đó, nụ cười của Fukami bừng sáng.\nEm nhẹ nhàng tiến lại gần tôi, một mùi hương ngọt ngào——"
# monologue
# JP: せっけんと、おひさまと、汗とが混じった匂いが、\n一瞬に、僕に貼り付き、包み込む。
3827 = "Mùi xà phòng, mùi nắng, hòa lẫn với mùi mồ hôi,\ntrong nháy mắt, bám lấy và bao bọc lấy tôi."
# 【ふかみ】
# display as 深美
# JP: 「はい！！」
2480 = "「Vâng!!」"
# 【ふかみ】
# display as 深美
# JP: 「わぁ」
# 2305 = "「哇」" 
# 【双鉄】
# display as 雙鐵
# JP: 「よし、ここまでだ」
2484 = "「Được rồi, đến đây thôi」"
# monologue
# JP: ホームにあがってふかみを下ろせば、\n薄紅の頬がぷっと膨らむ。
3789 = "Bước lên sân ga và thả Fukami xuống,\nđôi má phớt hồng của em phụng phịu phồng lên."
# 【ふかみ】
# display as 深美
# JP: 「もう少しだけ……\nおんぶしてて欲しかった、かもです」
2580 = "「Em muốn……\nđược cõng thêm một chút nữa cơ, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、それは帰りのお楽しみだ。\n今は、少し座って、足を伸ばして休め」
2865 = "「Vậy thì, hãy để dành niềm vui đó lúc về nhé.\nBây giờ, ngồi xuống một lát, duỗi chân ra nghỉ ngơi đi」"
# 【ふかみ】
# display as 深美
# JP: 「はぁい」
# 2479 = "「好的」" 
# monologue
# JP: 甘えた声で、スネたふり。\nふかみはベンチに腰掛けて――
3742 = "Bằng giọng điệu nũng nịu, giả vờ hờn dỗi.\nFukami ngồi xuống băng ghế——"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？\nわたしのとなり、空いてますよ？」
2904 = "「Anh Soutetsu?\nChỗ bên cạnh em, còn trống này?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば失礼しよう」
2637 = "「Vậy à. Thế thì anh xin phép nhé」"
# monologue
# JP: 並んでベンチに腰掛けたなら、\nふかみはきょろきょろ、興味深そうにあたりを見渡す。
3393 = "Khi chúng tôi ngồi cạnh nhau trên băng ghế,\nFukami ngó nghiêng, tò mò đưa mắt nhìn quanh."
# 【ふかみ】
# display as 深美
# JP: 「窓からしか、見たことなかったけど……\nこれが――廃駅、です？」
2550 = "「Em mới chỉ nhìn thấy qua cửa sổ thôi nhưng……\nĐây là—— nhà ga bỏ hoang, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。大廃線が来る直前に、地元の強い要望で\n整備されたばかりだったものと聞いている」
2630 = "「Ừ. Anh nghe nói ngay trước khi Đại bãi bỏ các tuyến đường sắt diễn ra, do yêu cầu mạnh mẽ của địa phương\nnên nó vừa mới được tu sửa lại」"
# 【ふかみ】
# display as 深美
# JP: 「地元の、強い、要望？」
2664 = "「Yêu cầu, mạnh mẽ, của địa phương?」"
# monologue
# JP: 実に不思議そうな声。ひとまわりも離れていないのに、\n世代の壁を感じてしまう。
3568 = "Một giọng nói nghe có vẻ thực sự khó hiểu. Dù tuổi tác không cách biệt đến một giáp,\nnhưng tôi vẫn cảm nhận được rào cản thế hệ."
# monologue
# JP: 少なくとも僕らと知り合う前のふかみにとって、\n鉄道は、完全な遺物だったのだろう。
3755 = "Ít nhất thì đối với Fukami trước khi quen biết chúng tôi,\nđường sắt, có lẽ là một di tích hoàn toàn của quá khứ."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道にも、そうした時期があったのだ。\n公共の交通手段として、大いに期待されていた時代が」
2888 = "「Đường sắt cũng từng có một thời kỳ như vậy.\nMột thời đại mà nó được kỳ vọng rất nhiều với tư cách là phương tiện giao thông công cộng」"
# 【ふかみ】
# display as 深美
# JP: 「だから、わりと綺麗……っていうか、\n屋根とかちゃんとありますもんね、ここ」
2588 = "「Vì vậy, nó khá là sạch sẽ…… nói đúng hơn là,\nở đây có cả mái che đàng hoàng nữa nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。\nここなど、非常に簡易的ではあるが、待合室だ」
2634 = "「Đúng vậy.\nVí dụ như chỗ này, tuy rất đơn sơ, nhưng là phòng chờ đấy」"
# monologue
# JP: 通学のため、とかそんな理由で\n設置された駅であったかと記憶している。
3467 = "Tôi nhớ không lầm thì nhà ga này được xây dựng\nvới lý do là để phục vụ cho việc đi học hay gì đó."
# monologue
# JP: 大人四人も座れないこの待合室の小さなベンチを、\n学園生が奪い合う。そんな時間もあったのだろうか。
3678 = "Chiếc băng ghế nhỏ trong phòng chờ này không đủ chỗ cho bốn người lớn ngồi,\ncác học sinh đã từng tranh giành nhau. Liệu đã từng có khoảng thời gian như thế không nhỉ."
# 【ふかみ】
# display as 深美
# JP: 「あ、双鉄おにいさん、これ！\n落書き、のこってます」
2405 = "「A, anh Soutetsu, nhìn này!\nVẫn còn nét vẽ bậy này」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。相合傘か」
2839 = "「Đúng thật. Là chiếc ô chung tình à」"
# 【ふかみ】
# display as 深美
# JP: 「けんじさんと、まなみちゃん――。\nふたり、今はどうしてるんでしょうね？」
2224 = "「Kenji và Manami——.\nHai người họ, bây giờ đang làm gì nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まるで検討もつかん――が……」
2826 = "「Anh hoàn toàn không đoán được—— nhưng……」"
# monologue
# JP: 相合傘が書かれているのは、\n駅の廃止を告知しているポスターの端。
3684 = "Chiếc ô chung tình được vẽ ở\nmép của tấm áp phích thông báo việc nhà ga bị bỏ hoang."
# 【ふかみ】
# display as 深美
# JP: 「……もう、お別れしちゃってるかもしれませんね。\n『さよなら』って書かれてるポスターに相合傘とか」
2583 = "「……Có khi họ đã chia tay rồi cũng nên.\nVẽ chiếc ô chung tình lên tấm áp phích ghi chữ 『Tạm biệt』 mà lị」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、配慮がなさすぎる気もするが――\nどうかな。案外、逆かもしれんぞ？」
2729 = "「Đúng là có cảm giác họ quá thiếu suy nghĩ——\nNhưng biết đâu được. Không chừng lại ngược lại đấy?」"
# 【ふかみ】
# display as 深美
# JP: 「逆？　ですか？」
2717 = "「Ngược lại? Sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。例えば……そうだな。\nこっそり付き合ってるカップルなどだ」
2438 = "「Ừm. Ví dụ như…… để xem nào.\nMột cặp đôi đang bí mật hẹn hò chẳng hạn」"
# 【ふかみ】
# display as 深美
# JP: 「こっそり……男の子同士とか？」
2530 = "「Bí mật…… giữa hai người con trai á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「男の子同士」
2882 = "「Giữa hai người con trai」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　いまわたし、声っ」
2413 = "「Hả!? Vừa nãy em, lỡ lời」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、その可能性もあるかもしれんな。が、\n僕が想定していたのは、受験で交際を禁じられてる」
2649 = "「Đúng là cũng có khả năng đó. Nhưng,\nanh đang giả định là họ bị cấm hẹn hò vì kỳ thi」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　ですね！！　そっち！\n多分わたしも、そっちの方だと思います！　です！」
2396 = "「A! Đúng rồi!! Là cái đó!\nCó lẽ em cũng nghĩ là cái đó! Ạ!」"
# monologue
# JP: ひどく慌てて、わたわた手を振り。\nごまかすように、ふかみはポスターへと視線を戻す。
3588 = "Vô cùng luống cuống, em vội vàng xua tay.\nNhư để lấp liếm, Fukami đưa mắt nhìn lại tấm áp phích."
# 【ふかみ】
# display as 深美
# JP: 「でもでも！　こっそりつきあってるからって、\nなんで廃駅のポスターに――――あ」
2180 = "「Nhưng nhưng! Dù có đang bí mật hẹn hò đi nữa,\nthì tại sao lại vẽ lên tấm áp phích nhà ga bỏ hoang————a」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。それは恐らく、駅ごと壊され、破棄される。\nそうしたものだと、想像されるであろうから」
2502 = "「Đúng vậy. Có lẽ họ nghĩ rằng, cả nhà ga sẽ bị phá hủy và vứt bỏ.\nHọ đã tưởng tượng ra điều đó」"
# 【ふかみ】
# display as 深美
# JP: 「人に知られちゃいけない関係。だけど、\n思い出をどこかにこっそり刻んでおきたい」
2172 = "「Một mối quan hệ không được để người khác biết. Nhưng,\nhọ vẫn muốn lén khắc ghi kỷ niệm ở một nơi nào đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「いつも通学に使っていた駅の思い出とともに――\nこっそり刻んだ思い出は、永遠に眠り続ける」
2173 = "「Cùng với kỷ niệm về nhà ga mà họ luôn sử dụng để đi học——\nKỷ niệm được lén khắc ghi đó, sẽ ngủ yên mãi mãi」"
# 【ふかみ】
# display as 深美
# JP: 「それって！　それってすごくロマンチックです！」
2820 = "「Chuyện đó! Chuyện đó thật sự rất lãng mạn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「駅舎やその付随設備への落書きは、鉄道事業者の\n一員として、ご遠慮願いたいところではあるのだが」
2142 = "「Với tư cách là một thành viên của đơn vị kinh doanh đường sắt,\nanh mong mọi người đừng vẽ bậy lên nhà ga và các thiết bị đi kèm」"
# monologue
# JP: しかし……まぁ、\n丸みを帯びた、おそらくは若者の文字だ。
3146 = "Nhưng…… thôi thì,\nnhững nét chữ tròn trịa này, có lẽ là của những người trẻ tuổi."
# monologue
# JP: 役割を終え、剥がされるであろうポスタ－に、\nというところにも、目こぼしの余地を感じはする。
3737 = "Hơn nữa, việc họ vẽ lên tấm áp phích sắp hoàn thành nhiệm vụ và bị bóc đi,\ncũng khiến tôi cảm thấy có thể châm chước được phần nào."
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、ロマンチックであるかもしれんな。\nふたりが今も続いて欲しいという気持ちはするよ」
1690 = "「……Đúng là, có thể nói là lãng mạn thật.\nAnh cũng mong hai người họ vẫn còn tiếp tục bên nhau đến tận bây giờ」"
# 【ふかみ】
# display as 深美
# JP: 「ですよね！」
2623 = "「Đúng không ạ!」"
# monologue
# JP: ふかみの瞳が、いっそう熱心にきょろきょろ動く。
3629 = "Đôi mắt của Fukami lại càng nhiệt tình ngó nghiêng xung quanh."
# monologue
# JP: が、ほどなくして僕の顔へと。\nどこか、しゅうんとしてしまってる。
3171 = "Nhưng chẳng bao lâu sau, em lại nhìn vào mặt tôi.\nTrông em có vẻ ỉu xìu đi phần nào."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
# 2526 = "「怎麼了？」" 
# 【ふかみ】
# display as 深美
# JP: 「見つからなくて。わたしと双鉄おにいさんで、\nなにか、ここで、思い出を重ねられるようなもの」
2593 = "「Em không tìm thấy. Một thứ gì đó,\nđể em và anh Soutetsu có thể tô điểm thêm kỷ niệm ở đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。廃がつくとはいえ駅だしな。\n今もまだ、御一夜鉄道の資産のはずであろうし」
2442 = "「Ừm. Dù có thêm chữ 'bỏ hoang' nhưng nó vẫn là nhà ga mà.\nBây giờ chắc hẳn nó vẫn còn là tài sản của Đường sắt Ohitera」"
# 【ふかみ】
# display as 深美
# JP: 「それは、わかってます。です」
2827 = "「Chuyện đó, em hiểu mà. Ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。そこを無視するなら、\nいくらでも選択肢はあるのだろうが――」
2627 = "「Đúng vậy. Nếu phớt lờ điều đó,\nthì sẽ có vô số lựa chọn khác——」"
# monologue
# JP: ふかみの頭を、くしくし撫でる。
3430 = "Tôi xoa xoa vò đầu Fukami."
# 【ふかみ】
# display as 深美
# JP: 「わ！？　いきなり、どうしたんです？」
2316 = "「Oa!? Đột nhiên anh làm sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふかみは賢く、良い子で。\nゆえに、我慢をしてくれるのだと思ってな」
2688 = "「Không có gì, Fukami rất thông minh, lại là một cô bé ngoan.\nVì thế, anh nghĩ em sẽ chịu đựng được」"
# 【ふかみ】
# display as 深美
# JP: 「あ――……えへ、へ」
2367 = "「A——…… hehe」"
# monologue
# JP: ふかみの瞳が、いかにも心地よさげに細まる。\nくったり僕に体を預け、もっと撫でろと要求してくる。
3586 = "Đôi mắt Fukami nheo lại, trông có vẻ rất dễ chịu.\nEm ngả người tựa hẳn vào tôi, đòi được xoa đầu nhiều hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「髪の手触りが、いつもと違うな。\nこれはこれで、ここちいい」
2210 = "「Cảm giác khi chạm vào tóc em, khác với mọi khi nhỉ.\nThế này cũng dễ chịu đấy chứ」"
# 【ふかみ】
# display as 深美
# JP: 「え？　そうですか？\nシャンプーとか、別に変えたりしてないですけど」
2416 = "「Hả? Vậy sao ạ?\nEm đâu có đổi dầu gội đầu hay gì đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「汗か、あるいは湿度だろうな」
2642 = "「Chắc là do mồ hôi, hoặc là do độ ẩm đấy」"
# monologue
# JP: いつもは絹糸のごとき髪だが、\n今日はわずかにじゃれついてくる。
3352 = "Thường ngày mái tóc em mượt mà như tơ lụa,\nnhưng hôm nay lại có chút gì đó bám dính lấy tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……っと、すまんな。思わず撫でてしまった。\n髪形を乱してしまいかねんか」
1679 = "「……À, xin lỗi em. Bất giác anh cứ xoa đầu em mãi.\nCó làm rối kiểu tóc của em không?」"
# 【ふかみ】
# display as 深美
# JP: 「乱して、いい、です。\nそれもきっと、重なる、素敵な思い出だから」
2515 = "「Làm rối, cũng được, ạ.\nVì đó chắc chắn, cũng sẽ là một kỷ niệm tuyệt vời được tô điểm thêm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん、そうだな」
2615 = "「A—— ừ, đúng vậy」"
# monologue
# JP: ふかみは、賢い。\n僕が思っているより、ずっと。
3579 = "Fukami, rất thông minh.\nHơn tôi nghĩ rất nhiều."
# monologue
# JP: 落書きよりも遥かにロマンチックな行為を、\n僕とふかみは、こうして、確かに刻んでる。
3336 = "Một hành động lãng mạn hơn nhiều so với việc vẽ bậy,\ntôi và Fukami, cứ như thế này, đang thực sự khắc ghi nó."
# monologue
# JP: （ひゅううっ）
3880 = "（Vù vù）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2330 = "「唔」" 
# monologue
# JP: ふかみの髪を乱され、気づく。\nいつの間に、随分と風が出てきている。
3688 = "Nhìn thấy tóc Fukami bị thổi tung, tôi mới nhận ra.\nKhông biết từ lúc nào, gió đã thổi khá mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「寒くはないか？」
2195 = "「Em không lạnh chứ?」"
# 【ふかみ】
# display as 深美
# JP: 「え？　寒くなんて全然――あっ！　違くて、あの、\n寒い、かも、です」
2408 = "「Hả? Lạnh gì đâu, hoàn toàn không—— a! Không phải, dạ,\ncó thể là, hơi lạnh, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2635 = "「是嗎」" 
# monologue
# JP: ならばとふかみを抱きしめる。\n抱きしめたまま後ろ頭をゆっくり撫ぜる。
3507 = "Thấy vậy, tôi ôm Fukami vào lòng.\nVừa ôm em, tôi vừa chậm rãi vuốt ve phía sau đầu em."
# 【双鉄】
# display as 雙鐵
# JP: 「……しかしこう、ふかみの髪のおさげには、\nひっぱりたくなる魔力があるよな」
1691 = "「……Nhưng mà, bím tóc của Fukami,\ncó một ma lực khiến người ta muốn kéo nó thật đấy」"
# 【ふかみ】
# display as 深美
# JP: 「え？　引っ張るのはちょっとダメ、です」
2414 = "「Hả? Kéo thì hơi không được đâu, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかってはいるが、こうもつかみやすい形状だと」
2574 = "「Anh biết chứ, nhưng hình dáng nó dễ nắm thế này thì」"
# 【ふかみ】
# display as 深美
# JP: 「や、ちょっと、ダメですよぉ！」
2785 = "「A, từ từ đã, không được đâu!」"
# monologue
# JP: じゃれ合いだ。\nふかみはそれでも、律儀に僕から逃れようとし――
3802 = "Chỉ là đùa giỡn thôi.\nDù vậy, Fukami vẫn nghiêm túc cố gắng thoát khỏi tôi——"
# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2386 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2333 = "「唔？」" 
# monologue
# JP: 僕の手を抜け、\nいきなり、ホームの外へと下りる。
3660 = "Em thoát khỏi tay tôi,\nvà đột nhiên nhảy xuống khỏi sân ga."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ふかみ」
# 2525 = "「怎麼了，深美？」" 
# 【ふかみ】
# display as 深美
# JP: 「線路、渡っても平気ですか？」
2557 = "「Em băng qua đường ray, có sao không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　少し待て」
2448 = "「Hửm? Đợi một chút」"
# monologue
# JP: 信号設備は近くにはない。
3819 = "Gần đây không có thiết bị tín hiệu nào."
# monologue
# JP: ので、まず目視。\nしかる後に耳をそばだて、再度目視で安全確認。
3509 = "Vì vậy, đầu tiên là quan sát bằng mắt.\nSau đó dỏng tai lên nghe ngóng, rồi quan sát lại lần nữa để xác nhận an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「構わんぞ。が」
2264 = "「Không sao đâu. Nhưng」"
# 【ふかみ】
# display as 深美
# JP: 「すぐに戻りますからー」
2581 = "「Em sẽ quay lại ngay đây~」"
# monologue
# JP: 茂みの向こうに姿が消える。
3626 = "Bóng dáng em khuất sau bụi rậm."
# monologue
# JP: いや、そうか。ふかみの位置からなら見えるのか。\nあのあたりにも――
3148 = "À, ra vậy. Từ vị trí của Fukami thì có thể nhìn thấy sao.\nQuanh khu vực đó cũng có——"
# 【ふかみ】
# display as 深美
# JP: 「これ、さっきのお返し、です」
2736 = "「Cái này, là để đáp lễ lúc nãy, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2451 = "「À」"
# monologue
# JP: ふかみの手には、ソーダ仕立ての乳酸菌飲料。\nしかし、たったの一本しかない。
3614 = "Trong tay Fukami là một chai nước uống lên men vị soda.\nNhưng, chỉ có duy nhất một chai."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみはどうした？　飲まんのか？」
2198 = "「Fukami thì sao? Em không uống à?」"
# 【ふかみ】
# display as 深美
# JP: 「あの、さっきお水、半分だけ飲んだから。\nまた、はんぶんこできたらいいなって、思って、です」
2239 = "「Dạ, lúc nãy em chỉ uống một nửa chai nước thôi.\nNên em nghĩ, nếu lại được chia đôi với anh thì tốt biết mấy, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2635 = "「是嗎」" 
# monologue
# JP: プルタブを引き、ふかみに缶を差し出せば、\nけれどふるふると首がふられる。
3425 = "Kéo nắp lon và đưa về phía Fukami,\nnhưng em lại lắc đầu nguầy nguậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2443 = "「嗯？」" 
# 【ふかみ】
# display as 深美
# JP: 「今度は、双鉄おにいさんが、先に」
2831 = "「Lần này, anh Soutetsu, uống trước đi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
# 2479 = "「好的」" 
# monologue
# JP: 缶を口につけ傾けたなら、\nふかみの視線を、ねっとり感じる。
3410 = "Khi tôi kề lon lên miệng và dốc lên,\ntôi cảm nhận được ánh nhìn đắm đuối của Fukami."
# monologue
# JP: ……ドリンクを飲んでいるというのに、\nむしろ、喉が乾いてくる気さえしてくる。
1659 = "……Rõ ràng là đang uống nước,\nmà tôi lại có cảm giác cổ họng mình khô khốc hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ほら」
2735 = "「Đây」"
# 【ふかみ】
# display as 深美
# JP: 「はい、うふふっ。いただきまぁす」
2478 = "「Vâng, ufufu. Em xin phép ạ」"
# monologue
# JP: 嬉しげな声。
3580 = "Giọng nói vui vẻ."
# monologue
# JP: 缶を両手で大事に持って、\n今度は飲みくちを拭きもせず――
3290 = "Cẩn thận cầm lon bằng cả hai tay,\nlần này em không hề lau miệng lon mà——"
# 【ふかみ】
# display as 深美
# JP: 「んくっ――こくっ――んっ――ごくっ」
2304 = "「Ực—— ực—— ưm—— ực」"
# 【双鉄】
# display as 雙鐵
# JP: 「それほど慌てて飲まずとも――っ」
2202 = "「Em không cần phải uống vội vàng thế đâu——」"
# monologue
# JP: ふかみの口の端からつ――と、\n乳酸菌飲料がたれていく。
3612 = "Từ khóe miệng Fukami,\ndòng nước uống lên men từ từ chảy xuống."
# monologue
# JP: 凪相手ならだらしがないと、\nすぐに拭き取るところ……なのだが。
3312 = "Nếu là Nagi, tôi sẽ mắng là lôi thôi,\nvà lập tức lau đi cho con bé…… nhưng mà."
# 【ふかみ】
# display as 深美
# JP: 「んぷっ――んっ――こくっ――んくっ」
2303 = "「Ưm—— ưm—— ực—— ực」"
# monologue
# JP: 見とれてしまう。\nじっくり見れば、喉の細さに驚かされる。
3450 = "Tôi bị hớp hồn mất rồi.\nNhìn kỹ mới thấy, tôi ngạc nhiên trước chiếc cổ thon thả của em."
# monologue
# JP: 口をつたっているあの白が、か細い喉の内側を、\n動きのたびに、どろりとおちてふかみの腹へと――
3129 = "Dòng nước màu trắng chảy quanh miệng em, bên trong chiếc cổ mỏng manh ấy,\nmỗi khi cử động, lại từ từ trôi tuột xuống bụng Fukami——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2421 = "「啊？！」" 
# monologue
# JP: いかん。僕もいささか、熱に浮かされてるらしい。\nふかみから目を引き剥がし――
3141 = "Không ổn rồi. Có vẻ như tôi cũng đang bị cơn sốt này cuốn đi.\nDứt ánh mắt khỏi Fukami——"
# 【双鉄】
# display as 雙鐵
# JP: 「これはまずいな」
2822 = "「Thế này thì gay go đây」"
# 【ふかみ】
# display as 深美
# JP: 「えっ？」
2406 = "「Hả?」"
# monologue
# JP: ふかみも缶から口を離して、僕の視線を追いかける。
3559 = "Fukami cũng rời môi khỏi lon nước, dõi theo ánh nhìn của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「雲だ。完全に雨雲に変わっているぞ」
2825 = "「Mây kìa. Đã hoàn toàn chuyển thành mây đen rồi」"
# 【ふかみ】
# display as 深美
# JP: 「わ、ほんと」
2313 = "「Oa, đúng thật」"
# monologue
# JP: （びゅううっ）
3879 = "（Vù vù）"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
2276 = "「Á!」"
# monologue
# JP: 突風が、ふかみのスカートの裾を舞わせる。\n水の匂いが、どんどん濃くなる。
3137 = "Một cơn gió giật mạnh làm tung bay vạt váy của Fukami.\nMùi hơi nước trong không khí ngày càng nồng đậm."
# 【双鉄】
# display as 雙鐵
# JP: 「一雨くるな」
2519 = "「Sắp mưa to rồi」"
# 【ふかみ】
# display as 深美
# JP: 「すごい。さすがおじいちゃんたち」
2248 = "「Tuyệt quá. Quả không hổ danh các ông」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　堰さんたちが何かいっていたのか？」
2446 = "「Hửm? Nhóm ông Seki đã nói gì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「え！？　わ！？　わたしまた口に出て――\nじゃなくてそのっ、なんでもなっ――きゃああっ！？」
2422 = "「Hả!? Oa!? Em lại lỡ nói ra mất rồi——\nKhông phải đâu, cái đó, không có gì đâ—— ááá!?」"
# monologue
# JP: （ざぁぁああああああああああっ！！！）
3885 = "（Rào rào rào rào rào rào rào rào rào rào!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うわっ！？」
2314 = "「Oái!?」"
# 【ふかみ】
# display as 深美
# JP: 「やっ、なにこれっ！？　こんなにひどいとかっ」
2292 = "「Á, gì thế này!? Sao lại mưa to thế này chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――たまらん」
2821 = "「Thế này thì—— chịu không nổi」"
# monologue
# JP: 横風が雨粒を叩きつけてくる。
3185 = "Gió tạt ngang quất những hạt mưa vào người."
# monologue
# JP: ホームに残る屋根は仕事をしているが、\nにもかかわらず、どんどんずぶ濡れになっていく。
3338 = "Mái che còn sót lại trên sân ga đang làm nhiệm vụ của nó,\nnhưng bất chấp điều đó, chúng tôi vẫn dần ướt sũng."
# 【ふかみ】
# display as 深美
# JP: 「あああ、せっかくのお洋服が～」
2382 = "「Aaa, bộ quần áo em mới cất công mặc~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ、こいっ！」
2699 = "「Fukami, lại đây!」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！！？」
# 2421 = "「啊？！」" 
# monologue
# JP: ふかみの手を引き、線路沿いを更に先へと進む。
3423 = "Tôi kéo tay Fukami, chạy dọc theo tuyến đường sắt tiến về phía trước."
# monologue
# JP: 僕の記憶が確かなら、\nもう少し行ったところに――ああ、あった！
3309 = "Nếu trí nhớ của tôi không nhầm,\nđi thêm một chút nữa sẽ có—— a, thấy rồi!"
# 【双鉄】
# display as 雙鐵
# JP: 「ここなら、風雨をしのげるぞ」
2834 = "「Nếu là ở đây, chúng ta có thể tránh mưa gió đấy」"
# 【ふかみ】
# display as 深美
# JP: 「は、はいっ！」
2474 = "「V, vâng!」"
# monologue
# JP: 駆け込んで、肩で大きく息をして。\n恐る恐るといった感じに、あたりを見回す。
3384 = "Chạy tót vào trong, thở dốc phập phồng.\nVới vẻ sợ sệt, em đưa mắt nhìn quanh."
# 【ふかみ】
# display as 深美
# JP: 「ここ……って」
2835 = "「Nơi này…… là」"
# 【双鉄】
# display as 雙鐵
# JP: 「保線小屋――の、成れの果てだな。\n保線の道具の倉庫、兼、休憩所だった場所だ」
2510 = "「Túp lều \\\\x%l保線;#00ffc040;bảo trì đường ray%l;#;—— tàn tích của nó thôi.\nTừng là nhà kho chứa dụng cụ \\\\x%l保線;#00ffc040;bảo trì đường ray%l;#;, kiêm luôn chỗ nghỉ ngơi」"
# 【ふかみ】
# display as 深美
# JP: 「あ……だから、ボロボロ――」
2373 = "「A…… hèn chi, nó tồi tàn thế này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、風雨はしのげるし、椅子もある。\n夕立だろうし、止むまで待とう」
2182 = "「Nhưng có thể tránh mưa gió, và có cả ghế nữa.\nChắc chỉ là mưa rào thôi, chúng ta hãy đợi đến khi tạnh nhé」"
# 【ふかみ】
# display as 深美
# JP: 「はい――です――んっ」
2481 = "「Vâng—— ạ—— ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 2421 = "「啊？！」" 
# monologue
# JP: ふかみがやおら、\nスカートの裾を絞り始める。
3662 = "Fukami chậm rãi,\nbắt đầu vắt nước ở vạt váy."
# 【ふかみ】
# display as 深美
# JP: 「やぁん……こんなに濡れちゃって――んっ」
2784 = "「Ưm…… ướt nhẹp hết cả rồi—— ưm」"
# monologue
# JP: か細い腕が動くたび、ぽたぽたと、\nスカートの裾からしずくが落ちる。
3170 = "Mỗi khi đôi tay thon gầy ấy cử động, từng giọt từng giọt nước,\ntừ vạt váy rơi xuống tí tách."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2451 = "「噢」" 
# monologue
# JP: そして、納得させられる。\n透けたふかみに感じた、違和感が――
3508 = "Và rồi, tôi đã hiểu ra.\nCảm giác kỳ lạ khi nhìn thấy lớp áo mỏng manh ướt sũng của Fukami——"
# 【双鉄】
# display as 雙鐵
# JP: 「ブラジャーを、してこなかったのだな」
2204 = "「Em, không mặc áo ngực nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ」
2275 = "「Á」"
# 【双鉄】
# display as 雙鐵
# JP: 「隠さない。\n風邪を引くぞ？　そのまま、絞っていればいい」
2235 = "「Đừng giấu.\nSẽ bị cảm đấy? Cứ tiếp tục vắt nước đi」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい」
2473 = "「V, vâng」"
# monologue
# JP: 濡れた冷たさもあるのだろうか。\nふかみの体が、小さく震える。
3483 = "Có lẽ vì ướt và lạnh.\nCơ thể Fukami khẽ run rẩy."
# monologue
# JP: 抱きしめ、思い切り温めたい。\nそうも思うが、いまはふかみを目で楽しもう。
3400 = "Muốn ôm em vào lòng, sưởi ấm cho em hết mức có thể.\nTuy nghĩ vậy, nhưng bây giờ tôi muốn thưởng thức vẻ đẹp của Fukami bằng mắt trước đã."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、ブラジャーをしてこなかったのだ？」
2208 = "「Tại sao em lại không mặc áo ngực?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの……今日、たくさん歩くつもりで、\nその――暑いかなって、思ったりも、して」
2818 = "「D, dạ…… hôm nay, vì định sẽ đi bộ nhiều,\nnên—— em nghĩ là, sẽ nóng, nên mới」"
# 【双鉄】
# display as 雙鐵
# JP: 「暑くなれば、汗をかくよな」
2782 = "「Nóng thì sẽ đổ mồ hôi mà nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい」
2608 = "「V, vâng」"
# monologue
# JP: ふかみの足がもじもじ動く。
3591 = "Đôi chân Fukami ngọ nguậy không yên."
# monologue
# JP: 裾を絞っていた手は止まり、\nまるで自分のスカートにすがりつくようになっている。
3285 = "Đôi tay đang vắt vạt váy dừng lại,\ntrông như thể em đang bám chặt lấy chiếc váy của chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「汗をかけば透ける――と、思わなかったか？」
2203 = "「Em không nghĩ là—— đổ mồ hôi thì áo sẽ bị xuyên thấu sao?」"
# 【ふかみ】
# display as 深美
# JP: 「お、思いましたです……けどっ――」
2531 = "「C, có nghĩ ạ…… nhưng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2386 = "「啊！」" 
# monologue
# JP: 小さく、小さく体が動く。\nふかみが動かしているのではない。
3627 = "Cơ thể khẽ, khẽ chuyển động.\nKhông phải do Fukami chủ động làm vậy."
# monologue
# JP: 体の、ほんの一部が自ら――\n乳首が、ぷっくり膨らんでいく。
3517 = "Một phần nhỏ xíu của cơ thể, tự nó——\nNúm vú, đang dần nhô lên căng mọng."
# 【ふかみ】
# display as 深美
# JP: 「そ、双鉄おにいさんに、なら……見て、欲しい……\nです、し――あと、線路沿い、人、いないと思ったし」
2464 = "「N, nếu là anh Soutetsu…… thì em muốn, anh nhìn……\nạ, với lại—— em nghĩ, dọc đường sắt, sẽ không có người」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜に戻るときにはどうするつもりだ」
2867 = "「Lúc quay về Ohitera thì em định làm thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「貸してくれます。双鉄おにいさんなら。\n絶対、シャツとか、そういう、の」
2214 = "「Anh sẽ cho em mượn mà. Nếu là anh Soutetsu.\nChắc chắn, áo sơ mi hay thứ gì đó, đại loại vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、確かにな」
2440 = "「Chà, cũng đúng thật」"
# monologue
# JP: その上で、レールショップへ戻ってしまえば、\n制服の換えのブラウスなども借りられる。
3738 = "Hơn nữa, nếu quay về cửa hàng đường sắt,\nem cũng có thể mượn áo blouse thay thế của đồng phục."
# monologue
# JP: ふかみがそこまで考えて、\nあえてブラジャーを外してきたなら……
3510 = "Nếu Fukami đã tính toán đến mức đó,\nvà cố tình cởi áo ngực ra thì……"
# 【双鉄】
# display as 雙鐵
# JP: 「つまりは僕に見せるため。\nそのために、ブラジャーを外してきてくれたのか」
2150 = "「Tóm lại là để cho anh xem.\nVì vậy nên em mới cởi áo ngực ra đúng không」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい……あの――やっぱり、せっかくの\nふたりでのデート、だし……こないだは――その」
2607 = "「V, vâng…… dạ—— dẫu sao thì, hiếm khi mới có\nbuổi hẹn hò của hai đứa, mà…… lần trước thì—— cái đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2622 = "「是啊」" 
# monologue
# JP: 急用が入り、デートは中止。
3250 = "Có việc gấp đột xuất, nên buổi hẹn hò bị hủy."
# monologue
# JP: 結果としては、それがふかみに……\nおあずけさせる形となってしまっていたらしい。
3711 = "Kết quả là, điều đó có vẻ như đã khiến Fukami……\nphải chờ đợi trong hụt hẫng."
# 【ふかみ】
# display as 深美
# JP: 「その……だから――わたし、\n今日は、って――思って」
2585 = "「Cái đó…… nên—— em,\nnghĩ là, hôm nay phải——」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、なんだ？」
2130 = "「Hôm nay phải làm sao?」"
# monologue
# JP: （こしゅ）
3904 = "（Cọ nhẹ）"
# 【ふかみ】
# display as 深美
# JP: 「ひうっ！！？」
2293 = "「Hya!!?」"
# monologue
# JP: ふかみの乳首を、一瞬撫ぜる。\nただそれだけで、ふかみの体は大きく動く。
3429 = "Tôi lướt nhẹ qua núm vú của Fukami trong tích tắc.\nChỉ bấy nhiêu thôi cũng đủ khiến cơ thể em giật nảy lên."
# 【ふかみ】
# display as 深美
# JP: 「あ……あ――おっぱいっ」
2364 = "「A…… a—— ngực」"
# 【双鉄】
# display as 雙鐵
# JP: 「『今日はおっぱい？』\nそれでは、意味がわからんな」
2132 = "「『Hôm nay phải ngực?』\nNói thế thì, anh chẳng hiểu ý em là gì cả」"
# 【ふかみ】
# display as 深美
# JP: 「ぁっ――」
# 2336 = "「啊……」" 
# monologue
# JP: 両手をあげて肩をすくめる。\n途端、ふかみがもどかしそうな声をだす。
3637 = "Tôi giơ hai tay lên và nhún vai.\nNgay lập tức, Fukami cất giọng có vẻ sốt ruột."
# 【ふかみ】
# display as 深美
# JP: 「今日は、おっぱい、とか――わたし、たくさん、\n双鉄おにいさんに、さわって、ほし、くて」
2165 = "「Hôm nay, ngực, chẳng hạn—— em, muốn,\nanh Soutetsu, chạm vào, thật nhiều, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「とか、とは？」
2163 = "「Chẳng hạn, là sao?」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ」
# 2383 = "「啊嗚」" 
# monologue
# JP: ふかみの足がもぞりと動く。\n濡れて肌に貼り付くパンツも、うごめく。
3658 = "Đôi chân Fukami ngọ nguậy.\nChiếc quần lót ướt dính sát vào da em cũng cử động theo."
# 【ふかみ】
# display as 深美
# JP: 「あ……あの――とか、は――ええと、おしり、\nとか……おま……おま――おま、た、とか、です」
2841 = "「D, dạ—— chẳng hạn, là—— ưm, mông,\nchẳng hạn…… h… háng—— háng, chẳng hạn, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど？」
2639 = "「Ra vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「きゃうっ！！」
2286 = "「Kyau!!」"
# monologue
# JP: すぐに、触れたい。温めたい。\nけれども、まだまだ言葉が足りない。
3418 = "Muốn chạm vào ngay lập tức. Muốn sưởi ấm cho em.\nNhưng, như thế này thì vẫn chưa đủ lời lẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「おまた、というのはこの辺か？」
2472 = "「Háng, là chỗ này à?」"
# monologue
# JP: （とんっ）
3910 = "（Gõ nhẹ）"
# 【ふかみ】
# display as 深美
# JP: 「ふっ――うっ――」
2327 = "「Phù—— ư——」"
# monologue
# JP: 子宮の上とおぼしきところ。\nそこを、指先でノックする。
3446 = "Chỗ có vẻ như nằm phía trên tử cung.\nTôi dùng đầu ngón tay gõ nhẹ vào đó."
# 【ふかみ】
# display as 深美
# JP: 「あ……の、もっと――下っ――」
2857 = "「Dạ…… xuống—— dưới một chút nữa——」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ならばこのあたりだな」
2636 = "「Ra vậy. Nếu thế thì là quanh đây nhỉ」"
# monologue
# JP: （つうっ）
3888 = "（Vuốt dọc）"
# 【ふかみ】
# display as 深美
# JP: 「ふきゅっ！」
# 2276 = "「呀！」" 
# monologue
# JP: 伝わり落ちるふかみの蜜が、指先に絡みついてくる。
3767 = "Dòng mật ngọt rỉ xuống của Fukami, quấn lấy đầu ngón tay tôi."
# 【ふかみ】
# display as 深美
# JP: 「はあっ――はあっ――はあっ――ん、くっ――\nあのっ――そこ――でも――なく、てっ――」
2349 = "「Hà—— hà—— hà—— ưm, ư——\nDạ—— chỗ đó—— cũng—— không phải, đâu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2386 = "「啊！」" 
# monologue
# JP: ふかみが自ら、僕を導く。
3650 = "Tự thân Fukami, dẫn dắt tay tôi."
# 【ふかみ】
# display as 深美
# JP: 「ここ、です――おまた――おまん、こ、も――\n双鉄、おにいさんに――さわって――ほしっ」
2651 = "「Chỗ này, ạ—— háng—— cô, bé, nữa——\nMuốn—— anh Soutetsu—— chạm vào——」"
# monologue
# JP: （くしゅっ！）
3908 = "（Miết nhẹ!）"
# 【ふかみ】
# display as 深美
# JP: 「んゆんっ！！！」
2397 = "「Nyun!!!」"
# monologue
# JP: 僕自身ももう、我慢できない。
3460 = "Chính bản thân tôi, cũng không thể chịu đựng thêm được nữa."
# monologue
# JP: （くしゅっ――ごしゅっ――しにゅっ――すにゅっ）
3905 = "（Miết—— miết—— xoa—— xoa）"
# 【ふかみ】
# display as 深美
# JP: 「あっっ――ふっ――あっ――いいっ――んっ！　ふ、\nおま、た――おまん、こ――こしゅこしゅ、され、て」
2337 = "「A—— phù—— a—— sướng—— ưm! Phù,\nHáng—— cô, bé—— bị, miết, miết」"
# monologue
# JP: 僕の性器を受け入れて、精液を何度も飲み干してなお、\nふかみの縦筋はシンプルだ。
3499 = "Dù đã tiếp nhận dương vật của tôi, uống cạn tinh dịch biết bao lần,\nkhe dọc của Fukami vẫn trông thật đơn giản."
# monologue
# JP: 大陰唇の厚みも薄く、それであるのにはっきりと、\n僕の指先を挟み込み、もっともっとと要求してくる。
3276 = "Môi lớn cũng mỏng manh, vậy mà nó lại kẹp chặt lấy\nđầu ngón tay tôi một cách rõ ràng, đòi hỏi nhiều hơn, nhiều hơn nữa."
# 【ふかみ】
# display as 深美
# JP: 「はうっ――んっ――ふっ――指、それっ――\nふやんっ！　くりって、され、るとぉっ」
2366 = "「A ư—— ưm—— phù—— ngón tay, cái đó——\nPhuyan! Bị, miết, hột le, thì」"
# monologue
# JP: 膣には、挿れない。\n挿れないままに、指先を軽く折り曲げ、擦る。
3432 = "Tôi không đút vào âm đạo.\nCứ để nguyên như vậy, tôi hơi gập đầu ngón tay lại, cọ xát."
# monologue
# JP: （こしゅっ！　クりゅっ！　くにっ！　ちゅぐっ）
3903 = "（Miết! Vê! Nhấn! Ấn!）"
# 【ふかみ】
# display as 深美
# JP: 「はあっ――あっ――いり、ぐちっ――んっ――ふ、\nおまん、この――いり、ぐちの、とこ――ぁ、はっ」
2341 = "「Hà—— a—— cửa, vào—— ưm—— phù,\nCửa, vào—— của, cô bé—— a, hà」"
# monologue
# JP: ふかみの膣口はわなないている。\n僕の指先を捕まえようと、必死になって蠢いている。
3607 = "Cửa âm đạo của Fukami đang run rẩy.\nNó ngọ nguậy tuyệt vọng như muốn tóm lấy đầu ngón tay tôi."
# 【ふかみ】
# display as 深美
# JP: 「じれった、い――です――おまんこ、もっと――\nんっ――おまんこ、おまんこ、だけ、じゃ、なくっ」
2483 = "「Bứt rứt, quá—— ạ—— cô bé, thêm nữa——\nƯm—— cô bé, không, chỉ, là, cô bé」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2449 = "「!!?」"
# monologue
# JP: ふかみが僕に抱きついてくる。\n抱きつき、ひたすらなキスをする。
3593 = "Fukami ôm chầm lấy tôi.\nEm ôm chặt, và trao cho tôi những nụ hôn cuồng nhiệt."
# 【ふかみ】
# display as 深美
# JP: 「んっ――っ――ふっ――んっ――ちゅうっ――\nちゅくっ――ちゅっ――んふっ――ちゅ、んぁ」
2431 = "「Ưm—— ư—— phù—— ưm—— chụt——\nChụt—— chụt—— ưm—— chụt, a」"
# monologue
# JP: （ぐりっ――ぐっ――ぐいっ――ぐりゅっ）
3906 = "（Cọ—— cọ—— cọ—— cọ）"
# monologue
# JP: ズボンの上から、強烈に股間を押し付けてくる。
3575 = "Qua lớp quần, em ép chặt đũng quần mình vào tôi một cách mãnh liệt."
# monologue
# JP: 僕の勃起の形を全部、\n下腹部に刻もうとでもするかのように。
3331 = "Như thể em muốn khắc ghi toàn bộ hình dáng sự cương cứng của tôi,\nlên vùng bụng dưới của mình vậy."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あっ――んっ――ちゅ――ぷあっ！\nあ――ほしい、です――全部、双鉄、おにいさん」
2351 = "「Phù—— a—— ưm—— chụt—— phù!\nA—— em muốn, ạ—— toàn bộ, anh, Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。ふかみの全部が欲しい」
2548 = "「Anh cũng vậy. Anh muốn toàn bộ của Fukami」"
# 【ふかみ】
# display as 深美
# JP: 「あんっ！」
# 2433 = "「嗯！」" 
# monologue
# JP: ふかみを椅子に座らせて、大きく、体を開かせる。
3468 = "Tôi để Fukami ngồi lên ghế, dang rộng cơ thể em ra."
# 【ふかみ】
# display as 深美
# JP: 「はぅ……あ……双鉄おにい、さん――\nはずかしい、です」
2361 = "「A ư…… a…… anh, Soutetsu——\nEm xấu hổ, lắm ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、見てもらいたかったのだろう？」
2183 = "「Nhưng, em muốn anh nhìn mà, đúng không?」"
# monologue
# JP: （くりゅっ）
3894 = "（Vê nhẹ）"
# 【ふかみ】
# display as 深美
# JP: 「んっ――ふあっ――」
2430 = "「Ưm—— phù——」"
# monologue
# JP: ささやかながら確かな乳房。\nそのいただきを、優しく優しく揉み潰す。
3606 = "Bầu ngực tuy nhỏ nhắn nhưng săn chắc.\nTôi nhẹ nhàng, nhẹ nhàng xoa nắn phần đỉnh của nó."
# 【ふかみ】
# display as 深美
# JP: 「ふっ――んっ――じんじん、ってして――ふぁ――\nはっ――ふ、ぅっ――んっ……じれ、たく、って」
2301 = "「Phù—— ưm—— tê tê, rần rần—— phù——\nHà—— phù, ư—— ưm…… bứt, rứt, quá」"
# monologue
# JP: （ふにっ――もみゅっ）
3907 = "（Nắn—— xoa）"
# 【ふかみ】
# display as 深美
# JP: 「んうぅっ！」
2428 = "「Ưm ư!」"
# monologue
# JP: 揉み上げるように乳房を弄る。\n優しく優しく、柔らかく。
3479 = "Tôi xoa bóp bầu ngực như đang nâng niu nó.\nThật nhẹ nhàng, thật mềm mại."
# 【ふかみ】
# display as 深美
# JP: 「は……あっ――きもちいいっ――ンッ――そうてつ、\nおにいさん、の――てっっ――あったか、くって」
2355 = "「Hà…… a—— sướng quá—— ưm—— tay, của——\nAnh, Soutetsu—— ấm, quá」"
# monologue
# JP: 雨に打たれて冷え切っていたふかみの肌が、熱くなる。\n汗がじわじわ浮いてきて、肌に適度なぬめりを与える。
3652 = "Làn da lạnh buốt vì ngấm mưa của Fukami, đang nóng dần lên.\nMồ hôi rịn ra, tạo cho làn da một độ trơn trượt vừa phải."
# monologue
# JP: （ぬるっ――にゅるっ――もみゅっ――ぬちゅっ）
3895 = "（Trơn—— trượt—— xoa—— nắn）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――あ――おっぱい、ちく、びっ――んっ、\nもっと――もっと、つよくても、へい、き――ふぁっ」
2358 = "「Phù—— a—— ngực, núm, vú—— ưm,\nMạnh—— mạnh hơn, chút nữa, cũng không, sao—— phù」"
# monologue
# JP: （つねっ）
3893 = "（Véo）"
# 【ふかみ】
# display as 深美
# JP: 「んううううううっっ！？　ひぁっ――あっ！\nちくび、のび、ちゃうっ――きゅうって、され、たら」
2335 = "「Ưm ư ư ư ư ư ư!? Hya—— a!\nNúm vú, giãn, ra mất—— bị, véo, như vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはいかん。伸びないように、ケアしておこう」
2824 = "「Thế thì không được. Để anh chăm sóc nó, kẻo nó giãn ra mất」"
# 【ふかみ】
# display as 深美
# JP: 「え？　あ――あむっ――んっ――」
2409 = "「Hả? A—— a ưm—— ưm——」"
# monologue
# JP: ふかみの口に指を運べば、\nすぐさまふかみはくわえてくれる。
3409 = "Đưa ngón tay lên miệng Fukami,\nem ngay lập tức ngậm lấy."
# 【ふかみ】
# display as 深美
# JP: 「ちゅぽっ――っへ？　あ、もう？」
2424 = "「Chụt—— hả? A, xong rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「欲しかったのは、唾液だからな」
2553 = "「Thứ anh cần, là nước bọt của em mà」"
# monologue
# JP: （ぬろんっ）
3890 = "（Quyệt）"
# 【ふかみ】
# display as 深美
# JP: 「あう、んっ――ちく、びっ――んっ――先、から\n――ふ、ぁ――おっぱい――にゅる、って」
2384 = "「A ư, ưm—— núm, vú—— ưm—— từ, đầu\n——phù, a—— ngực—— trơn, tuột」"
# monologue
# JP: 乳首の先から、乳房全体。
3415 = "Từ đầu núm vú, cho đến toàn bộ bầu ngực."
# monologue
# JP: ふかみ自身の唾液をまんべんなくまぶし、\n伸びないようにと手当する。
3489 = "Thoa đều nước bọt của chính Fukami lên,\nchăm sóc để nó không bị giãn ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ここも、予めケアしておくか」
2833 = "「Chỗ này, cũng phải chăm sóc trước mới được」"
# monologue
# JP: 左手の指をふかみの口へ。\nたっぷり唾液をまぶしてもらう。
3382 = "Đưa ngón tay trái vào miệng Fukami.\nĐể em thoa đẫm nước bọt lên đó."
# monologue
# JP: （ぬぶっ）
3926 = "（Đút vào）"
# 【ふかみ】
# display as 深美
# JP: 「んうっ！！」
2429 = "「Ưm ư!!」"
# monologue
# JP: つるりと飲み込まれる感覚と、\n肉を割り込む、うねりを伴う抵抗感と。
3449 = "Cảm giác trơn tuột khi bị nuốt chửng,\nvà cảm giác kháng cự kèm theo sự nhấp nhô khi chen vào giữa những thớ thịt."
# monologue
# JP: 僕の体を受け入れつつも、いまだ性には戸惑っている、\n――ふかみの、膣の、感触だ。
3203 = "Dù đã tiếp nhận cơ thể tôi, nhưng vẫn còn bỡ ngỡ với tình dục,\n——đó là cảm giác, từ âm đạo, của Fukami."
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――中ッ――っっ――あっ、ふあっ、\n指っ――ん、っ――うっ――こすって――ふ、あ」
2359 = "「Hà—— a—— bên trong—— a, phù,\nNgón tay—— ưm, ư—— ư—— cọ xát—— phù, a」"
# monologue
# JP: 指を鍵にし、浅いところの天井側をしつこく撫ぜる。
3444 = "Cong ngón tay lại như chiếc chìa khóa, tôi miên man vuốt ve phần trần ở phía nông."
# 【ふかみ】
# display as 深美
# JP: 「そこ、感じっ――はっ――あっ――指、\nなぜなぜって――んっ――よこ、に、こす、って」
2661 = "「Chỗ đó, cảm giác—— hà—— a—— ngón tay,\nVuốt ve—— ưm—— cọ, sang, hai bên」"
# monologue
# JP: こするというより、回す感覚。
3377 = "Cảm giác giống như đang xoay tròn hơn là cọ xát."
# monologue
# JP: ふかみの天井、肉がはっきりと波立つ部分を、\nしつこく、ゆるく撫ぜ回す。
3156 = "Phần trần của Fukami, nơi những thớ thịt gợn sóng rõ rệt,\ntôi chậm rãi, miên man vuốt ve xoay tròn."
# 【ふかみ】
# display as 深美
# JP: 「そこっ――やっ――らめっ――ふっ、あっ――\nきもち、よす――ぎて――んっ――だめ、ふ、ぅ」
2876 = "「Chỗ đó—— không—— đừng—— phù, a——\nSướng, quá—— mất—— ưm—— không được, phù, ư」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにが、ダメだ？」
2524 = "「Sao lại, không được?」"
# 【ふかみ】
# display as 深美
# JP: 「ひとり、で――先っ――んっ――はっ――\nいっちゃう、の、――やぁ――で、すっ――んっ」
2546 = "「Một mình—— ra trước—— ưm—— hà——\nLà, không—— chịu—— đâu, ạ—— ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。いくなら、一緒がいいな」
2632 = "「Đúng vậy. Nếu lên đỉnh, thì cùng nhau sẽ tốt hơn」"
# monologue
# JP: 望みは、同じだ。\nズボンの前を大きく開いて――
3272 = "Mong muốn của chúng tôi, là giống nhau.\nTôi kéo rộng khóa quần ra——"
# 【ふかみ】
# display as 深美
# JP: 「あ……ここ、です――ふ……ァッ――\nそうてつ、おにいさん、の――おちん、ちんっ」
2371 = "「A…… chỗ này, ạ—— phù…… a——\nChim, của—— anh, Soutetsu」"
# monologue
# JP: 無意識にだろう。\nふかみの腰が、誘う動きでヒクついている。
3617 = "Chắc là trong vô thức.\nHông của Fukami, đang giật giật với những chuyển động mời gọi."
# monologue
# JP: 拒む理由など、なにひとつ無い。
3402 = "Không có bất kỳ lý do gì để từ chối cả."
# monologue
# JP: （ずっ！）
3915 = "（Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「はああああああっっっ」
2379 = "「Hà a a a a a a a」"
# monologue
# JP: これほどぬかるみ濡れているのに、\nうねって迎えてくれているのに、なお、かたい。
3514 = "Dù đã lầy lội ướt đẫm đến mức này,\ndù đang nhấp nhô chào đón tôi, nhưng vẫn còn rất khít."
# monologue
# JP: （ずっっ――じゅ――）
3913 = "（Phập—— chụt——）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あっ――おっき――おっき、いっ――\nおちん、ちんっ――そこ――ふとい――とこっ――っ」
2352 = "「Phù—— a—— to—— to, quá——\nChim—— chỗ đó—— chỗ, thô to——」"
# monologue
# JP: 歯のない口に噛まれるような強い締め付け。\nその中に、ゆるゆる割って、押し込んでいく。
3603 = "Sự siết chặt mạnh mẽ như bị một cái miệng không răng cắn lấy.\nVào trong đó, tôi từ từ nong ra, và đẩy sâu vào."
# monologue
# JP: （ずっ――じりゅっ――ず、ぬっ）
3912 = "（Phập—— chụt—— phập, ngoáy）"
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――来てるっ――きたっ――\nわたし――おまん、こ――いっぱい、きて、るっ」
2339 = "「Hà—— a—— đang vào—— vào rồi——\nCô, bé—— của em—— đang vào, ngập tràn, rồi」"
# monologue
# JP: （ぐ――ずうっ）
3914 = "（Hự—— phập）"
# 【ふかみ】
# display as 深美
# JP: 「ひあっ――あっ――おちん、ちん――すごっ――\nそうてつ、おにいさん――あつ、くて――ぶく、って」
2273 = "「Hya—— a—— chim—— tuyệt quá——\nAnh, Soutetsu—— nóng, quá—— phình to, ra」"
# monologue
# JP: （ぶちゅんんっ！！！）
3884 = "（Bịch!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふきゅうううんんっ！！　ふあっ――おく――\nいちば――んっ――子宮――こちゅん、ってっ――」
2287 = "「Fukyuuuuun!! Phù—— bên trong——\nSâu, nhất—— tử cung—— bị, chạm vào, rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「入った……なっ」
2819 = "「Vào hết…… rồi nhỉ」"
# monologue
# JP: 動きを止める。\n止めなければすぐ、吐精させられる。
3386 = "Tôi dừng chuyển động lại.\nNếu không dừng, tôi sẽ bị ép xuất tinh ngay lập tức."
# 【ふかみ】
# display as 深美
# JP: 「わかる、です。――んっ――双鉄、おにいさん、の\n――かた、ち――ふあっ――おちん、ちん――のっ」
2577 = "「Em biết, ạ. ——Ưm—— hình, dáng——\nCủa, anh, Soutetsu—— phù—— của, chim——」"
# monologue
# JP: （にゅぐぐぐっ）
3917 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「～～っ！」
# 2386 = "「啊！」" 
# monologue
# JP: 止めているのに、ふかみの腰も動かないのに、\n膣のうねりが責め立ててくる。
3388 = "Rõ ràng tôi đã dừng lại, hông của Fukami cũng không hề nhúc nhích,\nnhưng sự nhấp nhô của âm đạo lại đang tấn công tôi."
# monologue
# JP: 僕に強力に密着し、甘く、きつく締め付けながら、\n小さく蠢き、無数の柔肉で揉みしだいてくる。
3466 = "Nó bám chặt lấy tôi một cách mạnh mẽ, siết chặt ngọt ngào,\nkhẽ ngọ nguậy, nhào nặn tôi bằng vô số thớ thịt mềm mại."
# monologue
# JP: （ずるうううううっっ）
# 3914 = "（滋……）" 
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あっ――ひ、ぅっ――おまんこ、の――\nうえっ――んっ――ひっかく――みたい、でっ――」
2362 = "「Phù—— a—— hi, ư—— phần trên——\nCủa, cô bé—— ưm—— giống như, đang cào—— vậy——」"
# monologue
# JP: もう暫くは動けない。動けば精を吐かされるから。\n窮屈で快適な膣内を、もっとじっくり――っ！？
3435 = "Tôi không thể nhúc nhích thêm một lúc nữa. Vì nếu cử động, tôi sẽ xuất tinh mất.\nBên trong âm đạo chật chội và thoải mái này, tôi muốn từ từ thưởng thức thêm——!?"
# monologue
# JP: （ずぶうううううううっっ！）
# 3915 = "（滋！）" 
# 【ふかみ】
# display as 深美
# JP: 「ひゅあっ！　あっ――ふあっ！　これ――しゅご、\nんううう――おく――ゆっくり――おされ、る、のっ」
2278 = "「Hya! A—— phù! Cái này—— tuyệt,\nƯm ư ư—— bên trong—— từ từ—— bị, đẩy, vào」"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ」
# 2330 = "「唔」" 
# monologue
# JP: けれど、体が止まらない。\nふかみの肉と、僕の肉とが呼応している。
3232 = "Nhưng, cơ thể tôi không thể dừng lại.\nDa thịt của Fukami, và da thịt của tôi đang hô ứng với nhau."
# monologue
# JP: 凸と凹。肉襞の、亀頭の突起のレベルですらも、\n噛み合い、魅き合い、貼り付き剥がれあっている。
3127 = "Lồi và lõm. Thậm chí ở cấp độ của những nếp gấp thịt, những điểm gồ ghề của quy đầu,\nchúng cũng đang cắn chặt lấy nhau, thu hút nhau, dính sát rồi lại tách rời nhau."
# 【ふかみ】
# display as 深美
# JP: 「はっ――あううっ――ふっ――あっ――おまんこ、\nとけっ――ちゃ、うっ――ゆっく、り、にゅるっ、て」
2343 = "「Hà—— a ư—— phù—— a—— cô bé,\nSắp, tan, chảy—— mất—— từ, từ, trơn, tuột」"
# monologue
# JP: （ずりゅうううううううっ！）
3892 = "（Rút ra!）"
# 【ふかみ】
# display as 深美
# JP: 「きゃふっ！！！？」
# 2293 = "「呀？！」" 
# monologue
# JP: （ずばんっ！！！）
3901 = "（Phập!!!）"
# 【ふかみ】
# display as 深美
# JP: 「はああああああぁぁぁぁん！」
2380 = "「Hà a a a a a a a a a a n!」"
# monologue
# JP: 制御できない。\nならば、思い切り貪るのみだ。
3442 = "Không thể kiểm soát được nữa.\nNếu vậy, chỉ còn cách ngấu nghiến hết mình thôi."
# monologue
# JP: （ずぶっ！　ずばっ！　ぐぱっ！　でゅぶっ！）
3897 = "（Phập! Phập! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「ひあっ！　あっ――はげしっ――はげ、し、いっ、\nばちゅん、ばちゅんって、おまんこ、音、してっ」
2280 = "「Hya! A—— mãnh liệt—— mãnh, liệt, quá,\nBạch, bạch, cô bé, phát ra, tiếng, kêu」"
# monologue
# JP: （ぐりっ――ぐりゅんっ！　ぐ――ぐううっ）
3896 = "（Ngoáy—— ngoáy! Ngoáy—— ngoáy）"
# 【ふかみ】
# display as 深美
# JP: 「ひぎゅっ！　それっ、しゅきっ――ん――\nそりって――おまんこ――かべ――おちんちんっ」
2285 = "「Higyu! Cái đó, thích—— ưm——\nCong lên—— thành—— cô bé—— chim」"
# monologue
# JP: （ずるうううっ！　ばちゅっ！　ずうっ！　ごつっ！）
3899 = "（Rút ra! Bạch! Phập! Cộc!）"
# 【ふかみ】
# display as 深美
# JP: 「はぁあああっっ、ふっ！　あっ！　しきゅうっ！\nほしっいっ――ふあっ――ごつって――ノックぅっ」
2402 = "「Hà a a a, phù! A! Tử cung!\nMuốn—— phù—— bị cộc—— gõ cửa」"
# monologue
# JP: （じゅぶっ！　じゅばっ！　ぼぢゅっ！　じゅぶっ！）
# 3897 = "（插！插！插！插！）" 
# 【ふかみ】
# display as 深美
# JP: 「やっ！　あっ！　はげしっ！　はげし、いっ！　ん、\nおな、か――おまん、こ――きゅんきゅん、し、て」
2281 = "「Á! A! Mãnh liệt! Mãnh, liệt, quá! Ưm,\nBụng—— cô, bé—— co thắt, liên tục」"
# monologue
# JP: 精液がじわじわこみ上げてくる。\n腰が、体が熱くなってる。
3708 = "Tinh dịch đang dần dần trào dâng lên.\nHông tôi, cơ thể tôi đang nóng ran."
# monologue
# JP: （ばちゅっ！　じゅぶっ！　じゅっっ！　じゅばっ！）
# 3897 = "（插！插！插！插！）" 
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　おくっ！　おくっ！　もっと！\nちゅって！　ぐりっ！　おちん、ちん――キスぅっ」
2391 = "「Hà! A! Bên trong! Bên trong! Nữa đi!\nMút đi! Ngoáy đi! Chim—— hôn đi」"
# monologue
# JP: 望まれるまま、押し付ける。\nだが、このままでは――
3426 = "Đúng như em mong muốn, tôi ấn sâu vào.\nNhưng, cứ thế này thì——"
# monologue
# JP: （きゅうっ！）
3920 = "（Siết chặt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2421 = "「啊？！」" 
# monologue
# JP: ふかみの足が、絡んで来ている。
3619 = "Đôi chân Fukami, đang quấn chặt lấy tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ、これ、では――抜けない、ぞっ」
2697 = "「Fukami, thế này, thì—— anh không rút ra được, đâu」"
# 【ふかみ】
# display as 深美
# JP: 「ぬいちゃ、やっ――ぬい、ちゃ――\nらめっ、れすぅっ――んっ――なか、なかにっ」
2234 = "「Rút ra, không chịu—— rút, ra——\nKhông được, đâu—— ưm—— bên trong, bắn vào bên trong đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2476 = "「Được」"
# monologue
# JP: （ズッ――じゅるっ！　じゅばっ！　じゅぶっ！！）
3891 = "（Phập—— chụt! Phập! Phập!!）"
# 【ふかみ】
# display as 深美
# JP: 「はっ！　しゅきっ――うれしっ――いっ――ふあっ、\nこのまま――この、ままっ――わたしっ――このまま」
2394 = "「Hà! Thích—— sướng—— quá—— phù,\nCứ thế này—— cứ, thế này—— em—— cứ thế này」"
# monologue
# JP: 腰の動きすら止められないのに、\nこの誘惑に、抗う手段などありえない。
3459 = "Ngay cả chuyển động của hông tôi cũng không thể dừng lại được,\nthì làm sao có cách nào cưỡng lại được sự cám dỗ này chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「ワン、ピース、を――よご、さぬっ――よう」
2139 = "「Để—— không làm, bẩn—— váy, liền」"
# monologue
# JP: （きゅううううううっ）
3921 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2331 = "「!」"
# monologue
# JP: 瞬間、絞るような締め付けがくる。
3131 = "Khoảnh khắc đó, một lực siết chặt như muốn vắt kiệt ập đến."
# 【ふかみ】
# display as 深美
# JP: 「ふく――とか――そんなの――どうでも、\nいい――ふあっ――んっ――ふっ――はうっ」
2767 = "「Quần áo—— hay gì đó—— sao cũng,\nđược—— phù—— ưm—— phù—— a ư」"
# monologue
# JP: 絞られている。加速してく。白熱してる。\n結合部分が、もうどろどろに溶け合っている。
3398 = "Tôi đang bị vắt kiệt. Đang tăng tốc. Đang ở giai đoạn cao trào.\nPhần kết nối của chúng tôi, đã nhão nhoét hòa quyện vào nhau."
# 【ふかみ】
# display as 深美
# JP: 「あか、ちゃんっ――わたし――欲しい――妊娠、\nそうてつ、おにいさんの、あかちゃんっ、くだ、さい」
2559 = "「Em bé—— em—— muốn—— mang thai,\nAnh Soutetsu, hãy cho, em, em bé, đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 2397 = "「啊！！！」" 
# monologue
# JP: はじけ飛ぶ。僕の何かが、いっぺんにトブ。
3457 = "Vỡ tung. Một thứ gì đó trong tôi, đồng loạt bay biến."
# monologue
# JP: （ずりゅうううううううっ！！！！）
3900 = "（Rút ra!!!!）"
# 【ふかみ】
# display as 深美
# JP: 「やぁあああああああぁっ！？」
# 2293 = "「呀？！」" 
# monologue
# JP: ふかみの足の抵抗などはものともせずに腰を引く。\nぬけるギリギリ。そこまでふかみと距離を取り――
3403 = "Bất chấp sự kháng cự từ đôi chân Fukami, tôi rút hông lại.\nĐến ranh giới suýt tuột ra ngoài. Giữ khoảng cách với Fukami đến mức đó——"
# monologue
# JP: （ずぶううううううううっ！　ごつんっ！！！）
3898 = "（Phập! Cộc!!!）"
# 【ふかみ】
# display as 深美
# JP: 「きゅふううううっ！！」
# 2286 = "「呀！！」" 
# monologue
# JP: （ずばっ！　ばちゅっ！　じゅぶっ！　ごりゅっ！）
# 3897 = "（插！插！插！插！）" 
# 【ふかみ】
# display as 深美
# JP: 「はっ！　あっ！　おまんこっ――きて、くるっ！\nこしっ――ちからっ――ふわって――これ、くるっ」
2389 = "「Hà! A! Cô bé—— đang, đến! Sự\nThắt lưng—— lực—— lâng lâng—— cái này, đến rồi」"
# monologue
# JP: 精液も、もう、ギリギリにまでせり上がってる。\nこの瞬間にも、ゆるめば射精だ。
3705 = "Tinh dịch, cũng đã trào dâng đến giới hạn cuối cùng rồi.\nNgay khoảnh khắc này, chỉ cần thả lỏng là sẽ xuất tinh."
# monologue
# JP: けれど一突き。あと一突き。\nふかみの膣の、最奥のその向こうまでをも――っ！
3208 = "Nhưng thêm một cú đâm nữa. Thêm một cú đâm nữa thôi.\nĐến tận cùng phía bên kia nơi sâu nhất, trong âm đạo của Fukami——!"
# monologue
# JP: （ごりゅううううううっっっ！！！）
# 3901 = "（插！！！）" 
# 【ふかみ】
# display as 深美
# JP: 「きゅふああああああああああああああんんっ！！！」
2289 = "「Kyufuaaaaaaaaaaaaaaan!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2331 = "「唔！」" 
# monologue
# JP: （びゅうううっ！　びゅる！　びゅぶっ！　びゅうっ！）
3881 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 膣の収縮。同時の射精。最奥――まさしく最奥で。
3821 = "Sự co thắt của âm đạo. Đồng thời với việc xuất tinh. Nơi sâu nhất—— chính xác là nơi sâu nhất."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ――あついの――おくっ――おくっ！\nおまんこのっ――おくっ――びゅって、たたい、て」
2388 = "「Phù! A—— nóng quá—— bên trong—— bên trong!\nBên trong—— cô bé—— phụt ra, đánh vào」"
# monologue
# JP: （びゅるっ！　びゅっ！　ぶううっ！　びゅるっ！！）
# 3881 = "（咻！咻！咻！咻！）" 
# monologue
# JP: ゼリー状。\nそんな言葉が頭をよぎる。
3533 = "Dạng thạch.\nTừ đó xẹt qua tâm trí tôi."
# monologue
# JP: 妊娠と、ふかみの声を聞いた瞬間、\n精巣全てが開放されて、残らず、精を送り込んでる。
3743 = "Khoảnh khắc nghe thấy từ mang thai và giọng nói của Fukami,\ntoàn bộ tinh hoàn của tôi như mở tung, không chừa lại giọt nào, trút hết tinh dịch vào trong em."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あっ――はっ――はあっ――いっぱい、\nおな、か――いっぱい――たぷ――たぷっ」
2346 = "「Phù—— a—— hà—— hà—— ngập tràn,\nBụng—— ngập tràn—— óc ách—— óc ách」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだ、だっ――」
2838 = "「Vẫn, chưa xong đâu——」"
# monologue
# JP: （ぐううううううっ！）
3902 = "（Nhấn sâu!）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅううっっ！！！」
2332 = "「Nkyuuu!!!」"
# monologue
# JP: ねじ込むように。\n最奥に密着している亀頭をさらに食い込ませっ――
3476 = "Như thể đang vặn đinh ốc.\nTôi ấn sâu quy đầu đang dính chặt ở nơi sâu nhất vào thêm nữa——"
# monologue
# JP: （びゅぶっ！！！）
3882 = "（Phụt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ひあっ！　あっ！！！！！」
2283 = "「Hya! A!!!!!」"
# monologue
# JP: 射精の上の、さらなる射精。\n絶頂の上、重なる絶頂。
3323 = "Xuất tinh chồng lên xuất tinh.\nTột đỉnh chồng lên tột đỉnh."
# monologue
# JP: 僕とふかみは、完全に、\nお互いの快感さえも、味わい尽くした。
3394 = "Tôi và Fukami, đã hoàn toàn,\ntận hưởng trọn vẹn khoái cảm của nhau."
# 【ふかみ】
# display as 深美
# JP: 「ふぁ……は……ぁっ――」
2345 = "「Phù…… hà…… a——」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2317 = "「Ái chà」"
# monologue
# JP: 力をなくしたふかみが崩れ落ちかけて、\n抱き支えれば、頭がすぐにすりついてくる。
3645 = "Fukami mất hết sức lực chực ngã quỵ xuống,\ntôi vừa ôm đỡ lấy em, em liền cọ đầu vào tôi ngay lập tức."
# 【ふかみ】
# display as 深美
# JP: 「キス……キスぅ」
2272 = "「Hôn…… hôn em đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2476 = "「好」" 
# monologue
# JP: 軽い。小さい。
3475 = "Thật nhẹ. Thật nhỏ bé."
# monologue
# JP: 唇を交わし、唾液を溶かしあいながら、\nふかみの華奢さを、今更のように意識する。
3134 = "Trao nhau nụ hôn, hòa quyện nước bọt vào nhau,\nđến tận bây giờ tôi mới lại ý thức được sự mỏng manh của Fukami."
# monologue
# JP: （この体で――僕の赤ん坊を孕み得るのか）
3925 = "（Với cơ thể này—— em ấy có thể mang thai đứa con của tôi sao）"
# monologue
# JP: むくむくと、また欲望が持ちあがる。
3392 = "Dục vọng, lại trỗi dậy mãnh liệt."
# monologue
# JP: セックスの意味、目指すところを――\n意識も体も、理解したから。
3251 = "Ý nghĩa của việc làm tình, mục đích hướng tới——\nCả ý thức và cơ thể tôi, đều đã thấu hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2695 = "「深美」" 
# 【ふかみ】
# display as 深美
# JP: 「雨……まだ、やみません、ね？」
2909 = "「Mưa…… vẫn chưa, tạnh, nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2622 = "「是啊」" 
# monologue
# JP: 夕立ならばもうあがってる。
3308 = "Nếu là mưa rào thì đã tạnh từ lâu rồi."
# monologue
# JP: けれども、僕とふかみの耳には、\nまだ雨音が響いてる。
3174 = "Thế nhưng, bên tai tôi và Fukami,\nvẫn còn vang vọng tiếng mưa rơi."
# 【ふかみ】
# display as 深美
# JP: 「雨宿り……つづけなきゃ」
2869 = "「Chúng ta phải…… tiếp tục trú mưa thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2622 = "「是啊」" 
# monologue
# JP: ふかみを強く抱きしめて。
3443 = "Tôi ôm chặt lấy Fukami."
# monologue
# JP: その体へと、\nもう何度でも、雨を降らせる。
3482 = "Lên cơ thể đó,\ntôi sẽ giáng xuống những cơn mưa, không biết bao nhiêu lần nữa."
