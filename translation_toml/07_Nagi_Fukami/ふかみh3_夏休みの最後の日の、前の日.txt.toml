2359 = "「啊……啊……裡面……嗯……啊，啊……手指……嗯……嗚……摩擦著……啊」" 

# monologue
# JP: 指を鍵にし、浅いところの天井側をしつこく撫ぜる。
3444 = "我用手指仔細地摩擦著淺處靠外的部分。" 

# 【ふかみ】
