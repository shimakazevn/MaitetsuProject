# JP: 雑草一つの無いバラストを、\n堰さんたちの、日々の努力の結晶を見る。
3549 = "沒有一棵草的道砟，那是堰先生他們每天努力的成果。" 

# 【双鉄】
# display as 雙鐵
# JP: 「バラストは、列車の振動を緩和するためだけの\nものではない。線路を、雑草からも守っている」
2837 = "「道砟的存在不只是為了緩和列車的震動。它還會保護線路不受雜草侵擾」" 

# monologue
