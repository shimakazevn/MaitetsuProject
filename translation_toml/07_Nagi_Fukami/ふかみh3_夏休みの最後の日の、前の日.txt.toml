3156 = "主要就是沿著側面的明顯在抽搐的肉，仔細地畫著圈撫摸著。" 

# 【ふかみ】
# display as 深美
# JP: 「そこっ――やっ――らめっ――ふっ、あっ――\nきもち、よす――ぎて――んっ――だめ、ふ、ぅ」
2876 = "「那裡……不要……住手……啊……太舒服了……嗯……不行，呼……」" 

