2602 = "「日日姬正在畫一條河。她在上面點綴了漂亮的水色。這就是一開始的回憶」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2479 = "「好的」" 

# 【双鉄】
# display as 雙鐵
