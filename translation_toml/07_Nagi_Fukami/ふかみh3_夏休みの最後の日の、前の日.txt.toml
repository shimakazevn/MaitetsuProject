2332 = "「唔！！！」" 

# monologue
# JP: ねじ込むように。\n最奥に密着している亀頭をさらに食い込ませっ――
3476 = "我轉著圈往裡面頂，把插入最深處的龜頭繼續塞了塞。" 

# monologue
# JP: （びゅぶっ！！！）
3882 = "（咻！！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひあっ！　あっ！！！！！」
2283 = "「呀！啊！！！！！」" 

# monologue
# JP: 射精の上の、さらなる射精。\n絶頂の上、重なる絶頂。
3323 = "射精之後，我又射了一次。巔峰之上，再攀巔峰。" 

# monologue
# JP: 僕とふかみは、完全に、\nお互いの快感さえも、味わい尽くした。
3394 = "我和深美已經徹底嘗盡了彼此的快感。" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁ……は……ぁっ――」
2345 = "「啊……啊……啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2317 = "「哎呀」" 

# monologue
# JP: 力をなくしたふかみが崩れ落ちかけて、\n抱き支えれば、頭がすぐにすりついてくる。
3645 = "深美脫了力，差點趴倒在地。我抱住她，她立刻就將腦袋蹭了過來。" 

# 【ふかみ】
# display as 深美
# JP: 「キス……キスぅ」
2272 = "「吻我……吻我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2476 = "「好」" 

# monologue
# JP: 軽い。小さい。
3475 = "我輕輕地吻了下去。" 

# monologue
# JP: 唇を交わし、唾液を溶かしあいながら、\nふかみの華奢さを、今更のように意識する。
3134 = "一邊交換唾液，一邊重新認識到了深美的纖小。" 

# monologue
# JP: （この体で――僕の赤ん坊を孕み得るのか）
3925 = "（這麼小的身子……能懷上我的孩子嗎？）" 

# monologue
# JP: むくむくと、また欲望が持ちあがる。
3392 = "我又產生了欲望。" 

# monologue
# JP: セックスの意味、目指すところを――\n意識も体も、理解したから。
3251 = "因為我的認識和身體都理解了性交的意義與目的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2695 = "「深美」" 

# 【ふかみ】
# display as 深美
# JP: 「雨……まだ、やみません、ね？」
2909 = "「雨……還沒下完呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2622 = "「是啊」" 

# monologue
# JP: 夕立ならばもうあがってる。
3308 = "如果只是陣雨，那早就應該下完了。" 

# monologue
# JP: けれども、僕とふかみの耳には、\nまだ雨音が響いてる。
3174 = "但是我和深美的耳朵卻還能聽到雨聲。" 

# 【ふかみ】
# display as 深美
# JP: 「雨宿り……つづけなきゃ」
2869 = "「那我們還得繼續躲雨呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2622 = "「是啊」" 

# monologue
# JP: ふかみを強く抱きしめて。
3443 = "我用力抱住深美。" 

# monologue
# JP: その体へと、\nもう何度でも、雨を降らせる。
3482 = "我願反覆地在她的身體上降下我的雨水，不論多少次。" 
