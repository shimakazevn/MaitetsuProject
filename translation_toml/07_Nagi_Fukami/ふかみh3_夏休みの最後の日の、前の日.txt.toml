# monologue
# JP: つるりと飲み込まれる感覚と、\n肉を割り込む、うねりを伴う抵抗感と。
3449 = "我的手指被吞了進去，推開媚肉的擠壓，感到了顫抖與抵抗。" 

# monologue
# JP: 僕の体を受け入れつつも、いまだ性には戸惑っている、\n――ふかみの、膣の、感触だ。
3203 = "儘管承受過我的進入，深美的陰道在這方面依然存在著猶豫。" 

# 【ふかみ】
# display as 深美
