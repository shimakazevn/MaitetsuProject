2775 = "「要是枕木周邊的土沉了下去，枕木和鐵軌也會沉下去。每次列車經過，角度都會有些許改變……」" 

# 【ふかみ】
# display as 深美
# JP: 「もっとどんどん傾いて、\nそしたらきっと、いつか――っ！」
2596 = "「於是鐵軌越來越傾斜，那樣以後說不定……」" 

# monologue
# JP: 恐らく、脱線といいかけて、\nふかみがあわてて言葉を飲み込む。
3563 = "深美似乎差點就說出脫軌這個詞，又把那句話咽了回去。" 

# monologue
# JP: そこまで気にすることはない――\n伝えるためにも、僕が飲まれた言葉を続ける。
3671 = "為了告訴她不必在意這些事情，我繼續了她沒說完的話。" 

# 【双鉄】
# display as 雙鐵
