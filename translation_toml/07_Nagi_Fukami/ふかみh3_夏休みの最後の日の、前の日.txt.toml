2457 = "「回憶也和顏色差不多。它們不會被改寫，只會被疊加，最終成為獨一無二的寶貝」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！」
2645 = "「是的！」" 

# monologue
