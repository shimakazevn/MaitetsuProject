# 【ふかみ】
# display as 深美
# JP: 「この切り株……凪ちゃんの」
2830 = "「這樹樁……是小凪的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2622 = "「是啊」" 

