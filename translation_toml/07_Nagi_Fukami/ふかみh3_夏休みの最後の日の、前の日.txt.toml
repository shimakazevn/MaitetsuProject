2644 = "「是的。而要是放著雜草不管，線路很快就會毀掉」" 

# 【ふかみ】
# display as 深美
# JP: 「ええ！？　崩壊って――だって、草くらいで」
2398 = "「啊！？毀掉……只是一點雜草啊」" 

# 【双鉄】
# display as 雙鐵
