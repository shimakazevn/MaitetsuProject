2503 = "「對哦！這道砟……還可以改善排水條件呀！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さすがだな。そのとおりだ」
2247 = "「厲害。你說得對」" 

# monologue
# JP: 水の怖さを、ふかみは僕よりよほど知ってる。\nここから先は、ほとんど説明の必要もなかろうが。
3597 = "深美比我更了解水的可怕。這方面的就不需要我再解釋什麼了。" 

