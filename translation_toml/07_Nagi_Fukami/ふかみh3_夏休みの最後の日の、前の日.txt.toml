2770 = "「表示地界。柵欄那邊好像是種植和銷售有機蕨菜的」" 

# 【ふかみ】
# display as 深美
# JP: 「ああ、それでひとが勝手に入ってこないように\n――あ」
2455 = "「噢，是為了不讓那邊的人隨便進來……啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2330 = "「唔」" 

# monologue
# JP: ふかみの足がぴたりと止まる。\n理由は、僕にもすぐわかる。
