# JP: 「鉄はレールだ。線路とは、レールや枕木、\nそれにバラストなどを、一体化した呼び方だ」
2261 = "「只有鐵軌是鐵的。所謂線路，是鐵軌、枕木和道砟加在一起時的統稱」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――レールだけじゃなく、その下も全部合わせて、\nこの[みち]路そのものが、線路」
2374 = "「啊……除了鐵軌之外，還要加上下面的所有，這整條路加在一起，才叫線路」" 

# 【双鉄】
# display as 雙鐵
