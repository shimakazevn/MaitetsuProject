3335 = "就這樣，我們踏在那躺在枕木下的大片碎石，也就是道砟上。" 

# monologue
# JP: 軽く沈み込む踏みごたえ。けれどもズレない。\n実に良く搗き固められている。
3791 = "踩上去有下沉感，但沒有滑開的感覺。搗固到這種程度剛剛好。" 

# 【ふかみ】
# display as 深美
# JP: 「線路を、雑草から守る、って……\nでも、線路は鉄で、雑草は草……ですよ、ね？」
2222 = "「保護線路不受雜草侵擾……可線路是鐵的，雜草只是草吧？」" 

