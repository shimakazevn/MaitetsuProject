# display as 深美
# JP: 「そ、そんなこと言われちゃったら。わたし……\nどんな顔していいか、わからなくなっちゃう――です」
2193 = "「你、你這麼說，我……我都不知道該露出什麼樣的表情了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2330 = "「唔」" 

# monologue
# JP: 困らせるつもりは毛頭ない。
3401 = "我完全沒有刁難她的意思。" 

# monologue
# JP: ふかみに笑ってもらうには――\n思ったことが、既に答えだ。
3773 = "要讓深美露出笑容……我會這樣想，顯然是在內心已經有了結論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、笑っていて欲しい。\nしあわせそうな笑顔が、やはりいちばん美しい」
2854 = "「那你就笑吧。幸福的笑容才是最美麗的」" 

# 【ふかみ】
# display as 深美
# JP: 「しあわせそうに……です？」
2512 = "「幸福的笑容？」" 

# monologue
# JP: ふかみが、笑顔を作ってみせる。
3571 = "深美做出了一個笑容。" 

# monologue
# JP: 浮かべて、ではなく、\n作ってと、感じてしまうぎこちなさだ。
3144 = "不是露出，而是做出了一個硬邦邦的笑容。" 

# 【ふかみ】
# display as 深美
# JP: 「はぅ……難し――あ！\nって、いうかですね？　双鉄おにいさん」
2426 = "「嗚……好難……啊！對了，雙鐵哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？」
2526 = "「怎麼了？」" 

# 【ふかみ】
# display as 深美
# JP: 「しあわせ――あの、双鉄おにいさんがくれたら、\nわたし、笑顔……自然になれるって、思う。です」
2486 = "「如果……雙鐵哥哥給了我幸福，我的笑容……應該可以變得自然，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、道理だ。\nしかし、しあわせと言われても――っ！」
2728 = "「確實，在理。可要讓你幸福……啊！」" 

# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1664 = "「……」" 

# monologue
# JP: ふかみが、僕を見、すぐ目をとじる。\nしあわせは――ひどく、わかりやすい形のようだ。
3631 = "深美看向我，閉上了眼。看來……幸福其實非常簡單。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
2695 = "「深美」" 

# monologue
# JP: ごくさり気なく抱き寄せて、\n線路から、安全十分の距離を取る。
3481 = "我非常自然地抱住她，然後和線路拉開到安全距離。" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ……」
2336 = "「啊……」" 

# monologue
# JP: 軽い、キス。\nふかみはそれでも、瞳を閉じたまま動かない。
3503 = "接著，我輕輕一吻。深美卻依然緊鎖著雙眼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
# 2432 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「ふか……んっ――ん……んちゅっ」
2694 = "「深美……嗯……嗯……嗯啾」" 

# monologue
# JP: キス、キス、キス。\n何度か軽く繰り返すうち、体の中が熱くなる。
3238 = "吻，吻，吻。反複數次，身體裡面熱了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……っ」
1677 = "「……啊」" 

# 【ふかみ】
# display as 深美
# JP: 「ぁっ……ふあっ――んっ――ちゅっ――ちゅむっ、\nちゅっ――ちゅうっ――ちゅるっ――ちゅずっ」
2338 = "「啊……哇……嗯……啾……啾，啾……啾……啾……啾」" 

# monologue
# JP: 唇を割り、ふかみの舌を自分の舌で軽くつつけば、\nすぐさまふかみは、僕の口内に逆進してくる。
3390 = "我分開深美的唇，用自己的舌頭輕輕頂了頂她的，很快她也將舌頭頂進了我的嘴裡。" 

# 【ふかみ】
# display as 深美
# JP: 「ちゅむっ――ちゅるっ――ちゅっ――っちゅぷっ、\nちゅうっ――ちゅずっ――ずちゅるっ――ちゅうっ」
2425 = "「啾……啾……啾……啾，啾……啾……啾……啾」" 

# monologue
# JP: ふかみの体が、くっついてくる。\nふかみの熱が、つたわってくる。
3628 = "深美的身體貼了上來。我能感受到她的體溫。" 

# monologue
# JP: 夏の昼間の線路沿い――見通しのよい場所でなければ、\nこのまま熱に、浮かされてしまいたい気もする、が。
3771 = "要不是身在夏季中午的線路邊這種開闊的地方，我甚至想將自己交給這份燥熱。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん」
# 2432 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！　――ぷあっ」
2385 = "「啊！……呼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「時間も、場所もまずかろう」
2653 = "「時間跟地點都不太好啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……そ、そうですよね。わたしつい、気持ちよっ\n――えと、しあわせで、夢中になっちゃって」
2369 = "「啊……對、對哦。我一不小心就舒服……啊不對，一不小心就沉浸在幸福當中了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2547 = "「我也是」" 

# 【ふかみ】
# display as 深美
# JP: 「そ、そうですか？　えへへっ」
2605 = "「是、是嗎？嘿嘿」" 

# monologue
# JP: ふかみが、はにかむ。
3644 = "深美羞澀起來。" 

# monologue
# JP: 含羞と嬉しさとを入り混じらせて――\nああ、これこそがふかみの顔だと、しみじみ思う。
3284 = "她半是羞澀，半是開心……我越來越感覺，這才是深美的表情啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうする？\nまだ歩き始めたばかりだが」
2880 = "「那麼，你打算怎麼辦？這才剛剛開始走呢」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、歩きます、です。\n先、見てみたいですし」
2544 = "「我、我要走，嗯。我想看看後面的景色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2479 = "「好的」" 

# monologue
# JP: ふかみが前、僕が後ろで歩き出す。
3654 = "深美走在前面，我走在後面。" 

# monologue
# JP: 本当は手をつなぎ並んで歩きたいところだが、\n線路脇だ、それほどの余裕が無い場所も多い。
3439 = "我本想牽著她手走，不過線路旁邊有時並沒有那麼寬敞。" 

# 【ふかみ】
# display as 深美
# JP: 「結構――葉っぱ、しげってますね」
2533 = "「感覺……樹葉很繁茂啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「夏場はどうしても、な。木の枝よりも、\n草むしりを優先せねばならんしな」
2716 = "「畢竟是夏天。比起清理樹枝，除草更優先」" 

# 【ふかみ】
# display as 深美
# JP: 「草むしり」
2897 = "「除草」" 

# monologue
# JP: 不思議そうに、ふかみは自分の足元を――
3666 = "深美驚訝地看向自己腳下――" 

