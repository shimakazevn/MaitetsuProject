# display as 深美
# JP: 「どうしょう？」
2792 = "「路基？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路を支える地面のことだ。御一夜鉄道のように、\nバラストを敷いてある道床は、『バラスト道床』だな」
2506 = "「就是線路底下的地面。就像御一夜鐵路這種名字一樣，鋪了道砟的路基，可以叫“道砟路基”」" 

# 【ふかみ】
# display as 深美
# JP: 「なら、\nその道床の姿が根っこで変えられちゃったら」
2881 = "「那麼，假如路基被徹底改變了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「予定された排水路とは別の[みずみち,1]水路が\n生まれてしまう可能性がある」
2271 = "「可能會出現和原計劃的排水道不一樣的其他水道」" 

# 【ふかみ】
# display as 深美
