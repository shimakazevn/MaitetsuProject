2619 = "「是啊。我相信，這一定是一件非常幸福的事情」" 

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2432 = "「嗯」" 

# monologue
# JP: ふかみが頷く。
# 3668 = "深美點了點頭。" 

