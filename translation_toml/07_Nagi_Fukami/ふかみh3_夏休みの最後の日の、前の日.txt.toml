2629 = "「是啊，甚至有可能引發事故。因此除草是最重要的工作」" 

# monologue
# JP: おい茂る葉が車体に触れることで\n事故が発生したケースなど、聞いたこともない。
3440 = "我根本沒聽說過繁茂的枝葉導致列車出事故的案例。" 

# monologue
# JP: 優先すべきは、常に安全。\n取捨選択の基準は、一定不変だ。
3523 = "最優先的永遠是安全。因此取捨與選擇的標準也從不會改變。" 

# 【ふかみ】
# display as 深美
# JP: 「すごい……です、ね、鉄道って。\n20キロ以上ある線路、そんなに丁寧にお手入れして」
2887 = "「鐵路……還真是厲害。竟然要這麼仔細地打理２０公里以上的線路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かに凄いと思う。が、その凄さは、\nクマ川下り――舟運も変わらんだろう」
2435 = "「嗯，我也覺得。不過，我覺得隈河漂流――船運也差不多」" 

# 【ふかみ】
# display as 深美
# JP: 「え？！　うちが、です？」
2320 = "「哎？！差不多嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前聞かせてくれたではないか。水路を保つため、\n川に入って、川底の岩を転がすと」
2148 = "「之前你不是告訴過我嗎？為了維護水路，需要下河挪開河床上的石頭」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
2376 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「安全確保のため、為すべきことを、怠らず為す。\n線路と水路の差こそあれ、その本質は同じと思う」
2700 = "「為了保障安全，必須做好應當做的事情。線路與水路各不相同，但本質上是一樣的」" 

# 【ふかみ】
# display as 深美
# JP: 「…………」
1662 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2443 = "「嗯？」" 

# monologue
# JP: ふかみが頬を染めている。\nしあわせそうにはにかみながら、うつむいている。
3648 = "深美臉紅了。她羞澀地低下了頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ふかみ」
2525 = "「怎麼了，深美？」" 

# monologue
# JP: 問うやいなやで、パッとふかみの顔があがる。\n小さな汗が跳ね飛び光の粒となる。
3744 = "聽我這麼一問，深美忽然抬起腦袋。汗珠甩起，折射出光芒。" 

# 【ふかみ】
# display as 深美
# JP: 「わ、わたしがちょっと話しただけのこと――\n双鉄おにいさんが覚えててくれて、嬉しい。です」
2541 = "「我、我就順口提了兩句的事情……雙鐵哥哥竟然還記得，好開心，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2635 = "「是嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「線路も、川とおなじもの。\nそう考えたら、まえよりもっと、綺麗に見えます！」
2747 = "「線路和水路都是一樣的啊。這麼一想，感覺線路看起來比以前更漂亮了！」" 

# monologue
# JP: （ああ――）
3911 = "（是啊……）" 

# monologue
# JP: ふかみが大きく踏み出す一歩を、\n跳ねるようだと、強く感じる。
3599 = "深美用力向前踏出一步，我覺得她像是在蹦跳一樣。" 

# monologue
# JP: 船上にいるときのふかみがここに、\n僕の目の前で輝いている。
3761 = "船上的那個深美就在這裡，在我眼前放射光芒。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん？\nおいてっちゃいますよー？」
2903 = "「雙鐵哥哥，再不跟過來我走了哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはダメだ！　ふかみ、僕から離れるな」
2823 = "「這可不行！深美，不要離開我」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2318 = "「哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「慣れてはいけない。ここが線路である以上、\n臨時列車が走ってくる可能性は常にある」
2233 = "「別太隨便了。這裡可是線路，隨時可能跑過臨時列車」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2386 = "「啊！」" 

# monologue
