2893 = "「長了草，道砟、沙礫就會被推開。而這樣就會導致積水」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
2386 = "「啊！」" 

# monologue
# JP: 言った瞬間、大きな頷き。
3668 = "深美點了點頭。" 

