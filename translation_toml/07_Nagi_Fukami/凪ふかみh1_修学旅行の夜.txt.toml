[script]
# lines: 345 
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう、ここがふかみの部屋か」
1254 = "「Ồ, đây là phòng của Fukami sao.」"
# 【凪】
# display as 凪
# JP: 「違うばーい！　宿泊所ばい！　合宿所ばい！！」
1372 = "「Không phải! Là nhà trọ! Là nhà trọ mà!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだったな」
1309 = "「À, đúng rồi nhỉ.」"
# monologue
# JP: 三人分の荷物を下ろし、一息をつく。
1786 = "Tôi đặt hành lý của ba người xuống và thở phào một cái."
# monologue
# JP: 十一度目の修学旅行は、\n初めての、計画的な宿泊旅行だ。
1894 = "Chuyến đi dã ngoại lần thứ mười một,\nlà chuyến đi qua đêm có kế hoạch đầu tiên."
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、ここに泊まるのであれば、\nふかみと凪の手料理も食べてみたかった」
1179 = "「Nhưng mà, nếu đã trọ lại đây,\nanh cũng muốn ăn thử món ăn do Fukami và Nagi nấu.」"
# 【凪】
# display as 凪
# JP: 「手料理なんてできん――あ！\nいっこだけ！　カレーライスなら作れるばい！」
1396 = "「Nấu ăn thì em chịu――a!\nChỉ có một món thôi! Cơm cà ri thì em làm được!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは……家庭料理って感じのものなら――\n多分、ひととおり、作れます、けど」
1352 = "「Em thì……nếu là những món ăn gia đình――\nChắc là, em nấu được hầu hết các món, nhưng mà.」"
# monologue
# JP: きっぱりさっぱりしている凪と、\n妙にもったいぶってるふかみ。
1683 = "Nagi trả lời thẳng thừng dứt khoát,\ncòn Fukami lại ấp úng một cách kỳ lạ."
# monologue
# JP: いつもながらの会話にけれど、\nいつもと違う何かを感じる。
1761 = "Dù là cuộc trò chuyện như mọi khi,\nnhưng tôi cảm nhận được điều gì đó khác thường."
# 【ふかみ】
# display as 深美
# JP: 「けど――すっぽんまでは……\nさすがに、まだ、さばけませんから」
1183 = "「Nhưng mà――đến mức làm thịt ba ba thì……\nQuả thực, em vẫn chưa làm được.」"
# 【凪】
# display as 凪
# JP: 「すっぽん！　おいしかったばーい！」
1471 = "「Ba ba! Ngon tuyệt cú mèo luôn!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だな。僕も初めて食したが――\n確かに、鍋と唐揚げは旨かった」
1384 = "「Đúng vậy. Anh cũng mới ăn lần đầu――\nCông nhận, lẩu và món chiên ngon thật.」"
# monologue
# JP: 言えば途端に、凪の眉根がむむと寄る。
1931 = "Vừa dứt lời, lông mày Nagi lập tức nhíu lại."
# 【凪】
# display as 凪
# JP: 「お刺身はおいしくなかったと？」
1470 = "「Sashimi không ngon sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「刺し身はほとんど味らしい味を感じなかった。\n心臓など、濃い味がするかと予想していたのだが……」
1205 = "「Sashimi hầu như không có vị gì đặc trưng cả.\nAnh cứ tưởng tim thì vị sẽ đậm đà lắm chứ……」"
# 【凪】
# display as 凪
# JP: 「あのびみょ～な味わいがわからんとは、\nにーさんもまだまだ未熟とねー」
1420 = "「Không hiểu được hương vị vi diệu~ đó,\nanh Soutetsu vẫn còn non nớt lắm nha~」"
# monologue
# JP: 凪が偉そうに胸を張る。\n凪の胸。まさに未熟で、まっ平らな胸。
1685 = "Nagi vênh váo ưỡn ngực.\nNgực của Nagi. Đúng là chưa trưởng thành, phẳng lì."
# monologue
# JP: の、筈なのだが……\nこう突き出されると、案外、ささやかなふくらみが――
1704 = "Đáng lẽ là vậy, nhưng mà……\nKhi ưỡn ra thế này, không ngờ, cũng có chút nhấp nhô nho nhỏ――"
# 【ふかみ】
# display as 深美
# JP: 「それで、双鉄さん」
1462 = "「Vậy nên, anh Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1285 = "「A!」"
# monologue
# JP: ふかみの声で、正気に返る。\n一瞬、なにかがヘンだった。
1907 = "Nhờ tiếng của Fukami, tôi mới bừng tỉnh.\nTrong một thoáng, có gì đó thật kỳ lạ."
# monologue
# JP: いや……今もだ。\n体が、妙に――
1610 = "Không……bây giờ vẫn vậy.\nCơ thể tôi, một cách kỳ lạ――"
# 【ふかみ】
# display as 深美
# JP: 「すっぽん、食べてどうですか？\nなにか、変化、とか……あったり、しま、すか？」
1212 = "「Anh ăn ba ba, thấy thế nào?\nCó, sự thay đổi, nào……không, ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ……ああ」
1269 = "「A……ừ.」"
# monologue
# JP: ふかみの舌が、唇のまわりを素早く舐める。\nその光景が、僕の唇もなめらかにする。
1852 = "Lưỡi của Fukami lướt nhanh qua viền môi.\nCảnh tượng đó khiến môi tôi cũng trở nên ướt át."
# 【双鉄H】
# display as 雙鐵
# JP: 「これがすっぽんのせいかは定かではないが――\n体が熱くて……その――」
1360 = "「Không biết có phải do ăn ba ba không nhưng――\nCơ thể anh đang nóng ran……và――」"
# 【ふかみ】
# display as 深美
# JP: 「『その？』……なんですか？」
1423 = "「'Và?'……Và sao ạ?」"
# monologue
# JP: ふかみの視線が、僕を誘う。
1853 = "Ánh mắt của Fukami, như đang mời gọi tôi."
# monologue
# JP: その目は一点、僕の股間を凝視している。\nいまさら言葉を飾って、仕方も無いと感じてしまう。
1739 = "Ánh mắt ấy tập trung, nhìn chằm chằm vào đũng quần tôi.\nĐến nước này có vòng vo cũng chẳng ích gì."
# 【双鉄H】
# display as 雙鐵
# JP: 「下半身――性器が、ひどく強張っている。\nつまり、勃起を、さっきからしてしまってる」
1170 = "「Nửa thân dưới――chỗ đó, đang căng cứng.\nTức là, anh đang cương cứng, từ nãy đến giờ.」"
# 【凪】
# display as 凪
# JP: 「ボッキばい！？　学園の授業でならったばい！\n実物はまだ見たことなかばい！　見たかばい！！」
1206 = "「Cương cứng á!? Em học trong giờ ở trường rồi!\nNhưng chưa thấy đồ thật bao giờ! Cho em xem với!!」"
# 【ふかみ】
# display as 深美
# JP: 「あの……わたし、も……見せて、ほしい、です。\n双鉄さんの、いちばん、はずかしい――ところ」
1461 = "「À ừm……em, cũng……muốn, xem, ạ.\nChỗ, đáng xấu hổ, nhất――của anh Soutetsu.」"
# monologue
# JP: （もぞっ）
2019 = "（Ngọ nguậy）"
# monologue
# JP: ふかみが小さく身じろぎし、\n自分の右手を、スカートの奥へとほんの一瞬差し入れる。
1866 = "Fukami khẽ cựa mình,\nluồn tay phải vào sâu trong váy chỉ trong một thoáng chốc."
# monologue
# JP: “一番、恥ずかしいところ”――\n言葉を、自ら体現しようとするかのように。
939 = "Chỗ, đáng xấu hổ, nhất'――\nNhư thể cô ấy đang tự mình thể hiện câu nói đó vậy."
# 【ふかみ】
# display as 深美
# JP: 「わたしたち、三人いっしょに――ずっと、勉強、\nしていきますから……隠し事とか……したく、ないです」
1362 = "「Ba người chúng ta, sẽ cùng nhau――học tập, mãi mãi,\nnên là……em không muốn……có chuyện gì giấu giếm đâu ạ.」"
# monologue
# JP: したく。ない。\n僕にされたくない――ではなくて。
1614 = "Không muốn.\nChứ không phải là không muốn bị tôi giấu giếm――"
# monologue
# JP: その一言が僕を動かす。\n体が、欲が、理性を焼いて焦がしてく。
1945 = "Câu nói đó đã kích thích tôi.\nCơ thể, dục vọng, đang thiêu đốt lý trí."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕とて、何を隠すつもりもない」
1358 = "「Anh cũng, không có ý định giấu giếm gì cả.」"
# monologue
# JP: （ちい……いっ）
2036 = "（Kéo……）"
# 【凪】
# display as 凪
# JP: 「わ……ひっ――あ……\nこれが……にーさんの、ボッキ――ばい？」
1245 = "「Oa……hí――a……\nĐây là……sự cương cứng――của anh Soutetsu, sao?」"
# 【ふかみ】
# display as 深美
# JP: 「そう、ね……凪ちゃん。これ、が――双鉄さんの、\n勃起、している――おちん、ちん――（すんっ）」
1380 = "「Đúng, vậy……Nagi. Đây, là――\ncậu bé――đang cương cứng――của anh Soutetsu――(Hít)」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！？　匂いかいだばいっ！？　\nウチもかぐばいかぎまくるばい！！　（すんすんっ！）」
1337 = "「Bé Fukami!? Cậu ngửi mùi kìa!?\nMình cũng ngửi, mình ngửi lấy ngửi để luôn!! (Hít hít!)」"
# 【ふかみ】
# display as 深美
# JP: 「や、凪ちゃん。おちんちんの匂い、そんなに吸ったら、\nわたしの、分っ――（すんすんすんっ！）」
1200 = "「Đừng, Nagi. Nếu cậu hít hết mùi của cậu bé,\nthì phần của, mình――(Hít hít hít!)」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……くっ――」
1229 = "「Ưm……hự――」"
# monologue
# JP: 吸えば当然、息は吐かれる。\n鼻から強く出てくるそれは、僕の勃起を淡くくすぐる。
1824 = "Đã hít vào thì tất nhiên phải thở ra.\nLuồng hơi mạnh mẽ phả ra từ mũi, khẽ mơn trớn phần đang cương cứng của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （鼻息の温度も……\nこれほど、個人差があるものなのだな）
2064 = "（Nhiệt độ của hơi thở từ mũi……\nCũng có sự khác biệt giữa mỗi người đến thế này sao.）"
# monologue
# JP: 凪のそれはカラリと熱く、\nふかみのものは、湿った感じでひんやりしてる。
1682 = "Hơi thở của Nagi khô ráo và nóng bỏng,\ncòn của Fukami thì lại ẩm ướt và lành lạnh."
# monologue
# JP: 指も、手も、舌も同様なのであろうか――\n思った瞬間、
1949 = "Không biết ngón tay, bàn tay, hay cả lưỡi của hai em ấy có giống vậy không nhỉ——\nNgay lúc tôi vừa nghĩ thế,"
# 【凪】
# display as 凪
# JP: 「わわ！？　にーさんのボッキ、ビクってしたばい！」
1250 = "「Oa!? Của anh hai vừa giật giật nè!」"
# 【ふかみ】
# display as 深美
# JP: 「そうてつ、さん……見られて……\n感じ、ちゃったん……です、か？」
1469 = "「Anh Soutetsu... bị bọn em nhìn...\nnên thấy có cảm giác... rồi ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それもある、が――勃起の先に息がかかるのが」
1451 = "「Đó cũng là một lý do, nhưng——chủ yếu là vì hơi thở của hai đứa phả vào đầu nó.」"
# 【凪】
# display as 凪
# JP: 「息ばい？　息ば、にーさんの勃起ビクビクさせるばい？\n（ふーーーーーーーーーーーーっ！）」
1238 = "「Hơi thở á? Hơi thở làm cho của anh hai giật giật được luôn á?\n（Phùuuuuuuuuuuuuuu!）」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1235 = "「Ư!」"
# 【ふかみ】
# display as 深美
# JP: 「わ。ほんと――双鉄さん、息で、感じちゃうんだ。\n（ふーーーっ）（ふーーーっ）（ふーーーーーーっ）」
1252 = "「Oa. Thật này——Anh Soutetsu, có cảm giác chỉ với hơi thở thôi sao.\n（Phùuu）（Phùuu）（Phùuuuuu）」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あ」
1232 = "「Ư——a」"
# monologue
# JP: 気持ちいい。\n気持ちいいのだがもどかしい。
1743 = "Thật sung sướng.\nSung sướng nhưng lại bứt rứt không thôi."
# monologue
# JP: 綿毛をふわふわ積み重ねるような快感は、\nかえって僕を乾かして、欲望を鋭く尖らせる。
1947 = "Khoái cảm hệt như những sợi lông tơ mềm mại tích tụ lại,\ncàng làm tôi thêm khao khát, khiến dục vọng càng trở nên mãnh liệt."
# 【双鉄H】
# display as 雙鐵
# JP: 「息は、もういい。十分だ。\nそれよりもっと直接的、な――」
1175 = "「Hơi thở, thế là đủ rồi.\nHơn thế nữa, anh muốn thứ gì đó trực tiếp hơn——」"
# monologue
# JP: いいかけて、けれども言葉を飲み込んでいる。
1930 = "Tôi định nói tiếp, nhưng lại nuốt lời vào trong."
# 【双鉄H】
# display as 雙鐵
# JP: （くっつき合って雑魚寝したことも、\n一緒の風呂に入ったこともある。が、これは――）
2032 = "（Chúng tôi đã từng nằm ngủ chung,\ncũng từng tắm chung. Nhưng, chuyện này——）"
# monologue
# JP: そうした行為と、レベルが違う。\n性器を見せて、息がかかって……
1946 = "Hoàn toàn khác xa những hành động đó.\nPhơi bày bộ phận sinh dục, rồi bị hơi thở phả vào..."
# monologue
# JP: そこから先を望むのならば、\nそれは、明白なセックスだ。
1957 = "Nếu mong muốn tiến xa hơn nữa,\nthì đó rõ ràng là làm tình."
# 【ふかみ】
# display as 深美
# JP: 「……お勉強。\nわたしたち、十分に重ねてきたって思います」
963 = "「...Bọn em đã học.\nEm nghĩ bọn em đã tích lũy đủ kiến thức rồi ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1285 = "「啊！」" 
# monologue
# JP: 僕の心を見きったように――\nいや、恐らくは実際見切り、ふかみは静かな言葉を繋ぐ。
1875 = "Như thể nhìn thấu tâm can tôi——\nKhông, có lẽ là em ấy thực sự nhìn thấu, Fukami lặng lẽ nói tiếp."
# 【ふかみ】
# display as 深美
# JP: 「段階を踏んで、少しずつ。双鉄さんも、凪ちゃんも。\nそれから、わたしも――三人、いっしょに」
1349 = "「Cứ từng bước một, từ từ thôi. Cả anh Soutetsu, cả bé Nagi.\nVà cả em nữa——ba người chúng ta, cùng nhau ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ」
959 = "「——Ừ.」"
# 【ふかみ】
# display as 深美
# JP: 「だから、ここから先をするかは――\nただ単に、気持ちの問題だと思います」
1181 = "「Nên là, chuyện tiếp theo có làm hay không——\nEm nghĩ chỉ đơn giản là vấn đề cảm xúc thôi ạ.」"
# monologue
# JP: ほんの一瞬、沈黙が満ち。\nけれどもすぐに、凪の力強い声がそれを打ち壊す。
1777 = "Sự im lặng bao trùm trong chốc lát.\nNhưng ngay sau đó, giọng nói dõng dạc của Nagi đã phá vỡ nó."
# 【凪】
# display as 凪
# JP: 「ウチは、にーさんとしたかばい！　\nチューよりもっと……にーさんの近くに、行きたかよ」
1243 = "「Em muốn làm với anh hai nha! \nMuốn làm nhiều hơn cả hôn cơ... em muốn được gần anh hai hơn nữa.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕の、近くに」
1241 = "「Gần, anh hơn sao.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、凪ちゃんと同じ気持ちです。双鉄さん」
1364 = "「Em cũng có cùng cảm giác với bé Nagi. Anh Soutetsu ạ.」"
# monologue
# JP: ふかみの瞼が、静かに落ちる。
1876 = "Fukami lặng lẽ nhắm mắt lại."
# monologue
# JP: 願うがごとく、祈るがごとくに――\nふかみは静かな言葉をつなぐ。
1627 = "Như đang nguyện cầu, như đang ước ao——\nFukami thì thầm những lời êm ái."
# 【ふかみ】
# display as 深美
# JP: 「肌を重ねて――セックスをして。\n体の距離も、心の距離も。三人、ゼロに近づけたいです」
1443 = "「Làn da chạm nhau——cùng nhau làm tình.\nCả khoảng cách thể xác lẫn tâm hồn. Em muốn ba chúng ta, đều trở về con số không.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみ……凪……」
1412 = "「Fukami... Nagi...」"
# monologue
# JP: 三人で、同じ時間をともにすごして、\n笑顔をいくつもいくつも重ねた。
1776 = "Ba chúng tôi đã cùng nhau chia sẻ khoảng thời gian này,\ncùng nhau nở không biết bao nhiêu nụ cười."
# monologue
# JP: それこそ学びであったのだと――\n僕のこの、胸の高鳴りが教えてくれる。
1795 = "Đó mới chính là bài học thực sự——\nNhịp tim đập thình thịch trong lồng ngực đang mách bảo tôi điều đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――いいや、僕は。\nふかみと、凪と、ひとつになりたい――セックスしたい」
1356 = "「Anh cũng——không, anh.\nAnh muốn hòa làm một với Fukami và Nagi——anh muốn làm tình.」"
# 【ふかみ】
# display as 深美
# JP: 「気持ち――わかりました。すごく、うれしいです」
1354 = "「Tâm ý của anh——em hiểu rồi. Em rất vui ạ.」"
# monologue
# JP: （きゅっ）
2035 = "（Nắm chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1235 = "「呃！」" 
# monologue
# JP: 柔らかでひんやりした手が、僕の勃起をそうっと握る。\n“何を”と問うより早くに凪が空気を震わす。
1849 = "Bàn tay mềm mại, mát lạnh nhẹ nhàng nắm lấy phần đang cương cứng của tôi.\nChưa kịp hỏi \"Làm gì thế\", Nagi đã lên tiếng làm xao động bầu không khí."
# 【凪】
# display as 凪
# JP: 「ふ、ふかみちゃん――\nおちんちん、どぎゃんすっと！？」
1327 = "「F-Fukami——\ncậu định làm gì chim của anh hai thế!?」"
# 【ふかみ】
# display as 深美
# JP: 「セックス。する、から――わたしたちの、あ、あそこ\n……お、おまん、こ――に――これ……はいる、から」
1433 = "「Vì... làm tình, mà——nên cái này... sẽ đi vào... chỗ đó, \ncủa chúng ta... â-âm đạo... đó.」"
# monologue
# JP: （さすっ――さすっ）
2052 = "（Xoa xoa——xoa xoa）"
# monologue
# JP: 大きさを、形を測っているのか、\nふかみの手指は、僕の勃起を往復していく。
1840 = "Như thể đang đo đạc kích thước và hình dáng,\nnhững ngón tay của Fukami vuốt ve lên xuống dọc theo phần cương cứng của tôi."
# 【凪】
# display as 凪
# JP: 「あ――にーさん、ふかみちゃんのおてて、\n気持ち、よかと？」
1271 = "「A——anh hai, bàn tay của Fukami,\ncó sướng không á?」"
# monologue
# JP: （さわっ）
2047 = "（Sờ nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――くっ」
1230 = "「Ư——hự」"
# monologue
# JP: 凪の指――おひさまに干した布団みたいに\nぽかぽかとした指先も、僕の勃起に触れてくる。
1680 = "Ngón tay Nagi——những đầu ngón tay ấm áp như chiếc chăn phơi dưới nắng mặt trời\ncũng chạm vào phần cương cứng của tôi."
# monologue
# JP: ふかみの手指を邪魔しないよう、\nミルクを欲しがる子猫のように――
1954 = "Để không làm vướng víu những ngón tay của Fukami,\nem ấy chạm vào hệt như một chú mèo con đang thèm sữa——"
# monologue
# JP: （ふにっ、ふにっ、もみゅっ、もみゅっ）
2034 = "（Nắn nắn, nắn nắn, xoa xoa, xoa xoa）"
# 【凪】
# display as 凪
# JP: 「固かぁ……固いのに……ぷにぷにもして、\n触って……あきない……おもしろか……ばい」
1319 = "「Cứng quá... rõ là cứng... mà lại còn mềm mềm nữa,\nsờ... không biết chán luôn... thú vị thật... nha.」"
# 【ふかみ】
# display as 深美
# JP: 「これ……おちん、ちん――あの……\nたっぷり、ぬらして……おかない、と――」
1341 = "「Cái này... chim——ưm...\nphải làm cho... thật ướt... mới được——」"
# monologue
# JP: ふかみの言葉が、凪の瞳をきらめかす。
1908 = "Lời nói của Fukami làm đôi mắt Nagi sáng rực lên."
# 【凪】
# display as 凪
# JP: 「濡らすと？　なら、ね？　ふかみちゃん」
1439 = "「Làm ướt á? Thế thì, đúng không nè? Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「あ。うん。そうだね、凪ちゃん」
1288 = "「A. Ừm. Đúng vậy nhỉ, bé Nagi.」"
# monologue
# JP: ふかみと凪と、視線をあわせ頷きあって――
1843 = "Fukami và Nagi đưa mắt nhìn nhau rồi gật đầu——"
# 【凪】
# display as 深美＆凪
# JP: 『（ちゅっ！）\n（ちゅっ！）』
1498 = "『（Chụt!）\n（Chụt!）』"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
1236 = "「Ư!!」"
# monologue
# JP: 左右から、キス。
1640 = "Hai nụ hôn từ bên trái và bên phải."
# monologue
# JP: ファーストキスのときと同様、\nけれど、唇にではなく、性器に。
1712 = "Giống như lúc trao nụ hôn đầu tiên,\nnhưng không phải trên môi, mà là trên bộ phận sinh dục."
# 【凪】
# display as 凪
# JP: 「ビクってしたばい。\nにーさん、おちんちん、チューされて気持ちよかと？」
1373 = "「Nó giật giật rồi kìa.\nAnh hai, chim được hôn nên sướng lắm á?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。かなりゾクゾクと来た」
1387 = "「Ừ. Khá là râm ran đấy.」"
# 【凪】
# display as 凪
# JP: 「なら、もっとチュッチュしてあげるばい！\nん――ちゅっ――ちゅっ――ちゅむっ――ちゅ、ちゅう」
1464 = "「Thế thì em sẽ hôn nhiều hơn nữa nha!\nƯm——chụt——chụt——chụt——chu, chụt」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、キス、するだけじゃなくて――ね？\n濡らすんだから――んっ――ぺろっ――れるっ――」
1329 = "「Bé Nagi, không chỉ hôn thôi đâu——nhé?\nVì phải làm ướt mà——ưm——liếm——liếm——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――おっ」
1234 = "「Ư——ồ」"
# 【凪】
# display as 凪
# JP: 「あ！ にーさん震えたばい！　ふかみちゃんのぺろぺろ、\nそぎゃんと気持ちよかったと？　――ぺろっ」
1284 = "「A! Anh hai run lên rồi nè! Fukami liếm liếm,\nlàm anh sướng đến thế luôn á? ——Liếm nhẹ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「～～～っ！！」
# 1236 = "「呃！！」" 
# monologue
# JP: 水と、火だ。\nしっとり冷たいふかみの舌と、ぽかぽか熱い凪の舌。
1836 = "Nước và lửa.\nChiếc lưỡi ẩm ướt mát lạnh của Fukami, và chiếc lưỡi ấm nóng của Nagi."
# 【ふかみ】
# display as 深美
# JP: 「ん……ちゅっ――れるっ――れろっ――しゃぶっ――\nちゅぶっ――ちゅっ――れろおっ――じゅるっ――ぺろ」
1301 = "「Ưm... chụt——liếm——liếm——mút——\nchụt——chụt——liếm——rột——liếm」"
# 【凪】
# display as 凪
# JP: 「れるっ――ちゅむっ――ぺろ――ぺろおっ――ちゅっ、\nちゅむっ、ちゅうっ――ぺろっ――ぺろっ――れろん！」
1290 = "「Liếm——chụt——liếm——liếm——chụt,\nchụt, chu——liếm——liếm——liếm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――ぁっ」
# 1232 = "「呃……啊」" 
# monologue
# JP: 濡らされていく。\n性器だけでなく、心まで。
1881 = "Dần trở nên ướt át.\nKhông chỉ bộ phận sinh dục, mà cả trái tim tôi."
# monologue
# JP: 重なりあって融け合うような柔らかな舌たちに愛撫され、\n精液が、ぐんぐんと吸い上げられていく。
1718 = "Được vuốt ve bởi những chiếc lưỡi mềm mại đan xen hòa quyện vào nhau,\ntinh dịch của tôi đang bị hút lên mạnh mẽ."
# 【凪】
# display as 凪
# JP: 「れるっ――ちゅっ――んっ！？　わ、ふかみちゃん！\nにーさん、先っぽ、ぷくってしてきよったと！」
1294 = "「Liếm——chụt——ưm!? Oa, Fukami!\nPhần đầu của anh hai, đang phồng lên kìa!」"
# 【ふかみ】
# display as 深美
# JP: 「なら、凪ちゃん……えっと――ここからが――\nもっと、大事――に、なると――思う――ちゅむっ」
1465 = "「Vậy thì, bé Nagi... ừm——từ giờ trở đi——\nsẽ còn, quan trọng——hơn nữa——đó——chụt」"
# 【凪】
# display as 凪
# JP: 「わかったばい！　勝負どころで、スパートばいっ！\nれろおおおおおおおおっ！」
1317 = "「Em hiểu rồi nha! Đến lúc quyết định rồi, tăng tốc thôi!\nLiếmmmmmmmm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
# 1236 = "「呃！！」" 
# monologue
# JP: 横薙ぎに、凪の舌が大きく動いて、\n僕の勃起をねぶってくれるっ！
1677 = "Lưỡi Nagi di chuyển theo chiều ngang thật rộng,\nliếm láp phần cương cứng của tôi!"
# 【ふかみ】
# display as 深美
# JP: 「あんっ」
1280 = "「A」"
# monologue
# JP: 勢いよすぎる動きのあまり、\n凪の舌先はふかみの舌先と触れ合って――
1716 = "Vì chuyển động quá mạnh bạo,\nđầu lưỡi của Nagi đã chạm vào đầu lưỡi của Fukami——"
# 【凪】
# display as 凪
# JP: 「んっ――」
1255 = "「Ưm——」"
# 【ふかみ】
# display as 深美
# JP: 「うん」
1300 = "「Ừm」"
# monologue
# JP: 目と目。\nそれだけでまた会話して――っ！！？
1736 = "Bốn mắt nhìn nhau.\nChỉ bấy nhiêu thôi mà hai người lại trò chuyện tiếp——ư!!?"
# 【ふかみ】
# display as 深美
# JP: 「れるっ――れろっ――ちゅっ――ちゅるっ――\nちゅろっ――ろっ――れるう――れろっ――ふっ」
1289 = "「Liếm——liếm——chụt——rột——\nchụt——liếm——liếm——liếm——phù」"
# 【凪】
# display as 凪
# JP: 「ふぁっ――あっ――ちゅっ――んむっ――\nちゅるっ――れろっ――れるっ――れろおっ――」
1237 = "「Phù——a——chụt——ưm——\nrột——liếm——liếm——liếm——」"
# monologue
# JP: 凪とふかみが、僕の勃起を舐めながら、\nふたりの舌をも、絡ませ合って――舌と舌とでキスしてる。
1673 = "Nagi và Fukami vừa liếm phần cương cứng của tôi,\nvừa quấn lấy lưỡi của nhau——hai em ấy đang trao nhau nụ hôn lưỡi."
# monologue
# JP: 絡み合ってる舌と舌とで巻き付くように愛撫され、\nただでさえせり上がっていた精液は、もうっ――
1798 = "Được vuốt ve bởi hai chiếc lưỡi quấn quýt lấy nhau,\ntinh dịch vốn đã dâng trào nay lại càng——"
# 【双鉄H】
# display as 雙鐵
# JP: 「凪――ふかみ――このままだと、僕はっ」
1193 = "「Nagi——Fukami——cứ thế này, anh sẽ」"
# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――んむっ――ふっ――れるっ――\nひょはひょひょ――んっ――ひーはふっ――んっ」
1303 = "「Ưm... chụt——ưm——phù——liếm——\nkh-không sao đâu——ưm——cứ ra đi——ưm」"
# 【ふかみ】
# display as 深美
# JP: 「れるっ――ちゅっ――ちゅむっ――んっ――ひっはひ\n――ひほひひょふはっへ――ふっ――ふらはい――へ？」
1291 = "「Liếm——chụt——chụt——ưm——c-cứ\n——thấy sướng là được——phù——ạ——nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――あっ」
# 1232 = "「呃……啊」" 
# monologue
# JP: 許されている。\n舌に、唾液に、言葉に、視線に。
1735 = "Tôi đã được cho phép.\nBởi những chiếc lưỡi, nước bọt, lời nói, và cả ánh mắt."
# monologue
# JP: 開放感が、腹の底から沸き上がってきて、\nそれはそのまま、勃起を大きく震わせてっ！！
1916 = "Cảm giác giải phóng tuôn trào từ tận đáy lòng,\nvà cứ thế, phần cương cứng của tôi rung lên bần bật!!"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「んぶっ！？」\n「きゃうっ！？」』
1490 = "『「Ưm!?」\n「Á!?」』"
# monologue
# JP: （びゅっ！　どびゅっ！　びゅるるっ！　どびゅうっ！）
2024 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ふかみ】
# display as 深美
# JP: 「きゃあっ――んっ――やっ――熱っ――ふあっ――」
1218 = "「Á——ưm——á——nóng quá——phù——」"
# 【凪】
# display as 凪
# JP: 「あっ……　ね！　にーさん――にーさんっ！」
1268 = "「A... Nè! Anh hai——anh hai!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1235 = "「呃！」" 
# monologue
# JP: ねだり甘えるような声に鼓膜を揺すられたなら、\n勃起はまたも激しく震えっ――
1819 = "Giọng nói nũng nịu vòi vĩnh làm rung màng nhĩ,\nphần cương cứng lại một lần nữa run lên dữ dội——"
# monologue
# JP: （びゅうっ！　びゅぶうっ！　どびゅっ！　びゅるっ！）
# 2024 = "（呲！呲！呲！呲！）" 
# 【凪】
# display as 凪
# JP: 「ひゃぷっ！？　わっ――んっ――にゃ、うっ――\nこ、これっ――んっ――熱か――ばいっ――臭か、ばい」
1226 = "「Á!? Oa——ưm——nya, ư——\nc-cái này——ưm——nóng quá——nha——nặng mùi, nha」"
# monologue
# JP: （びゅうっ――びゅっ――びゅる――――ぷっ）
2023 = "（Phụt——phụt——phụt————phụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――あっ――あっ」
1231 = "「Ư——a——a」"
# monologue
# JP: 射精、した。\nふかみと凪に、僕の精液をかけてしまった。
1781 = "Tôi đã xuất tinh.\nTôi đã bắn tinh dịch của mình lên người Fukami và Nagi."
# monologue
# JP: 罪悪感と快感が、背骨から脳に突き抜けて、\n体が、頭が、ただ真っ白に染められて――
1906 = "Cảm giác tội lỗi và khoái cảm xuyên từ sống lưng lên tận não,\ncơ thể, đầu óc tôi, tất cả đều nhuốm một màu trắng xóa——"
# monologue
# JP: （ふらっ）
2048 = "（Lảo đảo）"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「にーさん！？」\n「双鉄さん！？」』
1493 = "『「Anh hai!?」\n「Anh Soutetsu!?」』"
# monologue
# JP: ――腰が、ストンと落ちてしまう。
948 = "——Hông tôi mềm nhũn, ngã sụp xuống."
# monologue
# JP: ふかみと凪との不安げな声に、\nあわてて返す言葉を絞る。
1910 = "Nghe giọng nói đầy lo lắng của Fukami và Nagi,\ntôi vội vã nặn ra vài lời đáp lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「平、気だ。大事無い。ただ――\n気持ちよすぎて、足の力が抜けただけだ」
1406 = "「Kh-không sao. Không có gì to tát đâu. Chỉ là——\nsướng quá, nên chân anh bị mất sức thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「……気持ちよすぎてって……\n双鉄さん、大丈夫なんですか？」
961 = "「...Sướng quá sao...\nAnh Soutetsu, anh ổn thật chứ ạ?」"
# monologue
# JP: （のそっ）
2054 = "（Sột soạt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふかみっ！？」
1413 = "「Fukami!?」"
# monologue
# JP: 崩れてしまった僕の体に、\n服をはだけたふかみがおずおずと乗ってくる。
1922 = "Lên cơ thể đang rã rời của tôi,\nFukami với quần áo xộc xệch rụt rè trèo lên."
# monologue
# JP: 天を向いてる僕の勃起に、\nパンツを脱いだ股間を押し付けるようにして――
1740 = "Ép háng đã cởi quần lót của em ấy\nvào phần cương cứng đang hướng lên trời của tôi——"
# 【凪】
# display as 凪
# JP: 「そ、そうばい――しっかりしてくれんと、困るばい。\nこれからもっと、ずうっと、気持よぉ、なる……けん」
1376 = "「Đ-đúng đó nha——anh không tỉnh táo lại là gay go đấy.\nTừ giờ trở đi, sẽ còn sướng hơn, rất nhiều... nữa cơ.」"
# monologue
# JP: （もぞっ）
# 2054 = "（窸窸窣窣）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「凪――」
1191 = "「Nagi——」"
# monologue
# JP: 凪も下半身すべてを脱ぎ捨て、\n僕の体の上に乗る。
1666 = "Nagi cũng lột sạch nửa thân dưới,\nrồi trèo lên người tôi."
# monologue
