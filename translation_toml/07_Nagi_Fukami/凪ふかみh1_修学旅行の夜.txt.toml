# JP: その膣肉はとろけるようで、\n蜜は溢れて、床にまで零れ落ちそうで――
1608 = "Lớp thịt âm đạo đó như tan chảy ra,\nmật dịch tuôn trào, tưởng chừng như sắp rỏ\nxuống tận sàn nhà——"

# monologue
# JP: （ず――るっ――る――――うっ――）
2037 = "（Rút——rột——rột————ư——）"

# 【凪】
# display as 凪
# JP: 「ひゃんっ！！」
1223 = "「Á!!」"

# monologue
# JP: だから、抜く。
1802 = "Vì vậy, tôi rút ra."

# monologue
# JP: 限界の凪からゆっくり抜いた勃起をそのまま――
1783 = "Cứ thế từ từ rút phần cương cứng khỏi Nagi\nđang đến giới hạn——"

# monologue
# JP: （ずっ――うっ――）
2042 = "（Phập——ư——）"

# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――双鉄――さんっ――」
1267 = "「Hà——a——anh... Soutetsu——」"

# 【双鉄H】
# display as 雙鐵
# JP: （ッ！）
# 2022 = "（呃！）" 

# monologue
# JP: 発情しきった状態ならば、ふかみの方が、\nやはり女の肉への成熟により近づいている。
1765 = "Nếu ở trạng thái phát tình tột độ, thì\nFukami\nquả nhiên vẫn gần với sự trưởng thành của\ncơ thể phụ nữ hơn."

# monologue
# JP: 凪のキツキツキュウキュウの性器とまるで違った、\n熟し始めた柔らかさが、キツさの中に入り混じってる。
1856 = "Hoàn toàn khác với bộ phận sinh dục chật\nních của Nagi,\nsự mềm mại bắt đầu chín muồi xen lẫn trong\nsự khít khao."

# 【凪】
# display as 凪
# JP: 「あ！　ふかみちゃん――ふかみちゃんも、平気ばい――\nいたいの、いたいの――とんでけばーいっ！」
1286 = "「A! Fukami——Fukami cũng không sao đâu\nnha——\nđau ơi là đau ơi——bay đi mất đi!」"

# monologue
# JP: （さすっ――さわっ）
# 2054 = "（窸窸窣窣）" 

# monologue
# JP: 凪の言葉が、凪の手が、\n今度はふかみを、さらに温かく解してくれる。
1885 = "Lời nói của Nagi, bàn tay của Nagi,\nlần này lại sưởi ấm và xoa dịu Fukami thêm\nnữa."

# 【ふかみ】
# display as 深美
# JP: 「うんっ――うん！　凪ちゃん――双鉄さんっ」
1299 = "「Ưm——ừm! Bé Nagi——anh Soutetsu」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1300 = "「嗯」" 

# monologue
# JP: これでいいんだと感じてる。\nこれが僕らの、三人でするセックスなのだと。
1796 = "Tôi cảm thấy thế này là tốt rồi.\nRằng đây chính là cuộc làm tình của ba\nchúng tôi."

# 【ふかみ】
# display as 深美
# JP: 「痛っ――あっ――んっ――ふっ――っっっ～」
1416 = "「Đau——a——ưm——phù——ư~」"

# monologue
# JP: 凪のときより強い抵抗。
1807 = "Sự kháng cự còn mạnh hơn cả lúc của Nagi."

# monologue
# JP: （めりっ！）
# 2044 = "（插！）" 

# 【ふかみ】
# display as 深美
# JP: 「ひあ"っ！！？」\n1224 = "「呀！！？」" \n\n# monologue\n# JP: ――切るというより、破くというより、剥がす感触。\n954 = "……這次不再是斷了線，也不像是捅破，倒像是剝下來的感覺。" \n\n# monologue\n# JP: ふかみの膣内が凶悪に僕を締め付けて――\nその瞬間、一生懸命な声が、僕らを励まし始める。\n1863 = "深美的陰道兇惡地咬著我……就在那一瞬，有個聲音開始為我們鼓勁。" \n\n# 【凪】\n# display as 凪\n# JP: 「へいき、へいき、へいきばいっ！\nいたいのいたいの、遠いお山にとんでけばーいっ！」\n1404 = "「沒事，沒事，沒事的！痛痛，痛痛，快飛到山裡去吧！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うん――うんっ――へいき――へい、きっ――」\n1296 = "「嗯……嗯……沒事……沒事……」" \n\n# monologue\n# JP: 凪の声が、ふかみの呼吸を落ち着けていく。\n1909 = "聽見凪的聲音，深美的呼吸也變得越來越平靜。" \n\n# monologue\n# JP: （うにゅうっ）\n2058 = "（蠕動）" \n\n# monologue\n# JP: 体の強張りがほぐれるにつれ、膣も和らぎをとりもどし、\nこんこんと奥から湧き出る蜜が、僕に動けと要求してくる。\n1941 = "身體不再緊張，陰道也放鬆下來，裡面溢出越來越多的蜜汁，就像在要求我趕緊動起來一樣。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ん――」\n1295 = "「嗯……」" \n\n# monologue\n# JP: （ず――るうっ！）\n# 2044 = "（插！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ひゅあっ――あっ！？」\n1216 = "「呀……啊！？」" \n\n# monologue\n# JP: 動ける。動けるし気持ちいい！\n思った瞬間、動きは大きなものとなってる。\n1912 = "能動。不僅能動，而且很舒服！我理所當然加大了動作幅度。" \n\n# monologue\n# JP: （ずっ――るっ！　ずりゅ！　じゅぶっ！）\n2043 = "（插！插！插！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「やっ！？　おちん、ちん――しゅごっ――あっ――\nふっ――んんんっ――んっ！　ふあっ！　あっ！！」\n1227 = "「呀！？雞巴……好舒服……啊……呼……嗯……嗯！呼！啊！！」" \n\n# monologue\n# JP: 止まりたいのに、止まれない。\n蠢く肉に誘われ、体が勝手に動いてしまって――\n1784 = "我想停下來，可我卻停不下來。那蠕動的肌肉就像在邀請我，我的身體完全停不下來……" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ひゃっ――んっ――あっ――おなか――んっ――\nおさ――れ、て――ふっ――だん、だんっ――」\n1219 = "「呀……嗯……啊……裡面……嗯……被……推著……哼……越來越……」" \n\n# monologue\n# JP: ふかみのぬかるみが増している。\n膣内温度も、体感できるほどあがってきてる。\n1857 = "深美的裡面越來越寬敞。我甚至能感覺到她的體溫在上升。" \n\n# monologue\n# JP: 腰に合わせてガクガク震えるふかみの裸のおっぱいは、\nかすかにだけれど揺れ動き、女なのだと、強く思わせ――\n1867 = "深美裸露出來的胸部配合著腰部的活動微微晃動，更是讓我強烈地感受到她就是個女孩子……" \n\n# monologue\n# JP: （ずっ――っぐっ！！）\n2033 = "（我插！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ひゅふっ！」\n1221 = "「呀！」" \n\n# monologue\n# JP: ――思った瞬間、最奥までをも突いている。\n943 = "……一想到這裡，我就用力插入了最深處。" \n\n# monologue\n# JP: ふかみは大きく一度あえいで、それからゆっくり、\n息と混じえた言葉を吐き出す。\n1847 = "深美大大地呼了一口氣，接著她慢慢地張開嘴，邊喘氣邊說話。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はっ――あっ――あっ――わた、しっ――\nわたし、も――子宮、口っ――んっ――」\n1258 = "「啊……啊……啊……我……我的……子宮入口也……嗯……」" \n\n# 【凪】\n# display as 凪\n# JP: 「チューば、されたと？　にーさんのおちんちん、\nふかみちゃんのおなかの奥に、チューば、しとーと？」\n1431 = "「被親了？大哥哥的雞巴親吻了小深的最深處嗎？」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うん、うん――キス、キス、して――もらって、る。\nわたしの――子宮――双鉄、さん――にっ――」\n1308 = "「嗯，嗯……正、正在……親吻呢。雙鐵先生……正在……親吻……我的子宮……」" \n\n# monologue\n# JP: （きゅきゅうううっ！）\n2056 = "（緊！）" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「くっ！」\n# 1235 = "「呃！」" \n\n# monologue\n# JP: 一番奥から、吸われる感触。\n1766 = "忽然感覺最深處似乎用力吸了我一下。" \n\n# monologue\n# JP: このまま射精をしてくれと、\nふかみの体が甘く強行に主張してくるっ！\n1859 = "深美的身體正在強烈要求我趕緊射出來！" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: （だ――がっ――）\n2021 = "（可是……）" \n\n# monologue\n# JP: もう限界の凪の膣内では、今日はイけない。\nならばふかみの膣内だけで、射精するのは公平じゃない。\n1674 = "凪已經到了極限，今天我不能射她裡面。如果我只射在深美裡面，就太不公平了。" \n\n# monologue\n# JP: （ずるうううううううっ！）\n# 2044 = "（插！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あっ！」\n# 1285 = "「啊！」" \n\n# monologue\n# JP: ほとんど反射でそう考えて、\n原初の射精欲求を、なんとかこらえてふかみから抜きっ！\n1789 = "我條件反射式地考慮到這一點，壓抑住自己原始的射精欲望，勉強將那傢伙從深美身子裡拔了出來！" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ふたりで――、一緒に――ふかみと、凪でっ！」\n1435 = "「要兩個人……一起……要深美和凪一起！」" \n\n# 【凪】\n# display as 凪\n# JP: 「あ――わかったばい！　そーするばいっ！」\n1277 = "「啊……知道了！就這樣吧！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ありがとう――大好き――双鉄――さんっ！」\n1442 = "「謝謝你……愛你哦……雙鐵先生！」" \n\n# monologue\n# JP: （にちゅううううううううっ！）\n# 2028 = "（啾！）" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「くあっ！」\n# 1235 = "「呃！」" \n\n# monologue\n# JP: 僕の勃起を挟んでの、\n仲良しふたりの、おまんこのキス。\n1602 = "一對好朋友，下面夾著我的那話兒吻在了一起。" \n\n# monologue\n# JP: 最初挟まれたときとは違う、とろとろに溶け、\n愛情と発情がたっぷり混じった、雌同士のキス。\n1939 = "跟一開始被夾住的時候不一樣，摻雜了愛情與發情，是女孩子與女孩子之間的吻。" \n\n# monologue\n# JP: （しゅにゅっ！　じゅるっ！　にゅぶっ！　ぢゅるっ！）\n# 2027 = "（啾！啾！啾！啾！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はっ――あっ――これっ――すごっ――ん――あっ！」\n1266 = "「啊……啊……這個……好棒……嗯……啊！」" \n\n# 【凪】\n# display as 凪\n# JP: 「違う――ばいっ！　ふ、ひゃっ――んっ――これ――\nさっきの――とっ――んっ――おんなじ、なの、に――」\n1347 = "「感覺不一樣！呼，呀……嗯……這個……跟剛才的……嗯……明明是一樣的……」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「知らないっ――こん――なのっ――ひあっ――わたし\n――わたしぃっ――とけ――る――とけ、ちゃうっ！」\n1365 = "「我都不知道……竟然……呀……我……我……要溶化……要溶化了！」" \n\n# monologue\n# JP: （じゅぶっ！　にゅりゅっ！　りゅぶっ！　にゅぢゅ！）\n# 2027 = "（啾！啾！啾！啾！）" \n\n# monologue\n# JP: 僕の勃起を激しく貪りあいながら\n凪とふかみのおまんこは、お互いを求め押し付けあってる。\n1671 = "凪和深美的陰部貪婪地索求著我的勃起，同時相互吮吸和推搡著對方。" \n\n# monologue\n# JP: 強烈な圧力とぬらつきと、温度の違いと微妙にずれあう\nリズムとが、僕の勃起を、二度目の射精に導いていく。\n1723 = "壓力強烈，活塞運動規律，溫度略有不同，上下活動不完全統一。就這樣，我慢慢被帶向了第二次射精。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「イク――んっ――わたし――やっ――ひとり、じゃ――\nやっ――いやぁっ――ンッ――」\n1437 = "「要射了……嗯……我……不要……一個人去……不要……不要……嗯……」" \n\n# 【凪】\n# display as 凪\n# JP: 「いっしょ――はっ――いくっ――ば、いっ――\nふあっ――あっ――にい、さん――ふかみ、ちゃっ――」\n1166 = "「一起……啊……去……呼……啊……大哥哥……小深……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ああっ！」\n1314 = "「好啊！」" \n\n# monologue\n# JP: （ぐりいいいいいいいいいいいいいっ！）\n2038 = "（挺！）" \n\n# monologue\n# JP: 思いっきりに腰を突き上げ大きく回せば、\n挟みこむ肉、ふたつがそれぞれビクビク震えっ！！\n1791 = "我用力將腰向上一挺，包裹著我的兩片肉就同時用力顫抖起來！！" \n\n# 【凪】\n# display as 深美＆凪\n# JP: 『「イっ――くぅぅぅぅぅぅぅぅうううううううんっ！」\n「ふやっ――あっ――んううううううううううっ～！！」』\n1474 = "『「……去了！」\\n「哇……啊……嗯！！」』" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「くあっ！」\n# 1285 = "「啊！」" \n\n# monologue\n# JP: （どびゅっ！　びゅりゅ！　びゅうっ！　びゅぶっ！）\n# 2024 = "（呲！呲！呲！呲！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あ……あっ――せい、えき――んっ――\nそう、てつ――さん、のっ――」\n1262 = "「啊……啊……精液……嗯……雙鐵先生的……」" \n\n# 【凪】\n# display as 凪\n# JP: 「あ……どろって……重、か――ね……んっ――\nあ――」\n1278 = "「啊……黏糊糊的……打上來了……嗯……啊……」" \n\n# monologue\n# JP: ふかみと、凪と。\nふたりは同時に、それぞれの指先に精を掬って――\n1870 = "深美跟凪同時用手捧起一些精液……" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はむっ――んっ――あっ――うっ――あっ――\nこれ……苦っ――んっ――」\n1282 = "「啊嗚……嗯……啊……呃……啊……這個……好苦……嗯……」" \n\n# 【凪】\n# display as 凪\n# JP: 「ぺろっ――んんっ――うぇっ――えっ――\nねばっこくって――喉、これ――ひっかかる――ばい」\n1429 = "「舔……嗯哼……嘔……哎……黏糊糊的……會黏在喉嚨裡」" \n\n# monologue\n# JP: ……文句をいいつつぺろぺろと、凪は、ふかみは、\n自分の、相手の体から、精を掬っては舐めとっていく。\n945 = "……凪跟深美嘴上這麼說，卻繼續從自己和對方身上刮下精液繼續放嘴裡。" \n\n# monologue\n# JP: その光景にむくむくと――浅ましくもまた射精を求め、\n僕の勃起は、全力で回復してしまう。\n1891 = "看著她們這副模樣……我的兄弟又很不爭氣地打起了精神。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「……ありがとう。凪。ありがとう。ふかみ」\n966 = "「……謝謝你，凪。謝謝你，深美」" \n\n# monologue\n# JP: だが、今日はもう、ここまでだ。\n三人それぞれ、消耗してるし、満ち足りてもいる。\n1619 = "但是今天就到這裡吧。我們三個都很累了，也都很滿足。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「三人でセックスできて、僕は、とても幸せだ」\n1427 = "「能三個人一起做愛，我很幸福」" \n\n# 【凪】\n# display as 凪\n# JP: 「それはこっちのセリフばいっ！」\n1452 = "「這話應該咱說！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はい。あの……凪ちゃんと、わたしと――\n一緒に、してくれて……うれしい、です。すごく」\n1390 = "「是啊，那個……你願意跟小凪還有我……一起做……我非常開心，嗯」" \n\n# 【凪】\n# display as 凪\n# JP: 「けど――」\n1182 = "「但是……」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うん」\n# 1300 = "「嗯」" \n\n# monologue\n# JP: 言って、視線を。\nふかみと凪とは、短く濃厚な視線を交わす。\n1933 = "說著，深美和凪短暫交換了一個肯定的視線。" \n\n# 【凪】\n# display as 凪\n# JP: 「次は……次のセックスは、にーさんと――\nふたりっきりで、じっくりゆっくりしてみたかばい！」\n1172 = "「下次……下次做愛，咱要跟大哥哥……跟大哥哥兩個人慢慢享受！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「なんです。あの……双鉄さんが、もし、\nイヤじゃなければ――なんですけど」\n1394 = "「是的。那個……當然，前提是……如果你願意」" \n\n# monologue\n# JP: 息もぴったりのかわいいおねだり。\n僕にもちろん、否やはないが――\n1639 = "兩個人這樣可愛地請求道。我當然不會不願意……" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「しかし、ふたりきりなら、それこそ同時には行えまい。\n順番などは――」\n1211 = "「可兩個人的話那就沒辦法一起來了。順序怎麼辦……」" \n\n# 【凪】\n# display as 凪\n# JP: 「そぎゃんこつ！　三人で相談すればすむ話ばい！」\n1403 = "「沒事，三個人好好談談就是了！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「そうですよ。“同時に”するのが無理だって、\n“公平に”はしていけるって、わたし、思います。です」\n1382 = "「是啊。就算不能同時來，那也能公平地來呀，我是這麼覺得的，嗯」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ああ」\n1385 = "「是啊」" \n\n# monologue\n# JP: そうだ。\n僕らは人間で、それぞれ為すべきことを持っている。\n1837 = "沒錯。我們都是人，我們有我們應該做的事情。" \n\n# monologue\n# JP: いつも一緒に――をずっと続けることは不可能で。\nけれど、公平にバランスを保つことなら、不可能じゃない。\n1612 = "不可能永遠在一起。但是要保持公平保持平衡，那也不是不可能。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「話し合いで、か」\n1210 = "「可以商量嘛」" \n\n# 【凪】\n# display as 凪\n# JP: 「そうばい！」\n1386 = "「是啊！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「そうです！」\n1405 = "「沒錯！」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「よかろう。ならば――」\n1321 = "「好，那麼……」" \n\n# 【凪】\n# display as 深美＆凪\n# JP: 『「きゃっ！」\n「ひゃうっ！」』\n1486 = "『「呀！」\\n「呀！」』" \n