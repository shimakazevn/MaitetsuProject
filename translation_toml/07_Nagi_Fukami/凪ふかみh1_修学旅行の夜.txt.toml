1933 = "Nói rồi, hai ánh mắt chạm nhau.\nFukami và Nagi trao nhau một ánh nhìn ngắn ngủi nhưng nồng nàn."
# 【凪】
# display as 凪
# JP: 「次は……次のセックスは、にーさんと――\nふたりっきりで、じっくりゆっくりしてみたかばい！」
1172 = "「Lần tới... lần làm tình tới, em muốn làm với anh hai——\nchỉ hai người thôi, thật chậm rãi và từ tốn nha!」"
# 【ふかみ】
# display as 深美
# JP: 「なんです。あの……双鉄さんが、もし、\nイヤじゃなければ――なんですけど」
1394 = "「Đúng vậy ạ. Ừm... nếu anh Soutetsu,\nkhông thấy phiền——thì...」"
# monologue
# JP: 息もぴったりのかわいいおねだり。\n僕にもちろん、否やはないが――
1639 = "Lời vòi vĩnh đáng yêu và vô cùng ăn ý.\nTất nhiên là tôi không có lý do gì để từ chối, nhưng——"
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、ふたりきりなら、それこそ同時には行えまい。\n順番などは――」
1211 = "「Nhưng mà, nếu chỉ có hai người, thì không thể làm cùng lúc được.\nThứ tự thì sao——」"
# 【凪】
# display as 凪
# JP: 「そぎゃんこつ！　三人で相談すればすむ話ばい！」
1403 = "「Chuyện đó á! Ba người cùng bàn bạc là xong ngay nha!」"
# 【ふかみ】
# display as 深美
# JP: 「そうですよ。“同時に”するのが無理だって、\n“公平に”はしていけるって、わたし、思います。です」
1382 = "「Đúng vậy ạ. Dù không thể làm \"cùng lúc\",\nnhưng vẫn có thể làm \"công bằng\" được mà, em nghĩ vậy. Dạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1385 = "「Ừ.」"
# monologue
# JP: そうだ。\n僕らは人間で、それぞれ為すべきことを持っている。
1837 = "Đúng vậy.\nChúng tôi là con người, mỗi người đều có những việc cần phải làm."
# monologue
# JP: いつも一緒に――をずっと続けることは不可能で。\nけれど、公平にバランスを保つことなら、不可能じゃない。
1612 = "Không thể nào cứ mãi——ở bên nhau mãi được.\nNhưng, nếu là giữ sự cân bằng một cách công bằng, thì không phải là không thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「話し合いで、か」
1210 = "「Bàn bạc, sao.」"
# 【凪】
# display as 凪
# JP: 「そうばい！」
1386 = "「Đúng thế nha!」"
# 【ふかみ】
# display as 深美
# JP: 「そうです！」
1405 = "「Đúng vậy ạ!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「よかろう。ならば――」
1321 = "「Được thôi. Nếu vậy thì——」"
# 【凪】
# display as 深美＆凪
# JP: 『「きゃっ！」\n「ひゃうっ！」』
1486 = "『「Á!」\n「Á!」』"
