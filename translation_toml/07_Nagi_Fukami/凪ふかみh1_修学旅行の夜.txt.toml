# lines: 345 
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう、ここがふかみの部屋か」
1254 = "「Ồ, đây là phòng của Fukami sao.」"

# 【凪】
# display as 凪
# JP: 「違うばーい！　宿泊所ばい！　合宿所ばい！！」
1372 = "「Không phải! Là nhà trọ! Là nhà trọ mà!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだったな」
1309 = "「À, đúng rồi nhỉ.」"

# monologue
# JP: 三人分の荷物を下ろし、一息をつく。
1786 = "Tôi đặt hành lý của ba người xuống và thở\nphào một cái."

# monologue
# JP: 十一度目の修学旅行は、\n初めての、計画的な宿泊旅行だ。
1894 = "Chuyến đi dã ngoại lần thứ mười một,\nlà\nchuyến đi qua đêm có kế hoạch đầu tiên."

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、ここに泊まるのであれば、\nふかみと凪の手料理も食べてみたかった」
1179 = "「Nhưng mà, nếu đã trọ lại đây,\nanh cũng\nmuốn ăn thử món ăn do Fukami và Nagi nấu.」"

# 【凪】
# display as 凪
# JP: 「手料理なんてできん――あ！\nいっこだけ！　カレーライスなら作れるばい！」
1396 = "「Nấu ăn thì em chịu――a!\nChỉ có một món\nthôi! Cơm cà ri thì em làm được!」"

# 【ふかみ】
# display as 深美
# JP: 「わたしは……家庭料理って感じのものなら――\n多分、ひととおり、作れます、けど」
1352 = "「Em thì……nếu là những món ăn gia đình――\nChắc là, em nấu được hầu hết các món,\nnhưng mà.」"

# monologue
# JP: きっぱりさっぱりしている凪と、\n妙にもったいぶってるふかみ。
1683 = "Nagi trả lời thẳng thừng dứt khoát,\ncòn\nFukami lại ấp úng một cách kỳ lạ."

# monologue
# JP: いつもながらの会話にけれど、\nいつもと違う何かを感じる。
1761 = "Dù là cuộc trò chuyện như mọi khi,\nnhưng\ntôi cảm nhận được điều gì đó khác thường."

# 【ふかみ】
# display as 深美
# JP: 「けど――すっぽんまでは……\nさすがに、まだ、さばけませんから」
1183 = "「Nhưng mà――đến mức làm thịt ba ba thì……\nQuả thực, em vẫn chưa làm được.」"

# 【凪】
# display as 凪
# JP: 「すっぽん！　おいしかったばーい！」
1471 = "「Ba ba! Ngon tuyệt cú mèo luôn!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「だな。僕も初めて食したが――\n確かに、鍋と唐揚げは旨かった」
1384 = "「Đúng vậy. Anh cũng mới ăn lần đầu――\nCông\nnhận, lẩu và món chiên ngon thật.」"

# monologue
# JP: 言えば途端に、凪の眉根がむむと寄る。
1931 = "Vừa dứt lời, lông mày Nagi lập tức nhíu\nlại."

# 【凪】
# display as 凪
# JP: 「お刺身はおいしくなかったと？」
1470 = "「Sashimi không ngon sao?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「刺し身はほとんど味らしい味を感じなかった。\n心臓など、濃い味がするかと予想していたのだが……」
1205 = "「Sashimi hầu như không có vị gì đặc trưng\ncả.\nAnh cứ tưởng tim thì vị sẽ đậm đà lắm\nchứ……」"

# 【凪】
# display as 凪
# JP: 「あのびみょ～な味わいがわからんとは、\nにーさんもまだまだ未熟とねー」
1420 = "「Không hiểu được hương vị vi diệu~ đó,\nanh\nSoutetsu vẫn còn non nớt lắm nha~」"

# monologue
# JP: 凪が偉そうに胸を張る。\n凪の胸。まさに未熟で、まっ平らな胸。
1685 = "Nagi vênh váo ưỡn ngực.\nNgực của Nagi.\nĐúng là chưa trưởng thành, phẳng lì."

# monologue
# JP: の、筈なのだが……\nこう突き出されると、案外、ささやかなふくらみが――
1704 = "Đáng lẽ là vậy, nhưng mà……\nKhi ưỡn ra thế\nnày, không ngờ, cũng có chút nhấp nhô nho\nnhỏ――"

# 【ふかみ】
# display as 深美
# JP: 「それで、双鉄さん」
1462 = "「Vậy nên, anh Soutetsu.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1285 = "「A!」"

# monologue
# JP: ふかみの声で、正気に返る。\n一瞬、なにかがヘンだった。
1907 = "Nhờ tiếng của Fukami, tôi mới bừng tỉnh.\nTrong một thoáng, có gì đó thật kỳ lạ."

# monologue
# JP: いや……今もだ。\n体が、妙に――
1610 = "Không……bây giờ vẫn vậy.\nCơ thể tôi, một\ncách kỳ lạ――"

# 【ふかみ】
# display as 深美
# JP: 「すっぽん、食べてどうですか？\nなにか、変化、とか……あったり、しま、すか？」
1212 = "「Anh ăn ba ba, thấy thế nào?\nCó, sự thay\nđổi, nào……không, ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ……ああ」
1269 = "「A……ừ.」"

# monologue
# JP: ふかみの舌が、唇のまわりを素早く舐める。\nその光景が、僕の唇もなめらかにする。
1852 = "Lưỡi của Fukami lướt nhanh qua viền môi.\nCảnh tượng đó khiến môi tôi cũng trở nên\nướt át."

# 【双鉄H】
# display as 雙鐵
# JP: 「これがすっぽんのせいかは定かではないが――\n体が熱くて……その――」
1360 = "「Không biết có phải do ăn ba ba không\nnhưng――\nCơ thể anh đang nóng ran……và――」"

# 【ふかみ】
# display as 深美
# JP: 「『その？』……なんですか？」
1423 = "「'Và?'……Và sao ạ?」"

# monologue
# JP: ふかみの視線が、僕を誘う。
1853 = "Ánh mắt của Fukami, như đang mời gọi tôi."

# monologue
# JP: その目は一点、僕の股間を凝視している。\nいまさら言葉を飾って、仕方も無いと感じてしまう。
1739 = "Ánh mắt ấy tập trung, nhìn chằm chằm vào\nđũng quần tôi.\nĐến nước này có vòng vo\ncũng chẳng ích gì."

# 【双鉄H】
# display as 雙鐵
# JP: 「下半身――性器が、ひどく強張っている。\nつまり、勃起を、さっきからしてしまってる」
1170 = "「Nửa thân dưới――chỗ đó, đang căng cứng.\nTức là, anh đang cương cứng, từ nãy đến\ngiờ.」"

# 【凪】
# display as 凪
# JP: 「ボッキばい！？　学園の授業でならったばい！\n実物はまだ見たことなかばい！　見たかばい！！」
1206 = "「Cương cứng á!? Em học trong giờ ở trường\nrồi!\nNhưng chưa thấy đồ thật bao giờ! Cho\nem xem với!!」"

# 【ふかみ】
# display as 深美
# JP: 「あの……わたし、も……見せて、ほしい、です。\n双鉄さんの、いちばん、はずかしい――ところ」
1461 = "「À ừm……em, cũng……muốn, xem, ạ.\nChỗ, đáng\nxấu hổ, nhất――của anh Soutetsu.」"

# monologue
# JP: （もぞっ）
2019 = "（Ngọ nguậy）"

# monologue
# JP: ふかみが小さく身じろぎし、\n自分の右手を、スカートの奥へとほんの一瞬差し入れる。
1866 = "Fukami khẽ cựa mình,\nluồn tay phải vào sâu\ntrong váy chỉ trong một thoáng chốc."

# monologue
# JP: “一番、恥ずかしいところ”――\n言葉を、自ら体現しようとするかのように。
939 = "Chỗ, đáng xấu hổ, nhất'――\nNhư thể cô ấy\nđang tự mình thể hiện câu nói đó vậy."

# 【ふかみ】
# display as 深美
# JP: 「わたしたち、三人いっしょに――ずっと、勉強、\nしていきますから……隠し事とか……したく、ないです」
1362 = "「Ba người chúng ta, sẽ cùng nhau――học tập,\nmãi mãi,\nnên là……em không muốn……có chuyện\ngì giấu giếm đâu ạ.」"

# monologue
# JP: したく。ない。\n僕にされたくない――ではなくて。
1614 = "Không muốn.\nChứ không phải là không muốn\nbị tôi giấu giếm――"

# monologue
# JP: その一言が僕を動かす。\n体が、欲が、理性を焼いて焦がしてく。
1945 = "Câu nói đó đã kích thích tôi.\nCơ thể, dục\nvọng, đang thiêu đốt lý trí."

# 【双鉄H】
# display as 雙鐵
# JP: 「僕とて、何を隠すつもりもない」
1358 = "「Anh cũng, không có ý định giấu giếm gì\ncả.」"

# monologue
# JP: （ちい……いっ）
2036 = "（Kéo……）"

# 【凪】
# display as 凪
# JP: 「わ……ひっ――あ……\nこれが……にーさんの、ボッキ――ばい？」
1245 = "「Oa……hí――a……\nĐây là……sự cương cứng――của\nanh Soutetsu, sao?」"

# 【ふかみ】
# display as 深美
# JP: 「そう、ね……凪ちゃん。これ、が――双鉄さんの、\n勃起、している――おちん、ちん――（すんっ）」
1380 = "「Đúng, vậy……Nagi. Đây, là――\ncậu bé――đang\ncương cứng――của anh Soutetsu――(Hít)」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃん！？　匂いかいだばいっ！？　\nウチもかぐばいかぎまくるばい！！　（すんすんっ！）」
1337 = "「Bé Fukami!? Cậu ngửi mùi kìa!?\nMình cũng\nngửi, mình ngửi lấy ngửi để luôn!! (Hít\nhít!)」"

# 【ふかみ】
# display as 深美
# JP: 「や、凪ちゃん。おちんちんの匂い、そんなに吸ったら、\nわたしの、分っ――（すんすんすんっ！）」
1200 = "「Đừng, Nagi. Nếu cậu hít hết mùi của cậu\nbé,\nthì phần của, mình――(Hít hít hít!)」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……くっ――」
1229 = "「Ưm……hự――」"

# monologue
# JP: 吸えば当然、息は吐かれる。\n鼻から強く出てくるそれは、僕の勃起を淡くくすぐる。
1824 = "Đã hít vào thì tất nhiên phải thở ra.\nLuồng hơi mạnh mẽ phả ra từ mũi, khẽ mơn\ntrớn phần đang cương cứng của tôi."

# 【双鉄H】
# display as 雙鐵
# JP: （鼻息の温度も……\nこれほど、個人差があるものなのだな）
2064 = "（Nhiệt độ của hơi thở từ mũi……\nCũng có sự\nkhác biệt giữa mỗi người đến thế này sao.）"

# monologue
# JP: 凪のそれはカラリと熱く、\nふかみのものは、湿った感じでひんやりしてる。
1682 = "Hơi thở của Nagi khô ráo và nóng bỏng,\ncòn của Fukami thì lại ẩm ướt và lành\nlạnh."

# monologue
# JP: 指も、手も、舌も同様なのであろうか――\n思った瞬間、
1949 = "Không biết ngón tay, bàn tay, hay cả lưỡi\ncủa hai em ấy có giống vậy không nhỉ——\nNgay lúc tôi vừa nghĩ thế,"

# 【凪】
# display as 凪
# JP: 「わわ！？　にーさんのボッキ、ビクってしたばい！」
1250 = "「Oa!? Của anh hai vừa giật giật nè!」"

# 【ふかみ】
# display as 深美
# JP: 「そうてつ、さん……見られて……\n感じ、ちゃったん……です、か？」
1469 = "「Anh Soutetsu... bị bọn em nhìn...\nnên thấy có cảm giác... rồi ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「それもある、が――勃起の先に息がかかるのが」
1451 = "「Đó cũng là một lý do, nhưng——chủ yếu là\nvì hơi thở của hai đứa phả vào đầu nó.」"

# 【凪】
# display as 凪
# JP: 「息ばい？　息ば、にーさんの勃起ビクビクさせるばい？\n（ふーーーーーーーーーーーーっ！）」
1238 = "「Hơi thở á? Hơi thở làm cho của anh hai\ngiật giật được luôn á?\n（Phùuuuuuuuuuuuuuu!）」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1235 = "「Ư!」"

# 【ふかみ】
# display as 深美
# JP: 「わ。ほんと――双鉄さん、息で、感じちゃうんだ。\n（ふーーーっ）（ふーーーっ）（ふーーーーーーっ）」
1252 = "「Oa. Thật này——Anh Soutetsu, có cảm giác\nchỉ với hơi thở thôi sao.\n（Phùuu）（Phùuu）（Phùuuuuu）」"

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あ」
1232 = "「Ư——a」"

# monologue
# JP: 気持ちいい。\n気持ちいいのだがもどかしい。
1743 = "Thật sung sướng.\nSung sướng nhưng lại bứt rứt không thôi."

# monologue
# JP: 綿毛をふわふわ積み重ねるような快感は、\nかえって僕を乾かして、欲望を鋭く尖らせる。
1947 = "Khoái cảm hệt như những sợi lông tơ mềm\nmại tích tụ lại,\ncàng làm tôi thêm khao khát, khiến dục\nvọng càng trở nên mãnh liệt."

# 【双鉄H】
# display as 雙鐵
# JP: 「息は、もういい。十分だ。\nそれよりもっと直接的、な――」
1175 = "「Hơi thở, thế là đủ rồi.\nHơn thế nữa, anh muốn thứ gì đó trực tiếp\nhơn——」"

# monologue
# JP: いいかけて、けれども言葉を飲み込んでいる。
1930 = "Tôi định nói tiếp, nhưng lại nuốt lời vào\ntrong."

# 【双鉄H】
# display as 雙鐵
# JP: （くっつき合って雑魚寝したことも、\n一緒の風呂に入ったこともある。が、これは――）
2032 = "（Chúng tôi đã từng nằm ngủ chung,\ncũng từng tắm chung. Nhưng, chuyện này——）"

# monologue
# JP: そうした行為と、レベルが違う。\n性器を見せて、息がかかって……
1946 = "Hoàn toàn khác xa những hành động đó.\nPhơi bày bộ phận sinh dục, rồi bị hơi thở\nphả vào..."

# monologue
# JP: そこから先を望むのならば、\nそれは、明白なセックスだ。
1957 = "Nếu mong muốn tiến xa hơn nữa,\nthì đó rõ ràng là làm tình."

# 【ふかみ】
# display as 深美
# JP: 「……お勉強。\nわたしたち、十分に重ねてきたって思います」
963 = "「...Bọn em đã học.\nEm nghĩ bọn em đã tích lũy đủ kiến thức\nrồi ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1285 = "「啊！」" 

# monologue
# JP: 僕の心を見きったように――\nいや、恐らくは実際見切り、ふかみは静かな言葉を繋ぐ。
1875 = "Như thể nhìn thấu tâm can tôi——\nKhông, có lẽ là em ấy thực sự nhìn thấu,\nFukami lặng lẽ nói tiếp."

# 【ふかみ】
# display as 深美
# JP: 「段階を踏んで、少しずつ。双鉄さんも、凪ちゃんも。\nそれから、わたしも――三人、いっしょに」
1349 = "「Cứ từng bước một, từ từ thôi. Cả anh\nSoutetsu, cả bé Nagi.\nVà cả em nữa——ba người chúng ta, cùng nhau\nạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「――ああ」
959 = "「——Ừ.」"

# 【ふかみ】
# display as 深美
# JP: 「だから、ここから先をするかは――\nただ単に、気持ちの問題だと思います」
1181 = "「Nên là, chuyện tiếp theo có làm hay\nkhông——\nEm nghĩ chỉ đơn giản là vấn đề cảm xúc\nthôi ạ.」"

# monologue
# JP: ほんの一瞬、沈黙が満ち。\nけれどもすぐに、凪の力強い声がそれを打ち壊す。
1777 = "Sự im lặng bao trùm trong chốc lát.\nNhưng ngay sau đó, giọng nói dõng dạc của\nNagi đã phá vỡ nó."

# 【凪】
# display as 凪
# JP: 「ウチは、にーさんとしたかばい！　\nチューよりもっと……にーさんの近くに、行きたかよ」
1243 = "「Em muốn làm với anh hai nha! \nMuốn làm nhiều hơn cả hôn cơ... em muốn\nđược gần anh hai hơn nữa.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「僕の、近くに」
1241 = "「Gần, anh hơn sao.」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、凪ちゃんと同じ気持ちです。双鉄さん」
1364 = "「Em cũng có cùng cảm giác với bé Nagi. Anh\nSoutetsu ạ.」"

# monologue
# JP: ふかみの瞼が、静かに落ちる。
1876 = "Fukami lặng lẽ nhắm mắt lại."

# monologue
# JP: 願うがごとく、祈るがごとくに――\nふかみは静かな言葉をつなぐ。
1627 = "Như đang nguyện cầu, như đang ước ao——\nFukami thì thầm những lời êm ái."

# 【ふかみ】
# display as 深美
# JP: 「肌を重ねて――セックスをして。\n体の距離も、心の距離も。三人、ゼロに近づけたいです」
1443 = "「Làn da chạm nhau——cùng nhau làm tình.\nCả khoảng cách thể xác lẫn tâm hồn. Em\nmuốn ba chúng ta, đều trở về con số\nkhông.」"

