# 【双鉄】
# display as 雙鐵
# JP: 「いや、かなり距離はあったが――後続列車のことや、\n線路妨害の防止などについても考えなければならん」
2045 = "「Không, cũng khá xa đấy——nhưng cũng phải\ntính đến chuyến tàu đi sau,\nvà cả việc phòng ngừa cản trở đường ray\nnữa」"

# monologue
# JP: ふかみの不安を解いてやらねば――\nそうと思えば、説明の言葉は細かくゆるいものになる。
3128 = "Phải giải tỏa sự bất an của Fukami mới\nđược——\nNghĩ vậy, lời giải thích của tôi trở nên\nchi tiết và nhẹ nhàng hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、例え安全に思える距離があっても、敷地内無断\n立ち入りには、原則として赤を切る。止めて、排除だ」
2332 = "「Do đó, dù khoảng cách có vẻ an toàn,\nnhưng với việc xâm nhập trái phép\nvào khu vực đường sắt, theo nguyên tắc là\nphải kéo van đỏ. Dừng tàu và trục xuất」"

# 【ふかみ】
# display as 深美
# JP: 「赤を、切る？　です？」
2487 = "「Kéo van, đỏ? ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――赤を切るとは、車掌や駅員が、\nその職権によって列車を非常停止させることだ」
2247 = "「À——kéo van đỏ nghĩa là trưởng tàu hoặc\nnhân viên nhà ga\ndùng thẩm quyền của mình để dừng tàu khẩn\ncấp」"

# 【ふかみ】
# display as 深美
# JP: 「車掌さんとか駅員さんって、\nそんなことできるんですか！？」
2147 = "「Trưởng tàu với nhân viên nhà ga,\ncó thể làm được việc đó sao ạ!?」"

# monologue
# JP: ふかみがその目を丸くする。
3218 = "Fukami tròn xoe mắt ngạc nhiên."

# monologue
# JP: だからゆっくり、できるだけわかりよいようにと、\n言葉を選ぶ。
3161 = "Vì vậy tôi nói chậm lại, chọn lọc từ ngữ\nsao cho dễ hiểu nhất có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「当然、できる。特に8620やC56のようなテンダー式\n蒸気機関車においては、後方視界など無いも同然だから」
2611 = "「Đương nhiên là được. Đặc biệt là với loại\nđầu máy hơi nước chở than nước\nnhư 8620 hay C56, tầm nhìn phía sau coi\nnhư bằng không mà」"

# 【凪】
# display as 凪
# JP: 「運転士には見えん危険を見つけるの、\n車掌さんや駅員さんの、大事な大事なお仕事ばい！！」
2615 = "「Việc phát hiện ra những nguy hiểm mà lái\ntàu không nhìn thấy,\nlà công việc cực kỳ, cực kỳ quan trọng của\ntrưởng tàu và nhân viên nhà ga đấy!!」"

# 【ふかみ】
# display as 深美
# JP: 「あー」
# 2271 = "「啊」" 

# monologue
# JP: 凪のフォローに、ふかみは頷く。
3249 = "Nghe Nagi bổ sung, Fukami gật đầu."

# 【ふかみ】
# display as 深美
# JP: 「あ……そうですよね。\n危険を見つけたら――列車を止めないと、危ない」
2264 = "「A... đúng vậy nhỉ.\nNếu phát hiện nguy hiểm mà——không dừng tàu\nlại thì nguy hiểm lắm」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、今回の場合も、オリヴィは\n車掌として列車を非常停止させた」
2033 = "「Đúng vậy. Do đó, trong trường hợp lần\nnày, Olivy\ncũng đã dừng tàu khẩn cấp với tư cách là\ntrưởng tàu」"

# monologue
# JP: 列車が止まると想像もしていなかったのか、\nカメラの男は、ものすごい勢いで逃げ出していった。
3296 = "Chắc gã cầm máy ảnh không ngờ tàu sẽ dừng\nlại,\nnên đã vắt chân lên cổ mà chạy trốn."

# monologue
# JP: あれで少しは、こりてくれるといいのだが――
3095 = "Hy vọng chuyện đó sẽ làm hắn chừa đi một\nchút——"

# 【凪】
# display as 凪
# JP: 「無断立ち入りしたヤツはどぎゃんしたと？\n逃げられたとばい？」
2627 = "「Thế cái kẻ xâm nhập trái phép đó sao rồi?\nBỏ chạy rồi hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「乗務員的にはそれでいいのさ。報告をいれたら、\nあとは会社――今回の場合はみかん鉄道さんの判断だ」
2393 = "「Về phía tổ lái thì như vậy là được rồi.\nSau khi báo cáo,\nphần còn lại sẽ do công ty——trong trường\nhợp này là đường sắt Mikan quyết định」"

# 【ふかみ】
# display as 深美
# JP: 「判断って」
2153 = "「Quyết định ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「警察に通報して、近くの見回りをしてもらうなどかな。\nまぁ、[おおごと,1]大事にはならんだろうが」
2576 = "「Chắc là báo cảnh sát, nhờ họ đi tuần tra\nquanh đây chẳng hạn.\nMà chắc cũng không thành chuyện lớn đâu」"

# 【ふかみ】
# display as 深美
# JP: 「ふぁあ」
2203 = "「Phù」"

# monologue
# JP: ふかみが、安堵の息を吐く。\nそうして僕を、どこかうっとりした目で見上げる。
3209 = "Fukami thở phào nhẹ nhõm.\nRồi ngước nhìn tôi bằng ánh mắt có phần\nsay mê."

# 【ふかみ】
# display as 深美
# JP: 「……すごい、です。双鉄おにいさんもオリヴィちゃんも。\nそんなの見えたの――だって、みんなで海見てたのに」
1614 = "「...Tuyệt quá, ạ. Cả anh Soutetsu và bé\nOlivy nữa.\nLại có thể nhìn thấy chuyện đó——rõ ràng là\nmọi người đều đang ngắm biển mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「職業柄――としかいいようがないな。車窓の景色よりも、\n違和感の方にどうしても注意が向いてしまうようだ」
2721 = "「Chỉ có thể nói là do——bệnh nghề nghiệp\nthôi. Thay vì cảnh sắc ngoài cửa sổ,\nsự chú ý của anh lại cứ hướng về những thứ\nbất thường」"

# 【凪】
# display as 凪
# JP: 「むー、背の高かとは、そういうとこでも有利たいねー」
2258 = "「Ưm, vóc dáng cao lớn cũng có lợi trong\nmấy chuyện này nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「否定はせんが、背の高さだけのことでもなかろう。\n実際、あれほど小さなオリヴィも――」
2445 = "「Anh không phủ nhận, nhưng không phải chỉ\ndo chiều cao đâu.\nThực tế thì một người nhỏ bé như Olivy\ncũng——」"

# monologue
# JP: 他の乗客への説明なども済んだのだろう。
3053 = "Chắc em ấy cũng đã giải thích xong xuôi\nvới các hành khách khác rồi."

# monologue
# JP: オリヴィはひらひらちいさな手を振って、前方客車へ、\n連結部のドアをくぐって消えていく。
3067 = "Olivy vẫy vẫy bàn tay nhỏ xíu, bước qua\ncửa nối toa,\nrồi khuất bóng về phía toa hành khách phía\ntrước."

# 【双鉄】
# display as 雙鐵
# JP: 「――不慣れとはいっていたが、やはり根本の意識が違う。\n僕らと話している最中も、注意を怠らずにいたのだな」
1620 = "「——Dù nói là không quen việc, nhưng ý thức\ncơ bản quả nhiên khác hẳn.\nNgay cả trong lúc nói chuyện với chúng ta,\nem ấy vẫn không hề lơ là cảnh giác」"

# 【ふかみ】
# display as 深美
# JP: 「すごい……です、ね。\n鉄道にかかわる人――も、レイルロオドも、ですけど」
2172 = "「Tuyệt thật... nhỉ.\nNhững người làm đường sắt——và cả Railord\nnữa」"

# 【凪】
# display as 凪
# JP: 「ううう～凪さま！　こっちでもまだまだ未熟ばい！」
2303 = "「Uuu~ Bổn cô nương! Ở khoản này vẫn còn\nnon kém lắm!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。今日は客だ。逆からみれば、楽しむことに\n100％集中しきれなかった、僕の方こそが未熟だ」
2036 = "「Không. Hôm nay chúng ta là khách. Nhìn từ\ngóc độ ngược lại,\nngười không thể tập trung 100% vào việc\ntận hưởng như anh mới là kẻ non kém」"

# 【凪】
# display as 凪
# JP: 「む！？　そぎゃんいわれればそのとーりばい！\n今日は、修学旅行やけんね！！」
2261 = "「Ưm!? Anh nói vậy cũng đúng!\nHôm nay là chuyến đi dã ngoại mà!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2513 = "「是啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　ですね、うん。\nトラブルの分も楽しまないと！」
2279 = "「A! Đúng rồi, vâng.\nPhải tận hưởng cả những rắc rối nữa chứ!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、そうだった」
2287 = "「A, đúng rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
2313 = "「Ưm!?」"

# monologue
# JP: オリヴィがひょっこり、連結部から顔をだし――
3056 = "Olivy bất ngờ thò đầu ra từ phần nối toa——"

# 【凪】
# display as 凪
# JP: 「む！」
2257 = "「Ưm!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2307 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「わわっ？！」
# 2227 = "「哇？！」" 

# monologue
# JP: 敬礼だ。\n僕も凪も答礼し、ふかみもあわてて僕らを真似る。
3054 = "Em ấy giơ tay chào.\nCả tôi và Nagi đều chào lại, Fukami cũng\nvội vàng bắt chước theo."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっきは手伝ってくれてありがとう！\nヤツシロについても、また乗ってね！　楽しい旅を！！」
2685 = "「Cảm ơn anh lúc nãy đã giúp đỡ nhé!\nĐến Yatsushiro rồi cũng nhớ đi tàu nữa\nnha! Chúc chuyến đi vui vẻ!!」"
