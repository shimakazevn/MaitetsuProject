3288 = "這個過程在不斷重複著。不管是在抵達川內之前，還是在川內坐上橙鐵路的列車之後也一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はじめてだな」
2725 = "「這還是第一次啊」" 

# 【凪】
# display as 凪
# JP: 「…………」
# 1588 = "「……」" 

# 【ふかみ】
# display as 深美
# JP: 「はじめて、って。何が、です？」
2637 = "「第一次什麼？」" 

# monologue
# JP: その状況を、無理やりに動かそうとは思わない。
3117 = "我並不想強迫凪享受旅行。" 

# monologue
# JP: 僕自身に動かしえるのは、僕一人だけ。\nならば僕が、まずこの旅を楽しむことだ。
3122 = "我只能調動我自己。所以我自己必須好好享受這場旅行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行を、僕らはずっと重ねているのに。\n実際こうして、旅に出たのは、はじめてだ」
2455 = "「我們一直在修學旅行。可真正出門旅行，這還是第一次啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2316 = "「噢……」" 

# 【凪】
# display as 凪
# JP: 「…………」
# 1588 = "「……」" 

