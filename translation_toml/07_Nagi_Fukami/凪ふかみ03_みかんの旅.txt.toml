# lines: 509 
# 【双鉄】
# display as 雙鐵
# JP: 「……むぅ」
1602 = "「……唔」" 

# monologue
# JP: 考えても考えても、わからない。\nどころか考えれば考えるほど、思考が濁る気さえする。
2897 = "不管怎麼想都想不明白，甚至感覺越想越迷糊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪が落ち込むのは無理からぬところではあろうが――」
2145 = "「凪會感到失落，也是沒辦法的事情……」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2547 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2295 = "「啊？！」" 

# monologue
# JP: ハチロクだ。\n僕の隣に座っている。
3185 = "是八六出聲附和了我，她就坐在我旁邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつの間に……」
2082 = "「你什麼時候進來的……」" 

# 【ハチロク】
# display as 八六
# JP: 「つい今ですよ？　居間に参りましたら、\n双鉄様が難しい顔をされておりましたので」
2157 = "「剛剛。　我走進起居室，恰好看見您一臉為難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全く気づかなかった」
2463 = "「我完全沒注意到」" 

# monologue
# JP: とはいえ、それも当然か。\n僕は考えにふけっていたし――
3286 = "這也很正常。畢竟我正在思考問題……" 

# monologue
# JP: ハチロクと真闇姉は普段から、ふすまの開け閉めを上品に、\n一切の音を立てずに行うゆえに。
2936 = "八六跟真闇姐拉門時總是很注意禮節，從不發出任何聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「お考えごとの、お邪魔をしてしまいましたか？」
2483 = "「打擾到您思考問題了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――むしろ助かる。\n僕ひとりでは、行き詰まりそうになっていたところだ」
2581 = "「沒有，你來得正好。這個問題我一個人想不通」" 

# monologue
# JP: そうと言葉にするだけで、いささか心が軽くなる。
2922 = "光是將心事說出口，我就覺得輕鬆了不少。" 

# monologue
# JP: おおまかないきさつは、すでに聞かせていることだし、\nハチロクならば、まさにぴったりの相談相手だ。
2928 = "八六已經知道大致情況了，而且這方面的事情很適合找她商量。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみまでが、元気をなくしてしまったのだ。\nあの試合から、もう一週間も経つというのに」
2727 = "「連深美都垂頭喪氣的。比賽都過去一星期了啊」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですか？　駅などでお見かけするときは、\n普段と変わらないようにも感じますが――」
2531 = "「是嗎？　我在車站見到她的時候，倒覺得她與平時一樣……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見かけだけなら、凪もだろう」
2181 = "「只是表面上沒變化吧，凪應該也一樣」" 

# 【ハチロク】
# display as 八六
# JP: 「凪は……空元気を出しておりますね。\nおそらく、わたくしたちに気をつかわせぬよう」
2144 = "「凪嗎……我倒看得出她在假裝自己很陽光。大概是不希望我們擔心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「感じていたか。さすがだな」
2099 = "「你感覺到了啊，厲害」" 

# monologue
# JP: 言えば、ハチロクは暖かな微笑を浮かべる。
3254 = "聽我這麼說，八六就露出了溫和的微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「それはもう。\n手塩にかけて育てた機関助士のことでございますので」
2614 = "「當然，她可是我一手帶出來的司爐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2513 = "「是啊」" 

# monologue
# JP: ハチロクは、凪をしっかり見て知っている。\n反面、ふかみとはそれほどに濃い接触を持ってない。
2927 = "八六一直關注著凪，所以她很清楚。相對的是，她與深美並不熟悉。" 

# monologue
# JP: そこに気づけば、\nハチロクの目線をどこに向ければよいかが理解る。
3163 = "既然這樣，那我就清楚應該怎樣向她表述重點了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「であれば、どうだ？\n凪とふかみの接し方が変化していることには――」
2737 = "「那你感覺到了嗎？凪和深美之間的態度有了些許變化」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！\n言われてみれば、まことに左様でございますね」
2281 = "「啊！聽你這麼說，還確實是這樣的」" 

# monologue
# JP: ハチロクの目が丸くなり、\nすぐに、物思わしげに伏せられる。
2935 = "八六瞪圓了眼，接著立刻低頭開始思考。" 

# 【ハチロク】
# display as 八六
# JP: 「……乗務の後の凪のことを、ふかみ様が待っている。\nそんないつもの光景を、確かに数日見かけないような」
1612 = "「……深美小姐總是在車站等候凪結束工作。可是這幾天我似乎沒見到她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際、見かけんのだ。\nお互いに、気を遣いあっているというのか――」
2105 = "「你肯定沒見到她。畢竟她們都在照顧對方的……」" 

# monologue
# JP: 口にしてすぐに“違う”と感じる。
3274 = "說到一半，我就覺得不對。" 

# monologue
# JP: お互いに気を遣い合う――今はもう、\nそのレベルにまでコミュニケーションが至らない。
3221 = "照顧對方的感受？她們現在甚至都沒有交流。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうにも、凄まじくギクシャクするのだ。\nふかみが空回りをするというか――」
2358 = "「她們的關係現在很尷尬。深美一副不知道怎麼辦的樣子……」" 

# 【ハチロク】
# display as 八六
# JP: 「空回り……で、ございますか」
2026 = "「不知道怎麼辦？」" 

# 【双鉄】
# display as 雙鐵
