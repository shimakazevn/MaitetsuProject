3093 = "就算深美開始會覺得凪很煩，但她最終會放下煩惱，再次與凪一道歡笑……" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ち込んだ凪への接し方がわからんのだろう。\n僕は、努めて意識せぬよう接しているつもりなのだが」
2362 = "「她肯定是不知道應該怎麼對待失落的凪。我倒是儘可能讓自己保持常態」" 

