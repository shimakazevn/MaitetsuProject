2720 = "「這也沒辦法。畢竟我們都是第一次看到凪那麼失落」" 

# monologue
# JP: 普段は、まるきり逆の構図だ。\nふかみが落ち込み、凪が変わらぬ調子で接する。
3097 = "平時都是深美陷入消沉，然後凪用一如既往的態度給她打氣。" 

# monologue
