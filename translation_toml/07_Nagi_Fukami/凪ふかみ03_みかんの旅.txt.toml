# 【ハチロク】
# display as 八六
# JP: 「意識して当然の状況での、“意識せぬよう”は――\nそれ自体、お芝居になってしまう気がいたします」
2011 = "「一味地提醒自己保持常態，只會讓自己的行為變得做作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\nまさしく、言われてみればそのとおりだ」
2317 = "「噢……原來是這樣。聽你這麼說我就明白了」" 

# monologue
# JP: 目からうろこがぼろりと落ちる。
2930 = "八六的一番話讓我茅塞頓開。" 

# 【双鉄】
