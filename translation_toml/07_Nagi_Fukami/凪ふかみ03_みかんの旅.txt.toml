2739 = "「Cô bé đó, ở võ đường đã luyện tập đấu tập\nvới rất nhiều đối thủ——thậm chí là cả\nngười lớn.」"

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2271 = "「啊」" 

