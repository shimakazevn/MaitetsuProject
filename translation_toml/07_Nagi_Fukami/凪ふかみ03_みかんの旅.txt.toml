# monologue
# JP: (がくんっ）
3312 = "（吭呲）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2525 = "「是嗎」" 

# monologue
# JP: 安全確認の一言を受け、列車はスムーズに走り出す。\nほんのわずかな衝動だけで
3251 = "聽到奧莉薇匯報安全狀況以後，列車開始緩緩前行，此時我只察覺到了輕微的縱向衝動。" 

# monologue
# JP: あの急制動で、客車二両を引いていてこの手際とは――\n機関士の腕は、僕より遥かに上だろう。
3040 = "在那樣的急剎車之後，居然能讓拖了兩節客運車廂的列車如此平穩——這位司機的技術肯定遠在我之上。" 

# 【ふかみ】
# display as 深美
# JP: 「あの……なにが」
2470 = "「我說……到底怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん\nオリヴィの言っているとおり、敷地内無断立ち入りだ」
2326 = "「噢，抱歉。就跟奧莉薇說的一樣，是有人擅自闖入了線路」" 

# 【ふかみ】
# display as 深美
# JP: 「無断、立ち入り？」
2490 = "「擅自闖入線路？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「山側の[のりめん,1]法面に、カメラを持った男が進入していた\n恐らく、海と列車を一枚に収めたかったのだろうな」
2417 = "「山坡上闖進來一個帶著相機的男人，估計是想把大海與列車同時納入鏡頭吧」" 

# 【ふかみ】
# display as 深美
# JP: 「列車、近かったんですか？」
2073 = "「他離列車很近嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、かなり距離はあったが――後続列車のことや、\n線路妨害の防止などについても考えなければならん」
2045 = "「不，還挺遠的……但是考慮到後面的列車，以及線路安全的防患未然，必須停車阻止」" 

# monologue
# JP: ふかみの不安を解いてやらねば――\nそうと思えば、説明の言葉は細かくゆるいものになる。
3128 = "我得解除深美的擔憂——想到這裡，我解釋時的語氣都變得柔和了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、例え安全に思える距離があっても、敷地内無断\n立ち入りには、原則として赤を切る。止めて、排除だ」
2332 = "「因此，即使對方處於相對安全的距離，只要他闖入了線路以內，原則上都作拉紅閥處理。需要停車並解決問題」" 

# 【ふかみ】
# display as 深美
# JP: 「赤を、切る？　です？」
2487 = "「拉紅閥？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――赤を切るとは、車掌や駅員が、\nその職権によって列車を非常停止させることだ」
2247 = "「哦，拉紅閥就是列車長和站務員使用自己的權限讓列車緊急停車」" 

# 【ふかみ】
# display as 深美
# JP: 「車掌さんとか駅員さんって、\nそんなことできるんですか！？」
2147 = "「列車長和站務員還有這種權限？！」" 

# monologue
# JP: ふかみがその目を丸くする。
3218 = "深美瞪圓了眼。" 

# monologue
# JP: だからゆっくり、できるだけわかりよいようにと、\n言葉を選ぶ。
3161 = "於是我放慢了語調，尋找更簡明易懂的解釋方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「当然、できる。特に8620やC56のようなテンダー式\n蒸気機関車においては、後方視界など無いも同然だから」
2611 = "「當然可以。特別是８６２０還有Ｃ５６這樣的煤水車蒸汽機車，駕駛員根本看不見後方發生了什麼」" 

# 【凪】
# display as 凪
# JP: 「運転士には見えん危険を見つけるの、\n車掌さんや駅員さんの、大事な大事なお仕事ばい！！」
2615 = "「發現駕駛員看不見的危險，乃是列車長和站務員最重要的工作！」" 

# 【ふかみ】
# display as 深美
# JP: 「あー」
# 2271 = "「啊」" 

# monologue
# JP: 凪のフォローに、ふかみは頷く。
3249 = "聽凪這麼說明，深美點了點頭。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……そうですよね。\n危険を見つけたら――列車を止めないと、危ない」
2264 = "「啊……也對，如果發現了情況，不把列車停下來那就太危險了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、今回の場合も、オリヴィは\n車掌として列車を非常停止させた」
2033 = "「不錯。所以這次奧莉薇動用了列車長權限，讓列車緊急停車了」" 

# monologue
# JP: 列車が止まると想像もしていなかったのか、\nカメラの男は、ものすごい勢いで逃げ出していった。
3296 = "那個攝影師似乎沒想到列車會停下，飛也似地逃了。" 

# monologue
# JP: あれで少しは、こりてくれるといいのだが――
3095 = "希望那人能學到些教訓……" 

# 【凪】
# display as 凪
# JP: 「無断立ち入りしたヤツはどぎゃんしたと？\n逃げられたとばい？」
2627 = "「私闖線路的人呢？給他逃了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗務員的にはそれでいいのさ。報告をいれたら、\nあとは会社――今回の場合はみかん鉄道さんの判断だ」
2393 = "「對乘務員來說這樣就行了。接到匯報之後，公司……以這次舉例就是橙鐵路，會作出自己的判斷」" 

# 【ふかみ】
# display as 深美
# JP: 「判断って」
2153 = "「判斷？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「警察に通報して、近くの見回りをしてもらうなどかな。\nまぁ、[おおごと,1]大事にはならんだろうが」
2576 = "「比如報警然後請警察巡視四周。不過，一般事情不會鬧得太大」" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁあ」
2203 = "「呼」" 

# monologue
# JP: ふかみが、安堵の息を吐く。\nそうして僕を、どこかうっとりした目で見上げる。
3209 = "深美放心地舒了口氣。接著，她帶著崇拜的眼神抬起了頭。" 

# 【ふかみ】
# display as 深美
# JP: 「……すごい、です。双鉄おにいさんもオリヴィちゃんも。\nそんなの見えたの――だって、みんなで海見てたのに」
1614 = "「……真厲害，嗯。雙鐵哥哥也是，奧莉薇也是。大家都在看海，你們卻能發現隱藏的危險」" 

# 【双鉄】
# display as 雙鐵
# JP: 「職業柄――としかいいようがないな。車窓の景色よりも、\n違和感の方にどうしても注意が向いてしまうようだ」
2721 = "「這些——也只能解釋成職業病了。相比窗外的風景，我們更容易注意到不對勁的地方」" 

# 【凪】
# display as 凪
# JP: 「むー、背の高かとは、そういうとこでも有利たいねー」
2258 = "「唔，長得高在這方面也有好處啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「否定はせんが、背の高さだけのことでもなかろう。\n実際、あれほど小さなオリヴィも――」
2445 = "「我不否認，但這並不完全取決於身高。畢竟那麼矮小的奧莉薇也發現了……」" 

# monologue
# JP: 他の乗客への説明なども済んだのだろう。
3053 = "奧莉薇似乎已經跟其他乘客解釋了情況。" 

# monologue
# JP: オリヴィはひらひらちいさな手を振って、前方客車へ、\n連結部のドアをくぐって消えていく。
3067 = "她揮了揮小手，然後就穿過連結部的車門，跑進了前面一列。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――不慣れとはいっていたが、やはり根本の意識が違う。\n僕らと話している最中も、注意を怠らずにいたのだな」
1620 = "「……雖然她說自己不熟悉列車長的工作，但意識和你們還是有本質上的不同。即使在跟我們聊天，她也完全沒有懈怠」" 

# 【ふかみ】
# display as 深美
# JP: 「すごい……です、ね。\n鉄道にかかわる人――も、レイルロオドも、ですけど」
2172 = "「厲害……嗯。和鐵路有關的人……還有鐵路人偶也是，都很厲害」" 

# 【凪】
# display as 凪
# JP: 「ううう～凪さま！　こっちでもまだまだ未熟ばい！」
2303 = "「嗚……本小姐在這方面竟然也這麼不成熟！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。今日は客だ。逆からみれば、楽しむことに\n100％集中しきれなかった、僕の方こそが未熟だ」
2036 = "「不，今天我們是客人。換個角度來看，我沒有集中精神在玩樂上，反倒是一種不成熟」" 

# 【凪】
# display as 凪
# JP: 「む！？　そぎゃんいわれればそのとーりばい！\n今日は、修学旅行やけんね！！」
2261 = "「唔？！這麼一說還真是！今天可是修學旅行咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2513 = "「是啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　ですね、うん。\nトラブルの分も楽しまないと！」
2279 = "「啊！沒錯，嗯。發生了意外也要享受意外！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、そうだった」
2287 = "「啊，對了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
2313 = "「嗯？！」" 

# monologue
# JP: オリヴィがひょっこり、連結部から顔をだし――
3056 = "奧莉薇從車廂的連結部露出個腦袋……" 

# 【凪】
# display as 凪
# JP: 「む！」
2257 = "「唔！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2307 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「わわっ？！」
# 2227 = "「哇？！」" 

# monologue
# JP: 敬礼だ。\n僕も凪も答礼し、ふかみもあわてて僕らを真似る。
3054 = "奧莉薇向我們敬了個禮。我和凪也回了個禮，深美則慌慌張張地模仿了我們的動作。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっきは手伝ってくれてありがとう！\nヤツシロについても、また乗ってね！　楽しい旅を！！」
2685 = "「謝謝你剛才的幫助！到了八代之後也要再坐我們的車啊！祝你們旅途愉快！」" 
