3011 = "Nhưng, hãy diễn đạt nó bằng lời đàng\nhoàng.\nĐể tạo ra một sự dứt khoát cho Nagi, cho\nFukami, cho tôi——cho tất cả chúng tôi."

# 【双鉄】
# display as 雙鐵
