2479 = "「Vì vậy, cô bé đó mới có thể đối phó với\ntốc độ và khí thế của Nagi,\nvà không bị bối rối trước thể hình của\nNagi.」"

# 【凪】
# display as 凪
# JP: 「ウチ……は、お師匠さんと、にーさんとしか、\nちゃんとした稽古、したことなかけん」
2205 = "「Em... chỉ mới luyện tập đàng hoàng\nvới sư phụ và anh hai thôi á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nその辺も全て含めての、“経験値”だ」
2523 = "「Đúng vậy.\nBao gồm tất cả những điều đó, gọi là \"điểm\nkinh nghiệm\".」"

# 【凪】
# display as 凪
# JP: 「……経験が、足りんかったとね。\nそいで十分と、思い込んでしまっとったけん」
1608 = "「...Là do thiếu kinh nghiệm á.\nVậy mà em cứ đinh ninh là như vậy đã đủ\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ライオンを相手に戦える虎でも、\n準備なしに毒蛇に這い寄られては、まず勝てなかろう」
2163 = "「Ngay cả một con hổ có thể chiến đấu với\nsư tử,\nnếu bị rắn độc bò lại gần mà không chuẩn\nbị trước, thì cũng khó lòng chiến thắng.」"

# 【凪】
# display as 凪
# JP: 「あ――」
# 2262 = "「啊……」" 

# monologue
# JP: その説明が腑に落ちたのか、\n凪は、ゆっくり、ゆっくり頷く。
3141 = "Có vẻ lời giải thích đó đã thấm thía,\nNagi, từ từ, từ từ gật đầu."

# 【凪】
# display as 凪
# JP: 「うん」
# 2307 = "「嗯」" 

# monologue
# JP: そして再び、僕を見る。\n目に貼り付いてた、切羽詰まったような曇りが落ちている。
3155 = "Rồi lại một lần nữa, nhìn tôi.\nSự u ám như bị dồn vào chân tường bám trên\nđôi mắt con bé đã tan biến."

# monologue
# JP: ああ――凪は、\n自分の負けを、ようやく受け入れられたのだ。
3043 = "A——Nagi,\ncuối cùng cũng đã chấp nhận thất bại của\nbản thân."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、次に勝つための準備には、\n幾つかのやり方を思いつけるな」
2480 = "「Do đó, để chuẩn bị cho chiến thắng tiếp\ntheo,\nchúng ta có thể nghĩ ra một vài cách.」"

# 【凪】
# display as 凪
# JP: 「どぎゃんやり方と！！？」
2066 = "「Cách gì á!!?」"

# monologue
# JP: 勢いこんで凪が尋ねる。\nふかみがくすりと微笑みをこぼす。
2992 = "Nagi háo hức hỏi.\nFukami khẽ mỉm cười."

# monologue
# JP: ならば僕もいつもどおりに、\nただ淡々と事実を告げよう。
3298 = "Nếu vậy, tôi cũng sẽ như mọi khi,\nchỉ điềm đạm nói ra sự thật."

# 【双鉄】
# display as 雙鐵
# JP: 「まずひとつ目はごく単純。\n剣道の練習時間を増やす――という方法だ」
2635 = "「Cách đầu tiên rất đơn giản.\nĐó là tăng thời gian luyện tập Kendo.」"

# 【凪】
# display as 凪
# JP: 「んん――」
2255 = "「Ưm——」"

# 【ふかみ】
# display as 深美
# JP: 「けど、それって、凪ちゃんの負担が」
2190 = "「Nhưng mà, như vậy thì, gánh nặng cho\nNagi-chan sẽ...」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2513 = "「是啊」" 

# monologue
# JP: 凪とふかみの困った顔に、僕も頷き、同意する。
3261 = "Thấy vẻ mặt bối rối của Nagi và Fukami,\ntôi cũng gật đầu đồng tình."

# 【双鉄】
# display as 雙鐵
# JP: 「凪の持ち時間が足りなくなる。そうするためには、\nどこか、何かを削る必要が出て来るだろうな」
2744 = "「Thời gian của Nagi sẽ không đủ. Để làm\nđược điều đó,\nchắc chắn sẽ cần phải cắt giảm thời gian\ntừ đâu đó, cho việc gì đó.」"

# 【凪】
# display as 凪
# JP: 「んんんんん～」
# 2255 = "「唔……」" 

# monologue
# JP: 凪の眉根がぎゅっと寄る。\nが、今はそれには構わない。
2988 = "Đôi lông mày của Nagi nhíu chặt lại.\nNhưng, bây giờ tôi không bận tâm đến điều\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「二つ目の方法も、極めて明快。\n『単純に時間の経過を待つ』というもの」
2639 = "「Cách thứ hai cũng cực kỳ rõ ràng.\nĐó là 『Đơn giản chờ đợi thời gian trôi\nqua』.」"

# 【凪】
# display as 凪
# JP: 「時間の経過？」
2555 = "「Thời gian trôi qua?」"

# 【ふかみ】
# display as 深美
# JP: 「経過すると……えと？\nあ！　相手の子の身長が伸びる、とか？」
2589 = "「Trôi qua thì... ừm?\nA! Chiều cao của cô bé đối thủ sẽ tăng\nlên, chẳng hạn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「も、あるかもしれんが、より確実だ。\n等部が変われば、剣道の試合のルールが変わる」
2719 = "「Cũng có thể là vậy, nhưng có một điều\nchắc chắn hơn.\nKhi lên cấp học, luật thi đấu Kendo sẽ\nthay đổi.」"

# 【凪】
# display as 凪
# JP: 「ああ！」
# 2273 = "「啊！」" 

# 【ふかみ】
# display as 深美
# JP: 「ああ！」
# 2273 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「突きが解禁になり、右半開の構えを使えるようになれば、\n凪は格段に剣術に近い剣を奮って、剣道の大会で戦える」
2120 = "「Khi đòn đâm được cho phép, và có thể sử\ndụng tư thế mở nửa người sang phải,\nNagi sẽ có thể chiến đấu trong giải Kendo\nbằng những đường kiếm sát với kiếm thuật\nhơn hẳn.」"

# 【凪】
# display as 凪
# JP: 「今の修行ば続けるままで、勝てるかもしれんのなら、\nそっちの方がよさそーばい！」
2382 = "「Nếu cứ tiếp tục tu hành như hiện tại mà\nvẫn có thể chiến thắng,\nthì cách đó có vẻ tốt hơn á!」"

# 【ふかみ】
# display as 深美
# JP: 「それなら、無理も少なそうだし」
2723 = "「Nếu vậy thì, có vẻ cũng bớt phải cố sức\nhơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そちらの方が好みであれば、\nもう一つ選択肢が出てくるな」
2378 = "「Nếu em thích cách đó hơn,\nthì sẽ có thêm một lựa chọn nữa đấy.」"

# monologue
# JP: 今すぐの、目先の勝利に、\n凪はこだわってはいないようだ。
2970 = "Có vẻ như Nagi\nkhông quá cố chấp vào chiến thắng trước\nmắt ngay lúc này."

# monologue
# JP: それを嬉しいことと感じて、僕の言葉も滑らかになる。
3129 = "Cảm thấy vui vì điều đó, lời nói của tôi\ncũng trở nên trôi chảy hơn."

# 【凪】
# display as 凪
# JP: 「どぎゃん選択肢ばい！！？」
2067 = "「Lựa chọn gì á!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「『剣道の大会で』ではなく。\n別の分野で、凪にしかつかめぬ勝利を得る道だ」
2489 = "「Không phải là 『Trong giải Kendo』.\nMà là con đường giành lấy chiến thắng chỉ\nthuộc về riêng Nagi, ở một lĩnh vực khác.」"

# 【ふかみ】
# display as 深美
# JP: 「別の、分野で……」
2174 = "「Ở một lĩnh vực, khác...」"

# 【凪】
# display as 凪
