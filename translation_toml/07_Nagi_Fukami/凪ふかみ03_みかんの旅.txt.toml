2451 = "「我也覺得這樣更好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。具体的にはどうすればいい？\n凪を、ふかみを立ち直させるためには」
2123 = "「八六，你覺得具體應該怎麼辦？怎樣才能讓她們振作起來？」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――」
2717 = "「這……」" 

# monologue
# JP: ハチロクの顔から余裕が消える。\n沈思黙考――――
2933 = "八六的臉上頓時沒了剛才的從容，她陷入了沉思。" 

# monologue
# JP: ややあって、困ったような声が零れる。
3224 = "片刻之後，她才遲疑地開了口。" 

# 【ハチロク】
# display as 八六
# JP: 「一介のレイルロオドにすぎないわたくしには、\nいささか、難しすぎる問題であるようでございます」
2448 = "「我不過是區區鐵路人偶，這樣的問題對我來說太過困難了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクでもか」
2080 = "「你也想不出辦法啊」" 

# 【ハチロク】
# display as 八六
# JP: 「ご信頼は嬉しいのですが、わたくしは[しょせん,1]所詮レイルロオド。\n人間のこころの[きび,1]機微までは、とても扱えませぬ」
2440 = "「感謝您的信任，但我到底只是一個鐵路人偶。要我去把握微妙的人心，實在有些強人所難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はそうとは思わんが……\nとなれば、日々姫に尋ねたほうが」
2457 = "「我倒不覺得你不懂人心……那我還是去問日日姬好了」" 

# 【日々姫】
# display as 日日姬
# JP: 「はいはーい！　呼んだと？　呼ばれたとーっ！？」
2109 = "「來了來了！你叫我？叫我了吧？！」" 

# monologue
# JP: （スパーーーーーン！）
3315 = "（啪！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
2227 = "「哇？！」" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫」
2495 = "「日日姬」" 

# monologue
# JP: ものすごいタイミングでふすまが開き――いや――
3175 = "日日姬恰是時候地拉開了門……不對……" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞いていたのか」
2108 = "「你都聽見了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「立ち聞きするつもりはなかったばってん、\nなんか、入っていけるような雰囲気じゃなかったけん」
2467 = "「我沒偷聽的意思嘞，只是覺得不方便插嘴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、日々姫にまで気をつかわせてしまったか」
2486 = "「抱歉，還害你擔心了」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなんぜーんぜん。家族でしょーよ」
2579 = "「沒事沒事，一家人整這些沒用的幹什麼」" 

# monologue
# JP: ぱたぱた、日々姫が動き回る。\nどら焼きを出し、麦茶を淹れてきてくれる。
3172 = "日日姬在屋內忙活著，端來了銅鑼燒，泡好了麥茶。" 

# 【日々姫】
# display as 日日姬
# JP: 「はい。難しか話の前に、甘い物。\n悩んじゃうのは、脳に糖分、きっと足りとらんのよ」
2647 = "「給。在聊麻煩事情之前，先吃些甜點。煩惱肯定是因為大腦缺糖」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2474 = "「或許吧」" 

# monologue
# JP: ……餡の甘さに、麦茶の冷たさ。\n直線的な幸福感は、確かに頭を軽くする。
1561 = "……嚼著甜的，喝著涼的。一股猛烈的幸福感讓大腦感到一陣輕鬆。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。凪とふかみを立ち直らせるのは――」
2364 = "「好了，進入正題。要想讓凪和深美振作起來……」" 

# 【日々姫】
# display as 日日姬
# JP: 「一番に立ち直らんといけんのは、にぃによ」
2559 = "「最應該振作的是你呀，阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2069 = "「什麼？！」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにがあれこれ悩んどるけん、\n凪ちゃんもふかみちゃんも、不安がって困っとるの」
2102 = "「你成天煩惱這些，小凪和小深肯定也會擔心啊」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
2271 = "「啊」" 

# monologue
# JP: ……改めて尋ねるまでもない。\n日々姫の断言。ハチロクの反応。
1564 = "……我甚至沒必要問她是什麼意思了。日日姬說得那麼乾脆，八六也一副恍然大悟的模樣。" 

# monologue
# JP: それは何より――\n僕自身が抱いている感覚よりも、よほど確かとわかるから。
3190 = "最重要的是……我自己也覺得她說的更有道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――僕自身が、\nまず普段と違ってしまっているのか」
2166 = "「原來……首先我自己就跟平時不一樣啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「違ごーとる違ごーとる。\n普段のにぃになら……んとね、こぎゃんよ？」
2018 = "「不一樣不一樣。平時的阿哥……怎麼說呢……是這樣的」" 

# monologue
# JP: 日々姫が立つ。\nどこか偉そうに背をそらす。
3180 = "日日姬站起身來，傲氣地挺了挺背。" 

# 【日々姫】
# display as 日日姬
# JP: 「『凪。ふかみ。なにをくよくよしている。\nそうすることで、少しでも事態は前進するのか？』」
1582 = "「“凪，深美，你們愁什麼愁呢，發愁能改善現狀嗎？”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2273 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「『前進せぬなら、過ぎたことを思い悩むより動くのだ。\n止まるのは、新しい壁にぶつかってからで充分だろう』」
1585 = "「“既然不能，那就別惦記著過去了，先行動起來。哪天又碰壁了再煩惱吧”」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、日々姫」
2238 = "「哎呀，日日姬」" 

# monologue
# JP: ハチロクの声は、うっとりしている。
3248 = "聽八六這聲音，她一定是聽得入迷了。" 

# 【ハチロク】
# display as 八六
# JP: 「声は少しも似ておりませぬが、\nお話の中身はそっくりです。まさしく双鉄様のよう」
2655 = "「聲音雖然一點也不像，但這講話風格真的就跟雙鐵少爺一模一樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「『あら、お話の中身だけですか？\nわたくし、声まねにもいささか自信があったのですが』」
1583 = "「“哎呀，只有風格像嗎？在模仿別人的聲音這方面，我還挺有自信的”」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　今度はわたくしですね？\n声はともかく、口調はなかなか、いい雰囲気です」
2225 = "「哇！這次換成模仿我了吧？且不說音色，這個口氣倒是很像」" 

# 【日々姫】
# display as 日日姬
# JP: 「えー、そぎゃんと？\n声もそっくりだと思うんだけどなぁ」
2240 = "「哎，是嗎？我還以為音色也很接近嘞」" 

# monologue
# JP: 頬をわざとらしくふくらせて――
3177 = "日日姬故意把臉頰鼓了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にーに、どぎゃーんと？」
2751 = "「阿哥，你覺得我說得對不對？？」" 

# monologue
# JP: ――そして日々姫は笑ってくれる。\n明るく、軽く。冗談めかして。
1570 = "……日日姬露出了輕鬆開朗的笑容。就像跟我開了個玩笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、日々姫の指摘のとおりだ」
1598 = "「……你說得很對」" 

# monologue
# JP: 僕は、確かに思い悩んで――後悔していた。\n『どうすれば、凪を勝たせてやれたのか』。
3143 = "我確實很煩惱，也很後悔。後悔自己沒能找到辦法讓凪取勝。" 

# monologue
# JP: その後悔が、凪への対応を変化させ……\n変化が連鎖し、今の状況を作ったのだろう。
3287 = "這份後悔改變了我對凪的態度……而正因為我態度的改變，現在才會變成這般境地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず前を向き、動き出すべきは僕だった。\n最年長者であるというのに――自分自身が情けない」
2558 = "「最應當積極採取行動的是我。我明明是最年長的……真是太丟人了」" 

# 【日々姫】
# display as 日日姬
# JP: 「なさけなくなかとよー、ちょっとも。\nだってにぃに、修学旅行中でしょお？」
2562 = "「有什麼好丟人的啊。阿哥你不正在修學旅行嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2273 = "「啊！」" 

# monologue
# JP: そうだ、確かに。\n少年期に、余りに多くを学び損ねてしまった僕のため――
3087 = "對啊，沒錯。我在少年時錯過了太多學習的機會……" 

# monologue
# JP: 凪とふかみと、三人で。\n僕らは今日も、修学旅行を続けているのだ。
3038 = "因此凪、深美與我三個人今天也在進行著修學旅行。" 

# 【日々姫】
# display as 日日姬
# JP: 「誰かのためにくよくよ思い悩むなんて……\n修学旅行前の、今までのにぃににだったら、しとった？」
2384 = "「如果放在修學旅行之前……你會像現在這樣為了別人的事情煩惱嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――しなかったな。\n誰かの悩みは、結局は、僕の物ではないのだから」
2016 = "「不……不會的。別人的煩惱，歸根結底都與我無關」" 

# monologue
# JP: 言って、自分で気づかされる。\n凪の悩み、ふかみの悩みも、当然、僕のものではない。
3275 = "說到這裡，我這才發現，不論是凪的煩惱，還是深美的煩惱，它們都不屬於我。" 

# monologue
# JP: 僕にコントロールできるのは、ただ僕の悩み――\n自分自身のこころのことに、他ならない。
3145 = "我能控制的，只有我自己的煩惱——我自己的內心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……参ったな。修学旅行を重ねたはいいが、\nそのために結論を見誤るようになってしまった」
1616 = "「……真是頭痛。這麼長一段時間的修學旅行，反倒讓我得出了錯誤的結論」" 

# 【日々姫】
# display as 日日姬
# JP: 「見誤っとるんじゃなかとよ？　きっと」
2103 = "「你絕對沒有得出錯誤的結論」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2532 = "「是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「誰かのこころを想像する――\n誰かを思いやることも、きっと、大事な学びやけん」
2388 = "「學會設身處地為他人著想，也是一門重要的課程」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それも、学びか」
2394 = "「對啊，這也是一種學習」" 

# monologue
# JP: 頷けば、日々姫はニコっと明るく笑う。
3148 = "我點點頭，日日姬則欣慰地笑了。" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ、学び！　そぎゃんと学べば、次からきっと、\n誰かがくよくよしている理由、想像できるでしょお？」
2310 = "「嗯，沒錯！只要好好學習，下次你肯定就能想明白別人為什麼會煩惱嘍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2566 = "「有道理」" 

# monologue
# JP: 以前の僕なら、誰かが後悔に止まっていても、\n『何故動かん』としか思わなかった。
3156 = "換成以前的我，如果看見別人因為悔恨而止步不前，肯定只會奇怪那人有什麼好猶豫的。" 

# monologue
# JP: そこを無理矢理動かそうとしてしまうなら、\n余計に大きな傷を相手に、与えてしまったことだろう。
3247 = "而這種時候如果我選擇了去強迫那人前進，恐怕還會給對方造成更大的傷害。" 

# 【双鉄】
# display as 雙鐵
# JP: 「失敗もまた学びであり、学びは活かしていくもの、か。\n――凄いな、日々姫は」
2351 = "「失敗也是一堂課，上過課就要學以致用嗎。你真厲害，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「凄かとでしょー！\nぜぇんぶ、にぃにとねぇねが教えてくれたことやけん！」
2173 = "「厲害吧！全都是阿哥阿姐教得好咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。そうだな」
2724 = "「這樣嗎……是啊」" 

# monologue
# JP: 嬉しい。とてもありがたい。
3232 = "真是一件幸事。" 

# monologue
# JP: 日々姫が、日々姫でいてくれて。\n僕の妹でいてくれて。
3183 = "日日姬能秉持自己的本性，而我還能擁有她這樣的妹妹。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、しあわせな男だな。\n最高の妹を、ふたりも持てるとは」
2462 = "「我可真是幸福啊，竟然有兩個最棒的妹妹」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
# 2273 = "「啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「その上、最高のレイルロオドもお持ちでは？」
2653 = "「而且還有一個最棒的鐵路人偶吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだ。更には最高の姉に、最高の社長兼市長に、最高の仕事仲間に、最高のライバルに――」
2582 = "「沒錯。而且還有最棒的姐姐，最棒的社長兼市長，最棒的工作伙伴，最棒的競爭對手……」" 

# monologue
# JP: そこまで言って、止まってしまう。
3276 = "說到這裡，我閉上了嘴。" 

# monologue
# JP: 凪とふかみは――あのかけがえのない二人のことを、\n僕はいったい、どんな言葉で示せばいいのか……
2976 = "凪和深美……我究竟應該用什麼詞，去形容無可替代的她們呢……" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？\nそいば見つけるための、修学旅行じゃなかと？」
2750 = "「阿哥，你不就是為了尋找這個答案才開始修學旅行的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2055 = "「也對」" 

# monologue
# JP: ハチロクが支えてくれる。日々姫が悩みを解いてくれる。\n――そうできるほど、僕をしっかり見ていてくれる。
3193 = "有八六支持我，有日日姬幫我解決煩惱。她們都如此關照著我。" 

# monologue
# JP: ならば、何を不安がることもない。
3299 = "那麼，我還有什麼好害怕的呢？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。行ってくる」
2684 = "「謝謝你們，我現在要出去一趟」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\nお気をつけていってらっしゃい、双鉄さま」
2371 = "「好的。路上小心，雙鐵少爺」" 

# 【日々姫】
# display as 日日姬
# JP: 「いくって、どこに？」
2177 = "「去哪裡啊？」" 

# monologue
# JP: わかっていて、日々姫が尋ねる。\nだから僕も、決まりきっている答えを返す。
3178 = "日日姬明知故問。那我當然要給她一個擲地有聲的回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の、続きにだ」
2648 = "「繼續我的修學旅行」" 

# 【凪】
# display as 凪
# JP: 「……」
1588 = "「……」" 

# 【ふかみ】
# display as 深美
# JP: 「えと……あ、凪ちゃん、川！　おっきい」
2196 = "「呃……啊，小凪，有河耶！好寬」" 

# 【凪】
# display as 凪
# JP: 「え？　わ！　ほんと、おっきかとねぇ」
2292 = "「啊？哇！還真的好寬咧」" 

# 【ふかみ】
# display as 深美
# JP: 「ねー、クマ川みたい、ね？」
2519 = "「是啊，就像隈河一樣，對吧？」" 

# 【凪】
# display as 凪
# JP: 「え？　うん。ほんと、クマ川みたいとねぇ」
2294 = "「啊？嗯，是啊，就像隈河一樣」" 

# 【ふかみ】
# display as 深美
# JP: 「だよ、ねー。あは……は……」
2512 = "「是啊。哈哈……哈哈……」" 

# 【凪】
# display as 凪
# JP: 「……」
# 1588 = "「……」" 

# monologue
# JP: ……空気が、まったく落ち着かない。\n言葉が残らず上滑りして、ただそらぞらしく流れてしまう。
1552 = "……三人之間飄蕩著拘謹的氣氛。尷尬的交流僅僅浮於表面，轉眼間又陷入了沉默。" 

# 【ふかみ】
# display as 深美
# JP: 「あ、トンネル！」
2288 = "「啊，有隧道！」" 

# monologue
# JP: それでも、ふかみはくじけない。
2907 = "但是，深美並沒有放棄。" 

# 【ふかみ】
# display as 深美
# JP: 「珍しいよね！　御一夜鉄道、トンネルないし。\nね！　凪ちゃん」
2620 = "「真少見！御一夜鐵路沒有隧道的。是吧，小凪」" 

# 【凪】
# display as 凪
# JP: 「……あ！？　ごめん、いま、なんて？」
1604 = "「……啊？！對不起，你剛說什麼了？」" 

# 【ふかみ】
# display as 深美
# JP: 「え！？　あ、ううん、なんでもない。\nつまらないことだし……あははっ」
2197 = "「呃？！不，沒什麼。一點小事而已……哈哈哈」" 

# 【凪】
# display as 凪
# JP: 「あぅ……なんか、ごめん」
2270 = "「啊……真是對不起」" 

# 【ふかみ】
# display as 深美
# JP: 「なんにもなんにも！\nわたしが、凪ちゃんの邪魔しちゃったんだし」
2578 = "「沒事沒事！都怪我打擾到你了」" 

# monologue
# JP: ……凪は、思いに囚われて。\nふかみはそこから、凪を剥がそうとして、果たし得ぬ。
1556 = "……凪依然沒有擺脫愁思。深美想幫她掙脫枷鎖，但是沒有成功。" 

# monologue
