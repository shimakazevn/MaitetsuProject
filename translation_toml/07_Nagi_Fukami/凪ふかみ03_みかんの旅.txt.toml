[script]
# lines: 509 
# 【双鉄】
# display as 雙鐵
# JP: 「……むぅ」
1602 = "「...Hừm.」"

# monologue
# JP: 考えても考えても、わからない。\nどころか考えれば考えるほど、思考が濁る気さえする。
2897 = "Dù có nghĩ đi nghĩ lại, tôi vẫn không hiểu\nđược.\nThậm chí càng nghĩ, tâm trí tôi càng trở\nnên vẩn đục."

# 【双鉄】
# display as 雙鐵
# JP: 「凪が落ち込むのは無理からぬところではあろうが――」
2145 = "「Việc Nagi suy sụp cũng là điều không thể\ntránh khỏi, nhưng mà——」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2547 = "「Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2295 = "「!?」"

# monologue
# JP: ハチロクだ。\n僕の隣に座っている。
3185 = "Là Hachiroku.\nCô ấy đang ngồi cạnh tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「いつの間に……」
2082 = "「Từ lúc nào...」"

# 【ハチロク】
# display as 八六
# JP: 「つい今ですよ？　居間に参りましたら、\n双鉄様が難しい顔をされておりましたので」
2157 = "「Vừa mới nãy thôi ạ. Khi bước vào phòng\nkhách,\ntôi thấy ngài Soutetsu đang nhăn nhó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「全く気づかなかった」
2463 = "「Tôi hoàn toàn không nhận ra.」"

# monologue
# JP: とはいえ、それも当然か。\n僕は考えにふけっていたし――
3286 = "Tuy nhiên, điều đó cũng là đương nhiên.\nTôi đang chìm đắm trong suy nghĩ mà——"

# monologue
# JP: ハチロクと真闇姉は普段から、ふすまの開け閉めを上品に、\n一切の音を立てずに行うゆえに。
2936 = "Hachiroku và chị Mayami vốn dĩ luôn mở\nđóng cửa kéo rất tao nhã,\nkhông hề phát ra một tiếng động nào."

# 【ハチロク】
# display as 八六
# JP: 「お考えごとの、お邪魔をしてしまいましたか？」
2483 = "「Tôi đã làm phiền dòng suy nghĩ của ngài\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――むしろ助かる。\n僕ひとりでは、行き詰まりそうになっていたところだ」
2581 = "「Không——ngược lại cô đã giúp tôi đấy.\nNếu chỉ có một mình, tôi e là sẽ bế tắc\nmất.」"

# monologue
# JP: そうと言葉にするだけで、いささか心が軽くなる。
2922 = "Chỉ cần nói ra thành lời như vậy, lòng tôi\ncũng nhẹ nhõm hơn đôi chút."

# monologue
# JP: おおまかないきさつは、すでに聞かせていることだし、\nハチロクならば、まさにぴったりの相談相手だ。
2928 = "Tôi đã kể cho cô ấy nghe sơ qua sự việc\nrồi,\nnên Hachiroku chính là người hoàn hảo nhất\nđể cùng bàn bạc."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみまでが、元気をなくしてしまったのだ。\nあの試合から、もう一週間も経つというのに」
2727 = "「Ngay cả Fukami cũng mất đi vẻ hoạt bát.\nDù đã một tuần trôi qua kể từ trận đấu đó\nrồi.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですか？　駅などでお見かけするときは、\n普段と変わらないようにも感じますが――」
2531 = "「Vậy sao ạ? Khi tình cờ gặp ở nhà ga,\ntôi thấy em ấy vẫn không có gì khác so với\nbình thường mà——」"

# 【双鉄】
# display as 雙鐵
# JP: 「見かけだけなら、凪もだろう」
2181 = "「Nếu chỉ nhìn bề ngoài thì Nagi cũng vậy\nthôi.」"

# 【ハチロク】
# display as 八六
# JP: 「凪は……空元気を出しておりますね。\nおそらく、わたくしたちに気をつかわせぬよう」
2144 = "「Nagi... đang cố tỏ ra vui vẻ nhỉ.\nCó lẽ là để chúng ta không phải lo lắng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「感じていたか。さすがだな」
2099 = "「Cô cũng cảm nhận được sao. Giỏi thật\nđấy.」"

# monologue
# JP: 言えば、ハチロクは暖かな微笑を浮かべる。
3254 = "Nghe vậy, Hachiroku nở một nụ cười ấm áp."

# 【ハチロク】
# display as 八六
# JP: 「それはもう。\n手塩にかけて育てた機関助士のことでございますので」
2614 = "「Tất nhiên rồi ạ.\nBởi vì em ấy là người phụ lái mà tôi đã tự\ntay đào tạo mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2513 = "「Cũng phải.」"

# monologue
# JP: ハチロクは、凪をしっかり見て知っている。\n反面、ふかみとはそれほどに濃い接触を持ってない。
2927 = "Hachiroku luôn dõi theo và hiểu rõ Nagi.\nNgược lại, cô ấy không có nhiều tiếp xúc\nsâu sắc với Fukami."

# monologue
# JP: そこに気づけば、\nハチロクの目線をどこに向ければよいかが理解る。
3163 = "Nhận ra điều đó,\ntôi đã hiểu nên hướng sự chú ý của\nHachiroku vào đâu."

# 【双鉄】
# display as 雙鐵
# JP: 「であれば、どうだ？\n凪とふかみの接し方が変化していることには――」
2737 = "「Nếu vậy thì sao?\nViệc cách đối xử giữa Nagi và Fukami đang\nthay đổi——」"

# 【ハチロク】
# display as 八六
# JP: 「ああ！\n言われてみれば、まことに左様でございますね」
2281 = "「A!\nNgài nói tôi mới để ý, đúng là vậy thật\nạ.」"

# monologue
# JP: ハチロクの目が丸くなり、\nすぐに、物思わしげに伏せられる。
2935 = "Đôi mắt Hachiroku mở to,\nrồi ngay lập tức cụp xuống vẻ trầm ngâm."

# 【ハチロク】
# display as 八六
# JP: 「……乗務の後の凪のことを、ふかみ様が待っている。\nそんないつもの光景を、確かに数日見かけないような」
1612 = "「...Cảnh Fukami chờ Nagi sau khi kết thúc\nca trực.\nQuả thực mấy ngày nay tôi không còn thấy\ncảnh tượng quen thuộc đó nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「実際、見かけんのだ。\nお互いに、気を遣いあっているというのか――」
2105 = "「Thực tế là không thấy đâu.\nChắc là cả hai đang giữ ý với nhau\nchăng——」"

# monologue
# JP: 口にしてすぐに“違う”と感じる。
3274 = "Vừa thốt ra lời, tôi liền cảm thấy \"không\nphải\"."

# monologue
# JP: お互いに気を遣い合う――今はもう、\nそのレベルにまでコミュニケーションが至らない。
3221 = "Giữ ý với nhau——Bây giờ,\nsự giao tiếp của họ thậm chí còn không đạt\nđến mức đó."

# 【双鉄】
# display as 雙鐵
# JP: 「どうにも、凄まじくギクシャクするのだ。\nふかみが空回りをするというか――」
2358 = "「Dù thế nào đi nữa thì cũng gượng gạo vô\ncùng.\nNói đúng hơn là Fukami đang luống cuống——」"

# 【ハチロク】
# display as 八六
# JP: 「空回り……で、ございますか」
2026 = "「Luống cuống... sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無理からんことだ。なにせ、凪が深く落ち込むなど、\nいままで一度も、経験したことがないゆえに」
2720 = "「Cũng là điều không thể tránh khỏi. Bởi vì\ntừ trước đến nay,\nchưa ai từng thấy Nagi suy sụp sâu sắc đến\nvậy.」"

# monologue
# JP: 普段は、まるきり逆の構図だ。\nふかみが落ち込み、凪が変わらぬ調子で接する。
3097 = "Bình thường, bức tranh hoàn toàn ngược\nlại.\nFukami suy sụp, còn Nagi thì tiếp cận bằng\nthái độ không đổi."

# monologue
# JP: 最初は凪を邪魔にしても、やがてほだされ、\nいつもの二人の笑顔に戻る――
3093 = "Dù ban đầu có thấy Nagi phiền phức, nhưng\nrồi Fukami cũng xiêu lòng,\nvà cả hai lại trở về với nụ cười quen\nthuộc——"

# 【双鉄】
# display as 雙鐵
# JP: 「落ち込んだ凪への接し方がわからんのだろう。\n僕は、努めて意識せぬよう接しているつもりなのだが」
2362 = "「Chắc là em ấy không biết cách cư xử với\nmột Nagi đang suy sụp.\nAnh thì đang cố gắng cư xử sao cho tự\nnhiên nhất có thể, nhưng mà...」"

# monologue
# JP: できているか？　と、言葉にはせず、ハチロクを見る。\nハチロクは、困ったように首を傾げる。
3138 = "\"Có làm được không?\" Tôi không nói ra mà\nchỉ nhìn Hachiroku.\nHachiroku nghiêng đầu vẻ bối rối."

# monologue
# JP: むぅ……\nならば、僕も普段と違っているのか。
3033 = "Hừm...\nVậy là, bản thân tôi cũng khác với ngày\nthường sao."

# 【ハチロク】
# display as 八六
# JP: 「意識して当然の状況での、“意識せぬよう”は――\nそれ自体、お芝居になってしまう気がいたします」
2011 = "「Trong một tình huống mà việc để tâm là\nđiều đương nhiên, thì \"cố tỏ ra tự\nnhiên\"——\nBản thân điều đó đã trở thành một vở diễn\nrồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\nまさしく、言われてみればそのとおりだ」
2317 = "「A——ra là vậy.\nNghe cô nói mới thấy, quả đúng là thế\nthật.」"

# monologue
# JP: 目からうろこがぼろりと落ちる。
2930 = "Tôi như được sáng mắt ra."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は……そして恐らくふかみも、\n凪のやり方を、無意識に真似ようとしていたのだな」
2444 = "「Anh... và có lẽ cả Fukami nữa,\nđã vô thức bắt chước cách làm của Nagi\nnhỉ.」"

# monologue
# JP: ささいなことで、ふかみが落ち込む。\nこういってはなんだが、それはほとんど“日常”だ。
3219 = "Fukami thường suy sụp vì những chuyện nhỏ\nnhặt.\nNói thế này thì hơi kỳ, nhưng điều đó gần\nnhư là \"chuyện thường ngày\"."

# monologue
# JP: 故に、凪も僕も、普段通りに接することが、\nごく当然にできるのだけれど――
3149 = "Do đó, cả Nagi và tôi đều có thể cư xử\nbình thường\nmột cách rất tự nhiên, nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「いまは確かに、異例極まる状況だ。ならばむしろ――\nそこをきちんと意識してのアプローチを取るべきか」
2610 = "「Hiện tại quả thực là một tình huống cực\nkỳ ngoại lệ. Nếu vậy thì thà——\nChúng ta nên tiếp cận một cách có ý thức\nrõ ràng về điều đó sao?」"

# 【ハチロク】
# display as 八六
# JP: 「が、よろしかろうかと、わたくしも思います」
2451 = "「Tôi cũng nghĩ, như vậy sẽ tốt hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。具体的にはどうすればいい？\n凪を、ふかみを立ち直させるためには」
2123 = "「Nếu vậy, Hachiroku. Cụ thể thì nên làm\nthế nào?\nĐể giúp Nagi và Fukami vực dậy tinh thần.」"

# 【ハチロク】
# display as 八六
# JP: 「それは――」
2717 = "「Chuyện đó——」"

# monologue
# JP: ハチロクの顔から余裕が消える。\n沈思黙考――――
2933 = "Vẻ điềm tĩnh biến mất khỏi khuôn mặt\nHachiroku.\nCô ấy chìm vào suy tư trầm mặc――――"

# monologue
# JP: ややあって、困ったような声が零れる。
3224 = "Một lúc sau, một giọng nói bối rối cất\nlên."

# 【ハチロク】
# display as 八六
# JP: 「一介のレイルロオドにすぎないわたくしには、\nいささか、難しすぎる問題であるようでございます」
2448 = "「Đối với một Railord bé nhỏ như tôi,\ncó vẻ đây là một vấn đề hơi quá khó khăn\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクでもか」
2080 = "「Cả Hachiroku cũng vậy sao.」"

# 【ハチロク】
# display as 八六
# JP: 「ご信頼は嬉しいのですが、わたくしは[しょせん,1]所詮レイルロオド。\n人間のこころの[きび,1]機微までは、とても扱えませぬ」
2440 = "「Tôi rất vui vì sự tin tưởng của ngài,\nnhưng suy cho cùng tôi cũng chỉ là một\nRailord.\nTôi không thể nào thấu hiểu hết những nét\ntinh tế trong tâm hồn con người được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はそうとは思わんが……\nとなれば、日々姫に尋ねたほうが」
2457 = "「Tôi thì không nghĩ vậy đâu...\nNếu vậy, có lẽ nên hỏi Hibiki thì hơn.」"

# 【日々姫】
# display as 日日姬
# JP: 「はいはーい！　呼んだと？　呼ばれたとーっ！？」
2109 = "「Có em đây có em đây! Anh gọi em á? Em\nđược gọi rồi á!?」"

# monologue
# JP: （スパーーーーーン！）
3315 = "（Xoạch!）"

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
2227 = "「Ua!?」"

# 【ハチロク】
# display as 八六
# JP: 「日々姫」
2495 = "「Hibiki.」"

# monologue
# JP: ものすごいタイミングでふすまが開き――いや――
3175 = "Cánh cửa trượt mở ra vào một thời điểm\nkhông thể hoàn hảo hơn——À không——"

# 【双鉄】
# display as 雙鐵
# JP: 「聞いていたのか」
2108 = "「Em đã nghe lén sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「立ち聞きするつもりはなかったばってん、\nなんか、入っていけるような雰囲気じゃなかったけん」
2467 = "「Em không định nghe lén đâu,\nchỉ là thấy bầu không khí có vẻ khó chen\nngang vào á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、日々姫にまで気をつかわせてしまったか」
2486 = "「Xin lỗi nhé, lại khiến cả Hibiki cũng\nphải bận tâm rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなんぜーんぜん。家族でしょーよ」
2579 = "「Không sao không sao đâu á. Gia đình với\nnhau mà.」"

# monologue
# JP: ぱたぱた、日々姫が動き回る。\nどら焼きを出し、麦茶を淹れてきてくれる。
3172 = "Hibiki chạy lăng xăng đi đi lại lại.\nLấy Dorayaki ra và pha trà lúa mạch cho\nchúng tôi."

# 【日々姫】
# display as 日日姬
# JP: 「はい。難しか話の前に、甘い物。\n悩んじゃうのは、脳に糖分、きっと足りとらんのよ」
2647 = "「Đây ạ. Trước khi bàn chuyện khó khăn, hãy\năn chút đồ ngọt đi.\nĐau đầu chắc chắn là do não thiếu đường đó\ná.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2474 = "「Có lẽ vậy.」"

# monologue
# JP: ……餡の甘さに、麦茶の冷たさ。\n直線的な幸福感は、確かに頭を軽くする。
1561 = "...Vị ngọt của nhân đậu đỏ, sự mát lạnh\ncủa trà lúa mạch.\nCảm giác hạnh phúc lan tỏa trực tiếp này,\nquả thực làm đầu óc nhẹ nhõm hơn hẳn."

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。凪とふかみを立ち直らせるのは――」
2364 = "「Vậy, vào việc chính thôi. Để vực dậy tinh\nthần cho Nagi và Fukami thì——」"

# 【日々姫】
# display as 日日姬
# JP: 「一番に立ち直らんといけんのは、にぃによ」
2559 = "「Người cần phải vực dậy tinh thần đầu\ntiên, là anh hai á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2069 = "「!?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにがあれこれ悩んどるけん、\n凪ちゃんもふかみちゃんも、不安がって困っとるの」
2102 = "「Vì anh hai cứ lo lắng suy nghĩ mãi,\nnên Nagi-chan và Fukami-chan cũng thấy bất\nan và bối rối theo á.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
2271 = "「A.」"

# monologue
# JP: ……改めて尋ねるまでもない。\n日々姫の断言。ハチロクの反応。
1564 = "...Chẳng cần phải hỏi lại nữa.\nLời khẳng định của Hibiki. Phản ứng của\nHachiroku."

# monologue
# JP: それは何より――\n僕自身が抱いている感覚よりも、よほど確かとわかるから。
3190 = "Hơn hết thảy——\nTôi biết điều đó còn chắc chắn hơn cả cảm\ngiác của chính bản thân mình."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――僕自身が、\nまず普段と違ってしまっているのか」
2166 = "「Vậy sao——Chính bản thân anh,\ntrước tiên đã khác với bình thường rồi\nsao.」"

# 【日々姫】
# display as 日日姬
# JP: 「違ごーとる違ごーとる。\n普段のにぃになら……んとね、こぎゃんよ？」
2018 = "「Khác nhiều lắm á.\nNếu là anh hai bình thường thì... ừm, sẽ\nnhư thế này nè?」"

# monologue
# JP: 日々姫が立つ。\nどこか偉そうに背をそらす。
3180 = "Hibiki đứng dậy.\nƯỡn lưng ra sau với vẻ hơi kiêu ngạo."

# 【日々姫】
# display as 日日姬
# JP: 「『凪。ふかみ。なにをくよくよしている。\nそうすることで、少しでも事態は前進するのか？』」
1582 = "「『Nagi. Fukami. Hai em ủ rũ cái gì thế.\nLàm vậy có giúp tình hình tiến triển thêm\nđược chút nào không?』」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2273 = "「!」"

# 【日々姫】
# display as 日日姬
# JP: 「『前進せぬなら、過ぎたことを思い悩むより動くのだ。\n止まるのは、新しい壁にぶつかってからで充分だろう』」
1585 = "「『Nếu không tiến triển được, thì thay vì\ndằn vặt chuyện đã qua, hãy hành động đi.\nĐợi đến khi va phải bức tường mới rồi hẵng\ndừng lại cũng chưa muộn.』」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、日々姫」
2238 = "「Ôi chà, Hibiki.」"

# monologue
# JP: ハチロクの声は、うっとりしている。
3248 = "Giọng nói của Hachiroku nghe có vẻ say mê."

# 【ハチロク】
# display as 八六
# JP: 「声は少しも似ておりませぬが、\nお話の中身はそっくりです。まさしく双鉄様のよう」
2655 = "「Giọng nói thì không giống chút nào,\nnhưng nội dung câu chuyện thì y hệt. Quả\nthực rất giống ngài Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「『あら、お話の中身だけですか？\nわたくし、声まねにもいささか自信があったのですが』」
1583 = "「『Trời, chỉ có nội dung thôi sao?\nTôi cũng khá tự tin vào khả năng bắt chước\ngiọng nói của mình đấy nhé.』」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　今度はわたくしですね？\n声はともかく、口調はなかなか、いい雰囲気です」
2225 = "「Trời ạ! Lần này là tôi sao?\nChưa bàn đến giọng nói, nhưng ngữ điệu\ncũng khá là giống đấy ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「えー、そぎゃんと？\n声もそっくりだと思うんだけどなぁ」
2240 = "「Ể, vậy á?\nEm tưởng giọng cũng giống hệt chứ á.」"

# monologue
# JP: 頬をわざとらしくふくらせて――
3177 = "Con bé cố tình phồng má lên——"

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にーに、どぎゃーんと？」
2751 = "「Đúng không á? Anh hai, anh thấy sao á?」"

# monologue
# JP: ――そして日々姫は笑ってくれる。\n明るく、軽く。冗談めかして。
1570 = "——Và rồi Hibiki mỉm cười với tôi.\nMột nụ cười tươi sáng, nhẹ nhàng. Nửa đùa\nnửa thật."

# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、日々姫の指摘のとおりだ」
1598 = "「...Quả thực, đúng như Hibiki chỉ ra.」"

# monologue
# JP: 僕は、確かに思い悩んで――後悔していた。\n『どうすれば、凪を勝たせてやれたのか』。
3143 = "Tôi, quả thực đã luôn trăn trở——và hối\nhận.\n『Làm thế nào, mới có thể giúp Nagi chiến\nthắng.』"

# monologue
# JP: その後悔が、凪への対応を変化させ……\n変化が連鎖し、今の状況を作ったのだろう。
3287 = "Nỗi hối hận đó, đã làm thay đổi cách tôi\nđối xử với Nagi...\nSự thay đổi ấy tạo thành một chuỗi phản\nứng, dẫn đến tình huống hiện tại."

# 【双鉄】
# display as 雙鐵
# JP: 「まず前を向き、動き出すべきは僕だった。\n最年長者であるというのに――自分自身が情けない」
2558 = "「Người đáng lẽ phải hướng về phía trước và\nbắt đầu hành động đầu tiên, là anh.\nLà người lớn tuổi nhất mà——bản thân anh\nthật thảm hại.」"

# 【日々姫】
# display as 日日姬
# JP: 「なさけなくなかとよー、ちょっとも。\nだってにぃに、修学旅行中でしょお？」
2562 = "「Chẳng thảm hại chút nào đâu á.\nBởi vì anh hai, đang trong chuyến dã ngoại\nhọc tập mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2273 = "「啊！」" 

# monologue
# JP: そうだ、確かに。\n少年期に、余りに多くを学び損ねてしまった僕のため――
3087 = "Phải rồi, quả thực là vậy.\nVì tôi đã bỏ lỡ quá nhiều bài học trong\nthời niên thiếu——"

# monologue
# JP: 凪とふかみと、三人で。\n僕らは今日も、修学旅行を続けているのだ。
3038 = "Cùng với Nagi và Fukami, ba chúng tôi.\nHôm nay, chúng tôi vẫn đang tiếp tục\nchuyến dã ngoại học tập của mình."

# 【日々姫】
# display as 日日姬
# JP: 「誰かのためにくよくよ思い悩むなんて……\n修学旅行前の、今までのにぃににだったら、しとった？」
2384 = "「Việc cứ mãi ủ rũ phiền muộn vì ai đó...\nNếu là anh hai trước chuyến dã ngoại học\ntập, anh có làm thế không á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――しなかったな。\n誰かの悩みは、結局は、僕の物ではないのだから」
2016 = "「Không——anh đã không làm thế.\nVì suy cho cùng, nỗi phiền muộn của người\nkhác đâu phải là của anh.」"

# monologue
# JP: 言って、自分で気づかされる。\n凪の悩み、ふかみの悩みも、当然、僕のものではない。
3275 = "Nói ra rồi, tôi mới tự nhận ra.\nNỗi phiền muộn của Nagi, của Fukami, tất\nnhiên cũng không phải là của tôi."

# monologue
# JP: 僕にコントロールできるのは、ただ僕の悩み――\n自分自身のこころのことに、他ならない。
3145 = "Thứ tôi có thể kiểm soát, chỉ có nỗi phiền\nmuộn của tôi——\nChính là tâm hồn của bản thân tôi, không\ngì khác."

# 【双鉄】
# display as 雙鐵
# JP: 「……参ったな。修学旅行を重ねたはいいが、\nそのために結論を見誤るようになってしまった」
1616 = "「...Thua thật rồi. Cứ tưởng đi dã ngoại\nhọc tập nhiều là tốt,\nnhưng vì thế mà anh lại đưa ra kết luận\nsai lầm mất rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「見誤っとるんじゃなかとよ？　きっと」
2103 = "「Chắc chắn là không nhìn nhầm đâu á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2532 = "「Vậy sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「誰かのこころを想像する――\n誰かを思いやることも、きっと、大事な学びやけん」
2388 = "「Tưởng tượng về trái tim của ai đó——\nQuan tâm đến ai đó, chắc chắn cũng là một\nbài học quan trọng á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それも、学びか」
2394 = "「Ra vậy. Đó cũng là, một bài học sao.」"

# monologue
# JP: 頷けば、日々姫はニコっと明るく笑う。
3148 = "Tôi gật đầu, Hibiki mỉm cười rạng rỡ."

# 【日々姫】
# display as 日日姬
# JP: 「うんっ、学び！　そぎゃんと学べば、次からきっと、\n誰かがくよくよしている理由、想像できるでしょお？」
2310 = "「Vâng, là bài học! Nếu học được điều đó,\nlần sau chắc chắn anh sẽ\ntưởng tượng được lý do tại sao ai đó lại ủ\nrũ, đúng không á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2566 = "「Quả đúng là vậy.」"

# monologue
# JP: 以前の僕なら、誰かが後悔に止まっていても、\n『何故動かん』としか思わなかった。
3156 = "Nếu là tôi trước đây, dù ai đó có chìm\ntrong hối hận,\ntôi cũng chỉ nghĩ 『Sao không chịu hành\nđộng đi』."

# monologue
# JP: そこを無理矢理動かそうとしてしまうなら、\n余計に大きな傷を相手に、与えてしまったことだろう。
3247 = "Nếu tôi cố gắng ép buộc họ hành động,\ncó lẽ tôi sẽ còn gây ra vết thương lớn hơn\ncho đối phương."

# 【双鉄】
# display as 雙鐵
# JP: 「失敗もまた学びであり、学びは活かしていくもの、か。\n――凄いな、日々姫は」
2351 = "「Thất bại cũng là một bài học, và bài học\nlà thứ để vận dụng vào thực tế, sao.\n——Giỏi thật đấy, Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「凄かとでしょー！\nぜぇんぶ、にぃにとねぇねが教えてくれたことやけん！」
2173 = "「Giỏi lắm đúng không á!\nTất cả đều là do anh hai và chị hai dạy em\nđó á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。そうだな」
2724 = "「...Vậy sao. Cũng phải.」"

# monologue
# JP: 嬉しい。とてもありがたい。
3232 = "Thật vui. Thật đáng quý."

# monologue
# JP: 日々姫が、日々姫でいてくれて。\n僕の妹でいてくれて。
3183 = "Hibiki, vẫn luôn là Hibiki.\nVẫn luôn là em gái của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、しあわせな男だな。\n最高の妹を、ふたりも持てるとは」
2462 = "「Anh đúng là một người đàn ông hạnh phúc.\nCó được hai cô em gái tuyệt vời nhất trên\nđời.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
# 2273 = "「啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「その上、最高のレイルロオドもお持ちでは？」
2653 = "「Hơn nữa, ngài còn sở hữu một Railord\ntuyệt vời nhất nữa, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだ。更には最高の姉に、最高の社長兼市長に、最高の仕事仲間に、最高のライバルに――」
2582 = "「Chính xác là vậy. Thêm vào đó là một\nngười chị tuyệt vời nhất, một giám đốc\nkiêm thị trưởng tuyệt vời nhất, một người\nđồng nghiệp tuyệt vời nhất, một đối thủ\ntuyệt vời nhất——」"

# monologue
# JP: そこまで言って、止まってしまう。
3276 = "Nói đến đó, tôi chợt dừng lại."

# monologue
# JP: 凪とふかみは――あのかけがえのない二人のことを、\n僕はいったい、どんな言葉で示せばいいのか……
2976 = "Nagi và Fukami——hai người không thể thay\nthế đó,\ntôi rốt cuộc nên dùng từ ngữ nào để miêu\ntả đây..."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？\nそいば見つけるための、修学旅行じゃなかと？」
2750 = "「Anh hai?\nChuyến dã ngoại học tập này, chẳng phải là\nđể tìm ra điều đó sao á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2055 = "「Đúng vậy.」"

# monologue
# JP: ハチロクが支えてくれる。日々姫が悩みを解いてくれる。\n――そうできるほど、僕をしっかり見ていてくれる。
3193 = "Hachiroku luôn hỗ trợ tôi. Hibiki giải tỏa\nnỗi phiền muộn cho tôi.\n——Họ đã dõi theo tôi đủ kỹ để có thể làm\nđược những điều đó."

# monologue
# JP: ならば、何を不安がることもない。
3299 = "Nếu vậy, chẳng có gì phải lo lắng nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。行ってくる」
2684 = "「Cảm ơn hai người. Anh đi đây.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\nお気をつけていってらっしゃい、双鉄さま」
2371 = "「Tôi hiểu rồi ạ.\nNgài đi cẩn thận nhé, ngài Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「いくって、どこに？」
2177 = "「Anh đi á, đi đâu vậy?」"

# monologue
# JP: わかっていて、日々姫が尋ねる。\nだから僕も、決まりきっている答えを返す。
3178 = "Biết rõ rồi mà Hibiki vẫn hỏi.\nNên tôi cũng đáp lại bằng một câu trả lời\nđã định sẵn."

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の、続きにだ」
2648 = "「Tiếp tục chuyến dã ngoại học tập.」"

# 【凪】
# display as 凪
# JP: 「……」
1588 = "「...」"

# 【ふかみ】
# display as 深美
# JP: 「えと……あ、凪ちゃん、川！　おっきい」
2196 = "「Ừm... A, Nagi-chan, sông kìa! Lớn quá.」"

# 【凪】
# display as 凪
# JP: 「え？　わ！　ほんと、おっきかとねぇ」
2292 = "「Hả? Oa! Thật á, lớn ghê nè.」"

# 【ふかみ】
# display as 深美
# JP: 「ねー、クマ川みたい、ね？」
2519 = "「Nhỉ, giống sông Kuma, nhỉ?」"

# 【凪】
# display as 凪
# JP: 「え？　うん。ほんと、クマ川みたいとねぇ」
2294 = "「Hả? Ừm. Thật á, giống sông Kuma nè.」"

# 【ふかみ】
# display as 深美
# JP: 「だよ、ねー。あは……は……」
2512 = "「Đúng, nhỉ. Aha... ha...」"

# 【凪】
# display as 凪
# JP: 「……」
# 1588 = "「……」" 

# monologue
# JP: ……空気が、まったく落ち着かない。\n言葉が残らず上滑りして、ただそらぞらしく流れてしまう。
1552 = "...Bầu không khí, hoàn toàn không hề tĩnh\nlặng.\nNhững lời nói cứ trôi tuột đi, chỉ còn lại\nsự gượng gạo."

# 【ふかみ】
# display as 深美
# JP: 「あ、トンネル！」
2288 = "「A, đường hầm!」"

# monologue
# JP: それでも、ふかみはくじけない。
2907 = "Dù vậy, Fukami vẫn không nản lòng."

# 【ふかみ】
# display as 深美
# JP: 「珍しいよね！　御一夜鉄道、トンネルないし。\nね！　凪ちゃん」
2620 = "「Hiếm thấy nhỉ! Đường sắt Ohito đâu có\nđường hầm.\nNhỉ! Nagi-chan.」"

# 【凪】
# display as 凪
# JP: 「……あ！？　ごめん、いま、なんて？」
1604 = "「...A!? Xin lỗi, vừa nãy, cậu nói gì á?」"

# 【ふかみ】
# display as 深美
# JP: 「え！？　あ、ううん、なんでもない。\nつまらないことだし……あははっ」
2197 = "「Hả!? A, không, không có gì đâu.\nChỉ là chuyện vớ vẩn thôi... ahaha.」"

# 【凪】
# display as 凪
# JP: 「あぅ……なんか、ごめん」
2270 = "「A... sao nhỉ, xin lỗi nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「なんにもなんにも！\nわたしが、凪ちゃんの邪魔しちゃったんだし」
2578 = "「Không sao không sao đâu!\nLà tớ đã làm phiền Nagi-chan mà.」"

# monologue
# JP: ……凪は、思いに囚われて。\nふかみはそこから、凪を剥がそうとして、果たし得ぬ。
1556 = "...Nagi bị giam cầm trong những suy nghĩ.\nFukami cố gắng kéo Nagi ra khỏi đó, nhưng\nkhông thành công."

# monologue
# JP: それが、ただ繰り返されている。\n[せんだい,1]千内に至るまでも。千内からの、みかん鉄道の車中でも。
3288 = "Điều đó, cứ lặp đi lặp lại.\nCho đến tận Sendai. Và cả trên chuyến tàu\nMikan từ Sendai."

# 【双鉄】
# display as 雙鐵
# JP: 「はじめてだな」
2725 = "「Lần đầu tiên nhỉ.」"

# 【凪】
# display as 凪
# JP: 「…………」
# 1588 = "「……」" 

# 【ふかみ】
# display as 深美
# JP: 「はじめて、って。何が、です？」
2637 = "「Lần đầu tiên, là sao. Chuyện gì, cơ ạ?」"

# monologue
# JP: その状況を、無理やりに動かそうとは思わない。
3117 = "Tôi không định dùng vũ lực để thay đổi\ntình hình này."

# monologue
# JP: 僕自身に動かしえるのは、僕一人だけ。\nならば僕が、まずこの旅を楽しむことだ。
3122 = "Người duy nhất tôi có thể điều khiển, chỉ\ncó bản thân tôi.\nNếu vậy, trước tiên tôi phải tận hưởng\nchuyến đi này đã."

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行を、僕らはずっと重ねているのに。\n実際こうして、旅に出たのは、はじめてだ」
2455 = "「Dù chúng ta vẫn luôn đi dã ngoại học tập.\nNhưng thực tế, đây là lần đầu tiên chúng\nta cùng nhau đi xa thế này.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2316 = "「A——」"

# 【凪】
# display as 凪
# JP: 「…………」
# 1588 = "「……」" 

# monologue
# JP: ふかみが、凪をちらと見る。\n凪の耳には、やはり言葉は届いていない。
3216 = "Fukami liếc nhìn Nagi.\nNhững lời này quả nhiên vẫn không lọt vào\ntai Nagi."

# monologue
# JP: だから、話す。\n今はふかみと――僕の言葉が届く相手と。
3152 = "Vì vậy, tôi sẽ nói chuyện.\nBây giờ là với Fukami——người có thể nghe\nthấy lời tôi nói."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみと凪は、どうだった？\n学園の修学旅行は、どこへいったのだ？」
2088 = "「Fukami và Nagi thì sao?\nChuyến dã ngoại học tập của trường, các em\nđã đi đâu?」"

# 【ふかみ】
# display as 深美
# JP: 「[あそ,1]阿曽です。阿曽山見てきました」
2551 = "「Là Aso ạ. Bọn em đi ngắm núi Aso.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、僕は行ったことがないが――どんなところだ？」
2524 = "「Ồ, anh chưa đi bao giờ——nơi đó thế nào?」"

# 【ふかみ】
# display as 深美
# JP: 「自然、すごくいっぱいです。\n牧場とかあって、乗馬とかできたりして」
2330 = "「Rất nhiều cảnh thiên nhiên ạ.\nCó trang trại này, rồi còn được cưỡi ngựa\nnữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。[かこう,1]火口にはどの程度近づけるのだ？」
2301 = "「Hừm. Có thể đến gần miệng núi lửa cỡ\nnào?」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　すぐそこまでいけますよ？\nロープウェー、あるんです。[かこう,1]火口のすぐ近くまでいく」
2277 = "「A! Có thể đến sát sạt luôn đấy ạ?\nCó cáp treo mà. Đi đến ngay gần miệng núi\nlửa luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。――そうか、ロープウェーは生き残るか」
2324 = "「À. ——Ra vậy, cáp treo vẫn còn tồn tại\nsao.」"

# monologue
# JP: 飛行型エアクラはまだまだ特別なものだし、\n自動車形エアクラには道路が必要だ。
3308 = "Aircra dạng bay vẫn là thứ gì đó rất đặc\nbiệt,\ncòn Aircra dạng ô tô thì cần có đường bộ."

# monologue
# JP: 道路敷設が難しい故につくられた――\nロープウェーは、なるほど、大廃線にも巻き込まれぬ。
3244 = "Được xây dựng vì khó làm đường bộ——\nCáp treo, thảo nào, không bị cuốn vào cuộc\nĐại bãi bỏ các tuyến đường sắt."

# 【ふかみ】
# display as 深美
# JP: 「降りたら展望台にいけて。\n展望台から火口、みおろすことができるんです」
2013 = "「Xuống cáp treo là đến đài quan sát.\nTừ đài quan sát có thể nhìn xuống miệng\nnúi lửa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。どうだった？」
2527 = "「Ồ. Vậy thì thế nào?」"

# 【ふかみ】
# display as 深美
# JP: 「お水……っていうか、お湯？　たまってます。\nカルデラ湖って……火口がそのまま湖になってるの」
2668 = "「Nước... hay nói đúng hơn là nước nóng?\nĐọng lại ở đó.\nHồ Caldera... là miệng núi lửa nguyên vẹn\nbiến thành hồ luôn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか。言われてみれば有名だな。\n阿曽のカルデラ湖……ふむ。火のイメージの正反対か」
2322 = "「A! Ra vậy. Nhắc mới nhớ, nơi đó rất nổi\ntiếng.\nHồ Caldera của núi Aso... Hừm. Hoàn toàn\ntrái ngược với hình ảnh của lửa nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「ですです。お水、エメラルドでとっても綺麗で――\nでも煙、すごくもうもうってしてて、やっぱり火山って」
2514 = "「Đúng vậy ạ. Nước màu ngọc lục bảo rất\nđẹp——\nNhưng khói bốc lên nghi ngút, quả nhiên\nvẫn là núi lửa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ。面白いな。\nハチロクも喜ぼうし、日々姫も夢中になって描きそうだ」
2528 = "「Hừm. Thú vị thật.\nHachiroku hẳn sẽ rất thích, và Hibiki chắc\ncũng sẽ say sưa vẽ lại phong cảnh đó.」"

# monologue
# JP: 言った瞬間、ぷくりとふかみの頬がふくれる。
3002 = "Vừa dứt lời, Fukami liền phồng má lên."

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん、マナー違反。です！」
2758 = "「Anh Soutetsu, vi phạm phép lịch sự. Rồi\nạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、僕がか？」
2249 = "「Sao cơ, anh á?」"

# 【ふかみ】
# display as 深美
# JP: 「はい、です。デート……じゃなくて、えと、\n修学旅行中は、他の女の子の話、禁止、です！」
2412 = "「Vâng, đúng vậy. Trong lúc hẹn hò... à\nkhông, ừm,\ntrong chuyến dã ngoại học tập, cấm nhắc\nđến những cô gái khác, ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「女の子？」
2356 = "「Những cô gái khác?」"

# monologue
# JP: 言われて、少し可笑しくなる。
3253 = "Nghe em ấy nói vậy, tôi thấy hơi buồn\ncười."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。レイルロオドと妹も、\n確かに、女の子には違いないか」
2626 = "「Ra vậy. Railord và em gái,\nquả thực, cũng là con gái mà nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2273 = "「啊！」" 

# monologue
# JP: ふかみの顔がぱっと輝く。
3213 = "Gương mặt Fukami bừng sáng."

# monologue
# JP: 嬉しげに小さなガッツポーズ。\nそして、にこにこと僕を見直す。
3075 = "Vui vẻ nắm chặt tay làm động tác chiến\nthắng nho nhỏ.\nSau đó, mỉm cười nhìn lại tôi."

# 【ふかみ】
# display as 深美
# JP: 「じゃ、ないです。妹さんとレイルロオドは、\n女の子として見ないですよね、やっぱり、はい」
2471 = "「À, không phải ạ. Em gái và Railord,\nthì anh không xem là con gái đâu nhỉ, quả\nnhiên là vậy, vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 2532 = "「是嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「そうです。正解。わたし間違い。だからじゃんじゃん、\n日々姫さんとハチロクちゃんのお話、どうぞ。です」
2539 = "「Đúng vậy ạ. Chính xác. Là em sai. Nên là\ncứ thoải mái,\nnói chuyện về chị Hibiki và Hachiroku-chan\nđi. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、喜ぶだろうと思っただけだ。\nいつかみんなで行ければいいな――と」
2043 = "「Không, anh chỉ nghĩ là họ sẽ thích thôi.\nƯớc gì một ngày nào đó tất cả chúng ta có\nthể cùng đi——」"

# 【ふかみ】
# display as 深美
# JP: 「あ……そうですね」
2268 = "「A... đúng vậy nhỉ.」"

# monologue
# JP: ふかみが、ちらりと凪を見る。
3214 = "Fukami, khẽ liếc nhìn Nagi."

# monologue
# JP: 凪はやっぱり口を結んで、\nただひたすらに、流れる車窓をぼーっと見ている。
2973 = "Nagi quả nhiên vẫn mím chặt môi,\nchỉ đăm đăm nhìn ra ngoài cửa sổ xe đang\nvùn vụt trôi qua."

# 【ふかみ】
# display as 深美
# JP: 「いつか、みんなで。\nみんなで――楽しく」
2075 = "「Một ngày nào đó, tất cả chúng ta.\nTất cả chúng ta——thật vui vẻ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのためにも聞かせてくれ。\n[あそ,1]阿曽の楽しさを、もっとたくさん」
2520 = "「Ừm. Vì thế hãy kể cho anh nghe đi.\nVề những điều thú vị ở Aso, nhiều hơn\nnữa.」"

# 【ふかみ】
# display as 深美
# JP: 「はい！　です。えと、展望台をおりたら、\nそこから火口の、フチぎりぎりのとこまで歩いていけて」
2373 = "「Vâng! Ạ. Ừm, khi xuống khỏi đài quan sát,\ntừ đó có thể đi bộ đến sát mép miệng núi\nlửa luôn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、怖くはないか？」
2299 = "「Ồ, không sợ sao?」"

# 【ふかみ】
# display as 深美
# JP: 「怖い、です。匂いも、すごくイオウくさくて。\nわたしはもう『噴火しないで～』ってそれだけで。けど」
2612 = "「Sợ, lắm ạ. Mùi lưu huỳnh cũng nồng nặc\nnữa.\nLúc đó em chỉ biết cầu nguyện 『Đừng phun\ntrào nha~』 thôi. Nhưng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
2032 = "「Nhưng mà?」"

# monologue
# JP: ふかみはもう一度凪を見る。
3199 = "Fukami lại nhìn Nagi một lần nữa."

# monologue
# JP: いつものふかみの、とても穏やかな笑みを浮かべて。\nどこかまぶしげに、そして楽しげに、凪を見る。
3069 = "Nở một nụ cười rất đỗi dịu dàng, đúng chất\nFukami.\nNhìn Nagi với vẻ rạng rỡ và vui vẻ."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、\nもうテンションものすごくあがっちゃって！」
2031 = "「Nagi-chan,\nlúc đó phấn khích cực kỳ luôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……だろうな。目に見えるようだ」
2319 = "「À... chắc chắn rồi. Anh như nhìn thấy\nđược cảnh đó vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「いま双鉄おにいさんが想像してるのの、\n多分三倍はすごいです。あんな凪ちゃん見たことない！」
2659 = "「Chắc phải gấp ba lần những gì\nanh Soutetsu đang tưởng tượng đấy ạ. Em\nchưa từng thấy Nagi-chan như vậy bao giờ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでか」
2747 = "「Đến mức đó sao.」"

# 【ふかみ】
# display as 深美
# JP: 「多分、はじめて海をみた子犬とか、そういう感じです。\nびっくりして、うれしくて、走りたくって！！」
2410 = "「Có lẽ, giống như chú cún con lần đầu nhìn\nthấy biển vậy.\nBất ngờ, vui sướng, và chỉ muốn chạy nhảy\ntung tăng!!」"

# monologue
# JP: くすくす、ふかみが笑い出す。\nそれだけでもう、そのときの楽しさが伝わってくる。
3201 = "Fukami khúc khích cười.\nChỉ vậy thôi cũng đủ truyền tải được niềm\nvui sướng lúc đó rồi."

# 【ふかみ】
# display as 深美
# JP: 「火口のすぐ近くに避難所があるんです。\nコンクリートの……[ぼうくうごう,2]防空壕ってこんなかな？　みたいな」
2598 = "「Ngay gần miệng núi lửa có một hầm trú ẩn.\nBằng bê tông... giống như hầm trú ẩn phòng\nkhông ấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。やはり危険な場所なのだな」
2328 = "「À. Quả nhiên là một nơi nguy hiểm nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「それを見た瞬間、凪ちゃん！\n『ふかみちゃん！　タイム！　タイム測って』って」
2617 = "「Vừa nhìn thấy cái hầm đó, Nagi-chan liền\nbảo!\n『Fukami-chan! Bấm giờ! Bấm giờ cho tớ』」"

# 【双鉄】
# display as 雙鐵
# JP: 「タイム？　なんのだ？」
2675 = "「Bấm giờ? Để làm gì?」"

# 【ふかみ】
# display as 深美
# JP: 「わたしもわからないまま、とにかくスマホで\nストップウオッチして。『いいよ』っていったら！！」
2450 = "「Em cũng không biết, nhưng cứ dùng điện\nthoại\nbấm đồng hồ bấm giờ. Vừa nói 『Được rồi』\nmột cái là!!」"

# monologue
# JP: びゅん！　とふかみが手を走らす。
3210 = "Vèo! Fukami vung tay lên mô tả."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、すっごい勢いで走り出して、\n避難所の中にだーって入って、それで、わかって」
2399 = "「Nagi-chan lao đi với tốc độ kinh hoàng,\nchạy tọt vào trong hầm trú ẩn, và thế là,\nem đã hiểu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。退避するまでの時間か」
2465 = "「Ra vậy. Thời gian để sơ tán sao.」"

# 【ふかみ】
# display as 深美
# JP: 「ですです。そしたら、みんな真似し始めちゃって、\nわたしまで先生に怒られちゃって」
2509 = "「Đúng vậy ạ. Xong rồi, mọi người cũng bắt\nchước làm theo,\nkhiến cả em cũng bị cô giáo mắng lây\nluôn.」"

# monologue
# JP: 怒られた、といいながら、ふかみはとても幸せそうだ。\nくすくすと、小さな笑いが鈴を転がす音のように――
3203 = "Miệng thì bảo bị mắng, nhưng trông Fukami\nlại rất hạnh phúc.\nTiếng cười khúc khích nhỏ nhẹ như tiếng\nchuông reo——"

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、何笑っとーと？」
2408 = "「Fukami-chan, cậu cười gì á?」"

# monologue
# JP: 凪が、振り向く。\nとても自然に。
2990 = "Nagi, ngoảnh lại.\nMột cách rất tự nhiên."

# 【ふかみ】
# display as 深美
# JP: 「阿曽山のことおはなししてたの、\n凪ちゃん、あのとき――」
2456 = "「Tớ đang kể chuyện về núi Aso ấy mà,\nlúc đó Nagi-chan——」"

# 【凪】
# display as 凪
# JP: 「わああああ！　[はいせんり？,2]灰千里のこと話しとったと！？\nダメばい！　イヤばい！　恥ずかしかとばーい！」
2216 = "「Oaaaaa! Cậu đang kể chuyện ở Tro Ngàn Dặm\nhả!?\nKhông được á! Đừng á! Xấu hổ lắm á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「[はいせんり,2]灰千里？」
2601 = "「Tro Ngàn Dặm?」"

# 【ふかみ】
# display as 深美
# JP: 「灰とか砂とか岩とかだけの、\n草一本も生えてない――広い、広い場所です」
2498 = "「Đó là một nơi rộng lớn, rất rộng lớn,\nchỉ toàn tro, cát và đá, không một ngọn cỏ\nnào mọc nổi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2525 = "「Ồ.」"

# 【ふかみ】
# display as 深美
# JP: 「そこ、遊歩道があって――それで、凪ちゃん、\n面白がって端っこを歩いてたら先生に『こらー！』って」
2745 = "「Ở đó có đường dành cho người đi bộ——xong\nrồi, Nagi-chan,\nthấy thú vị nên đi sát mép đường, thế là\nbị giáo viên quát 『Này!』」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん！　ダメばい！　びっくりして転げて\n灰まみれになったこととか言うたら～！！」
2406 = "「Fukami-chan! Không được á! Đừng có kể\nchuyện tớ giật mình ngã lăn quay\nrồi bị lấm lem toàn tro bụi chứ~!!」"

# 【ふかみ】
# display as 深美
# JP: 「言わないよぉ、そんなこと。\nけど凪ちゃん？　いま自分で言っちゃったよ？」
2460 = "「Tớ không kể chuyện đó đâu.\nNhưng mà Nagi-chan? Cậu vừa tự khai ra rồi\nđấy?」"

# 【凪】
# display as 凪
# JP: 「ふああああああ！」
2272 = "「Oaaaaaa!」"

# monologue
# JP: よほどひどい灰まみれになったのだろう。\n凪は本気でショックを受けているようだ。
3230 = "Chắc là bị lấm lem tro bụi thê thảm lắm.\nNagi có vẻ thực sự sốc."

# 【凪】
# display as 凪
# JP: 「あうあうあ～　いっつもそうばい！\n調子にのって、油断して――そいで。……そいで、うち」
2254 = "「Au au a~ Lúc nào cũng vậy á!\nCứ đắc ý, rồi chủ quan——sau đó. ...Sau đó,\ntớ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2262 = "「A——」"

# monologue
# JP: トーンが変わる。\n『しまった』という感じでふかみが声を閉じてしまう。
2985 = "Tông giọng thay đổi.\nFukami im bặt với cảm giác 『Chết rồi』."

# monologue
# JP: だが、これでいい。\n凪の窓が、ようやく僕らに、とても素直に開かれたのだ。
2906 = "Nhưng, thế này là được rồi.\nCánh cửa lòng của Nagi, cuối cùng cũng đã\nmở ra với chúng tôi một cách chân thành."

# 【双鉄】
# display as 雙鐵
# JP: 「調子に乗って、油断したのか？」
2097 = "「Cứ đắc ý, rồi chủ quan sao?」"

# 【凪】
# display as 凪
# JP: 「あう……」
2302 = "「Au...」"

# monologue
# JP: 凪が、見上げる。
2982 = "Nagi, ngước nhìn lên."

# monologue
# JP: 僕のことを、心細げにちらりと見上げ、\nけれどもすぐに目を伏せる。
3065 = "Ngước nhìn tôi một cái với vẻ lo lắng,\nnhưng ngay lập tức lại cụp mắt xuống."

# 【凪】
# display as 凪
# JP: 「調子に乗って――油断して――。\n『道場剣道』とか言うて、剣道のことば、甘くみて」
2207 = "「Đắc ý——rồi chủ quan——.\nNói gì mà 『Kendo võ đường』, rồi xem nhẹ\nKendo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2307 = "「Ừm.」"

# 【凪】
# display as 凪
# JP: 「ばってん、にーさんが稽古ばつけてくれたけん。\nちゃんと準備して油断なく戦ったつもりで、そいでもっ」
2346 = "「Nhưng mà, anh hai đã luyện tập cùng em á.\nEm cứ nghĩ mình đã chuẩn bị kỹ càng và\nchiến đấu không chút chủ quan, thế mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2469 = "「Ừ.」"

# monologue
# JP: 言葉をきちんと選んで発する。\n今の凪になら、きっと伝わると信じつつ。
3146 = "Tôi cẩn thận lựa chọn từ ngữ.\nTin tưởng rằng với Nagi hiện tại, chắc\nchắn sẽ hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「負けてしまったな」
2187 = "「Đã thua mất rồi nhỉ.」"

# 【凪】
# display as 凪＆深美
# JP: 「っ！！」\n「ぁっ」
2274 = "「!!」\n「A.」"

# monologue
# JP: 絶句する。\n凪も、ふかみも。
2978 = "Cạn lời.\nCả Nagi và Fukami."

# monologue
# JP: ふかみが、凪をそっと伺う。\n凪は床へと目を落とし――
3207 = "Fukami, khẽ quan sát Nagi.\nNagi cụp mắt nhìn xuống sàn nhà——"

# 【凪】
# display as 凪
# JP: 「……うん」
1610 = "「...Vâng.」"

# monologue
# JP: ――その目をゆっくり持ち上げる。\n僕を、まっすぐ、まっすぐ見つめる。
1567 = "——Từ từ ngước mắt lên.\nNhìn tôi, một cách thẳng thắn, trực diện."

# 【凪】
# display as 凪
# JP: 「負け。ばい。勝てんかったじゃなくて、負け。\n――正直、実力差……あったばい」
2208 = "「Thua. Á. Không phải là không thắng được,\nmà là thua.\n——Nói thật, có sự chênh lệch... về thực\nlực á.」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！　そんなことないよ。\n凪ちゃんの方が絶対、強いし！」
2400 = "「Nagi-chan! Không có chuyện đó đâu.\nNagi-chan tuyệt đối, mạnh hơn mà!」"

# 【凪】
# display as 凪
# JP: 「剣道では、弱かったとよ。\n正直、手も足もでんかったばい」
2077 = "「Trong Kendo, thì yếu hơn á.\nNói thật là, bó tay bó chân luôn á.」"

# 【ふかみ】
# display as 深美
# JP: 「凪、ちゃん……」
2397 = "「Nagi, chan...」"

# 【凪】
# display as 凪
# JP: 「やけん――うち――\n考えて考えて考えて。ばってん、そいでも」
2476 = "「Bởi vậy——em——\nNghĩ đi nghĩ lại nghĩ mãi. Nhưng mà, dù\nthế nào đi nữa.」"

# monologue
# JP: 凪の瞳が、ふかみを向く。\nふかみは視線を受け止める。
3088 = "Ánh mắt của Nagi, hướng về phía Fukami.\nFukami đón nhận ánh mắt ấy."

# monologue
# JP: ――ああ、何日ぶりことだろう。\n凪とふかみが、ようやく向かい合っている。
1559 = "——A, đã bao nhiêu ngày rồi nhỉ.\nCuối cùng Nagi và Fukami cũng đối diện với\nnhau."

# 【凪】
# display as 凪
# JP: 「『どぎゃんしとったら勝てたのか――』\nそん答えが、うちには見つけられなくて……」
2156 = "「『Phải làm sao mới có thể chiến thắng——』\nEm không thể tìm ra được câu trả lời\nđó...」"

# 【ふかみ】
# display as 深美
# JP: 「ぁぅ……凪ちゃん」
2265 = "「Au... Nagi-chan.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2307 = "「嗯」" 

# monologue
# JP: 息が溢れる。\n安堵の息が。
3124 = "Thở phào.\nMột tiếng thở phào nhẹ nhõm."

# 【双鉄】
# display as 雙鐵
# JP: 「凪はずっと、そこに悩んでしまっていたのだな」
2167 = "「Nagi vẫn luôn, trăn trở về điều đó sao.」"

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2295 = "「啊？！」" 

# 【凪】
# display as 凪
# JP: 「って、にーさん！\nそん言い方――答え、わかると！？」
2736 = "「Ơ, anh hai!\nCách nói đó——anh biết câu trả lời sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかるぞ。最初から聞いてくれればよかった。\nそれは、とてもとても単純な答えだ」
2613 = "「Biết chứ. Đáng lẽ em nên hỏi anh ngay từ\nđầu.\nĐó là một câu trả lời cực kỳ, cực kỳ đơn\ngiản.」"

# 【ふかみ】
# display as 深美
# JP: 「単純な」
2761 = "「Đơn giản.」"

# 【凪】
# display as 凪
# JP: 「答え」
2642 = "「Câu trả lời.」"

# monologue
# JP: ふたりでひとつのことをいい、\n眼と眼を見合わせ頷きあって、僕を見る。
3061 = "Hai người cùng đồng thanh,\nnhìn nhau gật đầu, rồi nhìn tôi."

# monologue
# JP: いつもながらのふかみと凪だ。\n本当に、いつもと少しも変わらない。
3290 = "Lại là Fukami và Nagi như mọi khi.\nThật sự, không khác gì bình thường."

# 【双鉄】
# display as 雙鐵
# JP: 「『凪が、最初からずっと剣道を習っていれば』。\nほぼ確実に間違いなく、あの少女は凪にはかなわんさ」
2376 = "「『Nếu Nagi học Kendo ngay từ đầu』.\nGần như chắc chắn cô bé đó sẽ không thể\nnào là đối thủ của Nagi.」"

# 【ふかみ】
# display as 深美
# JP: 「え……そんなの」
2235 = "「Hả... chuyện đó.」"

# 【凪】
# display as 凪
# JP: 「そいば――言うたら、そぎゃんかもしれんけど……\nなら、今のウチではやっぱりあの子に勝てんかったと？」
2623 = "「Nói vậy——thì có lẽ là đúng, nhưng...\nVậy, với em bây giờ thì quả nhiên không\nthể thắng cô bé đó á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、思うぞ？　実際に負けてしまっているしな。\n剣道の経験、剣道の試合の経験の差が、大きすぎた」
2511 = "「Anh nghĩ vậy đấy? Thực tế là em đã thua\nrồi mà.\nSự chênh lệch về kinh nghiệm Kendo, kinh\nnghiệm thi đấu Kendo, là quá lớn.」"

# 【凪】
# display as 凪
# JP: 「……うん」
1605 = "「...Vâng.」"

# 【双鉄】
# display as 雙鐵
