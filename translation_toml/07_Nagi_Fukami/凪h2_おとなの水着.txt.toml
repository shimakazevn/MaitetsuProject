[script]
# lines: 722 
# 【凪】
# display as 凪
# JP: 「見つからなかったとばい！」
2829 = "「Không tìm thấy á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「残念だ」
2870 = "「Đáng tiếc thật」"
# monologue
# JP: 百貨店からスポーツ用品店、\nはては古着屋まで、丹念に探してみたのだが――
3597 = "Từ trung tâm thương mại đến cửa hàng đồ thể thao, thậm chí cả cửa hàng quần áo cũ, chúng tôi đã cẩn thận tìm kiếm nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「最初から隈元まで出ればよかったか。\n無駄足という形になってしまったな」
2762 = "「Đáng lẽ ngay từ đầu chúng ta nên ra tận Kumamoto. Thành ra tốn công vô ích rồi」"
# 【凪】
# display as 凪
# JP: 「ちょっとも無駄足じゃなかとよー」
2475 = "「Không tốn công vô ích chút nào đâu á」"
# monologue
# JP: ――けれども、凪はニッコリ笑う。\n笑って、ぐいぐい、僕をその肩でつっついてくる。
1737 = "——Thế nhưng, Nagi lại cười rạng rỡ. Em cười, rồi liên tục huých vai vào tôi."
# 【凪】
# display as 凪
# JP: 「にーさんと一緒にあれこれ探して\nたくさんおしゃべりしたけんね！」
2857 = "「Được cùng anh hai đi tìm hết cái này đến cái kia, lại còn được nói chuyện rất nhiều nữa mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2795 = "「Đúng là vậy」"
# monologue
# JP: 得られなかったものではなくて、得たものを見る。\n凪のことばに教えられれば、僕の視点も切り替わる。
3204 = "Không nhìn vào những thứ không đạt được, mà nhìn vào những gì đã có được. Được những lời của Nagi chỉ bảo, góc nhìn của tôi cũng thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「笑顔もふくれっつらも見て、歓声も落ち込んだ声も\n聞けた、これほど有意義な時間の使い方も無い」
2865 = "「Được nhìn thấy nụ cười cũng như vẻ mặt phụng phịu, được nghe thấy tiếng reo hò cũng như giọng nói buồn bã, không có cách sử dụng thời gian nào ý nghĩa hơn thế này」"
# 【凪】
# display as 凪
# JP: 「ちょっ！　にーさん、\nそぎゃんと言われたら照れくさかとよー」
2550 = "「Khoan! Anh hai,\nbị nói vậy em thấy ngại lắm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならばもう少し照れてくれ」
2789 = "「Vậy sao? Thế thì cứ ngại thêm chút nữa đi」"
# 【凪】
# display as 凪
# JP: 「ひゃう」
2402 = "「Hya」"
# monologue
# JP: 左手で凪を捕まえて、\n右手で頭を、いいこ、いいこと撫でくりまわす。
3668 = "Tôi dùng tay trái tóm lấy Nagi, tay phải xoa đầu em, ngoan nào, ngoan nào."
# 【凪】
# display as 凪
# JP: 「えへへー、これはちょっとも照れくさくなかとよ！\nここちよかけんね！」
2599 = "「Ehehe, thế này thì không thấy ngại chút nào đâu á! Thoải mái lắm á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2988 = "「Vậy thì tốt quá rồi」"
# monologue
# JP: 撫でくり撫でくる。少し堅い髪の手触りがここちいい。\n凪もごろころ、喉を鳴らしそうな表情だ。
3654 = "Tôi liên tục xoa đầu em. Cảm giác chạm vào mái tóc hơi cứng thật dễ chịu. Nagi cũng có vẻ mặt như sắp phát ra tiếng rừ rừ trong cổ họng."
# 【凪】
# display as 凪
# JP: 「耳の後ろも撫でてほしかとばーい」
2895 = "「Em muốn được vuốt ve cả sau tai nữa á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここか」
2963 = "「Chỗ này à」"
# 【凪】
# display as 凪
# JP: 「んー、気持ちよかとー。\nしたら、今度はアゴの下ばい」
2584 = "「Ưm, sướng quá á.\nTiếp theo, là dưới cằm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「アゴの下――こんな感じか？」
2256 = "「Dưới cằm——Như thế này à?」"
# monologue
# JP: 人差し指をカギに曲げ、\nこりこり、なでなで。
3633 = "Tôi gập ngón trỏ lại như chiếc móc, rồi gãi gãi, vuốt vuốt."
# 【凪】
# display as 凪
# JP: 「よかとよかとー。\nおなかも撫でて欲しかとばい！」
2904 = "「Được á được á.\nEm cũng muốn được vuốt bụng nữa á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ！\nあああ、こんなところで腹を出すな」
2670 = "「Dễ ợt!\nÁ á á, đừng có vạch bụng ra ở chỗ này chứ」"
# monologue
# JP: Ｔシャツをめくろうとした手を止めて、\nその上から、凪のおなかを撫でてやる。
3607 = "Tôi ngăn bàn tay đang định vén áo thun lên của em lại, rồi vuốt ve bụng Nagi qua lớp áo."
# monologue
# JP: 撫でるほど幸せがこみあげて、いつまでだって――
3260 = "Càng vuốt ve, niềm hạnh phúc càng trào dâng, tôi muốn cứ thế này mãi——"
# monologue
# JP: （ざわ、ひそ）
4045 = "（Xì xào, xì xào）"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2511 = "「Hửm?」"
# monologue
# JP: これはいかん。\n遠巻きに、人が僕らを見始めている。
3912 = "Không ổn rồi. Mọi người đang bắt đầu đứng từ xa nhìn chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、今はここまでだ」
2374 = "「Nagi, giờ đến đây thôi」"
# 【凪】
# display as 凪
# JP: 「えー、凪さま、もっと撫でられたかとー！」
2465 = "「Ể, Nagi-sama, muốn được vuốt ve thêm nữa á!」"
# monologue
# JP: 大声。\n遠巻きに僕らを見ている輪からクスクス笑い声。
3833 = "Em nói lớn. Từ vòng người đang đứng từ xa nhìn chúng tôi vang lên những tiếng cười khúc khích."
# monologue
# JP: 『仲の良いきょうだいね』などという声も聞こえる。
3227 = "Thậm chí còn nghe thấy cả tiếng nói 『Hai anh em thân thiết ghê nhỉ』."
# 【凪】
# display as 凪
# JP: 「きょうだいじゃ」
2383 = "「Anh em đâu mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪」
2353 = "「Nagi」"
# 【凪】
# display as 凪
# JP: 「もがっ」
2535 = "「Ưm」"
# monologue
# JP: このままでは良い見世物だ。\n凪の口元を手で覆い、耳元、意識して甘い声を出す。
3918 = "Cứ thế này thì thành trò cười cho thiên hạ mất. Tôi lấy tay che miệng Nagi lại, rồi cố tình cất giọng ngọt ngào bên tai em."
# 【双鉄】
# display as 雙鐵
# JP: 「撫でられ足りぬなら、あとでいくらでも撫でてやる。\nふたりきりになったとき、凪が、満足しきるまで」
2914 = "「Nếu vuốt ve chưa đủ, lát nữa tôi sẽ vuốt ve em bao nhiêu tùy thích. Khi chỉ có hai chúng ta, cho đến khi nào Nagi hoàn toàn thỏa mãn thì thôi」"
# 【凪】
# display as 凪
# JP: 「ひゃっ///」
2415 = "「Hya///」"
# monologue
# JP: 一気に、凪が赤くなる。\n芯から照れてる。珍しい。そして可愛らしい。
3378 = "Nagi đỏ bừng mặt ngay lập tức. Ngượng ngùng từ tận đáy lòng. Thật hiếm thấy. Và cũng thật đáng yêu."
# monologue
# JP: じっくりたっぷり眺めていたいが、\n今は人目を外れねば、だ。
3582 = "Tôi muốn ngắm nhìn em thật kỹ, thật lâu, nhưng bây giờ phải tránh ánh mắt của mọi người đã."
# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ」
2726 = "「Đi thôi」"
# 【凪】
# display as 凪
# JP: 「…………ぅん」
1784 = "「…………Vâng」"
# monologue
# JP: 早足に、大通りまで抜けてくる。
3598 = "Chúng tôi rảo bước nhanh, đi xuyên ra đến tận đường lớn."
# monologue
# JP: そうする間に残念ながら、\n凪も切り替わってしまってる。
3921 = "Trong lúc đó, thật đáng tiếc, Nagi cũng đã trở lại bình thường."
# 【凪】
# display as 凪
# JP: 「で？　にーさん、どこいくと？」
3002 = "「Rồi sao? Anh hai, mình đi đâu á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ。今さらだが、\nやはり隈元か、あるいは八ツ城まで出てみるか？」
2510 = "「Ừm. Dù hơi muộn màng, nhưng có lẽ vẫn nên ra Kumamoto, hoặc thử đến tận Yatsushiro xem sao?」"
# 【凪】
# display as 凪
# JP: 「[つるや,1]鶴屋さんにもオリムピアさんにも無かったけん。\n隈元やら[やつしろ,2]八ツ城やらいってもきっと無かとよ」
3021 = "「Đến cả cửa hàng Tsuruya hay Olimpia còn không có mà. Có ra Kumamoto hay Yatsushiro thì chắc cũng không có đâu á」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪がそういうなら、そうかもしれんな」
2368 = "「Nagi đã nói vậy thì, chắc là thế rồi」"
# monologue
# JP: 残念ながら、隈元や八ツ城での買い物自体を\n僕はほとんど経験してない。
3685 = "Thật đáng tiếc, bản thân tôi cũng gần như chưa từng có kinh nghiệm mua sắm ở Kumamoto hay Yatsushiro."
# monologue
# JP: ましてや、水着。\n隈元市内まで仮に出たとて……いや。
3736 = "Huống hồ gì là đồ bơi. Giả sử có ra đến tận trung tâm Kumamoto đi chăng nữa……Không."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、隈元市内にいけば、\nいわゆるブランドショップがあるのではないか？」
2320 = "「Nhưng mà, nếu ra trung tâm Kumamoto, chẳng phải sẽ có những cửa hàng gọi là cửa hàng đồ hiệu sao?」"
# 【凪】
# display as 凪
# JP: 「ブランドって――アヂダスとかピューマとかと？」
2444 = "「Đồ hiệu á——Là Adydas hay Pyuma á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたスポーツブランドの店もあるだろうし、\nもっとこう、いわゆるファッションブランドなども」
2794 = "「Chắc cũng có những cửa hàng đồ thể thao như vậy, nhưng ý tôi là những cửa hàng gọi là thương hiệu thời trang cơ」"
# 【凪】
# display as 凪
# JP: 「ファッションブランド？」
2833 = "「Thương hiệu thời trang á?」"
# monologue
# JP: それ何と？　と、まあるい瞳が問いかけてくる。
3403 = "Đó là gì á? Đôi mắt tròn xoe như đang hỏi vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も詳しくは知らんが――\n代表的なところでは、チャネルとか、ヴッチとか」
2712 = "「Tôi cũng không rành lắm nhưng—— Tiêu biểu thì có Channel, hay là Vucci chẳng hạn」"
# 【凪】
# display as 凪
# JP: 「ヴッチ！」
2386 = "「Vucci!」"
# monologue
# JP: 凪が勢い良く手をあげる。
3395 = "Nagi giơ tay lên đầy hào hứng."
# 【凪】
# display as 凪
# JP: 「それなら凪さま知っとるばい！\nヴッチのバッグは百年使えるって聞いたけん！！」
2951 = "「Thế thì Nagi-sama biết á! Nghe nói túi của Vucci có thể dùng được cả trăm năm luôn á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「らしいな。そういう一流ブランドの品ならば、\n恐らくは大人っぽく、質もよかろう」
2645 = "「Có vẻ là vậy. Nếu là hàng của những thương hiệu hàng đầu như thế, thì chắc hẳn trông sẽ chững chạc và chất lượng cũng tốt」"
# 【凪】
# display as 凪
# JP: 「そりゃ凪さまに似合いそーばい！！」
2998 = "「Thế thì có vẻ hợp với Nagi-sama lắm á!!」"
# monologue
# JP: 笑って言って。\nけれども凪は、すぐさま大げさに肩をすくめる。
3392 = "Em cười nói. Nhưng ngay sau đó, Nagi lại nhún vai một cách phóng đại."
# 【凪】
# display as 凪
# JP: 「ばってん、そぎゃんとはめちゃくちゃ高そうばい！\n今のウチには、[ぶんふそうおう,3]分不相応ってヤツになるとよ」
2391 = "「Nhưng mà, đồ như thế chắc đắt khủng khiếp luôn á! Với em bây giờ thì, đó gọi là không biết lượng sức mình á」"
# 【双鉄】
# display as 雙鐵
# JP: 「分不相応」
2278 = "「Không biết lượng sức mình」"
# monologue
# JP: わからず言ってる口調ではない。\n驚き、思わずオウム返しにしてしまう。
3838 = "Không phải là giọng điệu của một người nói mà không hiểu ý nghĩa. Quá ngạc nhiên, tôi bất giác lặp lại như một con vẹt."
# 【凪】
# display as 凪
# JP: 「自分で稼いだお金で買えんよーなもんば、分不相応。\nそぎゃんもん身につけたら、物にも自分にも失礼ばい」
2265 = "「Những món đồ không thể mua bằng tiền mình tự kiếm được, gọi là không biết lượng sức mình. Nếu khoác những thứ đó lên người, thì thật thất lễ với cả món đồ lẫn bản thân mình á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。それが、凪の“分”か」
2779 = "「Chà. Đó là \"lượng sức\" của Nagi sao」"
# 【凪】
# display as 凪
# JP: 「そうばい！　じーちゃんにも、ばーちゃんにも、\n剣術のお師さんにも教わっとるけんね！」
2668 = "「Đúng á! Cả ông nội, cả bà nội, cả sư phụ dạy kiếm thuật đều dạy em như vậy á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。実に良い教えだと、僕も思う」
2579 = "「Ừm. Quả thực là một lời dạy rất hay, tôi cũng nghĩ vậy」"
# 【凪】
# display as 凪
# JP: 「でしょお！」
2771 = "「Đúng không á!」"
# monologue
# JP: また肩先でつんつんと。\nかように凪は、感情と行動が直結しやすい。
3474 = "Em lại dùng vai huých huých tôi. Nagi là vậy đấy, cảm xúc và hành động rất dễ liên kết trực tiếp với nhau."
# monologue
# JP: その可愛さは、調子に乗りやすさだとも言える。\n蓑笠さんや奥様などは、そうと重々知るが故……
3498 = "Sự đáng yêu đó, cũng có thể nói là rất dễ đắc ý. Ông Minokasa hay phu nhân đều biết rất rõ điều đó, nên……"
# 【双鉄】
# display as 雙鐵
# JP: 「分をわきまえろ、か。\n大事に、育てられているのだな」
2908 = "「Biết lượng sức mình, sao. Em được nuôi dạy rất cẩn thận đấy nhỉ」"
# 【凪】
# display as 凪
# JP: 「そーでもなかとよ？\n本物のお[きゅう]灸、据えられるけんねー」
2291 = "「Cũng không hẳn đâu á? Em còn bị đốt ngải cứu thật luôn á」"
# 【双鉄】
# display as 雙鐵
# JP: 「本物……とは、比喩ではなく、\nあの、もぐさに火をつけるやつを据えられるのか？」
2867 = "「Thật……nghĩa là, không phải nói bóng nói gió, mà là bị đốt cái thứ ngải cứu châm lửa lên ấy hả?」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと！　ああ見えてばーちゃん厳しかけん。\nいけんいわれたことしたら、据えられるばい！」
2772 = "「Đúng á! Nhìn vậy chứ bà nội nghiêm khắc lắm á. Làm chuyện bị cấm là bị đốt ngay á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。あれは実際、熱い物か？」
2780 = "「Chà. Cái đó thực tế có nóng không?」"
# 【凪】
# display as 凪
# JP: 「あっつかとよー！　やけん、ちっちゃかときは\nびっくりして怖くて、やめてよしてって泣いたけん」
2850 = "「Nóng lắm á! Nên hồi nhỏ em toàn bị giật mình sợ hãi, khóc lóc van xin thôi đi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「今は、泣かずに済んでいるのか？」
2996 = "「Bây giờ thì, không khóc nữa rồi à?」"
# 【凪】
# display as 凪
# JP: 「ウチもおっきくなったけんねー」
2436 = "「Em cũng lớn rồi mà lị」"
# monologue
# JP: カラリと笑い、\n凪はとんとん、自分の腰を叩いてみせる。
3388 = "Nagi cười tươi rói,\nrồi vỗ vỗ vào eo mình cho tôi xem."
# 【凪】
# display as 凪
# JP: 「体のしんどかとこにお灸ば据えてもらえると、\n気持ちよかとー、って感じるようになったとばい」
2892 = "「Được đốt ngải cứu ở những chỗ nhức mỏi trên cơ thể, em bắt đầu cảm thấy sướng lắm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2781 = "「Ra vậy」"
# monologue
# JP: 歩くだけでも、\n凪の手足は、これほどのびのび、大きく動く。
3263 = "Dù chỉ là bước đi, nhưng tay chân Nagi cũng vung vẩy rất thoải mái và rộng mở."
# monologue
# JP: ともはりに、剣術修行に日々の投炭。\n――筋肉疲労は、相当だろう。
3717 = "Chèo thuyền, luyện kiếm, rồi còn xúc than dồn toa mỗi ngày. ——Cơ bắp chắc hẳn phải mệt mỏi lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、むしろ失敗したくなってしまいそうだな」
2989 = "「Nếu vậy, có khi lại đâm ra muốn làm sai cũng nên」"
# 【凪】
# display as 凪
# JP: 「それがそーでも無かとばい！\nルール、まるっきり変わったけんね」
2292 = "「Cũng không hẳn đâu á! Luật lệ, đã thay đổi hoàn toàn rồi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
2782 = "「Hửm?」"
# 【凪】
# display as 凪
# JP: 「いけんことしたらご飯抜きで、\nばーちゃんのお手伝いしたらお灸ば据えてもらえると」
2337 = "「Làm chuyện bị cấm thì bị cắt cơm, còn phụ giúp bà nội thì sẽ được đốt ngải cứu á」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。お仕置きにならんことに気付き、\nお祖母様は発想を転換されたのか」
2708 = "「Ra vậy. Nhận ra đó không còn là hình phạt nữa, nên bà nội em đã thay đổi cách suy nghĩ sao」"
# monologue
# JP: それは良い。凪がときおり見せる鋭さ――\nその根源を見た気にさえなる。
3911 = "Thật thú vị. Sự sắc sảo mà Nagi thỉnh thoảng bộc lộ—— Tôi có cảm giác như mình đã nhìn thấy cội nguồn của nó."
# monologue
# JP: 蓑笠鍛冶店の店の奥、ちんまりしている\n静かな方と、そんな印象しかなかったが……
3630 = "Người phụ nữ nhỏ nhắn, trầm lặng ở phía sau tiệm rèn Minokasa, tôi chỉ có ấn tượng như vậy về bà ấy nhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「一度、じっくりお話してみたくなったな。\n凪の、お祖母様と」
2474 = "「Tôi muốn được nói chuyện đàng hoàng một lần ghê. Với bà nội của Nagi ấy」"
# 【凪】
# display as 凪
# JP: 「大歓迎ばい！　いつでもよかとよ！！\nなんなら、今日これからだってよかとばい！」
2814 = "「Rất hoan nghênh á! Lúc nào cũng được á!! Thậm chí, lát nữa đi luôn cũng được á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「喜んで――なのだが。その前に、\n水着をなんとか解決したい」
2733 = "「Rất sẵn lòng——nhưng mà. Trước đó, tôi muốn giải quyết xong chuyện đồ bơi đã」"
# 【凪】
# display as 凪
# JP: 「あー、そりゃそうばい！　凪さま、ちゃあんと、\n学園の水着より似合う水着があるって証明するけん」
2528 = "「A, đúng rồi á! Nagi-sama, nhất định, sẽ chứng minh rằng có đồ bơi hợp với mình hơn đồ bơi của trường á」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕もそうして欲しい」
2578 = "「Ừm. Tôi cũng muốn em làm vậy」"
# 【凪】
# display as 凪
# JP: 「けど、実際探すと、なかなかなかとねー。\nお値頃で、大人っぽくて、よか水着」
2390 = "「Nhưng mà, thực tế tìm thì khó lắm á. Đồ bơi vừa giá cả phải chăng, vừa chững chạc, lại còn đẹp nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「お値頃」
2347 = "「Giá cả phải chăng」"
# monologue
# JP: ブランドうんぬんの話のときも、\n凪は値段を気にしていたが――
3601 = "Cả lúc nói chuyện về đồ hiệu, Nagi cũng rất để ý đến giá cả——"
# 【凪】
# display as 凪
# JP: 「凪さままだまだ成長期やけんねー。こん[なつ]夏しか\n着れんかもしれんもんに、高かとはもったいなかとよ」
2806 = "「Nagi-sama vẫn đang trong tuổi ăn tuổi lớn mà. Mua đồ đắt tiền cho thứ có khi chỉ mặc được mùa hè này thì lãng phí lắm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやしかし、僕がプレゼントするのだぞ？」
2394 = "「Không, nhưng mà, là tôi tặng quà cho em cơ mà?」"
# monologue
# JP: プールの授業の話になって、学園指定の水着になって、\n世界一似合うのではないか褒めたら、ふくれられ。
3602 = "Từ chuyện giờ học bơi, đến chuyện đồ bơi quy định của trường, tôi khen em mặc hợp nhất thế giới thì em lại phụng phịu."
# monologue
# JP: もっと大人っぽい水着の方が似合うばいという話に\nなって、一緒に探して――今に至る、だ。
3506 = "Rồi lại chuyển sang chuyện mặc đồ bơi chững chạc hơn sẽ hợp hơn, thế là cả hai cùng đi tìm——và giờ thì thành ra thế này đây."
# 【双鉄】
# display as 雙鐵
# JP: 「いつもと違う、凪の水着を見てみたい。\nそれ自体、僕の望みであるのだからな」
2735 = "「Tôi muốn được thấy một Nagi trong bộ đồ bơi khác ngày thường. Bản thân điều đó, đã là mong muốn của tôi rồi」"
# 【凪】
# display as 凪
# JP: 「にーさんに[こ]買うてもらうなら、なおさらばい」
2761 = "「Nếu được anh hai mua cho, thì lại càng phải thế á」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故、なおさらだ？」
2839 = "「Tại sao, lại càng phải thế?」"
# 【凪】
# display as 凪
# JP: 「だってにーさん、ウチに水着ばこーてくれたら、\nふかみちゃんにも、こーてあげるでしょお？」
2912 = "「Tại vì anh hai, nếu mua đồ bơi cho em, thì cũng sẽ mua cho cả bé Fukami nữa đúng không á?」"
# monologue
# JP: 想像を、するまでもなく頷いている。
3662 = "Không cần phải tưởng tượng, tôi gật đầu ngay lập tức."
# monologue
# JP: 凪にだけ特別なプレゼントをする。\nそれは確実に、ふかみを傷つけるだろうから。
3515 = "Chỉ tặng quà đặc biệt cho riêng Nagi. Điều đó chắc chắn, sẽ làm tổn thương Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、無論だ」
2959 = "「Đó là, điều hiển nhiên」"
# 【凪】
# display as 凪
# JP: 「二倍になったら、高いの余計しんどくなるけん！\n安くてよかとを見つけたかとよー」
2656 = "「Nhân đôi lên, thì đồ đắt tiền sẽ càng thêm mệt mỏi á! Nên em muốn tìm cái nào vừa rẻ vừa đẹp á」"
# 【双鉄】
# display as 雙鐵
# JP: 「気遣ってくれるのは実に嬉しい。ありがたい。\nが、僕も男だ、多少の見栄というものもある」
2919 = "「Em lo lắng cho tôi như vậy, tôi thực sự rất vui. Rất biết ơn. Nhưng, tôi cũng là đàn ông, cũng có chút sĩ diện chứ」"
# monologue
# JP: 凪の気遣いが自然だからこそ、\nかえって強く思ってしまう。
3751 = "Chính vì sự lo lắng của Nagi quá đỗi tự nhiên, nên tôi lại càng cảm thấy như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「凪が一番気に入って、分不相応とも思わぬものを、\n値段のことは気にせずに、好きに選んでもらいたい」
2730 = "「Tôi muốn em cứ thoải mái chọn thứ mình thích nhất, thứ mà em không cho là không biết lượng sức, mà không cần phải bận tâm đến giá cả」"
# 【凪】
# display as 凪
# JP: 「にーさん、\nそぎゃん大判ぶるまいばできるほど、お金持ちと？」
2631 = "「Anh hai, giàu đến mức có thể vung tiền hào phóng thế á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、ぬ」
2495 = "「Ư, ừm」"
# monologue
# JP: ……8620が完全復活し、僕も御一夜鉄道と、\n一般的なまいてつ契約を締結するようになった。
1766 = "……8620 đã hoàn toàn hồi sinh, và tôi cũng đã ký kết hợp đồng Maitetsu thông thường với Đường sắt Ohito."
# monologue
# JP: 維持費負担と使用料収入は相殺程度だし、規定通りの\n機関士給与がいくらかを、助士たる凪は知っている。
3778 = "Chi phí bảo trì và thu nhập từ phí sử dụng chỉ bù trừ cho nhau, và Nagi, với tư cách là phụ lái tàu, biết rõ mức lương của Lái tàu theo quy định là bao nhiêu."
# 【双鉄】
# display as 雙鐵
# JP: 「お金持ちとは、とうてい言えんな」
2877 = "「Tuyệt đối không thể gọi là giàu có được」"
# 【凪】
# display as 凪
# JP: 「やけん、水着はやっぱり安くてよかとを探すばい！\nで、次のデートがちょっとでも早くなったら嬉しかと」
2747 = "「Nên là, vẫn phải tìm đồ bơi vừa rẻ vừa đẹp á! Như vậy, nếu buổi hẹn hò tiếp theo có thể đến sớm hơn dù chỉ một chút thì em cũng vui lắm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2776 = "「À——」"
# monologue
# JP: 確かにだ。稼ぎ以上に使ってしまえば、\nより稼ぐため、働く時間を増やすしかない。
3764 = "Đúng là vậy. Nếu tiêu xài vượt quá mức kiếm được, thì chỉ còn cách tăng thời gian làm việc lên để kiếm thêm tiền."
# monologue
# JP: 節約は、次のデートを早めるため――\n自由時間を増やすことにも、繋がるのだ。
3808 = "Tiết kiệm là để buổi hẹn hò tiếp theo đến sớm hơn—— Cũng đồng nghĩa với việc tăng thêm thời gian tự do."
# 【双鉄】
# display as 雙鐵
# JP: 「凪はときおり、驚かされるほど賢いな」
2792 = "「Nagi đôi khi, thông minh đến mức khiến tôi phải kinh ngạc đấy」"
# 【凪】
# display as 凪
# JP: 「やけん！　そぎゃんとほめたら照れくさか――\nって、ん？　凪様、あんまほめられてなかと？」
3004 = "「Thì á! Khen như vậy ngại lắm á—— Ủa, hửm? Nagi-sama, không được khen nhiều lắm á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大いにほめている。\n普段の理屈をコネない凪も、僕は大好きだからな」
2728 = "「Đang khen ngợi hết lời đấy chứ. Vì tôi cũng rất thích một Nagi không hay viện cớ như thường ngày mà」"
# 【凪】
# display as 凪
# JP: 「い、いまも理屈ばコネてなかとよー。\nただ思ったこと、当たり前のことば言うただけばい」
2435 = "「B, bây giờ em cũng có viện cớ gì đâu á. Chỉ là nói ra những gì mình nghĩ, những điều hiển nhiên thôi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこが、賢い」
2955 = "「Chỗ đó mới là thông minh đấy」"
# monologue
# JP: さっきの失敗の経験もある。\n軽くさささと頭を撫でる。
3648 = "Rút kinh nghiệm từ thất bại lúc nãy. Tôi nhẹ nhàng xoa đầu em."
# monologue
# JP: 髪をわずかに撫ぜていく感触がかえって心地よいのか、\n凪の瞳がひととき、細まる。
3866 = "Cảm giác vuốt ve nhè nhẹ lên mái tóc có lẽ lại mang đến sự dễ chịu, đôi mắt Nagi nheo lại trong chốc lát."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……となると、より難しいな。\n古着の水着は、僕としてはできれば避けたいし」
2276 = "「Nhưng mà……nếu vậy thì, lại càng khó khăn hơn nhỉ. Tôi thì nếu được muốn tránh mua đồ bơi cũ」"
# 【凪】
# display as 凪
# JP: 「そいば、探しとったときも聞いたけど、\n一年で着れんかもしれんよーになるもんやけん」
2667 = "「Cái đó, lúc nãy đi tìm em cũng nghe anh nói rồi, nhưng có khi sang năm là không mặc được nữa đâu á」"
# 【双鉄】
# display as 雙鐵
# JP: 「その点はわかるのだが――」
2950 = "「Điểm đó thì tôi hiểu, nhưng mà——」"
# monologue
# JP: 人通りがある。\n凪の耳元に口を寄せる。
3444 = "Có người qua lại.\nTôi ghé sát miệng vào tai Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「……水着姿の凪を、僕は恐らく舐めたくなる」
1778 = "「……Có lẽ tôi sẽ muốn liếm láp Nagi trong bộ đồ bơi đấy」"
# 【凪】
# display as 凪
# JP: 「ふぁっ！？」
2462 = "「Hya!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それも、きわどい部分ほどを、だ。ゆえ、\n誰の肌に触れたかもわからんものは、洗ってあっても」
2852 = "「Hơn nữa, lại là ở những bộ phận nhạy cảm nữa. Cho nên, những thứ không biết đã chạm vào da thịt ai, dù có giặt sạch rồi thì」"
# 【凪】
# display as 凪
# JP: 「あわわわわっ」
2453 = "「Á á á á」"
# monologue
# JP: 飛び退き、真っ赤になって手を振る。
3401 = "Em nhảy lùi lại, mặt đỏ bừng và xua tay rối rít."
# 【凪】
# display as 凪
# JP: 「そ、そぎゃんとこまで考えてなかったとー！\nにーさん、変態！　変態とばい！！」
2432 = "「E, em chưa nghĩ đến mức đó đâu á! Anh hai, đồ biến thái! Đồ biến thái á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　変態か？\nしかし惚れた女の水着姿であるのなら」
2587 = "「Hửm? Biến thái sao? Nhưng nếu là dáng vẻ mặc đồ bơi của người con gái mình yêu thì」"
# 【凪】
# display as 凪
# JP: 「わーわー！　わかった！　わかったけん！！\n水着の古着はよしとくけんっ！！」
2655 = "「Oa oa! Em biết rồi! Em hiểu rồi á!! Em sẽ bỏ qua vụ mua đồ bơi cũ á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。\nが、そうなると更に選択肢が減る」
2987 = "「Thế thì đỡ quá. Nhưng, như vậy thì lựa chọn lại càng ít đi」"
# 【凪】
# display as 凪
# JP: 「あー」
2529 = "「Aaa」"
# monologue
# JP: ぴたりと、凪の動きが止まる。
3348 = "Nagi chợt khựng lại."
# 【凪】
# display as 凪
# JP: 「これ以上どぎゃんとこ探したら良かとか、\nさっぱり思いつかんとよー」
2660 = "「Tìm ở đâu nữa thì được đây, em hoàn toàn không nghĩ ra được chỗ nào nữa á」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。ううむ……\nこういうときだけは、いささか帝都が恋しくなるな」
2716 = "「Tôi cũng vậy. Ừm…… Chỉ những lúc thế này, tôi mới thấy nhớ Đế đô một chút」"
# 【凪】
# display as 凪
# JP: 「帝都ば、やっぱりそぎゃんと凄かと？」
2684 = "「Đế đô, quả nhiên là tuyệt vời đến thế á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、凄い。隈元レベルや、それ以上の規模の街が、\n山之手線沿線にはいくつもいくつも存在している」
2571 = "「Ừ, tuyệt lắm. Những khu phố có quy mô ngang ngửa hoặc hơn cả Kumamoto, tồn tại vô số dọc theo tuyến Yamanote」"
# 【凪】
# display as 凪
# JP: 「わわわ、想像もつかんとばい！」
2461 = "「Oa oa, không thể tưởng tượng nổi luôn á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その分、競争も激しい。\n開店し、一年持たず消えていく店などもザラと聞く」
2616 = "「Bù lại, cạnh tranh cũng rất khốc liệt. Nghe nói những cửa hàng vừa mở chưa đầy một năm đã đóng cửa là chuyện thường ngày」"
# 【凪】
# display as 凪
# JP: 「ご新規さんは生き残れんと？」
2758 = "「Người mới đến không thể sống sót được á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「工夫がなければ、埋没するだろうな。\nゆえ、新規のサービスなども生まれやすい」
2258 = "「Nếu không có sự đổi mới, thì sẽ bị chôn vùi thôi. Do đó, những dịch vụ mới cũng rất dễ được sinh ra」"
# 【凪】
# display as 凪
# JP: 「どぎゃんサービスと？」
2305 = "「Dịch vụ gì á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、午前に注文したものであれば、\nその日のうちに自宅宅配をする……な……ど」
2818 = "「Ví dụ như, nếu đặt hàng vào buổi sáng, thì sẽ được giao đến tận nhà ngay trong ngày hôm đó……chẳng……hạn」"
# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃんしたと？」
2633 = "「Anh hai, sao vậy á?」"
# monologue
# JP: 凪が、僕の目の前でひらひら手を振る。\nいーっと変な顔をする。
3341 = "Nagi huơ huơ tay trước mặt tôi. Rồi làm mặt hề trêu chọc."
# monologue
# JP: おでこをコツン、とひとたたき。\nそれからきょろきょろ、周囲を見回す。
3491 = "Em gõ nhẹ một cái cốc lên trán tôi. Sau đó ngó ngoáy, nhìn ngó xung quanh."
# monologue
# JP: （おもしろいな、暫く放置してみよう）
4054 = "（Thú vị thật, thử để yên một lúc xem sao）"
# monologue
# JP: 耳が引かれる。\nほっぺたをつんつんつつかれる。
3493 = "Tai bị kéo.\nMá bị chọc chọc."
# monologue
# JP: それから凪はまたキョロキョロして――っ！？
3719 = "Sau đó Nagi lại ngó ngoáy xung quanh——!?"
# 【凪】
# display as 凪
# JP: 「ちゅ」
2545 = "「Chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「わっ！？」
# 2462 = "「哇？！」" 
# 【凪】
# display as 凪
# JP: 「わわわ！　ホントにキスで目ば覚めたばい！」
2457 = "「Oa oa oa! Thật sự tỉnh dậy bằng nụ hôn luôn á!」"
# monologue
# JP: なんとも、乙女なことを言う。\n可愛らしいし、守りたい。
3919 = "Nói ra những lời thật thiếu nữ làm sao. Thật đáng yêu, và tôi muốn bảo vệ em."
# monologue
# JP: ここは素直に、凪の気持ちに乗っておこう。
3779 = "Lúc này cứ ngoan ngoãn nương theo cảm xúc của Nagi thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。いいアイディアを思いついた――\nというか、自分の間抜けさにショックを受けていた」
2754 = "「Xin lỗi nhé. Tôi vừa nảy ra một ý tưởng hay—— Hay nói đúng hơn là, tôi đang bị sốc trước sự ngốc nghếch của bản thân」"
# 【凪】
# display as 凪
# JP: 「いいアイディア！？　どぎゃんと！」
2643 = "「Ý tưởng hay!? Ý tưởng gì á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「まずは移動だ。レールショップに。\nそこで恐らく、僕らの問題は大きく解決に近づける」
2724 = "「Trước tiên là di chuyển đã. Đến Rail Shop. Ở đó, có lẽ vấn đề của chúng ta sẽ tiến gần hơn đến việc được giải quyết」"
# 【凪】
# display as 凪
# JP: 「なーるほーどばーい！」
2648 = "「Ra là thế á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、だな」
2809 = "「Quả nhiên là vậy」"
# monologue
# JP: 貸与を受けている職場ＰＣ。
3604 = "Chiếc máy tính làm việc được cấp phát."
# monologue
# JP: 職務時間外の私的利用も、\n公序良俗に反さぬ範囲で、認められている。
3267 = "Việc sử dụng cho mục đích cá nhân ngoài giờ làm việc, trong phạm vi không vi phạm thuần phong mỹ tục, cũng được cho phép."
# 【凪】
# display as 凪
# JP: 「ネットショップやら、\nめっちゃくっちゃいろんな水着ばあるとねー」
2888 = "「Mấy cái cửa hàng trên mạng này, có vô vàn đủ loại đồ bơi luôn á」"
# 【双鉄】
# display as 雙鐵
# JP: 「世界中とネットワークで繋がっているそうだからな。\n保守に必要な資材の発注なども、こうして行う」
2858 = "「Nghe nói là được kết nối mạng với toàn thế giới mà. Việc đặt hàng vật tư cần thiết cho bảo trì cũng được thực hiện theo cách này」"
# 【凪】
# display as 凪
# JP: 「ほいでにーさん、こぎゃん凄かことできるとねー。\nウチ、こぎゃんとはサッパリばい！」
2627 = "「Mà anh hai, làm được mấy việc tuyệt vời như thế này luôn á. Em thì mù tịt mấy cái này á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕とて凪とそう変わらんぞ。\n仕事で覚えた範囲のこと以外は、まるでこなせん」
2738 = "「Tôi cũng chẳng khác Nagi là mấy đâu. Ngoài những gì học được trong công việc ra, thì tôi hoàn toàn mù tịt」"
# 【凪】
# display as 凪
# JP: 「これだけできれば十分とばい。\nあ！　次のページみたかと」
2960 = "「Chỉ cần làm được thế này là đủ rồi á. A! Em muốn xem trang tiếp theo á」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2565 = "「Ừm」"
# monologue
# JP: " 次のページ ＞ "\nとの表示をクリック。
3 = "Tôi click vào dòng chữ\n\" Trang tiếp theo > \"."
# monologue
# JP: またずらずらと、\n色とりどりの女性水着が一瞬にして表れる。
3938 = "Lại một loạt, những bộ đồ bơi nữ đủ màu sắc hiện ra trong chớp mắt."
# 【凪】
# display as 凪
# JP: 「……んー……\nにーさんは、どぎゃん水着が大人っぽいって思うと？」
1782 = "「……Ừm…… Anh hai nghĩ đồ bơi như thế nào thì trông chững chạc á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「特に考えたことはない」
2736 = "「Tôi chưa từng nghĩ đến chuyện đó」"
# 【凪】
# display as 凪
# JP: 「そぎゃん言い方なかとばい！\nもっと親身になって考えてほしかとよー」
2379 = "「Sao anh lại nói thế á! Em muốn anh nghĩ nghiêm túc hơn một chút á」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪が望むならそうしよう。\nううむ――そう、だな……」
2994 = "「Nếu Nagi muốn thế thì cứ làm vậy đi. Ừm——Đúng rồi, nhỉ……」"
# monologue
# JP: どのような女性水着が大人っぽいか……\n考えるのだが、まるでイメージが湧いて来ぬ。
3642 = "Đồ bơi nữ như thế nào thì trông chững chạc…… Tôi cố suy nghĩ, nhưng hoàn toàn không mường tượng ra được gì."
# monologue
# JP: どうしたら……いや、凪のお祖母様を見習って、\nここは、がらりと視点を変えよう。
3572 = "Phải làm sao đây……Không, học theo bà nội của Nagi, lúc này, hãy thử thay đổi hoàn toàn góc nhìn xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「……学園指定の水着。あれは、\n大人っぽいとは正反対にあるものかと思う」
1793 = "「……Đồ bơi quy định của trường. Bộ đó, tôi nghĩ là trái ngược hoàn toàn với sự chững chạc đấy」"
# 【凪】
# display as 凪
# JP: 「そりゃあそーばい」
2860 = "「Đương nhiên là vậy rồi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、だ。学園指定の水着の逆を考えれば、\n大人っぽさを追求できるのではないかと思う」
2745 = "「Do đó. Nếu nghĩ ngược lại với đồ bơi của trường, tôi nghĩ chúng ta có thể tìm ra được sự chững chạc」"
# 【凪】
# display as 凪
# JP: 「なるほどばい！　さすがにーさん、\nなかなか頭のよかとばい！」
2797 = "「Ra là thế á! Quả không hổ danh anh hai, đầu óc cũng nhanh nhạy lắm á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「お褒めに預かり、光栄だ」
2920 = "「Được em khen, thật là vinh hạnh」"
# 【凪】
# display as 凪
# JP: 「したらしたら、考えるとばーい！」
3001 = "「Vậy thì vậy thì, cùng suy nghĩ thôi á!」"
# monologue
# JP: 慣れた手つきでプリンタトレーを抜き出して、\n凪は、そこからコピー用紙を一枚取り出す。
3363 = "Với động tác quen thuộc, Nagi kéo khay máy in ra, và lấy từ đó một tờ giấy A4."
# 【凪】
# display as 凪
# JP: 「学園指定の水着について、\nにーさんのイメージ、どんどん言うばい」
3009 = "「Về đồ bơi quy định của trường, anh hai cứ nói hết những gì mình nghĩ ra đi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「まずは、色だな。あの、独特の濃い紺色。\nそれから形……ワンピーススタイル、でいいのか？」
3018 = "「Trước tiên, là màu sắc. Cái màu xanh đen đậm đặc trưng đó. Sau đó là kiểu dáng……Kiểu áo liền quần, đúng không nhỉ?」"
# 【凪】
# display as 凪
# JP: 「疑問はあとばい！　\nどんどんどんどん続けていくばい！」
2790 = "「Thắc mắc để sau á!\nCứ tiếp tục, tiếp tục nói đi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。――生地が、かなり厚ぼったい。\n水着にしては、肌を覆う面積が広く思える」
2652 = "「Rõ rồi. ——Chất vải khá dày. So với đồ bơi thì diện tích che phủ da thịt có vẻ rộng」"
# 【凪】
# display as 凪
# JP: 「ふむふむ」
2566 = "「Ừm ừm」"
# monologue
# JP: 自分の言葉が、凪のかわいい丸文字で、\nするする紙へと落とされていく。
3369 = "Lời nói của tôi, được Nagi viết thoăn thoắt xuống giấy bằng những nét chữ tròn trịa đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「あとは……匂いか。塩素の匂いが染み込んでいる。\n味も、匂いの影響を強くうけるせいか――」
2847 = "「Còn lại là……mùi hương chăng. Bị ám mùi clo. Vị cũng vậy, có lẽ do chịu ảnh hưởng mạnh từ mùi hương nên——」"
# 【凪】
# display as 凪
# JP: 「にーさーん？」
2636 = "「Anh haiii?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2585 = "「Hửm?」"
# monologue
# JP: 呆れた声に顔をあげれば、\n凪はディスプレイを指差し示す。
3837 = "Ngẩng mặt lên khi nghe thấy giọng nói chán nản đó, tôi thấy Nagi đang chỉ tay vào màn hình."
# 【凪】
# display as 凪
# JP: 「味とか匂いば、こん画面からじゃわからんばい」
2424 = "「Vị với mùi thì, nhìn qua màn hình này sao mà biết được á」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。では、見た目やスペック面のことに\n絞って――ああ、もうひとつ思いついたぞ」
2879 = "「Đúng là vậy. Vậy thì, chỉ tập trung vào ngoại hình và thông số kỹ thuật thôi——A, tôi nghĩ ra một cái nữa rồi」"
# 【凪】
# display as 凪
# JP: 「なにばい？」
2308 = "「Gì á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「弾性に富む、ということだ。\nつまり、引っ張るとよく伸びる」
2663 = "「Rất đàn hồi.\nTức là, kéo ra thì rất co giãn」"
# 【凪】
# display as 凪
# JP: 「なるほどばい！　他には？」
2878 = "「Ra là thế á! Còn gì nữa á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「他……か、うーむ」
3011 = "「Còn gì nữa……sao, ừm」"
# monologue
