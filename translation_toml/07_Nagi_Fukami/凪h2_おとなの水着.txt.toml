1756 = "……Tôi nhắm mắt lại suy nghĩ. Nhưng, những gì hiện lên trong đầu là……"
# 【双鉄】
# display as 雙鐵
# JP: 「思いつかんな。\n僕は、学園指定の水着にさほど興味がないらしい」
2720 = "「Không nghĩ ra được gì nữa. Có vẻ tôi không mấy hứng thú với đồ bơi của trường」"
# 【凪】
# display as 凪
# JP: 「それにしちゃスラスラでてきたばい！」
2388 = "「Vậy mà nãy giờ anh nói trôi chảy thế á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは単に、凪とふかみとの強い思い出が\n染み付いている品だからだ」
2952 = "「Đó đơn giản là vì, nó là món đồ thấm đẫm những kỷ niệm sâu sắc giữa tôi, Nagi và Fukami thôi」"
# 【凪】
# display as 凪
# JP: 「ふあっ」
2452 = "「Phù a」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、今必死に思い出そうとしてみたのだが、\n思い出せるのはそこから先、凪とふかみの」
2743 = "「Do đó, nãy giờ tôi đã cố gắng hết sức để nhớ lại, nhưng những gì tôi có thể nhớ được từ đó trở đi, là của Nagi và Fukami」"
# 【凪】
# display as 凪
# JP: 「わーわーわー！　おしっこ飛ばし競争のこととか\n思い出したらいけんばい！！」
2455 = "「Oa oa oa! Chuyện thi tè xa các thứ không được nhớ lại đâu á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む、そうか。ならばそこは思い出すまい」
2504 = "「Hừm, vậy sao. Nếu vậy thì tôi sẽ không nhớ lại đoạn đó nữa」"
# 【凪】
# display as 凪
# JP: 「そ、それならよかとよー」
2970 = "「Th, thế thì được á」"
# monologue
# JP: というか、そこまではまだ思い返していなかった。
3697 = "Mà nói đúng hơn, tôi vẫn chưa nhớ đến đoạn đó."
# monologue
# JP: まっさきにそれが浮かんだのなら、凪にとって、\nあの競争は、よほど色濃い思い出なのだろう。
3343 = "Nếu đó là điều hiện lên đầu tiên trong đầu, thì đối với Nagi, cuộc thi đó hẳn là một kỷ niệm vô cùng sâu sắc."
# 【凪】
# display as 凪
# JP: 「まぁ、ここまででも十分と！\nだいたいのとこはわかったとばい」
2569 = "「Mà, đến đây cũng đủ rồi á!\nĐại khái là em hiểu rồi á」"
# monologue
# JP: 紙の上、しゅっしゅと線が引かれていく。
3404 = "Trên mặt giấy, những đường gạch ngang xoèn xoẹt được vẽ ra."
# monologue
# JP: あっという間に、リストが表に変えられる。\n「こどもっぽい」と「おとなっぽい」との。
3559 = "Chớp mắt, danh sách đã biến thành một bảng so sánh. Giữa \"trẻ con\" và \"chững chạc\"."
# 【凪】
# display as 凪
# JP: 「濃か[こんいろ,1]紺色の反対は――\n薄か[しゅいろ,1]朱色とかその辺ばい？」
2838 = "「Ngược lại với màu xanh đen đậm là—— Màu đỏ chu sa nhạt hay gì đó cỡ đó á?」"
# monologue
# JP: なるほど、わかりよいやり方だ。\n僕も真剣に考えよう。
3451 = "Ra vậy, một cách làm rất dễ hiểu. Tôi cũng sẽ suy nghĩ nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「……むしろ、濃い色自体の反対を考えるべきでは？\n原色などはどの色であれ、年若い印象が強い気がする」
1797 = "「……Đúng hơn là, nên nghĩ ngược lại với bản thân màu đậm thì sao? Những màu cơ bản, dù là màu gì đi nữa, tôi có cảm giác đều mang lại ấn tượng trẻ trung」"
# 【凪】
# display as 凪
# JP: 「おおお、納得ばい！　なんかにーさんすごかとね！\n日々姫ねーちゃんみたいでカッコよかばい！」
2607 = "「Oa, nghe có lý á! Sao anh hai giỏi thế á! Ngầu như chị Hibiki luôn á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「門前の小僧、習わぬ経を読むというヤツだ。\nともかく、その伝でいくのなら、選ぶべきは」
2956 = "「Gần mực thì đen, gần đèn thì sáng thôi. Dù sao thì, nếu đi theo hướng đó, thứ chúng ta nên chọn là」"
# 【凪】
# display as 凪
# JP: 「色のついて無か色ばい！　　ん？　色が無い、色？\nって、あれ？　なんか日ノ本語がおかしかと！」
2260 = "「Màu không có màu á! Hửm? Màu không có, màu? Ủa, khoan? Tiếng Hinomoto sao nghe kỳ kỳ á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうときは『[いろど]彩りの無い色』といえばいい。\n無彩色――これも、日々姫の受け売りだがな」
2962 = "「Những lúc thế này cứ nói là 『Màu không có sắc độ』 là được. Màu vô sắc——Cái này, cũng là tôi học mót từ Hibiki thôi」"
# 【凪】
# display as 凪
# JP: 「おお、日ノ本語、奥のふかかとばーい！」
2613 = "「Oa, tiếng Hinomoto, thâm thúy thật á!」"
# monologue
# JP: いきおいよく、凪が紙へと書き足していく。
3397 = "Nagi hăng hái viết thêm vào tờ giấy."
# monologue
# JP: 『いろどりのない色（むさい色）』
3196 = "『Màu không có sắc độ (Màu vô sắc)』"
# monologue
# JP: ……むさい、色。\n帝大時代の友人の、六畳一間が脳裏に浮かぶ。
1759 = "……Màu vô sắc. Căn phòng sáu chiếu của người bạn thời Đại học Hoàng gia chợt hiện lên trong tâm trí tôi."
# monologue
# JP: 着古しきったＴシャツの、もとは白だったあの色こそ、\nまさしく、むさい色だろう。
3924 = "Màu sắc của chiếc áo thun cũ kỹ, vốn dĩ là màu trắng ấy, đích thị là màu vô sắc rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、つまりは白とか黒とか、グレーなどのことだな」
2582 = "「Chà, tóm lại là màu trắng, màu đen, hay màu xám các loại đấy」"
# monologue
# JP: 妙なイメージを払うためにも、言葉にしてみる。
3768 = "Để xua đi hình ảnh kỳ quặc đó, tôi nói thành lời."
# monologue
# JP: 凪はふむふむ捕捉も書き足し、\n自信満々な笑顔を浮かべ、パ、とその顔を持ち上げる。
3393 = "Nagi gật gù viết thêm phần bổ sung, rồi nở nụ cười đầy tự tin, ngẩng mặt lên."
# 【凪】
# display as 凪
# JP: 「次のはわかりやすかとよ！\nワンピースの反対は、ビキニばい！」
2254 = "「Cái tiếp theo dễ hiểu lắm á! Ngược lại với áo liền quần, là bikini á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2782 = "「是嗎？」" 
# 【凪】
# display as 凪
# JP: 「そうばい！　で。厚いの反対は薄いで、\n面積が広いの反対は、面積が狭いばい！」
2775 = "「Đúng á! Rồi. Ngược lại với dày là mỏng, ngược lại với diện tích rộng là diện tích hẹp á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その点、まったく異論はない」
2957 = "「Về điểm đó, tôi hoàn toàn không có ý kiến gì」"
# 【凪】
# display as 凪
# JP: 「で、で！　引っ張っても伸びるの反対は、\n引っ張っても伸びづらい、ぴっちぴちいうことばい！」
2849 = "「Rồi, rồi! Ngược lại với kéo ra thì co giãn là, kéo ra khó co giãn, tức là chật ních á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなるほど」
2572 = "「Ra là thế, ra là thế」"
# 【凪】
# display as 凪
# JP: 「凪さま！　これでどぎゃん水着ば探せばよかとか\nわかったばい！」
2805 = "「Nagi-sama! Vậy là đã biết phải tìm đồ bơi như thế nào rồi á!」"
# monologue
# JP: 言うやいなやで凪はPCにへばりつき、\nけれどもすぐに、小首をかしげてきいてくる。
3885 = "Nói xong Nagi liền dán mắt vào máy tính, nhưng ngay lập tức, em nghiêng đầu hỏi tôi."
# 【凪】
# display as 凪
# JP: 「“次のページ”やら、どぎゃんすれば見れっと？」
2699 = "「Mấy cái \"Trang tiếp theo\", làm sao để xem được á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、簡単だ。まずはこのマウスを」
2471 = "「À, đơn giản thôi. Trước tiên là con chuột này」"
# 【凪】
# display as 凪
# JP: 「ぁ」
# 2529 = "「啊」" 
# monologue
# JP: 小さく――確かな、おんなの声。\n凪の匂いが、これほど近い。
3834 = "Giọng nói nhỏ nhẹ——nhưng đích thực là của một người phụ nữ. Mùi hương của Nagi, lại gần đến thế này."
# monologue
# JP: （ああ――そうだよな）
4023 = "（A——Đúng rồi nhỉ）"
# monologue
# JP: マウス操作を教えるために、\n僕の右手は凪の右手に――小さな右手に重なっている。
3769 = "Để dạy em cách dùng chuột, tay phải của tôi đang đặt lên tay phải của Nagi——bàn tay phải nhỏ bé ấy."
# monologue
# JP: 体も、ほとんど密着している。\n凪の頭が、僕の鼻先のすぐ前にある。
3600 = "Cơ thể, cũng gần như áp sát vào nhau. Đầu của Nagi, đang ở ngay trước mũi tôi."
# 【凪】
# display as 凪
# JP: 「あ、あの――にーさん？\nどぎゃん……したら、よか――と？」
2969 = "「A, à——Anh hai?\nLàm……thế nào, thì được——á?」"
# monologue
# JP: ずくん、と。\n体が熱くなる。
3678 = "Giật thót.\nCơ thể tôi nóng ran."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは――ああ、いや」
3017 = "「Trước tiên là——A, không」"
# monologue
# JP: 防犯カメラ。\nその存在を思い出し、危うい欲求を食い止める。
3728 = "Camera an ninh. Nhớ đến sự tồn tại của nó, tôi kìm hãm lại dục vọng nguy hiểm đang dâng trào."
# monologue
# JP: “したらよかと”は無数に思いつくけれど、\nまずは、目の前のひとつをこなそう。
3658 = "Có vô số điều \"Làm thế nào thì được\" hiện ra trong đầu, nhưng trước mắt, hãy giải quyết việc này đã."
# 【双鉄】
# display as 雙鐵
# JP: 「画面にやじるしがあるだろう。それを見ながら、\nこの装置――マウスを一緒に動かしてみよう」
2859 = "「Trên màn hình có mũi tên đúng không. Vừa nhìn nó, vừa thử cùng di chuyển thiết bị này——con chuột xem sao」"
# 【凪】
# display as 凪
# JP: 「お――おおお！？\n画面のやじるしも動いたばい！」
2605 = "「O——Ooo!?\nMũi tên trên màn hình cũng di chuyển rồi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、このやじるしを、画面上、\n『次のページ』にもっていって、ここを、カチっ」
2848 = "「Rồi, đưa mũi tên này, trên màn hình, đến chữ 『Trang tiếp theo』, rồi click vào đây」"
# 【凪】
# display as 凪
# JP: 「わわわ！　ホントに次のページになったばい！」
2458 = "「Oa oa oa! Chuyển sang trang tiếp theo thật rồi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「これが、一番基本の動作。『左クリック』だ」
2958 = "「Đây là, thao tác cơ bản nhất. 『Click chuột trái』」"
# 【凪】
# display as 凪
# JP: 「左クリック！　すごかとねー！\n凪さま、インターネットの使い方覚えたばい！」
2554 = "「Click chuột trái! Giỏi quá á! Nagi-sama, đã học được cách dùng Internet rồi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう少しだけ覚えてみよう」
2978 = "「Thử học thêm một chút nữa nhé」"
# 【凪】
# display as 凪
# JP: 「のぞむとこばい！」
# 2648 = "「好咧！」" 
# monologue
# JP: 凪はPCに夢中になってる。\n夢中になれば、凪ゆえに、体が自然と動き出す。
3360 = "Nagi đang say sưa với máy tính. Một khi đã say sưa, thì vì là Nagi nên cơ thể sẽ tự nhiên chuyển động theo."
# monologue
# JP: （もぞ、もぞ、ぐい、ぐい）
4059 = "（Ngọ nguậy, ngọ nguậy, cọ cọ, cọ cọ）"
# monologue
# JP: 小さい、かわいい、太陽の匂いがする、あたたかい。\nそれだけで、僕をこれほど幸せにする。
3484 = "Nhỏ bé, đáng yêu, mang mùi hương của mặt trời, ấm áp. Chỉ bấy nhiêu thôi, cũng đủ khiến tôi hạnh phúc đến nhường này."
# 【凪】
# display as 凪
# JP: 「進んで戻って決めて取り消せるようになったばい！\nこれで、インターネットでお買い物できっと？」
2439 = "「Em đã biết tiến, lùi, chọn và hủy rồi á! Thế này là, có thể mua sắm trên Internet được rồi á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。品物選びまでなら十分だ。\n決済は僕がするので、決めるまでは凪が操作してくれ」
2778 = "「Đúng vậy. Chỉ cần chọn đồ thì thế là đủ rồi. Việc thanh toán tôi sẽ lo, nên cho đến lúc quyết định xong thì Nagi cứ thao tác đi」"
# 【凪】
# display as 凪
# JP: 「まーかせろばい！　ってことで、\nにーさんはちょこっとあっちいってて欲しかとばい」
2650 = "「Cứ để em lo á! Nên là, em muốn anh hai đi ra chỗ khác một chút á」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっちとは？」
# 2839 = "「為什麼？」" 
# 【凪】
# display as 凪
# JP: 「んー、そぎゃんいわれると困るばってん」
2509 = "「Ưm, anh nói vậy em cũng khó xử lắm á」"
# monologue
# JP: きょろきょろ、凪の瞳がさまよう。
3374 = "Đôi mắt Nagi đảo quanh, ngó ngoáy."
# 【凪】
# display as 凪
# JP: 「んっと……選んでるちょっとの間、\nお茶いれてたり、他のお仕事とかしててほしかとよ」
2494 = "「Ưm……Trong lúc em đang chọn, em muốn anh đi pha trà, hay làm việc khác gì đó á」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ？」
# 2839 = "「為什麼？」" 
# 【凪】
# display as 凪
# JP: 「何故って、そんなんわかろーもん」
2701 = "「Tại sao á, chuyện đó thì phải tự hiểu chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2511 = "「唔？」" 
# monologue
# JP: 考えてみるが、本気でわからん。\nぷくぷくと、凪のほっぺたがふくらみ、育つ。
3585 = "Tôi thử suy nghĩ, nhưng thực sự không hiểu. Hai má Nagi phồng lên, trông như đang dỗi."
# 【凪】
# display as 凪
# JP: 「……新しい水着、カタログで見てて嬉しかと？\nウチが着とーとばみて、びっくりしたくなかと？」
1781 = "「……Nhìn đồ bơi mới trên catalogue thì có gì vui á? Anh không muốn bất ngờ khi thấy em mặc nó á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　理解した。\n確かに、新鮮味が強い方がうれしいな」
2467 = "「A! Tôi hiểu rồi. Đúng là, cảm giác mới mẻ mãnh liệt thì sẽ vui hơn nhỉ」"
# 【凪】
# display as 凪
# JP: 「でしょお！」
# 2771 = "「是吧！」" 
# monologue
# JP: にっこり笑えば、声も弾む。\n凪は、どこまでも一直線だ。
3390 = "Khi em cười tươi, giọng nói cũng trở nên rộn ràng. Nagi, lúc nào cũng thẳng thắn như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば……そうだな、機関庫で」
2999 = "「Nếu vậy……để xem nào, ở xưởng đầu máy」"
# 【凪】
# display as 凪
# JP: 「ダメばいイケンばいそりゃなかとばい！！」
2269 = "「Không được á không được á thế thì không được đâu á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2511 = "「唔？」" 
# 【凪】
# display as 凪
# JP: 「せっかくのデートやけん、\n離れ離れになるのは……ちょっと、寂しかとよ」
3015 = "「Mãi mới được hẹn hò mà,\nphải xa nhau thì……hơi buồn á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。うむ。そうだな」
2469 = "「À. Ừm. Đúng vậy nhỉ」"
# monologue
# JP: たとえ別々のことをするのだとしても、\n近くにいる、ただそれだけで意味はある。
3424 = "Cho dù có làm những việc khác nhau, nhưng chỉ cần ở cạnh nhau thôi, cũng đã có ý nghĩa rồi."
# monologue
# JP: いきづかい、匂い、ぬくもり――\n微かに感じるだけであっても、幸せだから。
3422 = "Hơi thở, mùi hương, hơi ấm—— Dù chỉ cảm nhận được một chút thôi, cũng đủ thấy hạnh phúc rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はお茶を淹れ。その後は……そうだな、\nヘッドマーク缶バッジでも作っていよう」
2992 = "「Nếu vậy tôi sẽ đi pha trà. Sau đó thì……để xem nào, chắc tôi sẽ làm vài cái huy hiệu biểu trưng đầu tàu vậy」"
# 【凪】
# display as 凪
# JP: 「わかったばい。なるべく早くに選ぶけんねー」
2646 = "「Em hiểu rồi á. Em sẽ cố gắng chọn thật nhanh á」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2565 = "「嗯」" 
# monologue
# JP: ＜手すきのときにはお願いします＞
4078 = "<Lúc nào rảnh rỗi xin nhờ anh làm giúp>"
# monologue
# JP: ポーレットの字が見守る箱から、図柄、フィルム、\nそしてブランクの缶バッジを出す。
3636 = "Từ chiếc hộp có nét chữ của Paulette đang trông chừng, tôi lấy ra hình mẫu, màng bọc, và cả những chiếc huy hiệu trống."
# monologue
# JP: 缶バッジに、図柄、フィルムを重ねてセットし――
3534 = "Xếp hình mẫu, màng bọc lên huy hiệu rồi đặt vào máy——"
# monologue
# JP: （ガチャンっ！！）
4022 = "（Cạch!!）"
# monologue
# JP: 缶バッジ機でプレスをすれば、\nきれいな缶バッジができあがる。
3459 = "Dùng máy dập huy hiệu ép xuống, thế là một chiếc huy hiệu xinh xắn đã hoàn thành."
# monologue
# JP: 御一夜鉄道オリジナル缶バッジ。ひとつ四百円。\n地味ではあるが、これも大切な収入源だ。
3568 = "Huy hiệu nguyên bản của Đường sắt Ohito. Một cái bốn trăm yên. Tuy giản dị, nhưng đây cũng là một nguồn thu nhập quan trọng."
# 【凪】
# display as 凪
# JP: 「んー、これじゃおっきすぎるとねー。\nこっちは、色がついとるばい」
2508 = "「Ừm, cái này thì to quá á. Cái này thì, có màu mất rồi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2495 = "「唔」" 
# monologue
# JP: ……どうやら凪は、\nリストの全てを満たすところを目指すらしい。
1762 = "……Có vẻ như Nagi, đang nhắm đến việc thỏa mãn tất cả các tiêu chí trong danh sách."
# monologue
# JP: 果たしてどんな水着になるか、\n今から僕も、楽しみ――だ！
3664 = "Rốt cuộc sẽ là bộ đồ bơi như thế nào đây, từ bây giờ tôi cũng, rất mong chờ——đấy!"
# monologue
# JP: （ガチャンっ！！）
4021 = "（Cạch!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「……遅いな」
1787 = "「……Lâu quá nhỉ」"
# monologue
# JP: 凪が画像を手で隠し、\n僕が決済したネット通販。
3368 = "Nagi lấy tay che hình ảnh lại, còn tôi thì thanh toán mua hàng trên mạng."
# monologue
# JP: 私物の購入は初めてだったが、ほんの二日で、\n無事に自宅まで届けてもらうことが出来た。
3916 = "Dù là lần đầu tiên mua đồ cá nhân trên mạng, nhưng chỉ mất hai ngày, hàng đã được giao đến tận nhà an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「まさか、事故でも」
3014 = "「Không lẽ, xảy ra tai nạn gì」"
# 【凪】
# display as 凪
# JP: 「おーまたーせばーい！！」
2286 = "「Để anh chờ lâu rồi á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2608 = "「Ồ!」"
# 【凪】
# display as 凪
# JP: 「届いたとばい？」
2946 = "「Giao đến rồi á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これだ。\n早速着替えて見せてくれ」
2574 = "「Ừm. Nó đây.\nMau thay rồi cho tôi xem đi」"
# monologue
# JP: ダンボールごと手渡したなら、\n凪はニヤリと、不敵にも見える笑みを浮かべる。
3628 = "Khi tôi đưa cả thùng các tông cho em, Nagi nở một nụ cười nhếch mép, trông có vẻ táo bạo."
# 【凪】
# display as 凪
# JP: 「早速って、にーさん――\nそぎゃんと凪さまの水着姿ば、見たかと？」
2697 = "「Gì mà mau chứ, anh hai—— Muốn thấy Nagi-sama trong bộ đồ bơi đến thế á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。見たくない筈がない。\nふたりで一緒に、あれだけ模索した大人っぽさだ」
2861 = "「Tất nhiên rồi. Không thể nào không muốn xem được. Sự chững chạc mà hai chúng ta đã cùng nhau cất công tìm kiếm cơ mà」"
# 【凪】
# display as 凪
# JP: 「おおお、にーさんなんだかマジメばい！」
2612 = "「Oa, anh hai trông nghiêm túc ghê á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大真面目だとも。大人っぽい凪がどれほど綺麗か、\n僕は、一刻も早くみたい」
2862 = "「Rất nghiêm túc là đằng khác. Một Nagi chững chạc sẽ xinh đẹp đến nhường nào, tôi muốn được thấy càng sớm càng tốt」"
# 【凪】
# display as 凪
# JP: 「そ、そこまで言われたら照れるとば～い」
2329 = "「B, bị nói đến thế thì ngại lắm á~」"
# monologue
# JP: ダンボールを抱きしめるようにして、\n凪はくるりと一回転――っ！！？
3354 = "Nagi ôm chầm lấy thùng các tông, rồi xoay một vòng——!!?"
# 【凪】
# display as 凪
# JP: 「ひゃあああっ！？」
2416 = "「Hyaaa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！」
2370 = "「Nagi!」"
# monologue
# JP: （がしっ）
4031 = "（Chộp lấy）"
# monologue
# JP: ダンボールが飛ぶ。\n凪をなんとか、支えきる。
3780 = "Thùng các tông bay vèo đi. Tôi khó khăn lắm mới đỡ được Nagi."
# 【凪】
# display as 凪
# JP: 「ふわ……わ、コケるとこだったばい」
2447 = "「Phù……Oa, suýt chút nữa thì ngã á」"
# monologue
# JP: 掴んだ手を引き、抱き寄せる。
3650 = "Tôi kéo bàn tay đang nắm lấy, ôm em vào lòng."
# monologue
# JP: ドッドッド――\n凪の鼓動と僕の鼓動が落ち着かぬまま混じり合う。
3727 = "Thình thịch thình thịch—— Nhịp đập của Nagi và nhịp đập của tôi hòa quyện vào nhau khi chưa kịp bình tĩnh lại."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　痛いところはないか？」
2827 = "「Có sao không? Có bị đau ở đâu không?」"
# 【凪】
# display as 凪
# JP: 「ん……うん！　痛くなかとよー！\nにーさんが素早く抱きとめてくれたけん……」
2491 = "「Ưm……Vâng! Không đau đâu á! Nhờ anh hai nhanh tay ôm lấy em mà……」"
# monologue
# JP: すりすり、頭で甘えてくる。
3497 = "Em cọ cọ đầu vào tôi làm nũng."
# monologue
# JP: ひとしきり僕に匂いをつけて、\nそれから凪は、ゆっくりと――
3483 = "Sau một hồi dụi dụi để lại mùi hương trên người tôi, Nagi chậm rãi——"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2565 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「あっ」
# 2529 = "「啊」" 
# monologue
# JP: 軽いキス。\nなんどもなんども、ただ唇をついばむように。
3437 = "Một nụ hôn nhẹ. Hết lần này đến lần khác, chỉ như đang mổ nhẹ lên môi."
# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちゅ――ちゅっ」
2560 = "「Ưm……Chụt——Chụt——Chụt」"
# monologue
# JP: 体をぎゅっと寄せてくる。\n凪の温度が、僕の体温をさらに高める。
3683 = "Em ép sát cơ thể vào tôi. Nhiệt độ của Nagi càng làm tăng thêm thân nhiệt của tôi."
# 【凪】
# display as 凪
# JP: 「ちゅっ――ちゅむっ――ちゅっ――ん……\nちゅっ――ちゅうっ――ちゅっ」
2548 = "「Chụt——Chụt——Chụt——Ưm……\nChụt——Chụt——Chụt」"
# monologue
# JP: 凪の舌が、密着している唇のあたりを行き来する。
3382 = "Lưỡi của Nagi, lướt qua lại quanh đôi môi đang kề sát."
# monologue
# JP: ノックをしようかするまいか、\n想い人の家の手前で迷う、少女のように。
3542 = "Giống như một thiếu nữ đang phân vân, không biết có nên gõ cửa nhà người mình thương hay không."
# monologue
# JP: （つんっ）
4073 = "（Chọc）"
# 【凪】
# display as 凪
# JP: 「んっ！」
2567 = "「Ưm!」"
# monologue
# JP: こちらから軽くつついてやれば、\n驚いたように凪の舌先は逃げてしまって――
3693 = "Khi tôi chủ động chọc nhẹ vào em, đầu lưỡi Nagi giật mình rụt lại như thể muốn trốn chạy——"
# 【凪】
# display as 凪
# JP: 「ふっ――んっ――ちゅ――ちゅうっ――れるっ――\nちゅむっ――れろっ――れるっ――るっ――ちゅむ」
2425 = "「Phù——Ưm——Chụt——Chụt——Ngoáy—— Chụt——Ngoáy——Ngoáy——Ngoáy——Chụt」"
# monologue
# JP: けれどもすぐに、勇気百倍、侵入してくる。
3231 = "Nhưng ngay lập tức, với dũng khí nhân lên gấp trăm lần, em tiến vào."
# monologue
# JP: そうであってなお、おずおずとしか動けない、\n不器用すぎる舌の動きが、僕をかえって熱くする。
3229 = "Dù vậy, chuyển động lưỡi quá đỗi vụng về, rụt rè của em, lại càng khiến tôi thêm nóng rực."
# monologue
# JP: （だ、が――）
4005 = "（Nhưng, mà——）"
# 【凪】
# display as 凪
# JP: 「んっ！？　――ぷあっ」
2589 = "「Ưm!? ——Phù a」"
# monologue
# JP: キスを解けば、凪は驚いた目で僕をみる。
3440 = "Khi tôi dứt nụ hôn, Nagi nhìn tôi bằng đôi mắt đầy ngạc nhiên."
# monologue
# JP: 拒絶をしているわけではない。\n伝えるために、指先で、唇を軽く撫でてやる。
3581 = "Không phải là em đang cự tuyệt. Để truyền đạt điều đó, tôi dùng đầu ngón tay khẽ vuốt ve đôi môi em."
# 【双鉄】
# display as 雙鐵
# JP: 「いい子だ。凪はかわいいな」
2287 = "「Ngoan lắm. Nagi thật đáng yêu」"
# 【凪】
# display as 凪
# JP: 「は……ぅぅ……」
2523 = "「Hà……Ư ư……」"
# monologue
# JP: いくらでも深いキスをしたいし、\nそれ以上のことももちろんしたい。
3643 = "Tôi muốn trao cho em một nụ hôn sâu bao nhiêu cũng được, và tất nhiên là cả những chuyện hơn thế nữa."
# monologue
# JP: だが、今すぐにはもったいない。\n欲を堪えて、すっ飛んでいたダンボールを拾う。
3240 = "Nhưng, làm ngay bây giờ thì thật uổng phí. Tôi kìm nén dục vọng, nhặt thùng các tông vừa bay vèo đi lên."
# 【双鉄】
# display as 雙鐵
# JP: 「かわいいからこそ、今は、凪の水着を見たい。\n大人な凪を、まずは視線で、楽しみたい」
2816 = "「Chính vì đáng yêu, nên bây giờ, tôi muốn thấy Nagi mặc đồ bơi. Trước tiên, tôi muốn dùng ánh mắt để thưởng thức một Nagi chững chạc」"
# 【凪】
# display as 凪
# JP: 「あ……ん」
2524 = "「A……Ưm」"
# monologue
# JP: ゆっくり、頷く。\nそれから凪は頭を振って――
3352 = "Em chậm rãi gật đầu.\nSau đó Nagi lắc đầu——"
# monologue
# JP: （パチンっ！）
4018 = "（Bốp!）"
# monologue
# JP: 自分の両頬に気合いをいれて、\n僕の手から、しっかりとダンボールを受け取り直す。
3708 = "Tự vỗ vào hai má để xốc lại tinh thần, em đón lấy thùng các tông từ tay tôi một cách chắc chắn."
# 【凪】
# display as 凪
# JP: 「よかとよ！　楽しみにしとくばい！」
2653 = "「Được á! Cứ mong chờ đi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2567 = "「嗯！」" 
# monologue
# JP: 凪は勢いよく次の間へ――\n行く前、くるりと振り返る。
3396 = "Nagi hăm hở bước sang phòng bên—— Nhưng trước khi đi, em quay ngoắt lại."
# 【凪】
# display as 凪
# JP: 「えへへ、にーさんなら特別に、\nちょこっとだけなら覗いてもよかとよ？」
2595 = "「Ehehe, nếu là anh hai thì đặc biệt, cho nhìn trộm một chút xíu thôi cũng được á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいがな、今は我慢だ。\n凪の水着を、一番鮮やかに焼き付けるため」
2714 = "「Tôi cũng muốn thế lắm, nhưng bây giờ phải nhịn thôi. Để khắc sâu hình ảnh Nagi mặc đồ bơi một cách sống động nhất」"
# 【凪】
# display as 凪
# JP: 「なら、ちょこっとだけ待っとって！！」
2985 = "「Vậy thì, đợi em một chút xíu á!!」"
# monologue
# JP: (しゃ！――ぱたっ！）
4035 = "(Xoạt!——Phập!)"
# 【凪】
# display as 凪
# JP: 「んしょ――よい、しょっ！\nあ、ダンボール開けるのわすれとったばい」
2592 = "「Ây da——Hây, dô!\nA, quên mở thùng các tông mất tiêu á」"
# monologue
# JP: ふすまの向こうにいるというのに、\n凪の行動は筒抜けだ。
3257 = "Dù đang ở bên kia tấm cửa lùa, nhưng mọi hành động của Nagi đều lọt hết vào tai tôi."
# 【凪】
# display as 凪
# JP: 「あけんと――んと、\nあ！　ここを押せって書いてあるとばい！」
2749 = "「Phải mở ra——Ưm,\nA! Ở đây có ghi là ấn vào chỗ này á!」"
# monologue
# JP: （べりべりべりべりっ）
4020 = "（Xoẹt xoẹt xoẹt xoẹt）"
# monologue
# JP: ……いま凪は、全裸でダンボールを開けているのか。\nその想像に、妙な興奮を感じてしまう。
1761 = "……Bây giờ Nagi đang khỏa thân mở thùng các tông sao. Chỉ tưởng tượng thôi cũng khiến tôi cảm thấy hưng phấn lạ thường."
# 【凪】
# display as 凪
# JP: 「空いたばーい！　じゃじゃんっ！！\nお？　おおお――おおおおおっ！！！？」
2751 = "「Mở được rồi á! Tada!!\nỦa? Oaa——Oaaaaa!!!?」"
# monologue
# JP: む？　……なんだ。\nいきなり凪が静かになった。
3453 = "Hửm? ……Sao vậy.\nĐột nhiên Nagi im bặt."
# monologue
# JP: 不安になって耳をすます――と――
3689 = "Tôi bắt đầu lo lắng và vểnh tai lên nghe——thì——"
# 【凪】
# display as 凪
# JP: 「ふぁ……ぁ……これ……凄かとばい……\nん……わ……わわ……ええ……どうしよう、ばい」
2451 = "「Phù……A……Cái này……Kinh khủng quá á…… Ưm……Oa……Oa oa……Ể……Phải làm sao đây, á」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪、どうした？　なにかあったか？」
2372 = "「Nagi, sao vậy? Có chuyện gì à?」"
# 【凪】
# display as 凪
# JP: 「なんでもなかばい！　着れたばい！！」
2828 = "「Không có gì đâu á! Em mặc được rồi á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！　ならば早く見せてくれ」
2610 = "「Ồ! Vậy thì mau cho tôi xem đi」"
# 【凪】
# display as 凪
# JP: 「う、うん。\n着れたは――着れた……ばってん」
2564 = "「V, vâng.\nMặc thì——mặc được rồi……nhưng mà」"
# monologue
# JP: 音もなく、しずしずとふすまが開かれる。
3720 = "Không một tiếng động, tấm cửa lùa từ từ mở ra."
# monologue
# JP: ――凪の姿が、見えてくる。
3682 = "——Dáng vẻ của Nagi, dần hiện ra."
# 【双鉄】
# display as 雙鐵
# JP: 「おお――おおっ！！？」
2603 = "「Oa——Oaaa!!?」"
# 【凪】
# display as 凪
# JP: 「布も……思ったより、なかった、ばい」
2680 = "「Vải……cũng ít hơn, em tưởng, á」"
# 【双鉄】
# display as 雙鐵
# JP: 「これ、は――」
2947 = "「Thế, này thì——」"
# monologue
# JP: エロい。\nその言葉だけが体を埋める。
3468 = "Quá gợi tình. Chỉ có từ đó là lấp đầy tâm trí tôi lúc này."
# monologue
# JP: 血が燃えたぎる――この上なく完全に勃起する。\n凪を、今すぐにでも押し倒したい。
3676 = "Máu trong người sục sôi——tôi hoàn toàn cương cứng đến tột độ. Chỉ muốn đè Nagi xuống ngay lập tức."
# 【凪】
# display as 凪
# JP: 「どう……ばい？　凪、さま……おとなっぽか、と？」
1796 = "「Sao……á? Nagi, sama……có chững chạc không, á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――」
2949 = "「Để xem nào——」"
# monologue
# JP: 学園指定の水着が焼き付けた日焼け跡が、\n凪の素肌の白さを鮮やかに引き立てている。
3524 = "Vết cháy nắng in hằn từ bộ đồ bơi quy định của trường, làm nổi bật lên làn da trắng ngần của Nagi."
# monologue
# JP: そのほとんどが剥き出して――\n水着は局部を、ごくごくわずかに隠しているのみだ。
3830 = "Gần như toàn bộ cơ thể đều phơi bày—— Bộ đồ bơi chỉ che đậy những bộ phận nhạy cảm một cách vô cùng khiêm tốn."
# 【双鉄】
# display as 雙鐵
# JP: 「……いやらしさが、大人っぽさの要素であるなら、\n確かに、大変に大人っぽくある」
1789 = "「……Nếu sự dâm đãng là một yếu tố của sự chững chạc, thì quả thực, trông rất chững chạc đấy」"
# 【凪】
# display as 凪
# JP: 「あ」
# 2529 = "「啊」" 
# monologue
# JP: 凪に近づく。\n抱き寄せる。
3699 = "Tôi tiến lại gần Nagi.\nÔm em vào lòng."
# monologue
# JP: 僕の股間を、すでにガチガチになってる勃起を、\nズボンの上から、凪の股間に押し当てる。
3629 = "Tôi ép phần đũng quần, phần dương vật đã cương cứng cứng ngắc của mình, qua lớp quần, áp sát vào đũng quần của Nagi."
# 【凪】
# display as 凪
# JP: 「ま、待って！　にーさん！　これ、水着やけん。\nにーさんが買ってくれた、初めての水着やけん」
2887 = "「Kh, khoan đã! Anh hai! Cái này, là đồ bơi á. Là bộ đồ bơi đầu tiên, do anh hai mua cho em á」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2585 = "「嗯？」" 
# 【凪】
# display as 凪
# JP: 「ちゃんと、水着として使ってから……その――\n水着のお仕事、はじめは、きちんとさせたげたいけん」
2441 = "「Phải dùng đúng với mục đích là đồ bơi đã……À thì—— Công việc của đồ bơi, ban đầu, em muốn để nó làm tròn bổn phận á」"
# 【双鉄】
# display as 雙鐵
# JP: 「水着の仕事か」
2883 = "「Công việc của đồ bơi sao」"
# monologue
# JP: 確かに、水着はむなしかろう。
3799 = "Đúng là, bộ đồ bơi sẽ thấy trống rỗng lắm."
# monologue
# JP: 本来の用途に一度も使われぬままに、\n肌から剥がされ、放置をされてしまうのならば。
3513 = "Nếu chưa một lần được sử dụng đúng với mục đích vốn có, mà đã bị lột khỏi cơ thể và vứt sang một bên."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……その恰好で泳ぐのか？\n正直、僕は――今の凪を、僕以外には見せたくない」
2319 = "「Nhưng mà……em định mặc thế này đi bơi sao? Nói thật thì, tôi——không muốn ai khác ngoài tôi nhìn thấy Nagi lúc này đâu」"
# 【凪】
# display as 凪
# JP: 「う、うちだって同じばい。こぎゃん水着ば――\nにーさんの他、この世の誰にも見せられんばい」
2431 = "「E, em cũng vậy á. Đồ bơi thế này thì—— Ngoài anh hai ra, em không dám cho ai trên đời này thấy đâu á」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、どうやって――\nああ、風呂場……登呂流湯などで？」
2979 = "「Vậy thì, làm thế nào—— À, phòng tắm……ở Tororyu-yu chẳng hạn?」"
# 【凪】
# display as 凪
# JP: 「お風呂で泳ぐば、いけんことばい！」
2700 = "「Bơi trong phòng tắm, là chuyện không được phép á!」"
# monologue
# JP: （ぺちっ）
4028 = "（Bốp）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2495 = "「唔」" 
# monologue
# JP: 僕のおでこをぺちりと叩き、\n凪はえへんと無い、胸を……張……る……
3346 = "Vỗ nhẹ một cái lên trán tôi, Nagi hắng giọng một tiếng, rồi ưỡn……ngực……ra……"
# 【凪】
# display as 凪
# JP: 「ひゃああ！？　にーさん、目、やらしかばい！」
2419 = "「Hyaaa!? Anh hai, ánh mắt, dâm đãng quá á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理もなかろう」
2948 = "「Cũng đành chịu thôi」"
# 【凪】
# display as 凪
# JP: 「と、とにかく！　凪さまも現役のともはりやけん！\nヒミツの場所のひとつやふたつ、知っとるけん！」
2889 = "「D, dù sao thì! Nagi-sama cũng là người chèo thuyền đang làm việc á! Cũng biết một hai chỗ bí mật chứ bộ!」"
# monologue
# JP: 凪は次の間にかけこんで、\n脱ぎ捨ててあった服をかきよせる。
3398 = "Nagi chạy ào sang phòng bên, vơ lấy bộ quần áo vừa cởi ra vứt đó."
# monologue
# JP: 水着の上から服を着ていくつもりのようだ。
3784 = "Có vẻ như em định mặc quần áo trùm ra ngoài đồ bơi."
# 【凪】
# display as 凪
# JP: 「にーさんは、安心してついてくればよかけんね！」
2625 = "「Anh hai, cứ yên tâm đi theo em là được á!」"
# monologue
# JP: （ばしゃっ！！）
4026 = "（Ào!!）"
# 【凪】
# display as 凪
# JP: 「はぷっ！！？　にーさん、よくもやったとねー！」
2601 = "「Hapu!!? Anh hai, dám làm thế với em á!」"
# monologue
# JP: （ばちゃんっ！！）
4025 = "（Tùm!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2463 = "「Ối chà」"
# 【凪】
# display as 凪
# JP: 「にーがさーんばーいっ！！」
2378 = "「Không cho anh thoát đâu á!!」"
# monologue
# JP: これは、楽しい。
3737 = "Chuyện này, vui thật đấy."
# monologue
# JP: 凪とふたりで、めいっぱい水につかって体を動かす。\nそうすることが、ただただ楽しい。
3446 = "Cùng Nagi, thỏa sức vẫy vùng và ngâm mình trong làn nước. Chỉ việc làm thế thôi, cũng đã thấy rất vui rồi."
# 【凪】
# display as 凪
# JP: 「捕まえたとっ！」
2752 = "「Bắt được rồi á!」"
# monologue
# JP: （するっ）
4057 = "（Tuột）"
# 【凪】
# display as 凪
# JP: 「ありゃっ！？」
2429 = "「Ủa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうはいかん。\n僕とて、多少は水慣れしてきた」
3008 = "「Đâu có dễ thế. Tôi đây cũng đã quen với nước chút đỉnh rồi」"
# 【凪】
# display as 凪
# JP: 「クマ川くだりじゃ、凪さまの方が先輩ばーい！」
2918 = "「Trò xuôi dòng sông Kuma này, Nagi-sama mới là tiền bối á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 2463 = "「哎呀」" 
# monologue
# JP: 本気になれば凪の動きは、やはり鋭い。\n水中ということもあり、じわじわ追い詰められてくる。
3882 = "Một khi Nagi đã nghiêm túc thì chuyển động của em quả nhiên rất sắc bén. Lại còn ở dưới nước nữa, nên tôi dần dần bị dồn vào đường cùng."
# 【凪】
# display as 凪
# JP: 「ふっふーん、にーさん、\n逃げ場ののーなってきたばいねー」
2480 = "「Hứ hừm, anh hai,\nhết đường chạy rồi nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2740 = "「Có lẽ vậy」"
# monologue
# JP: 本流に出れば、命に関わる。\n隠れ家的な小さな淀みは、逃げ回るには狭すぎる。
3519 = "Nếu bơi ra dòng chính thì sẽ nguy hiểm đến tính mạng. Còn vùng nước đọng nhỏ bé như nơi trú ẩn này thì lại quá chật hẹp để chạy trốn."
# 【凪】
# display as 凪
# JP: 「余裕のフリばかわいくなかけん！」
2335 = "「Tỏ vẻ ung dung thì không dễ thương đâu á!」"
# monologue
# JP: （ばしゃっっ！！！）
4024 = "（Ào!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ところが、これがフリでもないのだ」
2277 = "「Nhưng mà, tôi cũng không phải đang tỏ vẻ đâu」"
# 【凪】
# display as 凪
# JP: 「ああん、惜しかとー！」
2539 = "「Aaan, tiếc quá á!」"
# monologue
# JP: 確かに、きわどい。\n凪の指先がかすってた。
3798 = "Đúng là, suýt chút nữa. Đầu ngón tay Nagi sượt qua người tôi."
# monologue
# JP: が――きわどいのは、凪とて同じだ。
3234 = "Nhưng——suýt chút nữa, thì Nagi cũng vậy."
# 【凪】
# display as 凪
# JP: 「今度こそ、もう逃さんばいねー」
2961 = "「Lần này thì, không cho anh chạy thoát nữa đâu á」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは怖いな」
2954 = "「Thế thì đáng sợ thật」"
# 【凪】
# display as 凪
# JP: 「まーたそぎゃんと余裕ぶってー！」
2385 = "「Lại còn tỏ vẻ ung dung nữa á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、余裕など、まったくないぞ」
2282 = "「Không, tôi chẳng ung dung chút nào đâu」"
# monologue
# JP: ぴたり、指差す。\n凪の動きも、ぴたりと止まる。
3594 = "Tôi dừng lại, chỉ tay. Chuyển động của Nagi cũng khựng lại."
# 【凪】
# display as 凪
# JP: 「んん？」
# 2585 = "「嗯？」" 
# monologue
# JP: 視線が、僕の指を追う。\n僕の指先が指している、凪の体ヘと落ちていく。
3500 = "Ánh mắt em, dõi theo ngón tay tôi. Rồi rơi xuống cơ thể Nagi, nơi đầu ngón tay tôi đang chỉ vào."
# 【双鉄】
# display as 雙鐵
# JP: 「もうギリギリだ。\n乳輪の色が見えて」
2695 = "「Sắp lộ ra hết rồi kìa.\nThấy cả màu quầng vú rồi」"
# 【凪】
# display as 凪
# JP: 「ひわわわわわわっ！？」
# 2462 = "「哇？！」" 
# monologue
# JP: （ざぶんんっ！！！）
4046 = "（Tùm!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！」
# 2370 = "「凪！」" 
# monologue
# JP: 凪が水中にもぐってしまう。\n足を引かれるかと警戒するが――
3361 = "Nagi lặn tịt xuống nước. Tôi cảnh giác sợ bị kéo chân, nhưng——"
# 【凪】
# display as 凪
# JP: 「がぼがぼがぼぼー」
2442 = "「Ục ục ục ục」"
# monologue
# JP: ――水中で、水着を懸命に直してる。\n凪があれほど大好きな、勝負事を中断してまで。
1735 = "——Em đang cố gắng chỉnh lại đồ bơi ở dưới nước. Thậm chí phải tạm dừng cả trò thi thố mà em vô cùng yêu thích."
# monologue
# JP: （ああ……凪は、おんなになったのだな）
4016 = "（A……Nagi, đã trở thành một người phụ nữ rồi nhỉ）"
# monologue
# JP: 爽やかに冷えていた血が、再び燃える。\n僕が、凪を、おんなにした。
3426 = "Dòng máu vừa mới mát lạnh sảng khoái, nay lại bùng cháy. Tôi, đã biến Nagi, thành một người phụ nữ."
# monologue
# JP: 無邪気な凪を、僕の体が、変えてしまった。\n――罪悪感と征服感とが、こみ上げてくる。
3732 = "Một Nagi ngây thơ trong sáng, đã bị cơ thể tôi, làm cho thay đổi. ——Cảm giác tội lỗi và cảm giác chinh phục, cùng lúc trào dâng."
# monologue
# JP: （ちゃぷん）
4047 = "（Tõm）"
# 【凪】
# display as 凪
# JP: 「に、にーさん、勝負ば再開ばい――ひゃっ！？」
2620 = "「A, anh hai, bắt đầu lại trò chơi á——Hya!?」"
# monologue
# JP: 僕から、凪を抱き締める。\n僕の体に、凪の体に。ついている水がぬるくなる。
3653 = "Tôi chủ động ôm chặt lấy Nagi. Trên cơ thể tôi, trên cơ thể Nagi. Nước bám trên người dần trở nên ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の負けだ。完全に捕まえられた。\n凪と、一刻も早く触れ合いたい」
2783 = "「Tôi thua rồi. Hoàn toàn bị em bắt được rồi. Tôi muốn được chạm vào Nagi, càng sớm càng tốt」"
# 【凪】
# display as 凪
# JP: 「へ？　え、えーと……\n凪さまいわゆる不戦勝ばい？」
2543 = "「Hể? Ờ, ờm…… Nagi-sama gọi là thắng mà không cần đánh á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「不戦勝ではない。正々堂々の勝負の結果だ。\n凪の魅力――おんなの魅力に、僕は、負けた」
2264 = "「Không phải thắng mà không cần đánh. Đây là kết quả của một trận đấu quang minh chính đại. Trước sức hấp dẫn của Nagi——sức hấp dẫn của một người phụ nữ, tôi đã thua rồi」"
# monologue
# JP: （ぐりっ）
# 4073 = "（頂）" 
# 【凪】
# display as 凪
# JP: 「ふあっ――」
2445 = "「Phù a——」"
# monologue
# JP: 勃起を、グイグイと押し付ける。\nただそれだけで、射精しそうに気持ちいい。
3672 = "Tôi liên tục ép phần cương cứng vào người em. Chỉ vậy thôi, cũng đã sướng đến mức muốn xuất tinh rồi."
# monologue
# JP: 凪が、欲しい。凪に、だしたい。\nただそれだけで、脳がどろどろに濁ってく。
3645 = "Tôi muốn Nagi. Muốn bắn vào trong Nagi. Chỉ vì điều đó, mà não bộ tôi dần trở nên vẩn đục."
# 【凪】
# display as 凪
# JP: 「ぇ……へ――えへへっ！　凪さま勝ちばい！\n勝ったばーいっ！！」
2590 = "「Ể……Hê——Ehehe! Nagi-sama thắng rồi á!\nThắng rồi á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2544 = "「っ!?」"
# monologue
# JP: 色気もなにも吹き飛ぶような、\nからりとした声――勝どきの声。
3358 = "Một giọng nói lanh lảnh, đánh bay mọi sự gợi tình, ——Tiếng reo hò chiến thắng."
# monologue
# JP: おんなの凪は、\nけれども今も、少女の凪でもあるのだと知る。
3656 = "Nagi của một người phụ nữ, nhưng đồng thời, tôi cũng nhận ra em vẫn là một Nagi thiếu nữ."
# 【凪】
# display as 凪
# JP: 「それならにーさん。勝った凪さまのゆーこと、\nなんでもおとなしく聞くとよね？」
3000 = "「Nếu vậy anh hai. Phải ngoan ngoãn nghe theo, bất cứ lời nào của Nagi-sama chiến thắng á nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2565 = "「嗯」" 
# monologue
# JP: そんなルールは初めて聞いた。\nけれども抵抗の余地などない。
3698 = "Lần đầu tiên tôi nghe thấy luật lệ như vậy. Nhưng tôi cũng chẳng có đường nào chống cự."
# monologue
# JP: “凪さまのゆーこと”を僕は期待している。\nそれに従い、導かれたいと望んでる。
3635 = "Tôi đang mong đợi \"lời của Nagi-sama\". Tôi muốn tuân theo, và được dẫn dắt bởi điều đó."
# 【凪】
# display as 凪
# JP: 「やったら、にーさんついてくると！\nほんとのほんとにヒミツの場所に、ご招待ばい！」
2980 = "「Nếu vậy, anh hai đi theo em á! Sẽ mời anh đến một nơi bí mật thật sự luôn á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
2732 = "「Đáng mong chờ đây」"
# monologue
# JP: ……岸にあがって、一直線に茂みに向かう。
1755 = "……Lên bờ, chúng tôi đi thẳng một mạch về phía bụi rậm."
# 【双鉄】
# display as 雙鐵
# JP: 「おい、凪？」
2551 = "「Này, Nagi?」"
# 【凪】
# display as 凪
# JP: 「ここまではふかみちゃんだって入ってこんけん。\nこん森のトンネル、くぐるばい！」
2964 = "「Đến tận đây thì ngay cả bé Fukami cũng không vào đâu á. Chui qua đường hầm trong rừng này đi á!」"
# monologue
# JP: (ばさっ）
4055 = "(Xoạt)"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2602 = "「Ồ——」"
# monologue
# JP: 文字通り、凪の秘密基地なのだろう。
3914 = "Đúng nghĩa đen, đây có lẽ là căn cứ bí mật của Nagi."
# monologue
# JP: 木々で囲まれた空間の草は綺麗に刈り込まれ、\nビニールシートまで敷いてある。
3461 = "Đám cỏ trong không gian được bao quanh bởi cây cối này đã được cắt tỉa gọn gàng, thậm chí còn được trải sẵn cả tấm bạt nilon."
# monologue
# JP: 指示どおり素直に寝ころべば、\n凪の笑顔がすぐ隣――うむ？
3596 = "Tôi ngoan ngoãn nằm xuống theo chỉ dẫn, nụ cười của Nagi ở ngay bên cạnh——hửm?"
# 【凪】
# display as 凪
# JP: 「に、にーさんは、そのままじっとしとるばい」
2618 = "「A, anh hai, cứ nằm yên đó á」"
# monologue
# JP: 笑顔ではない。緊張にかたまってしまっている顔だ。
3505 = "Không phải là nụ cười. Mà là một khuôn mặt cứng đờ vì căng thẳng."
# monologue
# JP: その上、その顔の隣にあるのは、\n僕の顔――ではなく、僕の股間のふくらみだ。
3828 = "Hơn nữa, thứ ở bên cạnh khuôn mặt đó, không phải là mặt tôi——mà là phần nhô lên ở đũng quần tôi."
# 【凪】
# display as 凪
# JP: 「な、凪さま、に、にーさんの……おちん、ちん……\nいっかい、す、好き勝手に――いじりたかったけん」
2799 = "「N, Nagi-sama, muốn thử một lần, tùy, tùy ý—— nghịch……dương, vật……của a, anh hai, á」"
# monologue
# JP: 凪の手指がゆっくり動く。\nなにをそれほど緊張するのか、指先が僅かに震えてる。
3372 = "Những ngón tay của Nagi chầm chậm di chuyển. Không biết em căng thẳng đến mức nào, mà đầu ngón tay khẽ run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「脱ごうか？」
2910 = "「Để tôi cởi ra nhé?」"
# 【凪】
# display as 凪
# JP: 「負けたにーさんは、\n勝った凪さまのゆーとーりにしとけばよかばい！」
2628 = "「Anh hai thua cuộc thì, cứ làm theo lời Nagi-sama chiến thắng là được á!」"
# monologue
# JP: 言葉で勢いがついたのか、\n凪が一気に、僕の水着をおろしてくれる。
3197 = "Có lẽ nhờ lời nói đó mà em lấy được dũng khí, Nagi kéo tuột quần bơi của tôi xuống trong một nhịp."
# monologue
# JP: （べちんっ！）
4070 = "（Bốp!）"
# 【凪】
# display as 凪
# JP: 「ひゃんっ！？」
# 2416 = "「呀？！」" 
# monologue
# JP: 腹を叩いた勃起の勢いに驚いたのか、\n凪の、実におんなのこらしい声。
3670 = "Có lẽ vì giật mình trước sức bật của dương vật cương cứng đập vào bụng, Nagi thốt lên một âm thanh thật giống con gái."
# 【凪】
# display as 凪
# JP: 「ふあっ！？」
# 2462 = "「哇？！」" 
# monologue
# JP: それでまた、勃起がビクビクうごいてしまう。
3913 = "Vì thế, phần cương cứng lại giật giật."
# 【凪】
# display as 凪
# JP: 「（すんっ――すんっ――）――ん……匂いば、\nそぎゃんと濃くなかとねぇ」
3026 = "「（Khịt——Khịt——）——Ưm……Mùi,\ncũng không nồng lắm á」"
# monologue
# JP: セックスを期待し、ゆうべ綺麗に洗っておいた。\nそのうえ川で、汗も流されているからだろう。
3660 = "Vì mong đợi được làm tình, nên tối qua tôi đã tắm rửa sạch sẽ. Hơn nữa lại còn vừa bơi dưới sông, nên chắc mồ hôi cũng bị trôi đi hết rồi."
# monologue
# JP: （さわっ）
4044 = "（Chạm nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 2495 = "「唔」" 
# 【凪】
# display as 凪
# JP: 「んふふ――にーさん、かわゆか声ばい」
2479 = "「Ưm fufu——Anh hai, giọng đáng yêu ghê á」"
# monologue
# JP: （さわっ――もみゅっ）
4043 = "（Chạm nhẹ——Xoa nắn）"
# monologue
# JP: コスる、でも、シゴくでもなく、弄ぶ。\n僕に快感を与えるための動きではない。
3470 = "Không phải cọ xát, cũng chẳng phải tuốt, mà là đang đùa giỡn. Không phải là chuyển động nhằm mang lại khoái cảm cho tôi."
# 【凪】
# display as 凪
# JP: 「さきっぽば、固くなってもぷにぷにしとる……\nん……あ……おつゆ……にちゃって……しよる」
2673 = "「Phần đầu, dù có cứng lại thì vẫn mềm mềm…… Ưm……A……Có nước……nhớt nhớt……chảy ra nè」"
# monologue
# JP: （こしゅっ――ぬりっ）
4033 = "（Cọ cọ——Bôi bôi）"
# monologue
# JP: それでも滲む先走り汁を、\n指ですくって、凪は亀頭に塗り伸ばしていく。
3365 = "Dù vậy, Nagi vẫn dùng ngón tay hứng lấy dòng dịch nhờn rỉ ra, rồi bôi đều lên quy đầu."
# monologue
