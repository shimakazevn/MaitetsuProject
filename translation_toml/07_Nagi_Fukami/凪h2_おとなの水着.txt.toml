# monologue
# JP: 凪に求められるがままに、体を転がし、天を向く。\n木々の間から空が見え――
3688 = "Thuận theo yêu cầu của Nagi, tôi lăn người lại, ngửa mặt lên trời. Qua kẽ lá, tôi nhìn thấy bầu trời——"
# monologue
# JP: そこに、股間が――\n凪の割れ目がかぶさってくる。
3456 = "Và ở đó, đũng quần——\nkhe rãnh của Nagi ập xuống."
# 【凪】
# display as 凪
# JP: 「最初は……凪、さま――んっ――くっ――\n好き、に――する――けんっ――」
2252 = "「Ban đầu……Nagi, sama——Ưm——Ư—— Sẽ, làm——theo ý thích——á——」"
# monologue
# JP: （ずぶうっ！）
4058 = "（Phập!）"
# 【凪】
# display as 凪
# JP: 「んきゅっ――ふっ――んっ！」
2395 = "「Ưm——Phù——Ưm!」"
# monologue
# JP: 凪が自分で挿れようとするが、なかなか進まん。\nキツイ、きつい。亀頭が拗じられているようだ。
3350 = "Nagi tự mình cố cắm vào, nhưng mãi không trôi. Khít, quá khít. Cảm giác như quy đầu đang bị vặn xoắn."
# monologue
# JP: いや――そうだ。僕も、凪自身も、愛撫をしてない。\n凪の性器は、前戯を受けてない状態だ。
3193 = "À không——đúng rồi. Cả tôi và Nagi đều chưa vuốt ve gì cả. Âm đạo của Nagi, vẫn đang trong trạng thái chưa được dạo đầu."
# 【凪】
# display as 凪
# JP: 「くっ――ふっ――んひゅっ――んんん～っ！」
2489 = "「Ư——Phù——Ưm——Ưm~!!」"
# monologue
# JP: （ぐっ――ぶっ――）
4050 = "（Ư——Phập——）"
# monologue
# JP: なのに、これほど濡れている。\nじわじわ、亀頭は食い込むように――っ！
3433 = "Vậy mà, lại ướt đẫm đến thế này. Từ từ, quy đầu như đang cắm phập vào——!"
# monologue
# JP: （ぷちゅんっ！！）
4019 = "（Phụt!!）"
# 【凪】
# display as 凪
# JP: 「ひあうっ！！！」
2403 = "「Hyau!!!」"
# monologue
# JP: 快感の声。おんなの声。
3915 = "Tiếng kêu của khoái cảm. Tiếng kêu của một người phụ nữ."
# monologue
# JP: 入り口の狭隘を亀頭が抜けて、\nそれでも極めて窮屈だけれど――
3943 = "Quy đầu đã vượt qua chỗ chật hẹp ở cửa mình, dù bên trong vẫn vô cùng chật chội nhưng——"
# 【凪】
# display as 凪
# JP: 「ふっ――あっ――あっ――にーさん――\nにーさんの、おちん、ちん――感じる、とっ」
2485 = "「Phù——A——A——Anh hai—— Dương, vật——của anh hai——em cảm nhận được, á」"
# monologue
# JP: （ぬ――ぐにゅ――）
4056 = "（Trơn——Ngoáy——）"
# monologue
# JP: 凪の腰つきが、小さく、ゆるい円を描く。\n僕の亀頭を、感じるところに誘おうとする。
3377 = "Chuyển động hông của Nagi, vẽ nên một vòng tròn nhỏ, lỏng lẻo. Như đang muốn dẫn dắt quy đầu của tôi đến nơi nhạy cảm."
# 【凪】
# display as 凪
# JP: 「ふあっ――あっ――んっ――く、うっ――ふあ――\nここ――んっ――ふっ――もう、ちょっと――あうっ」
2449 = "「Phù——A——Ưm——Ư, ư——Phù—— Chỗ này——Ưm——Phù——Một chút, nữa——A」"
# monologue
# JP: けれども、なかなか目当てにたどり着けないようだ。
3238 = "Nhưng mà, có vẻ như mãi vẫn chưa chạm đến đúng chỗ."
# monologue
# JP: 無理もない、これほどまでに窮屈で、\nしかも膣内の肉襞が、貼り付くように甘えてきては。
3910 = "Cũng phải thôi, chật chội đến mức này, hơn nữa những nếp gấp thịt bên trong âm đạo lại còn bám dính lấy như đang làm nũng thế kia."
# 【凪】
# display as 凪
# JP: 「んっ――やっ――いやっ――動い、ちゃう、とよ、\n――ふっ――あっ――にい、さん、の、おちん、ちん」
2555 = "「Ưm——A——Không——Di chuyển, mất, á, ——Phù——A——Dương, vật, của, anh, hai」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2897 = "「Đúng vậy nhỉ」"
# monologue
# JP: 自由に動ける余裕などない。
3486 = "Chẳng có chỗ nào để tự do di chuyển cả."
# monologue
# JP: 腰をどれだけ踊らせたとて、\n密着膣が勃起を抱きしめ、動きに合わせ踊らせる。
3202 = "Dù có lắc hông bao nhiêu đi chăng nữa, âm đạo bám sát lấy phần cương cứng, ép nó phải nhảy múa theo chuyển động của mình."
# 【凪】
# display as 凪
# JP: 「んんんっ――や――あっ――もっと――おま、んこ、\nよか、とこ――ある――のにっ――んっ――ふっ」
2483 = "「Ưm——A——A——Âm, đạo, vẫn còn—— chỗ, sướng, hơn——mà——Ưm——Phù」"
# monologue
# JP: （む）
4015 = "（Hửm）"
# monologue
# JP: 悪戦苦闘のせいなのか、それとももっと前からか、\nいつの間に、凪の水着がズレている。
3854 = "Không biết là do vật lộn nãy giờ, hay là từ trước đó, mà từ lúc nào, đồ bơi của Nagi đã bị xộc xệch."
# monologue
# JP: 丸出しになった可愛い乳首に――
3478 = "Núm vú đáng yêu phơi bày ra ngoài——"
# monologue
# JP: （ふわっ）
4075 = "（Phù）"
# 【凪】
# display as 凪
# JP: 「あ」
# 2529 = "「啊」" 
# monologue
# JP: 触れる、ぎりぎり。\n温度さえ感じる距離まで、指を近づけ、すぐ離す。
3627 = "Suýt chạm vào. Tôi đưa ngón tay lại gần đến mức có thể cảm nhận được nhiệt độ, rồi lập tức rụt lại."
# 【凪】
# display as 凪
# JP: 「や――なんで、にいさん」
2917 = "「A——Sao vậy, anh hai」"
# monologue
# JP: 切なげな声。上ずった声。\n凪は完全に発情している、メスになってる。
3917 = "Giọng nói nghe thật não nề. Giọng nói vút cao. Nagi đã hoàn toàn động dục, trở thành một con cái."
# 【双鉄】
# display as 雙鐵
# JP: 「なんでもなにも、僕は、凪の敗者だからな」
2306 = "「Sao trăng gì, tôi là kẻ bại trận trước Nagi mà」"
# monologue
# JP: 凪さま、などとおだてまい。\n事実を告げれば、それで十分事足りる。
3665 = "Nagi-sama, tôi sẽ không nịnh nọt như vậy đâu. Chỉ cần nói ra sự thật, thế là đủ rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、凪の命令なしには、\nまったく何もできんのだ」
2310 = "「Hôm nay, nếu không có lệnh của Nagi, tôi hoàn toàn không thể làm gì cả」"
# 【凪】
# display as 凪
# JP: 「なら、ならっ！　おっぱい――」
3003 = "「Nếu vậy, nếu vậy! Ngực——」"
# monologue
# JP: いいかけて、凪はぶるぶる頭を振る。
3881 = "Đang nói dở, Nagi lắc đầu nguầy nguậy."
# monologue
# JP: その勢いで、汗が、よだれが、\n僕の腹へと粘度を帯びたまま落ちてくる。
3908 = "Theo đà đó, mồ hôi, nước bọt, nhỏ xuống bụng tôi, mang theo sự nhớp nháp."
# 【凪】
# display as 凪
# JP: 「ううん、おまんこ――ウチのおまんこ――\nもっと、ずんずん、ごりごりってしてっ！！」
2280 = "「Không, âm đạo——Âm đạo của em—— Hãy thúc thật mạnh, chà xát thật mạnh vào!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2641 = "「Rõ rồi」"
# monologue
# JP: いうや否やで尻を捕まえ――
3880 = "Vừa dứt lời, tôi chộp lấy mông em——"
# monologue
# JP: （ごりゅんっ！！）
4041 = "（Chà!!）"
# 【凪】
# display as 凪
# JP: 「かひゅっ！！！」
2409 = "「Hya!!!」"
# monologue
# JP: 凪がのけぞり息を吐く。\n痒いところを我慢し我慢し、思いっきりに掻く快感。
3356 = "Nagi ưỡn người ra sau, thở hắt ra. Khoái cảm như khi được gãi thật mạnh vào chỗ ngứa đã phải nhịn từ lâu."
# monologue
# JP: それに強烈な性感が混じるのだから、\n軽く飛んだとて無理もない。
3826 = "Lại còn hòa quyện với sự nhạy cảm mãnh liệt, nên có bay bổng đôi chút cũng là điều dễ hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「まだだ。もう少し楽しんでくれ」
2967 = "「Vẫn chưa đâu. Tận hưởng thêm chút nữa đi」"
# monologue
# JP: （ずうっ――ごりゅっ！　じゅぶっ――ぐりゅうっ！）
4036 = "（Phập——Chà! Bụp——Ngoáy!）"
# 【凪】
# display as 凪
# JP: 「ひあああっ――そこっ――そこ――んひっ、\nいっ、あっ――きもち、よかっ――気持ち、よかぁ」
2414 = "「Hiaaa——Chỗ đó——Chỗ đó——Ưm, A, a——Sướng, quá——Sướng, quá á」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
# 2988 = "「那就好」" 
# 【凪】
# display as 凪
# JP: 「ひぎゅっ！　あ！　すごいっ――すご、かっっ――\nはっ――ふあっ、あっ――おまん、こ、ぐりゅっ、て」
2405 = "「Higyu! A! Tuyệt quá——Tuyệt, quá—— Hà——Phù, a——Âm, đạo, ngoáy, á」"
# monologue
# JP: 当て方を変えつつ、ひとつところをしつこく責める。\n汗とよだれを激しく零し、凪は何度も大きくのげぞる。
3580 = "Tôi liên tục thay đổi góc độ, nhưng chỉ nhắm vào một điểm mà tấn công dai dẳng. Mồ hôi và nước bọt nhỏ xuống ròng ròng, Nagi liên tục ưỡn người lên."
# 【凪】
# display as 凪
# JP: 「ひゅあっ――あっ――そこ、だけ――ん、きゅふっ、\nあっ――なぎ、ウチ――ウチ――らめ、なっちゃうっ」
2401 = "「Hyua——A——Chỉ, chỗ đó——Ưm, a, A——Nagi, em——em——hỏng, mất thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは困るな」
2953 = "「Thế thì gay go thật」"
# monologue
# JP: いいつつ、凪の腰を浮かせる。
3886 = "Vừa nói, tôi vừa nâng hông Nagi lên."
# monologue
# JP: 亀頭の先だけひっかかる――\nそのギリギリまで、僕と凪とをひととき離して。
3626 = "Chỉ còn mỗi đầu quy đầu mắc lại—— Tôi kéo khoảng cách giữa tôi và Nagi ra xa đến mức giới hạn đó trong chốc lát."
# monologue
# JP: （ぶちゅううううううっ！！！　ごんんっ！！！！）
4040 = "（Phậppppppppppp!!! Bụp!!!!）"
# 【凪】
# display as 凪
# JP: 「ゅひいいいいいいいいいいいいいっ！！！！」
# 2409 = "「呀！！！」" 
# monologue
# JP: （ぷしゅっ！！！）
4038 = "（Phụt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2588 = "「Hửm!?」"
# monologue
# JP: 凪から、雫がほとばしる。\n尿かと思うが――
3385 = "Từ người Nagi, những giọt nước bắn ra. Tôi tưởng là nước tiểu, nhưng——"
# 【凪】
# display as 凪
# JP: 「ひあっ――あっ――あああっ！　おなか、ウチ、の、\nあかちゃん――お部屋、ごつんっ――ごつんって」
2398 = "「Hya——A——Aaa! Bụng, của em, em bé——Căn phòng, cộc——bị đập cộc cộc á」"
# monologue
# JP: 凪は夢中で、自分から腰を振っている。
3406 = "Nagi say sưa, tự mình dập hông."
# monologue
# JP: 亀頭を子宮にキスさせる――\nその快感に、激しく自らを踊らせている。
3942 = "Để quy đầu hôn lên tử cung—— Vì khoái cảm đó, em điên cuồng nhảy múa."
# 【凪】
# display as 凪
# JP: 「にーさん、すき、すきすきっ――好いとーばいっ、\nうち、うちのこと――にーさん、好いとー？」
2634 = "「Anh hai, thích, thích lắm——Thích lắm á, Em, anh hai——có thích em không á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、好きだとも。大好き――だっ！」
2576 = "「Có, tôi thích em. Rất thích——đấy!」"
# monologue
# JP: （ずんっっ！！）
# 4041 = "（插！！）" 
# 【凪】
# display as 凪
# JP: 「んゅうううううううぅぅっ！！！」
2500 = "「Ưnnnnnnnnnnn!!!」"
# monologue
# JP: さっきの雫が尿であろうとなかろうと、\n僕らのすることに変わりはない。
3200 = "Giọt nước lúc nãy có phải là nước tiểu hay không, thì những gì chúng tôi làm cũng không hề thay đổi."
# monologue
# JP: ひたすら、繋がる。セックスをする。\nお互いの体を使い、お互いに快感を叩きつけ合う。
3926 = "Chỉ đơn giản là kết nối. Làm tình. Dùng cơ thể của nhau, giáng cho nhau những đòn khoái cảm."
# 【凪】
# display as 凪
# JP: 「ひあっ！　はっ――ああっ――あっ――おなかっ\n――ごりゅって――おまん、こ――なか――からっ」
2407 = "「Hya! Hà——Aa——A——Bụng ——Chà xát——Âm, đạo——Từ bên——trong」"
# monologue
# JP: 凪の膣内がうねってる。
3383 = "Bên trong âm đạo Nagi đang cuộn trào."
# monologue
# JP: うねり、粒立ち、\n最奥をこれほど突いてなお、奥へ奥へと誘ってくる。
3191 = "Cuộn trào, nổi hột, dù đã đâm đến tận cùng rồi mà vẫn cứ mời gọi vào sâu hơn nữa."
# monologue
# JP: （ぐっ――ぐりゅっ）
4039 = "（Ư——Ngoáy）"
# 【凪】
# display as 凪
# JP: 「んひゅっ！！！？」
2512 = "「Hya!!!?」"
# monologue
# JP: 言われるままも面白くない。\n凪を導き、腰を回して弱い部分をゆるゆるこする。
3261 = "Cứ làm theo lời em thì không thú vị chút nào. Tôi dẫn dắt Nagi, xoay hông, chà xát nhè nhẹ vào điểm yếu của em."
# 【凪】
# display as 凪
# JP: 「ひあっ――あっ――ん――ゅっ――んふううっ――\nいま、いま、ウチ――そがぎゃんと、された、らっ」
2397 = "「Hya——A——Ư——m——Ưm phuuuu—— Bây giờ, bây giờ, em——Bị làm, như thế, thì」"
# monologue
# JP: （ぐっ――くくっ――こりゅっ）
4071 = "（Ư——Ư ư——Cọ cọ）"
# 【凪】
# display as 凪
# JP: 「ひあああっ、あっ――おまんこ、もっと――もっと、\n感じる、ように、なる――けんっ――」
2412 = "「Hiaaa, a——Âm đạo, sẽ——sẽ,\ncảm nhận, rõ hơn——nữa á——」"
# 【双鉄】
# display as 雙鐵
# JP: 「何よりだ」
2983 = "「Tuyệt quá còn gì」"
# monologue
# JP: （ごちゅっ！！）
# 4041 = "（插！！）" 
# 【凪】
# display as 凪
# JP: 「きゃっ、ふうううううううううぅぅぅぅっ！！！」
2410 = "「Kya, phuuuuuuuuuuuuuuuuu!!!」"
# monologue
# JP: （きゅううううううっんっ！）
4065 = "（Siết chặtttttttt!!!）"
# monologue
# JP: 凪がすぼまる。絞りに来る。
3399 = "Nagi co thắt lại. Bắt đầu vắt kiệt."
# monologue
# JP: タマの側から亀頭の側に、\nぎゅうっと収縮の波が来ている。
3563 = "Từ phía tinh hoàn hướng về phía quy đầu, một làn sóng co thắt siết chặt đang ập tới."
# monologue
# JP: （じゅるうううっっ！！）
4064 = "（Sụttttttt!!）"
# 【凪】
# display as 凪
# JP: 「ひあっ！？　らめっ！　うちっ、いまっ、\nイッて、りゅっ――イって！　イッテりゅからあっ」
2418 = "「Hya!? Không! Em, bây giờ, Đang lên, đỉnh——Đang lên đỉnh! Đang lên đỉnh rồi á」"
# monologue
# JP: 波に逆らいあえて引き。\nそこから僕の全てを込めてっ――
3638 = "Tôi cố tình rút ra ngược với làn sóng co thắt. Rồi từ đó dồn toàn bộ sức lực——"
# monologue
# JP: （ずんんっっ！）
4042 = "（Phập!!）"
# 【凪】
# display as 凪
# JP: 「ひゃへぇぇぇぇぇぇぇぇぇぇぇっぇぇっっ！！」
# 2408 = "「呀！！」" 
# monologue
