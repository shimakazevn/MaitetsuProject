1781 = "「……你看到圖片上的泳裝就開心了嗎？不想咱穿上以後再被嚇一跳嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　理解した。\n確かに、新鮮味が強い方がうれしいな」
2467 = "「哦！我懂了。確實，有驚喜更讓人開心」" 

# 【凪】
# display as 凪
# JP: 「でしょお！」
# 2771 = "「是吧！」" 

# monologue
# JP: にっこり笑えば、声も弾む。\n凪は、どこまでも一直線だ。
3390 = "凪笑得很開心。她一直都這麼坦率。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……そうだな、機関庫で」
2999 = "「那麼……這樣吧，我去機車庫」" 

# 【凪】
# display as 凪
# JP: 「ダメばいイケンばいそりゃなかとばい！！」
2269 = "「不行不能不可以！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2511 = "「唔？」" 

# 【凪】
# display as 凪
# JP: 「せっかくのデートやけん、\n離れ離れになるのは……ちょっと、寂しかとよ」
3015 = "「難得的約會，還要分開……咱會孤單的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。うむ。そうだな」
2469 = "「哦，嗯，對」" 

# monologue
# JP: たとえ別々のことをするのだとしても、\n近くにいる、ただそれだけで意味はある。
3424 = "即使要做不一樣的事，兩個人靠得近，也能讓人感到甜蜜。" 

# monologue
# JP: いきづかい、匂い、ぬくもり――\n微かに感じるだけであっても、幸せだから。
3422 = "即使只能微微感受到鼻息、氣味、溫度……這也足夠讓人感到幸福了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕はお茶を淹れ。その後は……そうだな、\nヘッドマーク缶バッジでも作っていよう」
2992 = "「那我去泡茶。之後嘛……嗯，我做頭像徽章吧」" 

# 【凪】
# display as 凪
# JP: 「わかったばい。なるべく早くに選ぶけんねー」
2646 = "「好咧。咱儘快選完」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2565 = "「嗯」" 

# monologue
# JP: ＜手すきのときにはお願いします＞
4078 = "＜空閒時請幫忙製作＞" 

# monologue
# JP: ポーレットの字が見守る箱から、図柄、フィルム、\nそしてブランクの缶バッジを出す。
3636 = "我從貼著波萊特寫的字的箱子裡，取出圖案、貼片與空白徽章。" 

# monologue
# JP: 缶バッジに、図柄、フィルムを重ねてセットし――
3534 = "將徽章、圖案與貼片疊在一起……" 

# monologue
# JP: （ガチャンっ！！）
4022 = "（喀嚓！）" 

# monologue
# JP: 缶バッジ機でプレスをすれば、\nきれいな缶バッジができあがる。
3459 = "在徽章機上壓一下，就能做出漂亮的徽章。" 

# monologue
# JP: 御一夜鉄道オリジナル缶バッジ。ひとつ四百円。\n地味ではあるが、これも大切な収入源だ。
3568 = "御一夜鐵路原創徽章，一枚四百日元。儘管很老套，但這也是我們寶貴的收入來源。" 

# 【凪】
# display as 凪
# JP: 「んー、これじゃおっきすぎるとねー。\nこっちは、色がついとるばい」
2508 = "「唔，這個太大了。這個帶顏色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2495 = "「唔」" 

# monologue
# JP: ……どうやら凪は、\nリストの全てを満たすところを目指すらしい。
1762 = "……看來凪的目標是滿足清單上的所有條件。" 

# monologue
# JP: 果たしてどんな水着になるか、\n今から僕も、楽しみ――だ！
3664 = "我現在已經非常期待她究竟會穿上什麼樣的泳裝了。" 

# monologue
# JP: （ガチャンっ！！）
4021 = "（喀嚓！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……遅いな」
1787 = "「……好慢啊」" 

# monologue
# JP: 凪が画像を手で隠し、\n僕が決済したネット通販。
3368 = "凪用手遮住圖片，讓我付了款。" 

# monologue
# JP: 私物の購入は初めてだったが、ほんの二日で、\n無事に自宅まで届けてもらうことが出来た。
3916 = "這是我第一次網購個人用品，兩天之後就送到我家了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、事故でも」
3014 = "「難不成發生了意外？」" 

# 【凪】
# display as 凪
# JP: 「おーまたーせばーい！！」
2286 = "「久等了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2608 = "「噢！」" 

# 【凪】
# display as 凪
# JP: 「届いたとばい？」
2946 = "「送到了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これだ。\n早速着替えて見せてくれ」
2574 = "「嗯，就是這個。快點換上給我看看」" 

# monologue
# JP: ダンボールごと手渡したなら、\n凪はニヤリと、不敵にも見える笑みを浮かべる。
3628 = "我將整個瓦楞紙箱交給凪，她露出了一個大膽的笑容。" 

# 【凪】
# display as 凪
# JP: 「早速って、にーさん――\nそぎゃんと凪さまの水着姿ば、見たかと？」
2697 = "「快點？大哥哥……你就這麼想看本小姐穿泳裝嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。見たくない筈がない。\nふたりで一緒に、あれだけ模索した大人っぽさだ」
2861 = "「當然了，我怎麼可能不想看。我們倆一起探討了那麼久什麼叫成熟」" 

# 【凪】
# display as 凪
# JP: 「おおお、にーさんなんだかマジメばい！」
2612 = "「噢，大哥哥看起來好認真！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大真面目だとも。大人っぽい凪がどれほど綺麗か、\n僕は、一刻も早くみたい」
2862 = "「當然要認真。我想趕緊看看成熟的你究竟有多漂亮」" 

# 【凪】
# display as 凪
# JP: 「そ、そこまで言われたら照れるとば～い」
2329 = "「你、你這麼說咱會害羞的」" 

# monologue
# JP: ダンボールを抱きしめるようにして、\n凪はくるりと一回転――っ！！？
3354 = "凪抱著瓦楞紙箱，原地轉了一個圈……啊？！" 

# 【凪】
# display as 凪
# JP: 「ひゃあああっ！？」
2416 = "「呀？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！」
2370 = "「凪！」" 

# monologue
# JP: （がしっ）
4031 = "（抓）" 

# monologue
# JP: ダンボールが飛ぶ。\n凪をなんとか、支えきる。
3780 = "瓦楞紙箱飛了出去。我勉強接住了凪。" 

# 【凪】
# display as 凪
# JP: 「ふわ……わ、コケるとこだったばい」
2447 = "「哇……哇，差點摔倒了」" 

# monologue
# JP: 掴んだ手を引き、抱き寄せる。
3650 = "我抓住她的手，將她抱進懷裡。" 

# monologue
# JP: ドッドッド――\n凪の鼓動と僕の鼓動が落ち着かぬまま混じり合う。
3727 = "撲通、撲通……凪的心跳聲和我的心跳聲交錯在一起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　痛いところはないか？」
2827 = "「沒事吧？有沒有哪裡痛？」" 

# 【凪】
# display as 凪
# JP: 「ん……うん！　痛くなかとよー！\nにーさんが素早く抱きとめてくれたけん……」
2491 = "「唔……嗯！不痛！大哥哥這麼快就抱住咱了……」" 

# monologue
# JP: すりすり、頭で甘えてくる。
3497 = "她用腦袋在我身上蹭來蹭去。" 

# monologue
# JP: ひとしきり僕に匂いをつけて、\nそれから凪は、ゆっくりと――
3483 = "她在我身上蹭了一會，然後她慢慢地……" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2565 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「あっ」
# 2529 = "「啊」" 

# monologue
# JP: 軽いキス。\nなんどもなんども、ただ唇をついばむように。
3437 = "吻了上來。一次又一次，就像小鳥啄食一樣。" 

# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちゅ――ちゅっ」
2560 = "「嗯……啾，啾，啾」" 

# monologue
# JP: 体をぎゅっと寄せてくる。\n凪の温度が、僕の体温をさらに高める。
3683 = "我緊緊抱住了凪。她的體溫讓我的身體變得更熱。" 

# 【凪】
# display as 凪
# JP: 「ちゅっ――ちゅむっ――ちゅっ――ん……\nちゅっ――ちゅうっ――ちゅっ」
2548 = "「啾，啾，啾，嗯……啾，啾，啾」" 

# monologue
# JP: 凪の舌が、密着している唇のあたりを行き来する。
3382 = "凪的舌頭在我們緊貼著的唇上游走。" 

# monologue
# JP: ノックをしようかするまいか、\n想い人の家の手前で迷う、少女のように。
3542 = "就像一位站在心上人的門口，猶豫著是否要敲門的少女。" 

# monologue
# JP: （つんっ）
4073 = "（頂）" 

# 【凪】
# display as 凪
# JP: 「んっ！」
2567 = "「嗯！」" 

# monologue
# JP: こちらから軽くつついてやれば、\n驚いたように凪の舌先は逃げてしまって――
3693 = "我輕輕頂了一下，凪的舌頭就像吃了一驚一樣躲開了。" 

# 【凪】
# display as 凪
# JP: 「ふっ――んっ――ちゅ――ちゅうっ――れるっ――\nちゅむっ――れろっ――れるっ――るっ――ちゅむ」
2425 = "「呼……嗯……啾，啾，啾，啾，啾，啾，啾，啾」" 

# monologue
# JP: けれどもすぐに、勇気百倍、侵入してくる。
3231 = "但很快她就拿出百倍勇氣插了過來。" 

# monologue
# JP: そうであってなお、おずおずとしか動けない、\n不器用すぎる舌の動きが、僕をかえって熱くする。
3229 = "但即使是這樣，她那笨拙的舌頭畏畏縮縮的，反而讓我變得火熱。" 

# monologue
# JP: （だ、が――）
4005 = "（但是……）" 

# 【凪】
# display as 凪
# JP: 「んっ！？　――ぷあっ」
2589 = "「嗯？！哇」" 

# monologue
# JP: キスを解けば、凪は驚いた目で僕をみる。
3440 = "吻完之後，凪一臉驚訝地看著我。" 

# monologue
# JP: 拒絶をしているわけではない。\n伝えるために、指先で、唇を軽く撫でてやる。
3581 = "我並不是在拒絕她。為了告訴她這點，我用指尖輕輕撫摸她的唇。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いい子だ。凪はかわいいな」
2287 = "「乖，你真可愛」" 

# 【凪】
# display as 凪
# JP: 「は……ぅぅ……」
2523 = "「啊……嗚……」" 

# monologue
# JP: いくらでも深いキスをしたいし、\nそれ以上のことももちろんしたい。
3643 = "我想給她無數個深吻，更想為她做無數的其他事情。" 

# monologue
# JP: だが、今すぐにはもったいない。\n欲を堪えて、すっ飛んでいたダンボールを拾う。
3240 = "但是，現在立刻開始實在是太可惜了。我忍耐住欲望，將飛出去的紙箱撿起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かわいいからこそ、今は、凪の水着を見たい。\n大人な凪を、まずは視線で、楽しみたい」
2816 = "「正因為你可愛，我才想看看你穿泳裝。我想先用眼睛觀賞觀賞成熟的你」" 

# 【凪】
# display as 凪
# JP: 「あ……ん」
2524 = "「啊……嗯」" 

# monologue
# JP: ゆっくり、頷く。\nそれから凪は頭を振って――
3352 = "凪慢慢地點了點頭。接著，她搖了搖頭――" 

# monologue
# JP: （パチンっ！）
4018 = "（啪！）" 

# monologue
# JP: 自分の両頬に気合いをいれて、\n僕の手から、しっかりとダンボールを受け取り直す。
3708 = "拍打了自己的兩頰，鄭重地從我手中接過紙箱。" 

# 【凪】
# display as 凪
# JP: 「よかとよ！　楽しみにしとくばい！」
2653 = "「好！你就好好期待吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2567 = "「嗯！」" 

# monologue
# JP: 凪は勢いよく次の間へ――\n行く前、くるりと振り返る。
3396 = "凪興奮地衝進了小房間。在進去之前，她轉頭看向了我。" 

# 【凪】
# display as 凪
# JP: 「えへへ、にーさんなら特別に、\nちょこっとだけなら覗いてもよかとよ？」
2595 = "「嘿嘿嘿，你的話，想稍微偷窺一下也可以哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいがな、今は我慢だ。\n凪の水着を、一番鮮やかに焼き付けるため」
2714 = "「我也想，但現在我要忍耐。我要將你最漂亮的泳裝模樣刻在眼底」" 

# 【凪】
# display as 凪
# JP: 「なら、ちょこっとだけ待っとって！！」
2985 = "「那就在這裡等一下！！」" 

# monologue
# JP: (しゃ！――ぱたっ！）
4035 = "（拉！――啪嗒！）" 

# 【凪】
# display as 凪
# JP: 「んしょ――よい、しょっ！\nあ、ダンボール開けるのわすれとったばい」
2592 = "「嘿咻……嘿咻！啊，忘記開紙箱了」" 

# monologue
# JP: ふすまの向こうにいるというのに、\n凪の行動は筒抜けだ。
3257 = "儘管跟我隔了一扇推門，凪的動作卻全都暴露給了我。" 

# 【凪】
# display as 凪
# JP: 「あけんと――んと、\nあ！　ここを押せって書いてあるとばい！」
2749 = "「打不開……唔，啊！這裡寫了按下去！」" 

# monologue
# JP: （べりべりべりべりっ）
4020 = "（喀嚓喀嚓）" 

# monologue
# JP: ……いま凪は、全裸でダンボールを開けているのか。\nその想像に、妙な興奮を感じてしまう。
1761 = "……現在凪是赤身裸體在開箱子嗎？想像到這裡，我莫名感到一陣興奮。" 

# 【凪】
# display as 凪
# JP: 「空いたばーい！　じゃじゃんっ！！\nお？　おおお――おおおおおっ！！！？」
2751 = "「打開了！鏘鏘！！噢？噢噢噢……噢噢噢？！」" 

# monologue
# JP: む？　……なんだ。\nいきなり凪が静かになった。
3453 = "嗯？怎麼了？凪突然就安靜下來了。" 

# monologue
# JP: 不安になって耳をすます――と――
3689 = "我覺得有些擔心，於是豎起耳朵仔細聽。" 

# 【凪】
# display as 凪
# JP: 「ふぁ……ぁ……これ……凄かとばい……\nん……わ……わわ……ええ……どうしよう、ばい」
2451 = "「哇……啊……這……太厲害了……唔……哇……哇哇……哎，這可怎麼辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪、どうした？　なにかあったか？」
2372 = "「凪，怎麼了？發生什麼事了嗎？」" 

# 【凪】
# display as 凪
# JP: 「なんでもなかばい！　着れたばい！！」
2828 = "「沒什麼！穿上了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお！　ならば早く見せてくれ」
2610 = "「噢！那就快點給我看」" 

# 【凪】
# display as 凪
# JP: 「う、うん。\n着れたは――着れた……ばってん」
2564 = "「嗯、嗯。穿是穿上了……」" 

# monologue
# JP: 音もなく、しずしずとふすまが開かれる。
3720 = "推門靜靜地打開了。" 

# monologue
# JP: ――凪の姿が、見えてくる。
3682 = "我終於看見了凪的模樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――おおっ！！？」
2603 = "「噢……噢？！」" 

# 【凪】
# display as 凪
# JP: 「布も……思ったより、なかった、ばい」
2680 = "「布料……比咱想像中還少」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これ、は――」
2947 = "「這……」" 

# monologue
# JP: エロい。\nその言葉だけが体を埋める。
3468 = "太黃了。我只能想到這句話來形容。" 

# monologue
# JP: 血が燃えたぎる――この上なく完全に勃起する。\n凪を、今すぐにでも押し倒したい。
3676 = "我的血液在燃燒――我已經徹底勃起了。我想現在立刻推倒凪。" 

# 【凪】
# display as 凪
# JP: 「どう……ばい？　凪、さま……おとなっぽか、と？」
1796 = "「……怎麼樣？本小姐……成不成熟？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――」
2949 = "「這個嘛」" 

# monologue
# JP: 学園指定の水着が焼き付けた日焼け跡が、\n凪の素肌の白さを鮮やかに引き立てている。
3524 = "學校泳裝留下的曬黑的印記，襯托出了凪肌膚原本的亮白。" 

# monologue
# JP: そのほとんどが剥き出して――\n水着は局部を、ごくごくわずかに隠しているのみだ。
3830 = "而現在她的肌膚幾乎全部暴露在空氣中，泳裝只遮擋了非常少的一部分。" 

# 【双鉄】
