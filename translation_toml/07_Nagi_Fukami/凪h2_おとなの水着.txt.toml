# display as 雙鐵
# JP: 「なんだ。そんなことか」
2304 = "「什麼嘛，小事而已」" 

# monologue
# JP: すぐに脱ごうと水着を着てきて、着替えを忘れる。\n学園生にままあるこ……と………………え？
3495 = "她換泳裝那麼快，把衣服給落下了。學生嘛，這種事情很……嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「忘れた、のか？　凪は、パンツを」
2331 = "「你忘記帶內褲了嗎？」" 

# monologue
# JP: 問題なのは、水着に着替えた、その場所だ。\n僕の自宅に届いた水着を、凪は……すぐさま――
3449 = "問題在於，她換泳裝的地點。凪是在我家立刻換上了剛寄來的泳裝……" 

# 【双鉄】
# display as 雙鐵
# JP: 「――次の間に」
1785 = "「……在小房間裡」" 

# 【凪】
# display as 凪
# JP: 「そいか、にーさんの部屋ばい」
2669 = "「對，在你房間裡」" 

# monologue
# JP: ハチロクが見つけてくれれば救われる。\n苦笑をし、きっと隠してくるから。
3518 = "如果是被八六發現，那我就得救了。她肯定會苦笑一聲，然後幫我藏起來。" 

# monologue
# JP: だが――
3232 = "但是……" 

# monologue
# JP: （ぞくっ！）
4032 = "（抖！）" 

# monologue
# JP: 背筋が急に寒くなる。\n夏の終わりが、そこに来ている。
3560 = "後背一陣發涼。夏天馬上就要結束了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「帰ろう、凪。いますぐに」
2725 = "「我們回去吧，凪。立刻，馬上」" 

# 【凪】
# display as 凪
# JP: 「そ、そうばいねっ！」
2766 = "「是、是的」" 

# monologue
# JP: ゆえに、僕らは手を結び合う。\n次の季節も、その次も、一緒に歩む、そのために。
3455 = "因此，我們牽起了手。為了能在下一個季節，乃至往後的季節裡，能相伴而行。" 
