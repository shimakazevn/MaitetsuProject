# 凪h2_おとなの水着.txt 
[info]

[characters]
3269 = "凪"
3427 = "双鉄"

[character_subs]
# 3269 = "凪"
3932 = "雙鐵"

[script]
# lines: 722 
# 【凪】
# display as 凪
# JP: 「見つからなかったとばい！」
2829 = "「沒找到咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念だ」
2870 = "「真遺憾」" 

# monologue
# JP: 百貨店からスポーツ用品店、\nはては古着屋まで、丹念に探してみたのだが――
3597 = "我們從百貨店、運動用品店找到了二手服裝店，全都找了個仔細……" 

# 【双鉄】
# display as 雙鐵
# JP: 「最初から隈元まで出ればよかったか。\n無駄足という形になってしまったな」
2762 = "「早知道只跑到隈元就差不多了。結果現在白跑了這麼遠」" 

# 【凪】
# display as 凪
# JP: 「ちょっとも無駄足じゃなかとよー」
2475 = "「哪裡能算白跑了呢」" 

# monologue
# JP: ――けれども、凪はニッコリ笑う。\n笑って、ぐいぐい、僕をその肩でつっついてくる。
1737 = "――但是，凪卻笑了。她笑著用肩膀頂了頂我。" 

# 【凪】
# display as 凪
# JP: 「にーさんと一緒にあれこれ探して\nたくさんおしゃべりしたけんね！」
2857 = "「畢竟咱是跟大哥哥一起跑來跑去的，所以還聊了一路的天嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2795 = "「有道理」" 

# monologue
# JP: 得られなかったものではなくて、得たものを見る。\n凪のことばに教えられれば、僕の視点も切り替わる。
3204 = "不要關注沒有得到的，而要去關注得到的。聽凪這麼說，我也得以切換視角。" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑顔もふくれっつらも見て、歓声も落ち込んだ声も\n聞けた、これほど有意義な時間の使い方も無い」
2865 = "「看見了你揚起嘴角，看見了你鼓起臉頰，聽見你歡呼，聽見你嘆氣，沒有比這更有意義的時光了」" 

# 【凪】
# display as 凪
# JP: 「ちょっ！　にーさん、\nそぎゃんと言われたら照れくさかとよー」
2550 = "「喂！大哥哥，你這樣說咱會害羞的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならばもう少し照れてくれ」
2789 = "「會嗎？那你就再害羞一點吧」" 

# 【凪】
# display as 凪
# JP: 「ひゃう」
2402 = "「呀」" 

# monologue
# JP: 左手で凪を捕まえて、\n右手で頭を、いいこ、いいこと撫でくりまわす。
3668 = "我用左手抓住凪，用右手撫摸起她的腦袋。" 

# 【凪】
# display as 凪
# JP: 「えへへー、これはちょっとも照れくさくなかとよ！\nここちよかけんね！」
2599 = "「嘿嘿嘿，這樣咱會有些害羞的！畢竟很舒服嘛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2988 = "「那就好」" 

# monologue
# JP: 撫でくり撫でくる。少し堅い髪の手触りがここちいい。\n凪もごろころ、喉を鳴らしそうな表情だ。
3654 = "我撫摸來撫摸去。她稍稍有些硬的頭髮摸上去很舒服。凪也高興得似乎像是要笑出聲來。" 

# 【凪】
# display as 凪
# JP: 「耳の後ろも撫でてほしかとばーい」
2895 = "「耳朵後面也摸一摸唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここか」
2963 = "「這裡嗎」" 

# 【凪】
# display as 凪
# JP: 「んー、気持ちよかとー。\nしたら、今度はアゴの下ばい」
2584 = "「嗯，舒服。然後接下來是下巴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「アゴの下――こんな感じか？」
2256 = "「下巴……像這樣？」" 

# monologue
# JP: 人差し指をカギに曲げ、\nこりこり、なでなで。
3633 = "我彎了彎食指，摳了摳，又撓了撓。" 

# 【凪】
# display as 凪
# JP: 「よかとよかとー。\nおなかも撫でて欲しかとばい！」
2904 = "「舒服舒服。也摸一摸肚子唄！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ！\nあああ、こんなところで腹を出すな」
2670 = "「小事一樁！啊啊，別在這裡露出肚子」" 

# monologue
# JP: Ｔシャツをめくろうとした手を止めて、\nその上から、凪のおなかを撫でてやる。
3607 = "我制止住準備掀起Ｔ恤的她，隔著衣服開始撫摸她的肚皮。" 

# monologue
# JP: 撫でるほど幸せがこみあげて、いつまでだって――
3260 = "光是摸著我就覺得越來越幸福，希望能永遠這樣摸下去。" 

# monologue
# JP: （ざわ、ひそ）
4045 = "（摸，摸）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2511 = "「唔？」" 

# monologue
# JP: これはいかん。\n遠巻きに、人が僕らを見始めている。
3912 = "這可不行。遠遠地有人開始望著我們了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪、今はここまでだ」
2374 = "「凪，現在就到此為止」" 

# 【凪】
# display as 凪
# JP: 「えー、凪さま、もっと撫でられたかとー！」
2465 = "「哎，本小姐還想多被摸摸咧！」" 

# monologue
# JP: 大声。\n遠巻きに僕らを見ている輪からクスクス笑い声。
3833 = "聲音好大。遠處看著我們的人都發出了笑聲。" 

# monologue
# JP: 『仲の良いきょうだいね』などという声も聞こえる。
3227 = "似乎還能聽見他們在說我們關係好。" 

# 【凪】
# display as 凪
# JP: 「きょうだいじゃ」
2383 = "「又不是兄……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
2353 = "「凪」" 

# 【凪】
# display as 凪
# JP: 「もがっ」
2535 = "「啊嗚」" 

# monologue
# JP: このままでは良い見世物だ。\n凪の口元を手で覆い、耳元、意識して甘い声を出す。
3918 = "這樣下去只會丟人現眼。我遮住凪的嘴，故意在她嘴角用甜甜的聲音說話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「撫でられ足りぬなら、あとでいくらでも撫でてやる。\nふたりきりになったとき、凪が、満足しきるまで」
2914 = "「要是沒被摸夠的話，回頭你想我怎麼摸我就怎麼摸。到了獨處的時候，我可以摸到你滿意為止」" 

# 【凪】
# display as 凪
# JP: 「ひゃっ///」
2415 = "「呀／／／」" 

# monologue
# JP: 一気に、凪が赤くなる。\n芯から照れてる。珍しい。そして可愛らしい。
3378 = "凪的臉一下就紅了。她是發自內心在害羞。真少見，真可愛。" 

# monologue
# JP: じっくりたっぷり眺めていたいが、\n今は人目を外れねば、だ。
3582 = "我也想好好地觀賞一下，但也得找個沒人的地方。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ」
2726 = "「我們走」" 

# 【凪】
# display as 凪
# JP: 「…………ぅん」
1784 = "「……嗯」" 

# monologue
# JP: 早足に、大通りまで抜けてくる。
3598 = "我們快步走過大道。" 

# monologue
# JP: そうする間に残念ながら、\n凪も切り替わってしまってる。
3921 = "遺憾的是，就在這樣一段時間當中，凪已經恢復原樣了。" 

# 【凪】
# display as 凪
# JP: 「で？　にーさん、どこいくと？」
3002 = "「那麼，大哥哥，咱們要去哪裡？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ。今さらだが、\nやはり隈元か、あるいは八ツ城まで出てみるか？」
2510 = "「唔，雖說很老套，不過來都來了隈元，要不去八代吧」" 

# 【凪】
# display as 凪
# JP: 「[つるや,1]鶴屋さんにもオリムピアさんにも無かったけん。\n隈元やら[やつしろ,2]八ツ城やらいってもきっと無かとよ」
3021 = "「鶴屋和奧林匹亞都沒有，到隈元到八代去肯定也不會有的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪がそういうなら、そうかもしれんな」
2368 = "「凪或許你說得對」" 

# monologue
# JP: 残念ながら、隈元や八ツ城での買い物自体を\n僕はほとんど経験してない。
3685 = "我自己本身就沒有什麼到隈元和八代購物的經驗。" 

# monologue
# JP: ましてや、水着。\n隈元市内まで仮に出たとて……いや。
3736 = "更何況是買泳裝。即使去了隈元市內……也不對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、隈元市内にいけば、\nいわゆるブランドショップがあるのではないか？」
2320 = "「但是，去了隈元市內，興許會有所謂的品牌店吧？」" 

# 【凪】
# display as 凪
# JP: 「ブランドって――アヂダスとかピューマとかと？」
2444 = "「品牌……例如阿迪和標馬？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたスポーツブランドの店もあるだろうし、\nもっとこう、いわゆるファッションブランドなども」
2794 = "「有這些運動用品品牌店，也有一些流行品牌店」" 

# 【凪】
# display as 凪
# JP: 「ファッションブランド？」
2833 = "「流行品牌？」" 

# monologue
# JP: それ何と？　と、まあるい瞳が問いかけてくる。
3403 = "凪那圓圓的眼彷彿是在問我那是什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も詳しくは知らんが――\n代表的なところでは、チャネルとか、ヴッチとか」
2712 = "「我也不是很熟悉……代表性的有香奈爾、古弛之類的」" 

# 【凪】
# display as 凪
# JP: 「ヴッチ！」
2386 = "「古弛！」" 

# monologue
# JP: 凪が勢い良く手をあげる。
3395 = "凪興奮地揮了揮手。" 

# 【凪】
# display as 凪
# JP: 「それなら凪さま知っとるばい！\nヴッチのバッグは百年使えるって聞いたけん！！」
2951 = "「這個本小姐知道咧！聽說古弛的包能用一百年！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「らしいな。そういう一流ブランドの品ならば、\n恐らくは大人っぽく、質もよかろう」
2645 = "「好像是的。這種一流品牌的商品，估計會很成熟，品質也很好」" 

# 【凪】
# display as 凪
# JP: 「そりゃ凪さまに似合いそーばい！！」
2998 = "「那肯定合適本小姐咧！！」" 

# monologue
# JP: 笑って言って。\nけれども凪は、すぐさま大げさに肩をすくめる。
3392 = "凪笑著說道。但是她很快又耷拉下了腦袋。" 

# 【凪】
# display as 凪
# JP: 「ばってん、そぎゃんとはめちゃくちゃ高そうばい！\n今のウチには、[ぶんふそうおう,3]分不相応ってヤツになるとよ」
2391 = "「可是，那些肯定特別貴嘞！現在咱不配去買」" 

# 【双鉄】
# display as 雙鐵
# JP: 「分不相応」
2278 = "「不配」" 

# monologue
# JP: わからず言ってる口調ではない。\n驚き、思わずオウム返しにしてしまう。
3838 = "聽她這口氣似乎不是不懂。我很驚訝，不由得複述了她的話。" 

# 【凪】
# display as 凪
# JP: 「自分で稼いだお金で買えんよーなもんば、分不相応。\nそぎゃんもん身につけたら、物にも自分にも失礼ばい」
2265 = "「不用自己賺的錢買就不配買。不然買來對東西、對自己都是不尊敬」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。それが、凪の“分”か」
2779 = "「是嗎。這就是你口中的“配不配”啊」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　じーちゃんにも、ばーちゃんにも、\n剣術のお師さんにも教わっとるけんね！」
2668 = "「對咧！爺爺奶奶和劍術老師都是這麼教咱的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。実に良い教えだと、僕も思う」
2579 = "「嗯，我覺得他們教得很好」" 

# 【凪】
# display as 凪
# JP: 「でしょお！」
2771 = "「是吧！」" 

# monologue
# JP: また肩先でつんつんと。\nかように凪は、感情と行動が直結しやすい。
3474 = "她又用肩膀頂了頂我。凪總是將感情直接付諸於行動。" 

# monologue
# JP: その可愛さは、調子に乗りやすさだとも言える。\n蓑笠さんや奥様などは、そうと重々知るが故……
3498 = "她的可愛也可以說成是禁不住夸，容易上臉。蓑笠爺爺和奶奶非常清楚這一點，所以才……" 

# 【双鉄】
# display as 雙鐵
# JP: 「分をわきまえろ、か。\n大事に、育てられているのだな」
2908 = "「要你看清自己的定位啊。看來他們待你非常好」" 

# 【凪】
# display as 凪
# JP: 「そーでもなかとよ？\n本物のお[きゅう]灸、据えられるけんねー」
2291 = "「也不是這樣的。我會被真傢伙艾灸的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本物……とは、比喩ではなく、\nあの、もぐさに火をつけるやつを据えられるのか？」
2867 = "「真傢伙……那你不是在比喻，而是被過了火的艾葉艾灸？」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんと！　ああ見えてばーちゃん厳しかけん。\nいけんいわれたことしたら、据えられるばい！」
2772 = "「是咧！別看奶奶那樣，她可嚴格了。要是做了她不讓做的事，咱就會被艾灸的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。あれは実際、熱い物か？」
2780 = "「是嗎。那東西很燙嗎？」" 

# 【凪】
# display as 凪
# JP: 「あっつかとよー！　やけん、ちっちゃかときは\nびっくりして怖くて、やめてよしてって泣いたけん」
2850 = "「燙死了咧！咱小時候都特別害怕，總是哭著求她不要艾灸」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は、泣かずに済んでいるのか？」
2996 = "「那現在你已經不哭了嗎？」" 

# 【凪】
# display as 凪
# JP: 「ウチもおっきくなったけんねー」
2436 = "「咱也長大了嘛」" 

# monologue
# JP: カラリと笑い、\n凪はとんとん、自分の腰を叩いてみせる。
3388 = "凪笑了笑，然後敲了敲自己的腰。" 

# 【凪】
# display as 凪
# JP: 「体のしんどかとこにお灸ば据えてもらえると、\n気持ちよかとー、って感じるようになったとばい」
2892 = "「而且在身子不舒服的地方艾灸，現在我會覺得舒服了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2781 = "「是嗎」" 

# monologue
# JP: 歩くだけでも、\n凪の手足は、これほどのびのび、大きく動く。
3263 = "光是走在路上，凪的手腳的動作都很大。" 

# monologue
# JP: ともはりに、剣術修行に日々の投炭。\n――筋肉疲労は、相当だろう。
3717 = "掌櫓、劍術修行外加每日的加煤，她的肌肉一定非常疲憊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、むしろ失敗したくなってしまいそうだな」
2989 = "「那感覺你甚至會想故意搞砸啊」" 

# 【凪】
# display as 凪
# JP: 「それがそーでも無かとばい！\nルール、まるっきり変わったけんね」
2292 = "「也不是這樣的咧！規則已經徹底改嘍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
2782 = "「是嗎？」" 

# 【凪】
# display as 凪
# JP: 「いけんことしたらご飯抜きで、\nばーちゃんのお手伝いしたらお灸ば据えてもらえると」
2337 = "「做了壞事咱就不能吃飯，給奶奶幫忙就可以給我艾灸」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。お仕置きにならんことに気付き、\nお祖母様は発想を転換されたのか」
2708 = "「懂了。發現這件事不能算懲罰之後，你奶奶就轉換了方式啊」" 

# monologue
# JP: それは良い。凪がときおり見せる鋭さ――\nその根源を見た気にさえなる。
3911 = "這個主意不錯。凪偶爾會展現出的那份敏銳，我大概是找到起源在哪裡了。" 

# monologue
# JP: 蓑笠鍛冶店の店の奥、ちんまりしている\n静かな方と、そんな印象しかなかったが……
3630 = "我對她的印象原本只停留在蓑笠鍛冶店深處的一位和藹的老人……" 

# 【双鉄】
# display as 雙鐵
# JP: 「一度、じっくりお話してみたくなったな。\n凪の、お祖母様と」
2474 = "「哪天有機會，真想和你的奶奶好好聊聊」" 

# 【凪】
# display as 凪
# JP: 「大歓迎ばい！　いつでもよかとよ！！\nなんなら、今日これからだってよかとばい！」
2814 = "「歡迎咧！什麼時候都行！！要不今天等一下就可以！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「喜んで――なのだが。その前に、\n水着をなんとか解決したい」
2733 = "「我很樂意……但是，在這之前，我們得先買到泳裝」" 

