4063 = "（Siết chặtttttttt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぅぅっ！」
2499 = "「Ư ư ư!」"
# monologue
# JP: （どびゅっ！　びゅぶっ！　びゅうっ！　ぢゅぶっ！）
# 4010 = "（咻！咻！咻！咻！）" 
# 【凪】
# display as 凪
# JP: 「ああ――あふゅいっ――ひ、へ――へーえきっ――\nおなかっ――あかちゃん――おへや、びゅうびゅう」
2515 = "「A——Nóng quá——T, ti——Tinh dịch—— Bụng——Em bé——Căn phòng, phụt phụt」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅっ！　ぶぷっ！）
# 4010 = "（咻！咻！咻！咻！）" 
# 【凪】
# display as 凪
# JP: 「わかるっ――けんっ、あた、って――いちばん、\nおくが――たぷ、たぷっ――するっ――けんっ――あ」
2705 = "「Cảm nhận được——á, đập, vào——tận cùng, bên trong——nhũn, nhũn——ra——á——a」"
# monologue
# JP: （びゅっ！　――びゅう――びゅる――びゅっ……）
4009 = "（Phụt! ——Phụt——Phụt——Phụt……）"
# 【凪】
# display as 凪
# JP: 「かっ――はっ！　あっ！　あぐっ――かふっ！\nはぁっ！　はあっ！　はあっ！　はあっ！」
2520 = "「Hà——Hà! A! A——Hà!\nHà! Hà! Hà! Hà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪」
# 2353 = "「凪」" 
# 【凪】
# display as 凪
# JP: 「ふあっ――にーひゃん――ん、ちゅう――\nちゅう、ちゅうぅ」
2526 = "「Phù a——Anh hai——Ưm, chụt——\nChụt, chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2565 = "「嗯」" 
# monologue
# JP: 体を起こし、キスをする。
3615 = "Tôi đỡ người dậy, rồi hôn em."
# monologue
# JP: 口の端たれるよだれをすすり、涙を舐めて、\n鼻先を吸い、もうなんどでも、唇へ。
3612 = "Mút lấy dòng nước bọt rỉ ra từ khóe miệng, liếm đi những giọt nước mắt, hút nhẹ đầu mũi, rồi hết lần này đến lần khác, tìm đến đôi môi em."
# 【凪】
# display as 凪
# JP: 「あむっ――ちゅっ――ちゅうっ――ちゅうっ――\nちゅっ――ひーひゃん――しゅき――しゅきぃ」
2531 = "「Ngoạm——Chụt——Chụt——Chụt—— Chụt——Anh hai——Thích——Thích lắm á」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。凪が、大好きだ」
2717 = "「Tôi cũng vậy. Rất thích, Nagi」"
# 【凪】
# display as 凪
# JP: 「えへ……へ……へ――へっ――」
2594 = "「Ehe……he……he——he——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2585 = "「嗯？」" 
# 【凪】
# display as 凪
# JP: 「はーーーーくしゅんっ！！」
3010 = "「Hắt——xì!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おわっっ！！？」
# 2462 = "「哇？！」" 
# monologue
# JP: 凪も僕も、直前で顔をそむけあったが、\n今のは――かなりヒヤリとした――いや。
3614 = "Nagi và tôi, cả hai đều ngoảnh mặt đi ngay sát nút, nhưng vừa nãy——đúng là hú hồn——à không."
# 【双鉄】
# display as 雙鐵
# JP: 「いつの間に、少し冷えるな。\nこれではくしゃみも止むを得まい」
2268 = "「Từ lúc nào mà trời đã hơi se lạnh rồi. Thế này thì hắt xì cũng là chuyện dễ hiểu thôi」"
# 【凪】
# display as 凪
# JP: 「ううう、体ば流さんと」
2498 = "「Ư ư ư, phải đi tắm rửa thôi á」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2776 = "「是啊」" 
# monologue
# JP: 水着を直し、川につかって、\n汗やよだれを流してしまう。
3599 = "Chúng tôi chỉnh lại đồ bơi, ngâm mình xuống sông, rửa trôi mồ hôi và nước bọt."
# monologue
# JP: あがった凪をタオルで拭いて、それから僕も。\nあとは着替えてしまえばそれで――
3209 = "Lau người cho Nagi khi em lên bờ, rồi tôi cũng tự lau cho mình. Giờ chỉ cần thay quần áo nữa là xong——"
# 【凪】
# display as 凪
# JP: 「ああああああっ！？」
# 2544 = "「啊？！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、どうした」
2307 = "「Sao thế, có chuyện gì à」"
# 【凪】
# display as 凪
# JP: 「凪さま、水着の着替えがなかとっ！\nやけん――パンツ、忘れたとばい！！」
2801 = "「Nagi-sama, không có đồ lót để thay á! Nên là——quên quần lót mất rồi á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。そんなことか」
2304 = "「Tưởng gì. Chuyện đó à」"
# monologue
# JP: すぐに脱ごうと水着を着てきて、着替えを忘れる。\n学園生にままあるこ……と………………え？
3495 = "Mặc sẵn đồ bơi bên trong để cởi cho nhanh, rồi quên mang theo đồ lót để thay. Đó là chuyện thường tình của học sinh……mà………………hả?"
# 【双鉄】
# display as 雙鐵
# JP: 「忘れた、のか？　凪は、パンツを」
2331 = "「Quên, á? Nagi, quên quần lót á」"
# monologue
# JP: 問題なのは、水着に着替えた、その場所だ。\n僕の自宅に届いた水着を、凪は……すぐさま――
3449 = "Vấn đề là, cái nơi mà em ấy đã thay đồ bơi. Bộ đồ bơi được giao đến nhà tôi, Nagi đã……ngay lập tức——"
# 【双鉄】
# display as 雙鐵
# JP: 「――次の間に」
1785 = "「——Ở phòng bên」"
# 【凪】
# display as 凪
# JP: 「そいか、にーさんの部屋ばい」
2669 = "「Hay là, ở phòng anh hai á」"
# monologue
# JP: ハチロクが見つけてくれれば救われる。\n苦笑をし、きっと隠してくるから。
3518 = "Nếu Hachiroku tìm thấy thì còn đỡ. Em ấy sẽ cười khổ, rồi chắc chắn sẽ giấu đi giúp."
# monologue
# JP: だが――
3232 = "Nhưng mà——"
# monologue
# JP: （ぞくっ！）
4032 = "（Rùng mình!）"
# monologue
# JP: 背筋が急に寒くなる。\n夏の終わりが、そこに来ている。
3560 = "Sống lưng tôi chợt lạnh toát. Cuối hè, đang đến rất gần rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「帰ろう、凪。いますぐに」
2725 = "「Về thôi, Nagi. Ngay bây giờ」"
# 【凪】
# display as 凪
# JP: 「そ、そうばいねっ！」
2766 = "「Đ, đúng á!」"
# monologue
# JP: ゆえに、僕らは手を結び合う。\n次の季節も、その次も、一緒に歩む、そのために。
3455 = "Vì thế, chúng tôi nắm chặt tay nhau. Để cùng nhau bước tiếp sang mùa tới, và cả những mùa sau nữa."
