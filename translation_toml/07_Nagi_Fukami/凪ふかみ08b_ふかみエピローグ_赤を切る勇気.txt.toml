2638 = "「Nếu để Fukami bị thương, anh sẽ phải\nhối hận về sự vô dụng của mình mãi mất.」"
# 【ふかみ】
# display as 深美
# JP: 「ふぁっ」
2176 = "「Oa.」"
# monologue
# JP: ふかみちゃん、ぽーって赤くなる。
3408 = "Bé Fukami đỏ bừng mặt."
