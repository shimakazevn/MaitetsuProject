3127 = "Chuyện kết hôn thì mình vẫn chưa hề nghĩ\ntới một cách nghiêm túc rõ ràng……\nỪm! Dù\nhai người không gặp nhau nhiều đến\nthế――cũng không sao!!"

# 【凪】
# display as 凪
# JP: 「わかったとばい！　さすが凪さま、天才ばい！！」
2173 = "「Em hiểu rồi! Quả không hổ danh Nagi, đúng\nlà thiên tài mà!!」"

# 【ふかみ】
# display as 深美
# JP: 「って、凪ちゃん、なにが……わかっちゃったの？」
2473 = "「Khoan đã, Nagi, cậu……hiểu ra chuyện gì\ncơ?」"

# 【凪】
