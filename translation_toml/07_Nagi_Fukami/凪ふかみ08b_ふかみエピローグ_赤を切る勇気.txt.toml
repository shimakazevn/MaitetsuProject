2649 = "「Ngốc thật. Dù em không bị thương, dù không có chuyện gì xảy ra.\nThì việc anh quên Fukami là điều không thể nào.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん」
2756 = "「Anh Soutetsu.」"
