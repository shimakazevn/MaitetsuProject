# JP: 「七年間。七年も――\nそれだけまったら、十分じゃなかと？」
1958 = "「Bảy năm rồi. Bảy năm trời――\nĐợi chừng đó,\nchẳng phải là quá đủ rồi sao?」"

# 【ふかみ】
# display as 深美
# JP: 「あっ――」
# 2209 = "「啊……」" 

# monologue
# JP: 凪も、いつの間に泣き出している。
3085 = "Nagi cũng đã khóc từ lúc nào không hay."

# monologue
# JP: いつもの凪より、ずっと落ち着いた顔をして――\nなのに涙が、両目から、ぼろぼろぼろぼろ、落ちていく。
3345 = "Khuôn mặt điềm tĩnh hơn hẳn Nagi thường\nngày――\nVậy mà nước mắt từ hai khóe mắt, cứ\nlã chã tuôn rơi."

# 【凪】
# display as 凪
# JP: 「時間がたって、わかったと。うちにとっても、初恋で。\nばってん、相手がふかみちゃんだから――」
2713 = "「Thời gian trôi qua, mình đã hiểu. Đối với\nmình, đó cũng là tình đầu.\nNhưng, vì đối\nphương là bé Fukami nên――」"

# 【ふかみ】
# display as 深美
# JP: 「なぎ、ちゃん――」
2380 = "「Nagi――」"

# 【凪】
# display as 凪
# JP: 「――ふかみちゃんだから、ガマンしたとよ。\nけど、ふかみちゃんが。にーさんのこと、守らんのなら」
1520 = "「――Vì là bé Fukami, nên mình mới nhịn đó.\nNhưng mà, nếu bé Fukami. Không bảo vệ anh\nSoutetsu thì.」"

# 【レポーター】
# display as 記者
# JP: 「あ」
# 2213 = "「啊」" 

# monologue
# JP: レポーターがさっと僕から離れる。\n凪はそちらを見ようともしない。
3681 = "Phóng viên nhanh chóng rời khỏi tôi.\nNagi\nthậm chí không thèm nhìn về phía đó."

# monologue
# JP: もはやふかみをも見ていない。\nまっすぐに、ただまっすぐに――僕を、見ている。
3341 = "Thậm chí cũng không nhìn Fukami nữa.\nChỉ\nnhìn thẳng, nhìn chằm chằm――vào tôi."

# 【凪】
# display as 凪
# JP: 「にーさん」
2311 = "「Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪……」
2066 = "「Nagi……」"

# monologue
# JP: 言わないでくれと、願ってしまう。\n僕の答えなら、動かないから。
3489 = "Xin em đừng nói ra, tôi thầm cầu nguyện.\nBởi vì câu trả lời của tôi, sẽ không thay\nđổi."

# monologue
# JP: 僕はふかみを愛しているし、\nその感情は――凪への思いとは、違うから。
3473 = "Tôi yêu Fukami,\nvà tình cảm đó――khác với\ntình cảm dành cho Nagi."

# 【凪】
# display as 凪
# JP: 「にーさん。あん、ね？\nウチ、は。にーさんのこと、ずっと、ずうっとっ」
2325 = "「Anh Soutetsu. À, ừm?\nEm, thì. Từ trước\nđến nay, luôn luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「だめええええええええええぇぇぇぇっっっ！！！」
1969 = "「Không đượccccccccccccccccccc!!!」"

# 【凪】
# display as 凪
# JP: 「あっ――」
# 2209 = "「啊……」" 

# monologue
# JP: ふかみが、割り込む。\n凪を押しのけ、真正面から、僕に全身で抱きついてくる。
3590 = "Fukami chen vào.\nĐẩy Nagi ra, cô ấy ôm\nchầm lấy tôi bằng cả cơ thể từ chính diện."

# monologue
# JP: 抱き返す。僕の両手で、思い切り。\n凪は――さみしげに、微笑んでいる。
3456 = "Tôi ôm lại cô ấy. Bằng cả hai tay, thật\nchặt.\nNagi――đang mỉm cười, một cách cô\nđơn."

# 【ふかみ】
# display as 深美
# JP: 「渡さないもん！　ダメだもん！！　川下りより、\n鉄道より！　双鉄おにいさんのことが大事だからっ！」
2452 = "「Mình không giao cho ai đâu! Không được\nđâu!! Hơn cả việc chèo thuyền,\nhơn cả\nđường sắt! Vì anh Soutetsu là người quan\ntrọng nhất với mình!」"

# monologue
# JP: ふかみはぶるぶる震えている。\n震えつつ、僕を抱きしめ離すまいとする。
3577 = "Fukami đang run lẩy bẩy.\nDù đang run rẩy,\ncô ấy vẫn ôm chặt lấy tôi không chịu\nbuông."

# monologue
# JP: それが愛しい。そして、辛い。\n七年も――僕は、愚かにも安心しきって――
3716 = "Thật đáng yêu. Và cũng thật đau lòng.\nBảy\nnăm trời――tôi đã ngu ngốc an tâm tuyệt\nđối――"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんのこと大好きだけど！　凪ちゃんよりも！\n凪ちゃんよりも――大好きだからっ！！」
2463 = "「Mình rất thích Nagi! Nhưng hơn cả Nagi!\nHơn cả Nagi――mình thích anh Soutetsu nhiều\nhơn!!」"

# 【凪】
# display as 凪
# JP: 「あー」
# 2209 = "「啊……」" 

# monologue
# JP: ……言わせてはいけない一言だ。\n言わせずに済んだ一言だ。
1474 = "……Một câu không nên để cô ấy phải nói ra.\nMột câu lẽ ra không cần phải nói."

# monologue
# JP: けれども凪は泣き顔のまま、微笑んでいる。\n全てを許し、包むかのように、満足そうに、笑ってる。
3259 = "Thế nhưng Nagi vẫn mỉm cười với khuôn mặt\nđẫm lệ.\nNhư thể tha thứ và bao dung tất\ncả, cô bé đang cười một cách mãn nguyện."

# 【ふかみ】
# display as 深美
# JP: 「だから、ダメ！　とってっちゃダメ！！！\n双鉄おにいさんは、わたしの一番大切な人だからっ！」
2483 = "「Nên là, không được! Không được cướp đi!!!\nVì anh Soutetsu, là người quan trọng nhất\ncủa mình!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。ふかみ」
2654 = "「Cảm ơn em. Fukami.」"

# monologue
# JP: ひたすら強く、抱きしめる。
3460 = "Tôi ôm cô ấy thật chặt, thật chặt."

# monologue
# JP: 今は僕だけ、見てほしくって、感じてほしくて。\nふかみのことを――守りたくって。
3468 = "Lúc này tôi chỉ muốn em nhìn tôi, cảm nhận\ntôi.\nTôi muốn――bảo vệ Fukami."

# 【ふかみ】
# display as 深美
# JP: 「双鉄……おにいさん」
2755 = "「Anh……Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今まで、七年も――\n待たせてしまって、本当に済まなかった」
2632 = "「Đến tận bây giờ, suốt bảy năm trời――\nĐã\nbắt em phải chờ đợi, thực sự xin lỗi em.」"

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2216 = "「啊！」" 

# monologue
# JP: ふかみに、凪に、甘えてきた。甘えきっていた。\n修学旅行を引きずり続け、心地よい今に安寧していた。
3534 = "Tôi đã luôn dựa dẫm vào Fukami, vào Nagi.\nDựa dẫm hoàn toàn.\nCứ kéo dài chuyến đi dã\nngoại mãi, an phận với hiện tại êm đềm\nnày."

# monologue
# JP: だが、ダメだ。それでは不幸にするだけだ。\nふかみのことも、凪のことも。
3133 = "Nhưng, không được. Làm vậy chỉ mang lại\nbất hạnh thôi.\nCho cả Fukami, và cả Nagi."

# 【双鉄】
# display as 雙鐵
# JP: 「そしてどうか、聞いて欲しい。\n僕のふかみへのお願いを」
2628 = "「Và mong em, hãy lắng nghe.\nLời thỉnh cầu\ncủa anh dành cho Fukami.」"

# monologue
# JP: 区切りがなかった。\n踏み出すきっかけをつかめなかった。
3483 = "Không có điểm dừng.\nKhông nắm bắt được cơ\nhội để bước tiếp."

# monologue
# JP: それは、単なるいいわけだ。\nならばこの先、一瞬たりとも時間を無駄にはしたくない。
3092 = "Đó chỉ là một lời bào chữa đơn thuần.\nNếu\nvậy từ nay về sau, tôi không muốn lãng phí\nthời gian dù chỉ một khoảnh khắc."

# 【双鉄】
# display as 雙鐵
# JP: 「指輪は、四年も前に買ってしまっているままだ。\nサイズはきっと、なおさねばならんだろうと思う」
2477 = "「Chiếc nhẫn, anh đã mua từ bốn năm trước\nrồi.\nChắc là phải sửa lại kích cỡ cho vừa\nvặn.」"

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――」
2174 = "「Hả――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、今は指輪も無い、言葉だけでしか、\n愛の誓いをたてられん」
2490 = "「Bởi vậy, bây giờ không có nhẫn, chỉ có\nthể dùng lời nói,\nđể lập lời thề tình yêu\nthôi.」"

# 【ふかみ】
# display as 深美
# JP: 「そんなの、全然っ！　かまわない！　ですっ！」
2566 = "「Chuyện đó, hoàn toàn! Không sao đâu! Ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2580 = "「深美」" 

# monologue
# JP: 構おうと構われまいと、僕の気持ちは変わらない。
3090 = "Dù có sao hay không sao, tâm ý của tôi vẫn\nkhông đổi."

# monologue
# JP: ただひとつ、何年も言えずにいたことは――\nこの土壇場で、ひどくシンプルな形にまとまる。
3418 = "Chỉ một điều duy nhất, bao năm qua tôi\nkhông thể nói ra――\nTrong giây phút quyết\nđịnh này, lại đúc kết thành một hình thức\ncực kỳ đơn giản."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と――結婚してください」
2160 = "「Hãy kết hôn――với anh nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――あ――あっ――あっっ！！」
2212 = "「A――A――A――Á!!」"

# monologue
# JP: ぼろぼろと、泣く。ふかみが、泣いてくずれかける。
3595 = "Khóc nức nở. Fukami khóc đến mức sắp khụy\nxuống."

# monologue
# JP: だから、支える。僕だけの手で。\nふかみは崩れず――背筋を伸ばして、僕を見返す。
3496 = "Nên tôi đã đỡ lấy cô ấy. Bằng chính đôi\ntay của mình.\nFukami không gục ngã――cô ấy\nthẳng lưng, nhìn lại tôi."

# 【ふかみ】
# display as 深美
# JP: 「はい！　喜んでっ！！！！」
2344 = "「Vâng! Em rất sẵn lòng!!!!」"

# 【凪】
# display as 凪
# JP: 「おめでとー！　ふかみちゃーーんっ！！」
2437 = "「Chúc mừng nha! Bé Fukami!!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！！」
# 2382 = "「小凪！！」" 

# monologue
# JP: 凪が、ふかみに飛びついてくる。\nふかみが凪を受け止める。
3231 = "Nagi lao đến ôm chầm lấy Fukami.\nFukami đỡ\nlấy Nagi."

# monologue
# JP: 修学旅行を重ねた間に、何十回も何百回も、\n見てきた光景、そのままに。
3272 = "Y hệt như khung cảnh tôi đã thấy hàng\nchục, hàng trăm lần,\ntrong những chuyến đi\ndã ngoại cùng nhau."

# 【ふかみ】
# display as 深美
# JP: 「ありがと。ありがと。ありがと、凪ちゃん。\nありがと。なぎちゃん、ごめんね。だいすきっ！」
2655 = "「Cảm ơn cậu. Cảm ơn cậu. Cảm ơn cậu, Nagi.\nCảm ơn cậu. Nagi, xin lỗi cậu nhé. Mình\nthích cậu lắm!」"

# 【凪】
# display as 凪
# JP: 「うちも、ふかみちゃんが大好きばい！！」
2167 = "「Mình cũng rất thích bé Fukami!!」"

# monologue
# JP: 凪の涙も、まだ乾かない。
3219 = "Nước mắt của Nagi vẫn chưa khô."

# monologue
# JP: 濡れた瞳はけれど笑顔を――\nいつもの凪の笑顔を作る。
3351 = "Đôi mắt ướt đẫm nhưng vẫn nở nụ cười――\nTạo\nnên nụ cười thường ngày của Nagi."

# 【凪】
# display as 凪
# JP: 「やっと、ふかみちゃん出来たとね！\n赤を切る勇気――持てたとね！！」
2040 = "「Cuối cùng bé Fukami cũng làm được rồi!\nDũng khí cắt cờ đỏ――đã có được rồi!!」"

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2250 = "「啊？！」" 

# monologue
# JP: 泣き止まぬまま、ふかみの瞳がまんまるになる。
3605 = "Trong khi vẫn chưa nín khóc, đôi mắt\nFukami tròn xoe."

# monologue
# JP: まんまるの瞳で僕をみて、レポーターさんを見て、\nもう一度僕を見、視線をゆっくり、凪へと戻す。
3348 = "Bằng đôi mắt tròn xoe ấy, cô ấy nhìn tôi,\nnhìn cô phóng viên,\nrồi lại nhìn tôi một\nlần nữa, và từ từ chuyển ánh nhìn về phía\nNagi."

# 【ふかみ】
# display as 深美
# JP: 「え？　え？　これって――わざと、っていうか……\n凪ちゃん、ええと――その、なんていうのか――」
2249 = "「Hả? Ể? Chuyện này là――cố ý sao, hay là……\nNagi, ừm thì――cái đó, nói sao nhỉ――」"

# 【凪】
# display as 凪
# JP: 「きっかけづくりばレポーターさんに頼んだとばい！\nふかみちゃんの背中ば押すチャンスだと思ったけん！！」
2519 = "「Là mình nhờ chị phóng viên tạo cơ hội đó!\nVì mình nghĩ đây là cơ hội để đẩy bé\nFukami một bước!!」"

# monologue
# JP: 妙に早口でそう言って。\n凪がもじもじ、急に居心地悪そうになる。
3215 = "Nói với tốc độ nhanh một cách kỳ lạ.\nNagi\nlúng túng, đột nhiên trông có vẻ khó xử."

# 【凪】
# display as 凪
# JP: 「やけん――やけんね！？　ウチ、その……\n勢いあまったとか――そういうこと、全然、無かけんっ」
2481 = "「Cho nên――cho nên nha!? Mình, cái đó……\nChỉ\nlà theo đà――chứ không có ý gì, hoàn toàn\nkhông có đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁ――」
# 2209 = "「啊……」" 

# 【凪】
# display as 凪
# JP: 「ウチも、お芝居しただけばい！\n全部、ぜーんぶお芝居やけん、気にしちゃいけんよっ！」
2171 = "「Mình cũng, chỉ là diễn kịch thôi!\nTất cả,\ntấtttt cả đều là diễn kịch, nên đừng bận\ntâm nha!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん……」
# 2380 = "「小凪……」" 

# monologue
# JP: ゆっくり、ゆっくり、ふかみが頷く。
3597 = "Chậm rãi, chầm chậm, Fukami gật đầu."

# monologue
# JP: また泣きそうな顔になり――\nそれを無理やり、本当に無理やり笑顔で歪める。
3332 = "Lại mang vẻ mặt như sắp khóc――\nRồi gượng\nép, thực sự rất gượng ép méo xệch thành\nmột nụ cười."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お芝居、すごく上手になったんだねぇ。\nわたし――本気かと思って――びっくり、しちゃった」
2384 = "「Nagi diễn kịch, giỏi quá nhỉ.\nMình――cứ\ntưởng là thật――làm giật cả mình.」"

# 【凪】
# display as 凪
# JP: 「えっへへー」
2276 = "「Ehehe~」"

# monologue
# JP: 凪はほっとしたようにはにかんで。\nそれから不意に、その目をふかみから外してしまう。
3208 = "Nagi mỉm cười bẽn lẽn như trút được gánh\nnặng.\nRồi bất chợt, cô bé né tránh ánh mắt\ncủa Fukami."

# 【凪】
# display as 凪
# JP: 「っていうかそれよりっ――ええと――ふかみちゃんを、\n試す、みたいな形になっちゃったとも――」
2699 = "「Mà hơn thế nữa――ừm――cái kiểu như là,\nthử\nthách bé Fukami ấy――」"

# 【ふかみ】
# display as 深美
# JP: 「ううん！？　いいの。そんなの全然。\nわたし、試されて当然の優柔不断さだったし、ずっと」
1977 = "「Không đâu!? Không sao mà. Hoàn toàn không\nsao.\nTừ trước đến giờ mình cứ mãi do dự,\nnên bị thử thách là đương nhiên rồi.」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん」
2388 = "「Bé Fukami~」"

# monologue
# JP: 凪からへにょりと力が抜ける。
3221 = "Nagi rũ người ra như hết sức lực."

# monologue
# JP: 僕らを思っての行動といえど、\nそれを受け止めてもらえるか――余程心配だったのだろう。
3336 = "Dù hành động là vì nghĩ cho chúng tôi,\nnhưng chắc hẳn em ấy đã rất lo lắng không\nbiết liệu có được chấp nhận hay không――"

# 【ふかみ】
# display as 深美
# JP: 「いいんだけど……その……\nええと、ね？　凪ちゃん」
2697 = "「Tuy là không sao……nhưng mà……\nỪm, nè?\nNagi.」"

# 【凪】
# display as 凪
# JP: 「なにばい？　ふかみちゃん」
2000 = "「Sao vậy? Bé Fukami.」"

# 【ふかみ】
# display as 深美
# JP: 「あのっ――ええと……」
2151 = "「À thì――ừm……」"

# 【凪】
# display as 凪
# JP: 「あ！　わかったと！\nウチのお芝居の感想ば、伝えてくれたかとでしょー！」
2225 = "「A! Mình biết rồi!\nLà muốn nói cho mình\nbiết cảm nhận về vở kịch của mình đúng\nkhông~!」"

# 【ふかみ】
# display as 深美
# JP: 「っ！！！」
2232 = "「Á!!!」"

# 【凪】
# display as 凪
# JP: 「ばってん、そいば照れちゃうけんね！\n胸にしまっといてほしかとよー」
2142 = "「Cơ mà, thế thì ngại lắm nha!\nCứ giữ trong\nlòng là được rồi~」"

# monologue
# JP: 笑っている。\n凪が、明るく、明るく――
3228 = "Đang cười.\nNagi đang cười rạng rỡ, thật\nrạng rỡ――"

# monologue
# JP: いつもどおりの凪の笑顔を、装って。
3330 = "Ngụy trang bằng nụ cười thường ngày của\nNagi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2520 = "「A――」"

# monologue
# JP: 許されるなら、抱きしめたい。\n凪の気が済むまで謝罪して、感謝して……
3362 = "Nếu được phép, tôi muốn ôm lấy em ấy.\nXin\nlỗi, và cảm ơn cho đến khi Nagi nguôi\nngoai……"

# monologue
# JP: 頭を思い切り、ぐしゃぐしゃになるまで撫でてやりたい。\nけれどももう――そんなことをするのは、失礼だ。
3448 = "Muốn xoa đầu em ấy thật mạnh, xoa đến khi\nrối bù mới thôi.\nNhưng mà giờ――làm thế thì\nthất lễ quá."

# 【凪】
# display as 凪
# JP: 「な、なんね？　にーさん」
2426 = "「Gì, gì vậy? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2651 = "「Cảm ơn em.」"

# monologue
# JP: だから、ただ感謝だけを。\n凪に一番、似合う言葉を。
3509 = "Nên là, chỉ biết nói lời cảm ơn.\nLời nói\nphù hợp nhất với Nagi lúc này."

# 【双鉄】
# display as 雙鐵
# JP: 「凪のおかげで――僕とふかみは、向き合えた」
2645 = "「Nhờ có Nagi――mà anh và Fukami mới có thể\nđối diện với nhau.」"

# 【凪】
# display as 凪
# JP: 「って、そんなんいうとは水臭かとばい！\nウチとふかみちゃんとにーさんは、友達やけん！」
2254 = "「Khoan, anh nói vậy là khách sáo quá rồi\nđó!\nMình, bé Fukami và anh Soutetsu là bạn\nbè mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 

# monologue
# JP: つくづく、感じる。\n初めて気づく。
3501 = "Tôi cảm nhận sâu sắc.\nLần đầu tiên nhận\nra."

# monologue
# JP: 凪は、いつの間にこんなに見事に――
3087 = "Nagi, từ lúc nào đã trở nên tuyệt vời đến\nthế――"

# 【双鉄】
# display as 雙鐵
# JP: 「有言実行だな。いつでも凪は」
2021 = "「Nói được làm được nhỉ. Lúc nào Nagi cũng\nvậy.」"

# 【凪】
# display as 凪
# JP: 「え？」
# 2245 = "「啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宣言どおり。\n実に鮮やかなレディーになった」
2650 = "「Đúng như đã tuyên bố.\nThực sự đã trở\nthành một quý cô rạng rỡ rồi.」"

# 【凪】
# display as 凪
# JP: 「あ」
# 2213 = "「啊」" 

# monologue
# JP: 凪の、瞬き。\nぱちぱち、何度も。
3224 = "Nagi, chớp mắt.\nChớp chớp, nhiều lần."

# monologue
# JP: その度ごとに凪の瞳に、\nさまざまな色が浮かんで消えていくような――
3474 = "Mỗi lần như thế, trong đôi mắt Nagi,\nnhư\ncó đủ loại màu sắc hiện lên rồi tan biến――"

# 【凪】
# display as 凪
# JP: 「――うんっ！」
1514 = "「――Vâng!」"

# monologue
# JP: 凪が笑う。\n涙の色がかすかに混じる――けれど、本当の凪の笑顔で。
3225 = "Nagi cười.\nHơi vương chút màu của nước\nmắt――nhưng đó là nụ cười thật sự của Nagi."

# monologue
# JP: ただそれだけで僕らの間に、からりと明るい風が吹く。
3491 = "Chỉ bấy nhiêu thôi, một làn gió trong trẻo\ntươi sáng thổi qua giữa chúng tôi."

# 【凪】
# display as 凪
# JP: 「凪さま！　世界一のレディーになれたとばいね！！」
2559 = "「Nagi! Đã trở thành quý cô đệ nhất thế\ngiới rồi nhỉ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　すまんが――\nそこは、世界第二位で我慢してくれ」
1981 = "「Không đâu? Xin lỗi nhưng――\nChỗ đó, đành\nngậm ngùi xếp thứ hai thế giới đi nhé.」"

# 【凪】
# display as 凪
# JP: 「えええ？　それじゃあ、誰が世界一ばい？」
2194 = "「Ể? Vậy thì, ai là đệ nhất thế giới?」"

# monologue
# JP: 芝居がかって、凪が大きくあたりを見渡す。
3229 = "Nagi làm bộ kịch cỡm, đưa mắt nhìn quanh\nmột vòng."

# 【ハチロク】
# display as 八六
# JP: 「うふふっ。ご指名でしょうか？」
2154 = "「Ufufu. Ngài đang gọi tên em sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「ってハチロクはもー！　私かもしれんでしょーよ！？」
2603 = "「Hachiroku thiệt tình! Cũng có thể là em\nmà!?」"

# monologue
# JP: ハチロクが、日々姫が、笑顔で道化を演じてくれる。\nああ、僕は――僕らは、なんという幸せ者だ。
3170 = "Hachiroku và Hibiki đang mỉm cười diễn trò\nhề cho chúng tôi xem.\nA, tôi――chúng tôi,\nquả là những kẻ hạnh phúc làm sao."

# 【双鉄】
# display as 雙鐵
# JP: 「聞きたいのなら、答えよう！」
2497 = "「Nếu em muốn nghe, thì anh sẽ trả lời!」"

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
2149 = "「Á!」"

# monologue
# JP: ふかみも笑顔に戻ってる。\n普段どおりの凪はふかみを、笑顔に戻した。
3574 = "Fukami cũng đã cười trở lại.\nSự bình\nthường của Nagi đã giúp Fukami tìm lại nụ\ncười."

# monologue
# JP: ずっと、ずうっと変わらぬ構図が、\n僕の花嫁を、僕らをさらに輝かせる！
3328 = "Bức tranh không bao giờ, không bao giờ\nthay đổi này,\ncàng làm cho cô dâu của tôi,\nlàm cho chúng tôi thêm tỏa sáng!"

# 【双鉄】
# display as 雙鐵
# JP: 「世界一のレディーは」
1987 = "「Quý cô đệ nhất thế giới là」"

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2216 = "「啊！」" 

# monologue
# JP: 思い切り抱きしめ、キスをする。\nそうしてふかみを、思いっきりに見せびらかす！
3488 = "Tôi ôm chặt lấy cô ấy, trao một nụ hôn.\nVà\nrồi, tự hào khoe Fukami với tất cả mọi\nngười!"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の花嫁！　――右田ふかみだ！！」
2402 = "「Cô dâu của anh! ――Migita Fukami!!」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃんかー！\nそれなら凪さま、二位でよかばい！！」
2525 = "「Là bé Fukami à!\nNếu vậy thì Nagi đành xếp\nthứ hai thôi!!」"

# 【ハチロク】
# display as 八六
# JP: 「おめでとうございます！　双鉄様、ふかみ」
2760 = "「Chúc mừng hai người! Ngài Soutetsu,\nFukami.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ふかみちゃん、おめでとー！」
2749 = "「Anh hai, bé Fukami, chúc mừng nha!」"

# monologue
# JP: 客車から、れいなとポーレットも出てきてくれる。\n今まで様子を見守っていてくれたのだろう。
3620 = "Reina và Paulette cũng bước ra từ \\x%l客車;#00ffc040;toa hành khách%l;#;\n.\nChắc\nhẳn nãy giờ hai người đã đứng quan sát mọi\nchuyện."

# 【れいな】
# display as 玲奈
# JP: 「おめでとうですよぉ。\nれいな、まちくたびれちゃましたぁ」
2434 = "「Chúc mừng hai người nha.\nReina, chờ đợi\nmòn mỏi luôn rồi đó ạ~」"

# 【ポーレット】
# display as 波萊特
# JP: 「おめでとう！　双鉄くん、ふかみちゃん！」
2436 = "「Chúc mừng nha! Cậu Soutetsu, bé Fukami!」"

# 【レポーター】
# display as 記者
# JP: 「いいドラマ見ちゃった！　おめでとう、おふたりさん」
2696 = "「Được xem một vở kịch hay quá! Chúc mừng\nhai người nha.」"

# monologue
# JP: 駅に居合わせた方々が、TVクルーの方々までもが、\n僕らに拍手を送ってくれる。
3443 = "Những người tình cờ có mặt ở ga, kể cả\nđoàn làm phim TV,\nđều dành tặng chúng tôi\nnhững tràng vỗ tay."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2260 = "「嗯」" 

# monologue
# JP: 上空ではナビが、大きくゆったり旋回している。
3767 = "Trên bầu trời, Navi đang bay lượn những\nvòng lớn thong thả."

# monologue
# JP: ……きっとほどなく、真闇姉も、稀咲も、\n他のみんなも、ここに駆けつけてくれるだろう。
1482 = "……Chắc chắn chẳng bao lâu nữa, chị Mayami,\nKisaki,\nvà những người khác cũng sẽ hối hả\nchạy đến đây thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。ありがとう。ありがとう」
2659 = "「Cảm ơn. Cảm ơn mọi người. Xin cảm ơn.」"

# monologue
# JP: 伝えたいことは、それこそ山ほどあるはずなのに、\n今はもう、この言葉しか浮かんでこない。
3472 = "Có cả núi điều muốn nói,\nnhưng giờ đây,\nchỉ có từ này hiện lên trong đầu tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2580 = "「深美」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄、おにー……双鉄、さん。\n――あっ――」
2754 = "「Anh Soutetsu……anh Soutetsu.\n――A――」"

# monologue
# JP: ふかみが、そっと目をとじる。\n体を、僕にゆだねてくる。
3601 = "Fukami khẽ nhắm mắt lại.\nTrao phó cơ thể\ncho tôi."

# 【ふかみ】
# display as 深美
# JP: 「ちゅぅっ」
2252 = "「Chụt」"

# monologue
# JP: だから、もう一度キスをして。\n言葉の時間を、終わらせる。
3507 = "Thế nên, tôi hôn em thêm một lần nữa.\nKết\nthúc khoảng thời gian của những lời nói."
