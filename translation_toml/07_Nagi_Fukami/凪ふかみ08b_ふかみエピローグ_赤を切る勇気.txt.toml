3721 = "Thêm vào đó, nếu bé Fukami được hạnh phúc,\nvà anh Soutetsu cũng được nghỉ ngơi đàng\nhoàng, thì vẹn cả đôi đường rồi!"

# 【凪】
# display as 凪
