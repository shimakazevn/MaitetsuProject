3347 = "她的臉上掛著失望、難過、憤怒與悲傷……但表情卻又那麼地平靜。" 

# 【ふかみ】
# display as 深美
# JP: 「それなら、確かに。確かに双鉄おにいさん休めるし、\nわたしも、すごく、嬉しいけど――でもっ！」
2540 = "「是的，這樣確實可以讓雙鐵哥哥休息好，我也會很高興……但是！」" 

# 【凪】
# display as 凪
# JP: 「そいなら、ウチも嬉しかとよー！　\nやけん、これでよかとばい！」
2703 = "「這樣咱也高興咧！所以這樣做最好！」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 2216 = "「啊！」" 

# monologue
# JP: うちは、にーさんが大好きで。\nうちは、ふかみちゃんが大好きで。
3289 = "咱最喜歡大哥哥，也最喜歡小深了。" 

# monologue
