2646 = "「Phóng viên cũng rất thân thiện!\nChắc chắn\nchắc chắn! Sẽ là một chương trình hay cho\nmà xem.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2523 = "「是嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「舟の中でも、面白いことあったんですよ！\nお客さんもわたしたちも、オオウケしちゃって」
2300 = "「Lúc ở trên thuyền, cũng có chuyện thú vị\nlắm đó!\nKhách hàng và bọn em đều cười nắc\nnẻ luôn.」"

# monologue
# JP: ……ふかみがこれほど夢中になって\nしゃべりまくるのは珍しい。
1480 = "……Fukami mà say sưa\nnói liến thoắng thế\nnày đúng là hiếm thấy."

# monologue
# JP: あるいはそれだけ緊張していた――\nということの、裏返しであるのかもしれないが。
3096 = "Hoặc có lẽ đó là mặt trái của việc\ncô ấy\nđã căng thẳng đến mức nào――"

# 【ふかみ】
# display as 深美
# JP: 「――それで、わたし、『あ、揺らしちゃうかも！』って、\nだけど、そのとき凪ちゃん、が――――」
2730 = "「――Sau đó, em nói 'A, có thể sẽ bị rung\nlắc đấy!',\nnhưng mà, lúc đó Nagi, lại――――」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 

