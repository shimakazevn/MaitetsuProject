# JP: 「あんねーさんが、とってもよかなら。\nウチがにーさん――もらっちゃっても、よかとよね？」
2358 = "「Nếu bà chị đó lấy đi cũng được.\nThì mình――lấy anh Soutetsu cũng được đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
# 2250 = "「啊？！」" 
# monologue
