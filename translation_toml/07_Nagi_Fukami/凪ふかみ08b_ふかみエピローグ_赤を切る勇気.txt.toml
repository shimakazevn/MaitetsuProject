3450 = "Trông chị ấy có vẻ gì đó đằm thắm hơn.\nXinh đẹp hơn mọi khi, đến mức nhìn thôi mà tim em cũng đập thình thịch."
# 【ふかみ】
# display as 深美
# JP: 「ずっと――　一生、覚えていてもらえるんなら。\n少しだけ、怪我しちゃっても、よかったかも。です」
2353 = "「Nếu anh sẽ nhớ mãi――suốt đời.\nThì em có bị thương một chút, chắc cũng không sao. Ạ.」"
# 【双鉄】
# display as 雙鐵
