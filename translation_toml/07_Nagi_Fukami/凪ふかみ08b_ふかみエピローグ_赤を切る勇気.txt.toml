# display as 雙鐵
# JP: 「つまり僕は、その程度で倒れる状態だった――\n最初からギリギリの線の上にいた。ということなのだ」
2471 = "「Nói cách khác là anh đã ở trong tình trạng chỉ chừng đó thôi cũng ngã gục――\nNgay từ đầu anh đã ở giới hạn chịu đựng rồi. Là vậy đó.」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「え？」\n「あああ！！」
2246 = "「Hả?」\n「Aaa!!」"
