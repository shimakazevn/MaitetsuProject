# 【凪】
# display as 凪
# JP: 「そしたら、今までの『三人でおでかけ』だった日ば、\nまるっとお休みにかえられるでしょお？」
2704 = "「這樣的話，原本三個人一起出門的日子，就可以全都留給你休息了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 

# 【凪】
# display as 凪
