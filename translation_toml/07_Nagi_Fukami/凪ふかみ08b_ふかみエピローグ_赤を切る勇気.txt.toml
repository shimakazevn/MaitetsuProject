# display as 凪
# JP: 「うん！　まっことよかったばい！」
2262 = "「Ừm! Thật sự rất tuyệt!」"

# monologue
# JP: ……にーさんと二人で遊べんよーになったのは、\nちょこっとやっぱり寂しかばってん――
1486 = "……Không được đi chơi riêng hai người với\nanh Soutetsu nữa,\nquả thực cũng hơi buồn\nmột chút――"

# monologue
# JP: ふかみちゃんもにーさんもニコニコしとるし、\nこいばこいで、きっと一番よかやりかたばい！！
3132 = "Bé Fukami và anh Soutetsu đều cười rạng\nrỡ,\nthế này chắc chắn là cách tốt nhất\nrồi!!"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、『ふかみと』『全休』『三人で』\nそして『三人でだらだら』で、当面は回してみよう」
2742 = "「Vậy thì, 'với Fukami', 'nghỉ trọn ngày',\n'ba người',\nvà 'ba người lười biếng', tạm\nthời cứ xoay vòng như thế nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！」
2535 = "「Vâng! Ạ!!」"

# 【凪】
# display as 凪
# JP: 「わかったばーい！」
2339 = "「Đã rõ!」"

# monologue
# JP: これでスッキリ！！　したはずばってん、\nなんだか急に、目の奥が熱くなるけん、目ば閉じる。
3711 = "Thế là giải quyết xong!! Đáng lẽ là vậy,\nnhưng không hiểu sao khóe mắt đột nhiên\nnóng lên, mình đành nhắm mắt lại."

# monologue
# JP: (にーさんはふかみちゃんのことが好きで、ウチも好き。\nふかみちゃんはにーさんが好きで、ウチのことも好き)
3756 = "(Anh Soutetsu thích bé Fukami, và cũng\nthích mình.\nBé Fukami thích anh Soutetsu,\nvà cũng thích mình)"

# monologue
# JP: うちもふかみちゃんもにーさんも、好き。\nけど、その『好き』は、きっと、ちょっとずつ、違う。
3278 = "Mình, bé Fukami và anh Soutetsu đều thích\nnhau.\nNhưng chữ 'thích' đó, chắc chắn, mỗi\nngười lại khác nhau một chút."

# monologue
# JP: （ふかみちゃんのにーさんへの『好き』は、絶対に、\nおよめさんになりたいっていう意味の、好き――で）
3762 = "（Chữ 'thích' của bé Fukami dành cho anh\nSoutetsu, tuyệt đối là\nchữ thích mang ý\nnghĩa muốn trở thành vợ anh ấy――）"

# monologue
# JP: ばってん、うちのにーさんへの好きは――うん。\nたぶん、まだ、結婚とかとは、全然つながっとらんばい。
3140 = "Cơ mà, chữ thích của mình dành cho anh\nSoutetsu――ừm.\nCó lẽ, vẫn chưa, hoàn toàn\nliên quan đến chuyện kết hôn đâu."

# monologue
# JP: ふかみちゃんとにーさんで幸せになって欲しいって――\nウチが結婚したかとだったら、きっと素直に思えんけん！
3364 = "Muốn bé Fukami và anh Soutetsu được hạnh\nphúc――\nNếu mình muốn kết hôn với anh ấy,\nchắc chắn sẽ không thể ngoan ngoãn nghĩ\nnhư vậy được!"

# 【凪】
# display as 凪
# JP: 「やけん。うん。\n初恋なんかじゃ――なかったと！」
2486 = "「Bởi vậy. Ừm.\nChẳng phải là――tình đầu gì\nđâu!」"

# 【ふかみ】
# display as 深美
# JP: 「車掌業務で一番むつかしいこと。ですか――」
2095 = "「Điều khó khăn nhất trong nghiệp vụ \\x%l車掌;#00ffc040;trưởng tàu%l;#;\n. Phải\nkhông ạ――」"

# monologue
# JP: ふかみが、しばし考え込む。\n絵になるなと、つくづく思う、
3588 = "Fukami suy nghĩ một lát.\nTrông cứ như một\nbức tranh vậy, tôi thầm nghĩ."

# 【レポーター】
# display as 記者
# JP: 「やっぱり、困ったお客さんとかですか？\n早瀬さんくらいの美人さんだと、色々ありそうですけど」
2444 = "「Quả nhiên là, những hành khách khó tính\nsao?\nMột người đẹp như cô Hayase chắc hẳn\ngặp phải nhiều chuyện lắm nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「いえ、そういうのは全く。\n御一夜鉄道のお客様は、みなさん、紳士・淑女ですし」
1982 = "「Không, hoàn toàn không có chuyện đó ạ.\nHành khách của Đường sắt Ohito, mọi người\nđều là những quý ông, quý bà cả.」"

# monologue
# JP: 模範解答であるだけでなく、現実だ。\nハチロクが率先し、努力を重ねた『暖かな雰囲気作り』。
3712 = "Không chỉ là câu trả lời mẫu mực, mà đó là\nsự thật.\n'Tạo dựng bầu không khí ấm áp' mà\nHachiroku đã tiên phong và không ngừng nỗ\nlực."

# monologue
# JP: その効果は目に見えている。バーベキュー列車の賑わいが、\n下品な騒ぎになったことなど、今までただの一度も無い。
3342 = "Hiệu quả đó có thể thấy rõ. Sự nhộn nhịp\ncủa chuyến tàu BBQ,\nchưa từng một lần biến\nthành sự ồn ào thô tục nào từ trước đến\nnay."

# 【レポーター】
# display as 記者
# JP: 「それなら、『楽勝ーっ！」な感じだったり？\n車掌さんのお仕事って、案外」
2761 = "「Nếu vậy, có phải cảm giác 'Dễ ợt!' không?\nCông việc của \\x%l車掌;#00ffc040;trưởng tàu%l;#; ấy, không ngờ\nlại」"

# 【ふかみ】
# display as 深美
# JP: 「そんなことはないです。お客様や仲間に助けて貰っても、\nやっぱり、むつかしいことの方が多くって――」
2570 = "「Không có chuyện đó đâu ạ. Dù được hành\nkhách và đồng nghiệp giúp đỡ,\nnhưng quả\nthực, những việc khó khăn vẫn nhiều hơn――」"

# 【レポーター】
# display as 記者
# JP: 「うんうん！」
2261 = "「Ừm ừm!」"

# 【ふかみ】
# display as 深美
# JP: 「その中で、一番むつかしいのを決めるなら……\nやっぱり、月並みですけど――安全を守ること、です」
2061 = "「Trong số đó, nếu phải chọn ra điều khó\nkhăn nhất thì……\nQuả nhiên, dù nghe có vẻ\nsáo rỗng――nhưng đó là bảo vệ sự an toàn\nạ.」"

# 【レポーター】
# display as 記者
# JP: 「安全を守る？」
2048 = "「Bảo vệ sự an toàn?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。御一夜鉄道が[しんぞうさいせい,3]新造再生したバーベキュー客車、\nオロ31 27には、[しゃしょうべん,2]車掌弁がついてるんですけど――」
2529 = "「Vâng. Toa hành khách BBQ được Đường sắt\nOhito tân trang lại,\nOro31 27, có trang bị\nvan \\x%l車掌;#00ffc040;trưởng tàu%l;#;――」"

# 【レポーター】
# display as 記者
# JP: 「しゃしょうべん？」
2096 = "「Van \\x%l車掌;#00ffc040;trưởng tàu%l;#;?」"

# monologue
# JP: ふかみが頷く。
3606 = "Fukami gật đầu."

# monologue
# JP: 客車最後部の車掌弁へとレポーターを案内し、\n手でひくような素振りをみせる。
3338 = "Hướng dẫn phóng viên đến van \\x%l車掌;#00ffc040;trưởng tàu%l;#; ở\nphía cuối \\x%l客車;#00ffc040;toa hành khách%l;#;\n,\ncô làm động tác như đang dùng tay kéo\nnó."

# 【ふかみ】
# display as 深美
# JP: 「簡単にいうと、非常ブレーキです。これをひけば、\n運転台での運転操作を無視して、列車を停止できます」
2618 = "「Nói đơn giản thì, nó là \\x%l非常;#00ffc040;phanh khẩn cấp%l;#;.\nNếu kéo cái\nnày,\ncó thể phớt lờ thao tác lái ở \\x%l運転台;#00ffc040;buồng lái%l;#; và\ndừng tàu lại.」"

# 【レポーター】
# display as 記者
# JP: 「運転士さん関係なしにですか？　一体、どうして」
2675 = "「Không cần quan tâm đến \\x%l運転士;#00ffc040;người lái tàu%l;#; sao?\nRốt cuộc là,\ntại sao lại vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「運転士じゃなくて、機関士なんです。\nこの客車を引っ張るのは、[ハチロクニイマル,3]8620――蒸気機関車ですから」
1967 = "「Không phải \\x%l運転士;#00ffc040;người lái tàu%l;#;, mà là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;\nạ.\nBởi vì thứ kéo \\x%l客車;#00ffc040;toa hành khách%l;#;\nnày là 8620――\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.」"

# 【レポーター】
# display as 記者
# JP: 「え～！　そうなんですね。おもしろーい。\n運転士さんじゃなくて、機関士さん」
2228 = "「Ể~! Vậy sao. Thú vị quá.\nKhông phải \\x%l運転士;#00ffc040;người lái tàu%l;#;, mà\nlà \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;.」"

# 【ふかみ】
# display as 深美
# JP: 「です。『機関士さん』って呼びかけてあげると、\n『わかってるな』って、きっと、喜んでもらえます」
2259 = "「Vâng. Nếu gọi là '\\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;',\nhọ sẽ nghĩ 'cô hiểu\nbiết đấy', và chắc chắn sẽ rất vui.」"

# 【レポーター】
# display as 記者
# JP: 「なるほど～」
2547 = "「Ra là vậy~」"

# monologue
# JP: 柔らかな笑顔での修正は、少しのイヤミも感じさせない。\nレポーターは客というわけではないが……
3592 = "Lời đính chính kèm nụ cười dịu dàng không\nhề tạo cảm giác mỉa mai chút nào.\nPhóng\nviên tuy không phải là khách hàng nhưng……"

# monologue
# JP: ふかみの接客技術はもはや、\n御一夜鉄道随一となったといって、過言ではない。
3622 = "Kỹ năng phục vụ khách hàng của Fukami giờ\nđây,\ncó thể nói là số một của Đường sắt\nOhito cũng không ngoa."

# 【ふかみ】
# display as 深美
# JP: 「で、さっきのご質問ですね。\nどうして、赤を切るのか、っていうこと」
2336 = "「Và, trở lại câu hỏi vừa nãy ạ.\nTại sao\nlại cắt cờ đỏ.」"

# 【レポーター】
# display as 記者
# JP: 「あかをきる？」
2492 = "「Cắt cờ đỏ?」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　車掌弁を引く――車掌が列車を\n非常停止させることを、『赤を切る』っていうんです」
2223 = "「A! Kéo van \\x%l車掌;#00ffc040;trưởng tàu%l;#;――việc \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nlàm cho \\x%l列車;#00ffc040;tàu%l;#;\ndừng khẩn\ncấp, được gọi là 'cắt cờ đỏ' ạ.」"

# monologue
# JP: いいながら、車掌弁のお尻をふかみは示す。\n引き手の末端の木部の色は、鮮やかな赤だ。
3687 = "Vừa nói, Fukami vừa chỉ vào phần đuôi của\nvan \\x%l車掌;#00ffc040;trưởng tàu%l;#;.\nMàu của phần gỗ ở cuối tay kéo là\nmột màu đỏ rực rỡ."

# 【レポーター】
# display as 記者
# JP: 「なるほど～」
2546 = "「Thì ra là thế~」"

# monologue
# JP: ……実際の語源は、車掌が持つ旗。
1473 = "……Nguồn gốc thực sự của từ này là lá cờ mà\n\\x%l車掌;#00ffc040;trưởng tàu%l;#; cầm."

# monologue
# JP: フライ[キ]旗の赤、停止を示す旗ではあろうが、\nふかみはここは、笑顔で流す。
3097 = "Màu đỏ của cờ vẫy, có lẽ là lá cờ báo hiệu\ndừng lại,\nnhưng Fukami ở đây chỉ mỉm cười\ncho qua."

# 【ふかみ】
# display as 深美
# JP: 「例えば。機関士が気絶して、レイルロオドも動けない。\nその状況だと……列車、どうなっちゃいますか？」
2047 = "「Ví dụ như. \\x%l機関士;#00ffc040;Nhân viên cơ vụ%l;#; ngất xỉu, \\x%lレイルロオド;#00ffc040;Railord%l;#;\ncũng không thể di\nchuyển.\nTrong tình huống đó thì……\\x%l列車;#00ffc040;tàu%l;#;, sẽ ra\nsao ạ?」"

# 【レポーター】
# display as 記者
# JP: 「ええと――ずっと走り続ける――暴走しちゃう！」
2695 = "「Ừm thì――sẽ cứ tiếp tục chạy――sẽ mất kiểm\nsoát mất!」"

# 【ふかみ】
# display as 深美
# JP: 「はい。機関車、8620の運転台に、走行中の客車から\n入り込むことはできません。だから、そういうときには」
2533 = "「Vâng. Từ \\x%l客車;#00ffc040;toa hành khách%l;#; đang chạy, không\nthể đi vào\n\\x%l運転台;#00ffc040;buồng lái%l;#;\ncủa đầu máy 8620 được. Vì vậy, những lúc\nnhư thế」"

# 【レポーター】
# display as 記者
# JP: 「赤を、切る――\nその車掌弁を、ぐいっと？」
2407 = "「Cắt, cờ đỏ――\nKéo mạnh cái van \\x%l車掌;#00ffc040;trưởng tàu%l;#; đó?」"

# 【ふかみ】
# display as 深美
# JP: 「です。危険があるって少しでも感じたときは――\n車掌には、赤を切る義務があります」
2527 = "「Vâng. Khi cảm thấy có chút nguy hiểm nào\nđó――\n\\x%l車掌;#00ffc040;Trưởng tàu%l;#; có nghĩa vụ phải cắt cờ đỏ ạ.」"

# 【レポーター】
# display as 記者
# JP: 「義務、ですか？」
2542 = "「Nghĩa vụ, sao?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。安全が損なわれてはいけませんから――\nそれは、車掌が必ず果たすべき義務となるんです」
2532 = "「Vâng. Vì không thể để sự an toàn bị tổn\nhại――\nĐó trở thành nghĩa vụ mà \\x%l車掌;#00ffc040;trưởng tàu%l;#; bắt\nbuộc\nphải hoàn thành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2216 = "「啊！」" 

# monologue
# JP: ごくごくわずかに、けれど確かに――\nふかみの笑顔が、引きつっている。
3723 = "Dù rất rất khẽ, nhưng chắc chắn là――\nNụ\ncười của Fukami đang gượng gạo."

# 【レポーター】
# display as 記者
# JP: 「あー、義務を果たさないと\n事故になっちゃうかも、ですかー。納得です」
2243 = "「A, nếu không hoàn thành nghĩa vụ\nthì có\nthể xảy ra tai nạn nhỉ. Hợp lý.」"

# 【ふかみ】
# display as 深美
# JP: 「でも――その義務を果たすことは。\n赤を切ることは、本当に難しい」
2016 = "「Nhưng mà――việc hoàn thành nghĩa vụ đó.\nViệc cắt cờ đỏ, thực sự rất khó khăn.」"

# monologue
# JP: ささやくようにそう言って。
3576 = "Cô ấy thì thầm nói như vậy."

# monologue
# JP: ふかみは照れくさそうな微笑みを作り、\nぺろっと、小さく舌を出す。
3353 = "Fukami tạo ra một nụ cười ngượng ngùng,\nvà\nthè lưỡi ra một chút."

# 【ふかみ】
# display as 深美
# JP: 「実はわたし。車掌になってから、\n車掌弁、まだ一度も引けたことがなくって」
2063 = "「Thực ra thì tôi. Từ khi trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;\n,\nvẫn\nchưa một lần nào kéo van \\x%l車掌;#00ffc040;trưởng tàu%l;#; cả.」"

# 【レポーター】
# display as 記者
# JP: 「あー、そうだったんですか～！　でもそれって、\n御一夜鉄道さんが、それだけ安全！　ってことですよね」
2280 = "「A, ra là vậy sao~! Nhưng mà như thế,\nchứng tỏ Đường sắt Ohito an toàn đến mức\nđó! Đúng không.」"

# 【ふかみ】
# display as 深美
# JP: 「あはっ」
2182 = "「A ha」"

# monologue
# JP: それは、違う。\nふかみが一番、誰よりも良くわかっている。
3082 = "Không phải vậy.\nFukami là người hiểu rõ\nnhất, hơn bất kỳ ai."

# monologue
# JP: 僕や凪。日々姫や、ハチロクの気づきによって防がれた、\n『ヒヤリハット』のケースも、幾度かあった。
3545 = "Những tình huống 'suýt xảy ra tai nạn'\nđược ngăn chặn nhờ sự nhạy bén của tôi,\nNagi, Hibiki hay Hachiroku, cũng đã có vài\nlần."

# 【ふかみ】
# display as 深美
# JP: 「おかげさまで――」
2657 = "「Cũng nhờ ơn――」"

# monologue
# JP: 赤を切る勇気。ふかみはそれを、未だに持てて……\n少なくとも、発揮できてはいない。
3623 = "Dũng khí để cắt cờ đỏ. Fukami vẫn chưa có\nđược nó……\nÍt nhất là, vẫn chưa thể phát\nhuy được."

# monologue
# JP: 事実を誰よりわかっていながら、苦しみながら。\n――それでもふかみは、鮮やかな笑顔を浮かべてみせる。
3563 = "Dù hiểu rõ sự thật hơn ai hết, dù đang đau\nkhổ.\n――Nhưng Fukami vẫn nở một nụ cười\nrạng rỡ."

# 【ふかみ】
# display as 深美
# JP: 「おかげさまで、です。御一夜鉄道は開業以来、\n怪我人を出すような事故を、一件も起こしていません」
2656 = "「Cũng nhờ ơn mọi người ạ. Đường sắt Ohito\ntừ khi khai trương đến nay,\nchưa từng để\nxảy ra một vụ tai nạn nào gây thương tích\ncho hành khách.」"

# monologue
# JP: ふかみの言葉を笑顔でうけて、\nレポーターはふかみから視線を切って、カメラへと向く。
3632 = "Mỉm cười đón nhận lời của Fukami,\nphóng\nviên rời mắt khỏi Fukami và hướng về phía\nmáy quay."

# 【レポーター】
# display as 記者
# JP: 「そんな御一夜鉄道の、頼もしい美人車掌さん！\n早瀬ふかみさんには、実はもう一つの顔があるんです！」
2421 = "「Nữ \\x%l車掌;#00ffc040;trưởng tàu%l;#; xinh đẹp đáng tin cậy của\nĐường sắt\nOhito!\nCô Hayase Fukami thực ra còn có một\nthân phận khác nữa!」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、堂々としとるとね～」
2390 = "「Bé Fukami, trông đường hoàng quá nhỉ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「おう、凪」
2028 = "「Ồ, Nagi.」"

# monologue
# JP: 客車の外から、凪が小声で呼びかけてくる。
3701 = "Từ bên ngoài \\x%l客車;#00ffc040;toa hành khách%l;#;, Nagi gọi khẽ."

# monologue
# JP: いつもと変わらぬ凪の様子に力が抜けて、\nいつの間に、自分が力んでいたと知る。
3671 = "Thấy dáng vẻ Nagi vẫn như thường lệ khiến\ntôi nhẹ nhõm,\nvà nhận ra mình đã căng\nthẳng từ lúc nào không hay."

# 【双鉄】
# display as 雙鐵
# JP: 「カマはできたか」
2613 = "「\\x%l窯;#00ffc040;Lò hơi%l;#; chuẩn bị xong chưa?」"

# 【凪】
# display as 凪
# JP: 「ばっちりばい！　今日はテレビのひとたち来とるけん！\nいつもより念入りにつくっといたと！」
2059 = "「Chuẩn không cần chỉnh luôn! Hôm nay có\nmấy người trên TV tới mà!\nNên em đã chuẩn\nbị kỹ lưỡng hơn bình thường đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「では僕も、一足先に運転台に入っておこう」
2732 = "「Vậy anh cũng vào \\x%l運転台;#00ffc040;buồng lái%l;#; trước một bước\nđây.」"

# monologue
# JP: 下へとおりれば、すぐさま凪が寄ってくる。
3237 = "Vừa bước xuống, Nagi liền chạy lại gần\nngay."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、一人にしといて大丈夫と？」
2595 = "「Để bé Fukami một mình có sao không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫さ。ふかみなら。\nそうでなくとも今日の主役だ。大事に扱ってもらえよう」
2567 = "「Không sao đâu. Nếu là Fukami.\nHơn nữa cô\nấy là nhân vật chính hôm nay. Chắc sẽ được\nđối xử cẩn thận thôi.」"

# 【凪】
# display as 凪
# JP: 「あー。そりゃそうばいねー」
2281 = "「A. Chắc là vậy rồi ha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのうえ、ポーレットとれいなも添乗するのだ。\nならば僕は、乗務の準備を早める方が、正解だろう」
2626 = "「Thêm vào đó, Paulette và Reina cũng sẽ\nlên tàu cùng.\nVậy thì anh nên chuẩn bị\ncông việc sớm sẽ đúng đắn hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「おかえりなさいませ、双鉄様、凪」
2030 = "「Chào mừng hai người quay lại, ngài\nSoutetsu, Nagi.」"

# 【日々姫】
# display as 日日姬
# JP: 「おかえりにーに！　ＴＶの取材、どうだった？」
2031 = "「Mừng anh hai về! Phỏng vấn cho TV thế nào\nrồi?」"

# monologue
# JP: 運転台に戻るやいなやで、好奇心丸出しの日々姫に捕まる。
3239 = "Vừa trở lại \\x%l運転台;#00ffc040;buồng lái%l;#;, tôi đã bị Hibiki\nvới vẻ mặt\nđầy tò mò tóm lấy."

# 【日々姫】
# display as 日日姬
# JP: 「レポーターさんってやっぱり美人？\nそれとも、ＴＶで見るほどじゃない？？」
2726 = "「Phóng viên có phải là mỹ nhân không?\nHay\nlà không đẹp như trên TV??」"

# 【双鉄】
# display as 雙鐵
# JP: 「美人は美人だったが、ふかみほどではない」
2334 = "「Đẹp thì đẹp thật, nhưng không bằng Fukami\nđâu.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、ご馳走様」
2185 = "「Chà, ngọt ngào quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃーに？　カメラの前ではノロケんといてよねー」
2748 = "「Anh hai à? Trước ống kính đừng có mà thể\nhiện tình cảm đấy nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2342 = "「Ồ.」"

# monologue
# JP: そうか、確かに、今のはノロケに聞こえるか。\nふかみが綺麗なことなどは、ごく当然であるとはいえど。
3380 = "Ra vậy, đúng là, câu vừa rồi nghe giống\nnhư đang thể hiện tình cảm nhỉ.\nDù việc\nFukami xinh đẹp là điều hiển nhiên."

# 【ハチロク】
# display as 八六
# JP: 「それで、今日の取材は、\nどのような性質のものなのですか？」
2337 = "「Vậy, buổi phỏng vấn hôm nay,\nlà về chủ đề\ngì vậy ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「紹介番組！　『[ひのもと,2]日ノ本鉄道めぐり』っていうの。\n大廃線からの復興を目指す鉄道各社をめぐってくの！」
2512 = "「Chương trình giới thiệu! Tên là 'Dạo\nquanh Đường sắt Hinomoto'.\nSẽ đi vòng\nquanh các công ty đường sắt đang hướng tới\nphục hưng sau Đại bãi bỏ các tuyến đường\nsắt!」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　そのような番組が」
2184 = "「Chà! Có cả chương trình như vậy sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「電車姫様の働きかけで、[ひろしま,1]廣島ケーブルテレビ制作で\nこの四月からはじまって、あっという間に全国ネット！」
2708 = "「Nhờ sự vận động của Công chúa Xe điện,\nĐài Truyền hình Cáp Hiroshima đã sản xuất\nvà bắt đầu phát sóng từ tháng 4 này, chớp\nmắt đã phủ sóng toàn quốc mạng lưới!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと――凄いことだな」
2701 = "「Chà――Thật đáng kinh ngạc.」"

# 【日々姫】
# display as 日日姬
# JP: 「増えてきたんだよ！　鉄道に興味を持ってくれる人が。\nみんなで頑張ったから――頑張ってるから！」
2377 = "「Đang tăng lên đó! Những người quan tâm\nđến đường sắt.\nVì mọi người đã cùng nhau\ncố gắng――vì mọi người đang cố gắng mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2521 = "「Ừ.」"

# monologue
# JP: 九洲以上に大廃線後の鉄道荒廃がひどかった北開道にも、\nようやく復線の種がまかれ始めてきたと聞く。
3654 = "Nghe nói ở Hokkaidou, nơi đường sắt bị tàn\nphá sau Đại bãi bỏ các tuyến đường sắt còn\ntồi tệ hơn cả Kyushu,\ncuối cùng cũng bắt\nđầu gieo những hạt giống phục hồi tuyến\nđường."

# monologue
# JP: 僕らの御一夜鉄道も、昨年ようやく、\n千内まわりでの、みかん鉄道との接続を持てた。
3458 = "Đường sắt Ohito của chúng ta, năm ngoái\ncũng đã,\ncuối cùng có thể kết nối với\nĐường sắt Mikan qua ngõ Sendai."

# 【双鉄】
# display as 雙鐵
# JP: 「――線路が再び。\n伸び、つながりはじめているのだ」
1488 = "「――Đường ray một lần nữa.\nĐang vươn dài,\nvà bắt đầu kết nối lại.」"

# 【日々姫】
# display as 日日姬
# JP: 「それだけに！\n今日のテレビも、と～っても重要！　なんだけど～」
2293 = "「Chính vì vậy!\nChương trình TV hôm nay\ncũng, vô~ cùng quan trọng! Nhưng mà~」"

# monologue
# JP: キャブの窓から首を出し、\n日々姫は客車の様子をうかがう。
3532 = "Thò đầu ra khỏi cửa sổ \\x%l運転台;#00ffc040;buồng lái%l;#;,\nHibiki dò xét\ntình hình \\x%l客車;#00ffc040;toa hành khách%l;#;."

# 【日々姫】
# display as 日日姬
# JP: 「まさか、ふかみちゃんが取材の主役になるなんて。\nいっつもなら、ポーレットさんなのに、大出世！」
2568 = "「Không ngờ, bé Fukami lại trở thành nhân\nvật chính của buổi phỏng vấn.\nBình thường\ntoàn là chị Paulette mà, thăng tiến lớn\nrồi!」"

# 【ハチロク】
# display as 八六
# JP: 「確かに、ポーレット様は話題性の固まりですからね。\n市長で社長で、あのお美しさ。けれど――」
2538 = "「Đúng vậy, Thị trưởng Paulette vốn là tâm\nđiểm của sự chú ý mà.\nVừa là thị trưởng,\nvừa là giám đốc, lại còn xinh đẹp. Nhưng\nmà――」"

# 【凪】
# display as 凪
# JP: 「大廃線からの復興を目指す！　ってテーマなら、\nふかみちゃんの方がもっとぴったりばい！！」
2355 = "「Nếu chủ đề là 'Hướng tới phục hưng sau\nĐại bãi bỏ các tuyến đường sắt!' thì,\nbé\nFukami mới là người phù hợp hơn nhiều!!」"

# monologue
# JP: 確信に満ち満ちた凪の言葉に、自然と頷く。
3206 = "Trước những lời nói đầy tự tin của Nagi,\ntôi tự nhiên gật đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同意だ。このツアーばかりは御一夜鉄道ならでは。完全な独自性を持つ、大きな売りであるのだからな」
2454 = "「Anh cũng đồng ý. Chuyến đi này là đặc sản\nriêng của Đường sắt Ohito.\nMang tính độc\nđáo hoàn toàn, là một điểm nhấn lớn mà.」"

# 【ハチロク】
# display as 八六
# JP: 「ふふっ、左様ですね」
2275 = "「Fufu, ngài nói đúng ạ.」"

# monologue
# JP: ツアーの好評を思ってか、\nハチロクも、どこか誇らしげな笑みを浮かべる。
3505 = "Có lẽ đang nghĩ đến sự ủng hộ nhiệt tình\ndành cho chuyến đi,\nHachiroku cũng nở một\nnụ cười đầy tự hào."

# 【ハチロク】
# display as 八六
# JP: 「バーベキュー列車の車掌ふかみが、湯医につけば、\nすぐさまクマ川下りの船頭さんに早変わりする」
2775 = "「\\x%l車掌;#00ffc040;Trưởng tàu%l;#; Fukami của chuyến tàu BBQ, khi\nđến Yui,\nsẽ ngay lập tức biến thành người chèo\nthuyền trên sông Kuma.」"

# 【凪】
# display as 凪
# JP: 「そいばやるようになってから、ふかみちゃんが船頭の\nクマ川下り！　抽選制の大人気になったけんねー」
2302 = "「Từ khi làm vậy, chuyến xuôi dòng Kuma do\nbé Fukami chèo!\nĐã trở nên cực kỳ nổi\ntiếng, đến mức phải bốc thăm luôn đó nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2521 = "「是啊」" 

# monologue
# JP: そのまま列車で折り返す者も、クマ川第四橋梁で、\nふかみ操るクマ川下り舟の真上を通過できる。
3366 = "Những người cứ thế quay về bằng \\x%l列車;#00ffc040;tàu%l;#;, tại\ncây\ncầu thứ tư trên sông Kuma,\ncũng có thể đi\nngang qua ngay trên chiếc thuyền xuôi dòng\ndo Fukami điều khiển."

# monologue
# JP: ふかみと凪とが発案したこのプラン、\n導入以来、申し込みは常に定員以上だ。
3548 = "Kế hoạch này do Fukami và Nagi khởi xướng,\ntừ khi áp dụng, số lượng đăng ký luôn vượt\nquá giới hạn."

# 【日々姫】
# display as 日日姬
# JP: 「あれ！？　わ！　ふかみちゃん、\x%l転轍機;#00ffc040;転轍機%l;#;！！」
2164 = "「Ủa!? Oa! Bé Fukami, \\x%l転轍機;#00ffc040;thiết bị bẻ ghi%l;#;!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そこまで絵作りするのか」
2003 = "「Chà, đến mức phải dựng cảnh như vậy sao.」"

# monologue
# JP: あわてて窓から外を見れば、\n\x%l錘付転換機;#00ffc040;錘付転換機%l;#;のレバーを、ふかみが全身で押し込んでいる。
3479 = "Vội vàng nhìn ra ngoài cửa sổ,\ntôi thấy\nFukami đang dùng toàn thân đẩy cần gạt của\n\\x%l錘付転換機;#00ffc040;cần bẻ ghi có đối trọng%l;#;."

# 【ハチロク】
# display as 八六
# JP: 「『\x%l入換;#00ffc040;入換%l;#;が出来て初めて車掌は一人前』――\n帝鉄では、そのように言われてもおりました」
2411 = "「'Phải biết \\x%l入換;#00ffc040;dồn toa%l;#; thì mới là một \\x%l車掌;#00ffc040;trưởng tàu%l;#;\nthực thụ'――\nỞ\nĐường sắt Hoàng gia, người ta cũng từng\nnói như vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……帝鉄では長距離の列車も多かっただろうし、車掌が[いれかえ,1]入換誘導をせざるを得ないケースもありそうだが」
2522 = "「Ra là vậy……Ở Đường sắt Hoàng gia chắc\ncũng có nhiều chuyến \\x%l列車;#00ffc040;tàu%l;#; đường dài, có vẻ\ncũng có những trường hợp \\x%l車掌;#00ffc040;trưởng tàu%l;#; bắt\nbuộc phải\nhướng dẫn \\x%l入換;#00ffc040;dồn toa%l;#; nhỉ.」"

# 【レポーター】
# display as 記者
# JP: 「ありがとうございますー！　ここオッケー？\nじゃ、湯医まで連れてってくださーい」
2658 = "「Cảm ơn rất nhiều~! Chỗ này OK chứ?\nVậy,\nxin hãy đưa chúng tôi đến Yui nha~」"

# 【ふかみ】
# display as 深美
# JP: 「あ、その前に、[ハチロクニイマル,3]8620――\n蒸気機関車が転車して、客車と連結します」
2238 = "「A, trước đó, 8620――\n\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sẽ xoay đầu trên \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;\n,\nrồi kết nối với \\x%l客車;#00ffc040;toa hành khách%l;#; ạ.」"

# 【レポーター】
# display as 記者
# JP: 「わ、じゃ、それも撮らなきゃ。撮るよね？\nそれなら、案内してもらえますか？」
2180 = "「Oa, vậy, cái đó cũng phải quay lại chứ.\nSẽ quay đúng không?\nNếu vậy, có thể dẫn\nđường cho chúng tôi được không?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。少しだけ待って下さい」
2350 = "「Vâng. Xin hãy đợi một chút ạ.」"

# monologue
# JP: またガチリ。ふかみは切り替えたポイントを戻し、\nレポーターをつれ、転車台の方へと消えていく。
3582 = "Lại nghe tiếng 'cạch'. Fukami đưa thanh\nghi vừa bẻ về vị trí cũ,\ndẫn phóng viên đi\nvà khuất dần về phía \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;."

# 【日々姫】
# display as 日日姬
# JP: 「わー、本当に画だけ撮ったんだー」
2178 = "「Oa~, đúng là chỉ quay mỗi cảnh đó thôi\nkìa~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがそうさせたのだろう。\n普段と違う扱いで運用するのは、事故のもとだ」
2329 = "「Chắc là Paulette đã bảo làm vậy.\nVận hành\nkhác với bình thường là mầm mống của tai\nnạn mà.」"

# 【凪】
# display as 凪
# JP: 「にーさん！　[いれしん,4]入換信号機！ 進行ばい！」
