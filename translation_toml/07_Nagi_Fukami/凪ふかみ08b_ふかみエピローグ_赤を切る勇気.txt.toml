2597 = "「Rắc rối chứ! Khó khăn lắm đường sắt mới\ncó cơ hội phục sinh mạnh mẽ mà.\nHơn nữa,\nnếu có khách đến Đường sắt Ohito, thì dịch\nvụ xuôi dòng sông cũng sẽ.」"

