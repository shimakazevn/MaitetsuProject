# 【双鉄】
# display as 雙鐵
# JP: 「……ああ。結局はかばいきれなかったが」
1516 = "「......À. Nhưng cuối cùng thì anh cũng không che chở được trọn vẹn.」"
# 【ふかみ】
# display as 深美
# JP: 「いえ！　ちゃんとかばってくれました。\nだからわたし、どこも怪我しないですみましたし！」
1976 = "「Dạ không! Anh đã che chở cho em rất tốt.\nNhờ vậy mà em không bị thương ở đâu cả!」"
