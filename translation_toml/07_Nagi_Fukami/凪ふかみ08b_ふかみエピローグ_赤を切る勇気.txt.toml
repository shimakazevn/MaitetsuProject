# monologue
# JP: にーさん、そういうこというの良くなかとばい！\nふたりで一緒に買い物いったり、水遊びしたり――
3323 = "Anh Soutetsu, nói vậy là không được đâu\nnha!\nHai đứa mình từng đi mua sắm cùng\nnhau, chơi đùa dưới nước――"

# monologue
# JP: そぎゃんとが、楽しくて楽しくて、\nドキドキしてうれしかったの、思い出しちゃうけん。
3148 = "Những lúc đó, vui lắm vui lắm luôn,\nnhớ\nlại thôi cũng thấy hồi hộp sung sướng rồi."

# 【凪】
# display as 凪
