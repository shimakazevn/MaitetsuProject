2588 = "「然後再加上原本計劃的三週輪完休一週，不就剛好了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。つまり――四週を、『ふかみとふたり』『休養』、\n『三人で』『休養』と、配分していく感じになるのか」
2201 = "「唔，也就是這樣安排四個星期：和深美獨處、休息、三個人一起玩、休息，是嗎？」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんとね！　それならにーさん、\nきっと無理なく、遊びも休みも楽しめるばい！！」
2379 = "「對！這樣大哥哥就不用累著自己，可以同時享受玩樂與休息囉！！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっっ！！」
2382 = "「小凪！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
2204 = "「唔？！」" 

# 【凪】
# display as 凪
# JP: 「ふかみ……ちゃん？」
2399 = "「小深？」" 

# monologue
# JP: ふかみちゃん、いままで見たこと無い顔しとる。
3411 = "小深露出了一副咱從沒見過的表情。" 

# monologue
