# JP: その向く先は――リポーターさん、だ。
3627 = "Nơi cô bé hướng tới là――cô phóng viên."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　凪」
2035 = "「Sao vậy? Nagi.」"

# 【凪】
# display as 凪
# JP: 「あのねーちゃん、ちょっと気にくわんばい。\nにーさんに、色目ばつかっとったでしょお」
