2713 = "「Thời gian trôi qua, mình đã hiểu. Đối với mình, đó cũng là tình đầu.\nNhưng, vì đối phương là bé Fukami nên――」"
# 【ふかみ】
# display as 深美
# JP: 「なぎ、ちゃん――」
2380 = "「Nagi――」"
# 【凪】
# display as 凪
