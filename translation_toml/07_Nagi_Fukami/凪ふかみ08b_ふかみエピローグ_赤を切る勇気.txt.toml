3714 = "Anh hai, thực sự――\nđã ở trong tình thế vô cùng nguy hiểm!"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？」
2385 = "「Nagi?」"
# 【双鉄】
# display as 雙鐵
