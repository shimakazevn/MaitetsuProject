# display as 雙鐵
# JP: 「え？　ああ、『登呂流湯』ですか」
2188 = "「Hả? À, 'Nhà tắm Tororyu-yu' sao.」"
# 【レポーター】
# display as 記者
# JP: 「そう！　そこ。\nよかったら、案内してもらえませんか？」
2378 = "「Đúng rồi! Chỗ đó đó.\nNếu được, anh dẫn đường cho tôi có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
2245 = "「Hả?」"
# 【凪】
# display as 凪
# JP: 「むうっ！」
2197 = "「Hừ!」"
# monologue
# JP: ああ、痛い。
3293 = "A, đau quá."
