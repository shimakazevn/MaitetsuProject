3261 = "Nhưng mà, đây là vấn đề liên quan đến việc quảng bá của Đường sắt Ohito,\nliệu tôi có nên tự ý từ chối hay không――"
# 【レポーター】
# display as 記者
# JP: 「オッケーですか？　ありがとうございます！\nじゃ、お風呂、つれてってください」
2134 = "「OK chứ? Cảm ơn anh nhiều nha!\nVậy, đưa tôi đi tắm suối nước nóng đi.」"
