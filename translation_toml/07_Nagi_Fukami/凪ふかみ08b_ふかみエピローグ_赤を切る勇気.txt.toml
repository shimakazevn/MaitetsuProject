2459 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của đầu máy\n8620\nthuộc Đường sắt Ohito,\nvừa được ngài\nSoutetsu giới thiệu. Tôi là Hachiroku ạ.」"

# 【レポーター】
# display as 記者
