2331 = "「Tuyệt quá……Một \\x%lレイルロオド;#00ffc040;Railord%l;#; xinh đẹp thế này.\nKể cả ở\nĐế đô cũng――」"

# 【ハチロク】
# display as 八六
# JP: 「ふふっ、お褒めに預かり光栄です。\n実のところわたくしの出身は、帝都・[ていおう,1]帝央でございます」
2156 = "「Fufu, được khen ngợi là vinh hạnh của\ntôi.\nThực ra xuất thân của tôi là ở Teuou,\nĐế đô đấy ạ.」"

# monologue
# JP: （うむ？　厳密には、\n[おおみや,1]旺宮のレイルロオド工機部出身ではなかったか？)
3754 = "（Hừm? Nói một cách nghiêm túc thì,\nkhông\nphải xuất thân từ Bộ phận Cơ khí chế tạo\nRailord ở Omiya sao?）"

# monologue
# JP: まぁしかし、\nあの調子なら説明の全てを任せて問題ないだろう。
3643 = "Cơ mà thôi,\nvới cái đà đó thì giao toàn bộ\nviệc giải thích cho em ấy chắc không có\nvấn đề gì đâu."

# 【双鉄】
# display as 雙鐵
