# display as 凪
# JP: 「ふかみちゃん、わからんと？　\\x%l列車防護;#00ffc040;列車防護%l;#;ダッシュとか、\nリバーウォークとかよりずっと、乗務の方がキツかとよ」
2397 = "「Bé Fukami, chị không hiểu sao? Chạy nước rút \\x%l列車防護;#00ffc040;phòng vệ tàu%l;#;,\nhay lội sông gì đó, làm sao mệt bằng công việc trên tàu được.」"
# 【ふかみ】
