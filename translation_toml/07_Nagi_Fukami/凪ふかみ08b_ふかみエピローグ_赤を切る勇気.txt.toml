3287 = "Mình hiểu rồi! Mình hiểu rồi!\nBé Fukami,\nngười rất rành về Luật lao động gì gì đó."

# monologue
# JP: うちの修行のあととかに、レモンやらマッサージやらで、\n休養休養回復回復っていってくれる、あのふかみちゃんが。
3339 = "Bé Fukami, người luôn bảo phải nghỉ ngơi\nnghỉ ngơi, phục hồi phục hồi\nbằng chanh và\nmassage sau khi mình tu hành xong."

# monologue
# JP: （にーさんと一秒でも長く過ごしたくって――そのせいで、\nにーさんの休養のこと、頭から抜け落ちちゃたとね！？）
3765 = "（Cậu ấy muốn được ở bên anh Soutetsu dù\nchỉ lâu hơn một giây――chính vì thế,\nmà\nquên bẵng đi chuyện nghỉ ngơi của anh ấy\nsao!?）"

# monologue
