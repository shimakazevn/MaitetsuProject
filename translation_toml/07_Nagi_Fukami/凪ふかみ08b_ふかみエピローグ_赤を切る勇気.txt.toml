# 【ふかみ】
# display as 深美
# JP: 「覚えて――ううん。思い出すこと、できます、か？\nどうして双鉄おにいさんが、いま、ここで寝ているのか」
2043 = "「Anh có nhớ――à không. Anh có thể nhớ lại được không, ạ?\nTại sao anh Soutetsu, bây giờ, lại đang nằm ở đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「思い、出す……」
2438 = "「Nhớ, lại......」"
# monologue
# JP: にーさんが、ゆっくりふかみちゃんの顔ばみる。
3308 = "Anh hai từ từ nhìn khuôn mặt bé Fukami."
# monologue
# JP: ふーって、ゆっくり、安心したみたいな息。\nくったり、目に見えてにーさんの体の力ば抜けていく。
3118 = "Anh thở ra một hơi dài, chầm chậm, như đã an tâm.\nCó thể thấy rõ cơ thể anh hai đang dần thả lỏng, rũ xuống."
# 【双鉄】
# display as 雙鐵
