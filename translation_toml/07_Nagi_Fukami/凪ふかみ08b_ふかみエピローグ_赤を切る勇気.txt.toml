3390 = "Bé Fukami chắc chắn là\nthích anh Soutetsu\nnhiều hơn mình."

# 【凪】
# display as 凪
# JP: 「まず――」
2768 = "「Trước tiên――」"

# monologue
# JP: 言葉が、なんでかひっかかりよるけど、\nそいでも、平気。
3088 = "Không hiểu sao lời nói cứ nghẹn lại,\nnhưng\ndù vậy, vẫn không sao."

# monologue
# JP: うちはにーさんのことも大好きだけど、\nふかみちゃんのことも、大好きやけんね！
3722 = "Mình rất thích anh Soutetsu,\nnhưng cũng\nrất thích bé Fukami nữa!"

