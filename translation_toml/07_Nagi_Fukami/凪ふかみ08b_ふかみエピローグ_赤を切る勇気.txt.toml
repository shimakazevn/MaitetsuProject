3656 = "Được anh hai khen vui quá đi mất,\ncảm giác hờn dỗi và nhói lòng ban nãy tan biến sạch sành sanh."
# 【双鉄】
# display as 雙鐵
# JP: 「乗務中に倒れていたなら、事故へと繋がりかねなかった。\n今日ここで倒れることが出来たのは、[ぎょうこう,1]僥倖だったのだ」
2360 = "「Nếu anh ngã gục trong lúc làm nhiệm vụ trên tàu, rất có thể sẽ dẫn đến tai nạn.\nHôm nay anh ngã gục ở đây, quả là một sự may mắn.」"
# 【ふかみ】
# display as 深美
# JP: 「ぁぅ……」
2257 = "「Au......」"
# 【双鉄】
# display as 雙鐵
# JP: 「安全は常に、第一の使命だ。そして、心身の健康は、\n安全を担保するため、最優先で維持すべきものだ」
2365 = "「An toàn luôn là sứ mệnh hàng đầu. Và sức khỏe thể chất lẫn tinh thần,\nlà điều phải được duy trì ưu tiên nhất để đảm bảo an toàn.」"
# 【ふかみ】
# display as 深美
# JP: 「はい――」
2526 = "「Vâng――」"
# 【双鉄】
# display as 雙鐵
# JP: 「それを僕は失念し、[おろそ]疎かにしてしまっていたらしい。\n修学旅行が、あまりに楽しすぎるから――」
2461 = "「Có vẻ như anh đã quên béng và lơ là điều đó mất rồi.\nVì chuyến dã ngoại quá đỗi vui vẻ――」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「あ！」\n「あ！」
2217 = "「A!」\n「A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2271 = "「Hửm?」"
# monologue
# JP: ふかみちゃんとふたり、おっきな声ばたてちゃったけん、\nにーさんば、ビックリした顔でとまりよる。
3279 = "Cả em và bé Fukami đều vô tình kêu lên một tiếng lớn,\nkhiến anh hai dừng lại với vẻ mặt ngạc nhiên."
# 【ふかみ】
# display as 深美
# JP: 「あ……えと……」
2211 = "「A...... dạ......」"
# monologue
# JP: ふかみちゃん、なんだか話しづらそうばい！\nしたら凪さま、代わりにいうてあげんといけんね！
3382 = "Bé Fukami có vẻ khó mở lời quá!\nVậy thì Nagi đại nhân phải nói thay thôi!"
# 【凪】
# display as 凪
# JP: 「凪さまとふかみちゃんも、にーさんが寝とる[ま]間に、\nそのことちょうど話しとったとよ」
2561 = "「Nagi đại nhân và bé Fukami cũng vừa nói chuyện đó,\ntrong lúc anh hai đang ngủ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのこと、とは？」
2196 = "「Chuyện đó, là sao?」"
# 【凪】
# display as 凪
# JP: 「にーさん。長いことちょっとも休んでないでしょお？　\nやけん、体ばくたくたになって、倒れよったと」
2322 = "「Anh hai. Lâu lắm rồi anh không nghỉ ngơi chút nào đúng không?\nThế nên cơ thể mới mệt rã rời, rồi ngã gục đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「そしたら、休まないとダメでしょお。\nばってん、今にーさんには、休める時間のなかとよね」
2728 = "「Thế thì, anh phải nghỉ ngơi mới được.\nNhưng mà, bây giờ anh hai làm gì có thời gian nghỉ ngơi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うう……む」
2198 = "「Ư......m.」"
# monologue
