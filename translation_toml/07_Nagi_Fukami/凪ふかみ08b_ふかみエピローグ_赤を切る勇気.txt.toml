# 【双鉄】
# display as 雙鐵
# JP: 「就学旅行の楽しさで、休めていると感じていたが――\n心はともかく体の方は、全く休めてなかったようだ」
2294 = "「Anh cứ nghĩ niềm vui của chuyến dã ngoại\nđã giúp anh nghỉ ngơi rồi――\nNhưng có vẻ\ntâm trí thì được thư giãn, còn cơ thể thì\nhoàn toàn không được nghỉ ngơi chút nào.」"

# 【凪】
# display as 凪
# JP: 「でしょお？　やけん！」
2515 = "「Đúng không? Vậy nên!」"

# 【ふかみ】
# display as 深美
# JP: 「はぅぅ～」
# 2257 = "「嗚……」" 

# 【凪】
# display as 凪
# JP: 「っ！！？」
2250 = "「!!?」"

# monologue
# JP: ふかみちゃんが、なんか泣きそうば声ば出しよる！\nそいば聞いたら――そんなん、聞いたら……
3407 = "Bé Fukami bỗng thốt ra một âm thanh như\nsắp khóc!\nNghe thấy vậy――nghe thấy âm\nthanh đó thì……"

# 【双鉄】
# display as 雙鐵
# JP: 「凪？」
2092 = "「Nagi?」"

# monologue
# JP: 修学旅行……ウチたちからやめる、っていったら、\nにーさんが傷ついちゃうかもしれんばい。
3357 = "Chuyến dã ngoại…… Nếu bọn em chủ động nói\nmuốn dừng lại,\ncó thể anh hai sẽ bị tổn\nthương."

# monologue
# JP: そこんところは、にーさんに判断任せて――\nうん！　そのほうが絶対よかとね！！
3540 = "Chuyện đó, cứ để anh hai tự quyết định\nđi――\nỪm! Làm vậy chắc chắn là tốt nhất!!"

# 【双鉄】
# display as 雙鐵
# JP: 「凪？　どうかしたのか？」
2094 = "「Nagi? Em sao vậy?」"

# 【凪】
# display as 凪
# JP: 「どーもせんばい！　どーかしたのはにーさんばい！\nやけん休まんといけんでしょおよ」
2565 = "「Em chẳng sao hết! Người có sao là anh hai\nkìa!\nNên anh phải nghỉ ngơi mới được chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃぁん」
2381 = "「Nagiiii.」"

# monologue
# JP: ふかみちゃんの甘ったれた声。\n大丈夫やけん！　って、ウィンクば飛ばす。
3400 = "Giọng nói nũng nịu của bé Fukami.\nKhông\nsao đâu! Em nháy mắt một cái."

# monologue
# JP: ふかみちゃんは凄かばってん、頼りなかけん！\nウチが代わってあげられることは、代わったげるけんね！
3394 = "Bé Fukami tuy giỏi giang nhưng lại không\nđáng tin cậy!\nViệc gì em làm thay được, em\nsẽ làm thay cho!"

# 【凪】
# display as 凪
# JP: 「ばってんお仕事山盛りだし、どーやったってにーさん、\nいまよりお休み増やせんでしょお？」
2136 = "「Nhưng công việc thì chất cao như núi, dù\ncó làm thế nào đi nữa,\nanh hai cũng đâu\nthể tăng thêm ngày nghỉ so với bây giờ\nđược đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうだな。乗務だけでなく、訓練もあるし……\n保線や、路線延伸について任される部分も増加している」
2268 = "「Chà, đúng là vậy. Không chỉ làm nhiệm vụ\ntrên tàu, còn phải huấn luyện nữa……\nCông\nviệc bảo trì đường ray và những phần được\ngiao liên quan đến việc mở rộng tuyến cũng\nđang tăng lên.」"

# monologue
# JP: じ……って、\nにーさん、目ばとじよる。
3318 = "Im lìm……\nAnh hai nhắm mắt lại."

# monologue
# JP: 考えるまでもなかことのよーな気はするばってん、\nこぎゃんともちゃんと考えるのも、良かとこばい！
3290 = "Tuy em thấy chuyện này chẳng cần phải nghĩ\nngợi gì nhiều,\nnhưng việc anh ấy suy nghĩ\nnghiêm túc như vậy cũng là một điểm tốt!"

# 【双鉄】
# display as 雙鐵
# JP: 「……絶対的な職員数の不足もある。\nやはり、公休の日数の増加という方向性は、ありえんな」
1531 = "「……Cũng có sự thiếu hụt nhân sự tuyệt đối\nnữa.\nQuả nhiên, hướng đi tăng số ngày nghỉ\nphép là không thể nào.」"

# 【凪】
# display as 凪
# JP: 「したら、『今あるお休みに、しっかり休む』\nよーにせんといけんね、っていう話になるばい」
2740 = "「Vậy thì, chuyện sẽ thành ra là phải làm\nsao để\n『Nghỉ ngơi thật đàng hoàng trong\nnhững ngày nghỉ hiện có』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2376 = "「Đúng vậy.」"

# 【凪】
# display as 凪
# JP: 「ばってん、修学旅行。……えと、今の――感じ？　で\nやっとったら、にーさん、少しも休めんでしょお」
2014 = "「Nhưng mà, chuyến dã ngoại. ……À ừm, với\ncái――kiểu? như bây giờ,\nmà cứ tiếp tục thì\nanh hai chẳng được nghỉ ngơi chút nào\nđâu.」"

# 【ふかみ】
# display as 深美＆雙鐵
# JP: 「あ」\n「なるほどな」
2214 = "「A.」\n「Ra là vậy.」"

# monologue
# JP: ふかみちゃんのほっとした声、\nありがとおって、目でいうとる。
3384 = "Giọng nói thở phào nhẹ nhõm của bé Fukami,\nánh mắt chị ấy như đang nói lời cảm ơn."

# monologue
# JP: ならやっぱり、やめるのやめんのを決めるのは、\nにーさんに任せた方がよかとばいね！
3626 = "Vậy thì quả nhiên, việc quyết định dừng\nhay không dừng,\ncứ giao cho anh hai là tốt\nnhất!"

# 【凪】
# display as 凪
# JP: 「やっけーん！　修学旅行の――そう！　時間割り！\n時間割り変えたりして、にーさんが休めるように、って」
2488 = "「Nên là! Chuyến dã ngoại――Đúng rồi! Thời\ngian biểu!\nBọn em định thay đổi thời gian\nbiểu, để anh hai có thể nghỉ ngơi.」"

# 【ふかみ】
# display as 深美
# JP: 「話あったんです。わたしたち。双鉄おにいさんが、\nどういう風に決めてもそれにしたがおう、って」
2457 = "「Bọn em đã bàn bạc với nhau rồi. Rằng dù\nanh Soutetsu\ncó quyết định thế nào, bọn em\ncũng sẽ nghe theo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2523 = "「Vậy sao.」"

# monologue
# JP: ふかみちゃんの声に元気ばもどってるし、\nにーさんの頷く顔も明るか！
3404 = "Giọng nói của bé Fukami đã vui vẻ trở lại,\nkhoôn mặt anh hai khi gật đầu cũng rạng rỡ\nhẳn lên!"

# monologue
# JP: ならやっぱり、これで間違いなかったとねー！
3720 = "Vậy thì quả nhiên, làm thế này là không\nsai vào đâu được!"

# 【双鉄】
# display as 雙鐵
# JP: 「親身になって考えてくれて、ありがとう。\nふかみにも、凪にも心配をかけてしまったな」
2652 = "「Cảm ơn hai em đã suy nghĩ cho anh.\nAnh đã\nlàm Fukami và Nagi phải lo lắng rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「いえ、そんなっ」
1984 = "「Dạ không, đâu có ạ.」"

# monologue
# JP: 修学旅行、ふかみちゃんよっぽど続けたかったとねー。\nにーさんにほめてもらって、溶けそうな顔しとるばい！
3395 = "Bé Fukami chắc hẳn muốn tiếp tục chuyến dã\nngoại lắm đây.\nĐược anh hai khen một cái\nlà mặt mũi như tan chảy ra luôn!"

# 【双鉄】
# display as 雙鐵
# JP: 「しかしそうか。時間割か。現状は、『ふかみと二人で』\n『凪と二人で』『三人で』のローテーションだが――」
1974 = "「Nhưng mà ra vậy. Thời gian biểu sao. Hiện\ntại là xoay vòng 『Hai người với Fukami』,\n『Hai người với Nagi』, 『Cả ba người』――」"

# 【ふかみ】
# display as 深美
# JP: 「おやすみ合わせられるの、一週間に一回……ですよね。たぶん、だいたい、平均にならすと」
2019 = "「Chúng ta sắp xếp được ngày nghỉ chung,\nmột tuần một lần…… đúng không ạ. Chắc là,\nđại khái, tính trung bình ra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あまりペースを気にしたこともなかったが……\nいわれてみるとその程度な気が――ああ！」
2466 = "「Anh cũng không để ý đến tần suất lắm\nnhưng……\nNghe em nói mới thấy có vẻ là\nvậy――A!」"

# monologue
# JP: ぽんって、にーさんが手ば打ち合わせる。
3309 = "Bốp một tiếng, anh hai vỗ hai tay vào\nnhau."

# 【双鉄】
# display as 雙鐵
# JP: 「では、一ヶ月に一回は完全休養を取ることにして」
2738 = "「Vậy thì, quyết định mỗi tháng anh sẽ nghỉ\nngơi hoàn toàn một lần nhé.」"

# 【ふかみ】
# display as 深美＆凪
# JP: 「あっ！」「少なすぎばい！\nそれじゃまた同じこと起きるとよ！！」
2219 = "「A!」「Ít quá đi!\nNhư thế thì chuyện tương\ntự lại xảy ra cho xem!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2199 = "「Hừm.」"

# 【ふかみ】
# display as 深美
# JP: 「ぁぅ」
2213 = "「Au.」"

# 【凪】
# display as 凪
# JP: 「休みのペースば気にしとらんって、\nそぎゃんとが、もう最初からおかしかとよ」
2314 = "「Việc anh không để ý đến tần suất nghỉ\nngơi,\nngay từ đầu đã là không ổn rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「はうっ！」
2216 = "「Hau!」"

# monologue
# JP: 今気がついたって言う感じに、\nふかみちゃんがこくこくこくこく何度も頷く。
3398 = "Như thể bây giờ mới nhận ra,\nbé Fukami gật\nđầu lia lịa liên tục."

# monologue
# JP: 労働環境とかそぎゃんこと、うち、ふかみちゃんが\nいつも気にしとるから、気にするよーになったとに……
3243 = "Mấy chuyện như môi trường lao động này nọ,\nlà do bé Fukami\nlúc nào cũng để ý, nên em\nmới bắt đầu để ý theo đấy chứ……"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2548 = "「Là vậy sao?」"

# 【凪】
# display as 凪
# JP: 「……にーさん、\n日曜日がどーしてあるか、知っとーと？」
1518 = "「……Anh hai,\nanh có biết tại sao lại có\nngày Chủ nhật không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「考えたこともないな」
2440 = "「Anh chưa từng nghĩ đến chuyện đó.」"

# 【凪】
# display as 凪
# JP: 「日曜日ば、『週に一度は休みなさい』って意味ばい！\nその半分は、まぁ遊びにいったりするにしたって――」
2507 = "「Ngày Chủ nhật, mang ý nghĩa là 『Mỗi tuần\nhãy nghỉ ngơi một lần』 đấy!\nDù cho một nửa\nthời gian đó là để đi chơi đi chăng nữa――」"

# 【ふかみ】
# display as 深美
# JP: 「月、二回。……そのくらいは完全休養がないと。\nわたしもやっぱり、体、危ないって思います」
1956 = "「Một tháng, hai lần. ……Ít nhất phải có\nngần ấy thời gian nghỉ ngơi hoàn toàn.\nEm\ncũng nghĩ, cơ thể anh sẽ gặp nguy hiểm\nmất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それほど休まねばならぬものか」
2465 = "「Phải nghỉ ngơi nhiều đến thế sao.」"

# monologue
# JP: よかったばい！
3325 = "Tốt quá rồi!"

# monologue
# JP: ふかみちゃんもわかってくれたら、\n凪さま、怖いものなかとばい！！
3524 = "Nếu bé Fukami cũng đã hiểu ra,\nthì Nagi\nđại nhân đây chẳng còn sợ gì nữa!!"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それをいったら凪やふかみも、\n恐らくは、三週に一回しか完全休養を――」
2140 = "「Nhưng mà, nếu nói vậy thì Nagi và Fukami,\ncó lẽ cũng chỉ được nghỉ ngơi hoàn toàn\nmột lần mỗi ba tuần――」"

# 【凪】
# display as 凪
# JP: 「凪さまたち学園生やけんね！　通学中とか授業中とか、\n居眠りする時間はたくさんあるばい！！」
2169 = "「Bọn em là học sinh mà! Lúc đi học hay\ntrong giờ học,\ncó đầy thời gian để ngủ\ngật!!」"

# 【ふかみ】
# display as 深美
# JP: 「わ！　わたしは、授業中寝てたりとか、してない、です。\n……通学の間は、たしかに、うとうとってしますけど」
2447 = "「Oa! Em thì, không có ngủ gật trong giờ\nhọc đâu, ạ.\n……Nhưng lúc đi học thì, đúng\nlà có ngủ gật thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ふたりもそれぞれ、工夫をしながら休みを\n取っていたのだな。……自分の不摂生が恥ずかしくなる」
2505 = "「Ra vậy. Hai em cũng tự có cách riêng để\nnghỉ ngơi nhỉ. ……Anh thấy xấu hổ vì sự\nthiếu chăm sóc bản thân của mình quá.」"

# monologue
# JP: にーさんがこっくり頷く。\nほっとして、ふかみちゃんと目ばみあわせちゃう。
3322 = "Anh hai gật đầu cái rụp.\nEm thở phào nhẹ\nnhõm, nhìn nhau với bé Fukami."

# 【双鉄】
# display as 雙鐵
# JP: 「自覚した。学習できた。僕の場合は――\n意識的に、規則的に休みを取らねばならんのだな」
2592 = "「Anh tự giác rồi. Anh đã học được bài học\nrồi. Trong trường hợp của anh――\nAnh phải\ncó ý thức nghỉ ngơi một cách có quy tắc.」"

# 【ふかみ】
# display as 深美
# JP: 「そう、かもです。\n双鉄おにいさん、働くの、凄く好きみたいだし」
2478 = "「Có lẽ, là vậy ạ.\nVì anh Soutetsu có vẻ\nrất thích làm việc mà.」"

# 【凪】
# display as 凪
# JP: 「修学旅行で、にーさんは遊ぶ楽しさを覚えたけん！\n次は、休む楽しさ、めいっぱい覚えればよかとばい！」
2317 = "「Qua chuyến dã ngoại, anh hai đã biết được\nniềm vui khi đi chơi rồi!\nTiếp theo, anh\ncứ học cách tận hưởng niềm vui khi nghỉ\nngơi là được!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ならば――うむ。修学旅行の一行程をとったら、\nその次は完全休養、というペースでよいか」
2341 = "「Đúng vậy. Nếu thế thì――ừm. Sau một chuyến\ndã ngoại,\nlần tiếp theo sẽ là nghỉ ngơi\nhoàn toàn, với tần suất như vậy được\nkhông?」"

# 【凪】
# display as 凪＆深美
# JP: 「そぎゃんとが」\n「はぅぅ～～っ」
2405 = "「Là vậy đó」\n「Hauuu～～っ」"

# 【凪】
# display as 凪
# JP: 「ほえ？」
2187 = "「Hả?」"

# monologue
# JP: 休みの大事さ、過労の怖さ。\nふかみちゃん、よーく知っとるはずなのに――
3396 = "Tầm quan trọng của việc nghỉ ngơi, sự đáng\nsợ của việc làm việc quá sức.\nĐáng lẽ bé\nFukami phải biết rất rõ chứ――"

# monologue
# JP: なんでか悲鳴みたいな声ばあげて、\n青い顔して、ほっそい指ば折りはじめよる。
3124 = "Sao cậu ấy lại phát ra tiếng kêu như tiếng\nhét,\nmặt tái mét và bắt đầu bẻ bẻ mấy ngón\ntay thon thả vậy."

# 【ふかみ】
# display as 深美
# JP: 「そしたら、そのペースだと……六週間に一回、しか――\n双鉄おにいさんと、二人きりで過ごすの……それ、だけ」
2741 = "「Nếu vậy, với tiến độ đó thì……sáu tuần mới\nđược một lần, thôi sao――\nĐược ở riêng\nvới……anh Soutetsu……chỉ chừng đó, thôi ạ.」"

# monologue
# JP: ちらって、ふかみちゃん、にーさんを見る。
3405 = "Bé Fukami liếc nhìn anh Soutetsu."

# monologue
# JP: なんか、ちょっと泣きそうな、でもとっても綺麗な――\nさっき『夫婦みたい』って思ったときとおんなじ目――！
3629 = "Trông có vẻ như sắp khóc, nhưng lại vô\ncùng xinh đẹp――\nĐó là ánh mắt y hệt như\nlúc nãy khi mình nghĩ 'như vợ chồng\nvậy'――!"

# 【凪】
# display as 凪
# JP: 「あ！」
# 2216 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　凪！？」
2036 = "「Sao vậy? Nagi!?」"

# 【凪】
# display as 凪
# JP: 「なんでもなかばい！　じゃなくて！　えと！　\n思いついたとばい！　良かこと！　良か考えっ！！」
2564 = "「Không có gì đâu! À không phải! Ừm!\nEm\nnghĩ ra rồi! Một chuyện rất hay! Một ý\ntưởng rất tuyệt!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、それは楽しみだ」
2283 = "「Ồ, đáng mong đợi đây.」"

# monologue
