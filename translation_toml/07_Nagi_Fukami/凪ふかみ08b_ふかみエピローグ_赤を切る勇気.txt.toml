3713 = "Cô bé đó, chắc chắn không phải là Fukami.\nVậy thì, Nagi đã――rốt cuộc là, chuyện gì?"
# 【凪】
# display as 凪
# JP: 「何もいわんなら、よかとよね？」
2023 = "「Cậu không nói gì thì, coi như là được đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「……ぁ……ぅ……」
1513 = "「......A......u......」"
# monologue
# JP: 凪が、黙る。\nふかみの返事を、おそらく待ってくれている。
3217 = "Nagi im lặng.\nCó lẽ đang chờ câu trả lời của Fukami."
# monologue
# JP: けれどふかみは――話せない。\n凪が、再び、ゆっくりゆっくり、唇を開く。
3138 = "Nhưng Fukami thì――không thể cất lời.\nNagi lại một lần nữa, chầm chậm, chầm chậm mở lời."
# 【凪】
