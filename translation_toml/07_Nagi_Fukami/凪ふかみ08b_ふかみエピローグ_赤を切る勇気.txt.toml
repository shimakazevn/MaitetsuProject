2336 = "「好了，回到剛才的問題。為什麼要拉紅閥」" 

# 【レポーター】
# display as 記者
# JP: 「あかをきる？」
2492 = "「拉紅閥？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　車掌弁を引く――車掌が列車を\n非常停止させることを、『赤を切る』っていうんです」
2223 = "「啊！列車長拉下列車長閥，讓列車緊急停車，就叫“拉紅閥”」" 

# monologue
# JP: いいながら、車掌弁のお尻をふかみは示す。\n引き手の末端の木部の色は、鮮やかな赤だ。
3687 = "說著，深美指了指列車長閥的底部。木質拉手的顏色是鮮艷的紅色。" 

# 【レポーター】
# display as 記者
# JP: 「なるほど～」
2546 = "「是這樣呀」" 

# monologue
# JP: ……実際の語源は、車掌が持つ旗。
1473 = "……其實這個詞最初是源於列車長拿的旗子。" 

# monologue
# JP: フライ[キ]旗の赤、停止を示す旗ではあろうが、\nふかみはここは、笑顔で流す。
3097 = "也就是紅色手旗，意思是停車。但深美卻微笑著繼續說了下去。" 

# 【ふかみ】
# display as 深美
# JP: 「例えば。機関士が気絶して、レイルロオドも動けない。\nその状況だと……列車、どうなっちゃいますか？」
2047 = "「例如在司機暈了過去，鐵路人偶也動彈不得的情況下……列車會怎樣呢？」" 

# 【レポーター】
# display as 記者
# JP: 「ええと――ずっと走り続ける――暴走しちゃう！」
2695 = "「這……會一直跑下去，根本不會停下來！」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。機関車、8620の運転台に、走行中の客車から\n入り込むことはできません。だから、そういうときには」
2533 = "「是的。行駛時我們無法從客運車廂到達８６２０機車的駕駛台，因此呢，在這種時候……」" 

# 【レポーター】
# display as 記者
# JP: 「赤を、切る――\nその車掌弁を、ぐいっと？」
2407 = "「就要拉紅閥。把列車長閥拉下來」" 

# 【ふかみ】
# display as 深美
# JP: 「です。危険があるって少しでも感じたときは――\n車掌には、赤を切る義務があります」
2527 = "「是的。即使只是察覺到存在些許危險，列車長也有必須拉紅閥的義務」" 

# 【レポーター】
# display as 記者
# JP: 「義務、ですか？」
2542 = "「是義務？」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。安全が損なわれてはいけませんから――\nそれは、車掌が必ず果たすべき義務となるんです」
2532 = "「是的。無論如何，安全第一……保障安全，正是列車長的義務」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2216 = "「啊！」" 

# monologue
# JP: ごくごくわずかに、けれど確かに――\nふかみの笑顔が、引きつっている。
3723 = "雖然很不明顯，但我還是能看出，深美的笑容有些僵硬。" 

# 【レポーター】
# display as 記者
# JP: 「あー、義務を果たさないと\n事故になっちゃうかも、ですかー。納得です」
2243 = "「啊，沒有履行義務就有可能導致事故啊，我明白了」" 

# 【ふかみ】
# display as 深美
# JP: 「でも――その義務を果たすことは。\n赤を切ることは、本当に難しい」
2016 = "「但是，履行這個義務……拉紅閥並不簡單」" 

# monologue
# JP: ささやくようにそう言って。
3576 = "深美低聲說道。" 

# monologue
# JP: ふかみは照れくさそうな微笑みを作り、\nぺろっと、小さく舌を出す。
3353 = "她露出一副害羞的微笑，吐了吐舌頭。" 

# 【ふかみ】
# display as 深美
# JP: 「実はわたし。車掌になってから、\n車掌弁、まだ一度も引けたことがなくって」
2063 = "「其實，在成為列車長之後，我還沒有一次拉起列車長閥的經驗」" 

# 【レポーター】
# display as 記者
# JP: 「あー、そうだったんですか～！　でもそれって、\n御一夜鉄道さんが、それだけ安全！　ってことですよね」
2280 = "「噢，是這樣嗎！也就是說，御一夜鐵路非常安全吧」" 

# 【ふかみ】
# display as 深美
# JP: 「あはっ」
2182 = "「哈哈」" 

# monologue
# JP: それは、違う。\nふかみが一番、誰よりも良くわかっている。
3082 = "不是的。深美比任何人都清楚這一點。" 

# monologue
# JP: 僕や凪。日々姫や、ハチロクの気づきによって防がれた、\n『ヒヤリハット』のケースも、幾度かあった。
3545 = "有幾次都是差點就要發生危險，但是被我、凪、日日姬或者八六防患於未然。" 

# 【ふかみ】
# display as 深美
# JP: 「おかげさまで――」
2657 = "「謝謝誇獎」" 

# monologue
# JP: 赤を切る勇気。ふかみはそれを、未だに持てて……\n少なくとも、発揮できてはいない。
3623 = "現在，深美還沒有勇氣拉下紅閥……或者說，她還沒有將這份勇氣拿出來。" 

# monologue
# JP: 事実を誰よりわかっていながら、苦しみながら。\n――それでもふかみは、鮮やかな笑顔を浮かべてみせる。
3563 = "正因她比別人更清楚這件事，所以才會一邊忍耐著自責，一邊露出燦爛的笑容。" 

# 【ふかみ】
# display as 深美
# JP: 「おかげさまで、です。御一夜鉄道は開業以来、\n怪我人を出すような事故を、一件も起こしていません」
2656 = "「謝謝您的誇獎。自開張以來，御一夜鐵路從未發生任何有人受傷的事故」" 

# monologue
# JP: ふかみの言葉を笑顔でうけて、\nレポーターはふかみから視線を切って、カメラへと向く。
3632 = "看見深美微笑，記者轉過身去，面向鏡頭。" 

# 【レポーター】
# display as 記者
# JP: 「そんな御一夜鉄道の、頼もしい美人車掌さん！\n早瀬ふかみさんには、実はもう一つの顔があるんです！」
2421 = "「御一夜鐵路這位可靠的美女列車長早瀨深美，其實有不為人知的另一面！」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、堂々としとるとね～」
2390 = "「小深很有威嚴嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おう、凪」
2028 = "「你來啦，凪」" 

# monologue
# JP: 客車の外から、凪が小声で呼びかけてくる。
3701 = "車廂外面，凪小聲地跟我搭話。" 

# monologue
# JP: いつもと変わらぬ凪の様子に力が抜けて、\nいつの間に、自分が力んでいたと知る。
3671 = "見到和平時一模一樣的凪，我忽然放鬆下來。原來我剛才一直覺得有些緊張啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「カマはできたか」
2613 = "「窯弄好了嗎？」" 

# 【凪】
# display as 凪
# JP: 「ばっちりばい！　今日はテレビのひとたち来とるけん！\nいつもより念入りにつくっといたと！」
2059 = "「全都好了！今天有電視台的來採訪嘛！咱弄得比平時更仔細咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では僕も、一足先に運転台に入っておこう」
2732 = "「那我就先去駕駛台吧」" 

# monologue
# JP: 下へとおりれば、すぐさま凪が寄ってくる。
3237 = "剛下車，凪就湊了過來。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、一人にしといて大丈夫と？」
2595 = "「留小深一個人，沒問題嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫さ。ふかみなら。\nそうでなくとも今日の主役だ。大事に扱ってもらえよう」
2567 = "「沒問題，我相信她。何況她是今天的主角，就讓她站在鏡頭前面吧」" 

# 【凪】
# display as 凪
# JP: 「あー。そりゃそうばいねー」
2281 = "「噢，有道理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのうえ、ポーレットとれいなも添乗するのだ。\nならば僕は、乗務の準備を早める方が、正解だろう」
2626 = "「而且波萊特和玲奈也要一起上車。那我就更應該快點去準備開車了」" 

# 【ハチロク】
# display as 八六
# JP: 「おかえりなさいませ、双鉄様、凪」
2030 = "「你們回來了，雙鐵少爺，凪」" 

# 【日々姫】
# display as 日日姬
# JP: 「おかえりにーに！　ＴＶの取材、どうだった？」
2031 = "「你們回來啦！電視台採訪的事情怎麼樣了？」" 

# monologue
# JP: 運転台に戻るやいなやで、好奇心丸出しの日々姫に捕まる。
3239 = "剛回到駕駛台，滿臉好奇的日日姬就問了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「レポーターさんってやっぱり美人？\nそれとも、ＴＶで見るほどじゃない？？」
2726 = "「那位記者是美女嗎？還是說其實她沒電視上看起來那麼漂亮？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「美人は美人だったが、ふかみほどではない」
2334 = "「她確實是個美女，不過比不上深美」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、ご馳走様」
2185 = "「哎呀，秀恩愛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃーに？　カメラの前ではノロケんといてよねー」
2748 = "「阿哥，你可不能在攝影機前面秀恩愛啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2342 = "「好的」" 

# monologue
# JP: そうか、確かに、今のはノロケに聞こえるか。\nふかみが綺麗なことなどは、ごく当然であるとはいえど。
3380 = "對哦，這話聽起來確實挺像秀恩愛的。可深美她真的很漂亮啊。" 

# 【ハチロク】
# display as 八六
# JP: 「それで、今日の取材は、\nどのような性質のものなのですか？」
2337 = "「好了，回到正題，今天的採訪是什麼性質的採訪？」" 

# 【日々姫】
# display as 日日姬
# JP: 「紹介番組！　『[ひのもと,2]日ノ本鉄道めぐり』っていうの。\n大廃線からの復興を目指す鉄道各社をめぐってくの！」
2512 = "「是個專題節目！叫“日本鐵路環遊記”，專門介紹大廢線之後想要復興鐵路的各個鐵路公司！」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　そのような番組が」
2184 = "「哎呀！還有這樣的節目呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「電車姫様の働きかけで、[ひろしま,1]廣島ケーブルテレビ制作で\nこの四月からはじまって、あっという間に全国ネット！」
2708 = "「通過電車公主殿下的牽線，廣島有線電視台拍攝了這齣節目，從四月開始播送，剛播送就推廣到了全國網路播送！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと――凄いことだな」
2701 = "「這可真是太強了」" 

# 【日々姫】
# display as 日日姬
# JP: 「増えてきたんだよ！　鉄道に興味を持ってくれる人が。\nみんなで頑張ったから――頑張ってるから！」
2377 = "「對鐵路感興趣的人越來越多了！這也都是因為大家的努力……因為大家一直以來的努力！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2521 = "「是啊」" 

# monologue
# JP: 九洲以上に大廃線後の鉄道荒廃がひどかった北開道にも、\nようやく復線の種がまかれ始めてきたと聞く。
3654 = "聽說就連比九州荒廢程度還要嚴重的北海道，都終於開始出現恢復廢線的風頭了。" 

# monologue
# JP: 僕らの御一夜鉄道も、昨年ようやく、\n千内まわりでの、みかん鉄道との接続を持てた。
3458 = "我們御一夜鐵路也終於在去年，跟川內的橙鐵路連上了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――線路が再び。\n伸び、つながりはじめているのだ」
1488 = "「——線路將再次展開，再次聯通」" 

# 【日々姫】
# display as 日日姬
# JP: 「それだけに！\n今日のテレビも、と～っても重要！　なんだけど～」
2293 = "「因此！今天的電視採訪特別重要！」" 

# monologue
# JP: キャブの窓から首を出し、\n日々姫は客車の様子をうかがう。
3532 = "日日姬從駕駛室的窗戶探出腦袋，看向車廂的方向。" 

# 【日々姫】
# display as 日日姬
# JP: 「まさか、ふかみちゃんが取材の主役になるなんて。\nいっつもなら、ポーレットさんなのに、大出世！」
2568 = "「沒想到小深竟然會變成採訪的主角。平時都是由波萊特接受採訪的，這可真是出人頭地了啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「確かに、ポーレット様は話題性の固まりですからね。\n市長で社長で、あのお美しさ。けれど――」
2538 = "「是的，波萊特大人原本就很容易引起熱議，她是市長，是社長，還是美女。但是……」" 

# 【凪】
# display as 凪
# JP: 「大廃線からの復興を目指す！　ってテーマなら、\nふかみちゃんの方がもっとぴったりばい！！」
2355 = "「如果主題是走出大廢線，邁向復興，那麼小深更合適！！」" 

# monologue
# JP: 確信に満ち満ちた凪の言葉に、自然と頷く。
3206 = "凪一臉自信地說道，我也不禁點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同意だ。このツアーばかりは御一夜鉄道ならでは。完全な独自性を持つ、大きな売りであるのだからな」
2454 = "「我也贊同。這條旅行線路是御一夜鐵路獨有的。正因獨特，才有宣傳的價值」" 

# 【ハチロク】
# display as 八六
# JP: 「ふふっ、左様ですね」
2275 = "「嘻嘻，您所言極是」" 

# monologue
# JP: ツアーの好評を思ってか、\nハチロクも、どこか誇らしげな笑みを浮かべる。
3505 = "或許是想起了這條旅行路線深受好評，八六的臉上也露出了自豪的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「バーベキュー列車の車掌ふかみが、湯医につけば、\nすぐさまクマ川下りの船頭さんに早変わりする」
2775 = "「ＢＢＱ列車的列車長深美，在抵達湯醫站之後，立刻就會變成隈河漂流的掌棹」" 

# 【凪】
# display as 凪
# JP: 「そいばやるようになってから、ふかみちゃんが船頭の\nクマ川下り！　抽選制の大人気になったけんねー」
2302 = "「在開設這條線路之後，小深掌棹的隈河漂流大受歡迎，甚至要抽籤才能參加呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2521 = "「是啊」" 

# monologue
# JP: そのまま列車で折り返す者も、クマ川第四橋梁で、\nふかみ操るクマ川下り舟の真上を通過できる。
3366 = "如果沒有參與漂流，而是直接乘坐當次列車返回，深美的漂流船會在隈河第四大橋下方與列車交會而過。" 

# monologue
# JP: ふかみと凪とが発案したこのプラン、\n導入以来、申し込みは常に定員以上だ。
3548 = "本線路由深美與凪策劃，自開通以來，申請者一直都會超出額定人數。" 

# 【日々姫】
# display as 日日姬
# JP: 「あれ！？　わ！　ふかみちゃん、\x%l転轍機;#00ffc040;転轍機%l;#;！！」
2164 = "「咦？！哇！小深在扳動\\x%l転轍機;#00ffc040;轉轍機%l;#;！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そこまで絵作りするのか」
2003 = "「什麼，連這都要擺拍嗎」" 

# monologue
# JP: あわてて窓から外を見れば、\n\x%l錘付転換機;#00ffc040;錘付転換機%l;#;のレバーを、ふかみが全身で押し込んでいる。
3479 = "我慌慌張張地看了看窗外，只見深美正在用全身的力氣扳動\\x%l錘付転換機;#00ffc040;[不倒翁,4]重錘轉轍機%l;#;的拉杆。" 

# 【ハチロク】
# display as 八六
# JP: 「『\x%l入換;#00ffc040;入換%l;#;が出来て初めて車掌は一人前』――\n帝鉄では、そのように言われてもおりました」
2411 = "「帝國鐵路時代有這樣一句俗語，“會\\x%l入換;#00ffc040;調車%l;#;的才算獨當一面的列車長”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……帝鉄では長距離の列車も多かっただろうし、車掌が[いれかえ,1]入換誘導をせざるを得ないケースもありそうだが」
2522 = "「是嗎……帝國鐵路時代，長距離運營的列車較多，許多時候列車長必須引導調車」" 

# 【レポーター】
# display as 記者
# JP: 「ありがとうございますー！　ここオッケー？\nじゃ、湯医まで連れてってくださーい」
2658 = "「謝謝！這一段可以了嗎？好的，接下來請帶我們去湯醫吧」" 

# 【ふかみ】
# display as 深美
