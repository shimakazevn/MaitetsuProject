# monologue
# JP: 今は僕だけ、見てほしくって、感じてほしくて。\nふかみのことを――守りたくって。
3468 = "我希望她現在能只看著我一個，只感受我一個。我希望自己能保護她。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄……おにいさん」
2755 = "「雙鐵哥哥……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今まで、七年も――\n待たせてしまって、本当に済まなかった」
2632 = "「至今為止，我讓你等了整整七年……真的很對不起」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2216 = "「啊！」" 

# monologue
# JP: ふかみに、凪に、甘えてきた。甘えきっていた。\n修学旅行を引きずり続け、心地よい今に安寧していた。
3534 = "是我太軟弱，一直沒有跟深美、沒有跟凪攤牌。一直以修學旅行的名義，享受著理所當然的現在。" 

# monologue
# JP: だが、ダメだ。それでは不幸にするだけだ。\nふかみのことも、凪のことも。
3133 = "但是我錯了。這只會帶來不幸。會給深美，會給凪帶來不幸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そしてどうか、聞いて欲しい。\n僕のふかみへのお願いを」
2628 = "「聽我說，深美。我有一件事情想求你」" 

# monologue
# JP: 区切りがなかった。\n踏み出すきっかけをつかめなかった。
3483 = "我沒有邁出關鍵的一步，沒有抓住做個了斷的機會。" 

# monologue
# JP: それは、単なるいいわけだ。\nならばこの先、一瞬たりとも時間を無駄にはしたくない。
3092 = "不過這只是個藉口。從今以後，我不能再浪費哪怕一丁點的時間了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「指輪は、四年も前に買ってしまっているままだ。\nサイズはきっと、なおさねばならんだろうと思う」
2477 = "「戒指我四年前就買了。恐怕得改大一點才行」" 

# 【ふかみ】
# display as 深美
# JP: 「ふぁっ――」
2174 = "「哇……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、今は指輪も無い、言葉だけでしか、\n愛の誓いをたてられん」
2490 = "「所以，現在我沒有戒指，只能用言語向你立下愛的誓言」" 

# 【ふかみ】
# display as 深美
# JP: 「そんなの、全然っ！　かまわない！　ですっ！」
2566 = "「沒問題！我不介意的！嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2580 = "「深美」" 

# monologue
# JP: 構おうと構われまいと、僕の気持ちは変わらない。
3090 = "不管她是介意還是不介意，我的心意都不會變。" 

# monologue
# JP: ただひとつ、何年も言えずにいたことは――\nこの土壇場で、ひどくシンプルな形にまとまる。
3418 = "幾年以來我一直沒說出口的話……在這樣的場合，最終匯聚成了非常簡單的一句話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕と――結婚してください」
2160 = "「和我結婚吧」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――あ――あっ――あっっ！！」
2212 = "「啊……啊……啊——啊！！」" 

# monologue
# JP: ぼろぼろと、泣く。ふかみが、泣いてくずれかける。
3595 = "深美的淚水奪眶而出。她差點沒跪倒在地。" 

# monologue
# JP: だから、支える。僕だけの手で。\nふかみは崩れず――背筋を伸ばして、僕を見返す。
3496 = "我趕忙伸出手扶住她。她穩了穩身子，挺了挺背，抬頭看向我。" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　喜んでっ！！！！」
2344 = "「好的！我願意！！！！」" 

# 【凪】
# display as 凪
# JP: 「おめでとー！　ふかみちゃーーんっ！！」
2437 = "「恭喜你！小深！！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！！」
# 2382 = "「小凪！！」" 

# monologue
# JP: 凪が、ふかみに飛びついてくる。\nふかみが凪を受け止める。
3231 = "凪跳進了深美懷裡，深美接住了她。" 

# monologue
# JP: 修学旅行を重ねた間に、何十回も何百回も、\n見てきた光景、そのままに。
3272 = "和我在修學旅行之中見過幾十上百回的動作一模一樣。" 

# 【ふかみ】
# display as 深美
# JP: 「ありがと。ありがと。ありがと、凪ちゃん。\nありがと。なぎちゃん、ごめんね。だいすきっ！」
2655 = "「謝謝你，謝謝你，謝謝你，小凪。謝謝你，小凪，對不起，我最喜歡你了！」" 

# 【凪】
# display as 凪
# JP: 「うちも、ふかみちゃんが大好きばい！！」
2167 = "「咱也最喜歡你咧！！」" 

# monologue
# JP: 凪の涙も、まだ乾かない。
3219 = "凪的淚水還沒流乾。" 

# monologue
# JP: 濡れた瞳はけれど笑顔を――\nいつもの凪の笑顔を作る。
3351 = "她那流淌著淚水的臉，露出了一如既往的笑容。" 

# 【凪】
# display as 凪
# JP: 「やっと、ふかみちゃん出来たとね！\n赤を切る勇気――持てたとね！！」
2040 = "「你終於拿出勇氣了！拿出拉紅閥的勇氣了！！」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
# 2250 = "「啊？！」" 

# monologue
# JP: 泣き止まぬまま、ふかみの瞳がまんまるになる。
3605 = "深美那還帶著淚水的眸子瞪圓了。" 

# monologue
# JP: まんまるの瞳で僕をみて、レポーターさんを見て、\nもう一度僕を見、視線をゆっくり、凪へと戻す。
3348 = "她看向我，看向記者，然後再次看向我，最終她的視線慢慢落回到凪身上。" 

# 【ふかみ】
# display as 深美
# JP: 「え？　え？　これって――わざと、っていうか……\n凪ちゃん、ええと――その、なんていうのか――」
2249 = "「啊？啊？這……你們是故意的……小凪，呃……怎麼說呢……」" 

# 【凪】
# display as 凪
# JP: 「きっかけづくりばレポーターさんに頼んだとばい！\nふかみちゃんの背中ば押すチャンスだと思ったけん！！」
2519 = "「是咱拜託記者創造這個機會的！咱覺得這是推你一把的好機會！！」" 

# monologue
# JP: 妙に早口でそう言って。\n凪がもじもじ、急に居心地悪そうになる。
3215 = "凪很不自然地將這句話快速說完，她扭扭捏捏的，似乎很尷尬。" 

# 【凪】
# display as 凪
# JP: 「やけん――やけんね！？　ウチ、その……\n勢いあまったとか――そういうこと、全然、無かけんっ」
2481 = "「所以……所以！咱，那個……只是做樣子……完全沒那個意思的」" 

# 【ふかみ】
# display as 深美
# JP: 「ぁ――」
# 2209 = "「啊……」" 

# 【凪】
# display as 凪
# JP: 「ウチも、お芝居しただけばい！\n全部、ぜーんぶお芝居やけん、気にしちゃいけんよっ！」
2171 = "「咱就是演個戲！從頭到尾，全都是演戲，不要在意嘞！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん……」
# 2380 = "「小凪……」" 

# monologue
# JP: ゆっくり、ゆっくり、ふかみが頷く。
3597 = "深美緩緩地、緩緩地點了點頭。" 

# monologue
# JP: また泣きそうな顔になり――\nそれを無理やり、本当に無理やり笑顔で歪める。
3332 = "她再次露出一副泫然欲泣的神情……但她卻勉強地——非常勉強地將自己的臉扭出笑容。" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、お芝居、すごく上手になったんだねぇ。\nわたし――本気かと思って――びっくり、しちゃった」
2384 = "「小凪，你的戲演得很好嘛。我……還以為是真的呢，嚇了一跳」" 

# 【凪】
# display as 凪
# JP: 「えっへへー」
2276 = "「嘿嘿嘿」" 

# monologue
# JP: 凪はほっとしたようにはにかんで。\nそれから不意に、その目をふかみから外してしまう。
3208 = "凪像是鬆了一口氣一樣，靦腆地笑了。她一時不敢看向深美。" 

# 【凪】
# display as 凪
# JP: 「っていうかそれよりっ――ええと――ふかみちゃんを、\n試す、みたいな形になっちゃったとも――」
2699 = "「這個……呃……咱採取了這種像是在考驗你的做法……」" 

# 【ふかみ】
# display as 深美
# JP: 「ううん！？　いいの。そんなの全然。\nわたし、試されて当然の優柔不断さだったし、ずっと」
1977 = "「不！沒事，沒關係的。我一直這麼優柔寡斷，當然應該受考驗」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん」
2388 = "「小深」" 

# monologue
# JP: 凪からへにょりと力が抜ける。
3221 = "凪的身子忽然放鬆了。" 

# monologue
# JP: 僕らを思っての行動といえど、\nそれを受け止めてもらえるか――余程心配だったのだろう。
3336 = "她大概是為我們著想才這樣做的，不過看來她一直在擔心我們能不能接受她的做法。" 

# 【ふかみ】
# display as 深美
# JP: 「いいんだけど……その……\nええと、ね？　凪ちゃん」
2697 = "「這件事我是不介意的，但是……聽我說，小凪」" 

# 【凪】
# display as 凪
# JP: 「なにばい？　ふかみちゃん」
2000 = "「什麼啊，小深」" 

# 【ふかみ】
# display as 深美
# JP: 「あのっ――ええと……」
2151 = "「呃……這……」" 

# 【凪】
# display as 凪
# JP: 「あ！　わかったと！\nウチのお芝居の感想ば、伝えてくれたかとでしょー！」
2225 = "「啊！咱知道咧！是想告訴咱，咱演的戲怎麼樣吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！！！」
2232 = "「啊！！！」" 

# 【凪】
# display as 凪
# JP: 「ばってん、そいば照れちゃうけんね！\n胸にしまっといてほしかとよー」
2142 = "「可這太叫人害羞了，你就藏在心底別告訴咱啦」" 

# monologue
# JP: 笑っている。\n凪が、明るく、明るく――
3228 = "凪笑得很開朗，很開朗。" 

# monologue
# JP: いつもどおりの凪の笑顔を、装って。
3330 = "她假裝自己在和平時一樣笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2520 = "「是啊……」" 

# monologue
# JP: 許されるなら、抱きしめたい。\n凪の気が済むまで謝罪して、感謝して……
3362 = "如果可以的話，我真想抱住她。向她道歉，向她道謝，直到她願意接受為止……" 

# monologue
# JP: 頭を思い切り、ぐしゃぐしゃになるまで撫でてやりたい。\nけれどももう――そんなことをするのは、失礼だ。
3448 = "想用力撫摸她的腦袋。可是……事到如今再做這種事情，也有失禮節。" 

# 【凪】
# display as 凪
# JP: 「な、なんね？　にーさん」
2426 = "「怎麼、怎麼啦，大哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2651 = "「謝謝你」" 

# monologue
# JP: だから、ただ感謝だけを。\n凪に一番、似合う言葉を。
3509 = "所以，我只向她道謝。這是最適合向她說的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪のおかげで――僕とふかみは、向き合えた」
2645 = "「託你的福，我和深美終於能面對彼此的感情」" 

# 【凪】
# display as 凪
# JP: 「って、そんなんいうとは水臭かとばい！\nウチとふかみちゃんとにーさんは、友達やけん！」
2254 = "「喂，你這就太見外了吧！咱們不是朋友嗎！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 

# monologue
# JP: つくづく、感じる。\n初めて気づく。
3501 = "我還是第一次發現……" 

# monologue
# JP: 凪は、いつの間にこんなに見事に――
3087 = "不知何時，凪居然變得……" 

# 【双鉄】
# display as 雙鐵
# JP: 「有言実行だな。いつでも凪は」
2021 = "「你一直是個言出必行的人啊」" 

# 【凪】
# display as 凪
# JP: 「え？」
# 2245 = "「啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宣言どおり。\n実に鮮やかなレディーになった」
2650 = "「說到做到，你成了一個出色的淑女」" 

# 【凪】
# display as 凪
# JP: 「あ」
# 2213 = "「啊」" 

# monologue
# JP: 凪の、瞬き。\nぱちぱち、何度も。
3224 = "凪眨了眨眼。一次，又一次。" 

# monologue
# JP: その度ごとに凪の瞳に、\nさまざまな色が浮かんで消えていくような――
3474 = "我感覺，她的每次眨眼，眼裡都會浮現出各式各樣的顏色，然後又慢慢消失……" 

# 【凪】
# display as 凪
# JP: 「――うんっ！」
1514 = "「……嗯！」" 

# monologue
# JP: 凪が笑う。\n涙の色がかすかに混じる――けれど、本当の凪の笑顔で。
3225 = "凪笑了。儘管還有些眼淚盈眶……但這是發自內心的笑容。" 

# monologue
# JP: ただそれだけで僕らの間に、からりと明るい風が吹く。
3491 = "我覺得我們之間彷彿颳起了一陣清風，把一切憂愁苦恨都刮去了天邊。" 

# 【凪】
# display as 凪
# JP: 「凪さま！　世界一のレディーになれたとばいね！！」
2559 = "「本小姐終於成了世界第一淑女啦！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　すまんが――\nそこは、世界第二位で我慢してくれ」
1981 = "「不，很抱歉……你得屈居第二」" 

# 【凪】
# display as 凪
# JP: 「えええ？　それじゃあ、誰が世界一ばい？」
2194 = "「哎？那誰是第一？」" 

# monologue
# JP: 芝居がかって、凪が大きくあたりを見渡す。
3229 = "凪誇張地四下張望了一圈。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ。ご指名でしょうか？」
2154 = "「呵呵，有人叫我嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ってハチロクはもー！　私かもしれんでしょーよ！？」
2603 = "「真是的，八六！有可能是我呀！」" 

# monologue
# JP: ハチロクが、日々姫が、笑顔で道化を演じてくれる。\nああ、僕は――僕らは、なんという幸せ者だ。
3170 = "八六和日日姬笑著佯裝不知。啊，我……我們真是太幸福了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞きたいのなら、答えよう！」
2497 = "「既然你想聽，那我就告訴你！」" 

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
2149 = "「呀！」" 

# monologue
# JP: ふかみも笑顔に戻ってる。\n普段どおりの凪はふかみを、笑顔に戻した。
3574 = "深美也找回了笑容。是凪自然的態度，讓深美找回了笑容。" 

# monologue
# JP: ずっと、ずうっと変わらぬ構図が、\n僕の花嫁を、僕らをさらに輝かせる！
3328 = "她們就像一副永遠永遠也不會走樣的圖畫，讓我的新娘，讓我們兩個變得更加耀眼！" 

# 【双鉄】
# display as 雙鐵
# JP: 「世界一のレディーは」
1987 = "「世界第一的淑女……」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2216 = "「啊！」" 

# monologue
# JP: 思い切り抱きしめ、キスをする。\nそうしてふかみを、思いっきりに見せびらかす！
3488 = "我用力抱住深美，吻了下去，然後將她推在面前！" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の花嫁！　――右田ふかみだ！！」
2402 = "「就是我的新娘——右田深美！！」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんかー！\nそれなら凪さま、二位でよかばい！！」
2525 = "「是小深啊！那本小姐就只能做天下第二囉！！」" 

# 【ハチロク】
# display as 八六
# JP: 「おめでとうございます！　双鉄様、ふかみ」
2760 = "「雙鐵少爺，深美，恭喜兩位！」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ふかみちゃん、おめでとー！」
2749 = "「阿哥，小深，恭喜！」" 

# monologue
# JP: 客車から、れいなとポーレットも出てきてくれる。\n今まで様子を見守っていてくれたのだろう。
3620 = "玲奈和波萊特也從車廂裡走了出來。看來她們一直在暗中觀察。" 

# 【れいな】
# display as 玲奈
# JP: 「おめでとうですよぉ。\nれいな、まちくたびれちゃましたぁ」
2434 = "「恭喜。玲奈等這一天等好久了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おめでとう！　双鉄くん、ふかみちゃん！」
2436 = "「恭喜你們！雙鐵君，深美！」" 

# 【レポーター】
# display as 記者
# JP: 「いいドラマ見ちゃった！　おめでとう、おふたりさん」
2696 = "「這一幕真動人啊！恭喜兩位」" 

# monologue
# JP: 駅に居合わせた方々が、TVクルーの方々までもが、\n僕らに拍手を送ってくれる。
3443 = "恰好在車站裡的人們以及電視台的工作人員全都開始替我們鼓掌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2260 = "「嗯」" 

# monologue
# JP: 上空ではナビが、大きくゆったり旋回している。
3767 = "Ｎａｖｉ也正在天上緩慢地繞著大圈。" 

# monologue
# JP: ……きっとほどなく、真闇姉も、稀咲も、\n他のみんなも、ここに駆けつけてくれるだろう。
1482 = "……真闇姐、稀咲還有其他人肯定很快也會跑過來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。ありがとう。ありがとう」
2659 = "「謝謝，謝謝，謝謝」" 

# monologue
# JP: 伝えたいことは、それこそ山ほどあるはずなのに、\n今はもう、この言葉しか浮かんでこない。
3472 = "我想跟他們說的話，三天三夜也說不完。但現在我能想到的，只有這一個詞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
# 2580 = "「深美」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄、おにー……双鉄、さん。\n――あっ――」
2754 = "「雙鐵哥……雙鐵先生……啊……」" 

# monologue
# JP: ふかみが、そっと目をとじる。\n体を、僕にゆだねてくる。
3601 = "深美輕輕閉上眼睛，身體漸漸靠向了我。" 

# 【ふかみ】
# display as 深美
# JP: 「ちゅぅっ」
2252 = "「啾」" 

# monologue
# JP: だから、もう一度キスをして。\n言葉の時間を、終わらせる。
3507 = "所以我再次吻了下去。結束了彼此的談話。" 
