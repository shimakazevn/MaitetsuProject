# 【ふかみ】
# display as 深美
# JP: 「わたしが邪魔しちゃ、おかしい、し……それに、あ！\nそれに！　御一夜鉄道の広報にも関わることかもだし」
2451 = "「Mình xen vào thì kỳ lắm, với lại, a!\nVới lại! Cũng có thể liên quan đến việc quảng bá của Đường sắt Ohito nữa.」"
