3446 = "Nghĩ vậy thì mọi chuyện sáng tỏ hết luôn!"

# monologue
# JP: （ふかみちゃんは、つまり――にーさんとずっと一緒……きっと、にーさんのお嫁さんになりたかとばいね）
3760 = "（Nói cách khác, bé Fukami――muốn ở bên anh\nSoutetsu mãi mãi……chắc chắn là cậu ấy muốn\nlàm vợ anh ấy rồi.）"

# monologue
# JP: 修学旅行をずっと続けていけるんだったら、\nいつまでだって三人きっと仲良くしていけるばってん――
3361 = "Nếu chuyến đi dã ngoại cứ tiếp tục mãi,\nthì chắc chắn ba người sẽ mãi mãi thân\nthiết với nhau, nhưng――"

# monologue
# JP: お嫁さんは……にーさん、一人しか迎えられんけん。\nどっちかは、お嫁さんになれなくなっちゃうけん……
3126 = "Vợ thì……anh Soutetsu chỉ cưới được một\nngười thôi.\nMột trong hai sẽ không thể trở\nthành vợ anh ấy được……"

# 【双鉄】
# display as 雙鐵
# JP: 「凪？　いい考えとは？」
2089 = "「Nagi? Ý tưởng hay là gì vậy?」"

# 【凪】
# display as 凪
# JP: 「もーちょっと待つばい！　いま、大事なとこばい！！」
2065 = "「Đợi chút xíu nha! Bây giờ đang tới khúc\nquan trọng!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む、それはすまん」
2203 = "「Ừm, xin lỗi em.」"

# monologue
