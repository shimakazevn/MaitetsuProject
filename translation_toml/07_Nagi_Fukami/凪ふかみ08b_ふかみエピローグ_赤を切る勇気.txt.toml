3301 = "Anh hai làm vẻ mặt bối rối gãi gãi đầu.\nHiếm thấy nha!"
# monologue
# JP: にーさんのごぎゃんと仕草、凪さま、\n初めてみるよーな気がするばい！
3547 = "Cử chỉ này của anh hai, Nagi đại nhân,\nhình như mới thấy lần đầu luôn đó!"
# 【双鉄】
# display as 雙鐵
# JP: 「就学旅行の楽しさで、休めていると感じていたが――\n心はともかく体の方は、全く休めてなかったようだ」
2294 = "「Anh cứ nghĩ niềm vui của chuyến dã ngoại đã giúp anh nghỉ ngơi rồi――\nNhưng có vẻ tâm trí thì được thư giãn, còn cơ thể thì hoàn toàn không được nghỉ ngơi chút nào.」"
# 【凪】
# display as 凪
# JP: 「でしょお？　やけん！」
2515 = "「Đúng không? Vậy nên!」"
# 【ふかみ】
# display as 深美
# JP: 「はぅぅ～」
# 2257 = "「嗚……」" 
# 【凪】
# display as 凪
# JP: 「っ！！？」
2250 = "「!!?」"
# monologue
# JP: ふかみちゃんが、なんか泣きそうば声ば出しよる！\nそいば聞いたら――そんなん、聞いたら……
3407 = "Bé Fukami bỗng thốt ra một âm thanh như sắp khóc!\nNghe thấy vậy――nghe thấy âm thanh đó thì......"
# 【双鉄】
# display as 雙鐵
# JP: 「凪？」
2092 = "「Nagi?」"
# monologue
# JP: 修学旅行……ウチたちからやめる、っていったら、\nにーさんが傷ついちゃうかもしれんばい。
3357 = "Chuyến dã ngoại...... Nếu bọn em chủ động nói muốn dừng lại,\ncó thể anh hai sẽ bị tổn thương."
# monologue
# JP: そこんところは、にーさんに判断任せて――\nうん！　そのほうが絶対よかとね！！
3540 = "Chuyện đó, cứ để anh hai tự quyết định đi――\nỪm! Làm vậy chắc chắn là tốt nhất!!"
# 【双鉄】
# display as 雙鐵
# JP: 「凪？　どうかしたのか？」
2094 = "「Nagi? Em sao vậy?」"
# 【凪】
# display as 凪
# JP: 「どーもせんばい！　どーかしたのはにーさんばい！\nやけん休まんといけんでしょおよ」
2565 = "「Em chẳng sao hết! Người có sao là anh hai kìa!\nNên anh phải nghỉ ngơi mới được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃぁん」
2381 = "「Nagiiii.」"
# monologue
# JP: ふかみちゃんの甘ったれた声。\n大丈夫やけん！　って、ウィンクば飛ばす。
3400 = "Giọng nói nũng nịu của bé Fukami.\nKhông sao đâu! Em nháy mắt một cái."
# monologue
# JP: ふかみちゃんは凄かばってん、頼りなかけん！\nウチが代わってあげられることは、代わったげるけんね！
3394 = "Bé Fukami tuy giỏi giang nhưng lại không đáng tin cậy!\nViệc gì em làm thay được, em sẽ làm thay cho!"
# 【凪】
# display as 凪
# JP: 「ばってんお仕事山盛りだし、どーやったってにーさん、\nいまよりお休み増やせんでしょお？」
2136 = "「Nhưng công việc thì chất cao như núi, dù có làm thế nào đi nữa,\nanh hai cũng đâu thể tăng thêm ngày nghỉ so với bây giờ được đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうだな。乗務だけでなく、訓練もあるし……\n保線や、路線延伸について任される部分も増加している」
2268 = "「Chà, đúng là vậy. Không chỉ làm nhiệm vụ trên tàu, còn phải huấn luyện nữa......\nCông việc bảo trì đường ray và những phần được giao liên quan đến việc mở rộng tuyến cũng đang tăng lên.」"
# monologue
# JP: じ……って、\nにーさん、目ばとじよる。
3318 = "Im lìm......\nAnh hai nhắm mắt lại."
# monologue
# JP: 考えるまでもなかことのよーな気はするばってん、\nこぎゃんともちゃんと考えるのも、良かとこばい！
3290 = "Tuy em thấy chuyện này chẳng cần phải nghĩ ngợi gì nhiều,\nnhưng việc anh ấy suy nghĩ nghiêm túc như vậy cũng là một điểm tốt!"
# 【双鉄】
# display as 雙鐵
# JP: 「……絶対的な職員数の不足もある。\nやはり、公休の日数の増加という方向性は、ありえんな」
1531 = "「......Cũng có sự thiếu hụt nhân sự tuyệt đối nữa.\nQuả nhiên, hướng đi tăng số ngày nghỉ phép là không thể nào.」"
# 【凪】
# display as 凪
# JP: 「したら、『今あるお休みに、しっかり休む』\nよーにせんといけんね、っていう話になるばい」
2740 = "「Vậy thì, chuyện sẽ thành ra là phải làm sao để\n『Nghỉ ngơi thật đàng hoàng trong những ngày nghỉ hiện có』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2376 = "「Đúng vậy.」"
# 【凪】
# display as 凪
# JP: 「ばってん、修学旅行。……えと、今の――感じ？　で\nやっとったら、にーさん、少しも休めんでしょお」
2014 = "「Nhưng mà, chuyến dã ngoại. ......À ừm, với cái――kiểu? như bây giờ,\nmà cứ tiếp tục thì anh hai chẳng được nghỉ ngơi chút nào đâu.」"
# 【ふかみ】
# display as 深美＆雙鐵
# JP: 「あ」\n「なるほどな」
2214 = "「A.」\n「Ra là vậy.」"
# monologue
# JP: ふかみちゃんのほっとした声、\nありがとおって、目でいうとる。
3384 = "Giọng nói thở phào nhẹ nhõm của bé Fukami,\nánh mắt chị ấy như đang nói lời cảm ơn."
# monologue
# JP: ならやっぱり、やめるのやめんのを決めるのは、\nにーさんに任せた方がよかとばいね！
3626 = "Vậy thì quả nhiên, việc quyết định dừng hay không dừng,\ncứ giao cho anh hai là tốt nhất!"
# 【凪】
# display as 凪
# JP: 「やっけーん！　修学旅行の――そう！　時間割り！\n時間割り変えたりして、にーさんが休めるように、って」
2488 = "「Nên là! Chuyến dã ngoại――Đúng rồi! Thời gian biểu!\nBọn em định thay đổi thời gian biểu, để anh hai có thể nghỉ ngơi.」"
# 【ふかみ】
# display as 深美
# JP: 「話あったんです。わたしたち。双鉄おにいさんが、\nどういう風に決めてもそれにしたがおう、って」
2457 = "「Bọn em đã bàn bạc với nhau rồi. Rằng dù anh Soutetsu\ncó quyết định thế nào, bọn em cũng sẽ nghe theo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2523 = "「Vậy sao.」"
# monologue
# JP: ふかみちゃんの声に元気ばもどってるし、\nにーさんの頷く顔も明るか！
3404 = "Giọng nói của bé Fukami đã vui vẻ trở lại,\nkhoôn mặt anh hai khi gật đầu cũng rạng rỡ hẳn lên!"
# monologue
# JP: ならやっぱり、これで間違いなかったとねー！
3720 = "Vậy thì quả nhiên, làm thế này là không sai vào đâu được!"
# 【双鉄】
# display as 雙鐵
# JP: 「親身になって考えてくれて、ありがとう。\nふかみにも、凪にも心配をかけてしまったな」
2652 = "「Cảm ơn hai em đã suy nghĩ cho anh.\nAnh đã làm Fukami và Nagi phải lo lắng rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「いえ、そんなっ」
1984 = "「Dạ không, đâu có ạ.」"
# monologue
# JP: 修学旅行、ふかみちゃんよっぽど続けたかったとねー。\nにーさんにほめてもらって、溶けそうな顔しとるばい！
3395 = "Bé Fukami chắc hẳn muốn tiếp tục chuyến dã ngoại lắm đây.\nĐược anh hai khen một cái là mặt mũi như tan chảy ra luôn!"
# 【双鉄】
# display as 雙鐵
# JP: 「しかしそうか。時間割か。現状は、『ふかみと二人で』\n『凪と二人で』『三人で』のローテーションだが――」
1974 = "「Nhưng mà ra vậy. Thời gian biểu sao. Hiện tại là xoay vòng 『Hai người với Fukami』,\n『Hai người với Nagi』, 『Cả ba người』――」"
# 【ふかみ】
# display as 深美
# JP: 「おやすみ合わせられるの、一週間に一回……ですよね。たぶん、だいたい、平均にならすと」
2019 = "「Chúng ta sắp xếp được ngày nghỉ chung, một tuần một lần...... đúng không ạ. Chắc là, đại khái, tính trung bình ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あまりペースを気にしたこともなかったが……\nいわれてみるとその程度な気が――ああ！」
2466 = "「Anh cũng không để ý đến tần suất lắm nhưng......\nNghe em nói mới thấy có vẻ là vậy――A!」"
# monologue
# JP: ぽんって、にーさんが手ば打ち合わせる。
3309 = "Bốp một tiếng, anh hai vỗ hai tay vào nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「では、一ヶ月に一回は完全休養を取ることにして」
2738 = "「Vậy thì, quyết định mỗi tháng anh sẽ nghỉ ngơi hoàn toàn một lần nhé.」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「あっ！」「少なすぎばい！\nそれじゃまた同じこと起きるとよ！！」
2219 = "「A!」「Ít quá đi!\nNhư thế thì chuyện tương tự lại xảy ra cho xem!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2199 = "「Hừm.」"
# 【ふかみ】
# display as 深美
# JP: 「ぁぅ」
2213 = "「Au.」"
# 【凪】
# display as 凪
# JP: 「休みのペースば気にしとらんって、\nそぎゃんとが、もう最初からおかしかとよ」
2314 = "「Việc anh không để ý đến tần suất nghỉ ngơi,\nngay từ đầu đã là không ổn rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ！」
2216 = "「Hau!」"
# monologue
# JP: 今気がついたって言う感じに、\nふかみちゃんがこくこくこくこく何度も頷く。
3398 = "Như thể bây giờ mới nhận ra,\nbé Fukami gật đầu lia lịa liên tục."
# monologue
# JP: 労働環境とかそぎゃんこと、うち、ふかみちゃんが\nいつも気にしとるから、気にするよーになったとに……
3243 = "Mấy chuyện như môi trường lao động này nọ, là do bé Fukami\nlúc nào cũng để ý, nên em mới bắt đầu để ý theo đấy chứ......"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2548 = "「Là vậy sao?」"
# 【凪】
# display as 凪
# JP: 「……にーさん、\n日曜日がどーしてあるか、知っとーと？」
1518 = "「......Anh hai,\nanh có biết tại sao lại có ngày Chủ nhật không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「考えたこともないな」
2440 = "「Anh chưa từng nghĩ đến chuyện đó.」"
# 【凪】
# display as 凪
# JP: 「日曜日ば、『週に一度は休みなさい』って意味ばい！\nその半分は、まぁ遊びにいったりするにしたって――」
2507 = "「Ngày Chủ nhật, mang ý nghĩa là 『Mỗi tuần hãy nghỉ ngơi một lần』 đấy!\nDù cho một nửa thời gian đó là để đi chơi đi chăng nữa――」"
# 【ふかみ】
# display as 深美
# JP: 「月、二回。……そのくらいは完全休養がないと。\nわたしもやっぱり、体、危ないって思います」
1956 = "「Một tháng, hai lần. ......Ít nhất phải có ngần ấy thời gian nghỉ ngơi hoàn toàn.\nEm cũng nghĩ, cơ thể anh sẽ gặp nguy hiểm mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それほど休まねばならぬものか」
2465 = "「Phải nghỉ ngơi nhiều đến thế sao.」"
# monologue
# JP: よかったばい！
3325 = "Tốt quá rồi!"
# monologue
# JP: ふかみちゃんもわかってくれたら、\n凪さま、怖いものなかとばい！！
3524 = "Nếu bé Fukami cũng đã hiểu ra,\nthì Nagi đại nhân đây chẳng còn sợ gì nữa!!"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それをいったら凪やふかみも、\n恐らくは、三週に一回しか完全休養を――」
2140 = "「Nhưng mà, nếu nói vậy thì Nagi và Fukami,\ncó lẽ cũng chỉ được nghỉ ngơi hoàn toàn một lần mỗi ba tuần――」"
# 【凪】
# display as 凪
# JP: 「凪さまたち学園生やけんね！　通学中とか授業中とか、\n居眠りする時間はたくさんあるばい！！」
2169 = "「Bọn em là học sinh mà! Lúc đi học hay trong giờ học,\ncó đầy thời gian để ngủ gật!!」"
# 【ふかみ】
# display as 深美
# JP: 「わ！　わたしは、授業中寝てたりとか、してない、です。\n……通学の間は、たしかに、うとうとってしますけど」
2447 = "「Oa! Em thì, không có ngủ gật trong giờ học đâu, ạ.\n......Nhưng lúc đi học thì, đúng là có ngủ gật thật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ふたりもそれぞれ、工夫をしながら休みを\n取っていたのだな。……自分の不摂生が恥ずかしくなる」
2505 = "「Ra vậy. Hai em cũng tự có cách riêng để\nnghỉ ngơi nhỉ. ......Anh thấy xấu hổ vì sự thiếu chăm sóc bản thân của mình quá.」"
# monologue
# JP: にーさんがこっくり頷く。\nほっとして、ふかみちゃんと目ばみあわせちゃう。
3322 = "Anh hai gật đầu cái rụp.\nEm thở phào nhẹ nhõm, nhìn nhau với bé Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「自覚した。学習できた。僕の場合は――\n意識的に、規則的に休みを取らねばならんのだな」
2592 = "「Anh tự giác rồi. Anh đã học được bài học rồi. Trong trường hợp của anh――\nAnh phải có ý thức nghỉ ngơi một cách có quy tắc.」"
# 【ふかみ】
# display as 深美
# JP: 「そう、かもです。\n双鉄おにいさん、働くの、凄く好きみたいだし」
2478 = "「Có lẽ, là vậy ạ.\nVì anh Soutetsu có vẻ rất thích làm việc mà.」"
# 【凪】
# display as 凪
# JP: 「修学旅行で、にーさんは遊ぶ楽しさを覚えたけん！\n次は、休む楽しさ、めいっぱい覚えればよかとばい！」
2317 = "「Qua chuyến dã ngoại, anh hai đã biết được niềm vui khi đi chơi rồi!\nTiếp theo, anh cứ học cách tận hưởng niềm vui khi nghỉ ngơi là được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ならば――うむ。修学旅行の一行程をとったら、\nその次は完全休養、というペースでよいか」
2341 = "「Đúng vậy. Nếu thế thì――ừm. Sau một chuyến dã ngoại,\nlần tiếp theo sẽ là nghỉ ngơi hoàn toàn, với tần suất như vậy được không?」"
# 【凪】
# display as 凪＆深美
# JP: 「そぎゃんとが」\n「はぅぅ～～っ」
2405 = "「Là vậy đó」\n「Hauuu～～っ」"
# 【凪】
# display as 凪
# JP: 「ほえ？」
2187 = "「Hả?」"
# monologue
# JP: 休みの大事さ、過労の怖さ。\nふかみちゃん、よーく知っとるはずなのに――
3396 = "Tầm quan trọng của việc nghỉ ngơi, sự đáng sợ của việc làm việc quá sức.\nĐáng lẽ bé Fukami phải biết rất rõ chứ――"
# monologue
# JP: なんでか悲鳴みたいな声ばあげて、\n青い顔して、ほっそい指ば折りはじめよる。
3124 = "Sao cậu ấy lại phát ra tiếng kêu như tiếng hét,\nmặt tái mét và bắt đầu bẻ bẻ mấy ngón tay thon thả vậy."
# 【ふかみ】
# display as 深美
# JP: 「そしたら、そのペースだと……六週間に一回、しか――\n双鉄おにいさんと、二人きりで過ごすの……それ、だけ」
2741 = "「Nếu vậy, với tiến độ đó thì......sáu tuần mới được một lần, thôi sao――\nĐược ở riêng với......anh Soutetsu......chỉ chừng đó, thôi ạ.」"
# monologue
# JP: ちらって、ふかみちゃん、にーさんを見る。
3405 = "Bé Fukami liếc nhìn anh Soutetsu."
# monologue
# JP: なんか、ちょっと泣きそうな、でもとっても綺麗な――\nさっき『夫婦みたい』って思ったときとおんなじ目――！
3629 = "Trông có vẻ như sắp khóc, nhưng lại vô cùng xinh đẹp――\nĐó là ánh mắt y hệt như lúc nãy khi mình nghĩ 'như vợ chồng vậy'――!"
# 【凪】
# display as 凪
# JP: 「あ！」
# 2216 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　凪！？」
2036 = "「Sao vậy? Nagi!?」"
# 【凪】
# display as 凪
# JP: 「なんでもなかばい！　じゃなくて！　えと！　\n思いついたとばい！　良かこと！　良か考えっ！！」
2564 = "「Không có gì đâu! À không phải! Ừm!\nEm nghĩ ra rồi! Một chuyện rất hay! Một ý tưởng rất tuyệt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、それは楽しみだ」
2283 = "「Ồ, đáng mong đợi đây.」"
# monologue
# JP: わかったばい！　わかったとばい！\n労働なんちゃら法とかにもすっごく詳しいふかみちゃんが。
3287 = "Mình hiểu rồi! Mình hiểu rồi!\nBé Fukami, người rất rành về Luật lao động gì gì đó."
# monologue
# JP: うちの修行のあととかに、レモンやらマッサージやらで、\n休養休養回復回復っていってくれる、あのふかみちゃんが。
3339 = "Bé Fukami, người luôn bảo phải nghỉ ngơi nghỉ ngơi, phục hồi phục hồi\nbằng chanh và massage sau khi mình tu hành xong."
# monologue
# JP: （にーさんと一秒でも長く過ごしたくって――そのせいで、\nにーさんの休養のこと、頭から抜け落ちちゃたとね！？）
3765 = "（Cậu ấy muốn được ở bên anh Soutetsu dù chỉ lâu hơn một giây――chính vì thế,\nmà quên bẵng đi chuyện nghỉ ngơi của anh ấy sao!?）"
# monologue
# JP: そう考えたら、全部いっぺんにスッキリするばい！
3446 = "Nghĩ vậy thì mọi chuyện sáng tỏ hết luôn!"
# monologue
# JP: （ふかみちゃんは、つまり――にーさんとずっと一緒……きっと、にーさんのお嫁さんになりたかとばいね）
3760 = "（Nói cách khác, bé Fukami――muốn ở bên anh Soutetsu mãi mãi......chắc chắn là cậu ấy muốn làm vợ anh ấy rồi.）"
# monologue
# JP: 修学旅行をずっと続けていけるんだったら、\nいつまでだって三人きっと仲良くしていけるばってん――
3361 = "Nếu chuyến đi dã ngoại cứ tiếp tục mãi,\nthì chắc chắn ba người sẽ mãi mãi thân thiết với nhau, nhưng――"
# monologue
# JP: お嫁さんは……にーさん、一人しか迎えられんけん。\nどっちかは、お嫁さんになれなくなっちゃうけん……
3126 = "Vợ thì......anh Soutetsu chỉ cưới được một người thôi.\nMột trong hai sẽ không thể trở thành vợ anh ấy được......"
# 【双鉄】
# display as 雙鐵
# JP: 「凪？　いい考えとは？」
2089 = "「Nagi? Ý tưởng hay là gì vậy?」"
# 【凪】
# display as 凪
# JP: 「もーちょっと待つばい！　いま、大事なとこばい！！」
2065 = "「Đợi chút xíu nha! Bây giờ đang tới khúc quan trọng!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む、それはすまん」
2203 = "「Ừm, xin lỗi em.」"
# monologue
# JP: ウチは……にーさんといると楽しかけど。\nやたらめったらに楽しかばってん――
3276 = "Mình thì......ở bên anh Soutetsu cũng vui lắm.\nVui vô cùng tận luôn, nhưng――"
# monologue
# JP: 結婚とかはまだ全然、しっかりはっきり考えられんし……\nうん！　ふたりでそんなに会わんでも――平気ばい！！
3127 = "Chuyện kết hôn thì mình vẫn chưa hề nghĩ tới một cách nghiêm túc rõ ràng......\nỪm! Dù hai người không gặp nhau nhiều đến thế――cũng không sao!!"
# 【凪】
# display as 凪
# JP: 「わかったとばい！　さすが凪さま、天才ばい！！」
2173 = "「Em hiểu rồi! Quả không hổ danh Nagi, đúng là thiên tài mà!!」"
# 【ふかみ】
# display as 深美
# JP: 「って、凪ちゃん、なにが……わかっちゃったの？」
2473 = "「Khoan đã, Nagi, cậu......hiểu ra chuyện gì cơ?」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと不安そーな声ばださんでもよかとよ！\n凪さまのアイディアば、カンペキやけんね！！」
1971 = "「Cậu không cần phải phát ra cái giọng bất an như vậy đâu!\nÝ tưởng của Nagi là hoàn hảo đó nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どんなアイディアだ」
2001 = "「Ý tưởng gì thế?」"
# 【凪】
# display as 凪
# JP: 「凪さまとにーさんが二人であうときって、\n結構剣術修行とかが多かったでしょお？」
2313 = "「Những lúc Nagi và anh Soutetsu gặp riêng,\nkhá nhiều lần là tu hành kiếm thuật đúng không nè?」"
# 【双鉄】
# display as 雙鐵
# JP: 「多くはあったな。\n無論、そればかりでもなかったが」
2610 = "「Đúng là nhiều thật.\nTất nhiên, không phải lúc nào cũng vậy.」"
# 【凪】
# display as 凪
# JP: 「！」
# 2216 = "「啊！」" 
# monologue
# JP: にーさん、そういうこというの良くなかとばい！\nふたりで一緒に買い物いったり、水遊びしたり――
3323 = "Anh Soutetsu, nói vậy là không được đâu nha!\nHai đứa mình từng đi mua sắm cùng nhau, chơi đùa dưới nước――"
# monologue
# JP: そぎゃんとが、楽しくて楽しくて、\nドキドキしてうれしかったの、思い出しちゃうけん。
3148 = "Những lúc đó, vui lắm vui lắm luôn,\nnhớ lại thôi cũng thấy hồi hộp sung sướng rồi."
# 【凪】
# display as 凪
# JP: 「やけん、ね」
2484 = "「Bởi vậy, nên là」"
# monologue
# JP: けど。平気。
3135 = "Nhưng mà. Không sao đâu."
# monologue
# JP: ふかみちゃんの方がウチよりきっと、\nにーさんのこと、大好きやけん。
3390 = "Bé Fukami chắc chắn là\nthích anh Soutetsu nhiều hơn mình."
# 【凪】
# display as 凪
# JP: 「まず――」
2768 = "「Trước tiên――」"
# monologue
# JP: 言葉が、なんでかひっかかりよるけど、\nそいでも、平気。
3088 = "Không hiểu sao lời nói cứ nghẹn lại,\nnhưng dù vậy, vẫn không sao."
# monologue
# JP: うちはにーさんのことも大好きだけど、\nふかみちゃんのことも、大好きやけんね！
3722 = "Mình rất thích anh Soutetsu,\nnhưng cũng rất thích bé Fukami nữa!"
# 【凪】
# display as 凪
# JP: 「まず、うちと二人でおでかけしとった時間ばなくして、\nそいば、三人ですごす時間にふりかえるばい！」
2770 = "「Trước tiên, bỏ thời gian đi chơi riêng của em đi,\nvà chuyển thành thời gian ba người cùng đi chơi!」"
# 【ふかみ】
# display as 深美＆雙鐵
# JP: 「凪ちゃん！？」\n「ふむ……」
2386 = "「Nagi!?」\n「Hừm......」"
# 【凪】
# display as 凪
# JP: 「剣術修行ば、ふかみちゃんもいてくれた方が楽しいし！\n買い物とかも、ふかみちゃんの目があれば助かるけん！」
2103 = "「Tu hành kiếm thuật có bé Fukami thì vui hơn!\nĐi mua sắm mà có mắt thẩm mỹ của bé Fukami thì cũng đỡ lắm đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かる？」
2551 = "「Đỡ lắm sao?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　なんていっても凪さまこれから、\nどんどんレディーになってくけんね！」
2517 = "「Đúng vậy! Dù sao thì từ giờ trở đi,\nNagi cũng sẽ dần trở thành một quý cô mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2260 = "「嗯」" 
# monologue
# JP: 納得、っていう顔ばして、\nにこーって、にーさん、ふかみちゃんのことば見る。
3321 = "Ra vẻ đã hiểu,\nanh Soutetsu mỉm cười nhìn bé Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、ふかみはおしゃれや身だしなみなどの、\nひとつの手本になってくれそうだな」
2611 = "「Quả thật, Fukami có vẻ sẽ là một tấm gương tốt\nvề gu ăn mặc và diện mạo đấy.」"
# 【凪】
# display as 凪
# JP: 「！」
# 2216 = "「啊！」" 
# monologue
# JP: いまのは――ちょっと、ズキって来たばい。
3238 = "Lời vừa rồi――làm mình hơi nhói một chút."
# monologue
# JP: ふかみちゃん……の、マネッコみたいには。\nきっと、ウチ、なりたくなかけん。
3274 = "Chắc chắn mình không muốn\ntrở thành bản sao......của bé Fukami đâu."
# 【ふかみ】
# display as 深美
# JP: 「…………」
1500 = "「............」"
# monologue
# JP: ……ああ、そぎゃんとよ。うちがレディーになりたかとは、にーさんに、見てもらいたいから……だったばいねー。
1476 = "......A, đúng rồi. Lý do mình muốn trở thành một quý cô, là vì muốn được anh Soutetsu chú ý tới......mà nhỉ."
# monologue
# JP: （ばってん――ウチは、凪さまやけんっ！）
3748 = "（Nhưng mà――mình là Nagi cơ mà!）"
# monologue
# JP: やけん、平気。ウチは、ふかみちゃんより強かけん。\nふかみちゃんに出来んこと、代わってあげられるけん！
3565 = "Thế nên, không sao đâu. Mình mạnh mẽ hơn bé Fukami mà.\nNhững chuyện bé Fukami không làm được, mình có thể làm thay!"
# 【凪】
# display as 凪
# JP: 「そしたら、今までの『三人でおでかけ』だった日ば、\nまるっとお休みにかえられるでしょお？」
2704 = "「Vậy thì, những ngày 'ba người đi chơi' từ trước đến nay,\nsẽ được chuyển toàn bộ thành ngày nghỉ đúng không nè?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「で、もう一週のおやすみは、今までのローテーションに、\nそのままぽこーんて足せばよかとよ！」
2588 = "「Rồi ngày nghỉ của tuần còn lại,\ncứ thế bùm một cái thêm vào lịch luân phiên từ trước đến nay là được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。つまり――四週を、『ふかみとふたり』『休養』、\n『三人で』『休養』と、配分していく感じになるのか」
2201 = "「Hừm. Tức là――bốn tuần sẽ được phân bổ thành 'hai người với Fukami', 'nghỉ ngơi',\n'ba người', 'nghỉ ngơi', kiểu vậy sao.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんとね！　それならにーさん、\nきっと無理なく、遊びも休みも楽しめるばい！！」
2379 = "「Đúng vậy đó! Như thế thì anh Soutetsu\nchắc chắn sẽ không bị quá sức, vừa được chơi vừa được nghỉ ngơi!!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっっ！！」
2382 = "「Nagi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
2204 = "「Hửm!?」"
# 【凪】
# display as 凪
# JP: 「ふかみ……ちゃん？」
2399 = "「Bé......Fukami?」"
# monologue
# JP: ふかみちゃん、いままで見たこと無い顔しとる。
3411 = "Bé Fukami đang mang một vẻ mặt mà mình chưa từng thấy bao giờ."
# monologue
# JP: 寂しそうで、辛そうで、怒ったみたいで、悲しげで――\nなのに、とっても静かな顔。
3347 = "Trông cô đơn, đau khổ, có vẻ tức giận, buồn bã――\nNhưng lại là một khuôn mặt rất tĩnh lặng."
# 【ふかみ】
# display as 深美
# JP: 「それなら、確かに。確かに双鉄おにいさん休めるし、\nわたしも、すごく、嬉しいけど――でもっ！」
2540 = "「Nếu vậy thì, đúng là. Đúng là anh Soutetsu có thể nghỉ ngơi,\nmình cũng, rất, vui――nhưng mà!」"
# 【凪】
# display as 凪
# JP: 「そいなら、ウチも嬉しかとよー！　\nやけん、これでよかとばい！」
2703 = "「Nếu vậy thì, mình cũng vui lắm đó!\nBởi vậy, cứ quyết định thế đi!」"
# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 2216 = "「啊！」" 
# monologue
# JP: うちは、にーさんが大好きで。\nうちは、ふかみちゃんが大好きで。
3289 = "Mình rất thích anh Soutetsu.\nMình rất thích bé Fukami."
# monologue
# JP: ほいでもって、ふかみちゃんがしあわせで、\nにーさんも、しっかり休めるんなら、万々歳やけんね！
3721 = "Thêm vào đó, nếu bé Fukami được hạnh phúc,\nvà anh Soutetsu cũng được nghỉ ngơi đàng hoàng, thì vẹn cả đôi đường rồi!"
# 【凪】
# display as 凪
# JP: 「あー……でも」
2210 = "「A......nhưng mà」"
# 【ふかみ】
# display as 深美
# JP: 「なあにっ！？　凪ちゃん」
2427 = "「Sao vậy!? Nagi」"
# monologue
# JP: 月に一度しかにーさんと遊べんの、\nちょこっと、結構さみしかと……かも――
3359 = "Một tháng chỉ được đi chơi với anh Soutetsu một lần,\nhơi, khá là buồn......chăng――"
# monologue
# JP: ばってん、ウチはふかみちゃんと違って、\n乗務でもいっつも、にーさんと一緒にいれるはいれるし。
3130 = "Cơ mà, mình khác với bé Fukami,\nlúc làm nhiệm vụ lúc nào cũng được ở bên anh Soutetsu mà."
# 【双鉄】
# display as 雙鐵
# JP: 「あー。その、だな？」
2241 = "「A. Chuyện đó, ừm?」"
# 【凪】
# display as 凪＆深美
# JP: 「なんね！？　にーさん」\n「どうしました、双鉄おにーさん！？」
2428 = "「Sao vậy!? Anh Soutetsu」\n「Có chuyện gì sao, anh Soutetsu!?」"
# monologue
# JP: ふたりして、おんなじタイミングで言って。\nふかみちゃんと目と目ばあって――
3282 = "Hai đứa đồng thanh nói cùng một lúc.\nRồi chạm mắt với bé Fukami――"
# 【凪】
# display as 凪＆深美
# JP: 「ぷっ」\n「あはっ！」
2277 = "「Phụt」\n「A ha!」"
# monologue
# JP: それがおかしくって吹き出したら、\nなんだか気分ば、軽くなる。
3661 = "Buồn cười quá nên phì cười,\ntự nhiên thấy tâm trạng nhẹ nhõm hẳn."
# monologue
# JP: こぎゃんとたくさん考えるなんて、めったになかけんね！頭ぷしゅーだし、もうあとは、なるようでよかばい！
3284 = "Hiếm khi mình phải nghĩ ngợi nhiều thế này lắm nha! Đau đầu quá, chuyện sau này cứ để thuận theo tự nhiên đi!"
# 【双鉄】
# display as 雙鐵
# JP: 「その……月に二日もいきなり全休と放り出されて。\n片方はまぁ熟睡で休むにしても、もう片方が――」
2472 = "「Ừm......đột nhiên một tháng được nghỉ trọn hai ngày.\nMột ngày thì ngủ say sưa để nghỉ ngơi đi, còn ngày kia――」"
# 【凪】
# display as 凪
# JP: 「あー、にーさん、休み方……寝る他にしらんと？\nだらだらだら～って、したことなかと？」
2239 = "「A, anh Soutetsu, cách nghỉ ngơi......anh không biết gì ngoài ngủ sao?\nChưa từng thử kiểu lười biếng thảnh thơi~ bao giờ à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ない、な。体力的な回復も早い方だと思っていたし、\nだらだらするなら、何か身になることをした方が、と」
2569 = "「Không có. Anh nghĩ mình phục hồi thể lực khá nhanh,\nnếu cứ lười biếng thì thà làm gì đó có ích cho bản thân còn hơn.」"
# 【ふかみ】
# display as 深美
# JP: 「ダメです！　そんなの！！」
2700 = "「Không được đâu! Như thế!!」"
# 【双鉄】
# display as 雙鐵＆凪
# JP: 「むっ！？」\n「わ」
2205 = "「Hửm!?」\n「Oa」"
# monologue
# JP: ふかみちゃん、凄いおっきな声ばい！\nでも、なんでだか――ウチにもわかると。
3386 = "Bé Fukami nói to ghê!\nNhưng mà, không hiểu sao――mình cũng hiểu được."
# monologue
# JP: にーさんが休みそびれて、日々ねーちゃんやら\nハチロクやらのお手伝いしとったら、意味なかけんね。
3667 = "Nếu anh Soutetsu bỏ lỡ dịp nghỉ ngơi, lại đi giúp đỡ\nchị Hibiki hay Hachiroku thì đâu còn ý nghĩa gì nữa."
# 【ふかみ】
# display as 深美
# JP: 「それなら、わたし――わたしと凪ちゃんで！\nダラダラの仕方、教えます！　ね？　凪ちゃんっ」
2501 = "「Nếu vậy thì, em――em và Nagi sẽ!\nDạy anh cách lười biếng thảnh thơi! Nhé? Nagi」"
# 【凪】
# display as 凪
# JP: 「にーさんとふかみちゃんが良かとなら！\nウチもそいば、大歓迎ばい！！」
2029 = "「Nếu anh Soutetsu và bé Fukami thấy được!\nThì mình cũng rất hoan nghênh!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「上質の休み方を教えてもらえるならありがたいし、\nそれもそれで楽しげだ。僕も、大歓迎だ」
2032 = "「Được chỉ cho cách nghỉ ngơi chất lượng thì thật biết ơn,\nnghe cũng thú vị đấy. Anh cũng rất hoan nghênh.」"
# 【ふかみ】
# display as 深美
# JP: 「よかった！　ね？　凪ちゃん」
2332 = "「May quá! Nhỉ? Nagi」"
# 【凪】
# display as 凪
# JP: 「うん！　まっことよかったばい！」
2262 = "「Ừm! Thật sự rất tuyệt!」"
# monologue
# JP: ……にーさんと二人で遊べんよーになったのは、\nちょこっとやっぱり寂しかばってん――
1486 = "......Không được đi chơi riêng hai người với anh Soutetsu nữa,\nquả thực cũng hơi buồn một chút――"
# monologue
# JP: ふかみちゃんもにーさんもニコニコしとるし、\nこいばこいで、きっと一番よかやりかたばい！！
3132 = "Bé Fukami và anh Soutetsu đều cười rạng rỡ,\nthế này chắc chắn là cách tốt nhất rồi!!"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、『ふかみと』『全休』『三人で』\nそして『三人でだらだら』で、当面は回してみよう」
2742 = "「Vậy thì, 'với Fukami', 'nghỉ trọn ngày', 'ba người',\nvà 'ba người lười biếng', tạm thời cứ xoay vòng như thế nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！」
2535 = "「Vâng! Ạ!!」"
# 【凪】
# display as 凪
# JP: 「わかったばーい！」
2339 = "「Đã rõ!」"
# monologue
# JP: これでスッキリ！！　したはずばってん、\nなんだか急に、目の奥が熱くなるけん、目ば閉じる。
3711 = "Thế là giải quyết xong!! Đáng lẽ là vậy,\nnhưng không hiểu sao khóe mắt đột nhiên nóng lên, mình đành nhắm mắt lại."
# monologue
# JP: (にーさんはふかみちゃんのことが好きで、ウチも好き。\nふかみちゃんはにーさんが好きで、ウチのことも好き)
3756 = "(Anh Soutetsu thích bé Fukami, và cũng thích mình.\nBé Fukami thích anh Soutetsu, và cũng thích mình)"
# monologue
# JP: うちもふかみちゃんもにーさんも、好き。\nけど、その『好き』は、きっと、ちょっとずつ、違う。
3278 = "Mình, bé Fukami và anh Soutetsu đều thích nhau.\nNhưng chữ 'thích' đó, chắc chắn, mỗi người lại khác nhau một chút."
# monologue
# JP: （ふかみちゃんのにーさんへの『好き』は、絶対に、\nおよめさんになりたいっていう意味の、好き――で）
3762 = "（Chữ 'thích' của bé Fukami dành cho anh Soutetsu, tuyệt đối là\nchữ thích mang ý nghĩa muốn trở thành vợ anh ấy――）"
# monologue
# JP: ばってん、うちのにーさんへの好きは――うん。\nたぶん、まだ、結婚とかとは、全然つながっとらんばい。
3140 = "Cơ mà, chữ thích của mình dành cho anh Soutetsu――ừm.\nCó lẽ, vẫn chưa, hoàn toàn liên quan đến chuyện kết hôn đâu."
# monologue
# JP: ふかみちゃんとにーさんで幸せになって欲しいって――\nウチが結婚したかとだったら、きっと素直に思えんけん！
3364 = "Muốn bé Fukami và anh Soutetsu được hạnh phúc――\nNếu mình muốn kết hôn với anh ấy, chắc chắn sẽ không thể ngoan ngoãn nghĩ như vậy được!"
# 【凪】
# display as 凪
# JP: 「やけん。うん。\n初恋なんかじゃ――なかったと！」
2486 = "「Bởi vậy. Ừm.\nChẳng phải là――tình đầu gì đâu!」"
# 【ふかみ】
# display as 深美
# JP: 「車掌業務で一番むつかしいこと。ですか――」
2095 = "「Điều khó khăn nhất trong nghiệp vụ \\x%l車掌;#00ffc040;trưởng tàu%l;#;. Phải không ạ――」"
# monologue
# JP: ふかみが、しばし考え込む。\n絵になるなと、つくづく思う、
3588 = "Fukami suy nghĩ một lát.\nTrông cứ như một bức tranh vậy, tôi thầm nghĩ."
# 【レポーター】
# display as 記者
# JP: 「やっぱり、困ったお客さんとかですか？\n早瀬さんくらいの美人さんだと、色々ありそうですけど」
2444 = "「Quả nhiên là, những hành khách khó tính sao?\nMột người đẹp như cô Hayase chắc hẳn gặp phải nhiều chuyện lắm nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「いえ、そういうのは全く。\n御一夜鉄道のお客様は、みなさん、紳士・淑女ですし」
1982 = "「Không, hoàn toàn không có chuyện đó ạ.\nHành khách của Đường sắt Ohito, mọi người đều là những quý ông, quý bà cả.」"
# monologue
# JP: 模範解答であるだけでなく、現実だ。\nハチロクが率先し、努力を重ねた『暖かな雰囲気作り』。
3712 = "Không chỉ là câu trả lời mẫu mực, mà đó là sự thật.\n'Tạo dựng bầu không khí ấm áp' mà Hachiroku đã tiên phong và không ngừng nỗ lực."
# monologue
# JP: その効果は目に見えている。バーベキュー列車の賑わいが、\n下品な騒ぎになったことなど、今までただの一度も無い。
3342 = "Hiệu quả đó có thể thấy rõ. Sự nhộn nhịp của chuyến tàu BBQ,\nchưa từng một lần biến thành sự ồn ào thô tục nào từ trước đến nay."
# 【レポーター】
# display as 記者
# JP: 「それなら、『楽勝ーっ！」な感じだったり？\n車掌さんのお仕事って、案外」
2761 = "「Nếu vậy, có phải cảm giác 'Dễ ợt!' không?\nCông việc của \\x%l車掌;#00ffc040;trưởng tàu%l;#; ấy, không ngờ lại」"
# 【ふかみ】
# display as 深美
# JP: 「そんなことはないです。お客様や仲間に助けて貰っても、\nやっぱり、むつかしいことの方が多くって――」
2570 = "「Không có chuyện đó đâu ạ. Dù được hành khách và đồng nghiệp giúp đỡ,\nnhưng quả thực, những việc khó khăn vẫn nhiều hơn――」"
# 【レポーター】
# display as 記者
# JP: 「うんうん！」
2261 = "「Ừm ừm!」"
# 【ふかみ】
# display as 深美
# JP: 「その中で、一番むつかしいのを決めるなら……\nやっぱり、月並みですけど――安全を守ること、です」
2061 = "「Trong số đó, nếu phải chọn ra điều khó khăn nhất thì......\nQuả nhiên, dù nghe có vẻ sáo rỗng――nhưng đó là bảo vệ sự an toàn ạ.」"
# 【レポーター】
# display as 記者
# JP: 「安全を守る？」
2048 = "「Bảo vệ sự an toàn?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。御一夜鉄道が[しんぞうさいせい,3]新造再生したバーベキュー客車、\nオロ31 27には、[しゃしょうべん,2]車掌弁がついてるんですけど――」
2529 = "「Vâng. Toa hành khách BBQ được Đường sắt Ohito tân trang lại,\nOro31 27, có trang bị van \\x%l車掌;#00ffc040;trưởng tàu%l;#;――」"
# 【レポーター】
# display as 記者
# JP: 「しゃしょうべん？」
2096 = "「Van \\x%l車掌;#00ffc040;trưởng tàu%l;#;?」"
# monologue
# JP: ふかみが頷く。
3606 = "Fukami gật đầu."
# monologue
# JP: 客車最後部の車掌弁へとレポーターを案内し、\n手でひくような素振りをみせる。
3338 = "Hướng dẫn phóng viên đến van \\x%l車掌;#00ffc040;trưởng tàu%l;#; ở phía cuối \\x%l客車;#00ffc040;toa hành khách%l;#;,\ncô làm động tác như đang dùng tay kéo nó."
# 【ふかみ】
# display as 深美
# JP: 「簡単にいうと、非常ブレーキです。これをひけば、\n運転台での運転操作を無視して、列車を停止できます」
2618 = "「Nói đơn giản thì, nó là \\x%l非常;#00ffc040;phanh khẩn cấp%l;#;. Nếu kéo cái này,\ncó thể phớt lờ thao tác lái ở \\x%l運転台;#00ffc040;buồng lái%l;#; và dừng tàu lại.」"
# 【レポーター】
# display as 記者
# JP: 「運転士さん関係なしにですか？　一体、どうして」
2675 = "「Không cần quan tâm đến \\x%l運転士;#00ffc040;người lái tàu%l;#; sao? Rốt cuộc là, tại sao lại vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「運転士じゃなくて、機関士なんです。\nこの客車を引っ張るのは、[ハチロクニイマル,3]8620――蒸気機関車ですから」
1967 = "「Không phải \\x%l運転士;#00ffc040;người lái tàu%l;#;, mà là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; ạ.\nBởi vì thứ kéo \\x%l客車;#00ffc040;toa hành khách%l;#; này là 8620――\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.」"
# 【レポーター】
# display as 記者
# JP: 「え～！　そうなんですね。おもしろーい。\n運転士さんじゃなくて、機関士さん」
2228 = "「Ể~! Vậy sao. Thú vị quá.\nKhông phải \\x%l運転士;#00ffc040;người lái tàu%l;#;, mà là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;.」"
# 【ふかみ】
# display as 深美
# JP: 「です。『機関士さん』って呼びかけてあげると、\n『わかってるな』って、きっと、喜んでもらえます」
2259 = "「Vâng. Nếu gọi là '\\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;',\nhọ sẽ nghĩ 'cô hiểu biết đấy', và chắc chắn sẽ rất vui.」"
# 【レポーター】
# display as 記者
# JP: 「なるほど～」
2547 = "「Ra là vậy~」"
# monologue
# JP: 柔らかな笑顔での修正は、少しのイヤミも感じさせない。\nレポーターは客というわけではないが……
3592 = "Lời đính chính kèm nụ cười dịu dàng không hề tạo cảm giác mỉa mai chút nào.\nPhóng viên tuy không phải là khách hàng nhưng......"
# monologue
# JP: ふかみの接客技術はもはや、\n御一夜鉄道随一となったといって、過言ではない。
3622 = "Kỹ năng phục vụ khách hàng của Fukami giờ đây,\ncó thể nói là số một của Đường sắt Ohito cũng không ngoa."
# 【ふかみ】
# display as 深美
# JP: 「で、さっきのご質問ですね。\nどうして、赤を切るのか、っていうこと」
2336 = "「Và, trở lại câu hỏi vừa nãy ạ.\nTại sao lại cắt cờ đỏ.」"
# 【レポーター】
# display as 記者
# JP: 「あかをきる？」
2492 = "「Cắt cờ đỏ?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　車掌弁を引く――車掌が列車を\n非常停止させることを、『赤を切る』っていうんです」
2223 = "「A! Kéo van \\x%l車掌;#00ffc040;trưởng tàu%l;#;――việc \\x%l車掌;#00ffc040;trưởng tàu%l;#; làm cho \\x%l列車;#00ffc040;tàu%l;#;\ndừng khẩn cấp, được gọi là 'cắt cờ đỏ' ạ.」"
# monologue
# JP: いいながら、車掌弁のお尻をふかみは示す。\n引き手の末端の木部の色は、鮮やかな赤だ。
3687 = "Vừa nói, Fukami vừa chỉ vào phần đuôi của van \\x%l車掌;#00ffc040;trưởng tàu%l;#;.\nMàu của phần gỗ ở cuối tay kéo là một màu đỏ rực rỡ."
# 【レポーター】
# display as 記者
# JP: 「なるほど～」
2546 = "「Thì ra là thế~」"
# monologue
# JP: ……実際の語源は、車掌が持つ旗。
1473 = "......Nguồn gốc thực sự của từ này là lá cờ mà \\x%l車掌;#00ffc040;trưởng tàu%l;#; cầm."
# monologue
# JP: フライ[キ]旗の赤、停止を示す旗ではあろうが、\nふかみはここは、笑顔で流す。
3097 = "Màu đỏ của cờ vẫy, có lẽ là lá cờ báo hiệu dừng lại,\nnhưng Fukami ở đây chỉ mỉm cười cho qua."
# 【ふかみ】
# display as 深美
# JP: 「例えば。機関士が気絶して、レイルロオドも動けない。\nその状況だと……列車、どうなっちゃいますか？」
2047 = "「Ví dụ như. \\x%l機関士;#00ffc040;Nhân viên cơ vụ%l;#; ngất xỉu, \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không thể di chuyển.\nTrong tình huống đó thì......\\x%l列車;#00ffc040;tàu%l;#;, sẽ ra sao ạ?」"
# 【レポーター】
# display as 記者
# JP: 「ええと――ずっと走り続ける――暴走しちゃう！」
2695 = "「Ừm thì――sẽ cứ tiếp tục chạy――sẽ mất kiểm soát mất!」"
# 【ふかみ】
# display as 深美
# JP: 「はい。機関車、8620の運転台に、走行中の客車から\n入り込むことはできません。だから、そういうときには」
2533 = "「Vâng. Từ \\x%l客車;#00ffc040;toa hành khách%l;#; đang chạy, không thể đi vào\n\\x%l運転台;#00ffc040;buồng lái%l;#; của đầu máy 8620 được. Vì vậy, những lúc như thế」"
# 【レポーター】
# display as 記者
# JP: 「赤を、切る――\nその車掌弁を、ぐいっと？」
2407 = "「Cắt, cờ đỏ――\nKéo mạnh cái van \\x%l車掌;#00ffc040;trưởng tàu%l;#; đó?」"
# 【ふかみ】
# display as 深美
# JP: 「です。危険があるって少しでも感じたときは――\n車掌には、赤を切る義務があります」
2527 = "「Vâng. Khi cảm thấy có chút nguy hiểm nào đó――\n\\x%l車掌;#00ffc040;Trưởng tàu%l;#; có nghĩa vụ phải cắt cờ đỏ ạ.」"
# 【レポーター】
# display as 記者
# JP: 「義務、ですか？」
2542 = "「Nghĩa vụ, sao?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。安全が損なわれてはいけませんから――\nそれは、車掌が必ず果たすべき義務となるんです」
2532 = "「Vâng. Vì không thể để sự an toàn bị tổn hại――\nĐó trở thành nghĩa vụ mà \\x%l車掌;#00ffc040;trưởng tàu%l;#; bắt buộc phải hoàn thành.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2216 = "「啊！」" 
# monologue
# JP: ごくごくわずかに、けれど確かに――\nふかみの笑顔が、引きつっている。
3723 = "Dù rất rất khẽ, nhưng chắc chắn là――\nNụ cười của Fukami đang gượng gạo."
# 【レポーター】
# display as 記者
# JP: 「あー、義務を果たさないと\n事故になっちゃうかも、ですかー。納得です」
2243 = "「A, nếu không hoàn thành nghĩa vụ\nthì có thể xảy ra tai nạn nhỉ. Hợp lý.」"
# 【ふかみ】
# display as 深美
# JP: 「でも――その義務を果たすことは。\n赤を切ることは、本当に難しい」
2016 = "「Nhưng mà――việc hoàn thành nghĩa vụ đó.\nViệc cắt cờ đỏ, thực sự rất khó khăn.」"
# monologue
# JP: ささやくようにそう言って。
3576 = "Cô ấy thì thầm nói như vậy."
# monologue
# JP: ふかみは照れくさそうな微笑みを作り、\nぺろっと、小さく舌を出す。
3353 = "Fukami tạo ra một nụ cười ngượng ngùng,\nvà thè lưỡi ra một chút."
# 【ふかみ】
# display as 深美
# JP: 「実はわたし。車掌になってから、\n車掌弁、まだ一度も引けたことがなくって」
2063 = "「Thực ra thì tôi. Từ khi trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;,\nvẫn chưa một lần nào kéo van \\x%l車掌;#00ffc040;trưởng tàu%l;#; cả.」"
# 【レポーター】
# display as 記者
# JP: 「あー、そうだったんですか～！　でもそれって、\n御一夜鉄道さんが、それだけ安全！　ってことですよね」
2280 = "「A, ra là vậy sao~! Nhưng mà như thế,\nchứng tỏ Đường sắt Ohito an toàn đến mức đó! Đúng không.」"
# 【ふかみ】
# display as 深美
# JP: 「あはっ」
2182 = "「A ha」"
# monologue
# JP: それは、違う。\nふかみが一番、誰よりも良くわかっている。
3082 = "Không phải vậy.\nFukami là người hiểu rõ nhất, hơn bất kỳ ai."
# monologue
# JP: 僕や凪。日々姫や、ハチロクの気づきによって防がれた、\n『ヒヤリハット』のケースも、幾度かあった。
3545 = "Những tình huống 'suýt xảy ra tai nạn'\nđược ngăn chặn nhờ sự nhạy bén của tôi, Nagi, Hibiki hay Hachiroku, cũng đã có vài lần."
# 【ふかみ】
# display as 深美
# JP: 「おかげさまで――」
2657 = "「Cũng nhờ ơn――」"
# monologue
# JP: 赤を切る勇気。ふかみはそれを、未だに持てて……\n少なくとも、発揮できてはいない。
3623 = "Dũng khí để cắt cờ đỏ. Fukami vẫn chưa có được nó......\nÍt nhất là, vẫn chưa thể phát huy được."
# monologue
# JP: 事実を誰よりわかっていながら、苦しみながら。\n――それでもふかみは、鮮やかな笑顔を浮かべてみせる。
3563 = "Dù hiểu rõ sự thật hơn ai hết, dù đang đau khổ.\n――Nhưng Fukami vẫn nở một nụ cười rạng rỡ."
# 【ふかみ】
# display as 深美
# JP: 「おかげさまで、です。御一夜鉄道は開業以来、\n怪我人を出すような事故を、一件も起こしていません」
2656 = "「Cũng nhờ ơn mọi người ạ. Đường sắt Ohito từ khi khai trương đến nay,\nchưa từng để xảy ra một vụ tai nạn nào gây thương tích cho hành khách.」"
# monologue
# JP: ふかみの言葉を笑顔でうけて、\nレポーターはふかみから視線を切って、カメラへと向く。
3632 = "Mỉm cười đón nhận lời của Fukami,\nphóng viên rời mắt khỏi Fukami và hướng về phía máy quay."
# 【レポーター】
# display as 記者
# JP: 「そんな御一夜鉄道の、頼もしい美人車掌さん！\n早瀬ふかみさんには、実はもう一つの顔があるんです！」
2421 = "「Nữ \\x%l車掌;#00ffc040;trưởng tàu%l;#; xinh đẹp đáng tin cậy của Đường sắt Ohito!\nCô Hayase Fukami thực ra còn có một thân phận khác nữa!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、堂々としとるとね～」
2390 = "「Bé Fukami, trông đường hoàng quá nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おう、凪」
2028 = "「Ồ, Nagi.」"
# monologue
# JP: 客車の外から、凪が小声で呼びかけてくる。
3701 = "Từ bên ngoài \\x%l客車;#00ffc040;toa hành khách%l;#;, Nagi gọi khẽ."
# monologue
# JP: いつもと変わらぬ凪の様子に力が抜けて、\nいつの間に、自分が力んでいたと知る。
3671 = "Thấy dáng vẻ Nagi vẫn như thường lệ khiến tôi nhẹ nhõm,\nvà nhận ra mình đã căng thẳng từ lúc nào không hay."
# 【双鉄】
# display as 雙鐵
# JP: 「カマはできたか」
2613 = "「\\x%l窯;#00ffc040;Lò hơi%l;#; chuẩn bị xong chưa?」"
# 【凪】
# display as 凪
# JP: 「ばっちりばい！　今日はテレビのひとたち来とるけん！\nいつもより念入りにつくっといたと！」
2059 = "「Chuẩn không cần chỉnh luôn! Hôm nay có mấy người trên TV tới mà!\nNên em đã chuẩn bị kỹ lưỡng hơn bình thường đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では僕も、一足先に運転台に入っておこう」
2732 = "「Vậy anh cũng vào \\x%l運転台;#00ffc040;buồng lái%l;#; trước một bước đây.」"
# monologue
# JP: 下へとおりれば、すぐさま凪が寄ってくる。
3237 = "Vừa bước xuống, Nagi liền chạy lại gần ngay."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、一人にしといて大丈夫と？」
2595 = "「Để bé Fukami một mình có sao không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫さ。ふかみなら。\nそうでなくとも今日の主役だ。大事に扱ってもらえよう」
2567 = "「Không sao đâu. Nếu là Fukami.\nHơn nữa cô ấy là nhân vật chính hôm nay. Chắc sẽ được đối xử cẩn thận thôi.」"
# 【凪】
# display as 凪
# JP: 「あー。そりゃそうばいねー」
2281 = "「A. Chắc là vậy rồi ha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのうえ、ポーレットとれいなも添乗するのだ。\nならば僕は、乗務の準備を早める方が、正解だろう」
2626 = "「Thêm vào đó, Paulette và Reina cũng sẽ lên tàu cùng.\nVậy thì anh nên chuẩn bị công việc sớm sẽ đúng đắn hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「おかえりなさいませ、双鉄様、凪」
2030 = "「Chào mừng hai người quay lại, ngài Soutetsu, Nagi.」"
# 【日々姫】
# display as 日日姬
# JP: 「おかえりにーに！　ＴＶの取材、どうだった？」
2031 = "「Mừng anh hai về! Phỏng vấn cho TV thế nào rồi?」"
# monologue
# JP: 運転台に戻るやいなやで、好奇心丸出しの日々姫に捕まる。
3239 = "Vừa trở lại \\x%l運転台;#00ffc040;buồng lái%l;#;, tôi đã bị Hibiki với vẻ mặt đầy tò mò tóm lấy."
# 【日々姫】
# display as 日日姬
# JP: 「レポーターさんってやっぱり美人？\nそれとも、ＴＶで見るほどじゃない？？」
2726 = "「Phóng viên có phải là mỹ nhân không?\nHay là không đẹp như trên TV??」"
# 【双鉄】
# display as 雙鐵
# JP: 「美人は美人だったが、ふかみほどではない」
2334 = "「Đẹp thì đẹp thật, nhưng không bằng Fukami đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、ご馳走様」
2185 = "「Chà, ngọt ngào quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 
# 【日々姫】
# display as 日日姬
# JP: 「にぃーに？　カメラの前ではノロケんといてよねー」
2748 = "「Anh hai à? Trước ống kính đừng có mà thể hiện tình cảm đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2342 = "「Ồ.」"
# monologue
# JP: そうか、確かに、今のはノロケに聞こえるか。\nふかみが綺麗なことなどは、ごく当然であるとはいえど。
3380 = "Ra vậy, đúng là, câu vừa rồi nghe giống như đang thể hiện tình cảm nhỉ.\nDù việc Fukami xinh đẹp là điều hiển nhiên."
# 【ハチロク】
# display as 八六
# JP: 「それで、今日の取材は、\nどのような性質のものなのですか？」
2337 = "「Vậy, buổi phỏng vấn hôm nay,\nlà về chủ đề gì vậy ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「紹介番組！　『[ひのもと,2]日ノ本鉄道めぐり』っていうの。\n大廃線からの復興を目指す鉄道各社をめぐってくの！」
2512 = "「Chương trình giới thiệu! Tên là 'Dạo quanh Đường sắt Hinomoto'.\nSẽ đi vòng quanh các công ty đường sắt đang hướng tới phục hưng sau Đại bãi bỏ các tuyến đường sắt!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　そのような番組が」
2184 = "「Chà! Có cả chương trình như vậy sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「電車姫様の働きかけで、[ひろしま,1]廣島ケーブルテレビ制作で\nこの四月からはじまって、あっという間に全国ネット！」
2708 = "「Nhờ sự vận động của Densha Hime, Đài Truyền hình Cáp Hiroshima đã sản xuất\nvà bắt đầu phát sóng từ tháng 4 này, chớp mắt đã phủ sóng toàn quốc mạng lưới!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと――凄いことだな」
2701 = "「Chà――Thật đáng kinh ngạc.」"
# 【日々姫】
# display as 日日姬
# JP: 「増えてきたんだよ！　鉄道に興味を持ってくれる人が。\nみんなで頑張ったから――頑張ってるから！」
2377 = "「Đang tăng lên đó! Những người quan tâm đến đường sắt.\nVì mọi người đã cùng nhau cố gắng――vì mọi người đang cố gắng mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2521 = "「Ừ.」"
# monologue
# JP: 九洲以上に大廃線後の鉄道荒廃がひどかった北開道にも、\nようやく復線の種がまかれ始めてきたと聞く。
3654 = "Nghe nói ở Hokkaidou, nơi đường sắt bị tàn phá sau Đại bãi bỏ các tuyến đường sắt còn tồi tệ hơn cả Kyushu,\ncuối cùng cũng bắt đầu gieo những hạt giống phục hồi tuyến đường."
# monologue
# JP: 僕らの御一夜鉄道も、昨年ようやく、\n千内まわりでの、みかん鉄道との接続を持てた。
3458 = "Đường sắt Ohito của chúng ta, năm ngoái cũng đã,\ncuối cùng có thể kết nối với Đường sắt Mikan qua ngõ Sendai."
# 【双鉄】
# display as 雙鐵
# JP: 「――線路が再び。\n伸び、つながりはじめているのだ」
1488 = "「――Đường ray một lần nữa.\nĐang vươn dài, và bắt đầu kết nối lại.」"
# 【日々姫】
# display as 日日姬
# JP: 「それだけに！\n今日のテレビも、と～っても重要！　なんだけど～」
2293 = "「Chính vì vậy!\nChương trình TV hôm nay cũng, vô~ cùng quan trọng! Nhưng mà~」"
# monologue
# JP: キャブの窓から首を出し、\n日々姫は客車の様子をうかがう。
3532 = "Thò đầu ra khỏi cửa sổ \\x%l運転台;#00ffc040;buồng lái%l;#;,\nHibiki dò xét tình hình \\x%l客車;#00ffc040;toa hành khách%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「まさか、ふかみちゃんが取材の主役になるなんて。\nいっつもなら、ポーレットさんなのに、大出世！」
2568 = "「Không ngờ, bé Fukami lại trở thành nhân vật chính của buổi phỏng vấn.\nBình thường toàn là chị Paulette mà, thăng tiến lớn rồi!」"
# 【ハチロク】
# display as 八六
# JP: 「確かに、ポーレット様は話題性の固まりですからね。\n市長で社長で、あのお美しさ。けれど――」
2538 = "「Đúng vậy, Thị trưởng Paulette vốn là tâm điểm của sự chú ý mà.\nVừa là thị trưởng, vừa là giám đốc, lại còn xinh đẹp. Nhưng mà――」"
# 【凪】
# display as 凪
# JP: 「大廃線からの復興を目指す！　ってテーマなら、\nふかみちゃんの方がもっとぴったりばい！！」
2355 = "「Nếu chủ đề là 'Hướng tới phục hưng sau Đại bãi bỏ các tuyến đường sắt!' thì,\nbé Fukami mới là người phù hợp hơn nhiều!!」"
# monologue
# JP: 確信に満ち満ちた凪の言葉に、自然と頷く。
3206 = "Trước những lời nói đầy tự tin của Nagi, tôi tự nhiên gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同意だ。このツアーばかりは御一夜鉄道ならでは。完全な独自性を持つ、大きな売りであるのだからな」
2454 = "「Anh cũng đồng ý. Chuyến đi này là đặc sản riêng của Đường sắt Ohito.\nMang tính độc đáo hoàn toàn, là một điểm nhấn lớn mà.」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ、左様ですね」
2275 = "「Fufu, ngài nói đúng ạ.」"
# monologue
# JP: ツアーの好評を思ってか、\nハチロクも、どこか誇らしげな笑みを浮かべる。
3505 = "Có lẽ đang nghĩ đến sự ủng hộ nhiệt tình dành cho chuyến đi,\nHachiroku cũng nở một nụ cười đầy tự hào."
# 【ハチロク】
# display as 八六
# JP: 「バーベキュー列車の車掌ふかみが、湯医につけば、\nすぐさまクマ川下りの船頭さんに早変わりする」
2775 = "「\\x%l車掌;#00ffc040;Trưởng tàu%l;#; Fukami của chuyến tàu BBQ, khi đến Yui,\nsẽ ngay lập tức biến thành người chèo thuyền trên sông Kuma.」"
# 【凪】
# display as 凪
# JP: 「そいばやるようになってから、ふかみちゃんが船頭の\nクマ川下り！　抽選制の大人気になったけんねー」
2302 = "「Từ khi làm vậy, chuyến xuôi dòng Kuma do bé Fukami chèo!\nĐã trở nên cực kỳ nổi tiếng, đến mức phải bốc thăm luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2521 = "「是啊」" 
# monologue
# JP: そのまま列車で折り返す者も、クマ川第四橋梁で、\nふかみ操るクマ川下り舟の真上を通過できる。
3366 = "Những người cứ thế quay về bằng \\x%l列車;#00ffc040;tàu%l;#;, tại cây cầu thứ tư trên sông Kuma,\ncũng có thể đi ngang qua ngay trên chiếc thuyền xuôi dòng do Fukami điều khiển."
# monologue
# JP: ふかみと凪とが発案したこのプラン、\n導入以来、申し込みは常に定員以上だ。
3548 = "Kế hoạch này do Fukami và Nagi khởi xướng,\ntừ khi áp dụng, số lượng đăng ký luôn vượt quá giới hạn."
# 【日々姫】
# display as 日日姬
# JP: 「あれ！？　わ！　ふかみちゃん、\\x%l転轍機;#00ffc040;転轍機%l;#;！！」
2164 = "「Ủa!? Oa! Bé Fukami, \\x%l転轍機;#00ffc040;thiết bị bẻ ghi%l;#;!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そこまで絵作りするのか」
2003 = "「Chà, đến mức phải dựng cảnh như vậy sao.」"
# monologue
# JP: あわてて窓から外を見れば、\n\\x%l錘付転換機;#00ffc040;錘付転換機%l;#;のレバーを、ふかみが全身で押し込んでいる。
3479 = "Vội vàng nhìn ra ngoài cửa sổ,\ntôi thấy Fukami đang dùng toàn thân đẩy cần gạt của \\x%l錘付転換機;#00ffc040;cần bẻ ghi có đối trọng%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「『\\x%l入換;#00ffc040;入換%l;#;が出来て初めて車掌は一人前』――\n帝鉄では、そのように言われてもおりました」
2411 = "「'Phải biết \\x%l入換;#00ffc040;dồn toa%l;#; thì mới là một \\x%l車掌;#00ffc040;trưởng tàu%l;#; thực thụ'――\nỞ Đường sắt Hoàng gia, người ta cũng từng nói như vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……帝鉄では長距離の列車も多かっただろうし、車掌が[いれかえ,1]入換誘導をせざるを得ないケースもありそうだが」
2522 = "「Ra là vậy......Ở Đường sắt Hoàng gia chắc cũng có nhiều chuyến \\x%l列車;#00ffc040;tàu%l;#; đường dài, có vẻ cũng có những trường hợp \\x%l車掌;#00ffc040;trưởng tàu%l;#; bắt buộc phải hướng dẫn \\x%l入換;#00ffc040;dồn toa%l;#; nhỉ.」"
# 【レポーター】
# display as 記者
# JP: 「ありがとうございますー！　ここオッケー？\nじゃ、湯医まで連れてってくださーい」
2658 = "「Cảm ơn rất nhiều~! Chỗ này OK chứ?\nVậy, xin hãy đưa chúng tôi đến Yui nha~」"
# 【ふかみ】
# display as 深美
# JP: 「あ、その前に、[ハチロクニイマル,3]8620――\n蒸気機関車が転車して、客車と連結します」
2238 = "「A, trước đó, 8620――\n\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sẽ xoay đầu trên \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;, rồi kết nối với \\x%l客車;#00ffc040;toa hành khách%l;#; ạ.」"
# 【レポーター】
# display as 記者
# JP: 「わ、じゃ、それも撮らなきゃ。撮るよね？\nそれなら、案内してもらえますか？」
2180 = "「Oa, vậy, cái đó cũng phải quay lại chứ. Sẽ quay đúng không?\nNếu vậy, có thể dẫn đường cho chúng tôi được không?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。少しだけ待って下さい」
2350 = "「Vâng. Xin hãy đợi một chút ạ.」"
# monologue
# JP: またガチリ。ふかみは切り替えたポイントを戻し、\nレポーターをつれ、転車台の方へと消えていく。
3582 = "Lại nghe tiếng 'cạch'. Fukami đưa thanh ghi vừa bẻ về vị trí cũ,\ndẫn phóng viên đi và khuất dần về phía \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「わー、本当に画だけ撮ったんだー」
2178 = "「Oa~, đúng là chỉ quay mỗi cảnh đó thôi kìa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがそうさせたのだろう。\n普段と違う扱いで運用するのは、事故のもとだ」
2329 = "「Chắc là Paulette đã bảo làm vậy.\nVận hành khác với bình thường là mầm mống của tai nạn mà.」"
# 【凪】
# display as 凪
# JP: 「にーさん！　[いれしん,4]入換信号機！ 進行ばい！」
2320 = "「Anh Soutetsu! Đèn tín hiệu \\x%l入換;#00ffc040;dồn toa%l;#;! Cho phép tiến lên rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2260 = "「嗯」" 
# monologue
# JP: 凪の喚呼に頷けば、とたんに皆が動き出す。
3653 = "Tôi gật đầu đáp lại tiếng hô của Nagi, ngay lập tức mọi người bắt đầu di chuyển."
# monologue
# JP: 今日は助士二名の大所帯だが、混乱など無い。\n日々姫と凪とハチロクと僕、チームワークは出来ている。
3108 = "Hôm nay là một đội lớn với hai \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;, nhưng không hề có sự hỗn loạn nào.\nHibiki, Nagi, Hachiroku và tôi, tinh thần làm việc nhóm đã được hình thành."
# 【日々姫】
# display as 日日姬
# JP: 「今日は、凪ちゃんも川下りいくんだよね？」
2008 = "「Hôm nay, Nagi cũng đi xuôi dòng sông đúng không?」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんに頼まれたけんね！　特別ばい！\nやけんにーさん、安心してよかとよ？」
2392 = "「Vì bé Fukami đã nhờ mà! Đặc biệt đó nha!\nNên là anh Soutetsu cứ yên tâm đi nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。舟の上でのことは、任せた」
2736 = "「Đáng tin cậy thật. Mọi chuyện trên thuyền giao lại cho em đó.」"
# 【凪】
# display as 凪
# JP: 「任されたばーい！」
1993 = "「Cứ giao cho em!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。全てよし、です」
2758 = "「Ngài Soutetsu. Tất cả đã sẵn sàng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それでは――いくか」
2266 = "「Ừm. Vậy thì――đi thôi.」"
# monologue
# JP: 凪にまかせておけるのならば、全く何の心配もない。
3521 = "Nếu có thể giao phó cho Nagi thì chẳng có gì phải lo lắng cả."
# monologue
# JP: 僕はただ、事故無く無事に、行って、戻って――\nいつもの仕事を、いつもどおりにやりきるだけだ。
3461 = "Tôi chỉ việc, không để xảy ra tai nạn, đi và về bình an vô sự――\nHoàn thành công việc thường ngày, theo đúng cách thường ngày mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「逆転機！　後進フルギア！\n――[いれかえ,1]入換！　進行！！」
2285 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;! Cài hết số lùi!\n――\\x%l入換;#00ffc040;Dồn toa%l;#;! Tiến lên!!」"
# monologue
# JP: （ポーーーーっ！）
3752 = "（Tuúúúúúú!）"
# 【双鉄】
# display as 雙鐵
# JP: 「……停止目標、よし！」
1526 = "「......Mục tiêu dừng tàu, tốt!」"
# monologue
# JP: 普段なら乗客降車後、速やかに機関庫へ戻すところだが、\n今日はこれから、追加の撮影がある可能性もある。
3417 = "Bình thường thì sau khi hành khách xuống tàu, sẽ nhanh chóng đưa về xưởng đầu máy,\nnhưng hôm nay có khả năng sẽ có thêm cảnh quay bổ sung."
# monologue
# JP: ホームにこのまま停車するため、\n単弁を緩ブレーキ位置へと戻し、逆転機もミッドギアへと。
3625 = "Để cứ thế đỗ lại ở sân ga,\ntôi đưa \\x%l単弁;#00ffc040;van hãm đơn%l;#; về vị trí nhả phanh, và \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về số trung tính."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、お疲れ様ー！」
2750 = "「Anh hai, vất vả rồi~!」"
# monologue
# JP: 炭水車正面の手ブレーキをぐるぐると回しつつ、\n日々姫は、苦笑の混じった声をだす。
3530 = "Vừa xoay tròn \\x%l手ブレーキ;#00ffc040;phanh tay%l;#; ở mặt trước của \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;,\nHibiki vừa cất giọng pha chút cười khổ."
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃにはもうひと仕事ありそうだけど～」
1965 = "「Nhưng mà, có vẻ anh hai vẫn còn một việc nữa đấy~」"
# 【ハチロク】
# display as 八六
# JP: 「テレビの方たち。先に戻ってくださいましたのですね。\nご指示通り、とろとろと走らせた甲斐がございました」
2762 = "「Mấy người trên TV. Họ đã quay lại trước rồi nhỉ.\nThật bõ công chạy chầm chậm theo đúng chỉ thị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言うな、ハチロク。戻ってくるところも撮りたいのは、\n彼らの職業であれば、当然の欲求だろうさ」
2098 = "「Đừng nói vậy, Hachiroku. Muốn quay cả cảnh lúc quay về,\nđối với nghề nghiệp của họ thì đó là mong muốn hiển nhiên thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様がそうおっしゃられるのでしたら、\nわたくしも、そのように納得いたします」
2499 = "「Nếu ngài Soutetsu đã nói vậy thì,\nem cũng sẽ chấp nhận như thế ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば助かる」
# 2731 = "「那就好」" 
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃに！　そぎゃんとのんびりしとらんと！\nレポーターさん、にぃにのこと待っとるみたいよ？」
2255 = "「Này, anh hai! Đừng có thong thả như vậy chứ!\nPhóng viên, có vẻ đang đợi anh hai đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕をか？」
2614 = "「Đợi anh sao?」"
# monologue
# JP: 覗いてみれば、日々姫の言葉そのままだ。
3470 = "Nhìn thử ra ngoài, quả đúng như lời Hibiki nói."
# monologue
# JP: 凪とふかみを後方に、レポーターとカメラマンとは、\nキャブから誰かが出て来るのを待ち構えている。
3210 = "Nagi và Fukami đứng ở phía sau, còn phóng viên và người quay phim\nđang chực chờ xem có ai bước ra từ \\x%lキャブ;#00ffc040;buồng lái%l;#; không."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫かハチロクがいった方が、絵にはならんか？」
2706 = "「Hibiki hoặc Hachiroku ra đó thì lên hình sẽ đẹp hơn chứ nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　だいぶん昔にお教えしたことですので、\n失念されてしまいましたか？」
2759 = "「Ngài Soutetsu? Chuyện này em đã dạy ngài từ lâu lắm rồi,\nngài quên mất rồi sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 
# 【ハチロク】
# display as 八六
# JP: 「ファンサアビスも、\n機関士の大事な仕事、でございます」
2287 = "「Dịch vụ fan hâm mộ (fan service) cũng là,\ncông việc quan trọng của \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ファンサービスか。なるほどな」
2286 = "「Dịch vụ fan hâm mộ sao. Ra là vậy.」"
# monologue
# JP: 確かにだ。\nレポーターやカメラマンを相手にするだけではない。
3537 = "Quả thực là vậy.\nKhông chỉ là đối mặt với phóng viên hay người quay phim."
# monologue
# JP: その向こうには、まだ見ぬ御一夜鉄道のファンが、\nきっと数多く、興味深く僕らを眺めるのだろうから。
3504 = "Bởi vì ở phía bên kia, chắc chắn có rất nhiều người hâm mộ Đường sắt Ohito chưa từng gặp mặt,\nđang nhìn chúng tôi với vẻ đầy hứng thú."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば行ってこよう。……ハチロク。\nキャブを降りる時に、決まるようなセリフはあるか？」
2735 = "「Vậy thì anh đi đây. ......Hachiroku.\nLúc bước xuống khỏi \\x%lキャブ;#00ffc040;buồng lái%l;#;, có câu thoại nào nghe cho ngầu không?」"
# 【ハチロク】
# display as 八六
# JP: 「古来、雄弁は銀、沈黙は金と申します。\n問われて初めて口を開く――それが、最も効果的かと」
2130 = "「Từ xưa đã có câu, hùng biện là bạc, im lặng là vàng.\nChỉ mở lời khi được hỏi――như vậy có lẽ là hiệu quả nhất ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「道理だな。お前にはいつも助けられる」
2557 = "「Có lý đấy. Lúc nào em cũng giúp anh được việc.」"
# 【ハチロク】
# display as 八六
# JP: 「光栄なことと存じます」
2702 = "「Đó là vinh hạnh của em ạ.」"
# monologue
# JP: ならばと、口を真一文字に引き締める。\n運転台からホームへと下り――
3520 = "Nghĩ vậy, tôi mím chặt môi thành một đường thẳng.\nBước từ \\x%l運転台;#00ffc040;buồng lái%l;#; xuống sân ga――"
# 【レポーター】
# display as 記者
# JP: 「こちらが、御一夜鉄道バーベキュー列車、\nもくもくハチロク号の、右田双鉄機関士です！」
2698 = "「Đây chính là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Migita Soutetsu,\ncủa chuyến tàu BBQ Đường sắt Ohito, tàu Mokumoku Hachiroku!」"
# monologue
# JP: いきなり来た。\n挨拶を返そうとして、ハチロクの言を思い出し、呑む。
3638 = "Tới luôn rồi.\nĐang định chào lại, tôi chợt nhớ ra lời của Hachiroku, bèn nuốt xuống."
# monologue
# JP: 今は、会釈で十分だ。\n口を開くのは、問われてからで。
3621 = "Bây giờ, chỉ cần gật đầu chào là đủ.\nViệc mở miệng, hãy đợi đến khi được hỏi."
# 【レポーター】
# display as 記者
# JP: 「右田機関士。\n少し、お話しをお伺いしてもいいですか？」
2144 = "「\\x%l機関士;#00ffc040;Nhân viên cơ vụ%l;#; Migita.\nTôi có thể hỏi anh vài câu được không?」"
# monologue
# JP: ここだ。ここが重要だ。
3415 = "Đến rồi. Lúc này là quan trọng nhất đây."
# monologue
# JP: 楽しいことを――ふかみとのデートを思い出し、\n自然な笑顔を浮かべるようにと意識して――
3464 = "Nhớ lại những chuyện vui vẻ――buổi hẹn hò với Fukami,\ntôi cố gắng nở một nụ cười thật tự nhiên――"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんです。よろこんで」
2596 = "「Tất nhiên rồi. Rất sẵn lòng.」"
# 【レポーター】
# display as 記者
# JP: 「ふわっ」
# 2176 = "「哇」" 
# monologue
# JP: 妙な声。\nレポーターは僕の顔を見、瞬きし。
3355 = "Một giọng nói kỳ lạ.\nPhóng viên nhìn mặt tôi, chớp mắt."
# monologue
# JP: それから再び――じいっと僕を凝視してくる。
3517 = "Rồi sau đó lại――nhìn chằm chằm vào tôi."
# 【日々姫】
# display as 日日姬＆八六
# JP: 「むうっ！！？」\n「あらあら」
2206 = "「Hừm!!?」\n「Ây da」"
# monologue
# JP: キャブの中から、\n妙に尖った視線を感じる。
3451 = "Từ trong \\x%lキャブ;#00ffc040;buồng lái%l;#;,\ntôi cũng cảm nhận được những ánh nhìn sắc lẹm kỳ lạ."
# monologue
# JP: というか向こう――\nふかみと凪も、責めるような目で僕を見ている。
3651 = "Mà đúng hơn là phía đằng kia――\nFukami và Nagi cũng đang nhìn tôi bằng ánh mắt như đang trách móc."
# 【レポーター】
# display as 記者
# JP: 「御一夜って、美人の湯とか美形の湯とかあるんですか？\n会う人会う人、みんなすっごく顔立ちが綺麗で」
2424 = "「Ở Ohito, có suối nước nóng mỹ nhân hay suối nước nóng mỹ nam gì không vậy?\nGặp ai cũng thấy nét mặt đẹp cực kỳ luôn」"
# monologue
# JP: なんだ、これは何の質問だ。
3440 = "Gì đây, câu hỏi kiểu gì thế này."
# monologue
# JP: が、質問に質問で返すのは礼儀にもとる。\n聞かれたことに、ともかく誠実に答えよう。
3141 = "Nhưng, lấy câu hỏi để trả lời câu hỏi là thất lễ.\nDù sao cũng cứ thành thật trả lời những gì được hỏi vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……[とろるゆ,3]登呂流湯さんという温泉に、よくお世話になります。\n美肌、かな？　そういう効果があるのかは知りませんが」
1523 = "「......Tôi thường hay lui tới một suối nước nóng tên là Nhà tắm Tororyu-yu.\nChắc là đẹp da chăng? Tôi cũng không rõ có tác dụng đó không nữa.」"
# 【レポーター】
# display as 記者
# JP: 「[とろるゆ,3]登呂流湯さん！　わたし、覚えました。\n帰り、絶対に入っていきます！」
2599 = "「Nhà tắm Tororyu-yu! Tôi nhớ rồi.\nLúc về, nhất định tôi sẽ ghé tắm!」"
# monologue
# JP: うむ。単純に否定するよりよい答えだろう。\n御一夜の温泉と、登呂流湯さんの宣伝もできた。
3295 = "Ừm. Chắc là câu trả lời tốt hơn là chỉ đơn thuần phủ nhận.\nCũng quảng bá được cho suối nước nóng của Ohito và Nhà tắm Tororyu-yu nữa."
# 【レポーター】
# display as 記者
# JP: 「で、ですね？　今日は、蒸気機関車について、\n簡単に教えてもらいたいんですけど」
2717 = "「Và, tiếp theo nhé? Hôm nay, về \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;,\ntôi muốn nhờ anh giải thích một cách đơn giản được không」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええ、喜んで」
2269 = "「Vâng, rất sẵn lòng.」"
# monologue
# JP: 僕の仕事は、まぁここまでで十分だろう。
3493 = "Công việc của tôi, chắc đến đây là đủ rồi nhỉ."
# monologue
# JP: ハチロクと似合うような、機関士像――\nそれは決して、べらべら喋るような男ではあるまい。
3146 = "Hình tượng một \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; xứng đôi với Hachiroku――\nĐó tuyệt đối không phải là một gã đàn ông nói nhiều liến thoắng."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、この8620のレイルロオドと機関助士とが。\nハチロク！　日々姫！　下りて来てくれ」
2724 = "「Chuyện đó, \\x%lレイルロオド;#00ffc040;Railord%l;#; và \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; của chiếc 8620 này sẽ lo.\nHachiroku! Hibiki! Xuống đây đi.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。[マイ・マスター,2]双鉄様」
2346 = "「Đã rõ thưa ngài Soutetsu.」"
# 【レポーター】
# display as 記者
# JP: 「わ――わぁあああ！」
2175 = "「Oa――oaaaa!」"
# monologue
# JP: こういうときのハチロクは、\nさすが、トップナンバーの品格を示してくれる。
3715 = "Hachiroku trong những lúc thế này,\nquả nhiên thể hiện được phẩm cách của một chiếc xe số 1."
# monologue
# JP: あとから続く日々姫は苦笑。\nハチロクのあとは損よね～と言わんばかりの表情だ。
3698 = "Hibiki đi theo sau cười khổ.\nVẻ mặt như muốn nói đi sau Hachiroku đúng là thiệt thòi mà~."
# 【ハチロク】
# display as 八六
# JP: 「ただいま双鉄様からご紹介に預かりました、御一夜鉄道\n[ハチロクニイマルごう,4]8620号専用レイルロオド。ハチロクでございます」
2459 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của đầu máy 8620 thuộc Đường sắt Ohito,\nvừa được ngài Soutetsu giới thiệu. Tôi là Hachiroku ạ.」"
# 【レポーター】
# display as 記者
# JP: 「すごい……こんなに綺麗なレイルロオド。\n帝都にだって――」
2331 = "「Tuyệt quá......Một \\x%lレイルロオド;#00ffc040;Railord%l;#; xinh đẹp thế này.\nKể cả ở Đế đô cũng――」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ、お褒めに預かり光栄です。\n実のところわたくしの出身は、帝都・[ていおう,1]帝央でございます」
2156 = "「Fufu, được khen ngợi là vinh hạnh của tôi.\nThực ra xuất thân của tôi là ở Teuou, Đế đô đấy ạ.」"
# monologue
# JP: （うむ？　厳密には、\n[おおみや,1]旺宮のレイルロオド工機部出身ではなかったか？)
3754 = "（Hừm? Nói một cách nghiêm túc thì,\nkhông phải xuất thân từ Bộ phận Cơ khí chế tạo Railord ở Omiya sao?）"
# monologue
# JP: まぁしかし、\nあの調子なら説明の全てを任せて問題ないだろう。
3643 = "Cơ mà thôi,\nvới cái đà đó thì giao toàn bộ việc giải thích cho em ấy chắc không có vấn đề gì đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだった？　クマ川くだりの方は」
2752 = "「Thế nào rồi? Bên chuyến xuôi dòng sông Kuma ấy.」"
# 【ふかみ】
# display as 深美
# JP: 「完璧でした！　凪ちゃんが助けてくれましたし！\n鉄橋通過も、ほんと、タイミング、最高で！！」
2418 = "「Hoàn hảo luôn ạ! Nagi cũng giúp em một tay nữa!\nLúc qua cầu sắt, thực sự, thời điểm, tuyệt vời nhất luôn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、なによりだ」
# 2731 = "「那就好」" 
# 【ふかみ】
# display as 深美
# JP: 「レポーターさんもすごく親切で！\n絶対絶対！　いい番組にしてもらえるって思います」
2646 = "「Phóng viên cũng rất thân thiện!\nChắc chắn chắc chắn! Sẽ là một chương trình hay cho mà xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2523 = "「是嗎」" 
# 【ふかみ】
# display as 深美
# JP: 「舟の中でも、面白いことあったんですよ！\nお客さんもわたしたちも、オオウケしちゃって」
2300 = "「Lúc ở trên thuyền, cũng có chuyện thú vị lắm đó!\nKhách hàng và bọn em đều cười nắc nẻ luôn.」"
# monologue
# JP: ……ふかみがこれほど夢中になって\nしゃべりまくるのは珍しい。
1480 = "......Fukami mà say sưa\nnói liến thoắng thế này đúng là hiếm thấy."
# monologue
# JP: あるいはそれだけ緊張していた――\nということの、裏返しであるのかもしれないが。
3096 = "Hoặc có lẽ đó là mặt trái của việc\ncô ấy đã căng thẳng đến mức nào――"
# 【ふかみ】
# display as 深美
# JP: 「――それで、わたし、『あ、揺らしちゃうかも！』って、\nだけど、そのとき凪ちゃん、が――――」
2730 = "「――Sau đó, em nói 'A, có thể sẽ bị rung lắc đấy!',\nnhưng mà, lúc đó Nagi, lại――――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2271 = "「嗯？」" 
# monologue
# JP: ふかみの視線を追って、驚く。\n凪の視線が、険を帯びてる。
3498 = "Dõi theo ánh mắt của Fukami, tôi giật mình.\nÁnh mắt của Nagi đang mang vẻ gay gắt."
# monologue
# JP: その向く先は――リポーターさん、だ。
3627 = "Nơi cô bé hướng tới là――cô phóng viên."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　凪」
2035 = "「Sao vậy? Nagi.」"
# 【凪】
# display as 凪
# JP: 「あのねーちゃん、ちょっと気にくわんばい。\nにーさんに、色目ばつかっとったでしょお」
2469 = "「Bà chị đó, hơi chướng mắt nha.\nĐang liếc mắt đưa tình với anh Soutetsu chứ gì.」"
# 【双鉄】
# display as 雙鐵＆深美
# JP: 「はあ？」\n「あ！」
2004 = "「Hả?」\n「A!」"
# monologue
# JP: 何を言うかと思ったら……\nいくらなんでも突拍子もなさすぎる。
3502 = "Tưởng em ấy định nói gì......\nDù có thế nào thì cũng đường đột quá rồi đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「色目も何も、僕と話したのなど[ふたことみこと,3]二言三言だぞ」
2002 = "「Liếc mắt đưa tình gì chứ, anh với cô ấy chỉ mới nói dăm ba câu thôi mà.」"
# 【凪】
# display as 凪
# JP: 「その前からずーっとにーさんのこと、\nチラチラチラチラ見とったばい！」
2301 = "「Từ trước đó bả đã cứ nhìn anh Soutetsu\nchằm chằm mãi rồi kìa!」"
# 【ふかみ】
# display as 深美
# JP: 「あぅっ」
# 2213 = "「啊」" 
# monologue
# JP: まさかの心あたりがあるのか、ふかみまでが急に黙り込む。\nいや、しかし――
3586 = "Chẳng lẽ lại có linh cảm gì sao, đến cả Fukami cũng đột nhiên im bặt.\nKhông, nhưng mà――"
# 【レポーター】
# display as 記者
# JP: 「取材協力、ありがとうございました！」
2442 = "「Cảm ơn mọi người đã hợp tác phỏng vấn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うわっ！？」
# 2181 = "「哇？！」" 
# 【レポーター】
# display as 記者
# JP: 「あっ、おどろかせちゃいましたか？」
2236 = "「A, làm anh giật mình rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、ああ、急に、声をかけられたもので――」
1968 = "「Không, à, tại đột nhiên bị bắt chuyện nên――」"
# monologue
# JP: 噂をすればなんとやら、とはこのことだ。\nと、いうか――
3685 = "Nhắc Tào Tháo là Tào Tháo tới, chính là chuyện này đây.\nMà, phải nói là――"
# monologue
# JP: （近い。近いぞ。なんだ、この近さは）
3758 = "（Gần quá. Gần quá đấy. Gì thế này, khoảng cách này là sao.）"
# 【レポーター】
# display as 記者
# JP: 「おかげで、すごくいい[え,1]映像がたくさん撮れました！\n素敵な番組になると思います」
2705 = "「Nhờ mọi người mà tôi đã quay được rất nhiều hình ảnh đẹp!\nTôi nghĩ sẽ thành một chương trình tuyệt vời đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……その、何よりです」
2694 = "「Vậy thì......ừm, tốt quá rồi.」"
# 【レポーター】
