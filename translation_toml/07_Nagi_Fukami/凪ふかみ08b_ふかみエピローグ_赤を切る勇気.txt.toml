2418 = "「Hoàn hảo luôn ạ! Nagi cũng giúp em một\ntay nữa!\nLúc qua cầu sắt, thực sự, thời\nđiểm, tuyệt vời nhất luôn!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、なによりだ」
# 2731 = "「那就好」" 

# 【ふかみ】
# display as 深美
