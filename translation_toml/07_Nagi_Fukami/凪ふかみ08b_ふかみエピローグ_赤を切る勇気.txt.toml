1536 = "「......Chẳng phải ý nghĩa cũng giống nhau sao?\nVới những gì bé Fukami vừa nói ấy.」"
# 【ふかみ】
# display as 深美
# JP: 「っ――」
# 2209 = "「啊……」" 
