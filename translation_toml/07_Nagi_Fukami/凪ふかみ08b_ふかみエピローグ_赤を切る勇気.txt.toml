3388 = "Khi bé Fukami cười fufu,\nkhuôn mặt anh hai cũng giãn ra thành một nụ cười."
# monologue
# JP: なんだかにーさん、\nふかみちゃんの赤ちゃんみたいばい！
3449 = "Trông anh hai cứ như\nem bé của bé Fukami vậy đó!"
# 【ふかみ】
# display as 深美
# JP: 「助けてもらったのは、私の方、です」
2511 = "「Người được cứu, là em mới đúng, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　そうだったか」
2273 = "「Hửm? Vậy sao?」"
# monologue
# JP: せっかくゆるんだにーさんの顔、\nまたギューって厳しい感じに戻る。
3317 = "Khuôn mặt anh hai vừa mới giãn ra,\nlại nhăn nhó nghiêm nghị trở lại."
# 【ふかみ】
# display as 深美
# JP: 「あ！　ええと、たしかに最初倒れそうになったのは\n双鉄おにいさんでしたけど――」
2230 = "「A! Dạ, đúng là ban đầu người suýt ngã\nlà anh Soutetsu nhưng mà――」"
# monologue
# JP: ふかみちゃん、そしたらあわてて一から全部、\nなにが起こったか説明しよる。
3518 = "Sau đó bé Fukami vội vàng giải thích lại từ đầu,\nxem chuyện gì đã xảy ra."
# 【ふかみ】
# display as 深美
