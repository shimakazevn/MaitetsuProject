3700 = "Ánh nhìn của Nagi và Fukami từ phía sau.\nÁnh nhìn của Hachiroku và Hibiki từ phía trước, đau điếng."
# 【レポーター】
# display as 記者
# JP: 「それでぇ、そのあとぉ。もしよろしければ、\n個人的に？　打ち上げなんか、ご一緒しません？」
2589 = "「Vậy nên, sau đó. Nếu anh không phiền,\ncá nhân thôi? Chúng ta cùng nhau đi ăn mừng nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？　いや――あのっ」
2192 = "「Hả? Không――à thì.」"
# monologue
# JP: ポーレットの姿を必死で探すが、見当たらない。\nこんな誘いは、通常であれば一瞬で断っている。
3465 = "Tôi tuyệt vọng tìm kiếm bóng dáng Paulette, nhưng không thấy đâu.\nNhững lời rủ rê kiểu này, bình thường tôi sẽ từ chối trong vòng một nốt nhạc."
