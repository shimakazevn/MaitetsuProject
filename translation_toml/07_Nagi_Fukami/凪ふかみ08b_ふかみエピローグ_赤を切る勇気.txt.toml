3721 = "那麼，能讓小深得到幸福，還能讓大哥哥好好休息，這豈不是一箭雙鵰嗎！" 

# 【凪】
# display as 凪
# JP: 「あー……でも」
2210 = "「啊……可是」" 

# 【ふかみ】
# display as 深美
# JP: 「なあにっ！？　凪ちゃん」
2427 = "「怎麼了，小凪」" 

# monologue
