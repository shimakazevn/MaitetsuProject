2201 = "「Hừm. Tức là――bốn tuần sẽ được phân bổ\nthành 'hai người với Fukami', 'nghỉ ngơi',\n'ba người', 'nghỉ ngơi', kiểu vậy sao.」"

# 【凪】
# display as 凪
