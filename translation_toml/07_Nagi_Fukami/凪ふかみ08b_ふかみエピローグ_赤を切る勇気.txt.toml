# 【双鉄】
# display as 雙鐵
# JP: 「ない、な。体力的な回復も早い方だと思っていたし、\nだらだらするなら、何か身になることをした方が、と」
2569 = "「沒有。睡覺更方便恢復體力，與其吊兒郎當的，不如做點有益處的事情」" 

# 【ふかみ】
# display as 深美
