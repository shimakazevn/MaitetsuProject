3282 = "咱和小深同時說道。接著，咱倆彼此看了對方一眼……" 

# 【凪】
# display as 凪＆深美
# JP: 「ぷっ」\n「あはっ！」
2277 = "「噗」\\n「哈哈！」" 

# monologue
# JP: それがおかしくって吹き出したら、\nなんだか気分ば、軽くなる。
