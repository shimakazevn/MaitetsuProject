3502 = "Tưởng em ấy định nói gì……\nDù có thế nào\nthì cũng đường đột quá rồi đấy."

# 【双鉄】
# display as 雙鐵
# JP: 「色目も何も、僕と話したのなど[ふたことみこと,3]二言三言だぞ」
2002 = "「Liếc mắt đưa tình gì chứ, anh với cô ấy\nchỉ mới nói dăm ba câu thôi mà.」"

