1958 = "「Bảy năm rồi. Bảy năm trời――\nĐợi chừng đó, chẳng phải là quá đủ rồi sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――」
# 2209 = "「啊……」" 
