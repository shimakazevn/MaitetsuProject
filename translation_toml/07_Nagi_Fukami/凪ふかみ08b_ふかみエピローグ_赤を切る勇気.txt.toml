2742 = "「那麼，現在暫時的安排就是這樣的：和深美獨處、休息、三個人一起休學旅行、三個人一起吊兒郎當」" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　です！！」
2535 = "「是的！嗯！！」" 

# 【凪】
# display as 凪
# JP: 「わかったばーい！」
2339 = "「好咧！」" 

