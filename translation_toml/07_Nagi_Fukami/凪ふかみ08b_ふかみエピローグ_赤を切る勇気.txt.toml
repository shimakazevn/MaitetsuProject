2295 = "「Bởi vì, lỡ như anh Soutetsu từ chối......\nMình nghĩ là không có chuyện đó đâu, nhưng nếu vì thế mà chương trình bị hủy thì sao.」"
# 【凪】
# display as 凪
# JP: 「ダメになったら、何か困ると？」
2128 = "「Bị hủy thì, có gì rắc rối sao?」"
# 【ふかみ】
# display as 深美
