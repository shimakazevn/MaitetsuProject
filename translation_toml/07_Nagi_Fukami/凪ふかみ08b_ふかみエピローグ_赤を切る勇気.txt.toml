2597 = "「Rắc rối chứ! Khó khăn lắm đường sắt mới có cơ hội phục sinh mạnh mẽ mà.\nHơn nữa, nếu có khách đến Đường sắt Ohito, thì dịch vụ xuôi dòng sông cũng sẽ.」"
# 【凪】
# display as 凪
