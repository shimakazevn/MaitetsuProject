# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
# 1527 = "「哇！！！」" 
# monologue
# JP: ふかみのとろとろの柔舌が、凪のプリプリ元気な舌が、\n僕のカリ首の下端部に、巻き付きあってくっつきあって
2185 = "Chiếc lưỡi mềm mại ướt át của Fukami, cùng chiếc lưỡi căng mọng tràn đầy sức sống của Nagi,\nquấn quýt và bám chặt lấy phần dưới quy đầu của tôi."
