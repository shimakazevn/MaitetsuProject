1625 = "「Aaa!? Nagi ăn gian quá!!」"
# 【凪】
# display as 凪
# JP: 「ふうふははひょよー　ひゅんはんひゅんはん」
1375 = "「Zuru janai yoo junban junban」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？　凪――咥えたままでしゃべられると――\nうあっ」
1624 = "「!? Nagi——đừng vừa ngậm vừa nói chứ——\nUa」"
# 【凪】
# display as 凪
# JP: 「ほへっ！？　ほへはひょはほ？　ん～――れるっ――\nくぽっ――あへんほあふぁいふぁあふぃふふぇふぉ！」
1545 = "「Hohe!? So de wa koka ko? N~——reru——\nkupo——amenbo akai na a i u e o!」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、あっ――」
1496 = "「Ư, a——」"
# monologue
# JP: 凪は無邪気に僕をぐっぷり咥えたままで、\nあめんぼあかいなあいうえお――発声練習をしてくれる。
2015 = "Nagi ngây thơ ngậm trọn lấy tôi,\nrồi bắt đầu luyện thanh——Bài đồng dao nhện nước màu đỏ a i u e o."
# 【凪】
# display as 凪
# JP: 「ふふーん、ひょはほうはひへ～、ひはは――\nほふぁひほひゃふはひょふはひふうひゃくはっ！」
1550 = "「Fufu-n, uki mo koebi mo~, ikada——\nkokaku mo kyaku mo kyaku mo kyuku kyaku ha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くおっ！」
1520 = "「Kuo!」"
# monologue
# JP: 早口言葉の舌と唇の小さな動きに亀頭がぴちぴち刺激され、\n小魚たちにつつかれてるようなじれったい快感に包まれる。
2065 = "Những chuyển động nhỏ của lưỡi và môi khi đọc líu lưỡi kích thích quy đầu liên tục,\ntôi chìm trong khoái cảm râm ran như bị bầy cá nhỏ rỉa."
# 【双鉄】
# display as 雙鐵
# JP: 「これ、は――」
1856 = "「Cái này, là——」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？　順番」
1747 = "「Nagi? Đến lượt chị」"
# 【凪】
# display as 凪
# JP: 「ぷあっ！　もうばいっ？」
1525 = "「Pua! Nhanh thế?」"
# 【ふかみ】
# display as 深美
# JP: 「だって凪ちゃん、目的変わっちゃってるんだもん。\n双鉄おにいさん、焦れったそうでかわいそう」
1701 = "「Tại vì Nagi thay đổi mục đích mất rồi mà.\nAnh Soutetsu trông sốt ruột tội nghiệp quá kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 1584 = "「啊」" 
# monologue
# JP: 確かに最初は慣れぬ快感に喜んだ――が、\n舌先と唇だけの刺激は、いまいち決定力に乏しくもあり
2208 = "Đúng là lúc đầu tôi thấy thích thú với khoái cảm lạ lẫm này——nhưng,\nchỉ kích thích bằng đầu lưỡi và môi thì vẫn còn thiếu tính quyết định."
# 【ふかみ】
# display as 深美
# JP: 「だから、ね？　わたしの順番は～　はむっ――\nん――レルうううううううっ――んっ――んっ！！！」
1776 = "「Thế nên, nhé? Lượt của em là~ Ngoạm——\nƯm——liếm——ưm——ưm!!!」"
# 【凪】
# display as 凪
# JP: 「わ！？　わわわ！？　ふかみちゃん――\nにーさんのおちんちん、全部呑んじゃったと！？」
1528 = "「Wa!? Wawawa!? Fukami——\nnuốt trọn cậu nhỏ của anh Soutetsu luôn rồi á!?」"
# monologue
# JP: ……ぐっぽり収めてくれている。喉まで全部みっちり使い、\nそうしながらも舌は休まず、根本を愛撫してくれて――
992 = "......Em ngậm trọn lấy tôi. Dùng toàn bộ đến tận cổ họng,\ntrong khi đó lưỡi vẫn không ngừng nghỉ, vuốt ve phần gốc——"
# 【ふかみ】
# display as 深美
# JP: 「ずろろおおおおおおおおおおっっっっ！！！！！」
1639 = "「Mút!!!!!」"
# 【凪】
# display as 凪
# JP: 「わ！？　わ！　わ！　わっ！！」
1530 = "「Wa!? Wa! Wa! Wa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「は――ぁっ――」
1570 = "「Ha——a——」"
# monologue
# JP: 亀頭の先っぽギリギリまでが吐き出される。\n唾液に奪われる体温に、そして期待に、勃起が震え――！
2234 = "Nhả ra đến sát tận mép đầu quy đầu.\nSự cương cứng run rẩy trước nhiệt độ cơ thể bị nước bọt cướp đi, và cả sự kỳ vọng——!"
# 【ふかみ】
# display as 深美
# JP: 「ぐぼっ！　じゅぼっ！！！　じりゅりゅっ！　ずぼっ！\nぐぢゅっ！　ぼちゅっ！　ずりゅうっ！　ぐぽっ！！」
1635 = "「Mút! Phập!!! Sột soạt! Phập!\nNhóp nhép! Chụt! Trượt! Mút!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1609 = "「!!!!!!」"
# 【凪】
# display as 凪
# JP: 「ふぁ――あっ――」
# 1570 = "「啊……啊……」" 
# 【ふかみ】
# display as 深美
# JP: 「じゅろおおおおおおおっ！　ずっ！　じりゅっ！\nちゅううううううっ！！！　くりゅん！　きゅぽんっ！」
1638 = "「Mút! Phập! Sột soạt!\nChụt!!! Ngoáy! Tuột!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！！！」
1561 = "「Kuha!!!!!」"
# 【凪】
# display as 凪
# JP: 「っ！！！？」
# 1622 = "「啊？！」" 
# monologue
# JP: 喉まで使って強烈に口全体でしごかれて、亀頭だけ口に\n含まれて、思いっきりにバキュームされて開放される。
2170 = "Được sục mạnh bạo bằng cả khoang miệng đến tận cổ họng, rồi chỉ ngậm mỗi quy đầu,\nmút mát thật mạnh rồi lại nhả ra."
# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ」
1614 = "「Ha, ha, ha, ha」"
# 【凪】
# display as 凪
# JP: 「（ごくっ）――にーさん……\n今の、ふかみちゃんの――おくち、そぎゃん、よかと？」
1880 = "「（Ực）——Anh Soutetsu......\ncái miệng của Fukami vừa nãy——sướng đến, thế sao?」"
# monologue
# JP: 頷くしかない。声が出せない。三人のときに初めて見せた\nふかみの本気の――ねこっかぶりをしてないフェラチオ。
2113 = "Tôi chỉ có thể gật đầu. Không thốt nên lời. Lần đầu tiên khi ở cùng ba người,\nFukami mới bộc lộ kỹ năng khẩu giao thực sự——không hề giấu giếm."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――剥き出しで精液を搾り取りにくるフェラチオだ。\n気持ちよくないわけがない」
1791 = "「Ừm——Một màn khẩu giao phô bày rõ ý đồ vắt kiệt tinh dịch.\nKhông sướng mới là lạ.」"
# monologue
# JP: から、正直に思いを伝える。\n凪の性格――負けず嫌いを考えるなら――
2134 = "Thế nên, tôi thành thật nói lên suy nghĩ của mình.\nNếu xét đến tính cách của Nagi——một cô bé hiếu thắng——"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　凪さま――うちにもそれ！\nそれのやり方――教えてほしかと！！！」
1752 = "「Fukami! Nagi——chỉ cho em với!\nCách làm cái đó——chỉ cho em với!!!」"
# 【ふかみ】
# display as 深美
# JP: 「いいけど、凪ちゃん。ものを教わろうっていうときに、\n『それ』はないんじゃないかなぁ」
1469 = "「Cũng được thôi, Nagi. Nhưng khi muốn học hỏi người khác,\nthì không nên dùng từ 'cái đó' đâu nhỉ.」"
# 【凪】
# display as 凪
# JP: 「はうっ」
1587 = "「Hau」"
# monologue
# JP: 特に三人でいるときには、凪は卑語を避けたがる。\nそれをわかって、僕のため――ふかみは凪を煽ってくれる。
1960 = "Đặc biệt là khi có mặt ba người, Nagi rất hay tránh dùng những từ ngữ thô tục.\nHiểu được điều đó, và cũng vì tôi——Fukami đang khiêu khích Nagi."
# 【凪】
# display as 凪
# JP: 「えと……その――ふぇらち、お――ん――っ！！！\nふかみちゃんのエロいフェラチオ！　教えてばいっ！！」
1495 = "「Ưm......cái đó——khẩu, giao——ưm——!!!\nMàn khẩu giao dâm đãng của Fukami! Chỉ cho em với!!」"
# 【ふかみ】
# display as 深美
# JP: 「うん。わかった。それじゃ凪ちゃん、まずは――\nうん、双鉄お兄さんの、亀頭だけパクってしてあげて？」
1672 = "「Ừm. Chị hiểu rồi. Vậy thì Nagi, trước tiên——\nừm, em ngậm lấy mỗi quy đầu của anh Soutetsu đi?」"
# 【凪】
# display as 凪
# JP: 「わかったと！　はむっ！」
1710 = "「Em hiểu rồi! Ngoạm!」"
# monologue
# JP: 金魚がエサを吸い込むような、ただ単純な口唇愛撫。\nゆえ、期待する。ふかみの指導に。それによる凪の成長に。
2034 = "Chỉ là một màn vuốt ve bằng môi đơn thuần, giống như cá vàng đớp mồi.\nVì vậy, tôi rất kỳ vọng. Vào sự hướng dẫn của Fukami. Và sự trưởng thành của Nagi nhờ điều đó."
# 【ふかみ】
# display as 深美
# JP: 「そしたら、お口の中でベロを左右に動かしてみて、\n双鉄おにいさんのカリ首の下のところ、ゆっくり舐めて」
1816 = "「Sau đó, thử di chuyển lưỡi sang trái phải trong miệng xem,\ntừ từ liếm phần rãnh dưới quy đầu của anh Soutetsu nhé.」"
# 【凪】
# display as 凪
# JP: 「ん……れろおっ――れりゅうっ――レロおっ――\nふっ――んっ――れろおっ――れるううっ――れろおお」
1660 = "「Ưm......liếm——liếm——liếm——\nfu——ưm——liếm——liếm——liếm」"
# 【双鉄】
# display as 雙鐵
# JP: 「……っ――あっ」
1004 = "「......Hự——a」"
# monologue
# JP: 凪の動きはあくまで愚直だ。直線的で、単純で――\nなのに何故だか、いつもより明らかに快感が強い。
2028 = "Chuyển động của Nagi vẫn rất vụng về. Thẳng thắn, đơn giản——\nNhưng không hiểu sao, khoái cảm lại mãnh liệt hơn hẳn bình thường."
# 【凪】
# display as 凪
# JP: 「れおろっ――れるうっ――れおおおっ――れるうっ、\nん、ふっ――」
1645 = "「Liếm——liếm——liếm——liếm,\nưm, fu——」"
# 【ふかみ】
# display as 深美
# JP: 「だめっ！　唾飲んじゃ！　お口の中にためたまま、\n頑張って、おちんちんに沿って舌を伸ばして？」
1382 = "「Không được! Đừng nuốt nước bọt! Cứ ngậm trong miệng,\nrồi cố gắng thè lưỡi miết dọc theo cậu nhỏ xem?」"
# 【凪】
# display as 凪
# JP: 「んぷっ！？　んっ――んっ！　ん～～～～っ――\nれるううううううううううっっっ！！」
1698 = "「Npu!? Ưm——ưm! Ưm~~~~——\nLiếmmmmmm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！　っ――おっ――ぁ！」
1592 = "「A! Hự——o——a!」"
# monologue
# JP: ぬめりが、いつもとまるきり違う。\n僕の勃起の下側を、なめくじが密着しながら這い進む。
2194 = "Sự trơn trượt hoàn toàn khác hẳn mọi khi.\nCảm giác như có một con ốc sên đang áp sát, trườn dọc theo mặt dưới sự cương cứng của tôi."
# 【ふかみ】
# display as 深美
# JP: 「……うふふっ、双鉄おにいさん？\nここから、ですよ？」
1007 = "「......Ufufu, anh Soutetsu?\nBây giờ mới bắt đầu thôi ạ.」"
# monologue
# JP: （もみゅっ）
2312 = "（Nắn）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！」
1562 = "「Nku!」"
# monologue
# JP: ふかみの右手がこっそりと、僕の睾丸を揉みしだく。\n揉みしだきながら、ぐいぐいとおっぱいも押し付けてくる。
2162 = "Bàn tay phải của Fukami lén lút xoa nắn tinh hoàn của tôi.\nVừa xoa nắn, em vừa liên tục ép ngực vào tôi."
# 【ふかみ】
# display as 深美
# JP: 「そうしたら、舌を伸ばしたままでぐいって、おちんちん、\nお口にいっぱい、できるだけ深く入れてあげて？」
1815 = "「Sau đó, em cứ giữ nguyên lưỡi như vậy rồi đẩy mạnh tới,\nngậm cậu nhỏ vào miệng càng sâu càng tốt nhé?」"
# 【凪】
# display as 凪
# JP: 「んっ――ふっ――じゅろっ――にぢゅっ――ヂュっ――\nじゅろっ――りゅじゅうううっ――（こつ）――んっ！」
1659 = "「Ưm——fu——mút——nhóp nhép——chụt——\nmút——sột soạt——（Cộc）——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっっ！」
# 1520 = "「哇！」" 
# 【ふかみ】
# display as 深美
# JP: 「がんばったね？　凪ちゃん。でも残念。\n双鉄おにいさんのおちんちん、まだちょっとお口の外」
1845 = "「Cố gắng lắm rồi nhỉ? Nagi. Nhưng tiếc quá.\nCậu nhỏ của anh Soutetsu vẫn còn một chút ở ngoài miệng kìa.」"
# 【凪】
# display as 凪
# JP: 「んっ！！！」
1666 = "「Ưm!!!」"
# monologue
# JP: 当然だ。凪の口はふかみの口より小さいつくりだ。\nけれどその分密着感が強く。口内温度も高くて心地いい。
2227 = "Đương nhiên rồi. Miệng Nagi nhỏ hơn miệng Fukami mà.\nNhưng bù lại cảm giác áp sát lại mạnh hơn. Nhiệt độ trong khoang miệng cũng cao hơn nên rất dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「な、ぎ――ふかみ。これ以上、無理をすることは、ない。\nというか、僕は――このまま――され、るとっ」
1417 = "「Na, gi——Fukami. Không cần, phải cố quá sức đâu.\nNói đúng hơn thì, anh——nếu cứ tiếp tục——thế này, thì」"
# 【ふかみ】
# display as 深美
# JP: 「だって？　凪ちゃん。どうしよう？\nこのままちゃぷちゃぷ、浅ぁいフェラチオで」
1831 = "「Anh ấy nói vậy kìa? Nagi. Tính sao đây?\nCứ tiếp tục chóp chép, khẩu giao nông choèn thế này nhé.」"
# 【凪】
# display as 凪
# JP: 「んーっ！！！！！」
1555 = "「Ưm!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1562 = "「唔！」" 
# 【ふかみ】
# display as 深美
# JP: 「そうだよねー、ぜぇんぶ呑んであげたいよねー」
1787 = "「Đúng vậy nhỉ, em muốn nuốt trọn toàn bộ mà nhỉ.」"
# monologue
# JP: （さわっ、さす――もみゅ、もみゅっ）
2332 = "（Chạm nhẹ, vuốt——nắn, nắn）"
# monologue
# JP: 僕の睾丸を絶妙の弱さで弄びつつ、\nごくごく自然に煽る言葉で、ふかみは凪を駆り立てる。
2151 = "Vừa trêu đùa tinh hoàn của tôi với một lực nhẹ nhàng tuyệt diệu,\nFukami vừa dùng những lời lẽ khích tướng cực kỳ tự nhiên để thúc đẩy Nagi."
# 【ふかみ】
# display as 深美
# JP: 「あのね？　双鉄おにいさんのおっきなおちんちんを\nぜぇんぶ呑んであげるには――お喉をつかうの」
1829 = "「Này nhé? Để nuốt trọn cậu nhỏ to lớn của anh Soutetsu——\nthì phải dùng đến cổ họng cơ.」"
# 【凪】
# display as 凪
# JP: 「んぐっ！　ごきゅ！！！　～～～～～～っ！？」
1563 = "「Ngu! Ực!!! ~~~~~~!?」"
# 【ふかみ】
# display as 深美＆雙鐵
# JP: 「え！？　うそっ！！？」\n「ぁっ――かっ――～～～～～っ！！！？」
1537 = "「Hả!? Đùa sao!!?」\n「A——kha——~~~~~!!!?」"
# monologue
# JP: 全部いかれた。全部呑まれた。ごくりと喉が大きく動き、\nその瞬間に今までに無い深さま、でっ！！？
2140 = "Vào hết rồi. Bị nuốt trọn rồi. Cổ họng ực một cái chuyển động mạnh,\nkhoảnh khắc đó, một độ sâu chưa từng có, hự!!?"
# 【凪】
# display as 凪
# JP: 「んぐっ！？　ごきゅっ――ん、がっ――んえっ！？」
1568 = "「Ngu!? Ực——ưm, ga——nge!?」"
# monologue
# JP: 射精せよ。猛烈な欲求が命令が勃起から駆け上がってくる。\nえづいて咽てヒクつき締める喉の動きが痙攣が――
1957 = "Hãy xuất tinh đi. Một dục vọng, một mệnh lệnh mãnh liệt trào dâng từ sự cương cứng.\nChuyển động co thắt, nôn ọe, nghẹn ngào của cổ họng, sự co giật ấy——"
# monologue
# JP: （これ、は――子宮口の扉を仮に無理にこじ開けたのなら、\nその先にある締付けは、密着感は圧迫感は、きっとこの）
2347 = "（Cái này, là——Giả sử nếu cố tình cạy mở cánh cửa tử cung,\nthì sự siết chặt, cảm giác áp sát, cảm giác áp bức phía sau đó, chắc chắn cũng giống thế này）"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！？　無理しちゃだめ！　喉から出して」
1740 = "「Nagi!? Đừng cố quá! Nhả ra khỏi họng đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
# 1622 = "「啊？！」" 
# 【凪】
# display as 凪
# JP: 「うえっ――えっ！　がっ――ぐっ！！」
1680 = "「Ue——e! Ga——gu!!」"
# monologue
# JP: ふかみの声が強烈すぎる快感に麻痺してた脳を呼び覚ます。\n凪は明らかに苦しんでいて、自力で解決できぬ様子――！
2177 = "Giọng nói của Fukami đánh thức bộ não đang tê liệt vì khoái cảm quá đỗi mãnh liệt của tôi.\nNagi rõ ràng đang rất đau đớn, có vẻ như em không thể tự mình giải quyết được——!"
# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！　すまんっ！！！！」
1447 = "「Nagi! Xin lỗi!!!!」"
# monologue
# JP: （ぼっ！　ずるうううううううううううううっっっ！！）
2316 = "（Bộp! Tuộtttttt!!）"
# 【凪】
# display as 凪
# JP: 「～～～～～～～～～～～～～～～～～～～～っ！！！」
1566 = "「~~~~~~~~~~~~~~~~~~~~!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1527 = "「Kua!!!」"
# monologue
# JP: 真空ポンプから剥がしたような強烈すぎる快感と、\n終わらぬほどに長く感じる甘くざらつく逆剃り感と！
2102 = "Một khoái cảm quá đỗi mãnh liệt như bị lột ra khỏi máy bơm chân không,\ncùng với cảm giác cạo ngược ngọt ngào, thô ráp kéo dài tưởng chừng như vô tận!"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！！？」
1750 = "「Nagi!!?」"
# 【凪】
# display as 凪
# JP: 「ひぐっ！　んっ！　ぐっ！」
1564 = "「Higu! Ưm! Gu!」"
# monologue
# JP: いまがその時と鈴口に殺到してくる精液たちを\n奥歯と肛門をぎゅうっと締めて必死に抑え込みっ
2117 = "Tôi nghiến chặt răng hàm và thít chặt hậu môn,\nliều mạng kìm nén dòng tinh dịch đang ồ ạt chực trào ra khỏi lỗ sáo."
# monologue
# JP: （ずぼっおおお！）
2297 = "（Phụt!）"
# 【凪】
# display as 凪
# JP: 「ぶはっっ！　かはっ！　ごほっ！　げほっ！！\nえうっ！　あっ！　あ～～っ！　はぁっ！　はぁっ！！」
1695 = "「Buha! Kaha! Goho! Geho!!\nEu! A! A~~! Ha! Ha!!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　大丈夫、おちついて？　ね？\nゆっくり、ゆっくり呼吸しようね？　ゆーっくり」
1733 = "「Nagi! Không sao chứ, bình tĩnh lại nào? Nhé?\nTừ từ, hít thở từ từ thôi nhé? Từ~ từ thôi.」"
# 【凪】
# display as 凪
# JP: 「はぁっ！　はあっ！　はあっ！　えふっ！　はっ――\nはぁっ！　――はぁ……ふぅ……はぁ……はぁ……はぁ」
1507 = "「Ha! Ha! Ha! Efu! Ha——\nHa! ——Ha......fu......ha......ha......ha」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪――大丈夫か？」
1413 = "「Nagi——Em không sao chứ?」"
# monologue
# JP: ともかく、凪だ。目の端に浮く涙をそっと拭きとって、\n意識して、ゆっくり落ち着いた声を出す。
2198 = "Dù sao thì, Nagi là ưu tiên hàng đầu. Tôi nhẹ nhàng lau đi những giọt nước mắt đọng nơi khóe mắt em,\ncố gắng giữ giọng nói thật từ tốn và bình tĩnh."
# 【凪】
# display as 凪
# JP: 「えぐ――うっ――ふっ――は――ん……ぁ――う、ん。\n凪さま……平気、ばい！　ちょっと、慌てすぎちゃって」
1679 = "「Egu——u——fu——ha——ưm......a——u, m.\nNagi......không sao, đâu! Chỉ là, hơi luống cuống một chút thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、平気ならばよかった」
1796 = "「Vậy sao, không sao là tốt rồi.」"
# monologue
# JP: 失敗したと、凪が一番強くわかっているはずだ。\nならば僕からそこを蒸し返す必要はない。
2020 = "Chắc hẳn Nagi là người hiểu rõ nhất việc mình vừa thất bại.\nVậy thì tôi không cần thiết phải nhắc lại chuyện đó làm gì."
# 【ふかみ】
# display as 深美
# JP: 「でも、双鉄おにいさん――\n正直、ものすごーく気持ちよかったんじゃないですか？」
1394 = "「Nhưng mà, anh Soutetsu——\nThành thật mà nói, vừa nãy anh sướng vô cùng tận đúng không?」"
# monologue
# JP: （さすっ）
2331 = "（Vuốt nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふくっ！！？」
1567 = "「Fuku!!?」"
# monologue
# JP: タマにわずかに触れられただけで快感の声が漏れ出す。\n凪の瞳がキラン、と輝く。ああ、そうか。
2219 = "Chỉ mới bị chạm nhẹ vào tinh hoàn mà tôi đã rên lên sung sướng.\nĐôi mắt Nagi lóe sáng. À, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「正直恐ろしく気持ちよかった。想像を遥かに上回る――\n射精せねばという思いだけで塗りつぶされる快感だった」
1842 = "「Thành thật mà nói thì sướng đến đáng sợ. Vượt xa trí tưởng tượng của anh——\nMột khoái cảm lấp đầy tâm trí, khiến anh chỉ còn suy nghĩ duy nhất là phải xuất tinh.」"
# 【凪】
# display as 凪
# JP: 「ならっ！！！」
1781 = "「Vậy thì!!!」"
# monologue
# JP: 一瞬にして、凪が元気を取り戻す。ああ、やはり。\n凪に対するふかみのフォローは、余人をもって変えられん。
2031 = "Trong nháy mắt, Nagi đã lấy lại tinh thần. Quả nhiên là vậy.\nSự hỗ trợ của Fukami dành cho Nagi, đúng là không ai có thể thay thế được."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、次のお楽しみにしておこう。ふかみの指導に、\n今度は落ち着いてしたがって、徐々に、じわじわ」
1855 = "「Chuyện đó, hãy để dành cho lần sau nhé. Lần tới,\nhãy bình tĩnh làm theo sự hướng dẫn của Fukami, từ từ, từng bước một.」"
# monologue
# JP: （びくんっ）
2313 = "（Giật mình）"
# 【凪】
# display as 凪
# JP: 「わおっ！」
# 1520 = "「哇！」" 
# monologue
# JP: 想像だけで、勃起が跳ねて暴れてしまう。\nあの窮屈な喉奥が、僕を受け入れてくれたのならば――
1982 = "Chỉ mới tưởng tượng thôi mà sự cương cứng đã giật nảy lên dữ dội.\nNếu như sâu trong cuống họng chật hẹp ấy, thực sự đón nhận tôi thì——"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、双鉄おにいさんのおちんちんも、そのときの\nこと、とっても楽しみにしてますね？　（ぺろっ）」
1689 = "「Ufufu, cậu nhỏ của anh Soutetsu,\ncũng đang rất mong chờ lúc đó đúng không? （Liếm nhẹ）」"
# 【双鉄】
# display as 雙鐵
# JP: 「っぐ！！」
1565 = "「Gu!!」"
# monologue
# JP: ふざけたような一舐めにさえ危うく射精を強いられかける。
2226 = "Chỉ một cái liếm trêu đùa thôi cũng suýt chút nữa ép tôi xuất tinh."
# 【凪】
# display as 凪
# JP: 「ならなら凪さま！　お喉を覚えるのは次にするばい！\nで――にーさん。今は、どぎゃんして射精したかと？」
1867 = "「Vậy thì vậy thì Nagi! Sẽ để dành việc học cách dùng họng cho lần sau!\nThế——anh Soutetsu. Bây giờ, anh muốn xuất tinh như thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「おまんこですか？　おしりですか？　それとも――\nあ！　たまにはダブルパイズリとかも」
1760 = "「Vào cô bé ạ? Hay vào lỗ hậu? Hay là——\nA! Thỉnh thoảng làm cú kẹp ngực kép cũng được đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1374 = "「Không.」"
# monologue
# JP: どの提案も魅力的すぎ、脳が混乱しかけてしまう。\nゆえ、戻す。混乱前の落ち着きと幸せへ巻き戻す。
2146 = "Đề xuất nào cũng quá hấp dẫn, khiến não tôi như muốn rối loạn.\nThế nên, tôi phải quay lại. Tua ngược về sự bình tĩnh và hạnh phúc trước khi hỗn loạn."
# 【双鉄】
# display as 雙鐵
# JP: 「二人揃ってのフェラチオで、せっかくならば射精したい。\n……『常識的に』『考えて』」
1871 = "「Đã cất công được cả hai em khẩu giao cùng lúc, anh muốn xuất tinh luôn.\n......'Theo lẽ thường' (Joushikiteki ni) mà 'Nghĩ' (Kangaete).」"
# 【凪】
# display as 凪
# JP: 「あ！」
# 1589 = "「啊！」" 
# 【ふかみ】
# display as 深美
