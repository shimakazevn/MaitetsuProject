1794 = "「Đúng vậy nhỉ~, Khẩu giao kép JK hiện dịch mà lại!\nUfufufu! Nếu vậy thì, nhỉ? Nagi!」"
# 【凪】
# display as 凪
# JP: 「うん！　ふかみちゃん！！」
1665 = "「Ừm! Fukami!!」"
