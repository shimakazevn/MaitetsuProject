# monologue
# JP: ふかみの明らかに感じてる声。腰が止まる。\n恐らくふかみがたらした舌を、凪は舐め上げたのだろう。
2188 = "Rõ ràng là giọng nói sung sướng của Fukami. Hông em dừng lại.\nCó lẽ Nagi đã liếm lấy chiếc lưỡi mà Fukami thè ra."
