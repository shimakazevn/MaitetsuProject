# monologue
# JP: 間髪入れず、なんら迷いなく頷ける。
2131 = "Tôi gật đầu ngay tắp lự, không chút do dự."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみも凪も似合っているし大変かわいい。\nいや、かわいいというのとは少し違うか――」
1400 = "「Cả Fukami và Nagi đều rất hợp và cực kỳ đáng yêu.\nÀ không, dùng từ đáng yêu thì có vẻ hơi sai sai——」"
# 【凪】
# display as 凪
# JP: 「えーーーーーっ！」
1377 = "「Ểeeeee!」"
# monologue
# JP: 凪のほっぺがぷうとふくれて、焼き餅のような丸みに――\nああ！　なんだ。だからヤキモチは焼き餅なのか。
2009 = "Má Nagi phồng lên, tròn vo như chiếc bánh nướng Yakimochi——\nA! Ra là vậy. Hèn gì ghen tuông (Yakimochi) lại đồng âm với bánh nướng (Yakimochi)."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん？　かわいくないって意味じゃないと思うよ？\nだって凪ちゃん、こんなにかわいらしいんだし」
1749 = "「Nagi? Chị nghĩ ý anh ấy không phải là không đáng yêu đâu?\nBởi vì Nagi trông đáng yêu thế này cơ mà.」"
# monologue
# JP: （つんっ）
2307 = "（Chọc!）"
# 【凪】
# display as 凪
# JP: 「ひゃうっ！」
1476 = "「Hyau!」"
# monologue
# JP: くだらぬ感慨にふける間に、\n凪とふかみはベタベタいちゃいちゃしはじめる。
2086 = "Trong lúc tôi đang chìm đắm trong những cảm xúc vô bổ,\nNagi và Fukami bắt đầu dính lấy nhau trêu đùa."
# 【凪】
# display as 凪
# JP: 「そ、そぎゃん言われると恥ずかしかと！\nふかみちゃんの方が、凪さまの百倍かわいいけん」
1854 = "「Bị, bị nói vậy ngại lắm!\nFukami dễ thương gấp trăm lần Nagi cơ.」"
# 【ふかみ】
# display as 深美
# JP: 「そんなことない。方向性が違うだけでかわいさはきっと\n同じくらいか、凪ちゃんが上。ね？　双鉄おにいさん」
1759 = "「Không có đâu. Chỉ là hướng đi khác nhau thôi, độ đáng yêu chắc chắn\nlà ngang nhau, hoặc Nagi nhỉnh hơn. Đúng không? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1663 = "「Ừm.」"
# monologue
# JP: これも再び、迷うことなく頷ける。
2111 = "Tôi lại một lần nữa gật đầu không chút do dự."
# 【双鉄】
# display as 雙鐵
# JP: 「でなければ、ふたりをともに伴侶にと――\n贅沢で困難な決断を、僕は下せなかったろう」
1378 = "「Nếu không thì, anh đã chẳng thể đưa ra quyết định——\nchọn cả hai làm bạn đời, một quyết định xa xỉ và khó khăn đến vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「ほらね？　凪ちゃん」
1828 = "「Thấy chưa? Nagi.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃあん」
1751 = "「Fukamiiii」"
# monologue
# JP: 嬉しさいっぱいの凪の頬ずり。未だあどけなささえ感じる。\n受けるふかみの微笑みからは、母性に近いものを覚える。
2035 = "Nagi cọ má đầy vẻ sung sướng. Tôi vẫn cảm nhận được nét ngây thơ của em.\nNụ cười đáp lại của Fukami lại mang đến cảm giác gần gũi với tình mẫu tử."
# 【凪】
# display as 凪
# JP: 「ん？！　んんんっ！　ふかみちゃぁん、これ！」
1678 = "「Ưm?! Ưm! Fukami, nhìn này!」"
# 【ふかみ】
# display as 深美
# JP: 「あ……（くんくんっ――くん、くんっ――）\nふぁ……双鉄おにいさんの、勃起の匂い」
1583 = "「A......（Khịt khịt——khịt, khịt——）\nFua......Mùi cương cứng của, anh Soutetsu.」"
# 【凪】
# display as 凪
# JP: 「匂い！？　凪さま見た目がふっくらしてきたって\n思うたばってん――勃起、匂うと！？」
1501 = "「Mùi á!? Nagi chỉ thấy nó phồng lên thôi\nmà——Cương cứng, có mùi sao!?」"
# 【ふかみ】
# display as 深美
# JP: 「匂うよ？　凪ちゃん。目を閉じて、こころを開いて、\n鼻に神経を集中させて～（くんくん――くんくん）」
1832 = "「Có mùi mà? Nagi. Nhắm mắt lại, mở rộng tâm hồn,\ntập trung tinh thần vào mũi xem~（Khịt khịt——khịt khịt）」"
# 【凪】
# display as 凪
# JP: 「目ばとじて、こころば開いて～神経ば鼻に集中させて\n……（くん――くん――くん、くんっ）――あ！！」
1868 = "「Nhắm mắt lại, mở rộng tâm hồn~ tập trung tinh thần vào mũi\n......（Khịt——khịt——khịt, khịt）——A!!」"
# 【ふかみ】
# display as 深美
# JP: 「ね！？」
1785 = "「Đúng không!?」"
