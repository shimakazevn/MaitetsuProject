1987 = "Chẳng cần hai em ấy chỉ ra. Dù cách một lớp vải cũng đủ thấy rõ,\ntôi đã hoàn toàn cương cứng——bị hai em ấy làm cho cương cứng."
# 【凪】
# display as 凪
# JP: 「ふふふ～ん」
1548 = "「Fufufu~n」"
# 【ふかみ】
# display as 深美
