1685 = "「Ufufu, Nagi nè, chúng ta cùng nhau liếm cho anh ấy nhé?\nTrước tiên là từ phần rãnh dưới quy đầu」"
# 【凪】
# display as 凪
# JP: 「りょーかいばい！」
1709 = "「Rõ rồi!」"
# 【ふかみ】
# display as 深美
# JP: 「れろっ――れるっ――くりゅっ――くりゅんっ――\nちゅ――ぺろっ――ん……れるうっ――れろ、れりゅっ」
1630 = "「Liếm——liếm——ngoáy——ngoáy——\nchụt——liếm——ưm......liếm——liếm, liếm」"
# monologue
# JP: 右半分のカリクビ下は、ふかみの舌にほじられる。\n固くとがらせた舌先で、丁寧に丁寧に舐めこそげてくる。
2044 = "Nửa rãnh quy đầu bên phải đang bị lưỡi của Fukami miết lấy.\nĐầu lưỡi làm cứng và nhọn lên, cẩn thận, vô cùng cẩn thận liếm láp."
# 【凪】
# display as 凪
# JP: 「んちゅっ――ちゅうっ――ちゅうっ――べちゅっ――\nん……りゅうう――ぢゅりゅううう――べちゅううっ」
1642 = "「Ưm chụt——chụt——chụt——chụt——\nưm......liếm——liếm——chụt」"
