1858 = "「Còn phải hỏi sao!\nLà viết tắt của 'Nữ' (Joshi) 'Kiếm thuật gia' (Kenjutsuka) đó!」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
1584 = "「A」"
