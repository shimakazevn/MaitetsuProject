1640 = "「Chụt——chụt——nhóp nhép——nhóp nhép——\nchụt——nhóp nhép——sột soạt——liếm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ――ああっ――きもち、いいっ」
1576 = "「A——aa——sướng, quá」"
# monologue
# JP: 喉から溢れた正直すぎる感想に、\nふかみの瞳がくすっと笑う。
2212 = "Trước lời nhận xét quá đỗi thật thà thốt ra từ miệng tôi,\nđôi mắt Fukami ánh lên nụ cười khúc khích."
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、よっぽど気に入ったんですね。\n現役じぇいけいのダブルフェラチオが」
1682 = "「Ufufu, có vẻ anh rất thích nhỉ.\nMàn khẩu giao kép của JK hiện dịch ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1589 = "「!」"
# monologue
# JP: ダブルフェラチオ――溺れてしまった行為の名前を、\n直接ふかみからぶつけられ、気恥ずかしさが湧いてくる。
2129 = "Khẩu giao kép——Cái tên của hành vi mà tôi đang đắm chìm,\nbị Fukami trực tiếp nói thẳng ra, khiến tôi cảm thấy xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみも――その、現役じぇいけいとやらなのか」
1810 = "「Fukami cũng——là cái, JK hiện dịch gì đó sao」"
# 【ふかみ】
# display as 深美
# JP: 「もちろんです！」
1818 = "「Tất nhiên rồi ạ!」"
# monologue
# JP: 誤魔化しめいた言葉への、思いもかけぬ強い食いつき。
2124 = "Một lời đáp trả mạnh mẽ ngoài sức tưởng tượng cho câu nói mang tính lấp liếm của tôi."
# 【ふかみ】
# display as 深美
# JP: 「わたしだって！　現役ばりばりの！\n『女子』『クマ川くだり船頭』ですから！」
1763 = "「Bởi vì em! Cũng là 'Nữ' (Joshi) 'Người lái đò xuôi dòng Kumagawa' (Kumagawa kudari sendo) hiện dịch 100% mà!」"
# 【凪】
# display as 凪
# JP: 「わおわお！　かっこよかばい！！！」
1517 = "「Waowao! Ngầu quá đi!!!」"
# 【ふかみ】
# display as 深美
# JP: 「えへへ～！　ありがと凪ちゃん！」
1690 = "「Ehehe~! Cảm ơn Nagi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕も現役じぇいけいだ」
1866 = "「Nếu vậy thì, anh cũng là JK hiện dịch đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「え！？」
1622 = "「Hả!?」"
# 【凪】
# display as 凪
# JP: 「にーさんがばい！？」
1703 = "「Anh Soutetsu á!?」"
# monologue
# JP: ふたりのじゃれあいは可愛らしいが\nすでにガチガチな僕の勃起を仲間外れにはしてほしくない。
2064 = "Hai em ấy đùa giỡn với nhau thật đáng yêu,\nnhưng tôi không muốn sự cương cứng đã cứng ngắc của mình bị cho ra rìa đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「今まさに、ばりばり現役の現在進行系で。僕は――\n『じゅんばんに』『咥えてほしい』と願っている」
1771 = "「Ngay lúc này, ở thì hiện tại tiếp diễn 100% hiện dịch. Anh——\nđang khao khát được hai em 'Lần lượt' (Junban ni) 'Ngậm lấy' (Kuwaete hoshii).」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1589 = "「啊！」" 
# 【凪】
