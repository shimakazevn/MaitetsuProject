2222 = "Vừa dứt lời, hai cô gái lập tức trao nhau ánh mắt——"
# 【ふかみ】
# display as 深美＆凪
# JP: 「れりゅううううううううううううううううっっっ！」\n「べろおおおおおおおおおおおおおおおおおっっ！！」
# 1633 = "「啾！」\\n「啾！」" 
# monologue
# JP: ディープキス！　僕のカリ首を中心軸に、ふかみと凪は\nベロとベロとを絡み合わせて締め付け這わせて――
2063 = "Một nụ hôn sâu! Lấy quy đầu của tôi làm trục trung tâm, Fukami và Nagi\nquấn lấy lưỡi của nhau, siết chặt và trườn lên——"
# monologue
