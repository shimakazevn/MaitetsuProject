# JP: そうして左半分は凪に吸われてべっとり舌で這い回られる。\n密着している熱いべろが、カリ首に沿ってゆるゆる蠢く。
2211 = "Còn nửa bên trái thì bị Nagi mút mát và trườn lưỡi liếm ướt đẫm.\nChiếc lưỡi nóng rực áp sát, chậm rãi ngọ nguậy dọc theo quy đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「う……ぁ」
1558 = "「Ư......a」"
# 【ふかみ】
# display as 深美
# JP: 「れろっ――くりゅっ――れろっ――つうぅぅぅぅっ――\nれるうっ――れろっ！　――れりゅつっ――くちゅっ！」
1641 = "「Liếm——ngoáy——liếm——mút——\nliếm——liếm! ——Liếm——nhóp nhép!」"
# 【双鉄】
# display as 雙鐵
# JP: 「く――ァっ――は……」
1557 = "「Hự——a——ha......」"
# 【凪】
# display as 凪
