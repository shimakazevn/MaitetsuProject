# monologue
# JP: ふかみが甘えた、おねだりするときの声を出す。
2178 = "深美的聲音很甜，這是她索求什麼東西時發出的聲音。" 

# 【ふかみ】
# display as 深美
# JP: 「ほんとに、わたしに――その――おちんちん……\n双鉄おにいさんに、借りて――挿入、したい、の？」
1406 = "「你真的……想借……那個……雞雞……借雙鐵哥哥的雞雞……插我嗎？」" 

# monologue
# JP: ……やめて欲しいの意図であろうが、逆効果すぎる。\n例え女性であろうとも――この色気では、勃起する。
996 = "……我知道她是打算阻止凪，但這樣只會適得其反。即使凪是女孩，看到這麼誘人的深美，肯定也會勃起。" 

# 【凪】
# display as 凪
# JP: 「もっちろんばい！！！」
1819 = "「當然咧！！！」" 

# 【ふかみ】
# display as 深美
# JP: 「な、凪ちゃ――きゃっ！？」
1730 = "「小、小凪……呀？！」" 

# monologue
# JP: ふかみと体勢を入れ替えるべく抱きついて、\nそうして凪は凪らしい、いたずらっぽい笑顔を見せる。
2022 = "凪抱住深美，和她交換了姿勢，露出了自己特有的惡作劇般的笑容。" 

# 【凪】
# display as 凪
# JP: 「『冗談じゃ』『こぎゃんこついえんばい！』」
998 = "「“開玩笑”“怎麼可能說這種話”！」" 
