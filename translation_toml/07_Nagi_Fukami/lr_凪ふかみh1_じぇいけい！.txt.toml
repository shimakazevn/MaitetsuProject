1627 = "「A!? Fukami ăn gian quá!!\nƯm——liếm! Liếm——chụt——liếm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――」
1571 = "「A——a——」"
# 【ふかみ】
# display as 深美
