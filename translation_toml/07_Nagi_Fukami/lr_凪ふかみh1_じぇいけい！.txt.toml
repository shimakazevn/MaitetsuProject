# 2302 = "（咻！咻！咻！咻！）" 
# monologue
# JP: 射精している。ぶっかけている。凪に、ふかみに――\n口と顔に留まらず、髪にまで派手にひっかけている。
2119 = "Tôi đang xuất tinh. Bắn tung tóe. Lên Nagi, lên Fukami——\nKhông chỉ dính trên miệng và mặt, mà còn vương vãi khắp cả lên tóc hai em."
