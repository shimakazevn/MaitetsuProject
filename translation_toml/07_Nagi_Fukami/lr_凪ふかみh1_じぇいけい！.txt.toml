# 1622 = "「啊？！」" 
# monologue
# JP: 胸元をあけ、脇を持ち上げ、ふかみが、凪が、それぞれ\n汚れをチェックする。心配が、すぐさま欲望と入れ替わる。
2062 = "Fukami và Nagi lần lượt vạch ngực áo, nâng nách lên\nđể kiểm tra xem có bị bẩn không. Nỗi lo lắng ngay lập tức bị thế chỗ bởi dục vọng."
# 【双鉄】
# display as 雙鐵
# JP: 「お互い同士、より確認しやすい姿勢を取ったほうがいい。\n下半身の方は、僕がチェックを手伝おう」
1399 = "「Hai em nên lấy tư thế dễ kiểm tra cho nhau hơn đi.\nPhần thân dưới thì để anh giúp kiểm tra cho.」"
# 【凪】
# display as 凪
# JP: 「どぎゃん姿勢が確かめやすかと？」
1388 = "「Tư thế nào thì dễ kiểm tra?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、うふふ。そういうことですねぇ。わかりました。\nえっとね？　凪ちゃん、多分――――――こうっ！？」
1616 = "「A, ufufu. Ra là vậy nhỉ. Em hiểu rồi.\nƯm nè? Nagi, chắc là——————thế này!?」"
# 【凪】
# display as 凪
# JP: 「って、ふかみちゃん！？\nどぎゃんして脱ぐばい脱がすばいっ！？　わわっ！！？」
1655 = "「Ơ kìa, Fukami!?\nSao tự dưng lại cởi ra rồi lột đồ em ra thế!? Wawa!!?」"
# monologue
# JP: （とさっ）
2333 = "（Bịch）"
# monologue
# JP: ふかみと凪がもつれ倒れる。\nあまりにいやらしい光景に、ほとんど感動させられる。
2155 = "Fukami và Nagi quấn lấy nhau ngã xuống.\nMột khung cảnh quá đỗi dâm đãng, khiến tôi gần như cảm động."
# 【双鉄】
# display as 雙鐵
# JP: 「凄いな。僕が思い描いていた体位より数段エロい」
1708 = "「Tuyệt thật. Dâm đãng hơn gấp mấy lần tư thế mà anh tưởng tượng luôn.」"
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、そうなんですか？」
1693 = "「Ufufu, vậy sao ạ?」"
# 【凪】
# display as 凪
# JP: 「あう～　パンツまで脱がされたばい。\nふかみちゃん……ちょっとエロエロすぎばい」
1588 = "「Au~ Bị lột cả quần lót luôn rồi.\nFukami......cậu hơi bị dâm quá rồi đó.」"
# 【ふかみ】
# display as 深美
# JP: 「そんなの――\n双鉄おにいさんと凪ちゃんが悪いんだよ？」
1853 = "「Chuyện đó——\nlà tại anh Soutetsu và Nagi cả mà?」"
# 【凪】
# display as 凪
# JP: 「ふえっ！？」
1539 = "「Huể!?」"
# monologue
# JP: エロエロと指摘されても、もはやふかみはテンパらない。
2036 = "Dù bị chỉ trích là dâm đãng, Fukami giờ đây cũng chẳng hề bối rối."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、こおんなエッチなおちんちんに、\nわたしたち、毎晩毎晩ずぼずぼされちゃってるんだし」
1765 = "「Đêm nào chúng ta cũng bị cậu nhỏ dâm đãng thế này của anh Soutetsu,\nđâm phập phập vào người cơ mà.」"
# monologue
# JP: （すりっっ、すりっ）
2328 = "（Cọ cọ, cọ cọ）"
# 【双鉄】
# display as 雙鐵
# JP: 「うっ！」
# 1562 = "「唔！」" 
# monologue
# JP: ふりむいて位置を確認することもなく、\nふかみの腰は正確に、おまんこと勃起をこすり合わせる。
2167 = "Chẳng cần quay lại xác nhận vị trí,\nhông của Fukami vẫn cọ xát cô bé và sự cương cứng của tôi một cách chuẩn xác."
# 【ふかみ】
# display as 深美
# JP: 「それにぃ。凪ちゃんだって、こぉんなにエッチに\nかわいいお顔に、体に成長しちゃってぇ」
1827 = "「Hơn nữa nhé. Nagi cũng đã trưởng thành\nvới khuôn mặt và cơ thể đáng yêu, dâm đãng thế này rồi mà.」"
# monologue
# JP: （ふにゅっ！）
2343 = "（Áp sát!）"
# 【凪】
# display as 凪
# JP: 「ひゃっ！？　ふ、ふかみちゃん！　ち、乳首っ！\nん――乳首と乳首、ぴったりくっつけたら、ダメ、ばい」
1490 = "「Hya!? F, Fukami! Nh, nhũ hoa!\nƯm——đừng ép chặt nhũ hoa vào nhau như thế, không được, đâu」"
# 【ふかみ】
# display as 深美
# JP: 「あ、そうなんだ。ごめんね？　凪ちゃん。\nそれじゃあぴったりくっつけないで～　こう、とか？」
1618 = "「A, ra vậy. Xin lỗi nhé? Nagi.\nVậy thì không ép chặt nữa~ Thế này, được không?」"
# monologue
# JP: （ふにゅんっ！　すうっ――くりゅん！　すりっ――）
2342 = "（Áp sát! Rút ra——ngoáy! Cọ cọ——）"
# 【凪】
# display as 凪
# JP: 「く、くっつけたり離したり――んっ――ぁっ――\nすりすり――したり、するのも――するの、も――ぁ！」
1453 = "「Đ, đừng có lúc ép vào lúc tách ra——ưm——a——\ncả cọ cọ——như thế——như thế, nữa——a!」"
# 【ふかみ】
# display as 深美
# JP: 「そんなに大きなお口あけたら、双鉄おにいさんの精液、\nお口の中にこぼれていっちゃうよ？――ん……ぺろっ」
1402 = "「Cậu mở miệng to thế kia, tinh dịch của anh Soutetsu,\nsẽ chảy vào trong miệng mất đấy? ——Ưm......liếm」"
# 【凪】
# display as 凪
# JP: 「ふぁっ――ふかみちゃん――ふかみちゃんのお顔も、\nにーさんの精液――乾いて、カピカピになっちゃうばい」
1512 = "「Fua——Fukami——trên mặt Fukami cũng,\ntinh dịch của anh Soutetsu——khô lại, cứng đơ rồi kìa」"
# 【ふかみ】
# display as 深美
# JP: 「ちゅっ……れる――ん――それはやだなぁ、困っちゃう。\nだから、ね？　凪ちゃんが取ってくれたら、嬉しいな」
1632 = "「Chụt......liếm——ưm——Thế thì chán lắm, rắc rối thật đấy.\nCho nên, nhé? Tớ sẽ rất vui nếu Nagi liếm sạch giúp tớ đó.」"
# 【凪】
# display as 凪
# JP: 「ふぁ――ふかみちゃん、ふかみちゃん……ん……\nちゅっ――れるっ――れろっ――ん――ちゅう――ちゅ」
1513 = "「Fua——Fukami, Fukami......ưm......\nChụt——liếm——liếm——ưm——chụt——chụt」"
# 【ふかみ】
# display as 深美
# JP: 「かわい。凪ちゃん――ちゅっ――れるっ――れろっ――\nちゅむ――ちゅうっ――ぺろっ――れるっ――じゅるっ」
1403 = "「Dễ thương quá. Nagi——chụt——liếm——liếm——\nchụt——chụt——liếm——liếm——mút」"
# 【双鉄】
# display as 雙鐵
# JP: 「……………………っ！！！」
1005 = "「........................!!!」"
# monologue
# JP: いかん、完全に見とれてしまっていた。\nいやむしろ、このまま見ていたい気もするが――
1964 = "Nguy thật, tôi hoàn toàn bị hớp hồn mất rồi.\nÀ không, nói đúng hơn là tôi muốn cứ thế này ngắm nhìn mãi thôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「凪……ふかみの舌にも口内にも、\n精液がこびりついてしまっているぞ？　取ってやらねば」
1416 = "「Nagi......trên lưỡi và trong khoang miệng của Fukami,\ncũng dính đầy tinh dịch kìa? Em phải làm sạch cho cô ấy chứ.」"
# 【凪】
# display as 凪
# JP: 「わかったばい！　ふかみちゃん、ベロだして、ベロ」
1712 = "「Em hiểu rồi! Fukami, thè lưỡi ra đi, thè lưỡi ra.」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　ええっ！？　だって、それって――」
1543 = "「Hả!? Ể!? Nhưng mà, làm thế thì——」"
# monologue
# JP: 予想通り、ふかみが今日初めての動揺を見せてくれる。\n僕の勃起の介在無しでの舌交換は――つまりは、キスだ。
2072 = "Đúng như dự đoán, Fukami đã bộc lộ sự bối rối lần đầu tiên trong ngày hôm nay.\nViệc tráo đổi lưỡi mà không có sự can thiệp của sự cương cứng của tôi——nói cách khác, đó chính là nụ hôn."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ？　凪が待ちくたびれてしまうぞ？」
1812 = "「Fukami? Nagi đợi mỏi cổ rồi kìa?」"
# 【ふかみ】
# display as 深美
# JP: 「ぁ……。はい。です。\n双鉄おにいさんが、そう、いうなら……」
1578 = "「A....... Vâng. Ạ.\nNếu anh Soutetsu, đã nói, vậy thì......」"
# monologue
# JP: ふかみは大きく息を吸い、ゆるゆるとその頭を下げて
2159 = "Fukami hít một hơi thật sâu, từ từ cúi đầu xuống"
# 【ふかみ】
# display as 深美
# JP: 「ん…………」
1556 = "「Ưm............」"
# 【凪】
# display as 凪
# JP: 「ん～～～！　（べちょっ）」
1667 = "「Ưm~~~! （Chụt）」"
# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
1675 = "「!!?」"
# 【凪】
# display as 凪
# JP: 「れるっ――れろっ――れりゅっ――じゅりゅ――\n（こくっ）――ぷは、精液、結構たくさんとね～」
1647 = "「Liếm——liếm——liếm——mút——\n（Ực）——Puha, tinh dịch, nhiều phết đấy nhỉ~」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、凪ちゃん。逆に、わたしも舐め取ってあげる。\nん――」
1746 = "「Nagi, Nagi. Đổi lại, tớ cũng sẽ liếm sạch cho cậu.\nƯm——」"
# 【凪】
# display as 凪
# JP: 「ひゃっ！？　わ――ん――」
1488 = "「Hya!? Wa——ưm——」"
# 【ふかみ】
# display as 深美
# JP: 「れろっ――じゅりゅっ――ぺろっ――れるっ――\nじゅっ――じゅりゅううううう――（こくっ）――ぷぁ」
1643 = "「Liếm——mút——liếm——liếm——\nmút——mútttttt——（Ực）——pua」"
# 【凪】
# display as 凪
# JP: 「ふぁ……あ――あ――ふかみちゃん、\nちょこっと激しく吸いすぎばい」
1510 = "「Fua......a——a——Fukami,\ncậu mút hơi mạnh quá rồi đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「ごめんね？　凪ちゃん。けど――凪ちゃんが。\n凪ちゃんがあんまりかわいくて」
1728 = "「Xin lỗi nhé? Nagi. Nhưng mà——tại Nagi.\nTại Nagi đáng yêu quá cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1589 = "「啊！」" 
# monologue
# JP: 不意に、ひらめく。\n同時に言葉が、喉からほとばしってしまう。
2123 = "Đột nhiên, tôi nảy ra một ý.\nĐồng thời, những lời nói cũng tuôn trào khỏi cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、凪。凪の位置から、僕の勃起は――\nふかみの体とどういう風に、重ねってみえる？」
1450 = "「Nagi, Nagi. Từ vị trí của em, sự cương cứng của anh——\ntrông như thế nào khi xếp chồng lên cơ thể của Fukami?」"
# monologue
# JP: （ぐいっ）
2348 = "（Đẩy tới）"
# 【ふかみ】
# display as 深美
# JP: 「んあっ！？」
# 1622 = "「啊？！」" 
# 【凪】
# display as 凪
# JP: 「にーさんの勃起？　って、わ！？　すごかと！\nふかみちゃんのおちんちんみたいに見えるばい」
1705 = "「Sự cương cứng của anh Soutetsu? Ơ, wa!? Tuyệt quá!\nTrông cứ như là cậu nhỏ của Fukami vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「！！！？」
# 1622 = "「啊？！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1795 = "「Hô.」"
# monologue
# JP: ふかみのスジに勃起をみっちり食い込ませてある。\n予想通りの答えを返され、試した気がより強くなる。
2179 = "Sự cương cứng của tôi đang lún sâu vào rãnh của Fukami.\nNhận được câu trả lời đúng như dự đoán, tôi càng muốn thử nghiệm hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことなのだそうだが、ふかみ。どうだ？\nひととき、僕の勃起をふかみのものとして使ってみんか？」
1830 = "「Nagi nói vậy đấy, Fukami. Em thấy sao?\nCó muốn thử dùng sự cương cứng của anh như đồ của mình một lúc không?」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの勃起を――わたし……（ごくっ）\nわたしの勃起――わたしのおちんちんとして、使う」
1779 = "「Sự cương cứng của anh Soutetsu——em......（Ực）\nSự cương cứng của em——dùng như cậu nhỏ của em, sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。ふかみの勃起だ。\nどう使ってみたい？」
1798 = "「Đúng vậy. Là sự cương cứng của Fukami.\nEm muốn dùng nó thế nào?」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんのお尻を掘ってみたいです！」
1769 = "「Em muốn thông đít anh Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1622 = "「啊？！」" 
# monologue
# JP: 予想もしていなかった即答に、\nタマがきゅきゅっと縮みあがる。
2166 = "Câu trả lời ngay tắp lự ngoài dự đoán,\nkhiến tinh hoàn tôi co rúm lại."
# 【ふかみ】
# display as 深美
# JP: 「けど、双鉄おにいさんのおちんちんを借りてる以上、\nそれは出来ないから……んと……ええと――凪、ちゃん」
1393 = "「Nhưng mà, vì đang mượn cậu nhỏ của anh Soutetsu,\nnên không thể làm thế được......ưm......ờm——Nagi.」"
# 【凪】
# display as 凪
# JP: 「よ、よかよ。おちんちん、にーさんのやけん。\n……ふかみちゃんが、使ってみても――よかよ。うち」
1467 = "「Đ, được thôi. Cậu nhỏ, là của anh Soutetsu mà.\n......Fukami, cứ dùng thử đi——được đó. Em đồng ý.」"
# monologue
# JP: 凪が、照れてる。はにかんでいる。\n自分で言い出したことなのに、僅かな嫉妬を感じてしまう。
2012 = "Nagi đang xấu hổ. Đang bẽn lẽn.\nDù chính tôi là người khơi mào, nhưng lại cảm thấy chút ghen tị."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんにされるエッチなこと――気持ちよかけん。\nふかみちゃんのおちんちんの使い方にも……はうっ」
1841 = "「Bị Fukami làm những chuyện dâm đãng——chắc sướng lắm.\nCả cách Fukami dùng cậu nhỏ nữa......hau」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！！！」
1735 = "「Nagi!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1608 = "「啊！！！」" 
# monologue
# JP: ふかみがぐいと腰を突き出す。が、場所が違う。\nふかみの腰を掴んでおさえて誘導し――
2164 = "Fukami đẩy mạnh hông tới. Nhưng sai chỗ rồi.\nTôi nắm lấy hông Fukami, giữ lại và dẫn đường——"
# monologue
# JP: （ずっ――ぶっ――ううううううううううっっっ！）
2336 = "（Trượt——phập——uuuuuuuuuu!）"
# 【凪】
# display as 凪
# JP: 「ふきゅんっ！！？」
1487 = "「Fukyun!!?」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　凪ちゃん！　凪ちゃん！　凪ちゃん！\nどう！　気持ちいい！？　ね？　気持ちいい？？」
1732 = "「Nagi! Nagi! Nagi! Nagi!\nSao rồi! Sướng không!? Hả? Sướng không??」"
# monologue
# JP: （へこっ――じゅぶっ――へこっ――くちゅっ）
2309 = "（Phập——phập——phập——nhóp nhép）"
# 【凪】
# display as 凪
# JP: 「き……きもちよか……と、よ？　ん……\nきもち、よくない――ことは――なか、ばい」
1837 = "「S......sướng......lắm, đó? Ưm......\nKhông có chuyện——không——sướng, đâu」"
# monologue
# JP: （へこっ！　へこっ！　へこっ！　へこっ！）
2306 = "（Phập! Phập! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「はぁ！　はぁ！　はぁ！　はぁ！　凪ちゃん！\n凪ちゃん！　凪ちゃん、凪ちゃん、凪ちゃん、凪ちゃん」
1599 = "「Ha! Ha! Ha! Ha! Nagi!\nNagi! Nagi, Nagi, Nagi, Nagi」"
# monologue
# JP: 凪に擬似でも挿入している。その興奮が、\nふかみの知性をゼロ以下にしてしまっているのだろう。
2067 = "Dù chỉ là mô phỏng nhưng em đang cắm vào Nagi. Sự hưng phấn đó,\ncó lẽ đã kéo trí tuệ của Fukami xuống dưới mức 0 rồi."
# monologue
# JP: （へこっ！　へこっ！　へこっ！　へこっ！）
# 2306 = "（戳！戳！戳！戳！）" 
# monologue
# JP: 凪の反応を確認しようとする素振りさえ一切見せず、\nふかみはひたすら……へこへこ腰を動かすだけだ。
2068 = "Chẳng hề mảy may để ý đến phản ứng của Nagi,\nFukami cứ mải miết......chuyển động hông phập phập."
