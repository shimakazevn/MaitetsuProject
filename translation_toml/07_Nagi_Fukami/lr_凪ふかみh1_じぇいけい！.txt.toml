# display as 凪
# JP: 「こういう風にべろべろしたり、おっぱいとかおまんこば\nこしゅこしゅしたり――そっちの方がずっと良かとよ！」
1408 = "「Cứ liếm láp thế này, hay là cọ xát ngực\nvà cô bé——như thế sướng hơn nhiều đó!」"
