1611 = "「!!!! J, anh Soutetsu JK——\nĐồng phục......váy......ufufufufu」"
# 【凪】
# display as 凪
# JP: 「願いばかなえてあげるばい！！！　――はぷっ！！」
1723 = "「Thực hiện điều ước đó!!! ——Hapu!!」"
# 【ふかみ】
# display as 深美
