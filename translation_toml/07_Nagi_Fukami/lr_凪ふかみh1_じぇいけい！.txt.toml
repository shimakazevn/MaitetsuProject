# JP: 「はっ！　あ！　挿れられ、ちゃってる――凪ちゃん、に、\n精液、びゅうびゅうっ――した――おちん、ちんっ――」
1601 = "「Ha! A! Bị cắm vào, mất rồi——Cậu nhỏ, vừa mới——\nbắn phụt phụt, tinh dịch——vào, Nagi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ、挿れて――いるっ――」
1789 = "「A, đang cắm vào——đây——」"
# monologue
# JP: （ずううううううっ――じゅぶうううう！　ごちゅっ！）
2314 = "（Trượt——Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゅあああああんっ！？　奥っ！　子宮――\n赤ちゃ！　赤ちゃん、できる、お部屋、ごちゅって！」
1491 = "「Hyuaaaaaan!? Tận cùng! Tử cung——\nEm b! Căn phòng, tạo ra, em bé, bị đâm trúng rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪をっ――受精――させたかも、しれんっ――くっ！\n精液、まみれの――性器をっ――そのっ、ままっ」
1446 = "「Có khi anh——đã làm Nagi——thụ tinh, rồi cũng nên——hự!\nBộ phận sinh dục——đẫm, tinh dịch——cứ thế, mà cắm vào」"
# 【ふかみ】
# display as 深美
# JP: 「妊娠、する、かも。わたし、凪ちゃん、一緒っ――\n一緒に――双鉄、おにいさん、の――同じ、精子、でっ」
1767 = "「Em có thể, sẽ mang thai, mất. Em, và Nagi, cùng nhau——\ncùng nhau——bằng cùng một, tinh trùng——của anh, Soutetsu」"
# monologue
# JP: （きゅうううううううううううっっっっ！！！）
2340 = "（Siết!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！」
# 1526 = "「哇！！」" 
# monologue
# JP: ふかみの子宮がふかみの案を採用しようとしたらしい。\n尿道口の残精液を、一滴残らず貪り呑もうと締めてくる。
2176 = "Tử cung của Fukami dường như định áp dụng phương án của em ấy.\nNó siết chặt lấy lỗ niệu đạo, hòng tham lam nuốt trọn không chừa một giọt tinh dịch còn sót lại nào."
# 【双鉄】
# display as 雙鐵
# JP: 「それほど――貪欲に――もとめず、ともっ――くっ！\n次の――精液が――もうっ――こみ、あげてっ――っ」
1395 = "「Không cần——phải đòi hỏi——tham lam, đến vậy, đâu——hự!\nĐợt tinh dịch——tiếp theo——sắp——trào ra, rồi——」"
# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずばっ！　ぶちゅっ！！）
# 2303 = "（啾！啾！啾！啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「あっ！　ふあっ！　それも！　そっちもっ！！\n新しいのもくださいっ！　わたしのっ――ひゃんっ！？」
1595 = "「A! Fua! Cái đó! Cả cái đó nữa!!\nHãy cho em cả đợt mới đi! Cho em——hyan!?」"
# monologue
# JP: （きゅうううううっ！！！）
2305 = "（Siết!!!）"
# 【凪】
# display as 凪
# JP: 「あ！　凪さまにも出来たとねー」
1606 = "「A! Nagi cũng làm được rồi nè~」"
# monologue
# JP: 急な締め付けに驚き見れば、凪がふかみを下から責めてる。\n懸命に、愚直に単純に勃起乳首を擦り合わせ――
2127 = "Giật mình trước cú siết chặt đột ngột, tôi nhìn xuống thì thấy Nagi đang tấn công Fukami từ bên dưới.\nEm ấy đang ra sức, ngây ngô và đơn thuần cọ xát hai đầu nhũ hoa đang cương cứng vào nhau——"
# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃっ！　ふあっ！　だめっ！\nこれ！　わらひっ！　わたし――感じすぎ――ひゃう！」
1657 = "「Khoan!? Nagi! Fua! Không được!\nThế này! Tớ! Tớ——sẽ sướng quá mất——hyau!」"
# 【凪】
# display as 凪
# JP: 「ふふーん、さっきのおかえしばいっ！」
1554 = "「Fufu-n, trả đũa lúc nãy đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1608 = "「啊！！！」" 
# monologue
# JP: 接合部へと、凪もおまんこをすりつけてくる。\nとたんにふかみの膣内が、蠢きを超えうねりはじめる。
2017 = "Nagi cũng cọ xát cô bé vào phần kết nối của chúng tôi.\nNgay lập tức, bên trong âm đạo của Fukami không chỉ co bóp mà bắt đầu cuộn trào."
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！？　あっ――これっ――やっ――あっ！\nわらひっ――わた、しっ――おかしく――なっちゃうっ」
1532 = "「Fua!? A——cái này——không——a!\nTớ——tớ——sẽ trở nên——kỳ lạ, mất」"
# monologue
# JP: 凪の与えてくる刺激自体は、ふかみのときより単純で。\nそれだけに、三人でセックスしてる実感をより際立てて
2024 = "Kích thích mà Nagi mang lại đơn giản hơn so với lúc của Fukami.\nNhưng chính vì thế, nó càng làm nổi bật cảm giác chân thực rằng ba người chúng tôi đang làm tình."
# monologue
# JP: （うにゅっ！　ごちゅっ！　うぢゅっ！　ずびゅっ！！）
# 2303 = "（啾！啾！啾！啾！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くっ――ぁっ！」
1559 = "「Hự——a!」"
# monologue
# JP: ただでさえ凪のものより熟練してるふかみのおまんこが、\n初めてみれるうねりを加えて締め付けてきて――
2172 = "Cô bé của Fukami vốn dĩ đã điêu luyện hơn của Nagi,\nnay lại cộng thêm những đợt cuộn trào lần đầu tiên xuất hiện, siết chặt lấy tôi——"
# monologue
# JP: （うぎゅっ！　じゅばっ！　ぶびゅっ！！　ごちゅっ！）
# 2303 = "（啾！啾！啾！啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ！　あっ！　あっ！　そうてつ、おにい、\nさっ――わたっ――わた、しっ――わたし、もうっ！！」
1573 = "「Ha——a! A! A! Anh Soutetsu,\nanh——em——em——em, sắp!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あ。僕も、だっ――」
1662 = "「A——a. Anh cũng, vậy——」"
# monologue
# JP: （うびゅっ！　ごちゅっ！　ぶちゅっ！　ずごりゅっ！）
# 2303 = "（啾！啾！啾！啾！）" 
# monologue
# JP: うねり張り付く膣壁を、むりやり剥がし抉じ入れる。\nその最奥の子宮口は、一転甘ぁく亀頭を咥えてっ――
2132 = "Tôi thô bạo lột lớp vách âm đạo đang cuộn trào bám dính lấy mình để cắm sâu vào.\nCửa tử cung nơi sâu nhất ấy lại đột ngột ngọt ngào ngậm lấy quy đầu——"
# monologue
# JP: （ずびゅっ！　じゅばっ！　ぶびゅっ！　ごりゅんっ！）
# 2303 = "（啾！啾！啾！啾！）" 
# 【ふかみ】
# display as 深美
# JP: 「あ！　あ！　イク！　イクっ！　わたし、わたしっ！\nもうっ！　イクっ！　イクっ！　イクっ！！！」
1593 = "「A! A! Ra mất! Ra mất! Em, em!\nKhông chịu nổi nữa! Ra mất! Ra mất! Ra mất!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1609 = "「啊！！！！」" 
# monologue
# JP: （ぶじゅるううううううううぅぅぅぅぅぅぅっっ！！）
# 2326 = "（插！！）" 
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～っ！！！！」
1003 = "「~~~~~~~~!!!!」"
# monologue
# JP: 歯を食いしばる。僕もふかみも。\n子宮口へと亀頭を押し付け、そのタイミングでイクために。
2115 = "Nghiến chặt răng. Cả tôi và Fukami.\nÉp chặt quy đầu vào cửa tử cung, để có thể ra cùng lúc với em."
# monologue
# JP: （ずぼぉぉぉぉぉぉぉぉぉぉぉっ！　ごっ！　りゅっ！）
2323 = "（Phập! Phập! Phập!）"
# 【ふかみ】
# display as 深美
# JP: 「いきゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅんんんっ！！」
1384 = "「Ra mấttttttttttttttttttttt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉうっ！」
1717 = "「Ou!」"
# monologue
# JP: （びゅうううっ！　どびゅっ！　びゅ！　びゅるっ！）
# 2302 = "（咻！咻！咻！咻！）" 
# 【ふかみ】
# display as 深美
# JP: 「ふあっ――あっ――しゅごっ――すごっ――ふあっ！\nしきゅう――たたいて――びゅって――せいえきっ」
1509 = "「Fua——a——tuyệt quá——tuyệt quá——fua!\nTử cung——bị đập vào——bắn phụt phụt——tinh dịch」"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅうっ！　びゅっ！！）
2301 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【ふかみ】
# display as 深美
# JP: 「あつい――あついよぉ――ふあっ――しゅきっ――\nすき、すき――双鉄おにいさん、好き、凪ちゃん、好き」
1714 = "「Nóng quá——nóng quá đi——fua——thích lắm——\nyêu, yêu——yêu anh Soutetsu, yêu Nagi」"
# monologue
# JP: （びゅっ！　ぶびゅっ！　びゅるっ――びゅっ！）
2300 = "（Phụt! Phụt! Phụt——Phụt!）"
# 【ふかみ】
# display as 深美
# JP: 「はぁっ――あっ――あっ――（ごくっ）――んっ――\nおなか――しきゅう――おまんこ――いっぱい――ぁ」
1574 = "「Ha——a——a——（Ực）——ưm——\nbụng——tử cung——cô bé——đầy ắp rồi——a」"
# monologue
# JP: （びゅっ――っびゅうっ――ぶびゅっ――……ぴ……）
# 2298 = "（咻……咻……咻……咻……）" 
# monologue
# JP: 三発目とは思えぬほどに濃厚にねとつく精を吐き。\n僕もふかみもぐったりと――っ！？
2121 = "Tôi bắn ra lượng tinh dịch đặc quánh, dính dớp đến mức khó tin đây là lần thứ ba.\nCả tôi và Fukami đều rã rời——!?"
# 【凪】
# display as 凪
# JP: 「じゃ！　今度は凪さまの番たいね！！」
1719 = "「Vậy thì! Lần này đến lượt Nagi nhé!!」"
# monologue
# JP: ――しかける間もなく、凪が元気に動き始める。
990 = "——Chưa kịp phản ứng, Nagi đã bắt đầu chuyển động đầy năng lượng."
# 【ふかみ】
# display as 深美
# JP: 「ふえっ――えっ！？　こほっ！　けほっ！\nえと、あの――凪ちゃん、番、って？」
1533 = "「Huể——hả!? Khụ! Khụ!\nƯm, à——Nagi, lượt, là sao?」"
# 【凪】
# display as 凪
# JP: 「きまっとるばい！　にーさんのおちんちん、\n凪さまが、凪さまのおちんちんにする順番ばい！」
1859 = "「Còn phải hỏi sao! Là lượt Nagi biến cậu nhỏ của anh Soutetsu,\nthành cậu nhỏ của Nagi đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。確かに」
1674 = "「Ra vậy. Quả thực là thế.」"
# 【ふかみ】
# display as 深美
# JP: 「って！？　双鉄おにいさん！！\nなんで納得してるんですか！？」
1653 = "「Ơ kìa!? Anh Soutetsu!!\nSao anh lại đồng tình thế!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ふかみが擬似で凪に挿入をすませたのだ。\nその反対もしなければ、これは凪に不公平だろう」
1536 = "「Không, Fukami đã cắm mô phỏng vào Nagi rồi mà.\nNếu không làm ngược lại thì sẽ không công bằng với Nagi đâu.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　さっすがにーさん、わかっとるばい！」
1729 = "「Đúng vậy! Quả không hổ danh anh Soutetsu, rất hiểu chuyện!」"
# 【ふかみ】
# display as 深美
# JP: 「って、あの――凪、ちゃん？」
1772 = "「Ơ kìa, à——Nagi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1560 = "「Hửm.」"
# monologue
# JP: ふかみが甘えた、おねだりするときの声を出す。
2178 = "Fukami cất giọng nũng nịu, đòi hỏi."
# 【ふかみ】
# display as 深美
# JP: 「ほんとに、わたしに――その――おちんちん……\n双鉄おにいさんに、借りて――挿入、したい、の？」
1406 = "「Cậu thực sự, muốn cắm——cái đó——cậu nhỏ......\nmượn của anh Soutetsu——vào tớ, sao?」"
# monologue
# JP: ……やめて欲しいの意図であろうが、逆効果すぎる。\n例え女性であろうとも――この色気では、勃起する。
996 = "......Chắc hẳn em ấy có ý muốn Nagi dừng lại, nhưng lại phản tác dụng quá rồi.\nDù có là phụ nữ đi chăng nữa——trước sự quyến rũ này, cũng sẽ cương cứng mất thôi."
# 【凪】
# display as 凪
# JP: 「もっちろんばい！！！」
1819 = "「Đương nhiên rồi!!!」"
# 【ふかみ】
# display as 深美
# JP: 「な、凪ちゃ――きゃっ！？」
1730 = "「N, Nagi——kya!?」"
# monologue
# JP: ふかみと体勢を入れ替えるべく抱きついて、\nそうして凪は凪らしい、いたずらっぽい笑顔を見せる。
2022 = "Nagi ôm chầm lấy Fukami để đổi tư thế,\nrồi nở một nụ cười tinh nghịch mang đậm chất Nagi."
# 【凪】
# display as 凪
# JP: 「『冗談じゃ』『こぎゃんこついえんばい！』」
998 = "「'Đùa thôi' 'Sao em nói thế được!'」"
