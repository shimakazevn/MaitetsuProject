# 凪h1_ふたりっきりのデート.txt 
[info]

[characters]
1349 = "凪"
1441 = "双鉄H"

[character_subs]
# 1349 = "凪"
1708 = "雙鐵"

[script]
# lines: 313 
# 【凪】
# display as 凪
# JP: 「おっでかっけばーい！　おっでかっけばーい！\nにーさんとー、ふーたりっきりのデートばーい！」
1040 = "\"「Đi chơi thôi! Đi chơi thôi! Đi hẹn hò riêng với anh hai thôi nè!」\""
# 【双鉄H】
# display as 雙鐵
# JP: 「確かにデートで、ふたりっきりだが……」
1223 = "\"「Đúng là hẹn hò, và chỉ có hai đứa thôi nhưng mà...」\""
# monologue
# JP: 凪の明るい声を吸うのは、緑の木々と鉄路とだ。\nそれ以外、見渡す限りに何も無い。
1654 = "\"Nơi hút lấy giọng nói vui tươi của Nagi là những tán cây xanh mướt và đường ray. Ngoài ra, phóng tầm mắt ra xa chẳng có gì khác.\""
# 【双鉄H】
# display as 雙鐵
# JP: 「何故に線路沿いなのだ？\n他にももっと、楽しげな場所はいくらもあろう」
1198 = "\"「Tại sao lại đi dọc theo đường ray? Thiếu gì những nơi thú vị khác để đi chứ.」\""
# 【凪】
# display as 凪
# JP: 「にーさんは、相っ変わらず、女心を\nちょっともわかってなかとねー」
1151 = "\"「Anh hai, vẫn chẳng hiểu tâm lý con gái chút nào á~」\""
# monologue
# JP: 余裕たっぷりでいたずらげな笑み。
1401 = "\"Một nụ cười đầy vẻ trêu chọc và tự tin.\""
# monologue
# JP: 凪らしくも無い微妙で大人びた表情に、\nけれども不思議と、『ああ、凪だな』と感じてしまう。
1687 = "\"Một biểu cảm tinh tế và trưởng thành không giống Nagi chút nào, nhưng kỳ lạ thay, tôi lại cảm thấy 'À, đúng là Nagi rồi'.\""
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば教えてくれ凪先生。\nこの光景のどの辺に、女心とやらを楽しませる――」
1215 = "\"「Vậy thì hãy nói cho anh biết đi, Nagi sensei. Quang cảnh này có chỗ nào khiến tâm hồn thiếu nữ vui vẻ——」\""
# 【凪】
# display as 凪
# JP: 「楽しむだけが、デートじゃなかとよ？」
1202 = "\"「Hẹn hò đâu phải chỉ để vui chơi thôi đâu nè?」\""
# monologue
# JP: 僕の言葉を遮って、\n凪の表情がゆるゆる変わる。
1403 = "\"Cắt ngang lời tôi, biểu cảm của Nagi từ từ thay đổi.\""
# monologue
# JP: はにかむような、照れくさそうな……\n実に、女の子らしい柔らかな笑みに。
1468 = "\"Trông có vẻ thẹn thùng, ngượng ngùng... Thực sự là một nụ cười dịu dàng rất ra dáng thiếu nữ.\""
# 【凪】
# display as 凪
# JP: 「思い出をたどるのもまた、デートばい」
1138 = "\"「Ôn lại kỉ niệm cũng là hẹn hò á.」\""
# 【双鉄H】
# display as 雙鐵
# JP: 「思い出？　僕と凪との――っ！」
1214 = "\"「Kỷ niệm? Giữa anh và Nagi——!」\""
# monologue
# JP: 言われて、そうかと思い出す。
1648 = "\"Nghe em ấy nói vậy, tôi mới chợt nhớ ra.\""
# 【双鉄H】
# display as 雙鐵
# JP: 「この先、か」
1159 = "\"「Là phía trước sao.」\""
# 【凪】
# display as 凪
# JP: 「えへへっ、嬉しかぁ。\nにーさん、覚えとってくれたとねー」
1135 = "\"「Ehehe, vui quá.\nAnh hai, vẫn còn nhớ ha~」\""
# 【双鉄H】
# display as 雙鐵
# JP: 「忘れられんさ。\n実に、強烈な出来事だった」
1174 = "\"「Làm sao mà quên được. Quả thực là một sự kiện vô cùng ấn tượng.」\""
# monologue
# JP: ――凪が修行で倒してしまった倒木は、\n切り株ももう撤去されてる。
844 = "\"——Cái cây mà Nagi đốn ngã trong lúc tu hành, gốc cây cũng đã bị dọn đi rồi.\""
# monologue
# JP: 線路にかかる枝もなく、\n保線状態は、あのときとまるで見違えている。
1704 = "\"Đường ray cũng không còn vướng cành cây nào, tình trạng bảo trì đường ray khác hẳn so với lúc đó.\""
# 【双鉄H】
# display as 雙鐵
# JP: 「……あのアクシデントは、さまざまな物を、事を、\n大きく大きく動かした」
857 = "\"「...Sự cố đó đã làm thay đổi rất, rất nhiều thứ, rất nhiều chuyện.」\""
# monologue
# JP: 今となっては――\nそう考えれば、月並みな言葉が浮かんでしまう。
1299 = "\"Cho đến bây giờ—— nghĩ lại thì, những từ ngữ sáo rỗng lại hiện lên trong đầu.\""
# 【双鉄H】
# display as 雙鐵
# JP: 「災い転じて福となす――いや、\n僕らは僕らの死力を尽くし、災いを福へと転じたのだな」
1200 = "\"「Trong cái rủi có cái may——không, chúng ta đã dốc toàn lực để biến họa thành phúc.」\""
# 【凪】
# display as 凪
# JP: 「むつかしかことはよーわからんばい」
1075 = "\"「Mấy chuyện phức tạp em không hiểu đâu á.」\""
# monologue
# JP: 軽く笑って、凪はくるりとターンして――
1427 = "\"Cười nhẹ, Nagi xoay người một vòng——\""
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1133 = "\"「Hửm.」\""
# monologue
# JP: ――若い樹の幹へ背中をもたれかけさせて、\n潤んだ瞳で、甘える視線で、僕を見る。
848 = "\"——Em ấy tựa lưng vào thân một cái cây non, nhìn tôi bằng đôi mắt ươn ướt, ánh nhìn đầy nũng nịu.\""
# 【凪】
# display as 凪
# JP: 「けど、ひとつだけ、わかるとよ。修学旅行でお勉強して、\nひとつだけ――ウチも、わかるよーになったばい」
1014 = "\"「Nhưng mà, có một chuyện em hiểu nè. Học hỏi từ chuyến dã ngoại, có một chuyện——em cũng đã hiểu ra rồi á.」\""
# 【双鉄H】
# display as 雙鐵
# JP: 「何を、わかるようになったのだ？」
1020 = "\"「Em đã hiểu ra chuyện gì?」\""
# 【凪】
# display as 凪
# JP: 「あのとき――にーさんに助けてもらって、\n胸が、きゅうんとしよったばい」
1221 = "\"「Lúc đó——được anh hai cứu, tim em, đã đập thình thịch á.」\""
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1069 = "「っ!」"
# monologue
# JP: 僕の手を取り、凪がその胸へ導いていく。
1406 = "Nagi nắm lấy tay tôi, rồi dẫn dắt nó đặt lên ngực em."
# monologue
# JP: つつましやかなやわらかみの下、\nドッ、ドッ、ドッ、ドと、熱くて強い鼓動を感じる。
1693 = "Dưới sự mềm mại khiêm nhường ấy, tôi cảm nhận được nhịp đập nóng bỏng và mạnh mẽ thình thịch, thình thịch."
# 【凪】
# display as 凪
# JP: 「悪かことした、失敗した！　って、そぎゃん感じて、\n胸ば痛たなったのかって、あんときは思うたばい。けど」
1076 = "「Lúc đó em đã nghĩ, mình làm sai rồi, thất bại rồi! Cảm giác đó khiến ngực em đau nhói. Nhưng mà」"
# monologue
# JP: 見つめられてる。\n見つめあってる。
1425 = "Bị nhìn chằm chằm.\nHai chúng tôi nhìn nhau chằm chằm."
# monologue
# JP: 目が大きいな、と今さら思う。\n黒くて、深くて……とても静かな瞳と、思う。
1558 = "Đến giờ tôi mới nhận ra, mắt em to thật đấy. Đen láy, sâu thẳm……một đôi mắt thật tĩnh lặng, tôi nghĩ vậy."
# 【凪】
# display as 凪
# JP: 「あんとき、ウチは――ストーンって恋に落ちたばい。\nふかみちゃんとにーさんが、そいば解らせてくれたばい」
1222 = "「Lúc đó, em đã——rơi tõm vào lưới tình rồi. Là bé Fukami và anh hai đã giúp em nhận ra điều đó á」"
# 【双鉄H】
# display as 雙鐵
# JP: 「恋に落ちる、か」
1120 = "「Rơi vào lưới tình, sao」"
# monologue
# JP: この瞬間、と、\n気づけるようなタイミングは僕にはなかった。
1530 = "Tôi chẳng hề có một thời khắc nào để có thể nhận ra được khoảnh khắc đó."
# monologue
# JP: だが、少しずつ、少しずつ――
1324 = "Nhưng, từng chút, từng chút một——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、僕はじわじわと……底なし沼に呑まれるように、\n今も、恋に落ち続けているのだな」
1218 = "「Nếu vậy, tôi đang chìm dần……như bị nuốt chửng vào đầm lầy không đáy, đến tận bây giờ, vẫn tiếp tục chìm đắm trong lưới tình nhỉ」"
# 【凪】
# display as 凪
# JP: 「ふっふーん、ふかみちゃんとウチとで、\nにーさんのこと、溺れるまで引きずりこんじゃうばいっ」
1095 = "「Hứ hừm, em và bé Fukami sẽ kéo anh hai chìm nghỉm đến lúc ngạt thở luôn nha」"
# monologue
# JP: （くっ）
1766 = "（Ư）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1115 = "「A」"
# monologue
# JP: 僕の手を掴まえ続けてる、凪の指に力がこもる。\n改めて押し付けられてみたなら、すぐ気づく。
1407 = "Những ngón tay Nagi vẫn đang nắm chặt lấy tay tôi dần dùng lực. Khi bị ấn vào thêm lần nữa, tôi lập tức nhận ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪も、か」
1018 = "「Nagi cũng vậy, sao」"
# monologue
# JP: （ふにゅっ――こりゅっ――）
1790 = "（Mềm mềm——Cứng cứng——）"
# monologue
# JP: 凪の乳首、小さな乳首が固くなってる。
1430 = "Núm vú của Nagi, núm vú nhỏ nhắn đang cứng lại."
# monologue
# JP: 手のひらで軽く押しつぶすようにしてみれば、\n凪の口から、熱くしめった息がこぼれる。
1578 = "Khi tôi thử dùng lòng bàn tay ấn nhẹ xuống, từ miệng Nagi bật ra tiếng thở nóng bỏng, ướt át."
# 【凪】
# display as 凪
# JP: 「にーさんも、ばい？」
1149 = "「Anh hai cũng vậy, hở?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ」
850 = "「——っ」"
# monologue
# JP: 僕の勃起に、凪の指先が伸びてくる。
1417 = "Đầu ngón tay Nagi vươn tới phần đang cương cứng của tôi."
# monologue
# JP: （さすっ）
1805 = "（Xoa xoa）"
# monologue
# JP: ためらうことなく、勃起を撫ぜて。\nそうして凪は、上目遣いに僕を見る。
1466 = "Không chút ngần ngại, em vuốt ve sự cương cứng đó. Rồi Nagi ngước mắt lên nhìn tôi."
# 【凪】
# display as 凪
# JP: 「……もっと深くまで落ちちゃうばい？」
855 = "「……Chìm sâu hơn nữa nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「望むところだ」
1175 = "「Đúng ý tôi luôn」"
# 【凪】
# display as 凪
# JP: 「ん……」
1126 = "「Ưm……」"
# monologue
# JP: 汗に張り付くシャツを剥がすようにまくりあげれば、\n凪も僕のズボンから、勃起を導き出してくれる。
1548 = "Khi tôi xắn chiếc áo sơ mi dính đầy mồ hôi lên như thể lột nó ra, Nagi cũng lôi phần đang cương cứng của tôi ra khỏi quần."
# 【双鉄H】
# display as 雙鐵
# JP: 「とてもかわいいおっぱいだ」
1021 = "「Một bộ ngực thật dễ thương」"
# 【凪】
# display as 凪
# JP: 「にーさんのちんちんは、かわいくなかばい――\nすごく、強そうで……きょーあくばい」
1023 = "「Dương vật của anh hai, không dễ thương chút nào—— Trông rất, mạnh mẽ……hung ác lắm á」"
# monologue
# JP: （くにっ）
1786 = "（Bóp nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うっ」
1068 = "「Ư」"
# 【凪】
# display as 凪
# JP: 「あんっ」
# 1115 = "「啊」" 
# monologue
# JP: ほとんど同時に、\n勃起乳首と勃起性器をお互いの指が刺激しはじめる。
1563 = "Gần như đồng thời, ngón tay của cả hai bắt đầu kích thích núm vú và dương vật đang cương cứng của nhau."
# monologue
# JP: （くにっ――ふにっ――もみゅっ――こしゅっ――）
1784 = "（Bóp nhẹ——Mềm mềm——Xoa nắn——Cọ xát——）"
# 【凪】
# display as 凪
# JP: 「んっ……ふっ――あっ……気持ち……よか、ばい」
1093 = "「Ưm……Phù——A……Sướng……lắm, á」"
# monologue
# JP: ただでさえ高めの凪の体温が、\nさらにぬくもりを増してくる。
1423 = "Nhiệt độ cơ thể vốn đã cao của Nagi, nay lại càng thêm nóng hổi."
# monologue
# JP: 先走り汁と手汗が融け合い、\n絶妙なぬらつき加減で、凪の摩擦の快感を増す。
1709 = "Dịch nhờn hòa quyện cùng mồ hôi tay, tạo nên độ trơn trượt tuyệt diệu, làm tăng thêm khoái cảm từ ma sát của Nagi."
# monologue
# JP: （くりっ――くりゅっ――ぬりっ――ぬりゅ）
# 1784 = "（抓……抓……抓……抓……）" 
# 【凪】
# display as 凪
# JP: 「ひゃ――あっ――汗、ば――ぬらぬら……って、して」
1051 = "「Hya——A——Mồ hôi, á——Trơn tuột……rồi, nè」"
# monologue
# JP: 凪を見習い、僕も凪へと汗を塗りこむ。
1545 = "Học theo Nagi, tôi cũng xoa mồ hôi lên người em."
# monologue
# JP: 胸の、おなかの、脇腹の、汗を手のひらに掬って集め、\n中心へ――乳首へ向かって揉みあげながらすり込んでいく。
1541 = "Dùng lòng bàn tay vớt mồ hôi từ ngực, bụng, hông gom lại, rồi xoa bóp vuốt ngược về trung tâm——hướng về phía núm vú."
# 【凪】
# display as 凪
# JP: 「ん……はぁ……あっ――熱っ、つい……んっ――\nおっぱい――じんじん――して――熱かと、よ――んっ」
1123 = "「Ưm……Hà……A——Nóng, quá……Ưm—— Ngực——Tê rần——rồi——Nóng quá, á——Ưm」"
# monologue
# JP: 乳首の刺激が良すぎてか、\n凪の右手の力がほとんど、抜けてしまう。
1589 = "Có lẽ vì kích thích ở núm vú quá sướng, Nagi gần như mất hết lực ở tay phải."
# monologue
# JP: 感じさせてることは素直に嬉しいが、\nこれではいささか、僕が物寂しくもある。
1655 = "Tôi thật sự rất vui vì đã làm em sướng, nhưng thế này thì, tôi lại có chút trống vắng."
# 【凪】
# display as 凪
# JP: 「は……うっ……気持ち、よか……んっ――にーさんの、\n手に……おっぱい……とろとろ……されて――ふ――あ」
1106 = "「Hà……Ư……Sướng, quá……Ưm——Bàn tay, của anh hai……Làm ngực em……Nhũn cả ra……rồi——Phù——A」"
# 【双鉄H】
# display as 雙鐵
# JP: 「凪――下を脱がすぞ」
1033 = "「Nagi——Cởi quần ra nhé」"
# 【凪】
# display as 凪
# JP: 「うん……良かよ――全部、にーさんの好きにして」
1125 = "「Vâng……Được á——Tất cả, cứ làm theo ý anh hai đi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1126 = "「嗯」" 
# monologue
# JP: 凪のおへそに、ズボンの内側、肌とパンツの境目に、\nこぼれた汗が、滴になって溜まってる。
1420 = "Ở rốn Nagi, mặt trong quần, ranh giới giữa da thịt và quần lót, mồ hôi túa ra, đọng lại thành từng giọt."
# monologue
# JP: それを指先でぬぐいつつ、そしてパンツを、\nべたつく汗ごと、また剥がしつつ脱がしてく。
1527 = "Tôi dùng đầu ngón tay lau đi, rồi lột chiếc quần lót cùng với mồ hôi dính nhớp nháp ra."
# 【凪】
# display as 凪
# JP: 「あ……おまんこ、涼しかぁ」
1099 = "「A……Âm đạo, mát quá」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なに。すぐに熱くなる」
1191 = "「Gì chứ. Sẽ nóng lên ngay thôi」"
# monologue
# JP: （くちゅんっ！）
1774 = "（Nhóp nhép!）"
# 【凪】
# display as 凪
# JP: 「ふぁんっ」
1080 = "「Aaa」"
# monologue
# JP: 凪のおまんこは湿っているが、潤っている感じではない。\nならば、これはただの汗なのだろう。
1414 = "Âm đạo của Nagi tuy ẩm ướt, nhưng không có cảm giác là dịch nhờn. Vậy thì, chắc đây chỉ là mồ hôi thôi."
# monologue
# JP: 傷つけないよう慎重に、\n指の腹を柔かに使い、シンプルな割れ目を撫ぜほぐしてく。
1537 = "Cẩn thận để không làm em đau, tôi dùng phần thịt mềm của ngón tay, vuốt ve nới lỏng khe rãnh đơn thuần ấy."
# monologue
# JP: （くっ――くちゅっ――ちゅむっ――チュルッ――）
1770 = "（Ư——Nhóp nhép——Chụt——Trơn tuột——）"
# 【凪】
# display as 凪
# JP: 「ん……ふっ――好い、とー……んっ――\nにーさんの……指……気持ち……よかっ――」
1121 = "「Ưm……Phù——Thích, quá……Ưm—— Ngón tay……của anh hai……Sướng……quá——」"
# monologue
# JP: ほどなく、凪の内側からの蜜が指先を濡らし始める。\nその誘いに素直に応じ、指をカギにして差し込んでみる。
1307 = "Chẳng mấy chốc, mật ngọt từ bên trong Nagi bắt đầu làm ướt đầu ngón tay tôi. Thuận theo lời mời gọi đó, tôi uốn cong ngón tay như chiếc móc rồi thử đưa vào."
# monologue
# JP: （くっ――ぷっ）
1780 = "（Ư——Phụt）"
# 【凪】
# display as 凪
# JP: 「ふやうっ！」
1081 = "「Hya!」"
# monologue
# JP: （キチチチチッ！）
1809 = "（Kít kít kít kít!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1097 = "「Hừm」"
# monologue
# JP: ちいさい。狭い。ひどく熱い。
1480 = "Nhỏ bé. Chật hẹp. Vô cùng nóng."
# monologue
# JP: 凪のおまんこ――膣穴は、歯の無い唇を持つ獣のように、\n一生懸命、かなり強めに、僕の指先に喰い付いてくる。
1422 = "Âm đạo Nagi——lỗ âm đạo, hệt như một con thú với đôi môi không răng, đang cố gắng hết sức, ngoạm khá mạnh vào đầu ngón tay tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （この狭い穴で……僕の勃起を――\n凪は、受け入れてくれたのか）
1765 = "（Với cái lỗ chật hẹp này……mà Nagi—— đã chấp nhận dương vật cương cứng của tôi sao）"
# monologue
# JP: 嬉しくなって、同時に申し訳なくもなってくる。
1555 = "Tôi thấy vui sướng, nhưng đồng thời cũng cảm thấy có lỗi."
# monologue
# JP: 初めてのときは僕もいっぱいいっぱいすぎて、\n凪を気持ちよくしてやることに、心を砕ききれなかった。
1636 = "Lần đầu tiên, bản thân tôi cũng quá sức chịu đựng, nên đã không thể dồn hết tâm trí để làm Nagi sung sướng."
# 【双鉄H】
# display as 雙鐵
# JP: 「じっくり――ゆっくり――気持よくなろう」
1171 = "「Cứ từ từ——chậm rãi——cùng sướng nhé」"
# 【凪】
# display as 凪
# JP: 「はっ――うんっ――んッ――にーさん――にぃさぁん」
1109 = "「Hà——Vâng——Ưm——Anh hai——Anh hai ơi」"
# monologue
# JP: 蜜は手のひらをつたって手首を、腕までを濡らす勢いだ。
1668 = "Mật ngọt chảy dọc lòng bàn tay xuống cổ tay, với thế muốn làm ướt cả cánh tay tôi."
# monologue
# JP: このまま挿入したい気持ちを、\nけれどもグっと抑えこむ。
1552 = "Dù rất muốn cứ thế mà cắm vào, nhưng tôi đã kìm nén lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪――足の間に、力をいれてもらっていいか？」
1036 = "「Nagi——Em có thể dùng sức kẹp hai chân lại được không?」"
# 【凪】
# display as 凪
# JP: 「ふぇ？　――あっ！　あ、わかったばいっ」
1091 = "「Hể? ——A! A, em hiểu rồi á」"
# monologue
# JP: 快感と暑さとが混じったのだろう。\nぼーっとしてた凪の瞳が、理解によって光を戻す。
1510 = "Chắc là do khoái cảm và sự nóng bức lẫn lộn. Đôi mắt Nagi đang lờ đờ bỗng lấy lại ánh sáng khi hiểu ra."
# 【凪】
# display as 凪
# JP: 「こ、これで――良かと？」
1211 = "「Th, thế này——được chưa á?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「上出来だ」
1162 = "「Làm tốt lắm」"
# monologue
# JP: おまんこと、ふとももと、ふとももと。
1707 = "Âm đạo, đùi, và đùi."
# monologue
# JP: 三者が産み出す狭隘へ、\n放置されてた勃起を強く、一気呵成にネジ入れる！
1549 = "Vào khe hẹp do ba bộ phận tạo ra, tôi mạnh mẽ, một hơi nhét phần cương cứng đang bị bỏ không vào!"
# monologue
# JP: （ずるうううううううううっ！！！）
1797 = "（Trượt tuốtttttttttt!!!）"
# 【凪】
# display as 凪
# JP: 「ひゃふんっ！！」
1055 = "「Hya!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1069 = "「呃！」" 
# monologue
# JP: 滑る、ぬらつく。\nなのに締まって、ただ単純に気持ちいい。
1619 = "Trơn tuột, nhớp nháp. Thế nhưng lại thắt chặt, đơn thuần là rất sướng."
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ」
1067 = "「Ư——A」"
# monologue
# JP: （ずりゅっ！　ずっ！　ずぼっ！　ぼちゅっ！）
1795 = "（Trượt! Phập! Phập! Bụp!）"
# 【凪】
# display as 凪
# JP: 「ひゃ――あっ――コス――れ、て――んっ――\nあっ――にーさんの――おち、ん、ちん――これっ」
1050 = "「Hya——A——Cọ xát——rồi——Ưm—— A——Dương, vật——của anh hai——thế này」"
# monologue
# JP: （ぐっ！　ぎゅりゅんっ！　ごしっ！　ごしゅ！）
1796 = "（Ư! Ngoáy! Chà! Chà!）"
# 【凪】
# display as 凪
# JP: 「ふぇっ――あっ――お、まん、こ――んっ――ば――\nあたって――こしゅっ――って――熱――か――んっ」
1086 = "「Hể——A——Âm, đạo——Ưm——á—— Chạm vào——cọ xát——rồi——Nóng——quá——Ưm」"
# monologue
# JP: 自分の快感を貪るよりも、凪に快感を与えられるよう、\n勃起を使っておまんこを、撫ぜさすり押して愛撫していく。
1569 = "Thay vì thỏa mãn khoái cảm của bản thân, để mang lại khoái cảm cho Nagi, tôi dùng dương vật cương cứng vuốt ve, chà xát, đè ép âm đạo em để âu yếm."
# monologue
# JP: 割れ目の内の柔らかな肉がびとりと張り付き、\n早く挿れろ、もう挿れてくれとわななき震え催促してくる。
1670 = "Lớp thịt mềm mại bên trong khe rãnh bám dính lấy, run rẩy hối thúc tôi mau cắm vào đi, cắm vào đi."
# 【凪】
# display as 凪
# JP: 「あ――にぃさ……にいさん……んっ――はっ――あっ、\nウチっ――うちっ――もうっ――これ――だって、もう」
1111 = "「A——Anh hai……Anh hai ơi……Ưm——Hà——A, Em——Em——sắp——thế này——thì, sắp」"
# monologue
# JP: （ぐっ！）
1778 = "（Ư!）"
# monologue
# JP: 思いっきりに腰を打ち付け、肌と肌とをゼロ距離にする。
1575 = "Tôi dồn sức dập hông, để da thịt chạm nhau ở khoảng cách số không."
# monologue
# JP: そうして、凪の耳元に、\nできうる限りに優しく、穏やかに囁きかける。
1602 = "Rồi, bên tai Nagi, tôi thì thầm một cách dịu dàng và ôn tồn nhất có thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「イってくれ。凪。\n凪の一番かわいい姿を、どうか僕だけに見せてくれ」
1044 = "「Lên đỉnh đi. Nagi. Hãy cho tôi thấy dáng vẻ đáng yêu nhất của em, chỉ mình tôi thôi」"
# 【凪】
# display as 凪
# JP: 「ふやっ！」
1057 = "「Hya!」"
# monologue
# JP: 喉が詰まったような声。
1392 = "Giọng nói như bị nghẹn lại ở cổ họng."
# monologue
# JP: 凪はぱくぱく口を震わせ――\nそして全身を大きく震わせ、ピンと伸びきり張り詰める。
1463 = "Miệng Nagi run rẩy há ra ngậm vào—— Rồi toàn thân em run lên bần bật, căng cứng duỗi thẳng người."
# 【凪】
# display as 凪
# JP: 「あ……あっ――いまの――でっ――んっ――ふ、あっ、\nウチ、今……にーさんの声、で……イっちゃった、ばい」
1102 = "「A……A——Lúc nãy——á——Ưm——Phù, a, Em, vừa nãy……chỉ vì giọng nói của anh hai……mà lên đỉnh mất rồi, á」"
# monologue
# JP: （ふらっ）
1801 = "（Lảo đảo）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おおっと！」
1089 = "「Ối chà!」"
# monologue
# JP: 脱力しきって、崩れそうになった凪の体をなんとか抑える。
1567 = "Tôi vội vàng đỡ lấy cơ thể Nagi đang mất hết sức lực, chực ngã khuỵu xuống."
# 【凪】
# display as 凪
# JP: 「ありがと、にーさん」
1205 = "「Cảm ơn, anh hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
# 1133 = "「嗯？」" 
# monologue
# JP: 凪はゆるゆる体を振って僕の手を解き。\nそうして、上体を前に倒して――
1408 = "Nagi khẽ lắc lư cơ thể gỡ tay tôi ra. Rồi, em rướn người về phía trước——"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1116 = "「っ!」"
# 【凪】
# display as 凪
# JP: 「今、ひとりで気持ちよぉなっちゃったけん」
1043 = "「Vừa nãy, em đã sướng một mình mất rồi」"
# monologue
# JP: 申し訳無さそうな声を出し――
1474 = "Em cất giọng đầy vẻ có lỗi——"
# monologue
# JP: （く、ぱぁっ――）
1802 = "（Tách ra——）"
# monologue
# JP: ――凪は自ら、糸を引くほど濡れそぼっている\nおまんこを指で広げてくれる。
846 = "——Nagi tự mình dùng ngón tay mở rộng âm đạo đang ướt đẫm đến mức kéo sợi ra."
# 【凪】
# display as 凪
# JP: 「今度は、ちゃあんと。にーさんと一緒に。\nふたりで、気持よぉなりたかと」
1213 = "「Lần này, phải đàng hoàng. Cùng với anh hai. Cả hai cùng nhau sướng á」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1126 = "「嗯」" 
# monologue
# JP: 惹かれるままに、顔を近づけていけば静かに、\n凪はその手を引っ込める。
1453 = "Cứ thế bị thu hút, khi tôi ghé mặt sát lại gần, Nagi lặng lẽ rụt tay về."
# monologue
# JP: 僕の指先で開き直して――\n可愛く震えるおまんこにそっとくちづける。
1580 = "Tôi dùng đầu ngón tay mở nó ra lại—— và nhẹ nhàng hôn lên âm đạo đang run rẩy đáng yêu ấy."
# 【凪】
# display as 凪
# JP: 「ふあっ――あっ――チュー、されてる、ばい――\nんっ――にーさんが、おまんこ、ちゅっ、ちゅっ、って」
1079 = "「Phù——A——Đang bị, hôn, á—— Ưm——Anh hai, đang hôn chụt chụt, vào âm đạo」"
# monologue
# JP: 自分の行為を、凪が言葉で聞かせてくれる。
1396 = "Nagi dùng lời nói để cho tôi nghe thấy hành động của chính mình."
# monologue
# JP: ならばもっと、いやらしいことを言わせたい――\nそんな倒錯した欲望が、不意に強烈に突き上げてくる。
1694 = "Nếu vậy tôi muốn bắt em nói ra những lời dâm đãng hơn nữa—— Thứ dục vọng méo mó ấy chợt trỗi dậy mãnh liệt."
# monologue
# JP: （れるっ！）
# 1774 = "（啾！）" 
# 【凪】
# display as 凪
# JP: 「んひっ！？　ふあっ――はっ――おまんこ、の――\nな、かっ――ンッ――にーさんの、舌、ば、ぬるって」
1063 = "「Nhi!? Phù——Hà——Bên trong, âm đạo—— Ưm——Lưỡi, của anh hai, á, trơn tuột」"
# monologue
# JP: （にゅうううっ！　べろっ！　れろおおおっ！）
1772 = "（Trườn! Liếm! Ngoáy!）"
# 【凪】
# display as 凪
# JP: 「にゃうっ！　んっ――舌ば、ぐるん、って――あ、\nおまんこ、の――かべ――べろおって、され、てっ」
1059 = "「Nyau! Ưm——Lưỡi, ngoáy vòng vòng——A, vách——âm đạo——bị, liếm, á」"
# monologue
# JP: （じゅぼっ！　じゅっ！　じゅぼっ！　ぼちゅっ！）
1771 = "（Chụt! Chụt! Chụt! Bụp!）"
# 【凪】
# display as 凪
# JP: 「はっ――あっ――あっ――あっ！　んっ――べろ、\nやっ――こんなに――ほじって――じゅぶ、って！」
1105 = "「Hà——A——A——A! Ưm——Lưỡi, Không——Móc ngoáy——như thế——Chụt chụt, á!」"
# monologue
# JP: （きゅんっ！　きゅううううっ！）
1773 = "（Thắt tim! Siết chặt!）"
# monologue
# JP: 固く尖らせた舌先を、あるいは性器と誤解したのか、\n凪の膣肉はきゅうと締まって、精液を絞り取ろうとする。
1428 = "Không biết có phải hiểu lầm đầu lưỡi nhọn hoắt cứng đơ là dương vật hay không, thịt âm đạo Nagi thắt chặt lại, chực vắt kiệt tinh dịch."
# monologue
# JP: ならば、そろそろ頃合いか――\nそう考えて、ひとまず舌を全部抜き……
1691 = "Nếu vậy, chắc cũng đến lúc rồi—— Nghĩ vậy, tôi tạm thời rút hết lưỡi ra……"
# monologue
# JP: （ぢゅぼっ！）
# 1774 = "（啾！）" 
# 【凪】
# display as 凪
# JP: 「ふきゅんっ！」
1127 = "「Hya!」"
# monologue
# JP: その瞬間に、目を奪われる。
1300 = "Khoảnh khắc đó, ánh mắt tôi bị cướp mất."
# monologue
# JP: かわいい。とても、とても可愛い。\n小さく震え、まるで見知らぬ小さな花の蕾のようで。
1444 = "Đáng yêu. Rất, rất đáng yêu. Run rẩy nho nhỏ, tựa như nụ hoa bé xíu xa lạ nào đó."
# monologue
# JP: （さすっ）
1799 = "（Xoa xoa）"
# 【凪】
# display as 凪
# JP: 「んひゃっ！？」
1061 = "「Nhya!?」"
# monologue
# JP: 恐る恐るに触れてみたなら、\n驚きと快感を混じえたような大きな声。
1557 = "Khi tôi rụt rè chạm vào thử, nhận lại là tiếng kêu lớn pha lẫn giữa ngạc nhiên và khoái cảm."
# 【凪】
# display as 凪
# JP: 「に、にーさん、そ……そこ……おしり――\nあの――おしりの、あな……ばい」
1143 = "「A, anh hai, đ……đó là……mông——\nÀ thì——lỗ, mông……á」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん、わかっている」
1132 = "「Ừ, tôi biết」"
# monologue
# JP: （ふにっ――もみゅっ）
1788 = "（Mềm mềm——Xoa nắn）"
# monologue
# JP: 凪は、少しも嫌がってない。\nただ、驚いているだけだ。
1390 = "Nagi, không hề tỏ ra chán ghét chút nào. Chỉ là, em đang ngạc nhiên thôi."
# monologue
# JP: その反応に気を良くし、\n指の動きに、少し勢いをつけてみる。
1585 = "Phản ứng đó khiến tôi thấy thích thú, tôi thử tăng thêm chút lực vào chuyển động của ngón tay."
# monologue
# JP: （さすっ――さわっ――もみっ――もみゅ――）
1787 = "（Xoa xoa——Chạm nhẹ——Nắn nắn——Xoa nắn——）"
# 【凪】
# display as 凪
# JP: 「やっっ――ふぇっっ――へん――ヘン、ばいっ――\nん――お尻の――穴っ――の、まわり、ば――こしこし」
1046 = "「A——Hể——Kỳ——Kỳ lắm, á—— Ưm——Xung quanh——lỗ——mông, á——cọ cọ」"
# monologue
# JP: （くぷっ！）
1779 = "（Phụt!）"
# 【凪】
# display as 凪
# JP: 「ひゃふううううっ！？」
# 1061 = "「呀！？」" 
# monologue
# JP: 焦れったそうな声に応じて、\n指先ほんの少しだけ、すぼまりの中に押し込んでみる。
1647 = "Đáp lại giọng nói như đang nôn nóng đó, tôi thử đẩy nhẹ đầu ngón tay vào sâu bên trong chỗ chật hẹp ấy."
# monologue
# JP: （ぎっちいいいいいいいいいいいっ！）
# 1809 = "（緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1083 = "「っ!?」"
# 【凪】
# display as 凪
# JP: 「くひゅんっ！」
1096 = "「Hya!」"
# monologue
# JP: あまりに強烈に食いつかれ、防衛本能で指を引く。
1673 = "Bị ngoạm lại quá mãnh liệt, bản năng tự vệ khiến tôi rụt ngón tay lại."
# monologue
# JP: 凪もはぁはぁ、荒い息を吐き、\nどこか、ほっとした顔をしている。
1387 = "Nagi cũng hà hà, thở hổn hển, khuôn mặt trông có vẻ như nhẹ nhõm phần nào."
# 【双鉄H】
# display as 雙鐵
# JP: （強い性感のある場所のようだが……\n随分とデリケートで、扱いが難しそうでもあるな）
1803 = "（Có vẻ là nơi có độ nhạy cảm cao nhưng…… Cũng khá mỏng manh và có vẻ khó chiều đây）"
# monologue
# JP: ならば、尻穴には今は触れずに、勉強の対象としておこう。
1697 = "Nếu vậy, giờ tạm thời không đụng đến lỗ mông, cứ coi như đối tượng để nghiên cứu sau vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「すまんな。驚かせてしまったか？」
1178 = "「Xin lỗi nhé. Làm em giật mình à?」"
# 【凪】
# display as 凪
# JP: 「ちょ、ちょっとは驚いたばってん、\nすまんことなんて――なかばい」
1180 = "「Ch, chỉ giật mình một chút thôi, không có gì——phải xin lỗi đâu á」"
# monologue
# JP: 甘い声。
1418 = "Giọng nói ngọt ngào."
# monologue
# JP: 意識してなのか、せずともなのか、\nゆらゆら小さく揺れている腰。
1311 = "Không biết là cố ý, hay vô tình, vòng eo đang khẽ đong đưa."
# 【凪】
# display as 凪
# JP: 「ぜぇんぶ。にーさんの好きにして良かって、ゆうたけん」
1192 = "「Tất cả. Em đã bảo cứ làm theo ý anh hai rồi mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか――なら」
1187 = "「Vậy sao——Thế thì」"
# monologue
# JP: （くちゅうっ）
1775 = "（Nhóp nhép）"
# 【凪】
# display as 凪
# JP: 「ふあっ」
# 1080 = "「哇」" 
# monologue
# JP: おまんこに触れた瞬間に、しびれたような、\n待ちわびていたような声に鼓膜が揺すられる。
1436 = "Khoảnh khắc chạm vào âm đạo, màng nhĩ tôi rung lên bởi giọng nói như tê dại, như đang mỏi mòn chờ đợi."
# monologue
# JP: と、いうか、これは――
1521 = "Mà, nói đúng hơn, đây là——"
# monologue
# JP: （くちゅっ――じゅりゅっ――じゅっ――ちゅるんっ）
# 1770 = "（啾……啾……啾……啾……）" 
# 【凪】
# display as 凪
# JP: 「あっ――あっ――ふあっ――あっ――」
1103 = "「A——A——Phù——A——」"
# monologue
# JP: 尻への愛撫に感じてくれていたのだろうか？\n凪のおまんこは、完全にほぐれ濡れまくっている。
1607 = "Chắc là do cảm nhận được sự âu yếm ở mông chăng? Âm đạo Nagi đã hoàn toàn nới lỏng và ướt sũng."
# monologue
# JP: スジに沿わせて動かす僕の中指は、\n全体がべっとり濡れて、いっそフヤけてしまいかねない。
1573 = "Ngón giữa của tôi di chuyển dọc theo đường rãnh, toàn bộ đều ướt đẫm, thậm chí có thể nhũn cả ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪……いいか？」
1032 = "「Nagi……được chứ?」"
# 【凪】
# display as 凪
# JP: 「うん。良かよ。\n来て？　にーさん」
1130 = "「Vâng. Được á.\nĐến đây? Anh hai」"
# 【凪】
# display as 凪
# JP: 「ふぁんっ！！」
1082 = "「Hya!!」"
# monologue
# JP: 亀頭で割り込んだ感触が、\n初めてのときとまるきり違う。
1712 = "Cảm giác quy đầu chẻ vào trong, hoàn toàn khác biệt so với lần đầu tiên."
# monologue
# JP: キツすぎるくらいに締める感じは変わってないが、\n肉質がもう、完全にぬらつきやわらぎほぐれきっている。
1703 = "Cảm giác thắt chặt đến mức quá khít vẫn không đổi, nhưng thớ thịt đã hoàn toàn trơn tuột, mềm mại và nới lỏng ra."
# 【双鉄H】
# display as 雙鐵
# JP: （これ――はっ――）
1811 = "（Thế này——thì——）"
# monologue
# JP: ぞくぞくとする。喉が動いて、勝手にツバを呑んでしまう。
1482 = "Cảm giác rùng mình. Cổ họng giật giật, tôi bất giác nuốt nước bọt."
# monologue
# JP: あの割り入っていく感触を、強烈すぎる締め付けを、\nこのぬらつきまとわる柔肉の中で味わえるなら――
1584 = "Cảm giác chẻ vào đó, sự thắt chặt quá đỗi mãnh liệt đó, nếu có thể nếm trải bên trong lớp thịt mềm mại trơn tuột này thì——"
# 【凪】
# display as 凪
# JP: 「に、にーさん？　う、うち……へーき、とよ？\nにーさんの、好きに……動いて……よか、よ？」
1144 = "「A, anh hai? E, em……không sao, đâu á? Anh hai cứ, làm theo ý mình……chuyển động……đi, á?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1126 = "「嗯」" 
# monologue
# JP: 許可の言葉は、おねだりだ。\n凪にも痛みは無いのだろう。快感がよほど強いのだろう。
1345 = "Lời cho phép, cũng chính là lời nài nỉ. Chắc hẳn Nagi cũng không thấy đau. Hẳn là khoái cảm quá đỗi mãnh liệt."
# monologue
# JP: 子宮を叩いてほしくって、\nか細い腰は、またゆらゆらと動き出してる。
1469 = "Vì muốn tôi đâm vào tử cung, vòng eo thon nhỏ kia, lại bắt đầu đong đưa."
# 【双鉄H】
# display as 雙鐵
# JP: （が――だ）
1714 = "（Nhưng——mà）"
# monologue
# JP: 好きにしていいというのなら、思いっ切りに貪るのなら、\nこの極上すぎるおまんこ肉を、ただ味わうのは贅沢すぎる。
1605 = "Nếu đã nói là cứ làm theo ý mình, nếu muốn tham lam tận hưởng hết mình, thì việc chỉ nếm trải lớp thịt âm đạo quá đỗi tuyệt vời này quả là quá xa xỉ."
# monologue
# JP: もう少し、\nほんの少しのアクセントをもし加えられたら――
1483 = "Một chút nữa thôi, chỉ cần thêm một chút điểm nhấn nữa thôi thì——"
# 【凪】
# display as 凪
# JP: 「ね？　ね？　どぎゃんしたと、にーさぁん」
1025 = "「Nè? Nè? Sao vậy á, anh hai」"
# monologue
# JP: 焦れきって、上ずってる声。
1400 = "Giọng nói vút cao, như đang sốt ruột."
# monologue
# JP: 腰の動きはさらにもぞもぞ強まって、\n止まっていても狭い膣内の蠢きが、強い快感を与え続ける。
1476 = "Chuyển động của hông càng lúc càng mạnh mẽ hơn, dù có dừng lại thì sự cựa quậy bên trong âm đạo chật hẹp vẫn tiếp tục mang đến khoái cảm mãnh liệt."
# 【双鉄H】
# display as 雙鐵
# JP: （ああ――いや、そうか。単純なことだ）
1777 = "（A——Không, ra vậy. Đơn giản thôi mà）"
# monologue
# JP: 中には、今は入り込めない。\nけれど周辺の刺激だけでも、十分にっ――
1626 = "Bên trong, bây giờ không thể tiến vào được. Nhưng chỉ cần kích thích xung quanh thôi, cũng đã đủ——"
# monologue
# JP: （もみゅうっ！）
1785 = "（Xoa nắn!）"
# 【凪】
# display as 凪
# JP: 「ひあっ！？　また、おひりっ！？」
1062 = "「Hya!? Lại, mông nữa á!?」"
# monologue
# JP: （きゅうううううううううんんっっ！）
# 1785 = "（抓！）" 
# monologue
# JP: 来た！　来た！　来た！　来た！\n喰いちぎるほどの強烈すぎる膣の締め付け！！
1328 = "Đến rồi! Đến rồi! Đến rồi! Đến rồi! Sự thắt chặt âm đạo quá đỗi mãnh liệt như muốn cắn đứt!!"
# monologue
# JP: だけれど、この肉――\nほぐれてとろけてぬかるみ切った肉の中ならっ――
1326 = "Nhưng mà, lớp thịt này—— bên trong lớp thịt đã nới lỏng, tan chảy và lầy lội này thì——"
# monologue
# JP: （ずぶうううううううううううううううっ！！！）
1768 = "（Phập pppppppppppppppppppp!!!）"
# 【凪】
# display as 凪
# JP: 「ひゃうううううううううううううううううっ！！？」
1060 = "「Hyauuuuuuuuuuuuuuuuuuuuuu!!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1069 = "「呃！」" 
# monologue
# JP: （びゅっ！　びゅるううっ！　びゅぶっ！　びゅっ！）
1767 = "（Phụt! Phụt phụt! Phụt! Phụt!）"
# 【凪】
# display as 凪
# JP: 「ひゃっっ！？　えっ――うあっ――あっ――なか――\nおなかっ――おなかっ――にーさんの――あっつい、の」
1065 = "「Hya!? Hể——Ua——A——Bên trong—— Bụng——Bụng——của anh hai——nóng, quá」"
# monologue
# JP: （びゅうっ！　びゅっ！　びゅうううっ！　んびゅっ！）
# 1767 = "（呲！呲！呲！呲！）" 
# monologue
# JP: 脳が背骨が一気に白く塗り潰される、すごい快感。
1460 = "Khoái cảm tuyệt vời, như thể não bộ và xương sống bị bôi trắng xóa trong chốc lát."
# monologue
# JP: 身震いすると感じたときには――性器は既に、\n凪の最奥に食いつきながら、どくどく精を吐き出している。
1506 = "Khi tôi cảm thấy rùng mình——dương vật đã, ngoạm chặt lấy nơi sâu nhất của Nagi, từng đợt tinh dịch ồng ộc tuôn ra."
# 【凪】
# display as 凪
# JP: 「ふぇっ――あっ――びゅって――びゅう、って――\nにーさんの――おなか――たたいて――ふっ――ふあっ」
1087 = "「Hể——A——Phụt——Phụt, á—— của anh hai——đang đập vào bụng——Phù——Phù a」"
# monologue
# JP: 精液に子宮を叩かれて、凪も達してしまったのだろう。
1639 = "Bị tinh dịch đập vào tử cung, chắc hẳn Nagi cũng đã lên đỉnh rồi."
# monologue
# JP: か細い膝はガクガク震え、\n今にも崩れてしまいそうだ。
1471 = "Đôi đầu gối gầy guộc run lẩy bẩy, tưởng chừng như có thể sụp xuống bất cứ lúc nào."
# monologue
# JP: （がしっ！）
# 1785 = "（抓！）" 
# 【凪】
# display as 凪
# JP: 「ふえっ！？」
1090 = "「Hể!?」"
# monologue
# JP: だから、その腰を捕まえる。
1591 = "Thế nên, tôi túm lấy eo em."
# monologue
# JP: こんな事故のような射精では、\n『じっくりとしたセックス』だなんて、とても言えない。
1688 = "Với màn xuất tinh như một vụ tai nạn thế này, thì không thể nào gọi là 『Làm tình chậm rãi』 được."
# monologue
# JP: （ずっ――るぅぅぅぅううううううっ）
1794 = "（Trượt——tuốtttttt）"
# 【凪】
# display as 凪
# JP: 「ひあっ――あっ――あっっ――あっ――」
1048 = "「Hya——A——A——A——」"
# monologue
# JP: まだ射精後の震えを残す勃起に構わず、\n膣の入り口ギリギリにまで、腰を引く。
1528 = "Mặc kệ dương vật vẫn còn run rẩy sau khi xuất tinh, tôi rút hông về sát mép cửa âm đạo."
# 【凪】
# display as 凪
# JP: 「にーさん……にぃ、さん――いま、の――ま、た？」
1146 = "「Anh hai……Anh, hai——Lúc nãy, á——Lại, nữa à?」"
# monologue
# JP: 声の震えは、怯えではなく、期待から。
1473 = "Giọng nói run rẩy, không phải vì sợ hãi, mà là vì mong đợi."
# monologue
# JP: 潤んだ瞳が、真っ赤な頬が、\nぴんぴんにしこる小さな乳首が、正直に教えてくれている。
1700 = "Đôi mắt ngấn lệ, đôi gò má đỏ bừng, những núm vú nhỏ nhắn cương cứng, đã thành thật cho tôi biết điều đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「いいや。今のは――\nもう一度したら、もう一度射精させられる」
1008 = "「Không đâu. Vừa nãy—— Nếu làm thêm lần nữa, tôi sẽ lại bị ép xuất tinh mất」"
# 【凪】
# display as 凪
# JP: 「あ……う、ん」
1110 = "「A……Ư, m」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だからな？　凪」
1176 = "「Thế nên nhé? Nagi」"
# monologue
# JP: （さわああああっっ）
# 1786 = "（抓）" 
# 【凪】
# display as 凪
# JP: 「ふやっ――あっ――これ――これ――んっ――\nおしり――あったかで――きもち――よかっ」
1053 = "「Hya——A——Cái này——Cái này——Ưm—— Mông——Ấm quá——Sướng——quá」"
# monologue
# JP: 穴ではなく、肉。
1568 = "Không phải là lỗ, mà là thịt."
# monologue
# JP: 凪のお尻のまるみをもみゅもみゅ、\n手のひらを使い撫でさすっていく。
1576 = "Tôi xoa nắn bờ mông tròn trịa của Nagi, dùng lòng bàn tay vuốt ve nó."
# monologue
# JP: （ずっ――ぶっ――うっ――う――うっ――）
1791 = "（Phập——Phập——Ư——Ư——Ư——）"
# 【凪】
# display as 凪
# JP: 「ひっ――いっ――ふっ――んっ」
1054 = "「Hức——Ư——Phù——Ưm」"
# monologue
# JP: そうしつつ、ゆっくりゆっくり腰を進める。
1447 = "Vừa làm vậy, tôi vừa chậm rãi, chậm rãi đẩy hông tới."
# monologue
# JP: 僕自身が焦れて焦げそうなほど、ゆっくりゆっくり――\nしゃくとり虫の這いずりに、置いて行かれてしまう速度で。
1525 = "Chậm rãi đến mức chính bản thân tôi cũng nôn nóng như muốn cháy rụi—— Với tốc độ chậm đến nỗi có thể bị con sâu đo bò qua mặt."
# 【凪】
# display as 凪
# JP: 「あ……んっ――ひあっ――ゆっくり――され、る、と、\nおなかっ――おまんこ――で――わかる、ばいっ――」
1108 = "「A……Ưm——Hya——Bị, làm——chậm rãi, thì, bụng——âm đạo——cảm nhận được, rõ lắm á——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なにが、おまんこでわかるんだ？」
1006 = "「Âm đạo cảm nhận được, cái gì cơ?」"
# 【凪】
# display as 凪
# JP: 「かたちっ――ばい――んっ――にーさんの――お――\nちん、ちん――の――ふとか、とこ――とか――んっ」
1161 = "「Hình dáng——á——Ưm——Chỗ, to—— của dương, vật——anh hai——chẳng hạn——Ưm」"
# monologue
# JP: （ぐりゅんっ！）
1798 = "（Ngoáy!）"
# 【凪】
# display as 凪
# JP: 「ひゃうんっ！！！」
1056 = "「Hya!!!」"
# monologue
# JP: 不意打ちで腰を強く回せば、凪はがくがく体を震わす。
1539 = "Khi tôi bất ngờ xoay mạnh hông, cơ thể Nagi run lên bần bật."
# 【凪】
# display as 凪
# JP: 「ずっ――じゅるっ――」
1195 = "「Sụt——Sụt sịt——」"
# monologue
# JP: 口の端から弾みで垂れたよだれを啜って。飲み干して。
1394 = "Tôi mút lấy dòng nước bọt vô tình chảy ra từ khóe miệng em. Rồi nuốt trọn."
# monologue
# JP: そうしてぱくぱく、口を開いて閉じてから、\n何とか抑えた声を繋げる。
1600 = "Sau đó, em há miệng ra ngậm vào vài cái, rồi cố gắng nối tiếp giọng nói đã kìm nén."
# 【凪】
# display as 凪
# JP: 「ふっ――んっ――それ、から――びく、びくっ――\nにーさん、の――震えも――鼓動、も――わかる、ばい」
1072 = "「Phù——Ưm——Sau, đó——Giật, giật—— Sự run rẩy——nhịp đập, của anh hai——cũng, cảm nhận được, á」"
# 【双鉄H】
# display as 雙鐵
# JP: 「多分、それが――」
1154 = "「Chắc hẳn, đó là——」"
# monologue
# JP: 僕も、はっきり感じてる。\n凪の震えを鼓動を汗を。匂いを肌を体温を。
1532 = "Tôi cũng cảm nhận được rất rõ ràng. Sự run rẩy, nhịp đập, mồ hôi của Nagi. Mùi hương, làn da, nhiệt độ cơ thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「ひとつになる――\nセックスをする、ということなのだろう」
1212 = "「Hòa làm một——\nChính là ý nghĩa của việc làm tình đấy」"
# 【凪】
# display as 凪
# JP: 「あ……これ――が――んっ――これ、が――セックス\n――にーさんと……今――セックス、ば――してっ」
1114 = "「A……Đây——là——Ưm——Đây, là——làm tình ——Đang……làm tình, với——anh hai——」"
# monologue
# JP: （きゅうううううっ！）
# 1809 = "（緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1069 = "「呃！」" 
# monologue
# JP: 尻穴を刺激した時と同じくらいに強烈な――\nけれどもずっと、柔かみのある、まぁるい締め付け。
1303 = "Sự thắt chặt mãnh liệt chẳng kém gì lúc kích thích lỗ mông—— nhưng lại mềm mại và tròn trịa hơn rất nhiều."
# 【凪】
# display as 凪
# JP: 「ね？　ね――にぃ、さんっ」
1182 = "「Nè? Nè——Anh, hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1183 = "「Ừ——」"
# monologue
# JP: （ずっ――ぶっ――ずっ――るっ――）
1793 = "（Phập——Phập——Trượt——Tuột——）"
# monologue
# JP: 子宮の口もくぱくぱと、僕を求めてくれている。
1493 = "Miệng tử cung cũng đóng mở liên hồi, như đang khao khát tôi."
# monologue
# JP: そこへ押し当て、わずかに引いて――\nただ、それだけを繰り返す。
1565 = "Tôi ấn vào đó, rồi khẽ rút ra—— Chỉ đơn giản lặp đi lặp lại như vậy."
# 【凪】
# display as 凪
# JP: 「ふぁっ――あっ――あっ――しあわせ――んっ――\nしあわせっ――しあ、わせっ――気持ち、よかっ」
1078 = "「Phù——A——A——Hạnh phúc——Ưm—— Hạnh phúc quá——Hạnh, phúc quá——Sướng, quá」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、だ」
1172 = "「Tôi cũng vậy」"
# monologue
# JP: キスをしたくて、けれども今はできなくて。
1561 = "Rất muốn hôn, nhưng bây giờ lại không thể."
# monologue
# JP: 代わりにとんとんチュウチュウと、\n子宮の口に、なんどもなんどもついばむようなキスをする。
1603 = "Thay vào đó, tôi liên tục thúc nhẹ và chụt chụt, như thể đang trao vô vàn nụ hôn lên miệng tử cung của em."
# 【凪】
# display as 凪
# JP: 「あ、んっ――ふっ――あ――にいさん――にぃ、さん」
1117 = "「A, Ưm——Phù——A——Anh hai——Anh, hai ơi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、凪。僕もだ――」
1129 = "「Ừ, Nagi. Tôi cũng vậy——」"
# monologue
# JP: お互い、肉がわなないている。\n高まりに高まりきっている。
1536 = "Da thịt của cả hai đều đang run rẩy. Đã dâng trào đến tột đỉnh."
# monologue
# JP: 肌と肌とを思いっきりに密着させて、汗を交えて、\nその瞬間を、小刻みな動きで誘引していく。
1535 = "Ép chặt da thịt vào nhau hết mức có thể, hòa quyện mồ hôi, tôi dùng những chuyển động nhịp nhàng để dẫn dắt đến khoảnh khắc ấy."
# monologue
# JP: （くっ――くくっ――こつっ――く――くりゅっ）
1792 = "（Ư——Ư ư——Cộc——Ư——Ngoáy）"
# 【凪】
# display as 凪
# JP: 「ふあっ、あっ！　あっ！　～～っ――ンアンッ！！！」
1084 = "「Phù, a! A! ~~——Ưnnn!!!」"
# monologue
# JP: （きゅうううううううううんっ！！！）
1808 = "（Siết chặttttttttttttt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅっ！」
# 1069 = "「呃！」" 
# monologue
# JP: 縮小、吸いつき――凪の静かな、強い絶頂。
1643 = "Co rút, mút chặt——Lần lên đỉnh tĩnh lặng mà mạnh mẽ của Nagi."
# monologue
# JP: 子宮と膣との共同作業の震え引き込む吸精に、\n僕も抵抗することなしに、ただただ快感を解き放つ。
1494 = "Trước sự phối hợp nhịp nhàng giữa tử cung và âm đạo, run rẩy và hút chặt lấy tinh dịch, tôi cũng không hề chống cự, chỉ đơn giản giải phóng khoái cảm của mình."
# monologue
# JP: （どぷんっ！）
1769 = "（Phụt!）"
# monologue
# JP: 塊が、飛び出ていったような感覚。\n凪は体をのけぞらせ、瞬間、またも締め付けられてっ――
1520 = "Cảm giác như có một khối gì đó, vừa bay vọt ra ngoài. Nagi cong người lại, và trong khoảnh khắc, tôi lại bị siết chặt lấy——"
# monologue
# JP: （びゅっ！　びゅるううっ！　びゅっ！　びゅぶっ！）
# 1767 = "（呲！呲！呲！呲！）" 
# monologue
# JP: そして、真っ白な快感がくる。\n貪るように腰が勝手に動き始めて、止まれなくなる。
1601 = "Rồi, một khoái cảm trắng xóa ập đến. Hông tôi tự động chuyển động như đang khao khát tham lam, không thể dừng lại được."
# 【双鉄H】
# display as 雙鐵
# JP: 「凪っ――凪！　凪っ！」
1030 = "「Nagi——Nagi! Nagi!」"
# 【凪】
# display as 凪
# JP: 「にぃさん！　にーさん！　にぃさん！　にい――っ！？\nえ？　あ――ふあっ！？」
1152 = "「Anh hai! Anh hai! Anh hai! Anh hai——!? Hả? A——Phù a!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うおっ！？」
1136 = "「Uô!?」"
# monologue
# JP: （どさっ！）
1800 = "（Bịch!）"
# monologue
# JP: 夏草の匂いと、凪の匂い。
1609 = "Mùi cỏ mùa hè, và mùi của Nagi."
# monologue
# JP: 凪が崩れて、僕も一緒に倒れこんだと――\n嗅覚が、まず真っ先に教えてくれる。
1411 = "Nagi ngã khuỵu xuống, và tôi cũng ngã theo—— Khứu giác là thứ đầu tiên cho tôi biết điều đó."
# 【凪】
# display as 凪
# JP: 「ふっ――はっ――あははっ！\nにーさん、ごめんばいっ！　――（ちゅっ！）」
1071 = "「Phù——Hà——Ahaha!\nAnh hai, xin lỗi á! ——（Chụt!）」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――」
1092 = "「Ưm——」"
# monologue
# JP: キス。キス、キス、キス。
1297 = "Hôn. Hôn, hôn, hôn."
# monologue
# JP: 凪も僕と同じ気持ちで、キスを求めてくれていた。\nそれがわかって嬉しくて、何度も何度もキスを重ねる。
1388 = "Nagi cũng có cùng cảm xúc với tôi, cũng đang khao khát những nụ hôn. Biết được điều đó khiến tôi vô cùng hạnh phúc, tôi trao cho em hết nụ hôn này đến nụ hôn khác."
# 【凪】
# display as 凪
# JP: 「ん……ちゅっ――ちゅうっ――ちゅ――ちゅむっ――\nちゅうっ――れるっ――ちゅううっ――ちゅ――ぷあっ」
1118 = "「Ưm……Chụt——Chụt——Chụt——Chụt—— Chụt——Ngoáy——Chụt——Chụt——Phù a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「凪」
1037 = "「Nagi」"
# monologue
# JP: 草に横たわるそのままに、\n凪の頭を抱えてよしよしと撫でてやる。
1588 = "Cứ thế nằm trên bãi cỏ, tôi ôm đầu Nagi vào lòng và vuốt ve âu yếm."
# monologue
# JP: もう眠りそうな子猫のように少し気だるげに目を細め。\nそのまま凪が、僕の胸へとすりすり頭をすりつける。
1398 = "Em hơi nheo mắt lại đầy uể oải như một chú mèo con sắp ngủ. Cứ thế, Nagi cọ cọ đầu vào ngực tôi."
# 【凪】
# display as 凪
# JP: 「堪能したばい！　満足ばい！\nふたりっきりのデートもやっぱり、幸せばい！」
1156 = "「Tận hưởng đã đời luôn á! Thỏa mãn quá á! Hẹn hò chỉ có hai người quả nhiên, hạnh phúc thật á!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。そうだな。\nふたりっきりのデートもやはり、幸せだ」
1185 = "「Ừ. Đúng vậy. Hẹn hò chỉ có hai người quả nhiên, hạnh phúc thật」"
# monologue
# JP: そう。\nデート“も”だ。
1608 = "Phải.\n\"Cũng\" là hẹn hò."
# monologue
# JP: 僕と凪とはお互いをすっかり満たし合い――\nそうであるのに、少女の形、ひとり分の空白を感じてる。
1543 = "Tôi và Nagi đã hoàn toàn thỏa mãn lẫn nhau—— Dù vậy, tôi vẫn cảm thấy một khoảng trống mang hình dáng của một cô gái, một khoảng trống dành cho một người."
# 【凪】
# display as 凪
# JP: 「それじゃ！　おうちに帰るばい！\n事故なく無事に帰るまで、全部をふくめてデートばい！」
1158 = "「Vậy thì! Về nhà thôi á! Bình an vô sự về đến nhà, tất cả gộp lại mới là hẹn hò trọn vẹn á!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1184 = "「Ừ」"
# monologue
# JP: 立ち上がり。身なりを整え、手をつなぎ。\nそして僕らは、歩みをそろえて、“おうち”に帰る。
1581 = "Đứng dậy. Chỉnh đốn trang phục, nắm tay nhau. Rồi chúng tôi cùng chung bước, trở về \"nhà\"."
# monologue
# JP: ふかみのいる場所。僕ら三人の日々がある場所。\nそこへ向かって――帰ってく。
1698 = "Nơi có Fukami. Nơi có những ngày tháng của ba chúng tôi. Hướng về nơi đó——trở về."
