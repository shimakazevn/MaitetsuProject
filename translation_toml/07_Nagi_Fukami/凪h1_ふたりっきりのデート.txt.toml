# lines: 313 
# 【凪】
# display as 凪
# JP: 「おっでかっけばーい！　おっでかっけばーい！\nにーさんとー、ふーたりっきりのデートばーい！」
1040 = "「出門啦！出門啦！跟大哥哥單獨約會啦！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「確かにデートで、ふたりっきりだが……」
1223 = "「雖說這確實是咱們的單獨約會吧……」" 

# monologue
# JP: 凪の明るい声を吸うのは、緑の木々と鉄路とだ。\nそれ以外、見渡す限りに何も無い。
1654 = "能聽見凪開朗聲音的只有綠樹和鐵路。放眼四周，除此之外什麼都沒有。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何故に線路沿いなのだ？\n他にももっと、楽しげな場所はいくらもあろう」
1198 = "「為什麼要沿著鐵路走？除此之外還有其他有趣的地方吧」" 

# 【凪】
# display as 凪
# JP: 「にーさんは、相っ変わらず、女心を\nちょっともわかってなかとねー」
1151 = "「大哥哥還是一點都不懂女孩子的心啊」" 

# monologue
# JP: 余裕たっぷりでいたずらげな笑み。
1401 = "凪愛的笑容邪惡而輕鬆。" 

# monologue
# JP: 凪らしくも無い微妙で大人びた表情に、\nけれども不思議と、『ああ、凪だな』と感じてしまう。
1687 = "這種大人的表情與她很不相稱，但我卻又覺得這確實很有她的風格。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば教えてくれ凪先生。\nこの光景のどの辺に、女心とやらを楽しませる――」
1215 = "「那就告訴我吧，凪老師。這副景象究竟哪裡討女孩子喜歡了……」" 

# 【凪】
# display as 凪
# JP: 「楽しむだけが、デートじゃなかとよ？」
1202 = "「約會的目的不只是討喜」" 

# monologue
# JP: 僕の言葉を遮って、\n凪の表情がゆるゆる変わる。
1403 = "凪打斷了我的話，她的表情慢慢變了。" 

# monologue
# JP: はにかむような、照れくさそうな……\n実に、女の子らしい柔らかな笑みに。
1468 = "她的神情之中帶著幾分羞澀……真是個女孩子氣的柔和笑容。" 

# 【凪】
# display as 凪
# JP: 「思い出をたどるのもまた、デートばい」
1138 = "「回想過去也是約會啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「思い出？　僕と凪との――っ！」
1214 = "「過去？這裡是我和你……啊！」" 

# monologue
# JP: 言われて、そうかと思い出す。
1648 = "聽她這麼說我才明白。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「この先、か」
1159 = "「就在前面啊」" 

# 【凪】
# display as 凪
# JP: 「えへへっ、嬉しかぁ。\nにーさん、覚えとってくれたとねー」
1135 = "「嘿嘿，開心。大哥哥還記得呢」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「忘れられんさ。\n実に、強烈な出来事だった」
1174 = "「我怎麼忘得掉呢。那件事我記得很清楚」" 

# monologue
# JP: ――凪が修行で倒してしまった倒木は、\n切り株ももう撤去されてる。
844 = "……凪在修行時弄倒的樹跟樹樁都被清理掉了。" 

# monologue
# JP: 線路にかかる枝もなく、\n保線状態は、あのときとまるで見違えている。
1704 = "鐵路上連樹枝都沒有，巡線狀態和那時完全不一樣。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……あのアクシデントは、さまざまな物を、事を、\n大きく大きく動かした」
857 = "「……那個意外真的帶來了許多許多的改變」" 

# monologue
# JP: 今となっては――\nそう考えれば、月並みな言葉が浮かんでしまう。
1299 = "一想到至今改變的那麼多，我腦袋裡就出現了無數老套的話。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「災い転じて福となす――いや、\n僕らは僕らの死力を尽くし、災いを福へと転じたのだな」
1200 = "「焉知非福……不，是我們拚盡全力把禍變成了福」" 

# 【凪】
# display as 凪
# JP: 「むつかしかことはよーわからんばい」
1075 = "「咱不懂那些難懂的話」" 

# monologue
# JP: 軽く笑って、凪はくるりとターンして――
1427 = "凪笑著轉過身來……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1133 = "「嗯？」" 

# monologue
# JP: ――若い樹の幹へ背中をもたれかけさせて、\n潤んだ瞳で、甘える視線で、僕を見る。
848 = "……她倚靠在一棵不算粗壯的樹上，用迷離的眼神看著我。" 

# 【凪】
# display as 凪
# JP: 「けど、ひとつだけ、わかるとよ。修学旅行でお勉強して、\nひとつだけ――ウチも、わかるよーになったばい」
1014 = "「但有件事咱懂。通過修學旅行的學習，咱懂了這件事」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何を、わかるようになったのだ？」
1020 = "「你懂了什麼？」" 

# 【凪】
# display as 凪
# JP: 「あのとき――にーさんに助けてもらって、\n胸が、きゅうんとしよったばい」
1221 = "「那時……大哥哥救了咱，咱心裡小鹿亂撞的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1069 = "「呃！」" 

# monologue
# JP: 僕の手を取り、凪がその胸へ導いていく。
1406 = "凪抓著我的手，靠在了她的胸口。" 

# monologue
# JP: つつましやかなやわらかみの下、\nドッ、ドッ、ドッ、ドと、熱くて強い鼓動を感じる。
1693 = "那微微隆起的胸部之下，傳來強烈的撲通撲通的心跳。" 

# 【凪】
# display as 凪
# JP: 「悪かことした、失敗した！　って、そぎゃん感じて、\n胸ば痛たなったのかって、あんときは思うたばい。けど」
1076 = "「咱覺得自己做了壞事，搞砸了，心很痛。但是……」" 

# monologue
# JP: 見つめられてる。\n見つめあってる。
1425 = "凪看著我。我們彼此對視著。" 

# monologue
# JP: 目が大きいな、と今さら思う。\n黒くて、深くて……とても静かな瞳と、思う。
1558 = "我忽然覺得，她的眼睛真大。她的眼黑暗而深邃……而且很寂靜。" 

# 【凪】
# display as 凪
# JP: 「あんとき、ウチは――ストーンって恋に落ちたばい。\nふかみちゃんとにーさんが、そいば解らせてくれたばい」
1222 = "「那時，咱……一定是喜歡上你了。是小深和大哥哥讓咱明白了這一點」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「恋に落ちる、か」
1120 = "「喜歡啊」" 

# monologue
# JP: この瞬間、と、\n気づけるようなタイミングは僕にはなかった。
1530 = "我並沒有明確地喜歡上她們的一瞬間。" 

# monologue
# JP: だが、少しずつ、少しずつ――
1324 = "但我確實是一點點又一點點地喜歡上了她們……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、僕はじわじわと……底なし沼に呑まれるように、\n今も、恋に落ち続けているのだな」
1218 = "「那我就是一點點地被無底沼澤吞噬著……現在我依然在越來越喜歡你們」" 

# 【凪】
# display as 凪
# JP: 「ふっふーん、ふかみちゃんとウチとで、\nにーさんのこと、溺れるまで引きずりこんじゃうばいっ」
1095 = "「哼哼，咱要跟小深一起把大哥哥拉到最深處」" 

# monologue
# JP: （くっ）
1766 = "（呃）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1115 = "「啊」" 

# monologue
# JP: 僕の手を掴まえ続けてる、凪の指に力がこもる。\n改めて押し付けられてみたなら、すぐ気づく。
1407 = "凪抓著我，加大了手指上的力氣。她這樣按著我手，我才注意到。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「凪も、か」
1018 = "「你也是啊」" 

# monologue
# JP: （ふにゅっ――こりゅっ――）
1790 = "（按壓）" 

# monologue
# JP: 凪の乳首、小さな乳首が固くなってる。
1430 = "凪那小小的乳頭硬了。" 

# monologue
# JP: 手のひらで軽く押しつぶすようにしてみれば、\n凪の口から、熱くしめった息がこぼれる。
1578 = "我用手稍稍按壓，凪口中就呼出了火熱的吐息。" 

# 【凪】
# display as 凪
# JP: 「にーさんも、ばい？」
1149 = "「大哥哥你也想要嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――っ」
850 = "「……」" 

# monologue
# JP: 僕の勃起に、凪の指先が伸びてくる。
1417 = "凪的指尖碰到了我的勃起。" 

# monologue
# JP: （さすっ）
1805 = "（窸窸窣窣）" 

# monologue
# JP: ためらうことなく、勃起を撫ぜて。\nそうして凪は、上目遣いに僕を見る。
1466 = "她毫不猶豫地撫摸起我的下面。接著，她抬頭看著我。" 

# 【凪】
# display as 凪
# JP: 「……もっと深くまで落ちちゃうばい？」
855 = "「……想多喜歡一點嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「望むところだ」
1175 = "「我求之不得」" 

# 【凪】
# display as 凪
# JP: 「ん……」
1126 = "「嗯」" 

# monologue
# JP: 汗に張り付くシャツを剥がすようにまくりあげれば、\n凪も僕のズボンから、勃起を導き出してくれる。
1548 = "我將沾滿汗水的襯衫掀起來，凪則將我的勃起從褲子裡掏了出來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「とてもかわいいおっぱいだ」
1021 = "「你的胸部很可愛」" 

# 【凪】
# display as 凪
# JP: 「にーさんのちんちんは、かわいくなかばい――\nすごく、強そうで……きょーあくばい」
1023 = "「你的雞巴也很可愛……看起來很有力……很兇悍」" 

# monologue
# JP: （くにっ）
1786 = "（抓）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うっ」
1068 = "「呃」" 

# 【凪】
# display as 凪
# JP: 「あんっ」
# 1115 = "「啊」" 

# monologue
# JP: ほとんど同時に、\n勃起乳首と勃起性器をお互いの指が刺激しはじめる。
1563 = "我抓住了凪勃起的乳頭，同時凪也抓住了我勃起的陰莖。" 

# monologue
# JP: （くにっ――ふにっ――もみゅっ――こしゅっ――）
1784 = "（抓……抓……抓……抓……）" 

# 【凪】
# display as 凪
# JP: 「んっ……ふっ――あっ……気持ち……よか、ばい」
1093 = "「哼……呼……啊……好舒服」" 

# monologue
# JP: ただでさえ高めの凪の体温が、\nさらにぬくもりを増してくる。
1423 = "凪的體溫本來就高，現在被我一弄就更燙了。" 

# monologue
# JP: 先走り汁と手汗が融け合い、\n絶妙なぬらつき加減で、凪の摩擦の快感を増す。
1709 = "預射液跟汗水混在一起，滑溜溜的，增強了凪摩擦我的快感。" 

# monologue
# JP: （くりっ――くりゅっ――ぬりっ――ぬりゅ）
# 1784 = "（抓……抓……抓……抓……）" 

# 【凪】
# display as 凪
# JP: 「ひゃ――あっ――汗、ば――ぬらぬら……って、して」
1051 = "「呀……啊……汗……黏糊糊的」" 

# monologue
# JP: 凪を見習い、僕も凪へと汗を塗りこむ。
1545 = "我學著凪，也開始往她身上抹汗。" 

# monologue
# JP: 胸の、おなかの、脇腹の、汗を手のひらに掬って集め、\n中心へ――乳首へ向かって揉みあげながらすり込んでいく。
1541 = "我刮起胸部、肚子、側腹的汗水，向著中央的乳頭抹去。" 

# 【凪】
# display as 凪
# JP: 「ん……はぁ……あっ――熱っ、つい……んっ――\nおっぱい――じんじん――して――熱かと、よ――んっ」
1123 = "「嗯……啊……好燙……嗯……胸部……抽著……好燙……嗯」" 

# monologue
# JP: 乳首の刺激が良すぎてか、\n凪の右手の力がほとんど、抜けてしまう。
1589 = "或許是因為我給乳頭帶來了太強烈的刺激，凪的右手幾乎沒了力氣。" 

# monologue
# JP: 感じさせてることは素直に嬉しいが、\nこれではいささか、僕が物寂しくもある。
1655 = "能讓她舒服我很開心，但這樣我就有些寂寞了。" 

# 【凪】
# display as 凪
# JP: 「は……うっ……気持ち、よか……んっ――にーさんの、\n手に……おっぱい……とろとろ……されて――ふ――あ」
1106 = "「啊……嗚……好舒服……嗯……大哥哥的手……把我胸部……弄得黏糊糊的……呼……啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「凪――下を脱がすぞ」
1033 = "「凪……我給你脫掉下面」" 

# 【凪】
# display as 凪
# JP: 「うん……良かよ――全部、にーさんの好きにして」
1125 = "「嗯……好的……全都隨你」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1126 = "「嗯」" 

# monologue
# JP: 凪のおへそに、ズボンの内側、肌とパンツの境目に、\nこぼれた汗が、滴になって溜まってる。
1420 = "凪的肚臍、褲子內側還有內褲上都積滿了汗水。" 

# monologue
# JP: それを指先でぬぐいつつ、そしてパンツを、\nべたつく汗ごと、また剥がしつつ脱がしてく。
1527 = "我一邊用手指刮汗，一邊連汗帶內褲給剝了下來。" 

# 【凪】
# display as 凪
# JP: 「あ……おまんこ、涼しかぁ」
1099 = "「啊……下面好涼快」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なに。すぐに熱くなる」
1191 = "「沒事，很快就會燙起來的」" 

# monologue
# JP: （くちゅんっ！）
1774 = "（啾！）" 

# 【凪】
# display as 凪
# JP: 「ふぁんっ」
1080 = "「哇」" 

# monologue
# JP: 凪のおまんこは湿っているが、潤っている感じではない。\nならば、これはただの汗なのだろう。
1414 = "凪的下面濕了，但不夠濕。那這應該只是普通的汗水。" 

# monologue
# JP: 傷つけないよう慎重に、\n指の腹を柔かに使い、シンプルな割れ目を撫ぜほぐしてく。
1537 = "我儘量不讓她受傷，輕巧地使用手指內側，輕輕按摩裂縫。" 

# monologue
# JP: （くっ――くちゅっ――ちゅむっ――チュルッ――）
1770 = "（啾……啾……啾……啾……）" 

# 【凪】
# display as 凪
# JP: 「ん……ふっ――好い、とー……んっ――\nにーさんの……指……気持ち……よかっ――」
1121 = "「嗯……呼……舒服……嗯……大哥哥的……手指……好舒服……」" 

# monologue
# JP: ほどなく、凪の内側からの蜜が指先を濡らし始める。\nその誘いに素直に応じ、指をカギにして差し込んでみる。
1307 = "不久，從凪體內流出的蜜汁就浸濕了我的手指。我誠實地回應了她的邀請，把手指當成鑰匙一樣插了進去。" 

# monologue
# JP: （くっ――ぷっ）
1780 = "（噗）" 

# 【凪】
# display as 凪
# JP: 「ふやうっ！」
1081 = "「哇！」" 

# monologue
# JP: （キチチチチッ！）
1809 = "（緊！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む」
1097 = "「唔」" 

# monologue
# JP: ちいさい。狭い。ひどく熱い。
1480 = "好小，好窄，好燙。" 

# monologue
# JP: 凪のおまんこ――膣穴は、歯の無い唇を持つ獣のように、\n一生懸命、かなり強めに、僕の指先に喰い付いてくる。
1422 = "凪的陰道就像一隻沒有牙齒的野獸，拚命地用力咬著我的指尖。" 

# 【双鉄H】
# display as 雙鐵
# JP: （この狭い穴で……僕の勃起を――\n凪は、受け入れてくれたのか）
1765 = "（凪……就是用這個小小的洞穴接受了我的勃起啊）" 

# monologue
# JP: 嬉しくなって、同時に申し訳なくもなってくる。
1555 = "我很高興，但同時也覺得很對不起她。" 

# monologue
# JP: 初めてのときは僕もいっぱいいっぱいすぎて、\n凪を気持ちよくしてやることに、心を砕ききれなかった。
1636 = "第一次的時候我也很懵懂，沒辦法專心讓凪舒服。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「じっくり――ゆっくり――気持よくなろう」
1171 = "「慢慢地……一點點地……舒服起來吧」" 

# 【凪】
# display as 凪
# JP: 「はっ――うんっ――んッ――にーさん――にぃさぁん」
1109 = "「啊……嗯……嗯……大哥哥……大哥哥」" 

# monologue
# JP: 蜜は手のひらをつたって手首を、腕までを濡らす勢いだ。
1668 = "蜜汁順著掌心留下來，幾乎要沾濕我的手腕和手臂。" 

# monologue
