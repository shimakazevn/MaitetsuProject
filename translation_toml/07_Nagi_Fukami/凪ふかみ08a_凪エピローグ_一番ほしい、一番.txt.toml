[script]
# lines: 485 
# 【双鉄】
# display as 雙鐵
# JP: 「凪……」
1578 = "「凪……」" 

# 【凪】
# display as 凪＆深美
# JP: 「にーさん、気がついたとっ！？」\n「あ――」
1736 = "「大哥哥，你醒咧？！」\\n「啊……」" 

# monologue
# JP: 凪ちゃんのお名前、呼んだ。真っ先に。\n倒れたとき、一緒にいたの、わたしなのに……
2855 = "雙鐵哥哥第一個就叫了小凪的名字。他暈過去的時候，和他在一起的明明是我……" 

# monologue
# JP: って！　さっきまでの話、わたし、引きずっちゃってる。\n今、そんなことに気にしてる場合じゃないのに！
2506 = "啊！我還在想之前的事情。現在不是在意這些的時候啊！" 

# 【ふかみ】
# display as 深美＆凪
# JP: 「あのっ」「どっか痛むとこなかと？\n気分はどうばい？　何があったか、覚えておると？」
1828 = "「我說」「有沒有哪裡痛？感覺怎麼樣？還記得發生了什麼事嗎？」" 

# monologue
# JP: 凪ちゃんの両手が、双鉄おにいさんの両手を包む。\n双鉄おにいさん、ホっ、ってしてる顔になる。
2579 = "小凪用雙手抓住了雙鐵哥哥的雙手。雙鐵哥哥露出一臉放心的神情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕、は――」
1808 = "「我……」" 

# monologue
# JP: けど、すぐにその顔が苦しそうに歪んじゃう。\nどこか痛かったりするのかも。
2488 = "可是，他的表情立刻就變得痛苦起來。或許是有什麼部位很痛。" 

# monologue
# JP: お医者さま、ただの過労っていってたけど、\nもう一回来てもらったほうが――
2835 = "醫生說他只是過勞，不過或許還是再請醫生過來一趟比較好。" 

# 【凪】
# display as 凪
# JP: 「にーさん、痛むと！？　苦しかとっ！！？\nお医者様は過労っていうてたばってん――」
1735 = "「大哥哥，你痛嗎？！難受嗎？！醫生說你過勞了咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。痛まん。苦しくもない。\nただ、少し混乱をしてしまって――うむ？　お医者？」
1501 = "「不，不痛，也不難受，只是腦子有點混亂……嗯？醫生？」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　にーさん、倒れとったって――\n川で倒れたって聞いたとばい！　ね？　ふかみちゃん」
1861 = "「是咧！聽說大哥哥是暈倒的……是在河裡暈倒的！對吧，小深？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ？」
1907 = "「深美？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
1671 = "「啊……」" 

# monologue
# JP: 双鉄おにいさん、やっと、わたしを見てくれる。\nどこか、ぼーっとしてる感じで。
2856 = "雙鐵哥哥終於回頭看向我，反應顯得有些呆滯。" 

# monologue
# JP: 混乱っていってたけど、でも――\n倒れたときに、一緒だったのはわたし、なのに……
2277 = "他說是因為頭腦有些混亂，但是……他暈倒的時候，陪在他身邊的明明是我……" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん？　どぎゃんしたと！？\nふかみちゃん、ふかみちゃんっ！？」
1766 = "「小深，你怎麼咧？小深，小深！」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！」
1674 = "「啊！」" 

# monologue
# JP: いけない。\n一番たいへんなの、双鉄おにいさんに決まってるのに。
2823 = "這可不行，最難受的應該是雙鐵哥哥啊。" 

# monologue
# JP: なのにわたし、自分の気持ちのことばっかりで。
2285 = "但我卻只顧著自己的感受。" 

# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい――ごめんね、凪ちゃん。\nちょっと、わたし――ぼーっとしちゃって」
1754 = "「對不起……對不起，小凪。我剛剛走神了」" 

# 【凪】
# display as 凪
# JP: 「大丈夫と？　ふかみちゃん、もしかして――\n川でにーさん助けたときに、どっか打ったと？」
1894 = "「沒事吧？小深，你該不會……是在河裡去救大哥哥的時候摔到哪裡了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1679 = "「啊！！！」" 

# monologue
# JP: 双鉄おにいさんの目が丸くなる。\nぼーって、膜がかかってたみたいなのがハッキリする。
2853 = "雙鐵哥哥瞪圓了眼。剛才還無神的眼珠一下充滿了光芒。" 

# monologue
# JP: ――焦点が定まる、って、きっと、このこと。
1183 = "——他的眼神恢復了神采。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだった！　無事かっ！？　ふかみっ！\n怪我などはっ」
1755 = "「對啊！深美你沒事吧！受傷了嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「大丈夫。です。わたしは――\nわたしは、双鉄おにいさんに、守ってもらいましたし」
1893 = "「沒事。是……雙鐵哥哥保護了我」" 

# monologue
# JP: 助けようとして、わたしも足を滑らせちゃって。\nかばってもらって――
2741 = "準備拉他的時候，我也腳滑了。然後雙鐵哥哥護住了我……" 

# monologue
# JP: 双鉄おにいさんにつつまれたとき、\nわたし――不謹慎だけど――しあわせ、で。
2794 = "被雙鐵哥哥抱住的時候……雖然這種話很不合時宜，但我真的覺得很幸福。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、それは逆」
1502 = "「不，你說反了」" 

# 【ふかみ】
# display as 深美
# JP: 「それにっ！」
1938 = "「而且！」" 

# monologue
# JP: だから。\nわたしは、双鉄おにいさんにしあわせになって欲しい。
2665 = "所以，我希望雙鐵哥哥能夠幸福。" 

# monologue
# JP: 例え、双鉄おにいさんの隣にいるのが、\nわたしじゃなくても――それでも、やっぱり。
2426 = "即使在他身邊的人不是我也無妨。" 

# 【ふかみ】
# display as 深美
# JP: 「それに――わたし……川から引き上げただけだから……。\nだから、全然。どこも、痛んだりしてない――です」
1940 = "「而且，我……只是把你從河裡拖上岸而已……所以我完全沒有哪裡覺得痛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そんな様子には見えないぞ。\n正直、かなり辛そうだが――」
1627 = "「可是，你看起來不像沒事啊。感覺你好像很難受……」" 

# 【凪】
# display as 凪
# JP: 「やっぱり、どっか痛むんじゃなかと？」
1544 = "「你身上肯定有地方不舒服吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「ううん、凪ちゃん。\n大丈夫。わたし、どこも痛めてなんてないから」
1504 = "「不，小凪，沒事，我身上一點都不疼」" 

# monologue
# JP: こころ以外は、全然平気。\nこころもわたしが、勝手に自分で自分を苦しめてるだけ。
2473 = "只有內心的苦悶讓我感到煎熬。而且我的心會痛，也完全是因為我在自己折磨自己。" 

# monologue
# JP: 凪ちゃんの名前を、双鉄おにいさんが先に呼んだ。\nそんなのは、ただの流れで、タイミングかもしれないし。
2847 = "雙鐵哥哥先叫了小凪的名字。或許這只是個巧合，只是個偶然。" 

# 【双鉄】
# display as 雙鐵＆凪
# JP: 「ふかみ？」\n「ふかみちゃん？」
1908 = "「深美？」\\n「小深？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　ごめんね。\nまたちょっと……気が散っちゃって」
1677 = "「啊！抱歉，我又……走神了」" 

# monologue
# JP: いけない。声、ふるえちゃってる。\nっていうか、この言い訳だけだと、頭とか心配されちゃう。
2229 = "不好，我的聲音在顫抖。而且，我這樣找藉口……他們會懷疑我腦袋是不是受傷了。" 

# 【ふかみ】
# display as 深美
# JP: 「凄く心配だったから、ホッとして気が抜けちゃって。\nでも、もう大丈夫。シャキってしてる！」
1821 = "「我特別擔心你，所以放下心來之後人就待了。不過已經沒事了，現在我特有活力！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であれば良いが――」
1782 = "「希望如此吧……」" 

# 【ふかみ】
# display as 深美
# JP: 「であるです。お医者様に、わたしも見てもらったですし。\nだから、ほんとに平気！　です」
1774 = "「就是如此。我也讓醫生檢查過的，所以真的沒事！嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば――」
1873 = "「是嗎。那麼……」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1663 = "「哎？！」" 

# monologue
# JP: 双鉄おにいさんの頭が下がる。\nわたしに、頭を下げてくれてる。
2846 = "雙鐵哥哥低下腦袋，向我鞠了一躬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御礼が遅くなってしまったな。\n助けてくれて、ありがとう」
1842 = "「接受我遲來的道謝吧，謝謝你救了我」" 

# 【ふかみ】
# display as 深美
# JP: 「いえっ！？　そんなっ」
1896 = "「沒事，不必的！」" 

# monologue
# JP: そんなことされたら、恐縮しちゃう。\nだって、原因はそもそもわたしと凪ちゃんだから。
2282 = "他這樣做，我會很過意不去的。畢竟會變成這樣也是因為我和小凪。" 

# monologue
# JP: わたしと凪ちゃんが甘えすぎたせいで――\nこんなに頑張れる大人の人を、倒れさせちゃったんだから。
2520 = "因為我和小凪過於依賴雙鐵哥哥……才把他這樣能幹的大人給累倒了。" 

# 【ふかみ】
# display as 深美
# JP: 「いつも、双鉄おにいさんに助けてもらっていますから。\nその百分の一も、お返しできてないって思います。です」
1786 = "「平時雙鐵哥哥總是幫助我，這點小事根本抵不上往日百分之一的恩情，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは大げさすぎるだろう。\n僕らは、三人、いつもお互いに助け合って――」
1990 = "「這就太誇張了吧。我們三個人一直互相幫助……」" 

# 【凪】
# display as 凪
# JP: 「そんつもりだったばってん！\nやっぱりウチとふかみちゃん――甘えすぎとったとよ」
1645 = "「咱們本來也是這麼認為的！但是咱和小深果然還是太依賴你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪……」
# 1578 = "「凪……」" 

# monologue
# JP: 凪ちゃんを見る。\n凪ちゃんもわたしを見返してくれる。
2655 = "我看了看小凪，她也看了看我。" 

# monologue
# JP: 凪ちゃんのあのまっすぐな目が、\nわたしの迷いを、消してくれる。
2586 = "小凪那真誠的眼神消除了我的迷茫。" 

# 【ふかみ】
# display as 深美
# JP: 「だから――わたしと凪ちゃん、相談してたんです。\n双鉄おにいさんが、起きてくれるのを待ってる間に」
1832 = "「所以我和小凪談過了。就在等你起來的這段時間裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「相談？　とは……」
1960 = "「談什麼……」" 

# 【ふかみ】
# display as 深美
# JP: 「修学旅行の、こと。です」
1773 = "「就是修學旅行，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の？」
1555 = "「修學旅行？」" 

# 【ふかみ】
# display as 深美
# JP: 「です。だから――その――\n具体、的……にはっ――」
1696 = "「嗯。所以，具體來說……就是……」" 

# monologue
# JP: ああ、ダメ。泣きそう。\nやっぱりわたし、言いたくないんだ。
2507 = "啊，不行，要哭出來了。看來我還是不願意說出口啊。" 

# monologue
# JP: 『凪ちゃんがきっと選ばれる』って、\nわたしのこころが、強く、強く感じちゃってて――
2634 = "我心底有個聲音告訴我，雙鐵哥哥一定會選小凪。" 

# 【凪】
# display as 凪
# JP: 「具体的には、いままでの修学旅行を続けるのは、\nちょこーっと無理が出てきたと――って話ばい」
1574 = "「具體來說咧，就是有些不太方便繼續修學旅行了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理、か――」
1495 = "「不方便啊……」" 

# monologue
# JP: 少し、びっくりしたみたいな顔。\nそうして双鉄おにいさんは、小さく小さく、頭を振る。
2851 = "雙鐵哥哥的表情有些吃驚。接著，他輕輕搖了搖頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なるほど。僕は楽しさのあまり……\n体の方に、無理をさせてしまっていたのかもしれんな」
1875 = "「是嗎，好的。看來我……因為太過享受旅途，而讓身體承受了太多的負擔啊」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　今のままで、にーさんがまた倒れたら、\nうちもふかみちゃんも悲しかけんね」
1863 = "「是咧！要是大哥哥又倒下去了，咱跟小深都會傷心的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……それを言われてしまえば、反論の余地も無い」
1667 = "「唔……你這麼說的話，我確實無話可說」" 

# 【凪】
# display as 凪
# JP: 「にーさんもウチもふかみちゃんも、みんな元気でいれば、\n形が変わっても、きっとな～んも変わらんけん！！」
1619 = "「只要大哥哥、咱跟小深健健康康的，即使名義改變了，但實際上肯定是什麼都沒變的咧！！」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！！」
1678 = "「啊！！」" 

# monologue
# JP: 凪ちゃん。笑顔。\nおひさまみたいに、少しも曇ってない笑顔。
2583 = "小凪笑了。她笑得就像太陽公公一樣，臉上沒有一絲陰雲。" 

# monologue
# JP: 『修学旅行』の枠が消えても、わたしたち、\nずっと三人、おんなじままでいられるんだって、信じてる。
2549 = "她相信，即使沒了“修學旅行”的名義，我們三個也能永遠保持現在這樣的關係。" 

# 【ふかみ】
# display as 深美
# JP: 「凪……ちゃん」
1756 = "「小凪……」" 

# monologue
# JP: わたしは、そこまで純粋じゃない。\n凪ちゃんみたいには、絶対になれない。
2644 = "我沒她這麼純真。我肯定沒辦法變成她這樣。" 

# monologue
# JP: でも、だからこそ、わたしと凪ちゃんは友達になった。\nだからこそ、わたしは、凪ちゃんが大好き、で……
2484 = "可是正因為這樣，我們才成了朋友。正因為這樣，我才會那麼喜歡她……" 

# 【ふかみ】
# display as 深美
# JP: 「んっ――」
1665 = "「唔……」" 

# 【凪】
# display as 凪
# JP: 「やけん、変えんといけんって思うとよ！\n今の形の、にーさんが無理する修学旅行ば」
1834 = "「所以，咱覺得必須改變！不能再像現在這樣，讓大哥哥勉強自己」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、な……」
1744 = "「好的……」" 

# monologue
# JP: ああ、凪ちゃん。わたしが言葉につまっちゃったの、\n『言い辛いから』って、きっと、思ってくれたんだ。
2512 = "啊，小凪一定是發現了我在猶豫，發現了我不太敢說出口。" 

# monologue
# JP: だから全部を、わたしに代わって――\n一人で背負おうとしてくれてるんだ。
2663 = "所以，你才想獨自……替我背負一切。" 

# 【ふかみ】
# display as 深美
# JP: 「そう、なんですよ！」
1778 = "「就是說啊！」" 

# monologue
# JP: だったら、わたしも応えなきゃ。\n普通に、普通に、いつもどおりに。
2834 = "那麼，我也必須回應她。自然地，流暢地，就像平時一樣。" 

# monologue
# JP: 泣くなんて、一人になってから\nいくらでも、好きなだけできるんだから。
2745 = "畢竟，如果想哭，回頭獨處的時候我想怎麼哭都可以。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで――具体的にはどう変えていくんだ？」
2017 = "「那麼……具體而言應該怎樣改變？」" 

# 【凪】
# display as 凪
# JP: 「そいば……どぎゃんすると？　ふかみちゃん」
1989 = "「這個……你覺得該怎麼辦，小深？」" 

# 【ふかみ】
# display as 深美
# JP: 「それを決めるためには――」
1952 = "「要做出這個決定……」" 

# monologue
# JP: 言葉が、喉に絡みつく。
2810 = "話說到一半，噎在了喉嚨裡。" 

# monologue
# JP: 言いたくない、聞きたくないって、\nわたしのからだの、底の部分が抵抗してる。
2653 = "我的內心深處正在抗拒著。我不想說出這句話，我也不想聽見答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「決めるためには？」
2029 = "「需要做什麼？」" 

# monologue
# JP: だって、双鉄おにいさん。きっと、もう答えがでてるから。\nそれはきっとわたしには、寂しい答えになりそうだから。
2845 = "雙鐵哥哥他肯定已經有答案了。這個答案一定會讓我失落。" 

# monologue
# JP: すごく怖くて、聞きたくなくて――逃げ出しちゃいたい。\nだけど、逃げたら……ずっと、負担をかけ続けちゃう。
2632 = "我很害怕，不想聽他回答……甚至想當場逃跑。可是，如果我逃了……那我會一直繼續做他的負擔。" 

# 【ふかみ】
# display as 深美
# JP: 「聞かせて、ください」
1633 = "「告訴我們吧」" 

# monologue
# JP: だから、言う。\n逃げ出さないよう、言葉で自分を縫い付けちゃう。
2666 = "所以，我要說出口。為了不讓自己逃避，我一定要親自說出口。" 

# monologue
# JP: 時間をおいたらきっとわたし、ズルいこと考えちゃうから。\n凪ちゃんを出し抜こうって、追い詰められてしまうから。
2799 = "要是現在不說，一段時間後我肯定會想辦法耍詐。到時候，走投無路的我一定會想盡一切辦法把小凪壓下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせる？　何をだ？」
1632 = "「告訴你們？告訴你們什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、気持ち――を、です」
1538 = "「你的心意，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の気持ち？」
1823 = "「我的心意？」" 

# 【ふかみ】
# display as 深美
# JP: 「そう。です」
1877 = "「是的」" 

# monologue
# JP: けど。だけど。もしそんなことをしちゃったら、\nわたしは二度と、凪ちゃんの顔を見られなくなる。
2489 = "可是，可是啊，如果我真的耍詐搶跑，那我就再也沒臉見小凪了。" 

# monologue
# JP: 一番大好きなともだちと、\nわたしは、二度とあえなくなっちゃう。
2832 = "那我就再也沒臉見自己最喜歡的朋友了。" 

# 【ふかみ】
# display as 深美
# JP: 「まず、最初に聞かせてください。\n凪ちゃんを、わたしを、どう思ってるか」
2035 = "「首先請你告訴我們，你是怎樣看待小凪，怎樣看待我的？」" 

# 【凪】
# display as 凪
# JP: 「はぅぅぅ～～っ」
1692 = "「嗚……」" 

# monologue
# JP: 凪ちゃんが、とっても切なそうな声を出す。\nそれを聞いたら、わたしにもチャンスあるかもって――
2581 = "小凪發出了非常傷心的聲音。聽見這聲音，我忽然覺得自己可能有希望……" 

# monologue
# JP: 望んじゃダメって、もっと悲しくなるだけだって……\n頭ではそう考えてるのに――なのにどうしても思っちゃう。
2430 = "即使腦子有個聲音告訴自己不能抱有希望，因為那樣會更加悲傷……可我卻控制不住自己的想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の、気持ち。\n凪に対する。ふかみに対する」
1812 = "「我對凪，對深美的心意」" 

# monologue
# JP: ああ、また。聞いてるのはわたしなのに――\n無意識に、凪ちゃんの名前を先に呼んでる。
2509 = "啊，又來了。明明是我在提問……他卻在無意識中將小凪的名字放在了前面。" 

# 【ふかみ】
# display as 深美
# JP: 「そうです」
# 1877 = "「是的」" 

# monologue
# JP: 事実が、背中を押してくれる。\nほんの少しずつ少しずつ、からだが、理解を許しはじめる。
2264 = "事實擺在眼前。慢慢地，我的身體開始逐漸允許自己接受事實。" 

# 【ふかみ】
# display as 深美
# JP: 「それを、聞かせてくれたら、話してくれたら。\nきっと、自然と、見えてくるって――思う、です」
1615 = "「只要你願意跟我們說說，告訴我們你的心意，我相信一切自然會豁然開朗，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1710 = "「噢……」" 

# monologue
# JP: 双鉄おにいさんが、わたしを見る。
2852 = "雙鐵哥哥看著我。" 

# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 1674 = "「啊！」" 

# monologue
# JP: その目にどんな感情が浮かんでいるのか――
2274 = "他的眼神中蘊含著怎樣的感情呢……" 

# monologue
# JP: わたしにはきっとわからないけど、\nわかっちゃったら怖い気がして、目をそらす。
2614 = "我一定讀不出其中的涵義，但卻害怕自己萬一能看懂，於是移開了視線。" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の、変えていきかた――\nあるいは……旅の、終わらせ方が、か」
1995 = "「這樣就知道如何改變修學旅行……或者是知道如何結束修學旅行了」" 

# 【凪】
# display as 凪
# JP: 「ぁっ――」
# 1671 = "「啊……」" 

# 【ふかみ】
# display as 深美
# JP: 「そう。です。きっと」
1878 = "「是的，嗯，肯定可以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1697 = "「嗯」" 

# monologue
# JP: 双鉄おにいさんが、黙り込む。\n凪ちゃんの、私の言葉を、多分、待ってる。
2848 = "雙鐵哥哥沉默了。他大概是在等待小凪和我發話。" 

# monologue
# JP: だけど、なんにも口に出せない。\nわたしだけじゃなく、凪ちゃんも。
2284 = "但我什麼也說不出口。不只是我，小凪也一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、話そう。まずは、凪」
1223 = "「……那我就說吧。首先從凪開始」" 

# 【凪】
# display as 凪
# JP: 「ひゃいっ！」
1722 = "「在！」" 

# monologue
# JP: 凪ちゃんがびくんっ！　って背筋を伸ばす。\n双鉄おにいさんが、ふふって笑う。
2585 = "小凪身子一抖，站得筆直。雙鐵哥哥呵呵地笑了。" 

# monologue
# JP: 笑った、んだよね？　笑った気がする。\n怖くてわたし、それでも顔を見られない。
2272 = "他是笑了吧？應該是笑了。我現在依然怕得不敢看他的臉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪に対する気持ちというなら――\n『危なっかしい』のひとことだ」
1811 = "「我對你的心意……就是“看著讓人擔心”」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんと気持ちとっ！？」
1997 = "「這算什麼心意啊？！」" 

# monologue
# JP: ほんの一瞬。
2764 = "短短一句話。" 

# monologue
# JP: ただひとことを双鉄おにいさんと交わしただけで、\n凪ちゃん、いつもの凪ちゃんになる。
2854 = "雙鐵哥哥短短的一句話，就讓小凪變回了往常的模樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1697 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「レディーに対して、あんまりばーい」
1996 = "「這樣跟淑女說話，太過分咧」" 

# monologue
# JP: 凪ちゃん、がくーんて落ち込んじゃう。\n逆に、わたし、心臓がびょんびょん跳ね出しちゃう。
2575 = "小凪一下就失落了。而我的心臟則開始瘋狂跳動。" 

# monologue
# JP: 期待しちゃだめ、望んじゃだめ。\nそう思うけど――双鉄おにいさんの気持ちがもしも――
2233 = "不能期待，不能抱有希望。雖然我心裡是這麼想的……可是萬一雙鐵哥哥他……" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪はまっすぐで迷いがない。自分が正しいと信じるから、\n例え周りが間違いであると示しても、なかなか[ひ]退けない」
1530 = "「你很率真，從不迷茫。因為你相信自己是正確的，即使旁人指出你錯了，你也很難承認」" 

# 【凪】
# display as 凪
# JP: 「むぅぅ～」
# 1665 = "「唔……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪の突破力は、時としては諸刃の[けん]剣だ。\n抜群の刺さり方をする故、抜くべきときには障害となる」
1541 = "「你的衝勁是一把雙刃劍。衝鋒的時候非常尖銳，撤退的時候非常礙事」" 

# 【凪】
# display as 凪
# JP: 「ばってん！　そいば、長所でも――あるとよ、ね？」
1625 = "「可是！這也算是……一種優點吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1919 = "「當然算」" 

# monologue
# JP: 双鉄おにいさんが言った瞬間、\n凪ちゃんの顔がほにゃーってゆるむ。
2784 = "聽雙鐵哥哥這麼說，小凪的表情頓時放鬆下來。" 

# monologue
# JP: 悔しいくらい、素直でかわいい。\nそれが不安で、なのにわたし、嬉しいなっても感じてる。
2546 = "她是那麼誠懇而可愛，幾乎讓我嫉妒。這讓我有些害怕，卻也讓我覺得開心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪の挑戦は。その突破が見せてくれる新しい景色は、\n僕を大いにわくわくさせる。凪との旅は、ゆえに楽しい」
1540 = "「你的挑戰、你的突破，讓我見到了新的風景，讓我非常興奮。所以和你旅行，我很開心」" 

# 【凪】
# display as 凪
# JP: 「ふふーん！　だったらよかばい！　なによりばい！！」
1664 = "「哼哼！那就好！那就好咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕の凪への気持ちだ。放っておけない、\n危なっかしい――だから僕は、いつでも凪を助けたい」
1991 = "「這就是我對你的心意。看著讓人擔心，不能放著不管……所以我希望自己隨時都能幫助你」" 

# 【凪】
# display as 凪
# JP: 「にーさんに守ってもらわんでもすぐ平気になるばい！\n凪さま！　もっと大人に、素敵なレディーになるけんね」
1780 = "「就算沒有大哥哥保護，咱也沒事的！本小姐會變得更加成熟，成為更出色的淑女」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……ふむ。嬉しく心強いことだな。\nそうなったときには、僕が凪に守ってもらうか」
1987 = "「這……唔，聽著就讓人心安啊，我很高興。那到時候就要請你保護我了」" 

# 【凪】
# display as 凪
# JP: 「どんとこいばい！　まーかせーろばーい！」
1898 = "「沒問題！包在咱身上咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。よろしく頼む」
1700 = "「嗯，交給你了」" 

# monologue
# JP: ……双鉄おにいさん、こんな顔して笑うんだ。\n優しくて、あったかで。こどもっぽくて、甘えるみたいに。
1195 = "……雙鐵哥哥原來還會用這樣的表情笑啊。這麼溫柔，這麼溫暖，這麼孩子氣，就像在撒嬌一樣。" 

# monologue
# JP: やっと見れた。双鉄おにいさんのお顔を、ちゃんと。\nそうできたのが、少し嬉しくて、すごく寂しい。
2657 = "我終於敢正眼看雙鐵哥哥的臉了。這讓我有些開心，又有些失落。" 

# 【ふかみ】
# display as 深美
# JP: 「――それ、なら」
1222 = "「……這樣的話」" 

# monologue
# JP: 笑顔、作る。\n大丈夫。わたしはプロ。接客の。
2650 = "我用力擠出笑容。沒關係，接待客人我可是專業的。" 

# monologue
# JP: クマ川下りのときとおんなじ。\nやるべき、必要なことって思って、笑顔を作る。
2597 = "就跟隈河漂流一樣。我需要，我也應當露出笑容。" 

# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、わたしへはどうですか？\nわたしに対する、双鉄おにいさんの気持ちは」
2012 = "「那我呢？雙鐵哥哥對我的心意是怎樣的？」" 

# monologue
# JP: 本当はもう聞きたくない。答えならもう、出ちゃってる。\n双鉄おにいさんは、絶対わたしを、ほめてくれる。
2306 = "其實我一點也不想聽。我已經知道答案了。雙鐵哥哥肯定會誇獎我。" 

# monologue
# JP: だけど、それがどんなに嬉しく素敵な褒め言葉でも――\nわたしが一番ほしい言葉じゃ、きっと、無い。
2485 = "可是，不管說的話有多動聽……他也絕對不會說出我最想聽見的那句話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは、とても綺麗だと思う。\nまず真っ先にそれが来る」
1826 = "「我覺得你很漂亮。這是我最先產生的感想」" 

# 【凪】
# display as 凪
# JP: 「ちょっ！？　凪さまは綺麗じゃなかと！？」
1689 = "「喂？！難不成本小姐就不漂亮了？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪も綺麗だ。が、綺麗より先に立つものがある。\n元気がいいとか――『うるさい』とかだな」
1526 = "「你也很漂亮，但是你有更突出的特徵。比如活潑……比如“吵鬧”」" 

# 【凪】
# display as 凪
# JP: 「むぎゅっ」
1668 = "「唔」" 

# monologue
# JP: 凪ちゃんが両手で口をおさえて、目だけで、\n『ごめん』って謝ってくる。
2580 = "小凪用雙手捂住嘴，用眼神道了個歉。" 

# monologue
# JP: だからわたし、『平気』って笑う――笑えてる。\n凪ちゃんが、悔しいくらいに可愛いらしいから。
2704 = "正因為如此，我才會——才能夠笑著示意沒關係。畢竟她實在是太過可愛，甚至令我心生嫉妒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの場合は、綺麗さだ。外観だけのことではなく、\n生き方そのものが、とても綺麗だ」
1942 = "「而深美你最突出的特徵就是漂亮。這並不只是在描述外貌，是說你的為人處世，就是美麗的」" 

# monologue
# JP: ちょっと、意外。\nだから、聞きたい。
2850 = "雙鐵哥哥的回答有些出乎我的意料，讓我想要繼續聽下去。" 

# monologue
# JP: もうなんにも聞きたくないのに、家に帰って泣きたいのに。\nそれでもやっぱり、双鉄おにいさんの言葉が欲しい。
2642 = "我明明什麼都不想聽，只想回家大哭一場的。但我卻依然希望聽到雙鐵哥哥的話語。" 

# 【ふかみ】
# display as 深美
# JP: 「綺麗。ですか？　わたしの、生き方？」
1937 = "「美嗎？我的生活方式」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの全てが、クマ川下りにつながっている。\nハチロクが、線路とつながっているのと同じく」
1536 = "「你的一切都與隈河漂流有關。就像八六的一切都與鐵路有關一樣」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
1673 = "「啊」" 

# monologue
# JP: ……自覚、なかった。\nけど、ハチロクちゃんに例えて貰えたからわかる。
1191 = "……我自己都沒發現。可是拿八六打比方，我就懂了。" 

# monologue
# JP: あの子の生き方。絶対に揺るがないものの存在。\nそうか――わたしにも、それがあるんだ。
2525 = "在她的生活當中，有一個絕不容動搖的東西。原來……我也擁有這樣的東西啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「現状維持は、ゆるやかな衰退と変わらぬことと意識して、\nもっと、もっとと、常に貪欲に改善を目指す」
1533 = "「你理解維持現狀意味著逐漸衰退，因此總會貪婪地渴求著改良與進步」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 1877 = "「是的」" 

# monologue
# JP: すごく、ほめて貰ってる。\nほっぺた、かーって赤くなる。
2849 = "雙鐵哥哥滔滔不絕的誇獎，讓我的臉都羞紅了。" 

# monologue
# JP: けど、心のどこかは、きぃんて、冷えてる。\n多分、わたしの――おんなのこの部分。恋ごころが。
2492 = "可是，我的心底某處卻涼透了。那大概是我的……身為女孩子的戀慕之心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はふかみを見習い、尊敬している。\n年齢に関係なく、ふかみのようにありたく思う」
1816 = "「我很尊敬你，也想向你學習。雖然你比我小，但我卻想學習你做人的方式」" 

# 【ふかみ】
# display as 深美
# JP: 「……はい」
1206 = "「……嗯」" 

# monologue
# JP: ハチロクちゃんは、双鉄おにいさんの近くに居て。\nだけれど、恋の相手じゃない。
2303 = "八六和雙鐵哥哥的關係很親密，但雙鐵哥哥並不把她當作戀愛方面的對象。" 

# monologue
# JP: そこもきっと、わたしとハチロクちゃんとは、\n“同じく”だって――感じちゃうから。
2530 = "在這一點上，感覺我和八六也是一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとの旅からは、多くを学べる。\nそれが、ふかみとの旅の楽しみだ」
1641 = "「和你一起旅行，我能學到很多。這就是與你一起旅行能夠得到的快樂」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 1697 = "「嗯」" 

# monologue
# JP: わかる。わかった。わかっちゃう。\n双鉄おにいさんにとって、わたし――
2661 = "我能理解。我理解了。不去理解也能理解。對雙鐵哥哥來說，我……" 

# monologue
# JP: いつの間にか、引率の先生みたいになっちゃってたんだ。\nおんなじ場所と時間でも、きっとおんなじ旅じゃない。
2231 = "不知什麼時候，變成了引路的老師。因此即使在同一個地方度過了同一段時光，我們也並沒有度過同樣的旅程。" 

# 【ふかみ】
# display as 深美
# JP: 「わかりましたし、見えました、です！」
1817 = "「我明白了，我預見到了，嗯！」" 

# monologue
# JP: 泣きたいくらいイヤだけど、どうしようもなく寂しいけど。\nそれでも、だったら――精一杯に頑張ろう。
2841 = "雖然我很不樂意，很失落，幾乎要哭出來，但是……既然這樣，我不如努力到底。" 

# monologue
# JP: 凪ちゃんと双鉄おにいさんを、\nお互いの気持ちの行きたいところに、引率しよう。
2594 = "就讓我帶領小凪和雙鐵哥哥走向情投意合吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかってもらえてありがたい。\nそのうえで……“見えた”とは、一体何がだ？」
1806 = "「感謝你的理解。不過……你說的“預見到了”，是什麼意思？」" 

# 【ふかみ】
# display as 深美
# JP: 「修学旅行を終えたあと。\n双鉄おにいさんが、どんな旅をしたいのか、です！」
1830 = "「我預見到了修學旅行結束之後，你會想展開怎樣的旅行，嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1874 = "「是嗎」" 

# 【凪】
# display as 凪
# JP: 「なになに、どぎゃんと！？　どんな旅ばい！」
1852 = "「是什麼是什麼，告訴咱！是什麼樣的旅行？！」" 

# 【ふかみ】
# display as 深美
# JP: 「それはね？　凪ちゃん、双鉄おにいさん」
1945 = "「聽我說，小凪，雙鐵哥哥」" 

# monologue
# JP: （ぴとっ）
2893 = "（點）" 

# 【凪】
# display as 凪
# JP: 「ふにゅっ！？」
1670 = "「唔？！」" 

# monologue
# JP: （ぴとっ）
# 2893 = "（點）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1668 = "「唔」" 

# monologue
# JP: 人差し指をかるぅく凪ちゃんの唇に。\nそれからおんなじ軽さで、双鉄おにいさんの唇に。
2621 = "我伸出食指，輕輕點了一下小凪的嘴唇，然後又輕輕點了一下雙鐵哥哥的嘴唇。" 

# 【ふかみ】
# display as 深美
# JP: 「いまはまだ、ナ・イ・ショ！」
1915 = "「現在暫時不·能·說！」" 

# monologue
# JP: うん。ナイショ。
2513 = "嗯，不能說。" 

# monologue
# JP: わたしが恋を諦めることも、\n双鉄おにいさんと凪ちゃんが、お互い想いあってることも。
2616 = "我不能說我放棄了這份感情，也不能說我已經看出他們兩情相悅。" 

# 【凪】
# display as 凪
# JP: 「ええ～　どぎゃんしてナイショばい？」
1497 = "「不是吧，為什麼不能說咧？」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしが何かをいったら、それが、凪ちゃんや\n双鉄おにいさんに、影響しちゃうかもしれないから」
1953 = "「要是我說了出來，或許就會影響到你們兩個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\n言われてみれば、確かにその可能性はあるな」
1712 = "「噢……聽你這麼說，確實是有這種可能」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんといわれれば、そんな気も確かにするばい」
1999 = "「這麼說來好像確實是這個理咧」" 

# monologue
# JP: とっても素直。\n双鉄おにいさんも、凪ちゃんも。
2757 = "真坦率。雙鐵哥哥也是，小凪也是。" 

# monologue
# JP: わたしが、もう少しズルければ――\nううん、違う。
2478 = "只要我稍稍耍點詭計……不，不對。" 

# 【ふかみ】
# display as 深美
# JP: 「わたしが、今よりもう少しだけ――」
1621 = "「只要我能比現在更加……」" 

# monologue
# JP: 双鉄おにいさんのことを好きだったら。\n凪ちゃんへの好きが弱かったら。
2476 = "只要我對雙鐵哥哥的仰慕再多一分，只要我對小凪的感情再少一絲……" 

# monologue
# JP: 凪ちゃんを泣かせちゃったって苦しめたって、\n双鉄おにいさんを奪いたいって、思えてたなら。
2480 = "只要我能夠生出搶走雙鐵哥哥的意願，甚至不惜讓小凪為此流淚……" 

# 【凪】
# display as 凪
# JP: 「もう少しだけ、何ばい？」
1880 = "「更加什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「『もう少しだけ、大人だったら』」
1881 = "「更加成熟」" 

# monologue
# JP: うん。そうなんだ。\nもう少しだけ大人だったら、全部はきっと違ってた。
2516 = "嗯，是的。只要我能變得更加成熟，一切都會不一樣。" 

# monologue
# JP: だけれどいまは、わたしはまだまだ、少女だから。\n少女らしく、乙女チックに――わたしの恋を、手放そう。
2287 = "但是，現在我依然是個少女。那我就應該像個少女，如少女一般……放下這段感情。" 

# 【凪】
# display as 凪
# JP: 「もう少しだけ大人だったら？」
1963 = "「變得更加成熟之後呢？」" 

# 【ふかみ】
# display as 深美
# JP: 「こんな、アクシデントみたいな形じゃなくて。\nもっと上手に、修学旅行が終わってたかな、って」
1771 = "「就不會像現在這樣，讓修學旅行的收尾像是一場意外」" 

# 【凪】
# display as 凪
# JP: 「そしたら、そのときに終わらせればよかとよ！」
2007 = "「那就到那個時候再收尾唄！」" 

# 【ふかみ】
# display as 深美
# JP: 「え？」
1682 = "「啊？」" 

# 【凪】
# display as 凪
# JP: 「今日より明日は。明日よりあさっては。\nうちもふかみちゃんも、もう少しだけ大人でしょう？」
1644 = "「咱們倆嘛，都是一天天成長的。明天比今天成熟，後天比明天成熟」" 

# 【ふかみ】
# display as 深美
# JP: 「あはっ！　そうだね、凪ちゃん」
1660 = "「哈哈！有道理，小凪」" 

# monologue
# JP: ほんとにそうだ。\nだからこのまま、もう少しだけ――
2767 = "確實是的。所以我還是暫時……" 

# monologue
# JP: 終わらせた恋を抱えたままで、\n修学旅行を、続けるふりを、わたしもしよう。
2613 = "懷著這段已經結束的感情，假裝修學旅行還在繼續吧。" 

# monologue
# JP: （……それはさすがに、切ないけど、ねぇ）
2866 = "（……雖然這樣，是有夠讓人痛苦的）" 

# monologue
# JP: けど、大丈夫。\n私は、双鉄おにいさんに見習ってもらえる女なんだから。
2237 = "不過沒關係。我可是一個值得雙鐵哥哥學習的女孩啊。" 

# monologue
# JP: 凪ちゃんの、一番の親友なんだから。\n大丈夫。大丈夫。――ぜったい、絶対、大丈夫
2625 = "我可是小凪最好的朋友啊。沒事，沒事的——肯定沒事。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん！？　どぎゃんして泣いとると！？」
1768 = "「小深？！你怎麼哭了？！」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　あ、ほんと。\nやだ、ゴミが入っちゃったみたい」
1684 = "「啊？啊，還真是。討厭，好像是眼睛進沙子了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、僕が取ってやろう」
2014 = "「那我幫你挑出來吧」" 

# 【ふかみ】
# display as 深美
# JP: 「平気です！　もう取れちゃいましたから」
1895 = "「沒事！已經出來了」" 

# monologue
# JP: 目の端にちょっと浮いちゃった涙を、ぬぐいとる。\nわたし自身の指先で。
2652 = "我用手指擦去眼角的淚水。" 

# monologue
# JP: 凪ちゃんと、双鉄おにいさんにナイショのままで、\n誓いのキスをさせちゃった。がんばりやさんの、この指で。
2643 = "我沒告訴小凪和雙鐵哥哥，剛才那動作代表我幫兩人完成了誓約之吻。真想誇誇我這手指。" 

# 【双鉄】
# display as 雙鐵
# JP: 「面っ！！」
2034 = "「面！！」" 

# monologue
# JP: （スパーンっ！！）
2889 = "（砰！！）" 

# 【凪】
# display as 凪
# JP: 「やったばーーーい！」
1836 = "「打中了！」" 

# monologue
# JP: 凪の歓声に気を抜かず、\n残心をきっちり取ることを意識する。
2403 = "凪的歡呼沒有搶走我的注意力。" 

# monologue
# JP: （ばっ！　ばっ！　ばっ！）
2878 = "（唰！唰！唰！）" 

# monologue
# JP: 白、白、白。\n間髪を入れずに旗三本があげられる。
2753 = "白旗，白旗，白旗。三位裁判馬上舉起旗幟。" 

# 【ふかみ】
# display as 深美
# JP: 「やったね凪ちゃんっ！！\n双鉄おにいさん、勝ってくれたよ！！」
1740 = "「太好了，小凪！！雙鐵哥哥他贏了！！」" 

# 【凪】
# display as 凪
# JP: 「さすがはウチのにーさんばいっ！！」
1494 = "「不愧是咱的大哥哥！！」" 

# monologue
# JP: 面を外して控えに戻れば、\n凪とふかみが大歓迎で迎えてくれる。
2640 = "我摘下面具回到場外，凪和深美都在為我歡呼。" 

# 【ふかみ】
# display as 深美
# JP: 「どうぞ、です。レモンのハチミツづけ」
1547 = "「來，給你蜂蜜檸檬」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕の出番はこれで終わりだ。\n大勝負を控えている凪に食べさせてやってくれ」
1506 = "「不，我的比賽已經結束了。留給面臨關鍵一戰的凪吧」" 

# 【凪】
# display as 凪
# JP: 「よかと！？　やったばーい！」
1925 = "「真的嗎？！太好了！」" 

# monologue
# JP: 文字どおりの大勝負。\n優勝チームを決める、代表者戦。
2825 = "這場比賽非常重要。雙方隊伍將各派一名選手決出最終勝者。" 

# monologue
# JP: その直前であるというのに、凪は少しも変わらない。
2298 = "儘管如此，凪卻依然一副平淡的模樣。" 

# 【凪】
# display as 凪
# JP: 「じゃ、にーさんの分もいただくばい！」
2005 = "「那咱就把大哥哥那份也吃囉！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　あんまり食べ過ぎると、\nおなかゆるくなっちゃうかも」
1759 = "「小凪！別吃太多，肚子會撐著的」" 

# 【凪】
# display as 凪
# JP: 「むぐっ！？」
# 1670 = "「唔？！」" 

# monologue
# JP: 体は大きくなったのに、\nふかみとのやりとりもあの頃のまま。
2842 = "雖然長大了，但她們之間的對話依然和那時一樣。" 

# monologue
# JP: ――とても幸いなことだと感じる。
1184 = "——我覺得這是一件好事。" 

# monologue
# JP: （思いもかけぬほど遠くまでこれたものだな。\n凪はもちろん、指導を通じて、僕も大幅に成長できた）
2891 = "（路途比我想像中的要漫長啊。凪也是，教導她的我也是，都得到了長足的進步）" 

# monologue
# JP: とはいえ、九洲勤労者剣道選手権ほどの大会で。
2239 = "不過，這可是九州勞工劍道錦標賽，規模了得。" 

# monologue
# JP: まさか僕らが、決勝の、\n優勝決定戦にまで絡めるものとは――。
2706 = "沒想到我們居然能一路殺進決賽的最終輪……" 

# 【宗方】
# display as 宗方
# JP: 「勝ったな。右田機関士」
1542 = "「你贏了啊，右田司機」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宗方機関士」
1750 = "「宗方司機」" 

# monologue
# JP: 宗方機関士――\nみかん鉄道の機関士で、なんと剣道七段の達人だ。
2568 = "宗方司機是橙鐵路的司機，而且還是七段的劍道高手。" 

# monologue
# JP: みかん鉄道とレールが繋がらなかったら、\n合同チームを組めなかったら、出場さえも出来てなかった。
2552 = "如果我們的鐵路沒有連上橙鐵路，如果我們沒能組成一個隊伍，恐怕甚至湊不夠出場的人頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宗方さんが居てくださったからです。\n全ての試合で勝利を収めていただけましたから」
2016 = "「那是因為有您在啊。多虧您每一場都能將勝利收入囊中」" 

# 【宗方】
# display as 宗方
# JP: 「それは[オーダー,1]作戦がいいからだ。\nこの年で若者と戦うのは、さすがにキツイ」
1993 = "「這是因為出場次序排得好。我一把年紀的，跟年輕人打起來可不輕鬆」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1671 = "「啊……」" 

# monologue
# JP: ふかみが、うれしげな声を漏らす。\n僕ももちろん、同感だ。
2735 = "深美高興地叫出聲來。我也深有同感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[うち,4]御一夜鉄道の早瀬は、長年大会を見てますからね。\nデータ分析を、非常にしっかりやってくれてます」
1888 = "「歷年的大賽，咱們御一夜鐵路的早瀨都親眼見過，她把數據資料整理分析得非常好」" 

# 【宗方】
# display as 宗方
# JP: 「わかるよ。ここまでのオーダーからも」
1820 = "「我明白，從至今為止的排兵布陣當中就能看出來」" 

# monologue
# JP: 九洲勤労者剣道選手権は、女子剣道活性化のための大会だ。\n団体五人は、女子三名に男子二名。
2258 = "九州勞工劍道錦標賽，是一場以鼓勵女性參與劍道為目的的大賽。因此參賽團體需由三女二男組成。" 

# monologue
# JP: 御一夜鉄道の僕と凪との他のメンバーは、\n宗方さん率いる、みかん鉄道剣道部のおふたりだ。
2840 = "隊伍成員有來自御一夜鐵路的我和凪，還有橙鐵路劍道社的宗方先生，以及他帶來的兩個人。" 

# 【宗方】
# display as 宗方
# JP: 「うちのふたりは初段と二段。このクラスの大会では、\n引き分けを拾うのも難しいメンバーだというのに」
1814 = "「我帶來的兩個是初段和二段。這種規模的大賽，她們這種水平要和對手打個平手都困難啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[はせ,1]長谷さんも[しんじょうじ,2]真成寺さんも、よくやってくれました」
2024 = "「長谷小姐與真成寺小姐都做得很好」" 

# monologue
# JP: 基本的には、凪、宗方さん、僕で、\n三勝か、二勝一分けを狙っていく。
2623 = "我們的基本方針是由凪、宗方先生和我拿下三勝或者兩勝一平。" 

# monologue
# JP: が、僕らが常に、勝ちを拾えたわけでもない。
2238 = "不過，我們三個並不是沒有落敗過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おふたりの引き分けに助けられた試合も、\n一度ではありませんでしたし」
1511 = "「也有幾場比賽是多虧那兩位打出個平手，才勉強通過的」" 

# 【宗方】
# display as 宗方
# JP: 「目一杯のようだがな」
1784 = "「平手也就是她們的極限了」" 

# monologue
# JP: 会場を出た控室通路に、宗方さんの目が注がれる。
2566 = "宗方先生看著通向休息室的走廊。" 

# monologue
# JP: 大健闘のふたりはぐったり汗だくで、\nそこにぺたりと倒れこんでる。
2420 = "剛經歷過一番鏖戰的她們倆渾身是汗，坐倒在走廊上。" 

# 【宗方】
# display as 宗方
# JP: 「個々の実力だけを見れば、蓑笠選手以外、個人戦では、\n一回戦を抜くのも正直難しいところだろうが――」
1746 = "「如果要打個人賽，除了蓑笠選手之外，我覺得我們甚至通不過第一輪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を、宗方機関士なら個人戦でも――ん？」
1804 = "「您太謙虛了，您肯定可以在個人賽當中……嗯？」" 

# monologue
# JP: 宗方さんの目線が動く。観客席へと。\nつられて僕も、言葉を止めて――
2563 = "宗方先生看向了觀眾席。我也不由得閉上嘴，順著他的目光看了過去……" 

# monologue
# JP: （ああ）
2877 = "（哎呀）" 

# monologue
# JP: 嬉しいものだ。
2824 = "這可真是太叫人開心了。" 

# monologue
# JP: ハチロク、日々姫、ポーレット、れいな、真闇姉、稀咲。\nみなが、応援に来てくれている。
2301 = "八六、日日姬、波萊特、玲奈、真闇姐、稀咲。她們全都跑來給我們加油了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……みかん鉄道の方々も、応援に？」
