[script]
# lines: 485 
# 【双鉄】
# display as 雙鐵
# JP: 「凪……」
1578 = "「Nagi......」"
# 【凪】
# display as 凪＆深美
# JP: 「にーさん、気がついたとっ！？」\n「あ――」
1736 = "「Anh hai, anh tỉnh rồi hả!?」 「A――」"
# monologue
# JP: 凪ちゃんのお名前、呼んだ。真っ先に。\n倒れたとき、一緒にいたの、わたしなのに……
2855 = "Anh ấy gọi tên Nagi. Ngay câu đầu tiên. Lúc anh ấy ngã xuống, người ở bên cạnh là mình cơ mà......"
# monologue
# JP: って！　さっきまでの話、わたし、引きずっちゃってる。\n今、そんなことに気にしてる場合じゃないのに！
2506 = "Khoan đã! Mình lại để tâm đến chuyện lúc nãy mất rồi. Bây giờ đâu phải lúc để ý mấy chuyện đó!"
# 【ふかみ】
# display as 深美＆凪
# JP: 「あのっ」「どっか痛むとこなかと？\n気分はどうばい？　何があったか、覚えておると？」
1828 = "「Dạ,」「Anh có thấy đau ở đâu không? Cảm thấy thế nào rồi? Anh có nhớ chuyện gì đã xảy ra không?」"
# monologue
# JP: 凪ちゃんの両手が、双鉄おにいさんの両手を包む。\n双鉄おにいさん、ホっ、ってしてる顔になる。
2579 = "Hai bàn tay Nagi bao bọc lấy đôi tay của anh Soutetsu. Gương mặt anh Soutetsu hiện lên vẻ an tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「僕、は――」
1808 = "「Anh, thì――」"
# monologue
# JP: けど、すぐにその顔が苦しそうに歪んじゃう。\nどこか痛かったりするのかも。
2488 = "Nhưng ngay sau đó, gương mặt anh nhăn nhó vì đau đớn. Có lẽ anh đang đau ở đâu đó."
# monologue
# JP: お医者さま、ただの過労っていってたけど、\nもう一回来てもらったほうが――
2835 = "Bác sĩ bảo chỉ là làm việc quá sức thôi, nhưng có lẽ nên gọi bác sĩ đến một lần nữa――"
# 【凪】
# display as 凪
# JP: 「にーさん、痛むと！？　苦しかとっ！！？\nお医者様は過労っていうてたばってん――」
1735 = "「Anh hai, anh đau hả!? Khó chịu ở đâu sao!!? Bác sĩ bảo là làm việc quá sức thôi mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。痛まん。苦しくもない。\nただ、少し混乱をしてしまって――うむ？　お医者？」
1501 = "「Không. Không đau. Cũng không khó chịu. Chỉ là, đầu óc hơi rối bời một chút――Hửm? Bác sĩ sao?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　にーさん、倒れとったって――\n川で倒れたって聞いたとばい！　ね？　ふかみちゃん」
1861 = "「Đúng vậy! Anh hai đã ngã gục―― Em nghe nói anh ngã xuống sông đó! Đúng không? Bé Fukami.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ？」
1907 = "「Fukami?」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
1671 = "「A――」"
# monologue
# JP: 双鉄おにいさん、やっと、わたしを見てくれる。\nどこか、ぼーっとしてる感じで。
2856 = "Cuối cùng anh Soutetsu cũng nhìn tôi. Với ánh mắt có phần đờ đẫn."
# monologue
# JP: 混乱っていってたけど、でも――\n倒れたときに、一緒だったのはわたし、なのに……
2277 = "Anh ấy bảo là đang rối bời, nhưng mà―― Lúc anh ấy ngã xuống, người ở bên cạnh là mình cơ mà......"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん？　どぎゃんしたと！？\nふかみちゃん、ふかみちゃんっ！？」
1766 = "「Bé Fukami? Chị sao vậy!? Bé Fukami, bé Fukami!?」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！」
1674 = "「A!」"
# monologue
# JP: いけない。\n一番たいへんなの、双鉄おにいさんに決まってるのに。
2823 = "Không được. Người mệt mỏi nhất lúc này chắc chắn là anh Soutetsu cơ mà."
# monologue
# JP: なのにわたし、自分の気持ちのことばっかりで。
2285 = "Vậy mà mình chỉ mải nghĩ đến cảm xúc của bản thân."
# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい――ごめんね、凪ちゃん。\nちょっと、わたし――ぼーっとしちゃって」
1754 = "「Xin lỗi anh――xin lỗi em nhé, Nagi. Chị――hơi thẫn thờ một chút.」"
# 【凪】
# display as 凪
# JP: 「大丈夫と？　ふかみちゃん、もしかして――\n川でにーさん助けたときに、どっか打ったと？」
1894 = "「Chị không sao chứ? Bé Fukami, có khi nào―― lúc cứu anh hai dưới sông, chị bị va đập ở đâu không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1679 = "「!!!」"
# monologue
# JP: 双鉄おにいさんの目が丸くなる。\nぼーって、膜がかかってたみたいなのがハッキリする。
2853 = "Mắt anh Soutetsu mở to. Ánh nhìn đờ đẫn như bị phủ một lớp màng bỗng trở nên rõ ràng."
# monologue
# JP: ――焦点が定まる、って、きっと、このこと。
1183 = "――Ánh mắt đã lấy lại được tiêu cự, chắc chắn là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだった！　無事かっ！？　ふかみっ！\n怪我などはっ」
1755 = "「Phải rồi! Em không sao chứ!? Fukami! Có bị thương ở đâu không?」"
# 【ふかみ】
# display as 深美
# JP: 「大丈夫。です。わたしは――\nわたしは、双鉄おにいさんに、守ってもらいましたし」
1893 = "「Em không sao. Ạ. Em thì―― Em đã được anh Soutetsu bảo vệ mà.」"
# monologue
# JP: 助けようとして、わたしも足を滑らせちゃって。\nかばってもらって――
2741 = "Định cứu anh ấy, nhưng chính mình cũng bị trượt chân. Rồi được anh ấy che chở――"
# monologue
# JP: 双鉄おにいさんにつつまれたとき、\nわたし――不謹慎だけど――しあわせ、で。
2794 = "Khi nằm trong vòng tay anh Soutetsu, mình――dù biết là không nên――nhưng mình thấy rất hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、それは逆」
1502 = "「Không, ngược lại mới đúng.」"
# 【ふかみ】
# display as 深美
# JP: 「それにっ！」
1938 = "「Hơn nữa!」"
# monologue
# JP: だから。\nわたしは、双鉄おにいさんにしあわせになって欲しい。
2665 = "Vì vậy. Mình muốn anh Soutetsu được hạnh phúc."
# monologue
# JP: 例え、双鉄おにいさんの隣にいるのが、\nわたしじゃなくても――それでも、やっぱり。
2426 = "Dù cho người ở bên cạnh anh Soutetsu, không phải là mình――thì mình vẫn mong như vậy."
# 【ふかみ】
# display as 深美
# JP: 「それに――わたし……川から引き上げただけだから……。\nだから、全然。どこも、痛んだりしてない――です」
1940 = "「Hơn nữa――em...... chỉ kéo anh lên khỏi sông thôi...... Nên là, không sao cả. Em không bị đau ở đâu hết――ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そんな様子には見えないぞ。\n正直、かなり辛そうだが――」
1627 = "「Nhưng trông em không giống thế chút nào. Thành thật mà nói, trông em có vẻ rất đau đớn――」"
# 【凪】
# display as 凪
# JP: 「やっぱり、どっか痛むんじゃなかと？」
1544 = "「Quả nhiên là chị bị đau ở đâu đó đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん、凪ちゃん。\n大丈夫。わたし、どこも痛めてなんてないから」
1504 = "「Không đâu, Nagi. Chị không sao. Chị không bị thương ở đâu cả.」"
# monologue
# JP: こころ以外は、全然平気。\nこころもわたしが、勝手に自分で自分を苦しめてるだけ。
2473 = "Trừ trái tim ra thì mọi thứ đều ổn. Mà trái tim cũng là do mình tự làm khổ mình thôi."
# monologue
# JP: 凪ちゃんの名前を、双鉄おにいさんが先に呼んだ。\nそんなのは、ただの流れで、タイミングかもしれないし。
2847 = "Anh Soutetsu gọi tên Nagi trước. Đó có lẽ chỉ là phản xạ tự nhiên, hoặc do trùng hợp thôi."
# 【双鉄】
# display as 雙鐵＆凪
# JP: 「ふかみ？」\n「ふかみちゃん？」
1908 = "「Fukami?」 「Bé Fukami?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　ごめんね。\nまたちょっと……気が散っちゃって」
1677 = "「A! Xin lỗi nhé. Chị lại...... hơi lơ đãng một chút.」"
# monologue
# JP: いけない。声、ふるえちゃってる。\nっていうか、この言い訳だけだと、頭とか心配されちゃう。
2229 = "Không được. Giọng mình run rẩy mất rồi. Mà nếu chỉ viện cớ thế này, họ sẽ lo lắng cho đầu mình mất."
# 【ふかみ】
# display as 深美
# JP: 「凄く心配だったから、ホッとして気が抜けちゃって。\nでも、もう大丈夫。シャキってしてる！」
1821 = "「Vì em quá lo lắng, nên giờ thở phào nhẹ nhõm mới bị thẫn thờ thôi. Nhưng mà, giờ không sao rồi. Em tỉnh táo lại rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「であれば良いが――」
1782 = "「Nếu được vậy thì tốt――」"
# 【ふかみ】
# display as 深美
# JP: 「であるです。お医者様に、わたしも見てもらったですし。\nだから、ほんとに平気！　です」
1774 = "「Là vậy đó ạ. Em cũng đã được bác sĩ khám cho rồi. Nên em thực sự không sao! Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば――」
1873 = "「Vậy sao. Nếu vậy thì――」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1663 = "「Hả!?」"
# monologue
# JP: 双鉄おにいさんの頭が下がる。\nわたしに、頭を下げてくれてる。
2846 = "Đầu anh Soutetsu cúi xuống. Anh ấy đang cúi đầu trước mình."
# 【双鉄】
# display as 雙鐵
# JP: 「御礼が遅くなってしまったな。\n助けてくれて、ありがとう」
1842 = "「Xin lỗi vì đã cảm ơn em muộn màng. Cảm ơn em đã cứu anh.」"
# 【ふかみ】
# display as 深美
# JP: 「いえっ！？　そんなっ」
1896 = "「Dạ không!? Đâu có chuyện đó.」"
# monologue
# JP: そんなことされたら、恐縮しちゃう。\nだって、原因はそもそもわたしと凪ちゃんだから。
2282 = "Anh ấy làm vậy khiến mình thấy áy náy quá. Vì nguyên nhân ban đầu là do mình và Nagi mà."
# monologue
# JP: わたしと凪ちゃんが甘えすぎたせいで――\nこんなに頑張れる大人の人を、倒れさせちゃったんだから。
2520 = "Chỉ tại mình và Nagi đã quá dựa dẫm―― Mới khiến một người lớn luôn nỗ lực như vậy phải ngã gục."
# 【ふかみ】
# display as 深美
# JP: 「いつも、双鉄おにいさんに助けてもらっていますから。\nその百分の一も、お返しできてないって思います。です」
1786 = "「Lúc nào em cũng được anh Soutetsu giúp đỡ mà. Em nghĩ mình còn chưa báo đáp được một phần trăm trong số đó đâu. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは大げさすぎるだろう。\n僕らは、三人、いつもお互いに助け合って――」
1990 = "「Em nói quá rồi đấy. Ba người chúng ta, lúc nào cũng giúp đỡ lẫn nhau mà――」"
# 【凪】
# display as 凪
# JP: 「そんつもりだったばってん！\nやっぱりウチとふかみちゃん――甘えすぎとったとよ」
1645 = "「Bọn em cũng từng nghĩ vậy! Nhưng quả nhiên em và bé Fukami――đã quá dựa dẫm vào anh rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪……」
# 1578 = "「凪……」" 
# monologue
# JP: 凪ちゃんを見る。\n凪ちゃんもわたしを見返してくれる。
2655 = "Tôi nhìn Nagi. Nagi cũng nhìn lại tôi."
# monologue
# JP: 凪ちゃんのあのまっすぐな目が、\nわたしの迷いを、消してくれる。
2586 = "Đôi mắt thẳng thắn ấy của Nagi, đã xóa tan đi sự do dự trong tôi."
# 【ふかみ】
# display as 深美
# JP: 「だから――わたしと凪ちゃん、相談してたんです。\n双鉄おにいさんが、起きてくれるのを待ってる間に」
1832 = "「Vì thế――em và Nagi đã bàn bạc với nhau. Trong lúc chờ anh Soutetsu tỉnh lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「相談？　とは……」
1960 = "「Bàn bạc? Là chuyện gì......」"
# 【ふかみ】
# display as 深美
# JP: 「修学旅行の、こと。です」
1773 = "「Về chuyến dã ngoại. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の？」
1555 = "「Chuyến dã ngoại sao?」"
# 【ふかみ】
# display as 深美
# JP: 「です。だから――その――\n具体、的……にはっ――」
1696 = "「Vâng. Vì thế――chuyện đó―― Cụ thể, thì...... là――」"
# monologue
# JP: ああ、ダメ。泣きそう。\nやっぱりわたし、言いたくないんだ。
2507 = "A, không được. Mình sắp khóc mất. Quả nhiên là mình không muốn nói ra."
# monologue
# JP: 『凪ちゃんがきっと選ばれる』って、\nわたしのこころが、強く、強く感じちゃってて――
2634 = "Trái tim mình cảm nhận được rất rõ ràng, 『Chắc chắn Nagi sẽ được chọn』――"
# 【凪】
# display as 凪
# JP: 「具体的には、いままでの修学旅行を続けるのは、\nちょこーっと無理が出てきたと――って話ばい」
1574 = "「Cụ thể thì, bọn em nghĩ việc tiếp tục chuyến dã ngoại như từ trước đến nay, đã có chút không ổn rồi――là chuyện đó đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理、か――」
1495 = "「Không ổn, sao――」"
# monologue
# JP: 少し、びっくりしたみたいな顔。\nそうして双鉄おにいさんは、小さく小さく、頭を振る。
2851 = "Khuôn mặt anh ấy có chút ngạc nhiên. Sau đó, anh Soutetsu khẽ lắc đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なるほど。僕は楽しさのあまり……\n体の方に、無理をさせてしまっていたのかもしれんな」
1875 = "「Ra vậy, anh hiểu rồi. Vì quá vui vẻ...... Có lẽ anh đã ép cơ thể mình làm việc quá sức.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　今のままで、にーさんがまた倒れたら、\nうちもふかみちゃんも悲しかけんね」
1863 = "「Đúng vậy! Cứ thế này, nếu anh hai lại ngã gục, thì em và bé Fukami sẽ buồn lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ……それを言われてしまえば、反論の余地も無い」
1667 = "「Ừm...... Bị nói vậy thì anh chẳng còn lời nào để phản bác cả.」"
# 【凪】
# display as 凪
# JP: 「にーさんもウチもふかみちゃんも、みんな元気でいれば、\n形が変わっても、きっとな～んも変わらんけん！！」
1619 = "「Chỉ cần anh hai, em và bé Fukami, mọi người đều khỏe mạnh, thì dù hình thức có thay đổi, chắc chắn mọi thứ vẫn sẽ như cũ thôi!!」"
# 【ふかみ】
# display as 深美
# JP: 「っ！！」
1678 = "「!!」"
# monologue
# JP: 凪ちゃん。笑顔。\nおひさまみたいに、少しも曇ってない笑顔。
2583 = "Nagi. Nụ cười. Nụ cười rạng rỡ không chút gợn mây như ánh mặt trời."
# monologue
# JP: 『修学旅行』の枠が消えても、わたしたち、\nずっと三人、おんなじままでいられるんだって、信じてる。
2549 = "Em ấy tin rằng, dù khuôn khổ 『chuyến dã ngoại』 không còn, ba chúng tôi vẫn sẽ mãi mãi như trước đây."
# 【ふかみ】
# display as 深美
# JP: 「凪……ちゃん」
1756 = "「Nagi......」"
# monologue
# JP: わたしは、そこまで純粋じゃない。\n凪ちゃんみたいには、絶対になれない。
2644 = "Mình không thuần khiết đến vậy. Tuyệt đối không thể giống như Nagi được."
# monologue
# JP: でも、だからこそ、わたしと凪ちゃんは友達になった。\nだからこそ、わたしは、凪ちゃんが大好き、で……
2484 = "Nhưng chính vì thế, mình và Nagi mới trở thành bạn bè. Chính vì thế, mình mới yêu quý Nagi đến vậy, và......"
# 【ふかみ】
# display as 深美
# JP: 「んっ――」
1665 = "「Ưm――」"
# 【凪】
# display as 凪
# JP: 「やけん、変えんといけんって思うとよ！\n今の形の、にーさんが無理する修学旅行ば」
1834 = "「Thế nên, em nghĩ chúng ta phải thay đổi thôi! Chuyến dã ngoại theo hình thức hiện tại, khiến anh hai phải cố sức ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、な……」
1744 = "「Đúng, nhỉ......」"
# monologue
# JP: ああ、凪ちゃん。わたしが言葉につまっちゃったの、\n『言い辛いから』って、きっと、思ってくれたんだ。
2512 = "A, Nagi. Chắc chắn em ấy nghĩ mình ấp úng, là vì 『khó nói』."
# monologue
# JP: だから全部を、わたしに代わって――\n一人で背負おうとしてくれてるんだ。
2663 = "Nên em ấy mới thay mình―― định gánh vác tất cả một mình."
# 【ふかみ】
# display as 深美
# JP: 「そう、なんですよ！」
1778 = "「Đúng, là vậy đó ạ!」"
# monologue
# JP: だったら、わたしも応えなきゃ。\n普通に、普通に、いつもどおりに。
2834 = "Nếu vậy, mình cũng phải đáp lại thôi. Thật bình thường, thật bình thường, như mọi khi."
# monologue
# JP: 泣くなんて、一人になってから\nいくらでも、好きなだけできるんだから。
2745 = "Khóc lóc thì, đợi khi chỉ còn một mình khóc bao nhiêu, khóc thỏa thích cũng được mà."
# 【双鉄】
# display as 雙鐵
# JP: 「それで――具体的にはどう変えていくんだ？」
2017 = "「Vậy――cụ thể thì sẽ thay đổi thế nào?」"
# 【凪】
# display as 凪
# JP: 「そいば……どぎゃんすると？　ふかみちゃん」
1989 = "「Cái đó...... thì làm sao đây? Bé Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「それを決めるためには――」
1952 = "「Để quyết định chuyện đó thì――」"
# monologue
# JP: 言葉が、喉に絡みつく。
2810 = "Lời nói như nghẹn lại ở cổ họng."
# monologue
# JP: 言いたくない、聞きたくないって、\nわたしのからだの、底の部分が抵抗してる。
2653 = "Sâu thẳm trong cơ thể mình đang kháng cự, rằng không muốn nói, không muốn nghe."
# 【双鉄】
# display as 雙鐵
# JP: 「決めるためには？」
2029 = "「Để quyết định thì sao?」"
# monologue
# JP: だって、双鉄おにいさん。きっと、もう答えがでてるから。\nそれはきっとわたしには、寂しい答えになりそうだから。
2845 = "Bởi vì, anh Soutetsu. Chắc chắn anh ấy đã có câu trả lời rồi. Và câu trả lời đó, chắc chắn sẽ là một câu trả lời buồn bã đối với mình."
# monologue
# JP: すごく怖くて、聞きたくなくて――逃げ出しちゃいたい。\nだけど、逃げたら……ずっと、負担をかけ続けちゃう。
2632 = "Rất đáng sợ, không muốn nghe――chỉ muốn bỏ chạy. Nhưng nếu chạy trốn...... mình sẽ mãi trở thành gánh nặng cho anh ấy."
# 【ふかみ】
# display as 深美
# JP: 「聞かせて、ください」
1633 = "「Xin anh, hãy cho bọn em biết.」"
# monologue
# JP: だから、言う。\n逃げ出さないよう、言葉で自分を縫い付けちゃう。
2666 = "Vì thế, mình phải nói ra. Để không bỏ chạy, mình phải dùng lời nói trói buộc bản thân lại."
# monologue
# JP: 時間をおいたらきっとわたし、ズルいこと考えちゃうから。\n凪ちゃんを出し抜こうって、追い詰められてしまうから。
2799 = "Nếu để thời gian trôi qua, chắc chắn mình sẽ nghĩ ra những trò gian xảo. Sẽ bị dồn vào đường cùng và tìm cách qua mặt Nagi mất."
# 【双鉄】
# display as 雙鐵
# JP: 「聞かせる？　何をだ？」
1632 = "「Cho biết? Chuyện gì cơ?」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、気持ち――を、です」
1538 = "「Tâm tư của anh Soutetsu――ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の気持ち？」
1823 = "「Tâm tư của anh?」"
# 【ふかみ】
# display as 深美
# JP: 「そう。です」
1877 = "「Đúng. Vậy ạ.」"
# monologue
# JP: けど。だけど。もしそんなことをしちゃったら、\nわたしは二度と、凪ちゃんの顔を見られなくなる。
2489 = "Nhưng. Dù vậy. Nếu mình làm thế, mình sẽ không bao giờ có thể nhìn mặt Nagi được nữa."
# monologue
# JP: 一番大好きなともだちと、\nわたしは、二度とあえなくなっちゃう。
2832 = "Mình sẽ không bao giờ có thể gặp lại người bạn mà mình yêu quý nhất nữa."
# 【ふかみ】
# display as 深美
# JP: 「まず、最初に聞かせてください。\n凪ちゃんを、わたしを、どう思ってるか」
2035 = "「Trước tiên, xin anh hãy nói cho bọn em biết. Anh nghĩ thế nào về Nagi, về em.」"
# 【凪】
# display as 凪
# JP: 「はぅぅぅ～～っ」
1692 = "「Hauuu~~」"
# monologue
# JP: 凪ちゃんが、とっても切なそうな声を出す。\nそれを聞いたら、わたしにもチャンスあるかもって――
2581 = "Nagi cất lên một giọng nói vô cùng buồn bã. Nghe thấy vậy, mình bỗng nghĩ biết đâu mình cũng có cơ hội――"
# monologue
# JP: 望んじゃダメって、もっと悲しくなるだけだって……\n頭ではそう考えてるのに――なのにどうしても思っちゃう。
2430 = "Dù lý trí bảo rằng không được hy vọng, làm vậy chỉ thêm đau khổ thôi...... Nhưng dù thế nào mình vẫn không ngừng suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、気持ち。\n凪に対する。ふかみに対する」
1812 = "「Tâm tư của anh. Đối với Nagi. Đối với Fukami.」"
# monologue
# JP: ああ、また。聞いてるのはわたしなのに――\n無意識に、凪ちゃんの名前を先に呼んでる。
2509 = "A, lại nữa rồi. Người hỏi là mình cơ mà―― Vậy mà trong vô thức, anh ấy lại gọi tên Nagi trước."
# 【ふかみ】
# display as 深美
# JP: 「そうです」
# 1877 = "「是的」" 
# monologue
# JP: 事実が、背中を押してくれる。\nほんの少しずつ少しずつ、からだが、理解を許しはじめる。
2264 = "Sự thật đang thúc đẩy mình từ phía sau. Từng chút, từng chút một, cơ thể mình bắt đầu chấp nhận điều đó."
# 【ふかみ】
# display as 深美
# JP: 「それを、聞かせてくれたら、話してくれたら。\nきっと、自然と、見えてくるって――思う、です」
1615 = "「Nếu anh cho bọn em biết, nói cho bọn em nghe. Chắc chắn, tự nhiên, mọi thứ sẽ trở nên rõ ràng――em nghĩ vậy, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1710 = "「Ừ――」"
# monologue
# JP: 双鉄おにいさんが、わたしを見る。
2852 = "Anh Soutetsu nhìn tôi."
# 【ふかみ】
# display as 深美
# JP: 「っ！」
# 1674 = "「啊！」" 
# monologue
# JP: その目にどんな感情が浮かんでいるのか――
2274 = "Trong đôi mắt ấy đang chất chứa những cảm xúc gì――"
# monologue
# JP: わたしにはきっとわからないけど、\nわかっちゃったら怖い気がして、目をそらす。
2614 = "Chắc chắn mình sẽ không hiểu được đâu, nhưng mình sợ nếu hiểu ra, nên đã quay mặt đi."
# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行の、変えていきかた――\nあるいは……旅の、終わらせ方が、か」
1995 = "「Cách thay đổi chuyến dã ngoại―― Hay là...... cách kết thúc chuyến đi, sao.」"
# 【凪】
# display as 凪
# JP: 「ぁっ――」
# 1671 = "「啊……」" 
# 【ふかみ】
# display as 深美
# JP: 「そう。です。きっと」
1878 = "「Đúng. Vậy ạ. Chắc chắn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1697 = "「Ừm.」"
# monologue
# JP: 双鉄おにいさんが、黙り込む。\n凪ちゃんの、私の言葉を、多分、待ってる。
2848 = "Anh Soutetsu im lặng. Có lẽ anh ấy đang chờ đợi lời nói của Nagi, của tôi."
# monologue
# JP: だけど、なんにも口に出せない。\nわたしだけじゃなく、凪ちゃんも。
2284 = "Nhưng, tôi không thể thốt nên lời nào. Không chỉ tôi, cả Nagi cũng vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、話そう。まずは、凪」
1223 = "「......Nếu vậy thì, anh sẽ nói. Trước tiên là, Nagi.」"
# 【凪】
# display as 凪
# JP: 「ひゃいっ！」
1722 = "「Hya!」"
# monologue
# JP: 凪ちゃんがびくんっ！　って背筋を伸ばす。\n双鉄おにいさんが、ふふって笑う。
2585 = "Nagi giật bắn mình! Vươn thẳng lưng lên. Anh Soutetsu bật cười fufu."
# monologue
# JP: 笑った、んだよね？　笑った気がする。\n怖くてわたし、それでも顔を見られない。
2272 = "Anh ấy cười, phải không? Mình cảm thấy anh ấy đã cười. Sợ hãi, mình vẫn không dám nhìn vào khuôn mặt ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「凪に対する気持ちというなら――\n『危なっかしい』のひとことだ」
1811 = "「Nếu nói về tâm tư đối với Nagi thì―― Chỉ có một từ thôi, 『Nguy hiểm』.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと気持ちとっ！？」
1997 = "「Đó là tâm tư gì vậy hả!?」"
# monologue
# JP: ほんの一瞬。
2764 = "Chỉ trong một khoảnh khắc."
# monologue
# JP: ただひとことを双鉄おにいさんと交わしただけで、\n凪ちゃん、いつもの凪ちゃんになる。
2854 = "Chỉ trao đổi một câu với anh Soutetsu, Nagi đã trở lại là Nagi của mọi ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1697 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「レディーに対して、あんまりばーい」
1996 = "「Anh đối xử với một quý cô như vậy là quá đáng lắm đó!」"
# monologue
# JP: 凪ちゃん、がくーんて落ち込んじゃう。\n逆に、わたし、心臓がびょんびょん跳ね出しちゃう。
2575 = "Nagi rũ rượi ủ rũ. Ngược lại, tim mình lại đập thình thịch liên hồi."
# monologue
# JP: 期待しちゃだめ、望んじゃだめ。\nそう思うけど――双鉄おにいさんの気持ちがもしも――
2233 = "Không được kỳ vọng, không được hy vọng. Nghĩ vậy nhưng――nếu tâm tư của anh Soutetsu――"
# 【双鉄】
# display as 雙鐵
# JP: 「凪はまっすぐで迷いがない。自分が正しいと信じるから、\n例え周りが間違いであると示しても、なかなか[ひ]退けない」
1530 = "「Nagi rất thẳng thắn và không hề do dự. Vì tin rằng mình đúng, nên dù mọi người xung quanh có chỉ ra là sai, em ấy cũng khó mà lùi bước.」"
# 【凪】
# display as 凪
# JP: 「むぅぅ～」
# 1665 = "「唔……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「凪の突破力は、時としては諸刃の[けん]剣だ。\n抜群の刺さり方をする故、抜くべきときには障害となる」
1541 = "「Sức đột phá của Nagi đôi khi là con dao hai lưỡi. Bởi vì đâm vào rất sắc bén, nên khi cần rút ra lại trở thành trở ngại.」"
# 【凪】
# display as 凪
# JP: 「ばってん！　そいば、長所でも――あるとよ、ね？」
1625 = "「Nhưng mà! Đó cũng――là ưu điểm mà, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1919 = "「Tất nhiên rồi.」"
# monologue
# JP: 双鉄おにいさんが言った瞬間、\n凪ちゃんの顔がほにゃーってゆるむ。
2784 = "Ngay khoảnh khắc anh Soutetsu nói vậy, khuôn mặt Nagi liền giãn ra rạng rỡ."
# monologue
# JP: 悔しいくらい、素直でかわいい。\nそれが不安で、なのにわたし、嬉しいなっても感じてる。
2546 = "Sự hồn nhiên và đáng yêu đến mức khiến người ta ghen tị. Điều đó làm mình bất an, nhưng đồng thời mình cũng cảm thấy vui."
# 【双鉄】
# display as 雙鐵
# JP: 「凪の挑戦は。その突破が見せてくれる新しい景色は、\n僕を大いにわくわくさせる。凪との旅は、ゆえに楽しい」
1540 = "「Những thử thách của Nagi. Những khung cảnh mới mẻ mà sự đột phá ấy mang lại, khiến anh vô cùng háo hức. Vì thế, chuyến đi cùng Nagi rất vui vẻ.」"
# 【凪】
# display as 凪
# JP: 「ふふーん！　だったらよかばい！　なによりばい！！」
1664 = "「Fufun! Vậy thì tốt quá rồi! Hơn bất cứ điều gì luôn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕の凪への気持ちだ。放っておけない、\n危なっかしい――だから僕は、いつでも凪を助けたい」
1991 = "「Đó là tâm tư của anh dành cho Nagi. Không thể bỏ mặc, rất nguy hiểm――nên lúc nào anh cũng muốn giúp đỡ Nagi.」"
# 【凪】
# display as 凪
# JP: 「にーさんに守ってもらわんでもすぐ平気になるばい！\n凪さま！　もっと大人に、素敵なレディーになるけんね」
1780 = "「Dù không có anh hai bảo vệ thì em cũng sẽ sớm tự lo được thôi! Nagi đại nhân! Sẽ trở thành một quý cô tuyệt vời và trưởng thành hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……ふむ。嬉しく心強いことだな。\nそうなったときには、僕が凪に守ってもらうか」
1987 = "「Vậy sao...... Hừm. Thật đáng mừng và an tâm nhỉ. Đến lúc đó, anh sẽ nhờ Nagi bảo vệ nhé.」"
# 【凪】
# display as 凪
# JP: 「どんとこいばい！　まーかせーろばーい！」
1898 = "「Cứ để đó cho em! Giao hết cho em đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。よろしく頼む」
1700 = "「Ừ. Trăm sự nhờ em.」"
# monologue
# JP: ……双鉄おにいさん、こんな顔して笑うんだ。\n優しくて、あったかで。こどもっぽくて、甘えるみたいに。
1195 = "......Anh Soutetsu, lại cười với khuôn mặt như vậy sao. Dịu dàng, ấm áp. Trẻ con, như đang làm nũng."
# monologue
# JP: やっと見れた。双鉄おにいさんのお顔を、ちゃんと。\nそうできたのが、少し嬉しくて、すごく寂しい。
2657 = "Cuối cùng cũng được nhìn thấy. Nhìn rõ khuôn mặt của anh Soutetsu. Được nhìn thấy, mình thấy hơi vui, nhưng cũng vô cùng cô đơn."
# 【ふかみ】
# display as 深美
# JP: 「――それ、なら」
1222 = "「――Nếu, vậy.」"
# monologue
# JP: 笑顔、作る。\n大丈夫。わたしはプロ。接客の。
2650 = "Mỉm cười nào. Không sao đâu. Mình là chuyên gia mà. Chuyên gia tiếp khách."
# monologue
# JP: クマ川下りのときとおんなじ。\nやるべき、必要なことって思って、笑顔を作る。
2597 = "Giống như lúc chèo thuyền xuôi dòng sông Kuma. Nghĩ rằng đây là việc nên làm, cần phải làm, và nở một nụ cười."
# 【ふかみ】
# display as 深美
# JP: 「それじゃあ、わたしへはどうですか？\nわたしに対する、双鉄おにいさんの気持ちは」
2012 = "「Vậy còn em thì sao? Tâm tư của anh Soutetsu đối với em là gì.」"
# monologue
# JP: 本当はもう聞きたくない。答えならもう、出ちゃってる。\n双鉄おにいさんは、絶対わたしを、ほめてくれる。
2306 = "Thực ra mình không muốn nghe nữa. Câu trả lời thì, đã rõ ràng rồi. Anh Soutetsu chắc chắn sẽ khen ngợi mình."
# monologue
# JP: だけど、それがどんなに嬉しく素敵な褒め言葉でも――\nわたしが一番ほしい言葉じゃ、きっと、無い。
2485 = "Nhưng dù đó có là những lời khen tuyệt vời và đáng mừng đến đâu―― Thì chắc chắn, đó không phải là lời mình muốn nghe nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは、とても綺麗だと思う。\nまず真っ先にそれが来る」
1826 = "「Anh nghĩ Fukami rất đẹp. Đó là điều đầu tiên nảy ra trong đầu anh.」"
# 【凪】
# display as 凪
# JP: 「ちょっ！？　凪さまは綺麗じゃなかと！？」
1689 = "「Khoan đã!? Nagi đại nhân không đẹp sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪も綺麗だ。が、綺麗より先に立つものがある。\n元気がいいとか――『うるさい』とかだな」
1526 = "「Nagi cũng đẹp. Nhưng có những thứ nổi bật hơn cả sự xinh đẹp. Chẳng hạn như tràn đầy năng lượng――hay 『ồn ào』.」"
# 【凪】
# display as 凪
# JP: 「むぎゅっ」
1668 = "「Mugyu.」"
# monologue
# JP: 凪ちゃんが両手で口をおさえて、目だけで、\n『ごめん』って謝ってくる。
2580 = "Nagi lấy hai tay che miệng lại, chỉ dùng ánh mắt, để xin lỗi 『Em xin lỗi』."
# monologue
# JP: だからわたし、『平気』って笑う――笑えてる。\n凪ちゃんが、悔しいくらいに可愛いらしいから。
2704 = "Nên mình cười 『Không sao đâu』――mình cười được. Vì Nagi đáng yêu đến mức khiến người ta ghen tị."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの場合は、綺麗さだ。外観だけのことではなく、\n生き方そのものが、とても綺麗だ」
1942 = "「Còn với Fukami, là sự xinh đẹp. Không chỉ là vẻ bề ngoài, mà chính cách sống của em cũng rất đẹp.」"
# monologue
# JP: ちょっと、意外。\nだから、聞きたい。
2850 = "Hơi bất ngờ một chút. Nên mình muốn nghe tiếp."
# monologue
# JP: もうなんにも聞きたくないのに、家に帰って泣きたいのに。\nそれでもやっぱり、双鉄おにいさんの言葉が欲しい。
2642 = "Dù không muốn nghe gì nữa, dù muốn về nhà khóc một trận. Nhưng mình vẫn khao khát những lời nói của anh Soutetsu."
# 【ふかみ】
# display as 深美
# JP: 「綺麗。ですか？　わたしの、生き方？」
1937 = "「Đẹp. Sao ạ? Cách sống của em?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの全てが、クマ川下りにつながっている。\nハチロクが、線路とつながっているのと同じく」
1536 = "「Mọi thứ của Fukami đều gắn liền với chuyến xuôi dòng sông Kuma. Giống như Hachiroku gắn liền với tuyến đường sắt vậy.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
1673 = "「A.」"
# monologue
# JP: ……自覚、なかった。\nけど、ハチロクちゃんに例えて貰えたからわかる。
1191 = "......Mình không hề nhận ra. Nhưng nhờ anh ấy ví von với Hachiroku nên mình mới hiểu."
# monologue
# JP: あの子の生き方。絶対に揺るがないものの存在。\nそうか――わたしにも、それがあるんだ。
2525 = "Cách sống của cô ấy. Sự tồn tại của một thứ tuyệt đối không thể lay chuyển. Ra vậy――mình cũng có thứ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「現状維持は、ゆるやかな衰退と変わらぬことと意識して、\nもっと、もっとと、常に貪欲に改善を目指す」
1533 = "「Ý thức được rằng duy trì hiện trạng chẳng khác nào sự suy thoái chậm rãi, luôn khao khát cải thiện, muốn tốt hơn, tốt hơn nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 1877 = "「是的」" 
# monologue
# JP: すごく、ほめて貰ってる。\nほっぺた、かーって赤くなる。
2849 = "Mình đang được khen ngợi rất nhiều. Đôi má nóng bừng đỏ ửng."
# monologue
# JP: けど、心のどこかは、きぃんて、冷えてる。\n多分、わたしの――おんなのこの部分。恋ごころが。
2492 = "Nhưng, một nơi nào đó trong tim lại lạnh buốt. Có lẽ, đó là phần con gái trong mình. Trái tim đang yêu này."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はふかみを見習い、尊敬している。\n年齢に関係なく、ふかみのようにありたく思う」
1816 = "「Anh noi gương và tôn trọng Fukami. Không phân biệt tuổi tác, anh muốn được như Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「……はい」
1206 = "「......Vâng.」"
# monologue
# JP: ハチロクちゃんは、双鉄おにいさんの近くに居て。\nだけれど、恋の相手じゃない。
2303 = "Hachiroku luôn ở bên cạnh anh Soutetsu. Nhưng cô ấy không phải là đối tượng yêu đương."
# monologue
# JP: そこもきっと、わたしとハチロクちゃんとは、\n“同じく”だって――感じちゃうから。
2530 = "Điểm đó chắc chắn, mình và Hachiroku cũng \"giống nhau\"――mình cảm nhận được như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみとの旅からは、多くを学べる。\nそれが、ふかみとの旅の楽しみだ」
1641 = "「Từ chuyến đi cùng Fukami, anh học được rất nhiều điều. Đó là niềm vui của chuyến đi cùng Fukami.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
# 1697 = "「嗯」" 
# monologue
# JP: わかる。わかった。わかっちゃう。\n双鉄おにいさんにとって、わたし――
2661 = "Mình hiểu. Mình đã hiểu. Mình hiểu rõ. Đối với anh Soutetsu, mình――"
# monologue
# JP: いつの間にか、引率の先生みたいになっちゃってたんだ。\nおんなじ場所と時間でも、きっとおんなじ旅じゃない。
2231 = "Từ lúc nào không hay, mình đã trở thành giống như một giáo viên dẫn đường. Dù cùng một địa điểm và thời gian, nhưng chắc chắn không phải là cùng một chuyến đi."
# 【ふかみ】
# display as 深美
# JP: 「わかりましたし、見えました、です！」
1817 = "「Em hiểu rồi, và em cũng đã thấy rồi, ạ!」"
# monologue
# JP: 泣きたいくらいイヤだけど、どうしようもなく寂しいけど。\nそれでも、だったら――精一杯に頑張ろう。
2841 = "Dù không muốn đến mức phát khóc, dù cô đơn đến không thể tả. Nhưng nếu vậy――mình sẽ cố gắng hết sức."
# monologue
# JP: 凪ちゃんと双鉄おにいさんを、\nお互いの気持ちの行きたいところに、引率しよう。
2594 = "Mình sẽ dẫn đường cho Nagi và anh Soutetsu, đến nơi mà trái tim cả hai đang hướng về."
# 【双鉄】
# display as 雙鐵
# JP: 「わかってもらえてありがたい。\nそのうえで……“見えた”とは、一体何がだ？」
1806 = "「Anh rất biết ơn vì em đã hiểu. Vậy...... \"đã thấy\" là thấy cái gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「修学旅行を終えたあと。\n双鉄おにいさんが、どんな旅をしたいのか、です！」
1830 = "「Sau khi chuyến dã ngoại kết thúc. Anh Soutetsu muốn có một chuyến đi như thế nào, ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1874 = "「Hô.」"
# 【凪】
# display as 凪
# JP: 「なになに、どぎゃんと！？　どんな旅ばい！」
1852 = "「Gì vậy, là sao!? Chuyến đi như thế nào!」"
# 【ふかみ】
# display as 深美
# JP: 「それはね？　凪ちゃん、双鉄おにいさん」
1945 = "「Cái đó hả? Nagi, anh Soutetsu.」"
# monologue
# JP: （ぴとっ）
2893 = "（Chạm nhẹ）"
# 【凪】
# display as 凪
# JP: 「ふにゅっ！？」
1670 = "「Funyu!?」"
# monologue
# JP: （ぴとっ）
# 2893 = "（點）" 
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1668 = "「唔」" 
# monologue
# JP: 人差し指をかるぅく凪ちゃんの唇に。\nそれからおんなじ軽さで、双鉄おにいさんの唇に。
2621 = "Tôi nhẹ nhàng đặt ngón trỏ lên môi Nagi. Rồi với cùng sự nhẹ nhàng ấy, đặt lên môi anh Soutetsu."
# 【ふかみ】
# display as 深美
# JP: 「いまはまだ、ナ・イ・ショ！」
1915 = "「Bây giờ vẫn là, BÍ - MẬT!」"
# monologue
# JP: うん。ナイショ。
2513 = "Ừm. Bí mật."
# monologue
# JP: わたしが恋を諦めることも、\n双鉄おにいさんと凪ちゃんが、お互い想いあってることも。
2616 = "Việc mình từ bỏ tình yêu này, và việc anh Soutetsu cùng Nagi đang hướng về nhau."
# 【凪】
# display as 凪
# JP: 「ええ～　どぎゃんしてナイショばい？」
1497 = "「Ể~ Sao lại là bí mật chứ?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしが何かをいったら、それが、凪ちゃんや\n双鉄おにいさんに、影響しちゃうかもしれないから」
1953 = "「Vì nếu em nói ra điều gì đó, nó có thể ảnh hưởng đến Nagi và anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\n言われてみれば、確かにその可能性はあるな」
1712 = "「À―― Nghe em nói vậy, đúng là có khả năng đó thật.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんといわれれば、そんな気も確かにするばい」
1999 = "「Nghe nói vậy, em cũng thấy đúng là thế thật.」"
# monologue
# JP: とっても素直。\n双鉄おにいさんも、凪ちゃんも。
2757 = "Thật sự rất ngoan ngoãn. Cả anh Soutetsu và Nagi."
# monologue
# JP: わたしが、もう少しズルければ――\nううん、違う。
2478 = "Nếu mình gian xảo hơn một chút―― Không, không phải."
# 【ふかみ】
# display as 深美
# JP: 「わたしが、今よりもう少しだけ――」
1621 = "「Nếu em, chỉ cần thêm một chút nữa thôi so với bây giờ――」"
# monologue
# JP: 双鉄おにいさんのことを好きだったら。\n凪ちゃんへの好きが弱かったら。
2476 = "Nếu mình thích anh Soutetsu nhiều hơn. Nếu tình cảm dành cho Nagi yếu đi."
# monologue
# JP: 凪ちゃんを泣かせちゃったって苦しめたって、\n双鉄おにいさんを奪いたいって、思えてたなら。
2480 = "Nếu mình có thể nghĩ rằng, dù làm Nagi khóc hay đau khổ, mình vẫn muốn cướp lấy anh Soutetsu."
# 【凪】
# display as 凪
# JP: 「もう少しだけ、何ばい？」
1880 = "「Thêm một chút nữa, là sao?」"
# 【ふかみ】
# display as 深美
# JP: 「『もう少しだけ、大人だったら』」
1881 = "「『Nếu em trưởng thành hơn một chút nữa』」"
# monologue
# JP: うん。そうなんだ。\nもう少しだけ大人だったら、全部はきっと違ってた。
2516 = "Ừm. Đúng vậy. Nếu mình trưởng thành hơn một chút nữa, mọi thứ chắc chắn đã khác."
# monologue
# JP: だけれどいまは、わたしはまだまだ、少女だから。\n少女らしく、乙女チックに――わたしの恋を、手放そう。
2287 = "Nhưng bây giờ, mình vẫn chỉ là một thiếu nữ. Nên mình sẽ buông tay tình yêu này――một cách thật thiếu nữ, thật mơ mộng."
# 【凪】
# display as 凪
# JP: 「もう少しだけ大人だったら？」
1963 = "「Nếu chị trưởng thành hơn một chút nữa thì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「こんな、アクシデントみたいな形じゃなくて。\nもっと上手に、修学旅行が終わってたかな、って」
1771 = "「Thì chuyến dã ngoại sẽ không kết thúc theo kiểu sự cố thế này. Mà sẽ kết thúc một cách trọn vẹn hơn, chị nghĩ vậy.」"
# 【凪】
# display as 凪
# JP: 「そしたら、そのときに終わらせればよかとよ！」
2007 = "「Nếu vậy thì, đến lúc đó hẵng kết thúc là được mà!」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
1682 = "「Hả?」"
# 【凪】
# display as 凪
# JP: 「今日より明日は。明日よりあさっては。\nうちもふかみちゃんも、もう少しだけ大人でしょう？」
1644 = "「Ngày mai so với hôm nay. Ngày kia so với ngày mai. Em và bé Fukami, sẽ trưởng thành hơn một chút mà đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「あはっ！　そうだね、凪ちゃん」
1660 = "「Aha! Đúng vậy nhỉ, Nagi.」"
# monologue
# JP: ほんとにそうだ。\nだからこのまま、もう少しだけ――
2767 = "Đúng là như vậy. Nên cứ thế này, thêm một chút nữa thôi――"
# monologue
# JP: 終わらせた恋を抱えたままで、\n修学旅行を、続けるふりを、わたしもしよう。
2613 = "Mình sẽ ôm lấy mối tình đã kết thúc này, và giả vờ như chuyến dã ngoại vẫn đang tiếp tục."
# monologue
# JP: （……それはさすがに、切ないけど、ねぇ）
2866 = "（......Làm vậy thì đúng là đau đớn thật đấy, nhỉ）"
# monologue
# JP: けど、大丈夫。\n私は、双鉄おにいさんに見習ってもらえる女なんだから。
2237 = "Nhưng mà, không sao đâu. Mình là một cô gái được anh Soutetsu noi gương cơ mà."
# monologue
# JP: 凪ちゃんの、一番の親友なんだから。\n大丈夫。大丈夫。――ぜったい、絶対、大丈夫
2625 = "Mình là bạn thân nhất của Nagi cơ mà. Không sao đâu. Không sao đâu. ――Chắc chắn, tuyệt đối, không sao đâu."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！？　どぎゃんして泣いとると！？」
1768 = "「Bé Fukami!? Sao chị lại khóc vậy!?」"
# 【ふかみ】
# display as 深美
# JP: 「え？　あ、ほんと。\nやだ、ゴミが入っちゃったみたい」
1684 = "「Hả? A, thật này. Chết thật, hình như có bụi bay vào mắt rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、僕が取ってやろう」
2014 = "「Vậy để anh lấy ra cho.」"
# 【ふかみ】
# display as 深美
# JP: 「平気です！　もう取れちゃいましたから」
1895 = "「Không sao đâu ạ! Nó ra rồi.」"
# monologue
# JP: 目の端にちょっと浮いちゃった涙を、ぬぐいとる。\nわたし自身の指先で。
2652 = "Mình lau đi giọt nước mắt vừa ứa ra nơi khóe mắt. Bằng chính đầu ngón tay của mình."
# monologue
# JP: 凪ちゃんと、双鉄おにいさんにナイショのままで、\n誓いのキスをさせちゃった。がんばりやさんの、この指で。
2643 = "Giữ bí mật với Nagi và anh Soutetsu, mình đã để họ trao nhau nụ hôn thề ước. Bằng chính ngón tay nỗ lực này."
# 【双鉄】
# display as 雙鐵
# JP: 「面っ！！」
2034 = "「Mặt!!」"
# monologue
# JP: （スパーンっ！！）
2889 = "（Bốp!!）"
# 【凪】
# display as 凪
# JP: 「やったばーーーい！」
1836 = "「Đánh trúng rồi!」"
# monologue
# JP: 凪の歓声に気を抜かず、\n残心をきっちり取ることを意識する。
2403 = "Không để tiếng reo hò của Nagi làm phân tâm, tôi tập trung giữ vững thế tàn tâm."
# monologue
# JP: （ばっ！　ばっ！　ばっ！）
2878 = "（Xoạt! Xoạt! Xoạt!）"
# monologue
# JP: 白、白、白。\n間髪を入れずに旗三本があげられる。
2753 = "Trắng, trắng, trắng. Ba lá cờ trắng lập tức được giơ lên."
# 【ふかみ】
# display as 深美
# JP: 「やったね凪ちゃんっ！！\n双鉄おにいさん、勝ってくれたよ！！」
1740 = "「Tuyệt quá Nagi ơi!! Anh Soutetsu thắng rồi kìa!!」"
# 【凪】
# display as 凪
# JP: 「さすがはウチのにーさんばいっ！！」
1494 = "「Không hổ danh là anh hai của em!!」"
# monologue
# JP: 面を外して控えに戻れば、\n凪とふかみが大歓迎で迎えてくれる。
2640 = "Tháo mặt nạ ra và trở về khu vực chờ, Nagi và Fukami hân hoan chào đón tôi."
# 【ふかみ】
# display as 深美
# JP: 「どうぞ、です。レモンのハチミツづけ」
1547 = "「Của anh đây, ạ. Chanh ngâm mật ong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕の出番はこれで終わりだ。\n大勝負を控えている凪に食べさせてやってくれ」
1506 = "「Không, phần thi của anh đến đây là kết thúc rồi. Em hãy cho Nagi ăn đi, em ấy sắp bước vào trận quyết định rồi.」"
# 【凪】
# display as 凪
# JP: 「よかと！？　やったばーい！」
1925 = "「Được hả!? Tuyệt quá!」"
# monologue
# JP: 文字どおりの大勝負。\n優勝チームを決める、代表者戦。
2825 = "Đúng nghĩa là trận quyết định. Trận đấu đại diện để phân định đội vô địch."
# monologue
# JP: その直前であるというのに、凪は少しも変わらない。
2298 = "Ngay trước thời khắc quan trọng đó, Nagi vẫn chẳng hề thay đổi."
# 【凪】
# display as 凪
# JP: 「じゃ、にーさんの分もいただくばい！」
2005 = "「Vậy, em ăn luôn phần của anh hai nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　あんまり食べ過ぎると、\nおなかゆるくなっちゃうかも」
1759 = "「Nagi! Ăn nhiều quá, coi chừng đau bụng đấy.」"
# 【凪】
# display as 凪
# JP: 「むぐっ！？」
# 1670 = "「唔？！」" 
# monologue
# JP: 体は大きくなったのに、\nふかみとのやりとりもあの頃のまま。
2842 = "Cơ thể đã lớn phổng phao, nhưng cách nói chuyện với Fukami vẫn y như hồi đó."
# monologue
# JP: ――とても幸いなことだと感じる。
1184 = "――Tôi cảm thấy đó là một điều vô cùng may mắn."
# monologue
# JP: （思いもかけぬほど遠くまでこれたものだな。\n凪はもちろん、指導を通じて、僕も大幅に成長できた）
2891 = "（Không ngờ lại có thể tiến xa đến mức này. Nagi dĩ nhiên là vậy, nhưng thông qua việc chỉ đạo, tôi cũng đã trưởng thành lên rất nhiều.）"
# monologue
# JP: とはいえ、九洲勤労者剣道選手権ほどの大会で。
2239 = "Tuy nhiên, ở một giải đấu tầm cỡ như Giải vô địch Kiếm đạo Người lao động Kyushu."
# monologue
# JP: まさか僕らが、決勝の、\n優勝決定戦にまで絡めるものとは――。
2706 = "Không ngờ chúng tôi lại có thể, lọt vào đến tận trận chung kết quyết định ngôi vô địch――."
# 【宗方】
# display as 宗方
# JP: 「勝ったな。右田機関士」
1542 = "「Thắng rồi nhỉ. \\x%l機関士;#00ffc040;Lái tàu%l;#; Migita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方機関士」
1750 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata.」"
# monologue
# JP: 宗方機関士――\nみかん鉄道の機関士で、なんと剣道七段の達人だ。
2568 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata―― Là \\x%l機関士;#00ffc040;lái tàu%l;#; của Đường sắt Mikan, và là một cao thủ kiếm đạo thất đẳng."
# monologue
# JP: みかん鉄道とレールが繋がらなかったら、\n合同チームを組めなかったら、出場さえも出来てなかった。
2552 = "Nếu tuyến đường sắt không kết nối với Đường sắt Mikan, nếu không lập đội liên quân, thì chúng tôi thậm chí còn không được tham gia thi đấu."
# 【双鉄】
# display as 雙鐵
# JP: 「宗方さんが居てくださったからです。\n全ての試合で勝利を収めていただけましたから」
2016 = "「Là nhờ có anh Munakata đấy ạ. Vì anh đã giành chiến thắng trong tất cả các trận đấu mà.」"
# 【宗方】
# display as 宗方
# JP: 「それは[オーダー,1]作戦がいいからだ。\nこの年で若者と戦うのは、さすがにキツイ」
1993 = "「Đó là do chiến thuật sắp xếp thứ tự thi đấu tốt thôi. Đến tuổi này mà phải đấu với đám thanh niên thì quả thật rất mệt.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1671 = "「啊……」" 
# monologue
# JP: ふかみが、うれしげな声を漏らす。\n僕ももちろん、同感だ。
2735 = "Fukami cất lên giọng nói đầy vui sướng. Tôi dĩ nhiên cũng đồng tình."
# 【双鉄】
# display as 雙鐵
# JP: 「[うち,4]御一夜鉄道の早瀬は、長年大会を見てますからね。\nデータ分析を、非常にしっかりやってくれてます」
1888 = "「Hayase của Đường sắt Ohito đã theo dõi giải đấu này nhiều năm rồi. Cô ấy phân tích dữ liệu rất kỹ lưỡng.」"
# 【宗方】
# display as 宗方
# JP: 「わかるよ。ここまでのオーダーからも」
1820 = "「Tôi hiểu mà. Nhìn vào thứ tự thi đấu từ đầu đến giờ là biết.」"
# monologue
# JP: 九洲勤労者剣道選手権は、女子剣道活性化のための大会だ。\n団体五人は、女子三名に男子二名。
2258 = "Giải vô địch Kiếm đạo Người lao động Kyushu là giải đấu nhằm thúc đẩy phong trào kiếm đạo nữ. Đội 5 người gồm 3 nữ và 2 nam."
# monologue
# JP: 御一夜鉄道の僕と凪との他のメンバーは、\n宗方さん率いる、みかん鉄道剣道部のおふたりだ。
2840 = "Ngoài tôi và Nagi của Đường sắt Ohito, các thành viên khác là hai người thuộc câu lạc bộ kiếm đạo Đường sắt Mikan do anh Munakata dẫn dắt."
# 【宗方】
# display as 宗方
# JP: 「うちのふたりは初段と二段。このクラスの大会では、\n引き分けを拾うのも難しいメンバーだというのに」
1814 = "「Hai người bên tôi mới chỉ sơ đẳng và nhị đẳng. Ở giải đấu tầm cỡ này, đây là những thành viên khó lòng giành được cả một trận hòa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[はせ,1]長谷さんも[しんじょうじ,2]真成寺さんも、よくやってくれました」
2024 = "「Cô Hase và cô Shinjoji đều đã làm rất tốt.」"
# monologue
# JP: 基本的には、凪、宗方さん、僕で、\n三勝か、二勝一分けを狙っていく。
2623 = "Về cơ bản, Nagi, anh Munakata và tôi, sẽ nhắm tới ba trận thắng, hoặc hai thắng một hòa."
# monologue
# JP: が、僕らが常に、勝ちを拾えたわけでもない。
2238 = "Tuy nhiên, không phải lúc nào chúng tôi cũng giành được chiến thắng."
# 【双鉄】
# display as 雙鐵
# JP: 「おふたりの引き分けに助けられた試合も、\n一度ではありませんでしたし」
1511 = "「Cũng không ít lần chúng ta được cứu nguy nhờ những trận hòa của hai cô ấy mà.」"
# 【宗方】
# display as 宗方
# JP: 「目一杯のようだがな」
1784 = "「Có vẻ như họ đã cố gắng hết sức rồi.」"
# monologue
# JP: 会場を出た控室通路に、宗方さんの目が注がれる。
2566 = "Ánh mắt anh Munakata hướng ra hành lang phòng chờ bên ngoài hội trường."
# monologue
# JP: 大健闘のふたりはぐったり汗だくで、\nそこにぺたりと倒れこんでる。
2420 = "Hai người họ đã chiến đấu hết mình, giờ mồ hôi nhễ nhại, đang ngồi phịch xuống đó."
# 【宗方】
# display as 宗方
# JP: 「個々の実力だけを見れば、蓑笠選手以外、個人戦では、\n一回戦を抜くのも正直難しいところだろうが――」
1746 = "「Nếu chỉ xét thực lực cá nhân, ngoài tuyển thủ Minokasa ra, ở giải cá nhân, thành thật mà nói, việc vượt qua vòng một cũng rất khó khăn――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を、宗方機関士なら個人戦でも――ん？」
1804 = "「Anh quá khiêm tốn rồi, nếu là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata thì dù là giải cá nhân――hửm?」"
# monologue
# JP: 宗方さんの目線が動く。観客席へと。\nつられて僕も、言葉を止めて――
2563 = "Ánh mắt anh Munakata dịch chuyển. Hướng về phía khán đài. Tôi cũng bị cuốn theo, ngừng lời――"
# monologue
# JP: （ああ）
2877 = "（A）"
# monologue
# JP: 嬉しいものだ。
2824 = "Thật đáng mừng."
# monologue
# JP: ハチロク、日々姫、ポーレット、れいな、真闇姉、稀咲。\nみなが、応援に来てくれている。
2301 = "Hachiroku, Hibiki, Paulette, Reina, chị Mayami, Kisaki. Mọi người đều đã đến cổ vũ."
# 【双鉄】
# display as 雙鐵
# JP: 「……みかん鉄道の方々も、応援に？」
1215 = "「......Mọi người ở Đường sắt Mikan cũng đến cổ vũ sao?」"
# 【宗方】
# display as 宗方
# JP: 「数人だがな。[はせ,1]長谷と[しんじょうじ,2]真成寺の応援は来ているようだ。\nそれに――」
1611 = "「Chỉ vài người thôi. Có vẻ họ đến cổ vũ cho Hase và Shinjoji. Với lại――」"
# monologue
# JP: 観客席を見ていた視線が、ふわり、和らぐ。\nあたたかに、けれども同時に、淋しげに。
2275 = "Ánh mắt đang nhìn về phía khán đài bỗng dịu lại. Ấm áp, nhưng đồng thời cũng xen lẫn vẻ cô đơn."
# 【宗方】
# display as 宗方
# JP: 「来てはいないが、きっと見ているレイルロオドも。\n賑やかなことが好きなヤツだったからな」
1883 = "「Dù không đến, nhưng chắc chắn Railord đó cũng đang dõi theo. Bởi vì cô ấy là người rất thích sự náo nhiệt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1864 = "「A――」"
# monologue
# JP: 御一夜鉄道がみかん鉄道から譲渡を受けた、\nレイルロオドを失くしてしまった、Ⅸ号機関車。
2695 = "Đường sắt Ohito đã nhận chuyển nhượng từ Đường sắt Mikan, đầu máy số IX, chiếc đầu máy đã mất đi Railord của mình."
# monologue
# JP: そのⅨ号のもともとの、レイルロオドのことだろう。
2278 = "Chắc anh ấy đang nói về Railord nguyên bản của chiếc số IX đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……宗方機関士と、長かったんですか？」
1207 = "「......Cô ấy đã đồng hành cùng \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata rất lâu sao?」"
# 【宗方】
# display as 宗方
# JP: 「長かったな。……いいレイルロオドだった。\n失くしてしまうまで、そうとは少しも思わなかったが」
1792 = "「Rất lâu. ......Là một Railord tốt. Dù cho đến khi mất đi cô ấy, tôi chưa từng nghĩ như vậy.」"
# monologue
# JP: ふっと、息。\nあるいは、自嘲を含んだ微笑。
2562 = "Một tiếng thở dài. Hoặc là một nụ cười mang chút tự trào."
# 【宗方】
# display as 宗方
# JP: 「――アレは大喜びして見ているだろうさ。\n団体戦の妙とはいえど、ついに優勝決定戦なのだから」
1220 = "「――Chắc chắn cô ấy đang vô cùng vui sướng theo dõi. Dù là nhờ sự kỳ diệu của giải đồng đội, nhưng cuối cùng cũng vào đến trận quyết định ngôi vô địch rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「団体戦の妙、ですか。確かに僕も感じはしますが、\n運もめぐり合わせも、実力のうちでしょう」
1721 = "「Sự kỳ diệu của giải đồng đội sao. Quả thực tôi cũng cảm nhận được, nhưng may mắn và cơ duyên cũng là một phần của thực lực mà.」"
# 【宗方】
# display as 宗方
# JP: 「ああ。大会は結果が全てだ。\nそして、最良の結果は目の前にぶらさがっている」
1866 = "「Ừ. Trong giải đấu, kết quả là tất cả. Và kết quả tốt nhất đang treo ngay trước mắt chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1865 = "「Vâng.」"
# monologue
# JP: 女子剣道の活性化のため――
2743 = "Vì mục đích thúc đẩy phong trào kiếm đạo nữ――"
# monologue
# JP: 五人で決着が付かないときの代表戦も、\nもちろん、女子選手同士で行われる。
2267 = "Trận đấu đại diện khi năm người không phân thắng bại, dĩ nhiên cũng sẽ diễn ra giữa các nữ tuyển thủ."
# 【双鉄】
# display as 雙鐵
# JP: 「あとは、うちの蓑笠が――」
1617 = "「Còn lại, chỉ chờ Minokasa của chúng ta――」"
# 【宗方】
# display as 宗方
# JP: 「勝ってくれると、信じるのみだな」
1613 = "「Chỉ có thể tin tưởng rằng cô ấy sẽ giành chiến thắng thôi.」"
# monologue
# JP: 僕らの視線が、ごく当然に凪へ向く。
2624 = "Ánh mắt của chúng tôi, dĩ nhiên hướng về phía Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「むっ？」
1669 = "「Hửm?」"
# 【宗方】
# display as 宗方
# JP: 「足を傷めたのか？」
1947 = "「Chân bị thương sao?」"
# monologue
# JP: 袴の上から、ふかみが一生懸命に、\n凪の右足を揉んでいる。
2724 = "Qua lớp quần hakama, Fukami đang ra sức xoa bóp chân phải của Nagi."
# 【凪】
# display as 凪
# JP: 「傷んでなんてなかとばい！\nけど、ふかみちゃんが！！」
1648 = "「Chân em có bị thương đâu! Nhưng mà, bé Fukami cứ!!」"
# 【ふかみ】
# display as 深美
# JP: 「しっ！　凪ちゃん！！」
1709 = "「Suỵt! Nagi!!」"
# 【凪】
# display as 凪
# JP: 「むぎゅっ！？」
# 1670 = "「唔？！」" 
# 【ふかみ】
# display as 深美
# JP: 「これも作戦。作戦なんです」
1994 = "「Đây cũng là chiến thuật. Là chiến thuật đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1710 = "「噢……」" 
# monologue
# JP: ただそれだけでピンとくる。\nなにせ相手は中村選手。
2782 = "Chỉ nghe vậy thôi là tôi đã hiểu ngay. Dù sao thì đối thủ cũng là tuyển thủ Nakamura."
# monologue
# JP: 少等部時代のあの決勝以来、ことあるごとに凪と戦い、\n凪の挑戦を退けてきた――小手打ちの名手だ。
2786 = "Kể từ trận chung kết thời tiểu học đó, cô ấy luôn đấu với Nagi mỗi khi có cơ hội, và liên tục đánh bại những lời thách thức của Nagi――Một cao thủ đánh tay."
# 【双鉄】
# display as 雙鐵
# JP: 「それならば、僕も手伝おう」
2009 = "「Nếu vậy thì, để anh giúp một tay.」"
# 【凪】
# display as 凪
# JP: 「おおっ！？」
1685 = "「Ồ!?」"
# monologue
# JP: ふかみにならって、左足を揉む。\nふかみの狙いは、ほぼ間違いなく持久戦。
2628 = "Tôi bắt chước Fukami, xoa bóp chân trái cho Nagi. Mục tiêu của Fukami, gần như chắc chắn là chiến thuật đánh lâu dài."
# monologue
# JP: この暑さで、向こうは個人戦決勝までを勝ち抜いている。\n消耗度合いは、凪よりよほど激しい筈だ。
2827 = "Dưới cái nóng này, đối phương đã thi đấu đến tận trận chung kết cá nhân. Mức độ tiêu hao thể lực chắc chắn dữ dội hơn Nagi rất nhiều."
# 【宗方】
# display as 宗方
# JP: 「ん……うむむ」
1694 = "「Ừm...... hừm.」"
# monologue
# JP: 困りきったような顔をして、宗方さんは、\nひどく遠慮がちに、うちわで凪を仰いでくれる。
2560 = "Với vẻ mặt vô cùng bối rối, anh Munakata rất dè dặt dùng quạt quạt cho Nagi."
# 【凪】
# display as 凪
# JP: 「わぉわぉ！　なんだか凪様、お姫様みたいばーい！」
1658 = "「Woa wao! Cảm giác Nagi đại nhân cứ như công chúa ấy!」"
# 【ふかみ】
# display as 深美
# JP: 「そうだよ。凪ちゃん」
1868 = "「Đúng vậy đó. Nagi.」"
# 【凪】
# display as 凪
# JP: 「ほぇ？　なにがそーばい――っ！？」
1662 = "「Hả? Đúng cái gì cơ――!?」"
# monologue
# JP: 凪が、思わず息を飲む。\n理由を、僕も理解する。
2379 = "Nagi bất giác nín thở. Lý do thì, tôi cũng hiểu được."
# monologue
# JP: ふかみの瞳は、とても強い。\n迷わぬ意思の輝きを、その奥底に宿らせている。
2725 = "Đôi mắt của Fukami rất kiên định. Ánh lên ý chí không chút do dự từ tận sâu thẳm."
# 【ふかみ】
# display as 深美
# JP: 「今日こそ、凪ちゃんがお姫様になる日。\n一番を、必ずつかみとる日なんだよ？」
1519 = "「Hôm nay chính là ngày Nagi trở thành công chúa. Là ngày em nhất định phải giành lấy vị trí số một đấy.」"
# 【凪】
# display as 凪
# JP: 「――そうばいねっ！」
1211 = "「――Đúng vậy nhỉ!」"
# monologue
# JP: ふかみの言葉に、凪が笑顔を輝かせる。\n照れなく、力まず、ただまっすぐに。
2783 = "Trước lời nói của Fukami, Nagi nở nụ cười rạng rỡ. Không chút ngượng ngùng, không hề gượng ép, chỉ là một nụ cười thẳng thắn."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんがそぎゃんと言うてくれるなら、\nきっと、中村さんにも勝てるとね！」
1848 = "「Nếu bé Fukami đã nói vậy, thì chắc chắn em cũng sẽ thắng được Nakamura!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1865 = "「是啊」" 
# monologue
# JP: 凪が僕を見る。うなずき合う。\n心身ともに大人になっても、凪は少しも変わらない。
2406 = "Nagi nhìn tôi. Chúng tôi gật đầu với nhau. Dù thể xác lẫn tinh thần đã trưởng thành, Nagi vẫn chẳng hề thay đổi chút nào."
# monologue
# JP: 手を伸ばしたもの、そのただひとつさえを捨てることなく、\n全てに向かい全力で、ここまで走り抜けてきた。
2544 = "Em ấy chưa từng từ bỏ bất cứ thứ gì mình đã vươn tay ra, luôn dốc toàn lực đối mặt với tất cả, và đã chạy một mạch đến tận đây."
# 【双鉄】
# display as 雙鐵
# JP: 「体力と、暑さへの耐性ならば、圧倒的に凪だ」
1955 = "「Nếu nói về thể lực và khả năng chịu nóng, Nagi hoàn toàn áp đảo.」"
# 【ふかみ】
# display as 深美
# JP: 「それに、バランス感覚も」
1609 = "「Hơn nữa, cả khả năng giữ thăng bằng nữa.」"
# 【凪】
# display as 凪
# JP: 「わかっとるばい！\n運転台と川下り舟が、ウチを鍛えてくれたけんね！」
1651 = "「Em biết chứ! Buồng lái và thuyền xuôi dòng sông đã rèn luyện cho em mà!」"
# monologue
# JP: 瞬間、凪の足の筋肉が固くなる。\n揉む手を離せば、ぴょっこりと跳ね、立ち上がる。
2412 = "Trong khoảnh khắc, cơ bắp chân của Nagi cứng lại. Khi tôi vừa buông tay xoa bóp ra, em ấy lập tức bật dậy."
# 【凪】
# display as 凪
# JP: 「じゃ、一番になってくるばい！」
1657 = "「Vậy, em đi giành vị trí số một đây!」"
# monologue
# JP: 言って面を付け、小手をはめ――
2811 = "Nói rồi em ấy đội mặt nạ, đeo găng tay bảo hộ――"
# 【場内アナウンス】
# display as 場内廣播
# JP: 「これより、団体決勝を開始します。\n[しろだすき,1]白襷。南九洲鉄道事業者連合、[みのかさなぎ,2]蓑笠凪選手」
1720 = "「Sau đây, trận chung kết đồng đội xin phép được bắt đầu. Dải băng trắng. Liên hiệp Doanh nghiệp Đường sắt Nam Kyushu, tuyển thủ Minokasa Nagi.」"
# 【凪】
# display as 凪
# JP: 「はいっ！」
1601 = "「Có!」"
# 【場内アナウンス】
# display as 場内廣播
# JP: 「赤襷。エアロクラフテック・[せんだい,1]千内。\n中村[ちかげ,1]千景選手」
1928 = "「Dải băng đỏ. Aero-Craftech Sendai. Tuyển thủ Nakamura Chikage.」"
# 【中村】
# display as 中村
# JP: 「はい」
1600 = "「Có.」"
# monologue
# JP: 開始線へと両者が向う。\n竹刀をお互いがかまえ合う。
2843 = "Hai bên tiến về vạch xuất phát. Cùng giương kiếm trúc thủ thế."
# monologue
# JP: 中村選手は、綺麗な正眼。\n凪はもちろん、堂々とした右半開だ。
2250 = "Tuyển thủ Nakamura giữ thế chánh nhãn đẹp mắt. Nagi dĩ nhiên, là thế hữu bán khai đầy uy dũng."
# 【主審】
# display as 主裁判
# JP: 「はじめっ！」
2026 = "「Bắt đầu!」"
# 【凪】
# display as 凪
# JP: 「チェーーーストーーーーーーっ！」
1690 = "「Chiyeeesutoooooo!」"
# 【双鉄】
# display as 雙鐵＆中村
# JP: 「なっ！？」\n「っ！」
1516 = "「Cái!?」 「Hự!」"
# monologue
# JP: （バシっ！！）
# 2889 = "（砰！！）" 
# monologue
# JP: 開始直後の、真正面からの面打ち。
2421 = "Ngay khi vừa bắt đầu, một cú đánh thẳng vào mặt từ chính diện."
# monologue
# JP: 遠いあの日の試合をまるで、\nもう一度再生しているような――
2593 = "Giống như trận đấu của ngày xưa ấy, đang được tái hiện lại một lần nữa――"
# monologue
# JP: （ばっ！　ばっ！　ばっ！！！）
2882 = "（Xoạt! Xoạt! Xoạt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「やった！」
1743 = "「Làm được rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1713 = "「Ồ!」"
# monologue
# JP: 白、白、赤。\n旗の訂正は――行われない！！
2748 = "Trắng, trắng, đỏ. Không có sự thay đổi cờ nào――được đưa ra!!"
# 【主審】
# display as 主裁判
# JP: 「蓑笠選手！　面ありっ！！」
1950 = "「Tuyển thủ Minokasa! Ghi điểm mặt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ついに――か」
1929 = "「Cuối cùng thì――cũng đến rồi sao.」"
# monologue
# JP: 凪お得意の面打ちは、\n中村選手の小手打ちの、餌食にずっと、され続けてきた。
2223 = "Đòn đánh mặt sở trường của Nagi, luôn luôn là miếng mồi ngon cho đòn đánh tay của tuyển thủ Nakamura."
# monologue
# JP: ずっと――本当にずうっと、だ。\n凪は常に、中村選手とその監督に、徹底対策されてきた。
2222 = "Luôn luôn――thật sự là luôn luôn như vậy. Nagi luôn bị tuyển thủ Nakamura và huấn luyện viên của cô ấy bắt bài triệt để."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故だ。\n今までといったい何が――」
1623 = "「Nhưng mà, tại sao chứ. Rốt cuộc có gì khác biệt so với trước đây――」"
# 【ふかみ】
# display as 深美
# JP: 「そんなの、簡単な話ですよ」
1897 = "「Chuyện đó, đơn giản lắm ạ.」"
# monologue
# JP: 凪をまっすぐ見つめたままで、\nふかみが僕に答えてくれる。
2717 = "Vẫn nhìn thẳng vào Nagi, Fukami trả lời tôi."
# 【ふかみ】
# display as 深美
# JP: 「個人戦を決勝まで戦いきった中村さんと、\n個人戦に出場しなかった凪ちゃんでは、疲労が違う」
1509 = "「Tuyển thủ Nakamura đã thi đấu đến tận trận chung kết cá nhân, còn Nagi thì không tham gia giải cá nhân, mức độ mệt mỏi hoàn toàn khác nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\nただそれだけの話なのか」
1715 = "「A――Ra vậy. Chỉ đơn giản là thế thôi sao.」"
# monologue
# JP: 暑さと疲労。その蓄積が重みとなって、\n中村選手の剣速を、ほんの僅かに鈍らせる。
2527 = "Cái nóng và sự mệt mỏi. Sự tích tụ đó trở thành gánh nặng, khiến tốc độ vung kiếm của tuyển thủ Nakamura chậm lại dù chỉ một chút."
# monologue
# JP: そうして、その『ほんの僅か』が、\n常に――凪と中村選手とを、隔て続けた壁だった。
2781 = "Và rồi, cái 『chỉ một chút』 đó, chính là bức tường luôn――ngăn cách giữa Nagi và tuyển thủ Nakamura."
# 【双鉄】
# display as 雙鐵
# JP: 「持久戦に持ち込む必要など――\nこうなってしまえば、ハナから無いのか」
1850 = "「Đâu cần thiết phải kéo dài trận đấu―― Nếu đã thế này, thì ngay từ đầu đã không cần rồi sao.」"
# 【ふかみ】
# display as 深美
# JP: 「……毎年、凪ちゃんには言ってたんです。\n団体戦か個人戦、どっちかに絞ったほうがいいって」
1213 = "「......Năm nào em cũng nói với Nagi. Rằng nên tập trung vào giải đồng đội hoặc giải cá nhân thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知っている。\nその進言を、凪が拒んでいたことも」
1825 = "「Anh biết. Cả việc Nagi đã từ chối lời khuyên đó nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「ですよね、ふたり、いっつも一緒ですもんね」
1872 = "「Đúng vậy nhỉ, hai người lúc nào cũng ở bên nhau mà.」"
# monologue
# JP: ふかみが笑う。\nひやかしている感じではなく、穏やかに。
2730 = "Fukami mỉm cười. Không mang vẻ trêu chọc, mà là một nụ cười dịu dàng."
# monologue
# JP: その笑みを見て、ふと思う。
2800 = "Nhìn nụ cười ấy, tôi chợt nghĩ."
# monologue
# JP: （いつごろから――だっただろうか）
2887 = "（Từ khi nào――nhỉ）"
# monologue
# JP: ふかみが、僕とふたりで過ごす時間をゼロにして。\n凪と三人――その分も、過ごすように変わっていったのは。
2720 = "Fukami đã biến khoảng thời gian chỉ có hai chúng tôi thành con số không. Và chuyển sang dành khoảng thời gian đó――để ở bên cả Nagi, thành ba người."
# 【ふかみ】
# display as 深美
# JP: 「毎年断られてたけど、\n凪ちゃん、今年はわかってくれた」
1757 = "「Năm nào cũng bị từ chối, nhưng năm nay, Nagi đã hiểu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪に、なにか変化があったのか？」
1854 = "「Nagi có thay đổi gì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「そんなの、わたしにはわかりませんよ。\nどんなに仲良しでも、わたしは凪ちゃんじゃないですし」
1992 = "「Chuyện đó, em làm sao biết được. Dù có thân thiết đến mấy, em cũng đâu phải là Nagi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだな」
1884 = "「Cũng đúng nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「けど、ひとつだけ、大事なことだけはわかりました」
1628 = "「Nhưng mà, chỉ có một điều, một điều quan trọng là em hiểu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大事なこと？」
1791 = "「Điều quan trọng?」"
# monologue
# JP: ふかみが、頷く。\n澄み切ったような、とても静かな笑みをたたえて。
2722 = "Fukami gật đầu. Với một nụ cười rất bình yên, tĩnh lặng."
# 【ふかみ】
# display as 深美
# JP: 「ああ、今年なんだって。\nついに、その日が来たんだって」
1681 = "「A, chính là năm nay. Cuối cùng, ngày đó cũng đến rồi.」"
# monologue
# JP: 凪と中村選手とが、ふたたび開始線につく。\n向こうのコーチが大声で、何やら指示を飛ばしている。
2390 = "Nagi và tuyển thủ Nakamura lại đứng vào vạch xuất phát. Huấn luyện viên đối phương đang lớn tiếng chỉ đạo điều gì đó."
# monologue
# JP: ふかみは、何も指示しない。\nこちらを見た凪にむかって、大きく頷き返すだけだ。
2716 = "Fukami không chỉ đạo gì cả. Chỉ gật đầu thật mạnh đáp lại Nagi khi em ấy nhìn về phía này."
# 【双鉄】
# display as 雙鐵
# JP: 「その日、とは？」
1988 = "「Ngày đó, là sao?」"
# monologue
# JP: ふかみの瞳がほんの一瞬僕を捉えて、\nまた凪へ向く。
2727 = "Ánh mắt Fukami chỉ bắt lấy tôi trong một khoảnh khắc, rồi lại hướng về phía Nagi."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが、一番を掴み取る日。\nそうして――お姫様になる日。です！」
1777 = "「Là ngày Nagi giành lấy vị trí số một. Và――trở thành công chúa. Ạ!」"
# 【主審】
# display as 主裁判
# JP: 「はじめっ！」
# 2026 = "「開始！」" 
# 【凪】
# display as 凪
# JP: 「チェーーーーーストーーーーーーーーーーっ！！」
1691 = "「Chiyeeeeeesutoooooooooo!!」"
# 【中村】
# display as 中村
# JP: 「っ！！！」
# 1679 = "「啊！！！」" 
# monologue
# JP: 中村選手が竹刀を寝かせて、受けに回る。\n愚策――だとしか言いようもない。
2251 = "Tuyển thủ Nakamura hạ kiếm trúc xuống, chuyển sang thế phòng thủ. Chỉ có thể nói là――một hạ sách."
# monologue
# JP: （スパーーーーーーーンっ！）
2890 = "（Bốpppppppp!）"
# 【ふかみ】
# display as 深美
# JP: 「ね？」
1859 = "「Đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1865 = "「是啊」" 
# monologue
# JP: 中村選手とて、天才ではない。
2249 = "Tuyển thủ Nakamura cũng không phải là thiên tài."
# monologue
# JP: 体格の不利を補うために、小手打ち一本に技を絞って、\nそれだけを磨き続けて来た者だ。
2742 = "Để bù đắp cho sự bất lợi về thể hình, cô ấy chỉ tập trung vào một kỹ thuật đánh tay duy nhất, và không ngừng mài giũa nó."
# monologue
# JP: （ばっ！　ばっ！　ばっ！）
2883 = "（Xoạt! Xoạt! Xoạt!）"
# 【ふかみ】
# display as 深美
# JP: 「ああ――凪ちゃんっっ！！！」
1672 = "「A――Nagi!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ついにだ。やったな！」
1741 = "「Cuối cùng thì. Làm được rồi!」"
# monologue
# JP: ゆえに、その技を破られたなら、為す術が無い。
2519 = "Vì vậy, nếu kỹ thuật đó bị phá vỡ, cô ấy sẽ không còn cách nào chống đỡ."
# monologue
# JP: 凪のバイシャ流剣術もまた、同じく極めて単純な――\n暴力的なほどに突き詰めきった剣術であるがゆえ。
2404 = "Kiếm thuật phái Baisha của Nagi cũng vô cùng đơn giản―― Là một loại kiếm thuật được đẩy đến mức độ bạo lực."
# 【主審】
# display as 主裁判
# JP: 「面あり！　勝者、白、[みのかさ,1]蓑笠選手」
1843 = "「Ghi điểm mặt! Người chiến thắng, dải băng trắng, tuyển thủ Minokasa.」"
# 【ふかみ】
# display as 深美
# JP: 「やった！　やった凪ちゃん！！\nやった！　やった！！！　すごいすごいすごいっ！！」
1968 = "「Tuyệt quá! Làm được rồi Nagi ơi!! Làm được rồi! Làm được rồi!!! Giỏi quá giỏi quá giỏi quá!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1214 = "「――Ừ.」"
# monologue
# JP: 凪は、勝つと。\nその確信を持っていてなお、体が震える。
2427 = "Rằng Nagi sẽ thắng. Dù đã tin chắc như vậy, cơ thể tôi vẫn run lên."
# monologue
# JP: 何年この日を――\n望み、待ち続けたことだろう。
2822 = "Bao nhiêu năm rồi―― Tôi đã hy vọng và chờ đợi ngày này."
# 【主審】
# display as 主裁判
# JP: 「お互いに、礼」
1513 = "「Hai bên, chào nhau.」"
# 【凪】
# display as 凪＆中村
# JP: 「ありがとうございました！」\n「ありがとうございました！」
1723 = "「Cảm ơn rất nhiều!」 「Cảm ơn rất nhiều!」"
# 【凪】
# display as 凪
# JP: 「勝ったとばーーーーーいっ！！」
1654 = "「Em thắng rồi!!!!」"
# monologue
# JP: 万雷の拍手の中を、\n凪が飛ぶようにして戻ってくる。
2673 = "Giữa tiếng vỗ tay vang dội, Nagi chạy như bay trở lại."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　取って取って！！」
1764 = "「Bé Fukami! Tháo ra, tháo ra giúp em!!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！　凪ちゃん！！」
1699 = "「Ừm! Nagi!!」"
# monologue
# JP: よほど慌てているのだろう。
2381 = "Chắc em ấy đang rất vội vã."
# monologue
# JP: ふかみに手伝いをお願いし、\nむしりとるように面を外してヘアゴムをつけ――
2542 = "Nhờ Fukami giúp đỡ, tháo mặt nạ ra như giật lấy rồi buộc tóc lại――"
# 【凪】
# display as 凪
# JP: 「にーさーん！　やったばい！\nやーーーーっと一番になれたとばい！！」
1732 = "「Anh haiiii! Em làm được rồi! Cuốiiiiii cùng em cũng trở thành số một rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1698 = "「Ừm!」"
# monologue
# JP: 抱きつく凪を受け止めながら、\n心のすみで、どうしようかとも感じている。
2414 = "Đỡ lấy Nagi đang lao vào ôm chầm lấy mình, trong một góc trái tim, tôi cũng đang băn khoăn không biết phải làm sao."
# monologue
# JP: 試合前、控室に取りに行っていればよかった。\nまぁしかし、試合会場を出てからの方が――
2683 = "Đáng lẽ trước trận đấu tôi nên vào phòng chờ lấy nó. Nhưng mà, có lẽ đợi ra khỏi hội trường thi đấu thì tốt hơn――"
# 【凪】
# display as 凪
# JP: 「やーっと一番になれたけん！\nにーさん、うちたち、結婚するばい！！」
1652 = "「Cuối cùng cũng trở thành số một rồi! Anh hai, chúng ta, kết hôn thôi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1703 = "「Hả!?」"
# monologue
# JP: 虚をつかれる。\n一瞬、体が固まってしまう。
2826 = "Tôi hoàn toàn bất ngờ. Cơ thể cứng đờ trong giây lát."
# 【凪】
# display as 凪
# JP: 「って、にーさん！？\nまさか、うちと結婚するのが」
1687 = "「Ơ, anh hai!? Không lẽ, anh không muốn kết hôn với em」"
# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎だ。僕は、凪と結婚したい」
1918 = "「Rất sẵn lòng. Anh muốn kết hôn với Nagi.」"
# 【凪】
# display as 凪
# JP: 「あ！」
# 1674 = "「啊！」" 
# monologue
# JP: にかーっと、凪が笑顔に戻る。\nまるで赤ちゃんのような笑顔だ。
2386 = "Nagi lập tức nở nụ cười rạng rỡ. Một nụ cười giống hệt như một đứa trẻ sơ sinh."
# monologue
# JP: 安心と、幸福と、\nただそれだけに、凪の全身が満ち満ちている。
2383 = "Sự an tâm và niềm hạnh phúc, lấp đầy toàn bộ cơ thể Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪にプロポーズしてもらえて、\n僕も、この上なく光栄だし、幸せだ」
1527 = "「Được Nagi cầu hôn, anh cũng thấy vô cùng vinh dự và hạnh phúc.」"
# 【凪】
# display as 凪
# JP: 「ならよかったばい！」
2008 = "「Vậy thì tốt quá rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ただ――何年も何年も待ち続けてきた今日のこの日だ。\nムードを整え、僕の方から、凪にプロポーズしたかった」
1499 = "「Chỉ là――anh đã chờ đợi ngày hôm nay suốt bao nhiêu năm rồi. Anh muốn chuẩn bị một bầu không khí thật lãng mạn, rồi chính anh sẽ là người cầu hôn Nagi cơ.」"
# 【凪】
# display as 凪
# JP: 「はうううっ！？」
1693 = "「Hauuu!?」"
# monologue
# JP: 凪がぽーっと赤くなる。\n実に、かわいい。
2409 = "Nagi đỏ bừng mặt. Thật sự rất đáng yêu."
# 【凪】
# display as 凪
# JP: 「なら――やったら――\nええとっ、やりなおっ」
2018 = "「Nếu vậy――thì―― À ừm, làm lại nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「やりなおすのか？　僕としては――\n凪からのプロポーズをなかったことにしてしまうのは」
1957 = "「Làm lại sao? Anh thì―― không muốn coi như lời cầu hôn của Nagi chưa từng xảy ra đâu.」"
# 【凪】
# display as 凪
# JP: 「あああ！　イヤばい！！　うちも、プロポーズ！\nずっとずうっと、したかったけん！！」
1675 = "「Aaa! Không chịu đâu!! Em cũng muốn cầu hôn! Em đã muốn làm thế từ rất lâu, rất lâu rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。僕も、今のプロポーズを失くしたくない。\nゆえ、続けよう」
1869 = "「Đúng vậy nhỉ. Anh cũng không muốn đánh mất lời cầu hôn vừa rồi. Nên chúng ta tiếp tục nhé.」"
# 【凪】
# display as 凪
# JP: 「続けるって？」
1932 = "「Tiếp tục là sao?」"
# monologue
# JP: きょとん、と小首が傾げられる。\nよくもまぁ、これだけ素直に育てるものだ。
2400 = "Em ấy ngơ ngác nghiêng đầu. Sao lại có thể nuôi dạy một cô bé ngoan ngoãn đến thế này cơ chứ."
# monologue
# JP: 感動に近い愛情が、ふつふつふつふつ湧き出してきて、\n僕の全身を凪への想いで染め抜いていく。
2607 = "Một tình yêu gần như là sự cảm động đang sục sôi tuôn trào, nhuộm thắm toàn thân tôi bằng những suy nghĩ về Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは、その小手を外してくれるか？」
1570 = "「Trước tiên, em tháo đôi găng tay bảo hộ đó ra được không?」"
# 【凪】
# display as 凪
# JP: 「あ！　はい！　はい！！　ばい！！」
1676 = "「A! Vâng! Vâng!!」"
# monologue
# JP: 凪がもぞもぞ、小手を外す。\nまずは左手――そうして右手。
2398 = "Nagi lúi húi tháo găng tay bảo hộ. Đầu tiên là tay trái――sau đó là tay phải."
# 【双鉄】
# display as 雙鐵
# JP: 「いい子だな。凪は」
1923 = "「Nagi ngoan lắm.」"
# monologue
# JP: 僕もゆっくり、手をのばす。
2618 = "Tôi cũng từ từ vươn tay ra."
# monologue
# JP: ちょんちょこりんを止めている、\n凪のヘアゴムを外してしまう。
2638 = "Tôi tháo sợi dây chun đang buộc túm tóc của Nagi ra."
# 【凪】
# display as 凪
# JP: 「ひあっ！？　にーさん、なんばしよっと？」
1630 = "「Hya!? Anh hai, anh làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、プロポーズだといっている。\n本物は、ロッカーにしまってあるので、今は代理だ」
2019 = "「Anh đã bảo là cầu hôn mà. Hàng thật anh cất trong tủ đồ rồi, nên giờ dùng tạm cái này thay thế nhé.」"
# monologue
# JP: 左手を取る。\nさすがに凪も、わかってくれる。
2635 = "Tôi nắm lấy tay trái của em ấy. Đến nước này thì Nagi cũng đã hiểu."
# monologue
# JP: 頬の赤みがいや増して、\nその顔が、しあわせいっぱいに笑み崩れる。
2548 = "Đôi má em ấy càng thêm ửng đỏ, khuôn mặt vỡ òa trong nụ cười ngập tràn hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「僕と――結婚してください」
1961 = "「Xin em――hãy kết hôn với anh.」"
# monologue
# JP: ヘアゴムを、凪の薬指へと絡める。
2630 = "Tôi quấn sợi dây chun vào ngón áp út của Nagi."
# monologue
# JP: 凪はにこにこを溢れさせたまま、\nぐーぱーと、左手を握り、また開く。
2385 = "Nagi vẫn giữ nụ cười rạng rỡ, nắm tay trái lại rồi mở ra, như đang chơi trò oẳn tù tì."
# 【凪】
# display as 凪
# JP: 「こぎゃんとウチらしか婚約指輪、他になかばい！」
1899 = "「Không có chiếc nhẫn đính hôn nào hợp với em hơn chiếc này đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういわれると、本物の婚約指輪の立場が無い。\n僕なりに、懸命に選んだものなのだがな」
1546 = "「Em nói thế thì chiếc nhẫn đính hôn thật biết để đâu cho được. Anh cũng đã cất công chọn lựa kỹ lưỡng lắm đấy.」"
# 【凪】
# display as 凪
# JP: 「そっちは、ウチひとりのものじゃなかけんね。\nいっとー、『ウチららしか』婚約指輪ばい！」
2003 = "「Chiếc nhẫn đó, đâu phải chỉ của riêng mình em. Đây mới là chiếc nhẫn đính hôn 『đậm chất chúng ta』 nhất!」"
# 【凪】
# display as 凪
# JP: 「（ちゅっ！！）」
2038 = "「（Chụt!!）」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1674 = "「啊！」" 
# monologue
# JP: 実に凪らしい一瞬のキス。\nけれども、どうしようもなく甘いキス。
2388 = "Một nụ hôn chớp nhoáng rất mang phong cách Nagi. Nhưng lại là một nụ hôn ngọt ngào đến vô cùng."
# monologue
# JP: 素早く軽く、\n小鳥が木の実をついばみパッと飛び去るような。
2821 = "Nhanh nhẹn và phớt nhẹ, giống như một chú chim nhỏ mổ lấy quả mọng rồi vụt bay đi."
# 【凪】
# display as 凪
# JP: 「ふ……うふふっ！　うふふふふふふっ！」
1707 = "「Phư...... ufufu! Ufufufufufu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　凪」
1532 = "「Sao thế? Nagi.」"
# 【凪】
# display as 凪
# JP: 「やっと、やーっとわかったとばい！\nうちが一番ほしかった一番が、これだった、って」
1998 = "「Cuối cùng, cuối cùng em cũng hiểu rồi! Vị trí số một mà em mong muốn nhất, chính là cái này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1702 = "「Hửm?」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！」
1762 = "「Bé Fukami!」"
# monologue
# JP: 凪が、大声で親友を呼ぶ。
2394 = "Nagi gọi to người bạn thân của mình."
# 【凪】
# display as 凪
# JP: 「ありがと！　大好き！！！」
1962 = "「Cảm ơn chị! Em yêu chị nhất!!!」"
# monologue
# JP: ふかみが、少しびっくりしたような顔になる。\nいや――泣いているのか？
2733 = "Fukami có vẻ hơi ngạc nhiên. Không――em ấy đang khóc sao?"
# monologue
# JP: くしゃくしゃの顔が、笑顔に代わる。\nくしゃくしゃで、素晴らしく晴れやかで綺麗な笑顔に。
2432 = "Khuôn mặt nhăn nhó chuyển thành một nụ cười. Một nụ cười nhăn nhó, nhưng rạng rỡ và xinh đẹp tuyệt vời."
# 【ふかみ】
# display as 深美
# JP: 「わたしこそ――ありがとう！\n大好き凪ちゃん！　だいだいだーいすき！！」
1959 = "「Chị mới là người phải nói――cảm ơn em! Chị yêu Nagi nhất! Yêu em nhiều nhiều lắmmm!!」"
# 【凪】
# display as 凪
# JP: 「えへへー」
1708 = "「Ehehe~」"
# monologue
# JP: そうして、凪は僕を見る。\n至近距離から、真正面から、大きな瞳で僕を見る。
2676 = "Rồi Nagi nhìn tôi. Từ khoảng cách rất gần, nhìn thẳng vào tôi bằng đôi mắt to tròn."
# 【凪】
# display as 凪
# JP: 「ウチ、喜んで結婚するとばい！\nウチは今から、右田双鉄のおくさんばい！！」
1647 = "「Em rất sẵn lòng kết hôn với anh! Từ bây giờ, em là vợ của Migita Soutetsu rồi nhé!!」"
# 【ふかみ】
# display as 深美
# JP: 「おめでとう！　凪ちゃん！！」
1799 = "「Chúc mừng em! Nagi!!」"
# monologue
# JP: ふかみの祝福。
2729 = "Lời chúc phúc của Fukami."
# monologue
# JP: （パチパチパチパチっ！！！）
2881 = "（Bốp bốp bốp bốp!!!）"
# monologue
# JP: 次いで拍手と祝福が、\n観客席から降ってくる。
2677 = "Tiếp đó là những tràng pháo tay và lời chúc mừng, dội xuống từ khán đài."
# 【ハチロク】
# display as 八六
# JP: 「おめでとうございます！　双鉄さま、凪！」
2027 = "「Chúc mừng hai người! Ngài Soutetsu, Nagi!」"
# 【日々姫】
# display as 日日姬
# JP: 「おめでと！　にぃにも凪も、かっこいい！！！」
1803 = "「Chúc mừng! Cả anh hai và Nagi đều ngầu quá đi!!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「おめでとうございます！\n新婚旅行のプラン、わたしにも相談してくださいね！」
1801 = "「Chúc mừng hai bạn! Nhớ bàn bạc kế hoạch tuần trăng mật với tôi nữa nhé!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふ～！　おふたりとも、おめでとうですよぉ」
1706 = "「Ufufu~! Chúc mừng cả hai người nha~」"
# 【真闇】
# display as 真闇
# JP: 「呑まんね。双ちゃん。今夜は家族――\nなーちゃんもいれた、うちら家族で」
1769 = "「Uống thôi nào. Sou-chan. Tối nay gia đình ta―― cả Na-chan nữa, gia đình chúng ta sẽ cùng ăn mừng.」"
# 【稀咲】
# display as 稀咲
# JP: 「おめでとう。見ていていつもヒヤヒヤしたけど。\nこの結末なら、とても素敵だ」
1798 = "「Chúc mừng nhé. Dù lúc nào nhìn hai người tôi cũng thấy thót tim. Nhưng cái kết này thì thật tuyệt vời.」"
# monologue
# JP: 声、声、声。\n蓑笠さんから、堰さんたちから、みかん鉄道のみんなから。
2740 = "Những tiếng nói, tiếng nói, tiếng nói. Từ chú Minokasa, từ bác Seki, từ mọi người ở Đường sắt Mikan."
# monologue
# JP: ざんざめく祝福の中、\n僕は、凪の手をにぎる。
2528 = "Giữa những lời chúc phúc rộn ràng, tôi nắm lấy tay Nagi."
# 【凪】
# display as 凪
# JP: 「どぎゃんすると？　にーさん」
1839 = "「Chúng ta làm gì tiếp theo đây? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それを決めるのは、いつでも凪さ」
1892 = "「Người quyết định điều đó, lúc nào cũng là Nagi mà.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと？　ならね――そんならねー！\n全国大会でも優勝して！　そしたら、それから！」
1876 = "「Vậy sao? Thế thì――thế thì nhé! Em sẽ vô địch cả giải toàn quốc! Rồi sau đó, sau đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1685 = "「啊？！」" 
# monologue
# JP: 凪がいきなり、僕の頭を掻き抱く。\nそうしてこっそり、耳元にささやきかけてくる。
2408 = "Nagi bất ngờ ôm chầm lấy đầu tôi. Rồi thì thầm vào tai tôi."
# 【凪】
# display as 凪
# JP: 「そしたら、ね？　ウチ――おかあさんになりたかと。\nにーさんの赤ちゃん、欲しかとばい！！」
1913 = "「Sau đó, nhé? Em――muốn làm mẹ. Em muốn có em bé của anh hai!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 1698 = "「嗯！」" 
# monologue
# JP: 凪を思いきり抱きしめて、僕の方からキスをする。\n途端、実感がこみ上げてくる。
2648 = "Tôi ôm chặt Nagi vào lòng và chủ động hôn em ấy. Ngay lập tức, một cảm giác chân thực trào dâng trong tôi."
# monologue
# JP: （ああ――僕も）
2879 = "（A――mình cũng vậy）"
# monologue
# JP: ようやく、この手に出来たのだ。
2656 = "Cuối cùng, mình cũng có được trong tay."
# monologue
# JP: 一番ほしい、一番を。
2501 = "Điều mình khao khát nhất, vị trí số một."
