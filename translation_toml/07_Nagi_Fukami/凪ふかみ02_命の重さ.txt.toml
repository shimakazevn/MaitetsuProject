1399 = "「她在給深美打電話。想問問這麼大的風雨，漂流船那邊要不要緊」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1320 = "「啊！」" 

# 【凪】
# display as 凪
# JP: 「わかった！　ほんならまた後で！」
1285 = "「咱知道咧！那咱們一會見！」" 

# monologue
# JP: 丁度、凪が電話を終える。\n終えるやいなやで、グイグイ僕に詰め寄ってくる。
2115 = "正好凪也打完了電話。剛一掛掉她就馬上跑到我的身邊。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、困っとるみたいばい。\nにーさんも、手助けに向かうばい！　向かえると？」
1422 = "「小深那邊現在好像有點麻煩。大哥哥你也快一起去幫忙吧！ 好嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――」
1334 = "「嗯——」" 

# monologue
# JP: 目線を向ければそれだけで、\nハチロクはすぐ答えてくれる。
2031 = "我剛把視線轉向八六，她就很快回答道：" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの方は大丈夫です。\n[この子,3]8620にも、幸いにして異状はございませんでしたので」
1448 = "「我不要緊。[這孩子,3]８６２０幸好也沒什麼異常」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、あとのことを？」
1486 = "「是嗎，那這邊接下來就？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、お任せください」
1346 = "「嗯，就交給我吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であれば、すまんがよろしく頼む。\nということだ。僕はいつでも――」
1544 = "「真抱歉，那就交給你了。就是這樣，我隨時都可以——」" 

# monologue
# JP: 言い切らぬうち、凪は僕の手を掴み強く引く。
2065 = "我話還沒說完，凪就用力拽起了我的手。" 

# 【凪】
# display as 凪
# JP: 「なら、行くばいっ！」
1605 = "「那咱們快走吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「すみません、車も出せずに」
1415 = "「對不起，都沒讓車來接你們」" 

# monologue
# JP: 恐縮しきりといった風情で、ふかみが深々と頭を下げる。\nハチロクが言ったとおりに、合羽さえ役に立たない風雨。
2146 = "深美滿臉過意不去地深深低頭道歉。這風雨正如八六所說的，連雨衣都完全派不上用場。" 

# monologue
# JP: ナビもさすがに退避している。\n僕も凪も、移動しただけでずぶ濡れだ。が――
2290 = "連Ｎａｖｉ都躲到安全的地方去了。我和凪也只是走了幾步就被淋得透濕。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「何を言う。車が無いのは、\n[せき]堰さんたちが、今日も\x%l保線;#00ffc040;保線%l;#;をしてくれたからじゃないか」
1595 = "「這是哪裡的話。沒有車也是因為堰先生他們今天也在進行\\x%l保線;#00ffc040;巡線%l;#;工作不是嗎」" 

# monologue
# JP: 車はすでに、僕らのために動いてくれた。
2285 = "這車已經在為我們而開了。" 

# monologue
# JP: ふかみの祖父とそのご兄弟、堰さんたちの\x%l保線;#00ffc040;保線%l;#;のおかげで、\n\x%l8620;#00ffc040;8620%l;#;も\x%lキハ07;#00ffc040;キハ07%l;#;も、今日も運行できたのだ。
2299 = "都是多虧了深美的爺爺和他的兄弟，堰先生他們的\\x%l保線;#00ffc040;巡線%l;#;工作，\\x%l8620;#00ffc040;８６２０%l;#;和\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;才能在今天也順利地開行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この天気の中でよく……むしろ、お礼を伝えたいのだが、\n堰さんたちは、まだ？」
1371 = "「在這種天氣裡還出去……反而應該是我向他們道謝呢。堰先生他們還沒回來嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。そのまま向かって――\n今、[ゆのい,1]湯医の発船場で舟を[あ]揚げてます」
1343 = "「嗯，他們完工後直接到湯醫的發船點去了——現在正在那邊把船搬到陸地上」" 

# 【凪】
# display as 凪
# JP: 「なら、こっちの舟は、\nこの三人で避難させなきゃマズかとね？」
1615 = "「那這邊的船就得靠咱們三個搬到安全的地方了吧？」" 

# monologue
# JP: 凪の言葉に、ようやくふかみの硬さがやわらぐ。
2230 = "聽到凪的話，深美僵直的身體終於放鬆了下來。" 

# 【ふかみ】
# display as 深美
# JP: 「そうなの。一人じゃどうしようもないから……\n来てくれて、ほんと助かったの。ありがとう」
1480 = "「是啊。我一個人的話完全束手無策……你們來真是幫了大忙了。謝謝」" 

# 【凪】
# display as 凪
# JP: 「何をいまさら。水臭かよ、ふかみちゃん」
1537 = "「現在還說這幹什麼。小深你太見外了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。僕らは仲間ではないか」
1484 = "「是啊，我們不是朋友嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「はい……ですけど、やっぱり、ありがとうございます」
1336 = "「嗯……但是我還是想說謝謝」" 

# monologue
# JP: 深々と頭をさげられたなら、僕もどうにも水臭いように、\n少しじれったいように感じてしまう。
1967 = "她深深地低頭致謝，讓我也不由覺得有些見外，還有一絲焦急。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――まぁ、ともかく動き出そう」
1179 = "「不——唔，總之先開始行動吧」" 

# monologue
# JP: 実際のところ、この発船場内も“水臭い”。
1819 = "不過實際上，這個泊船場裡確實瀰漫著一股水的氣味。" 

# monologue
# JP: 川の臭いが迫り上がり、締め切られている室内にまで、\nどこからか忍び入り漂っている。
2123 = "河水的氣味往這邊逼近，不知從哪裡鑽入了這個門窗緊閉的室內。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これ以上天候が崩れんうちに、急いで――」
1365 = "「在天氣還沒有變得更壞以前，趕緊——」" 

# 【ふかみ】
# display as 深美
# JP: 「ダメです！　段取りをしてからじゃないと。\n濁流の音で、会話もできなくなっちゃいますから」
1187 = "「不行！要先做好計劃才行。濁流的聲音會把說話的聲音都蓋掉的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1315 = "「啊——」" 

# monologue
# JP: ふかみの言葉に、自分が焦っていたと知る。\n屋根のあるホームでも、会話しづらかった程の暴風雨だ。
2229 = "聽了深美的話我才知道自己太著急了。這暴風雨可是猛烈到在有屋頂的站台上都不太聽得清楚說話聲。" 

# monologue
# JP: それにさらされての作業となれば、\n確かに事前に打ち合せねば、右往左往をするだけとなろう。
2205 = "確實，要在這種暴風雨裡作業，不事先商量好到時候可就要抓瞎了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した。ならば、手順を説明してくれ」
1453 = "「我知道了。那請你說明一下怎麼操作吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。お爺ちゃんたちがいないから、重機は使えません。\nだから、舟は人力で引き揚げます」
1338 = "「嗯。現在爺爺他們不在，用不了重型機械。所以我們要用人力把船拉上岸」" 

# 【凪】
# display as 凪
# JP: 「人力でって、そぎゃんこと出来っと？」
1633 = "「靠人力能行不啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「うん。コロを用意してあるから」
1353 = "「嗯，這裡有準備著滾木」" 

# monologue
# JP: ふかみの指差す背後には、\n小さな丸太が何本も重ねられている。
2144 = "深美指向我們的背後，那裡疊著好幾節不太大的圓木。" 

# 【凪】
# display as 凪
# JP: 「コロって、何ね？　そん木切れがコロ？」
1527 = "「滾木是什麼啊？那些木頭就是滾木嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。学園で習わなかったか？\nピラミッドの石を運ぶのにも使われたものだと」
1489 = "「是的。你沒在學校學過嗎？據說金字塔的石塊就是靠它們運的」" 

# monologue
# JP: ふかみは頷き、凪はふるふる首を振る。\n同級生であるはずなのだが、知らぬとなれば仕方ない。
2156 = "深美點點頭，凪則是拚命地搖頭。雖然她們是同一個年級的，但既然不知道也沒辦法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「運びたい物の下側にコロを入れ、動かす。\n後ろのコロが出てきたら、また前に差し込む」
1472 = "「把滾木弄到想要搬運的物體的下面，然後滾動。後面的滾木出來之後，再塞到前面」" 

# monologue
# JP: 簡単な図を描いて説明すれば、\n凪はその目をキラキラさせる。
2053 = "我畫了個簡單的圖說明著，凪的眼神大放光彩。" 

# 【凪】
# display as 凪
# JP: 「なるほど、これなら簡単に運べそうとね！\n面白そうばい！　やってみたかと！」
1251 = "「原來如此，這樣搬起來就輕鬆多咧！真好玩兒！咱也想試試咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「大丈夫。イヤになるくらいやれるから。\n具体的には、[ろくそう,1]六槽分」
1510 = "「沒事，回頭讓你徹底弄個夠。具體數目是六艘」" 

# 【双鉄】
# display as 雙鐵
# JP: 「階段わきのスロープを使ってあげるのだよな。\nしかし、階段まではどうやって――」
1247 = "「到時候是用樓梯旁的斜坡把它們搬上去吧。但是，要怎麼把它們搬到樓梯邊上——」" 

# 【ふかみ】
# display as 深美
# JP: 「川の水位があがってますから。\n階段の下の方はもう、水の中です」
1536 = "「現在河水的水位漲起來了，樓梯下方已經都是水了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1635 = "「！」" 

# monologue
# JP: 普段の川面は、船着場の足場まででも、\n舟一艘分の高さまるまる、下にある。
1997 = "平常的河面離這泊船場的平台還有一艘船多高的距離。" 

# monologue
# JP: 足場から階段までのアプローチにも傾斜があるから、\n水面が……恐らく二メートル以上上昇している。
2223 = "而且平台和樓梯之間的這塊地方也有點坡度。水面……恐怕已經上升了兩公尺多了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまで切迫してるのか」
1548 = "「竟然這麼緊迫了嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「ですから、わたしが舟に乗って、誘導します。\nそしたら凪ちゃんがコロを挟んで、双鉄さんが引く」
1464 = "「所以我去船上引導你們，小凪去塞滾木，雙鐵先生你來拉」" 

# monologue
# JP: あらかじめ準備していたのだろう、整頓されたいい案だ。\nが――
1839 = "估計這個方案早就事先準備好了吧，非常有條理。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだと、\n舟に乗るまでは、川の中を歩くことにならんか？」
1613 = "「那要上船不就得涉水下河了嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「[ともづな,1]艫綱を[つた]伝えますから、行けます。\n命綱ももちろんつけますし」
1268 = "「只要順著船尾纜繩爬過去就能上船。而且我當然也會繫安全繩的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「危険だ。ふかみの負担が大きすぎる」
1397 = "「太危險了，深美的負擔太重了」" 

# monologue
# JP: 階段のところまで水が来ているということは、\n踏ん張れる足場があるということでもある。
2095 = "既然水還只是漲到樓梯這裡，那就說明還是有可以落腳的地方的。" 

# monologue
# JP: 操船するしかないのなら、ふかみに任せる他無いが、\nその条件なら、手で舟を動かしてしまえばいい。
2252 = "要是只能駕船的話，那當然只有交給深美了，但現在這個條件，只要用手推船就可以了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ともづな,1]艫綱で舟を引っ張り足場まで運び、\nそうして僕が、下から押しあげてやるほうが――」
1538 = "「用船尾纜繩拉著船到平台那裡，然後我從下面推船這樣更——」" 

# 【凪】
# display as 深美＆凪
# JP: 『「自殺行為です」\n「そりゃあ無理ばい」』
1653 = "『「這是自殺」\\n「那樣根本不行嘛」』" 

# monologue
# JP: 即時の否定。\nふかみだけでなく、凪からも。
2209 = "立刻被否定了。不光是深美，凪也一口拒絕。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故無理なのだ」
1528 = "「為什麼不行」" 

# 【ふかみ】
# display as 深美
# JP: 「１００％、バランスを崩すからです」
1363 = "「因為你１００％會失去平衡的」" 

# 【凪】
# display as 凪
# JP: 「流れに足ばすくわれっばい」
1555 = "「腳會被水流沖得站不穩的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪やふかみの体重ならば、\n簡単に流されてしまおうが――」
1194 = "「不，如果是凪和深美的體重確實會被輕易地沖走——」" 

# 【ふかみ】
# display as 深美
# JP: 「体重とかの問題じゃないです」
1184 = "「不是體重什麼的問題啦」" 

# 【凪】
# display as 凪
# JP: 「運動神経の問題でもなか。もっと水量の少なかときでも、\n簡単にころんころん流されてしまいよるけん」
1201 = "「也不是運動神經的問題咧。就算是水量少很多的時候，也會輕易就摔倒被沖走咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、凪がか？」
1631 = "「難道你以前試過？」" 

# monologue
# JP: 反射神経やバランス感覚などを見るなら、\n僕より凪は、間違いなくよほど優れてる。
1858 = "光看反射神經和平衡感的話，凪當然比我要優秀得多。" 

# monologue
# JP: その凪をしてころころ流されるなどの事態など、\n想像するのも難しいのだが……
2286 = "連凪都會輕易地摔倒被沖走，這種事態真難想像……" 

# 【凪】
# display as 凪
# JP: 「そうばい。だけじゃなくて、\nふかみちゃんも、ふかみちゃんのじいちゃん達もばい」
1492 = "「是的。而且還不只是咱，小深和小深她爺爺他們也是這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「専門家でもか」
1598 = "「連專家都會這樣嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「水量が極端に減った時には、航路を確保するために、\n川の中に入っていって、岩をどける作業をするんです」
1367 = "「在水量減到極少的時候，為了確保航路我們會走進河裡進行清除岩石的作業」" 

# monologue
# JP: ベテランだろうが体力や運動神経に優れていようが、\nその最中には、誰もが転んで流される――
1985 = "就算是老手也好還是體力和運動神經多優秀也好，在那時候都會摔倒被沖走——" 

# monologue
# JP: 川に入った状態で力をかけるということが、\nいかに危険で難しいのか――ふかみは冷静な説明を重ねる。
1940 = "在河裡做用力的動作有多麼危險和困難——深美冷靜地說明了起來。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、川の中で作業するとき。\n体力とか運動神経とかは、安全を保証してくれません」
1465 = "「所以說，在河裡作業的時候，體力或者是運動神經之類的是保證不了你的安全的」" 

# monologue
# JP: 言い切って。ふかみはずるりと、\n頑丈そうなロープを引っ張り出してくる。
1970 = "她說完，邊哧溜地拉出了一根看起來很結實的繩索。" 

# 【ふかみ】
# display as 深美
# JP: 「命綱がついた状態で、逆らわず流されて助けを待てる。\nそれが出来ない人に、川の中での力仕事は無理です」
1369 = "「在繫著安全繩的狀態下，別反抗水流，靜靜地等待救助。如果做不到就不能在河裡幹力氣活」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1546 = "「知道了」" 

# monologue
# JP: 僕が川の中に入って足を滑らせ流されたのなら、\n間違いなくパニックを起こしてしまおう。
2062 = "我要是進到河裡腳下一滑被沖走的話，肯定會陷入混亂狀態的。" 

# monologue
# JP: そして、陸にいるのがふかみ、凪なら、\nその僕を、命綱で引き上げることもまた困難だ。
2227 = "而且，在陸地上的人要是深美和凪的話，要用安全繩把我拉上去也是很困難的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、ふかみが川でコロへと舟を誘導する。\n凪がコロを移動させ、僕がゆっくり引き上げていく」
1610 = "「那深美就在河裡把船導向滾木那邊。然後凪移動滾木，我慢慢把船拉上去」" 

# 【ふかみ】
# display as 深美
# JP: 「はい、それでお願いします。\nあと、簡単な手信号を」
1355 = "「嗯，那就拜託了。還有我教你們一些手勢信號」" 

# monologue
# JP: ハンドサインを教えてもらって練習し、\n胴長靴と救命胴衣とレインウェアを装備する。
1963 = "她教了我們之後我又練習了幾遍，然後穿上套靴、救生衣、和雨衣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よし――いつでも大丈夫だ」
1402 = "「好——隨時都可以出發了」" 

# 【ふかみ】
# display as 深美
# JP: 「なら、いきましょう」
1609 = "「那我們就走吧」" 

# monologue
# JP: ふかみの声は、いつに無く強い。\n普段はまとわりついてる、遠慮の響きが消えている。
2149 = "深美的聲音顯得比以往任何時候都有力。平時圍繞在她身上的那種畏縮的氣場消失了。" 

# 【ふかみ】
# display as 深美
# JP: 「一にも二にも、安全に。\n危ないと思ったら、自分の体を最優先にしてください」
1552 = "「總之就是要安全，不分什麼第一第二。要是覺得可能有危險，請最優先保證自己的身體」" 

# monologue
# JP: （ごおおおっ！）
2383 = "（轟！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1637 = "「！？」" 

# monologue
# JP: 暴風に、息が一瞬詰まってしまう。\n動かずにいても体が浮き上がりそうになる。
2112 = "暴風讓呼吸都為之一滯。即便只是站在原地，身體也似乎隨時會被吹起來一樣。" 

# monologue
# JP: 雨は真横からぶつかって来て、\nはっきりとした痛みに変わる。
2314 = "雨從側面直撲過來，旋即轉化為清晰的痛感。" 

# monologue
# JP: （これ――は）
2389 = "（這——是）" 

# monologue
# JP: 反射で閉じた瞼をあげれば、クマ川がある。\n水嵩を大きく増して、せり上がってくる。
2057 = "我睜開反射性地閉上的眼睛，隈河就近在眼前。水位已經增高了許多，並且還在繼續上升。" 

# monologue
# JP: 船着場のコンクリどころか、\n艫綱をつなぐ杭の先さえ、今にも水に呑まれそうだ。
1911 = "別說是泊船場的混凝土平台了，就連牽著船尾纜繩的鐵樁也快被水吞沒了。" 

# monologue
# JP: （ごウッ！）
# 2383 = "（轟！）" 

# 【凪】
# display as 凪
# JP: 「わ。わっ！？」
1289 = "「哇，哇！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1636 = "「！！」" 

# monologue
# JP: コロ用の小さな丸太を持ち抱えた凪が、\n突風に大きく煽られる。
2085 = "抱著充當滾木的小圓木的凪被一陣疾風吹得左搖右晃。" 

# monologue
# JP: 慌てて体を支えてやって、耳の直ぐ側で声を出す。
2039 = "我慌忙用身體撐住她，在她耳朵邊說道：" 

# 【双鉄】
# display as 雙鐵
# JP: 「――這うようにしてっ、運んでいこう！」
958 = "「——先壓低身體再走吧！」" 

# monologue
# JP: その口にさえ、すぐに雨粒が飛び込んで来る。
1989 = "就連說這短短一句話的時間都有雨滴飛進嘴巴。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これでは――地上でも転びかねない」
1185 = "「不然的話——就算是站在地上也可能會摔倒的」" 

# 【凪】
# display as 凪
# JP: 「わ、わかったばい！」
1288 = "「咱，咱知道了！」" 

# monologue
# JP: 体を畳んだ凪の上、覆いかぶさるようにして、\n僕の体を、凪の雨除け、風避けにする。
2051 = "我用自己的身體遮住縮成一團的凪，為她擋著風雨。" 

# monologue
# JP: 密着すれば、僕への風雨もいくらか和らぐ。\nあるいは地面そのものも、風を防いでいるかも知れん。
1937 = "和她緊緊貼住的話，吹向我的風雨也緩和了不少。又或者是地面自身在擋著風吧。" 

# 【凪】
# display as 凪
# JP: 「んっ！　……この辺でっ、良か、と？」
1309 = "「唔！……在這附近行嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、な。あまり水面に近づけすぎると、\nコロまで呑まれてしまいかねん」
1216 = "「估計夠了。要是離水面太近，連滾木自身都會被水給吞沒的」" 

# monologue
# JP: 階段の一段にいくつもいくつも置き石をして、\n簡単な堰を作って、その内側にコロを置く。
2028 = "我們在樓梯的其中一階上放了好多石頭搭成一個簡易垻，然後在垻的內側放好滾木。" 

# 【凪】
# display as 凪
# JP: 「全部でいくつ、持ってくっと？」
1553 = "「總共要拿幾根過去啊？」" 

# monologue
# JP: コロの個数が多いほど、引き上げる僕の負担は減る。\nが、コロの移動の回数が増え、凪の負担と危険とが増す。
2165 = "滾木的根數越多，我拉的時候負擔也就越少。但滾木的移動次數就要多了，凪的負擔和危險會增加。" 

# monologue
# JP: ならばぎりぎり――最低限の個数に絞っておくべきだ。
2294 = "那就應該儘量減少——控制在最低限的根數。" 

# 【双鉄】
# display as 雙鐵
# JP: 「６個……いや、５個でいい。\n４つで使って――ひとつが、予備だ」
1641 = "「６根……不，５根就行了。用其中４根——１根備用」" 

# 【凪】
# display as 凪
# JP: 「わかったばい！」
1283 = "「咱知道咧！」" 

# monologue
# JP: 戻りは風に押されてしまう。\nつんのめりそうになる体に、妙な笑いがこみ上げてくる。
2274 = "返回的時候就像被風推著一樣。被風吹得要向前倒去的身體不知為何讓我笑了出來。" 

# monologue
# JP: そうして再び、コロを抱えて階段へと。\n二度目というのに全く慣れず、雨が痛くて仕方ない。
2175 = "然後再次抱著滾木往樓梯走。明明是第二次了可還是完全不習慣，雨打得人生痛。" 

# 【凪】
# display as 凪
# JP: 「これ、で――良かとっ！」
1591 = "「這、樣——就行了！」" 

# monologue
# JP: コロの準備を整えて、\n凪はライトを点灯させて、大きな大きな輪を描く。
2091 = "擺完了滾木，凪打開了燈，然後畫出一個大大的圓圈。" 

# monologue
# JP: 水面ギリギリに立っていたふかみはそれを見て、\n慎重に、川の中へと踏み入っていく。
2212 = "站在水邊的深美看到這個手勢，便慎重地緩緩向河裡走去。" 

# monologue
# JP: （命綱は……大丈夫だな）
2371 = "（安全繩……沒問題吧）" 

# monologue
# JP: ふかみの腰と、階段上の手すりにしっかり、固定されてる。\nだからといって、安心できる光景ではない。
1974 = "安全繩牢牢地固定在深美的腰上和樓梯的扶手上。但是也不能就這樣高枕無憂。" 

# monologue
# JP: ゴウと音を立て風が泣く度、\nふかみの体はぐらぐら揺れる。
2117 = "每當狂風吼叫一次，深美的身體就被吹得晃來晃去。" 

# 【凪】
# display as 凪
# JP: 「っ――ひどか、川たい」
961 = "「——河流太急了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1339 = "「嗯」" 

# monologue
# JP: 異物までもが時折り混じる濁り淀んだ濁流を、\n艫綱の先、木の葉のように揺れる舟へとふかみは近寄る。
1943 = "在渾濁不堪，有時還漂浮著些異物的濁流中，深美正朝著船尾纜繩另一端宛如樹葉般飄搖的船前進。" 

# monologue
# JP: いつもの軽やかさを捨てて、安全性を最優先で、\nふかみは船べりに体ごと、べたり張り付かせるようにする。
1961 = "她放棄了平時輕巧的動作，以最優先考慮安全的姿態，試著整個人貼在船的側邊上。" 

# 【凪】
# display as 凪
# JP: 「乗ったばい！」
1176 = "「上去啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1405 = "「好！」" 

# monologue
# JP: ふかみが櫂に手をかけて、\n空いている手でハンドサインを送ってくる。
2142 = "深美把手伸向櫓，然後用另一隻空著的手發出手勢信號。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やるぞ、凪！」
1444 = "「成功了，凪！」" 

# 【凪】
# display as 凪
# JP: 「わかっとるばい！」
1282 = "「咱明白！」" 

# monologue
# JP: ふかみが乗った舟の艫綱に、\n更に綱をかけ、階段の手すりの一番上に固定する。
2029 = "我們把深美乘的那艘船的船尾纜繩再綁上一根纜繩，並固定在樓梯扶手的最上方。" 

# monologue
# JP: そしてじり、じり――\n全身の力を込めて、艫綱をひたすらに引き込んでいく。
2176 = "然後用力地——用盡全身的力氣拚命往回拉。" 

# 【凪】
# display as 凪
# JP: 「こりゃ……キツかばいっ」
1590 = "「這……可真重啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理をするなよ。足を滑らせないようにしろ」
1244 = "「別太勉強了。小心腳下打滑」" 

# monologue
# JP: コンクリ製の階段を足場にしていても、\n雨風だけで、バランスを崩されそうになる。
1987 = "就算有混凝土樓梯可以下腳，這風雨還是會很容易就讓人失去平衡。" 

# monologue
# JP: 流れの中に入って舟を押し上げる――\nさきほどの自分の提案が、妄言だったと思い知る。
2049 = "我現在才體會到剛才自己提議的，要進入河中把船推上來是多麼地不可理喻。" 

# 【凪】
# display as 凪
# JP: 「ふかみ、ちゃん――さすが、ばいっ」
1420 = "「小深——真有你的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1339 = "「嗯」" 

# monologue
# JP: 船上の方が地上より、よほど安定して立っている。
1969 = "她站在船上比站在地上要穩得多了。" 

# monologue
# JP: この荒れ狂う濁流の中、引っ張る力そのままに、\n舟はこちらへと近づいてくる。
1947 = "在這咆哮奔騰著的濁流中，小船正一點一點被我們的力量往這邊拉近。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うまいぞ――そうだ――その調子っ」
1191 = "「不錯——很好——就是這樣」" 

# monologue
# JP: 弓のようにたわむ櫂一本で、乱れに乱れる川の流れと、\nふかみは見事に、折り合っている。
2134 = "深美只用一根彎得像弓一樣的櫓駕馭著這波濤洶湧的水流。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪、コロについてくれ。\nふかみが――来るっ」
1243 = "「凪，快準備滾木，深美要——來了」" 

# 【凪】
# display as 凪
# JP: 「了解ばいっ！」
# 1283 = "「咱知道咧！」" 

# monologue
# JP: （こつんっ）
2365 = "（嗵）" 

# monologue
# JP: 舳先が、コンクリの階段に当たる。
2243 = "船頭碰到了混凝土的樓梯。" 

# monologue
# JP: ふかみはすぐさま舟から飛び降り身をかがめ、\nコロを差し出す凪の反対側へと収まる。
2138 = "深美很快從船上跳下來蹲在遞出滾木的凪的反方向。" 

# 【凪】
# display as 凪
# JP: 「今ばいっ！」
1425 = "「就是現在！」" 

# 【ふかみ】
# display as 深美
# JP: 「お願いします！」
1474 = "「拜託了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1635 = "「！」" 

# monologue
# JP: ぐ、と強烈な手応えがくる。\n階段ゆえに、後ろ向きには引きづらい。
2083 = "手感很重。因為這裡是樓梯，背向的話很難拉。" 

# monologue
# JP: 肩にロープを担ぐようにし、\n舟と川を背に、ゆっくり進む。
2043 = "我把繩子扛在肩上，背對著船和河流，緩緩向上走去。" 

# monologue
# JP: （くっ）
2357 = "（吱）" 

# monologue
# JP: 瞬時、抵抗が一気に薄れる。
2206 = "突然間，阻力一下子變小了很多。" 

# monologue
# JP: コロの上へと、舟が乗っかってくれたのだ。
1957 = "她們把船搬到了滾木上了。" 

# monologue
# JP: （これは――なんだ、楽勝じゃないか。\n凄いな、古代の知恵というのは）
2388 = "（這——什麼嘛，不是很輕鬆嗎。古代的智慧可真厲害啊）" 

# monologue
# JP: これならば、様子を見ながら対応できる。
2284 = "這樣的話，就可以邊觀察情況邊對應了。" 

# monologue
# JP: ロープを脇から通すようにして腰にまき、\n180度転回し、凪とふかみの様子を見つつ、舟を引く。
2042 = "我把繩子從腋下穿過，卷在腰上，然後轉身１８０度，邊觀望著凪和深美的樣子，邊拉著船。" 

# monologue
# JP: （くっ――くっ――くっ――）
2356 = "（吱——吱——吱——）" 

# monologue
# JP: 一段、一段。慎重に階段を登っていく。
1803 = "一階、一階。我小心地登著樓梯。" 

# monologue
# JP: 凪とふかみはコロを次々移動させ、\n舟にスロープを登らせていく。
1892 = "凪和深美接連移動著滾木，讓船可以順坡而上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
# 1405 = "「好！」" 

# monologue
# JP: スロープ全てを登りきり、\n舟を平地で安定させる。
2178 = "爬完斜坡後，把小船固定在平地上。" 

# monologue
# JP: これで、一槽。\n残りは五槽。
2217 = "終於搬完一艘了。還剩五艘。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さん、次、行けますか」
1629 = "「雙鐵先生，我們去搬下一艘吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ、凪は？」
1541 = "「當然了，凪呢？」" 

# 【凪】
# display as 凪
# JP: 「任せろばい！！」
1205 = "「交給咱吧！」" 

# monologue
# JP: アドレナリンが出ているのだろう、\nあれほど激しく感じた疲労が、今はほとんど消えている。
1813 = "不知道是不是因為身體分泌了不少腎上腺素，剛才感到的嚴重疲勞感現在幾乎完全消失了。" 

# monologue
# JP: この状態が続くうち、作業を終わらせきるしかない――\nみなが、それを理解している。
1931 = "只要風雨還是這麼激烈，就必須完成所有的作業——大家都理解這一點。" 

# 【ふかみ】
# display as 深美
# JP: 「なら、行きます！」
1618 = "「那，我去了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気をつけろよ！」
1564 = "「要小心！」" 

# monologue
# JP: ……風雨は、少しも緩んでこない。
953 = "……風雨一點也沒有減弱。" 

# monologue
# JP: 慣れるほど作業は楽になるはずなのに、\n一槽、また一槽と引くごとに、体は鈍く重くなる。
2101 = "明明越習慣應該越輕鬆的，但每搬完一艘，身體就覺得越遲鈍越沉重。" 

# monologue
# JP: （なんだ？　手袋が――滑り始めてきているのか）
2374 = "（怎麼了？手套——開始打滑了嗎）" 

# monologue
# JP: あまりの負荷に、伸びが発生したのだろうか。\nブカブカ感で、力を上手く伝えられない。
2102 = "是不是負荷太重導致手套被拉長了。感覺手套鬆鬆垮垮的，無法順利用力。" 

# monologue
# JP: 内部にも、汗と雨とが溜まってしまい、ひどく蒸れ、\n油断をすればズルリといってしまいそうだ。
2224 = "而且手套內部也積了好多汗水和雨水，又十分悶熱，要是一個不當心似乎就會滑脫出去。" 

# monologue
# JP: （だが――あと一槽だ）
2346 = "（不過——還剩一艘）" 

# monologue
# JP: ふかみが舟を寄せてくれれば、\n艫綱を引いて、それでおしまい。
1929 = "只要深美把船撐過來，再一拉船尾纜繩，就結束了。" 

# monologue
# JP: 気合を入れなおす意味も込め、\n手袋の中の水を捨て、指をぎゅっぎゅと伸ばし直す。
2072 = "我重新打起精神，把手套中的水倒掉，然後用力伸縮了幾下手指。" 

# monologue
# JP: （うん。随分、マシになった気がする）
2363 = "（嗯，感覺好多了）" 

# monologue
# JP: 顔をあげなおし、ふと気づく。\nもう長いこと、声を聞かない。
2074 = "我重新抬起頭，突然注意到，已經有很長時間沒聽見聲音了。" 

# monologue
# JP: みな一様に黙りこみ、\n作業を終える瞬間だけを待ちわび――っ！？
2308 = "難道是大家都默契地不發聲，埋頭等著作業結束的時刻——！？" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんっ！！！」
1423 = "「小深！！」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！？」
# 1637 = "「！？」" 

# monologue
# JP: 流木かっ！？\n黒い何かが
2107 = "是流木嗎！？一個黑色的物體漂了過來。" 

# monologue
# JP: ふかみは舟を押し逃し、けれど反動でバランスをっ――
2152 = "深美試圖把船推開，可反作用力讓她失去了平衡——" 

# 【双鉄】
# display as 雙鐵
# JP: 「いかんっ！！」
1180 = "「不好！！」" 

# monologue
# JP: とっさに、命綱へと飛びつく！\n体全部で覆いかぶさりっ――
2059 = "我立刻撲向安全繩！用整個身體壓住它——" 

# monologue
# JP: （ぐんっ！！！！！）
2382 = "（轟！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1320 = "「啊！」" 

# monologue
# JP: 力を完全に抜いたのか、\nあるいは、気絶してるのか――
2104 = "是完全沒力氣了嗎，還是昏過去了——" 

# monologue
# JP: 一杯に伸びた命綱は、\n舟のそれとは比較にならぬ、強烈な荷重に暴れてもがく！
1841 = "伸長到極限的安全繩受到和之前船的重量完全不一樣的力量，猛地掙動起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！！」
1644 = "「～～～～！！」" 

# monologue
# JP: 焦げたような臭いを感じる。\n川の中へ引き込む力が、僕まで連れて行こうとする。
2060 = "我聞到了好像是燒焦的味道。往河中拉的力量彷彿要把我也一起拉進去。" 

# monologue
# JP: ――この手の中で、生と死がせめぎ合ってる。\nあの日の記憶がわきあがってきて、体を震わす。
932 = "——生與死就在我的手中較量著。那一天的記憶從我的心底裡泛起，讓我渾身發抖。" 

# monologue
# JP: （路、子――）
2380 = "（路、子——）" 

# monologue
# JP: あの日の僕は、あまりに小さく弱かった。\n路子の生と僕の生、両方を掴んでおけないほどに。
2292 = "那一天的我實在是太弱小了。弱小到無法同時抓住路子和我的生命。" 

# 【凪】
# display as 凪
# JP: 「にーさんっ！」
1387 = "「大哥哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1508 = "「沒事的」" 

# monologue
# JP: （ぐっ――）
2378 = "（用力）" 

# monologue
# JP: 万が一にも放さないよう、\n僕の体に命綱をまきつけてから、引き寄せ始める。
2170 = "為了就算有個萬一我也不至於鬆開繩子，我把安全繩纏在我身上，然後開始拉。" 

# monologue
# JP: 素早く、けれど慎重に。\n力を入れ過ぎないように、手を滑らせたりしないよう。
2272 = "迅速，但又慎重地拉著。小心別太過用力，也別讓手打滑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、大丈夫」
1509 = "「沒事的，沒事的」" 

# monologue
# JP: 川に入ってふかみの体を一刻も早く保護したい。\nが、そうしてしまえば、僕まで流される他にない。
2037 = "我很想立即衝下河救出深美。但若真這樣做，也只會讓我自己也被沖走。" 

# monologue
# JP: だから、自分に何度も何度も言い聞かせ、\n手にある重みを手放さぬよう、それだけを心に刻み込む。
2081 = "所以，我只能反覆勸說著自己，讓自己牢記絕不能放開手中的這份重量。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。今度は、絶対――」
1507 = "「沒事的。這次一定——」" 

# monologue
# JP: ふかみの重さを。命の重さを――\nこの手の中から、離さない。
2041 = "我手中深美的體重，生命之重——這次我絕不會鬆手。" 

# monologue
# JP: (ぴちょんっ――）
32 = "(波紋聲——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1318 = "「啊…」" 

# monologue
# JP: 湯船に落ちた波紋を見れば、\n水というものを、不思議に思う。
2192 = "看著落在浴池裡的波紋，讓我覺得水這個東西真是不可思議。" 

# monologue
# JP: ついさっきまであれほど激しく僕らを叩き打ちのめし、\nだけれど今は、温かに包み、癒してくれる――
1914 = "剛才還這麼激烈地虐打著我的水，現在卻溫暖地包裹著我，治癒著我——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……生き返る気分とは、このことか」
973 = "「……活過來的感覺，就是這樣的啊」" 

# monologue
# JP: その言葉さえ、意識をせずには喉から出せない。\n体があまりに疲れきり、息を吐くのもおっくうだ。が――
2288 = "連這句話都需要刻意用力才能說出來。我的身體實在是太過疲勞，光是呼氣都快吃不消了。不過——" 

# 【凪】
# display as 凪
# JP: 「にーさん、にーさん、背中流してあげるばい！」
1388 = "「大哥哥，大哥哥，咱來給你擦背吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃん。わたしがするから。\n双鉄さん、わたしの命の恩人なんだから」
1549 = "「等等啊，小凪，我來擦吧。雙鐵先生可是我的救命恩人呢」" 

# monologue
# JP: ……凪とふかみはハイテンションだ。\n疲れはあるに決まっているのに、全くそれを感じさせない。
945 = "……凪和深美都很情緒高漲嘛。她們明明也很疲勞了，可表面上卻看不出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はしゃがず、休め。\n明日おそらく、ひどいことになってしまうぞ」
1403 = "「好啦別鬧了，好好休息。明天恐怕情況會非常糟的」" 

# 【ふかみ】
# display as 深美
# JP: 「はい、お背中流したらのんびりします」
1349 = "「嗯，幫你擦完背我就休息」" 

# 【凪】
# display as 凪
# JP: 「にーさん、かーっこ良かったけんっ！\n映画の主役みたいやったと」
1384 = "「大哥哥你剛才太帥了！就跟電影裡的男主角一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1177 = "「不——」" 

# monologue
# JP: 実際、極めて危ない状況だったことは確かだ。\nゆえに、やむを得ないことかもしれんが――
1983 = "實際上，剛才的狀況確實極其危險。所以，我可能也是不得不那麼做——" 

# monologue
# JP: ふかみだけでなく凪までが、\n命の危機からの脱出に、酔ったみたいになっている。
2181 = "現在不只是深美，連凪都沉醉於剛才那個英雄救美的情節裡了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕など、なにもしてないさ。ふかみの命を救ったのは、\nふかみ自身の準備の良さと経験だ」
1452 = "「我什麼也沒做啊。深美得救是她準備充分和經驗豐富的功勞」" 

# 【ふかみ】
# display as 深美
# JP: 「いいえ！　双鉄さんが引き寄せてくれたから、\nわたし、今、こんなに元気でいられるんです」
1183 = "「不是的！都是靠雙鐵先生拉我，我才能這麼有精神地站在這裡」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　あのままなら、体ば冷えきって危ないし、\nまた流木やら、ぶつかってきよったかもしれんもん」
1495 = "「是的！要是一直那樣的話就會得超危險的低體溫症，還有可能被流木撞上呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ」
969 = "「……嗯」" 

# monologue
# JP: ふかみも凪も、夢見るように、瞳をキラキラさせている。
2136 = "深美和凪都像在幻想什麼一樣兩眼放光。" 

# 【ふかみ】
# display as 深美
# JP: 「迷いなく、すぐに行動してくれたから、\nわたし、助けてもらえたんです」
1621 = "「都是因為你毫不猶豫的行動才讓我得救了」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　男の中の男にしか出来んことばい！」
1493 = "「是的！只有男人中的男人才做得到咧！」" 

# monologue
# JP: ……男ではない凪だって、僕とおんなじことをした。
942 = "……不過就算不是男人的凪也和我做了一樣的事。" 

# monologue
# JP: 僕に数秒も遅れることなく、\n命綱に取り付き、一緒になって引っ張った。
1964 = "她沒比我晚幾秒也拉住了安全繩，和我一起往後拉。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、わたし、少しでも恩返ししたいんです」
1469 = "「所以，我想至少要報一點恩」" 

# 【凪】
# display as 凪
# JP: 「にーさん、背中流させるばいっ！」
1392 = "「大哥哥，讓咱幫你擦背吧！」" 

# monologue
# JP: ……千切れんばかりに尻尾を振っている子犬に\n体の周りをぐるぐる回られているようだ。
951 = "……簡直就像身邊有兩條搖著尾巴的小狗繞著我的身體轉個不停一樣。" 

# monologue
# JP: 何を話してどう宥めても、これを鎮めることは出来まい。\n鎮めるためには散歩か遊びか、要求を満たしてやるのみだ。
1816 = "不管我說什麼，怎麼撫慰，怕也無法使其平靜下來吧。恐怕得帶去散步或是陪著玩之類，滿足了要求才行。" 

# monologue
# JP: （ざばあっ）
2367 = "（嘩啦）" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならばよろしく頼む」
1457 = "「我知道了，那就拜託了」" 

# 【凪】
# display as 凪
# JP: 「頼まれるばい！」
1561 = "「被拜託咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「だから、凪ちゃん、わたしの命の恩人だから」
1462 = "「所以啊小凪，他可是我的救命恩人啊」" 

# 【凪】
# display as 凪
# JP: 「こっちにだって、親友の命の恩人ばい」
1277 = "「咱也是啊，他是咱的好朋友的救命恩人咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、仲良くしてくれ。\nお前たちふたりに争われては、僕がつらい」
1345 = "「嗯，你們要好好相處啊。要是你們兩個吵起來，我會很難過的」" 

# 【ふかみ】
# display as 凪＆深美
# JP: 『「！」\n「！」』
1657 = "『「！」\\n「！」』" 

# monologue
# JP: ふたりそろっていきなり黙る。\n黙って、じっと見つめ合う。
1861 = "兩人瞬間一起陷入沉默，面面相覷。" 

# 【ふかみ】
# display as 凪＆深美
# JP: 『「双鉄さんは」\n「にーさんは」』
1655 = "『「雙鐵先生你」\\n「大哥哥你」』" 

# monologue
# JP: ふたりの声が重なって。\nめずらしく、ふかみの方が言葉をつなぐ。
1860 = "兩人的聲音重疊在一起。很少見地，這次是深美把話說了下去。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは……えと、その方がいい、です、か？\nふたり、なかよく――いっしょの方、が」
1627 = "「雙鐵先生……唔，那樣更好嗎？兩個人友友愛愛地——一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだとも」
1540 = "「當然了」" 

# 【ふかみ】
# display as 深美
# JP: 「わかりました」
1455 = "「我知道了」" 

# monologue
# JP: 言って、頷き――\nけれどもふかみは、そこで惑って止まってしまう。
2153 = "深美說著點了點頭——但又略顯迷茫地停了下來。" 

# 【ふかみ】
# display as 深美
# JP: 「えっと……凪ちゃん。どうしよっか？」
1306 = "「唔……小凪，怎麼辦呢？」" 

# 【凪】
# display as 凪
# JP: 「仲良くばい？　そしたら――\nそうばい！　半分こしてあらうばい」
1253 = "「友友愛愛的嗎？那就——對咧！兩個人一人洗一半」" 

# 【ふかみ】
# display as 深美
# JP: 「は、はんぶんこっ！？」
1173 = "「一、一人洗一半！？」" 

# monologue
# JP: ボっと、ふかみが赤くなる。
2151 = "深美的臉一下子變得通紅。" 

# monologue
# JP: なぜかは知らねど目をうるませて、\nちらちら、僕の方を見る。
1811 = "不知為什麼她開始眼淚汪汪地三不五時朝我這邊張望。" 

# 【ふかみ】
# display as 深美
# JP: 「ええと……半分こ……って……\n凪ちゃん……どっちの、半分がいい――の？」
1304 = "「唔……一人一半……那小凪……你要哪一半……呢？」" 

# 【凪】
# display as 凪
# JP: 「どっちでもよかとよ？\n右でん、左でん」
1279 = "「咱哪邊都可以哦？右邊也行左邊也行」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ！　ああ！　そうね、半分――\n半分……うん。右半身と、左半身」
1321 = "「啊！啊啊！是啊，一半……一半。唔。右半身和左半身」" 

# 【凪】
# display as 凪
# JP: 「ん？　他にどぎゃん半分があっと？」
1357 = "「嗯？還有什麼別的分一半的方法嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「無い無い。無いよ？　それじゃ、ええと……\nわたし、右半分のお背中洗うね？」
1512 = "「沒有沒有。沒有哦？那麼，唔……我就洗右半邊的身子了？」" 

# 【凪】
# display as 凪
# JP: 「なら、左ばもらうたいっ！」
1607 = "「那咱就要左邊了！」" 

# monologue
# JP: 二人それぞれ、あかすりを手に、\n仲良く石鹸を泡だてる。
1956 = "她們各自拿了一塊絲瓜瓤，和睦地打上肥皂泡沫。" 

# 【ふかみ】
# display as 深美
# JP: 「それじゃ……ええと……洗います、ね？」
1616 = "「那麼……唔……我要洗囉？」" 

# monologue
# JP: （シニュッ）
2362 = "（唰）" 

# 【凪】
# display as 凪
# JP: 「洗うばーい！　ごしごしするばーい！」
1524 = "「洗囉！刷刷囉！」" 

# monologue
# JP: （ゴシイッ！）
2368 = "（嚓嚓！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1358 = "「噢——」" 

# monologue
# JP: これは、なんとも奇妙なものだ。
2283 = "這可真是奇妙啊。" 

# monologue
# JP: なまじふたりの息が合い、\nタオルを動かすリズムが全くおんなじだから――
1850 = "偏偏兩人的節奏恰好相同，連擦毛巾的節奏都一樣——" 

# 【ふかみ】
# display as 深美
# JP: 「かゆいとこ、とか……あったら、言ってくださいね？\nあの――コスって、ほしい、ところ、とか」
1565 = "「要是有感覺癢的地方……就說哦。那個——想要刷刷的地方，之類的」" 

# monologue
# JP: （シニュっ――シュッ――シュルっ――シュキュっ）
2359 = "（咻——咻——咻——咻）" 

# 【凪】
# display as 凪
# JP: 「痛かったらいうばい！　特別にゆるめてあげるばい！」
1567 = "「要是痛就說咧！咱會特別弄輕一點的！」" 

# monologue
# JP: （ごしっ！　ばりっ！　がりっ！　ごりっ！）
2375 = "（擦！擦！擦！擦！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおおおお」
1359 = "「噢噢噢」" 

# monologue
# JP: ――右半分は、ゆるゆると、絹の薄物でなぜられるよう。\n左半分はガリゴリと、木綿のサラシでしごかれるよう。
930 = "——右半邊就像被輕飄飄的薄絹衣物摩擦著的感覺。左半邊則像被棉布用力捋著的樣子。" 

# monologue
# JP: まったく違う感触たちに背中を蹂躙されて、\nなんとも奇妙な気分にされて――けれども、実に心地よい。
2236 = "背部被完全不同的兩種感覺蹂躪著，總讓人覺得很奇妙——不過又確實很舒服。" 

# 【ふかみ】
# display as 深美
# JP: 「あれ？　ん？　この――汚れっ――よいしょっ」
1296 = "「哎？唔？這塊——汙漬——嘿喲」" 

# 【凪】
# display as 凪
# JP: 「にーさん、汚れ落ちなかとよー！\nいくらなんでも、汚しすぎばい！」
1395 = "「大哥哥，這塊汙漬擦不掉！不管怎麼樣也太髒了吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕方なかろう。石炭汚れを落とさぬままに、\n川の汚れまで付けたのだ」
1592 = "「這也沒辦法啊。剛才還沒擦掉煤灰就又染上了河裡的髒東西」" 

# monologue
# JP: だからわざわざ雨の中、\n登呂流湯までやってきたのだ。
2078 = "所以才特地在這大下雨天還跑到登呂流浴場來了。" 

# monologue
# JP: ……ふかみを送って凪を送っての帰宅のことを考えたなら、\nいささか憂鬱を感じもするが。
940 = "……一想到之後還要送深美和凪回家，我心裡不禁泛起了一絲憂鬱。" 

# 【ふかみ】
# display as 深美
# JP: 「え？　あれ……これ――汚れじゃ、ない？　の？」
1298 = "「哎？那……這個——不是汙漬，嗎？」" 

# 【凪】
# display as 凪
# JP: 「あ、ほんとばい。にーさん、肌が……\n肌荒れ？　しとーと？」
1329 = "「啊，真的咧。大哥哥，你的皮膚……是這裡特別粗糙嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　――ああ、それか」
1313 = "「唔？——啊，那塊啊」" 

# monologue
# JP: 背中を流してくれるものなどは、日々姫かハチロク、\n事情を知ってるものだけだから、うっかりしていた。
1823 = "之前給我搓背的是日日姬和八六，她們倆都知道事情原委，所以我都忘了。" 

# monologue
# JP: そういえばまだこの二人には、\n僕の過去のことを話してなかったか。
2266 = "說起來，我還沒有對她們兩個說過我過去的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、皮膚の移植のあとだ。\n過去に、ケガをしたことがあってな」
1597 = "「這是植皮的疤痕。我過去曾經受過傷」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1274 = "「呃！？」" 

# 【凪】
# display as 凪
# JP: 「ケガ……って」
1267 = "「受傷……是怎麼回事啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最高の病院につれていってもらったそうだからな。\n上手だろう。注意して見ねば、ほとんどわからん」
1461 = "「我那時被帶到最好的醫院去了。他們技術不錯吧。只要不是刻意去看根本看不出來」" 

# 【ふかみ】
# display as 深美
# JP: 「ん――」
1303 = "「唔——」" 

# monologue
# JP: （ざばあっ！）
2366 = "（嘩啦！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1291 = "「哎喲」" 

# monologue
# JP: 湯をかけられて、\nつるりとした感触に肌を滑られる。
2250 = "被潑了一盆熱水，感覺皮膚光滑多了。" 

# monologue
# JP: 凪のぷりっとした指が、僕の傷跡をなぞってる。
1896 = "凪用她富有彈性的指頭沿著我的傷痕摸著。" 

# 【凪】
# display as 凪
# JP: 「ケガって――こぎゃんと、広かとを？」
1266 = "「受傷——這麼大面積的傷嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。鉄道事故でな。\n死んでもおかしくなかったそうだ」
1350 = "「嗯，是鐵路事故。那傷嚴重得就算死了也不奇怪」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　鉄道、事故――ですか？」
1293 = "「哎！？鐵路、事故——嗎？」" 

# 【凪】
# display as 凪
# JP: 「い、いつのこと……ばい？」
1500 = "「是，是什麼時候的事……咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「小さな頃だ。今の凪とふかみより、\nもっと幼かったころ――」
1488 = "「是我小時候的事。比現在的凪和深美還要小的時候——」" 

# monologue
# JP: 湯のせいか、疲れのせいか、\n背中を流す泡が同時に、何かを流してくれたのか。
1810 = "不知是熱水的原因，還是疲勞的原因，又或者是清洗背部的肥皂泡還同時清洗掉了某種東西的原因。" 

# monologue
# JP: おどろくほどに穏やかに、\n過去を、事故を、僕はふたりに、話せてる。
2070 = "我這次竟然極其平靜地向她們兩個述說起過去的事故來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――と、いうわけで僕は右田の養子となった。\nそして、御一夜にやってきたのだ」
960 = "「——就是這樣，我就成了右田家的養子。而後就來了御一夜」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんに……そんなことが――」
1628 = "「雙鐵先生……竟然有這樣的過去——」" 

# 【凪】
# display as 凪
# JP: 「じゃっけん、にーさんはあんまり……」
1468 = "「所以，大哥哥你才會不怎麼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1314 = "「唔？」" 

# monologue
# JP: 珍しく、凪が言いかけて口をつぐむ。
1893 = "凪少見地說了一半又把話咽了下去。" 

# monologue
# JP: 言葉を探しあぐねてるようで、\nこちらがやきもきさせられる。
1959 = "她好像是在斟酌著該說什麼似的，反而吊起了我的胃口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　聞きたいことがあるなら、答えるぞ？」
1435 = "「怎麼了？要是你有什麼想問的，我都可以回答」" 

# 【凪】
# display as 凪
# JP: 「にーさんは、じゃけん……\nあんまり、笑ったり、怒ったり――泣いたり、せんと？」
1391 = "「大哥哥，所以你才會……不怎麼愛笑愛生氣——愛哭吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！」
1419 = "「小凪！」" 

# monologue
# JP: 慌てたようなふかみの言葉が、\n凪の言葉をかえって鋭く際立てる。
2140 = "深美慌慌張張地阻止她道。但卻反而讓凪的話聽起來更尖銳了。" 

# monologue
# JP: ああ、そうか――\nあまり自覚はなかったが……
1939 = "啊，是這樣啊——我自己一直沒有怎麼覺得……" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、泣かんな。怒ることもまず無いか。\n笑うのは……そこそこ笑ってはいると思うが――」
971 = "「……我確實沒怎麼哭過，也沒怎麼生氣過。笑……倒是還經常笑的——」" 

# 【ふかみ】
# display as 深美
# JP: 「…………え、と」
968 = "「……哎，唔」" 

# 【凪】
# display as 凪
# JP: 「よし！　決めたばいふかみちゃん！」
1407 = "「好！小深，咱決定了！」" 

# 【ふかみ】
# display as 深美
# JP: 「え！？　ちょ、凪ちゃんっ！？」
1292 = "「哎！？喂，小凪！？」" 

# monologue
# JP: (ザバンっ！！）
31 = "(啪擦！！）" 

# monologue
# JP: 凪は猛烈な勢いで、\n自分自身に頭の先から、湯おけに掬った湯をかける。
1900 = "凪迅雷不及掩耳地把盛在水桶裡的一桶熱水從自己頭上澆下。" 

# 【凪】
# display as 凪
# JP: 「恩返しばい！　ふかみちゃんとふたりで、\nにーさんに泣いたり笑ったり怒ったりさせたげるばい」
1286 = "「咱要報恩！咱要和小深兩個人一起讓大哥哥你哭起來笑起來生氣起來咧」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　いい！　それ、すごくいいっ！」
1323 = "「啊！太好了！這個點子超級棒！」" 

# monologue
# JP: 言って、慌ててふかみは両手で口を押さえる。\n押さえたままでもごもごと、ごく控えめに問いかけてくる。
2132 = "深美剛說完，就慌慌張張地用兩手捂住嘴巴。她邊捂著邊小心翼翼地向我問道：" 

# 【ふかみ】
# display as 深美
# JP: 「もちろん、あの……双鉄さんが……迷惑だったり、\nいやじゃなかったり――だったら、ですけど」
1542 = "「當然，前提是……雙鐵先生……不覺得會添麻煩，也沒有覺得不願意，的情況下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「イヤでも迷惑でも無いぞ。大歓迎だ」
1511 = "「沒有不願意，也不會添麻煩。我很歡迎」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1320 = "「啊！」" 

# 【凪】
# display as 凪
# JP: 「やったばーい！」
1398 = "「太好咧！」" 

# monologue
# JP: 何がそんなに嬉しいのか、\nふかみと凪は手をとりあって、満面の笑顔を浮かべてる。
1815 = "不知道是什麼讓她們這麼高興，深美和凪手拉著手，滿面笑容。" 

# monologue
# JP: そんな姿を見ていると、\nうらやましい、と、心のどこかが、また思う。
2190 = "看到她們這高興的樣子，我心裡不禁又湧出了羨慕的想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「泣いたり、笑ったり、怒ったりか――」
1301 = "「哭起來，笑起來，生氣起來啊——」" 

# monologue
# JP: 忘れてるなら、思い出したい。\n素直に思う。
2092 = "既然已經忘記了，那就把它回憶起來，這樣單純的想法湧上我的心頭。" 

# monologue
# JP: 凪とふかみと一緒なら、\nそう出来そうにも、感じてる。
2063 = "我覺得只要凪和深美在一起，說不定就可以實現。" 
