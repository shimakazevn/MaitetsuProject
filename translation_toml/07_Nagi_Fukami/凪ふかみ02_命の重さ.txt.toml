# lines: 419 
# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車ありがとうございました」
1440 = "「Cảm ơn quý khách đã lên tàu.」"
# monologue
# JP: 自分の声さえ聞き取りづらい。
2287 = "Ngay cả giọng nói của bản thân cũng khó mà nghe rõ."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%lブラスト;#00ffc040;ブラスト%l;#;音をかき消すほどの激しい風雨が、\n御一夜駅のホームを叩き、洗ってる。
2168 = "Trận cuồng phong bão táp dữ dội lấn át cả tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#; của \\x%l8620;#00ffc040;8620%l;#;, đang trút xuống và gột rửa sân ga Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車、ありがとうございました」
# 1440 = "「感謝各位搭乘本次列車」" 
# monologue
# JP: バーベキュー\x%l列車;#00ffc040;列車%l;#;の乗務においてはもちろんのこと、\n訓練時にさえ、これほどの悪天候は経験してない。
1948 = "Trong lúc làm nhiệm vụ trên \\x%l列車;#00ffc040;chuyến tàu%l;#; BBQ thì không nói làm gì, nhưng ngay cả trong lúc huấn luyện, tôi cũng chưa từng trải qua thời tiết khắc nghiệt đến thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車、ありがとうございました」
# 1440 = "「感謝各位搭乘本次列車」" 
# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;から出てきたお客様たちは、みないちように、\n雨のベールに一瞬止まり、ひどくギョっとした顔をする。
2000 = "Những hành khách bước ra từ \\x%l客車;#00ffc040;toa hành khách%l;#;, ai nấy đều khựng lại một giây trước màn mưa, khuôn mặt lộ rõ vẻ sửng sốt."
# monologue
# JP: 乗車中には肉を焼く煙と音と歓声で、\n外の天気に恐らくは、意識がいかなかったのだろう。
1913 = "Trong lúc ngồi trên tàu, với khói thịt nướng, tiếng xèo xèo và tiếng cười nói, có lẽ họ đã không để ý đến thời tiết bên ngoài."
# monologue
# JP: （台風接近の予報はあったが――\nこれほど一気に天候が崩れてしまうとはな）
2390 = "（Mặc dù đã có dự báo bão đang đến gần—— Nhưng không ngờ thời tiết lại xấu đi đột ngột đến mức này.）"
# monologue
# JP: 美術の特別講座のために、\n折悪しく登園している日々姫のことが、ふと気にかかる。
2047 = "Tôi chợt lo lắng cho Hibiki, con bé không may lại đến trường tham gia khóa học mỹ thuật đặc biệt vào lúc này."
# monologue
# JP: （最悪、学園の合宿所に泊まってくると言っていたが……\nこの天候なら、そうした方が安全だろうな）
2369 = "（Con bé bảo nếu tình hình tệ nhất sẽ ngủ lại ở khu ký túc xá của trường... Với thời tiết này, làm vậy chắc sẽ an toàn hơn.）"
# monologue
# JP: ならば、日々姫は大丈夫。\n思い直して、改札に集中しなおす。
2296 = "Nếu vậy thì Hibiki không sao rồi. Nghĩ lại, tôi tập trung vào việc soát vé."
# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車、ありがとうございました――ん？」
1441 = "「Cảm ơn quý khách đã lên tàu——hửm?」"
# monologue
# JP: なんだ。\n下車した親子連れの子供さんが……
1832 = "Gì đây.\nĐứa trẻ của gia đình vừa xuống tàu..."
# monologue
# JP: ニコニコこちらの方を見て、バイバイと手まで振りだした。\nガラでもないが、手を振り返さないわけにもいかん。
1838 = "Đang mỉm cười nhìn về phía này, thậm chí còn vẫy tay chào tạm biệt. Dù không hợp với tính cách của mình lắm, nhưng cũng không thể không vẫy tay chào lại được."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、\nどうぞ、お気をつけてお帰りください」
1575 = "「Cảm ơn em,\nđi đường cẩn thận nhé.」"
# 【凪】
# display as 凪
# JP: 「ありがとばーい」
1574 = "「Cảm ơn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1635 = "「!」"
# monologue
# JP: 耳元、いきなり凪の声。
2055 = "Giọng của Nagi đột ngột vang lên bên tai."
# monologue
# JP: 振り向けばキャブの窓から顔を出し、\n大きく大きく手を振っている。
2035 = "Ngoảnh lại thì thấy con bé đang thò mặt ra khỏi cửa sổ buồng lái, vẫy tay thật lớn."
# monologue
# JP: （なるほど、凪に手を振っていたのか）
2352 = "（Ra là vậy, đứa bé đang vẫy tay với Nagi à.）"
# monologue
# JP: 動物に人気があるのは日々姫・れいなあたりだが、\n小さな子たちの絶大な人気を集めるのは、なぜだか凪だ。
2099 = "Người được động vật yêu mến là Hibiki và Reina, nhưng không hiểu sao Nagi lại thu hút được sự yêu thích tuyệt đối từ những đứa trẻ nhỏ."
# monologue
# JP: 親御さんに手をひかれつつ、三歩ごとお子さんは振り返り、\n何度も何度も、名残惜しそうに空いている手を振り続ける。
2247 = "Vừa được bố mẹ dắt tay, đứa bé cứ ba bước lại ngoái đầu nhìn lại một lần, liên tục vẫy bàn tay còn trống với vẻ đầy lưu luyến."
# monologue
# JP: （キャブ内と\x%l客車;#00ffc040;客車%l;#;内だ。恐らく初顔合わせだろうに……\nいやはや、大した好かれっぷりだ）
2350 = "（Một người trong buồng lái, một người trong \\x%l客車;#00ffc040;toa hành khách%l;#;. Có lẽ đây là lần đầu tiên họ gặp nhau... Chà chà, được yêu thích đến mức này cơ à.）"
# monologue
# JP: 凪にそちらの応対を任せ、\n僕は振ってた手を下ろし、検札作業を再開する。
2021 = "Giao việc đáp lại đứa bé cho Nagi, tôi hạ tay xuống, tiếp tục công việc soát vé."
# 【双鉄】
# display as 雙鐵
# JP: 「……ありがとうございました。――っと」
977 = "「...Cảm ơn quý khách. ——Rồi.」"
# 【凪】
# display as 凪
# JP: 「終わりばい？」
1409 = "「Xong rồi hả?」"
# monologue
# JP: キャブから下りて来た凪が、\n\x%l客車;#00ffc040;客車%l;#;を覗いて問いかけてくる。
2002 = "Nagi bước xuống từ buồng lái, nhìn vào trong \\x%l客車;#00ffc040;toa hành khách%l;#; rồi hỏi tôi."
# monologue
# JP: 僕もならって再確認し、\n言わずもがなの答えを付け足す。
2025 = "Tôi cũng bắt chước nhìn lại để xác nhận, và đưa ra câu trả lời hiển nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。全員ご下車くださった」
1341 = "「Ừm. Tất cả hành khách đã xuống hết rồi.」"
# monologue
# JP: ホームからはもう、あの親子連れの姿も消えている。\n普段なら列をなす記念撮影も全く見えない。
2289 = "Trên sân ga, bóng dáng gia đình nọ cũng đã khuất dạng. Khung cảnh xếp hàng chụp ảnh kỷ niệm như mọi khi cũng hoàn toàn không thấy đâu."
# monologue
# JP: こうも天候が崩れては、誰しもがやはり、\n一刻も早く安全な屋内へと、向かいたくなるものらしい。
1951 = "Thời tiết xấu thế này, quả nhiên ai cũng muốn nhanh chóng trở về nơi an toàn trong nhà."
# 【凪】
# display as 凪
# JP: 「で？\nどぎゃんしてにーさんが切符受け取っとったと？」
1619 = "「Vậy?\nSao anh hai lại là người thu vé thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、足回りの点検にすっ飛んでいった」
1234 = "「Hachiroku đã bay đi kiểm tra hệ thống treo rồi.」"
# 【凪】
# display as 凪
# JP: 「それは見とったばい。\x%l手ブレーキ;#00ffc040;手ブレーキ%l;#;かかったらすぐ、\nおっきい方の体に取替えとったし」
1593 = "「Cái đó thì em thấy rồi á. Ngay khi kéo \\x%l手ブレーキ;#00ffc040;phanh tay%l;#; xong, chị ấy đã đổi sang cơ thể lớn hơn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットもホームの安全確認を終えてすぐ、\n僕に検札を頼んでレールショップに戻ってしまった」
1520 = "「Paulette cũng vừa xác nhận an toàn trên sân ga xong, đã nhờ anh soát vé rồi quay lại Cửa hàng Đường sắt mất tiêu.」"
# monologue
# JP: 言った途端に、凪は驚いた顔をする。
1899 = "Vừa nghe xong, Nagi liền tỏ vẻ ngạc nhiên."
# 【凪】
# display as 凪
# JP: 「レールショップで、何かあっと？」
1622 = "「Cửa hàng Đường sắt có chuyện gì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「補強だそうだ。\nレールショップはガラスを多用しているからな」
1476 = "「Hình như là để gia cố. Cửa hàng Đường sắt sử dụng nhiều kính mà.」"
# 【凪】
# display as 凪
# JP: 「ああ、ガムテでも貼っつけっとかね」
1326 = "「À, chắc là dán băng keo lên kính nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、その類の作業だろうとは思うが……」
1310 = "「Chắc là những công việc đại loại thế...」"
# monologue
# JP: 凪の言葉に、\n先ほど感じた不可解な気持ちを呼び戻される。
1897 = "Lời nói của Nagi gợi lại cảm giác khó hiểu mà tôi vừa cảm thấy lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「力仕事なら僕がやろうかと申し出たのだが……\n検札の方を任せたい、と言って、行ってしまったのだ」
1458 = "「Anh đã đề nghị để anh làm công việc tay chân đó cho... Nhưng cô ấy lại bảo muốn giao việc soát vé cho anh, rồi bỏ đi luôn.」"
# 【凪】
# display as 凪
# JP: 「あー、そりゃそうばい」
1331 = "「A, thế là phải rồi á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1314 = "「Hửm?」"
# monologue
# JP: 凪の、絵に描いたようなしたり顔。
1902 = "Nagi mang một vẻ mặt đắc ý hệt như trong tranh."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、『そりゃそう』なのだ？　\n僕が作業、ポーレットが検札の方が適材適所――」
1529 = "「Tại sao lại là 『thế là phải rồi』? Anh làm công việc tay chân, Paulette soát vé mới là đúng người đúng việc chứ——」"
# 【凪】
# display as 凪
# JP: 「にーさん、オンナゴコロをわかっとらんねぇ。\nレールショップは、ポーレットさんの家も同然ばい？」
1385 = "「Anh hai đúng là không hiểu tâm lý phụ nữ gì hết trơn á. Cửa hàng Đường sắt cũng giống như nhà của chị Paulette mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1416 = "「Thì đúng là vậy.」"
# monologue
# JP: 頷くしかない。
2023 = "Tôi đành phải gật đầu."
# monologue
# JP: 確かに僕は女心をまるきりわかってないのだろうし、\nレールショップはポーレットの家も同然だろうから。
2069 = "Quả thực tôi hoàn toàn không hiểu tâm lý phụ nữ, và Cửa hàng Đường sắt cũng chẳng khác gì nhà của Paulette cả."
# 【凪】
# display as 凪
# JP: 「家の掃除ば手伝われるのは、恥ずかしかとよ。\n見られたくなかよーなもんも、いろいろあるけん」
1569 = "「Để người khác giúp dọn dẹp nhà cửa thì xấu hổ lắm á. Cũng có nhiều thứ không muốn cho người khác nhìn thấy nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そんなものかもしれんな」
1316 = "「À... có lẽ là vậy.」"
# monologue
# JP: 日々姫も確かに、部屋を見せたがらない方だ。\nそれを察して、僕もあえては訪ねていかんが。
2204 = "Quả thực Hibiki cũng là người không muốn cho người khác xem phòng mình. Biết ý, nên tôi cũng không cố tình ghé thăm."
# 【双鉄】
# display as 雙鐵
# JP: 「凪ほどさばさばした性格でも、そんな風なら……\nああ、いや。というか――大丈夫か？」
1300 = "「Dù tính cách cởi mở như Nagi mà cũng như vậy thì... À, không. Ý anh là——Có ổn không?」"
# 【凪】
# display as 凪
# JP: 「大丈夫って、何がばい？」
1496 = "「Ổn là sao cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠鍛冶店さんだ。\nあそこも随分と年季の入った建物だろう」
1497 = "「Lò rèn Minokasa ấy. Nơi đó cũng là một tòa nhà khá lâu đời rồi mà.」"
# 【凪】
# display as 凪
# JP: 「大丈夫ばい。爺ちゃんだけじゃなく、\n今は父ちゃんも帰ってきとるけん」
1190 = "「Không sao đâu á. Không chỉ có ông nội, mà bây giờ bố em cũng đã về rồi.」"
# monologue
# JP: 嬉しげな顔。\nそういえば、凪のご両親については話を聞いたことが無い。
1953 = "Khuôn mặt rạng rỡ. Nhắc mới nhớ, tôi chưa từng nghe Nagi kể về bố mẹ mình."
# 【双鉄】
# display as 雙鐵
# JP: 「凪のお父様は――」
1228 = "「Bố của Nagi là——」"
# 【凪】
# display as 凪
# JP: 「システムエンジニアたい。\n今年中は[いまばり,1]今張に単身赴任でお仕事ばい」
1211 = "「Là kỹ sư hệ thống á. Trong năm nay bố em đang đi làm xa nhà ở Imabari nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。鍛冶とは関係の無いお仕事なのか」
1360 = "「Ồ. Công việc không liên quan gì đến nghề rèn sao?」"
# 【凪】
# display as 凪
# JP: 「ひょろか父ちゃんやけん。\n火[づく]造り[つち]槌もきっと持ちあげられんとよ」
1573 = "「Bố em gầy nhom á. Chắc chắn là không nâng nổi búa rèn đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1485 = "「Vậy sao.」"
# monologue
# JP: バカにしたような言葉なのだが、\n父親を語る凪の顔は喜びに満ち輝いている。
2306 = "Lời nói nghe có vẻ như đang trêu chọc, nhưng khuôn mặt Nagi khi nhắc về bố lại rạng rỡ niềm vui."
# monologue
# JP: うらやましい――とそんな感じを、\nかすかにだけれど思わされるほど。
2194 = "Khiến tôi thoáng chốc cảm thấy\nngưỡng mộ."
# 【凪】
# display as 凪
# JP: 「年季ばいうたら、にーさんとこの[さかぐら,1]酒蔵の方が\nよっぽど古かとばい？」
1571 = "「Nhắc đến tuổi thọ, thì nhà xưởng ủ rượu của anh hai còn lâu đời hơn nhiều á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「右田の蔵もまったく心配ない。手入れを欠かさぬし、\n人手も足りて――」
1273 = "「Nhà xưởng của Migita hoàn toàn không có gì phải lo. Luôn được bảo dưỡng cẩn thận, và nhân lực cũng đủ——」"
# 【凪】
# display as 凪
# JP: 「あ」
1319 = "「A.」"
# monologue
# JP: 凪と目が合う。
2033 = "Tôi chạm mắt với Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。ふかみは、大丈夫だろうか」
1482 = "「Phải rồi. Fukami, có ổn không nhỉ.」"
# 【凪】
# display as 凪
# JP: 「電話してみるばい！」
1281 = "「Em sẽ gọi điện thử á!」"
# monologue
# JP: 凪が携帯を手早く操り、耳に当てる。
1889 = "Nagi nhanh chóng thao tác điện thoại, áp lên tai."
# monologue
# JP: 五秒、十秒、十五秒――
1829 = "Năm giây, mười giây, mười lăm giây——"
# 【凪】
# display as 凪
# JP: 「あ、おばちゃん、凪ばい。\nふかみちゃんはおっと？」
1333 = "「A, cô ơi, cháu là Nagi đây ạ. Fukami-chan có đó không cô?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
1630 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1307 = "「Hửm.」"
# monologue
# JP: 袖を引かれて振り向けば、\n濡れねずみになったハチロクがいる。
2186 = "Bị kéo ống tay áo, tôi quay lại thì thấy Hachiroku đang ướt sũng như chuột lột."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　というか、すまん。\n傘のひとつも差し掛けてやればよかったか」
1226 = "「Cô không sao chứ? Mà, xin lỗi. Đáng lẽ tôi nên đưa cho cô một chiếc ô.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、お気持ちだけで十分です。\n雨合羽さえ役に立たないこの風雨ですので」
1196 = "「Không sao, tấm lòng của ngài là đủ rồi ạ. Vì mưa to gió lớn thế này thì áo mưa cũng chẳng ích gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、言われれば、だな」
1325 = "「À, nghe cô nói mới thấy đúng thật.」"
# monologue
# JP: 風はいっそう激しくなって、\n線路脇の木々が傾いで戻らないほどだ。
2321 = "Gió càng lúc càng mạnh, đến mức cây cối ven đường ray nghiêng ngả không đứng thẳng lên được."
# monologue
# JP: 傘などは一瞬にして、おちょこにされてしまうだろう。
2313 = "Ô dù chắc chắn sẽ bị thổi lật ngược trong chớp mắt."
# 【ハチロク】
# display as 八六
# JP: 「それより。…………？」
1231 = "「Hơn nữa...…………?」"
# monologue
# JP: ハチロクの目は凪へ向く。\n小首を傾げる仕草だけで僕へ問うてくる。
1863 = "Ánh mắt của Hachiroku hướng về phía Nagi. Cô ấy hơi nghiêng đầu, một cử chỉ thay cho câu hỏi dành cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみにだ。\nこの風雨、川下り船の方は大丈夫かと」
1399 = "「Là gọi cho Fukami. Trong thời tiết này, không biết thuyền xuôi dòng có ổn không.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
1320 = "「A!」"
# 【凪】
# display as 凪
# JP: 「わかった！　ほんならまた後で！」
1285 = "「Em hiểu rồi á! Vậy lát nữa gặp lại nha!」"
# monologue
# JP: 丁度、凪が電話を終える。\n終えるやいなやで、グイグイ僕に詰め寄ってくる。
2115 = "Vừa lúc Nagi cúp máy. Ngay khi cúp máy, con bé liền hối hả tiến về phía tôi."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、困っとるみたいばい。\nにーさんも、手助けに向かうばい！　向かえると？」
1422 = "「Fukami-chan có vẻ đang gặp rắc rối á. Anh hai cũng đến giúp một tay đi! Đi được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――」
1334 = "「Ừm——」"
# monologue
# JP: 目線を向ければそれだけで、\nハチロクはすぐ答えてくれる。
2031 = "Chỉ cần tôi hướng ánh mắt sang, Hachiroku lập tức trả lời."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの方は大丈夫です。\n[この子,3]8620にも、幸いにして異状はございませんでしたので」
1448 = "「Phía tôi không sao ạ. May mắn là [đứa trẻ này,3]8620 cũng không có dấu hiệu bất thường nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、あとのことを？」
1486 = "「Vậy sao. Thế thì, những việc còn lại?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、お任せください」
1346 = "「Vâng, xin cứ giao cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「であれば、すまんがよろしく頼む。\nということだ。僕はいつでも――」
1544 = "「Nếu vậy, xin lỗi nhưng nhờ cô nhé. Là vậy đấy. Anh thì lúc nào cũng——」"
# monologue
# JP: 言い切らぬうち、凪は僕の手を掴み強く引く。
2065 = "Chưa kịp dứt lời, Nagi đã nắm chặt tay tôi kéo đi."
# 【凪】
# display as 凪
# JP: 「なら、行くばいっ！」
1605 = "「Vậy thì, đi thôi á!」"
# 【ふかみ】
# display as 深美
# JP: 「すみません、車も出せずに」
1415 = "「Xin lỗi, em không thể lái xe ra đón mọi người được.」"
# monologue
# JP: 恐縮しきりといった風情で、ふかみが深々と頭を下げる。\nハチロクが言ったとおりに、合羽さえ役に立たない風雨。
2146 = "Fukami cúi đầu thật sâu với vẻ mặt đầy áy náy. Đúng như Hachiroku đã nói, trận cuồng phong bão táp này áo mưa cũng chẳng ích gì."
# monologue
# JP: ナビもさすがに退避している。\n僕も凪も、移動しただけでずぶ濡れだ。が――
2290 = "Navi quả nhiên cũng đã đi sơ tán. Cả tôi và Nagi chỉ di chuyển một chút thôi mà đã ướt sũng. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「何を言う。車が無いのは、\n[せき]堰さんたちが、今日も\x%l保線;#00ffc040;保線%l;#;をしてくれたからじゃないか」
1595 = "「Em nói gì vậy. Việc không có xe, chẳng phải là do ông Seki và mọi người hôm nay cũng đang làm nhiệm vụ \\x%l保線;#00ffc040;bảo trì đường ray%l;#; sao.」"
# monologue
# JP: 車はすでに、僕らのために動いてくれた。
2285 = "Chiếc xe đã hoạt động vì chúng tôi rồi."
# monologue
# JP: ふかみの祖父とそのご兄弟、堰さんたちの\x%l保線;#00ffc040;保線%l;#;のおかげで、\n\x%l8620;#00ffc040;8620%l;#;も\x%lキハ07;#00ffc040;キハ07%l;#;も、今日も運行できたのだ。
2299 = "Nhờ công \\x%l保線;#00ffc040;bảo trì đường ray%l;#; của ông nội Fukami và những người anh em của ông, ông Seki và mọi người, mà \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#; hôm nay mới có thể vận hành được."
# 【双鉄】
# display as 雙鐵
# JP: 「この天気の中でよく……むしろ、お礼を伝えたいのだが、\n堰さんたちは、まだ？」
1371 = "「Trong thời tiết thế này mà vẫn... Anh mới là người muốn gửi lời cảm ơn, ông Seki và mọi người, vẫn chưa về sao?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。そのまま向かって――\n今、[ゆのい,1]湯医の発船場で舟を[あ]揚げてます」
1343 = "「Vâng. Mọi người đi thẳng đến đó—— Bây giờ đang kéo thuyền lên ở bến thuyền Yunoi ạ.」"
# 【凪】
# display as 凪
# JP: 「なら、こっちの舟は、\nこの三人で避難させなきゃマズかとね？」
1615 = "「Vậy thì, những chiếc thuyền bên này, ba chúng ta phải sơ tán chúng thôi nhỉ?」"
# monologue
# JP: 凪の言葉に、ようやくふかみの硬さがやわらぐ。
2230 = "Nghe Nagi nói vậy, sự căng thẳng của Fukami cuối cùng cũng dịu đi."
# 【ふかみ】
# display as 深美
# JP: 「そうなの。一人じゃどうしようもないから……\n来てくれて、ほんと助かったの。ありがとう」
1480 = "「Đúng vậy. Một mình tớ thì chẳng biết làm sao cả... Các cậu đến giúp, tớ thật sự rất biết ơn. Cảm ơn nhé.」"
# 【凪】
# display as 凪
# JP: 「何をいまさら。水臭かよ、ふかみちゃん」
1537 = "「Đến giờ còn nói gì nữa. Cậu khách sáo quá á, Fukami-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。僕らは仲間ではないか」
1484 = "「Đúng vậy. Chúng ta là đồng đội mà.」"
# 【ふかみ】
# display as 深美
# JP: 「はい……ですけど、やっぱり、ありがとうございます」
1336 = "「Vâng... Nhưng mà, tớ vẫn muốn nói lời cảm ơn.」"
# monologue
# JP: 深々と頭をさげられたなら、僕もどうにも水臭いように、\n少しじれったいように感じてしまう。
1967 = "Thấy em ấy cúi đầu thật sâu, tôi cũng cảm thấy có chút khách sáo, và hơi sốt ruột."
# 【双鉄】
# display as 雙鐵
# JP: 「いや――まぁ、ともかく動き出そう」
1179 = "「À không——thôi, dù sao thì cũng bắt đầu hành động nào.」"
# monologue
# JP: 実際のところ、この発船場内も“水臭い”。
1819 = "Thực ra, bên trong bến thuyền này cũng nồng nặc \"mùi nước\"."
# monologue
# JP: 川の臭いが迫り上がり、締め切られている室内にまで、\nどこからか忍び入り漂っている。
2123 = "Mùi nước sông xộc lên, len lỏi vào tận trong căn phòng đóng kín cửa từ một nơi nào đó và phảng phất trong không khí."
# 【双鉄】
# display as 雙鐵
# JP: 「これ以上天候が崩れんうちに、急いで――」
1365 = "「Trước khi thời tiết xấu đi nữa, phải nhanh chóng——」"
# 【ふかみ】
# display as 深美
# JP: 「ダメです！　段取りをしてからじゃないと。\n濁流の音で、会話もできなくなっちゃいますから」
1187 = "「Không được ạ! Phải lên kế hoạch trước đã. Vì tiếng dòng nước đục ngầu sẽ khiến chúng ta không thể nói chuyện được đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1315 = "「A——」"
# monologue
# JP: ふかみの言葉に、自分が焦っていたと知る。\n屋根のあるホームでも、会話しづらかった程の暴風雨だ。
2229 = "Lời nói của Fukami làm tôi nhận ra mình đã quá vội vàng. Trận bão táp này dữ dội đến mức ngay cả trên sân ga có mái che cũng khó mà nói chuyện được."
# monologue
# JP: それにさらされての作業となれば、\n確かに事前に打ち合せねば、右往左往をするだけとなろう。
2205 = "Nếu phải làm việc ngoài trời mưa bão như thế, đúng là nếu không bàn bạc trước thì chỉ có nước lúng túng chạy ngược chạy xuôi thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「了解した。ならば、手順を説明してくれ」
1453 = "「Anh hiểu rồi. Vậy thì, hãy giải thích trình tự đi.」"
# 【ふかみ】
# display as 深美
# JP: 「はい。お爺ちゃんたちがいないから、重機は使えません。\nだから、舟は人力で引き揚げます」
1338 = "「Vâng. Vì không có ông nội và mọi người ở đây nên không dùng được máy móc hạng nặng. Do đó, chúng ta sẽ kéo thuyền lên bằng sức người.」"
# 【凪】
# display as 凪
# JP: 「人力でって、そぎゃんこと出来っと？」
1633 = "「Bằng sức người á, làm được chuyện đó sao?」"
# 【ふかみ】
# display as 深美
# JP: 「うん。コロを用意してあるから」
1353 = "「Ừm. Tớ đã chuẩn bị sẵn con lăn rồi.」"
# monologue
# JP: ふかみの指差す背後には、\n小さな丸太が何本も重ねられている。
2144 = "Phía sau hướng Fukami chỉ tay, có xếp chồng mấy khúc gỗ tròn nhỏ."
# 【凪】
# display as 凪
# JP: 「コロって、何ね？　そん木切れがコロ？」
1527 = "「Con lăn là gì á? Mấy khúc gỗ đó là con lăn hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。学園で習わなかったか？\nピラミッドの石を運ぶのにも使われたものだと」
1489 = "「Đúng vậy. Em không học ở trường sao? Người ta nói nó từng được dùng để vận chuyển những tảng đá xây kim tự tháp đấy.」"
# monologue
# JP: ふかみは頷き、凪はふるふる首を振る。\n同級生であるはずなのだが、知らぬとなれば仕方ない。
2156 = "Fukami gật đầu, còn Nagi thì lắc đầu quầy quậy. Đáng lẽ ra là bạn cùng khóa, nhưng nếu không biết thì cũng đành chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「運びたい物の下側にコロを入れ、動かす。\n後ろのコロが出てきたら、また前に差し込む」
1472 = "「Đặt con lăn dưới vật cần di chuyển rồi đẩy đi. Khi con lăn phía sau trượt ra thì lại nhét lên phía trước.」"
# monologue
# JP: 簡単な図を描いて説明すれば、\n凪はその目をキラキラさせる。
2053 = "Tôi vẽ một hình đơn giản để giải thích, đôi mắt Nagi liền sáng rực lên."
# 【凪】
# display as 凪
# JP: 「なるほど、これなら簡単に運べそうとね！\n面白そうばい！　やってみたかと！」
1251 = "「Ra là vậy, thế này thì dễ di chuyển hơn nhiều á! Có vẻ thú vị nè! Em muốn thử làm á!」"
# 【ふかみ】
# display as 深美
# JP: 「大丈夫。イヤになるくらいやれるから。\n具体的には、[ろくそう,1]六槽分」
1510 = "「Không sao. Cậu sẽ được làm đến mức phát ngán luôn. Cụ thể là, sáu chiếc thuyền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「階段わきのスロープを使ってあげるのだよな。\nしかし、階段まではどうやって――」
1247 = "「Chúng ta sẽ dùng con dốc cạnh cầu thang để kéo lên nhỉ. Nhưng mà, làm sao để đưa thuyền đến chỗ cầu thang——」"
# 【ふかみ】
# display as 深美
# JP: 「川の水位があがってますから。\n階段の下の方はもう、水の中です」
1536 = "「Vì mực nước sông đang dâng cao ạ. Phần dưới cầu thang giờ đã ngập trong nước rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1635 = "「！」" 
# monologue
# JP: 普段の川面は、船着場の足場まででも、\n舟一艘分の高さまるまる、下にある。
1997 = "Mặt sông bình thường, dù tính đến bệ đứng của bến thuyền, cũng thấp hơn cả chiều cao của một chiếc thuyền."
# monologue
# JP: 足場から階段までのアプローチにも傾斜があるから、\n水面が……恐らく二メートル以上上昇している。
2223 = "Lối đi từ bệ đứng đến cầu thang cũng có độ dốc, nên mặt nước... có lẽ đã dâng cao hơn hai mét rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そこまで切迫してるのか」
1548 = "「Đã cấp bách đến mức đó rồi sao.」"
# 【ふかみ】
# display as 深美
# JP: 「ですから、わたしが舟に乗って、誘導します。\nそしたら凪ちゃんがコロを挟んで、双鉄さんが引く」
1464 = "「Vì vậy, em sẽ lên thuyền để điều hướng. Sau đó Nagi-chan sẽ chèn con lăn, còn anh Soutetsu thì kéo.」"
# monologue
# JP: あらかじめ準備していたのだろう、整頓されたいい案だ。\nが――
1839 = "Có lẽ em ấy đã chuẩn bị sẵn từ trước, một kế hoạch rất rõ ràng. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「それだと、\n舟に乗るまでは、川の中を歩くことにならんか？」
1613 = "「Nếu vậy thì, trước khi lên thuyền, em sẽ phải lội xuống sông đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「[ともづな,1]艫綱を[つた]伝えますから、行けます。\n命綱ももちろんつけますし」
1268 = "「Em sẽ bám theo dây thừng đuôi thuyền, nên có thể đi được ạ. Tất nhiên em cũng sẽ buộc dây an toàn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「危険だ。ふかみの負担が大きすぎる」
1397 = "「Nguy hiểm lắm. Gánh nặng cho Fukami quá lớn.」"
# monologue
# JP: 階段のところまで水が来ているということは、\n踏ん張れる足場があるということでもある。
2095 = "Việc nước dâng đến tận cầu thang cũng có nghĩa là, vẫn có chỗ để bám trụ."
# monologue
# JP: 操船するしかないのなら、ふかみに任せる他無いが、\nその条件なら、手で舟を動かしてしまえばいい。
2252 = "Nếu chỉ có cách lái thuyền thì đành giao cho Fukami, nhưng với điều kiện này, chỉ cần dùng tay đẩy thuyền là được."
# 【双鉄】
# display as 雙鐵
# JP: 「[ともづな,1]艫綱で舟を引っ張り足場まで運び、\nそうして僕が、下から押しあげてやるほうが――」
1538 = "「Kéo dây thừng đuôi thuyền đưa thuyền đến bệ đứng, sau đó anh đẩy từ dưới lên sẽ——」"
# 【凪】
# display as 深美＆凪
# JP: 『「自殺行為です」\n「そりゃあ無理ばい」』
1653 = "『「Hành động tự sát đấy ạ.」 「Như thế là không được đâu á.」』"
# monologue
# JP: 即時の否定。\nふかみだけでなく、凪からも。
2209 = "Lời phủ quyết tức thì. Không chỉ từ Fukami, mà cả Nagi nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「何故無理なのだ」
1528 = "「Tại sao lại không được?」"
# 【ふかみ】
# display as 深美
# JP: 「１００％、バランスを崩すからです」
1363 = "「Vì 100% anh sẽ bị mất thăng bằng ạ.」"
# 【凪】
# display as 凪
# JP: 「流れに足ばすくわれっばい」
1555 = "「Chân sẽ bị dòng nước cuốn đi á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪やふかみの体重ならば、\n簡単に流されてしまおうが――」
1194 = "「Không, nếu là cân nặng của Nagi hay Fukami, thì đúng là sẽ dễ dàng bị cuốn trôi, nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「体重とかの問題じゃないです」
1184 = "「Không phải vấn đề cân nặng đâu ạ.」"
# 【凪】
# display as 凪
# JP: 「運動神経の問題でもなか。もっと水量の少なかときでも、\n簡単にころんころん流されてしまいよるけん」
1201 = "「Cũng không phải vấn đề thần kinh vận động á. Dù lượng nước có ít hơn, cũng dễ dàng bị cuốn trôi lộn nhào luôn nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか、凪がか？」
1631 = "「Không lẽ, Nagi đã từng bị rồi sao?」"
# monologue
# JP: 反射神経やバランス感覚などを見るなら、\n僕より凪は、間違いなくよほど優れてる。
1858 = "Nếu xét về phản xạ hay khả năng giữ thăng bằng, Nagi chắc chắn vượt trội hơn tôi rất nhiều."
# monologue
# JP: その凪をしてころころ流されるなどの事態など、\n想像するのも難しいのだが……
2286 = "Một Nagi như vậy mà lại bị cuốn trôi lộn nhào, thật khó mà tưởng tượng được..."
# 【凪】
# display as 凪
# JP: 「そうばい。だけじゃなくて、\nふかみちゃんも、ふかみちゃんのじいちゃん達もばい」
1492 = "「Đúng vậy á. Không chỉ thế, cả Fukami-chan, cả ông của Fukami-chan nữa á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「専門家でもか」
1598 = "「Cả chuyên gia cũng vậy sao.」"
# 【ふかみ】
# display as 深美
# JP: 「水量が極端に減った時には、航路を確保するために、\n川の中に入っていって、岩をどける作業をするんです」
1367 = "「Khi lượng nước giảm mạnh, để đảm bảo tuyến đường thủy, chúng em phải lội xuống sông để dọn dẹp đất đá ạ.」"
# monologue
# JP: ベテランだろうが体力や運動神経に優れていようが、\nその最中には、誰もが転んで流される――
1985 = "Dù là người dày dặn kinh nghiệm hay có thể lực, thần kinh vận động xuất sắc, trong lúc làm việc đó, ai cũng có lúc bị ngã và cuốn trôi——"
# monologue
# JP: 川に入った状態で力をかけるということが、\nいかに危険で難しいのか――ふかみは冷静な説明を重ねる。
1940 = "Việc dùng sức khi đang đứng dưới sông nguy hiểm và khó khăn đến mức nào——Fukami bình tĩnh giải thích cặn kẽ."
# 【ふかみ】
# display as 深美
# JP: 「だから、川の中で作業するとき。\n体力とか運動神経とかは、安全を保証してくれません」
1465 = "「Vì vậy, khi làm việc dưới sông. Thể lực hay thần kinh vận động không thể đảm bảo an toàn đâu ạ.」"
# monologue
# JP: 言い切って。ふかみはずるりと、\n頑丈そうなロープを引っ張り出してくる。
1970 = "Nói xong. Fukami từ từ kéo ra một sợi dây thừng trông rất chắc chắn."
# 【ふかみ】
# display as 深美
# JP: 「命綱がついた状態で、逆らわず流されて助けを待てる。\nそれが出来ない人に、川の中での力仕事は無理です」
1369 = "「Trong trạng thái được buộc dây an toàn, phải biết xuôi theo dòng nước và chờ người đến cứu. Người không làm được điều đó thì không thể làm việc nặng dưới sông đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1546 = "「Anh hiểu rồi.」"
# monologue
# JP: 僕が川の中に入って足を滑らせ流されたのなら、\n間違いなくパニックを起こしてしまおう。
2062 = "Nếu tôi lội xuống sông, trượt chân và bị cuốn trôi, chắc chắn tôi sẽ hoảng loạn."
# monologue
# JP: そして、陸にいるのがふかみ、凪なら、\nその僕を、命綱で引き上げることもまた困難だ。
2227 = "Và, nếu người trên bờ là Fukami và Nagi, thì việc dùng dây an toàn kéo tôi lên cũng rất khó khăn."
# 【双鉄】
# display as 雙鐵
# JP: 「では、ふかみが川でコロへと舟を誘導する。\n凪がコロを移動させ、僕がゆっくり引き上げていく」
1610 = "「Vậy thì, Fukami sẽ điều hướng thuyền đến chỗ con lăn dưới sông. Nagi di chuyển con lăn, còn anh sẽ từ từ kéo thuyền lên.」"
# 【ふかみ】
# display as 深美
# JP: 「はい、それでお願いします。\nあと、簡単な手信号を」
1355 = "「Vâng, nhờ anh ạ. Với lại, em sẽ hướng dẫn một số ký hiệu tay đơn giản.」"
# monologue
# JP: ハンドサインを教えてもらって練習し、\n胴長靴と救命胴衣とレインウェアを装備する。
1963 = "Được hướng dẫn và luyện tập các ký hiệu tay, tôi trang bị ủng cao cổ, áo phao và quần áo đi mưa."
# 【双鉄】
# display as 雙鐵
# JP: 「よし――いつでも大丈夫だ」
1402 = "「Tốt rồi——Sẵn sàng lúc nào cũng được.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、いきましょう」
1609 = "「Vậy thì, đi thôi.」"
# monologue
# JP: ふかみの声は、いつに無く強い。\n普段はまとわりついてる、遠慮の響きが消えている。
2149 = "Giọng nói của Fukami mạnh mẽ hơn bao giờ hết. Sự rụt rè thường ngày bao quanh em ấy đã biến mất."
# 【ふかみ】
# display as 深美
# JP: 「一にも二にも、安全に。\n危ないと思ったら、自分の体を最優先にしてください」
1552 = "「Điều quan trọng nhất là an toàn. Nếu thấy nguy hiểm, xin hãy ưu tiên cơ thể mình lên hàng đầu ạ.」"
# monologue
# JP: （ごおおおっ！）
2383 = "（Vùuuuu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1637 = "「!?」"
# monologue
# JP: 暴風に、息が一瞬詰まってしまう。\n動かずにいても体が浮き上がりそうになる。
2112 = "Gió giật mạnh làm tôi nghẹt thở trong giây lát. Dù đứng yên không nhúc nhích, cơ thể cũng có cảm giác như sắp bị thổi bay."
# monologue
# JP: 雨は真横からぶつかって来て、\nはっきりとした痛みに変わる。
2314 = "Mưa tạt ngang đập thẳng vào người, chuyển thành một cơn đau rõ rệt."
# monologue
# JP: （これ――は）
2389 = "（Thế này——thì）"
# monologue
# JP: 反射で閉じた瞼をあげれば、クマ川がある。\n水嵩を大きく増して、せり上がってくる。
2057 = "Mở đôi mắt vừa nhắm lại theo phản xạ ra, sông Kuma hiện ra trước mắt. Mực nước đã dâng lên rất cao và đang cuồn cuộn đổ tới."
# monologue
# JP: 船着場のコンクリどころか、\n艫綱をつなぐ杭の先さえ、今にも水に呑まれそうだ。
1911 = "Đừng nói là nền bê tông của bến thuyền, ngay cả đỉnh cọc buộc dây thừng đuôi thuyền cũng như sắp bị dòng nước nuốt chửng."
# monologue
# JP: （ごウッ！）
# 2383 = "（轟！）" 
# 【凪】
# display as 凪
# JP: 「わ。わっ！？」
1289 = "「Oa. Oái!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1636 = "「!!」"
# monologue
# JP: コロ用の小さな丸太を持ち抱えた凪が、\n突風に大きく煽られる。
2085 = "Nagi đang ôm mấy khúc gỗ tròn nhỏ dùng làm con lăn bị cơn gió giật mạnh làm lảo đảo."
# monologue
# JP: 慌てて体を支えてやって、耳の直ぐ側で声を出す。
2039 = "Tôi vội vàng đỡ lấy cơ thể con bé, cất giọng ngay sát bên tai."
# 【双鉄】
# display as 雙鐵
# JP: 「――這うようにしてっ、運んでいこう！」
958 = "「——Cúi thấp người xuống, rồi di chuyển thôi!」"
# monologue
# JP: その口にさえ、すぐに雨粒が飛び込んで来る。
1989 = "Ngay cả khi mở miệng ra, những hạt mưa cũng lập tức bay tọt vào."
# 【双鉄】
# display as 雙鐵
# JP: 「これでは――地上でも転びかねない」
1185 = "「Thế này thì——dù ở trên bờ cũng có thể bị ngã mất.」"
# 【凪】
# display as 凪
# JP: 「わ、わかったばい！」
1288 = "「E, em hiểu rồi á!」"
# monologue
# JP: 体を畳んだ凪の上、覆いかぶさるようにして、\n僕の体を、凪の雨除け、風避けにする。
2051 = "Tôi che chở phía trên Nagi đang thu mình lại, dùng cơ thể mình làm tấm khiên chắn mưa chắn gió cho con bé."
# monologue
# JP: 密着すれば、僕への風雨もいくらか和らぐ。\nあるいは地面そのものも、風を防いでいるかも知れん。
1937 = "Ép sát vào nhau, mưa gió hắt vào tôi cũng dịu đi phần nào. Hoặc cũng có thể chính mặt đất đang che chắn gió cho chúng tôi."
# 【凪】
# display as 凪
# JP: 「んっ！　……この辺でっ、良か、と？」
1309 = "「Ư! ...Chỗ này, được không, á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、な。あまり水面に近づけすぎると、\nコロまで呑まれてしまいかねん」
1216 = "「Được, rồi. Nếu đến quá gần mặt nước, con lăn có thể bị cuốn đi mất.」"
# monologue
# JP: 階段の一段にいくつもいくつも置き石をして、\n簡単な堰を作って、その内側にコロを置く。
2028 = "Đặt rất nhiều đá lên một bậc thang để tạo thành một con đập đơn giản, rồi đặt con lăn vào bên trong đó."
# 【凪】
# display as 凪
# JP: 「全部でいくつ、持ってくっと？」
1553 = "「Tổng cộng phải lấy bao nhiêu cái á?」"
# monologue
# JP: コロの個数が多いほど、引き上げる僕の負担は減る。\nが、コロの移動の回数が増え、凪の負担と危険とが増す。
2165 = "Số lượng con lăn càng nhiều, gánh nặng khi kéo lên của tôi càng giảm. Nhưng, số lần Nagi phải di chuyển con lăn sẽ tăng lên, kéo theo đó là gánh nặng và sự nguy hiểm cho con bé."
# monologue
# JP: ならばぎりぎり――最低限の個数に絞っておくべきだ。
2294 = "Vậy thì nên giới hạn ở mức sát nút——số lượng tối thiểu cần thiết."
# 【双鉄】
# display as 雙鐵
# JP: 「６個……いや、５個でいい。\n４つで使って――ひとつが、予備だ」
1641 = "「6 cái... không, 5 cái là đủ rồi. Dùng 4 cái——một cái để dự phòng.」"
# 【凪】
# display as 凪
# JP: 「わかったばい！」
1283 = "「Em biết rồi á!」"
# monologue
# JP: 戻りは風に押されてしまう。\nつんのめりそうになる体に、妙な笑いがこみ上げてくる。
2274 = "Lúc quay lại thì bị gió đẩy đi. Cơ thể như chực lao về phía trước khiến tôi bật ra một nụ cười kỳ lạ."
# monologue
# JP: そうして再び、コロを抱えて階段へと。\n二度目というのに全く慣れず、雨が痛くて仕方ない。
2175 = "Cứ thế, chúng tôi lại ôm con lăn tiến về phía cầu thang. Dù là lần thứ hai nhưng vẫn không quen chút nào, những hạt mưa đập vào người đau điếng."
# 【凪】
# display as 凪
# JP: 「これ、で――良かとっ！」
1591 = "「Thế, này——là được rồi á!」"
# monologue
# JP: コロの準備を整えて、\n凪はライトを点灯させて、大きな大きな輪を描く。
2091 = "Sau khi chuẩn bị xong con lăn, Nagi bật đèn pin lên, vẽ thành một vòng tròn thật lớn."
# monologue
# JP: 水面ギリギリに立っていたふかみはそれを見て、\n慎重に、川の中へと踏み入っていく。
2212 = "Fukami đang đứng sát mép nước nhìn thấy vậy, cẩn thận bước từng bước xuống dòng sông."
# monologue
# JP: （命綱は……大丈夫だな）
2371 = "（Dây an toàn... không sao chứ.）"
# monologue
# JP: ふかみの腰と、階段上の手すりにしっかり、固定されてる。\nだからといって、安心できる光景ではない。
1974 = "Nó đã được cố định chắc chắn vào eo Fukami và tay vịn trên cầu thang. Dù vậy, đó vẫn không phải là một cảnh tượng khiến người ta an tâm."
# monologue
# JP: ゴウと音を立て風が泣く度、\nふかみの体はぐらぐら揺れる。
2117 = "Mỗi khi gió gầm rú,\ncơ thể Fukami lại chao đảo."
# 【凪】
# display as 凪
# JP: 「っ――ひどか、川たい」
961 = "「——Dòng sông, chảy xiết quá á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1339 = "「Ừ.」"
# monologue
# JP: 異物までもが時折り混じる濁り淀んだ濁流を、\n艫綱の先、木の葉のように揺れる舟へとふかみは近寄る。
1943 = "Trong dòng nước đục ngầu cuồn cuộn đôi khi lẫn cả dị vật, Fukami tiến lại gần chiếc thuyền đang tròng trành như chiếc lá ở đầu dây thừng."
# monologue
# JP: いつもの軽やかさを捨てて、安全性を最優先で、\nふかみは船べりに体ごと、べたり張り付かせるようにする。
1961 = "Rũ bỏ sự nhẹ nhàng thường ngày, đặt an toàn lên hàng đầu, Fukami áp sát toàn bộ cơ thể vào mạn thuyền."
# 【凪】
# display as 凪
# JP: 「乗ったばい！」
1176 = "「Lên rồi á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1405 = "「Tốt!」"
# monologue
# JP: ふかみが櫂に手をかけて、\n空いている手でハンドサインを送ってくる。
2142 = "Fukami đặt tay lên mái chèo, dùng bàn tay còn lại ra hiệu cho chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「やるぞ、凪！」
1444 = "「Làm thôi, Nagi!」"
# 【凪】
# display as 凪
# JP: 「わかっとるばい！」
1282 = "「Em biết rồi á!」"
# monologue
# JP: ふかみが乗った舟の艫綱に、\n更に綱をかけ、階段の手すりの一番上に固定する。
2029 = "Móc thêm một sợi dây thừng vào dây thừng đuôi thuyền của chiếc thuyền Fukami đang ngồi, rồi cố định nó vào phần cao nhất của tay vịn cầu thang."
# monologue
# JP: そしてじり、じり――\n全身の力を込めて、艫綱をひたすらに引き込んでいく。
2176 = "Rồi từng chút, từng chút một—— Dồn toàn bộ sức lực, không ngừng kéo sợi dây thừng lại."
# 【凪】
# display as 凪
# JP: 「こりゃ……キツかばいっ」
1590 = "「Thế này... mệt quá á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理をするなよ。足を滑らせないようにしろ」
1244 = "「Đừng cố quá. Cẩn thận kẻo trượt chân đấy.」"
# monologue
# JP: コンクリ製の階段を足場にしていても、\n雨風だけで、バランスを崩されそうになる。
1987 = "Dù có bậc thang bê tông làm chỗ đứng, chỉ riêng mưa gió thôi cũng đủ làm tôi mất thăng bằng."
# monologue
# JP: 流れの中に入って舟を押し上げる――\nさきほどの自分の提案が、妄言だったと思い知る。
2049 = "Lội xuống dòng nước xiết để đẩy thuyền lên—— Giờ tôi mới nhận ra đề xuất vừa rồi của mình thật là viển vông."
# 【凪】
# display as 凪
# JP: 「ふかみ、ちゃん――さすが、ばいっ」
1420 = "「Fukami-chan——Giỏi thật á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1339 = "「嗯」" 
# monologue
# JP: 船上の方が地上より、よほど安定して立っている。
1969 = "Đứng trên thuyền còn vững vàng hơn cả trên bờ."
# monologue
# JP: この荒れ狂う濁流の中、引っ張る力そのままに、\n舟はこちらへと近づいてくる。
1947 = "Giữa dòng nước đục ngầu cuồn cuộn này, cứ giữ nguyên lực kéo, chiếc thuyền đang tiến lại gần phía chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「うまいぞ――そうだ――その調子っ」
1191 = "「Làm tốt lắm——Đúng rồi——Cứ giữ nhịp độ đó.」"
# monologue
# JP: 弓のようにたわむ櫂一本で、乱れに乱れる川の流れと、\nふかみは見事に、折り合っている。
2134 = "Chỉ với một mái chèo cong vút như cây cung, Fukami đã khéo léo hòa nhịp với dòng nước sông cuồn cuộn."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、コロについてくれ。\nふかみが――来るっ」
1243 = "「Nagi, lo phần con lăn đi.\nFukami——sắp đến rồi.」"
# 【凪】
# display as 凪
# JP: 「了解ばいっ！」
# 1283 = "「咱知道咧！」" 
# monologue
# JP: （こつんっ）
2365 = "（Cộc）"
# monologue
# JP: 舳先が、コンクリの階段に当たる。
2243 = "Mũi thuyền chạm vào bậc thang bê tông."
# monologue
# JP: ふかみはすぐさま舟から飛び降り身をかがめ、\nコロを差し出す凪の反対側へと収まる。
2138 = "Fukami lập tức nhảy khỏi thuyền, cúi người xuống, và vào vị trí đối diện với Nagi đang đưa con lăn ra."
# 【凪】
# display as 凪
# JP: 「今ばいっ！」
1425 = "「Bây giờ á!」"
# 【ふかみ】
# display as 深美
# JP: 「お願いします！」
1474 = "「Nhờ anh ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1635 = "「！」" 
# monologue
# JP: ぐ、と強烈な手応えがくる。\n階段ゆえに、後ろ向きには引きづらい。
2083 = "Kịch, một lực cản mãnh liệt truyền đến. Vì là cầu thang nên rất khó để kéo lùi lại."
# monologue
# JP: 肩にロープを担ぐようにし、\n舟と川を背に、ゆっくり進む。
2043 = "Tôi vắt dây thừng lên vai, quay lưng lại với chiếc thuyền và dòng sông, chầm chậm bước đi."
# monologue
# JP: （くっ）
2357 = "（Hự）"
# monologue
# JP: 瞬時、抵抗が一気に薄れる。
2206 = "Trong nháy mắt, lực cản đột ngột giảm đi."
# monologue
# JP: コロの上へと、舟が乗っかってくれたのだ。
1957 = "Chiếc thuyền đã nằm gọn lên trên con lăn."
# monologue
# JP: （これは――なんだ、楽勝じゃないか。\n凄いな、古代の知恵というのは）
2388 = "（Thế này——Gì chứ, cũng dễ dàng mà. Trí tuệ của người xưa thật đáng nể.）"
# monologue
# JP: これならば、様子を見ながら対応できる。
2284 = "Nếu vậy, tôi có thể vừa quan sát tình hình vừa xử lý."
# monologue
# JP: ロープを脇から通すようにして腰にまき、\n180度転回し、凪とふかみの様子を見つつ、舟を引く。
2042 = "Tôi luồn dây thừng qua nách rồi quấn quanh eo, quay người 180 độ, vừa quan sát Nagi và Fukami vừa kéo thuyền."
# monologue
# JP: （くっ――くっ――くっ――）
2356 = "（Hự——Hự——Hự——）"
# monologue
# JP: 一段、一段。慎重に階段を登っていく。
1803 = "Từng bậc, từng bậc một. Cẩn thận bước lên cầu thang."
# monologue
# JP: 凪とふかみはコロを次々移動させ、\n舟にスロープを登らせていく。
1892 = "Nagi và Fukami lần lượt di chuyển các con lăn, đưa chiếc thuyền leo lên dốc."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
# 1405 = "「好！」" 
# monologue
# JP: スロープ全てを登りきり、\n舟を平地で安定させる。
2178 = "Đi hết đoạn dốc, cố định chiếc thuyền trên mặt đất bằng phẳng."
# monologue
# JP: これで、一槽。\n残りは五槽。
2217 = "Vậy là xong một chiếc.\nCòn lại năm chiếc."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さん、次、行けますか」
1629 = "「Anh Soutetsu, chúng ta tiếp tục được chứ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ、凪は？」
1541 = "「Tất nhiên rồi, Nagi thì sao?」"
# 【凪】
# display as 凪
# JP: 「任せろばい！！」
1205 = "「Cứ giao cho em á!!」"
# monologue
# JP: アドレナリンが出ているのだろう、\nあれほど激しく感じた疲労が、今はほとんど消えている。
1813 = "Có lẽ do adrenaline đang tiết ra, cảm giác mệt mỏi dữ dội lúc nãy giờ gần như biến mất."
# monologue
# JP: この状態が続くうち、作業を終わらせきるしかない――\nみなが、それを理解している。
1931 = "Trong lúc trạng thái này vẫn còn duy trì, chúng tôi phải hoàn thành xong công việc—— Mọi người đều hiểu rõ điều đó."
# 【ふかみ】
# display as 深美
# JP: 「なら、行きます！」
1618 = "「Vậy thì, em đi đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「気をつけろよ！」
1564 = "「Cẩn thận đấy!」"
# monologue
# JP: ……風雨は、少しも緩んでこない。
953 = "...Mưa gió không hề có dấu hiệu thuyên giảm."
# monologue
# JP: 慣れるほど作業は楽になるはずなのに、\n一槽、また一槽と引くごとに、体は鈍く重くなる。
2101 = "Đáng lẽ càng quen thì công việc sẽ càng nhẹ nhàng, nhưng cứ kéo xong một chiếc, rồi lại một chiếc, cơ thể tôi càng trở nên nặng nề và chậm chạp."
# monologue
# JP: （なんだ？　手袋が――滑り始めてきているのか）
2374 = "（Sao thế này? Găng tay——đang bắt đầu trơn trượt sao.）"
# monologue
# JP: あまりの負荷に、伸びが発生したのだろうか。\nブカブカ感で、力を上手く伝えられない。
2102 = "Có lẽ do phải chịu tải trọng quá lớn nên nó đã bị giãn ra chăng. Cảm giác lỏng lẻo khiến tôi không thể truyền lực một cách tốt nhất."
# monologue
# JP: 内部にも、汗と雨とが溜まってしまい、ひどく蒸れ、\n油断をすればズルリといってしまいそうだ。
2224 = "Bên trong cũng đọng đầy mồ hôi và nước mưa, vô cùng bí bách, chỉ cần sơ sẩy một chút là có thể tuột ra ngay."
# monologue
# JP: （だが――あと一槽だ）
2346 = "（Nhưng——chỉ còn một chiếc nữa thôi.）"
# monologue
# JP: ふかみが舟を寄せてくれれば、\n艫綱を引いて、それでおしまい。
1929 = "Chỉ cần Fukami đưa thuyền tới gần, tôi kéo dây thừng đuôi thuyền lên là xong."
# monologue
# JP: 気合を入れなおす意味も込め、\n手袋の中の水を捨て、指をぎゅっぎゅと伸ばし直す。
2072 = "Cũng mang ý nghĩa xốc lại tinh thần, tôi vắt nước trong găng tay ra, rồi duỗi căng các ngón tay."
# monologue
# JP: （うん。随分、マシになった気がする）
2363 = "（Ừm. Cảm giác đỡ hơn nhiều rồi.）"
# monologue
# JP: 顔をあげなおし、ふと気づく。\nもう長いこと、声を聞かない。
2074 = "Ngẩng mặt lên, tôi chợt nhận ra. Đã một lúc lâu rồi không nghe thấy tiếng ai cả."
# monologue
# JP: みな一様に黙りこみ、\n作業を終える瞬間だけを待ちわび――っ！？
2308 = "Tất cả đều đồng loạt im lặng, chỉ chờ đợi khoảnh khắc công việc kết thúc——!?"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんっ！！！」
1423 = "「Fukami-chan!!!」"
# 【ふかみ】
# display as 深美
# JP: 「っ！？」
# 1637 = "「！？」" 
# monologue
# JP: 流木かっ！？\n黒い何かが
2107 = "Là gỗ trôi dạt sao!?\nMột vật thể màu đen nào đó"
# monologue
# JP: ふかみは舟を押し逃し、けれど反動でバランスをっ――
2152 = "Fukami đẩy thuyền né tránh, nhưng phản lực đã làm em ấy mất thăng bằng——"
# 【双鉄】
# display as 雙鐵
# JP: 「いかんっ！！」
1180 = "「Nguy rồi!!」"
# monologue
# JP: とっさに、命綱へと飛びつく！\n体全部で覆いかぶさりっ――
2059 = "Tôi lập tức lao tới sợi dây an toàn! Dùng toàn bộ cơ thể đè lên——"
# monologue
# JP: （ぐんっ！！！！！）
2382 = "（Rầm!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1320 = "「啊！」" 
# monologue
# JP: 力を完全に抜いたのか、\nあるいは、気絶してるのか――
2104 = "Em ấy hoàn toàn kiệt sức,\nhay là, đã ngất đi rồi——"
# monologue
# JP: 一杯に伸びた命綱は、\n舟のそれとは比較にならぬ、強烈な荷重に暴れてもがく！
1841 = "Sợi dây an toàn căng cứng, giằng co dữ dội với một tải trọng khủng khiếp, không thể so sánh với trọng lượng của chiếc thuyền!"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！！」
1644 = "「~~~~!!」"
# monologue
# JP: 焦げたような臭いを感じる。\n川の中へ引き込む力が、僕まで連れて行こうとする。
2060 = "Tôi ngửi thấy mùi như khét lẹt. Lực kéo xuống dòng sông dường như muốn lôi cả tôi theo."
# monologue
# JP: ――この手の中で、生と死がせめぎ合ってる。\nあの日の記憶がわきあがってきて、体を震わす。
932 = "——Trong tay tôi lúc này, sự sống và cái chết đang giằng co. Ký ức của ngày hôm đó ùa về, khiến cơ thể tôi run rẩy."
# monologue
# JP: （路、子――）
2380 = "（Michi, ko——）"
# monologue
# JP: あの日の僕は、あまりに小さく弱かった。\n路子の生と僕の生、両方を掴んでおけないほどに。
2292 = "Tôi của ngày hôm đó, quá đỗi nhỏ bé và yếu ớt. Yếu ớt đến mức không thể nắm giữ cả mạng sống của Michiko và của chính mình."
# 【凪】
# display as 凪
# JP: 「にーさんっ！」
1387 = "「Anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1508 = "「Anh không sao.」"
# monologue
# JP: （ぐっ――）
2378 = "（Hự——）"
# monologue
# JP: 万が一にも放さないよう、\n僕の体に命綱をまきつけてから、引き寄せ始める。
2170 = "Để đề phòng vạn nhất cũng không bị tuột mất, tôi quấn dây an toàn quanh người mình, rồi bắt đầu kéo lại."
# monologue
# JP: 素早く、けれど慎重に。\n力を入れ過ぎないように、手を滑らせたりしないよう。
2272 = "Nhanh chóng, nhưng cẩn trọng. Không dùng lực quá mạnh, không để tay bị trượt."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、大丈夫」
1509 = "「Không sao đâu, không sao đâu.」"
# monologue
# JP: 川に入ってふかみの体を一刻も早く保護したい。\nが、そうしてしまえば、僕まで流される他にない。
2037 = "Tôi muốn lội xuống sông để bảo vệ cơ thể Fukami càng sớm càng tốt. Nhưng nếu làm vậy, tôi cũng sẽ bị cuốn trôi theo mất."
# monologue
# JP: だから、自分に何度も何度も言い聞かせ、\n手にある重みを手放さぬよう、それだけを心に刻み込む。
2081 = "Vì vậy, tôi tự nhủ với bản thân hết lần này đến lần khác, khắc sâu vào tâm trí một điều duy nhất là không được buông bỏ sức nặng đang nằm trong tay."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。今度は、絶対――」
1507 = "「Không sao đâu. Lần này, tuyệt đối——」"
# monologue
# JP: ふかみの重さを。命の重さを――\nこの手の中から、離さない。
2041 = "Sức nặng của Fukami. Sức nặng của sinh mệnh—— Tôi sẽ không buông khỏi đôi tay này."
# monologue
# JP: (ぴちょんっ――）
32 = "(Tí tách——)"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1318 = "「A...」"
# monologue
# JP: 湯船に落ちた波紋を見れば、\n水というものを、不思議に思う。
2192 = "Nhìn những gợn sóng rơi xuống bồn tắm, tôi cảm thấy nước thật là một thứ kỳ diệu."
# monologue
# JP: ついさっきまであれほど激しく僕らを叩き打ちのめし、\nだけれど今は、温かに包み、癒してくれる――
1914 = "Mới vừa nãy thôi nó còn quật vào chúng tôi dữ dội đến thế, vậy mà bây giờ, nó lại ôm ấp và xoa dịu chúng tôi một cách ấm áp——"
# 【双鉄】
# display as 雙鐵
# JP: 「……生き返る気分とは、このことか」
973 = "「...Cảm giác sống lại, là thế này sao.」"
# monologue
# JP: その言葉さえ、意識をせずには喉から出せない。\n体があまりに疲れきり、息を吐くのもおっくうだ。が――
2288 = "Ngay cả lời nói đó, nếu không cố gắng thì cũng không thể thốt ra được. Cơ thể tôi đã quá kiệt sức, ngay cả việc thở ra cũng thấy phiền. Nhưng——"
# 【凪】
# display as 凪
# JP: 「にーさん、にーさん、背中流してあげるばい！」
1388 = "「Anh hai, anh hai, để em kỳ lưng cho anh á!」"
# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃん。わたしがするから。\n双鉄さん、わたしの命の恩人なんだから」
1549 = "「Chờ đã, Nagi-chan. Để tớ làm cho. Anh Soutetsu là ân nhân cứu mạng của tớ mà.」"
# monologue
# JP: ……凪とふかみはハイテンションだ。\n疲れはあるに決まっているのに、全くそれを感じさせない。
945 = "...Nagi và Fukami đang rất hưng phấn. Chắc chắn là họ đang mệt, nhưng lại không hề tỏ ra như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「はしゃがず、休め。\n明日おそらく、ひどいことになってしまうぞ」
1403 = "「Đừng ồn ào nữa, nghỉ ngơi đi. Ngày mai có lẽ sẽ tồi tệ lắm đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「はい、お背中流したらのんびりします」
1349 = "「Vâng, kỳ lưng cho anh xong em sẽ thư giãn ạ.」"
# 【凪】
# display as 凪
# JP: 「にーさん、かーっこ良かったけんっ！\n映画の主役みたいやったと」
1384 = "「Anh hai ngầu lắm á! Giống như nhân vật chính trong phim luôn nè.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1177 = "「Không——」"
# monologue
# JP: 実際、極めて危ない状況だったことは確かだ。\nゆえに、やむを得ないことかもしれんが――
1983 = "Thực tế, tình huống lúc đó cực kỳ nguy hiểm. Vì vậy, có lẽ đó là điều bất đắc dĩ——"
# monologue
# JP: ふかみだけでなく凪までが、\n命の危機からの脱出に、酔ったみたいになっている。
2181 = "Không chỉ Fukami mà cả Nagi, dường như cũng đang say sưa với việc thoát khỏi cơn nguy kịch."
# 【双鉄】
# display as 雙鐵
# JP: 「僕など、なにもしてないさ。ふかみの命を救ったのは、\nふかみ自身の準備の良さと経験だ」
1452 = "「Anh chẳng làm gì cả. Người cứu mạng Fukami, chính là sự chuẩn bị kỹ lưỡng và kinh nghiệm của bản thân em ấy.」"
# 【ふかみ】
# display as 深美
# JP: 「いいえ！　双鉄さんが引き寄せてくれたから、\nわたし、今、こんなに元気でいられるんです」
1183 = "「Không đâu ạ! Nhờ anh Soutetsu kéo em lại, nên bây giờ em mới có thể khỏe mạnh thế này đấy ạ.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　あのままなら、体ば冷えきって危ないし、\nまた流木やら、ぶつかってきよったかもしれんもん」
1495 = "「Đúng vậy á! Nếu cứ để thế thì cơ thể sẽ bị lạnh cóng rất nguy hiểm, và có khi còn bị gỗ trôi dạt đập vào nữa cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ」
969 = "「...Hừm.」"
# monologue
# JP: ふかみも凪も、夢見るように、瞳をキラキラさせている。
2136 = "Cả Fukami và Nagi đều đang để đôi mắt sáng lấp lánh như đang mơ mộng."
# 【ふかみ】
# display as 深美
# JP: 「迷いなく、すぐに行動してくれたから、\nわたし、助けてもらえたんです」
1621 = "「Nhờ anh hành động ngay lập tức không chút do dự, nên em mới được cứu sống ạ.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　男の中の男にしか出来んことばい！」
1493 = "「Đúng vậy á! Chỉ có bậc nam nhi đích thực mới làm được điều đó á!」"
# monologue
# JP: ……男ではない凪だって、僕とおんなじことをした。
942 = "...Dù không phải nam nhi, Nagi cũng đã làm điều tương tự như tôi."
# monologue
# JP: 僕に数秒も遅れることなく、\n命綱に取り付き、一緒になって引っ張った。
1964 = "Con bé bám lấy dây an toàn chỉ chậm hơn tôi vài giây, và cùng tôi kéo lên."
# 【ふかみ】
# display as 深美
# JP: 「だから、わたし、少しでも恩返ししたいんです」
1469 = "「Vì vậy, em muốn báo đáp anh dù chỉ một chút thôi ạ.」"
# 【凪】
# display as 凪
# JP: 「にーさん、背中流させるばいっ！」
1392 = "「Anh hai, để em kỳ lưng cho anh á!」"
# monologue
# JP: ……千切れんばかりに尻尾を振っている子犬に\n体の周りをぐるぐる回られているようだ。
951 = "...Cảm giác như có hai chú cún con đang vẫy đuôi rối rít chạy vòng quanh người tôi vậy."
# monologue
# JP: 何を話してどう宥めても、これを鎮めることは出来まい。\n鎮めるためには散歩か遊びか、要求を満たしてやるのみだ。
1816 = "Dù có nói gì hay dỗ dành thế nào cũng không thể làm dịu chúng được. Cách duy nhất để xoa dịu là đi dạo, chơi đùa hoặc đáp ứng yêu cầu của chúng."
# monologue
# JP: （ざばあっ）
2367 = "（Rào）"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならばよろしく頼む」
1457 = "「Anh hiểu rồi. Vậy thì nhờ hai đứa nhé.」"
# 【凪】
# display as 凪
# JP: 「頼まれるばい！」
1561 = "「Cứ giao cho em á!」"
# 【ふかみ】
# display as 深美
# JP: 「だから、凪ちゃん、わたしの命の恩人だから」
1462 = "「Thế nên, Nagi-chan, anh ấy là ân nhân cứu mạng của tớ mà.」"
# 【凪】
# display as 凪
# JP: 「こっちにだって、親友の命の恩人ばい」
1277 = "「Bên này cũng vậy, anh ấy là ân nhân cứu mạng của bạn thân tớ á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、仲良くしてくれ。\nお前たちふたりに争われては、僕がつらい」
1345 = "「À, hai đứa hòa thuận với nhau đi. Hai đứa mà tranh giành thì anh khó xử lắm.」"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「！」\n「！」』
1657 = "『「!」\n「!」』"
# monologue
# JP: ふたりそろっていきなり黙る。\n黙って、じっと見つめ合う。
1861 = "Cả hai bỗng nhiên im bặt. Im lặng và nhìn chằm chằm vào nhau."
# 【ふかみ】
# display as 凪＆深美
# JP: 『「双鉄さんは」\n「にーさんは」』
1655 = "『「Anh Soutetsu」\n「Anh hai」』"
# monologue
# JP: ふたりの声が重なって。\nめずらしく、ふかみの方が言葉をつなぐ。
1860 = "Giọng của hai người hòa vào nhau. Hiếm khi, Fukami lại là người nói tiếp."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは……えと、その方がいい、です、か？\nふたり、なかよく――いっしょの方、が」
1627 = "「Anh Soutetsu... à ừm, muốn vậy hơn, đúng không, ạ? Hai đứa, hòa thuận——cùng nhau, á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだとも」
1540 = "「Tất nhiên rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「わかりました」
1455 = "「Em hiểu rồi ạ.」"
# monologue
# JP: 言って、頷き――\nけれどもふかみは、そこで惑って止まってしまう。
2153 = "Nói rồi, gật đầu—— Nhưng Fukami lại bối rối dừng lại ở đó."
# 【ふかみ】
# display as 深美
# JP: 「えっと……凪ちゃん。どうしよっか？」
1306 = "「Ừm... Nagi-chan. Phải làm sao đây?」"
# 【凪】
# display as 凪
# JP: 「仲良くばい？　そしたら――\nそうばい！　半分こしてあらうばい」
1253 = "「Hòa thuận á? Vậy thì—— Đúng rồi á! Chia đôi ra để kỳ cọ á.」"
# 【ふかみ】
# display as 深美
# JP: 「は、はんぶんこっ！？」
1173 = "「Ch, chia đôi á!?」"
# monologue
# JP: ボっと、ふかみが赤くなる。
2151 = "Mặt Fukami bỗng chốc đỏ bừng."
# monologue
# JP: なぜかは知らねど目をうるませて、\nちらちら、僕の方を見る。
1811 = "Không hiểu sao em ấy lại rơm rớm nước mắt, liếc nhìn về phía tôi."
# 【ふかみ】
# display as 深美
# JP: 「ええと……半分こ……って……\n凪ちゃん……どっちの、半分がいい――の？」
1304 = "「Ừm... Chia đôi... là... Nagi-chan... cậu muốn một nửa, bên nào——hả?」"
# 【凪】
# display as 凪
# JP: 「どっちでもよかとよ？\n右でん、左でん」
1279 = "「Bên nào cũng được á?\nBên phải, hay bên trái.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！　ああ！　そうね、半分――\n半分……うん。右半身と、左半身」
1321 = "「A! À! Đúng rồi, chia đôi—— Chia đôi... Ừm. Nửa người bên phải, và nửa người bên trái.」"
# 【凪】
# display as 凪
# JP: 「ん？　他にどぎゃん半分があっと？」
1357 = "「Hửm? Còn cách chia đôi nào khác nữa á?」"
# 【ふかみ】
# display as 深美
# JP: 「無い無い。無いよ？　それじゃ、ええと……\nわたし、右半分のお背中洗うね？」
1512 = "「Không có. Không có đâu! Vậy thì, ừm... Tớ, sẽ kỳ lưng nửa bên phải nhé?」"
# 【凪】
# display as 凪
# JP: 「なら、左ばもらうたいっ！」
1607 = "「Vậy thì, tớ lấy bên trái á!」"
# monologue
# JP: 二人それぞれ、あかすりを手に、\n仲良く石鹸を泡だてる。
1956 = "Hai người mỗi người cầm một miếng bọt biển, hòa thuận tạo bọt xà phòng."
# 【ふかみ】
# display as 深美
# JP: 「それじゃ……ええと……洗います、ね？」
1616 = "「Vậy thì... ừm... em kỳ cọ nhé?」"
# monologue
# JP: （シニュッ）
2362 = "（Xoạt）"
# 【凪】
# display as 凪
# JP: 「洗うばーい！　ごしごしするばーい！」
1524 = "「Kỳ cọ nha! Chà chà nha!」"
# monologue
# JP: （ゴシイッ！）
2368 = "（Xoạt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1358 = "「Ồ——」"
# monologue
# JP: これは、なんとも奇妙なものだ。
2283 = "Cảm giác này, thật là kỳ lạ."
# monologue
# JP: なまじふたりの息が合い、\nタオルを動かすリズムが全くおんなじだから――
1850 = "Hai người lại còn phối hợp ăn ý, nhịp độ di chuyển khăn tắm hoàn toàn giống hệt nhau——"
# 【ふかみ】
# display as 深美
# JP: 「かゆいとこ、とか……あったら、言ってくださいね？\nあの――コスって、ほしい、ところ、とか」
1565 = "「Chỗ nào ngứa... thì anh bảo em nhé? Cái đó——những chỗ, anh muốn, cọ, chẳng hạn.」"
# monologue
# JP: （シニュっ――シュッ――シュルっ――シュキュっ）
2359 = "（Xoạt——xoạt——xoạt——xoạt）"
# 【凪】
# display as 凪
# JP: 「痛かったらいうばい！　特別にゆるめてあげるばい！」
1567 = "「Đau thì nói á! Em sẽ đặc biệt nương tay cho á!」"
# monologue
# JP: （ごしっ！　ばりっ！　がりっ！　ごりっ！）
2375 = "（Xoạt! Xoạt! Xoạt! Xoạt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おおおおお」
1359 = "「Ồ ồ ồ ồ」"
# monologue
# JP: ――右半分は、ゆるゆると、絹の薄物でなぜられるよう。\n左半分はガリゴリと、木綿のサラシでしごかれるよう。
930 = "——Nửa bên phải thì nhè nhẹ, như được lụa mỏng vuốt ve. Nửa bên trái thì cọ xát, như bị vải bông thô ráp chà xát."
# monologue
# JP: まったく違う感触たちに背中を蹂躙されて、\nなんとも奇妙な気分にされて――けれども、実に心地よい。
2236 = "Bị hai cảm giác hoàn toàn khác biệt chà xát trên lưng, khiến tôi có một tâm trạng thật kỳ lạ——nhưng, quả thực rất dễ chịu."
# 【ふかみ】
# display as 深美
# JP: 「あれ？　ん？　この――汚れっ――よいしょっ」
1296 = "「Hả? Ưm? Vết bẩn——này——yoisho」"
# 【凪】
# display as 凪
# JP: 「にーさん、汚れ落ちなかとよー！\nいくらなんでも、汚しすぎばい！」
1395 = "「Anh hai, vết bẩn không sạch á! Dù thế nào thì cũng bẩn quá á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕方なかろう。石炭汚れを落とさぬままに、\n川の汚れまで付けたのだ」
1592 = "「Đành chịu thôi. Vết bẩn từ than đá chưa kịp rửa sạch, lại còn dính thêm cả bụi bẩn dưới sông nữa mà.」"
# monologue
# JP: だからわざわざ雨の中、\n登呂流湯までやってきたのだ。
2078 = "Vậy nên tôi mới cất công đội mưa đến tận nhà tắm Tororyu-yu này."
# monologue
# JP: ……ふかみを送って凪を送っての帰宅のことを考えたなら、\nいささか憂鬱を感じもするが。
940 = "...Nghĩ đến chuyện đưa Fukami và Nagi về nhà, tôi cũng cảm thấy có chút sầu não."
# 【ふかみ】
# display as 深美
# JP: 「え？　あれ……これ――汚れじゃ、ない？　の？」
1298 = "「Hả? Ơ... Đây——không phải vết bẩn? Sao?」"
# 【凪】
# display as 凪
# JP: 「あ、ほんとばい。にーさん、肌が……\n肌荒れ？　しとーと？」
1329 = "「A, đúng thật á. Anh hai, da của anh... Bị sần sùi? Á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　――ああ、それか」
1313 = "「Hửm? ——À, cái đó à.」"
# monologue
# JP: 背中を流してくれるものなどは、日々姫かハチロク、\n事情を知ってるものだけだから、うっかりしていた。
1823 = "Những người từng kỳ lưng cho tôi chỉ có Hibiki hoặc Hachiroku, những người biết rõ sự tình, nên tôi đã sơ ý."
# monologue
# JP: そういえばまだこの二人には、\n僕の過去のことを話してなかったか。
2266 = "Nhắc mới nhớ, tôi vẫn chưa kể cho hai người này nghe về quá khứ của mình nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、皮膚の移植のあとだ。\n過去に、ケガをしたことがあってな」
1597 = "「Đó là vết tích của việc cấy ghép da. Trong quá khứ, anh từng bị thương.」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？」
1274 = "「Hả!?」"
# 【凪】
# display as 凪
# JP: 「ケガ……って」
1267 = "「Bị thương... sao á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最高の病院につれていってもらったそうだからな。\n上手だろう。注意して見ねば、ほとんどわからん」
1461 = "「Nghe nói anh đã được đưa đến bệnh viện tốt nhất. Họ làm khéo lắm nhỉ. Nếu không chú ý nhìn thì gần như không nhận ra đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「ん――」
1303 = "「Ưm——」"
# monologue
# JP: （ざばあっ！）
2366 = "（Ào!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1291 = "「Ây da.」"
# monologue
# JP: 湯をかけられて、\nつるりとした感触に肌を滑られる。
2250 = "Bị dội nước nóng lên người, làn da trơn trượt bởi một cảm giác mượt mà."
# monologue
# JP: 凪のぷりっとした指が、僕の傷跡をなぞってる。
1896 = "Những ngón tay mềm mại của Nagi mơn trớn dọc theo vết sẹo của tôi."
# 【凪】
# display as 凪
# JP: 「ケガって――こぎゃんと、広かとを？」
1266 = "「Bị thương——rộng đến, mức này á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。鉄道事故でな。\n死んでもおかしくなかったそうだ」
1350 = "「Ừ. Do tai nạn đường sắt. Nghe nói lúc đó anh có chết cũng không lạ đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　鉄道、事故――ですか？」
1293 = "「Hả!? Tai nạn, đường sắt——sao ạ?」"
# 【凪】
# display as 凪
# JP: 「い、いつのこと……ばい？」
1500 = "「T, từ lúc nào... vậy á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「小さな頃だ。今の凪とふかみより、\nもっと幼かったころ――」
1488 = "「Lúc còn nhỏ. Khi đó anh còn nhỏ hơn Nagi và Fukami bây giờ nhiều——」"
# monologue
# JP: 湯のせいか、疲れのせいか、\n背中を流す泡が同時に、何かを流してくれたのか。
1810 = "Không biết do nước nóng, do mệt mỏi, hay là những bọt xà phòng kỳ lưng đồng thời cũng gột rửa đi thứ gì đó."
# monologue
# JP: おどろくほどに穏やかに、\n過去を、事故を、僕はふたりに、話せてる。
2070 = "Một cách bình tĩnh đến kinh ngạc, tôi đã kể cho hai người họ nghe về quá khứ, về vụ tai nạn đó."
# 【双鉄】
# display as 雙鐵
# JP: 「――と、いうわけで僕は右田の養子となった。\nそして、御一夜にやってきたのだ」
960 = "「——Chính vì thế, anh đã trở thành con nuôi nhà Migita. Và rồi, anh chuyển đến Ohimitera.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんに……そんなことが――」
1628 = "「Anh Soutetsu... lại từng trải qua chuyện như vậy——」"
# 【凪】
# display as 凪
# JP: 「じゃっけん、にーさんはあんまり……」
1468 = "「Bởi vậy nên, anh hai mới không hay...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1314 = "「唔？」" 
# monologue
# JP: 珍しく、凪が言いかけて口をつぐむ。
1893 = "Hiếm khi thấy Nagi đang nói dở lại ngập ngừng ngậm miệng lại."
# monologue
# JP: 言葉を探しあぐねてるようで、\nこちらがやきもきさせられる。
1959 = "Con bé có vẻ đang chật vật tìm từ ngữ, khiến tôi cũng phải sốt ruột theo."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　聞きたいことがあるなら、答えるぞ？」
1435 = "「Sao thế? Nếu có gì muốn hỏi, anh sẽ trả lời mà?」"
# 【凪】
# display as 凪
# JP: 「にーさんは、じゃけん……\nあんまり、笑ったり、怒ったり――泣いたり、せんと？」
1391 = "「Anh hai, vì thế nên... Mới ít khi cười, hay tức giận——hay khóc, đúng không á?」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！」
1419 = "「Nagi-chan!」"
# monologue
# JP: 慌てたようなふかみの言葉が、\n凪の言葉をかえって鋭く際立てる。
2140 = "Lời nói hốt hoảng của Fukami lại càng làm cho câu hỏi của Nagi trở nên sắc bén hơn."
# monologue
# JP: ああ、そうか――\nあまり自覚はなかったが……
1939 = "À, ra là vậy—— Tôi không nhận thức được điều đó lắm, nhưng..."
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、泣かんな。怒ることもまず無いか。\n笑うのは……そこそこ笑ってはいると思うが――」
971 = "「...Đúng là anh không khóc. Cũng hiếm khi tức giận. Còn cười thì... anh nghĩ mình cũng cười khá nhiều đấy chứ——」"
# 【ふかみ】
# display as 深美
# JP: 「…………え、と」
968 = "「............À, ừm.」"
# 【凪】
# display as 凪
# JP: 「よし！　決めたばいふかみちゃん！」
1407 = "「Được rồi! Tớ quyết định rồi á Fukami-chan!」"
# 【ふかみ】
# display as 深美
# JP: 「え！？　ちょ、凪ちゃんっ！？」
1292 = "「Hả!? Ch, chờ đã, Nagi-chan!?」"
# monologue
# JP: (ザバンっ！！）
31 = "(Ào!!)"
# monologue
# JP: 凪は猛烈な勢いで、\n自分自身に頭の先から、湯おけに掬った湯をかける。
1900 = "Nagi dùng sức mạnh mẽ, múc một chậu nước nóng dội thẳng từ đỉnh đầu mình xuống."
# 【凪】
# display as 凪
# JP: 「恩返しばい！　ふかみちゃんとふたりで、\nにーさんに泣いたり笑ったり怒ったりさせたげるばい」
1286 = "「Báo ân á! Tớ và Fukami-chan sẽ cùng nhau, làm cho anh hai phải khóc, phải cười và phải tức giận mới được á.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　いい！　それ、すごくいいっ！」
1323 = "「A! Được đấy! Ý đó, tuyệt lắm!」"
# monologue
# JP: 言って、慌ててふかみは両手で口を押さえる。\n押さえたままでもごもごと、ごく控えめに問いかけてくる。
2132 = "Nói xong, Fukami vội vàng dùng hai tay bịt miệng lại. Trong khi vẫn bịt miệng, em ấy lúng búng hỏi tôi một cách vô cùng rụt rè."
# 【ふかみ】
# display as 深美
# JP: 「もちろん、あの……双鉄さんが……迷惑だったり、\nいやじゃなかったり――だったら、ですけど」
1542 = "「Tất nhiên, chuyện đó... nếu anh Soutetsu... không thấy phiền, hay không ghét——thì mới được ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「イヤでも迷惑でも無いぞ。大歓迎だ」
1511 = "「Không ghét cũng không phiền đâu. Rất hoan nghênh là đằng khác.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1320 = "「啊！」" 
# 【凪】
# display as 凪
# JP: 「やったばーい！」
1398 = "「Tuyệt quá á!」"
# monologue
# JP: 何がそんなに嬉しいのか、\nふかみと凪は手をとりあって、満面の笑顔を浮かべてる。
1815 = "Không biết có chuyện gì mà vui đến thế, Fukami và Nagi nắm tay nhau, nở nụ cười rạng rỡ trên khuôn mặt."
# monologue
# JP: そんな姿を見ていると、\nうらやましい、と、心のどこかが、また思う。
2190 = "Nhìn thấy cảnh tượng đó, một góc nào đó trong tim tôi lại dấy lên cảm giác ngưỡng mộ."
# 【双鉄】
# display as 雙鐵
# JP: 「泣いたり、笑ったり、怒ったりか――」
1301 = "「Khóc, cười, hay tức giận sao——」"
# monologue
# JP: 忘れてるなら、思い出したい。\n素直に思う。
2092 = "Nếu đã quên, thì tôi muốn nhớ lại. Tôi thành thật nghĩ vậy."
# monologue
# JP: 凪とふかみと一緒なら、\nそう出来そうにも、感じてる。
2063 = "Nếu ở cùng Nagi và Fukami, tôi cảm thấy mình có thể làm được điều đó."
