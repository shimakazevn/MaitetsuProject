# 【凪】
# display as 凪
# JP: 「凪、さまっ――頭――おバカに、なる――けんっ――\nきもちいいので――全部――チカチカ、とんじゃっ、て」
1312 = "「本小姐的……腦袋……都要飄了……太舒服了……腦袋裡的東西都要飛了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――凪に――そうなって、ほしい」
1282 = "「我……倒希望你能變成這樣」" 

# monologue
# JP: （きゅううううっっ！！！）
1835 = "（箍！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！」
1160 = "「唔！！！」" 

# monologue
# JP: 耳元にささやきかけた瞬間、凪のおまんこが一気に締まる。\nあやうく吐精しかけるが、今度も一緒にと願って耐える。
1709 = "隨著我在她耳邊的一聲低語，凪的下面一下箍緊了。我差點射出來，但這次我也想和她一起高潮，忍住了。" 

# 【凪】
# display as 凪
# JP: 「ぁっ――ふあっ――どぎゃ、して――っ――どうして、\nにーさ――あ――凪、さまに――そうして、ほし、かと」
1173 = "「啊……啊……為什麼……為什麼……大哥哥……啊……會想讓本小姐……變成那樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その――方が、確率が高まるように――思う、から」
1258 = "「因為那樣……機率會更高……」" 

# monologue
# JP: （ずりゅっ！　こりゅっ！　じゅこっ！　くりゅん）
1807 = "（插！轉！插！轉！）" 

# 【凪】
# display as 凪
# JP: 「んひゅっ！？　あっ――あっ――か、確率、て――\nふあっ！　なんの――どんな――確率――っと？？」
1134 = "「呀？！啊……啊……什、什麼機率……啊！是……什麼東西……的機率？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「決まって、いる――ここ、からっ」
1359 = "「這還用問……接下來」" 

# monologue
# JP: （むみゅっ！）
1804 = "（揉！）" 

# 【凪】
# display as 凪
# JP: 「ひゃうんっ！！！」
# 1131 = "「呀！！！」" 

# monologue
# JP: わざと強めに乳首を揉み潰してもなお、\n凪の嬌声は限りなく甘くかわいらしい。
1629 = "我故意用力地揉捏乳頭，但凪的嬌喘依然非常之甜蜜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お望み、どおりの――お乳を――母乳を――\n凪が――たくさん――出せる、ように、なる――っ！」
1272 = "「如你所願……我來幫你出奶……讓你能流出許多的母乳……啊！」" 

# monologue
# JP: （きゅうううううんっっつ！）
1836 = "（箍！）" 

# 【凪】
# display as 凪
# JP: 「あ！　わかると！　きっと、そうっ！　にーさんと、\n凪さま――んっ――一緒に、一番、きもち、よくっ――」
1207 = "「啊！知道了！肯定是的！只要大哥哥跟本小姐……嗯……一起做到最舒服……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その方が――きっと――受精の――着床、の\n――その――確率、がっ――」
1295 = "「是啊，這樣……懷孕的……機率……肯定……」" 

# 【凪】
# display as 凪
# JP: 「は――あ――にーさんの、精子ば、受精、して……\nんっ――（ゴクッ）――凪さまの、卵子が――着、床」
1175 = "「啊……啊……用大哥哥的精子……懷孕……嗯……（咕咚）本小姐的卵子……會受精」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1194 = "「啊！」" 

# monologue
# JP: （ぐりゅん！！）
1810 = "（插！）" 

# 【凪】
# display as 凪
# JP: 「にーさん！　にーさん！　にーさん！　にーさぁん！」
1259 = "「大哥哥！大哥哥！大哥哥！大哥哥！」" 

# monologue
# JP: （ずりゅっ！　じゅぼ！！　ずちゅっ！　ばちゅっ！！）
1806 = "（插！插！插！插！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　凪！　凪！　凪！」
1111 = "「凪！凪！凪！凪！」" 

# monologue
# JP: 不意の加速にもきっちり動きをあわせられる。\n凪と僕とはこころまで、この一瞬は重ねあえてる。
1541 = "即使我忽然加速，凪也能配合上來。在這一瞬，我們倆的身心全部合為一體。" 

# monologue
# JP: （じゅぶ！　ごちゅっ！　きゅぽっ！　ばちゅん！）
1783 = "（啾！啾！啾！啾！）" 

# 【凪】
# display as 凪
# JP: 「ふあっ！　あっ！　あ！　あっ！\nあっ！　あっ！　あっ！　あっ！！！」
1203 = "「啊！啊！啊！啊！啊！啊！啊！啊！！！」" 

# monologue
# JP: 汗と愛液の入り交じる、おんなの匂いが更に濃くなる。\n子宮口が、いちいちべっとり貼り付いてくる。
1668 = "汗液與愛液混在一起，女人的味道更加濃郁了。子宮的入口緊緊吸附著我。" 

# monologue
# JP: （きゅぶっ！　ぐぢゅっ！　ちゅぼっ！　ばつっ！！）
1782 = "（啾！啾！啾！啾！！）" 

# 【凪】
# display as 凪
# JP: 「にーさん！　しゅきっ！　すきっ！　たくさん、\nたくさんっ！　だいすき！　だいすき、すいとー、と！」
1260 = "「大哥哥！愛你！愛你！愛死了，愛死了！愛你！愛死你了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、凪っ――んっ！！」
1284 = "「我也一樣，凪……嗯！！」" 

# monologue
# JP: キスの代わりにうなじに吸い付き、\n凪の甘やかな髪の匂いを思いっきりに胸まで落とす。
1630 = "我沒有吻凪，而是吸住了她的脖頸，將她頭髮的甜美香氣一口吸進肺裡。" 

# monologue
# JP: （じゅぶっ！　ごちゅっ！　ずきゅっ！　ぢゅばっ！）
# 1783 = "（啾！啾！啾！啾！）" 

# 【凪】
# display as 凪
# JP: 「ふあ！　あっ！　あっ！　あっ！　にーさん！\nにぃさぁんっ！　うちっ！　うちっ！　もうっ！！」
1204 = "「啊！啊！啊！啊！大哥哥！大哥哥！咱，咱……快了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだっ――凪っ！！！」
1285 = "「我也是……凪！！！」" 

# monologue
# JP: （ずりゅううううううううううううううっっっっ！）
# 1810 = "（插！）" 

# 【凪】
# display as 凪
# JP: 「はひゅっ！！！！！」
1192 = "「啊呀！！！！！」" 

# monologue
# JP: 睾丸がもう破裂しそうで、いますぐにでも射精したくて。\n凪の願いを叶えたいから、突くと同時に乳首を強くっ！
1641 = "我的睪丸幾乎要碎裂，差點沒控制住強烈的射精欲。我想實現凪的心願，所以在突刺的同時給乳頭施加了強烈刺激！" 

# monologue
# JP: （もみゅっ！　ぶぢゅううううつっっっ！　ごちゅっ！）
1800 = "（揉！按！捏！）" 

# 【凪】
# display as 凪
# JP: 「ぃっ――ぁっ――～～～～～～～～っっっっっ！！」
1124 = "「呀……啊……啊！！」" 

# monologue
# JP: （きゅううううっ！！！！！）
1834 = "（箍！！！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！」
# 1211 = "「啊！！！！」" 

# monologue
# JP: （ぶびゅっ！　どびゅっ！　びゅるるっ！　ぼびゅっ！）
# 1778 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「ひゃうっ！　あっ――ふあっ！　あっ！　おまんこっ！\nしきゅうっ――あちゅいのっ――おっぱいっ――ふ、あ」
1128 = "「呀！啊……啊！啊！下面滋滋地……進來了燙燙的……胸部也……啊」" 

# monologue
# JP: （びゅっ！　ぶりゅっ！　びゅぶっ！　びゅううっ！）
# 1778 = "（咻！咻！咻！咻！）" 

# monologue
# JP: 射精しながら、意識の99％を勃起に奪い取られつつ、\nそれでも指は、凪の乳首を押してはもんで潰してく。
1556 = "在射精的同時，我的意識也有９９％被勃起奪去，但是手指卻依然堅持在揉弄凪的乳頭。" 

# 【凪】
# display as 凪
# JP: 「やっ――はっ――すごっ――あつ、くてっ――っ――\nびゅ、びゅて――子宮――たたいて――おっぱい、も」
1126 = "「呀……啊……好棒……這麼燙……啊……咻咻的……打在……子宮上……還有胸部也被……」" 

# monologue
# JP: （ぶっ！　びゅうっ！　――びゅるっ――ぷぴっ――）
1776 = "（咻！咻！咻……滋……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――はあっ――はあっ――はあっ――はあっ」
1163 = "「啊……呼……呼……呼……呼」" 

# 【凪】
# display as 凪
# JP: 「はっ――あっ――ふあっ――んっ――\nにぃさぁん――にーさぁんっ」
1167 = "「啊……啊……呼……嗯……大哥哥……大哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
# 1103 = "「凪」" 

# monologue
# JP: 脱力しきって甘えて来る声。\n僕も脱力しきっているが、応えたくって――っ！！！？
1515 = "凪的聲音是徹底脫力之後的撒嬌聲音。我也徹底脫力了，但我很想回應她……啊？！" 

# monologue
# JP: （ずきっ！！）
1831 = "（疼痛！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛っ！！！」
1340 = "「痛！」" 

# 【凪】
# display as 凪
# JP: 「えっ！！？」
# 1215 = "「啊？！」" 

# monologue
# JP: ゆるみきってた凪の体が一瞬にして固くなる。
1498 = "凪本來已經軟透了的身體一下就僵硬了。" 

# 【凪】
# display as 凪
# JP: 「にーさん！？\nひょっとして、さっきぶつけたところ痛むと！！？」
1263 = "「大哥哥，是不是剛才打到的地方痛？！」" 

# monologue
# JP: 声をはっきり出してしまった。\nこれは恐らく、ごまかす方が凪を苦しめる形となろう。
1603 = "我不小心說出來了。要是再搪塞，只會讓凪自責。" 

# 【双鉄】
# display as 雙鐵
# JP: 「少しだ、少し。ほんの少し。思いっきりに射精して、\n満足しきって緩んでしまって――痛みがそれで少しだけ」
1073 = "「一點而已，就一點，一點點。因為射得太舒服了，我很滿足，一下就放鬆了……所以才會有一點疼」" 

# 【凪】
# display as 凪
# JP: 「なら」
1363 = "「那就好」" 

# monologue
# JP: （くにいいいいいいいっ！！）
1816 = "（撐！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: 凪が思い切り拡げてみせる。\n精子が溢れるおまんこではなく――
1504 = "凪用手指撐開的，並不是漫出精液的下體。" 

# 【凪】
# display as 凪
# JP: 「もういっかい、痛いの痛いのとんでけ、する、と？」
1350 = "「要不要再給你舒服舒服？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。――とてもいい」
1268 = "「好主意……非常好」" 

# monologue
# JP: こころの底から同意して。\n放置していた凪のアナルに、亀頭をにちゃりと貼り付ける。
1622 = "我打從心底同意。於是我將龜頭頂在了凪一直沒有被我玩弄的肛門上。" 
