1779 = "（啪！！！）" 

# 【凪】
# display as 凪
# JP: 「あっ！？」
1194 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！！？」
1079 = "「什麼？！」" 

# monologue
# JP: （どすっ！！！）
1841 = "（飛！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っっっっ！！！！」
1209 = "「啊！！！」" 

# monologue
# JP: 重っ――熱っ！？　いや――
1566 = "好重……很燙？！不對……" 

# 【凪】
# display as 凪
# JP: 「ほえっ！？　凪さまの木刀折れたと！！！？」
1150 = "「哎？！本小姐的木刀斷了？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛――――――つっっっ」
1337 = "「痛……痛」" 

# 【凪】
# display as 凪
# JP: 「その声っ！？　って、わあああああ？！\nまさか、まさかにーさんに折れた木刀あたったと！！？」
1358 = "「這聲音……啊，哇？！難道，難道折斷的木刀打到大哥哥了？！」" 

# 【凪】
# display as 凪
# JP: 「わあああ！？　にーさ、にーさん、どこあたったと！？\nうちっ、うちおんぶするけんっ！　すぐ病院に」
1147 = "「哇？！大哥哥，大哥哥，打到你那裡了？！咱、咱背你！立刻去醫院」" 

# 【双鉄】
# display as 雙鐵
# JP: 「い――――や……そこまでは、いた、らん」
1319 = "「沒事……還沒那麼誇張」" 

# monologue
# JP: いたいが、いたらん。\nくだらないことを考えて、わずかでも気をおちつける。
1595 = "很痛，但問題不大。我想了一些無聊的事情，轉移了注意力。" 

# 【凪】
# display as 凪
# JP: 「ばってん！」
1123 = "「可是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「当たりどころがよかったようだ。太ももの付け根だ。\nひどく痛むが、柔らかく丈夫そうなところではあるし」
1320 = "「沒打中要害，打中的地方是腿根。很痛，不過這個部位很軟也很耐打」" 

# 【凪】
# display as 凪
# JP: 「太もものつけねばい！！？」
1349 = "「腿根？！」" 

# monologue
# JP: (がばっ！）
1797 = "（推倒！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1146 = "「哇？！」" 

# monologue
# JP: 不意を突かれてすごい力で押し倒される。\nというかこれは――この体勢は……
1601 = "意料之外的是，凪用力推倒了我。現在，我們這姿勢……" 

# monologue
# JP: （じーーーーーっ）
1832 = "（盯……）" 

# 【凪】
# display as 凪
# JP: 「どこばい？　あ！　こことね！？　うっわ、真っ赤！\n――にーさん、まっことごめんなさい」
1154 = "「哪裡？啊！就這裡是吧！哇，紅透了！大哥哥，真是太對不起咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「い、いや。声かけをしなかった僕が悪い。\n集中の邪魔をしては、と思ったのだが――」
1318 = "「沒、沒事，這也要怪我沒叫你。本來我只是不想打擾你專注地練刀」" 

# monologue
# JP: 接近前に声をかけ、修行の手をとめてもらって近づけば、\n間違いなく、こんな事態を招かず済んだ。
1567 = "如果我在靠近前跟她搭話，讓她停下來再靠近，肯定不會發生這樣的事情。" 

# 【凪】
# display as 凪
# JP: 「修行に夢中になってにーさんの気配ばとれなかった\nうちが未熟――ああっ――（ふーっ、ふーっ）」
1298 = "「是我沉浸於練刀，沒注意到大哥哥……啊（呼——呼——）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1215 = "「啊？！」" 

# monologue
# JP: 凪が僕の打ち身部分にふぅふぅ息を吹きかけてくる。\nその度ごとに、顔の真上のスパッツの股間が妖しく揺れる。
1494 = "凪在我被打中的部位吹起氣來。每吹一口，她的胯下都會在我眼前怪異地搖晃。" 

# 【凪】
# display as 凪
# JP: 「（ふーーーっ、ふーーーっ、ふーーーっ、ふーーーっ）\nああ、赤いの少しも引かんばい――にーさん、痛かと？」
1379 = "「（呼——呼——呼——呼——）噢，紅色變淺了。大哥哥，還痛嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、全く痛まぬといってしまえばウソになるが……」
1246 = "「嗯，只有一點點痛了……」" 

# monologue
# JP: 全力修行を終えたばかりの、汗で濡れまくる凪の股間。\n熱気と匂いがスパッツで蒸れ、僕の性欲を煽り立てる。
1537 = "剛剛結束拚盡全力的練刀，現在凪的胯下滿是汗水。一股熱氣與氣味撲面而來，刺激了我的性慾。" 

# 【凪】
# display as 凪
# JP: 「ああ……これ、ぺろぺろして冷やした方が」
1152 = "「哦……還是舔一舔更容易涼下來吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪――ぺろぺろするなら」
1117 = "「別，凪……如果你要舔的話」" 

# 【凪】
# display as 凪
# JP: 「え？　わっ――わわわわわわわっ！？」
1214 = "「啊？哇……哇哇哇哇哇？！」" 

# monologue
# JP: 凪の舌先を思った瞬間、自分でも呆れるくらいに勃起する。\n言葉は止まり、ふーふーと鼻息だけが亀頭にかかる。
1437 = "一想到凪的舌尖，我的下體就可恥地硬了起來。我們陷入了沉默，只有凪的鼻息打在我的龜頭上。" 

# 【凪】
# display as 凪
# JP: 「（ふー、ふーっ――ごくっ）。\n……にーさん、痛いんじゃなかったと？」
1137 = "「呼——呼——咕咚……大哥哥，你痛不痛？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「痛いは痛いが、それ以上に、な」
1334 = "「疼是痛，但還有更重要的問題」" 

# monologue
# JP: （くぱあっ）
1815 = "（撐開）" 

# 【凪】
# display as 凪
# JP: 「ひゃうっ！！？」
1132 = "「呀？！」" 

# monologue
# JP: スパッツ越しに目星をつけて、凪のおまんこを指で広げる。\n触った瞬間、嬉しくなる。ここでの修行時は大抵そうだが、
1650 = "我隔著緊身短褲，用手指撐開了凪的下體。一碰到我心裡就一陣開心。我就知道她練刀的時候都這樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ノーパンか」
1084 = "「你沒穿內褲啊」" 

# 【凪】
# display as 凪
# JP: 「しゅ、修行のときは邪魔やけん――\n移動のときは、ちゃんと上からズボンば履くし」
1346 = "「穿、穿著練刀的時候會礙事咧。反正離開的時候，咱會在外面套層褲子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nこんなにやらしく可愛い凪を他の人間に見せるなど――」
1292 = "「是啊，我可不想讓人看見你這麼下流而可愛的一面」" 

# monologue
# JP: （さすっ）
1812 = "（摩挲）" 

# 【凪】
# display as 凪
# JP: 「くひゅんっ！！！」
1242 = "「嗯！！！」" 

# monologue
# JP: 右手でおまんこを開いたままに、\n左手の中指に人差し指を添え、ざらりと荒く縦に這わせる。
1633 = "我用右手維持著撐開小穴的姿勢，用左手的中指粗暴地開始上下往返。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても僕には耐えられん。\n凪のエッチな姿はいつも、僕だけが独占していたい」
1287 = "「我可忍不住了。我想永遠獨占你下流的模樣」" 

# 【凪】
# display as 凪
# JP: 「もちろんばい！　凪さまだって、にーさん以外の\nだぁれにもこぎゃん姿……ば……こぎゃん……姿――ば」
1331 = "「當然咧！本小姐也不想給除了大哥哥之外的人看到這副模樣……這副……模樣……」" 

# monologue
# JP: スパッツからはみ出る腿がみるみるうちに朱に染まる。\nこれがどういう体勢か、ようやく理解したらしい。
1678 = "眼看著緊身短褲箍著的腿就紅了起來。她似乎終於理解了現在我們是怎樣一副姿勢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「スパッツ越しでも、凪のおまんこの湿気を感じる。\n熱気もすごいな。むわりとしている」
1370 = "「隔著緊身短褲我都能感覺到你下面的濕氣，而且還很燙，熱氣騰騰的」" 

# 【凪】
# display as 凪
# JP: 「そ、それは汗とか――そのっ、\n修行ば頑張ってた、そのせいばい」
1357 = "「這、這是汗水……是因為咱一直在努力練刀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったか」
1119 = "「原來是這樣啊」" 

# monologue
# JP: （すりっ――すりっ――すりっ――くぷっ）
1813 = "（摩擦）" 

# 【凪】
# display as 凪
# JP: 「ふぁんっ！！！」
1145 = "「哇！！！」" 

# monologue
# JP: スパッツの上から指を押しこみ、凪の膣口を刺激する。\n右手の親指をゆるく使って、クリトリスも撫でさする。
1649 = "我隔著緊身短褲，用手指按壓刺激凪的入口。同時我還用右手的拇指輕輕撫摸起陰蒂。" 

# 【凪】
# display as 凪
# JP: 「あ……ん……ふぁっ――あっ――にーさん……\nもっと――もっと、強く――んっ――強く、して」
1185 = "「啊……嗯……啊……啊……大哥哥……用力……用力點……嗯……再用力點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ」
1316 = "「求之不得」" 

# monologue
# JP: （こしゅっ！　くにっ！　じゅむっ！　すりゅんっ！）
1823 = "（擦！按！擠！壓！）" 

# 【凪】
# display as 凪
# JP: 「ふあっ――あっ！　よか、ばいっ――んっ――\nにーさんの、指――いつもと、感触――違くて――んっ」
1143 = "「哇……啊！舒服……嗯……大哥哥的手指……感覺和平時……不一樣……嗯……」" 

# monologue
# JP: 体が揺れれば、シャツ越しの凪の乳房の丸みが強調される。\n思いっ切りに揉みしだきたい。思えば勃起も震えてしまう。
1662 = "每次晃動身體，凪的圓潤乳房就會隔著襯衫晃動。我想用力去揉弄。一想到這裡，我的勃起就顫抖起來。" 

# 【凪】
# display as 凪
# JP: 「あ！　あ……そうだった、とね。うち……凪、さま――\nにーさんの痛かとを、とんでけ～してあげるとね」
1197 = "「啊！啊……也對，咱……本小姐……得消除大哥哥的疼痛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。思いっきりに気持ちよく、\nびゅうびゅうと飛ばしてもらえると助かる」
1291 = "「是啊，幫我一次性射個痛快吧」" 

# 【凪】
# display as 凪
# JP: 「にへへっ！　にーさん、エッチでおバカさんとね～」
1251 = "「嘿嘿嘿！大哥哥真是個下流的小笨蛋」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪のおかげで、僕も男になったからな。\nそうして、男というものは――」
1329 = "「畢竟是你讓我成了男人啊。而男人這種生物……」" 

# monologue
# JP: ぐ、ぐと腰を突き出して、凪の唇に勃起を当てる。\n凪は小さく口をあけ、焦らしているのか、舌先だけを――
1614 = "我將腰向前挺，讓勃起頂在了凪的唇上。她微微張口，只伸出舌尖，似乎是想挑逗我。" 

# 【凪】
# display as 凪
# JP: 「ぴちゃっ――ぺろっ――ぺろっ――ぺろっ――\nれりゅっ――ぺちょっ――ぺろっ――ぺろっ――」
1216 = "「啾……啾……啾……啾……啾……啾……啾……啾……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ……くっ――くはっ――こんな状況に陥れば――\n知能指数をどんどんと――精液に溶かすものなのだ」
1165 = "「啊……唔……啊……陷入這種情況之後……感覺智商都化成精液了」" 

# 【凪】
# display as 凪
# JP: 「まっことばい？　うふふ～ん。\nそうしたらー――凪さまー――くぽっ！」
1342 = "「真的假的？嘻嘻，這樣的話，本小姐……啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっ！」
# 1194 = "「啊！」" 

# monologue
# JP: 凪がくっぽり、僕の亀頭を咥えてくれる。\n咥えたままで、舌をねろりとカリ首一周させてくれる。
1503 = "凪猛地將我的龜頭銜住。她保持著銜住的姿勢，然後用舌頭沿著冠狀溝走了一圈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ――それは――効くっ」
1177 = "「啊……啊……這……太爽了」" 

# 【凪】
# display as 凪
# JP: 「ひーはんほへーへひほんはら――んっ――ヂュルッ――\nれるっ――ん――あふぁはは、ひょふひゃっはふほへ～」
1121 = "「原因在大哥哥——啾嚕啾嚕——啾噗啾噗，噗哈——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――多分、な。因果、関係、だけを、見る、なら。\n実際――く、あ――今までも――凪は、僕の、精液、を」
1239 = "「嗯……大概吧。只看因果關係的話是這樣的。實際上……呃，啊……你之前也總是喝我的……」" 

# 【凪】
# display as 凪
# JP: 「あ――ちゅむっ――ちゅうううううっ――れるっ――\nちむっ――ちゅ、ちゅぶっ――んっ――ほんふぉはぁひ」
1182 = "「啊……啾……啾……啾……啾……啾、啾……嗯……還真是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くふっ」
1156 = "「唔」" 

# monologue
# JP: 凪の頭が上下を始める。フェラチオの濃度を高めつつ、\n思い出したように、おしゃべりの、舌の動きを混ぜてくる。
1521 = "凪的腦袋開始上上下下。她一邊給我口交，一邊說著話，兩種動作混合在一起。" 

# 【凪】
# display as 凪
# JP: 「んっ――ちゅむっ――れるっ――なふぃ、はま――\nむちゅ――ひーはんほ――へいへひ――ほんへ――んっ」
1237 = "「嗯……啾……啾……本小姐……啾……都怪大哥哥——嗯」" 

# monologue
# JP: しゃべりとしゃぶりを、凪は両立させている。\n言葉を紡ぐ動きと同時、カリ首を甘く攻め立ててくれる。
1490 = "凪一邊說話一邊含著我的下體，在說話的同時，還對我的冠狀溝展開甜蜜的攻擊。" 

# 【凪】
# display as 凪
# JP: 「はーふはん――ほん、へ――ちゅむっ――れるっ――\nひほんは、ほほは――ほほへはひ――ぢゅう――ちゅむ」
1366 = "「都怪大哥哥——啾嚕——讓我學會了那麼多東西——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――っ――」
1183 = "「啊……嗯……」" 

# monologue
# JP: いろんなことを、確かにふたりで一緒に覚えた。\n学んだ成果を、凪はすぐさま、いつでも実践してく――！
1607 = "我們倆確實一起學到了不少事情。而凪總會立刻將學習的成果投入實踐……啊！" 

# 【凪】
# display as 凪
# JP: 「ずじゅ～～～～～～～～～～～～～～～～～っ！！！」
1223 = "「啾～～～～～～～～～～～～～～～～～滋！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: そうして凪は、一度マスターしたことは、\n決して忘れず、幾度であろうと愚直なまでに繰り返し――
1446 = "並且只要學會了一次，凪就永遠不會忘記，而且會老實地重複許多次……" 

# 【凪】
# display as 凪
# JP: 「ぐぽっ！　ぢゅぼっ！　ちゅぶっ！　ちゅううっ！\nくっ！　りゅっ！　ちゅううっ！　（はみっ！！）」
1219 = "「啾！啾！啾！啾！啾！啾！啾！（咬）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ――ぁあっ！」
1169 = "「啊……啊……啊！」" 

# monologue
# JP: 舐められしごかれ尿道口の割れ目に尖らせた舌を入れられ\n吸われ唇で覆った歯でカリを咥えられ――
1501 = "凪激烈地舔弄著我，將舌頭戳進尿道口的裂縫吸吮，用舌頭咬我的冠狀溝……" 

# 【凪】
# display as 凪
# JP: 「じゅうううううっ！　ずぼっ――ごっ！！！！\nじゅるううううっっっ！　ずびょっ！――ぎゅっ！！」
1221 = "「啾！滋……咕！啾！滋！啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――はっ――くううっ――――っ！」
1135 = "「呃……啊……唔……啊！」" 

# monologue
# JP: 喉の奥まで使っての長いストロークで刺激され――\n今までに学んだ弱点全部を凪は愚直に責めてきて
1654 = "接著她將我深深地含住。至今為止我所有被她學到的弱點都被她攻了個遍。" 

# monologue
# JP: （このままだと――一方的に――射精させられるっ！）
1840 = "（這樣下去……我會單方面被她搞射精！）" 

# monologue
# JP: 無論、それとて大変幸せな結末だ。\nけれどもしかし、せっかくのこの体勢であるのだから――
1674 = "當然，這是一種幸福的結局。但是難得現在是這種姿勢……" 

# monologue
# JP: （くりゅんっ！！！）
1795 = "（按！！）" 

# 【凪】
# display as 凪
# JP: 「んひゅんっ！！！？」
1157 = "「唔嗯？！」" 

# monologue
# JP: 親指で軽くクリトリスを撫ぜ、ふにふに軽く揉み潰すよう、\n何度も何度も円を描いて愛撫する。
1637 = "我用拇指輕撫陰蒂，同時稍稍用力按下，反覆畫著圈。" 

# 【凪】
# display as 凪
# JP: 「ん――ぷあっ！　あ……にーさん、ん……そぎゃん、\nされ、たら――ふあっ――凪、さま――しゅう、ちゅう」
1236 = "「嗯……啊！啊……大哥哥，嗯……你這樣，啊……本小姐的……注意力」" 

# monologue
# JP: にじむ愛液に驚かされる。凪も相当に出来上がってる。\nこれならば、この体勢でふたり同時に達することも――
1602 = "愛液滲了出來，嚇了我一跳。凪也差不多了。照這樣下去，我們完全可以以這個姿勢一起高潮。" 

# monologue
# JP: （さすっ――くりゅっ――こにゅっ――くしゅんっ）
1837 = "（輕戳……慢捻……撫摸……挑動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「集中が、どうした？」
1087 = "「你的注意力怎麼了？」" 

# monologue
# JP: 左手は膣前庭をゆっくりゆっくり撫でながら、\n不意打ちぎみに膣口へ、ぐいとスパッツを押し込んでみる。
1636 = "我用左手撫摸著她的陰道前庭，一邊試著猛地隔著緊身短褲在入口處按了下去。" 

# 【凪】
# display as 凪
# JP: 「凪、さまっ――おくち、――集中、できん、とっ――\nんっ――にーさんの――おちんちん、ば――ぺろ、ぺろ」
1307 = "「本小姐……注意力……沒辦法集中在嘴上了……嗯……沒辦法好好……舔大哥哥的……雞雞了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほほう」
1296 = "「是嗎」" 

# monologue
# JP: 凪の膣口は挿入を求めてヒクつている。\nスパッツ越しにも吸い付く動きをはっきり感じる。
1509 = "凪的入口正尋求著插入而在顫抖。隔著緊身短褲我都能感覺到她那裡在蠕動著想吸附我的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、凪は、例えば剣術の試合においても――」
1364 = "「那麼，你在劍術比賽的時候……」" 

# 【凪】
# display as 凪
# JP: 「っ！！！！　（はぷっ！！！！）――れるっ！\nじゅううううっ！　ずちゅっ！　じゅぶっ！！！！」
1213 = "「啊！！！！（含！！！！）啾!啾！啾！啾！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: 早まった。剣術の語は、もう少し時間をかけて\n射精欲求を鎮めてから――いやっ！！！
1610 = "我太著急了。我應該等自己的射精欲平靜下去後，再提到劍術這個詞的……不！！！" 

# monologue
# JP: （ぐいっ！　ぐにっ！　くりゅんっ！　しにゅうっ！）
1794 = "（按！捻！揉！捏！）" 

# 【凪】
# display as 凪
# JP: 「んくっ！？　ぷっ――ふぁっ――ンッ――じゅる！\nじゅぼっ！　じゅぶっ！　じゅばっ！　ちゅううっ」
1162 = "「唔？！噗……啊……嗯……啾！啾！啾！啾！啾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うあっ――凪っ――」
1142 = "「哇……凪……」" 

# monologue
# JP: シックス・ナインで、二人同時に達したい。\n叶えるために為すべきは、後悔ではなく更なる愛撫だ。
1620 = "我想和她以６９式同時高潮。為此我要做的並不應該是後悔，而是加大愛撫的力度。" 

# monologue
# JP: （ぐいいいいっ！！　くりゅ！　しにゅっ！　むちゅっ）
1819 = "（撫！擦！點！轉！）" 

# 【凪】
# display as 凪
# JP: 「ふっ――んっ！　んんん～～っ！　んむっ！　じゅ！\nれるっ！　じゅぶっ！　じゅぼっ！　ずううう～～っ！」
1155 = "「唔……嗯！嗯……唔！啾！啾！啾！啾！滋！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――っ！」
1178 = "「啊……啊！」" 

# monologue
# JP: 快感に膣をヒクつかせ、口は喘ぎにわなないて。けれども\n凪はわななく舌を唇を勃起にしつこくまとわりつかせる。
1507 = "凪的下體在快感中顫抖，雙唇也在嬌喘中抖動。但是她卻頑固地用顫抖的舌頭和嘴唇纏繞著我。" 

# 【凪】
# display as 凪
# JP: 「じゅるっ！　れるうううっ！　れろっ！　ちゅぱっ！\nんっ！　じゅぶっ！　じゅぼっ！　じゅっ！　じゅぶ！」
1220 = "「啾！啾！啾！啾！嗯！啾！啾！啾！啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――なっ――ぎっ！」
850 = "「……凪！」" 

# monologue
# JP: （くりゅっ！　くにっ！　じゅっ！　ぎゅうっ！\nくりゅっ！　こしゅっ！　くにっ！　ぎゅむっ！！）
1820 = "（擦！按！啾！啾！捏！轉！按！搓！！）" 

# 【凪】
# display as 凪
# JP: 「ぷあっ！　あっ！　あっ――んっ！　はぷっ！\nれるっ！　じゅっ！　じゅむっ！　れりゅうっ！」
1202 = "「啊！啊！啊……嗯！啊唔！啾！啾！啾！啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1194 = "「啊！」" 

# monologue
# JP: 瞬間、気づく。スパッツの向こうの小さなすぼまり――\nヒクついてるのは、おまんこと勃起だけではないと。
1644 = "我立刻就注意到了。隔著緊身短褲，我感覺到凪的入口在顫抖。這不只是因為她的下體和我的勃起。" 

# 【凪】
# display as 凪
# JP: 「じゅむっ！　じゅぶっ！　じゅぼっ！　じゅばっ！\nじゅっ！　ちゅるっ！　ちゅぼっ！　じゅばっ！！」
1218 = "「啾！啾！啾！啾！啾！啾！啾！啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ！」
# 1194 = "「啊！」" 

# monologue
# JP: 凪の動きが単調になる。大きな大きなストロークで、\n唇をきゅっと締めながら、頭をひたすら上下させ――
1511 = "凪的動作開始變得單調。她動作很大，用唇緊緊箍住我的下體，腦袋瘋狂地上上下下。" 

# monologue
# JP: （ふにっ）
1796 = "（掐）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！？」
# 1146 = "「哇？！」" 

# monologue
# JP: 勃起を支える指が伸ばされ睾丸を軽く刺激され、\n漏らした声をごまかしたくて、指の動きを加速する。
1545 = "原本抓住我勃起的手指輕捏了一下我的睪丸，我舒服得叫出了聲來，只能加快手指活動搪塞過關。" 

# monologue
# JP: （くにっ！　もみゅ！　もみっ！　きゅううっ！）
1801 = "（揉！按！搓！擦！）" 

# 【凪】
# display as 凪
# JP: 「じゅるっ！　ずりゅうううううっ！　じゅぼ！\nずりゅっ！　じゅぼっ！　じゅるうっ！　じゅぶっ！！」
1217 = "「啾！啾！啾！啾！啾！啾！啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1212 = "「啊！！！！！」" 

