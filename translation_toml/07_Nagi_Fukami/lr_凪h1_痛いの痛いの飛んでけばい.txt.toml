# JP: 睾丸がぶわぶわ膨れ上がってる。\nもう一分――いや、三十秒ももたない――ならばっ！
1679 = "睪丸脹了起來。我已經撐不過一分鐘……不，我已經撐不過三十秒了。既然這樣……" 

# monologue
# JP: （ずりゅっ！　くにゅ！　きゅっ！　こしゅんっ！！）
1824 = "（擦！捏！捻！磨！）" 

# 【凪】
# display as 凪
# JP: 「～～～っ！！！　んっ！　（すんっ）――ちゅむっ！\nれろおっ！　ずじゅっ！　じゅぶっ！　れりゅううっ！」
1210 = "「啊！！！嗯！（吸）……啾！啾！啾！啾！啾！」" 

# monologue
# JP: （こしゅっ！　ぐにっ！　ぬにゅっ！　ぐにゅううっ！）
1802 = "（揉！捻！按！擦！）" 

# monologue
# JP: スパッツに張り付くクリトリスと膣口だけを愛撫する。\nそこに意識を集中させて、小さな小さなすぼまりを――
1621 = "我愛撫著緊緊吸附緊身短褲的陰蒂和入口。將意識集中於那裡之後，我朝著小小的洞口……" 

# monologue
# JP: （ぐいゅっっ！）
1805 = "（插入！）" 

# 【凪】
# display as 凪
# JP: 「！！！！！！！？　んっ！　ぷあっ！　あうっ！！」
1249 = "「嗯？！嗯！啊！啊！」" 

# monologue
# JP: スパッツ越しに思い切り指を突き立てたなら、\n凪のアナルはぎちっ！　っとその指を噛みに来る。
1648 = "我隔著緊身短褲用力將手指一插，凪的肛門就緊緊咬了上來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1208 = "「啊！！」" 

# monologue
# JP: そこを無理矢理引き抜いて、\n指は再びおまんこを縦に大きくストロークする。
1617 = "我強硬地將手指抽了出來，然後再次沿著蜜縫上上下下。" 

# 【凪】
# display as 凪
# JP: 「んくっ！　ふあ――あっ――んっ――（はむっ！）\nじゅるっ――ちゅぶっ！　じゅる！　じゅばっ！！」
1158 = "「唔！啊……啊……嗯……（含！）啾……啾！啾！啾！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っっ！！！！」
1193 = "「啊啊！！！！」" 

# monologue
# JP: 切羽詰まったような速度の、単調で強烈な口淫刺激。\n凪も恐らく僕と同様、もう限界に近いのだろう。
1497 = "凪急促地、單調而迅速地對我施加刺激。她大概和我一樣已經快到極限了。" 

# monologue
# JP: （くしゅっ！　ぎにっ！　こしゅん！　ぐにゅっ！！）
1793 = "（按！捏！擦！揉！！）" 

# 【凪】
# display as 凪
# JP: 「っちゅっ！　ずっ！　れりゅううううっ！　じゅぶっ！\nずりゅうっ！　ちゅぶっ！　ずちゅっ！　じゅばっ！」
1222 = "「啾！滋！啾！啾！啾！啾！滋！啾！」" 

# monologue
# JP: スパッツ越しにもはっきり感じる。凪の膣口のわななきを。\n瞬間、精液たちが一気に亀頭へ押し寄せてくる。
1708 = "隔著緊身短褲我也能清晰地感受到凪的入口在蠕動。在這一瞬，我的精液一口氣湧上了龜頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　凪っ！　凪っ！　僕はっ、僕は、もうっ！！」
1112 = "「凪！凪！凪！我、我已經……」" 

# 【凪】
# display as 凪
# JP: 「んっ！　ずりゅううううううううううっ！！！！！！\nじゅぼおおおおおおおおおおおおおおおおおおっ！！　」
1241 = "「嗯！滋溜！！！！！啾！！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: （くりゅっ！　ぐういいいいいいいいいいっっっっ！！）
1825 = "（擦！捏！！）" 

# 【凪】
# display as 凪
# JP: 「きゃふううっっっっっっっっっっぅぅぅぅぅぅぅ！！」
1130 = "「呀！！」" 

# monologue
