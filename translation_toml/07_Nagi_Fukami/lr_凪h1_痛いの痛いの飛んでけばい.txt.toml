# 1780 = "（啪！）" 

# monologue
# JP: 気合が良く乗っているようだ。普段とまるで音が違う。\nこれならあるいは、木刀での唐竹割りさえ叶うやも――
1562 = "她似乎很有氣勢，聲音都和平時完全不同。這樣下去，她或許能用竹刀斬斷唐竹。" 

# 【凪】
# display as 凪
# JP: 「チェーーーーーーストーーーーーーーーーーっ！！！」
# 1225 = "「喝啊！！！」" 

# monologue
