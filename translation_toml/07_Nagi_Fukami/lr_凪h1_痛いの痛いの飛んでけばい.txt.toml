1130 = "「Kya phuuuuuuuuuuuuuuuuu!!」"

# monologue
# JP: （びゅぶっ！　びゅうっ！　びゅっ！　どびゅっ！！！）
1777 = "（Phụt! Phụt! Phụt! Phụt!!!）"

# 【凪】
# display as 凪
# JP: 「ふやっ！　あっ！　あっ！　んっ――（はぷっ！！）」
1129 = "「Phuya! Á! Á! Ưm――（Hapu!!）」"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ」
1191 = "「Kua」"

# monologue
# JP: （びゅっ！　びゅううっ！　びゅぶっ！　びゅるっ！）
1778 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【凪】
# display as 凪
# JP: 「んくっ！　んっ――\nごきゅっっ！　ごくっ！　ごくっ！　こくんっ！」
1159 = "「Ưm ku! Ưm――\nGokyu! Ực! Ực! Ực!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――あっ――あっ――あっ――」
1168 = "「Á――á――á――á――」"

# monologue
# JP: 僕にイカされ――同時に達して、思わず口を離した凪が、\nふたたび必死にくわえて精飲してくれている。
1527 = "Bị tôi làm cho lên đỉnh――đạt đỉnh cùng\nlúc, Nagi bất giác nhả miệng ra,\nnhưng lại\ntiếp tục cố gắng ngậm lấy và nuốt trọn\ntinh dịch của tôi."

# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅっ！！）
# 1778 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「んっ！　んくっ！　ごくっ！　こくっ！！！」
1240 = "「Ưm! Ưm ku! Ực! Ực!!!」"

# monologue
# JP: その健気さに、さらに精液が増産される。\nこれだけ射精していてもなお、まったく射精したりない！
1676 = "Sự ngoan ngoãn đó khiến tinh dịch càng\nđược sản sinh thêm.\nDù đã bắn nhiều như\nvậy, tôi vẫn cảm thấy bắn chưa đủ chút\nnào!"

# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！！！」
1373 = "「Nagi!!!」"

# monologue
# JP: （ずりゅっ！！！！）
1833 = "（Trượt!!!!）"

# 【凪】
# display as 凪
# JP: 「ぷあっ！　ふえっ！？　にーさっ――！！！？」
1195 = "「Pua! Huê!? Anh ha――!!!?」"

# monologue
# JP: (ぐいっ！！！）
1790 = "（Kéo mạnh!!!）"

# monologue
# JP: 凪を持ち上げひん剥いて、\n抱きしめながら抱え直して！
1613 = "Tôi nhấc bổng Nagi lên, lột sạch đồ,\nvừa\nôm chặt vừa xốc lại tư thế!"

# 【凪】
# display as 凪
# JP: 「ふぁっ――にーさん、ちょっと強引すぎば――けぷっ」
1187 = "「Phua――anh hai, hơi bạo lực quá rồi――kệpp」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1211 = "「!!!!」"

# monologue
# JP: かわいいげっぷ。そこからただよう精液の匂い。\n勃起がぐいぐい硬度と熱とを取り戻す。
1564 = "Tiếng ợ hơi đáng yêu. Mùi tinh dịch thoang\nthoảng từ đó.\nDương vật nhanh chóng lấy\nlại độ cứng và sức nóng."

# 【双鉄】
# display as 雙鐵
# JP: 「凪――凪っ」
1094 = "「Nagi――Nagi」"

# monologue
# JP: （すりゅっ――ずりゅっ――すりっ――くにゅっっ）
1830 = "（Trượt――trượt――cọ――nắn）"

# 【凪】
# display as 凪
# JP: 「ふあっ！　あ――にーさん、んんっ――元気、ばい、ね、\nぶつけた、とこ――もう、痛く――んっ――なか、と？」
1199 = "「Phua! A――anh hai, ưm――khỏe, ghê, nhỉ,\nchỗ, bị va trúng――đã, hết đau――ưm――rồi,\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1289 = "「Ừ」"

# monologue
# JP: 興奮しすぎて、意識が勃起に集中しすぎて正直わからん。\n明日になって、あるいは激しく痛んでしまうかもしれんが。
1701 = "Quá hưng phấn, ý thức tập trung quá nhiều\nvào dương vật nên thú thực tôi không rõ.\nCó thể đến ngày mai sẽ đau dữ dội cũng\nnên."

# 【双鉄】
# display as 雙鐵
# JP: 「今は、まったく何も痛まん」
1328 = "「Bây giờ thì, hoàn toàn không thấy đau gì\ncả」"

# 【凪】
# display as 凪
# JP: 「えへへっ！」
1252 = "「Ehehe!」"

# monologue
# JP: ぽっと、凪の肌があたたかくなる。\n顔は見えんが、どれほどの笑みか伝わってくる。
1518 = "Làn da của Nagi bỗng trở nên ấm áp.\nDù\nkhông nhìn thấy mặt, tôi vẫn cảm nhận được\nnụ cười rạng rỡ của em ấy."

# 【凪】
# display as 凪
# JP: 「よかったとー！」
1267 = "「Tốt quá rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
1103 = "「Nagi」"

# monologue
# JP: かわいい、愛しい、大事にしたい。\n湧き出る想いは、腰より先に手指を動かす。
1559 = "Thật đáng yêu, thật yêu thương, muốn trân\ntrọng em ấy.\nCảm xúc trào dâng khiến những\nngón tay cử động trước cả hông."

# monologue
# JP: （さわっ――さすっ――もにっ――もみゅ――）
1814 = "（Chạm――vuốt――nắn――xoa――）"

# 【凪】
# display as 凪
# JP: 「ん……はっ――おっぱい――じわじわ――ンッ――\nまわり、から――もみもみ、される、の――ふあっ！」
1233 = "「Ưm……hà――vú――từ từ――ưm――\ntừ, xung\nquanh――bị, xoa nắn――phua!」"

# monologue
# JP: （もみゅっ――もにっ――さすっ――くにっ！）
1798 = "（Xoa――nắn――vuốt――bóp!）"

# 【凪】
# display as 凪
# JP: 「ふぁっ！　あっ！　乳首――乳首、やさしくっ――\n指で、されるのっ――きもち――よか、と――んっ！」
1201 = "「Phua! Á! Núm vú――núm vú, được vuốt ve nhẹ\nnhàng――\nbằng ngón tay――sướng――quá――ưm!」"

# monologue
# JP: （さすっ――もみゅっ――くにっ――さすっ）
1788 = "（Vuốt――xoa――bóp――vuốt）"

# 【凪】
# display as 凪
# JP: 「ふっ――あっ――きもち、よかっ――ちくびっ――\nにーさんっ――いじるのっ――うま、かっ――んっ！」
1139 = "「Phu――á――sướng, quá――núm vú――\nAnh\nhai――trêu đùa――giỏi, quá――ưm!」"

# monologue
# JP: 手が暖かい、気持ちいい。はっきりとした、凪のおっぱい。\nその柔らかさを堪能すれば不意に感慨が沸き起こってくる。
1640 = "Bàn tay ấm áp, cảm giác thật tuyệt. Bầu\nngực của Nagi thật rõ ràng.\nThưởng thức sự\nmềm mại đó, tôi bỗng trào dâng một niềm\ncảm khái."

# 【双鉄】
# display as 雙鐵
# JP: 「おっぱい、だよな――乳房も――乳首も――\nほどよく熟れた――大人の、女の――おっぱいだ」
1356 = "「Đúng là, vú rồi――cả bầu ngực――lẫn núm\nvú――\nĐều đã chín muồi vừa phải――là vú\ncủa――một người phụ nữ trưởng thành」"

# 【凪】
# display as 凪
# JP: 「う、熟れてなんかなかとよ～っんっ！　凪さま、まだ、\nピチピチ、ぷりっぷりの――おっぱい――ばいっ」
1280 = "「C-Chưa chín muồi đâu~ ưm! Nagi-sama, vẫn\ncòn,\nlà vú――căng mọng, tươi trẻ――đấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに」
1344 = "「Ra vậy, đúng là thế」"

# monologue
# JP: （ふにゅっ――もみゅっ――くにっ――ぷりゅんっ！）
1792 = "（Nắn――xoa――bóp――búng!）"

# 【凪】
# display as 凪
# JP: 「ふあっ――あっ！　あっ！　あっ！　さわり、方っ――\nにーさんの、手……さっきより、もっと――エッチ――」
1180 = "「Phua――á! Á! Á! Cách, sờ――\nTay, của anh\nhai……so với lúc nãy, còn――dâm đãng hơn――」"

# monologue
# JP: 滑るような肌触りなのに、手のひらに吸い付いてくる。\n乳首はまさしくプリプリで、弾けるように指と絡み合う。
1519 = "Dù cảm giác mượt mà như trượt đi, nhưng\nlại bám dính lấy lòng bàn tay.\nNúm vú quả\nthực căng mọng, như nảy lên và quấn lấy\nngón tay."

# 【双鉄】
# display as 雙鐵
# JP: 「熟れた、ではなく成長した、だな。\n何も無かった――たんに柔らかな板だったところから」
1076 = "「Không phải chín muồi, mà là trưởng thành\nnhỉ.\nTừ chỗ không có gì――chỉ là một tấm\nván mềm mại」"

# 【凪】
# display as 凪
# JP: 「にーさんが――ん――こぎゃん、エッチに――もみもみ\nする、けん――うち――おねーさんの、おっぱいに――」
1368 = "「Do anh hai――ưm――xoa nắn――dâm đãng như thế\nnày, nên――của em――mới thành vú của, người\nlớn――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、もう少し育てるか」
1362 = "「Nếu vậy, anh nuôi dưỡng thêm chút nữa\nnhé」"

# monologue
# JP: （ふにっ――くにゅっ――もみゅっ――しにゅっ――）
1791 = "（Nắn――bóp――xoa――ép――）"

# 【凪】
# display as 凪
# JP: 「ん……あっ――きもち、よか――けど――っ――ぁ！\nおっぱい――あんまり、大きく、なると、邪魔、やけん」
1231 = "「Ưm……á――sướng, quá――nhưng mà――a!\nVú――nếu\nto, quá, sẽ vướng víu, lắm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうだな。乗務でも、剣術でも――\n僕にとっても、いまくらいのボリュームが最高か」
1244 = "「Ừ, cũng đúng. Dù là lúc làm nhiệm vụ hay\nlúc đấu kiếm――\nĐối với anh, kích cỡ như\nbây giờ là tuyệt nhất rồi」"

# monologue
# JP: （もみっ――もみゅっ――ふにゅっ――もみゅんっ）
1799 = "（Xoa――xoa――nắn――vò）"

# monologue
# JP: いくら揉んでも少しも飽きない。永遠に揉んでいたくなる。\n手のひらにぴたり収まるおっぱいは僕専用と素直に思える
1445 = "Dù có xoa nắn bao nhiêu cũng không thấy\nchán. Tôi muốn xoa nắn mãi mãi.\nBầu ngực\nnằm gọn trong lòng bàn tay khiến tôi thành\nthật nghĩ rằng nó là dành riêng cho mình."

# 【凪】
# display as 凪
# JP: 「やけん、凪、さまっ――んっ――おっぱい、大きく\n――にーさんに――大きく、して、もらう――よりっ」
1082 = "「Cho nên, Nagi, sama――ưm――thay vì, để anh\nhai\n――làm cho――vú, to ra――thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「より、何だ？」
1300 = "「Thì, sao nào?」"

# 【凪】
# display as 凪
# JP: 「おっぱい――おちち、ば――出る、ように――\nにーさんに、して――育てて――ほしか、とっ――」
1301 = "「Em muốn――anh hai, làm cho――\nvú――sữa――chảy\nra――nuôi dưỡng nó――cơ――」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: ゆるゆると凪のおまんこに――\n惰性のように擦り合わせていた勃起が一気に熱くなる！
1544 = "Dương vật đang cọ xát vào âm đạo của Nagi\nmột cách từ từ――\nnhư theo quán tính, bỗng\nchốc trở nên nóng rực!"

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
# 1103 = "「凪」" 

# 【凪】
# display as 凪
# JP: 「えへへっ、にーさん。\n凪さまのおねだりに――んっ――応えて、くれると？」
1254 = "「Ehehe, anh hai.\nAnh sẽ――ưm――đáp ứng, lời\nvòi vĩnh của Nagi-sama, chứ?」"

# monologue
# JP: 凪は腹筋を少し凹めて、腰を小さく持ち上げる。\n……贅肉などは一切ない、本当に綺麗な女の体を。
1524 = "Nagi hóp nhẹ cơ bụng, khẽ nâng hông lên.\n……Một cơ thể phụ nữ thực sự xinh đẹp,\nkhông hề có chút mỡ thừa nào."

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1330 = "「Tất nhiên rồi」"

# monologue
# JP: 幾百度と無く抱いた体だ。視界がなくとも感じでわかる。\n凪もその腰を動かして、膣口に亀頭をぴたり当て――
1615 = "Cơ thể tôi đã ôm ấp không biết bao nhiêu\nlần. Dù không nhìn thấy cũng có thể cảm\nnhận được.\nNagi cũng cử động hông, áp sát\nquy đầu vào cửa âm đạo――"

# monologue
# JP: （ぐ、ちゅっ）
1829 = "（Phập）"

# 【凪】
# display as 凪
# JP: 「んっ――ふぁはぁっ」
1234 = "「Ưm――phu haa」"

# monologue
# JP: 亀頭だけ沈み込ませれば、凪のお腹がまた上下する。\n触れ合う肌に汗が混じって、感触をより極上にする。
1492 = "Chỉ cần nhấn quy đầu vào, bụng Nagi lại\nnhấp nhô.\nMồ hôi lẫn vào phần da thịt cọ\nxát, khiến cảm giác càng thêm tuyệt diệu."

# 【凪】
# display as 凪
# JP: 「ンッ――はっ――ふっ――んっ――あっ――凪、さま\n――うち、が――にーさんの、こと――ンッ――ぁ！」
1227 = "「Ưm――hà――phu――ưm――á――Nagi, sama\n――em――đang\nlàm――anh hai――ưm――a!」"

# monologue
# JP: （ずっ――にゅっ――ずるっ――ぐ、にゅっ――）
1826 = "（Thút――trượt――trượt――nắn――）"

# monologue
# JP: 凪がぞわぞわ、這いずるように腰をすすめる。\n狭くて熱い極上まんこで、僕の勃起を飲み込んでいく。
1532 = "Nagi rùng mình, đẩy hông tới như đang bò\ntrườn.\nDùng chiếc âm đạo chật hẹp và nóng\nbỏng tuyệt hảo nuốt trọn dương vật của\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――僕が、凪に抱かれているな」
1256 = "「Aa――anh đang, được Nagi ôm ấp nhỉ」"

# 【凪】
# display as 凪
# JP: 「っ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: 凪の体がぴくりと動く。\n触れ合っている部分がさらに熱を持つ。
1529 = "Cơ thể Nagi khẽ giật mình.\nPhần tiếp xúc\ncàng thêm nóng bỏng."

# 【凪】
# display as 凪
# JP: 「うち、が――凪さま、が――（ごくっ）――\nにーさんのこと――んっ――自分、からっ――」
1141 = "「Em――Nagi-sama――（Ực）――\ntự mình――ưm――làm\nanh hai――」"

# monologue
# JP: （ぐっ――ズッ――ぬっ――くっ――ぞりゅっ！）
1787 = "（Hự――thút――trơn――hự――trượt!）"

# 【凪】
# display as 凪
# JP: 「んひゅんんっ！！！！」
1161 = "「Ưm hyun!!!!」"

# monologue
# JP: 強い快感。キツイ収縮。天井の粒立つ部分を亀頭が擦って、\n凪の体がビクンと大きくはずんでしまう。
1598 = "Khoái cảm mãnh liệt. Sự co thắt chặt chẽ.\nQuy đầu cọ xát vào phần nhô lên lấm tấm ở\ntrần âm đạo,\nkhiến cơ thể Nagi giật nảy\nlên một cái thật lớn."

# 【凪】
# display as 凪
# JP: 「は……あっ――おまんこ、一番、奥、まで――凪、さま\n――自分、で――にーさんの――おちんちん――ば――」
1172 = "「Hà……á――âm đạo, đến tận, sâu nhất――Nagi,\nsama\n――tự mình――nuốt lấy――dương vật――của\nanh hai――」"

# monologue
# JP: （ずりゅっ――ぞっ――にゅぶっ――ぐっ――ぬちゅっ）
1774 = "（Trượt――rùng mình――phập――hự――nhóp nhép）"

# monologue
# JP: 凪の膣内も焦れている。ひっきりなしに締め付け蠢き、\n早く最奥を突いてほしいと、蠕動で訴えかけてくる。
1522 = "Bên trong âm đạo của Nagi cũng đang sốt\nruột. Liên tục thít chặt và cựa quậy,\nnhu\nđộng như đang kêu gào muốn tôi nhanh chóng\nđâm vào tận cùng."

