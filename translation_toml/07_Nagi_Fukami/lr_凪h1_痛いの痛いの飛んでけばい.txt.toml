1841 = "（Bịch!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「っっっっ！！！！」
1209 = "「!!!!」"

# monologue
# JP: 重っ――熱っ！？　いや――
1566 = "Nặng quá――nóng quá!? Không――"

# 【凪】
# display as 凪
# JP: 「ほえっ！？　凪さまの木刀折れたと！！！？」
1150 = "「Hỏe!? Kiếm gỗ của Nagi-sama bị gãy rồi\nsao!!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「痛――――――つっっっ」
1337 = "「Đau――――――quá」"

# 【凪】
# display as 凪
# JP: 「その声っ！？　って、わあああああ？！\nまさか、まさかにーさんに折れた木刀あたったと！！？」
1358 = "「Giọng nói này!? Ơ, waaaaaa?!\nKhông lẽ,\nkhông lẽ thanh kiếm gỗ gãy trúng anh hai\nrồi sao!!?」"

# 【凪】
# display as 凪
# JP: 「わあああ！？　にーさ、にーさん、どこあたったと！？\nうちっ、うちおんぶするけんっ！　すぐ病院に」
1147 = "「Waaaa!? Anh hai, anh hai, trúng ở đâu\nvậy!?\nEm, em cõng anh nhé! Tới bệnh viện\nngay」"

# 【双鉄】
# display as 雙鐵
# JP: 「い――――や……そこまでは、いた、らん」
1319 = "「Kh――――ông……không đến mức, đó, đâu」"

# monologue
# JP: いたいが、いたらん。\nくだらないことを考えて、わずかでも気をおちつける。
1595 = "Đau, nhưng không sao.\nTôi nghĩ đến những\nchuyện ngớ ngẩn để bình tĩnh lại đôi chút."

# 【凪】
# display as 凪
# JP: 「ばってん！」
1123 = "「Nhưng mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「当たりどころがよかったようだ。太ももの付け根だ。\nひどく痛むが、柔らかく丈夫そうなところではあるし」
1320 = "「Có vẻ như trúng chỗ không sao. Ở gốc đùi.\nTuy rất đau, nhưng đó là chỗ mềm và có vẻ\nchắc chắn」"

# 【凪】
# display as 凪
# JP: 「太もものつけねばい！！？」
1349 = "「Gốc đùi sao!!?」"

# monologue
# JP: (がばっ！）
1797 = "（Nhào tới!）"

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1146 = "「Uo!?」"

# monologue
# JP: 不意を突かれてすごい力で押し倒される。\nというかこれは――この体勢は……
1601 = "Bị bất ngờ, tôi bị đẩy ngã bằng một lực\nrất mạnh.\nPhải nói là cái này――tư thế\nnày……"

# monologue
# JP: （じーーーーーっ）
1832 = "（Chằm chằmmmm）"

# 【凪】
# display as 凪
# JP: 「どこばい？　あ！　こことね！？　うっわ、真っ赤！\n――にーさん、まっことごめんなさい」
1154 = "「Ở đâu vậy? A! Chỗ này nhỉ!? Uwa, đỏ chót\nluôn!\n――Anh hai, em thật sự xin lỗi」"

# 【双鉄】
# display as 雙鐵
# JP: 「い、いや。声かけをしなかった僕が悪い。\n集中の邪魔をしては、と思ったのだが――」
1318 = "「Kh-Không. Anh không lên tiếng gọi là lỗi\ncủa anh.\nAnh nghĩ là sẽ làm phiền em tập\ntrung――」"

# monologue
# JP: 接近前に声をかけ、修行の手をとめてもらって近づけば、\n間違いなく、こんな事態を招かず済んだ。
1567 = "Nếu anh lên tiếng trước khi đến gần, bảo\nem dừng tay lại rồi mới bước tới,\nthì chắc\nchắn đã không xảy ra chuyện này."

# 【凪】
# display as 凪
# JP: 「修行に夢中になってにーさんの気配ばとれなかった\nうちが未熟――ああっ――（ふーっ、ふーっ）」
1298 = "「Do em mải mê tu hành nên không nhận ra sự\nhiện diện của anh hai\nLà do em còn non\nkém――aa――（Phù, phù）」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1215 = "「!?」"

# monologue
# JP: 凪が僕の打ち身部分にふぅふぅ息を吹きかけてくる。\nその度ごとに、顔の真上のスパッツの股間が妖しく揺れる。
1494 = "Nagi thổi phù phù vào chỗ tôi bị đánh\ntrúng.\nMỗi lần như vậy, đũng quần bó sát\nngay trên mặt tôi lại đung đưa một cách\nđầy khêu gợi."

# 【凪】
# display as 凪
# JP: 「（ふーーーっ、ふーーーっ、ふーーーっ、ふーーーっ）\nああ、赤いの少しも引かんばい――にーさん、痛かと？」
1379 = "「（Phùuu, phùuu, phùuu, phùuu）\nAa, vết đỏ\nkhông mờ đi chút nào cả――anh hai, có đau\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、全く痛まぬといってしまえばウソになるが……」
1246 = "「À thì, nói hoàn toàn không đau thì là nói\ndối, nhưng……」"

# monologue
# JP: 全力修行を終えたばかりの、汗で濡れまくる凪の股間。\n熱気と匂いがスパッツで蒸れ、僕の性欲を煽り立てる。
1537 = "Đũng quần ướt đẫm mồ hôi của Nagi vừa mới\ndốc sức tu hành xong.\nHơi nóng và mùi\nhương bốc lên qua lớp quần bó, thổi bùng\ndục vọng của tôi."

# 【凪】
# display as 凪
# JP: 「ああ……これ、ぺろぺろして冷やした方が」
1152 = "「Aa……cái này, liếm láp làm mát thì tốt\nhơn」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪――ぺろぺろするなら」
1117 = "「Không, Nagi――nếu em định liếm thì」"

# 【凪】
# display as 凪
# JP: 「え？　わっ――わわわわわわわっ！？」
1214 = "「Hả? Oa――wawawawawawa!?」"

# monologue
# JP: 凪の舌先を思った瞬間、自分でも呆れるくらいに勃起する。\n言葉は止まり、ふーふーと鼻息だけが亀頭にかかる。
1437 = "Khoảnh khắc nghĩ đến đầu lưỡi của Nagi,\ntôi cương cứng đến mức chính mình cũng\nphải ngạc nhiên.\nLời nói dừng lại, chỉ còn\ntiếng thở phù phù phả vào quy đầu."

# 【凪】
# display as 凪
# JP: 「（ふー、ふーっ――ごくっ）。\n……にーさん、痛いんじゃなかったと？」
1137 = "「（Phù, phù――ực）.\n……Anh hai, không phải anh\nđang đau sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「痛いは痛いが、それ以上に、な」
1334 = "「Đau thì có đau, nhưng còn hơn thế nữa,\ncơ」"

# monologue
# JP: （くぱあっ）
1815 = "（Tách ra）"

# 【凪】
# display as 凪
# JP: 「ひゃうっ！！？」
1132 = "「Hyau!!?」"

# monologue
# JP: スパッツ越しに目星をつけて、凪のおまんこを指で広げる。\n触った瞬間、嬉しくなる。ここでの修行時は大抵そうだが、
1650 = "Xác định vị trí qua lớp quần bó, tôi dùng\nngón tay mở rộng âm đạo của Nagi.\nKhoảnh\nkhắc chạm vào, tôi thấy vui sướng. Thường\nthì khi tu hành ở đây em ấy đều như vậy,"

# 【双鉄】
# display as 雙鐵
# JP: 「ノーパンか」
1084 = "「Không mặc quần lót à」"

# 【凪】
# display as 凪
# JP: 「しゅ、修行のときは邪魔やけん――\n移動のときは、ちゃんと上からズボンば履くし」
1346 = "「L-Lúc tu hành vướng víu lắm――\nKhi di\nchuyển, em sẽ mặc quần dài đàng hoàng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nこんなにやらしく可愛い凪を他の人間に見せるなど――」
1292 = "「Đúng vậy.\nĐể người khác nhìn thấy một\nNagi đáng yêu và dâm đãng thế này thì――」"

# monologue
# JP: （さすっ）
1812 = "（Vuốt nhẹ）"

# 【凪】
# display as 凪
# JP: 「くひゅんっ！！！」
1242 = "「Khu hyun!!!」"

# monologue
# JP: 右手でおまんこを開いたままに、\n左手の中指に人差し指を添え、ざらりと荒く縦に這わせる。
1633 = "Tay phải vẫn mở rộng âm đạo,\nngón trỏ và\nngón giữa tay trái ép sát nhau, thô bạo\ntrượt dọc lên xuống."

# 【双鉄】
# display as 雙鐵
# JP: 「とても僕には耐えられん。\n凪のエッチな姿はいつも、僕だけが独占していたい」
1287 = "「Anh không thể nào chịu đựng được.\nAnh\nluôn muốn độc chiếm dáng vẻ dâm đãng của\nNagi」"

# 【凪】
# display as 凪
# JP: 「もちろんばい！　凪さまだって、にーさん以外の\nだぁれにもこぎゃん姿……ば……こぎゃん……姿――ば」
1331 = "「Tất nhiên rồi! Nagi-sama cũng, không muốn\ncho ai khác ngoài anh hai\nnhìn thấy dáng\nvẻ này……đâu……dáng vẻ……này――đâu」"

# monologue
# JP: スパッツからはみ出る腿がみるみるうちに朱に染まる。\nこれがどういう体勢か、ようやく理解したらしい。
1678 = "Cặp đùi lộ ra ngoài chiếc quần bó chớp mắt\nđã nhuộm màu đỏ rực.\nCó vẻ cuối cùng em ấy\ncũng hiểu ra đây là tư thế gì."

# 【双鉄】
# display as 雙鐵
# JP: 「スパッツ越しでも、凪のおまんこの湿気を感じる。\n熱気もすごいな。むわりとしている」
1370 = "「Dù qua lớp quần bó, anh vẫn cảm nhận được\nđộ ẩm ướt từ âm đạo của Nagi.\nHơi nóng\ncũng thật tuyệt. Bốc lên hầm hập」"

# 【凪】
# display as 凪
# JP: 「そ、それは汗とか――そのっ、\n修行ば頑張ってた、そのせいばい」
1357 = "「Đ-Đó là mồ hôi――cái đó,\ndo em đã cố gắng\ntu hành, nên mới thế thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったか」
1119 = "「Vậy sao」"

# monologue
# JP: （すりっ――すりっ――すりっ――くぷっ）
1813 = "（Cọ――cọ――cọ――chụt）"

# 【凪】
# display as 凪
# JP: 「ふぁんっ！！！」
1145 = "「Phuan!!!」"

# monologue
# JP: スパッツの上から指を押しこみ、凪の膣口を刺激する。\n右手の親指をゆるく使って、クリトリスも撫でさする。
1649 = "Ép ngón tay qua lớp quần bó, tôi kích\nthích cửa âm đạo của Nagi.\nDùng ngón cái\ntay phải nhẹ nhàng vuốt ve âm vật."

# 【凪】
# display as 凪
# JP: 「あ……ん……ふぁっ――あっ――にーさん……\nもっと――もっと、強く――んっ――強く、して」
1185 = "「A……ưm……phua――á――anh hai……\nMạnh hơn――mạnh\nhơn, nữa――ưm――mạnh lên, đi」"

# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ」
1316 = "「Đúng ý anh rồi」"

# monologue
# JP: （こしゅっ！　くにっ！　じゅむっ！　すりゅんっ！）
1823 = "（Chà! Nắn! Xoa! Trượt!）"

# 【凪】
# display as 凪
# JP: 「ふあっ――あっ！　よか、ばいっ――んっ――\nにーさんの、指――いつもと、感触――違くて――んっ」
1143 = "「Phua――á! Tuyệt, quá――ưm――\nNgón tay, của\nanh hai――cảm giác――khác với, mọi khi――ưm」"

# monologue
# JP: 体が揺れれば、シャツ越しの凪の乳房の丸みが強調される。\n思いっ切りに揉みしだきたい。思えば勃起も震えてしまう。
1662 = "Khi cơ thể rung lắc, độ tròn trịa của bầu\nngực Nagi qua lớp áo sơ mi càng nổi bật.\nTôi muốn xoa nắn nó thỏa thích. Nghĩ vậy,\ndương vật cũng run lên bần bật."

# 【凪】
# display as 凪
# JP: 「あ！　あ……そうだった、とね。うち……凪、さま――\nにーさんの痛かとを、とんでけ～してあげるとね」
1197 = "「A! A……đúng rồi, nhỉ. Em……Nagi, sama――\nphải thổi bay~ cơn đau cho anh hai, chứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。思いっきりに気持ちよく、\nびゅうびゅうと飛ばしてもらえると助かる」
1291 = "「Đúng vậy. Nếu em có thể thổi nó đi vùn\nvụt\nmột cách thật sung sướng thì tốt quá」"

# 【凪】
# display as 凪
# JP: 「にへへっ！　にーさん、エッチでおバカさんとね～」
1251 = "「Nihehe! Anh hai, là đồ ngốc dâm đãng~」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪のおかげで、僕も男になったからな。\nそうして、男というものは――」
1329 = "「Nhờ Nagi mà anh mới trở thành đàn ông\nđấy.\nVà, đàn ông thì――」"

# monologue
# JP: ぐ、ぐと腰を突き出して、凪の唇に勃起を当てる。\n凪は小さく口をあけ、焦らしているのか、舌先だけを――
1614 = "Tôi đẩy hông tới, áp dương vật vào môi\nNagi.\nNagi hé miệng, không biết có phải\nđang trêu chọc không, chỉ dùng đầu lưỡi――"

# 【凪】
# display as 凪
# JP: 「ぴちゃっ――ぺろっ――ぺろっ――ぺろっ――\nれりゅっ――ぺちょっ――ぺろっ――ぺろっ――」
1216 = "「Picha――rero――rero――rero――\nreryu――pecho――rero――rero――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ……くっ――くはっ――こんな状況に陥れば――\n知能指数をどんどんと――精液に溶かすものなのだ」
1165 = "「A……hự――kuha――rơi vào tình huống thế này――\nchỉ số IQ sẽ dần dần――hòa tan vào tinh\ndịch mất」"

# 【凪】
# display as 凪
# JP: 「まっことばい？　うふふ～ん。\nそうしたらー――凪さまー――くぽっ！」
1342 = "「Thật sao? Ufufu~n.\nNếu vậy\nthì――Nagi-sama――kupo!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっ！」
# 1194 = "「啊！」" 

# monologue
# JP: 凪がくっぽり、僕の亀頭を咥えてくれる。\n咥えたままで、舌をねろりとカリ首一周させてくれる。
1503 = "Nagi ngậm trọn quy đầu của tôi.\nVẫn ngậm\nnhư thế, em ấy đưa lưỡi liếm một vòng\nquanh khấc quy đầu ướt át."

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ――それは――効くっ」
1177 = "「A――á――cái đó――phê quá」"

# 【凪】
# display as 凪
# JP: 「ひーはんほへーへひほんはら――んっ――ヂュルッ――\nれるっ――ん――あふぁはは、ひょふひゃっはふほへ～」
1121 = "「Vì anh hai ngốc nghếch――ưm――chụt――\nreru――ưm――afahaha, hyofuhyahhafuhouhe~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――多分、な。因果、関係、だけを、見る、なら。\n実際――く、あ――今までも――凪は、僕の、精液、を」
1239 = "「Aa――chắc là, vậy. Nếu chỉ nhìn, vào mối\nquan hệ, nhân quả.\nThực tế――ku, a――từ\ntrước đến nay――Nagi, đã nuốt, tinh dịch,\ncủa anh」"

# 【凪】
# display as 凪
# JP: 「あ――ちゅむっ――ちゅうううううっ――れるっ――\nちむっ――ちゅ、ちゅぶっ――んっ――ほんふぉはぁひ」
1182 = "「A――chụt――chụttttt――reru――\nchimu――chu,\nchubu――ưm――đúng vậy nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「くふっ」
1156 = "「Kufu」"

# monologue
# JP: 凪の頭が上下を始める。フェラチオの濃度を高めつつ、\n思い出したように、おしゃべりの、舌の動きを混ぜてくる。
1521 = "Đầu Nagi bắt đầu di chuyển lên xuống. Vừa\ntăng cường độ bú mút,\nvừa như sực nhớ ra,\nem ấy pha trộn thêm chuyển động của lưỡi\nkhi nói chuyện."

# 【凪】
# display as 凪
# JP: 「んっ――ちゅむっ――れるっ――なふぃ、はま――\nむちゅ――ひーはんほ――へいへひ――ほんへ――んっ」
1237 = "「Ưm――chụt――reru――Nagi, sama――\nmuchu――tinh\ndịch――của anh hai――uống hết――ưm」"

# monologue
# JP: しゃべりとしゃぶりを、凪は両立させている。\n言葉を紡ぐ動きと同時、カリ首を甘く攻め立ててくれる。
1490 = "Nagi vừa nói chuyện vừa bú mút cùng lúc.\nĐồng thời với chuyển động dệt nên lời nói,\nem ấy tấn công ngọt ngào vào khấc quy đầu."

# 【凪】
# display as 凪
# JP: 「はーふはん――ほん、へ――ちゅむっ――れるっ――\nひほんは、ほほは――ほほへはひ――ぢゅう――ちゅむ」
1366 = "「Haafuhan――hon, he――chụt――reru――\nhihonha,\nhohoha――hohohehahi――juu――chụt」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――っ――」
1183 = "「A――」"

# monologue
# JP: いろんなことを、確かにふたりで一緒に覚えた。\n学んだ成果を、凪はすぐさま、いつでも実践してく――！
1607 = "Quả thực hai chúng tôi đã cùng nhau học\nđược rất nhiều điều.\nThành quả học được,\nNagi luôn áp dụng ngay lập tức, bất cứ lúc\nnào――!"

# 【凪】
# display as 凪
# JP: 「ずじゅ～～～～～～～～～～～～～～～～～っ！！！」
1223 = "「Zujuuuuuuuuuuuuuuuuuuu!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: そうして凪は、一度マスターしたことは、\n決して忘れず、幾度であろうと愚直なまでに繰り返し――
1446 = "Và Nagi, một khi đã thành thạo điều gì,\nsẽ\nkhông bao giờ quên, và lặp đi lặp lại một\ncách ngốc nghếch không biết bao nhiêu\nlần――"

# 【凪】
# display as 凪
# JP: 「ぐぽっ！　ぢゅぼっ！　ちゅぶっ！　ちゅううっ！\nくっ！　りゅっ！　ちゅううっ！　（はみっ！！）」
1219 = "「Gupo! Chubo! Chubu! Chuuuu!\nKu! Ryu!\nChuuuu! （Ngoạm!!）」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ――ぁあっ！」
1169 = "「A――á――a á!」"

# monologue
# JP: 舐められしごかれ尿道口の割れ目に尖らせた舌を入れられ\n吸われ唇で覆った歯でカリを咥えられ――
1501 = "Bị liếm, bị tuốt, bị chiếc lưỡi nhọn đâm\nvào khe hở lỗ sáo,\nbị mút, bị ngậm lấy\nkhấc quy đầu bằng hàm răng được che phủ\nbởi môi――"

# 【凪】
# display as 凪
# JP: 「じゅうううううっ！　ずぼっ――ごっ！！！！\nじゅるううううっっっ！　ずびょっ！――ぎゅっ！！」
1221 = "「Juuuuuu! Zubo――go!!!!\nJuruuuuuu!\nZubyo!――Gyu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――はっ――くううっ――――っ！」
1135 = "「Ư――hà――kuuu――――!」"

# monologue
# JP: 喉の奥まで使っての長いストロークで刺激され――\n今までに学んだ弱点全部を凪は愚直に責めてきて
1654 = "Bị kích thích bằng những cú mút dài tận\nsâu trong cổ họng――\nNagi liên tục tấn công\nvào tất cả những điểm yếu đã học được từ\ntrước đến nay"

# monologue
# JP: （このままだと――一方的に――射精させられるっ！）
1840 = "（Cứ thế này――mình sẽ bị ép bắn tinh――một\nchiều mất!）"

# monologue
# JP: 無論、それとて大変幸せな結末だ。\nけれどもしかし、せっかくのこの体勢であるのだから――
1674 = "Tất nhiên, đó cũng là một kết cục vô cùng\nhạnh phúc.\nNhưng mà, hiếm khi mới có được\ntư thế này――"

# monologue
# JP: （くりゅんっ！！！）
1795 = "（Vê!!!）"

# 【凪】
# display as 凪
# JP: 「んひゅんっ！！！？」
1157 = "「Ưm hyun!!!?」"

# monologue
# JP: 親指で軽くクリトリスを撫ぜ、ふにふに軽く揉み潰すよう、\n何度も何度も円を描いて愛撫する。
1637 = "Dùng ngón cái nhẹ nhàng vuốt ve âm vật,\nnhư đang bóp nhẹ \"funi funi\",\ntôi vẽ những\nvòng tròn vuốt ve hết lần này đến lần\nkhác."

# 【凪】
# display as 凪
# JP: 「ん――ぷあっ！　あ……にーさん、ん……そぎゃん、\nされ、たら――ふあっ――凪、さま――しゅう、ちゅう」
1236 = "「Ưm――pua! A……anh hai, ưm……bị, làm,\nnhư\nvậy――phua――Nagi, sama――tập, trung」"

# monologue
# JP: にじむ愛液に驚かされる。凪も相当に出来上がってる。\nこれならば、この体勢でふたり同時に達することも――
1602 = "Dâm thủy rỉ ra khiến tôi kinh ngạc. Nagi\ncũng đã khá sẵn sàng rồi.\nNếu vậy, với tư\nthế này, hai người có thể đạt đỉnh cùng\nlúc――"

# monologue
# JP: （さすっ――くりゅっ――こにゅっ――くしゅんっ）
1837 = "（Vuốt――vê――nắn――chà）"

# 【双鉄】
# display as 雙鐵
# JP: 「集中が、どうした？」
1087 = "「Tập trung, thì sao nào?」"

# monologue
# JP: 左手は膣前庭をゆっくりゆっくり撫でながら、\n不意打ちぎみに膣口へ、ぐいとスパッツを押し込んでみる。
1636 = "Tay trái vừa vuốt ve tiền đình âm đạo thật\nchậm rãi,\nvừa bất ngờ ấn mạnh lớp quần bó\nvào cửa âm đạo."

# 【凪】
# display as 凪
# JP: 「凪、さまっ――おくち、――集中、できん、とっ――\nんっ――にーさんの――おちんちん、ば――ぺろ、ぺろ」
1307 = "「Nagi, sama――không thể, tập trung――vào\nmiệng, được――\nƯm――không thể――liếm,\nliếm――dương vật――của anh hai」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほほう」
1296 = "「Hô hô」"

# monologue
# JP: 凪の膣口は挿入を求めてヒクつている。\nスパッツ越しにも吸い付く動きをはっきり感じる。
1509 = "Cửa âm đạo của Nagi đang co giật đòi hỏi\nsự cắm vào.\nDù qua lớp quần bó vẫn cảm\nnhận rõ chuyển động mút lấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、凪は、例えば剣術の試合においても――」
1364 = "「Nếu vậy, Nagi, ví dụ như trong một trận\nđấu kiếm thuật――」"

# 【凪】
# display as 凪
# JP: 「っ！！！！　（はぷっ！！！！）――れるっ！\nじゅううううっ！　ずちゅっ！　じゅぶっ！！！！」
1213 = "「!!!! （Hapu!!!!）――reru!\nJuuuuuu! Zuchu!\nJubu!!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: 早まった。剣術の語は、もう少し時間をかけて\n射精欲求を鎮めてから――いやっ！！！
1610 = "Tôi vội vàng quá. Đáng lẽ nên dành thêm\nchút thời gian\nđể làm dịu dục vọng bắn\ntinh rồi mới nhắc đến từ \"kiếm\nthuật\"――không!!!"

# monologue
# JP: （ぐいっ！　ぐにっ！　くりゅんっ！　しにゅうっ！）
1794 = "（Đẩy! Nắn! Vê! Ép!）"

# 【凪】
# display as 凪
# JP: 「んくっ！？　ぷっ――ふぁっ――ンッ――じゅる！\nじゅぼっ！　じゅぶっ！　じゅばっ！　ちゅううっ」
1162 = "「Ưm ku!? Pu――phua――ưm――juru!\nJubo! Jubu!\nJuba! Chuuuu」"

# 【双鉄】
# display as 雙鐵
# JP: 「うあっ――凪っ――」
1142 = "「Ua――Nagi――」"

# monologue
# JP: シックス・ナインで、二人同時に達したい。\n叶えるために為すべきは、後悔ではなく更なる愛撫だ。
1620 = "Với tư thế 69, tôi muốn hai người cùng đạt\nđỉnh.\nĐể làm được điều đó, không phải là\nhối hận mà là vuốt ve nhiều hơn nữa."

# monologue
# JP: （ぐいいいいっ！！　くりゅ！　しにゅっ！　むちゅっ）
1819 = "（Đẩy mạnh!! Vê! Ép! Chụt）"

# 【凪】
# display as 凪
# JP: 「ふっ――んっ！　んんん～～っ！　んむっ！　じゅ！\nれるっ！　じゅぶっ！　じゅぼっ！　ずううう～～っ！」
1155 = "「Phu――ưm! Ưm ưm~~~! Ưm mu! Ju!\nReru! Jubu!\nJubo! Zuuuu~~~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――っ！」
1178 = "「Á――!」"

# monologue
# JP: 快感に膣をヒクつかせ、口は喘ぎにわなないて。けれども\n凪はわななく舌を唇を勃起にしつこくまとわりつかせる。
1507 = "Âm đạo co giật vì khoái cảm, miệng run rẩy\nvì tiếng rên rỉ. Nhưng\nNagi vẫn dùng chiếc\nlưỡi và đôi môi run rẩy ấy quấn chặt lấy\ndương vật không buông."

# 【凪】
# display as 凪
# JP: 「じゅるっ！　れるうううっ！　れろっ！　ちゅぱっ！\nんっ！　じゅぶっ！　じゅぼっ！　じゅっ！　じゅぶ！」
1220 = "「Juru! Reruuuuu! Rero! Chupa!\nƯm! Jubu!\nJubo! Ju! Jubu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「――なっ――ぎっ！」
850 = "「――Na――gi!」"

# monologue
# JP: （くりゅっ！　くにっ！　じゅっ！　ぎゅうっ！\nくりゅっ！　こしゅっ！　くにっ！　ぎゅむっ！！）
1820 = "（Vê! Nắn! Chụt! Siết!\nVê! Chà! Nắn! Bóp!!）"

# 【凪】
# display as 凪
# JP: 「ぷあっ！　あっ！　あっ――んっ！　はぷっ！\nれるっ！　じゅっ！　じゅむっ！　れりゅうっ！」
1202 = "「Pua! Á! Á――ưm! Hapu!\nReru! Ju! Jumu!\nReryuu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1194 = "「啊！」" 

# monologue
# JP: 瞬間、気づく。スパッツの向こうの小さなすぼまり――\nヒクついてるのは、おまんこと勃起だけではないと。
1644 = "Khoảnh khắc đó, tôi nhận ra. Nơi nhỏ hẹp\nthắt lại đằng sau lớp quần bó――\nĐang co\ngiật không chỉ có âm đạo và dương vật."

# 【凪】
# display as 凪
# JP: 「じゅむっ！　じゅぶっ！　じゅぼっ！　じゅばっ！\nじゅっ！　ちゅるっ！　ちゅぼっ！　じゅばっ！！」
1218 = "「Jumu! Jubu! Jubo! Juba!\nJu! Churu! Chubo!\nJuba!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ！」
# 1194 = "「啊！」" 

# monologue
# JP: 凪の動きが単調になる。大きな大きなストロークで、\n唇をきゅっと締めながら、頭をひたすら上下させ――
1511 = "Chuyển động của Nagi trở nên đơn điệu. Với\nnhững cú mút thật dài,\nvừa siết chặt môi,\nvừa liên tục đưa đầu lên xuống――"

# monologue
# JP: （ふにっ）
1796 = "（Bóp nhẹ）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！？」
# 1146 = "「哇？！」" 

# monologue
# JP: 勃起を支える指が伸ばされ睾丸を軽く刺激され、\n漏らした声をごまかしたくて、指の動きを加速する。
1545 = "Ngón tay nâng đỡ dương vật duỗi ra, kích\nthích nhẹ vào tinh hoàn,\nmuốn lấp liếm\ntiếng rên rỉ vừa phát ra, tôi tăng tốc\nchuyển động của ngón tay."

# monologue
# JP: （くにっ！　もみゅ！　もみっ！　きゅううっ！）
1801 = "（Nắn! Xoa! Vò! Siết!）"

# 【凪】
# display as 凪
# JP: 「じゅるっ！　ずりゅうううううっ！　じゅぼ！\nずりゅっ！　じゅぼっ！　じゅるうっ！　じゅぶっ！！」
1217 = "「Juru! Zuryuuuuu! Jubo!\nZuryu! Jubo!\nJuruu! Jubu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1212 = "「!!!!!」"

# monologue
# JP: 睾丸がぶわぶわ膨れ上がってる。\nもう一分――いや、三十秒ももたない――ならばっ！
1679 = "Tinh hoàn đang sưng phồng lên.\nMột phút\nnữa――không, ba mươi giây nữa cũng không\ntrụ nổi――nếu vậy!"

# monologue
# JP: （ずりゅっ！　くにゅ！　きゅっ！　こしゅんっ！！）
1824 = "（Trượt! Nắn! Thít! Chà!!）"

# 【凪】
# display as 凪
# JP: 「～～～っ！！！　んっ！　（すんっ）――ちゅむっ！\nれろおっ！　ずじゅっ！　じゅぶっ！　れりゅううっ！」
1210 = "「~~~!!! Ưm! （Hít）――chụt!\nReroo! Zuju!\nJubu! Reryuuu!」"

# monologue
# JP: （こしゅっ！　ぐにっ！　ぬにゅっ！　ぐにゅううっ！）
1802 = "（Chà! Nắn! Xoa! Épppp!）"

# monologue
# JP: スパッツに張り付くクリトリスと膣口だけを愛撫する。\nそこに意識を集中させて、小さな小さなすぼまりを――
1621 = "Tôi chỉ vuốt ve âm vật và cửa âm đạo đang\ndính sát vào quần bó.\nTập trung ý thức vào\nđó, rồi hướng đến nơi nhỏ hẹp thắt lại――"

# monologue
# JP: （ぐいゅっっ！）
1805 = "（Thọc mạnh!）"

# 【凪】
# display as 凪
# JP: 「！！！！！！！？　んっ！　ぷあっ！　あうっ！！」
1249 = "「!!!!!!!? Ưm! Pua! Au!!」"

# monologue
# JP: スパッツ越しに思い切り指を突き立てたなら、\n凪のアナルはぎちっ！　っとその指を噛みに来る。
1648 = "Khi tôi thọc mạnh ngón tay qua lớp quần\nbó,\nhậu môn của Nagi liền cắn chặt lấy\nngón tay đó!"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1208 = "「!!」"

# monologue
# JP: そこを無理矢理引き抜いて、\n指は再びおまんこを縦に大きくストロークする。
1617 = "Tôi dùng sức rút ngón tay ra,\nrồi lại tiếp\ntục trượt dài dọc theo âm đạo."

# 【凪】
# display as 凪
# JP: 「んくっ！　ふあ――あっ――んっ――（はむっ！）\nじゅるっ――ちゅぶっ！　じゅる！　じゅばっ！！」
1158 = "「Ưm ku! Phua――á――ưm――（Ngoạm!）\nJuru――chubu!\nJuru! Juba!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っっ！！！！」
1193 = "「!!!!」"

# monologue
# JP: 切羽詰まったような速度の、単調で強烈な口淫刺激。\n凪も恐らく僕と同様、もう限界に近いのだろう。
1497 = "Kích thích bằng miệng đơn điệu và mãnh\nliệt với tốc độ như bị dồn vào chân tường.\nCó lẽ Nagi cũng giống như tôi, đã sắp đến\ngiới hạn rồi."

# monologue
# JP: （くしゅっ！　ぎにっ！　こしゅん！　ぐにゅっ！！）
1793 = "（Chà! Nắn! Chà! Xoa!!）"

# 【凪】
# display as 凪
# JP: 「っちゅっ！　ずっ！　れりゅううううっ！　じゅぶっ！\nずりゅうっ！　ちゅぶっ！　ずちゅっ！　じゅばっ！」
1222 = "「Chụt! Thút! Reryuuuu! Jubu!\nZuryuu!\nChubu! Zuchu! Juba!」"

# monologue
# JP: スパッツ越しにもはっきり感じる。凪の膣口のわななきを。\n瞬間、精液たちが一気に亀頭へ押し寄せてくる。
1708 = "Dù qua lớp quần bó tôi vẫn cảm nhận rõ\nrệt. Sự run rẩy ở cửa âm đạo của Nagi.\nKhoảnh khắc đó, tinh dịch đồng loạt trào\nlên quy đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　凪っ！　凪っ！　僕はっ、僕は、もうっ！！」
1112 = "「Nagi! Nagi! Nagi! Anh, anh, sắp!!」"

# 【凪】
# display as 凪
# JP: 「んっ！　ずりゅううううううううううっ！！！！！！\nじゅぼおおおおおおおおおおおおおおおおおおっ！！　」
1241 = "「Ưm! Zuryuuuuuuuuuuu!!!!!!\nJubooooooooooooooooooo!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
# 1209 = "「啊！！！」" 

# monologue
