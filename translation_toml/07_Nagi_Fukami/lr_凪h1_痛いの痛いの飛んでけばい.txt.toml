# JP: 気合が良く乗っているようだ。普段とまるで音が違う。\nこれならあるいは、木刀での唐竹割りさえ叶うやも――
1562 = "Có vẻ như em ấy đang rất hăng hái. Âm\nthanh hoàn toàn khác so với bình thường.\nThế này thì có khi em ấy có thể chẻ đôi\ncây tre bằng kiếm gỗ cũng nên――"

# 【凪】
# display as 凪
# JP: 「チェーーーーーーストーーーーーーーーーーっ！！！」
