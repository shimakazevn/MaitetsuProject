# display as 凪
# JP: 「やっ――はっ――すごっ――あつ、くてっ――っ――\nびゅ、びゅて――子宮――たたいて――おっぱい、も」
1126 = "「A——ha——tuyệt quá——nóng, quá——\nbắn, bắn\nđi——đập vào——tử cung đi——cả ngực, nữa」"

# monologue
# JP: （ぶっ！　びゅうっ！　――びゅるっ――ぷぴっ――）
1776 = "（Phụt! Phụt! ——Phụt——Phụt——）"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――はあっ――はあっ――はあっ――はあっ」
1163 = "「Kua——ha——ha——ha——ha」"

# 【凪】
# display as 凪
# JP: 「はっ――あっ――ふあっ――んっ――\nにぃさぁん――にーさぁんっ」
1167 = "「Ha——a——fua——ưm——\nAnh Soutetsu——anh\nSoutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪」
# 1103 = "「凪」" 

# monologue
# JP: 脱力しきって甘えて来る声。\n僕も脱力しきっているが、応えたくって――っ！！！？
1515 = "Giọng nói nũng nịu cất lên khi em đã hoàn\ntoàn kiệt sức.\nTôi cũng kiệt sức rồi,\nnhưng vẫn muốn đáp lại em——!!!?"

# monologue
# JP: （ずきっ！！）
1831 = "（Nhói!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「痛っ！！！」
1340 = "「Đau!!!」"

# 【凪】
# display as 凪
# JP: 「えっ！！？」
# 1215 = "「啊？！」" 

# monologue
# JP: ゆるみきってた凪の体が一瞬にして固くなる。
1498 = "Cơ thể Nagi vốn đang thả lỏng bỗng chốc\ncứng đờ."

# 【凪】
# display as 凪
# JP: 「にーさん！？\nひょっとして、さっきぶつけたところ痛むと！！？」
1263 = "「Anh Soutetsu!?\nCó phải chỗ vừa nãy bị đập\ntrúng đang đau không!!?」"

# monologue
# JP: 声をはっきり出してしまった。\nこれは恐らく、ごまかす方が凪を苦しめる形となろう。
1603 = "Tôi lỡ phát ra tiếng rõ mồn một mất rồi.\nLúc này mà lấp liếm thì e là Nagi sẽ càng\nthêm khổ tâm."

# 【双鉄】
# display as 雙鐵
# JP: 「少しだ、少し。ほんの少し。思いっきりに射精して、\n満足しきって緩んでしまって――痛みがそれで少しだけ」
1073 = "「Một chút thôi, một chút. Chỉ một chút\nthôi. Vì xuất tinh mạnh quá,\nthỏa mãn đến\nmức thả lỏng cơ thể——nên mới thấy hơi đau\nmột chút thôi.」"

# 【凪】
# display as 凪
# JP: 「なら」
1363 = "「Vậy thì」"

# monologue
# JP: （くにいいいいいいいっ！！）
1816 = "（Banh ra!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1209 = "「啊！！！」" 

# monologue
# JP: 凪が思い切り拡げてみせる。\n精子が溢れるおまんこではなく――
1504 = "Nagi mở rộng hết cỡ cho tôi xem.\nNhưng\nkhông phải là cô bé đang tràn trề tinh\ndịch——"

# 【凪】
# display as 凪
# JP: 「もういっかい、痛いの痛いのとんでけ、する、と？」
1350 = "「Có muốn làm 'cơn đau bay đi mất' thêm lần\nnữa không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。――とてもいい」
1268 = "「Ý kiến hay đấy. ——Rất tuyệt.」"

# monologue
# JP: こころの底から同意して。\n放置していた凪のアナルに、亀頭をにちゃりと貼り付ける。
1622 = "Tôi đồng ý từ tận đáy lòng.\nÉp chặt quy\nđầu nhóp nhép vào hậu môn của Nagi nãy giờ\nvẫn bị bỏ ngỏ."
