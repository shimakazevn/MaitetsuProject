1777 = "（咻！咻！咻！咻！！）" 

# 【凪】
# display as 凪
# JP: 「ふやっ！　あっ！　あっ！　んっ――（はぷっ！！）」
1129 = "「呀！啊！啊！嗯……（含！！）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ」
1191 = "「啊」" 

# monologue
# JP: （びゅっ！　びゅううっ！　びゅぶっ！　びゅるっ！）
1778 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「んくっ！　んっ――\nごきゅっっ！　ごくっ！　ごくっ！　こくんっ！」
1159 = "「唔！嗯……咕咚，咕咚！咕咚！咕咚！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――あっ――あっ――あっ――」
1168 = "「啊……啊……啊……啊……」" 

# monologue
# JP: 僕にイカされ――同時に達して、思わず口を離した凪が、\nふたたび必死にくわえて精飲してくれている。
1527 = "凪被我送上高潮，不由得鬆開了口，但她很快又再次努力含住了我，將精液喝了下去。" 

# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅっ！！）
# 1778 = "（咻！咻！咻！咻！）" 

# 【凪】
# display as 凪
# JP: 「んっ！　んくっ！　ごくっ！　こくっ！！！」
1240 = "「嗯！唔！咕咚！咕咚！！！」" 

# monologue
# JP: その健気さに、さらに精液が増産される。\nこれだけ射精していてもなお、まったく射精したりない！
1676 = "看她這麼努力，我的精液都變多了。我已經射了這麼多，卻感覺還想繼續射！" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪っ！！！」
1373 = "「！！！」" 

# monologue
# JP: （ずりゅっ！！！！）
1833 = "（磨擦！！！！）" 

# 【凪】
# display as 凪
# JP: 「ぷあっ！　ふえっ！？　にーさっ――！！！？」
1195 = "「啊！哎？！大哥哥……唔？！」" 

# monologue
# JP: (ぐいっ！！！）
1790 = "（抱）" 

# monologue
# JP: 凪を持ち上げひん剥いて、\n抱きしめながら抱え直して！
1613 = "我將凪抬起來，緊緊抱住她，將她的身體轉了個方向。" 

# 【凪】
# display as 凪
# JP: 「ふぁっ――にーさん、ちょっと強引すぎば――けぷっ」
1187 = "「啊……大哥哥，你太強硬了……嗝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1211 = "「啊！！！！」" 

# monologue
# JP: かわいいげっぷ。そこからただよう精液の匂い。\n勃起がぐいぐい硬度と熱とを取り戻す。
1564 = "她打個了可愛的嗝，嘴中傳出精液的氣味。我的勃起立刻又恢復了硬度與熱度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪――凪っ」
1094 = "「凪……凪」" 

# monologue
# JP: （すりゅっ――ずりゅっ――すりっ――くにゅっっ）
1830 = "（滑……溜……滑……溜）" 

# 【凪】
# display as 凪
# JP: 「ふあっ！　あ――にーさん、んんっ――元気、ばい、ね、\nぶつけた、とこ――もう、痛く――んっ――なか、と？」
1199 = "「啊！啊……大哥哥，唔……你真有精神，剛剛被打到的地方……已經……嗯……不痛了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1289 = "「是啊」" 

# monologue
# JP: 興奮しすぎて、意識が勃起に集中しすぎて正直わからん。\n明日になって、あるいは激しく痛んでしまうかもしれんが。
1701 = "說實話，我非常興奮，意識都集中在勃起上，其實沒感覺。興許到了明天那裡又會猛烈地發痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は、まったく何も痛まん」
1328 = "「現在我一點也不疼」" 

# 【凪】
# display as 凪
# JP: 「えへへっ！」
1252 = "「嘿嘿！」" 

