# 【稀咲】
# display as 稀咲
# JP: 「大人になるとはそういうことなんだ。\nつまり『適切な感じを出せる』ようになる」
2370 = "「成為大人就是這麼一回事。也就是要學會表現出“合適的感覺”」" 

# 【凪】
# display as 凪
# JP: 「適切な感じ……です？」
2036 = "「合適的感覺？」" 

# monologue
# JP: いって、自分で、ふかみちゃんみたいって、ふって思う。
2940 = "剛說完，咱就突然想起了小深。" 

# monologue
# JP: ふかみちゃんも、方言ばてっとり早くなおすため、\nずっと昔に、“ばい”から“です”に、直したのかも。
3033 = "小深可能也為了早點改掉方言，很早以前就糾正自己的語氣詞了。" 

# 【稀咲】
# display as 稀咲
# JP: 「ＴＰＯにあわせて服装を変える。これは、仕事なら仕事、遊びなら遊びの、『感じを出す』ため」
2465 = "「根據ＴＰＯ來更換服裝。這是為了在工作和娛樂時表現出不同的“感覺”」" 

# 【凪】
# display as 凪
# JP: 「あ！」
# 2142 = "「啊！」" 

# 【稀咲】
# display as 稀咲
# JP: 「お客様に対して敬語を使うのも同じ。\nお客様を大事に扱っている、『感じを出す』ため」
2291 = "「對乘客使用恭敬的口氣也是這個道理。是為了讓乘客感受到自己被尊敬的“感覺”」" 

# 【凪】
# display as 凪
# JP: 「あああ」
2129 = "「啊啊啊」" 

# monologue
# JP: すごかとばい。\nさすが、にーさんが推薦してくれた先生ばい！
3014 = "太厲害嘞。不愧是大哥哥力薦的老師！" 

# monologue
# JP: 今の説明！　めちゃくちゃわかりやすかとばい！！
2939 = "剛才的解釋真是通俗易懂咧！！" 

# 【稀咲】
# display as 稀咲
# JP: 「時に、場所に、場合に応じた、\n『感じを出せる』ようになれれば、それが大人さ」
2279 = "「學會根據時間、地點、場合表現出不同的“感覺”，這就算是大人了」" 

# 【凪】
# display as 凪
# JP: 「はうう……わかったとばい」
2085 = "「哇……咱懂咧」" 

# monologue
# JP: がくーんて来るばい、落ち込むばい。\n凪さま全然、一人前じゃなかったとばい！
3024 = "好受打擊，好消沉。本小姐還完全算不上大人咧！" 

# 【凪】
# display as 凪
# JP: 「うち……はうっ――私。\n全然、大人じゃなかった――です」
2068 = "「咱……呃……我呀。完全算不上……大人」" 

# 【稀咲】
# display as 稀咲
# JP: 「だねぇ。いつでもどこでもどんな場合でも、\n『自分』をただ出すだけならば、子供のふるまいさ」
2425 = "「是呀。不分時間地點場合，只顧表現出本性，這是小孩子才會做的行為」" 

# 【凪】
# display as 凪
# JP: 「うううう～」
2170 = "「嗚嗚嗚～」" 

# monologue
# JP: 恥ずかしかー。\n穴があったら――なくても掘って！　入りたか！！
3011 = "太丟人囉。要是地上有個洞——就算沒有洞咱也想挖個洞，然後鑽進去！！" 

# 【稀咲】
# display as 稀咲
# JP: 「けどね？　凪。そこに気づけたのならばもう、\n大人への一歩を踏み出している。間違いなくね」
1928 = "「不過啊，凪。能夠注意到這一點，你就算是向成為大人踏出一步了。一定是這樣的」" 

# 【凪】
# display as 凪
# JP: 「あ！」
# 2142 = "「啊！」" 

# monologue
# JP: 凪くん、じゃなくって、凪っていわれた！\nこれも多分、『感じ』出してくれとるばい！
3147 = "稀咲姐直接叫了咱的名字！這應該也是為了表現出“尊重的感覺”！" 

# monologue
# JP: 一歩大人に近づけたって！\nうち、いますごく、感じ取るけん！！！
3101 = "朝著大人邁進了一步！咱現在深有體會咧！！！" 

# 【凪】
# display as 凪
# JP: 「一歩。踏み出せた――ですか、私」
2072 = "「咱……我算是踏出一步了嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。間違いなく。ただ、無理な背伸びは禁物だよ？\n焦ることもまた、一番こどもじみた振る舞いだからね」
2186 = "「嗯，沒錯。不過可不能逞強哦。急於求成也是一種非常孩子氣的行為」" 

# 【凪】
# display as 凪
# JP: 「はい！　です、けど――。\nううう……むつかしかと――です」
2269 = "「好的！　可是……嗚嗚……還挺難整……不對，好困難啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう感じるなら、簡単なことから一つずつ、さ。\nばいをですにするように。一番身近な、小さなことから」
2360 = "「感覺困難的話，就從簡單小事一點一滴做起吧。就像改掉語氣詞一樣，從最切身的、最微小的事情開始」" 

# 【凪】
# display as 凪
# JP: 「一番身近な……」
2455 = "「最切身的……」" 

# monologue
# JP: パッ！　て、にーさんの顔ば頭にうかぶ。\nじーちゃんでも、ふかみちゃんでもなくにーさんが。
3161 = "第一個浮現在咱腦海裡的人是大哥哥。而不是爺爺或者小深。" 

# 【凪】
# display as 凪
# JP: 「それなら――それなら」
2645 = "「那……那就……」" 

# monologue
# JP: ばってん、そいも無理はなか。\nうちたちは、修学旅行の途中やけん。
2887 = "但這也沒辦法。畢竟咱們正在修學旅行。" 

# monologue
# JP: 旅の仲間で、リーダーは、\nいつだってにーさんに決まっとるけん！
2992 = "在旅行的伙伴中，咱們的頭兒當然永遠都是大哥哥！" 

# 【凪】
# display as 凪
# JP: 「あん……ね？　今度、にーさんと修学旅行、\n順番、凪さま――私、の、で」
2653 = "「那個……下次和大哥哥去修學旅行的人……輪到本小姐……不對，輪到我了」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　それが凪の――\n一番身近で、一番大事なお出かけ、かな？」
2201 = "「嗯？　這就是你最切身的、最重要的出行嗎？」" 

# monologue
# JP: 聞かれたら、急に恥ずかしくなる。\nなんでかしらん――顔ば、ぽっぽって熱くなる。
3191 = "被稀咲姐這麼一問，咱突然害羞起來了。不知為什麼，臉蛋變得熱騰騰的。" 

# 【凪】
# display as 凪
# JP: 「そうば――です！　だから、凪っ、私――\nＴＰＯ……にーさんと、出かけるときの」
2432 = "「是咧……是的！　所以本小姐……我和大哥哥出門時的ＴＰＯ……」" 

# 【稀咲】
# display as 稀咲
# JP: 「いいよ。任せて？　ぴったりの服を選んであげる」
2261 = "「好啊，交給我吧。　我來給你挑一身合適的衣服」" 

# monologue
# JP: あ……稀咲ねーちゃん、\nすっごく優しい顔しとる。
2978 = "啊……稀咲姐露出了一副好溫柔的表情。" 

# monologue
# JP: 優しい顔……けど……\nなんだかちょこっと、さみしそう――な？
3055 = "很溫柔……但是感覺好像又有點……寂寞？" 

# 【稀咲】
# display as 稀咲
# JP: 「凪の大事な修学旅行が素敵なものになるように。\n凪らしく、ＴＰＯをわきまえた服を、選んであげるよ」
2508 = "「為了讓你重要的修學旅行成為美好的回憶，我來給你選一身適合你的、符合ＴＰＯ的衣服吧」" 
