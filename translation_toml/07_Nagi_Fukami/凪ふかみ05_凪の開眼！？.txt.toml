# display as 稀咲
# JP: 「けどね？　凪。そこに気づけたのならばもう、\n大人への一歩を踏み出している。間違いなくね」
1928 = "「Nhưng mà nhé? Nagi. Nếu em đã nhận ra điều đó,\nthì em đã bước một bước trên con đường trở thành người lớn rồi. Chắc chắn là vậy.」"
# 【凪】
# display as 凪
# JP: 「あ！」
# 2142 = "「啊！」" 
# monologue
# JP: 凪くん、じゃなくって、凪っていわれた！\nこれも多分、『感じ』出してくれとるばい！
3147 = "Chị ấy gọi tớ là Nagi, chứ không phải Nagi-kun nữa!\nChắc đây cũng là cách chị ấy tạo ra 'dáng vẻ' đó nha!"
# monologue
# JP: 一歩大人に近づけたって！\nうち、いますごく、感じ取るけん！！！
3101 = "Đã tiến thêm một bước để trở thành người lớn!\nTớ đang cảm nhận được rất rõ ràng luôn!!!"
# 【凪】
# display as 凪
# JP: 「一歩。踏み出せた――ですか、私」
2072 = "「Một bước. Em đã bước được——rồi sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。間違いなく。ただ、無理な背伸びは禁物だよ？\n焦ることもまた、一番こどもじみた振る舞いだからね」
2186 = "「Ừm. Chắc chắn rồi. Nhưng tuyệt đối không được cố gồng mình nhé?\nVì nóng vội cũng là một cách cư xử trẻ con nhất đấy.」"
# 【凪】
# display as 凪
# JP: 「はい！　です、けど――。\nううう……むつかしかと――です」
2269 = "「Vâng! Desu, nhưng mà——.\nUuu...... khó quá——desu.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう感じるなら、簡単なことから一つずつ、さ。\nばいをですにするように。一番身近な、小さなことから」
2360 = "「Nếu em thấy vậy, thì cứ bắt đầu từ những việc đơn giản từng chút một.\nNhư việc đổi 'bai' thành 'desu' vậy. Từ những việc nhỏ nhặt, gần gũi nhất.」"
# 【凪】
# display as 凪
# JP: 「一番身近な……」
2455 = "「Gần gũi nhất......」"
# monologue
# JP: パッ！　て、にーさんの顔ば頭にうかぶ。\nじーちゃんでも、ふかみちゃんでもなくにーさんが。
3161 = "Phập! Gương mặt anh hai hiện lên trong đầu tớ.\nKhông phải ông nội, cũng chẳng phải Fukami, mà là anh hai."
# 【凪】
# display as 凪
# JP: 「それなら――それなら」
2645 = "「Nếu vậy——nếu vậy thì」"
# monologue
# JP: ばってん、そいも無理はなか。\nうちたちは、修学旅行の途中やけん。
2887 = "Cơ mà, cũng không có gì lạ.\nVì bọn tớ đang trong chuyến tu học mà lị."
# monologue
# JP: 旅の仲間で、リーダーは、\nいつだってにーさんに決まっとるけん！
2992 = "Trong số những người bạn đồng hành, thì người dẫn đầu\nlúc nào chẳng là anh hai chứ!"
# 【凪】
# display as 凪
# JP: 「あん……ね？　今度、にーさんと修学旅行、\n順番、凪さま――私、の、で」
2653 = "「À ừm...... nè? Lần tới, chuyến tu học cùng anh hai,\nđến lượt, Nagi ta đây——em, nên là.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　それが凪の――\n一番身近で、一番大事なお出かけ、かな？」
2201 = "「Hừm? Đó là——\nchuyến đi gần gũi nhất, quan trọng nhất của Nagi sao?」"
# monologue
# JP: 聞かれたら、急に恥ずかしくなる。\nなんでかしらん――顔ば、ぽっぽって熱くなる。
3191 = "Bị hỏi trúng tim đen, tự dưng tớ thấy xấu hổ.\nChẳng hiểu sao——mặt mũi cứ nóng bừng lên."
# 【凪】
# display as 凪
# JP: 「そうば――です！　だから、凪っ、私――\nＴＰＯ……にーさんと、出かけるときの」
2432 = "「Đúng vậ——desu! Vì vậy, Nagi, em——\nTPO...... khi đi chơi với anh hai.」"
# 【稀咲】
# display as 稀咲
# JP: 「いいよ。任せて？　ぴったりの服を選んであげる」
2261 = "「Được thôi. Cứ giao cho tôi nhé? Tôi sẽ chọn cho em một bộ đồ thật phù hợp.」"
# monologue
# JP: あ……稀咲ねーちゃん、\nすっごく優しい顔しとる。
2978 = "A...... Chị Kisaki,\nđang làm một vẻ mặt cực kỳ dịu dàng."
# monologue
# JP: 優しい顔……けど……\nなんだかちょこっと、さみしそう――な？
3055 = "Vẻ mặt dịu dàng...... nhưng mà......\ntrông có vẻ hơi, buồn buồn——sao á?"
# 【稀咲】
# display as 稀咲
# JP: 「凪の大事な修学旅行が素敵なものになるように。\n凪らしく、ＴＰＯをわきまえた服を、選んであげるよ」
2508 = "「Để chuyến tu học quan trọng của Nagi trở thành một kỷ niệm tuyệt vời.\nTôi sẽ chọn cho em một bộ đồ vừa mang đậm chất Nagi, vừa phù hợp với TPO.」"
