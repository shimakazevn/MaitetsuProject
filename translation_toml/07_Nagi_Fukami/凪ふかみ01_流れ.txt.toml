# 【ふかみ】
# display as 深美
# JP: 「それに、うまく行って観光客さんが増えたら、\nクマ川くだりのお客さんも、絶対に増えるはずだし」
1774 = "「而且要是他們進行得順利，遊客多了，來玩隈河漂流的人肯定也會變多吧」" 

# 【凪】
# display as 凪
# JP: 「それはまぁ、わからんでもなかけど――」
1832 = "「那倒也不是不能理解咧——」" 

# monologue
# JP: 言葉と同時、凪のうちわがピタリと止まる。
2204 = "她這麼說著，手中的扇子突然停了下來。" 

# 【凪】
# display as 凪
# JP: 「ばってん、それならもっと先に頑張るところあるばい」
1383 = "「不過，以後需要你努力的時候還多了去咧」" 

# monologue
# JP: きっぱり凪が言い切れば、\nふかみは言葉を喉に詰め、気まずげに視線を彷徨わせる。
2120 = "凪斬釘截鐵地說道。深美則吞吞吐吐，尷尬地左顧右盼。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんだって、わかっとるでしょお」
1399 = "「你肯定也知道吧」" 

# 【ふかみ】
# display as 深美
# JP: 「むぎゅっ」
1457 = "「咕嗚」" 

# monologue
# JP: 凪がふかみの顔を両手で挟み込む。\n挟んでそのまま、逃げようとする目線をまっすぐ捕まえる。
2128 = "凪用兩手夾住深美的臉。深美想要錯開目光，但凪直直地盯著她的眼睛。" 

# 【凪】
# display as 凪
# JP: 「船頭さんたちに帰ってきてもらうように頑張らんと。\nふかみちゃん、ちょっと無理しすぎやけん」
1738 = "「為了讓掌棹他們回來，咱們也得加油才行。小深，你有點太勉強自己啦」" 

# 【ふかみ】
# display as 深美
# JP: 「え、別に無理なんて」
1483 = "「哎，我沒勉強啊」" 

# 【凪】
# display as 凪
# JP: 「しとるもん。学園の先生も心配しとるし。\n期末、ふかみちゃんにしては成績わるかったでしょ」
1465 = "「咱知道的。學校的老師也在擔心你。你期末考試成績退步了不少吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、あれは……ちょっとウッカリミスとか」
1824 = "「那、那個是……只是我有點粗心了而已」" 

# 【凪】
# display as 凪
# JP: 「やっけーん、疲れとるいうことでしょお。\nふかみちゃんがウッカリミスばしよるとか」
1667 = "「才不是呢，是你太累了吧。你才不可能會這麼粗心呢」" 

# 【ふかみ】
# display as 深美
# JP: 「あぅぅ～」
1522 = "「啊嗚～」" 

# monologue
# JP: （ああ――）
2555 = "（啊啊——）" 

# monologue
# JP: そうだ。その通りに決まってる。\nクマ川下りをこなした上で、僕らの手伝いをして――
2330 = "是啊。肯定是這樣。她們平時不但要完成隈河漂流的工作，還要幫我們的忙——" 

# monologue
# JP: さらに、学園生の本分たる勉強もあり、\nふかみの場合は、家事の負担もあるだろう。
2159 = "同時還要盡學生的本分——學習。深美的話還要幫著幹家務。" 

# monologue
# JP: （ふかみも凪も、まだまだ未熟な学園生なのだ。\nそれを忘れて、好意にただただ甘えていたなど……）
2572 = "（深美和凪都還是稚氣未脫的學生。我竟然忘記了這一點，一直不假思索地接受著她們的好意……）" 

# monologue
# JP: 視野の狭さに、気の利かなさに、\n赤面させられ、情けなくなる。
2246 = "我一想到自己視野的狹窄和遲鈍，不由得覺得臉紅。" 

# monologue
# JP: が――ともかく気づいた。今気づけた。\nならばどうする？　当然、恩を返すのだ。
2036 = "不過——總歸是察覺到了。現在終於察覺到了。那該怎麼辦？當然是得報答她們了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクとポーレットとに相談しよう」
1083 = "「……去跟八六和波萊特談談吧」" 

# monologue
# JP: 煙問題が解決せねば、\n\x%l8620;#00ffc040;8620%l;#;を営業運転には出せん。
2029 = "不解決漏煙問題的話，就不能讓\\x%l8620;#00ffc040;８６２０%l;#;進行商業運營。" 

# monologue
# JP: それは逆から見てみれば、\n時間の自由を利かせられるということでもある。
2037 = "不過反過來看，可以自由支配的時間也就更多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。\nどうしてこんな単純なことに気がつかなかったのだ」
1691 = "「是啊。為什麼這麼單純的事情我就沒注意到呢」" 

# monologue
# JP: 電話か、あるいはハチロクか。\nどちらが先になるのでもいい。
2026 = "不管是先打電話還是先去找八六，孰先孰後都沒關係。" 

# monologue
# JP: 一刻も早く相談し、\n明日からでも、動き出したい。
2261 = "我只想儘快和她們商量好，然後最好從明天就開始行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今度は僕が、凪とふかみを手助けするのだ」
1813 = "「這次就換我來幫凪和深美吧」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　あの――ええとっ」
1490 = "「哎？那個——唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、迷惑でなければ、させてもらいたいのだ」
1661 = "「所以，如果不會給你們添麻煩的話，就讓我來幫你吧」" 

# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃん[かぜ]風の吹き回しと？」
1593 = "「大哥哥，你這是颳的什麼風啊？」" 

# monologue
# JP: まるで事態がのみこめてない――\n凪の言葉と表情に、先走っていたと気付かされる。
2186 = "她們完全不能理解發生了什麼事——凪的話和表情讓我察覺自己太過冒失了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あー、僕は……というか僕らは、だな。\nふかみと凪に甘えていたことに気がついたのだ」
1616 = "「就是，我……應該說是我們吧。我們發現之前深美和凪都是在單方面地幫助我們」" 

# monologue
# JP: ポーレットとハチロクと相談の上、\n\x%l8620;#00ffc040;8620%l;#;の運転試験の時間を夜へとずらすこと。
2163 = "和波萊特還有八六商量後，我們決定把\\x%l8620;#00ffc040;８６２０%l;#;的測試調整到夜裡。" 

# monologue
# JP: そうして空いた昼間の時間を、\n川下りの手伝いに使いたいことを、じゅんじゅん、話す。
2397 = "然後白天空出的時間就可以來幫助漂流這邊的工作——我這樣向她們解釋道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりは謝礼だ。もらった善意と労力を、\n僕なりの善意と労力をもって返したいのだ」
1617 = "「就當是謝禮吧。你們付出的善意和勞力，我們也想透過善意和勞力來報答」" 

# 【凪】
# display as 凪
# JP: 「ふぅん？」
1509 = "「唔？」" 

# 【ふかみ】
# display as 深美
# JP: 「え……本当に、手伝ってもらえるなら、\nすごく、助かるし嬉しいんですけど――でも」
1476 = "「哎……真能來幫忙我們當然是很高興啦——不過」" 

# monologue
# JP: 困ったようなふかみの視線。\n凪はすぐさま頷いて、ズイと僕へと詰め寄ってくる。
2371 = "深美的眼神顯得有些困惑。凪很快點點頭竄到我身邊。" 

# 【凪】
# display as 凪
# JP: 「なーんでいきなり、\n甘えてたとかいう話になっと？」
1634 = "「怎麼突然說起什麼“單方面”啊“幫助”啊這些話咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「動画を見たのだ。煙問題について何か気付けるかと思い。\nそうしたら、ふたりの会話で――」
1645 = "「我看了影片。因為想看看能不能找到什麼關於漏煙的線索。然後就聽到了你們倆的對話——」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　あのカメラっ！？」
1525 = "「啊！那個攝影機！？」" 

# monologue
# JP: ふかみは両手で口を覆って。\nそれからゆっくり、じわじわ赤くなっていく。
2368 = "深美用兩手捂住嘴。然後她的臉慢慢紅了起來。" 

# 【ふかみ】
# display as 深美
# JP: 「あの……見た、です？\nええと……その――カメラ……そのっ」
1830 = "「那個……你看了，嗎？唔……那個——攝影機……那個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ見たぞ。\n\x%l客車;#00ffc040;客車%l;#;に据え付けておいたやつを」
1563 = "「嗯，看了。就是放在\\x%l客車;#00ffc040;客運車廂%l;#;裡的那個攝影機拍的」" 

# monologue
# JP: 他にカメラも無かろうが、ふかみがあまりに不安げで、\nいわずもがなの言葉も足さずにはいられなくなる。
2514 = "雖然根本沒有其他攝影機，但看到深美如此不安，我也只得特地強調了一下。" 

# monologue
# JP: というか、\n何故にそこまで目をぐるぐるとさせているのか――
2039 = "不過為什麼她要一刻不停地左顧右盼呢——" 

# 【凪】
# display as 凪
# JP: 「ああ、ならにーさんにおなか見られたとねー」
1535 = "「啊，那咱的肚子肯定被大哥哥看光了吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ！？」
1468 = "「哇！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おなか？」
1777 = "「肚子？」" 

# monologue
# JP: 言われてみれば、そうだった。\n凪は盛大に腹を出し、ふかみも胸元をあけていた。
2203 = "她這麼一說，好像確實是這樣。凪大大剌剌地露出肚子，深美也敞開了胸口。" 

# monologue
# JP: が――
2058 = "但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「おなかが見えると、何かあるのか？」
1747 = "「看到了肚子然後怎麼了呢？」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ、えとっ」
1482 = "「哎，唔」" 

# 【凪】
# display as 凪
# JP: 「なにかあるのはにーさんの方ばい？\n可愛かったとー？　ドキドキしたとー？」
1701 = "「是說大哥哥你嗎？可不可愛？有沒有小鹿亂撞啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「なっ、凪ちゃんっ！？」
1604 = "「小、小凪！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1509 = "「唔？」" 

# monologue
# JP: 問われ、改めて考えてみる。
2202 = "她這麼一問，我又想了一想。" 

# monologue
# JP: 暑がって、無邪気に腹を出してる様子は確かに――
2180 = "天氣太熱，因此凪天真地露出肚子的樣子確實是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「可愛くあったな。暑さにバテる子犬のようで。\nが、ドキドキはしなかったな」
1672 = "「挺可愛的。就像是熱暈的小狗一樣。不過小鹿亂撞倒是沒有啦」" 

# 【ふかみ】
# display as 深美
# JP: 「ふぇぇっ」
1547 = "「嗚唉」" 

# 【凪】
# display as 凪
# JP: 「えー、どぎゃんして？」
1488 = "「哎？為什麼啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どぎゃんもこぎゃんも……\n逆に、何故ドキドキするのか教えてくれんか？」
1619 = "「就算你這麼問……我反而想問你為什麼我要小鹿亂撞啊？」" 

# 【凪】
# display as 凪
# JP: 「むぅ」
1504 = "「唔」" 

# monologue
# JP: 片頬だけを、凪はぷくんと膨らませる。
2122 = "凪氣呼呼地鼓起一側的臉頰。" 

# 【凪】
# display as 凪
# JP: 「そんなん、\nふかみちゃんがかわいいからに決まっとるばい！」
1745 = "「當然是因為小深很可愛啊！」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ」
# 1542 = "「喂，小凪！？」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんみたくかわいかこのあぎゃん姿ば見たら、\nドキドキするのが、あったりまえたい！」
1749 = "「看到小深那樣可愛的樣子當然會小鹿亂撞了啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
1693 = "「是嗎？」" 

# 【凪】
# display as 凪
# JP: 「そういうもんばい！」
1614 = "「就是！」" 

# monologue
# JP: きっぱり言い切り、そうして凪は、\n勝ち誇るような視線で僕を見る。
2194 = "她斬釘截鐵地說道。然後用自豪的眼神看向我。" 

# 【凪】
# display as 凪
# JP: 「そぎゃんかこつもわからんやったら、\nにーさんまだまだ未熟ばい！」
1819 = "「連這種事都不知道，大哥哥你太晚熟啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「未熟――」
1703 = "「晚熟——」" 

# 【ふかみ】
# display as 深美
# JP: 「もう！　凪ちゃんっっ！！」
1755 = "「真是的！ 小凪！！」" 

# 【凪】
# display as 凪
# JP: 「わひっ！？」
1545 = "「嗚哇！？」" 

# monologue
# JP: ふかみらしからぬ大声に、\n凪がビクンと跳ね上がる。
2356 = "深美一反常態大喊起來，連凪都被嚇了一跳。" 

# 【凪】
# display as 凪
# JP: 「な、なんね、ふかみちゃん」
1635 = "「怎麼，怎麼咧，小深」" 

# 【ふかみ】
# display as 深美
# JP: 「お、は、な、し。ね？　元に戻そう？\n双鉄さんが、お手伝いしてくれるかどうかに」
1669 = "「把、話、題、轉、回、來、吧？不是在說雙鐵先生想要幫我們的嘛」" 

# 【凪】
# display as 凪
# JP: 「そっ、そーだったばい」
1683 = "「是、是咧」" 

# monologue
# JP: 話をそらしてしまったことを、よほど真摯に反省したのか。\n凪は背筋まで伸ばし直して問うてくる。
2185 = "她似乎為自己把話題岔遠而認真反省了。然後她猛地挺直腰板重新向我問道：" 

# 【凪】
# display as 凪
# JP: 「ええっと――それじゃ、にーさんは、あの動画で、\nクマ川下りがキュウキュウなのを知りよった」
1498 = "「唔——那大哥哥你是從那個影片裡知道現在隈河漂流人手不足的嘍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ので、船頭さんを再雇用するまでの間、\n僕にできることがあれば、手伝いたいと考えたのだ」
1554 = "「嗯。所以在僱傭回掌棹人之前的這段期間，我打算幫你們做些我力所能及的事情」" 

# 【ふかみ】
# display as 深美
# JP: 「お手伝いとか……本当に……いいんですか？\nっていうか、だって、時間を作っても体力とか――」
1625 = "「幫忙……真的……可以嗎？就算你有時間，體力吃得消嗎——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、僕とて体力的には一人前の男性だぞ？」
1538 = "「喂喂，要說體力，我可好歹是個成年男性哦？」" 

# monologue
# JP: 右袖を大きくまくりあげ、力を込めてつきだして見せる。
2283 = "我捲起右袖，然後繃起手臂伸給她們看。" 

# monologue
# JP: 凪もおもしろがり、剥き出した腕を並べるが、\nさすがにこれは、僕の半分の太さも無い。
2125 = "凪玩心大起，伸出手臂來跟我比，不過她手臂的粗細連我的一半都不到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「力になれるさ。ふたりにそうしてもらった分、\n僕にも力にならせてもらえれば、光栄だ」
1779 = "「肯定能幫上忙的。能出力來報答你們之前為我們做的，我很光榮」" 

# 【ふかみ】
# display as 深美
# JP: 「わかりました。そういうことなら――」
1648 = "「我知道了。既然這樣——」" 

# monologue
# JP: すっくとふかみは立ち上がり、カウンターの裏へ回って、\n一枚のベストを持ってくる。
2357 = "深美唰地站起身，走到收銀台背後，拿出一件背心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「救命胴衣か？」
1682 = "「救生衣？」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。まずは落ちるところから始めてみてください」
1571 = "「嗯，首先就從掉下去的情況開始吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ちるところ……とは」
1675 = "「掉下去……是指」" 

# monologue
# JP: 聞かずもがなだ。\n川下りで、救命胴衣。
2081 = "其實也不用問。漂流加上救生衣。" 

# monologue
# JP: どこからどこに落とされるのか、\n推理できねば知能が足りんにもほどがある。が――
2230 = "從哪裡掉到哪裡，如果連這都推理不出來的話那智商也夠低的。不過——" 

# 【ふかみ】
# display as 深美
# JP: 「それで、大丈夫そうだって思ったら、\nお手伝い、ぜひぜひお願いしちゃいます」
1600 = "「如果你覺得可以接受的話，那就一定請你幫忙」" 

# 【双鉄】
