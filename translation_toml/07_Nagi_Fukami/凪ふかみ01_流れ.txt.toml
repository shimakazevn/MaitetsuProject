# monologue
# JP: 感覚が、さっきよりよほど滑らかだ。\n舟は僅かも飛沫を立てず、ただただ川面を滑って進む。
2242 = "感覺比剛才順暢多了。小船沒有掀起一點水花，只是在河面上滑動著前進。" 

# monologue
# JP: （ぐっ――すうっ――ぐっ――すうっ――）
2552 = "（咕——唰——咕——唰——）" 

# 【ふかみ】
# display as 深美
# JP: 「わ、すごい……普通に上手」
1472 = "「哇，好棒……已經這麼熟練了」" 

# 【凪】
# display as 凪
# JP: 「兄さん、やっぱり心得あるばい」
1588 = "「大哥哥你果然摸到竅門啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助言の――おかげだ――」
1843 = "「都是多虧了你們的指點——」" 

# monologue
# JP: 力を抜けとふかみに言われて、\n剣と同じと凪に示され――
2376 = "深美說要放鬆，凪告訴我要像用劍一樣——" 

# monologue
# JP: どちらの助言が足りずとも、\n恐らく意味が掴めなかったと、今なら思う。
2408 = "現在回想起來，要是缺少了任何一方的建議，恐怕我都不能掌握其中的要點吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「力でどうこうしようなどと思うのが間違いなのだな。\n川に対して、僕一人が何をしようとも――と、っとっ？」
1639 = "「想用蠻力硬來這種想法是錯的。對河來說我一個人的力量根本——唔？」" 

# monologue
# JP: 言ったら逆に、力んでしまった。
2308 = "我這麼一說反而又用力了。" 

# monologue
# JP: 自覚すればさらに力が入り、\nバランスはもう崩れに崩れて――
2235 = "意識到自己用了力，手上的力道卻用得更足，眼看要失去平衡了——" 

# 【ふかみ】
# display as 深美
# JP: 「あー」
# 1512 = "「啊——」" 

# 【凪】
# display as 凪
# JP: 「調子にのって息合い乱すからばい」
1841 = "「都是因為你太得意忘形亂了節奏咧」" 

# monologue
# JP: 舟が傾く。\n体が、滑って落ちていく――
2443 = "船身傾斜，身體隨之滑落——" 

# monologue
# JP: ……力を抜けば、すぐ水に浮く。\n櫓を離したなら、力を抜くなど容易なことだ。
1040 = "……只要一放鬆，人很快就浮出了水面。鬆開櫓之後放鬆也變得容易了許多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷはーーーっ！」
1452 = "「呼哈——！」" 

# monologue
# JP: だというのに、何故こうもささいなきっかけで、\n妙に力んでしまうのか。
2328 = "既然這樣，為什麼還會奇怪地因為一點小事就用了力呢。" 

# monologue
# JP: いっそ潜って頭を冷やし――\nたいと思った瞬間に、何かがツっ――と寄ってくる。
2067 = "倒不如先泡泡水讓頭腦冷靜冷靜——我剛這麼想，就發覺有什麼東西靠近了我身邊。" 

# 【ふかみ】
# display as 深美
# JP: 「で、どうですか？　双鉄さん」
1663 = "「所以，怎麼樣呢？雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――おお」
1508 = "「唔？ ——哦」" 

# monologue
# JP: 転覆させたかと思ったが、\nふかみは落ちず、舟も見事に立てなおしたようだ。
2309 = "我還以為船翻了，但深美卻沒掉入水中，而是又把船俐落地擺正了。" 

# monologue
# JP: 水棹ひとつですいすいと、\n僕と凪とが浮く傍らまで、舟ごと寄ってきてくれる。
2196 = "她正用一根棹平穩地把小船划到我和凪的身邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは何がだ？」
1073 = "「“怎麼樣”是指什麼啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、お手伝い。\nええと……大丈夫そうですか？」
1831 = "「那個，就是幫忙啊。唔……真的不要緊嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か――、か」
1786 = "「要不要緊——嗎」" 

# monologue
# JP: 心配そうなふかみの顔に、\nいったい何事かと思わされたが――
2419 = "看著深美那擔心的表情，我還在想到底是什麼事——" 

# 【双鉄】
# display as 雙鐵
# JP: 「この程度なら何ほどでもない。大丈夫だ。\nもとより、苦労は覚悟で来たのだしな」
1817 = "「這點程度完全沒關係，不要緊的。我本來就是做好了要吃苦的心理準備才來的」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……それなら」
1516 = "「啊……既然是這樣」" 

# monologue
# JP: ふかみの両手が水棹を離す。
2375 = "深美的雙手鬆開了棹。" 

# monologue
# JP: まるで祈りをささげるように、\n胸の前で手を握りしめる。
2192 = "她就像是在祈禱一般把雙手握在胸前。" 

# 【ふかみ】
# display as 深美
# JP: 「わたし、双鉄さんに。\n川下り、お手伝いしてほしい。です！」
1641 = "「我想請雙鐵先生你來幫忙！嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい。これからよろしく頼む」
1722 = "「求之不得，今後就請多指教了」" 

# 【ふかみ】
# display as 深美
# JP: 「はいっ！」
1557 = "「嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1855 = "「！？」" 

# monologue
# JP: 舳先を蹴って空に舞い、\nそしてくるりと一回転して水の中へと――
2198 = "她踏了一腳船頭飛向空中，然後在空中轉了一圈入水——" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
1575 = "「噢噢噢」" 

# monologue
# JP: カワセミが魚を捕りにいくように――\nふかみの体は美しく、水の中へと一気に潜る。
2211 = "就像是翠鳥捕魚一般——深美的身體劃出優美的弧線一下子潛入水中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんとも見事な――わぷっ！？」
1754 = "「真是太漂亮了——嗚哇！？」" 

# 【凪】
# display as 凪
# JP: 「かっぱふかみの攻撃ばい！\nにーさん、ここは手を組むばいっ！」
1697 = "「是河童小深的攻擊！大哥哥，咱們得聯手才行咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「かっぱじゃないもん！」
1643 = "「我才不是河童呢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ちょっ！　待てっ――ぷあっ！？」
1541 = "「喂！等——嗚哇！？」" 

# 【ふかみ】
# display as 深美
# JP: 「待ちませんよー」
1668 = "「才不等呢～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぬおっ！？」
1546 = "「嗚哦！？」" 

# monologue
# JP: 背後を取られ、\n頭の上からざんぶと水を注がれる。
2300 = "我背後受敵，被從頭上潑了好多水。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！？　何をっ」
1456 = "「咕哇！？你幹什麼」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは、川の怖さをわかってません。\nわかってないから、動きが思い切りよすぎちゃう」
1846 = "「雙鐵先生你還不知道河流有多麼可怕。就是因為不知道才會動得那麼用力的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1853 = "「！」" 

# monologue
# JP: ふかみの言葉に、\nその名の通りの深みを感じたような気がして――
2374 = "深美的這番話就像她的名字一般給人一種很有深度的感覺——" 

# monologue
# JP: その声が、川の底から響いた気がして、\n一瞬、背筋が寒くなる。
2426 = "而且感覺這聲音是從河底傳過來的，我一瞬感覺脊背發涼。" 

# 【ふかみ】
# display as 深美
# JP: 「だから怖さがわかるまで、\n少し、川遊びにつきあってください」
1659 = "「所以直到你知道它的可怕之處以前，就陪我們玩玩水吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、さすがに遊んでるヒマなどは――わぷっ！」
1386 = "「不，我現在根本就沒有時間玩——咕噗！」" 

# 【凪】
# display as 凪
# JP: 「にーさん、これも修行ばいっ！」
1597 = "「大哥哥，這也是修行嘛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「修行――つまりは訓練か」
1402 = "「修行——也就是訓練嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「そうですね、わたしを捕まえたら合格ってことで。\n早くつかまえれば、時間の節約にもなりますよ？」
1689 = "「是呢，只要抓住我就算是合格吧。早點抓住我就能節約更多時間了哦？」" 

# monologue
# JP: そういうことなら、是非も無い。\n確かにふかみのあの動き。川とひとつであるかのようだ。
2326 = "既然是這樣那就沒辦法了。深美的那動作確實就像和河水化為一體了似的。" 

# monologue
# JP: ふかみの動きを追って掴めるようになったら、\n舟を操ることも今より、容易になろう。
2208 = "如果能跟上深美的動作並且抓住她的話，划船應該也會比現在容易許多吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――っとっ！？」
1839 = "「那麼——唔！？」" 

# monologue
# JP: （ばしゃんっ！）
# 2556 = "（啪擦！）" 

# monologue
# JP: 足元を泳ぐふかみをつかまえようとして、\n自分で姿勢を崩してしまう。
2266 = "我想抓住在我腳邊游著的深美，可卻失去了平衡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「クソっ、この救命胴衣が」
1437 = "「可惡，都是因為這救生衣」" 

# 【ふかみ】
# display as 深美
# JP: 「脱いじゃダメっ！\n条件同じにするために、わたしも着ますね？」
1374 = "「不許脫！為了讓條件對等，我也穿上救生衣，沒問題吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　手伝え！」
1409 = "「凪！來幫我！」" 

# 【ふかみ】
# display as 深美
# JP: 「って、えっ！？」
1481 = "「哎，哎！？」" 

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？　ちょっ、待っ――」
1478 = "「哎哎！？等，等一等——」" 

# 【凪】
# display as 凪
# JP: 「待てって言われて待つよーなバカおらんばいっ！」
1492 = "「哪有讓等就等的笨蛋咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「ああん、もうっ！」
1521 = "「啊啊，真是的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうなっ！」
1435 = "「可不是！」" 

# 【ふかみ】
# display as 深美
# JP: 「でもですね？　そういうふうに甘くみちゃうと」
1381 = "「不過哦？可別小看我咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1854 = "「！！？」" 

# monologue
# JP: きちんと着きっていなかった。\n僕らがそれの邪魔をした。
2489 = "趁她還沒完全穿上，我們就出手妨礙。" 

# monologue
# JP: 愚かな選択をしてしまったと、\n一瞬にして思い知る。
2395 = "然後我們瞬間知道剛才做出了一個愚蠢的選擇。" 

# 【凪】
# display as 凪
# JP: 「抜けたとっ！？」
1737 = "「溜出去了！？」" 

# monologue
# JP: ふかみの姿は、一瞬にして水へと掻き消え――
2372 = "深美的身影一瞬消失在水中——" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおおおっ！！」
1549 = "「嗚噢噢！」" 

# monologue
# JP: 足首をいきなり掴まれて、\n川底へ一気に引き込まれっ――
2298 = "我突然被抓住了腳然後一口氣拖向河底——" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっ！？　うあっ」
1577 = "「噢！？嗚哇」" 

# 【ふかみ】
# display as 深美
# JP: 「これで、救命胴衣の大切さがわかりましたか？」
1744 = "「現在你知道救生衣有多重要了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。わかった――十分に」
1553 = "「嗯。我知道了——完全知道了」" 

# 【ふかみ】
# display as 深美
# JP: 「なら、\n今度はちゃんと、わたしにも着けさせてくださいね？」
1838 = "「那這次就乖乖讓我也穿好救生衣哦？」" 

# monologue
# JP: こくこく頷く。
2277 = "我拚命點頭。" 

# monologue
# JP: ふかみに救命胴衣を返して、その着用を待つ間、\n凪の元へと寄って行く。
2271 = "我把救生衣還給深美，然後在她穿的時候湊到了凪身邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「救命胴衣は抵抗でもある。ふかみを舟に近づけず、\n休ませず、持久戦へと持ち込もう」
1681 = "「救生衣會有阻力。我們別讓深美靠近船，也別讓她休息，拖入持久戰吧」" 

# 【凪】
# display as 凪
# JP: 「了解ばい！　いい作戦ばい！　\nふかみちゃんは泥仕合とか、好かんけんねー」
1756 = "「知道咧！不錯的作戰計劃！小深不喜歡這種拉鋸戰」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！　捕まえたっ！」
1599 = "「好！抓住了！」" 

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！？」
1442 = "「呀！？」" 

# 【凪】
# display as 凪
# JP: 「にーさん、大手柄ばいっ！」
1591 = "「大哥哥，你立大功咧！」" 

# monologue
# JP: 両手をあげて凪が喜ぶ。\nまさしく、喜色満面だ。
2131 = "凪高興地舉起雙手，一副喜形於色的樣子。" 

# monologue
# JP: まぁ――無理も無い。\nやっと、ようやく、なんとかなんとか……捕まえたのだ。
2040 = "不過，這也難怪。畢竟是費了大力氣才總算……抓住她的。" 

# 【凪】
# display as 凪
# JP: 「これであがれるばい、へとへとばい」
1762 = "「終於可以上船咧，要累死咱咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1692 = "「是啊」" 

# monologue
# JP: 川の中にいるというのに、自分の汗がわかりそうなほど、\n疲労は強く、体温もあがりきっている。
2517 = "雖說我們泡在河水裡，可是卻累得像感覺得到自己在出汗似的，體溫也上升得頗高。" 

# monologue
# JP: 涼しい場所で横になりたい。\n心の底からそう感じてる。
2263 = "我從心底裡冒出想要去找一個涼快的地方躺一陣的想法。" 

# 【ふかみ】
# display as 深美
# JP: 「あ……の――双鉄、さん」
1822 = "「那……個——雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1509 = "「唔？」" 

# monologue
# JP: 僕の手の中、ふかみの首がどんどん赤くなってい――
2455 = "被我抓在手中的深美，脖子變得越來越紅——" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1853 = "「！」" 

# monologue
# JP: ――気付き、慌てて、抱いていた手を離す。
1028 = "——我意識到不妥，慌慌張張地鬆開了抱著她的手。" 

# monologue
# JP: いくら相手が未熟な学園生とはいえど、\n救命胴衣ごしとはいえど。
2214 = "就算對方還是青澀的學生，就算還隔著一件救生衣。" 

# monologue
# JP: （水着の婦女子を、思いっきりに抱きすくめるなど、\nしていいことであるはずもない）
2574 = "（用力抱住一個穿著泳衣的女孩子總歸不太合適）" 

# 【ふかみ】
# display as 深美
# JP: 「あーあ、残念」
1534 = "「啊，好遺憾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1855 = "「！？」" 

# monologue
# JP: 謝らねば、と思った矢先、\nふかみが僕からスイと離れて振り返る。
2259 = "我剛想道歉，深美就唰地從我身邊游開了然後回過頭。" 

# monologue
# JP: 捕まったのが悔しいのか、その顔は本当に残念そうで――\nけれど、楽しげに輝いてもいて。
2022 = "不知道是不是因為被抓住了很不甘心，她真的是一臉遺憾的表情——可是卻又透出一絲開心的光彩。" 

# 【ふかみ】
# display as 深美
# JP: 「じゃ、あがりましょう？」
1835 = "「那我們上去吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……むっ？」
1499 = "「唔……嗯？」" 

# monologue
# JP: ふかみを捕まえホっとしてアドレナリンが抜けたのか、\n体が重くて仕方ない。
2021 = "不知道是不是因為抓住深美鬆了勁後腎上腺素褪去的關係，身體沉重得不得了。" 

# monologue
# JP: 水の一滴がねばつくようで、\n油断をすると流されそうで――
2241 = "感覺每一滴水都黏在我身上，一個不當心就會被沖走似的——" 

# monologue
# JP: （これが……なるほど、川の怖さか）
2548 = "（原來如此……這就是河流的恐怖嗎）" 

# monologue
# JP: ふかみの訓練の成果を痛感させられながら、\n僕もゆるゆる、岸へと戻る。
2310 = "我邊切身體會著深美訓練的成果，邊緩緩地向岸邊游去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほれ」
1763 = "「給」" 

# 【凪】
# display as 凪
# JP: 「ありがとばい！\nえへへー、ただ酒はサイコーばいっ！」
1795 = "「謝謝咧！哎嘿嘿。有人請喝酒最棒了！」" 

# 【ふかみ】
# display as 深美
# JP: 「コーンポタージュスープじゃない」
1826 = "「那不是玉米濃湯嗎」" 

# monologue
# JP: 僕が渡したホットの缶を、\n凪もふかみも、カイロのように両手で包む。
2114 = "凪和深美像抱著暖暖包一樣地用雙手握著我給她們遞去的易開罐。" 

# 【ふかみ】
# display as 深美
# JP: 「あの、本当にご馳走になっても」
1796 = "「讓你這麼請客不太好吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご馳走というほどの金額でもない。\n迷惑でなければ飲んでくれ」
1818 = "「這點錢談不上請客啦。不要嫌棄，儘管喝吧」" 

# 【ふかみ】
# display as 深美
# JP: 「迷惑だなんて……いただきます」
1633 = "「怎麼會嫌棄呢……那我喝了」" 

# 【凪】
# display as 凪
# JP: 「いっただっきまーす！　んぐっ、んぐっ、\nくあー！　うまかー！　ハラワタにしみったい！」
1459 = "「咱喝囉！咕咚咕咚！好好喝！腸子都暖暖的咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。本当だ。\n自覚していたよりも、更に冷えてしまっていたようだな」
1566 = "「嗯，真的很好喝。看來身體比自己覺得的還要更冷啊」" 

# monologue
# JP: 無糖の筈の紅茶の甘みが、\n胃の底に落ち、そこから手足に広がっていく。
2421 = "紅茶明明沒加糖，它本身的甜味卻一路浸潤到胃底，然後再擴展到手足上。" 

# monologue
# JP: あたたかい。\nあたたかみが実に、心地良い。
2206 = "好溫暖。這溫暖的感覺真的讓人很舒服。" 

# 【ふかみ】
# display as 深美
# JP: 「まだ双鉄さん、流れに逆らっちゃってるからですよ。\nそれで体力、余分に使って冷えちゃったんです」
1814 = "「這次還是因為你反抗水流的緣故啦。所以用了那麼多的體力才會覺得冷的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったか？　\nそのまま浮くよう、心がけたつもりだったのだが――」
1694 = "「是嗎？我倒是一直注意著讓自己自然漂浮起來的啊——」" 

# 【ふかみ】
# display as 深美
# JP: 「そのまま浮く、を、双鉄さん、\n“その場で浮く”って、頑張ってますから」
1847 = "「雙鐵先生是把“自然漂浮起來”努力弄成了“在那個地方漂浮起來”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1509 = "「唔？」" 

# monologue
# JP: 何が違うか、わからない。\nふかみはうふふと、楽しげに微笑し言葉をつなぐ。
2252 = "我不知道這兩個有什麼區別。深美則顯得很高興地微笑著繼續說道：" 

# 【ふかみ】
# display as 深美
# JP: 「淀みの中にだって流れはあります。\nだから、“そのまま”浮いてれば、流されるんですよ？」
1735 = "「淤水處的水也是在流動的。所以，要是維持著“自然漂浮”的狀態，可是會被沖走的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　ならば僕は無意識に、\n“その場に”とどまろうとして――」
1527 = "「啊！那我就是在無意識中想要“停留在那個地方”——」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。流れに逆らって、\nだから疲れちゃったんですよ」
1551 = "「嗯。你在試圖反抗水流，所以才會這麼累」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 1425 = "「原來如此」" 

# 【凪】
# display as 凪
# JP: 「流れに逆らったらいけんばい。\n疲れたあげく、やっぱり流されるだけになるけん」
1434 = "「反抗水流可不行咧。到時候累得一塌糊塗不說結果還是會被沖走」" 

# monologue
# JP: 体で思い知ってるのだろう。\n凪の言葉には、重みにも近い説得力がある。
2302 = "我身體的沉重感給凪的話增加了不少說服力。" 

# 【ふかみ】
# display as 深美
# JP: 「流れに乗るのが、流れを制するただひとつの方法。\n流れとひとつになって、その勢いを活かすんですよ」
1510 = "「唯一能駕馭水流，控制水流的方法，就是和水流合而為一，順其勢而行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ。確かに……淀みの中にあってもこれほど、\n消耗を強いる力だものな」
1503 = "「唔。確實……就算是在淤水處它也擁有讓我消耗這麼多體力的力量啊」" 

# monologue
# JP: そうと思えば、疲れを余計に感じてしまう。\n同時に、かなりの――
2249 = "我一這麼想，就越來越覺得疲勞了。同時還覺得很——" 

# monologue
# JP: （ぐ～～っ――）
2553 = "（咕～）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1480 = "「哎喲」" 

# 【凪】
# display as 凪
# JP: 「お腹へるばい？　減ったばいっ！」
1400 = "「你餓了嗎？餓了吧！」" 

# monologue
# JP: 僕の腹の音に、凪はしかりしかりと頷く。
2430 = "聽到我肚子發出的聲音凪不住地點頭。" 

# 【凪】
# display as 凪
# JP: 「お肉食べたかばーい！\n河原でバーベキューしたかとばい！」
1461 = "「咱想吃肉！咱們在河邊烤肉吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「バーベキューの道具なんて持ってないよう」
1441 = "「可我們沒帶烤肉的道具啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……それはいいのではないか？」
1365 = "「不……這個不是很好嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　それって？」
1486 = "「哎？“這個”是哪個？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、『河原でバーベキュー』だ。\n例えば、川下りのあとのオプションとして」
1665 = "「所以，是“河邊ＢＢＱ”啊。比如說，可以作為漂流之後的可選項目」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
1523 = "「啊！」" 

# monologue
# JP: それ単体でも悪くはないが、鉄道観光と連携させれば、\nもっと膨らみそうな気がする。
2513 = "雖然光弄這個也不錯，不過要是能和鐵路觀光配合的話，那估計就會更興旺的。" 

# monologue
# JP: 例えば\x%l8620;#00ffc040;8620%l;#;の石炭を、\nそのまま点火剤として流用するとか――――っ！
2334 = "比如說可以把\\x%l8620;#00ffc040;８６２０%l;#;的煤炭作為引火物之類的————！" 

# 【凪】
# display as 凪
# JP: 「にーさん？」
1598 = "「大哥哥？」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さん、どうかしましたか？　――きゃっ！？」
1845 = "「雙鐵先生你怎麼了？——哇！？」" 

# monologue
# JP: 凪の、ふかみの手をにぎる。\nぶんぶん大きく握手する。
2284 = "我握住凪和深美的手，用力握手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ、それだ、バーベキューだ！\nバーベキューと流れで、いけるかもしれん」
1603 = "「對，就是這個，烤肉！加上烤肉的話說不定可以！」" 

# 【凪】
# display as 凪
# JP: 「な、なにがばい！？」
1792 = "「說，說什麼咧！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「煙だ。煙の問題だ。流れが制御できんものなら、\n制御可能な流れを作り、ぶつければいい」
1699 = "「是煙，煙的問題。既然煙的流向無法控制，那就做出可以控制流向的煙然後對衝上去就行了」" 

# monologue
# JP: 技術的に可能かどうか、精査してもらう必要はあろう。
2315 = "技術上可不可行還需要請人仔細探討。" 

# monologue
# JP: だが基本的にこの方向で、\n間違ってないという感触がある。
2038 = "不過我覺得基本朝這個方向走不會錯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりのおかげだ、ありがとう！」
1583 = "「多虧了你們倆，謝謝！」" 

# 【凪】
# display as 凪
# JP: 「わっ！？」
# 1469 = "「哇！？」" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ！？」
1475 = "「哈嗚！？」" 

# monologue
# JP: 抱きしめ、頭をぐしぐし撫でる。
2276 = "我抱住她們，撫摸她們的頭。" 

# monologue
# JP: 凪を撫でてる左手とふかみを撫でてる右手、\n髪の硬さは随分違うが、シャンプーの匂いはおんなじだ。
2226 = "左手撫摸著凪，右手撫摸著深美。她們的頭髮硬度完全不一樣，不過洗髮精的香氣卻是一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言うならば、そうバーベキュー\x%l列車;#00ffc040;列車%l;#;。\n煙で、煙を制する\x%l列車;#00ffc040;列車%l;#;だ」
1609 = "「就叫它ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;吧。以煙制煙的\\x%l列車;#00ffc040;列車%l;#;」" 
