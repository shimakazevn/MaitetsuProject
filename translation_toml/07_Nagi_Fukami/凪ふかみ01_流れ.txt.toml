# lines: 445 
# monologue
# JP: （ブーーーーーーーーっ！）
2557 = "（Bípppppppp!）"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、まだ押し足りないのですか？\n運転前にも、さんざ押されたではありませんか」
1507 = "「Trời ạ, cô vẫn chưa ấn đủ sao?\nTrước khi\nchạy cô cũng ấn quá trời rồi mà.」"

# 【凪】
# display as 凪
# JP: 「練習と本番ば、まるきり別たい！」
1765 = "「Luyện tập và thực hành là hai chuyện hoàn\ntoàn khác nhau mà!」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1692 = "「À.」"

# monologue
# JP: 苦笑と微笑の、ちょうど真ん中。
2079 = "Một nụ cười nằm ngay giữa ranh giới của nụ\ncười gượng và mỉm cười."

# monologue
# JP: 凪より小さいハチロクは、\nなんとも大人びた笑みで、凪の無邪気を受け止める。
2333 = "Hachiroku tuy nhỏ bé hơn Nagi,\nnhưng lại\nđón nhận sự ngây thơ của Nagi bằng một nụ\ncười đầy trưởng thành."

# 【ハチロク】
# display as 八六
# JP: 「確かに、練習と本番はまるで別物ですね。\n同じように走ったつもりでも、再現できませんでしたか」
1569 = "「Quả thực, luyện tập và thực hành là hai\nchuyện hoàn toàn khác nhau.\nDù định chạy\ngiống hệt nhau, nhưng vẫn không thể tái\nhiện lại được nhỉ.」"

# monologue
# JP: 煙が流入してきたら、即座にブザーを押して貰う。
2466 = "Nếu có khói tràn vào, cô ấy sẽ lập tức ấn\ncòi báo động."

# monologue
# JP: すぐに非常停止をし、\x%lカマ;#00ffc040;カマ%l;#;はそのまま維持をして、\n煙の様子を確認しにいく――そんな計画だったのだ。が。
2393 = "Sau đó sẽ dừng khẩn cấp, vẫn giữ nguyên\ntình trạng của \\x%lカマ;#00ffc040;lò hơi%l;#;,\nrồi đi kiểm tra tình\ntrạng khói——Kế hoạch vốn là vậy. Nhưng mà."

# 【双鉄】
# display as 雙鐵
# JP: 「――せっかく録画までしたのにな」
1065 = "「——Mất công ghi hình lại luôn rồi mà.」"

# monologue
# JP: ポーレットから借りてストーブの前に据え付けていた、\n小さなムービーカメラを止める。
2313 = "Tôi tắt chiếc máy quay phim nhỏ mượn từ\nPaulette\nđược đặt ngay trước bếp lò sưởi."

# 【双鉄】
# display as 雙鐵
# JP: 「……とにもかくにも、精査しよう。\n流入問題を解決せねば、観光\x%l列車;#00ffc040;列車%l;#;は実現できん」
1091 = "「……Dù sao đi nữa, hãy kiểm tra kỹ lại xem.\nNếu không giải quyết được vấn đề tràn khói\nthì không thể đưa \\x%l列車;#00ffc040;đoàn tàu%l;#; tham quan vào\nthực tế\nđược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ううむ」
1059 = "「——Ưm.」"

# monologue
# JP: 駅売店のパンとジュースで食事の時間を節約し、\n徹底的に話しあっても、大した成果を得られなかった。
2384 = "Chúng tôi đã tiết kiệm thời gian ăn uống\nbằng bánh mì và nước ép mua ở ki-ốt nhà\nga,\nvà thảo luận cặn kẽ, nhưng vẫn không\nthu được kết quả gì đáng kể."

# 【双鉄】
# display as 雙鐵
# JP: 「難しいな。形の無いものを追うというのは。\n雲を掴むような話……とは、よく言ったものだ」
1788 = "「Đuổi theo một thứ không có hình dạng thật\nkhó khăn.\nĐúng như người ta vẫn nói……như\nmò kim đáy biển vậy.」"

# monologue
# JP: そうであっても、煙を掴まえなければならぬ。
2057 = "Dù vậy, chúng tôi vẫn phải tóm được làn\nkhói đó."

# monologue
# JP: 流入を防ぐ手段を思いつけねば、\x%l8620;#00ffc040;8620%l;#;も\x%l客車;#00ffc040;客車%l;#;も活用できず、\n工場誘致反対の大きな武器を無くしてしまう。
2463 = "Nếu không nghĩ ra cách ngăn khói tràn vào,\nsẽ không thể tận dụng được cả \\x%l8620;#00ffc040;8620%l;#; lẫn \\x%l客車;#00ffc040;toa hành khách%l;#;\n,\nvà\nđánh mất đi một vũ khí lớn để phản đối\nviệc thu hút nhà máy."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、今日話し合ったことを整理しよう……\nっと――」
1768 = "「Tóm lại, hãy tổng hợp những gì đã thảo\nluận hôm nay nào……\nƯm——」"

# monologue
# JP: ポケットの中にメモ帳が無い。\nならば、恐らく\x%l乗務鞄;#00ffc040;乗務鞄%l;#;に……ああ。
2287 = "Sổ tay không có trong túi.\nVậy thì chắc là\nở trong \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#;……A."

# 【双鉄】
# display as 雙鐵
# JP: 「やはりここか――む？」
1715 = "「Quả nhiên là ở đây——Hửm?」"

# monologue
# JP: 見慣れぬ何かに少し戸惑い、すぐ思い出す。\nポーレットからムービーカメラを預かっていた。
2296 = "Hơi bối rối trước một vật lạ lẫm, nhưng\ntôi nhớ ra ngay.\nTôi đang giữ máy quay\nphim mượn từ Paulette."

# monologue
# JP: 流入の無かった\x%l客車;#00ffc040;客車%l;#;を見ても、\nさしたる情報も得られなかろうが……
2515 = "Dù có xem lại \\x%l客車;#00ffc040;toa hành khách%l;#; không bị tràn\nkhói,\nchắc\ncũng chẳng thu được thông tin gì đáng kể……"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ヒントくらいは見つけられるかもしれん」
1382 = "「Nhưng biết đâu lại tìm được gợi ý gì đó.」"

# monologue
# JP: あれだけ頭を捻っても、\nこれという案が出なかったのだ。
2049 = "Vắt óc suy nghĩ đến vậy rồi,\nmà vẫn chưa\nđưa ra được phương án nào ra hồn."

# monologue
# JP: 視点の角度を変える意味でも、\nまるきりの無駄にはならんだろう。
2508 = "Dù là với ý nghĩa thay đổi góc nhìn đi\nnữa,\nthì chắc cũng không đến nỗi hoàn toàn\nvô ích."

# 【双鉄】
# display as 雙鐵
# JP: 「……これで見れればいいのだが――」
1086 = "「……Hy vọng là có thể xem được bằng cái\nnày——」"

# monologue
# JP: カードをＰＣのスロットに差し、\n動画データを再生してみる。
2272 = "Tôi cắm thẻ nhớ vào khe cắm của máy tính,\nvà thử phát dữ liệu video."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、良かった。\nちゃんと写っているな――」
1532 = "「A, may quá.\nHình ảnh rõ nét ghê——」"

# 【ポーレット】
# display as 波萊特
# JP: 「――っと。はい、これで録画してあるから、\nカメラ、いじらないでね？」
1061 = "「——Xong. Rồi, máy đang ghi hình đó,\nđừng\nđụng vào máy quay nhé?」"

# 【凪】
# display as 凪
# JP: 「わかったばい！　いじらんばい！」
1463 = "「Mình biết rồi! Không đụng đâu!」"

# 【ポーレット】
# display as 波萊特
# JP: 「……ふかみちゃん、くれぐれもお願いね？」
1085 = "「……Fukami, nhờ cả vào em đấy nhé?」"

# 【ふかみ】
# display as 深美
# JP: 「は、はい。わかりました、です」
1550 = "「V-vâng. Em biết rồi ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら、またあとで」
1836 = "「Vậy lát gặp lại nha.」"

# monologue
# JP: ……設置直後ということならば、走りだすまで随分と待つ。\n静止状態の\x%l客車;#00ffc040;客車%l;#;内にはさすがにヒントもなかろう。
1047 = "……Nếu vừa mới đặt xong thì phải đợi khá\nlâu mới bắt đầu chạy.\nBên trong \\x%l客車;#00ffc040;toa hành khách%l;#; đang đứng\nyên chắc hẳn chẳng có gợi ý nào đâu."

# monologue
# JP: 車窓の景色に注意しながら早送りして―――\nああ、走りだしたか――
2312 = "Tôi vừa tua nhanh vừa chú ý đến cảnh sắc\nngoài cửa sổ——\nA, tàu bắt đầu chạy rồi——"

# monologue
# JP: （っ！？）
2582 = "（!?）"

# monologue
# JP: ギョっとして、マウスのボタンを離してしまえば、\nすぐに画面は通常速度で再生される。
2250 = "Tôi giật mình, buông tay khỏi nút chuột,\nmàn hình lập tức phát lại ở tốc độ bình\nthường."

# 【ふかみ】
# display as 深美
# JP: 「ちょっ、凪ちゃんっ！？」
1542 = "「Khoan, Nagi!?」"

# monologue
# JP: 画面の中では、凪がシャツを大きくめくり、\nその裾をきゅっと結んでる。
2415 = "Trong màn hình, Nagi vén áo sơ mi lên cao,\nrồi buộc vạt áo lại."

# monologue
# JP: ……完全に腹が丸出しだ。\nいったいなにが起きたのか、少し戻して確かめる。
1042 = "……Bụng con bé phơi ra hoàn toàn.\nRốt cuộc\ncó chuyện gì vậy, tôi tua lại một chút để\nxem."

# 【凪】
# display as 凪
# JP: 「――こ－やって、引っ掛けてひっぱりあって、\n勝負したとよ」
1063 = "「——Như vầy nè, móc vào nhau rồi kéo ra,\nđể\nphân thắng bại á.」"

# 【ふかみ】
# display as 深美
# JP: 「ほんとにやったんだ。\nそれで、どっちが勝ったの？」
1396 = "「Cậu làm thật luôn hả.\nRồi ai thắng vậy?」"

# 【凪】
# display as 凪
# JP: 「スパゲッティばい！　\nじいちゃんは、ションボリとうどんすすっとったばい」
1700 = "「Là mì Ý!\nÔng nội tiu nghỉu húp mì udon\nluôn á.」"

# 【ふかみ】
# display as 深美
# JP: 「あはは、凪ちゃんのおうちって面白いねぇ。\n……あ……んっ――」
1520 = "「Ahaha, nhà Nagi thú vị ghê.\n……A……Ưm——」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃん？」
1608 = "「Fukami?」"

# 【ふかみ】
# display as 深美
# JP: 「ううん、なんでもないよ。なんでも」
1443 = "「Không, không có gì đâu. Không có gì.」"

# monologue
# JP: いや、何でもないことはないだろう。\n額にびっしり汗を浮かばせ、顔も真っ赤だ。
2042 = "Không, chắc chắn là có gì đó.\nTrán con bé\nlấm tấm mồ hôi, mặt cũng đỏ bừng."

# monologue
# JP: （ぬぎっ！）
2577 = "（Cởi!）"

# 【ふかみ】
# display as 深美
# JP: 「ちょっ、凪ちゃんっ！？」
# 1542 = "「喂，小凪！？」" 

# monologue
# JP: ああ、戻ってきた。\nなるほど、こういう事情だったか。
2169 = "A, quay lại cảnh đó rồi.\nRa là vậy, thì ra\nlà chuyện này."

# 【凪】
# display as 凪
# JP: 「暑くてまともに着とれんばいっ！\nふかみちゃんも、まくったら良かとよ」
1816 = "「Nóng quá không mặc đồ đàng hoàng nổi\nluôn!\nFukami cũng vén lên đi.」"

# 【ふかみ】
# display as 深美
# JP: 「う、うん――」
1501 = "「Ư, ừm——」"

# monologue
# JP: ふかみはおずおず、胸の部分を引っ張って、\nそこから風を送り込む。
2364 = "Fukami rụt rè kéo phần ngực áo ra,\nđể gió\nlùa vào trong."

# monologue
# JP: すかさず凪は、剥き出しの腹をうちわでパタパタ。\nふかみは体をよじって笑う。
2229 = "Ngay lập tức Nagi dùng quạt phẩy phẩy vào\ncái bụng trần.\nFukami uốn éo người cười\nkhúc khích."

# 【ふかみ】
# display as 深美
# JP: 「やだ、凪ちゃんってばくすぐったいよぉ」
1791 = "「Thôi đi, Nagi làm nhột quá à.」"

# 【凪】
# display as 凪
# JP: 「おなかは弱かと？　なら、おでこばい」
1776 = "「Bụng là điểm yếu hả? Vậy thì trán nè.」"

# monologue
# JP: 今度は一転、やわらかな風。\nそよそよと、母が赤子にうちわで送っているような。
2507 = "Lần này đổi lại là một làn gió nhẹ nhàng.\nHiu hiu, giống như người mẹ đang quạt cho\nđứa con thơ vậy."

# monologue
# JP: ふかみは目を閉じ、\n心地よさ気に顎をそらして首を出す。
2380 = "Fukami nhắm mắt lại,\nngửa cằm đưa cổ ra vẻ\nđầy dễ chịu."

# 【ふかみ】
# display as 深美
# JP: 「あ……涼しい」
1514 = "「A……Mát quá.」"

# 【凪】
# display as 凪
# JP: 「川よりずーっと暑かけんねぇ。\n無理したらいけんよ」
1815 = "「Ở đây nóng hơn ngoài sông nhiều ha.\nĐừng\ncó ráng quá đó.」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
1556 = "「Ừm.」"

# monologue
# JP: （意外というか……\n凪も、細やかな気遣いをするものなのだな）
2579 = "（Nói là bất ngờ thì cũng đúng……\nNagi cũng\nbiết quan tâm chu đáo gớm nhỉ.）"

# monologue
# JP: ふかみが素直に、気兼ねなく涼めるようにと、\nシャツをめくって、まずは自分が大げさなほど暑がった。
2385 = "Để Fukami có thể ngoan ngoãn, thoải mái\nhóng mát,\ncon bé đã vén áo lên, tự mình\nlàm quá lên rằng rất nóng trước."

# monologue
# JP: 凪が優しく繰る風は、ゆだったようなふかみの顔を、\nみるみる穏やかなものにする。
2124 = "Làn gió dịu dàng từ chiếc quạt của Nagi\nnhanh chóng làm dịu đi khuôn mặt đỏ bừng\ncủa Fukami."

# monologue
# JP: （暑さ対策、わかってはいたつもりだったが……\n凪を見習い、さらに工夫と気遣いとを凝らさねば）
2562 = "（Biện pháp chống nóng, mình cứ tưởng là đã\nnắm rõ rồi……\nNhưng phải học hỏi Nagi, cần\nphải suy nghĩ và quan tâm nhiều hơn nữa\nmới được.）"

# monologue
# JP: 思いをそのまま、メモに取る。\nそうする間にも、動画の中の凪はふかみをあおぎ続ける。
2269 = "Tôi ghi lại suy nghĩ đó vào sổ tay.\nTrong\nlúc đó, Nagi trong video vẫn tiếp tục quạt\ncho Fukami."

# 【凪】
# display as 凪
# JP: 「窓あけんと？　“じょえんばん”たらゆーのがまだでも、\n少しだったら開けて平気ってハチロク言うとったばい」
1384 = "「Không mở cửa sổ hả? Dù cái gọi là 'Tấm\nchắn khói' chưa có,\nnhưng Hachiroku nói mở\nmột chút cũng không sao đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「でも……開けたら条件が変わっちゃうから」
1380 = "「Nhưng mà……mở ra thì điều kiện sẽ thay đổi\nmất.」"

# 【凪】
# display as 凪
# JP: 「条件？」
1716 = "「Điều kiện?」"

# monologue
# JP: こくんと、とても小さな頷き。
2378 = "Một cái gật đầu thật khẽ."

# monologue
# JP: 照れくさそうに、はにかむように、\nふかみは長いおさげを指でもてあそぶ。
2190 = "Trông có vẻ ngại ngùng, bẽn lẽn,\nFukami\ndùng ngón tay mân mê bím tóc dài của mình."

# 【ふかみ】
# display as 深美
# JP: 「……条件が変わっちゃったら、最初のとき、\nどうやって煙が入ってきたかわからなくなっちゃうから」
1096 = "「……Nếu điều kiện thay đổi, thì sẽ không\nbiết\nlúc đầu khói bay vào bằng cách nào\nnữa.」"

# monologue
# JP: （っ！）
2581 = "（!）"

# 【凪】
# display as 凪
# JP: 「うわ、ふかみちゃんよーく考えとるねぇ」
1470 = "「Oa, Fukami suy nghĩ thấu đáo ghê.」"

# monologue
# JP: 画面の向こうの凪の言葉に、心の底から同意する。
2264 = "Tôi hoàn toàn đồng ý với lời nói của Nagi\nở bên kia màn hình."

# monologue
# JP: そこまで考え、試験に臨んでくれていたとは、\n想像だにしていなかった。
2289 = "Tôi không thể ngờ rằng con bé lại\nsuy nghĩ\nđến mức đó khi bước vào cuộc thử nghiệm."

# 【凪】
# display as 凪
# JP: 「どぎゃんしてそこまで頑張ると？」
1740 = "「Sao cậu lại cố gắng đến thế?」"

# 【ふかみ】
# display as 深美
# JP: 「どぎゃんして――って……////っ」
1739 = "「Sao lại——à thì……////」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃん！？」
1607 = "「Fukami!?」"

# monologue
# JP: 火をつけられでもしたかのように、\nふかみが首まで赤くなる。
2362 = "Như thể bị châm lửa,\nFukami đỏ bừng đến\ntận cổ."

# 【凪】
# display as 凪
# JP: 「暑かと？　まだ扇ぎたりなかと！？」
1820 = "「Nóng hả? Quạt nãy giờ chưa đủ sao!?」"

# monologue
# JP: （ぶんっ！）
2551 = "（Vù!）"

# 【ふかみ】
# display as 深美
# JP: 「ふわっぷ！」
1469 = "「Oái!」"

# monologue
# JP: 凪が全力でうちわを振れば、\nふかみの前髪がぶわりと踊る。
2112 = "Nagi dùng hết sức vung quạt,\ntóc mái của\nFukami tung bay phần phật."

# 【ふかみ】
# display as 深美
# JP: 「ち、違うよ凪ちゃん。ええと、その――\n考えすぎちゃって、暑くなったの」
1367 = "「Kh-không phải đâu Nagi. Ưm, chuyện là——\nTớ nghĩ nhiều quá nên mới thấy nóng.」"

# 【凪】
# display as 凪
# JP: 「考えすぎって？」
1637 = "「Nghĩ nhiều á?」"

# 【ふかみ】
# display as 深美
# JP: 「だから……その、頑張る理由。\nええと……つまり……あ、うちのため、とかもあるし」
1655 = "「Thì là……lý do tớ cố gắng ấy.\nƯm……tức\nlà……A, cũng vì gia đình tớ nữa.」"

# 【凪】
# display as 凪
# JP: 「クマ川下りの」
1844 = "「Vụ chèo thuyền xuôi dòng sông Kuma á.」"

# 【ふかみ】
# display as 深美
# JP: 「そう。だって、双鉄さんたちが失敗したら、\n工場が来て、クマ川の水汚されちゃうし」
1685 = "「Đúng vậy. Bởi vì nếu nhóm anh Soutetsu\nthất bại,\nnhà máy sẽ mọc lên, nước sông\nKuma sẽ bị ô nhiễm.」"

# 【凪】
# display as 凪
# JP: 「あー」
1512 = "「À——」"

# 【ふかみ】
# display as 深美
# JP: 「それに、うまく行って観光客さんが増えたら、\nクマ川くだりのお客さんも、絶対に増えるはずだし」
1774 = "「Hơn nữa, nếu mọi chuyện suôn sẻ, du khách\ntăng lên,\nthì khách đi thuyền xuôi dòng\nsông Kuma chắc chắn cũng sẽ tăng.」"

# 【凪】
# display as 凪
# JP: 「それはまぁ、わからんでもなかけど――」
1832 = "「Chuyện đó thì, cũng không phải là không\nhiểu——」"

# monologue
# JP: 言葉と同時、凪のうちわがピタリと止まる。
2204 = "Cùng lúc cất lời, chiếc quạt của Nagi cũng\ndừng bặt."

# 【凪】
# display as 凪
# JP: 「ばってん、それならもっと先に頑張るところあるばい」
1383 = "「Nhưng mà, nếu vậy thì còn nhiều chỗ cần\ncậu phải cố gắng trước đó nữa.」"

# monologue
# JP: きっぱり凪が言い切れば、\nふかみは言葉を喉に詰め、気まずげに視線を彷徨わせる。
2120 = "Nghe Nagi nói dứt khoát như vậy,\nFukami\nnghẹn lời, lúng túng đưa mắt nhìn đi chỗ\nkhác."

# 【凪】
# display as 凪
# JP: 「ふかみちゃんだって、わかっとるでしょお」
1399 = "「Fukami cũng hiểu mà phải không.」"

# 【ふかみ】
# display as 深美
# JP: 「むぎゅっ」
1457 = "「Ư ư」"

# monologue
# JP: 凪がふかみの顔を両手で挟み込む。\n挟んでそのまま、逃げようとする目線をまっすぐ捕まえる。
2128 = "Nagi áp hai tay vào hai bên má Fukami.\nGiữ\nnguyên như vậy, ép ánh mắt đang cố lảng\ntránh kia phải nhìn thẳng vào mình."

# 【凪】
# display as 凪
# JP: 「船頭さんたちに帰ってきてもらうように頑張らんと。\nふかみちゃん、ちょっと無理しすぎやけん」
1738 = "「Phải cố gắng để những người lái đò quay\ntrở lại làm việc chứ.\nFukami, cậu đang hơi\nquá sức rồi đó.」"

# 【ふかみ】
# display as 深美
# JP: 「え、別に無理なんて」
1483 = "「Ơ, tớ đâu có quá sức gì đâu.」"

# 【凪】
# display as 凪
# JP: 「しとるもん。学園の先生も心配しとるし。\n期末、ふかみちゃんにしては成績わるかったでしょ」
1465 = "「Có mà. Giáo viên trong trường cũng lo\nlắng kìa.\nKỳ thi cuối kỳ vừa rồi, thành\ntích của Fukami tệ hơn bình thường phải\nkhông.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、あれは……ちょっとウッカリミスとか」
1824 = "「A, cái đó là……tớ hơi bất cẩn một chút\nthôi.」"

# 【凪】
# display as 凪
# JP: 「やっけーん、疲れとるいうことでしょお。\nふかみちゃんがウッカリミスばしよるとか」
1667 = "「Thì đó, chứng tỏ là cậu đang mệt mỏi mà.\nChứ Fukami mà lại mắc lỗi bất cẩn sao.」"

# 【ふかみ】
# display as 深美
# JP: 「あぅぅ～」
1522 = "「A ư ư~」"

# monologue
# JP: （ああ――）
2555 = "（A a——）"

# monologue
# JP: そうだ。その通りに決まってる。\nクマ川下りをこなした上で、僕らの手伝いをして――
2330 = "Đúng vậy. Chắc chắn là như thế rồi.\nVừa\nphải lo công việc chèo thuyền xuôi dòng\nsông Kuma, vừa phải giúp đỡ chúng tôi——"

# monologue
# JP: さらに、学園生の本分たる勉強もあり、\nふかみの場合は、家事の負担もあるだろう。
2159 = "Hơn nữa, còn có bổn phận học tập của một\nhọc sinh,\nvà trong trường hợp của Fukami,\nchắc chắn còn gánh nặng việc nhà nữa."

# monologue
# JP: （ふかみも凪も、まだまだ未熟な学園生なのだ。\nそれを忘れて、好意にただただ甘えていたなど……）
2572 = "（Fukami và Nagi vẫn chỉ là những cô học\nsinh non nớt.\nThế mà tôi lại quên bẵng đi\nđiều đó, cứ thản nhiên ỷ lại vào lòng tốt\ncủa họ……）"

# monologue
# JP: 視野の狭さに、気の利かなさに、\n赤面させられ、情けなくなる。
2246 = "Sự thiển cận và vô tâm của bản thân\nkhiến\ntôi phải đỏ mặt, cảm thấy thật đáng hổ\nthẹn."

# monologue
# JP: が――ともかく気づいた。今気づけた。\nならばどうする？　当然、恩を返すのだ。
2036 = "Nhưng——dù sao thì tôi cũng đã nhận ra. Bây\ngiờ đã nhận ra rồi.\nVậy thì phải làm sao?\nĐương nhiên là phải đền đáp ân tình rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクとポーレットとに相談しよう」
1083 = "「……Đi bàn bạc với Hachiroku và Paulette\nthôi.」"

# monologue
# JP: 煙問題が解決せねば、\n\x%l8620;#00ffc040;8620%l;#;を営業運転には出せん。
2029 = "Nếu không giải quyết được vấn đề tràn\nkhói,\n\\x%l8620;#00ffc040;8620%l;#; sẽ không thể đi vào hoạt động\nthương mại."

# monologue
# JP: それは逆から見てみれば、\n時間の自由を利かせられるということでもある。
2037 = "Nhưng nếu nhìn từ góc độ ngược lại,\nđiều\nđó cũng có nghĩa là tôi có thể tự do sắp\nxếp thời gian."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。\nどうしてこんな単純なことに気がつかなかったのだ」
1691 = "「Đúng vậy.\nTại sao mình lại không nhận ra\nmột điều đơn giản như thế chứ.」"

# monologue
# JP: 電話か、あるいはハチロクか。\nどちらが先になるのでもいい。
2026 = "Gọi điện thoại, hay là đi tìm Hachiroku.\nCái nào trước cũng được."

# monologue
# JP: 一刻も早く相談し、\n明日からでも、動き出したい。
2261 = "Tôi muốn bàn bạc càng sớm càng tốt,\nvà bắt\nđầu hành động ngay từ ngày mai."

# 【双鉄】
# display as 雙鐵
# JP: 「今度は僕が、凪とふかみを手助けするのだ」
1813 = "「Lần này, tôi sẽ là người giúp đỡ Nagi và\nFukami.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　あの――ええとっ」
1490 = "「Hả? Dạ——Ưm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、迷惑でなければ、させてもらいたいのだ」
1661 = "「Vậy nên, nếu không phiền, xin hãy để anh\ngiúp.」"

# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃん[かぜ]風の吹き回しと？」
1593 = "「Anh hai, hôm nay trời nổi cơn gió nào\nvậy?」"

# monologue
# JP: まるで事態がのみこめてない――\n凪の言葉と表情に、先走っていたと気付かされる。
2186 = "Hoàn toàn không hiểu chuyện gì đang xảy\nra——\nLời nói và biểu cảm của Nagi khiến\ntôi nhận ra mình đã quá vội vàng."

# 【双鉄】
# display as 雙鐵
# JP: 「あー、僕は……というか僕らは、だな。\nふかみと凪に甘えていたことに気がついたのだ」
1616 = "「À, anh……hay đúng hơn là chúng ta.\nBọn anh\nnhận ra rằng mình đã quá ỷ lại vào Fukami\nvà Nagi.」"

# monologue
# JP: ポーレットとハチロクと相談の上、\n\x%l8620;#00ffc040;8620%l;#;の運転試験の時間を夜へとずらすこと。
2163 = "Sau khi bàn bạc với Paulette và Hachiroku,\nchúng tôi quyết định lùi thời gian chạy\nthử \\x%l8620;#00ffc040;8620%l;#; sang buổi tối."

# monologue
# JP: そうして空いた昼間の時間を、\n川下りの手伝いに使いたいことを、じゅんじゅん、話す。
2397 = "Và thời gian trống vào ban ngày đó,\ntôi\nmuốn dùng để phụ giúp công việc chèo\nthuyền xuôi dòng, tôi đã từ tốn giải thích\nnhư vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「つまりは謝礼だ。もらった善意と労力を、\n僕なりの善意と労力をもって返したいのだ」
1617 = "「Tóm lại là để tạ ơn. Thiện ý và công sức\nmà bọn anh nhận được,\nanh muốn đền đáp lại\nbằng thiện ý và công sức của chính mình.」"

# 【凪】
# display as 凪
# JP: 「ふぅん？」
1509 = "「Hừm?」"

# 【ふかみ】
# display as 深美
# JP: 「え……本当に、手伝ってもらえるなら、\nすごく、助かるし嬉しいんですけど――でも」
1476 = "「Ơ……nếu thực sự được anh giúp đỡ,\nthì tụi\nem sẽ đỡ vất vả và vui lắm ạ——nhưng mà.」"

# monologue
# JP: 困ったようなふかみの視線。\n凪はすぐさま頷いて、ズイと僕へと詰め寄ってくる。
2371 = "Ánh mắt Fukami lộ vẻ bối rối.\nNagi lập tức\ngật đầu, rồi sấn sổ tiến sát lại gần tôi."

# 【凪】
# display as 凪
# JP: 「なーんでいきなり、\n甘えてたとかいう話になっと？」
1634 = "「Sao tự nhiên lại\nnói đến chuyện ỷ lại đồ\nnày nọ vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「動画を見たのだ。煙問題について何か気付けるかと思い。\nそうしたら、ふたりの会話で――」
1645 = "「Anh đã xem video. Vì nghĩ có thể phát\nhiện ra điều gì đó về vấn đề tràn khói.\nThế rồi, qua cuộc nói chuyện của hai\nđứa——」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　あのカメラっ！？」
1525 = "「A! Cái máy quay đó á!?」"

# monologue
# JP: ふかみは両手で口を覆って。\nそれからゆっくり、じわじわ赤くなっていく。
2368 = "Fukami đưa hai tay lên che miệng.\nSau đó,\nmặt con bé từ từ, từ từ đỏ bừng lên."

# 【ふかみ】
# display as 深美
# JP: 「あの……見た、です？\nええと……その――カメラ……そのっ」
1830 = "「Dạ……anh xem rồi, ạ?\nƯm……cái đó——máy\nquay……cái đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ見たぞ。\n\x%l客車;#00ffc040;客車%l;#;に据え付けておいたやつを」
1563 = "「Ừ, anh xem rồi.\nCái được đặt sẵn trong \\x%l客車;#00ffc040;toa hành khách%l;#;\nấy.」"

# monologue
# JP: 他にカメラも無かろうが、ふかみがあまりに不安げで、\nいわずもがなの言葉も足さずにはいられなくなる。
2514 = "Mặc dù chẳng có cái máy quay nào khác,\nnhưng thấy Fukami có vẻ quá bất an,\ntôi\nkhông thể không nói thêm những lời thừa\nthãi đó."

# monologue
# JP: というか、\n何故にそこまで目をぐるぐるとさせているのか――
2039 = "Mà nói đúng hơn,\ntại sao con bé lại đảo\nmắt liên tục như vậy chứ——"

# 【凪】
# display as 凪
# JP: 「ああ、ならにーさんにおなか見られたとねー」
1535 = "「A, vậy là anh hai thấy bụng em rồi ha.」"

# 【ふかみ】
# display as 深美
# JP: 「はうっ！？」
1468 = "「Oái!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おなか？」
1777 = "「Bụng á?」"

# monologue
# JP: 言われてみれば、そうだった。\n凪は盛大に腹を出し、ふかみも胸元をあけていた。
2203 = "Nghe nói vậy mới nhớ ra, đúng là thế thật.\nNagi phơi bụng ra hết cỡ, còn Fukami cũng\nhé mở phần ngực áo."

# monologue
# JP: が――
2058 = "Nhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「おなかが見えると、何かあるのか？」
1747 = "「Nhìn thấy bụng thì có vấn đề gì sao?」"

# 【ふかみ】
# display as 深美
# JP: 「えっ、えとっ」
1482 = "「Ơ, dạ.」"

# 【凪】
# display as 凪
# JP: 「なにかあるのはにーさんの方ばい？\n可愛かったとー？　ドキドキしたとー？」
1701 = "「Người có vấn đề là anh hai mới đúng á?\nCó\ndễ thương không? Có thấy tim đập thình\nthịch không?」"

# 【ふかみ】
# display as 深美
# JP: 「なっ、凪ちゃんっ！？」
1604 = "「N-Nagi!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1509 = "「唔？」" 

# monologue
# JP: 問われ、改めて考えてみる。
2202 = "Bị hỏi vậy, tôi mới thử ngẫm lại."

# monologue
# JP: 暑がって、無邪気に腹を出してる様子は確かに――
2180 = "Cái điệu bộ vì nóng mà ngây thơ phơi bụng\nra đó quả thực là——"

# 【双鉄】
# display as 雙鐵
# JP: 「可愛くあったな。暑さにバテる子犬のようで。\nが、ドキドキはしなかったな」
1672 = "「Cũng dễ thương thật. Giống như cún con\nmệt lả vì nóng vậy.\nNhưng mà, anh không\nthấy tim đập thình thịch đâu.」"

# 【ふかみ】
# display as 深美
# JP: 「ふぇぇっ」
1547 = "「Ư ơ.」"

# 【凪】
# display as 凪
# JP: 「えー、どぎゃんして？」
1488 = "「Ể, tại sao vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どぎゃんもこぎゃんも……\n逆に、何故ドキドキするのか教えてくれんか？」
1619 = "「Tại sao cái gì chứ……\nNgược lại, em nói\ncho anh biết tại sao anh phải thấy tim đập\nthình thịch đi?」"

# 【凪】
# display as 凪
# JP: 「むぅ」
1504 = "「Ưm.」"

# monologue
# JP: 片頬だけを、凪はぷくんと膨らませる。
2122 = "Nagi phồng phồng một bên má lên."

# 【凪】
# display as 凪
# JP: 「そんなん、\nふかみちゃんがかわいいからに決まっとるばい！」
1745 = "「Chuyện đó,\ntất nhiên là vì Fukami dễ\nthương rồi!」"

# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ」
# 1542 = "「喂，小凪！？」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんみたくかわいかこのあぎゃん姿ば見たら、\nドキドキするのが、あったりまえたい！」
1749 = "「Nhìn thấy dáng vẻ đó của một đứa dễ\nthương như Fukami,\nthì tim đập thình thịch\nlà chuyện đương nhiên mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
1693 = "「Là vậy sao?」"

# 【凪】
# display as 凪
# JP: 「そういうもんばい！」
1614 = "「Chứ còn sao nữa!」"

# monologue
# JP: きっぱり言い切り、そうして凪は、\n勝ち誇るような視線で僕を見る。
2194 = "Nagi dứt khoát khẳng định,\nrồi nhìn tôi\nbằng ánh mắt đắc thắng."

# 【凪】
# display as 凪
# JP: 「そぎゃんかこつもわからんやったら、\nにーさんまだまだ未熟ばい！」
1819 = "「Đến chuyện đó mà cũng không hiểu,\nanh hai\nvẫn còn non lắm nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「未熟――」
1703 = "「Còn non——」"

# 【ふかみ】
# display as 深美
# JP: 「もう！　凪ちゃんっっ！！」
1755 = "「Thôi đi! Nagi!!」"

# 【凪】
# display as 凪
# JP: 「わひっ！？」
1545 = "「Oái!?」"

# monologue
# JP: ふかみらしからぬ大声に、\n凪がビクンと跳ね上がる。
2356 = "Tiếng hét lớn không giống Fukami thường\nngày chút nào,\nkhiến Nagi giật nảy mình\nnhảy cẫng lên."

# 【凪】
# display as 凪
# JP: 「な、なんね、ふかみちゃん」
1635 = "「S-sao vậy, Fukami.」"

# 【ふかみ】
# display as 深美
# JP: 「お、は、な、し。ね？　元に戻そう？\n双鉄さんが、お手伝いしてくれるかどうかに」
1669 = "「Tụi, mình, nói, chuyện. Nha? Quay lại chủ\nđề chính đi?\nChuyện anh Soutetsu có đến\ngiúp tụi mình hay không ấy.」"

# 【凪】
# display as 凪
# JP: 「そっ、そーだったばい」
1683 = "「Đ-đúng rồi ha.」"

# monologue
# JP: 話をそらしてしまったことを、よほど真摯に反省したのか。\n凪は背筋まで伸ばし直して問うてくる。
2185 = "Có vẻ như con bé đang thật lòng hối lỗi vì\nđã đánh trống lảng.\nNagi ngồi thẳng lưng\nlại, rồi hỏi tôi."

# 【凪】
# display as 凪
# JP: 「ええっと――それじゃ、にーさんは、あの動画で、\nクマ川下りがキュウキュウなのを知りよった」
1498 = "「Ưm——Vậy là, anh hai từ video đó,\nmới biết\nchuyện chèo thuyền xuôi dòng sông Kuma\nđang thiếu người hả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ので、船頭さんを再雇用するまでの間、\n僕にできることがあれば、手伝いたいと考えたのだ」
1554 = "「Ừm. Vì vậy, trong thời gian chờ thuê lại\nngười lái đò,\nnếu có việc gì anh làm được,\nanh muốn giúp một tay.」"

# 【ふかみ】
# display as 深美
# JP: 「お手伝いとか……本当に……いいんですか？\nっていうか、だって、時間を作っても体力とか――」
1625 = "「Đến giúp đỡ……thật sự……được không ạ?\nÝ em\nlà, dù anh có sắp xếp được thời gian thì\nthể lực cũng——」"

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、僕とて体力的には一人前の男性だぞ？」
1538 = "「Này này, xét về mặt thể lực thì anh cũng\nlà một người đàn ông trưởng thành đấy\nnhé?」"

# monologue
# JP: 右袖を大きくまくりあげ、力を込めてつきだして見せる。
2283 = "Tôi xắn cao tay áo phải lên, gồng cơ bắp\nđưa ra cho họ xem."

# monologue
# JP: 凪もおもしろがり、剥き出した腕を並べるが、\nさすがにこれは、僕の半分の太さも無い。
2125 = "Nagi cũng thấy thú vị, liền chìa cánh tay\ntrần ra đặt cạnh,\nnhưng quả thực cánh tay\ncon bé chưa to bằng một nửa tay tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「力になれるさ。ふたりにそうしてもらった分、\n僕にも力にならせてもらえれば、光栄だ」
1779 = "「Chắc chắn anh sẽ giúp ích được mà. Hai\nđứa đã giúp anh nhiều như vậy,\nnếu anh\ncũng có thể góp sức, đó là niềm vinh hạnh\ncủa anh.」"

# 【ふかみ】
# display as 深美
# JP: 「わかりました。そういうことなら――」
1648 = "「Em hiểu rồi. Nếu anh đã nói vậy thì——」"

# monologue
# JP: すっくとふかみは立ち上がり、カウンターの裏へ回って、\n一枚のベストを持ってくる。
2357 = "Fukami thoăn thoắt đứng dậy, đi ra sau\nquầy,\nrồi mang ra một chiếc áo phao."

# 【双鉄】
# display as 雙鐵
# JP: 「救命胴衣か？」
1682 = "「Áo phao cứu sinh sao?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。まずは落ちるところから始めてみてください」
1571 = "「Vâng. Trước tiên anh hãy thử bắt đầu từ\nviệc bị rơi xuống nước đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「落ちるところ……とは」
1675 = "「Bị rơi xuống nước……nghĩa là.」"

# monologue
# JP: 聞かずもがなだ。\n川下りで、救命胴衣。
2081 = "Khỏi cần hỏi cũng biết.\nChèo thuyền trên\nsông, áo phao cứu sinh."

# monologue
# JP: どこからどこに落とされるのか、\n推理できねば知能が足りんにもほどがある。が――
2230 = "Bị ném từ đâu xuống đâu,\nnếu không suy\nluận ra được thì trí tuệ của tôi cũng có\nhạn quá. Nhưng mà——"

# 【ふかみ】
# display as 深美
# JP: 「それで、大丈夫そうだって思ったら、\nお手伝い、ぜひぜひお願いしちゃいます」
1600 = "「Sau đó, nếu anh cảm thấy vẫn ổn,\nthì tụi\nem rất mong được anh giúp đỡ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と――とっ――とわっ！？」
1495 = "「Ư——ư——oái!?」"

# 【凪】
# display as 凪
# JP: 「うひゃあ」
1544 = "「Uisss」"

# 【ふかみ】
# display as 深美
# JP: 「力抜いててくださいねー」
1794 = "「Anh thả lỏng người ra nhé~」"

# monologue
# JP: 落ちる寸前聞こえた声に従い体の力を抜く。
2282 = "Ngay trước khi rơi xuống, tôi làm theo\ngiọng nói vừa nghe thấy, thả lỏng cơ thể."

# monologue
# JP: と、すぐさま救命胴衣が僕を、\n川面へ川面へと引っぱっていく。
2396 = "Ngay lập tức, chiếc áo phao cứu sinh\nkéo\ntôi nổi bồng bềnh trên mặt nước."

# 【凪】
# display as 凪
# JP: 「おー、浮いてきよったばい」
1578 = "「Ồ, nổi lên rồi kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぶはっ！」
1572 = "「Phù!」"

# monologue
# JP: 咳き込むように空気を求め、\n吸えればようやく周りが見える。
2311 = "Tôi ho sặc sụa, há miệng hớp lấy không\nkhí,\nhít thở được rồi mới nhìn rõ xung\nquanh."

# monologue
# JP: ――転覆させてしまったか。\n凪もふかみも、僕と同様、クマ川の水の中に居る。
1031 = "——Làm lật thuyền rồi sao.\nCả Nagi và\nFukami cũng đang ngâm mình dưới dòng nước\nsông Kuma giống như tôi."

# 【ふかみ】
# display as 深美
# JP: 「そのまま浮いててくださいねー。\n今、転覆なおしちゃいますから」
1621 = "「Anh cứ nổi như vậy nhé~.\nGiờ em sẽ lật\nthuyền lại đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1504 = "「唔」" 

# monologue
# JP: ……見事なものだ。\n揺すって揺すって転覆していた船を戻して。
1052 = "……Đẹp mắt thật.\nLắc qua lắc lại là lật\nngược được chiếc thuyền bị úp."

# monologue
# JP: 揺すって揺すって水を掻き出し、\n浮いたところでその上に乗り――おおおっ！
2016 = "Lắc qua lắc lại để tát nước ra ngoài,\nkhi\nthuyền nổi lên thì leo lên trên——Ồ ồ!"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと……舟の床板というのは、剥がせるのか」
1723 = "「Không ngờ……ván sàn của chiếc thuyền này\ncó thể tháo ra được sao.」"

# 【ふかみ】
# display as 深美
# JP: 「練習用の、なんにもつけてない舟ですから。\n簡単に水を掻き出せるようにしてあるんです」
1581 = "「Vì là thuyền dùng để luyện tập nên không\ngắn thêm gì cả.\nNó được thiết kế để dễ\ndàng tát nước ra ngoài ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1425 = "「Ra là vậy.」"

# monologue
# JP: と、いうことはこの手のことも、\n練習中はままあることであるのだろう。
2511 = "Vậy có nghĩa là những chuyện thế này,\ncũng\nthường xuyên xảy ra trong lúc luyện tập\nnhỉ."

# monologue
# JP: ああ、いや――
2167 = "A, không——"

# monologue
# JP: （この格好だものな。\n舟を見ずともわかってはいたが）
2576 = "（Với bộ dạng này thì.\nDù không nhìn thuyền\ncũng đoán ra được.）"

# monologue
# JP: 落水どころか転覆さえも、\n最初から織り込み済みなようにも感じる。
2023 = "Đừng nói là rơi xuống nước, ngay cả việc\nlật thuyền,\ncó vẻ như cũng đã nằm trong dự\ntính ngay từ đầu rồi."

# 【ふかみ】
# display as 深美
# JP: 「はい、これで舟に戻って大丈夫ですよ」
1561 = "「Vâng, giờ anh lên lại thuyền được rồi đó\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――っと」
1531 = "「À, ừm——hự.」"

# 【凪】
# display as 凪
# JP: 「にーさん、手ぇかすばい」
1594 = "「Anh hai, đưa tay đây em kéo lên cho.」"

# monologue
# JP: 揺れるのに手間取る僕の傍らで、凪は手早く舟へとあがり、\nふかみと二人、手を差し伸べてきてくれる。
2172 = "Bên cạnh tôi đang chật vật vì thuyền tròng\ntrành, Nagi nhanh chóng leo lên thuyền,\nrồi cùng Fukami đưa tay ra đỡ lấy tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな」
1750 = "「Xin lỗi nhé.」"

# monologue
# JP: 助けを借りて舟へと戻れば、体に異様な重さを感じる。
2176 = "Được giúp đỡ leo lại lên thuyền, tôi cảm\nthấy cơ thể nặng nề đến kỳ lạ."

# monologue
# JP: 水を含んだうんぬんではなく――\nこれは、明確な疲労の重さだ。
2070 = "Không phải do ngấm nước hay gì cả——\nMà rõ\nràng là sức nặng của sự mệt mỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「……体力を使うものなのだな。\n川に落ちるということは」
1094 = "「……Rơi xuống sông,\nquả thực rất tốn thể\nlực nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「淀みでもそれですから。\n急流だと、もっとどうしようもないですよ」
1736 = "「Ở chỗ nước đọng mà còn thế đấy ạ.\nNếu là\ndòng nước xiết thì còn bó tay hơn nữa cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……だろうな」
1500 = "「Ưm……chắc là vậy rồi.」"

# monologue
# JP: 練習用に、ふかみが舟を運んできた場所。\n流れのほとんどない淀み。
2365 = "Nơi Fukami đưa thuyền đến để luyện tập.\nLà\nmột vũng nước đọng hầu như không có dòng\nchảy."

# monologue
# JP: 大きな岩の裏側はすぐ、\nザアザアと音を立ててる急流だ。
2435 = "Ngay phía sau tảng đá lớn kia,\nlà dòng\nnước xiết đang ầm ầm tuôn chảy."

# 【ふかみ】
# display as 深美
# JP: 「ですから、落ちたときにはそのままで浮いてください。\n流されるままなら、引っかかる場所はわかりますから」
1657 = "「Vì vậy, khi bị rơi xuống nước, anh cứ để\nmặc cơ thể nổi lên nhé.\nCứ để nước cuốn\ntrôi đi, rồi anh sẽ nhận ra chỗ nào có thể\nbám vào được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった、心にしかと刻もう」
1653 = "「Anh hiểu rồi, anh sẽ khắc cốt ghi tâm.」"

# 【凪】
# display as 凪
# JP: 「にーさんの場合は、あれの下探しゃ、一発ばい」
1589 = "「Trong trường hợp của anh hai, chỉ cần tìm\nphía dưới cái kia là ra ngay á.」"

# 【ふかみ】
# display as 深美
# JP: 「あはは、だねっ」
1519 = "「Ahaha, đúng nhỉ.」"

# monologue
# JP: 凪の指差す頭上高くに、ナビの――\x%lエアクラ;#00ffc040;エアクラ%l;#;の機影。\n心配そうに、ぐるぐるぐるぐる周回している。
2117 = "Tít trên cao nơi Nagi chỉ tay, là bóng\ndáng của Navi——chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#;.\nNó đang bay vòng\nquanh liên tục với vẻ đầy lo lắng."

# monologue
# JP: 僕にはすっかり見慣れきり、目にも入らん景色だが、\n凪とふかみには、物珍しく楽しいらしい。
2505 = "Đối với tôi thì đó là cảnh tượng đã quá\nquen thuộc, chẳng buồn để mắt tới,\nnhưng\nvới Nagi và Fukami, có vẻ đó là một điều\nmới lạ và thú vị."

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。迷惑をかけた。\n訓練を再開してくれ」
1751 = "「Xin lỗi nhé. Làm phiền hai đứa rồi.\nHãy\nbắt đầu huấn luyện lại đi.」"

# monologue
# JP: ……気にしてしまえばどうにも何か、\n授業参観をされてるような居心地悪さだ。
1035 = "……Nếu cứ để ý thì sao cũng thấy,\nkhó chịu\ny như đang bị dự giờ trên lớp vậy."

# monologue
# JP: さっさと動き、\n余計な意識を頭から払ってしまいたい。
2256 = "Tôi muốn nhanh chóng hành động,\nđể gạt bỏ\nnhững suy nghĩ thừa thãi ra khỏi đầu."

# 【ふかみ】
# display as 深美
# JP: 「わかりました。じゃ、最初から――\n教えたとおりにやってみてくださいね？」
1649 = "「Em hiểu rồi. Vậy thì, làm lại từ đầu——\nanh hãy thử làm theo đúng như những gì em\nđã chỉ nhé?」"

# 【凪】
# display as 凪
# JP: 「凪様がフォローするばい！\n大船に乗ったつもりでやってみるばい！」
1712 = "「Nagi-sama sẽ yểm trợ cho!\nCứ yên tâm giao\nphó cho con thuyền lớn này mà thử đi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1556 = "「嗯」" 

# monologue
# JP: うふふと笑い、ふかみは[へさき,1]舳先へと行ってしまう。
2360 = "Fukami cười khúc khích rồi đi về phía mũi\nthuyền."

# monologue
# JP: [とも]艫に残った凪の傍らに立ち上がり、\nゆっくり[ろ]櫓へと両手をかける。
2457 = "Tôi đứng dậy bên cạnh Nagi ở đuôi thuyền,\ntừ từ đặt cả hai tay lên mái chèo."

# 【ふかみ】
# display as 深美
# JP: 「こっちは見てますからー。\n気にしないで、どんどん漕いでみてくださーい」
1644 = "「Em đang nhìn bên này rồi~\nAnh đừng bận\ntâm, cứ chèo thử đi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1651 = "「Anh biết rồi.」"

# 【凪】
# display as 凪
# JP: 「切っちゃダメばい。\n練るようにして動かすばい」
1370 = "「Không được chém xuống nước đâu nha.\nPhải\nchèo nhẹ nhàng như đang nhào bột ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「切らずに、練る――だな」
1373 = "「Không chém, mà nhào——đúng không.」"

# monologue
# JP: （ぐっ）
2575 = "（Ưm）"

# monologue
# JP: 体を倒すようにして、\n体重ごと櫓を強く引き込む。
2274 = "Tôi hơi ngả người về phía trước,\ndùng toàn\nbộ trọng lượng cơ thể kéo mạnh mái chèo."

# monologue
# JP: （ちゃぷんッ――）
2547 = "（Xoạt——）"

# monologue
# JP: 途端に、舟は動き始める。
2324 = "Ngay lập tức, chiếc thuyền bắt đầu di\nchuyển."

# monologue
# JP: 舟が動くというより、水を割っていくような感覚。\nこれは……なんとも心地よい。
2482 = "Thay vì nói là thuyền di chuyển, cảm giác\ngiống như đang rẽ nước mà đi hơn.\nThật\nlà……thoải mái làm sao."

# 【双鉄】
# display as 雙鐵
# JP: 「切らずに、練る――」
1371 = "「Không chém, mà nhào——」"

# monologue
# JP: さっき、転覆させたときには、櫓をぐいぐいと動かして、\n水を切る感覚だったような気もする。
2133 = "Lúc nãy, khi làm lật thuyền, tôi đã vung\nvẩy mái chèo liên tục,\ncó vẻ như lúc đó\ntôi có cảm giác đang chém nước thì phải."

# monologue
# JP: そうではなくて、練るように。\n意識しながら、今度は体を前に倒して櫓を押し込んで――
2506 = "Không phải như vậy, mà là như đang nhào\nnặn.\nVừa ý thức điều đó, lần này tôi vừa\nngả người về phía trước và đẩy mái chèo\nxuống——"

# monologue
# JP: （ぐうっ）
# 2575 = "（用力）" 

# 【凪】
# display as 凪
# JP: 「わおわお、いい感じばい」
1466 = "「Oa oa, cảm giác tốt đó.」"

# 【ふかみ】
# display as 深美
# JP: 「ほんと、上手ですよー、双鉄さん」
1397 = "「Anh giỏi thật đấy, anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「んむ――っとっ！？」
1496 = "「Ưm——oái!?」"

# monologue
# JP: （ばしゃんっ！）
2556 = "（Tùm!）"

# monologue
# JP: 褒められ少しいい気になったか、体がぐらつき、\n櫓の抵抗がいきなりググっと強くなるっ！
2018 = "Có lẽ vì được khen nên hơi đắc ý, cơ thể\ntôi lảo đảo,\nsức cản của mái chèo đột\nnhiên tăng mạnh!"

# 【双鉄】
# display as 雙鐵
# JP: 「と――おっ！？」
1543 = "「Úi——chà!?」"

# 【ふかみ】
# display as 深美
# JP: 「[ろ]櫓を離して！　しゃがんじゃってくださーい」
1630 = "「Bỏ mái chèo ra đi anh! Ngồi thụp xuống đi\nạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぬっ！」
1505 = "「Ư!」"

# monologue
# JP: 言われたとおり、じたばたあがかず尻持ちをつく。
2279 = "Tôi làm theo lời con bé, không giãy giụa\nmà ngồi phịch xuống."

# monologue
# JP: （トンっ）
2558 = "（Phịch）"

# 【双鉄】
# display as 雙鐵
# JP: 「お……」
1573 = "「Ồ……」"

# monologue
# JP: ほとんど同時、ふかみが水棹で川底を突く。
2227 = "Gần như cùng lúc đó, Fukami dùng sào chống\nxuống đáy sông."

# monologue
# JP: ただそれだけで、うねってしまっていた舟は、\nしぶき一つ無く鎮まり返る。
2188 = "Chỉ với động tác đó, chiếc thuyền đang\nchòng chành\nliền trở nên tĩnh lặng, không\nhề có một gợn sóng nào."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……今のは」
1416 = "「Vừa rồi……là sao vậy?」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃんの[みざお,1]水棹は魔法ばい！\n舟ば、とーんて突くだけで言うこと聞きよっと！」
1605 = "「Sào chống của Fukami là ma pháp đó!\nChỉ\ncần chọc nhẹ một cái là thuyền phải nghe\nlời ngay!」"

# 【双鉄】
# display as 雙鐵
# JP: 「魔法か……まさしくそんな感じだな」
1852 = "「Ma pháp à……đúng là có cảm giác như vậy\nthật.」"

# 【ふかみ】
# display as 深美
# JP: 「普通ですよ、普通。[みざお,1]水棹はそういうものなんです。\n使い慣れるの、ちょっと時間かかりますけどねー」
1812 = "「Bình thường thôi ạ, bình thường thôi. Sào\nchống vốn dĩ là như vậy mà.\nNhưng mà, để\ndùng quen thì cũng tốn chút thời gian đấy\nạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「[ろ]櫓よりも、ずっと難しいのか」
1720 = "「Khó hơn nhiều so với dùng mái chèo sao?」"

# 【ふかみ】
# display as 深美
# JP: 「って、言われてます。\n『[ろ]櫓は[みっか,1]三日　[かい]櫂は[みつき,1]三月で　[さおみとせ,2]棹三年』とか」
1676 = "「Người ta thường nói vậy ạ.\n『Chèo bằng mái\nchèo mất ba ngày, chèo bằng dầm mất ba\ntháng, còn chèo bằng sào phải mất ba\nnăm』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、[ろ]櫓は随分と扱いが簡単なものなのだな」
1393 = "「Gì chứ, hóa ra mái chèo lại là thứ dễ sử\ndụng đến vậy sao.」"

# monologue
# JP: だとすると、むしろ僕は不器用な方なのかもしれん。\nいい気になって調子にのらず、習ったとおりを心がけよう。
2468 = "Nếu vậy thì, có lẽ tôi là một kẻ khá vụng\nvề cũng nên.\nĐừng có đắc ý mà làm càn nữa,\nhãy cố gắng làm đúng như những gì đã được\ndạy thôi."

# 【ふかみ】
# display as 深美
# JP: 「あ、いい感じ。\nそういう風に、力まないでいるともっといいです」
1528 = "「A, cảm giác tốt đó.\nCứ như vậy, không cần\ndùng sức thì sẽ càng tốt hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む、力まずに、だな」
1558 = "「Ưm, không dùng sức, nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、また力入っちゃった」
1530 = "「A, anh lại dùng sức rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1548 = "「Ưm.」"

# monologue
# JP: 力むなと言われてしまえば意識する。\n意識をすれば力みが生じる。
2181 = "Bị nhắc đừng dùng sức thì lại càng để tâm.\nMà càng để tâm thì lại càng sinh ra lực."

# monologue
# JP: 理屈はわかるが、どうにもうまく対処できない。\n自分のどこに力が入り、どこのを抜いていいものか――
2510 = "Dù hiểu rõ lý thuyết, nhưng tôi vẫn không\nthể xử lý tốt được.\nChỗ nào trên cơ thể\nđang dùng sức, chỗ nào nên thả lỏng đây——"

# 【凪】
# display as 凪
# JP: 「にーさん？　[ろこ,1]櫓漕ぎは、剣術修行ばい。\nそぎゃんと考えたら、うまいこと力ぬけるばい」
1586 = "「Anh hai? Chèo thuyền cũng giống như tu\nluyện kiếm thuật á.\nCứ nghĩ như vậy, tự\nnhiên anh sẽ biết cách thả lỏng lực thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1574 = "「Ồ.」"

# monologue
# JP: ド素人だった頃の記憶が凪にはまだあるのだろう。\n助言は、ストン、と僕の体の芯に落ちていく。
2416 = "Chắc hẳn Nagi vẫn còn nhớ ký ức hồi mới\nchập chững vào nghề.\nLời khuyên đó rơi tõm\nvào tận tâm can tôi."

# monologue
# JP: （そうか――確かに、力んでいるな）
2565 = "（Ra vậy——quả thực là mình đang gồng quá\nmức.）"

# monologue
# JP: 特に、足。
2405 = "Đặc biệt là đôi chân."

# monologue
# JP: 足指が少しでも安定したくて、\n船底をにぎりこもうと力みまくって丸まっている。
2294 = "Các ngón chân vì muốn vững vàng hơn một\nchút,\nmà gồng hết sức co quắp lại như muốn\nbám chặt lấy đáy thuyền."

# 【双鉄】
# display as 雙鐵
# JP: 「……これでは、安定するはずもない」
1098 = "「……Thế này thì, làm sao mà vững vàng cho\nđược.」"

# monologue
# JP: 力を抜いて、踏むのを止める。\nふわりと置いてぺたりと接する――その状態を意識する。
2286 = "Tôi thả lỏng lực, ngừng việc dậm mạnh\nchân.\nĐặt chân xuống nhẹ nhàng và tiếp xúc\nphẳng lì với mặt sàn——tôi ý thức trạng\nthái đó."

# 【ふかみ】
# display as 深美
# JP: 「あ、いいですよー。姿勢すごくよくなったです」
1537 = "「A, tốt lắm ạ. Tư thế của anh đã đẹp hơn\nnhiều rồi đó.」"

# monologue
# JP: 上半身も力まない。
2014 = "Nửa thân trên cũng không gồng sức."

# monologue
# JP: 定まった足に、ただ腰を乗せ、\n腰から下を支点に櫓へと体を預ける。
2485 = "Chỉ đặt hông lên đôi chân đã vững vàng,\nlấy phần dưới hông làm điểm tựa, giao phó\ncơ thể cho mái chèo."

# monologue
# JP: （ぐいっ）
2563 = "（Giật mạnh）"

# 【ふかみ】
# display as 深美
# JP: 「あっ」
1517 = "「A.」"

# 【凪】
# display as 凪
# JP: 「お！」
1491 = "「Ồ!」"

# monologue
# JP: （すうっ――）
2554 = "（Xoạt——）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1504 = "「唔」" 

# monologue
# JP: 感覚が、さっきよりよほど滑らかだ。\n舟は僅かも飛沫を立てず、ただただ川面を滑って進む。
2242 = "Cảm giác mượt mà hơn lúc nãy rất nhiều.\nChiếc thuyền không hề tung bọt nước, chỉ\nnhẹ nhàng lướt đi trên mặt sông."

# monologue
# JP: （ぐっ――すうっ――ぐっ――すうっ――）
2552 = "（Hự——xoạt——hự——xoạt——）"

# 【ふかみ】
# display as 深美
# JP: 「わ、すごい……普通に上手」
1472 = "「Oa, tuyệt quá……giỏi ghê.」"

# 【凪】
# display as 凪
# JP: 「兄さん、やっぱり心得あるばい」
1588 = "「Anh hai, quả nhiên là có khiếu mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「助言の――おかげだ――」
1843 = "「Đó là nhờ——lời khuyên của hai đứa đấy——」"

# monologue
# JP: 力を抜けとふかみに言われて、\n剣と同じと凪に示され――
2376 = "Được Fukami bảo hãy thả lỏng,\nvà Nagi chỉ\ncho cách chèo giống như cầm kiếm——"

# monologue
# JP: どちらの助言が足りずとも、\n恐らく意味が掴めなかったと、今なら思う。
2408 = "Nếu thiếu đi lời khuyên của bất kỳ ai\ntrong hai đứa,\ncó lẽ tôi đã không thể nắm\nbắt được ý nghĩa của việc chèo thuyền, giờ\ntôi nghĩ vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「力でどうこうしようなどと思うのが間違いなのだな。\n川に対して、僕一人が何をしようとも――と、っとっ？」
1639 = "「Nghĩ rằng có thể dùng sức mạnh để làm gì\nđó là một sai lầm nhỉ.\nĐối mặt với dòng\nsông, một mình anh dù có làm gì cũng——úi,\nchà!?」"

# monologue
# JP: 言ったら逆に、力んでしまった。
2308 = "Vừa nói xong, ngược lại tôi lại gồng sức\nlên mất rồi."

# monologue
# JP: 自覚すればさらに力が入り、\nバランスはもう崩れに崩れて――
2235 = "Khi nhận ra thì lại càng thêm dùng sức,\nsự\ncân bằng đã hoàn toàn bị phá vỡ——"

# 【ふかみ】
# display as 深美
# JP: 「あー」
# 1512 = "「啊——」" 

# 【凪】
# display as 凪
# JP: 「調子にのって息合い乱すからばい」
1841 = "「Tại anh đắc ý quá nên mới bị loạn nhịp\nđó.」"

# monologue
# JP: 舟が傾く。\n体が、滑って落ちていく――
2443 = "Thuyền nghiêng ngả.\nCơ thể trượt dài và\nrơi xuống——"

# monologue
# JP: ……力を抜けば、すぐ水に浮く。\n櫓を離したなら、力を抜くなど容易なことだ。
1040 = "……Chỉ cần thả lỏng lực, cơ thể sẽ lập tức\nnổi lên mặt nước.\nNếu buông mái chèo ra,\nviệc thả lỏng lực là điều dễ dàng."

# 【双鉄】
# display as 雙鐵
# JP: 「ぷはーーーっ！」
1452 = "「Phù hơ——!」"

# monologue
# JP: だというのに、何故こうもささいなきっかけで、\n妙に力んでしまうのか。
2328 = "Vậy mà, tại sao chỉ vì một nguyên cớ cỏn\ncon,\nmà tôi lại dùng sức một cách kỳ lạ\nnhư vậy chứ."

# monologue
# JP: いっそ潜って頭を冷やし――\nたいと思った瞬間に、何かがツっ――と寄ってくる。
2067 = "Thà lặn xuống cho mát cái đầu đi——\nNgay\nkhoảnh khắc tôi nghĩ vậy, có thứ gì đó\nkhẽ——tiến lại gần."

# 【ふかみ】
# display as 深美
# JP: 「で、どうですか？　双鉄さん」
1663 = "「Thế, sao rồi ạ? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――おお」
1508 = "「Hửm? ——Ồ.」"

# monologue
# JP: 転覆させたかと思ったが、\nふかみは落ちず、舟も見事に立てなおしたようだ。
2309 = "Tôi tưởng đã làm lật thuyền rồi,\nnhưng\nFukami không bị rơi xuống nước, và có vẻ\nnhư con bé đã khéo léo giữ thăng bằng lại\ncho chiếc thuyền."

# monologue
# JP: 水棹ひとつですいすいと、\n僕と凪とが浮く傍らまで、舟ごと寄ってきてくれる。
2196 = "Chỉ với một cây sào chống, con bé nhẹ\nnhàng\nđưa cả chiếc thuyền tiến đến sát chỗ\ntôi và Nagi đang nổi lềnh bềnh."

# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは何がだ？」
1073 = "「Sao rồi, là sao cơ?」"

# 【ふかみ】
# display as 深美
# JP: 「あの、お手伝い。\nええと……大丈夫そうですか？」
1831 = "「Chuyện, giúp đỡ ấy ạ.\nƯm……anh thấy vẫn ổn\nchứ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か――、か」
1786 = "「Vẫn ổn chứ——, à.」"

# monologue
# JP: 心配そうなふかみの顔に、\nいったい何事かと思わされたが――
2419 = "Nhìn khuôn mặt đầy lo lắng của Fukami,\ntôi\ncứ tưởng có chuyện gì nghiêm trọng lắm——"

# 【双鉄】
# display as 雙鐵
# JP: 「この程度なら何ほどでもない。大丈夫だ。\nもとより、苦労は覚悟で来たのだしな」
1817 = "「Mức độ này thì chẳng nhằm nhò gì. Ổn cả\nthôi.\nVốn dĩ anh đến đây là đã chuẩn bị\nsẵn tinh thần chịu khổ rồi mà.」"

# 【ふかみ】
# display as 深美
# JP: 「あ……それなら」
1516 = "「A……Nếu vậy thì.」"

# monologue
# JP: ふかみの両手が水棹を離す。
2375 = "Hai tay Fukami buông cây sào chống ra."

# monologue
# JP: まるで祈りをささげるように、\n胸の前で手を握りしめる。
2192 = "Con bé đan chặt hai tay trước ngực,\nnhư\nthể đang dâng lời cầu nguyện."

# 【ふかみ】
# display as 深美
# JP: 「わたし、双鉄さんに。\n川下り、お手伝いしてほしい。です！」
1641 = "「Em, rất mong anh Soutetsu.\nĐến phụ giúp\ncông việc chèo thuyền xuôi dòng. Ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい。これからよろしく頼む」
1722 = "「Thật cảm kích quá. Từ giờ trở đi mong em\nchỉ giáo nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「はいっ！」
1557 = "「Vâng!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1855 = "「!?」"

# monologue
# JP: 舳先を蹴って空に舞い、\nそしてくるりと一回転して水の中へと――
2198 = "Con bé đạp chân vào mũi thuyền, bay vút\nlên không trung,\nrồi lộn một vòng tuyệt\nđẹp và lao thẳng xuống nước——"

# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
1575 = "「Ồ ồ ồ.」"

# monologue
# JP: カワセミが魚を捕りにいくように――\nふかみの体は美しく、水の中へと一気に潜る。
2211 = "Giống như con chim bói cá lao xuống bắt\nmồi——\nCơ thể Fukami vẽ nên một đường cong\ntuyệt mỹ, lặn thẳng xuống làn nước."

# 【双鉄】
# display as 雙鐵
# JP: 「なんとも見事な――わぷっ！？」
1754 = "「Thật là đẹp mắt——oáp!?」"

# 【凪】
# display as 凪
# JP: 「かっぱふかみの攻撃ばい！\nにーさん、ここは手を組むばいっ！」
1697 = "「Tuyệt chiêu của Kappa Fukami đó!\nAnh hai,\nchúng ta phải liên thủ thôi!」"

# 【ふかみ】
# display as 深美
# JP: 「かっぱじゃないもん！」
1643 = "「Tớ không phải Kappa đâu nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ちょっ！　待てっ――ぷあっ！？」
1541 = "「Khoan! Đợi đã——phù!?」"

# 【ふかみ】
# display as 深美
# JP: 「待ちませんよー」
1668 = "「Em không đợi đâu nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぬおっ！？」
1546 = "「U oái!?」"

# monologue
# JP: 背後を取られ、\n頭の上からざんぶと水を注がれる。
2300 = "Bị tấn công từ phía sau,\nmột lượng nước\nlớn bị dội thẳng từ trên đầu xuống."

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！？　何をっ」
1456 = "「Phù!? Em làm gì vậy hả.」"

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは、川の怖さをわかってません。\nわかってないから、動きが思い切りよすぎちゃう」
1846 = "「Anh Soutetsu chưa hiểu được sự đáng sợ\ncủa dòng sông đâu.\nVì chưa hiểu nên anh\nmới hành động dùng sức quá nhiều như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1853 = "「!」"

# monologue
# JP: ふかみの言葉に、\nその名の通りの深みを感じたような気がして――
2374 = "Trong lời nói của Fukami,\ntôi cảm giác như\ncó một sự sâu sắc đúng như tên gọi của con\nbé vậy——"

# monologue
# JP: その声が、川の底から響いた気がして、\n一瞬、背筋が寒くなる。
2426 = "Giọng nói ấy như vang vọng từ dưới đáy\nsông,\nkhiến tôi lạnh sống lưng trong giây\nlát."

# 【ふかみ】
# display as 深美
# JP: 「だから怖さがわかるまで、\n少し、川遊びにつきあってください」
1659 = "「Vì vậy, cho đến khi anh hiểu được sự đáng\nsợ đó,\nhãy cùng tụi em chơi đùa dưới sông\nmột chút nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、さすがに遊んでるヒマなどは――わぷっ！」
1386 = "「Không, làm gì có thời gian rảnh mà\nchơi——oáp!」"

# 【凪】
# display as 凪
# JP: 「にーさん、これも修行ばいっ！」
1597 = "「Anh hai, đây cũng là tu luyện đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「修行――つまりは訓練か」
1402 = "「Tu luyện——tức là huấn luyện sao.」"

# 【ふかみ】
# display as 深美
# JP: 「そうですね、わたしを捕まえたら合格ってことで。\n早くつかまえれば、時間の節約にもなりますよ？」
1689 = "「Đúng vậy ạ, nếu anh bắt được em thì xem\nnhư đậu.\nBắt được càng sớm thì càng tiết\nkiệm thời gian, đúng không ạ?」"

# monologue
# JP: そういうことなら、是非も無い。\n確かにふかみのあの動き。川とひとつであるかのようだ。
2326 = "Nếu đã nói vậy thì đành chịu thôi.\nQuả\nthực chuyển động đó của Fukami. Cứ như hòa\nlàm một với dòng sông vậy."

# monologue
# JP: ふかみの動きを追って掴めるようになったら、\n舟を操ることも今より、容易になろう。
2208 = "Nếu có thể đuổi theo và bắt được chuyển\nđộng của Fukami,\nthì việc điều khiển\nthuyền cũng sẽ trở nên dễ dàng hơn bây\ngiờ."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――っとっ！？」
1839 = "「Nếu vậy thì——chà!?」"

# monologue
# JP: （ばしゃんっ！）
# 2556 = "（啪擦！）" 

# monologue
# JP: 足元を泳ぐふかみをつかまえようとして、\n自分で姿勢を崩してしまう。
2266 = "Cố gắng tóm lấy Fukami đang bơi dưới chân,\ntôi tự làm mình mất thăng bằng."

# 【双鉄】
# display as 雙鐵
# JP: 「クソっ、この救命胴衣が」
1437 = "「Chết tiệt, cái áo phao cứu sinh này.」"

# 【ふかみ】
# display as 深美
# JP: 「脱いじゃダメっ！\n条件同じにするために、わたしも着ますね？」
1374 = "「Không được cởi đâu!\nĐể điều kiện công\nbằng, em cũng sẽ mặc vào nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪！　手伝え！」
1409 = "「Nagi! Giúp anh một tay!」"

# 【ふかみ】
# display as 深美
# JP: 「って、えっ！？」
1481 = "「Ơ, hả!?」"

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？　ちょっ、待っ――」
1478 = "「Ể!? Khoan, đợi đã——」"

# 【凪】
# display as 凪
# JP: 「待てって言われて待つよーなバカおらんばいっ！」
1492 = "「Bảo đợi mà đợi thì đúng là đồ ngốc đó!」"

# 【ふかみ】
# display as 深美
# JP: 「ああん、もうっ！」
1521 = "「A a, thật tình!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうなっ！」
1435 = "「Đúng vậy đấy!」"

# 【ふかみ】
# display as 深美
# JP: 「でもですね？　そういうふうに甘くみちゃうと」
1381 = "「Nhưng mà nhé? Nếu anh xem nhẹ như vậy\nthì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1854 = "「!!?」"

# monologue
# JP: きちんと着きっていなかった。\n僕らがそれの邪魔をした。
2489 = "Con bé vẫn chưa mặc xong đàng hoàng.\nChúng\ntôi đã cản trở việc đó."

# monologue
# JP: 愚かな選択をしてしまったと、\n一瞬にして思い知る。
2395 = "Tôi nhận ra mình đã đưa ra một lựa chọn\nngu ngốc\nchỉ trong tích tắc."

# 【凪】
# display as 凪
# JP: 「抜けたとっ！？」
1737 = "「Thoát rồi sao!?」"

# monologue
# JP: ふかみの姿は、一瞬にして水へと掻き消え――
2372 = "Bóng dáng Fukami chớp mắt đã biến mất vào\nlàn nước——"

# 【双鉄】
# display as 雙鐵
# JP: 「うおおおっ！！」
1549 = "「U ô ồ!!」"

# monologue
# JP: 足首をいきなり掴まれて、\n川底へ一気に引き込まれっ――
2298 = "Bất ngờ bị túm lấy cổ chân,\ntôi bị kéo\ntuột xuống đáy sông——"

# 【双鉄】
# display as 雙鐵
# JP: 「おっ！？　うあっ」
1577 = "「Ối!? U á.」"

# 【ふかみ】
# display as 深美
# JP: 「これで、救命胴衣の大切さがわかりましたか？」
1744 = "「Giờ thì anh đã hiểu được tầm quan trọng\ncủa áo phao cứu sinh chưa ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。わかった――十分に」
1553 = "「Ừm. Anh hiểu rồi——hiểu quá rõ rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「なら、\n今度はちゃんと、わたしにも着けさせてくださいね？」
1838 = "「Vậy thì,\nlần này hãy để em mặc đàng hoàng\nnhé?」"

# monologue
# JP: こくこく頷く。
2277 = "Tôi gật đầu lia lịa."

# monologue
# JP: ふかみに救命胴衣を返して、その着用を待つ間、\n凪の元へと寄って行く。
2271 = "Tôi trả lại áo phao cho Fukami, và trong\nlúc chờ con bé mặc vào,\ntôi tiến lại gần\nchỗ Nagi."

# 【双鉄】
# display as 雙鐵
# JP: 「救命胴衣は抵抗でもある。ふかみを舟に近づけず、\n休ませず、持久戦へと持ち込もう」
1681 = "「Áo phao cứu sinh cũng là một sức cản.\nĐừng để Fukami lại gần thuyền,\nđừng cho\ncon bé nghỉ ngơi, hãy đưa vào thế chiến\nđấu trường kỳ.」"

# 【凪】
# display as 凪
# JP: 「了解ばい！　いい作戦ばい！　\nふかみちゃんは泥仕合とか、好かんけんねー」
1756 = "「Đã rõ! Chiến thuật hay đó!\nFukami không\nthích mấy trò giằng co kéo dài đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！　捕まえたっ！」
1599 = "「Tốt! Bắt được rồi!」"

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！？」
1442 = "「Á!?」"

# 【凪】
# display as 凪
# JP: 「にーさん、大手柄ばいっ！」
1591 = "「Anh hai, lập công lớn rồi đó!」"

# monologue
# JP: 両手をあげて凪が喜ぶ。\nまさしく、喜色満面だ。
2131 = "Nagi giơ hai tay lên reo hò vui sướng.\nQuả\nthực là mặt mày hớn hở."

# monologue
# JP: まぁ――無理も無い。\nやっと、ようやく、なんとかなんとか……捕まえたのだ。
2040 = "Chà——cũng không trách được.\nCuối cùng,\ntrầy trật mãi mới……bắt được mà."

# 【凪】
# display as 凪
# JP: 「これであがれるばい、へとへとばい」
1762 = "「Giờ thì lên thuyền được rồi, mệt rã rời\nluôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1692 = "「是啊」" 

# monologue
# JP: 川の中にいるというのに、自分の汗がわかりそうなほど、\n疲労は強く、体温もあがりきっている。
2517 = "Dù đang ngâm mình dưới sông, nhưng tôi mệt\nđến mức có thể cảm nhận rõ mồ hôi của\nchính mình,\nthân nhiệt cũng tăng cao."

# monologue
# JP: 涼しい場所で横になりたい。\n心の底からそう感じてる。
2263 = "Tôi muốn ngả lưng ở một nơi thật mát mẻ.\nTừ tận đáy lòng tôi cảm thấy như vậy."

# 【ふかみ】
# display as 深美
# JP: 「あ……の――双鉄、さん」
1822 = "「A……ưm——anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1509 = "「唔？」" 

# monologue
# JP: 僕の手の中、ふかみの首がどんどん赤くなってい――
2455 = "Trong vòng tay tôi, cổ của Fukami ngày\ncàng đỏ bừng lên——"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1853 = "「！」" 

# monologue
# JP: ――気付き、慌てて、抱いていた手を離す。
1028 = "——Nhận ra điều đó, tôi vội vàng buông vòng\ntay đang ôm con bé ra."

# monologue
# JP: いくら相手が未熟な学園生とはいえど、\n救命胴衣ごしとはいえど。
2214 = "Dù đối phương có là một nữ sinh chưa\ntrưởng thành đi chăng nữa,\ndù có lớp áo\nphao cứu sinh ngăn cách đi chăng nữa."

# monologue
# JP: （水着の婦女子を、思いっきりに抱きすくめるなど、\nしていいことであるはずもない）
2574 = "（Việc ôm chặt lấy một cô gái đang mặc đồ\nbơi,\nchắc chắn không phải là việc nên\nlàm.）"

# 【ふかみ】
# display as 深美
# JP: 「あーあ、残念」
1534 = "「A, tiếc thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1855 = "「！？」" 

# monologue
# JP: 謝らねば、と思った矢先、\nふかみが僕からスイと離れて振り返る。
2259 = "Ngay khi tôi định mở lời xin lỗi,\nFukami\nlướt nhẹ ra khỏi tôi và ngoảnh lại."

# monologue
# JP: 捕まったのが悔しいのか、その顔は本当に残念そうで――\nけれど、楽しげに輝いてもいて。
2022 = "Không biết có phải vì hối tiếc do bị bắt\nkhông, khuôn mặt đó trông có vẻ thực sự\nnuối tiếc——\nNhưng đồng thời cũng rạng rỡ\nniềm vui."

# 【ふかみ】
# display as 深美
# JP: 「じゃ、あがりましょう？」
1835 = "「Vậy, chúng ta lên bờ thôi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……むっ？」
1499 = "「Ừm……Hửm?」"

# monologue
# JP: ふかみを捕まえホっとしてアドレナリンが抜けたのか、\n体が重くて仕方ない。
2021 = "Có lẽ vì đã bắt được Fukami nên thở phào\nnhẹ nhõm, lượng adrenaline sụt giảm,\ncơ\nthể tôi trở nên nặng nề vô cùng."

# monologue
# JP: 水の一滴がねばつくようで、\n油断をすると流されそうで――
2241 = "Từng giọt nước như dính chặt vào người,\nchỉ cần lơ là một chút là sẽ bị cuốn\ntrôi——"

# monologue
# JP: （これが……なるほど、川の怖さか）
2548 = "（Đây là……ra vậy, sự đáng sợ của dòng sông\nsao.）"

# monologue
# JP: ふかみの訓練の成果を痛感させられながら、\n僕もゆるゆる、岸へと戻る。
2310 = "Vừa thấm thía thành quả huấn luyện của\nFukami,\ntôi vừa từ từ quay trở lại bờ."

# 【双鉄】
# display as 雙鐵
# JP: 「ほれ」
1763 = "「Đây.」"

# 【凪】
# display as 凪
# JP: 「ありがとばい！\nえへへー、ただ酒はサイコーばいっ！」
1795 = "「Cảm ơn anh hai!\nEhehe, được khao uống là\ntuyệt nhất luôn!」"

# 【ふかみ】
# display as 深美
# JP: 「コーンポタージュスープじゃない」
1826 = "「Đó là súp ngô kem mà.」"

# monologue
# JP: 僕が渡したホットの缶を、\n凪もふかみも、カイロのように両手で包む。
2114 = "Cả Nagi và Fukami đều ôm trọn lấy lon súp\nnóng tôi đưa bằng hai tay\nnhư đang cầm một\nchiếc túi sưởi."

# 【ふかみ】
# display as 深美
# JP: 「あの、本当にご馳走になっても」
1796 = "「Dạ, anh khao tụi em như vầy có thật sự ổn\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご馳走というほどの金額でもない。\n迷惑でなければ飲んでくれ」
1818 = "「Cũng chẳng đáng bao nhiêu tiền để gọi là\nkhao đâu.\nNếu không phiền thì hai đứa cứ\nuống đi.」"

# 【ふかみ】
# display as 深美
# JP: 「迷惑だなんて……いただきます」
1633 = "「Sao lại phiền được chứ……Em xin phép ạ.」"

# 【凪】
# display as 凪
# JP: 「いっただっきまーす！　んぐっ、んぐっ、\nくあー！　うまかー！　ハラワタにしみったい！」
1459 = "「Em xin phép nha! Ực, ực,\nKhà! Ngon quá!\nẤm cả ruột gan luôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。本当だ。\n自覚していたよりも、更に冷えてしまっていたようだな」
1566 = "「Ừm. Đúng thật.\nCó vẻ như cơ thể đã bị\nlạnh hơn anh tưởng đấy.」"

# monologue
# JP: 無糖の筈の紅茶の甘みが、\n胃の底に落ち、そこから手足に広がっていく。
2421 = "Vị ngọt của hồng trà vốn dĩ không đường,\nrơi xuống tận đáy dạ dày, rồi từ đó lan\ntỏa ra khắp tay chân."

# monologue
# JP: あたたかい。\nあたたかみが実に、心地良い。
2206 = "Thật ấm áp.\nHơi ấm này thực sự rất dễ\nchịu."

# 【ふかみ】
# display as 深美
# JP: 「まだ双鉄さん、流れに逆らっちゃってるからですよ。\nそれで体力、余分に使って冷えちゃったんです」
1814 = "「Đó là vì anh Soutetsu vẫn còn đi ngược\nlại dòng chảy đấy ạ.\nThế nên anh mới tốn\nsức vô ích và bị lạnh như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったか？　\nそのまま浮くよう、心がけたつもりだったのだが――」
1694 = "「Vậy sao?\nAnh đã cố gắng để cơ thể cứ thế\nnổi lên rồi mà——」"

# 【ふかみ】
# display as 深美
# JP: 「そのまま浮く、を、双鉄さん、\n“その場で浮く”って、頑張ってますから」
1847 = "「Cứ thế nổi lên, nhưng anh Soutetsu lại\ncố\ngắng 'nổi ngay tại chỗ' đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1509 = "「唔？」" 

# monologue
# JP: 何が違うか、わからない。\nふかみはうふふと、楽しげに微笑し言葉をつなぐ。
2252 = "Tôi không hiểu có gì khác biệt.\nFukami\ncười fufufu, vui vẻ mỉm cười và tiếp lời."

# 【ふかみ】
# display as 深美
# JP: 「淀みの中にだって流れはあります。\nだから、“そのまま”浮いてれば、流されるんですよ？」
1735 = "「Ngay cả trong vũng nước đọng cũng có dòng\nchảy.\nNên nếu cứ 'cứ thế' mà nổi, thì sẽ\nbị cuốn trôi đó ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　ならば僕は無意識に、\n“その場に”とどまろうとして――」
1527 = "「A! Vậy là anh đã vô thức\ncố gắng giữ mình\n'tại chỗ'——」"

# 【ふかみ】
# display as 深美
# JP: 「はい。流れに逆らって、\nだから疲れちゃったんですよ」
1551 = "「Vâng. Vì đi ngược dòng chảy,\nnên anh mới\nmệt như vậy đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 1425 = "「原來如此」" 

# 【凪】
# display as 凪
# JP: 「流れに逆らったらいけんばい。\n疲れたあげく、やっぱり流されるだけになるけん」
1434 = "「Đi ngược dòng là không được đâu.\nVừa mệt\nmỏi mà rốt cuộc vẫn bị cuốn trôi thôi.」"

# monologue
# JP: 体で思い知ってるのだろう。\n凪の言葉には、重みにも近い説得力がある。
2302 = "Chắc hẳn con bé đã tự mình nếm trải điều\nđó.\nLời nói của Nagi mang một sức thuyết\nphục nặng tựa ngàn cân."

# 【ふかみ】
# display as 深美
# JP: 「流れに乗るのが、流れを制するただひとつの方法。\n流れとひとつになって、その勢いを活かすんですよ」
1510 = "「Nương theo dòng chảy là cách duy nhất để\nchế ngự dòng chảy.\nHòa làm một với dòng\nchảy, và tận dụng sức mạnh của nó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ。確かに……淀みの中にあってもこれほど、\n消耗を強いる力だものな」
1503 = "「Ưm. Quả thực……ngay cả trong vũng nước\nđọng mà\nsức mạnh đó cũng vắt kiệt sức lực\nđến nhường này.」"

# monologue
# JP: そうと思えば、疲れを余計に感じてしまう。\n同時に、かなりの――
2249 = "Nghĩ vậy, tôi lại càng cảm thấy mệt mỏi\nhơn.\nĐồng thời, một sự——"

# monologue
# JP: （ぐ～～っ――）
2553 = "（Rột rột——）"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1480 = "「Úi.」"

# 【凪】
# display as 凪
# JP: 「お腹へるばい？　減ったばいっ！」
1400 = "「Đói bụng hả? Đói rồi chứ gì!」"

# monologue
# JP: 僕の腹の音に、凪はしかりしかりと頷く。
2430 = "Nghe tiếng bụng tôi sôi, Nagi gật đầu lia\nlịa."

# 【凪】
# display as 凪
# JP: 「お肉食べたかばーい！\n河原でバーベキューしたかとばい！」
1461 = "「Muốn ăn thịt quá đi!\nMuốn làm BBQ ở bờ\nsông quá đi!」"

# 【ふかみ】
# display as 深美
# JP: 「バーベキューの道具なんて持ってないよう」
1441 = "「Tụi mình đâu có mang dụng cụ BBQ theo\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや……それはいいのではないか？」
1365 = "「Không……ý tưởng đó hay đấy chứ?」"

# 【ふかみ】
# display as 深美
# JP: 「え？　それって？」
1486 = "「Hả? Ý anh là sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、『河原でバーベキュー』だ。\n例えば、川下りのあとのオプションとして」
1665 = "「Thì là, 『BBQ ở bờ sông』 ấy.\nVí dụ như,\nlàm một lựa chọn đi kèm sau khi chèo\nthuyền xuôi dòng chẳng hạn.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
1523 = "「A!」"

# monologue
# JP: それ単体でも悪くはないが、鉄道観光と連携させれば、\nもっと膨らみそうな気がする。
2513 = "Chỉ riêng ý tưởng đó thôi cũng không tồi,\nnhưng nếu kết hợp với du lịch đường sắt,\ntôi có cảm giác nó sẽ còn phát triển hơn\nnữa."

# monologue
# JP: 例えば\x%l8620;#00ffc040;8620%l;#;の石炭を、\nそのまま点火剤として流用するとか――――っ！
2334 = "Ví dụ như lấy than của \\x%l8620;#00ffc040;8620%l;#;\ndùng luôn làm chất\nmồi lửa chẳng hạn――――!"

# 【凪】
# display as 凪
# JP: 「にーさん？」
1598 = "「Anh hai?」"

# 【ふかみ】
# display as 深美
# JP: 「双鉄さん、どうかしましたか？　――きゃっ！？」
1845 = "「Anh Soutetsu, anh sao vậy? ——Á!?」"

# monologue
# JP: 凪の、ふかみの手をにぎる。\nぶんぶん大きく握手する。
2284 = "Tôi nắm lấy tay Nagi, tay Fukami.\nBắt tay\nlắc lấy lắc để."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ、それだ、バーベキューだ！\nバーベキューと流れで、いけるかもしれん」
1603 = "「Đúng rồi, chính là nó, BBQ!\nBBQ kết hợp\nvới dòng chảy, có khi lại được việc.」"

# 【凪】
# display as 凪
# JP: 「な、なにがばい！？」
1792 = "「C-cái gì cơ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「煙だ。煙の問題だ。流れが制御できんものなら、\n制御可能な流れを作り、ぶつければいい」
1699 = "「Khói. Vấn đề về khói. Nếu không thể kiểm\nsoát được luồng khói,\nthì tạo ra một luồng\nkhói có thể kiểm soát được và cho chúng\ntriệt tiêu nhau là xong.」"

# monologue
# JP: 技術的に可能かどうか、精査してもらう必要はあろう。
2315 = "Chắc chắn sẽ cần nhờ người kiểm tra xem về\nmặt kỹ thuật có khả thi hay không."

# monologue
# JP: だが基本的にこの方向で、\n間違ってないという感触がある。
2038 = "Nhưng tôi có linh cảm rằng về cơ bản,\nhướng đi này là không sai."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりのおかげだ、ありがとう！」
1583 = "「Nhờ hai đứa cả đấy, cảm ơn nhé!」"

# 【凪】
# display as 凪
# JP: 「わっ！？」
# 1469 = "「哇！？」" 

# 【ふかみ】
# display as 深美
# JP: 「はうっ！？」
1475 = "「Hau!?」"

# monologue
# JP: 抱きしめ、頭をぐしぐし撫でる。
2276 = "Tôi ôm chầm lấy hai đứa, xoa đầu rối bù."

# monologue
# JP: 凪を撫でてる左手とふかみを撫でてる右手、\n髪の硬さは随分違うが、シャンプーの匂いはおんなじだ。
2226 = "Bàn tay trái đang xoa đầu Nagi và bàn tay\nphải đang xoa đầu Fukami,\nđộ cứng của tóc\nkhá khác nhau, nhưng mùi dầu gội thì giống\nhệt."

# 【双鉄】
# display as 雙鐵
# JP: 「言うならば、そうバーベキュー\x%l列車;#00ffc040;列車%l;#;。\n煙で、煙を制する\x%l列車;#00ffc040;列車%l;#;だ」
1609 = "「Nếu phải gọi tên, thì là \\x%l列車;#00ffc040;đoàn tàu%l;#; BBQ.\nMột \\x%l列車;#00ffc040;đoàn tàu%l;#; lấy\nkhói chế ngự khói.」"
