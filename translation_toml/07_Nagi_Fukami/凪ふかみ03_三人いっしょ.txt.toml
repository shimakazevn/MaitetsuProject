# lines: 423 
# 【ふかみ】
# display as 深美
# JP: 「それで、その人とはどうなったんです？」
1658 = "「於是，那個人後來呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――」
1513 = "「嗯——」" 

# monologue
# JP: 問われるままに、自分の過去を話してく。
2279 = "既然被問到了，我便講述起了自己的過去。" 

# monologue
# JP: 川下りの手伝いを終えた後にそうすることが、\nここ最近の、すっかり日課となってしまった。
2415 = "而在每天給漂流當助手的工作結束以後，這樣的談話，也逐漸變成了最近每天的必修課。" 

# 【双鉄】
# display as 雙鐵
# JP: 「レポートを写させてやって、それで終わりだ。\nお礼に食事をと言われたが、別に食には困ってないので」
1760 = "「讓他抄了報告後就結束了。雖然說為表謝意要請我吃飯，不過我又不缺這一頓」" 

# 【凪】
# display as 凪
# JP: 「断ったと？」
1653 = "「拒絕了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。さほど大したレポートでもなかったしな」
1669 = "「是啊。再說本就不是什麼重要的報告」" 

# 【凪】
# display as 凪
# JP: 「うーーーーん」
1512 = "「嗯————」" 

# monologue
# JP: 凪が大げさに首を傾げる。\nふかみもひどく、困ったような顔をしている。
2130 = "凪的腦袋誇張地偏向一邊。而深美也是滿臉不解的神情。" 

# 【凪】
# display as 凪
# JP: 「そぎゃん付き合い悪くて良く、\nにーさん、友達できたとね」
1742 = "「與人相處成這個樣，真虧大哥哥你還交得到朋友啊」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ！？」
1575 = "「小凪你說什麼呢！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、向こうも慣れ合うのを好まぬ性質だしな。\nタイプが似ていて、得意分野が違う故だろう」
1095 = "「……這個嘛，反正對方也不是那種喜歡與人親近的人吧。其實性格很相像，只是各有所長而已」" 

# monologue
# JP: 言った瞬間、ふと思う。
2146 = "剛出口的話倒提醒了我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　するとむしろ、利害で繋がっているのかな。\n向こうが友達だというので、僕もそうだと思っていたが」
1532 = "「嗯？要這麼說的話，或許是利害一致吧。對方當我是朋友，我也就沒多想同樣當他是朋友了」" 

# 【ふかみ】
# display as 深美
# JP: 「えとっ、あの。\nお話聞いてると利害だけとかじゃなさそうかなって」
1803 = "「這個，呃。按你說的看，也不像只是單純的利害一致而已啊」" 

# 【凪】
# display as 凪
# JP: 「きっかけなんて何がどーでも、関係なかとよ。\n友達だと思ってるなら、友達ばい」
1545 = "「契機什麼的又有什麼關係咧。覺得是朋友就是朋友了唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1808 = "「這樣啊」" 

# monologue
# JP: 凪とふかみの言葉にひどく、ほっとする。
2421 = "聽著凪和深美你一言我一語，我內心感受到了強烈的觸動。" 

# monologue
# JP: 友人などいてもいずとも、\n大した違いもなかろうと思っていたのだが――
2305 = "朋友之有無，我本以為並無甚區別——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕には、\n帝大に、少なくとも一人は友達がいる」
1810 = "「這麼說的話，我在帝大至少也算有一個朋友了」" 

# 【ふかみ】
# display as 深美
# JP: 「っていうことはですね？」
1349 = "「也就是說這樣？」" 

# monologue
# JP: 几帳面につけていたメモ帳のページを繰りながら、\nふかみは再び、困ったような顔になる。
2345 = "深美翻著記得整整齊齊的筆記本，臉上又泛起了一絲不解的神情。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんの友達関係は、小さな頃にはたくさん。\nええと……それからしばらく居なくて。帝大で一人、で」
1844 = "「雙鐵先生在小時候是有很多朋友的。呃……然後就有一段空窗期，之後在帝大有一個，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それで間違いない」
1490 = "「啊。是這樣沒錯」" 

# monologue
# JP: それから、と、ふかみはボカして言ってくれたが……\nあの事故以来、確かに僕は変わったのだなと、改めて思う。
2347 = "深美雖然輕描淡寫地用“然後”帶過……不過回頭看來，在那次事故之後，我確實改變了很多。" 

# monologue
# JP: 友人の数とは――言い換えるなら、\n積極的に人と関ろうとする意欲の表れであるのだろうし。
2469 = "要說朋友的多寡，換句話說，其實是維護人際關係的積極性的一個指證吧。" 

# 【ふかみ】
# display as 深美
# JP: 「間違いないなら……ええと、凪ちゃん」
1747 = "「要是沒錯的話……這個，小凪」" 

# 【凪】
# display as 凪
# JP: 「なんね？　ふかみちゃん」
1608 = "「怎麼咧？小深」" 

# monologue
# JP: 二人おでこをくっつけあって、\nひそひそ相談しはじめる。
2062 = "兩個人額頭貼著額頭，開始說起什麼悄悄話。" 

# monologue
# JP: おーおーと、凪は何度も納得したような声を出し。\nややあって、僕へと振り返り胸を張る。
1066 = "“哦，哦！”凪不住地點頭同意。而後，挺胸抬頭轉向了我。" 

# 【凪】
# display as 凪
# JP: 「わかったと！\nこれで大体見えてきたばい！！」
1449 = "「咱知道咧！這麼說咱大概就明白咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、何がだ？」
1476 = "「哦，明白什麼了？」" 

# 【凪】
# display as 凪
# JP: 「何って、にーさんを\n泣いたり笑ったり怒ったりできるようにする方法たい」
1353 = "「也沒什麼，就是讓大哥哥會哭會笑會生氣的方法唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。そういえばそういう話だったな」
1097 = "「……這樣啊。雖然剛才也的確是在說這個」" 

# monologue
# JP: 質問項目があまりに多く、期間が長く、\n問われ答えることが半ば習慣化していたが――
2461 = "被問得實在太多太久，我已經變得有點機械性地對提問做出回答了，不過——" 

# monologue
# JP: 答え始めたきっかけは、『そうするために知りたい』と、\n二人にせがまれたことだった。
2467 = "要說我認真開始回答的契機，還是兩個人對我死纏爛打地說“想要考慮出方法就要先了解情況才行”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で？　具体的にはどんな方法を？」
1652 = "「所以？具體是怎麼樣的方法呢？」" 

# 【凪】
# display as 凪
# JP: 「それは！　しゅ、うがっ！？　――もごもご～」
1823 = "「那就是！只……哇啊！？——嗯嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、もうちょっとナイショでいいですか？\nええと、うまく出来るかわかりませんし」
1805 = "「這個，還是先再保密一下下吧，好嗎？現在，還不知道是不是能行得通呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「別に構わん。\nでは、うまく出来そうになったら教えてくれ」
1634 = "「我無所謂啊。那等你們覺得行得通的時候告訴我一聲吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はい、もちろんです！」
1563 = "「好的，那是自然！」" 

# 【凪】
# display as 凪
# JP: 「ぷはあっ、もちろんばいっ！」
1510 = "「嗚哈，那是自然囉！」" 

# monologue
# JP: ふかみも凪も、わくわくを、\n顔いっぱいに溢れさせてる。
2329 = "深美和凪躍躍欲試的樣子，在二人臉上表露無遺。" 

# monologue
# JP: 何をどうしてもらえるものか、\nこんな笑顔を見せられたなら、少し楽しみになってくる。
2267 = "接下來不管她們打算做什麼、怎麼做，看到這樣的笑容，都讓人不禁多了一份期待。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ではな。また明日」
1821 = "「那先這樣，明天見」" 

# 【ふかみ】
# display as 深美
# JP: 「はい！　\n双鉄さんも、夜のバーベキュー\x%l列車;#00ffc040;列車%l;#;頑張ってください！」
1561 = "「好的！雙鐵先生，晚上的ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;也要加油哦！」" 

# 【凪】
# display as 凪
# JP: 「そのスキに、こっちもこっちでがんばっとくばーい！」
1774 = "「趁這機會，咱們也得加油咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……これは――日々姫の絵だな」
1096 = "「……這是——日日姬的畫啊」" 

# 【ふかみ】
# display as 深美
# JP: 「はい、お願いしたら喜んで引き受けてくれました」
1677 = "「是的，我拜託了她，她很高興地就接受了我的請求」" 

# 【凪】
# display as 凪
# JP: 「早く見るばい！　開けるばい！」
1603 = "「快讓咱瞧瞧！打開瞧瞧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1523 = "「嗯」" 

# monologue
# JP: せっつかれるまま、“御一夜スペシャル修学旅行！”と\n表紙書きされたしおりを開く。
2183 = "在凪的催促聲中，深美把手裡的手冊在桌上攤開，手冊寫著《御一夜特別修學旅行！》的封皮映入眼簾。" 

# monologue
# JP: 中には細かな行程表と、\n旅行の諸注意が記されている。
2463 = "裡面還記有詳細的行程表，以及諸多旅行中的注意事項。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……本当に修学旅行風だな」
1794 = "「這……簡直就像修學旅行一樣啊」" 

# 【凪】
# display as 凪
# JP: 「“風”じゃなく、修学旅行ばい！　本物の」
1807 = "「這哪叫“像”啊，就是修學旅行唉！如假包換」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1482 = "「唔？」" 

# 【ふかみ】
# display as 深美
# JP: 「御一夜のことを改めて、双鉄さんとわたし達とで、\n勉強できる旅行にしたいなって」
1620 = "「我們希望雙鐵先生能和我們一起，來進行一次重新學習御一夜的旅行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。御一夜を学ぶ、“修学”旅行か」
1411 = "「原來如此。學習御一夜的“修學”旅行啊」" 

# 【凪】
# display as 凪
# JP: 「楽しみばい！」
1558 = "「好期待呀！」" 

# monologue
# JP: 凪はもう、\n頬のてっぺんをピンクにするほど盛り上がってる。
2127 = "凪的情緒已經高漲到小臉蛋整個紅透了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばさしずめ、僕は引率教師の役割――」
1831 = "「那總之，擔任帶隊老師任務的就是我——」" 

# 【凪】
# display as 深美＆凪
# JP: 『「いいえっ」\n「違かとっ！」』
1854 = "『「不是哦」\\n「才不是咧！」』" 

# monologue
# JP: 大きな声が揃い重なる。
2059 = "兩人異口同聲大聲說道。" 

# monologue
# JP: 凪とふかみは目を見交わして、\nふかみの方が、代表するように言葉をつなげる。
2119 = "凪和深美兩人交換了一下眼神，而後由深美作為代表，繼續說了下去。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんも、学園生です。引率なんて立場じゃなくって、\nわたしと凪ちゃんの同級生」
1843 = "「雙鐵先生也是學生。不是帶隊，而是跟我和小凪一樣都是同學」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同級生。僕がか」
1619 = "「我作為你們的同學嗎」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　にーさんは留年生ばい」
1582 = "「就是唄！大哥哥是留級生唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「留年か」
1723 = "「留級啊」" 

# monologue
# JP: 同級生と考えるなら、\n僕はいささか、老けすぎだろう。
2468 = "要說是同學的話，我這也未免超齡有點多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「随分と落第を重ねてしまったのだな、僕は」
1639 = "「我這落榜的次數還真是有點多啊」" 

# 【凪】
# display as 凪
# JP: 「仕方なかばい」
1806 = "「這又沒辦法嘍」" 

# monologue
# JP: 軽口のつもりだったのに、凪は真顔で受け止める。
2307 = "本想打個哈哈就過去了，凪的表情看來是當真了。" 

# 【凪】
# display as 凪
# JP: 「にーさん、全然勉強しとらんもん」
1538 = "「大哥哥你這根本沒好好學習吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……勉強だけは、随分としてきたつもりだが」
1346 = "「也不是……光是學習，我學得不算少了啊」" 

# 【凪】
# display as 凪
# JP: 「そぎゃん勉強のことじゃなくって」
1335 = "「不是學習的問題啦」" 

# 【ふかみ】
# display as 深美
# JP: 「修学旅行！　修学旅行ですから！！\n自分でいろいろ発見するのも、きっと素敵な勉強です」
1386 = "「修學旅行！現在是修學旅行啦！！自己去發現各式各樣的東西，是很好的學習機會啊」" 

# 【凪】
# display as 凪
# JP: 「っ！」
1848 = "「！」" 

# monologue
# JP: ふかみが割って入ってくれば、\n凪はハっとした顔をして、言葉を飲み込む。
2184 = "在深美插話進來後，凪露出恍然大悟的神情，把話又咽了回去。" 

# monologue
# JP: そしていきなり近寄ってきて、\nグイ、と力強く僕の手を引く。
2354 = "然後冷不防地衝到我身邊，用力抓住了我的手。" 

# 【凪】
# display as 凪
# JP: 「そうばい！　修学旅行ばい！\n楽しんでたくさん勉強するばいっ！」
1707 = "「沒錯咧！修學旅行囉！開開心心學老多老多東西吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1524 = "「嗯！」" 

# monologue
# JP: 御一夜について学ぶのは、\n工場誘致を撤回させるためにも必ず役に立つ。
2489 = "認真學習御一夜，想必會對阻止工廠落戶的活動有所裨益吧。" 

# monologue
# JP: 楽しめるかどうかは別として、\nせっかくの機会、僕も前向きに臨むとしよう。
2532 = "開心與否姑且不論，機會難得，我也就順勢好好珍惜這次機會吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず最初は――」
1836 = "「那麼首先是——」" 

# 【凪】
# display as 凪
# JP: 「御一夜一の腕利き鍛冶屋！\n蓑笠鍛冶店さんからばいっ！！」
1580 = "「就從御一夜技術首屈一指的鍛冶店——蓑笠鍛冶店開始唄！！」" 

# 【凪】
# display as 凪
# JP: 「たのもーーーーっ！」
1847 = "「麻煩咧～～～～！」" 

# monologue
# JP: 修学旅行の学園生だ。\n“ただいま”と入っていくのはやはり違おう。
2365 = "畢竟她現在的身份是修學旅行的學生，張口“我回來了”就進去就太奇怪了。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「はい、いらっしゃい」
1372 = "「來了，歡迎光臨」" 

# monologue
# JP: が、だからといってよりにもよっての\n『頼もう』を、蓑笠老人は柔和な笑顔で受け止める。
2150 = "即便如此，說什麼很難說“麻煩”……不過蓑笠爺爺還是滿臉慈祥笑容地接過了話。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「いらっしゃい。修学旅行は、楽しかとですか？」
1692 = "「歡迎光臨。修學旅行，開心嗎？」" 

# monologue
# JP: ――蓑笠さんにも、話が通っているらしい。\nふかみはホっとした顔になり、弾むようにして頭を下げる。
1062 = "——蓑笠先生好像事先有被打過招呼的樣子。深美的臉上露出了一絲安心，抬得高高的頭也隨之沉了下去。" 

# 【ふかみ】
# display as 深美
# JP: 「ええと、楽しみたいって思ってます。\n今日は包丁づくり体験、よろしくお願いします」
1804 = "「這個，希望可以很開心吧。今天的體驗鍛造菜刀就麻煩您啦」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「はいはい。そんなら――」
1555 = "「好嘞好嘞。這樣的話——」" 

# monologue
# JP: 蓑笠さんが僕ら三人それぞれに、子供が描いた絵のような\nおおざっぱに包丁めいた形をしている鋼板をくれる。
2448 = "蓑笠先生給我們三人每人拿了一塊彷彿是小孩子畫出來的勉強看得出是菜刀形的鋼板。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こん機械は、ベルトハンマーいうもんです」
1802 = "「這個機器叫皮帶鍛錘」" 

# monologue
# JP: 見たまんまの名前だ。
2373 = "真是直觀明瞭的名字。" 

# monologue
# JP: モーターが、ベルトのついてる歯車を回転させ、\nその動きが、ハンマーに連動するという機構にみえる。
2538 = "馬達通過皮帶驅動齒輪旋轉，進而連帶驅動鍛錘——機器的工作原理看起來大抵如此。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こいつば使って、仕上がりのイメージに伸ばして下さい。\nそいば削って、焼き入れして研いで、包丁にしますけん」
1391 = "「先用這東西把鋼板打成想好的形狀，接著去掉多餘的部分，淬火後打磨，菜刀就成了」" 

# monologue
# JP: 蓑笠さんが機械の前に座りペダルを踏み込めば、\nガインガインと轟音をたて、ハンマーがピストン動作する。
2445 = "蓑笠先生坐在機器前，隨著他一下下踩下踏板，鍛錘上下活塞式地運動，鐺鐺的捶打聲響徹耳畔。" 

# monologue
# JP: その下にある鋼板は――\nなるほど、見る見る伸びていく。
2419 = "而鍛錘下的鋼板——正以可見的速度延展著，原來如此。" 

# 【凪】
# display as 凪
# JP: 「一番にやるばい！」
1451 = "「咱要頭一個來！」" 

# 【ふかみ】
# display as 深美
# JP: 「どうぞどうぞ」
1757 = "「請吧請吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お手並み拝見させてもらおう」
1826 = "「那就讓我看看你的技術吧」" 

# 【凪】
# display as 凪
# JP: 「ふふーん、見習うとよかばいよ！」
1479 = "「哼哼，好好兒學著吧！」" 

# monologue
# JP: 凪がペダルを踏み込めば、\n蓑笠さんのときより数倍速くハンマーが落ちる。
2135 = "凪踩在踏板上，鍛錘以蓑笠先生操作時數倍的速度落下。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ちょっ！？　踏み込み過ぎだろう」
1811 = "「這！？踩太重了吧」" 

# 【凪】
# display as 凪
# JP: 「む、勢いをつけすぎたばい」
1474 = "「哦，好像勢頭是有點太猛咧」" 

# monologue
# JP: 一転、今度はゴーーーン、ゴーーーン、と、\n除夜の鐘のごときのろのろペース。
2426 = "腳下一松，結果又變成了“咣——咣——”像新年夜鐘聲一樣緩慢的節奏了。" 

# monologue
# JP: どうにも調子が掴めないのか、\n凪はしきりに首を傾げて悪戦苦闘を見せている。
2367 = "看來一時半會是抓不住訣竅了，凪歪著頭，一副徹底陷入苦戰的樣子。" 

# 【ふかみ】
# display as 深美
# JP: 「え？　ひょっとして凪ちゃん、経験ないの？」
1443 = "「咦？難道說小凪，也完全沒有經驗嗎？」" 

# 【凪】
# display as 凪
# JP: 「なかばいよ！　初めてばい！！」
1705 = "「沒有唄！今兒頭一趟！！」" 

# monologue
# JP: 凪にフォローの手をいれながら、“そうなんですよ”と\n言わんばかりに、蓑笠老人も苦笑を浮かべる。
2451 = "蓑笠爺爺邊出手幫著凪，邊露出彷彿在說“確實是這樣啊”的苦笑。" 

# 【凪】
# display as 凪
# JP: 「真剣は欲しかけど、\n包丁にはそれほど興味なかったけん」
1363 = "「以前倒是想要真刀真槍來著，不過菜刀沒什麼大興趣咧」" 

# monologue
# JP: 興味なかった、と過去形で言う、\nその顔つきは集中している。
2202 = "她邊用過去形說著“沒什麼大興趣”，臉上的神情卻顯得充滿專注。" 

# monologue
# JP: リズムをようやく掴めてきたのか、\nハンマーの落ちる音も一定になってきた。
2035 = "似乎總算找對了節奏，鍛錘落下的聲音也變得整齊劃一了。" 

# monologue
# JP: （ゴインっ！　ゴインっ！　ゴインっ！　ゴインっ！）
2551 = "（咚！咚！咚！咚！）" 

# monologue
# JP: 気持ちよさそげにハンマーを落とし、\n落としつづけて――ようやく、凪はペダルを離す。
2530 = "鍛錘以順暢的節奏不斷升起、落下——終於，凪從踏板上抬起了腳。" 

# 【凪】
# display as 凪
# JP: 「ん！　こぎゃんとで良かっ！！」
1526 = "「嗯！這樣就差不多咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「でかいな。そして、長い」
1557 = "「好大啊。還這麼長」" 

# monologue
# JP: もとの鋼板は三徳包丁サイズなのだが、\n凪のはほとんど、刺身包丁のようになっている。
2154 = "原本的鋼板也就是十幾公分的三德刀尺寸，凪愣是給打成了二三十公分的刺身刀。" 

# monologue
# JP: 好きで、欲しいというだけあって、\n包丁にも、刀に近い形状を求めたのだろうか。
2309 = "果然喜歡和想要並不只是嘴上說說啊，菜刀也是奔著真刀的樣子去打的嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は最後にしてみたい。\nふかみ、先にいけるか？」
1625 = "「我想我還是排最後一個吧。深美，你先來？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、はい。双鉄さんがそれがいいなら」
1500 = "「啊，好的。就照雙鐵先生說的來吧」" 

# monologue
# JP: ふかみがしずしず機械の前に腰かけたなら、\n否応なしに、凪との姿勢の大きな違いに気付かされる。
2335 = "深美文靜地坐到機器前，她擺出的姿勢和凪是大相徑庭，不由得我不注意。" 

# monologue
# JP: 凪はどかっと、大股びらき。\n対してふかみは足を揃え気味に整えている。
2125 = "凪是不修邊幅地直接叉開大腿。而深美的雙腳則是擺得很規整。" 

# 【ふかみ】
# display as 深美
# JP: 「ん……っと、これ――むつかしい。です」
1516 = "「嗯……喲，這個，好難啊。嗯」" 

# monologue
# JP: 踏み込み方もまるで違う。\n慎重……というか、緊張モードだ。
2504 = "踩踏板的動作也不一樣。與其說是慎重，不如說是太緊張吧。" 

# monologue
# JP: ハンマーまでもが、少し動いて様子を見て――と、\n引っ込み思案になってるようだ。
2011 = "不要說鍛錘了，機器剛一動，感覺她就隨時打算收腳的樣子。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、それじゃ、陽がくれるばい。\n予定先、まわりきれんよーになるばい」
1578 = "「小深，這麼弄太陽都要下山咧。原定的行程可要跑不完咯」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　あ、ごめんなさい」
1438 = "「咦！？啊，對不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこは気にせず取り組んでくれ」
1704 = "「沒事，別想那麼多先專心做吧」" 

# monologue
# JP: これはこれで、見ていてなかなか面白くある。\nそれに――
2516 = "這個過程越看就越覺得樂在其中。而且——" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理に行程を追い、薄い思い出を重ねるよりも、\n一つだけでも濃い思い出がある方が楽しかろうしな」
1697 = "「比起勉強去趕行程，讓那些比較淡的感受積累起來化為一件深刻的記憶才更稱得上開心吧」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
1491 = "「啊」" 

# monologue
# JP: こくんと、頷き。
2337 = "深美深深地點頭。" 

# monologue
# JP: ふかみの両肩がスっと下がって、\nペダルも、自然と踏み込まれていく。
2333 = "深美放鬆了緊繃的雙肩，踏板上的力道也自然了許多。" 

# monologue
# JP: （ガンっ！　ガンっ！　ガンっ！　ガンっ！）
2561 = "（鏘！鏘！鏘！鏘！）" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、良かとですねぇ」
1502 = "「啊，著實不賴啊」" 

# monologue
# JP: 蓑笠老人がそうつぶやくほど、\n力みの抜けたふかみの動作は、整っている。
2274 = "放鬆下來的深美的動作俐落到讓蓑笠爺爺不禁如此低聲自語。" 

# monologue
# JP: 鋼板を動かす指先も、整いながら滑らかで――
2265 = "指尖調整鋼板位置的動作，也俐落而流暢——" 

# 【ふかみ】
# display as 深美
# JP: 「うん。こんな感じ。です」
1522 = "「嗯。差不多這樣吧。嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは綺麗だ。\nこの時点でもう、おおよそ包丁の形だな」
1594 = "「很漂亮啊。現在這樣，菜刀的形已經基本出來了」" 

# 【ふかみ】
# display as 深美
# JP: 「えへへ、ありがとうございます」
1462 = "「哎嘿嘿，多謝誇獎」" 

# 【凪】
# display as 凪
# JP: 「むぅ～、なんだか悔しかばい！」
1483 = "「唔～感覺好不甘心啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、僕か」
1832 = "「那該到我了」" 

# monologue
# JP: 凪とふかみを見せてもらって、\nなんとなくだが要領の見当がついた気がする。
2372 = "看過凪和深美的操作，感覺大體上已經找到要點了。" 

# monologue
# JP: とにかくペダルは力を入れず、一定に――
2537 = "首先踏板上不要加太大力，保持穩定——" 

# monologue
# JP: （ガンっ！　ガンっ！　ガンっ！）
2562 = "（鏘！鏘！鏘！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――おっ！？」
1514 = "「嗯——哦！？」" 

# monologue
# JP: これは……見るとやるとでは大違い。\nなかなかどうして難しい。
2515 = "這……眼見與上手竟有如此大的區別。上手委實頗有難度。" 

# 【凪】
# display as 凪
# JP: 「にーさん、ぶきっちょいねー、\nおんなじとこばっか叩いとるばい」
1540 = "「大哥哥怎麼這麼笨呢，老是逮著那一個地方打」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ！　凪ちゃんっ！！」
1507 = "「喂！小凪！！」" 

# monologue
# JP: ……前々から感じていたのだが、\nふかみのフォローは、フォローではなく追い打ちだ。
1070 = "……之前就有這樣的感覺，現在越來越覺得，深美這哪是在打圓場，根本就是落井下石。" 

# monologue
# JP: 僕の鋼板も追い打ち続きで、\nべろべろに広くなっていく。
2250 = "我繼續專心捶打鋼板，而鋼板也朝著我想要的形狀延展著。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こう――\nもう少しだけ、まんべんなくやると良かですな」
1340 = "「不錯——再來幾下，全部捶勻就妥咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、助かります」
1497 = "「啊，多謝指點」" 

# monologue
# JP: 見かねた蓑笠さんが手を添え動かしてくれたおかげで、\nなんとかかんとか、包丁の形は維持した、が――
2152 = "原本在一旁觀看的蓑笠先生忍不住上手幫了我幾下，總算勉強保持住了菜刀的形狀，然而——" 

# monologue
# JP: （思わぬことで、体が止まってしまったな）
2555 = "（因為意想不到的原因，身體竟僵住了啊）" 

# monologue
# JP: 恐らく、体は怖がったのだ。\nあまりに間近に、鉄が叩かれ焼けていく、音と匂いに。
2237 = "恐怕，是身體在害怕吧。在這麼近的距離，充斥著鐵燒灼的味道，撞擊的聲音。" 

# monologue
# JP: が、そう悟られては気を使わせる。\n慣れぬことだが、ウソのひとつもついてみよう。
2275 = "既然意識到了，就只好用心去堅持。雖然尚不習慣，但這裡也只得敷衍過去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。イメージ通りに出来た。\n右田の台所には、広刃の包丁がないのだ」
1528 = "「嗯，做成我想的樣子了。右田家廚房裡，還缺一把闊刃的菜刀呢」" 

# 【凪】
# display as 凪
# JP: 「それ、刃じゃなくて、胴がひらぺったいだけばい」
1816 = "「那不叫刃吧，只是刀身寬一點不是」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ、凪ちゃん！」
1508 = "「喂，小凪！」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「包丁の価値は、見栄えより切れ味ですけんねぇ。\n大事なのは、ここからですばい」
1746 = "「菜刀的價值，比起好看，鋒利才是重點吶。接下來才到關鍵的步驟嘞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですよね」
1735 = "「確實如此啊」" 

# monologue
# JP: 蓑笠さんがそういうのなら、\nここから先で、切れ味は挽回できるのだろう。
2278 = "既然蓑笠先生這麼說的話，接下來看來還有靠鋒利挽回的餘地吧。" 

# monologue
# JP: 今度の機械は、回転水砥石。\n水に浸かりつつ回転する、大きな大きな丸砥石だ。
2519 = "這次要用的機器是磨刀機。核心是一塊浸在水中旋轉的圓盤形磨刀石。" 

# 【凪】
# display as 凪
# JP: 「おもしろそうばい！　いちばーんっ！」
1728 = "「真好玩嘿！咱第一個！」" 

# 【ふかみ】
# display as 深美
# JP: 「わ――これ……結構……あれ、れ？」
1453 = "「哇——這個……還真……咦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こう――かな？　ん――ふむ」
1680 = "「是這樣……嗎？嗯——哦」" 

# monologue
# JP: 今度は体がすんなり動く。\nすんなり動けば、さすがに年の功も示せる。
2520 = "這次身體動得很靈活。沒有了干擾，年長的優勢就顯現出來了。" 

# monologue
# JP: 恐らく凪よりふかみより、\nこの工程は、質良くこなせているだろう。
2518 = "這次我的成果，應該比凪和深美更好才對吧。" 

# 【凪】
# display as 凪
# JP: 「むぅぅ～にーさん、人が変わったようばい」
1511 = "「嗚～大哥哥簡直像換了個人哎」" 

# 【ふかみ】
# display as 深美
# JP: 「さすがです！\n本来の実力発揮、ですね」
1553 = "「好厲害！這是發揮了原本的實力吧，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さてどうだか。途中経過がたとえ良くとも、\n仕上がりが悪くては意味が無いしな」
1800 = "「這個可很難說啊。就算前面做得再好，收尾若是沒收好也沒有意義不是」" 

# monologue
# JP: 形が出来れば、蓑笠さんが預かって、\n一本一本、炉の火で炙って焼き入れをする。
2396 = "磨出形狀之後，便都交給蓑笠先生，由他一把一把上爐灼燒、淬火。" 

# monologue
# JP: 焼き入れをしたら今度はベルトサンダーで研ぎ、\n包丁の胴から刃になる境の部分、シノギをつけて――
2326 = "淬過火之後，就是上砂帶磨光機，在刀身上磨出刃所在的部分，也就是刀稜——" 

# 【凪】
# display as 凪
# JP: 「いよいよ仕上げの刃研ぎばい！\n研ぎなら、いっつも手伝うとるけんっ」
1738 = "「總算到收尾的磨刀刃的部分咧！打磨這工作咱可是一直在幫忙的」" 

# monologue
# JP: お手本と言わんばかりに、凪は砥石の前に座って、\n蛇口をひねり、ざかざか水をかけつづける。
2120 = "凪彷彿要給我們做示範一般徑直坐在磨刀石前，扭動龍頭，讓水淋在磨刀石上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。言うだけのことはある」
1467 = "「哦。還真是有模有樣嘛」" 

# monologue
# JP: 砥石にあたる刃の角度を常に一定にして、\n素早く前後に手を動かしてく。
2213 = "將刃與磨刀石之間的角度保持恆定，隨後雙手便迅速地開始前後滑動。" 

# 【ふかみ】
# display as 深美
# JP: 「ん……っと――こう、かな？」
1518 = "「嗯……這——是這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なかなかこれも難しいものだな」
1799 = "「這個也遠不像看起來那麼簡單啊」" 

# monologue
# JP: おんなじようにやっているつもりなのだが、音が違う。
2239 = "想著依葫蘆畫瓢，但磨出來的聲音卻全然不同。" 

# monologue
# JP: 凪のそれは、じゃっじゃと小気味良いものなのに、\n僕とふかみのは、ぞりっ、ぞりっ、と途切れるようだ。
2122 = "凪手下的聲音，是輕輕的“沙、沙”，聽起來就很舒爽。而我和深美這，則是“嘎吱嘎吱”又不連續的聲音。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「研ぎが済んだら、柄ばつけますけん」
1737 = "「磨好之後，就要裝柄嘍」" 

# monologue
# JP: 最後の仕上げは、やはり蓑笠さんの手だ。
2303 = "最後的點睛，果然還是要交給蓑笠先生。" 

# monologue
# JP: 歪みや何かを直したのだろうか、\n叩いて研いでを軽く加えて、それから白木の柄を取って。
2006 = "不知是不是在調整輕微的歪曲，他輕輕地又敲又磨，而後才伸手取過白木的刀柄。" 

# monologue
# JP: （コンコンコンコンっ）
2550 = "（咚咚咚咚）" 

# monologue
# JP: 刃先と逆側の突き出た部分を柄に差し込めば――
2261 = "把刀刃後面突出的部分插進刀柄——" 

# 【凪】
# display as 凪
# JP: 「出来た！　凪包丁第一号ばいっ！」
1572 = "「完成囉！凪刀一號做好囉！」" 

# 【ふかみ】
# display as 深美
# JP: 「わ……嬉しい。自分でつくった包丁なんて」
1455 = "「哇……好開心。是我自己做的菜刀耶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なかなかどうして、仕上がってみれば包丁だな」
1771 = "「費了這麼大力氣，做好一看還真是把菜刀啊」" 

# 【凪】
# display as 凪
# JP: 「あったり前ばい！　包丁作りしとったけんね」
1818 = "「那不是當然的嗎！做菜刀還能做成別的什麼啊」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「切れ味は、まぁ、こぎゃんもんです」
1741 = "「至於鋒利嘛，就是這樣嘍」" 

# monologue
# JP: 蓑笠さんは、トマトを３つ持ってくる。
2446 = "蓑笠先生拿來了三顆番茄。" 

# monologue
# JP: 試し切りかと思いはするが、\nあいにく、まな板が見当たらない。
2368 = "看來應該是讓我們試切了吧，但是左看右看卻沒有看到砧板。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「刃ぁ、上に向けてもらえますかねぇ」
1373 = "「來，把刀拿好，刃朝上」" 

# 【凪】
# display as 凪
# JP: 「刃ぁ上？　こぎゃんと？」
1401 = "「刃朝上？是這樣囉？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほい」
1533 = "「嘿吆」" 

# monologue
# JP: （ストンっ！）
2553 = "（唰、咚！）" 

# 【凪】
# display as 凪
# JP: 「わ！」
1456 = "「哇！」" 

# 【ふかみ】
# display as 深美
# JP: 「すごいっ」
1552 = "「好厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1470 = "「哦哦！」" 

# monologue
# JP: 刃を上に向け持っているだけ、全く動かしてない包丁に、\nトマトが真上から落とされて――
2141 = "刀只是靜靜地刃朝上端在原地不動，而從上面鬆手落下的番茄——" 

# monologue
# JP: それが綺麗に両断されれば、\n驚きの声を抑えられようはずもない。
2352 = "漂亮地被一分為二，這任誰都會不由地發出驚嘆吧。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほい、ほい」
1534 = "「嘿吆，嘿吆」" 

# monologue
# JP: （ストンっ！　ストンっ！）
2552 = "（唰、咚！唰、咚！）" 

# monologue
# JP: ふかみのと僕の包丁も、\nやはり見事な切れ味だ。
2330 = "深美和我的菜刀的鋒利程度看來也可圈可點。" 

# monologue
# JP: 凪包丁――と凪は言ったが、\nこれは確かに、名付けをしたい気持ちにもなる。
2113 = "凪刀——剛剛凪是這麼叫的吧？現在我可以理解她想為之取名字的心情了。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「水気があると錆びますけんね。\nそこだけは、気を使ってあげると良かですよ」
1743 = "「菜刀受潮的話會生鏽。只要平時多加注意，就可以安心使用啦」" 

# monologue
# JP: 包丁を箱に入れてもらって、包装までしてもらう。
2443 = "蓑笠先生又把菜刀裝進箱子，還細心地給我們包好。" 

# monologue
# JP: 手ぶらの凪が、鞄をもってるふかみにその箱を預けると、\n蓑笠さんはなにかを言いかけ、すぐいやいやと首を振る。
2398 = "空著手來的凪，把箱子交給帶著包的深美。而後不知蓑笠老人和她耳語了什麼，她手搖鼓似地搖起頭來。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「修学旅行のみなさんは、\n次はどちらに向かわれますかね」
1385 = "「修學旅行中的諸位，下一站是要去往哪裡咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええと……」
1797 = "「這個……」" 

# monologue
# JP: しおりを開いて確認してみる。\nと、見慣れすぎてる三文字が目に飛び込んでくる。
2259 = "打開手冊一看，熟悉到不能再熟悉的三個字躍入眼簾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田一――右田一酒造元さんです」
1429 = "「右田一——是右田一釀酒廠」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。あそこも面白かとこですねぇ。\n学園生さんなら、試飲ばできんのは残念でしょうが」
1503 = "「啊，那裡也很有趣的哦。不過諸位都是學生，很遺憾試飲怕是沒戲唱咯」" 

# 【凪】
# display as 凪
# JP: 「ラムネばあるけん！　大丈夫たい！」
1814 = "「還有彈珠汽水呢！沒問題嘞！」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとですか」
1683 = "「是那樣啊」" 

# monologue
# JP: 孫ではなくて、お客として――\n蓑笠さんは、凪を扱いつづけてくれる。
2362 = "現在，蓑笠先生並沒有當凪是孫女，而是完全當作客人對待。" 

# monologue
# JP: 僕も倣って、右田一では、一人の修学旅行生として、\n謙虚に学を修めよう。
2525 = "那我也同樣，以修學旅行的學生身份，前往右田一釀酒廠謙虛地學習吧。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「なら、気をつけて。\n楽しか旅行ば、送ってください」
1835 = "「那路上當心囉。祝你們旅行一路開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1523 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「どぎゃんしたと？　にーさん、\n食べ過ぎよったと？」
1607 = "「怎麼咧怎麼咧？大哥哥吃太飽了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1331 = "「不是——」" 

# monologue
# JP: 確かに、普段よりたくさん食べた。\nが、満腹感に苦しむというほどではない。
2394 = "確實是比平時吃得多了一點，不過要說撐得難受那還不至於。" 

# monologue
# JP: 川風が汗をさらりと乾かし、\n感じているのは、むしろ心地よい気だるさだ。
2321 = "河面吹來的風轉瞬就吹乾了汗水，這舒爽的感覺讓人不由地產生一絲慵懶的情緒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうではなく――\nそうではなく、だ」
1337 = "「不是那樣——倒不是那樣啦」" 

# monologue
# JP: ……どうにも、なにか、いつもとは違った感じだった。\n右田一酒造元での真闇姉が。
1071 = "……但就是覺得和以往有些不一樣。是右田一釀酒廠裡的真闇姐嗎。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;牽引のバーベキュー\x%l客車;#00ffc040;客車%l;#;では、ハチロクと、\n\x%l機関士;#00ffc040;機関士%l;#;を勤めてくれたポーレットと、助士の日々姫とが。
2521 = "還是由\\x%l8620;#00ffc040;８６２０%l;#;牽引的ＢＢＱ\\x%l客車;#00ffc040;客運車廂%l;#;那邊的八六，和擔任\\x%l機関士;#00ffc040;司機%l;#;的波萊特和擔任司爐的日日姬嗎。" 

# 【ふかみ】
# display as 深美
# JP: 「食べ過ぎじゃなくて……どうしましたか？」
1332 = "「不是吃太飽……那是怎麼了呢？」" 

# 【凪】
# display as 凪
# JP: 「にーさん、\nなんか喉に詰まったみたいな顔しとるよぉ？」
1542 = "「大哥哥，你這表情就好像有什麼東西卡在喉嚨裡一樣哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「詰まっている……か、\n確かに少し、詰まっているような感じはあるかな」
1408 = "「卡住……說來確實有那麼一點被卡住的感覺吧」" 

# monologue
# JP: 認めてしまえば、不思議と喉の通りがよくなる。\nするする、言葉を吐き出せる。
2208 = "如實承認後，喉嚨不可思議地感覺舒暢了，話說起來也通順了許多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みなが、なにかよそよそしかった気がしてな。\n無論、僕達を客として扱ってくれたのもあろうが……」
1367 = "「你們有沒有覺得，大家似乎和我們有點疏遠的感覺。當然，也許是和把我們當客人有關係啦……」" 

# monologue
# JP: 凪に対する蓑笠老人の接しかたは、\n客として扱いつつも、祖父の優しさに満ち満ちていた。
2036 = "但儘管蓑笠爺爺對凪是以接待客人的方式，但仍能感受到其中滿溢的溫柔。" 

# monologue
# JP: だが、真闇姉も、日々姫も、ハチロクも……\nそれになぜだか、ポーレットまで――
2043 = "但是，真闇姐、日日姬、還有八六……甚至不知為何，連波萊特也——" 

# 【双鉄】
# display as 雙鐵
# JP: 「遠慮というか、\n積極的に関わろうとしてこないというか」
1753 = "「該說是猶豫嗎，反正就是不想積極地和我們扯上關係的感覺吧」" 

# 【ふかみ】
# display as 深美
# JP: 「あっ……」
1486 = "「啊……」" 

# monologue
# JP: こころあたるところがあるのか、\nふかみは一瞬息を詰め、そしてポポポと赤くなる。
2009 = "不知是不是想到了其中原委，深美一時摒住了呼吸，而後臉唰地紅了。" 

# monologue
# JP: 凪もふかみの様子を目にし、納得顔して頷いている。
2134 = "凪看著深美的樣子，也滿臉認同地點著頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ふたりにはわかるのか？」
1610 = "「怎麼，你們兩個知道是怎麼回事嗎？」" 

# 【凪】
# display as 凪
# JP: 「そりゃ……わかるばい」
1801 = "「這個嘛……算是吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「？」
1850 = "「？」" 

# monologue
# JP: 夕陽の反射かと思ったが――\n凪の顔まで、わずかに赤らんでいるようだ。
2500 = "起初還以為是夕陽餘暉的反射——認真看，凪的臉上似乎也飄起了一絲紅暈。" 

