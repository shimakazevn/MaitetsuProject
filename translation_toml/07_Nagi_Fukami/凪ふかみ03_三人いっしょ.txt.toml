# JP: わかると言って、けれどもその先をつづけてくれず、\n凪は視線を、ふかみの上へと移してしまう。
2197 = "她們嘴上說知道，但卻不繼續說下去，凪的視線也飄向了深美那邊。" 

# 【ふかみ】
# display as 深美
# JP: 「今日一日……\nわたしたちと過ごして、どう――でした？」
1358 = "「今天這一天……和我們兩個在一起，過得——怎麼樣呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは――」
1609 = "「怎麼樣，是指——」" 

# 【凪】
# display as 凪
# JP: 「いろいろあるばい。いろいろ。\n楽しかとか、ムカついたとか、退屈したとか」
1795 = "「這一天這麼多事不是，這麼多事。開不開心，生不生氣，無不無聊之類」" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しかったぞ、単純に」
1509 = "「單純就是覺得很開心啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1491 = "「啊」" 

# monologue
# JP: ふかみの顔が安堵に緩む。\n凪も満足気な表情になり、またうんうんと何度も頷く。
2339 = "深美的表情放鬆了下來，轉為了安心。凪的表情也透出了一絲滿足，同時不住點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しかったし……あとは、そうだな。\n普段と違い、いろいろな顔を見たような気がする」
1595 = "「很開心……還有就是，對了，感覺見到了很多和平常不太一樣的面孔」" 

# 【ふかみ】
# display as 深美
# JP: 「いろいろな顔……ですか？」
1591 = "「很多面孔……嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。顔というか、表情かな。人の表情の移り変わりが、\nいつもより、ずっと良く見えたような気がする」
1520 = "「嗯。不過應該說是表情更合適吧。人的表情變化，感覺比平時看到的，來得更細緻一些的感覺」" 

# monologue
# JP: みんなの、あるいは蓑笠老人のこともそうだが……\n他の誰より、凪とふかみだ。
2193 = "大家的，要說的話蓑笠爺爺的也應該算進來……不過比起別人，凪和深美最明顯。" 

# monologue
# JP: 凪なら元気一辺倒で、ふかみは常に慎重で。\nそのイメージとまるでことなる姿も見れた。
2126 = "凪無論何時都是精神抖擻，深美則總是慎重謹慎。今天所見與這樣的印象顯然完全不同。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、修学旅行だったよ。\nいろいろなことを、学べた気がする」
1089 = "「……的確是修學旅行啊。感覺真的是學到了好多東西」" 

# 【ふかみ】
# display as 深美
# JP: 「だったら――」
1663 = "「既然這樣——」" 

# monologue
# JP: ふかみはぎゅうっと目を閉じ、うつむき。\nそれからゆっくり、その顔と瞳とを持ち上げなおす。
2343 = "深美緊緊閉上了眼睛低下了頭。而後緩緩地仰起面孔看著我。" 

# 【ふかみ】
# display as 深美
# JP: 「だったら、つづけてみませんか？\nあのっ――これからも――私達と、修学旅行」
1664 = "「既然這樣，我們可以繼續下去嗎？這個——之後也和我們一起——修學旅行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1482 = "「唔？」" 

# monologue
# JP: 続ける、というと――
2410 = "繼續，難道是說——" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、枕投げなどか？\nそれは確かに楽しそうだが……」
1695 = "「比如說，在旅館丟枕頭嗎？那個倒也確實是挺開心的啦……」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、いえ！　そうじゃなくって！\nそれもすごく、やってみたいし楽しそうですけどっ」
1495 = "「啊，不是的！不是說那個！雖然那個也確實是很開心我們也很想做啦，不過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
1339 = "「不過？」" 

# 【ふかみ】
# display as 深美
# JP: 「あの――ええと――ええと、ですねっ！」
1796 = "「這個——呃——嗚，就是說！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1848 = "「！」" 

# monologue
# JP: 僕を見る、ふかみの瞳に目を奪われる。\n強い決意が――ふかみを大人びさせている。
2253 = "我被深美看著我的那雙眼睛深深吸引住了。她眼中閃現的強烈決心，讓她顯得成熟了許多。" 

# monologue
# JP: 夕陽の赤に鮮やかなほど照らしだされて、\nその黒髪が、陰影の強調された顔がただ美しい。
2181 = "因羞怯而漲紅的臉蛋如同夕陽一般，而她的黑髮帶來的光影感讓這面孔顯得更加迷人。" 

# 【ふかみ】
# display as 深美
# JP: 「わたし、達。双鉄さんのことが……好き、なんです」
1615 = "「我……們，都喜歡……雙鐵先生」" 

# 【凪】
# display as 凪
# JP: 「わ、わたしたち言うのは、\nふかみちゃんと、ウチとのことばい」
1445 = "「咱、咱們其實就是說，小深和咱啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1083 = "「……嗯」" 

# monologue
# JP: 凪が、真っ赤になっている。\nいつもの元気さをすっかり消した、神妙で、不安げな顔。
2132 = "凪的面龐也同樣紅透了。平常的精神勁竟完全不見了蹤影，取而代之的是些許的不安。" 

# monologue
# JP: 少年のような普段の姿と打って変わって……\nその快活さの裏に隠れる、少女らしい儚さを見せている。
2428 = "與平常的少年一樣的印象截然不同……這是平素隱藏在開朗外表之下的，縹緲的少女心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……ありがとう」
1798 = "「這個……謝謝你們」" 

# monologue
# JP: さすがの僕も、この“好き”が、\nニンジンや子猫に対する“好き”とは違うものと感じる。
2217 = "就算我再愚鈍，也聽得出這個“喜歡”和對胡蘿蔔或者小貓的“喜歡”是兩碼事。" 

# monologue
# JP: だからといって、どんな“好き”かと断定できるほど……\nなんというか、強い確信は持てないでいる。
2044 = "但話雖如此，這個“喜歡”到底是怎樣的含義……我還是不太有可以斷言的信心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\n好きといってもらえることは、とても嬉しい」
1758 = "「謝謝你們。聽到你們說喜歡我，我真的很開心」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
1485 = "「啊——」" 

# monologue
# JP: なぜなのか、\nふかみの瞳の決意が、揺れる。
2010 = "不知為何，深美眼中的映出的決心，動搖了。" 

# monologue
# JP: それでもふかみは、止めることなく言葉を続ける。
2037 = "但即便如此，深美口中的話語並沒有停下來。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、ですね？　双鉄さんには――\nそんなにギュウって……我慢しないで、欲しいんです」
1643 = "「所以……說，希望雙鐵先生，可以不要再那樣，勉強自己……忍耐了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「我慢――」
1602 = "「忍耐——」" 

# monologue
# JP: ふかみの目を見て、凪の目を見る。
2249 = "我的目光從深美和凪的眼睛上掃過。" 

# monologue
# JP: 不安げにうるみ、落ち着かず。\nけれどもとても、温かな目を。
2388 = "眼角有些濕潤，眼中閃爍著不安，但目光卻仍是無比溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「我慢……したから、\n僕は、留年生になったのか？」
1536 = "「因為……忍耐，所以我才成了留級生嗎？」" 

# monologue
# JP: その目に照らされ、僕の心の、\nなにか固いものがわずかにゆるむ。
2187 = "在這目光的映照下，我心中某個堅硬的地方，似乎有所鬆動。" 

# monologue
# JP: 理解が、芽吹き始めた気がする。
2364 = "理解似乎在悄然萌芽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、『泣いたり笑ったり』で、\nだから、『修学旅行』だったのか？」
1647 = "「所以才說要我“會哭會笑”，所以才和我“修學旅行”嗎？」" 

# 【凪】
# display as 凪
# JP: 「そうばい。にーさんは……\nそこんところは、勉強、しそこなってるけん」
1424 = "「可不是唄。大哥哥……這些東西，都沒能好好學會啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1671 = "「是啊」" 

# monologue
# JP: ようやく、自覚が湧いてくる。
2407 = "終於，我理解了這其中的關係。" 

# monologue
# JP: その程度には、積み残っていた経験を、\n凪とふかみに、取り戻させてもらえたのだろう。
2118 = "凪和深美之所以做到這一步，是為了彌補了我人生中缺失的那些經歷吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1412 = "「原來如此啊」" 

# monologue
# JP: 凪やふかみが過ごしている\nキラキラと輝いた、生きる喜びに満ちてる時間。
2427 = "與凪和深美一同度過的，閃爍著光芒，充滿了活著的喜悅的這些時光。" 

# monologue
# JP: そうも過ごせたはずの時期を、\nけれども僕は、ただ、死なないだけで生きていた。
2247 = "我本應如此度過的時期，卻只是行屍走肉一般渾渾噩噩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても、とても大事なものを。\n僕は勉強、しそこねたのか――」
1641 = "「我錯過了很多非常、非常重要的事情啊——」" 

# 【凪】
# display as 凪
# JP: 「しそこねてなんかなか！\nこれからするため、きっと、とっといただけやけん」
1839 = "「錯過了又怎麼樣咧！之後馬上要重新學不是，肯定很快就能補上的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1493 = "「啊！」" 

# monologue
# JP: 凪の一言が示してくれる。\nその時期に戻って、やりなおすことは出来ずとも。
2109 = "凪一語點醒夢中人。即便時光無法倒流，不能重新來過——" 

# monologue
# JP: 今、この場所から新たに学ぶ、\nそうした時なら、いくらでも重ねていけるのだと。
2040 = "但只要現在，在這裡從頭學起的話，就還會有無數的時光可以經歷。" 

# 【ふかみ】
# display as 深美
# JP: 「ですからっ――」
1649 = "「所以說——」" 

# monologue
# JP: ふかみの声に促されるように、凪が立つ。\n船上、ふたりが並ぶ姿を、初めて目にする。
2227 = "彷彿聽到深美開口催促一般，凪站了起來。我還是第一次看到她們兩個在船上並肩而立。" 

# 【ふかみ】
# display as 深美
# JP: 「修学旅行、続けたいんです。\n双鉄さんと、凪ちゃんとわたしと、三人で」
1621 = "「我們還想繼續下去，雙鐵先生、小凪和我，我們三個人的修學旅行」" 

# 【凪】
# display as 凪
# JP: 「にーさんのこと、好いとーよ」
1447 = "「咱真的好喜歡大哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1523 = "「嗯」" 

# monologue
# JP: 一緒に学び、一緒に大人になっていく。\n積み損なってしまった時間を、凪とふかみと重ねてく。
1996 = "一同學習，一同成為大人。錯過的那段時光，與凪和深美重新經歷便是。" 

# monologue
# JP: どう考えてもそれは楽しく嬉しいことで。\nだが――だからこそ即答できない。
2231 = "怎麼想這都是件開心高興的事情。然而——正因如此，才不能立即決斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……嬉しいが、少しだけ考えさせてくれ。\n即答、できることではない」
1087 = "「……我很高興，不過還希望能讓我考慮一下。我沒辦法馬上回答」" 

# 【凪】
# display as 凪
# JP: 「即答できないって――どうしてばいっ！？」
1706 = "「沒辦法馬上回答算怎麼回事呀！？」" 

# 【ふかみ】
# display as 深美
# JP: 「年の差ですか？　\nそれとも、凪ちゃんとわたしと、三人だからですか？」
1675 = "「是因為年齡差嗎？還是說，因為我們是三個人？」" 

# 【凪】
# display as 凪
# JP: 「だってにーさん、言ってくれたばい！\nふかみちゃんとウチとケンカしとったら落ち着かんって」
1425 = "「可大哥哥你不是說過嘛！看到小深和咱鬧了彆扭就怎麼都安不下心來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1523 = "「嗯」" 

# monologue
# JP: 相槌一つで、凪とふかみの表情が激しく揺れる。
2406 = "簡短的回答，凪和深美的表情卻為此變得扭曲。" 

# monologue
# JP: どうとでも取れてしまうとそれで気づいて、\n急ぎ、丁寧に言葉を継ぎ足す。
2240 = "意識到這話可能被她們聽成我完全不在乎，我趕忙繼續開口解釋安撫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「年のことも、三人のことも、確かにある。\nが、それは大きな問題ではない」
1588 = "「年齡和三個人的問題確實都有關係。不過，都不是最主要的問題」" 

# 【ふかみ】
# display as 深美
# JP: 「え？」
1439 = "「咦？」" 

# 【凪】
# display as 凪
# JP: 「ほんなら――」
1822 = "「那到底——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は養子で、右田に大恩あるものだ」
1633 = "「我是養子，右田家於我有再造之恩」" 

# monologue
# JP: 言って――\nだからなのかもしれないと不意に、思い当たる。
2490 = "說到這裡——或許正因提到這事，很多事都一下子明白了。" 

# monologue
# JP: この罪悪感があったから、今日僕は――僕の方が――\n真闇姉と日々姫とに、ギクシャクしたものを感じたのかと。
2313 = "正因為有著這種罪惡感，今天我才能從我的角度，察覺到和真闇姐還有日日姬之間那似有似無的摩擦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「我慢、というがそれだけではない。\n単なる我慢を、僕は、重ねてきたのではないのだ」
1756 = "「說是忍耐，其實也並不只是這樣。只是忍耐，並不會讓我變成現在這個樣子」" 

# monologue
# JP: 義務で縛ってもらえなければ、僕はとっくに腐ってた。\n義務をこなして来たことが、僕を前向きに生かしてくれた。
2432 = "若不是被義務束縛著的話，我的內心怕是早已腐朽崩塌。正因為身負著這份義務，我才能著眼前方一路走來。" 

# monologue
# JP: それは事実で――\n僕は、そのことに感謝している。
2517 = "這是無可爭辯的事實——所以我對此也是心懷感激。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだけではないから、考えたいのだ。\n大事なことだと思うから。時間をかけて、慎重に――」
1694 = "「正因為不僅僅是這樣，所以更希望可以深思熟慮。如此重要的事，希望可以給我些時間慎重考慮」" 

# 【日々姫】
# display as 日日姬
# JP: 「あれ？　にぃにぃ、帰ってきたと？」
1441 = "「咦？阿哥，你怎麼回來咧？」" 

# 【真闇】
# display as 真闇
# JP: 「なんねぇ。日帰りの修学旅行なんて」
1655 = "「整什麼呀，修學旅行怎麼還當天就回來啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。珍しいな、飲んでいるのか」
1472 = "「哦喲，在喝酒啊，真少見呀」" 

# monologue
# JP: 居間に、酒瓶。
2527 = "酒瓶散落在客廳裡。" 

# monologue
# JP: ハチロクだけはいつもの顔だが、\n真闇姉も日々姫も頬を心地よいピンクにしてる。
2163 = "只有八六還是平常的樣子，真闇姐和日日姬臉上都已染上了一抹緋紅。" 

# 【日々姫】
# display as 日日姬
# JP: 「飲むとよ、そりゃあ。涙酒で、祝い酒やけん」
1809 = "「這酒不喝哪行啊。這是淚酒做喜酒啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「涙酒の祝い酒？」
1716 = "「淚酒做喜酒？」" 

# 【真闇】
# display as 真闇
# JP: 「それより双ちゃん、どぎゃんして帰ってきたと？\n発船所にお泊りいう話じゃなかったと？」
1752 = "「話說回來啊小雙，你怎麼回來了咧？不是說要在發船點過夜的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったか？」
1488 = "「啊……有這回事嗎？」" 

# monologue
# JP: しおりを開く。\nが――そうとは明記されてない。
2258 = "打開手冊——但裡面並未寫明這樣的安排。" 

# monologue
# JP: クマ川くだり体験の予定の終了後、\n“解散”と明記されてもいないけれども。
2533 = "雖然隈河漂流體驗的行程結束後，倒也確實沒有“解散”這樣的字眼就是了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうだったとしても泊まれんだろう。\n凪もふかみも、嫁入り前だ。妙な噂になってはいかん」
1751 = "「話是這麼說啦，但也不能就這麼住下啊。凪和深美都還沒出嫁，可不能搞出什麼流言蜚語來」" 

# 【ハチロク】
# display as 八六
# JP: 「妙な噂、でございますか」
1713 = "「流言蜚語……嗎」" 

# monologue
# JP: 言って、ボリン、と。\nハチロクは力強く石炭を噛み砕く。
2065 = "八六邊說，邊“喀嚓”一聲用力咬了一口煤炭。" 

# 【真闇】
# display as 真闇
# JP: 「珍しかとね。双ちゃんがそぎゃんかこつ気にするとか」
1732 = "「真難得哎，小雙居然會介意這樣的事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、うん――珍しいな。\n気にする……というか、せざるを得なくなってしまった」
1371 = "「你這麼說，嗯——或許還真是難得。會介意……不如說不介意也不行吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「なになにそれ、どぎゃん意味？」
1754 = "「說什麼呢說什麼呢，這算什麼意思啊？」" 

# monologue
# JP: 日々姫がグラスを差し出してくる。
2294 = "日日姬伸手遞給我杯子。" 

# monologue
# JP: 気が利くな――と一瞬思うが、\nすぐに違うなと首を振る。
2200 = "她真善解人意——這念頭剛冒出來，我就意識到不對，搖了搖頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちだけで結構だ。話すなら[しらふ,1]素面で話したい――\nというか、素面で話すべきことと思う」
1600 = "「心意我領了。有些話還是想清醒著說——或者說，我覺得就該清醒著說」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1075 = "「——嗯」" 

# monologue
# JP: 日々姫も自分のコップを置いて、\nまっすぐ、背筋を伸ばし直す。
2300 = "日日姬把自己的杯子也放下，同時挺直了腰板。" 

# monologue
# JP: 日々姫、真闇姉、そしてハチロク。\n３人とも――真剣な表情で僕を見つめる。
2292 = "日日姬、真闇姐、還有八六，三個人都滿臉認真地看著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「実は……好きだと、言ってもらえたのだ。\n凪とふかみと、二人に、僕が」
1393 = "「其實，凪和深美兩個人對我說她們兩個喜歡我」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー……」
# 1485 = "「啊——」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございましたか」
1681 = "「是這樣啊」" 

# monologue
# JP: 脱力したような、納得したようなそれぞれの声。
2324 = "洩氣和認同，傳入耳中的是兩種完全不同的聲音。" 

# monologue
# JP: 真闇姉はいつもと変わらぬにこにこ顔で、\n僕にゆっくりと問いかけてくる。
2381 = "真闇姐倒是和平常一樣，笑得不動聲色，悠然地開口問我。" 

# 【真闇】
# display as 真闇
# JP: 「好きって言われたっていうのは――\n恋人になってほしかって、お願いされたと？」
1755 = "「說喜歡你，是跟你告白，想和你成為戀人的意思嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、恋人とは言われなかった。\n望まれたのは……修学旅行を重ねたい、と」
1347 = "「也不是，完全沒提到戀人。只是說……想要和我繼續修學旅行」" 

# 【真闇】
# display as 真闇
# JP: 「二人から？　一緒に？」
1547 = "「她們兩個？一起？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうだ。三人一緒の修学旅行をだ」
1529 = "「嗯，沒錯。三個人一起繼續修學旅行」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
1492 = "「啊呀呀」" 

# monologue
# JP: かわいかねぇ、とささやいて、\n真闇姉は空のグラスを透かして僕を、じっと見る。
2379 = "真闇姐一邊在嘴裡念叨著“真可愛呀”，一邊透過舉起的空杯子看著我。" 

# 【真闇】
# display as 真闇
# JP: 「で？　双ちゃんはなんてお返事したと？」
1838 = "「那？小雙你怎麼回答人家的咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「考えたいと。待ってほしいと」
1612 = "「想考慮一下。讓她們等我的答覆」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん答えは、もう答えばい！\nにぃにが、速攻断らんとかー」
1370 = "「你這不算回答還要怎麼算回答咧！阿哥你這不就是當場拒絕嗎——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1486 = "「啊……」" 

# monologue
# JP: 日々姫の大声に背筋を打たれる。\nなるほど日々姫は、僕よりもよほど僕を知ってる。
2297 = "日日姬喊出的話猶如當頭棒喝。原來日日姬她比我更了解我自己啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな……僕は、そうしたいのだ。\nそうしたいのだが――」
1668 = "「是啊……我，其實也想。雖然想，可是——」" 

# 【真闇】
# display as 真闇
# JP: 「したかことなら、すれば良かとよ」
1659 = "「既然想的話，那還等什麼啊」" 

# monologue
# JP: ごくあっさりと言い切られる。
2382 = "真闇姐回答乾脆得毫無半點猶豫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし――僕は右田の」
1427 = "「可是——我是右田家的」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんは右田の長男。\nで、おねーちゃんのかわいい弟」
1673 = "「是啊，小雙是右田家的長子，也是姐姐最可愛的弟弟」" 

# monologue
# JP: 僕の言葉を、真闇姉は優しく塞いでくれる。
2385 = "真闇姐這番溫柔的話語堵得我啞口無言。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、双ちゃんが。\n弟が幸せになってくれたら、嬉しかけんね」
1570 = "「姐姐啊，就希望小雙，希望弟弟能幸福，那樣姐姐也會跟著開心的」" 

# monologue
# JP: 全てをわかったその上で、\n小さなことだと、まるめてしまう。
2214 = "對所有事情都瞭然於心，故而，能如此舉重若輕。" 

# 【日々姫】
# display as 日日姬
# JP: 「妹も！　妹もそうとよ！　おんなじたい！\nにぃにぃが幸せになったら、嬉しかとよ！」
1568 = "「妹妹也是！妹妹也是這麼認為的！阿哥能幸福我也會很開心的！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、もちろんのこと、\n常に、双鉄様の幸せを願うものです」
1636 = "「我自不必多言，雙鐵少爺的幸福，本就是我時刻掛念之事」" 

# monologue
# JP: 競うように日々姫は勢い込んで、\nふたりを横目に、ハチロクは品良く微笑する。
2296 = "日日姬像是憋著一股勁一樣看著另外的兩個人，而八六則是優雅地微笑著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉……日々姫……ハチロク」
1730 = "「真闇姐……日日姬……八六」" 

# monologue
# JP: 背中を、優しく押してもらえた。\n一歩を、自分から踏み出せるよう。
2198 = "她們在我身後，溫柔地推了一把，就為我能自己踏出那一步。" 

# monologue
# JP: どこでも行ける――\n思った瞬間、そうかと気づく。
2417 = "而在那一瞬間，我突然發現——腳下的路無限寬廣。" 

# monologue
# JP: （僕は……最初から、\n望めば、どこへだっていけたんだ）
2549 = "（只要我願意……其實從一開始，本就沒有什麼束縛在）" 

# monologue
# JP: 誰も、何も――\n僕を縛ったりしなかった。
2032 = "任何人、任何事——其實都未曾束縛過我。" 

# monologue
# JP: （義務を負わせてくれたのは、縛ろうとするからじゃない。\nそうしなければ、僕が崩れてしまったからだ）
2557 = "（給我義務這一負擔，並非是要以此束縛我，而是若非如此，我只怕早已崩潰，又哪有今時今日）" 

# monologue
# JP: 支えを、鎖を、解き放とうと――\n望まなかった望めなかった。そうすることが、怖かった。
2269 = "撤去支撐、解開枷鎖——我不曾希望也不敢希望，因為那曾經讓我無比恐懼。" 

# monologue
# JP: だけど、今なら自分で立てる。自分の意思で歩き出せる。\n凪とふかみが、僕に望みを、きっと与えてくれたから。
2355 = "然而，如今我已能自立，已能以自己的意識邁步前行。想必是因為凪與深美，在我心中重新點燃了希望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。行ってくる」
1759 = "「謝謝大家。我這就去」" 

# monologue
# JP: ならば、もう僕は立ち止まらない。\n行きたいところへ、ただまっすぐに歩いていこう。
2022 = "事已至此，我再不會駐足不前。唯有昂首挺胸，向著心中的目的地前進。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪、ふかみ。いるか、僕だ」
1396 = "「凪，深美，在嗎？是我」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　双鉄さんっ」
1481 = "「唉？雙鐵先生」" 

# 【凪】
# display as 凪
# JP: 「わ！　にーさん、泊まってくれると！？」
1458 = "「哇！大哥哥，要在這邊過夜嗎！？」" 

# 【ふかみ】
# display as 深美
# JP: 「わぁあ！\n凪ちゃん、まだ開けちゃだ――めぇぇ～～っ！？」
1460 = "「哇！小凪，現在還不能開——門！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行を続けたいと思ってやってきた」
1640 = "「我還想繼續修學旅行，就過來了」" 

# 【ふかみ】
# display as 深美
# JP: 「えっ」
1461 = "「哎」" 

# 【凪】
# display as 凪
# JP: 「それって、今日の続きばい？\nそれとも、これからずっと」
1829 = "「那是繼續今天的？還是說之後一直」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これからずっとを続けたい。\n凪とふかみと、三人で」
1344 = "「之後一直繼續下去。我和凪和深美，三個人」" 

# 【ふかみ】
# display as 深美
# JP: 「大歓迎ですっ！」
1721 = "「由衷歡迎！」" 

# 【凪】
# display as 凪
# JP: 「あっ！？　ふかみちゃん、ずるかばいっ！」
1494 = "「啊！？小深你好狡猾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1471 = "「哦喲！」" 

# monologue
# JP: 抱きついてくるふかみを、凪を、抱きとめる。\n気持ちは、多分、通じあってる。
2245 = "我抱住了撲過來的深美和凪。彼此的心意，應已相同無需多言。" 

# monologue
# JP: だけれどきっと、それじゃ足りない。\n言葉にしなきゃ、いつでも足りない。
2358 = "然而，這樣想必是不夠的。有些事，若不說出口，便總會有所缺憾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、それは。\n僕がふたりを好きだからだ」
1350 = "「也就是說，我，也喜歡你們兩個」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1485 = "「啊——」" 

# 【凪】
# display as 凪
# JP: 「ふっふーん」
1477 = "「哼哼」" 

# monologue
# JP: 抱きついたまま見上げてくる。
2060 = "兩人繼續抱著我，同時抬起頭。" 

# monologue
# JP: ふかみは少し驚いた顔、\n凪は照れたような笑顔を浮かべて。
2341 = "深美的表情有著些許的驚訝，而凪則是露出了嬌羞的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから一緒に学んでいきたい。御一夜のこと、\nこれからのこと、お互いのことを、出来るだけ」
1646 = "「所以我想和你們一起學習。學習御一夜，探索將來，了解彼此，越多越好」" 

# 【凪】
# display as 凪
# JP: 「なら、ずっとばい！　全部ばい！」
1825 = "「那就要永遠！全部！」" 

# 【ふかみ】
# display as 深美
# JP: 「そうだね、凪ちゃん」
1666 = "「是呀，小凪」" 

# monologue
# JP: 言って、ふかみがクスっと笑う。
2491 = "說完，深美輕輕地笑了。" 

# monologue
# JP: 笑ったままで、凪の耳元へと口を寄せ――
2523 = "邊笑著，邊把嘴湊到了凪的耳邊——" 

# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～」
1851 = "「～～～～～～～～～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ずるいぞ。\n僕らは、一緒に学ぶのだろう？」
1506 = "「喂喂，你們好狡猾，說好要一起學習的不是？」" 

# monologue
# JP: 話を、聞きたい。\n思えば自然と僕の耳も凪の耳元へ――
2243 = "我也想聽深美的悄悄話，於是自然地把耳朵湊了過去——" 

# 【ふかみ】
# display as 凪＆深美
# JP: 『（ちゅっ！）\n（ちゅっ！）』
1858 = "『（啾！）（啾！）』" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1849 = "「！！？」" 

# monologue
# JP: なまあたたかな、やわらかな。\n右と左と。凪とふかみと。
2350 = "溫暖的，柔軟的，凪和深美左右一起親在了我的臉上。" 

# 【凪】
# display as 凪
# JP: 「えっへっへー、にーさん、嬉しかと？」
1465 = "「哎嘿嘿，大哥哥，開心嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「あの……公平にって、思って、それで」
1623 = "「我想……這樣公平，所以就」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。公平に――か」
1413 = "「原來如此，公平啊」" 

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！？」
1432 = "「呀！？」" 

# 【凪】
# display as 凪
# JP: 「わっ！」
# 1456 = "「哇！」" 

# monologue
# JP: ふたり同時のファーストキスを、僕は受け止め。
2061 = "兩個人的初吻，親密無間地貼在了我臉上。" 

# monologue
# JP: お望み通り公平に、おもいっきりに抱きしめ返す！
2206 = "如兩人所願，我也公平地一起抱緊了她們！" 
