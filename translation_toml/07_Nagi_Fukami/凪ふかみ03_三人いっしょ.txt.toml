[script]
# lines: 423 
# 【ふかみ】
# display as 深美
# JP: 「それで、その人とはどうなったんです？」
1658 = "「Vậy, với người đó thì sao rồi ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――」
1513 = "「Ừm——」"
# monologue
# JP: 問われるままに、自分の過去を話してく。
2279 = "Thuận theo câu hỏi, tôi kể về quá khứ của mình."
# monologue
# JP: 川下りの手伝いを終えた後にそうすることが、\nここ最近の、すっかり日課となってしまった。
2415 = "Việc làm như vậy sau khi kết thúc công việc phụ giúp chèo thuyền xuôi dòng, gần đây đã hoàn toàn trở thành thói quen hàng ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「レポートを写させてやって、それで終わりだ。\nお礼に食事をと言われたが、別に食には困ってないので」
1760 = "「Cho cậu ta chép báo cáo, rồi thôi. Cậu ta bảo muốn mời bữa ăn để cảm ơn, nhưng tôi cũng chẳng thiếu ăn nên từ chối」"
# 【凪】
# display as 凪
# JP: 「断ったと？」
1653 = "「Anh từ chối rồi á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。さほど大したレポートでもなかったしな」
1669 = "「Ừ. Cũng chẳng phải báo cáo to tát gì」"
# 【凪】
# display as 凪
# JP: 「うーーーーん」
1512 = "「Ưm————」"
# monologue
# JP: 凪が大げさに首を傾げる。\nふかみもひどく、困ったような顔をしている。
2130 = "Nagi nghiêng đầu một cách khoa trương. Fukami cũng lộ vẻ mặt rất khó xử."
# 【凪】
# display as 凪
# JP: 「そぎゃん付き合い悪くて良く、\nにーさん、友達できたとね」
1742 = "「Giao tiếp kém thế mà, anh hai vẫn kết bạn được nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ！？」
1575 = "「Khoan, Nagi!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、向こうも慣れ合うのを好まぬ性質だしな。\nタイプが似ていて、得意分野が違う故だろう」
1095 = "「...Thì, bên kia cũng không thuộc tuýp thích thân thiết mà. Chắc là do tính cách giống nhau, nhưng lĩnh vực sở trường lại khác nhau」"
# monologue
# JP: 言った瞬間、ふと思う。
2146 = "Khoảnh khắc nói ra, tôi chợt nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　するとむしろ、利害で繋がっているのかな。\n向こうが友達だというので、僕もそうだと思っていたが」
1532 = "「Ưm? Vậy ra là gắn kết với nhau vì lợi ích sao. Bên kia bảo là bạn bè, nên tôi cũng nghĩ vậy thôi」"
# 【ふかみ】
# display as 深美
# JP: 「えとっ、あの。\nお話聞いてると利害だけとかじゃなさそうかなって」
1803 = "「Ờm, dạ. Nghe chuyện thì có vẻ không chỉ là lợi ích đâu ạ」"
# 【凪】
# display as 凪
# JP: 「きっかけなんて何がどーでも、関係なかとよ。\n友達だと思ってるなら、友達ばい」
1545 = "「Cơ duyên thế nào cũng chẳng quan trọng đâu. Chỉ cần nghĩ là bạn bè, thì là bạn bè thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1808 = "「Vậy sao」"
# monologue
# JP: 凪とふかみの言葉にひどく、ほっとする。
2421 = "Nghe những lời của Nagi và Fukami, tôi cảm thấy vô cùng nhẹ nhõm."
# monologue
# JP: 友人などいてもいずとも、\n大した違いもなかろうと思っていたのだが――
2305 = "Dù có bạn bè hay không, tôi vốn nghĩ cũng chẳng khác biệt gì lớn——"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕には、\n帝大に、少なくとも一人は友達がいる」
1810 = "「Nếu vậy thì, ít nhất tôi cũng có một người bạn ở Đại học Đế quốc」"
# 【ふかみ】
# display as 深美
# JP: 「っていうことはですね？」
1349 = "「Nói vậy có nghĩa là?」"
# monologue
# JP: 几帳面につけていたメモ帳のページを繰りながら、\nふかみは再び、困ったような顔になる。
2345 = "Vừa lật giở những trang sổ tay được ghi chép cẩn thận, Fukami lại lộ vẻ bối rối."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんの友達関係は、小さな頃にはたくさん。\nええと……それからしばらく居なくて。帝大で一人、で」
1844 = "「Mối quan hệ bạn bè của anh Soutetsu, lúc nhỏ thì có rất nhiều. Ờm... sau đó một thời gian thì không có ai. Rồi lên Đại học Đế quốc thì có một người」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それで間違いない」
1490 = "「Ừ. Đúng là vậy」"
# monologue
# JP: それから、と、ふかみはボカして言ってくれたが……\nあの事故以来、確かに僕は変わったのだなと、改めて思う。
2347 = "Fukami đã nói giảm nói tránh đi, nhưng... Tôi chợt nhận ra, kể từ vụ tai nạn đó, quả thực tôi đã thay đổi."
# monologue
# JP: 友人の数とは――言い換えるなら、\n積極的に人と関ろうとする意欲の表れであるのだろうし。
2469 = "Số lượng bạn bè——nói cách khác, có lẽ là biểu hiện của việc muốn chủ động giao tiếp với mọi người."
# 【ふかみ】
# display as 深美
# JP: 「間違いないなら……ええと、凪ちゃん」
1747 = "「Nếu không sai thì... ờm, Nagi」"
# 【凪】
# display as 凪
# JP: 「なんね？　ふかみちゃん」
1608 = "「Sao vậy? Fukami」"
# monologue
# JP: 二人おでこをくっつけあって、\nひそひそ相談しはじめる。
2062 = "Hai đứa cụng trán vào nhau, bắt đầu thì thầm to nhỏ."
# monologue
# JP: おーおーと、凪は何度も納得したような声を出し。\nややあって、僕へと振り返り胸を張る。
1066 = "Ồ, ồ, Nagi liên tục phát ra âm thanh như đã hiểu ra vấn đề. Một lúc sau, em ấy quay lại nhìn tôi, ưỡn ngực tự hào."
# 【凪】
# display as 凪
# JP: 「わかったと！\nこれで大体見えてきたばい！！」
1449 = "「Em hiểu rồi! Đại khái là nhìn ra vấn đề rồi đấy!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、何がだ？」
1476 = "「Ồ, cái gì cơ?」"
# 【凪】
# display as 凪
# JP: 「何って、にーさんを\n泣いたり笑ったり怒ったりできるようにする方法たい」
1353 = "「Là cách để làm cho anh hai biết khóc, biết cười, biết giận đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。そういえばそういう話だったな」
1097 = "「...Vậy sao. Nhắc mới nhớ, nãy giờ đang nói chuyện đó nhỉ」"
# monologue
# JP: 質問項目があまりに多く、期間が長く、\n問われ答えることが半ば習慣化していたが――
2461 = "Số lượng câu hỏi quá nhiều, thời gian lại dài, việc hỏi và đáp đã trở thành một nửa thói quen rồi——"
# monologue
# JP: 答え始めたきっかけは、『そうするために知りたい』と、\n二人にせがまれたことだった。
2467 = "Lý do tôi bắt đầu trả lời là vì hai đứa nài nỉ: 『Muốn biết để làm điều đó』."
# 【双鉄】
# display as 雙鐵
# JP: 「で？　具体的にはどんな方法を？」
1652 = "「Rồi sao? Cụ thể là cách gì?」"
# 【凪】
# display as 凪
# JP: 「それは！　しゅ、うがっ！？　――もごもご～」
1823 = "「Đó là! Chuy... ư!? ——Ưm ưm~」"
# 【ふかみ】
# display as 深美
# JP: 「あの、もうちょっとナイショでいいですか？\nええと、うまく出来るかわかりませんし」
1805 = "「Dạ, giữ bí mật thêm chút nữa được không ạ? Ờm, em cũng không biết có làm tốt được không nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「別に構わん。\nでは、うまく出来そうになったら教えてくれ」
1634 = "「Anh không bận tâm đâu. Vậy, khi nào thấy có vẻ ổn thì nói cho anh biết nhé」"
# 【ふかみ】
# display as 深美
# JP: 「はい、もちろんです！」
1563 = "「Vâng, tất nhiên rồi ạ!」"
# 【凪】
# display as 凪
# JP: 「ぷはあっ、もちろんばいっ！」
1510 = "「Phù, tất nhiên rồi!」"
# monologue
# JP: ふかみも凪も、わくわくを、\n顔いっぱいに溢れさせてる。
2329 = "Cả Fukami và Nagi đều lộ rõ vẻ háo hức trên khuôn mặt."
# monologue
# JP: 何をどうしてもらえるものか、\nこんな笑顔を見せられたなら、少し楽しみになってくる。
2267 = "Dù là được làm gì đi nữa, nhìn thấy nụ cười này, tôi cũng thấy có chút mong chờ."
# 【双鉄】
# display as 雙鐵
# JP: 「ではな。また明日」
1821 = "「Vậy nhé. Mai gặp lại」"
# 【ふかみ】
# display as 深美
# JP: 「はい！　\n双鉄さんも、夜のバーベキュー\\x%l列車;#00ffc040;列車%l;#;頑張ってください！」
1561 = "「Vâng! Anh Soutetsu cũng cố gắng với chuyến \\x%l列車;#00ffc040;tàu%l;#; BBQ tối nay nhé!」"
# 【凪】
# display as 凪
# JP: 「そのスキに、こっちもこっちでがんばっとくばーい！」
1774 = "「Nhân cơ hội đó, bọn em cũng sẽ cố gắng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……これは――日々姫の絵だな」
1096 = "「...Đây là——tranh của Hibiki nhỉ」"
# 【ふかみ】
# display as 深美
# JP: 「はい、お願いしたら喜んで引き受けてくれました」
1677 = "「Vâng, em nhờ là chị ấy vui vẻ nhận lời ngay」"
# 【凪】
# display as 凪
# JP: 「早く見るばい！　開けるばい！」
1603 = "「Mau xem đi! Mở ra đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1523 = "「Ừ」"
# monologue
# JP: せっつかれるまま、“御一夜スペシャル修学旅行！”と\n表紙書きされたしおりを開く。
2183 = "Bị hối thúc, tôi mở cuốn sổ tay có dòng chữ “Chuyến đi dã ngoại đặc biệt ở Ohito!” trên trang bìa."
# monologue
# JP: 中には細かな行程表と、\n旅行の諸注意が記されている。
2463 = "Bên trong ghi chi tiết lịch trình, và những lưu ý khi đi du lịch."
# 【双鉄】
# display as 雙鐵
# JP: 「これは……本当に修学旅行風だな」
1794 = "「Cái này... đúng phong cách dã ngoại thật đấy」"
# 【凪】
# display as 凪
# JP: 「“風”じゃなく、修学旅行ばい！　本物の」
1807 = "「Không phải \"phong cách\", mà là dã ngoại thật! Hàng thật giá thật đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1482 = "「Hửm?」"
# 【ふかみ】
# display as 深美
# JP: 「御一夜のことを改めて、双鉄さんとわたし達とで、\n勉強できる旅行にしたいなって」
1620 = "「Tụi em muốn cùng anh Soutetsu có một chuyến đi để tìm hiểu lại về Ohito ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。御一夜を学ぶ、“修学”旅行か」
1411 = "「Ra là vậy. Chuyến đi \"dã ngoại\" để tìm hiểu về Ohito sao」"
# 【凪】
# display as 凪
# JP: 「楽しみばい！」
1558 = "「Mong chờ quá đi!」"
# monologue
# JP: 凪はもう、\n頬のてっぺんをピンクにするほど盛り上がってる。
2127 = "Nagi phấn khích đến mức hai gò má ửng hồng."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばさしずめ、僕は引率教師の役割――」
1831 = "「Nếu vậy, vai trò của anh là giáo viên hướng dẫn——」"
# 【凪】
# display as 深美＆凪
# JP: 『「いいえっ」\n「違かとっ！」』
1854 = "『「Không phải ạ」 「Sai rồi!」』"
# monologue
# JP: 大きな声が揃い重なる。
2059 = "Hai giọng nói lớn đồng thanh vang lên."
# monologue
# JP: 凪とふかみは目を見交わして、\nふかみの方が、代表するように言葉をつなげる。
2119 = "Nagi và Fukami nhìn nhau, rồi Fukami thay mặt nói tiếp."
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんも、学園生です。引率なんて立場じゃなくって、\nわたしと凪ちゃんの同級生」
1843 = "「Anh Soutetsu cũng là học sinh mà. Không phải người hướng dẫn, mà là bạn cùng lớp với em và Nagi」"
# 【双鉄】
# display as 雙鐵
# JP: 「同級生。僕がか」
1619 = "「Bạn cùng lớp. Anh sao?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　にーさんは留年生ばい」
1582 = "「Đúng vậy! Anh hai là học sinh lưu ban mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「留年か」
1723 = "「Lưu ban sao」"
# monologue
# JP: 同級生と考えるなら、\n僕はいささか、老けすぎだろう。
2468 = "Nếu coi là bạn cùng lớp, thì tôi có hơi già quá rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「随分と落第を重ねてしまったのだな、僕は」
1639 = "「Anh bị rớt lại nhiều năm quá rồi nhỉ」"
# 【凪】
# display as 凪
# JP: 「仕方なかばい」
1806 = "「Hết cách rồi」"
# monologue
# JP: 軽口のつもりだったのに、凪は真顔で受け止める。
2307 = "Tôi chỉ định đùa thôi, thế mà Nagi lại đáp lại với vẻ mặt nghiêm túc."
# 【凪】
# display as 凪
# JP: 「にーさん、全然勉強しとらんもん」
1538 = "「Anh hai có chịu học hành gì đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……勉強だけは、随分としてきたつもりだが」
1346 = "「Không... anh nghĩ là anh đã học hành khá nhiều rồi đấy chứ」"
# 【凪】
# display as 凪
# JP: 「そぎゃん勉強のことじゃなくって」
1335 = "「Không phải học cái đó」"
# 【ふかみ】
# display as 深美
# JP: 「修学旅行！　修学旅行ですから！！\n自分でいろいろ発見するのも、きっと素敵な勉強です」
1386 = "「Chuyến đi dã ngoại! Là chuyến đi dã ngoại cơ mà!! Tự mình khám phá nhiều điều cũng là một bài học tuyệt vời đấy ạ」"
# 【凪】
# display as 凪
# JP: 「っ！」
1848 = "「!」"
# monologue
# JP: ふかみが割って入ってくれば、\n凪はハっとした顔をして、言葉を飲み込む。
2184 = "Fukami vừa xen vào, Nagi giật mình, nuốt lại những lời định nói."
# monologue
# JP: そしていきなり近寄ってきて、\nグイ、と力強く僕の手を引く。
2354 = "Rồi em ấy đột nhiên tiến lại gần, kéo tay tôi thật mạnh."
# 【凪】
# display as 凪
# JP: 「そうばい！　修学旅行ばい！\n楽しんでたくさん勉強するばいっ！」
1707 = "「Đúng vậy! Là chuyến đi dã ngoại! Cùng vui chơi và học hỏi thật nhiều nào!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1524 = "「Ừm!」"
# monologue
# JP: 御一夜について学ぶのは、\n工場誘致を撤回させるためにも必ず役に立つ。
2489 = "Việc tìm hiểu về Ohito, chắc chắn sẽ có ích cho việc rút lại lời mời gọi xây dựng nhà máy."
# monologue
# JP: 楽しめるかどうかは別として、\nせっかくの機会、僕も前向きに臨むとしよう。
2532 = "Chưa biết có vui hay không, nhưng cơ hội hiếm có thế này, tôi cũng nên đón nhận một cách tích cực."
# 【双鉄】
# display as 雙鐵
# JP: 「まず最初は――」
1836 = "「Đầu tiên là——」"
# 【凪】
# display as 凪
# JP: 「御一夜一の腕利き鍛冶屋！\n蓑笠鍛冶店さんからばいっ！！」
1580 = "「Lò rèn cừ khôi nhất Ohito! Bắt đầu từ lò rèn Minokasa!!」"
# 【凪】
# display as 凪
# JP: 「たのもーーーーっ！」
1847 = "「Xin làm phiềnnnnn!」"
# monologue
# JP: 修学旅行の学園生だ。\n“ただいま”と入っていくのはやはり違おう。
2365 = "Dù sao thì em ấy đang là học sinh đi dã ngoại mà. Nói \"Cháu về rồi đây\" rồi bước vào thì cũng kỳ."
# 【蓑笠】
# display as 蓑笠
# JP: 「はい、いらっしゃい」
1372 = "「Có ngay, chào mừng quý khách」"
# monologue
# JP: が、だからといってよりにもよっての\n『頼もう』を、蓑笠老人は柔和な笑顔で受け止める。
2150 = "Nhưng nói gì thì nói, lại dùng từ 『Xin làm phiền』, ông Minokasa vẫn đón nhận bằng một nụ cười hiền hậu."
# 【蓑笠】
# display as 蓑笠
# JP: 「いらっしゃい。修学旅行は、楽しかとですか？」
1692 = "「Chào mừng. Chuyến đi dã ngoại có vui không?」"
# monologue
# JP: ――蓑笠さんにも、話が通っているらしい。\nふかみはホっとした顔になり、弾むようにして頭を下げる。
1062 = "——Có vẻ như ông Minokasa cũng đã được báo trước. Fukami lộ vẻ mặt nhẹ nhõm, vui vẻ cúi đầu chào."
# 【ふかみ】
# display as 深美
# JP: 「ええと、楽しみたいって思ってます。\n今日は包丁づくり体験、よろしくお願いします」
1804 = "「Ờm, tụi cháu muốn được tận hưởng chuyến đi này ạ. Hôm nay mong ông giúp đỡ với trải nghiệm rèn dao ạ」"
# 【蓑笠】
# display as 蓑笠
# JP: 「はいはい。そんなら――」
1555 = "「Được rồi được rồi. Vậy thì——」"
# monologue
# JP: 蓑笠さんが僕ら三人それぞれに、子供が描いた絵のような\nおおざっぱに包丁めいた形をしている鋼板をくれる。
2448 = "Ông Minokasa đưa cho ba người chúng tôi mỗi người một tấm thép có hình dáng đại khái giống con dao như nét vẽ của trẻ con."
# 【蓑笠】
# display as 蓑笠
# JP: 「こん機械は、ベルトハンマーいうもんです」
1802 = "「Cái máy này, gọi là búa máy truyền động bằng dây đai」"
# monologue
# JP: 見たまんまの名前だ。
2373 = "Đúng là cái tên nhìn phát biết ngay."
# monologue
# JP: モーターが、ベルトのついてる歯車を回転させ、\nその動きが、ハンマーに連動するという機構にみえる。
2538 = "Động cơ làm quay bánh răng có gắn dây đai, chuyển động đó liên kết với búa đập, cơ chế có vẻ là vậy."
# 【蓑笠】
# display as 蓑笠
# JP: 「こいつば使って、仕上がりのイメージに伸ばして下さい。\nそいば削って、焼き入れして研いで、包丁にしますけん」
1391 = "「Dùng cái này để cán mỏng theo hình dáng thành phẩm nhé. Sau đó gọt giũa, ủ thép rồi mài, sẽ thành con dao thôi」"
# monologue
# JP: 蓑笠さんが機械の前に座りペダルを踏み込めば、\nガインガインと轟音をたて、ハンマーがピストン動作する。
2445 = "Ông Minokasa ngồi trước máy, đạp chân ga, âm thanh rầm rầm vang lên, búa đập hoạt động như pít-tông."
# monologue
# JP: その下にある鋼板は――\nなるほど、見る見る伸びていく。
2419 = "Tấm thép bên dưới đó—— Ra là vậy, đang dần mỏng ra thấy rõ."
# 【凪】
# display as 凪
# JP: 「一番にやるばい！」
1451 = "「Bổn cô nương làm đầu tiên!」"
# 【ふかみ】
# display as 深美
# JP: 「どうぞどうぞ」
1757 = "「Xin mời xin mời」"
# 【双鉄】
# display as 雙鐵
# JP: 「お手並み拝見させてもらおう」
1826 = "「Để xem tay nghề của em thế nào nào」"
# 【凪】
# display as 凪
# JP: 「ふふーん、見習うとよかばいよ！」
1479 = "「Hưhư, cứ học hỏi đi nhé!」"
# monologue
# JP: 凪がペダルを踏み込めば、\n蓑笠さんのときより数倍速くハンマーが落ちる。
2135 = "Nagi vừa đạp chân ga, búa đã giáng xuống nhanh gấp mấy lần lúc ông Minokasa làm."
# 【双鉄】
# display as 雙鐵
# JP: 「ちょっ！？　踏み込み過ぎだろう」
1811 = "「Khoan!? Em đạp mạnh quá rồi đấy」"
# 【凪】
# display as 凪
# JP: 「む、勢いをつけすぎたばい」
1474 = "「Ưm, có vẻ dùng sức hơi quá đà rồi」"
# monologue
# JP: 一転、今度はゴーーーン、ゴーーーン、と、\n除夜の鐘のごときのろのろペース。
2426 = "Đổi lại, lần này lại kêu keng——keng——, với nhịp độ chậm rì như tiếng chuông đêm giao thừa."
# monologue
# JP: どうにも調子が掴めないのか、\n凪はしきりに首を傾げて悪戦苦闘を見せている。
2367 = "Chắc là không nắm được nhịp độ, Nagi liên tục nghiêng đầu, có vẻ đang chật vật lắm."
# 【ふかみ】
# display as 深美
# JP: 「え？　ひょっとして凪ちゃん、経験ないの？」
1443 = "「Hả? Không lẽ Nagi chưa làm bao giờ sao?」"
# 【凪】
# display as 凪
# JP: 「なかばいよ！　初めてばい！！」
1705 = "「Làm gì có! Lần đầu tiên đấy!!」"
# monologue
# JP: 凪にフォローの手をいれながら、“そうなんですよ”と\n言わんばかりに、蓑笠老人も苦笑を浮かべる。
2451 = "Vừa giúp Nagi một tay, ông Minokasa vừa nở nụ cười khổ như thể muốn nói \"Đúng là vậy đó\"."
# 【凪】
# display as 凪
# JP: 「真剣は欲しかけど、\n包丁にはそれほど興味なかったけん」
1363 = "「Kiếm thật thì em muốn đấy, chứ dao bếp thì em không hứng thú lắm」"
# monologue
# JP: 興味なかった、と過去形で言う、\nその顔つきは集中している。
2202 = "Nói là không hứng thú ở thì quá khứ, nhưng vẻ mặt lại vô cùng tập trung."
# monologue
# JP: リズムをようやく掴めてきたのか、\nハンマーの落ちる音も一定になってきた。
2035 = "Chắc là cuối cùng cũng nắm được nhịp, tiếng búa đập cũng đã đều đặn hơn."
# monologue
# JP: （ゴインっ！　ゴインっ！　ゴインっ！　ゴインっ！）
2551 = "（Keng! Keng! Keng! Keng!）"
# monologue
# JP: 気持ちよさそげにハンマーを落とし、\n落としつづけて――ようやく、凪はペダルを離す。
2530 = "Để búa đập xuống một cách thoải mái, đập liên tục——cuối cùng, Nagi cũng nhả chân ga."
# 【凪】
# display as 凪
# JP: 「ん！　こぎゃんとで良かっ！！」
1526 = "「Ưm! Thế này là được rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「でかいな。そして、長い」
1557 = "「To thật. Lại còn dài nữa」"
# monologue
# JP: もとの鋼板は三徳包丁サイズなのだが、\n凪のはほとんど、刺身包丁のようになっている。
2154 = "Tấm thép ban đầu có kích cỡ của dao thái thịt, thế mà của Nagi giờ gần như thành dao thái sashimi rồi."
# monologue
# JP: 好きで、欲しいというだけあって、\n包丁にも、刀に近い形状を求めたのだろうか。
2309 = "Chắc là vì thích và muốn có, nên em ấy mới cố tạo hình cho con dao giống kiếm thật chăng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は最後にしてみたい。\nふかみ、先にいけるか？」
1625 = "「Anh muốn làm cuối cùng. Fukami, em lên trước được không?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、はい。双鉄さんがそれがいいなら」
1500 = "「A, vâng. Nếu anh Soutetsu muốn vậy」"
# monologue
# JP: ふかみがしずしず機械の前に腰かけたなら、\n否応なしに、凪との姿勢の大きな違いに気付かされる。
2335 = "Fukami từ tốn ngồi xuống trước máy, không thể không nhận ra sự khác biệt lớn về tư thế so với Nagi."
# monologue
# JP: 凪はどかっと、大股びらき。\n対してふかみは足を揃え気味に整えている。
2125 = "Nagi thì ngồi phịch xuống, dang rộng hai chân. Ngược lại, Fukami lại khép hờ hai chân ngay ngắn."
# 【ふかみ】
# display as 深美
# JP: 「ん……っと、これ――むつかしい。です」
1516 = "「Ưm... ừm, cái này——khó quá. Ạ」"
# monologue
# JP: 踏み込み方もまるで違う。\n慎重……というか、緊張モードだ。
2504 = "Cách đạp chân ga cũng hoàn toàn khác. Thận trọng... hay nói đúng hơn là đang ở chế độ căng thẳng."
# monologue
# JP: ハンマーまでもが、少し動いて様子を見て――と、\n引っ込み思案になってるようだ。
2011 = "Ngay cả búa đập cũng hơi nhúc nhích thăm dò—— có vẻ như nó cũng đang e dè."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、それじゃ、陽がくれるばい。\n予定先、まわりきれんよーになるばい」
1578 = "「Fukami ơi, thế thì mặt trời lặn mất. Không đi hết lịch trình dự kiến được đâu」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　あ、ごめんなさい」
1438 = "「Hả!? A, xin lỗi nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこは気にせず取り組んでくれ」
1704 = "「Không sao, em cứ mặc kệ mà làm đi」"
# monologue
# JP: これはこれで、見ていてなかなか面白くある。\nそれに――
2516 = "Cái này nhìn cũng thú vị phết. Hơn nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「無理に行程を追い、薄い思い出を重ねるよりも、\n一つだけでも濃い思い出がある方が楽しかろうしな」
1697 = "「Thay vì gượng ép chạy theo lịch trình, tích lũy những kỷ niệm nhạt nhòa, thì thà chỉ có một kỷ niệm sâu đậm còn vui hơn mà」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
1491 = "「A」"
# monologue
# JP: こくんと、頷き。
2337 = "Gật đầu cái rụp."
# monologue
# JP: ふかみの両肩がスっと下がって、\nペダルも、自然と踏み込まれていく。
2333 = "Hai vai Fukami chùng xuống, chân ga cũng được đạp một cách tự nhiên."
# monologue
# JP: （ガンっ！　ガンっ！　ガンっ！　ガンっ！）
2561 = "（Keng! Keng! Keng! Keng!）"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、良かとですねぇ」
1502 = "「Chà, được đấy chứ」"
# monologue
# JP: 蓑笠老人がそうつぶやくほど、\n力みの抜けたふかみの動作は、整っている。
2274 = "Động tác thả lỏng của Fukami nhịp nhàng đến mức, ông Minokasa phải lẩm bẩm khen ngợi."
# monologue
# JP: 鋼板を動かす指先も、整いながら滑らかで――
2265 = "Đầu ngón tay di chuyển tấm thép cũng đều đặn và mượt mà——"
# 【ふかみ】
# display as 深美
# JP: 「うん。こんな感じ。です」
1522 = "「Vâng. Cảm giác như thế này. Ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは綺麗だ。\nこの時点でもう、おおよそ包丁の形だな」
1594 = "「Đẹp đấy. Đến lúc này thì đã ra hình dáng con dao rồi」"
# 【ふかみ】
# display as 深美
# JP: 「えへへ、ありがとうございます」
1462 = "「Hehe, cảm ơn anh ạ」"
# 【凪】
# display as 凪
# JP: 「むぅ～、なんだか悔しかばい！」
1483 = "「Ưm~, sao cứ thấy không cam tâm nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、僕か」
1832 = "「Vậy, đến lượt anh nhỉ」"
# monologue
# JP: 凪とふかみを見せてもらって、\nなんとなくだが要領の見当がついた気がする。
2372 = "Nhìn Nagi và Fukami làm, tôi có cảm giác phần nào nắm được bí quyết rồi."
# monologue
# JP: とにかくペダルは力を入れず、一定に――
2537 = "Tóm lại là không dùng sức đạp chân ga, giữ nguyên một mức độ——"
# monologue
# JP: （ガンっ！　ガンっ！　ガンっ！）
2562 = "（Keng! Keng! Keng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「む――おっ！？」
1514 = "「Ưm——ồ!?」"
# monologue
# JP: これは……見るとやるとでは大違い。\nなかなかどうして難しい。
2515 = "Cái này... nhìn và làm khác hẳn nhau. Thực sự là khó đấy."
# 【凪】
# display as 凪
# JP: 「にーさん、ぶきっちょいねー、\nおんなじとこばっか叩いとるばい」
1540 = "「Anh hai vụng về quá nha, cứ đập mãi một chỗ kìa」"
# 【ふかみ】
# display as 深美
# JP: 「ちょっ！　凪ちゃんっ！！」
1507 = "「Khoan! Nagi!!」"
# monologue
# JP: ……前々から感じていたのだが、\nふかみのフォローは、フォローではなく追い打ちだ。
1070 = "...Từ trước tôi đã có cảm giác, Fukami không phải đang bênh vực, mà là đang bồi thêm một nhát."
# monologue
# JP: 僕の鋼板も追い打ち続きで、\nべろべろに広くなっていく。
2250 = "Tấm thép của tôi cũng bị đập liên tục, ngày càng mỏng và rộng ra."
# 【蓑笠】
# display as 蓑笠
# JP: 「こう――\nもう少しだけ、まんべんなくやると良かですな」
1340 = "「Thế này—— làm đều tay thêm chút nữa là được đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、助かります」
1497 = "「À, cảm ơn ông」"
# monologue
# JP: 見かねた蓑笠さんが手を添え動かしてくれたおかげで、\nなんとかかんとか、包丁の形は維持した、が――
2152 = "Nhờ ông Minokasa thấy vậy nên đã đưa tay ra giúp, nên tấm thép vẫn giữ được hình dáng con dao, nhưng——"
# monologue
# JP: （思わぬことで、体が止まってしまったな）
2555 = "（Vì chuyện không ngờ tới mà cơ thể lại khựng lại mất rồi）"
# monologue
# JP: 恐らく、体は怖がったのだ。\nあまりに間近に、鉄が叩かれ焼けていく、音と匂いに。
2237 = "Có lẽ, cơ thể tôi đã sợ hãi. Trước âm thanh và mùi vị của sắt bị đập và nung nóng ở khoảng cách quá gần."
# monologue
# JP: が、そう悟られては気を使わせる。\n慣れぬことだが、ウソのひとつもついてみよう。
2275 = "Nhưng nếu để họ nhận ra thì sẽ khiến họ bận tâm. Dù không quen, nhưng tôi cũng thử nói dối một câu xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。イメージ通りに出来た。\n右田の台所には、広刃の包丁がないのだ」
1528 = "「Ừm. Đúng như tôi tưởng tượng. Nhà bếp của Migita không có con dao bản rộng nào cả」"
# 【凪】
# display as 凪
# JP: 「それ、刃じゃなくて、胴がひらぺったいだけばい」
1816 = "「Cái đó đâu phải lưỡi dao, chỉ là phần thân bị dẹt ra thôi mà」"
# 【ふかみ】
# display as 深美
# JP: 「ちょっ、凪ちゃん！」
1508 = "「Khoan, Nagi!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「包丁の価値は、見栄えより切れ味ですけんねぇ。\n大事なのは、ここからですばい」
1746 = "「Giá trị của con dao nằm ở độ sắc bén hơn là vẻ bề ngoài mà. Quan trọng là từ bây giờ cơ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですよね」
1735 = "「Đúng vậy nhỉ」"
# monologue
# JP: 蓑笠さんがそういうのなら、\nここから先で、切れ味は挽回できるのだろう。
2278 = "Nếu ông Minokasa đã nói vậy, thì từ giờ trở đi chắc có thể gỡ gạc lại bằng độ sắc bén."
# monologue
# JP: 今度の機械は、回転水砥石。\n水に浸かりつつ回転する、大きな大きな丸砥石だ。
2519 = "Cái máy lần này là đá mài nước xoay. Một viên đá mài tròn cực lớn, vừa ngâm trong nước vừa xoay."
# 【凪】
# display as 凪
# JP: 「おもしろそうばい！　いちばーんっ！」
1728 = "「Có vẻ thú vị đây! Em số mộttttt!」"
# 【ふかみ】
# display as 深美
# JP: 「わ――これ……結構……あれ、れ？」
1453 = "「Oa——cái này... khá là... ủa, ủa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「こう――かな？　ん――ふむ」
1680 = "「Thế này——sao? Ưm——hừm」"
# monologue
# JP: 今度は体がすんなり動く。\nすんなり動けば、さすがに年の功も示せる。
2520 = "Lần này cơ thể chuyển động trơn tru. Nếu đã trơn tru, thì quả nhiên kinh nghiệm sống cũng được thể hiện."
# monologue
# JP: 恐らく凪よりふかみより、\nこの工程は、質良くこなせているだろう。
2518 = "Có lẽ so với Nagi hay Fukami, công đoạn này tôi làm tốt hơn hẳn."
# 【凪】
# display as 凪
# JP: 「むぅぅ～にーさん、人が変わったようばい」
1511 = "「Ưm~ anh hai, cứ như biến thành người khác ấy」"
# 【ふかみ】
# display as 深美
# JP: 「さすがです！\n本来の実力発揮、ですね」
1553 = "「Đỉnh quá! Phát huy thực lực vốn có nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「さてどうだか。途中経過がたとえ良くとも、\n仕上がりが悪くては意味が無いしな」
1800 = "「Để xem thế nào đã. Dù quá trình có tốt, mà thành phẩm tệ thì cũng vô nghĩa」"
# monologue
# JP: 形が出来れば、蓑笠さんが預かって、\n一本一本、炉の火で炙って焼き入れをする。
2396 = "Khi đã ra hình, ông Minokasa sẽ nhận lấy, cho từng con một vào lò lửa nung để ủ thép."
# monologue
# JP: 焼き入れをしたら今度はベルトサンダーで研ぎ、\n包丁の胴から刃になる境の部分、シノギをつけて――
2326 = "Ủ thép xong, lần này sẽ mài bằng máy chà nhám vòng, tạo đường vát phân ranh giới giữa thân dao và lưỡi dao——"
# 【凪】
# display as 凪
# JP: 「いよいよ仕上げの刃研ぎばい！\n研ぎなら、いっつも手伝うとるけんっ」
1738 = "「Cuối cùng cũng đến phần mài lưỡi dao hoàn thiện! Mài thì em lúc nào cũng phụ giúp rồi」"
# monologue
# JP: お手本と言わんばかりに、凪は砥石の前に座って、\n蛇口をひねり、ざかざか水をかけつづける。
2120 = "Như thể muốn làm mẫu, Nagi ngồi trước đá mài, vặn vòi nước, xả nước ào ào liên tục."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。言うだけのことはある」
1467 = "「Ồ. Đúng như em nói nhỉ」"
# monologue
# JP: 砥石にあたる刃の角度を常に一定にして、\n素早く前後に手を動かしてく。
2213 = "Luôn giữ góc độ của lưỡi dao tiếp xúc với đá mài cố định, nhanh chóng di chuyển tay tới lui."
# 【ふかみ】
# display as 深美
# JP: 「ん……っと――こう、かな？」
1518 = "「Ưm... ừm——thế này, nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なかなかこれも難しいものだな」
1799 = "「Cái này cũng khó phết đấy」"
# monologue
# JP: おんなじようにやっているつもりなのだが、音が違う。
2239 = "Tôi định làm giống y hệt, nhưng âm thanh lại khác."
# monologue
# JP: 凪のそれは、じゃっじゃと小気味良いものなのに、\n僕とふかみのは、ぞりっ、ぞりっ、と途切れるようだ。
2122 = "Của Nagi nghe xoẹt xoẹt rất êm tai, còn của tôi và Fukami lại rèn rẹt, rèn rẹt, nghe như bị đứt quãng."
# 【蓑笠】
# display as 蓑笠
# JP: 「研ぎが済んだら、柄ばつけますけん」
1737 = "「Mài xong thì sẽ gắn cán dao vào」"
# monologue
# JP: 最後の仕上げは、やはり蓑笠さんの手だ。
2303 = "Bước hoàn thiện cuối cùng, quả nhiên vẫn là do tay ông Minokasa."
# monologue
# JP: 歪みや何かを直したのだろうか、\n叩いて研いでを軽く加えて、それから白木の柄を取って。
2006 = "Có lẽ ông đang chỉnh lại những chỗ bị cong vênh, gõ nhẹ rồi mài thêm một chút, sau đó lấy cán gỗ mộc ra."
# monologue
# JP: （コンコンコンコンっ）
2550 = "（Cộc cộc cộc cộc）"
# monologue
# JP: 刃先と逆側の突き出た部分を柄に差し込めば――
2261 = "Cắm phần chuôi nhô ra ở phía ngược lại của lưỡi dao vào cán——"
# 【凪】
# display as 凪
# JP: 「出来た！　凪包丁第一号ばいっ！」
1572 = "「Xong rồi! Dao Nagi số một đây!」"
# 【ふかみ】
# display as 深美
# JP: 「わ……嬉しい。自分でつくった包丁なんて」
1455 = "「Oa... vui quá. Con dao do chính tay mình làm ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「なかなかどうして、仕上がってみれば包丁だな」
1771 = "「Dù thế nào đi nữa, hoàn thiện xong thì cũng ra dáng con dao đấy」"
# 【凪】
# display as 凪
# JP: 「あったり前ばい！　包丁作りしとったけんね」
1818 = "「Đương nhiên rồi! Đang làm dao mà lị」"
# 【蓑笠】
# display as 蓑笠
# JP: 「切れ味は、まぁ、こぎゃんもんです」
1741 = "「Độ sắc bén thì, ừm, cũng cỡ này thôi」"
# monologue
# JP: 蓑笠さんは、トマトを３つ持ってくる。
2446 = "Ông Minokasa mang ra 3 quả cà chua."
# monologue
# JP: 試し切りかと思いはするが、\nあいにく、まな板が見当たらない。
2368 = "Tôi cứ nghĩ là để cắt thử, nhưng tiếc là không thấy thớt đâu."
# 【蓑笠】
# display as 蓑笠
# JP: 「刃ぁ、上に向けてもらえますかねぇ」
1373 = "「Hướng lưỡi dao lên trên nhé」"
# 【凪】
# display as 凪
# JP: 「刃ぁ上？　こぎゃんと？」
1401 = "「Lưỡi dao hướng lên trên? Thế này á?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ほい」
1533 = "「Hây」"
# monologue
# JP: （ストンっ！）
2553 = "（Phập!）"
# 【凪】
# display as 凪
# JP: 「わ！」
1456 = "「Oa!」"
# 【ふかみ】
# display as 深美
# JP: 「すごいっ」
1552 = "「Tuyệt quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1470 = "「Ồ ồ ồ!」"
# monologue
# JP: 刃を上に向け持っているだけ、全く動かしてない包丁に、\nトマトが真上から落とされて――
2141 = "Chỉ cầm con dao hướng lưỡi lên trên, hoàn toàn không di chuyển, quả cà chua được thả rơi ngay từ trên xuống——"
# monologue
# JP: それが綺麗に両断されれば、\n驚きの声を抑えられようはずもない。
2352 = "Nó bị cắt làm đôi một cách ngọt lịm, làm sao có thể kìm nén được tiếng thốt lên kinh ngạc chứ."
# 【蓑笠】
# display as 蓑笠
# JP: 「ほい、ほい」
1534 = "「Hây, hây」"
# monologue
# JP: （ストンっ！　ストンっ！）
2552 = "（Phập! Phập!）"
# monologue
# JP: ふかみのと僕の包丁も、\nやはり見事な切れ味だ。
2330 = "Dao của Fukami và tôi cũng vậy, quả nhiên là sắc bén tuyệt vời."
# monologue
# JP: 凪包丁――と凪は言ったが、\nこれは確かに、名付けをしたい気持ちにもなる。
2113 = "Dao Nagi——Nagi đã nói vậy, nhưng đúng là tôi cũng có cảm giác muốn đặt tên cho nó."
# 【蓑笠】
# display as 蓑笠
# JP: 「水気があると錆びますけんね。\nそこだけは、気を使ってあげると良かですよ」
1743 = "「Có hơi nước là sẽ bị gỉ sét đấy. Chỉ cần chú ý điểm đó là được rồi」"
# monologue
# JP: 包丁を箱に入れてもらって、包装までしてもらう。
2443 = "Chúng tôi được ông bỏ dao vào hộp, rồi gói lại đàng hoàng."
# monologue
# JP: 手ぶらの凪が、鞄をもってるふかみにその箱を預けると、\n蓑笠さんはなにかを言いかけ、すぐいやいやと首を振る。
2398 = "Khi Nagi đi tay không gửi hộp dao cho Fukami đang mang túi xách, ông Minokasa định nói gì đó, rồi lập tức lắc đầu nguầy nguậy."
# 【蓑笠】
# display as 蓑笠
# JP: 「修学旅行のみなさんは、\n次はどちらに向かわれますかね」
1385 = "「Mọi người đi dã ngoại, tiếp theo sẽ đi đâu thế」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええと……」
1797 = "「Ờm...」"
# monologue
# JP: しおりを開いて確認してみる。\nと、見慣れすぎてる三文字が目に飛び込んでくる。
2259 = "Tôi mở sổ tay ra xác nhận lại. Thì, ba chữ quá đỗi quen thuộc đập vào mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「右田一――右田一酒造元さんです」
1429 = "「Migitai——Là cơ sở nấu rượu Migitai ạ」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。あそこも面白かとこですねぇ。\n学園生さんなら、試飲ばできんのは残念でしょうが」
1503 = "「À. Chỗ đó cũng thú vị lắm. Nhưng là học sinh thì tiếc là không được uống thử rồi」"
# 【凪】
# display as 凪
# JP: 「ラムネばあるけん！　大丈夫たい！」
1814 = "「Có nước ngọt Ramune mà! Không sao đâu!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとですか」
1683 = "「Vậy sao」"
# monologue
# JP: 孫ではなくて、お客として――\n蓑笠さんは、凪を扱いつづけてくれる。
2362 = "Không phải cháu gái, mà là một vị khách—— Ông Minokasa vẫn tiếp tục đối xử với Nagi như vậy."
# monologue
# JP: 僕も倣って、右田一では、一人の修学旅行生として、\n謙虚に学を修めよう。
2525 = "Tôi cũng sẽ bắt chước, ở Migitai, với tư cách là một học sinh đi dã ngoại, tôi sẽ khiêm tốn học hỏi."
# 【蓑笠】
# display as 蓑笠
# JP: 「なら、気をつけて。\n楽しか旅行ば、送ってください」
1835 = "「Vậy thì đi cẩn thận nhé. Chúc mọi người có một chuyến đi vui vẻ」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1523 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「どぎゃんしたと？　にーさん、\n食べ過ぎよったと？」
1607 = "「Sao thế? Anh hai, ăn nhiều quá hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1331 = "「Không——」"
# monologue
# JP: 確かに、普段よりたくさん食べた。\nが、満腹感に苦しむというほどではない。
2394 = "Đúng là tôi ăn nhiều hơn bình thường. Nhưng cũng không đến mức no căng bụng."
# monologue
# JP: 川風が汗をさらりと乾かし、\n感じているのは、むしろ心地よい気だるさだ。
2321 = "Gió sông thổi khô mồ hôi, thứ tôi cảm nhận được, đúng hơn là một sự mệt mỏi dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「そうではなく――\nそうではなく、だ」
1337 = "「Không phải vậy—— Không phải vậy đâu」"
# monologue
# JP: ……どうにも、なにか、いつもとは違った感じだった。\n右田一酒造元での真闇姉が。
1071 = "...Không hiểu sao, có cảm giác gì đó khác với bình thường. Chị Mayami ở cơ sở nấu rượu Migitai ấy."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;牽引のバーベキュー\\x%l客車;#00ffc040;客車%l;#;では、ハチロクと、\n\\x%l機関士;#00ffc040;機関士%l;#;を勤めてくれたポーレットと、助士の日々姫とが。
2521 = "Trên \\x%l客車;#00ffc040;toa hành khách%l;#; BBQ do \\x%l8620;#00ffc040;8620%l;#; kéo, có Hachiroku, Paulette làm \\x%l機関士;#00ffc040;lái tàu%l;#; và Hibiki làm phụ lái."
# 【ふかみ】
# display as 深美
# JP: 「食べ過ぎじゃなくて……どうしましたか？」
1332 = "「Không phải ăn nhiều quá... thế thì anh bị sao vậy?」"
# 【凪】
# display as 凪
# JP: 「にーさん、\nなんか喉に詰まったみたいな顔しとるよぉ？」
1542 = "「Anh hai, mặt anh cứ như bị nghẹn ở cổ họng ấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「詰まっている……か、\n確かに少し、詰まっているような感じはあるかな」
1408 = "「Nghẹn à... đúng là có cảm giác hơi nghẹn thật」"
# monologue
# JP: 認めてしまえば、不思議と喉の通りがよくなる。\nするする、言葉を吐き出せる。
2208 = "Thừa nhận rồi thì cổ họng lại thông suốt một cách kỳ lạ. Lời nói cứ thế tuôn ra."
# 【双鉄】
# display as 雙鐵
# JP: 「みなが、なにかよそよそしかった気がしてな。\n無論、僕達を客として扱ってくれたのもあろうが……」
1367 = "「Anh có cảm giác mọi người có vẻ xa cách sao ấy. Tất nhiên là cũng có thể do họ đối xử với chúng ta như khách...」"
# monologue
# JP: 凪に対する蓑笠老人の接しかたは、\n客として扱いつつも、祖父の優しさに満ち満ちていた。
2036 = "Cách ông Minokasa đối xử với Nagi, dù là khách nhưng vẫn tràn đầy sự dịu dàng của một người ông."
# monologue
# JP: だが、真闇姉も、日々姫も、ハチロクも……\nそれになぜだか、ポーレットまで――
2043 = "Nhưng mà, cả chị Mayami, Hibiki, Hachiroku... và không hiểu sao, đến cả Paulette nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「遠慮というか、\n積極的に関わろうとしてこないというか」
1753 = "「Nói là e ngại cũng được, hay là không muốn chủ động can dự vào cũng được」"
# 【ふかみ】
# display as 深美
# JP: 「あっ……」
1486 = "「A...」"
# monologue
# JP: こころあたるところがあるのか、\nふかみは一瞬息を詰め、そしてポポポと赤くなる。
2009 = "Không biết có nghĩ ra điều gì không, mà Fukami bỗng nín thở, rồi mặt đỏ bừng lên."
# monologue
# JP: 凪もふかみの様子を目にし、納得顔して頷いている。
2134 = "Nagi nhìn vẻ mặt của Fukami, cũng gật gù như đã hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ふたりにはわかるのか？」
1610 = "「Sao thế, hai đứa biết gì à?」"
# 【凪】
# display as 凪
# JP: 「そりゃ……わかるばい」
1801 = "「Chuyện đó... tụi em biết chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「？」
1850 = "「?」"
# monologue
# JP: 夕陽の反射かと思ったが――\n凪の顔まで、わずかに赤らんでいるようだ。
2500 = "Tôi cứ tưởng là do ánh chiều tà phản chiếu—— nhưng ngay cả mặt Nagi cũng hơi ửng đỏ."
# monologue
# JP: わかると言って、けれどもその先をつづけてくれず、\n凪は視線を、ふかみの上へと移してしまう。
2197 = "Nói là biết, nhưng lại không nói tiếp, Nagi chuyển ánh mắt sang Fukami."
# 【ふかみ】
# display as 深美
# JP: 「今日一日……\nわたしたちと過ごして、どう――でした？」
1358 = "「Hôm nay... ở cùng tụi em, anh thấy——thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは――」
1609 = "「Thế nào, là sao——」"
# 【凪】
# display as 凪
# JP: 「いろいろあるばい。いろいろ。\n楽しかとか、ムカついたとか、退屈したとか」
1795 = "「Nhiều thứ lắm. Đủ thứ. Vui vẻ, bực mình, hay nhàm chán chẳng hạn」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しかったぞ、単純に」
1509 = "「Vui lắm, đơn giản là vậy」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1491 = "「啊」" 
# monologue
# JP: ふかみの顔が安堵に緩む。\n凪も満足気な表情になり、またうんうんと何度も頷く。
2339 = "Khuôn mặt Fukami giãn ra nhẹ nhõm. Nagi cũng lộ vẻ hài lòng, liên tục gật gù."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しかったし……あとは、そうだな。\n普段と違い、いろいろな顔を見たような気がする」
1595 = "「Vui, và... còn gì nữa nhỉ. Khác với bình thường, anh có cảm giác như được thấy rất nhiều sắc thái khác nhau」"
# 【ふかみ】
# display as 深美
# JP: 「いろいろな顔……ですか？」
1591 = "「Nhiều sắc thái... ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。顔というか、表情かな。人の表情の移り変わりが、\nいつもより、ずっと良く見えたような気がする」
1520 = "「Ừ. Sắc thái hay nói đúng hơn là biểu cảm. Anh có cảm giác như nhìn thấy sự thay đổi biểu cảm của mọi người rõ hơn bình thường rất nhiều」"
# monologue
# JP: みんなの、あるいは蓑笠老人のこともそうだが……\n他の誰より、凪とふかみだ。
2193 = "Của mọi người, hay của ông Minokasa cũng vậy... Nhưng hơn ai hết, là của Nagi và Fukami."
# monologue
# JP: 凪なら元気一辺倒で、ふかみは常に慎重で。\nそのイメージとまるでことなる姿も見れた。
2126 = "Nagi thì lúc nào cũng tràn đầy năng lượng, còn Fukami thì luôn thận trọng. Anh cũng đã thấy được những dáng vẻ hoàn toàn khác với hình ảnh đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、修学旅行だったよ。\nいろいろなことを、学べた気がする」
1089 = "「...Đúng là một chuyến dã ngoại. Anh cảm thấy mình đã học được rất nhiều điều」"
# 【ふかみ】
# display as 深美
# JP: 「だったら――」
1663 = "「Nếu vậy thì——」"
# monologue
# JP: ふかみはぎゅうっと目を閉じ、うつむき。\nそれからゆっくり、その顔と瞳とを持ち上げなおす。
2343 = "Fukami nhắm chặt mắt, cúi gầm mặt. Rồi từ từ ngẩng mặt lên, mở mắt ra."
# 【ふかみ】
# display as 深美
# JP: 「だったら、つづけてみませんか？\nあのっ――これからも――私達と、修学旅行」
1664 = "「Nếu vậy thì, anh có muốn tiếp tục không? À thì——từ giờ trở đi——đi dã ngoại cùng tụi em」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1482 = "「唔？」" 
# monologue
# JP: 続ける、というと――
2410 = "Tiếp tục, ý em là——"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、枕投げなどか？\nそれは確かに楽しそうだが……」
1695 = "「Ví dụ như, ném gối hả? Nghe cũng vui đấy nhưng...」"
# 【ふかみ】
# display as 深美
# JP: 「あ、いえ！　そうじゃなくって！\nそれもすごく、やってみたいし楽しそうですけどっ」
1495 = "「A, không phải! Không phải chuyện đó! Dù cái đó cũng rất muốn thử và có vẻ vui thật đấy nhưng」"
# 【双鉄】
# display as 雙鐵
# JP: 「けど？」
1339 = "「Nhưng?」"
# 【ふかみ】
# display as 深美
# JP: 「あの――ええと――ええと、ですねっ！」
1796 = "「À thì——ờm——ờm, là thế này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1848 = "「！」" 
# monologue
# JP: 僕を見る、ふかみの瞳に目を奪われる。\n強い決意が――ふかみを大人びさせている。
2253 = "Tôi bị cuốn hút bởi ánh mắt Fukami đang nhìn mình. Sự quyết tâm mãnh liệt——khiến Fukami trông trưởng thành hơn hẳn."
# monologue
# JP: 夕陽の赤に鮮やかなほど照らしだされて、\nその黒髪が、陰影の強調された顔がただ美しい。
2181 = "Được rọi sáng rực rỡ trong ánh chiều tà đỏ rực, mái tóc đen nhánh, khuôn mặt với những đường nét bóng đổ thật đẹp."
# 【ふかみ】
# display as 深美
# JP: 「わたし、達。双鉄さんのことが……好き、なんです」
1615 = "「Tụi, em. Thích... anh Soutetsu, lắm」"
# 【凪】
# display as 凪
# JP: 「わ、わたしたち言うのは、\nふかみちゃんと、ウチとのことばい」
1445 = "「Tụi, tụi em ở đây là, Fukami và em đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1083 = "「...Ừm」"
# monologue
# JP: 凪が、真っ赤になっている。\nいつもの元気さをすっかり消した、神妙で、不安げな顔。
2132 = "Nagi đỏ bừng cả mặt. Sự hoạt bát thường ngày biến mất sạch, thay vào đó là khuôn mặt nghiêm túc và có chút bất an."
# monologue
# JP: 少年のような普段の姿と打って変わって……\nその快活さの裏に隠れる、少女らしい儚さを見せている。
2428 = "Khác hẳn với dáng vẻ như con trai thường ngày... Em ấy đang cho thấy sự mong manh của một thiếu nữ, ẩn giấu sau vẻ hoạt bát đó."
# 【双鉄】
# display as 雙鐵
# JP: 「それは……ありがとう」
1798 = "「Chuyện đó... cảm ơn hai em」"
# monologue
# JP: さすがの僕も、この“好き”が、\nニンジンや子猫に対する“好き”とは違うものと感じる。
2217 = "Ngay cả tôi cũng cảm nhận được, chữ \"thích\" này, khác với \"thích\" cà rốt hay mèo con."
# monologue
# JP: だからといって、どんな“好き”かと断定できるほど……\nなんというか、強い確信は持てないでいる。
2044 = "Nhưng nói vậy chứ, để khẳng định chắc chắn là \"thích\" kiểu gì... thì tôi lại không có đủ tự tin."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\n好きといってもらえることは、とても嬉しい」
1758 = "「Cảm ơn hai em. Được nghe nói thích mình, anh rất vui」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
1485 = "「A——」"
# monologue
# JP: なぜなのか、\nふかみの瞳の決意が、揺れる。
2010 = "Không hiểu sao, sự quyết tâm trong mắt Fukami lại dao động."
# monologue
# JP: それでもふかみは、止めることなく言葉を続ける。
2037 = "Dù vậy, Fukami vẫn không dừng lại mà tiếp tục nói."
# 【ふかみ】
# display as 深美
# JP: 「だから、ですね？　双鉄さんには――\nそんなにギュウって……我慢しないで、欲しいんです」
1643 = "「Vì thế nên? Tụi em muốn anh Soutetsu—— đừng có cố gồng mình... chịu đựng nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「我慢――」
1602 = "「Chịu đựng——」"
# monologue
# JP: ふかみの目を見て、凪の目を見る。
2249 = "Tôi nhìn vào mắt Fukami, rồi nhìn sang mắt Nagi."
# monologue
# JP: 不安げにうるみ、落ち着かず。\nけれどもとても、温かな目を。
2388 = "Ánh mắt rơm rớm đầy bất an, không hề bình tĩnh. Nhưng lại vô cùng ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「我慢……したから、\n僕は、留年生になったのか？」
1536 = "「Vì anh... chịu đựng, nên mới thành học sinh lưu ban sao?」"
# monologue
# JP: その目に照らされ、僕の心の、\nなにか固いものがわずかにゆるむ。
2187 = "Dưới ánh mắt đó, có thứ gì đó cứng ngắc trong tim tôi khẽ nới lỏng ra."
# monologue
# JP: 理解が、芽吹き始めた気がする。
2364 = "Tôi cảm giác sự thấu hiểu đang bắt đầu nảy mầm."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、『泣いたり笑ったり』で、\nだから、『修学旅行』だったのか？」
1647 = "「Vì thế nên mới nói là 『biết khóc biết cười』, vì thế nên mới là 『chuyến đi dã ngoại』 sao?」"
# 【凪】
# display as 凪
# JP: 「そうばい。にーさんは……\nそこんところは、勉強、しそこなってるけん」
1424 = "「Đúng vậy. Anh hai... đã lỡ mất cơ hội học hỏi những điều đó rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1671 = "「Đúng vậy nhỉ」"
# monologue
# JP: ようやく、自覚が湧いてくる。
2407 = "Cuối cùng, tôi cũng đã tự nhận thức được."
# monologue
# JP: その程度には、積み残っていた経験を、\n凪とふかみに、取り戻させてもらえたのだろう。
2118 = "Có lẽ Nagi và Fukami đã giúp tôi lấy lại được phần nào những kinh nghiệm còn dang dở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1412 = "「Ra là vậy」"
# monologue
# JP: 凪やふかみが過ごしている\nキラキラと輝いた、生きる喜びに満ちてる時間。
2427 = "Khoảng thời gian mà Nagi và Fukami đang trải qua, lấp lánh rực rỡ và tràn ngập niềm vui được sống."
# monologue
# JP: そうも過ごせたはずの時期を、\nけれども僕は、ただ、死なないだけで生きていた。
2247 = "Lẽ ra tôi cũng có thể trải qua thời kỳ đó như vậy, nhưng tôi lại chỉ sống vật vờ cho qua ngày đoạn tháng."
# 【双鉄】
# display as 雙鐵
# JP: 「とても、とても大事なものを。\n僕は勉強、しそこねたのか――」
1641 = "「Anh đã lỡ mất cơ hội học hỏi... những điều vô cùng, vô cùng quan trọng rồi——」"
# 【凪】
# display as 凪
# JP: 「しそこねてなんかなか！\nこれからするため、きっと、とっといただけやけん」
1839 = "「Đâu có lỡ mất đâu! Chắc chắn là chỉ để dành lại cho sau này thôi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1493 = "「À」"
# monologue
# JP: 凪の一言が示してくれる。\nその時期に戻って、やりなおすことは出来ずとも。
2109 = "Một lời của Nagi đã chỉ cho tôi thấy. Dù không thể quay lại thời điểm đó để làm lại từ đầu."
# monologue
# JP: 今、この場所から新たに学ぶ、\nそうした時なら、いくらでも重ねていけるのだと。
2040 = "Nhưng nếu học lại từ đầu ngay tại nơi này, lúc này, thì bao nhiêu thời gian cũng có thể bù đắp được."
# 【ふかみ】
# display as 深美
# JP: 「ですからっ――」
1649 = "「Vì thế nên——」"
# monologue
# JP: ふかみの声に促されるように、凪が立つ。\n船上、ふたりが並ぶ姿を、初めて目にする。
2227 = "Như được tiếng nói của Fukami thôi thúc, Nagi đứng dậy. Lần đầu tiên, tôi thấy hai đứa đứng cạnh nhau trên thuyền."
# 【ふかみ】
# display as 深美
# JP: 「修学旅行、続けたいんです。\n双鉄さんと、凪ちゃんとわたしと、三人で」
1621 = "「Tụi em muốn tiếp tục chuyến đi dã ngoại. Anh Soutetsu, Nagi và em, ba người chúng ta」"
# 【凪】
# display as 凪
# JP: 「にーさんのこと、好いとーよ」
1447 = "「Em thích anh hai lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1523 = "「嗯」" 
# monologue
# JP: 一緒に学び、一緒に大人になっていく。\n積み損なってしまった時間を、凪とふかみと重ねてく。
1996 = "Cùng nhau học hỏi, cùng nhau trưởng thành. Khoảng thời gian đã lỡ mất, sẽ được bồi đắp cùng Nagi và Fukami."
# monologue
# JP: どう考えてもそれは楽しく嬉しいことで。\nだが――だからこそ即答できない。
2231 = "Dù nghĩ thế nào thì đó cũng là chuyện vui vẻ và hạnh phúc. Nhưng——chính vì thế mà tôi không thể trả lời ngay được."
# 【双鉄】
# display as 雙鐵
# JP: 「……嬉しいが、少しだけ考えさせてくれ。\n即答、できることではない」
1087 = "「...Anh rất vui, nhưng hãy cho anh suy nghĩ một chút. Anh không thể trả lời ngay được」"
# 【凪】
# display as 凪
# JP: 「即答できないって――どうしてばいっ！？」
1706 = "「Không thể trả lời ngay là sao chứ!?」"
# 【ふかみ】
# display as 深美
# JP: 「年の差ですか？　\nそれとも、凪ちゃんとわたしと、三人だからですか？」
1675 = "「Vì chênh lệch tuổi tác ạ? Hay vì... Nagi, em và anh, ba người chúng ta?」"
# 【凪】
# display as 凪
# JP: 「だってにーさん、言ってくれたばい！\nふかみちゃんとウチとケンカしとったら落ち着かんって」
1425 = "「Bởi vì anh hai đã nói mà! Rằng nếu Fukami và em cãi nhau thì anh sẽ không yên tâm được」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1523 = "「嗯」" 
# monologue
# JP: 相槌一つで、凪とふかみの表情が激しく揺れる。
2406 = "Chỉ với một lời đáp lại, biểu cảm của Nagi và Fukami dao động dữ dội."
# monologue
# JP: どうとでも取れてしまうとそれで気づいて、\n急ぎ、丁寧に言葉を継ぎ足す。
2240 = "Nhận ra lời nói của mình có thể bị hiểu theo nhiều cách, tôi vội vàng, cẩn thận giải thích thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「年のことも、三人のことも、確かにある。\nが、それは大きな問題ではない」
1588 = "「Chuyện tuổi tác, chuyện ba người, đúng là có. Nhưng đó không phải là vấn đề lớn」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
1439 = "「Hả?」"
# 【凪】
# display as 凪
# JP: 「ほんなら――」
1822 = "「Vậy thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は養子で、右田に大恩あるものだ」
1633 = "「Anh là con nuôi, mang ơn lớn với nhà Migita」"
# monologue
# JP: 言って――\nだからなのかもしれないと不意に、思い当たる。
2490 = "Nói xong—— Tôi chợt nhận ra, có lẽ là vì thế."
# monologue
# JP: この罪悪感があったから、今日僕は――僕の方が――\n真闇姉と日々姫とに、ギクシャクしたものを感じたのかと。
2313 = "Chính vì cảm giác tội lỗi này, mà hôm nay tôi——chính tôi—— mới cảm thấy gượng gạo với chị Mayami và Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「我慢、というがそれだけではない。\n単なる我慢を、僕は、重ねてきたのではないのだ」
1756 = "「Nói là chịu đựng, nhưng không chỉ có vậy. Anh không chỉ đơn thuần là chịu đựng suốt thời gian qua đâu」"
# monologue
# JP: 義務で縛ってもらえなければ、僕はとっくに腐ってた。\n義務をこなして来たことが、僕を前向きに生かしてくれた。
2432 = "Nếu không bị trói buộc bởi nghĩa vụ, tôi đã mục nát từ lâu rồi. Việc hoàn thành nghĩa vụ đã giúp tôi sống hướng về phía trước."
# monologue
# JP: それは事実で――\n僕は、そのことに感謝している。
2517 = "Đó là sự thật—— Và tôi biết ơn vì điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「それだけではないから、考えたいのだ。\n大事なことだと思うから。時間をかけて、慎重に――」
1694 = "「Vì không chỉ có vậy, nên anh mới muốn suy nghĩ. Vì anh nghĩ đó là chuyện quan trọng. Dành thời gian, cẩn thận——」"
# 【日々姫】
# display as 日日姬
# JP: 「あれ？　にぃにぃ、帰ってきたと？」
1441 = "「Ủa? Anh hai, anh về rồi hả?」"
# 【真闇】
# display as 真闇
# JP: 「なんねぇ。日帰りの修学旅行なんて」
1655 = "「Gì thế này. Chuyến đi dã ngoại gì mà đi về trong ngày vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。珍しいな、飲んでいるのか」
1472 = "「Gì đây. Hiếm thấy nha, đang uống rượu à」"
# monologue
# JP: 居間に、酒瓶。
2527 = "Trong phòng khách, vỏ chai rượu."
# monologue
# JP: ハチロクだけはいつもの顔だが、\n真闇姉も日々姫も頬を心地よいピンクにしてる。
2163 = "Chỉ có Hachiroku là vẫn vẻ mặt thường ngày, còn chị Mayami và Hibiki thì hai má đều ửng hồng dễ chịu."
# 【日々姫】
# display as 日日姬
# JP: 「飲むとよ、そりゃあ。涙酒で、祝い酒やけん」
1809 = "「Uống chứ, tất nhiên rồi. Rượu buồn, mà cũng là rượu mừng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「涙酒の祝い酒？」
1716 = "「Rượu buồn mà cũng là rượu mừng?」"
# 【真闇】
# display as 真闇
# JP: 「それより双ちゃん、どぎゃんして帰ってきたと？\n発船所にお泊りいう話じゃなかったと？」
1752 = "「Hơn nữa Sou-chan, sao em lại về thế? Chẳng phải nói là ngủ lại bến thuyền sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったか？」
1488 = "「À... vậy sao?」"
# monologue
# JP: しおりを開く。\nが――そうとは明記されてない。
2258 = "Tôi mở sổ tay ra. Nhưng——không hề ghi rõ như vậy."
# monologue
# JP: クマ川くだり体験の予定の終了後、\n“解散”と明記されてもいないけれども。
2533 = "Mặc dù sau khi kết thúc lịch trình trải nghiệm chèo thuyền trên sông Kuma, cũng không hề ghi rõ là \"Giải tán\"."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうだったとしても泊まれんだろう。\n凪もふかみも、嫁入り前だ。妙な噂になってはいかん」
1751 = "「Mà, dù có là vậy thì cũng không ngủ lại được đâu. Nagi và Fukami đều chưa lấy chồng. Đồn đại linh tinh thì không hay」"
# 【ハチロク】
# display as 八六
# JP: 「妙な噂、でございますか」
1713 = "「Đồn đại linh tinh, sao ạ」"
# monologue
# JP: 言って、ボリン、と。\nハチロクは力強く石炭を噛み砕く。
2065 = "Nói rồi, rốp một tiếng. Hachiroku nhai mạnh miếng than đá."
# 【真闇】
# display as 真闇
# JP: 「珍しかとね。双ちゃんがそぎゃんかこつ気にするとか」
1732 = "「Hiếm thấy nhỉ. Sou-chan mà cũng để ý mấy chuyện đó cơ đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、うん――珍しいな。\n気にする……というか、せざるを得なくなってしまった」
1371 = "「À, ừm——hiếm thấy thật. Để ý... hay nói đúng hơn là không thể không để ý được」"
# 【日々姫】
# display as 日日姬
# JP: 「なになにそれ、どぎゃん意味？」
1754 = "「Gì thế gì thế, ý anh là sao?」"
# monologue
# JP: 日々姫がグラスを差し出してくる。
2294 = "Hibiki đưa ly ra."
# monologue
# JP: 気が利くな――と一瞬思うが、\nすぐに違うなと首を振る。
2200 = "Chu đáo thật——tôi thoáng nghĩ vậy, nhưng ngay lập tức lắc đầu, không phải vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちだけで結構だ。話すなら[しらふ,1]素面で話したい――\nというか、素面で話すべきことと思う」
1600 = "「Anh xin nhận tấm lòng thôi. Đã nói chuyện thì anh muốn nói lúc tỉnh táo—— hay đúng hơn, anh nghĩ đây là chuyện nên nói lúc tỉnh táo」"
# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1075 = "「——Vâng」"
# monologue
# JP: 日々姫も自分のコップを置いて、\nまっすぐ、背筋を伸ばし直す。
2300 = "Hibiki cũng đặt ly của mình xuống, thẳng lưng ngồi ngay ngắn lại."
# monologue
# JP: 日々姫、真闇姉、そしてハチロク。\n３人とも――真剣な表情で僕を見つめる。
2292 = "Hibiki, chị Mayami, và cả Hachiroku. Cả 3 người——đều nhìn tôi với vẻ mặt nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「実は……好きだと、言ってもらえたのだ。\n凪とふかみと、二人に、僕が」
1393 = "「Thực ra... anh đã được tỏ tình. Bởi cả Nagi và Fukami, hai đứa nói thích anh」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……」
# 1485 = "「啊——」" 
# 【ハチロク】
# display as 八六
# JP: 「左様でございましたか」
1681 = "「Ra là vậy ạ」"
# monologue
# JP: 脱力したような、納得したようなそれぞれの声。
2324 = "Mỗi người một giọng, như thể mất hết sức lực, lại như thể đã hiểu ra."
# monologue
# JP: 真闇姉はいつもと変わらぬにこにこ顔で、\n僕にゆっくりと問いかけてくる。
2381 = "Chị Mayami vẫn với khuôn mặt tươi cười như mọi khi, từ tốn hỏi tôi."
# 【真闇】
# display as 真闇
# JP: 「好きって言われたっていうのは――\n恋人になってほしかって、お願いされたと？」
1755 = "「Được nói thích là—— được yêu cầu làm người yêu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、恋人とは言われなかった。\n望まれたのは……修学旅行を重ねたい、と」
1347 = "「Không, không phải là người yêu. Thứ họ muốn là... được đi dã ngoại cùng nhau nhiều hơn」"
# 【真闇】
# display as 真闇
# JP: 「二人から？　一緒に？」
1547 = "「Từ cả hai đứa? Cùng lúc á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうだ。三人一緒の修学旅行をだ」
1529 = "「Ừm. Đúng vậy. Chuyến đi dã ngoại của ba người cùng nhau」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
1492 = "「Chà chà」"
# monologue
# JP: かわいかねぇ、とささやいて、\n真闇姉は空のグラスを透かして僕を、じっと見る。
2379 = "Thì thầm \"Đáng yêu quá nhỉ\", chị Mayami nhìn chằm chằm tôi qua chiếc ly rỗng."
# 【真闇】
# display as 真闇
# JP: 「で？　双ちゃんはなんてお返事したと？」
1838 = "「Thế? Sou-chan trả lời thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「考えたいと。待ってほしいと」
1612 = "「Muốn suy nghĩ thêm. Muốn hai đứa đợi」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃん答えは、もう答えばい！\nにぃにが、速攻断らんとかー」
1370 = "「Trả lời thế thì đã trả lời rồi còn gì! Chẳng phải anh hai từ chối thẳng thừng luôn sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1486 = "「啊……」" 
# monologue
# JP: 日々姫の大声に背筋を打たれる。\nなるほど日々姫は、僕よりもよほど僕を知ってる。
2297 = "Giọng nói lớn của Hibiki như đánh thẳng vào sống lưng tôi. Ra vậy, Hibiki còn hiểu tôi hơn cả chính tôi nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな……僕は、そうしたいのだ。\nそうしたいのだが――」
1668 = "「Đúng vậy... anh, muốn làm thế. Anh muốn làm thế nhưng——」"
# 【真闇】
# display as 真闇
# JP: 「したかことなら、すれば良かとよ」
1659 = "「Nếu muốn thì cứ làm thôi」"
# monologue
# JP: ごくあっさりと言い切られる。
2382 = "Chị ấy nói một cách cực kỳ thản nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし――僕は右田の」
1427 = "「Nhưng——em là người nhà Migita」"
# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんは右田の長男。\nで、おねーちゃんのかわいい弟」
1673 = "「Đúng vậy. Sou-chan là con trưởng nhà Migita. Và là đứa em trai đáng yêu của chị」"
# monologue
# JP: 僕の言葉を、真闇姉は優しく塞いでくれる。
2385 = "Lời nói của tôi, bị chị Mayami dịu dàng chặn lại."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、双ちゃんが。\n弟が幸せになってくれたら、嬉しかけんね」
1570 = "「Chị thì, chỉ cần Sou-chan. Chỉ cần em trai được hạnh phúc, là chị vui rồi」"
# monologue
# JP: 全てをわかったその上で、\n小さなことだと、まるめてしまう。
2214 = "Hiểu rõ mọi chuyện, rồi lại coi đó chỉ là chuyện nhỏ."
# 【日々姫】
# display as 日日姬
# JP: 「妹も！　妹もそうとよ！　おんなじたい！\nにぃにぃが幸せになったら、嬉しかとよ！」
1568 = "「Em gái cũng vậy! Em gái cũng nghĩ vậy! Giống hệt luôn! Anh hai mà hạnh phúc thì em cũng vui lắm!」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、もちろんのこと、\n常に、双鉄様の幸せを願うものです」
1636 = "「Tôi thì đương nhiên rồi, lúc nào cũng mong Ngài Soutetsu được hạnh phúc」"
# monologue
# JP: 競うように日々姫は勢い込んで、\nふたりを横目に、ハチロクは品良く微笑する。
2296 = "Hibiki hăng hái như thể đang ganh đua, liếc nhìn hai người kia, Hachiroku mỉm cười tao nhã."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉……日々姫……ハチロク」
1730 = "「Chị Mayami... Hibiki... Hachiroku」"
# monologue
# JP: 背中を、優しく押してもらえた。\n一歩を、自分から踏み出せるよう。
2198 = "Tôi đã được nhẹ nhàng đẩy lưng. Để có thể tự mình bước đi một bước."
# monologue
# JP: どこでも行ける――\n思った瞬間、そうかと気づく。
2417 = "Đi đâu cũng được—— Khoảnh khắc nghĩ vậy, tôi chợt nhận ra."
# monologue
# JP: （僕は……最初から、\n望めば、どこへだっていけたんだ）
2549 = "（Mình... ngay từ đầu, chỉ cần muốn, là có thể đi bất cứ đâu mà）"
# monologue
# JP: 誰も、何も――\n僕を縛ったりしなかった。
2032 = "Không ai, không gì cả—— trói buộc tôi."
# monologue
# JP: （義務を負わせてくれたのは、縛ろうとするからじゃない。\nそうしなければ、僕が崩れてしまったからだ）
2557 = "（Giao cho tôi nghĩa vụ, không phải là để trói buộc. Mà vì nếu không làm vậy, tôi sẽ sụp đổ mất）"
# monologue
# JP: 支えを、鎖を、解き放とうと――\n望まなかった望めなかった。そうすることが、怖かった。
2269 = "Cởi bỏ sự nương tựa, cởi bỏ gông xiềng—— Tôi không muốn, cũng không dám muốn. Làm vậy, thật đáng sợ."
# monologue
# JP: だけど、今なら自分で立てる。自分の意思で歩き出せる。\n凪とふかみが、僕に望みを、きっと与えてくれたから。
2355 = "Nhưng, bây giờ tôi có thể tự đứng vững. Có thể tự bước đi bằng ý chí của mình. Vì Nagi và Fukami, chắc chắn đã trao cho tôi hy vọng."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。行ってくる」
1759 = "「Cảm ơn mọi người. Anh đi đây」"
# monologue
# JP: ならば、もう僕は立ち止まらない。\n行きたいところへ、ただまっすぐに歩いていこう。
2022 = "Nếu vậy, tôi sẽ không dừng bước nữa. Cứ đi thẳng đến nơi mình muốn đến thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、ふかみ。いるか、僕だ」
1396 = "「Nagi, Fukami. Có đó không, anh đây」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　双鉄さんっ」
1481 = "「Hả!? Anh Soutetsu」"
# 【凪】
# display as 凪
# JP: 「わ！　にーさん、泊まってくれると！？」
1458 = "「Oa! Anh hai, anh ngủ lại đây hả!?」"
# 【ふかみ】
# display as 深美
# JP: 「わぁあ！\n凪ちゃん、まだ開けちゃだ――めぇぇ～～っ！？」
1460 = "「Oaaaa! Nagi, vẫn chưa được mở cửa đâ——uuuu~~!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「修学旅行を続けたいと思ってやってきた」
1640 = "「Anh đến vì muốn tiếp tục chuyến đi dã ngoại」"
# 【ふかみ】
# display as 深美
# JP: 「えっ」
1461 = "「Hả」"
# 【凪】
# display as 凪
# JP: 「それって、今日の続きばい？\nそれとも、これからずっと」
1829 = "「Thế là, tiếp tục ngày hôm nay hả? Hay là, từ nay về sau luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「これからずっとを続けたい。\n凪とふかみと、三人で」
1344 = "「Anh muốn tiếp tục từ nay về sau luôn. Nagi, Fukami và anh, ba người chúng ta」"
# 【ふかみ】
# display as 深美
# JP: 「大歓迎ですっ！」
1721 = "「Nhiệt liệt chào mừng ạ!」"
# 【凪】
# display as 凪
# JP: 「あっ！？　ふかみちゃん、ずるかばいっ！」
1494 = "「A!? Fukami, cậu ăn gian quá nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1471 = "「Ôi chao!」"
# monologue
# JP: 抱きついてくるふかみを、凪を、抱きとめる。\n気持ちは、多分、通じあってる。
2245 = "Tôi ôm chầm lấy Fukami và Nagi đang lao tới. Tâm ý, có lẽ đã tương thông rồi."
# monologue
# JP: だけれどきっと、それじゃ足りない。\n言葉にしなきゃ、いつでも足りない。
2358 = "Nhưng chắc chắn, thế là chưa đủ. Nếu không nói ra thành lời, thì lúc nào cũng là chưa đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、それは。\n僕がふたりを好きだからだ」
1350 = "「Tóm lại là. Vì anh thích hai đứa」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1485 = "「啊——」" 
# 【凪】
# display as 凪
# JP: 「ふっふーん」
1477 = "「Hư hưm」"
# monologue
# JP: 抱きついたまま見上げてくる。
2060 = "Vẫn ôm chặt lấy tôi, hai đứa ngước nhìn lên."
# monologue
# JP: ふかみは少し驚いた顔、\n凪は照れたような笑顔を浮かべて。
2341 = "Fukami với vẻ mặt hơi ngạc nhiên, còn Nagi thì nở nụ cười bẽn lẽn."
# 【双鉄】
# display as 雙鐵
# JP: 「だから一緒に学んでいきたい。御一夜のこと、\nこれからのこと、お互いのことを、出来るだけ」
1646 = "「Vì vậy anh muốn cùng nhau học hỏi. Về Ohito, về tương lai, về lẫn nhau, nhiều nhất có thể」"
# 【凪】
# display as 凪
# JP: 「なら、ずっとばい！　全部ばい！」
1825 = "「Vậy thì, mãi mãi nhé! Tất cả nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「そうだね、凪ちゃん」
1666 = "「Đúng vậy nhỉ, Nagi」"
# monologue
# JP: 言って、ふかみがクスっと笑う。
2491 = "Nói rồi, Fukami cười khúc khích."
# monologue
# JP: 笑ったままで、凪の耳元へと口を寄せ――
2523 = "Vẫn cười, em ghé sát miệng vào tai Nagi——"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～～～～」
1851 = "「~~~~~~~~~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ずるいぞ。\n僕らは、一緒に学ぶのだろう？」
1506 = "「Gì chứ, ăn gian quá. Chúng ta, sẽ cùng nhau học hỏi mà?」"
# monologue
# JP: 話を、聞きたい。\n思えば自然と僕の耳も凪の耳元へ――
2243 = "Muốn nghe chuyện quá. Nghĩ vậy, tai tôi cũng tự nhiên ghé sát vào tai Nagi——"
# 【ふかみ】
# display as 凪＆深美
# JP: 『（ちゅっ！）\n（ちゅっ！）』
1858 = "『（Chụt!） （Chụt!）』"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1849 = "「!!?」"
# monologue
# JP: なまあたたかな、やわらかな。\n右と左と。凪とふかみと。
2350 = "Ấm áp, mềm mại. Bên phải và bên trái. Nagi và Fukami."
# 【凪】
# display as 凪
# JP: 「えっへっへー、にーさん、嬉しかと？」
1465 = "「Ehehe, anh hai, vui không?」"
# 【ふかみ】
# display as 深美
# JP: 「あの……公平にって、思って、それで」
1623 = "「Ờm... vì nghĩ là, phải công bằng, nên mới」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。公平に――か」
1413 = "「Ra vậy. Công bằng——sao」"
# 【ふかみ】
# display as 深美
# JP: 「きゃっ！？」
1432 = "「Á!?」"
# 【凪】
# display as 凪
# JP: 「わっ！」
# 1456 = "「哇！」" 
# monologue
# JP: ふたり同時のファーストキスを、僕は受け止め。
2061 = "Tôi đón nhận nụ hôn đầu của cả hai cùng lúc."
# monologue
# JP: お望み通り公平に、おもいっきりに抱きしめ返す！
2206 = "Đúng như mong muốn, tôi ôm chặt lại cả hai một cách thật công bằng!"
