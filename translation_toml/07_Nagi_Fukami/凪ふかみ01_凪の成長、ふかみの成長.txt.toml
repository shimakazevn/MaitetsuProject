# lines: 368 
# monologue
# JP: （ポーーーーっ！）
2482 = "（Tuuuuu!）"
# 【ハチロク】
# display as 雙鐵＆八六
# JP: 「凪」
1531 = "「Nagi」"
# 【凪】
# display as 凪
# JP: 「わかっとるばーい！！」
1706 = "「Em biết rồi á!!」"
# monologue
# JP: 加速、伸びんで[でしぶ,1]出渋っとる。\n蒸気ば、気持ち足りとらん！！
2186 = "Tăng tốc, đang bị ì ạch không vọt lên được.\nHơi nước, cảm giác như không đủ!!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
2476 = "（Phập! Phập! Phập! Phập!!）"
# monologue
# JP: 2分で60。発車直後のいつものペースで、\nきっちり投炭しとるばってん――
2155 = "2 phút 60 xẻng. Với nhịp độ thường ngày ngay sau khi xuất phát,\nem đang xúc than dồn toa rất chuẩn xác nhưng——"
# 【凪】
# display as 凪
# JP: 「今日の石炭、ハズレばい！！\nなんか気持ちよー燃えんばい！！」
1505 = "「Than hôm nay, xui xẻo á!!\nCứ thấy cháy không được bốc á!!」"
# monologue
# JP: その上、お客さんも冥国の団体旅行客さん。
2394 = "Hơn nữa, hành khách lại còn là đoàn du lịch từ Minh Quốc."
# monologue
# JP: みぃんな体ばおっきかよって、\nおなじ満席でも、いつもより絶対客車も重かと！
2148 = "Ai nấy thân hình cũng to béo,\nnên dù cũng là kín chỗ, nhưng chắc chắn toa hành khách sẽ nặng hơn mọi khi á!"
# 【双鉄】
# display as 雙鐵
# JP: 「そこを何とかあげてくれ。\n到着は遅らせられん――というか、代わるか？」
1776 = "「Cố gắng khắc phục chỗ đó giúp tôi.\nKhông thể để đến trễ được——Hay là, đổi chỗ nhé?」"
# 【凪】
# display as 凪
# JP: 「代わらんでよか！　凪さまひとりでやれると！！」
1485 = "「Không cần đổi đâu á! Nagi-sama một mình làm được á!!」"
# monologue
# JP: お客さんらの記念写真で、発車、ただでさえ遅れとるけん、\nにーさんに余計な手間ば、かけさせられん。
2344 = "Chỉ vì mấy bức ảnh kỷ niệm của hành khách mà việc xuất phát vốn dĩ đã bị trễ rồi,\nkhông thể để anh hai phải tốn thêm công sức nữa."
# monologue
# JP: ペースあげるのはキツかけど、\nこれはこれでよか修行ばいっ！！
2343 = "Tăng nhịp độ lên thì mệt thật á,\nnhưng đây cũng là một buổi tu hành tốt á!!"
# 【凪】
# display as 凪
# JP: 「もーにーさんより凪さまの方が、\n投炭！　うまかけんね！！」
1886 = "「Bây giờ Nagi-sama xúc than dồn toa!\nCòn giỏi hơn cả anh hai nữa á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。ならば任せた」
1893 = "「Đáng tin cậy thật đấy. Vậy giao cho em đó」"
# monologue
# JP: ふっ、って。にーさんが笑う。\n前方注視を崩さんままに、口の端っこ、ちょっとだけで。
2266 = "Phụt. Anh hai bật cười.\nVẫn giữ nguyên ánh mắt tập trung nhìn về phía trước, chỉ hơi nhếch khóe miệng lên một chút."
# monologue
# JP: ドキンって、胸ば跳ね上がる。\n信じて貰えて嬉しくなるけん！　元気出てくる！！
2288 = "Thình thịch, ngực em đập rộn ràng.\nĐược anh tin tưởng em vui lắm á! Cảm thấy tràn đầy năng lượng luôn!!"
# 【凪】
# display as 凪
# JP: 「まーかせとけばーい！！」
1555 = "「Cứ để em lo á!!」"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# monologue
# JP: 嬉しくて体うきうき動くばってん、\n雑にしちゃったら、意味なかと！！
2332 = "Vui sướng khiến cơ thể phấn khích cử động,\nnhưng nếu làm ẩu thì chẳng có ý nghĩa gì hết á!!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# monologue
# JP: バックを抑えて手前を厚く。\nそこば、投炭練習どおり。
2154 = "Hạn chế rải phía sau, rải dày phía trước.\nChỗ đó, cứ làm đúng như lúc luyện tập xúc than dồn toa."
# monologue
# JP: けど、燃え方ば、毎日毎日かわってくるけん、\n投炭の順番は、臨機応変にやらんといけん！
2203 = "Nhưng mà, cách cháy thì ngày nào cũng thay đổi á,\nnên thứ tự xúc than dồn toa, phải tùy cơ ứng biến mới được á!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# monologue
# JP: 焚き口の戸を開けるたび、\n通風ば起きて、火床の石炭を崩して動かす。
2384 = "Mỗi lần mở cửa miệng lò,\ngió lùa vào, sẽ làm vỡ và xê dịch than trên buồng lửa."
# monologue
# JP: やけん、それ見て、すぐ判断して！！
2248 = "Thế nên, phải nhìn vào đó, rồi phán đoán ngay lập tức!!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# monologue
# JP: 薄かとこ、足りとらんとこに、二分で70。\n汗ば、ぶわって吹き出してくる。
2141 = "Vào những chỗ mỏng, chỗ thiếu, 2 phút 70 xẻng.\nMồ hôi, túa ra như tắm."
# monologue
# JP: こんペースで火床ば綺麗につくるのは、\n正直、かなりキツかけど――
2419 = "Thú thật, giữ nhịp độ này để rải buồng lửa cho đẹp,\nthì khá là mệt á nhưng——"
# 【凪】
# display as 凪
# JP: 「綺麗に――せんっ、と！\nあとでっ、余計に――苦しく、なるっ――けん！」
1765 = "「Không rải——cho đẹp, á!\nLát nữa, sẽ càng——khổ hơn, á!」"
# monologue
# JP: 石炭ば燃え残ったらドロドロになって固まるし、\nそんなんできたら、通風鈍って、燃え悪くなる。
2136 = "Than mà cháy không hết sẽ nhão nhoét rồi đông cứng lại á,\nmà nếu thành ra thế thì thông gió sẽ kém đi, cháy cũng kém theo á."
# monologue
# JP: やけん、絶対に雑にせん。手前ば厚く、奥薄く。\nその上で、燃えの早かところを見逃さんよう！
2339 = "Thế nên, tuyệt đối không được làm ẩu. Phía trước rải dày, phía sau rải mỏng.\nHơn nữa, không được bỏ sót những chỗ cháy nhanh á!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# 【ハチロク】
# display as 八六
# JP: 「――基本に忠実。良い投炭です」
1206 = "「——Tuân thủ cơ bản. Kỹ thuật xúc than dồn toa rất tốt」"
# 【凪】
# display as 凪
# JP: 「ふっ、ふーん！　当、然っ！\nらくっしょーばいっ！！」
1601 = "「Hứ, hừm! Đương, nhiên á!\nDễ ợt á!!」"
# monologue
# JP: 投炭しながら口をあけると、喉まで熱気が一気にくるけん、\n喉ばカーーーって乾いちゃう。
2215 = "Vừa xúc than dồn toa vừa há miệng thì khí nóng sẽ xộc thẳng vào tận cổ họng á,\nnên cổ họng khô khốc luôn á."
# monologue
# JP: 汗だくだくでツバもなかなかでてこんばってん、\nおしゃべりすれば元気でる！　暑い・苦しいば薄くなる！
2178 = "Mồ hôi nhễ nhại, nước bọt cũng chẳng tiết ra được mấy,\nnhưng cứ nói chuyện là sẽ thấy khỏe ra! Cảm giác nóng bức, khổ sở cũng vơi đi á!"
# 【凪】
# display as 凪
# JP: 「まだまだどんどんいくけんねー！」
1910 = "「Vẫn còn tiếp tục được nữa á!」"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「来たっ！　――十分だ！」
1715 = "「Đến rồi! ——Đủ rồi!」"
# monologue
# JP: （ぐんっ！）
2475 = "（Vút!）"
# monologue
# JP: 伸びる感覚！　気持ち良か加速！\nシュッシュッって、ブラスト音も早くなりよる！！
2188 = "Cảm giác vọt lên! Gia tốc thật tuyệt vời!\nTiếng khí thải xi lanh xình xịch cũng nhanh hơn rồi á!!"
# 【双鉄】
# display as 雙鐵
# JP: 「ご苦労だったな、凪。\n良い投炭だ。蒸気を速やかに回復できた」
1549 = "「Vất vả cho em rồi, Nagi.\nXúc than dồn toa tốt lắm. Đã phục hồi hơi nước nhanh chóng」"
# 【凪】
# display as 凪
# JP: 「あ――」
1606 = "「A——」"
# monologue
# JP: にーさん、前ばしっかり見たままだけど、笑っとる！
2257 = "Anh hai, vẫn nhìn thẳng về phía trước, nhưng đang cười á!"
# monologue
# JP: 口の端っこだけじゃなく、\n顔ば、にこーって、嬉しげで！！
2134 = "Không chỉ nhếch khóe miệng,\nmà cả khuôn mặt cũng tươi cười, trông rất vui vẻ á!!"
# 【凪】
# display as 凪
# JP: 「ハチロクに仕込まれたけんね！\n投炭にウラワザはなかとばい！！」
1830 = "「Được Hachiroku huấn luyện mà lị!\nXúc than dồn toa thì không có mẹo gì đâu á!!」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。最高の投炭とは、\n最高に基本に忠実な投炭に他なりません」
1491 = "「Đúng vậy ạ. Kỹ thuật xúc than dồn toa tuyệt đỉnh nhất,\nkhông gì khác ngoài việc tuân thủ các bước cơ bản một cách tuyệt đối」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕も基本通りに、\n最高の運転を目指すとしよう」
1964 = "「Nếu vậy tôi cũng sẽ theo đúng cơ bản,\nhướng tới kỹ thuật lái tàu tuyệt đỉnh nhất」"
# monologue
# JP: （ぐんっ）
# 2475 = "（吭！）" 
# monologue
# JP: まだ伸びる！
2451 = "Vẫn còn vọt lên được nữa á!"
# monologue
# JP: いっつもだったらそろぞろ\x%l絶気;#00ffc040;絶気%l;#;しとるとこでも、\nまだまだ\x%l力行;#00ffc040;力行%l;#;続くけん、投炭の手も休められん。
2416 = "Mọi khi thì giờ này chuẩn bị \\x%l絶気;#00ffc040;cắt hơi%l;#; rồi á,\nnhưng vẫn còn tiếp tục \\x%l力行;#00ffc040;chạy kéo tải%l;#; nên tay xúc than dồn toa cũng không được nghỉ á."
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# 【凪】
# display as 凪
# JP: 「にーさんの、最高っ！\n凪さまがっ――ささえて――あげるけんっ！　ねっ！！」
1685 = "「Tuyệt đỉnh của anh hai!\nNagi-sama sẽ——hỗ trợ——cho á! Nhé!!」"
# monologue
# JP: 速度があがれば、火室の通風も良ぉなるけん、\n投炭、余計に難しくなる。
2448 = "Tốc độ tăng lên thì thông gió buồng đốt cũng tốt hơn á,\nnên xúc than dồn toa lại càng khó hơn á."
# monologue
# JP: 体全部をバネ仕掛けにして、\n火床の薄かところへと、ひたすらひたすら投げ込んで――
2229 = "Biến cả cơ thể thành lò xo,\ncứ thế ném liên tục vào những chỗ mỏng trên buồng lửa——"
# 【ハチロク】
# display as 八六
# JP: 「……双鉄様、加減弁、閉じてもよろしいかと」
1216 = "「……Ngài Soutetsu, đã có thể đóng van tiết lưu hơi được rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。逆転機、ミッドギア。\n加減弁、閉じーーーーーーーーーる」
1646 = "「Ừm. Cần đảo chiều, Tầm trung.\nĐóngーーーーーーーーーvan tiết lưu hơi」"
# 【凪】
# display as 凪
# JP: 「待っとったばーい！！」
1906 = "「Em đợi mãi á!!」"
# monologue
# JP: 加減弁ばゆーっくり閉じたら、今度はにーさん素早く動く。\nバイパス弁ば解放して、シリンダーから水ば抜く。
2225 = "Van tiết lưu hơi từ từ đóng lại, lần này anh hai thao tác rất nhanh á.\nMở van bypass, xả nước từ xi-lanh ra."
# monologue
# JP: うちもあわせてワンスコ置いてブロアを開いて通風とって。\n水ばごくごく！　がんばっとったカマに飲ませてあげる。
2216 = "Em cũng phối hợp bỏ xẻng xuống, mở thiết bị thổi gió để thông gió.\nNước ừng ực! Cho lò hơi nãy giờ đang cố gắng uống nước á."
# 【双鉄】
# display as 雙鐵
# JP: 「逆転機、前進フルギア」
1668 = "「Cần đảo chiều, cài hết số tiến」"
# monologue
# JP: こいで\x%l絶気;#00ffc040;絶気%l;#;運転ばい！\nここからしばらく、慣性で走っていくだけと！
2442 = "Vậy là bắt đầu chạy \\x%l絶気;#00ffc040;cắt hơi%l;#; rồi á!\nTừ đây một đoạn, tàu chỉ chạy bằng quán tính thôi á!"
# 【凪】
# display as 凪
# JP: 「っ！！！」
1620 = "「っ!!!」"
# monologue
# JP: この隙にウチも給水！\n水筒の水ばごっくごっく飲む。
2431 = "Tranh thủ lúc này em cũng tiếp nước!\nUống ừng ực nước trong bình á."
# monologue
# JP: ぬるま湯みたいになっとるばってん、\nそいでも、体にしみしみ染みて、旨かとばい！！
2453 = "Dù nước đã thành ra như nước ấm rồi,\nnhưng uống vào vẫn ngấm tận ruột gan, ngon tuyệt vời á!!"
# 【凪】
# display as 凪
# JP: 「くはーーーーっ！！」
1584 = "「Khàaaaa!!」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
1591 = "「Fufu」"
# monologue
# JP: ちっちゃか鈴を振るみたいな声。\nハチロクの笑い声聞くと、疲ればスウって溶けてくばい！
2397 = "Giọng nói như tiếng rung của chiếc chuông nhỏ á.\nNghe tiếng cười của Hachiroku, bao mệt mỏi đều tan biến hết á!"
# 【ハチロク】
# display as 八六
# JP: 「上等です。これなら回復が叶います。\n[ゆのい,1]湯医駅での連絡バスとの接続は、定刻どおりに」
1764 = "「Tuyệt vời ạ. Thế này thì có thể phục hồi thời gian trễ rồi.\nViệc kết nối chuyển tàu với xe buýt liên tuyến tại ga Yunoi sẽ diễn ra đúng giờ ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
1962 = "「Thế thì tốt quá」"
# monologue
# JP: 前方注視ばしたままで、\nにーさんの顔がふわって緩む。
2254 = "Vẫn giữ nguyên ánh mắt tập trung nhìn về phía trước,\nnhưng nét mặt anh hai đã dịu đi á."
# monologue
# JP: そしたら、うちもゆるんじゃう。\nゆるんだら汗ば、ぶわあぁって出る。
2389 = "Thế là, em cũng thư giãn theo á.\nThư giãn rồi thì mồ hôi, lại túa ra như tắm á."
# 【双鉄】
# display as 雙鐵
# JP: 「凪もご苦労だったな。\nありがとう。いい投炭だった」
1544 = "「Nagi, em cũng vất vả rồi.\nCảm ơn em. Kỹ thuật xúc than tốt lắm.」"
# monologue
# JP: とっくに汗だくで暑いのに、\nにーさんにそぎゃん言われたら、余計にぽかぽかしよる。
2220 = "Rõ ràng là đã đổ mồ hôi đầm đìa và rất nóng,\nnhưng nghe anh hai nói vậy, lòng mình lại càng thấy ấm áp hơn."
# 【凪】
# display as 凪
# JP: 「こんなん全然！　準備運動にもならんけんね！」
1728 = "「Chuyện nhỏ thôi! Còn chưa tính là khởi động nữa kìa!」"
# monologue
# JP: 照れくさくって嬉しくて、\nにーさんと話したくって！！
2283 = "Vừa ngại ngùng vừa vui sướng,\nmình muốn nói chuyện với anh hai nhiều hơn nữa!!"
# 【凪】
# display as 凪
# JP: 「にーさんの方がすごかとばい！！　回復させとるときも、\n運転ちょっとも荒っぽくならなかったとばい！」
1681 = "「Anh hai mới giỏi đó!! Ngay cả lúc chạy bù giờ,\nlái tàu cũng không hề bị vội vàng chút nào luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはポーレットのおかげだな」
1967 = "「Đó là nhờ công của Paulette cả đấy.」"
# monologue
# JP: 「えっ？」て一瞬思うばってん、\n出発前のホームの景色ば、ぽって頭に浮かんできよる。
2212 = "Mình chợt nghĩ 'Hả?' một thoáng,\nnhưng cảnh tượng trên sân ga trước lúc xuất phát liền hiện ra trong đầu."
# 【凪】
# display as 凪
# JP: 「言われたらそれもおおありばい！\nポーねーちゃん、[えいご,1]詠語べらべらでかっこよかったとー！」
1957 = "「Anh nói vậy cũng đúng á!\nChị Paulette nói tiếng Anh lưu loát ngầu cực kỳ luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいなければ、\n記念写真を打ち切らせることは難しかったろうな」
1923 = "「Nếu không có Paulette,\nchắc khó mà ngắt ngang việc chụp ảnh lưu niệm được.」"
# 【凪】
# display as 凪
# JP: 「にーさんは、詠語ば話せんと？」
1679 = "「Anh hai không biết nói tiếng Anh hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日常会話程度はこなせるが、細かなニュアンスなどはな。\nお客様に失礼がないよう対応するなどは、とても無理だ」
1801 = "「Giao tiếp hàng ngày thì anh làm được, nhưng những sắc thái tỉ mỉ thì chịu.\nĐể ứng phó sao cho không thất lễ với hành khách là điều hoàn toàn không thể.」"
# 【凪】
# display as 凪
# JP: 「あー……そぎゃんとなら、にーさんだったら、\n確かにめんどーなことになったかもしれんとねー」
1608 = "「A……Nếu vậy thì, đổi lại là anh hai,\nchắc chắn mọi chuyện đã trở nên rắc rối rồi ha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。日ノ本人の鉄道マニ」
1816 = "「Đúng vậy. Người hâm mộ đường sắt ở Hinomoto...」"
# 【ハチロク】
# display as 八六
# JP: 「ファン、でございますよ？　双鉄さま」
1825 = "「Là người hâm mộ ạ? Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「失敬。日ノ本人の鉄道ファン顔負けの熱心さで、\n入れ替わり立ち替わり、写真を撮っていらしたからな」
1795 = "「Thất kính quá. Họ nhiệt tình đến mức khiến người hâm mộ đường sắt ở Hinomoto cũng phải chào thua,\ncứ luân phiên nhau thay đổi vị trí để chụp ảnh mà.」"
# 【凪】
# display as 凪
# JP: 「汽車ぽっぽのめずらしかとかねー。\nあれ？　けど」
1915 = "「Chắc là thấy tàu hỏa xình xịch hiếm lạ đó mà.\nỦa? Nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「けど、なんだ？」
1771 = "「Nhưng mà, sao cơ?」"
# 【凪】
# display as 凪
# JP: 「確か、蒸気機関車って、日ノ本よりずうっと前から、\n[えいこく,1]詠国やら[めいこく,1]冥国やら[どっこく,1]髑国にはあったんでしょお？」
1587 = "「Em nhớ là, đầu máy hơi nước đã có ở Anh, Mỹ và Đức\ntừ rất lâu trước cả Hinomoto rồi phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。蒸気機関車の発祥は[えいこく,1]詠国とされている。\n[えい]詠・[めい]冥・[どく]髑は競い合うように技術を発展させたと」
1818 = "「Ừ. Đầu máy hơi nước được cho là bắt nguồn từ Anh.\nAnh, Mỹ, Đức đã phát triển công nghệ như thể đang cạnh tranh với nhau vậy.」"
# monologue
# JP: にーさんの声に、ハチロクが頷く。\n『左様ですね』って、にーさんのこと見る目が言っとる。
2162 = "Nghe anh hai nói, Hachiroku gật đầu.\nÁnh mắt chị ấy nhìn anh hai như muốn nói 『Đúng là vậy ạ』."
# 【凪】
# display as 凪
# JP: 「やったら、冥国には日ノ本よりずうっとたくさん、\n蒸気機関車があるんじゃなかと？」
1965 = "「Vậy thì, ở Mỹ chắc chắn phải có nhiều đầu máy hơi nước\nhơn Hinomoto rất nhiều đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その辺の事情は……どうなのかな。\n冥国はエアクラ発祥の地でもあるし――ハチロク？」
1950 = "「Tình hình bên đó thì……thế nào nhỉ.\nMỹ cũng là nơi khởi nguồn của Aircra mà——Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも[さっこん,1]昨今の事情は存じ上げませんが――\n[きよみ,1]清美機関士から、お伺いしたことはございます」
1779 = "「Tôi cũng không rõ tình hình hiện tại thế nào——\nNhưng tôi từng nghe lái tàu Kiyomi kể lại ạ.」"
# monologue
# JP: 清美機関士！　聞いたことあると！\nハチロクの、帝鉄時代の機関士だったっていう人ばい。
2370 = "Lái tàu Kiyomi! Mình từng nghe nhắc tới rồi!\nLà lái tàu của Hachiroku thời còn ở Teitetsu đó."
# 【双鉄】
# display as 雙鐵
# JP: 「どんな話をだ？」
1697 = "「Cô ấy kể chuyện gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「[めいこく,1]冥国では、物に対する考え方がまるで違うと。\n日ノ本や[どっこく,1]髑国では、三十年先の運用のことも考えますが」
1698 = "「Ở Mỹ, cách suy nghĩ về đồ vật hoàn toàn khác biệt ạ.\nỞ Hinomoto hay Đức, người ta thường tính đến việc sử dụng trong 30 năm tới,」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに。鉄道車両の耐用年数は国産で三十年――\n髑国製は五〇年、一〇〇年とさえ聞くな」
1812 = "「Quả thực là vậy. Tuổi thọ của phương tiện đường sắt nội địa là 30 năm——\nĐồ của Đức sản xuất nghe nói có thể lên đến 50 năm, thậm chí 100 năm.」"
# 【ハチロク】
# display as 八六
# JP: 「冥国では、一〇年の耐用で充分と考えるそうです」
1914 = "「Còn ở Mỹ, họ cho rằng tuổi thọ 10 năm là đủ rồi ạ.」"
# 【凪】
# display as 凪
# JP: 「たった一〇年で使い捨てちゃうと！？\nちょーぜーたくばい！！」
1559 = "「Chỉ mới 10 năm đã vứt bỏ rồi sao!?\nQuá lãng phí luôn á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ……。\nやはり、豊かな国は考え方が極端に違うな」
1602 = "「Ưm……\nQuả nhiên, những quốc gia giàu có thì cách suy nghĩ cũng khác biệt hoàn toàn.」"
# 【ハチロク】
# display as 八六
# JP: 「まことに、ですね。ですが、その豊かさ、贅沢さは、\n恐らく、お二人のお考えとは、少し意味あいが違うかと」
1822 = "「Đúng vậy ạ. Tuy nhiên, sự giàu có và xa xỉ đó,\ncó lẽ mang ý nghĩa hơi khác một chút so với suy nghĩ của hai người.」"
# 【凪】
# display as 凪
# JP: 「違うって――どぎゃん意味あいばい？」
1483 = "「Khác là sao——mang ý nghĩa gì cơ?」"
# monologue
# JP: ふふふって、またハチロクば笑いよる。\n今度はちょこっと、いたずらな感じ！
2159 = "Hachiroku lại cười 'Fufufu'.\nLần này có cảm giác hơi tinh nghịch một chút!"
# 【ハチロク】
# display as 八六
# JP: 「『10年後には新技術・新素材でより優れた物を作れる』。\nそれゆえ、冥国の方は長く使うことを好まない、と」
1511 = "「『10 năm sau có thể tạo ra những thứ tốt hơn bằng công nghệ và vật liệu mới』.\nVì vậy, người Mỹ không thích sử dụng một món đồ quá lâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほぅ」
1819 = "「Hô.」"
# monologue
# JP: にーさんが、相づちみたいなため息みたいな声ば出す。\nうんうん、何度も頷いとる。
2271 = "Anh hai phát ra tiếng như đang hùa theo, lại như đang thở dài.\nAnh ấy gật đầu lia lịa 'Ừm ừm'."
# 【双鉄】
# display as 雙鐵
# JP: 「それは――なんとも凄まじい。\nもったいなくもあるが、素晴らしくもある考え方だな」
1714 = "「Thật là——đáng kinh ngạc.\nMột cách suy nghĩ tuy có phần lãng phí, nhưng cũng rất tuyệt vời.」"
# 【凪】
# display as 凪
# JP: 「かっこよかばい！　ハイテクばい！！\n凪さま、冥国の考え方気にいったばい！！」
1708 = "「Ngầu quá đi! Công nghệ cao nha!!\nNagi-sama thích cách suy nghĩ của nước Mỹ rồi đó!!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、確かに。\n冥国式は、凪と相性がよさそうですね」
1593 = "「Fufufu, đúng thật.\nPhong cách của Mỹ có vẻ rất hợp với Nagi nhỉ.」"
# monologue
# JP: 褒められたばい！　うれしかとー！！\nあ！　っていうか！！
2325 = "Được khen rồi! Vui quá đi!!\nA! Mà nhắc mới nhớ!!"
# 【凪】
# display as 凪
# JP: 「やけん、冥国には、\n蒸気機関車ばもう残っとらんのかも知れんの？？」
1792 = "「Vậy là, ở Mỹ,\ncó khi không còn lại đầu máy hơi nước nào nữa sao??」"
# 【ハチロク】
# display as 八六
# JP: 「かもしれません。歴史を重んじる国とも聞きますので、きっと、保存鉄道などはいくらかありましょうが」
1577 = "「Cũng có thể ạ. Tôi nghe nói đó cũng là một quốc gia coi trọng lịch sử, nên chắc chắn vẫn còn một vài tuyến đường sắt bảo tồn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「十年しか[も]保たんでいいと作られるものが、\n保存鉄道として、百年、二百年の時に耐えられるのか？」
1921 = "「Những thứ được chế tạo với suy nghĩ chỉ cần dùng 10 năm là đủ,\nliệu có thể chịu đựng được 100 năm, 200 năm với tư cách là đường sắt bảo tồn không?」"
# monologue
# JP: にーさんの声に、ピンってくる！！
2398 = "Nghe anh hai nói vậy, mình chợt nảy ra ý tưởng!!"
# 【凪】
# display as 凪
# JP: 「きっと違うばい！　大量生産ガーーーってして！\nそん中で、百年二百年持ちそーなヤツば保存するばい」
1489 = "「Chắc chắn không phải vậy đâu! Họ sẽ sản xuất hàng loạtttt luôn!\nTrong số đó, họ sẽ giữ lại những chiếc có vẻ trụ được 100, 200 năm để bảo tồn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1952 = "「Ồ.」"
# monologue
# JP: にーさんが、感心したみたいに目ば丸くする！\nハチロクも、合格ですって感じに頷いてくれとる！
2263 = "Anh hai tròn mắt ngạc nhiên như đang thán phục!\nHachiroku cũng gật đầu như muốn nói 'Em đậu rồi'!"
# 【ハチロク】
# display as 八六
# JP: 「その考え方が妥当でしょうね。\nわたくしの聞く冥国は、そのような国と思われます」
1777 = "「Cách suy nghĩ đó khá hợp lý đấy.\nNước Mỹ mà tôi nghe kể, có vẻ đúng là một quốc gia như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。大量生産で産まれた状態の良い個体を残す。\nそうすれば、10年後に総取替があったとしても――」
1802 = "「Ra là vậy. Giữ lại những cá thể có tình trạng tốt sinh ra từ quá trình sản xuất hàng loạt.\nNhư vậy, dù 10 năm sau có thay mới toàn bộ đi chăng nữa——」"
# 【凪】
# display as 凪
# JP: 「残されたこ以外の姉妹がどかーっと廃車になるけん、\nきっと、交換部品も大量に確保できるばい！！」
1973 = "「Những chị em khác ngoài chiếc được giữ lại sẽ bị loại bỏ hàng loạt,\nnên chắc chắn có thể đảm bảo được một lượng lớn phụ tùng thay thế!!」"
# 【ハチロク】
# display as 八六
# JP: 「すばらしい考察です。凪。\n冥国式の考え方は、本当に凪には馴染むようですね」
1796 = "「Suy luận tuyệt vời lắm, Nagi.\nCách suy nghĩ kiểu Mỹ, có vẻ thực sự rất hợp với em nhỉ.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんほめられると、照れくさかとばーい！」
1517 = "「Được khen như vậy, em ngại lắm đó nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし。となると、だ」
1575 = "「Nhưng mà. Nếu vậy thì.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、なんでしょう、双鉄様」
1772 = "「Vâng, có chuyện gì sao, ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「冥国式に作られた車両は、海外には売れん気がする。\nが、実際、日ノ本にも冥国出身の輸入\x%l蒸機;#00ffc040;蒸機%l;#;は多いよな？」
1955 = "「Anh cảm giác những toa xe được chế tạo theo kiểu Mỹ sẽ không bán được ra nước ngoài.\nNhưng thực tế, ở Hinomoto cũng có rất nhiều \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; nhập khẩu từ Mỹ đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
1670 = "「Đó là vì——」"
# monologue
# JP: ハチロクの口がちょこっと空いて、\n何ぞ言いかけてまた閉じる。
2157 = "Hachiroku hé miệng ra một chút,\nđịnh nói gì đó rồi lại thôi."
# monologue
# JP: 赤いおめめがくりぃって、\nいたずらっぽく、うちのこと見る。
2276 = "Đôi mắt đỏ của chị ấy chớp chớp,\nnhìn mình với vẻ đầy tinh nghịch."
# 【ハチロク】
# display as 八六
# JP: 「凪、わかりますか？」
1547 = "「Nagi, em có biết tại sao không?」"
# 【凪】
# display as 凪
# JP: 「わかる気ばすると！\nえっと、発注しとるのは、日ノ本でしょお？」
1585 = "「Em có cảm giác là mình biết á!\nƯm, bên đặt hàng là Hinomoto phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、仕様は日ノ本側でオーダーだものな。\nそうなれば、日ノ本コンセプトで冥国の工業力を使える」
1664 = "「A! Đúng rồi, thông số kỹ thuật là do phía Hinomoto đặt hàng mà.\nNếu vậy, chúng ta có thể sử dụng sức mạnh công nghiệp của Mỹ theo ý tưởng của Hinomoto.」"
# 【ハチロク】
# display as 八六
# JP: 「でしょうね。\nうふふ、本当に今日の凪は冴えていますね」
1810 = "「Chắc là vậy rồi.\nFufufu, Nagi hôm nay thật sự rất nhạy bén nha.」"
# 【凪】
# display as 凪
# JP: 「じーちゃんも[うけおい,1]請負仕事するけんね！\nきっと、それと同じって感じただけばい！！」
1884 = "「Ông nội cũng hay nhận làm thầu khoán mà!\nChắc chắn là giống hệt như vậy thôi!!」"
# monologue
# JP: 気分よかとー！\nなんだか凪さま、頭のよーなった気分――っ！！！
2452 = "Vui quá đi!\nCảm giác Nagi-sama tự nhiên thông minh hẳn ra——っ!!!"
# 【ハチロク】
# display as 雙鐵＆八六
# JP: 「凪」
# 1531 = "「凪」" 
# 【凪】
# display as 凪
# JP: 「わかっとるばーーい！」
1705 = "「Đã rõoo!」"
# monologue
# JP: 十四個目の橋ばこえたら、もうあとちょっとで上り勾配！\nいわれんでも、考えんでももう、体ば動く！！
2433 = "Vượt qua cây cầu thứ mười bốn, chỉ một chút nữa là đến dốc lên!\nChẳng cần ai bảo, chẳng cần suy nghĩ, cơ thể mình đã tự động di chuyển rồi!!"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# monologue
# JP: にーさんもまた逆転機ミッドギアにして、\nバイパス弁とシリンダー排水弁ば閉じて！！
2253 = "Anh hai cũng chuyển cần đảo chiều về số trung gian,\nđóng van bypass và van xả nước ngưng xi lanh lại!!"
# 【双鉄】
# display as 雙鐵
# JP: 「あけーーーーーーるっ！」
1858 = "「Mở van tiết lưuuuuuuu!」"
# monologue
# JP: そしたらうちも、ブロア止め弁ばしめて\n通風ばブラストに任せて！！
2396 = "Sau đó mình cũng đóng van thiết bị thổi gió lại\nvà giao phó việc thông gió cho khí thải xi lanh!!"
# 【凪】
# display as 凪
# JP: 「[ハチロク,3]8620！　がんばって登るばーい！！」
1201 = "「8620! Cố gắng leo lên nào!!」"
# monologue
# JP: （ざくっ！　がっ！　ざくっ！　がっ！！）
# 2476 = "（吱！呀！吱！呀！）" 
# 【ふかみ】
# display as 深美
# JP: 「あ！　凪ちゃん！　凪ちゃーん！！」
1611 = "「A! Nagi! Nagi ơi!!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　なんで[ゆのい,1]湯医におるとばい！！？」
1739 = "「Fukami! Sao cậu lại ở Yunoi vậy!!?」"
# 【ふかみ】
# display as 深美
# JP: 「動物がかり。\n日曜日でも、餌あげにこないとだから」
1783 = "「Tớ trực chăm sóc động vật.\nDù là Chủ nhật thì tớ cũng phải đến cho chúng ăn.」"
# monologue
# JP: 言われたらすぐ思い出す。覚えとる！
2399 = "Nghe cậu ấy nói mình mới nhớ ra. Mình có nhớ!"
# monologue
# JP: ふかみちゃん、学級会で自分から手ばあげたの、\nあの日、あの時が初めてだったけん！
2297 = "Fukami đã tự mình giơ tay trong buổi họp lớp,\nđó là lần đầu tiên cậu ấy làm vậy!"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、\n動物がかりになりたがっとったもんねー」
1887 = "「Fukami,\ncậu luôn muốn làm người chăm sóc động vật mà nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「うん。おうちのほう余裕できるようになったから。\n思い切って、立候補しちゃった」
1647 = "「Ừm. Ở nhà tớ cũng rảnh rỗi hơn rồi.\nNên tớ đã đánh bạo ứng cử luôn.」"
# monologue
# JP: にこおって、ふかみちゃんば笑いよる。\n……にーさんと会う前だったら、考えられんこと。
2318 = "Fukami cười thật tươi.\n……Chuyện này thật không thể tưởng tượng nổi nếu là trước khi gặp anh hai."
# monologue
# JP: 船頭さんたちをまた雇えるようになったことも、\nふかみちゃんが、クラスの係に立候補！　したことも！！
2387 = "Cả việc có thể thuê lại những người lái đò,\nvà cả việc Fukami ứng cử làm cán sự lớp nữa!!"
# 【ふかみ】
# display as 深美
# JP: 「[このこ,3]8620の……バーベキュー列車のおかげ。\n御一夜が元気を取り戻せたの、本当に」
1968 = "「Nhờ có 8620……và đoàn tàu BBQ.\nOhimitera đã thực sự lấy lại được sức sống rồi.」"
# 【凪】
# display as 凪
# JP: 「よかことばい！\nそいで、朝イチの\x%lキハ07s;#00ffc040;キハ07s%l;#;で来たと？」
1688 = "「Tuyệt quá! \nVậy cậu đến đây bằng chuyến \\x%lキハ07s;#00ffc040;Kiha 07S%l;#; đầu tiên vào buổi sáng hả?」"
# 【ふかみ】
# display as 深美
# JP: 「うん。本も借りてたら、半端な時間になっちゃって。\nそれで、凪ちゃんに会っていこうって、待ってたの」
1654 = "「Ừm. Tớ còn đi mượn sách nữa nên thời gian bị lỡ dở.\nVì thế tớ đợi ở đây để gặp Nagi luôn.」"
# 【凪】
# display as 凪
# JP: 「そんな～ん、毎日あってるでしょお」
1863 = "「Trời ạ~, ngày nào tụi mình chả gặp nhau.」"
# 【ふかみ】
# display as 深美
# JP: 「でも、機関車のお仕事中の凪ちゃんとは、\nなかなかこんな風におしゃべりできないし――」
1573 = "「Nhưng mà, lúc Nagi đang làm việc trên đầu máy,\ntụi mình đâu có dịp nói chuyện như thế này——」"
# monologue
# JP: 言って、急にふかみちゃんが声ばひそめる。
2425 = "Nói rồi, Fukami đột nhiên hạ thấp giọng."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、いっつもあんなに大変なの？\nさっき、外国の人たちにもみくちゃにされてたでしょ？」
1736 = "「Nagi lúc nào cũng vất vả thế sao?\nLúc nãy cậu bị mấy người nước ngoài chen lấn xô đẩy đúng không?」"
# 【凪】
# display as 凪
# JP: 「もみくちゃは大げさばい！\n記念写真のパネル代わりにされとっただけばい！」
1599 = "「Chen lấn xô đẩy thì hơi quá lời rồi!\nChỉ là bị coi như tấm bảng nền để chụp ảnh lưu niệm thôi!」"
# 【ふかみ】
# display as 深美
# JP: 「パネルがわり？」
1917 = "「Bảng nền á?」"
# 【凪】
# display as 凪
# JP: 「そうばい！」
1806 = "「Đúng vậy!」"
# monologue
# JP: 8620のわきに走って行って、\nポーズばとって、すぐふかみちゃんのとこに駆け戻る。
2235 = "Mình chạy đến cạnh 8620,\ntạo dáng một cái, rồi chạy ù về chỗ Fukami."
# 【凪】
# display as 凪
# JP: 「こぎゃんして、ハチロクとにーさんとうちと[ハチロクニイマル,3]8620と、\n観光客さんたち、いっしょに写真に写りたがるけん」
1749 = "「Như vầy nè, du khách rất thích chụp ảnh chung\nvới Hachiroku, anh hai, tớ và 8620.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！\n『[ハチロク,3]8620乗車記念』とか、そういうパネルの代わり？」
1613 = "「A!\nGiống như mấy tấm bảng 『Kỷ niệm đi tàu 8620』 các kiểu á hả?」"
# 【凪】
# display as 凪
# JP: 「そうばい――にーさんと一緒に必死で回復運転したのに、\n結局、乗り継ぎのバスの方が遅れて来よったけんねー」
1864 = "「Đúng vậy——Mặc dù tớ với anh hai đã liều mạng chạy bù giờ,\nnhưng rốt cuộc thì xe buýt trung chuyển lại đến trễ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1606 = "「啊……」" 
# monologue
# JP: ふかみちゃん、ふって一瞬、下ば向く。
2301 = "Fukami chợt cúi gằm mặt xuống một thoáng."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、どぎゃんしたと？」
1741 = "「Fukami, cậu sao vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん！　なんでもっ。\nほんと、凪ちゃんがんばったんだなぁ、って思って」
1496 = "「Không! Không có gì đâu.\nTớ chỉ nghĩ là, Nagi đã rất cố gắng thôi.」"
# 【凪】
# display as 凪
# JP: 「ふえ？　わ！！」
1627 = "「Hả? Oái!!」"
# monologue
# JP: ふかみちゃん、うちの帽子ばひょいって取って――
2292 = "Fukami thoăn thoắt tháo mũ của mình xuống——"
# monologue
# JP: （ぎゅううっ）
2488 = "（Vắt chặt）"
# 【ふかみ】
# display as 深美
# JP: 「汗、こんなにだもん。大変だよね」
1513 = "「Nhiều mồ hôi thế này cơ mà. Chắc vất vả lắm nhỉ.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　汗なんてしぼったら汚かとばい！！」
1742 = "「Fukami! Vắt mồ hôi ra bẩn lắm đó!!」"
# 【ふかみ】
# display as 深美
# JP: 「汚くないよぉ。\n凪ちゃんが一生懸命がんばった汗じゃない――はいっ」
1493 = "「Không bẩn đâu.\nĐây là mồ hôi của sự cố gắng hết mình của Nagi mà——Nè.」"
# monologue
# JP: （ぽすっ）
2483 = "（Bụp）"
# 【凪】
# display as 凪
# JP: 「ふぁっ」
1589 = "「Oa.」"
# monologue
# JP: ふかみちゃん、やさしく帽子ばもどしてくれる。\nなんだか、めちゃくちゃうれしかとー！
2315 = "Fukami nhẹ nhàng đội lại mũ cho mình.\nKhông hiểu sao, mình thấy vui quá chừng!"
# 【凪】
# display as 凪
# JP: 「すっごくサッパリスッキリしたばい！\nふかみちゃん！　ありがとお！」
1874 = "「Thấy sảng khoái hẳn ra luôn á!\nFukami! Cảm ơn cậu nha!」"
# 【ふかみ】
# display as 深美
# JP: 「うふふ、どういたしまして」
1660 = "「Fufufu, không có chi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ凪――\nっと、ふかみもいたのか。日曜なのに学園か？」
1666 = "「A, Nagi——\nỒ, có cả Fukami ở đây nữa à. Chủ nhật mà cũng đến trường sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　双鉄おにいさん」
1616 = "「A! Anh Soutetsu.」"
# monologue
# JP: ぱあって、ふかみちゃんがもっと――\nいっつもよりもっとかわいくなる。
2305 = "Gương mặt Fukami bừng sáng lên——\ntrông còn đáng yêu hơn cả bình thường nữa."
# monologue
# JP: ただでさえきれいなお花の上に、\nお天気雨が降ったみたいに、キラキラしよる。
2322 = "Giống như cơn mưa bóng mây tưới mát\nlên một bông hoa vốn đã xinh đẹp, trông lấp la lấp lánh."
# 【双鉄】
# display as 雙鐵
# JP: 「ご苦労だったな、凪。\nほら、ふかみも」
1935 = "「Em vất vả rồi, Nagi.\nĐây, cả Fukami nữa.」"
# 【凪】
# display as 凪
# JP: 「やったばい！　ジュースばい！！\nさすがにいさん、気がきくばい！！！」
1692 = "「Tuyệt quá! Là nước ép!!\nQuả không hổ danh anh hai, tâm lý ghê!!!」"
# monologue
# JP: プルタブ引くのもじれったくって、\nぐいぐいがんがん！　一気に飲んじゃうっ！！
2239 = "Mình nôn nóng giật phăng khoen lon,\nrồi ực ực ực! Uống cạn một hơi luôn!!"
# 【凪】
# display as 凪
# JP: 「ぷはぁっ！　うまかとー！　染みたとー！\nごちそうさまばいっ！！」
1582 = "「Phù! Ngon quá! Sảng khoái quá!\nCảm ơn anh nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。お粗末様だ。\nむ？　どうした、ふかみ」
1642 = "「Ừm. Không có gì.\nHửm? Sao thế, Fukami?」"
# monologue
# JP: ふかみちゃん、ジュース全然のんでなかと。\nプルタブ、カシュっ！　ってもしてなかとばい。
2294 = "Fukami không uống miếng nước ép nào cả.\nKhoen lon còn chưa thèm giật ra nữa."
# 【ふかみ】
# display as 深美
# JP: 「これ……えと、\n双鉄おにいさんが飲む分、ですよね？」
1949 = "「Cái này……ưm,\nlà phần của anh Soutetsu uống phải không ạ?」"
# 【凪】
# display as 凪
# JP: 「！！」
1617 = "「!!」"
# monologue
# JP: 言われてみたらきっとそうばい！
2444 = "Nghe cậu ấy nói mình mới chợt nhận ra!"
# monologue
# JP: だってにーさん、ふかみちゃんがいることに、\nジュース持ってきて、そのとき初めて気づいたんやけん。
2249 = "Bởi vì lúc mang nước ép tới,\nanh hai mới phát hiện ra là có Fukami ở đây mà."
# 【双鉄】
# display as 雙鐵
# JP: 「気にするな。もう一本買えばいいだけだ」
1865 = "「Đừng bận tâm. Anh đi mua lon khác là được.」"
# 【ふかみ】
# display as 深美
# JP: 「気にします。です。それに、わたし――\n今はそんなに、おのど、かわいてない、です。から――」
1834 = "「Có bận tâm chứ ạ. Với lại, em——\nbây giờ cũng không khát nước lắm. Nên là——」"
# monologue
# JP: （カシュっ）
2478 = "（Tách）"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん、飲んでください。\n飲みきれなかったら、それ貰うのでわたし、充分です」
1976 = "「Anh Soutetsu, anh uống đi ạ.\nNếu anh uống không hết thì cho em xin phần còn lại là được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1704 = "「Vậy sao?」"
# monologue
# JP: にーさんが、ごくん、ごくんって、\n喉ばならしてジュース飲む。
2258 = "Anh hai tu ừng ực, ừng ực,\nuống cạn lon nước ép."
# monologue
# JP: 顔がほとんど空を向いて、\n缶が完全に逆立ちしそうで――
2147 = "Mặt anh ngửa hẳn lên trời,\nlon nước gần như dốc ngược hoàn toàn——"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　僕はこれで充分だ――っと。\nいささか飲み過ぎてしまったか」
1639 = "「Ừm! Anh uống chừng này là đủ rồi——\nHình như anh lỡ uống hơi nhiều mất rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「ううん。わたし。\n今ほんとに、おのどかわいてないです、から」
1862 = "「Không sao đâu ạ. Em.\nBây giờ em thực sự không khát nước lắm đâu.」"
# monologue
# JP: （こくんっ）
2479 = "（Ực）"
# 【凪】
# display as 凪
# JP: 「！！！」
# 1620 = "「啊！！！」" 
# monologue
# JP: ちょっとほっぺが赤くして、\n飲み方、おしとやかでかわゆかとーーー！
2311 = "Hai má cậu ấy hơi ửng hồng,\ncách uống nước cũng dịu dàng và đáng yêu quá đi mất!!!"
# monologue
# JP: ふかみちゃん、おんなのこっぽくて、\nめちゃくちゃかわいらしかとばい！！！
2457 = "Fukami trông vô cùng nữ tính,\nđáng yêu hết sức luôn!!!"
# 【ふかみ】
# display as 深美
# JP: 「うふふ。ごちそうさま、です。\nとっても甘くて、おいしかった――です」
1662 = "「Fufufu. Cảm ơn anh ạ.\nNước ép ngọt và ngon lắm——ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それならば何よりだ」
1953 = "「Vậy sao, thế thì tốt quá.」"
# monologue
# JP: 凪さま、ううん、うち――わたし、も！
2347 = "Nagi-sama, à không, mình——tớ, cũng vậy!"
# monologue
# JP: ああいう風にできるようになって、にーさんに、\nもーっとちやほやして欲しかとばい！
2337 = "Mình cũng muốn trở nên dịu dàng như thế,\nđể được anh hai cưng chiều nhiều hơn!"
# 【双鉄】
# display as 雙鐵
# JP: 「でだ、凪」
1724 = "「Thế này nhé, Nagi.」"
# 【凪】
# display as 凪
# JP: 「ひえっ！！？」
1594 = "「Hả!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　すまん、びっくりさせたか」
1658 = "「Hửm? Xin lỗi, anh làm em giật mình à.」"
# 【凪】
# display as 凪
# JP: 「にーさんのせいじゃなかと！\nちょこっとタイミング悪かっただけばい」
1487 = "「Không phải tại anh hai đâu!\nChỉ là thời điểm hơi không hợp lý chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1820 = "「Thế à?」"
# 【凪】
# display as 凪
# JP: 「そうばい！」
# 1806 = "「是咧！」" 
# monologue
# JP: にーさんのこと考えとったら急に呼ばれて、\n心臓、どきーんて跳ね上がったと！
2355 = "Đang nghĩ về anh hai thì tự nhiên bị gọi,\nlàm tim mình đập thình thịch luôn á!"
# monologue
# JP: ばってん、そんなん恥ずかしてよー言えんけん、\n話！　ひっぱりたくなかとよ。
2151 = "Nhưng mà, chuyện xấu hổ như vậy sao nói ra được,\nđành phải đánh trống lảng thôi."
# 【凪】
# display as 凪
# JP: 「それよりにーさん、何のよーと？」
1725 = "「Quan trọng hơn là anh hai định nói gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「朗報だ。\nそれを知らせるために、凪を探していた」
1828 = "「Có tin vui đây.\nAnh đi tìm Nagi để báo tin này.」"
# 【凪】
# display as 凪
# JP: 「ろーほー？」
1630 = "「Tin diu?」"
# 【ふかみ】
# display as 深美
# JP: 「素敵なお知らせ、って意味だよ？　凪ちゃん」
1750 = "「Ý là tin tức tuyệt vời đó, Nagi.」"
# 【凪】
# display as 凪
# JP: 「良か知らせばい！？　聞きたかとばーい！！」
1710 = "「Tin tốt hả!? Cho em nghe với!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクがな。\n凪への機関士教育を始めたいと」
1521 = "「Hachiroku ấy mà.\nCô ấy nói muốn bắt đầu đào tạo lái tàu cho Nagi.」"
# 【凪】
# display as 凪
# JP: 「機関士教育！？」
1579 = "「Đào tạo lái tàu!?」"
# monologue
# JP: 心臓！　今日は大忙しばい！！
2144 = "Trái tim ơi! Hôm nay mày bận rộn quá rồi đó!!"
# monologue
# JP: またバクバクって、\n音聞こえるほど暴れとるばい！！
2402 = "Lại đập thình thịch,\nmạnh đến mức có thể nghe thấy tiếng luôn!!"
# 【凪】
# display as 凪
# JP: 「凪さま――\n凪さま、機関士になれると！！？」
1839 = "「Nagi-sama——\nNagi-sama, sắp được làm lái tàu rồi sao!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「少し前から、凪の様子を観察していたらしい。\n今日のハチロクがおしゃべりだったのは、その仕上げだ」
1696 = "「Có vẻ như cô ấy đã quan sát biểu hiện của Nagi từ trước rồi.\nHôm nay Hachiroku nói nhiều như vậy, chính là bước hoàn thiện cuối cùng đó.」"
# 【ふかみ】
# display as 深美
# JP: 「様子を観察って……\n凪ちゃんの、何を、です？」
1924 = "「Quan sát biểu hiện……\nLà quan sát cái gì của Nagi vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論。すべてだ。投炭技術、カマのあしらい。\n整備・清掃。知識、接客――その他もろもろ」
1888 = "「Tất nhiên là toàn bộ rồi. Kỹ thuật xúc than, xử lý lò hơi.\nBảo dưỡng, dọn dẹp. Kiến thức, tiếp khách——và nhiều thứ khác nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「わ」
# 1589 = "「哇」" 
# monologue
# JP: ぴょこん、って、ふかみちゃんが小さく跳ねる。\nほっぺがぱあって、赤くなる！
2314 = "Fukami khẽ bật nhảy lên một cái.\nHai má cậu ấy ửng đỏ bừng!"
# 【ふかみ】
# display as 深美
# JP: 「それで、凪ちゃん認められたんですか！？\nすごいすごいすごい！　やったね！　凪ちゃん！！」
1503 = "「Vậy là, Nagi đã được công nhận rồi sao!?\nTuyệt quá tuyệt quá tuyệt quá! Tuyệt vời! Nagi ơi!!」"
# monologue
# JP: ふかみちゃん！　自分のことみたいに喜んでくれよる！\nうちの手つかんで、ぴょんぴょん跳ねてくれとる！！
2320 = "Fukami! Cậu ấy vui mừng như thể chuyện của chính mình vậy!\nCậu ấy nắm lấy tay mình, nhảy cẫng lên!!"
# 【凪】
# display as 凪
# JP: 「ありがとおふかみちゃん！\nそぎゃんと喜んでくれて、うち、嬉しかとー！」
1930 = "「Cảm ơn Fukami nha!\nThấy cậu vui như vậy, mình cũng vui lây luôn á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、お祝いはまだ先に取っておけ。\n機関士試験に合格するとは限らんぞ」
1499 = "「Không, hãy để dành việc ăn mừng cho sau này đi.\nChưa chắc em đã vượt qua kỳ thi lái tàu đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
# 1606 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「僕も経験しているが、そう甘くはない訓練・試験だ」
1780 = "「Anh cũng từng trải qua rồi, quá trình huấn luyện và thi cử không hề dễ dàng đâu.」"
# monologue
# JP: わかっとるけん、余計に燃える。\n絶対、合格するって思う。
2227 = "Em biết mà, thế nên lại càng hừng hực khí thế hơn.\nEm nhất định sẽ thi đậu."
# monologue
# JP: 機関士の資格ばとれたら、\nにーさんの見とる景色を、うちも見れるけん！！
2201 = "Nếu lấy được bằng lái tàu,\nmình cũng có thể ngắm nhìn khung cảnh mà anh hai đang thấy!!"
# 【凪】
# display as 凪
# JP: 「望むとこ――あっ」
1852 = "「Cầu còn không được——A.」"
# 【ふかみ】
# display as 深美
# JP: 「大丈夫だよ、凪ちゃん」
1861 = "「Không sao đâu, Nagi.」"
# monologue
# JP: 言いかけて思い出して、\n顔ば見たとたんに、ふかみちゃんが笑ってくれる。
2228 = "Đang nói dở thì sực nhớ ra,\nvừa nhìn sang thì thấy Fukami đang mỉm cười với mình."
# 【ふかみ】
# display as 深美
# JP: 「船頭さん、もう一人復帰してくれることになったの。\nだから、凪ちゃんのシフト、もっと減らせるよ？」
1563 = "「Có thêm một người lái đò nữa sắp quay lại làm việc rồi.\nNên ca trực của Nagi có thể giảm bớt nữa đó.」"
# 【凪】
# display as 凪
# JP: 「それはそれでさみしかと――\nばってん！　今は助かるばい！！」
1948 = "「Thế thì cũng hơi buồn một chút——\nNhưng mà! Bây giờ thì đỡ quá rồi!!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！　凪ちゃん、機関士さんになって！\nそれで、バーベキュー列車をもっとにぎやかにして！」
1637 = "「Ừm! Nagi, hãy trở thành lái tàu đi!\nRồi làm cho đoàn tàu BBQ náo nhiệt hơn nữa nhé!」"
# 【凪】
# display as 凪
# JP: 「わかったばい！！\nクマ川に、じゃんじゃんお客さん流すばーい！」
1713 = "「Mình biết rồi!!\nSẽ đưa thật nhiều hành khách đến sông Kuma luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「それじゃお客さんおぼれちゃう！？」
1931 = "「Thế thì hành khách chết đuối mất!?」"
# 【凪】
# display as 凪
# JP: 「間違えたばい！　クマ川下りに流すばい！！」
1929 = "「Nói nhầm! Là đưa họ đi xuôi dòng sông Kuma!!」"
# 【ふかみ】
# display as 深美
# JP: 「やったぁ！」
1690 = "「Tuyệt quá!」"
# monologue
# JP: ふかみちゃんが手ばあげるけん、\nハイタッチ！！！
2303 = "Fukami giơ tay lên,\nhai đứa đập tay cái bốp!!!"
# monologue
# JP: （パチーンっ！）
2481 = "（Bốp!）"
# monologue
# JP: すっご良か音に、\n気分ももっと良くなるけん！！
2401 = "Âm thanh vang lên nghe đã tai ghê,\ntâm trạng mình cũng tốt lên hẳn!!"
# 【凪】
# display as 凪
# JP: 「にーさん！　それで、機関士修行ばいつ始めると？」
1683 = "「Anh hai! Vậy khi nào thì bắt đầu tu luyện lái tàu?」"
# 【ふかみ】
# display as 雙鐵＆深美
# JP: 「うむ」\n「修行！！」
1604 = "「Ừm」\n「Tu luyện!!」"
# 【凪】
# display as 凪
# JP: 「わ！？」
1590 = "「Oái!?」"
# monologue
# JP: ふかみちゃん、急におっきな声だして、\nかばんばごそごそいじり始める。
2307 = "Fukami tự nhiên lớn tiếng,\nrồi bắt đầu lục lọi trong cặp sách."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、どぎゃんしよったと？」
# 1741 = "「小深，你怎麼咧？」" 
# 【ふかみ】
# display as 深美
# JP: 「わたし、伝言頼まれてたの、凪ちゃんのお師匠さんに。それもあって、凪ちゃんのこと待ってようって」
1515 = "「Tớ được sư phụ của Nagi nhờ chuyển lời. Đó cũng là một phần lý do tớ đợi Nagi ở đây.」"
# 【凪】
# display as 凪
# JP: 「お師匠さんに！？　どこであったと？」
1758 = "「Sư phụ á!? Cậu gặp ở đâu vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「\x%lキハ07s;#00ffc040;キハ07s%l;#;の中で。\n山に修行にいくとかいってた」
1673 = "「Ở trên \\x%lキハ07s;#00ffc040;Kiha 07S%l;#;.\nCô ấy nói là đi lên núi tu luyện hay gì đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「湯医からなら、[しちふさ,1]七房山か？」
1767 = "「Từ Yunoi đi thì chắc là núi Ichifusa nhỉ?」"
# 【ふかみ】
# display as 深美
# JP: 「そこまでは聞かなかった。です」
1951 = "「Tớ cũng không hỏi kỹ đến thế.」"
# 【凪】
# display as 凪
# JP: 「お師匠さんが山ごもりなんて珍しくもなかとばい！\nそれより、ふかみちゃんが頼まれた伝言って」
1757 = "「Sư phụ bế quan trên núi cũng chẳng có gì lạ đâu!\nQuan trọng hơn là lời nhắn mà cậu được nhờ chuyển là gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、そう。わたし、メモとったの。\n大事そうなことだったから」
1622 = "「À, đúng rồi. Tớ có ghi chú lại.\nVì nghe có vẻ quan trọng.」"
# monologue
# JP: カバンからメモ。
2299 = "Lấy sổ tay từ trong cặp ra."
# monologue
# JP: かわいいうさぎの、ふかみちゃんっぽい、\n女の子っぽいの。
2290 = "Cuốn sổ hình chú thỏ dễ thương, rất giống phong cách của Fukami,\ntrông thật nữ tính."
# 【ふかみ】
# display as 深美
# JP: 「ええとね。『しばらく山にこもるから、\n自習の代わりに、[れんせい,1]錬成大会で優勝しておきなさい』」
1790 = "「Để xem nào. 『Ta sẽ lên núi bế quan một thời gian,\nthay vì tự học, con hãy đi giành chức vô địch Đại hội Rèn luyện đi』」"
# 【凪】
# display as 凪
# JP: 「っ！！」
# 1617 = "「啊！！」" 
# monologue
# JP: 心臓ば、またばくーん！　ってする！！
2331 = "Tim mình lại đập thịch một cái!!"
# monologue
# JP: すごかと！！\nこいも、ろーほー！　大ろーほーばい！！！
2281 = "Tuyệt quá!!\nĐây cũng là tin vui! Tin cực kỳ vui luôn!!!"
# 【凪】
# display as 凪
# JP: 「[れんせい,1]錬成大会！！！　\nお師匠さん！　やっと出場許可くれたばい！！！」
1902 = "「Đại hội Rèn luyện!!!\nSư phụ! Cuối cùng cũng cho phép mình tham gia rồi!!!」"
# 【ふかみ】
# display as 深美
# JP: 「ええ！？　それって、\n凪ちゃんでも出られないような凄い大会なの？」
1597 = "「Hả!? Đó là,\nmột đại hội khủng đến mức ngay cả Nagi cũng không được tham gia sao?」"
# 【凪】
# display as 凪
# JP: 「お師匠さんが許可くれなかっただけばい！\n凪さまなら、全国優勝も夢じゃなかとよー！」
1571 = "「Chỉ là sư phụ không cho phép thôi!\nVới Nagi-sama thì vô địch toàn quốc cũng không phải là giấc mơ đâu nha!」"
# 【ふかみ】
# display as 深美
# JP: 「全国！？　すごい！！」
1909 = "「Toàn quốc á!? Giỏi quá!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ちょっと待ってくれ」
1629 = "「Này, đợi đã.」"
# 【凪】
# display as 凪
# JP: 「ふえっ！？」
1595 = "「Hả!?」"
# monologue
# JP: にーさん、真面目な顔しとる。
2265 = "Anh hai làm vẻ mặt rất nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「……凪が言っているのは、\n『全日ノ本[れんせい,1]錬成大会』のことだよな？　剣道の」
1209 = "「……Nagi đang nói đến,\n『Đại hội Rèn luyện toàn Hinomoto』 phải không? Về kiếm đạo ấy.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　にーさん、くわしかと――\nって、もしかしてにーさんも出場経験あると！？」
1808 = "「Đúng vậy! Anh hai rành quá ha——\nƠ, không lẽ anh hai cũng từng tham gia rồi!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。言われるがまま習っていたゆえ――\nと、いうかだ」
1652 = "「Ừm. Vì anh học theo những gì được dạy nên——\nÀ, mà nói đúng hơn thì.」"
# monologue
# JP: 急ににーさん、うちの顔ばじっと見る。
2261 = "Tự nhiên anh hai nhìn chằm chằm vào mặt mình."
# monologue
# JP: ドキドキしっぱなしの心臓が、\nばくんばくんって、もっと大きな音ば立てよる。
2345 = "Trái tim vốn đang đập thình thịch,\ngiờ lại càng đập mạnh và kêu to hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「――予選大会には出ているのか？」
1204 = "「——Em đã tham gia vòng loại chưa?」"
# monologue
# JP: へ？\nええと……
2244 = "Hả?\nƯm……"
# monologue
# JP: なにいわれてるのか、よーわからんばい。
2441 = "Anh ấy đang nói gì vậy, mình không hiểu lắm."
# 【凪】
# display as 凪
# JP: 「よせん……って――何の予選ばい？？？」
1979 = "「Dòng lọi……là sao——Vòng loại gì cơ???」"
# monologue
# JP: （だだだだだっ！）
2484 = "（Bịch bịch bịch bịch bịch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　すまん、プリンタを貸してくれ！」
1873 = "「Paulette! Xin lỗi, cho anh mượn máy in một lát!」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん、おかえりなさぁい――って！\nふわぁ！　まっくろですねぇ」
1975 = "「Anh Soutetsu, mừng anh về nha——ơ!\nOa! Anh đen thui thùi lùi luôn rồi ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「プリンターどうぞです。\nなにがあったんですか？」
1561 = "「Máy in đây ạ.\nCó chuyện gì vậy anh?」"
# monologue
# JP: あわわ、\nポーねーちゃんもれいなも、びっくりした顔。
2242 = "Oa oa,\ncả chị Paulette và Reina đều trưng ra vẻ mặt ngạc nhiên."
# monologue
# JP: なんだか迷惑かけとるみたいで、\nちょこっといごこち悪かとばい。
2278 = "Cảm giác như mình đang làm phiền mọi người,\nthấy hơi ngại ngại một chút."
# 【凪】
# display as 凪
# JP: 「なんでもなかとばい！\nただ、うちが、その……準備不足だっただけばい」
1860 = "「Không có chuyện gì đâu!\nChỉ là, ừm……mình chuẩn bị chưa được kỹ càng thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「準備不足、ですかぁ？」
1880 = "「Chuẩn bị chưa kỹ càng, là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪というより、\n凪の師匠の準備不足――というか、知識不足だ」
1501 = "「Nói đúng hơn không phải Nagi,\nmà là sư phụ của Nagi chuẩn bị chưa kỹ——hay nói trắng ra là thiếu kiến thức.」"
# monologue
# JP: いいながら、もうにーさんはパソコンばいじっとる。
2269 = "Vừa nói, anh hai vừa thao tác trên máy tính."
# monologue
# JP: 煤、椅子とキーボードにきっとつくけん。\nあとでうちが、綺麗に掃除させてもらわんといかんばい。
2381 = "Chắc chắn muội than sẽ bám vào ghế và bàn phím mất.\nLát nữa mình phải xin phép lau dọn sạch sẽ mới được."
# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃんのお師匠さん……って、剣術の？」
1732 = "「Sư phụ của Nagi……là sư phụ dạy kiếm thuật ấy hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。凪を剣道大会に出場させたいとのことでな。\nが、その準備が全くできていない」
1632 = "「Ừm. Nghe nói là muốn cho Nagi tham gia giải đấu kiếm đạo.\nNhưng lại chẳng chuẩn bị gì cả.」"
# monologue
# JP: ううう……恥ずかしかー。
2245 = "Ư ư ư……Xấu hổ quá đi."
# monologue
# JP: 道場剣道の大会の仕組みなんて、\nうちもお師匠さんも、まったく知らんかったけん――
2237 = "Cách thức tổ chức giải đấu kiếm đạo ở võ đường,\ncả mình và sư phụ đều hoàn toàn mù tịt mà——"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん、凪ちゃん、お待たせしました！」
1977 = "「Anh Soutetsu, Nagi, để hai người đợi lâu rồi!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃぁん」
1737 = "「Fukamiiii」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだった！？」
1773 = "「Sao rồi!?」"
# 【ふかみ】
# display as 深美
# JP: 「学園長先生、書類書いてくれました。\nはんこも――ほら、ちゃんともらえました！」
1841 = "「Thầy hiệu trưởng đã ký giấy tờ cho em rồi ạ.\nCả con dấu nữa——đây, em xin được đàng hoàng rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「でかした！　一人で良くがんばってくれたな」
1518 = "「Làm tốt lắm! Một mình em vất vả rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「がんばれちゃいますよ！\n凪ちゃんの晴れ舞台のためですもん！」
1788 = "「Tất nhiên là em phải cố gắng rồi!\nVì sân khấu tỏa sáng của Nagi mà!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃぁあん。ありがとばーい！」
1744 = "「Fukamiiii. Cảm ơn cậu nha!」"
# monologue
# JP: 感激ばい！　感動ばい！！
2285 = "Biết ơn quá đi! Cảm động quá đi!!"
# monologue
# JP: うちのために、ふかみちゃん、\n学園長と、ひとりでお話ししてきてくれたけん！！
2375 = "Vì mình mà Fukami\nđã một mình đi nói chuyện với hiệu trưởng luôn!!"
# 【ふかみ】
# display as 深美
# JP: 「困ったときはお互いさまだよ、凪ちゃん。\nそれに……うふふ、ナビちゃんにも乗れたし、役得っ」
1833 = "「Lúc khó khăn thì phải giúp đỡ lẫn nhau chứ, Nagi.\nHơn nữa……fufufu, tớ còn được cưỡi Navi nữa, lời to rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　ふかみさんだけ、\n大回りでナビさんにのって、かえってきたんですねぇ」
1615 = "「A! Chỉ có mỗi chị Fukami\nlà đi một vòng lớn bằng Navi rồi mới về nhỉ~」"
# 【ふかみ】
# display as 深美
# JP: 「うん。凪ちゃんが大会に出るのに、\n所属学園の学園長の許可が必要だってことだったから」
1635 = "「Ừm. Vì để Nagi tham gia giải đấu,\ncần phải có sự cho phép của hiệu trưởng trường đang theo học mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか。双鉄くんと凪ちゃんいないと、\n戻りの列車が走れないから」
1726 = "「Ra vậy. Nếu không có anh Soutetsu và Nagi,\nthì chuyến tàu chiều về không chạy được.」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。\nだから、役割分担。しました、です」
1824 = "「Dạ đúng ạ.\nThế nên tụi em mới phân công nhiệm vụ cho nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これだな！　よしっ！！」
1752 = "「Chính là cái này! Xong!!」"
# 【凪】
# display as 凪
# JP: 「わ」
# 1589 = "「哇」" 
# monologue
# JP: プリンタが吐き出した紙ばひっつかんで、\nにーさんがうちの目の前に置く。
2250 = "Anh hai chộp lấy tờ giấy vừa tuôn ra từ máy in,\nrồi đặt ngay trước mặt mình."
# 【双鉄】
# display as 雙鐵
# JP: 「この参加申込書で、書類はそろう。\n凪、これに記入するんだ」
1552 = "「Có đơn đăng ký tham gia này là đủ giấy tờ rồi.\nNagi, em điền vào đây đi.」"
# 【凪】
# display as 凪
# JP: 「名前と学園かけばよかとね？\nらくしょーばい！！」
1720 = "「Chỉ cần viết tên với trường thôi phải không?\nDễ ợt!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、双鉄おにいさん、ここ！　保護者署名欄」
1626 = "「A, anh Soutetsu, chỗ này! Mục chữ ký của phụ huynh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。すぐに簔笠さんのところへいこう」
1717 = "「Anh biết rồi. Chúng ta đến chỗ ông Minokasa ngay thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「それだと時間もったいないです！\nまた手分けした方が」
1954 = "「Như vậy thì lãng phí thời gian lắm ạ!\nTụi mình lại chia nhau ra thì hơn.」"
# monologue
# JP: ふかみちゃんの声に、にーさんがちらって時計ば見る。
2400 = "Nghe Fukami nói vậy, anh hai liếc nhìn đồng hồ."
# 【双鉄】
# display as 雙鐵
# JP: 「道理だ。では、僕は簔笠さんに署名をもらってくる。\n凪とふかみは、先に役所に向かっていてくれ」
1901 = "「Có lý. Vậy anh sẽ đi xin chữ ký của ông Minokasa.\nNagi và Fukami hãy đến ủy ban trước đi.」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
# 1705 = "「好嘞！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと待って！」
1904 = "「Đợi chút đã!」"
# 【凪】
# display as 凪
# JP: 「ひえっ！？」
# 1595 = "「哎？！」" 
# monologue
# JP: ポーねーちゃんがうちらを呼び止める。\nそん手が、電話の受話器にかかっとる。
2366 = "Chị Paulette gọi tụi mình lại.\nTay chị ấy đang đặt trên ống nghe điện thoại."
# 【ポーレット】
# display as 波萊特
# JP: 「ひょっとして今日が提出〆切なんですか？\nそれで、時間？」
1978 = "「Không lẽ hôm nay là hạn chót nộp đơn sao?\nNên mọi người mới vội vậy à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。市の学校教育課というところに\n提出しなければならん」
1643 = "「Ừm. Phải nộp cho Phòng Giáo dục học đường của thành phố.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
1786 = "「Em hiểu rồi.」"
# monologue
# JP: かちゃって、受話器ばもちあがる。
2367 = "Lạch cạch, chị ấy nhấc ống nghe lên."
# monologue
# JP: ポーねーちゃんの顔がキリって、\nお仕事のときの顔になる。
2275 = "Nét mặt chị Paulette bỗng trở nên nghiêm nghị,\nđó là vẻ mặt lúc làm việc của chị ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃんとふかみちゃんはエアクラタクシーで。\n窓口に先について、今ある書類だけでも出しておいて」
1730 = "「Nagi và Fukami hãy đi bằng taxi Aircra.\nĐến quầy tiếp nhận trước, nộp tạm những giấy tờ hiện có đi.」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい。わかりました、です」
1701 = "「V-vâng. Tụi em rõ rồi ạ.」"
# monologue
# JP: ふかみちゃんの返事と同時に、\nポーねーちゃんは電話ばかけはじめてくれる。
2312 = "Đồng thời với câu trả lời của Fukami,\nchị Paulette bắt đầu bấm số gọi điện."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、雛衣です。\n教育課の山下課長、お願いできますか？」
1625 = "「A, tôi là Hinai đây.\nCho tôi gặp Trưởng phòng Yamashita của Phòng Giáo dục được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。では、凪、ふかみ、そう動いてくれ。\nポーレットに無理な頼みをさせてはならん」
1892 = "「Đáng tin cậy thật. Vậy Nagi, Fukami, hai em cứ làm theo lời chị ấy đi.\nKhông được để Paulette phải đưa ra yêu cầu vô lý đâu đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「そうですね。全部時間通りに間に合わなかったら、\nポーレットさんが無理なお願いしたことになっちゃう」
1813 = "「Đúng vậy ạ. Nếu không kịp nộp toàn bộ đúng hạn,\nthì sẽ thành ra chị Paulette đang đưa ra yêu cầu vô lý mất.」"
# 【凪】
# display as 凪
# JP: 「っ！！　そぎゃんこつしたら大迷惑ばかけちゃうばい！\nいくばい！　すぐそこのタクシー拾うばい！！」
1619 = "「A!! Làm vậy thì phiền phức lớn lắm!\nĐi thôi! Bắt taxi ngay đằng kia đi!!」"
# 【ふかみ】
# display as 深美
# JP: 「うん。そうしよ！\nそれじゃ、双鉄おにいさん」
1650 = "「Ừm. Làm vậy đi!\nVậy, chào anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕も乗ろう。簔笠鍛冶店そばで下ろしてもらい」
1494 = "「Không, anh cũng đi cùng. Cho anh xuống gần lò rèn Minokasa là được.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしたちはそのまま市役所に。\nで、双鉄おにいさんはナビちゃんで、ですね？」
1784 = "「Tụi em sẽ đi thẳng đến ủy ban thành phố.\nCòn anh Soutetsu sẽ đi bằng Navi, đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それが最速だとナビもいっている」
1655 = "「Ừ, Navi cũng bảo đó là cách nhanh nhất.」"
# monologue
# JP: ふわわ――\nにーさんとふかみちゃん、すっごい息ぴったりばい！
2240 = "Oa oa——\nAnh hai và Fukami phối hợp ăn ý ghê!"
# monologue
# JP: 機関士と機関助士ばしてるときは、\nうちとにーさんも息ばぴったりだろうけど――
2138 = "Lúc làm lái tàu và phụ lái,\nmình với anh hai chắc cũng ăn ý như vậy thôi nhưng mà——"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん！　いこっ！」
1734 = "「Nagi! Đi thôi!」"
# 【凪】
# display as 凪
# JP: 「あ」
1609 = "「A」"
# monologue
# JP: ぎゅうって、\nふかみちゃんがうちの手ばにぎる。
2309 = "Fukami nắm chặt lấy tay mình."
# monologue
# JP: うちのよりずっと大きくて、だけれどちょっと前までは、うちのより、ずっとずうっと弱かった手で。
2272 = "Bàn tay to hơn mình rất nhiều, nhưng cho đến cách đây không lâu, lại là một bàn tay yếu ớt hơn mình rất rất nhiều."
# 【凪】
# display as 凪
# JP: 「うん！　いくばい！　にーさん！！」
1640 = "「Ừm! Đi thôi! Anh hai!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。すまんが、ポーレット、れいな、行ってくる」
1703 = "「Ừ. Xin lỗi nhé, Paulette, Reina, anh đi đây.」"
# 【れいな】
# display as 玲奈
# JP: 「いってらっしゃぁい！　お気をつけてですよぉ」
1477 = "「Đi đường bình an! Mọi người đi cẩn thận nha~」"
# monologue
# JP: 駅前すぐのタクシー乗り場に、タクシーばおる！
2434 = "Ở bến ngay trước ga có taxi kìa!"
# 【ふかみ】
# display as 深美
# JP: 「あ！？　凪ちゃん」
1628 = "「A!? Nagi.」"
# monologue
# JP: やけん！　走って呼び止める！！！
2223 = "Mình phải chạy tới gọi lại mới được!!!"
# 【凪】
# display as 凪
# JP: 「乗るばい乗るばい！　すぐ乗るばーい！！」
1890 = "「Lên xe lên xe! Lên xe ngay đây!!」"
# monologue
# JP: 気持ちばどんどんふくらんでくる。\n勇気ばどんどん湧いてくる！
2232 = "Cảm xúc ngày càng dâng trào.\nDũng khí cũng ngày càng sục sôi!"
# monologue
# JP: （みんなが、力ば貸してくれた分――\nふかみちゃんが強くなった分より、ずっと！）
2486 = "（Mọi người đã cho mình mượn sức mạnh——\nCòn hơn cả việc Fukami đã trở nên mạnh mẽ hơn nữa!）"
# monologue
# JP: うちももっと！　強くならんと！！
2219 = "Mình cũng phải! Trở nên mạnh mẽ hơn nữa!!"
