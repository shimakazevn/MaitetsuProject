[script]
# lines: 314 
# 【れいな】
# display as 玲奈
# JP: 「ふわーーーー！　おもしろかったでぇす！！」
1053 = "「Oa——! Thú vị quá đi mất nha~!!」"
# monologue
# JP: 大きく大きく伸びをしながら、れいなが笑顔を弾けさす。
1653 = "Reina vừa vươn vai thật rộng vừa nở nụ cười rạng rỡ."
# 【れいな】
# display as 玲奈
# JP: 「投炭ってとっても大変なんですねぇ。れいな、\n100杯くらいでちょっとあきてきちゃいましたぁ」
1009 = "「Việc xúc than dồn toa vất vả thật nha~. Reina\nxúc được khoảng 100 xẻng là bắt đầu thấy hơi chán rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ」
1071 = "「Haha」"
# 【れいな】
# display as 玲奈
# JP: 「？　そうてつさん、なんでにこにこなんですかぁ」
1123 = "「? Anh Soutetsu, sao anh lại cười tươi thế ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなならではの感想だなぁと思ってな」
1188 = "「Anh nghĩ đó đúng là cảm tưởng mang đậm chất Reina.」"
# monologue
# JP: ふたり並んでの帰り道。\nゆっくりゆっくり歩を進めつつ、れいなの髪を軽く撫ぜる。
1600 = "Trên đường về, hai chúng tôi sánh bước bên nhau.\nVừa chầm chậm bước đi, tôi vừa nhẹ nhàng vuốt tóc Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「100杯どころか10杯で。腕が痛むの、腰に来ただの、\n一般の観光客さんは、そんな感想をもらすものなのだ」
1007 = "「Đừng nói là 100 xẻng, chỉ 10 xẻng thôi là du khách bình thường\nđã than thở đau tay, mỏi lưng rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「わ。そうなんですねぇ。けど、えっへへー！\nれいな、こう見えても力持ちですからぁ」
1068 = "「Oa. Vậy sao ạ~. Nhưng mà, ê hê hê~!\nReina trông thế này thôi chứ khỏe lắm đó nha~」"
# monologue
# JP: 腕をぐぐっと曲げて持ち上げ――\nけれどのその上腕部には、力こぶなどできようもない。
1537 = "Em ấy gập tay lại rồi nâng lên——\nnhưng bắp tay em ấy làm gì có chút cơ bắp nào."
# 【れいな】
# display as 玲奈
# JP: 「1[キログラム,1]kgの投炭なんて、\nおはしのあげさげとかわらないですよぉ」
1206 = "「Xúc 1kg than dồn toa á,\ncũng nhẹ như nâng hạ đôi đũa thôi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは大変に心強い。助士の欠勤が重なってしまったら、\nれいなにヘルプをお願いするかな」
1337 = "「Nghe vậy anh thấy yên tâm lắm. Lỡ mà mấy cậu phụ lái tàu xin nghỉ phép trùng nhau,\nchắc anh phải nhờ Reina giúp một tay quá.」"
# 【れいな】
# display as 玲奈
# JP: 「わ、それなられいな、もっと練習しなくちゃですねぇ」
1070 = "「Oa, nếu vậy thì Reina phải luyện tập nhiều hơn nữa rồi nha~」"
# monologue
# JP: れいなが肩からぶつかってくる。\n甘える仕草に、僕もぶっつけ返して応える。
1669 = "Reina huých vai vào tôi.\nĐáp lại hành động nũng nịu đó, tôi cũng huých vai lại."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\n乗務となれば、100杯で飽きたではとても済まない」
1210 = "「Đúng vậy.\nNếu đã làm việc trên tàu thì xúc 100 xẻng chán là không ổn đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「ならならそうてつさん、今度は観光体験じゃなく、\nちゃあんと教えてくださいねぇ」
1354 = "「Vậy thì vậy thì anh Soutetsu, lần tới không phải là trải nghiệm du lịch nữa,\nmà anh hãy dạy cho Reina đà-àng hoàng nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。れいながそうしてくれるというなら、大歓迎だ」
1098 = "「Ừ. Nếu Reina chịu giúp thì anh rất hoan nghênh.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。じゃあ、次のお休みは投炭練習ですねぇ」
1045 = "「Ư hư hư~. Vậy thì, ngày nghỉ tới chúng ta sẽ luyện tập xúc than nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。が――」
1196 = "「Anh rõ rồi. Nhưng mà——」"
# 【れいな】
# display as 玲奈
# JP: 「？」
1375 = "「?」"
# monologue
# JP: にこにこにこ。れいなはどこまでも笑顔尽くしだ。\nゆえ、尋ね返すのもかえって野暮かもしれないが――
1549 = "Mỉm cười rạng rỡ. Nụ cười của Reina dường như không bao giờ tắt.\nVì thế, hỏi lại em ấy lúc này có lẽ hơi phá hỏng bầu không khí, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「次の休みもそれでいいのか？\n今日も……というかずっと、近場ばかりのデートだが」
989 = "「Ngày nghỉ tới cũng làm vậy sao?\nHôm nay......hay đúng hơn là từ trước đến giờ, chúng ta toàn hẹn hò quanh quẩn gần đây thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「すっごくすっごく楽しいですよぉ。投炭体験も、\nクマ川くだりも、包丁づくり体験も、酒造見学も」
1135 = "「Rất rất là vui luôn nha~. Cả trải nghiệm xúc than dồn toa,\nđi thuyền xuôi sông Kuma, trải nghiệm làm dao, hay tham quan xưởng ủ rượu nữa.」"
# monologue
# JP: れいなが両手を大きく広げる。
1661 = "Reina dang rộng hai tay."
# 【れいな】
# display as 玲奈
# JP: 「ぜぇんぶ！　れいな、はじめての体験でしたからぁ」
1001 = "「Tất cả! Đều là những trải nghiệm đầu tiên của Reina đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、そうであったのか。少し……かなり意外だな。ポーレットとは行く機会がなかったのか？」
1015 = "「Ra là vậy sao. Hơi......khá là bất ngờ đấy. Em chưa từng có cơ hội đi cùng Paulette à?」"
# monologue
# JP: うふふと、楽しげな含み笑い。、
1665 = "Ư hư hư, một nụ cười tủm tỉm đầy vui vẻ."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットといっしょのおやすみのときは、もっちろん、\nふたりで一緒に、テツしてましたからぁ」
1050 = "「Những lúc nghỉ ngơi cùng chị Paulette thì tất nhiên là,\nhai chị em cùng nhau đi chơi kiểu Tetsu rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。乗りテツか？」
1012 = "「Ra là vậy. Nori-tetsu (Người thích đi tàu) à?」"
# 【れいな】
# display as 玲奈
# JP: 「乗りも撮りも。録音の方の録りも。食べも。\nそのときいっしょにやりたいことを、ぜぇんぶでぇす」
1138 = "「Đi cũng có, chụp cũng có. Cả thu âm tiếng tàu nữa. Ăn uống cũng có luôn.\nTất cả những gì bọn em muốn làm cùng nhau lúc đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……ポーレットはそういうテツだものな」
1091 = "「À......Paulette là kiểu người hâm mộ đường sắt như vậy mà.」"
# monologue
# JP: 鉄道というシステム自体を溺愛している。だから、\n乗るだけでも撮る/録るだけでも食べるだけでも足りない。
1541 = "Yêu thích hệ thống đường sắt một cách mù quáng. Vì vậy,\nchỉ đi tàu, chụp ảnh/thu âm hay ăn uống thôi là không đủ."
# 【れいな】
# display as 玲奈
# JP: 「そういうテツ……ですねぇ。ポーレットのおかげで、\nれいなも結構、そういうテツになっちゃいましたぁ」
1259 = "「Kiểu người hâm mộ đường sắt như vậy...... nhỉ. Nhờ chị Paulette mà\nReina cũng trở thành kiểu người hâm mộ đường sắt như thế rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。れいなも鉄道趣味に目覚めていたのか」
1011 = "「Thật sao. Reina cũng có sở thích về đường sắt à.」"
# monologue
# JP: レイルロオドとしてはかなり珍しいのではなかろうか。\nああいや、ではない。そうであるなら――
1483 = "Đối với một Railord thì khá là hiếm thấy nhỉ.\nÀ không, không phải. Nếu đã như vậy thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、次の休みはどこかに乗りにいく撮りにいくなり、\n少し遠出をしてみるのはどうだろうか」
1355 = "「Vậy thì, ngày nghỉ tới chúng ta đi đâu đó để đi tàu hay chụp ảnh,\nthử đi xa một chuyến thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいなはそれも大歓迎ですけどぉ」
1280 = "「Reina cũng rất hoan nghênh chuyện đó nha~, nhưng mà...」"
# monologue
# JP: 足が止まる。\nそうしてれいなはじいっと僕を見上げる。
1657 = "Bước chân dừng lại.\nReina cứ thế ngước nhìn tôi chằm chằm."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんは、どっちの方が楽しいですかぁ？\n投炭練習と、一緒に列車に乗りに行くのと」
1363 = "「Anh Soutetsu thì thấy cái nào vui hơn ạ~?\nLuyện tập xúc than dồn toa, hay là cùng nhau đi tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　れいなと一緒であればどちらも楽しかろうが。\n……強いていうなら後者だな。その方が目新しいゆえ」
1119 = "「Hửm? Đi cùng Reina thì cái nào cũng vui cả thôi.\n......Nếu bắt buộc phải chọn thì là cái sau. Vì nó mới mẻ hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「わああ！　そうだったんですねぇ。\nならなられいな、いっしょに列車に乗りたいでぇす！」
1057 = "「Oaaaa! Ra là vậy nha~.\nVậy thì vậy thì Reina, muốn cùng anh đi tàu nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではそうしよう」
1343 = "「Vậy quyết định thế nhé.」"
# monologue
# JP: はじける笑顔に理解する。\nそうか、れいなは……れいなの楽しみ方の基準は
1682 = "Nhìn nụ cười rạng rỡ của em ấy, tôi đã hiểu.\nRa là vậy, Reina...... tiêu chuẩn tận hưởng niềm vui của Reina là"
# 【双鉄】
# display as 雙鐵
# JP: 「『ふたりでいっしょに楽しめる』。\nれいなにとって、それがとても大事なことなのだな」
641 = "「『Hai người có thể cùng nhau tận hưởng』.\nĐối với Reina, đó là điều rất quan trọng nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「もちろんでぇす。そうてつさんがにこにこじゃなきゃ、\nれいなもしょぼんて、さみしい気持ちになっちゃいます」
1294 = "「Tất nhiên rồi nha~. Nếu anh Soutetsu không cười tươi,\nReina cũng sẽ ỉu xìu và cảm thấy buồn lắm đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
1330 = "「Ra là vậy.」"
# monologue
# JP: 御一夜の観光スポット群は、いまとなっては僕の庭だ。\n無論詳しく解説できるし、れいなも大いに喜んでくれる。
1578 = "Các điểm du lịch ở Ohimitera giờ đây giống như khu vườn nhà tôi vậy.\nTất nhiên tôi có thể giải thích cặn kẽ, và Reina cũng sẽ rất vui."
# 【双鉄】
# display as 雙鐵
# JP: 「……それゆえ御一夜の観光デートを、\nれいなは好んでくれてたのだなぁ」
675 = "「......Vì thế nên Reina mới thích\nnhững buổi hẹn hò tham quan quanh Ohimitera đến vậy nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「御一夜きれいでたのしいですし、そうてつさんに\nいろいろ教えてもらえるのもうれしいですからねぇ」
1182 = "「Ohimitera vừa đẹp vừa vui, hơn nữa được anh Soutetsu\nchỉ cho nhiều thứ cũng làm Reina vui lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕もとても嬉しい。けれどな、れいな」
1346 = "「Nếu vậy thì anh cũng rất vui. Nhưng mà này, Reina.」"
# monologue
# JP: しゃがみこみ、れいなと視線の高さを合わせる。\nふっとれいなが近寄ってきて、鼻の頭が一瞬くっつく。
1631 = "Tôi ngồi xổm xuống, để tầm mắt ngang với Reina.\nReina chợt bước lại gần, đầu mũi hai đứa khẽ chạm vào nhau trong chốc lát."
# 【れいな】
# display as 玲奈
# JP: 「どうしましたぁ？　そうてつさん」
1187 = "「Sao thế ạ~? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の知っている楽しみだけを一緒に楽しむのでは、\n少し寂しい。れいなが知っている楽しみも共有したいし」
1152 = "「Chỉ cùng nhau tận hưởng những niềm vui mà anh biết thì\nhơi buồn một chút. Anh cũng muốn chia sẻ những niềm vui mà Reina biết nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなが知ってる楽しみ……」
1286 = "「Niềm vui mà Reina biết......」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、れいなも僕も知らない楽しみを一緒にみつけ、\n一緒に育てていったりなども、していきたいと」
1202 = "「Hoặc là, anh muốn cùng em khám phá những niềm vui mà cả Reina và anh đều chưa biết,\nrồi cùng nhau vun đắp chúng nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですぅ！」
1269 = "「Reina cũng vậy nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1072 = "「Ây da」"
# monologue
# JP: 抱きついてくるれいなをしっかり受け止める。
1618 = "Tôi vững vàng đỡ lấy Reina đang lao vào ôm chầm lấy mình."
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、そうてつさん。何十年か前までは、\n鉱山と鉱山町だけが、れいなの世界の全てだったんです」
1364 = "「Chuyện là thế này nha~, anh Soutetsu. Cho đến vài chục năm trước,\nkhu mỏ và thị trấn mỏ là toàn bộ thế giới của Reina đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1092 = "「Ừm.」"
# 【れいな】
# display as 玲奈
# JP: 「けど、御一夜に来て、ポーレットと出会ってそしたら。\nいろんな線路の上にもれいなの世界がひろがって」
981 = "「Nhưng mà, khi đến Ohimitera, gặp được chị Paulette thì.\nThế giới của Reina đã mở rộng ra trên rất nhiều tuyến đường sắt khác nhau nha~」"
# monologue
# JP: すりすり――ぐいぐい。れいなに頭を擦り付けられる。\nほんのわずかな痛みもあるが、それさえ実に心地良い。
1674 = "Cọ cọ——dúi dúi. Reina dụi đầu vào ngực tôi.\nTuy có hơi đau một chút, nhưng cảm giác đó lại vô cùng dễ chịu."
# 【れいな】
# display as 玲奈
# JP: 「今度はれいな、そうてつさんとふたりで、いっしょに！\nもっともーっと世界をひろげていけるんですねぇ」
956 = "「Lần này Reina sẽ cùng với anh Soutetsu!\nMở rộng thế giới ra nhiều nhiề-ều hơn nữa nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、れいな。\nだが、ひとつだけは違っているのかもしれん」
1144 = "「Đúng vậy, Reina.\nNhưng có lẽ chỉ một điều là khác thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ひとつだけ。ん……どこがですかぁ？」
950 = "「Một điều thôi. Ưm......là điều gì ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはだな――それっ！」
1168 = "「Đó là——Thế này!」"
# 【れいな】
# display as 玲奈
# JP: 「きゃあ」
1031 = "「Kyaa」"
# monologue
# JP: れいなを持ち上げ肩車する。\nそのまま立って、ゆっくりゆっくり歩を進める。
1612 = "Tôi nhấc bổng Reina lên rồi công kênh em ấy trên vai.\nCứ thế đứng thẳng dậy, chậm rãi bước đi."
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、高いですぅ。そうてつさんはふだんから、\nこんなに遠くが見えているんですねぇ」
1059 = "「Oaaa, cao quá đi nha~. Bình thường anh Soutetsu\nlúc nào cũng nhìn được xa đến thế này cơ à~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、もっと遠くを見ているぞ。\nれいなだって、僕と一緒に見ているではないか」
959 = "「Không, anh còn nhìn xa hơn thế nữa kìa.\nChẳng phải Reina cũng đang nhìn cùng anh sao.」"
# 【れいな】
# display as 玲奈
# JP: 「ほえ？」
1073 = "「Hở?」"
# monologue
# JP: 上空、ゆるやかな飛行音音。\n相変わらずの、絶妙極まるアシストだ。
1698 = "Trên bầu trời, tiếng bay rì rì vang lên.\nVẫn là sự hỗ trợ tuyệt vời như mọi khi."
# 【れいな】
# display as 玲奈
# JP: 「わぁ！　れいなわかりましたぁ。ナビさんからの景色！\n地面のはしっこ、まるくみえるくらいに遠くまで見える」
1062 = "「Oa! Reina hiểu rồi nha~. Cảnh vật nhìn từ góc độ của chị Navi!\nCó thể nhìn xa đến mức thấy cả rìa mặt đất cong tròn luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。空高くから目に見える景色もその先も――\n世界の全部が、はじめかられいなのものなのだ」
1241 = "「Đúng vậy. Những cảnh vật nhìn thấy từ trên cao và cả những nơi xa hơn nữa——\nToàn bộ thế giới này, ngay từ đầu đã là của Reina rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「ふえ」
1055 = "「Hể」"
# monologue
# JP: 僕の両肩、ぶらぶらご機嫌にゆれてた足が止まってしまう。
1626 = "Đôi chân đang đung đưa đầy vui vẻ trên vai tôi bỗng dừng lại."
# 【れいな】
# display as 玲奈
# JP: 「でもでも、れいな、レイルロオドですよぉ」
978 = "「Nhưng mà, Reina là Railord mà nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。それゆえ課せられた制約もあっただろうし、\nそれが当然と受け入れることが自然でもあったのだろう」
1244 = "「Đúng là vậy. Vì thế nên chắc chắn cũng có những hạn chế bị áp đặt,\nvà việc coi đó là điều hiển nhiên cũng là chuyện tự nhiên thôi.」"
# monologue
# JP: 小さな動き。\nれいなのきっと、無言の頷き。
1668 = "Một cử động nhỏ.\nChắc chắn là cái gật đầu im lặng của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「が、それは人間も同じことだ。生まれや育ちによって、\n役割などに縛られも、あるいは自らを縛りもする」
977 = "「Nhưng con người cũng vậy thôi. Tùy thuộc vào xuất thân và hoàn cảnh lớn lên,\nhọ bị ràng buộc bởi vai trò, hoặc tự trói buộc chính mình.」"
# monologue
# JP: かつては、僕もそうだった。\nれいなと出会い、れいなに恋をする前は。
1596 = "Tôi của trước kia cũng từng như vậy.\nTrước khi gặp Reina, trước khi đem lòng yêu Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「けれど本当は、いつでもどこにでもいけるのだ。\nキハ07はレールの上しか走れんが、れいなには、ほら」
973 = "「Nhưng thực ra, chúng ta có thể đi đến bất cứ đâu, bất cứ lúc nào.\nKiHa 07 chỉ có thể chạy trên đường ray, nhưng Reina thì, xem này.」"
# monologue
# JP: 軽く。れいなの足に触れる。\nぴくっ、とくすぐったそうな反応。
1628 = "Nhẹ nhàng. Tôi chạm vào chân Reina.\nEm ấy giật mình, phản ứng như bị nhột."
# 【双鉄】
# display as 雙鐵
# JP: 「こんなに元気でかわいい両足がついている。\n望み、歩けば。この世界のどこまでだって」
986 = "「Em có đôi chân khỏe mạnh và đáng yêu thế này cơ mà.\nChỉ cần em muốn và bước đi. Em có thể đi đến bất cứ nơi nào trên thế giới này.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ」
1077 = "「Oaaaa」"
# monologue
# JP: ごくのんびりした驚きの声。\nそうしてゆっくり、ゆっくり言葉がつむがれていく。
1554 = "Một giọng điệu ngạc nhiên rất đỗi thong thả.\nRồi từng lời, từng lời chậm rãi được cất lên."
# 【れいな】
# display as 玲奈
# JP: 「れいな、そんなふうに考えたことなかったですぅ。\nけど――」
1282 = "「Reina chưa từng nghĩ như vậy bao giờ nha~.\nNhưng mà——」"
# monologue
# JP: ぴこぴこと、足が再び動き始める。
1552 = "Đôi chân lại bắt đầu ngọ nguậy."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、考えてみたら本当ですねぇ。れいな、\nその気になったなら、どこでも行けちゃえるんだぁ」
1129 = "「Ư hư hư~, nghĩ lại thì đúng thật nha~. Reina,\nchỉ cần muốn thì có thể đi đến bất cứ đâu nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だが、一人でどんどん歩かれては、\n置いていかれては僕は寂しい。ふたりで一緒に歩きたい」
1239 = "「Ừ, nhưng nếu em cứ một mình bước đi,\nbỏ anh lại phía sau thì anh sẽ buồn lắm. Anh muốn hai ta cùng nhau bước đi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。ひとりじゃこわくてつまらないです。\n知らない世界に、もしも歩いていくんでも」
1274 = "「Reina cũng vậy nha~. Một mình thì sợ và chán lắm.\nDù có bước vào một thế giới chưa từng biết đến thì...」"
# monologue
# JP: ぐいと、首と肩とに負担がかかる。\nれいなは体を前のめりにし、僕の顔を見ようとしてくる。
1739 = "Cổ và vai tôi chịu một lực đè nặng.\nReina chồm người về phía trước, cố gắng nhìn mặt tôi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんといっしょがいいです。\nずっとずうっと、どこまでだって」
1284 = "「Cùng với anh Soutetsu là tuyệt nhất.\nMãi mãi, dù là đi đến tận đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、ずっと。どこまでだって」
1215 = "「Đúng vậy, mãi mãi. Dù là đi đến tận đâu.」"
# monologue
# JP: 頷き。気づく。\nああ――これが。これが恐らく――
1634 = "Gật đầu. Tôi chợt nhận ra.\nÀ——đây chính là. Có lẽ đây chính là——"
# 【れいな】
# display as 玲奈
# JP: 「ふうふって、きっとそういうものなんですねぇ」
1141 = "「Vợ chồng, chắc chắn là như vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1242 = "「Đúng vậy.」"
# monologue
# JP: おんなじことを考えている。\nそれが嬉しい。ただ単純に。
1602 = "Cùng chung một suy nghĩ.\nChỉ đơn giản vậy thôi cũng khiến tôi thấy vui."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば一緒に家に帰ろう。\nふたりならんで――」
1350 = "「Vậy thì cùng nhau về nhà thôi.\nHai ta kề vai sánh bước——」"
# 【れいな】
# display as 玲奈
# JP: 「あ、えとですねぇ。そうてつさぁん」
1088 = "「A, ừm nha~. Anh Soutetsu ơi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1117 = "「Hửm?」"
# 【れいな】
# display as 玲奈
# JP: 「ふたりならんで歩くのも、\nとってもとってもすてきですけど。ですけど、いまは」
1316 = "「Hai ta kề vai sánh bước,\ncũng rất rất là tuyệt vời. Nhưng mà, hiện tại thì...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、心得た。\nならば――それっ」
1103 = "「À, anh hiểu rồi.\nVậy thì——Lên nào!」"
# 【れいな】
# display as 玲奈
# JP: 「わぁっ！」
1060 = "「Oa!」"
# monologue
# JP: 肩車のまま歩き出す。できる限りの大股で。
1614 = "Tôi vẫn cõng em ấy trên vai và bước đi. Bằng những sải chân dài nhất có thể."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、いつもとおんなじ帰り道が、\nいつもよりずうっときれいでぇす！」
1040 = "「Ư hư hư~, con đường về nhà vẫn như mọi khi,\nnhưng hôm nay đẹp hơn nhiề-ều lắm nha~!」"
# monologue
# JP: ことん、ことん。\nゆっくりで規則正しい――にゃんこの手での包丁の音。
1522 = "Cộc, cộc.\nChậm rãi và đều đặn——tiếng dao thái bằng bàn tay mèo."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん、これもお味みてくださぁい」
1365 = "「Anh Soutetsu ơi~, nếm thử món này xem sao nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1092 = "「嗯」" 
# monologue
# JP: しょうゆとみりんの甘い匂い。それだけで食欲が煽られる。\nまして具だくさんのつぼん汁。味見の一口も待ち遠しい。
1727 = "Mùi thơm ngọt của nước tương và rượu mirin. Chỉ bấy nhiêu thôi cũng đủ kích thích sự thèm ăn.\nHuống hồ gì còn có món súp Tsubon-jiru đầy ắp nhân. Thật nóng lòng muốn nếm thử một miếng."
# 【れいな】
# display as 玲奈
# JP: 「ふー、ふー、ふー。\nはぁい、『あ～ん』」
1047 = "「Phù, phù, phù.\nĐây ạ, 『A~』 đi nào」"
# 【双鉄】
# display as 雙鐵
# JP: 「あーーーん。あむっ。はふっ！　んっ――。ん。\n…………うむっ！」
1082 = "「A~~~~. Ngoạm. Háp! Ưm——. Ưm.\n............Ngon!」"
# 【れいな】
# display as 玲奈
# JP: 「おあじ、どうですかぁ？」
1033 = "「Hương vị, thế nào ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「旨い！　丁度いい。実に僕好みの味わいだ。\nれいなの味つけも、すっかり安定したものだなぁ」
1177 = "「Ngon lắm! Vừa vặn. Đúng là hương vị anh thích.\nCách nêm nếm của Reina cũng đã hoàn toàn ổn định rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、今日はデートでたくさん歩きましたから、\nちょこっとだけお出汁を濃くしてあるんですよぉ」
1125 = "「Ê hê hê~, vì hôm nay hẹn hò chúng ta đã đi bộ rất nhiều,\nnên Reina đã nêm nước dùng đậm đà hơn một chút xíu đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そうだったのか」
1076 = "「Chà, ra là vậy à.」"
# 【れいな】
# display as 玲奈
# JP: 「お塩とかお醤油で濃くしちゃうと、そうてつさんの\n健康にわるいって、おねーちゃんに教わりましたぁ」
1158 = "「Chị Mayami đã dạy Reina rằng, nếu dùng muối hay nước tương để làm đậm vị,\nthì sẽ không tốt cho sức khỏe của anh Soutetsu đâu nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういえば教わっていたな。\nこまめに実践してくれているのだなぁ」
1099 = "「À, nhắc mới nhớ em đã được dạy như vậy nhỉ.\nEm vẫn luôn chăm chỉ áp dụng nó đấy à.」"
# monologue
# JP: 感謝がしみじみ湧いてくる。右田の味の隠れた部分を……\n真闇姉も、日々姫も、細かに整えてくれていたのだろう。
1607 = "Lòng biết ơn trào dâng sâu sắc. Những phần ẩn giấu trong hương vị của nhà Migita......\nChắc hẳn cả chị Mayami và Hibiki đều đã tỉ mỉ điều chỉnh cho tôi."
# 【れいな】
# display as 玲奈
# JP: 「――よしっ。\nうふふぅ、そうてつさぁん。できましたぁ！」
1150 = "「——Xong.\nƯ hư hư~, anh Soutetsu ơi~. Xong rồi nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、運ぶのは僕がやろう。\nれいなは先に居間へ」
1101 = "「Ừ, để anh bưng ra cho.\nReina ra phòng khách trước đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1142 = "「Vâng ạ~」"
# monologue
# JP: そうしてれいなも、学んで同じくしてくれている。\n僕はなんと幸せな――家族に恵まれた男だろうか。
1707 = "Và Reina cũng đã học hỏi và làm điều tương tự cho tôi.\nTôi quả là một người đàn ông may mắn——có được một gia đình hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「よっ――」
1074 = "「Dô——」"
# monologue
# JP: ならばその分、返していこう。\n僕にできることの全てで、こころを込めて丁寧に。
1629 = "Nếu vậy, tôi sẽ đền đáp lại phần ân tình đó.\nBằng tất cả những gì tôi có thể làm, bằng cả tấm lòng và sự chân thành."
# 【双鉄】
# display as 雙鐵
# JP: 「……っと。おまたせ、れいな」
660 = "「......Xong. Để em đợi lâu rồi, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、それじゃあばんごはんにしましょうねぇ」
1036 = "「Ư hư hư~, vậy thì chúng ta ăn tối thôi nha~」"
# monologue
# JP: れいなにあどけなくそう言われると、いつまでたっても\nどこかに僅かおままごと感を覚えてしまう。が――
1708 = "Nghe Reina nói bằng giọng điệu ngây thơ như vậy, dù đã bao lâu trôi qua,\ntôi vẫn luôn cảm thấy có chút gì đó giống như đang chơi đồ hàng. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「渋いな。桐の実か。\n添えてある赤い花は――」
1014 = "「Trang nhã thật. Quả ngô đồng à.\nBông hoa màu đỏ điểm xuyết là——」"
# 【れいな】
# display as 玲奈
# JP: 「ヘリコニアっていうお花なんだそうですよぉ。\nお花屋さんで見つけて、桐の実にすっごくあうなぁって」
1315 = "「Nghe nói là hoa Thiên điểu đó nha~.\nReina tìm thấy ở cửa hàng hoa, thấy nó cực kỳ hợp với quả ngô đồng luôn á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。とてもいい判断だと僕も感じる」
1105 = "「Ừm. Anh cũng cảm thấy đó là một sự lựa chọn rất tuyệt.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～」
1127 = "「Ê hê hê~」"
# monologue
# JP: つぼん汁に焼き魚。割干し大根の漬物に、きんぴらゴボウ。\n落ち着きのある食卓に、緑と赤が添える彩りは鮮やかだ。
1734 = "Súp Tsubon-jiru và cá nướng. Củ cải phơi khô muối chua, và ngưu bàng xào mặn ngọt Kinpira.\nTrên bàn ăn giản dị, sắc xanh và đỏ điểm xuyết thêm phần rực rỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「では、いただこう。いただきます」
1351 = "「Vậy thì, ăn thôi. Mời em.」"
# 【れいな】
# display as 玲奈
# JP: 「いただきまぁす。うふふぅ、れいなもお相伴……ん？\nあれ、空っぽ」
1291 = "「Mời anh ạ. Ư hư hư~, Reina cũng xin phép dùng bữa......hửm?\nƠ kìa, trống không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいやいや、手酌はいかん」
957 = "「À không không, tự rót là không được đâu.」"
# monologue
# JP: 立ち上がろうとするれいなをとめて、庭に出る。\nガソリン缶からスキットルいっぱい、なみなみ移す。
1619 = "Tôi cản Reina đang định đứng dậy, rồi bước ra vườn.\nRót từ can xăng đầy tràn vào chiếc bình tông."
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、存分にやってくれ」
991 = "「Đây, em cứ uống thỏa thích đi.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい、ありがとうございまぁす。\nじゃあ、あらためて、いただきまぁす」
1065 = "「Oa, em cảm ơn ạ~.\nVậy thì, một lần nữa, mời anh ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、僕もあらためて」
1344 = "「Vậy, anh cũng xin mời một lần nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「（ごくっ、ごくっ、ごくっ）。\n――ぷはぁっ、おいしいでぇす」
1370 = "「（Ực, ực, ực）.\n——Khà, ngon quá nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「（ずずっ）んむ……ん――うん。旨い。\nいや、本当に安定したな。漬物ひとつをとっても」
1372 = "「（Sụp soạp） Ưm......Ưm——ừm. Ngon.\nChà, thực sự ổn định rồi đấy. Ngay cả một món dưa muối thôi cũng vậy.」"
# monologue
# JP: つぼん汁味で満ちた口内を、割干し大根の漬物で洗う。\n右田のものは、焼酎を混ぜ漬け込むことが特徴だが……
1524 = "Dùng củ cải phơi khô muối chua để thanh lọc hương vị súp Tsubon-jiru trong miệng.\nMón dưa muối của nhà Migita có đặc trưng là được muối cùng rượu shochu, nhưng......"
# 【双鉄】
# display as 雙鐵
# JP: 「まことに旨い。爽やかだ。この上ない口直しになる。\nまさしく右田の味だなぁ」
1299 = "「Thực sự rất ngon. Rất thanh mát. Không gì tuyệt vời hơn để làm sạch miệng.\nĐúng chuẩn hương vị của nhà Migita.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふふふ～」
1035 = "「Ư hư hư hư hư~」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1117 = "「嗯？」" 
# monologue
# JP: れいなには珍しい、いたずらっぽい笑顔。\n気になり箸が止まってしまう。
1678 = "Một nụ cười tinh nghịch hiếm thấy ở Reina.\nThấy lạ, tôi dừng đũa lại."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだどうした、なにかあるのか？」
1186 = "「Sao thế, có chuyện gì à?」"
# 【れいな】
# display as 玲奈
# JP: 「実はですねぇ、おつけものはですねぇ。\n右田の味と、ちょっとだけ変えてあるんですよぉ」
1005 = "「Thực ra thì nha~, món dưa muối ấy nha~.\nReina đã biến tấu một chút so với hương vị của nhà Migita đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　これがか？」
966 = "「Thật sao! Cái này á?」"
# 【れいな】
# display as 玲奈
# JP: 「そうでぇす。今日のはれいなが漬けたヤツ。\nかくし味にレモンをつかってあるやつでぇす」
1224 = "「Đúng vậy nha~. Hôm nay là loại do chính tay Reina muối.\nLoại có dùng chanh làm gia vị bí mật đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「レモンを」
1230 = "「Chanh á.」"
# 【れいな】
# display as 玲奈
# JP: 「ですです。そうてつさんレモン大好きですからぁ。\nレシピのゆずを、レモンにかえてみたんですぅ」
1246 = "「Đúng rồi ạ. Vì anh Soutetsu rất thích chanh mà nha~.\nReina đã thử thay quả thanh yên trong công thức bằng chanh đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　レモンを、僕が？」
1122 = "「Hửm? Anh thích chanh á?」"
# monologue
# JP: 意外な一言に尋ね返せば、\nれいなはますます鼻からの排気を強くする。
1633 = "Trước câu nói bất ngờ đó, tôi hỏi lại,\nReina càng thở hắt ra bằng mũi mạnh hơn, vẻ đầy tự hào."
# 【れいな】
# display as 玲奈
# JP: 「ですよぉ。揚げ物とかのとき、レモンだと100％だけど、\nゆずとかすだちだと、ほとんど双鉄さんしぼらないです」
1240 = "「Đúng thế nha~. Lúc ăn đồ chiên rán, nếu là chanh thì 100% anh sẽ vắt,\nnhưng nếu là thanh yên hay quýt sudachi thì hầu như anh Soutetsu chẳng vắt bao giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、まったく自覚がなかった。\nゆずとレモンで、それほど違うものなの……か？」
1200 = "「Thật sao, anh hoàn toàn không nhận ra luôn.\nThanh yên và chanh, khác nhau đến thế cơ à......?」"
# monologue
# JP: もう一切れ、さらに一切れ、じっくり味わい確かめてみる。
1593 = "Tôi gắp thêm một miếng, rồi lại một miếng nữa, từ từ nhấm nháp để kiểm chứng."
# 【双鉄】
# display as 雙鐵
# JP: 「ふ…………む？」
1078 = "「Hừ............m?」"
# monologue
# JP: ……じっくり味わい考えるほどにわからなくなる。\nが、爽やかさに覚えた感動は間違いない。
626 = "......Càng từ từ nhấm nháp và suy nghĩ thì lại càng không hiểu.\nNhưng sự ấn tượng về vị thanh mát thì không thể nhầm lẫn được."
# 【双鉄】
# display as 雙鐵
# JP: 「……変わっているのだろうな。恐らく」
671 = "「......Chắc là có thay đổi thật. Có lẽ vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「おねえちゃんが漬けたのと、ひびきさんが漬けたのと、\nれいなが漬けたの、ぜぇんぶ別々になっててですねぇ」
1160 = "「Loại chị Mayami muối, loại chị Hibiki muối,\nvà loại Reina muối, tất cả đều được để riêng biệt nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「……まったく気づいていなかった」
668 = "「......Anh hoàn toàn không nhận ra luôn.」"
# 【れいな】
# display as 玲奈
# JP: 「各10回ずつのお食事で、双鉄さんの完食までの時間、\nれいなの10回全部が、他の20回より早いんですよぉ」
1237 = "「Trong mỗi 10 bữa ăn, thời gian anh Soutetsu ăn hết sạch,\n10 lần của Reina đều nhanh hơn 20 lần kia đó nha~」"
# monologue
# JP: えっへん、とれいなが胸を張る。
1679 = "E hèm, Reina ưỡn ngực tự hào."
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。ああいや、言われてみれば……」
1302 = "「Vậy sao. À không, nghe em nói mới thấy......」"
# monologue
# JP: 今日の漬物は妙に箸がすすむ、と。\nそう感じる日は確かに何度も、何度もあった。
1625 = "Món dưa muối hôm nay sao mà tốn cơm thế.\nQuả thật đã có rất nhiều, rất nhiều lần tôi cảm thấy như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばこれは――」
1339 = "「Nếu vậy thì đây là——」"
# monologue
# JP: もう一切れ。……いやわからん。が――\n僕の舌ではわからん違いを、データは、如実に示している。
1491 = "Gắp thêm một miếng nữa. ......Không, vẫn không hiểu nổi. Nhưng——\nSự khác biệt mà lưỡi tôi không thể nhận ra, dữ liệu lại chỉ ra một cách rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「……右田の味でありながら、同時にれいなの……。\n僕らの味でもあるのだなぁ」
685 = "「......Vừa mang hương vị của nhà Migita, đồng thời cũng là của Reina.......\nLà hương vị của riêng chúng ta nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「うっふふー。そういってもらえると、\nれいなとってもうれしいですぅ」
1041 = "「Ư hư hư~. Được anh nói vậy,\nReina vui lắ-ắm luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。というか……」
1193 = "「Anh cũng vậy. Mà nói đúng hơn là......」"
# monologue
# JP: 意識してみれば味ひとつだけのことでもない。\n食卓の花一つをとっても――
1586 = "Để ý kỹ thì không chỉ riêng mỗi hương vị.\nNgay cả bông hoa trên bàn ăn cũng vậy——"
# 【双鉄】
# display as 雙鐵
# JP: 「右田の家の中にれいなが、少しずつ増え、\nゆっくり自然に、馴染んでいっているのだなぁ」
1323 = "「Sự hiện diện của Reina trong ngôi nhà Migita này, đang tăng lên từng chút một,\nvà dần dần hòa nhập một cách thật tự nhiên nhỉ.」"
# monologue
# JP: 真闇姉の要素。日々姫の要素。僕の要素。ハチロクの要素。\nれいなの要素もきっと程なく、意識もしなくなるのだろう。
1703 = "Yếu tố của chị Mayami. Yếu tố của Hibiki. Yếu tố của tôi. Yếu tố của Hachiroku.\nChắc chắn chẳng bao lâu nữa, yếu tố của Reina cũng sẽ trở nên quen thuộc đến mức không còn bận tâm nữa."
# 【れいな】
# display as 玲奈
# JP: 「おうちで、かぞくですからねぇ」
1134 = "「Là người một nhà, là gia đình mà nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。うん。家で、家族だ」
1216 = "「Đúng vậy. Ừm. Là người một nhà, là gia đình.」"
# monologue
# JP: ――強く主張することこそなかったが、右田家同居を\nれいなが望んでいることは、結婚前から伝わってきた。
1732 = "——Tuy không phản đối mạnh mẽ, nhưng việc Reina\nmuốn sống chung với gia đình Migita đã được truyền đạt từ trước khi kết hôn."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ。これは……うん。\nひたひた、地味にいいものだ」
1013 = "「Ra là vậy. Cảm giác này......ừm.\nThấm đẫm, một cảm giác giản dị nhưng thật tuyệt vời.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。とーってもしあわせですねぇ」
1219 = "「Đúng vậy nha~. Hạnh phúc lắ-ắm luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「家族……家族。か」
1165 = "「Gia đình......Gia đình. Sao.」"
# monologue
# JP: あらためて言葉にしてみれば、理解がじんわり湧いてくる。
1521 = "Khi thử thốt lên thành lời một lần nữa, sự thấu hiểu dần dâng trào trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「まこと、結婚は家と家との結びつきなのだなぁ」
1162 = "「Quả thực, kết hôn chính là sự gắn kết giữa hai gia đình nhỉ.」"
# monologue
# JP: 面倒事を覚悟させる。\nそんな意味あいの言葉であるかと、僕は誤解をしていたが。
1603 = "Chuẩn bị tinh thần cho những rắc rối.\nTôi từng hiểu lầm đó là một câu nói mang ý nghĩa như vậy, nhưng."
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。むすびついて、まざりあうんですねぇ。\nそうてつさんのおうちと、れいなのおうちと」
1245 = "「Đúng vậy nha~. Gắn kết với nhau, và hòa quyện vào nhau nha~.\nGia đình của anh Soutetsu, và gia đình của Reina.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1092 = "「嗯」" 
# monologue
# JP: 僕の中にある父母も路子も、れいなの中のポーレットも、\n伝次郎さんも佳代子さんも、きっと混じっているだろう。
1606 = "Cha mẹ và Michiko trong tôi, Paulette trong Reina,\ncả ông Denjiro và bà Kayoko nữa, chắc chắn đều đang hòa quyện vào nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「……れいなと結婚できて、本当によかった。\nしあわせを、僕はたくさん受け取っている」
681 = "「......Thật tốt vì đã kết hôn với Reina.\nAnh đang nhận được rất nhiều hạnh phúc.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。\nうふふっ、ふうふでおそろいですねぇ」
1271 = "「Reina cũng vậy nha~.\nƯ hư hư, vợ chồng mình giống nhau nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ、まことに幸せだ」
1220 = "「Đúng vậy, thực sự rất hạnh phúc.」"
# monologue
# JP: 最後の一口を噛み締めのみこみ、箸を置く。
1478 = "Nhấm nháp và nuốt miếng cuối cùng, tôi đặt đũa xuống."
# 【れいな】
# display as 玲奈
# JP: 「れいな、お茶淹れますねぇ」
1276 = "「Reina đi pha trà nha~」"
# monologue
# JP: すっと立つ、姿勢に所作に、稀咲の指導が息づいている。\nそれもまた、僕らの家庭のひとつに混じっていくのだろう。
1546 = "Dáng đứng thẳng tắp, tư thế và động tác đều mang đậm dấu ấn từ sự chỉ dạy của Kisaki.\nĐiều đó rồi cũng sẽ hòa lẫn vào một phần gia đình của chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「結婚、か」
1310 = "「Kết hôn, sao.」"
# monologue
# JP: ……れいなを失いたくないと、衝動だけでの求婚だった。\n付随する全てを後回しにし、ゆえに、れいなと二人学んだ。
628 = "......Lời cầu hôn chỉ xuất phát từ sự bốc đồng, vì không muốn mất Reina.\nGác lại mọi thứ đi kèm, vì thế, tôi và Reina đã cùng nhau học hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はれいなと、結婚したんだなぁ」
1197 = "「Mình đã kết hôn với Reina rồi nhỉ.」"
# monologue
# JP: それは、とても、しあわせなことだ。\n今更にすぎる感慨だけれど――ほんとうに。
1725 = "Đó là một điều vô cùng hạnh phúc.\nDù là một cảm xúc quá đỗi muộn màng——nhưng thực sự là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あぁ」
1080 = "「A.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おふとんあったかですねぇ」
1043 = "「Ư hư hư~, chăn ấm quá nha~」"
# monologue
# JP: 布団にもぐれば、れいなが僕にもぐりこんでくる。\n動物の赤子の如く丸くなり僕の腹部にくっついてくる。
1730 = "Khi tôi chui vào chăn, Reina cũng chui vào lòng tôi.\nEm ấy cuộn tròn lại như một con thú non, dính sát vào bụng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの方が、布団よりずっとあたたかだ」
1278 = "「Reina còn ấm hơn chăn nhiều.」"
# 【れいな】
# display as 玲奈
# JP: 「ぽかぽかなのは、そうてつさんもですよぉ」
983 = "「Anh Soutetsu cũng ấm áp lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1034 = "「Hư hư.」"
# monologue
# JP: 一日のしめくくりにふさわしい、\n極めてゆるい――ゆるくおだやかな言葉のやりとり。
1557 = "Thật thích hợp để khép lại một ngày,\nmột cuộc trò chuyện vô cùng nhẹ nhàng——nhẹ nhàng và êm đềm."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、れいな」
1268 = "「Này, Reina.」"
# monologue
# JP: れいなの柔らかな髪の毛を、手のひらのうちで遊ばせる。\n何度も、何度も。くりかえしそっと撫でさする。
1622 = "Tôi luồn những ngón tay chơi đùa với mái tóc mềm mại của Reina.\nNhiều lần, rất nhiều lần. Lặp đi lặp lại những cái vuốt ve nhè nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
642 = "「............」"
# 【れいな】
# display as 玲奈
# JP: 「？　なんですかあ、そうてつさぁん」
1377 = "「? Chuyện gì vậy ạ~, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。今日僕は、とても幸福な気持ちになった。\nゆえ、そのしあわせを、れいなと共有したいのだけれど」
1086 = "「À, ừm. Hôm nay anh cảm thấy vô cùng hạnh phúc.\nVì thế, anh muốn chia sẻ niềm hạnh phúc đó với Reina, nhưng mà...」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいなも共有してほしいですぅ」
1124 = "「Ư hư hư~, Reina cũng muốn chia sẻ cùng anh nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「したいのだがな？　あまりにふわふわした感覚ゆえ、\nいざ言葉にしようと思うと、どうにもうまくいかなくて」
1025 = "「Anh cũng muốn lắm chứ? Nhưng vì cảm giác đó quá đỗi bồng bềnh,\nnên khi định diễn đạt thành lời, anh lại chẳng biết phải nói sao cho xuôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ならなら、へたっぴな言葉でいいですよぉ」
1340 = "「Vậy thì vậy thì, anh cứ dùng những từ ngữ vụng về cũng được nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、それでは恐らく」
961 = "「Không, nếu thế thì e là...」"
# 【れいな】
# display as 玲奈
# JP: 「だいじょうぶですよぉ。だってれいな、\nその分、いっしょうけんめいうけとりますから」
1238 = "「Không sao đâu nha~. Bởi vì Reina,\nsẽ cố gắng hết sức để đón nhận nó mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
635 = "「——Ừ.」"
# monologue
# JP: そうだった。僕らは夫婦で。僕の妻はれいななのだ。\n伝わるまで、伝えればいい。なにひとつ焦ることはない。
1560 = "Đúng vậy. Chúng tôi là vợ chồng. Vợ tôi là Reina.\nCứ truyền đạt cho đến khi em ấy hiểu là được. Chẳng có gì phải vội vàng cả."
# 【双鉄】
# display as 雙鐵
# JP: 「結婚して、夫婦になって。僕は――\n『自分の家族を作ったんだなぁ』と、そう思った」
1306 = "「Kết hôn, trở thành vợ chồng. Anh đã nghĩ rằng——\n『Mình đã tạo dựng được gia đình của riêng mình rồi nhỉ』.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ」
1272 = "「Reina cũng vậy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の場合は……夫婦という最小単位の家族になって。\nそれで何か――こう、完結するように、感じていたのだ」
1136 = "「Trường hợp của anh thì......trở thành một gia đình với đơn vị nhỏ nhất là vợ chồng.\nRồi anh cảm thấy như thể——mọi thứ đã trọn vẹn vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、レイルロオドだから、\n赤ちゃんつくれませんもんねぇ」
1287 = "「Reina là Railord,\nnên đâu thể có em bé được nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1089 = "「À——」"
# monologue
# JP: ごくあっさりとれいなが言う。\nごくあっさりと僕も頷く。
1675 = "Reina nói một cách rất thản nhiên.\nTôi cũng gật đầu một cách rất thản nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。それもあるな。こどもが作れんということもあり、\nそうした気持ちを一際強く感じていたのかもしれん」
1111 = "「Ừm. Cũng có chuyện đó nữa. Có lẽ vì không thể có con,\nnên anh mới cảm thấy điều đó mạnh mẽ đến vậy.」"
# monologue
# JP: それは厳然たる事実。一番最初からわかっていたこと。\nそうして今も、この先ずっと変わらないこと。
1724 = "Đó là một sự thật hiển nhiên. Điều mà tôi đã biết ngay từ đầu.\nVà bây giờ, hay mãi mãi về sau cũng sẽ không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「けれども実際には、思いがけぬほど家族が増えた。\nれいなにとっては、真闇姉も日々姫もハチロクも」
975 = "「Thế nhưng thực tế, gia đình chúng ta đã tăng lên nhiều đến bất ngờ.\nĐối với Reina, chị Mayami, Hibiki và cả Hachiroku nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「おとうさんもおかあさんもですよねぇ。\nそれから――うふふっ、しんせきのひとたち」
1267 = "「Cả ba mẹ nữa nha~.\nRồi còn——ư hư hư, những người họ hàng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……何にでも反対する人たちだがな。\nそれでもやはり、彼らも家族であるのかな」
677 = "「......Dù là những người lúc nào cũng phản đối mọi thứ.\nNhưng dù sao thì, họ cũng là gia đình nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「もちろんですよぉ。つながってますからねぇ」
1295 = "「Tất nhiên rồi nha~. Chúng ta được kết nối với nhau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……繋がり、か」
679 = "「......Sự kết nối, sao.」"
# monologue
# JP: いわゆる血縁を繋がりとするなら、僕のは希薄だ。\n亡き父も母もひとりっこで、祖父母も既に亡くなっている。
1555 = "Nếu coi huyết thống là sự kết nối, thì sự kết nối của tôi rất mỏng manh.\nCha mẹ quá cố của tôi đều là con một, và ông bà cũng đã qua đời."
# 【双鉄】
# display as 雙鐵
# JP: 「……少し前までの僕だったなら、\nれいなの言っている意味をわからなかったに違いない」
664 = "「......Nếu là anh của một thời gian trước,\nchắc chắn anh sẽ không hiểu được ý nghĩa lời Reina nói đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「そうなんですかぁ？」
1303 = "「Vậy sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。だけれど今ならわかる。\n家族とは、暮らしを重ね、暮らしを繋げるものなのだと」
1096 = "「Ừ. Nhưng bây giờ thì anh hiểu rồi.\nGia đình là sự chồng chất của cuộc sống, là sự kết nối của cuộc sống.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、うふふっ。きっとそうですねぇ。毎日毎日が\nかさなって、つながってるのが家族なんですねぇ」
1083 = "「A, ư hư hư. Chắc chắn là vậy rồi nha~. Mỗi ngày mỗi ngày\nchồng chất lên nhau, kết nối với nhau, đó chính là gia đình nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1092 = "「嗯」" 
# monologue
# JP: 眠気混じりの、\nごくゆったりとした言葉だからこそ染みてくる。
1543 = "Chính vì những lời nói thong thả, mang theo chút buồn ngủ ấy,\nmà nó càng thấm sâu vào lòng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その重なりは、消えないのだな。\n時間に、距離に。あるいは死にさえ、隔てられたとても」
1322 = "「Sự chồng chất đó, sẽ không bao giờ biến mất nhỉ.\nDù bị chia cắt bởi thời gian, khoảng cách. Hay thậm chí là cái chết.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ」
# 1242 = "「沒錯」" 
# monologue
# JP: ぽんやり同意してくれる。\nその穏やかさが心地いい。
1550 = "Em ấy mơ màng đồng ý.\nSự êm đềm đó thật dễ chịu."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットも、伝次郎さんも佳代子さんも。\nれいなの家族で、それはずうっと、消えませんねぇ」
1258 = "「Chị Paulette, ông Denjiro và cả bà Kayoko nữa.\nĐều là gia đình của Reina, và điều đó sẽ mã-ãi không bao giờ biến mất nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。路子も父さんも母さんも、ずっと家族だ。\n共に暮らした時間は決して、僕の中から消えはしない」
1222 = "「Ừ. Michiko, cha và mẹ cũng mãi là gia đình.\nKhoảng thời gian chung sống cùng nhau sẽ không bao giờ biến mất khỏi anh.」"
# monologue
# JP: 穏やかに交わす言葉が、一つの思考になっていく。\nれいなと僕で、ふたりの答えを作り出してる。
1601 = "Những lời nói êm đềm trao đổi cùng nhau dần hòa quyện thành một luồng suy nghĩ.\nReina và tôi, đang cùng nhau tạo ra câu trả lời của riêng hai đứa."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕の家族とれいなの家族も、一日ごとに少しずつ、\nゆるーくゆるーく、重なり合っていっているよな」
673 = "「......Gia đình của anh và gia đình của Reina, mỗi ngày một chút,\nđang nhè nhẹ, nhè nhẹ hòa quyện vào nhau nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ほんとうですねぇ」
1297 = "「Đúng thật nha~」"
# monologue
# JP: れいなが体を伸ばし動かし、僕のほっぺたに頬摺りをする。\n肌と温度も、やわらかに重なる。
1655 = "Reina vươn người cựa quậy, áp má cọ cọ vào má tôi.\nLàn da và nhiệt độ cơ thể cũng mềm mại hòa quyện vào nhau."
# 【れいな】
# display as 玲奈
# JP: 「しあわせで、たのしくて――\nうふふぅ、とってもすてきなことですねぇ」
1156 = "「Thật hạnh phúc, thật vui vẻ——\nƯ hư hư~, thật là một điều tuyệt vời nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1213 = "「Đúng vậy.」"
# monologue
# JP: 幸せすぎて、怖い気がして。\nだからだろうか、不意に寂さも感じてしまう。
1530 = "Hạnh phúc đến mức khiến tôi cảm thấy sợ hãi.\nCó lẽ vì vậy, mà tôi chợt cảm thấy có chút cô đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕たちが、これからいくつも重ねるものが」
970 = "「......Những thứ mà chúng ta sẽ cùng nhau vun đắp từ nay về sau.」"
# 【れいな】
# display as 玲奈
# JP: 「たくさんたくさん、\nいーっぱいすてきでしあわせでしょうねぇ」
1225 = "「Sẽ có rất nhiều rất nhiều,\nngập tràn những điều tuyệt vời và hạnh phúc nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕たちの死で失われるのは、もったいないな。\nやむを得ぬことかもしれんが、怖くて、さみしい」
1321 = "「Thật đáng tiếc nếu chúng biến mất khi chúng ta chết đi.\nDù có lẽ là điều không thể tránh khỏi, nhưng anh thấy sợ và buồn lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「死んじゃったら消えちゃうんですかぁ？」
1235 = "「Chết đi là sẽ biến mất sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1079 = "「っ——」"
# monologue
# JP: 思いもかけぬ素朴な問いかけ。\n僕より長くを生き抜いてきたれいなの言葉とも……いや。
1534 = "Một câu hỏi mộc mạc không ngờ tới.\nCùng với lời nói của Reina, người đã sống lâu hơn tôi......không."
# 【れいな】
# display as 玲奈
# JP: 「れいなは、きえないって思いますよぉ。だって」
1289 = "「Reina nghĩ là sẽ không biến mất đâu nha~. Bởi vì」"
# monologue
# JP: れいなが僕を抱きしめる。\n小さな両手をいっぱいに伸ばし――抱きしめてくれる。
1663 = "Reina ôm chầm lấy tôi.\nDang rộng đôi tay nhỏ bé hết mức có thể——ôm lấy tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいなのなかに、\n伝次郎さんと佳代子さんがいるのとおんなじに」
1147 = "「Giống như ông Denjiro và bà Kayoko\nvẫn luôn ở trong Reina vậy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1092 = "「嗯」" 
# monologue
# JP: 伝わってくる。\nれいなの想いが――僕らの答えが、はっきりと。
1610 = "Tôi có thể cảm nhận được.\nTâm tư của Reina——câu trả lời của chúng tôi, thật rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな。\n僕の中に、父が、母が、路子がいるのとおんなじに」
1243 = "「Đúng là vậy nhỉ.\nGiống như cha, mẹ, và Michiko vẫn luôn ở trong anh vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。そうてつさんもれいなも。\nだかられいな、死んじゃっても消えないって思います」
1212 = "「Đúng thế nha~. Cả anh Soutetsu và Reina cũng vậy.\nNên Reina nghĩ, dù có chết đi thì cũng sẽ không biến mất đâu nha~」"
# monologue
# JP: れいなの温度が、心の一番深くまで沁みる。\nこの温もりは、とても単純な真実だ。
1672 = "Hơi ấm của Reina thấm sâu vào tận đáy lòng tôi.\nSự ấm áp này, là một chân lý vô cùng giản đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。消えはしないのか」
686 = "「......Vậy sao. Sẽ không biến mất sao.」"
# monologue
# JP: 日々姫の中に、真闇姉の中の、ポーレットの中に、\nハチロクの中に、ナビの中に、僕らは、いる。
1641 = "Trong Hibiki, trong chị Mayami, trong Paulette,\ntrong Hachiroku, trong Navi, chúng tôi vẫn luôn tồn tại."
# 【れいな】
# display as 玲奈
# JP: 「消す方がきっとむつかしいですよぉ。\n御一夜鉄道のみんなだって、れいなたちの家族ですから」
1319 = "「Muốn xóa bỏ chắc chắn còn khó hơn đó nha~.\nBởi vì mọi người ở Đường sắt Ohito cũng là gia đình của Reina mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
662 = "「——Ừm.」"
# monologue
# JP: 稀咲、凪、ふかみ。\nそこからさらにつらなり重なる、全てのひとたち。
1694 = "Kisaki, Nagi, Fukami.\nTừ đó tiếp tục kết nối và đan xen với tất cả mọi người."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ならば」
1116 = "「À, nếu vậy thì.」"
# monologue
# JP: 思えば想いも繋がっていく。\nはっきりとした一つのかたちが、願いとなって浮き上がる。
1584 = "Nghĩ đến đó, những tâm tư cũng dần kết nối lại.\nMột hình hài rõ rệt, hiện lên thành một điều ước."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。僕らは線路を伸ばそう。\n八ツ城、隈元のもっと先まで、再び繋ぎ伸ばしていこう」
1293 = "「Reina. Chúng ta hãy kéo dài tuyến đường sắt ra đi.\nXa hơn cả Yatsushiro, Kumamoto, hãy kết nối và kéo dài nó ra một lần nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、とってもすてきですねぇ」
1046 = "「Ư hư hư~, thật là một ý tưởng tuyệt vời nha~」"
# monologue
# JP: ポーレットの夢、ハチロクの願い。\nそれをはじめて、僕自らの望みとはっきり意識する。
1644 = "Giấc mơ của Paulette, tâm nguyện của Hachiroku.\nLần đầu tiên, tôi nhận thức rõ ràng đó cũng chính là mong muốn của bản thân mình."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄路を繋ぐそのことは、僕らを繋ぐことなのだ」
1361 = "「Việc kết nối tuyến đường sắt, cũng chính là kết nối chúng ta.」"
# 【れいな】
# display as 玲奈
# JP: 「わ」
1054 = "「Oa.」"
# monologue
# JP: びっくりした顔。びっくりした声。\nそれがじわじわ、しあわせな笑みに融けていく。
1533 = "Khuôn mặt ngạc nhiên. Giọng nói ngạc nhiên.\nRồi dần dần tan chảy thành một nụ cười hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「そっかぁ。\nれいな、硬上のこだから実感なかったんですけど」
1331 = "「Ra là vậy nha~.\nReina là đứa trẻ sinh ra ở Katakami nên không cảm nhận rõ lắm, nhưng mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1117 = "「嗯？」" 
# 【れいな】
# display as 玲奈
# JP: 「『帝鉄一家』って、帝鉄のこたち言ってましたもんねぇ。\nはずかしそうに、けど、うれしそうに」
1171 = "「Mấy đứa trẻ của Teitetsu hay nói về 『Đại gia đình Teitetsu』 nhỉ.\nTrông có vẻ ngượng ngùng, nhưng lại rất vui vẻ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1092 = "「嗯」" 
# monologue
# JP: れいながさらに繋げてくれる。\nそうか。そんな自覚は今まで全く無かったが――
1666 = "Reina lại tiếp tục kết nối những suy nghĩ của tôi.\nRa là vậy. Cho đến nay tôi hoàn toàn không hề có ý thức đó, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道一家の一員なのだな。僕も、れいなも。\n長い歴史のその末端を、わずかながらに担っている」
1133 = "「Là một thành viên của đại gia đình đường sắt nhỉ. Cả anh và Reina.\nChúng ta đang gánh vác một phần nhỏ bé ở đoạn cuối của lịch sử lâu đời ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「そうなんですねぇ、きっと。れいな、\n気がついてなかったから、びっくりしちゃいましたぁ」
954 = "「Chắc chắn là vậy rồi nha~. Reina\nchưa từng nhận ra điều đó nên thấy bất ngờ lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
1194 = "「Anh cũng vậy.」"
# monologue
# JP: ハチロクが、ポーレットが、真に望むのはこれなのか。\n鉄路を繋ぐそのことは、想いも、歴史も繋ぐこと。
1490 = "Phải chăng đây chính là điều mà Hachiroku và Paulette thực sự mong muốn.\nViệc kết nối tuyến đường sắt, cũng chính là kết nối những tâm tư và lịch sử."
# 【れいな】
# display as 玲奈
# JP: 「れいな、もしもこのさき線路が硬上まで繋がったら。\n一度でいいから」
1153 = "「Reina, nếu sau này đường sắt được nối đến tận Katakami.\nChỉ một lần thôi cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。キハ07sで必ず。\n長旅となってしまうゆえ、ポーレットと僕の交代乗務で」
1094 = "「Ừ. Nhất định chúng ta sẽ đi bằng KiHa 07S.\nVì là một chuyến đi dài, nên anh và Paulette sẽ thay phiên nhau lái.」"
# 【れいな】
# display as 玲奈
# JP: 「わあい、うふふぅ。\nそのときが、とってもとっても楽しみでぇす」
1063 = "「Oa, ư hư hư~.\nReina rất rất là mong chờ đến lúc đó nha~」"
# monologue
# JP: 壮大すぎる目標を、れいながごくごくあどけなく、\n現実的な大きさにまで砕いてくれる。
1496 = "Một mục tiêu quá đỗi lớn lao, lại được Reina dùng sự ngây thơ của mình\nđể chia nhỏ thành một kích thước thực tế hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「となると、まずは[もじこう,2]門次港までを?いで、\n[かんもん,1]關門海峡トンネルをくぐり」
1357 = "「Vậy thì, trước tiên phải nối đến cảng Moji,\nchui qua hầm eo biển Kanmon.」"
# 【れいな】
# display as 玲奈
# JP: 「[さんよう,1]讃陽か[さんいん,1]讃陰。どっちかの線路もつながなくちゃですねぇ。\nそれで廣島までいけば、電車姫さまの線路があるから」
1170 = "「San'yo hoặc San'in. Phải nối với một trong hai tuyến đó nha~.\nRồi đi đến Hiroshima, vì ở đó có đường sắt của công chúa Densha mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこから丘山。さらに硬上までを復線か」
1265 = "「Từ đó đến Okayama. Rồi khôi phục tuyến đường đến tận Katakami à.」"
# monologue
# JP: 砕いてもなお、まことに長い道のりだ。\nが、夢物語というわけでもない。
1564 = "Dù đã chia nhỏ ra, nhưng đó vẫn là một chặng đường dài đằng đẵng.\nNhưng cũng không hẳn là một câu chuyện viển vông."
# 【双鉄】
# display as 雙鐵
# JP: 「そうなると、くろがね鉄道さんには\nさらに働いてもらわねばならんだ」
1353 = "「Nếu vậy, chúng ta sẽ phải nhờ\nĐường sắt Kurogane làm việc nhiều hơn nữa rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「ああ。れいなわかっちゃいましたぁ。\n[やわた,1]矢幡でつくられた鉄を」
1107 = "「A. Reina hiểu rồi nha~.\nSắt được sản xuất ở Yahata...」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。讃陽か讃陰経由で廣島にまで輸送する。\nその貨物線なら、実需の面でも恐らく採算性をもてよう」
1113 = "「Ừm. Sẽ được vận chuyển qua San'yo hoặc San'in đến Hiroshima.\nNếu là tuyến đường sắt chở hàng đó, xét về mặt nhu cầu thực tế thì có lẽ sẽ sinh lời.」"
# 【れいな】
# display as 玲奈
# JP: 「きっとそうですねぇ。明日になったら、\nポーレットにも相談してみましょうねぇ」
952 = "「Chắc chắn là vậy rồi nha~. Ngày mai,\nchúng ta cùng bàn bạc với chị Paulette thử xem nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ハチロクにも、みんなにも。\nそうすれば、さらにきっと――」
1114 = "「Ừ. Với cả Hachiroku và mọi người nữa.\nLàm vậy, chắc chắn sẽ càng——」"
# monologue
# JP: 繋がる。繋げる。重なる。重ねる。\nイメージが、そうして現実になっていく。
1485 = "Kết nối. Được kết nối. Chồng chất. Được chồng chất.\nNhững hình ảnh đó, cứ thế dần trở thành hiện thực."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなと僕を結ぶ絆に、無数の絆が重なり交じる。\nそれは一つの線になり、そうしていつか」
984 = "「Vô số những mối liên kết sẽ chồng chất và đan xen vào mối liên kết giữa anh và Reina.\nNó sẽ trở thành một đường thẳng, và rồi một ngày nào đó...」"
# 【れいな】
# display as 玲奈
# JP: 「レールになって、みんなの夢を乗せるんですねぇ」
1191 = "「Sẽ trở thành đường ray, chở theo giấc mơ của mọi người nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいな。その未来はとてもいい」
1146 = "「Tuyệt thật. Tương lai đó thật tuyệt vời.」"
# monologue
# JP: うふふぅと、れいながしあわせな笑いを零す。
1658 = "Ư hư hư, Reina bật cười hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　どうした？」
1052 = "「Sao vậy? Có chuyện gì à?」"
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。れいな、きづいちゃいました。\nそうてつさんとれいながすっごくすっごくがんばって」
1006 = "「Chuyện là thế này nha~. Reina vừa nhận ra một điều.\nAnh Soutetsu và Reina sẽ cố gắng thật nhiề-ều thật nhiề-ều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1092 = "「嗯」" 
# 【れいな】
# display as 玲奈
# JP: 「線路をたくさん伸ばしてつないで、そしたら鉄道が\nまた元気になって、レイルロオドも新造されて」
1173 = "「Kéo dài và kết nối thật nhiều tuyến đường sắt, rồi đường sắt\nsẽ lại trở nên hưng thịnh, và các Railord mới cũng sẽ được chế tạo.」"
# monologue
# JP: きゅうっと。僕を抱きしめる手が強くなる。\n切ない何かを感じた気がして、僕も優しく抱きしめ返す。
1539 = "Siết chặt. Vòng tay ôm tôi trở nên mạnh mẽ hơn.\nCảm nhận được một nỗi niềm đau đáu nào đó, tôi cũng dịu dàng ôm lại em ấy."
# 【れいな】
# display as 玲奈
# JP: 「そうしたら、そのこたちみぃんな。\nれいなとそうてつさんの、あかちゃん」
1356 = "「Nếu vậy thì, tất cả những đứa trẻ đó.\nSẽ là những đứa con của Reina và anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
# 662 = "「……嗯」" 
# monologue
# JP: ただ愛おしい。\n自然とキスを交わしている。
1544 = "Chỉ cảm thấy thật đáng yêu.\nChúng tôi trao nhau nụ hôn một cách thật tự nhiên."
# 【れいな】
# display as 玲奈
# JP: 「……ふぁ」
659 = "「......Phá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「こどもをつくろう。\n僕らのこどもを、たくさんたくさん」
990 = "「Hãy cùng nhau tạo ra những đứa trẻ nhé.\nThật nhiều thật nhiều những đứa con của chúng ta.」"
# monologue
# JP: きっとそこには、僕らの暮らしは残らない。\nけれども暮らしのその代わり――
1723 = "Chắc chắn ở đó sẽ không còn lưu lại cuộc sống của chúng tôi.\nNhưng thay vào đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「未来を。きっと。こどもたちに」
1329 = "「Tương lai. Chắc chắn. Dành cho những đứa trẻ.」"
