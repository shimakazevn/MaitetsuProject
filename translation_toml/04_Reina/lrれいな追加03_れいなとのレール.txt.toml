# JP: 「れいなのなかに、\n伝次郎さんと佳代子さんがいるのとおんなじに」
1147 = "「好比玲奈的心裡活著傳次郎爺爺和佳代子奶奶一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1092 = "「嗯」" 

# monologue
# JP: 伝わってくる。\nれいなの想いが――僕らの答えが、はっきりと。
1610 = "我感覺得到，玲奈的想法——還有我們的答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな。\n僕の中に、父が、母が、路子がいるのとおんなじに」
1243 = "「沒錯，就和我心目中有著父親、母親和路子一樣」" 

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。そうてつさんもれいなも。\nだかられいな、死んじゃっても消えないって思います」
1212 = "「是啊。無論是雙鐵先生還是玲奈。所以玲奈覺得死了也是不會消失的」" 

# monologue
# JP: れいなの温度が、心の一番深くまで沁みる。\nこの温もりは、とても単純な真実だ。
1672 = "玲奈的溫度深深傳入了我的心底。她的溫暖是如此單純又真切。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか。消えはしないのか」
686 = "「……這樣啊，不會消失的啊」" 

# monologue
# JP: 日々姫の中に、真闇姉の中の、ポーレットの中に、\nハチロクの中に、ナビの中に、僕らは、いる。
1641 = "日日姬的心中、真闇姐的心中、波萊特的心中、八六的心中、空凝機的內部都有著我們。" 

# 【れいな】
# display as 玲奈
# JP: 「消す方がきっとむつかしいですよぉ。\n御一夜鉄道のみんなだって、れいなたちの家族ですから」
1319 = "「要想消失才更加困難。御一夜鐵路相關的所有人都是我們的家人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
662 = "「……嗯」" 

# monologue
# JP: 稀咲、凪、ふかみ。\nそこからさらにつらなり重なる、全てのひとたち。
1694 = "稀咲、凪、深美，由此帶來的更多關聯，牽繫起了所有的人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ならば」
1116 = "「嗯，那麼」" 

# monologue
# JP: 思えば想いも繋がっていく。\nはっきりとした一つのかたちが、願いとなって浮き上がる。
1584 = "思念也是會牽繫的。分外清晰的一股思念化為願望，在我腦海中浮現。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな。僕らは線路を伸ばそう。\n八ツ城、隈元のもっと先まで、再び繋ぎ伸ばしていこう」
1293 = "「玲奈，我們讓線路變長吧。從八代、隈元到更遠的地方，讓牽繫繼續去延伸吧」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、とってもすてきですねぇ」
1046 = "「呵呵，那真是太棒了」" 

# monologue
# JP: ポーレットの夢、ハチロクの願い。\nそれをはじめて、僕自らの望みとはっきり意識する。
1644 = "波萊特的夢想、八六的心願。由此延伸出我們自己的願望，現在我清晰地體會到了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄路を繋ぐそのことは、僕らを繋ぐことなのだ」
1361 = "「鐵路的牽繫將讓我們相互牽繫」" 

# 【れいな】
# display as 玲奈
# JP: 「わ」
1054 = "「哇」" 

# monologue
# JP: びっくりした顔。びっくりした声。\nそれがじわじわ、しあわせな笑みに融けていく。
1533 = "她吃驚的表情、驚訝的聲音，很快融化在了幸福的笑臉之中。" 

# 【れいな】
# display as 玲奈
# JP: 「そっかぁ。\nれいな、硬上のこだから実感なかったんですけど」
1331 = "「這樣啊，我是片上之子，所以沒有這種感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1117 = "「嗯？」" 

# 【れいな】
# display as 玲奈
# JP: 「『帝鉄一家』って、帝鉄のこたち言ってましたもんねぇ。\nはずかしそうに、けど、うれしそうに」
1171 = "「帝鐵之子們也有過“帝鐵一家”的說法，那時的他們有些羞澀也有些快樂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1092 = "「嗯」" 

# monologue
# JP: れいながさらに繋げてくれる。\nそうか。そんな自覚は今まで全く無かったが――
1666 = "玲奈會牽繫起很多很多。對啊，儘管我以前都沒有這種自覺……" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道一家の一員なのだな。僕も、れいなも。\n長い歴史のその末端を、わずかながらに担っている」
1133 = "「因為我和你都是鐵路之家的一員，背負著鐵路漫長歷史的末端一角」" 

# 【れいな】
# display as 玲奈
# JP: 「そうなんですねぇ、きっと。れいな、\n気がついてなかったから、びっくりしちゃいましたぁ」
954 = "「一定是這樣的，沒錯。玲奈以前沒想到這一點，所以才吃驚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
1194 = "「我也是」" 

# monologue
# JP: ハチロクが、ポーレットが、真に望むのはこれなのか。\n鉄路を繋ぐそのことは、想いも、歴史も繋ぐこと。
1490 = "八六、波萊特真心期待的就是這樣的事嗎？用鐵路的牽繫來將思念與歷史相牽繫。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、もしもこのさき線路が硬上まで繋がったら。\n一度でいいから」
1153 = "「如果線路能一直延續到片上的話，玲奈希望能有一次機會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。キハ07sで必ず。\n長旅となってしまうゆえ、ポーレットと僕の交代乗務で」
1094 = "「嗯，一定會用上Ｋｉｈａ０７Ｓ的。因為是漫長的旅途，我和波萊特會輪流值勤」" 

# 【れいな】
# display as 玲奈
# JP: 「わあい、うふふぅ。\nそのときが、とってもとっても楽しみでぇす」
1063 = "「哇，呵呵。好期待那一刻的到來啊」" 

# monologue
# JP: 壮大すぎる目標を、れいながごくごくあどけなく、\n現実的な大きさにまで砕いてくれる。
1496 = "即便是無比壯大的目標，玲奈也會用她的純真無邪，將其磨碎到足夠現實的大小。" 

# 【双鉄】
# display as 雙鐵
# JP: 「となると、まずは[もじこう,2]門次港までを?いで、\n[かんもん,1]關門海峡トンネルをくぐり」
1357 = "「那麼首先就是抵達門司港，穿過關門海峽隧道」" 

# 【れいな】
# display as 玲奈
# JP: 「[さんよう,1]讃陽か[さんいん,1]讃陰。どっちかの線路もつながなくちゃですねぇ。\nそれで廣島までいけば、電車姫さまの線路があるから」
1170 = "「山陽或者山陰，線路必須連接到這兩地之一才行。然後再能通向廣島的話，那裡就有電車公主的線路了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこから丘山。さらに硬上までを復線か」
1265 = "「然後再是岡山，最後恢復片上的廢線」" 

# monologue
# JP: 砕いてもなお、まことに長い道のりだ。\nが、夢物語というわけでもない。
1564 = "就算磨碎了也是相當漫長的道路。不過這已經不是痴人說夢的事情了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなると、くろがね鉄道さんには\nさらに働いてもらわねばならんだ」
1353 = "「那樣一來就要讓黑鐵鐵路的人員加倍努力了」" 

# 【れいな】
# display as 玲奈
# JP: 「ああ。れいなわかっちゃいましたぁ。\n[やわた,1]矢幡でつくられた鉄を」
1107 = "「嗯，玲奈明白了，用八幡鑄造的鐵吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。讃陽か讃陰経由で廣島にまで輸送する。\nその貨物線なら、実需の面でも恐らく採算性をもてよう」
1113 = "「嗯，通過山陽或者山陰輸送到廣島。如果是載貨線路，從實際需要來看也有盈利空間」" 

# 【れいな】
# display as 玲奈
# JP: 「きっとそうですねぇ。明日になったら、\nポーレットにも相談してみましょうねぇ」
952 = "「一定是的。明天就跟波萊特商量一下吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ハチロクにも、みんなにも。\nそうすれば、さらにきっと――」
1114 = "「嗯，還要跟八六和其他所有人都說一下。這樣一來一定更能——」" 

# monologue
# JP: 繋がる。繋げる。重なる。重ねる。\nイメージが、そうして現実になっていく。
1485 = "你我牽繫、你我交融，想像的圖景漸漸化為現實的模樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなと僕を結ぶ絆に、無数の絆が重なり交じる。\nそれは一つの線になり、そうしていつか」
984 = "「你和我結下的情緣，會和無數緣分相交融。大家的情緣凝聚為一條線，在不遠的將來」" 

# 【れいな】
# display as 玲奈
# JP: 「レールになって、みんなの夢を乗せるんですねぇ」
1191 = "「成為火車下的軌道，載上大家的夢想前行吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいな。その未来はとてもいい」
1146 = "「好棒啊，這樣的未來太棒了」" 

# monologue
# JP: うふふぅと、れいながしあわせな笑いを零す。
1658 = "玲奈幸福地笑了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　どうした？」
1052 = "「咦？你怎麼了？」" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。れいな、きづいちゃいました。\nそうてつさんとれいながすっごくすっごくがんばって」
1006 = "「其實玲奈是想到了，雙鐵先生和玲奈要加倍再加倍努力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1092 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「線路をたくさん伸ばしてつないで、そしたら鉄道が\nまた元気になって、レイルロオドも新造されて」
1173 = "「建立起許多線路，讓鐵路重振往日雄風，再造出嶄新的鐵路人偶」" 

# monologue
# JP: きゅうっと。僕を抱きしめる手が強くなる。\n切ない何かを感じた気がして、僕も優しく抱きしめ返す。
1539 = "她抱住我的力氣變強了。我有些不捨這份溫存，也溫柔地抱住了她。" 

# 【れいな】
# display as 玲奈
# JP: 「そうしたら、そのこたちみぃんな。\nれいなとそうてつさんの、あかちゃん」
1356 = "「那麼這些孩子們，就是玲奈和雙鐵先生的寶寶了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
# 662 = "「……嗯」" 

# monologue
# JP: ただ愛おしい。\n自然とキスを交わしている。
1544 = "她真可愛，我順著心意和她接吻。" 

# 【れいな】
# display as 玲奈
# JP: 「……ふぁ」
659 = "「……呼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こどもをつくろう。\n僕らのこどもを、たくさんたくさん」
990 = "「來造我們的孩子吧，我們很多很多的孩子」" 

# monologue
# JP: きっとそこには、僕らの暮らしは残らない。\nけれども暮らしのその代わり――
1723 = "這些孩子身上不會留下我們的生活，但它們身上會有著別的東西——" 

# 【双鉄】
# display as 雙鐵
# JP: 「未来を。きっと。こどもたちに」
1329 = "「這些孩子一定能承載起我們的未來」" 
