973 = "「但其實我們任何時候都能去往任何地方。Ｋｉｈａ０７隻能在鐵路上奔馳，但你不一樣」" 

# monologue
# JP: 軽く。れいなの足に触れる。\nぴくっ、とくすぐったそうな反応。
1628 = "我碰了碰玲奈的腳，她似乎有些癢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こんなに元気でかわいい両足がついている。\n望み、歩けば。この世界のどこまでだって」
986 = "「你有如此健康可愛的雙腳。只要你願意，可以去往世界的每一個角落」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ」
1077 = "「唔哇」" 

# monologue
# JP: ごくのんびりした驚きの声。\nそうしてゆっくり、ゆっくり言葉がつむがれていく。
1554 = "她驚訝的聲音非常悠然，然後她慢慢開口說道。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、そんなふうに考えたことなかったですぅ。\nけど――」
1282 = "「玲奈從沒有這樣想過，但是……」" 

# monologue
# JP: ぴこぴこと、足が再び動き始める。
1552 = "她重新走了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、考えてみたら本当ですねぇ。れいな、\nその気になったなら、どこでも行けちゃえるんだぁ」
1129 = "「嘿嘿，想想看確實沒錯。如果玲奈想的話，完全可以去任何地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だが、一人でどんどん歩かれては、\n置いていかれては僕は寂しい。ふたりで一緒に歩きたい」
1239 = "「沒錯。不過你一個人走太遠的話，被你丟下的我會很孤單的。我想和你一起前進」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。ひとりじゃこわくてつまらないです。\n知らない世界に、もしも歩いていくんでも」
1274 = "「玲奈也是，一個人走真的好可怕又好無聊。即便是走向自己所不了解的世界」" 

# monologue
# JP: ぐいと、首と肩とに負担がかかる。\nれいなは体を前のめりにし、僕の顔を見ようとしてくる。
1739 = "頸部和肩部感受到了壓力。玲奈屈下了身子，看著我的臉龐。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんといっしょがいいです。\nずっとずうっと、どこまでだって」
1284 = "「玲奈想和你一起，雙鐵先生。想永遠永遠和你一起，無論去什麼地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、ずっと。どこまでだって」
1215 = "「是啊，永遠在一起，無論去任何地方」" 

# monologue
# JP: 頷き。気づく。\nああ――これが。これが恐らく――
1634 = "我點點頭，明白了過來。就是這個。這大概就是……" 

# 【れいな】
# display as 玲奈
# JP: 「ふうふって、きっとそういうものなんですねぇ」
1141 = "「夫妻大概就是這樣的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1242 = "「沒錯」" 

# monologue
# JP: おんなじことを考えている。\nそれが嬉しい。ただ単純に。
1602 = "我們想的一樣了。對此我感到開心極了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば一緒に家に帰ろう。\nふたりならんで――」
1350 = "「那我們一起回家吧，肩並肩地——」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、えとですねぇ。そうてつさぁん」
1088 = "「啊，對了，雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1117 = "「嗯？」" 

# 【れいな】
# display as 玲奈
# JP: 「ふたりならんで歩くのも、\nとってもとってもすてきですけど。ですけど、いまは」
1316 = "「肩並肩地一起走真是太棒了，但是現在還不行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、心得た。\nならば――それっ」
1103 = "「嗯，我明白。那就這樣」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁっ！」
1060 = "「哇！」" 

# monologue
# JP: 肩車のまま歩き出す。できる限りの大股で。
1614 = "我把她扛在肩上走了起來，儘可能大跨步地走。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、いつもとおんなじ帰り道が、\nいつもよりずうっときれいでぇす！」
1040 = "「呵呵，慣常的回家路看起來比平時漂亮多了！」" 

# monologue
# JP: ことん、ことん。\nゆっくりで規則正しい――にゃんこの手での包丁の音。
1522 = "咚、咚，緩慢而又很有節奏——是她握著貓手切菜的菜刀聲。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん、これもお味みてくださぁい」
1365 = "「雙鐵先生，請你也嚐嚐這個吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1092 = "「嗯」" 

# monologue
# JP: しょうゆとみりんの甘い匂い。それだけで食欲が煽られる。\nまして具だくさんのつぼん汁。味見の一口も待ち遠しい。
1727 = "醬油和味醂的甜蜜香味，就足以勾起我的食慾。再加上食材豐富的雞肉蔬菜湯，真想早一點嚐到味道啊。" 

# 【れいな】
# display as 玲奈
# JP: 「ふー、ふー、ふー。\nはぁい、『あ～ん』」
1047 = "「呼、呼、呼，來，“啊嗯”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あーーーん。あむっ。はふっ！　んっ――。ん。\n…………うむっ！」
1082 = "「啊嗯——啊嗚，唔！嗯——嗯……嗯嗯！」" 

# 【れいな】
# display as 玲奈
# JP: 「おあじ、どうですかぁ？」
1033 = "「味道怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旨い！　丁度いい。実に僕好みの味わいだ。\nれいなの味つけも、すっかり安定したものだなぁ」
1177 = "「很好吃！很絕妙，正是我喜歡的味道。你的調味已經很穩定了」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、今日はデートでたくさん歩きましたから、\nちょこっとだけお出汁を濃くしてあるんですよぉ」
1125 = "「嘿嘿嘿，今天約會走了很多路，玲奈把熬煮的湯汁做得濃了一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そうだったのか」
1076 = "「哦，這樣啊」" 

# 【れいな】
# display as 玲奈
# JP: 「お塩とかお醤油で濃くしちゃうと、そうてつさんの\n健康にわるいって、おねーちゃんに教わりましたぁ」
1158 = "「姐姐說了，用加鹽加醬油的方式加重口味，對雙鐵先生的身體不好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういえば教わっていたな。\nこまめに実践してくれているのだなぁ」
1099 = "「嗯，我也記得她這麼教過。原來你有仔細實踐啊」" 

# monologue
# JP: 感謝がしみじみ湧いてくる。右田の味の隠れた部分を……\n真闇姉も、日々姫も、細かに整えてくれていたのだろう。
1607 = "我心裡湧出了無限的謝意。右田家味道的特別之處……是真闇姐和日日姬仔細做出來的吧。" 

# 【れいな】
# display as 玲奈
# JP: 「――よしっ。\nうふふぅ、そうてつさぁん。できましたぁ！」
1150 = "「好，呵呵，雙鐵先生，我做好了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、運ぶのは僕がやろう。\nれいなは先に居間へ」
1101 = "「嗯，我來端菜吧。你就先去客廳」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1142 = "「好」" 

# monologue
# JP: そうしてれいなも、学んで同じくしてくれている。\n僕はなんと幸せな――家族に恵まれた男だろうか。
1707 = "而玲奈也學會了這一手，做出了同樣的味道。我真是幸福啊——有著如此照顧我的家人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よっ――」
1074 = "「哦……」" 

# monologue
# JP: ならばその分、返していこう。\n僕にできることの全てで、こころを込めて丁寧に。
1629 = "我要報答她們，用我所能做到的一切，滿懷心意地、一絲不苟地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……っと。おまたせ、れいな」
660 = "「……啊，讓你久等了，玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、それじゃあばんごはんにしましょうねぇ」
1036 = "「呵呵，一起來吃晚餐吧」" 

# monologue
# JP: れいなにあどけなくそう言われると、いつまでたっても\nどこかに僅かおままごと感を覚えてしまう。が――
1708 = "聽著玲奈可愛地說話，我總會覺得像是在扮家家酒一樣。可是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「渋いな。桐の実か。\n添えてある赤い花は――」
1014 = "「原來是梧桐種，真古樸啊。裝飾用的紅花是……」" 

# 【れいな】
# display as 玲奈
# JP: 「ヘリコニアっていうお花なんだそうですよぉ。\nお花屋さんで見つけて、桐の実にすっごくあうなぁって」
1315 = "「聽說是種叫赫蕉的花。是玲奈在花店看到的，聽說跟梧桐種很配」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。とてもいい判断だと僕も感じる」
1105 = "「嗯，我覺得選擇很不錯」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへ～」
1127 = "「嘿嘿嘿～」" 

# monologue
# JP: つぼん汁に焼き魚。割干し大根の漬物に、きんぴらゴボウ。\n落ち着きのある食卓に、緑と赤が添える彩りは鮮やかだ。
1734 = "雞肉蔬菜湯和烤魚，醃蘿蔔和金平牛蒡。樸素的餐桌，妝點上綠色和紅色，顯得分外艷麗。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、いただこう。いただきます」
1351 = "「那我們就開動吧，我開動了」" 

# 【れいな】
# display as 玲奈
# JP: 「いただきまぁす。うふふぅ、れいなもお相伴……ん？\nあれ、空っぽ」
1291 = "「玲奈開動了。呵呵，玲奈也陪你喝一杯……嗯？奇怪，是空的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいやいや、手酌はいかん」
957 = "「不不，你可不能喝酒」" 

# monologue
# JP: 立ち上がろうとするれいなをとめて、庭に出る。\nガソリン缶からスキットルいっぱい、なみなみ移す。
1619 = "我攔住準備起身的玲奈，走進了院子，從汽油罐裡給酒壺灌滿了油，拿了回來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほら、存分にやってくれ」
991 = "「來，儘管喝吧」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁい、ありがとうございまぁす。\nじゃあ、あらためて、いただきまぁす」
1065 = "「哇，謝謝。那玲奈就喝了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、僕もあらためて」
1344 = "「那我也來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「（ごくっ、ごくっ、ごくっ）。\n――ぷはぁっ、おいしいでぇす」
1370 = "「（咕嘟、咕嘟、咕嘟）呼哈，真好喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「（ずずっ）んむ……ん――うん。旨い。\nいや、本当に安定したな。漬物ひとつをとっても」
1372 = "「（嗉嗉）嗯……嗯，嗯，很好吃。你的手藝都這麼穩了，連醃菜都是如此美味」" 

# monologue
# JP: つぼん汁味で満ちた口内を、割干し大根の漬物で洗う。\n右田のものは、焼酎を混ぜ漬け込むことが特徴だが……
1524 = "嘴裡濃濃的雞肉蔬菜湯味，用醃蘿蔔就抹掉了。右田家的醃菜，特點是會加入燒酒來醃製……" 

# 【双鉄】
# display as 雙鐵
# JP: 「まことに旨い。爽やかだ。この上ない口直しになる。\nまさしく右田の味だなぁ」
1299 = "「真是太好吃了，很清爽。這是最棒的清嘴菜了，正是右田家的味道」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふふふ～」
1035 = "「呵呵呵～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1117 = "「嗯？」" 

# monologue
# JP: れいなには珍しい、いたずらっぽい笑顔。\n気になり箸が止まってしまう。
1678 = "玲奈難得露出這樣惡作劇似的笑容。我起了好奇心，停下了筷子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだどうした、なにかあるのか？」
1186 = "「怎麼了，發生什麼事了嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「実はですねぇ、おつけものはですねぇ。\n右田の味と、ちょっとだけ変えてあるんですよぉ」
1005 = "「其實我在醃菜上，對右田家的味道做了一點點改變」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　これがか？」
966 = "「什麼！真的嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「そうでぇす。今日のはれいなが漬けたヤツ。\nかくし味にレモンをつかってあるやつでぇす」
1224 = "「是的，今天的是玲奈醃的菜。玲奈加了檸檬汁來調節口感」" 

# 【双鉄】
# display as 雙鐵
# JP: 「レモンを」
1230 = "「檸檬汁」" 

# 【れいな】
# display as 玲奈
# JP: 「ですです。そうてつさんレモン大好きですからぁ。\nレシピのゆずを、レモンにかえてみたんですぅ」
1246 = "「沒錯，雙鐵先生很喜歡檸檬啊。玲奈將菜譜上的橙子改成了檸檬」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　レモンを、僕が？」
1122 = "「嗯？我吃的是檸檬汁嗎？」" 

# monologue
# JP: 意外な一言に尋ね返せば、\nれいなはますます鼻からの排気を強くする。
1633 = "我驚訝地回問道，玲奈鼻孔裡傳出的氣更重了。" 

# 【れいな】
# display as 玲奈
# JP: 「ですよぉ。揚げ物とかのとき、レモンだと100％だけど、\nゆずとかすだちだと、ほとんど双鉄さんしぼらないです」
1240 = "「沒錯。雖然炸東西的時候全都用的檸檬汁，但雙鐵先生並不會挑剔橙子汁、酸橘汁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、まったく自覚がなかった。\nゆずとレモンで、それほど違うものなの……か？」
1200 = "「我自己都不知道。橙子和檸檬真有那麼大的區別嗎……？」" 

# monologue
# JP: もう一切れ、さらに一切れ、じっくり味わい確かめてみる。
1593 = "我一片又一片地仔細品嘗起味道來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふ…………む？」
1078 = "「唔嗯…………？」" 

# monologue
# JP: ……じっくり味わい考えるほどにわからなくなる。\nが、爽やかさに覚えた感動は間違いない。
626 = "……再怎麼想也想不出區別，但爽脆的口感依然給我深深的感動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……変わっているのだろうな。恐らく」
671 = "「……我想口味真的有改變吧」" 

# 【れいな】
# display as 玲奈
# JP: 「おねえちゃんが漬けたのと、ひびきさんが漬けたのと、\nれいなが漬けたの、ぜぇんぶ別々になっててですねぇ」
1160 = "「姐姐醃的菜、日日姬小姐醃的菜、玲奈醃的菜，全都會不一樣了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まったく気づいていなかった」
668 = "「……我完全沒感覺出來」" 

# 【れいな】
# display as 玲奈
# JP: 「各10回ずつのお食事で、双鉄さんの完食までの時間、\nれいなの10回全部が、他の20回より早いんですよぉ」
1237 = "「每個人做的飯，雙鐵先生各吃十次，從吃完的用時來看，玲奈的十次比另外的二十次都要更快」" 

# monologue
# JP: えっへん、とれいなが胸を張る。
1679 = "玲奈驕傲地挺起了胸膛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。ああいや、言われてみれば……」
1302 = "「真的嗎，但聽你這麼一說……」" 

# monologue
# JP: 今日の漬物は妙に箸がすすむ、と。\nそう感じる日は確かに何度も、何度もあった。
1625 = "我的確有好多次覺得“今天的醃菜很下飯呢”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばこれは――」
1339 = "「那就是這個……」" 

# monologue
# JP: もう一切れ。……いやわからん。が――\n僕の舌ではわからん違いを、データは、如実に示している。
1491 = "再來一片……我還是嚐不出來，但是——數據卻如實地反映出了我的舌頭品嚐不出的區別。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……右田の味でありながら、同時にれいなの……。\n僕らの味でもあるのだなぁ」
