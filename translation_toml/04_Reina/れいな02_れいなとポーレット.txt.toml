2707 = "空站長圍著她打轉，場面十分溫馨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのことを話していた。\nやはり、かなり疲れ気味のようだな」
1889 = "「我們在討論波萊特的事。看來她是真得太疲憊了」" 

# 【れいな】
# display as 玲奈
# JP: 「あぅう～」
1719 = "「啊嗚～」" 

