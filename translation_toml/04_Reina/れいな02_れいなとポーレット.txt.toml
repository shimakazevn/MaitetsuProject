# monologue
# JP: まさか意図できることとも思えんが、\n結果を見れば、実に効果的な声掛けだった。
2795 = "雖然我不認為她能夠預見到這一發展，但單從結果來看真可謂是一語點醒夢中人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。いつも。\n高いところから見ていてもらえて、助かっている」
1561 = "「一直以來麻煩你了。你始終在高處觀察著大局，真是幫了我大忙」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ナビは、自分の仕事を果たしているだけです」
2201 = "「Ｎａｖｉ只是在盡自己的職責」" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分の仕事、か」
2067 = "「盡自己的職責嗎」" 

# monologue
# JP: それぞれが、それぞれに自分の仕事を持っている。\nプライドを持って果たしている。
2496 = "在場的每個人，都有著自己的職責所在。他們盡職盡責，並引以為豪。" 

# monologue
# JP: この会議が産んだ相乗効果を、\nならば僕は、なんとしてでも形にしよう。
2788 = "那麼我就應該竭盡全力，給這場會議中發生的化學反應帶來一個好的結果。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\nこの線で、提案・交渉を頼めるだろうか？」
2017 = "「波萊特。能麻煩你按照這個方向進行提案與交涉嗎？」" 

# monologue
# JP: 問えば、頷き。\nポーレットひとりだけからではなく。
2385 = "不只是波萊特，在場的各位都一同點了頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「噛ませて欲しい。\nこの手のことなら、ボクは相当役に立つよ？」
1885 = "「我也想參加。在這方面我可是很有一手的」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「元\x%l帝鉄;#00ffc040;帝鉄%l;#;の職員になら、人脈があります。\n必要があれば、いつでも声をかけてください」
1900 = "「我有前\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;職員的人脈。如果有需要，請隨時來找我」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の調整ば、任せんしゃい」
1219 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的調整就包在咱身上吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;描く！　あとポスターとかパンフも」
1887 = "「我來畫\\x%lヘッドマーク;#00ffc040;頭標%l;#;！還有海報和宣傳冊」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「\x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;ば鉄製にするなら、\n作らせてもらえると嬉しかとですねぇ」
1215 = "「\\x%lヘッドマーク;#00ffc040;頭標%l;#;如果要鐵製的，希望能交給我來做」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます、みなさん」
1878 = "「感謝各位」" 

# monologue
# JP: ポーレットがふかぶか、頭を下げる。
2625 = "波萊特深深地低下了頭。" 

# monologue
# JP: 迷いは、完全に消えたのだろう。\nその目の青は、台風一過のすがすがしさだ。
2503 = "她的眼中已經沒有迷茫。那一抹碧藍，猶如颱風過後般清澈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。双鉄くん。\nおかげでやっと、進むべきレールが見えました」
2111 = "「謝謝你，雙鐵君。你幫我找到了正確的前進方向」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった」
2175 = "「那就太好了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、双鉄くんには引き続き、わたしを含めて全体を\n見て欲しいんですけど――お願いできますか？」
2029 = "「然後，我想請雙鐵君繼續縱覽全局，也包括我在內。你願意嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。僕が力になれるのであれば、やらせてほしい」
2065 = "「當然。如果我能幫得上忙，請讓我出一份力吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2109 = "「謝謝你」" 

# monologue
# JP: 誘い出された手を受け止め、固い握手を交わす。
2624 = "波萊特朝我伸出手，我鄭重地和她握手。" 

# monologue
# JP: それが合図であるかのように、\n三々五々と、みなは散らばり、動き始める。
2779 = "這就像是一個暗號一般，大家開始各自行動起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと――そうだ、れいな」
1695 = "「哦——對了，玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、なんですかぁ？」
1765 = "「嘿嘿嘿，什麼事呀？」" 

# monologue
# JP: 視線に気づき手招きすれば、すぐにれいなは寄ってくる。\nその耳元に顔を近づけ、小さな小さな声で尋ねる。
2561 = "我發現她在看我，就朝她招了招手，她馬上跑了過來。我貼近她的耳朵小聲說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつだけ。教えて欲しいことがあるんだ」
1891 = "「我想向你請教一件事」" 

# 【れいな】
# display as 玲奈
# JP: 「なんです？\nれいな、なぁんでもおしえてあげますよぉ」
1595 = "「什麼事呀？您儘管問，玲奈知無不言哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1753 = "「嗯」" 

# monologue
# JP: ありがたい。
2701 = "真是太好了。" 

# monologue
# JP: さっきは流れを邪魔したくなく、\nそのまま聞き置いてしまったが――
2450 = "剛才我不想打斷話題，就一直沒問——" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司がいってた、\n『カイキ』――あれは一体、どういう意味だ？」
2126 = "「赤井宮司剛才說的“改軌”——那究竟是什麼意思呀？」" 
