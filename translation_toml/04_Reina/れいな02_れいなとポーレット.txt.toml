# 【れいな】
# display as 玲奈
# JP: 「お湯をかけるのが、かけ湯？　ですか？」
2005 = "「沖洗身體，就是用熱水沖一下嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう、ざばぁって。\nあ！　あんまり[しぶき,1]飛沫をたてないように、そうっとよ？」
2004 = "「沒錯，“嘩啦”一下。啊！不過要輕一點，不能濺得到處都是哦？」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。そおっと――ざばあっ」
1808 = "「好的。輕輕地——嘩啦」" 

# monologue
# JP: 手桶のお湯を残さずかぶって、\nれいなは頭からずぶぬれになる。
2654 = "玲奈將木桶舉過頭頂倒了下來，從頭到腳衝了個遍。" 

# monologue
