2404 = "今天開始乘務工作前，看她還跟平常沒有差別——難道她是在強撐著，不讓我們看到她煩惱的樣子嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまで思い悩んでいたとは……\nれいなが心配するわけだ」
1998 = "「沒想到她竟如此苦惱……難怪玲奈會擔心」" 

# 【ハチロク】
# display as 八六
# JP: 「れいながですか？」
2039 = "「玲奈她？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんですかぁ？」
1629 = "「來了，找玲奈有什麼事呀？」" 

# monologue
# JP: 改札を終え、れいながぽてぽて戻ってくる。
2516 = "完成了檢票，玲奈一路小跑過來。" 

# monologue
