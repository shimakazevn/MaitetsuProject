2074 = "「真的呀。在水裡，感覺身體輕飄飄的」" 

# monologue
# JP: はしゃいでちゃぷちゃぷ、体を上下にゆすってる。
2508 = "她高興地在水裡上下晃動身體，帶起片片水花。" 

# monologue
