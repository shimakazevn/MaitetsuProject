2821 = "（Nhưng mà nói đi cũng phải nói lại...... Reina đã rất cố gắng nhỉ.）"

# monologue
# JP: 宝生稀咲や赤井宮司、登呂流湯主人といった面々にまで\n会議への参加をしてもらえてる。
2537 = "Em ấy thậm chí còn mời được cả những người như Houshou Kisaki, đền chủ Akai và bà chủ nhà tắm Tororyu-yu tham gia cuộc họp."

# monologue
# JP: れいなではなく、僕が依頼をしていたのなら、\n参加をもらえていたかどうか、極めて怪しいところだ。
2509 = "Nếu không phải là Reina mà là tôi đi mời, thì chưa chắc họ đã chịu đến dự."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様のお考えは？」
2197 = "「Ngài Soutetsu có suy nghĩ gì không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？　僕か」
1759 = "「Hửm? Tôi sao?」"

# monologue
# JP: 無線機からの、聞き慣れた声。
2547 = "Giọng nói quen thuộc phát ra từ bộ đàm."

# monologue
# JP: れいなはまさかのナビにまで、\n声での会議参加を依頼したらしい。
2696 = "Không ngờ Reina lại mời cả Navi tham gia cuộc họp qua giọng nói."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。双鉄様にもしも全権がおありでしたら、\nどのようにして、販路を確保なさいますか？」
1962 = "「Vâng. Giả sử ngài Soutetsu có toàn quyền quyết định, ngài sẽ làm thế nào để đảm bảo đầu ra cho sản phẩm?」"

# 【双鉄】
# display as 雙鐵
# JP: 「全権、というのも随分おおざっぱな仮定だが――」
2087 = "「Toàn quyền à, một giả định có vẻ hơi bao quát quá nhỉ——」"

# monologue
# JP: 今より大きな権力を、もしも僕が持てるのならば。\nまずまっさきに解決すべきは、ひとつだろう。
2512 = "Nếu tôi có thể nắm giữ quyền lực lớn hơn hiện tại. Điều đầu tiên cần giải quyết, có lẽ chỉ có một."

# 【双鉄】
# display as 雙鐵
# JP: 「最大のネックである移送費の問題をなんとかしたい。\n鉄道会社だというのに、自前で移送も出来んのは辛い」
1894 = "「Tôi muốn giải quyết vấn đề chi phí vận chuyển, vốn là rào cản lớn nhất. Mang tiếng là công ty đường sắt mà không thể tự mình vận chuyển thì thật cay đắng.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　でも……鉄道で物を運ぶのなんて、\nまだやってるとこあると――んんっ、あるんですか？」
1691 = "「Hả? Nhưng mà...... chuyện dùng đường sắt để vận chuyển hàng hóa, bây giờ vẫn còn nơi làm thế sao——khụ, vẫn còn sao anh?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。国内でもいくらかはありますし、海外では普通に。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;輸送は万能ではありませんから」
1959 = "「Đúng vậy. Trong nước vẫn còn một vài nơi, còn ở nước ngoài thì rất phổ biến. Vì vận chuyển bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; không phải là vạn năng mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ……そっか。すごく重くてわけられないものとか、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;じゃ無理――って、じゃ、なんで[ひのもと,2]日ノ本は？」
1712 = "「A...... ra vậy. Những thứ quá nặng không thể tháo rời được, thì \\x%lエアクラ;#00ffc040;Aircra%l;#; không chở nổi——Ơ, vậy tại sao ở Hinomoto lại...?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええとですね。[ひのもと,2]日ノ本は、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の普及を早期に、強引に進めすぎたんです」
2154 = "「À thì. Hinomoto đã thúc đẩy sự phổ biến của \\x%lエアクラ;#00ffc040;Aircra%l;#; quá sớm và quá khiên cưỡng.」"

# 【稀咲】
# display as 稀咲
# JP: 「政治的な動きがあったからね。\n[めいこく,1]冥国にプッシュされると、否も応も無い」
1777 = "「Vì có động thái chính trị nhúng tay vào mà. Một khi đã bị Meikoku gây áp lực, thì chẳng có quyền nói không.」"

# monologue
# JP: 冥国がくしゃみをすれば、日ノ本は三十九度の熱を出す。
1169 = "Meikoku mà hắt hơi một cái, là Hinomoto sốt ba mươi chín độ."

# monologue
# JP: ――そういわれるほど、あの\\x%l大戦;#00ffc040;大戦%l;#;での戦勝国、\n冥国が日ノ本へ与える影響は絶大だ。
1158 = "——Người ta hay ví von như vậy, đủ thấy quốc gia thắng trận trong cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#; năm xưa, Meikoku, có tầm ảnh hưởng to lớn đến Hinomoto như thế nào."

# 【稀咲】
# display as 稀咲
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;を、驚異的な速度で普及させるため、\n日ノ本は公共交通機関への援助の手を差し伸べなかった」
2020 = "「Để phổ cập \\x%lエアクラ;#00ffc040;Aircra%l;#; với tốc độ chóng mặt, Hinomoto đã không dang tay cứu trợ các phương tiện giao thông công cộng.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1229 = "「............」"

# monologue
# JP: ハチロクが、なんとも微妙な顔になる。\n――\\x%l帝鉄;#00ffc040;帝鉄%l;#;末期の、あまりに巨額の累積赤字。
2436 = "Hachiroku làm một vẻ mặt rất khó tả. ——Đó là khoản lỗ lũy kế khổng lồ vào thời kỳ cuối của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;."

# monologue
# JP: 国庫で救済しようという話を仮に政府が出したとしても、\n国民世論は、恐らくそれを許さなかっただろうから。
2535 = "Dù chính phủ có đưa ra đề xuất dùng quốc khố để cứu trợ, thì dư luận xã hội có lẽ cũng không cho phép điều đó xảy ra."

# 【稀咲】
# display as 稀咲
# JP: 「強引にも思えた普及の結果は、皆さんご存知のとおり。\n生活の利便性は向上し、GNPも大きく向上した」
1864 = "「Kết quả của sự phổ cập có phần khiên cưỡng đó, như mọi người đã biết. Sự tiện lợi trong đời sống được nâng cao, và GNP cũng tăng trưởng mạnh mẽ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「半面、完全に競争力を失ってしまった産業も、\n多かったんです」
1615 = "「Nhưng mặt khác, cũng có rất nhiều ngành công nghiệp hoàn toàn đánh mất đi năng lực cạnh tranh.」"

# monologue
# JP: その声につられたように、\n日々姫の目がレールショップの窓へと動く。
2792 = "Như bị cuốn theo lời nói đó, ánh mắt Hibiki hướng về phía cửa sổ của Cửa hàng đường sắt."

# monologue
# JP: その向こうにある、もの淋しげなレールとホーム。\n日々姫はきゅっと口を噤んでしまう。
2709 = "Phía bên kia, là những đường ray và sân ga vắng vẻ đìu hiu. Hibiki mím chặt môi lại."

# 【れいな】
# display as 玲奈
# JP: 「でもでも、国内でも！　狭い範囲の中でですけど、\n今も元気に走ってる貨物\\x%l列車;#00ffc040;列車%l;#;さん、たくさんですよぉ」
1618 = "「Nhưng mà, nhưng mà, ở trong nước! Tuy chỉ ở phạm vi hẹp thôi, nhưng hiện giờ vẫn còn rất nhiều \\x%l列車;#00ffc040;đoàn tàu%l;#; chở hàng đang hoạt động năng nổ đó nha~」"

# monologue
# JP: なんとなく沈んでしまった空気を温めなおそうとしてか、\nれいなが元気な声を出す。
2580 = "Dường như muốn làm ấm lại bầu không khí có phần chùng xuống, Reina cất giọng đầy sức sống."

# 【れいな】
# display as 玲奈
# JP: 「[りょかく,1]旅客鉄道は、全盛期の２０％も線路残ってないですけど。\n貨物鉄道は、三分の一くらいは残ってるですからぁ」
2195 = "「Đường sắt chở khách thì số lượng đường ray còn lại chưa tới 20% so với thời kỳ hoàng kim. Nhưng đường sắt chở hàng thì vẫn còn khoảng một phần ba đó nha~」"

# 【凪】
# display as 凪
# JP: 「りょかくてつどうと、かもつてつどうって、\n何がどう違うばい？」
1832 = "「Đường sắt chở khách với đường sắt chở hàng, khác nhau ở chỗ nào vậy?」"

# monologue
# JP: ……ああ。そうか。ひょっとして世代的に、\n凪あたりはもう、貨物\\x%l列車;#00ffc040;列車%l;#;を知らんのかもしれん。
1182 = "......À. Ra vậy. Có lẽ do khoảng cách thế hệ, những đứa trẻ như Nagi đã không còn biết đến \\x%l列車;#00ffc040;tàu%l;#; chở hàng nữa rồi."

# 【ふかみ】
# display as 深美
# JP: 「ええとね？　凪ちゃん」
2089 = "「À thì? Nagi nè.」"

# monologue
# JP: が、その仮説はすぐさまに、\n凪と同い年の少女によって、破られる。
2470 = "Nhưng giả thuyết đó ngay lập tức, đã bị một cô bé trạc tuổi Nagi phá vỡ."

# 【ふかみ】
# display as 深美
# JP: 「[りょかく,1]旅客鉄道がお客さんを運ぶ鉄道で、\n貨物鉄道は荷物だけを運ぶ鉄道……えと、です、よね？」
1834 = "「Đường sắt chở khách là đường sắt chuyên chở hành khách, còn đường sắt chở hàng là đường sắt chỉ chuyên chở hàng hóa...... à, đúng không ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、ふかみさんのいうとおりですぅ」
1976 = "「Vâng ạ~, đúng như chị Fukami nói đó nha~」"

# 【ポーレット】
# display as 波萊特
# JP: 「大廃線以前には、[りょかく,1]旅客鉄道網だけじゃなく、\n貨物鉄道網も、日ノ本全土を網羅していたんですよ？」
1785 = "「Trước cuộc Đại bãi bỏ các tuyến đường sắt, không chỉ có mạng lưới đường sắt chở khách, mà cả mạng lưới đường sắt chở hàng cũng bao phủ khắp Hinomoto đấy nhé?」"

# 【凪】
# display as 凪
# JP: 「なんで、貨物と旅客と、別個にしたと？」
2023 = "「Tại sao lại phải tách riêng chở hàng và chở khách ra?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それは、[ひのもと,2]日ノ本が[りょかく,1]旅客鉄道大国だったからだよ」
2177 = "「Đó là vì, Hinomoto từng là một cường quốc về đường sắt chở khách.」"

# 【凪】
# display as 凪
# JP: 「旅客鉄道大国～？」
1833 = "「Cường quốc đường sắt chở khách~?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「御一夜あたりだけを見れば信じられないだろうけどね。\n首都圏となると、話はまるで違ったんだ」
1813 = "「Nếu chỉ nhìn khu vực quanh Ohimitera thì chắc cháu không tin đâu nhỉ. Nhưng ở khu vực thủ đô thì câu chuyện hoàn toàn khác đấy.」"

# monologue
# JP: 赤井宮司はそこまで言って、ハチロクを見る。\n途端、ハチロクはなんとも誇らしげな声を出す。
2754 = "Nói đến đó, đền chủ Akai nhìn sang Hachiroku. Ngay lập tức, Hachiroku cất giọng đầy tự hào."

# 【ハチロク】
# display as 八六
# JP: 「帝都で最も栄えた環状線。[やまのて,2]山之手線においては、\n二分に一本、休むことなく\\x%l列車;#00ffc040;列車%l;#;は走っておりました」
1856 = "「Tuyến đường vòng sầm uất nhất Đế đô. Ở tuyến Yamanote, cứ hai phút lại có một chuyến \\x%l列車;#00ffc040;tàu%l;#; chạy không ngừng nghỉ ạ.」"

# 【凪】
# display as 凪
# JP: 「二分に一本っ！？」
1646 = "「Hai phút một chuyến á!?」"

# 【ふかみ】
# display as 深美
# JP: 「え？　だって、そんなにたくさんお客さんなんて」
1692 = "「Hả? Nhưng mà, làm gì có nhiều hành khách đến thế...」"

# 【ハチロク】
# display as 八六
# JP: 「いらっしゃるのです、帝都では。二分に一本来てもなお、\n通勤時間帯の\\x%l客車;#00ffc040;客車%l;#;は、ぎゅうぎゅうのすし詰めでした」
1788 = "「Có đó ạ, ở Đế đô thì có. Dù hai phút một chuyến, nhưng vào giờ cao điểm đi làm, các \\x%l客車;#00ffc040;toa hành khách%l;#; vẫn chật cứng như nêm ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「人もお金も仕事も、帝都に集中するからね」
1776 = "「Vì con người, tiền bạc và công việc đều tập trung ở Đế đô mà.」"

# monologue
# JP: 凪の頬に、みるみる赤みが差していく。
2445 = "Đôi má Nagi nhanh chóng ửng hồng."

# 【凪】
# display as 凪
# JP: 「わおわお、帝都ってすごかね！　ふかみちゃん」
1683 = "「Oa oa, Đế đô tuyệt quá đi! Fukami ơi.」"

# 【ふかみ】
# display as 深美
# JP: 「うん。すごすぎ。\nわたし……ちょっと、おっかないかも」
1747 = "「Ừ. Quá tuyệt luôn.\nMình...... có khi hơi sợ nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから、とくに大都市圏では、\n専用の貨物線を確保する必要があったんですね」
1910 = "「Vì vậy, đặc biệt là ở các khu vực đại đô thị, cần phải đảm bảo có tuyến đường sắt chở hàng chuyên dụng.」"

# 【凪】
# display as 凪
# JP: 「なるほどばい！」
1658 = "「Ra là vậy nè!」"

# monologue
# JP: 赤井宮司とポーレットとが、\n熟練教師と教育実習生とのようだ。
2764 = "Đền chủ Akai và Paulette trông như một giáo viên kỳ cựu và một giáo sinh thực tập vậy."

# monologue
# JP: ふかみは「はい」と、声まで出して挙手をする。
2630 = "Fukami hô \"Dạ\" và giơ tay lên."

# 【ふかみ】
# display as 深美
# JP: 「それなら、こっちみたいな田舎の方だと、\n貨物線は、専用には確保されてなかったんです、か？」
2181 = "「Vậy thì, ở vùng nông thôn như chỗ chúng ta, thì không có tuyến chở hàng chuyên dụng đúng không ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「確保されていたケースも多いですよ？\n例えば、それこそ鉱山から製鉄所への専用線とか」
1588 = "「Cũng có nhiều trường hợp được đảm bảo tuyến chuyên dụng đấy chứ? Ví dụ như tuyến chuyên dụng từ mỏ than đến nhà máy luyện thép chẳng hạn.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、そういうのもあるんです。ね」
1735 = "「A, cũng có những tuyến như vậy ạ. Nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええ。その上で、\n旅客線路を貨物\\x%l列車;#00ffc040;列車%l;#;が走ることも、よくありました」
1955 = "「Đúng vậy. Ngoài ra, \\x%l列車;#00ffc040;tàu%l;#; chở hàng chạy trên tuyến chở khách cũng là chuyện thường xuyên xảy ra.」"

# 【れいな】
# display as 玲奈
# JP: 「っていうか、\nもともと鉄道は、貨物輸送のためのものなんですよぉ？」
1881 = "「Mà nói đúng hơn thì, vốn dĩ đường sắt sinh ra là để vận chuyển hàng hóa mà nha~?」"

# monologue
# JP: 教師陣へとれいながくわわり、\nえへん！　と誇らしげな声を出す。
2453 = "Reina gia nhập vào hàng ngũ giáo viên, và ưỡn ngực \"E hèm!\" đầy tự hào."

# 【れいな】
# display as 玲奈
# JP: 「だから鉱山鉄道は、\n全ての鉄道のおかあさんなのですぅ」
1913 = "「Vì thế đường sắt mỏ than, chính là mẹ của mọi loại đường sắt đó nha~」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。やがて、貨物だけではなく、\n人も運ぼうということになり、\\x%l客車;#00ffc040;客車%l;#;が誕生したのです」
2002 = "「Đúng là vậy ạ. Sau này, người ta không chỉ vận chuyển hàng hóa, mà còn muốn chở cả người, nên \\x%l客車;#00ffc040;toa hành khách%l;#; mới ra đời.」"

# 【凪】
# display as 凪
# JP: 「へええ、貨物の方が先だったとばい？　意外ばい！！」
1696 = "「Hể, chở hàng có trước sao nè? Bất ngờ quá nè!!」"

# 【ハチロク】
# display as 八六
