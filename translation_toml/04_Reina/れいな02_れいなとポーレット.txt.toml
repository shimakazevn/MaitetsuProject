2100 = "「要去八代市的話，坐\\x%lエアクラ;#00ffc040;空凝機%l;#;車只需四五十分鐘吧？如果坐我的航空型\\x%lエアクラ;#00ffc040;空凝機%l;#;，還能節省更多時間」" 

