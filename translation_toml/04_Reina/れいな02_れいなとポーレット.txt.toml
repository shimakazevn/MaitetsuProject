2500 = "她可能會對我以及其他參加者產生不必要的愧疚心理，更加無法自拔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば」
2159 = "「這樣啊，那麼——」" 

# 【れいな】
# display as 玲奈
