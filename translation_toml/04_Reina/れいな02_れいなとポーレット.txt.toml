# JP: 「ならば良かった」
2175 = "「Vậy thì tốt rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それで、双鉄くんには引き続き、わたしを含めて全体を\n見て欲しいんですけど――お願いできますか？」
2029 = "「Và, em muốn nhờ anh Soutetsu tiếp tục bao quát toàn bộ mọi việc, bao gồm cả em nữa——Có được không anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。僕が力になれるのであれば、やらせてほしい」
2065 = "「Tất nhiên rồi. Nếu tôi có thể giúp ích, xin hãy để tôi làm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2109 = "「Cảm ơn anh.」"

# monologue
# JP: 誘い出された手を受け止め、固い握手を交わす。
2624 = "Nắm lấy bàn tay đang đưa ra, chúng tôi trao nhau một cái bắt tay thật chặt."

# monologue
# JP: それが合図であるかのように、\n三々五々と、みなは散らばり、動き始める。
2779 = "Như một hiệu lệnh, mọi người tản ra thành từng nhóm nhỏ và bắt đầu hành động."

# 【双鉄】
# display as 雙鐵
# JP: 「っと――そうだ、れいな」
1695 = "「À——Đúng rồi, Reina.」"

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、なんですかぁ？」
1765 = "「Ehehe~, chuyện gì vậy nha~?」"

# monologue
# JP: 視線に気づき手招きすれば、すぐにれいなは寄ってくる。\nその耳元に顔を近づけ、小さな小さな声で尋ねる。
2561 = "Nhận thấy ánh mắt của tôi và cái vẫy tay, Reina lập tức chạy lại gần. Tôi ghé sát tai em ấy, hỏi bằng một giọng thật nhỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつだけ。教えて欲しいことがあるんだ」
1891 = "「Chỉ một chuyện thôi. Có điều này anh muốn hỏi em.」"

# 【れいな】
# display as 玲奈
# JP: 「なんです？\nれいな、なぁんでもおしえてあげますよぉ」
1595 = "「Chuyện gì vậy ạ? Chuyện gì Reina cũng nói cho anh biết hết nha~.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1753 = "「嗯」" 

# monologue
# JP: ありがたい。
2701 = "Thật biết ơn."

# monologue
# JP: さっきは流れを邪魔したくなく、\nそのまま聞き置いてしまったが――
2450 = "Lúc nãy không muốn cắt ngang mạch câu chuyện, nên tôi đành để đó không hỏi——"

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司がいってた、\n『カイキ』――あれは一体、どういう意味だ？」
2126 = "「Cái từ mà đền chủ Akai vừa nói, 『Kaiki』——Rốt cuộc nó có nghĩa là gì vậy?」"
