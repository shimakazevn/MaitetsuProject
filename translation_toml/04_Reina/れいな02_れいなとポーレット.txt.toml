# JP: だってわたしは、知っているから。\nママのした選択は間違いだって、わかってるから。
2490 = "因為我是知道的。我知道媽媽所做的選擇是錯誤的。" 

# monologue
# JP: （それにれいなは間違いなく、\n双鉄くんを、毎日幸せにしてあげられる）
2838 = "（而且玲奈一定能讓雙鐵君過上幸福的日子）" 

# monologue
# JP: だって、れいなはれいなだから。\nわたしの大事な、れいなだから。
2492 = "因為，玲奈就是玲奈。是我最心愛的玲奈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「三人のうち、二人が幸せになれるのと、\n一人しか幸せになれないのとなら、どっちがいいかな？」
1568 = "「三個人裡面，有兩個人能獲得幸福，或者只有一個人能獲得幸福——玲奈覺得哪種情況比較好？」" 

# 【れいな】
# display as 玲奈
# JP: 「二人が幸せになれるほうが、\nれいなはいいって思います」
2048 = "「玲奈覺得兩個人獲得幸福比較好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だよね。そうよね」
1936 = "「是啊。就是啊」" 

# monologue
# JP: やっぱり、間違いなんかじゃない。\nれいなもそれを望んでるなら、わたしは綺麗に――
2611 = "果然，我沒有想錯。既然玲奈也是如此希望的，那就讓我徹底地——" 

# 【れいな】
# display as 玲奈
# JP: 「だけどですねぇ、ポーレット」
1668 = "「可是呀，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1689 = "「哎？」" 

# 【れいな】
# display as 玲奈
# JP: 「三人のうち、三人が幸せになれるのが、\n一番いいって、れいなはすごく思うです」
2049 = "「玲奈覺得，讓三個人都獲得幸福才是最好的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1714 = "「啊」" 

# monologue
# JP: れいなは、れいな。\nわたしの全てを許してくれて、わたしも全てを許せる相手。
2656 = "玲奈就是玲奈。她願意包容我的一切，我也願意接受她的所有。" 

# monologue
# JP: れいなとだったら、そうできる。\n双鉄くんとれいなとだったら、きっと、わたしも幸せに。
2585 = "所以我和玲奈兩個人一定能夠做到。雙鐵君和玲奈也一定能夠給我帶來幸福。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん、そうね。\nすごいな、れいなはとってもかしこい！」
1757 = "「嗯，是啊。真厲害，玲奈太聰明了！」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、ほめられちゃいましたぁ――ひゃっ！？」
1767 = "「嘿嘿嘿，受到表揚啦——呀！？」" 

# monologue
# JP: ぎゅって、れいなを抱きしめる。\n抱きしめてほおずりをして、もう放さない。
2566 = "我緊緊地抱住玲奈。抱著她，蹭著她的臉頰，再也不願放手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうよね、それが一番いい」
1952 = "「是啊，那樣才是最好的」" 

# monologue
# JP: だから、まず。わたしはれいなを応援しよう。\n身を引くんじゃなく。悲劇のヒロインぶるんじゃなくて。
2586 = "所以，我首先要做的不是退讓，不是以悲劇的女主角自居，而是應該為玲奈加油。" 

# monologue
# JP: れいなの恋が叶うなら。\nれいなと双鉄くんと、わたしと。
2514 = "如果玲奈的戀情能夠開花結果。那麼玲奈和雙鐵君，還有我——" 

# monologue
# JP: （どんな形かはわからないけど。\nそれでも絶対、誰一人欠けずに、傷つかないで）
2845 = "（雖然還不知道會以何種方式。但是一定不會少了任何一個人，不會傷到任何一個人）" 

# monologue
# JP: 三人で。\n一緒に未来を――過ごしていけると思うから。
2563 = "我相信，我們能夠三個人一起，迎來美好的未來。" 

# 【れいな】
# display as 玲奈
# JP: 「今日は、\nみなさん来てくださってありがとうございます。です」
1597 = "「今天很感謝各位賞臉前來」" 

# monologue
# JP: 珍しく、少しだけ緊張したようなれいなの声。
2670 = "玲奈的聲音有些緊張，這可真是罕見。" 

# 【れいな】
# display as 玲奈
# JP: 「えと……あの――」
1672 = "「呃……那個——」" 

# monologue
# JP: 言葉につまってしまったのか、\nすがる視線が、ポーレットを向く。
2498 = "她似乎一時語塞，向波萊特投去求助的目光。" 

# monologue
# JP: ポーレットはすぐさま微笑んで、\n出てこなかったれいなの言葉を、代わってつむぐ。
2627 = "波萊特隨即笑著接過玲奈的話題。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今日は、マイントレジャー[じゅつせん,1]術仙炭鉱において産出予定の\n石炭の用途についてお知恵を頂きたく思っております」
1601 = "「今天請大家來，是希望針對煤探樂園術仙煤礦預定產出的煤炭用途，徵詢大家的寶貴意見」" 

# 【稀咲】
# display as 稀咲
# JP: 「それは、売る他にないだろう？」
2193 = "「除了出售，也沒其它辦法了吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おっしゃるとおりです。\nけれど……手元の資料をご覧ください」
1824 = "「完全正確。可是……請大家看看手上的資料」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ……価格競争においては、\n輸入炭の相手になり得ないわけですね？」
1706 = "「啊……在價格戰中，無法與進口煤匹敵是嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「これはキツイね。……１[めい]冥ドルが200円超という、\n空前絶後の超円安になってようやく、互角となるのか」
2152 = "「這可真是困難。日元必須空前絕後地貶值到１美元兌２００日元以上，才可能有一戰之力嗎」" 

# monologue
# JP: お手上げポーズの稀咲の隣席、\n蓑笠老人も困った顔で首を傾げる。
2706 = "稀咲做出投降的手勢，一旁的蓑笠爺爺也為難地歪著腦袋。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「それでも売らねばならんのでしたら、\n抱き合わせ位しか、なかとですかねぇ」
1815 = "「如果在這樣的情況下還是必須出售，那就只能搞捆綁銷售了吧」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ゆーか、石炭ば、どこ相手に売りよるもんね？」
2106 = "「話說，你們要把煤炭賣給誰啊？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「国内では八割が、製鉄所と火力発電所で消費されます。\n商品や製品で抱き合わせるのは、難しいかもしれません」
1783 = "「國內八成的煤炭消費來自煉鐵廠和火力發電廠。要跟商品或製品捆綁銷售，可能會有困難」" 

# monologue
# JP: ……次々出てくる意見・質問を、\nポーレットは的確にさばいてく。
1193 = "……波萊特準確無誤地處理著接連而來的意見與提問。" 

# monologue
# JP: 苦境には全く変化が無いにもかかわらず、その顔色も\n表情も、梅雨の合間の、久方ぶりの晴れ間のようだ。
2428 = "儘管仍未脫離困境，可她的臉色與表情就好像梅雨季節中許久未見的一縷陽光。" 

# monologue
# JP: （れいなが――\nポーレットの雲を晴らしてくれたのだな）
2834 = "（是玲奈驅散了波萊特心中的陰霾啊）" 

# 【れいな】
# display as 玲奈
# JP: 「石炭の品質に関しては、\n４ページのグラフを見るとわかりやすいですぅ」
2190 = "「關於煤炭的品質，參照第４頁的圖表會比較直觀」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがと、れいな」
2110 = "「謝謝你，玲奈」" 

# monologue
# JP: ……れいなも緊張が解けたのか、元気いっぱいに、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;らしい正確さのフォローを入れてる。
1196 = "……玲奈似乎也不再緊張，她精神飽滿地提供著\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;特有的精準幫助。" 

# monologue
# JP: やはり、このふたりのコンビネーションは素晴らしい。\nお互いが、お互いをより引き立てあってる。
2778 = "這兩個人真是一對完美的搭檔。她們起到了相輔相成的效果。" 

# monologue
# JP: （それにしても……れいなは頑張ったな）
2821 = "（不過話說回來……玲奈還真是下了工夫啊）" 

# monologue
# JP: 宝生稀咲や赤井宮司、登呂流湯主人といった面々にまで\n会議への参加をしてもらえてる。
2537 = "就連寶生稀咲、赤井宮司、登呂流浴場老闆等人也出席了會議。" 

# monologue
# JP: れいなではなく、僕が依頼をしていたのなら、\n参加をもらえていたかどうか、極めて怪しいところだ。
2509 = "如果不是玲奈，而是由我去邀請的話，真不知道能不能請到他們。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様のお考えは？」
2197 = "「雙鐵少爺有什麼想法？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？　僕か」
1759 = "「嗯？我啊」" 

# monologue
# JP: 無線機からの、聞き慣れた声。
2547 = "從無線電對講機中，傳來熟悉的聲音" 

# monologue
# JP: れいなはまさかのナビにまで、\n声での会議参加を依頼したらしい。
2696 = "看來玲奈還邀請了Ｎａｖｉ，以語音的方式參加會議。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。双鉄様にもしも全権がおありでしたら、\nどのようにして、販路を確保なさいますか？」
1962 = "「是的。如果這件事由雙鐵少爺全權管理，您會用什麼方法來保證銷路？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全権、というのも随分おおざっぱな仮定だが――」
2087 = "「突然這麼假設也太空泛了吧。總之——」" 

# monologue
# JP: 今より大きな権力を、もしも僕が持てるのならば。\nまずまっさきに解決すべきは、ひとつだろう。
2512 = "如果我擁有比現在更大的權力，最應該優先解決的問題只有一個吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「最大のネックである移送費の問題をなんとかしたい。\n鉄道会社だというのに、自前で移送も出来んのは辛い」
1894 = "「我想解決目前最大的瓶頸——運輸費的問題。明明是鐵路公司，卻無法自己完成運輸，真的很不是滋味」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　でも……鉄道で物を運ぶのなんて、\nまだやってるとこあると――んんっ、あるんですか？」
1691 = "「哎？可是……現在還有公司用鐵路來運貨什麼的——咳咳，還有公司利用鐵路運輸貨物嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。国内でもいくらかはありますし、海外では普通に。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;輸送は万能ではありませんから」
1959 = "「是的。國內也有幾家，而在國外則更為普遍。畢竟\\x%lエアクラ;#00ffc040;空凝機%l;#;的運輸並不是萬能的」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……そっか。すごく重くてわけられないものとか、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;じゃ無理――って、じゃ、なんで[ひのもと,2]日ノ本は？」
1712 = "「啊……對哦。那些沉重且不可拆分的貨物，是無法用\\x%lエアクラ;#00ffc040;空凝機%l;#;運輸的——咦，那為什麼在日本會變成這樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええとですね。[ひのもと,2]日ノ本は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の普及を早期に、強引に進めすぎたんです」
2154 = "「這是因為，日本太早並且太強硬地推進了\\x%lエアクラ;#00ffc040;空凝機%l;#;的普及」" 

# 【稀咲】
# display as 稀咲
# JP: 「政治的な動きがあったからね。\n[めいこく,1]冥国にプッシュされると、否も応も無い」
1777 = "「因為曾有過政治層面的操作。一旦受到美國的施壓，日本就別無選擇」" 

# monologue
# JP: 冥国がくしゃみをすれば、日ノ本は三十九度の熱を出す。
1169 = "“美國打一個噴嚏，日本就要發３９度的高燒”。" 

# monologue
# JP: ――そういわれるほど、あの\x%l大戦;#00ffc040;大戦%l;#;での戦勝国、\n冥国が日ノ本へ与える影響は絶大だ。
1158 = "——從這一句調侃中就能看得出，身為昔日那場大戰戰勝國的美國，對日本的影響是多麼巨大。" 

# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;を、驚異的な速度で普及させるため、\n日ノ本は公共交通機関への援助の手を差し伸べなかった」
2020 = "「為了使\\x%lエアクラ;#00ffc040;空凝機%l;#;以驚人的速度得到普及，日本沒有對公共交通機關伸出援助之手」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1229 = "「…………」" 

# monologue
# JP: ハチロクが、なんとも微妙な顔になる。\n――\x%l帝鉄;#00ffc040;帝鉄%l;#;末期の、あまりに巨額の累積赤字。
2436 = "八六神情複雜。我想到的是\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;末期那巨額的累積赤字。" 

# monologue
# JP: 国庫で救済しようという話を仮に政府が出したとしても、\n国民世論は、恐らくそれを許さなかっただろうから。
2535 = "就算政府提出動用國庫來提供援助，恐怕國民與輿論也不會允許。" 

# 【稀咲】
# display as 稀咲
# JP: 「強引にも思えた普及の結果は、皆さんご存知のとおり。\n生活の利便性は向上し、GNPも大きく向上した」
1864 = "「強行推進普及所得到的結果，各位都已經知道了。生活便利性提升，國民生產總值也大幅提高」" 

# 【ポーレット】
# display as 波萊特
# JP: 「半面、完全に競争力を失ってしまった産業も、\n多かったんです」
1615 = "「但反過來說，也有許多產業徹底失去了競爭力」" 

# monologue
# JP: その声につられたように、\n日々姫の目がレールショップの窓へと動く。
2792 = "隨著波萊特的話語，日日姬不自覺地看向鐵路商店的窗戶。" 

# monologue
# JP: その向こうにある、もの淋しげなレールとホーム。\n日々姫はきゅっと口を噤んでしまう。
2709 = "窗外，是一片寂寥的鐵軌與月台。日日姬眺望著窗外，一語不發。" 

# 【れいな】
# display as 玲奈
# JP: 「でもでも、国内でも！　狭い範囲の中でですけど、\n今も元気に走ってる貨物\x%l列車;#00ffc040;列車%l;#;さん、たくさんですよぉ」
1618 = "「但是但是，雖然行駛範圍不大！可國內至今還有很多貨運\\x%l列車;#00ffc040;列車%l;#;在健健康康地奔跑著哦」" 

# monologue
# JP: なんとなく沈んでしまった空気を温めなおそうとしてか、\nれいなが元気な声を出す。
2580 = "或許是想活躍一下沉重的氣氛，玲奈用充滿朝氣的聲音說道。" 

# 【れいな】
# display as 玲奈
# JP: 「[りょかく,1]旅客鉄道は、全盛期の２０％も線路残ってないですけど。\n貨物鉄道は、三分の一くらいは残ってるですからぁ」
2195 = "「雖然剩下的客運鐵路只有全盛期的２０％，但貨運鐵路還有大概三分之一」" 

# 【凪】
# display as 凪
# JP: 「りょかくてつどうと、かもつてつどうって、\n何がどう違うばい？」
1832 = "「客運鐵路和貨運鐵路，這兩個有什麼區別呀？」" 

# monologue
# JP: ……ああ。そうか。ひょっとして世代的に、\n凪あたりはもう、貨物\x%l列車;#00ffc040;列車%l;#;を知らんのかもしれん。
1182 = "……啊，原來如此。或許像凪這個年紀的孩子已經不知道什麼是貨運\\x%l列車;#00ffc040;列車%l;#;了。" 

# 【ふかみ】
# display as 深美
# JP: 「ええとね？　凪ちゃん」
2089 = "「聽我說哦，小凪」" 

# monologue
# JP: が、その仮説はすぐさまに、\n凪と同い年の少女によって、破られる。
2470 = "可是我的假設很快就被這位與凪同齡的少女推翻了。" 

# 【ふかみ】
# display as 深美
# JP: 「[りょかく,1]旅客鉄道がお客さんを運ぶ鉄道で、\n貨物鉄道は荷物だけを運ぶ鉄道……えと、です、よね？」
1834 = "「客運鐵路就是載客的鐵路，貨運鐵路就是載貨的鐵路……那個，我沒說錯吧？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、ふかみさんのいうとおりですぅ」
