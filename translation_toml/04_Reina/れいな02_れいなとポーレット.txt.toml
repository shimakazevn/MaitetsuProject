1622 = "「你之所以求我帶你來登呂流浴場，其實是想帶我到這裡來嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、それもありますよぉ。\n温泉はつかれに効くって、れいなだって知ってますしぃ」
1763 = "「嘿嘿嘿，也有這個原因哦。因為玲奈也知道，泡溫泉有助於紓解疲勞」" 

# 【ポーレット】
