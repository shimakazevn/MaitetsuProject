1981 = "「是這樣呀。那看來還是儘量不使用藥物比較好呢」" 

# 【れいな】
# display as 玲奈
# JP: 「だったら、お医者さんにさそうほかには。\nれいな、ポーレットにどうしてあげたらいいですかぁ？」
2179 = "「那玲奈除了勸波萊特去看醫生，還能為她做些什麼呀？」" 

# 【双鉄】
# display as 雙鐵
