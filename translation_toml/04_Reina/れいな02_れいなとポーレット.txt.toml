[script]
# lines: 426 
# monologue
# JP: \\x%lブラスト;#00ffc040;ブラスト%l;#;音が聞こえぬ代わり、\nレールの継ぎ目を越えてく音はクッキリ響く。
2410 = "Thay vì tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#;, âm thanh bánh xe lướt qua các mối nối đường ray vang lên rõ mồn một."

# monologue
# JP: \\x%l運転台;#00ffc040;運転台%l;#;――いや、運転席にいるというのに、\n\\x%l客車;#00ffc040;客車%l;#;内と変わらぬ快適さだ。
2599 = "Dù đang ở trong \\x%l運転台;#00ffc040;buồng lái%l;#;――hay nói đúng hơn là ở ghế lái, nhưng lại thoải mái chẳng khác gì bên trong \\x%l客車;#00ffc040;toa hành khách%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「――制限、解除、良しっ！」
1226 = "「――Hủy bỏ giới hạn tốc độ, rõ!」"

# 【れいな】
# display as 玲奈
# JP: 「制限、解除、良しですぅ」
2191 = "「Hủy bỏ giới hạn tốc độ, rõ ạ」"

# monologue
# JP: ここからしばらくは見通しの良い直線区間。\n腹の底から、ホっと安堵の息が出てくる。
2448 = "Từ đây là một đoạn đường thẳng với tầm nhìn rất tốt. Tôi thở phào nhẹ nhõm từ tận đáy lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「今日も、無事に御一夜に戻れそうだな」
2068 = "「Có vẻ hôm nay chúng ta cũng sẽ về đến Ohimitera an toàn nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「それは、双鉄さん次第ですよぉ？」
2153 = "「Chuyện đó là tùy thuộc vào anh Soutetsu đấy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「もっともだ」
1624 = "「Em nói đúng.」"

# monologue
# JP: れいなの言葉に、引き締められる。
2724 = "Lời nói của Reina khiến tôi phải chấn chỉnh lại tinh thần."

# monologue
# JP: その点でも、運転操作の負担が少ないのはありがたい。\n前方注視をしながらも、力まず、余裕を持っていられる。
2780 = "Về điểm đó, tôi rất biết ơn vì gánh nặng thao tác lái tàu đã giảm đi đáng kể. Dù vẫn phải chú ý quan sát phía trước, nhưng tôi không còn phải gồng mình, mà có thể giữ được sự thong dong."

# 【れいな】
# display as 玲奈
# JP: 「ふぅっ」
1673 = "「Phù」"

# monologue
# JP: （むっ？）
2827 = "（Hửm?）"

# monologue
# JP: れいなの口からかすかに漏れる、\nため息――とも聞こえてしまうような音。
2662 = "Một âm thanh khẽ lọt ra từ miệng Reina, nghe giống như một tiếng thở dài――"

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、どうした？ \n何か心配ごとでもあるのか？」
2060 = "「Reina, sao thế?\nEm đang lo lắng chuyện gì à?」"

# 【れいな】
# display as 玲奈
# JP: 「心配なんて、ないですよぉ？」
2044 = "「Reina không lo lắng gì đâu ạ?」"

# monologue
# JP: ふわん、とした声。
2505 = "Một giọng nói nhẹ bẫng."

# monologue
# JP: 目は向けられぬが、表情もきっと、\nいつもどおりのぽかぽかとしたものだろう。
2796 = "Dù không thể nhìn sang, nhưng tôi chắc chắn biểu cảm của em ấy vẫn rạng rỡ và ấm áp như mọi khi."

# 【れいな】
# display as 玲奈
# JP: 「れいなは、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですからねぇ。\n心配なんてむつかしいこと、できないのですぅ」
2040 = "「Reina là \\x%lレイルロオド;#00ffc040;Railord%l;#; mà. Mấy chuyện phức tạp như lo lắng, Reina không làm được đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とは限らんのだ、これは」
2174 = "「Chưa chắc đâu.」"

# 【れいな】
# display as 玲奈
# JP: 「そおなんですかぁ？」
1982 = "「Vậy sao ạ?」"

# monologue
# JP: ……ままごとのときも感じたが、\nれいなは“人間”への憧れを、相当に強く持っている。
1180 = "......Lúc chơi đồ hàng tôi cũng đã cảm nhận được, Reina có một niềm khao khát khá mãnh liệt muốn trở thành \"con người\"."

# monologue
# JP: それがいつしか、“\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の自分には”という、\nある種の縛りを、無意識に作ってしまったのかもしれん。
2578 = "Có lẽ từ lúc nào đó, khao khát ấy đã vô tình tạo ra một kiểu trói buộc, rằng \"bản thân là một \\x%lレイルロオド;#00ffc040;Railord%l;#; thì không thể\"."

# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるハチロクも、その遠縁である\n僕の\\x%lエアクラ;#00ffc040;エアクラ%l;#;のナビも。普通に悩むし、心配もする」
2133 = "「Hachiroku, một \\x%lレイルロオド;#00ffc040;Railord%l;#;, và cả Navi, trợ lý ảo \\x%lエアクラ;#00ffc040;Aircra%l;#; của anh, có thể coi là họ hàng xa của em, cũng biết trăn trở và lo lắng như người bình thường đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんも、ナビさんも？」
1649 = "「Cả chị Hachiroku và chị Navi đều vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、むしろナビなど、\n心配ごとをしてない状態の方が珍しいのではないか？」
1940 = "「Ừ, thậm chí với Navi, trạng thái không lo lắng gì mới là hiếm thấy đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「あぁっ」
1700 = "「Aaa」"

# monologue
# JP: ほんの少し、笑いをふくんだような声。\n御一夜まではあと少し、\\x%lエアクラ;#00ffc040;エアクラ%l;#;はとっくに作動可能だ。
2668 = "Một giọng nói dường như chứa đựng chút ý cười. Chỉ còn một chút nữa là đến Ohimitera, \\x%lエアクラ;#00ffc040;Aircra%l;#; đã có thể hoạt động từ lâu rồi."

# monologue
# JP: なら、この屋根の上空で、ナビは僕をフォローしている。\n乗務を重ねてきた今では、れいなもそれを良く知っている。
2595 = "Vậy thì, Navi chắc chắn đang bay theo hỗ trợ tôi ở phía trên nóc tàu. Sau nhiều lần cùng nhau làm nhiệm vụ, Reina cũng biết rất rõ điều này."

# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、体を持たぬその妹も、心配をする。\n考える力は、気がかりをも自然と生じさせるのだろう」
2025 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#; hay cô em gái không có thực thể của em, đều biết lo lắng cả. Khả năng suy nghĩ tự nhiên sẽ sinh ra sự bận tâm thôi.」"

# 【れいな】
# display as 玲奈
# JP: 「気がかり……っていうのでも、\nちょっと大げさかもなのですけどぉ」
2104 = "「Bận tâm......nói thế thì\ncó vẻ hơi nói quá, nhưng mà ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1758 = "「Ừm.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、最近ちょっと元気ない感じなんですよぉ。\nれいな、だから、何かしてあげられないかなぁって」
2088 = "「Chị Paulette, dạo này có vẻ hơi thiếu sức sống đó ạ. Thế nên, Reina cứ nghĩ xem mình có thể làm gì cho chị ấy không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……疲れがよほど溜まってきているのだろうな」
1709 = "「À......chắc là do sự mệt mỏi tích tụ quá nhiều rồi.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレット。ですよね、おつかれですよねぇ」
1843 = "「Chị Paulette. Đúng vậy nhỉ, chị ấy đang rất mệt mỏi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。負担を分散しているとはいえ――\n一番重要度が高い部分は、やはり彼女にしか頼れん」
1942 = "「Ừ. Dù đã phân tán bớt gánh nặng―― nhưng những phần quan trọng nhất thì vẫn chỉ có thể trông cậy vào cô ấy.」"

# monologue
# JP: 曇ってたれいなの顔に、\n誇らしげに光がぱっと差し込む。
2464 = "Khuôn mặt ủ rũ của Reina bỗng bừng sáng lên một vẻ đầy tự hào."

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、あわてなければ、\nなぁんでもちゃんと出来ますからねぇ」
2018 = "「Chị Paulette, chỉ cần không luống cuống, thì chuyện gì cũng có thể làm tốt được hết ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1943 = "「Đúng vậy.」"

# monologue
# JP: れいなの示す信頼どおり、\n「なんでも」とはさすがにいかないが――
2797 = "Đúng như sự tin tưởng của Reina, tuy không đến mức \"chuyện gì cũng được\" nhưng――"

# monologue
# JP: ポーレットはこつこつと着実に、\n成果を積み重ね続けてきてくれている。
2421 = "Paulette vẫn đang cần mẫn và vững vàng tích lũy từng thành quả một."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのおかげで、\\x%l客車;#00ffc040;客車%l;#;も\\x%l貨車;#00ffc040;貨車%l;#;も手配されたし、\n権利関係、許認可関係も整頓された」
1792 = "「Nhờ có Paulette mà chúng ta đã sắp xếp được cả \\x%l客車;#00ffc040;toa hành khách%l;#; lẫn \\x%l貨車;#00ffc040;toa chở hàng%l;#;, các vấn đề về quyền lợi và giấy phép cũng đã được giải quyết ổn thỏa.」"

# 【れいな】
# display as 玲奈
# JP: 「あとは、石炭を売れる相手さえ見つかれば、\nぜぇんぶがうまく動きますよねぇ」
1914 = "「Bây giờ, chỉ cần tìm được người mua than đá, thì mọi thứ sẽ diễn ra suôn sẻ thôi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。そして、恐らくその状況が、逆に、\n大きなストレスを生んでしまっているのかもしれん」
2001 = "「Đúng vậy. Và có lẽ, chính tình huống đó, ngược lại, đang tạo ra một áp lực rất lớn.」"

# 【れいな】
# display as 玲奈
# JP: 「逆に、ですかぁ？」
1228 = "「Ngược lại, sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、非常に気障りなものなのだ。\nただ一点の詰まりのために、全てが止まってしまうのは」
1938 = "「Ừ, rất là khó chịu. Khi mọi thứ phải đình trệ chỉ vì một điểm tắc nghẽn duy nhất.」"

# 【れいな】
# display as 玲奈
# JP: 「あぁ～」
# 1700 = "「啊——」" 

# monologue
# JP: れいなは、僕よりよほど良くわかっているだろう。
2659 = "Có lẽ Reina còn hiểu rõ điều đó hơn cả tôi."

# monologue
# JP: その状況を解消できない責任を、ポーレットは、\n自分一人で抱えてしまう性格なのだと。
2626 = "Rằng Paulette là người có tính cách luôn tự mình ôm lấy trách nhiệm khi không thể giải quyết được tình huống đó."

# 【れいな】
# display as 玲奈
# JP: 「[やわた,1]矢幡の製鉄所さんとの交渉、\nすごくむつかしそうな感じなんですよぉ」
2094 = "「Cuộc đàm phán với nhà máy luyện thép Yahata, có vẻ như đang gặp rất nhiều khó khăn đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「の、ようだな。\nやはり、具体的なメリットを提示できねば」
2069 = "「Có vẻ, là vậy. Quả nhiên, nếu không đưa ra được lợi ích cụ thể thì...」"

# 【れいな】
# display as 玲奈
# JP: 「矢幡以外でも、おんなじですよねぇ」
1651 = "「Dù không phải là Yahata thì cũng giống nhau thôi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。むしろ、距離的な条件が悪くなる。\nただでさえ問題の移送コストが、さらにかさんでしまう」
1950 = "「Chắc chắn rồi. Thậm chí, điều kiện khoảng cách còn tệ hơn. Chi phí vận chuyển vốn đã là một vấn đề, nay lại càng tăng cao.」"

# 【れいな】
# display as 玲奈
# JP: 「あうぅ」
1718 = "「Auu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえにやはり、プラスアルファは必要なのだ。\nそれも、出来るだけ強力な――っと。制限四十、良し！」
1909 = "「Do đó, chúng ta vẫn cần một giá trị gia tăng nào đó. Hơn nữa, phải càng mạnh mẽ càng tốt――Ồ. Giới hạn 40, rõ!」"

# 【れいな】
# display as 玲奈
# JP: 「制限、四十。良しですぅ」
2192 = "「Giới hạn, 40. Rõ ạ.」"

# monologue
# JP: ――話の続きは、無事に入線してからだ。
1159 = "――Chuyện này để sau khi tàu vào ga an toàn rồi nói tiếp vậy."

# monologue
# JP: \\x%l逆転機;#00ffc040;逆転機%l;#;はギア、\\x%l加減弁;#00ffc040;加減弁%l;#;テコは\\x%lダイコン;#00ffc040;ダイコン%l;#;レバーに変わろうと、\n\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l単弁;#00ffc040;単弁%l;#;の操作なら、\\x%l8620;#00ffc040;8620%l;#;と\\x%lキハ07;#00ffc040;キハ07%l;#;とほとんど同じだ。
2529 = "Dù \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; có chuyển thành hộp số, tay gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; có chuyển thành tay gạt \\x%lダイコン;#00ffc040;kiểm soát trực tiếp%l;#;, nhưng thao tác với \\x%l自弁;#00ffc040;van hãm tự động%l;#; và \\x%l単弁;#00ffc040;van hãm đơn%l;#; thì \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#; gần như giống hệt nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「……まだだ――っと」
1238 = "「......Vẫn chưa――được.」"

# monologue
# JP: それでも、タイミングはかなり異なる。\n\\x%lキハ07;#00ffc040;キハ07%l;#;は、\\x%l8620;#00ffc040;8620%l;#;よりもずっと軽いから。
2460 = "Dù vậy, thời điểm thao tác lại khá khác biệt. Bởi vì \\x%lキハ07;#00ffc040;KiHa 07%l;#; nhẹ hơn \\x%l8620;#00ffc040;8620%l;#; rất nhiều."

# monologue
# JP: 今、と経験が大声を出すポイントをぐっと我慢して――
2614 = "Tôi cố kìm nén khoảnh khắc mà kinh nghiệm mách bảo phải hét lên \"Bây giờ!\"――"

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
1754 = "「Hửm!?」"

# monologue
# JP: ホームの景色がいつもと違う。\n\\x%l緑旗;#00ffc040;緑旗%l;#;を振ってるのは、あれは――
2609 = "Cảnh tượng trên sân ga có vẻ khác mọi khi. Người đang vẫy \\x%l緑旗;#00ffc040;cờ xanh lá%l;#; kia là――"

# 【れいな】
# display as 玲奈
# JP: 「わ、ハチロクさんですねぇ」
1684 = "「Oa, là chị Hachiroku đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1753 = "「Ừm.」"

# monologue
# JP: 驚きはひとまず飲み込み、\n\\x%lブレーキ;#00ffc040;ブレーキ%l;#;操作に集中し直す。
2557 = "Tôi tạm thời nuốt sự ngạc nhiên vào trong, tập trung trở lại vào việc thao tác \\x%lブレーキ;#00ffc040;phanh%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「まだ、だ――もう少し――」
2168 = "「Vẫn chưa, đâu――một chút nữa thôi――」"

# monologue
# JP: 最初は戸惑い、\nれいなに「ここです」と指示をしてもらっていたが――
2451 = "Lúc đầu tôi còn bỡ ngỡ, phải nhờ Reina chỉ dẫn \"Ở đây ạ\"――"

# monologue
# JP: （クっ）
2826 = "（Kịch）"

# monologue
# JP: 今は感覚を……\nうん、掴めてる。
2423 = "Bây giờ thì cảm giác......\nỪm, tôi đã nắm bắt được rồi."

# 【れいな】
# display as 玲奈
# JP: 「入線良しですぅ。\n御一夜駅。定刻通り。[ヒトナナマルマル,3]一七〇〇」
2165 = "「Vào ga an toàn rồi ạ.\nGa Ohimitera. Đúng giờ. 17:00.」"

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜駅一番入線。[ヒトナナマルマル,3]一七〇〇」
1636 = "「Vào ga Ohimitera đường ray số 1. 17:00.」"

# monologue
# JP: ようやく視線を向ければそこには、\nれいなの温かな笑顔がある。
2565 = "Khi tôi cuối cùng cũng đưa mắt nhìn sang, thì bắt gặp nụ cười ấm áp của Reina."

# 【れいな】
# display as 玲奈
# JP: 「お上手でした。\nそうてつさん、おつかれさまですぅ」
1634 = "「Anh làm tốt lắm ạ.\nAnh Soutetsu, anh vất vả rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、お疲れだ」
1755 = "「Ừm, em cũng vất vả rồi.」"

# monologue
# JP: れいなは床に降り立って、\n手早く\\x%lタブレット;#00ffc040;タブレット%l;#;を換装する。
2657 = "Reina nhảy xuống sàn, nhanh nhẹn tháo lắp \\x%lタブレット;#00ffc040;thẻ bảng%l;#;."

# monologue
# JP: そして改札を行うために、\nぱたぱたと、改札口へと向かってく。
2641 = "Sau đó, em ấy lạch bạch chạy về phía cổng soát vé để tiến hành soát vé."

# 【ハチロク】
# display as 八六
# JP: 「お見事な入線でした、双鉄様」
2073 = "「Màn vào ga rất xuất sắc thưa ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが基礎を叩き込んでくれたおかげだ。\nというか――ポーレットはどうかしたのか？」
1795 = "「Nhờ Hachiroku đã rèn giũa nền tảng cho anh đấy. Mà――Paulette sao thế?」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――これでございますか？」
1701 = "「A――Ý ngài là chuyện này ạ?」"

# monologue
# JP: ハチロクの手で、改札鋏がカチカチと鳴る。\n妙に熱心に、なれた手つきでチチチチと。
2432 = "Chiếc kìm soát vé trong tay Hachiroku vang lên tiếng lách cách. Cô ấy thao tác thoăn thoắt với một sự nhiệt tình đến lạ lùng."

# monologue
# JP: どうやらそこまで、一人で担当するつもり\n――いや、担当したかった様子に見える。
2695 = "Có vẻ như cô ấy định một mình đảm nhận cả việc đó ――Không, trông có vẻ như cô ấy muốn đảm nhận thì đúng hơn."

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様があまりにお疲れのご様子でしたので、\n『今日はわたくしが』と申し出たのです」
1906 = "「Vì trông Thị trưởng Paulette có vẻ quá mệt mỏi, nên em đã chủ động đề nghị 『Hôm nay cứ để tôi』 ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「体調を崩してしまったのか？」
1807 = "「Cô ấy đổ bệnh rồi sao?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、お熱などは無いようなのですが――\nなんというか、雰囲気が……こう――」
1578 = "「Không ạ, cô ấy không có vẻ gì là bị sốt hay ốm đau―― Nhưng mà, bầu không khí......cứ như là――」"

# monologue
# JP: ハチロクは両手をだらりと垂れさせ、\nひゅ～どろどろと、うらめしそうな顔をする。
2431 = "Hachiroku buông thõng hai tay xuống, làm ra vẻ mặt u ám, đầy oán hờn."

# 【双鉄】
# display as 雙鐵
# JP: 「完全に行き詰まっている感じか？」
1822 = "「Cảm giác như hoàn toàn bế tắc rồi nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「ときおり、頭を抱えてまでいらっしゃいます。\n金の[おぐし,1]御髪がはらりと散るのが、物悲しくて」
1802 = "「Thỉnh thoảng cô ấy còn ôm đầu suy nghĩ nữa. Nhìn những lọn tóc vàng óng rũ rượi rơi xuống, thật sự rất xót xa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1234 = "「......Vậy sao.」"

# monologue
# JP: 今日の乗務前にも、いつもと変わらぬ様子に見えたが――\n悩む姿を見せないように、気を使ってくれていたのか。
2404 = "Hôm nay trước khi bắt đầu công việc, trông cô ấy vẫn chẳng có gì khác lạ—— Chắc là cô ấy đã cố gắng để không cho chúng tôi thấy vẻ phiền não của mình rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「そこまで思い悩んでいたとは……\nれいなが心配するわけだ」
1998 = "「Không ngờ cô ấy lại phiền não đến mức đó...... Thảo nào Reina lại lo lắng đến vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「れいながですか？」
2039 = "「Reina sao ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんですかぁ？」
1629 = "「Vâng ạ~ Có chuyện gì vậy nha~?」"

# monologue
# JP: 改札を終え、れいながぽてぽて戻ってくる。
2516 = "Soát vé xong, Reina lạch bạch chạy tới."

# monologue
# JP: 足元にコン駅長をまとわりつかせ、\n見ているだけで心が和む光景だ。
2707 = "Trưởng ga Kon cứ quấn quýt quanh chân em ấy, chỉ nhìn thôi cũng thấy ấm lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのことを話していた。\nやはり、かなり疲れ気味のようだな」
1889 = "「Chúng tôi đang nói về Paulette. Quả nhiên, có vẻ như cô ấy đang khá mệt mỏi.」"

# 【れいな】
# display as 玲奈
# JP: 「あぅう～」
1719 = "「A ư~」"

# monologue
# JP: 言った瞬間、弱りきった声。\nひとみがおろおろ、僕を、ハチロクをすがるように見る。
2725 = "Nghe tôi nói vậy, em ấy phát ra âm thanh yếu ớt. Ánh mắt bối rối nhìn tôi và Hachiroku như muốn cầu cứu."

# 【れいな】
# display as 玲奈
# JP: 「れいな、お医者さんにいこうって言ったですよぉ。\nでも、ポーレットは『平気』って」
2038 = "「Reina đã bảo đi bác sĩ rồi đó ạ~. Nhưng chị Paulette cứ bảo là 『Không sao』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、極度のものを除いては、\nあまり医者で疲れを抜こうとは思わんな」
1739 = "「Ừm, trừ những trường hợp cực kỳ nghiêm trọng, chứ bình thường chẳng ai muốn đến bác sĩ để xua tan mệt mỏi đâu.」"

# 【れいな】
# display as 玲奈
# JP: 「そおなんですか！？　鉱山だと、疲れたらお医者さんで、\n注射を打ってもらってましたよ」
1983 = "「Vậy sao ạ!? Ở khu mỏ, hễ mệt là mọi người lại đến bác sĩ, nhờ tiêm cho một mũi đó nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、栄養剤の類かな？　単純な肉体疲労であれば……\nそれも、継続的なものならば、確かに効果的だろうが」
1728 = "「À, loại thuốc bổ ấy hả? Nếu chỉ là mệt mỏi thể chất đơn thuần...... và kéo dài liên tục, thì chắc chắn là có hiệu quả rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「薬に頼ると、薬抜きでは頑張れなくなる――などとも\n聞いたことがあります」
1907 = "「Em từng nghe nói, nếu phụ thuộc vào thuốc, thì khi không có thuốc sẽ không thể cố gắng được nữa——đại loại vậy ạ.」"

# monologue
# JP: 帝都における\\x%l帝鉄;#00ffc040;帝鉄%l;#;勤務も、そこまで過酷なものだったのか\n――思ってすぐさま、ああ、そうだったかと思いだす。
63 = "Công việc ở \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; tại Đế đô cũng khắc nghiệt đến mức đó sao ——Vừa nghĩ đến đó, tôi lập tức nhớ ra, à, đúng là như vậy."

# monologue
# JP: ハチロクは戦時を経験してる。\nそれはもちろん、究極的な過酷状況に違いあるまい。
2438 = "Hachiroku đã trải qua thời chiến. Chắc chắn đó là một hoàn cảnh khắc nghiệt đến tột cùng."

# 【れいな】
# display as 玲奈
# JP: 「そおだったんですか。\nお薬は、あんまり使わないほうがいいのですねぇ」
1981 = "「Là vậy sao ạ. Vậy thì không nên dùng thuốc nhiều quá nha~.」"

# 【れいな】
# display as 玲奈
# JP: 「だったら、お医者さんにさそうほかには。\nれいな、ポーレットにどうしてあげたらいいですかぁ？」
2179 = "「Vậy thì, ngoài việc khuyên đi bác sĩ ra. Reina nên làm gì cho chị Paulette đây ạ~?」"

# 【双鉄】
# display as 雙鐵
# JP: 「神経や頭脳の方の疲れだからな。リフレッシュを――\nならば……そうだな。ポーレットなら」
1804 = "「Vì đây là mệt mỏi về thần kinh và trí óc mà. Cần phải thư giãn—— Nếu vậy thì...... Đúng rồi. Nếu là Paulette thì」"

# 【ハチロク】
# display as 八六
# JP: 「鉄道旅行にでも行っていただければ、\n一番の気分転換になりますのでしょうが」
1816 = "「Nếu cô ấy có thể đi du lịch bằng đường sắt, thì đó sẽ là cách giải khuây tốt nhất ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「あ！　それは絶対そおですよねぇ。\nけど……」
1724 = "「A! Chắc chắn là vậy rồi nha~.\nNhưng mà......」"

# monologue
# JP: れいなの眉が、へちょんと下がる。
2652 = "Lông mày Reina rũ xuống buồn bã."

# monologue
# JP: 無理もない。このご時世で、この状況。\nいざ実際に、鉄道旅行と考えだすと……
2391 = "Cũng phải thôi. Trong thời buổi này, hoàn cảnh này. Nếu thực sự nghĩ đến việc đi du lịch bằng đường sắt thì......"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか御一夜-湯医間では気分転換になるまいしな。\nかといって、他の路線となると――」
1666 = "「Chẳng lẽ lại đi lại giữa Ohimitera và Yui thì đâu gọi là giải khuây. Nhưng nếu đi tuyến khác thì——」"

# 【れいな】
# display as 玲奈
# JP: 「[やつしろ,2]八ツ城からみかん鉄道さんがありますけど。\nポーレット、今はきっと、乗りたくないって思います」
1868 = "「Từ Yatsushiro có tuyến đường sắt Mikan đó ạ. Nhưng chị Paulette, bây giờ chắc chắn không muốn đi đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[ヤツシロ,2]ハツ城までなら、\\x%lエアクラ;#00ffc040;エアクラ%l;#;車で四・五十分だろう？\n僕の飛行型なら、さらに時間を節約できるが」
2100 = "「Đến Yatsushiro thì đi xe \\x%lエアクラ;#00ffc040;Aircra%l;#; mất khoảng bốn, năm mươi phút nhỉ? Nếu đi bằng loại bay được của tôi thì còn tiết kiệm thời gian hơn nữa.」"

# monologue
# JP: 水を向けても、れいなは力なく首を振るばかりだ。
2568 = "Dù tôi có gợi ý, Reina vẫn chỉ lắc đầu yếu ớt."

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、お客さんで鉄道に乗るときは、\n楽しむ以外はしたくないって、いっつも言ってますから」
2019 = "「Chị Paulette lúc nào cũng bảo, khi đi tàu với tư cách hành khách, chị ấy không muốn làm gì khác ngoài việc tận hưởng đâu ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、そうですよね。気がかりがあっては、\nせっかく大好きな鉄道に乗っても……ですね」
1727 = "「A, đúng là vậy ạ. Nếu trong lòng còn vướng bận, thì dù có được đi chuyến tàu yêu thích cũng...... không vui nổi ạ.」"

# monologue
# JP: なるほど。\nそういう意味で、“今は乗りたくない”わけか。
2462 = "Ra là vậy. Nghĩa là, \"bây giờ không muốn đi\" là vì lý do đó sao."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば解決を計るのが先か。……一度、会議形式で、\n人を集めて知恵を出し合ってみるのがいいかもしれんな」
2180 = "「Vậy thì phải tìm cách giải quyết trước đã. ......Có lẽ nên tổ chức một cuộc họp, tập hợp mọi người lại để cùng nhau suy nghĩ xem sao.」"

# 【れいな】
# display as 玲奈
# JP: 「あ！　そうしてもらえるなら、\nポーレット、きっと助かるって思います」
1725 = "「A! Nếu được vậy thì, chắc chắn sẽ giúp được chị Paulette đó ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ポーレットの知識と準備に、別の視点が加われば、\n何かが産まれてくるかもしれんしな」
1752 = "「Ừm. Với kiến thức và sự chuẩn bị của Paulette, cộng thêm những góc nhìn khác, biết đâu sẽ nảy ra ý tưởng gì đó.」"

# monologue
# JP: 善は急げとレールショップへ――\n向けて踏み出しかけた足を、けれどハチロクの手が止める。
2393 = "Việc tốt thì phải làm ngay, tôi định hướng về phía Cửa hàng đường sắt—— Nhưng vừa cất bước, bàn tay Hachiroku đã giữ tôi lại."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1876 = "「Sao vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ。双鉄様がセッティングされれば、\nそれもまた、ポーレット様のお気持ち的には」
1570 = "「Không ạ. Nếu ngài Soutetsu đứng ra sắp xếp, thì về mặt tâm lý, Thị trưởng Paulette sẽ cảm thấy...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2158 = "「À——」"

# monologue
# JP: 会議で答えを出せれば全く問題がない。\nが、あの責任感だ。そう上手く運ばなかったときには……
2735 = "Nếu tìm ra câu trả lời trong cuộc họp thì không có vấn đề gì. Nhưng với tinh thần trách nhiệm đó, lỡ như mọi chuyện không suôn sẻ thì......"

# monologue
# JP: 僕と会議参加者とに無用な負い目を感じてしまい、\n余計ドツボにハマってしまいかねん気もする。
2500 = "Cô ấy sẽ cảm thấy áy náy vô cớ với tôi và những người tham gia, có khi lại càng lún sâu vào bế tắc hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば」
2159 = "「Vậy sao, nếu thế thì」"

# 【れいな】
# display as 玲奈
# JP: 「だったら、れいながみんなにお願いしますねぇ。\nそれならポーレット、きっとあんまり気にしないですぅ」
2184 = "「Vậy thì, Reina sẽ đi nhờ mọi người nha~. Làm thế thì chị Paulette chắc chắn sẽ không để ý lắm đâu ạ~.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2199 = "「!」"

# monologue
# JP: いつもどおりの、\nのんびりとしたような口調。
2677 = "Vẫn là giọng điệu\nthong thả như thường ngày."

# monologue
# JP: だが、その瞳には、いつに無い強い光が――\nポーレットをただ思う気持ちが、宿ってる。
2417 = "Nhưng trong ánh mắt ấy, lại ánh lên một tia sáng mạnh mẽ chưa từng thấy—— Đó là tình cảm chân thành dành cho Paulette."

# 【れいな】
# display as 玲奈
# JP: 「困ってるポーレットを助けてあげるために。\nそうてつさんハチロクさん、どうか会議に出てください」
2022 = "「Để giúp đỡ chị Paulette đang gặp khó khăn. Anh Soutetsu, chị Hachiroku, xin hãy tham gia cuộc họp nhé ạ.」"

# monologue
# JP: （ガラっ）
2825 = "（Cạch）"

# 【れいな】
# display as 玲奈
# JP: 「お待たせしましたぁ！\nポーレット、おせなか流しますよぉ」
1586 = "「Để chị đợi lâu rồi nha~! Chị Paulette, Reina kì cọ lưng cho chị nha~」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいな、走っちゃだめよ？」
2054 = "「Reina, không được chạy đâu đấy?」"

# 【れいな】
# display as 玲奈
# JP: 「わ。はいですぅ」
1681 = "「Oa. Vâng ạ~」"

# monologue
# JP: れいなとわたし。\nふたりだけで登呂流湯さんに来るのは、初めてのこと。
2577 = "Reina và tôi. Đây là lần đầu tiên hai chúng tôi đến nhà tắm Tororyu-yu cùng nhau."

# monologue
# JP: 今のでわかった。\nれいなはあんまり、銭湯のマナーを知らないみたい。
2783 = "Qua chuyện vừa rồi tôi mới nhận ra. Có vẻ Reina không rành các quy tắc ở nhà tắm công cộng lắm."

