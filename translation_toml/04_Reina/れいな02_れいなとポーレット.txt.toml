2729 = "肌膚與肌膚的摩擦讓人感到很舒服。玲奈的身體很有彈性，如嬰兒般柔軟。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああ……癒されるなぁ」
1708 = "「啊……太治癒了」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、たーっぷりいやされてくださいねぇ」
1771 = "「嘿嘿嘿，玲奈會好好治癒波萊特的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1714 = "「啊」" 

# monologue
# JP: ハチロクちゃんと双鉄くんの影響かしら、って\n思ってたけど、ひょっとして――
2575 = "我起初還在想玲奈想來這裡是不是受了八六和雙鐵君的影響，但莫非——" 

# 【ポーレット】
# display as 波萊特
