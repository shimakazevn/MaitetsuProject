2502 = "她甩了甩濕透了的頭髮，同時留意不讓水珠飛濺。" 

# 【ポーレット】
# display as 波萊特
# JP: 「いい子ね、れいな。いらっしゃい」
2047 = "「玲奈真乖。過來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1810 = "「好的」" 

# monologue
# JP: （ちゃぷんっ）
2833 = "（撲通）" 

# monologue
# JP: お湯の中でも普段と変わらず、\nれいなはくっつきたがってくる。
2457 = "即使在浴場中，玲奈還是喜歡黏著我。" 

# monologue
