1739 = "「嗯……除非情況極其嚴重，否則一般也不會去找醫生來幫忙紓解疲勞吧」" 

# 【れいな】
# display as 玲奈
# JP: 「そおなんですか！？　鉱山だと、疲れたらお医者さんで、\n注射を打ってもらってましたよ」
1983 = "「是這樣的嗎！？以前在礦山如果有人累了，會去找醫生打針哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、栄養剤の類かな？　単純な肉体疲労であれば……\nそれも、継続的なものならば、確かに効果的だろうが」
1728 = "「啊，是營養劑一類的嗎？如果只是肉體疲勞……並且長期持續的話，或許很有效吧」" 

# 【ハチロク】
# display as 八六
# JP: 「薬に頼ると、薬抜きでは頑張れなくなる――などとも\n聞いたことがあります」
1907 = "「我聽說如果依賴藥物的話，一旦停藥就會使不上勁」" 

# monologue
# JP: 帝都における\x%l帝鉄;#00ffc040;帝鉄%l;#;勤務も、そこまで過酷なものだったのか\n――思ってすぐさま、ああ、そうだったかと思いだす。
63 = "\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;明明位於帝都，工作殘酷竟然還如此殘酷——我一瞬間閃過這樣的念頭，然後很快想到了答案。" 

# monologue
# JP: ハチロクは戦時を経験してる。\nそれはもちろん、究極的な過酷状況に違いあるまい。
2438 = "八六經歷過戰爭時期。那必然是最殘酷的工作環境。" 

# 【れいな】
# display as 玲奈
