# JP: 言った瞬間、弱りきった声。\nひとみがおろおろ、僕を、ハチロクをすがるように見る。
2725 = "聽我這麼一說，玲奈發出為難的聲音。她不知所措地向我和八六投來求助的目光。" 

# 【れいな】
# display as 玲奈
