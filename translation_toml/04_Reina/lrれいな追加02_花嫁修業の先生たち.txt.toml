1601 = "「真的嗎？那就從馬鈴薯燒肉開始學起吧。放心，重要的事就是計量和觀察而已」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい！　れいな、それならできそうです」
1515 = "「是！玲奈覺得自己做得來」" 

# monologue
