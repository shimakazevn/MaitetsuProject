# 【真闇】
# display as 真闇
# JP: 「そ。左手はにゃんこの手にして」
1417 = "「對了，左手要用貓手的樣子」" 

# 【れいな】
# display as 玲奈
# JP: 「にゃんこの手！」
1668 = "「貓咪的手！」" 

# monologue
# JP: 言葉の響きが気に入ったのか、れいなの声の明るさが増す。\n僕のあえかな感傷も、綺麗に吹き飛ばしてくれるくらいに。
1818 = "也許是這個詞挑起了她的興趣，玲奈的聲音活潑了不少，也將我虛幻的傷感趕出了腦海。" 

# 【れいな】
# display as 玲奈
# JP: 「こうですねぇ。――うふふぅ、\nほんとににゃんこのおててみたいですぅ」
1511 = "「是這樣吧。呵呵，的確是跟貓咪的手一樣」" 

# 【真闇】
# display as 真闇
# JP: 「そそ。そしたらにゃんこの手のまま\n包丁の腹にかるぅく――うんうん、上手上手」
1535 = "「沒錯，保持住貓手的模樣，輕輕地將刀腹往下按——嗯嗯，做得真棒」" 

# 【れいな】
# display as 玲奈
# JP: 「にゃんこの、て――にゃんこの、て――\nにゃんこの、て――にゃんこの、て――」
1667 = "「貓咪的手——貓咪的手——小貓咪的手——小貓咪的手——」" 

# monologue
