# 【真闇】
# display as 真闇
# JP: 「へーきよへーき。ゆーたらはーちゃんだって、\nおんなじようなもんでしょお。ばってん」
1528 = "「沒事的，沒事。這麼說的話，小八也跟你一樣呀，現在可不一樣了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1486 = "「是啊」" 

# monologue
