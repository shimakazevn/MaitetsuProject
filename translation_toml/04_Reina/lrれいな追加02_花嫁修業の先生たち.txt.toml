# lines: 400 
# 【双鉄】
# display as 雙鐵
# JP: 「そうなるか。ああいや。そうなるよなぁ」
1428 = "「Là cô sao. À không. Quả nhiên là cô nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「なんだい双鉄。\nボクが師範なのがご不満なのかな」
1439 = "「Sao vậy Soutetsu. Cậu có gì không hài lòng khi tôi làm sư phạm sao?」"
# monologue
# JP: 芝居がかった物言いに、ごくやんわりと窘められる。\n確かに僕の発言は、嫌味のようにもとられかねない。
2056 = "Cách nói đầy tính kịch ấy nhẹ nhàng khiển trách tôi. Quả thực phát ngôn của tôi cũng dễ bị hiểu nhầm là đang mỉa mai."
# 【双鉄】
# display as 雙鐵
# JP: 「失礼に聞こえたのならすまない。不満などは全くない。\n稀咲に指導してもらえるのは、むしろ当方の希望通りだ」
1468 = "「Nếu nghe có vẻ thất lễ thì cho tôi xin lỗi. Tôi hoàn toàn không có gì bất mãn cả. Ngược lại, được Kisaki hướng dẫn đúng là điều chúng tôi mong muốn.」"
# monologue
# JP: "正式な免状を所有し、かつできるだけご近所の方"。\n――稀咲は無論、その条件にほぼど真ん中で合致する。
1909 = "\"Người có chứng chỉ chính thức và ở càng gần càng tốt\". ——Tất nhiên, Kisaki hoàn toàn đáp ứng được những điều kiện đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が呻いたのは、単に失念してしまっていたがゆえだ。\nつまり、稀咲が紛れもないお嬢様であるということを」
1449 = "「Tôi rên rỉ chỉ đơn giản là vì tôi đã lỡ quên mất. Tức là quên mất việc Kisaki là một tiểu thư danh giá chính hiệu.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1489 = "「Ra là vậy.」"
# monologue
# JP: ふっと、稀咲の視線がやわらぐ。
2067 = "Ánh mắt Kisaki dịu lại."
# 【稀咲】
# display as 稀咲
# JP: 「その理由なら納得かな。\n属性を失念する程度には、ボクらは確かに親しくあるし」
1251 = "「Lý do đó thì tôi chấp nhận được. Chúng ta quả thực đã thân thiết đến mức quên đi cả thân phận mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。ポーレットのなかよしのきさきさんが先生で、\nれいなとーってもうれしくって安心ですぅ」
1497 = "「Đúng vậy ạ~. Được chị Kisaki bạn thân của chị Paulette làm giáo viên, Reina vui lắ~m và rất an tâm đó nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
1297 = "「Fufu.」"
# monologue
# JP: れいなの声に微笑んで。\n稀咲は腰を曲げ、れいなと視線をあわせてくれる。
2094 = "Mỉm cười trước giọng nói của Reina. Kisaki cúi người xuống, ánh mắt ngang tầm với Reina."
# 【稀咲】
# display as 稀咲
# JP: 「もちろん安心してくれてかまわないよ。\nこう見えて、茶道なら２歳のときから習っているからね」
1216 = "「Tất nhiên là em cứ yên tâm đi. Nhìn vậy thôi chứ chị học trà đạo từ lúc 2 tuổi rồi đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「最初っからそう見えますよぉ。きさきさん、いつだって\n姿勢がよくて、ものを扱う手が注意深くて綺麗ですから」
1408 = "「Ngay từ đầu đã thấy vậy rồi đó nha~. Chị Kisaki lúc nào dáng vẻ cũng đoan trang, đôi tay cầm nắm đồ vật cũng cẩn thận và đẹp đẽ mà~」"
# 【稀咲】
# display as 稀咲
# JP: 「おや」
1302 = "「Ây chà.」"
# monologue
# JP: 言われてみれば確かにだ。ピザを畳んで食すときさえ――\nいいやそもそも、ピザを畳むという所作そのものが……
2090 = "Nghe nói vậy mới thấy đúng thật. Ngay cả lúc cô ấy gấp bánh pizza lại để ăn—— Không, vốn dĩ hành động gấp bánh pizza lại đó đã……"
# monologue
# JP: （育ちの良さ、か）
2174 = "（Là do được giáo dục tốt sao.）"
# monologue
# JP: 稀咲もれいなもそれぞれに、\nそれぞれの“育ちの良さ”の結晶なのだと、ふと思う。
2052 = "Tôi chợt nghĩ, cả Kisaki và Reina, mỗi người đều là kết tinh của \"sự giáo dục tốt\" theo cách riêng của họ."
# 【稀咲】
# display as 稀咲
# JP: 「れいなくんも、とても丁寧に全てに接する。\nそれは茶道のみならず、全ての礼法に通づることと思う」
1569 = "「Reina cũng tiếp xúc với mọi thứ rất cẩn thận. Chị nghĩ điều đó không chỉ dành riêng cho trà đạo, mà còn thông suốt với mọi lễ pháp.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1499 = "「Vâng ạ~」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、けど」
1314 = "「À, nhưng mà.」"
# monologue
# JP: 稀咲の真っ白い指先が、軽くかるぅく、\nれいなの唇に触れ、閉ざす。
2081 = "Đầu ngón tay trắng ngần của Kisaki, nhẹ nhàng, thật nhẹ nhàng, chạm vào môi Reina và khép nó lại."
# 【稀咲】
# display as 稀咲
# JP: 「甘えた語尾。ですぅ、はこの場では不要だね。\n返事は、『はい』。それだけがいい」
1471 = "「Cái đuôi câu nũng nịu 'ạ~' đó, trong hoàn cảnh này là không cần thiết đâu. Trả lời thì chỉ cần 『Vâng』. Vậy là đủ rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「！」
1732 = "「!」"
# monologue
# JP: れいなの背筋がぴぃんと伸びる。
1966 = "Sống lưng Reina thẳng tắp."
# 【れいな】
# display as 玲奈
# JP: 「はい！」
1512 = "「Vâng!」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。いい返事だ。とても」
1358 = "「Ừm. Trả lời tốt lắm. Rất tốt.」"
# monologue
# JP: 腰を伸ばして、稀咲の視線が僕へ向く。
2062 = "Kisaki thẳng lưng lên, ánh mắt hướng về phía tôi."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄。君も確か、れいなくんとともに」
1725 = "「Soutetsu. Cậu chắc hẳn cũng cùng với Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。ご教示いただきたく希望いたしております」
1518 = "「Vâng. Tôi cũng rất mong được cô chỉ giáo.」"
# 【稀咲】
# display as 稀咲
# JP: 「承った」
1398 = "「Chấp nhận.」"
# monologue
# JP: 稀咲の頷きはとても静かだ。
2061 = "Cái gật đầu của Kisaki vô cùng tĩnh lặng."
# 【稀咲】
# display as 稀咲
# JP: 「――なら、早速準備をはじめよう。\nふたりでそのソファとローテーブルを」
810 = "「——Vậy thì, bắt đầu chuẩn bị ngay thôi. Hai người khiêng chiếc sofa và bàn trà đó đi」"
# 【れいな】
# display as 玲奈
# JP: 「はい！」
# 1512 = "「是！」" 
# monologue
# JP: 指示通り三角形のローテーブルとソファをズラすと、\n稀咲はその間にテキパキと――っ！
1885 = "Làm theo chỉ thị dời chiếc bàn trà hình tam giác và sofa đi, Kisaki liền nhanh nhẹn trong khoảng thời gian đó——!"
# 【れいな】
# display as 玲奈
# JP: 「わああああ、すごいですぅ。\nお部屋の中に、ちっちゃな和室ができちゃいましたぁ」
1294 = "「Oa a a a a, tuyệt quá ạ~. Trong phòng bỗng chốc xuất hiện một căn phòng kiểu Nhật nhỏ xíu nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「なかなかだろう？　ユニット畳っていうものだ。\n1.5畳のものが3つで[よじょうはん,3]4.5畳」
1240 = "「Cũng khá phết nhỉ? Đây gọi là chiếu tatami lắp ghép. 3 tấm 1.5 tatami gộp lại thành 4.5 tatami.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは凄いな。あっというまに茶室の誕生か。\n見事だ。びっくりさせられる」
1239 = "「Cái này tuyệt thật. Thoáng chốc đã có ngay một phòng trà rồi sao. Tuyệt đẹp. Thật khiến người ta bất ngờ.」"
# monologue
# JP: いえば稀咲はいたずらっぽく微笑する。
2091 = "Nghe vậy, Kisaki mỉm cười tinh nghịch."
# 【稀咲】
# display as 稀咲
# JP: 「海外からのお客様たちはね。\n双鉄たちの10倍くらい驚いて喜んでくれるんだ」
1708 = "「Mấy vị khách từ nước ngoài đến ấy mà. Họ còn ngạc nhiên và thích thú gấp 10 lần Soutetsu đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな、そういうことか。この支店長室、随分と\n贅沢な空間の使い方だと、以前から内心思っていたが」
1233 = "「Ra là vậy, hóa ra là thế. Phòng giám đốc chi nhánh này, từ trước tôi đã thầm nghĩ là sử dụng không gian khá xa xỉ, nhưng mà」"
# 【稀咲】
# display as 稀咲
# JP: 「そういうことさ。お茶の大好きな友人などもいるしね。\n――さて」
1687 = "「Là vậy đó. Tôi cũng có vài người bạn rất thích trà nữa. ——Nào.」"
# monologue
# JP: 稀咲がユニット畳――いや、茶室の中に入って座を整える。\n途端、空気が静かに引き締まり均整を取る。
2077 = "Kisaki bước lên chiếu tatami lắp ghép——à không, bước vào phòng trà và chỉnh đốn lại chỗ ngồi. Ngay lập tức, bầu không khí trở nên tĩnh lặng, nghiêm trang và cân bằng."
# 【稀咲】
# display as 稀咲
# JP: 「れいな君、お茶の経験は？」
1582 = "「Reina, em đã có kinh nghiệm về trà đạo chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「ええとですねぇ――じゃなくて、はい」
1260 = "「Dạ ừm thì~——à không, vâng.」"
# monologue
# JP: 緩みにれいなが自分で気づく。\n背筋も再びぴいんと伸びる。
1972 = "Reina tự nhận ra sự lỏng lẻo của mình. Sống lưng em ấy lại một lần nữa thẳng tắp."
# 【れいな】
# display as 玲奈
# JP: 「お急須でいれるんじゃない、『おうす』っていうのは、\nポーレットがお客さまにお出しするの見たことあります」
1185 = "「Trà không pha bằng ấm trà nhỏ, gọi là 'ousu' (trà loãng), Reina đã từng thấy chị Paulette mời khách dùng rồi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど？　れいな君が自分で点てたり、\n誰かが点ててくれたお茶をいただいたことは？」
1491 = "「Ra là vậy? Vậy Reina đã tự mình pha trà, hay được ai đó pha trà cho thưởng thức bao giờ chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「ないです。れいな、レイルロオドですから。\nあ、でも、お茶を飲むのは大丈夫です」
1529 = "「Chưa ạ. Reina là Railord mà. A, nhưng mà, việc uống trà thì không sao đâu ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ。教えてくれてありがとう」
1490 = "「Vậy sao. Cảm ơn em đã cho chị biết nhé.」"
# monologue
# JP: 頷いて、稀咲は視線を僕へと向ける。
2086 = "Gật đầu, Kisaki hướng ánh mắt về phía tôi."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄は……確か少し心得があるんだっけ？\n日々姫からそんなことを聞いた気がする」
1724 = "「Soutetsu thì…… hình như cũng biết đôi chút phải không? Tôi nhớ mang máng là đã nghe Hibiki kể chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、心得といえるほどでは、全く。\n本当に幼少の頃、路子……妹とともに多少習っただけで」
1195 = "「Không, hoàn toàn chưa đến mức gọi là biết đâu. Chỉ là lúc còn rất nhỏ, tôi từng học một chút cùng với Michiko…… em gái tôi thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「了解だ。ならひとまずは茶道の稽古に入る前、薄茶――\nおうすを点ててみるから、自由に楽しんでみてほしい」
1402 = "「Hiểu rồi. Vậy thì trước khi chính thức bắt đầu buổi học trà đạo, tôi sẽ pha thử trà loãng—— ousu cho hai người, cứ thoải mái thưởng thức nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ！　れいな、緑のお茶とっても楽しみです」
1280 = "「Oa a! Reina rất mong chờ được thưởng thức món trà xanh đó ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、そう思ってもらえるなら光栄だね。\n稽古の方は、その一服ののちにはじめよう」
1300 = "「Fufu, được em mong đợi như vậy là vinh hạnh của chị đấy. Việc học thì chúng ta sẽ bắt đầu sau khi dùng xong tách trà đó nhé.」"
# monologue
# JP: 稀咲が静かに瞳を閉じる。\n出てくる声は、更に静かだ。
2084 = "Kisaki lặng lẽ nhắm mắt lại. Giọng nói cất lên còn tĩnh lặng hơn."
# 【稀咲】
# display as 稀咲
# JP: 「[わりげいこ,2]割稽古から、手抜くことなくきっちりと。\nそれは多分、ボクにしか果たし得ない役割だろうから」
1452 = "「Bắt đầu từ các bài tập cơ bản từng phần, không được lơ là mà phải thật chuẩn xác. Bởi vì đó có lẽ là vai trò mà chỉ có tôi mới có thể hoàn thành được.」"
# 【れいな】
# display as 玲奈
# JP: 「（ごくっ、ごくっ――ふうっ）。\nたいへんおいしゅうございました」
1735 = "「（Ực, ực——phù）.\nTrà rất ngon ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「――」
806 = "「——」"
# monologue
# JP: 稀咲の、ほとんど目礼に近い一礼。\nれいなと揃え、こちらは深めの一礼を返す。
2054 = "Một cái cúi chào của Kisaki, gần giống như chào bằng mắt. Cùng với Reina, tôi đáp lại bằng một cái cúi chào sâu hơn."
# 【稀咲】
# display as 稀咲
# JP: 「……」
821 = "「……」"
# monologue
# JP: ほ、と稀咲が息を吐く。\nぴいんと貼っていた空気が緩む。
2076 = "Hờ, Kisaki khẽ thở hắt ra. Bầu không khí đang căng như dây đàn chợt chùng xuống."
# 【稀咲】
# display as 稀咲
# JP: 「たいへん結構なお稽古でした。\nお疲れ様。――うん、今日はここまでにしておこう」
1212 = "「Buổi học hôm nay rất tốt. Hai người vất vả rồi. ——Ừm, hôm nay chúng ta dừng ở đây nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「ふああっ」
1274 = "「Phu a a.」"
# monologue
# JP: 安堵と悲鳴の混じったような声に驚き視線をむければ、\nれいなの顔は真っ赤になってる。
2096 = "Giật mình quay sang nhìn vì giọng nói như pha lẫn giữa sự nhẹ nhõm và tiếng hét, tôi thấy khuôn mặt Reina đang đỏ bừng."
# 【れいな】
# display as 玲奈
# JP: 「あんよ、足っ、きさきせんせい！\nれいなの、あのっ、足のばしても」
1656 = "「Chân, chân em, cô Kisaki! Của Reina, dạ, em duỗi chân ra có được không ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「構わないよ。稽古は終わった。\nボクはもう、先生じゃなく、ただの稀咲だ」
1252 = "「Không sao đâu. Buổi học kết thúc rồi. Chị không còn là cô giáo nữa, chỉ là Kisaki bình thường thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ふはあ」
# 1274 = "「哇」" 
# monologue
# JP: 今度は100\%の安堵。\nれいなは足を伸ばそうと、もぞもぞお尻を動かしている。
2130 = "Lần này là 100% nhẹ nhõm. Reina ngọ nguậy mông, cố gắng duỗi chân ra."
# 【れいな】
# display as 玲奈
# JP: 「ふわっ、はうっ。しびれっ、すぎてっ」
1292 = "「Phu a, ha ư. Tê, tê quá đi mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どれ」
1626 = "「Nào.」"
# monologue
# JP: 両脇の下に手をさしいれて、れいなをゆっくり持ち上げる。\n足がゆっくり伸びきるのを待ち、また丁寧に座らせる。
1895 = "Tôi luồn tay dưới hai nách, từ từ nhấc bổng Reina lên. Đợi cho đôi chân từ từ duỗi thẳng ra hết, rồi lại cẩn thận đặt em ấy ngồi xuống."
# 【れいな】
# display as 玲奈
# JP: 「ふはぁあああ。足って、こんなにしびれるんですねぇ。\nれいな、びっくりしちゃいましたぁ」
1290 = "「Phu ha a a a. Chân lại có thể tê đến mức này luôn nha~. Reina bất ngờ lắm đó ạ~」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、ならそこを最初に教えてあげればよかったね。\nいい？　ボクの正座を見てみて」
1503 = "「À, vậy thì đáng lẽ ra chị nên dạy em điều đó đầu tiên nhỉ. Được chứ? Nhìn dáng ngồi seiza của chị này.」"
# monologue
# JP: 稀咲が僕らに背中を向けて正座する。
2074 = "Kisaki quay lưng về phía chúng tôi và ngồi seiza."
# 【稀咲】
# display as 稀咲
# JP: 「いましている正座は、かかとをお尻の下に敷いてる。\nれいなくんも、多分この正座をしたんじゃないかな」
1454 = "「Dáng ngồi seiza hiện tại của chị là lót gót chân dưới mông. Reina chắc cũng đã ngồi seiza theo cách này phải không?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいな、あしをそろえて、\nきちーんって正座がんばりましたぁ」
1509 = "「Vâng ạ~. Reina đã khép chân lại, và cố gắng ngồi seiza thật ngay ngắ~n đó nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「確かにきちんとしているね。けど、これだと足が\nしびれやすくて、姿勢も前のめりになりやすい。だから」
1493 = "「Đúng là rất ngay ngắn. Nhưng ngồi như vậy chân sẽ rất dễ bị tê, và tư thế cũng dễ bị chúi về phía trước. Vì vậy」"
# monologue
# JP: （ひょい）
2070 = "（Nhấc nhẹ）"
# monologue
# JP: 稀咲が軽く尻をあげ、足を――足首を見せてくれる。\n左右の足首を軽くひろげて、まるで円を描くが如くに――
1868 = "Kisaki hơi nhấc mông lên, để lộ đôi chân——phần mắt cá chân cho chúng tôi xem. Hai mắt cá chân hơi mở ra, hệt như đang vẽ một vòng tròn——"
# 【稀咲】
# display as 稀咲
# JP: 「足首を開いてスペースをつくり、両足の親指を重ねる。\nで、出来たスペースにお尻をすっぽり下ろすと――」
1464 = "「Mở mắt cá chân ra tạo một khoảng trống, xếp chồng hai ngón chân cái lên nhau. Rồi đặt mông lọt thỏm vào khoảng trống vừa tạo ra đó——」"
# 【れいな】
# display as 玲奈
# JP: 「わああ、これもちゃあんと正座ですねぇ」
1296 = "「Oa a a, thế này cũng là ngồi seiza đàng hoàng nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかも……うむ。確かに姿勢がより安定しているな。\n重心が落ち、前のめりの姿勢が解消されている」
1631 = "「Hơn nữa…… ừm. Quả thực tư thế cũng ổn định hơn hẳn. Trọng tâm được hạ thấp, giải quyết được tình trạng chúi người về phía trước.」"
# 【稀咲】
# display as 稀咲
# JP: 「さらにね？\n足がしびれそうだな、と思ったらこう……」
1633 = "「Chưa hết đâu nhé? Nếu cảm thấy chân sắp tê rồi, thì cứ làm thế này……」"
# monologue
# JP: 稀咲の両足の親指が、くるりと位置を入れ替える。
2064 = "Hai ngón chân cái của Kisaki xoay nhẹ, đổi chỗ cho nhau."
# 【稀咲】
# display as 稀咲
# JP: 「親指の重ね方、上下を逆にすればいいんだ。\nこれで結構、しびれがまぎれる」
1249 = "「Chỉ cần đảo ngược cách xếp ngón cái, trên dưới đổi cho nhau là được. Như vậy sẽ làm giảm tê chân đi khá nhiều đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわー」
# 1274 = "「哇」" 
# monologue
# JP: 足のしびれがもう消えたのか、\n目を輝かせてれいなが早速座り直す。
1813 = "Không biết là chân đã hết tê chưa, nhưng đôi mắt Reina sáng rực lên và lập tức ngồi lại ngay."
# 【れいな】
# display as 玲奈
# JP: 「わ、わ！　これすごいですねぇ。\n足にかかる負荷が分散されて大きく軽減されますよぉ」
1273 = "「Oa, oa! Cái này tuyệt quá nha~. Trọng lượng dồn lên chân được phân tán và giảm đi đáng kể luôn đó ạ~」"
# monologue
# JP: ぱあっと、はじけるような笑顔。
1987 = "Nụ cười rạng rỡ bừng sáng."
# 【れいな】
# display as 玲奈
# JP: 「れいな、この正座の仕方覚えましたぁ。\nきさき先生、ありがとうございます！」
1575 = "「Reina đã nhớ cách ngồi seiza này rồi ạ~. Cảm ơn cô giáo Kisaki nha~!」"
# 【稀咲】
# display as 稀咲
# JP: 「あははっ、どうやら今日の稽古の中で、\n一番役にたつことはこれだったみたいだね」
1298 = "「A ha ha, xem ra trong buổi học hôm nay, đây là điều hữu ích nhất rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そんなことないですよぉ」
1531 = "「Không có chuyện đó đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのようなことはない」
1196 = "「Không, hoàn toàn không phải vậy.」"
# monologue
# JP: 言葉が重なり視線が交わる。\n故に小さくうなずけば、れいなは熱心な声を重ねる。
2095 = "Lời nói hòa quyện, ánh mắt giao nhau. Khi tôi khẽ gật đầu, Reina tiếp tục nói với giọng đầy nhiệt huyết."
# 【れいな】
# display as 玲奈
# JP: 「ふくさとか、なつめとか、ちゃせんとか、ちゃきんとか。\n全部の正しいあつかいかた、すっごく面白かったです」
1422 = "「Khăn lụa fukusa này, hộp trà natsume này, chổi khuấy trà chasen này, khăn lau chakin này. Cách sử dụng chính xác của tất cả những thứ đó, thú vị lắm luôn đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。正しい所作は、効率よくしかも美しい。\n礼儀とは、そうしたことの集積なのだなと僕は感じた」
1505 = "「Đúng là vậy. Những động tác chuẩn mực không chỉ hiệu quả mà còn rất đẹp mắt. Anh cảm thấy rằng, lễ nghi chính là sự tích lũy của những điều như vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　いわれてみたらそおですねぇ」
1286 = "「Oa! Nghe anh nói vậy thì đúng là thế thật nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん」
1524 = "「Hừm」"
# monologue
# JP: 稀咲が面白そうにつぶやく。
2079 = "Kisaki lẩm bẩm vẻ thích thú."
# 【稀咲】
# display as 稀咲
# JP: 「その観点はボクの好みとも合致する。実にいいね。\n気づき、というか学びがとても早い――ああ、いや」
1446 = "「Quan điểm đó rất hợp ý tôi. Thật sự rất tuyệt. Khả năng nhận thức, hay nói đúng hơn là học hỏi rất nhanh——À, không」"
# monologue
# JP: 稀咲が僕を見、れいなをみる。
2069 = "Kisaki nhìn tôi, rồi nhìn Reina."
# 【稀咲】
# display as 稀咲
# JP: 「ふたりとも最初から、\nごくごく自然に、物に対する敬意を持っているからかな」
1694 = "「Chắc là do ngay từ đầu, cả hai người đã có sự tôn trọng đối với đồ vật một cách vô cùng tự nhiên rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「それはそうですよぉ。\nれいなはレイルロオドで、物ですからねぇ」
1592 = "「Tất nhiên rồi ạ. Vì Reina là Railord, cũng là đồ vật mà nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はそのれいなの夫だしな」
1635 = "「Còn tôi là chồng của Reina mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「いやいや、そこは関係しないと思うよ。\n実際例えば、人間を大切にしない人間は、幾らでもいる」
1183 = "「Không không, tôi nghĩ chuyện đó không liên quan đâu. Thực tế thì, có thiếu gì những kẻ không biết trân trọng con người đâu cơ chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1321 = "「Hừm」"
# 【稀咲】
# display as 稀咲
# JP: 「物への敬意を有していること。物を大切に扱えることは、ふたりの素晴らしい個性であると、ボクは思う」
1209 = "「Việc có lòng tôn trọng đồ vật. Việc có thể trân trọng đồ vật, tôi nghĩ đó là cá tính tuyệt vời của hai người.」"
# monologue
# JP: 稀咲の笑顔。\nれいなもつられ、にっこり笑う。
2072 = "Kisaki mỉm cười. Reina cũng bị cuốn theo, nở nụ cười tươi rói."
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいな、ほめられちゃいましたぁ」
1380 = "「Ê hê hê~, Reina được khen rồi nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。褒めている。大いにね。そこを大切にすることは、\nきっと茶道を学ぶ上でも、大きな力になってくれるよ」
1355 = "「Ừm. Tôi đang khen đấy. Khen rất nhiều là đằng khác. Việc trân trọng điều đó chắc chắn sẽ là một trợ lực lớn trong việc học trà đạo đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！\nれいな、もーっと物を大事にするようにしまぁす」
1514 = "「Vâng ạ! Reina sẽ cố gắng trân trọng đồ vật hơn nữa nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「いいお返事だ。それならきっとこの先も……ああ――\n……これは、依頼を受けた範囲外のことなのだけれど」
1435 = "「Trả lời ngoan lắm. Vậy thì chắc chắn từ nay về sau…… À—— ……Chuyện này thì nằm ngoài phạm vi công việc được nhờ, nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1364 = "「Hửm?」"
# monologue
# JP: 珍しく稀咲が言いよどんでいる。\n依頼した範囲外――仕事でないというのであれば――
2058 = "Hiếm khi thấy Kisaki ấp úng như vậy. Nằm ngoài phạm vi được nhờ——tức là không phải công việc sao——"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。なんでもいってくれ。友人としてても、\n広義での同僚としてでも、あるいは有識者としてでも」
1438 = "「Chuyện gì vậy. Cô cứ nói đi. Dưới tư cách là một người bạn, một đồng nghiệp theo nghĩa rộng, hay là một chuyên gia cũng được.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。なら、友人で同僚で有識者として。\nボクは、君たち夫妻の家計管理が気になっている」
1401 = "「Vậy sao. Thế thì, dưới tư cách là bạn bè, đồng nghiệp và chuyên gia. Tôi đang khá bận tâm về việc quản lý tài chính của vợ chồng anh đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「かけい」
1410 = "「Tài chính」"
# 【双鉄】
# display as 雙鐵
# JP: 「管理」
1623 = "「Quản lý」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。キミたちはともに金銭に無頓着に思えるからね。\n将来のための資産設計などは、考えているのかな？」
1351 = "「Ừm. Có vẻ như cả hai người đều không bận tâm lắm đến tiền bạc nhỉ. Hai người đã tính toán thiết kế tài sản cho tương lai chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「将来のための資産設計――か」
1466 = "「Thiết kế tài sản cho tương lai——sao.」"
# monologue
# JP: いわれて気づく。僕が無限に働けるわけでもないし、\n僕の死後、れいなが百年稼働し続ける未来もありうる。
2132 = "Nghe cô ấy nói tôi mới nhận ra. Tôi đâu thể làm việc mãi mãi được, và sau khi tôi qua đời, Reina vẫn có thể tiếp tục hoạt động cả trăm năm nữa."
# 【れいな】
# display as 玲奈
# JP: 「わ、そうですねぇ。れいなが止まっちゃったあと、\n双鉄さんが、もしもはたらけなくなったりしたら……」
1289 = "「Oa, đúng thế thật nha~. Lỡ như sau khi Reina ngừng hoạt động, mà anh Soutetsu lại không thể làm việc được nữa thì……」"
# monologue
# JP: 思考が零れたようなつぶやき。嬉しくなる。\n僕もれいなも、お互いを思いやっている。ゆえ――
2092 = "Lời lẩm bẩm như thể buột miệng thốt ra những suy nghĩ trong đầu. Thấy vui thật đấy. Cả tôi và Reina đều đang lo lắng cho nhau. Vì thế——"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、指摘してもらえて助かった。\nとても大切なことを、まったく考えていないと気づいた」
1659 = "「Không, may mà có cô nhắc nhở đấy. Tôi chợt nhận ra mình hoàn toàn chưa nghĩ đến một chuyện rất quan trọng.」"
# monologue
# JP: こくこくれいなが何度も頷く。れいなも僕と同様に、\n稀咲を深く信頼してると伝わってくる。
1953 = "Reina gật đầu liên tục. Có thể thấy Reina cũng giống như tôi, đang đặt niềm tin sâu sắc vào Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「善は急げだ。それが稀咲の――銀行家としての\n業務の範囲であるのなら、正式に依頼させてほしい」
1202 = "「Việc tốt thì phải làm ngay. Nếu đó nằm trong phạm vi nghiệp vụ của một nhân viên ngân hàng như Kisaki, thì xin hãy cho tôi chính thức ủy thác công việc này.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん仕事でも大丈夫。\n友人としてでもかまわないけど？」
1591 = "「Tất nhiên công việc thì không vấn đề gì. Nhưng lấy tư cách bạn bè cũng được mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事で頼む。その方が、遠慮せずに相談できるゆえ」
1695 = "「Tôi muốn nhờ với tư cách công việc. Như vậy thì mới có thể thoải mái trao đổi mà không cần phải e ngại.」"
# 【稀咲】
# display as 稀咲
# JP: 「かしこまりました」
# 1398 = "「好的」" 
# monologue
# JP: 稀咲の声が、業務の温度まで下がる。\n冷静で、余分な感情を交えぬものに。
2066 = "Giọng của Kisaki hạ xuống nhiệt độ của công việc. Bình tĩnh và không lẫn chút cảm xúc dư thừa nào."
# 【稀咲】
# display as 稀咲
# JP: 「でしたら、デスクへ移動しましょう。\nまずはお客様のご希望について、お伺いさせて頂きます」
1722 = "「Nếu vậy thì, chúng ta di chuyển đến bàn làm việc thôi. Trước tiên, tôi xin phép được lắng nghe nguyện vọng của quý khách.」"
# 【れいな】
# display as 玲奈
# JP: 「日々姫先生、ご指導よろしくおねがいします」
1476 = "「Cô giáo Hibiki, mong cô chỉ giáo thêm ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
# 1274 = "「哇」" 
# monologue
# JP: れいなのぴしりとした座礼。\n日々姫は驚いた目で僕を見る。
1968 = "Cái cúi chào nghiêm trang của Reina khi đang ngồi. Hibiki nhìn tôi với ánh mắt ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲先生のご指導の賜物だ」
1697 = "「Là thành quả từ sự chỉ bảo của cô giáo Kisaki đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
1381 = "「A—」"
# monologue
# JP: 頷いて。\n日々姫はれいなのすぐ前にいき、膝のくっつく近さに座る。
1939 = "Gật đầu. Hibiki đi đến ngay trước mặt Reina, ngồi xuống sát đến mức hai đầu gối chạm vào nhau."
# 【日々姫】
# display as 日日姬
# JP: 「もちろん喜んで引き受けるけん、もっと楽ーにして\nよかよ？　礼儀作法、もうばっちりみたいやし」
1268 = "「Tất nhiên là chị rất sẵn lòng nhận lời rồi, nhưng em cứ thoải mái hơn đi được không? Về lễ nghi thì có vẻ em đã làm rất hoàn hảo rồi mà.」"
# 【れいな】
# display as 玲奈
# JP: 「でもでも、ものをおしえてもらうときのTPOが」
1255 = "「Nhưng mà, TPO khi được người khác chỉ dạy thì...」"
# 【日々姫】
# display as 日日姬
# JP: 「TPO。そっかー、そこも稀咲センパイに、\nじーっくり教えてもろーたとね？」
1521 = "「TPO à. Ra là vậy, em cũng được tiền bối Kisaki chỉ dạy cặ-ặn kẽ về khoản đó rồi nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ――あ、『はい』」
1494 = "「Vâng ạ~——A, 『Vâng』」"
# 【日々姫】
# display as 日日姬
# JP: 「よかね。そいば、とーってもよかこと、\nばってん、ね？　れいなちゃん」
1441 = "「Tốt lắm. Đó là một điều vô-ô cùng tốt, nhưng mà này? Bé Reina.」"
# 【日々姫】
# display as 玲奈
# JP: 「わたしの教えられるお花は、楽しか楽しかお花やけん」
1270 = "「Nghệ thuật cắm hoa mà chị có thể dạy em, là một nghệ thuật rất chi là vui vẻ đó nha.」"
# monologue
# JP: 用意の花の一輪を、日々姫がさっと手に取り
1933 = "Hibiki thoăn thoắt nhấc một bông hoa đã chuẩn bị sẵn lên."
# monologue
# JP: （パチン）
2170 = "（Tách）"
# 【れいな】
# display as 玲奈
# JP: 「わ！？　お花、切っちゃうんですねぇ」
1287 = "「Oa!? Chị cắt bông hoa luôn kìa nha~」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、ここに用意されてるお花の役割は、\n『もっと綺麗になって見る人を幸せにすること』やけん」
1356 = "「Ừm, vai trò của những bông hoa được chuẩn bị ở đây là, 『Trở nên xinh đẹp hơn và mang lại hạnh phúc cho người ngắm nhìn』 mà lị.」"
# monologue
# JP: 日々姫の鋏が手早く動く。\n余分な要素が切り落とされて、花の可憐さだけが残る。
1929 = "Chiếc kéo trong tay Hibiki di chuyển thoăn thoắt. Những phần thừa thãi bị cắt bỏ, chỉ để lại vẻ đẹp đáng yêu của bông hoa."
# 【日々姫】
# display as 日日姬
# JP: 「そん役割を果たさせてあげるため。ん……\nこぎゃんしたら――ね？」
1554 = "「Để giúp chúng hoàn thành vai trò đó. Ưm…… Làm thế này thì——đó, thấy chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！！！」
1382 = "「Ồ!!!」"
# 【れいな】
# display as 玲奈
# JP: 「ふえっ！？　えっ！？　れいな、お花、ええと」
1312 = "「Hể!? Ể!? Reina, hoa, ừm」"
# 【日々姫】
# display as 日日姬
# JP: 「れいなちゃん、そこ、姿見」
1585 = "「Bé Reina, nhìn vào gương kia kìa.」"
# 【れいな】
# display as 玲奈
# JP: 「ありがとうございま――ふわああああああっ」
1658 = "「Em cảm ơn ạ——Oaaaaaaaa」"
# monologue
# JP: れいなの髪に、鮮やかにあしらってもらった一輪の花。\n見た瞬間に、れいなの頬にも一輪ずつの花が咲く。
1808 = "Một bông hoa được cài lên mái tóc Reina một cách rực rỡ. Ngay khoảnh khắc nhìn thấy nó, hai má Reina cũng ửng hồng như hai đóa hoa nở rộ."
# 【れいな】
# display as 玲奈
# JP: 「すごい、きれい、かわいい！！　おはながれいなの、\nれいなにぴったりの髪飾りになっちゃいましたぁ」
1389 = "「Tuyệt quá, đẹp quá, dễ thương quá!! Bông hoa đã trở thành một chiếc kẹp tóc cực kỳ hợp với Reina luôn rồi nha~」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1343 = "「Ừm!」"
# monologue
# JP: 満足そうに日々姫も笑う。\n花一輪をきっかけに、部屋が暖かな花畑になる。
1937 = "Hibiki cũng mỉm cười đầy mãn nguyện. Chỉ với một bông hoa, căn phòng đã hóa thành một cánh đồng hoa ấm áp."
# 【日々姫】
# display as 日日姬
# JP: 「こーゆーのも、生け花なの。\nゆーても、日々姫流の生け花だけど」
1688 = "「Thế này cũng là nghệ thuật cắm hoa đấy. Tuy nói vậy, nhưng đây là cắm hoa theo phong cách Hibiki thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫流」
1474 = "「Phong cách Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ねぇねもわたしも、きちーんとした先生について、\n師範免状いただくまで、お稽古つけてもろーたばってん」
1362 = "「Ừm. Cả chị Mayami và em đều theo học một giáo viên đà-àng hoàng, và được rèn luyện cho đến khi nhận được bằng sư phạm luôn đó.」"
# monologue
# JP: 指差し示され初めて気づく。壁の一角、\n額装された免状には、『４級師範』の文字と日々姫の名。
2109 = "Được cô bé chỉ tay tôi mới nhận ra. Ở một góc tường, có treo một tấm bằng lồng khung ghi dòng chữ 『Sư phạm bậc 4』 cùng tên của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ルールに縛られてないのはよかけど、\nルール通りのは最低限しかできてないって。やけん」
1188 = "「Việc không bị gò bó bởi luật lệ thì tốt thôi, nhưng những gì làm theo luật thì em chỉ đạt mức tối thiểu. Vậy nên...」"
# 【双鉄】
# display as 雙鐵
# JP: 「縛られてない部分が、日々姫流。\nそうご評価頂いた感じか？」
1189 = "「Phần không bị gò bó đó, chính là phong cách Hibiki. Đó là cách em được đánh giá sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そ。そういうわけで本当は、華道も真闇姉が教えて\nあげた方がよかかなー、とも思うたんだけどね？」
1458 = "「Đúng vậy. Vì thế nên thật ra em cũng nghĩ, hay là để chị Mayami dạy nghệ thuật cắm hoa thì tốt hơn chăng?」"
# monologue
# JP: パチ、パチとまた日々姫の鋏が動く。\nさきほどれいなを彩ったものと同じ花が――む？
1926 = "Lách cách, lách cách, chiếc kéo của Hibiki lại di chuyển. Cùng là loại hoa vừa điểm tô cho Reina khi nãy——hửm?"
# 【日々姫】
# display as 日日姬
# JP: 「はぁい、こいば――にぃにに！」
1395 = "「Đây, cái này——dành cho anh hai!」"
# 【れいな】
# display as 玲奈
# JP: 「ふわああああ！　かあっこいいですぅ！\nおはな一つで、そうてつさんがもおっとキリって！！」
1279 = "「Oaaaaaaaa! Ngầu quá đi mất nha~! Chỉ với một bông hoa thôi mà trông anh Soutetsu ngầu hơn hẳn luôn!!」"
# monologue
# JP: れいなの声に姿見を見る。\n見た瞬間に声が出る。
2093 = "Nghe tiếng Reina, tôi liền nhìn vào gương. Khoảnh khắc nhìn thấy, tôi không kìm được mà lên tiếng."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――なかなか、いや、実に素晴らしいな。\n僕のような男でも……うむ、伊達者に見えるではないか」
1388 = "「Cái này——khá lắm, à không, thực sự rất tuyệt vời. Ngay cả một thằng đàn ông như anh…… ừm, trông cũng bảnh bao ra phết đấy chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふふーん。ね？　お花ひとつで暮らしが楽しく、\nもーっと豊かになるでしょお」
1320 = "「Hư hừm. Thấy chưa? Chỉ với một bông hoa thôi mà cuộc sống đã thêm phần thú vị, và phong phú hơn rất nhiều rồi đúng không nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに――うむ。驚くべきものだな」
1616 = "「Đúng là vậy——ừm. Thật đáng kinh ngạc.」"
# 【れいな】
# display as 玲奈
# JP: 「おんなじお花なのに不思議ですぅ。\nれいなのしてもらった髪飾りはふんわりかわいくて」
1479 = "「Cùng một loại hoa mà kỳ diệu thật nha~. Chiếc kẹp tóc của Reina thì mềm mại, đáng yêu, còn...」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕があしらってもらったポケットチーフがわりの花は、\n全体を引き締めた上で、華やぐアクセントになっている」
1637 = "「Bông hoa thay cho khăn cài túi áo ngực của anh, không những làm tôn lên tổng thể mà còn là một điểm nhấn rực rỡ.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしが得意なこぎゃんとは、\n『[じゆうか,2]自由花』っていうの。これも生け花」
1696 = "「Những thứ như thế này là sở trường của em, gọi là 『Tự do hoa』. Đây cũng là nghệ thuật cắm hoa đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「じゆうか」
1640 = "「Tự do hoa ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ。自由なお花、って書いて、自由花」
1537 = "「Đúng vậy. Hoa tự do, viết là Tự do hoa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、なると伝統的な――剣山だのなんだのを\n使ってやる生け花は、また別のジャンルとなるのか」
1720 = "「Vậy, những kiểu cắm hoa truyền thống——dùng bàn chông kenzan hay những thứ tương tự, là một thể loại khác sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そそ。そっちは流派によって、『[りっか,1]立花』とか『基本形』\nとか呼ばれると！　りっかは、立つ花で立花」
1501 = "「Đúng đúng. Bên đó tùy theo trường phái mà sẽ được gọi là 『Lập hoa』 hay 『Hình thức cơ bản』! Lập hoa, nghĩa là hoa đứng đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、剣山で花を立てるから立花か」
1316 = "「À, cắm hoa đứng trên bàn chông kenzan nên gọi là Lập hoa à.」"
# 【日々姫】
# display as 日日姬
# JP: 「そそそ。で、ね？　れいなちゃん」
1418 = "「Đúng đúng đúng. Thế nên là, em thấy sao? Bé Reina.」"
# monologue
# JP: 日々姫がテーブルを指し示す。\nそこには綺麗に――道具さえ、実に綺麗に配置されてる。
1935 = "Hibiki chỉ tay về phía chiếc bàn. Ở đó mọi thứ——ngay cả dụng cụ, cũng được sắp xếp vô cùng gọn gàng."
# 【日々姫】
# display as 日日姬
# JP: 「ちょこっとだけでもやってみる？\nお道具全部用意してあるけん、簡単簡単」
1645 = "「Em có muốn làm thử một chút không? Dụng cụ đã chuẩn bị sẵn hết rồi, dễ lắm dễ lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「わああ！　れいなやってみたいですぅ」
1282 = "「Oaaaa! Reina muốn làm thử nha~」"
# monologue
# JP: れいなはうきうき、跳ねんばかりだ。\n“楽しむことがTPO”と、日々姫は行動で示してくれる。
1989 = "Reina hớn hở, chỉ chực nhảy cẫng lên. “Vui vẻ chính là TPO”, Hibiki đã dùng hành động để chứng minh điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、やってみよー！　最初はお花ば選んで、『主役』\n『脇役』『控え』の３つのを決めてあげるとこから」
1714 = "「Vậy thì làm thử thôi nào! Đầu tiên là chọn hoa, bắt đầu từ việc quyết định 3 vai trò 『Vai chính』, 『Vai phụ』 và 『Hỗ trợ』 nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、主役はこのこがいいですぅ」
1572 = "「Reina muốn chọn bé này làm vai chính nha~」"
# monologue
# JP: 一瞬の迷いも見せぬ選択。\n日々姫も僕も、なるほどと大きく頷かされる。
1969 = "Một sự lựa chọn không chút do dự. Cả Hibiki và tôi đều gật gù đồng tình."
# 【日々姫】
# display as 日日姬
# JP: 「ピンクのガーベラ！　良かとね～！\nれいなちゃんにぴったり！！！」
1625 = "「Hoa đồng tiền hồng! Tuyệt quá đi~! Cực kỳ hợp với bé Reina luôn!!!」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～！　それでそれで、わきやくはですねぇ」
1374 = "「Ê hê hê~! Thế rồi thế rồi, vai phụ là nha~」"
# monologue
# JP: ああ、うまい。稀咲が型から意味へ導いたのとは正反対。\n日々姫は意味から型へと導く。
1994 = "Chà, khéo thật. Trái ngược hoàn toàn với cách Kisaki dẫn dắt từ khuôn mẫu đến ý nghĩa. Hibiki lại dẫn dắt từ ý nghĩa đến khuôn mẫu."
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃに、何ぼーっとしとると？\nにぃにもれいなちゃんと一緒に習うゆーとったでしょお」
1336 = "「Này anh hai, anh đang thẫn thờ cái gì thế? Chẳng phải anh bảo sẽ học cùng bé Reina sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな。すまない」
1349 = "「À, đúng rồi nhỉ. Xin lỗi em.」"
# monologue
# JP: れいなに倣って花を選んで、手を動かす。\n控えの花までを選び終えれば、即実践だ。
1899 = "Bắt chước Reina, tôi cũng chọn hoa và bắt tay vào làm. Sau khi chọn xong cả hoa hỗ trợ, chúng tôi bắt đầu thực hành ngay."
# 【日々姫】
# display as 日日姬
# JP: 「……あ、ハサミはもーちょっと斜めに、そうそう。\nその方が、水を吸いやすいし、留めやすいけん」
829 = "「……A, kéo phải cầm nghiêng một chút nữa, đúng rồi đúng rồi. Làm vậy hoa sẽ dễ hút nước hơn, và cũng dễ cắm vào bàn chông hơn.」"
# monologue
# JP: （ぱちんっ！）
2169 = "（Tách!）"
# 【日々姫】
# display as 日日姬
# JP: 「じょうずじょうず。で、剣山に――そそそそ。うまい。\nそしたら――うん。足元の方が寂しくなかと？　やけん」
1433 = "「Giỏi lắm giỏi lắm. Giờ thì cắm vào bàn chông kenzan——đúng đúng đúng đúng. Khéo tay ghê. Tiếp theo——ừm. Phần dưới gốc trông hơi trống trải nhỉ? Vậy nên...」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　れいな、わきやく、\nやっぱりこのわさわさの草にしまぁす。そしたら足元」
1331 = "「A! Reina quyết định chọn loại cỏ xum xuê này làm vai phụ nha~. Như vậy thì phần dưới gốc...」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん、それもすっごく良いチョイス！\nじゃ、高さのバランスとってみよっか」
1342 = "「Ừm ừm, lựa chọn đó cũng tuyệt vời lắm! Vậy, thử cân bằng chiều cao xem sao nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
# 1398 = "「好的」" 
# monologue
# JP: ……レールショップで時折、子供むけの工作教室を\n開いている成果だろうか。日々姫は水を得た魚のごときだ。
796 = "……Có lẽ đây là thành quả của việc thỉnh thoảng mở lớp học thủ công cho trẻ em ở cửa hàng đường sắt chăng. Hibiki như cá gặp nước vậy."
# monologue
# JP: （と、いうかだ。れいなもなかなか――）
2182 = "（Nói đúng hơn thì. Reina cũng khá là——）"
# monologue
# JP: ……夫の欲目もあるかもしれんが、センスがいい。\nれいならしく、かわいらしく、ピンクを主役と引き立てる。
1817 = "……Có thể là do cái nhìn thiên vị của một người chồng, nhưng em ấy rất có gu. Một tác phẩm mang đậm phong cách Reina, đáng yêu, làm nổi bật sắc hồng của bông hoa chính."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
1723 = "「Anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1332 = "「À, ừm.」"
# monologue
# JP: それに比べて、僕はどうにも――
2119 = "So với em ấy, tôi lại có vẻ——"
# 【日々姫】
# display as 日日姬
# JP: 「『どう見せよう』とかいらんけん。にぃににとって\n気持ちよかバランスに――そうね、整頓。させてみて？」
1192 = "「Không cần phải nghĩ 『làm sao để cho đẹp』 đâu. Anh cứ thử sắp xếp sao cho cân bằng theo ý thích của anh——đúng rồi, chỉnh trang lại xem sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それであればできそうだ」
1318 = "「À, nếu vậy thì anh làm được.」"
# monologue
# JP: 分類し、整列し、整頓し、主役と脇役と控えを明確化する。\n今度の日々姫の指示ならば、迷うところはまったくない。
1835 = "Phân loại, xếp hàng, sắp xếp gọn gàng, làm rõ vai trò của hoa chính, hoa phụ và hoa hỗ trợ. Với chỉ thị lần này của Hibiki, tôi không còn chút do dự nào nữa."
# monologue
# JP: （パチ――さくっ――パチ………………さくっ）
2168 = "（Lách cách——phập——lách cách………………phập）"
# 【れいな】
# display as 玲奈
# JP: 「できましたぁ！！！」
1221 = "「Xong rồi ạ!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
1442 = "「Anh cũng xong rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん！　上出来！　れいなちゃんもにぃにも、\nすっごく“らしく”！　活けられたとね！」
1346 = "「Ưm! Làm tốt lắm! Cả bé Reina và anh hai đều cắm hoa rất “đậm chất riêng” luôn đó nha!」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
1365 = "「Ê hê hê~」"
# 【双鉄】
# display as 雙鐵
# JP: 「“らしく”か。確かに」
1595 = "「“Đậm chất riêng” à. Đúng thật.」"
# monologue
# JP: れいなの花は伸びやかで素朴で実に愛らしく。\n僕のは地味だが質実剛健にまとまっているように思える。
1963 = "Bình hoa của Reina vươn dài, mộc mạc và vô cùng đáng yêu. Còn của tôi tuy giản dị nhưng lại mang vẻ vững chãi, chắc chắn."
# 【日々姫】
# display as 日日姬
# JP: 「そしたら、ここからが私のお教室の本番！\nにぃにとれいなちゃんのお部屋に移動しよー！」
1721 = "「Vậy thì, bây giờ mới là phần chính của lớp học này! Chúng ta cùng di chuyển sang phòng của anh hai và bé Reina nào!」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　れいな、わかっちゃいましたぁ♪\n活けたお花も持っていくんですねぇ」
1329 = "「A! Reina hiểu rồi nha~♪ Chúng ta sẽ mang theo cả bình hoa vừa cắm nữa đúng không ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そそそ！　さすがれいなちゃん、大正解！」
1532 = "「Đúng đúng đúng! Quả không hổ danh bé Reina, chính xác!」"
# monologue
# JP: れいなと並び、花を抱えて自室に戻る。
1887 = "Sánh bước cùng Reina, tôi ôm bình hoa trở về phòng."
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいなのお花はここにおいちゃいまぁす」
1378 = "「Ê hê hê~, hoa của Reina sẽ đặt ở đây nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 1381 = "「噢」" 
# monologue
# JP: もとよりふわふわ愛らしかったれいなの私物の一角が、\n花を添えられぱっと華やぐ。
1974 = "Góc đồ đạc cá nhân vốn dĩ đã mềm mại đáng yêu của Reina, nay được điểm xuyết thêm bình hoa bỗng trở nên rực rỡ hẳn lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、ならば」
1359 = "「Hừm, nếu vậy thì」"
# monologue
# JP: 僕の花は、れいなの私物の置かれていない、\n床の間にそっと飾ってみる。
1903 = "Tôi thử nhẹ nhàng đặt bình hoa của mình lên hốc tường tokonoma, nơi không có đồ đạc của Reina."
# 【れいな】
# display as 玲奈
# JP: 「わああ！　かっこいいですぅ！！」
1276 = "「Oaaaa! Ngầu quá đi mất nha~!!」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　かわいいしかっこいい！！\nその上で――あ、ううん、ね？　にぃに、れいなちゃん」
1344 = "「Ừm! Vừa đáng yêu vừa ngầu luôn!! Thêm vào đó——a, ưm, này? Anh hai, bé Reina.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1364 = "「嗯？」" 
# 【れいな】
# display as 玲奈
# JP: 「なんですかぁ」
1204 = "「Chuyện gì vậy ạ~」"
# 【日々姫】
# display as 日日姬
# JP: 「難しかったらやらんでいいけど。思いつくようならね？\nお互いの花に手ば加えて、もーっとお互いらしい感じに」
1404 = "「Nếu thấy khó quá thì không cần làm đâu. Nhưng nếu hai người có ý tưởng gì thì sao? Thử chỉnh sửa hoa của nhau xem, để nó mang đậm phong cách của đối phương hơn nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　そうしてみてもいいんですかぁ」
1285 = "「Oa! Bọn em làm vậy cũng được sao ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。もちろん。\n面白そうだ。僕も大変に興味がある」
1357 = "「À, ừm. Tất nhiên rồi. Có vẻ thú vị đấy. Anh cũng rất hứng thú.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、それならですねぇ。れいなですねぇ」
1372 = "「Ê hê hê~, nếu vậy thì nha~. Reina sẽ nha~」"
# monologue
# JP: れいながハサミを手にとって、ぽてぽて花へ近づいていく。\nそして――おお――おおお――なんとも、これは。
1962 = "Reina cầm kéo lên, lạch bạch bước về phía bình hoa. Và rồi——ồ——ồ ồ——chà, cái này."
# 【日々姫】
# display as 日日姬
# JP: 「大っ胆――無邪気！　ばってん、うん――\n余分な要素をごっそり落としたこっちの方が」
1597 = "「Táo bạo——và ngây thơ quá! Nhưng mà, ừm—— Phiên bản đã lược bỏ hết những yếu tố dư thừa này có vẻ...」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕がみても僕らしい」
1487 = "「Đúng vậy. Chính anh nhìn cũng thấy rất giống phong cách của mình.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
1366 = "「Ê hê hê~」"
# monologue
# JP: 形を整えようと思った部分がごそりと切り落とされた。\n簡素で、主役がすっと立つ――実に心地よく目に映る。
1840 = "Phần tôi định dùng để tạo dáng đã bị cắt gọt sạch sẽ. Giản dị, làm nổi bật bông hoa chính——thực sự rất thuận mắt."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにから見たれいなちゃんのは？」
1719 = "「Còn bình hoa của bé Reina dưới góc nhìn của anh hai thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……。さっきの、主役と脇役と控えだったか。\nそれ以外に、さらに要素を加えるなどは――」
827 = "「…… Lúc nãy, gồm có vai chính, vai phụ và hoa hỗ trợ đúng không. Ngoài những thứ đó ra, nếu anh muốn thêm các yếu tố khác thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろんよかと、こいばもう、自由花やけん」
1593 = "「Tất nhiên là được rồi, vì đây là Tự do hoa mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
1717 = "「Nếu vậy thì.」"
# 【れいな】
# display as 玲奈
# JP: 「わ――わっ！　わあああああああっ！！」
1271 = "「Oa——oa! Oaaaaaaaaa!!」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。ものすごくれいなちゃん！」
1324 = "「A, ừm. Cực kỳ đậm chất bé Reina luôn!」"
# monologue
# JP: 花器の周りにありったけ、小さな花たちをあしらっていく。\nにぎやかに、しあわせに、れいなが包まれるように。
1893 = "Tôi trang trí thật nhiều bông hoa nhỏ xung quanh bình hoa. Thật rực rỡ, thật hạnh phúc, tựa như đang ôm trọn lấy Reina vậy."
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいな、\nとってもとーってもうれしいですぅ」
1370 = "「Ê hê hê~, Reina\nthấy vui lắ-ắm luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
1444 = "「Anh cũng vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……って、にぃに、れいなちゃん？\nお互いうっとり見つめ合うのもよろしかばってん」
831 = "「……Này, anh hai, bé Reina? Hai người đắm đuối nhìn nhau cũng tốt thôi nhưng mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1321 = "「唔」" 
# 【日々姫】
# display as 日日姬
# JP: 「視野ばひろげて、ここで全体――\n“お花のあるお部屋”ば、見てみて？」
1207 = "「Thử mở rộng tầm mắt ra, và nhìn bao quát cả “Căn phòng có hoa” xem nào?」"
# 【れいな】
# display as 玲奈
# JP: 「ふぇ？　――あっ」
1311 = "「Hể? ——A」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1313 = "「Chà.」"
# monologue
# JP: まったく異なる趣をもったふたつの花たち。\nそれが不思議と部屋全体に、彩りと調和をもたらしている。
1889 = "Hai bình hoa mang hai phong cách hoàn toàn khác biệt. Thế nhưng chúng lại kỳ diệu mang đến sắc màu và sự hài hòa cho cả căn phòng."
# 【双鉄】
# display as 雙鐵
# JP: 「不思議だ……。不思議で面白い。\nこれが華道というものか」
1598 = "「Kỳ diệu thật……. Thật kỳ diệu và thú vị. Đây chính là nghệ thuật cắm hoa sao.」"
# 【れいな】
# display as 玲奈
# JP: 「すごいですぅ。\nきれいで、ぽかぽかで、しあわせですねぇ」
1397 = "「Tuyệt quá đi nha~. Thật đẹp, thật ấm áp và thật hạnh phúc nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんね。これも華道にできることのひとつ。\nお花ばある暮らしで、もっと綺麗に、豊かになれる」
1538 = "「Đúng vậy đó. Đây cũng là một trong những điều nghệ thuật cắm hoa có thể làm được. Sống cùng với hoa, cuộc sống sẽ trở nên tươi đẹp và phong phú hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、\nかどう、とーっても好きになっちゃいましたぁ」
1570 = "「Reina,\nthích nghệ thuật cắm hoa lắ-ắm rồi nha~」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん」
1340 = "「Ừm ừm.」"
# monologue
# JP: れいなと日々姫。義理の姉妹がにっこり笑って向かい合う。\nなるほど確かに、花のある暮らしはしあわせだ。
1955 = "Reina và Hibiki. Hai chị em dâu mỉm cười nhìn nhau. Quả thật, một cuộc sống có hoa thật sự rất hạnh phúc."
# 【日々姫】
# display as 日日姬
# JP: 「で、ね？　れいなちゃん、にぃに」
1213 = "「Và, này? Bé Reina, anh hai.」"
# monologue
# JP: 日々姫がハサミと草を手に取る。\n花ではなく、わさわさ茂った緑の葉を。
1930 = "Hibiki cầm lấy chiếc kéo và một nhành cây. Không phải hoa, mà là một cành lá xanh tươi xum xuê."
# 【日々姫】
# display as 日日姬
# JP: 「華道には、他にもできることたーくさんあるの。\nもしよかったら」
1642 = "「Nghệ thuật cắm hoa còn có thể làm được nhiề-ều điều khác nữa cơ. Nếu hai người muốn thì...」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！！！」
1525 = "「Vâng ạ!!!」"
# monologue
# JP: れいなが元気に挙手をする。\n笑顔がくるり僕へむき、甘えた上目遣いにかわる。
1960 = "Reina hào hứng giơ tay lên. Nụ cười rạng rỡ hướng về phía tôi, đôi mắt ngước lên nũng nịu."
# 【れいな】
# display as 玲奈
# JP: 「れいな、かどうのこともっとおべんきょうしたいですぅ。\nね、そうてつさん、いいですかぁ？」
1578 = "「Reina muốn học thêm về nghệ thuật cắm hoa nha~. Nè, anh Soutetsu, có được không ạ?」"
# 【真闇】
# display as 真闇
# JP: 「そ、ひーちゃんがそぎゃんこつ」
1231 = "「Vậy sao, bé Hi đã nói thế à.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、そうなんですよぉ。\nですから、はぁい、おはな」
1367 = "「Ê hê hê~, đúng vậy đó nha~. Thế nên là, đây ạ, hoa cho chị này.」"
# 【真闇】
# display as 真闇
# JP: 「あら、綺麗。こいば、おだいどこに？」
1308 = "「Ôi chà, đẹp quá. Bình hoa này, em định đặt ở bếp sao?」"
# 【れいな】
# display as 玲奈
# JP: 「まくらおねーちゃんにですぅ。れいな、おねーちゃんの\nことかんがえながら、おはなえらんで活けたんですよぉ」
1425 = "「Là tặng cho chị Mayami đó nha~. Reina đã vừa nghĩ đến chị vừa chọn hoa và cắm đấy ạ.」"
# monologue
# JP: ぱっと、真闇姉の顔が輝く。\n大切そうに伸びた手が、れいなの手から花器を受け取る。
2013 = "Khuôn mặt chị Mayami bừng sáng. Đôi bàn tay cẩn thận đưa ra, nhận lấy bình hoa từ tay Reina."
# 【真闇】
# display as 真闇
# JP: 「[りんどう,1]竜胆。嬉しか。れーちゃんにおねーちゃん。\nずいぶん綺麗に見えてとるとねぇ」
1730 = "「Hoa Long đởm. Chị vui lắm. Trong mắt bé Rei, chị trông xinh đẹp đến nhường này cơ à.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。きれいで、あったかで、やさしくて、\nだけどちょっぴりおっかないですぅ」
1496 = "「Vâng ạ~. Vừa xinh đẹp, ấm áp, dịu dàng, nhưng cũng có chút xíu đáng sợ nữa nha~」"
# 【真闇】
# display as 真闇
# JP: 「あらあら、まっことよー見てくれとると。\nありがとね、れーちゃん」
1303 = "「Trời ạ, em quan sát kỹ thật đấy. Cảm ơn em nhé, bé Rei.」"
# 【れいな】
# display as 玲奈
# JP: 「わ」
# 1274 = "「哇」" 
# monologue
# JP: ぎゅっと優しく抱きしめられて、\n一瞬驚いたれいなの瞳がみるみる幸せに細まっていく。
1980 = "Được ôm chầm lấy một cách dịu dàng, đôi mắt Reina thoáng ngạc nhiên rồi nhanh chóng nheo lại vì hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\n喜んでもらえて、れいなもとーってもうれしいですよぉ」
1265 = "「Ư hư hư~. Thấy chị vui, Reina cũng vui lắ-ắm luôn nha~」"
# monologue
# JP: 数秒、とても暖かな時間。\n頬を擦り付けれいなを離し、真闇姉はその目を見つめる。
1866 = "Vài giây trôi qua, một khoảng thời gian thật ấm áp. Áp má cọ cọ rồi buông Reina ra, chị Mayami nhìn sâu vào mắt em ấy."
# 【真闇】
# display as 真闇
# JP: 「ほんならひーちゃんは、\nれーちゃんにとって、よか先生だったと？」
1713 = "「Vậy thì, bé Hi đã làm một người giáo viên tốt đối với bé Rei đúng không nào?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　おはな、そのままでも綺麗なのに、\n選んで考えて活けると、もーっと素敵になるって」
1533 = "「Vâng ạ~! Hoa vốn dĩ đã đẹp rồi, nhưng nếu biết chọn lọc, suy nghĩ và cắm lên thì sẽ còn tuyệt vời hơn nữa nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「生け花を通じ、生活そのものをデザインする――\n選び、整えることの大切さも、教えてもらえた気がする」
1692 = "「Thông qua nghệ thuật cắm hoa để thiết kế chính cuộc sống của mình—— Em có cảm giác mình đã học được tầm quan trọng của việc lựa chọn và sắp xếp.」"
# 【れいな】
# display as 玲奈
# JP: 「あー、ほんとですねぇ。どのおはなをどこに置くかとか、\nそうてつさんといっしょに決めるの、楽しいですねぇ」
1334 = "「A, đúng thế thật nha~. Việc cùng anh Soutetsu quyết định xem đặt bông hoa nào ở đâu, vui lắm luôn nha~」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ、そぎゃんならなによりねぇ」
1266 = "「Ư hư hư, vậy thì còn gì bằng nữa.」"
# monologue
# JP: にっこりわらって、れいなの頭を優しく撫でて。\n真闇姉は今度は僕へと視線を移す。
2022 = "Mỉm cười tươi rói, nhẹ nhàng xoa đầu Reina. Lần này, ánh mắt chị Mayami hướng về phía tôi."
# 【真闇】
# display as 真闇
# JP: 「きーちゃんはどぎゃん先生だったと？」
1421 = "「Thế bé Ki là một người giáo viên như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲は――茶道そのものから真っ直ぐに、礼儀作法、\n所作、茶器の扱い、手入れの大事さなどを教えてくれた」
1621 = "「Kisaki thì——dạy thẳng từ chính trà đạo, về lễ nghi, cốt cách, cách sử dụng trà cụ, và tầm quan trọng của việc bảo quản.」"
# 【れいな】
# display as 玲奈
# JP: 「あとあと、TPOのことと、家計管理と資産運用のことも、\nれいなたち、教えてもらっちゃいましたぁ」
1702 = "「Sau đó, sau đó, bọn em còn được dạy về TPO, cả việc quản lý tài chính và đầu tư tài sản nữa nha~」"
# 【真闇】
# display as 真闇
# JP: 「ありゃま。そりゃあいたれりつくせり」
1310 = "「Trời đất. Vậy là được chăm lo chu đáo từ A đến Z luôn rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ですねぇ。きさきさんもひびきさんも、\nれいなとそうてつさんに色んなこと教えてくれましたぁ」
1376 = "「Ư hư hư, đúng vậy nha~. Cả cô Kisaki và chị Hibiki, đều đã dạy cho Reina và anh Soutetsu rất nhiều điều nha~」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんはお料理を教えることだけ、\n集中すれば大丈夫そーね」
1711 = "「Thế thì, chị chỉ cần tập trung vào việc dạy nấu ăn thôi là được rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「あぅ」
1325 = "「A...」"
# monologue
# JP: 不意に、れいながしおれてしまう。
1976 = "Đột nhiên, Reina xìu xuống."
# 【真闇】
# display as 真闇
# JP: 「あらあられーちゃん、どぎゃんしたと？」
1306 = "「Ôi chà chà bé Rei, em sao thế?」"
# 【れいな】
# display as 玲奈
# JP: 「あの、それなんですけど、ええと――\nれいな、古いレイルロオドだから、その」
1690 = "「Dạ, chuyện đó thì, ừm—— Reina là một Railord đời cũ, nên là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「味覚センサが貧弱なのだ。\n熱い冷たい、甘い甘くない程度しかわからんらしい」
1392 = "「Cảm biến vị giác của em ấy khá kém. Có vẻ chỉ phân biệt được nóng lạnh, ngọt hay không ngọt thôi.」"
# 【真闇】
# display as 真闇
# JP: 「れーちゃんは、そこば不安なの？」
1462 = "「Bé Rei, em đang lo lắng về chuyện đó sao?」"
# monologue
# JP: こくり、れいなが小さく頷き、そのままうつむく。\n真闇姉はその頬を両手でふんわり包み込む。
1984 = "Reina khẽ gật đầu, rồi cứ thế cúi gầm mặt xuống. Chị Mayami dùng hai tay nhẹ nhàng ôm lấy đôi má em ấy."
# 【真闇】
# display as 真闇
# JP: 「へーきよへーき。ゆーたらはーちゃんだって、\nおんなじようなもんでしょお。ばってん」
1528 = "「Không sao đâu không sao đâu. Kể ra thì bé Ha cũng giống như vậy thôi mà. Nhưng mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1486 = "「À.」"
# monologue
# JP: 最近しばしば目にするようになった、\nハチロクの割烹着姿を思い出す。
1897 = "Tôi nhớ lại hình ảnh Hachiroku mặc tạp dề kappogi mà dạo gần đây thường xuyên nhìn thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば確かにだ。最近ハチロクが時折\n作る肉じゃがなど、あれは完全に右田の味だな」
1218 = "「Nghe chị nói mới thấy đúng thật. Món thịt hầm khoai tây mà dạo này thỉnh thoảng Hachiroku làm, hoàn toàn mang hương vị của nhà Migita.」"
# 【れいな】
# display as 玲奈
# JP: 「みぎたのあじ！」
1256 = "「Hương vị của nhà Migita!」"
# monologue
# JP: うつむいていたれいなの顔が跳ね上がる。\nその目にきらきら、やる気の光が輝いている。
1839 = "Khuôn mặt đang cúi gầm của Reina ngẩng phắt lên. Đôi mắt em ấy lấp lánh ánh sáng của sự quyết tâm."
# 【れいな】
# display as 玲奈
# JP: 「れいなも肉じゃが、みぎたの味、おぼえたいです！！」
1565 = "「Reina cũng muốn học cách làm món thịt hầm khoai tây mang hương vị nhà Migita!!」"
# 【真闇】
# display as 真闇
# JP: 「そ？　ほんなら肉じゃがから覚えていこぉね。\n大丈夫。大切なのは、計量と観察、それだけやけん」
1601 = "「Vậy sao? Thế thì chúng ta bắt đầu học từ món thịt hầm khoai tây nhé. Không sao đâu. Quan trọng nhất là đong đếm và quan sát, chỉ vậy thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　れいな、それならできそうです」
1515 = "「Vâng ạ! Nếu chỉ vậy thì Reina làm được nha~」"
# monologue
# JP: キビキビしている。\nこういうれいなも実にかわいい。
2025 = "Rất nhanh nhẹn, dứt khoát. Một Reina như thế này cũng thực sự rất đáng yêu."
# 【真闇】
# display as 真闇
# JP: 「れーちゃんは、包丁ばつこうたことって」
1580 = "「Bé Rei, em đã từng dùng dao bao giờ chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「ないですぅ。あぶないからって。\nれいなができるの、お紅茶をいれることくらいです」
1530 = "「Chưa ạ~. Vì mọi người bảo nguy hiểm. Việc Reina có thể làm, chỉ có mỗi pha hồng trà thôi nha~」"
# 【真闇】
# display as 真闇
# JP: 「そっか。じゃ、そこから。\nれーちゃん、こっち。ここにきて」
1699 = "「Vậy à. Thế thì chúng ta bắt đầu từ việc dùng dao nhé. Bé Rei, qua đây. Lại đây nào.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1482 = "「Vâng ạ~」"
# 【真闇】
# display as 真闇
# JP: 「そしたら、これね？　こん上に」
1557 = "「Tiếp theo, cái này nhé? Đứng lên đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あぁ……」
1322 = "「A……」"
# monologue
# JP: 踏み台だ。日々姫がちいさかったころを思い出す。\n日々姫は僕に見守られ、料理の練習をしたものだった。
1837 = "Là chiếc ghế đẩu. Tôi nhớ lại hồi Hibiki còn nhỏ. Hibiki cũng từng đứng trên đó tập nấu ăn dưới sự quan sát của tôi."
# monologue
# JP: （あのころの真闇姉には、そんな時間もそんな余裕も、\nまったくなかったのであろうが――）
2185 = "（Hồi đó chị Mayami hoàn toàn không có thời gian, cũng như tâm trí cho những việc như vậy——）"
# monologue
# JP: 踏み台の上のれいなを後ろから包み込み、\nゆっくりゆっくり丁寧に、包丁の扱いを教えていく。
1824 = "Chị Mayami vòng tay ôm lấy Reina đang đứng trên ghế đẩu từ phía sau, và chậm rãi, cẩn thận chỉ dạy em ấy cách dùng dao."
# monologue
# JP: （それでも、あの頃、ひとときだけでも。こんな時間を、\n小さな日々姫ともしも過ごせていたのなら……）
2172 = "（Dù vậy, giá như hồi đó, chỉ một chút thôi. Giá như chị ấy có thể dành những khoảng thời gian như thế này cùng Hibiki bé nhỏ……）"
# monologue
# JP: けれどそうした過去があるなら、れいなと僕の今は無い。\n考えても詮無きことだと、頭をふって切り替える。
2125 = "Nhưng nếu có một quá khứ như thế, thì sẽ không có hiện tại của tôi và Reina. Nghĩ cũng chẳng ích gì, tôi lắc đầu xua đi dòng suy nghĩ đó."
# 【真闇】
# display as 真闇
# JP: 「そ。左手はにゃんこの手にして」
1417 = "「Đúng rồi. Tay trái nắm lại giống bàn tay mèo nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「にゃんこの手！」
1668 = "「Bàn tay mèo!」"
# monologue
# JP: 言葉の響きが気に入ったのか、れいなの声の明るさが増す。\n僕のあえかな感傷も、綺麗に吹き飛ばしてくれるくらいに。
1818 = "Có vẻ thích thú với âm điệu của từ đó, giọng Reina trở nên vui tươi hơn. Đủ để thổi bay hoàn toàn chút cảm thương mỏng manh trong tôi."
# 【れいな】
# display as 玲奈
# JP: 「こうですねぇ。――うふふぅ、\nほんとににゃんこのおててみたいですぅ」
1511 = "「Thế này đúng không ạ~. ——Ư hư hư~, trông giống bàn tay mèo thật đó nha~」"
# 【真闇】
# display as 真闇
# JP: 「そそ。そしたらにゃんこの手のまま\n包丁の腹にかるぅく――うんうん、上手上手」
1535 = "「Đúng đúng. Rồi cứ giữ nguyên bàn tay mèo như vậy chạm nhẹ-ẹ vào sống dao——ừm ừm, giỏi lắm giỏi lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「にゃんこの、て――にゃんこの、て――\nにゃんこの、て――にゃんこの、て――」
1667 = "「Bàn tay, mèo——bàn tay, mèo—— bàn tay, mèo——bàn tay, mèo——」"
# monologue
# JP: とん、とん、と軽い包丁の音。\nリズミカルではないけど、丁寧で確実なものに聞こえる。
2104 = "Cộc, cộc, tiếng dao thái nhè nhẹ vang lên. Tuy không nhịp nhàng, nhưng nghe rất cẩn thận và chắc chắn."
# 【れいな】
# display as 玲奈
# JP: 「にゃんこの、て――なれて、きたけど――\nれいな、ちょっと――おっかない――ですぅ」
1666 = "「Bàn tay, mèo——quen, rồi, nhưng mà—— Reina, thấy hơi——sợ——nha~」"
# 【真闇】
# display as 真闇
# JP: 「よかとよ。それで」
1691 = "「Không sao đâu. Thế là tốt rồi.」"
# monologue
# JP: 真闇姉がれいなの耳元に口を寄せる。\nほんの少しだけくすぐったがり、すぐに安心の表情になる。
2010 = "Chị Mayami ghé sát miệng vào tai Reina. Em ấy thoáng nhột một chút, rồi lập tức lộ vẻ mặt an tâm."
# 【真闇】
# display as 真闇
# JP: 「おっかないのが大正解。包丁は危ないもんやけん。\nおねーちゃんも、いまでもおっかない思うとるから」
1651 = "「Thấy sợ là hoàn toàn chính xác. Dao là một vật rất nguy hiểm mà lị. Ngay cả chị bây giờ vẫn còn thấy sợ cơ mà.」"
# 【れいな】
# display as 玲奈
# JP: 「そうなんですねぇ」
1698 = "「Ra là vậy nha~」"
# monologue
# JP: ……真闇姉のひとことごとに、れいなの動きが、\nそして表情が柔らかくなる。さらには、僕のこころまで。
800 = "……Sau mỗi lời nói của chị Mayami, động tác và biểu cảm của Reina lại mềm mại hơn. Thậm chí cả trái tim tôi cũng vậy."
# monologue
# JP: （真闇姉は……こんなにも母性に溢れた人だったのか。\nいや、違う。元よりの母性を。ようやく今になって……）
2163 = "（Chị Mayami…… lại là một người tràn đầy tình mẫu tử đến thế sao. Không, không phải. Tình mẫu tử vốn có từ trước. Giờ đây cuối cùng cũng……）"
# monologue
# JP: 愛されている。つつまれている。僕もれいなも。\n右田の――いいや、関わってくれる人の全てに。
1891 = "Đang được yêu thương. Đang được bao bọc. Cả tôi và Reina. Bởi nhà Migita——không, bởi tất cả những người luôn quan tâm đến chúng tôi."
# monologue
# JP: （恩を――返していきたいな。\nれいなと二人で、ゆっくりとでも、少しずつでも）
2178 = "（Muốn——đền đáp ân tình này quá. Cùng với Reina, dù chậm rãi, dù chỉ từng chút một）"
# monologue
# JP: 僕の両手は、れいなだけしか守れない。\nそうとわかっているからこそ、思いはいっそう強くなる。
1901 = "Hai bàn tay tôi, chỉ có thể bảo vệ được mỗi Reina. Chính vì hiểu rõ điều đó, mong muốn ấy lại càng trở nên mạnh mẽ hơn."
# 【真闇】
# display as 真闇
# JP: 「――で。ダシばとれたらそん次は、\nこんレシピ通りにあわせ調味料ば用意しよーね」
808 = "「——Rồi. Sau khi ninh xong nước dùng dashi, chúng ta chuẩn bị gia vị hỗn hợp theo công thức này nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。おしょうゆが大さじにふたつ。\nお酒も大さじにふたつ。お砂糖も大さじふたつ。わ！」
1520 = "「Vâng ạ. Nước tương hai muỗng canh. Rượu cũng hai muỗng canh. Đường cũng hai muỗng canh. Oa!」"
# 【真闇】
# display as 真闇
# JP: 「そ。みりんもぜぇんぶおんなじ分量。\nとっても覚えやすいでしょお」
1416 = "「Đúng rồi. Rượu mirin cũng cùng một định lượng. Rất dễ nhớ đúng không nào.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ、れいないっぺんに覚えちゃいましたぁ」
1506 = "「Vâng ạ~, Reina nhớ được ngay luôn rồi nha~」"
# 【真闇】
# display as 真闇
# JP: 「そしたらぜぇんぶお鍋にいれて、落し蓋して。あとは\nぐつぐつ……そうね、今の季節なら25分でよかとね」
1558 = "「Vậy thì cho tất cả vào nồi, đậy nắp gỗ otoshibuta lại. Sau đó để lửa liu riu……ừm, với mùa này thì ninh 25 phút là được.」"
# 【れいな】
# display as 玲奈
# JP: 「季節でにこむ時間がかわるんですかぁ？」
1701 = "「Thời gian ninh thay đổi theo mùa sao ạ~?」"
# monologue
# JP: ふふっ、と小さな笑い声。\n大事な秘密を明かすが如くに、真闇姉の声が潜まる。
2018 = "Một tiếng cười khúc khích nhỏ vang lên. Như thể sắp tiết lộ một bí mật quan trọng, giọng chị Mayami trầm xuống."
# 【真闇】
# display as 真闇
# JP: 「あんね？　人間ば、汗をかくけん。\n汗をかいたら、塩分が流れ出ちゃうでしょお」
1638 = "「Thế này nhé? Con người thì sẽ đổ mồ hôi mà lị. Khi đổ mồ hôi, lượng muối trong cơ thể sẽ trôi ra ngoài đúng không.」"
# 【れいな】
# display as 玲奈
# JP: 「あああ！　鉱山のあじつけとおんなじですねぇ！！\n肉体労働のある日は汗をかくから、味を濃くするって」
1327 = "「Aaaa! Giống hệt cách nêm nếm ở khu mỏ nha~!! Những ngày lao động chân tay nhiều sẽ đổ mồ hôi, nên phải nêm đậm đà hơn.」"
# 【真闇】
# display as 真闇
# JP: 「そ、おんなじ。\nで、煮物で味を濃くするためには――」
1534 = "「Đúng rồi, giống nhau cả thôi. Vậy, để món ninh có vị đậm đà hơn thì——」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ！　煮込む時間を長くするんですねぇ」
1480 = "「Reina hiểu rồi nha~! Là phải kéo dài thời gian ninh đúng không ạ~」"
# 【真闇】
# display as 真闇
# JP: 「大正解！　――っと」
1655 = "「Hoàn toàn chính xác! ——Xong」"
# monologue
# JP: 鍋の火加減をとろとろにまで落とし込み、\n真闇姉はざっと蛇口の水で手をあらい、拭く。
1948 = "Vặn nhỏ lửa nồi ninh xuống mức liu riu, chị Mayami nhanh chóng rửa tay dưới vòi nước rồi lau khô."
# 【真闇】
# display as 真闇
# JP: 「煮込む間に……れーちゃん、はい、これ」
1670 = "「Trong lúc chờ ninh……bé Rei, đây, cái này.」"
# monologue
# JP: 大学ノートだ。\nとても綺麗に、色とりどりの付箋がはさみこまれている。
1941 = "Là một cuốn vở khổ lớn. Được kẹp những tờ giấy nhớ đủ màu sắc vô cùng gọn gàng."
# 【れいな】
# display as 玲奈
# JP: 「これ、なんですかかぁ？　……ん――わ！！\nわ！　ね、そうてつさん！　これ、見てください」
1693 = "「Đây là gì vậy ạ~? ……Ưm——Oa!! Oa! Nè, anh Soutetsu! Anh xem cái này đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？――っ！！！！！！」
1363 = "「Hửm?——っ!!!!!!」"
# monologue
# JP: 見た瞬間に、絶句する。\nこれは右田の――いや、真闇姉の味の、秘密の全てだ。
1880 = "Ngay khoảnh khắc nhìn thấy, tôi đã nghẹn lời. Đây là toàn bộ bí mật về hương vị của nhà Migita——không, của chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「レシピ帳……。\nれいなのために……ここまで、細かく」
1728 = "「Sổ công thức nấu ăn……. Dành cho Reina…… mà ghi chép tỉ mỉ đến mức này sao.」"
# monologue
# JP: 通常のレシピに加え、時間の目安が明記されてる。\n僕の、日々姫の、状態ごとに、こと細やかに分類された。
1944 = "Ngoài công thức thông thường, còn ghi rõ cả thời gian ước tính. Được phân loại chi tiết theo từng trạng thái của tôi, của Hibiki."
# 【れいな】
# display as 玲奈
# JP: 「……夏場で、しかも乗務のお仕事のあとは、\n塩そのものを増やすんですねぇ」
835 = "「……Vào mùa hè, mà lại còn sau khi làm việc trên tàu, thì phải tăng thêm lượng muối nha~」"
# 【真闇】
# display as 真闇
# JP: 「そこまでの汗なら、味を染み込ますだけじゃ足りんけん。\nばってん塩分過多は健康の大敵やけん。そん場合だけ」
1551 = "「Nếu đổ mồ hôi nhiều đến mức đó, thì chỉ ninh cho thấm vị thôi là không đủ. Nhưng ăn quá mặn lại là kẻ thù của sức khỏe. Nên chỉ áp dụng trong trường hợp đó thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知らなかった……塩分を増やす代わりに、味を濃くする、\n染みさせる……そのための工夫を、こんなにも――」
1456 = "「Anh không hề biết……Thay vì tăng lượng muối, chị lại làm cho vị đậm đà hơn, thấm hơn……Chị đã tốn bao nhiêu công sức để làm điều đó——」"
# monologue
# JP: 自然と、頭が下がっている。
1883 = "Tôi tự động cúi đầu xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、真闇姉。\n右田の味が最高なのには、こんな理由があったとは」
1660 = "「Cảm ơn chị, chị Mayami. Không ngờ hương vị tuyệt hảo của nhà Migita lại có lý do như vậy.」"
# 【真闇】
# display as 真闇
# JP: 「ううん。ぜぇんぜん。\nこぎゃんとは、最高でもなんでもなかと」
1215 = "「Không đâu. Hoàn toàn không. Ba cái thứ này, chẳng phải tuyệt hảo hay gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのような謙遜は」
1187 = "「Không, chị đừng khiêm tốn như vậy.」"
# 【真闇】
# display as 真闇
# JP: 「謙遜でもなか」
1450 = "「Chị cũng chẳng khiêm tốn đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわっ」
# 1274 = "「哇」" 
# monologue
# JP: 真闇姉が背中側かられいなをそっと抱きしめる。\n踏み台の上、れいなは少しとまどっている。
2007 = "Chị Mayami nhẹ nhàng ôm lấy Reina từ phía sau. Đứng trên chiếc ghế đẩu, Reina có chút bối rối."
# 【れいな】
# display as 玲奈
# JP: 「あの、まくらおねーちゃん？」
1607 = "「Dạ, chị Mayami?」"
# 【真闇】
# display as 真闇
# JP: 「あんね、れーちゃん」
1639 = "「Nghe này, bé Rei.」"
# monologue
# JP: れいなの耳元。真闇姉の声はほとんどささやきだ。\nけれどれいなは、一瞬にしてその表情を引き締める。
2006 = "Bên tai Reina. Giọng chị Mayami gần như chỉ là tiếng thì thầm. Nhưng Reina ngay lập tức lộ vẻ mặt nghiêm túc."
# 【れいな】
# display as 玲奈
# JP: 「はい」
# 1482 = "「是」" 
# monologue
# JP: 稀咲に教えられた顔。ものを教わるときの姿勢。\nれいな何かを感じ取り、学ぶことへと向き合っている。
2131 = "Khuôn mặt được Kisaki chỉ dạy. Tư thế khi được người khác chỉ bảo. Reina cảm nhận được điều gì đó, và đang tập trung vào việc học hỏi."
# 【真闇】
# display as 真闇
# JP: 「そーちゃんの最高の味は、ね？\nこの世でひとり、れーちゃんだけしか作れんの」
1424 = "「Hương vị tuyệt hảo nhất đối với Sou-chan ấy nhé? Trên thế gian này, chỉ có một mình bé Rei mới có thể làm được thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなだけにしか……」
1246 = "「Chỉ có mỗi Reina thôi sao……」"
# 【真闇】
# display as 真闇
# JP: 「そ。だってそーちゃん、我慢強い子やけんね。\nお顔も気持ちも、じょーずに隠してしまうけん」
1536 = "「Đúng vậy. Bởi vì Sou-chan là một đứa trẻ rất giỏi chịu đựng mà lị. Em ấy giấu giếm nét mặt và cảm xúc rất là giỏi.」"
# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1322 = "「啊……」" 
# monologue
# JP: そうっと、静かに、れいなが頷く。\nれいなの小さな後ろ頭に、真闇姉のおでこがくっつく。
1983 = "Reina khẽ gật đầu trong im lặng. Trán chị Mayami áp vào gáy nhỏ nhắn của Reina."
# 【真闇】
# display as 真闇
# JP: 「やけん、大事に見てあげて？　れーちゃんだけにしか\n見せんお顔を。そんでね？　そぎゃんときには」
1460 = "「Vì thế, hãy quan sát em ấy thật kỹ nhé? Những nét mặt mà em ấy chỉ cho mỗi bé Rei thấy. Và rồi nhé? Những lúc như vậy...」"
# 【れいな】
# display as 玲奈
# JP: 「れいな。ちゃあんと、そうてつさんに聞きますねぇ。\nお話聞いて、それでお味を、そうてつさんと作ります」
1573 = "「Reina. Sẽ hỏi anh Soutetsu thật cẩn thận nha~. Lắng nghe anh ấy, và cùng anh Soutetsu tạo ra hương vị đó.」"
# 【真闇】
# display as 真闇
# JP: 「！」
# 1732 = "「！」" 
# monologue
# JP: 少し驚いた顔をして、真闇姉がおでこを離す。\nれいなはくるりと振り向いて、真正面から視線をあわせる。
2016 = "Với vẻ mặt hơi ngạc nhiên, chị Mayami rời trán ra. Reina quay ngoắt lại, nhìn thẳng vào mắt chị ấy."
# 【れいな】
# display as 玲奈
# JP: 「おはなしきいて、一緒につくるともっと楽しいって。\nれいな、ひびきさんに教えてもらいましたからぁ」
1574 = "「Lắng nghe câu chuyện, và cùng nhau làm sẽ vui hơn rất nhiều. Reina đã được chị Hibiki dạy cho điều đó rồi nha~」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんに」
1232 = "「Bé Hi dạy sao.」"
# monologue
# JP: 泣き出すのか――と一瞬錯覚してしまったが、真闇姉は\n笑顔を浮かべている。晴れ晴れとした、綺麗な笑顔を。
1881 = "Sắp khóc sao——tôi thoáng có ảo giác như vậy, nhưng chị Mayami dang mỉm cười. Một nụ cười rạng rỡ và tuyệt đẹp."
# 【真闇】
# display as 真闇
# JP: 「そっか、おねえちゃんも教わっちゃった」
1234 = "「Vậy à, chị cũng được dạy cho một bài học rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「まくらおねーちゃんがですか？\nなにをですかぁ？」
1605 = "「Chị Mayami á?\nĐược dạy điều gì cơ ạ~?」"
# 【真闇】
# display as 真闇
# JP: 「そいば、ね？」
1689 = "「Chuyện đó thì, nhé?」"
# monologue
# JP: れいなの耳に、真闇姉が両手で作った筒をあてる。
2012 = "Chị Mayami khum hai bàn tay thành hình ống, áp vào tai Reina."
# 【真闇】
# display as 真闇
# JP: 「――――」
818 = "「――――」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1321 = "「唔」" 
# monologue
# JP: 真闇姉がなにか囁いた瞬間に、\nれいながうふふうと笑いを零す。
2017 = "Khoảnh khắc chị Mayami thì thầm điều gì đó, Reina bật cười khúc khích ư hư hư."
# 【れいな】
# display as 玲奈
# JP: 「そおなんですねぇ」
# 1698 = "「這樣啊」" 
# monologue
# JP: しあわせそうだ。れいなも、真闇も、ふたりとも。\n仲間はずれにされた気がして、少しさみしい。
1957 = "Trông họ thật hạnh phúc. Cả Reina, cả chị Mayami, cả hai người. Cảm giác như bị cho ra rìa, tôi thấy hơi chạnh lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、その――」
1583 = "「Reina, chuyện đó——」"
# monologue
# JP: 僕には聞かせたくなくて、耳打ちをしたのだろうと思う。\nけれども、やはり、もし叶うのなら――
2008 = "Tôi nghĩ chị ấy thì thầm vì không muốn cho tôi nghe thấy. Thế nhưng, quả nhiên, nếu có thể thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉もよければなのだが。どんな話を二人でしたのか、\n僕にも聞かせてはくれないか」
1405 = "「Nếu chị Mayami cũng không phiền. Hai người đã nói chuyện gì vậy, có thể cho anh nghe cùng được không.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
1263 = "「Ư hư hư~」"
# monologue
# JP: れいなが真闇姉をみる。\n笑顔の頷きが返される。
1978 = "Reina nhìn chị Mayami. Chị ấy mỉm cười gật đầu đáp lại."
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、そうてつさん。\nいま、れいながきいたことはですねぇ」
1709 = "「Chuyện là thế này nha~, anh Soutetsu. Điều mà Reina vừa nghe được ấy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。――っ！」
1339 = "「Ừm. ——っ!」"
# monologue
# JP: れいなが踏み台を駆け下り僕に抱きついてくる。\n受け止めたなら胸いっぱいにれいなの匂いと声が広がる。
1982 = "Reina nhảy phốc khỏi ghế đẩu, chạy đến ôm chầm lấy tôi. Khi tôi đón lấy em ấy, mùi hương và giọng nói của Reina lan tỏa khắp lồng ngực."
# 【れいな】
# display as 玲奈
# JP: 「な・い・しょ！　でぇす」
1220 = "「Bí·mật! Nhé~」"
