# 【真闇】
# display as 真闇
# JP: 「[りんどう,1]竜胆。嬉しか。れーちゃんにおねーちゃん。\nずいぶん綺麗に見えてとるとねぇ」
1730 = "「龍膽花啊，太棒了。小玲加上姐姐，看起來可真漂亮啊」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。きれいで、あったかで、やさしくて、\nだけどちょっぴりおっかないですぅ」
1496 = "「是的。漂亮、溫暖又溫柔，但又有點可怕」" 

# 【真闇】
# display as 真闇
# JP: 「あらあら、まっことよー見てくれとると。\nありがとね、れーちゃん」
1303 = "「哎呀呀，你觀察得可真仔細。謝謝你，小玲」" 

# 【れいな】
# display as 玲奈
# JP: 「わ」
# 1274 = "「哇」" 

# monologue
# JP: ぎゅっと優しく抱きしめられて、\n一瞬驚いたれいなの瞳がみるみる幸せに細まっていく。
1980 = "玲奈被緊緊抱在懷裡，雖然吃驚了片刻，但很快就幸福地眯起了眼睛。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\n喜んでもらえて、れいなもとーってもうれしいですよぉ」
1265 = "「呵呵，你開心玲奈也就開心了」" 

# monologue
