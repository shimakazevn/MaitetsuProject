1866 = "她們溫暖相擁了片刻，蹭了蹭臉頰，真闇姐才鬆開了玲奈，看著玲奈的眼睛。" 

# 【真闇】
# display as 真闇
# JP: 「ほんならひーちゃんは、\nれーちゃんにとって、よか先生だったと？」
1713 = "「那小日在你心目中是個好老師嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　おはな、そのままでも綺麗なのに、\n選んで考えて活けると、もーっと素敵になるって」
1533 = "「沒錯！花朵本來就很漂亮了，想不到還能挑選再插花，變得更加漂亮」" 

# 【双鉄】
# display as 雙鐵
