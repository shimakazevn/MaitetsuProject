1930 = "日日姬抓起剪刀和綠植——不是鮮花，而是一大堆綠葉。" 

# 【日々姫】
# display as 日日姬
# JP: 「華道には、他にもできることたーくさんあるの。\nもしよかったら」
1642 = "「花道還有更多能實現的事呢，有人想嘗試一下嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい！！！」
1525 = "「有！！！」" 

# monologue
# JP: れいなが元気に挙手をする。\n笑顔がくるり僕へむき、甘えた上目遣いにかわる。
