2104 = "菜刀落在案板上，傳來清脆的咚咚聲。聽起來雖然還不夠規律，但已經很穩健了。" 

# 【れいな】
# display as 玲奈
# JP: 「にゃんこの、て――なれて、きたけど――\nれいな、ちょっと――おっかない――ですぅ」
1666 = "「貓咪的手——習慣是習慣了——但是玲奈——還有點害怕——」" 

# 【真闇】
# display as 真闇
# JP: 「よかとよ。それで」
1691 = "「這就對了呀」" 

# monologue
