1218 = "「你說的沒錯。最近八六時常做的馬鈴薯燒肉已經跟右田家的味道一模一樣了」" 

# 【れいな】
# display as 玲奈
# JP: 「みぎたのあじ！」
1256 = "「右田家的味道！」" 

# monologue
# JP: うつむいていたれいなの顔が跳ね上がる。\nその目にきらきら、やる気の光が輝いている。
1839 = "原本低著頭的玲奈馬上精神滿滿地抬起了頭。她的眼神裡洋溢著充滿幹勁的光。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも肉じゃが、みぎたの味、おぼえたいです！！」
1565 = "「玲奈也想學馬鈴薯燒肉，想學會右田家的味道！！」" 

# 【真闇】
# display as 真闇
