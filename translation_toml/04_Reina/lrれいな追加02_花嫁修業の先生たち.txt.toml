2163 = "（原來……真闇姐是這樣充滿母愛的人啊。啊，不對，她本來就充滿母性，只是現在才爆發出來……）" 

# monologue
# JP: 愛されている。つつまれている。僕もれいなも。\n右田の――いいや、関わってくれる人の全てに。
1891 = "我和玲奈都被右田家的人——不對，應該說是被身邊所有人所喜愛和關懷著。" 

# monologue
# JP: （恩を――返していきたいな。\nれいなと二人で、ゆっくりとでも、少しずつでも）
2178 = "（真想有機會能報恩啊。哪怕是和玲奈一起慢慢地、一點一點地……）" 

# monologue
# JP: 僕の両手は、れいなだけしか守れない。\nそうとわかっているからこそ、思いはいっそう強くなる。
1901 = "我的雙手只能保護玲奈一個人。我明白這一點，所以對她的關愛也更深了。" 

# 【真闇】
# display as 真闇
# JP: 「――で。ダシばとれたらそん次は、\nこんレシピ通りにあわせ調味料ば用意しよーね」
808 = "「——在煮出湯汁之後，就遵照菜譜的指示準備調料吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。おしょうゆが大さじにふたつ。\nお酒も大さじにふたつ。お砂糖も大さじふたつ。わ！」
1520 = "「是，醬油兩大勺，酒兩大勺，糖兩大勺，哇！」" 

# 【真闇】
# display as 真闇
# JP: 「そ。みりんもぜぇんぶおんなじ分量。\nとっても覚えやすいでしょお」
1416 = "「對了，味醂也一樣，都是一樣的分量。很好記吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ、れいないっぺんに覚えちゃいましたぁ」
1506 = "「是的，玲奈一下就記住了」" 

# 【真闇】
# display as 真闇
# JP: 「そしたらぜぇんぶお鍋にいれて、落し蓋して。あとは\nぐつぐつ……そうね、今の季節なら25分でよかとね」
1558 = "「然後把所有東西放進鍋裡，蓋上蓋子。之後就是燉煮……我想這個季節煮25分鐘就夠了」" 

# 【れいな】
# display as 玲奈
# JP: 「季節でにこむ時間がかわるんですかぁ？」
1701 = "「通過季節就能知道燉煮的時間嗎？」" 

# monologue
# JP: ふふっ、と小さな笑い声。\n大事な秘密を明かすが如くに、真闇姉の声が潜まる。
2018 = "真闇姐輕輕笑了。彷彿在揭開重大秘密一般，真闇姐壓低了聲線。" 

# 【真闇】
# display as 真闇
# JP: 「あんね？　人間ば、汗をかくけん。\n汗をかいたら、塩分が流れ出ちゃうでしょお」
1638 = "「聽好囉，人類是會流汗的。流汗就會分泌出鹽分」" 

# 【れいな】
# display as 玲奈
# JP: 「あああ！　鉱山のあじつけとおんなじですねぇ！！\n肉体労働のある日は汗をかくから、味を濃くするって」
1327 = "「啊啊！這和礦山的調味是同樣的道理！！體力勞動會流很多汗，所以飯菜的口味要重一點」" 

# 【真闇】
# display as 真闇
# JP: 「そ、おんなじ。\nで、煮物で味を濃くするためには――」
1534 = "「沒錯，一樣的。而燉煮想把口味做重一點的話……」" 

# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ！　煮込む時間を長くするんですねぇ」
1480 = "「明白了！就是延長燉煮的時間吧」" 

# 【真闇】
# display as 真闇
# JP: 「大正解！　――っと」
1655 = "「說得太對了！……那麼」" 

# monologue
# JP: 鍋の火加減をとろとろにまで落とし込み、\n真闇姉はざっと蛇口の水で手をあらい、拭く。
1948 = "減小火力，用小火保持住鍋內的沸騰後，真闇姐擰開水龍頭洗了洗手，然後擦乾。" 

# 【真闇】
# display as 真闇
# JP: 「煮込む間に……れーちゃん、はい、これ」
1670 = "「趁著燉的時間……小玲，拿著這個」" 

# monologue
# JP: 大学ノートだ。\nとても綺麗に、色とりどりの付箋がはさみこまれている。
1941 = "是大學筆記本。樣式很漂亮，還夾著五顏六色的便簽。" 

# 【れいな】
# display as 玲奈
# JP: 「これ、なんですかかぁ？　……ん――わ！！\nわ！　ね、そうてつさん！　これ、見てください」
1693 = "「這是什麼啊？……嗯……哇！！哇！看啊，雙鐵先生！你看看這個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？――っ！！！！！！」
1363 = "「嗯？……啊！！！！！！」" 

# monologue
# JP: 見た瞬間に、絶句する。\nこれは右田の――いや、真闇姉の味の、秘密の全てだ。
1880 = "我一眼就驚訝得說不出話來。這是右田家……不對，是真闇姐調味的全部秘密。" 

# 【双鉄】
# display as 雙鐵
# JP: 「レシピ帳……。\nれいなのために……ここまで、細かく」
1728 = "「食譜本……為了玲奈……做得這麼細嗎」" 

# monologue
# JP: 通常のレシピに加え、時間の目安が明記されてる。\n僕の、日々姫の、状態ごとに、こと細やかに分類された。
1944 = "比起普通的食譜，更標明了估測的用時。而且還對我的喜好、日日姬的喜好、不同狀態下的情況做了細緻的分類。" 

# 【れいな】
# display as 玲奈
# JP: 「……夏場で、しかも乗務のお仕事のあとは、\n塩そのものを増やすんですねぇ」
835 = "「……夏天乘務工作結束後的用餐，需要增加鹽的使用量啊」" 

# 【真闇】
# display as 真闇
# JP: 「そこまでの汗なら、味を染み込ますだけじゃ足りんけん。\nばってん塩分過多は健康の大敵やけん。そん場合だけ」
1551 = "「流了那麼多汗，偏淡的口味是不夠的。不過用鹽太多也對身體不好，所以增加鹽量只能在這種特殊情況下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知らなかった……塩分を増やす代わりに、味を濃くする、\n染みさせる……そのための工夫を、こんなにも――」
1456 = "「我都不知道……還有不增加鹽分而提味噌香的辦法……原來為了做菜要花這麼多工夫……」" 

# monologue
# JP: 自然と、頭が下がっている。
1883 = "我不禁鞠了一躬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、真闇姉。\n右田の味が最高なのには、こんな理由があったとは」
1660 = "「謝謝你，真闇姐。原來右田家的味道這麼棒，還有這樣的原因存在」" 

# 【真闇】
# display as 真闇
# JP: 「ううん。ぜぇんぜん。\nこぎゃんとは、最高でもなんでもなかと」
1215 = "「你可真是抬舉了。這樣可還算不上特別出色啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのような謙遜は」
1187 = "「不用這麼謙虛的」" 

# 【真闇】
# display as 真闇
# JP: 「謙遜でもなか」
1450 = "「我可不是謙虛」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわっ」
# 1274 = "「哇」" 

# monologue
# JP: 真闇姉が背中側かられいなをそっと抱きしめる。\n踏み台の上、れいなは少しとまどっている。
2007 = "真闇姐從背後抱起了玲奈。站在腳凳上的玲奈有些迷惑。" 

# 【れいな】
# display as 玲奈
# JP: 「あの、まくらおねーちゃん？」
1607 = "「真闇姐姐，怎麼了？」" 

# 【真闇】
# display as 真闇
# JP: 「あんね、れーちゃん」
1639 = "「聽我說，小玲」" 

# monologue
# JP: れいなの耳元。真闇姉の声はほとんどささやきだ。\nけれどれいなは、一瞬にしてその表情を引き締める。
2006 = "真闇姐在玲奈的耳邊竊竊私語，我看到玲奈一下子便聚精會神了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「はい」
# 1482 = "「是」" 

# monologue
# JP: 稀咲に教えられた顔。ものを教わるときの姿勢。\nれいな何かを感じ取り、学ぶことへと向き合っている。
2131 = "這是受稀咲指導時的表情，是學習的姿勢。這說明玲奈正在領悟著什麼。" 

# 【真闇】
# display as 真闇
# JP: 「そーちゃんの最高の味は、ね？\nこの世でひとり、れーちゃんだけしか作れんの」
1424 = "「小雙心目中最棒的味道，這下世上只有一個人能做出來了。那就是你，小玲」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなだけにしか……」
1246 = "「只有玲奈能做出來……」" 

# 【真闇】
# display as 真闇
# JP: 「そ。だってそーちゃん、我慢強い子やけんね。\nお顔も気持ちも、じょーずに隠してしまうけん」
1536 = "「沒錯，因為小雙是個很能忍的孩子，藏表情和心情都很熟練」" 

# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1322 = "「啊……」" 

# monologue
# JP: そうっと、静かに、れいなが頷く。\nれいなの小さな後ろ頭に、真闇姉のおでこがくっつく。
1983 = "玲奈輕輕地點了點頭。真闇姐的額頭貼在玲奈小小的後腦勺上。" 

# 【真闇】
# display as 真闇
# JP: 「やけん、大事に見てあげて？　れーちゃんだけにしか\n見せんお顔を。そんでね？　そぎゃんときには」
1460 = "「所以一定要看好了，他只會對你露出的表情。到了那個時候呢」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな。ちゃあんと、そうてつさんに聞きますねぇ。\nお話聞いて、それでお味を、そうてつさんと作ります」
1573 = "「玲奈會好好問雙鐵先生的。聽過他的話，再和他一起調味」" 

# 【真闇】
# display as 真闇
# JP: 「！」
# 1732 = "「！」" 

# monologue
# JP: 少し驚いた顔をして、真闇姉がおでこを離す。\nれいなはくるりと振り向いて、真正面から視線をあわせる。
2016 = "真闇姐移開額頭，神色有些驚異。玲奈扭過了頭，和真闇姐目光對視。" 

# 【れいな】
# display as 玲奈
# JP: 「おはなしきいて、一緒につくるともっと楽しいって。\nれいな、ひびきさんに教えてもらいましたからぁ」
1574 = "「玲奈聽日日姬小姐說過，問過對方之後再一起製作會更加有趣」" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんに」
1232 = "「原來是小日」" 

# monologue
# JP: 泣き出すのか――と一瞬錯覚してしまったが、真闇姉は\n笑顔を浮かべている。晴れ晴れとした、綺麗な笑顔を。
1881 = "我下意識以為她要哭出來了——但真闇姐卻笑了起來，笑得如沐春風。" 

# 【真闇】
# display as 真闇
# JP: 「そっか、おねえちゃんも教わっちゃった」
1234 = "「原來是這樣，姐姐我也學到了」" 

# 【れいな】
# display as 玲奈
# JP: 「まくらおねーちゃんがですか？\nなにをですかぁ？」
1605 = "「真闇姐姐嗎？學到了什麼呀？」" 

# 【真闇】
# display as 真闇
# JP: 「そいば、ね？」
1689 = "「這個啊……」" 

# monologue
# JP: れいなの耳に、真闇姉が両手で作った筒をあてる。
2012 = "真闇姐用手圍出了筒形，貼在了玲奈的耳邊。" 

# 【真闇】
# display as 真闇
# JP: 「――――」
818 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1321 = "「唔」" 

# monologue
# JP: 真闇姉がなにか囁いた瞬間に、\nれいながうふふうと笑いを零す。
2017 = "真闇姐輕聲耳語之後，玲奈便禁不住笑了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「そおなんですねぇ」
# 1698 = "「這樣啊」" 

# monologue
# JP: しあわせそうだ。れいなも、真闇も、ふたりとも。\n仲間はずれにされた気がして、少しさみしい。
1957 = "玲奈和真闇，兩個人看起來真幸福。我感覺自己成了孤單的人，有些落寞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、その――」
1583 = "「玲奈，請問……」" 

# monologue
# JP: 僕には聞かせたくなくて、耳打ちをしたのだろうと思う。\nけれども、やはり、もし叶うのなら――
2008 = "真闇姐是不想讓我聽到，才這樣悄悄說話的吧。但是如果可以的話……" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉もよければなのだが。どんな話を二人でしたのか、\n僕にも聞かせてはくれないか」
1405 = "「如果真闇姐不介意的話，能告訴我你們都說了什麼嗎」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
1263 = "「呵呵」" 

# monologue
# JP: れいなが真闇姉をみる。\n笑顔の頷きが返される。
1978 = "玲奈看了看真闇姐，真闇姐笑著點了點頭。" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、そうてつさん。\nいま、れいながきいたことはですねぇ」
1709 = "「那個，雙鐵先生，剛剛玲奈聽到的是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。――っ！」
1339 = "「嗯……啊！」" 

# monologue
# JP: れいなが踏み台を駆け下り僕に抱きついてくる。\n受け止めたなら胸いっぱいにれいなの匂いと声が広がる。
1982 = "玲奈跑下腳凳，抱住了我。她的香味和聲音迴盪在我的心中。" 

# 【れいな】
# display as 玲奈
# JP: 「な・い・しょ！　でぇす」
1220 = "「保密！」" 
