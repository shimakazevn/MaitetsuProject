# 【真闇】
# display as 真闇
# JP: 「おっかないのが大正解。包丁は危ないもんやけん。\nおねーちゃんも、いまでもおっかない思うとるから」
1651 = "「覺得害怕才對，因為菜刀是很危險的東西。姐姐我到現在還很怕菜刀呢」" 

# 【れいな】
# display as 玲奈
# JP: 「そうなんですねぇ」
1698 = "「這樣啊」" 

# monologue
# JP: ……真闇姉のひとことごとに、れいなの動きが、\nそして表情が柔らかくなる。さらには、僕のこころまで。
800 = "……真闇姐的每一句話，都讓玲奈的動作以及表情變得柔和。連我的心也平靜了下來。" 

# monologue
