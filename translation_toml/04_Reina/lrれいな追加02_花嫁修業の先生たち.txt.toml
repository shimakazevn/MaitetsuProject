# 【れいな】
# display as 玲奈
# JP: 「あー、ほんとですねぇ。どのおはなをどこに置くかとか、\nそうてつさんといっしょに決めるの、楽しいですねぇ」
1334 = "「啊，確實如此。和雙鐵先生一起決定插花擺在哪裡可真有趣」" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ、そぎゃんならなによりねぇ」
1266 = "「呵呵，那可真是太好了」" 

# monologue
# JP: にっこりわらって、れいなの頭を優しく撫でて。\n真闇姉は今度は僕へと視線を移す。
2022 = "真闇姐面帶笑意地撫摸著玲奈的腦袋，然後看向了我。" 

# 【真闇】
# display as 真闇
# JP: 「きーちゃんはどぎゃん先生だったと？」
1421 = "「小稀又教了你們什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲は――茶道そのものから真っ直ぐに、礼儀作法、\n所作、茶器の扱い、手入れの大事さなどを教えてくれた」
1621 = "「稀咲她從茶道入手，教會了我們禮儀舉止、如何對待茶具，以及保養的重要性等等知識」" 

# 【れいな】
# display as 玲奈
