# 【真闇】
# display as 真闇
# JP: 「そ、ひーちゃんがそぎゃんこつ」
1231 = "「原來小日教了你這個啊」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、そうなんですよぉ。\nですから、はぁい、おはな」
1367 = "「嘿嘿嘿，沒錯。看，就是這盆花」" 

# 【真闇】
# display as 真闇
# JP: 「あら、綺麗。こいば、おだいどこに？」
1308 = "「哎呀，真漂亮。你準備把它給誰？」" 

# 【れいな】
# display as 玲奈
# JP: 「まくらおねーちゃんにですぅ。れいな、おねーちゃんの\nことかんがえながら、おはなえらんで活けたんですよぉ」
1425 = "「就是給你的，真闇姐姐。玲奈就是腦海裡想著姐姐，一邊選花插花的」" 

# monologue
