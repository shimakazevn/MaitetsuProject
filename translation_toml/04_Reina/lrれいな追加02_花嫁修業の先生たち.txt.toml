1955 = "玲奈和日日姬這對姻親姐妹相視而笑。看來有鮮花陪伴的生活確實會很幸福。" 

# 【日々姫】
# display as 日日姬
# JP: 「で、ね？　れいなちゃん、にぃに」
1213 = "「你們知道嗎，玲奈、阿哥」" 

