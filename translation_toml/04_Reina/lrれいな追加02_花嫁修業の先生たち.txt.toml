1699 = "「這樣啊，那就先從用菜刀學起吧。小玲，過來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1482 = "「是」" 

# 【真闇】
# display as 真闇
# JP: 「そしたら、これね？　こん上に」
1557 = "「然後你看，你要踩在這上面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あぁ……」
1322 = "「啊……」" 

