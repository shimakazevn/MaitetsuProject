1702 = "「還有呢還有呢，還學會了如何合理穿戴打扮啊，以及家庭理財以及資產運用這方面的知識呢」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃま。そりゃあいたれりつくせり」
1310 = "「哎呀，那還真是傾囊相授」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ですねぇ。きさきさんもひびきさんも、\nれいなとそうてつさんに色んなこと教えてくれましたぁ」
1376 = "「嘿嘿，是啊。稀咲小姐和日日姬小姐都教了玲奈和雙鐵先生好多事情」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんはお料理を教えることだけ、\n集中すれば大丈夫そーね」
1711 = "「那姐姐我只要專注於教你們做飯就可以了」" 

# 【れいな】
# display as 玲奈
# JP: 「あぅ」
1325 = "「啊」" 

# monologue
# JP: 不意に、れいながしおれてしまう。
1976 = "玲奈的態度突然有些洩氣。" 

# 【真闇】
# display as 真闇
# JP: 「あらあられーちゃん、どぎゃんしたと？」
1306 = "「哎呀，小玲你是怎麼了？」" 

# 【れいな】
# display as 玲奈
# JP: 「あの、それなんですけど、ええと――\nれいな、古いレイルロオドだから、その」
1690 = "「這個，其實——玲奈是老款的鐵路人偶，所以……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「味覚センサが貧弱なのだ。\n熱い冷たい、甘い甘くない程度しかわからんらしい」
1392 = "「她的味覺感測器很弱，只能知道熱和冷、甜與不甜的差別」" 

# 【真闇】
# display as 真闇
# JP: 「れーちゃんは、そこば不安なの？」
1462 = "「所以小玲，你是擔心這一點嗎？」" 

