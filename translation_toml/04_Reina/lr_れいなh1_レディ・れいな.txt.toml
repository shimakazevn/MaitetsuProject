# JP: ごくっと唾液を飲む音がする。接している肌の熱さが増す。\n鏡にうつるれいなの肌が赤らみ、汗の粒が目立ちはじめる。
1689 = "我聽到吞嚥口水的聲音。皮膚相觸的地方更熱了。鏡子裡的玲奈肌膚開始發紅，汗珠也開始變得明顯。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなのかがみには、れいながそうてつさんに\nだっこされてて――れいな、れいなははだかんぼで」
1322 = "「在玲奈的鏡子裡，玲奈被雙鐵先生抱了起來，——玲奈、玲奈全身赤裸裸的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1288 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんの――そうてつさんの、あついのが――\nれいなのおまたに……きもちいいあなの入り口に――」
1427 = "「雙鐵先生的——雙鐵先生的，熱熱的——在玲奈的小穴上……那個舒服的洞的入口處——」" 

# monologue
# JP: れいなも言葉で興奮している。\n股間の蜜がぽたりと落ちる。腰が、もぞもぞ動いている。
