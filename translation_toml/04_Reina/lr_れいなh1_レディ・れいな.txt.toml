# JP: 「もっと、もっと強くしてほしい。僕はれいなで、\nれいなのお口で、まずは一回、思い切り射精したい」
1153 = "「再，再用力一點。我想在玲奈裡面，玲奈的嘴巴裡面，先盡情地射一次」" 

# 【れいな】
# display as 玲奈
# JP: 「んふふ～～」
1299 = "「嗯呼呼～～」" 

# monologue
# JP: にこおっと、満足そうな笑み。\nその笑顔のまま、れいなは口を大きく大きく大きくあけて
1620 = "她露出一個滿意的微笑。就這樣微笑著，玲奈張大了嘴——" 

# 【れいな】
# display as 玲奈
# JP: 「かぁぷっ」
1254 = "「啊嗚！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1281 = "「嗚！！！」" 

# monologue
# JP: 口の奥へと亀頭をあてて、勃起の根本を唇で綴じる。\nひとくちで、僕の勃起を可愛く丸呑みしてくれる。
1601 = "她將龜頭貼在喉嚨最深處，用嘴唇含住我勃起的根部。用整張嘴可愛地吞下我的勃起。" 

# 【れいな】
# display as 玲奈
# JP: 「んふふ～、ほれひゃあ、ひひはひゅひょ～」
1298 = "「嗯呼呼～類個，好大！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううっ」
1278 = "「嗚嗚」" 

# monologue
# JP: もごもごしゃべる。短い舌があたってくる。\nただそれだけで精液水位がぐぐとあがっ――っ！！！？
1597 = "她含著我說話。短短的舌頭碰到了我。光是這樣，我的精液就水漲船高，——嗚！！！？" 

# 【れいな】
# display as 玲奈
# JP: 「ずろぉっぉぉぉぉぉぉぉぉぉぉぉぉぉっ！！！」
1345 = "「我吸————————————————！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぉっ――ぁっ」
1285 = "「嗯——啊」" 

# monologue
# JP: 亀頭のくびれを唇がぷりゅんと撫でていく。\nれいなは大きく吸い込みながら、抜けるギリギリにまで
1609 = "她的嘴唇輕輕拂過龜頭的頸部。玲奈一邊用力吸著，一邊快要完全拔出勃起。" 

# 【れいな】
# display as 玲奈
# JP: 「ぶぢゅうううううううううっっっっっ――（こっ！）」
1319 = "「噗滋——————————」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁぁっ」
1252 = "「啊啊啊」" 

# monologue
# JP: ギリギリにまで引き絞られた唇が、再び一気に根本まで\n舌をレールに飲み込まれていく。喉の壁へと亀頭があたる。
1614 = "她緊緊的嘴唇再一次一口氣吞下了我，我的勃起以舌頭為軌道滑了進去。龜頭頂到了喉嚨的內壁。" 

# 【れいな】
# display as 玲奈
# JP: 「ずりゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっっ！！」
1344 = "「我吸————————————————！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はっ――ぁっ」
1228 = "「哈——啊」" 

# monologue
# JP: 今度は舌が立てられて、強く下から押し当てられる。\nスライドしていく僕の勃起を味わうように舐めほじり――
1789 = "這次舌頭豎了起來，用力地從下面壓迫著我。她不停地滑動舔舐著，彷彿在品嘗我的整個勃起——" 

# 【れいな】
# display as 玲奈
# JP: 「ぶっっぢゅろろろろろろろろろろろぉ――（こっ！）」
1318 = "「噗啾——舔舔舔————————————」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ」
# 1255 = "「啊！」" 

# monologue
# JP: そして全部を口内へ。気持ちいい気持ちいい気持ちいい。\nゆっくり大きなストロークの度、尻から背筋がぞわぞわと
1719 = "然後又整個吞入了她的嘴裡。好舒服好舒服好舒服。每次慢慢地巨大的往復，都讓我從下體開始，整個脊背感到不寒而慄。" 

# 【れいな】
# display as 玲奈
# JP: 「じゅぼっ！　ぼちゅっ！　じゅっ！　じゅろぉっ！\nれるっ――れりゅうっ！　ずっ！　ちゅばっ！　じゅぼ」
1266 = "「啾嗚噗啾！啾！刺溜！舔——舔舔！！　呲溜！！　啾啪！！　啾嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1283 = "「嗚！！！？」" 

# monologue
# JP: そこから一気に加速する！　僕のおねだりをきくために、\n頭をいっぱいに動かして、精液を絞りにきてくれる！
1720 = "然後她一口氣加速！為了滿足我的要求，她動用了全部智慧，來榨乾我的精液！" 

# 【れいな】
# display as 玲奈
# JP: 「ちゅぶっ！　ちゅぼっ！　ちゅぶっ！　ちゅずず～っ！\nずりゅっ！　ちゅむっ　れろおっ、じゅっ！　ちゅぶっ」
1271 = "「啾噗！啾啪！啾噗！啾啾～吸！！呲溜！！　啾啾、舔舔、啾！　啾噗！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな――れいな！　れいなっ、れいなっ」
1391 = "「玲奈——玲奈！玲奈、玲奈！」" 

# monologue
# JP: 気持ちよすぎて言葉が言葉にまとまらない。\n集中しようとする意思に、亀頭の先から吸い取られていく。
1657 = "我太舒服了，甚至說不出完整的話來。想要集中注意力的意志，從龜頭的尖端被她吸走了。" 

# 【れいな】
# display as 玲奈
# JP: 「ちゅむっ！　ちゅうっ！　ちゅっ、ちゅっ、ぺろっ、\nじゅぶっ！　じゅぼっ！　じゅっ！　じゅばっ！！」
1267 = "「啾嗚！啾！！啾、啾、舔、啾噗！　啾噗！　啾！　啾啪！！」" 

# monologue
# JP: 頭を前後してくれるたび、かわいいお耳がひこひこ動く。\nかわいいかわいい気持ちいい、脳がそれしか思えなくなる。
1708 = "每當她搖頭晃腦的時候，可愛的狗耳朵就會不停地動來動去。可愛、可愛、好舒服、大腦變得只能想這些事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れい、な――頼む。射精……する、からっ――\nもう、僕は――僕はほとんど、限界だから――」
1389 = "「玲、奈——求你了。我要……射，了——我已經——我快到，極限了——」" 

# 【れいな】
# display as 玲奈
# JP: 「じゅむっ！　じゅっ！　じゅばっ！　じゅぶっ！\nじゅぼっ！　ぐぽっ！　くぽっ！　ぶぢゅっ！！」
1268 = "「啾嗯！啾！啾啪！啾噗！啾噗！　噗滋！！　噗滋！　噗啾！！」" 

# monologue
# JP: ――それでもなんとか意識をまとめる、言葉をつむぐ。\nこんなに可愛い僕のれいなを、もっと侵食したいから。
899 = "——然後我勉強集中意識，努力組織著言語。因為我想更進一步地侵犯屬於我的這麼可愛的玲奈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「このまま、口で、射精、するから――ぜんぶ、全部を、のんで、くれっ――れいなの、舌から、食道から、腹っ」
1346 = "「我會，就這樣，射在，你的嘴裡——全部，嚥下去，吧——從你的舌頭，到食道，到肚子裡面！」" 

# monologue
# JP: 腸も、そうして排泄孔にいたるまで。\nれいなの全部を、僕の精液で染め尽くした――っ！？
1790 = "還有腸子，直到排泄孔。我想用我的精液染盡玲奈的一切——嗚！？" 

# 【れいな】
# display as 玲奈
# JP: 「ぶぢゅんっ！！！　――～～～～～～」
1163 = "「吸溜！！！——～～～～～～」" 

# monologue
# JP: 一番奥まで勃起を飲んで、れいなはそのまま、\n喉で、唇で何かをつむぐ。
1732 = "玲奈把我的勃起吞到最深處，然後直接用喉嚨、用嘴唇低語著什麼。" 

# monologue
# JP: （いいですよぉ）
1855 = "（可以喲）" 

# monologue
# JP: と、声にならぬ声が伝わってくる。\n勃起を、皮膚を、恥骨を通じて脳に、そうしてこころまで。
1713 = "無聲的聲音傳了過來。通過勃起，傳到皮膚，傳過恥骨，來到腦內，直達靈魂。" 

# 【れいな】
# display as 玲奈
# JP: 「じゅろおおおおおおおおおっっっっ！」
1162 = "「吸溜————————！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああああっ！」
1253 = "「啊啊啊啊啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「じゅぶっ！　ばちゅっ！　じゅっ！　ぼちゅっ！\nじゅるっ！　にゅぼっ！　ちゅぶっ！　ぢゅうっ！」
1270 = "「啾噗！啪啾！啾！噗啾！啾嚕！　嗯噗！　啾噗！　啾啾！」" 

# monologue
# JP: ならばもう、何をためらうこともない。\nれいなの舌に唇に、感覚すべてが惹きつけられる。
1704 = "既然如此，我就不必再猶豫了。玲奈的舌頭和嘴唇，讓我的一切感覺都被深深吸引。" 

# 【れいな】
# display as 玲奈
# JP: 「ぼっ！　ぢゅぼっ！　くぷっ！　ちゅぶっ！！\nじゅるっ！　ぢゅっ！　ばちゅっ！　ぢゅぷぅっ！！」
1260 = "「啪！啾噗！咕噗！啾噗！！啾嚕！　啾！　啪啾！　「啾噗！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――いくっ――れいな、れいなっっ」
1245 = "「啊——要來了——玲奈，玲奈！」" 

# monologue
# JP: 精液が一気に殺到しすぎて睾丸がキリキリ痛む。\n勃起は熱く唇に溶け、もはや快感さえもがしびれて――
1770 = "精液一口氣湧上來，使我的睪丸刺痛。勃起融化在熱烈的嘴唇上，連快感都麻木了——" 

# 【れいな】
# display as 玲奈
# JP: 「じゅっ！　ばちゅっ！　じゅぼっ！　ぬろおっ――。」
1272 = "「啾！啪啾！啾噗！呲溜——」" 

# monologue
# JP: 不意に、れいなが静止す――っ！！！
1761 = "突然，玲奈靜止了——嗚！！！" 

# 【れいな】
# display as 玲奈
# JP: 「ぢゅぶううううううううううううううう！！！！！」
1160 = "「吸溜————————————————！！！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁああああああああっっっ！！！！」
1301 = "「嗯啊————————！！！」" 

# monologue
# JP: （びゅくっ！　びゅっ！　びゅぶっ！　ぼびゅっ！！）
1852 = "（刺溜！刺溜！！刺溜！！噗！！）" 

# 【れいな】
# display as 玲奈
# JP: 「んうっ！？　ぷっ――んっ――んっ！――んうっ！！　\nこくっ――ごくっ――ごくっ――ごきゅっ！」
1310 = "「嗯嗚！？嗚——嗯——嗯！——嗯嗚！！咕咚——咕咚——咕咚——咕咚嗯！」" 

# monologue
# JP: （ぶびゅっ！　びゅるるっ！　びゅう！　ぼびゅっ！！）
1881 = "（噗滋！咻咻！！噗咻！噗咻！！）" 

# 【れいな】
# display as 玲奈
# JP: 「んくっ――んっ――ふっ――んくっ！！！」
1300 = "「嗯咕——嗯——呼——嗯咕！！」" 

# monologue
# JP: （びゅっ――ぶりゅっ――ぴゅっ――ぴゅううっ）
1864 = "（啾——噗溜——啾——啾啾）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ……あっ――」
1247 = "「啊……啊——」" 

# 【れいな】
# display as 玲奈
# JP: 「ずぢゅぅぅぅぅぅぅぅっっ！」
1161 = "「吸溜——————————！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っっ！！！」
1279 = "「嗚嗚！！！」" 

# monologue
# JP: （ぶびゅるっ！）
1878 = "（噗啾嚕嚕！）" 

# monologue
# JP: 射精を終えた。思った瞬間れいなに強く吸引されて、\nもうひとかたまりが尿道口から外に出る。
1625 = "射精結束了。就在這個瞬間，玲奈用力一吸，精液又從尿道口被榨了出來。" 

# 【れいな】
# display as 玲奈
# JP: 「んあーーーーーーーーー」
1302 = "「嗯啊——————」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1281 = "「嗚！！！」" 

# monologue
# JP: 僕の精液を散々呑み尽くした舌の上に、最後に絞った\nひとかたまりをれいなは乗せて、口を大きく開いてみせて
1730 = "玲奈大張開嘴，吐出吞噬了我不知多少精液的舌頭，給我看榨出來的最後那些精液。" 

# 【れいな】
# display as 玲奈
# JP: 「ごっきゅっ――ん………………ぷはぁ。\nえっへへ～！　れいな、たくさん飲んじゃいましたぁ」
1224 = "「咕嚕——嗯………………噗哈。哎嘿嘿～！　玲奈喝了好多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1433 = "「！！！！！！」" 

# 【れいな】
# display as 玲奈
# JP: 「きゃあん」
1170 = "「呀啊！」" 

# monologue
# JP: むしりとるように下着をぬがせて、\nちいさなれいなを持ち上げて――
1667 = "我扒下她的內衣，把小小的玲奈舉起來——" 

# 【れいな】
# display as 玲奈
# JP: 「ふぇっ！？　あの、そおてつさん……これじゃれいな、\nぎゅっーってするとこないですよぉ」
1236 = "「唔哎！？那個，雙鐵先生……像這樣子，玲奈，沒辦法抱緊緊哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1284 = "「嗯——」" 

# monologue
# JP: 勢いに任せてしまったが、抱えてる腕の負担も大きいし、\nキスすることさえ難しい。これは、いったん
1649 = "我一時衝動做出了這個動作，但是這個動作讓手臂承受著沉重的壓力，連接吻都很困難。我還是先……" 

# 【れいな】
# display as 玲奈
# JP: 「それに、それに……れいな、れいなぁ」
1417 = "「還有，還有……玲奈，玲奈……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1315 = "「嗯？」" 

# monologue
# JP: ひどく、れいながもじもじしている。恥じらい――と、\nれいなに似合わぬ言葉が浮かんでくるほどに。
1749 = "玲奈變得特別扭扭捏捏的。害羞——這個不適合玲奈的詞浮現在我的腦海裡。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな……ええと、鏡、鏡に、うつってて――\nその」
