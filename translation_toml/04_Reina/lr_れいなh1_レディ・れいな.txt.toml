# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1258 = "「啊！！！」" 

# monologue
# JP: 花の意匠が彫り込んである、小さくままごとのような鏡台。\n僕らの部屋のれいなの家具が、急に淫靡な色を帯びる。
1792 = "那是一面雕刻著花朵紋樣的鏡子，小小的，就像扮家家酒的道具。我們的房間裡，屬於玲奈的家具突然呈現出淫靡的色彩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな」
1398 = "「玲奈」" 

# monologue
# JP: （くちっ）
1857 = "（咕啾）" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃううううんっ！」
1174 = "「呀嗚嗚嗚嗚！」" 

# monologue
# JP: れいなの膣の入り口も、もうどろどろに蕩けている。\nそこに亀頭の先をくっつけ、ゆっくりゆっくり問いかける。
1746 = "玲奈的陰道入口也已經泥濘不堪。我把龜頭的尖端貼在那裡，慢慢地問道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「教えてほしい。\n鏡には、いま、どんな光景がうつってる？」
1186 = "「告訴我吧。現在鏡子照出的，是什麼樣的景象？」" 

# 【れいな】
# display as 玲奈
# JP: 「はうっ――かがみ――\nれいな、れいなのかがみには――」
1231 = "「哈嗚——鏡子裡——玲奈，玲奈在鏡子裡——」" 

