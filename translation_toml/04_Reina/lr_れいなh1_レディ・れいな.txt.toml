# lines: 328 
# 【れいな】
# display as 玲奈
# JP: 「わん！　わん！　――わんっ！！」
1383 = "「Gâu! Gâu! ——Gâu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1237 = "「Hửm?」"
# 【れいな】
# display as 玲奈
# JP: 「わんわん！　くーんくーん」
1379 = "「Gâu gâu! Ư ử~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお。とてもかわいらしい寝間着――\nいや、下着だな」
1273 = "「Ồ. Bộ đồ ngủ đáng yêu quá——\nÀ không, là đồ lót chứ.」"
# 【れいな】
# display as 玲奈
# JP: 「わん！」
1382 = "「Gâu!」"
# monologue
# JP: 一見するとふわふわの羊に思えてしまうが、\nはしゃいだ声が、僕を正解に導いてくれる。
1549 = "Thoạt nhìn cứ tưởng là một chú cừu bông mềm mại,\nnhưng giọng nói phấn khích đã dẫn tôi đến câu trả lời chính xác."
# 【双鉄】
# display as 雙鐵
# JP: 「小型犬か。\nポメラニアンとか、そういう犬種がモチーフなのだな？」
1370 = "「Là chó nhỏ à.\nLấy cảm hứng từ giống chó như Pomeranian nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「わん！！」
1384 = "「Gâu!!」"
# monologue
# JP: れいなはすっかりなりきっている。\nニコニコ笑顔で、今にもしっぽを振りそうなほどの勢いだ。
1756 = "Reina đã hoàn toàn nhập vai.\nVới nụ cười rạng rỡ, cô bé trông như sắp vẫy đuôi đến nơi rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――ならば、僕がご主人さまでよいのか？」
1234 = "「Hừm——Vậy thì, tôi làm chủ nhân có được không?」"
# 【れいな】
# display as 玲奈
# JP: 「わんわんっ！」
1377 = "「Gâu gâu!」"
# monologue
# JP: ごっこ遊びは嫌いではない。\nれいなの望みでもあるのなら、喜んでご一緒させてもらおう。
1650 = "Tôi không ghét trò chơi đóng vai.\nNếu đó là mong muốn của Reina, tôi rất sẵn lòng tham gia."
# 【双鉄】
# display as 雙鐵
# JP: 「おすわり」
1324 = "「Ngồi xuống.」"
# 【れいな】
# display as 玲奈
# JP: 「わん」
1376 = "「Gâu.」"
# monologue
# JP: れいながしゃがむ。敷き終わったばかりの布団の上に。\n瞬時に気づく。この下着、可愛いだけのものではないと。
1751 = "Reina ngồi xổm xuống. Ngay trên tấm nệm vừa mới trải xong.\nTôi lập tức nhận ra. Bộ đồ lót này không chỉ dễ thương thôi đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、お手、だ」
1407 = "「Reina, đưa tay đây.」"
# 【れいな】
# display as 玲奈
# JP: 「わん！　……きゅううん？」
1381 = "「Gâu! ……Ư ử?」"
# monologue
# JP: 手を出さずにお手を命じる。\nれいなは戸惑い、可愛く小首を傾げてみせる。
1683 = "Tôi ra lệnh đưa tay nhưng lại không chìa tay mình ra.\nReina bối rối, nghiêng đầu một cách đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「かしこいれいななら、わかるよな？」
1411 = "「Reina thông minh chắc chắn sẽ hiểu mà nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「ぁっ」
1248 = "「A.」"
# monologue
# JP: れいなの小さな鼻先にぐっと股間を近づける。
1670 = "Tôi áp sát đũng quần vào chóp mũi nhỏ nhắn của Reina."
# 【れいな】
# display as 玲奈
# JP: 「（くんくん――くんくん）……きゅぅぅぅん」
1436 = "「（Khịt khịt——khịt khịt）……Ư ử ử~」"
# monologue
# JP: もう完全に勃起しているズボンの下の肉の匂いを、\nれいなはひくひく鼻を動かし、愛おしそうに何度も嗅ぐ。
1688 = "Reina chun mũi, âu yếm ngửi đi ngửi lại mùi của phần thịt\nđã cương cứng hoàn toàn bên dưới lớp quần của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。お手、だ」
1397 = "「Reina. Đưa tay đây.」"
# 【れいな】
# display as 玲奈
# JP: 「わんっ！」
# 1382 = "「汪！」" 
# monologue
# JP: （ぽふっ）
1884 = "（Chạm）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1281 = "「Ư!!!」"
# monologue
# JP: 指を丸めた手がぎゅっと、強めのお手をしてくれる。\n僕の勃起をぎゅっと押し。そのままぽふぽふ刺激する。
1618 = "Bàn tay cuộn tròn những ngón tay lại, nắm lấy tôi thật chặt.\nÉp chặt lấy sự cương cứng của tôi. Cứ thế mà nắn bóp kích thích."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。――れいな」
1396 = "「Reina. ——Reina.」"
# monologue
# JP: ごっこ遊びを楽しみたい――そんな気持ちが一瞬にして、\n焦がされるほどの肉の欲望に流される。
1645 = "Muốn tận hưởng trò chơi đóng vai——cảm giác đó trong chớp mắt,\nđã bị cuốn trôi bởi dục vọng xác thịt cháy bỏng."
# 【双鉄】
# display as 雙鐵
# JP: 「ここから先はセックスだ。セックスならば子犬ではなく、\nれいなと、僕は、したいと望む」
1353 = "「Từ đây trở đi là làm tình rồi. Nếu là làm tình thì không phải với cún con,\nmà là với Reina, tôi muốn làm tình cùng em.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ！　えへっ――えへへぇ」
1214 = "「Oa! Hì hì——hì hì hì~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1280 = "「Ư!」"
# monologue
# JP: れいなの指が、嬉しげに、のの字のの字と動き始める。\n僕の勃起の、というか亀頭の直上で。
1740 = "Ngón tay Reina bắt đầu di chuyển vẽ những vòng tròn một cách đầy thích thú.\nNgay trên sự cương cứng, hay đúng hơn là ngay trên đỉnh quy đầu của tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいなも、れいなで、そうてつさんと。――せっくす。\nおくちせっくすも、おまたせっくすも、したいですぅ」
1400 = "「Reina cũng muốn, làm tình cùng với anh Soutetsu. ——Làm tình nha.\nBằng miệng, hay bằng chỗ đó, Reina đều muốn làm ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ」
1288 = "「A.」"
# monologue
# JP: おくちセックス。おまたセックス。\nなんと愛らしい言葉であろう。
1755 = "Làm tình bằng miệng. Làm tình bằng chỗ đó.\nThật là những từ ngữ đáng yêu làm sao."
# 【双鉄】
# display as 雙鐵
# JP: 「であらばれいな――\nまずは、おててセックスから願いたい」
1423 = "「Nếu vậy thì Reina——\nTrước tiên, tôi muốn nhờ em làm tình bằng tay.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。うふふぅ。\nれいな、おててせっくすもだいすきですよぉ」
1328 = "「Vâng ạ~. Ư phu phu~.\nReina cũng thích làm tình bằng tay lắm đó nha~」"
# monologue
# JP: （ちぃぃぃぃ）
1861 = "（Xoạch————）"
# monologue
# JP: 慣れた手付きでファスナーをおろし、\n下着の前を大きくあけて。
1604 = "Với đôi tay quen thuộc, em ấy kéo khóa quần xuống,\nvà mở toang phần trước của chiếc quần lót."
# 【れいな】
# display as 玲奈
# JP: 「こんにちわぁ」
1149 = "「Xin chào nha~」"
# monologue
# JP: ガチガチに反ってる勃起を、\nれいなの指が丁寧に、そうっとそうっと外へと導く。
1737 = "Sự cương cứng đang cong lên cứng ngắc,\nđược những ngón tay của Reina cẩn thận, nhẹ nhàng dẫn dắt ra bên ngoài."
# 【れいな】
# display as 玲奈
# JP: 「わぁあ！　とっても元気ですねぇ」
1226 = "「Oa! Cậu bé thật là sung sức quá đi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1275 = "「Ư——」"
# monologue
# JP: 真っ赤に膨れた亀頭の先をいいこいいことナデナデされる。\nただそれだけの刺激に僕は、震えてしまう。
1603 = "Đỉnh quy đầu sưng tấy đỏ lựng được vuốt ve cưng nựng.\nChỉ một chút kích thích đó thôi cũng đủ làm tôi run rẩy."
# 【れいな】
# display as 玲奈
# JP: 「あ！　そうてつさん、先っぽからよだれ垂らしてますぅ。\nんふふ～っ、がまんしきれないんですねぇ」
1257 = "「A! Anh Soutetsu, ở phần đỉnh đang chảy nước dãi kìa~.\nƯ phu phu~, anh không chịu nổi nữa rồi nhỉ~」"
# monologue
# JP: 僕の勃起を僕の名で呼び、れいなは短くまあるい指で、\n先走ってしまった雫をちゅるりと掬って。
1734 = "Reina gọi sự cương cứng bằng tên tôi, dùng những ngón tay ngắn tròn trĩnh của mình,\nmơn trớn vuốt lấy những giọt rỉ ra phía trước."
# monologue
# JP: （ぬとーーーーーーーーーーーーーーっっ）
1899 = "（Nhóp nhép——————————————）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――うっ」
1243 = "「A——ư」"
# 【れいな】
# display as 玲奈
# JP: 「とろーりとろーり、のばーしのばーし」
1428 = "「Nhớt nháp nhớt nháp, kéo sợi kéo sợi nào~」"
# monologue
# JP: お菓子作りでもしているような口調と思った瞬間気づく。\nいま僕は、まさにれいなに料理をされているのだ。
1611 = "Khoảnh khắc nghĩ rằng giọng điệu của em ấy giống như đang làm bánh, tôi chợt nhận ra.\nHiện tại, tôi chính xác đang bị Reina nhào nặn."
# 【れいな】
# display as 玲奈
# JP: 「たっぷりたっぷり――ぬらして――のばしてー……\nん……もーちょっとぬらしたいですねぇ――んーーーー」
1326 = "「Thật nhiều thật nhiều——làm ướt nào——kéo ra nào~……\nƯm…… muốn làm ướt thêm một chút nữa nha~——ưm~~~~」"
# monologue
# JP: てろおっとれいなの口から唾液。\n短い糸をつないだそれは、すぐに手のひらに絡み取られる。
1747 = "Nước bọt trào ra từ miệng Reina.\nNó nối thành một sợi tơ ngắn, rồi ngay lập tức bị cuốn lấy trong lòng bàn tay em ấy."
# monologue
# JP: （にゅるっん！　ぬとーーーーーーーーーーーっっ）
1898 = "（Trơn tuột! Nhóp nhép————————————）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
1255 = "「A!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。たっぷりぬれましたぁ。\nそうしたらぁ、お手々をきゅうくつな筒にして～」
1197 = "「Ư phu phu~. Ướt đẫm rồi nha~.\nVậy thì~, làm đôi tay thành một cái ống chật chội nào~」"
# monologue
# JP: （きゅうううっ）
1888 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1280 = "「嗚！」" 
# 【れいな】
# display as 玲奈
# JP: 「しーこ、しーこ、しーこ、しーこ」
1362 = "「Sục~ sục~, sục~ sục~」"
# monologue
# JP: いーち、にーい、さーん、しーい。\nゆっくり１０を数える速度の、ゆるぅい動き。
1541 = "Mộ~t, ha~i, b~a, bố~n.\nChuyển động nhẹ nhàng với tốc độ chậm rãi như đếm đến 10."
# 【れいな】
# display as 玲奈
# JP: 「しーこ、しーこ、しーこ、しーこ……\nえへへぇ。ね？　そうてつさん、どおですかぁ？」
1361 = "「Sục~ sục~, sục~ sục~……\nE he he~. Sao nào? Anh Soutetsu, cảm giác thế nào ạ~?」"
# monologue
# JP: はっきりわかる。伝わってくる。\nれいなはおねだりさせたがってる。甘えられたがってる。
1665 = "Tôi có thể hiểu rõ. Cảm nhận được điều đó.\nReina đang muốn tôi phải van xin. Muốn tôi làm nũng."
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちはいいが、ものたりなくある。もっと強く、\n僕はれいなに、僕の勃起を可愛がってもらいたい」
1339 = "「Cảm giác rất tuyệt, nhưng vẫn chưa đủ. Mạnh hơn nữa đi,\ntôi muốn Reina yêu chiều sự cương cứng của tôi.」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。\nそうしたら～、もーっとはやくしちゃいますねぇ」
1330 = "「Em hiểu rồi ạ~.\nVậy thì~, em sẽ làm nhanh hơ~n nữa nha~」"
# monologue
# JP: （しゅこっ！）
1901 = "（Phập!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1280 = "「嗚！」" 
# monologue
# JP: お試しのような一シゴキ。僕の反応に気を良くしたのか
1542 = "Một cú sục mang tính thăm dò. Phải chăng phản ứng của tôi đã làm em ấy thích thú,"
# 【れいな】
# display as 玲奈
# JP: 「しこしこしこしこ、しこしこしこしこ、\nくりくりー、くりくりー、しこしこしこしこ！」
1360 = "「Sục sục sục sục, sục sục sục sục,\nxoa xoa~, xoa xoa~, sục sục sục sục!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――あ――あっ」
905 = "「Ư——a——a」"
# 【れいな】
# display as 玲奈
# JP: 「しこしこしゅっしゅ、しこしこしこしこ、\nしゅっしゅ、くりくり、しこしこしゅっしゅ！」
1359 = "「Sục sục phụt phụt, sục sục sục sục,\nphụt phụt, xoa xoa, sục sục phụt phụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――気持ちいい……気持ちいい」
1244 = "「A——sướng quá…… sướng quá.」"
# 【れいな】
# display as 玲奈
# JP: 「双鉄さんのあっついのも、おんなじこといってますよぉ。\nおくちをぱくぱく、おからだぴくぴく、きもちいいって」
1426 = "「Cậu bé nóng hổi của anh Soutetsu cũng đang nói điều tương tự đó nha~.\nMiệng mở ra khép lại, cơ thể giật giật, nói là sướng lắm đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1276 = "「Ư.」"
# monologue
# JP: のんびりとした口調の下でも、れいなの手指は動き続ける。\n僕を知り尽くしている動きで、一番気持ちよくなる速度で。
1574 = "Mặc dù giọng điệu thong thả, những ngón tay của Reina vẫn tiếp tục chuyển động.\nBằng những động tác thấu hiểu tôi, với tốc độ mang lại khoái cảm tuyệt vời nhất."
# 【れいな】
# display as 玲奈
# JP: 「だかられいなぁ」
1352 = "「Vậy nên Reina à……」"
# monologue
# JP: ちろり、とれいなは舌を見せる。\nただそれだけで、期待に勃起が跳ねてしまう。
1728 = "Lè lưỡi một cái, Reina thè chiếc lưỡi ra.\nChỉ vậy thôi, sự cương cứng của tôi đã giật nảy lên trong mong đợi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんを、\nもっともーっときもちよくしてあげますねぇ」
1373 = "「Reina sẽ làm cho anh Soutetsu,\nsướng hơ~n, sướng hơ~n nữa nha~」"
# monologue
# JP: （ちゅっつ）
1875 = "（Chụt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1281 = "「嗚！！！」" 
# monologue
# JP: 亀頭の先にキスされる。\nそのままれいなは、唇の先で僕を優しくホールドし――
1598 = "Bị hôn lên đỉnh quy đầu.\nCứ thế, Reina dùng đôi môi nhẹ nhàng ngậm lấy tôi——"
# 【れいな】
# display as 玲奈
# JP: 「チュむっ――ちゅっ――ぺろっ――ちゅううっ――」
1261 = "「Chu mút——chụt——liếm——chụt chụt——」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――く」
1312 = "「Ưm——ư」"
# monologue
# JP: 尿道口を舐められる。そこから中に入れないかと伺う様に、\n熱くぬらつくれいなの舌が、幾度も幾度も割れ目をなぞる。
1616 = "Lỗ sáo bị liếm láp. Như thể đang thăm dò xem có thể đi vào trong từ đó không,\nchiếc lưỡi ướt át nóng hổi của Reina miết dọc theo khe hở hết lần này đến lần khác."
# 【れいな】
# display as 玲奈
# JP: 「あむっ――れるっ――ちゅるっ――ちゅっ――ちゅっ\n――ちゅむ。ん……今日はちょっとしょっぱいですねぇ」
