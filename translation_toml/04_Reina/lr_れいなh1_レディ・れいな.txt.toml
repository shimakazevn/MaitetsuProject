# JP: 「平気だ、れいな――\nコントロールは、僕が、する、からっ！」
1386 = "「沒關係，玲奈——我會幫你，控制，的！」" 

# 【れいな】
# display as 玲奈
# JP: 「そぉてつ、さん、が――あっ――こんと、ろーる――\nふ、あっ！　れいな――れいなの――おもらし、をっ」
1424 = "「雙鐵、先生、幫玲奈——啊——控、制——呼，啊！　玲奈——玲奈——尿尿」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからっ――れいなは、なにも気にせず、考えず。\nただ、きもちよく――一番気持ちよく、なれば、いい」
1348 = "「所以——玲奈，什麼都不用在乎，什麼都不用想。只要，舒服——變得，最舒服，就好」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなっ――いちばん――きもち――よくっ」
1404 = "「玲奈，——最——最舒服——」" 

# monologue
# JP: （ぐりゅっ！！！）
1914 = "（頂！！）" 

# 【れいな】
# display as 玲奈
# JP: 「んきゅんっ！！！」
1308 = "「嗯嗚！！！」" 

# monologue
# JP: （じゅぼっ！　ぼちゅっ！　ぢゅぶっ！　ばちゅっ！）
1880 = "（噗啾！噗啾！啾噗！！啪啾！）" 

# monologue
# JP: 加速する。れいなをイカせる、\n気持ちのよさで染め尽くすため、全身すべてを振り絞る。
1653 = "我加速了。為了讓玲奈高潮，讓她的全身染上快感，我用盡全身的力氣。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁああっ！　んっ！　れいなっ！　ふぁっ！　あっ！\nおなかっ！　おなかぁっ！　ぐって！　ふぁ、あんっ！」
1212 = "「呼啊啊！嗯！玲奈！呼啊！！啊！肚子！！　肚子裡面！！　被頂到了！　呼啊，啊嗯！」" 

# monologue
# JP: （じゅっ！　ぢゅばっ！　ばちゅっ！　ぢゅりゅ！）
1874 = "（啾！！啾啪！！啪啾！啾！）" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！　んっ！　きゅっ！　ふぁんっ！　も、もうっ、\nれいなっ！　れいな、おまたがっ！　いっぱい、でっ！」
1183 = "「呀！嗯！嗚！哈嗯！玲、玲奈、已經！　玲奈的、小穴！　滿滿的，了」" 

# monologue
# JP: （ばちゅっ！　ごりゅ！　じゅろろ～～！　ぐりゅっ！）
1863 = "（啪啾！咕嚕！啾溜溜！咕溜！）" 

# 【れいな】
# display as 玲奈
# JP: 「んっ！！！！！！」
1311 = "「嗯！！！！！！！！」" 

# monologue
# JP: 奥を突きすぐグリュリとコスれば、\nれいなは甘い、声にならない声をあげっ――
1690 = "我頂進裡面，用力摩擦她的陰道，玲奈發出了甜美的、混亂的呻吟——" 

# 【れいな】
# display as 玲奈
# JP: 「～～～～～～～～～～～～～～っ！！！！」
1440 = "「～～～～～～～～～～～～～～嗚！！！！」" 

# monologue
# JP: （きゅうううううううううっっっっ）
1906 = "（緊繃————————）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！」
1277 = "「嗚啊！」" 

# monologue
# JP: （びゅっ！　ぶりゅっ！　びゅぶっ！　ぶりゅっ！）
1872 = "（啾！噗溜！哈噗！！噗溜！）" 

# monologue
# JP: 精液が一気に飛び出していく。\n腰から下の全部が溶けてれいなの膣内へと注がれる。
1769 = "精液一口氣噴出來。我的腰部以下全部融化了，注入玲奈的陰道內。" 

# monologue
# JP: （びゅっ！　びりゅっ！　りゅっ！　びゅぶうっ！）
1873 = "（啾！噗溜！溜！！噗哧！）" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ！　あっ！　あっ――ああっ！！！」
1217 = "「呼啊！啊！啊，——啊！！」" 

# monologue
# JP: （ちょろっ）
1871 = "（啾溜）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1432 = "「！！！！」" 

# monologue
# JP: 射精している。\n射精しながらそれでもれいなの体の角度を合わせ
1682 = "我正在射精。在射精的同時，還調整了與玲奈的身體角度" 

# monologue
# JP: （ちょおおおおおおおおおおおおおおおおおおっっ）
1860 = "（哧溜溜——————————）" 

# monologue
# JP: 絶頂してか、ぼーっとしていたれいなの瞳が、\nパチパチまばたき、すぐに一点を凝視する。
1726 = "玲奈可能是高潮了吧，她發呆的眼睛眨了眨，然後凝視著一個地方。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁっ――れいな――やぁっ――れいな――\nおもらし――れいな、してる――みえてる、おもらし」
1208 = "「呼啊——玲奈——呀——玲奈————尿尿了——玲奈、尿尿了——看見了——尿尿」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――見事に鏡に写っているな」
1286 = "「嗯——被鏡子照得一清二楚」" 

# monologue
# JP: なんと優美なアーチだろうか。\nおもらしの虹の橋のたもとで、洗面器も綺麗な音を響かす。
1588 = "多麼優美的曲線啊。在尿出來的彩虹橋下，臉盆發出清脆的聲音。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな……れいな――あかちゃんみたい――ふっ――\nやぁぁ――れいな、はずかし――ですぅ」
1395 = "「玲奈……玲奈——像小寶寶一樣——呼——討厭——玲奈，好害羞——！」" 

# monologue
# JP: （ちょおおお……ちょろっ――ちょろっ…………ちょっ）
1876 = "（嘩嘩……嘩啦——嘩啦…………嘩啦啦）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん」
# 1288 = "「嗯」" 

# monologue
# JP: （くいっ）
1886 = "（抽出）" 

# 【れいな】
# display as 玲奈
# JP: 「ぴゃゃうっ！？」
1177 = "「呀嗚！？」" 

# monologue
# JP: （ぴゅっ！――…………）
1858 = "（咻！——…………）" 

# monologue
# JP: お腹を押しておもらしを全部絞り出させて。\nそうしてゆっくり――れいなの膣内から勃起を引き抜く。
1675 = "我按壓她的肚子，讓她尿出最後一滴。然後慢慢地——從玲奈的陰道內抽出勃起。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あ……あっ――ふぁあ」
1210 = "「呼啊……啊……啊——呼啊」" 

# monologue
# JP: ぼたりぼたりと、精液が膣から溢れ零れる。\nれいなはどこか熱を帯びた目で、鏡の中の自分に見入る。
1772 = "精液滴滴答答地從陰道裡溢出，滴下。玲奈用帶著一絲熱切的眼神注視著鏡中的自己。" 

# 【れいな】
# display as 玲奈
# JP: 「はうぅ～～……。\nれいな……れいなぁ」
1232 = "「哈嗚嗚～～……玲奈……玲奈啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恥ずかしくもないし、赤ちゃんでもない。\nれいなは立派な、大人のレディだ」
1144 = "「不用覺得羞恥，你也不是嬰兒。玲奈是一位成熟的淑女」" 

# monologue
# JP: その髪を撫で、キスをする。射精を終えれば腕に一気に\n疲労が来るが、あと1分はと必死に堪える。
1676 = "我撫摸她的頭髮，親吻她。結束射精之後，我的手臂一下子就感到疲勞，但是還可以拚命堅持一分鐘。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが証拠に、ほら」
1416 = "「這就是證據，你看」" 

# 【れいな】
# display as 玲奈
# JP: 「ふぇ？　わ！　――わぁああっ」
1199 = "「呼哎？哇！——哇啊啊」" 

# monologue
# JP: 二度の強烈な射精を終えて、\nけれども僕の勃起はすでに、完全に硬度を取り戻してる。
1586 = "在兩次猛烈的射精之後，我的勃起卻已經完全恢復了硬度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいながあまりに魅力的でかわいいゆえに、だ。\nだから、恥ずかしがる必要などは少しも」
1321 = "「因為玲奈太有魅力，而且很可愛。所以完全沒有必要感到害羞」" 

# 【れいな】
# display as 玲奈
# JP: 「それなら……それなら、ね？　そぉてつさぁん」
1421 = "「那麼……那麼，那就？雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1434 = "「！？」" 

# monologue
# JP: 生クリームを含むがごとくに、とろりとろける甘え声。\nなのに一瞬、背筋がギクリとしてしまう。
1607 = "她甜美的聲音，彷彿摻著鮮奶油一樣。但是，在那一瞬間，我的脊樑卻一陣發寒。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、もういっかい――えへへぇ。\n今とおんなじ格好で、おまたせっくす、したいですぅ」
1405 = "「玲奈，想再來一次——哎嘿嘿。想用跟剛才一樣的姿勢，用小穴，再做一次」" 

# monologue
# JP: 腕がぶるぶる震え始める。\n脳より先に筋肉が、とても無理だと体言してくる。
1698 = "手臂開始不斷顫抖。比大腦搶先一步，肌肉告訴我這實在是做不到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今と同じも悪くはないが、\nどうだろう。普通に、例えば正常位などで」
913 = "「……跟剛才一樣也不錯，不過換個體位怎麼樣。一般點的，比如說在男上位」" 

# 【れいな】
# display as 玲奈
# JP: 「でもでもぉ、このかっこうでせっくすするとぉ。\nれいな、えへへ――いっつもとちがうところにあたって」
1148 = "「但是但是，剛剛那個樣子做愛的時候。玲奈，哎嘿嘿——被頂到了跟平時不一樣的地方」" 

# monologue
# JP: （ぞくっ）
1902 = "（發寒）" 

# 【れいな】
# display as 玲奈
# JP: 「それをもーちょっとくりかえしたら、れいな、すごく。\nすっごくきもちよくなれそうな気がするんですよぉ」
1412 = "「要是能再來一次的話，玲奈，覺得。玲奈覺得一定會超級舒服的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………そうか」
909 = "「…………是嗎」" 

# monologue
# JP: ああ――そうだ。れいなはレディで。\nレディであると同時に深く……女であるのだ。
1584 = "嗯——是啊。玲奈是個淑女。既是淑女，同時又深刻地……是個女人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば！」
1422 = "「那麼！」" 

# monologue
# JP: （ぐいっ！）
1885 = "（抱起！）" 

# 【れいな】
# display as 玲奈
# JP: 「きゃあああ♪」
1169 = "「呀啊啊♪」" 

# monologue
# JP: そうして僕は、男であるゆえ。\n無論、れいなの望みを叶える。
1706 = "既然我是個男人。當然會實現玲奈的願望。" 
