[script]
# lines: 444 
# 【双鉄H】
# display as 雙鐵
# JP: 「……遅いな」
932 = "「……好慢啊」" 

# monologue
# JP: 不安が膨れて来てしまう。
1973 = "我感到越來越不安。" 

# monologue
# JP: 車輌譲渡を受けるため、矢幡でともに過ごした三日――\nれいなはどこか集中を欠き、そわそわしていた。
2077 = "為了接收車輛轉讓，我們在八幡一起度過了三天。玲奈一直集中不了精神，一副坐立不安的樣子。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……ポーレットは、\n原因も解決法もわかっていると言ってくれた――」
934 = "「……波萊特說了，她知道原因以及解決辦法」" 

# monologue
# JP: それを教えてもらうため、準備が必要とのことで。
2065 = "波萊特說在告訴我之前需要做一些準備。" 

# monologue
# JP: さっきからずっと待っているのだが……\nポーレットもれいなもなかなか姿を見せてくれない。
1969 = "我就一直在等她……但她們倆卻遲遲沒有現身。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「………………」
929 = "「……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしました」
1216 = "「久等了」" 

# 【れいな】
# display as 玲奈
# JP: 「おまたせしましたぁ、そうてつさん」
1218 = "「久等了，雙鐵先生」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「な」
1277 = "「咦」" 

# monologue
# JP: ……寝間着、ではなく、はっきり下着――に見えるのだが、\nあるいは、これが普段の格好なのだろうか。
918 = "……她們穿的明顯不是睡衣，而是內衣。或者說，她們平時就穿成這樣嗎。" 

# 【れいな】
# display as 玲奈
# JP: 「わ。ポーレットのいったとおりですぅ。\nそうてつさんも、すっごくソワソワしちゃったですねぇ」
1299 = "「哇，跟波萊特說的一樣。雙鐵先生也一副坐立不安的樣子」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぬ」
1271 = "「呃」" 

# monologue
# JP: れいなの言葉に、そうであったと思い出す。\nれいなのソワソワの原因は――ならば……
2125 = "玲奈的話讓我恍然大悟。看來她坐立不安的原因是……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「これ、なのか？　僕が感じてるこのソワソワに、\nれいなも、取りつかれてしまっていたのか？」
1248 = "「原來是這樣嗎？玲奈跟我感受到了同樣的不安？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。ふたりが感じているソワソワは、\n体と心が、一致してないことから来ている不安感です」
1447 = "「應該是的。你們兩位感受到的不安，是因為身體與心靈沒有協調」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「体と心が……」
1546 = "「身體與心靈……」" 

# monologue
# JP: 普段と違い、\nポーレットは確信と自信とに満ち溢れてる。
2206 = "與平時不同，波萊特的話語中洋溢著自信。" 

# monologue
# JP: ブラジャーの胸を堂々と張り、\n高らかな声で教えてくれる。
1871 = "她挺起自己穿著胸罩的胸膛，高聲告訴我其中的緣由。" 

# 【ポーレット】
# display as 波萊特
# JP: 「日ノ本には、\n『心技体』っていう言葉がありますよね？」
1408 = "「在日本有一個詞，叫做“心技體”對吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、あるな。僕の好きな言葉だ」
1390 = "「嗯，沒錯。我很喜歡這個詞」" 

# 【ポーレット】
# display as 波萊特
# JP: 「心がこうと思ったとおりに、体が動くとは限らない。\n体がなにかを求めていても、心が気づけ無いこともある」
1545 = "「身體不一定能按照心中的意願活動。心靈也不一定能察覺到身體在渴求什麼」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。故に技を磨く。技により心身は合一をみて、\nそこに、心技体の三位一体が産まれ――ああ」
1388 = "「嗯，所以要磨練技藝，以此讓身心合一，最後就誕生了心技體的三位一體……原來如此」" 

# monologue
# JP: 理解を出来た、と不意に感じる。
1991 = "我突然感覺自己明白了。" 

# monologue
# JP: “体”を意識してみれば、\nソワソワの原因がそこだとわかる。
1845 = "只要用心去感受自己的“身體”，坐立不安的原因就會水落石出。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「体の声を、僕はきちんと聞けてないのか」
1405 = "「因為我沒有仔細聆聽自己身體的聲音」" 

# 【れいな】
# display as 玲奈
# JP: 「そおなんです！　れいなも、シーリングが解けた意味。\nちゃあんとわかってなかったんです」
1473 = "「沒錯！玲奈也一樣，沒有理解開啟封印的意義」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか。僕らは、同じなのだな」
1554 = "「這樣啊，我們都一樣」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1469 = "「是的」" 

# monologue
# JP: れいなの“シーリング”なるものが、\nいったい何であるのかは、矢幡の夜でもわからなかった。
2113 = "玲奈的“封印”究竟為何物，在八幡過夜時仍未能揭曉。" 

# monologue
# JP: けれど今、れいなはそれを知ったらしい。\n見るからにもう、嬉しさが全身に満ち満ちている。
1793 = "但玲奈現在似乎已經明白了。看得出她整個人都充滿了喜悅。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならばポーレット。どうか僕にも教えて欲しい。\nどうすれば体の声を聞けるかを」
1481 = "「波萊特，也告訴我吧。怎麼樣才能聽見身體的聲音」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1324 = "「啊……」" 

# monologue
# JP: 何故か、ポーレットは赤くなる。\n小さく息を飲み込んで、決意したように強く頷く。
2063 = "波萊特莫名地臉紅起來。她稍稍吸了口氣，下定決心用力點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ええと……わたしで、よければ。\nそれで――ふたりが、イヤでなければ」
1421 = "「好的。呃……我來告訴你們。只要……你們兩個願意的話」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットのことをイヤになるなんて、\nれいな、ぜったいにないですよぉ」
1502 = "「玲奈怎麼可能不願意呢，絕對不會的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕も同じだ。ポーレットのことは尊敬してるし、\n信頼している」
1451 = "「我也是。我很尊敬你、信賴你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。なら――\nれいな、こっちにきて？」
1416 = "「好吧。那麼……玲奈，過來一下」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1412 = "「好」" 

# monologue
# JP: れいなはポーレットの隣にならび、\nふたりそろってしゃがみ込む。
2136 = "玲奈站到波萊特身邊，然後兩人一起蹲了下來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、ですね？　双鉄くんは――」
1487 = "「然後呢，雙鐵君就……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「脱いだ――が」
1455 = "「我已經脫了……」" 

# monologue
# JP: パンツ一枚。\nただそれだけの布切れを、頼みの綱と感じてる。
2003 = "我身上只剩一條內褲。這塊布片彷彿就是我最後的防線。" 

# monologue
# JP: ほとんど全裸の僕の股間のすぐ前に、\nほとんど全裸のれいなとポーレットとが顔を並べてる。
1984 = "我的胯下近乎全裸，而同樣近乎全裸的玲奈和波萊特把臉湊在了一起。" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ。すごいですぅ。\nポーレットに聞いてたとおりですぅ」
1297 = "「哇，好厲害。跟波萊特說的一樣」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1346 = "「啊！」" 

# monologue
# JP: あどけない声。無垢な眼差し。
2174 = "純真的聲音，無瑕的眼神。" 

# monologue
# JP: 僕の股間に、それがまっすぐ向けられている。\n……体の声が何であるのか、否が応でも思い知る。
1773 = "二者都直直指向我的胯下。……這讓我不由得明白了身體究竟想要什麼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「心の底から相手のことを好きになると、\n女の子も男の子も、体でも相手を求めるの」
1508 = "「發自心底喜歡對方的話，身體也會渴求對方。男生女生都是一樣的」" 

# monologue
# JP: ポーレットの視線も声も、おまけに手までも同様だ。
2062 = "波萊特的視線、聲音以及手勢都指向同一個部位。" 

# monologue
# JP: 僕の股間のこわばりを――\nすなわち勃起を、指差し示す。
1997 = "我胯下僵硬的物體——也就是我的肉棒。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなの、シーリング開封とおんなじなんですねぇ」
1433 = "「就和玲奈開啟封印一樣呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな。開封された場所……膣、に――\nこれ。双鉄くんの、大きく、固くなってるおちんちんを」
1464 = "「是啊，玲奈。要把雙鐵君變大、變硬的肉棒，放進你開啟的地方——小穴」" 

# 【れいな】
# display as 玲奈
# JP: 「こんなにモコォってふくらんでるのは、\n大きく、固くなってるからなんですねぇ」
1571 = "「鼓得這麼大，就是因為肉棒變大變硬了呀」" 

# monologue
# JP: れいなの声が、パンツの布をわずかに震わす。\nただそれだけで、勃起はビクリと動いてしまう。
1810 = "內褲的布料隨著玲奈的聲音輕輕顫抖。僅是如此就讓肉棒跳動起來。" 

# monologue
# JP: 刺激に高まる欲望が、照れる気持ちを押し流す。\n“触れて欲しい”と。ただそれだけでいっぱいになる。
1857 = "因刺激而高漲起來的欲望沖走了我的羞澀。心中只剩下一個念頭——希望她能真正觸碰我。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいなですねぇ、\nそうてつさんのパンツの中を見てみたいですぅ」
1566 = "「雙鐵先生。玲奈想看看你內褲的裡面」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――好きに見てくれ。\n僕も、れいなに見て欲しい」
1397 = "「嗯，隨你喜歡。我也想讓你看看」" 

# monologue
# JP: 言いつつ、パンツに指をかけ――
2005 = "我邊說邊把手搭在內褲上——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ストップ！　双鉄くん。旦那さんのパンツを脱がす――\nそれって、奥さんの仕事です」
1238 = "「停！雙鐵君。脫丈夫的內褲，可是屬於妻子的工作」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む――そうなのか？」
1270 = "「呃……是嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はわわ。それじゃ、れいなが――\n双鉄さんのパンツ、ぬがせてあげるんですねぇ」
1329 = "「啊哇哇……那玲奈來幫雙鐵先生脫內褲」" 

# monologue
# JP: きらきらと無垢な輝きが、れいなの瞳を綺麗に彩る。\n罪悪感と欲望が、入り混じりながら膨らんでいく。
2123 = "玲奈的眼瞳中流光溢彩，閃耀著純潔的光輝。罪惡感與欲望在我心中混合交織，逐漸膨脹。" 

# monologue
# JP: 短い指が、わくわくと――\n僕の腰へと伸びてくる。
1887 = "她短短的手指戰戰兢兢地……伸向了我的腰部。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいな、奥さんですから、\nパンツをぬがせてあげますねぇ」
1567 = "「雙鐵先生。玲奈是你的妻子，所以來幫你脫內褲哦」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。頼む」
1399 = "「嗯，麻煩你了」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　よいしょ、よいしょっ」
1221 = "「交給我吧！嘿咻、嘿咻」" 

# monologue
# JP: パンツにいったん触れてしまえば、\nれいなの手つきは、慎重になる。
2121 = "玲奈的手碰到內褲以後，動作變得小心翼翼起來。" 

# monologue
# JP: 破れやすい紙でも取り扱っているかのように、\nゆっくりもゆっくり丁寧に、僕のパンツをズリ下げて――
1908 = "就像對待一張脆弱易破的紙一樣，緩慢而小心地拉下我的內褲……" 

# monologue
# JP: （ぶんっ！！！）
2357 = "（彈出！！！）" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃわっ！！？」
1293 = "「哇！！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ……\nこれが――男の子の――双鉄くん、の」
1288 = "「哇……這就是男生的……雙鐵君的……」" 

# monologue
# JP: 誰かが、ごくりと生唾を飲む。\nこれほどまで――とは、僕自身さえ思ってなかった。
1995 = "我聽到咽口水的聲音。連我自己都沒想到會變得這麼大。" 

# monologue
# JP: 勃起は完全にそり返り、仲良く並んだふたりの顔の、\nその中間に、柱のごとくにそびえてしまう。
2186 = "肉棒已經硬到高高翹起，矗立在她們倆和諧地湊在一起的臉龐之間。" 

# 【れいな】
# display as 玲奈
# JP: 「ふわぁ……お風呂で見るときと、全然違う形ですぅ。\nほんとに、すっごく大きくなってるんですねぇ」
1286 = "「哇……跟洗澡的時候見到的形狀完全不一樣。真的變得好大呀」" 

# monologue
# JP: （さわっ）
2363 = "（撫摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 

# monologue
# JP: 予告も無しに、無造作に、れいなの指先が勃起にふれて、\nけれどもすぐに離れてしまう。
2109 = "玲奈毫無預兆地隨手用指尖摸了摸肉棒，但馬上又把手移開。" 

# monologue
# JP: はわぁ、と感心したような息。\nれいなの声に、聞いたことの無い艶が混じり始める。
2083 = "然後她感慨頗多地叫了一聲。她的聲音裡染上了我從未聽過的嬌艷。" 

# 【れいな】
# display as 玲奈
# JP: 「それに……すっごく、固いですぅ……\nそうてつさんの……これ……なんか……なんだか――」
1516 = "「而且……好硬啊……雙鐵先生的這個……感覺……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいな。それが勃起。勃起しているおちんちん。\n男の子の、セックスのための準備が始まった状態」
1506 = "「玲奈，這就是肉棒，勃起的肉棒。這個狀態說明男生已經開始準備做愛了」" 

# 【れいな】
# display as 玲奈
# JP: 「セックスのための、準備……\nれいなのシーリングと、おんなじに」
1483 = "「準備做愛……和玲奈的封印一樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。れいなのおまんこ――シーリングが開封された\nところに、双鉄くんの勃起が、入る」
1468 = "「是啊，雙鐵君的肉棒要放進你的小穴——解開封印的地方」" 

# 【双鉄H】
# display as 雙鐵
# JP: （ああ――）
2316 = "（原來如此）" 

# monologue
# JP: ようやく、今さら理解する。\nシーリング開封とはつまり、性的機能の解放なのだと。
1993 = "我終於明白了。開啟封印就意味著開放性功能。" 

# 【双鉄H】
# display as 雙鐵
# JP: （れいなは、僕を求めてくれて……\nその想いが、シーリングを解いてくれたのか）
2366 = "（玲奈渴求著我……這份感情推動她解除了封印嗎）" 

# monologue
# JP: 体の欲が、心とつながる。\n自分の勃起が、正しい現象なのだとわかる。が――
2225 = "身體的欲望與心靈聯繫在了一起。我知道勃起是正常現象，但是……" 

# 【れいな】
# display as 玲奈
# JP: 「でもでも、ポーレット。こんなにおっきいの、\nれいなの中に、ほんとうに入るんですかぁ？」
1227 = "「但是，波萊特。這麼大的東西，真的能插進玲奈裡面嗎？」" 

# monologue
# JP: ――そう、それだ。\nそこのところを、強い不安と感じている。
2031 = "沒錯。我對這一點抱有強烈的不安。" 

# monologue
# JP: れいなの体は、とても小さい。\n無理すれば、壊してしまいかねないだろう。
2129 = "玲奈的身體極為嬌小。強行亂來也許會傷害到她。" 

# 【ポーレット】
# display as 波萊特
