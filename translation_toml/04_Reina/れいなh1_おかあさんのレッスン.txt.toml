[script]
# lines: 444 
# 【双鉄H】
# display as 雙鐵
# JP: 「……遅いな」
932 = "「……Lâu quá.」"
# monologue
# JP: 不安が膨れて来てしまう。
1973 = "Nỗi bất an cứ thế lớn dần."
# monologue
# JP: 車輌譲渡を受けるため、矢幡でともに過ごした三日――\nれいなはどこか集中を欠き、そわそわしていた。
2077 = "Ba ngày ở Yahata để nhận chuyển nhượng toa xe―― Reina có vẻ mất tập trung, cứ bồn chồn không yên."
# 【双鉄H】
# display as 雙鐵
# JP: 「……ポーレットは、\n原因も解決法もわかっていると言ってくれた――」
934 = "「……Paulette đã nói rằng, cô ấy biết nguyên nhân và cả cách giải quyết――」"
# monologue
# JP: それを教えてもらうため、準備が必要とのことで。
2065 = "Để được chỉ dạy điều đó, cần phải có sự chuẩn備."
# monologue
# JP: さっきからずっと待っているのだが……\nポーレットもれいなもなかなか姿を見せてくれない。
1969 = "Nãy giờ tôi vẫn đợi mãi mà…… Chẳng thấy Paulette hay Reina xuất hiện gì cả."
# 【双鉄H】
# display as 雙鐵
# JP: 「………………」
929 = "「………………」"
# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしました」
1216 = "「Xin lỗi vì đã để anh phải chờ.」"
# 【れいな】
# display as 玲奈
# JP: 「おまたせしましたぁ、そうてつさん」
1218 = "「Để anh chờ lâu rồi ạ~, anh Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「な」
1277 = "「Hả.」"
# monologue
# JP: ……寝間着、ではなく、はっきり下着――に見えるのだが、\nあるいは、これが普段の格好なのだろうか。
918 = "……Không phải đồ ngủ, mà rõ ràng là đồ lót――nhưng mà, hay đây là trang phục thường ngày của họ nhỉ."
# 【れいな】
# display as 玲奈
# JP: 「わ。ポーレットのいったとおりですぅ。\nそうてつさんも、すっごくソワソワしちゃったですねぇ」
1299 = "「Oa. Đúng như lời chị Paulette nói luôn ạ. Anh Soutetsu cũng đang bồn chồn lắm kìa~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぬ」
1271 = "「Ừm.」"
# monologue
# JP: れいなの言葉に、そうであったと思い出す。\nれいなのソワソワの原因は――ならば……
2125 = "Lời nói của Reina khiến tôi nhớ ra. Nguyên nhân sự bồn chồn của Reina là――nếu vậy thì……"
# 【双鉄H】
# display as 雙鐵
# JP: 「これ、なのか？　僕が感じてるこのソワソワに、\nれいなも、取りつかれてしまっていたのか？」
1248 = "「Là cái này sao? Sự bồn chồn mà tôi đang cảm thấy, Reina cũng bị nó ám ảnh sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。ふたりが感じているソワソワは、\n体と心が、一致してないことから来ている不安感です」
1447 = "「Tôi nghĩ là vậy. Sự bồn chồn mà hai người đang cảm thấy, là cảm giác bất an xuất phát từ việc cơ thể và tâm trí không đồng nhất.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「体と心が……」
1546 = "「Cơ thể và tâm trí……」"
# monologue
# JP: 普段と違い、\nポーレットは確信と自信とに満ち溢れてる。
2206 = "Khác với thường ngày, Paulette tràn đầy sự chắc chắn và tự tin."
# monologue
# JP: ブラジャーの胸を堂々と張り、\n高らかな声で教えてくれる。
1871 = "Cô ấy hiên ngang ưỡn bộ ngực mặc áo lót lên, và dõng dạc chỉ bảo cho tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「日ノ本には、\n『心技体』っていう言葉がありますよね？」
1408 = "「Ở Hinomoto, có một từ gọi là 『Tâm Kỹ Thể』 đúng không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、あるな。僕の好きな言葉だ」
1390 = "「À, có. Một từ mà tôi rất thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「心がこうと思ったとおりに、体が動くとは限らない。\n体がなにかを求めていても、心が気づけ無いこともある」
1545 = "「Không phải lúc nào cơ thể cũng cử động đúng như tâm trí mong muốn. Cũng có khi cơ thể đang khao khát điều gì đó, mà tâm trí lại không nhận ra.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。故に技を磨く。技により心身は合一をみて、\nそこに、心技体の三位一体が産まれ――ああ」
1388 = "「Ừm. Do đó mới phải mài giũa kỹ năng. Nhờ kỹ năng mà tâm thân hợp nhất, từ đó sinh ra sự đồng nhất của Tâm Kỹ Thể――à.」"
# monologue
# JP: 理解を出来た、と不意に感じる。
1991 = "Tôi chợt cảm thấy mình đã hiểu ra."
# monologue
# JP: “体”を意識してみれば、\nソワソワの原因がそこだとわかる。
1845 = "Nếu ý thức về \"cơ thể\", sẽ nhận ra nguyên nhân của sự bồn chồn nằm ở đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「体の声を、僕はきちんと聞けてないのか」
1405 = "「Tôi đã không lắng nghe tiếng nói của cơ thể mình một cách đàng hoàng sao.」"
# 【れいな】
# display as 玲奈
# JP: 「そおなんです！　れいなも、シーリングが解けた意味。\nちゃあんとわかってなかったんです」
1473 = "「Đúng vậy đó ạ! Reina cũng thế, ý nghĩa của việc phong ấn được giải trừ. Reina đã không hiểu rõ ràng ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか。僕らは、同じなのだな」
1554 = "「Vậy sao. Chúng ta, giống nhau nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1469 = "「Vâng ạ.」"
# monologue
# JP: れいなの“シーリング”なるものが、\nいったい何であるのかは、矢幡の夜でもわからなかった。
2113 = "Cái gọi là \"phong ấn\" của Reina, rốt cuộc là gì, trong đêm ở Yahata tôi vẫn chưa thể hiểu được."
# monologue
# JP: けれど今、れいなはそれを知ったらしい。\n見るからにもう、嬉しさが全身に満ち満ちている。
1793 = "Nhưng bây giờ, có vẻ Reina đã biết rồi. Nhìn là thấy ngay, niềm vui sướng đang tràn ngập khắp cơ thể em ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならばポーレット。どうか僕にも教えて欲しい。\nどうすれば体の声を聞けるかを」
1481 = "「Nếu vậy Paulette. Xin hãy chỉ cho tôi với. Làm thế nào để nghe được tiếng nói của cơ thể.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1324 = "「A……」"
# monologue
# JP: 何故か、ポーレットは赤くなる。\n小さく息を飲み込んで、決意したように強く頷く。
2063 = "Chẳng hiểu sao, Paulette lại đỏ mặt. Cô ấy khẽ nuốt nước bọt, rồi gật đầu mạnh mẽ như đã hạ quyết tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ええと……わたしで、よければ。\nそれで――ふたりが、イヤでなければ」
1421 = "「Vâng. Ừm thì…… nếu tôi được. Và――nếu hai người không thấy phiền.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットのことをイヤになるなんて、\nれいな、ぜったいにないですよぉ」
1502 = "「Thấy phiền chị Paulette thì, Reina tuyệt đối không bao giờ có chuyện đó đâu ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も同じだ。ポーレットのことは尊敬してるし、\n信頼している」
1451 = "「Tôi cũng vậy. Tôi rất tôn trọng Paulette, và tin tưởng cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。なら――\nれいな、こっちにきて？」
1416 = "「Tôi hiểu rồi. Vậy thì――\nReina, qua đây nào?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1412 = "「Vâng ạ.」"
# monologue
# JP: れいなはポーレットの隣にならび、\nふたりそろってしゃがみ込む。
2136 = "Reina đứng cạnh Paulette, rồi cả hai cùng ngồi xổm xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、ですね？　双鉄くんは――」
1487 = "「Sau đó, thì sao nhỉ? Anh Soutetsu thì――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「脱いだ――が」
1455 = "「Tôi cởi rồi――nhưng mà.」"
# monologue
# JP: パンツ一枚。\nただそれだけの布切れを、頼みの綱と感じてる。
2003 = "Chỉ còn mỗi chiếc quần lót. Chỉ một mảnh vải mỏng manh ấy, tôi lại cảm thấy như chiếc phao cứu sinh."
# monologue
# JP: ほとんど全裸の僕の股間のすぐ前に、\nほとんど全裸のれいなとポーレットとが顔を並べてる。
1984 = "Ngay trước hạ bộ gần như khỏa thân của tôi, Reina và Paulette cũng gần như khỏa thân đang kề mặt vào nhau."
# 【れいな】
# display as 玲奈
# JP: 「わぁ。すごいですぅ。\nポーレットに聞いてたとおりですぅ」
1297 = "「Oa. Tuyệt quá đi ạ. Đúng như lời chị Paulette nói luôn ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1346 = "「!」"
# monologue
# JP: あどけない声。無垢な眼差し。
2174 = "Giọng nói ngây thơ. Ánh mắt trong sáng."
# monologue
# JP: 僕の股間に、それがまっすぐ向けられている。\n……体の声が何であるのか、否が応でも思い知る。
1773 = "Những thứ đó đang hướng thẳng vào hạ bộ của tôi. ……Tiếng nói của cơ thể là gì, dù muốn hay không tôi cũng đã nhận ra."
# 【ポーレット】
# display as 波萊特
# JP: 「心の底から相手のことを好きになると、\n女の子も男の子も、体でも相手を求めるの」
1508 = "「Khi thích đối phương từ tận đáy lòng, dù là con gái hay con trai, cơ thể cũng sẽ khao khát đối phương.」"
# monologue
# JP: ポーレットの視線も声も、おまけに手までも同様だ。
2062 = "Ánh mắt, giọng nói, và cả bàn tay của Paulette cũng vậy."
# monologue
# JP: 僕の股間のこわばりを――\nすなわち勃起を、指差し示す。
1997 = "Cô ấy chỉ tay vào sự căng cứng nơi hạ bộ của tôi―― tức là sự cương cứng."
# 【れいな】
# display as 玲奈
# JP: 「れいなの、シーリング開封とおんなじなんですねぇ」
1433 = "「Giống hệt như lúc phong ấn của Reina được mở ra nhỉ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな。開封された場所……膣、に――\nこれ。双鉄くんの、大きく、固くなってるおちんちんを」
1464 = "「Đúng vậy, Reina. Nơi được mở ra…… âm đạo, và―― cái này. Dương vật đang lớn và cứng lên của anh Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「こんなにモコォってふくらんでるのは、\n大きく、固くなってるからなんですねぇ」
1571 = "「Nó phồng to lên thế này, là vì đang lớn và cứng lên nhỉ~」"
# monologue
# JP: れいなの声が、パンツの布をわずかに震わす。\nただそれだけで、勃起はビクリと動いてしまう。
1810 = "Giọng nói của Reina làm lớp vải quần lót khẽ rung lên. Chỉ vậy thôi cũng đủ khiến sự cương cứng giật nảy."
# monologue
# JP: 刺激に高まる欲望が、照れる気持ちを押し流す。\n“触れて欲しい”と。ただそれだけでいっぱいになる。
1857 = "Dục vọng dâng trào vì kích thích đã cuốn trôi đi sự ngại ngùng. \"Muốn được chạm vào\". Trong đầu tôi giờ chỉ tràn ngập suy nghĩ đó."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいなですねぇ、\nそうてつさんのパンツの中を見てみたいですぅ」
1566 = "「Anh Soutetsu. Reina ấy à, Reina muốn nhìn xem bên trong quần lót của anh Soutetsu thế nào ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――好きに見てくれ。\n僕も、れいなに見て欲しい」
1397 = "「À――em cứ nhìn thoải mái đi. Anh cũng muốn Reina nhìn thấy.」"
# monologue
# JP: 言いつつ、パンツに指をかけ――
2005 = "Vừa nói, tôi vừa móc ngón tay vào cạp quần――"
# 【ポーレット】
# display as 波萊特
# JP: 「ストップ！　双鉄くん。旦那さんのパンツを脱がす――\nそれって、奥さんの仕事です」
1238 = "「Dừng lại! Anh Soutetsu. Việc cởi quần lót cho chồng―― đó là công việc của người vợ mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む――そうなのか？」
1270 = "「Hửm――vậy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「はわわ。それじゃ、れいなが――\n双鉄さんのパンツ、ぬがせてあげるんですねぇ」
1329 = "「Hawaa. Vậy thì, Reina sẽ―― cởi quần lót cho anh Soutetsu nha~」"
# monologue
# JP: きらきらと無垢な輝きが、れいなの瞳を綺麗に彩る。\n罪悪感と欲望が、入り混じりながら膨らんでいく。
2123 = "Ánh sáng lấp lánh trong trẻo tô điểm tuyệt đẹp cho đôi mắt Reina. Cảm giác tội lỗi và dục vọng đan xen vào nhau, ngày một lớn dần."
# monologue
# JP: 短い指が、わくわくと――\n僕の腰へと伸びてくる。
1887 = "Những ngón tay ngắn ngủn, đầy vẻ háo hức―― vươn tới hông tôi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいな、奥さんですから、\nパンツをぬがせてあげますねぇ」
1567 = "「Anh Soutetsu. Reina là vợ mà, nên để Reina cởi quần lót cho anh nha~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。頼む」
1399 = "「Ừm. Nhờ em.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　よいしょ、よいしょっ」
1221 = "「Vâng ạ! Dô ta, dô ta.」"
# monologue
# JP: パンツにいったん触れてしまえば、\nれいなの手つきは、慎重になる。
2121 = "Một khi đã chạm vào quần lót, động tác tay của Reina trở nên thận trọng."
# monologue
# JP: 破れやすい紙でも取り扱っているかのように、\nゆっくりもゆっくり丁寧に、僕のパンツをズリ下げて――
1908 = "Như thể đang nâng niu một tờ giấy mỏng manh dễ rách, em ấy từ từ, từ từ cẩn thận kéo chiếc quần lót của tôi xuống――"
# monologue
# JP: （ぶんっ！！！）
2357 = "（Bật ra!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃわっ！！？」
1293 = "「Hyawa!!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ……\nこれが――男の子の――双鉄くん、の」
1288 = "「Oa……\nĐây là――của con trai――của anh Soutetsu.」"
# monologue
# JP: 誰かが、ごくりと生唾を飲む。\nこれほどまで――とは、僕自身さえ思ってなかった。
1995 = "Ai đó khẽ nuốt nước bọt cái ực. Đến mức này――chính tôi cũng không ngờ tới."
# monologue
# JP: 勃起は完全にそり返り、仲良く並んだふたりの顔の、\nその中間に、柱のごとくにそびえてしまう。
2186 = "Dương vật cương cứng ưỡn cong lên hoàn toàn, sừng sững như một chiếc cột vươn lên giữa hai khuôn mặt đang kề sát nhau."
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ……お風呂で見るときと、全然違う形ですぅ。\nほんとに、すっごく大きくなってるんですねぇ」
1286 = "「Phù oa…… Hình dạng khác hẳn lúc thấy trong nhà tắm luôn ạ. Thật sự là, đã lớn lên rất nhiều rồi nhỉ~」"
# monologue
# JP: （さわっ）
2363 = "（Chạm nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: 予告も無しに、無造作に、れいなの指先が勃起にふれて、\nけれどもすぐに離れてしまう。
2109 = "Không hề báo trước, một cách vô tư, đầu ngón tay Reina chạm vào dương vật đang cương cứng, nhưng rồi lại lập tức rụt lại."
# monologue
# JP: はわぁ、と感心したような息。\nれいなの声に、聞いたことの無い艶が混じり始める。
2083 = "Tiếng thở hắt ra đầy thán phục \"Hawaa\". Giọng nói của Reina bắt đầu pha lẫn một sự quyến rũ mà tôi chưa từng nghe thấy."
# 【れいな】
# display as 玲奈
# JP: 「それに……すっごく、固いですぅ……\nそうてつさんの……これ……なんか……なんだか――」
1516 = "「Hơn nữa…… còn rất, cứng nữa ạ…… Của anh Soutetsu…… cái này…… cảm giác…… sao ấy――」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいな。それが勃起。勃起しているおちんちん。\n男の子の、セックスのための準備が始まった状態」
1506 = "「Reina. Đó là cương cứng. Dương vật đang cương cứng. Trạng thái bắt đầu chuẩn bị cho việc làm tình của con trai.」"
# 【れいな】
# display as 玲奈
# JP: 「セックスのための、準備……\nれいなのシーリングと、おんなじに」
1483 = "「Chuẩn bị, cho việc làm tình…… Giống hệt như, phong ấn của Reina.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね。れいなのおまんこ――シーリングが開封された\nところに、双鉄くんの勃起が、入る」
1468 = "「Đúng vậy. Âm đạo của Reina――nơi phong ấn được mở ra, sự cương cứng của anh Soutetsu, sẽ tiến vào đó.」"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ――）
2316 = "（À――）"
# monologue
# JP: ようやく、今さら理解する。\nシーリング開封とはつまり、性的機能の解放なのだと。
1993 = "Cuối cùng, đến tận bây giờ tôi mới hiểu ra. Mở phong ấn, nói cách khác chính là giải phóng chức năng tình dục."
# 【双鉄H】
# display as 雙鐵
# JP: （れいなは、僕を求めてくれて……\nその想いが、シーリングを解いてくれたのか）
2366 = "（Reina, đã khao khát tôi…… Và chính cảm xúc đó, đã giải trừ phong ấn sao.）"
# monologue
# JP: 体の欲が、心とつながる。\n自分の勃起が、正しい現象なのだとわかる。が――
2225 = "Dục vọng của cơ thể kết nối với trái tim. Tôi hiểu rằng sự cương cứng của mình là một hiện tượng đúng đắn. Nhưng――"
# 【れいな】
# display as 玲奈
# JP: 「でもでも、ポーレット。こんなにおっきいの、\nれいなの中に、ほんとうに入るんですかぁ？」
1227 = "「Nhưng mà nhưng mà, chị Paulette. Cái lớn thế này, thật sự sẽ vào được bên trong Reina sao ạ~?」"
# monologue
# JP: ――そう、それだ。\nそこのところを、強い不安と感じている。
2031 = "――Đúng, chính là điều đó. Đó chính là điều khiến tôi cảm thấy vô cùng bất an."
# monologue
# JP: れいなの体は、とても小さい。\n無理すれば、壊してしまいかねないだろう。
2129 = "Cơ thể Reina rất nhỏ bé. Nếu cố ép, e là sẽ làm em ấy bị tổn thương mất."
# 【ポーレット】
# display as 波萊特
# JP: 「ええ、おちんちんとおまんこの準備を整えきれば、\n必ず入る。――女の子の体は、そうできてるの」
1393 = "「Ừ, nếu chuẩn bị kỹ càng cho dương vật và âm đạo, thì chắc chắn sẽ vào được.――Cơ thể con gái được cấu tạo như vậy mà.」"
# monologue
# JP: ポーレットがきっぱり言い切れば、\nれいなはすぐさま大きく頷く。
2054 = "Nghe Paulette khẳng định dứt khoát, Reina lập tức gật đầu mạnh mẽ."
# 【れいな】
# display as 玲奈
# JP: 「それなら、れいな。準備をきちんと整えますよぉ。\nね、ポーレット、れいな、どうしたらいいですかあ？」
1564 = "「Nếu vậy, Reina sẽ chuẩn bị thật đàng hoàng ạ. Này chị Paulette, Reina phải làm thế nào đây ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ最初は、双鉄くんの勃起の先っぽ――\n亀頭の部分に、優しく優しくキスしてあげて？」
1556 = "「Vậy thì đầu tiên, phần đầu dương vật đang cương cứng của anh Soutetsu―― phần quy đầu ấy, em hãy hôn thật dịu dàng, thật nhẹ nhàng nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　――ちゅっ！」
1411 = "「Vâng ạ! ――Chụt!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: れいなの可憐な唇が。小さな小さな唇が。\n醜く肥大しきった亀頭に、キスをする。
2110 = "Đôi môi đáng yêu của Reina. Đôi môi nhỏ bé xíu xiu ấy. Đang đặt nụ hôn lên phần quy đầu phình to xấu xí của tôi."
# 【れいな】
# display as 玲奈
# JP: 「ちゅっ――ちゅむっ――ちゅうっ――ちゅっ」
1360 = "「Chụt――chu――chụt――chụt.」"
# monologue
# JP: ……れいなにとっての優しさは、\nあるいは、甘やかし甘えることなのかもしれん。
922 = "……Sự dịu dàng đối với Reina, có lẽ là việc được chiều chuộng và làm nũng."
# monologue
# JP: 完全に甘えっ子の口付きで、指しゃぶりでもするように、\nキスをしながら、口はちゅうちゅう甘く亀頭を吸ってくる。
1867 = "Hoàn toàn với khuôn miệng của một đứa trẻ đang làm nũng, như thể đang mút ngón tay, vừa hôn, cái miệng nhỏ ấy vừa mút mát quy đầu đầy ngọt ngào."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……上手よ、れいな。\nそれじゃ、今度は亀頭をくっぽり咥えてあげて？」
1325 = "「Ưm…… giỏi lắm, Reina. Vậy thì, lần này em thử ngậm trọn lấy quy đầu xem sao?」"
# 【れいな】
# display as 玲奈
# JP: 「くっぽり、ですねぇ？\nそれじゃ……あ～～～ん――はむっ」
1262 = "「Ngậm trọn, phải không ạ~?\nVậy thì…… a~~~n――ngoạm.」"
# monologue
# JP: （ちゅるんっ！）
2347 = "（Trượt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1349 = "「!?」"
# monologue
# JP: くっぽり――いってくれるはずだった唇が、\nけれど亀頭を滑ってしまう。
2106 = "Đôi môi đáng lẽ phải ngậm trọn lấy, lại trượt tuột khỏi quy đầu."
# 【れいな】
# display as 玲奈
# JP: 「あれれ？　失敗しちゃいましたぁ。\nもーいっかい、おっきくおくちをあけて――あ～ん」
1279 = "「Ủa ủa? Thất bại mất rồi ạ. Lại một lần nữa, há miệng thật to ra――a~n.」"
# monologue
# JP: （つるんっ！）
2364 = "（Trơn tuột!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――く」
1321 = "「Ưm――hự.」"
# monologue
# JP: 瞬間触れて、滑って離れる――\nこれはこれで、不思議な気持ちよさがある。
1854 = "Chạm vào trong tích tắc, rồi trượt ra―― Thế này cũng mang lại một cảm giác dễ chịu kỳ lạ."
# monologue
# JP: ありはするのだが、もどかしい。\nもっと強く、がっつりとした刺激が欲しい。
2248 = "Dễ chịu thì có dễ chịu, nhưng lại thấy bứt rứt. Tôi muốn một sự kích thích mạnh mẽ và sâu sắc hơn."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ。れいな、上手にできませんよぉ。\nお手本、見せてほしいですぅ」
1482 = "「Chị Paulette ơi~. Reina không làm giỏi được đâu ạ. Chị làm mẫu cho Reina xem với ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「お手本っ！？」
1513 = "「Làm mẫu!?」"
# monologue
# JP: 青い瞳が、瞬間、揺れる。
2064 = "Đôi mắt xanh, trong khoảnh khắc, dao động."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは……いいけど――あのっ……\n双鉄、くんが――いやじゃ、なければ」
1453 = "「Chị thì…… cũng được thôi――nhưng mà…… Nếu anh Soutetsu――không thấy phiền.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、僕からもお願い」
1210 = "「Không, chính tôi cũng muốn nhờ cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりまひ（はむっ！！）　」
1423 = "「Tôi hiểu r(ngoạm!!)」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
# 1349 = "「啊！？」" 
# monologue
# JP: 言葉が終わりきらぬうち、返事を確認しきらぬうちに、\n強くて甘い刺激が亀頭をくるんでくれる。
2000 = "Lời chưa kịp dứt, chưa kịp xác nhận câu trả lời, một sự kích thích mạnh mẽ và ngọt ngào đã bao trọn lấy quy đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「はむっ――んっ――ちゅっ――ちゅううっ――\nちゅるるっ――ちゅっ――ちゅむっ――れるっ」
1369 = "「Ngoạm――ưm――chụt――chu――\nchụt――chụt――chu――rộp.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――んっ――あ」
# 1324 = "「啊……」" 
# monologue
# JP: お手本であまり気持ちよくなってしまっては、\nれいなに申し訳無さすぎる。
1858 = "Nếu chỉ vì màn làm mẫu mà lại thấy quá sung sướng, thì thật có lỗi với Reina."
# monologue
# JP: そう思うのだが、ポーレットの舌と唇は、\n毒薬のような快感で、僕の理性を崩しにかかる。
1791 = "Nghĩ thì nghĩ vậy, nhưng chiếc lưỡi và đôi môi của Paulette, đang mang đến khoái cảm như một liều độc dược, đánh sập lý trí của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「はむっ――んっ――ちゅっ――ちゅうっ――\nれるっ――れろっ――じゅぶっ――じゅうっ」
1359 = "「Ngoạm――ưm――chụt――chu――\nrộp――rộp――sụt――sụt.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁぁ、そおんなにつよく、\nいっぱいにくわえちゃって平気なんですねぇ――はむっ」
1301 = "「Oaaa, ngậm mạnh và sâu như thế, mà vẫn không sao nhỉ――ngoạm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1348 = "「!!?」"
# monologue
# JP: れいなが、れいなが僕のタマ。\n睾丸をいきなり咥えてくれるっ！
2096 = "Reina, Reina đang ngậm lấy bi của tôi. Em ấy đột nhiên ngậm trọn lấy tinh hoàn của tôi!"
# 【れいな】
# display as 玲奈
# JP: 「はふぇふぇっ？\nはんは、ほおほおひへはふひょほ？」
1282 = "「Hafefe?\nHanha, hoohoohihehafuhyoho?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「～～～～っ！」
1574 = "「~~~~!」"
# monologue
# JP: 気持ちよすぎて脂汗が出る。どわっと出る。\nこれは――すごい。
2240 = "Quá sung sướng khiến tôi vã cả mồ hôi hột. Mồ hôi tuôn ra như suối. Thế này――thật tuyệt vời."
# monologue
# JP: れいなの唇が動くたび、\n睾丸にあまくふるふると、快感が蓄積されていく。
2115 = "Mỗi khi đôi môi Reina cử động, một khoái cảm ngọt ngào, run rẩy lại tích tụ nơi tinh hoàn."
# 【れいな】
# display as 玲奈
# JP: 「ん～――むっ――ちゅっ――れろっ、れろっ――\nじゅるっ――ぷあっ！　れいな、わかりましたよぉ！」
1358 = "「Ưm~――ưm――chụt――rộp, rộp―― sụt――pua! Reina hiểu rồi đó ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん――じゅううううううううっ！　――ちゅぽっ！」
1377 = "「Ưm――sụtttttt! ――Chụt!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: 真空という二文字が思い浮かぶほど吸い込みながら、\nポーレットはその口内から僕の亀頭を離してくれる。
2052 = "Mút mạnh đến mức khiến tôi liên tưởng đến hai chữ \"chân không\", Paulette mới chịu nhả quy đầu của tôi ra khỏi khoang miệng cô ấy."
# monologue
# JP: そうして同じく口を離したれいなへと、\n優しく優しく、教えを重ねる。
2233 = "Và rồi, hướng về phía Reina cũng vừa nhả miệng ra, cô ấy dịu dàng, nhẹ nhàng chỉ bảo thêm."
# 【ポーレット】
# display as 波萊特
# JP: 「できたら亀頭だけじゃなくて。お口全部をつかって、\n双鉄くんのおちんちんを愛してあげて？」
1539 = "「Nếu được thì đừng chỉ mỗi quy đầu. Hãy dùng cả khuôn miệng, để yêu thương dương vật của anh Soutetsu nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。\nそれじゃ、れいなとポーレット、交代ですねぇ」
1512 = "「Reina hiểu rồi ạ~. Vậy thì, Reina và chị Paulette đổi chỗ nhé~」"
# 【ポーレット】
# display as 波萊特
# JP: 「こ、交代？」
1458 = "「Đ-Đổi chỗ?」"
# monologue
# JP: 目で、ポーレットが問うてくる。\n交代の必要は、理論上、無い。
2061 = "Bằng ánh mắt, Paulette dò hỏi tôi. Về mặt lý thuyết, việc đổi chỗ là không cần thiết."
# monologue
# JP: が、れいながそれを望むなら――\n僕に拒む理由など、無い。
1788 = "Nhưng, nếu Reina đã muốn thế―― thì tôi chẳng có lý do gì để từ chối cả."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、わかりました。それじゃ――はむっ」
1352 = "「A, tôi hiểu rồi. Vậy thì――ngoạm.」"
# monologue
# JP: 頷こう、と思った瞬間、\n睾丸をきゅっとくわえられてる。
1954 = "Ngay khoảnh khắc tôi định gật đầu, tinh hoàn đã bị ngậm chặt lấy."
# monologue
# JP: それを見届け、\nれいなはうふふと幸せそうな笑みを浮かべる。
2134 = "Chứng kiến cảnh đó, Reina nở một nụ cười hạnh phúc \"ư hự hự\"."
# 【れいな】
# display as 玲奈
# JP: 「わぁい！　それじゃ、れいなも、がんばりますねぇ！\nあ～～ん――くぽんっ！！！」
1292 = "「Oaa! Vậy thì, Reina cũng sẽ cố gắng nha~! A~~n――ngoạm!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――ぉっ」
1402 = "「Ô――ồ.」"
# monologue
# JP: 亀頭の全部を包んでもらえる。\n待ちかねていた喜びに、体が一気に熱くなる。
2262 = "Toàn bộ quy đầu đã được bao bọc trọn vẹn. Niềm vui sướng đã mong chờ từ lâu khiến cơ thể tôi nóng bừng lên trong chốc lát."
# 【れいな】
# display as 玲奈
# JP: 「ちゅうっ――ちゅっ――ちゅむっ――れろっ――\nちゅぶっ――ちゅっ――ちゅむっ――ちゅうっ」
1362 = "「Chu――chụt――chu――rộp――\nchụt――chụt――chu――chu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ――あっ――」
# 1324 = "「啊……」" 
# monologue
# JP: 脳が勝手に、比べてしまう。\nれいなの方が、口中全部が柔らかい。
1986 = "Não bộ tự động đưa ra sự so sánh. Khoang miệng của Reina mềm mại hơn hẳn."
# monologue
# JP: 体温もポーレットよりぽかぽかしていて、\n包まれることの幸福を、僕の勃起に教えてくれる。
2255 = "Nhiệt độ cơ thể cũng ấm áp hơn Paulette, mang đến cho sự cương cứng của tôi cảm giác hạnh phúc khi được bao bọc."
# 【れいな】
# display as 玲奈
# JP: 「ん――むっ――んんっ――ん～～、んっ――\nじゅっっ――むっ――じゅむっ――ぢゅぶっ」
# 1369 = "「啾嚕……啾噗噗……啾啪……啾、啾、啾噗……啾嚕」" 
# 【ポーレット】
# display as 波萊特
# JP: 「あ――むっ――んっ――こりゅっ――んむっ――\nちゅっ――ちゅうっ――ちゅろっ――」
# 1359 = "「啾……啾嚕……啾……咕啾……噗哈……嗯……啾嚕、啾……」" 
# monologue
# JP: かたや、ポーレットの舌はなめらか。\nその動きは、とても細やかで丁寧だ。
1841 = "Mặt khác, chiếc lưỡi của Paulette lại rất trơn tru. Chuyển động của nó vô cùng tỉ mỉ và cẩn thận."
# monologue
# JP: 愛されてると――体が誤解しそうなほどに、\n皺の一本一本までに、唾液を摺りこんでくれている。
1851 = "Như thể đang được yêu thương――đến mức cơ thể tôi gần như hiểu lầm, cô ấy chà xát nước bọt vào từng nếp nhăn một."
# 【れいな】
# display as 玲奈
# JP: 「んむっ――ん～～～っ」
1375 = "「Ưm――ưm~~~」"
# monologue
# JP: （ずろっ――ずろろっ――）
2344 = "（Sụt――sụt sụt――）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 1324 = "「啊……」" 
# monologue
# JP: れいなが舌をカーペットにする。
2104 = "Reina biến chiếc lưỡi của mình thành một tấm thảm."
# monologue
# JP: 勃起の下に柔らかく敷き、頭をそのまま動かして、\n深くへ、喉の奥へとじわり、僕を飲み込み包んでくれる。
1755 = "Trải mềm mại bên dưới dương vật đang cương cứng, em ấy cứ thế di chuyển đầu, từ từ nuốt trọn và bao bọc lấy tôi, sâu dần vào tận cuống họng."
# monologue
# JP: （ぷにっ）
2325 = "（Phập）"
# monologue
# JP: 喉に、亀頭が当たる感触。\nれいなは一瞬、苦いものでも食べたみたいな顔をして――
2260 = "Cảm giác quy đầu chạm vào cuống họng. Reina thoáng nhăn mặt như thể vừa ăn phải thứ gì đó đắng ngắt――"
# 【れいな】
# display as 玲奈
# JP: 「んっ――ずうっ――でゅぼっ！　ぢゅぼっ！　じゅっ！\nじゅるっ！　じゅぶっ！　じゅぶうっ！！」
1372 = "「Ưm――sụt――sụt! Sụt! Sụt!\nSụt! Sụt! Sụttt!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！！」
1347 = "「!!」"
# monologue
# JP: ――けれどもすぐに動き出す。\n頭を熱心に上下させ、快感と精液とを引き出そうとする。
1780 = "――Nhưng rồi em ấy lập tức cử động lại. Nhiệt tình gật gù đầu lên xuống, cố gắng khơi gợi khoái cảm và tinh dịch từ tôi."
# 【れいな】
# display as 玲奈
# JP: 「ぷっ――んっ――ほーへふはんほ――はんらふぁ――\nじゅぶっ――むっ――ぷふっ――へ――じゅるむっ」
1341 = "「Pụt――ưm――hoohefuhanho――hanrafa―― sụt――ưm――pufu――he――sụt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほほはは、へいは――すぱーふぉふへへ」
1368 = "「Hohohaha, heiha――supaafohuhehe.」"
# 【れいな】
# display as 玲奈
# JP: 「はひれふぅ――じゅぶううう！！！」
1364 = "「Hahirefuu――sụtttttt!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
# 1348 = "「啊！！？」" 
# monologue
# JP: もごもごと、僕にはまったく意味のわからぬ、\nけれども通じ合ってるらしい、ふたりの会話。
1865 = "Hai người họ lúng búng trò chuyện với nhau, tôi chẳng hiểu gì sất, nhưng có vẻ họ lại rất hiểu ý nhau."
# monologue
# JP: それが終わった瞬間に、れいなは一気に加速するっ！
1897 = "Ngay khoảnh khắc cuộc trò chuyện kết thúc, Reina bất ngờ tăng tốc!"
# 【れいな】
# display as 玲奈
# JP: 「じゅぶっ！　じゅっ！　ぶぢゅるっ！　じゅうっ！\nじゅっ！　じゅるっ！　ずぼっ！　ぼひゅっ！！」
# 1372 = "「啾！啾！啾嚕嚕！咕啾！啾！啾！啾噗！啾嚕嚕嚕！！」" 
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――んっ――あっ――」
1331 = "「A――ưm――a――」"
# monologue
# JP: ぎりぎりにまで、精液がこみ上げ弾けそうになる。\nが、このままイってしまったら――
2072 = "Tinh dịch dâng trào đến tận cùng, như sắp sửa tuôn trào. Nhưng, nếu cứ thế này mà ra mất thì――"
# 【ポーレット】
# display as 波萊特
# JP: 「ひひゃほ！　へひはっ」
1370 = "「Hihyaho! Hehiha.」"
# 【れいな】
# display as 玲奈
# JP: 「はひれふぅ――じゅるるるるっ！！！」
1338 = "「Hahirefuu――sụttttt!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ！」
1274 = "「A!」"
# monologue
# JP: （びゅっ！　びゅるるっ！　どびゅっ！　びゅぶうっ！）
2329 = "（Phụt! Phụt! Phụt! Phụttttt!）"
# 【れいな】
# display as 玲奈
# JP: 「ぷきゃっ！？　ひゃっ――わっ――」
1320 = "「Pukya!? Hya――oa――」"
# monologue
# JP: （びゅうっ！　びゅるっ！　びゅっ！　どびゅうっ！！）
# 2329 = "（咻咻！咻咻！咻咻！咻咻！）" 
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あつい――ですぅ――なんか――\nしろい、の」
1290 = "「Phù a――nóng――quá ạ~――cái gì――\ntrắng trắng, ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごい……これが、双鉄くんの――」
1414 = "「Tuyệt quá…… Đây là, của anh Soutetsu――」"
# monologue
# JP: れいなの顔に、ポーレットの髪に、僕の白濁が降り注ぐ。\nふたりを、穢してしまってる。
2173 = "Chất lỏng trắng đục của tôi tuôn trào lên khuôn mặt Reina, lên mái tóc Paulette. Tôi đã làm vấy bẩn cả hai người họ mất rồi."
# monologue
# JP: 罪悪感がこみあげてきて――\nなのに浅ましい僕の射精は、さらに勢いを増すようで。
2179 = "Cảm giác tội lỗi trào dâng―― Thế nhưng sự xuất tinh đáng xấu hổ của tôi dường như lại càng mãnh liệt hơn."
# monologue
# JP: （んびゅっ――びゅるっ――びゅううっ――びゅっ――）
2328 = "（Phụt――phụt――phụttttt――phụt――）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あっ……すごい……すごい……ですぅ」
1284 = "「Phù……a……tuyệt quá……tuyệt quá……ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、今度は、れいなの準備を仕上げる番ね」
1401 = "「Ư hự hự, lần này, đến lượt hoàn thành việc chuẩn bị cho Reina nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃわっ！？　わわ――ポーレット、\nれいな、はだかんぼさんになるですかぁ？」
1295 = "「Hyawa!? Oa oa――chị Paulette, Reina, sẽ phải trần truồng sao ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……」
# 929 = "「……」" 
# monologue
# JP: 魅入ってしまう。\nれいなの、シンプルな股間の割れ目に。
1945 = "Tôi bị mê hoặc mất rồi. Bởi rãnh nhỏ đơn sơ nơi hạ bộ của Reina."
# 【ポーレット】
# display as 波萊特
# JP: 「まず、場所を確認しましょうね」
1244 = "「Trước tiên, hãy xác nhận vị trí nhé.」"
# monologue
# JP: （くぱあっ）
2361 = "（Tách ra）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃん！」
1319 = "「Hyan!」"
# monologue
# JP: ポーレットの細く整った指先が、僕に見やすいような形で、\nれいなのおまんこを広げてくれる。
2056 = "Những ngón tay thon dài, thanh tú của Paulette, tách mở âm đạo của Reina ra để tôi dễ dàng nhìn thấy."
# 【れいな】
# display as 玲奈
# JP: 「れ、れいな……なんだか――くぱあってされて、\nはずかしいですよぉ」
1488 = "「R-Reina…… tự nhiên――bị tách ra thế này, xấu hổ lắm đó ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「恥ずかしくていいのよ？　れいな。ここは、大事な場所\n――双鉄くんにしか、見せちゃいけない場所だから」
1427 = "「Xấu hổ cũng không sao đâu? Reina. Đây là nơi quan trọng ――Nơi mà em chỉ được phép cho một mình anh Soutetsu nhìn thấy thôi.」"
# monologue
# JP: （さすっ）
# 2363 = "（撫摸）" 
# 【れいな】
# display as 玲奈
# JP: 「きゅんっ！！」
1345 = "「Thắt tim!!」"
# monologue
# JP: ポーレットの指が軽くうごめく。
2060 = "Ngón tay Paulette khẽ cử động."
# monologue
# JP: れいなのおまんこ付け根の部分、\n小さな小さな肉の真珠を撫でさする。
1896 = "Nơi cuống âm đạo của Reina, cô ấy mơn trớn viên ngọc trai bằng thịt nhỏ xíu xiu."
# 【れいな】
# display as 玲奈
# JP: 「ふや……ぁ……きもち……いい、ですぅ――んっ」
1263 = "「Phuya……a……sướng……quá, ạ~――ưm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？　れいなの膣。おちんちんを挿れるとこ。\nどこだか、わかる？」
1569 = "「Anh Soutetsu? Âm đạo của Reina. Nơi để đút dương vật vào. Anh biết là ở đâu chưa?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1378 = "「Ừ.」"
# monologue
# JP: 指差されているわけじゃない。\n言葉で示されたわけでもない。
1872 = "Không phải là được chỉ tay vào. Cũng chẳng phải được chỉ dẫn bằng lời nói."
# monologue
# JP: だけれど、はっきり理解できてる。\n本能が、僕に教えてくれている。
2181 = "Thế nhưng, tôi hoàn toàn có thể hiểu rõ. Bản năng đang mách bảo cho tôi biết."
# 【ポーレット】
# display as 波萊特
# JP: 「なら、そこ。セックスの準備のために――\n双鉄くんが、やりたいように愛撫してあげて？」
1560 = "「Vậy thì, chỗ đó. Để chuẩn bị cho việc làm tình―― anh Soutetsu hãy ái ân theo cách anh muốn nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむっ！」
1379 = "「Ừm!」"
# monologue
# JP: （ちゅうううっ！）
2351 = "（Chuuuu!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ！？　ふえっ」
1355 = "「Hyau!? Fue.」"
# monologue
# JP: 膣へと唇を押し付けて――\nその瞬間に、れいなが濡れていると知る。
1977 = "Ép chặt môi vào âm đạo―― Ngay khoảnh khắc đó, tôi nhận ra Reina đã ướt sũng."
# monologue
# JP: 膣の奥からこんこんと湧き出るれいなの雫が、\n「進め」と、「もっと奥へ」と、僕の舌先を導いてくれる。
2210 = "Những giọt mật tuôn trào không ngừng từ sâu thẳm bên trong âm đạo của Reina, như đang dẫn dắt đầu lưỡi tôi, bảo rằng \"Tiến lên đi\", \"Sâu hơn nữa đi\"."
# monologue
# JP: （れろっ――るっ――れる――じゅるっ）
2341 = "（Rộp――rộp――rộp――sụt）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！？　んっ――れいな――おまた、にっ――\n双鉄さん、に――キス――されてっ――んふっ――あっ」
1343 = "「Hya!? Ưm――Reina――ở chỗ kín, á―― bị anh Soutetsu――hôn――nfu――a.」"
# 【ポーレット】
# display as 波萊特
# JP: 「クンニリングス――おまんこキスは、旦那さんの\n大事な大事なお仕事だから。すごく、普通のことだから」
1523 = "「Cunnilingus――Hôn âm đạo là một công việc vô cùng vô cùng quan trọng của người chồng. Đó là chuyện hết sức bình thường thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「そぉなん……です……ふあっ……あっ――んっ――\nきもちい、ぃ――ですぅ……ふっ……おっぱい、も……」
1552 = "「Vậy sao……ạ……phù a……a――ưm―― sướng, quá――ạ~……phù……ngực, cũng……」"
# monologue
# JP: おっぱいに、僕は触れてない。\nポーレットが愛撫を手伝ってくれてるのだろう。
1946 = "Tôi không hề chạm vào ngực em ấy. Chắc là Paulette đang giúp tôi ái ân."
# monologue
# JP: 負けていられないような気がして、\n舌の動きを、より力強く大胆にする。
1949 = "Cảm thấy không thể thua kém được, tôi khiến chuyển động của lưỡi trở nên mạnh mẽ và táo bạo hơn."
# monologue
# JP: （れるっ！　るっ！　にゅるるっ！　ぞりゅっ！）
2342 = "（Rộp! Rộp! Sụt sụt! Sụt!）"
# 【れいな】
# display as 玲奈
# JP: 「あっっ！？　いまっ――いまの、とこ――ふあっ――\nざらっ、って――ざらって――んっ――んんんっ」
1354 = "「A!? Vừa nãy――chỗ, vừa nãy――phù a―― nham nháp――nham nháp――ưm――ưm.」"
# monologue
# JP: ここか、と思わせてくれる感触。
2234 = "Cảm giác khiến tôi nhận ra, là chỗ này sao."
# monologue
# JP: れいなの声に気を良くし、そこだけを、\n重点的に徹底的にねぶりしゃぶって舐めまわす。
2088 = "Phấn khích trước giọng nói của Reina, tôi tập trung toàn bộ vào nơi đó, liếm láp, mút mát một cách triệt để."
# monologue
# JP: （れるっ！　れろっ！　じょりゅっ！　ぬりゅっ！\nぺるっ！　ぺろっ！　れるっ！　じゅろろぉ！）
2350 = "（Rộp! Rộp! Sụt! Sụt!\nLiếm! Liếm! Rộp! Sụtttt!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！？　あっ――な、なにっ――これっ――\nふぇっ――れいな――れいな――なんだかっ――」
1266 = "「Hya!? A――c-cái gì――thế này―― fue――Reina――Reina――sao ấy――」"
# monologue
# JP: 膣がきゅんきゅん収縮してる。\n蜜に酸味が混じり始めて、温度を有した匂いも感じる。
1904 = "Âm đạo đang co thắt từng đợt. Mật ngọt bắt đầu lẫn chút vị chua, và tôi cũng cảm nhận được mùi hương mang theo hơi ấm."
# 【ポーレット】
# display as 波萊特
# JP: 「いいのよ？　れいな。怖くないから」
1474 = "「Không sao đâu? Reina. Không đáng sợ đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「あっ――あっ――そうてつ、さんっ――\nそうてつさぁんっ」
1333 = "「A――a――anh Soutetsu――\nanh Soutetsu ơi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1378 = "「嗯」" 
# monologue
# JP: れいなに僕を刷り込みたくて、\n舌を尖らせて思い切りっ！
1971 = "Muốn in đậm dấu ấn của mình lên Reina, tôi uốn cong lưỡi lại và dốc hết sức!"
# monologue
# JP: （にゅろおおおおおおおおっ！！！）
2346 = "（Sụttttttttttt!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひあっ！？　あっ――あっ――あっ――\nふあああああああああああああんっ！！！」
1264 = "「Hya!? A――a――a――\nPhù aaaaaaaaaaaaaa!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
# 1348 = "「啊！！？」" 
# monologue
# JP: 強い水流。\n反射で顔が、勝手に下がる。
2069 = "Dòng nước chảy mạnh. Phản xạ tự nhiên khiến khuôn mặt tôi tự động cúi xuống."
# 【れいな】
# display as 玲奈
# JP: 「ぁっ……ふやっ――だめっ……ら、めぇっ」
1525 = "「A……phuya――không được……kh-không được.」"
# monologue
# JP: （ちょおおおおおおおおっっ）
2354 = "（Rào ràoooooooo）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1327 = "「A.」"
# monologue
# JP: おしっこ――ではない、おもらしだ。
1868 = "Tè――không phải, là rỉ nước tiểu rồi."
# monologue
# JP: 性的絶頂が強すぎて、れいなは恐らく排泄を、\n制御しきれなくなったのだろう。
1931 = "Có lẽ cực khoái tình dục quá mãnh liệt, khiến Reina không thể kiểm soát được việc bài tiết nữa."
# 【れいな】
# display as 玲奈
# JP: 「ふぇっ――らめっ――とまっ――てっ――んっ――\nれいな……おへや……よごしちゃっ――ぅっ――」
1526 = "「Fue――không được――dừng――lại――ưm―― Reina……sẽ làm bẩn……căn phòng mất――ư――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
1323 = "「!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1346 = "「啊！」" 
# monologue
# JP: 泣きそうな声に体が動く。\n口全体で小さなおまんこをつつみこ――！！！？
2183 = "Giọng nói như sắp khóc khiến cơ thể tôi tự động cử động. Dùng cả khuôn miệng bao trọn lấy âm đạo nhỏ bé――!!!?"
# monologue
# JP: （じょょおおおおおおおおおおっ！）
2353 = "（Rào ràooooooooo!）"
# 【れいな】
# display as 玲奈
# JP: 「ふやっ――あっ――あっ――あっ――」
1531 = "「Phuya――a――a――a――」"
# monologue
# JP: 包み込まれて安心したのか、\nれいなの尿の勢いが増す。
2213 = "Có lẽ vì cảm thấy an tâm khi được bao bọc, dòng nước tiểu của Reina càng lúc càng mạnh."
# monologue
# JP: だから、飲む。\nひたすらに、飲む。
2014 = "Vì vậy, tôi nuốt lấy.\nChỉ một mực nuốt lấy."
# monologue
# JP: （ごっ！　ごっ！　ごっ！　ごくっ！）
2326 = "（Ực! Ực! Ực! Ực!）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あ――のんで……る……ンッ――ふっ」
1529 = "「Phù……a――đang……nuốt……ưm――phù.」"
# monologue
# JP: （ごくっ――んぐっ――んぷっ――んぐっ――）
2327 = "（Ực――ực――ực――ực――）"
# 【れいな】
# display as 玲奈
# JP: 「は……あっ――そうてつ……さん……\nそう、てつ……さぁ……ん」
1538 = "「Ha……a――anh Soutetsu……\nanh, Soutetsu……」"
# monologue
# JP: （ちょおっ――ちょろっ――――ろっ――ぴゅっ！）
2352 = "（Rào――róc rách――――róc rách――phụt!）"
# monologue
# JP: ……尿が、口内を叩かなくなる。\nげっぷしそうな喉を封じて、口を離す。
924 = "……Nước tiểu không còn tuôn trào vào khoang miệng nữa. Cố kìm nén cơn ợ hơi chực trào nơi cuống họng, tôi tách miệng ra."
# monologue
# JP: れいなが僕を見上げてる。\nその目はうるみ、今すぐにでも泣き出しそうだ。
2092 = "Reina đang ngước nhìn tôi. Đôi mắt ướt đẫm, như thể có thể khóc òa lên bất cứ lúc nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「どうした、れいな？」
1442 = "「Sao vậy, Reina?」"
# 【れいな】
# display as 玲奈
# JP: 「ごめっ――ごめんなさい――ごめんなさぁい」
1430 = "「Xin――xin lỗi anh――em xin lỗi ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何をあやまる？」
1485 = "「Sao lại xin lỗi?」"
# 【れいな】
# display as 玲奈
# JP: 「だって、れいな……あかちゃんみたいに――おもらし、\nしちゃって……そうてつさんも、おへやも、よごして」
1406 = "「Tại vì, Reina……như một đứa trẻ sơ sinh――rỉ nước tiểu, mất rồi……làm bẩn cả anh Soutetsu, cả căn phòng nữa.」"
# monologue
# JP: ぽろりと、こらえきれぬ涙が溢れる。\nポーレットの手が、優しくそれをぬぐって、舐める。
1879 = "Tí tách, những giọt nước mắt không thể kìm nén tuôn rơi. Bàn tay Paulette dịu dàng lau đi, rồi liếm láp chúng."
# 【れいな】
# display as 玲奈
# JP: 「れいな……おとなに、なりたいのに……\n双鉄さんと、これじゃ――せっくす――」
1497 = "「Reina……muốn trở thành người lớn, vậy mà…… Thế này thì làm sao――làm tình――với anh Soutetsu được.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「できるさ。セックスの準備中のおもらしなど、\n大人にだって、ごくごく普通にあることだ」
1520 = "「Được chứ. Việc rỉ nước tiểu trong lúc chuẩn bị làm tình, đối với người lớn cũng là chuyện hết sức bình thường thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぇっ！？」
1278 = "「Fue!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうよ？　れいな」
1465 = "「Đúng vậy đó? Reina.」"
# monologue
# JP: れいなを安心させるため――とっさに口をついた言葉を、\nポーレットがすぐ、支えてくれる。
1979 = "Để làm Reina an tâm――tôi buột miệng nói ra những lời ấy, và Paulette lập tức hùa theo hỗ trợ."
# 【ポーレット】
# display as 波萊特
# JP: 「その証拠に……ね？」
1551 = "「Bằng chứng là đây…… thấy chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「あ……ふぁ――あっ」
1350 = "「A……phù a――a.」"
# monologue
# JP: 青い瞳の向く先を、れいなの視線が追いかける。
2141 = "Ánh mắt Reina đuổi theo hướng nhìn của đôi mắt xanh kia."
# monologue
# JP: ヘソまで当たる僕の勃起を、\nれいなはうっとり、見つめてくれる。
1981 = "Nhìn dương vật cương cứng chạm tới tận rốn của tôi, Reina say sưa, mê mẩn ngắm nhìn."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。それが証拠に――僕の勃起はこのとおり、\nれいなとセックスしたくてしたくて、震えているさ」
1466 = "「Đúng vậy. Đó chính là bằng chứng――Sự cương cứng của anh như thế này đây, dang run rẩy vì quá muốn, quá muốn làm tình với Reina đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ、そうてつさん」
1500 = "「Reina cũng thế đó ạ~, anh Soutetsu.」"
# monologue
# JP: にっこりと、\n泣いたれいなが、可愛く笑う。
2137 = "Mỉm cười rạng rỡ, Reina vừa khóc xong lại cười một cách đáng yêu."
# 【れいな】
# display as 玲奈
# JP: 「れいな。そうてつさんと、セックス――\nすっごく、したいですぅ」
1493 = "「Reina. Làm tình với anh Soutetsu―― muốn lắm, lắm luôn ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1378 = "「嗯」" 
# 【れいな】
# display as 玲奈
# JP: 「んっ――」
# 1375 = "「嗯……」" 
# monologue
# JP: キスをして、亀頭を膣の入り口へ。
1998 = "Tôi trao em một nụ hôn, rồi đưa quy đầu đến cửa âm đạo."
# monologue
# JP: 呼吸をあわせ、頷き合って――\nゆっくりゆっくり、腰を進める。
1960 = "Hòa chung nhịp thở, gật đầu với nhau―― Từ từ, từ từ, tôi đẩy hông tới."
# monologue
# JP: （み……ちっ――）
2322 = "（Sụt……）"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――\nんっ――くっ――」
1528 = "「Phù a――a――\nƯm――hự――」"
# monologue
# JP: れいなの眉根が寄ってしまう。
2132 = "Lông mày Reina nhíu lại."
# monologue
# JP: 痛みを僕まで感じるほどに、\nその表情は苦しげになる。
2155 = "Vẻ mặt em ấy trở nên đau đớn, đến mức tôi cũng có thể cảm nhận được nỗi đau đó."
# monologue
# JP: （きち――ちっ――）
# 2322 = "（咕啾……）" 
# monologue
# JP: だけれど、腰が進んでしまう。
1787 = "Thế nhưng, hông tôi vẫn cứ tiến tới."
# monologue
# JP: 止まろうとする意思はあるのに、\n体が快感を求めてしまう。
2017 = "Dù có ý định dừng lại, nhưng cơ thể lại khao khát khoái cảm."
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――あっ――」
1272 = "「Kua――a――」"
# monologue
# JP: れいなの膣の入り口は、\nきちきちに伸びてしまってる。
2117 = "Cửa âm đạo của Reina,\ndang bị kéo căng ra hết cỡ."
# monologue
# JP: その内側がぴたりねっとり張り付いて、\n僕を誘い、ざわついてる――が――
1899 = "Bên trong nó bám chặt, dính dấp lấy tôi, mời gọi tôi, khiến tôi rạo rực――nhưng mà――"
# 【れいな】
# display as 玲奈
# JP: 「ぃっ――ふっ――ふあっ――ふうっ」
1537 = "「Ư——phù——phù——phù」"
# monologue
# JP: れいなは、いっぱいに張り詰めている。\n口をあけ、苦しげにあえいでしまってる。
2130 = "Cơ thể Reina căng cứng hết cỡ. Miệng hé mở, cô bé đang thở hổn hển một cách đau đớn."
# monologue
# JP: それでも、れいなは僕を見ている。\nきらきらとしたまっすぐな目で、ひたすら僕を見つめてる。
1829 = "Dù vậy, Reina vẫn nhìn tôi. Đôi mắt lấp lánh nhìn thẳng, cô bé cứ đăm đăm nhìn tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「れい――なっ――いく――ぞっ」
1494 = "「Reina——anh——ra——đây」"
# 【れいな】
# display as 玲奈
# JP: 「は……ひっ――んっ――はっ――\nはいっ――そう――てつ――さんっ」
1318 = "「Ha……hi——ưm——ha——\nVâng——anh——Soutetsu——」"
# monologue
# JP: （ぷつっ）
2355 = "（Phập）"
# 【れいな】
# display as 玲奈
# JP: 「い"っ！？」
1420 = "「Á!?」"
# monologue
# JP: （みちいいいいいいいいいいいっ！！）
2324 = "（Phập phập phập phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「っぅぅぅぅぅぅぅぅぅ～～～っ！！！」
1373 = "「Ư ư ư ư ư ư ư ư ư~~~!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1322 = "「Hự!」"
# monologue
# JP: 何かを切った感触があり、\n腰が一気に進んでしまって――
1940 = "Cảm giác như vừa chọc thủng thứ gì đó, hông tôi tiến thẳng vào trong một mạch——"
# 【れいな】
# display as 玲奈
# JP: 「は……ぃ……っ……たっ……んくっ――ふぁっ……\nれい、な……セック、ス……そうてつ、さん――と」
1535 = "「Ha……đau……quá……ưm——ha…… Reina……đang làm tình……với anh Soutetsu……rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……僕たちはセックスしてるな」
1387 = "「Ừm……chúng ta đang làm tình đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――あっ――あ……」
1530 = "「Ha——a——a——a……」"
# monologue
# JP: キスをし、ゆっくり髪を撫でれば、\n苦痛の表情がやわらいで、れいなはうっとり瞳を閉じる。
1999 = "Tôi hôn và từ từ vuốt ve mái tóc cô bé, biểu cảm đau đớn dần dịu đi, Reina say sưa nhắm mắt lại."
# 【双鉄H】
# display as 雙鐵
# JP: （だ……が――）
2315 = "（Nhưng……mà——）"
# monologue
# JP: 今は、負担があまりに大きい。\nれいなの膣は、恐らく体も、限界だ。
1884 = "Hiện tại, gánh nặng là quá lớn. Âm đạo của Reina, và có lẽ cả cơ thể cô bé, đã đến giới hạn rồi."
# monologue
# JP: 時間をかけて、ゆっくり慣らして――\nそうしなければ、これ以上先には進めまい。
1843 = "Phải dành thời gian để cô bé từ từ làm quen—— Nếu không, sẽ chẳng thể tiếp tục được nữa."
# monologue
# JP: （ぬっ――るっ――）
2343 = "（Nhóp——nhép——）"
# 【れいな】
# display as 玲奈
# JP: 「痛っ――あっ――んっ――」
1419 = "「Đau——a——ưm——」"
# monologue
# JP: ゆっくり、ゆっくりと抜く動き。\nそれだけで、れいなはまたも辛そうな顔になってしまう。
1976 = "Tôi từ từ, từ từ rút ra. Chỉ vậy thôi cũng đủ khiến khuôn mặt Reina lại trở nên đau đớn."
# monologue
# JP: 今日のところは、ここまでだ。\nこの獣欲を満たすため、れいなに苦痛を与えたくない――
2153 = "Hôm nay đến đây thôi. Tôi không muốn vì thỏa mãn thú tính của bản thân mà khiến Reina phải chịu đau đớn——"
# monologue
# JP: （ぬぽっ）
# 2325 = "（咕啾）" 
# 【れいな】
# display as 玲奈
# JP: 「あっ」
# 1327 = "「啊」" 
# monologue
# JP: 淋しげな声。
2094 = "Giọng nói đượm vẻ tiếc nuối."
# monologue
# JP: けれどもそこに、\nどうしようも無い安堵もやはり混じってる。
1785 = "Nhưng trong đó, vẫn lẫn lộn sự an tâm không thể che giấu."
# 【れいな】
# display as 玲奈
# JP: 「でも……あの……双鉄さん、びゅびゅってしないと\n……おまた、ぱんぱんでくるしい……です、よね？」
1224 = "「Nhưng mà……ừm……anh Soutetsu, nếu không bắn ra ……thì bên dưới, sẽ căng tức và khó chịu lắm……đúng không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「まぁ、苦しくないといえば、嘘になる」
1394 = "「À thì, nói không khó chịu thì là nói dối.」"
# monologue
# JP: ポーレットはそんなことまで教えてくれているのか。
2066 = "Chị Paulette còn dạy cả những chuyện như thế này sao."
# monologue
# JP: ありがたいことと思うと同時、\nその気遣いが、今は裏目とも感じてしまう。
1980 = "Vừa cảm thấy biết ơn, nhưng đồng thời cũng thấy sự quan tâm đó lúc này lại phản tác dụng."
# 【双鉄H】
# display as 雙鐵
# JP: 「だが、そんなものはどうとでもなる。\nセックスだけが、射精にいたる方法じゃない」
1209 = "「Nhưng mà, chuyện đó thì có cách giải quyết cả thôi. Làm tình không phải là cách duy nhất để xuất tinh.」"
# 【れいな】
# display as 玲奈
# JP: 「でも、あの……れいな――ちゃんと、セックス――\nさいごまで……おべんきょう、したくてぇ」
1229 = "「Nhưng mà, ừm……Reina——muốn được học hỏi…… cách làm tình đàng hoàng——cho đến tận cùng cơ ạ~」"
# monologue
# JP: 甘えた視線。甘えきった声。\n僕へではなく、それが向けられている先は――
1882 = "Ánh mắt nũng nịu. Giọng nói nũng nịu. Nhưng nó không hướng về phía tôi, mà là hướng về——"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫よ、れいな？\nわたしにして欲しいことがあったら、なんでも言って？」
1475 = "「Không sao đâu, Reina? Em muốn chị làm gì thì cứ nói nhé?」"
# monologue
# JP: 瞬間、ぱっと、\nれいなの顔が笑みに輝く。
1752 = "Khoảnh khắc đó, đột nhiên, khuôn mặt Reina bừng sáng với một nụ cười."
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。\nれいな、またポーレットにお手本を」
1435 = "「Chuyện là thế này nha. Reina, lại muốn xem chị Paulette làm mẫu ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、それはさすがに」
1213 = "「Không, chuyện đó thì hơi...」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
1568 = "「Anh Soutetsu.」"
# monologue
# JP: 静かな声が、静かな視線が、僕を止める。
2057 = "Giọng nói bình tĩnh, ánh mắt tĩnh lặng, đã ngăn tôi lại."
# 【ポーレット】
# display as 波萊特
# JP: 「お手本。わたし、れいなに見せてあげたいんです。\nたった一度、たった一回だけの、お手本」
1448 = "「Làm mẫu. Chị, muốn cho Reina xem. Chỉ một lần, chỉ một lần duy nhất thôi, làm mẫu cho em ấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「一度、だけの――」
1239 = "「Chỉ một lần, duy nhất——」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうすれば――れいなも、セックスの本当の意味。\n大切さ――きっと、理解を出来るだろうって思いますし」
1471 = "「Vâng. Nếu làm vậy——Reina cũng sẽ hiểu được ý nghĩa thực sự của việc làm tình. Sự quan trọng của nó——em nghĩ con bé nhất định sẽ hiểu được.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それは……そうかもしれんが、\nしかし――」
1219 = "「Chuyện đó……có thể là vậy,\nnhưng mà——」"
# 【ポーレット】
# display as 波萊特
# JP: 「それに、わたし自身のためにも」
1518 = "「Hơn nữa, đây cũng là vì bản thân em.」"
# monologue
# JP: （しゅるっ――）
2348 = "（Tuột——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: れいなの尿で濡れた――\nいや、れいなの尿で、だけなのだろうか？
2058 = "Ướt đẫm nước tiểu của Reina—— Không, liệu có phải chỉ ướt vì nước tiểu của Reina thôi không?"
# monologue
# JP: 重そうなほどに濡れてるパンツを、\nポーレットはためらいなしに、脱ぎ捨てる。
2034 = "Quần lót ướt sũng đến mức trông có vẻ nặng nề, Paulette không chút do dự, cởi phăng ra."
# 【ポーレット】
# display as 波萊特
# JP: 「叶わなかった初恋に、区切りをつけて終わらせて。\n――心も体も、れいなのおかあさんになれるよう」
1484 = "「Để kết thúc và đặt dấu chấm hết cho mối tình đầu không thành. ——Để cả tâm hồn và thể xác, đều có thể trở thành mẹ của Reina.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
# 929 = "「……」" 
# monologue
# JP: 不意に、思う。\n思うというか、理解する。
1990 = "Đột nhiên, tôi chợt nghĩ.\nĐúng hơn là, tôi đã hiểu ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1417 = "「Anh hiểu rồi.」"
# monologue
# JP: （ちゅくっ――）
# 2322 = "（咕啾……）" 
# monologue
# JP: 愛撫をせずとも、\nポーレットはしとどに濡れている。
1830 = "Dù chưa hề âu yếm,\nPaulette đã ướt đẫm rồi."
# monologue
# JP: 亀頭を押し付けた瞬間にもう、\n膣肉は甘くわなないて、僕を内へと導こうとする。
1821 = "Ngay khoảnh khắc tôi ấn quy đầu vào, thịt âm đạo đã rung lên đầy ngọt ngào, như muốn dẫn lối tôi vào trong."
# 【双鉄H】
# display as 雙鐵
# JP: 「本当にいいんだな？　れいな」
1509 = "「Thật sự không sao chứ? Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！\nれいな、お手本みてみたいですぅ」
1380 = "「Vâng ạ!\nReina, muốn xem làm mẫu lắm ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1553 = "「Vậy sao.」"
# monologue
# JP: れいなの心は、いまだ幼い。
2120 = "Trái tim của Reina, vẫn còn rất non nớt."
# monologue
# JP: 性に対して解放されても、\n恋を恐らく――僕よりももっと、理解してない。
1910 = "Dù đã được giải phóng về mặt tình dục, nhưng về tình yêu có lẽ——cô bé còn không hiểu bằng tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （だから、あえて、ポーレットは）
2359 = "（Thế nên, Paulette mới cố tình làm vậy）"
# monologue
# JP: 全員が、痛みを受けることにより。\nそれを乗り越えることにより。
2238 = "Bằng cách để tất cả cùng chịu đựng nỗi đau. Bằng cách vượt qua nó."
# monologue
# JP: 初めてきっと、僕らは大人に。\nそうして、家族になれるのだろう。
1961 = "Lần đầu tiên, chắc chắn chúng tôi sẽ trở thành người lớn. Và như thế, sẽ trở thành một gia đình."
# monologue
# JP: （み……ちっ――）
# 2322 = "（咕啾……）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――あっ――」
1524 = "「Phù——a——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: 本能が、理性を塗りつぶそうとする。
2024 = "Bản năng đang cố gắng bóp nghẹt lý trí."
# monologue
# JP: ポーレットが歯の間から零した声は、\n痛みに耐えるものだけじゃない。
2053 = "Tiếng rên rỉ bật ra từ kẽ răng của Paulette, không chỉ đơn thuần là chịu đựng sự đau đớn."
# monologue
# JP: （みっ――ちっ――）
# 2322 = "（咕啾……）" 
# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁっ――んっ――きて、るっ――\n来てるっ――双鉄、くん――がっ――」
1534 = "「Ha……a——ưm——vào, rồi——\nVào rồi——anh Soutetsu——ưm——」"
# monologue
# JP: 声には、あきらかな歓びがある。
1881 = "Trong giọng nói, rõ ràng có sự hoan lạc."
# monologue
# JP: おまんこの肉も成熟し、みっちりぷりぷり、\n固いながらも僕を包んで溶かそうとする。
1906 = "Thịt âm đạo cũng đã trưởng thành, săn chắc và đàn hồi, dù hơi cứng nhưng vẫn bao bọc lấy tôi như muốn làm tan chảy."
# monologue
# JP: （ぷっ――ずっ――ずるっっっ――）
# 2322 = "（咕啾……）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――あっ――わたし――\nセッ――クス」
1536 = "「Ha——a——a——em——\nĐang làm——tình」"
# monologue
# JP: 接合部から、真っ赤な真っ赤な血が溢れる。
2258 = "Từ chỗ kết nối, dòng máu đỏ tươi trào ra."
# monologue
# JP: ポーレットの処女を、僕が奪った。\nそれが、望まれたことであっても――
1967 = "Trinh tiết của Paulette, đã bị tôi cướp mất. Dù đó là điều cô ấy mong muốn——"
# 【れいな】
# display as 玲奈
# JP: 「や……ぁ――」
1207 = "「Đừng……mà——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: か細い声に顔をあげ――\n驚き、悲しみ、嬉しく思う。
2182 = "Nghe giọng nói yếu ớt, tôi ngẩng mặt lên—— Kinh ngạc, buồn bã, và cả vui mừng."
# monologue
# JP: れいなの顔は、泣き出しそうだ。\n僕をまっすぐまっすぐ見つめ、首をいやいやと振っている。
2102 = "Khuôn mặt Reina như sắp khóc. Nhìn chằm chằm vào tôi, cô bé lắc đầu nguầy nguậy."
# 【れいな】
# display as 玲奈
# JP: 「れいな、お手本……もういらない、ですぅ」
1490 = "「Reina, làm mẫu……không cần nữa đâu, ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう、ね――れいな」
1461 = "「Đúng, vậy——Reina.」"
# monologue
# JP: これが、“お手本”。\nれいなの母が、僕の義母が。
2232 = "Đây chính là, \"làm mẫu\". Mẹ của Reina, mẹ vợ của tôi."
# monologue
# JP: 恋に未熟な僕らに、\n強い痛みとともにしっかり、与えてくれた。
2239 = "Đã trao cho những kẻ còn non nớt trong tình yêu như chúng tôi, cùng với một nỗi đau dữ dội."
# 【ポーレット】
# display as 波萊特
# JP: 「セックスは、とても大事なもの……だか、らっ」
1234 = "「Làm tình, là một chuyện rất quan trọng……nên, là」"
# 【れいな】
# display as 玲奈
# JP: 「ごめんなさい、ポーレット。\nごめんなさい、そうてつさぁん」
1431 = "「Em xin lỗi, chị Paulette.\nEm xin lỗi, anh Soutetsu~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「謝るな。言葉ではなく、行動で。\nもらった教えを――僕らはこれから、いかしていこう」
1246 = "「Đừng xin lỗi. Không phải bằng lời nói, mà bằng hành động. Những gì được dạy——từ giờ chúng ta hãy phát huy nó nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はいです。はいですぅ――\nそうてつさぁん」
1425 = "「Vâng ạ. Vâng ạ——\nAnh Soutetsu~」"
# monologue
# JP: 行動せねば、れいなはきっと考え続ける。\n答えはすでに決まってて、そこへ進むしか無いというのに。
1889 = "Nếu không hành động, chắc chắn Reina sẽ tiếp tục suy nghĩ. Dù câu trả lời đã được định sẵn, và chỉ còn cách tiến tới đó."
# monologue
# JP: 三位一体――痛みを超えて家族になるため、\n僕は、為すべきことをする。
2076 = "Ba người là một——để vượt qua nỗi đau và trở thành một gia đình, tôi sẽ làm những gì mình cần phải làm."
# monologue
# JP: （くちっ）
# 2322 = "（咕啾……）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1322 = "「唔！」" 
# monologue
# JP: れいなのおまんこがどろどろだ。
2118 = "Âm đạo của Reina ướt sũng nhầy nhụa."
# monologue
# JP: 肉が溶けたかと誤解するほど、\n大量の蜜に濡れてしたたり、震えてる。
1900 = "Ướt đẫm và nhỏ giọt lượng mật dịch khổng lồ đến mức khiến người ta lầm tưởng rằng thịt đã tan chảy, cô bé đang run rẩy."
# 【れいな】
# display as 玲奈
# JP: 「れいな、れいな――そうてつさんがほしいです。\nもう、ぜったいにはなさないです、から」
1503 = "「Reina, Reina——muốn anh Soutetsu ạ. Reina, sẽ tuyệt đối không buông ra nữa, đâu ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ。\n僕も絶対、二度とれいなを離さない」
1384 = "「Ừ, anh cũng vậy. Anh cũng tuyệt đối, sẽ không bao giờ rời xa Reina nữa.」"
# monologue
# JP: 雌としての本能が、レイルロオドにもあるのだろうか。
2243 = "Bản năng của giống cái, liệu Railord cũng có sao?"
# monologue
# JP: 僕を奪還するために、れいなの体は急速に、\n僕を受け入れるそのためだけに、成熟してる。
2075 = "Để giành lại tôi, cơ thể Reina đã nhanh chóng trưởng thành, chỉ để tiếp nhận tôi."
# monologue
# JP: （つっ――ぷっ――）
2320 = "（Nhóp——nhép——）"
# 【れいな】
# display as 玲奈
# JP: 「ひあっ――あっ！」
1337 = "「Á——a!」"
# monologue
# JP: 押し当てた、その瞬間の感じがさっきと全然違う。
2188 = "Cảm giác lúc ấn vào, hoàn toàn khác với lúc nãy."
# monologue
# JP: （ずっ――ぶっ――にゅるるっ――）
# 2320 = "（咕啾……咕啾……）" 
# monologue
# JP: 隙間なく密着しきって、締める強さは変わらない。\nが、肉壁はうるんでとろけ、あまりに甘くぬらついている。
1962 = "Khít rịt không một kẽ hở, lực siết chặt vẫn không đổi. Nhưng vách thịt ướt đẫm tan chảy, nhầy nhụa một cách quá đỗi ngọt ngào."
# monologue
# JP: （ずっ――ずるっ――ずっ――ずうっ――）
2319 = "（Nhóp——nhép——nhóp——nhép——）"
# monologue
# JP: だから、動ける。
2013 = "Thế nên, tôi có thể di chuyển."
# monologue
# JP: 無理に押し入るだけじゃなく、\n押して下がってぐるりと動き、膣へと僕を刻んでいける。
1759 = "Không chỉ cưỡng ép đẩy vào, mà còn có thể đẩy tới lui xoay vòng, khắc sâu bản thân vào âm đạo."
# 【れいな】
# display as 玲奈
# JP: 「ふあ――あっ！　あっ！　ああっ」
1533 = "「Ha——a! A! A a」"
# monologue
# JP: 声から、苦痛が消えている。\n純粋な歓びだけが、鼓膜から僕の脳を揺する。
1880 = "Sự đau đớn đã biến mất khỏi giọng nói. Chỉ còn lại niềm hoan lạc thuần túy, làm rung chuyển màng nhĩ và não bộ tôi."
# monologue
# JP: （ずっ――るっ――ずぶっ――こちゅんっ！）
2318 = "（Nhóp——nhép——phập——bạch!）"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ！」
# 1346 = "「啊！」" 
# monologue
# JP: 奥に、あたった感触がある。
1941 = "Có cảm giác chạm vào tận sâu bên trong."
# monologue
# JP: ぞくぞくと、征服感が、達成感が、\n一気に背骨を抜けていく！
2074 = "Cảm giác chinh phục, cảm giác thành tựu rần rần, chạy dọc sống lưng trong một chớp mắt!"
# monologue
# JP: （ずっ！　ずぶっ！　じゅっ！　ごりゅっ！）
2321 = "（Nhóp! Phập! Chụt! Rột!）"
# monologue
# JP: だが、焦らない。\nさきほどまでは、痛みに震えていた膣だ。
1782 = "Nhưng, tôi không vội. Chỉ mới lúc nãy thôi, âm đạo này vẫn còn run rẩy vì đau đớn."
# monologue
# JP: 快感を与え続けるために、れいながさっき教えてくれた、\nザラつくところを亀頭でこする。
2078 = "Để tiếp tục mang lại khoái cảm, tôi dùng quy đầu cọ xát vào chỗ nham nhám mà Reina vừa chỉ lúc nãy."
# monologue
# JP: （ずっ――ぞりっ――ざりっ――ぐいっ！）
2323 = "（Nhóp——sột——soạt——phập!）"
# 【れいな】
# display as 玲奈
# JP: 「んひゅっ！　ふあぁっ――あっ――ひ、んっ――\nそこ――れいな――ふ、ぁ――ぞりって、される、とぉ」
1344 = "「Ưm! Ha——a——hi, ưm—— Chỗ đó——Reina——ha, a——bị cọ xát, thế này——」"
# monologue
# JP: （ぞりっ！　ぐいっ！　ごりゅ！　くみゅっ！）
# 2323 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひあッ――んっ――ひゃっ――あっ――\nそうてつ――さんっ――そおてつ――さぁん」
1527 = "「Á——ưm——hya——a——\nAnh——Soutetsu——anh——Soutetsu~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな」
1498 = "「Reina.」"
# monologue
# JP: れいなが溶けてる。
2098 = "Reina đang tan chảy."
# monologue
# JP: 口の端からよだれをたらして、\n顔も体も蕩けきってる。
1839 = "Nước bọt rỉ ra từ khóe miệng, cả khuôn mặt lẫn cơ thể đều tan chảy."
# monologue
# JP: （ずぶっ！　じゅぶっ！　じゅばっ！　すびゅっ！）
# 2323 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ふああああああっ！！？」
1336 = "「Haaaaaaaa!!?」"
# monologue
# JP: 思った瞬間、腰を思い切り振っている。\n大きく大きく動かしている。
1935 = "Khoảnh khắc nghĩ vậy, tôi đã vung hông hết cỡ. Di chuyển thật rộng, thật mạnh."
# monologue
# JP: れいなの小さな小さな膣を、\n思いっきりに、抉り犯して僕専用に染め付けている。
2150 = "Xoáy sâu, cưỡng đoạt âm đạo bé nhỏ của Reina, nhuộm nó thành của riêng tôi."
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！　あっ――そうてつ、さぁんっ――\nん――れいな――おなかの――おくっ――あつく、って」
1268 = "「Hya! A——anh, Soutetsu~—— Ưm——Reina——bụng——sâu bên trong——nóng, quá」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ――れいなっ！」
1450 = "「Anh cũng vậy——Reina!」"
# 【れいな】
# display as 玲奈
# JP: 「んっ！？　んっ――むっ――ちゅ――ふむっ――\nあっ――んっ――ちゅうっ――ちゅるっ――ちゅむうっ」
1383 = "「Ưm!? Ưm——ưm——chụt——ưm——\nA——ưm——chụt——chụt——chụt」"
# monologue
# JP: 肌を重ねてキスをして。\nそうしながらも、へこへこ小刻みに腰を動かす。
1963 = "Làn da kề sát, trao nhau nụ hôn. Trong lúc đó, hông tôi vẫn không ngừng nhấp liên tục từng nhịp nhỏ."
# monologue
# JP: 精液が、膨れて弾けそうになる。\nれいなの子宮に、僕の全部を送りたくなる。
2171 = "Tinh dịch căng phồng như chực chờ vỡ tung. Tôi muốn trút toàn bộ con người mình vào tử cung của Reina."
# 【れいな】
# display as 玲奈
# JP: 「そうてつ――さぁんっ――は――あっ――れいなっ――おなか――おなかの、おくっ、がっ――きゅんて、して」
1565 = "「Anh——Soutetsu~——ha——a——Reina——bụng——sâu bên trong, bụng——thắt lại, rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1346 = "「啊！」" 
# monologue
# JP: 一緒にイケる。\n思うと同時に大きく大きく腰を引く。
1964 = "Có thể ra cùng nhau. Nghĩ vậy, tôi liền rút hông ra thật mạnh."
# monologue
# JP: そして全部を！\n僕の全部を思いっきりにっ！！！
2084 = "Rồi trút toàn bộ! Trút toàn bộ con người tôi vào hết cỡ!!!"
# monologue
# JP: （ずぶううううううううっ！――ごつっ！）
2345 = "（Phậpppppppp!——Bạch!）"
# 【れいな】
# display as 玲奈
# JP: 「きゅふううううううううううううっ！！！！」
1374 = "「Kyuuuuuuuuuuuuuuuu!!!!」"
# monologue
# JP: れいなの一番奥へと亀頭がぶつかれば、\n先端に食いつかれるような吸引が来てっ！
2261 = "Khi quy đầu đâm sầm vào tận sâu bên trong Reina, một lực hút như muốn cắn nuốt lấy phần đỉnh ập đến!"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1346 = "「啊！」" 
# monologue
# JP: （びゅくっ！　どびゅっ！　どびゅるっ！　びゅぶっ！）
# 2329 = "（咻咻！咻咻！咻咻！咻咻！）" 
# 【れいな】
# display as 玲奈
# JP: 「あっ――あっ――あっ――あっ――おくっ――おくぅっ――れいなの、おなか――いちばん――おく、にっ――」
1334 = "「A——a——a——a——sâu bên trong——sâu bên trong——bụng của, Reina——tận cùng——sâu bên trong——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うっ――ぁっ――れい、なっ――」
1273 = "「Ư——a——Rei, na——」"
# monologue
# JP: 腰が、震える。\n精液が、全部、残らず出て行く気がする。
1987 = "Hông tôi, run rẩy. Cảm giác như toàn bộ tinh dịch đang trào ra không sót một giọt."
# monologue
# JP: （びゅっ！　びゅるっ――びゅううっ――びゅつ――）
# 2329 = "（咻咻！咻咻！咻咻！咻咻！）" 
# 【れいな】
# display as 玲奈
# JP: 「せっくす……セックス――んっ――れいな――ちゃんと、\nそうてつ、さんと……んっ――あっ――ふあっ――あっ」
1233 = "「Làm tình……làm tình——ưm——Reina——đã đàng hoàng, làm với anh, Soutetsu……ưm——a——ha——a」"
# monologue
# JP: 腰が、震える。\n精液全部が、からっぽになる。
2198 = "Hông tôi, run rẩy.\nToàn bộ tinh dịch, đã cạn sạch."
# monologue
# JP: れいなも大きく大きく震え――
2087 = "Reina cũng run rẩy dữ dội——"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あっ――あっ！？」
1532 = "「Ha……a——a!?」"
# monologue
# JP: れいなが、止まる。
2101 = "Reina, khựng lại."
# monologue
# JP: ポーレットの手が優しく優しく、れいなの髪を撫でている。\nずっと、ずうっと、優しく優しく撫で続けてる。
2055 = "Bàn tay của Paulette đang vuốt ve mái tóc Reina một cách vô cùng dịu dàng. Vuốt ve không ngừng, vô cùng dịu dàng."
# 【れいな】
# display as 玲奈
# JP: 「あの……ポーレっ……あ……んっ」
1561 = "「Ưm……chị Paule……a……ưm」"
# monologue
# JP: れいなが、口をつぐんでしまう。\n必死になって探しているのか、次の言葉がなかなか出ない。
2139 = "Reina ngậm miệng lại. Có vẻ như đang cố gắng tìm kiếm, mãi mà không thốt nên lời tiếp theo."
# monologue
# JP: 初めて目にするその光景を、\n青い瞳は――やさしくやさしく見つめてる。
2103 = "Đôi mắt xanh biếc——đang dịu dàng, dịu dàng ngắm nhìn khung cảnh lần đầu tiên được chứng kiến ấy."
# 【れいな】
# display as 玲奈
# JP: 「あの……ありがとう。おかあ、さん」
1562 = "「Ưm……cảm ơn. Mẹ, ạ」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1378 = "「嗯」" 
# monologue
# JP: ほんのすこしだけ淋しげに――\n見えた微笑みが、けれどすぐに、ふくらんでいく。
2059 = "Nụ cười thoáng chút đượm buồn—— nhưng ngay lập tức, lại nở rộ."
# monologue
# JP: どこまでもどこまでも温かに――\n小さく震える僕の傷さえ、許し包んでくれるほど。
1875 = "Ấm áp đến vô tận—— đủ để bao dung và tha thứ cho cả những vết thương đang khẽ run rẩy của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「おめでとう。\nれいな、双鉄くん」
1446 = "「Chúc mừng hai người.\nReina, anh Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1378 = "「嗯」" 
# monologue
# JP: ただそれだけのやりとりで、\nけれど僕らは、結ばれる。
1809 = "Chỉ bằng những lời trao đổi đó, nhưng chúng tôi, đã gắn kết với nhau."
# monologue
# JP: 痛みを超えて、心を重ねて。\n僕らは、そうして――家族になる。
2222 = "Vượt qua nỗi đau, hòa chung nhịp đập trái tim. Chúng tôi, cứ như thế——trở thành một gia đình."
