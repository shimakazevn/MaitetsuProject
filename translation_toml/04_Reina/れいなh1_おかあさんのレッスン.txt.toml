# JP: （ぷつっ）
2355 = "（噗嗤）" 

# 【れいな】
# display as 玲奈
# JP: 「い"っ！？」\n1420 = "「好痛！？」" \n\n# monologue\n# JP: （みちいいいいいいいいいいいっ！！）\n2324 = "（咕啾！！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「っぅぅぅぅぅぅぅぅぅ～～～っ！！！」\n1373 = "「嗚嗚嗚嗚嗚！！！」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「くあっ！」\n1322 = "「唔！」" \n\n# monologue\n# JP: 何かを切った感触があり、\n腰が一気に進んでしまって――\n1940 = "感覺衝破了某種阻礙，腰一口氣挺了進去。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「は……ぃ……っ……たっ……んくっ――ふぁっ……\nれい、な……セック、ス……そうてつ、さん――と」\n1535 = "「蛤啊……好痛……啊……啊嗯……玲奈……和雙鐵先生……做愛了……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ああ……僕たちはセックスしてるな」\n1387 = "「嗯，我們在做愛呢」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふあっ――あっ――あっ――あ……」\n1530 = "「蛤啊……啊、啊、啊……」" \n\n# monologue\n# JP: キスをし、ゆっくり髪を撫でれば、\n苦痛の表情がやわらいで、れいなはうっとり瞳を閉じる。\n1999 = "我親吻著她，輕撫她的頭髮。她痛苦的表情終於緩和下來，陶醉地閉上了雙眼。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: （だ……が――）\n2315 = "（但是……）" \n\n# monologue\n# JP: 今は、負担があまりに大きい。\nれいなの膣は、恐らく体も、限界だ。\n1884 = "她的負擔太大了。玲奈的小穴和身體恐怕都已經瀕臨極限。" \n\n# monologue\n# JP: 時間をかけて、ゆっくり慣らして――\nそうしなければ、これ以上先には進めまい。\n1843 = "只能花時間讓她慢慢習慣，否則根本無法繼續下去。" \n\n# monologue\n# JP: （ぬっ――るっ――）\n2343 = "（啾嚕……）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「痛っ――あっ――んっ――」\n1419 = "「好痛……啊嗯……」" \n\n# monologue\n# JP: ゆっくり、ゆっくりと抜く動き。\nそれだけで、れいなはまたも辛そうな顔になってしまう。\n1976 = "我慢慢地拔出肉棒。僅是這樣，就讓玲奈再度露出了痛苦的表情。" \n\n# monologue\n# JP: 今日のところは、ここまでだ。\nこの獣欲を満たすため、れいなに苦痛を与えたくない――\n2153 = "看來今天就到此為止了。我不想為了滿足自己的獸慾而傷害到她。" \n\n# monologue\n# JP: （ぬぽっ）\n# 2325 = "（咕啾）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あっ」\n# 1327 = "「啊」" \n\n# monologue\n# JP: 淋しげな声。\n2094 = "玲奈似乎很不捨。" \n\n# monologue\n# JP: けれどもそこに、\nどうしようも無い安堵もやはり混じってる。\n1785 = "但我能聽得出來，她確實也因此放下了心。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「でも……あの……双鉄さん、びゅびゅってしないと\n……おまた、ぱんぱんでくるしい……です、よね？」\n1224 = "「但是……你不射出來的話……下面會硬到很難受吧？」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「まぁ、苦しくないといえば、嘘になる」\n1394 = "「嗯，說不難受肯定是騙人的」" \n\n# monologue\n# JP: ポーレットはそんなことまで教えてくれているのか。\n2066 = "波萊特連這個都告訴她了啊。" \n\n# monologue\n# JP: ありがたいことと思うと同時、\nその気遣いが、今は裏目とも感じてしまう。\n1980 = "我為此感激的同時，也感覺波萊特的體貼適得其反了。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「だが、そんなものはどうとでもなる。\nセックスだけが、射精にいたる方法じゃない」\n1209 = "「不過總會有辦法的。要射精不是只有做愛這個辦法」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「でも、あの……れいな――ちゃんと、セックス――\nさいごまで……おべんきょう、したくてぇ」\n1229 = "「但是，那個……玲奈想要……把做愛學到最後……」" \n\n# monologue\n# JP: 甘えた視線。甘えきった声。\n僕へではなく、それが向けられている先は――\n1882 = "她的視線、她的聲音都在撒嬌。但撒嬌的對象不是我，而是……" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「大丈夫よ、れいな？\nわたしにして欲しいことがあったら、なんでも言って？」\n1475 = "「沒關係，玲奈。想讓我做什麼，你可以儘管說」" \n\n# monologue\n# JP: 瞬間、ぱっと、\nれいなの顔が笑みに輝く。\n1752 = "下一瞬間，玲奈綻放出了燦爛的笑容。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あのですねぇ。\nれいな、またポーレットにお手本を」\n1435 = "「就是呀……玲奈還想看波萊特做示範」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「いや、それはさすがに」\n1213 = "「不，這個肯定不合適吧……」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くん」\n1568 = "「雙鐵君」" \n\n# monologue\n# JP: 静かな声が、静かな視線が、僕を止める。\n2057 = "波萊特用平靜的聲音與視線打斷了我。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「お手本。わたし、れいなに見せてあげたいんです。\nたった一度、たった一回だけの、お手本」\n1448 = "「我也想給玲奈做示範。唯一一次，也是僅能做一次的示範」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「一度、だけの――」\n1239 = "「僅能做一次……」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はい。そうすれば――れいなも、セックスの本当の意味。\n大切さ――きっと、理解を出来るだろうって思いますし」\n1471 = "「是的，只要這樣……。玲奈一定可以明白做愛真正的意義和重要性」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「それは……そうかもしれんが、\nしかし――」\n1219 = "「也許是吧……但是……」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「それに、わたし自身のためにも」\n1518 = "「而且，這也是為了我自己」" \n\n# monologue\n# JP: （しゅるっ――）\n2348 = "（啾嚕）" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「っ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: れいなの尿で濡れた――\nいや、れいなの尿で、だけなのだろうか？\n2058 = "波萊特的內褲被玲奈的尿液沾濕了。不對，也許不只是被尿沾濕的吧？" \n\n# monologue\n# JP: 重そうなほどに濡れてるパンツを、\nポーレットはためらいなしに、脱ぎ捨てる。\n2034 = "沾濕的內褲看起來都變重了，波萊特毫不猶豫地將其脫下來丟到一旁。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「叶わなかった初恋に、区切りをつけて終わらせて。\n――心も体も、れいなのおかあさんになれるよう」\n1484 = "「為了給我未能開花結果的初戀做個了斷。——為了讓我的心靈和身體，都成為玲奈的媽媽」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「…………」\n# 929 = "「……」" \n\n# monologue\n# JP: 不意に、思う。\n思うというか、理解する。\n1990 = "我突然想到了。應該說是理解了。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「わかった」\n1417 = "「好吧」" \n\n# monologue\n# JP: （ちゅくっ――）\n# 2322 = "（咕啾……）" \n\n# monologue\n# JP: 愛撫をせずとも、\nポーレットはしとどに濡れている。\n1830 = "即便沒有愛撫，波萊特的小穴也已經一片濕潤。" \n\n# monologue\n# JP: 亀頭を押し付けた瞬間にもう、\n膣肉は甘くわなないて、僕を内へと導こうとする。\n1821 = "剛把龜頭抵在上面，小穴就嬌媚地蠕動著引導我入內。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「本当にいいんだな？　れいな」\n1509 = "「真的沒關係嗎，玲奈」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はいですぅ！\nれいな、お手本みてみたいですぅ」\n1380 = "「嗯！玲奈想看看示範」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「そうか」\n1553 = "「這樣啊」" \n\n# monologue\n# JP: れいなの心は、いまだ幼い。\n2120 = "玲奈的心依然很幼小。" \n\n# monologue\n# JP: 性に対して解放されても、\n恋を恐らく――僕よりももっと、理解してない。\n1910 = "就算解放了對性的意識，恐怕還是不理解何為戀愛——比我還要懵懂。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: （だから、あえて、ポーレットは）\n2359 = "（所以波萊特才挺身而出）" \n\n# monologue\n# JP: 全員が、痛みを受けることにより。\nそれを乗り越えることにより。\n2238 = "通過一起承受痛苦。通過跨越痛苦。" \n\n# monologue\n# JP: 初めてきっと、僕らは大人に。\nそうして、家族になれるのだろう。\n1961 = "我們才能邁進大人的門檻。以及，真正成為一家人。" \n\n# monologue\n# JP: （み……ちっ――）\n# 2322 = "（咕啾……）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふっ――あっ――」\n1524 = "「蛤啊……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「っ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: 本能が、理性を塗りつぶそうとする。\n2024 = "本能漸漸摧毀了我的理性。" \n\n# monologue\n# JP: ポーレットが歯の間から零した声は、\n痛みに耐えるものだけじゃない。\n2053 = "波萊特從牙縫間擠出呻吟，不僅僅只是因為在忍耐痛苦。" \n\n# monologue\n# JP: （みっ――ちっ――）\n# 2322 = "（咕啾……）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「は……ぁっ――んっ――きて、るっ――\n来てるっ――双鉄、くん――がっ――」\n1534 = "「蛤啊……嗯……進來了……雙鐵君……」" \n\n# monologue\n# JP: 声には、あきらかな歓びがある。\n1881 = "她的聲音中明顯帶有愉悅。" \n\n# monologue\n# JP: おまんこの肉も成熟し、みっちりぷりぷり、\n固いながらも僕を包んで溶かそうとする。\n1906 = "小穴部位也充分發育，水靈靈肉嘟嘟，彷彿要將我堅挺的肉棒溶化。" \n\n# monologue\n# JP: （ぷっ――ずっ――ずるっっっ――）\n# 2322 = "（咕啾……）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はっ――あっ――あっ――わたし――\nセッ――クス」\n1536 = "「蛤啊……我……我……做愛了……」" \n\n# monologue\n# JP: 接合部から、真っ赤な真っ赤な血が溢れる。\n2258 = "鮮紅的血液從她下體流出。" \n\n# monologue\n# JP: ポーレットの処女を、僕が奪った。\nそれが、望まれたことであっても――\n1967 = "我奪去了波萊特的處女。就算這是她的心願——" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「や……ぁ――」\n1207 = "「不要……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「っ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: か細い声に顔をあげ――\n驚き、悲しみ、嬉しく思う。\n2182 = "聽到她嬌弱的聲音，我抬起頭……震驚、悲傷與喜悅同時在我心中交織。" \n\n# monologue\n# JP: れいなの顔は、泣き出しそうだ。\n僕をまっすぐまっすぐ見つめ、首をいやいやと振っている。\n2102 = "玲奈彷彿要哭出來了。她注視著我，不斷搖頭傳達著不情願的情緒。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「れいな、お手本……もういらない、ですぅ」\n1490 = "「玲奈……已經不需要示範了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「そう、ね――れいな」\n1461 = "「是啊……玲奈」" \n\n# monologue\n# JP: これが、“お手本”。\nれいなの母が、僕の義母が。\n2232 = "這是“示範”。由玲奈的母親，我的岳母所做的示範。" \n\n# monologue\n# JP: 恋に未熟な僕らに、\n強い痛みとともにしっかり、与えてくれた。\n2239 = "通過強烈的痛苦，來教育對戀愛依然懵懂的我們。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「セックスは、とても大事なもの……だか、らっ」\n1234 = "「做愛……是很重要的」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ごめんなさい、ポーレット。\nごめんなさい、そうてつさぁん」\n1431 = "「對不起，波萊特。對不起，雙鐵先生」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「謝るな。言葉ではなく、行動で。\nもらった教えを――僕らはこれから、いかしていこう」\n1246 = "「別道歉。不要用語言，而是用實際行動。接下來……就讓我們運用剛才所學到的東西吧」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はいです。はいですぅ――\nそうてつさぁん」\n1425 = "「好的，好的……雙鐵先生」" \n\n# monologue\n# JP: 行動せねば、れいなはきっと考え続ける。\n答えはすでに決まってて、そこへ進むしか無いというのに。\n1889 = "如果不開始行動，玲奈一定會獨自陷入沉思。即便答案早已注定，只能朝那裡不斷前進。" \n\n# monologue\n# JP: 三位一体――痛みを超えて家族になるため、\n僕は、為すべきことをする。\n2076 = "為了成為三位一體——跨越了痛苦的家庭。我也有應盡之事。" \n\n# monologue\n# JP: （くちっ）\n# 2322 = "（咕啾……）" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「っ！」\n# 1322 = "「唔！」" \n\n# monologue\n# JP: れいなのおまんこがどろどろだ。\n2118 = "玲奈的小穴已經一片濕潤。" \n\n# monologue\n# JP: 肉が溶けたかと誤解するほど、\n大量の蜜に濡れてしたたり、震えてる。\n1900 = "小穴內洪水泛濫，不斷顫抖，甚至讓人產生肉壁都溶化了的錯覺。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「れいな、れいな――そうてつさんがほしいです。\nもう、ぜったいにはなさないです、から」\n1503 = "「玲奈，玲奈也想要你。絕對不會再放開你了」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ああ、僕もだ。\n僕も絶対、二度とれいなを離さない」\n1384 = "「嗯，我也是。絕對不會再放開你了」" \n\n# monologue\n# JP: 雌としての本能が、レイルロオドにもあるのだろうか。\n2243 = "鐵路人偶也有屬於雌性的本能嗎。" \n\n# monologue\n# JP: 僕を奪還するために、れいなの体は急速に、\n僕を受け入れるそのためだけに、成熟してる。\n2075 = "為了將我奪回來，玲奈的身體急速成長為了能夠接受我的模樣。" \n\n# monologue\n# JP: （つっ――ぷっ――）\n2320 = "（咕啾……咕啾……）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ひあっ――あっ！」\n1337 = "「啊啊啊啊！」" \n\n# monologue\n# JP: 押し当てた、その瞬間の感じがさっきと全然違う。\n2188 = "肉棒頂到了深處，那一瞬間的感覺與先前截然不同。" \n\n# monologue\n# JP: （ずっ――ぶっ――にゅるるっ――）\n# 2320 = "（咕啾……咕啾……）" \n\n# monologue\n# JP: 隙間なく密着しきって、締める強さは変わらない。\nが、肉壁はうるんでとろけ、あまりに甘くぬらついている。\n1962 = "我們毫無縫隙地緊貼在一起，小穴依然用力縮緊。但肉壁已經一片濕滑，沾滿愛液。" \n\n# monologue\n# JP: （ずっ――ずるっ――ずっ――ずうっ――）\n2319 = "（咕啾……咕啾……咕啾……）" \n\n# monologue\n# JP: だから、動ける。\n2013 = "於是我動了起來。" \n\n# monologue\n# JP: 無理に押し入るだけじゃなく、\n押して下がってぐるりと動き、膣へと僕を刻んでいける。\n1759 = "不是強行將肉棒插入，我將肉棒壓在裡面轉動，在小穴內細心研磨。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふあ――あっ！　あっ！　ああっ」\n1533 = "「蛤啊……啊！啊！啊啊！」" \n\n# monologue\n# JP: 声から、苦痛が消えている。\n純粋な歓びだけが、鼓膜から僕の脳を揺する。\n1880 = "她的聲音中不再是痛苦。純粹的歡愉透過鼓膜震撼我的大腦。" \n\n# monologue\n# JP: （ずっ――るっ――ずぶっ――こちゅんっ！）\n2318 = "（咕啾……咕啾……咕啾……！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふあっ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: 奥に、あたった感触がある。\n1941 = "感覺頂到深處了。" \n\n# monologue\n# JP: ぞくぞくと、征服感が、達成感が、\n一気に背骨を抜けていく！\n2074 = "激動感、征服感、成就感一口氣從我的脊椎躥升！" \n\n# monologue\n# JP: （ずっ！　ずぶっ！　じゅっ！　ごりゅっ！）\n2321 = "（咕啾……咕啾！）" \n\n# monologue\n# JP: だが、焦らない。\nさきほどまでは、痛みに震えていた膣だ。\n1782 = "但我沒有著急。她的小穴剛才還在因痛苦而顫抖。" \n\n# monologue\n# JP: 快感を与え続けるために、れいながさっき教えてくれた、\nザラつくところを亀頭でこする。\n2078 = "為了繼續給予她快感，我用龜頭摩擦著她先前所說的敏感部位。" \n\n# monologue\n# JP: （ずっ――ぞりっ――ざりっ――ぐいっ！）\n2323 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「んひゅっ！　ふあぁっ――あっ――ひ、んっ――\nそこ――れいな――ふ、ぁ――ぞりって、される、とぉ」\n1344 = "「啊嗯……蛤啊……啊……那裡……玲奈……蛤啊……被摩擦的話……」" \n\n# monologue\n# JP: （ぞりっ！　ぐいっ！　ごりゅ！　くみゅっ！）\n# 2323 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ひあッ――んっ――ひゃっ――あっ――\nそうてつ――さんっ――そおてつ――さぁん」\n1527 = "「蛤啊……啊……啊……雙鐵先生……雙鐵先生……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「れいな」\n1498 = "「玲奈」" \n\n# monologue\n# JP: れいなが溶けてる。\n2098 = "玲奈已經徹底陶醉了。" \n\n# monologue\n# JP: 口の端からよだれをたらして、\n顔も体も蕩けきってる。\n1839 = "口水從她嘴邊流下，已經是一副心神蕩漾的模樣。" \n\n# monologue\n# JP: （ずぶっ！　じゅぶっ！　じゅばっ！　すびゅっ！）\n# 2323 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふああああああっ！！？」\n1336 = "「啊啊啊啊啊！！？」" \n\n# monologue\n# JP: 思った瞬間、腰を思い切り振っている。\n大きく大きく動かしている。\n1935 = "想到這裡我便開始用力抽插。用最大幅度的動作抽插。" \n\n# monologue\n# JP: れいなの小さな小さな膣を、\n思いっきりに、抉り犯して僕専用に染め付けている。\n2150 = "盡情侵犯玲奈嬌小的小穴，讓她只屬於我一個人。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ひゃっ！　あっ――そうてつ、さぁんっ――\nん――れいな――おなかの――おくっ――あつく、って」\n1268 = "「呀！啊……雙鐵先生……玲奈的……肚子裡……熱熱的……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「僕もだ――れいなっ！」\n1450 = "「我也是……玲奈！」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「んっ！？　んっ――むっ――ちゅ――ふむっ――\nあっ――んっ――ちゅうっ――ちゅるっ――ちゅむうっ」\n1383 = "「嗯！？啾、啾、啾……啊嗯……啾、啾嚕、啾噗」" \n\n# monologue\n# JP: 肌を重ねてキスをして。\nそうしながらも、へこへこ小刻みに腰を動かす。\n1963 = "我們肌膚相親吻在一起。同時仍在快速挺腰抽插。" \n\n# monologue\n# JP: 精液が、膨れて弾けそうになる。\nれいなの子宮に、僕の全部を送りたくなる。\n2171 = "精液彷彿隨時都要迸發。想要將我的一切，都射入玲奈的子宮。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そうてつ――さぁんっ――は――あっ――れいなっ――おなか――おなかの、おくっ、がっ――きゅんて、して」\n1565 = "「雙鐵先生……啊……插、插到玲奈的……肚子裡面……最深處……」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「っ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: 一緒にイケる。\n思うと同時に大きく大きく腰を引く。\n1964 = "我們能一起高潮。想到這裡我馬上用力抽腰。" \n\n# monologue\n# JP: そして全部を！\n僕の全部を思いっきりにっ！！！\n2084 = "然後把肉棒全部插入！將我的一切都交給她！！！" \n\n# monologue\n# JP: （ずぶううううううううっ！――ごつっ！）\n2345 = "（啾嚕嚕嚕！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「きゅふううううううううううううっ！！！！」\n1374 = "「嗚嗚嗚嗚嗚！！！！」" \n\n# monologue\n# JP: れいなの一番奥へと亀頭がぶつかれば、\n先端に食いつかれるような吸引が来てっ！\n2261 = "龜頭撞到小穴最深處之後，就會感受到強大的吸力。" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「くあっ！」\n# 1346 = "「啊！」" \n\n# monologue\n# JP: （びゅくっ！　どびゅっ！　どびゅるっ！　びゅぶっ！）\n# 2329 = "（咻咻！咻咻！咻咻！咻咻！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あっ――あっ――あっ――あっ――おくっ――おくぅっ――れいなの、おなか――いちばん――おく、にっ――」\n1334 = "「啊啊啊啊啊啊……玲、玲奈的……肚子裡面的……最深處」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「うっ――ぁっ――れい、なっ――」\n1273 = "「呃啊……玲奈……」" \n\n# monologue\n# JP: 腰が、震える。\n精液が、全部、残らず出て行く気がする。\n1987 = "我的腰顫抖起來。精液彷彿要一滴不剩全部射空。" \n\n# monologue\n# JP: （びゅっ！　びゅるっ――びゅううっ――びゅつ――）\n# 2329 = "（咻咻！咻咻！咻咻！咻咻！）" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「せっくす……セックス――んっ――れいな――ちゃんと、\nそうてつ、さんと……んっ――あっ――ふあっ――あっ」\n1233 = "「做愛……做愛……玲奈……和雙鐵先生……做到了……蛤啊……蛤啊……」" \n\n# monologue\n# JP: 腰が、震える。\n精液全部が、からっぽになる。\n2198 = "腰依然在顫抖。體內的精液已經蕩然無存。" \n\n# monologue\n# JP: れいなも大きく大きく震え――\n2087 = "玲奈也在劇烈顫抖著……" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふぁ……あっ――あっ！？」\n1532 = "「蛤啊……啊、啊！？」" \n\n# monologue\n# JP: れいなが、止まる。\n2101 = "玲奈平靜了下來。" \n\n# monologue\n# JP: ポーレットの手が優しく優しく、れいなの髪を撫でている。\nずっと、ずうっと、優しく優しく撫で続けてる。\n2055 = "波萊特溫柔地撫摸著玲奈的頭髮。不停地撫摸，動作出透露出寧靜與祥和。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あの……ポーレっ……あ……んっ」\n1561 = "「那個……波萊特……啊嗯……」" \n\n# monologue\n# JP: れいなが、口をつぐんでしまう。\n必死になって探しているのか、次の言葉がなかなか出ない。\n2139 = "玲奈閉上了嘴。她似乎在拚命思考，但還是想不出下一句話。" \n\n# monologue\n# JP: 初めて目にするその光景を、\n青い瞳は――やさしくやさしく見つめてる。\n2103 = "玲奈從未表現得如此糾結，波萊特對此僅僅只是用藍色的眼眸加以守望。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あの……ありがとう。おかあ、さん」\n1562 = "「那個……謝謝你，媽媽」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「うん」\n# 1378 = "「嗯」" \n\n# monologue\n# JP: ほんのすこしだけ淋しげに――\n見えた微笑みが、けれどすぐに、ふくらんでいく。\n2059 = "波萊特的微笑中似乎有一絲寂寞……但馬上變得燦爛起來。" \n\n# monologue\n# JP: どこまでもどこまでも温かに――\n小さく震える僕の傷さえ、許し包んでくれるほど。\n1875 = "她用無比溫暖的情感，包容了幼小脆弱的我們的傷口。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「おめでとう。\nれいな、双鉄くん」\n1446 = "「恭喜你們。玲奈，雙鐵君」" \n\n# 【双鉄H】\n# display as 雙鐵\n# JP: 「ああ」\n# 1378 = "「嗯」" \n\n# monologue\n# JP: ただそれだけのやりとりで、\nけれど僕らは、結ばれる。\n1809 = "儘管只是隻言片語，但我們確實聯繫在了一起。" \n\n# monologue\n# JP: 痛みを超えて、心を重ねて。\n僕らは、そうして――家族になる。\n2222 = "跨越了痛苦，讓心靈互通。我們……就這樣成為了一家人。" \n