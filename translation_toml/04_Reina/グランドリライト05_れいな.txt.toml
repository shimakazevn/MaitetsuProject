[script]
# lines: 489 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3049 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# 【双鉄】
# display as 雙鐵
# JP: 「路子」
2287 = "「Michiko」"
# 【路子】
# display as 路子
# JP: 「そーちゃん、ひさしぶりだね」
1935 = "「Sou-chan, lâu rồi không gặp nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。またバタバタとしてしまって。\nというか今も、まさにバタバタの真っ最中だ」
2051 = "「Xin lỗi nhé. Anh lại bận rộn quá.\nMà đúng hơn là bây giờ, anh cũng đang ngập đầu trong công việc đây.」"
# monologue
# JP: 言った瞬間、ふと気付く。\n根本的な問題は、未だに解決されないままだ。
2954 = "Ngay khoảnh khắc nói ra điều đó, tôi chợt nhận ra.\nVấn đề cốt lõi, vẫn chưa được giải quyết."
# monologue
# JP: “夢も見ぬほど深い眠り”に、\n今日も僕は、変わらず沈んでいるはずだ。
2585 = "Trong \"giấc ngủ sâu đến mức không thấy mộng mị\",\nhôm nay tôi, chắc chắn vẫn đang chìm đắm trong đó không thay đổi."
# 【路子】
# display as 路子
# JP: 「バタバタって？　そーちゃん、なにかこまってるの？」
2003 = "「Bận rộn á? Sou-chan, anh đang gặp rắc rối gì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1888 = "「Ừ.」"
# monologue
# JP: にもかかわらず、路子に会えているのなら――\n僕は恐らく、助けを求めているのだろう。
2637 = "Mặc dù vậy, nếu tôi vẫn gặp được Michiko——\nCó lẽ tôi, đang tìm kiếm sự giúp đỡ."
# monologue
# JP: 例えば路子が、深層心理の働きであれ、\nあるいは幽霊なり亡霊なり、そういう存在なのであれ。
2573 = "Dù cho Michiko là hoạt động của tâm lý sâu thẳm,\nhay là ma quỷ, vong hồn, hay bất cứ sự tồn tại nào đi chăng nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「議案の、成立の見通しがたってない。\n故に議案を、いまだ提出できずにいる」
2024 = "「Dự luật, chưa có triển vọng được thông qua.\nDo đó, dự luật vẫn chưa thể đệ trình.」"
# 【路子】
# display as 路子
# JP: 「ぎあん？」
2278 = "「Dự luật?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……学級会での議題のようなものだ」
1291 = "「......Giống như chủ đề thảo luận trong buổi sinh hoạt lớp ấy.」"
# monologue
# JP: 時間の止まった路子にあわせて言葉を選べば、\n気持ちもいくらか軽くなる。
2808 = "Chọn từ ngữ phù hợp với Michiko, người có thời gian đã dừng lại,\ntâm trạng tôi cũng nhẹ nhõm hơn đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「術仙という街をテーマパークにしたいのだがな、\nその街自体が、御一夜に昔から暮らす人々の傷なのだ」
2032 = "「Anh muốn biến khu phố tên Jussen thành công viên chủ đề,\nnhưng bản thân khu phố đó, lại là vết thương của những người sống ở Ohimitera từ ngày xưa.」"
# 【路子】
# display as 路子
# JP: 「きず……いたいの？　きず」
1750 = "「Vết thương......có đau không? Vết thương ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さぁな。そこはわからん。今も変わらず痛んでいるのか、\n痛みがぶりかえすことを恐れているのか――」
1701 = "「Ai biết được. Cái đó thì anh không rõ. Bây giờ nó vẫn còn đau,\nhay là họ sợ nỗi đau tái phát——」"
# 【路子】
# display as 路子
# JP: 「そうちゃんは――」
1970 = "「Sou-chan thì——」"
# monologue
# JP: 路子が僕を見あげる瞳に、ドキリとする。\n何の感情も覗けぬほどに――あまりにも静かすぎるゆえ。
2977 = "Ánh mắt Michiko ngước nhìn tôi, khiến tim tôi thót lại.\nĐến mức không thể nhìn thấu bất kỳ cảm xúc nào——bởi vì nó quá đỗi tĩnh lặng."
# 【路子】
# display as 路子
# JP: 「そうちゃんは、きずがいたいとき、どうするの？」
1971 = "「Sou-chan, khi vết thương đau, anh sẽ làm gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、か？　いや、僕の傷の話ではなく――」
2040 = "「Anh, á? Không, không phải chuyện vết thương của anh——」"
# monologue
# JP: 言葉が、そこで止まってしまう。\n喉より奥で、引っかかる。
2955 = "Lời nói, nghẹn lại ở đó.\nMắc kẹt sâu trong cổ họng."
# monologue
# JP: （僕の傷が、痛むとき――）
3052 = "（Khi vết thương của mình, đau nhức——）"
# 【れいな】
# display as ？？？
# JP: 「おきゃくさぁん。終点ですよぉ」
2307 = "「Quý khách ơi~. Đến trạm cuối rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「んむっ！！？」
1870 = "「Ưm!!?」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おきてくれましたぁ」
1918 = "「Ufufu~, anh tỉnh rồi ạ~」"
# monologue
# JP: れいなだ。\nにこにこと笑いつつ、僕を間近にみおろしている。
2778 = "Là Reina.\nĐang mỉm cười tươi tắn, nhìn xuống tôi từ khoảng cách rất gần."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、ぐっすりでしたねぇ。\n起こしたら悪いかなって、思ったんですけどぉ」
2372 = "「Anh Soutetsu, ngủ say quá nhỉ~.\nEm đã nghĩ gọi anh dậy thì có sao không cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1853 = "「Không——」"
# monologue
# JP: 丸みを帯びた木の天井。\n扇風機。網棚。吊革――
2673 = "Trần nhà bằng gỗ uốn cong.\nQuạt máy. Giá để hành lý. Tay vịn——"
# monologue
# JP: 目の前にある物事を順番に把握していけば、\n睡眠による空白時間も埋められる。
2566 = "Nếu lần lượt nắm bắt những sự vật trước mắt,\ntôi có thể lấp đầy khoảng thời gian trống do giấc ngủ mang lại."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、移動の途中に、寝てしまっていたか」
1780 = "「Ra vậy, anh đã ngủ quên trên đường đi sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「無事に合意を得られましたから、\nきっと、安心したんですよ」
2218 = "「Vì đã đạt được thỏa thuận suôn sẻ,\nchắc chắn là, anh đã an tâm rồi đấy.」"
# monologue
# JP: 会談をもう終えたのだろう。\nポーレットの笑顔は軽やかだ。
2800 = "Cuộc đàm phán chắc đã kết thúc rồi.\nNụ cười của Paulette thật nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、\nポーレットが完全に下地を作ってくれていたおかげだ」
2303 = "「Đó là,\nnhờ Paulette đã chuẩn bị nền tảng hoàn hảo cả đấy.」"
# monologue
# JP: やはり、ポーレットには伝わっていた。\nそれだけのことが、ほのかに嬉しい。
2795 = "Quả nhiên, đã truyền đạt được đến Paulette.\nChỉ chừng đó thôi, cũng khiến tôi vui mừng khôn xiết."
# monologue
# JP: 御一夜鉄道担当者としての湯医町長との会談を終え、\nキハ07sに乗車するとき、軽く頷いてみせただけでも。
3021 = "Dù chỉ là một cái gật đầu nhẹ khi lên tàu Kiha 07S,\nsau khi kết thúc cuộc đàm phán với tư cách là người đại diện Đường sắt Ohimitera với Trưởng thị trấn Yui."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、湯医の町長さんと、　\nなんのおはなしをしてきたんですかぁ？」
2371 = "「Anh Soutetsu, với Trưởng thị trấn Yui, \nđã nói chuyện gì vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「マンガ歴史館の設立についてだ」
2360 = "「Về việc thành lập Bảo tàng Lịch sử Manga.」"
# 【れいな】
# display as 玲奈
# JP: 「マンガ歴史館、ですかぁ？」
2162 = "「Bảo tàng Lịch sử Manga, ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「湯医駅周辺の御一夜鉄道の土地を無償貸与して、\n上物は湯医町の建築・管理に任せる、マンガの博物館」
1693 = "「Cho mượn miễn phí khu đất của Đường sắt Ohimitera xung quanh ga Yui,\nphần công trình phía trên sẽ giao cho thị trấn Yui xây dựng và quản lý, một bảo tàng manga.」"
# 【れいな】
# display as 玲奈
# JP: 「わわぁ、なんだか楽しそうですぅ」
1843 = "「Wawa, nghe có vẻ thú vị quá ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「当座は戦前から戦後二十年程までの、現在では電子版も\n入手が難しいようなマンガを中心として収蔵する予定だ」
2217 = "「Trước mắt dự kiến sẽ tập trung lưu trữ những bộ manga từ trước chiến tranh đến khoảng 20 năm sau chiến tranh,\nnhững bộ mà hiện nay khó có thể tìm được bản điện tử.」"
# 【れいな】
# display as 玲奈
# JP: 「そんな珍しいご本、\n集めるのたいへんなんじゃないんですかぁ？」
2349 = "「Những cuốn sách quý hiếm như vậy,\nthu thập chắc vất vả lắm nhỉ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それがね、れいな」
2361 = "「Chuyện đó ấy hả, Reina.」"
# monologue
# JP: ポーレットも実に嬉しげだ。
2806 = "Paulette cũng có vẻ rất vui."
# monologue
# JP: 僕らの構想、地元の資産。\nその両方ががっちり噛み合ったのだから。
2871 = "Ý tưởng của chúng tôi, tài sản của địa phương.\nCả hai thứ đó đã ăn khớp hoàn hảo với nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「湯医出身の高名な先生の全盛期が、ちょうどの時期で。\nだから湯医にはその頃のマンガの蔵書がとても多いの」
2116 = "「Thời kỳ hoàng kim của một tác giả nổi tiếng xuất thân từ Yui, đúng vào khoảng thời gian đó.\nVì vậy, ở Yui có rất nhiều bộ sưu tập manga thời kỳ đó.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　そおなんですねぇ」
1841 = "「Wa! Vậy ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「のみならず。差別化のため、湯医マンガ歴史館には、\n『鉄道マンガ』専門の書架を設けてもらう」
1699 = "「Không chỉ vậy. Để tạo sự khác biệt, Bảo tàng Lịch sử Manga Yui,\nsẽ thiết lập một kệ sách chuyên về 『Manga đường sắt』.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ！」
1835 = "「Waaa!」"
# monologue
# JP: キラキラした目で、れいながポーレットのことを見つめる。
2821 = "Với đôi mắt lấp lánh, Reina nhìn chằm chằm vào Paulette."
# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、ポーレットとパパさんのコレクション。\nその、マンガ歴史館におひっこしするんですねぇ！」
2350 = "「Vậy thì, bộ sưu tập của chị Paulette và bố.\nSẽ chuyển đến Bảo tàng Lịch sử Manga đó nhỉ~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。最近は読んでる時間もあんまりないし、\n読みたくなったら、歴史館で読ませてもらえばいいし」
1899 = "「Ừm. Gần đây chị cũng không có nhiều thời gian để đọc,\nnếu muốn đọc, đến bảo tàng đọc ké là được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにせ土地は御一夜鉄道のものだ。\n駅から歩いて三分せずに入館できることになる」
2253 = "「Dù sao thì đất cũng là của Đường sắt Ohimitera.\nĐi bộ từ ga chưa tới ba phút là vào được bảo tàng rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「それならそれなら、湯医線にのったひとに、\n鉄道のこと、もっと知って好きになってもらえますねぇ」
2313 = "「Nếu vậy nếu vậy, những người đi tuyến Yui,\nsẽ biết thêm và thích đường sắt hơn nhỉ~」"
# monologue
# JP: にっこり笑ったれいなの瞳が、まんまるになる。\nまんまるになった瞳は更にキラキラ、輝きを増し僕をみる。
2858 = "Đôi mắt Reina mỉm cười, trở nên tròn xoe.\nĐôi mắt tròn xoe ấy càng thêm lấp lánh, sáng rực lên nhìn tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいな、わかりましたぁ！　湯医のマンガ歴史館も、\n『レイル・ロマネスク湯医線』の、ひとつなんですねぇ」
2211 = "「Reina, hiểu rồi ạ~! Bảo tàng Lịch sử Manga Yui cũng là,\nmột phần của 『Rail Romanesque tuyến Yui』 nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「賢いな、れいなは。大正解だ」
1736 = "「Thông minh lắm, Reina. Hoàn toàn chính xác.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ」
1915 = "「Ehehe~」"
# monologue
# JP: あどけない笑顔をみればこころがやわらぎ、\n同時に、いくらかの申し訳無さも感じてしまう。
2884 = "Nhìn nụ cười ngây thơ ấy, lòng tôi dịu lại,\nđồng thời, cũng cảm thấy đôi chút có lỗi."
# monologue
# JP: （ひっくり返される危険がある件はどうしても、\n僕らだけで進めるような形になってしまったからな）
3056 = "（Những việc có nguy cơ bị lật lọng, dù thế nào,\ncũng đành phải tiến hành theo kiểu chỉ có chúng tôi thôi.）"
# monologue
# JP: ……宝生元忠自身は最近、活発には動いていないようだが、\nエアクラ工場誘致派は、まったく勢いに衰えをみせない。
1262 = "......Bản thân Houshou Mototada dạo này có vẻ không hoạt động tích cực lắm,\nnhưng phe thu hút nhà máy Aircra, thì hoàn toàn không có dấu hiệu suy giảm khí thế."
# monologue
# JP: 慎重には慎重を期し、関連会議はほとんど市長室内で――\nゆえ、れいなにも、ほとんど話をできていなかった。
2719 = "Phải cẩn trọng hết sức, các cuộc họp liên quan hầu hết diễn ra trong phòng thị trưởng——\nVì vậy, cũng hầu như không nói chuyện được với Reina."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。わたし、キハ07sを\\x%l検修庫;#00ffc040;検修庫%l;#;に戻しますから」
2373 = "「Soutetsu. Tôi, sẽ đưa Kiha 07S về \\x%l検修庫;#00ffc040;xưởng bảo dưỡng%l;#; đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――すまん。長話してしまったな」
1880 = "「A——xin lỗi. Anh nói chuyện hơi lâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、すまなくなんてないです。\nむしろ、双鉄くんにはもう少し長話して欲しいかなって」
2140 = "「Không không, không có gì phải xin lỗi đâu.\nNgược lại, tôi còn muốn Soutetsu nói chuyện lâu hơn một chút cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1903 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「市長室では答えが出せなかった問題。\nまだまだたくさん、抱えちゃってるじゃないですか」
2315 = "「Những vấn đề chưa có câu trả lời trong phòng thị trưởng.\nVẫn còn ôm đồm rất nhiều mà, phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1924 = "「À——」"
# monologue
# JP: なるほど。マンガ図書館の件が正式調印された以上、\nそう遠からず公表となる。
2894 = "Ra vậy. Vụ Thư viện Manga một khi đã chính thức ký kết,\nthì sẽ được công bố trong thời gian không xa."
# monologue
# JP: それと同時に、『レイル・ロマネスク湯医線』\n湯医線の統一イメージ構造も、発表するのは最善だろう。
2790 = "Đồng thời, việc công bố 『Rail Romanesque tuyến Yui』\ncấu trúc hình ảnh thống nhất của tuyến Yui, có lẽ là tốt nhất."
# monologue
# JP: （それまでに、術仙廃炭鉱観光地化議案賛成への票固めを、\nできれば、採決までを済ませておかねばならない）
3046 = "（Trước lúc đó, việc củng cố phiếu bầu tán thành dự luật biến mỏ than bỏ hoang Jussen thành khu du lịch,\nnếu có thể, phải hoàn tất cho đến lúc biểu quyết.）"
# monologue
# JP: となれば守秘より働きかけが重要となるし――\nれいなの視点と経験は、そのための大きな力となろう。
2665 = "Nếu vậy, việc vận động sẽ quan trọng hơn là giữ bí mật——\nGóc nhìn và kinh nghiệm của Reina, sẽ trở thành sức mạnh to lớn cho việc đó."
# 【双鉄】
# display as 雙鐵
# JP: 「それに――」
2248 = "「Hơn nữa——」"
# 【れいな】
# display as 玲奈
# JP: 「それに、なんですかぁ？」
2251 = "「Hơn nữa, là sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや」
2144 = "「Không có gì.」"
# monologue
# JP: あどけなささえ感じるほどの、\n大きくまっすぐなれいなの目。
2840 = "Đôi mắt to tròn, thẳng thắn của Reina,\nđến mức có thể cảm nhận được sự ngây thơ."
# monologue
# JP: この目と"向き合う"ちょうどいい機会になるかもしれん。
2767 = "Có lẽ đây là cơ hội tốt để \"đối mặt\" với đôi mắt này."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しそうだ、と思っただけだ。\nれいなと長話することは」
2025 = "「Anh chỉ nghĩ, có vẻ sẽ vui thôi.\nViệc nói chuyện lâu với Reina ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　れいな、\nそうてつさんとたくさんおはなししていいんですかぁ」
1848 = "「Wa! Reina,\nđược nói chuyện thật nhiều với anh Soutetsu ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん！　ちょうど、わたしも今双鉄くんとれいなに、\nそうしてほしいってお願いしようと思ってたとこなの」
2220 = "「Tất nhiên rồi! Vừa hay, tôi cũng đang định nhờ Soutetsu và Reina,\nlàm như vậy đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「はわわ～、うれしいですよぉ」
1832 = "「Hawawa~, vui quá ạ~」"
# monologue
# JP: れいなのほっぺのてっぺんが、可愛く色濃いピンクになる。\nここまで喜んでもらえるものとは夢にも思っていなかった。
2846 = "Đỉnh gò má của Reina, ửng lên màu hồng đậm đáng yêu.\nTôi không ngờ em ấy lại vui mừng đến mức này."
# 【れいな】
# display as 玲奈
# JP: 「それでれいな、なんのおはなしをすればいいですかぁ」
2344 = "「Vậy Reina, nên nói chuyện gì đây ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「お客様？　それは下車されてからどうぞ。\nあとのことは、わたしがしておくから」
2306 = "「Quý khách? Chuyện đó xin để sau khi xuống xe nhé.\nViệc còn lại, tôi sẽ lo liệu.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ。れいな、おきゃくさまなんですねぇ。\nじゃ、おりなくちゃですぅ」
1828 = "「Wawawa. Reina, là khách hàng nhỉ~.\nVậy thì, phải xuống thôi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレット、あとは頼む」
2156 = "「Nếu vậy, Paulette, phần còn lại nhờ cô nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんこそ、『あとは頼む』です！\nれいなのこと、よろしくお願いしちゃいますね！」
1730 = "「Soutetsu mới là người 『Phần còn lại nhờ cậu』 đấy!\nChuyện của Reina, nhờ cậu chăm sóc nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1943 = "「Rõ rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「今日は、夕方の乗務までなにもありませんから。\nそれまで、自由にしててください」
1717 = "「Hôm nay, cho đến ca trực buổi chiều tối thì không có việc gì đâu.\nCho đến lúc đó, cứ tự do nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわぁ、れいな、おやすみもらっちゃいましたぁ」
1827 = "「Wawawa~, Reina, được nghỉ phép rồi ạ~」"
# monologue
# JP: 働くことが大好きで、御一夜鉄道が大好きで、\nそれでも休みは嬉しいものかと、微笑ましくなる。
2836 = "Rất thích làm việc, rất thích Đường sắt Ohimitera,\nthế mà được nghỉ vẫn thấy vui sao, tôi bất giác mỉm cười."
# 【れいな】
# display as 玲奈
# JP: 「じゃ、そうてつさん、\nひとまずレールショップにいきましょー」
2351 = "「Vậy, anh Soutetsu,\ntrước tiên chúng ta đi đến Cửa hàng đường sắt thôi~」"
# monologue
# JP: （きゅっ）
3053 = "（Nắm lấy）"
# monologue
# JP: れいなが、僕の腕につかまる。\n袖をちょこんと、まぁるい指先でつかまえてくる。
2829 = "Reina, bám lấy cánh tay tôi.\nDùng những ngón tay tròn trịa, túm nhẹ lấy tay áo tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、\nレールショップではさすがに不用心かもしれんな」
1808 = "「Không,\nở Cửa hàng đường sắt thì e là hơi bất cẩn.」"
# 【れいな】
# display as 玲奈
# JP: 「そうなんですかぁ？」
2085 = "「Vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1888 = "「嗯」" 
# monologue
# JP: ハチロク日々姫はすでに承知のことであっても、\nまだ正午前。尋ねるお客もいくらも来るであろうから。
3018 = "Dù Hachiroku và Hibiki đã biết chuyện,\nnhưng vẫn chưa đến buổi trưa. Khách đến hỏi thăm cũng sẽ có khá nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「どこか、内密の話ができるところがいいのだが」
2274 = "「Một nơi nào đó, có thể nói chuyện bí mật thì tốt hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「ないしょばなしですかぁ――あ！」
2013 = "「Nói chuyện bí mật ạ~——A!」"
# monologue
# JP: れいなが嬉しげな声をあげ、\nけれどもすぐに、はにかんだように下を向く。
2864 = "Reina cất giọng vui sướng,\nnhưng ngay lập tức, cúi gằm mặt xuống vẻ thẹn thùng."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　れいな」
2007 = "「Sao vậy? Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「もしよかったら、\nれいな、そうてつさんのおうちにいってみたいですぅ」
1804 = "「Nếu được,\nReina, muốn thử đến nhà anh Soutetsu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいいかもしれんな。というか――\nれいなは、うちははじめてだよな？」
1933 = "「À, ý kiến hay đấy. Mà nói đúng hơn——\nReina, đây là lần đầu đến nhà anh đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「お外は歩いたことありますけど、\nおうちの中には、れいな、入ったことないですよぉ」
1724 = "「Bên ngoài thì em đi bộ qua rồi,\nnhưng bên trong nhà thì, Reina, chưa vào bao giờ đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、酒造見学もしていくか？」
2321 = "「Vậy thì, em có muốn tham quan xưởng ủ rượu luôn không?」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ！　見学もしていいんですかぁ。\nれいな、とーってもうれしいですよぉ！」
1821 = "「Wawawa! Tham quan cũng được ạ~.\nReina, rất là vui luôn đó nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、そうしよう」
2331 = "「Vậy, quyết định thế đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　それじゃあ、\nポーレット、いってきますねぇ」
1949 = "「Vâng ạ! Vậy thì,\nchị Paulette, em đi đây nha~」"
# monologue
# JP: \\x%l検修庫;#00ffc040;検修庫%l;#;へと大きく大きく手を振って、\nれいなはぐっ、と、さっきより強く、僕の袖を引く。
2833 = "Vẫy tay thật mạnh về phía \\x%l検修庫;#00ffc040;xưởng bảo dưỡng%l;#;,\nReina kéo tay áo tôi, mạnh hơn lúc nãy một chút."
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ、焼酎って、こうやって作るんですねぇ。\nれいな、勉強になりましたぁ」
1846 = "「Fuwa~, shochu, được làm như thế này nhỉ~.\nReina, học hỏi được nhiều điều rồi ạ~」"
# monologue
# JP: れいなとふたりの酒蔵見学。\nはしゃいだ声が、遮られることなく響き渡る。
2721 = "Chuyến tham quan xưởng ủ rượu của hai người tôi và Reina.\nGiọng nói phấn khích vang vọng không bị cản trở."
# monologue
# JP: 昼休憩――\nそのタイミングに真闇姉は、貸切状態を作ってくれた。
2886 = "Nghỉ trưa——\nVào thời điểm đó, chị Mayami đã tạo điều kiện cho chúng tôi bao trọn gói."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、よかった。このタンクに入っているものが、\n蒸留を終え、出荷を待つばかりの焼酎だ」
2323 = "「Vậy thì, tốt quá. Những thứ trong bồn chứa này,\nlà shochu đã chưng cất xong, chỉ chờ xuất xưởng thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、おっきなタンクですねぇ」
1842 = "「Waaa, bồn chứa to quá nhỉ~」"
# monologue
# JP: れいながぐるりと回りを回る。
2856 = "Reina đi một vòng xung quanh."
# monologue
# JP: 磨き上げられたステンレスのタンクが、\nその仕草を綺麗に映し出す。
2620 = "Bồn chứa bằng thép không gỉ được đánh bóng loáng,\nphản chiếu rõ nét từng cử chỉ đó."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、鏡みたいですぅ。\nとってもとーってもピカピカですねぇ」
1908 = "「Ufufu~, giống như gương luôn ạ~.\nRất là rất là sáng bóng nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「磨き掃除は、僕も手伝っている。\nタンクのくもりは、味のくもりと教わった」
2060 = "「Việc lau chùi đánh bóng, anh cũng có giúp một tay.\nAnh được dạy rằng bồn chứa bị mờ, thì vị rượu cũng sẽ bị mờ.」"
# 【れいな】
# display as 玲奈
# JP: 「あわわ、それなられいなの軽油、\n味、くもっちゃってるのかもしれませんねぇ」
1834 = "「Awawa, nếu vậy thì dầu diesel của Reina,\nvị, có lẽ cũng bị mờ mất rồi nhỉ~」"
# monologue
# JP: いいながら、れいなはもぞもぞ\n使い込まれたスキットルを取り出す。
2817 = "Vừa nói, Reina vừa lục lọi\nlấy ra một chiếc bình tông đã sờn cũ."
# monologue
# JP: なるほど、たしかにくもりが激しい。\n細かな傷と、油汚れといったところか。
2895 = "Ra vậy, quả thực là mờ đục nghiêm trọng.\nCó lẽ là do những vết xước nhỏ và vết dầu mỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもよければ、僕が磨くが」
2271 = "「Nếu em không phiền, để anh đánh bóng cho nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ、いいんですかぁ？\nそれなられいな、お願いしちゃいたいですぅ」
1825 = "「Wawawa, được không ạ~?\nNếu vậy thì Reina, xin nhờ anh nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだ。喜んで引き受けよう」
2219 = "「Tất nhiên rồi. Anh rất sẵn lòng.」"
# monologue
# JP: はにかむれいなから、スキットルを受け取る。\n手に取れば、ずしり、見た目以上の重みを感じる。
2726 = "Tôi nhận lấy chiếc bình tông từ Reina đang thẹn thùng.\nCầm trên tay, tôi cảm nhận được độ nặng hơn vẻ bề ngoài của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「……大切に使い込まれている品なのだな」
1302 = "「......Đây là một món đồ được sử dụng rất cẩn thận và trân trọng nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ。いちばぁん最初、\nロールアウトしたときからの支給品ですよぉ」
2081 = "「Đúng vậy ạ~. Ngay từ ban đầu,\nlà đồ được cấp phát kể từ lúc em xuất xưởng đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ロールアウトか……れいなは、\n最初から鉱山鉄道で働いていたのだったか？」
1769 = "「Xuất xưởng à......Reina,\ntừ đầu đã làm việc ở đường sắt khai thác mỏ sao?」"
# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ」
2075 = "「Đúng vậy ạ~」"
# monologue
# JP: 弾けるような明るい笑顔。\nつられて言葉が引っ張りだされる。
2885 = "Nụ cười rạng rỡ như bừng sáng.\nBị cuốn theo, những lời nói của tôi cũng tự nhiên thốt ra."
# 【双鉄】
# display as 雙鐵
# JP: 「随分とにこにこしているな。\nれいなの、きっと、それも大きな誇りなのだな」
1738 = "「Em cười tươi quá nhỉ.\nĐó chắc chắn cũng là niềm tự hào to lớn của Reina nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですよぉ。\nれいな、硬上のこでよかったでぇす」
2077 = "「Đúng vậy ạ~.\nReina, thật tốt khi là người con của Katakami ạ~」"
# monologue
# JP: ……旧帝鉄製の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の幾体が、\nこれほどの笑顔で出自を語れるものだろうか。
1251 = "......Trong số các \\x%lレイルロオド;#00ffc040;Railord%l;#; do Đường sắt Hoàng gia cũ chế tạo,\nliệu có mấy người có thể kể về xuất thân của mình với nụ cười tươi tắn như thế này chứ."
# monologue
# JP: そんなことをふと思ってしまえば、\n遠い昔の記憶の欠片も、転がり出てくる。
2697 = "Bất chợt nghĩ về điều đó,\nnhững mảnh ký ức từ thuở xa xưa cũng ùa về."
# 【双鉄】
# display as 雙鐵
# JP: 「……もっと、ちゃんと聞いておけばよかったな」
1293 = "「......Phải chi anh hỏi kỹ hơn thì tốt biết mấy.」"
# 【れいな】
# display as 玲奈
# JP: 「なにをですかぁ？」
2049 = "「Hỏi cái gì cơ ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1881 = "「!?」"
# monologue
# JP: うっかり、口にしてしまっていたか。
2707 = "Lỡ lời, buột miệng nói ra mất rồi sao."
# monologue
# JP: 驚いた顔をしてしまったのだろう、\nれいなの目までが丸くなる。
2752 = "Chắc là tôi đã làm ra vẻ mặt ngạc nhiên lắm,\nđến mức mắt Reina cũng tròn xoe."
# 【れいな】
# display as 玲奈
# JP: 「わわわ、聞いちゃいけないことでしたかぁ？」
1830 = "「Wawawa, là chuyện không được phép hỏi ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。一人ごとを言ったとは思わなかったから、\nそこに驚いただけのことだ」
2142 = "「Không đâu. Chỉ là anh không nghĩ mình lại lẩm bẩm một mình,\nnên mới giật mình thôi.」"
# monologue
# JP: れいなを不安にさせたくない。\n悪いことをしたと思わせたくない。
2709 = "Tôi không muốn làm Reina bất an.\nKhông muốn em ấy nghĩ mình đã làm sai điều gì."
# monologue
# JP: 思えば腕が自然と動く。スキットルを一度脇に置き、\nゆっくりゆっくり、帽子の上かられいなを撫でる。
2696 = "Nghĩ vậy, cánh tay tôi tự nhiên cử động. Đặt chiếc bình tông sang một bên,\ntôi từ từ, từ từ xoa đầu Reina qua lớp mũ."
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ」
1817 = "「Fuwa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんでも、いつでも聞いてくれ。\nれいなが知りたいことならば、僕は喜んで答えよう」
2015 = "「Bất cứ chuyện gì, cứ hỏi anh bất cứ lúc nào.\nNếu là chuyện Reina muốn biết, anh rất sẵn lòng trả lời.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
# 1915 = "「嘿嘿嘿」" 
# monologue
# JP: ふわんと、笑う。
2855 = "Em ấy nở một nụ cười nhẹ nhàng."
# monologue
# JP: 微笑みからぽわぁっと、\n大きなシャボン玉が出てきそうなくらいの、幸福な笑み。
2999 = "Một nụ cười hạnh phúc,\nnhư thể sắp có một bong bóng xà phòng lớn bay ra từ nụ cười ấy."
# 【れいな】
# display as 玲奈
# JP: 「それじゃあれいな、もう一回聞いちゃいますねぇ？\n何を聞いておけばよかったんですかぁ？」
2339 = "「Vậy thì Reina, sẽ hỏi lại một lần nữa nha~?\nAnh đã bảo là phải chi hỏi kỹ hơn chuyện gì vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『[たいと,1]汰斗さんのお話を』だ。\n帝鉄がいかに衰退し、滅びにいたったかという話――」
2106 = "「『Câu chuyện của ông Taito』.\nCâu chuyện về việc Đường sắt Hoàng gia đã suy tàn và đi đến diệt vong như thế nào——」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には不快な話かもしれん。
2997 = "Đối với \\x%lレイルロオド;#00ffc040;Railord%l;#;, có lẽ đây là một câu chuyện không mấy vui vẻ."
# monologue
# JP: 言ってしまってから思いつき、\nれいなの様子を確認するが、頷いて聞いてくれてる。
2762 = "Nói ra rồi tôi mới nhận ra điều đó,\ntôi quan sát thái độ của Reina, nhưng em ấy vẫn gật đầu lắng nghe."
# 【双鉄】
# display as 雙鐵
# JP: 「それを学ぶことは、御一夜市の、御一夜鉄道の\n滅びを回避する、助けになるかもと思ってな」
1997 = "「Anh nghĩ việc tìm hiểu điều đó, có thể sẽ giúp ích\ntrong việc tránh cho thành phố Ohimitera, và Đường sắt Ohimitera khỏi sự diệt vong.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、帝鉄さんのことはわからないけど、\n[カタカミ,1]硬上鉱山鉄道のことならわかりますよぉ」
2178 = "「Reina, không biết về Đường sắt Hoàng gia,\nnhưng nếu là Đường sắt mỏ Katakami thì em biết nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだよな。むしろ規模的に、\n硬上の話の方が、僕らの参考になるかもしれん」
1857 = "「À——đúng vậy nhỉ. Thậm chí xét về quy mô,\ncâu chuyện của Katakami có khi lại là tài liệu tham khảo tốt hơn cho chúng ta.」"
# 【れいな】
# display as 玲奈
# JP: 「ながぁいお話になっちゃうかもしれませんけど」
2310 = "「Có thể sẽ thành một câu chuyện dài đấy ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――」
# 1888 = "「嗯」" 
# monologue
# JP: 昼休憩――僕らの貸し切り時間なら、\nあと30分以上残ってる。
2624 = "Giờ nghỉ trưa——thời gian bao trọn gói của chúng tôi,\nvẫn còn hơn 30 phút nữa."
# monologue
# JP: 見学はざらっと済ませているし……
2920 = "Việc tham quan cũng đã hòm hòm rồi......"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなが大丈夫なら、スキットルを磨く間に、\n話をきかせてもらえると嬉しい」
1745 = "「Nếu Reina không phiền, trong lúc anh đánh bóng bình tông,\nanh sẽ rất vui nếu được nghe em kể chuyện.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、わかりましたぁ」
1952 = "「Vâng ạ~, em hiểu rồi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「こんなもので申し訳ないが」
1996 = "「Xin lỗi vì chỉ có thứ này thôi nhé.」"
# monologue
# JP: 磨き粉と一緒に、ビールケースを二つ持ってくる。
2739 = "Cùng với bột đánh bóng, tôi mang đến hai két bia."
# monologue
# JP: 逆さにし、椅子代わりにと差し出したなら、\nれいなはにこにこちょっこり座る。
2725 = "Úp ngược lại, đưa cho em ấy dùng tạm làm ghế,\nReina mỉm cười rồi ngồi ngoan ngoãn lên đó."
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ。\nなんだかこういうのってプロっぽいですねぇ」
1919 = "「Ehehe~.\nThế này trông cứ như dân chuyên nghiệp ấy nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「[じょうぞう,1]醸造はどうかわからんが、[さかどんや,2]酒問屋としてなら、\nれいなは一流のプロになれると思うぞ」
1702 = "「Việc ủ rượu thì anh không rõ, nhưng nếu là đại lý bán buôn rượu,\nanh nghĩ Reina có thể trở thành một chuyên gia hạng nhất đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「[さかどんや,2]酒問屋さんって、\nそうてつさんの前のお仕事ですかぁ？」
2354 = "「Đại lý bán buôn rượu,\nlà công việc trước đây của anh Soutetsu ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「前の――というか、見習いで、休職中だな。\nことと次第によっては、酒問屋見習いに逆戻りだ」
1705 = "「Trước đây——nói đúng hơn là, học việc, và đang tạm nghỉ.\nTùy vào tình hình, có thể anh sẽ quay lại làm người học việc ở đại lý rượu.」"
# 【れいな】
# display as 玲奈
# JP: 「それでれいなが酒問屋さんになったら……\nうふふぅ、そうてつさんとおそろいですねぇ」
2347 = "「Vậy nếu Reina trở thành người bán buôn rượu......\nUfufu~, thì sẽ giống hệt anh Soutetsu nhỉ~」"
# monologue
# JP: その光景を空想してくれているのだろうか？\nれいなは実に、しあわせそうに微笑んでいる。
2866 = "Có phải em ấy đang tưởng tượng ra viễn cảnh đó không?\nReina đang mỉm cười trông thật sự hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「それも実に楽しそうだな。\nだがしかし。同じ同僚なら、御一夜鉄道の方がいい」
2259 = "「Chuyện đó nghe cũng thú vị thật đấy.\nNhưng mà. Nếu là đồng nghiệp, thì ở Đường sắt Ohimitera vẫn tốt hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ、ほんとにそうですねぇ」
1822 = "「Wawawa, đúng là vậy nhỉ~」"
# monologue
# JP: 頷き返す。\nれいなも小さく、強く頷く。
2766 = "Tôi gật đầu đáp lại.\nReina cũng gật đầu một cái nhỏ nhưng dứt khoát."
# monologue
# JP: なら、聞くだけだ。磨き粉を、スポンジに巻いた\nラップにつけて、れいなのスキットルを磨き始める。
3006 = "Vậy thì, chỉ việc lắng nghe thôi. Tôi bôi bột đánh bóng lên miếng màng bọc\nquấn quanh miếng bọt biển, và bắt đầu đánh bóng chiếc bình tông của Reina."
# 【れいな】
# display as 玲奈
# JP: 「硬上鉱山は、[おうてっこう,2]黄鉄鉱の鉱山だったんですよぉ」
2166 = "「Mỏ Katakami, là mỏ quặng sắt pyrit đó ạ~」"
# monologue
# JP: れいなは、ゆっくり語ってくれる。\n黄鉄鉱のこと、鉱山のこと。鉱山鉄道のこと。
2863 = "Reina, từ từ kể cho tôi nghe.\nVề quặng sắt pyrit, về khu mỏ. Về đường sắt khai thác mỏ."
# monologue
# JP: そして、鉱山の街に暮らしていた、\nあたたかで優しいひとたちのこと。
3002 = "Và về những con người ấm áp, tốt bụng,\nđã từng sinh sống ở khu phố mỏ."
# 【れいな】
# display as 玲奈
# JP: 「れいなは、お客さんも運びましたし。\n\\x%l貨車;#00ffc040;貨車%l;#;も引っ張りましたし、[にもつ,1]荷物列車もやりましたぁ」
2201 = "「Reina, cũng từng chở khách này.\nCũng từng kéo \\x%l貨車;#00ffc040;toa chở hàng%l;#; này, và cả tàu hành lý nữa ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「[にもつ,1]荷物列車？」
2267 = "「Tàu hành lý?」"
# 【れいな】
# display as 玲奈
# JP: 「キハ[れいなな,1]07のお客さんを乗せるスペースに、小包とか、\nお手紙とかを乗せることですよぉ」
1976 = "「Là dùng không gian chở khách của Kiha 07, để chở bưu kiện,\nhay thư từ đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、キハ07自体を\\x%l貨車;#00ffc040;貨車%l;#;のように使うのか。\nそんな運用があるほどに――栄えていたのだな」
1860 = "「À, dùng chính Kiha 07 như một \\x%l貨車;#00ffc040;toa chở hàng%l;#; sao.\nĐến mức có cả cách vận hành như vậy——chắc hẳn nơi đó từng rất phồn vinh nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。とってもとーってもにぎやかでした。\nれいな、ひとり[こんごう,1]混合列車だってしちゃいましたからぁ」
2078 = "「Đúng vậy ạ~. Rất là rất là náo nhiệt luôn.\nReina, còn từng chạy tàu hỗn hợp một mình nữa cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとり混合列車？\n混合列車というのは――」
1884 = "「Tàu hỗn hợp một mình?\nTàu hỗn hợp nghĩa là——」"
# 【れいな】
# display as 玲奈
# JP: 「本当は、機関車が、\\x%l客車;#00ffc040;客車%l;#;と\\x%l貨車;#00ffc040;貨車%l;#;、\n両方を一\\x%l編成;#00ffc040;編成%l;#;で引くことですけどぉ」
2121 = "「Thực ra thì, đầu máy xe lửa,\nkéo cả \\x%l客車;#00ffc040;toa hành khách%l;#; và \\x%l貨車;#00ffc040;toa chở hàng%l;#; trong cùng một \\x%l編成;#00ffc040;đoàn tàu%l;#; ạ~」"
# monologue
# JP: れいなの短い手がうごき、\n空中に、長方形の箱を書く。
2859 = "Đôi tay ngắn của Reina cử động,\nvẽ một hình hộp chữ nhật trong không trung."
# 【れいな】
# display as 玲奈
# JP: 「れいなの場合は、キハ07の車内をはんぶんこに\nわけて、お客さんと荷物、両方はこんじゃったんです」
2207 = "「Trong trường hợp của Reina, là chia đôi không gian bên trong Kiha 07,\nrồi chở cả khách lẫn hành lý luôn đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。それでひとり混合列車か。\nお客さんの中には、邪魔に思う人もいたのでは？」
1784 = "「Ra vậy. Nên mới gọi là tàu hỗn hợp một mình sao.\nTrong số hành khách, chắc cũng có người thấy phiền phức chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「いいええ。みんな[おやま,1]鉱山の人ですから。\n貨物や荷物が一番だって、わかってるですよぉ」
1866 = "「Không đâu ạ~. Mọi người đều là người của khu mỏ mà.\nHọ đều hiểu rằng hàng hóa và hành lý là quan trọng nhất nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。鉱山鉄道は――というか鉄道\nそのものが、貨物輸送のためのものだったのだよな」
1927 = "「À, ra vậy. Đường sắt khai thác mỏ——hay đúng hơn là bản thân đường sắt,\nvốn dĩ được sinh ra là để vận chuyển hàng hóa mà.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいなが来る前の[カタカミ,1]硬上も、\nそうだったっていうお話でしたぁ」
2091 = "「Vâng ạ~. Nghe kể lại thì Katakami trước khi Reina đến,\ncũng giống như vậy đó ạ~」"
# monologue
# JP: ……最初はトロッコさえもなく、機関車や、\nときには\\x%l貨車;#00ffc040;貨車%l;#;の空きスペースへの同乗だった。
1247 = "......Ban đầu thậm chí còn không có xe goòng, hành khách phải đi nhờ trên đầu máy,\nhoặc đôi khi là trong không gian trống của \\x%l貨車;#00ffc040;toa chở hàng%l;#;."
# monologue
# JP: 人口が増え発展をしていくにつれ、\n簡易\\x%l客車;#00ffc040;客車%l;#;が増設されて、そうしてやがて――
3015 = "Cùng với sự gia tăng dân số và phát triển,\ncác \\x%l客車;#00ffc040;toa hành khách%l;#; đơn giản đã được bổ sung, và rồi chẳng bao lâu sau——"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。れいなが大歓迎され、愛されたわけだ。\n待望の客席登場だったのだろうからなぁ」
2045 = "「Ra vậy. Thảo nào Reina lại được chào đón và yêu mến đến thế.\nBởi vì sự xuất hiện của em chính là khoang hành khách mà mọi người hằng mong đợi mà.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ。本当に大事にしてもらいましたぁ。\n[れいななえす,4]キハ07sになる前から、内装はずーっと修理なしです」
2070 = "「Đúng vậy ạ~. Mọi người thật sự rất trân trọng em.\nTừ trước khi trở thành Kiha 07S, nội thất bên trong chưa từng phải sửa chữa lần nào đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――凄いな」
2311 = "「Thế thì——tuyệt thật đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも他の\\x%l気動車;#00ffc040;気動車%l;#;さんたちも、しあわせでしたぁ。\nけど、[おやま,1]鉱山。あっという間にかたむいちゃったんです」
2193 = "「Reina và các \\x%l気動車;#00ffc040;toa xe tự hành%l;#; khác, đều rất hạnh phúc ạ~.\nNhưng mà, khu mỏ. Chớp mắt một cái đã lụi tàn mất rồi.」"
# monologue
# JP: れいなの口調は、柔らかなまま変わらない。\nいつものれいなで、おだやかに――
2844 = "Giọng điệu của Reina, vẫn giữ nguyên vẻ dịu dàng không đổi.\nVẫn là Reina như mọi khi, một cách điềm tĩnh——"
# monologue
# JP: 一つの時代が、一つの[まち,1]鉱山が、\n終わりゆくさまを、語ってくれる。
3025 = "Kể cho tôi nghe về sự kết thúc,\ncủa một thời đại, của một khu mỏ."
# 【れいな】
# display as 玲奈
# JP: 「全部が、いっぺんに来た感じでしたぁ。円高と、\n産出量がへるのと、人がへるのと、トラック輸送と」
2047 = "「Cảm giác như mọi thứ, ập đến cùng một lúc vậy ạ~. Đồng Yên tăng giá,\nsản lượng giảm sút, người dân thưa thớt, và cả vận tải bằng xe tải nữa.」"
# monologue
# JP: エアクラ以前。ガソリン自動車の大発展と台頭。\n他の要因も噛み合っての、経営の急速な悪化。
2655 = "Trước thời kỳ Aircra. Sự phát triển vượt bậc và trỗi dậy của ô tô chạy bằng xăng.\nCộng hưởng với các yếu tố khác, dẫn đến tình hình kinh doanh xấu đi nhanh chóng."
# 【れいな】
# display as 玲奈
# JP: 「れいなは、最後まで[おやま,1]鉱山を見てましたけど……」
2175 = "「Reina, đã chứng kiến khu mỏ cho đến tận phút cuối cùng......」"
# monologue
# JP: 廃鉱、閉山。大廃線がとどめとなっての、鉄道廃止。\nそうして、誇りであった自社発注機、キハ07　2の売却。
2605 = "Mỏ bị bỏ hoang, đóng cửa. Cuộc Đại bãi bỏ các tuyến đường sắt như một đòn kết liễu, dẫn đến việc bãi bỏ tuyến đường sắt.\nVà rồi, họ phải bán đi chiếc Kiha 07-2, cỗ máy đặt hàng riêng từng là niềm tự hào của họ."
# monologue
# JP: かつては栄えた硬上の町は、今では通う人も乏しい、\n孤立した町となってしまった――。
2785 = "Thị trấn Katakami từng một thời phồn vinh, giờ đây vắng bóng người qua lại,\ntrở thành một thị trấn cô lập——."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。れいなから見て、\n鉱山にとって一番の打撃となった――いや」
2061 = "「Ra vậy. Theo góc nhìn của Reina,\nđòn giáng mạnh nhất đối với khu mỏ là——không.」"
# monologue
# JP: その聞き方では、多分、答えが歪んでしまう。
2996 = "Cách hỏi đó, có lẽ, sẽ làm câu trả lời bị bóp méo."
# monologue
# JP: とてもやさしいれいなのこころを、\nそのまま聞ける言葉を、丁寧に選びださねばならん。
2729 = "Tôi phải cẩn thận lựa chọn những từ ngữ,\ncó thể lắng nghe trọn vẹn trái tim vô cùng nhân hậu của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなが――\n一番さみしいと感じたことは、なんだった？」
2110 = "「Reina——\nCảm thấy buồn nhất là chuyện gì?」"
# 【れいな】
# display as 玲奈
# JP: 「一番さみしかったのは……\n町から笑顔が、だんだんへっていったことです」
2111 = "「Điều buồn nhất là......\nNhững nụ cười trong thị trấn, cứ vơi dần đi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1868 = "「Hừm.」"
# 【れいな】
# display as 玲奈
# JP: 「おひっこしが始まって。仲良しがいなくなって。\nそうしたらまた、おひっこしがあって――」
2058 = "「Mọi người bắt đầu chuyển đi. Những người bạn thân thiết không còn nữa.\nRồi sau đó lại, có thêm người chuyển đi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「人口流出か」
1711 = "「Là tình trạng chảy máu dân số sao.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。人がどんどんへっちゃうと、\n残った人の笑顔も、どんどんへっちゃいました」
2088 = "「Vâng ạ~. Khi người dân cứ thưa dần,\nnụ cười của những người ở lại, cũng vơi đi theo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1295 = "「......Vậy sao.」"
# monologue
# JP: れいなの顔から、笑みが消えてる。\n僕の心にも、痛みが伝わる。
2843 = "Nụ cười đã vụt tắt, trên gương mặt Reina.\nNỗi đau ấy, truyền cả vào trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「さみしかったな」
1740 = "「Chắc em buồn lắm nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ。れいな――\nれいな、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから」
2308 = "「Đúng vậy ạ~. Reina——\nReina, là \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# monologue
# JP: きゅっと、れいなの手が、僕の服の裾をつかんでくる。
2828 = "Bàn tay Reina, nắm chặt lấy vạt áo tôi."
# 【れいな】
# display as 玲奈
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、人間のみなさんが決めたこと、\n全部理由があって大事ってわかってますけど、でも」
2203 = "「Bởi vì là \\x%lレイルロオド;#00ffc040;Railord%l;#;, nên em hiểu những quyết định của con người,\ntất cả đều có lý do và rất quan trọng, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「安心しろ、れいな」
1732 = "「Yên tâm đi, Reina.」"
# monologue
# JP: こんな表情をさせてはいけない。\n思いは、そのまま言葉に変わる。
2711 = "Không được để em ấy làm ra vẻ mặt như vậy.\nSuy nghĩ trong đầu tôi, lập tức hóa thành lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「二度と、そんな思いはさせない」
2020 = "「Anh sẽ không để em phải trải qua cảm giác đó lần thứ hai đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「あ」
1871 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、磨き上がったぞ」
2246 = "「Đây, anh đánh bóng xong rồi này.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁぁ！」
# 1835 = "「哇！」" 
# monologue
# JP: ピカピカに為ったスキットルを手渡せば、\nれいなの顔も、輝いてくれる。
2737 = "Khi tôi trao lại chiếc bình tông sáng bóng,\ngương mặt Reina, cũng bừng sáng theo."
# 【れいな】
# display as 玲奈
# JP: 「すごいですぅ！　新品のときも、\nこんなに綺麗じゃなかった気がしますよぉ。ふぅう」
1938 = "「Tuyệt quá ạ~! Em có cảm giác ngay cả lúc mới tinh,\nnó cũng không đẹp đến mức này đâu nha~. Phù~」"
# monologue
# JP: 口をとがらせ、息を吹きかけ、\nれいなは袖で、スキットルの表面をゆっくりと拭く。
2824 = "Chu môi ra, thổi phù một hơi,\nReina dùng tay áo, từ từ lau bề mặt chiếc bình tông."
# monologue
# JP: かえって傷がついてしまいそうな気もするが、\nなに、それならそれで、磨き直せばいいだけだ。
2699 = "Dù có cảm giác làm vậy sẽ khiến nó bị xước thêm,\nnhưng không sao, nếu vậy thì, chỉ việc đánh bóng lại là được."
# 【れいな】
# display as 玲奈
# JP: 「れいなのおかおも、そうてつさんのおかおも、\n映りますねぇ。えっへへ～！　にこにこですよぉ」
2209 = "「Cả khuôn mặt của Reina, và khuôn mặt của anh Soutetsu,\nđều in bóng lên đây nhỉ~. Ehehe~! Cười tươi rói luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。磨けば光るし、笑顔にもなれる。\n人も物も、そう簡単には朽ちぬものさ」
1897 = "「Ừm. Nếu đánh bóng thì sẽ sáng, và cũng có thể nở nụ cười.\nCon người hay sự vật, đều không dễ dàng mục nát đâu.」"
# monologue
# JP: 僕自身がなによりの証明だ。\n傷つき、壊れ、憎しみに満ち満ちていたけれど――
2757 = "Chính bản thân tôi là minh chứng rõ ràng nhất.\nDù đã từng tổn thương, vỡ vụn, và ngập tràn lòng căm hận——"
# 【双鉄】
# display as 雙鐵
# JP: 「どれ程くもってしまおうと、朽ちぬ限りは輝ける。\n残った人たちも、引っ越した人たちも、きっと同じだ」
1865 = "「Dù có bị mờ đục đến đâu, chỉ cần chưa mục nát thì vẫn có thể tỏa sáng.\nNhững người ở lại, hay những người đã chuyển đi, chắc chắn cũng vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「あ！」
1876 = "「A!」"
# monologue
# JP: スキットルを大事にかかえるれいなの両手に、\n両手を重ねる。つつみこむ。
2718 = "Lên đôi bàn tay đang nâng niu chiếc bình tông của Reina,\ntôi đặt hai tay mình lên. Bao bọc lấy."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜でれいなの笑顔が輝いているのと同じように。\nこのスキットルが、また輝いたのとおんなじように」
1972 = "「Cũng giống như nụ cười của Reina đang tỏa sáng ở Ohimitera vậy.\nCũng giống như chiếc bình tông này, lại tỏa sáng một lần nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　きっと、きっと、そうですねぇ。\nきっと、絶対、そうですよぉ！」
2102 = "「Vâng ạ~! Chắc chắn, chắc chắn, là vậy rồi nhỉ~.\nChắc chắn, tuyệt đối, là vậy đó nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それに、れいなのおかげで、\n問題解決のためにすべきことも、見えた気がする」
2256 = "「Hơn nữa, nhờ có Reina,\nanh nghĩ mình đã thấy được những việc cần làm để giải quyết vấn đề.」"
# 【れいな】
# display as 玲奈
# JP: 「問題、ですかぁ？」
1883 = "「Vấn đề, ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。術仙炭鉱のテーマパーク化の話なのだが――」
1894 = "「Ừm. Chuyện biến mỏ than Jussen thành công viên chủ đề ấy——」"
# monologue
# JP: かつては術仙に関わり、あるいは暮らしていた人たちは、\nれいなと同じく、さみしい思いを痛みと抱え続けて来た。
2786 = "Những người từng gắn bó với Jussen, hay từng sinh sống ở đó,\ncũng giống như Reina, đã mang theo nỗi buồn như một vết thương lòng."
# monologue
# JP: ならば、それを繰り返させぬ――そう信じてもらえる\n体制を作ることこそが、説得のための最短だろう。
3008 = "Nếu vậy, không để chuyện đó lặp lại——việc tạo ra một hệ thống\ncó thể khiến họ tin tưởng điều đó, chính là con đường ngắn nhất để thuyết phục."
# 【れいな】
# display as 玲奈
# JP: 「なるほどですぅ」
2109 = "「Ra là vậy ạ~」"
# monologue
# JP: わかったような、あんまりわかってないような、\nどこかぽわんとした返事。
2861 = "Lời đáp lại có vẻ hơi lơ lửng,\nnhư hiểu mà cũng như không hiểu lắm."
# 【れいな】
# display as 玲奈
# JP: 「どうやったら、くりかえさないって、\n信じてもらえるんですかぁ」
2334 = "「Làm thế nào, để mọi người tin rằng,\nsẽ không lặp lại chuyện đó ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、そこだ」
1967 = "「Chà, vấn đề là ở chỗ đó.」"
# monologue
# JP: れいなは僕を信じてくれている。\n故に言葉での約束も、信じて受け止めてくれている。
2850 = "Reina tin tưởng tôi.\nVì thế, những lời hứa bằng miệng, em ấy cũng tin tưởng và đón nhận."
# monologue
# JP: が、御一夜に古くから住まう人たちにとっては、\n僕は所詮は、外来者だ。
2599 = "Nhưng, đối với những người đã sống ở Ohimitera từ lâu,\ntôi rốt cuộc, cũng chỉ là một kẻ ngoại lai."
# 【双鉄】
# display as 雙鐵
# JP: 「……やはり、説得力ある計画案を示すしかなかろう。\nテーマパーク化では足りぬなら、それ以上の物を」
1300 = "「......Quả nhiên, chỉ còn cách đưa ra một bản kế hoạch đầy sức thuyết phục.\nNếu công viên chủ đề là chưa đủ, thì phải là một thứ gì đó hơn thế nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「ならなられいなも、お手伝いしていいですかぁ？」
2338 = "「Nếu vậy nếu vậy, Reina cũng, giúp một tay có được không ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎だ」
2377 = "「Rất hoan nghênh.」"
# monologue
# JP: 今日、硬上の廃鉱山の話を聞かせてもらってわかった。\nれいなからは、ふたりきりのときにしか聞けぬ話があると。
2925 = "Hôm nay, sau khi nghe chuyện về mỏ than bỏ hoang ở Katakami, tôi đã hiểu.\nTừ Reina, có những chuyện chỉ khi hai người ở riêng mới có thể nghe được."
# monologue
# JP: ポーレットを大事に思うゆえ、彼女が共にいる場では、\nれいなは過去を、言葉にしなくなるのだと。
2649 = "Vì luôn trân trọng Paulette, nên khi có mặt cô ấy,\nReina sẽ không nói về quá khứ nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、れいなの空き時間に僕があわせよう。\nできるだけ早く、ふたりで術仙廃炭鉱を視察しよう」
2326 = "「Vậy thì, anh sẽ sắp xếp theo thời gian rảnh của Reina.\nCàng sớm càng tốt, hai chúng ta hãy cùng đi khảo sát mỏ than bỏ hoang Jussen.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　わかりましたぁ。れいな、一生懸命、\nそうてつさんのおてつだい、がんばりますねぇ！」
1947 = "「Vâng ạ~! Em hiểu rồi~. Reina, sẽ cố gắng hết sức,\ngiúp đỡ anh Soutetsu nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ああ――ならば、ついで、といってはアレだが」
1887 = "「Ừm. À——vậy thì, nhân tiện, nói vậy thì hơi kỳ nhưng.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。なんですかぁ？」
1715 = "「Vâng ạ~. Chuyện gì vậy ạ~?」"
# monologue
# JP: のんびりした声を聞いてしまえば、\nれいなに聞くようなことではないという気もしてくる。
2926 = "Nghe giọng điệu thong thả ấy,\ntôi lại có cảm giác đây không phải chuyện nên hỏi Reina."
# monologue
# JP: が、れいなは僕より……眠り続けていたハチロクよりも、\n長い実働時間を、鉄道とともに過ごしているゆえ――
2601 = "Nhưng, Reina so với tôi......hay so với Hachiroku đã ngủ một giấc dài,\nđã dành nhiều thời gian hoạt động thực tế gắn bó với đường sắt hơn——"
# 【双鉄】
# display as 雙鐵
# JP: 「硬上鉄道では、路線延伸の為の用地買収のようなことは、\n行われていたのか？」
2167 = "「Ở Đường sắt Katakami, những việc như mua lại đất đai để mở rộng tuyến đường,\ncó từng được thực hiện không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、そのへんのことはわからないですぅ」
2312 = "「Reina, không biết mấy chuyện đó đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか」
1863 = "「À——vậy sao.」"
# monologue
# JP: 残念ではあるが、ほっとする。
3019 = "Tuy có hơi tiếc, nhưng tôi lại thấy nhẹ nhõm."
# monologue
# JP: 用地買収実例集にあげられているような世界と、\nやはりれいなは、無縁であったと確認できて。
2935 = "Bởi vì tôi đã xác nhận được rằng, thế giới như trong các ví dụ về mua lại đất đai,\nquả nhiên không hề liên quan đến Reina."
# 【れいな】
# display as 玲奈
# JP: 「買収と延伸は、なんていっても、\nやっぱり帝鉄さんですからぁ」
2281 = "「Mua lại và mở rộng, dù nói gì đi nữa,\nthì vẫn là chuyện của Đường sắt Hoàng gia mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1876 = "「啊！」" 
# monologue
# JP: まさしく、そこは盲点だった。\n赤井宮司は、元帝鉄。
2754 = "Quả thực, đó là một điểm mù.\nThầy cúng Akai, là cựu nhân viên Đường sắt Hoàng gia."
# monologue
# JP: 直接に買収に関わっていた経験があるかはしらんが、\nその方面の人脈を、あるいは持っているかもしれん。
3017 = "Dù không rõ ông ấy có kinh nghiệm trực tiếp tham gia mua lại hay không,\nnhưng có lẽ ông ấy có những mối quan hệ trong lĩnh vực đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……夕方の乗務までは、まだ随分と時間があるな」
1311 = "「......Từ giờ đến ca trực buổi chiều tối, vẫn còn khá nhiều thời gian nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、行くならおともするですよぉ」
1741 = "「Reina, nếu anh đi thì em sẽ đi cùng nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1889 = "「Ừm!」"
# monologue
# JP: まずは電話だ。
2619 = "Trước tiên là gọi điện thoại."
# monologue
# JP: そこまで焦る必要もないが、できることなら、\nこの良い流れを、決して無駄にはしたくない。
3022 = "Dù không cần phải vội vã đến thế, nhưng nếu có thể,\ntôi tuyệt đối không muốn lãng phí mạch diễn biến tốt đẹp này."
# monologue
# JP: （いや、よい流れというか――）
3044 = "（Không, nói là mạch diễn biến tốt đẹp thì——）"
# 【れいな】
# display as 玲奈
# JP: 「？　なんですかぁ、そうてつさぁん」
1905 = "「? Có chuyện gì vậy ạ~, anh Soutetsu~」"
# monologue
# JP: にこにこにこ。\n幸運の女神というには、あどけなすぎるほどの笑顔。
2651 = "Cười tươi rói.\nMột nụ cười quá đỗi ngây thơ để gọi là nữ thần may mắn."
# 【双鉄】
# display as 雙鐵
# JP: 「いや。ことわざには、真実が混じっていると思ってな」
2145 = "「Không có gì. Anh chỉ nghĩ là, trong tục ngữ cũng có pha lẫn sự thật thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ことわざですかぁ」
1748 = "「Tục ngữ ạ~?」"
# monologue
# JP: 笑う門には福来る。\nならば僕も、少しでも――あやかれるよう、笑ってみよう。
2908 = "Nụ cười mang lại phước lành.\nNếu vậy thì tôi cũng, thử cười xem sao——để được hưởng lây chút may mắn."
# 【双鉄】
# display as 雙鐵
# JP: 「貴重なお話。まことにありがとうございました」
2260 = "「Một câu chuyện rất quý giá. Thật sự cảm ơn ông rất nhiều.」"
# 【赤井】
# display as 赤井
# JP: 「いえ、こちらも懐かしい話ができました」
2141 = "「Không có gì, tôi cũng được ôn lại những chuyện xưa cũ.」"
# monologue
# JP: 赤井宮司は穏やかな笑顔を浮かべようとし――\nけれども、上手にできていない。
2969 = "Thầy cúng Akai cố nở một nụ cười điềm đạm——\nNhưng mà, ông ấy làm không được tự nhiên cho lắm."
# monologue
# JP: ……大廃線末期。帝鉄解体、まさに真っ最中の動乱。\nそうした思い出話はやはり、宮司にとっても傷なのだろう。
1258 = "......Thời kỳ cuối của cuộc Đại bãi bỏ. Sự giải thể của Đường sắt Hoàng gia, ngay giữa lúc hỗn loạn nhất.\nNhững câu chuyện hồi ức đó quả nhiên, đối với thầy cúng cũng là một vết thương lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「門前払いをされても当然と覚悟してのご相談でしたが、\n思いもかけぬほど親身にご対応頂け、感謝しています」
2034 = "「Cháu đã chuẩn bị tinh thần bị từ chối ngoài cửa khi đến nhờ vả,\nnhưng không ngờ lại được ông tiếp đón tận tình thế này, cháu rất biết ơn ạ.」"
# 【赤井】
# display as 赤井
# JP: 「双鉄君のことは汰斗さんからも頼まれておりますし、\n御一夜市に関わることであれば、我がことですから」
2136 = "「Chuyện của cậu Soutetsu tôi cũng đã được ông Taito gửi gắm,\nhơn nữa, những chuyện liên quan đến thành phố Ohimitera, cũng là chuyện của tôi mà.」"
# monologue
# JP: 今度は、穏やかで自然な笑顔。\nけれどもそれは、ほんの一瞬でこわばってしまう。
2995 = "Lần này, là một nụ cười điềm đạm và tự nhiên.\nNhưng nó lại trở nên cứng đờ chỉ trong tích tắc."
# 【赤井】
# display as 赤井
# JP: 「もしも、後東と連絡を取りたいと思うのなら――」
1957 = "「Nếu như, cậu muốn liên lạc với Gotou——」"
# monologue
# JP: 後東槐多。路線用地買収について、\n赤井宮司が有しているという、唯一の"心当たり"。
2676 = "Gotou Kaita. Về việc mua lại đất đai cho tuyến đường,\nlà \"manh mối\" duy nhất mà thầy cúng Akai có được."
# monologue
# JP: 大廃線末期の動乱を上手く渡って元手を作り、今は帝都で、鉄道会社復興を準備しているそうだが……
3005 = "Nghe nói ông ta đã khéo léo vượt qua sự hỗn loạn cuối thời kỳ Đại bãi bỏ để tạo vốn liếng, và hiện đang chuẩn bị phục hưng công ty đường sắt ở Đế đô......"
# 【赤井】
# display as 赤井
# JP: 「私と彼とは、精算しきれぬ負債を相互に負っています。\nわたしからの話であれば、無視はされません」
2022 = "「Tôi và ông ta, mang những món nợ lẫn nhau không thể nào thanh toán hết.\nNếu là lời từ tôi, ông ta sẽ không phớt lờ đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「たいへんに心強いお話と思います」
2224 = "「Cháu thấy đó là một điều vô cùng đáng tin cậy.」"
# 【赤井】
# display as 赤井
# JP: 「しかし、後東は"強盗"との異名を持つような男です。\n路線だけでなく、なにもかもを買収し、売り払っていく」
1811 = "「Tuy nhiên, Gotou là kẻ có biệt danh \"Cường đạo\".\nKhông chỉ tuyến đường, ông ta mua lại mọi thứ, rồi bán tống bán tháo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1888 = "「嗯」" 
# monologue
# JP: 慎重極まる赤井宮司が、これほど強い言葉を使う。\n"無視はされない"と断言する。
2799 = "Một người cực kỳ thận trọng như thầy cúng Akai, lại dùng những từ ngữ mạnh mẽ đến vậy.\nKhẳng định chắc nịch rằng \"sẽ không bị phớt lờ\"."
# monologue
# JP: "精算しきれぬ相互の負債"が一体いかなるものであるのか\n――僕には、想像さえもできない。
2750 = "Rốt cuộc \"những món nợ lẫn nhau không thể thanh toán hết\" là thứ gì\n——Tôi thậm chí không thể tưởng tượng nổi."
# 【赤井】
# display as 赤井
# JP: 「彼をもしプロジェクトに招き入れるなら、冗談ではなく、\n身ぐるみ剥がされることも覚悟してください」
1960 = "「Nếu cậu mời ông ta tham gia vào dự án, không phải đùa đâu,\nhãy chuẩn bị tinh thần bị lột sạch sành sanh đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご助言ありがとうございます。後東様へのご連絡を\nお願いするかどうか等、稀咲と[あね,1]義姉に相談しようかと」
2017 = "「Cảm ơn ông đã khuyên bảo. Về việc có nhờ ông liên lạc với ông Gotou hay không,\ncháu định sẽ bàn bạc lại với Kisaki và chị gái.」"
# 【赤井】
# display as 赤井
# JP: 「ああ、宝生さんのお嬢さんは、\n双鉄くんのプロジェクトチームに」
1855 = "「À, tiểu thư nhà Houshou,\nđang ở trong đội dự án của cậu Soutetsu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、ではありませんが。みらいいき列車プロジェクトに、\n稀咲も参加してくれています」
2368 = "「Không phải của cháu đâu ạ. Kisaki cũng đang tham gia\nvào dự án Tàu hỏa hướng tới tương lai.」"
# 【赤井】
# display as 赤井
# JP: 「それはいい。なんだかんだで宝生さんは親バカだ。\n仮に稀咲さんが危なくなれば――怪獣対決になりますね」
2054 = "「Thế thì tốt. Nói gì thì nói ông Houshou cũng là một người cuồng con gái.\nGiả sử Kisaki gặp nguy hiểm——thì sẽ thành cuộc đối đầu giữa các quái thú đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「怪獣対決」
2012 = "「Cuộc đối đầu giữa các quái thú.」"
# monologue
# JP: 赤井宮司らしくない――\nけれども極めて、赤井さんらしい言葉だと感じる。
3001 = "Không giống thầy cúng Akai chút nào——\nNhưng tôi lại cảm thấy, đó là những từ ngữ cực kỳ giống với chú Akai."
# monologue
# JP: 思わぬところで、本当に短い時間であっても、\n赤井さんとも"向き合えた"なと、ふっと感じる。
2732 = "Ở một nơi không ngờ tới, dù chỉ là một khoảng thời gian thật ngắn ngủi,\ntôi chợt cảm thấy mình đã \"đối mặt\" được với chú Akai."
# 【赤井】
# display as 赤井
# JP: 「ああいやいや、これは失言でした。\n戦友――ですからね、後東は。つい口が滑りました」
1877 = "「A, không không, tôi lỡ lời rồi.\nGotou, là chiến hữu——của tôi mà. Tôi lỡ buột miệng thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「口を滑らせていただけたこと――\nなんとなくですが、嬉しいことだと感じます」
2369 = "「Việc ông lỡ buột miệng——\nKhông hiểu sao, cháu lại cảm thấy đó là một điều đáng mừng.」"
# 【赤井】
# display as 赤井
# JP: 「そうですか」
2084 = "「Vậy sao.」"
# monologue
# JP: 笑う。赤井宮司――いや、赤井さんが。\nごく穏やかに、あたたかに――何故か、父さんを思い出す。
2964 = "Cười. Thầy cúng Akai——không, chú Akai.\nMột nụ cười vô cùng điềm đạm, ấm áp——Không hiểu sao, lại làm tôi nhớ đến bố."
# 【赤井】
# display as 赤井
# JP: 「とても、よいことと思います。\n双鉄くん――どうぞ、ご健勝に」
2036 = "「Tôi nghĩ đó là một điều rất tốt.\nCậu Soutetsu——chúc cậu luôn mạnh khỏe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、ありがとうございます。こちら側での意見集約が\n整いましたら、またご相談にあがります」
1954 = "「Vâng, cháu cảm ơn ông. Sau khi tổng hợp ý kiến bên phía cháu\nxong xuôi, cháu sẽ lại đến nhờ ông tư vấn ạ.」"
# 【赤井】
# display as 赤井
# JP: 「ええ。いつでもいらしてください」
1950 = "「Ừ. Cứ đến bất cứ lúc nào nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
# 1871 = "「啊」" 
# monologue
# JP: 話は、ここで区切りだろう。\nれいなはまだ、本社の中にいるようだ。
2956 = "Cuộc nói chuyện, có lẽ nên dừng lại ở đây.\nReina có vẻ vẫn đang ở trong điện chính."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。れいな。話は終わった。\nそろそろいこう」
2216 = "「Reina. Reina. Chuyện xong rồi.\nChúng ta đi thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　わかりましたぁ、そうてつさぁん」
1945 = "「Vâng ạ~! Em hiểu rồi~, anh Soutetsu~」"
# monologue
# JP: れいなの声が弾んでいる。\n『れいなはここでもう少しおしゃべりしてますねぇ』と。
2841 = "Giọng Reina nghe rất hào hứng.\n『Reina sẽ ở đây trò chuyện thêm một lúc nữa nha~』."
# monologue
# JP: あれは、僕と赤井宮司とが気兼ねなく話をできるよう、\n気を使っての発言だったと思っていたが――
2745 = "Tôi cứ tưởng đó là câu nói tinh ý của em ấy,\nđể tôi và thầy cúng Akai có thể nói chuyện thoải mái mà không phải e dè——"
# 【赤井】
# display as 赤井
# JP: 「……れいな君は、とても優しい\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですね」
1298 = "「......Reina, là một \\x%lレイルロオド;#00ffc040;Railord%l;#; rất tốt bụng nhỉ.」"
# monologue
# JP: （ああ――）
3054 = "（À——）"
# monologue
# JP: ならば、やはりか。
2596 = "Nếu vậy, quả nhiên là thế sao."
# monologue
# JP: れいなは赤井宮司――いや、赤井\\x%l運転士;#00ffc040;運転士%l;#;の、\n運転鞄に、ずっと話しかけ続けていたのか。
2814 = "Reina đã liên tục nói chuyện với thầy cúng Akai——không, với túi xách của \\x%l運転士;#00ffc040;người lái tàu%l;#; Akai sao."
# 【れいな】
# display as 玲奈
# JP: 「また遊びにきますねぇ！　うふふぅ、もしよかったら、\n御一夜鉄道にも、いつでも遊びにきてくださいねぇ！」
1697 = "「Lần sau em lại đến chơi nha~! Ufufu~, nếu được,\nhãy đến Đường sắt Ohimitera chơi bất cứ lúc nào nhé~!」"
# monologue
# JP: （プォンっ）
3050 = "（Bíp）"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、無理はするな――\n今日は結局、動き通しになってしまったのだからな」
2213 = "「Reina, đừng cố quá——\nHôm nay rốt cuộc em đã phải hoạt động liên tục rồi mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁっ」
1816 = "「Fua」"
# monologue
# JP: 夕方の乗務を終えて、そのまま回送扱いで\n術仙炭鉱でおろしてもらって、廃坑道を視察して――
2606 = "Sau khi kết thúc ca trực buổi chiều tối, Paulette đã đưa chúng tôi đến mỏ than Jussen\nbằng xe chạy không, rồi chúng tôi đi khảo sát đường hầm bỏ hoang——"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ぜーんぜんへっちゃらですよぉ」
2176 = "「Reina, không sao hết đâu ạ~」"
# monologue
# JP: 元気な声とは裏腹に、れいなの足は重くなってる。\n繋いでる手が、汗ばむほどに熱を持ってる。
3020 = "Trái ngược với giọng nói đầy sức sống, bước chân của Reina đã trở nên nặng nề.\nBàn tay đang nắm lấy tôi nóng bừng lên đến mức rịn mồ hôi."
# 【双鉄】
# display as 雙鐵
# JP: 「廃坑道の視察のみならず、発電所の位置まで確認できた。\n術仙廃炭鉱再活用のための素材は、もう十分だ」
2364 = "「Không chỉ khảo sát đường hầm bỏ hoang, mà còn xác nhận được vị trí của nhà máy điện.\nTài liệu để tái sử dụng mỏ than bỏ hoang Jussen đã đủ rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー。れいな、お役にたてたの……\nふぁ……うれしい……です、よぉ」
1922 = "「Ehehe~. Reina, giúp ích được cho anh......\nfua......vui lắm......ạ~」"
# monologue
# JP: 声からなにから、もう完全に眠たくなってる。
2927 = "Từ giọng nói cho đến mọi thứ, em ấy đã hoàn toàn buồn ngủ rồi."
# monologue
# JP: というか、考えてみれば、今朝あってからまだ一度も、\nれいなは寝落ちていないのだ。
2647 = "Mà nghĩ lại thì, từ lúc gặp nhau sáng nay,\nReina chưa ngủ gật lần nào cả."
# 【双鉄】
# display as 雙鐵
# JP: 「本当に良くがんばってくれたな。\nそら、あとは寝ていけばいいさ」
1733 = "「Em đã cố gắng rất nhiều rồi.\nNào, phần còn lại cứ ngủ đi là được.」"
# 【れいな】
# display as 玲奈
# JP: 「わ――おんぶですねぇ」
1849 = "「Wa——anh cõng em nhỉ~」"
# monologue
# JP: 繋いでる手を離してしゃがめば、\nれいなは嬉しげな声を出す。
2765 = "Khi tôi buông tay ra và ngồi xổm xuống,\nReina cất giọng vui vẻ."
# monologue
# JP: しかし体重が乗ってこない。\nれいなは逡巡しているようだ。
2594 = "Nhưng em ấy không leo lên.\nCó vẻ Reina đang do dự."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　遠慮なぞ不用だぞ？\nこう見えて、僕はまだまだ十分体力を残している」
2009 = "「Sao vậy? Không cần phải ngại đâu?\nTrông thế này thôi chứ anh vẫn còn dư sức đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「うれしいですけど、おんぶしてほしいですけど……\nでもれいな、おんぶしてもらったら、ねちゃうから」
2198 = "「Em vui lắm, em cũng muốn được cõng lắm nhưng......\nNhưng Reina, nếu được cõng, em sẽ ngủ mất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、寝ていいと言って」
2027 = "「Thì anh bảo em cứ ngủ đi mà.」"
# 【れいな】
# display as 玲奈
# JP: 「でもでも！　ねちゃったら、そうてつさんと――\nれいな、おしゃべりできなくなっちゃうから」
1807 = "「Nhưng mà nhưng mà! Nếu ngủ mất, với anh Soutetsu——\nReina, sẽ không thể nói chuyện được nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1923 = "「À——」"
# 【れいな】
# display as 玲奈
# JP: 「せっかく、そうてつさんといっしょで――\nだからたくさん……たくさん……そうてつ、さん、と」
2375 = "「Hiếm khi, được ở cùng anh Soutetsu——\nCho nên em muốn nói chuyện thật nhiều......thật nhiều......với anh, Soutetsu」"
# monologue
# JP: この瞬間も、必死で睡魔と闘ってくれている。
2627 = "Ngay khoảnh khắc này, em ấy cũng đang liều mạng chống lại cơn buồn ngủ."
# monologue
# JP: れいなの健気さに答えたい。\n思った瞬間、言葉が喉から飛び出している。
2734 = "Tôi muốn đáp lại sự kiên cường của Reina.\nNgay khoảnh khắc nghĩ vậy, lời nói đã thốt ra khỏi miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、御一夜に戻ってからもおしゃべりしよう」
2336 = "「Vậy thì, sau khi về Ohimitera chúng ta lại nói chuyện tiếp nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　そうしちゃってもいいんですかぁ」
1837 = "「Wa! Làm vậy có được không ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「かまわんさ。僕の話につきあわせてばかりだったゆえ、\nれいなが本当に眠るまで、僕は、れいなの話を聞こう」
1803 = "「Không sao đâu. Toàn bắt em nghe chuyện của anh thôi,\ncho đến khi Reina thật sự chìm vào giấc ngủ, anh sẽ nghe chuyện của Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「本当に眠るまで。おうちにかえってねんねするまで、\nおはなし、聞いててくれるんですかぁ？」
2000 = "「Cho đến khi thật sự ngủ. Cho đến khi về nhà và lên giường ngủ,\nanh sẽ nghe em nói chuyện chứ ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ポーレットがＯＫをしてくれるのならばだが」
1892 = "「Ừ. Nếu Paulette đồng ý.」"
# 【れいな】
# display as 玲奈
# JP: 「それなら、ポーレットとさんにんで、\nれいな、おはなししたいですぅ」
2343 = "「Nếu vậy, với chị Paulette là ba người,\nReina, muốn nói chuyện ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで」
1901 = "「Ừ, rất sẵn lòng.」"
# monologue
# JP: 微笑ましくなる。\n僕とふたりのおしゃべりの、珍しさにもう飽いたのだろう。
2727 = "Tôi bất giác mỉm cười.\nChắc em ấy đã chán sự mới mẻ của việc chỉ nói chuyện với riêng tôi rồi."
# monologue
# JP: そうなってしまえばれいなはやはり、\nポーレットと一緒にいるのが、一番うれしく幸せなのだ。
2880 = "Nếu vậy thì quả nhiên đối với Reina,\nđược ở cùng Paulette, là điều vui vẻ và hạnh phúc nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、それで話は決まりだな。\nそら」
2332 = "「Vậy thì, quyết định thế đi.\nNào.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
# 1943 = "「好的」" 
# monologue
# JP: れいなが背中にのってくる。\nずっしりしている。あたたかだ。
2862 = "Reina leo lên lưng tôi.\nNặng trĩu. Thật ấm áp."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ――おんぶ、しあわせですよぉ」
1911 = "「Ufufu~——được cõng, hạnh phúc quá ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「もし眠っても、れいなが起きるまで待っているから、\n寝るも起きるも、れいなの好きにするといい」
1979 = "「Dù em có ngủ, anh cũng sẽ đợi cho đến khi Reina thức dậy,\nnên em muốn ngủ hay thức, cứ làm theo ý Reina là được.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへー……それなら……安心……あん……しん」
1913 = "「Ehehe~......nếu vậy......an tâm......an......tâm」"
# monologue
# JP: 背中の重みがさらに増す。\nすやすやと、れいなは一瞬で寝入ってしまう。
2679 = "Sức nặng trên lưng càng tăng thêm.\nReina chìm vào giấc ngủ ngay tức khắc, thở đều đều."
# 【双鉄】
# display as 雙鐵
# JP: 「……よほど無理をさせてしまっていたのだな」
1301 = "「......Có vẻ anh đã bắt em phải gắng sức quá rồi.」"
# monologue
# JP: 申し訳ない気持ちを感じる。\n同時に、強い喜びも。
2759 = "Tôi cảm thấy có lỗi.\nĐồng thời, cũng là một niềm vui mãnh liệt."
# monologue
# JP: 僕との時間を過ごすため、れいなはここまで懸命に、\n頑張り続けてくれていたのだ。
2810 = "Để được dành thời gian bên tôi, Reina đã liều mạng,\nđã không ngừng cố gắng đến mức này."
# 【双鉄】
# display as 雙鐵
# JP: 「というか……僕も、かなり疲れているな」
2275 = "「Mà nói đúng hơn......anh cũng, khá mệt rồi.」"
# monologue
# JP: れいなが眠って、ずっしりと来て初めて感じたが――\n腰がどうにも鈍い感じだ。歩きすぎたかもしれん。
2852 = "Khi Reina ngủ thiếp đi và đè nặng lên lưng, tôi mới nhận ra——\nThắt lưng tôi có cảm giác hơi nhức mỏi. Có lẽ tôi đã đi bộ quá nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなに合わせ、普段よりゆっくり歩いたしな――\nそういうものも、疲労には影響するのだろうな」
2254 = "「Vì phải đi chậm hơn bình thường để theo kịp Reina——\nNhững việc như vậy, có lẽ cũng ảnh hưởng đến sự mệt mỏi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ……そうてつさぁん……ありがとう……\nですよぉ」
1914 = "「Ufufu~......anh Soutetsu~......cảm ơn anh......\nnha~」"
# monologue
# JP: れいなの声にぎくりとするが、\n背中の重みは……変わらない。
2854 = "Giọng nói của Reina làm tôi giật mình,\nnhưng sức nặng trên lưng......không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「寝言か。れいなは律儀だな」
1778 = "「Nói mớ à. Reina đúng là lễ phép thật đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「むにゃむにゃ……」
1875 = "「Munya munya......」"
# monologue
# JP: このまま歩き続けては、疲労を溜めてしまいかねない。\nどこか、小休止できそうな――
2917 = "Cứ tiếp tục đi bộ thế này, có thể sẽ tích tụ thêm mệt mỏi.\nPhải tìm chỗ nào đó, có thể nghỉ ngơi một chút——"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1903 = "「嗯？」" 
# monologue
# JP: なにか、ある。\n木々の向こうに、なにか黒いものが見えている。
2792 = "Có cái gì đó.\nPhía bên kia rặng cây, tôi thấy có vật gì đó màu đen."
# 【双鉄】
# display as 雙鐵
# JP: 「む！？　これは――レール跡か？」
1907 = "「Hử!? Đây là——dấu vết đường ray sao?」"
# monologue
# JP: 意識をすれば、下草の長さの違いは歴然だ。
2590 = "Nếu để ý kỹ, sự khác biệt về độ dài của cỏ dại là rất rõ ràng."
# monologue
# JP: 辿って歩けば、レールの跡は\n黒いものの方へと続き――
2972 = "Đi men theo đó, dấu vết đường ray\ndẫn đến vật màu đen kia——"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1925 = "「Ồ ồ!」"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！！？」
1850 = "「Wa!!?」"
# monologue
# JP: 声と同時に背中が動く。\n負荷がはっきり軽くなる。
2723 = "Cùng với tiếng hét, lưng tôi chuyển động.\nGánh nặng rõ ràng nhẹ đi hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、起こしてしまったか」
2052 = "「Xin lỗi, anh làm em thức giấc à.」"
# 【れいな】
# display as 玲奈
# JP: 「いいええ――それより――\nこのこ、かわいい\\x%l車掌車;#00ffc040;車掌車%l;#;さんですねぇ」
2137 = "「Không đâu ạ~——hơn thế nữa——\nđây là, một \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; đáng yêu nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l車掌車;#00ffc040;車掌車%l;#;？」
1273 = "「\\x%l車掌車;#00ffc040;Toa xe trưởng tàu%l;#;?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。\\x%l貨車;#00ffc040;貨車%l;#;とかの一番うしろにくっついて、\n\\x%l車掌;#00ffc040;車掌%l;#;さんが非常\\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけるための車ですよぉ」
2094 = "「Vâng ạ~. Nó được nối ở phía sau cùng của \\x%l貨車;#00ffc040;toa chở hàng%l;#;,\nlà toa xe để \\x%l車掌;#00ffc040;trưởng tàu%l;#; có thể kéo \\x%lブレーキ;#00ffc040;phanh khẩn cấp%l;#; đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほど。\\x%l炭水車;#00ffc040;炭水車%l;#;の後ろに\\x%l貨車;#00ffc040;貨車%l;#;だなんだを\n引いては、後方など、まるで見えなくなるだろうしな」
1930 = "「À, ra vậy. Kéo theo \\x%l貨車;#00ffc040;toa chở hàng%l;#; phía sau \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;,\nthì phía sau sẽ hoàn toàn bị che khuất tầm nhìn nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。それに、\\x%l車掌車;#00ffc040;車掌車%l;#;さんは、\nお客さんにも、人気者さんなんですよぉ」
2073 = "「Đúng vậy ạ~. Hơn nữa, \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;,\ncũng rất được hành khách yêu thích đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？　どういった感じでだ？」
2086 = "「Hô? Cảm giác như thế nào vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「\\x%l車掌車;#00ffc040;車掌車%l;#;さんにお客さんを乗せてもらえることがあって、\nそういうとき、すっごい喜んでもらえたんですよぉ」
2119 = "「Có những lúc hành khách được phép lên \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#;,\nnhững lúc như vậy, họ vui lắm đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……ならばこれの活用を目指すべきだな。\n8620に引かせるか、あるいは――」
2083 = "「Ra vậy......Nếu thế thì chúng ta nên nhắm tới việc tận dụng cái này.\nCho 8620 kéo, hoặc là——」"
# 【れいな】
# display as 玲奈
# JP: 「れいなが引いてもいいですし、\\x%l客車;#00ffc040;客車%l;#;との交換材料に\nできちゃうかもしれないですねぇ」
2183 = "「Reina kéo cũng được ạ~, hoặc có thể\ndùng làm vật liệu trao đổi lấy \\x%l客車;#00ffc040;toa hành khách%l;#; cũng nên nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「交換――」
2056 = "「Trao đổi——」"
# monologue
# JP: 思わぬ言葉に考えて、考えればすぐ納得がいく。
2747 = "Tôi suy nghĩ về những lời bất ngờ đó, và khi suy nghĩ, tôi liền bị thuyết phục."
# monologue
# JP: まったく僕には無かった視点――\nさすがは、ポーレットの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2913 = "Một góc nhìn mà tôi hoàn toàn không có——\nQuả không hổ danh là \\x%lレイルロオド;#00ffc040;Railord%l;#; của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。こちらの方が\\x%l客車;#00ffc040;客車%l;#;よりも更に珍しい――\nつまりは、マニア好みの車両であるわけか」
2235 = "「Ra vậy. Cái này còn hiếm hơn cả \\x%l客車;#00ffc040;toa hành khách%l;#;——\nTức là, đây là loại toa xe mà những người đam mê rất thích nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうかもってれいな思いますぅ。今は\\x%l長大編成;#00ffc040;長大編成%l;#;も\n減ってますし、\\x%l車掌車;#00ffc040;車掌車%l;#;さん、生き残り少ないかなって」
2185 = "「Reina cũng nghĩ vậy ạ~. Bây giờ \\x%l長大編成;#00ffc040;đoàn tàu siêu dài%l;#; cũng\ngiảm đi rồi, nên \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; chắc cũng không còn lại bao nhiêu đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1888 = "「嗯」" 
# monologue
# JP: 『まいてつ』なる人種は、僕のような特殊例を除き、\nまず間違いなくポーレットの同類。マニアだろう。
3010 = "Những người thuộc nhóm 『Maitetsu』, ngoại trừ trường hợp đặc biệt như tôi,\nthì chắc chắn là đồng loại với Paulette. Những người đam mê."
# monologue
# JP: マニアとなれば、希少なものほど欲しがろうし、\n実需の有無など関係なしに――――うむ？
2875 = "Đã là người đam mê, thì càng hiếm họ sẽ càng muốn có,\nbất kể nhu cầu thực tế có hay không――――hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「ちょっと待ってくれ。『\\x%l長大編成;#00ffc040;長大編成%l;#;も減っている』\nといったが、まだ、\\x%l長大編成;#00ffc040;長大編成%l;#;が走っている路線も？」
2242 = "「Đợi chút đã. Em nói 『\\x%l長大編成;#00ffc040;Đoàn tàu siêu dài%l;#; cũng giảm đi rồi』,\ntức là vẫn còn tuyến đường có \\x%l長大編成;#00ffc040;đoàn tàu siêu dài%l;#; đang chạy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「もちろんですよぉ。工場の専用線とかでは、\nふつーにまだまだ走ってますねぇ」
2221 = "「Tất nhiên rồi ạ~. Trên các tuyến đường chuyên dụng của nhà máy,\nchúng vẫn chạy bình thường nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「工場の専用線？」
1982 = "「Tuyến đường chuyên dụng của nhà máy?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、文字通り、製鉄所とかの工場が、\n自分のとこだけのために走らせている鉄道ですよぉ」
2105 = "「Vâng ạ~, đúng như tên gọi, các nhà máy như xưởng luyện thép,\ncho chạy đường sắt chỉ phục vụ cho riêng họ thôi ạ~」"
# monologue
# JP: ……原初の鉄道から変わらぬ姿。\n原料の搬入や製品の搬出――そのためだけの鉄道路線。
1263 = "......Hình bóng không thay đổi từ thời đường sắt sơ khai.\nNhập nguyên liệu và xuất sản phẩm——tuyến đường sắt chỉ dành cho mục đích đó."
# monologue
# JP: エアクラで代替できぬ重量物輸送のために、\n恐らく今後も、廃業等が無い限り、残り続ける路線。
2900 = "Để vận chuyển những vật siêu nặng mà Aircra không thể thay thế,\ncó lẽ trong tương lai, trừ khi đóng cửa, những tuyến đường này sẽ tiếp tục tồn tại."
# 【れいな】
# display as 玲奈
# JP: 「そういうとこは機関車も\\x%l貨車;#00ffc040;貨車%l;#;も手放さないですから。\n一\\x%l編成;#00ffc040;編成%l;#;、できるだけ長くした方がお得ですしぃ」
2304 = "「Những nơi đó sẽ không từ bỏ đầu máy xe lửa hay \\x%l貨車;#00ffc040;toa chở hàng%l;#; đâu ạ~.\nMột \\x%l編成;#00ffc040;đoàn tàu%l;#;, càng dài thì càng có lợi mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。それで――その、『工場の専用線』\nというのは、どの程度残っている物なのだ？」
2234 = "「Ra vậy. Vậy thì——cái gọi là 『tuyến đường chuyên dụng của nhà máy』 đó,\ncòn lại khoảng bao nhiêu vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、あんまりくわしくないけど、\n北九洲にはまだのこってるって、聞いたことありますぅ」
2180 = "「Reina, không rành lắm đâu,\nnhưng em từng nghe nói ở Bắc Kyushu vẫn còn đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「北九洲――そうか、旧[ちくほう,1]築豊炭田か。ならば、\nあのあたりに残る線路と線路をつなぐことができれば」
1772 = "「Bắc Kyushu——ra vậy, mỏ than Chikuho cũ à. Nếu thế,\nnếu có thể kết nối những tuyến đường ray còn sót lại quanh khu vực đó.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　そうですねぇ！　線路あとも、レールはないかも\nですけど、きっと、土地はそのまま残ってますよぉ」
1839 = "「Wa! Đúng vậy nhỉ~! Dấu vết đường ray, có thể không còn ray nữa\nnhưng chắc chắn, khu đất đó vẫn còn nguyên vẹn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　そんなことを、れいなはどうして」
2087 = "「Vậy sao? Sao Reina lại biết chuyện đó?」"
# 【れいな】
# display as 玲奈
# JP: 「聞いたことあるからですよぉ。あそこらへんは、\n炭田ぜぇんぶ、何もかも売り払っちゃって」
2212 = "「Vì em từng nghe kể rồi ạ~. Quanh khu vực đó,\ntoàn bộ mỏ than, mọi thứ đều bị bán tống bán tháo hết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1924 = "「噢」" 
# monologue
# JP: 地域まるごと、設備も装置もなにもかも剥がして売却する。\n残される土地は、ならば無価値だ。
2774 = "Toàn bộ khu vực, thiết bị, máy móc, mọi thứ đều bị tháo dỡ và bán đi.\nKhu đất còn lại, nếu vậy thì vô giá trị."
# monologue
# JP: 線路跡だろうがなんであろうが、\n誰も見向きはしないだろう。
2629 = "Dù là dấu vết đường ray hay gì đi nữa,\ncũng sẽ chẳng ai thèm ngó ngàng tới."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕らにとっては助けになるかもしれんことだが、\nしかし、残酷なことでもあるな」
1310 = "「......Đối với chúng ta, đó có thể là một sự trợ giúp,\nnhưng mà, cũng thật tàn khốc nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ざんこくっていうか、普通ですよぉ？　ここみたいに、\nぜぇんぶとってあるのが普通じゃないんですよぉ」
2134 = "「Tàn khốc hay không thì, chuyện đó là bình thường mà~? Giống như ở đây,\ngiữ lại tất cả mọi thứ mới là không bình thường đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか――いや」
2082 = "「Vậy sao——không.」"
# 【れいな】
# display as 玲奈
# JP: 「どうかしましたかぁ？　そうてつさぁん」
2008 = "「Có chuyện gì sao ạ~? Anh Soutetsu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――そうか」
2143 = "「Không——ra vậy.」"
# monologue
# JP: \\x%l車掌車;#00ffc040;車掌車%l;#;も炭鉱跡も変わらない。\n希少なものには価値がある。
2571 = "\\x%l車掌車;#00ffc040;Toa xe trưởng tàu%l;#; hay tàn tích mỏ than cũng không thay đổi.\nNhững thứ quý hiếm đều có giá trị."
# monologue
# JP: もしも術仙廃炭鉱が、唯一無二なり、それに近い、\n『採炭を復活できる炭鉱』という存在であるのなら――
2667 = "Nếu như mỏ than bỏ hoang Jussen, là độc nhất vô nhị, hoặc gần như thế,\nlà sự tồn tại của một 『mỏ than có thể khôi phục việc khai thác』——"
# 【双鉄】
# display as 雙鐵
# JP: 「人は、集まる。採炭を生きがいにしていた人たちが。\nその技術を、絶やすまいとする人たちが」
2114 = "「Mọi người sẽ tụ tập lại. Những người từng coi việc khai thác than là lẽ sống.\nNhững người không muốn kỹ thuật đó bị mai một.」"
# monologue
# JP: 採炭という技術の継承――それは明確な売りになる。\n“レイル・ロマネスク湯医線"には、炭鉱が生きていると。
2634 = "Sự kế thừa kỹ thuật khai thác than——đó sẽ là một điểm bán hàng rõ ràng.\nRằng mỏ than vẫn đang sống trong \"Rail Romanesque tuyến Yui\"."
# monologue
# JP: その炭鉱で採掘された石炭で、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を走らせて、火力発電していると。
2923 = "Bằng than được khai thác từ mỏ than đó,\nchúng ta có thể cho \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; chạy, và phát điện nhiệt."
# 【双鉄】
# display as 雙鐵
# JP: 「作り物ではない、正和初期の街。\nそこから生まれる蒸気で、熱で、息づき彩られる湯医線」
1770 = "「Không phải là đồ giả tạo, mà là khu phố thời kỳ đầu Showa.\nTuyến Yui được tiếp thêm sức sống và tô điểm bởi hơi nước, bởi nhiệt lượng sinh ra từ đó.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ！　なんだかかっこいいですぅ」
1818 = "「Wawawa! Nghe có vẻ ngầu quá ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこから続くレールは未来へと伸びていく。\n八ツ城を経て、隈元を越え、北九洲の路線群へと」
2345 = "「Đường ray nối tiếp từ đó sẽ vươn tới tương lai.\nQua Yatsushiro, vượt Kumamoto, đến với mạng lưới tuyến đường Bắc Kyushu.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　北九洲の工場専用線と、その廃線跡と。\nたくさんたくさん、きっと繋がれるって思いまぁす」
2101 = "「Vâng ạ~! Tuyến đường chuyên dụng của nhà máy ở Bắc Kyushu, và cả dấu vết đường ray bỏ hoang đó.\nChắc chắn sẽ kết nối được rất nhiều rất nhiều ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！！」
1890 = "「Ừm!!」"
# monologue
# JP: ああ、本当に大きく繋がる。遥かに広がる。\n復線の事業化の構想も、未来行き列車の行き先も。
2775 = "A, thật sự kết nối rộng lớn. Trải dài xa xăm.\nÝ tưởng thương mại hóa việc khôi phục tuyến đường, và cả điểm đến của chuyến tàu hướng tới tương lai."
# 【双鉄】
# display as 雙鐵
# JP: 「すばらしい発見で、すばらしい気づきだ。\nすごいぞ！　れいなの居眠りのおかげだな」
2263 = "「Một phát hiện tuyệt vời, một nhận thức tuyệt vời.\nTuyệt lắm! Tất cả là nhờ Reina ngủ gật đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～　どういたしましてですよぉ」
1917 = "「Ehehe~ Không có chi đâu ạ~」"
# monologue
# JP: 背中の上からご機嫌な声。\n眠気はもう、まったく残っていないように聞こえる。
2979 = "Giọng nói vui vẻ từ trên lưng.\nNghe như thể chẳng còn chút buồn ngủ nào sót lại nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「というか、もう眠くないのか？　大丈夫なのか？」
2038 = "「Mà này, em không buồn ngủ nữa à? Có ổn không đấy?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいなの眠いのは、改造の過負荷の、\n処理できない部分のせいですからぁ」
2139 = "「Vâng ạ~. Reina buồn ngủ là do, quá tải từ việc cải tạo,\nnhững phần không thể xử lý được đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2084 = "「是嗎」" 
# 【れいな】
# display as 玲奈
# JP: 「だから、スリープに入って外部情報を遮断して、\n処理を全部しきれちゃえば、眠くなくなるんですよぉ」
2043 = "「Cho nên, nếu vào chế độ ngủ để ngắt thông tin bên ngoài,\nvà xử lý xong toàn bộ, thì sẽ không còn buồn ngủ nữa nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そういう構造だったか。\nというか――そこまでわかっているのであれば――」
1779 = "「Ra vậy. Là cấu trúc như thế sao.\nMà này——nếu em đã hiểu đến mức đó thì——」"
# monologue
# JP: 確かれいなは、ガソリン駆動からディーゼル駆動へ\n改造を受けているという話であった。
2761 = "Tôi nhớ Reina từng kể rằng em ấy đã được cải tạo\ntừ chạy bằng xăng sang chạy bằng động cơ diesel."
# monologue
# JP: 今の御一夜鉄道で、れいなにそこまで性能を求める\n運用を求めることはありえんだろうし――
2653 = "Ở Đường sắt Ohimitera hiện tại, việc yêu cầu Reina\nphải đạt hiệu suất đến mức đó là điều không thể nào——"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、キハ07の仕様を一番最初の状態に戻して、\n改造の過負荷を減少させるなどのことは」
1959 = "「Ví dụ như, khôi phục lại thông số kỹ thuật của Kiha 07 về trạng thái ban đầu,\nđể giảm thiểu sự quá tải do cải tạo thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「できますよぉ。れいな綺麗にロールバック\nできるようにしてもらってますぅ」
1801 = "「Được chứ ạ~. Reina đã được làm cho\ncó thể rollback một cách hoàn hảo luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
1714 = "「Gì cơ.」"
# monologue
# JP: あまりにあっさり言い切られる。\n多少意外にも感じるが、朗報であるには違いない。
2903 = "Em ấy khẳng định một cách quá dễ dàng.\nDù cảm thấy hơi bất ngờ, nhưng chắc chắn đó là một tin tốt."
# 【れいな】
# display as 玲奈
# JP: 「鉱山の技師さんたち、\n無理な改造って、最初からわかってましたからぁ」
2239 = "「Các kỹ sư ở mỏ,\ntừ đầu đã biết đó là một sự cải tạo quá sức rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ロールバックをするべきではないのか？」
2320 = "「Nếu vậy, chẳng phải nên rollback sao?」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはぁ」
2370 = "「Anh Soutetsu à~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1881 = "「啊？！」" 
# monologue
# JP: れいなの瞳が僕を見ている。\nそれはいつものことではあるが――
2848 = "Đôi mắt Reina đang nhìn tôi.\nĐó là chuyện thường ngày, nhưng——"
# monologue
# JP: なにか、気圧されるような。\nいつものれいなの無垢な一途と、まるで違った熱を感じる。
2735 = "Có gì đó, như thể bị lấn át.\nTôi cảm nhận được một sức nóng hoàn toàn khác biệt so với sự tận tâm ngây thơ thường ngày của Reina."
# 【れいな】
# display as 玲奈
# JP: 「他のひとたちは関係なくて、そうてつさんは――\nれいながロールバックした方が、いいですかぁ？」
1759 = "「Không liên quan đến những người khác, anh Soutetsu thì——\nCó muốn Reina rollback không ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕、ひとりだけの考えでか。\n他のひとも、他のこともか？　考え合わせず」
1975 = "「Theo suy nghĩ của riêng anh thôi sao.\nKhông cần bận tâm đến những người khác, hay những chuyện khác ư?」"
# 【れいな】
# display as 玲奈
# JP: 「はい。れいな、そうてつさんの気持ち、\n知りたいなぁって思います」
2097 = "「Vâng. Reina, muốn biết,\ncảm nhận của anh Soutetsu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の気持ちか」
2035 = "「Cảm nhận của anh sao.」"
# monologue
# JP: ならば、考えるまでもない。\nれいながいつもにこにこ笑って元気でいられる――
2714 = "Nếu vậy, không cần phải suy nghĩ nữa.\nĐể Reina có thể luôn mỉm cười tươi tắn và khỏe mạnh——"
# monologue
# JP: 異常な負荷など無い状態が、\n僕にとっての、より望ましい状況だ。
2743 = "Một trạng thái không có những gánh nặng bất thường,\nđối với tôi, đó là tình huống đáng mong đợi hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はれいなに、\nロールバックを受けて欲しいと思う」
2030 = "「Anh muốn Reina,\nhãy thực hiện rollback.」"
# monologue
# JP: だから、答える。\n自分の思うがままを、素直に。
2770 = "Vì vậy, tôi trả lời.\nMột cách thành thật, đúng như những gì tôi nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「それでれいなが楽になるなら、\nもっと笑顔になれるなら。何をおいてもやるべきだ」
1799 = "「Nếu làm vậy Reina sẽ thoải mái hơn,\nnếu em có thể cười nhiều hơn. Thì dù thế nào cũng nên làm.」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。えっへへー。それじゃあれいな\n帰ったら、ポーレットに相談してみますねぇ」
1940 = "「Em hiểu rồi ạ~. Ehehe~. Vậy thì Reina\nkhi về sẽ thử bàn bạc với chị Paulette nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうするといい。僕も、ポーレットに相談したい」
1942 = "「Em làm vậy đi. Anh cũng muốn bàn bạc với Paulette.」"
# 【れいな】
# display as 玲奈
# JP: 「それならやっぱり、ポーレットとそうてつさんと、\nれいなと三人でおはなしですねぇ」
2314 = "「Nếu vậy thì quả nhiên, chị Paulette và anh Soutetsu,\ncùng Reina ba người nói chuyện nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうなるな」
1898 = "「Ừ, sẽ là vậy đấy.」"
# monologue
# JP: そのままれいなをおぶって歩く。\nてくてく、てくてく。
2755 = "Tôi cứ thế cõng Reina và bước đi.\nLạch cạch, lạch cạch."
# monologue
# JP: れいなはずっしり重くならない。\nゆえに起きているのであろうが、いやに無口だ。
2819 = "Reina không hề trở nên nặng trĩu.\nDo đó em ấy chắc hẳn vẫn đang thức, nhưng lại im lặng đến lạ thường."
# 【れいな】
# display as 玲奈
# JP: 「……あのですねぇ、そうてつさぁん」
1307 = "「......Cái đó ấy ạ~, anh Soutetsu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1903 = "「嗯？」" 
# 【れいな】
# display as 玲奈
# JP: 「れいな、きょう。そうてつさんとおはなししてて、\nいっしょにいて、とってもとっても、楽しかったですぅ」
2190 = "「Reina, hôm nay. Được nói chuyện với anh Soutetsu,\nđược ở cùng anh, rất là rất là, vui luôn đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1895 = "「Ừ, anh cũng vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
# 1915 = "「嘿嘿嘿」" 
# monologue
# JP: ご機嫌極まる笑い声。\nけれどもすぐに、また沈黙。
3000 = "Tiếng cười cực kỳ vui vẻ.\nNhưng ngay sau đó, lại chìm vào im lặng."
# monologue
# JP: ややあって――\n極めてれいならしからぬ、おそるおそるな声が聴こえる。
3014 = "Một lúc sau——\nTôi nghe thấy một giọng nói rụt rè, cực kỳ không giống Reina."
# 【れいな】
# display as 玲奈
# JP: 「ええと――あの――そのっ――\nぐう。ぐう。ぐう」
1814 = "「Ưm——cái đó——đó là——\nKhò. Khò. Khò.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
# 1903 = "「嗯？」" 
# monologue
# JP: 一瞬意図がつかめぬが、\nれいなはぐうぐう言い続ける。
2705 = "Trong thoáng chốc tôi không nắm bắt được ý đồ của em ấy,\nnhưng Reina vẫn tiếp tục phát ra tiếng khò khò."
# monologue
# JP: つまりは――あれだ、\nたぬき寝入りを、れいなはしたがっているのだろう。
2889 = "Nói tóm lại——là thế này,\nReina đang muốn giả vờ ngủ chứ gì."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな……あー、その。寝た？　のか？」
2171 = "「Reina......à, cái đó. Em ngủ rồi? Hả?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな、ねちゃって。それで……ええと……\nねむってて……ねぼけちゃってるですからぁ――」
2099 = "「Vâng ạ~. Reina, ngủ mất rồi. Và......ưm......\nđang ngủ......và nói mớ thôi nha~——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1888 = "「嗯」" 
# 【れいな】
# display as 玲奈
# JP: 「（ちゅっ！）」
2379 = "「（Chụt!）」"
# 【双鉄】
# display as 雙鐵
# JP: 「む！」
1869 = "「Ưm!」"
# monologue
# JP: 首筋、かわいく濡れた感触。\nほんの一瞬。小鳥が餌をついばむような。
2933 = "Nơi cổ, một cảm giác ướt át đáng yêu.\nChỉ trong tích tắc. Giống như một chú chim nhỏ mổ mồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ――知らなかった。\nれいなは、寝相が悪いのだな」
1851 = "「Fufu——anh không biết đấy.\nReina, có tật ngủ xấu nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「はうう～っ！　そおです。\nれいな、ねぞうが悪いんですよぉ。ぐうぐうぐう」
1885 = "「Hauu~! Đúng vậy ạ~.\nReina, có tật ngủ xấu đó nha~. Khò khò khò.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、もっとぐっすり眠れ。\nれいなの眠りを、今は、僕が守るから」
2328 = "「Nếu vậy, hãy ngủ ngon hơn nữa đi.\nGiấc ngủ của Reina, bây giờ, anh sẽ bảo vệ.」"
# 【れいな】
# display as 玲奈
# JP: 「はうっ」
1874 = "「Hau」"
# monologue
# JP: かえって緊張させたのか、\nれいなの体が固くなる。
2994 = "Có vẻ tôi lại làm em ấy căng thẳng hơn,\ncơ thể Reina trở nên cứng đờ."
# monologue
# JP: それをほぐしてあげたくて、\nできるかぎりに、優しく、穏やかな声を出す。
2809 = "Muốn giúp em ấy thư giãn,\ntôi cố gắng cất giọng dịu dàng, điềm tĩnh nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「目覚めてもまだ、必ずいよう。\n今日の終わりまで、れいなと一緒だ」
1743 = "「Dù em có thức dậy, anh vẫn sẽ ở đây.\nCho đến khi ngày hôm nay kết thúc, anh sẽ ở cùng Reina.」"
