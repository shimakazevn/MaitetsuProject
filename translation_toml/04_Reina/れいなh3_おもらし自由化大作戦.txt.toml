# JP: 僕の勃起が、れいなの残尿の処理をする。\n膀胱に残った雫を、すべて中から押し出していく。
1491 = "Sự cương cứng của tôi, xử lý nốt phần nước tiểu còn sót lại của Reina. Ép toàn bộ những giọt nước còn đọng trong bàng quang ra ngoài."
# 【れいな】
# display as 玲奈
# JP: 「やあっ！　これっ――れいなっ――\nはずかしっ――はずかし――ぃっ――で――ふあっ！」
1078 = "「A! Cái này——Reina——\nXấu hổ——xấu hổ——quá——đi——ha!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「はずかしくない――とても、かわいい」
988 = "「Không xấu hổ đâu——rất là, đáng yêu.」"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ」
# 1050 = "「啊」" 
# monologue
# JP: （きゅううんっ！）
# 1753 = "（縮緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1045 = "「唔！」" 
# monologue
# JP: おまんこまでも、れいなは素直だ。
1595 = "Đến cả âm đạo, Reina cũng thật ngoan ngoãn."
# monologue
# JP: かわいいと褒めてあげれば喜んで、\n僕に、勃起に、思い切り甘えて擦り寄ってくる。
1351 = "Được khen đáng yêu là cô bé lại vui mừng, và nũng nịu cọ xát vào tôi, vào sự cương cứng của tôi hết mức có thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「かわいい。かわいい。\n僕は、れいなが――かわいいれいなが、大好きだっ」
1187 = "「Đáng yêu. Đáng yêu quá. Anh, rất yêu Reina——Reina đáng yêu của anh.」"
# monologue
# JP: （ずっ！　ずぶっ！　ずちゅっ！　じゅぱんっ！）
# 1724 = "（咕啾！咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひあっ――んっ――れいな――れいなもっ――んっ――\nしゅき――だいしゅきっ――そうてつ、さんっ――ふぁ」
1014 = "「Hya——ưm——Reina——Reina cũng——ưm—— thích——thích nhất——anh Soutetsu——ha」"
# monologue
# JP: （ぎゅっ！　ぎゅるっ！　じゅぶつ！　じゅばっ！）
1723 = "（Nhóp! Nhép! Phập! Phập!）"
# monologue
# JP: れいなの膣が、ずっと小刻みに痙攣してる。\n僕の勃起も、敏感なままで動いてる。
1575 = "Âm đạo của Reina, vẫn không ngừng co giật từng nhịp nhỏ. Sự cương cứng của tôi, cũng đang cử động trong trạng thái nhạy cảm."
# monologue
# JP: 二度目の絶頂は多分近くて、だけれど気持ちよさ過ぎて、\nできるかぎりに、今の快感を味わい続けていたくって。
1614 = "Lần lên đỉnh thứ hai có lẽ đã đến rất gần, nhưng vì quá sung sướng, tôi muốn tiếp tục tận hưởng khoái cảm hiện tại càng lâu càng tốt."
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――んっ」
# 1041 = "「唔……」" 
# 【れいな】
# display as 玲奈
# JP: 「あっ――」
# 1046 = "「啊……」" 
# monologue
# JP: （きゅうっ！　うにゅっ！　うにゅっ！　にゅむっ）
# 1723 = "（咕啾！咕啾！咕啾！咕啾！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1074 = "「啊！」" 
# monologue
# JP: だからなんとか止まってみても、\n快感は少しも減じてくれない。
1507 = "Thế nên dù có cố gắng dừng lại, khoái cảm cũng chẳng hề giảm đi chút nào."
# monologue
# JP: れいなの貪欲未熟性器は、ぬめりとざわつきとこりこりを、\n自分の方から、僕に目いっぱい押し付けてくる。
1545 = "Cơ quan sinh dục chưa trưởng thành đầy tham lam của Reina, với sự trơn ướt, rung rinh và săn chắc, tự bản thân nó, cứ ép chặt lấy tôi hết mức có thể."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな――僕は――また漏らすっ！」
1177 = "「Reina——anh——lại ra mất!」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　いっぱい！　いっぱいいっぱい！\nんっ――れいなに――ぴゅっぴゅっ、して――ふえっ？」
1133 = "「Vâng ạ! Thật nhiều! Thật nhiều thật nhiều! Ưm——vào trong Reina——bắn ra đi——hả?」"
# monologue
# JP: （きゅんっ！）
# 1753 = "（縮緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「うおっ！？」
1081 = "「Uo!?」"
# monologue
# JP: 急な締め付け――というか、収縮！\n限界だった勃起はあえなく、絞る動きに精を吐く。
1455 = "Sự siết chặt đột ngột——hay nói đúng hơn là, co thắt! Sự cương cứng đã đến giới hạn của tôi không thể chống cự, phun trào tinh dịch theo chuyển động vắt kiệt ấy."
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
# 1729 = "（咻咻！咻咻！咻咻！咻咻！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひえっ！？　えっ！　れいなっ――れいなっ――\nおしっこ――おもらし――ぜんぶ――でた――のにっ」
1029 = "「Hie!? Ơ! Reina——Reina—— nước tiểu——tè dầm——rõ ràng——đã ra hết——rồi mà」"
# monologue
# JP: （ぷしゃあああああああああああああっ！）
1740 = "（Àooooooooooooooo!）"
# monologue
# JP: 銀――と、瞬間、心が思う。\nさっきの金のおしっこと、これは一対になるおもらしと。
1593 = "Màu bạc——khoảnh khắc đó, tôi chợt nghĩ. Nó hợp thành một cặp với dòng nước tiểu màu vàng lúc nãy."
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――あっ――あっ――」
1200 = "「Ha——a——a——a——」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
# 1729 = "（咻咻！咻咻！咻咻！咻咻！）" 
# monologue
# JP: 僕の精液を飲み干しながら、\nれいなの膣は、脱力したように震えてる。
1579 = "Vừa uống cạn tinh dịch của tôi, âm đạo của Reina, vừa run rẩy như đã kiệt sức."
# monologue
# JP: れいなの顔もとろとろに溶け、\n目は焦点を失くしてしまっているようだ。
1439 = "Khuôn mặt Reina cũng tan chảy nhũn ra, đôi mắt dường như đã mất đi tiêu cự."
# 【双鉄H】
# display as 雙鐵
# JP: 「よく頑張ったな、れいな」
1002 = "「Em cố gắng lắm rồi, Reina.」"
# monologue
# JP: だから、キス。\n髪に、耳元に、小鼻に、口に。
1508 = "Thế nên, tôi hôn. Lên mái tóc, lên vành tai, lên cánh mũi, lên đôi môi."
# monologue
# JP: キスをするうち、れいなの呼吸は落ち着いて、\n目線も僕を、再び甘くとらえてくれる。
1415 = "Trong lúc những nụ hôn trao nhau, nhịp thở của Reina dần ổn định lại, và ánh mắt cô bé lại một lần nữa nhìn tôi đầy nũng nịu."
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――そうてつ、さぁん」
1198 = "「Ha——a——anh Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1105 = "「Ừm.」"
# 【れいな】
# display as 玲奈
# JP: 「はっ――あっ――ちゅ――ちうっ――\nちゅっ――ちゅうっ――ちゅっ――ちゅうう～っ」
1199 = "「Ha——a——chụt——chiu——\nChụt——chụt——chụt——chuuu~」"
# monologue
# JP: 甘えまくった、可愛らしいキス。
1429 = "Một nụ hôn nũng nịu, vô cùng đáng yêu."
# monologue
# JP: それを解けばれいなは今度は、\n胸板にすりつき甘えてくれる。
1623 = "Khi nụ hôn kết thúc, lần này Reina, lại rúc vào ngực tôi làm nũng."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいな――れいな――\n不思議なおもらし――しちゃいましたぁ」
1217 = "「Anh Soutetsu. Reina——Reina—— đã tè dầm ra một thứ——rất kỳ lạ ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。そうだったな。\nあれは、おしっことは違った――ああ」
1163 = "「Ừ. Đúng vậy nhỉ.\nThứ đó, không giống nước tiểu——ừm.」"
# monologue
# JP: （ぺろっ）
1758 = "（Liếm）"
# 【れいな】
# display as 玲奈
# JP: 「やぁんっ」
1040 = "「Á~」"
# monologue
# JP: 僕の二の腕にかかったそれを舐めてみる。\nやはり、おしっこの味じゃない。
1494 = "Tôi thử liếm thứ chất lỏng dính trên bắp tay mình. Quả nhiên, không phải vị của nước tiểu."
# monologue
# JP: 塩気もえぐみも感じぬそれは、\n薄い酸味を帯びてるようだ。
1527 = "Thứ chất lỏng không có vị mặn cũng chẳng có vị chát ấy, có vẻ mang một chút vị chua nhè nhẹ."
# 【双鉄H】
# display as 雙鐵
# JP: 「これがあるいは、女性の、射精のおもらしなのかな」
1205 = "「Cái này có lẽ, là sự xuất tinh của phụ nữ, khi tè dầm chăng.」"
# 【れいな】
# display as 玲奈
# JP: 「おもらしにも、いろいろ種類があるんですかぁ？」
1125 = "「Tè dầm, cũng có nhiều loại ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「かもしれん。今の段階では断言できんが」
996 = "「Có thể. Ở giai đoạn này anh chưa thể khẳng định được.」"
# monologue
# JP: ポーレットにも、他の誰にも、聞いてみようとは思わない。\n文献にあたる必要さえをも感じない。
1487 = "Tôi không có ý định hỏi Paulette, hay bất kỳ ai khác. Thậm chí tôi còn cảm thấy không cần thiết phải tra cứu tài liệu."
# 【双鉄H】
# display as 雙鐵
# JP: 「だから、れいなと確かめたい。セックスと――\nセックスのときのおもらしの種類と、関係性とを」
1154 = "「Thế nên, anh muốn cùng Reina xác nhận. Làm tình và—— các loại tè dầm khi làm tình, cùng với mối quan hệ giữa chúng.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへ～れいなも、そうてつさんと、\nたくさんたぁくさん、お勉強して研究したいですよぉ」
1118 = "「E he he~ Reina cũng, muốn cùng anh Soutetsu, học hỏi và nghiên cứu thật nhiều thật nhiều ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか、なら」
1165 = "「Vậy sao, thế thì」"
# monologue
# JP: （すりっ）
# 1727 = "（咕啾）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃんっ！」
# 1069 = "「啊嗯！」" 
# monologue
# JP: あれほどの射精を繰返し、\nそれでも僕は、僕の勃起は、れいなを求める。
1512 = "Dù đã xuất tinh liên tục như vậy, thế mà tôi, sự cương cứng của tôi, vẫn khao khát Reina."
# monologue
# JP: れいなも疲れた様子を見せず、\n僕の求めにもじもじと、おしりを振って応えてくれる。
1547 = "Reina cũng không hề tỏ ra mệt mỏi, lắc lắc cái mông bẽn lẽn đáp lại sự khao khát của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「いくぞ？　れいな」
1149 = "「Anh vào nhé? Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ――えへへ、そうてつさぁん」
1128 = "「Vâng ạ~——e he he, anh Soutetsu~」"
# 【双鉄H】
# display as 雙鐵
# JP: （セックスと――おもらしと――僕と――れいなと）
1718 = "（Làm tình và——tè dầm và——tôi và——Reina）"
# monologue
# JP: 実験はいつまでも終わらない。
1446 = "Thí nghiệm sẽ không bao giờ kết thúc."
# monologue
# JP: 例え一つの答えをふたりで見つけても、\nその先を――貪欲に、求め続けるに決まってるから。
1458 = "Bởi vì cho dù hai chúng tôi có tìm ra một câu trả lời, thì chắc chắn, chúng tôi vẫn sẽ tiếp tục khao khát——những điều xa hơn thế nữa một cách đầy tham lam."
