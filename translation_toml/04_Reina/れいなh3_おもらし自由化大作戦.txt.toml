# lines: 315 
# monologue
# JP: （かぽーん）
1743 = "（Ào）"
# 【れいな】
# display as 玲奈
# JP: 「ふぅぅ～。ごくらくごくらく、ですよぉ」
1025 = "「Fuuuu~. Cực lạc cực lạc, quá đi mất ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「全くだ」
1164 = "「Đúng vậy thật.」"
# monologue
# JP: れいなと並んで湯船につかる。\nぷかぷかアヒルが浮いている。
1476 = "Tôi ngâm mình trong bồn tắm cùng Reina. Chú vịt đồ chơi bồng bềnh trôi nổi."
# monologue
# JP: タオルでうさぎを作ってやれば、れいなが喜び手を伸ばす。\nこれを極楽といわずして、何を極楽というのだろうか。
1596 = "Khi tôi gấp một con thỏ bằng khăn tắm, Reina vui sướng đưa tay ra đón lấy. Nếu không gọi đây là cực lạc, thì còn gọi là gì được nữa chứ."
# 【れいな】
# display as 玲奈
# JP: 「今日は、おそくまでお風呂はいってていいんですねぇ」
998 = "「Hôm nay, được tắm muộn thế này cũng không sao nhỉ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。登呂流湯のご主人からお話をいただいてな」
1112 = "「Ừm. Anh đã nói chuyện với chủ của Tororyu-yu rồi.」"
# monologue
# JP: 夜更かしするのが最近キツくなったので、\n湯を落とし掃除するのなら、翌朝まで自由に使っていいと。
1626 = "Bà ấy bảo dạo này thức khuya hơi mệt, nên nếu chúng tôi xả nước và dọn dẹp bồn tắm, thì có thể tự do sử dụng đến sáng hôm sau."
# 【双鉄H】
# display as 雙鐵
# JP: 「その条件は、僕としても望むところだったのでな。\nふたつ返事で、お受けをさせていただいたのだ」
1204 = "「Điều kiện đó, cũng đúng như mong muốn của anh. Nên anh đã nhận lời ngay tắp lự.」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、\n長いお風呂がそぉんなに好きでしたっけぇ？」
1220 = "「Anh Soutetsu,\nthích tắm lâu đến thế cơ ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうではない。望むところと思ったのは――\n貸切風呂が、特訓に最適であると考えたからだ」
986 = "「Không phải vậy. Lý do anh mong muốn là vì—— anh nghĩ bồn tắm bao trọn gói này, là nơi lý tưởng nhất để đặc huấn.」"
# 【れいな】
# display as 玲奈
# JP: 「とっくんですかぁ」
1175 = "「Đặc huấn ạ~」"
# monologue
# JP: のんきに言って、\nタオルうさぎの耳をぴこぴこひっぱり動かす。
1598 = "Cô bé nói một cách thản nhiên, vừa giật giật đôi tai của con thỏ khăn tắm."
# monologue
# JP: うむ？　あるいは……\nれいなはすでに、特訓を諦めて割り切った――
1413 = "Ưm? Hay là…… Reina đã từ bỏ đặc huấn và chấp nhận sự thật rồi——"
# 【れいな】
# display as 玲奈
# JP: 「わ！　とっくんって、れいなのとっくん。\nせっくすのときのおもらしを直すとっくんですねぇ！」
1075 = "「A! Đặc huấn, là đặc huấn của Reina. Đặc huấn sửa tật tè dầm khi làm tình đúng không ạ~!」"
# monologue
# JP: ――ああいや、割りきってはなかったらしい。
771 = "——À không, có vẻ như cô bé vẫn chưa từ bỏ."
# monologue
# JP: ついさっきまで極楽ムードにゆるんでいた目が、\n一転、キラキラと輝いている。
1421 = "Đôi mắt vừa nãy còn đang mơ màng trong bầu không khí cực lạc, nay lại đột ngột sáng lấp lánh."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、一緒にとっくんしてくれますかぁ？」
1221 = "「Anh Soutetsu, sẽ cùng đặc huấn với Reina chứ ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ」
1186 = "「Tất nhiên rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい！」
1192 = "「Waaai!」"
# monologue
# JP: （ざばあっ！）
1742 = "（Ào!）"
# monologue
# JP: 勢いも良くたちあがり、\nれいなはグイグイ僕の手を引く。
1552 = "Đứng bật dậy một cách đầy khí thế, Reina kéo tay tôi lôi đi xềnh xệch."
# 【れいな】
# display as 玲奈
# JP: 「じゃあそうてつさん。\nさっそく、とっくんの準備をしましょお！」
1218 = "「Vậy thì anh Soutetsu. Mau chuẩn bị đặc huấn thôi nào!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……う、む？」
775 = "「……Ư, m?」"
# monologue
# JP: 僕の股間に、れいながちょこん、と鎮座している。\nと言うか僕が、れいなの前に立たされている。
1589 = "Ngay trước đũng quần tôi, Reina đang ngồi chễm chệ. Hay đúng hơn là, tôi đang bị bắt đứng trước mặt Reina."
# monologue
# JP: たいへん素晴らしい景色なのだが、\nどうにも理解が追いつかん。
1651 = "Khung cảnh này quả thực vô cùng tuyệt vời, nhưng tôi vẫn chưa hiểu chuyện gì đang xảy ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「なぁ、れいな。特訓というのは、\n『セックスのときのおもらしを防ぐ』――特訓だよな？」
1151 = "「Này, Reina. Đặc huấn nghĩa là, đặc huấn 『ngăn chặn việc tè dầm khi làm tình』——đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、そおですよ？　そうてつさん」
1109 = "「Vâng ạ~, đúng rồi mà? Anh Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そして、おもらしの発生条件は、れいなが性的に、\nものすごく気持ちよくなってしまうこと――だよな？」
1191 = "「Và, điều kiện để xảy ra việc tè dầm, là Reina về mặt tình dục, cảm thấy vô cùng sướng——đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「はわわ。そんな風にいわれたら、\nれいな、ちょっとだけ照れちゃいますよぉ」
1033 = "「Hawawa. Bị nói thẳng ra như thế, Reina, có hơi xấu hổ một chút đó ạ~」"
# monologue
# JP: 顔を赤くし、れいながもぞりと体を動かす。
1590 = "Khuôn mặt đỏ bừng, Reina vặn vẹo cơ thể."
# monologue
# JP: 洗いたての髪の匂いが鼻をくすぐり、ただそれだけで、\n僕の勃起はヒクついて――ああ、いや、そうではなくて。
1390 = "Mùi hương của mái tóc vừa gội sạch cọ vào mũi tôi, chỉ bấy nhiêu thôi, sự cương cứng của tôi đã giật giật——à, không, không phải chuyện đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「なのに、どうしてこの姿勢なのだ？\nこれでは僕は、れいなを気持ち良くしてやれん」
1001 = "「Thế nhưng, tại sao lại là tư thế này? Thế này thì anh, không thể làm cho Reina sướng được.」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんは、こういうことしてて――\nおもらししちゃう！　って思ったこと、ないですかぁ？」
1219 = "「Anh Soutetsu, lúc làm những chuyện như thế này—— đã bao giờ nghĩ là, mình sắp tè dầm mất! Chưa ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無いな」
987 = "「Chưa từng.」"
# 【れいな】
# display as 玲奈
# JP: 「それって、きっと。れいながそうてつさんのこと、\nすっごくは、気持ちよくしてあげられてないからです」
1215 = "「Vậy thì, chắc chắn là do. Reina chưa thể làm cho anh Soutetsu, sướng đến mức đó rồi ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む――」
1020 = "「Hừm——」"
# monologue
# JP: れいなの声は、沈んでいない。\n瞳も強い。固い決意に、燃えている。
1437 = "Giọng của Reina, không hề trầm xuống. Đôi mắt cũng rất mạnh mẽ. Đang rực cháy một quyết tâm sắt đá."
# 【れいな】
# display as 玲奈
# JP: 「だかられいな、まず、そうてつさんをすっごく気持ち\nよくしてあげて、おもらし、させちゃおうって思うです」
1159 = "「Thế nên Reina, đầu tiên, phải làm cho anh Soutetsu thật sự sướng, rồi làm cho anh tè dầm luôn, em nghĩ vậy đó ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「つまり――\n僕とれいなで、同じ体験を共有しようという目論見か」
994 = "「Nói cách khác—— Em định để anh và Reina, cùng chia sẻ chung một trải nghiệm sao.」"
# 【れいな】
# display as 玲奈
# JP: 「そおです！　そおしたら、ふたりで一緒に考えて、\nきっと、もっといい特訓の方法が見つかるですよぉ！」
1167 = "「Đúng rồi ạ! Làm thế, hai người cùng nhau suy nghĩ, chắc chắn, sẽ tìm ra phương pháp đặc huấn tốt hơn đó ạ~!」"
# monologue
# JP: （さわっ）
1749 = "（Chạm nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1074 = "「!」"
# 【れいな】
# display as 玲奈
# JP: 「だからですねぇ、そうてつさん」
1158 = "「Thế nên là~, anh Soutetsu」"
# monologue
# JP: ぺろりとピンクの舌が蠢き、その唇の周りを濡らす。
1556 = "Chiếc lưỡi màu hồng liếm láp ngọ nguậy, làm ướt quanh viền môi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんにすっごく気持ちよくなってもらうため、\nれいな、ひみつのテクニック習ってきたのです！」
1172 = "「Để làm cho anh Soutetsu sướng thật là sướng, Reina, đã đi học một kỹ thuật bí mật rồi đó ạ!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
1096 = "「Hô」"
# monologue
# JP: ポーレットからか？　と尋ねかけ、\nけれどもそれは喉に押し込む。
1485 = "Học từ Paulette sao? Tôi định hỏi vậy, nhưng rồi lại nuốt ngược vào trong."
# monologue
# JP: こんなとき、他の女の名を呼ぶべきではないだろう。\n大切なのは、れいなが僕のため学んでくれたことだけだ。
1653 = "Lúc này, không nên nhắc đến tên của người phụ nữ khác. Điều quan trọng nhất là, Reina đã vì tôi mà đi học hỏi."
# 【双鉄H】
# display as 雙鐵
# JP: 「では、頼む。\n僕を、おもらししてしまうほど――気持ちよくしてくれ」
1212 = "「Vậy thì, nhờ em nhé. Hãy làm cho anh——sướng đến mức tè dầm luôn đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ――ぺろっ」
1132 = "「Vâng ạ~——liếm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1074 = "「啊！」" 
# monologue
# JP: れいなの両手が勃起を大きく押ししごき、\n包皮がひきつれるほどに、腹の側へと寄せ伸ばす。
1571 = "Hai tay Reina vuốt ve mạnh bạo sự cương cứng của tôi, kéo tuột lớp bao quy đầu xuống tận gốc bụng."
# monologue
# JP: そうして際立つ亀頭のくびれを、\n短い舌が、一生懸命に舐め回す。
1668 = "Và rồi phần rãnh quy đầu lộ rõ ra, được chiếc lưỡi ngắn ngủn của cô bé liếm láp một cách đầy nỗ lực."
# 【れいな】
# display as 玲奈
# JP: 「れるっ――ぺろっ――ちゅっ――ちゅううっ――\nんっ……あむ～～～～んっ――」
1089 = "「Chụt——liếm——chụt——chụt——\nƯm……ammmmm——」"
# monologue
# JP: れいなの唾液が、亀頭のくびれにたらされる。\n伸ばされてた包皮が戻され、前後運動するリズムが産まれる。
1423 = "Nước bọt của Reina, nhỏ giọt xuống rãnh quy đầu. Lớp bao quy đầu bị kéo xuống lại được đẩy lên, tạo ra nhịp điệu chuyển động tiến lùi."
# 【れいな】
# display as 玲奈
# JP: 「よいしょ、よいしょ、しこ、しこ、しゅこ、しゅこ。\nしこしこ、しこしこ、しゅこしゅこしゅこしゅこっ！」
1113 = "「Hây dô, hây dô, sục, sục, sục, sục. Sục sục, sục sục, sục sục sục sục!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1050 = "「!」"
# monologue
# JP: 竿を両手でしごく動きが、\nゆるいものから段々速度と強さとを増す。
1570 = "Chuyển động vuốt ve thân gậy bằng cả hai tay, từ chậm rãi dần dần tăng tốc độ và lực độ."
# monologue
# JP: たらされていた唾液が潤滑油となって、\n動きにあわせ、ぐちぐちいやらしい音を立てる。
1431 = "Nước bọt nhỏ xuống trở thành dầu bôi trơn, phối hợp với chuyển động, tạo ra những âm thanh lép nhép dâm đãng."
# 【れいな】
# display as 玲奈
# JP: 「んふー、このくらい固くなったら、\nきっと、だいじょうぶですよねぇ」
1102 = "「Nfu~, cứng đến mức này rồi thì, chắc chắn, là không sao rồi nhỉ~」"
# monologue
# JP: 動きが止まる。\nすひすひ、鼻からの排気が亀頭をくすぐる。
1550 = "Chuyển động dừng lại. Su hi su hi, hơi thở từ mũi cô bé phả vào quy đầu nhột nhạt."
# monologue
# JP: そしてれいなは、大きく大きく口を開け――
1535 = "Và rồi Reina, há miệng thật to thật to——"
# 【れいな】
# display as 玲奈
# JP: 「あーーーー…………んむうっ」
1056 = "「Aaaaa…………ưm」"
# monologue
# JP: （ぬろおっ！）
1726 = "（Cái rột!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――うっ――」
1041 = "「A——ư——」"
# monologue
# JP: 舌の絨毯に誘導されて、\n勃起がずるずる、れいなの口内に吸われてく。
1639 = "Được tấm thảm lưỡi dẫn đường, sự cương cứng của tôi cứ thế, bị hút tuột vào trong miệng Reina."
# monologue
# JP: 風呂に入ってたせいだろう、\nいつもより高い温度が、もうそれだけで気持ちいい。
1357 = "Có lẽ vì vừa ngâm bồn tắm, nhiệt độ cao hơn bình thường, chỉ riêng điều đó thôi đã đủ sướng rồi."
# 【れいな】
# display as 玲奈
# JP: 「ふっ……んっ――チュっ……ちゅろっ――\nえむッ――れるっ――れろっ――んむっ」
1101 = "「Phù……ưm——chụt……chụt——\nE mu——chụt——chụt——ưm」"
# monologue
# JP: ゆっくりゆっくり、れいなが頭を動かして、\n僕の勃起を余さず愛撫してくれる。
1561 = "Từ từ, thật từ từ, Reina cử động đầu, âu yếm sự cương cứng của tôi không chừa một chỗ nào."
# 【れいな】
# display as 玲奈
# JP: 「んっ……ンッ――んむっ――んうっ――\nれるっ――れろっ――ちゅぷっ――ちゅぼっ」
1090 = "「Ưm……Ưm——ưm——ư——\nChụt——chụt——chụt——chụt」"
# monologue
# JP: 唇をきつくすぼめて、性感をより際立たせる。
1424 = "Cô bé mím chặt môi lại, làm cho khoái cảm càng thêm rõ rệt."
# monologue
# JP: 口内の狭さと吸い込む力が密着感を産みだして、\nじわじわと、僕の精液を尿道口へと押し上げていく。
1540 = "Sự chật hẹp của khoang miệng và lực hút tạo ra cảm giác bám chặt, từ từ, đẩy tinh dịch của tôi dồn lên phía lỗ niệu đạo."
# 【れいな】
# display as 玲奈
# JP: 「んむっ――んふっ――れるっ――るっ――\nちゅっ――ちゅむ――ちゅるっ――ちゅううううっ」
1091 = "「Ưm——nfu——chụt——chụt——\nChụt——chụt——chụt——chụtttttt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1074 = "「啊！」" 
# monologue
# JP: 強く吸われて、腰が思わず動いてしまう。
1434 = "Bị mút mạnh, hông tôi bất giác cử động."
# monologue
# JP: 途端にれいなは動きを止めて、\n上目遣いの目だけで、いたずらな笑みを浮かべる。
1573 = "Ngay lập tức Reina dừng lại, chỉ dùng ánh mắt ngước lên nhìn tôi, nở một nụ cười tinh nghịch."
# 【れいな】
# display as 玲奈
# JP: 「んふふ～　ほれふぁら、えひふぁ、へひほーれふぅ」
1115 = "「Nfufu~ ho re fua ra, e hi fua, he hi ho re fuu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――れいな、この状態でしゃべると舌がっ」
991 = "「Không——Reina, nói chuyện trong trạng thái này thì lưỡi sẽ」"
# 【れいな】
# display as 玲奈
# JP: 「ふぇいっ！」
1119 = "「Fuei!」"
# monologue
# JP: （ぞろおおおおおおおおおおおおおおおおおおっ！！！）
1738 = "（Rộtttttttttttttttttttttttttttttttttttttttt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！？」
1080 = "「!!!?」"
# monologue
# JP: れいなの口の上蓋の、その更に奥に飲み込まれていく！
1633 = "Nó bị nuốt chửng vào tận sâu hơn nữa, qua cả vòm họng của Reina!"
# 【れいな】
# display as 玲奈
# JP: 「ンムッ――むっ――んううううっ～～～～っ！」
1099 = "「Nmu——mu——uuuuuuu~~~~!」"
# 【双鉄H】
# display as 雙鐵
# JP: （なんだ――なんだ、これはっ――）
1760 = "（Cái gì——chuyện gì thế này——）"
# monologue
# JP: 最奥の筈の部分の、更に奥。\nそこに呑まれていくことに原初の恐怖を感じさせられ――
1520 = "Sâu hơn cả phần đáng lẽ ra là tận cùng. Cảm giác bị nuốt chửng vào nơi đó mang đến một nỗi sợ hãi nguyên thủy——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ――あっ――んくっ――うっ」
1054 = "「A——a——ưm——ư」"
# monologue
# JP: けれど同時に、その恐怖さえ塗り込め圧倒してしまう、\n強烈すぎる快感が来る！
1371 = "Thế nhưng đồng thời, một khoái cảm quá đỗi mãnh liệt ập đến, áp đảo và bóp nghẹt cả nỗi sợ hãi ấy!"
# 【れいな】
# display as 玲奈
# JP: 「ん……ぉ……っぐ――んぐっ――はっ――うっ」
1094 = "「Ưm……o……gu——ngu——ha——ư」"
# monologue
# JP: （きゅううううううっ）
1754 = "（Siết chặttttttt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
1045 = "「Ư!」"
# monologue
# JP: 狭い何かに締められながら震わせられて、\n体も心も、脳もガクガク揺らされる。
1541 = "Bị một thứ gì đó chật hẹp siết chặt và làm cho run rẩy, cả cơ thể, trái tim, và não bộ đều bị rung lắc dữ dội."
# 【双鉄H】
# display as 雙鐵
# JP: 「うぁっ――あっ――ああっ！」
1042 = "「Ua——a——aa!」"
# 【れいな】
# display as 玲奈
# JP: 「ンぶっ――むううっ――んっ――ふっ――んっ――\n（スヒっ）――（スヒっ）――んふふぅぅぅ～」
1092 = "「Nbu——muuu——ưm——phù——ưm——\n（Suhi）——（Suhi）——nfufuuu~」"
# monologue
# JP: 苦しげな声、それと同時にすぼまる感触、\nきゅっと圧迫される亀頭。
1492 = "Giọng nói đượm vẻ khổ sở, cùng lúc đó là cảm giác co thắt, quy đầu bị chèn ép chặt cứng."
# monologue
# JP: 鼻からの排気が当たる強さが、\nようやく僕に、現状認識を与えてくれる。
1433 = "Lực phả ra từ hơi thở đằng mũi, cuối cùng cũng giúp tôi nhận thức được tình trạng hiện tại."
# 【双鉄H】
# display as 雙鐵
# JP: （れいなは――僕を……\n僕の勃起を、喉を使って――“呑んで”いるのか）
1751 = "（Reina đang——mình…… dùng cổ họng——\"nuốt\" lấy sự cương cứng của mình sao）"
# monologue
# JP: ぞくぞくとした快感が。\n達成感と征服感と密着感と幸福感とが湧いてくる。
1466 = "Khoái cảm rần rần chạy dọc cơ thể. Cảm giác thành tựu, cảm giác chinh phục, cảm giác gắn kết và cảm giác hạnh phúc trào dâng."
# monologue
# JP: れいなは小さな体をフルに、文字通りいっぱいに使いきり、\n僕に強烈な快感を与えようと頑張ってくれている。
1555 = "Reina đang dùng toàn bộ cơ thể nhỏ bé của mình, theo đúng nghĩa đen, cố gắng hết sức để mang lại cho tôi một khoái cảm mãnh liệt."
# 【れいな】
# display as 玲奈
# JP: 「んぐっ――ほっ……ふっ――あっ――\nぃっ――ぷっ――ろっ――ほ……んっ――ふっ」
1067 = "「Ngu——ho……phù——a——\ni——pu——ro——ho……ưm——phù」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、最高だ」
1107 = "「Ừ, tuyệt lắm.」"
# monologue
# JP: 喉を圧迫されてるせいか、れいなの声は、\nもう声ではなく、切れ切れの息としか聞こえない。
1356 = "Có lẽ vì cổ họng bị chèn ép, nên giọng của Reina, không còn là giọng nói nữa, mà chỉ nghe như những tiếng thở đứt quãng."
# monologue
# JP: けれどそのたび頭をぶるぶる震わす刺激が、\nそして気持ちと瞳とが、言葉の意味を伝えてくれる。
1372 = "Nhưng mỗi lần như thế, sự kích thích làm rung lắc đầu óc tôi, cùng với cảm xúc và ánh mắt, đã truyền tải ý nghĩa của những lời nói ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ディープ、スロートと……いうのか――\nこれは……確かに……すさ、まじい――テクニックだ」
1171 = "「Gọi là, Deep Throat……sao—— Cái này……quả thực là……một kỹ thuật——đáng sợ.」"
# 【れいな】
# display as 玲奈
# JP: 「んっぐー」
1116 = "「Ngu~」"
# monologue
# JP: 笑い声さえ、締められたような音になる。\n笑い声さえ、亀頭を絞る強い快感に変わってしまう。
1655 = "Đến cả tiếng cười, cũng biến thành âm thanh như bị bóp nghẹt. Đến cả tiếng cười, cũng hóa thành khoái cảm mãnh liệt vắt kiệt quy đầu."
# monologue
# JP: 精液がぶくりと泡立つ気がする。\n射精したいと、欲が爆発的に膨らむ。
1480 = "Cảm giác tinh dịch đang sủi bọt sùng sục. Dục vọng muốn xuất tinh bùng nổ phình to."
# 【れいな】
# display as 玲奈
# JP: 「ほっ――ぐっ――んっ――\nんごっ――んっ――ヘッ――えうっ――ひゅっ」
1064 = "「Ho——gu——ưm——\nNgo——ưm——he——eu——hyu」"
# monologue
# JP: 『動いていい』と、れいなが誘ってくれている。
1565 = "『Anh có thể cử động』, Reina đang mời gọi tôi."
# monologue
# JP: （ずっ！）
1745 = "（Phụt!）"
# 【れいな】
# display as 玲奈
# JP: 「んぶっ！」
1069 = "「Nbu!」"
# monologue
# JP: 理解と同時に、腰が動いてしまってる。\n苦しげな声に、“止まらなくては”と思いはするが――
1514 = "Ngay khoảnh khắc hiểu ra, hông tôi đã tự động cử động. Nghe giọng nói khổ sở ấy, tôi nghĩ \"phải dừng lại thôi\" nhưng——"
# monologue
# JP: （ずっ！　ずぶっ！　ずろおっ！　ずりゅっ！）
1724 = "（Phụt! Phập! Rột! Rột!）"
# 【れいな】
# display as 玲奈
# JP: 「えっ――んぐっ――ぐっ――ん、むっ――」
1066 = "「E——ngu——gu——ưm, mu——」"
# monologue
# JP: だが、止まれない。\nえづいているような声を聞き。目のふちに浮く涙を見ても。
1369 = "Nhưng, tôi không thể dừng lại. Dù nghe thấy giọng nói như đang ọe, dù nhìn thấy những giọt nước mắt đọng trên khóe mi."
# 【れいな】
# display as 玲奈
# JP: 「ぐっ――むっ――じゅっ――むぐっ――んっ！」
1093 = "「Gu——mu——ju——mugu——ưm!」"
# monologue
# JP: （きゅうううううっ！）
1753 = "（Siết chặtttttt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅっ――あっ」
1046 = "「Ư——a」"
# monologue
# JP: それほど苦しげな姿でもなお、僕の快感を強めるために、\nれいなは喉をすぼめて、必死で息を吸い込んでは吐く。
1558 = "Dù trong bộ dạng khổ sở đến thế, nhưng để tăng thêm khoái cảm cho tôi, Reina vẫn thu hẹp cổ họng, liều mạng hít vào rồi thở ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいなっ――れいなっ！」
1179 = "「Reina——Reina!」"
# monologue
# JP: その健気さが、可愛さが、腰の動きを速めてしまう。
1652 = "Sự kiên cường ấy, sự đáng yêu ấy, khiến chuyển động hông của tôi càng lúc càng nhanh."
# monologue
# JP: （ずっ――るっ――ずぶっ――ぬごっ――）
1720 = "（Phụt——rột——phập——nugo——）"
# 【れいな】
# display as 玲奈
# JP: 「んぶっ――むっ――んっ――んんっ――むっ――\nぐっ――ぐうっ――んっうっ――」
1061 = "「Nbu——mu——ưm——ưm——mu——\nGu——guu——ưm u——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――うっ――」
# 1020 = "「呃……」" 
# monologue
# JP: 精液が中から鈴口を押す。\nれいなを早く解放したくて苦しい声を聞きたくなくてっ！
1621 = "Tinh dịch từ bên trong ép lên lỗ niệu đạo. Tôi muốn nhanh chóng giải phóng cho Reina, không muốn nghe giọng nói khổ sở ấy nữa!"
# 【双鉄H】
# display as 雙鐵
# JP: 「れいなっ！」
1183 = "「Reina!」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　どびゅ！）
1730 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【れいな】
# display as 玲奈
# JP: 「ンムッ――むっ――ぐっ――んぐうっ！？」
1065 = "「Nmu——mu——gu——nguu!?」"
# monologue
# JP: （ぬろおおおっ！）
# 1726 = "（咕啾！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「うおっ！！！？」
# 1080 = "「啊！！！？」" 
# monologue
# JP: 射精の勢いが強すぎたのか、\n喉から腹への直接射精にれいなの体が驚いたのか――
1452 = "Không biết là do lực xuất tinh quá mạnh, hay là do cơ thể Reina giật mình vì bị xuất tinh trực tiếp từ cổ họng xuống dạ dày——"
# monologue
# JP: （びゅっ――ぶっ――びゅる――びゅうっ――）
1728 = "（Phụt——phụt——phụt——phụt——）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁっ――あっ――んっ――んっ――んむっ――\nんくっ――ごくっ――ごくっ――――――ごくんっ」
1196 = "「Fua——a——ưm——ưm——nmu——\nNku——goku——goku——————gokun」"
# monologue
# JP: ――喉奥から出、口内に戻り、なおくるまれる亀頭から、\n溢れ続ける精液は、残さず、れいなに飲み下される。
1669 = "——Rút ra khỏi cổ họng, trở lại khoang miệng, nhưng quy đầu vẫn được bao bọc, tinh dịch tiếp tục trào ra, không sót một giọt nào, đều bị Reina nuốt chửng."
# 【れいな】
# display as 玲奈
# JP: 「ずっ――ずうううううううっ――ずじゅっ！\n――じゅるるるる～～――――ん～ッ――ごくっ」
1085 = "「Zu——zuuuuuuu——zuju!\n——Jururururu~~————n~——goku」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1074 = "「啊！」" 
# monologue
# JP: 出した精液にとどまらず、\n尿道口に残った精まで全部を吸い出し、飲み込んで。
1353 = "Không chỉ dừng lại ở lượng tinh dịch đã xuất ra, cô bé còn mút và nuốt trọn toàn bộ tinh dịch còn sót lại ở lỗ niệu đạo."
# monologue
# JP: そうしてれいなは唇まわりを舌でぺろぺろ舐めまわし、\nあどけない顔で僕に微笑む。
1569 = "Và rồi Reina dùng lưỡi liếm láp quanh môi, mỉm cười với tôi bằng khuôn mặt ngây thơ vô tội."
# 【れいな】
# display as 玲奈
# JP: 「――ぷあっ！　あっ――どうですか？　そうてつさぁん。\nおもらし、しちゃいそうになりましたかぁ？」
1121 = "「——Pua! A——thế nào ạ? Anh Soutetsu~. Anh có cảm giác, sắp tè dầm ra chưa ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ」
# 1050 = "「啊」" 
# monologue
# JP: 瞬間、ひらめく。\nつまり――つまりはそういうことだと。
1497 = "Khoảnh khắc đó, tôi chợt hiểu ra. Nói cách khác——nghĩa là chuyện như vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「おもらしは、した。\n精液を――僕はびゅうびゅう、激しくもらした」
1146 = "「Tè dầm, thì có rồi. Tinh dịch——anh đã tè dầm ra ồ ạt, vô cùng mãnh liệt.」"
# 【れいな】
# display as 玲奈
# JP: 「ふえ？」
1026 = "「Fue?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わからんか――つまりだ。\n僕の射精と、れいなのおもらしは恐らく、同じだ」
1004 = "「Em không hiểu sao——nghĩa là thế này. Việc anh xuất tinh, và việc Reina tè dầm, có lẽ là, giống hệt nhau.」"
# 【れいな】
# display as 玲奈
# JP: 「！！！」
1079 = "「!!!」"
# monologue
# JP: まるで稲妻に打たれたように、\nれいなが大きく身じろぎをする。
1585 = "Như thể bị sét đánh trúng, Reina giật mình nảy người lên một cái rõ mạnh."
# monologue
# JP: ふるふる小さく頭を振って、\n振った頭で、今度はぶんぶん、何度も頷く。
1426 = "Cô bé khẽ lắc lắc cái đầu nhỏ, rồi lại dùng cái đầu ấy gật gật liên tục."
# 【れいな】
# display as 玲奈
# JP: 「なら――なら、れいなが――\nせっくすのときにおもらししちゃうの」
1207 = "「Vậy thì——vậy thì, Reina—— việc tè dầm khi làm tình ấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「恐らく、恥ずかしいことではない。\nむしろ、当然の……ごくごく自然なことかと思う」
1145 = "「Có lẽ, đó không phải là chuyện đáng xấu hổ. Ngược lại, anh nghĩ đó là chuyện đương nhiên……vô cùng tự nhiên.」"
# 【れいな】
# display as 玲奈
# JP: 「なんだ。なぁんだ――そおだったんですねぇ」
1206 = "「Gì chứ. Ra là vậy——thì ra là vậy ạ~」"
# monologue
# JP: 安堵しきった、ほやほや笑顔。\n僕のこころまで温かになる。
1563 = "Nụ cười rạng rỡ, tràn ngập sự an tâm. Làm ấm áp cả trái tim tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいな、れいなだけ、\nおもらししちゃうの、ヤではずかしいって思ってたです」
1182 = "「Reina, cứ tưởng chỉ có mỗi Reina, là tè dầm thôi, nên mới thấy ghét và xấu hổ lắm ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「イヤでも、恥ずかしいことでもないさ。\n僕も射精で、おもらししまくってるのだから」
990 = "「Không có gì phải ghét, cũng chẳng có gì phải xấu hổ cả. Anh cũng xuất tinh, tè dầm suốt đấy thôi.」"
# monologue
# JP: どのみち、僕らのセックスは、\n僕らふたりで、完全に完結しているものだ。
1533 = "Dù sao thì, việc làm tình của chúng tôi, là điều hoàn toàn trọn vẹn chỉ giữa hai chúng tôi."
# monologue
# JP: お互いがそれを許容するなら、喜ぶのなら、\nおもらしにさえ、虹のきらめきを見いだせる。
1405 = "Nếu cả hai đều chấp nhận điều đó, đều cảm thấy vui vẻ, thì ngay cả trong việc tè dầm, cũng có thể tìm thấy ánh sáng lấp lánh của cầu vồng."
# 【双鉄H】
# display as 雙鐵
# JP: 「だから、安心しておもらししていい。\n男は射精し、女はおもらし。それが、恐らくセックスだ」
1155 = "「Thế nên, em cứ yên tâm mà tè dầm. Đàn ông xuất tinh, phụ nữ tè dầm. Có lẽ, làm tình là như vậy đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。れいな、それならぁ」
1189 = "「Reina hiểu rồi ạ~. Reina, nếu vậy thì~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1074 = "「啊！」" 
# monologue
# JP: れいなが、甘えてすりよってくる。\n小鼻で額で唇で、乳首でお腹で太ももで。
1600 = "Reina, nũng nịu cọ cọ vào tôi. Bằng cánh mũi, bằng trán, bằng môi, bằng nhũ hoa, bằng bụng, bằng đùi."
# monologue
# JP: かわいい。かわいい。かわいい。かわいい。\nあれほど激しい射精を終えた勃起がすぐさま、硬度を戻す。
1347 = "Đáng yêu. Đáng yêu. Đáng yêu. Đáng yêu. Sự cương cứng vừa trải qua một lần xuất tinh dữ dội đến thế, nay lại lập tức khôi phục độ cứng."
# 【れいな】
# display as 玲奈
# JP: 「れいな、そうてつさんと」
1180 = "「Reina, muốn cùng anh Soutetsu」"
