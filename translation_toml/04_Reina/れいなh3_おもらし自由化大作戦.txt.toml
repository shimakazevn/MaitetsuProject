# monologue
# JP: それを解けばれいなは今度は、\n胸板にすりつき甘えてくれる。
1623 = "結束之後，她又依靠在我的胸膛上撒嬌。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。れいな――れいな――\n不思議なおもらし――しちゃいましたぁ」
1217 = "「雙鐵先生。玲奈……玲奈……尿出來好奇怪的東西……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。そうだったな。\nあれは、おしっことは違った――ああ」
1163 = "「是啊。那個不是小便……對了」" 

# monologue
# JP: （ぺろっ）
1758 = "（舔）" 

# 【れいな】
# display as 玲奈
# JP: 「やぁんっ」
1040 = "「哎呀」" 

# monologue
# JP: 僕の二の腕にかかったそれを舐めてみる。\nやはり、おしっこの味じゃない。
1494 = "我舔了舔沾在上臂的液體。果然不是尿液的味道。" 

# monologue
# JP: 塩気もえぐみも感じぬそれは、\n薄い酸味を帯びてるようだ。
1527 = "沒有鹹味和澀味，而是一股淡淡的酸味。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「これがあるいは、女性の、射精のおもらしなのかな」
1205 = "「這就相當於女性的射精吧」" 

# 【れいな】
# display as 玲奈
# JP: 「おもらしにも、いろいろ種類があるんですかぁ？」
1125 = "「失禁還有很多種類？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「かもしれん。今の段階では断言できんが」
996 = "「也許吧，現在還很難說」" 

# monologue
# JP: ポーレットにも、他の誰にも、聞いてみようとは思わない。\n文献にあたる必要さえをも感じない。
1487 = "我沒有想過要問波萊特，也沒想問其他人。甚至沒有必要去查詢資料。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だから、れいなと確かめたい。セックスと――\nセックスのときのおもらしの種類と、関係性とを」
1154 = "「所以……我想跟你一起確認。做愛和做愛時失禁的種類，究竟有什麼關聯性」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへ～れいなも、そうてつさんと、\nたくさんたぁくさん、お勉強して研究したいですよぉ」
1118 = "「嘿嘿，玲奈也是，想跟雙鐵先生做好多好多的學習研究」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか、なら」
1165 = "「是嗎，我們……」" 

# monologue
# JP: （すりっ）
# 1727 = "（咕啾）" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃんっ！」
# 1069 = "「啊嗯！」" 

# monologue
# JP: あれほどの射精を繰返し、\nそれでも僕は、僕の勃起は、れいなを求める。
1512 = "明明射了那麼多，但我的肉棒依然在索求她。" 

# monologue
# JP: れいなも疲れた様子を見せず、\n僕の求めにもじもじと、おしりを振って応えてくれる。
1547 = "玲奈也完全不見疲憊的樣子，忸怩著搖擺屁股回應我的欲望。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いくぞ？　れいな」
1149 = "「我要來囉，玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ――えへへ、そうてつさぁん」
1128 = "「好呀……嘿嘿，雙鐵先生」" 

# 【双鉄H】
# display as 雙鐵
# JP: （セックスと――おもらしと――僕と――れいなと）
1718 = "（做愛與失禁……我與玲奈……）" 

# monologue
# JP: 実験はいつまでも終わらない。
1446 = "實驗永遠不會結束。" 

# monologue
# JP: 例え一つの答えをふたりで見つけても、\nその先を――貪欲に、求め続けるに決まってるから。
1458 = "就算我們找到了答案，最後也一定會繼續渴求對方。" 
