1136 = "「A a a!!!」"
# monologue
# JP: 自分の喉から溢れる歓喜が、ひどく遠いものと聞こえる。
1607 = "Tiếng hân hoan thốt ra từ cổ họng tôi, nghe sao mà xa xăm đến thế."
