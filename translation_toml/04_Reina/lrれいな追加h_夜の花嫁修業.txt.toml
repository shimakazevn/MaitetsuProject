1550 = "Tôi muốn bảo em ấy đợi đã, nhưng giọng nói như chực nghẹn lại nên không thể thốt nên lời.\nReina vừa vuốt ve lỗ hậu, vừa đưa bàn tay trái còn trống về phía trước."
