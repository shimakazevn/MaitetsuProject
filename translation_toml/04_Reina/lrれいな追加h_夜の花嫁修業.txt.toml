# display as 雙鐵
# JP: 「れいなっ――れいなっ」
1260 = "「玲奈——玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「んゆうっ！！！」
1178 = "「嗯！！！」" 

# monologue
# JP: 射精しながら、れいなの乳首をひたすら弄る。\n反応して蠢く狭膣に、尿道内の精液全部を絞ってもらう。
1546 = "我一邊激昂地射精，一邊戳弄起玲奈的乳頭。玲奈的蜜裂立即做出蠕蠕而動的反應，將我尿道裡的存貨悉數榨乾。" 

# monologue
# JP: （びゅっ――びゅうっ――びゅるっ――ぶ――ぷっ）
1942 = "（餘韻悠長）" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ――れいなっ」
# 1260 = "「玲奈——玲奈」" 

# monologue
# JP: れいなを抱き寄せキスをする。
1566 = "我抱緊玲奈吻上她的唇。" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ――んっ――れりゅっ――ちゅっ――ちゅむっ、\nれろおっ――んちゅっ――ちゅるううっ――ちゅ、ちゅ」
1071 = "「呼啊——嗯——咧溜——啾——啾啾，滋溜——嗯啾——啾嚕嚕——啾啾」" 

# monologue
# JP: さんざローションを塗った乳首が僕の胸板に潰されて、\nどうしようもなく心地いい愛しさだけを染み込ませてくる。
1485 = "因潤滑液而變得光滑無比的乳頭擠壓在我的胸膛上，在產生快感的同時還有一股無以言表的濃情蜜意深深烙在我的心裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ぷあっ――あ……。あっ――ふ、あ」
724 = "「——噗哈——啊……呼、啊」" 

# monologue
# JP: キスを解けば、ぶわぶわ汗が吹き出してくる。\n汗の勢いと反比例して、身体の力はどうっと抜ける。
1753 = "鬆開唇舌後，我身上不自覺地開始冒汗。汗流得越多，身體就越來越無力。" 

# 【れいな】
# display as 玲奈
# JP: 「ふああああああああ」
# 1077 = "「呼啊啊啊——」" 

# monologue
# JP: れいなもらしい。くたりと崩れる。\nだからやさしく抱いて支える。
1634 = "玲奈似乎也和我一樣。她的身子一下子癱軟了下來，我只好輕輕地將她摟在懷裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すごい。――すごかったな。――ぅ――あ。\nジェルを使ったセックスは、僕らと相性が実によかった」
1197 = "「好厲害。——太舒服了。——唔——啊。用潤滑液做愛簡直是為我們量身定造的特殊玩法」" 

# 【れいな】
# display as 玲奈
# JP: 「ほんと……ふ――あ――（ごくっ）――ん。\nほんとに――すっごく――ぅ――そう、ですねぇ」
1283 = "「真的……呼——啊——（吞嚥）——嗯。真的——說的——一點也沒錯啊」" 

# monologue
# JP: れいなも力がはいらんのだろう。うごきはひどく緩慢だ。\n下半身をぶるぶる震わせながら身体を伸ばして――む？
1665 = "玲奈的身體看起來也同樣使不上勁，動作極其緩慢。她的下半身一震一顫的，但身體卻在往前伸——嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ジェル……ああ、二回戦ならもう少しだけ休ませてくれ。\n僕も、もう一度――もう何度でも、この快感は――」
1247 = "「果凍……啊，打算來第二回合的話先讓我休息一會吧。我也想再——不管多少遍——還想再體驗這種快感——」" 

# 【れいな】
# display as 玲奈
# JP: 「えっ、へへぇ――それなら、れいな――んっ――\nれいなっ、とっても――うれしい――でぇす」
1105 = "「哎、哎嘿嘿——真要來好多遍的話，玲奈——嗯——玲奈會非常——高興的」" 

# monologue
# JP: 待てといってるにもかかわらず、\nれいなはジェルを手にたっぷりとる。
1447 = "儘管我叫了停，玲奈卻依舊將果凍滿滿地擠在了自己的手上。" 

# 【れいな】
# display as 玲奈
# JP: 「花嫁、修行、の――っ――せいか――おもったより、\nすごく、ってっ――――。んしょ！」
1233 = "「新娘課程的——學習成果——比想像中還要優秀——嘿咻！」" 

# monologue
# JP: 指二本。\nれいなはジェルをねっとりまぶして、嬉しげに見る。
1656 = "玲奈用自己的兩根手指沾滿了果凍，並興高采烈地盯著看。" 

# 【れいな】
# display as 玲奈
# JP: 「それからジェルも、ほんとにほんとに――\nえっへへぇ～、びっくりするくらい気持ちよくって」
1312 = "「還有這個果凍是真的真的——哎嘿嘿～真的非常非常舒服，太讓玲奈意外了」" 

# monologue
# JP: れいながにっこり僕をみる。\nその目はやがて、僕の勃起を――その向こうを見る。
1670 = "玲奈轉過身來對我莞爾一笑。隨後她的視線看向了我分身的另一側。" 

# 【れいな】
# display as 玲奈
# JP: 「だかられいな、ジェルつかったら、もう一本。\n入っちゃいそうかなぁって思ってぇ」
1229 = "「所以玲奈在想，要是用上這個果凍，手指應該能多塞進去一根」" 

# monologue
# JP: （ああ）
1896 = "（是啊）" 

# monologue
# JP: 理解する。そして自分の、さっきの言葉を思い出す。\nどんなマニアックなプレイでも、一度は試してみなければ
1563 = "我懂了她的意思。然後我回想起了自己剛才說的話。不論是多麼硬核古怪的玩法，凡事都值得先嘗試一番。" 

# 【れいな】
# display as 玲奈
# JP: 「さ、そうてつさぁん。\nわんわんわんって、ね？　もういっかいできますかぁ」
1021 = "「來，雙鐵先生。你能不能再擺出小狗狗的姿勢呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1115 = "「唔」" 

# monologue
# JP: ゆえにすぐさま、四つん這いになり背中を向ける。\n指二本――れいなが何をしようと一度は、受け入れるため。
1604 = "於是我立刻背對著玲奈，再次撐起四肢趴下。玲奈伸出了兩根手指，而我則是要全心全意接受她。" 

# monologue
# JP: （つぷうっ！）
1889 = "（捅入）" 
