1211 = "「小穴裡面——呼、啊——肉肉和洞洞——都呲溜溜的——兩個地方都很舒服」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、だっ」
1223 = "「我也是」" 

# monologue
# JP: ジェルの粘りと潤滑が、勃起をさらに鋭敏にする。\nあるいはこれは尻穴を責められた余韻なのかもしれないが。
1503 = "定型液帶來的濕黏和潤滑感進一步刺激分身，使之更為敏感。這亦或是方才後庭被侵犯而餘韻未消的影響。" 

# 【れいな】
# display as 玲奈
# JP: 「なら、ならっ――ねっ――そうてつさぁん」
1317 = "「那就、那就——那個——雙鐵先生」" 

