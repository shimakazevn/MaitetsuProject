# monologue
# JP: 気づかなかった。れいなは手で亀頭をつつむようにして、\n精液を受け止めてくれている――っ！？
1572 = "Tôi không hề nhận ra. Reina đang dùng tay bao lấy quy đầu,\nvà hứng lấy toàn bộ tinh dịch——!?"
# 【れいな】
# display as 玲奈
# JP: 「ええと、これをぉ――\n（じゅずっ――ずっ――ずるるるるるるるるっ）」
1053 = "「Ừm, cái này nha~——\n（Sụp soạp——sụp——sụp soạp sụp soạp）」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！」
1013 = "「Cái!」"
# 【れいな】
# display as 玲奈
# JP: 「んぷっ――ん――ん～～～～っ――――（ごくっっ）\nぷああ。どろってしてて、お喉にはりつきますねぇ」
1177 = "「Ưm——ưm——ưm~~~~——（Ực）\nPhu a a. Đặc sệt luôn, dính cả vào cổ họng nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんてことを……」
1018 = "「Em làm cái gì vậy……」"
# monologue
# JP: れいなの口内、まだ精液がこびりつき、\n青臭い匂いがむわむわとただよってしまっている。
1659 = "Trong miệng Reina, tinh dịch vẫn còn dính chặt,\nmùi ngai ngái nồng nặc bốc lên."
# 【双鉄】
# display as 雙鐵
# JP: 「早くうがい――\nいや、この格好で洗面所までいかせるわけにも」
1219 = "「Mau súc miệng đi——\nKhông, không thể để em ấy ra phòng vệ sinh với bộ dạng này được.」"
# 【れいな】
# display as 玲奈
# JP: 「んむむ～～～」
1171 = "「Ưm ưm~~~」"
# monologue
# JP: 考えているその間にも、れいなの顔色がどんどん曇る。
1488 = "Trong lúc tôi đang suy nghĩ, sắc mặt Reina ngày càng sầm lại."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1330 = "「！」" 
# 【れいな】
# display as 玲奈
# JP: 「んむっ！？　んっ」
1174 = "「Ưm!? Ưm」"
# monologue
# JP: キスした瞬間、むわりと鼻に異臭がのぼり、\n口いっぱいに、苦味とえぐみが満ち満ちる――が――
1600 = "Khoảnh khắc tôi hôn em ấy, một mùi lạ xộc thẳng lên mũi,\nvị đắng và chát tràn ngập khoang miệng——nhưng——"
# 【れいな】
# display as 玲奈
# JP: 「あむっ――ちゅ――ちゅうっ――ちゅぶっ――ん……\nれるっ――れろっ――ちゅむっ――ちゅうっ――れるっ」
1138 = "「Ngoạm——chụt——chụt——chụt——ưm……\nLiếm——liếm——chụt——chụt——liếm」"
# monologue
# JP: 速攻でれいなの口内を清めるためには、こうするしかない。\n舌を絡めてつたわせて、どんどん唾液を流し込む。
1548 = "Để nhanh chóng làm sạch miệng Reina, tôi chỉ còn cách này.\nQuấn lấy lưỡi em ấy, liên tục truyền nước bọt sang."
# 【れいな】
# display as 玲奈
# JP: 「はっ――みゅっ――ん――れりゅ――ん……（こくっ）\nぷあっ――りゅっ――ちゅりゅうっ――ぷ――（ごく）」
1102 = "「Háp——chụt——ưm——liếm——ưm……（Ực）\nPhu a——liếm——chụt——phù——（Ực）」"
# monologue
# JP: ……じわじわと、れいなの唾液が清涼感を増していく。\nれいなの舌ももっともっとと甘く震えておねだりをする。
718 = "……Dần dần, nước bọt của Reina mang lại cảm giác thanh mát hơn.\nLưỡi của em ấy cũng run rẩy ngọt ngào, nũng nịu đòi hỏi thêm nữa."
# 【れいな】
# display as 玲奈
# JP: 「ちゅうっ――ちゅむっ――じゅずっ――（こくっ）\nれるっ、れろっ――れりゅううっ――（ごくんっ）」
1152 = "「Chụt——chụt——sụp soạp——（Ực）\nLiếm, liếm——liếm——（Ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷあ」
1162 = "「Ưm……phu a」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あ……\nキス。あまくて――すっごくきもちよかったですぅ」
1061 = "「Phu a……a……\nNụ hôn. Ngọt ngào quá——thích lắm luôn nha~」"
# monologue
# JP: れいなはうっとり、口のまわりのよだれを拭いて、\nはっとした顔で僕をみあげる。
1679 = "Reina mơ màng lau đi vệt nước bọt quanh miệng,\nrồi ngước nhìn tôi với vẻ mặt ngạc nhiên."
# 【れいな】
# display as 玲奈
# JP: 「じゃなくて、そうてつさん。\nバッチイってさっき、さっき言ってたのに」
1005 = "「Không phải thế nha~, anh Soutetsu.\nLúc nãy, rõ ràng anh bảo là bẩn mà nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「一度れいなの口内にはいってしまえば、\nばっちいことなどまったくない」
1235 = "「Một khi đã vào miệng Reina rồi,\nthì chẳng có gì là bẩn cả.」"
# monologue
# JP: 喉がイガイガしているが、この程度なら堪えられる。\nそんなことよりなによりも――
1481 = "Cổ họng tôi hơi rát, nhưng mức độ này thì vẫn chịu đựng được.\nQuan trọng hơn cả chuyện đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修業で、ポーレットはなにをれいなに吹き――\nこほん。あー、どんな指導をしてくれたのだ？」
1190 = "「Trong khóa học làm dâu, Paulette đã tiêm nhiễm gì vào đầu Reina——\nE hèm. À, cô ấy đã chỉ dạy những gì vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ええっとですねぇ、マニアックなプレイを\nふたりで一緒に楽しむほどに、夫婦の絆は深くなるって」
1185 = "「Ư hư hư~. Ừm thì nha~, cô ấy bảo là hai người cùng nhau\ntận hưởng những trò chơi kỳ quái, thì tình cảm vợ chồng sẽ càng thêm gắn kết nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
1039 = "「Ra là vậy.」"
# monologue
# JP: 言ってることには納得できる。\nが、しかし――
1734 = "Điều cô ấy nói cũng có lý.\nNhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「マニアックにもいろいろあろう」
1033 = "「Kỳ quái thì cũng có dăm bảy loại chứ.」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃん」
1088 = "「Hyan」"
# monologue
# JP: いいながら、裸のれいなを膝へと乗せる。\n買ったばかりのシェービングジェルをたっぷり手に取る。
1735 = "Vừa nói, tôi vừa bế Reina đang trần truồng lên đùi.\nLấy một lượng lớn gel cạo râu vừa mới mua ra tay."
# 【れいな】
# display as 玲奈
# JP: 「これ、ぬるぬる――そうてつさんのオヒゲ……」
1306 = "「Cái này, trơn trơn——râu của anh Soutetsu……」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。シェービングジェル。無香料無添加の――\nなんなら口に入れても問題がないとのものだから……」
1242 = "「Đúng vậy. Gel cạo râu. Không hương liệu, không chất phụ gia——\nNói chung là loại cho vào miệng cũng không sao, nên là……」"
# monologue
# JP: （ぺちょっ）
1928 = "（Phập）"
# 【れいな】
# display as 玲奈
# JP: 「んひゅんっ」
# 1175 = "「嗯啊」" 
# monologue
# JP: 塗り込む前かられいなの乳首はぴんぴんに固く尖ってる。\nそこを中心に輪を描くように――
1747 = "Ngay từ trước khi thoa lên, nhũ hoa của Reina đã cương cứng và nhô cao.\nLấy đó làm tâm, tôi vẽ những vòng tròn——"
# monologue
# JP: （ぬるっ――ぬりゅっ――れりゅっ――ぬちゅっ――）
1862 = "（Trơn tuột——trơn tuột——liếm——nhóp nhép——）"
# 【れいな】
# display as 玲奈
# JP: 「ヒャンっ――ふっ――あっ――れいなっ、れいなの、\nれいなの、おっぱいっ」
1086 = "「Hyan——phù——a——Reina, ngực của,\nngực của Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。おっぱいがどうなのだ？」
1179 = "「Ừm. Ngực em làm sao?」"
# monologue
# JP: （りゅっ――くりゅんっ！　くにいっ――くちゅんっ）
1898 = "（Trượt——xoay vòng! Nắn nót——nhóp nhép）"
# monologue
# JP: 押し潰そうとしてみても、ジェルのぬめりで逃げてしまう。\nその感触もまた珍しく、指に楽しくここちよい。
1587 = "Dù tôi cố gắng bóp mạnh, nhưng độ trơn của gel lại khiến nó trượt đi mất.\nCảm giác đó cũng thật mới mẻ, mang lại sự thích thú và dễ chịu cho những ngón tay."
# 【れいな】
# display as 玲奈
# JP: 「ぬる、ぬる、して、て――んっ――つや、つや、でっ\n……は、ぁっ――んっ――すごく、えっち、でっ――」
1256 = "「Trơn, trơn, quá——ưm——bóng, bóng, quá\n……Hà, a——ưm——thật sự, dâm đãng, quá——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もとてもエッチな気持ちになっている。\nずっと前から、こういうことをしてみたかったのだが」
1240 = "「Đúng vậy. Anh cũng đang cảm thấy rất dâm đãng đây.\nTừ lâu rồi, anh đã muốn thử làm thế này.」"
# monologue
# JP: （くりゅっ）
1890 = "（Xoay vòng）"
# 【れいな】
# display as 玲奈
# JP: 「んひゅんっ！！」
1172 = "「Ưm hyun!!」"
# monologue
# JP: 指先で軽くつまもうとした乳首がジェルで滑って逃げる。\nれいなにかなりよかったらしく、腰までもぞもぞ動き出す。
1553 = "Đầu ngón tay định khẽ véo lấy nhũ hoa thì lại bị lớp gel làm trơn tuột.\nCó vẻ Reina thấy rất sướng, eo em ấy bắt đầu ngọ nguậy."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん。そうてつさん――\nいまの、いまの、もういっかい……じゅっかい、くらい」
1329 = "「Anh Soutetsu ơi~. Anh Soutetsu ơi~——\nLúc nãy, lúc nãy, thêm một lần nữa đi……khoảng mười lần, nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そんなに気に入ったなら、\n十回といわず、何度でも――」
1200 = "「Vậy sao. Nếu em thích đến vậy,\nthì đừng nói là mười lần, bao nhiêu lần cũng——」"
# monologue
# JP: （く……ちゅるんっ！　くにっ――ちゅぷんっ！！）
1848 = "（Trượt……tuột! Nắn——phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「んひゅっ――ふ、ぁ――ぬる、ぬる――すきぃっ」
1168 = "「Ưm hyun——phù, a——trơn, trơn——thích quá」"
# monologue
# JP: れいなの胸はひどく薄い。が、ジェルの適度な粘着が――
1677 = "Ngực Reina rất phẳng. Nhưng độ dính vừa phải của gel——"
# monologue
# JP: （むにゅ、くっ――ゅるっ！　にゅ――く――ちゅっ！）
1891 = "（Nắn, hự——trượt! Tuột——hự——chụt!）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁぁぁあ――おっぱい、\nれいな、おっぱいとろけちゃいますぅ」
1076 = "「Phu a a a a——ngực,\nReina, ngực tan chảy mất thôi nha~」"
# monologue
# JP: この感触なら、おっぱいだ。指先と僕も同意する。\nめったに味わえぬ快感ゆえに、胸を乳首を弄ぶ。
1552 = "Cảm giác này, đúng là ngực rồi. Đầu ngón tay và cả tôi đều đồng ý như vậy.\nVì là khoái cảm hiếm khi được nếm trải, nên tôi cứ thế trêu đùa ngực và nhũ hoa em ấy."
# 【れいな】
# display as 玲奈
# JP: 「ふぁ――おっぱい――んっ――ふ、ぬる、ぬるっ――\nれいな、ちくびっ――ちくびっ――こん、なにっ――」
1073 = "「Phu a——ngực——ưm——phù, trơn, trơn——\nReina, nhũ hoa——nhũ hoa——nhiều, thế này——」"
# monologue
# JP: （くりっ――くりくりっっ――ふにゅ――ちゅるんっ！）
1892 = "（Xoay——xoay tít——mềm mại——trơn tuột!）"
# 【れいな】
# display as 玲奈
# JP: 「はぁああん！　あっ――こんなに、きもち――いいこと、どうして――もっと、はやくっ――――んふふうっっ」
1135 = "「Hà a a an! A——sướng——quá, sao lại——nhanh hơn, nữa đi————ưm hư hư」"
# monologue
# JP: 声が蕩けて言葉が途切れる。けれども意図は伝わってくる。
1669 = "Giọng nói mềm nhũn, lời nói đứt quãng. Nhưng tôi vẫn hiểu được ý em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「それこそマニアックすぎると思っていたのだ。\n特殊すぎ……れいなに引かれてしまうようなら悲しいと」
1310 = "「Anh cứ nghĩ làm thế này thì kỳ quái quá.\nQuá đặc biệt……anh sợ Reina sẽ xa lánh anh mất.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなっ――れいな、ひきませんよぉ――んっ――ふっ。\nそうてつ、さん――したい、こと、なら――なんだって」
1262 = "「Reina——Reina, không xa lánh đâu nha~——ưm——phù.\nAnh Soutetsu——muốn, làm gì——cũng được nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうなのだよな」
1205 = "「Ừ. Đúng là vậy nhỉ.」"
# monologue
# JP: 伝わってくるし、理解もできる。ポーレットの……多分\n……おかげで。僕らはひとつ、新しい認識を共有できた。
1584 = "Tôi có thể cảm nhận được, và cũng hiểu được. Có lẽ……\n……nhờ Paulette. Chúng tôi đã cùng nhau chia sẻ một nhận thức mới."
# 【双鉄】
# display as 雙鐵
# JP: 「夫婦の間にタブーはない。どんなマニアックな行為でも、\n試したいなら少なくとも、一度は試してみたほうがいい」
1195 = "「Giữa vợ chồng không có điều cấm kỵ. Bất kể hành động kỳ quái nào,\nnếu muốn thử thì ít nhất cũng nên thử một lần.」"
# 【れいな】
# display as 玲奈
# JP: 「そ……です、よぉ――んっ――ふあっ――\nれいな、れいなも――きもち、とっても、いいですしぃ」
1294 = "「Đúng……vậy, nha~——ưm——phu a——\nReina, Reina cũng——thấy sướng, lắm luôn nha~」"
# monologue
# JP: 乳首でこれだ。クリトリスならどうなるのかと――\n思った瞬間、手が試してる。
1449 = "Nhũ hoa mà đã thế này. Nếu là âm vật thì sẽ ra sao đây——\nNgay khoảnh khắc ý nghĩ đó xẹt qua, tay tôi đã tự động làm thử."
# monologue
# JP: （にゅろおおおおおおおおおおおおっ――ちゅんっ）
1893 = "（Trơn tuộtttttttttttttttt——chụt）"
# 【れいな】
# display as 玲奈
# JP: 「ひゅあああああああああああああああああぁんっ！！」
1133 = "「Hyu a a a a a a a a a a a a a a a an!!」"
# monologue
# JP: 胸から股間へ手を滑らせて小さな真珠に触れた瞬間、\nれいなが達する。
1557 = "Khoảnh khắc bàn tay trượt từ ngực xuống háng và chạm vào viên ngọc nhỏ,\nReina lên đỉnh."
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――あっ――れいな、れいなぁっ」
1068 = "「Phu a——a——a——Reina, Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、かまわん」
1181 = "「Ừ, không sao đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「ふ……んっ――ンッ――あっ――あぁぁ…………」
1062 = "「Phù……ưm——ƯM——a——a a…………」"
# monologue
# JP: ちょろちょろと出た排水が、すぐに黄色のアーチを描く。
1618 = "Dòng nước nhỏ rỉ ra nhanh chóng vẽ thành một vòm cung màu vàng."
# 【双鉄】
# display as 雙鐵
# JP: 「軽油のころより、色も匂いも濃くなってる気が」
1083 = "「Anh có cảm giác màu sắc và mùi đều đậm hơn so với hồi còn dùng dầu diesel thì phải.」"
# 【れいな】
# display as 玲奈
# JP: 「やぁあ――そんなの――そんなの、くらべちゃ、\nやぁ、ですよぉ」
1048 = "「Đừng——những chuyện đó——đừng có so sánh,\nnhững chuyện đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは済まなかった」
1307 = "「Vậy à, anh xin lỗi.」"
# monologue
# JP: どんなプレイも試していいが、合わなかったらすぐやめる。\nそこは恐らく、極めて重要なポイントだろう。
1437 = "Trò chơi nào cũng có thể thử, nhưng nếu không hợp thì dừng lại ngay.\nĐó có lẽ là một điểm cực kỳ quan trọng."
# 【れいな】
# display as 玲奈
# JP: 「……んぅ……んっ――\nふぁ……あっ――んっ――んんっ」
736 = "「……Ưm……ưm——\nPhu a……a——ưm——ưm ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「出きったか？」
1324 = "「Ra hết chưa?」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ」
1074 = "「Phu a」"
# monologue
# JP: ほっと一息つくタイミングで、下腹部を軽く押してやる。
1674 = "Vào khoảnh khắc em ấy thở phào nhẹ nhõm, tôi khẽ ấn nhẹ vào bụng dưới của em ấy."
# 【れいな】
# display as 玲奈
# JP: 「んうっ」
# 1169 = "「嗯唔」" 
# monologue
# JP: ぴ、ぴと、二滴、もう一滴。セックスのときは必ず被せる、\nパイル地のおもらしシーツの上に飛び、落ちる。
1623 = "Tí, tách, hai giọt, rồi thêm một giọt nữa. Rơi xuống tấm ga trải giường chống thấm vải bông xù\nmà chúng tôi luôn lót mỗi khi làm tình."
# 【双鉄】
# display as 雙鐵
# JP: 「……まさかいきなり達するとはな。\nれいなには、ジェルがよっぽど」
737 = "「……Không ngờ lại lên đỉnh đột ngột thế này.\nReina có vẻ rất hợp với gel nhỉ.」"
# monologue
# JP: （スリッ――すりゅっ――しゅちゅっ――くちゅんっ）
1895 = "（Trượt——trượt——nhóp nhép——chụt）"
# 【れいな】
# display as 玲奈
# JP: 「んゆっ――ふ――それ、しゅきっ――んっ――おまたの、\nすじ、を――すり、すり――されるの――きもち、いい」
1166 = "「Ưm yu——phù——cái đó, thích lắm——ưm——khe,\nkhe háng——cọ, cọ——như vậy——sướng, lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ」
1225 = "「Chắc là vậy rồi.」"
# monologue
# JP: ジェルがどんどん、れいなの蜜に溶かされていく。\nれいなの小さな膣口が、ひっきりなしに蠢いている。
1609 = "Gel đang dần dần hòa tan vào mật ngọt của Reina.\nCửa mình nhỏ nhắn của em ấy đang không ngừng co bóp."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。ね、そうてつさぁん」
1328 = "「Anh Soutetsu. Nè, anh Soutetsu ơi~」"
# monologue
# JP: 甘えきった声。おねだりの声。\nもうガチガチの勃起がさらに跳ね上げられる。
1704 = "Giọng nói nũng nịu. Giọng nói vòi vĩnh.\nDương vật vốn đã cứng ngắc của tôi lại càng nảy lên."
# 【れいな】
# display as 玲奈
# JP: 「ジェル――んっ――ぬるぬるっ――これっ――これ、\nそうてつさんのに――ぬって、それ、で――れいな、に」
1208 = "「Gel——ưm——trơn trơn——cái này——cái này,\nbôi lên——của anh Soutetsu——rồi, dùng nó——cho Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――」
1113 = "「Ưm——」"
# monologue
# JP: 潤滑しすぎてかえって良くなくなりそう――と、\n言いかけた言葉をけれど、すぐに飲み込む。
1500 = "Bôi trơn quá có khi lại mất sướng——\nTôi định nói vậy, nhưng rồi lại nuốt ngay vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「それも一度は試してみよう。\n僕の勃起に、ジェルをたっぷり、たっぷりまぶして――」
1318 = "「Vậy thì thử một lần xem sao.\nAnh sẽ thoa thật nhiều, thật nhiều gel lên dương vật——」"
# monologue
# JP: （とろおおおおおおおおおっっっ）
1861 = "（Trơn tuộtttttttttt）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁあああああああ」
# 1131 = "「啊啊啊——」" 
# monologue
# JP: バター蕩けるホットケーキに、たっぷりとしたはちみつを。\nれいなの声には、そんなあどけなささえ混じる。
1657 = "Giống như rót đẫm mật ong lên chiếc bánh pancake bơ nóng hổi.\nGiọng nói của Reina thậm chí còn pha lẫn chút ngây thơ."
# 【双鉄】
# display as 雙鐵
# JP: 「――ゆっくりいくぞ」
725 = "「——Anh vào từ từ đây.」"
# monologue
# JP: （じゅりゅううううっ）
1854 = "（Sụcccccccc）"
# 【れいな】
# display as 玲奈
# JP: 「ふああああああんっっっっ」
1077 = "「Phu a a a a a a an」"
# monologue
# JP: ジェルつき勃起で食い込ませながらスジをなぞれば、\nれいなの声は一瞬で、雌の動物じみたものへとかわる。
1556 = "Khi tôi cọ xát dương vật đẫm gel dọc theo khe háng,\ngiọng Reina trong chốc lát đã biến thành tiếng kêu của một con thú cái."
# monologue
# JP: （ジュルっ――ぐにゅっ――ぐじゅっ――ずりゅんっ）
1874 = "（Sụp soạp——ngoáy——nhóp nhép——trơn tuột）"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――おまた――すじっ――れいなの、\nわれめっ――んっ――われめも――おまめ、もっ――」
1474 = "「Phu a——a——háng——khe——của Reina,\nkhe hở——ưm——khe hở cũng——hột le, cũng——」"
# monologue
# JP: （ずりゅんっ！　ぐちゅっ――ズッ――ぐりゅううっ！）
1917 = "（Trơn tuột! Nhóp nhép——SỤC——xoay tít!）"
# 【れいな】
# display as 玲奈
# JP: 「すじ、の、なか――ふっ、あっ――おにく、もっ――\nあなもっ――にゅるにゅるっ――全部――気持ち、いい」
1211 = "「Bên trong, khe——phù, a——thịt, cũng——\nlỗ cũng——trơn tuột——tất cả——sướng, lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、だっ」
1223 = "「Anh cũng, vậy」"
# monologue
# JP: ジェルの粘りと潤滑が、勃起をさらに鋭敏にする。\nあるいはこれは尻穴を責められた余韻なのかもしれないが。
1503 = "Độ dính và độ trơn của gel khiến dương vật càng thêm nhạy cảm.\nHoặc cũng có thể đây là dư âm từ việc lỗ hậu bị kích thích lúc nãy."
# 【れいな】
# display as 玲奈
# JP: 「なら、ならっ――ねっ――そうてつさぁん」
1317 = "「Nếu vậy, nếu vậy thì——nè——anh Soutetsu ơi~」"
# monologue
# JP: れいなのおねだり。\n即応したい身体をぐっと押さえつける。
1666 = "Lời nài nỉ của Reina.\nTôi cố gắng kiềm chế cơ thể đang muốn đáp ứng ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「どこに、なにを、どうしてほしいか――」
1019 = "「Em muốn anh làm gì, ở đâu, như thế nào——」"
# monologue
# JP: （じゅりゅっ――グチュッ――ぐっ――ククッ――）
1830 = "（Sụp soạp——Nhóp nhép——hự——kuku——）"
# 【れいな】
# display as 玲奈
# JP: 「ふぁんっ」
# 1074 = "「呼啊」" 
# monologue
# JP: 膣口に亀頭の先をぐりぐり擦り押し付ける。
1758 = "Tôi chà xát và ấn mạnh đầu quy đầu vào cửa mình em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「きちんと、僕に聞かせてほしい」
998 = "「Hãy nói cho anh nghe thật rõ ràng đi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなっ、れいなのおまたの穴に――そうてつさんの、\n熱いの、じゅるって、ぐぢゅうって、いれてくださぁい」
1263 = "「Reina, vào trong lỗ của Reina——cái nóng hổi,\ncủa anh Soutetsu, hãy sục vào, đâm phập vào đi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1330 = "「！」" 
# monologue
# JP: （ぢゅぶりゅううううううううううううううっ！！！）
1881 = "（Phậpppppppppppppppppppp!!!）"
# 【れいな】
# display as 玲奈
# JP: 「っひゅあっ！！？　ぢゅるって！　どちゅって！！\nあついの！　あついのいっきに！　れいなのなかにっ」
1092 = "「Hyu a!!? Sục vào! Đâm phập vào!!\nNóng quá! Nóng quá ập vào một lúc! Bên trong Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1118 = "「唔啊！」" 
# monologue
# JP: （ごちゅっ！）
1912 = "（Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「ふきゅんっ！！！！！」
1156 = "「Phu kyun!!!!!」"
# monologue
# JP: れいなの浅い最奥に一気に亀頭がたどり着く。\nというかこれは――ジェルが付与する潤滑は――
1757 = "Quy đầu chạm đến tận cùng nơi sâu nhất nông choèn của Reina chỉ trong một nhịp.\nNói đúng hơn thì đây là——độ bôi trơn do gel mang lại——"
# monologue
# JP: （ぢゅごっ！　ぶぢゅっ！　ぢゅごっ！　ごりゅっ！）
# 1939 = "（長驅直入）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ！　ふあっ！　しゅごっ！　しゅごいいっ！\nそうてつさんのっ、ふといの、あついのっ――んうっ！」
1090 = "「Hya u! Phu a! Sướng! Sướng quá!\nCái to bự, nóng hổi của anh Soutetsu——ưm u!」"
# monologue
# JP: （ごっ！　ぢゅりゅっ！　ぢゅろおおおっ！　ぐりゅ！）
1832 = "（Hự! Sụp soạp! Trơn tuộttttt! Xoay tít!）"
# 【れいな】
# display as 玲奈
# JP: 「うごくのっ――すごいっ――くっ、あっ――\nれいなのっ――れいなのなかで――あばれてっ！！！」
1038 = "「Đang di chuyển——tuyệt quá——hự, a——\nbên trong Reina——bên trong Reina——đang quậy phá!!!」"
# monologue
# JP: 動ける。決して動きやすい体位ではないにも関わらず。\nれいなの膣の凶悪なまでの狭さ締め付けはそのままに
1490 = "Có thể di chuyển được. Dù đây hoàn toàn không phải là tư thế dễ vận động.\nLực siết chặt hung bạo của âm đạo hẹp hòi của Reina vẫn y nguyên như vậy"
# monologue
# JP: （どぢゅっ！　ずろおおっ！　ごちゅっ！　ぢゅぶっ！）
1941 = "（Phập! Trơn tuộtttt! Phập! Phập!）"
# monologue
# JP: 膣壁の痛いくらいの圧力をジェルが上手にそらしてくれる。\nこんなに小さな膣穴を、自由自在に貪れているっ！
1705 = "Lớp gel đã khéo léo làm chệch đi áp lực đau đớn từ thành âm đạo.\nTôi đang tự do tự tại tận hưởng cái lỗ âm đạo nhỏ bé này!"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1331 = "「っ!!!」"
# monologue
# JP: 理解は歓喜に、歓喜は獣欲に塗り替えられる。\n加速する。欲も動きもなにもかも。
1684 = "Sự thấu hiểu nhường chỗ cho niềm hân hoan, niềm hân hoan nhường chỗ cho dục vọng hoang dã.\nTăng tốc. Cả dục vọng, cả chuyển động, cả mọi thứ."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ！　れいなっ！　れいなっ！　れいなっ！！」
1272 = "「Reina! Reina! Reina! Reina!!」"
# 【れいな】
# display as 玲奈
# JP: 「すきっ！　しゅきっ！　だいしゅきっ！\nそうてつさんっ！　そうてつさぁんっ！！！」
1155 = "「Thích! Thích quá! Thích lắm luôn!\nAnh Soutetsu! Anh Soutetsu ơi~!!!」"
# monologue
# JP: （ぢゅっ！　ぶりゅっ！！　ぢゅごっ！　ごちゅっ！！）
1864 = "（Nhóp nhép! Phụt!! Phập! Phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「ふあああああああんっっっ」
1075 = "「Phu a a a a a a an」"
# monologue
# JP: れいなも自ら踊ってくれる。\n僕の動きを完全に読み、呼応して。
1676 = "Reina cũng tự mình uốn éo phối hợp.\nHoàn toàn đọc được chuyển động của tôi và đáp lại."
# 【れいな】
# display as 玲奈
# JP: 「れいな、おまた、おばかさんっ、なっちゃうっ――\nふっ――あ――あついのっ、びぃんて、回路、回路にっ」
1270 = "「Reina, háng, trở thành đồ ngốc mất——\nPhù——a——nóng quá, tê rần, mạch điện, mạch điện」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばっ――もっとっ――っ！」
1321 = "「Nếu vậy thì——nhiều hơn nữa——!」"
# monologue
# JP: （くいいいっ――ぷりゅんっ！！！）
1921 = "（Hựựự——trơn tuột!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゅああああっ――おっぱい、おっぱいも、しゅきぃ」
1049 = "「Hyu a a a a——ngực, ngực cũng, thích」"
# monologue
# JP: （ごちゅっ！　ぎりゅっ！　ぢゅるうっ！　くにゅっ！）
1867 = "（Phập! Xoay tít! Sụp soạp! Nắn nót!）"
# monologue
# JP: 腰の動きをグラインドに変え、しばし乳首を弄ぶ。\n吹き出す汗も潤滑油となり僕とれいなを溶かし合う。
1590 = "Tôi đổi chuyển động hông thành kiểu mài xát, và đùa giỡn nhũ hoa em ấy một lúc.\nMồ hôi túa ra cũng trở thành chất bôi trơn, hòa tan tôi và Reina vào nhau."
# monologue
# JP: （ぐりゅっ！　ぢゅぶっ！　ごぢゅっ！　ぶぢゅっ！）
1908 = "（Xoay tít! Phập! Phập! Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「きもちいっ、きもちいいっ、きもちいいっ、きもちいい、\nれいな、ぜんぶっ――んううっ――ぜんぶ、ぜんぶがぁ」
1204 = "「Sướng, sướng quá, sướng quá, sướng quá,\nReina, tất cả——ưm uu——tất cả, tất cả」"
# monologue
# JP: 愛液にジェルが溶かされたのか、摩擦感がより強くなる。\nぎちぎちすぎる締め付けに、一層強くれいなを感じる。
1464 = "Có lẽ do gel đã hòa tan vào dâm thủy, nên cảm giác ma sát càng trở nên mạnh mẽ hơn.\nLực siết chặt cứng ngắc khiến tôi càng cảm nhận Reina rõ rệt hơn."
# monologue
# JP: （ぐっ――こりゅ――ぐいっ――ふにゅ――ぐくっ）
# 1883 = "（抽插往復）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃう――ふあっ――とけちゃう――とけちゃううっ、\nれいな、あつくて――おまたも、おまたも、どろどろで」
1051 = "「Hya u——phu a——tan chảy mất——tan chảy mất thôi,\nReina, nóng quá——háng cũng, háng cũng, nhầy nhụa rồi」"
# monologue
# JP: （ぐっ！　こしゅっ――くりゅっ――こちゅんっ！）
1938 = "（Hự! Ngoáy——xoay vòng——phập!）"
# 【れいな】
# display as 玲奈
# JP: 「んううううううっ――そうてつさん、そうてつさん、\nもっとっ――もっとぉ――ね、そうてつさぁんっっ」
1157 = "「Ưm u u u u u u u——anh Soutetsu, anh Soutetsu,\nnữa đi——nữa đi~——nè, anh Soutetsu ơi~」"
# monologue
# JP: 小刻みな動きと乳首愛撫に焦れたのか、\nれいなは泣きとも聞こえてしまう声を出す。ならっ
1576 = "Có lẽ do nôn nóng trước những chuyển động nhấp nhô nhỏ và sự vuốt ve nhũ hoa,\nmà Reina phát ra âm thanh nghe như tiếng khóc. Nếu vậy thì"
# monologue
# JP: （ずろぉぉぉぉぉぉぉぉぉぉ――。どちゅんっ！！！！）
1900 = "（Trơn tuộtttttttttt——. Phậpppp!!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ふっ、きゅうううううううっっっっっっっっっっ！！」
1063 = "「Phù, kyu u u u u u u u u u u u u u u u!!」"
# monologue
# JP: ほとんどれいなを持ち上げ落とす。\nそのまま動きをひたすら早く、ひたすら強くとっ
1574 = "Gần như nhấc bổng Reina lên rồi thả xuống.\nCứ thế đẩy nhanh tốc độ, tăng mạnh lực đâm"
# monologue
# JP: （ずりゅっ！　どちゅっ！　ぐりゅっ！　ばちゅっ！！）
1909 = "（Trơn tuột! Phập! Xoay tít! Phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「ふやあああああっ！　しゅきっ――これっ――しゅきっ\nそうてつ、さぁんっ――んっ――このまま、このままぁ」
1080 = "「Phu ya a a a a a! Thích——cái này——thích quá\nanh Soutetsu, ơi~——ưm——cứ thế này, cứ thế này nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1232 = "「Anh rõ rồi.」"
# monologue
# JP: （ずびゅっ！　ばちゅん！　じゅぶっ！　ばちゅうっ）
1911 = "（Phập! Phập! Phập! Phập）"
# 【れいな】
# display as 玲奈
# JP: 「おくっ！　おくっ！　れいなの、れいなのっ、\nいちばん、ふかくっ！　ぶちゅって、されてぇっ！！」
1254 = "「Bên trong! Bên trong! Của Reina, của Reina,\nsâu nhất! Đâm phập vào đi ạ~!!」"
# monologue
# JP: （ずびゅっ！　ごちゅっ！　ぶぢゅっ！　ずごっ！！）
1840 = "（Phập! Phập! Phập! Phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「もっと！　もっとお！！そうてつさんの、あついのっ、\nすごいのっ！　もっと！　ごちゅって！　ちゅうって！」
1311 = "「Nữa đi! Nữa đi~!! Cái nóng hổi,\ncái tuyệt vời của anh Soutetsu! Nữa đi! Đâm phập vào! Chụt chụt đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！」
1120 = "「Ư hự!!!」"
# monologue
# JP: 肌と肌とがぶつかる度に、接合部から滴が飛ぶたび、\nれいなの膣の締めつけは、凶悪なまでに強くなる。
1710 = "Mỗi lần da thịt va chạm, mỗi lần dâm thủy bắn ra từ nơi giao hợp,\nlực siết chặt của âm đạo Reina lại càng trở nên hung bạo hơn."
# monologue
# JP: （づりゅっ！　ごちゅっ！　じゅぶっ！　ばちゅんっ！）
1937 = "（Trơn tuột! Phập! Phập! Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ！　あっ！　あっ！　あっ！\nあっ！　あっ！　あっ！　ああっっっ！！！」
1081 = "「Phu a! A! A! A!\nA! A! A! A a!!!」"
# monologue
# JP: 無意識にだろう、れいなの指が自らの身体を弄り始める。\n肌の残ったジェルを伸ばして、快感と艶を塗りたくる。
1628 = "Có lẽ trong vô thức, những ngón tay của Reina bắt đầu tự vuốt ve cơ thể mình.\nEm ấy xoa đều lớp gel còn sót lại trên da, trát lên đó khoái cảm và sự quyến rũ."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ――くっ――あっ――僕はっ――\nそろっ――そろっ――」
1259 = "「Reina——hự——a——Anh——\nsắp——sắp——」"
# 【れいな】
# display as 玲奈
# JP: 「ふやっ――やぁっ――もうちょっと――もうちょっと、\nねっ――そうてつさぁんっ――もうちょっとぉ」
1065 = "「Phu ya——ya——một chút nữa thôi——một chút nữa thôi,\nnha~——anh Soutetsu ơi~——một chút nữa thôi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～～～～っ！！！」
1337 = "「~~~~~~~~!!!」"
# monologue
# JP: 腰のペースは落とせない。それがれいなの望みゆえ。\n気を紛らわせるキスの代わりにれいなの髪に鼻を埋める。
1718 = "Không thể giảm nhịp độ hông được. Vì đó là mong muốn của Reina.\nThay vì hôn để phân tán sự chú ý, tôi vùi mũi vào mái tóc Reina."
# monologue
# JP: （ずちゅっ！　ごりゅっ！　じゅうっ！　ぶちゅんっ！）
1836 = "（Phập! Phập! Sụp soạp! Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんっ――ぐって――ねっ――れいなの、\nおまたっ――おなかの――ほう、ねっ――ぐってっ！」
1327 = "「Anh Soutetsu——mạnh vào——nha~——của Reina,\nháng——phía, bụng——ấy nha~——mạnh vào!」"
# monologue
# JP: （ぐいいいいっ！　ずりゅっ！！！！）
1914 = "（Hựựựự! Trơn tuột!!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ふひゅんんんんっ！！！！」
1170 = "「Phu hyun n n n!!!!」"
# monologue
# JP: れいなの狭隘、入口近く。れいなのざらりとしたところ。\nそこを押し付けすりながら、えぐるようにして最奥をっ！
1652 = "Sự chật hẹp của Reina, gần lối vào. Nơi sần sùi của Reina.\nTôi vừa ấn ép, chà xát nơi đó, vừa như muốn khoét sâu vào tận cùng bên trong!"
# monologue
# JP: （ずりゅんっ！　ごちゅっ！　ぐりゅんっ！　ぶちゅっ）
# 1840 = "（勢如破竹）" 
# 【れいな】
# display as 玲奈
# JP: 「ひあっ――はっ！　はっ！　ふあっ！　んっ！\nくゅっ！　ふあっ！はっ！　は！　は！　はっ！　は！」
1087 = "「Hi a——ha! Ha! Phu a! Ưm!\nKyu! Phu a! Ha! Ha! Ha! Ha! Ha!」"
# monologue
# JP: れいなの呼吸が浅く早く、肌がぽーっと熱くなる。\nもうすぐイクとの信号に、僕も重ねた我慢を解く！
1638 = "Hơi thở của Reina nông và gấp gáp, làn da nóng bừng lên.\nTín hiệu cho thấy em ấy sắp lên đỉnh, tôi cũng buông bỏ sự kìm nén bấy lâu!"
# monologue
# JP: （ずりゅっ！　どちゅっ！　ぶりゅっ！　ごぢゅっ！）
1920 = "（Trơn tuột! Phập! Phụt! Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「はっ！　はっ――ふあっ――ひゃうっ！　そうてつ、さ、\nれいなっ　れいなっ！　れいなっ！　もうっ！　もう！」
1104 = "「Ha! Ha——phu a——hya u! Anh Soutetsu,\nReina, Reina! Reina! Ra mất! Ra mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！」
1137 = "「A a!」"
# monologue
