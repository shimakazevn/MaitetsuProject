1702 = "Nếu xuất tinh thì phải xuất ở nơi sâu nhất, giờ tôi chỉ nghĩ được đến thế.\nVừa dồn toàn lực nghiền nát nơi sần sùi yếu ớt của Reina"
# monologue
# JP: （ぞりゅうううううぅぅぅぅぅぅ――ぐぢゅんっ！！！）
1925 = "（Trơn tuộtttttttttt——nhóp nhép!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひっきゅううううううううぅぅぅぅぅぅぅぅぅん！！」
