1754 = "Xuất tinh. Đang tuôn ra. Tinh dịch đặc sệt,\nbám chặt và thấm đẫm vào bên trong đường hầm âm đạo chật hẹp của Reina."
# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるっ！　びゅうっ！！）
# 1859 = "（噴湧如注）" 
# 【れいな】
# display as 玲奈
# JP: 「あちゅっ――ふあっ――れいなっ――あたって――\nふ、あ――おまた――おなか――いっぱい、いっぱいぃ」
1202 = "「Nóng quá——phu a——Reina——bị bắn trúng——\nphù, a——háng——bụng——đầy, đầy ắp rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ――れいなっ」
1260 = "「Reina——Reina」"
# 【れいな】
# display as 玲奈
# JP: 「んゆうっ！！！」
1178 = "「Ưm yuu!!!」"
# monologue
# JP: 射精しながら、れいなの乳首をひたすら弄る。\n反応して蠢く狭膣に、尿道内の精液全部を絞ってもらう。
1546 = "Vừa xuất tinh, tôi vừa không ngừng đùa giỡn nhũ hoa Reina.\nÂm đạo hẹp hòi phản ứng lại bằng cách co bóp, vắt kiệt toàn bộ tinh dịch trong niệu đạo của tôi."
# monologue
# JP: （びゅっ――びゅうっ――びゅるっ――ぶ――ぷっ）
1942 = "（Phụt——phụt——phụt——phù——phù）"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ――れいなっ」
# 1260 = "「玲奈——玲奈」" 
# monologue
# JP: れいなを抱き寄せキスをする。
1566 = "Tôi kéo Reina vào lòng và trao em một nụ hôn."
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――んっ――れりゅっ――ちゅっ――ちゅむっ、\nれろおっ――んちゅっ――ちゅるううっ――ちゅ、ちゅ」
1071 = "「Phu a——ưm——liếm——chụt——chụt,\nliếm——ưm chụt——chụt——chụt, chụt」"
# monologue
# JP: さんざローションを塗った乳首が僕の胸板に潰されて、\nどうしようもなく心地いい愛しさだけを染み込ませてくる。
1485 = "Nhũ hoa thoa đầy lotion bị ép bẹp vào vòm ngực tôi,\nchỉ truyền sang một cảm giác yêu thương dễ chịu đến vô ngần."
# 【双鉄】
# display as 雙鐵
# JP: 「――ぷあっ――あ……。あっ――ふ、あ」
724 = "「——Phu a——a……. A——phù, a」"
# monologue
# JP: キスを解けば、ぶわぶわ汗が吹き出してくる。\n汗の勢いと反比例して、身体の力はどうっと抜ける。
1753 = "Khi nụ hôn kết thúc, mồ hôi túa ra đầm đìa.\nTỉ lệ nghịch với lượng mồ hôi tuôn ra, sức lực trong cơ thể tôi như bị rút cạn."
# 【れいな】
# display as 玲奈
# JP: 「ふああああああああ」
# 1077 = "「呼啊啊啊——」" 
# monologue
# JP: れいなもらしい。くたりと崩れる。\nだからやさしく抱いて支える。
1634 = "Reina cũng vậy. Em ấy mềm nhũn, rũ rượi.\nNên tôi dịu dàng ôm lấy và đỡ em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「すごい。――すごかったな。――ぅ――あ。\nジェルを使ったセックスは、僕らと相性が実によかった」
1197 = "「Tuyệt quá. ——Tuyệt thật đấy. ——Ư——a.\nLàm tình bằng gel, thực sự rất hợp với chúng ta.」"
# 【れいな】
# display as 玲奈
# JP: 「ほんと……ふ――あ――（ごくっ）――ん。\nほんとに――すっごく――ぅ――そう、ですねぇ」
1283 = "「Đúng vậy……phù——a——（Ực）——ưm.\nĐúng là——rất rất——ư——như vậy, nha~」"
# monologue
# JP: れいなも力がはいらんのだろう。うごきはひどく緩慢だ。\n下半身をぶるぶる震わせながら身体を伸ばして――む？
1665 = "Chắc Reina cũng không còn sức lực nào nữa. Động tác của em ấy vô cùng chậm chạp.\nVừa run rẩy nửa thân dưới vừa vươn người ra——hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「ジェル……ああ、二回戦ならもう少しだけ休ませてくれ。\n僕も、もう一度――もう何度でも、この快感は――」
1247 = "「Gel……à, nếu làm hiệp hai thì cho anh nghỉ một chút đã.\nAnh cũng, muốn làm lại——dù bao nhiêu lần đi nữa, khoái cảm này——」"
# 【れいな】
# display as 玲奈
# JP: 「えっ、へへぇ――それなら、れいな――んっ――\nれいなっ、とっても――うれしい――でぇす」
1105 = "「Ê, hê hê——nếu vậy, Reina——ưm——\nReina, rất——vui——nha~」"
# monologue
# JP: 待てといってるにもかかわらず、\nれいなはジェルを手にたっぷりとる。
1447 = "Mặc dù tôi đã bảo đợi đã,\nnhưng Reina vẫn lấy một lượng lớn gel ra tay."
# 【れいな】
# display as 玲奈
# JP: 「花嫁、修行、の――っ――せいか――おもったより、\nすごく、ってっ――――。んしょ！」
1233 = "「Khóa học, làm dâu, của——っ——thành quả——hơn cả mong đợi,\ntuyệt vời, quá——. Ưm!」"
# monologue
# JP: 指二本。\nれいなはジェルをねっとりまぶして、嬉しげに見る。
1656 = "Hai ngón tay.\nReina thoa đều gel lên đó, rồi nhìn tôi với vẻ thích thú."
# 【れいな】
# display as 玲奈
# JP: 「それからジェルも、ほんとにほんとに――\nえっへへぇ～、びっくりするくらい気持ちよくって」
1312 = "「Với lại gel cũng, thực sự thực sự——\nÊ hê hê~, sướng đến bất ngờ luôn nha~」"
# monologue
# JP: れいながにっこり僕をみる。\nその目はやがて、僕の勃起を――その向こうを見る。
1670 = "Reina mỉm cười nhìn tôi.\nÁnh mắt em ấy dần dần hướng về phía dương vật của tôi——và nhìn xa hơn thế nữa."
# 【れいな】
# display as 玲奈
# JP: 「だかられいな、ジェルつかったら、もう一本。\n入っちゃいそうかなぁって思ってぇ」
1229 = "「Thế nên Reina nghĩ, nếu dùng gel, chắc là thêm một ngón nữa.\nSẽ vào được đó nha~」"
# monologue
# JP: （ああ）
1896 = "（À）"
# monologue
# JP: 理解する。そして自分の、さっきの言葉を思い出す。\nどんなマニアックなプレイでも、一度は試してみなければ
1563 = "Tôi đã hiểu. Và nhớ lại lời mình vừa nói lúc nãy.\nBất kể trò chơi kỳ quái nào, ít nhất cũng phải thử một lần"
# 【れいな】
# display as 玲奈
# JP: 「さ、そうてつさぁん。\nわんわんわんって、ね？　もういっかいできますかぁ」
1021 = "「Nào, anh Soutetsu ơi~.\nKêu gâu gâu gâu đi, nha~? Anh làm thêm một lần nữa được không ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1115 = "「Ừm.」"
# monologue
# JP: ゆえにすぐさま、四つん這いになり背中を向ける。\n指二本――れいなが何をしようと一度は、受け入れるため。
1604 = "Thế là ngay lập tức, tôi bò bằng bốn chân và quay lưng lại.\nHai ngón tay——dù Reina có định làm gì đi nữa, tôi cũng sẽ chấp nhận một lần."
# monologue
# JP: （つぷうっ！）
1889 = "（Phậpp!）"
