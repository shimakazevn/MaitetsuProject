# 【れいな】
# display as 玲奈
# JP: 「えへへっ、興味もってくれてうれしいですぅ。\nれいなも試してみたかったですから」
1108 = "「Ê hê hê, thấy anh hứng thú Reina vui lắm nha~.\nVì Reina cũng muốn làm thử mà.」"
# monologue
# JP: 今度はいつものあどけない笑み。れいなの笑み。\nであるというのに、ぞくりとするような色香も感じる。
1743 = "Lần này lại là nụ cười ngây thơ như mọi khi. Nụ cười của Reina.\nThế nhưng, tôi vẫn cảm nhận được một sức quyến rũ đến rùng mình."
# 【れいな】
