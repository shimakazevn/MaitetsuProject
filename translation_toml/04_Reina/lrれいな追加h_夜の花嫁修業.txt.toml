1582 = "Thật là một lời cầu xin thảm hại. Thực sự rất đáng xấu hổ và thảm hại.\nNhưng——còn đỡ hơn nhiều so với việc xuất tinh bằng lỗ hậu."
# 【れいな】
# display as 玲奈
