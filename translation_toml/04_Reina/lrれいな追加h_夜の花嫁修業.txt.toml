1287 = "「Sướng, thì——có sướng, thật——nhưng mà——」"
# monologue
# JP: 擦られる度に玉袋の中、精液が押されてる感覚になる。\n射精を煽られ強要される圧迫は、快感よりもずっと強い。
1612 = "Mỗi lần bị chà xát, tôi lại có cảm giác tinh dịch bên trong bìu đang bị ép lại.\nSự dồn nén, kích thích và ép buộc xuất tinh còn mạnh hơn cả khoái cảm."
# 【れいな】
# display as 玲奈
# JP: 「おかしいですねぇ……\nこしゅこしゅ、弱すぎるのかなぁ」
1281 = "「Lạ thật nha~……\nHay là do Reina chà xát yếu quá nhỉ~」"
# monologue
# JP: （こしゅんっ！　ぎゅり！　ごしゅっ！　くにぃっ）
1849 = "（Xoẹt! Ngoáy! Phập! Nắn nót!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふっ――あっ――あっ――くあっ」
1060 = "「Phù——a——a——ư a」"
# monologue
# JP: 圧迫された精液がどろりと粘度を増し増して、\n尿道口まで強制的に迫り上げられて刺激してくる。
1462 = "Tinh dịch bị ép lại ngày càng đặc sệt,\nbị ép đẩy lên tận lỗ sáo, mang đến một sự kích thích tột độ."
# monologue
# JP: （精液、そのものが――くっ――あっ――\n内側から、勃起を、愛撫、してくるようでっ）
1868 = "（Chính tinh dịch——hự——a——\nnhư đang vuốt ve dương vật từ bên trong vậy）"
# monologue
# JP: ――このままだったら尻穴だけで無様に射精させられる。\n焦りが喉を勝手に動かす。
710 = "——Cứ thế này thì tôi sẽ xuất tinh một cách thảm hại chỉ bằng lỗ hậu mất.\nSự hoảng loạn khiến cổ họng tôi tự động lên tiếng."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ」
1265 = "「Reina」"
# monologue
# JP: 名を呼べば――\n呼んでしまえば、それはすぐさま懇願となる。
1589 = "Khi gọi tên em ấy——\nMột khi đã gọi tên, thì ngay lập tức sẽ biến thành lời cầu xin."
# 【双鉄】
# display as 雙鐵
# JP: 「勃起を――どうか勃起を刺激してほしい」
1031 = "「Dương vật——xin em hãy kích thích dương vật đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1198 = "「Vâng ạ~」"
# monologue
# JP: （つーーーーーーーーーーーーーーーーーっっ）
1894 = "（Trượt dàiiiiiiiiiiiiiiiiiiiii）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！！！」
1173 = "「Ư hự!!!!!」"
# monologue
# JP: れいなは素直に刺激をくれる。けれど足りない。\nいま僕が、なにより切望しているものはっ――
1644 = "Reina ngoan ngoãn kích thích tôi. Nhưng như thế vẫn chưa đủ.\nThứ mà tôi đang khao khát hơn bất cứ điều gì lúc này là——"
# 【双鉄】
# display as 雙鐵
