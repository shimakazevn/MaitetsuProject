# JP: 多少抵抗も感じるが、興味の方が遥かに大きい。\n言われるままに動けば、布団がずるりと剥がれ落ちる。
1748 = "Tuy có chút kháng cự, nhưng sự tò mò lại lớn hơn rất nhiều.\nKhi tôi làm theo lời em ấy, tấm chăn liền trượt tuột xuống."
# 【れいな】
