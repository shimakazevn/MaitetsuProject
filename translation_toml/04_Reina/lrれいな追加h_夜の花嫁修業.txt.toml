1450 = "Âm thanh ướt át, nhầy nhụa hoàn toàn không chỉ do nước bọt của Reina tạo ra.\nNói cách khác, tôi bị buộc phải hiểu rằng đó là dịch ruột của chính mình."
# 【れいな】
