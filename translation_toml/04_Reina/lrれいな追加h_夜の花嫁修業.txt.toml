# 【双鉄】
# display as 雙鐵
# JP: 「勃起を――どうか勃起を刺激してほしい」
1031 = "「分身——拜託你刺激我的分身」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1198 = "「好呀」" 

# monologue
# JP: （つーーーーーーーーーーーーーーーーーっっ）
1894 = "（撫弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！！！」
1173 = "「嗯唔！！！！！」" 

# monologue
# JP: れいなは素直に刺激をくれる。けれど足りない。\nいま僕が、なにより切望しているものはっ――
1644 = "玲奈如實地開始刺激我的分身，可我得不到滿足。現在我最迫切渴望的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「勃起を、れいなのっ――れいなのおててで包んでほしい。\n包んでそうして、ごしごし思い切りシゴいてほしいっ」
1276 = "「玲奈，我的分身——快用你的手包住它。包著它然後激烈地上下套弄」" 

# monologue
# JP: なんと無様な懇願だろう。まこと恥ずかしく情けない。\nが――尻穴で射精するより、こちらの方が遥かにマシだ
1582 = "我的這般請求實在是令人悲哀，簡直是丟人現眼。不過——刺激分身射精總比刺激後庭被迫射精來得好得多。" 

# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ」
1284 = "「知道啦」" 

# monologue
# JP: （にぎゅっっ）
1866 = "（套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああっ！！！」
1136 = "「啊啊啊！！！」" 

# monologue
# JP: 自分の喉から溢れる歓喜が、ひどく遠いものと聞こえる。
1607 = "明明是自己發出的嬌聲，卻感覺是遠在天邊的呻吟。" 

# monologue
# JP: （りゅっ――ゆるっ――しゅ、こっ――ぐいっっ）
1846 = "（反覆套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！？」
1183 = "「嗯？！！」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、ごめんなさい。痛かったですかぁ」
1147 = "「啊，對不起。弄痛了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――いやっ――それ、より」
1006 = "「不會——不痛——不是這個」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、そうでしたぁ。ごしごしですねぇ」
1148 = "「啊，對哦。要幫你套弄對吧」" 

# monologue
# JP: （りゅっ――ぐいっ――くぐっ――じゅ、こっつ）
1885 = "（持續套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ――」
1114 = "「唔——啊——」" 

# monologue
# JP: 懸命に、ごしごししてはくれている。\nけれど利き手ではないゆえか、ひどく不器用でぎこちない。
1645 = "玲奈專心致志地為我套弄分身。可是由於不是慣用手的緣故，她的動作顯得十分生疏不俐落。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、頼む……利き手――右手、で。\nいつものように、気持よく射精させくれ」
1278 = "「玲奈，拜託了……用慣用手——用你的右手來弄。跟平時那樣，讓我舒舒服服地射精」" 

# 【れいな】
# display as 玲奈
# JP: 「ええっ、だけど、ポーレットがぁ」
1112 = "「哎，可是，波萊特說……」" 

# monologue
# JP: （くりゅ――ぐちゅっ――ちゅぶっ――ぬぢゅっ）
1886 = "（持續抽插）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ――あっ」
1126 = "「啊——啊——啊」" 

# monologue
# JP: 左手のぎこちなさとは裏腹に、\n尻穴を責める右手はどんどんなめらかになっていく。
1466 = "右手和笨拙的左手形成鮮明的對比，進攻後庭的右手在手法和動作上開始逐漸變得爐火純青起來。" 

# 【れいな】
# display as 玲奈
# JP: 「お尻の穴が気持ちよくなるまでに、もしも時間が\nかかるようなら、絶対に焦っちゃダメで丁寧に、って」
1252 = "「波萊特說，就算很花時間也沒關係，在屁眼還沒開始變得舒服起來的時候千萬不能急於求成，一定要慢慢地、細心地弄」" 

# monologue
# JP: なる、ほど。れいなの論理は理解できた。\n“ゆっくり丁寧”は利き腕でなければなし得ない――なら
1456 = "原來是這樣。玲奈的說法我是理解了。“慢慢和細心”確實必須用到慣用手才能做得好。既然如此——" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、すで、にっ――」
1273 = "「玲奈，我已經——」" 

# monologue
# JP: かあっと、顔が熱くなる。快感ではなく、恥辱によって。\nここを認めてしまうのは、男としてどうかと思うのだが
1580 = "我的臉頰瞬間變得火辣辣的，並不是因為快感而是羞恥心所造成。此時迫不得已地承認實在是有失男人的顏面。" 

# 【れいな】
# display as 玲奈
# JP: 「すでに、なんですかぁ？」
1215 = "「已經什麼了？」" 

# monologue
# JP: （りゅっ――ぐ、くっ――ご、しゅっ――しゅ、ぶっ）
# 1866 = "（套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああっ」
1132 = "「啊啊啊」" 

# monologue
# JP: だが、このもどかしさは到底堪えられるものではない。\n早く勃起を――勃起で、射精させてほしくてっ――
1446 = "但我心中焦急難耐的情緒已經不是我能所把控得住的。我只想——只想儘快射精——" 

# 【双鉄】
# display as 雙鐵
# JP: 「すでに――既に僕は――尻穴で、気持ちよくなっている。\nだから、頼むっ――右手で、勃起をっ――」
1213 = "「屁眼——我的——屁眼已經很舒服了。所以拜託你了——用右手套弄我的分身——」" 

# 【れいな】
# display as 玲奈
# JP: 「けどけどれいな……\n左手だとお尻の穴を上手にほじほじできなくなっちゃう」
1045 = "「可是玲奈……這麼做的話左手沒辦法熟練地戳弄屁眼啊」" 

# monologue
# JP: ポーレットは、一体なにをれいなに吹き込んだのだろう。\nあまりに強固な尻攻め意欲に、もうどうしたらいいものか
1617 = "波萊特究竟給玲奈灌輸了些什麼啊。在玲奈對後庭強烈的攻擊欲望下我顯得十分無能為力。" 

# 【れいな】
# display as 玲奈
# JP: 「あ！　れいな。いいこと思いつきましたぁ」
1140 = "「啊！玲奈想到一個好辦法了」" 

# monologue
# JP: （ちゅぽっ）
1884 = "（拔出）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ」
1169 = "「嗯唔」" 

# monologue
# JP: 不意に、尻穴から指が抜かれる。\nそうして右手が勃起に優しく添えられて
1593 = "手指突然從屁眼裡抽出。然後她的右手開始溫柔地刺激著分身。" 

# monologue
# JP: （きゅむっ）
# 1866 = "（套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああああっ」
1122 = "「啊——」" 

# monologue
# JP: 安堵する。両手でしっかり挟んでくれる、握ってくれる。\nこれなら、このままごしごし擦ってくれるならっ
1564 = "我懸著的一顆心總算落地了。玲奈開始用雙手包著並握住分身。她既然願意用右手套弄，只要做到這地步的話——" 

# 【れいな】
# display as 玲奈
# JP: 「お手々の他にも、\n丁寧に動かせるとこ、ありましたぁ」
1326 = "「除了右手，還有一個地方可以靈活使用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1334 = "「？！」" 

# 【れいな】
# display as 玲奈
# JP: 「ちゅっ。\n――ぶちゅるうううううううっ」
1153 = "「啾。——噗啾——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あひっ！！？」
1130 = "「啊咿？！！」" 

# monologue
# JP: べちょっと熱さがはりついてきて、\nそのまま腸に甘く優しいナメクジが侵入してくるような
1756 = "黏黏的觸感充滿了熱度，彷彿直腸裡有一條蛞蝓在輕輕蠕動一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だめ、だっ――れい、なっ――汚い」
1267 = "「玲奈不行——不可以——太髒了」" 

# 【れいな】
# display as 玲奈
# JP: 「ほーへふひゃふほはははひ\nひははひほほはふへふぁぃへふひょぉ」
1007 = "「不會髒啦，雙鐵身上沒有髒的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――く、はっ――しゃべられ、る、とっ」
1123 = "「啊——唔、哈——你一說話……」" 

# monologue
# JP: ナメクジがゆるく愛らしく震えて動き、\nその振動は僕の睾丸を、その内側の精液を揺らし
1726 = "蛞蝓緩慢而又充滿愛意的蠕動產生些許震動，而這輕微的震顫從內部撼動著我的精液。" 

# 【れいな】
# display as 玲奈
# JP: 「ほふぇふぇほふぇふぇふぁふぃゆふふえふはふぁあ」
1309 = "「這樣的話會舒服嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だめ――だっ――れいなっ――しゃべられる、と――\n僕はっ――尻穴っ――でっ――」
1008 = "「不行——玲奈——你一說話——我就要——因屁眼——而——」" 

# 【れいな】
# display as 玲奈
# JP: 「ん、ひょっ」
1163 = "「嗯、嘿咻」" 

# monologue
# JP: （しこっ！　こしゅっ！　ごしゅっ！　しぎゅっ！！）
1838 = "（劇烈套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああああああ」
1131 = "「啊啊啊——」" 

# monologue
# JP: 焦らされすぎてた刺激がようやく訪れる！\nれいながかわいい両てのひらで僕をシゴイてくれてるっ！
1729 = "被足足吊夠了的胃口盼來了如願以償的強烈刺激！玲奈正用她那雙小巧可愛的雙手幫我反覆套弄！" 

# 【れいな】
# display as 玲奈
# JP: 「ほふぇふぇぇ、へふぉほぉ」
1245 = "「會舒服啊」" 

# monologue
# JP: （にゅるうううううっ！）
1878 = "（扭蹭）" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ！！！！！」
727 = "「——！！！！！」" 

# monologue
# JP: （しこっ！　しこっ！　しゅこっ！　しゅこっ！！）
# 1846 = "（反覆套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ――あっ――イクっ――イクっ！！！！」
1069 = "「呼啊——啊——射了——要射了！！！！」" 

# 【れいな】
# display as 玲奈
# JP: 「♪」
739 = "「♪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1330 = "「！」" 

# monologue
# JP: 笑いをこらえでもしたのだろうか。\nれいなの舌が、僕の内部で止まり膨らんだような感覚
1649 = "玲奈強忍著笑意，她的舌頭似乎在我體內鼓鼓地脹了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「ひっひゃへ、はふふぁんふぁひへふははいへぇ。\n――ふぇひ！」
1110 = "「哎嘿嘿，想射就盡情地射出來吧——狠狠地射出來！」" 

# monologue
# JP: （じゅりゅっっっ――じゅこんんんんんんっっっ！！！）
1833 = "（初見端倪）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあああああああああっっ！！！！」
1078 = "「呼啊啊啊啊——！！！！」" 

# monologue
# JP: （どびゅうっ！　びゅるうっ！　びゅぶっ！　どびゅ！）
1860 = "（噴薄而出）" 

# monologue
# JP: 頭が白くなる快感。濃い。精液が濃く重い。\nどろどろとした塊が、尿道口を押し広げながら通過するっ
1586 = "我舒爽到大腦一片空白，射出的精液量多而濃厚。濃稠的塊狀液體擠壓並迅速通過尿道口。" 

# monologue
# JP: （びゅるうっ！　びゅっぶっ！　ぶっ！　びゅるっ！！）
1859 = "（噴湧如注）" 

# 【れいな】
# display as 玲奈
# JP: 「ぷあっ！　すごい。そうてつさんのせいえき、\nしゃせい、こんないきおい、はじめてですねぇ」
1188 = "「噗哈！雙鐵先生的精液好厲害。玲奈還是第一次見到勢頭如此兇猛的射精」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――あっ――あっ――」
1125 = "「啊——啊——啊——」" 

# monologue
# JP: （びゅるっ！　びゅう！　びゅるうう！　びゅろっ）
1858 = "（噴湧不息）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあ……あっ――あっ――あぁぁ……」
1117 = "「唔啊……啊——啊——啊啊啊……」" 

# monologue
# JP: 射精速度が落ちてきてなお、濃度は少しも薄れない。\n温まりきったところてんが、にゅるり絞り出されるようで
1455 = "即使是射精的勢頭舒緩了下來，可精液卻依舊黏稠無比。在極為舒適的暖流的包裹下，精液以翻江倒海之勢激流勇進。" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ、\nれいなのおてて、どろっどろになっちゃいましたぁ」
1094 = "「哇，玲奈的手裡沾滿了精液，都變得黏糊糊的了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1128 = "「啊」" 

# monologue
# JP: 気づかなかった。れいなは手で亀頭をつつむようにして、\n精液を受け止めてくれている――っ！？
1572 = "我現在才發現，難不成剛才玲奈的手包裹住了我的龜頭，全盤接納了迸射而出的精液——？！" 

# 【れいな】
# display as 玲奈
# JP: 「ええと、これをぉ――\n（じゅずっ――ずっ――ずるるるるるるるるっ）」
1053 = "「呃，這個要這樣——（吸溜——滋溜——啾滋）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！」
1013 = "「什麼！」" 

# 【れいな】
# display as 玲奈
# JP: 「んぷっ――ん――ん～～～～っ――――（ごくっっ）\nぷああ。どろってしてて、お喉にはりつきますねぇ」
1177 = "「嗯噗——嗯——嗯～～～～——（吞嚥）噗哈。好黏稠啊，都沾上喉嚨了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんてことを……」
1018 = "「你怎麼吞起精液來了……」" 

# monologue
# JP: れいなの口内、まだ精液がこびりつき、\n青臭い匂いがむわむわとただよってしまっている。
1659 = "玲奈的口中布滿了精液，精液獨有的腥臭味充斥著鼻腔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「早くうがい――\nいや、この格好で洗面所までいかせるわけにも」
1219 = "「快去漱口——不行，這副邋遢的樣子不能讓你直接去洗手間」" 

# 【れいな】
# display as 玲奈
# JP: 「んむむ～～～」
1171 = "「嗯唔唔～～～」" 

# monologue
# JP: 考えているその間にも、れいなの顔色がどんどん曇る。
1488 = "在我苦苦思索的期間，玲奈的表情逐漸陰沉了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1330 = "「！」" 

# 【れいな】
# display as 玲奈
# JP: 「んむっ！？　んっ」
1174 = "「嗯唔？！嗯」" 

# monologue
# JP: キスした瞬間、むわりと鼻に異臭がのぼり、\n口いっぱいに、苦味とえぐみが満ち満ちる――が――
1600 = "接吻的瞬間，鼻孔裡傳來一股怪味兒，同時滿嘴洋溢著苦味與澀味——不過——" 

# 【れいな】
# display as 玲奈
# JP: 「あむっ――ちゅ――ちゅうっ――ちゅぶっ――ん……\nれるっ――れろっ――ちゅむっ――ちゅうっ――れるっ」
1138 = "「啊嗚——啾——啾唔——啾噗——嗯……咧溜——滋溜——啾唔——啾——咧溜」" 

# monologue
# JP: 速攻でれいなの口内を清めるためには、こうするしかない。\n舌を絡めてつたわせて、どんどん唾液を流し込む。
1548 = "我別無他法，為了能夠儘快地清理玲奈的口腔只好出此下策。舌與舌纏綿在一起，我不斷地輸送唾液進入玲奈的口腔。" 

# 【れいな】
# display as 玲奈
# JP: 「はっ――みゅっ――ん――れりゅ――ん……（こくっ）\nぷあっ――りゅっ――ちゅりゅうっ――ぷ――（ごく）」
1102 = "「哈——啾——嗯——咧溜——嗯……（吞嚥）噗哈——滋溜——吸溜吸溜——噗——（吞嚥）」" 

# monologue
# JP: ……じわじわと、れいなの唾液が清涼感を増していく。\nれいなの舌ももっともっとと甘く震えておねだりをする。
718 = "……慢慢地，玲奈的唾液開始變得清涼可口。她的舌頭也開始微微顫動著向我索求。" 

# 【れいな】
# display as 玲奈
# JP: 「ちゅうっ――ちゅむっ――じゅずっ――（こくっ）\nれるっ、れろっ――れりゅううっ――（ごくんっ）」
1152 = "「啾——啾唔——滋溜——（吞嚥）咧溜、滋溜——滋溜溜——（吞嚥））」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷあ」
1162 = "「嗯……噗哈」" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あ……\nキス。あまくて――すっごくきもちよかったですぅ」
1061 = "「呼……哈……接吻——好甜蜜好舒服呀」" 

# monologue
# JP: れいなはうっとり、口のまわりのよだれを拭いて、\nはっとした顔で僕をみあげる。
1679 = "玲奈露出一副沉醉其中的表情擦拭著嘴邊的口水，然後她驚愕地抬起頭來凝視我。" 

# 【れいな】
# display as 玲奈
# JP: 「じゃなくて、そうてつさん。\nバッチイってさっき、さっき言ってたのに」
1005 = "「不對啊，雙鐵先生。你剛才不是說玲奈的嘴很髒的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一度れいなの口内にはいってしまえば、\nばっちいことなどまったくない」
1235 = "「既然已經進到你嘴裡了，怎麼可能還會髒」" 

# monologue
# JP: 喉がイガイガしているが、この程度なら堪えられる。\nそんなことよりなによりも――
1481 = "喉嚨雖然有點乾乾的不舒服，但這點問題不足掛齒。我現在反而更想知道——" 

# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修業で、ポーレットはなにをれいなに吹き――\nこほん。あー、どんな指導をしてくれたのだ？」
1190 = "「在新娘課程上，波萊特究竟給你灌輸——咳咳，呃，究竟教了些什麼給你？」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ええっとですねぇ、マニアックなプレイを\nふたりで一緒に楽しむほどに、夫婦の絆は深くなるって」
1185 = "「嘻嘻。是這樣的，她說兩人可以用一些更刺激的玩法，只要雙方都能享受並樂在其中，夫婦之間的感情就會不斷加深」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
1039 = "「原來如此」" 

# monologue
# JP: 言ってることには納得できる。\nが、しかし――
1734 = "話是說得非常有道理。可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「マニアックにもいろいろあろう」
1033 = "「刺激的玩法也分很多種吧」" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃん」
1088 = "「咿呀」" 

# monologue
# JP: いいながら、裸のれいなを膝へと乗せる。\n買ったばかりのシェービングジェルをたっぷり手に取る。
1735 = "說著我同時把全身赤裸的玲奈拉到我膝蓋上。然後將剛買來的刮鬍膏擠出一大坨來。" 

# 【れいな】
# display as 玲奈
# JP: 「これ、ぬるぬる――そうてつさんのオヒゲ……」
1306 = "「這個，滑溜溜的——雙鐵先生用來剃鬚……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。シェービングジェル。無香料無添加の――\nなんなら口に入れても問題がないとのものだから……」
1242 = "「是的。這是刮鬍膏。不添加香料和任何添加劑——甚至沾一點放在嘴裡嘗也沒事……」" 

# monologue
# JP: （ぺちょっ）
1928 = "（輕抹）" 

# 【れいな】
# display as 玲奈
# JP: 「んひゅんっ」
# 1175 = "「嗯啊」" 

# monologue
# JP: 塗り込む前かられいなの乳首はぴんぴんに固く尖ってる。\nそこを中心に輪を描くように――
1747 = "還沒抹上果凍，玲奈的乳頭就已經亭亭玉立。我在乳暈中心畫著圈——" 

# monologue
# JP: （ぬるっ――ぬりゅっ――れりゅっ――ぬちゅっ――）
1862 = "（塗東抹西）" 

# 【れいな】
# display as 玲奈
# JP: 「ヒャンっ――ふっ――あっ――れいなっ、れいなの、\nれいなの、おっぱいっ」
1086 = "「咿呀——呼——啊——玲奈的、玲奈的、玲奈的胸部」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。おっぱいがどうなのだ？」
1179 = "「嗯，你說胸部怎麼了？」" 

# monologue
# JP: （りゅっ――くりゅんっ！　くにいっ――くちゅんっ）
1898 = "（東戳西戳）" 

# monologue
# JP: 押し潰そうとしてみても、ジェルのぬめりで逃げてしまう。\nその感触もまた珍しく、指に楽しくここちよい。
1587 = "我試圖擠壓乳頭，可又因為果凍的潤滑效果無法牢牢捏住。滑溜溜的觸感給手指帶來了前所未有的快感，令我欲罷不能。" 

# 【れいな】
# display as 玲奈
# JP: 「ぬる、ぬる、して、て――んっ――つや、つや、でっ\n……は、ぁっ――んっ――すごく、えっち、でっ――」
1256 = "「滑溜溜的——很有光澤……哈、啊——嗯——好下流啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もとてもエッチな気持ちになっている。\nずっと前から、こういうことをしてみたかったのだが」
1240 = "「是啊，我也開始興奮起來了。我很早就想試試這種玩法了」" 

# monologue
# JP: （くりゅっ）
1890 = "（揉捏）" 

# 【れいな】
# display as 玲奈
# JP: 「んひゅんっ！！」
1172 = "「嗯唔！！」" 

# monologue
# JP: 指先で軽くつまもうとした乳首がジェルで滑って逃げる。\nれいなにかなりよかったらしく、腰までもぞもぞ動き出す。
1553 = "我嘗試用指尖捏住乳頭，可因為果凍太過濕滑完全拿捏不住。而玲奈似乎對此產生快感，不自覺地開始扭起腰肢。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん。そうてつさん――\nいまの、いまの、もういっかい……じゅっかい、くらい」
1329 = "「雙鐵先生。雙鐵先生——再來、再來、剛才那樣……再來十次左右」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そんなに気に入ったなら、\n十回といわず、何度でも――」
1200 = "「好啊。既然你這麼中意我這麼弄，別說區區十次，你要幾次我都——」" 

# monologue
# JP: （く……ちゅるんっ！　くにっ――ちゅぷんっ！！）
1848 = "（反覆揉搓）" 

# 【れいな】
# display as 玲奈
# JP: 「んひゅっ――ふ、ぁ――ぬる、ぬる――すきぃっ」
1168 = "「嗯唔——呼、啊——滑滑的——我好喜歡」" 

# monologue
# JP: れいなの胸はひどく薄い。が、ジェルの適度な粘着が――
1677 = "玲奈雖然胸部有點一馬平川，但果凍的黏度——" 

# monologue
# JP: （むにゅ、くっ――ゅるっ！　にゅ――く――ちゅっ！）
1891 = "（揉搓不止）" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁぁぁあ――おっぱい、\nれいな、おっぱいとろけちゃいますぅ」
1076 = "「呼啊啊——胸部，玲奈的胸部快要融化了」" 

# monologue
# JP: この感触なら、おっぱいだ。指先と僕も同意する。\nめったに味わえぬ快感ゆえに、胸を乳首を弄ぶ。
1552 = "我和我的手指可以打包票，這樣的觸感毫無疑問就是胸部。由於是不可多得的奇妙快感，我肆意玩弄起胸部和乳頭。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ――おっぱい――んっ――ふ、ぬる、ぬるっ――\nれいな、ちくびっ――ちくびっ――こん、なにっ――」
1073 = "「呼啊——胸部——嗯——呼，滑溜溜的——玲奈的乳頭——乳頭——好舒爽——」" 

# monologue
# JP: （くりっ――くりくりっっ――ふにゅ――ちゅるんっ！）
1892 = "（搓揉不止）" 

# 【れいな】
# display as 玲奈
# JP: 「はぁああん！　あっ――こんなに、きもち――いいこと、どうして――もっと、はやくっ――――んふふうっっ」
1135 = "「啊啊啊啊嗯！啊——這麼、舒服——的事情，為什麼——不早點——嗯呼——」" 

# monologue
# JP: 声が蕩けて言葉が途切れる。けれども意図は伝わってくる。
1669 = "玲奈變得意亂神迷起來，話說一半沒了下文，不過她的意思已經傳達過來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それこそマニアックすぎると思っていたのだ。\n特殊すぎ……れいなに引かれてしまうようなら悲しいと」
1310 = "「這種偏激的玩法一般人可能接受不了。如此特立獨行……我怕你會對我有意見」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなっ――れいな、ひきませんよぉ――んっ――ふっ。\nそうてつ、さん――したい、こと、なら――なんだって」
1262 = "「玲奈——玲奈不會有意見的——嗯——呼。雙鐵先生——想怎麼做——都可以按你的想法來做」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうなのだよな」
1205 = "「好，我知道了」" 

# monologue
# JP: 伝わってくるし、理解もできる。ポーレットの……多分\n……おかげで。僕らはひとつ、新しい認識を共有できた。
1584 = "我確認到了玲奈的心意，也能理解她對我的愛意。波萊特的……大概……多虧了她，我們倆又有了一個共同的認識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「夫婦の間にタブーはない。どんなマニアックな行為でも、\n試したいなら少なくとも、一度は試してみたほうがいい」
1195 = "「夫婦之間沒有什麼需要避諱，不論是有多麼稀奇古怪的玩法，既然有想法，那麼至少應該嘗試去付出實踐」" 

# 【れいな】
# display as 玲奈
# JP: 「そ……です、よぉ――んっ――ふあっ――\nれいな、れいなも――きもち、とっても、いいですしぃ」
1294 = "「說的……沒錯——嗯——呼啊——玲奈，玲奈——也特別舒服」" 

# monologue
# JP: 乳首でこれだ。クリトリスならどうなるのかと――\n思った瞬間、手が試してる。
1449 = "光是撥弄乳頭玲奈就已經十分享受，要是換成豆豆呢——想到這，我馬上付諸行動。" 

# monologue
# JP: （にゅろおおおおおおおおおおおおっ――ちゅんっ）
1893 = "（搓揉）" 

# 【れいな】
# display as 玲奈
# JP: 「ひゅあああああああああああああああああぁんっ！！」
1133 = "「啊啊啊啊啊——！！」" 

# monologue
# JP: 胸から股間へ手を滑らせて小さな真珠に触れた瞬間、\nれいなが達する。
1557 = "我將手從胸部滑至玲奈的下半身，用手指輕撫玲瓏珍珠時，她一下子迎來了高潮。" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――あっ――れいな、れいなぁっ」
1068 = "「呼啊——啊——啊——玲奈、玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、かまわん」
1181 = "「嗯，沒關係的」" 

# 【れいな】
# display as 玲奈
# JP: 「ふ……んっ――ンッ――あっ――あぁぁ…………」
1062 = "「呼……嗯——嗯——啊——啊啊啊…………」" 

# monologue
# JP: ちょろちょろと出た排水が、すぐに黄色のアーチを描く。
1618 = "涓涓長流瞬間傾瀉而出，隨即劃出了一道金黃色弧線。" 

# 【双鉄】
# display as 雙鐵
# JP: 「軽油のころより、色も匂いも濃くなってる気が」
1083 = "「和用柴油那會兒相比，感覺味道和顏色都更濃厚了一些」" 

# 【れいな】
# display as 玲奈
# JP: 「やぁあ――そんなの――そんなの、くらべちゃ、\nやぁ、ですよぉ」
1048 = "「呀啊——不能——不能——和以前做對比啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは済まなかった」
1307 = "「這樣啊，那真是對不起了」" 

# monologue
# JP: どんなプレイも試していいが、合わなかったらすぐやめる。\nそこは恐らく、極めて重要なポイントだろう。
1437 = "不論何種怪癖的玩法都可以去嘗試，要是不適合就馬上停止。懂得適可而止是至關重要的。" 

# 【れいな】
# display as 玲奈
# JP: 「……んぅ……んっ――\nふぁ……あっ――んっ――んんっ」
736 = "「……嗯……嗯——呼啊……啊……嗯——嗯嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「出きったか？」
1324 = "「都尿完了嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ」
1074 = "「呼啊」" 

# monologue
# JP: ほっと一息つくタイミングで、下腹部を軽く押してやる。
1674 = "玲奈長舒一口氣，用手輕輕壓在自己的小腹上。" 

# 【れいな】
# display as 玲奈
# JP: 「んうっ」
# 1169 = "「嗯唔」" 

# monologue
# JP: ぴ、ぴと、二滴、もう一滴。セックスのときは必ず被せる、\nパイル地のおもらしシーツの上に飛び、落ちる。
1623 = "滴答、滴答，一滴又一滴落個不停。我們做愛的時候會鋪上起絨的防水床單，蜜液飛濺到了上面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まさかいきなり達するとはな。\nれいなには、ジェルがよっぽど」
737 = "「……真沒想到你突然就高潮了。看來你很中意這個定型液嘛」" 

# monologue
# JP: （スリッ――すりゅっ――しゅちゅっ――くちゅんっ）
1895 = "（擦蹭）" 

# 【れいな】
# display as 玲奈
# JP: 「んゆっ――ふ――それ、しゅきっ――んっ――おまたの、\nすじ、を――すり、すり――されるの――きもち、いい」
1166 = "「嗯唔——呼——好喜歡這樣——嗯——小穴——摩擦起來——特別舒爽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうなぁ」
1225 = "「我也這麼覺得」" 

# monologue
# JP: ジェルがどんどん、れいなの蜜に溶かされていく。\nれいなの小さな膣口が、ひっきりなしに蠢いている。
1609 = "果凍漸漸地和玲奈的蜜液混為一體。同時她的蜜裂還在蠢蠢欲動地做出不斷蠕動的姿態。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。ね、そうてつさぁん」
1328 = "「雙鐵先生。那個，雙鐵先生」" 

# monologue
# JP: 甘えきった声。おねだりの声。\nもうガチガチの勃起がさらに跳ね上げられる。
1704 = "聽到玲奈無比嬌媚的撒嬌聲，我分身的硬度更是加倍了好幾分，以至於不自主地抖了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「ジェル――んっ――ぬるぬるっ――これっ――これ、\nそうてつさんのに――ぬって、それ、で――れいな、に」
1208 = "「定型液——嗯——滑溜溜的那個——就是那個，把它塗到雙鐵先生的棒棒上，然後用它——插到玲奈的身體裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――」
1113 = "「唔——」" 

# monologue
# JP: 潤滑しすぎてかえって良くなくなりそう――と、\n言いかけた言葉をけれど、すぐに飲み込む。
1500 = "太過潤滑的話可能會適得其反——我正打算說出口，但又咽了回去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それも一度は試してみよう。\n僕の勃起に、ジェルをたっぷり、たっぷりまぶして――」
1318 = "「那就來試試看吧。我先在分身上面抹滿定型液——」" 

# monologue
# JP: （とろおおおおおおおおおっっっ）
1861 = "（塗抹）" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁあああああああ」
# 1131 = "「啊啊啊——」" 

# monologue
# JP: バター蕩けるホットケーキに、たっぷりとしたはちみつを。\nれいなの声には、そんなあどけなささえ混じる。
1657 = "玲奈發出孩童般天真爛漫的嬌聲。聲音甜美得就好像是抹遍香醇奶油的煎餅上又塗上一層瓊漿玉液。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ゆっくりいくぞ」
725 = "「——我要慢慢來了」" 

# monologue
# JP: （じゅりゅううううっ）
1854 = "（向前突進）" 

# 【れいな】
# display as 玲奈
# JP: 「ふああああああんっっっっ」
1077 = "「呼啊啊啊——」" 

# monologue
# JP: ジェルつき勃起で食い込ませながらスジをなぞれば、\nれいなの声は一瞬で、雌の動物じみたものへとかわる。
1556 = "我將塗滿果凍的分身對著肉縫進行愛撫，玲奈的叫喊聲瞬間就轉變為發情中的雌性生物。" 

# monologue
# JP: （ジュルっ――ぐにゅっ――ぐじゅっ――ずりゅんっ）
1874 = "（循序漸進）" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――おまた――すじっ――れいなの、\nわれめっ――んっ――われめも――おまめ、もっ――」
1474 = "呼啊——啊——小穴——還有——玲奈的、縫隙——嗯——還有縫隙——再加上豆豆也——" 

# monologue
# JP: （ずりゅんっ！　ぐちゅっ――ズッ――ぐりゅううっ！）
1917 = "（緩慢前行）" 

# 【れいな】
# display as 玲奈
