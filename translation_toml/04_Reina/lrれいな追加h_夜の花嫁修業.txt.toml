# JP: 「とろとろになってきたらぁ、ええっと――\nあ、そうでしたぁ。こうしてお指を～、」
1286 = "「Khi đã tan chảy ra rồi thì, ừm——\nA, đúng rồi nha~. Thế này, đưa ngón tay vào~,」"
