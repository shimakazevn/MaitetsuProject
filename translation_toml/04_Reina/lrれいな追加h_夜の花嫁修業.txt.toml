1099 = "「Oa, cái này cũng đúng như lời chị Paulette dạy nha~.\nChỗ này, anh Soutetsu thấy sướng lắm đúng không nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「い、いや――気持ちいい、と――いう、かっ」
1011 = "「Kh, không——sướng, thì——đúng, nhưng」"
