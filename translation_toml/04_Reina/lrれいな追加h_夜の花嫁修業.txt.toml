1684 = "理解力轉換為欣喜若狂，欣喜若狂逐漸轉變為獸性大發。獸慾和動作乃至其他的一切都在加速膨脹。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ！　れいなっ！　れいなっ！　れいなっ！！」
1272 = "「玲奈！玲奈！玲奈！玲奈！！」" 

