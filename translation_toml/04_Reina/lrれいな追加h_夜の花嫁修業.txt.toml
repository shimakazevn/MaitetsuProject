1617 = "Rốt cuộc Paulette đã tiêm nhiễm thứ gì vào đầu Reina vậy chứ.\nÝ chí tấn công lỗ hậu quá mãnh liệt thế này, tôi biết phải làm sao đây."
# 【れいな】
