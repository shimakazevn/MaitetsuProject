# 【ポーレット】
# display as 波萊特
# JP: 「[やわた,1]矢幡近郊。矢幡、[こくら,1]粉蔵、[ゆくはし,1]征橋、[ごとうじ,2]語頭寺、\n[のうがた,1]脳型――ぐるりと回ってまた矢幡」
1492 = "「在八幡近郊。八幡、小倉、行橋、後藤寺、直方——繞了一圈後再回到八幡」" 

# 【れいな】
# display as 玲奈
