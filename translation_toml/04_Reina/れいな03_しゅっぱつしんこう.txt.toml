# 【ポーレット】
# display as 波萊特
# JP: 「……一応、双鉄くんに同行をお願いしてみるけど。\nどうかな、それも難しいかもしれないわよね」
1004 = "「……我會試著拜託雙鐵君跟你一起去的。不過說不定那也很難實現哦」" 

# 【れいな】
# display as 玲奈
# JP: 「どおしてですかぁ？」
1632 = "「為什麼啊？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、いろいろと縛られてるでしょ？」
1755 = "「雙鐵君正被很多束縛在這裡，不是嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「ああ」
1450 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1767 = "「！？」" 

# monologue
# JP: 配置転換。\nその四文字が頭をよぎる。
2344 = "轉換配置。這四個字在我腦海中閃過。" 

# monologue
# JP: （まさか、れいなが――\nいや、しかし。確かに僕が、御一夜を離れるのは難しい）
2431 = "（難道，玲奈——不，可是，我確實也難以離開御一夜）" 

# monologue
# JP: 右田の養子で。\n義務と恩と約束とによって縛られている。
2128 = "我作為右田家的養子，被義務、恩情、約定這些東西束縛著。" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回させないかぎり、\n僕のレールは、義父の思うがままに敷かれてしまう。
2317 = "要是不能撤回引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的計劃，我的人生軌道就只能按養父的意志前進了。" 

# monologue
# JP: （それが嫌だと、思ったことなど一度もなかった。\nそうなるならばそれで良いとさえ思っていた――）
2414 = "（但我卻從沒覺得討厭過。我一直認為那種路也有那種路的好——）" 

# monologue
# JP: 胸が、ズキズキ痛み始める。
2150 = "我的胸口開始陣陣刺痛。" 

# monologue
# JP: 僕は御一夜に縛られて、れいなは矢幡へ送り込まれる。\n共に過ごせる時間が裂かれ、壊れてしまう。
2160 = "我被束縛在御一夜，玲奈則被送到八幡去。共處的時間被撕裂、破壞。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんがいっしょだったら、\nれいな、がんばれそうな気がします――けどぉ」
1297 = "「不過，要是雙鐵先生和玲奈在一起的話——玲奈就覺得很有幹勁了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「心細いのはわかるけど。ね？　最悪の場合ひとりででも。\nとっても大事なことだから、れいな以外には頼めないの」
1560 = "「我知道你會很不安。不過，最壞的情況下就算只有你一個也要去。因為這件事非常非常重要，只能交給玲奈你來辦」" 

# 【れいな】
# display as 玲奈
# JP: 「はい……ですぅ。\nでも――やっぱり、れいなひとりじゃ」
1503 = "「好……吧。不過——果然玲奈一個人還是……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だったら……そうね。他の誰かに頼んでみる？」
1712 = "「那……對了，拜託其他人試試看怎麼樣？」" 

# 【れいな】
# display as 玲奈
# JP: 「ええ～っ……\n他の誰かだなんて、そんな、いきなり」
1395 = "「哎哎～怎麼一下子換成其他人」" 

# monologue
# JP: れいなの声が泣きそうになる。\nそれが嬉しくホっとして、同時に胸がチクリと痛む。
2246 = "玲奈的聲音好像要哭出來的樣子。我看到既覺得高興與安心，同時胸卻又是一陣刺痛。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だってその場合には他の誰かしかいないじゃない。\n安心して？　もちろん、最善の代理を探すから」
1490 = "「因為那樣的話就只能拜託別人了啊。不過放心吧？我當然會找好最好的代理人」" 

# monologue
# JP: 代理。\n確かに僕とて、ポーレットの代理の\x%l運転士;#00ffc040;運転士%l;#;だ。
1963 = "代理人。確實，我也只算是波萊特的代理\\x%l運転士;#00ffc040;駕駛員%l;#;。" 

# monologue
# JP: だが……そんな簡単に、他の誰かに任せ立てるほど、\n質の低い乗務を積み重ねてきたつもりなどない。
1947 = "不過……我並不覺得我們的乘務服務簡單到可以輕易委託給別人而不降低其質量。" 

# monologue
# JP: （他の誰かだと？　ポーレットでも、僕でもなく。\n僕の知らない、誰か、別の人間が――）
2409 = "（交給別人？不是波萊特，也不是我，而是交給我不知道的另一個人——）" 

# monologue
# JP: 相手がどこの誰であろうと、れいなはれいなだ。\n決まってしまえば変わらぬ笑顔で迎えよう。
1943 = "不管對方是哪裡的誰，玲奈就是玲奈。要是決定好了的話她會以相同的笑容去對待對方吧。" 

# monologue
# JP: そうしてあの、あどけないような話を無邪気に、\nきっと、のんびり話すのだ。
2226 = "然後她一定會以天真的語氣悠閒地進行那略帶稚氣的談話。" 

# monologue
# JP: （それは……嫌だな）
2429 = "（那……我可不願意）" 

# monologue
# JP: 不安が、胸に湧いてくる。
1938 = "不安從心裡噴湧而出。" 

# monologue
# JP: 昔の傷みがじくじくと、\n両足からはい登ってきて、喉を緩やかに締め付ける。
2361 = "過去的痛感如附骨之蛆，從雙腳向上蔓延，緩緩地扼住了我的喉嚨。" 

# monologue
# JP: （れいなと離れてしまうのは、\n話せなくなってしまうのは……とても、嫌だな）
2417 = "（和玲奈分開，不能再和她說話……我討厭這樣）" 

# monologue
# JP: 僕は、知ってる。\n路子が、父さんが、母さんが。僕に教えてくれたから。
2135 = "我很清楚。因為路子、父親、母親已經讓我明白。" 

# monologue
# JP: 昨日一緒で、今日も一緒であったとしても――\n明日も一緒にいれる保証など、どこにも無いということを。
2094 = "就算昨天在一起，今天在一起——也完全不能保證明天還在一起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「とにかく、まずは双鉄くんに頼んでみましょう？」
1672 = "「總之先去拜託雙鐵君看看吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ならいくぞ、れいなと共に」
1555 = "「我會和玲奈一起去的」" 

# 【ポーレット】
# display as 玲奈＆波萊特
# JP: 『「わあっ！」\n「えっ！？」』
1770 = "『「哇啊！」\\n「哎！？」』" 

# monologue
# JP: れいなは頬をピンクに染めて、\n嬉しげに僕を見てくれる。
2248 = "玲奈的臉頰泛起了紅暈，高興地看著我。" 

# monologue
# JP: ならばもう、\n僕はなにひとつ迷わない。
2369 = "那我也不用再迷茫什麼了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田に不義理をすることとなろうと、\n例え、縁を切られようとも、構わない」
1522 = "「就算對不起右田家，就算被斷絕關係，也沒關係」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ？　ちょっ」
1406 = "「哎？喂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はれいなと一緒にいたい。れいなの笑顔を見ていたい。\nそのためならば、[やわた,1]矢幡でも[てっぽうわた,2]鉄砲幡でも、どこでも行こう」
1552 = "「我想要和玲奈在一起。我想見到玲奈的笑容。為了這個目的不管是八幡還是九幡我都願意去」" 

# 【れいな】
# display as 玲奈
# JP: 「わ……ふわぁ」
1373 = "「哇……呼哇」" 

# monologue
# JP: れいなが、ぽかんと僕を見る。\n夢見るような、あるいは、あきれているような目で。
2232 = "玲奈呆呆地看著我。她的眼神彷彿在做夢，又或者說是嚇呆了。" 

# monologue
# JP: 途端、スウっと、心臓から血が抜け落ちる。\nいや――そうだ。これは、僕の一方的な願いに過ぎん。
2277 = "突然，我的心臟唰地失去了血液。不——對了，這只是我的一廂情願。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、れいながイヤでないならの話」
1656 = "「當然，前提是玲奈願意」" 

# 【れいな】
# display as 玲奈
# JP: 「イヤなんてわけ、ないですよぉ！」
1540 = "「怎麼可能會不願意呢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1765 = "「！」" 

# monologue
# JP: 言葉と同時、れいなの体が飛んでくる。
2072 = "她邊說邊撲了過來。" 

# monologue
# JP: （とさっ）
2423 = "（撲通）" 

# monologue
# JP: とても柔らかで温かで、いい匂いがして、\nこころがぽかぽか、しあわせになる。
2185 = "既柔軟又溫暖，還有好聞的香氣，感覺心也暖暖的很幸福。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、そうてつさんと一緒にいたいです！　そうてつ\nさんが笑うのみると、れいなもすごくしあわせです」
1646 = "「玲奈想和雙鐵先生在一起！看到雙鐵先生笑玲奈也好幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1414 = "「啊——」" 

# monologue
# JP: 安堵する。\n抱きしめているぬくもりが、僕の不安を溶かしてくれる。
2085 = "安心的感覺湧上心頭。她抱著我的溫暖融化了我的不安。" 

# monologue
# JP: ああ、もう何も怖くない。\n最初から、何を恐れる必要さえも、きっと無かった。
2029 = "啊，已經沒什麼可怕的了。其實，我本也沒有畏首畏尾的必要吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ずっと。\n僕は、れいなと一緒にいよう」
1735 = "「那我就和玲奈永遠在一起吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はい、そうてつさん！　れいなもずっと、\nずうっとずうっと、そうてつさんと一緒ですよぉ」
1482 = "「嗯，雙鐵先生！玲奈也要永遠、永遠永遠和雙鐵先生在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、れいな」
1747 = "「那，玲奈」" 

# monologue
# JP: ハチロクのいってたことが、ようやく分かる。\n乗務がなくとも、一緒にずっといられる方法。
2156 = "我終於明白八六說的那些話了。就算不通過乘務，也能永遠在一起的方法。" 

# monologue
# JP: それは恐ろしく単純で、\nけれども今までの僕には決して、思いつけなかった方法だ。
2358 = "這是個簡單至極、但之前的我卻絕對想不到的方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「結婚しよう。\nそして、僕達は家族になろう」
1550 = "「我們結婚吧。共同組建一個家庭吧」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁい！　なります！\nれいな、そうてつさんのおよめさんになるんですねぇ」
1381 = "「哇！好！玲奈要當雙鐵先生的新娘了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\nそういうことになるな」
1459 = "「嗯，就是那樣」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、おままごとが本当になっちゃいましたぁ」
1397 = "「哎嘿嘿，扮家家酒過成真的了啊」" 

# monologue
# JP: いって、れいなは僕を見上げる。
2071 = "她邊說邊抬頭仰望我。" 

# monologue
# JP: 幸福のピンクに染まった頬が、\nじわじわじわじわ、トマトの赤へと熟してく。
2294 = "臉頰泛起幸福的粉紅色，然後漸漸地越來越深，化為了成熟的番茄。" 

# 【れいな】
# display as 玲奈
# JP: 「あの……ですね？　そうてつさん。\nれいな、ええと――およめさん、なるですから」
1721 = "「那個……？雙鐵先生。玲奈，唔——會當你的新娘的」" 

# monologue
# JP: （っ！）
2432 = "（！）" 

# monologue
# JP: 僕の手の中、\nれいなが目を閉じ、そうっと顎を持ち上げる。
2234 = "玲奈在我懷中閉上眼睛，輕輕地抬起了她的下巴。" 

# monologue
# JP: さすがに僕とて、すぐ理解する。\n誓いを、れいなは求めてる。
2122 = "愚鈍如我也很快理解了。玲奈是想要我的誓言。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誓おう、れいな」
1551 = "「我在此起誓，玲奈」" 

# monologue
# JP: 何に、と思い、たったひとつしか無いと知る。
2024 = "向什麼起誓？我很快知道答案只有一個。" 

# monologue
# JP: 産まれて最初に、僕が与えてもらったもの。\n何がどう変化しようとも、ずっと変わらなかったもの。
1996 = "出生之後我最先收到的東西。就算其他事物再怎麼變化，也一直不會變的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕自身と、双鉄というこの名にかけて。\n僕は、れいな。命あるかぎり君とともにあり続けよう」
1368 = "「向我自己，與雙鐵這個名字起誓。我在餘生內都將和玲奈你在一起」" 

# 【れいな】
# display as 玲奈
# JP: 「ぁっ」
1423 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――」
1407 = "「唔——」" 

# monologue
# JP: そして、キス。\nれいなの唇は小さくて、溶けてしまうほど柔らかい。
2326 = "親吻。玲奈的嘴唇小小的，並且像要融化一般柔軟。" 

# monologue
# JP: ちょっと吸ったなら飲めそうで、\nあまりに華奢で――壊してしまいそうで怖くなる。
2286 = "而且嬌嫩無比，好像一吸就能喝進去一樣——讓人害怕會不會把她弄壞了。" 

# 【れいな】
# display as 玲奈
# JP: 「ふ……んっ――」
1370 = "「呼……嗯——」" 

# monologue
# JP: だけどれいなは、キスを自分からは解かない。\nむしろぐいぐい、唇を押し付けて来てくれる。
1968 = "但是玲奈自己卻沒有停止接吻，反而把嘴唇向我這邊壓得越來越緊。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、鼻から息を――排気を行うものと知る。\nその感触さえ心地よく、体に熱がこもりはじめる。
2168 = "我這才知道\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也會從鼻子裡呼氣——進行排氣。不過連這份感觸也讓人覺得很舒服，身體開始越來越熱。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あっ」
1371 = "「呼啊……啊」" 

# monologue
# JP: 短い手がもぞもぞ動き、僕の体を抱きしめてくれる。\nだから素直に抱きしめ返す。
2060 = "她短短的小手也扭動著抱緊了我的身體。那我也率直地回抱她。" 

# monologue
# JP: 体と体がぴったりくっつき、\n温度も匂いもひとつにとけて、心地いい。
2130 = "我們的身體緊密接觸著，溫度和氣息也融合到一起，好舒服。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
995 = "「——」" 

# monologue
# JP: このままずっとキスしていたい。\n心が、欲でいっぱいになって溺れてく。
2076 = "好想就這麼一直親吻下去。內心被欲望漲滿，沉溺於其中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こほんっ」
1372 = "「咳咳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1766 = "「！！？」" 

# 【れいな】
# display as 玲奈
# JP: 「ぷぁあ……もうおしまいですかぁ」
1486 = "「噗哈……這就結束了嗎」" 

# monologue
# JP: にこにこのんきな、しあわせそうなれいなの声。
2245 = "玲奈的聲音中透著快樂、悠閒、幸福。" 

# monologue
# JP: それを聞くだけで耳が溶けるが、\n今はそこから、意識を剥がさねばならないときだ。
1985 = "光是聽她的聲音就覺得耳朵要融化了。不過現在必須要把意識剝離出來才行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ポーレット。公共の場である\nということなどが、頭から飛んでしまっていた」
1520 = "「對不起，波萊特。我忘了這裡是公共場所」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ、あの――ええと」
1427 = "「啊，不，那個——唔」" 

# monologue
# JP: よほどひどく混乱させてしまったのか\n青い瞳がぐるぐるしている。
2057 = "她看起來特別混亂的樣子，藍色的眼眸骨碌碌地打著轉。" 

# monologue
# JP: まぶたがいちどキツく閉じられ、\nそうして――笑顔に開かれる！
2064 = "她緊緊地閉上了眼睛，然後——突然睜開並露出了笑容！" 

# 【ポーレット】
# display as 波萊特
# JP: 「まずはなにより、ご結婚、おめでとうございます！」
1759 = "「首先，祝賀你們喜結連理！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1414 = "「啊——」" 

# monologue
# JP: なんの飾り気もない祝福。\nそれが、心に染みてくる。
2202 = "毫無做作感的祝福，溶入到了我的心中。" 

# 【双鉄】
# display as 雙鐵
