[script]
# lines: 385 
# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうですか、わかりました。\nありがとうございます。――はい、それでは」
1438 = "「Vâng. Vậy sao ạ, tôi hiểu rồi. Xin cảm ơn.――Vâng, chào anh.」"
# monologue
# JP: (かちゃっ）
32 = "(Cạch)"
# monologue
# JP: 電話中からにこにこしていたポーレットの顔が、\n受話器を置けば、ちょっと含んだ笑いに変わる。
2004 = "Khuôn mặt Paulette vốn đã tươi cười từ lúc đang nghe điện thoại, sau khi đặt ống nghe xuống, lại chuyển sang một nụ cười đầy ẩn ý."
# 【ポーレット】
# display as 波萊特
# JP: 「今のお電話、どこからだと思いますか？」
1338 = "「Cuộc gọi vừa rồi, anh đoán xem là từ đâu gọi đến?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[やわた,1]矢幡の製鉄所さんか？」
1578 = "「Là nhà máy luyện thép ở Yahata sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ざーんねんっ！」
1634 = "「Tiếc quá!」"
# monologue
# JP: 待ってました、と言わんばかりの声が弾ける。
2054 = "Giọng cô ấy bật lên như thể chỉ chờ có thế."
# 【ポーレット】
# display as 波萊特
# JP: 「すごく惜しいけどハズレです。\n正解は、『くろがね鉄道株式会社』さんからでした！」
1749 = "「Rất sát rồi nhưng mà sai bét. Đáp án chính xác là từ \"Công ty Cổ phần Đường sắt Kurogane\"!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くろがね鉄道？」
1762 = "「Đường sắt Kurogane?」"
# monologue
# JP: 初めて聞く名だ。
2356 = "Một cái tên tôi mới nghe lần đầu."
# monologue
# JP: 知っているかとれいなを見れば、\nれいなもふるふる、戸惑ったように首を振る。
2147 = "Tôi quay sang nhìn Reina xem em ấy có biết không, nhưng Reina cũng bối rối lắc đầu nguầy nguậy."
# 【れいな】
# display as 玲奈
# JP: 「くろがね鉄道さんって、\nどこを走ってる鉄道ですかぁ？」
1761 = "「Đường sắt Kurogane, là tuyến đường sắt chạy ở đâu vậy ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[やわた,1]矢幡近郊。矢幡、[こくら,1]粉蔵、[ゆくはし,1]征橋、[ごとうじ,2]語頭寺、\n[のうがた,1]脳型――ぐるりと回ってまた矢幡」
1492 = "「Ngoại ô Yahata. Yahata, Kokura, Yukuhashi, Gotoji, Nogata――chạy một vòng rồi lại quay về Yahata.」"
# 【れいな】
# display as 玲奈
# JP: 「え？　北[きゅうしゅう,1]九洲に、\nそおんな大きな環状線なんて無いです――」
1402 = "「Hả? Ở Bắc Kyushu, làm gì có tuyến đường vòng nào lớn đến thế ạ――」"
# monologue
# JP: そこまで言って、れいなの瞳が丸くなる。
2337 = "Nói đến đó, đôi mắt Reina tròn xoe."
# monologue
# JP: ああ、そうか。\nつまりは、そういうことなのか！
2032 = "À, ra là vậy. Nghĩa là chuyện đó sao!"
# 【双鉄】
# display as 雙鐵
# JP: 「今まで無かったものが産まれた。\n――出来たのか、新しい鉄道会社が」
1303 = "「Một thứ chưa từng có trước đây đã được sinh ra. ――Đã thành lập rồi sao, một công ty đường sắt mới.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、[ちくほうたんでん,3]築豊炭田を中心とした旧貨物線群、旧鉱山鉄道群を、\n再編統合する、新しい鉄道会社が！」
1464 = "「Vâng, một công ty đường sắt mới, tái cơ cấu và hợp nhất các tuyến đường sắt chở hàng và khai thác mỏ cũ, với trung tâm là mỏ than Chikuho!」"
# 【れいな】
# display as 玲奈
# JP: 「わぁぁ、すごいですぅ！」
1376 = "「Oaaa, tuyệt quá đi ạ!」"
# monologue
# JP: 確かに、すごい。\nが、いささかの疑問も覚える。
2273 = "Quả thực là tuyệt vời. Nhưng, tôi cũng cảm thấy có chút nghi ngờ."
# 【双鉄】
# display as 雙鐵
# JP: 「それほどの大型環状に――\n都合良く路線が繋がるものなのか？」
1718 = "「Một tuyến đường vòng lớn đến thế―― liệu các tuyến đường có kết nối với nhau thuận lợi được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはもう。なにせ築豊。\n北[きゅうしゅう,1]九洲工業地帯の心臓だった炭田ですから」
1742 = "「Tất nhiên rồi. Dù sao thì cũng là Chikuho mà. Mỏ than từng là trái tim của Khu công nghiệp Bắc Kyushu cơ mà.」"
# monologue
# JP: 言われれば、学園で昔習ったことを思い出す。\n[ちゅうごく,1]仲国からの鉄鉱石と、築豊炭田の石炭と。
2070 = "Nghe vậy, tôi nhớ lại những gì từng học ở trường. Quặng sắt từ nước Chukoku và than đá từ mỏ than Chikuho."
# monologue
# JP: それらの供給を受けやすいことが幸いし、\nかつて、北九洲工業地帯は日ノ本一にまで栄えたのだと。
2008 = "Nhờ lợi thế dễ dàng tiếp nhận nguồn cung ứng đó, mà Khu công nghiệp Bắc Kyushu từng phát triển phồn vinh bậc nhất Hinomoto."
# 【双鉄】
# display as 雙鐵
# JP: 「貨物路線網は、相当に発展していたわけか」
1306 = "「Mạng lưới đường sắt chở hàng đã phát triển đến mức đó sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。原材料に半製品に製品に。\n膨大な量の貨物はひっきり無しに動いてたそうですから」
1609 = "「Đúng vậy. Nguyên liệu thô, bán thành phẩm, rồi thành phẩm. Một lượng hàng hóa khổng lồ di chuyển không ngừng nghỉ mà.」"
# monologue
# JP: 大規模工場ごとに専用線が引かれたほどの、\n貨物・鉱山鉄道王国。
2176 = "Từng nhà máy quy mô lớn đều có tuyến đường sắt chuyên dụng riêng, một vương quốc của đường sắt chở hàng và khai thác mỏ."
# monologue
# JP: それが、築豊近辺の最盛期の姿だったそうだ。
2375 = "Đó chính là diện mạo thời kỳ hoàng kim của khu vực quanh Chikuho."
# 【ポーレット】
# display as 波萊特
# JP: 「お互い同士に、\\x%l帝鉄;#00ffc040;帝鉄%l;#;までが加わった生存競争は、\nそれこそ、大廃線直前まで熱く燃え盛っていたんです」
1659 = "「Cuộc chiến sinh tồn giữa các công ty với nhau, thậm chí có cả sự tham gia của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, thực sự đã bùng cháy dữ dội cho đến tận ngay trước Đại bãi bỏ các tuyến.」"
# monologue
# JP: その名残は、今の今までくすぶり続け、\n\\x%lまいてつ;#00ffc040;まいてつ%l;#;達は残存路線の幾つかを、生きたまま存続させた。
2373 = "Tàn tích của nó vẫn còn âm ỉ cho đến tận bây giờ, và các \\x%lまいてつ;#00ffc040;chủ tàu%l;#; đã duy trì sự sống cho một vài tuyến đường còn sót lại."
# monologue
# JP: 廃線になってしまった路線跡も、\n廃線されたそのままに、多くが放置されていた。
2097 = "Ngay cả dấu tích của những tuyến đường đã bị bãi bỏ, phần lớn cũng bị bỏ hoang y nguyên như lúc mới bị bãi bỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「そうした全部をまとめあげ、再編・復活させるための\n会社が、『くろがね鉄道株式会社』さんなんです」
999 = "「Một công ty nhằm tập hợp tất cả những thứ đó lại, tái cơ cấu và hồi sinh chúng, đó chính là \"Công ty Cổ phần Đường sắt Kurogane\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「新会社の母体は矢幡製鉄所さんなのか？」
1575 = "「Công ty mẹ của công ty mới này là nhà máy luyện thép Yahata sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「矢幡製鉄所さんの呼びかけで、\n持株会社形式で運営されることになるそうですよ」
1568 = "「Theo lời kêu gọi của nhà máy luyện thép Yahata, họ sẽ hoạt động dưới hình thức công ty cổ phần đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1445 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「でも、まとめるのは相当大変だったみたいです。\n\\x%l改軌;#00ffc040;[かいき,1]改軌%l;#;が必要になった路線も――」
1294 = "「Nhưng mà, việc tập hợp lại có vẻ khá là vất vả. Cũng có những tuyến đường cần phải \\x%l改軌;#00ffc040;cải khổ đường ray%l;#;――」"
# monologue
# JP: 言いかけた言葉を飲み込んで、\nポーレットはハっと気づいた顔になる。
1966 = "Nuốt lại những lời định nói, Paulette bỗng lộ ra vẻ mặt như chợt nhận ra điều gì."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、\\x%l改軌;#00ffc040;改軌%l;#;っていうのはですね」
1424 = "「À, \\x%l改軌;#00ffc040;cải khổ đường ray%l;#; có nghĩa là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l軌間;#00ffc040;[ゲージ,1]軌間%l;#;――つまりは線路幅を変更することだ。\nトロッコの508mmから一般的な1067mmというように」
1571 = "「Là thay đổi \\x%l軌間;#00ffc040;khổ đường sắt%l;#;――tức là thay đổi chiều rộng của đường ray. Từ 508mm của xe goòng sang 1067mm thông thường chẳng hạn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そのとおりです。良く知ってましたね」
1460 = "「À, đúng vậy ạ. Anh biết rõ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやなに」
1707 = "「Có gì đâu.」"
# monologue
# JP: 教わっておいた甲斐があった。\nにこにこしてるれいなと軽く、視線を交わす。
2042 = "Quả là bõ công đã học hỏi trước. Tôi khẽ đưa mắt nhìn Reina đang cười tủm tỉm."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……それほどにややこしそうな案件が、\nこういっては何だが、よくまとまったな」
1293 = "「Nhưng mà... một dự án có vẻ phức tạp đến thế, nói sao nhỉ, thật đáng ngạc nhiên khi họ có thể thống nhất được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「北九洲工業地帯も、ずっと元気なかったですから。\nだから、評価されて受け入れてもらえたんだと思います」
1489 = "「Khu công nghiệp Bắc Kyushu cũng đã ảm đạm suốt một thời gian dài mà. Nên tôi nghĩ dự án này mới được đánh giá cao và chấp nhận.」"
# 【双鉄】
# display as 雙鐵
# JP: 「受け入れられた？」
1686 = "「Được chấp nhận?」"
# 【ポーレット】
# display as 波萊特
# JP: 「北九洲工業地帯の復活と団結とのシンボルに、是非って。\n[りょか,1]旅貨混合の観光ＳＬ――双鉄くんのアイディアが」
1314 = "「Họ nói nhất định phải biến nó thành biểu tượng cho sự phục sinh và đoàn kết của Khu công nghiệp Bắc Kyushu. Ý tưởng của anh Soutetsu ấy――đầu máy hơi nước du lịch chở cả khách lẫn hàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。僕らのアイディアが、か」
1602 = "「Vậy sao. Ý tưởng của \"chúng ta\" à.」"
# monologue
# JP: 僕の、ではなく僕らのと、さりげなく加えた修正に、\nれいなもにこにこ、大きな頷きで同意する。
2159 = "Nghe tôi khéo léo sửa lại thành \"chúng ta\" thay vì \"của tôi\", Reina cũng cười tươi, gật đầu mạnh mẽ đồng tình."
# 【れいな】
# display as 玲奈
# JP: 「みぃんなで会議、がんばってやってよかったですねぇ」
1498 = "「Mọi người đã cố gắng họp bàn với nhau thật là tốt quá anh nhỉ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんとね、れいな」
1596 = "「Thật đấy, Reina nhỉ.」"
# monologue
# JP: ポーレットが手を伸ばし、れいなの髪を優しく撫でる。\nその瞬間に、あ、と気づく。
2210 = "Paulette vươn tay ra, dịu dàng vuốt tóc Reina. Khoảnh khắc đó, tôi chợt nhận ra."
# monologue
# JP: 今日のれいなは、自分ひとりで座ってる。\nいつものように、ポーレットの膝の上にではなしに。
2230 = "Hôm nay Reina đang tự ngồi một mình. Chứ không phải ngồi trên đùi Paulette như mọi khi."
# 【れいな】
# display as 玲奈
# JP: 「線路、\n御一夜からそこまで繋がることになるんですかぁ？」
1337 = "「Đường ray, sẽ được nối từ Ohimitera đến tận đó luôn ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、れいな。まだそこまでは無理。\n御一夜からは最優先で、[やつしろ,2]八ツ城までを復線させる」
1300 = "「Không đâu, Reina. Vẫn chưa thể đến mức đó được. Từ Ohimitera, ưu tiên hàng đầu là khôi phục tuyến đường đến Yatsushiro.」"
# 【れいな】
# display as 玲奈
# JP: 「[やつしろ,2]八ツ城からは、けど、\nみかん鉄道さんしかありませんよぉ？」
1364 = "「Nhưng mà, từ Yatsushiro trở đi, chỉ có mỗi Đường sắt Mikan thôi mà ạ?」"
# monologue
# JP: みかん鉄道は、八ツ城から南、夏午島方面へと走る路線だ。
2199 = "Đường sắt Mikan là tuyến chạy từ Yatsushiro về phía nam, hướng Kagoshima."
# monologue
# JP: 北九洲工業地帯のある吹丘とは、\nまるっきり正反対にしか向かわない。
2028 = "Hoàn toàn ngược hướng với Fukuoka, nơi có Khu công nghiệp Bắc Kyushu."
# 【ポーレット】
# display as 波萊特
# JP: 「そうね、だから、八ツ城-[くまもと,1]隈元間はトレーラー陸送。\nお客さんには、その間、バス移動してもらう感じかな？」
1595 = "「Đúng vậy, nên đoạn Yatsushiro - Kumamoto sẽ vận chuyển bằng xe đầu kéo. Còn hành khách thì chắc là sẽ di chuyển bằng xe buýt trong đoạn đó nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「それは、ちょこぉっと残念ですねぇ」
1726 = "「Thế thì, hơi tiếc một chút xíu chị nhỉ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「一度に全部は無理だもの。けど逆に言えば、\n乗り換えの分、二つのＳＬを楽しんで貰えるわけだし」
1268 = "「Đâu thể làm xong tất cả cùng một lúc được. Nhưng ngược lại, nhờ đổi chuyến, hành khách sẽ được trải nghiệm tận hai chiếc đầu máy hơi nước cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。復線が為ったとしてもなお、\n[ハチロク,3]8620は[やつしろ,2]八ツ城までしかいけないものな」
1437 = "「À, ra vậy. Dù có khôi phục tuyến đường đi chăng nữa, 8620 cũng chỉ có thể chạy đến Yatsushiro thôi mà.」"
# 【れいな】
# display as 玲奈
# JP: 「じゃ、くろがね鉄道さんにも、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;さんがあるんですねぇ」
1743 = "「Vậy là bên Đường sắt Kurogane, cũng có \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。ある！　今日も現役でバリバリ矢幡を走ってる、\n大傑作の国産量産貨物向き\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が！」
1469 = "「Ừ. Có chứ! Hôm nay vẫn đang chạy phăm phăm ở Yahata đấy, kiệt tác \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sản xuất hàng loạt trong nước chuyên chở hàng hóa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む。それは、ひょっとして――」
1412 = "「Hừm. Đó, không lẽ là――」"
# monologue
# JP: ハチロクに聞かされたことがある。
2074 = "Tôi đã từng nghe Hachiroku kể."
# monologue
# JP: 数多くの\\x%l8620;#00ffc040;8620%l;#;形――直接の姉妹たちとは異なっている。\nけれど一番“姉妹機”と呼ぶにふさわしい機関車のことを。
2081 = "Khác với vô số mẫu \\x%l8620;#00ffc040;8620%l;#;――những người chị em trực hệ. Nhưng lại là chiếc đầu máy xứng đáng được gọi là \"chị em\" nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l9600;#00ffc040;[キュウロク,11]帝鉄9600形蒸気機関車%l;#;、か？」
992 = "「Là \\x%l9600;#00ffc040;9600 (Kyuroku)%l;#; sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解です、双鉄くん！」
1515 = "「Hoàn toàn chính xác, anh Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……きっとハチロクが喜ぶだろうな」
1597 = "「Vậy sao...... chắc chắn Hachiroku sẽ vui lắm đây.」"
# monologue
# JP: 間接的な繋がりだけでも嬉しかろうが、\nやはりいつしか、直接対面させてやりたい。
2389 = "Dù chỉ là mối liên kết gián tiếp cũng đủ khiến em ấy vui rồi, nhưng quả nhiên, tôi vẫn muốn một ngày nào đó cho họ trực tiếp gặp nhau."
# monologue
# JP: そのために必要な八ツ城-隈元間の復線は、\n現状では、夢のまた夢にすぎないが――
2224 = "Để làm được điều đó, việc khôi phục tuyến Yatsushiro - Kumamoto là cần thiết, dù hiện tại nó chỉ là giấc mơ xa vời――"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうでした。ハチロクちゃんなんですけれど」
1430 = "「À, đúng rồi. Về Hachiroku ấy mà...」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1413 = "「Hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「――配置に関する希望。でございますか」
997 = "「――Nguyện vọng về việc bố trí. Phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ポーレットがハチロクに聞いておいて欲しいと。\n配置転換をするかもしれんと言っていた」
1472 = "「Ừ, Paulette bảo tôi hỏi Hachiroku. Cô ấy nói có thể sẽ phải thay đổi bố trí.」"
# 【ハチロク】
# display as 八六
# JP: 「配置転換」
1701 = "「Thay đổi bố trí.」"
# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城までの復線がなれば、みかん鉄道さんとも\n相互乗り入れというものを行う予定なのだそうだ」
1511 = "「Nếu khôi phục được tuyến đến Yatsushiro, dự kiến chúng ta sẽ tiến hành chạy liên thông với Đường sắt Mikan.」"
# monologue
# JP: 聞いたそのままを伝えれば、\nハチロクは納得顔で「ああ」と頷く。
2139 = "Nghe tôi truyền đạt lại y nguyên, Hachiroku gật đầu \"À\" với vẻ mặt thấu hiểu."
# 【ハチロク】
# display as 八六
# JP: 「相互乗り入れとなると、ダイアが複雑化しますからね。\nまして、マイントレジャー・[じゅつせん,1]術仙炭鉱も稼働しますし」
1513 = "「Nếu chạy liên thông thì biểu đồ chạy tàu sẽ phức tạp hơn mà. Huống hồ Mine Treasure và mỏ than Jussen cũng sẽ đi vào hoạt động nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなると、配置転換が必要になるのか？」
1741 = "「Như vậy thì cần phải thay đổi bố trí sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。今までのように、全ての\\x%l列車;#00ffc040;列車%l;#;が御一夜に帰着して\n一日を終えるとは限らなくなりますから」
1455 = "「Vâng ạ. Vì sẽ không còn chuyện tất cả các \\x%l列車;#00ffc040;tàu%l;#; đều trở về Ohimitera để kết thúc một ngày như trước đây nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。例えば、どこかの駅に前泊して、\nそこを始発で――という\\x%l編成;#00ffc040;編成%l;#;も出てくるかもしれんのか」
1344 = "「Ra vậy. Ví dụ như ngủ lại ở một ga nào đó, rồi lấy đó làm điểm xuất phát――có thể sẽ xuất hiện những \\x%l編成;#00ffc040;đoàn tàu%l;#; như thế nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございます。[ハチロクニイマル,3]8620は、[ヤツシロ,2]八ツ城に向かうことが、\nどうしても多くなるかと思いますので――」
1610 = "「Chính xác là vậy ạ. 8620 chắc chắn sẽ phải hướng đến Yatsushiro nhiều hơn, nên là――」"
# monologue
# JP: ちら、とハチロクの目が僕を見る。
1989 = "Hachiroku khẽ liếc nhìn tôi."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの負荷も増える分、それを最も分担できる\n双鉄様の復帰を希望するか否かを、尋ねられたのかと」
1501 = "「Vì khối lượng công việc của em cũng tăng lên, nên cô ấy muốn hỏi xem em có mong muốn Ngài Soutetsu, người có thể san sẻ gánh nặng đó tốt nhất, quay lại hay không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか」
1439 = "「À, ra vậy.」"
# monologue
# JP: 日々姫が急速に成長している今もなお、\nハチロクは僕を、最良の\\x%l機関士;#00ffc040;機関士%l;#;と認めてくれてる。
2387 = "Ngay cả bây giờ, khi Hibiki đang trưởng thành nhanh chóng, Hachiroku vẫn công nhận tôi là người \\x%l機関士;#00ffc040;lái tàu%l;#; xuất sắc nhất."
# monologue
# JP: それは誇らしく嬉しいことで、\n多少の無理はおしてやりたい気持ちに――
2357 = "Đó là một điều đáng tự hào và vui sướng, khiến tôi có cảm giác muốn gắng sức vì em ấy dù có hơi quá sức một chút――"
# 【ハチロク】
# display as 八六
# JP: 「ですが、わたくしの唯一の希望は、\n当面の双鉄様のご負担を少しでも軽減することです」
1296 = "「Nhưng mà, nguyện vọng duy nhất của em là, giảm bớt gánh nặng trước mắt cho Ngài Soutetsu dù chỉ một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕のか？」
1557 = "「Của tôi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、マイントレジャーなどの稼働に向け、\n双鉄様のご負担も、これからますます増加しますから」
1480 = "「Vâng ạ, để chuẩn bị cho Mine Treasure đi vào hoạt động, gánh nặng của Ngài Soutetsu từ nay cũng sẽ ngày càng tăng lên mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ……だろうな」
1409 = "「Chà...... chắc là vậy.」"
# monologue
# JP: ポーレットがてんてこまいである以上、\\x%lキハ07;#00ffc040;キハ07%l;#;の乗務は\n落ち着くまでは変わらずに、僕に任されることだろう。
2211 = "Khi mà Paulette đang bận tối mắt tối mũi, thì việc lái \\x%lキハ07;#00ffc040;KiHa 07%l;#; chắc chắn vẫn sẽ giao cho tôi cho đến khi mọi thứ ổn định."
# monologue
# JP: 加えて、各部署の連絡・調整役も僕が担うこととなるし、\n稼働するまで、馬車馬のごとく働かねばならなさそうだ。
2288 = "Thêm vào đó, tôi còn phải đảm nhận vai trò liên lạc, điều phối giữa các bộ phận, có vẻ như tôi sẽ phải làm việc như trâu như ngựa cho đến khi mọi thứ đi vào hoạt động."
# 【ハチロク】
# display as 八六
# JP: 「ですので、\\x%l8620;#00ffc040;8620%l;#;は現行の、日々姫\\x%l機関士;#00ffc040;機関士%l;#;代理、\n凪\\x%l機関助士;#00ffc040;機関助士%l;#;をベースとして調整を加えていただければ」
1564 = "「Do đó, \\x%l8620;#00ffc040;8620%l;#; mong Ngài Soutetsu cứ lấy đội hình hiện tại là Hibiki làm \\x%l機関士;#00ffc040;lái tàu%l;#; đại diện, và Nagi làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; làm cơ sở rồi điều chỉnh thêm là được ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1706 = "「Vậy sao.」"
# monologue
# JP: ならば八ツ城行きの混合\\x%l列車;#00ffc040;列車%l;#;も、\n日々姫が持っていくこととなる。
2376 = "Nếu vậy thì \\x%l列車;#00ffc040;tàu%l;#; hỗn hợp đi Yatsushiro, cũng sẽ do Hibiki phụ trách."
# monologue
# JP: それは正直……やってみたかった気もするが。
2359 = "Thành thật mà nói... tôi cũng có chút muốn thử lái chuyến đó."
# 【ハチロク】
# display as 八六
# JP: 「ご心配なく、双鉄様。双鉄様はわたくしの\\x%l機関士;#00ffc040;機関士%l;#;。\n状況が落ち着き次第、ご復帰いただくこととなります」
1281 = "「Đừng lo lắng, Ngài Soutetsu. Ngài Soutetsu là \\x%l機関士;#00ffc040;lái tàu%l;#; của em. Ngay khi tình hình ổn định, em sẽ nhờ Ngài quay lại làm việc ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1706 = "「這樣啊」" 
# monologue
# JP: 言ってもらえて、ホっとして。
2291 = "Nghe em ấy nói vậy, tôi thở phào nhẹ nhõm."
# monologue
# JP: そんな自分に驚けば、\n顔に出たのか――ハチロクはクスクス笑いだす。
2133 = "Tôi ngạc nhiên với chính bản thân mình, không biết có lộ ra mặt không――mà Hachiroku lại cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「率直な話――\n\\x%lキハ07;#00ffc040;キハ07%l;#;の運転では、些か物足りなくございましょう？」
1688 = "「Nói thẳng ra thì―― lái \\x%lキハ07;#00ffc040;KiHa 07%l;#; có chút không thỏa mãn phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん……\n僕は――そうなのだな」
1420 = "「À...... ừm...... Tôi――đúng là vậy nhỉ.」"
# monologue
# JP: 真正面から尋ねられれば、\n自分の気持ちが真っ直ぐ見える。
2311 = "Bị hỏi thẳng như vậy, tôi mới nhìn rõ được cảm xúc của chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「楽は楽で、非常に便利とは思うのだが。\n手応え的な面では、やはり、な」
1700 = "「Nhàn thì nhàn thật, tôi cũng thấy vô cùng tiện lợi. Nhưng về mặt cảm giác điều khiển thì, quả nhiên là...」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございましょうね。\n双鉄様は、生粋の蒸気\\x%l機関士;#00ffc040;機関士%l;#;でございますから」
1591 = "「Chắc chắn là vậy rồi ạ. Vì Ngài Soutetsu là một \\x%l機関士;#00ffc040;lái tàu%l;#; hơi nước chính hiệu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、それは評価が過大にすぎよう」
1391 = "「Không đâu, em đánh giá quá cao rồi.」"
# monologue
# JP: ハチロクに認めてもらえたような気がして、\nそこは素直に喜ばしい。
2360 = "Cảm giác như được Hachiroku công nhận, điều đó thực sự khiến tôi rất vui."
# monologue
# JP: 喜ばしいが――なんだろう、\nなにか、素直には受け入れ難い部分もある。
2390 = "Vui thì vui thật――nhưng sao nhỉ, có phần nào đó tôi lại khó lòng chấp nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lキハ07;#00ffc040;キハ07%l;#;の乗務もだな、楽しさという点だけでみれば、\n\\x%l8620;#00ffc040;8620%l;#;以上と感じることもあるしな」
1508 = "「Công việc trên \\x%lキハ07;#00ffc040;KiHa 07%l;#; ấy mà, nếu chỉ xét về mặt thú vị, thì có những lúc tôi cảm thấy nó còn hơn cả \\x%l8620;#00ffc040;8620%l;#; nữa cơ.」"
# 【ハチロク】
# display as 八六
# JP: 「あら。それは――\n『キハ07の運転』を楽しまれてのことなのですか？」
1387 = "「Trời ạ. Điều đó―― có phải là Ngài đang tận hưởng việc 『lái KiHa 07』 không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？　あ……いや――」
1405 = "「Hả? À...... không――」"
# monologue
# JP: それは、違う。\n\\x%lキハ07;#00ffc040;キハ07%l;#;の運転は、非常に楽だが、楽しくは無い。
2364 = "Không phải vậy. Lái \\x%lキハ07;#00ffc040;KiHa 07%l;#; rất nhàn, nhưng không hề thú vị."
# monologue
# JP: しかし、乗務自体は楽しい。\nそれは――ああ。
1948 = "Tuy nhiên, bản thân công việc trên tàu lại rất vui. Đó là vì――à."
# 【双鉄】
# display as 雙鐵
# JP: 「違うな。\n運転ではなく、れいなとの会話やなにかが……」
1273 = "「Không phải. Không phải là lái tàu, mà là việc trò chuyện với Reina hay gì đó......」"
# monologue
# JP: 言葉が何故か詰まってしまい、\n遅れて気付きがやってくる。
1940 = "Chẳng hiểu sao lời nói lại ứ nghẹn, rồi tôi chợt nhận ra."
# monologue
# JP: そうか。いずれは、ポーレットも乗務に復帰する。\nそうなれば、れいなと共に過ごす時間は大幅に――
2196 = "Ra vậy. Sớm muộn gì Paulette cũng sẽ quay lại làm việc. Khi đó, thời gian tôi ở bên Reina sẽ bị giảm đi đáng kể――"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、双鉄様は表情豊かになられましたね。\n出会ったころとは、まるでお人が変わられたよう」
1484 = "「Ư hự hự, Ngài Soutetsu biểu cảm phong phú hơn rồi nhỉ. Cứ như biến thành một người khác so với lúc mới gặp vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1767 = "「!?」"
# monologue
# JP: その一言に、思わず顔を押さえてしまう。\n今僕は、どんな表情をしてたのだろうか？
2069 = "Câu nói đó khiến tôi bất giác đưa tay ôm mặt. Lúc nãy tôi đã làm ra vẻ mặt gì vậy chứ?"
# 【ハチロク】
# display as 八六
# JP: 「れいなが、きっと。双鉄様に、\nたくさんの表情を思い出させてくれたのでしょうね」
1678 = "「Chắc chắn là Reina. Đã giúp Ngài Soutetsu nhớ lại rất nhiều biểu cảm rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう……かもしれんな」
1421 = "「Chắc...... là vậy.」"
# monologue
# JP: 素直に思えば、キリ、と心のどこかが痛む。
2146 = "Cứ suy nghĩ thành thật, một nơi nào đó trong tim lại nhói lên."
# monologue
# JP: そうであるなら、れいなと過ごす時間が減れば――\n僕の顔から、また表情もどんどん減っていくのだろうか。
2078 = "Nếu vậy, khi thời gian ở bên Reina ít đi―― liệu những biểu cảm trên khuôn mặt tôi có dần biến mất nữa không."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　なにも寂しがることはございませんよ？\n乗務だけが、一緒にいるための方法では無いでしょう」
1758 = "「Ngài Soutetsu? Ngài không cần phải buồn bã thế đâu ạ. Đâu phải chỉ có đi làm cùng nhau mới là cách để ở bên nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
1447 = "「Ừ......m.」"
# monologue
# JP: そこまで丸わかりになるほどに、もの淋しげに見えたのか。\nが、指摘されれば確かにだ。
2392 = "Trông tôi buồn bã đến mức bị nhìn thấu hết thế sao. Nhưng, bị chỉ ra thì đúng là vậy thật."
# monologue
# JP: れいなと過ごす時間が減れば、それは正直、\nただ単純に寂しくもあろう。
2320 = "Nếu thời gian ở bên Reina ít đi, thành thật mà nói, tôi sẽ thấy rất cô đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク、教えてくれ。\n乗務以外の、一緒にいるための方法とはなんだ？」
1723 = "「Vậy Hachiroku, nói cho tôi biết đi. Ngoài đi làm cùng nhau ra, còn cách nào để ở bên nhau nữa?」"
# 【ハチロク】
# display as 八六
# JP: 「あらあら」
1389 = "「Trời ạ.」"
# monologue
# JP: 呆れたような、どこか嬉しげなくすくす笑い。
2049 = "Một nụ cười khúc khích, vừa như cạn lời, lại vừa có chút vui vẻ."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、それはご自身でお考えにならなければ。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のわたくしにもわかることですよ？」
1756 = "「Ngài Soutetsu, chuyện đó Ngài phải tự mình suy nghĩ chứ. Đến một \\x%lレイルロオド;#00ffc040;Railord%l;#; như em còn biết cơ mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\nならば、じっくり考えてみるとするさ」
1603 = "「Vậy sao. Nếu thế, tôi sẽ thử suy nghĩ thật kỹ xem sao.」"
# monologue
# JP: 教えてもらえないのであれば、無理に尋ねても仕方無い。\nハチロクの希望も確認したし――
2187 = "Nếu em ấy không chịu nói thì có gặng hỏi cũng vô ích. Tôi cũng đã xác nhận được nguyện vọng của Hachiroku rồi――"
# 【双鉄】
# display as 雙鐵
# JP: 「時間をとって済まなかったな。\n希望は間違いなくポーレットへと伝えておこう」
1269 = "「Xin lỗi vì đã làm mất thời gian của em. Tôi chắc chắn sẽ truyền đạt lại nguyện vọng của em cho Paulette.」"
# monologue
# JP: 立てばすぐさま、ハチロクはまた小さく微笑む。
2153 = "Vừa đứng lên, Hachiroku lại khẽ mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「レールショップへ、会いにいかれるのですね？\nれいなに、どうぞよろしくお伝えくださいな」
1544 = "「Ngài định đến cửa hàng đường sắt để gặp em ấy đúng không ạ? Nhờ Ngài gửi lời hỏi thăm của em đến Reina nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1767 = "「！？」" 
# monologue
# JP: また顔を隠したくなる衝動に耐え、\n黙ってただただ、頷き返す。
2143 = "Cố kìm nén sự thôi thúc muốn che mặt lại một lần nữa, tôi chỉ lặng lẽ gật đầu đáp lại."
# monologue
# JP: 表情豊かになった――と、ハチロクは言ってたが。
2002 = "Hachiroku nói tôi đã biểu cảm phong phú hơn――nhưng mà."
# monologue
# JP: （なんだ、僕の顔はホワイトボードにでもなったのか）
2421 = "（Gì chứ, mặt tôi biến thành cái bảng trắng rồi hay sao?）"
# monologue
# JP: れいなの話をしたられいなに会いたくなった。\n――そんな気持ちまで出てしまうとは。
2336 = "Vừa nhắc đến Reina là lại muốn gặp em ấy. ――Đến cả tâm trạng đó mà cũng lộ ra ngoài."
# 【れいな】
# display as 玲奈
# JP: 「えええっ！？　れいながですかぁ？」
1393 = "「Ể!? Reina ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1765 = "「!」"
# monologue
# JP: 外まで響く、れいならしからぬ大きな声。\nレールショップへ入ろうとした足が驚き止まってしまう。
2235 = "Một giọng nói lớn không giống Reina chút nào vang ra tận bên ngoài. Bước chân định bước vào cửa hàng đường sắt của tôi sững lại vì ngạc nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「そうなの、他には頼めなくって」
1613 = "「Đúng vậy, chị không thể nhờ ai khác được.」"
# 【れいな】
# display as 玲奈
# JP: 「でもでも、矢幡は遠いですよぉ」
1316 = "「Nhưng mà nhưng mà, Yahata xa lắm đó ạ~」"
# monologue
# JP: （えっ）
2418 = "（Hả?）"
# monologue
# JP: なんだ、何の話をしている。
2116 = "Gì vậy, hai người đang nói chuyện gì thế."
# 【ポーレット】
# display as 波萊特
# JP: 「それは……決して近くないけど。\nでも、大好きな鉱山鉄道のお仕事だし」
1714 = "「Chỗ đó... đúng là không gần chút nào. Nhưng mà, đây là công việc liên quan đến đường sắt mỏ mà em rất thích cơ mà.」"
# 【れいな】
# display as 玲奈
# JP: 「それはそうですけど……\nでも、ポーレットは一緒じゃないんですよね？」
1750 = "「Chuyện đó thì đúng là vậy nhưng mà... Nhưng chị Paulette không đi cùng em đúng không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。わたしは御一夜を離れられる状況じゃないから」
1474 = "「Ừ. Chị đang trong tình cảnh không thể rời khỏi Ohimitera được.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、それだと心細いですよぉ」
1651 = "「Thế thì Reina lo lắm ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「……一応、双鉄くんに同行をお願いしてみるけど。\nどうかな、それも難しいかもしれないわよね」
1004 = "「......Chị sẽ thử nhờ anh Soutetsu đi cùng em xem sao. Nhưng mà, có lẽ chuyện đó cũng khó khăn lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「どおしてですかぁ？」
1632 = "「Tại sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、いろいろと縛られてるでしょ？」
1755 = "「Anh Soutetsu đang bị ràng buộc bởi rất nhiều thứ, đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「ああ」
1450 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1767 = "「！？」" 
# monologue
# JP: 配置転換。\nその四文字が頭をよぎる。
2344 = "Thay đổi bố trí. Bốn chữ đó xẹt qua đầu tôi."
# monologue
# JP: （まさか、れいなが――\nいや、しかし。確かに僕が、御一夜を離れるのは難しい）
2431 = "（Không lẽ, Reina―― Không, nhưng mà. Đúng là việc tôi rời khỏi Ohimitera rất khó khăn.）"
# monologue
# JP: 右田の養子で。\n義務と恩と約束とによって縛られている。
2128 = "Là con nuôi của nhà Migita. Bị ràng buộc bởi nghĩa vụ, ân tình và lời hứa."
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回させないかぎり、\n僕のレールは、義父の思うがままに敷かれてしまう。
2317 = "Chừng nào chưa thể hủy bỏ việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì đường ray của tôi vẫn sẽ bị đặt theo ý muốn của cha nuôi."
# monologue
# JP: （それが嫌だと、思ったことなど一度もなかった。\nそうなるならばそれで良いとさえ思っていた――）
2414 = "（Tôi chưa từng nghĩ mình ghét điều đó. Thậm chí tôi còn nghĩ, nếu phải như vậy thì cũng chẳng sao――）"
# monologue
# JP: 胸が、ズキズキ痛み始める。
2150 = "Ngực tôi bắt đầu đau nhói."
# monologue
# JP: 僕は御一夜に縛られて、れいなは矢幡へ送り込まれる。\n共に過ごせる時間が裂かれ、壊れてしまう。
2160 = "Tôi bị trói buộc ở Ohimitera, còn Reina bị đưa đến Yahata. Khoảng thời gian chúng tôi có thể ở bên nhau sẽ bị xé nát, bị phá hủy."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんがいっしょだったら、\nれいな、がんばれそうな気がします――けどぉ」
1297 = "「Nếu có anh Soutetsu đi cùng, Reina cảm thấy mình sẽ cố gắng được――nhưng mà~」"
# 【ポーレット】
# display as 波萊特
# JP: 「心細いのはわかるけど。ね？　最悪の場合ひとりででも。\nとっても大事なことだから、れいな以外には頼めないの」
1560 = "「Chị biết em lo lắng mà. Nhé? Dù trường hợp xấu nhất em phải đi một mình. Đây là việc vô cùng quan trọng, chị không thể nhờ ai khác ngoài Reina đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「はい……ですぅ。\nでも――やっぱり、れいなひとりじゃ」
1503 = "「Vâng... ạ. Nhưng mà――quả nhiên, chỉ có một mình Reina thì...」"
# 【ポーレット】
# display as 波萊特
# JP: 「だったら……そうね。他の誰かに頼んでみる？」
1712 = "「Nếu vậy thì... để xem nào. Nhờ người khác thử xem sao nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「ええ～っ……\n他の誰かだなんて、そんな、いきなり」
1395 = "「Ể~... Người khác là sao chứ, tự nhiên lại...」"
# monologue
# JP: れいなの声が泣きそうになる。\nそれが嬉しくホっとして、同時に胸がチクリと痛む。
2246 = "Giọng Reina như sắp khóc. Điều đó khiến tôi vừa vui sướng nhẹ nhõm, lại vừa thấy tim nhói đau."
# 【ポーレット】
# display as 波萊特
# JP: 「だってその場合には他の誰かしかいないじゃない。\n安心して？　もちろん、最善の代理を探すから」
1490 = "「Vì trong trường hợp đó thì chỉ còn cách nhờ người khác thôi mà. Yên tâm đi, được chứ? Chắc chắn chị sẽ tìm một người thay thế tốt nhất.」"
# monologue
# JP: 代理。\n確かに僕とて、ポーレットの代理の\\x%l運転士;#00ffc040;運転士%l;#;だ。
1963 = "Người thay thế. Quả thực, tôi cũng chỉ là \\x%l運転士;#00ffc040;lái tàu%l;#; thay thế cho Paulette."
# monologue
# JP: だが……そんな簡単に、他の誰かに任せ立てるほど、\n質の低い乗務を積み重ねてきたつもりなどない。
1947 = "Nhưng mà... tôi không nghĩ những chuyến tàu mình đã thực hiện lại kém chất lượng đến mức có thể dễ dàng giao phó cho người khác như vậy."
# monologue
# JP: （他の誰かだと？　ポーレットでも、僕でもなく。\n僕の知らない、誰か、別の人間が――）
2409 = "（Người khác sao? Không phải Paulette, cũng chẳng phải tôi. Mà là một người nào đó tôi không hề quen biết――）"
# monologue
# JP: 相手がどこの誰であろうと、れいなはれいなだ。\n決まってしまえば変わらぬ笑顔で迎えよう。
1943 = "Bất kể đối phương là ai, Reina vẫn là Reina. Nếu đã quyết định, em ấy sẽ đón nhận bằng nụ cười không đổi."
# monologue
# JP: そうしてあの、あどけないような話を無邪気に、\nきっと、のんびり話すのだ。
2226 = "Rồi em ấy sẽ lại ngây thơ kể những câu chuyện hồn nhiên đó, chắc chắn là với một thái độ thong dong."
# monologue
# JP: （それは……嫌だな）
2429 = "（Thế thì... khó chịu thật.）"
# monologue
# JP: 不安が、胸に湧いてくる。
1938 = "Nỗi bất an trào dâng trong ngực."
# monologue
# JP: 昔の傷みがじくじくと、\n両足からはい登ってきて、喉を緩やかに締め付ける。
2361 = "Nỗi đau quá khứ lại nhức nhối, bò dần lên từ đôi chân, từ từ siết chặt lấy cổ họng tôi."
# monologue
# JP: （れいなと離れてしまうのは、\n話せなくなってしまうのは……とても、嫌だな）
2417 = "（Phải rời xa Reina, không được nói chuyện với em ấy nữa... thật sự rất khó chịu.）"
# monologue
# JP: 僕は、知ってる。\n路子が、父さんが、母さんが。僕に教えてくれたから。
2135 = "Tôi biết chứ. Bởi Michiko, bố và mẹ đã dạy cho tôi."
# monologue
# JP: 昨日一緒で、今日も一緒であったとしても――\n明日も一緒にいれる保証など、どこにも無いということを。
2094 = "Cho dù hôm qua ở bên nhau, hôm nay cũng ở bên nhau―― Nhưng chẳng có gì đảm bảo ngày mai vẫn sẽ ở bên nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「とにかく、まずは双鉄くんに頼んでみましょう？」
1672 = "「Tóm lại là, trước tiên cứ thử nhờ anh Soutetsu xem sao nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕ならいくぞ、れいなと共に」
1555 = "「Nếu là tôi thì tôi sẽ đi, cùng với Reina.」"
# 【ポーレット】
# display as 玲奈＆波萊特
# JP: 『「わあっ！」\n「えっ！？」』
1770 = "『「Oa!」 「Hả!?」』"
# monologue
# JP: れいなは頬をピンクに染めて、\n嬉しげに僕を見てくれる。
2248 = "Đôi má Reina ửng hồng, em ấy vui sướng nhìn tôi."
# monologue
# JP: ならばもう、\n僕はなにひとつ迷わない。
2369 = "Nếu vậy thì, tôi không còn gì phải do dự nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「右田に不義理をすることとなろうと、\n例え、縁を切られようとも、構わない」
1522 = "「Dù có phải bất nghĩa với nhà Migita, dù có bị từ mặt đi chăng nữa, tôi cũng không bận tâm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ？　ちょっ」
1406 = "「Hả? Khoan đã.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はれいなと一緒にいたい。れいなの笑顔を見ていたい。\nそのためならば、[やわた,1]矢幡でも[てっぽうわた,2]鉄砲幡でも、どこでも行こう」
1552 = "「Tôi muốn ở bên Reina. Muốn nhìn thấy nụ cười của Reina. Vì điều đó, dù là Yahata hay Teppohata, tôi cũng sẽ đi bất cứ đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「わ……ふわぁ」
1373 = "「Oa... phù oa.」"
# monologue
# JP: れいなが、ぽかんと僕を見る。\n夢見るような、あるいは、あきれているような目で。
2232 = "Reina ngơ ngác nhìn tôi. Bằng ánh mắt như đang mơ màng, hay có lẽ là đang kinh ngạc."
# monologue
# JP: 途端、スウっと、心臓から血が抜け落ちる。\nいや――そうだ。これは、僕の一方的な願いに過ぎん。
2277 = "Đột nhiên, máu trong tim tôi như rút sạch. Không――đúng rồi. Đây chỉ là mong muốn đơn phương của tôi mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、れいながイヤでないならの話」
1656 = "「Tất nhiên, nếu Reina không thấy phiền.」"
# 【れいな】
# display as 玲奈
# JP: 「イヤなんてわけ、ないですよぉ！」
1540 = "「Làm gì có chuyện phiền chứ ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1765 = "「！」" 
# monologue
# JP: 言葉と同時、れいなの体が飛んでくる。
2072 = "Vừa dứt lời, Reina lao thẳng vào người tôi."
# monologue
# JP: （とさっ）
2423 = "（Phịch）"
# monologue
# JP: とても柔らかで温かで、いい匂いがして、\nこころがぽかぽか、しあわせになる。
2185 = "Rất mềm mại, ấm áp, lại có mùi hương dễ chịu, trái tim tôi cũng trở nên ấm áp, ngập tràn hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「れいな、そうてつさんと一緒にいたいです！　そうてつ\nさんが笑うのみると、れいなもすごくしあわせです」
1646 = "「Reina muốn ở bên anh Soutetsu! Nhìn anh Soutetsu cười, Reina cũng thấy hạnh phúc lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1414 = "「À――」"
# monologue
# JP: 安堵する。\n抱きしめているぬくもりが、僕の不安を溶かしてくれる。
2085 = "Tôi thở phào nhẹ nhõm. Hơi ấm đang ôm trọn lấy tôi đã làm tan biến mọi bất an."
# monologue
# JP: ああ、もう何も怖くない。\n最初から、何を恐れる必要さえも、きっと無かった。
2029 = "À, không còn gì phải sợ nữa rồi. Ngay từ đầu, chắc chắn đã chẳng có gì đáng để sợ hãi cả."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ずっと。\n僕は、れいなと一緒にいよう」
1735 = "「Vậy thì, mãi mãi. Anh sẽ ở bên cạnh Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「はい、そうてつさん！　れいなもずっと、\nずうっとずうっと、そうてつさんと一緒ですよぉ」
1482 = "「Vâng, anh Soutetsu! Reina cũng sẽ mãi mãi, mãi mãi mãi mãi ở bên anh Soutetsu đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、れいな」
1747 = "「Nếu vậy, Reina này.」"
# monologue
# JP: ハチロクのいってたことが、ようやく分かる。\n乗務がなくとも、一緒にずっといられる方法。
2156 = "Cuối cùng tôi cũng hiểu những gì Hachiroku đã nói. Cách để mãi mãi ở bên nhau dù không đi làm cùng nhau."
# monologue
# JP: それは恐ろしく単純で、\nけれども今までの僕には決して、思いつけなかった方法だ。
2358 = "Nó đơn giản đến đáng sợ, nhưng lại là cách mà tôi của trước đây không bao giờ nghĩ ra được."
# 【双鉄】
# display as 雙鐵
# JP: 「結婚しよう。\nそして、僕達は家族になろう」
1550 = "「Chúng ta kết hôn nhé. Và rồi, chúng ta hãy trở thành một gia đình.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい！　なります！\nれいな、そうてつさんのおよめさんになるんですねぇ」
1381 = "「Oa! Đồng ý ạ! Reina sẽ trở thành cô dâu của anh Soutetsu nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\nそういうことになるな」
1459 = "「Ừ. Chính là như vậy đó.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、おままごとが本当になっちゃいましたぁ」
1397 = "「Ư hự hự, trò chơi gia đình thành sự thật mất rồi ạ~」"
# monologue
# JP: いって、れいなは僕を見上げる。
2071 = "Nói rồi, Reina ngước lên nhìn tôi."
# monologue
# JP: 幸福のピンクに染まった頬が、\nじわじわじわじわ、トマトの赤へと熟してく。
2294 = "Đôi má ửng hồng vì hạnh phúc, từ từ, từ từ đỏ lựng lên như quả cà chua chín."
# 【れいな】
# display as 玲奈
# JP: 「あの……ですね？　そうてつさん。\nれいな、ええと――およめさん、なるですから」
1721 = "「Dạ... anh biết không? Anh Soutetsu. Reina, ừm――sẽ làm cô dâu mà.」"
# monologue
# JP: （っ！）
2432 = "（!）"
# monologue
# JP: 僕の手の中、\nれいなが目を閉じ、そうっと顎を持ち上げる。
2234 = "Trong vòng tay tôi, Reina nhắm mắt lại, khẽ nâng cằm lên."
# monologue
# JP: さすがに僕とて、すぐ理解する。\n誓いを、れいなは求めてる。
2122 = "Đến tôi cũng lập tức hiểu ra. Reina đang mong chờ một lời thề."
# 【双鉄】
# display as 雙鐵
# JP: 「誓おう、れいな」
1551 = "「Anh xin thề, Reina.」"
# monologue
# JP: 何に、と思い、たったひとつしか無いと知る。
2024 = "Thề với điều gì? Tôi nghĩ, và nhận ra chỉ có duy nhất một thứ."
# monologue
# JP: 産まれて最初に、僕が与えてもらったもの。\n何がどう変化しようとも、ずっと変わらなかったもの。
1996 = "Thứ đầu tiên tôi được ban cho khi chào đời. Thứ mà dù mọi thứ có thay đổi ra sao, vẫn luôn vẹn nguyên như thế."
# 【双鉄】
# display as 雙鐵
# JP: 「僕自身と、双鉄というこの名にかけて。\n僕は、れいな。命あるかぎり君とともにあり続けよう」
1368 = "「Nhân danh chính bản thân anh, và cái tên Soutetsu này. Anh, Reina. Chừng nào còn sống, anh sẽ mãi ở bên em.」"
# 【れいな】
# display as 玲奈
# JP: 「ぁっ」
1423 = "「A」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――」
1407 = "「Ưm――」"
# monologue
# JP: そして、キス。\nれいなの唇は小さくて、溶けてしまうほど柔らかい。
2326 = "Và rồi, chúng tôi trao nhau nụ hôn. Đôi môi của Reina nhỏ bé, mềm mại đến mức như muốn tan chảy."
# monologue
# JP: ちょっと吸ったなら飲めそうで、\nあまりに華奢で――壊してしまいそうで怖くなる。
2286 = "Chỉ cần mút nhẹ là có thể nuốt trọn, quá đỗi mỏng manh――khiến tôi sợ mình sẽ làm hỏng mất."
# 【れいな】
# display as 玲奈
# JP: 「ふ……んっ――」
1370 = "「Phù......ưm――」"
# monologue
# JP: だけどれいなは、キスを自分からは解かない。\nむしろぐいぐい、唇を押し付けて来てくれる。
1968 = "Nhưng Reina không tự mình dứt khỏi nụ hôn. Trái lại, em ấy còn chủ động áp chặt môi mình vào môi tôi."
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、鼻から息を――排気を行うものと知る。\nその感触さえ心地よく、体に熱がこもりはじめる。
2168 = "Tôi nhận ra \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng thở bằng mũi――thực hiện quá trình xả khí. Ngay cả cảm giác đó cũng thật dễ chịu, khiến cơ thể tôi bắt đầu nóng lên."
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……あっ」
1371 = "「Phù......a」"
# monologue
# JP: 短い手がもぞもぞ動き、僕の体を抱きしめてくれる。\nだから素直に抱きしめ返す。
2060 = "Đôi tay ngắn củn cựa quậy, ôm chặt lấy cơ thể tôi. Vì thế, tôi cũng tự nhiên ôm chặt lấy em ấy."
# monologue
# JP: 体と体がぴったりくっつき、\n温度も匂いもひとつにとけて、心地いい。
2130 = "Cơ thể chúng tôi áp sát vào nhau, nhiệt độ và mùi hương hòa quyện làm một, thật dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
995 = "「――」"
# monologue
# JP: このままずっとキスしていたい。\n心が、欲でいっぱいになって溺れてく。
2076 = "Tôi muốn cứ hôn thế này mãi. Trái tim ngập tràn dục vọng, dần chìm đắm trong đó."
# 【ポーレット】
# display as 波萊特
# JP: 「こほんっ」
1372 = "「E hèm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1766 = "「!!?」"
# 【れいな】
# display as 玲奈
# JP: 「ぷぁあ……もうおしまいですかぁ」
1486 = "「Puaa... Xong rồi hả anh?」"
# monologue
# JP: にこにこのんきな、しあわせそうなれいなの声。
2245 = "Giọng nói của Reina nghe thật thảnh thơi, ngập tràn hạnh phúc."
# monologue
# JP: それを聞くだけで耳が溶けるが、\n今はそこから、意識を剥がさねばならないときだ。
1985 = "Chỉ nghe thôi cũng khiến đôi tai tôi như muốn tan chảy, nhưng lúc này tôi phải kéo tâm trí mình ra khỏi đó."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ポーレット。公共の場である\nということなどが、頭から飛んでしまっていた」
1520 = "「Xin lỗi, Paulette. Chuyện đây là nơi công cộng, tôi đã hoàn toàn quên béng mất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ、あの――ええと」
1427 = "「A, không, chuyện đó――ừm thì.」"
# monologue
# JP: よほどひどく混乱させてしまったのか\n青い瞳がぐるぐるしている。
2057 = "Có lẽ tôi đã khiến cô ấy vô cùng bối rối, đôi mắt xanh kia đang đảo quanh liên tục."
# monologue
# JP: まぶたがいちどキツく閉じられ、\nそうして――笑顔に開かれる！
2064 = "Cô ấy nhắm chặt mắt lại một lần, và rồi――mở ra với một nụ cười!"
# 【ポーレット】
# display as 波萊特
# JP: 「まずはなにより、ご結婚、おめでとうございます！」
1759 = "「Trước tiên hơn hết, chúc mừng hai người đã kết hôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1414 = "「啊——」" 
# monologue
# JP: なんの飾り気もない祝福。\nそれが、心に染みてくる。
2202 = "Một lời chúc mừng không hề tô vẽ. Điều đó đang thấm sâu vào trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。とても嬉しい」
1691 = "「Cảm ơn cô. Tôi rất vui.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしもすごく嬉しいです。れいなの想いが、\nまさか、こんな素敵な形で実るだなんて」
1547 = "「Tôi cũng vui lắm. Tình cảm của Reina, không ngờ lại đơm hoa kết trái theo một cách tuyệt vời thế này.」"
# monologue
# JP: 実ると言ってもらえたけれど、\n今さらながらの疑問を覚える。
2385 = "Dù cô ấy nói là \"đơm hoa kết trái\", nhưng đến giờ tôi mới chợt nhận ra một thắc mắc."
# 【双鉄】
# display as 雙鐵
# JP: 「あ……と、その――法的にもきちんと実るのか？\nつまり人間と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の結婚は」
1417 = "「À...... ừm, chuyện đó――về mặt pháp lý thì có được công nhận không? Ý tôi là cuộc hôn nhân giữa con người và \\x%lレイルロオド;#00ffc040;Railord%l;#; ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です。両性の合意に基づきますし、\nれいなも余裕で、結婚可能年齢ですから」
1620 = "「Không sao đâu ạ. Dựa trên sự đồng thuận của cả hai bên, và Reina cũng dư sức đủ tuổi kết hôn rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば良かった」
1598 = "「Vậy sao. Thế thì tốt quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなに戸籍だけ必要になりますから――\nそこは、わたしの養女に入ってもらいます」
1644 = "「Chỉ cần làm hộ khẩu cho Reina thôi―― Việc đó thì, tôi sẽ nhận em ấy làm con nuôi.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！」
1377 = "「Oa!」"
# monologue
# JP: 照れてしまっていたのだろうか――
1941 = "Chắc nãy giờ em ấy đang xấu hổ――"
# monologue
# JP: 急に無口になってたれいなが、\n一転、にこにこと話しだす。
2003 = "Reina, người bỗng nhiên trở nên im lặng, nay lại thay đổi thái độ, cười tươi rạng rỡ và bắt đầu lên tiếng."
# 【れいな】
# display as 玲奈
# JP: 「それって、ポーレットが、\nれいなのおかあさんになってくれるってことですかぁ？」
1727 = "「Thế có nghĩa là, chị Paulette, sẽ trở thành mẹ của Reina sao ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうよ？　れいな」
1593 = "「Đúng vậy đó? Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい！　れいな、うれしいですぅ――はうっ！？」
1383 = "「Oaa! Reina vui lắm ạ――hau!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、れいな」
1539 = "「Sao vậy, Reina.」"
# monologue
# JP: 急に痛そうな顔をして、動きを止めてしまったが――
2062 = "Bỗng nhiên em ấy lộ vẻ mặt đau đớn, và dừng mọi cử động lại――"
# 【れいな】
# display as 玲奈
# JP: 「あの……ええと、なんでもないですぅ。\nうれしすぎて、ちょっと、びっくりしちゃっただけです」
1720 = "「Dạ...... ừm, không có gì đâu ạ. Chỉ là vì vui quá, nên Reina hơi giật mình một chút thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1599 = "「Vậy sao.」"
# monologue
# JP: 痛いの痛いの飛んでいけ――\nそんなつもりで髪を撫ぜ、ポーレットへと向き直る。
2260 = "Đau ơi đau ơi bay đi nào―― Với suy nghĩ đó, tôi vuốt ve mái tóc em ấy, rồi quay lại phía Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうなると戸籍上、\nポーレットが僕の義母ということとなるのだな」
1298 = "「Nhưng mà, nếu vậy thì trên hộ khẩu, Paulette sẽ trở thành mẹ vợ của tôi nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「義母！」
1523 = "「Mẹ vợ!」"
# monologue
# JP: ……ポーレットも年頃の女の子だ。
985 = "......Paulette cũng là một cô gái đang tuổi thanh xuân."
# monologue
# JP: 自分より年上の義理の息子ができるなど、\nそれはショックなことだろう。
2275 = "Tự nhiên lại có một cậu con rể lớn tuổi hơn mình, chắc chắn là một cú sốc lớn rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「そっか、そうよね――そうなんだ。\n双鉄くんが……義理の……むす、こ……うふふふふ」
1601 = "「Ra vậy, đúng thế nhỉ――đúng là vậy. Anh Soutetsu...... là con rể...... của mình...... ư hự hự hự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポ、ポーレット？」
1627 = "「Pa, Paulette?」"
# 【ポーレット】
# display as 波萊特
# JP: 「違いますよ？　双鉄くん」
1274 = "「Không phải thế đâu? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1400 = "「Hả?」"
# monologue
# JP: なんだ、今、『双鉄くん』から、\n爽やかさが欠けてしまっていたような気が――
2115 = "Gì vậy, tiếng \"Anh Soutetsu\" vừa rồi, cảm giác như đã mất đi sự tươi sáng vốn có――"
# 【ポーレット】
# display as 波萊特
# JP: 「お[ぎぼ,1]義母さん、と書いて、おかあさん。\nね？　ちょっと気が早いけど呼んでみてください」
1516 = "「Viết là \"Mẹ vợ\", nhưng phải gọi là \"Mẹ\". Nhé? Dù hơi sớm một chút nhưng anh cứ thử gọi xem nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　うむ――まぁ、では。\nこほんっ――あー……『お[かあ,1]義母さん』」
1605 = "「Vậy sao? Ừm――thôi thì. E hèm――à... 『Mẹ』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「くあっ！？　」
1444 = "「Kua!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぽ、ポーレット！？　どうした！」
1626 = "「Pa, Paulette!? Cô sao vậy!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！？　い、いえ、あまりにも衝撃的で、\n一瞬、クラっと」
1386 = "「Hả!? Kh-Không, vì quá sốc, nên trong chốc lát, tôi hơi choáng váng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「というか……鼻血が出てるぞ？　大丈夫か？」
1443 = "「Mà khoan...... cô đang chảy máu mũi kìa? Không sao chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　わっ！？　やだっ！　ちょっとれいな、\nごめんね、ティッシュっ――――えっ？」
1404 = "「Hả? Oái!? Thôi chết! Khoan đã Reina, xin lỗi em nhé, lấy giùm chị tờ giấy――――hả?」"
# 【れいな】
# display as 玲奈
# JP: 「あう……う…………そうてつ、さんっ」
1722 = "「Aư...... ư............ anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな！？　どうした！」
1653 = "「Reina!? Em sao vậy!」"
# 【れいな】
# display as 玲奈
# JP: 「れいな……おなか――おなかの、下の方……\nいた、くてっ――」
1638 = "「Reina...... bụng――phía dưới, bụng...... đau, quá――」"
# monologue
# JP: れいなはほとんど体をくの字に、\n下腹部を折り曲げるように痛みに耐えてる。
2238 = "Reina gần như gập người lại thành hình chữ く, om lấy bụng dưới chịu đựng cơn đau."
# monologue
# JP: 急いで背中をさすってやるが、\n苦しげな表情は変わらない。
2170 = "Tôi vội vàng vuốt lưng cho em ấy, nhưng vẻ mặt đau đớn vẫn không hề thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　これは――――っ！？」
1631 = "「Paulette! Thế này là――――!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫ですよ、双鉄くん。\nれいな、故障とか破損じゃないです」
1621 = "「Không sao đâu, anh Soutetsu. Reina không bị hỏng hóc hay tổn hại gì đâu.」"
# monologue
# JP: ポーレットは、少しも慌てていない。\nうんうん頷き――どこか感慨深げにさえ見える。
2214 = "Paulette không hề hoảng hốt chút nào. Cô ấy gật gù liên tục――thậm chí trông có vẻ đầy cảm khái."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、心当たりがあるのか？」
1538 = "「Gì chứ, cô biết nguyên nhân sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「とにかく、だっこしてあげてください。\n登呂流湯さんに連れて行かないと」
1673 = "「Tóm lại, anh hãy bế em ấy lên đi. Chúng ta phải đưa em ấy đến chỗ nhà tắm Tororyu-yu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむっ！」
1428 = "「À, ừm!」"
# 【れいな】
# display as 玲奈
# JP: 「んっ――」
1408 = "「Ưm――」"
# monologue
# JP: 両手をゆりかごに抱き上げたなら\nれいなの両手は、よわよわしく首を抱きしめてくる。
2172 = "Tôi dùng hai tay bế bổng em ấy lên như một chiếc nôi, đôi tay Reina yếu ớt ôm lấy cổ tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「これ、れいな。シーリングが開封されたんですよ」
1655 = "「Cái này ấy, Reina. Là phong ấn đã được mở ra rồi đó.」"
