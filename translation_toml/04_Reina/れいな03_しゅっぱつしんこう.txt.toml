# 【ポーレット】
# display as 波萊特
# JP: 「今のお電話、どこからだと思いますか？」
1338 = "「剛才的電話你猜是哪裡打來的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[やわた,1]矢幡の製鉄所さんか？」
1578 = "「是八幡那裡的煉鐵廠嗎？」" 

