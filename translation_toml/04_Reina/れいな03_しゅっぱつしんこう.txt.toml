1469 = "「嗯，有！他們的大傑作——國產量產貨運\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;今天也在八幡的鐵路上奔馳著呢」" 

# 【双鉄】
# display as 雙鐵
