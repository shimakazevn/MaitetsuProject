# JP: 初めて聞く名だ。
2356 = "這名字我還是第一次聽說。" 

# monologue
# JP: 知っているかとれいなを見れば、\nれいなもふるふる、戸惑ったように首を振る。
2147 = "我用眼神問玲奈她知不知道，結果她也搖搖頭一臉迷茫的樣子。" 

# 【れいな】
# display as 玲奈
