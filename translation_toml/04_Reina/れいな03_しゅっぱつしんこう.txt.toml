# monologue
# JP: 軽く抱きしめ、キスをする。\nれいなはくったり力を抜いて、僕に体を預けてしまう。
2162 = "我輕輕抱住她，然後吻了上去。玲奈放鬆了整個身體，任我隨意支配。" 

# 【れいな】
# display as 玲奈
# JP: 「んーーー」
1446 = "「嗯——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1384 = "「哈哈」" 

# monologue
# JP: 何時間でもキスをしたいが、\n出発の時刻も近づいている。
2386 = "雖然想繼續親上幾個小時，不過出發的時間快到了。" 

# monologue
# JP: キスを解いて鼻と鼻、おでことおでこをこすりあわせて、\nそれからゆっくり、れいなと僕との体を離す。
2129 = "我們嘴唇分開後又鼻子對鼻子、額頭對額頭地蹭了蹭，然後才緩緩分開。" 

# 【双鉄】
# display as 雙鐵
# JP: 「荷造りの続きをしよう」
1675 = "「繼續整理行李吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1504 = "「好」" 

# monologue
# JP: ちょっと不満気。\nふくらんだ頬を、今度は僕が指で突く。
2053 = "她的語氣略帶不滿，並鼓起了腮幫。這次換我用手指戳她。" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃんっ」
# 1374 = "「哇啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「キスの続きは、向こうについてからでもできるさ」
1335 = "「到了那邊之後也可以繼續親的嘛」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい！」
1505 = "「好呀！」" 

# monologue
# JP: 一転笑顔で、てきぱき荷造り。\nその手が不意に、ぴたりと止まる。
2052 = "她很快又露出了笑容，手腳俐落地整理起了行李。不過她的手又忽然停住了。" 

# 【れいな】
# display as 玲奈
# JP: 「そおいえば、そうてつさん」
1690 = "「說起來，雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1413 = "「唔？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなの、おなかいたかったの。\nあの、“シーリング”って、なんなのですかぁ？」
1739 = "「那時玲奈的肚子好痛。那個“封印”到底是什麼啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さぁな。今だに僕にもわからん」
1284 = "「不知道，我到現在也沒搞懂」" 

# 【れいな】
# display as 玲奈
# JP: 「そおなんですかあ？」
1604 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、登呂流湯のご主人は、\n『時間がくれば自然とわかる』とおっしゃっていた」
1476 = "「嗯，登呂流浴場老闆只說“時候到了自然就懂了”」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、楽しみですぅ」
1478 = "「嗯，那我就期待著了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと――」
1685 = "「行了——」" 

# monologue
# JP: 荷造りはこれでいいだろう。
2309 = "行李整理得這樣就差不多了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、いくか」
1733 = "「那我們走吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、そうてつさん」
1481 = "「嗯，雙鐵先生」" 

# monologue
# JP: 一歩を踏み出す。
2171 = "我邁出一步。" 

# monologue
# JP: 新しい車輌を迎えるために。\n新しい御一夜を迎えるために。
2223 = "為了去迎接新的車輛，為了去迎接新的御一夜。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん」
1751 = "「雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1450 = "「嗯」" 

# monologue
# JP: れいなの手を取る。\n手をつなぐ。
2142 = "我拉住玲奈的手，牽住她。" 

# monologue
# JP: この温かさを失うことを、僕は心底恐れてる。\n恐れるからこそ、大事に、れいなと歩いていける。
2136 = "我從心底害怕著失去這份溫暖。正因為害怕，才能珍惜和玲奈走出的每一步。" 

# monologue
# JP: （ああ……）
2419 = "（啊啊——）" 

# monologue
# JP: これがそうかと、不意に思う。\nただただ大事に想う気持ちが――
2138 = "我忽然明白了過來。這份無比珍視對方的感情，就是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな」
1639 = "「玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんでしょう？　そうてつさん」
1462 = "「嗯，怎麼啦？雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はな、お前を愛しているぞ」
1554 = "「我愛你」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ～」
1399 = "「哎嘿嘿～」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですねぇ、そうてつさんを、\nたくさんたくさん、たくさんたくさん愛してますよぉ」
1640 = "「玲奈也是超超超超愛雙鐵先生的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1450 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、かばんを持ちますねぇ」
1642 = "「玲奈來幫你拿包吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、頼む」
1466 = "「嗯，拜託了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、行くか」
1732 = "「那我們出發吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、そうてつさん」
# 1481 = "「嗯，雙鐵先生」" 

# monologue
# JP: そしてれいなは高らかに、\n僕らの未来に――\x%l喚呼;#00ffc040;喚呼%l;#;する。
2241 = "玲奈用響亮的聲音，向著我們的未來發出\\x%l喚呼;#00ffc040;復誦%l;#;。" 

# 【れいな】
# display as 玲奈
# JP: 「しゅっぱーーつ！　しんこーーーーぉ！！」
1332 = "「出發——！前進——！！」" 
