992 = "「\\x%l9600;#00ffc040;[九六,12]帝國鐵路９６００型蒸汽機車%l;#;嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大正解です、双鉄くん！」
1515 = "「完全正確，雙鐵君！」" 

# 【双鉄】
# display as 雙鐵
