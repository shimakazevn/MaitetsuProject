[script]
# lines: 341 
# 【れいな】
# display as 玲奈
# JP: 「ほわぁあ～」
1095 = "「Ho wa a~」"
# monologue
# JP: れいながくったりくつろいでいる。\n目を半ば閉じた表情は、こたつに緩むネコの如くだ。
1729 = "Reina đang thư giãn một cách uể oải. Biểu cảm nửa nhắm mắt kia hệt như một chú mèo đang sưởi ấm trong bàn sưởi kotatsu vậy."
# 【れいな】
# display as 玲奈
# JP: 「右田のおうちは、おこたがなくてもあったかですねぇ」
1089 = "「Nhà Migita dù không có bàn sưởi kotatsu nhưng vẫn ấm áp nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1109 = "「Fufu.」"
# monologue
# JP: れいなもこたつを思ってくれた。\nそんなささやかな偶然さえ、どうしようもなくしあわせだ。
1673 = "Reina cũng nghĩ đến bàn sưởi kotatsu. Ngay cả một sự trùng hợp nhỏ nhoi như vậy, cũng khiến tôi hạnh phúc vô bờ."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。足元からお尻の下からぽかぽかだ。\nなにせ、床暖房がはいっている」
1156 = "「Ừm. Từ dưới chân đến dưới mông đều ấm áp. Dù sao thì, hệ thống sưởi sàn cũng đang được bật mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ゆかだんぼ！」
1187 = "「Sưởi sàn!」"
# monologue
# JP: 耳が大きな象さんが、れいなのお尻の下をささえる。\n何故かそんなイメージを、舌足らずの声に呼び起こされる。
1772 = "Một chú voi tai to đang nâng đỡ dưới mông Reina. Không hiểu sao hình ảnh đó lại được gợi lên bởi giọng nói ngọng nghịu kia."
# 【れいな】
# display as 玲奈
# JP: 「たたみの下にはいってるんですかぁ？」
1272 = "「Nó được lắp dưới chiếu tatami sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。畳敷き専用の床暖房を入れたとのことだ。\n僕も、帰ってきたときには驚いた」
1285 = "「Đúng vậy. Nghe nói họ đã lắp hệ thống sưởi sàn chuyên dụng cho phòng trải chiếu tatami. Lúc mới về, tôi cũng ngạc nhiên lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「じゃあ、そうてつさんが帝都にいってたときに、\nゆかだんぼをいれたんですねぇ」
1077 = "「Vậy là, trong lúc anh Soutetsu đi Đế đô, họ đã lắp sưởi sàn nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなるな」
1233 = "「Chắc là vậy.」"
# monologue
# JP: れいなの瞳がねむたげに、座卓の籠のみかんへと向く。
1713 = "Đôi mắt ngái ngủ của Reina hướng về phía rổ quýt trên bàn trà."
# 【双鉄】
# display as 雙鐵
# JP: 「なんでも、日々姫の言によるとな？」
1251 = "「Nghe nói, theo lời Hibiki thì?」"
# monologue
# JP: みかんの皮を剥きながら、あたりの様子をそっと伺う。
1613 = "Vừa bóc vỏ quýt, tôi vừa khẽ quan sát tình hình xung quanh."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の冷え性が、ひどくなったためのことらしい」
1413 = "「Có vẻ là vì chứng sợ lạnh của chị Mayami trở nên nghiêm trọng hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわわ。それはたいへんですねぇ」
1103 = "「Oa oa oa. Vậy thì vất vả lắm nhỉ~」"
# monologue
# JP: れいなのひそひそ声を聴き、\n我知らず声を潜めていたのかと気づいて、苦笑する。
1770 = "Nghe tiếng thì thầm của Reina, tôi chợt nhận ra mình cũng đã vô thức hạ giọng, bèn cười gượng."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大変なことだ。\nが、どうやら効果は絶大だったようだな」
1158 = "「Ừ, đúng là vất vả thật. Nhưng xem ra hiệu quả cũng rất tuyệt vời nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「おねーちゃんが冷え性だなんて、れいな、\nぜんぜんきづいていませんでしたぁ」
1208 = "「Chị Mayami bị sợ lạnh á, Reina, hoàn toàn không nhận ra luôn đó nha~」"
# monologue
# JP: ごくごく自然なおねえちゃん呼び。\n真闇姉の度重なる懇願が、ようやく実って来たらしい。
1737 = "Cách gọi \"chị\" vô cùng tự nhiên. Có vẻ như những lời thỉnh cầu lặp đi lặp lại của chị Mayami cuối cùng cũng đơm hoa kết trái."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに。最近はすこぶる快調そうだな。蔵の仕事は、\n夏は暑さと、冬は寒さと戦い続ける厳しいものだが」
1297 = "「Đúng vậy. Dạo này trông chị ấy cực kỳ khỏe mạnh. Công việc ở xưởng rượu là một cuộc chiến cam go với cái nóng mùa hè và cái lạnh mùa đông cơ mà.」"
# 【れいな】
# display as 玲奈
# JP: 「そうなんですねぇ。\nそれなられいなもお手伝いしたいですぅ」
1269 = "「Vậy sao ạ~. Nếu thế thì Reina cũng muốn giúp một tay nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい。きっと真闇姉も、蔵のみんなも、\n大喜びで歓迎してくれることだろう」
1121 = "「Ừ, thế thì tốt quá. Chắc chắn chị Mayami và mọi người ở xưởng sẽ vô cùng vui mừng chào đón em.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。れいな、がんばっちゃいますねぇ」
1168 = "「Ư phu phu~. Reina sẽ cố gắng hết mình nha~」"
# monologue
# JP: 薄皮につく白い繊維を取り終える。\n差し出せば、れいなはのんびり口をあける。
1624 = "Tôi lột xong những sợi xơ trắng bám trên lớp vỏ lụa. Vừa đưa ra, Reina đã thong thả há miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、あーん、だ」
1041 = "「Nào, a~ đi.」"
# 【れいな】
# display as 玲奈
# JP: 「あーーーーん。はむっ――。………………。んふー！\n上等の軽油みたいで、じゅわってフルーティーですぅ」
1130 = "「A~~~~. Am~——. ………………. Ưm phu~! Giống như dầu diesel thượng hạng vậy, mọng nước và có mùi trái cây nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう、みかんはなにせ、フルーツだ」
1434 = "「Thì tất nhiên rồi, dù sao thì quýt cũng là trái cây mà.」"
# 【れいな】
# display as 玲奈
# JP: 「うっふふぅ。ほんとうですねぇ。\nれいなおみかん、すっかり大好きになっちゃいましたぁ」
1170 = "「Ư phu phu~. Đúng vậy nha~. Reina hoàn toàn thích mê quýt luôn rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「はじめて食べたときから、軽油のようだと、、\n目をきらきらさせていたものなぁ」
1020 = "「Ngay từ lần đầu tiên ăn, em đã làm đôi mắt sáng rực lên, và bảo nó giống như dầu diesel mà nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「だってぇ」
1085 = "「Tại vì á~」"
# monologue
# JP: 言えばれいなは、はにかんでしまう。
1725 = "Nói rồi, Reina bẽn lẽn mỉm cười."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットのおうちにいたときも、鉱山時代も、\nれいな、おみかん食べたことなかったですから」
1186 = "「Lúc ở nhà chị Paulette hay thời còn ở mỏ than, Reina chưa từng được ăn quýt bao giờ mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「意外だったが、案外そういうものなのかもなぁ」
1445 = "「Đúng là bất ngờ thật, nhưng có lẽ chuyện là vậy nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。人間さんの食べ物、れいなたち世代の\nレイルロオドは、ふつうは食べないですからねぇ」
1283 = "「Đúng rồi ạ~. Thức ăn của con người, thế hệ Railord của Reina bình thường đâu có ăn đâu nha~」"
# monologue
# JP: 言ってれいなはスキットルを出し、\n実に旨そうに喉を鳴らす。
1797 = "Nói rồi Reina lấy ra chiếc bình tông, uống một ngụm ừng ực trông vô cùng ngon lành."
# 【れいな】
# display as 玲奈
# JP: 「――ぷはあ。それにやっぱり、\nハイオクと軽油が、一番、二番においしいですし」
653 = "「——Phù a. Với lại quả nhiên, xăng chỉ số octane cao và dầu diesel vẫn là ngon nhất, nhì nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ハイオクの方が軽油より上か」
1166 = "「Hô. Xăng chỉ số octane cao ngon hơn dầu diesel sao?」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。ほーんのちょこっとの差ですけど」
1299 = "「Đúng vậy ạ~. Dù chỉ khác biệt một chút xíu xiu thôi nha~」"
# monologue
# JP: 親指と人差し指の輪が示している“ちょこっと”は、\n確認できるかできぬかも微妙なほどにわずかな隙間だ。
1709 = "Cái \"một chút xíu\" được thể hiện qua vòng ngón cái và ngón trỏ là một khe hở nhỏ xíu đến mức khó mà nhìn rõ được."
# 【れいな】
# display as 玲奈
# JP: 「ハズレのハイオクだと、上等の軽油の方がおいしいとか、\nそのくらいな感じですぅ」
1093 = "「Nếu trúng loại xăng dở, thì dầu diesel thượng hạng còn ngon hơn, cảm giác kiểu như vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、ハイオクにも軽油にも当たり外れはあるのだな」
1123 = "「Hô, xăng chỉ số octane cao hay dầu diesel cũng có loại ngon loại dở nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。軽油だったら、温暖地仕様の方が、\n寒冷地仕様よりまろやかだったりもありますしぃ」
1292 = "「Đúng vậy ạ~. Nếu là dầu diesel, loại dành cho vùng ấm áp có khi còn dịu nhẹ hơn loại dành cho vùng lạnh giá nữa cơ~」"
# monologue
# JP: ハイオクをちびちびやりながら、実に嬉しげなうんちく。\nやってることは呑んべだが、どうしようもなく愛らしい。
1684 = "Vừa nhâm nhi xăng chỉ số octane cao, vừa thích thú thao thao bất tuyệt. Hành động thì giống hệt bợm nhậu, nhưng lại đáng yêu không chịu nổi."
# 【れいな】
# display as 玲奈
# JP: 「ハイオクだったら、れいなは[しょうわかいせきゆ,4]正和貝石油の、\nえっくすぱわーが一番口にあいますねぇ」
1397 = "「Nếu là xăng chỉ số octane cao, Reina thấy X-Power của Dầu mỏ Showakai là hợp khẩu vị nhất nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。今飲んでいるのも確かその銘柄だったよな」
1153 = "「À. Loại em đang uống hình như cũng là nhãn hiệu đó nhỉ.」"
# monologue
# JP: 問えばれいなはにっこり笑う。
1687 = "Khi tôi hỏi, Reina nhoẻn miệng cười."
# 【れいな】
# display as 玲奈
# JP: 「れいな、ガソリン気動車レイルロオドに戻って\nよかったなぁって、これが飲めるだけでも思いまぁす」
1063 = "「Reina thấy thật tốt khi được quay lại làm Railord của toa xe tự hành chạy xăng, chỉ cần được uống thứ này thôi cũng đủ thấy vậy rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nならば、あの改修はいいこと尽くめとなったわけだな」
1268 = "「Vậy sao. Nếu thế thì đợt cải tạo đó toàn mang lại điều tốt đẹp nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。れいなの眠たいのもなくなりましたし、\nキハ07sの足回り不安も解消できましたし」
1290 = "「Đúng vậy ạ~. Cơn buồn ngủ của Reina cũng biến mất rồi, và nỗi lo về hệ thống chuyển động của KiHa 07S cũng được giải quyết nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「改修自体も、驚くほどスムーズに終わったものな」
1043 = "「Bản thân quá trình cải tạo cũng hoàn thành suôn sẻ đến bất ngờ mà.」"
# monologue
# JP: にっこり、れいなが大きく頷く。
1689 = "Mỉm cười, Reina gật đầu thật mạnh."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットもすっごく喜んでくれてますよぉ。\n『双鉄くんが背中を押してくれたおかげ』って」
1323 = "「Chị Paulette cũng vui lắm đó nha~. Bảo là 『Nhờ có anh Soutetsu đã thúc đẩy』 đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がというより、僕らがだろうが――そうか。\n僕らの結婚が、きっかけの一つになったのだなぁ」
975 = "「Nói là tôi thì đúng hơn là chúng ta chứ——vậy sao. Việc chúng ta kết hôn đã trở thành một trong những lý do nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「みたいですぅ」
1199 = "「Có vẻ vậy ạ~」"
# monologue
# JP: にへーーーっと、れいなが笑みとろける。\n煮込みすぎてしまった雑煮の餅より、さらに崩れる。
1719 = "Ni he~~~, nụ cười của Reina tan chảy. Còn nhũn hơn cả miếng bánh mochi trong canh zouni nấu quá lửa."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんがだんなさまで、ポーレットがマスターで。\nれいな、２倍も３倍もしあわせですねぇ」
1446 = "「Anh Soutetsu là chồng, còn chị Paulette là Master. Reina hạnh phúc gấp 2, gấp 3 lần luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう思ってもらえるなら光栄だ」
1022 = "「Được em nghĩ vậy là vinh hạnh của anh.」"
# monologue
# JP: れいなの髪を優しく撫でる。\n手にふんわりとくっついてくる、猫っ毛を。
1642 = "Tôi nhẹ nhàng vuốt ve mái tóc của Reina. Mái tóc tơ mềm mại bám nhẹ vào tay."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはどうですかぁ？」
1012 = "「Còn anh Soutetsu thì sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。というか……一緒にいるとしあわせすぎて、\n逆に寂しくなることさえある」
1235 = "「Anh cũng vậy. Nói đúng hơn là…… ở bên nhau hạnh phúc quá, ngược lại đôi khi còn cảm thấy cô đơn nữa cơ.」"
# 【れいな】
# display as 玲奈
# JP: 「え」
1148 = "「Hả?」"
# monologue
# JP: 半ば軽口のつもりの言葉が、れいなの顔を曇らせてしまう。
1619 = "Lời nói nửa đùa nửa thật của tôi lại khiến khuôn mặt Reina tối sầm lại."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんがさみしくなっちゃうの、\nれいな、とってもいやですよぉ」
1337 = "「Việc anh Soutetsu cảm thấy cô đơn á~, Reina ghét lắm đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、言っても詮無きことなのだ。\n乗務のときもれいなと一緒にいたいと、そんな類の」
1117 = "「Không, có nói ra cũng vô ích thôi. Kiểu như là muốn ở cùng Reina ngay cả lúc làm nhiệm vụ trên tàu ấy mà.」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　そこですかぁ。\nえっへへー、実はですねぇ、そうてつさん」
1135 = "「A! Là chuyện đó sao ạ~. E he he~, thực ra là vầy nè~, anh Soutetsu」"
# monologue
# JP: 小さな手招きに応じれば、\nれいなはすぐに耳元に口をくっつけてくる。
1700 = "Đáp lại cái vẫy tay nhỏ xíu, Reina liền ghé sát miệng vào tai tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいなもですねぇ。おんなじきもちなんですよぉ」
1067 = "「Reina cũng vậy đó nha~. Cũng có cùng cảm giác như vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ」
1132 = "「A.」"
# monologue
# JP: ぺっとりくっつく、こどもじみた、ほっぺへのキス。\nぶわり、愛おしさが膨らみ焦げ付く。
1680 = "Một nụ hôn phớt lên má trẻ con, áp sát vào nhau. Cảm giác yêu thương bỗng chốc phình to và cháy bỏng."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな」
1335 = "「Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「けどけど、ずうっといっしょにいたいからこそ、\nいっしょにいない時間を大事にしなくちゃなんですよぉ」
1084 = "「Nhưng mà nhưng mà~, chính vì muốn ở bên nhau mãi mãi, nên mới càng phải trân trọng khoảng thời gian không ở cạnh nhau đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「！　……なるほどな」
1133 = "「! ……Ra là vậy.」"
# monologue
# JP: 加熱した脳にすっと言葉が染みていく。\nれいなは変わらずあどけない笑みを浮かべているが――
1769 = "Từng lời nói thấm đẫm vào tâm trí đang nóng bừng của tôi. Reina vẫn giữ nụ cười ngây thơ không đổi, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「深い言葉だ。確かにだ。\n凄いなれいなは。普段からそんなことを考えていたのか」
1356 = "「Một câu nói thật sâu sắc. Quả đúng là vậy. Reina giỏi thật đấy. Bình thường em vẫn hay suy nghĩ những chuyện như thế sao?」"
# 【れいな】
# display as 玲奈
# JP: 「すごいのはれいなじゃなくって、佳代子さんですよぉ」
1079 = "「Người giỏi không phải Reina đâu~, mà là cô Kayoko đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「カヨコさん？」
1039 = "「Cô Kayoko?」"
# 【れいな】
# display as 玲奈
# JP: 「佳代子さんは伝次郎さんの奥さんです。\nあ、伝次郎さんは、ポーレットの前のマスターですねぇ」
1198 = "「Cô Kayoko là vợ của bác Denjirou ạ~. A, bác Denjirou là Master trước đây của chị Paulette đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、[かたがみ,1]硬上鉱山鉄道時代の……ならば、れいなの最初の\nマスターの方、ということになるのか？」
1119 = "「À, thời còn ở Đường sắt mỏ Katakami…… Vậy ra, đó là Master đầu tiên của Reina sao?」"
# 【れいな】
# display as 玲奈
# JP: 「そうでぇす」
1279 = "「Đúng rồi ạ~」"
# monologue
# JP: ポーレットの前。御一夜鉄道移籍前。硬上鉱山時代。\n素直に気になる。れいなをもっと知りたくなる。
1594 = "Trước thời của Paulette. Trước khi chuyển đến Đường sắt Ohito. Thời còn ở mỏ than Katakami. Thực sự tôi rất tò mò. Tôi muốn biết nhiều hơn về Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「どんな方達だったのだ？　伝次郎さんと佳代子さんは」
1046 = "「Họ là những người như thế nào vậy? Bác Denjirou và cô Kayoko ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなのアルバム、見ますかぁ」
1393 = "「Anh có muốn xem album ảnh của Reina không ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、それはぜひとも見てみたいものだ」
1145 = "「Ồ, anh nhất định phải xem thử mới được.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、それじゃあ取ってきますねぇ」
1204 = "「Vâng ạ~, vậy Reina đi lấy nha~」"
# monologue
# JP: とてとてと、軽い足音が階段を登り遠ざかる。
1730 = "Lạch bạch, lạch bạch, tiếng bước chân nhẹ nhàng leo lên cầu thang rồi xa dần."
# monologue
# JP: （れいなのアルバムか……）
1830 = "（Album ảnh của Reina sao……）"
# monologue
# JP: 小さなころのれいなはさぞや、と思ってしまい、苦笑する。\nれいなはレイルロオドゆえ、外見変化のあるわけもない。
1541 = "Tôi lỡ nghĩ đến cảnh Reina lúc nhỏ chắc hẳn sẽ đáng yêu lắm, rồi lại cười gượng. Reina là Railord, làm gì có chuyện ngoại hình thay đổi cơ chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし。それでも……」
1087 = "「Nhưng mà. Dù vậy thì……」"
# monologue
# JP: 何かは変わっているだろう。僕らが初めて出会ったときと\n今――れいなは確かに、大きく変化しているのだし。
1774 = "Chắc chắn vẫn có điều gì đó thay đổi. Giữa lúc chúng tôi mới gặp nhau và bây giờ——Reina quả thực đã thay đổi rất nhiều mà."
# 【れいな】
# display as 玲奈
# JP: 「おまたせしましたぁ」
973 = "「Để anh phải chờ rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――おっ」
1149 = "「Ừm——ồ.」"
# monologue
# JP: れいなが隣にぴったりと――\nというかむしろ、身体をぶつけるようにくっついてくる。
1738 = "Reina dính chặt lấy bên cạnh tôi—— hay nói đúng hơn là áp sát cả cơ thể vào tôi."
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。\nこの方がアルバムいっしょに見やすいですからぁ」
1180 = "「E he he~. Thế này thì cùng nhau xem album sẽ dễ hơn mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。が、それをいうのであれば」
1380 = "「Đúng là vậy. Nhưng, nếu đã nói thế thì」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃあ♪」
1091 = "「Hya a♪」"
# monologue
# JP: あぐらをかいて、れいなをすっぽりそこに収めて座らせる。
1640 = "Tôi ngồi khoanh chân, đặt Reina lọt thỏm vào lòng mình."
# 【双鉄】
# display as 雙鐵
# JP: 「この方がもっと見やすかろう」
1415 = "「Thế này còn dễ xem hơn nữa nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。それに――うふふぅ。ゆかだんぼより、\nもっとぽかぽかあったかですねぇ、そうてつさんだんぼ」
977 = "「Đúng vậy ạ~. Với lại——ư phu phu~. Còn ấm áp hơn cả sưởi sàn nữa nha~, sưởi Soutetsu á~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。れいな暖房も最高にぽかぽかで――\nその上甘くていいにおいだ」
1265 = "「Phải ha. Sưởi Reina cũng cực kỳ ấm áp—— Hơn nữa lại còn có mùi thơm ngọt ngào nữa.」"
# monologue
# JP: れいなの髪にあごをのせ、そのまま柔らかな香りを楽しむ。\n鼻孔にだけ、一足早い春がくる。
1623 = "Tôi tựa cằm lên tóc Reina, cứ thế tận hưởng hương thơm dịu nhẹ. Một mùa xuân đến sớm chỉ dành riêng cho khứu giác của tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいなの匂い、油の匂いじゃないですかぁ？」
1345 = "「Mùi của Reina, không phải là mùi dầu mỡ sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……\nああ――確かに油の匂いもするが……」
963 = "「Không……\nÀ——đúng là cũng có mùi dầu mỡ, nhưng mà……」"
# monologue
# JP: ここぞとばかり、くんくん音を立てて嗅ぐ。\nはずかしいのか、れいながすこぉし身じろぎをする。
1638 = "Tôi nhân cơ hội này hít hà thành tiếng khịt khịt. Chắc vì xấu hổ, Reina hơi cựa quậy một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「シャンプーと石鹸は家のものの匂い。\n洗剤と柔軟剤も……つまりは、僕ともおなじ匂いだ」
1325 = "「Dầu gội và xà phòng là mùi đồ dùng ở nhà. Bột giặt và nước xả vải cũng vậy…… Tóm lại, mùi giống hệt anh thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ですねぇ」
1177 = "「Ư phu phu~. Đúng vậy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのに……」
1082 = "「Thế nhưng……」"
# monologue
# JP: そうした匂いのなかからふんわり、甘さが香り立ってくる。\nレイルロオドにあるものだとも思えんが、しかし――
1596 = "Từ trong những mùi hương đó, thoang thoảng tỏa ra một sự ngọt ngào. Dù khó mà tin được Railord lại có mùi hương này, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「甘いのだ。体臭という言葉をつかっていいのであれば、\nこれが、れいなの体臭だろうな」
1379 = "「Rất ngọt ngào. Nếu có thể dùng từ 'mùi cơ thể', thì đây chắc hẳn là mùi cơ thể của Reina nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、レイルロオドですから……あ」
1342 = "「Reina là Railord mà…… A.」"
# monologue
# JP: ぽん、とれいなが両手をあわせる。
1698 = "Bốp, Reina vỗ hai tay vào nhau."
# 【れいな】
# display as 玲奈
# JP: 「ながいながーい時間の間に、\nポーレットの匂いがれいなにしみついたのかもですねぇ」
1385 = "「Trong một khoảng thời gian dài thậ~t dài, có lẽ mùi của chị Paulette đã thấm vào người Reina rồi cũng nên nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1150 = "「À.」"
# monologue
# JP: 納得できる。\nが、それはポーレットひとりのものだけではなく。
1753 = "Hoàn toàn có khả năng đó. Nhưng mà, mùi hương đó không chỉ thuộc về riêng một mình Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「愛情の匂いなのだな、きっと。ポーレットはもちろん、\nれいなを大事にしてくれた、そうした人たち全員の」
1411 = "「Đó chắc chắn là mùi hương của tình yêu thương. Của Paulette, và tất nhiên là của tất cả những người đã luôn trân trọng Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　きっとそうですねぇ。\nだから、これからはどんどん……えっへへぇ」
1106 = "「Oa! Chắc chắn là vậy rồi nha~. Vì thế, từ nay trở đi sẽ ngày càng…… e he he~」"
# monologue
# JP: 膝の上、れいながぐしぐし身体をこすりつけてくる。
1682 = "Trên đùi tôi, Reina ngọ nguậy cọ xát cơ thể vào người tôi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんや、みんなのにおいが、\nれいなのにおいになっていくんですねぇ」
1014 = "「Mùi của anh Soutetsu và của mọi người, sẽ dần trở thành mùi của Reina đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ。確かにな」
1110 = "「Fufu. Chắc chắn rồi.」"
# monologue
# JP: 嬉しくなる。僕だけでなく、真闇姉、日々姫、ハチロクも、\nごくごく自然にれいなが家族と認めていると感じられ。
1600 = "Tôi cảm thấy thật vui. Không chỉ tôi, mà cả chị Mayami, Hibiki và Hachiroku, cũng đã xem Reina như một thành viên trong gia đình một cách vô cùng tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに恐らく。さっきの話にでてきた、\nれいなの昔のマスター夫妻の」
1241 = "「Vì vậy nên có lẽ. Những người mà chúng ta vừa nhắc đến, vợ chồng Master ngày xưa của Reina ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、そうでしたぁ。\nそのお話でアルバムもってきたんでしたねぇ」
1142 = "「A, đúng rồi ạ~. Đang nói chuyện đó nên Reina mới đi lấy album mà nhỉ~」"
# monologue
# JP: ゆっくり、大事に。アルバムのページがめくられる。
1691 = "Chậm rãi, nâng niu. Từng trang album được lật mở."
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。こっちが伝次郎さんで、\nおんなのひとが佳代子さんです」
1016 = "「Là vầy nè~. Bên này là bác Denjirou, còn người phụ nữ là cô Kayoko đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「白黒写真か。いい感じのセピアに焼けているな」
1308 = "「Là ảnh đen trắng sao. Màu ngả nâu sepia trông rất có hồn.」"
# monologue
# JP: 好一対という表現が、ぴたりハマるような老夫婦。\nその真ん中に、にこにこのれいなが収まっている。
1809 = "Một đôi vợ chồng già vô cùng đẹp đôi, từ \"xứng lứa vừa đôi\" rất hợp với họ. Ngồi ở giữa là một Reina đang mỉm cười rạng rỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「……おじいちゃんとおばあちゃんと孫娘。\n完全に家族写真だな。。幸福そのものの光景だ」
675 = "「……Ông bà và cô cháu gái. Hoàn toàn là một bức ảnh gia đình nhỉ. Một khung cảnh ngập tràn hạnh phúc.」"
# monologue
# JP: 背景には、いかにも正和初期の家庭の風景。\nというか……うむ。内装・調度が、随分と――
1778 = "Khung cảnh nền mang đậm nét gia đình thời kỳ đầu Showa. Hay đúng hơn là…… ừm. Đồ nội thất và cách bài trí, trông khá là——"
# 【双鉄】
# display as 雙鐵
# JP: 「ご裕福でらしたのか？\n伝次郎さんと佳代子さんのご夫妻は」
1048 = "「Họ rất khá giả sao? Vợ chồng bác Denjirou và cô Kayoko ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「それはそうですよぉ。気動車運転士になるまえは、\n伝次郎さん、鉱山技師さんだったんですからぁ」
1354 = "「Đương nhiên rồi ạ~. Trước khi trở thành người lái toa xe tự hành, bác Denjirou từng là một kỹ sư mỏ đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉱山技師」
1381 = "「Kỹ sư mỏ.」"
# monologue
# JP: いったいどのようなお仕事なのかと、\n思った瞬間、れいなが微笑む。
1617 = "Rốt cuộc đó là công việc như thế nào, ngay khoảnh khắc tôi vừa nghĩ vậy, Reina đã mỉm cười."
# 【れいな】
# display as 玲奈
# JP: 「鉱山の設計とか拡張の図面を引くのが、鉱山技師さんの\n一番のお仕事って、れいな、教えてもらいましたぁ」
984 = "「Vẽ bản thiết kế và bản đồ mở rộng mỏ than, là công việc chính của kỹ sư mỏ, Reina được dạy thế đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「拡張？　いや、そうか。鉱山とは穴をどんどん掘り進む\n――つまり、常に拡張を続けていくものなのか」
1394 = "「Mở rộng? À, ra vậy. Khai thác mỏ là việc liên tục đào sâu vào trong hang ——tức là, phải luôn không ngừng mở rộng.」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。どこをどうやって掘り進むのか、\nきちんと計算しないと、すぐに落盤しちゃいますからぁ」
1280 = "「Đúng rồi ạ~. Đào ở đâu và đào như thế nào, nếu không tính toán cẩn thận thì sẽ sập hầm ngay lập tức đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。鉱山技師とは鉱山にとって極めて大事な、\n責任の重いお仕事なのだな」
1378 = "「Ra là vậy. Kỹ sư mỏ là một công việc cực kỳ quan trọng đối với mỏ than, và mang trách nhiệm rất lớn lao nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そうでぇす」
# 1279 = "「是的」" 
# monologue
# JP: 責任には無論、報酬がともなっていたのだろう。\n納得すれば、写真が少し、色を帯びたような気になる。
1652 = "Trách nhiệm lớn lao thì tất nhiên sẽ đi kèm với thù lao xứng đáng. Khi đã hiểu ra, tôi có cảm giác bức ảnh như được điểm thêm chút màu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「この写真は、\nロールアウトからどのくらいの時期に撮ったのだ？」
1412 = "「Bức ảnh này, được chụp vào khoảng thời gian nào sau khi em xuất xưởng vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「着任一年の記念写真ですよぉ」
1414 = "「Là ảnh kỷ niệm một năm nhậm chức đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1267 = "「Hô.」"
# monologue
# JP: にしては写真の伝次郎さん。随分お年を召されている。
1670 = "Nếu vậy thì bác Denjirou trong ảnh trông khá là lớn tuổi rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「伝次郎さんは、技師を引退された後、\nご退職せずそのまま気動車運転士に？」
1050 = "「Bác Denjirou sau khi nghỉ hưu vị trí kỹ sư, không nghỉ việc luôn mà chuyển sang làm người lái toa xe tự hành sao?」"
# 【れいな】
# display as 玲奈
# JP: 「硬上に気動車をいれることが決まって、運転士を\n自社でってなったとき、立候補したってききましたぁ」
1352 = "「Reina nghe nói là khi có quyết định đưa toa xe tự hành vào Katakami, và công ty muốn tự tuyển người lái, bác ấy đã tự ứng cử đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その時点から気動車運転を学ばれたのか？」
1423 = "「Nếu vậy, bác ấy mới bắt đầu học lái toa xe tự hành từ lúc đó sao?」"
# 【れいな】
# display as 玲奈
# JP: 「らしいですよぉ。だから最初のうちは、\nれいなが先生役みたいな感じだったときもありましたぁ」
1201 = "「Hình như là vậy ạ~. Nên trong khoảng thời gian đầu, cũng có lúc Reina giống như là giáo viên vậy đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1267 = "「是嗎」" 
# 【れいな】
# display as 玲奈
# JP: 「けどけど、あっという間に頼れるマスターさんになって\nくれたんですよぉ。[おやま,1]鉱山のことぜぇんぶ知ってますから」
1006 = "「Nhưng mà nhưng mà~, bác ấy nhanh chóng trở thành một Master đáng tin cậy luôn đó ạ~. Vì bác ấy biết tất tần tật mọi thứ về khu mỏ mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1150 = "「嗯」" 
# monologue
# JP: れいなは実は、焦らず聞けば説明上手だ。とはいえど、\nお年を召しての転身で、彼程の成長であったのならば――
1568 = "Thực ra, nếu kiên nhẫn lắng nghe thì Reina giải thích rất giỏi. Dù vậy, chuyển hướng nghề nghiệp ở độ tuổi đó mà có thể trưởng thành nhanh đến thế thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「……さぞや[じあたま,1]地頭の良い方であったのだろうな」
682 = "「……Chắc hẳn bác ấy là một người vô cùng thông minh nhạy bén nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。れいなのディーゼル気動車改装のときも、\nメーカーの人にたーくさん要望出してくれましたから」
1278 = "「Đúng vậy ạ~. Lúc Reina được cải tạo thành toa xe diesel tự hành, bác ấy cũng đưa ra rấ~t nhiều yêu cầu cho người của hãng sản xuất đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1150 = "「嗯」" 
# monologue
# JP: 改装時見せてもらった図面への、ハチロク評を思い出す。\n”なんと優しさに満ちた改装なのでございましょう”と。
1626 = "Tôi nhớ lại nhận xét của Hachiroku về bản vẽ thiết kế khi cải tạo. \"Quả là một bản cải tạo tràn ngập sự dịu dàng làm sao\"."
# 【双鉄】
# display as 雙鐵
# JP: 「……だからなのだな。れいなが最初から、\nロールバックをしやすいように、改装されていたのは」
679 = "「……Ra là vì vậy. Nên ngay từ đầu Reina đã được cải tạo theo cách rất dễ dàng để khôi phục lại dữ liệu.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。きっとそうですねぇ」
1178 = "「Ư phu phu~. Chắc chắn là vậy rồi nha~」"
# monologue
# JP: 僕を見上げるれいなの瞳がアーチを描く。\n懐かしそうに、そうして少しだけさみしげに。
1695 = "Đôi mắt Reina ngước nhìn tôi cong lên như hình vòng cung. Trông đầy hoài niệm, và cũng pha chút đượm buồn."
# 【れいな】
# display as 玲奈
# JP: 「『本社の命令でなきゃこんな改装』って、\n伝次郎さんもメーカーさんも、いってくれてましたから」
1049 = "「『Nếu không phải lệnh của tổng công ty thì ai thèm làm cái kiểu cải tạo này』, bác Denjirou và người của hãng sản xuất đều đã nói vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1267 = "「是嗎」" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃあ」
1092 = "「Hya a.」"
# monologue
# JP: れいなの頭を抱き寄せる。\n僅かな寂しさも消したくて。僕の温度を伝えたくって。
1632 = "Tôi ôm đầu Reina kéo lại gần. Muốn xua tan đi chút buồn bã mỏng manh ấy. Muốn truyền hơi ấm của tôi cho em."
# 【双鉄】
# display as 雙鐵
# JP: 「伝次郎さんはたくさんを、れいなに伝え、\nそうして残してくださったのだな」
1051 = "「Bác Denjirou đã truyền đạt rất nhiều điều cho Reina, và để lại cho em những di sản quý giá nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「教えてもらったこと、とっても大事におぼえてます。\nけど、たくさんじゃないかもですねぇ」
986 = "「Những gì được dạy, Reina đều ghi nhớ rất cẩn thận. Nhưng mà, có lẽ cũng không nhiều lắm đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、それは意外だな」
983 = "「Ồ, thật bất ngờ đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「伝次郎さんは、お仕事のこと以外はなんにもでしたから。\nその他のことはぜぇんぶ、佳代子さんに教わりましたぁ」
1184 = "「Vì ngoài công việc ra, bác Denjirou chẳng biết gì khác cả. Những chuyện còn lại Reina đều được cô Kayoko dạy hết đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そういうことか」
1305 = "「Ra là vậy. Hóa ra là thế.」"
# monologue
# JP: 容易に想像できる気がする。仕事中毒な技師の旦那と、\n家庭的で、社会性に優れたその妻と。――む。
1811 = "Tôi có thể dễ dàng tưởng tượng ra được. Một người chồng kỹ sư cuồng công việc, và một người vợ đảm đang, khéo léo trong giao tiếp xã hội. ——Hửm."
# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとするとだが――\n間違っていたら失礼かもしれないが」
1238 = "「Có lẽ nào—— Nếu sai thì hơi thất lễ một chút, nhưng mà」"
# 【れいな】
# display as 玲奈
# JP: 「？」
1164 = "「Hửm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「伝次郎さん佳代子さんご夫妻の関係性は、\n僕ら夫婦の関係性と」
1047 = "「Mối quan hệ giữa vợ chồng bác Denjirou và cô Kayoko, và mối quan hệ vợ chồng của chúng ta」"
# 【れいな】
# display as 玲奈
# JP: 「あああ、似てるかもですねぇ」
1147 = "「A a a, có khi giống nhau đó nha~」"
# monologue
# JP: 膝の上、れいながぐりんと上を向く。\n短い両手を伸ばしぺたぺた、僕のほっぺたに触れてくる。
1611 = "Trên đùi tôi, Reina ngước hẳn mặt lên. Đưa hai bàn tay ngắn ngủn ra vỗ vỗ, chạm vào má tôi."
# 【れいな】
# display as 玲奈
# JP: 「伝次郎さんとそうてつさんはぜぇんぜん似てないですし、\nれいなもちょっとも、佳代子さんに似てないですけど」
1444 = "「Bác Denjirou và anh Soutetsu hoàn toà~n không giống nhau, và Reina cũng không giống cô Kayoko chút nào, nhưng mà~」"
# monologue
# JP: ぺたぺたぺた。僕のほっぺたをいじくりまわし、\nれいなはどんどん笑顔を柔らかに膨らませていく。
1697 = "Vỗ vỗ vỗ. Vừa nghịch ngợm đôi má của tôi, nụ cười của Reina càng lúc càng rạng rỡ và mềm mại hơn."
# 【れいな】
# display as 玲奈
# JP: 「……そうてつさんとれいなの夫婦が、\n伝次郎さんと佳代子さんに似ているんなら嬉しいですぅ」
677 = "「……Nếu vợ chồng anh Soutetsu và Reina giống bác Denjirou và cô Kayoko thì vui lắm đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お手本としたいものだな。\nれいながそれほど大切にしている、ご夫妻の思い出を」
1425 = "「Nếu vậy, anh muốn lấy họ làm tấm gương. Ký ức về đôi vợ chồng mà Reina vô cùng trân trọng ấy.」"
# monologue
# JP: いいことを言った――つもりの僕の目の前で、\nれいなの眉は困ったように下がってしまう
1615 = "Ngay trước mắt tôi, người vừa tự nhủ——mình đã nói một câu rất hay, lông mày Reina lại cụp xuống vẻ đầy bối rối."
# 【れいな】
# display as 玲奈
# JP: 「そうかもですけど……れいな、佳代子さんみたいには\nとってもぜんぜんまったくすこしもなれないですよぉ」
1396 = "「Có thể là vậy nhưng mà…… Reina á, không thể nào trở nên giống cô Kayoko dù chỉ một chút xíu xiu nào đâu nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1270 = "「Vậy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。佳代子さんは、ええと、ええっとぉ」
1284 = "「Vâng ạ~. Cô Kayoko thì, ừm, dạ~」"
# monologue
# JP: れいながアルバムのページをめくる。\n白黒写真の見開きに、やがてカラーが混じり始める。
1726 = "Reina lật các trang album. Giữa những trang ảnh đen trắng, dần dần bắt đầu xuất hiện ảnh màu."
# 【れいな】
# display as 玲奈
# JP: 「ああ、ありましたぁ。えっへへー、見てくださぁい」
1143 = "「A, có rồi ạ~. E he he~, anh xem nè~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いい写真だな」
1163 = "「À, một bức ảnh đẹp đấy.」"
# monologue
# JP: 郷愁を無条件で呼ぶ木の床、木の壁、小さな机。\nそこにちょこん、と、緊張顔のれいながおさまっている。
1655 = "Sàn gỗ, tường gỗ, chiếc bàn nhỏ vô điều kiện gợi lên nỗi nhớ nhà. Reina với khuôn mặt căng thẳng đang ngồi ngoan ngoãn ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「いい写真だな。とても可愛い。\n……というか、この先生は、さっきの写真の」
1244 = "「Bức ảnh đẹp thật. Rất đáng yêu. ……Khoan đã, giáo viên này, là người trong bức ảnh lúc nãy mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ですです。かよこさんはずうっと、\n硬上学園の先生をやってたんですよぉ」
1319 = "「Đúng rồi ạ~. Cô Kayoko đã luôn làm giáo viên ở Học viện Katakami đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。なるほどな。ならば体験授業など……\nにしては、他に生徒が写っていないな」
1129 = "「Hừm. Ra là vậy. Nếu thế thì là học thử chẳng hạn…… nhưng lại không có học sinh nào khác trong ảnh nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、そうてつさん」
1306 = "「Là vầy nè~, anh Soutetsu.」"
# monologue
# JP: れいなが急に声を潜める。\n首を傾け耳を近づけ、ナイショ話を受け入れる。
1715 = "Reina đột nhiên hạ giọng. Tôi nghiêng đầu ghé sát tai lại, đón nhận lời thì thầm bí mật."
# 【れいな】
# display as 玲奈
# JP: 「夜学の生徒は撮影禁止だったんですぅ。だからこれ、\n卒園の次の日に撮らせてもらった記念写真なんですよぉ」
1194 = "「Học sinh lớp bổ túc ban đêm bị cấm chụp ảnh ạ~. Nên đây là ảnh kỷ niệm được chụp vào ngày hôm sau lễ tốt nghiệp đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「卒園……夜学。\n――！？　なんとれいなは、学園を卒園しているのか？」
1350 = "「Tốt nghiệp…… bổ túc ban đêm. ——!? Gì cơ, Reina đã tốt nghiệp học viện sao?」"
# 【れいな】
# display as 玲奈
# JP: 「硬上鉱山鉄道は、終電が早かったですからねぇ」
1332 = "「Đường sắt mỏ Katakami có chuyến tàu cuối sớm lắm nha~」"
# monologue
# JP: 終電後。終業後。受講希望者を募っての、いわゆる夜学。\n教職を定年退職され、佳代子さんはその講師となられた。
1808 = "Sau chuyến tàu cuối. Sau giờ làm. Tuyển sinh những người có nguyện vọng theo học, gọi là lớp bổ túc ban đêm. Cô Kayoko sau khi nghỉ hưu đã trở thành giảng viên của lớp học đó."
# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドを受け入れてくれる夜学があったのか。\n実にすばらしいな。ハチロクなどさぞ羨ましがろう」
1213 = "「Có cả lớp bổ túc ban đêm nhận dạy Railord sao. Thật tuyệt vời. Chắc Hachiroku sẽ ghen tị lắm đây.」"
# 【れいな】
# display as 玲奈
# JP: 「かもですねぇ。れいなもそう思って、ずうっと――」
978 = "「Có lẽ vậy ạ~. Reina cũng nghĩ thế, nên đã luôn——」"
# monologue
# JP: 耳が吐息にくすぐられる。
1705 = "Hơi thở làm nhột tai tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいなずうっとヒミツにしてきて。\nおはなししたの、いま、そうてつさんにが初めてですぅ」
961 = "「Reina đã luôn giữ bí mật đó. Người Reina kể cho nghe, bây giờ, anh Soutetsu là người đầu tiên đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1134 = "「!」"
# monologue
# JP: れいなも秘密を持っていた。それを共有してくれた。\n妙にねっとりした嬉しさが、ふつふつ胸に湧いてくる。
1675 = "Reina cũng có bí mật. Và em ấy đã chia sẻ nó với tôi. Một niềm vui sướng dai dẳng kỳ lạ cứ sục sôi trong lồng ngực."
# 【れいな】
# display as 玲奈
# JP: 「当時の硬上にも、勉強したくてもできなかったー\nっていうひとたち、結構たくさんいたんです」
1351 = "「Ở Katakami thời đó, cũng có khá nhiều người muốn học mà không được học đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それで夜学か」
1243 = "「Ra là vậy, nên mới có lớp bổ túc ban đêm sao.」"
# monologue
# JP: そこまでは珍しい話でもないだろう。が――
1810 = "Đến mức đó thì cũng không phải chuyện hiếm. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドも、最初から受け入れされていたのか？」
1442 = "「Cả Railord cũng được tiếp nhận ngay từ đầu sao?」"
# 【れいな】
# display as 玲奈
# JP: 「いいええ。れいなが着任したときには普通の学園で、\n放課後には閉まっちゃってましたぁ」
969 = "「Không đâu ạ~. Lúc Reina mới đến nhậm chức thì đó chỉ là một học viện bình thường, sau giờ học là đóng cửa luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「夜学自体もなかったのか」
1417 = "「Bản thân lớp bổ túc ban đêm cũng chưa có sao.」"
# 【れいな】
# display as 玲奈
# JP: 「夜学のことも、レイルロオドのことも、佳代子さんが\n伝次郎さんを通じて、社長にかけあってくれたんです」
1403 = "「Chuyện lớp bổ túc ban đêm, cả chuyện Railord nữa, cô Kayoko đã thông qua bác Denjirou để đàm phán với giám đốc đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、佳代子さんが始められたことなのか。\nというか、社長と？　自治体や首長とではなく？」
982 = "「Gì cơ, là do cô Kayoko khởi xướng sao. Khoan đã, với giám đốc ư? Không phải với chính quyền địa phương hay người đứng đầu sao?」"
# 【れいな】
# display as 玲奈
# JP: 「町役場よりも町長さんよりも、会社と社長が\nずうっと強い。硬上は、そういうところでしたから」
1064 = "「Công ty và giám đốc có quyền lực mạnh hơn nhiều so với ủy ban thị trấn hay thị trưởng. Katakami là một nơi như vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1267 = "「是嗎」" 
# monologue
# JP: ……義父に聞かされたことがある。\n労働者が学をつけることを、かつて経営者は嫌っていたと。
649 = "……Tôi từng nghe cha nuôi kể lại. Rằng những người quản lý ngày xưa rất ghét việc công nhân được học hành."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――\nなかなかに大変なご交渉となったのではないか？」
1436 = "「Nếu vậy—— Chắc hẳn cuộc đàm phán đó đã diễn ra rất khó khăn nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「時間はかかってましたねぇ。けど、佳代子さんは\nいっつもにこにこ、いろんな人の話を聞いて」
1302 = "「Cũng tốn khá nhiều thời gian nha~. Nhưng mà, cô Kayoko lúc nào cũng tươi cười, lắng nghe ý kiến của rất nhiều người」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1150 = "「嗯」" 
# monologue
# JP: 説得ではなく、話を聞く。\n不満を全部聞いてくれ、ただただそっと寄り添ってくれる。
1545 = "Không phải thuyết phục, mà là lắng nghe. Nghe hết mọi lời phàn nàn, chỉ đơn thuần nhẹ nhàng đồng cảm."
# 【れいな】
# display as 玲奈
# JP: 「『夜学だなんてとんでもない』って怒られたって。\n『悪いところを教えてください』って、おはなしきいて」
1353 = "「Dù bị mắng là 『Lớp bổ túc ban đêm đúng là vớ vẩn』. Cô ấy vẫn lắng nghe và nói 『Xin hãy chỉ ra những điểm chưa tốt đi ạ』」"
# monologue
# JP: 佳代子さんのやり方を、れいなはそのまま受け継いでいる。\n評価も批判も指導もなにも、なにも押し付けぬ傾聴を。
1722 = "Reina đã kế thừa trọn vẹn cách làm của cô Kayoko. Một sự lắng nghe không hề áp đặt bất kỳ đánh giá, chỉ trích hay chỉ đạo nào."
# 【れいな】
# display as 玲奈
# JP: 「佳代子さんがずうっとそうしてたらなんだかだんだん、\n『夜学があったらいいな』って、町や会社の人達が」
1037 = "「Cô Kayoko cứ làm như vậy mãi, rồi dần dần, mọi người trong thị trấn và công ty bắt đầu nghĩ 『Giá mà có lớp bổ túc ban đêm thì tốt biết mấy』」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 1267 = "「是嗎」" 
# monologue
# JP: 稼働初期から[まね,1]真似び覚えたことゆえなのか、\nあるいはれいなの天性に、その方法がマッチしたのか。
1543 = "Không biết là do học hỏi bắt chước từ những ngày đầu hoạt động, hay là phương pháp đó vốn dĩ đã phù hợp với bản tính thiên bẩm của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「……さまざまな面で、れいなにとって、\n素晴らしい先生だったようだな、佳代子さんは」
672 = "「……Về nhiều mặt, đối với Reina, cô Kayoko quả là một người giáo viên tuyệt vời nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ」
# 1279 = "「是的」" 
# monologue
# JP: しんみりと、ふんわりと。\nれいなの丸くかわいい声に、普段にはない湿度が宿る。
1732 = "Thâm trầm và dịu êm. Giọng nói tròn trịa đáng yêu của Reina mang một độ ẩm ướt khác hẳn ngày thường."
# 【れいな】
# display as 玲奈
# JP: 「少等部のお勉強だけじゃなくって、おうちのことも、\n人間さんとのつきあいかたも、ネコちゃんのことも」
1210 = "「Không chỉ việc học ở trường tiểu học, mà cả việc nhà, cách cư xử với con người, hay cả chuyện về những bé mèo nữa ạ~」"
# monologue
# JP: 短い指を幸せそうに、れいなはゆっくり折っていく。
1693 = "Reina chầm chậm gập từng ngón tay ngắn ngủn lại một cách hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「鉱山のことも、ゴミの出し方も、映画館のマナーも、\n赤ちゃんのあやし方も、綺麗に押し花する方法も――あ」
1382 = "「Cả chuyện về mỏ than, cách đổ rác, phép lịch sự trong rạp chiếu phim, cách dỗ em bé, cả cách ép hoa sao cho đẹp nữa——a」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1164 = "「嗯？」" 
# monologue
# JP: れいなの指がぴたりととまる。小さく震える。\n僕を見上げる瞳まで、不安げに揺れてしまっている。
1677 = "Ngón tay Reina chợt khựng lại. Hơi run rẩy. Ngay cả đôi mắt ngước nhìn tôi cũng dao động đầy vẻ bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「いったいどうした。なにゆえ突然」
1018 = "「Rốt cuộc em bị sao vậy. Sao đột nhiên lại thế.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな――。れいな。思い出しましたぁ。\nれいなには関係ないって思って、忘れちゃってて」
1333 = "「Reina——. Reina. Nhớ ra rồi ạ~. Cứ nghĩ là không liên quan đến mình, nên Reina đã quên mất nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「忘れていた、とは」
1227 = "「Quên mất, chuyện gì cơ?」"
# 【れいな】
# display as 玲奈
# JP: 「佳代子さん、いってたんです。お嫁さんになる女の子、\nみんなにぜったい、いってたんです――あの、えと」
1038 = "「Cô Kayoko, đã từng nói ạ~. Với những cô gái sắp lấy chồng, chắc chắn cô ấy đều nói với tất cả mọi người——dạ, ừm thì」"
# monologue
# JP: れいなの髪をそうっと撫ぜる。\n目を閉じ、開き。れいなは言葉の続きを吐き出す。
1641 = "Tôi khẽ vuốt ve mái tóc của Reina. Nhắm mắt lại, rồi mở ra. Reina thốt ra những lời tiếp theo."
# 【れいな】
# display as 玲奈
# JP: 「『嫁入り前に花嫁修業。きっちりつけにゃあいけんね』\nって！」
1069 = "「『Trước khi lấy chồng phải học khóa tu dưỡng tân nương. Phải rèn giũa cho thật đàng hoàng mới được』 Cô ấy bảo thế đó ạ~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修行――」
1256 = "「Tu dưỡng tân nương——」"
# monologue
# JP: “そんなことか”と浮かんだ想いを押しつぶす。\nれいなにとっては大事なことだと感じるゆえに。
1780 = "Tôi đè nén ý nghĩ \"Tưởng chuyện gì\" vừa lóe lên trong đầu. Bởi tôi cảm nhận được rằng đối với Reina, đây là một chuyện quan trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。古風といえば古風な言葉と感じるが」
1161 = "「Hừm. Nếu nói là cổ hủ thì nghe cũng có vẻ cổ hủ thật.」"
# 【れいな】
# display as 玲奈
# JP: 「お嫁さんになるおんなのこたちもいってましたぁ！\n『古臭い』とか『今はそんな時代じゃない』とか」
1421 = "「Mấy chị sắp lấy chồng cũng nói y chang vậy đó ạ~! Nào là 『Cổ hủ quá』 hay 『Bây giờ đâu còn là thời đại đó nữa』」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1450 = "「!」"
# monologue
# JP: ドキリとする。\n内心を、そのまま代弁されてしまって。
1819 = "Tôi giật mình. Vì suy nghĩ trong lòng đã bị nói trúng phóc."
# 【れいな】
# display as 玲奈
# JP: 「けどけど、修行しないと、花嫁になるこだけじゃなく、\n旦那さんになる人も不幸になるって、佳代子さんが」
1004 = "「Nhưng mà nhưng mà~, cô Kayoko bảo là, nếu không tu dưỡng thì không chỉ cô dâu, mà cả người làm chồng cũng sẽ trở nên bất hạnh đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや。僕はしあわせすぎるほどにしあわせだが」
965 = "「Đâu có đâu có. Anh đang hạnh phúc đến mức quá đỗi hạnh phúc luôn đây này.」"
# 【れいな】
# display as 玲奈
# JP: 「みいんな最初はそうなんですよぉ。\nしんこんさんのうちは、しあわせでいっぱいなんです」
1196 = "「Mọi người lúc đầu ai cũng vậy hết đó nha~. Lúc mới cưới thì lúc nào cũng ngập tràn hạnh phúc mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
656 = "「……」"
# monologue
# JP: 鉱山町で数多の暮らしを目にし続けてきたれいなの瞳。\nその柔らかなひかりの奥の深さを僕は、知っている。
1711 = "Đôi mắt của Reina đã chứng kiến biết bao mảnh đời ở thị trấn mỏ than. Tôi thấu hiểu được chiều sâu ẩn sau ánh sáng dịu dàng ấy."
# 【れいな】
# display as 玲奈
# JP: 「けど、本当だったんです。佳代子さんのいってること。\nちゃんと花嫁修業したお嫁さんちは夫婦円満が多くって」
1010 = "「Nhưng mà, những gì cô Kayoko nói là sự thật đó ạ~. Những cô dâu được tu dưỡng đàng hoàng thường có cuộc sống vợ chồng rất viên mãn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「……きちんとしなかった場合の夫婦は」
1008 = "「……Vậy những cặp vợ chồng không tu dưỡng đàng hoàng thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「おわかれしちゃうことがおおかったんです。1年とか、\n3年とか、結婚期間の長い短いはありましたけど」
1224 = "「Đa số là chia tay nhau đó ạ~. Có thể là 1 năm, hay 3 năm, thời gian kết hôn dài ngắn khác nhau nhưng mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「む、う」
1127 = "「Hừ, m.」"
# monologue
# JP: そういわれると気にかかってくる。\n『花嫁修業』で何を学ぶかということよりも――
1771 = "Bị nói vậy làm tôi cũng thấy bận tâm. Hơn cả việc sẽ học những gì trong \"khóa tu dưỡng tân nương\"——"
# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修業をきちんと修める。修めることを夫が支える。\nそこがおそらく、とても大切なことなのだろうな」
1255 = "「Hoàn thành tốt khóa tu dưỡng tân nương. Người chồng hỗ trợ vợ hoàn thành việc đó. Đó có lẽ mới là điều quan trọng nhất nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「佳代子さんもそういってました！\n真剣に準備をすることは、真剣に向き合うことだ、って」
1034 = "「Cô Kayoko cũng nói vậy đó ạ~! Chuẩn bị một cách nghiêm túc, chính là đối mặt với nhau một cách nghiêm túc, cô ấy bảo thế nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういわれれば、納得だ」
685 = "「……Nghe em nói vậy, anh hiểu rồi.」"
# monologue
# JP: れいなとの婚姻にあたり、結納は必ず行えと、\n真闇姉も義父も義母も、元忠さんまでもが忠言してくれた。
1747 = "Khi kết hôn với Reina, chị Mayami, cha nuôi, mẹ nuôi, và cả chú Mototada đều khuyên răn tôi rằng nhất định phải tổ chức lễ đính hôn."
# 【双鉄】
# display as 雙鐵
# JP: 「結納も、やってみれば実に佳きことであったしなぁ」
1045 = "「Lễ đính hôn, làm thử rồi mới thấy quả thực là một điều rất tốt đẹp mà nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。そうてつさんと一緒にいろんな準備をするの、\nれいな、とーっても楽しかったですぅ」
1289 = "「Đúng vậy ạ~. Cùng anh Soutetsu chuẩn bị đủ thứ chuyện, Reina thấy rấ~t là vui luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばきっと、花嫁修業もおなじ、\n二人でともに乗り越えていく価値のあるものなのだろう」
1435 = "「Nếu vậy chắc chắn, khóa tu dưỡng tân nương cũng thế, đó là điều có giá trị để hai ta cùng nhau vượt qua nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ」
1101 = "「Phu a.」"
# monologue
# JP: れいなの顔がほっと和らぐ。\nくっつきあってる部分がほんのりあたたかくなる。
1717 = "Gương mặt Reina dịu lại đầy nhẹ nhõm. Phần cơ thể chạm vào nhau cũng trở nên ấm áp hơn đôi chút."
# 【れいな】
# display as 玲奈
# JP: 「れいなもきっと、そうなんだろうなあって思います」
1338 = "「Reina cũng nghĩ chắc chắn là như vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、やろう。花嫁になってからでの花嫁修行でも、\nまったく遅くはないはずだ」
1428 = "「Vậy thì làm thôi. Dù là khóa tu dưỡng tân nương sau khi đã trở thành cô dâu, nhưng chắc chắn là không hề muộn màng chút nào đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「わ、いいんですかぁ！\nいいなられいな、花嫁修行したいですぅ！」
1108 = "「Oa, được thật sao ạ~! Nếu được thì Reina muốn học khóa tu dưỡng tân nương nha~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいも悪いも、こちらからお願いしたいくらいだ。\nいや、違うな。僕かられいなにお願いさせてくれ」
1318 = "「Chẳng có gì là không được cả, anh còn muốn nhờ em nữa là đằng khác. À không, sai rồi. Hãy để anh được yêu cầu Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「！」
# 1450 = "「！」" 
# monologue
# JP: 膝にのってるれいなをくるんと回転させる。\n真正面から、じっとれいなの瞳を見つめる。
1634 = "Tôi xoay người Reina đang ngồi trên đùi mình lại. Từ chính diện, tôi nhìn thẳng vào đôi mắt em."
# 【双鉄】
# display as 雙鐵
# JP: 「僕ら夫婦のこれからのため、どうか、花嫁修業を\n修めてほしい。無論、僕もれいなを支えるゆえ」
1328 = "「Vì tương lai của vợ chồng chúng ta, xin em hãy hoàn thành khóa tu dưỡng tân nương. Tất nhiên, anh cũng sẽ hỗ trợ Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「わあああ！」
1104 = "「Oa a a a!」"
# monologue
# JP: ぱっとれいなに花が咲く。
1721 = "Khuôn mặt Reina bừng sáng như hoa nở."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんといっしょの花嫁修業！\nれいな、とーってもうれしいですよぉ」
1100 = "「Khóa tu dưỡng tân nương cùng với anh Soutetsu! Reina vui lắ~m luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、よかった」
1426 = "「Vậy thì tốt rồi.」"
# monologue
# JP: 支える、は間接的にのつもりだったが、\nれいながそうと臨むのならば、むろん共に修行しよう。
1656 = "Tôi chỉ định hỗ trợ gián tiếp thôi, nhưng nếu Reina đã mong muốn như vậy, thì tất nhiên là chúng tôi sẽ cùng nhau tu dưỡng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなと一緒なら僕も嬉しい。\nで、具体的には何をするんだ？　花嫁修業とは」
1237 = "「Được ở cùng Reina anh cũng rất vui. Vậy, cụ thể thì sẽ làm những gì? Khóa tu dưỡng tân nương ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ちゃあんと覚えてますよぉ。えっとぉ、\nお茶、お花、掃除、洗濯、料理、お裁縫に着付けでぇす」
1340 = "「Reina nhớ rõ lắ~m nha~. Dạ ừm~, trà đạo, cắm hoa, dọn dẹp, giặt giũ, nấu ăn, khâu vá và cách mặc kimono ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほほう、かなりの多岐に渡るな。\nが、れいななら、掃除洗濯あたりはすでに」
1182 = "「Hô hô, khá là đa dạng đấy. Nhưng nếu là Reina thì, những việc như dọn dẹp, giặt giũ chắc hẳn đã」"
# 【れいな】
# display as 玲奈
# JP: 「あ」
# 1132 = "「啊」" 
# monologue
# JP: ちいさな両手がぱたぱた振られる。
1702 = "Đôi bàn tay nhỏ bé xua xua liên tục."
# 【れいな】
# display as 玲奈
# JP: 「『自分ではできる』って思ってても、先生について\n基礎から習い直すのが大事なんだそうですよぉ」
1073 = "「Dù có nghĩ là 『Tự mình làm được』, nhưng việc theo học giáo viên và học lại từ những điều cơ bản cũng rất quan trọng đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。我流ではいかんということか。\nとなれば、先生選びが極めて重要となってくるな」
1260 = "「Ra là vậy. Tức là không được làm theo ý mình. Nếu vậy thì việc chọn giáo viên sẽ trở nên cực kỳ quan trọng nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「どうやって探したらいいですかねぇ」
1232 = "「Nên tìm như thế nào thì tốt đây ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……真闇姉のネットワークに頼るのが一番よかろうな。\nつまり、口コミで紹介してもらうのだ」
1126 = "「Ừm…… nhờ vào mạng lưới quan hệ của chị Mayami là tốt nhất. Tức là nhờ giới thiệu qua truyền miệng ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\nおねえちゃんのネットワークなら一番安心ですねぇ」
1174 = "「Ư phu phu~. Nếu là mạng lưới của chị Mayami thì an tâm nhất rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。正式な免状を所有し、かつできるだけご近所の方。\nこの方針であたってみてもらうかたちでどうだろうか」
1274 = "「Đúng vậy. Người có chứng chỉ chính thức và ở càng gần càng tốt. Nhờ chị ấy tìm thử theo phương hướng này thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「それだとれいな助かりまぁす。\n花嫁修行の順番とかはどうしますかぁ？」
1416 = "「Vậy thì giúp ích cho Reina lắm nha~. Còn thứ tự tu dưỡng tân nương thì sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「先生が見つかるものから順次で良いのではなかろうか。\n花嫁修業に十分とお墨付きをもらったら卒業し」
1061 = "「Cứ tìm được giáo viên nào thì học theo thứ tự đó là được mà nhỉ. Khi nào được chứng nhận là đã đủ tiêu chuẩn tu dưỡng tân nương thì tốt nghiệp,」"
# 【れいな】
# display as 玲奈
# JP: 「次の先生に、次のことをおしえてもらう感じですねぇ。\nれいな不器用だから、いっこずつ習うのうれしいですぅ」
1330 = "「Rồi lại nhờ giáo viên tiếp theo dạy môn tiếp theo nhỉ~. Reina vụng về lắm, nên được học từng thứ một là vui lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではその方針で頼んでみよう。\n他に、れいなが気になるところは？」
1433 = "「Vậy thì cứ nhờ theo hướng đó nhé. Reina còn băn khoăn chuyện gì nữa không?」"
# 【れいな】
# display as 玲奈
# JP: 「ん……」
1124 = "「Ưm……」"
# monologue
# JP: れいなが少し口ごもる。\nゆえ頭を撫で、『なんでも聞く』と無言で伝える。
1707 = "Reina hơi ngập ngừng. Tôi bèn xoa đầu em ấy, thầm nhắn nhủ rằng \"Anh sẽ nghe bất cứ chuyện gì\"."
# 【れいな】
# display as 玲奈
# JP: 「……れいな、レイルロオドですから、『着付け』って、\nお勉強しても使う機会がないかなぁって思うんですけど」
680 = "「……Reina là Railord, nên dù có học 'cách mặc kimono', Reina nghĩ chắc cũng chẳng có cơ hội dùng đến đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、着付けはとても大事だ。\nまず第一に、僕はれいなの晴れ着姿をいくらでも見たい」
970 = "「Không, cách mặc kimono rất quan trọng đấy. Điều đầu tiên, anh rất muốn được ngắm Reina mặc kimono thật nhiều.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。そうなんですねぇ」
1176 = "「E he he~. Ra là vậy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それに『着付け』で学び得るのは、おそらく\n単なる『着物の着方』にはとどまらなかろう」
1160 = "「Ừm. Hơn nữa, những gì học được từ 'cách mặc kimono', có lẽ sẽ không chỉ dừng lại ở 'cách mặc một bộ kimono' đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「あ！\nれいな、なんとなくわかったような気がしますぅ」
1139 = "「A!\nReina có cảm giác như hơi hiểu ra rồi đó nha~」"
# monologue
# JP: いってれいなは、れいなにしてはキビキビ手指を動かして、\n襟元、袖口、リボンと順に整えていく。
1796 = "Nói rồi Reina cử động ngón tay nhanh nhẹn hơn hẳn bình thường, lần lượt chỉnh lại cổ áo, cổ tay áo và nơ."
# 【れいな】
# display as 玲奈
# JP: 「着物をきちんと着られるようになったら、制服とかの\nきこなしも、もっと綺麗にできるようになるかもですね」
1206 = "「Nếu có thể mặc kimono đàng hoàng, thì cách ăn mặc những bộ đồ như đồng phục, có khi cũng sẽ đẹp hơn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そうしてそれは着付けのみにとどまらず、\nおそらくは花嫁修業全体に繋がっていくことでもあろう」
1295 = "「Đúng vậy. Và điều đó không chỉ giới hạn ở cách mặc kimono, mà có lẽ còn liên kết với toàn bộ khóa tu dưỡng tân nương nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「！　れいな思い出しましたぁ。佳代子さんも\n『選んでやったら修行にならない』って」
1137 = "「! Reina nhớ ra rồi nha~. Cô Kayoko cũng bảo 『Nếu cứ kén cá chọn canh thì đâu còn gọi là tu dưỡng nữa』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕らもそれに習おう」
1432 = "「Vậy thì chúng ta cũng noi theo điều đó đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいなわかりましたぁ」
1202 = "「Vâng ạ~. Reina hiểu rồi nha~」"
# monologue
# JP: うなずくれいなは幸せそうだ。
1686 = "Reina gật đầu, trông vô cùng hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「れいなが忘れちゃってたこと思い出させてくれるなんて。\nさすがはそうてつさんですねぇ」
1023 = "「Giúp Reina nhớ lại những chuyện đã quên mất. Quả nhiên là anh Soutetsu nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕はれいなが伝えてくれていることを、\n整頓し、自分なりに解釈してみただけだ。ゆえ――」
966 = "「Không, anh chỉ sắp xếp lại những gì Reina kể, rồi diễn giải theo cách của riêng mình thôi. Vì vậy——」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃあ」
# 1092 = "「呀」" 
# monologue
# JP: 低い鼻先をちょこんとつつく。\nびくりと離れた鼻先が、自分から指に擦りつき甘える。
1628 = "Tôi khẽ chọc vào chiếc mũi thấp của em ấy. Chiếc mũi giật mình lùi lại, rồi tự cọ vào ngón tay tôi làm nũng."
# 【双鉄】
# display as 雙鐵
# JP: 「さすがなのはれいなであり、\nれいなに余さず教え伝えてくれていた、佳代子さんだ」
1080 = "「Giỏi giang là Reina, và cả cô Kayoko, người đã truyền đạt lại cho Reina không sót điều gì.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇー。それならとーっても嬉しいですぅ」
1172 = "「E he he~. Nếu vậy thì vui lắ~m luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
# 1109 = "「哈哈」" 
# monologue
# JP: 笑顔と笑顔でむかいあう。\nそれだけのことで、どこまでだって幸せになる。
1759 = "Hai nụ cười đối diện nhau. Chỉ chừng đó thôi, cũng đủ khiến tôi hạnh phúc vô bờ bến."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな」
# 1335 = "「玲奈」" 
# 【れいな】
# display as 玲奈
# JP: 「はぁい。そうてつさぁん」
1040 = "「Vâng ạ~. Anh Soutetsu ơi~」"
# monologue
# JP: 目を閉じて、小鳥のようにれいなが唇を差し出してくる。\nそんなつもりはなかったのだが、こうも可愛くおねだり
1734 = "Reina nhắm mắt lại, chu môi ra như một chú chim non. Tôi vốn không định làm vậy, nhưng bị vòi vĩnh đáng yêu thế này thì"
# 【真闇】
# display as 真闇
# JP: 「あー、今日もよーーーーお働いた」
1114 = "「A~, hôm nay cũng làm việc chăm chỉ~ quá đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1134 = "「啊！」" 
# 【れいな】
# display as 玲奈
# JP: 「！？」
1453 = "「!?」"
# monologue
# JP: 膝の上かられいなをおろして僕のとなりに座らせる。
1630 = "Tôi bế Reina từ trên đùi xuống và đặt ngồi cạnh mình."
# 【れいな】
# display as 玲奈
# JP: 「わあ」
# 1101 = "「哇」" 
# 【真闇】
# display as 真闇
# JP: 「ふあぁーあ。疲れた疲れた」
1097 = "「Phu a~ a. Mệt quá mệt quá.」"
# monologue
# JP: ふすまの向こうで、真闇姉は大きく伸びをしている。\nいや、そうか――これは待ってくれているのか。
1646 = "Ở phía bên kia tấm cửa lùa, chị Mayami đang vươn vai thật lớn. À, ra vậy——chị ấy đang đợi chúng tôi sao."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、お疲れ様」
1363 = "「Chị Mayami, vất vả cho chị rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「おつかれさまでぇす」
1402 = "「Chị vất vả rồi nha~」"
# 【真闇】
# display as 真闇
# JP: 「あら。そーちゃんれーちゃん、おつかれさま」
1113 = "「Ara. Sou-chan, Rei-chan, hai đứa vất vả rồi.」"
# monologue
# JP: ゆっくりゆっくりふすまを開き、\n真闇姉は、僕らの向かいに腰を下ろす。
1749 = "Chầm chậm, chầm chậm mở cửa lùa ra, chị Mayami ngồi xuống đối diện chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「よかねぇ。ふたりでおみかん食べとったと？」
1387 = "「Tốt quá nhỉ. Hai đứa vừa ăn quýt cùng nhau à?」"
# monologue
# JP: 頷くて、ごくごくさりげなく目礼をする。
1645 = "Tôi gật đầu, và chào bằng ánh mắt một cách vô cùng tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。甘すぎて、\n場をわきまえずに食べすぎてしまうところであった」
1155 = "「Vâng. Ngọt quá, nên suýt chút nữa em đã ăn quá nhiều mà không biết giữ ý tứ.」"
# 【真闇】
# display as 真闇
# JP: 「そ？」
# 1270 = "「是嗎？」" 
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。そうてつさんが剥いてくれたんですよぉ。\nれいなもおいしくいただきましたぁ」
1300 = "「Vâng ạ~. Anh Soutetsu đã bóc cho đó nha~. Reina cũng ăn ngon miệng lắm ạ~」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ。うふふっ」
1111 = "「Trời đất. Ư phu phu.」"
# monologue
# JP: れいなのあまりの無邪気さに、真闇姉がころころ笑う。\n幸せであるが、ひやひやもする。
1743 = "Trước sự ngây thơ quá đỗi của Reina, chị Mayami cười khanh khách. Hạnh phúc thì có hạnh phúc, nhưng cũng toát mồ hôi lạnh."
# monologue
# JP: （いかんな。真闇姉ゆえ、いまは助けてもらえたが……）
1823 = "（Không ổn rồi. Lần này là nhờ chị Mayami nên mới thoát được, nhưng mà……）"
# monologue
# JP: こういう空気をまるきり察せぬであろうハチロクや、\n集中モードの日々姫だったら、恐らく事故になっていた。
1826 = "Nếu là Hachiroku hoàn toàn không biết đọc bầu không khí, hay Hibiki đang trong chế độ tập trung cao độ, thì e là đã thành tai nạn mất rồi."
# monologue
# JP: （僕もれいなも、まだまだ修行が足りんと――\nいや、そうだった）
1829 = "（Cả tôi và Reina đều vẫn cần tu dưỡng nhiều lắm—— À, đúng rồi.）"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉」
1362 = "「Chị Mayami.」"
# 【れいな】
# display as 玲奈
# JP: 「あ」
# 1132 = "「啊」" 
# monologue
# JP: 僕が背筋を正した瞬間、れいなも僕に倣ってくれる。\n打てば響いたそのことが、嬉しいゆえにより引き締める。
1635 = "Khoảnh khắc tôi ngồi thẳng lưng, Reina cũng làm theo tôi. Sự ăn ý nhạy bén ấy khiến tôi vui mừng, nên tôi càng thêm nghiêm túc."
# 【真闇】
# display as 真闇
# JP: 「なんねぇ、そーちゃん。れーちゃんまで。\n急におっかない顔」
1228 = "「Sao thế, Sou-chan. Cả Rei-chan nữa. Tự dưng lại làm bộ mặt đáng sợ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に、たってのお願いがあるんだ」
1312 = "「Em có một việc nhất định phải nhờ chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「お願い？」
1247 = "「Nhờ chị?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいな、素敵なお嫁さんになりたくて。\nそうてつさんともっと素敵な夫婦になりたくて。だから」
1276 = "「Vâng ạ~. Reina muốn trở thành một cô dâu tuyệt vời. Muốn trở thành một đôi vợ chồng tuyệt vời hơn nữa với anh Soutetsu. Cho nên」"
# monologue
# JP: れいなが深々頭を下げる。今度は僕がれいなに倣う。\nここはれいなに、全てを任せるべきときだ。
1704 = "Reina cúi đầu thật sâu. Lần này đến lượt tôi làm theo em ấy. Lúc này tôi nên giao phó mọi chuyện cho Reina."
# 【れいな】
# display as 玲奈
# JP: 「れいなに。れいなとそうてつさんに。\n花嫁修業を、つけてくださぁい」
1398 = "「Xin chị hãy dạy cho Reina. Cho Reina và anh Soutetsu. Khóa tu dưỡng tân nương đi ạ~」"
