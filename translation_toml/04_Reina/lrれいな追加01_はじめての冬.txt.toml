1147 = "「啊，確實挺像的」" 

# monologue
# JP: 膝の上、れいながぐりんと上を向く。\n短い両手を伸ばしぺたぺた、僕のほっぺたに触れてくる。
1611 = "懷裡的玲奈興奮地抬起頭來。她伸出兩隻短短的小手，撫了撫我的臉頰。" 

# 【れいな】
# display as 玲奈
# JP: 「伝次郎さんとそうてつさんはぜぇんぜん似てないですし、\nれいなもちょっとも、佳代子さんに似てないですけど」
1444 = "「雖然傳次郎爺爺和你一點也不像，玲奈也是一點也不像佳代子奶奶」" 

# monologue
# JP: ぺたぺたぺた。僕のほっぺたをいじくりまわし、\nれいなはどんどん笑顔を柔らかに膨らませていく。
1697 = "玲奈拍了拍我的臉，她的笑容變得越來越快樂。" 

# 【れいな】
# display as 玲奈
# JP: 「……そうてつさんとれいなの夫婦が、\n伝次郎さんと佳代子さんに似ているんなら嬉しいですぅ」
677 = "「……我們這對夫妻和傳次郎爺爺還有佳代子奶奶很像，是一件令人欣喜的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お手本としたいものだな。\nれいながそれほど大切にしている、ご夫妻の思い出を」
1425 = "「那可得好好學習了。學習回憶中的那對你念念不忘的模範夫妻」" 

# monologue
# JP: いいことを言った――つもりの僕の目の前で、\nれいなの眉は困ったように下がってしまう
1615 = "我以為自己說的話挺感人的，然而玲奈似乎有些不知所措。" 

# 【れいな】
# display as 玲奈
# JP: 「そうかもですけど……れいな、佳代子さんみたいには\nとってもぜんぜんまったくすこしもなれないですよぉ」
1396 = "「話是這麼說……可是玲奈離佳代子奶奶還差了好遠好遠好遠呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1270 = "「是嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。佳代子さんは、ええと、ええっとぉ」
1284 = "「是的，佳代子奶奶她，呃，唔」" 

# monologue
# JP: れいながアルバムのページをめくる。\n白黒写真の見開きに、やがてカラーが混じり始める。
1726 = "玲奈翻了翻相冊。一堆黑白照裡慢慢出現了一些彩色相片。" 

# 【れいな】
# display as 玲奈
# JP: 「ああ、ありましたぁ。えっへへー、見てくださぁい」
1143 = "「啊，有了。嘿嘿，快看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いい写真だな」
1163 = "「嗯，這張照片拍得不錯」" 

# monologue
# JP: 郷愁を無条件で呼ぶ木の床、木の壁、小さな机。\nそこにちょこん、と、緊張顔のれいながおさまっている。
1655 = "木地板、木牆、小桌子，看著就是滿滿的鄉愁。玲奈則一臉緊張地坐在中間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いい写真だな。とても可愛い。\n……というか、この先生は、さっきの写真の」
1244 = "「拍得不錯，很可愛。……另外，這位老師是剛才那照片裡的」" 

# 【れいな】
# display as 玲奈
# JP: 「ですです。かよこさんはずうっと、\n硬上学園の先生をやってたんですよぉ」
1319 = "「沒錯沒錯，佳代子奶奶一直是片上學園做老師」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。なるほどな。ならば体験授業など……\nにしては、他に生徒が写っていないな」
1129 = "「唔，是嗎，那你是去試聽課程的嗎……可是照片上沒有其他的學生」" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、そうてつさん」
1306 = "「是這樣的，雙鐵先生」" 

# monologue
# JP: れいなが急に声を潜める。\n首を傾け耳を近づけ、ナイショ話を受け入れる。
1715 = "玲奈突然壓低了聲音。我歪著腦袋把耳朵湊了上去。" 

# 【れいな】
# display as 玲奈
# JP: 「夜学の生徒は撮影禁止だったんですぅ。だからこれ、\n卒園の次の日に撮らせてもらった記念写真なんですよぉ」
1194 = "「夜校不准學生拍照的，所以這是畢業後第二天拍的紀念照」" 

# 【双鉄】
# display as 雙鐵
# JP: 「卒園……夜学。\n――！？　なんとれいなは、学園を卒園しているのか？」
1350 = "「畢業……夜校……嗯？！玲奈，你在這裡念了書？」" 

# 【れいな】
# display as 玲奈
# JP: 「硬上鉱山鉄道は、終電が早かったですからねぇ」
1332 = "「片上礦山鐵路末班車比較早」" 

# monologue
# JP: 終電後。終業後。受講希望者を募っての、いわゆる夜学。\n教職を定年退職され、佳代子さんはその講師となられた。
1808 = "這夜校是末班車時間過後，下班時間過後上的報名制學校。老師則由退休教師佳代子奶奶擔任。" 

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドを受け入れてくれる夜学があったのか。\n実にすばらしいな。ハチロクなどさぞ羨ましがろう」
1213 = "「居然有夜校收鐵路人偶，真是太棒了。八六肯定會覺得很羨慕的」" 

# 【れいな】
# display as 玲奈
# JP: 「かもですねぇ。れいなもそう思って、ずうっと――」
978 = "「也許吧，玲奈也是這樣認為的，所以一直……」" 

# monologue
# JP: 耳が吐息にくすぐられる。
1705 = "玲奈湊得更近了一點。她的鼻息打得我耳朵發癢。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなずうっとヒミツにしてきて。\nおはなししたの、いま、そうてつさんにが初めてですぅ」
961 = "「一直保密到今天。知道這件事的，你還是第一個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1134 = "「啊！」" 

# monologue
# JP: れいなも秘密を持っていた。それを共有してくれた。\n妙にねっとりした嬉しさが、ふつふつ胸に湧いてくる。
1675 = "玲奈也有自己的秘密，而現在，她將秘密與我共享。不知為何，我覺得非常欣喜。" 

# 【れいな】
# display as 玲奈
# JP: 「当時の硬上にも、勉強したくてもできなかったー\nっていうひとたち、結構たくさんいたんです」
1351 = "「當時片上有很多人想學習也沒辦法學習」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それで夜学か」
1243 = "「所以辦夜校啊」" 

# monologue
# JP: そこまでは珍しい話でもないだろう。が――
1810 = "這種事情倒不算少見，但是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドも、最初から受け入れされていたのか？」
1442 = "「鐵路人偶也是打創辦時開始就收的嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「いいええ。れいなが着任したときには普通の学園で、\n放課後には閉まっちゃってましたぁ」
969 = "「不，玲奈赴任的時候還是普通的學校，放學後都是關著門的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「夜学自体もなかったのか」
1417 = "「連夜校都不存在啊」" 

# 【れいな】
# display as 玲奈
# JP: 「夜学のことも、レイルロオドのことも、佳代子さんが\n伝次郎さんを通じて、社長にかけあってくれたんです」
1403 = "「辦夜校的事也是，鐵路人偶上學的事，都是佳代子奶奶透過傳次郎爺爺和社長談出來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、佳代子さんが始められたことなのか。\nというか、社長と？　自治体や首長とではなく？」
982 = "「什麼，居然是佳代子奶奶牽的頭？而且是和社長？不是和管委會或者鎮長之類的人談嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「町役場よりも町長さんよりも、会社と社長が\nずうっと強い。硬上は、そういうところでしたから」
1064 = "「公司和社長比鎮政府和鎮長厲害多了。在當時的片山就是這樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1267 = "「是嗎」" 

# monologue
# JP: ……義父に聞かされたことがある。\n労働者が学をつけることを、かつて経営者は嫌っていたと。
649 = "……我聽養父說過，以前的管理者不喜歡勞動者學習知識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――\nなかなかに大変なご交渉となったのではないか？」
1436 = "「那麼，我猜這個談判的過程肯定很艱難吧？」" 

# 【れいな】
# display as 玲奈
# JP: 「時間はかかってましたねぇ。けど、佳代子さんは\nいっつもにこにこ、いろんな人の話を聞いて」
1302 = "「是花了不少時間。但是，佳代子奶奶總是笑眯眯地聽取許許多多人的意見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1150 = "「嗯」" 

# monologue
# JP: 説得ではなく、話を聞く。\n不満を全部聞いてくれ、ただただそっと寄り添ってくれる。
1545 = "以傾聽取代說服。聽取別人的抱怨，嘗試去理解別人。" 

# 【れいな】
# display as 玲奈
# JP: 「『夜学だなんてとんでもない』って怒られたって。\n『悪いところを教えてください』って、おはなしきいて」
1353 = "「當時社長覺得夜校簡直荒唐，但是佳代子奶奶卻問社長覺得夜校到底有什麼缺點」" 

# monologue
# JP: 佳代子さんのやり方を、れいなはそのまま受け継いでいる。\n評価も批判も指導もなにも、なにも押し付けぬ傾聴を。
1722 = "玲奈繼承了佳代子奶奶的行事方式。她學會了不強加任何評判、批評和教導於對方頭上的傾聽。" 

# 【れいな】
# display as 玲奈
# JP: 「佳代子さんがずうっとそうしてたらなんだかだんだん、\n『夜学があったらいいな』って、町や会社の人達が」
1037 = "「佳代子奶奶傾聽了很久，慢慢地鎮上的人和公司的人也開始覺得有所夜校也不錯了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 1267 = "「是嗎」" 

# monologue
# JP: 稼働初期から[まね,1]真似び覚えたことゆえなのか、\nあるいはれいなの天性に、その方法がマッチしたのか。
1543 = "也不知玲奈是因為剛投入工作就學會了這樣的做法，還是因為天生適合這樣的做法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……さまざまな面で、れいなにとって、\n素晴らしい先生だったようだな、佳代子さんは」
672 = "「……佳代子奶奶在許多方面都教會了你很多有用的知識啊」" 

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ」
# 1279 = "「是的」" 

# monologue
# JP: しんみりと、ふんわりと。\nれいなの丸くかわいい声に、普段にはない湿度が宿る。
1732 = "玲奈那柔和而可愛的聲音，稍稍帶上了與平時不太一樣的甜蜜。" 

# 【れいな】
# display as 玲奈
# JP: 「少等部のお勉強だけじゃなくって、おうちのことも、\n人間さんとのつきあいかたも、ネコちゃんのことも」
1210 = "「小學的功課，家務，與人交往的方式，還有貓咪的習性」" 

# monologue
# JP: 短い指を幸せそうに、れいなはゆっくり折っていく。
1693 = "玲奈慢慢地、幸福地掰著手指。" 

# 【れいな】
# display as 玲奈
# JP: 「鉱山のことも、ゴミの出し方も、映画館のマナーも、\n赤ちゃんのあやし方も、綺麗に押し花する方法も――あ」
1382 = "「礦山的常識，丟垃圾的規則，看電影的禮儀，哄孩子的辦法，還有漂亮地插花的方法……啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1164 = "「嗯？」" 

# monologue
# JP: れいなの指がぴたりととまる。小さく震える。\n僕を見上げる瞳まで、不安げに揺れてしまっている。
1677 = "玲奈停下了手指。她微微發顫，抬頭望著我，表情裡帶著一絲害怕。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いったいどうした。なにゆえ突然」
1018 = "「你突然是怎麼了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな――。れいな。思い出しましたぁ。\nれいなには関係ないって思って、忘れちゃってて」
1333 = "「玲奈……玲奈想起來了，之前一直以為這和自己沒關係，所以都忘掉了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「忘れていた、とは」
1227 = "「忘掉了什麼？」" 

# 【れいな】
# display as 玲奈
# JP: 「佳代子さん、いってたんです。お嫁さんになる女の子、\nみんなにぜったい、いってたんです――あの、えと」
1038 = "「佳代子奶奶會對每一個出嫁的女孩子說同樣的話，肯定會說。是這樣的」" 

# monologue
# JP: れいなの髪をそうっと撫ぜる。\n目を閉じ、開き。れいなは言葉の続きを吐き出す。
1641 = "我輕輕摸了摸玲奈的頭髮。玲奈眨了眨眼，然後繼續說了下去。" 

# 【れいな】
# display as 玲奈
# JP: 「『嫁入り前に花嫁修業。きっちりつけにゃあいけんね』\nって！」
1069 = "「出嫁之前的準新娘必須好好學習新娘課程！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修行――」
1256 = "「新娘課程」" 

# monologue
# JP: “そんなことか”と浮かんだ想いを押しつぶす。\nれいなにとっては大事なことだと感じるゆえに。
1780 = "腦袋裡飄過的想法是“不過如此”，但是我不能這麼想。因為我感覺這對玲奈來說似乎很重要。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。古風といえば古風な言葉と感じるが」
1161 = "「嗯，聽起來挺傳統的」" 

# 【れいな】
# display as 玲奈
# JP: 「お嫁さんになるおんなのこたちもいってましたぁ！\n『古臭い』とか『今はそんな時代じゃない』とか」
1421 = "「那些要出嫁的女孩子們也都會這樣說！說這樣的做法很老舊，說現在時代已經變了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1450 = "「！」" 

# monologue
# JP: ドキリとする。\n内心を、そのまま代弁されてしまって。
1819 = "驚了，我的想法被說出來了。" 

# 【れいな】
# display as 玲奈
# JP: 「けどけど、修行しないと、花嫁になるこだけじゃなく、\n旦那さんになる人も不幸になるって、佳代子さんが」
1004 = "「但是但是，佳代子奶奶說，如果不好好學習的話，不論是出嫁的人還是娶妻的人都過不上好日子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや。僕はしあわせすぎるほどにしあわせだが」
965 = "「不是不是，你瞧瞧我這不是幸福得不得了嗎」" 

# 【れいな】
# display as 玲奈
# JP: 「みいんな最初はそうなんですよぉ。\nしんこんさんのうちは、しあわせでいっぱいなんです」
1196 = "「大家一開始都是這樣的。剛結婚的時候肯定都很幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
656 = "「……」" 

# monologue
# JP: 鉱山町で数多の暮らしを目にし続けてきたれいなの瞳。\nその柔らかなひかりの奥の深さを僕は、知っている。
1711 = "玲奈的這雙天真的雙眼曾在礦山鎮見證過許多人的人生。我知道這溫和的雙眸背後隱藏著豐富的經驗。" 

# 【れいな】
# display as 玲奈
# JP: 「けど、本当だったんです。佳代子さんのいってること。\nちゃんと花嫁修業したお嫁さんちは夫婦円満が多くって」
1010 = "「但是，佳代子奶奶沒有騙人。好好學過新娘課程的新娘，大都幸福美滿」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……きちんとしなかった場合の夫婦は」
1008 = "「但是沒學過的新娘……」" 

# 【れいな】
# display as 玲奈
# JP: 「おわかれしちゃうことがおおかったんです。1年とか、\n3年とか、結婚期間の長い短いはありましたけど」
1224 = "「很多都離婚了。有一年的，也有三年的，長短不一」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む、う」
1127 = "「唔」" 

# monologue
# JP: そういわれると気にかかってくる。\n『花嫁修業』で何を学ぶかということよりも――
1771 = "聽她這麼說我就有些好奇了。當然，我好奇的並不是學習的內容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「花嫁修業をきちんと修める。修めることを夫が支える。\nそこがおそらく、とても大切なことなのだろうな」
1255 = "「新娘認真學習新娘課程，然後丈夫在一旁支持她的學習，我猜這才是最重要的」" 

# 【れいな】
# display as 玲奈
# JP: 「佳代子さんもそういってました！\n真剣に準備をすることは、真剣に向き合うことだ、って」
1034 = "「佳代子奶奶也是這麼說的！說認真地做準備等於認真對待彼此的感情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そういわれれば、納得だ」
