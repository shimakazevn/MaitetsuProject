1741 = "（咻咻……咻咻……）" 

# monologue
# JP: れいなのおまんこ、膣へと向けて、\n精の全部を、余すことなく、降り注がせる。
1478 = "我對著玲奈的小穴，釋放出了所有精液。" 

# monologue
# JP: （く――ぽおっ）
# 1740 = "（咕啾）" 

# monologue
# JP: ……膣穴は、挿入されたそのままの形をまだ残してる。
771 = "……小穴依然保持著被我肉棒撐開時的模樣。" 

# monologue
# JP: そこからは、精液がこぷりと溢れ、\n今降り注いだ精液と、もう区別できず交じり合ってく。
1607 = "精液從小穴裡慢慢溢出，和我剛射出來的精液又混在一起，不分彼此。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁっ――はあっ――あっ――ふぁぁっ――」
1185 = "「蛤啊、蛤啊、啊啊啊啊」" 

# monologue
# JP: 完全に、れいなは脱力しきってる。
1580 = "玲奈的身體已經完全脫力。" 

# monologue
# JP: あれほど強く抱きしめていた、\nぬいぐるみにすがる手さえも、もう緩んでる。
1369 = "剛才她還緊緊抱著玩偶，現在卻已經鬆開了。" 

# 【れいな】
# display as 玲奈
# JP: 「ん……すき……しゅき……だいしゅきい……\nそおてつ……さぁんっ――んっ」
786 = "「…嗯……喜歡……最喜歡你了……雙鐵先生……啊嗯……」" 

# monologue
# JP: 声さえももううわ言のように垂れ流されて――
1403 = "她的嗓音也已經變得軟綿綿的。" 

# monologue
# JP: けれども、まったく、一滴たりとも――\n尿道口から、溢れ出てくる液体は無い。
1358 = "但尿道口卻沒有冒出液體，一滴都沒有。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「よく、頑張ったなれいな」
984 = "「你真努力啊，玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「あ――ふあっ――」
1036 = "「啊……蛤啊……」" 

# monologue
# JP: 呆、としていたれいなの瞳に、光が戻る。
1545 = "玲奈呆滯的目光恢復了神采。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そこまでとろとろに溶けながら、\nよく、おもらしをしなかった。特訓は、見事に大成功だ」
988 = "「做愛的時候這麼沉迷，卻還能忍住沒有失禁。特訓非常成功啊」" 

# 【れいな】
# display as 玲奈
# JP: 「あ……えへっ――えへへへえぇ。\nそうてつさんと、れいななくんのおかげですねぇ」
1035 = "「啊……嘿嘿……嘿嘿嘿。都是多虧了雙鐵先生和０７」" 

# monologue
# JP: 満面の笑み。
1564 = "玲奈流露出燦爛的笑容。" 

# monologue
# JP: ご褒美のキスをおでこに贈れば、\nれいなはもう、幸せを固めたような顔をする。
1477 = "我對著她的額頭獎勵了一個吻，她的臉龐上便洋溢著幸福。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもちゃあんと、大人のセックスできましたねぇ。\nうれしいですよぉ、ほーっとしました」
1164 = "「玲奈做到大人的做愛了。真開心，感覺人都放鬆下來了」" 

# monologue
# JP: ほにゃり。\n表情はゆるみにゆるみ――
1576 = "玲奈癱軟了下來。表情也變得放鬆——" 

# monologue
# JP: （ちょろっ――）
1761 = "（嘩啦）" 

# monologue
# JP: そして、水音。\nそれはすぐさま、水の流れる音へと変わる。
1534 = "然後響起了一道水聲。接著變成了源源不斷的水流聲。" 

# monologue
# JP: （ちょろろろろろろろろろろろろ～）
1760 = "（嘩啦啦啦啦啦～）" 

# 【れいな】
# display as 雙鐵＆玲奈
# JP: 『「ぬっ！？」\n「ひゃああんっ！」』
1216 = "『“咦？！”“哎呀！”』" 

# monologue
# JP: ……油断大敵。
769 = "……切勿大意。" 

# monologue
# JP: その四文字を心に刻み、僕らは次なる特訓のため、\n今はともかく――尿処理をする。
1465 = "我們把這四個字刻在心中，為了開始下一次特訓……現在要先把尿液打掃乾淨。" 
