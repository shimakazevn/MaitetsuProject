[script]
# lines: 311 
# 【れいな】
# display as 玲奈
# JP: 「れいな、特訓したいですぅ」
1168 = "「Reina, muốn đặc huấn ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「特訓？」
1151 = "「Đặc huấn?」"
# monologue
# JP: れいなとふたりきりの夜。\nふたりで、ともにすごす寝室。
1353 = "Đêm chỉ có hai người với Reina.\nPhòng ngủ nơi hai người cùng nhau trải qua."
# monologue
# JP: なのにれいなは制服姿で、\nすっとんきょうなことを言い出す。
1362 = "Vậy mà Reina lại mặc đồng phục,\nvà thốt ra những lời kỳ quặc."
# 【双鉄H】
# display as 雙鐵
# JP: 「特訓ならば、明日早朝の乗務前にでも」
1187 = "「Nếu là đặc huấn thì, trước ca trực sáng sớm mai cũng được mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ちがうですぅ！　乗務の特訓とかじゃなくってぇ」
976 = "「Không phải đâu ạ~! Không phải là đặc huấn cho ca trực đâu~」"
# monologue
# JP: もじっと、れいなが恥ずかしそうに身をよじる。\n甘い匂いが鼻をくすぐる。
1549 = "Reina bẽn lẽn vặn vẹo cơ thể.\nMùi hương ngọt ngào cọ vào mũi tôi."
# 【れいな】
# display as 玲奈
# JP: 「れいな……もっとちゃあんとセックスをできるように\nなりたくて。だから、セックスの特訓をしたいですぅ」
1156 = "「Reina......muốn có thể làm tình\nđàng hoàng hơn. Nên là, muốn đặc huấn làm tình ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ちゃんと……か？」
780 = "「Đàng hoàng......sao?」"
# monologue
# JP: ポーレットのアシストがあったとはいえ、前回――\n初めてのときだって、ちゃんとセックスしたと思うが……
1671 = "Dù có sự hỗ trợ của Paulette, nhưng lần trước——\nlần đầu tiên đó, tôi nghĩ là đã làm tình đàng hoàng rồi mà......"
# 【双鉄H】
# display as 雙鐵
# JP: 「具体的に、どういう点が“ちゃんとしてなかった”と、\nれいなは感じているのだ？」
995 = "「Cụ thể thì, Reina cảm thấy \"chưa đàng hoàng\"\nở điểm nào?」"
# 【れいな】
# display as 玲奈
# JP: 「あの……ひとつめは、お口でぺろぺろするのですぅ。\n白いの、れいな、びっくりしてお口はなしちゃって」
1203 = "「Ưm......điều đầu tiên là, liếm láp bằng miệng ạ~.\nCái thứ màu trắng đó, Reina, giật mình nên đã nhả miệng ra mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1029 = "「À.」"
# 【れいな】
# display as 玲奈
# JP: 「けど、れいな。あれ、ごっくんってしたいですから。\nお口を離さないでぺろぺろできるように特訓したくてぇ」
979 = "「Nhưng mà, Reina. Muốn nuốt ực cái đó cơ.\nNên muốn đặc huấn để có thể liếm láp mà không nhả miệng ra ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ。その点は理解した。\nが……一体ぜんたい、どういうわけで制服を？」
1098 = "「Hừm. Điểm đó thì anh hiểu rồi.\nNhưng......rốt cuộc thì, tại sao lại mặc đồng phục?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、制服姿だと、一番いっぱいがんばれるのですぅ。\nそれに――」
1171 = "「Reina, mặc đồng phục là lúc có thể cố gắng nhiều nhất ạ~.\nHơn nữa——」"
# monologue
# JP: （ぷちっ――ぷち――）
1748 = "（Tách——tách——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぬ」
1037 = "「Ồ.」"
# monologue
# JP: れいなの指がゆっくりゆっくり、\nブラウスの前のボタンを開けていく。
1558 = "Những ngón tay của Reina từ từ, từ từ,\ncởi từng chiếc cúc áo blouse."
# monologue
# JP: かわいい乳首が丸見えになり――\nそれでも、指はとまらない。
1395 = "Đầu nhũ hoa dễ thương lộ ra hoàn toàn——\nDù vậy, những ngón tay vẫn không dừng lại."
# 【れいな】
# display as 玲奈
# JP: 「よいしょ……よいしょっ」
1101 = "「Hây dô......hây dô」"
# monologue
# JP: ズボンを脱ぎ、パンツをずらし――\nおまんこまでを、れいなは僕にさらしてくれる。
1583 = "Cởi quần dài, kéo quần lót xuống——\nReina phơi bày cả âm đạo cho tôi thấy."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットに、れいな、教えてもらいましたぁ。\nこういう格好、そうてつさん、きっと喜んでくれるって」
1145 = "「Reina, đã được chị Paulette dạy cho rồi ạ~.\nĂn mặc thế này, chắc chắn anh Soutetsu sẽ rất vui」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……確かに、とても魅力的だな」
784 = "「......Đúng là, rất hấp dẫn.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ですよねぇ。そうてつさんのズボンの前も、\nそういうふうに言ってますよぉ？」
1108 = "「Ư hu hu~, đúng không ạ. Phía trước quần của anh Soutetsu,\ncũng đang nói như vậy đó nha~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1136 = "「Ừ.」"
# monologue
# JP: 隠すことなど、なにも無い。\n心も体も、おんなじことを望んでいるから。
1528 = "Chẳng có gì phải giấu giếm cả.\nVì cả tâm hồn lẫn thể xác, đều đang khao khát cùng một điều."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいながよければ、\nいつでも僕は特訓に協力させてもらいたい」
999 = "「Nếu Reina đồng ý,\nanh lúc nào cũng sẵn sàng hợp tác đặc huấn.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ！　それじゃあ、さっそく特訓するですよぉ。\nそうてつさん、ズボン、ぬぎぬぎしましょうねぇ」
1106 = "「E he he~! Vậy thì, bắt đầu đặc huấn ngay thôi nha~.\nAnh Soutetsu, cởi quần, cởi quần ra nào~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1095 = "「Ừm.」"
# monologue
# JP: ポーレットの教えをきっちり守り、いそいそ、もたもた、\nれいなは僕のズボンとパンツを丁寧に脱がす。
1588 = "Tuân thủ nghiêm ngặt lời dạy của Paulette, Reina hớn hở, lóng ngóng,\ncẩn thận cởi quần dài và quần lót của tôi ra."
# monologue
# JP: （ばちんっ！）
1749 = "（Bốp!）"
# monologue
# JP: 腹を叩いてしまいそうなほど、勃起はそり返りきっている。\nそれを目にして、れいなの顔はほにゃりと崩れる。
1624 = "Sự cương cứng ưỡn cong lên đến mức như muốn đập vào bụng.\nNhìn thấy cảnh đó, khuôn mặt Reina giãn ra vui vẻ."
# 【れいな】
# display as 玲奈
# JP: 「わ！　もうおっきくしてくれてるですねぇ。\nえへへぇ、れいな、うれしいですよぉ」
1012 = "「Oa! Đã làm cho nó to lên rồi cơ ạ~.\nE he he~, Reina, vui lắm nha~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1070 = "「!」"
# monologue
# JP: 喜びをあらわすためなのか、れいなは小さな手のひらで、\n僕の亀頭を、いいこいいこと撫でさする。
1569 = "Không biết có phải để thể hiện sự vui mừng hay không, Reina dùng lòng bàn tay nhỏ bé,\nvuốt ve quy đầu của tôi như đang nựng \"bé ngoan, bé ngoan\"."
# 【れいな】
# display as 玲奈
# JP: 「わ、なんだかそうてつさん、\nきもちよさそぉなお顔ですよぉ」
1017 = "「Oa, trông khuôn mặt anh Soutetsu,\ncó vẻ rất sung sướng nha~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「実際……かなり気持ちいい。口でする前、\nもう少し、なでなでを続けてはくれまいか」
1178 = "「Thực ra......khá là sướng đấy. Trước khi dùng miệng,\nem vuốt ve thêm một chút nữa được không?」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ！　いいこ、いいこ、\nなでなで、さすさす、いいこ、いいこ」
1116 = "「Reina hiểu rồi ạ~! Bé ngoan, bé ngoan,\nvuốt ve, xoa nắn, bé ngoan, bé ngoan」"
# monologue
# JP: “いいこいいこ”と優しい声。\nそれよりさらにやさしく柔らかな手の動き。
1566 = "Giọng nói dịu dàng \"bé ngoan, bé ngoan\".\nCùng với chuyển động tay còn dịu dàng và mềm mại hơn thế nữa."
# monologue
# JP: 自分のすべてを肯定される――\n包まれるような安堵が僕を、満たしてくれる。
1490 = "Được khẳng định toàn bộ bản thân——\nsự an tâm như được bao bọc lấp đầy trong tôi."
# 【れいな】
# display as 玲奈
# JP: 「わ……そうてつさんの先っぽから、\nちろちろって、透明なおつゆが出てきましたぁ」
1011 = "「Oa......từ phần đầu của anh Soutetsu,\ncó nước trong suốt rỉ ra rồi ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「先走り汁、というものらしい。\n僕の体が、とても気持よくなっている、その証だ」
1195 = "「Có vẻ như gọi là dịch nhờn trước khi xuất tinh.\nĐó là minh chứng cho việc cơ thể anh đang cảm thấy rất sướng đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「そおなんですねぇ。えへへ、先走り汁さんも、\nいいこ、いいこ。なでなで、さすさす、のびー、のびー」
1197 = "「Là vậy ạ~. E he he, dịch nhờn trước khi xuất tinh ơi,\nbé ngoan, bé ngoan. Vuốt ve, xoa nắn, kéo dài ra, kéo dài ra nào」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1070 = "「啊！」" 
# monologue
# JP: 亀頭全部にまぶすみたいに、いいこいいこと撫ぜながら、\nれいなの手は、先走り汁を伸ばしてくれる。
1560 = "Như thể đang thoa đều lên toàn bộ quy đầu, vừa nựng \"bé ngoan, bé ngoan\",\nbàn tay Reina vừa kéo dài lớp dịch nhờn ra."
# monologue
# JP: 強まってくれた快感に、\n腰がびくりと、素直な反応を示してしまう。
1675 = "Trước khoái cảm ngày càng mãnh liệt,\nhông tôi khẽ giật lên, thể hiện phản ứng một cách thành thực."
# 【れいな】
# display as 玲奈
# JP: 「わあ。先走り汁さん、のばしてあげると、\nそうてつさん、もっと気持ちよくなりますかぁ？」
1015 = "「Oa. Dịch nhờn ơi, nếu kéo dài ra,\nanh Soutetsu, sẽ thấy sướng hơn ạ~?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「の、ようだな」
1112 = "「Có vẻ, là vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「だったられいな、がんばって、\nたくさんたぁくさんのばしますねぇ」
1209 = "「Vậy thì Reina, sẽ cố gắng,\nkéo dài ra thật nhiều thật nhiều nha~」"
# monologue
# JP: （ずりゅっ！）
1739 = "（Rột!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「～～～っ！」
1215 = "「~~~!」"
# monologue
# JP: れいなは両手で僕の勃起をはさみこみ、\n先走り汁を竿全体に、もみこむように伸ばしてく。
1573 = "Reina dùng cả hai tay kẹp lấy sự cương cứng của tôi,\nvừa xoa bóp vừa kéo dài lớp dịch nhờn ra khắp toàn bộ thân gậy."
# monologue
# JP: 柔らかな手がしっとり吸いつき、気持ちいい。\n気持ちいいから、もっと、もっとが欲しくなる。
1525 = "Đôi tay mềm mại mơn trớn ướt át, thật sướng.\nVì sướng, nên lại càng muốn nhiều hơn, nhiều hơn nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな、手を――手を、もっといろいろ動かしてくれ。\n上下にだとか、すりすり、すり合わせるようにするとか」
1161 = "「Reina, tay——tay, hãy di chuyển nhiều kiểu hơn đi.\nLên xuống này, hay là cọ xát, chà xát vào nhau chẳng hạn.」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ、れいな、やってみますねぇ」
1175 = "「Reina hiểu rồi ạ~, Reina, sẽ làm thử nha~」"
# monologue
# JP: （しゅこっ！）
1766 = "（Sột!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1070 = "「啊！」" 
# 【れいな】
# display as 玲奈
# JP: 「しゅっしゅっ、しゅっしゅっ、いいこ、いいこ、\nしゅっしゅっ、しゅっしゅ、すりすりすりすり」
1135 = "「Xoa xoa, xoa xoa, bé ngoan, bé ngoan,\nxoa xoa, xoa xoa, cọ cọ cọ cọ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ――くっ――くっ」
1030 = "「Ưm——ư——ư」"
# 【れいな】
# display as 玲奈
# JP: 「しゅっしゅ、しゅこしゅこ、かわいいかわいい、\nいいこ、いいこ、しゅっしゅっ、すぅりすりぃ」
1133 = "「Xoa xoa, xoa xoa, dễ thương quá dễ thương quá,\nbé ngoan, bé ngoan, xoa xoa, cọ cọ cọ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――ふっ――」
1003 = "「Ư——phù——」"
# monologue
# JP: こみあげてくる射精感を強く感じて、\nその瞬間に思い出す。
1436 = "Cảm nhận rõ ràng cảm giác muốn xuất tinh đang trào dâng,\nkhoảnh khắc đó tôi chợt nhớ ra."
# monologue
# JP: そういえば、これは――\n特訓だった。
1417 = "Nhắc mới nhớ, đây là——\nđặc huấn cơ mà."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな、口を。お口を、あーーだ。\n大きく大きく開けてくれ」
1173 = "「Reina, miệng. Miệng, aaa ra nào.\nHá thật to ra nhé」"
# 【れいな】
# display as 玲奈
# JP: 「あ、そうでしたぁ！」
1076 = "「A, đúng rồi ạ~!」"
# monologue
# JP: 勃起シュッシュに熱中し、特訓を失念してたのだろう。
1562 = "Chắc là mải mê chà xát sự cương cứng quá nên quên mất đặc huấn rồi."
# monologue
# JP: れいなも気がついた顔になり、両手についた先走り汁を\nぺろりと舐めて――
1389 = "Reina cũng làm vẻ mặt như vừa chợt nhớ ra, liếm sạch\nlớp dịch nhờn dính trên hai tay rồi——"
# 【れいな】
# display as 玲奈
# JP: 「あーーーーー」
1032 = "「Aaaaaa」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1070 = "「啊！」" 
# 【れいな】
# display as 玲奈
# JP: 「んむっ！！」
1043 = "「A ưm!!」"
# monologue
# JP: 大きく開けても小さな口に、\n腰を真っ直ぐ突き出せば、すぐさま喉にあたってしまう。
1406 = "Dù có há to thì cái miệng nhỏ nhắn ấy,\nkhi tôi đâm thẳng hông tới, cũng sẽ chạm ngay vào cổ họng."
# 【れいな】
# display as 玲奈
# JP: 「んぷっ――んっ――んんっ」
1088 = "「Ưm——ưm——ưm」"
# monologue
# JP: 苦しげな声。\nけれどもがいて蠢く舌は、快感の火に油を注ぐ。
1408 = "Giọng nói đượm vẻ khổ sở.\nNhưng chiếc lưỡi đang ngọ nguậy giãy giụa lại như đổ thêm dầu vào ngọn lửa khoái cảm."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 1030 = "「唔……」" 
# monologue
# JP: もっともっとと浅ましく望み、動き出そうとする腰を、\n噛み締めた歯と理性とで、どうにかこうにか抑えこむ。
1472 = "Tôi thèm khát nhiều hơn, nhiều hơn nữa, và cố gắng dùng lý trí cùng hàm răng cắn chặt\nđể kìm nén cái hông đang chực chờ lao tới."
# 【れいな】
# display as 玲奈
# JP: 「ふっ――んっ――んっ……\nんくっ…………ふぅっ――ふっ……ふーっ――ふーっ」
1087 = "「Ư——ưm——ưm......\nƯm............phù——phù......phù——phù」"
# monologue
# JP: ……永遠のように待ち遠しかった、ほんの数秒。\nその間に、れいなの呼吸は落ち着いて――
768 = "......Chỉ vài giây mà chờ đợi như dài đằng đẵng.\nTrong lúc đó, nhịp thở của Reina đã bình tĩnh lại——"
# 【れいな】
# display as 玲奈
# JP: 「ん……んむっ――れろっ――れるううっ」
1093 = "「Ưm......a ưm——chụt——chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
# 1070 = "「啊！」" 
# monologue
# JP: 舌がまきつき、くるんでくれる。
1646 = "Chiếc lưỡi quấn lấy, bao bọc lấy tôi."
# monologue
# JP: 快感を求め腰が勝手にうごめけば、\n亀頭のくびれの裏がこすれて、ぞくぞくとする。
1496 = "Khi hông tôi tự động ngọ nguậy tìm kiếm khoái cảm,\nmặt trong rãnh quy đầu bị cọ xát, khiến tôi rùng mình."
# 【れいな】
# display as 玲奈
# JP: 「ほーへふぁん……ん、ちゅっ――ふっ――\nふほひへふれへ……むちゅ、んっ――へいひ、れふ」
1199 = "「Như vầy ạ......ưm, chụt——phù——\nTiếp tục đi ạ......chụt, ưm——Reina, không sao ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1198 = "「Vậy sao.」"
# monologue
# JP: 軽く頭を支えつつ、れいなのリズムを乱さぬように、\nゆっくりゆっくり腰を動かす。
1482 = "Tôi nhẹ nhàng đỡ lấy đầu cô bé, để không làm rối nhịp điệu của Reina,\ntừ từ, từ từ nhấp hông."
# monologue
# JP: 真正面から、小さな口内を犯してる――\n快感と背徳感が入り混じり、腰の動きは加速する。
1441 = "Cưỡng đoạt cái miệng nhỏ nhắn ấy từ chính diện——\nKhoái cảm và cảm giác tội lỗi đan xen, khiến chuyển động hông càng lúc càng nhanh."
# 【れいな】
# display as 玲奈
# JP: 「はっ――むっ――んっ――れりゅ――じゅっ――\nじゅるっ――じゅぶっ――むちゅっ――」
1181 = "「Ha——ưm——ưm——chụt——chụt——\nchụt——chụt——chụt——」"
# monologue
# JP: れいなは、健気だ。
1582 = "Reina, thật đáng khen."
# monologue
# JP: 腰の動きにあわせるように舌を動かし、\n手のひらで、睾丸を支えてまでくれる。
1402 = "Cô bé uốn lưỡi phối hợp với nhịp hông của tôi,\nvà dùng lòng bàn tay đỡ lấy tinh hoàn cho tôi."
# 【れいな】
# display as 玲奈
# JP: 「むちゅっ――ふっ――んっ――ぺろっ――れるっ――\nじゅっ！　じゅぼっ！　じゅむっ！　じゅろっ！！」
1110 = "「Chụt——phù——ưm——chụt——chụt——\nChụt! Chụt! Chụt! Chụt!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――おっ――」
1111 = "「Ồ——ồ——」"
# monologue
# JP: やがて、動きが噛み合い始める。\nれいな自ら頭を動かし――
1466 = "Dần dần, nhịp điệu bắt đầu ăn khớp với nhau.\nReina tự mình lắc đầu——"
# 【れいな】
# display as 玲奈
# JP: 「しゅぶっ！　ぬぶっ！　じゅっ！　ずううっ！\nじぶっ！　じゅぶっ！　れろおっ！　じゅぼおっ！！」
1079 = "「Chụt! Chụt! Chụt! Chụt!\nChụt! Chụt! Chụt! Chụt!!」"
# monologue
# JP: ――腰が押したら迎えてくれて、\n腰が引く時に下がってくれる。
1458 = "——Khi hông tôi đẩy tới, cô bé đón lấy,\nkhi hông tôi rút ra, cô bé lùi lại."
# monologue
# JP: 抜けるギリギリのところから、喉をつついてしまうまで、\n僕の勃起をめいっぱい、唇で舌で愛してくれる。
1520 = "Từ ranh giới tưởng chừng như sắp tuột ra, cho đến tận lúc chạm vào cổ họng,\ncô bé dùng môi và lưỡi yêu chiều sự cương cứng của tôi hết mức có thể."
# 【れいな】
# display as 玲奈
# JP: 「ちゅううううっ！　ずっ――ずううっ！　ちゅむっ！\nれるううっ！　じゅぼっ！　じゅちゅっ！　じゅぶっ！」
1085 = "「Chụt chụt chụt! Chụt——chụt! Chụt!\nChụt! Chụt! Chụt! Chụt!」"
# monologue
# JP: 強烈に吸い、舌でくるんで、強弱をつけてまた頭を振る。
1435 = "Mút mạnh, quấn lưỡi, rồi lại lắc đầu với nhịp độ lúc mạnh lúc nhẹ."
# monologue
# JP: レイルロオドの優秀すぎる学習機能を全開にして、\n僕の反応を引き出す動きを、れいなはどんどん最適化する。
1547 = "Kích hoạt tối đa khả năng học hỏi quá đỗi ưu việt của Railord,\nReina liên tục tối ưu hóa các chuyển động để khơi gợi phản ứng từ tôi."
# 【れいな】
# display as 玲奈
# JP: 「じゅぼっ！　じゅちゅっ！　じゅっ！　じゅるるっ！\nくぽっ！　　じゅるっ！　ずるるっ！　れろおおおっ！」
1084 = "「Chụt! Chụt! Chụt! Chụt!\nChụt! Chụt! Chụt! Chụt!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――あっ――れいなっ！　れいなっ！！」
1039 = "「A——a——Reina! Reina!!」"
# 【れいな】
# display as 玲奈
# JP: 「ふふ～っ、ふふぅっへひへひはひはへー\nひふへほひーれふよ？　ほーへふふぁん」
1104 = "「Ư hu hu~, sướng chứ ạ~\nchụt chụt chụt」"
# monologue
# JP: （こりゅっ！　もみゅっ！！）
1738 = "（Rột! Rột!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！」
1071 = "「!!」"
# monologue
# JP: 不規則にうごめく舌と、ゆるゆるとしたタマへの刺激と。
1645 = "Sự kích thích từ chiếc lưỡi uốn éo không theo quy luật, và những cái vuốt ve nhè nhẹ lên tinh hoàn."
# monologue
# JP: 精液が、どんどん水位をあげていく。\nその瞬間を待ちわびて、腰がうずうずざわめいている。
1605 = "Mực nước tinh dịch, đang dâng lên cuồn cuộn.\nChờ đợi khoảnh khắc đó, hông tôi rần rần ngứa ngáy."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな――イク、ぞ」
1159 = "「Reina——anh ra, đây」"
# monologue
# JP: （ぐいいいいいいいいっ！！）
1764 = "（Phậpppppp!!）"
# 【れいな】
# display as 玲奈
# JP: 「んぶっ！！？」
1090 = "「Ưm!!?」"
# monologue
# JP: （びゅっ！　びゅるうっ！　どびゅっ！　びゅぶうっ！）
1742 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【れいな】
# display as 玲奈
# JP: 「ん～～～～～～っ！！！　――んっ――んむっ――\nふっ――んっ――――――――――」
1094 = "「Ưm~~~~~~!!! ——Ưm——ưm——\nPhù——ưm————————」"
# monologue
# JP: 頬をいっぱいにふくらませ、\n見るからに苦しげに眉をひそめて――
1592 = "Hai má phồng to hết cỡ,\nnhìn qua cũng thấy cô bé đang nhíu mày khổ sở——"
# 【れいな】
# display as 玲奈
# JP: 「ごきゅっ！」
1009 = "「Ực!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
# 1070 = "「啊！」" 
# monologue
# JP: ――けれども次の瞬間に、れいなの喉が動き始める。
1355 = "——Thế nhưng ngay khoảnh khắc tiếp theo, cổ họng Reina bắt đầu cử động."
# 【れいな】
# display as 玲奈
# JP: 「ごくっ――こくっ――ごきゅっ――きゅむっ――\nごきゅ――こくっ――ごくっ――ごくんっ――」
1008 = "「Ực——ực——ực——ực——\nỰc——ực——ực——ực——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「れい、な」
1154 = "「Rei, na」"
# monologue
# JP: やがて、喉の動きが止まる。
1398 = "Cuối cùng, chuyển động của cổ họng cũng dừng lại."
# monologue
# JP: パンパンだった頬袋が、\n僕の勃起に押されてる――ただそれだけのふくらみになる。
1494 = "Hai bầu má vốn căng phồng,\nđang bị sự cương cứng của tôi đẩy lên——chỉ còn lại độ phồng bấy nhiêu đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「抜くぞ？」
1126 = "「Anh rút ra nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃいれふぅ――んッ――れろおおおおおおっ――\nんむっ――ぷあっ！　ぷはっ！　はぁっ……はぁっ」
1114 = "「Vâng ạ——ưm——chụt——\nƯm——phù! Phù! Ha......ha」"
# monologue
# JP: 舌を使って、去りゆく僕の勃起を最後まで送り届けて。\nそしてれいなは、僕にむかって、大きく口を――
1572 = "Dùng lưỡi đưa tiễn sự cương cứng đang rút ra của tôi cho đến tận cùng.\nVà rồi Reina, há to miệng hướng về phía tôi——"
# 【れいな】
# display as 玲奈
# JP: 「あ～～んっ」
1077 = "「A~~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
1086 = "「Ồ.」"
# monologue
# JP: 飲んでいる。\nあれほど出した精液を。
1414 = "Đã nuốt hết.\nLượng tinh dịch tôi bắn ra nhiều đến thế cơ mà."
# monologue
# JP: 綺麗さっぱり……とまでは完全にはいかず、\n唇の端や歯の上に、いくらかこびりついてはいるようだが。
1394 = "Mặc dù không đến mức sạch sẽ hoàn toàn......\nnhưng có vẻ vẫn còn dính lại một chút trên khóe môi và kẽ răng."
# 【双鉄H】
# display as 雙鐵
# JP: 「よく頑張ったな、れいな」
981 = "「Em cố gắng lắm rồi, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ～――あっ！　ん～～～っ、ちゅっ！」
1102 = "「E he he~——A! Ưm~~~, chụt!」"
# monologue
# JP: 愛おしくって可愛くて、\n綺麗に整えなおしたくって。
1411 = "Đáng yêu quá, dễ thương quá,\nmuốn giúp cô bé lau dọn sạch sẽ lại quá."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな――」
# 1154 = "「玲奈……」" 
# 【れいな】
# display as 玲奈
# JP: 「ふぁっ――あ――ちゅっ！――ちゅうう――ちゅっ――\nれるっ――れりゅ――ちゅっ――ちゅうう――ちゅっ！」
1081 = "「Ha——a——chụt!——chụt——chụt——\nChụt——chụt——chụt——chụt——chụt!」"
# monologue
# JP: キスをして、\n僕の精液の残滓を丁寧に、自分の舌でこそげとる。
1470 = "Tôi hôn,\nvà cẩn thận dùng lưỡi của mình liếm sạch tàn dư tinh dịch."
# monologue
# JP: 恐ろしくエグ苦く、草っぽい感じが舌に残って、\nこれを飲み干してくれたのか、と思えば感動さえ胸に湧く。
1437 = "Vị đắng ngắt đáng sợ, mang cảm giác như mùi cỏ đọng lại trên lưỡi,\nnghĩ đến việc cô bé đã nuốt trọn thứ này, trong ngực tôi trào dâng niềm cảm động."
# 【双鉄H】
# display as 雙鐵
# JP: 「――ん……ふぅ。\n見事だ。これで、特訓は大成功だな」
779 = "「——Ưm......phù.\nTuyệt lắm. Vậy là, đặc huấn đã thành công mỹ mãn rồi.」"
# monologue
# JP: あとは、ゆったりとセックスを――\n思った矢先に、けれどれいなはぶんぶん大きく首を振る。
1513 = "Giờ thì, thong thả làm tình thôi——\nNgay khi tôi vừa nghĩ vậy, Reina lại lắc đầu nguầy nguậy."
# 【れいな】
# display as 玲奈
# JP: 「特訓、まだです！　れいな、もうひとつ、\n特訓したいことあるのですぅ」
1150 = "「Đặc huấn, vẫn chưa xong đâu ạ! Reina, vẫn còn một điều nữa,\nmuốn đặc huấn ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「もうひとつ、とは？」
978 = "「Một điều nữa, là sao?」"
# 【れいな】
# display as 玲奈
# JP: 「あの……ですねぇ。れいな、気持よく――\nそうてつさんに、気持よくしてもらった、ときに」
1202 = "「Ưm......là thế này ạ~. Reina, lúc sướng——\nlúc được anh Soutetsu làm cho sướng, ấy ạ」"
# monologue
# JP: 珍しく、れいながもごもご口ごもってる。\n目線を彷徨わせ照れている。
1554 = "Hiếm khi thấy Reina ấp úng như vậy.\nÁnh mắt cô bé lảng tránh, đầy vẻ ngại ngùng."
# monologue
# JP: だから僕にも、ああ、あのことかと見当がつく。
1654 = "Thế nên tôi cũng đoán ra được, à, là chuyện đó sao."
# 【双鉄H】
# display as 雙鐵
# JP: 「おもらし、か」
985 = "「Tè dầm, hả.」"
# 【れいな】
# display as 玲奈
# JP: 「はい！　そおなんです。れいな、気持よくなったとき、\nおもらし――はずかしいから、もう、したくなくって」
1139 = "「Vâng! Là vậy đó ạ. Reina, lúc sướng lên,\ntè dầm——xấu hổ lắm, nên là, không muốn bị thế nữa」"
# 【双鉄H】
# display as 雙鐵
# JP: 「良かろう。ならば特訓だ」
1121 = "「Được thôi. Vậy thì đặc huấn nào.」"
# monologue
# JP: 僕のしたいこと。\nれいながチャレンジしたいこと。
1480 = "Điều tôi muốn làm.\nĐiều Reina muốn thử thách."
# monologue
# JP: 両者がほとんど一致しているものなのだから、\n何をためらうこともない。
1350 = "Cả hai điều đó gần như hoàn toàn trùng khớp,\nnên chẳng có gì phải do dự cả."
# 【双鉄H】
# display as 雙鐵
# JP: 「さ、れいな。ごろんと横に」
987 = "「Nào, Reina. Nằm xuống đi.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、ちょっとだけ待って下さい、そうてつさん」
1074 = "「A, đợi một chút ạ, anh Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1100 = "「Ưm?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。これでいいですよぉ。\nごろーーーーん」
1120 = "「Vâng ạ. Thế này là được rồi ạ~.\nNằm xuống————」"
# monologue
# JP: れいなが大きく股を広げて、\n僕の愛撫を受け入れてくれる姿勢で転がる。
1586 = "Reina dang rộng hai chân,\nlăn ra với tư thế sẵn sàng đón nhận sự âu yếm của tôi."
# monologue
# JP: それはもちろん、\n扇情的なポーズにきまっているのだが――
1664 = "Tất nhiên,\nđó là một tư thế vô cùng gợi tình——"
# 【双鉄H】
# display as 雙鐵
# JP: 「抱いているのは、キハ07――だな」
983 = "「Thứ em đang ôm, là KiHa 07——đúng không.」"
# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ、れいななくんです。\nれいなの、お守りのぬいぐるみですぅ」
1141 = "「Đúng vậy ạ~, là bé số 07 đó.\nLà thú bông hộ mệnh của Reina đó ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お守り？」
1189 = "「Hộ mệnh?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、お引っ越ししてきたばっかりのころは、\nやっぱり、ちょっとだけさみしくて――」
1167 = "「Lúc Reina mới chuyển đến đây,\nquả nhiên là, vẫn có chút buồn bã——」"
# monologue
# JP: それでも、れいなはれいなだから。\n明るく元気にふるまって。
1364 = "Dù vậy, Reina vẫn là Reina.\nVẫn cư xử vui vẻ, hoạt bát."
# monologue
# JP: そしてそれでも、ポーレットはポーレットだから。\nれいなの笑顔の下の我慢に、気づいてくれたのだそうだ。
1621 = "Và dù vậy, Paulette vẫn là Paulette.\nChắc hẳn cô ấy đã nhận ra sự chịu đựng đằng sau nụ cười của Reina."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットが、少しでもさみしさが減るようにって、\nれいななくんを作って、プレゼントしてくれたんですぅ」
1146 = "「Chị Paulette, muốn Reina bớt buồn đi dù chỉ một chút,\nnên đã làm bé số 07, tặng cho Reina đó ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それがれいなの、お守りに？」
1129 = "「Và nó trở thành, bùa hộ mệnh của Reina?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいななくんと一緒なら、\nれいな、いっつもよりもっと頑張れるですぅ」
1137 = "「Vâng ạ~. Nếu có bé số 07 ở bên,\nReina, lúc nào cũng có thể cố gắng hơn bình thường đó ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
# 1198 = "「這樣啊」" 
# monologue
# JP: ぬいぐるみはかなり大きくて、\nそれだけに、れいなの体の華奢さをいっそう際立てる。
1538 = "Con thú bông khá lớn,\nchính vì thế, càng làm nổi bật lên thân hình mảnh mai của Reina."
# monologue
# JP: この小ささで、僕の欲望を、全てを受け止めきってくれる。\nそれがどんなに幸せか、心の底からじんわり感じる。
1595 = "Với thân hình bé nhỏ này, cô bé sẽ đón nhận toàn bộ dục vọng của tôi.\nTừ tận đáy lòng, tôi cảm nhận được sự ấm áp, nhận ra điều đó hạnh phúc đến nhường nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、頑張って見せてくれ。\n僕も全力で頑張り、れいなをとろとろに気持ちよくする」
1204 = "「Vậy thì, hãy cho anh thấy em cố gắng thế nào đi.\nAnh cũng sẽ cố gắng hết sức, làm cho Reina sướng đến tan chảy luôn.」"
# monologue
# JP: （さすっっ）
1768 = "（Xoa xoa）"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ――あっ――おっぱい――――んっ――ふっ」
1184 = "「Ha——a——ngực————ưm——phù」"
# monologue
# JP: （さすっ――ふにっ――さわっ――ぷみっ――）
1767 = "（Xoa xoa——nắn nắn——chạm nhẹ——nắn nắn——）"
# monologue
# JP: れいなの感じるところなら、\n前回触れて、見て勉強した。
1666 = "Những điểm nhạy cảm của Reina,\nlần trước chạm vào, tôi đã nhìn và học được rồi."
# monologue
# JP: まずは愛らしい乳首を丁寧に愛撫して、\n脇をつたって、指をじわじわと下げていく。
1681 = "Đầu tiên, tôi cẩn thận âu yếm hai đầu nhũ hoa xinh xắn,\nrồi men theo mạn sườn, từ từ đưa những ngón tay xuống dưới."
# monologue
# JP: （つっ――さすっ――さわわわわ）
# 1768 = "（撫摸）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃん――んっ――わきばら――くすぐったいで――\nふあっ――んっ！」
1052 = "「Hyan——ưm——mạn sườn——nhột quá——\nHa——ưm!」"
# monologue
# JP: 足のつけねの線をなぞって、そのまま指は股間へと。
1501 = "Lần theo đường rãnh ở gốc đùi, những ngón tay cứ thế hướng thẳng đến vùng kín."
# monologue
# JP: かわいい肉芽と縦のラインを、\n傷つけないよう柔かに、しつこくしつこくこしこしなぞる。
1515 = "Hạt ngọc đáng yêu và đường rãnh dọc,\ntôi vuốt ve, chà xát thật nhẹ nhàng để không làm tổn thương cô bé, nhưng lại vô cùng dai dẳng."
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ――あっ――ふあっ――あっ――おまた――\nきもち――いい――です、よぉっ――んうっ」
1180 = "「Hya——a——ha——a——bên dưới——\nsướng——quá——ạ~——ưm」"
# monologue
# JP: （こしゅっ――さすっ――ぷりゅっ――さしゅんっ）
1765 = "（Xoa xoa——vuốt ve——nhóp nhép——sột soạt）"
# monologue
# JP: 指全体に、すぐさま蜜が絡み始める。
1650 = "Mật dịch lập tức bắt đầu quấn lấy toàn bộ ngón tay tôi."
# monologue
# JP: それを伸ばして、塗りこむように、\nしつこくしつこく動かして――
1476 = "Tôi kéo dài nó ra, như thể đang bôi trơn,\ndi chuyển ngón tay thật dai dẳng, thật dai dẳng——"
# monologue
# JP: （くぱあっ）
1740 = "（Tách ra）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ」
1056 = "「Hya」"
# monologue
# JP: 割れ目を大きく指で開けば、恥ずかしそうな声をあげ、\nれいななくんを抱いている手に、きゅっと力が込められる。
1487 = "Khi tôi dùng ngón tay tách rộng khe hở, cô bé khẽ thốt lên một tiếng rên ngượng ngùng,\nđôi tay đang ôm bé số 07 siết chặt lại."
# monologue
# JP: 肉のピンクをした内側も、恥ずかしそうに、\n待ち遠しそうに、てらてらと濡れ、震えてる。
1420 = "Phần thịt màu hồng bên trong, cũng như đang xấu hổ,\nnhư đang mong chờ, ướt át bóng loáng, và run rẩy."
# 【双鉄H】
# display as 雙鐵
# JP: 「おしっこ我慢の特訓だ。\nおしっこの穴を、重点的に刺激せねばな」
1196 = "「Đây là đặc huấn nhịn tè.\nNên phải kích thích tập trung vào lỗ tiểu mới được.」"
# monologue
# JP: 肉芽と、膣穴の間に小さく、\nぴくぴく震える穴が開いてる。
1628 = "Giữa hạt ngọc và lỗ âm đạo, có một cái lỗ nhỏ,\nđang giật giật run rẩy, tôi mở nó ra."
# monologue
# JP: あれほど勢いのある尿が、\nこんな小さな穴から出るとは信じられんが――
1597 = "Dòng nước tiểu với lực bắn mạnh mẽ đến thế,\nthật khó tin lại tuôn ra từ một cái lỗ nhỏ xíu nhường này——"
# monologue
# JP: （くぷっ）
# 1740 = "（咕啾）" 
# 【れいな】
# display as 玲奈
# JP: 「んひゅ――あっ――おくちっ――んっ――ふうっ」
1046 = "「Ưm——a——miệng——ưm——phù」"
# monologue
# JP: （れろっ――れるっ――つんっ――ちゅぷうっ）
1756 = "（Chụt——chụt——chụt——chụt）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ――あっ――べろっ――べろぉっ――んっ、\nそうてつ、さんの、べろ――べろ――がぁっ」
1049 = "「Hya——a——liếm——liếm——ưm,\nlưỡi——của anh——Soutetsu——lưỡi——」"
# monologue
# JP: （つっ――つつんっ――ぺろっ――ぺりゅうっ）
# 1756 = "（啾嚕、啾嚕、啾嚕）" 
# 【れいな】
# display as 玲奈
# JP: 「んきゅっ――ふっ――あっ――れいな――れいなぁ――\nおしっこの、あな――つんつん、ぺろぺろ――され、て」
1053 = "「Ưm——phù——a——Reina——Reina——\nlỗ tiểu——bị chọc chọc, liếm liếm——rồi」"
# monologue
# JP: （じわあっ）
1769 = "（Rỉ ra）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1070 = "「啊！」" 
# monologue
# JP: 何かが、滲む。
1522 = "Có thứ gì đó, rỉ ra."
# monologue
# JP: 軽い塩味とかすかな苦味が、\n僕の舌先に乗っかってくる。
1531 = "Vị mằn mặn nhè nhẹ và chút vị đắng thoang thoảng,\nđọng lại trên đầu lưỡi tôi."
# monologue
# JP: （れるっ――れろっ――ちゅく――ちゅむんっ）
# 1756 = "（啾嚕、啾嚕、啾嚕）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ――あっ――んっ――んんっ――ふあっ――\nやっ――したっ――ぬりゅう、って――ふあ――あっ」
1001 = "「Hya——a——ưm——ưm——ha——\nÁ——bên dưới——nhầy nhụa, rồi——ha——a」"
# monologue
# JP: ……だけれど、それは続かない。
767 = "......Thế nhưng, nó không kéo dài."
# monologue
# JP: わずかに舌先はしめっただけで、\nその先刺激を重ねても、もう滲んでくるものは無い。
1380 = "Đầu lưỡi tôi chỉ hơi ướt một chút,\nsau đó dù có kích thích thêm bao nhiêu, cũng không có gì rỉ ra nữa."
# monologue
# JP: （れりゅうううううううううううっ――つぷっ！）
1758 = "（Chụtttttt——chụt!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃ――ん！！　んっ――ひゃっ――おまた――\nれいなっ――それ――ぺろぺろっ――すきぃっ」
1067 = "「Hya——n!! Ưm——hya——bên dưới——\nReina——chỗ đó——liếm liếm——thích lắm」"
# monologue
# JP: （れろっ――れりゅっ――ぺろおっ――れるっ）
# 1756 = "（啾嚕、啾嚕、啾嚕）" 
# monologue
# JP: そのまま舌を舐めずらし、\n膣穴を舐め、しゃぶってほじる。
1486 = "Tôi cứ thế trượt lưỡi đi,\nliếm láp lỗ âm đạo, mút mát và ngoáy ngoáy."
# monologue
# JP: （れりゅっ――れろっ――れろおおっ――ざりゅっ！）
1755 = "（Chụt——chụt——chụt——rột!）"
# 【れいな】
# display as 玲奈
# JP: 「きゅふうっ！　んっ――ふううううっ――んっ！\nそこ――ざらざら、の――はっ――きもち――い、いっ」
1064 = "「Kyu! Ưm——fuuuuu——ưm!\nChỗ đó——nham nhám——ha——sướng——quá」"
# monologue
# JP: 膣がキュンキュン縮小し、\n僕の舌先からなんとか精をしぼろうとする。
1419 = "Âm đạo co bóp liên hồi,\nnhư muốn vắt kiệt tinh dịch từ đầu lưỡi tôi."
# monologue
# JP: このぬらつきを、締め付けを、勃起で全部受け止めたい\n――否応なしに、そう思わされてしまうほど。
1450 = "Sự nhầy nhụa này, sự siết chặt này, tôi muốn dùng sự cương cứng để đón nhận tất cả\n——Đến mức tôi bất giác bị ép phải nghĩ như vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――あっ――れいな。いいか？」
1182 = "「Phù——a——Reina. Được chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「はい。そうてつさん――れいな、れいな、\nそうてつさんに、きて、ほしいですぅ」
1099 = "「Vâng. Anh Soutetsu——Reina, Reina,\nmuốn anh Soutetsu, vào, ạ~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、我慢を――\n一緒に、おもらしを乗り越えよう」
1207 = "「Vậy thì, hãy cố nhịn nhé——\nCùng nhau, vượt qua chuyện tè dầm nào.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。れいな、がんばります――よ、ぉ」
1118 = "「Vâng ạ~. Reina, sẽ cố gắng——ạ~, ưm」"
# monologue
# JP: （れるっ――にゅるっ――にゅりゅりゅ――ぬるっ）
# 1756 = "（啾嚕、啾嚕、啾嚕）" 
# monologue
# JP: 太ももにまで滴っているれいなの蜜を、\n勃起にたっぷりなすりこむ。
1578 = "Tôi bôi thật nhiều mật dịch của Reina đang nhỏ giọt xuống tận đùi,\nlên sự cương cứng của mình."
# monologue
# JP: 縦スジの、割れ目を抉ってこする快感をたっぷり楽しみ、\nゆっくりゆっくり、亀頭を膣へと食い込ませていく。
1462 = "Tận hưởng trọn vẹn khoái cảm khi chọc ngoáy và cọ xát vào khe hở rãnh dọc,\ntôi từ từ, từ từ, ấn quy đầu vào âm đạo."
# monologue
# JP: （ぬっ――ぷっ――ぬうっ――ぬっ――）
# 1756 = "（啾嚕、啾嚕、啾嚕）" 
# 【れいな】
# display as 玲奈
# JP: 「はっっっ――あっ――あつい、のっ――\nふとい、のっ――んっ――れいなに――ささ、って」
1186 = "「Ha——a——nóng, quá——\nto, quá——ưm——đâm vào——Reina, rồi」"
# monologue
# JP: （ぬっ――ぷっ！）
# 1739 = "（咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃぷっ――んっ――あっ？　あ――んうっっ」
1045 = "「Hya——ưm——a? A——ưm」"
# monologue
# JP: 亀頭の先っぽ、そこまでを挿れたところであえて止まれば、\nれいなは戸惑い、焦れったそうな声を出す。
1468 = "Tôi cố tình dừng lại khi mới chỉ đưa phần đỉnh quy đầu vào,\nReina bối rối, cất giọng đầy sốt ruột."
# 【れいな】
# display as 玲奈
# JP: 「はっ――んっ――ふあッ――んっ――\nもっと――もっと――ね、そうてつ――さぁ、んっ――」
1027 = "「Ha——ưm——ha——ưm——\nNữa đi——nữa đi——nha, anh Soutetsu——ưm——」"
# monologue
# JP: （ぐりっ――ふりっ――）
1735 = "（Ngoáy——ngoáy——）"
# monologue
# JP: れいなが腰を、不器用にふりふり動かしはじめる。
1589 = "Reina bắt đầu vụng về lắc lắc hông."
# monologue
# JP: ぬいぐるみをぎゅっと抱きしめたまま、\n性の快感を求める雌の動きを僕に見せつける。
1392 = "Vẫn ôm chặt con thú bông,\ncô bé phô bày cho tôi thấy chuyển động của một con cái đang khao khát khoái cảm tình dục."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1031 = "「!」"
# monologue
# JP: （ずぶうううううううううううっ！！！）
1759 = "（Phậpppppppppp!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうううううっ！！？」
1040 = "「Hyaaaaaa!!?」"
# monologue
# JP: そんな姿を見せつけられて、僕とて止まっていられない！
1498 = "Bị phô bày cho thấy dáng vẻ ấy, tôi cũng không thể dừng lại được!"
# monologue
# JP: （ずぶっ！　ずっ！　ずりゅっ！　ごりゅうっ！！！）
1736 = "（Phập! Phập! Phập! Rột!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ！　あっ！　いきっ――なりっ――あっ！\nんひゅっ！　ひゃっ――おなか――ささっ――って――」
1042 = "「Hya! A! Đột——nhiên——a!\nƯm! Hya——bụng——bị đâm——rồi——」"
# monologue
# JP: （ぐっ――ぐいいっ――ごいりゅ――ぐりゅっ――）
1732 = "（Phập——phập——phập——phập——）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃふっ――あっ――おくっ――いちばん――\nおな、か――いちばん――ぐりぐり、され――ひゃう！」
1047 = "「Hya——a——sâu bên trong——tận cùng——\nbụng——tận cùng——bị ngoáy, ngoáy——hya!」"
# monologue
# JP: （ずろおおおおおっ！　ぐっ！　ぞり！　ぞりゅりゅ！）
1737 = "（Phậpppppp! Phập! Rột! Rột!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃんっ！　うひゅっ――あっ――ぞり、って――\nそこっ――そこ、されちゃうと――れいな――れいなぁ」
1068 = "「Hyan! Ư——a——bị cọ xát——\nChỗ đó——bị làm chỗ đó thì——Reina——Reina」"
# monologue
# JP: （キュウウウウっ！）
1771 = "（Siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！？」
1072 = "「!?」"
# monologue
# JP: おしっこを我慢したのだろうか、\nただでさえキツいれいなの膣が、凶悪なまでに締めてくる。
1541 = "Không biết có phải đang nhịn tè hay không,\nâm đạo vốn dĩ đã khít của Reina, nay lại siết chặt đến mức hung bạo."
# monologue
# JP: （ずぶううううううっ！　ずんっ！　ごつっ！）
1734 = "（Phậpppppp! Phập! Bạch!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！　あっ――おなか――めくれっ――るっ！――\nふあっ――ささる――の――ふかいっ――ふか、くてっ」
1065 = "「Hya! A——bụng——như bị lộn ngược——ra!——\nHa——đâm vào——sâu——sâu, quá」"
# monologue
# JP: （ぬぷうううううううううううっ！！）
1733 = "（Phậpppppppppp!!）"
# 【れいな】
# display as 玲奈
# JP: 「はうっ――あっ――はがれ――ちゃうっ――ん、ふっ、\nあうっ――いっちゃ――や、らっ――やぁっ――」
1026 = "「Hau——a——như bị bong——ra——ưm, phù,\nAu——sắp ra——không, được——không——」"
# monologue
# JP: 締めを厭わず、大きく腰をスライドさせれば、\nれいなは可愛く震えてあえぐ。
1460 = "Bất chấp sự siết chặt, tôi trượt hông một biên độ lớn,\nReina run rẩy và rên rỉ một cách đáng yêu."
# monologue
# JP: おしっこは未だこぼれもせぬが、僕の方がもう――\n二度目の射精を、抑えきれなくなりかけている。
1412 = "Dù nước tiểu vẫn chưa tràn ra, nhưng phía tôi thì đã——\nSắp không kìm nén được lần xuất tinh thứ hai nữa rồi."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな――このまま――思いっきり、動いていいか」
1158 = "「Reina——cứ thế này——anh làm mạnh bạo, được không.」"
# 【れいな】
# display as 玲奈
# JP: 「おもいっきり――おもいっきり――ふあっ――\nそうてつ、さんの――おもい、きり――」
1174 = "「Mạnh bạo——mạnh bạo——ha——\ncủa anh, Soutetsu——mạnh, bạo——」"
# monologue
# JP: （きゅきゅん！）
# 1771 = "（縮緊！）" 
# monologue
# JP: うわごとのように溶ける言葉と、\nもうどろどろの膣のわななき。
1552 = "Những lời nói tan chảy như mê sảng,\nvà sự run rẩy của âm đạo đã nhầy nhụa ướt đẫm."
# monologue
# JP: 心と体のＧＯをもらえば、\n僕も一気に、心と体で加速する！
1518 = "Nhận được sự cho phép từ cả tâm hồn và thể xác,\ncả tâm hồn và thể xác tôi cũng tăng tốc trong một chớp mắt!"
# monologue
# JP: （じゅぶっ！　ずばっ！　ずぱんっ！　じゅぱんっ！）
1731 = "（Phập! Phập! Phập! Phập!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ！　あっ！　おくっ――おくぅっ――\nごんっって――されて――さきっぽ――さき、でぇ」
1062 = "「Hya! A! Sâu bên trong——sâu bên trong——\nBị đâm——bạch bạch——phần đỉnh——đỉnh, ấy」"
# monologue
# JP: （ごっ！　ごつんっ！　ごりゅっ！　ぐりゅっ！）
1747 = "（Bạch! Bạch! Rột! Rột!）"
# 【れいな】
# display as 玲奈
# JP: 「はうっ――そこ――いきどまり――なの、ぉっ――\nごつって、されたら――らめっ――はいっちゃ、うっ」
1054 = "「Hau——chỗ đó——là ngõ cụt——mà——\nBị đâm bạch bạch——không được——vào mất, rồi」"
# monologue
# JP: 腰をふるたび、面白いようにれいなが揺れる。\nずりずりと、その腰は押され、動いてしまう。
1456 = "Mỗi lần tôi nhấp hông, Reina lại rung rắc trông thật thú vị.\nCái hông ấy cứ bị đẩy tới đẩy lui, xê dịch đi mất."
# monologue
# JP: （ずぶっ！　じゅっ！　ずりゅううっ！　ずんっ！）
# 1731 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひあっ！　あっ！　あうっ――ふあっ――\nそうてつ、さんっ――そうてつ、さぁんっ！」
1061 = "「Hya! A! Au——ha——\nAnh Soutetsu——anh Soutetsu!」"
# monologue
# JP: けれどれいなは、\n自分の力で腰を逃さず、戻し留める。
1360 = "Thế nhưng Reina,\nđã dùng sức lực của chính mình để giữ hông lại, không cho nó trượt đi."
# monologue
# JP: ぬいぐるみを懸命に抱きしめて、それを楔とするように、\n僕の勃起を、腰の動きを、貪欲に求め食いついてくる。
1399 = "Cô bé ôm chặt con thú bông một cách tuyệt vọng, như dùng nó làm điểm tựa,\nthèm khát và cắn nuốt lấy sự cương cứng, lấy chuyển động hông của tôi một cách tham lam."
# 【双鉄H】
# display as 雙鐵
# JP: 「れいな――れいなっ！　僕は――もうっ」
1162 = "「Reina——Reina! Anh——ra mất」"
# monologue
# JP: 愛おしい、かわいい、たまらない。
1551 = "Đáng yêu, dễ thương, không thể chịu nổi."
# monologue
# JP: 思いはすぐに精液になり、\n尿道を圧迫し遡ってくる。
1492 = "Suy nghĩ ấy lập tức hóa thành tinh dịch,\nchèn ép niệu đạo và trào ngược lên."
# 【れいな】
# display as 玲奈
# JP: 「そう、てつ――さぁ、んっ――ひっ――あひゅっ――\nんっ――れいなっ――れいな――もっ」
1210 = "「Anh, Soutetsu——ưm——hi——a——\nƯm——Reina——Reina——cũng」"
# monologue
# JP: （きゅっ！　きゅきゅんっ！　きゅうっ！）
# 1771 = "（縮緊！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1070 = "「啊！」" 
# monologue
# JP: 熱い。狭い。吸い付かれてる。\nぬかるんでいる。締め付けられてる。気持ちいい。
1613 = "Nóng bỏng. Chật hẹp. Đang bị mút chặt.\nĐang lầy lội. Đang bị siết chặt. Sướng quá."
# monologue
# JP: れいなの膣は僕の精液を絞るそのためだけに蠢き、\n絶頂が近いということを、声高に教えてくれている！
1425 = "Âm đạo của Reina ngọ nguậy chỉ để vắt kiệt tinh dịch của tôi,\nnhư đang lớn tiếng thông báo rằng cô bé sắp lên đỉnh rồi!"
# 【双鉄H】
# display as 雙鐵
# JP: 「れいなっ――れいなっ！」
1163 = "「Reina——Reina!」"
# 【れいな】
# display as 玲奈
# JP: 「そおてつさんっ――そおてつさぁんっ！！」
1211 = "「Anh Soutetsu——anh Soutetsu!!」"
# monologue
# JP: （ずばっ！　ずぶっ！　ずぶううっ！　ごつっ！）
# 1731 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃうっ！」
1057 = "「Hya!」"
# monologue
# JP: れいなの一番奥の扉も、\n僕の亀頭に吸い付くようにぺっとりしてくる。
1590 = "Cánh cửa tận cùng sâu thẳm nhất của Reina,\ncũng dính chặt lấy như muốn mút lấy quy đầu của tôi."
# monologue
# JP: ならばとねじり密着させて、\n精液をいってきたりともこぼさぬように――
1516 = "Nếu đã vậy, tôi vặn người áp sát vào,\nđể tinh dịch không trào ra ngoài dù chỉ một giọt——"
# monologue
# JP: （ぐりいいいいいいいいいいいっ！！！）
1757 = "（Phậpppppppppp!!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゅふぅぅぅぅぅぅぅぅぅぅぅぅぅぅっんっ！」
1089 = "「Hyuuuuuuuuuuuuuuuuu!」"
# monologue
# JP: （きゅむうううううううっ！！）
1770 = "（Siết chặtttttt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1031 = "「唔！」" 
# monologue
# JP: （んびゅっ！　びゅううっ！　どびゅっ！　びゅぶる！）
1744 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 絞られている。吸われてる。\n僕の精液がれいなの奥に、貪欲なまでに呑まれてる。
1422 = "Đang bị vắt kiệt. Đang bị mút lấy.\nTinh dịch của tôi đang bị nuốt chửng một cách tham lam vào tận sâu bên trong Reina."
# monologue
# JP: （ぶりゅっ！　びゅぶっ！　ぶうっ！　びゅぶるっ！）
1743 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【れいな】
# display as 玲奈
# JP: 「ふぇっ――ふあっ――はっ――はぅぅ――」
1183 = "「Fe——ha——ha——hau——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1031 = "「唔！」" 
# monologue
# JP: 精の豪雨を最奥に浴び、れいなは脱力しきってる。
1574 = "Tắm mình trong cơn mưa tinh dịch ở tận cùng sâu thẳm, Reina đã hoàn toàn kiệt sức."
# monologue
# JP: この瞬間――\n特訓の成果を計るために、今こそ、あえて！
1663 = "Khoảnh khắc này——\nĐể đo lường thành quả đặc huấn, chính lúc này, tôi sẽ cố tình!"
# monologue
# JP: （ぬぶうううううううううううっ――くぽっ）
1730 = "（Phậpppppppppp——bạch）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃあああんっ」
1002 = "「Hyaaaaaan」"
# monologue
# JP: （んびゅ！　びゅるるっ！　びゅうっ！　びゅぶっ！）
# 1742 = "（咻咻！咻咻！咻咻！咻咻！）" 
# monologue
# JP: まだ射精を終え切ってもない勃起をずるり引き抜けば、\n膣はいやだとしがみつき、れいなも未練の声を出す。
1483 = "Khi tôi rút sự cương cứng vẫn chưa xuất tinh xong ra,\nâm đạo bám riết lấy như không muốn, Reina cũng thốt lên tiếng kêu luyến tiếc."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1031 = "「唔！」" 
# monologue
# JP: ぬいぐるみを汚してしまわぬように、\n勃起を掴んで狙いを定め、あるべきところへ――
1500 = "Để không làm bẩn con thú bông,\ntôi nắm lấy sự cương cứng, nhắm chuẩn mục tiêu, hướng về nơi cần đến——"
# monologue
# JP: （びゅっ！　ぶびゅっ！　びゅるっ――ぷっ――ぴゅ）
1741 = "（Phụt! Phụt! Phụt——phụt——phụt）"
# monologue
# JP: れいなのおまんこ、膣へと向けて、\n精の全部を、余すことなく、降り注がせる。
1478 = "Hướng về phía âm đạo của Reina,\ntôi trút toàn bộ tinh dịch xuống, không sót lại một giọt nào."
# monologue
# JP: （く――ぽおっ）
# 1740 = "（咕啾）" 
# monologue
# JP: ……膣穴は、挿入されたそのままの形をまだ残してる。
771 = "......Âm đạo vẫn giữ nguyên hình dáng như lúc bị đâm vào."
# monologue
# JP: そこからは、精液がこぷりと溢れ、\n今降り注いだ精液と、もう区別できず交じり合ってく。
1607 = "Tinh dịch từ đó trào ra sùng sục,\nvà hòa lẫn không thể phân biệt được với lượng tinh dịch vừa mới trút xuống."
# 【れいな】
# display as 玲奈
# JP: 「ふぁっ――はあっ――あっ――ふぁぁっ――」
1185 = "「Ha——ha——a——ha——」"
# monologue
# JP: 完全に、れいなは脱力しきってる。
1580 = "Reina đã hoàn toàn kiệt sức."
# monologue
# JP: あれほど強く抱きしめていた、\nぬいぐるみにすがる手さえも、もう緩んでる。
1369 = "Đôi tay từng ôm chặt lấy con thú bông đến vậy,\nnay cũng đã buông thõng."
# 【れいな】
# display as 玲奈
# JP: 「ん……すき……しゅき……だいしゅきい……\nそおてつ……さぁんっ――んっ」
786 = "「Ưm......thích......thích......thích nhất......\nanh Soutetsu~——ưm」"
# monologue
# JP: 声さえももううわ言のように垂れ流されて――
1403 = "Đến cả giọng nói cũng buông tuồng như đang nói mớ——"
# monologue
# JP: けれども、まったく、一滴たりとも――\n尿道口から、溢れ出てくる液体は無い。
1358 = "Thế nhưng, hoàn toàn không có lấy một giọt——\nchất lỏng nào trào ra từ lỗ niệu đạo."
# 【双鉄H】
# display as 雙鐵
# JP: 「よく、頑張ったなれいな」
984 = "「Em cố gắng lắm rồi, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「あ――ふあっ――」
1036 = "「A——ha——」"
# monologue
# JP: 呆、としていたれいなの瞳に、光が戻る。
1545 = "Đôi mắt vốn đang đờ đẫn của Reina, nay đã lấy lại được tiêu cự."
# 【双鉄H】
# display as 雙鐵
# JP: 「そこまでとろとろに溶けながら、\nよく、おもらしをしなかった。特訓は、見事に大成功だ」
988 = "「Dù đã tan chảy nhũn ra đến thế,\nmà em vẫn nhịn được không tè dầm. Đặc huấn đã thành công mỹ mãn rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「あ……えへっ――えへへへえぇ。\nそうてつさんと、れいななくんのおかげですねぇ」
1035 = "「A......e he——e he he he.\nTất cả là nhờ anh Soutetsu và bé số 07 đó ạ~」"
# monologue
# JP: 満面の笑み。
1564 = "Một nụ cười rạng rỡ."
# monologue
# JP: ご褒美のキスをおでこに贈れば、\nれいなはもう、幸せを固めたような顔をする。
1477 = "Khi tôi trao một nụ hôn lên trán như một phần thưởng,\nkhuôn mặt Reina đã ngập tràn niềm hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「れいなもちゃあんと、大人のセックスできましたねぇ。\nうれしいですよぉ、ほーっとしました」
1164 = "「Reina cũng đã có thể làm tình như người lớn rồi nhỉ.\nVui quá đi mất, nhẹ cả người rồi ạ~」"
# monologue
# JP: ほにゃり。\n表情はゆるみにゆるみ――
1576 = "Nhũn ra.\nBiểu cảm thả lỏng, vô cùng thả lỏng——"
# monologue
# JP: （ちょろっ――）
1761 = "（Róc rách——）"
# monologue
# JP: そして、水音。\nそれはすぐさま、水の流れる音へと変わる。
1534 = "Và rồi, tiếng nước.\nNgay lập tức, nó biến thành tiếng nước chảy rào rào."
# monologue
# JP: （ちょろろろろろろろろろろろろ～）
1760 = "（Róc rách róc rách róc rách róc rách róc rách róc rách~）"
# 【れいな】
# display as 雙鐵＆玲奈
# JP: 『「ぬっ！？」\n「ひゃああんっ！」』
1216 = "『「Hả!?」\n「Hyaaaan!」』"
# monologue
# JP: ……油断大敵。
769 = "......Cẩn tắc vô áy náy."
# monologue
# JP: その四文字を心に刻み、僕らは次なる特訓のため、\n今はともかく――尿処理をする。
1465 = "Khắc sâu câu nói đó vào lòng, để chuẩn bị cho lần đặc huấn tiếp theo,\ntrước mắt thì——chúng tôi dọn dẹp bãi chiến trường."
