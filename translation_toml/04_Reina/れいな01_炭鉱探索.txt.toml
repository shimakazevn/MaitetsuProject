# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえっ。\nその……炭鉱開発のことです。それで、ちょっと」
1585 = "「啊，沒有。那個……是關於煤炭開發的事。這件事有點——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「難しそうなのか？」
1843 = "「有點難辦嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、許認可とかは取れそうで……\n助成金も、あるみたいなんですけど」
2004 = "「那個，許可一類的東西應該能拿到……聽說還有補助金」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助成金？」
1961 = "「補助金？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。“技術継承炭鉱”っていうのに採用されれば、\n国の助成金が出るそうです」
1818 = "「是的。據說如果被認定為“技術繼承煤礦”，國家就會下撥補助金」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。採炭の技術を途絶えさせないためか。\n願ったり叶ったりの話じゃないか」
1505 = "「原來如此。是為了防止採煤技術失傳嗎。這不是求之不得的事嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうなんですけど……」
1834 = "「是這樣沒錯……」" 

# monologue
# JP: 喜ばしいはずの話であるのに、\nどうにもポーレットの言葉が重い。
2400 = "明明是一件值得高興的事，波萊特的語氣卻格外凝重。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ……\n銀行さんにも協力をお願いして作ったものです」
1987 = "「這個……是我拜託銀行算出來的」" 

# monologue
# JP: 申し訳無さそうな顔をして、\n数枚のペーパーを差し出してくる。
2303 = "她滿臉愧疚地將幾張紙遞給了我。" 

# monologue
# JP: 一目みたならその途端、\n僕もまた、ポーレットと似たような表情を強いられる。
2228 = "光搭眼一看，我就不由得做出了與波萊特相似的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……採算ギリギリ――というか、\n赤字の見込みの方が濃厚なのか」
1986 = "「這……只能勉強維持盈利——倒不如說，反而是赤字的可能性更大些啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、本格的に機械を動かしての採掘となると――\n最低限の規模にしても経費が跳ね上がっちゃいますから」
1677 = "「如果要動用機器正式開採——即使控制在最小的規模，經費還是會大幅飆升」" 

# 【双鉄】
# display as 雙鐵
# JP: 「機械、人員、設備維持――\x%l列車;#00ffc040;列車%l;#;収入など焼け石に水だな。\nこれは、もし助成金が打ち切りになりでもしたら」
1849 = "「機器、人員、設備維護——\\x%l列車;#00ffc040;列車%l;#;的收入根本是杯水車薪啊。如果哪一天，國家停止下撥補助金——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。その時点からマイントレジャーは、\n赤字を掘り出す[せきたんこう,2]赤炭鉱になっちゃいます」
1806 = "「是啊。若是那樣，煤探樂園就會立刻變成出產赤字的“赤煤礦”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは勘弁願いたいな。\nなんとか、助成金に頼らずにやっていく方法を考えねば」
2012 = "「那樣可不行啊。必須找出一個不需要依賴補助金的辦法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……」
1797 = "「是啊……」" 

# monologue
# JP: ポーレットがちら、とれいなを見る。
2438 = "波萊特瞄了一眼身邊的玲奈。" 

# monologue
# JP: 知識を持っているはずの――あるいはそうであるからこそ、\nれいなは、黙りこくってる。
2479 = "玲奈明明擁有相關的知識，卻一直默不作聲——又或者，是正因為明白才選擇了沉默。" 

# 【ポーレット】
# display as 波萊特
# JP: 「石炭を売る先が見つかれば、\nそれがもちろん、ベストな解決策なんですけど」
1675 = "「如果能為煤炭找到買家，當然是最好的解決辦法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？　というか、売るほど掘るのか？\n生産調整をしても、発電に必要な分だけを掘った方が」
1622 = "「嗯？等等，要採到銷售級的量嗎？我覺得應該限額生產，只採挖發電所需的量」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうはいかないみたいなんです。\nええと、資料の……ここ、ですね」
1588 = "「啊，這好像是行不通的。我看看，在資料的……這一頁」" 

# monologue
# JP: 示されたページに目を通す。
2364 = "我看了看她所指出的這一頁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ほぅ。あの発電所は、売り物にならない\n[ていひんいたん,3]低品位炭というものを使って火力発電するのか」
1099 = "「……原來如此。那座發電廠會使用賣不出去的劣質煤進行火力發電啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。『[なまだ,1]生焚き発電』っていうらしいです。\nだから、[こうひんいたん,3]高品位炭はそのまま手付かずで残ります」
1819 = "「是的。據說這叫“原煤燃燒發電”。所以，優質煤會原封不動地保留下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても[ハチロク,3]8620で消費しきる量でも無いな。\nならば……買ってくれる相手をどうにか見つけて――」
1683 = "「實在不是８６２０能用得完的量啊。那麼……要想辦法找到買家——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。販路を開拓できれば――\n八方丸く収まるんですよね。本当に」
1798 = "「是啊。如果真能找得到銷路，就什麼都好說了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ……」
1594 = "「嗯……」" 

# monologue
# JP: 御一夜-湯医間だけで孤立している僕らの線路が、\nそのまま販路の、象徴のように思えてしまう。
2349 = "我們那張被孤立於御一夜至湯醫之間的鐵路網，直接反映了目前的銷路情況。" 

# monologue
# JP: もしも、線路が続いていても、\nそれほど楽に売れるものとも思えん、が――
2609 = "雖說即使鐵路得到拓展，也不見得就能有好的銷量——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ちなみに、れいな。石炭というのは、どのような場所で\n用いられているものなのだ？」
1690 = "「對了，玲奈。煤炭這東西，一般都用在哪裡呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「[ひのもと,2]日ノ本国内では昔も今も、火力発電所と製鉄所とで\nほとんどだって、れいな、聞いたことがありますよぉ」
1907 = "「玲奈聽說無論是過去還是現在,日本國內一般都把它是用於火力發電廠以及煉鐵廠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「製鉄所なら、[きゅうしゅう,1]九洲にも大きな――\n[ふくおか,1]福丘の[やわた,1]矢幡などがあるよな」
1969 = "「要說煉鐵廠，九州也有大規模的——在福岡縣八幡市對吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、今使われてるのは[ゆにゅうたん,2]輸入炭です。\n安くて、質が良いそうなんです。[こくないたん,2]国内炭より」
1472 = "「但是那邊目前使用的是進口煤。據說比國內煤便宜，品質也更好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕も聞いたことがある。品質と価格競争とで負け、\n国内の炭鉱はことごとく閉鎖においやられたと」
1611 = "「嗯，我也有所耳聞。國內煤礦在品質及價格競爭中敗下陣來，接連關閉」" 

# monologue
# JP: あのあたり――北九洲工業地帯なら、もちろん[ちくほう,1]築豊炭田を、\nもともとの石炭の供給先としていたはずだ。
2411 = "毫無疑問，北九州工業地帶原本的煤炭提供方，應該是築豐煤田。" 

# monologue
# JP: ……どこも似たような運命をたどるものだなと、\nなんとももの悲しく思う。
1075 = "……一想到各地的煤礦都有著相似的命運，不免感到一絲悲涼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「残念ですけど。今後とも、コストパフォーマンスで、\n輸入炭に太刀打ちできるようになるとは思えません」
1717 = "「很遺憾，在性價比方面，我們今後仍然無法與進口煤相抗衡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「当然だろうな。故に、価格と品質以外の部分で、\n何らかの売りを創りださねばならん」
2010 = "「那是自然。因此，我們必須在價格及品質以外的方面創造賣點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え」
1528 = "「咦」" 

# monologue
# JP: きょとんとした顔。\nポーレットの口がポカンと開いてる。
2431 = "波萊特似乎有些訝異，呆呆地微張著嘴。" 

# 【双鉄】
# display as 雙鐵
# JP: 「専門家が血の滲むような努力を重ねたそのあげく、\n価格と品質では勝てなかったのだろう？　なら」
1689 = "「專業人士們曾經絞盡腦汁，最終還是無法在價格與品質上戰勝進口煤不是嗎？既然如此——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい。そうですよね、それは、そう」
1556 = "「啊——是的。說得也對呀，的確是這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、プラスアルファを提示しなければならない。\n大きなメリットを、石炭と抱合せで買ってもらうのだ」
1641 = "「因此，必須找出額外的賣點。將一個巨大的好處，與煤炭捆綁銷售」" 

# 【ポーレット】
# display as 波萊特
# JP: 「メリットを売るオプションで、\n一緒に石炭も買ってもらう……みたいな感じですか」
1445 = "「主賣這一個好處，同時給出與煤炭一同購買的選項……是這樣嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。とはいえ石炭だって無駄になるまい。\n輸入は、為替変動や政変というリスクを伴ってもいるし」
1863 = "「沒錯。而購買煤炭花的也不是冤枉錢。進口品始終伴隨著匯率變動及政權更迭的風險」" 

# 【ポーレット】
# display as 波萊特
# JP: 「可能性。それなら、出てくるかもですね」
1991 = "「這樣的話，或許能看到一絲希望啊」" 

# monologue
# JP: こくり、ポーレットは静かに頷く。
2440 = "波萊特靜靜地點了點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「全量を切り替えて欲しいってことじゃないし。\n……パッケージで、予備扱い的に買い取ってもらうなら」
1734 = "「我們也不要求對方將進口煤全部替換為國產煤……只希望他們採購一些煤炭作儲備用」" 

# 【れいな】
# display as 玲奈
# JP: 「はわぁ！」
1541 = "「哈哇！」" 

# monologue
# JP: ポーレットは僕よりよほど現実的で、\n広く社会を知っている。
2439 = "波萊特遠比我更加腳踏實地，也有著更多的社會經驗。" 

# monologue
# JP: その頷きと同意の意味を、れいなはきっと、\n僕以上に良く知ってるのだろう。
2466 = "玲奈一定比我更加清楚波萊特的點頭到底意味著什麼。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはすごいですねぇ！\nれいな、さいしょからダメって思っちゃってましたぁ」
2025 = "「雙鐵先生真厲害！玲奈原本從一開始就已經放棄了」" 

# monologue
# JP: 見上げる瞳は、まぶしいものを見るようだ。\nあまりにきらきらしていて少し、照れくさくなる。
2290 = "她仰頭望著我，就像望著一個有多麼偉大的人。我看到她這過分崇拜的目光，不禁有些難為情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「可能性がゼロでないなら、検討してみて損はない。\n僕はそう教わったし、ずっとそうして来ているだけだ」
1775 = "「既然不是完全沒有可能，那麼探討一下也沒有壞處。我就是受到了這樣的教育，一直以來也都是這麼做的」" 

# monologue
# JP: そう。\nその繰り返しが、今僕をここに立たせてる。
2414 = "沒錯。就是這樣一次次的探討與嘗試，使我如今站到了這裡。" 

# monologue
# JP: 他にやりようをしらない以上、\nベストを尽くし、それを今回も繰り返そう。
2395 = "既然沒有其它的辦法，那就盡人事、聽天命。這次也是一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「プラスアルファのアイディアを求める意味でも、\n[じゅつせん,1]術仙廃炭鉱近辺の追加調査を重ねたいのだが――」
1742 = "「我想再次對術仙廢煤礦周邊進行調查。就算是為了尋找額外的賣點，也有這麼做的必要……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。それはわたし、調整します。\n日々姫ちゃんたちにも協力してもらって――」
1577 = "「啊，好的。由我來做調整。再請日日姬她們來幫忙——」" 

# monologue
# JP: そこまで言って、ポーレットは急に口ごもる。
2584 = "話說到一半，波萊特突然沉默下來。" 

# monologue
# JP: どこか心配そうな目をして、\nれいなのことをじっと見つめる。
2510 = "用略帶擔憂的目光，靜靜地看著玲奈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ただ……わたし、助成金のこととか許認可のこととか、\n結構いろいろ、やること増えちゃいそうだから――」
1467 = "「但是……恐怕我接下來會因為許可及補助金一類的事情而忙碌起來——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている、そのために、\n\x%lキハ07;#00ffc040;キハ07%l;#;の運転を教えてもらったのではないか」
1745 = "「我明白。不正是因為這個，才請你教了我\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的駕駛方法嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうですよね……\nけど」
1608 = "「嗯。是這樣沒錯……可是」" 

# monologue
# JP: ポーレットの手が柔らかく伸び、\nゆっくりゆっくり、れいなの髪を撫でさする。
2436 = "波萊特溫柔地伸出手，慢慢地撫摸著玲奈的頭髮。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、平気？\nわたしがいなくても大丈夫？」
1892 = "「玲奈你不要緊嗎？我不在，你可以嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「平気かどうかは、やってみないとわからないけど。\nだけど、れいな、いっしょうけんめいがんばりますよぉ」
1966 = "「要不要緊，要試試才知道。但是，玲奈會好好努力的」" 

# monologue
# JP: れいなの笑顔に受け止められれば、\nポーレットの青い瞳を曇らせていた不安の影も薄れてく。
2575 = "見到玲奈對自己展露笑容，籠罩在波萊特藍色眼眸中的不安也漸漸散去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかった。じゃ、頑張ってみて！\nけど、困ったことがあったら、いつでも言うのよ？」
1666 = "「好的，那你就試試吧！不過，如果遇到什麼問題，隨時可以來找我商量哦」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。ポーレットも、がんばってくださいねぇ」
1659 = "「好的。波萊特也要加油哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん、頑張る。\nそれと――双鉄くん」
1614 = "「嗯，我會加油的。還有——雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2035 = "「！」" 

# monologue
# JP: 深々と、ポーレットが僕に頭を下げる。
2433 = "波萊特對著我深深地低下了頭。" 

# monologue
# JP: 閉じられた目の奥にある気持ちが伝わるように思えて――\nだからただただ、受け止める。
2333 = "從她緊閉的雙目中，我感覺到一份誠摯的情感——所以，我鄭重地接受了她的鞠躬。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなのこと、どうかよろしくお願いします」
1912 = "「玲奈，就拜託你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、任せておいてくれ」
1610 = "「嗯，包在我身上」" 

# monologue
# JP: そうする義務を、強く感じる。\nならば果たすべく、僕の全力を尽くしてみせよう。
2189 = "一股強烈的責任感油然而生。那就讓我盡全力去履行我的義務吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「運転も調査も、事故なく行う。\nその上で――きっと、何かを掴んでくるさ」
