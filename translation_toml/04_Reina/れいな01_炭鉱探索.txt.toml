# lines: 407 
# monologue
# JP: ざくざく、歩く。
2415 = "Bước đi xạo xạc."

# monologue
# JP: 夏草を踏み、完全に[うず]埋もれているかつてのレールに、\nその役割を思い出させる。
2348 = "Đạp lên đám cỏ dại mùa hè, trên đường ray\ncũ đã hoàn toàn bị vùi lấp,\ntôi nhớ lại vai trò của nó."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ハチロクには助けられたな」
1926 = "「Nhưng mà, may nhờ có Hachiroku giúp đỡ\nnhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。ちょっと盲点でした」
1804 = "「Đúng vậy. Quả là một điểm mù.」"

# monologue
# JP: 『でしたら、引けばいいのです。\x%l8620;#00ffc040;8620%l;#;で\x%lキハ07;#00ffc040;キハ07%l;#;を。\n\x%lキハ07;#00ffc040;キハ07%l;#;を動力車でなく、ただ\x%l客車;#00ffc040;客車%l;#;として引けばいい』
1070 = "『Nếu vậy thì, kéo là được thôi ạ. Dùng\n8620 để kéo KiHa 07.\nKhông dùng KiHa 07 làm toa động lực, mà\nchỉ kéo nó như một toa hành khách bình\nthường thôi』"

# monologue
# JP: そのハチロクの一言の上、日々姫と凪とが、\n\x%l機関士;#00ffc040;機関士%l;#;代理と助士とを見事に勤めてくれて――
2539 = "Nhờ câu nói đó của Hachiroku, Hibiki và\nNagi đã\nhoàn thành xuất sắc vai trò đại diện lái\ntàu và phụ lái tàu——"

# monologue
# JP: 結果、今日の定時の往復運行から、\nポーレットとれいなとは解放されたのだ。
2432 = "Kết quả là, Paulette và Reina đã được giải\nphóng khỏi\nchuyến đi khứ hồi định kỳ ngày hôm nay."

# 【ポーレット】
# display as 波萊特
# JP: 「一日フルに使えると、やっぱり余裕が違いますよね」
1432 = "「Được sử dụng trọn vẹn một ngày, quả nhiên\nlà thảnh thơi hơn hẳn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。おかげで成果も出せてる」
1801 = "「Ừm. Nhờ vậy mà chúng ta cũng thu được kết\nquả tốt.」"

# monologue
# JP: 今日の調査で、優先順位を明確にできたような気がする。
2542 = "Nhờ cuộc khảo sát hôm nay, tôi cảm thấy\nnhư mình đã xác định rõ được thứ tự ưu\ntiên."

# monologue
# JP: まずは何より炭鉱本体の調査から。\n僕の頭ではそれしか考えられずにいたが――
2353 = "Trước tiên và quan trọng nhất là khảo sát\nkhu mỏ than.\nTrong đầu tôi chỉ nghĩ được đến việc đó,\nnhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「発電所が再稼働可能かもしれんというのは、朗報だな。\nれいなは、よく気づいてくれた」
1917 = "「Việc nhà máy điện có khả năng hoạt động\nlại là một tin tốt đấy.\nReina tinh mắt thật.」"

# monologue
# JP: 顔を向ければ、\nれいなもほにゃり、僕を見上げて微笑み返す。
2375 = "Khi tôi quay mặt sang,\nReina cũng mỉm cười rạng rỡ nhìn tôi."

# 【れいな】
# display as 玲奈
# JP: 「鉱山が発電所を持ってるのはめずらしくないですから。\nあるかなぁって、れいな、地図を探しただけですよぉ」
1950 = "「Khu mỏ có nhà máy điện riêng cũng không\nhiếm mà nha~.\nReina chỉ tìm trên bản đồ xem có không\nthôi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほぅ？　鉱山は自前の発電所を持つものなのか」
1554 = "「Hửm? Khu mỏ thường có nhà máy điện riêng\nsao.」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。その方が便利ですからねぇ」
1815 = "「Vâng ạ~. Như vậy sẽ tiện lợi hơn mà nha~」"

# monologue
# JP: 餅は餅屋とはよく言ったものだ。
2406 = "Đúng là trăm hay không bằng tay quen."

# monologue
# JP: 鉱山鉄道出身だというれいなの目は、\n僕らの気づかぬところまでを良く映してくれる。
2528 = "Ánh mắt của Reina, người xuất thân từ\nđường sắt khai thác mỏ,\nđã giúp chúng tôi nhìn ra những điều mà\nbản thân không hề hay biết."

# 【れいな】
# display as 玲奈
# JP: 「でもでも、炭鉱さんほど便利なのは珍しいですよぉ。\n自分で掘った石炭で火力発電できるなんて、すごいです」
1439 = "「Nhưng mà, tiện lợi như khu mỏ than này\nthì hiếm lắm nha~.\nCó thể dùng chính than đá mình đào được để\nphát điện nhiệt, tuyệt thật đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？　とすると……カタカミといったか？\nれいなが元いた鉱山は、炭鉱ではないのか」
1619 = "「Hửm? Nếu vậy thì……em bảo là Katakami à?\nKhu mỏ mà Reina từng ở trước đây không\nphải là mỏ than sao.」"

# monologue
# JP: 聞いた途端に、\n微笑がはじけて満面の笑みが咲き誇る。
2557 = "Vừa nghe tôi hỏi,\nnụ cười của em ấy bừng sáng rạng rỡ."

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！\n[かたかみ,1]硬上は[おうてっこう,2]黄鉄鉱の鉱山ですよぉ」
1864 = "「Vâng ạ~!\nKatakami là mỏ quặng Pyrit đó nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。鉄鉱石を掘っていたのか」
1551 = "「Chà. Đào quặng sắt à.」"

# 【れいな】
# display as 玲奈
# JP: 「あ、違うです。鉄鉱石の一種は一種なんですけど、\n黄鉄鉱は、鉄の原料にはしなかったんです」
1575 = "「A, không phải đâu ạ. Dù cũng là một loại\nquặng sắt,\nnhưng quặng Pyrit không được dùng làm\nnguyên liệu sản xuất sắt đâu nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1617 = "「Hửm?」"

# monologue
# JP: なぞかけのような言葉に首が傾いでしまう。\nれいなは少し慌てた口調で、説明を継ぎ足し始める。
2616 = "Tôi nghiêng đầu khó hiểu trước câu nói như\nđánh đố đó.\nReina hơi bối rối, bắt đầu giải thích\nthêm."

# 【れいな】
# display as 玲奈
# JP: 「ええと、なぜかっていうと、\n黄鉄鉱は、[りゅうかてっこう,3]硫化鉄鉱だからなんですよぉ」
1595 = "「Ừm thì, lý do là vì nha~,\nquặng Pyrit là quặng sắt sunfua đó nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「りゅうかてっこう？」
1940 = "「Quặng sắt sunfua?」"

# 【れいな】
# display as 玲奈
# JP: 「[いおう,1]硫黄と結びついた鉄の鉱石のことですねぇ。\n結晶はキラキラしてて真四角で、宝物みたいなんですぅ」
1699 = "「Là quặng sắt kết hợp với lưu huỳnh đó\nnha~.\nTinh thể của nó lấp lánh và vuông vức,\ngiống như kho báu vậy ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「真四角――とは」
1635 = "「Vuông vức——sao.」"

# 【れいな】
# display as 玲奈
# JP: 「サイコロみたいなころってした真四角ですぅ。\nそれがにぶい金色に光って、すごくきれいなんですよぉ」
1695 = "「Vuông vức giống hệt viên xúc xắc luôn\nnha~.\nNó tỏa ra ánh vàng xỉn, đẹp lắ-ắm luôn\nnha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「結晶……で、サイコロ状……\nううむ、自然界のものがそんな形になるのか？」
1949 = "「Tinh thể……mà lại hình xúc xắc……\nHừm, thứ trong tự nhiên lại có hình dạng\nnhư vậy sao?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい。カドもぜぇんぶ、\nカキっ、カキってきーっちり直角で――わっ！？　」
1821 = "「Vâng ạ~. Các góc cạnh cũng vậy,\nvuông vức vuông vức tạo thành góc vuông\nhoàn hảo——Oa!?」"

# 【ポーレット】
# display as 雙鐵＆波萊特
# JP: 『「れいなっ！？」\n「れいなっ！？」』
2040 = "『「Reina!?」\n「Reina!?」』"

# monologue
# JP: 手を伸ばす！\nが、ぎりぎり届かずっ――
2374 = "Tôi đưa tay ra!\nNhưng lại với không tới——"

# monologue
# JP: （すてんっ）
2632 = "（Phịch）"

# 【れいな】
# display as 玲奈
# JP: 「わぁ。\nれいな、ころんじゃいましたぁ」
1529 = "「Oa.\nReina, bị ngã mất rồi nha~」"

# monologue
# JP: 尻もちをつき、照れた笑いを浮かべてる。\n見た感じでは、大したショックもなさそうだが――
2475 = "Em ấy ngã phịch mông xuống đất, nở nụ cười\nbẽn lẽn.\nTrông có vẻ không bị chấn động gì lớn,\nnhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「怪我はないか？」
1840 = "「Em có bị thương không?」"

# 【れいな】
# display as 玲奈
# JP: 「れいな、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、おけがしないです。\nそのかわり、故障と破損はしますけどぉ」
1899 = "「Reina là \\x%lレイルロオド;#00ffc040;Railord%l;#; nên không bị thương đâu\nạ.\nĐổi lại thì chỉ bị hỏng hóc và tổn hại\nthôi ạ~」"

# monologue
# JP: そのまま差し出した僕の手にすがり、ゆっくりと立つ。
2299 = "Cô bé bám lấy bàn tay tôi vẫn đang chìa\nra, chậm rãi đứng dậy."

# monologue
# JP: そしてれいなは時間をかけて、\n自分の体を動かし動かし、確かめる。
2608 = "Sau đó, Reina dành chút thời gian,\ntừ từ cử động cơ thể để kiểm tra xem sao."

# 【れいな】
# display as 玲奈
# JP: 「だいじょおぶです。\nれいな、どこも故障も破損もしてません」
1860 = "「Không sao đâu ạ.\nReina không bị hỏng hóc hay tổn hại ở đâu\nhết ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは何よりだ。が、済まなかったな。\n歩くペースが速すぎたよな」
2006 = "「Vậy thì tốt quá rồi. Nhưng mà xin lỗi em\nnhé.\nTôi đi nhanh quá phải không.」"

# 【れいな】
# display as 玲奈
# JP: 「あぅ～、ちょっとだけ、\nれいなには速かったかもしれないですねぇ」
1569 = "「Aư~, có lẽ là hơi nhanh một chút,\nso với Reina đó ạ~」"

# monologue
# JP: 素直な言葉が、自然な反省を促してくる。\nれいなの歩幅を考えず、自分のペースで歩いてしまった。
2310 = "Lời nói thật thà của cô bé khiến tôi tự\nnhiên thấy hối lỗi.\nTôi đã cứ thế đi theo nhịp độ của mình mà\nkhông nghĩ đến bước chân của Reina."

# monologue
# JP: その上れいなは話に夢中で、身振り手振りまで加えてた。\nあれで転ぶなというのはいささか、無理な話だ。
2548 = "Hơn nữa Reina lại còn đang say sưa nói\nchuyện, thậm chí khua chân múa tay.\nNhư thế mà bảo không vấp ngã thì hơi vô\nlý."

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、日が暮れては調査も出来ん。\nそうそうのんびりもしていられない」
1971 = "「Mặc dù vậy, mặt trời lặn rồi thì không\nthể điều tra được nữa.\nNên chúng ta cũng không thể cứ thong thả\nmãi được.」"

# monologue
# JP: ではあるが、れいなの話は興味深く、有用性を持っている。\n移動中、それを聞けぬではもったいない。
2461 = "Tuy nhiên, câu chuyện của Reina lại rất\nthú vị và hữu ích.\nNếu không được nghe trong lúc di chuyển\nthì thật đáng tiếc."

# monologue
# JP: となれば、最善の解決策は――
2394 = "Nếu vậy, giải pháp tốt nhất là——"

# monologue
# JP: （ひょいっ）
2629 = "（Nhẹ nhàng nhấc bổng）"

# 【れいな】
# display as 玲奈
# JP: 「ひゃああ」
1524 = "「Kyaa」"

# monologue
# JP: 抱っこをすれば、れいなは悲鳴じみた声を出す。\nその声に、僕の方まで驚かされる。
2499 = "Bị tôi bế lên, Reina phát ra một tiếng kêu\ngần như hét lên.\nTiếng kêu đó khiến cả tôi cũng phải giật\nmình."

# 【双鉄】
# display as 雙鐵
# JP: 「どこか痛むのか？」
1838 = "「Có chỗ nào bị đau à?」"

# 【れいな】
# display as 玲奈
# JP: 「いいええ、あのっ――\nれいな、ちょっとびっくりしちゃっただけですぅ」
1858 = "「Không phải ạ, dạ——\nReina chỉ hơi giật mình một chút thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「何故驚く？」
1837 = "「Sao lại giật mình?」"

# 【れいな】
# display as 玲奈
# JP: 「整備[ボディ]体では――だっこ、\nほとんどされることってないですからぁ」
1644 = "「Vì ở hình dạng cơ thể bảo dưỡng——\nhầu như chẳng bao giờ Reina được bế cả ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1990 = "「Ra vậy.」"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;と言えば抱っこと、\n考えるまでもなく体が動いてしまっていたが。
2268 = "Cứ nghĩ đến \\x%lレイルロオド;#00ffc040;Railord%l;#; là tôi lại tự động bế\nlên mà\nkhông cần suy nghĩ."

# monologue
# JP: 確かに、いつも抱っこするハチロクは\n運転ボディ――人形サイズの方の体だ。
2218 = "Đúng là, Hachiroku mà tôi vẫn thường hay\nbế\nlà ở hình dạng lái tàu——tức là cơ thể cỡ\nbúp bê."

# 【双鉄】
# display as 雙鐵
# JP: 「驚かせてすまなかったな。\nもしもイヤなら」
1436 = "「Xin lỗi vì đã làm em giật mình nhé.\nNếu em không thích thì...」"

# 【れいな】
# display as 玲奈
# JP: 「いやじゃないです！\nだっこ、楽ちんでうれしいですぅ」
1861 = "「Không phải là không thích đâu ạ!\nĐược bế thế này nhàn nhã lắm, Reina vui\nlắm ạ.」"

# monologue
# JP: 極めて素直な感想を言い、\nれいなはグ、と首を伸ばす。
2503 = "Reina nói ra cảm nghĩ vô cùng chân thật,\nrồi rướn dài cổ ra."

# 【れいな】
# display as 玲奈
# JP: 「それに、遠くまで見えますよぉ。これならきっと、\nなぁんでもすぐに見つけられちゃいますぅ」
1954 = "「Hơn nữa, còn nhìn được rất xa nữa ạ. Thế\nnày thì chắc chắn,\ntìm gì cũng thấy ngay luôn đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。よろしく頼む」
1927 = "「Đáng tin cậy quá nhỉ. Nhờ em cả đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1660 = "「Vâng ạ.」"

# monologue
# JP: ニコニコ笑うれいなを抱え、\nそのまま再び歩き出す。
2358 = "Ôm Reina đang cười tủm tỉm,\ntôi cứ thế tiếp tục bước đi."

# monologue
# JP: 歩けばすぐに、れいなは「そおだ」と、\n喜びに満ちた声を出す。
2385 = "Vừa đi được một lúc, Reina bỗng thốt lên\n\"À đúng rồi\",\nvới một giọng nói tràn ngập niềm vui."

# 【れいな】
# display as 玲奈
# JP: 「黄鉄鉱の結晶が、どんなに真四角でピカピカか、\n実際、見てみれば一番わかりやすいですよぉ」
2031 = "「Tinh thể quặng pirit vuông vức và lấp\nlánh như thế nào,\nthực tế cứ nhìn tận mắt là dễ hiểu nhất đó\nạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろうが――\nそう簡単に見れるものなのか？」
2007 = "「Đúng là vậy rồi nhưng——\nliệu có dễ dàng nhìn thấy thế không?」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　れいな、一個持ってますから、\n今度みせてあげますねぇ」
1828 = "「Có ạ! Reina có giữ một cục nè,\nlần sau Reina cho anh xem nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、楽しみにさせてもらおう」
1615 = "「Ừm, tôi sẽ mong đợi lắm đấy.」"

# monologue
# JP: 感心しながら頷けば、話が繋がったように感じる。\nそれほど面白そうなものであるなら――
2360 = "Tôi vừa gật gù thán phục, vừa cảm thấy câu\nchuyện đã được kết nối lại.\nNếu nó thú vị đến vậy thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「では、その掘り出した[おうてっこう,2]黄鉄鉱は、\nアクセサリーか何かとして利用されるのか？」
2015 = "「Vậy thì, quặng pirit đào được đó,\ncó được dùng làm đồ trang sức hay gì\nkhông?」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。すごーくきれいに結晶化してるのは、\nおみやげものでも売られますよぉ」
1897 = "「Dạ để xem nào. Những viên kết tinh cực kỳ\nđẹp ấy,\ncũng được bán làm đồ lưu niệm đó ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「土産物、“でも”、か」
1090 = "「\"Cũng\" được bán làm đồ lưu niệm à.」"

# monologue
# JP: と、いうことはそれはあくまで例外的なものなのだろう。
2203 = "Vậy có nghĩa đó chỉ là những trường hợp\nngoại lệ mà thôi."

# monologue
# JP: 他の可能性を考えてみるが……\n僕の中にある知識では、どうにも答えにたどり着けない。
2370 = "Tôi thử nghĩ đến những khả năng khác\nnhưng...\nvới lượng kiến thức của mình, tôi không\ntài nào tìm ra được câu trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、土産物以外の――\n黄鉄鉱の、主たる使われ方とは、どんなものなのだ？」
2020 = "「Vậy thì, ngoài làm đồ lưu niệm ra——\ncông dụng chính của quặng pirit là gì\nvậy?」"

# monologue
# JP: 手首を曲げて「お手上げだ」、と示してみせれば、\nれいなは楽しげに微笑みながら教えてくれる。
2500 = "Tôi bẻ cong cổ tay làm điệu bộ \"chịu\nthua\",\nReina liền vui vẻ mỉm cười giải thích cho\ntôi."

# 【れいな】
# display as 玲奈
# JP: 「さっきいったとおり、黄鉄鉱は鉄と硫黄の鉱石なんです。\nだから主には、[りゅうさん,1]硫酸の原料にされていましたぁ」
1693 = "「Như lúc nãy Reina đã nói, quặng pirit là\nquặng sắt và lưu huỳnh.\nVì thế nên chủ yếu nó được dùng làm nguyên\nliệu sản xuất axit sunfuric đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほおお、鉄鉱石から[りゅうさん,1]硫酸が取れるのか。\nなんとも不思議な……イメージしづらい話だな」
1550 = "「Ồ, từ quặng sắt mà lại chiết xuất được\naxit sunfuric sao.\nThật là kỳ lạ... hơi khó hình dung nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、不思議ですよねぇ」
1629 = "「Ư hự hự, kỳ lạ anh nhỉ~」"

# monologue
# JP: れいなの瞳が、普段にも増してあたたかになる。
2491 = "Đôi mắt của Reina trở nên ấm áp hơn hẳn\nngày thường."

# 【れいな】
# display as 玲奈
# JP: 「その硫酸からセルロイドができる、って聞いたとき、\nれいな、人間ってすごいんだなぁって思いましたぁ」
1914 = "「Khi nghe nói từ axit sunfuric đó có thể\nlàm ra celluloid,\nReina đã nghĩ con người thật là tuyệt vời\nđó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「セルロイド……とは、\nあの、キラキラしたような透明なような――」
1975 = "「Celluloid... là\ncái thứ lấp lánh và trong suốt ấy à——」"

# 【れいな】
# display as 玲奈
# JP: 「そのセルロイドですよぉ。黄鉄鉱から取れる硫酸と、\n[しょうさん,1]硝酸とセルロースから作るって、教えてもらいましたぁ」
1701 = "「Chính là celluloid đó ạ. Reina được dạy\nlà người ta làm nó từ axit sunfuric lấy từ\nquặng pirit,\ncùng với axit nitric và cellulose đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか――あれはなにか、プラスチックの類で……\n石油か何かから作っているのかと思っていたが」
1833 = "「Vậy sao——cái đó là một loại nhựa dẻo\nmà...\ntôi cứ tưởng người ta làm từ dầu mỏ hay gì\nđó chứ.」"

# 【れいな】
# display as 玲奈
# JP: 「あ！　それも今では、ある意味正解かもですぅ」
1572 = "「A! Bây giờ thì, ở một góc độ nào đó, ý\nkiến ấy cũng có thể là đúng đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　ある意味、とは」
1621 = "「Hửm? Ở một góc độ nào đó là sao?」"

# monologue
# JP: 聞けばフッ――と、\nれいなの顔に淋しげな影が差してしまう。
2558 = "Nghe tôi hỏi vậy, vút một cái——\ngương mặt Reina thoáng hiện lên vẻ buồn\nbã."

# 【れいな】
# display as 玲奈
# JP: 「今は、硫酸って黄鉄鉱から採らないんですぅ。\n石油を精製するときに出る硫黄から採るのがほとんどで」
1913 = "「Bây giờ người ta không chiết xuất axit\nsunfuric từ quặng pirit nữa đâu ạ.\nHầu hết đều được chiết xuất từ lưu huỳnh\nsinh ra trong quá trình tinh chế dầu mỏ\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。原油由来の硫酸でもセルロイドは作れるのか。\nゆえに、『ある意味正解』ということになるのだな」
1504 = "「Ra vậy. Tức là axit sunfuric có nguồn gốc\ntừ dầu thô cũng có thể làm ra celluloid.\nNên mới nói là 『ở một góc độ nào đó cũng\nđúng』 nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ」
1796 = "「Dạ đúng rồi ạ~」"

# monologue
# JP: ほにゃん、と柔らかな頷き。
2306 = "Cô bé gật đầu một cái thật mềm mại."

# monologue
# JP: そのあどけないような仕草を見れば、\nしみじみとした感慨が胸に湧いてくる。
2516 = "Nhìn cử chỉ ngây thơ đó,\nmột cảm giác bùi ngùi chợt trào dâng trong\nlồng ngực tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……外見からはとても想像できないほどに、\nれいなは骨太で硬派な知識を持っているのだなぁ」
1105 = "「……Nhìn vẻ bề ngoài thì không thể nào\ntưởng tượng được,\nReina lại có những kiến thức vô cùng vững\nvàng và sâu sắc đến vậy.」"

# monologue
# JP: 気持ちを素直に出した言葉は、\nれいなをふふっ、と、嬉しげな笑顔に戻してくれる。
2555 = "Lời nói bộc lộ cảm xúc chân thật của tôi\nđã khiến Reina cười khúc khích, mang nụ\ncười vui vẻ trở lại."

# 【れいな】
# display as 玲奈
# JP: 「教わったんです。技師さんとか、流しの鉱夫さんとか。\n鉱山には、物知りさんたちがたくさんですからぁ」
1813 = "「Reina được dạy đó ạ. Từ các kỹ sư, hay là\ncác thợ mỏ lang thang.\nỞ mỏ có rất nhiều người am hiểu kiến thức\nlắm ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「流しの鉱夫？」
1874 = "「Thợ mỏ lang thang?」"

# 【れいな】
# display as 玲奈
# JP: 「鉱山から鉱山をめぐる鉱夫さんのことです。\n炭鉱の話もれいな、だから、ちょっとは知ってるんです」
1697 = "「Là những người thợ mỏ đi từ mỏ này sang\nmỏ khác đó ạ.\nThế nên chuyện về mỏ than, Reina cũng biết\nmột chút ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1506 = "「Ra là vậy.」"

# monologue
# JP: であれば、炭鉱本体の視察からも、\n有意な成果を得られるだろう。
2392 = "Nếu vậy, từ việc khảo sát mỏ than thực tế,\nchắc chắn chúng ta sẽ thu được những kết\nquả có ý nghĩa."

# monologue
# JP: 電源を確保できれば、マイントレジャーにとどまらず、\n地域全体の活性化……も――
2241 = "Nếu đảm bảo được nguồn điện, không chỉ\nriêng Mine Treasure,\nmà việc vực dậy cả một khu vực... cũng——"

# 【れいな】
# display as 玲奈
# JP: 「あれれ？　そうてつさん、どうしましたぁ？」
1543 = "「Ủa ủa? Anh Soutetsu, anh sao thế ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。いや――うむ」
1563 = "「À. Không——ừm.」"

# monologue
# JP: 炭鉱が稼働していたころには、\n全てが上手く機能していたことだろう。が……
2277 = "Hồi mỏ than còn hoạt động,\nchắc hẳn mọi thứ đều diễn ra suôn sẻ.\nNhưng mà..."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ポーレッ――っと？」
1751 = "「Này, Paulet——ủa?」"

# monologue
# JP: いつの間に、ポーレットを引き離してしまってる。
2197 = "Không biết từ lúc nào, tôi đã bỏ xa\nPaulette ở phía sau."

# monologue
# JP: ポーレットは下を向き、その足取りはのろのろしてる。\nそういえば、さっきからずっと無口だったし――
2292 = "Paulette đang cúi gằm mặt, bước đi chậm\nchạp.\nNhắc mới nhớ, nãy giờ cô ấy cứ im lặng\nsuốt——"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、ポーレット。\n考え事の最中か？」
1763 = "「Xin lỗi nhé, Paulette.\nCô đang mải suy nghĩ gì à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、はいっ！」
1546 = "「Hả!? À, vâng!」"

# monologue
# JP: 居眠り中に教師にさされた生徒のように、\nポーレットはひどく驚き体をビクリとさせてしまう。
2326 = "Giống như một học sinh bị giáo viên gọi\ntên khi đang ngủ gật,\nPaulette giật thót mình, cơ thể co rúm lại\nvì quá đỗi kinh ngạc."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、やはり邪魔をしてしまったか」
1582 = "「À, quả nhiên là tôi làm phiền cô rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、全然。その――今は、\n炭鉱の視察をする時間ですし」
1441 = "「Không, không hề ạ. Chuyện đó——bây giờ,\nđang là thời gian đi khảo sát mỏ than mà.」"

# monologue
# JP: わたわた手を振り、\nポーレットは少し早口に切り返してくる。
2435 = "Vừa vẫy tay cuống quýt,\nPaulette vừa đáp lại với giọng hơi nhanh."

# 【ポーレット】
# display as 波萊特
# JP: 「それより、何です？　わたしに、何か」
1483 = "「Hơn nữa, có chuyện gì vậy ạ? Tìm tôi có\nviệc gì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、聞きたいことがある。\nこの炭鉱は、まだ石炭埋蔵量を残しているのか？」
1691 = "「À, tôi có chuyện muốn hỏi.\nMỏ than này, liệu trữ lượng than có còn\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ、はい。多分――間違いなく」
1548 = "「Hả? À, vâng. Chắc là——không sai đâu ạ.」"

# monologue
# JP: 言って、軽い咳払い。\nポーレットの声が、教師のような調子に変わる。
2585 = "Nói rồi, cô hắng giọng nhẹ một cái.\nGiọng nói của Paulette chuyển sang điệu bộ\nnhư một giáo viên."

# 【ポーレット】
# display as 波萊特
# JP: 「石炭需要の激減がなければ、事業は継続されていた。\nそういう話ですから、当然、埋蔵量は十分なはずです」
1673 = "「Nếu không phải vì nhu cầu than đá giảm\nmạnh, thì dự án vẫn sẽ được tiếp tục.\nChuyện là như vậy, nên tất nhiên, trữ\nlượng chắc chắn vẫn còn đủ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、採炭を再開することは可能か？\nつまり、権利や許認可関係において」
2019 = "「Vậy thì, có khả năng khai thác than trở\nlại không?\nÝ tôi là, về mặt quyền lợi và giấy phép\ncác thứ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「は？　採炭って――\nええと、体験採掘のレベル以上で、ですか？」
1590 = "「Hả? Khai thác than á——\nỪm, ý anh là ở mức độ lớn hơn cả việc khai\nthác trải nghiệm sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。もっと大規模な――\nそうでなくては、再稼働を果たせん気がする」
1862 = "「Đúng vậy. Ở quy mô lớn hơn nhiều——\nNếu không thì, tôi có cảm giác sẽ không\nthể nào tái hoạt động được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「再稼働、って？」
1726 = "「Tái hoạt động, là sao cơ?」"

# 【れいな】
# display as 玲奈
# JP: 「わああ！　ほんとですぅ」
1535 = "「Oaaa! Thật đó ạ!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1570 = "「A!」"

# monologue
# JP: れいなも、そしてポーレットも、\n僕の懸念に、同じくたどり着いてくれたようだ。
2514 = "Có vẻ như cả Reina, và cả Paulette nữa,\nđều đã nhận ra mối lo ngại giống hệt tôi."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を動かすのにさえ、\nあれほどたくさんの石炭を必要とするのだから――
2222 = "Ngay cả việc vận hành \\x%l8620;#00ffc040;8620%l;#; thôi,\nmà đã cần đến ngần ấy than đá rồi, nên\nlà——"

# 【双鉄】
# display as 雙鐵
# JP: 「石炭火力発電所だ。自前で石炭を供給できねば、\nどれほどの高コストになるか、想像もつかん」
1461 = "「Là nhà máy nhiệt điện than đấy. Nếu không\ntự cung cấp than được,\nthì chi phí sẽ đội lên cao đến mức nào,\nthật không dám tưởng tượng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう、ですよね……」
1972 = "「Đúng, là vậy nhỉ……」"

# monologue
# JP: 少し青ざめた顔をして、\nそれでもポーレットは、力強い頷きを返してくれる。
2437 = "Khuôn mặt hơi tái đi,\nnhưng Paulette vẫn đáp lại bằng một cái\ngật đầu mạnh mẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「権利関係と許認可関係の確認、引き受けました。\nできるだけ早期に状況を整理して、お返事します」
1748 = "「Việc xác nhận các vấn đề về quyền lợi và\ngiấy phép, tôi xin nhận.\nTôi sẽ sắp xếp tình hình sớm nhất có thể\nrồi trả lời anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。よろしく頼む」
1606 = "「Ừm. Trăm sự nhờ cô.」"

# monologue
# JP: ――炭鉱調査が終わっても、資料の作成、議会準備、\nひいてはキハ07sの乗務訓練と、為すべきことが山積みだ。
1065 = "——Dù cuộc khảo sát mỏ than có kết thúc,\nthì việc soạn tài liệu, chuẩn bị cho hội\nđồng,\nvà cả việc huấn luyện nghiệp vụ trên KiHa\n07S nữa, những việc cần làm vẫn còn chất\nthành núi."

# monologue
# JP: ひとつひとつにその都度その都度集中し、\n焦らずこなしていくことこそが、僕らにできる最善だろう。
2321 = "Tập trung giải quyết từng việc một, không\nđược nóng vội,\nđó có lẽ là điều tốt nhất mà chúng tôi có\nthể làm lúc này."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、炭鉱調査を続けよう」
2018 = "「Vậy thì, tiếp tục khảo sát mỏ than thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1661 = "「Vâng!」"

# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ」
1778 = "「Reina hiểu rồi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「まったくもって、\n技術の進歩というのは大したものだな」
1761 = "「Thật sự thì,\nsự tiến bộ của công nghệ đúng là một điều\nvĩ đại.」"

# monologue
# JP: 自分の顔を拭ったタオルに、つくづく思う。
2365 = "Nhìn chiếc khăn vừa lau mặt, tôi thấm thía\nnghĩ thầm."

# monologue
# JP: 絞っても汗は溢れ出ないし、\nススにいたっては、ただの一片もついてない。
2230 = "Vắt cũng chẳng thấy mồ hôi chảy ra,\ncòn bồ hóng thì, một chút xíu cũng không\ndính."

# 【双鉄】
# display as 雙鐵
# JP: 「乗務訓練を終えたあととは思えん。\nこのままどこにだって出かけていけそうだ」
1684 = "「Thật không giống như vừa mới huấn luyện\nnghiệp vụ xong.\nCứ thế này đi đâu cũng được ấy chứ.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;に乗ってしまえば、タオルの運命は無残なものだ。
2561 = "Nếu mà lên \\x%l8620;#00ffc040;8620%l;#;, thì số phận của chiếc\nkhăn\nnày sẽ thê thảm lắm."

# monologue
# JP: 乗務のあとは真っ黒な汗でびちょびちょになり、\n固形石鹸でどう洗おうと、白には二度と戻れなくなる。
2272 = "Sau mỗi chuyến đi, nó sẽ ướt sũng mồ hôi\nđen kịt,\ndù có giặt bằng xà phòng cục thế nào đi\nnữa, cũng chẳng bao giờ trắng lại được."

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、気にいってもらえてうれしいですよぉ」
1626 = "「Ư hự hự, anh thích là Reina vui rồi ạ~」"

# monologue
# JP: れいなの笑顔も、純白だ。\nその傍らのポーレットも、満足そうに頷いている。
2495 = "Nụ cười của Reina cũng trắng tinh khôi.\nPaulette bên cạnh cũng gật đầu vẻ hài\nlòng."

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんに鍛えられてるだけありますね。\n双鉄くん、飲み込みが凄く早くて、驚きました」
1920 = "「Quả không hổ danh là được Hachiroku huấn\nluyện.\nAnh Soutetsu tiếp thu nhanh thật đấy, làm\ntôi ngạc nhiên luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の運転操作と比べると、\n全自動でやってもらっているようなものだからなぁ」
1992 = "「So với thao tác lái \\x%l8620;#00ffc040;8620%l;#;,\nthì cái này cứ như là được làm tự động\nhoàn toàn vậy.」"

# monologue
# JP: 操作するのは、\x%lダイコン;#00ffc040;ダイコン%l;#;――ダイレクトコントローラーと、\nギアと\x%lブレーキ;#00ffc040;ブレーキ%l;#;くらいなもの。
2243 = "Thứ cần thao tác chỉ có \\x%lダイコン;#00ffc040;kiểm soát trực tiếp%l;#;\n――Direct Controller,\ncùng với cần số và \\x%lブレーキ;#00ffc040;phanh%l;#; mà thôi."

# monologue
# JP: 蒸気の量も灌水の量も気にせずに、\n速度と\x%lブレーキ;#00ffc040;ブレーキ%l;#;圧だけ見ればいいのは、いかにも楽だ。
2195 = "Không cần bận tâm đến lượng hơi nước hay\nlượng nước cấp,\nchỉ cần chú ý đến tốc độ và áp suất \\x%lブレーキ;#00ffc040;phanh%l;#;,\nquả thực là nhàn hạ."

# 【双鉄】
# display as 雙鐵
# JP: 「余裕を持てる分、注視にも集中できる。利便性では、\nディーゼル機関は蒸気機関を遥かに上回っているな」
1769 = "「Nhờ có sự dư dả thời gian, tôi có thể tập\ntrung quan sát hơn. Về tính tiện lợi,\nđộng cơ diesel vượt xa động cơ hơi nước.」"

# 【れいな】
# display as 玲奈
# JP: 「利便性では、ですかぁ？」
1593 = "「Về tính tiện lợi, thôi ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。キハ[レイナナ,1]07を運転してみてよくわかった。\nポーレットが、[ハチロク,3]8620は観光向きだと言った理由が」
1599 = "「Ừm. Lái thử KiHa 07 rồi tôi mới hiểu rõ.\nLý do Paulette nói 8620 phù hợp với du\nlịch.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　わかりました？　わかっちゃいました？\n双鉄くんにも」
1574 = "「A! Anh hiểu rồi sao? Anh nhận ra rồi sao?\nCả anh Soutetsu nữa.」"

# monologue
# JP: ポーレットの顔がぱっと輝く。
2434 = "Gương mặt Paulette bừng sáng."

# monologue
# JP: そんな表情を見たのは久しぶりな気がしてホっとして、\n僕の言葉もなめらかになる。
2367 = "Cảm giác như đã lâu lắm rồi mới thấy biểu\ncảm đó của cô ấy khiến tôi thở phào nhẹ\nnhõm,\nlời nói của tôi cũng trở nên trôi chảy\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「技術の進歩とは、人に汗をかかせなくすることだ。\nが、[ハチロク,3]8620は精一杯に汗をかく。そうしなければ走れない」
1753 = "「Tiến bộ công nghệ là để con người không\nphải đổ mồ hôi nữa.\nNhưng với 8620, ta phải đổ mồ hôi sôi nước\nmắt. Nếu không thì nó không thể chạy\nđược.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですです！　そうです、そういう感じ！\n近代化で無くしたものの塊なんですよね、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;って」
1823 = "「Đúng đúng! Chính xác, là cảm giác đó!\nNó là hiện thân của những gì đã mất đi\ntrong quá trình hiện đại hóa nhỉ, \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\nấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはきっと、れいなが愛する鉱山の魅力とも共通だ。\nゆえに、炭鉱と[ハチロク,3]8620を観光のキーにするのは、効く筈だ」
1955 = "「Điều đó chắc chắn cũng giống với sức hấp\ndẫn của khu mỏ mà Reina yêu quý.\nVì vậy, lấy mỏ than và 8620 làm chìa khóa\ndu lịch, chắc chắn sẽ hiệu quả.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ……」
1560 = "「A……」"

# monologue
# JP: 言った瞬間、ポーレットの顔が曇ってしまう。
2556 = "Ngay khi tôi vừa dứt lời, gương mặt\nPaulette tối sầm lại."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ポーレット。\n何か――」
1721 = "「Sao vậy? Paulette.\nCó chuyện gì——」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえっ。\nその……炭鉱開発のことです。それで、ちょっと」
1585 = "「A, không ạ.\nChuyện là…… về việc phát triển mỏ than.\nNên là, có chút...」"

# 【双鉄】
# display as 雙鐵
# JP: 「難しそうなのか？」
1843 = "「Có vẻ khó khăn sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、許認可とかは取れそうで……\n助成金も、あるみたいなんですけど」
2004 = "「Ừm thì, giấy phép các thứ có vẻ sẽ lấy\nđược……\nTrợ cấp hình như cũng có, nhưng mà...」"

# 【双鉄】
# display as 雙鐵
# JP: 「助成金？」
1961 = "「Trợ cấp?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。“技術継承炭鉱”っていうのに採用されれば、\n国の助成金が出るそうです」
1818 = "「Vâng. Nếu được chọn làm \"Mỏ than Kế thừa\nCông nghệ\",\nthì sẽ có trợ cấp của nhà nước ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。採炭の技術を途絶えさせないためか。\n願ったり叶ったりの話じゃないか」
1505 = "「Ra vậy. Là để công nghệ khai thác than\nkhông bị mai một sao.\nĐúng là cầu được ước thấy còn gì.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうなんですけど……」
1834 = "「Chuyện đó thì đúng là vậy nhưng mà……」"

# monologue
# JP: 喜ばしいはずの話であるのに、\nどうにもポーレットの言葉が重い。
2400 = "Lẽ ra phải là chuyện đáng mừng,\nnhưng lời nói của Paulette lại nặng nề lạ\nthường."

# 【ポーレット】
# display as 波萊特
# JP: 「これ……\n銀行さんにも協力をお願いして作ったものです」
1987 = "「Cái này……\nTôi đã nhờ ngân hàng hợp tác để lập ra đấy\nạ.」"

# monologue
# JP: 申し訳無さそうな顔をして、\n数枚のペーパーを差し出してくる。
2303 = "Với vẻ mặt đầy áy náy,\ncô ấy đưa cho tôi vài tờ giấy."

# monologue
# JP: 一目みたならその途端、\n僕もまた、ポーレットと似たような表情を強いられる。
2228 = "Chỉ vừa liếc mắt nhìn qua,\ntôi cũng bất đắc dĩ phải mang biểu cảm\ngiống hệt Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「これは……採算ギリギリ――というか、\n赤字の見込みの方が濃厚なのか」
1986 = "「Cái này…… lợi nhuận sít sao quá――hay nói\nđúng hơn là,\nnguy cơ lỗ vốn còn cao hơn à.」"

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、本格的に機械を動かしての採掘となると――\n最低限の規模にしても経費が跳ね上がっちゃいますから」
1677 = "「Quả nhiên, nếu đưa máy móc vào khai thác\nquy mô lớn thì――\ndù có thu hẹp quy mô ở mức tối thiểu, chi\nphí vẫn sẽ tăng vọt ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「機械、人員、設備維持――\x%l列車;#00ffc040;列車%l;#;収入など焼け石に水だな。\nこれは、もし助成金が打ち切りになりでもしたら」
1849 = "「Máy móc, nhân sự, bảo trì thiết bị――doanh\nthu từ \\x%l列車;#00ffc040;tàu%l;#; chỉ như muối bỏ bể thôi.\nThế này, lỡ như trợ cấp bị cắt thì sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。その時点からマイントレジャーは、\n赤字を掘り出す[せきたんこう,2]赤炭鉱になっちゃいます」
1806 = "「Vâng. Kể từ lúc đó, Mine Treasure\nsẽ trở thành \"mỏ than đỏ\" chuyên đào ra lỗ\nvốn mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは勘弁願いたいな。\nなんとか、助成金に頼らずにやっていく方法を考えねば」
2012 = "「Xin kiếu chuyện đó đi.\nPhải nghĩ cách nào đó để duy trì mà không\ncần dựa vào trợ cấp mới được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……」
1797 = "「Vâng……」"

# monologue
# JP: ポーレットがちら、とれいなを見る。
2438 = "Paulette khẽ liếc nhìn Reina."

# monologue
# JP: 知識を持っているはずの――あるいはそうであるからこそ、\nれいなは、黙りこくってる。
2479 = "Reina, người đáng lẽ phải biết rõ――hay\nchính vì biết rõ,\nmà cô bé nãy giờ vẫn im bặt."

# 【ポーレット】
# display as 波萊特
# JP: 「石炭を売る先が見つかれば、\nそれがもちろん、ベストな解決策なんですけど」
1675 = "「Nếu tìm được đầu ra cho than,\nthì đó tất nhiên là giải pháp tốt nhất\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？　というか、売るほど掘るのか？\n生産調整をしても、発電に必要な分だけを掘った方が」
1622 = "「Hử? Khoan đã, đào nhiều đến mức đem bán\ncơ à?\nDù có điều chỉnh sản xuất, thì thà chỉ đào\nđủ lượng cần cho phát điện còn hơn...」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうはいかないみたいなんです。\nええと、資料の……ここ、ですね」
1588 = "「A, có vẻ như không được đâu ạ.\nỪm, trong tài liệu... ở chỗ này đây.」"

# monologue
# JP: 示されたページに目を通す。
2364 = "Tôi lướt mắt qua trang tài liệu được chỉ\nđịnh."

# 【双鉄】
# display as 雙鐵
# JP: 「……ほぅ。あの発電所は、売り物にならない\n[ていひんいたん,3]低品位炭というものを使って火力発電するのか」
1099 = "「……Ra vậy. Nhà máy điện đó dùng thứ không\nbán được\ngọi là than phẩm cấp thấp để nhiệt điện\nsao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。『[なまだ,1]生焚き発電』っていうらしいです。\nだから、[こうひんいたん,3]高品位炭はそのまま手付かずで残ります」
1819 = "「Vâng. Hình như gọi là \"Phát điện đốt trực\ntiếp\" ạ.\nNên than phẩm cấp cao sẽ bị tồn lại nguyên\nxi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とても[ハチロク,3]8620で消費しきる量でも無いな。\nならば……買ってくれる相手をどうにか見つけて――」
1683 = "「Lượng đó thì 8620 không thể nào tiêu thụ\nhết được.\nVậy thì... phải tìm cách kiếm người mua\nthôi――」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。販路を開拓できれば――\n八方丸く収まるんですよね。本当に」
1798 = "「Vâng. Nếu mở rộng được kênh phân phối――\nthì mọi chuyện sẽ êm xuôi cả. Thật sự\nluôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ……」
1594 = "「Hừm……」"

# monologue
# JP: 御一夜-湯医間だけで孤立している僕らの線路が、\nそのまま販路の、象徴のように思えてしまう。
2349 = "Tuyến đường sắt của chúng tôi bị cô lập\nchỉ giữa Ohimitera và Yui,\ncứ như thể là biểu tượng cho kênh phân\nphối của chúng tôi vậy."

# monologue
# JP: もしも、線路が続いていても、\nそれほど楽に売れるものとも思えん、が――
2609 = "Dù tuyến đường sắt có được nối liền,\ntôi cũng không nghĩ là sẽ dễ bán đến thế,\nnhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「ちなみに、れいな。石炭というのは、どのような場所で\n用いられているものなのだ？」
1690 = "「Nhân tiện, Reina này. Than đá ấy, thường\nđược sử dụng\nở những nơi như thế nào vậy?」"

# 【れいな】
# display as 玲奈
# JP: 「[ひのもと,2]日ノ本国内では昔も今も、火力発電所と製鉄所とで\nほとんどだって、れいな、聞いたことがありますよぉ」
1907 = "「Reina từng nghe nói là ở trong nước\nHinomoto từ xưa đến nay, hầu hết\nđều dùng cho các nhà máy nhiệt điện và nhà\nmáy luyện thép đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「製鉄所なら、[きゅうしゅう,1]九洲にも大きな――\n[ふくおか,1]福丘の[やわた,1]矢幡などがあるよな」
1969 = "「Nếu là nhà máy luyện thép thì ở Kyushu\ncũng có những cái lớn――\nnhư Yahata ở Fukuoka chẳng hạn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でも、今使われてるのは[ゆにゅうたん,2]輸入炭です。\n安くて、質が良いそうなんです。[こくないたん,2]国内炭より」
1472 = "「Nhưng mà, bây giờ người ta dùng than nhập\nkhẩu rồi.\nNghe nói là vừa rẻ lại vừa chất lượng hơn.\nSo với than nội địa ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕も聞いたことがある。品質と価格競争とで負け、\n国内の炭鉱はことごとく閉鎖においやられたと」
1611 = "「À, tôi cũng từng nghe nói. Vì thua kém về\nchất lượng và cạnh tranh giá cả,\nnên các mỏ than trong nước đều bị đẩy đến\nbờ vực đóng cửa.」"

# monologue
# JP: あのあたり――北九洲工業地帯なら、もちろん[ちくほう,1]築豊炭田を、\nもともとの石炭の供給先としていたはずだ。
2411 = "Khu vực đó――Khu công nghiệp Bắc Kyushu,\nchắc chắn\nnguồn cung cấp than ban đầu phải là Mỏ\nthan Chikuho."

# monologue
# JP: ……どこも似たような運命をたどるものだなと、\nなんとももの悲しく思う。
1075 = "……Nơi nào cũng chịu chung một số phận như\nnhau,\nthật là đáng buồn."

# 【ポーレット】
# display as 波萊特
# JP: 「残念ですけど。今後とも、コストパフォーマンスで、\n輸入炭に太刀打ちできるようになるとは思えません」
1717 = "「Đáng tiếc thật. Dù sau này có thế nào,\ntôi không nghĩ\nchúng ta có thể cạnh tranh với than nhập\nkhẩu về mặt hiệu quả chi phí.」"

# 【双鉄】
# display as 雙鐵
# JP: 「当然だろうな。故に、価格と品質以外の部分で、\n何らかの売りを創りださねばならん」
2010 = "「Đương nhiên rồi. Do đó, ngoài giá cả và\nchất lượng ra,\nchúng ta phải tạo ra một điểm bán hàng nào\nđó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え」
1528 = "「Hả.」"

# monologue
# JP: きょとんとした顔。\nポーレットの口がポカンと開いてる。
2431 = "Khuôn mặt ngơ ngác.\nMiệng Paulette há hốc ra."

# 【双鉄】
# display as 雙鐵
# JP: 「専門家が血の滲むような努力を重ねたそのあげく、\n価格と品質では勝てなかったのだろう？　なら」
1689 = "「Các chuyên gia đã nỗ lực đến mức đổ máu,\ncuối cùng\nvẫn không thể thắng về giá cả và chất\nlượng đúng không? Vậy thì.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい。そうですよね、それは、そう」
1556 = "「A――vâng. Đúng vậy nhỉ, chuyện đó thì,\nđúng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、プラスアルファを提示しなければならない。\n大きなメリットを、石炭と抱合せで買ってもらうのだ」
1641 = "「Vì vậy, chúng ta phải đưa ra những giá\ntrị cộng thêm.\nBán kèm những lợi ích to lớn cùng với than\nđá.」"

# 【ポーレット】
# display as 波萊特
# JP: 「メリットを売るオプションで、\n一緒に石炭も買ってもらう……みたいな感じですか」
1445 = "「Giống như là, lấy việc bán lợi ích làm\ntùy chọn,\nrồi tiện thể bán luôn than đá…… kiểu vậy\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。とはいえ石炭だって無駄になるまい。\n輸入は、為替変動や政変というリスクを伴ってもいるし」
1863 = "「Đúng vậy. Dù nói thế nhưng than đá cũng\nđâu vô dụng.\nNhập khẩu luôn đi kèm với rủi ro về biến\nđộng tỷ giá và chính trị mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「可能性。それなら、出てくるかもですね」
1991 = "「Khả năng. Nếu vậy thì, có thể sẽ có đấy.」"

# monologue
# JP: こくり、ポーレットは静かに頷く。
2440 = "Cộc, Paulette khẽ gật đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「全量を切り替えて欲しいってことじゃないし。\n……パッケージで、予備扱い的に買い取ってもらうなら」
1734 = "「Chúng ta cũng không yêu cầu họ chuyển\nsang dùng toàn bộ than của mình.\n……Nếu bán theo gói, kiểu như mua để dự\nphòng thì.」"

# 【れいな】
# display as 玲奈
# JP: 「はわぁ！」
1541 = "「Hawaa!」"

# monologue
# JP: ポーレットは僕よりよほど現実的で、\n広く社会を知っている。
2439 = "Paulette thực tế hơn tôi nhiều,\nvà cũng hiểu biết rộng về xã hội."

# monologue
# JP: その頷きと同意の意味を、れいなはきっと、\n僕以上に良く知ってるのだろう。
2466 = "Ý nghĩa của cái gật đầu và sự đồng ý đó,\nchắc chắn Reina\ncòn hiểu rõ hơn cả tôi."

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはすごいですねぇ！\nれいな、さいしょからダメって思っちゃってましたぁ」
2025 = "「Anh Soutetsu tuyệt quá đi ạ!\nReina ngay từ đầu đã nghĩ là không được\nrồi.」"

# monologue
# JP: 見上げる瞳は、まぶしいものを見るようだ。\nあまりにきらきらしていて少し、照れくさくなる。
2290 = "Đôi mắt ngước lên nhìn như thể đang chiêm\nngưỡng một thứ gì đó chói lóa.\nNó lấp lánh đến mức khiến tôi có chút\nngượng ngùng."

# 【双鉄】
# display as 雙鐵
# JP: 「可能性がゼロでないなら、検討してみて損はない。\n僕はそう教わったし、ずっとそうして来ているだけだ」
1775 = "「Nếu khả năng không phải là không, thì cứ\nthử xem xét cũng chẳng mất gì.\nTôi được dạy như vậy, và tôi chỉ luôn làm\ntheo như thế thôi.」"

# monologue
# JP: そう。\nその繰り返しが、今僕をここに立たせてる。
2414 = "Đúng vậy.\nChính sự lặp lại đó đã đưa tôi đến vị trí\nngày hôm nay."

# monologue
# JP: 他にやりようをしらない以上、\nベストを尽くし、それを今回も繰り返そう。
2395 = "Một khi đã không biết cách nào khác,\nthì cứ dốc hết sức mình, và lần này cũng\nlặp lại điều đó thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「プラスアルファのアイディアを求める意味でも、\n[じゅつせん,1]術仙廃炭鉱近辺の追加調査を重ねたいのだが――」
1742 = "「Để tìm kiếm những ý tưởng cộng thêm đó,\ntôi muốn tiến hành thêm các cuộc khảo sát\nquanh mỏ than bỏ hoang Jussen――」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。それはわたし、調整します。\n日々姫ちゃんたちにも協力してもらって――」
1577 = "「A, vâng. Việc đó để tôi sắp xếp.\nTôi sẽ nhờ cả nhóm Hibiki hợp tác nữa――」"

# monologue
# JP: そこまで言って、ポーレットは急に口ごもる。
2584 = "Nói đến đó, Paulette bỗng ngập ngừng."

# monologue
# JP: どこか心配そうな目をして、\nれいなのことをじっと見つめる。
2510 = "Với ánh mắt có vẻ lo lắng,\ncô chằm chằm nhìn Reina."

# 【ポーレット】
# display as 波萊特
# JP: 「ただ……わたし、助成金のこととか許認可のこととか、\n結構いろいろ、やること増えちゃいそうだから――」
1467 = "「Chỉ là…… tôi, mấy việc như trợ cấp hay\ngiấy phép,\ncó vẻ như sẽ tăng lên khá nhiều nên là――」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている、そのために、\n\x%lキハ07;#00ffc040;キハ07%l;#;の運転を教えてもらったのではないか」
1745 = "「Tôi hiểu mà, chính vì thế,\nnên tôi mới nhờ cô dạy lái \\x%lキハ07;#00ffc040;KiHa 07%l;#; mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうですよね……\nけど」
1608 = "「Vâng. Đúng là vậy nhỉ……\nNhưng mà.」"

# monologue
# JP: ポーレットの手が柔らかく伸び、\nゆっくりゆっくり、れいなの髪を撫でさする。
2436 = "Bàn tay Paulette dịu dàng vươn ra,\nchầm chậm vuốt ve mái tóc Reina."

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、平気？\nわたしがいなくても大丈夫？」
1892 = "「Reina, em ổn chứ?\nKhông có chị thì em có sao không?」"

# 【れいな】
# display as 玲奈
# JP: 「平気かどうかは、やってみないとわからないけど。\nだけど、れいな、いっしょうけんめいがんばりますよぉ」
1966 = "「Ổn hay không thì phải thử mới biết được\nạ.\nNhưng mà, Reina sẽ cố gắng hết sức mình\nluôn đó ạ~」"

# monologue
# JP: れいなの笑顔に受け止められれば、\nポーレットの青い瞳を曇らせていた不安の影も薄れてく。
2575 = "Nhận được nụ cười của Reina,\nbóng đen bất an làm mờ đi đôi mắt xanh của\nPaulette cũng dần tan biến."

# 【ポーレット】
# display as 波萊特
# JP: 「わかった。じゃ、頑張ってみて！\nけど、困ったことがあったら、いつでも言うのよ？」
1666 = "「Chị hiểu rồi. Vậy thì, cố lên nhé!\nNhưng nếu gặp khó khăn gì, phải nói với\nchị ngay đấy, biết chưa?」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。ポーレットも、がんばってくださいねぇ」
1659 = "「Vâng ạ. Chị Paulette cũng cố lên nhé ạ~」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、頑張る。\nそれと――双鉄くん」
1614 = "「Ừ, chị sẽ cố gắng.\nVà――anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2035 = "「!」"

# monologue
# JP: 深々と、ポーレットが僕に頭を下げる。
2433 = "Paulette cúi đầu thật sâu trước tôi."

# monologue
# JP: 閉じられた目の奥にある気持ちが伝わるように思えて――\nだからただただ、受け止める。
2333 = "Cảm giác như những tâm tư sâu thẳm trong\nđôi mắt nhắm nghiền kia đang truyền đến\ntôi――\nVì vậy, tôi chỉ biết lặng lẽ đón nhận."

# 【ポーレット】
# display as 波萊特
# JP: 「れいなのこと、どうかよろしくお願いします」
1912 = "「Reina, trăm sự nhờ anh giúp đỡ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、任せておいてくれ」
1610 = "「Ừ, cứ giao cho tôi.」"

# monologue
# JP: そうする義務を、強く感じる。\nならば果たすべく、僕の全力を尽くしてみせよう。
2189 = "Tôi cảm thấy một nghĩa vụ mãnh liệt phải\nlàm như vậy.\nNếu thế, tôi sẽ dốc hết sức mình để hoàn\nthành nó."

# 【双鉄】
# display as 雙鐵
# JP: 「運転も調査も、事故なく行う。\nその上で――きっと、何かを掴んでくるさ」
1747 = "「Lái tàu và khảo sát, tôi sẽ thực hiện\nkhông để xảy ra sự cố nào.\nHơn thế nữa――chắc chắn, tôi sẽ tìm ra được\nmanh mối gì đó.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁ、おもしろいですぅ。\n炭鉱って、本当に下に掘っていくんですねぇ」
1540 = "「Oa, thú vị quá đi ạ.\nMỏ than, đúng là người ta đào xuống dưới\nthật anh nhỉ~」"

# monologue
# JP: エレベーターの行く先は、地下。
2594 = "Nơi thang máy hướng đến là dưới lòng đất."

# monologue
# JP: それを確かめ歓声をあげるれいなは、まるきり子犬だ。\nおもいっきりにぱたぱたしてる。はしゃいでる。
2206 = "Xác nhận được điều đó, Reina reo lên thích\nthú, trông hệt như một chú cún con.\nCô bé cứ lăng xăng chạy tới chạy lui. Cực\nkỳ phấn khích."

# 【双鉄】
# display as 雙鐵
# JP: 「それは、面白いことなのか？\nれいなのいた、[かたがみ,1]硬上鉱山とやらでは、違うのか？」
1989 = "「Điều đó thú vị lắm sao?\nỞ cái mỏ Katakami gì đó mà Reina từng làm\nviệc thì khác à?」"

# 【れいな】
# display as 玲奈
# JP: 「うふふーぅ、そうてつさん、そうてつさんなのに、\nちょっとヘンなこといってますよぉ？」
1634 = "「Ư hự hự~, anh Soutetsu, rõ ràng là anh\nSoutetsu mà,\nlại nói chuyện hơi kỳ lạ rồi đó ạ~?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ヘンなこと？」
1654 = "「Kỳ lạ?」"

# monologue
# JP: 言われて自分の発言を振り返ってみるが――\nわからない。
2369 = "Bị nói vậy, tôi thử nhớ lại lời mình vừa\nnói nhưng――\nKhông hiểu gì cả."

# monologue
# JP: 首を傾げた僕を見て、れいなはいっそう楽しげになり、\nはずんだような言葉をつなぐ。
2518 = "Nhìn tôi nghiêng đầu khó hiểu, Reina càng\ntrở nên vui vẻ hơn,\nvà tiếp tục với giọng điệu rộn ràng."

# 【れいな】
# display as 玲奈
# JP: 「だって、“鉱山”って、\nそうてつさん、言ってるですよぉ？」
1645 = "「Thì tại vì, anh Soutetsu,\nvừa nói là \"Mỏ trên núi\" mà lị~?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか！　\n鉱山は、鉱山――つまり、山なのだな」
1580 = "「À, ra vậy! \nMỏ trên núi là mỏ trên núi――nghĩa là nó\nnằm trên núi.」"

# 【れいな】
# display as 玲奈
# JP: 「はぁいそうですぅ。山の中に、[こうみゃく,1]鉱脈があるのが、\n鉱山ですから……鉱山は、堀り登っていくのです」
1829 = "「Vâng đúng rồi ạ. Có mạch khoáng sản nằm\nbên trong núi,\nthì gọi là mỏ trên núi... Nên mỏ trên núi\nlà phải đào hướng lên trên ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「堀り登る」
1713 = "「Đào hướng lên trên.」"

# 【れいな】
# display as 玲奈
# JP: 「お山の奥まで横穴のトンネルを掘って、\nそこから上に、上にって、竪穴で[こうしょう,1]鉱床を掘るんですぅ」
1765 = "「Người ta đào một đường hầm ngang sâu vào\ntrong núi,\nrồi từ đó đào các hầm dọc hướng lên trên,\nlên trên nữa để khai thác tầng khoáng sản\nđó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「掘り登るとは、文字通りの意味か。\n……それは、かなり大変そうだな」
1523 = "「Đào hướng lên trên đúng theo nghĩa đen\nluôn à.\n……Nghe có vẻ vất vả phết nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ、れいなはやったことないけど、\nきっと大変だったろうなぁ、って思いますぅ」
1808 = "「Dạ đúng rồi~, Reina chưa làm thử bao giờ\nnhưng mà,\nchắc chắn là vất vả lắm luôn đó ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だから鉱山鉄道というものがあるのだな。\nれいなとキハ[レイナナ,1]07も、その横穴を走っていたのか？」
1584 = "「À, ra là vì vậy nên mới có đường sắt khai\nthác mỏ.\nReina và KiHa 07 cũng từng chạy trong\nđường hầm ngang đó sao?」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ、\n横穴をずうっと、歩いていったら大変ですよねぇ」
1988 = "「Dạ để xem nào,\nnếu mà cứ đi bộ suốt trong đường hầm ngang\nthì vất vả lắm anh nhỉ~」"

# monologue
# JP: れいなは同意し、\n同意しながらもくすくす笑う。
2473 = "Reina đồng tình,\nvừa đồng tình vừa cười khúc khích."

# 【れいな】
# display as 玲奈
# JP: 「けど、れいなたちは[こうない,1]坑内は走らなかったですよぉ？\n坑内を走るのは、トロッコさんか[じんしゃ,1]人車さんですぅ」
1440 = "「Nhưng mà, nhóm Reina không có chạy bên\ntrong hầm mỏ đâu ạ?\nChạy trong hầm mỏ là xe goòng hoặc xe\ngoòng chở người cơ ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「じんしゃ？」
1451 = "「Xe goòng chở người?」"

# 【れいな】
# display as 玲奈
# JP: 「人の車、って書いて、人車です。\n鉱夫さんたちを採掘の現場まで乗せていく車輌ですぅ」
1450 = "「Viết là xe của người, tức là xe goòng chở\nngười ạ.\nĐó là phương tiện chở các thợ mỏ đến tận\nhiện trường khai thác đó ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nつまりは、坑道内専用の\x%l客車;#00ffc040;客車%l;#;のようなものか」
1502 = "「Ra là vậy.\nNói cách khác, nó giống như một loại \\x%l客車;#00ffc040;toa hành khách%l;#;\nchuyên dụng trong hầm mỏ nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。鉱山で\x%l列車;#00ffc040;列車%l;#;っていったら貨物ですから。\n人だけを運ぶのは、特別に人車って呼ぶんです」
1784 = "「Dạ đúng rồi~. Ở mỏ thì \\x%l列車;#00ffc040;tàu%l;#; là để chở hàng\nhóa mà.\nNên loại chỉ dùng để chở người thì được\ngọi đặc biệt là xe goòng chở người ạ.」"

# monologue
# JP: 懐かしそうに、れいなの瞳が細められる。\n記憶の隅にある光景と、不意に重なる。
2477 = "Reina nheo mắt lại, vẻ đầy hoài niệm.\nBất chợt, hình ảnh ấy chồng lấp lên một\nkhung cảnh trong góc khuất ký ức của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そういえば初めて会った時にも言っていたな」
1561 = "「A…… nhắc mới nhớ, lần đầu gặp nhau em\ncũng từng nói thế nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「れいながですかぁ？」
1909 = "「Reina nói ạ?」"

# monologue
# JP: きょとんとした顔。\nれいなはあるいは、覚えてないのかもしれないが――
2469 = "Khuôn mặt ngơ ngác.\nCó lẽ Reina không nhớ, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ハチロクが『貨物を？』と尋ね、\nれいなは、その質問に頷いていた」
1597 = "「Ừ. Lúc Hachiroku hỏi 『Chở hàng hóa sao?』,\nReina đã gật đầu xác nhận câu hỏi đó.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁぁ、うれしいですよぉ。えへへぇ、そうてつさん、\nそんなことまで、覚えてくれてるんですねぇ」
1538 = "「Oaaa, Reina vui lắm ạ. E hèm~, anh\nSoutetsu,\nnhớ cả những chuyện như vậy luôn đó hả~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。多分、驚いたんだろうな。\nこんなに小さな\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、貨物をか――と」
1601 = "「Ừ. Chắc là vì tôi đã rất ngạc nhiên.\nMột \\x%lレイルロオド;#00ffc040;Railord%l;#; nhỏ bé thế này, mà lại đi chở\nhàng hóa sao――」"

# 【れいな】
# display as 玲奈
# JP: 「れいなも、キハ[レイナナ,1]07も、力持ちさんですから」
1643 = "「Cả Reina và KiHa 07 đều là những người\nkhỏe mạnh mà lị~」"

# monologue
# JP: ほそっこい腕を直角に曲げ、\n力コブでも見せようかというポーズを決める。
2295 = "Cô bé gập cánh tay gầy guộc lại thành góc\nvuông,\ntạo dáng như thể muốn khoe chuột bắp tay\nvậy."

# monologue
# JP: あいにく腕には、少しの盛り上がりさえ見えないが。
2247 = "Đáng tiếc là trên cánh tay ấy, chẳng có\nlấy một chút nhô lên nào."

# 【れいな】
# display as 玲奈
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;は鉱夫さんや技師さんや、そのご家族を乗せて。\nそれでそのとき、\x%l貨車;#00ffc040;貨車%l;#;も一緒に引っ張ってたんです」
1087 = "「\\x%lキハ07;#00ffc040;KiHa 07%l;#; thì chở các thợ mỏ, kỹ sư và gia\nđình của họ.\nVà lúc đó, nó cũng kéo theo cả \\x%l貨車;#00ffc040;toa chở hàng%l;#;\nnữa đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;の役割を果たしつつ、\n\x%l貨車;#00ffc040;貨車%l;#;を牽引もしてたのか」
1648 = "「Vừa đóng vai trò là \\x%l客車;#00ffc040;toa hành khách%l;#;,\nlại vừa kéo cả \\x%l貨車;#00ffc040;toa chở hàng%l;#; sao.」"

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。[かたがみ,1]硬上ではふつーのことでした。\n[ていてつ,1]帝鉄さんだと、混合\x%l列車;#00ffc040;列車%l;#;とかいったみたいですねぇ」
1794 = "「Dạ đúng rồi~. Ở mỏ Katakami thì đó là\nchuyện bình thường ạ.\nBên Teitetsu thì hình như gọi là \\x%l列車;#00ffc040;tàu%l;#; hỗn\nhợp hay sao ấy ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「混合\x%l列車;#00ffc040;列車%l;#;か、面白そうだな。というか、ああ、いや……\nマイントレジャーでやるのも、いわば」
1877 = "「\\x%l列車;#00ffc040;Tàu%l;#; hỗn hợp à, nghe thú vị đấy. Mà khoan,\nà, không...\nViệc chúng ta làm ở Mine Treasure, nói\ncách khác thì...」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ、体験採掘で掘った石炭を\x%l貨車;#00ffc040;貨車%l;#;につむなら、\nそれも立派な、混合\x%l列車;#00ffc040;列車%l;#;になるってれいな、思いますぅ」
1788 = "「Dạ đúng rồi~, nếu chất than đào được từ\ntrải nghiệm khai thác lên \\x%l貨車;#00ffc040;toa chở hàng%l;#;,\nthì nó cũng trở thành một \\x%l列車;#00ffc040;tàu%l;#; hỗn hợp đàng\nhoàng đó ạ, Reina nghĩ vậy~」"

# 【双鉄】
# display as 雙鐵
# JP: 「となると、混合\x%l列車;#00ffc040;列車%l;#;という名称を使うべきかもしれんな。\n物珍しく、観光気分が高まりそうだ」
2016 = "「Nếu vậy, có lẽ chúng ta nên sử dụng cái\ntên \\x%l列車;#00ffc040;tàu%l;#; hỗn hợp.\nNghe có vẻ mới lạ, chắc chắn sẽ làm tăng\nthêm không khí du lịch đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「そおですかぁ？」
1811 = "「Vậy sao ạ~?」"

# monologue
# JP: きょとん、とれいなは首を傾げ――\n次の瞬間、その表情を厳しい物にしてしまう。
2483 = "Ngơ ngác, Reina nghiêng đầu――\nNhưng ngay giây tiếp theo, nét mặt cô bé\ntrở nên nghiêm nghị."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、れいな」
1720 = "「Sao vậy, Reina.」"

# 【れいな】
# display as 玲奈
# JP: 「ちょこっとだけ危ない感じかもですねぇ」
1521 = "「Có vẻ như hơi nguy hiểm một chút rồi đó\nạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「危ないとは、なにがだ？」
1501 = "「Nguy hiểm là sao, có chuyện gì à?」"

# monologue
# JP: 僕の質問に答えずれいなは、ぐいぐいと体を押してくる。
2484 = "Không trả lời câu hỏi của tôi, Reina cứ\nthế đẩy mạnh vào người tôi."

# 【れいな】
# display as 玲奈
# JP: 「機械と設備のチェックはひととおりやりましたからぁ、\n念のため、早めにお外に出ておきましょお」
1851 = "「Chúng ta đã kiểm tra xong một lượt máy\nmóc và thiết bị rồi ạ,\nđể chắc chắn, mình cứ ra ngoài sớm đi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1609 = "「Ừm.」"

# monologue
# JP: 鉱山の専門家のれいながそういうのなら、\n抗うなどはありえない。
2398 = "Nếu một chuyên gia về mỏ như Reina đã nói\nvậy,\nthì tôi không có lý do gì để phản đối cả."

# monologue
# JP: ヒヤリとしたものを感じつつ、早足で坑道の外にでる。
2356 = "Cảm giác lạnh sống lưng thoáng qua, tôi\nrảo bước nhanh ra khỏi đường hầm."

# 【双鉄】
# display as 雙鐵
# JP: 「一体、なにがあったんだ？」
1495 = "「Rốt cuộc là có chuyện gì vậy?」"

# monologue
# JP: 太陽の光を浴びた途端に、張り詰めていた気持ちが和らぐ。\nれいなも、ほっとしたような柔らかな表情に戻ってる。
2275 = "Ngay khi vừa tắm mình dưới ánh sáng mặt\ntrời, cảm giác căng thẳng liền dịu đi.\nReina cũng trở lại với vẻ mặt mềm mại như\ntrút được gánh nặng."

# 【れいな】
# display as 玲奈
# JP: 「空気が、\nちょこっとだけにごってるような気がしたんです」
1894 = "「Không khí,\nReina có cảm giác hơi đục một chút xíu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「濁る」
1882 = "「Đục.」"

# monologue
# JP: 言われてみれば、淀みというか……\n屋外のこの、さわやかな空気とは確かに違った。
2541 = "Nghe em ấy nói mới để ý, cảm giác như bị\ntù đọng vậy...\nQuả thực là khác hẳn với bầu không khí\ntrong lành ở bên ngoài này."

# monologue
# JP: 違ったのだが――
2610 = "Dù là khác thật nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「坑道の、ごく浅いところにいたのだ。\nまさか、窒息などということもなかったろう」
1735 = "「Chúng ta mới ở phần rất nông của đường\nhầm mà.\nLàm gì đến mức bị ngạt thở cơ chứ.」"

# 【れいな】
# display as 玲奈
# JP: 「ちっそくまでいかなくっても、\n炭鉱では、空気のにごりはすごく危ないんですよぉ」
1703 = "「Dù chưa đến mức ngạt thở,\nnhưng ở mỏ than, không khí bị đục là rất\nnguy hiểm đó ạ~」"

# monologue
# JP: ぱたぱたと、自分を仰ぐような手つき。\nれいなの鼻がクンっと動く。
2489 = "Đôi tay khua khua như đang tự quạt cho\nmình.\nMũi Reina khẽ hếch lên ngửi ngửi."

# 【れいな】
# display as 玲奈
# JP: 「石炭は、メタンガスを含んでますから。\nそれが濃くなると、火がついてどかーんって」
1887 = "「Than đá có chứa khí metan mà lị.\nNếu nó đậm đặc lên, bắt lửa một cái là bùm\nluôn đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――それは、僕も以前に聞いたな。しかし、\nゆえに、配線類は全て厳重に絶縁してあるのだろう？」
1559 = "「À――chuyện đó, trước đây tôi cũng từng\nnghe nói. Nhưng mà,\nchính vì thế nên tất cả các loại dây điện\nđều được cách điện nghiêm ngặt rồi mà\nnhỉ?」"

# 【れいな】
# display as 玲奈
# JP: 「でもでも、誰も火も電気も使わなくっても、\n空気がよどんじゃうと、自然に爆発しちゃうんです」
1515 = "「Nhưng mà nhưng mà, dù không ai dùng lửa\nhay điện,\nchỉ cần không khí bị ứ đọng, nó cũng sẽ tự\nnhiên phát nổ đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「自然に？」
1959 = "「Tự nhiên phát nổ?」"

# 【れいな】
# display as 玲奈
# JP: 「石炭のこまかぁい粉、[たんじん,1]炭塵がある程度こくなると、\n自然に発火して爆発しちゃうってれいな、聞きました」
1908 = "「Bụi than đá siêu nhỏ, khi bụi than đặc\nđến một mức độ nào đó,\nnó sẽ tự bốc cháy và phát nổ luôn, Reina\nnghe nói thế đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんな現象が起こるのか――」
1835 = "「Có cả hiện tượng đó xảy ra sao――」"

# monologue
# JP: ゾクリと、今さら背筋が寒くなる。\n状態がいかに良かろうと、何十年も放置されてた廃炭鉱だ。
2232 = "Một cơn ớn lạnh chạy dọc sống lưng tôi lúc\nnày.\nDù tình trạng có tốt đến đâu, đây vẫn là\nmột mỏ than bỏ hoang đã bị bỏ mặc hàng\nchục năm."

# monologue
# JP: 坑内の空気がどれほど危険な状態にあっても、\nまったく不思議なことでは無い。
2280 = "Không khí bên trong hầm có ở trạng thái\nnguy hiểm đến mức nào,\ncũng hoàn toàn không có gì lạ."

# 【れいな】
# display as 玲奈
# JP: 「炭鉱の危ないとこは他にもあって、\n川のお水が、流れこんできたりもするっても聞きました」
1889 = "「Mỏ than còn có những chỗ nguy hiểm khác\nnữa,\nReina còn nghe nói nước sông cũng có thể\nchảy tràn vào đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……可能性はあるな。\nここも、もろにクマ川の近くだ」
1919 = "「Quả thực…… là có khả năng đó.\nChỗ này cũng nằm ngay sát sông Kuma mà.」"

# 【れいな】
# display as 玲奈
# JP: 「それから、もちろん落盤ですよねぇ」
1996 = "「Sau đó thì, tất nhiên là sập hầm rồi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
# 1594 = "「嗯……」" 

# monologue
# JP: 安全が第一の義務であるのは、\n無論、鉄道に限った話ではない。
2317 = "Đảm bảo an toàn là nghĩa vụ hàng đầu,\ntất nhiên không chỉ riêng trong ngành\nđường sắt."

# monologue
# JP: それは百も承知なのだが――
2597 = "Điều đó tôi biết rõ mười mươi, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「……チェックし、クリアするべき項目は\n予想以上に、多岐にわたってしまうのだなぁ」
1103 = "「……Những hạng mục cần kiểm tra và xử lý\nlại đa dạng và phức tạp hơn dự đoán nhiều\nnhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「でもでも、機械と設備はほとんど生きてましたからぁ。\nこれなら予算、きっとあててもらえるですよぉ」
1470 = "「Nhưng mà nhưng mà, máy móc và thiết bị\nhầu hết vẫn còn sống mà lị~.\nThế này thì chắc chắn sẽ xin được ngân\nsách thôi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nならば、僕らは仕事を果たせることとなるな」
1809 = "「Vậy sao.\nNếu thế thì chúng ta đã hoàn thành công\nviệc rồi nhỉ.」"

# monologue
# JP: 本格的な調査をするなら、\nれいなの知識と能力でもやはり及ばない。
2565 = "Nếu tiến hành khảo sát quy mô lớn,\nthì kiến thức và năng lực của Reina e là\nvẫn chưa đủ."

# monologue
# JP: 専門家による調査のための予備調査。\n――それも今回、僕らが果たすべきことのひとつだ。
2273 = "Một cuộc khảo sát sơ bộ để chuẩn bị cho\ncuộc khảo sát của các chuyên gia.\n――Đó cũng là một trong những nhiệm vụ\nchúng tôi phải hoàn thành lần này."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派の議員の中にも、\nこの計画には賛同してくれそうな者もいると聞く」
1749 = "「Nghe nói trong số các nghị sĩ ủng hộ việc\nthu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\ncũng có người có vẻ sẽ tán thành kế hoạch\nnày.」"

# monologue
# JP: マイントレジャーと炭鉱復活による、市の経済再生。
2599 = "Phục hồi kinh tế thành phố thông qua Mine\nTreasure và việc hồi sinh mỏ than."

# monologue
# JP: その実現可能性を見極めるための調査であれば、\n補正予算をあててもらえる可能性は十二分にある。
2459 = "Nếu là cuộc khảo sát để đánh giá tính khả\nthi của kế hoạch đó,\nthì khả năng được cấp ngân sách bổ sung là\nhoàn toàn có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らが持ち帰る報告は、きっと揺れている者の背を押す。\nれいなのおかげで、いい方向へと進めそうだ」
1736 = "「Bản báo cáo chúng ta mang về chắc chắn sẽ\ntiếp thêm động lực cho những người đang\ndao động.\nNhờ có Reina, mọi chuyện có vẻ đang tiến\ntriển theo hướng tốt.」"

# 【れいな】
# display as 玲奈
# JP: 「それなら、れいなもうれしいですよぉ」
1672 = "「Nếu vậy thì Reina cũng vui lắm ạ~」"

# monologue
# JP: にこにこにこにこ。
2487 = "Cười tủm tỉm tủm tỉm."

# monologue
# JP: 笑顔というのはそれだけで、\n見ている人を幸せにすると、つくづく思う。
2350 = "Tôi chợt nhận ra rằng, chỉ riêng một nụ\ncười thôi,\ncũng đủ để mang lại hạnh phúc cho người\nngắm nhìn nó."

# 【れいな】
# display as 玲奈
# JP: 「じゃあ、もおちょっとだけがんばって、\nしゅくしゃの方も、確かめちゃいますかぁ？」
2013 = "「Vậy thì, cố gắng thêm một chút xíu nữa,\nmình qua kiểm tra khu ký túc xá luôn nha\nanh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。その位の時間はまだ残ってる」
1803 = "「Được đấy. Thời gian cỡ đó thì vẫn còn.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁいです！\nなら、行きましょ――ふわわっ！？」
1669 = "「Oaa! \nVậy mình đi thôi――phù oa!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1545 = "「Ối chà.」"

# monologue
# JP: （がしっ）
2631 = "（Chộp lấy）"

# 【れいな】
# display as 玲奈
# JP: 「わ！」
1531 = "「Oa!」"

# monologue
# JP: 大きく弾んだ一歩があまりに勢いづいて、\nれいなは危うくコケかけた。
2498 = "Bước chân nhảy cẫng lên quá đà,\nkhiến Reina suýt nữa thì vấp ngã."

# monologue
# JP: 前の経験がなかったのなら、\n今度も腕を、きっと掴めずにいただろう。
2312 = "Nếu không có kinh nghiệm từ lần trước,\nthì lần này chắc tôi cũng không thể tóm\nđược tay em ấy."

# monologue
# JP: （ひょいっ）
# 2629 = "（嘿咻）" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　また抱っこですぅ」
1533 = "「Oa! Lại được bế rồi ạ~」"

# monologue
# JP: そして今度のれいなの声は、\n純粋な喜びだけに満ちて聞こえる。
2550 = "Và giọng nói của Reina lần này,\nnghe ngập tràn một niềm vui sướng thuần\nkhiết."

# 【双鉄】
# display as 雙鐵
# JP: 「このまま急ぐぞ。\n日がくれてしまっては、調査も難しくなるからな」
1705 = "「Cứ thế này đi nhanh thôi.\nTrời mà tối thì việc khảo sát sẽ khó khăn\nlắm.」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
# 1661 = "「好的！」" 

# monologue
# JP: れいなの笑顔に、気を引き締める。
2522 = "Nhìn nụ cười của Reina, tôi tự xốc lại\ntinh thần."

# monologue
# JP: 油断をすれば僕の足先もいくらか弾み、\n危ういこととなりそうだから。
2267 = "Vì nếu lơ là, bước chân của tôi cũng sẽ\nnảy lên đôi chút,\nvà có vẻ như sẽ gặp nguy hiểm mất."

# 【れいな】
# display as 玲奈
# JP: 「わぁい！　あなた、おかえりなさいですぅ」
1536 = "「Oa! Mình ơi, mừng mình đã về nhà nha~」"

# monologue
# JP: （むっ――「あなた」、なのか）
2628 = "（Hửm――\"Mình\" cơ à?）"

# monologue
# JP: てっきり僕がお父さん役かと思ったが、\n「あなた」と来るなら、亭主の役となるのだろう。
2378 = "Tôi cứ đinh ninh mình đóng vai người bố,\nnhưng nếu gọi là \"mình\" thì chắc là vai\nngười chồng rồi."

# monologue
# JP: 生憎と、誰とも結婚したことは無いが――\nああ、そうか。父を思い出し、真似ればいいのか。
2192 = "Đáng tiếc là tôi chưa từng kết hôn với\nai――\nÀ, đúng rồi. Cứ nhớ lại bố rồi bắt chước\ntheo là được nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「た、ただいま。ああ――うむ、疲れた」
1727 = "「A, anh về rồi đây. À――ừm, mệt quá đi\nmất.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おしごと、おつかれさまですぅ」
1624 = "「Ư hự hự, mình đi làm vất vả rồi ạ~」"

# monologue
# JP: こことても、\n放置されてからもう十年以上は経ってるだろう。
2596 = "Chỗ này cũng vậy,\nchắc hẳn đã bị bỏ hoang hơn mười năm rồi."

# monologue
# JP: が、驚くほどに状態がいい。\n畳に腰を下ろすことにも、さほど抵抗が無いほどに。
2217 = "Nhưng, tình trạng lại tốt đến đáng kinh\nngạc.\nĐến mức tôi không cảm thấy quá ngần ngại\nkhi ngồi xuống chiếu tatami."

# 【れいな】
# display as 玲奈
# JP: 「ごはんにしますかぁ？　おふろにしますかぁ？」
1967 = "「Mình ăn cơm trước nhé? Hay là đi tắm\ntrước ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ごはん――っと、ああいや。\n炭鉱労働の帰りで真っ黒だからな、やはりおふろだ」
1485 = "「Ăn cơm――à không, từ từ đã.\nVừa đi làm mỏ than về người đen nhẻm, vẫn\nlà đi tắm trước thôi.」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、わかしてありますよぉ」
1664 = "「Vâng ạ, em đun nước sẵn rồi đó nha~」"

# monologue
# JP: ぱたぱたと奥の方へと軽やかな足音が飛んでいき――\nけれども「あ」と、短い声に止まってしまう。
2311 = "Tiếng bước chân nhẹ nhàng lạch cạch chạy\nvề phía trong――\nThế nhưng lại dừng bặt lại với một tiếng\n\"A\" ngắn ngủn."

# monologue
# JP: ああ、ならば……風呂場は多分、\n相当に荒れているのだろう。
2260 = "À, nếu vậy thì... phòng tắm có lẽ,\nđã hoang tàn lắm rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「と思ったが、空腹がいささか耐え難い。\nやはり、ごはんにしてもらえるか？」
1737 = "「Anh đổi ý rồi, bụng đói cồn cào không\nchịu nổi nữa.\nThôi thì, cho anh ăn cơm trước được\nkhông?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、今日は、肉じゃがと、\nおネギとお麩のお味噌汁ですよぉ」
1663 = "「Vâng ạ, hôm nay có thịt hầm khoai tây,\nvà súp miso nấu với hành và váng đậu đó\nnha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、旨そうだな」
1591 = "「Chà, nghe ngon đấy.」"

# monologue
# JP: この宿舎内の部屋をみるなり、\n「おままごとをしてみたい」と僕にねだった――
2467 = "Vừa nhìn thấy căn phòng trong khu ký túc\nxá này,\nem ấy đã nài nỉ tôi \"Cho em chơi trò gia\nđình đi\"――"

# monologue
# JP: れいなが憧れてたという、炭鉱の人の普通の暮らしは、\nきっと、肉じゃがと味噌汁との温かさなのだろう。
2297 = "Cuộc sống bình dị của những người thợ mỏ\nmà Reina luôn ao ước,\nchắc chắn là sự ấm áp của món thịt hầm\nkhoai tây và súp miso này."

# 【双鉄】
# display as 雙鐵
# JP: 「もぐもぐ……ああ、旨い。\n一日の疲れがとれていくようだ」
1568 = "「Nham nháp…… à, ngon quá.\nCảm giác như bao mệt mỏi trong ngày tan\nbiến hết vậy.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、\nおいしそうに食べてもらえて嬉しいですよぉ」
1633 = "「Ư hự hự,\nThấy mình ăn ngon miệng thế này em vui lắm\nđó nha~」"

# monologue
# JP: ……芝居を意識し、ぎくしゃくとしてしまった顔が、\nれいなの自然な笑顔につられ、ほぐされる。
1077 = "……Khuôn mặt cứng đờ vì mải để ý đến diễn\nxuất của tôi,\nđã được nới lỏng ra nhờ nụ cười tự nhiên\ncủa Reina."

# 【れいな】
# display as 玲奈
# JP: 「今日のお仕事は、どうでしたか？」
1460 = "「Công việc hôm nay của mình thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「う、ううむ――」
1555 = "「Ư, ừm――」"

# monologue
# JP: そういったアドリブは得意ではない。\nならば――
2345 = "Tôi không giỏi mấy trò ứng biến kiểu này.\nNếu vậy thì――"

# monologue
# JP: ああ、そうか。\n実際のことを言えばいいのか。
2322 = "À, ra vậy.\nCứ nói sự thật là được chứ gì."

# 【双鉄】
# display as 雙鐵
# JP: 「今日は、予備調査の仕事をしてきた。\n予算をつけて本調査に入るための、大事な仕事だ」
1458 = "「Hôm nay anh đi làm công tác khảo sát sơ\nbộ.\nĐó là một công việc quan trọng để xin cấp\nngân sách và bước vào khảo sát chính\nthức.」"

# 【れいな】
# display as 玲奈
# JP: 「あ」
1565 = "「A」"

# monologue
# JP: にへっと、こどもじみた笑み。\nれいなの笑顔は、いくつもいくつも変化をみせて面白い。
2506 = "Một nụ cười ngây ngô, trẻ con nở trên môi.\nNụ cười của Reina có vô vàn sự thay đổi,\nthật thú vị."

# 【れいな】
# display as 玲奈
# JP: 「お仕事のできばえは、どおでしたかぁ」
1707 = "「Kết quả công việc thế nào rồi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「上々だった。パートナーが素晴らしかったからな」
1715 = "「Rất tuyệt vời. Vì người cộng sự của anh\nquá xuất sắc mà.」"

# 【れいな】
# display as 玲奈
# JP: 「わわっ」
1530 = "「Oa oa.」"

# monologue
# JP: 今度はポっと、照れ笑い。
2595 = "Lần này là một nụ cười bẽn lẽn, ngượng\nngùng."

# monologue
# JP: 僕が本当の事を言ってるだけだと、\nどうやられいなも、理解した。
2513 = "Có vẻ Reina cũng đã hiểu ra rằng,\ntôi chỉ đang nói sự thật mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕に気づかぬことに気づいて、見えないものを見ていた。\n知識も豊富で、僕はまるきり役立たずだったような気さえ」
1657 = "「Em ấy nhận ra những điều anh không nhận\nra, nhìn thấy những thứ anh không thấy.\nKiến thức lại phong phú, anh còn có cảm\ngiác mình hoàn toàn vô dụng nữa kìa.」"

# 【れいな】
# display as 玲奈
# JP: 「そんなことないです！　そうてつさんがいてくれたから、\nれいな、さみしいきもちにならなかったですから！　あ」
1756 = "「Không có chuyện đó đâu ạ! Vì có anh\nSoutetsu ở bên,\nnên Reina mới không cảm thấy cô đơn đó ạ!\nÁ.」"

# monologue
# JP: 役が、壊れた。
2442 = "Vai diễn bị phá vỡ rồi."

# monologue
# JP: れいなの顔は残念そうで、\nけれどもやはり、楽しげだ。
2497 = "Khuôn mặt Reina có vẻ tiếc nuối,\nnhưng rốt cuộc vẫn tràn ngập niềm vui."

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ、\nままごとというのも、なかなか難しい物だな」
1525 = "「Fufu,\ntrò chơi gia đình này, xem ra cũng khó\nphết nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。れいな、\n途中から、ほんとのれいなにもどっちゃいましたぁ」
1787 = "「Dạ đúng rồi~. Reina,\ntừ giữa chừng đã trở lại làm Reina thật\nmất rồi ạ~」"

# monologue
# JP: また照れ笑い。\n少し、悔しさも入り混じえ。
2236 = "Lại là nụ cười bẽn lẽn.\nPha lẫn chút tiếc nuối."

# 【れいな】
# display as 玲奈
# JP: 「れいな、たーくさんのひとたちのくらしを見てきたから、\nもっと上手にできるかなぁって思ったんですけど」
1904 = "「Reina đã từng chứng kiến cuộc sống của\nrất rất nhiều người,\nnên cứ tưởng mình sẽ làm tốt hơn cơ ạ~」"

# monologue
# JP: 少しだけ俯いてしまった頭に、手を伸ばす。
2481 = "Tôi đưa tay chạm vào mái đầu đang hơi cúi\nxuống."

# monologue
# JP: ポーレットがいつもしているように、\nれいなの髪を、撫でずにはいられない気持ちになって。
2362 = "Giống như những gì Paulette vẫn thường\nlàm,\ntôi bỗng có cảm giác không thể không vuốt\nve mái tóc của Reina."

# 【双鉄】
# display as 雙鐵
# JP: 「……芝居で、上手にくらしを演じる必要などないさ」
1097 = "「……Đâu cần phải diễn thật giỏi cuộc sống\ntrong một vở kịch làm gì.」"

# 【れいな】
# display as 玲奈
# JP: 「そうてつ、さん？」
2026 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは素敵に、れいなのくらしをくらしてる。\nポーレットと一緒に、僕があこがれるほどのくらしを」
1478 = "「Reina đang sống một cuộc sống của riêng\nmình một cách tuyệt vời.\nCùng với Paulette, một cuộc sống khiến cả\nanh cũng phải ngưỡng mộ.」"

# 【れいな】
# display as 玲奈
# JP: 「ふわわっ」
1527 = "「Phù oa.」"

# monologue
# JP: 一瞬にして、赤くなる。\nその熱が、僕の胸にまで伝わってくる。
2304 = "Trong chớp mắt, khuôn mặt em ấy đỏ bừng.\nHơi nóng đó dường như truyền đến tận ngực\ntôi."

# monologue
# JP: これは……保護欲というのだろうか。\nもっと優しく、大事にあつかってやりたくなる。
2593 = "Đây là…… bản năng bảo vệ sao.\nTôi muốn đối xử với em ấy dịu dàng hơn,\nnâng niu hơn nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「寂しい気持ちにならなかったと――\nさっきれいなは……本当のれいなは、言ってたな？」
1496 = "「Em bảo là không cảm thấy cô đơn――\nLúc nãy Reina…… Reina thật sự, đã nói vậy\nnhỉ?」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1822 = "「Vâng ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「やはり寂しいものなのか？\n炭鉱を見て、昔を思い出してしまうのが」
1922 = "「Quả nhiên là thấy cô đơn sao?\nNhìn mỏ than, lại nhớ về ngày xưa ấy.」"

# 【れいな】
# display as 玲奈
# JP: 「思い出すのはうれしいですよぉ。\nむかしのおはなしをすることも。でも――」
1637 = "「Nhớ lại thì vui lắm ạ.\nCả việc kể chuyện ngày xưa nữa. Nhưng\nmà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「でも？」
1473 = "「Nhưng mà?」"

# 【れいな】
# display as 玲奈
# JP: 「でも……」
1466 = "「Nhưng mà……」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2035 = "「！」" 

# monologue
# JP: れいなの顔が、大人びる。\n凛然とした尊い何かが、おさなげな輪郭の向こうに見える。
2493 = "Gương mặt Reina bỗng trở nên chín chắn.\nMột nét gì đó uy nghiêm, cao quý hiện lên\nđằng sau những đường nét ngây thơ ấy."

# monologue
# JP: ああ、そうだ――実際のところ、そうなのだ。\nれいなは僕より長く生き、多くをきっと、見聞きしてきた。
2259 = "À, đúng rồi――thực tế là như vậy.\nReina sống lâu hơn tôi, và chắc chắn đã\nnhìn thấy, nghe thấy nhiều điều hơn tôi."

# 【れいな】
# display as 玲奈
# JP: 「なぁんでもないですぅ。さみしくなったらやだなって、\nれいな、心配になっただけですよぉ」
1859 = "「Không có gì đâu ạ. Chỉ là Reina sợ mình\nsẽ thấy cô đơn,\nnên hơi lo lắng một chút thôi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1810 = "「Vậy sao.」"

# monologue
# JP: だから、それ以上を尋ねはしない。
2380 = "Vì vậy, tôi không gặng hỏi thêm nữa."

# monologue
# JP: あえて語ろうとしないなら、\n自分の寂しさを隠しても、守りたい何かがあるのだろう。
2301 = "Nếu em ấy đã không muốn nói,\nthì chắc hẳn có điều gì đó em ấy muốn bảo\nvệ, dẫu có phải giấu đi sự cô đơn của\nmình."

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは、強いな」
1906 = "「Reina mạnh mẽ thật đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、そうですよぉ」
1630 = "「Ư hự hự, đúng vậy đó ạ~」"

# monologue
# JP: また、力こぶ。
2293 = "Lại là điệu bộ khoe chuột bắp tay."

# monologue
# JP: まったくこぶはできないけれど、\n今度は不思議と、頼もしい。
2221 = "Dù chẳng thấy cục chuột nào nổi lên,\nnhưng lần này, thật kỳ lạ, tôi lại thấy em\nấy vô cùng đáng tin cậy."

# 【れいな】
# display as 玲奈
# JP: 「れいな、こう見えて力持ちさんなんですからぁ！」
1491 = "「Reina nhìn thế này thôi chứ khỏe lắm đó\nnha!」"
