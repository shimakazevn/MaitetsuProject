2165 = "「Chỗ, đó——của Reina——chỗ đó, nữa đi」"
# monologue
# JP: （ふるっ）
3286 = "（Lắc lư）"
# monologue
# JP: つながったまま、それでもれいなが腰を動かす。\n僕をサポートするかのように、あるいは僕を誘おうと。
2895 = "Vẫn đang kết nối, Reina tự mình chuyển động hông.\nNhư thể đang hỗ trợ tôi, hoặc là đang quyến rũ tôi."
# 【れいな】
# display as 玲奈
# JP: 「いちばん、おくの――ぶつかる、とこ――まで――\nんっ――そうてつ――さん、の――おちん、ちん、で」
2391 = "「Bằng dương, vật——của——anh, Soutetsu——\nđến tận——chỗ——chạm vào, sâu nhất——ưm」"
# monologue
# JP: れいなの膣がわなないている。\n欲しくて欲しくて、貼りつきながら蠢いている。
3063 = "Âm đạo của Reina đang run rẩy.\nKhao khát đến tột cùng, bám chặt lấy và không ngừng co bóp."
# monologue
# JP: 動きたい。望まれるまま、貪りたい。\nけれども、まだだ。もう少しだけ我慢する。
2911 = "Tôi muốn chuyển động. Muốn ngấu nghiến theo sự mong cầu của em ấy.\nNhưng, vẫn chưa được. Phải nhẫn nhịn thêm chút nữa."
# 【れいな】
# display as 玲奈
# JP: 「れいなの、おまんこ――いちばん、おくの――\nしきゅう――ごつんっって、してくださいですぅ！」
2389 = "「Chỗ đó của Reina——sâu nhất——\ntử cung——hãy đâm mạnh vào đi ạ~!」"
# monologue
# JP: （ぐんんんんっ！　ごっ！！！）
3272 = "（Phập! Rầm!!!）"
# 【れいな】
# display as 玲奈
# JP: 「きゅふううううううううんっ！！！」
2044 = "「Kyufuuuuuuuun!!!」"
# monologue
# JP: 返事は、僕の体の全部で。
2944 = "Lời đáp lại, bằng toàn bộ cơ thể tôi."
# monologue
# JP: （ぐっ！　ぐいっ！　ずるっっ！　ごつんっ！！）
3262 = "（Phập! Phập! Phập! Rầm!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ！　うっ！　ふあっ！　これっ！　これっ！\nしゅごっ――んっ――ひっ――ふぁぁぁっん！！！」
1986 = "「Hya! Ư! Fua! Cái này! Cái này!\nTuyệt quá——ưm——hi——fuaaaan!!!」"
# monologue
# JP: ごりごりと、れいなの膣をえぐってく。\nその最奥に、僕の全てを遠慮会釈なくぶつけてく。
2949 = "Tôi hung hăng đào bới âm đạo của Reina.\nKhông chút ngần ngại, tôi giáng toàn bộ sức mạnh của mình vào nơi sâu nhất ấy."
# 【れいな】
# display as 玲奈
# JP: 「はっ――はげっ――しっ――ふっ――んあっ――\nれい、な――おな、か――きゅんっ、て、きゅうんて」
2134 = "「Ha——mãnh, liệt——quá——fu——n-a——\nbụng, của——Rei, na——đang, quặn, lại」"
# monologue
# JP: （ごっ！　ずっ！　ずるっ！　じゅばっ！！）
3263 = "（Rầm! Phập! Phập! Phập!!）"
# 【れいな】
# display as 玲奈
# JP: 「おまん、こっ――とけ――て――くっつい――て\n――ふあっ――ずり――ずりっ――いっしょ、にっ」
2172 = "「Chỗ, đó——như tan, chảy——bám chặt, lấy\n——fua——cọ——cọ xát——cùng, nhau」"
# monologue
# JP: れいなの膣は、極狭で柔らか過ぎる肉壁は、\n僕の勃起に、粒立ちながら甘く粘って抱きついてくる。
3066 = "Âm đạo của Reina, vách thịt vô cùng chật hẹp và mềm mại,\nbám chặt lấy dương vật cương cứng của tôi, vừa gợn hột vừa nhớp nháp ngọt ngào."
# 【れいな】
# display as 玲奈
# JP: ひゃううっ――うっ――きゅうんって――おまんこ、\nおまんこっ、子宮――ほし、くて――ぱく、って！」
1995 = "「Hyauu——ư——quặn lại——chỗ đó,\nchỗ đó, tử cung——đang khao, khát——ngậm, lấy!」"
# monologue
# JP: （ずっ！　ずばっっ！　ちゅちゅるっ！　ごつんっ！）
# 3263 = "（啪、啪、啪、啪！）" 
# 【れいな】
# display as 玲奈
# JP: 「ちゅう、され、る、と――んっ――おちん、ちん、\nくる、と――ほし、くて――もっと――きてる、のに」
2436 = "「Được, hôn——ưm——dương, vật,\nđến——khao, khát——nữa——đang tới, rồi」"
# monologue
# JP: 子宮口。分厚い壁が、けれども僕を歓迎している。\n精子欲しさに、その入口ごと吸い付いてくる。
2858 = "Cửa tử cung. Vách thịt dày, nhưng lại đang chào đón tôi.\nVì khao khát tinh trùng, toàn bộ lối vào đang mút chặt lấy."
# 【れいな】
# display as 玲奈
# JP: 「ひゃっ――あっ――あっ！　あっ――あっ！！\nれいな、れいなっ――れいなっ――もうっ！！」
1886 = "「Hya——a——a! A——a!!\nReina, Reina——Reina——sắp!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだ――だ――一緒に――\nだからっ――我慢――だっ――」
2229 = "「Vẫn——chưa——cùng nhau——\nCho nên——chịu đựng——chút đi——」"
# 【れいな】
# display as 玲奈
# JP: 「いっしょ――いっしょ――んっ――ふあっ――\nれいなも――いっしょ――いっしょがいい、ですぅ」
1784 = "「Cùng nhau——cùng nhau——ưm——fua——\nReina cũng——cùng nhau——muốn cùng nhau, ạ~」"
# monologue
# JP: シーツに顔を埋めるように、\nれいなが必死で自分を抑える。
3036 = "Reina vùi mặt vào ga giường,\nliều mạng kìm nén bản thân."
# 【れいな】
# display as 玲奈
# JP: 「ふぁ――ダメッ――おまん、こ――まだ、だめぇ。\nいっしょ――そうてつ、さん、と――いっしょ、に」
2451 = "「Fua——không được——chỗ, đó——vẫn chưa, được.\nCùng nhau——với anh, Soutetsu——cùng, nhau」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――！」
1962 = "「!」"
# monologue
# JP: （ずばんっ！　ずるううっ！　ばちゅっ！　ずりゅっ！）
# 3263 = "（啪、啪、啪、啪！）" 
# 【れいな】
# display as 玲奈
# JP: 「きゅふっ――んっ！　～～～っ！　ふっ――く――\nんっ――だめ――ま、だっ――おまんこ、だめえっ」
2015 = "「Kyufu——ưm! ~~~! Fu——ku——\nưm——không được——vẫn, chưa——chỗ đó, chưa được」"
# monologue
# JP: 必死に絶えるれいなの震え。声。汗。匂い。息遣い。\nそれら全てが、僕を高める。
3041 = "Sự run rẩy của Reina khi liều mạng chịu đựng. Giọng nói. Mồ hôi. Mùi hương. Hơi thở.\nTất cả những thứ đó, đang đẩy tôi lên đỉnh điểm."
# monologue
# JP: （ずばっ！　じゅっ！　ばちゅんっ！　じゅぶっ！）
# 3263 = "（啪、啪、啪、啪！）" 
# 【れいな】
# display as 玲奈
# JP: 「ひゃあううんっ！　そう、てつ――しゃん――ふあ\n――れいな、もう――もうっ！！」
1978 = "「Hyaauun! Anh, Soutetsu——fua\n——Reina, sắp——sắp rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ――もう、すぐだっ！」
2062 = "「Ừ, anh cũng vậy——sắp, ra rồi!」"
# 【れいな】
# display as 玲奈
# JP: 「んひゅっ！！」
2020 = "「Nhyu!!」"
# monologue
# JP: （きゅううううううんっ！！！）
3289 = "（Siết chặt!!!）"
# monologue
# JP: よほど、嬉しかったのだろう。\nれいなの膣がここぞとばかりに絞りにかかる。
3019 = "Chắc hẳn là vui lắm.\nÂm đạo của Reina nhân cơ hội này siết chặt lấy."
# monologue
# JP: その狭隘の最奥へ、\n精子の全部を、残さず注ぎ尽くすためっ！
2901 = "Hướng về nơi sâu thẳm chật hẹp đó,\nđể trút toàn bộ tinh trùng, không chừa lại một giọt nào!"
# monologue
# JP: （ずぶううううううううううううっ！　ごっ！！）
3273 = "（Phập! Rầm!!）"
# 【れいな】
# display as 玲奈
# JP: 「ひゅああああああああああああぁぁぁぁんっ！！！」
1979 = "「Hyuaaaaaaaaaaaaaaaaaan!!!」"
# monologue
# JP: （びゅぶっ！　どびゅっ！　どびゅう！　びゅぷっ！）
3258 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【れいな】
# display as 玲奈
# JP: 「きたっ――きてるっ――ふあっ――あっ――あっ！\nあついっ――あついのっ――そうてつ――さん、の」
1835 = "「Đến rồi——đang tới——fua——a——a!\nNóng quá——nóng quá——của anh——Soutetsu」"
# monologue
# JP: （びゅるるる！　びゅっ！　ぶびゅっ！　びゅうう！)
3257 = "（Phụt phụt! Phụt! Phụt! Phụt!)"
# 【れいな】
# display as 玲奈
# JP: 「せいえき――あついの――れいなの、おなかっ――\nおなか――しきゅうに――たくさん！　たくさんっ」
2426 = "「Tinh dịch——nóng hổi——trong bụng, Reina——\ntrong bụng——trong tử cung——nhiều quá! Nhiều quá」"
# monologue
# JP: （んびゅっ――びゅ――びゅるる――――びゅぶっ）
3256 = "（Phụt——phụt——phụt phụt――――phụt）"
# 【れいな】
# display as 玲奈
# JP: 「ふあ……ぁ……ぁ……やぁ――んっ――\nおまんこ――せいえき――あふれ――ちゃって、る」
2457 = "「Fua……a……a……ya——ưm——\nchỗ đó——tinh dịch——đang tràn——ra ngoài」"
# 【双鉄】
# display as 雙鐵
# JP: 「もったいないか？」
2244 = "「Tiếc sao?」"
# monologue
# JP: 結合部分を指でぬぐって、\nその指先を、ためしにれいなのくちもとに――
2954 = "Tôi dùng ngón tay quệt lấy chỗ kết nối,\nrồi thử đưa đầu ngón tay đó lên miệng Reina——"
# 【れいな】
# display as 玲奈
# JP: 「アムッ――ちゅっ――ちゅっ――ちゅううっ！」
1994 = "「Am——chụt——chụt——chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな」
2364 = "「Reina」"
# monologue
# JP: かわいい。愛しい。たまらない。\n吐精したばかりの勃起が、むくむく勢いを取り戻す。
3127 = "Đáng yêu quá. Dễ thương quá. Chịu không nổi.\nDương vật vừa mới xuất tinh, lại bừng bừng lấy lại khí thế."
# 【れいな】
# display as 玲奈
# JP: 「ぺろっ――ちゅううっ――ぺろぺろ――かぷっ！」
2043 = "「Liếm——chụt——liếm liếm——cạp!」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな！？」
2382 = "「Reina!?」"
# monologue
# JP: 軽ぅくであるが、歯が立った。\n驚く僕に、れいなはにぱっと笑ってみせる。
3094 = "Rất nhẹ thôi, nhưng em ấy đã cắn.\nNhìn tôi kinh ngạc, Reina nhoẻn miệng cười."
# 【れいな】
# display as 玲奈
# JP: 「れいな、強い赤ずきんちゃんですからぁ。\nおおかみさんも、食べちゃうのですよぉ」
2377 = "「Reina, là cô bé quàng khăn đỏ mạnh mẽ mà~.\nCả sói cũng, ăn thịt luôn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、僕の全部を食べてくれ」
2297 = "「Vậy sao. Nếu thế, hãy ăn sạch anh đi.」"
# monologue
# JP: 顔を寄せれば、れいなはすぐに答えてくれる。
2931 = "Khi tôi ghé sát mặt vào, Reina lập tức đáp lại."
# 【れいな】
# display as 玲奈
# JP: 「ん……ちゅっ――ちゅうっ――ちゅむっ――ん……\nしゅき……んっ――ちゅっ――ほうへふ……はぁん」
2047 = "「Ưm……chụt——chụt——chụt——ưm……\nyêu……ưm——chụt——Soutetsu……haan」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、れいなが大好きだ」
2210 = "「Anh cũng, rất yêu Reina.」"
# monologue
# JP: キスを解いて、姿勢を変える。\nれいなはにっこり、笑ってくれる。
2897 = "Dứt nụ hôn, tôi thay đổi tư thế.\nReina mỉm cười thật tươi với tôi."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、よくばりおおかみさんを、\nれいな、ぱくって食べちゃいますねぇ」
2103 = "「Ufufu~, con sói tham lam này,\nReina, sẽ ngoạm một miếng ăn thịt luôn nha~」"
# monologue
# JP: そうして、おおきくおくちをあけて――
2991 = "Rồi, em ấy há miệng thật to——"
# 【れいな】
# display as 玲奈
# JP: 「ぱくっ♪」
2220 = "「Ngoạm♪」"
