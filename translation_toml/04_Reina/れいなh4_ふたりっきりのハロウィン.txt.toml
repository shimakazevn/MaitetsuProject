2434 = "「Nghe nói người đó không hề giao dịch qua ATM hay tài khoản gì cả.\nNói cách khác, người đó chỉ đơn thuần là 『đến ngân hàng để chụp ảnh kỷ niệm』 thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「銀行さんの記念撮影ですかぁ？」
1836 = "「Chụp ảnh kỷ niệm ngân hàng ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、二十代くらいの女性だったらしい。\n大荷物を抱えていたので、多分、旅行者だろうと」
2059 = "「Ừ, nghe nói là một người phụ nữ khoảng độ tuổi hai mươi.\nVì ôm một hành lý rất to, nên có lẽ, là khách du lịch.」"
# 【れいな】
# display as 玲奈
# JP: 「旅行者さん」
2250 = "「Khách du lịch ạ~」"
# monologue
# JP: れいなの顔が持ち上がり、\n戻って、きょとん。とても不思議そうに僕を見る。
3038 = "Reina ngẩng mặt lên,\nrồi lại cúi xuống, ngơ ngác. Nhìn tôi với vẻ vô cùng khó hiểu."
# 【れいな】
# display as 玲奈
# JP: 「ステンドグラスがとーっても好きな人ですかぁ？」
2301 = "「Là người rất thiếch rất thích kính màu ghép ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうした可能性もある。\nが、より有力な説を稀咲が聞かせてくれた」
2073 = "「À thì, cũng có khả năng đó.\nNhưng mà, Kisaki đã cho anh nghe một giả thuyết có vẻ thuyết phục hơn.」"
# 【れいな】
# display as 玲奈
# JP: 「有力な説――どんなのですかぁ？」
2310 = "「Giả thuyết thuyết phục hơn——là gì vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これだ」
2061 = "「Ừm. Là cái này đây.」"
# monologue
# JP: 銀行のパンフ入れから一枚を抜き取ってきた、\n見慣れたペーパーをれいなにわたす。
2927 = "Tôi rút một tờ từ kệ để tờ rơi của ngân hàng,\nđưa cho Reina tờ giấy quen thuộc."
# 【れいな】
# display as 玲奈
# JP: 「わ、これ、『おひとよし通信』ですねぇ」
1922 = "「Oa, cái này là, 『Bản tin Ohitoyoshi』 nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕らの冊子だ」
2069 = "「Ừ, cuốn sách nhỏ của chúng ta đấy.」"
# monologue
# JP: 御一夜鉄道の、御一夜市の知名度アップを計るため、\n日々姫主導で作り始めた小冊子。
3118 = "Để nâng cao độ nhận diện của Đường sắt Ohito, của thành phố Ohimitera,\ncuốn sách nhỏ được bắt đầu thực hiện dưới sự dẫn dắt của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「発行を重ねるたびに部数を大きく伸ばしているのは、\nれいなも知っていることだよな？」
2325 = "「Mỗi lần phát hành số lượng in đều tăng lên đáng kể,\nchuyện này Reina cũng biết đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。インターネットで.pdf配布してるのも、\nすごいダウンロード数ってポーレットいってましたぁ」
2262 = "「Vâng ạ~. Việc phát hành file .pdf trên internet,\ncũng có số lượt tải về khủng lắm, chị Paulette đã nói vậy ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2506 = "「Vậy sao.」"
# monologue
# JP: れいなの方が、よほど僕より詳しいようだ。\nならば、要点だけ伝えよう。
3028 = "Có vẻ như Reina, còn rành hơn cả tôi nữa.\nVậy thì, anh sẽ chỉ truyền đạt những điểm chính thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それが効果を示してきているらしいのだ。\nいままでになかった形の観光客さんが来ていると」
2167 = "「Có vẻ như nó đang mang lại hiệu quả đấy.\nNhững khách du lịch với hình thức chưa từng có từ trước đến nay đang tìm đến đây.」"
# 【れいな】
# display as 玲奈
# JP: 「いままでになかった……って、どんな形ですかぁ？」
2196 = "「Hình thức chưa từng có……là, hình thức như thế nào ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「めぐるそうだ。\n『おひとよし通信』で紹介された場所を」
1816 = "「Họ đi tham quan một vòng.\nNhững địa điểm được giới thiệu trong 『Bản tin Ohitoyoshi』 ấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、それはうれしいですねぇ！」
1916 = "「Waaa, chuyện đó đáng mừng quá nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。おひとよし通信内でここが紹介されたのは\nたった一度、『07の車窓から』のコーナーでだけだ」
2349 = "「Và, vấn đề là. Nơi này được giới thiệu trong Bản tin Ohitoyoshi\nchỉ duy nhất một lần, trong chuyên mục 『Từ cửa sổ toa xe 07』 thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「わ、れいなのこーなーですねぇ」
1920 = "「Oa, là chuyên mục của Reina nhỉ.」"
# monologue
# JP: いかにも、れいなのコーナーだ。『車窓から』と\n銘打ってるのに、沿線風景は第一回での紹介だけ。
3138 = "Đúng là, chuyên mục của Reina. Dù mang tên là 『Từ cửa sổ toa xe』\nnhưng phong cảnh dọc tuyến đường chỉ được giới thiệu trong số đầu tiên."
# monologue
# JP: 以降は、ポーレット、すずめときつね、軽油、\nハチロク、橋梁、レールショップ、銀行、と――」
2788 = "Từ đó về sau, là Paulette, chim sẻ và cáo, dầu diesel,\nHachiroku, cầu sắt, Rail Shop, ngân hàng, và——」"
# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。銀行の回どういう内容だったかな？」
1226 = "「……Xin lỗi. Số về ngân hàng có nội dung gì ấy nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「レールショップがお城です、っていうお話をして。\n銀行さんは聖堂みたいですよぉって紹介をしましたぁ」
2162 = "「Em đã kể chuyện Rail Shop là một tòa lâu đài.\nVà giới thiệu ngân hàng giống như một thánh đường đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったそうだった」
1956 = "「À, đúng rồi đúng rồi.」"
# monologue
# JP: 見ている間はほわほわ非常になごむのだけれど、\n見終わると幸せな印象以外、なにひとつ残らない。
2821 = "Trong lúc đọc thì cảm thấy vô cùng nhẹ nhàng thư thái,\nnhưng đọc xong thì ngoài ấn tượng hạnh phúc ra, chẳng đọng lại gì cả."
# monologue
# JP: 僕にとってのれいなコラムは、そうしたものだが、\n撮影者は「おひとよし通信」を手にしていたそうだ。
3060 = "Đối với tôi, chuyên mục của Reina là như vậy đấy,\nnhưng có vẻ như người chụp ảnh đã cầm trên tay cuốn 「Bản tin Ohitoyoshi」."
# 【双鉄】
# display as 雙鐵
# JP: 「で、稀咲が推理してくれた、ぬいぐるみの持ち主も、\nコラムで紹介された場所を巡っているのではないかと」
2320 = "「Thế nên, Kisaki đã suy luận giúp anh, rằng chủ nhân của con thú bông,\ncó lẽ cũng đang đi tham quan các địa điểm được giới thiệu trong chuyên mục.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ！」
1900 = "「Wawawa!」"
# monologue
# JP: 嬉しいのか、照れくさいのか、れいなは頬を赤くして、\nいやいやするように小さく小さく顔を振る。
3074 = "Không biết là vui mừng, hay là xấu hổ, hai má Reina ửng đỏ,\ncô bé lắc lắc cái đầu nhỏ xíu như thể đang phủ nhận."
# 【れいな】
# display as 玲奈
# JP: 「でもでも、もしもそうなら、\n追いかけてあげやすくなりますねぇ」
1797 = "「Nhưng mà nhưng mà, nếu đúng là vậy,\nthì việc đuổi theo sẽ dễ dàng hơn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲には、ぬいぐるみの問い合わせがあったら、\nれいなの携帯を鳴らして欲しいと頼んである」
2226 = "「Anh đã nhờ Kisaki, nếu có ai hỏi thăm về con thú bông,\nthì hãy gọi vào điện thoại di động của Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「それなられいなたち、このこのマスターを\n探しにいって大丈夫ですねぇ」
2253 = "「Nếu vậy thì bọn mình, đi tìm Master của bé này\ncũng không sao nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、連絡があればすぐにナビで戻ればいい。\n警察にも、稀咲が同様の手配をしてくれている」
2075 = "「Ừ, nếu có liên lạc thì cứ dùng Navi quay lại ngay là được.\nCảnh sát cũng đã được Kisaki dặn dò tương tự rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「それならもーっと安心ですねぇ。\nで、れいなたちは、どこから探し始めますかぁ？」
2532 = "「Vậy thì càng an tâm hơn nữa nhỉ.\nThế, bọn mình, bắt đầu tìm từ đâu đây ạ~?」"
# monologue
# JP: やはりれいなは、このぬいぐるみの落とし主を\n探すことしか、最初から考えてないようだ。
3049 = "Quả nhiên Reina, từ đầu đến cuối,\nchỉ nghĩ đến việc tìm kiếm chủ nhân của con thú bông này."
# monologue
# JP: ならば僕は、れいなの希望を、\nなにがなんでも叶えよう。
3188 = "Nếu đã vậy, nguyện vọng của Reina,\ndù thế nào anh cũng sẽ thực hiện cho bằng được."
# 【双鉄】
# display as 雙鐵
# JP: 「そのマスターは、ここで記念撮影をして、そのあと\nすぐに移動して、ぬいぐるみを落としてしまった」
2355 = "「Master đó, đã chụp ảnh kỷ niệm ở đây, sau đó\nlập tức di chuyển, và làm rơi con thú bông.」"
# 【れいな】
# display as 玲奈
# JP: 「はい。そうですねぇ」
2067 = "「Vâng. Đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬいぐるみと銀行を一緒に記念撮影していたのに、\nぬいぐるみを落としたとすぐには気づいていない」
2257 = "「Dù đã chụp ảnh kỷ niệm chung con thú bông và ngân hàng,\nnhưng lại không nhận ra ngay là mình đã làm rơi con thú bông.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。きづいていたら、すぐに探しに\n戻りますよねぇ」
2271 = "「Đúng vậy nhỉ. Nếu nhận ra, thì chắc chắn sẽ quay lại\ntìm ngay lập tức nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。落とす前に記念撮影をした場所には、\n必ず探しに戻ってくるだろう」
2048 = "「Ừm. Chắc chắn người đó sẽ quay lại tìm ở nơi đã chụp ảnh kỷ niệm\ntrước khi làm rơi.」"
# 【れいな】
# display as 玲奈
# JP: 「なのに、どうしてもどってこないんでしょうかぁ」
1818 = "「Thế nhưng, tại sao lại mãi không quay lại nhỉ~」"
# monologue
# JP: れいながひどく不安げだ。
3111 = "Reina trông vô cùng bất an."
# monologue
# JP: 話を聞かせたくないのだろうか、ぬいぐるみの耳を、\nそうっと両手でふさいでる。
2839 = "Có lẽ không muốn cho con thú bông nghe thấy,\ncô bé khẽ dùng hai tay bịt tai con thú bông lại."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、れいな。\n事態は恐らく、ひどく単純で明快だ」
2247 = "「Không sao đâu, Reina.\nSự tình có lẽ, vô cùng đơn giản và rõ ràng.」"
# monologue
# JP: その手をそっと動かして、\nぬいぐるみにもいっしょに聞かせる。
3068 = "Tôi nhẹ nhàng gỡ tay cô bé ra,\nđể con thú bông cũng được nghe cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、落としてしまうほどに急いだか。\nなぜ、すぐには戻ってこれないかを考えれば」
1874 = "「Hãy nghĩ xem tại sao người đó lại vội vàng đến mức đánh rơi đồ.\nTại sao người đó lại không thể quay lại ngay lập tức.」"
# 【れいな】
# display as 玲奈
# JP: 「ああああ！　れいな、わかったかもですぅ！」
1987 = "「Aaaaa! Reina, có lẽ hiểu rồi ạ~!」"
# monologue
# JP: これだけのヒントでわかってくれた。\nそのことをひどく、嬉しく感じる。
3144 = "Chỉ với chừng đó gợi ý mà cô bé đã hiểu.\nĐiều đó khiến tôi cảm thấy vô cùng, vô cùng vui sướng."
# 【れいな】
# display as 玲奈
# JP: 「列車！　その人、きっと列車に乗ったんですねぇ」
1854 = "「Tàu hỏa! Người đó, chắc chắn đã lên tàu hỏa rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もそうかと推測している。列車の時刻に間に合う\nよう、走って落として気付かずままに乗ってしまった」
2209 = "「Anh cũng suy đoán như vậy. Chắc là để kịp giờ tàu chạy,\nngười đó đã chạy vội, làm rơi mà không nhận ra và cứ thế lên tàu.」"
# 【れいな】
# display as 玲奈
# JP: 「列車の中で落としちゃったってきづいても、\n一番早くて、マイントレジャー駅まで停まらないし」
2183 = "「Cho dù có nhận ra là đã làm rơi trên tàu,\nthì sớm nhất cũng phải đến ga Mine Treasure mới dừng lại được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「折り返しの列車も、結局は[ゆのい,1]湯医までいった同じ\n列車になってしまう」
2241 = "「Tàu quay đầu, rốt cuộc cũng là chuyến tàu\nđã đi đến tận Yui.」"
# 【れいな】
# display as 玲奈
# JP: 「マイントレジャーの近くでは携帯電話も使えない\nですし……れいな、きっとそれだ！　って思うですぅ」
2353 = "「Ở gần Mine Treasure điện thoại di động cũng không có sóng\nnữa……Reina, chắc chắn là vậy rồi! Em nghĩ vậy đó ạ~」"
# monologue
# JP: こっくりうなずきそういって。\nれいなは僕を、しあわせそうに見上げ、見つめる。
3090 = "Vừa nói cô bé vừa gật đầu cái rụp.\nReina ngước nhìn tôi, ánh mắt ngập tràn hạnh phúc."
# 【れいな】
# display as 玲奈
# JP: 「やっぱり、そうてつさんはすごいですぅ！　\nこのこのマスター、見つけてくれて」
2558 = "「Quả nhiên, anh Soutetsu giỏi quá đi mất!\nĐã tìm ra Master của bé này rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「無事にみつかるかどうかはまるでわからん。\nが、闇雲に探すよりは確率が高そうに思える」
2517 = "「Có tìm thấy bình an vô sự hay không thì anh hoàn toàn không biết.\nNhưng, có vẻ như xác suất sẽ cao hơn là tìm kiếm mù quáng.」"
# monologue
# JP: れいなが頷く。\n同時にこくこく、ぬいぐるみにも頷かせている。
3112 = "Reina gật đầu.\nĐồng thời cô bé cũng gật gật đầu con thú bông."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、御一夜温泉駅で待ってみよう。\n改札出口で、そのぬいぐるみと一緒にいれば」
2535 = "「Vậy thì, chúng ta hãy đợi ở ga Ohimitera Onsen xem sao.\nNếu ở cửa soát vé cùng với con thú bông đó」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　マスターさんなら、絶対絶対、\nこのこを見つけてくれますよぉ！」
2147 = "「Vâng ạ~! Nếu là Master, thì tuyệt đối tuyệt đối,\nsẽ tìm thấy bé này thôi ạ~!」"
# 【れいな】
# display as 玲奈
# JP: 「あー！　よかったですねぇ、本当に！」
2025 = "「A~! May quá đi mất, thật sự luôn ạ~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2283 = "「Ừ.」"
# monologue
# JP: れいなとふたり、僕の部屋。
2902 = "Chỉ có tôi và Reina, trong phòng của tôi."
# monologue
# JP: れいなはごくごく当然に、\n僕にぴったりくっついてくる。
3088 = "Reina như một lẽ đương nhiên,\ndính chặt lấy tôi."
# 【れいな】
# display as 玲奈
# JP: 「あのこも、あのこのマスターさんも、\nとーってもとっても喜んでましたねぇ」
2528 = "「Bé đó, và cả Master của bé đó nữa,\nđều rất rất là vui mừng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらが恐縮するくらいにお礼をいってくれたな。\n頭も何度も、何度もさげて」
2131 = "「Họ đã cảm ơn đến mức khiến chúng ta thấy ngại luôn mà.\nCúi đầu hết lần này, đến lần khác」"
# 【れいな】
# display as 玲奈
# JP: 「レイルロオドとマスターと、ぬいぐるみだって、\nきっとおんなじなんですよぉ」
2179 = "「Railord và Master, và cả thú bông nữa,\nchắc chắn là giống nhau đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
1805 = "「Có lẽ vậy.」"
# monologue
# JP: もしもれいなとはぐれてしまい、\nれいなが自分で動けなくなってしまったら――
2844 = "Nếu như tôi bị lạc mất Reina,\nvà Reina không thể tự mình di chuyển được——"
# monologue
# JP: れいなを助けてくれた誰かに、僕とて当然、\nどれほどにだって頭を下げるし、礼を言う。
2848 = "Đối với người đã giúp đỡ Reina, đương nhiên tôi cũng sẽ,\ncúi đầu và nói lời cảm ơn nhiều đến nhường nào cũng không đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「そう考えれば、\n連絡先くらい教えても良かったのかもしれん」
2512 = "「Nghĩ như vậy,\nthì có lẽ cho họ biết thông tin liên lạc cũng tốt.」"
# monologue
# JP: 『きちんとお礼をしたいから』と、\nしつこいくらいに頼まれたのだが……
2865 = "『Vì tôi muốn gửi lời cảm ơn đàng hoàng』,\nhọ đã nài nỉ đến mức dai dẳng nhưng mà……"
# 【れいな】
# display as 玲奈
# JP: 「ううん。だって、そうてつさん、すっごく\nかっこよかったから、あれでいいって思うですよぉ」
1793 = "「Không đâu. Tại vì, anh Soutetsu, trông cực kỳ\nngầu luôn, nên em nghĩ thế là được rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「恰好よかったか？」
2188 = "「Ngầu á?」"
# 【れいな】
# display as 玲奈
# JP: 「『礼など不用。当然ことをしたまでです』って。\nれいな、ビリビリしびれちゃいましたぁ」
