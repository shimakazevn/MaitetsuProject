# JP: 「わかりましたぁ！　それなら、オオカミさんのお耳\nとか尻尾とかもあったらいいですねぇ」
2205 = "「Em hiểu rồi ạ~! Nếu vậy, có thêm tai\nhay đuôi của sói nữa thì tốt quá nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。いいな。『かわいい耳と尻尾だな』と思い、\nバスケットの中身を見ると、真実に気づく」
2056 = "「Ừm. Được đấy. Mọi người sẽ nghĩ 『Tai và đuôi dễ thương quá』,\nnhưng khi nhìn vào trong giỏ, họ sẽ nhận ra sự thật.」"
# 【れいな】
# display as 玲奈
# JP: 「バスケットのなか、血まみれのお皿とお肉と、\nレバーペーストもいれておっかないですねぇ」
2422 = "「Bên trong giỏ, có đĩa dính máu, thịt,\nvà cả patê gan nữa thì đáng sợ lắm nhỉ~」"
