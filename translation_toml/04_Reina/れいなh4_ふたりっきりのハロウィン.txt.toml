# JP: 「まぁそうだが、ジーンズショップとのことなので、\n若者向けの服がそろってるのではないかと思ってな」
2286 = "「À thì đúng là vậy, nhưng vì là cửa hàng quần áo jeans,\nnên anh nghĩ chắc sẽ có nhiều quần áo dành cho giới trẻ.」"
# 【れいな】
# display as 玲奈
# JP: 「そぉですねぇ。洋品店さんよりハロウィン向けの\nにぎやかなのがおいてそうですねぇ」
2277 = "「Đúng vậy nhỉ. So với cửa hàng âu phục thì chắc ở đó sẽ có\nnhiều đồ náo nhiệt hợp với Halloween hơn nhỉ.」"
# monologue
# JP: （きゅっ）
3275 = "（Nắm chặt）"
# monologue
