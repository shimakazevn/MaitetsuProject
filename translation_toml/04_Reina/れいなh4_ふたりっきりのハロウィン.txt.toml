2808 = "Dù dính chặt lấy nhau như thế này, nhưng Reina không còn đỏ mặt như lúc nãy nữa."
# monologue
# JP: 「あなた」と「おまえ」は、れいなにとって、\nよほど憧れの強いやりとりだったのだろう。
2836 = "Hai tiếng \"Mình ơi\" và \"Mình à\", đối với Reina,\nchắc hẳn là một sự giao tiếp mà cô bé đã khao khát từ rất lâu rồi."
# monologue
# JP: （今も、『そうてつさん』に戻っているしな。\nまぁ、あせって夫婦ぶることもないか）
3288 = "（Bây giờ cũng đã trở lại gọi là 『anh Soutetsu』 rồi.\nThôi thì, cũng không cần phải vội vã tỏ ra giống vợ chồng làm gì.）"
# monologue
# JP: れいなも僕も、新米の奥さんで、旦那さんだ。
2896 = "Reina và tôi, đều là những người vợ, người chồng mới cưới."
# monologue
# JP: ふたりあるがまま、夫婦の時間を重ねれば、\nいつかは僕らの形に落ち着いていくだろう。
2819 = "Cứ để tự nhiên, khi thời gian làm vợ chồng chất chồng lên nhau,\nrồi sẽ có một ngày chúng tôi tìm được hình thái phù hợp với mình thôi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん？　どうかしましたかぁ？」
2564 = "「Anh Soutetsu? Anh sao vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
2034 = "「À, không——」"
# monologue
# JP: いかん。考えにふけって手を止めてしまったか。
2778 = "Không được. Mải mê suy nghĩ nên tay tôi dừng lại mất rồi."
# monologue
# JP: れいなの心配を晴らすため、\nいっそう優しくなでなでをする。
3010 = "Để xua tan đi sự lo lắng của Reina,\ntôi lại tiếp tục vuốt ve cô bé một cách dịu dàng hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「――時間を重ねることの素晴らしさを思っただけさ。\nれいなとポーレットのように、僕もありたいと」
2219 = "「——Anh chỉ đang nghĩ về sự tuyệt vời của việc thời gian chất chồng lên nhau thôi.\nAnh cũng muốn được như Reina và Paulette vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットはすごいですからねぇ！\nこつこつこつこつ、すごいんですよぉ！」
2335 = "「Chị Paulette tuyệt lắm đó nha~!\nCứ cần mẫn từng chút từng chút một, tuyệt lắm luôn ạ~!」"
# monologue
# JP: すごい、と二度も繰り返し、\nれいなは瞳をキラキラさせる。
3101 = "Nhắc lại hai lần từ \"tuyệt\",\nđôi mắt Reina lấp lánh sáng ngời."
# 【れいな】
# display as 玲奈
# JP: 「レールショップも、最初はだぁれもこなかったのに。\nいまはこーんなににぎやかで、新しいおまつりまで！」
2552 = "「Rail Shop cũng vậy, ban đầu chẳng có aaaaai đến cả.\nThế mà bây giờ lại nhộn nhịp thế nàaaaay, lại còn có cả lễ hội mới nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。今年はハロウィンを開催するといっていたな」
2288 = "「Ừ. Em nói là năm nay sẽ tổ chức Halloween đúng không.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ、ハロウィンですよぉ」
2295 = "「Đúng vậy ạ~, là Halloween đó ạ~」"
# monologue
# JP: ぼんぼりのようにぽっかり暖かに微笑んで、\nけれども急にれいなはしゅうんと萎れてしまう。
3110 = "Cô bé nở nụ cười ấm áp như chiếc đèn lồng giấy,\nnhưng rồi đột nhiên Reina lại xìu xuống buồn bã."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　急に」
2199 = "「Sao vậy? Tự nhiên lại」"
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ……ハロウィンの、かそう」
2182 = "「Chuyện là thế này ạ~……hóa trang, cho lễ Halloween」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、仮装の件が悩ましいのか？」
1945 = "「À, em đang phiền não chuyện hóa trang sao?」"
# monologue
# JP: 確かに僕にも、いささか重荷だ。
2890 = "Đúng là đối với tôi, chuyện đó cũng hơi nặng nề thật."
# monologue
# JP: ハロウィンの日は、実務以外のときには全員、\n仮装するようにとの指示であったが――
2776 = "Ngày Halloween, có chỉ thị là ngoài giờ làm việc, tất cả mọi người\nđều phải hóa trang, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「なかに、いざとなれば白いシーツをすっぽりかぶり、\nオバケにでもなればいいさ」
2160 = "「Bí quá thì cứ trùm một tấm ga trải giường trắng toát lên người,\nrồi làm ma là được mà.」"
# 【れいな】
# display as 玲奈
# JP: 「おばけ！　やっぱり、かそうって……\nううう、れいな、でも、もったいないって思うです」
2155 = "「Ma! Quả nhiên, hóa trang thì……\nUuuu, nhưng mà, Reina thấy tiếc lắm ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「もったいない？」
2245 = "「Tiếc?」"
# 【れいな】
# display as 玲奈
# JP: 「だって、燃やされちゃったら、部品取りできなく\nなっちゃいますよぉ。れいな、せっかくなら姉妹機に」
2118 = "「Tại vì, nếu bị đem đi hỏa táng, thì sẽ không thể tháo linh kiện ra\nđược nữa đâu ạ~. Nếu đã vậy thì, Reina thà để lại cho các chị em cùng dòng máy còn hơn」"
# 【双鉄】
# display as 雙鐵
# JP: 「まてまてまてまて、誰が、なにを燃やすのだ？」
2417 = "「Từ từ đã, ai, đốt cái gì cơ?」"
# 【れいな】
# display as 玲奈
# JP: 「え？　だから、ハロウィンの日にれいな――\n止まって」
1896 = "「Dạ? Thì là, ngày Halloween, Reina——\nsẽ dừng lại mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、泊まるという話だったな」
1952 = "「À, là chuyện nghỉ ngơi qua đêm đúng không.」"
# 【れいな】
# display as 玲奈
# JP: 「それでれいな、火葬して、おばけになるって。\nでも――だけど、やっぱり部品は姉妹機に」
2350 = "「Nên là Reina, sẽ bị hỏa táng, rồi biến thành ma.\nNhưng——nhưng mà, quả nhiên linh kiện thì nên để lại cho các chị em」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……安心しろれいな。\nれいなは、おそらく、ひどい誤解をしているだけだ」
1943 = "「À……yên tâm đi Reina.\nReina, có lẽ, chỉ là đang hiểu lầm tai hại thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「ふえ？　れいな、\nなにかかんちがいしちゃってるですかあ？」
1897 = "「Fue? Reina,\nđã hiểu lầm chuyện gì sao ạ~?」"
# monologue
# JP: 手の中のれいながぽっ、とあたたかくなる。
2923 = "Reina trong vòng tay tôi bỗng trở nên ấm áp hẳn lên."
# monologue
# JP: それほど恐れていたのかと――かわいそうで、\nかわいらして、抱きしめる手を強くする。
2834 = "Thì ra cô bé đã sợ hãi đến mức đó sao——vừa thấy thương,\nvừa thấy đáng yêu, tôi siết chặt vòng tay ôm cô bé hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいっていた“とまる”は、\n機能停止の意味ではなく、宿泊の意味だ」
2336 = "「Từ \"dừng lại\" mà Paulette nói,\nkhông phải là ngừng hoạt động, mà là nghỉ lại qua đêm đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「えええ！？　でもポーレット、 \n『れいな、ハロウィンの夜にとまっちゃう』って」
1892 = "「Eeee!? Nhưng mà Paulette bảo là,\n『Reina, đêm Halloween sẽ dừng lại (nghỉ lại) đấy』」"
# 【双鉄】
# display as 雙鐵
# JP: 「違う違う。明るく軽い、疑問形の口調だったぞ。\n『ハロウィンの夜に、泊まっちゃう～↑？』だ」
1790 = "「Không phải không phải. Giọng điệu lúc đó rất vui vẻ và nhẹ nhàng, là câu hỏi cơ mà.\n『Đêm Halloween, em sẽ nghỉ lại chứ~↑?』 đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わ。そおだったんですね。れいな、そういうこと、\n最近良く考えてたから、勘違いしちゃいましたぁ」
1911 = "「Oa. Ra là vậy ạ~. Reina, vì dạo này,\nhay nghĩ về mấy chuyện đó, nên mới hiểu lầm mất ạ~」"
# monologue
# JP: ほわほわと、れいなが笑って体をゆすれば、\nせっけんの匂いが鼻をくすぐる。
3086 = "Reina cười khúc khích, lắc lư cơ thể,\nmùi xà phòng cọ vào mũi tôi."
# monologue
# JP: が、そのあたたかな幸せにひたりきるには――\nいささか話の流れが悪い。
2909 = "Nhưng, để chìm đắm trọn vẹn vào niềm hạnh phúc ấm áp đó thì——\nMạch câu chuyện có vẻ hơi không ổn."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうこと、とは――機能停止に関してか？」
1826 = "「Mấy chuyện đó, là sao——liên quan đến việc ngừng hoạt động à?」"
# 【れいな】
# display as 玲奈
# JP: 「はい、そうですぅ。れいな、そうてつさんの\nおよめさんになって、朝も夜もいっしょにいられて」
2282 = "「Vâng, đúng vậy ạ~. Reina, trở thành vợ của\nanh Soutetsu, được ở bên anh cả sáng lẫn tối」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2052 = "「嗯」" 
# 【れいな】
# display as 玲奈
# JP: 「それがうれしくてしあわせで、ずっと続けばいい\nっておもって――そしたら、考えちゃうんです」
2509 = "「Điều đó khiến em vui và hạnh phúc lắm, em cứ nghĩ giá mà nó kéo dài mãi mãi\n——rồi sau đó, em lại bất giác nghĩ ngợi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「一緒のときが――終わることをか」
2215 = "「Rằng khoảng thời gian bên nhau——rồi sẽ có lúc kết thúc sao.」"
# 【れいな】
# display as 玲奈
# JP: 「……そうなんですよぉ」
1228 = "「……Đúng là vậy đó ạ~」"
# monologue
# JP: 手の中が、ほんのわずかに、けれど確かに冷えていく。
2979 = "Trong tay tôi, nhiệt độ đang dần dần, nhưng chắc chắn, lạnh đi đôi chút."
# monologue
# JP: レイルロオドの体温が、\n感情でこれほど動くものだと、初めて知った。
2965 = "Tôi mới biết lần đầu tiên,\nnhiệt độ cơ thể của Railord lại dao động nhiều đến thế theo cảm xúc."
# 【れいな】
# display as 玲奈
# JP: 「れいな、こう見えても古くて、\nずうっとお仕事しつづけているレイルロオドだから」
2381 = "「Reina, nhìn thế này thôi chứ cũng cũ rồi,\nlại còn là Railord vẫn luôn làm việc liên tục không ngừng nghỉ nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕たちは出会えたのだ。\nれいながずっと、頑張り続けてくれたから」
2235 = "「Thế nên, chúng ta mới có thể gặp nhau đấy.\nVì Reina đã luôn, không ngừng nỗ lực mà.」"
# monologue
# JP: れいながもしも運用離脱をしていたら、\n出会うことすら叶わなかった。
2849 = "Nếu Reina đã bị loại khỏi biên chế vận hành,\nthì có lẽ chúng tôi đã chẳng thể gặp nhau."
# monologue
# JP: 路子が僕を突き放してくれなかったのなら、\n僕はここにすらいなかった。
2851 = "Nếu Michiko không đẩy tôi ra,\nthì có lẽ tôi cũng chẳng có mặt ở đây."
# 【双鉄】
# display as 雙鐵
# JP: 「こうして出会えて、一緒にいられる。\nそれだけでもう、僕はなにより幸福だ」
2217 = "「Được gặp nhau thế này, được ở bên nhau.\nChỉ bấy nhiêu thôi, đối với anh đã là hạnh phúc hơn bất cứ điều gì rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ！　今まででいちばんしあわせで、\nぽかぽかで。だから、さみしくなりたくなくて」
2366 = "「Reina cũng vậy đó ạ~! Hạnh phúc nhất từ trước đến nay,\nấm áp lắm. Thế nên, em không muốn phải cô đơn nữa đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。このぬくもりをしってしまえば――\n一人ぼっちに戻ってしまうことは、ひどく、いやだな」
2276 = "「Đúng vậy nhỉ. Một khi đã biết đến hơi ấm này rồi——\nthì việc phải trở lại một mình, thật sự, rất đáng sợ.」"
# monologue
# JP: れいなにもわかるようにと、伝わるようにと、\nけれども怯えさせないようにと――
2917 = "Để Reina có thể hiểu được, để có thể truyền đạt được,\nnhưng đồng thời cũng không làm cô bé sợ hãi——"
# monologue
# JP: 悩みつつ、考えつつ、\nできるだけ、簡単でまあるい言葉を選ぶ。
2887 = "Vừa trăn trở, vừa suy nghĩ,\ntôi cố gắng chọn những từ ngữ đơn giản và tròn trịa nhất có thể."
# 【れいな】
# display as 玲奈
# JP: 「れいな、ずっと。\nずうっといっしょにいたいですよぉ」
2359 = "「Reina, muốn ở bên anh.\nMuốn ở bên anh mãi mãi cơ ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。だから、このひとときを、\n一緒にいられる時間をもっと、大切にしよう」
2207 = "「Anh cũng vậy. Thế nên, khoảnh khắc này,\nchúng ta hãy càng thêm trân trọng khoảng thời gian được ở bên nhau nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「もっと……大切に？」
2309 = "「Càng thêm……trân trọng?」"
# 【双鉄】
# display as 雙鐵
# JP: 「明日どうなっているかなど、誰にもわからん。\nれいなも、僕も、その点ではまったくおんなじだ」
2469 = "「Ngày mai sẽ ra sao, chẳng ai biết trước được.\nReina, và cả anh nữa, về điểm đó thì hoàn toàn giống nhau.」"
# 【れいな】
# display as 玲奈
# JP: 「わ。そうですねぇ。\nあしたのこと、わかる人なんて、いないですねぇ」
1917 = "「Oa. Đúng vậy nhỉ.\nChuyện của ngày mai, chẳng ai biết trước được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、わからない明日のことを悩んで、\nほっぺをぺしゃんとさせてしまってはもったいないぞ」
2233 = "「Thế nên, nếu cứ phiền não về ngày mai chưa biết trước,\nmà làm cho đôi má này xị xuống thì phí lắm đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃううう」
1905 = "「Hyauuu」"
# monologue
# JP: ぷにぷにと、れいなのほっぺをつっつきまわす。\nくすぐったがってきゃらきゃら笑って――
2925 = "Tôi chọc chọc vào đôi má mềm nắn bóp của Reina.\nCô bé nhột nhạt, cười khúc khích——"
# monologue
# JP: ああ、それだけで、\nれいなはこんなにもあたたかになる。
2830 = "À, chỉ cần có thế,\nReina đã trở nên ấm áp đến nhường này."
# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。わからないことでくよくよしてて、\nわかる今を、しょんぼりしたらもったいないですぅ！」
2263 = "「Đúng vậy nhỉ. Cứ buồn bã vì những chuyện chưa biết,\nmà làm cho hiện tại đang hiện hữu phải u sầu thì phí lắm ạ~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1961 = "「Ưm.」"
# monologue
# JP: れいなの腕が伸びてくる。\n僕の顔をむにむにやって――
3023 = "Vòng tay của Reina vươn tới.\nCô bé nắn nắn xoa xoa mặt tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「あははははは」
1974 = "「A ha ha ha ha ha」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、そうてつさんも、\nにこにこわらってくれましたぁ」
2111 = "「Ư hu hu~, anh Soutetsu,\ncũng cười tươi rạng rỡ rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、わらうさ。こんな簡単なことでだって、\nれいなといっしょで、しあわせだから」
2066 = "「Ừ, anh cười chứ. Dù chỉ là những chuyện đơn giản thế này,\nnhưng được ở bên Reina, anh thấy hạnh phúc lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
# 2091 = "「嘿嘿」" 
# 【双鉄】
# display as 雙鐵
# JP: 「さてと。お互い、笑顔でぽかぽかになったところで、\n話を戻そう。ハロウィンだ」
2143 = "「Giờ thì. Cả hai đều đã ấm áp nhờ nụ cười rồi,\nchúng ta quay lại chủ đề chính nào. Halloween.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、そうでした、ハロウィンですよぉ」
2032 = "「A, đúng rồi, là Halloween ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなが誤解した仮装とは、仮の[よそお]装い……うーむ。\n……ああ！　コスプレといえばわかりやすいか？」
1857 = "「Cái hóa trang mà Reina hiểu lầm ấy, là giả dạng (hóa trang)……hừm.\n……A! Nói là Cosplay thì có dễ hiểu hơn không?」"
# 【れいな】
# display as 玲奈
# JP: 「コスプレ！　コスプレなられいなわかりますよぉ。\nふかみさんから、おはなし、きいたことあるですぅ」
2569 = "「Cosplay! Nếu là Cosplay thì Reina biết đó ạ~.\nReina từng nghe chị Fukami kể rồi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ふかみはその方面に強そうだからな」
1949 = "「À, Fukami có vẻ rành mấy vụ này mà.」"
# monologue
# JP: いえばもじもじ、れいなは照れた仕草を見せる。\nコスプレするのが恥ずかしいのかもしれん。
3089 = "Nói xong, Reina bẽn lẽn tỏ vẻ ngại ngùng.\nCó lẽ việc Cosplay khiến cô bé thấy hơi xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「コスプレといっても、ハロウィンのコスプレは\nおばけサイドだ。悪魔だの、魔女だの、カボチャだの」
2447 = "「Dù nói là Cosplay, nhưng Cosplay dịp Halloween\nlà nghiêng về phe ma quỷ cơ. Ác quỷ này, phù thủy này, bí ngô này.」"
# 【れいな】
# display as 玲奈
# JP: 「カボチャですかぁ？」
1858 = "「Bí ngô ạ~?」"
# monologue
# JP: よほど予想外だったのだろう、\n照れてたれいながくすくす笑う。
2831 = "Chắc là ngoài sức tưởng tượng lắm,\nReina đang xấu hổ bỗng bật cười khúc khích."
# monologue
# JP: れいなが笑えば、もっと笑わせてやりたくなる。
3122 = "Thấy Reina cười, tôi lại càng muốn làm cô bé cười nhiều hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「見たことがないか？　こう――\nカボチャをくりぬいたオバケかぼちゃを」
1829 = "「Em chưa thấy bao giờ à? Thế này này——\nBí ngô ma được khoét ruột ấy.」"
# monologue
# JP: 口と目とを大きくあけて、\nあの独特の表情を、少しでも真似ようと試みる。
2915 = "Há to miệng và mắt,\ntôi cố gắng bắt chước biểu cảm độc đáo đó dù chỉ một chút."
# monologue
# JP: れいなのくすくすがけらけらになる。\n手がまた、僕へとのびてくる。
3071 = "Tiếng cười khúc khích của Reina chuyển thành tiếng cười nắc nẻ.\nĐôi tay cô bé lại vươn về phía tôi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんは、かっこういいのがいいですよぉ。\n吸血鬼だとか、狼男だとか」
2557 = "「Anh Soutetsu thì, nên hóa trang thành cái gì ngầu ngầu ấy ạ~.\nMa cà rồng này, hay là người sói chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ならばれいなは、吸血鬼の奥さんか、\n狼男の奥さんのコスプレになるか」
2081 = "「Hừm. Vậy thì Reina, sẽ Cosplay thành vợ của ma cà rồng,\nhay là vợ của người sói đây?」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいな、おおかみおんなさんに\nなっちゃうですねぇ。わんわん。わぉーん」
2099 = "「Ư hu hu~, Reina, sẽ biến thành\ncô sói cái đó nha~. Gâu gâu. Awoooo~」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい。実にかわいらしい」
2194 = "「Tuyệt vời. Thực sự rất đáng yêu.」"
# monologue
# JP: 吸血鬼の方を選んだとても、\nれいなの可愛さにかげりがでようはずもない。
2846 = "Dù có chọn ma cà rồng đi chăng nữa,\nthì sự đáng yêu của Reina cũng chẳng thể nào bị lu mờ được."
# monologue
# JP: いやいっそ、両方の衣装を時間交代で\n着てもらうのが良いかもしれん。
2780 = "Không, hay là, cứ để cô bé mặc cả hai bộ trang phục luân phiên nhau\nthì có khi lại hay hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、衣装を手配せねばな。\nさて、どこでどうしたら良いものやら、だが」
1804 = "「Vậy thì, phải chuẩn bị trang phục thôi.\nGiờ thì, biết làm thế nào ở đâu đây.」"
# 【れいな】
# display as 玲奈
# JP: 「ふかみさんに聞いてみますかぁ？」
2041 = "「Hay là mình thử hỏi chị Fukami xem sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは最後の手段でよかろう。\nせっかくこの先は時間があるのだ」
2505 = "「Đó sẽ là phương án cuối cùng.\nHiếm khi chúng ta có thời gian rảnh rỗi thế này mà.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　じゃ、そうてつさんとれいなとで、\nさがしものして、おかいものですねぇ」
1910 = "「Oa! Vậy là, anh Soutetsu và Reina,\nsẽ cùng nhau đi tìm đồ, đi mua sắm nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう願いたい。\nれいなは、それでかまわんか？」
2223 = "「Anh cũng mong là vậy.\nReina, em thấy thế có được không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、れいなはかまわんですよぉ！」
2397 = "「Vâng ạ~, Reina không phiền đâu ạ~!」"
# monologue
# JP: ぴょこん、とれいなが立ち上がる。\n満面すぎる笑顔を浮かべ、僕の方へと振り返る。
3083 = "Pyokon, Reina đứng phắt dậy.\nNở nụ cười rạng rỡ hết cỡ, cô bé ngoái lại nhìn tôi."
# 【れいな】
# display as 玲奈
# JP: 「お買い物、どこへいくですかぁ」
2460 = "「Mình sẽ đi mua sắm, ở đâu vậy ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビを使って――いや、待てよ、\n確か、今朝の新聞のチラシに」
2393 = "「Dùng Navi——à không, khoan đã,\nnhớ không lầm thì, trong tờ rơi kẹp báo sáng nay」"
# 【れいな】
# display as 玲奈
# JP: 「新聞のチラシですかぁ？\nれいな、取ってきますねぇ」
2123 = "「Tờ rơi kẹp báo ạ~?\nĐể Reina, đi lấy cho nhé~」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1970 = "「A」"
# 【れいな】
# display as 玲奈
# JP: 「とってきましたぁ！　これで大丈夫ですかぁ？」
2374 = "「Reina lấy về rồi đây ạ~! Cái này có đúng không ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん――と、これだこれだ！　ほら」
2040 = "「À, cảm ơn em——đây rồi, đây rồi! Nhìn này.」"
