2140 = "「Vâng ạ~. Vậy thì, cần giỏ, tai và đuôi sói,\nđĩa, nĩa, dao và tương cà nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「耳としっぽは、また改めて探すしかなかろうな。\n食器類は台所で、バスケットは確か、この部屋に」
2433 = "「Tai và đuôi thì chắc phải tìm sau thôi.\nChén dĩa thì ở trong bếp, còn cái giỏ thì hình như ở trong phòng này.」"
