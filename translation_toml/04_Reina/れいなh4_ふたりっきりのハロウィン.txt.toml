2552 = "「鐵路商店也是，一開始完全沒有人來。現在卻變得這麼熱鬧，還舉辦了新的節日！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。今年はハロウィンを開催するといっていたな」
2288 = "「是啊，今年要舉辦萬聖節啊」" 

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ、ハロウィンですよぉ」
2295 = "「是啊，萬聖節」" 

# monologue
# JP: ぼんぼりのようにぽっかり暖かに微笑んで、\nけれども急にれいなはしゅうんと萎れてしまう。
3110 = "玲奈露出雪洞燈一般溫暖的笑容，但轉眼間又變得無精打采。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　急に」
2199 = "「怎麼突然沒精神了？」" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ……ハロウィンの、かそう」
2182 = "「就是那個……萬聖節的化裝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、仮装の件が悩ましいのか？」
1945 = "「哦，你在煩惱化裝的事情嗎？」" 

# monologue
# JP: 確かに僕にも、いささか重荷だ。
2890 = "我也覺得有點麻煩。" 

# monologue
# JP: ハロウィンの日は、実務以外のときには全員、\n仮装するようにとの指示であったが――
2776 = "上面下了指示，除了工作時間以外，所有人都要化裝。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なかに、いざとなれば白いシーツをすっぽりかぶり、\nオバケにでもなればいいさ」
2160 = "「實在不行就披個白色床單，打扮成妖怪就行了」" 

# 【れいな】
# display as 玲奈
# JP: 「おばけ！　やっぱり、かそうって……\nううう、れいな、でも、もったいないって思うです」
2155 = "「妖怪！化裝果然是要………嗚嗚嗚……可是玲奈覺得好捨不得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もったいない？」
2245 = "「捨不得？」" 

# 【れいな】
# display as 玲奈
# JP: 「だって、燃やされちゃったら、部品取りできなく\nなっちゃいますよぉ。れいな、せっかくなら姉妹機に」
2118 = "「因為被燒了就不能卸下部件了。玲奈覺得還不如留給姐妹機……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まてまてまてまて、誰が、なにを燃やすのだ？」
2417 = "「等等等等，誰要燒東西，燒什麼？」" 

# 【れいな】
# display as 玲奈
# JP: 「え？　だから、ハロウィンの日にれいな――\n止まって」
1896 = "「咦？就是玲奈要在萬聖節——徹底休息了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、泊まるという話だったな」
1952 = "「哦，要休息啊」" 

# 【れいな】
# display as 玲奈
# JP: 「それでれいな、火葬して、おばけになるって。\nでも――だけど、やっぱり部品は姉妹機に」
2350 = "「然後玲奈就會被火化，變成妖怪。……但還是把部件留給姐妹機比較好吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……安心しろれいな。\nれいなは、おそらく、ひどい誤解をしているだけだ」
1943 = "「哦……放心吧，玲奈。你只是鬧了個天大的誤會」" 

# 【れいな】
# display as 玲奈
# JP: 「ふえ？　れいな、\nなにかかんちがいしちゃってるですかあ？」
1897 = "「咦？玲奈弄錯了什麼事情嗎」" 

# monologue
# JP: 手の中のれいながぽっ、とあたたかくなる。
2923 = "我懷中的玲奈一下子變得溫暖起來。" 

# monologue
# JP: それほど恐れていたのかと――かわいそうで、\nかわいらして、抱きしめる手を強くする。
2834 = "她害怕到身子都涼了啊……既可憐，又可愛，我不由得抱得更緊了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいっていた“とまる”は、\n機能停止の意味ではなく、宿泊の意味だ」
2336 = "「波萊特說的“休息”，不是停止運作的意思，只是留宿休息」" 

# 【れいな】
# display as 玲奈
# JP: 「えええ！？　でもポーレット、 \n『れいな、ハロウィンの夜にとまっちゃう』って」
1892 = "「咦咦咦！？可是波萊特說了，“玲奈，萬聖節的夜晚你就休息吧”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違う違う。明るく軽い、疑問形の口調だったぞ。\n『ハロウィンの夜に、泊まっちゃう～↑？』だ」
1790 = "「不不不，她的語氣更輕快一些，是疑問句。“萬聖節的夜晚你就休息吧～↑？”」" 

# 【れいな】
# display as 玲奈
# JP: 「わ。そおだったんですね。れいな、そういうこと、\n最近良く考えてたから、勘違いしちゃいましたぁ」
1911 = "「哇，原來是這樣。玲奈最近總是在想這些事，一不小心誤會了」" 

# monologue
# JP: ほわほわと、れいなが笑って体をゆすれば、\nせっけんの匂いが鼻をくすぐる。
3086 = "玲奈笑著晃了晃身子，肥皂的香氣刺激著我的鼻腔。" 

# monologue
# JP: が、そのあたたかな幸せにひたりきるには――\nいささか話の流れが悪い。
2909 = "我多想沉浸在這溫暖的幸福一刻……但剛才這個話題顯得有些沉重。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうこと、とは――機能停止に関してか？」
1826 = "「你是……在想停止運作的事情嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はい、そうですぅ。れいな、そうてつさんの\nおよめさんになって、朝も夜もいっしょにいられて」
2282 = "「是啊。玲奈成為了雙鐵先生的妻子，日日夜夜都待在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2052 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「それがうれしくてしあわせで、ずっと続けばいい\nっておもって――そしたら、考えちゃうんです」
2509 = "「這樣的生活很開心，很幸福，想要永遠持續下去——然後玲奈就不由得往那方面想了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一緒のときが――終わることをか」
2215 = "「我們的生活……總有一天會結束嗎」" 

# 【れいな】
# display as 玲奈
# JP: 「……そうなんですよぉ」
1228 = "「……是呀」" 

# monologue
# JP: 手の中が、ほんのわずかに、けれど確かに冷えていく。
2979 = "手心感受到的溫度的的確確下降了一絲。" 

# monologue
# JP: レイルロオドの体温が、\n感情でこれほど動くものだと、初めて知った。
2965 = "我第一次發現，鐵路人偶的體溫會如此受感情的影響。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、こう見えても古くて、\nずうっとお仕事しつづけているレイルロオドだから」
2381 = "「玲奈雖然看起來小，其實已經很老舊了，一直都在持續工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕たちは出会えたのだ。\nれいながずっと、頑張り続けてくれたから」
2235 = "「所以我們才能相遇啊。都是因為你一直在努力」" 

# monologue
# JP: れいながもしも運用離脱をしていたら、\n出会うことすら叶わなかった。
2849 = "如果玲奈脫離運行，我們就不會相遇了。" 

# monologue
# JP: 路子が僕を突き放してくれなかったのなら、\n僕はここにすらいなかった。
2851 = "如果路子沒有推開我，我甚至不會存在於此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こうして出会えて、一緒にいられる。\nそれだけでもう、僕はなにより幸福だ」
2217 = "「我們能夠相遇，一起生活。這對我來說就已經是無上的幸福了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ！　今まででいちばんしあわせで、\nぽかぽかで。だから、さみしくなりたくなくて」
2366 = "「玲奈也是！玲奈從來沒有感覺過這麼幸福，這麼溫暖。所以，再也不想感覺到寂寞的味道了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。このぬくもりをしってしまえば――\n一人ぼっちに戻ってしまうことは、ひどく、いやだな」
2276 = "「是啊。感受到了這份溫暖後……肯定很不願意回到孤單的生活吧」" 

# monologue
# JP: れいなにもわかるようにと、伝わるようにと、\nけれども怯えさせないようにと――
2917 = "我想讓玲奈能夠理解，想將我的想法傳達過去，但又不想讓她感到害怕——" 

# monologue
# JP: 悩みつつ、考えつつ、\nできるだけ、簡単でまあるい言葉を選ぶ。
2887 = "我一邊煩惱，一邊思考，儘量選擇了簡單而婉轉的措辭。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ずっと。\nずうっといっしょにいたいですよぉ」
2359 = "「玲奈……想永遠永遠跟你在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。だから、このひとときを、\n一緒にいられる時間をもっと、大切にしよう」
2207 = "「我也一樣。所以我們就更加珍惜這一刻，珍惜我們能夠共同度過的時間吧」" 

# 【れいな】
# display as 玲奈
# JP: 「もっと……大切に？」
2309 = "「更加……珍惜？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「明日どうなっているかなど、誰にもわからん。\nれいなも、僕も、その点ではまったくおんなじだ」
2469 = "「誰也不知道明天會變成什麼樣子。我們在這一點上完全一樣」" 

# 【れいな】
# display as 玲奈
# JP: 「わ。そうですねぇ。\nあしたのこと、わかる人なんて、いないですねぇ」
1917 = "「哇，是呀。沒有人能知道明天發生什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、わからない明日のことを悩んで、\nほっぺをぺしゃんとさせてしまってはもったいないぞ」
2233 = "「所以如果為了不可預知的事情而煩惱，讓小臉蛋變得這麼消沉，可就得不償失了」" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃううう」
1905 = "「哇啊啊」" 

# monologue
# JP: ぷにぷにと、れいなのほっぺをつっつきまわす。\nくすぐったがってきゃらきゃら笑って――
2925 = "我戳了戳玲奈的臉蛋。她感覺癢癢的，哈哈笑了出來——" 

# monologue
# JP: ああ、それだけで、\nれいなはこんなにもあたたかになる。
2830 = "嗯，光是這樣，玲奈就變得如此溫暖了。" 

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。わからないことでくよくよしてて、\nわかる今を、しょんぼりしたらもったいないですぅ！」
2263 = "「是呀。為未知的事情悶悶不樂，那就太浪費現在的時間了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1961 = "「唔」" 

# monologue
# JP: れいなの腕が伸びてくる。\n僕の顔をむにむにやって――
3023 = "玲奈伸出雙手。她揉了揉我的臉——" 

# 【双鉄】
# display as 雙鐵
# JP: 「あははははは」
1974 = "「啊哈哈哈哈哈」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、そうてつさんも、\nにこにこわらってくれましたぁ」
2111 = "「嘿嘿，雙鐵先生也笑出來啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、わらうさ。こんな簡単なことでだって、\nれいなといっしょで、しあわせだから」
2066 = "「嗯，是啊。就算是這麼簡單的小事，只要跟你在一起就感覺很幸福」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー」
# 2091 = "「嘿嘿」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さてと。お互い、笑顔でぽかぽかになったところで、\n話を戻そう。ハロウィンだ」
2143 = "「好啦，我們都露出了笑容，那就回到正題吧。繼續說萬聖節」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、そうでした、ハロウィンですよぉ」
2032 = "「啊，對了，萬聖節」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなが誤解した仮装とは、仮の[よそお]装い……うーむ。\n……ああ！　コスプレといえばわかりやすいか？」
1857 = "「剛才是你對化裝有誤解。嗯……對了！說成Ｃｏｓｐｌａｙ比較好懂吧？」" 

# 【れいな】
# display as 玲奈
# JP: 「コスプレ！　コスプレなられいなわかりますよぉ。\nふかみさんから、おはなし、きいたことあるですぅ」
2569 = "「Ｃｏｓｐｌａｙ！Ｃｏｓｐｌａｙ的話玲奈確實知道。從深美小姐那裡聽說過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ふかみはその方面に強そうだからな」
1949 = "「哦，深美確實很懂那方面的東西」" 

# monologue
# JP: いえばもじもじ、れいなは照れた仕草を見せる。\nコスプレするのが恥ずかしいのかもしれん。
3089 = "玲奈說完之後就扭扭捏捏起來，顯得有些害羞。Ｃｏｓｐｌａｙ對她來說可能很羞恥吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「コスプレといっても、ハロウィンのコスプレは\nおばけサイドだ。悪魔だの、魔女だの、カボチャだの」
2447 = "「萬聖節的Ｃｏｓｐｌａｙ都是妖怪風格的。比如惡魔、魔女、南瓜」" 

# 【れいな】
# display as 玲奈
# JP: 「カボチャですかぁ？」
1858 = "「南瓜？」" 

# monologue
# JP: よほど予想外だったのだろう、\n照れてたれいながくすくす笑う。
2831 = "她似乎沒想到會有南瓜，害羞的玲奈笑了出來。" 

# monologue
# JP: れいなが笑えば、もっと笑わせてやりたくなる。
3122 = "看到她這副樣子，我就想讓她露出更加開心的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見たことがないか？　こう――\nカボチャをくりぬいたオバケかぼちゃを」
1829 = "「你沒見過嗎？就像這樣……把南瓜挖空以後做成的妖怪南瓜」" 

# monologue
# JP: 口と目とを大きくあけて、\nあの独特の表情を、少しでも真似ようと試みる。
2915 = "我張大嘴巴和眼睛，稍微試了一下模仿那個獨特的表情。" 

# monologue
# JP: れいなのくすくすがけらけらになる。\n手がまた、僕へとのびてくる。
3071 = "玲奈的笑聲越變越大。她又把手伸向了我。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんは、かっこういいのがいいですよぉ。\n吸血鬼だとか、狼男だとか」
2557 = "「雙鐵先生還是打扮帥氣一些比較好。比如吸血鬼，狼人之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ならばれいなは、吸血鬼の奥さんか、\n狼男の奥さんのコスプレになるか」
2081 = "「嗯，那你就要Ｃｏｓ吸血鬼的太太，或者是狼人太太啊」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいな、おおかみおんなさんに\nなっちゃうですねぇ。わんわん。わぉーん」
2099 = "「嘿嘿，玲奈要變成小母狼了。汪汪，汪！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい。実にかわいらしい」
2194 = "「很好啊，很可愛」" 

# monologue
# JP: 吸血鬼の方を選んだとても、\nれいなの可愛さにかげりがでようはずもない。
2846 = "如果是打扮成吸血鬼，肯定也絲毫不會減少她的可愛。" 

# monologue
# JP: いやいっそ、両方の衣装を時間交代で\n着てもらうのが良いかもしれん。
2780 = "不對，乾脆兩套衣服分時間段穿也不錯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、衣装を手配せねばな。\nさて、どこでどうしたら良いものやら、だが」
1804 = "「也就得準備一下服裝啊。那我們該去哪裡準備，該怎麼準備呢」" 

# 【れいな】
# display as 玲奈
# JP: 「ふかみさんに聞いてみますかぁ？」
2041 = "「問問深美小姐吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは最後の手段でよかろう。\nせっかくこの先は時間があるのだ」
2505 = "「這就當做是最後的底牌吧。難得還有這麼多時間」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　じゃ、そうてつさんとれいなとで、\nさがしものして、おかいものですねぇ」
1910 = "「哇！那雙鐵先生要和玲奈去找東西，買東西啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう願いたい。\nれいなは、それでかまわんか？」
2223 = "「我想跟你一起去。你不介意吧？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、れいなはかまわんですよぉ！」
2397 = "「當然，玲奈願意！」" 

# monologue
