# monologue
# JP: 撫でる。れいなを。ポーレットがそうしているように。\n僕自身の不安なこころを、鎮めるためにも。
2913 = "Một góc nhìn mà tôi hoàn toàn không có——\nQuả không hổ danh là \\x%lレイルロオド;#00ffc040;Railord%l;#; của Paulette."

# 【れいな】
# display as 玲奈
# JP: 「……セルフチェックおわりましたぁ。\n故障、破損箇所なかったですよぉ！」
1233 = "「……Tự kiểm tra xong rồi ạ~.\nKhông có chỗ\nnào bị hỏng hóc hay nứt vỡ đâu ạ~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2529 = "「Vậy là tốt rồi.」"

# monologue
# JP: ぎゅっと、れいなを抱きしめる。
2967 = "Tôi ôm chặt lấy Reina."

# monologue
# JP: れいなはにこぉっと笑み崩れ、\n僕に甘えて頬ずりしてくる。
3030 = "Reina nở nụ cười rạng rỡ,\nnũng nịu cọ má\nvào tôi."

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんが、\nいいこいいこしてくれたおかげですよぉ」
2545 = "「Tất cả là nhờ anh Soutetsu,\nđã vuốt ve em\nđó ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら、光栄だ」
2538 = "「Nếu được như vậy thì, đó là niềm vinh\nhạnh của anh.」"

# monologue
# JP: これほど密着していても、れいなは先程ほど赤くない。
2808 = "Chọn từ ngữ phù hợp với Michiko, người có\nthời gian đã dừng lại,\ntâm trạng tôi cũng nhẹ nhõm hơn đôi chút."

# monologue
# JP: 「あなた」と「おまえ」は、れいなにとって、\nよほど憧れの強いやりとりだったのだろう。
2836 = "Rất thích làm việc, rất thích Đường sắt\nOhimitera,\nthế mà được nghỉ vẫn thấy vui sao, tôi bất\ngiác mỉm cười."

# monologue
# JP: （今も、『そうてつさん』に戻っているしな。\nまぁ、あせって夫婦ぶることもないか）
3288 = "（Bây giờ cũng đã trở lại gọi là 『anh\nSoutetsu』 rồi.\nThôi thì, cũng không cần\nphải vội vã tỏ ra giống vợ chồng làm gì.）"

# monologue
# JP: れいなも僕も、新米の奥さんで、旦那さんだ。
2896 = "Reina và tôi, đều là những người vợ, người\nchồng mới cưới."

# monologue
# JP: ふたりあるがまま、夫婦の時間を重ねれば、\nいつかは僕らの形に落ち着いていくだろう。
2819 = "Reina không hề trở nên nặng trĩu.\nDo đó em ấy chắc hẳn vẫn đang thức, nhưng\nlại im lặng đến lạ thường."

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん？　どうかしましたかぁ？」
2564 = "「Anh Soutetsu? Anh sao vậy ạ~?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
2034 = "「Cháu đã chuẩn bị tinh thần bị từ chối\nngoài cửa khi đến nhờ vả,\nnhưng không ngờ lại được ông tiếp đón tận\ntình thế này, cháu rất biết ơn ạ.」"

# monologue
# JP: いかん。考えにふけって手を止めてしまったか。
2778 = "Là Reina.\nĐang mỉm cười tươi tắn, nhìn xuống tôi từ\nkhoảng cách rất gần."

# monologue
# JP: れいなの心配を晴らすため、\nいっそう優しくなでなでをする。
3010 = "「Reina cũng nghĩ vậy ạ~. Bây giờ \\x%l長大編成;#00ffc040;đoàn tàu siêu dài%l;#;\ncũng\ngiảm đi rồi, nên \\x%l車掌車;#00ffc040;toa xe trưởng tàu%l;#; chắc\ncũng không còn lại bao nhiêu đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――時間を重ねることの素晴らしさを思っただけさ。\nれいなとポーレットのように、僕もありたいと」
2219 = "「Tất nhiên rồi. Anh rất sẵn lòng.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレットはすごいですからねぇ！\nこつこつこつこつ、すごいんですよぉ！」
2335 = "「Chị Paulette tuyệt lắm đó nha~!\nCứ cần\nmẫn từng chút từng chút một, tuyệt lắm\nluôn ạ~!」"

# monologue
# JP: すごい、と二度も繰り返し、\nれいなは瞳をキラキラさせる。
3101 = "Nhắc lại hai lần từ \"tuyệt\",\nđôi mắt Reina\nlấp lánh sáng ngời."

# 【れいな】
# display as 玲奈
# JP: 「レールショップも、最初はだぁれもこなかったのに。\nいまはこーんなににぎやかで、新しいおまつりまで！」
2552 = "「Rail Shop cũng vậy, ban đầu chẳng có\naaaaai đến cả.\nThế mà bây giờ lại nhộn\nnhịp thế nàaaaay, lại còn có cả lễ hội mới\nnữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。今年はハロウィンを開催するといっていたな」
2288 = "「Ừ. Em nói là năm nay sẽ tổ chức Halloween\nđúng không.」"

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ、ハロウィンですよぉ」
2295 = "「Đúng vậy ạ~, là Halloween đó ạ~」"

# monologue
# JP: ぼんぼりのようにぽっかり暖かに微笑んで、\nけれども急にれいなはしゅうんと萎れてしまう。
3110 = "Cô bé nở nụ cười ấm áp như chiếc đèn lồng\ngiấy,\nnhưng rồi đột nhiên Reina lại xìu\nxuống buồn bã."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　急に」
2199 = "「Sao vậy? Tự nhiên lại」"

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ……ハロウィンの、かそう」
2182 = "「Chuyện là thế này ạ~……hóa trang, cho lễ\nHalloween」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、仮装の件が悩ましいのか？」
1945 = "「Vâng ạ~! Em hiểu rồi~, anh Soutetsu~」"

# monologue
# JP: 確かに僕にも、いささか重荷だ。
2890 = "Đúng là đối với tôi, chuyện đó cũng hơi\nnặng nề thật."

# monologue
# JP: ハロウィンの日は、実務以外のときには全員、\n仮装するようにとの指示であったが――
2776 = "Ngày Halloween, có chỉ thị là ngoài giờ\nlàm việc, tất cả mọi người\nđều phải hóa\ntrang, nhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「なかに、いざとなれば白いシーツをすっぽりかぶり、\nオバケにでもなればいいさ」
2160 = "「Bí quá thì cứ trùm một tấm ga trải giường\ntrắng toát lên người,\nrồi làm ma là được\nmà.」"

# 【れいな】
# display as 玲奈
# JP: 「おばけ！　やっぱり、かそうって……\nううう、れいな、でも、もったいないって思うです」
2155 = "「Ma! Quả nhiên, hóa trang thì……\nUuuu,\nnhưng mà, Reina thấy tiếc lắm ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「もったいない？」
2245 = "「Tiếc?」"

# 【れいな】
# display as 玲奈
# JP: 「だって、燃やされちゃったら、部品取りできなく\nなっちゃいますよぉ。れいな、せっかくなら姉妹機に」
2118 = "「Tại vì, nếu bị đem đi hỏa táng, thì sẽ\nkhông thể tháo linh kiện ra\nđược nữa đâu\nạ~. Nếu đã vậy thì, Reina thà để lại cho\ncác chị em cùng dòng máy còn hơn」"

# 【双鉄】
# display as 雙鐵
# JP: 「まてまてまてまて、誰が、なにを燃やすのだ？」
2417 = "「Từ từ đã, ai, đốt cái gì cơ?」"

# 【れいな】
# display as 玲奈
# JP: 「え？　だから、ハロウィンの日にれいな――\n止まって」
1896 = "「Dạ? Thì là, ngày Halloween, Reina——\nsẽ\ndừng lại mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、泊まるという話だったな」
1952 = "「Vâng ạ~, em hiểu rồi~」"

# 【れいな】
# display as 玲奈
# JP: 「それでれいな、火葬して、おばけになるって。\nでも――だけど、やっぱり部品は姉妹機に」
2350 = "「Vậy thì, bộ sưu tập của chị Paulette và\nbố.\nSẽ chuyển đến Bảo tàng Lịch sử Manga đó\nnhỉ~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……安心しろれいな。\nれいなは、おそらく、ひどい誤解をしているだけだ」
1943 = "「Rõ rồi.」"

# 【れいな】
# display as 玲奈
# JP: 「ふえ？　れいな、\nなにかかんちがいしちゃってるですかあ？」
1897 = "「Ừm. Nếu đánh bóng thì sẽ sáng, và cũng có\nthể nở nụ cười.\nCon người hay sự vật, đều không dễ dàng\nmục nát đâu.」"

# monologue
# JP: 手の中のれいながぽっ、とあたたかくなる。
2923 = "Bằng than được khai thác từ mỏ than đó,\nchúng ta có thể cho \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; chạy,\nvà phát điện nhiệt."

# monologue
# JP: それほど恐れていたのかと――かわいそうで、\nかわいらして、抱きしめる手を強くする。
2834 = "Thì ra cô bé đã sợ hãi đến mức đó sao——vừa\nthấy thương,\nvừa thấy đáng yêu, tôi siết\nchặt vòng tay ôm cô bé hơn nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいっていた“とまる”は、\n機能停止の意味ではなく、宿泊の意味だ」
2336 = "「Vậy thì, sau khi về Ohimitera chúng ta\nlại nói chuyện tiếp nhé.」"

# 【れいな】
# display as 玲奈
# JP: 「えええ！？　でもポーレット、 \n『れいな、ハロウィンの夜にとまっちゃう』って」
1892 = "「Ừ. Nếu Paulette đồng ý.」"

# 【双鉄】
# display as 雙鐵
# JP: 「違う違う。明るく軽い、疑問形の口調だったぞ。\n『ハロウィンの夜に、泊まっちゃう～↑？』だ」
1790 = "「Không phải không phải. Giọng điệu lúc đó\nrất vui vẻ và nhẹ nhàng, là câu hỏi cơ mà.\n『Đêm Halloween, em sẽ nghỉ lại chứ~↑?』\nđấy.」"

# 【れいな】
# display as 玲奈
# JP: 「わ。そおだったんですね。れいな、そういうこと、\n最近良く考えてたから、勘違いしちゃいましたぁ」
1911 = "「Ufufu~——được cõng, hạnh phúc quá ạ~」"

# monologue
# JP: ほわほわと、れいなが笑って体をゆすれば、\nせっけんの匂いが鼻をくすぐる。
3086 = "Reina cười khúc khích, lắc lư cơ thể,\nmùi\nxà phòng cọ vào mũi tôi."

# monologue
# JP: が、そのあたたかな幸せにひたりきるには――\nいささか話の流れが悪い。
2909 = "Nhưng, để chìm đắm trọn vẹn vào niềm hạnh\nphúc ấm áp đó thì——\nMạch câu chuyện có vẻ\nhơi không ổn."

# 【双鉄】
# display as 雙鐵
# JP: 「そういうこと、とは――機能停止に関してか？」
1826 = "「Mấy chuyện đó, là sao——liên quan đến việc\nngừng hoạt động à?」"

# 【れいな】
# display as 玲奈
# JP: 「はい、そうですぅ。れいな、そうてつさんの\nおよめさんになって、朝も夜もいっしょにいられて」
2282 = "「Vâng, đúng vậy ạ~. Reina, trở thành vợ\ncủa\nanh Soutetsu, được ở bên anh cả sáng\nlẫn tối」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2052 = "「嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「それがうれしくてしあわせで、ずっと続けばいい\nっておもって――そしたら、考えちゃうんです」
2509 = "「Điều đó khiến em vui và hạnh phúc lắm, em\ncứ nghĩ giá mà nó kéo dài mãi mãi\n——rồi\nsau đó, em lại bất giác nghĩ ngợi ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「一緒のときが――終わることをか」
2215 = "「Rằng khoảng thời gian bên nhau——rồi sẽ có\nlúc kết thúc sao.」"

# 【れいな】
# display as 玲奈
# JP: 「……そうなんですよぉ」
1228 = "「……Đúng là vậy đó ạ~」"

# monologue
# JP: 手の中が、ほんのわずかに、けれど確かに冷えていく。
2979 = "Giọng nói vui vẻ từ trên lưng.\nNghe như thể chẳng còn chút buồn ngủ nào\nsót lại nữa."

# monologue
# JP: レイルロオドの体温が、\n感情でこれほど動くものだと、初めて知った。
2965 = "Tôi mới biết lần đầu tiên,\nnhiệt độ cơ thể\ncủa Railord lại dao động nhiều đến thế\ntheo cảm xúc."

# 【れいな】
# display as 玲奈
# JP: 「れいな、こう見えても古くて、\nずうっとお仕事しつづけているレイルロオドだから」
2381 = "「Reina, nhìn thế này thôi chứ cũng cũ rồi,\nlại còn là Railord vẫn luôn làm việc liên\ntục không ngừng nghỉ nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕たちは出会えたのだ。\nれいながずっと、頑張り続けてくれたから」
2235 = "「Ra vậy. Cái này còn hiếm hơn cả \\x%l客車;#00ffc040;toa hành khách%l;#;\n——\nTức là, đây là loại toa xe mà những người\nđam mê rất thích nhỉ.」"

# monologue
# JP: れいながもしも運用離脱をしていたら、\n出会うことすら叶わなかった。
2849 = "Nếu Reina đã bị loại khỏi biên chế vận\nhành,\nthì có lẽ chúng tôi đã chẳng thể gặp\nnhau."

# monologue
# JP: 路子が僕を突き放してくれなかったのなら、\n僕はここにすらいなかった。
2851 = "Nếu Michiko không đẩy tôi ra,\nthì có lẽ\ntôi cũng chẳng có mặt ở đây."

# 【双鉄】
# display as 雙鐵
# JP: 「こうして出会えて、一緒にいられる。\nそれだけでもう、僕はなにより幸福だ」
2217 = "「Trước mắt dự kiến sẽ tập trung lưu trữ\nnhững bộ manga từ trước chiến tranh đến\nkhoảng 20 năm sau chiến tranh,\nnhững bộ mà hiện nay khó có thể tìm được\nbản điện tử.」"

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ！　今まででいちばんしあわせで、\nぽかぽかで。だから、さみしくなりたくなくて」
2366 = "「Reina cũng vậy đó ạ~! Hạnh phúc nhất từ\ntrước đến nay,\nấm áp lắm. Thế nên, em\nkhông muốn phải cô đơn nữa đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。このぬくもりをしってしまえば――\n一人ぼっちに戻ってしまうことは、ひどく、いやだな」
2276 = "「Đúng vậy nhỉ. Một khi đã biết đến hơi ấm\nnày rồi——\nthì việc phải trở lại một mình,\nthật sự, rất đáng sợ.」"

# monologue
# JP: れいなにもわかるようにと、伝わるようにと、\nけれども怯えさせないようにと――
2917 = "Cứ tiếp tục đi bộ thế này, có thể sẽ tích\ntụ thêm mệt mỏi.\nPhải tìm chỗ nào đó, có thể nghỉ ngơi một\nchút——"

# monologue
# JP: 悩みつつ、考えつつ、\nできるだけ、簡単でまあるい言葉を選ぶ。
2887 = "Vừa trăn trở, vừa suy nghĩ,\ntôi cố gắng\nchọn những từ ngữ đơn giản và tròn trịa\nnhất có thể."

# 【れいな】
# display as 玲奈
# JP: 「れいな、ずっと。\nずうっといっしょにいたいですよぉ」
2359 = "「Reina, muốn ở bên anh.\nMuốn ở bên anh mãi\nmãi cơ ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。だから、このひとときを、\n一緒にいられる時間をもっと、大切にしよう」
2207 = "「Trong trường hợp của Reina, là chia đôi\nkhông gian bên trong Kiha 07,\nrồi chở cả khách lẫn hành lý luôn đó ạ~」"

# 【れいな】
# display as 玲奈
# JP: 「もっと……大切に？」
2309 = "「Càng thêm……trân trọng?」"

# 【双鉄】
# display as 雙鐵
# JP: 「明日どうなっているかなど、誰にもわからん。\nれいなも、僕も、その点ではまったくおんなじだ」
2469 = "「Ngày mai sẽ ra sao, chẳng ai biết trước\nđược.\nReina, và cả anh nữa, về điểm đó thì\nhoàn toàn giống nhau.」"

# 【れいな】
# display as 玲奈
# JP: 「わ。そうですねぇ。\nあしたのこと、わかる人なんて、いないですねぇ」
1917 = "「Ehehe~ Không có chi đâu ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、わからない明日のことを悩んで、\nほっぺをぺしゃんとさせてしまってはもったいないぞ」
2233 = "「Thế nên, nếu cứ phiền não về ngày mai\nchưa biết trước,\nmà làm cho đôi má này xị\nxuống thì phí lắm đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「ひゃううう」
1905 = "「? Có chuyện gì vậy ạ~, anh Soutetsu~」"

# monologue
# JP: ぷにぷにと、れいなのほっぺをつっつきまわす。\nくすぐったがってきゃらきゃら笑って――
