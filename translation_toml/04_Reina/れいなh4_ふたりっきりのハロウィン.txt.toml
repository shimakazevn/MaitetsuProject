2974 = "Ngay lập tức, khi tôi áp tay mình lên, những ngón tay buông ra,\nvà vô cùng tự nhiên, đan vào nhau kiểu tay trong tay của những người yêu nhau."
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、それじゃあ、\nアウトレット屋さんに向けて、出発ですねぇ」
2108 = "「E he he~, vậy thì,\nhướng thẳng đến cửa hàng Outlet, xuất phát thôi nào~」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、その前に銀行によらせてほしい。\nそういう服の相場がわからんので、念をいれたい」
2027 = "「À, trước đó cho anh ghé qua ngân hàng một chút.\nAnh không rõ giá cả mấy bộ quần áo đó thế nào, nên muốn chuẩn bị cho chắc.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　それじゃあ、最初の停車駅は、\n[くまぎん,1]隈銀さん駅ですねぇ。『しゅっぱーつ、しんこー！』」
2150 = "「Vâng ạ~! Vậy thì, trạm dừng đầu tiên,\nlà ga ngân hàng Kumagin nhỉ. 『Xuất pháaaaat, tiến lênggggg!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、待たせてしまったな――うむ？」
2385 = "「Reina, để em phải đợi rồi——ưm?」"
# monologue
# JP: れいながいない。\n慌てて周囲を見回せば――
3004 = "Không thấy Reina đâu.\nTôi vội vàng nhìn quanh——"
# 【れいな】
# display as 玲奈
# JP: 「あ、そうてつさぁん。\nこのこ、迷子なんですよぉ」
2038 = "「A, anh Soutetsu~.\nBé này, đi lạc đó ạ~」"
# monologue
# JP: てこてこと、\n赤いなにかを抱えてこちらに走り戻ってくる。
3040 = "Lạch bạch lạch bạch,\ncô bé ôm một vật gì đó màu đỏ chạy về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「迷子……の、人形――いや、ぬいぐるみか？」
2500 = "「Đi lạc……là, búp bê——à không, thú bông à?」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ、赤ずきんちゃんのぬいぐるみですぅ」
2166 = "「Đúng vậy ạ~, là thú bông Cô bé quàng khăn đỏ ạ~」"
# monologue
# JP: 赤ちゃんというか、ディフォルメされた童女な感じだ。\nかわいらしいし、傷んでもいない。
3156 = "Nói là em bé thì đúng hơn là một bé gái được cách điệu hóa.\nRất đáng yêu, và cũng không bị trầy xước gì."
# 【双鉄】
# display as 雙鐵
# JP: 「どこにあった――いや、どこにいたのだ」
1824 = "「Em tìm thấy ở đâu——à không, bé này ở đâu vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「向かいの歩道の真ん中ですよぉ。\nなんかあるって思って、れいな、拾いに行きましたぁ」
2120 = "「Ở ngay giữa vỉa hè đối diện đó ạ~.\nThấy có cái gì đó, nên Reina, đã chạy ra nhặt ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「道の上か。なら、落としてからまだ間もないのかも\n知れんな。れいな、少し待っていてくれ」
1798 = "「Trên đường à. Vậy thì, có lẽ vừa mới đánh rơi cách đây không lâu\ncũng nên. Reina, đợi anh một lát nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、どこにいくですかぁ？」
2559 = "「Anh Soutetsu, anh đi đâu vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「銀行の中だ。聞いてくる。れいなはここで、\n落とし主らしき人がこないか見ていてあげてくれ」
1863 = "「Vào trong ngân hàng. Anh đi hỏi thử xem. Reina ở đây,\nnhìn giúp anh xem có ai trông giống người đánh rơi đồ đi ngang qua không nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、わかりましたぁ！」
2153 = "「Vâng ạ~, Reina hiểu rồi ạ~!」"
# 【れいな】
# display as 玲奈
# JP: 「落とし主らしきひとは、きっと、\nきょきょろ、うろうろしてるひとですねぇ」
2129 = "「Người trông giống người đánh rơi đồ, chắc chắn là,\nsẽ ngó nghiêng, đi tới đi lui nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「……そういうひと、こないですねぇ。\nむこうのみち、あんまり人自体通らないですねぇ」
1230 = "「……Chẳng thấy ai như vậy, đi ngang qua cả.\nCon đường bên kia, vốn dĩ cũng ít người qua lại mà nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「赤ずきんちゃん、赤ずきんちゃん。\nあなたのマスターは、どんな人なんですかぁ？」
2176 = "「Cô bé quàng khăn đỏ ơi, Cô bé quàng khăn đỏ.\nMaster của em, là người như thế nào vậy ạ~?」"
# 【れいな】
# display as 玲奈
# JP: 「おへんじできませんかぁ。でも大丈夫！\nそうてつさんが、きっとおうちに帰してくれますよぉ」
2327 = "「Em không trả lời được sao. Nhưng không sao đâu!\nAnh Soutetsu, chắc chắn sẽ đưa em về nhà đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな。れいな。そっちはどうだった？」
1801 = "「Để em phải đợi rồi. Reina. Bên này sao rồi?」"
# 【れいな】
# display as 玲奈
# JP: 「赤ずきんちゃん、めだつようにもってましたけど。\nほとんど人が通らなくて、見つからなかったですぅ」
2372 = "「Reina đã cố cầm bé quàng khăn đỏ sao cho thật nổi bật rồi.\nNhưng mà hầu như chẳng có ai đi ngang qua, nên không tìm thấy ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらも行内に落とされた方はいなかった。\nだが、有力そうな情報は聞けたぞ」
2551 = "「Bên trong ngân hàng cũng không có ai báo mất đồ cả.\nNhưng mà, anh nghe được một thông tin có vẻ rất khả quan đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わ! どんな情報ですかぁ？」
1908 = "「Oa! Thông tin gì vậy ạ~?」"
# monologue
# JP: れいながひょこひょこ、\nぬいぐるみをゆすりながら訪ねてくる。
3047 = "Reina lon ton,\nvừa đung đưa con thú bông vừa hỏi tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。赤ずきんのぬいぐるみと一緒に、\n銀行外観の記念写真を撮っていた方が目撃されている」
2071 = "「Ừm. Có người đã nhìn thấy một người chụp ảnh kỷ niệm ngoại cảnh ngân hàng,\ncùng với con thú bông Cô bé quàng khăn đỏ này.」"
# 【れいな】
# display as 玲奈
# JP: 「わあぁすごい！　この赤ずきんちゃんの、\nその人がマスターさんですねぇ」
1914 = "「Waaa tuyệt quá! Vậy người đó,\nchính là Master của bé quàng khăn đỏ này nhỉ.」"
# 【双鉄】
# display as 雙鐵
