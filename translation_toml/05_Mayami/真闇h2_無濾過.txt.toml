# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――あっ――そんなに、されたら、\n僕、はっ――もうっ」
1117 = "「噗啊――啊――這樣子的話，我――已經要……」" 

# 【真闇】
# display as 真闇
# JP: 「気持ちよかと？\nおちんちんミルク、ぴゅっぴゅしちゃうと？」
1194 = "「舒服嗎？小雞雞是不是要射白牛奶了啊？」" 

# monologue
# JP: 恥ずかしい。\nけれども事実だ。頷くしかない。
1628 = "真難為情。但正如她所說，我只能點頭。" 

# monologue
# JP: 勃起はびくびく、浅ましいまでにひくついて、\n先走りでもう、ぬらつきまくってしまってるから。
1650 = "肉棒下流地顫抖著，已經沾滿了預射液。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら。ね？　双ちゃん」
1206 = "「那就這樣吧，小雙」" 

# monologue
# JP: （ぴたっ）
1817 = "（停）" 

# monologue
# JP: 手が、止まる。僕の勃起から離れてしまう。\n真闇姉は、ゆっくり体を起こしてく。
1396 = "她的手停了下來，放下了我的肉棒。她慢慢地站了起來。" 

# monologue
# JP: 数秒前まで僕の勃起を弄ってた手が、\nもぞもぞと、スカートの下に差し入れられて――
1430 = "幾秒前還在玩弄我肉棒的手，伸進了短裙下――" 

# monologue
# JP: （するっ）
1868 = "（抽）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 

# monologue
# JP: パンツを脱ぎ捨て、\n真闇姉はお尻を高く持ち上げる。
1662 = "脫掉內褲，真闇姐高高地抬起屁股。" 

# monologue
# JP: 股間――おまんこを少しも隠さず、\n僕に思い切り見せつけてくれる。
1720 = "那裡――有著毫不遮掩的小穴，讓我完完整整地看了個遍。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すごいな……太ももまでもがびちょびちょだ」
1048 = "「哇……大腿都這麼潮濕了啊」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんのおちんちんミルク、\n欲しぅて欲しぅて、よだれば、垂らしちゃっとるねぇ」
1169 = "「是啊，都是太想要小雙的雞雞牛奶，才會口水直冒的啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕を求めてくれて、か」
1146 = "「想要我的牛奶嗎」" 

# monologue
# JP: そう言われれば、じっくりたっぷり見たくなる。
1719 = "那我也想盡情看一遍了。" 

# monologue
# JP: おまんこの合わさった肉に指をかけ、\nそうっと――けれども大きくはっきり押し開く。
1353 = "動手拉開小穴合在一起的兩瓣肉，輕輕地――撐開了一個大口。" 

# monologue
# JP: （くぱああっ）
1832 = "（咕叭）" 

# 【真闇】
# display as 真闇
# JP: 「あ――」
1057 = "「啊――」" 

# monologue
# JP: 中にたまってた蜜がこぷりと溢れ出る。
1677 = "裡面積累的蜜汁嘩啦啦地淌了出來。" 

# monologue
# JP: 真闇姉の膣口は、僕の勃起を欲しがって、\n濃い目のピンクにぬらつく肉をヒクつかせてる。
1612 = "真闇姐的小穴口渴求著我的肉棒，肉色偏深粉，黏滑的肉壁還在顫抖著。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん」
1132 = "「對吧，小雙」" 

# monologue
# JP: おまんこの肉だけではない。
1305 = "不止這一塊小穴裡的肉。" 

# monologue
# JP: 真闇姉はもう全身をピンクに染めて、\n我慢できないといわんばかりに、ひくついている。
1598 = "真闇姐已經渾身染上了桃紅，顫抖的身體彷彿在說，她再也忍不住了似的。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの新鮮なおちんちんミルク。\nおねえちゃんのおまんこでピュッピュってしてくれたら」
1139 = "「小雙新鮮的雞雞牛奶，能射進姐姐的小穴裡來嗎」" 

# monologue
# JP: （もにゅんっ）
# 1871 = "（揉）" 

# monologue
# JP: 真闇姉の手が、自分の胸をゆっくりと揉む。
1617 = "真闇姐的手慢慢地揉起自己的胸。" 

# monologue
# JP: 開いた指から肉を乳首をはみ出させ、\nその柔らかさと質量を、これ見よがしに強調してくる。
1485 = "手指指縫間擠出的乳肉和乳頭，炫耀似地強調著柔軟和質量。" 

# 【真闇】
# display as 真闇
# JP: 「そしたら、おねえちゃんのおっぱいミルク、\n双ちゃんに、飲ませてあげれるようになるけん」
1207 = "「那麼姐姐的母乳，就可以餵給小雙喝啦」" 

# monologue
# JP: 射精して、妊娠させて。\nそして母乳を作ってもらう。
1417 = "射精，懷孕，就會有母乳分泌。" 

# monologue
# JP: 僕には一生縁がないものと思いこんでたプロセスが、\nごく単純に直接的に、目の前にごろんと転がっている。
1452 = "我以為這個過程一輩子都與我無緣，想不到會如此單純直接地出現在我眼前。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕のミルクが、真闇姉のおまんこで醸造されるのだな」
1156 = "「我的牛奶是真闇姐的小穴釀造的啊」" 

# monologue
# JP: ならば、現実のものにしてしまいたい。\n勃起は、ヘソまで反り返ってる。
1454 = "我想讓妄想變成現實。肉棒翹得要頂到肚臍眼了。" 

# monologue
# JP: それを無理やり手で押し下げて、\nひくついている膣口に、慌てないようあてて押し込む。
1460 = "我用力將它一手按住，對準顫動的小穴口，定下心來插了進去。" 

# monologue
# JP: （ぐっ――）
1850 = "（噗――）" 

# 【真闇】
# display as 真闇
# JP: 「んふっ――ん……」
1105 = "「嗯唔――嗯……」" 

# monologue
# JP: ぐちょぐちょに濡れまくってるおまんこは、\nけれどもしっかりした感触で、僕の亀頭に絡まってくる。
1540 = "濕透了的小穴依然有著完美的感觸，它就這樣纏上了我的龜頭。" 

# monologue
# JP: 肉を、割る――\nその感覚にゾクゾクしながら、ゆっくり腰を進めてく。
1740 = "頂開肉的感覺讓我很緊張，我慢慢地向內挺進。" 

# monologue
# JP: （ぐっ――ぐぐぐっ――）
1849 = "（噗――唔唔唔――）" 

# 【真闇】
# display as 真闇
# JP: 「あ……来た――双、ちゃ――んっ――\nひあっ――――ひっ――んっ――太っ――」
1065 = "「啊……來了――小雙――嗯――咿啊――咿――嗯――好粗――」" 

# monologue
# JP: 亀頭のくびれを押し込んだ――\nそこで、けれども止まってしまう。
1419 = "將龜頭冠狀帶塞了進去――但是我卻又停了下來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――、真闇、姉っ」
1086 = "「嗚――真闇、姐」" 

# monologue
# JP: 入った途端に、亀頭がぎゅっうと絞られる。\n痛みを感じるほど、強く。
1511 = "插進去的一刻，龜頭就被緊緊絞住。緊到生痛。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ひどく、キツい――\nもっと――力を――抜いて、くれっ」
1123 = "「好緊啊――能稍微――放輕鬆――一點嗎」" 

# 【真闇】
# display as 真闇
# JP: 「ふっ……あっ――はっ――んっ――\n抜いとる……つもり……なの――にっ――ん、ひっ」
1032 = "「呼……啊――哈――嗯――我覺得……我已經……放――輕鬆了啊――嗯、咿」" 

# monologue
# JP: （キチチチチチチっ！）
1882 = "（緊緊緊！）" 

# monologue
# JP: アルコールの影響なのか、それとも欲が強すぎるのか。
1308 = "不知是酒精的作用，還是欲望太重。" 

# monologue
# JP: 真闇姉のおまんこは、あまりにせっかちに締め付けて来て、\n一刻も早く僕の精子を絞り出そうと頑張りすぎてる。
1613 = "真闇姐的小穴頻頻急躁地收緊，為擠壓出我的精子而用力過猛。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは……奥まで入れんぞ……\nなんとか……もっとゆるめんことには）
1864 = "（好像……插不到最裡面啊……能不能……再放鬆一點啊）" 

# monologue
# JP: 手段を探せば、すぐに見つかる。\n――酒には、酒だ。
1443 = "想了想，馬上就想到方法了。――能克製酒的只有酒。" 

# monologue
# JP: アルコールでコントロールできない体なら、\nもっとアルコールを足すことで、弛緩させてはどうだろう。
1516 = "既然是酒精不耐受的身體，多來點酒精就會鬆弛下來了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……少しだけ待ってくれ」
1189 = "「真闇姐……請等我一下」" 

# monologue
# JP: （ずるっ）
# 1875 = "（擦）" 

# 【真闇】
# display as 真闇
# JP: 「あっ」
# 1071 = "「啊」" 

# monologue
# JP: 名残惜しげな声に心は痛むけれども、ひとまずは抜く。\n挿れてた形に、膣口はぽっかり淋しげに開く。
1337 = "儘管她依依不捨的聲音讓我心痛，我還是拔了出來。小穴口依然孤單地張著，保持著肉棒的形狀。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すぐに、もっと奥まで行くから」
1160 = "「我馬上會插得更深一點的」" 

# monologue
# JP: コップに焼酎をなみなみ満たし、\nそこに人差し指を突っ込む。
1380 = "在酒杯裡倒滿燒酒，然後食指沾了沾酒。" 

# 【真闇】
# display as 真闇
# JP: 「え？　双ちゃん、なんばしよっと？」
1053 = "「哎？　小雙，你要做什麼？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや――こういうのはどうかと思ってな」
1152 = "「我只是有了個主意」" 

# monologue
# JP: （ぬりゅっ）
1862 = "（塗）" 

# 【真闇】
# display as 真闇
# JP: 「んひっ！？　あ、熱っ――やっ――ちょっ――\nキツかっ――刺激、強すぎっ――」
1046 = "「咿！？　好、好熱――呀――等一下――太緊了――刺激太強了――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、すまん。染みてしまうか？」
1112 = "「嗯，抱歉，很痛嗎？」" 

# monologue
# JP: 様子見のため、膣肉を撫ぜただけでこの始末なら、\nとても中には注げない。
1494 = "才撫摸一下小穴做試驗就這樣了，我肯定不能倒太多酒。" 

# monologue
# JP: ならば……\nああ、うむ――こちらはどうだ？
1724 = "那麼……好吧――這裡呢？" 

# monologue
# JP: （くりゅんっ）
1863 = "（壓）" 

# 【真闇】
# display as 真闇
# JP: 「いひゅっ！？　――んっ――そ、双ちゃん――そ、そこ、\nおしり――お尻の穴っ――あ――ふあっ！？」
1040 = "「咿呀！？　――嗯――小、小雙――那、那裡是屁股――屁眼――啊――嗚啊！？」" 

# monologue
# JP: （くにっ、くにっ――もみゅっ――くりゅっ――）
1870 = "（捏、捏――揉――揉――）" 

# 【真闇】
# display as 真闇
# JP: 「やんっ――んんっ――やあっ――おしり、ばっ――\nあつく――って――んっ――ヘン――これっ――あふっ」
1010 = "「呀嗯――嗯嗯――呀啊――屁股真的――好熱――啊――嗯――要――不對了――啊呼」" 

# monologue
# JP: 嫌がってない。痛がってない。\nならば、おしりは行けそうだ。
1386 = "她不反感，不覺得痛。那屁股應該是可以的。" 

# monologue
# JP: もう一度、焼酎を指にたっぷり絡ませ――
1343 = "再一次沾上滿滿的燒酒――" 

# monologue
# JP: （つ――ぷっ）
1835 = "（唔）" 

# 【真闇】
# display as 真闇
# JP: 「ふあっ――んひゅゅっ！！？　――やああっ、\n双ちゃんっ――そこ、違っ――んっ――んきゅんっ！」
1088 = "「嗚啊――嗯呀！！？　――呀啊啊、小雙――不是那裡――嗯――嗯呀嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは――膣内とは全然違うな）
1891 = "（這和小穴裡完全不一樣）" 

# monologue
# JP: 穴の入り口、肛門だけがみちりと強烈に締め付けて来て、\nその奥側は、狭いがつるりとしている感じだ。
1672 = "與穴口不同，肛門有著極其強烈的緊度，裡面則是狹窄又嫩滑的肉管。" 

# 【真闇】
# display as 真闇
# JP: 「やっ――あっ――ほじほじ――されて――\nおしり――なの、に――んっ――ふうっ」
1005 = "「呀――啊――別這樣――掏我的――屁眼――啊――嗯――呼」" 

# monologue
# JP: 真闇姉の背が大きく震える。\n肩を使って呼吸している。
1615 = "真闇姐的後背顫抖得很厲害。呼吸都會帶著肩膀上下動。" 

# monologue
# JP: そしてたっぷり、感じてくれる。\nおまんこからは、新たな蜜がどんどん溢れる。
1471 = "我能感受到。小穴裡又分泌出了大量的蜜汁。" 

# monologue
# JP: （きゅっ――くぽっっ――きゅぷっ――きゅうっ）
1842 = "（啾――啪――啾唔――壓）" 

# monologue
# JP: 腸液なのか、ぬめりけが指を助けてくれる。\nこの調子なら、もう一本指を増やしても――
1520 = "有黏液讓手指動得非常順暢，可能是腸液吧。感覺還可以再加一根手指――" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃぁん」
1138 = "「小雙」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 

# monologue
# JP: 甘えた声。発情しきった、雌の声。\n濃密すぎる女の匂いが、声と同時にぷうんと香る。
1438 = "很甜蜜，是發情的雌性的聲音。同時還有一股濃濃的女體香飄了起來。" 

# 【真闇】
# display as 真闇
# JP: 「あの、ね？　おねえちゃん――もう、\nおまんこ、きゅんきゅん、うずうずしちゃって」
986 = "「你知道嗎？　姐姐――的小穴已經好急不可耐了啦」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ。勃起が、ものすごいことになっている」
1150 = "「我也是，陰莖勃起得非常大了」" 

# monologue
# JP: お尻の穴の目新しさに、\n為すべきことを危うく見失いかけてしまった。
1423 = "屁眼的新鮮感，差點讓我忘記應該做什麼了。" 

# monologue
# JP: （くぽんっ！）
1839 = "（啪！）" 

# monologue
# JP: だから、そこから指を引き抜く。\n狙いを、もっと下へと定める。
1478 = "所以我拔出了手指。把目標往下放放。" 

# monologue
# JP: 先走りでもうどろどろな、期待に震える勃起をぐい、と、\nもう一度、わななく膣口に押し当ててみる。
1499 = "抬起被預射液沾濕的、興奮到止不住顫抖的陰莖，又一次對準微顫的小穴口插了進去。" 

# monologue
# JP: （ぱくっ！）
1861 = "（噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 

# monologue
# JP: さっきと違い、和らいでいる。吸い付いてくる。
1701 = "跟剛才不一樣，很溫和，而且會主動吸住肉棒。" 

# monologue
# JP: 歯のない小さなおくちみたいに、\n僕にぴったり張り付きちゅうちゅう、引き込んでくる。
1433 = "彷彿是一張沒有牙齒的小嘴，完美地包住了我的肉棒，往內吸了進去。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これなら――うん）
1892 = "（這樣應該――行了）" 

# monologue
# JP: 腰をわずかに押しこめば、\nおしとやかなヒダがめくれあがって蠢き始める。
1436 = "往前推一推，肉壁皺褶就乖乖地翻動起來了。" 

# monologue
# JP: （ずるっ――るっ――ずっ）
1873 = "（擦――溜――吱）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――くっ」
1092 = "「嗯――唔」" 

# 【真闇】
# display as 真闇
# JP: 「あ――来た――双ちゃんの、おちんちん――\nんっ――いっぱい――ふあっっ――嬉し――いひっ！？」
1058 = "「啊――來了――小雙的雞雞――嗯――好撐――嗚啊――好高興！？」" 

# monologue
# JP: （ずぶっ――ずるっ――ぬぶぶぶぶっ）
1830 = "（呲噗――擦――噗噗噗）" 

# monologue
# JP: 亀頭を全部飲み込んで。
1750 = "龜頭全部被吞了進去。" 

# monologue
# JP: それでもたりず、おまんこ肉は、もっともっとと、\n奥まで来てと、貪欲な蠕動を繰り返す。
1421 = "小穴肉依然不滿足地蠕動著，貪婪地想要再吸更多進去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇――姉っ」」
1180 = "「真闇――姐」」" 

# monologue
# JP: （ずっ――ずうっ――こちゅんっ）
1819 = "（吱――吱――咕啾）" 

# 【真闇】
# display as 真闇
# JP: 「あっっ――奥っ――双ちゃん――双ちゃんっ」
1060 = "「啊――噢――小雙――小雙」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1104 = "「嗯」" 

# monologue
# JP: 甘えるように、動いてとおねだりするように、\n真闇姉は腰をゆっくりゆっくり回す。
1393 = "她撒嬌一般，彷彿在請求我動起來似地，慢慢地轉起了腰。" 

# monologue
# JP: その尻肉をしっかり捕まえ――
1468 = "我緊緊抓住屁股上的肉――" 

# monologue
# JP: （ずっ！！！）
1824 = "（吱！！！）" 

# 【真闇】
# display as 真闇
# JP: 「ひゃうっ！！？」
1013 = "「呀！！？」" 

# monologue
# JP: （ずぱんっ！！！）
1828 = "（呲啪！！！）" 

# 【真闇】
# display as 真闇
# JP: 「～～～～～～～～っ！！！」
1213 = "「～～～～～～～～！！！」" 

# monologue
# JP: 素早く、深く、思いっきりに\n腰を突き出し打ち付ける！
1707 = "迅速地、深深地、盡情地，挺腰出擊，扎了進去！" 

# monologue
# JP: （ずばっ！　すぱんっ！　ぐちゅっ！　じゅぶっ！）
1827 = "（呲啪！　呲啪！　咕啾！　啾噗！）" 

# 【真闇】
# display as 真闇
# JP: 「ひあっ――あっ！　双、ちゃ――激し――んっ！」
1044 = "「咿啊――啊！　小雙――太激烈――嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
1056 = "「唔！」" 

# monologue
# JP: 強く動けば動いた分だけ、\n真闇姉の膣内は逃すまいとしてひっかかってくる。
1699 = "越是用力去動，真闇姐的小穴就越是緊緊包夾，阻攔我的後退。" 

# monologue
# JP: そのぞわぞわに亀頭を掴まれる感覚が、\n気持ち良すぎて――腰はどんどん加速する！
1751 = "龜頭被這種抽動緊緊抓住，真是舒服極了――腰也不停地加速！" 

# monologue
# JP: （パンッ！　スパッ！　パチュッ！　パンッ！）
1838 = "（啪！　咻啪！　啪唧！　啪！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――真闇――姉っ――」
1085 = "「嗚――真闇――姐――」" 

# 【真闇】
# display as 真闇
# JP: 「んっ――あっ――ン、双ちゃん――おまん、こっ――\nおねえちゃん――ひあっ――めくれ、ちゃう――からっ」
1094 = "「嗯――啊――嗯、小雙――小穴――姐姐――咿啊――腰捲起來了――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 

# monologue
# JP: 真闇姉の切羽詰まってしまった声に、\n無理やり体にブレーキをかけ、一番深いところで止まる。
1595 = "真闇姐咬緊牙關喊出來的話，把我嚇得連踩剎車，在小穴最深的位置停了下來。" 

# monologue
# JP: （きゅんっ――きゅううううっ）
1846 = "（啾――壓）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――っ！？」
827 = "「――！？」" 

# monologue
# JP: 止まってみれば、\nここぞとばかりに真闇姉の膣が攻めてくる。
1321 = "但剛停下來，真闇姐就瞅准機會攻了過來。" 

# monologue
# JP: ただ単純にキツくすぼまり、\n無理矢理にでも最奥で精を吐き出させようと蠢いてくる。
1330 = "僅僅是緊的窄穴，竟然開始用蠕動來逼迫我在最深處射精了。" 

# 【双鉄H】
# display as 雙鐵
# JP: （だが、学習した。\nおまんこがキツく、苦しいときには――）
1816 = "（但是我也知道了。小穴這麼緊這麼難受的時候――）" 

# monologue
# JP: 接合部から滴る蜜を\n素早くたっぷり指に絡めて――
1645 = "結合處滴落的蜜汁，迅速地沾滿了手指――" 

# monologue
# JP: （つぷんっ！）
1831 = "（呲噗！）" 

# 【真闇】
# display as 真闇
# JP: 「やっ！？　んひゅっ――んうっ――\nまたっ――おひりっ――らめえっ！」
1018 = "「呀！？　嗯咿――嗯唔――又――塞屁眼――不要！」" 

# monologue
# JP: （ふわっ――きゅうううううっ！）
1848 = "（嗚哇――壓！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1210 = "「！！？」" 

# monologue
# JP: 最初のときと、膣の反応がまるきり違う。
1300 = "一開始小穴的反應完全不一樣。" 

# monologue
# JP: ほんの一瞬緩んだまでは同じだが。\nそこから一気に、わななきながら抱きついてきてっ！
1738 = "雖然一樣有著一瞬間的鬆弛。之後就是蜿蜒又緊緻的腔道了！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くはっ」
1034 = "「呼哈」" 

# monologue
# JP: これは保たない。このままだったら射精する。\n思えば指は、なんとかしようと抗い動きっ！
1440 = "快堅持不住了，再這樣下去我就要射了。手指馬上動了起來，我要抵抗！" 

# monologue
# JP: （ぐいっ――ずるうううっ！）
1893 = "（頂――吱溜！）" 

# 【真闇】
# display as 真闇
# JP: 「ひゃっっ！？　あっ――おひりっ――おしり、でっ――\nイっ――しゅごっ――んっ――ふひぃぃぃいっっっ！！」
1017 = "「呀！？　啊――屁股――屁股――咿――好厲――嗯――嗚咿！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1209 = "「！！！」" 

# monologue
# JP: （びゅくっ！　どびゅっ！　どぶっ！　びゅるんっ！）
1857 = "（噗嚕！　咚噗！　咕噗！　噗嚕！）" 

# 【真闇】
# display as 真闇
# JP: 「あっ――おまんこ――精液――ミルク――びゅうって、\nあたって――双ちゃん、のっ――んふっ！」
1061 = "「啊――小穴――精液――牛奶――射我、射裡面――小雙的――嗯唔！」" 

# monologue
# JP: （びゅっ！　びゅるっ！　びゅぶっ！　びゅううっ）
1860 = "（噗！　噗嚕！　咻噗！　噗）" 

# monologue
# JP: 勝手に動いてしまった指が、真闇姉のお尻に隠されていた、\nなにかの引き金を引いてしまった。
1354 = "動起來的手指好像扣響了真闇姐屁股裡藏著的某個扳機。" 

# monologue
# JP: そうとしか思えない膣の甘いうねりは、\n思いっきりの射精へと僕を落としこむ。
1375 = "因為小穴甜蜜的蠕動，讓我滑向了射精的終點。" 

# monologue
# JP: （びゅるっ――びゅっ――ぴゅっ――ぴゅるっ――――）
1856 = "（噗嚕――噗――噗――噗溜――）" 

# 【真闇】
# display as 真闇
# JP: 「はぁっ、はぁっ……あっ……はぁっ――はあっ」
1050 = "「哈、哈……啊……哈――蛤啊」" 

# monologue
# JP: 汗だくの背中の、まあるいおしりの、\n震えがだんだん小さくなってく。
1534 = "沾滿汗水的後背、圓滾滾的屁股，顫抖都漸漸地小了下去。" 

# monologue
# JP: 真闇姉の呼吸が落ち着くのを待って、\n素朴な疑問をそのままぶつける。
1638 = "等著真闇姐喘過氣來，我才問她問題。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「今のは一体……おしりに指を挿れた反応が、\n想像と、まるで違ったのだが」
999 = "「剛剛是怎麼了……屁股裡插手指的時候，你的反應和我的想像一點都不一樣」" 

# 【真闇】
# display as 真闇
# JP: 「やあんっ――そぎゃんとエッチなこと聞かんでぇ」
1011 = "「呀嗯――居然問這麼色的問題」" 

# monologue
# JP: 顔を埋めるようにして。\nそれでも律儀に真闇姉は、僕の質問に答えてくれる。
1400 = "她藏起了表情。但她依然認真地回答了我的問題。" 

# 【真闇】
# display as 真闇
# JP: 「お尻に指、とか――最初は、\nびっくりしちゃっただけやったとよ？」
1140 = "「屁眼裡插手指――我一開始只是嚇了一跳而已喔？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1104 = "「嗯」" 

# 【真闇】
# display as 真闇
# JP: 「けど、ホジホジされて。それで……おしり、も……\n気持ちよかとこって――知っちゃった、けん」
983 = "「但是真的被捅屁眼了……屁股……也舒服起來了――我就知道了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか――それでか」
1170 = "「是嗎――原來是這樣」" 

# monologue
# JP: 気持ち良い穴に指を挿れられ、\n真闇姉の快感が一気に膨らんで――
1488 = "手指插進舒服的屁眼裡，真闇姐的快感猛烈膨脹――" 

# monologue
# JP: そしてはじけた絶頂に、\n僕の勃起も、為す術もなく巻き込まれたのだ。
1379 = "在她高潮的那一刻，我的肉棒只是被迫被捲入其中而已。" 

# 【真闇】
# display as 真闇
# JP: 「知っちゃったけん……ね？」
997 = "「其實你也想了解……是吧？」" 

# monologue
# JP: （むにいいいっ）
1837 = "（啪嗒）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 

# monologue
# JP: 真闇姉が尻肉を割り開く。
1602 = "真闇姐拉開屁股。" 

# monologue
# JP: おしりの穴がひくひくと、\n僕を待ちわびて震えてる。
1425 = "屁眼顫抖著，似乎就是在等我的進入。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。僕も、もっと知りたい」
1110 = "「嗯，我也想多了解一點」" 

# monologue
# JP: 自分が出した精液と、\n真闇姉からまだまだ溢れてくる蜜と。
1670 = "自己射出的精液，以及真闇姐分泌出來的蜜汁。" 

# monologue
# JP: （ずるっ――ぬとおおおおっ）
1872 = "（擦――噗）" 

# 【真闇】
# display as 真闇
# JP: 「ヒャンっ」
1007 = "「呀」" 

# monologue
# JP: おまんこに勃起を擦りつけ、\nそれをたっぷり、しつこい程にまとわりつかせる。
1652 = "肉棒在小穴上蹭來蹭去，在肉棒上沾滿混合的黏液。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉――そのまま、お尻を開いててくれ」
1187 = "「真闇姐――屁股就這樣張著」" 

# 【真闇】
# display as 真闇
# JP: 「良かとよ？　双ちゃ――んひいいいいいいっっ！？」
1121 = "「好啊，小雙咿咿咿咿！？」" 

# monologue
# JP: （ずぬるるるるるるっ！！！）
1821 = "（吱溜！！！）" 

# monologue
# JP: 警戒されて、おしりの門を締め付けられてしまわないうち、\n油断にぱくぱくしてるうち、勃起を一気にねじ込んで！
1697 = "趁她還在戒備，不會被屁眼緊緊關上的空隙，大意而穴口一張一合的空隙，一口氣整根都插進去！" 

# 【真闇】
# display as 真闇
# JP: 「ひゃっ！？　ウソっ！　おしり――ずるんっ、って！」
1015 = "「呀！？　不會吧！　屁眼――插進來了！」" 

# 【双鉄H】
# display as 雙鐵
# JP: （これ――はっ――）
1890 = "（這個――哈――）" 

# monologue
# JP: 奥が無い。\n思いっきりに突きこんでなお、何も亀頭を迎えてくれない。
1531 = "沒有碰壁。已經是全力插入了，龜頭也什麼都頂不到。" 

# monologue
# JP: だが、それがいい。\n竿全体を均等に、ぴっちり包む感触がいい。
1327 = "但是這樣就好。肉棒被平均包裹的感覺很舒服。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おまんことは――全然――違、うっ」
1036 = "「和小穴――完全――不一樣」" 

# monologue
# JP: （ずろおおおおおおおおっっっ！）
1884 = "（蹭！）" 

# 【真闇】
# display as 真闇
# JP: 「やっ！？　おしりっ――おなか――めくれ、てっ」
1020 = "「呀！？　屁眼――肚子――都被翻了過來」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……顔がとろとろに溶けてるぞ？」
1188 = "「真闇姐……你的表情都高潮了喔？」" 

# 【真闇】
# display as 真闇
# JP: 「やああっ」
1008 = "「呀啊啊」" 

# monologue
# JP: 背中までボっと真っ赤になって、\n真闇姉は言葉を発しなくなる。
1398 = "她的紅潮連後背都紅透了，話都說不出口了。" 

# monologue
# JP: それでも腰はクリュクリュ動き、\nもっと攻めろと、尻をほじれと要求してくる。
1325 = "但是腰依然不斷地扭動，逼著我往裡不斷深入、不斷深入屁眼。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ、真闇姉。\n顔がゆるむほど――気持ちいい」
1147 = "「我也是，真闇姐。舒服到表情都繃不住了」" 

# monologue
# JP: （ずるううううううううっ）
1823 = "（吱溜）" 

# 【真闇】
# display as 真闇
# JP: 「きゅっ！　ふっ――やっ――ぁっ――ぁあっ、んっ！」
1084 = "「啾！　呼――呀――啊――啊啊、嗯！」" 

# monologue
# JP: （ずぶうううううううっ！）
1820 = "（吱噗！）" 

# 【真闇】
# display as 真闇
# JP: 「くひゅっ――んっっ！　あっ――おしりっ――ひ――\nあ――あなっ――形――変わっちゃ、う――んひゅっ」
1087 = "「嗚咿――嗯！　啊――屁眼――咿――啊――洞――形狀――都變掉了――嗯呀」" 

# monologue
# JP: 確かに、そんな感触がある。
1633 = "確實有這種感覺。" 

# monologue
# JP: お尻の穴のその奥は、ただただぴたり張り付いてきて、\n特段の凹凸を保たぬがゆえに――
1509 = "插到屁眼深處，兩邊的肉壁緊緊貼著肉棒，保持不住本身的凹凸不平――" 

# monologue
# JP: （ずろおおおおおっ！）
# 1884 = "（蹭！）" 

# 【真闇】
# display as 真闇
# JP: 「いひゃっ――ひっ――これっ――らめっ――\nおひりっ――でっ――あたま――とん、――でっ」
1038 = "「咿呀――咿――這個――不行――屁眼――大腦――都不對了」" 

# monologue
# JP: （むりゅううううううっ！）
1834 = "（哧溜！）" 

# 【真闇】
# display as 真闇
# JP: 「やらっ――バカにっ――バカに――なっちゃっ――\nおひり――ずぼずぼ――され、て――んひゅううっ」
1198 = "「要――變成――笨蛋――笨蛋――屁眼――被捅――啊捅――嗯呀」" 

# monologue
# JP: 僕の勃起の形をそのまま、\n真闇姉のお尻の奥へと押し付けていく。
1469 = "我繼續將肉棒往真闇姐的屁眼深處送。" 

# monologue
# JP: 子作りでなく、目的の無い、セックスのためのセックスが、\n真闇姉と僕との距離を、ゼロさえ超えて食い込ませてく。
1306 = "不為了造孩子、完全為了快感的性愛將我與真闇姐的距離拉到了零，甚至跨越了零的界限。" 

# monologue
# JP: （ずるぶっ！　ずぶっ！　ぶちゅんっ！　ずりゅっ！）
1874 = "（擦！　呲噗！　啾嗯！　呲溜！）" 

# 【真闇】
# display as 真闇
# JP: 「ひあっ――あっ――ア――あひゅっ！\n双ちゃんっ！　双ちゃあんっ」
1042 = "「咿啊――啊――啊――啊呀！小雙！　小雙」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇――姉っ！」
1181 = "「真闇――姐！」" 

# monologue
# JP: 射精直後の敏感すぎる勃起はすぐに、\n再びの頂に達してしまう。
1413 = "射精後極其敏感的肉棒再一次達到了高潮。" 

# monologue
# JP: だが、ためらわない。我慢はしない。\n僕らは、だって、お互いをお互いに望むがままに――
1323 = "但是我不會猶豫和忍耐了。我們都向著對方所期望的那樣――" 

# monologue
# JP: （ずぼっつ！　ぼちゅっ！　ずばっ！　ずばんっ！）
1829 = "（呲啵！　啵啾！　呲啪！　呲啪！）" 

# monologue
# JP: たっぷり丸い真闇姉の尻、成熟しきった女の尻が、\n腰を動かすその度に、ふるふる震えて匂いを発する。
1597 = "真闇姐圓潤的、成熟的屁股，每次抽插都會震得它散發出女香。" 

# monologue
# JP: 上等すぎる女を抱いてる。その尻穴を犯してる。\n達成感と幸福感とが僕の全てを白熱させる！
1458 = "我懷裡是個天仙般的女子，我還在幹她的屁眼。多麼圓滿，多麼幸福，我覺得渾身都是勁啊！" 

# 【真闇】
# display as 真闇
# JP: 「来て！　来てっ！　射精っ、しゃせえっ！\nどびゅって、おしり！　おしりの穴の、奥に、来てぇ！」
989 = "「來！　來！　快點對我射精！射在屁眼裡！　射在屁眼的最深處！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いく――から、だからっ！　真闇姉もっ！！」
1157 = "「我要射了――所以！　真闇姐！！」" 

# monologue
# JP: （びゅるっ！！！）
1858 = "（噗嚕！！！）" 

# 【真闇】
# display as 真闇
# JP: 「ひゃうっ！？　イクっ！　わらひ――おひりれっ！」
1021 = "「呀！？　高潮了！　我的――屁眼！」" 

# monologue
# JP: （ぎちちちちちちっ！）
1822 = "（吱溜！）" 

# monologue
# JP: 真闇姉の体が大きく震え、\n肛門が引きちぎるほどに僕を締め付けっ！
1607 = "真闇姐整個人大大顫抖了一下，肛門夾得很緊，彷彿要把我擰斷似的！" 

# monologue
# JP: （ぶびゅるるっ！！）
1852 = "（噗噗嚕！！）" 

# 【真闇】
# display as 真闇
# JP: 「おひりっ！　れっ――\nイっ――くうううううううぅぅぅぅぅぅんっ！！！」
1142 = "「屁眼！　要――要――高潮了嗯！！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……む？」
1099 = "「嗯……嗯？」" 

# monologue
# JP: あたたかなものが、急に失くなる。\n心細くて、目が覚める。
1538 = "溫熱的東西迅速消失了。我不安地睜開眼睛。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……僕は――」
1076 = "「啊啊……我――」" 

# 【真闇】
# display as 真闇
# JP: 「あ、ごめんね双ちゃん。起こしちゃったと？」
1082 = "「啊，抱歉小雙，吵醒你了？」" 

# monologue
# JP: 眠っていたのか――\nと思うより先、答えをもらう。
1466 = "我睡著了嗎――沒等我想明原因，她就回答了我。" 

# 【真闇】
# display as 真闇
# JP: 「シャワー、浴びんといけんけん。\n随分、早ぅに起こしちゃったねぇ」
973 = "「一定要洗澡啊。你今天起得可真早」" 

# monologue
# JP: 何故にシャワーを――\n思った瞬間、昨夜のことを思い出す！
1541 = "為什麼要洗澡啊――我突然想起昨晚的事了！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉、昨夜はっ」
1191 = "「真闇姐，昨晚」" 

# monologue
# JP: （ぴとっ）
1883 = "（豎）" 

# monologue
# JP: 人差し指を軽く唇に押し当てられて――\nただそれだけで、言葉の全てをせき止められる。
1404 = "她輕輕地在唇前豎了根食指――就封上了我所有沒說出口的話。" 

# monologue
# JP: やわらかに、あたたかに。真闇姉は微笑んで。\nそうして、ぺろり、と唇の端をゆっくり舐める。
1621 = "真闇姐笑得柔和又溫暖。然後她吐了吐舌頭，舔了舔唇角。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。今晩も、時間、もらえると？」
1133 = "「對吧？　小雙。今晚也可以給我點時間嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、何かあるのか？」
1114 = "「嗯，有事嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「うん――ええと、今晩も。ね？\nどうかな？　ふたりっきりで、試飲会」
1090 = "「嗯――今晚也來吧，好嗎？要不要我們兩個再來品酒啊？」" 

# monologue
# JP: 許されている。許し合ってる。\n伝えてもらえて、ただただ嬉しい。
1389 = "她寬容了我，我也很欣賞她。知道她的想法，我非常高興。" 

# monologue
# JP: だから、答えは。\nたった一つしかありえない。
1476 = "所以回答也只可能有一個了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん――喜んで」
1096 = "「嗯――我很樂意」" 
