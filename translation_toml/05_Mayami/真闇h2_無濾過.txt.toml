# monologue
# JP: もとより、酒には強くない。\nが、右田の酒ほど旨いものなら、いくらかは飲む。
1464 = "我的酒量原本就不太行。但如果有右田酒這樣的好酒，我還是會喝點的。" 

# monologue
# JP: では、あるのだが――
1363 = "只是――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む、あ……これは――喉が焼けるようだ。\n僕には、どうにも強すぎる」
