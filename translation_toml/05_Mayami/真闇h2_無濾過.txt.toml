# lines: 327 
# monologue
# JP: （ごくっ）
1833 = "（Ực）"
# monologue
# JP: もとより、酒には強くない。\nが、右田の酒ほど旨いものなら、いくらかは飲む。
1464 = "Vốn dĩ, tửu lượng của tôi không tốt.\nNhưng nếu là loại rượu ngon như của nhà Migita, thì tôi cũng uống được chút ít."
# monologue
# JP: では、あるのだが――
1363 = "Mặc dù là vậy――"
# 【双鉄H】
# display as 雙鐵
# JP: 「む、あ……これは――喉が焼けるようだ。\n僕には、どうにも強すぎる」
1055 = "「Ư, a……cái này――cứ như đốt cháy cổ họng vậy.\nĐối với tôi, nó quá nặng rồi.」"
# 【真闇】
# display as 真闇
# JP: 「そ？　ま、四十度超えとるけんねぇ」
1171 = "「Thế hả? Mà, cũng hơn bốn mươi độ rồi mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そこまでか」
1144 = "「Đến mức đó cơ à.」"
# 【真闇】
# display as 真闇
# JP: 「口に合わんかったと？」
977 = "「Không hợp khẩu vị sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――」
978 = "「Không phải――」"
# monologue
# JP: 慢心をせず、更に新しい挑戦を――\nそう打ち出した真闇姉が、新開発した無濾過焼酎。
1506 = "Không tự mãn, mà tiếp tục những thử thách mới――\nVới tinh thần đó, chị Mayami đã phát triển loại shochu không lọc mới này."
# monologue
# JP: 見た目から、もうとろみを帯びてるその酒は、\nむしろ、にごり焼酎とでも呼びたくなるような代物だ。
1382 = "Ngay từ vẻ ngoài, thứ rượu hơi sền sệt đó,\nthậm chí còn khiến người ta muốn gọi nó là shochu đục."
# 【双鉄H】
# display as 雙鐵
# JP: 「旨い、と思う。米の味が強く出て、\n見た目の印象と違い、雑味は感じずスッキリしている」
1162 = "「Tôi nghĩ là ngon. Vị gạo rất đậm đà,\nkhác với ấn tượng bên ngoài, uống vào thấy rất thanh khiết, không có tạp vị.」"
# 【真闇】
# display as 真闇
# JP: 「良かったぁ。ね？　ほんなら」
1119 = "「May quá. Nè? Nếu vậy thì.」"
# monologue
# JP: 口に合うならもっと飲め――\nいわんばかりに、真闇姉は一升瓶を持ち上げる。
1604 = "Hợp khẩu vị thì uống thêm đi――\nNhư muốn nói vậy, chị Mayami nhấc chai rượu một thăng lên."
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、無理だ。\nさっきも言ったが、僕にはこれは強すぎるのだ」
1154 = "「Không, chịu thôi.\nLúc nãy tôi đã nói rồi, cái này quá nặng đối với tôi.」"
# monologue
# JP: 酔いが早くも回ってきたのか、\n喉がヒリつくだけでなく、頭までもがクラクラしてくる。
1729 = "Có lẽ rượu đã ngấm nhanh,\nkhông chỉ cổ họng bỏng rát, mà đầu óc tôi cũng bắt đầu quay cuồng."
# 【双鉄H】
# display as 雙鐵
# JP: 「むしろ、これを真闇姉が飲んでくれれば、助かる」
1125 = "「Trái lại, nếu chị Mayami uống giùm tôi thì tốt quá.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
1051 = "「Trời ạ.」"
# monologue
# JP: 飲みさしのコップを差し出せば、\n真闇姉は一升瓶を置いて、妙に嬉しげに受け取ってくれる。
1474 = "Khi tôi đưa ly rượu uống dở ra,\nchị Mayami đặt chai rượu xuống, vui vẻ nhận lấy một cách lạ lùng."
# 【真闇】
# display as 真闇
# JP: 「んふふ、双ちゃんと間接キッス」
1031 = "「Ufufu, hôn gián tiếp với Sou-chan nè.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なにを子供じみ……た――」
988 = "「Trẻ con quá……đi――」"
# 【真闇】
# display as 真闇
# JP: 「ん……れるっ――ちゅっ――れろっ」
1103 = "「Ưm……rột――chụt――rột.」"
# monologue
# JP: 真闇姉も、あるいは酔っているのかもしれない。
1593 = "Có lẽ, chị Mayami cũng đang say."
# monologue
# JP: コップの、僕が口をつけた部分を、\nわざといやらしく舐め回し、視線をちらちらこちらに送る。
1394 = "Chị ấy cố tình liếm láp phần mép ly mà tôi vừa chạm môi vào một cách đầy khiêu khích,\nánh mắt thỉnh thoảng lại liếc về phía tôi."
# 【真闇】
# display as 真闇
# JP: 「ん……おいし……」
1100 = "「Ưm……ngon quá……」"
# monologue
# JP: 真っ赤な舌が、ゆっくりゆっくり唇の中にしまわれる。
1748 = "Chiếc lưỡi đỏ chót, từ từ, từ từ thu lại vào trong môi."
# monologue
# JP: 酒の焼けとは違う熱さが、\n僕の体の奥からじわじわ湧いてくる。
1462 = "Một hơi nóng khác hẳn cảm giác cồn cào của rượu,\ntừ từ dâng lên từ sâu thẳm trong cơ thể tôi."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんも……どう？　もう一杯」
1137 = "「Sou-chan……thì sao? Thêm một ly nữa nhé.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だから、それは僕には――っ！」
1158 = "「Đã bảo là, với tôi thì――!」"
# monologue
# JP: 真闇姉はぎゅっと胸を寄せ、\nその谷間へと、無濾過焼酎をとろとろ注ぐ。
1625 = "Chị Mayami ép chặt hai bầu ngực lại,\nvà rót từ từ thứ shochu không lọc đó vào khe ngực."
# monologue
# JP: 谷間に湧いてた汗粒が、\nにごったとろみに混じって溶ける。
1721 = "Những giọt mồ hôi đọng nơi khe ngực,\nhòa quyện và tan vào chất lỏng đục ngầu, sền sệt ấy."
# 【真闇】
# display as 真闇
# JP: 「……双ちゃん。\nおかわり、まっこといらんと？」
831 = "「……Sou-chan.\nThật sự không uống thêm nữa sao?」"
# monologue
# JP: うるんだ瞳に見つめられれば、\n喉が、ごくりと動いてしまう。
1676 = "Bị đôi mắt ươn ướt ấy nhìn chằm chằm,\ncổ họng tôi bất giác nuốt ực một cái."
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――いる。これは、飲みたい」
974 = "「Không――có. Cái này thì, tôi muốn uống.」"
# monologue
# JP: 誘われてるまま口を寄せ、\nそのまま吸いつき、吸い上げる。
1376 = "Cứ thế để mặc sự cám dỗ, tôi kề miệng vào,\nmút lấy, hút cạn."
# monologue
# JP: （ちゅっうっ――じゅっ――じゅるっ）
1844 = "（Chụt――rột――rột）"
# 【真闇】
# display as 真闇
# JP: 「んふふ、双ちゃん。かわゆかねぇ。\nちゅっちゅっちゅって、赤ちゃんみたい」
1029 = "「Ufufu, Sou-chan. Dễ thương quá đi.\nCứ chu chu chu thế này, hệt như em bé vậy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「赤ちゃんなら、飲むものが違う」
1129 = "「Nếu là em bé thì thứ uống sẽ khác chứ.」"
# monologue
# JP: （ぱくっ）
1867 = "（Ngoạm）"
# 【真闇】
# display as 真闇
# JP: 「あっ」
1071 = "「A.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？」
1115 = "「Hửm?」"
# monologue
# JP: 真闇姉のおっぱいの先へむしゃぶりついて――\nけれども、すぐに離れてしまう。
1366 = "Ngậm lấy đầu vú của chị Mayami――\nNhưng, tôi lập tức buông ra ngay."
# monologue
# JP: 感触が、違う。\n期待していた柔らかな舌触りを得られない。
1686 = "Cảm giác, khang khác.\nKhông cảm nhận được sự mềm mại trên đầu lưỡi như mong đợi."
# 【真闇】
# display as 真闇
# JP: 「あっ！？　ごめんねぇ。おねえちゃん、気ぃきかんと。\nそーよね、ふたりっきりでお酒ば飲むなら」
1079 = "「A!? Xin lỗi nha. Chị thật vô ý.\nĐúng rồi ha, nếu hai người uống rượu riêng với nhau thì.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1211 = "「!?」"
# monologue
# JP: （くらっ）
1885 = "（Lảo đảo）"
# monologue
# JP: 熱すぎて、体が勝手に崩れてしまう。\nそこまで酔いが回っているとは思わなかった。
1705 = "Quá nóng, cơ thể tôi tự nhiên gục xuống.\nKhông ngờ tôi lại say đến mức này."
# 【真闇】
# display as 真闇
# JP: 「あ……。もう、こぎゃんとおっきく……\n待っとってね？　おねえちゃん、すぐ脱ぎ脱ぎするけん」
1069 = "「A……. Đã to đến mức này rồi sao……\nĐợi chút nhé? Chị sẽ cởi ra ngay đây.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ……」
1064 = "「A……」"
# monologue
# JP: 真闇姉は上着を脱ぎ捨て、\nブラジャーを大きくめくってくれる。
1622 = "Chị Mayami cởi phăng áo khoác,\nvà lật hẳn áo lót lên."
# monologue
# JP: そうして僕の上着も脱がし、\n惜しげもなしに、裸のおっぱいをのっけてくれる。
1546 = "Rồi chị cũng cởi luôn áo của tôi,\nkhông ngần ngại đặt bộ ngực trần lên người tôi."
# 【真闇】
# display as 真闇
# JP: 「はぁい、双ちゃん。\nお待ちかねのおっぱいですよぉ」
990 = "「Đây, Sou-chan.\nBộ ngực em hằng mong đợi đây~」"
# monologue
# JP: （むにっ）
1847 = "（Áp vào）"
# monologue
# JP: 裸の胸に、裸の胸がのせられる。\n形の良い胸が潰れて、乳首が僕のすぐ前に来る。
1658 = "Ngực trần áp vào ngực trần.\nBầu ngực căng tròn bị ép bẹp, nhũ hoa nằm ngay trước mặt tôi."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんのおっぱい。\n双ちゃんの好きに味わってよかよ？」
1127 = "「Ngực của chị nè.\nSou-chan cứ nếm thử tùy thích nha?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
1104 = "「Ừm.」"
# monologue
# JP: むしゃぶりつきたい気持ちを抑え、\nまずは乳首を、舌先でついばみ、舐める。
1496 = "Kìm nén cảm giác muốn ngấu nghiến,\ntrước tiên tôi dùng đầu lưỡi cắn nhẹ, rồi liếm láp nhũ hoa."
# 【双鉄H】
# display as 雙鐵
# JP: 「ちゅっ――れるっ――ちゅるっ――ちゅううっっ」
1083 = "「Chụt――rột――rột――chu.」"
# 【真闇】
# display as 真闇
# JP: 「くふんっ――双ちゃん……ベロ、エッチっ――んっ」
1089 = "「Kuhun――Sou-chan……lưỡi, hư quá――ưm.」"
# monologue
# JP: 見る見るうちに、真闇姉の乳首が勃起してくる。
1609 = "Chẳng mấy chốc, nhũ hoa của chị Mayami đã cương cứng lên."
# monologue
# JP: 吸い付けと要求してくるピンクの突起を、\nだから素直に、口へと含む。
1642 = "Đỉnh chóp hồng hào đang đòi hỏi được mút mát,\nthế nên tôi ngoan ngoãn ngậm lấy nó vào miệng."
# 【双鉄H】
# display as 雙鐵
# JP: 「はぷっ――んっ――ちゅう――」
1078 = "「Hapu――ưm――chu――」"
# 【真闇】
# display as 真闇
# JP: 「ん……双ちゃん……\nおねえちゃんのおっぱい、おいしかと？」
1102 = "「Ưm……Sou-chan……\nNgực của chị, ngon không?」"
# monologue
# JP: 答えるかわりに、ひたすらに吸う。\nちゅくちゅく、ちゅうちゅう、一心に吸う。
1450 = "Thay cho câu trả lời, tôi chỉ mải miết mút mát.\nChụt chụt, chu chu, mút một cách say sưa."
# monologue
# JP: 唇を豊かに満たしてくれるおっぱいは、\n汗の塩気と、ほんのわずかな甘みを舌に伝えてくる。
1660 = "Bầu ngực lấp đầy trọn vẹn đôi môi,\ntruyền đến đầu lưỡi vị mặn của mồ hôi và một chút ngọt ngào thoang thoảng."
# 【真闇】
# display as 真闇
# JP: 「あは……双ちゃん。\nちゅうちゅうするたび、ビクン、ビクンて」
1075 = "「Aha……Sou-chan.\nMỗi lần em chu chu là nó lại giật nảy lên kìa.」"
# monologue
# JP: （さすっ）
1875 = "（Vuốt nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ！？」
1106 = "「Ưm mu!?」"
# monologue
# JP: ズボンの上から勃起を撫ぜられ、\nぞくぞくと甘い感覚が来る。
1605 = "Bị vuốt ve dương vật qua lớp quần,\nmột cảm giác râm ran ngọt ngào ập đến."
# monologue
# JP: 跳ね動いた腰に満足そうな笑みを浮かべて、\n真闇姉の真っ白な指が、ゆるゆるゆるゆる動き出す。
1555 = "Nở nụ cười mãn nguyện khi thấy hông tôi nảy lên,\nnhững ngón tay trắng ngần của chị Mayami bắt đầu di chuyển chầm chậm, chầm chậm."
# monologue
# JP: （ちぃ……ぃ――）
1826 = "（Kééét……）"
# monologue
# JP: 焦らす速度と、慎重で的確な指の動きと。
1712 = "Tốc độ trêu ngươi, cùng chuyển động ngón tay cẩn trọng và chuẩn xác."
# monologue
# JP: ズボンとパンツが下ろされて、\n僕の勃起は、真闇姉の手のひらの中に収められる。
1681 = "Quần dài và quần lót bị kéo xuống,\ndương vật của tôi nằm trọn trong lòng bàn tay chị Mayami."
# 【双鉄H】
# display as 雙鐵
# JP: （真闇姉も……酒の影響を受けているのか）
1879 = "（Chị Mayami……cũng bị ảnh hưởng bởi rượu sao.）"
# monologue
# JP: 手が、普段よりずうっと熱い。\n汗でしっとり、濡れている。
1492 = "Bàn tay nóng hơn bình thường rất nhiều.\nĐang ướt đẫm, dính nhớp mồ hôi."
# monologue
# JP: 速い鼓動がおっぱい越しに伝わってくる。\n酒の香に混じる女の匂いが、僕の鼓動も速くする。
1737 = "Nhịp đập dồn dập truyền qua bộ ngực.\nMùi hương phụ nữ hòa lẫn với hơi rượu khiến tim tôi cũng đập nhanh hơn."
# monologue
# JP: （もみゅっ）
1871 = "（Xoa nắn）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1107 = "「Ưm!」"
# monologue
# JP: しっとりした手が、柔らかに勃起を捕まえる。\nただそれだけで、精が一気にこみ上げてくる。
1539 = "Bàn tay ẩm ướt nhẹ nhàng nắm lấy dương vật đang cương cứng.\nChỉ vậy thôi cũng đủ khiến tinh dịch trực trào ra."
# monologue
# JP: その快感から逃れたくって、ゆるめたくって、\n唇を、舌を、もがくみたいにとにかく動かす。
1457 = "Muốn trốn thoát khỏi khoái cảm đó, muốn được nới lỏng,\ntôi liên tục cử động môi và lưỡi như thể đang giãy giụa."
# monologue
# JP: （ちゅるっ――ちゅっ――れるっ――ちゅむうっ）
1845 = "（Rột――chụt――rột――chumuu）"
# 【真闇】
# display as 真闇
# JP: 「んふふ、双ちゃん。気持ちよかとね？」
1027 = "「Ufufu, Sou-chan. Sướng lắm hả?」"
# monologue
# JP: （しゅこっ！）
1869 = "（Sục!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1208 = "「!」"
# monologue
# JP: 真闇姉の手が上下に動く。
1616 = "Bàn tay chị Mayami chuyển động lên xuống."
# monologue
# JP: ごくごく緩い圧力が、\n僕を優しく包んで煽る。
1484 = "Một áp lực vô cùng nhẹ nhàng,\ndịu dàng bao bọc và kích thích tôi."
# 【真闇】
# display as 真闇
# JP: 「おちんちん、こんな感じでしごけばよかと？\nしこしこしこって、動かせばよか？」
1203 = "「Chim, sục thế này là được nhỉ?\nCứ sục sục sục, cử động thế này là được ha?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん、むっ」
1108 = "「Ưm, mu.」"
# 【真闇】
# display as 真闇
# JP: 「そ。これでええんね？　ほんなら、もっと――\nしこ、しこ、しゅこ、しゅこ」
1202 = "「Thế à. Vậy là được nhỉ? Vậy thì, thêm nữa――\nsục, sục, sục, sục.」"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……）
1836 = "（A a……）"
# monologue
# JP: 勃起と、唇。その両方から来る快感が、\n圧倒的な幸福感へと増幅されてく。
1735 = "Khoái cảm truyền đến từ cả dương vật lẫn đôi môi,\nđang khuếch đại thành một cảm giác hạnh phúc ngập tràn."
# monologue
# JP: 真闇姉と僕とだけで世界が完結しているような――\n[ウ　ロ　ボ　ロ　ス,5]無限円環の蛇になってしまったような気さえしてくる。
1434 = "Cảm giác như thế giới này chỉ còn lại tôi và chị Mayami――\nthậm chí còn khiến tôi có cảm giác như biến thành con rắn Ouroboros vòng lặp vô hạn vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「はむっ――ちゅっ――ちゅむっ――ちゅるるっ」
1077 = "「Hamu――chụt――chumu――chururu.」"
# 【真闇】
# display as 真闇
# JP: 「あ……んっ――双、ちゃん。そぎゃん……一生懸命、\n吸っても……んっ――おっぱいミルクば、まだ出んけん」
1067 = "「A……ưm――Sou, chan. Em có……hút,\nmạnh thế nào……ưm――thì sữa, cũng chưa ra được đâu.」"
# monologue
# JP: 真闇姉の手が、強まりながら加速する。
1619 = "Lực tay của chị Mayami mạnh dần và tăng tốc."
# monologue
# JP: 動かすことに慣れてきたのか、\nリズムと変化が出始める。
1365 = "Có vẻ đã quen với việc cử động,\nnhịp điệu và sự biến hóa bắt đầu xuất hiện."
# 【真闇】
# display as 真闇
# JP: 「やけん、しこしこお手手で出したらいけんよ？\nしこしこば、準備運動やけんねぇ」
980 = "「Nên là, không được ra bằng tay đâu nha?\nSục tay, chỉ là khởi động thôi á.」"
# monologue
# JP: 言ってることとやってることが裏腹だ。
1402 = "Miệng nói một đằng tay làm một nẻo."
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――まふらっ――ねぇ」
1097 = "「Ưm――khoan――đã.」"
# monologue
# JP: 僕の勃起を扱き上げる手を時おり止めて、\n亀頭のくびれをくりくりと指先でゆるく弄ぶ。
1498 = "Thỉnh thoảng chị dừng tay đang sục dương vật tôi lại,\nrồi dùng đầu ngón tay mân mê nhẹ nhàng rãnh quy đầu."
# monologue
# JP: そうかと思えば太ももでタマをぎゅっと押し上げ、\n不器用に、けど丹念に、時間をかけて愛撫してくれる。
1391 = "Cứ ngỡ thế thì chị lại dùng đùi ép chặt hai hòn bi lên,\nâu yếm tôi một cách vụng về, nhưng lại rất cẩn thận và tốn nhiều thời gian."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――あっ――そんなに、されたら、\n僕、はっ――もうっ」
1117 = "「Phua――a――Bị làm thế này,\ntôi, thì――sắp.」"
# 【真闇】
# display as 真闇
# JP: 「気持ちよかと？\nおちんちんミルク、ぴゅっぴゅしちゃうと？」
1194 = "「Sướng không?\nSắp bắn sữa chim ra rồi hả?」"
# monologue
# JP: 恥ずかしい。\nけれども事実だ。頷くしかない。
1628 = "Thật xấu hổ.\nNhưng đó là sự thật. Tôi chỉ biết gật đầu."
# monologue
# JP: 勃起はびくびく、浅ましいまでにひくついて、\n先走りでもう、ぬらつきまくってしまってるから。
1650 = "Bởi vì dương vật đang run rẩy, giật liên hồi đến mức hèn mọn,\nvà đã ướt sũng vì chất nhờn rỉ ra mất rồi."
# 【真闇】
# display as 真闇
# JP: 「ほんなら。ね？　双ちゃん」
1206 = "「Vậy thì. Nha? Sou-chan.」"
# monologue
# JP: （ぴたっ）
1817 = "（Dừng lại）"
# monologue
# JP: 手が、止まる。僕の勃起から離れてしまう。\n真闇姉は、ゆっくり体を起こしてく。
1396 = "Bàn tay, dừng lại. Rời khỏi dương vật của tôi.\nChị Mayami, từ từ ngồi dậy."
# monologue
# JP: 数秒前まで僕の勃起を弄ってた手が、\nもぞもぞと、スカートの下に差し入れられて――
1430 = "Bàn tay vài giây trước còn đang nghịch ngợm dương vật của tôi,\nlúi húi, luồn xuống dưới lớp váy――"
# monologue
# JP: （するっ）
1868 = "（Tuột）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 
# monologue
# JP: パンツを脱ぎ捨て、\n真闇姉はお尻を高く持ち上げる。
1662 = "Cởi phăng chiếc quần lót,\nchị Mayami nhấc bổng mông lên cao."
# monologue
# JP: 股間――おまんこを少しも隠さず、\n僕に思い切り見せつけてくれる。
1720 = "Háng――âm hộ không hề bị che giấu chút nào,\nphơi bày toàn bộ ra trước mắt tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「すごいな……太ももまでもがびちょびちょだ」
1048 = "「Tuyệt quá……đến cả đùi cũng ướt nhẹp rồi kìa.」"
# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんのおちんちんミルク、\n欲しぅて欲しぅて、よだれば、垂らしちゃっとるねぇ」
1169 = "「Đúng vậy. Vì muốn, muốn sữa chim của Sou-chan quá,\nnên nó mới chảy nước miếng ra đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕を求めてくれて、か」
1146 = "「Là vì khao khát tôi, sao.」"
# monologue
# JP: そう言われれば、じっくりたっぷり見たくなる。
1719 = "Nghe vậy, tôi lại càng muốn nhìn ngắm thật kỹ."
# monologue
# JP: おまんこの合わさった肉に指をかけ、\nそうっと――けれども大きくはっきり押し開く。
1353 = "Đặt ngón tay lên phần thịt đang khép chặt của âm hộ,\nnhẹ nhàng――nhưng vẫn dứt khoát mở toang nó ra."
# monologue
# JP: （くぱああっ）
1832 = "（Tách ra）"
# 【真闇】
# display as 真闇
# JP: 「あ――」
1057 = "「A――」"
# monologue
# JP: 中にたまってた蜜がこぷりと溢れ出る。
1677 = "Mật ngọt tích tụ bên trong trào ra ồ ạt."
# monologue
# JP: 真闇姉の膣口は、僕の勃起を欲しがって、\n濃い目のピンクにぬらつく肉をヒクつかせてる。
1612 = "Cửa mình của chị Mayami, đang khao khát dương vật của tôi,\nphần thịt màu hồng sẫm trơn ướt đang co giật liên hồi."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん」
1132 = "「Nè? Sou-chan.」"
# monologue
# JP: おまんこの肉だけではない。
1305 = "Không chỉ riêng phần thịt ở âm hộ."
# monologue
# JP: 真闇姉はもう全身をピンクに染めて、\n我慢できないといわんばかりに、ひくついている。
1598 = "Toàn thân chị Mayami đã nhuộm một màu hồng nhạt,\nvà đang run rẩy như thể không thể kìm nén thêm được nữa."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの新鮮なおちんちんミルク。\nおねえちゃんのおまんこでピュッピュってしてくれたら」
1139 = "「Sữa chim tươi rói của Sou-chan.\nNếu em chịu phụt phụt vào bướm của chị.」"
# monologue
# JP: （もにゅんっ）
# 1871 = "（揉）" 
# monologue
# JP: 真闇姉の手が、自分の胸をゆっくりと揉む。
1617 = "Bàn tay chị Mayami, từ từ xoa bóp ngực mình."
# monologue
# JP: 開いた指から肉を乳首をはみ出させ、\nその柔らかさと質量を、これ見よがしに強調してくる。
1485 = "Để lộ ra phần thịt và nhũ hoa qua kẽ tay,\ncố tình phô diễn sự mềm mại và đầy đặn ấy."
# 【真闇】
# display as 真闇
# JP: 「そしたら、おねえちゃんのおっぱいミルク、\n双ちゃんに、飲ませてあげれるようになるけん」
1207 = "「Thì sau đó, sữa mẹ của chị,\nsẽ có thể cho Sou-chan uống đó.」"
# monologue
# JP: 射精して、妊娠させて。\nそして母乳を作ってもらう。
1417 = "Xuất tinh, làm cho mang thai.\nVà rồi tạo ra sữa mẹ."
# monologue
# JP: 僕には一生縁がないものと思いこんでたプロセスが、\nごく単純に直接的に、目の前にごろんと転がっている。
1452 = "Quá trình mà tôi từng nghĩ cả đời này mình sẽ chẳng bao giờ có cơ hội trải qua,\nđang hiện diện ngay trước mắt một cách vô cùng đơn giản và trực tiếp."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕のミルクが、真闇姉のおまんこで醸造されるのだな」
1156 = "「Sữa của tôi, sẽ được ủ trong bướm của chị Mayami nhỉ.」"
# monologue
# JP: ならば、現実のものにしてしまいたい。\n勃起は、ヘソまで反り返ってる。
1454 = "Nếu vậy, tôi muốn biến nó thành hiện thực.\nDương vật đã cong vút lên tận rốn."
# monologue
# JP: それを無理やり手で押し下げて、\nひくついている膣口に、慌てないようあてて押し込む。
1460 = "Tôi dùng tay ép mạnh nó xuống,\nchầm chậm nhắm vào cửa mình đang co giật rồi đẩy vào."
# monologue
# JP: （ぐっ――）
1850 = "（Phập――）"
# 【真闇】
# display as 真闇
# JP: 「んふっ――ん……」
1105 = "「Ưm phư――ưm……」"
# monologue
# JP: ぐちょぐちょに濡れまくってるおまんこは、\nけれどもしっかりした感触で、僕の亀頭に絡まってくる。
1540 = "Âm hộ ướt sũng nhóp nhép,\nnhưng vẫn mang lại cảm giác ôm khít, quấn lấy quy đầu của tôi."
# monologue
# JP: 肉を、割る――\nその感覚にゾクゾクしながら、ゆっくり腰を進めてく。
1740 = "Xé toạc, da thịt――\nTôi rùng mình vì cảm giác đó, chầm chậm đẩy hông tới."
# monologue
# JP: （ぐっ――ぐぐぐっ――）
1849 = "（Phập――phập phập phập――）"
# 【真闇】
# display as 真闇
# JP: 「あ……来た――双、ちゃ――んっ――\nひあっ――――ひっ――んっ――太っ――」
1065 = "「A……vào rồi――Sou, cha――n――\nhia――――hi――ưm――to quá――」"
# monologue
# JP: 亀頭のくびれを押し込んだ――\nそこで、けれども止まってしまう。
1419 = "Vừa đẩy rãnh quy đầu vào trong――\nNhưng rồi, tôi lại phải khựng lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――、真闇、姉っ」
1086 = "「Ư――, chị, Mayami.」"
# monologue
# JP: 入った途端に、亀頭がぎゅっうと絞られる。\n痛みを感じるほど、強く。
1511 = "Vừa mới vào, quy đầu đã bị siết chặt.\nMạnh đến mức cảm thấy đau đớn."
# 【双鉄H】
# display as 雙鐵
# JP: 「ひどく、キツい――\nもっと――力を――抜いて、くれっ」
1123 = "「Chật, quá――\nThả lỏng――thêm chút nữa――đi.」"
# 【真闇】
# display as 真闇
# JP: 「ふっ……あっ――はっ――んっ――\n抜いとる……つもり……なの――にっ――ん、ひっ」
1032 = "「Phư……a――ha――ưm――\nChị đang……cố thả lỏng……đây――này――ưm, hi.」"
# monologue
# JP: （キチチチチチチっ！）
1882 = "（Siết siết siết siết siết!）"
# monologue
# JP: アルコールの影響なのか、それとも欲が強すぎるのか。
1308 = "Không biết do ảnh hưởng của cồn, hay là dục vọng quá mãnh liệt."
# monologue
# JP: 真闇姉のおまんこは、あまりにせっかちに締め付けて来て、\n一刻も早く僕の精子を絞り出そうと頑張りすぎてる。
1613 = "Âm hộ của chị Mayami thít chặt lại một cách quá vội vã,\nnhư thể đang cố hết sức để vắt kiệt tinh trùng của tôi càng sớm càng tốt."
# 【双鉄H】
# display as 雙鐵
# JP: （これは……奥まで入れんぞ……\nなんとか……もっとゆるめんことには）
1864 = "（Thế này thì……không vào sâu được đâu……\nPhải tìm cách……làm nó lỏng ra thêm chút nữa mới được.）"
# monologue
# JP: 手段を探せば、すぐに見つかる。\n――酒には、酒だ。
1443 = "Nếu tìm cách, thì sẽ thấy ngay thôi.\n――Lấy độc trị độc, lấy rượu trị rượu."
# monologue
# JP: アルコールでコントロールできない体なら、\nもっとアルコールを足すことで、弛緩させてはどうだろう。
1516 = "Nếu cơ thể không thể kiểm soát được do cồn,\nthì sao không thêm chút cồn nữa để làm nó giãn ra nhỉ."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……少しだけ待ってくれ」
1189 = "「Chị Mayami……đợi một chút nhé.」"
# monologue
# JP: （ずるっ）
# 1875 = "（擦）" 
# 【真闇】
# display as 真闇
# JP: 「あっ」
# 1071 = "「啊」" 
# monologue
# JP: 名残惜しげな声に心は痛むけれども、ひとまずは抜く。\n挿れてた形に、膣口はぽっかり淋しげに開く。
1337 = "Dù giọng nói đầy tiếc nuối của chị khiến tôi xót xa, nhưng tôi vẫn tạm thời rút ra.\nCửa mình mở toang một cách trống trải theo hình dáng vừa bị cắm vào."
# 【双鉄H】
# display as 雙鐵
# JP: 「すぐに、もっと奥まで行くから」
1160 = "「Tôi sẽ vào sâu hơn nữa ngay đây.」"
# monologue
# JP: コップに焼酎をなみなみ満たし、\nそこに人差し指を突っ込む。
1380 = "Tôi rót đầy ly shochu,\nrồi nhúng ngón trỏ vào đó."
# 【真闇】
# display as 真闇
# JP: 「え？　双ちゃん、なんばしよっと？」
1053 = "「Hả? Sou-chan, em định làm gì thế?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――こういうのはどうかと思ってな」
1152 = "「Không――tôi đang nghĩ xem thế này thì sao.」"
# monologue
# JP: （ぬりゅっ）
1862 = "（Bôi）"
# 【真闇】
# display as 真闇
# JP: 「んひっ！？　あ、熱っ――やっ――ちょっ――\nキツかっ――刺激、強すぎっ――」
1046 = "「Nhi!? A, nóng――khoan――chờ chút――\nGắt quá――kích thích, mạnh quá――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、すまん。染みてしまうか？」
1112 = "「A, xin lỗi. Bị xót à?」"
# monologue
# JP: 様子見のため、膣肉を撫ぜただけでこの始末なら、\nとても中には注げない。
1494 = "Chỉ mới xoa nhẹ lên thịt âm đạo để thăm dò mà đã thế này,\nthì chắc chắn không thể rót thẳng vào trong được."
# monologue
# JP: ならば……\nああ、うむ――こちらはどうだ？
1724 = "Nếu vậy……\nÀ, ừm――chỗ này thì sao?"
# monologue
# JP: （くりゅんっ）
1863 = "（Ấn）"
# 【真闇】
# display as 真闇
# JP: 「いひゅっ！？　――んっ――そ、双ちゃん――そ、そこ、\nおしり――お尻の穴っ――あ――ふあっ！？」
1040 = "「Ihyu!? ――Ưm――S-Sou-chan――chỗ, chỗ đó,\nmông――lỗ đít mà――a――phua!?」"
# monologue
# JP: （くにっ、くにっ――もみゅっ――くりゅっ――）
1870 = "（Nắn, nắn――xoa――ấn――）"
# 【真闇】
# display as 真闇
# JP: 「やんっ――んんっ――やあっ――おしり、ばっ――\nあつく――って――んっ――ヘン――これっ――あふっ」
1010 = "「Yan――ưm ưm――yaa――mông, thì――\nnóng――lắm――ưm――kỳ lạ――quá――aphu.」"
# monologue
# JP: 嫌がってない。痛がってない。\nならば、おしりは行けそうだ。
1386 = "Chị ấy không ghét. Cũng không thấy đau.\nVậy thì, mông có vẻ khả thi đấy."
# monologue
# JP: もう一度、焼酎を指にたっぷり絡ませ――
1343 = "Lại một lần nữa, tôi nhúng ngón tay ngập trong shochu――"
# monologue
# JP: （つ――ぷっ）
1835 = "（Phập）"
# 【真闇】
# display as 真闇
# JP: 「ふあっ――んひゅゅっ！！？　――やああっ、\n双ちゃんっ――そこ、違っ――んっ――んきゅんっ！」
1088 = "「Phua――nhyuu!!? ――Yaaa,\nSou-chan――chỗ đó, không phải――ưm――nkyun!」"
# 【双鉄H】
# display as 雙鐵
# JP: （これは――膣内とは全然違うな）
1891 = "（Cái này――hoàn toàn khác với bên trong âm đạo nhỉ.）"
# monologue
# JP: 穴の入り口、肛門だけがみちりと強烈に締め付けて来て、\nその奥側は、狭いがつるりとしている感じだ。
1672 = "Chỉ có lối vào, tức hậu môn là siết chặt một cách mãnh liệt,\ncòn sâu bên trong thì tuy hẹp nhưng lại có cảm giác trơn tuột."
# 【真闇】
# display as 真闇
# JP: 「やっ――あっ――ほじほじ――されて――\nおしり――なの、に――んっ――ふうっ」
1005 = "「Ya――a――bị――ngoáy ngoáy――\nmông――vậy, mà――ưm――phuu.」"
# monologue
# JP: 真闇姉の背が大きく震える。\n肩を使って呼吸している。
1615 = "Lưng chị Mayami run lên bần bật.\nChị đang thở dốc, hai vai phập phồng."
# monologue
# JP: そしてたっぷり、感じてくれる。\nおまんこからは、新たな蜜がどんどん溢れる。
1471 = "Và chị đang cảm nhận nó một cách tràn trề.\nTừ âm hộ, dòng mật mới không ngừng tuôn trào."
# monologue
# JP: （きゅっ――くぽっっ――きゅぷっ――きゅうっ）
1842 = "（Thắt lại――phập――kypu――kyuu）"
# monologue
# JP: 腸液なのか、ぬめりけが指を助けてくれる。\nこの調子なら、もう一本指を増やしても――
1520 = "Có lẽ là dịch ruột, sự trơn trượt đang hỗ trợ cho ngón tay tôi.\nVới đà này, dù có thêm một ngón tay nữa cũng――"
# 【真闇】
# display as 真闇
# JP: 「双ちゃぁん」
1138 = "「Sou-chaaan.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 
# monologue
# JP: 甘えた声。発情しきった、雌の声。\n濃密すぎる女の匂いが、声と同時にぷうんと香る。
1438 = "Giọng nói nũng nịu. Giọng của một con cái đang phát tình tột độ.\nMùi hương phụ nữ quá đỗi nồng nàn, cùng lúc với giọng nói ấy phảng phất bay lên."
# 【真闇】
# display as 真闇
# JP: 「あの、ね？　おねえちゃん――もう、\nおまんこ、きゅんきゅん、うずうずしちゃって」
986 = "「À, nè? Người chị này――đã,\ncái bướm, nó đang ngứa ngáy, rạo rực lắm rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ。勃起が、ものすごいことになっている」
1150 = "「Tôi cũng vậy. Sự cương cứng, đã đến mức khủng khiếp rồi.」"
# monologue
# JP: お尻の穴の目新しさに、\n為すべきことを危うく見失いかけてしまった。
1423 = "Vì sự mới mẻ của lỗ đít,\nmà suýt chút nữa tôi đã đánh mất mục tiêu cần làm."
# monologue
# JP: （くぽんっ！）
1839 = "（Phập!）"
# monologue
# JP: だから、そこから指を引き抜く。\n狙いを、もっと下へと定める。
1478 = "Vì thế, tôi rút ngón tay ra khỏi đó.\nNhắm mục tiêu, xuống thấp hơn nữa."
# monologue
# JP: 先走りでもうどろどろな、期待に震える勃起をぐい、と、\nもう一度、わななく膣口に押し当ててみる。
1499 = "Dương vật đã nhầy nhụa vì dịch nhờn, đang run rẩy vì mong đợi, tôi đẩy mạnh,\nmột lần nữa, áp vào cửa mình đang run rẩy."
# monologue
# JP: （ぱくっ！）
1861 = "（Phập!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 
# monologue
# JP: さっきと違い、和らいでいる。吸い付いてくる。
1701 = "Khác với lúc nãy, nó đã mềm mại hơn. Đang mút chặt lấy."
# monologue
# JP: 歯のない小さなおくちみたいに、\n僕にぴったり張り付きちゅうちゅう、引き込んでくる。
1433 = "Giống như một cái miệng nhỏ xíu không có răng,\nbám chặt lấy tôi mút mát, rồi kéo tuột vào trong."
# 【双鉄H】
# display as 雙鐵
# JP: （これなら――うん）
1892 = "（Thế này thì――ừm.）"
# monologue
# JP: 腰をわずかに押しこめば、\nおしとやかなヒダがめくれあがって蠢き始める。
1436 = "Chỉ cần hơi đẩy hông vào một chút,\nnhững nếp gấp tao nhã lật lên và bắt đầu cọ xát."
# monologue
# JP: （ずるっ――るっ――ずっ）
1873 = "（Trượt――tuột――phập）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――くっ」
1092 = "「Ưm――ư.」"
# 【真闇】
# display as 真闇
# JP: 「あ――来た――双ちゃんの、おちんちん――\nんっ――いっぱい――ふあっっ――嬉し――いひっ！？」
1058 = "「A――vào rồi――chim của, Sou-chan――\nưm――đầy quá――phua――vui quá――ihi!?」"
# monologue
# JP: （ずぶっ――ずるっ――ぬぶぶぶぶっ）
1830 = "（Phập――trượt――phụt phụt phụt phụt）"
# monologue
# JP: 亀頭を全部飲み込んで。
1750 = "Nuốt trọn toàn bộ quy đầu."
# monologue
# JP: それでもたりず、おまんこ肉は、もっともっとと、\n奥まで来てと、貪欲な蠕動を繰り返す。
1421 = "Nhưng vẫn chưa đủ, lớp thịt âm hộ liên tục co bóp tham lam,\nđòi hỏi tiến sâu, sâu hơn nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇――姉っ」」
1180 = "「Chị――Mayami.」"
# monologue
# JP: （ずっ――ずうっ――こちゅんっ）
1819 = "（Phập――phập――chụt）"
# 【真闇】
# display as 真闇
# JP: 「あっっ――奥っ――双ちゃん――双ちゃんっ」
1060 = "「A――bên trong――Sou-chan――Sou-chan.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1104 = "「嗯」" 
# monologue
# JP: 甘えるように、動いてとおねだりするように、\n真闇姉は腰をゆっくりゆっくり回す。
1393 = "Như đang làm nũng, như đang cầu xin tôi cử động,\nchị Mayami từ từ, chầm chậm xoay hông."
# monologue
# JP: その尻肉をしっかり捕まえ――
1468 = "Tôi tóm chặt lấy phần thịt mông đó――"
# monologue
# JP: （ずっ！！！）
1824 = "（Phập!!!）"
# 【真闇】
# display as 真闇
# JP: 「ひゃうっ！！？」
1013 = "「Hyau!!?」"
# monologue
# JP: （ずぱんっ！！！）
1828 = "（Bạch!!!）"
# 【真闇】
# display as 真闇
# JP: 「～～～～～～～～っ！！！」
1213 = "「~~~~~~~~!!!」"
# monologue
# JP: 素早く、深く、思いっきりに\n腰を突き出し打ち付ける！
1707 = "Nhanh chóng, đâm thật sâu, hết sức bình sinh\ntôi thúc hông và dập mạnh!"
# monologue
# JP: （ずばっ！　すぱんっ！　ぐちゅっ！　じゅぶっ！）
1827 = "（Phập! Bạch! Chụt! Chụt!）"
# 【真闇】
# display as 真闇
# JP: 「ひあっ――あっ！　双、ちゃ――激し――んっ！」
1044 = "「Hia――a! Sou, cha――mãnh liệt――ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
1056 = "「Ư!」"
# monologue
# JP: 強く動けば動いた分だけ、\n真闇姉の膣内は逃すまいとしてひっかかってくる。
1699 = "Càng cử động mạnh bao nhiêu,\nbên trong âm đạo của chị Mayami lại càng bám chặt lấy như không muốn để tôi thoát ra bấy nhiêu."
# monologue
# JP: そのぞわぞわに亀頭を掴まれる感覚が、\n気持ち良すぎて――腰はどんどん加速する！
1751 = "Cảm giác quy đầu bị tóm chặt một cách râm ran ấy,\nquá sướng――khiến hông tôi ngày càng tăng tốc!"
# monologue
# JP: （パンッ！　スパッ！　パチュッ！　パンッ！）
1838 = "（Bạch! Bạch! Phập! Bạch!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――真闇――姉っ――」
1085 = "「Ư――chị――Mayami――」"
# 【真闇】
# display as 真闇
# JP: 「んっ――あっ――ン、双ちゃん――おまん、こっ――\nおねえちゃん――ひあっ――めくれ、ちゃう――からっ」
1094 = "「Ưm――a――ưm, Sou-chan――bướm, á――\nchị――hia――bị lộn ngược, ra mất――rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 
# monologue
# JP: 真闇姉の切羽詰まってしまった声に、\n無理やり体にブレーキをかけ、一番深いところで止まる。
1595 = "Nghe giọng nói như bị dồn đến đường cùng của chị Mayami,\ntôi cố gắng phanh cơ thể lại, dừng ở nơi sâu nhất."
# monologue
# JP: （きゅんっ――きゅううううっ）
1846 = "（Thắt lại――siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ！？」
827 = "「――!?」"
# monologue
# JP: 止まってみれば、\nここぞとばかりに真闇姉の膣が攻めてくる。
1321 = "Vừa dừng lại một cái,\nâm đạo chị Mayami liền thừa cơ tấn công."
# monologue
# JP: ただ単純にキツくすぼまり、\n無理矢理にでも最奥で精を吐き出させようと蠢いてくる。
1330 = "Nó không chỉ đơn thuần là co thắt chặt lại,\nmà còn nhúc nhích như muốn ép tôi phải phun tinh dịch vào tận sâu bên trong."
# 【双鉄H】
# display as 雙鐵
# JP: （だが、学習した。\nおまんこがキツく、苦しいときには――）
1816 = "（Nhưng mà, tôi đã học được rồi.\nKhi cái bướm quá khít, khiến tôi khó chịu thì――）"
# monologue
# JP: 接合部から滴る蜜を\n素早くたっぷり指に絡めて――
1645 = "Mật ngọt rỉ ra từ nơi giao hợp\nđược tôi nhanh chóng quệt đầy lên ngón tay――"
# monologue
# JP: （つぷんっ！）
1831 = "（Phập!）"
# 【真闇】
# display as 真闇
# JP: 「やっ！？　んひゅっ――んうっ――\nまたっ――おひりっ――らめえっ！」
1018 = "「Á!? Nhyu――ưm――\nlại nữa――mông――không được!」"
# monologue
# JP: （ふわっ――きゅうううううっ！）
1848 = "（Nhẹ bẫng――siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1210 = "「!!?」"
# monologue
# JP: 最初のときと、膣の反応がまるきり違う。
1300 = "Phản ứng của âm đạo hoàn toàn khác với lần đầu."
# monologue
# JP: ほんの一瞬緩んだまでは同じだが。\nそこから一気に、わななきながら抱きついてきてっ！
1738 = "Tuy cũng nới lỏng ra trong chốc lát.\nNhưng ngay sau đó, nó vừa run rẩy vừa ôm chặt lấy tôi!"
# 【双鉄H】
# display as 雙鐵
# JP: 「くはっ」
1034 = "「Kuha.」"
# monologue
# JP: これは保たない。このままだったら射精する。\n思えば指は、なんとかしようと抗い動きっ！
1440 = "Không kìm được mất. Cứ thế này thì tôi xuất tinh mất.\nNghĩ vậy, ngón tay tôi bắt đầu cử động để chống cự!"
# monologue
# JP: （ぐいっ――ずるうううっ！）
1893 = "（Ngoáy――tuột!）"
# 【真闇】
# display as 真闇
# JP: 「ひゃっっ！？　あっ――おひりっ――おしり、でっ――\nイっ――しゅごっ――んっ――ふひぃぃぃいっっっ！！」
1017 = "「Hya!? A――mông――bằng mông――\nRa――sướng quá――ưm――fuhiii!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1209 = "「!!!」"
# monologue
# JP: （びゅくっ！　どびゅっ！　どぶっ！　びゅるんっ！）
1857 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【真闇】
# display as 真闇
# JP: 「あっ――おまんこ――精液――ミルク――びゅうって、\nあたって――双ちゃん、のっ――んふっ！」
1061 = "「A――bướm――tinh dịch――sữa――phụt ra,\nđập vào――của Sou-chan――ưm phư!」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅぶっ！　びゅううっ）
1860 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 勝手に動いてしまった指が、真闇姉のお尻に隠されていた、\nなにかの引き金を引いてしまった。
1354 = "Ngón tay vô tình cử động, đã bóp cò một thứ gì đó,\nđang được giấu bên trong mông của chị Mayami."
# monologue
# JP: そうとしか思えない膣の甘いうねりは、\n思いっきりの射精へと僕を落としこむ。
1375 = "Những đợt co thắt ngọt ngào của âm đạo khiến tôi chỉ có thể nghĩ như vậy,\nđã đẩy tôi vào một đợt xuất tinh mãnh liệt."
# monologue
# JP: （びゅるっ――びゅっ――ぴゅっ――ぴゅるっ――――）
1856 = "（Phụt――phụt――phụt――phụt――――）"
# 【真闇】
# display as 真闇
# JP: 「はぁっ、はぁっ……あっ……はぁっ――はあっ」
1050 = "「Haa, haa……a……haa――haa.」"
# monologue
# JP: 汗だくの背中の、まあるいおしりの、\n震えがだんだん小さくなってく。
1534 = "Tấm lưng đẫm mồ hôi, cặp mông tròn trịa,\nnhững cơn run rẩy dần dần nhỏ lại."
# monologue
# JP: 真闇姉の呼吸が落ち着くのを待って、\n素朴な疑問をそのままぶつける。
1638 = "Đợi nhịp thở của chị Mayami bình ổn lại,\ntôi liền hỏi một câu thắc mắc mộc mạc."
# 【双鉄H】
# display as 雙鐵
# JP: 「今のは一体……おしりに指を挿れた反応が、\n想像と、まるで違ったのだが」
999 = "「Vừa nãy rốt cuộc là……phản ứng khi bị đút ngón tay vào mông,\nhoàn toàn khác xa so với những gì tôi tưởng tượng.」"
# 【真闇】
# display as 真闇
# JP: 「やあんっ――そぎゃんとエッチなこと聞かんでぇ」
1011 = "「Yaan――đừng có hỏi mấy chuyện dâm đãng như vậy chứ.」"
# monologue
# JP: 顔を埋めるようにして。\nそれでも律儀に真闇姉は、僕の質問に答えてくれる。
1400 = "Chị úp mặt xuống.\nNhưng chị Mayami vẫn thành thật trả lời câu hỏi của tôi."
# 【真闇】
# display as 真闇
# JP: 「お尻に指、とか――最初は、\nびっくりしちゃっただけやったとよ？」
1140 = "「Ngón tay đút vào mông, á――Lúc đầu,\nchỉ là do chị giật mình thôi à nha?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1104 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「けど、ホジホジされて。それで……おしり、も……\n気持ちよかとこって――知っちゃった、けん」
983 = "「Nhưng mà, bị ngoáy ngoáy. Thế là……mông, cũng……\nlà chỗ sướng――chị biết mất, rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか――それでか」
1170 = "「Vậy sao――Ra là vậy.」"
# monologue
# JP: 気持ち良い穴に指を挿れられ、\n真闇姉の快感が一気に膨らんで――
1488 = "Bị đút ngón tay vào cái lỗ sung sướng ấy,\nkhoái cảm của chị Mayami bùng nổ trong chốc lát――"
# monologue
# JP: そしてはじけた絶頂に、\n僕の勃起も、為す術もなく巻き込まれたのだ。
1379 = "Và trong cơn cực khoái bùng nổ đó,\ndương vật của tôi cũng bị cuốn vào mà không thể làm gì khác."
# 【真闇】
# display as 真闇
# JP: 「知っちゃったけん……ね？」
997 = "「Chị biết mất rồi……nè?」"
# monologue
# JP: （むにいいいっ）
1837 = "（Tách）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1208 = "「！」" 
# monologue
# JP: 真闇姉が尻肉を割り開く。
1602 = "Chị Mayami tách hai cánh mông ra."
# monologue
# JP: おしりの穴がひくひくと、\n僕を待ちわびて震えてる。
1425 = "Lỗ đít co giật liên hồi,\nrun rẩy chờ đợi tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。僕も、もっと知りたい」
1110 = "「Đúng vậy. Tôi cũng, muốn biết nhiều hơn.」"
# monologue
# JP: 自分が出した精液と、\n真闇姉からまだまだ溢れてくる蜜と。
1670 = "Tinh dịch do chính tôi bắn ra,\ncùng với mật ngọt vẫn đang tuôn trào từ chị Mayami."
# monologue
# JP: （ずるっ――ぬとおおおおっ）
1872 = "（Trượt――tuột）"
# 【真闇】
# display as 真闇
# JP: 「ヒャンっ」
1007 = "「Hyan.」"
# monologue
# JP: おまんこに勃起を擦りつけ、\nそれをたっぷり、しつこい程にまとわりつかせる。
1652 = "Tôi chà xát dương vật vào âm hộ,\nđể nó dính đầy chất nhờn một cách dai dẳng."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉――そのまま、お尻を開いててくれ」
1187 = "「Chị Mayami――Cứ giữ nguyên như vậy, mở mông ra đi.」"
# 【真闇】
# display as 真闇
# JP: 「良かとよ？　双ちゃ――んひいいいいいいっっ！？」
1121 = "「Được mà? Sou-cha――nhiiiiiii!?」"
# monologue
# JP: （ずぬるるるるるるっ！！！）
1821 = "（Trượt tuột!!!）"
# monologue
# JP: 警戒されて、おしりの門を締め付けられてしまわないうち、\n油断にぱくぱくしてるうち、勃起を一気にねじ込んで！
1697 = "Tranh thủ lúc chưa bị cảnh giác, lúc cửa mông chưa bị siết chặt,\nlúc nó còn đang co bóp lơ đễnh, tôi liền nhét dương vật vào một mạch!"
# 【真闇】
# display as 真闇
# JP: 「ひゃっ！？　ウソっ！　おしり――ずるんっ、って！」
1015 = "「Hya!? Đùa sao! Mông――bị đút vào, rồi!」"
# 【双鉄H】
# display as 雙鐵
# JP: （これ――はっ――）
1890 = "（Cái này――thì――）"
# monologue
# JP: 奥が無い。\n思いっきりに突きこんでなお、何も亀頭を迎えてくれない。
1531 = "Không có điểm dừng.\nDù đã đâm vào hết cỡ, vẫn không có gì đón lấy quy đầu."
# monologue
# JP: だが、それがいい。\n竿全体を均等に、ぴっちり包む感触がいい。
1327 = "Nhưng, như vậy cũng tốt.\nCảm giác toàn bộ thân dương vật được bao bọc đồng đều, khít rịt thật tuyệt."
# 【双鉄H】
# display as 雙鐵
# JP: 「おまんことは――全然――違、うっ」
1036 = "「So với bướm――hoàn toàn――khác, biệt.」"
# monologue
# JP: （ずろおおおおおおおおっっっ！）
1884 = "（Trượttttt!）"
# 【真闇】
# display as 真闇
# JP: 「やっ！？　おしりっ――おなか――めくれ、てっ」
1020 = "「Ya!? Mông――bụng――lộn ngược, mất.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……顔がとろとろに溶けてるぞ？」
1188 = "「Chị Mayami……mặt chị tan chảy hết cả rồi kìa?」"
# 【真闇】
# display as 真闇
# JP: 「やああっ」
1008 = "「Yaaa.」"
# monologue
# JP: 背中までボっと真っ赤になって、\n真闇姉は言葉を発しなくなる。
1398 = "Đỏ bừng lên đến tận lưng,\nchị Mayami không thốt nên lời."
# monologue
# JP: それでも腰はクリュクリュ動き、\nもっと攻めろと、尻をほじれと要求してくる。
1325 = "Dù vậy, hông chị vẫn không ngừng uốn éo,\nđòi hỏi tôi phải tấn công mạnh hơn, ngoáy sâu vào mông chị hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ、真闇姉。\n顔がゆるむほど――気持ちいい」
1147 = "「Tôi cũng vậy, chị Mayami.\nSướng đến mức――không giữ nổi cơ mặt nữa rồi.」"
# monologue
# JP: （ずるううううううううっ）
1823 = "（Trượt tuột）"
# 【真闇】
# display as 真闇
# JP: 「きゅっ！　ふっ――やっ――ぁっ――ぁあっ、んっ！」
1084 = "「Kyu! Phư――ya――a――aa, ưm!」"
# monologue
# JP: （ずぶうううううううっ！）
1820 = "（Phập!）"
# 【真闇】
# display as 真闇
# JP: 「くひゅっ――んっっ！　あっ――おしりっ――ひ――\nあ――あなっ――形――変わっちゃ、う――んひゅっ」
1087 = "「Kuhyu――ưm! A――mông――hi――\na――cái lỗ――hình dáng――sẽ thay đổi, mất――nhyu.」"
# monologue
# JP: 確かに、そんな感触がある。
1633 = "Quả thực, tôi cũng có cảm giác đó."
# monologue
# JP: お尻の穴のその奥は、ただただぴたり張り付いてきて、\n特段の凹凸を保たぬがゆえに――
1509 = "Sâu bên trong lỗ đít, nó chỉ đơn thuần bám chặt lấy tôi,\nbởi vì không duy trì được những chỗ lồi lõm đặc biệt nên――"
# monologue
# JP: （ずろおおおおおっ！）
# 1884 = "（蹭！）" 
# 【真闇】
# display as 真闇
# JP: 「いひゃっ――ひっ――これっ――らめっ――\nおひりっ――でっ――あたま――とん、――でっ」
1038 = "「Ihya――hi――cái này――không được――\nmông――làm――đầu óc――bay, mất――」"
# monologue
# JP: （むりゅううううううっ！）
1834 = "（Trượt!）"
# 【真闇】
# display as 真闇
# JP: 「やらっ――バカにっ――バカに――なっちゃっ――\nおひり――ずぼずぼ――され、て――んひゅううっ」
1198 = "「Yara――sẽ thành――kẻ ngốc――mất thôi――\nmông――bị――đút ra đút vào――thế này――nhyuuu.」"
# monologue
# JP: 僕の勃起の形をそのまま、\n真闇姉のお尻の奥へと押し付けていく。
1469 = "Tôi cứ thế ấn sâu hình dáng cương cứng của mình,\nvào tận cùng bên trong mông của chị Mayami."
# monologue
# JP: 子作りでなく、目的の無い、セックスのためのセックスが、\n真闇姉と僕との距離を、ゼロさえ超えて食い込ませてく。
1306 = "Không phải để tạo ra những đứa trẻ, một cuộc làm tình không mục đích, chỉ đơn thuần vì tình dục,\nđã kéo khoảng cách giữa tôi và chị Mayami vượt qua cả con số không, cắm phập vào nhau."
# monologue
# JP: （ずるぶっ！　ずぶっ！　ぶちゅんっ！　ずりゅっ！）
1874 = "（Trượt! Phập! Chụt! Trượt!）"
# 【真闇】
# display as 真闇
# JP: 「ひあっ――あっ――ア――あひゅっ！\n双ちゃんっ！　双ちゃあんっ」
1042 = "「Hia――a――A――ahyu!\nSou-chan! Sou-chaan.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇――姉っ！」
1181 = "「Chị――Mayami!」"
# monologue
# JP: 射精直後の敏感すぎる勃起はすぐに、\n再びの頂に達してしまう。
1413 = "Dương vật quá đỗi nhạy cảm ngay sau khi xuất tinh,\nrất nhanh chóng đạt đến đỉnh điểm một lần nữa."
# monologue
# JP: だが、ためらわない。我慢はしない。\n僕らは、だって、お互いをお互いに望むがままに――
1323 = "Nhưng, tôi không chần chừ. Cũng không kìm nén.\nBởi vì chúng tôi, đều đang khao khát lẫn nhau――"
# monologue
# JP: （ずぼっつ！　ぼちゅっ！　ずばっ！　ずばんっ！）
1829 = "（Phập! Chụt! Phập! Phập!）"
# monologue
# JP: たっぷり丸い真闇姉の尻、成熟しきった女の尻が、\n腰を動かすその度に、ふるふる震えて匂いを発する。
1597 = "Cặp mông tròn trịa đầy đặn của chị Mayami, cặp mông của một người phụ nữ đã trưởng thành,\nmỗi khi tôi cử động hông, lại rung lên bần bật và tỏa ra mùi hương."
# monologue
# JP: 上等すぎる女を抱いてる。その尻穴を犯してる。\n達成感と幸福感とが僕の全てを白熱させる！
1458 = "Đang ôm một người phụ nữ quá đỗi tuyệt vời. Đang xâm phạm lỗ đít của cô ấy.\nCảm giác thành tựu và hạnh phúc khiến toàn thân tôi nóng rực!"
# 【真闇】
# display as 真闇
# JP: 「来て！　来てっ！　射精っ、しゃせえっ！\nどびゅって、おしり！　おしりの穴の、奥に、来てぇ！」
989 = "「Ra đi! Ra đi! Xuất tinh, xuất tinh đi!\nBắn mạnh vào, mông! Sâu bên trong, lỗ đít, ra đi!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いく――から、だからっ！　真闇姉もっ！！」
1157 = "「Tôi ra――đây, vậy nên! Chị Mayami cũng!!」"
# monologue
# JP: （びゅるっ！！！）
1858 = "（Phụt!!!）"
# 【真闇】
# display as 真闇
# JP: 「ひゃうっ！？　イクっ！　わらひ――おひりれっ！」
1021 = "「Hyau!? Ra mất! Em――bằng mông!」"
# monologue
# JP: （ぎちちちちちちっ！）
1822 = "（Siết siết siết siết siết!）"
# monologue
# JP: 真闇姉の体が大きく震え、\n肛門が引きちぎるほどに僕を締め付けっ！
1607 = "Cơ thể chị Mayami run lên bần bật,\nhậu môn siết chặt lấy tôi như muốn xé toạc ra!"
# monologue
# JP: （ぶびゅるるっ！！）
1852 = "（Phụt phụt!!）"
# 【真闇】
# display as 真闇
# JP: 「おひりっ！　れっ――\nイっ――くうううううううぅぅぅぅぅぅんっ！！！」
1142 = "「Bằng mông! A――\nRa――mấttttttttttt!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……む？」
1099 = "「Ưm……hửm?」"
# monologue
# JP: あたたかなものが、急に失くなる。\n心細くて、目が覚める。
1538 = "Hơi ấm, đột nhiên biến mất.\nCảm thấy bất an, tôi tỉnh giấc."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……僕は――」
1076 = "「A a……tôi――」"
# 【真闇】
# display as 真闇
# JP: 「あ、ごめんね双ちゃん。起こしちゃったと？」
1082 = "「A, xin lỗi Sou-chan. Chị đánh thức em à?」"
# monologue
# JP: 眠っていたのか――\nと思うより先、答えをもらう。
1466 = "Mình đã ngủ thiếp đi sao――\nChưa kịp nghĩ xong, tôi đã nhận được câu trả lời."
# 【真闇】
# display as 真闇
# JP: 「シャワー、浴びんといけんけん。\n随分、早ぅに起こしちゃったねぇ」
973 = "「Phải đi tắm cái đã.\nChị đánh thức em hơi sớm nhỉ.」"
# monologue
# JP: 何故にシャワーを――\n思った瞬間、昨夜のことを思い出す！
1541 = "Sao lại phải đi tắm――\nKhoảnh khắc ý nghĩ đó lóe lên, tôi sực nhớ lại chuyện đêm qua!"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉、昨夜はっ」
1191 = "「Chị Mayami, đêm qua.」"
# monologue
# JP: （ぴとっ）
1883 = "（Chạm nhẹ）"
# monologue
# JP: 人差し指を軽く唇に押し当てられて――\nただそれだけで、言葉の全てをせき止められる。
1404 = "Chị khẽ đặt ngón trỏ lên môi tôi――\nChỉ vậy thôi cũng đủ ngăn lại mọi lời tôi định nói."
# monologue
# JP: やわらかに、あたたかに。真闇姉は微笑んで。\nそうして、ぺろり、と唇の端をゆっくり舐める。
1621 = "Dịu dàng, ấm áp. Chị Mayami mỉm cười.\nVà rồi, chị từ từ liếm nhẹ khóe môi."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。今晩も、時間、もらえると？」
1133 = "「Nè? Sou-chan. Tối nay, em dành thời gian cho chị được không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、何かあるのか？」
1114 = "「Ừ, có chuyện gì sao?」"
# 【真闇】
# display as 真闇
# JP: 「うん――ええと、今晩も。ね？\nどうかな？　ふたりっきりで、試飲会」
1090 = "「Ừm――ờ thì, tối nay nữa. Nhé?\nThấy sao? Buổi nếm thử rượu, chỉ có hai người chúng ta thôi.」"
# monologue
# JP: 許されている。許し合ってる。\n伝えてもらえて、ただただ嬉しい。
1389 = "Được cho phép. Được thấu hiểu.\nĐược nghe những lời ấy, tôi chỉ thấy thật vui sướng."
# monologue
# JP: だから、答えは。\nたった一つしかありえない。
1476 = "Vì vậy, câu trả lời.\nChỉ có thể là một."
# 【双鉄H】
# display as 雙鐵
# JP: 「うん――喜んで」
1096 = "「Ừm――rất sẵn lòng.」"
