[script]
# lines: 443 
# 【日々姫】
# display as 日日姬
# JP: 「…………描けーん」
1187 = "「…………Không vẽ nổi――」"
# monologue
# JP: 部屋におってもなーんも浮かんで来やせんけん、\n居間ば来たけど、やっぱり変わらん。
2437 = "Dù có ở trong phòng cũng chẳng nghĩ ra được gì, nên tôi mới xuống phòng khách, nhưng rốt cuộc vẫn chẳng có gì thay đổi."
# monologue
# JP: 何をどぎゃんと描くもんか、\nちぃとも浮かんで来やせんもん。
2459 = "Phải vẽ cái gì và vẽ như thế nào, trong đầu tôi chẳng nảy ra được một chút ý tưởng nào cả."
# 【日々姫】
# display as 日日姬
# JP: 「せっかく――\nまた任せてもらえたけん」
1987 = "「Cất công―― được mọi người tin tưởng giao phó thêm lần nữa mà.」"
# monologue
# JP: 蒸気焼酎のラベルの、新しかとを任せてもらえる。\nそれは、前のが認めてもらえたってこと。
2662 = "Được giao phó vẽ nhãn hiệu mới cho shochu hơi nước. Điều đó có nghĩa là nhãn hiệu trước đó đã được công nhận."
# monologue
# JP: すっごく嬉しかことなのに、\nもっと良くって思うと頭ば、真っ白になってしまって。
2530 = "Rõ ràng là một chuyện vô cùng đáng mừng, nhưng cứ nghĩ đến việc phải làm tốt hơn nữa, đầu óc tôi lại trở nên trống rỗng."
# 【双鉄】
# display as 雙鐵
# JP: 「描けんとは、ラベルデザインか？」
1864 = "「Không vẽ nổi, là thiết kế nhãn hiệu sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃにっ！」
1635 = "「A! Anh hai!」"
# monologue
# JP: 突っ伏しとるとこ見せたくなかけん、\n体ば一気に跳ね起こす。
2352 = "Không muốn bị nhìn thấy bộ dạng đang gục mặt xuống bàn, tôi lập tức bật người ngồi thẳng dậy."
# monologue
# JP: けど、にぃにの顔が心配そうにくもってしまって、\n私、よっぽど酷か顔ばしとった？　って、恥ずかしぅなる。
2241 = "Nhưng, vẻ mặt anh hai lại lộ rõ sự lo lắng, làm tôi tự hỏi bộ dạng mình thê thảm lắm sao? Cảm thấy xấu hổ quá đi mất."
# 【日々姫】
# display as 日日姬
# JP: 「平気。\n多分、ちょっと考え過ぎちゃっとるだけやけん」
1847 = "「Em không sao đâu. Chắc là do em suy nghĩ hơi nhiều chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……思うところが、何かあるのか？」
1207 = "「……Có chuyện gì, khiến em phải bận tâm sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
1627 = "「A――」"
# monologue
# JP: 言われたら、そうなんだなぁって思わされちゃう。
2477 = "Nghe anh ấy nói vậy, tôi lại cảm thấy đúng là như thế thật."
# monologue
# JP: 何年も離れて暮らしても、にぃにはやっぱりにぃにやけん。\n私の一番弱いとこ、見守ってくれとった人やけん。
2184 = "Dù có sống xa nhau bao nhiêu năm đi nữa, anh hai vẫn là anh hai. Là người đã luôn dõi theo những mặt yếu đuối nhất của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「うん。あると。\n思うところば多すぎて、頭がぐちゃぐちゃしよるんよ」
1670 = "「Vâng. Có ạ. Có quá nhiều chuyện phải bận tâm, nên đầu óc em mới rối tung cả lên.」"
# monologue
# JP: ひとつは……やっぱり、にぃにのこと。
2629 = "Một trong số đó…… quả nhiên là chuyện của anh hai."
# monologue
# JP: ここのところずっと、にぃにとねぇねぇ、\n真夜中の蔵で楽しげに、なんか、お話ばしとること。
2700 = "Dạo gần đây, anh hai và chị Mayami, đêm nào cũng ở trong hầm rượu trò chuyện vui vẻ với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「僕でよければ、話を聞くぞ？\n話せば、思考を整頓できる」
1716 = "「Nếu không phiền, em có thể nói cho anh nghe không? Nói ra rồi, em sẽ sắp xếp lại được những suy nghĩ của mình đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに頭よかけんね、そいで解決するだろうけど――\n私は頭わるかけん、きっと余計にぐちゃぐちゃしよると」
1980 = "「Anh hai thông minh mà, nên chắc anh sẽ giải quyết được thôi―― Nhưng em thì ngốc lắm, chắc chắn sẽ càng làm mọi thứ rối tung lên cho xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは無いし、そんなことは無い」
1849 = "「Không có chuyện đó đâu, làm gì có chuyện đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1633 = "「Aha.」"
# monologue
# JP: 思わず噴き出す。\n真面目な顔して、ちょっとおかしなこというけん。
2466 = "Bất giác tôi bật cười. Làm cái mặt nghiêm túc thế kia, mà lại nói ra mấy lời hơi kỳ cục."
# monologue
# JP: のににぃにぃは、きょとんって、\nすごく不思議そうな顔しよる。
2237 = "Vậy mà anh hai lại tròn xoe mắt, trông ngơ ngác cực kỳ."
# 【双鉄】
# display as 雙鐵
# JP: 「何が面白かったのだ？」
1837 = "「Có chuyện gì đáng cười sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「だって、にぃに。\nおんなじことば、二回言うけん」
1692 = "「Tại vì anh hai á. Cùng một câu mà anh nói tận hai lần liền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、それぞれに一度ずつだぞ？\n前者と、後者と」
1508 = "「Không đâu, mỗi vế anh nói một lần mà? Vế trước, và vế sau.」"
# 【日々姫】
# display as 日日姬
# JP: 「前者と後者？」
1562 = "「Vế trước và vế sau á?」"
# monologue
# JP: あらたまられると、自分がさっき何を言ったか――
2215 = "Bị hỏi vặn lại, tôi mới chợt nhận ra mình vừa nói cái gì――"
# 【双鉄】
# display as 雙鐵
# JP: 「まず、整頓できることと解決できることとは別だ。\n次に、日々姫の頭は悪くない」
1994 = "「Thứ nhất, việc sắp xếp lại suy nghĩ và việc giải quyết vấn đề là hai chuyện khác nhau. Thứ hai, Hibiki không hề ngốc.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 1627 = "「啊——」" 
# monologue
# JP: ――思い出そうとする前に、にぃにが答えば教えてくれる。
1150 = "――Chưa kịp nhớ ra, thì anh hai đã cho tôi câu trả lời rồi."
# monologue
# JP: ゆーか、え？\n整頓と解決ば別って、ほんなら――
2188 = "Ý anh là, ủa? Sắp xếp lại suy nghĩ và giải quyết vấn đề là khác nhau, nếu vậy thì――"
# 【日々姫】
# display as 日日姬
# JP: 「にぃににも、抱えとるような悩みって、あると？」
1907 = "「Anh hai cũng có, những phiền muộn đang phải gánh vác sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるぞ。当然のことだろう」
1839 = "「Có chứ. Đó là chuyện đương nhiên mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「えー、当然かなぁ。\nにぃにって、なんでも即断即決即解決の人やでしょお」
1609 = "「Ế, đương nhiên sao. Anh hai là kiểu người luôn quyết đoán, giải quyết mọi chuyện nhanh gọn lẹ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな化け物の筈もあるまい。\n僕とて、一人の人間だ」
1886 = "「Làm gì có chuyện anh là quái vật như thế. Anh cũng chỉ là một con người thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1995 = "「!」"
# monologue
# JP: ――にぃに、変わった。\n肌が、心が、ざわってするほど。
1155 = "――Anh hai, thay đổi rồi. Đến mức khiến cả da thịt, cả trái tim tôi đều xao xuyến."
# monologue
# JP: にぃに、だって……にぃにって、だって、\nこっちが悲しくなるくらい、自分を殺す人やったけん。
2354 = "Anh hai, bởi vì…… anh hai, bởi vì, là người luôn kìm nén bản thân đến mức khiến người khác phải thấy xót xa mà."
# 【日々姫】
# display as 日日姬
# JP: 「悩んどるのって……どぎゃんこと？」
1873 = "「Phiền muộn của anh là…… chuyện gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――そう大したことでは」
1479 = "「Không―― cũng không có gì to tát đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが言うたよ？\n話せば整頓ばできるって」
1834 = "「Anh hai nói mà? Chỉ cần nói ra là có thể sắp xếp lại được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……聞きたいのなら聞かせるが、\n特に面白い話でもないぞ？」
1197 = "「……Nếu em muốn nghe thì anh sẽ kể, nhưng không phải là chuyện gì thú vị đâu nhé?」"
# monologue
# JP: 困ったみたいに少し笑って、にぃにが話す。
2703 = "Nở nụ cười gượng gạo, anh hai bắt đầu kể."
# monologue
# JP: ねぇねぇと夜、会って話ばしとること。\n少しも隠さず、聞かせてくれる。
2212 = "Chuyện anh gặp và nói chuyện với chị Mayami vào ban đêm. Anh kể cho tôi nghe mà không giấu giếm chút nào."
# 【日々姫】
# display as 日日姬
# JP: 「ふぅん？\nねぇねぇに避けられとったと？」
1676 = "「Hừm?\nAnh bị chị Mayami tránh mặt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それで僕は避けられていた理由を聞いた。\nひとつは、それ。『ひとしずく』の製作だといっていた」
1666 = "「Ừm. Nên anh đã hỏi lý do vì sao mình bị tránh mặt. Một trong số đó là vì việc sản xuất \"Hitoshizuku\".」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。仕上がり近かとき、\nねぇねぇ、ピリピリしよるけんねぇ」
1639 = "「A, vâng. Gần đến lúc hoàn thành, chị Mayami hay cáu gắt lắm nhỉ.」"
# monologue
# JP: ひどいときなんて目までキイって釣り上がりよるけん――\nにぃにぃに見せたくなかとも、わかる気がする。
2566 = "Những lúc tệ nhất, mắt chị ấy còn trợn ngược lên cơ―― Nên em cũng hiểu được phần nào lý do chị ấy không muốn cho anh hai thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「それともうひとつ理由があると聞かせてもらって――\nそのときは僕も酔ってた気分で、何となく受け答えたが」
1869 = "「Anh còn được nghe nói là có một lý do khác nữa―― Lúc đó anh cũng đang say, nên chỉ trả lời qua loa thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1671 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着いて考えると良く意味がわからん気がして……\nそれで、まぁ――悩んでいるというか、考えこんでいる」
1553 = "「Bình tĩnh suy nghĩ lại thì anh cảm thấy mình không hiểu rõ ý nghĩa cho lắm…… Nên là, ừm―― nói là phiền muộn cũng được, anh đang mải suy nghĩ về nó.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ、なんば言いよったと？」
1800 = "「Chị Mayami, đã nói gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『妹の欲しがるものを横取りできない』と――」
1182 = "「\"Không thể nẫng tay trên thứ mà em gái đang muốn có\"――」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
1997 = "「!!?」"
# monologue
# JP: 欲しがるものって――\nそれでにぃにぃを避けていたって――
2441 = "Thứ mà em gái đang muốn có―― Vì vậy nên chị ấy mới tránh mặt anh hai sao――"
# monologue
# JP: なら、ねぇねぇも？\nけど……そぎゃんと素振り、いっかいも――っ！
2675 = "Vậy thì, cả chị Mayami cũng? Nhưng…… thái độ như vậy, chưa một lần nào――!"
# monologue
# JP: （ほんとに……ただの一回だけも……\nそんなの、だって――すごく不自然――ありえない）
2754 = "（Thật sự…… chỉ một lần cũng chưa từng…… Như thế, bởi vì―― quá không tự nhiên―― không thể nào.）"
# monologue
# JP: 些細なドキドキさえもきっとねぇねぇは、\n大人びた仕草と余裕で、誤魔化し隠しつづけて。
2334 = "Chắc chắn chị Mayami đã luôn che giấu, lấp liếm đi cả những nhịp đập con tim nhỏ bé nhất bằng phong thái người lớn và sự điềm tĩnh của mình."
# monologue
# JP: なんでそんな――と考えたらもう、\n答えなんかは、ひとつしか無い。
2555 = "Tại sao lại làm như vậy―― khi nghĩ đến đó, câu trả lời chỉ có một mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし僕には、果たして何を真闇姉がほしがってるのか。\n日々姫からの横取りになると考えているのかが」
1499 = "「Nhưng với anh, rốt cuộc chị Mayami đang muốn thứ gì. Thứ gì mà chị ấy lại nghĩ là nẫng tay trên từ Hibiki chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それを知ったら――」
1722 = "「Nếu biết được điều đó――」"
# monologue
# JP: 放っておけって、\n冷えた心が囁いてくる。
2432 = "Mặc kệ đi,\ntrái tim nguội lạnh của tôi thì thầm."
# monologue
# JP: 放っておけば、チャンスはあるって。\n挽回できるかもしれないって。
2174 = "Cứ mặc kệ đi, rồi sẽ có cơ hội. Biết đâu lại có thể vãn hồi được."
# 【日々姫】
# display as 日日姬
# JP: 「それが何なのかわかったら――\n兄さんは、どうするつもりなんですか？」
1724 = "「Nếu biết được thứ đó là gì―― Anh hai, định sẽ làm gì?」"
# monologue
# JP: だけど、尋ねずにいられない。\n答えが、多分わかってて――
2249 = "Nhưng, tôi không thể không hỏi. Dù có lẽ đã biết trước câu trả lời――"
# monologue
# JP: それは私を傷つけるって、\nそんな気がしても、どうしても。
2331 = "Dù tôi có cảm giác rằng, điều đó sẽ làm tổn thương chính mình, nhưng dù thế nào đi nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、真闇姉の願いを叶えるべく、手伝いたい」
1881 = "「Tất nhiên là, anh muốn giúp đỡ, để biến ước muốn của chị Mayami thành hiện thực.」"
# 【日々姫】
# display as 日日姬
# JP: 「どうして……\n無論、なんですか？」
1862 = "「Tại sao lại……\nlà tất nhiên, vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は右田の養子で、真闇姉に守ってもらった恩がある。\nそれを返すのは、ごく当然のことだろう」
1791 = "「Anh là con nuôi của nhà Migita, mang ơn chị Mayami đã che chở cho anh. Nên việc đền đáp lại ân huệ đó, là chuyện hết sức hiển nhiên thôi.」"
# monologue
# JP: 恩。義務。役に立つ。\nにぃにの、いつでも言っていること。
2366 = "Ân huệ. Nghĩa vụ. Trở nên có ích. Những điều mà anh hai lúc nào cũng nói."
# monologue
# JP: だけど、もうそれだけじゃなくなった――\nにぃに自身が、今はまだ気づいていなくても。
2222 = "Nhưng, giờ không chỉ có thế nữa rồi―― Dù bản thân anh hai, hiện tại vẫn chưa nhận ra."
# 【日々姫】
# display as 日日姬
# JP: 「だったら、私も。右田日々姫も右田の娘で――\n少しは……何かで、兄さんの役にとか立ちましたよね？」
1958 = "「Nếu vậy thì, cả em nữa. Migita Hibiki cũng là con gái nhà Migita―― Ít nhiều gì…… em cũng từng giúp ích được gì đó cho anh hai, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「少しどころか、大いにだ。\x%l機関助士;#00ffc040;機関助士%l;#;としてはもちろん、\n御一夜のことを教えてもくれたし――助かってるさ」
1928 = "「Không chỉ ít nhiều đâu, mà là rất nhiều đấy. Với tư cách là \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; thì đã đành, em còn dạy anh biết bao điều về Ohimitera nữa―― anh thực sự rất biết ơn em.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら――」
1962 = "「Vậy thì――」"
# monologue
# JP: 今だけは、私のことを見ていてもらいたくて、\nねぇねぇの名前は、口に出さない。
2464 = "Chỉ lúc này thôi, tôi muốn anh ấy chỉ nhìn về phía mình, nên tôi không nói ra tên của chị Mayami."
# 【日々姫】
# display as 日日姬
# JP: 「私の願いも、兄さんは叶えてくれますか？」
1615 = "「Ước muốn của em, anh hai cũng sẽ giúp em thực hiện chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。僕にできることなら」
1879 = "「Tất nhiên rồi. Nếu đó là việc anh có thể làm.」"
# monologue
# JP: ここまで言って、\nどうして気づいてくれないのかって悲しくなって――
2556 = "Nói đến mức này rồi, mà tại sao anh ấy vẫn không nhận ra chứ, tôi thấy thật buồn――"
# monologue
# JP: そこをもう少し考えたのなら、\nもっと、ずうっと悲しくなる。
2401 = "Cứ suy nghĩ thêm về điều đó, tôi lại càng thấy buồn hơn nữa."
# monologue
# JP: （兄さんは……自分が誰かに愛される人間なんだって――\nその考えを、きっと、どこかで見失ってるんだ）
2756 = "（Anh hai…… chắc chắn đã đánh mất đi suy nghĩ rằng―― bản thân mình cũng là một người được ai đó yêu thương.）"
# monologue
# JP: ……思い出させてあげるのは、\n絶対、私の役目がよかった。
1165 = "……Việc nhắc nhở cho anh ấy nhớ lại điều đó, tuyệt đối, tôi muốn đó là vai trò của mình."
# monologue
# JP: それが無理でも、振られるんでも告白は、\nもっと綺麗に、ドラマチックにしたかった。
2329 = "Dù cho điều đó là không thể, dù cho có bị từ chối đi chăng nữa, thì lời tỏ tình này, tôi cũng muốn nó được diễn ra một cách đẹp đẽ và kịch tính hơn."
# 【日々姫】
# display as 日日姬
# JP: 「それは大丈夫。兄さんになら叶えられる……\n兄さんにしか、叶えられない願いです」
1952 = "「Chuyện đó thì không sao đâu. Nếu là anh hai thì chắc chắn sẽ làm được…… Đó là ước muốn mà chỉ có anh hai, mới có thể thực hiện được thôi.」"
# monologue
# JP: 初めて話を聞いてもらった時からずっと、\nずっとずうっと、願ってたこと。
2670 = "Kể từ lần đầu tiên được anh lắng nghe tâm sự, tôi đã luôn, luôn luôn ao ước điều đó."
# monologue
# JP: そうしてきっと、同じくらいに長い時間を、\nねぇねぇに、我慢させて、隠させてたこと。
2706 = "Và chắc chắn, trong một khoảng thời gian dài tương đương, tôi đã khiến chị Mayami phải nhẫn nhịn, phải che giấu điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん――私は」
1613 = "「Anh hai―― em」"
# monologue
# JP: だけど、言う。だから、言う。\nやめろって、すごくおっきな声がガンガン聞こえてるけど。
2238 = "Nhưng, tôi vẫn sẽ nói. Chính vì vậy, tôi mới nói. Dù cho có một giọng nói rất lớn đang vang vọng bên tai bảo tôi dừng lại."
# monologue
# JP: きっと私は傷ついて、\n兄さんのことも、傷つけるけど。
2717 = "Chắc chắn tôi sẽ bị tổn thương, và cũng sẽ làm tổn thương cả anh hai nữa."
# 【日々姫】
# display as 日日姬
# JP: 「あなたが好きです。家族としてってだけじゃなく、\n女として、恋人になりたいっていう意味で。好きです」
1783 = "「Em thích anh. Không chỉ như một người thân trong gia đình, mà với tư cách là một người phụ nữ, em muốn trở thành người yêu của anh. Em thích anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1995 = "「！」" 
# monologue
# JP: ああ、ほら、やっぱり。\nにぃにの顔ば、驚いて……困っとる。
2327 = "A, nhìn kìa, quả nhiên là vậy. Khuôn mặt anh hai, đang ngạc nhiên…… và bối rối."
# 【日々姫】
# display as 日日姬
# JP: 「だから、私の――願いは」
1804 = "「Nên, ước muốn―― của em là」"
# monologue
# JP: 泣き声になったら、きっともっと困らせちゃうけん――\nぐって、お腹の底に力ばいれて、言う。
2398 = "Nếu bật khóc thì chắc chắn sẽ càng làm anh ấy bối rối hơn―― Tôi lấy hết sức bình sinh, dồn nén xuống tận đáy lòng, và nói."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――ううん、兄さんと、恋を。\n恋人同士に――ずっと、なりたいって思ってて」
1788 = "「Anh hai―― à không, với anh, một tình yêu. Em đã luôn, luôn muốn chúng ta―― trở thành người yêu của nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ…………んっ」
1629 = "「A………… ừm.」"
# monologue
# JP: 困ってる。困らせたくなんてなかったのに、\n困ってくれて、正直嬉しい。
2558 = "Anh ấy đang bối rối. Rõ ràng là tôi không hề muốn làm khó anh ấy, nhưng thấy anh bối rối vì mình, thành thật mà nói tôi lại thấy vui."
# monologue
# JP: 困ってくれる分だけは、にぃににとって、\n義妹じゃない私のことが、きっと残ると思うから。
2509 = "Vì sự bối rối đó chứng tỏ rằng, đối với anh hai, hình bóng của tôi với tư cách không phải là em gái nuôi, chắc chắn vẫn còn đọng lại."
# 【日々姫】
# display as 日日姬
# JP: 「だから、ね？　にぃにっ」
1802 = "「Nên là, nhé? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――すまん。日々姫」
1176 = "「――Xin lỗi em. Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1632 = "「A.」"
# monologue
# JP: 心が、痛い。\nわかっていても、やっぱり泣きそう。
2429 = "Trái tim tôi, đau nhói. Dù đã biết trước kết quả, nhưng quả nhiên tôi vẫn chực trào nước mắt."
# monologue
# JP: これ、やばい――
2341 = "Thế này, tệ thật――"
# 【日々姫】
# display as 日日姬
# JP: 「謝らんで――謝らないでください、兄さん」
1485 = "「Đừng xin lỗi―― xin anh đừng xin lỗi mà, anh hai.」"
# monologue
# JP: ああ――私、作り笑いでこらえてる。\n自分の弱さが情けなくって、だけれどやっぱりそうしてる。
2338 = "A―― tôi, đang cố gắng gượng cười để kìm nén. Thấy sự yếu đuối của bản thân thật thảm hại, nhưng rốt cuộc tôi vẫn làm như vậy."
# monologue
# JP: 安全圏の義妹のポジションにサラリと戻って、\n義妹として今までどおり、大事にされたがっている。
2168 = "Nhanh chóng quay trở lại vị trí an toàn là một cô em gái nuôi, tôi lại muốn được anh nâng niu, chiều chuộng như từ trước đến nay với tư cách là em gái."
# 【日々姫】
# display as 日日姬
# JP: 「私、兄さんに教えてあげたかっただけですから」
1780 = "「Em, chỉ là muốn cho anh hai biết thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕に？　何をだ？」
1583 = "「Cho anh? Biết chuyện gì?」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは、人に好きになられる人だってことです。\n役にたつとか敵味方とか、そんなことなんて関係無しに」
1616 = "「Rằng anh hai, là một người xứng đáng được người khác yêu thương. Chẳng liên quan gì đến việc có ích hay không, hay là địch hay bạn cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1175 = "「――A.」"
# monologue
# JP: 長い、息。\nつながっちゃったなぁ、って、思う。
2693 = "Một tiếng thở dài. Vậy là kết nối được rồi nhỉ, tôi nghĩ thầm."
# monologue
# JP: 横取りのことと、わたしの告白。\n兄さんの中で、もう捻じれずに。
2708 = "Chuyện nẫng tay trên, và lời tỏ tình của tôi. Trong tâm trí anh hai, chắc hẳn không còn vướng mắc gì nữa."
# 【日々姫】
# display as 日日姬
# JP: 「それだけわかれば――\n大丈夫。きっと、わかりますから」
1576 = "「Chỉ cần anh hiểu được điều đó―― Thì không sao đâu. Chắc chắn, anh sẽ hiểu ra thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………うん」
1184 = "「…………Ừm.」"
# monologue
# JP: にぃにぃの手が伸びかけて、\n遠慮をしてるみたいにそこで、ぴたって止まる。
2698 = "Bàn tay anh hai khẽ vươn ra, nhưng rồi lại khựng lại đó, như thể đang ngần ngại."
# 【日々姫】
# display as 日日姬
# JP: 「よかよ？　撫でて？\nわたし、いい子のいもうとやけん」
1579 = "「Không sao đâu? Anh cứ xoa đầu em đi? Em là, một đứa em gái ngoan mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1671 = "「嗯」" 
# monologue
# JP: にぃにぃの手。\nおっきな手。
2704 = "Bàn tay của anh hai.\nMột bàn tay thật lớn."
# monologue
# JP: ゆっくりゆっくり、\nゆっくり私の頭ば、撫でる。
2211 = "Thật chậm rãi, thật chậm rãi,\nchậm rãi xoa đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうな。日々姫」
1923 = "「Cảm ơn em nhé. Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「どういたしまして――っ！」
1484 = "「Không có chi――!」"
# monologue
# JP: いけん――もうダメ。
2175 = "Không được rồi―― tôi không chịu nổi nữa."
# monologue
# JP: 泣いてるとこば見せたらきっと、\nにぃにぃ、余計な気遣いするけん――
2404 = "Nếu để anh hai thấy mình khóc, chắc chắn, anh ấy sẽ lại bận tâm những chuyện không đâu mất――"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ、私。描けそう。すごく。\nちょっと、一人にしてくれる？」
1971 = "「À này, em. Có vẻ vẽ được rồi. Rất nhiều ý tưởng luôn. Anh để em một mình một lát được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うむ」
1628 = "「A―― ừm.」"
# monologue
# JP: にぃにが行っちゃう。\nあっさりと。
2696 = "Anh hai rời đi.\nMột cách thật dễ dàng."
# monologue
# JP: 私がそうしてって言ったけど、\nそれでもやっぱり本当は――っ！！？
2713 = "Rõ ràng là do tôi bảo anh ấy làm vậy, nhưng sự thật là tôi vẫn――!!?"
# 【ハチロク】
# display as ？？？
# JP: 「頑張りましたね。立派でしたよ。日々姫」
1523 = "「Chị đã cố gắng lắm rồi. Chị tuyệt vời lắm. Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1627 = "「啊——」" 
# monologue
# JP: にぃにが戻ってくれたのかって一瞬思って、\nだけど、わたしを撫でてくれる手ば、ちいちゃくて。
2451 = "Trong một khoảnh khắc, tôi đã tưởng anh hai quay lại, nhưng, bàn tay đang xoa đầu tôi, lại thật nhỏ bé."
# 【ハチロク】
# display as 八六
# JP: 「すみません。\n立ち聞きするつもりはなかったのですが――」
1733 = "「Em xin lỗi.\nEm không cố ý nghe lén đâu ạ――」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、良かよ。\nここ居間やもんね」
1505 = "「Không sao đâu.\nDù sao đây cũng là phòng khách mà.」"
# monologue
# JP: にぃにじゃなくってよかったって思ってホっとして\nだけど残念で――
2711 = "Tôi thở phào nhẹ nhõm vì may quá không phải là anh hai, nhưng đồng thời cũng thấy có chút tiếc nuối――"
# 【ハチロク】
# display as 八六
# JP: 「――立派でした。とても、格好よかったです」
1174 = "「――Chị tuyệt vời lắm. Vô cùng, ngầu luôn đó ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ――」
# 1627 = "「啊——」" 
# monologue
# JP: ハチロクはわかってくれとる。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、人も、そんなの関係無かけん。
2253 = "Hachiroku luôn thấu hiểu tôi. Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#; hay con người, thì những chuyện đó cũng chẳng liên quan gì cả."
# monologue
# JP: だから……聞いてみたくなる。\n酷かことかも、知れんけど。
2484 = "Chính vì thế…… tôi lại muốn hỏi em ấy. Dù biết đó có thể là một điều tàn nhẫn."
# 【日々姫】
# display as 日日姬
# JP: 「ハチロクは――これで、良かったと？」
1548 = "「Hachiroku―― như thế này, là ổn rồi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様の所有物ですから。\n双鉄様が幸せになられる道を、望むのみです」
1690 = "「Em là vật sở hữu của ngài Soutetsu. Em chỉ mong ngài Soutetsu bước đi trên con đường hạnh phúc mà thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ……そーよねぇ。\n幸せに、なって欲しかもんねぇ」
1631 = "「A…… đúng thế nhỉ. Em cũng muốn, anh ấy được hạnh phúc mà nhỉ.」"
# monologue
# JP: 好きなのは、幸せになって欲しいのは、\nにぃに一人だけじゃないから。
2348 = "Người mà tôi thích, người mà tôi mong muốn được hạnh phúc, không chỉ có một mình anh hai."
# monologue
# JP: 比べられるのが嫌なのは、認められなくて悲しかったのは、\nだって――大好きで憧れてるから。
2661 = "Lý do tôi ghét bị đem ra so sánh, lý do tôi buồn khi không được công nhận, là bởi vì―― tôi rất yêu quý và ngưỡng mộ chị ấy."
# 【日々姫】
# display as 日日姬
# JP: 「背中ば誰かが押さんと――きっと、\nふたりとも、幸せば我慢しちゃうもんねぇ」
1720 = "「Nếu không có ai đẩy lưng họ―― chắc chắn, cả hai người đó, sẽ lại nhẫn nhịn hạnh phúc của chính mình mất.」"
# monologue
# JP: ズルかことして落ち込ませて、それで勝ったって思うほど、\nねぇねぇのことを、侮辱みたいにしたくないから――
2353 = "Dùng thủ đoạn hèn hạ để làm chị ấy suy sụp, rồi tự cho mình là người chiến thắng, tôi không muốn sỉ nhục chị Mayami đến mức đó――"
# 【ハチロク】
# display as 八六
# JP: 「立派でした、日々姫」
1522 = "「Chị tuyệt vời lắm, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1995 = "「！」" 
# monologue
# JP: きっと、十年くらいたったら、\n私も私を、立派だった、頑張ったって振り返れる。
2259 = "Chắc chắn, khoảng mười năm nữa, khi nhìn lại, tôi cũng sẽ tự nhủ rằng mình đã rất tuyệt vời, đã rất cố gắng."
# monologue
# JP: だけれど、今は――\n立派じゃなくて、全然いいから――
2232 = "Nhưng mà, hiện tại thì―― Không tuyệt vời cũng chẳng sao cả――"
# 【日々姫】
# display as 日日姬
# JP: 「それでもやっぱり……悲しかねぇ」
1495 = "「Dù vậy quả nhiên…… vẫn thấy buồn nhỉ.」"
# monologue
# JP: にぃにを幸せにできるのが。隣でずうっと笑ってるのが。\n……私だったら、もっと良かった。
2403 = "Người có thể mang lại hạnh phúc cho anh hai. Người luôn cười đùa bên cạnh anh. ……Giá như là tôi, thì tốt biết mấy."
# 【ポーレット】
# display as 波萊特
# JP: 「……ネット中継くらいして欲しいですよね。\nすごく大きなイベントなんですし」
1211 = "「……Họ nên phát sóng trực tiếp trên mạng mới phải chứ. Đây là một sự kiện rất lớn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけ、\n歴史と伝統を大事にしているということなのだろう」
1949 = "「Điều đó chứng tỏ, họ rất coi trọng lịch sử và truyền thống.」"
# monologue
# JP: 不満顔のポーレットをなだめたつもりの言葉にけれど、\n不安を掻き立てられてしまう。
2714 = "Những lời nói nhằm xoa dịu vẻ mặt bất mãn của Paulette, lại vô tình làm dấy lên sự bất an trong tôi."
# monologue
# JP: それほどまでに伝統的で保守的なISCで――\n日ノ本の国の[スピリッツ,1]焼酎が果たして受け入れられるものか。
2361 = "Tại một ISC mang đậm tính truyền thống và bảo thủ đến mức đó―― Liệu shochu của đất nước Hinomoto có thực sự được chấp nhận hay không."
# 【真闇】
# display as 真闇
# JP: 「ま、やれるだけのことはやったけん」
1573 = "「Chà, những gì có thể làm thì chúng ta cũng đã làm hết rồi.」"
# monologue
# JP: 真闇姉の言葉にはまるで力みが無い。\n目はやわらかに、日々姫の方へと向けられる。
2609 = "Trong lời nói của chị Mayami không hề có chút căng thẳng nào. Ánh mắt chị dịu dàng, hướng về phía Hibiki."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんがデザインしてくれたラベルも。まっこと、\n“ひとしずく”にふさわしかものになったけん」
1961 = "「Cả nhãn hiệu mà bé Hii thiết kế cho nữa. Thật sự, nó đã trở thành một thứ vô cùng xứng đáng với \"Hitoshizuku\" rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1826 = "「Đúng vậy.」"
# monologue
# JP: 瓶をぐるりと一周している肩ラベルでは、\n\x%l8620;#00ffc040;8620%l;#;が、周回しているレールの上を走り続ける。
2573 = "Trên nhãn dán vòng quanh vai chai, \\x%l8620;#00ffc040;8620%l;#; đang tiếp tục chạy trên những đường ray uốn lượn."
# monologue
# JP: そして胴ラベルでは、クマ川の水と稲穂とのイメージ上に、\n墨痕も鮮やかな『蒸気焼酎・精髄　-ひとしずく-』の名。
2578 = "Và trên nhãn dán ở thân chai, nổi bật trên hình ảnh dòng nước sông Kuma và những bông lúa trĩu hạt, là dòng chữ thư pháp sắc nét mang tên \"Shochu hơi nước・Tinh túy -Hitoshizuku-\"."
# 【双鉄】
# display as 雙鐵
# JP: 「特に肩ラベルがいい。\n“繋がっている”という感じを受ける」
1989 = "「Đặc biệt là nhãn dán ở vai chai rất đẹp. Nó mang lại cảm giác \"đang kết nối\".」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ～っ、ならバッチリたい。\nそぎゃんと思うてデザインしたけん」
1603 = "「Hehehe~, vậy là chuẩn rồi. Em cũng nghĩ như thế khi thiết kế mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1827 = "「Vậy sao.」"
# monologue
# JP: 大事なことを教えてもらって、\n２、３日だけはぎくしゃくとして。
2375 = "Sau khi được dạy cho một bài học quan trọng, chỉ trong 2, 3 ngày chúng tôi đã có chút ngượng ngùng."
# monologue
# JP: けれど日々姫は今はすっかり、\n元の日々姫に戻ってくれてる。
2233 = "Nhưng hiện tại, Hibiki đã hoàn toàn trở lại là Hibiki của ngày xưa."
# 【双鉄】
# display as 雙鐵
# JP: 「……お前には、いつも本当に助けられるな。\n感謝している」
1203 = "「……Anh lúc nào cũng được em giúp đỡ thật nhiều nhỉ. Anh rất biết ơn em.」"
# 【日々姫】
# display as 日日姬
# JP: 「やだ、水臭かとよ、にぃに。\n私とにぃにの仲やけん」
1918 = "「Thôi đi, khách sáo quá đấy, anh hai. Giữa em và anh hai với nhau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1622 = "「Ừm.」"
# monologue
# JP: 右田の娘と、右田の養子と。
2322 = "Con gái nhà Migita, và con nuôi nhà Migita."
# monologue
# JP: 与えられ、だから従ってきた関係を、\n日々姫は自ら――踏み出し、変えた。
2521 = "Mối quan hệ được ban cho, và vì thế mà tuân theo đó, Hibiki đã tự mình―― bước tới, và thay đổi nó."
# monologue
# JP: （僕も……日々姫を見習おう）
2750 = "（Mình cũng…… phải học tập Hibiki thôi.）"
# monologue
# JP: 自分の気持ちを見つめに見つめ、\nある程度、整頓できたつもりになれた。
2472 = "Tôi đã nhìn sâu, thật sâu vào cảm xúc của chính mình, và có lẽ đã sắp xếp lại được phần nào."
# monologue
# JP: ＩＳＣの出展準備を邪魔しないよう、\n伝えることを、今日の今日まで我慢してきた。
2554 = "Để không làm phiền đến quá trình chuẩn bị cho ISC, tôi đã kìm nén việc thổ lộ cho đến tận hôm nay."
# monologue
# JP: （今日。だ。たとえどのようなものであれ――\n結果が出たなら、伝えるのだ）
2747 = "（Hôm nay. Chính là hôm nay. Dù cho kết quả có ra sao―― Chỉ cần có kết quả, mình sẽ nói ra.）"
# monologue
# JP: 会員か会員招待でしか入れないコンテスト会場には、\n義父が向かってくれている。
2730 = "Tại hội trường cuộc thi, nơi chỉ có hội viên hoặc người được hội viên mời mới có thể vào, cha nuôi đang thay chúng tôi có mặt ở đó."
# monologue
# JP: さすがは老舗の酒問屋――\n蛇の道は蛇、というヤツらしい。
2180 = "Quả không hổ danh là cửa hàng bán buôn rượu lâu đời―― Đúng là người trong nghề có khác."
# 【ポーレット】
# display as 波萊特
# JP: 「……なかなか、結果出ませんねぇ」
1214 = "「……Mãi mà vẫn chưa có kết quả nhỉ.」"
# monologue
# JP: 酒造りには一番関与の薄かった――
2639 = "Dù là người ít tham gia vào quá trình nấu rượu nhất――"
# monologue
# JP: あるいは、だからかえってだろうか、\nポーレットはそわそわ、落ち着かん。
2481 = "Hoặc có lẽ chính vì vậy, mà Paulette lại bồn chồn, không thể ngồi yên."
# 【凪】
# display as 凪
# JP: 「飽きたばーい、\n待ちくたびれたばーい！」
1594 = "「Chán quá đi mất,\nđợi mỏi cả cổ rồi!」"
# 【ふかみ】
# display as 深美
# JP: 「あの、携帯。ええと、充電きれてたり、とか――」
1972 = "「À này, điện thoại. Ờm, có khi nào bị hết pin, hay gì đó――」"
# monologue
# JP: 凪とふかみにもそわそわが伝染してしまう。
2364 = "Sự bồn chồn đó cũng lây sang cả Nagi và Fukami."
# monologue
# JP: 一応は携帯を確認し、\n真闇姉は大丈夫だと、ゆったり頷き返してやる。
2458 = "Chị Mayami cẩn thận kiểm tra lại điện thoại, và từ tốn gật đầu đáp lại rằng không sao cả."
# 【ハチロク】
# display as 八六
# JP: 「うふふ、みなさま。\nれいなを見習うと良いですよ？」
1624 = "「Ufufu, mọi người ơi. Học tập Reina là tốt nhất đấy ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！」
1612 = "「Hả? A!」"
# 【れいな】
# display as 玲奈
# JP: 「すやぁ～　むにゃあ～」
1586 = "「Khò khò~ nhóp nhép~」"
# monologue
# JP: ポーレットの膝の上でくたりと、\nれいなは崩れて寝こけてる。
2572 = "Nằm gọn trên đùi Paulette,\nReina đang ngủ say sưa."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、果報は寝て待て――っ！！？」
1565 = "「Ra là vậy, há miệng chờ sung――!!?」"
# monologue
# JP: （♪～～）
2743 = "（♪～～）"
# monologue
# JP: 真闇姉の携帯が鳴る。
2608 = "Điện thoại của chị Mayami đổ chuông."
# monologue
# JP: 皆が一瞬硬直する中、\nのどかにさえも聞こえる声がゆったり流れる。
2487 = "Giữa lúc mọi người đều cứng đờ trong giây lát, một giọng nói thong thả, thậm chí có phần bình thản vang lên."
# 【真闇】
# display as 真闇
# JP: 「はぁい、もしもし。\nあ――うん。結果ば出たと？」
1652 = "「Vâng, a lô.\nA―― ừm. Có kết quả rồi sao?」"
# monologue
# JP: 言って、こくこく小さな頷き。
2394 = "Nói rồi, chị ấy gật đầu nhè nhẹ."
# 【凪】
# display as 凪
# JP: 「出たばい！　きっと優勝ば――もがっ！？」
1555 = "「Có rồi kìa! Chắc chắn là vô địch――ưm!?」"
# 【ふかみ】
# display as 深美
# JP: 「だめだよ凪ちゃん。静かに聞かなきゃ」
1559 = "「Không được đâu Nagi. Phải giữ im lặng để nghe chứ.」"
# 【真闇】
# display as 真闇
# JP: 「うん。うん。あー、うん。……うん。わかったと。\n――え？　あ、うん。教えてよかよ？」
1660 = "「Ừm. Ừm. A, ừm. ……Ừm. Con hiểu rồi. ――Hả? A, ừm. Cứ cho họ biết cũng được.」"
# monologue
# JP: 日々姫の顔が曇りはじめて、凪の顔色も悪化していく。\n僕も……同じく感じてる。
2525 = "Nét mặt Hibiki bắt đầu tối sầm lại, sắc mặt Nagi cũng trở nên tệ đi. Tôi cũng…… có cùng cảm giác đó."
# monologue
# JP: これはどうにも……\n朗報という口調ではない。
2672 = "Dù có nghĩ thế nào thì…… Giọng điệu này cũng không giống như đang báo tin vui."
# 【真闇】
# display as 真闇
# JP: 「わかった。気ぃつけて戻ってね。あ、せっかくやけん、\nお土産に――ああ、うん。はぁい。お願いします」
1895 = "「Con hiểu rồi. Bố đi đường cẩn thận nhé. A, nhân tiện, mua quà lưu niệm cho―― a, vâng. Vâng. Con nhờ bố nhé.」"
# 【凪】
# display as 凪
# JP: 「もが……もがぁ――」
1625 = "「Ưm…… ưm――」"
# monologue
# JP: （プツっ）
2752 = "（Tút）"
# 【双鉄】
# display as 雙鐵
# JP: 「……どうだった、真闇姉」
1200 = "「……Thế nào rồi, chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「八位。入賞はしたって」
1517 = "「Hạng tám. Lọt vào top những người đoạt giải rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「八位入賞、か」
1899 = "「Lọt vào top 8, sao.」"
# monologue
# JP: なんとも、微妙だ。
2445 = "Thật sự, rất khó nói."
# monologue
# JP: 無論、選外よりは喜ばしいが……
2710 = "Tất nhiên là đáng mừng hơn việc bị trượt, nhưng……"
# 【ふかみ】
# display as 深美
# JP: 「ぁあ――」
# 1627 = "「啊——」" 
# monologue
# JP: ふかみの手が力なく落ち、\n途端にぶはぁ、と凪が大きな息を吐く。
2552 = "Bàn tay Fukami thõng xuống một cách vô lực, và ngay lập tức, Nagi thở hắt ra một hơi thật lớn."
# 【凪】
# display as 凪
# JP: 「はぁあ――\nざぁんねん。優勝ばできんかったとかー」
1912 = "「Haaaa――\nTiếc thật đấy. Không vô địch được sao.」"
# 【ふかみ】
# display as 深美
# JP: 「だ、だけど凪ちゃん。\n世界八位ってことだし、凄いし」
1482 = "「Nhưng, nhưng mà Nagi. Là hạng 8 thế giới đó, tuyệt lắm mà.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと言われれば」
1525 = "「Cậu nói vậy thì cũng đúng.」"
# monologue
# JP: （♪～～）
# 2743 = "（叮～～）" 
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1620 = "「Ôi chà.」"
# monologue
# JP: 喜ぶべきか、悔やむべきか。\n戸惑っている間隙に、またも携帯が鳴り響く。
2413 = "Nên vui mừng, hay nên tiếc nuối. Giữa lúc còn đang bối rối, điện thoại lại một lần nữa đổ chuông."
# monologue
# JP: （し～っ）
2746 = "（Suỵt~）"
# monologue
# JP: 人差し指を唇にやれば、\n凪もふかみもすぐさま黙る。
2613 = "Tôi đặt ngón trỏ lên môi, cả Nagi và Fukami đều lập tức im lặng."
# 【真闇】
# display as 真闇
# JP: 「はい、もしもし、右田一――\nYes,Here is a brewery of “ひとしずく”」
1657 = "「Vâng, a lô, Migita―― Yes, Here is a brewery of \"Hitoshizuku\".」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　[えいご,1]詠語？」
1604 = "「Hả!? Tiếng Eigo (tiếng Anh)?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことは――まさ、か」
1512 = "「Nói vậy tức là―― không, lẽ nào.」"
# 【真闇】
# display as 真闇
# JP: 「Yes――Yes――\nThank you for your Inquiry.BYE」
2000 = "「Yes――Yes――\nThank you for your Inquiry. BYE.」"
# monologue
# JP: （プツっ）
# 2752 = "（掛斷）" 
# 【双鉄】
# display as 雙鐵
# JP: 「注文か？」
1917 = "「Đơn đặt hàng sao?」"
# 【真闇】
# display as 真闇
# JP: 「[えいこく,1]詠国の、プレジデンツファインリカーさんて。\n最低注文は何本からか問い合わせ」
1833 = "「Của hãng President Fine Liquor bên Eikoku (Vương quốc Anh). Họ hỏi xem đơn hàng tối thiểu là từ bao nhiêu chai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「輸出か。僕はまったく未経験だが――\n浅野酒造さんが、確か[めいこく,1]冥国に出荷してるよな」
1699 = "「Xuất khẩu sao. Em hoàn toàn chưa có kinh nghiệm trong chuyện này―― Nhưng hình như hãng rượu Asano có xuất hàng sang Meikoku (Mỹ) thì phải.」"
# 【真闇】
# display as 真闇
# JP: 「やねぇ。詳しいこと聞いとけばよかったねぇ」
1577 = "「Đúng thế nhỉ. Giá như chị hỏi kỹ hơn thì tốt biết mấy.」"
# monologue
# JP: （♪～～）
# 2743 = "（叮～～）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1997 = "「！！？」" 
# 【真闇】
# display as 真闇
# JP: 「はい、もしもし、右田一――あー……んん？\nWait.待って？　Please」
1656 = "「Vâng, a lô, Migita―― a…… hửm?\nWait. Đợi đã? Please.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　真闇姉」
1761 = "「Sao vậy? Chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「ポーちゃん、ちょこっとお願いできる？　フランク語か、\nでなけりゃ、あきらめるしかなか言葉やけん」
1738 = "「Pau-chan, giúp chị một chút được không? Hình như là tiếng Frank (tiếng Pháp), nếu không phải thì đành chịu thua thôi, vì chị chẳng hiểu từ nào cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。じゃ、代わってみます」
1641 = "「A, vâng. Vậy để em nghe máy cho.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃににぃに。\nこれ見て、これ」
1611 = "「Này, anh hai anh hai.\nNhìn này, nhìn cái này đi.」"
# monologue
# JP: 日々姫にぐい、と袖を引かれる。
2523 = "Hibiki giật mạnh tay áo tôi."
# 【凪】
# display as 凪
# JP: 「なになに、なんね？」
1760 = "「Gì thế gì thế, là gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「もう、凪ちゃん。割り込みしたらダメだよう」
1883 = "「Thôi nào, Nagi. Không được chen ngang như thế đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、かまわん。みんなで見よう」
1504 = "「Không sao đâu. Mọi người cùng xem đi.」"
# monologue
# JP: 日々姫が指さすタブレットの画面上には、\nISCの歴代受賞酒のリストが表示されている。
2723 = "Trên màn hình máy tính bảng mà Hibiki đang chỉ vào, hiển thị danh sách các loại rượu từng đoạt giải của ISC qua các năm."
# monologue
# JP: 事前情報に惑わされては、と、\nいままで遮断していたものだが――
2709 = "Vì sợ bị những thông tin trước đó làm phân tâm, nên từ trước đến nay tôi đã cố tình không xem chúng, nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
1955 = "「Cái này là――」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん。にーさん。どぎゃんして\n呆れたような顔しとーと？」
1740 = "「Fukami. Anh hai. Sao hai người lại làm cái mặt ngạc nhiên thế kia?」"
# 【ふかみ】
# display as 深美
# JP: 「だって、これ……すごく偏ってるから。\n[えいこく,1]詠国、フランク、[どっこく,1]髑国、[らんこく,1]乱国、イスパニャ――」
1687 = "「Bởi vì, danh sách này…… thiên vị quá. Eikoku (Vương quốc Anh), Frank (Pháp), Dokkoku (Đức), Rankoku (Hà Lan), Ispania (Tây Ban Nha)――」"
# 【双鉄】
# display as 雙鐵
# JP: 「見事に[おうしゅう,1]鴎州。それも、西部鴎州ばかりだな」
1542 = "「Hoàn toàn là Oushu (Châu Âu). Hơn nữa, toàn là Tây Oushu thôi.」"
# 【凪】
# display as 凪
# JP: 「その、ＩＳＣで評価ばするお酒、\nそこと日ノ本でしか作られとらんの？」
1902 = "「Những loại rượu được ISC đánh giá, chỉ được sản xuất ở những nước đó và Hinomoto thôi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、まさか――西部鴎州以外でも、ウオッカ、\nテキーラ、ラム、ジン……旨い[じょうりゅしゅ,2]蒸留酒はいくらでもある」
1501 = "「Không, làm gì có chuyện đó―― Ngoài Tây Oushu ra, vẫn còn Vodka, Tequila, Rum, Gin…… có biết bao nhiêu loại rượu chưng cất ngon tuyệt mà.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、差別のような何かが？」
1975 = "「Nếu vậy, có phải là do phân biệt đối xử hay gì đó không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもありえん。酒は全て、同じグラスに注がれた状態、\nつまり、完全に周辺情報を遮断されて審査されるから」
1956 = "「Cũng không thể nào. Tất cả các loại rượu đều được rót vào cùng một loại ly, nói cách khác, chúng được đánh giá trong tình trạng hoàn toàn bị che giấu mọi thông tin xung quanh.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら――にぃに。これって――\nひとしずくの八位って」
1957 = "「Nếu vậy―― anh hai. Chuyện này―― Việc Hitoshizuku đạt hạng 8 ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1671 = "「嗯」" 
# monologue
# JP: （♪～～）
# 2743 = "（叮～～）" 
# monologue
# JP: （♪～～）
# 2743 = "（叮～～）" 
# monologue
# JP: ……電話は、止まぬ。
1168 = "……Điện thoại, vẫn không ngừng đổ chuông."
# monologue
# JP: 教えていい、と真闇姉が義父に言っていたのは、\nあの携帯の番号で。
2278 = "Số điện thoại mà chị Mayami bảo cha nuôi có thể tiết lộ, chính là số của chiếc điện thoại di động đó."
# 【双鉄】
# display as 雙鐵
# JP: 「つまりこれは――かなり……凄い。\n偉業というべき、ことかもしれん」
1511 = "「Nói cách khác, điều này―― khá là…… tuyệt vời. Thậm chí có thể gọi là một kỳ tích cũng nên.」"
# 【真闇】
# display as 真闇
# JP: 「うぁぁ～」
1658 = "「Oaaa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「お疲れ様、真闇姉」
1933 = "「Chị vất vả rồi, chị Mayami.」"
# monologue
# JP: 声をかければ、真闇姉は携帯の電源をようやく落とし、\n長ーく体と息とを伸ばす。
2479 = "Khi tôi cất tiếng gọi, chị Mayami cuối cùng cũng tắt nguồn điện thoại, và vươn vai thở hắt ra một hơi thật dài."
# 【真闇】
# display as 真闇
# JP: 「携帯ば教えていいなんて言わんと、\n最初から父さんに丸投げしとけばよかったぁ」
1825 = "「Biết thế chị đã không cho số điện thoại, mà cứ đùn đẩy hết cho bố từ đầu luôn cho rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだな」
1954 = "「Chà, cũng đúng nhỉ.」"
# monologue
# JP: 右田に請われ、婿入りしてきたと聞いている。\n酒問屋としての義父のスキルは、ゆえに当然、超一流だ。
2478 = "Nghe nói ông được nhà Migita mời về làm rể. Do đó, kỹ năng của cha nuôi với tư cách là một người bán buôn rượu, đương nhiên là cực kỳ xuất sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが……\n義父さんも、僕らに伝えたかったのだろう」
1496 = "「Dù là vậy nhưng…… Chắc cha nuôi cũng muốn truyền đạt lại cho chúng ta mà.」"
# 【真闇】
# display as 真闇
# JP: 「あー」
# 1627 = "「啊——」" 
# monologue
# JP: ＩＳＣの八位入賞。\n西鴎州の外では、初の。
2499 = "Hạng 8 ISC. Là loại rượu đầu tiên ngoài khu vực Tây Oushu đạt được thành tích này."
# monologue
# JP: それがどれほど凄いことかを、\n止まない電話は、なにより雄弁に語ってくれた。
2669 = "Tiếng điện thoại reo không ngớt, là minh chứng hùng hồn nhất cho thấy điều đó tuyệt vời đến nhường nào."
# 【真闇】
# display as 真闇
# JP: 「まぁ、うん。\n……そう考えると、嬉しかね」
1637 = "「Chà, ừm.\n……Nghĩ vậy thì, cũng vui nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう考えても、やはり、悔しさも強いのか？」
1985 = "「Dù nghĩ vậy, nhưng quả nhiên sự tiếc nuối vẫn lớn hơn sao?」"
# 【真闇】
# display as 真闇
# JP: 「当然よぉ。優勝しか狙っとらんかったけんね」
1880 = "「Tất nhiên rồi. Chị chỉ nhắm đến chức vô địch thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はは」
1595 = "「Haha.」"
# monologue
# JP: 真闇姉だな、とつくづく思う。\nどうせやるなら、優勝を――
2583 = "Quả đúng là chị Mayami, tôi thầm nghĩ. Đã cất công làm, thì phải giành chức vô địch――"
# monologue
# JP: 口で言うのは簡単だけれど、これほどまでの難関に、\n本気の本気で挑めるものが、果たしてどれほどいるだろう。
2716 = "Nói thì dễ, nhưng với một thử thách khó khăn đến nhường này, rốt cuộc có bao nhiêu người dám thực sự dốc hết sức mình để đương đầu chứ."
# 【真闇】
# display as 真闇
# JP: 「ありゃ、みんなは？」
1673 = "「Ủa, mọi người đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「帰った。ナビにも送らせた」
1795 = "「Về hết rồi. Em cũng bảo Navi đưa họ về rồi.」"
# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ、まぁ、時間も時間やもんねぇ」
1599 = "「Trời ạ, mà thôi, cũng muộn rồi mà nhỉ.」"
# monologue
# JP: 時計の針は、午前三時だ。
2535 = "Kim đồng hồ đã chỉ ba giờ sáng."
# monologue
# JP: 時差が九時間だからええっと……\n詠国は、まだ夜六時ということになる。
2533 = "Chênh lệch múi giờ là chín tiếng, vậy thì…… Bên Eikoku (Vương quốc Anh) mới chỉ sáu giờ tối thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「携帯を切って正解だったな。\nあのままでは、きっと寝かせてももらえなくなる」
1978 = "「Chị tắt điện thoại là đúng đắn đấy. Cứ để vậy thì chắc chắn đêm nay khỏi ngủ luôn.」"
# 【真闇】
# display as 真闇
# JP: 「優勝したら、徹夜で祝杯も大歓迎やったとけどねぇ」
1719 = "「Nếu mà vô địch thì chị rất sẵn lòng thức trắng đêm để nâng ly chúc mừng đấy.」"
# monologue
# JP: 言いつつ、ボトルの口を切る。
2374 = "Vừa nói, chị vừa mở nắp chai."
# monologue
# JP: 酒の匂い。米の匂い。\n真闇姉は、飾り気の無いガラスコップを持ってくる。
2681 = "Mùi rượu. Mùi gạo. Chị Mayami mang ra một chiếc cốc thủy tinh giản dị."
# 【真闇】
# display as 真闇
# JP: 「八位入賞の祝杯だったら、\nコップいっぱいくらいが良かかねぇ」
1821 = "「Nếu là nâng ly chúc mừng cho vị trí thứ 8, thì uống một cốc đầy là được rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。いいな」
1668 = "「Vâng. Tuyệt đấy.」"
# monologue
# JP: 頷けばすぐコップが渡され、\nひとしずくがなみなみ注がれる。
2480 = "Vừa gật đầu, chiếc cốc đã được đưa sang, và Hitoshizuku được rót đầy ăm ắp."
# 【双鉄】
# display as 雙鐵
# JP: 「が――真闇姉。少しだけ祝杯を待って欲しい。\n酒が入ったら、話せぬ話をしたいんだ」
1494 = "「Nhưng mà―― chị Mayami. Khoan hãy nâng ly đã. Em có chuyện muốn nói, chuyện mà nếu có men rượu vào thì em sẽ không thể nói được.」"
# 【真闇】
# display as 真闇
# JP: 「ん？」
1674 = "「Hửm?」"
# monologue
# JP: きょとんとした目が僕へ向く。\n途端に、頭がぐるぐる回る。
2380 = "Đôi mắt tròn xoe ngơ ngác hướng về phía tôi. Ngay lập tức, đầu óc tôi quay cuồng."
# monologue
# JP: このタイミングは、あるいは非常識なのだろうか。\nわからない。経験が無いし、勉強できることでも無いし。
2363 = "Lựa chọn thời điểm này, liệu có phải là thiếu suy nghĩ không. Tôi không biết. Tôi chẳng có kinh nghiệm, mà đây cũng không phải thứ có thể học được."
# 【双鉄】
# display as 雙鐵
# JP: 「大事な話なんだ。\nつまり――僕は、真闇姉を好きだという」
1829 = "「Là một chuyện rất quan trọng. Nói tóm lại―― em thích chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「っ！！！」
1996 = "「!!!」"
# monologue
# JP: アルコール度数90度の一気飲みでもしたかのように、\nボっと、真闇姉が指先まで赤くなる。
2603 = "Như thể vừa nốc cạn một hơi loại rượu mạnh 90 độ, chị Mayami đỏ bừng mặt, lan đến tận đầu ngón tay."
# monologue
# JP: ああ――順番を間違えた。\n間違えたのだが、今さらやりなおせる筈もない。
2339 = "A―― tôi nói sai trình tự mất rồi. Sai thì cũng sai rồi, giờ có muốn làm lại cũng chẳng được."
# 【双鉄】
# display as 雙鐵
# JP: 「好きというのは、異性として、側にいたいという好きだ。\n何故そう思うようになったかというと、気づいたからだ」
1794 = "「Thích ở đây là tình cảm nam nữ, là mong muốn được ở bên cạnh chị. Lý do em bắt đầu nghĩ như vậy, là vì em đã nhận ra.」"
# 【真闇】
# display as 真闇
# JP: 「き、きづい――た？」
1882 = "「Nhận, nhận ra―― sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1671 = "「嗯」" 
# monologue
# JP: 何に？　と瞳が問うてくる。
2387 = "Nhận ra điều gì? Đôi mắt chị như đang gặng hỏi."
# monologue
# JP: 既に酔ってしまったように、\n濡れて揺れてる大きな瞳が。
2386 = "Đôi mắt to tròn, ươn ướt và rung rinh, như thể chị đã say mèm từ lúc nào."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が僕に、恋愛の――\n恋心の告白をしてくれた」
1691 = "「Hibiki đã tỏ tình――\nthổ lộ tình cảm với em.」"
# 【真闇】
# display as 真闇
# JP: 「っ！」
# 1995 = "「！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「そのとき、日々姫は問うてきた。\n右田というなら、自分も同じじゃないのか――と」
1970 = "「Lúc đó, Hibiki đã hỏi em. Nếu lý do là vì nhà Migita, thì chẳng phải bản thân em ấy cũng giống vậy sao――」"
# 【真闇】
# display as 真闇
# JP: 「なにが、右田と？」
1726 = "「Cái gì mà, nhà Migita cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「右田が、恩が理由であるなら。\n真闇姉だけじゃなく自分も、願いを叶えて欲しいと」
1689 = "「Nếu ân huệ của nhà Migita là lý do. Thì không chỉ chị Mayami, em ấy cũng muốn được em thực hiện ước nguyện của mình.」"
# 【真闇】
# display as 真闇
# JP: 「ああ……」
1630 = "「A……」"
# 【双鉄】
# display as 雙鐵
# JP: 「それで僕は疑問に思った。何故僕は、\n真闇姉にだけ、頼らずいようと、思っていたかを」
1686 = "「Và rồi em tự hỏi. Tại sao em, lại luôn nghĩ rằng mình không được dựa dẫm vào chị Mayami chứ.」"
# monologue
# JP: “右田”であることが理由なら、\n日々姫にだって、僕は頼らずいたはずだ。
2400 = "Nếu lý do là vì \"nhà Migita\", thì đáng ra em cũng không được dựa dẫm vào Hibiki mới phải."
# monologue
# JP: けど、真闇姉だけ……\nずっと、例外だと感じてたのは――
2229 = "Nhưng, chỉ riêng chị Mayami…… Em đã luôn cảm thấy chị là một ngoại lệ, là bởi vì――"
# 【双鉄】
# display as 雙鐵
# JP: 「それで、気づいた。義理だの恩だの関係なしに。\n僕は、真闇姉に。僕を認めてもらいたいんだ」
1870 = "「Thế nên, em đã nhận ra. Chẳng liên quan gì đến nghĩa lý hay ân huệ cả. Em, muốn được chị Mayami. Muốn được chị công nhận.」"
# monologue
# JP: 過去形ではなく、現在形で。
2468 = "Không phải ở thì quá khứ, mà là ở thì hiện tại."
# 【双鉄】
# display as 雙鐵
# JP: 「出来る男と思われたいし、格好いいと感じて欲しい。\nだから僕は、真闇姉には、頼っちゃだめだと思ってた」
1786 = "「Em muốn được chị nghĩ là một người đàn ông có năng lực, muốn được chị thấy em thật ngầu. Vì thế nên em mới nghĩ rằng, mình không được phép dựa dẫm vào chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「それ……ば。それっ、って」
1948 = "「Cái đó…… thì. Chuyện đó, là」"
# 【双鉄】
# display as 雙鐵
# JP: 「多分、異性への憧れ程度なのだと思う。\n他に何かが起きていたなら、消し飛んでしまう程度の」
1773 = "「Chắc là, chỉ ở mức độ ngưỡng mộ người khác phái thôi. Nếu có chuyện gì khác xảy ra, thì cũng chỉ đến mức tan biến mất thôi.」"
# 【真闇】
# display as 真闇
# JP: 「あー」
# 1627 = "「啊——」" 
# monologue
# JP: がっかりした声。\nそれにぞわぞわ、心が弾む。
2384 = "Giọng điệu thất vọng của chị ấy. Lại làm trái tim em rộn ràng, xao xuyến."
# monologue
# JP: だけれどやっぱり笑顔の方が見たくって、\n言葉を慌てて継ぎ足していく。
2227 = "Nhưng mà em vẫn muốn nhìn thấy nụ cười của chị hơn, nên vội vàng nói tiếp."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、消し飛びはしなかった。\nどころか、種となり、大きく育った」
1519 = "「Nhưng nó đã không tan biến. Không những thế, nó còn nảy mầm và lớn lên mạnh mẽ.」"
# monologue
# JP: 不意に、猛烈に飲みたくなる。\n恥ずかしいし、いたたまれないし、息苦しい。
2626 = "Đột nhiên, em muốn uống một ngụm rượu thật mạnh. Em đang rất xấu hổ, bồn chồn và gần như nghẹt thở."
# monologue
# JP: だが、素面でだ。\n素面で言わねば、せっかくの気持ちを歪めてしまう。
2225 = "Nhưng phải nói lúc tỉnh táo. Nếu không nói lúc tỉnh táo, thì tình cảm khó khăn lắm mới nhận ra này sẽ bị bóp méo mất."
# 【双鉄】
# display as 雙鐵
# JP: 「一緒に酒を作っていて。たくさん話して、強く感じた。\n僕は真闇姉のことをもっと知りたい。近くに行きたい」
1694 = "「Cùng nhau làm rượu. Nói chuyện rất nhiều, và em cảm nhận rất rõ. Em muốn biết nhiều hơn về chị Mayami. Muốn đến gần chị hơn.」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1671 = "「嗯」" 
# monologue
# JP: 頷き。それだけ。\nだけど、受け入れてもらえた気がして、一歩近づく。
2731 = "Gật đầu. Chỉ có vậy. Nhưng em cảm giác như đã được chấp nhận, nên bước tới một bước."
# monologue
# JP: 胸と胸とがくっつきそうな近くまで。\n真闇姉はそのまま僕を、見上げてくれる。
2490 = "Gần đến mức ngực hai người sắp chạm vào nhau. Chị Mayami cứ thế ngước lên nhìn em."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の前では、どんな我慢もしてほしくない。\n僕は――真闇姉が大好きだから、甘やかしたい」
1785 = "「Trước mặt em, em không muốn chị phải kìm nén bất cứ điều gì. Vì em――rất thích chị Mayami, nên em muốn chiều chuộng chị.」"
# 【真闇】
# display as 真闇
# JP: 「……あの、ね――双ちゃん」
1219 = "「……À, này――Sou-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1995 = "「！」" 
# monologue
# JP: 切羽詰まったような顔。\nひどく、出しづらそうな声。
2412 = "Gương mặt như thể bị dồn vào đường cùng. Giọng nói cất lên đầy khó khăn."
# monologue
# JP: ――血の気が、足に落ちた気がする。
1152 = "――Em cảm thấy như máu trong người lạnh toát."
# 【真闇】
# display as 真闇
# JP: 「恋愛とか……今まで、全然したことないから……\nきっと、うち、めんどくさくて、ややこしかとよ？」
1688 = "「Chuyện yêu đương……từ trước đến giờ chị chưa từng trải qua…… Chắc chắn, chị sẽ rất phiền phức và rắc rối đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことなら、僕も同じだ。\n面倒でややこしくても、僕は、真闇姉と恋をしたい」
1953 = "「Chuyện đó thì em cũng giống chị thôi. Dù có phiền phức và rắc rối, em vẫn muốn yêu chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「あ――」
# 1627 = "「啊——」" 
# monologue
# JP: 小さな頷き。\n真闇姉の唇が、声を出さずに形を変える。
2391 = "Một cái gật đầu nhẹ. Đôi môi chị Mayami mấp máy nhưng không phát ra thành tiếng."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉。\n僕は真闇姉に、僕の恋人になって欲しいと望んでいる」
1893 = "「Chị Mayami. Em mong chị Mayami sẽ trở thành người yêu của em.」"
# 【真闇】
# display as 真闇
# JP: 「うち――わたし、は」
1588 = "「Chị――chị」"
# monologue
# JP: 喉が、動く。\nごくりと大きな音をたて、真闇姉がつばを飲み落とす。
2390 = "Cổ họng chị ấy chuyển động. Chị Mayami nuốt nước bọt, phát ra một tiếng ực rõ to."
# monologue
# JP: 震えている、あの真闇姉が。\nそれでも少しも、瞳は僕から逸らさずにいる。
2475 = "Chị Mayami đang run rẩy. Dù vậy, ánh mắt chị ấy không hề rời khỏi em."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの、こと。大好きやけん。\n恋人に、ずっと、してほしか――」
1590 = "「Chị. Rất thích Sou-chan. Chị vẫn luôn muốn, trở thành người yêu của em――」"
# 【凪】
# display as 凪
# JP: 「やったばーい！」
1705 = "「Tuyệt quá rồi nè!」"
# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃんっ！！？」
1654 = "「Này!? Nagi!!?」"
# monologue
# JP: （ドドドドドっ！）
2744 = "（Rầm rầm rầm rầm rầm!）"
# 【真闇】
# display as 雙鐵＆真闇
# JP: 『「うおっ！？」\n「きゃっ！？」』
2007 = "『「Uây!?」\n「Á!?」』"
# monologue
# JP: 雪崩れ込む。
2172 = "Cả đám ùa vào."
# monologue
# JP: 凪が、ふかみが、ハチロクが、\n日々姫にポーレットに、れいなまでもが。
2267 = "Nagi, Fukami, Hachiroku, Hibiki, Paulette, và cả Reina nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「な――あっ――」
1947 = "「Chuyện――á――」"
# 【ハチロク】
# display as 八六
# JP: 「わ、わたくしは\n皆を止めようとしたのでございますよ！？」
1771 = "「E-Em\nđã cố cản mọi người lại rồi đấy ạ!?」"
# 【凪】
# display as 凪
# JP: 「止めるフリして、一番熱心に見てたばい」
1984 = "「Ngoài miệng thì bảo cản, nhưng mà chị lại là người xem chăm chú nhất đó nha」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの。わたしも、帰ろうってして。でも、\nナビさんが、『見逃すと損ですよ』っていって、それで」
1964 = "「A, à. Em cũng, định đi về rồi. Nhưng mà, Navi bảo là, 『Bỏ lỡ thì phí lắm đó』, nên là」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビが？　ああ……そうか――\n僕はおそらく、わかりやすい類の人間なのだな」
1999 = "「Navi á? A……Ra vậy―― Có lẽ em thuộc tuýp người dễ đoán quá nhỉ.」"
# monologue
# JP: こっくり、頷く。\n無言で、揃って――ぽかんとしてるれいなを除いて。
2485 = "Mọi người đồng loạt gật đầu. Trong im lặng, tất cả cùng lúc――ngoại trừ Reina đang ngơ ngác."
# 【真闇】
# display as 真闇
# JP: 「平気よ。双ちゃん。\nそういうとこも、みぃんなまとめて好きやけん」
1850 = "「Không sao đâu. Sou-chan. Điểm đó của em, mọi người cũng đều thích cả mà.」"
# 【凪】
# display as 凪
# JP: 「おおお！」
1619 = "「Ồ ồ ồ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、良かった」
1973 = "「Vậy thì, tốt rồi.」"
# monologue
# JP: いささか驚いてしまったが、\n報告をする手間がはぶけたというものだ。
2715 = "Dù có hơi bất ngờ một chút, nhưng cũng đỡ mất công phải đi thông báo cho mọi người."
# monologue
# JP: ああ、それに――
2342 = "À, hơn nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ。\n祝杯を、共に願えるか？」
1843 = "「Nhân dịp này.\nMọi người cùng nâng ly chúc mừng nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んで。ISCと、恋の話と。\nうふふ、ダブルの祝杯ですね」
1714 = "「Vâng, rất sẵn lòng ạ. Chúc mừng ISC, và cả chuyện tình cảm nữa. Ufufu, nâng ly chúc mừng kép luôn nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、おめでとうございます」
1986 = "「Ngài Soutetsu, xin chúc mừng ngài.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ――にぃにも。おめでとう」
1982 = "「Chị hai――và cả anh hai nữa. Chúc mừng hai người.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、おいわいごとなんですねぇ！\nおめでとうですぅ」
1601 = "「Ehehe, chuyện đáng chúc mừng nhỉ! Chúc mừng hai người nha~」"
# 【凪】
# display as 凪
# JP: 「ラムネどこばい？　うちたちお酒ばまだのめんばい」
1753 = "「Nước Ramune đâu rồi nè? Tụi em chưa được uống rượu đâu nha.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、わたし、お手伝いします」
1646 = "「A, em, em sẽ phụ một tay ạ.」"
# monologue
# JP: 年長組はひとしずく、学園生たちは蒸気ラムネで、\nそれぞれコップをなみなみ満たす。
2423 = "Nhóm người lớn thì dùng Hitoshizuku, còn nhóm học sinh thì dùng nước Ramune hơi nước, rót đầy tràn vào cốc của mỗi người."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは真水。れいなは軽油で間違いないな。\n――っと？」
1549 = "「Hachiroku thì nước lọc. Reina thì dầu diesel, không sai chứ. ――Hửm?」"
# monologue
# JP: なんだ、肝心の真闇姉がグラスを手放してしまってる。
2235 = "Sao vậy, nhân vật chính là chị Mayami lại bỏ ly xuống mất rồi."
# 【真闇】
# display as 真闇
# JP: 「あ、双ちゃん。違くて――ええと……\nあの……その、ね？」
1645 = "「A, Sou-chan. Không phải đâu――ừm thì…… À thì……chuyện đó, nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1626 = "「Hửm?」"
# monologue
# JP: 耳打ち。\n途端、耳から僕は酔わされる。
2378 = "Chị ấy thì thầm vào tai em. Ngay lập tức, em như bị chuốc say từ đôi tai."
# monologue
# JP: が――それが真闇姉の願いなら、\nもちろん、僕は叶えるのみだ。
2221 = "Nhưng――nếu đó là mong muốn của chị Mayami, tất nhiên, em chỉ có việc đáp ứng thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、ひとしずくのＩＳＣ８位入賞と、\n僕と真闇姉との恋愛成就とを祝って、乾杯！」
1977 = "「Vậy thì, chúc mừng Hitoshizuku đạt giải 8 tại ISC, và chúc mừng tình yêu của em và chị Mayami đã đơm hoa kết trái, cạn ly!」"
# 【ハチロク】
# display as 日日姬＆八六
# JP: 『「かんぱーい！」\n「かんぱーい！」』
2005 = "『「Cạn ly!」\n「Cạn ly!」』"
# monologue
# JP: 乾杯の声、\nちりんちりんと鳴るグラスたち。
2199 = "Tiếng hô cạn ly, cùng tiếng ly thủy tinh chạm nhau leng keng."
# monologue
# JP: その中僕は、\nひとり一気にコップの中身を口へと移す。
2448 = "Trong lúc đó, em\nmột mình uống cạn ly rượu vào miệng."
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　まさか――」
1607 = "「Hả!? Lẽ nào――」"
# 【れいな】
# display as 玲奈
# JP: 「なになに、なにが起きるんですかぁ？」
1762 = "「Sao sao, có chuyện gì xảy ra vậy ạ?」"
# monologue
# JP: 祝いの酒を、真闇姉へと。
2462 = "Truyền chén rượu mừng, sang cho chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「んっ――んっ――むっ」
1659 = "「Ưm――ưm――ưm」"
# monologue
# JP: 唇同士を密着させて、\nゆるゆる、僕は流しこむ。
2455 = "Hai đôi môi dính chặt vào nhau, em từ từ, truyền rượu sang."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、いるか？」
1891 = "「Chị Mayami, có ở đó không?」"
# 【真闇】
# display as 真闇
# JP: 「おるとよー」
1696 = "「Chị đây~」"
# monologue
# JP: 呼べばすぐさま、答えが返る。\nが、姿が見えるのはしばらくしてから。
2450 = "Vừa gọi một tiếng, đã có tiếng đáp lại ngay lập tức. Nhưng phải một lúc sau mới thấy bóng dáng chị ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「なんとまぁ、醸造タンクの中にいたのか」
1848 = "「Trời ạ, chị chui vào trong bồn ủ rượu luôn sao.」"
# 【真闇】
# display as 真闇
# JP: 「新しか子に、タンクの清掃ば教えとったけん」
1698 = "「Chị đang dạy mấy đứa mới cách vệ sinh bồn ủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1564 = "「Ra là vậy.」"
# monologue
# JP: 新入りはまず掃除番から。
2502 = "Lính mới thì bắt đầu từ việc dọn dẹp trước."
# monologue
# JP: 鉄の掟は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が相手であっても、\n変わらず適用されるらしい。
2687 = "Quy tắc thép này, dù đối phương có là \\x%lレイルロオド;#00ffc040;Railord%l;#; đi chăng nữa, có vẻ vẫn được áp dụng không ngoại lệ."
# 【真闇】
# display as 真闇
# JP: 「ところで、何と？」
1734 = "「Thế, có chuyện gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだった。\nポーレットからの連絡なのだが――」
1643 = "「À, đúng rồi.\nPaulette có liên lạc báo rằng――」"
# 【真闇】
# display as 真闇
# JP: 「焼酎\x%l列車;#00ffc040;列車%l;#;、また参加者が増えてくれたと？」
1768 = "「\\x%l列車;#00ffc040;Tàu%l;#; shochu, lại có thêm người tham gia sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。[さが,1]嵯峨県は[からつ,1]殻津鉄道と[こうぶ,1]甲部酒造さんのコンビだ」
1830 = "「Ừ. Là sự kết hợp giữa Đường sắt Karatsu và Xưởng rượu Koubu ở tỉnh Saga.」"
# 【真闇】
# display as 真闇
# JP: 「ああ、[いかい,1]異界シリーズの[こうぶ,1]甲部さん。\nって、え？　[さが,1]嵯峨県ゆうたら」
1678 = "「À, xưởng Koubu của dòng rượu Ikai đó hả. Khoan, hả? Nhắc tới tỉnh Saga thì」"
# monologue
# JP: 真闇姉が指を折る。
2605 = "Chị Mayami gập ngón tay lại đếm."
# monologue
# JP: 片手の全てを折りたたみ、\nそして、一、ニ――
2382 = "Gập hết một bàn tay,\nrồi, một, hai――"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、七県めの参加だ。\nこれで九洲全県に、焼酎\x%l列車;#00ffc040;列車%l;#;が走ることになる」
1735 = "「Đúng vậy, tỉnh thứ bảy tham gia rồi. Thế này thì \\x%l列車;#00ffc040;tàu%l;#; shochu sẽ chạy khắp toàn bộ các tỉnh ở Kyushu luôn.」"
# 【真闇】
# display as 真闇
# JP: 「あー」
# 1627 = "「啊——」" 
# monologue
# JP: 感嘆、と。\n真闇姉は、その言葉をまさに体現している。
2615 = "Kinh ngạc, và thán phục. Chị Mayami đang thể hiện chính xác những từ đó."
# 【真闇】
# display as 真闇
# JP: 「すごかよねぇ。ほんまこつ、\n九洲ぐるり、焼酎\x%l列車;#00ffc040;列車%l;#;でめぐれる日も近かとかもねぇ」
1708 = "「Đỉnh thật đấy. Cứ đà này, ngày mà \\x%l列車;#00ffc040;tàu%l;#; shochu chạy một vòng quanh Kyushu chắc cũng không còn xa nữa đâu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットはそのつもりのようだ。\nまずは、[せんだい,1]千内までを復線させると」
1856 = "「Paulette có vẻ cũng định như vậy. Trước mắt, cô ấy bảo sẽ khôi phục lại tuyến đường đến tận Sendai.」"
# 【真闇】
# display as 真闇
# JP: 「あー、\x%lエアクラ;#00ffc040;エアクラ%l;#;さんが出資かなんかしよると？」
1649 = "「A, công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; tài trợ vốn hay gì sao?」"
# monologue
# JP: いつもと同様、その推測も的を射ている。
2326 = "Vẫn như mọi khi, suy đoán đó hoàn toàn chính xác."
# monologue
# JP: ひとしずくが一気に世界的知名度を得た影響は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社の判断にまで、及んだのだから。
2263 = "Tầm ảnh hưởng từ việc Hitoshizuku bất ngờ nổi tiếng trên toàn thế giới, đã tác động đến cả quyết định của công ty \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「新工場は千内で確定したという話だ。\n結果としては、三方一両得となったのではなかろうか」
1813 = "「Nghe nói nhà máy mới đã được chốt xây ở Sendai rồi. Kết quả là, cả ba bên đều có lợi mà.」"
# monologue
# JP: うんうんと何度も頷き、\nそして、真闇姉はまた感嘆の息を吐く。
2599 = "Chị Mayami gật gù liên tục, rồi lại thở ra một hơi cảm thán."
# 【真闇】
# display as 真闇
# JP: 「……すごかとねぇ。\n物事は、動くときには一気にぐわんて動きよるねぇ」
1209 = "「……Giỏi thật đấy. Mọi chuyện, một khi đã chuyển động thì sẽ diễn ra nhanh chóng đến chóng mặt luôn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当にだな。と、いうことでポーレットから、\nさらなる話を預かってきている」
1727 = "「Đúng là vậy. Và, Paulette còn gửi gắm thêm một chuyện nữa.」"
# monologue
# JP: 履歴書、というか身上書。\n分厚い束をまとめて渡せば、真闇姉の目が丸くなる。
2419 = "Sơ yếu lý lịch, hay đúng hơn là hồ sơ cá nhân. Khi em đưa cho chị Mayami một xấp dày cộp, mắt chị ấy tròn xoe."
# 【真闇】
# display as 真闇
# JP: 「これ……青か目の――\n外国の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と？」
1950 = "「Đây là……mắt xanh―― \\x%lレイルロオド;#00ffc040;Railord%l;#; nước ngoài sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。研修をさせて欲しいとの希望が殺到している。\n特に、[えいこく,1]詠国の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が多いそうだぞ」
1662 = "「Ừm. Đơn xin đến thực tập đang đổ về nườm nượp. Đặc biệt là có rất nhiều \\x%lレイルロオド;#00ffc040;Railord%l;#; đến từ Anh Quốc.」"
# 【真闇】
# display as 真闇
# JP: 「[えいこく,1]詠国の」
1905 = "「Anh Quốc á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにせ、鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の発祥の地だ。\n大廃線後、楽隠居をしていた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も多いらしい」
1877 = "「Dù sao thì, đó cũng là nơi bắt nguồn của đường sắt và \\x%lレイルロオド;#00ffc040;Railord%l;#; mà. Sau đợt đại bãi bỏ tuyến, có vẻ cũng có rất nhiều \\x%lレイルロオド;#00ffc040;Railord%l;#; lui về ở ẩn.」"
# 【真闇】
# display as 真闇
# JP: 「はぁぁ……」
1634 = "「Hảảả……」"
# 【双鉄】
# display as 雙鐵
# JP: 「まずはテストケースとして一体。\n真闇姉が好きに選んで構わんそうだ」
1540 = "「Trước mắt sẽ chọn một người làm trường hợp thử nghiệm. Chị Mayami cứ thoải mái chọn người mình thích là được.」"
# 【真闇】
# display as 真闇
# JP: 「好きに……ゆーても――」
1743 = "「Dù em có bảo là……thoải mái chọn――」"
# monologue
# JP: パラパラと、書類をめくり、\nほどなく真闇姉はお手上げをする。
2612 = "Lật lật vài trang hồ sơ, chẳng mấy chốc chị Mayami đã bó tay."
# 【真闇】
# display as 真闇
# JP: 「選べんよ。わからんもん。\n双ちゃんとポーちゃんのおすすめは？」
1799 = "「Chị không chọn được đâu. Chị có hiểu gì đâu chứ. Sou-chan và Pau-chan có đề xuất ai không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もわからん。が、ポーレット、ハチロク、れいなは、\n『Ｆ・スコッティ』という\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を推していた」
1776 = "「Em cũng không rõ. Nhưng mà, Paulette, Hachiroku và Reina, đều đề cử một 『F. Scotty』.」"
# 【真闇】
# display as 真闇
# JP: 「やったら、その子で。\n受け入れ体制のことやなんやら、先様と相談せんとね」
1976 = "「Vậy thì, chọn cô bé đó đi. Chắc là phải bàn bạc với bên kia về quy trình tiếp nhận và mấy thứ khác nữa nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「手配しておこう。\nっと……ひとまずはこんなところかな」
1778 = "「Để em sắp xếp cho. Ừm……trước mắt thì chắc là đến đây thôi.」"
# 【真闇】
# display as 真闇
# JP: 「はぁぁ」
1913 = "「Hảảả」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 1620 = "「哦喲」" 
# monologue
# JP: くったりと、真闇姉が僕に体を預けてくる。\n……この忙しさだ、無理もなかろう。
2601 = "Chị Mayami mệt mỏi dựa hẳn người vào em. ……Bận rộn đến mức này, cũng không trách được."
# monologue
# JP: 蔵人たちの目は気になるが、\n後ろ頭をゆっくり撫でる。
2712 = "Dù hơi để ý ánh mắt của những người thợ nấu rượu, nhưng em vẫn nhẹ nhàng xoa đầu chị ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「代わるか？\n掃除番の仕事であれば、僕にも教えられる」
1779 = "「Để em thay chị nhé? Nếu là việc hướng dẫn dọn dẹp thì em cũng làm được.」"
# 【真闇】
# display as 真闇
# JP: 「んーん。へーき。\n新しか流れば落ち着くまでの苦労やし」
1502 = "「Không sao. Chị ổn mà. Chỉ vất vả cho đến khi luồng gió mới này đi vào quỹ đạo thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「新しい流れ、か――」
1818 = "「Luồng gió mới, sao――」"
# monologue
# JP: 確かに、来ている。\n僕らの想像していたよりも、ずっと大きく、強い流れが。
2505 = "Chắc chắn là nó đang đến. Một luồng gió lớn và mạnh mẽ hơn rất nhiều so với những gì chúng em từng tưởng tượng."
# 【双鉄】
# display as 雙鐵
# JP: 「……文字通りに精髄だったのだな。\nただのひとしずくが、これほど大きな流れとなるとは」
1213 = "「……Đúng là tinh túy theo đúng nghĩa đen nhỉ. Không ngờ chỉ một giọt Hitoshizuku lại có thể tạo ra luồng gió lớn đến thế này.」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんと大きな流れも、ゆーたら――\nひとしずく、ひとしずくの集まりやけん」
1486 = "「Dù luồng gió có lớn đến đâu, nói cho cùng―― cũng là sự tích tụ của từng giọt, từng giọt một mà ra thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1177 = "「――Ừm.」"
# monologue
# JP: 本当にそうだと、しみじみ感じる。\n僕というひとしずく、真闇姉というひとしずく。
2619 = "Em cảm nhận sâu sắc rằng điều đó hoàn toàn đúng. Một giọt mang tên em, một giọt mang tên chị Mayami."
# monologue
# JP: ハチロク、日々姫、ポーレット、れいな、凪、ふかみ――\nたくさんの思いが、しずくが、今の流れを作ってくれたと。
2252 = "Hachiroku, Hibiki, Paulette, Reina, Nagi, Fukami―― Rất nhiều tâm tư, rất nhiều giọt nước đã tạo nên luồng gió hiện tại."
# 【双鉄】
# display as 雙鐵
# JP: 「流れからきっと、またいくつものひとしずくがわかれ、\nそれがまた、さらなる流れを産み出していく」
1861 = "「Từ luồng gió này chắc chắn sẽ lại tách ra thành vô số giọt nước khác, và chúng sẽ lại tạo ra những luồng gió mới mạnh mẽ hơn.」"
# monologue
# JP: 鉄道も、酒造りも。\nきっと全てが、そうして変わっていくものだろう。
2185 = "Cả đường sắt, lẫn việc nấu rượu. Chắc chắn mọi thứ đều sẽ thay đổi theo cách như vậy."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん」
1921 = "「Nhỉ? Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っ！」
1621 = "「Hửm? ――!」"
# monologue
# JP: かすめるような、一瞬のキス。
2654 = "Một nụ hôn phớt qua trong khoảnh khắc."
# monologue
# JP: 熱っぽい唇はそのままそっと、\n僕の耳元によせられる。
2563 = "Đôi môi nóng hổi ấy cứ thế nhẹ nhàng, ghé sát vào tai em."
# 【真闇】
# display as 真闇
# JP: 「うちらも、つくろ？\nふたりだけの、新しか流れ」
1592 = "「Chúng mình cũng tạo ra nhé? Một luồng gió mới, của riêng hai chúng mình.」"
# monologue
# JP: 大歓迎だ。\n是非も無い。
2579 = "Hoàn toàn hoan nghênh.\nKhông có lý do gì để từ chối."
# monologue
# JP: が、今は昼間で、蔵の中。\n真闇姉の望みにすぐには、応えられない。から――
2243 = "Nhưng, bây giờ đang là ban ngày, lại ở trong xưởng rượu. Em không thể đáp ứng mong muốn của chị Mayami ngay lập tức được. Thế nên――"
# 【真闇】
# display as 真闇
# JP: 「あっ――」
# 1627 = "「啊——」" 
# monologue
# JP: 今度は僕からキスをして、\n真闇姉へと、言葉の代わりの答えを返す。
2671 = "Lần này em chủ động hôn, như một câu trả lời thay cho lời nói gửi đến chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「んっ！」
1672 = "「Ưm!」"
# monologue
# JP: 伝わる。\nだから、僕も受け取る。
2442 = "Đã truyền đạt được.\nVì vậy, em cũng đón nhận."
# monologue
# JP: 想いが、熱が、\n大好きだという気持ちによって、蒸留される。
2474 = "Tâm tư, sự nồng nhiệt, đang được chưng cất bởi tình cảm vô bờ bến."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1715 = "「Tốt!」"
# monologue
# JP: そうして、それはひとしずくとなり――
2632 = "Cứ thế, nó sẽ trở thành một giọt tinh túy――"
# monologue
# JP: 新しい命を、つなぐのだ。
2557 = "Nuôi dưỡng mầm sống mới."
