# monologue
# JP: きょとんとした目が僕へ向く。\n途端に、頭がぐるぐる回る。
2380 = "她就那樣愣愣地瞧著我。一瞬間，我的大腦亂作一團。" 

# monologue
# JP: このタイミングは、あるいは非常識なのだろうか。\nわからない。経験が無いし、勉強できることでも無いし。
2363 = "在這種時候說出口，會不會有點太沒常識了。我不知道。我既沒有經驗，而且也找不到地方去學習。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大事な話なんだ。\nつまり――僕は、真闇姉を好きだという」
1829 = "「是很重要的事。也就是——我喜歡真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「っ！！！」
1996 = "「！！！」" 

# monologue
# JP: アルコール度数90度の一気飲みでもしたかのように、\nボっと、真闇姉が指先まで赤くなる。
2603 = "真闇姐就像是一口氣喝了酒精度９０度的烈酒一樣，一下子從臉紅到指尖。" 

# monologue
# JP: ああ――順番を間違えた。\n間違えたのだが、今さらやりなおせる筈もない。
2339 = "啊——搞錯順序了。但就算搞錯了，事到如今可沒辦法再從頭來過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「好きというのは、異性として、側にいたいという好きだ。\n何故そう思うようになったかというと、気づいたからだ」
1794 = "「我說的喜歡，是作為異性的、能夠長相廝守的那種喜歡。因為我已經發現，自己為什麼會有這樣的念頭了」" 

# 【真闇】
# display as 真闇
# JP: 「き、きづい――た？」
1882 = "「發、發現——？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1671 = "「嗯」" 

# monologue
# JP: 何に？　と瞳が問うてくる。
2387 = "她用眼神問我“為什麼”。" 

# monologue
# JP: 既に酔ってしまったように、\n濡れて揺れてる大きな瞳が。
2386 = "她水靈靈的雙眼就像是已經喝醉了一般迷離。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が僕に、恋愛の――\n恋心の告白をしてくれた」
1691 = "「因為日日姬跟我坦白了——她對我的心意」" 

# 【真闇】
# display as 真闇
# JP: 「っ！」
# 1995 = "「！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとき、日々姫は問うてきた。\n右田というなら、自分も同じじゃないのか――と」
1970 = "「那個時候，日日姬問我。既然都是姓右田，那麼她自己不也是一樣的嗎——」" 

# 【真闇】
# display as 真闇
# JP: 「なにが、右田と？」
1726 = "「姓右田怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田が、恩が理由であるなら。\n真闇姉だけじゃなく自分も、願いを叶えて欲しいと」
1689 = "「因為右田對我有恩。她希望不僅是真闇姐，而是讓我也能實現她的願望」" 

# 【真闇】
# display as 真闇
# JP: 「ああ……」
1630 = "「啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで僕は疑問に思った。何故僕は、\n真闇姉にだけ、頼らずいようと、思っていたかを」
1686 = "「因此我產生了疑問。我為什麼唯獨不想依賴真闇姐呢」" 

# monologue
# JP: “右田”であることが理由なら、\n日々姫にだって、僕は頼らずいたはずだ。
2400 = "如果理由是因為“右田”的話，那我應該也不會依賴日日姬的。" 

# monologue
# JP: けど、真闇姉だけ……\nずっと、例外だと感じてたのは――
2229 = "但是唯獨真闇姐……我一直覺得她是例外的理由是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで、気づいた。義理だの恩だの関係なしに。\n僕は、真闇姉に。僕を認めてもらいたいんだ」
1870 = "「然後，我發現了。這和人情啊恩義啊之類的無關。我希望能得到真闇姐的認可」" 

# monologue
# JP: 過去形ではなく、現在形で。
2468 = "我所說的不是過去，而是現在。" 

# 【双鉄】
# display as 雙鐵
# JP: 「出来る男と思われたいし、格好いいと感じて欲しい。\nだから僕は、真闇姉には、頼っちゃだめだと思ってた」
1786 = "「我希望你認為我是有能力的男人，希望你覺得我帥氣。所以我覺得不能依賴真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「それ……ば。それっ、って」
1948 = "「這……個。這是說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多分、異性への憧れ程度なのだと思う。\n他に何かが起きていたなら、消し飛んでしまう程度の」
1773 = "「我一直以為這僅僅只是出於對異性的憧憬。停留在發生其他的什麼事會馬上煙消雲散的程度」" 

# 【真闇】
# display as 真闇
# JP: 「あー」
# 1627 = "「啊——」" 

# monologue
# JP: がっかりした声。\nそれにぞわぞわ、心が弾む。
2384 = "她氣餒的聲音讓我覺得萬分激動。" 

# monologue
# JP: だけれどやっぱり笑顔の方が見たくって、\n言葉を慌てて継ぎ足していく。
2227 = "但我想看的果然還是她的笑容，因此我急忙繼續補充道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、消し飛びはしなかった。\nどころか、種となり、大きく育った」
1519 = "「但是沒有。不僅如此反而還生根發芽，越來越壯大了」" 

# monologue
# JP: 不意に、猛烈に飲みたくなる。\n恥ずかしいし、いたたまれないし、息苦しい。
2626 = "突然很想猛幹一口酒。我現在又害羞又緊張，幾乎無法呼吸，簡直想找個洞鑽進去。" 

# monologue
# JP: だが、素面でだ。\n素面で言わねば、せっかくの気持ちを歪めてしまう。
2225 = "但如果不在清醒的時候說的話，難得的心意會被歪曲的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一緒に酒を作っていて。たくさん話して、強く感じた。\n僕は真闇姉のことをもっと知りたい。近くに行きたい」
1694 = "「在和你一起釀酒、和你說了這麼多話後，我迫切覺得想要更多地了解真闇姐、想要接近你」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 1671 = "「嗯」" 

# monologue
# JP: 頷き。それだけ。\nだけど、受け入れてもらえた気がして、一歩近づく。
2731 = "點頭。僅此而已。但我覺得她接受了我，於是我靠近了一步。" 

# monologue
# JP: 胸と胸とがくっつきそうな近くまで。\n真闇姉はそのまま僕を、見上げてくれる。
2490 = "接近到胸口都要貼在一起的距離。真闇姐沒有動，只是抬頭看著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の前では、どんな我慢もしてほしくない。\n僕は――真闇姉が大好きだから、甘やかしたい」
1785 = "「我希望你在我面前不要忍耐。因為我——喜歡真闇姐，所以我想嬌縱你」" 

# 【真闇】
# display as 真闇
# JP: 「……あの、ね――双ちゃん」
1219 = "「……那個，啊——小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1995 = "「！」" 

# monologue
# JP: 切羽詰まったような顔。\nひどく、出しづらそうな声。
2412 = "就像是走投無路了一般的表情。難以啟齒般的聲音。" 

# monologue
# JP: ――血の気が、足に落ちた気がする。
1152 = "——我感覺自己身體都涼了半截。" 

# 【真闇】
# display as 真闇
# JP: 「恋愛とか……今まで、全然したことないから……\nきっと、うち、めんどくさくて、ややこしかとよ？」
1688 = "「因為之前……我從來沒有戀愛過……所以我肯定會特麻煩，特煩人的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことなら、僕も同じだ。\n面倒でややこしくても、僕は、真闇姉と恋をしたい」
1953 = "「這個我也一樣。哪怕又麻煩又煩人，也不會打消我想和真闇姐談戀愛的想法」" 

# 【真闇】
# display as 真闇
# JP: 「あ――」
# 1627 = "「啊——」" 

# monologue
# JP: 小さな頷き。\n真闇姉の唇が、声を出さずに形を変える。
2391 = "她輕輕地點頭。真闇姐的嘴唇開開合合但是並沒出聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉。\n僕は真闇姉に、僕の恋人になって欲しいと望んでいる」
1893 = "「真闇姐，我希望你成為我的戀人」" 

# 【真闇】
# display as 真闇
# JP: 「うち――わたし、は」
1588 = "「咱——我」" 

# monologue
# JP: 喉が、動く。\nごくりと大きな音をたて、真闇姉がつばを飲み落とす。
2390 = "她的喉嚨在動。真闇姐發出很響亮的“咕嚕”一聲咽了口唾沫。" 

# monologue
# JP: 震えている、あの真闇姉が。\nそれでも少しも、瞳は僕から逸らさずにいる。
2475 = "我的那位真闇姐居然在顫抖。儘管如此，她的視線也沒有從我身上離開。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの、こと。大好きやけん。\n恋人に、ずっと、してほしか――」
1590 = "「咱也喜歡小雙。咱也一直想當你的戀人——」" 

# 【凪】
# display as 凪
# JP: 「やったばーい！」
1705 = "「太好了咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃんっ！！？」
1654 = "「喂！？小凪！！？」" 

# monologue
# JP: （ドドドドドっ！）
2744 = "（咚咚咚咚咚！）" 

# 【真闇】
# display as 雙鐵＆真闇
# JP: 『「うおっ！？」\n「きゃっ！？」』
2007 = "『「噢！？」\\n「呀！？」』" 

# monologue
# JP: 雪崩れ込む。
2172 = "一群人一擁而入。" 

# monologue
# JP: 凪が、ふかみが、ハチロクが、\n日々姫にポーレットに、れいなまでもが。
2267 = "凪、深美、八六、日日姬和波萊特，甚至還有玲奈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「な――あっ――」
1947 = "「這——啊——」" 

# 【ハチロク】
# display as 八六
# JP: 「わ、わたくしは\n皆を止めようとしたのでございますよ！？」
1771 = "「我、我可是阻止過她們了哦！？」" 

# 【凪】
# display as 凪
# JP: 「止めるフリして、一番熱心に見てたばい」
1984 = "「雖然表面上阻止，不過她才是最積極的一個」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、あの。わたしも、帰ろうってして。でも、\nナビさんが、『見逃すと損ですよ』っていって、それで」
1964 = "「那、那個。我也，想要回去的。但是，Ｎａｖｉ說“這要是錯過了就虧大了”，所以」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビが？　ああ……そうか――\n僕はおそらく、わかりやすい類の人間なのだな」
1999 = "「Ｎａｖｉ？啊……是嗎——我或許真是很好懂的那一類人啊」" 

# monologue
# JP: こっくり、頷く。\n無言で、揃って――ぽかんとしてるれいなを除いて。
2485 = "所有人不約而同地，默默地慢慢點頭——除了在發呆的玲奈。" 

# 【真闇】
# display as 真闇
# JP: 「平気よ。双ちゃん。\nそういうとこも、みぃんなまとめて好きやけん」
1850 = "「沒關係。小雙。大家都很喜歡你這一點」" 

# 【凪】
# display as 凪
# JP: 「おおお！」
1619 = "「哦哦哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、良かった」
1973 = "「那就好」" 

# monologue
# JP: いささか驚いてしまったが、\n報告をする手間がはぶけたというものだ。
2715 = "雖然有點驚訝，但也省了專程告訴她們的工夫。" 

# monologue
# JP: ああ、それに――
2342 = "啊，而且——" 

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ。\n祝杯を、共に願えるか？」
1843 = "「機會難得。大家一起慶祝怎麼樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んで。ISCと、恋の話と。\nうふふ、ダブルの祝杯ですね」
1714 = "「好的，我很樂意。ＩＳＣ，還有情侶誕生。唔呵呵，為好事成雙慶祝」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、おめでとうございます」
1986 = "「雙鐵少爺，恭喜您」" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ――にぃにも。おめでとう」
1982 = "「阿姐——還有阿哥，恭喜你們」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、おいわいごとなんですねぇ！\nおめでとうですぅ」
1601 = "「哎嘿嘿，真值得慶祝呢！恭喜你們呀」" 

# 【凪】
# display as 凪
# JP: 「ラムネどこばい？　うちたちお酒ばまだのめんばい」
1753 = "「彈珠汽水呢？咱們還不能喝酒咧」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、わたし、お手伝いします」
1646 = "「啊，我來幫忙」" 

# monologue
# JP: 年長組はひとしずく、学園生たちは蒸気ラムネで、\nそれぞれコップをなみなみ満たす。
2423 = "年長組的杯裡斟滿凝露，而學生們的杯子裡則是滿上了蒸汽汽水。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは真水。れいなは軽油で間違いないな。\n――っと？」
1549 = "「八六是淡水。玲奈是柴油，沒錯吧——嗯？」" 

# monologue
# JP: なんだ、肝心の真闇姉がグラスを手放してしまってる。
2235 = "但是身為主角的真闇姐卻把杯子給放下了。" 

# 【真闇】
# display as 真闇
# JP: 「あ、双ちゃん。違くて――ええと……\nあの……その、ね？」
1645 = "「啊，小雙。不對——呃……那個……我說啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1626 = "「唔？」" 

# monologue
# JP: 耳打ち。\n途端、耳から僕は酔わされる。
2378 = "她在我耳邊低語。瞬間，我就被她弄得意亂神迷。" 

# monologue
# JP: が――それが真闇姉の願いなら、\nもちろん、僕は叶えるのみだ。
2221 = "但——既然是真闇姐的願望，那麼我當然也只能去實現了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、ひとしずくのＩＳＣ８位入賞と、\n僕と真闇姉との恋愛成就とを祝って、乾杯！」
1977 = "「那麼，為凝露獲得ＩＳＣ第八名和我與真闇姐成為戀人，乾杯！」" 

# 【ハチロク】
# display as 日日姬＆八六
# JP: 『「かんぱーい！」\n「かんぱーい！」』
2005 = "『「乾杯！」\\n「乾杯！」』" 

# monologue
# JP: 乾杯の声、\nちりんちりんと鳴るグラスたち。
2199 = "乾杯的聲音，還有玻璃杯碰在一起的聲響。" 

# monologue
# JP: その中僕は、\nひとり一気にコップの中身を口へと移す。
2448 = "我一下子將杯中的酒含入口中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　まさか――」
1607 = "「哎！？難道——」" 

# 【れいな】
# display as 玲奈
# JP: 「なになに、なにが起きるんですかぁ？」
1762 = "「怎麼啦怎麼啦，這是要玩什麼花樣呀？」" 

# monologue
# JP: 祝いの酒を、真闇姉へと。
2462 = "我將慶祝的美酒餵給真闇姐。" 

# 【真闇】
# display as 真闇
# JP: 「んっ――んっ――むっ」
1659 = "「嗯——嗯——唔」" 

# monologue
# JP: 唇同士を密着させて、\nゆるゆる、僕は流しこむ。
2455 = "我和她的嘴唇貼在一起，慢慢地將酒傳入她口中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、いるか？」
1891 = "「真闇姐，在嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「おるとよー」
1696 = "「在喲」" 

# monologue
# JP: 呼べばすぐさま、答えが返る。\nが、姿が見えるのはしばらくしてから。
2450 = "我一出聲，她馬上就回答了。但又過了一會才找到她的身影。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんとまぁ、醸造タンクの中にいたのか」
1848 = "「沒想到居然在釀酒罐裡啊」" 

# 【真闇】
# display as 真闇
# JP: 「新しか子に、タンクの清掃ば教えとったけん」
1698 = "「在教新人打掃酒罐的方法呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1564 = "「原來如此」" 

# monologue
# JP: 新入りはまず掃除番から。
2502 = "新人首先從打掃開始。" 

# monologue
# JP: 鉄の掟は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が相手であっても、\n変わらず適用されるらしい。
2687 = "鋼鐵般的規矩哪怕對方是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也絕無例外。" 

# 【真闇】
# display as 真闇
# JP: 「ところで、何と？」
1734 = "「對了，有什麼事啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだった。\nポーレットからの連絡なのだが――」
1643 = "「啊，對了。波萊特發來消息——」" 

# 【真闇】
# display as 真闇
# JP: 「焼酎\x%l列車;#00ffc040;列車%l;#;、また参加者が増えてくれたと？」
1768 = "「想參與燒酒\\x%l列車;#00ffc040;列車%l;#;的人又增多了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。[さが,1]嵯峨県は[からつ,1]殻津鉄道と[こうぶ,1]甲部酒造さんのコンビだ」
1830 = "「是的。佐賀縣的唐津鐵路和光武釀酒廠一起來了」" 

# 【真闇】
# display as 真闇
# JP: 「ああ、[いかい,1]異界シリーズの[こうぶ,1]甲部さん。\nって、え？　[さが,1]嵯峨県ゆうたら」
1678 = "「噢，生產“魔界”系列的光武釀酒廠啊。呃，咦？說到佐賀縣」" 

# monologue
# JP: 真闇姉が指を折る。
2605 = "真闇姐掰著手指。" 

# monologue
# JP: 片手の全てを折りたたみ、\nそして、一、ニ――
2382 = "她數完一隻手，然後，一、二——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう、七県めの参加だ。\nこれで九洲全県に、焼酎\x%l列車;#00ffc040;列車%l;#;が走ることになる」
1735 = "「對，總共有七個縣參加。這樣一來，燒酒\\x%l列車;#00ffc040;列車%l;#;就能在九州所有的縣行駛了」" 

# 【真闇】
# display as 真闇
# JP: 「あー」
# 1627 = "「啊——」" 

# monologue
# JP: 感嘆、と。\n真闇姉は、その言葉をまさに体現している。
2615 = "真闇姐這一聲“啊”完全符合“感嘆”這一形容。" 

# 【真闇】
# display as 真闇
# JP: 「すごかよねぇ。ほんまこつ、\n九洲ぐるり、焼酎\x%l列車;#00ffc040;列車%l;#;でめぐれる日も近かとかもねぇ」
1708 = "「太棒了。這樣一來，或許燒酒\\x%l列車;#00ffc040;列車%l;#;環繞全九州的那一天或許真的不遠了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットはそのつもりのようだ。\nまずは、[せんだい,1]千内までを復線させると」
1856 = "「波萊特也是這麼想的。首先得恢復到仙台的這段線路」" 

# 【真闇】
# display as 真闇
# JP: 「あー、\x%lエアクラ;#00ffc040;エアクラ%l;#;さんが出資かなんかしよると？」
1649 = "「啊，是\\x%lエアクラ;#00ffc040;空凝機%l;#;公司那邊出資了還是怎麼？」" 

# monologue
# JP: いつもと同様、その推測も的を射ている。
2326 = "和平時一樣，她的推測總是一語中的。" 

# monologue
# JP: ひとしずくが一気に世界的知名度を得た影響は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社の判断にまで、及んだのだから。
2263 = "凝露一口氣獲得了世界級的知名度，由此帶來的影響也會左右\\x%lエアクラ;#00ffc040;空凝機%l;#;公司的判斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「新工場は千内で確定したという話だ。\n結果としては、三方一両得となったのではなかろうか」
1813 = "「據說新工廠確定是在仙台了。結果上來說就是三方共贏了」" 

# monologue
# JP: うんうんと何度も頷き、\nそして、真闇姉はまた感嘆の息を吐く。
2599 = "真闇姐不停地點頭表示贊同，然後又表示感嘆地吐了一口氣。" 

# 【真闇】
# display as 真闇
# JP: 「……すごかとねぇ。\n物事は、動くときには一気にぐわんて動きよるねぇ」
1209 = "「……真厲害啊。沒想到事情變化起來就變化得這麼大」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当にだな。と、いうことでポーレットから、\nさらなる話を預かってきている」
1727 = "「完全沒錯。所以波萊特又給我們發來了新的請求」" 

# monologue
# JP: 履歴書、というか身上書。\n分厚い束をまとめて渡せば、真闇姉の目が丸くなる。
2419 = "履歷書，不，更應該說是簡介吧。我將一捆厚厚的紙張遞過去，結果真闇姐瞪大了眼睛。" 

# 【真闇】
# display as 真闇
# JP: 「これ……青か目の――\n外国の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と？」
1950 = "「這個……藍眼睛的——是外國的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。研修をさせて欲しいとの希望が殺到している。\n特に、[えいこく,1]詠国の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が多いそうだぞ」
1662 = "「嗯。希望來這邊培訓的請求也蜂擁而至。尤其是英國的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，特別多的樣子」" 

# 【真闇】
# display as 真闇
# JP: 「[えいこく,1]詠国の」
1905 = "「英國」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにせ、鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の発祥の地だ。\n大廃線後、楽隠居をしていた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も多いらしい」
1877 = "「畢竟是鐵路和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的發祥地。在大廢線後，退休安閒度日的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;似乎也有很多」" 

# 【真闇】
# display as 真闇
# JP: 「はぁぁ……」
1634 = "「啊哦……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずはテストケースとして一体。\n真闇姉が好きに選んで構わんそうだ」
1540 = "「先選擇一個作為試例吧。真闇姐可以隨便選擇」" 

# 【真闇】
# display as 真闇
# JP: 「好きに……ゆーても――」
1743 = "「就算讓我……隨便選——」" 

# monologue
# JP: パラパラと、書類をめくり、\nほどなく真闇姉はお手上げをする。
2612 = "真闇姐翻了一會文件，不久後就舉手投降了。" 

# 【真闇】
# display as 真闇
# JP: 「選べんよ。わからんもん。\n双ちゃんとポーちゃんのおすすめは？」
1799 = "「我選不了。畢竟我又不懂。小雙和波萊特有什麼推薦的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もわからん。が、ポーレット、ハチロク、れいなは、\n『Ｆ・スコッティ』という\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を推していた」
1776 = "「我也不知道。但是，波萊特、八六、玲奈都推薦一個叫“Ｆ·斯科蒂”的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【真闇】
# display as 真闇
# JP: 「やったら、その子で。\n受け入れ体制のことやなんやら、先様と相談せんとね」
1976 = "「那麼就選她吧。接收流程什麼的得和對方商量好才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「手配しておこう。\nっと……ひとまずはこんなところかな」
1778 = "「我來安排。嗯……那就先這樣吧」" 

# 【真闇】
# display as 真闇
# JP: 「はぁぁ」
1913 = "「蛤啊啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 1620 = "「哦喲」" 

# monologue
# JP: くったりと、真闇姉が僕に体を預けてくる。\n……この忙しさだ、無理もなかろう。
2601 = "真闇姐將身體靠在我身上。……畢竟這麼忙，也是沒辦法的。" 

# monologue
# JP: 蔵人たちの目は気になるが、\n後ろ頭をゆっくり撫でる。
2712 = "雖然很在意旁邊工作人員的眼神，不過我還是慢慢地輕撫著她的後腦勺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「代わるか？\n掃除番の仕事であれば、僕にも教えられる」
1779 = "「我來幫你做吧？打掃工作的話我也可以教」" 

# 【真闇】
# display as 真闇
# JP: 「んーん。へーき。\n新しか流れば落ち着くまでの苦労やし」
1502 = "「不，我沒事。反正也就只是辛苦到新的潮流穩定下來而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「新しい流れ、か――」
1818 = "「新的潮流啊——」" 

# monologue
# JP: 確かに、来ている。\n僕らの想像していたよりも、ずっと大きく、強い流れが。
2505 = "新的潮流確實在到來。比我們想像中更加巨大，更加劇烈的潮流。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……文字通りに精髄だったのだな。\nただのひとしずくが、これほど大きな流れとなるとは」
1213 = "「……真是正如字面意義上的精髄啊。沒想到普通的“凝露”會掀起如此巨大的潮流」" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんと大きな流れも、ゆーたら――\nひとしずく、ひとしずくの集まりやけん」
1486 = "「不管是如何巨大的潮流，也始終是——凝露，一滴一滴聚集在一起而形成的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1177 = "「——是啊」" 

# monologue
# JP: 本当にそうだと、しみじみ感じる。\n僕というひとしずく、真闇姉というひとしずく。
2619 = "確實如此啊，我深有體會。“我”這一滴凝露，還有“真闇姐”這一滴凝露。" 

# monologue
# JP: ハチロク、日々姫、ポーレット、れいな、凪、ふかみ――\nたくさんの思いが、しずくが、今の流れを作ってくれたと。
2252 = "八六、日日姬、波萊特、玲奈、凪、深美——無數人的心意像凝露一樣匯聚成了如今的潮流。" 

# 【双鉄】
# display as 雙鐵
# JP: 「流れからきっと、またいくつものひとしずくがわかれ、\nそれがまた、さらなる流れを産み出していく」
1861 = "「潮流一定又會分成無數的凝露，然後又誕生更多的潮流」" 

# monologue
# JP: 鉄道も、酒造りも。\nきっと全てが、そうして変わっていくものだろう。
2185 = "不管是鐵路還是釀酒廠，這一切必定會像這樣變化下去。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん」
1921 = "「話說啊？小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っ！」
1621 = "「唔——呃！」" 

# monologue
# JP: かすめるような、一瞬のキス。
2654 = "蜻蜓點水般掠過的一吻。" 

# monologue
# JP: 熱っぽい唇はそのままそっと、\n僕の耳元によせられる。
2563 = "熾熱的紅唇就這樣慢慢地靠近我的耳邊。" 

# 【真闇】
# display as 真闇
# JP: 「うちらも、つくろ？\nふたりだけの、新しか流れ」
1592 = "「咱們也來創造只屬於咱們倆的潮流吧？」" 

# monologue
# JP: 大歓迎だ。\n是非も無い。
2579 = "當然歡迎。無條件歡迎。" 

# monologue
# JP: が、今は昼間で、蔵の中。\n真闇姉の望みにすぐには、応えられない。から――
2243 = "但現在是白天，還是在酒窖裡。我沒辦法立刻回應真闇姐的期望。那麼——" 

# 【真闇】
# display as 真闇
# JP: 「あっ――」
# 1627 = "「啊——」" 

# monologue
# JP: 今度は僕からキスをして、\n真闇姉へと、言葉の代わりの答えを返す。
2671 = "這次我主動親吻了她，以作為對真闇姐那句話的回答。" 

# 【真闇】
# display as 真闇
# JP: 「んっ！」
1672 = "「嗯！」" 

# monologue
# JP: 伝わる。\nだから、僕も受け取る。
2442 = "感受到了。所以我也接受了。" 

# monologue
# JP: 想いが、熱が、\n大好きだという気持ちによって、蒸留される。
2474 = "我的心意、我心中的灼熱，經過愛戀這一感情所蒸餾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1715 = "「好！」" 

# monologue
# JP: そうして、それはひとしずくとなり――
2632 = "而後，終將匯聚為凝露——" 

# monologue
# JP: 新しい命を、つなぐのだ。
2557 = "為新的生命播下種子。" 
