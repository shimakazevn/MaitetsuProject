[script]
# lines: 443 
# 【日々姫】
# display as 日日姬
# JP: 「…………描けーん」
1187 = "「…………無從下筆咧」" 

# monologue
# JP: 部屋におってもなーんも浮かんで来やせんけん、\n居間ば来たけど、やっぱり変わらん。
2437 = "悶在房間裡我也沒有任何靈感，來客廳也一樣。" 

# monologue
# JP: 何をどぎゃんと描くもんか、\nちぃとも浮かんで来やせんもん。
2459 = "我完全想不出該畫什麼，該怎麼畫。" 

# 【日々姫】
# display as 日日姬
# JP: 「せっかく――\nまた任せてもらえたけん」
1987 = "「難得真闇姐讓我再次負責的」" 

# monologue
# JP: 蒸気焼酎のラベルの、新しかとを任せてもらえる。\nそれは、前のが認めてもらえたってこと。
2662 = "設計全新的蒸汽燒酒的標籤的工作落到了我身上。這也說明我之前的工作得到認可了。" 

# monologue
# JP: すっごく嬉しかことなのに、\nもっと良くって思うと頭ば、真っ白になってしまって。
2530 = "明明是一件很值得高興的事，但一想到要做得更好，大腦就一片空白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「描けんとは、ラベルデザインか？」
1864 = "「無從下筆是指酒標的設計？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃにっ！」
1635 = "「啊！阿哥！」" 

# monologue
# JP: 突っ伏しとるとこ見せたくなかけん、\n体ば一気に跳ね起こす。
2352 = "因為不想讓他看到我趴著的樣子，所以一下子跳了起來。" 

# monologue
# JP: けど、にぃにの顔が心配そうにくもってしまって、\n私、よっぽど酷か顔ばしとった？　って、恥ずかしぅなる。
2241 = "但是，看阿哥一臉擔心的表情。難道我現在的表情有這麼苦惱嗎？感覺好無地自容。" 

# 【日々姫】
# display as 日日姬
# JP: 「平気。\n多分、ちょっと考え過ぎちゃっとるだけやけん」
1847 = "「沒事。或許只是有些想太多了咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……思うところが、何かあるのか？」
1207 = "「……有什麼想法嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー」
1627 = "「啊——」" 

# monologue
# JP: 言われたら、そうなんだなぁって思わされちゃう。
2477 = "我聽他這麼一說，突然不由得覺得“確實是啊”。" 

# monologue
# JP: 何年も離れて暮らしても、にぃにはやっぱりにぃにやけん。\n私の一番弱いとこ、見守ってくれとった人やけん。
2184 = "不管分開了多少年，阿哥仍然是阿哥，是一直守護著我最為軟弱的部分的人。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。あると。\n思うところば多すぎて、頭がぐちゃぐちゃしよるんよ」
1670 = "「嗯。有。想法忒多了，腦子裡都亂成一鍋粥咧」" 

# monologue
# JP: ひとつは……やっぱり、にぃにのこと。
2629 = "第一件……果然還是阿哥的事情。" 

# monologue
# JP: ここのところずっと、にぃにとねぇねぇ、\n真夜中の蔵で楽しげに、なんか、お話ばしとること。
2700 = "阿哥和阿姐最近經常半夜在倉庫裡開開心心地不知在談些什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕でよければ、話を聞くぞ？\n話せば、思考を整頓できる」
1716 = "「如果不介意的話，你可以跟我說啊。說出來能幫助整理思緒」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに頭よかけんね、そいで解決するだろうけど――\n私は頭わるかけん、きっと余計にぐちゃぐちゃしよると」
1980 = "「阿哥腦袋靈光，按你說的來做確實可以解決——但是我腦袋沒那麼好，所以肯定會更加亂糟糟的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは無いし、そんなことは無い」
1849 = "「沒這回事啦，沒這回事」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1633 = "「啊哈」" 

# monologue
# JP: 思わず噴き出す。\n真面目な顔して、ちょっとおかしなこというけん。
2466 = "我忍不住笑了出來。看他表情這麼認真，搞得我特別想笑。" 

# monologue
# JP: のににぃにぃは、きょとんって、\nすごく不思議そうな顔しよる。
2237 = "但是阿哥一臉又訝異又感覺奇怪的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何が面白かったのだ？」
1837 = "「有什麼好笑的？」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって、にぃに。\nおんなじことば、二回言うけん」
1692 = "「因為阿哥說了兩次同樣的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、それぞれに一度ずつだぞ？\n前者と、後者と」
1508 = "「不，那分別對應你說的前半句和後半句啊，各一次」" 

# 【日々姫】
# display as 日日姬
# JP: 「前者と後者？」
1562 = "「前半句和後半句？」" 

# monologue
# JP: あらたまられると、自分がさっき何を言ったか――
2215 = "他鄭重其事地這麼一說，我才對自己剛才說了什麼——" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず、整頓できることと解決できることとは別だ。\n次に、日々姫の頭は悪くない」
1994 = "「首先，整理和解決不是一回事。其次，日日姬腦袋還是蠻好的」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 1627 = "「啊——」" 

# monologue
# JP: ――思い出そうとする前に、にぃにが答えば教えてくれる。
1150 = "——在我想起來之前，阿哥就告訴了我答案。" 

# monologue
# JP: ゆーか、え？\n整頓と解決ば別って、ほんなら――
2188 = "不過，整理和解決不是一回事？那就是說——" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃににも、抱えとるような悩みって、あると？」
1907 = "「莫非阿哥現在也有煩惱？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるぞ。当然のことだろう」
1839 = "「有啊。這是理所當然的吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えー、当然かなぁ。\nにぃにって、なんでも即断即決即解決の人やでしょお」
1609 = "「哎，真的是理所當然的嗎。阿哥是不管做什麼事都當機立斷馬上解決的人吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんな化け物の筈もあるまい。\n僕とて、一人の人間だ」
1886 = "「真能做到那樣的那就是神仙了。我也只是普通人而已」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1995 = "「！」" 

# monologue
# JP: ――にぃに、変わった。\n肌が、心が、ざわってするほど。
1155 = "——阿哥變了。令我的身心都不由得一陣躁動。" 

# monologue
# JP: にぃに、だって……にぃにって、だって、\nこっちが悲しくなるくらい、自分を殺す人やったけん。
2354 = "因為阿哥……因為曾經的阿哥甚至連自己都放棄了，讓人看在眼裡都替他感到難受啊。" 

# 【日々姫】
# display as 日日姬
# JP: 「悩んどるのって……どぎゃんこと？」
1873 = "「煩惱……是在煩惱什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――そう大したことでは」
1479 = "「不——沒什麼大不了的」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが言うたよ？\n話せば整頓ばできるって」
1834 = "「是阿哥告訴我“說出來可以方便整理”的哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……聞きたいのなら聞かせるが、\n特に面白い話でもないぞ？」
1197 = "「……你想知道的話我是可以說，不過沒什麼意思的」" 

# monologue
# JP: 困ったみたいに少し笑って、にぃにが話す。
2703 = "阿哥有些為難地笑了笑後開始說道。" 

# monologue
# JP: ねぇねぇと夜、会って話ばしとること。\n少しも隠さず、聞かせてくれる。
2212 = "他把在晚上和阿姐見面談話的事全都說了出來，沒有一絲隱瞞。" 

# 【日々姫】
# display as 日日姬
# JP: 「ふぅん？\nねぇねぇに避けられとったと？」
1676 = "「嗯？被阿姐迴避了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それで僕は避けられていた理由を聞いた。\nひとつは、それ。『ひとしずく』の製作だといっていた」
1666 = "「嗯。所以我問了迴避我的理由。其中之一就是關於那個“凝露”的製作」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。仕上がり近かとき、\nねぇねぇ、ピリピリしよるけんねぇ」
1639 = "「啊，嗯。畢竟臨近完成了，阿姐現在可是緊張得很」" 

# monologue
# JP: ひどいときなんて目までキイって釣り上がりよるけん――\nにぃにぃに見せたくなかとも、わかる気がする。
2566 = "特別緊張的時候眉頭緊鎖眼角上挑甚是嚇人——也能理解阿姐不想被阿哥看到的心情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それともうひとつ理由があると聞かせてもらって――\nそのときは僕も酔ってた気分で、何となく受け答えたが」
1869 = "「然後我又問了她另外一個理由——那個時候我也有些醉意，所以就不自覺順著應答了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
1671 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着いて考えると良く意味がわからん気がして……\nそれで、まぁ――悩んでいるというか、考えこんでいる」
1553 = "「冷靜下來想一想發現自己其實也不太懂其中含義……所以就是——說是煩惱吧，其實就是在沉思而已」" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ、なんば言いよったと？」
1800 = "「所以阿姐到底說了什麼啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『妹の欲しがるものを横取りできない』と――」
1182 = "「“總不可能把妹妹想要的東西給搶走”——」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
1997 = "「！！？」" 

# monologue
# JP: 欲しがるものって――\nそれでにぃにぃを避けていたって――
2441 = "想要的東西——因為它才迴避著阿哥，這是說——" 

# monologue
# JP: なら、ねぇねぇも？\nけど……そぎゃんと素振り、いっかいも――っ！
2675 = "那麼，阿姐也是？不過……她從來沒表現出來過——！" 

# monologue
# JP: （ほんとに……ただの一回だけも……\nそんなの、だって――すごく不自然――ありえない）
2754 = "（確實……一次也沒有……但正因為這樣——特別不自然——不可能）" 

# monologue
# JP: 些細なドキドキさえもきっとねぇねぇは、\n大人びた仕草と余裕で、誤魔化し隠しつづけて。
2334 = "哪怕是有些緊張，阿姐肯定能以成熟的態度從容地掩飾過去。" 

# monologue
# JP: なんでそんな――と考えたらもう、\n答えなんかは、ひとつしか無い。
2555 = "為什麼會這樣——這麼一想，那麼答案就只能有一個了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし僕には、果たして何を真闇姉がほしがってるのか。\n日々姫からの横取りになると考えているのかが」
1499 = "「不過，真闇姐到底想要我的什麼呢。有什麼東西會是從日日姬那邊搶走的」" 

# 【日々姫】
# display as 日日姬
# JP: 「それを知ったら――」
1722 = "「如果知道了——」" 

# monologue
# JP: 放っておけって、\n冷えた心が囁いてくる。
2432 = "心魔在殘忍地喁喁細語“不要理會”。" 

# monologue
# JP: 放っておけば、チャンスはあるって。\n挽回できるかもしれないって。
2174 = "不去理會的話還會有機會。或許還可以挽回。" 

# 【日々姫】
# display as 日日姬
# JP: 「それが何なのかわかったら――\n兄さんは、どうするつもりなんですか？」
1724 = "「如果知道是什麼的話——哥哥會怎麼辦呢？」" 

# monologue
# JP: だけど、尋ねずにいられない。\n答えが、多分わかってて――
2249 = "儘管這可能只是明知故問。不過，我還是不得不問——" 

# monologue
# JP: それは私を傷つけるって、\nそんな気がしても、どうしても。
2331 = "哪怕是已經察覺到那個答案會給我留下傷痕，我也非問不可。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、真闇姉の願いを叶えるべく、手伝いたい」
1881 = "「當然，我想要幫助真闇姐實現她的願望」" 

# 【日々姫】
# display as 日日姬
# JP: 「どうして……\n無論、なんですか？」
1862 = "「為什麼……會這麼迫切呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は右田の養子で、真闇姉に守ってもらった恩がある。\nそれを返すのは、ごく当然のことだろう」
1791 = "「我是右田家的養子，真闇姐對我也有守護之恩。報恩不是理所當然的嗎」" 

# monologue
# JP: 恩。義務。役に立つ。\nにぃにの、いつでも言っていること。
2366 = "報恩。義務。幫上忙。這些都是阿哥平時總是掛在嘴邊的話。" 

# monologue
# JP: だけど、もうそれだけじゃなくなった――\nにぃに自身が、今はまだ気づいていなくても。
2222 = "但事情已經不是這麼簡單了——就算阿哥自己現在還沒有發現。" 

# 【日々姫】
# display as 日日姬
# JP: 「だったら、私も。右田日々姫も右田の娘で――\n少しは……何かで、兄さんの役にとか立ちましたよね？」
1958 = "「這麼說的話，我也一樣吧。右田日日姬也是右田家的女兒——在一些事情上……為哥哥派上了一些用場吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「少しどころか、大いにだ。\x%l機関助士;#00ffc040;機関助士%l;#;としてはもちろん、\n御一夜のことを教えてもくれたし――助かってるさ」
1928 = "「豈止是一些，簡直是幫大忙了啊。\\x%l機関助士;#00ffc040;司爐%l;#;的工作自不用說，還幫我了解御一夜——真是幫了我特別多」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら――」
1962 = "「那——」" 

# monologue
# JP: 今だけは、私のことを見ていてもらいたくて、\nねぇねぇの名前は、口に出さない。
2464 = "我希望阿哥現在只看著我一個人，不希望他說出阿姐的名字。" 

# 【日々姫】
# display as 日日姬
# JP: 「私の願いも、兄さんは叶えてくれますか？」
1615 = "「哥哥也能實現我的願望嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。僕にできることなら」
1879 = "「當然。只要是我能做到的」" 

# monologue
# JP: ここまで言って、\nどうして気づいてくれないのかって悲しくなって――
2556 = "為什麼說到這種地步他還察覺不到呢，我不由得悲從中來——" 

# monologue
# JP: そこをもう少し考えたのなら、\nもっと、ずうっと悲しくなる。
2401 = "如果繼續想下去的話，我會更加悲傷的。" 

# monologue
# JP: （兄さんは……自分が誰かに愛される人間なんだって――\nその考えを、きっと、どこかで見失ってるんだ）
2756 = "（還有人……在深愛著哥哥——他肯定早已遺忘了這件事）" 

# monologue
# JP: ……思い出させてあげるのは、\n絶対、私の役目がよかった。
1165 = "……而讓他回想起這件事肯定是我義不容辭的任務。" 

# monologue
# JP: それが無理でも、振られるんでも告白は、\nもっと綺麗に、ドラマチックにしたかった。
2329 = "哪怕得不到結果，哪怕被拒絕，我也希望我的告白場面能更加美好、更有戲劇性。" 

# 【日々姫】
# display as 日日姬
# JP: 「それは大丈夫。兄さんになら叶えられる……\n兄さんにしか、叶えられない願いです」
1952 = "「這個不用擔心。這個願望阿哥能夠實現……也只有阿哥能夠實現」" 

# monologue
# JP: 初めて話を聞いてもらった時からずっと、\nずっとずうっと、願ってたこと。
2670 = "這是從第一次向他開口的時候起就一直，一直一直隱藏在心中的願望。" 

# monologue
# JP: そうしてきっと、同じくらいに長い時間を、\nねぇねぇに、我慢させて、隠させてたこと。
2706 = "阿姐心中，想必也隱藏了同樣的願望，在這漫長的時光裡同樣潛心忍耐著。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん――私は」
1613 = "「哥哥——我」" 

# monologue
