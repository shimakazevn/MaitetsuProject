[script]
# lines: 379 
# 【真闇】
# display as 真闇
# JP: 「もうひとつ。\n双ちゃんにお姉ちゃんから、選択肢をあげよーねぇ」
1492 = "\"「Còn một chuyện nữa. Chị sẽ cho Sou-chan một lựa chọn nhé.」\""
# monologue
# JP: 筆と墨、それから半紙。
2347 = "Bút lông, mực, và cả giấy bán chỉ."
# monologue
# JP: 流れるように用意を整え、\n真闇姉は、さらさらと何かを書きつける。
2310 = "Chuẩn bị mọi thứ một cách trơn tru, chị Mayami nhanh thoăn thoắt viết gì đó lên giấy."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんがここにサインをしたら、二億円、\nうちから双ちゃんに、無利子無担保で貸したげますけん」
1366 = "\"「Nếu Sou-chan ký vào đây, chị sẽ cho em vay hai trăm triệu yên, không lãi suất, không cần thế chấp.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「む――ぅ」
1385 = "\"「Ưm——.」\""
# monologue
# JP: 幾度思い返してみても、\nやはり結論は変わらない。
2126 = "Dù có ngẫm nghĩ lại bao nhiêu lần, thì kết luận vẫn không hề thay đổi."
# monologue
# JP: 真闇姉が差し伸べてくれた手を受け取る――\nそれこそ最善の方法だった。
2217 = "Nắm lấy bàn tay mà chị Mayami đã chìa ra—— đó chính là phương pháp tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「だ、が」
1293 = "\"「Nhưng, mà.」\""
# monologue
# JP: 甘えてしまった。\nまた、真闇姉の優しさに。
2171 = "Em lại ỷ lại mất rồi. Lại một lần nữa, dựa dẫm vào sự dịu dàng của chị Mayami."
# monologue
# JP: 僕を右田から追放させないでおく、そのために、\n真闇姉がどれほどの苦労をしたか、知っているのに。
2194 = "Để em không bị đuổi khỏi nhà Migita, chị Mayami đã phải chịu đựng biết bao vất vả, em biết rõ điều đó cơ mà."
# monologue
# JP: （頼れば必ず、真闇姉は僕に応えてくれる。\nそれがどれほど苦しい選択であろうとも――）
2448 = "（Chỉ cần em nhờ vả, chắc chắn chị Mayami sẽ đáp ứng. Dù đó có là một lựa chọn đau khổ đến nhường nào đi chăng nữa——）"
# monologue
# JP: だから、うかつには頼れない。\nよほどのことが無い限り、甘えたことを言ってはいけない。
2215 = "Thế nên, em không thể tùy tiện nhờ vả được. Trừ khi có chuyện gì đó vô cùng trọng đại, bằng không em không được phép nói những lời ỷ lại."
# monologue
# JP: それは重々承知しているつもりなのだが、\n今回ばかりは…………仕方、なかった。
2432 = "Em vẫn luôn tự nhủ phải ghi nhớ kỹ điều đó, nhưng chỉ riêng lần này thì............đành chịu thôi."
# monologue
# JP: （\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場が誘致されてしまえば、いつかは――\n右田一酒造元にも、致命的な悪影響が及ぶのだから）
2444 = "（Nếu nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; được xây dựng, thì một ngày nào đó—— Nó cũng sẽ gây ra những ảnh hưởng chí mạng đến xưởng rượu Migitakazu.）"
# monologue
# JP: 理屈だけなら、“真闇姉にも利のあること”と、\n割り切ることも出来そうで。
2018 = "Nếu chỉ xét về mặt lý thuyết, thì em hoàn toàn có thể tự nhủ rằng \"Chuyện này cũng mang lại lợi ích cho chị Mayami\"."
# monologue
# JP: けれどどれほど考えてみても、\n心はすっきり整頓できない。
1974 = "Thế nhưng, dù có suy nghĩ thế nào đi chăng nữa, trong lòng em vẫn không thể nào thông suốt được."
# 【双鉄】
# display as 雙鐵
# JP: 「……この時間なら、見回りか？」
1073 = "\"「......Giờ này chắc là đang đi tuần tra nhỉ?」\""
# 【ハチロク】
# display as 八六
# JP: 「……すぅ…………すぅ」
1045 = "\"「......Khò............khò.」\""
# monologue
# JP: 足元の方の布団の中から、規則正しい音が聞こえる。\nハチロクは、どうやら完全に休んでる。
2199 = "Từ trong chăn phía dưới chân, những âm thanh đều đặn vang lên. Có vẻ như Hachiroku đang ngủ rất say."
# monologue
# JP: 起こさないようそっと抜け出し、\n明かりも点けずに階下へ――そして蔵へと向かう。
2156 = "Em rón rén chui ra khỏi chăn để không đánh thức em ấy, không bật đèn, bước xuống nhà——rồi hướng về phía xưởng rượu."
# 【真闇】
# display as ？？？
# JP: 「誰？」
1712 = "\"「Ai đó?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「僕だ。驚かせたなら済まなかった」
1601 = "\"「Là em đây. Xin lỗi vì đã làm chị giật mình.」\""
# monologue
# JP: 声をかければホっとした顔。\nその顔に、僕もなんだかホっとする。
2359 = "Nghe thấy tiếng em, khuôn mặt chị ấy thoáng vẻ nhẹ nhõm. Nhìn khuôn mặt ấy, chẳng hiểu sao em cũng thấy nhẹ nhõm theo."
# monologue
# JP: 居なかったなら戻って寝ようと思っていたが……\n居てくれたならそれはそれで、邪魔にならぬか心配になる。
2208 = "Em định bụng nếu chị ấy không có ở đây thì sẽ về ngủ tiếp...... Nhưng chị ấy có mặt thì em lại lo không biết mình có làm phiền chị ấy không."
# 【双鉄】
# display as 雙鐵
# JP: 「その……だな…………」
1771 = "\"「À thì......chuyện là............」\""
# 【真闇】
# display as 真闇
# JP: 「もぉ少しで済むとこやけん」
1763 = "\"「Chị sắp xong rồi đây.」\""
# monologue
# JP: 時間はあるかと聞いたなら、無理をしてでも時間を作る。\nそれが、真闇姉という人だ。
2425 = "Nếu em hỏi chị ấy có rảnh không, chắc chắn chị ấy sẽ cố sắp xếp thời gian cho em. Đó chính là con người của chị Mayami."
# monologue
# JP: だからためらい、生じさせてしまった沈黙さえも、\nごくさり気なく先回りして、うずめてくれる。
2056 = "Chính vì vậy mà em ngập ngừng, nhưng ngay cả sự im lặng mà em vô tình tạo ra ấy, chị cũng khéo léo đi trước một bước và lấp đầy nó."
# 【真闇】
# display as 真闇
# JP: 「ちょこっとだけ待っとってくれる？」
1329 = "\"「Em đợi chị một chút nhé?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。よければ待たせて欲しい」
1642 = "\"「Đương nhiên rồi. Nếu được, xin hãy cho em đợi.」\""
# 【真闇】
# display as 真闇
# JP: 「ほんなら。しーーーっ」
1787 = "\"「Vậy thì. Suỵt.」\""
# monologue
# JP: いたずらっぽい目つきになって、人差し指を唇にあて、\n真闇姉は、小さな子を諭すが如く僕に沈黙を要求する。
2092 = "Với ánh mắt tinh nghịch, chị Mayami đặt ngón trỏ lên môi, yêu cầu em giữ im lặng hệt như đang dỗ dành một đứa trẻ."
# monologue
# JP: なにかと思って口をつぐめば、\n沈黙の中、すぐさま理由が囁き始める。
2424 = "Đang không hiểu có chuyện gì mà phải ngậm miệng lại, thì trong sự tĩnh lặng ấy, lý do lập tức bắt đầu thì thầm."
# monologue
# JP: （ふつ、ふつ――ぼこっ――ふつっ）
2449 = "（Lách tách, lách tách——bục——lách tách）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1396 = "\"「À——」\""
# 【真闇】
# display as 真闇
# JP: 「……ね、双ちゃん。聞こゆるや？」
1047 = "\"「......Nè, Sou-chan. Em nghe thấy không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん。聞こえる。[こうじ]麹の発酵する音だな」
1457 = "\"「Ừm. Em nghe thấy rồi. Là tiếng lên men của men kōji nhỉ.」\""
# 【真闇】
# display as 真闇
# JP: 「んー、ちょこっとのんびり歌いよるねぇ。\nま、今ん秋の出来も、平年並を超えれんかねぇ」
1393 = "\"「Ưm, tụi nó đang hát hơi chậm rãi nhỉ. Chà, xem ra mẻ rượu mùa thu năm nay cũng không thể vượt mức trung bình được rồi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「平年並、か」
1530 = "\"「Mức trung bình, sao.」\""
# monologue
# JP: うちの酒蔵の看板酒である“右田一”は、\n市内からの予約だけで九割が売れる、地元密着の人気酒だ。
2164 = "Loại rượu trứ danh \"Migitakazu\" của xưởng rượu nhà em, là một loại rượu rất được ưa chuộng ở địa phương, chỉ riêng lượng đặt trước trong thành phố đã chiếm tới chín mươi phần trăm doanh số."
# monologue
# JP: 平年並なら、十分すぎる旨さだろうが――\n真闇姉の声は不満気で、だから、つくづくと感じてしまう。
2043 = "Nếu đạt mức trung bình thì cũng đã là quá ngon rồi—— Thế nhưng giọng điệu của chị Mayami lại có vẻ không hài lòng, điều đó khiến em cảm nhận sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「大変だな。\nより高みを目指す、ということも」
1668 = "\"「Vất vả thật đấy. Việc hướng tới một đỉnh cao mới ấy.」\""
# 【真闇】
# display as 真闇
# JP: 「大変でないお仕事なんて、きっとなかとよ？」
1383 = "\"「Làm gì có công việc nào là không vất vả chứ?」\""
# monologue
# JP: そう言いつつも、メモを書きつける真闇姉の横顔には、\n苦労より、充実の色が色濃く見えるような気がする。
2052 = "Miệng thì nói vậy, nhưng trên góc mặt nhìn nghiêng của chị Mayami khi đang ghi chép, em lại cảm thấy sự thỏa mãn hiện lên rõ nét hơn là sự vất vả."
# monologue
# JP: 美しいな、と素直に感じ、\n自分が仕事をしている顔は、さてどうかなと思ってしまう。
2187 = "Em chân thành cảm thấy chị ấy thật đẹp, và tự hỏi không biết khuôn mặt của mình khi làm việc thì trông sẽ ra sao."
# 【真闇】
# display as 真闇
# JP: 「――よし、っと」
1007 = "\"「——Rồi, xong.」\""
# monologue
# JP: 一区切りついたのだろう、小気味良い声。\nほのかな酒の香。蔵の温もり。僕へと柔らかに移るまなざし。
1963 = "Có lẽ chị ấy đã làm xong một công đoạn, giọng nói nghe thật sảng khoái. Hương rượu thoang thoảng. Hơi ấm của xưởng rượu. Ánh mắt dịu dàng chuyển hướng sang em."
# monologue
# JP: 一滴も飲んでいないのに、かすかに酔ったような気になり、\nすっと、言葉を吐き出せる。
2241 = "Dù chưa uống một giọt nào, em lại có cảm giác hơi say say, và những lời muốn nói cứ thế tuôn ra một cách tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に、聞きたいことがあって来たんだ」
1559 = "\"「Em đến đây vì có chuyện muốn hỏi chị Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「良かよ？　なんでん聞いておーせ」
1687 = "\"「Được thôi? Em cứ hỏi đi.」\""
# monologue
# JP: 負担は、すでにかけてしまった。
2177 = "Em đã tạo gánh nặng cho chị ấy mất rồi."
# monologue
# JP: 二億、万一返済し損ねてしまうなら、\n真闇姉にも右田一酒蔵にも大きな打撃を与えることは明白だ。
2366 = "Hai trăm triệu yên, rủi mà không trả được, thì rõ ràng sẽ giáng một đòn nặng nề lên cả chị Mayami và xưởng rượu Migitakazu."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、工場誘致反対運動の旗を、\n真闇姉が振らんのだ？」
1632 = "\"「Tại sao, người phất cờ khởi xướng phong trào phản đối việc xây dựng nhà máy, lại không phải là chị Mayami?」\""
# monologue
# JP: だから、尋ねる。そう出来る。\n甘えない――という格好つけを、かなぐり捨てる。
2213 = "Vì vậy, em mới hỏi. Em có thể làm được điều đó. Vứt bỏ cái vẻ bề ngoài \"không ỷ lại\" kia đi."
# monologue
# JP: 誘致撤回という未来を呼びこむそのために、\n出来る限りを尽くすことこそが、今の僕の務めと思う。
2186 = "Để mang lại một tương lai nơi dự án bị hủy bỏ, làm hết sức mình mới chính là nhiệm vụ của em lúc này."
# 【真闇】
# display as 真闇
# JP: 「右田は、クマ焼酎の……\n御一夜に昔からあるもんの、いわば代表格よねぇ」
1376 = "\"「Migita, là đại diện cho rượu shochu Kuma...... hay nói đúng hơn là đại diện cho những giá trị truyền thống của Ohimitera nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1442 = "\"「Vâng.」\""
# 【真闇】
# display as 真闇
# JP: 「そん\\x%l杜氏;#00ffc040;杜氏%l;#;が誘致反対の旗ば振ったら、\n反対運動が、否応なしに表立つけん」
1699 = "\"「Nếu \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; của nơi đó mà phất cờ phản đối, thì phong trào phản đối chắc chắn sẽ bị công khai hóa mất.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか」
1398 = "\"「À——ra là vậy.」\""
# monologue
# JP: 問えばあっさり返る答えに、自分の不明を知らされる。
2067 = "Câu trả lời nhẹ nhàng ấy khiến em nhận ra sự thiếu hiểu biết của mình."
# monologue
# JP: フランク育ちの、いうなれば外来者であるポーレットが、\nひとつの極でいるのとは、まるで話が違ってくる。
2074 = "Việc Paulette, một người lớn lên ở Frank, hay nói cách khác là một người ngoại lai, đứng ở một thái cực, là một câu chuyện hoàn toàn khác."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉が旗を振れば――右田につくか、銀行につくか、\nそうした選択を強いる構図になってしまいかねんのか」
1655 = "\"「Nếu chị Mayami phất cờ——thì sẽ tạo ra một cục diện ép buộc mọi người phải lựa chọn giữa việc theo phe Migita hay theo phe ngân hàng sao.」\""
# monologue
# JP: 静かな頷き。\n真闇姉の唇の端が、ほんの少しだけ歪んでしまう。
2337 = "Một cái gật đầu lặng lẽ. Khóe môi chị Mayami khẽ nhếch lên một chút."
# 【真闇】
# display as 真闇
# JP: 「表立っての対立は、遺恨ば生んで……\nそぎゃんとなったら、簡単には消えてくれんけん」
1497 = "\"「Sự đối đầu công khai sẽ sinh ra hiềm khích...... Mà một khi đã như vậy, thì sẽ không dễ gì xóa bỏ được đâu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「誘致撤回させたとしても、対立構造が残ってしまえば\n後の発展を、きっと長期的に阻害してしまう」
1515 = "\"「Dù có khiến họ hủy bỏ dự án đi chăng nữa, nhưng nếu cấu trúc đối lập vẫn còn tồn tại thì chắc chắn nó sẽ cản trở sự phát triển lâu dài về sau.」\""
# monologue
# JP: ん――\nと、小さな小さな息。
2050 = "Ưm—— Một tiếng thở hắt ra thật khẽ."
# monologue
# JP: 珍しく、\n少し困ったような口調。
2077 = "Hiếm khi thấy chị ấy nói với giọng điệu có vẻ bối rối như vậy."
# 【真闇】
# display as 真闇
# JP: 「……銀行さん、いうか、\n[もとただ,1]元忠さんには感謝ばしとる人も、多かけん」
1053 = "\"「......Ngân hàng, hay nói đúng hơn là, cũng có rất nhiều người mang ơn ông Mototada mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「感謝……というのは、\n融資を受けさせてもらって、ということか？」
1551 = "\"「Mang ơn......ý chị là, được ông ấy cho vay vốn sao?」\""
# 【真闇】
# display as 真闇
# JP: 「そいもまあまああろーけど。\nそぎゃんこつだけじゃなかばってん」
1760 = "\"「Cái đó thì cũng có phần đúng. Nhưng không chỉ có vậy đâu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「他に……一体、何があるのだ？」
1346 = "\"「Còn chuyện gì khác nữa......rốt cuộc là chuyện gì?」\""
# 【真闇】
# display as 真闇
# JP: 「例えば……そーね、\n双ちゃん、覚えとぉ？」
1626 = "\"「Ví dụ như......để xem nào, Sou-chan, em còn nhớ không?」\""
# monologue
# JP: 真闇姉の目に柔らかさが増す。
2319 = "Ánh mắt chị Mayami trở nên dịu dàng hơn."
# 【真闇】
# display as 真闇
# JP: 「駅前の通り、最初の信号ば越したところに、\nやにわにだごのお店ば、あったん」
1726 = "\"「Trên con phố trước ga, đoạn vừa qua khỏi cột đèn giao thông đầu tiên ấy, trước đây từng có một quán bánh dango Yaniwa.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\n確か、おじいさんが一人でやっていたような……」
1406 = "\"「À......vâng. Hình như là do một ông lão tự mình bán thì phải......」\""
# monologue
# JP: ぼんやりとだが、記憶している。
2430 = "Em vẫn còn nhớ lờ mờ về nó."
# monologue
# JP: 観光客相手のパッケージされたものではなく、\n地元相手の、一個いくらの、だごだった。
1961 = "Không phải là loại bánh được đóng gói đẹp đẽ bán cho khách du lịch, mà là loại bánh dango bán cho người dân địa phương, tính tiền theo từng cái."
# 【真闇】
# display as 真闇
# JP: 「あそこば閉店して、長いことがらんどうだったんを、\n元忠さんが買い取って、安ぅにテナント募集したんよ」
1783 = "\"「Quán đó đóng cửa, để trống suốt một thời gian dài, rồi ông Mototada mua lại và cho thuê mặt bằng với giá rất rẻ đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「銀行が？　あるいは、宝生元忠が個人で？」
1792 = "\"「Ngân hàng mua sao? Hay là đích thân Houshou Mototada mua?」\""
# 【真闇】
# display as 真闇
# JP: 「個人で。\n家賃、相場よりかなーり安ぅして」
1318 = "\"「Cá nhân ông ấy. Tiền thuê nhà rẻ hơn giá thị trường rất nhiều.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「……ならば採算度外視か？　確かにそうした試みは、\n地域活性化にも繋がるかもしれんが――」
1034 = "\"「......Vậy là không màng đến lợi nhuận sao? Quả thực những nỗ lực như vậy cũng có thể góp phần thúc đẩy kinh tế địa phương, nhưng mà——」\""
# monologue
# JP: これから商売にチャレンジするものがテナントに入るなら\n人材育成の役に立つ。
2100 = "Nếu những người chuẩn bị khởi nghiệp thuê mặt bằng đó, thì sẽ giúp ích cho việc đào tạo nhân lực."
# monologue
# JP: 既に実績のある店が市外から参入してくれるなら、\nそれももちろん、経済振興の役にたとう。
2097 = "Nếu những cửa hàng đã có tiếng tăm từ ngoại tỉnh chuyển đến, thì tất nhiên cũng sẽ góp phần chấn hưng kinh tế."
# 【双鉄】
# display as 雙鐵
# JP: 「――実際には、どんな成果が？」
1009 = "\"「——Trên thực tế thì, đã có thành quả gì chưa?」\""
# 【真闇】
# display as 真闇
# JP: 「なーんもよ」
1313 = "\"「Chẳng có gì cả.」\""
# monologue
# JP: ふるふると、真闇姉は脱力したように首を振る。
2318 = "Chị Mayami lắc đầu nguầy nguậy như thể đã kiệt sức."
# 【真闇】
# display as 真闇
# JP: 「繁盛しても、根付かんで隈元へ出てっちゃったり……\n逆に隈元の有名店ば出店してきて、お客がつかんかったり」
1508 = "\"「Có làm ăn phát đạt thì cũng chẳng trụ lại lâu mà lại chuyển lên Kumamoto...... Ngược lại, mấy quán nổi tiếng ở Kumamoto mở chi nhánh ở đây thì lại ế khách.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「……良くも悪しくも、古い町だからな、御一夜は」
1035 = "「......Dù tốt hay xấu thì Ohimitera vẫn là một thị trấn cổ mà.」"
# monologue
# JP: 新しい芽が芽吹けたならば、\n古い土地に根付くより、新天地を目指すのは当然だろう。
2102 = "Nếu có mầm non mới nhú, thì thay vì bám rễ ở mảnh đất cũ, hướng tới vùng đất mới là điều hiển nhiên thôi."
# monologue
# JP: 外から変革が訪れたなら、\n古い物とはどうしても、守りに入ってしまうだろうし――
2094 = "Nếu có biến cách từ bên ngoài ập đến, những thứ cũ kỹ kiểu gì cũng sẽ thu mình lại phòng thủ thôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「いかな宝生元忠といえど、\n個人レベルの試みで、そうした根本は変えられまい」
1513 = "「Cho dù là Houshou Mototada đi chăng nữa, những thử nghiệm ở mức độ cá nhân cũng chẳng thể nào thay đổi được cái gốc rễ đó đâu.」"
# 【真闇】
# display as 真闇
# JP: 「けどねぇ、他にもやってくれたんよ。いろいろと」
1294 = "「Nhưng mà nè, ông ấy còn làm nhiều thứ khác nữa cơ. Đủ thứ luôn.」"
# monologue
# JP: 言って、真闇姉は指を折る。\nスポーツ大会の誘致に、夏祭りとロックフェスとの共催。
2335 = "Nói rồi, chị Mayami đếm trên đầu ngón tay. Nào là thu hút các giải đấu thể thao, rồi đồng tổ chức lễ hội mùa hè với lễ hội nhạc rock."
# monologue
# JP: ゆるキャラなるものを作り総選挙へと出馬して、\n新名物となる料理のコンテストを行って――
2376 = "Tạo ra linh vật địa phương rồi cho ra tranh cử tổng tuyển cử, tổ chức cuộc thi nấu ăn để tìm ra đặc sản mới——"
# 【双鉄】
# display as 雙鐵
# JP: 「それを……全て個人でか？」
1748 = "「Những thứ đó......tất cả đều làm với tư cách cá nhân sao?」"
# 【真闇】
# display as 真闇
# JP: 「そーね。個人で。\n私財ば叩いて、自分の人脈ば使ぉて」
1596 = "「Đúng vậy. Với tư cách cá nhân. Bỏ tiền túi ra, dùng cả nhân mạch của bản thân nữa.」"
# monologue
# JP: 凄いことだ、と思いはするが。\n同時にどこか、虚しいようにも感じてしまう。
2433 = "Tôi nghĩ bụng, đúng là tuyệt thật. Nhưng đồng thời cũng cảm thấy có chút gì đó trống rỗng."
# monologue
# JP: それで本当に御一夜が変わると思っていたなら、\n宝生元忠――僕が思うよりよほど暗愚なのかもしれぬ。
2380 = "Nếu ông ta thực sự nghĩ rằng làm vậy sẽ thay đổi được Ohimitera, thì Houshou Mototada——có lẽ còn ngu ngốc hơn tôi tưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「何故個人でにこだわったのだ。市や市民、あるいは\n銀行を巻き込めば、成算も採算性も出てきたろうに」
1633 = "「Tại sao lại cứ phải cố chấp làm với tư cách cá nhân chứ. Nếu lôi kéo được thành phố, người dân, hay là ngân hàng vào cuộc, thì khả năng thành công và tính sinh lời sẽ cao hơn mà.」"
# 【真闇】
# display as 真闇
# JP: 「さぁねぇ。わからんよ。\nうちは、元忠さんじゃなかけん」
1395 = "「Chị chịu thôi. Không biết được đâu. Chị đâu phải là ông Mototada.」"
# monologue
# JP: 当たり前のことを当たり前に言い、\n真闇姉は肩を竦める。
2328 = "Nói những điều hiển nhiên một cách hết sức tự nhiên, chị Mayami nhún vai."
# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんと小さか試みば、いくつもいくつも。\n元忠さんは、積極的に試しとったんよ。長ぁいこと」
1296 = "「Mà, những thử nghiệm nhỏ nhặt kiểu đó, hết cái này đến cái khác. Ông Mototada đã rất tích cực thử nghiệm đấy. Trong một khoảng thời gian dà~i.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……その結果としての、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致なのか」
1060 = "「......Và kết quả của những việc đó, là việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sao.」"
# 【真闇】
# display as 真闇
# JP: 「誘致運動自体は、前の前の市長の頃からあったけん。\n元忠さんが本格的に加わったんは、“その上”で、よね」
1471 = "「Bản thân phong trào thu hút đầu tư thì đã có từ thời thị trưởng trước của trước nữa rồi. Việc ông Mototada chính thức tham gia là “sau những chuyện đó”, nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1800 = "「っ!」"
# monologue
# JP: ――繋がったような気がする。
975 = "——Tôi có cảm giác mọi thứ đã kết nối lại với nhau."
# monologue
# JP: 真闇姉の少し困ったような口調と、\n教えてもらった事実群とが。
2316 = "Giọng điệu có chút bối rối của chị Mayami, và những sự thật mà tôi vừa được biết."
# 【双鉄】
# display as 雙鐵
# JP: 「本格的に誘致運動に参加する前というのなら――\n宝生元忠の振興運動への反対などはなかったのだよな？」
1470 = "「Nếu là trước khi chính thức tham gia phong trào kêu gọi đầu tư—— thì cũng không có ai phản đối phong trào chấn hưng của Houshou Mototada đúng không?」"
# 【真闇】
# display as 真闇
# JP: 「よねぇ」
1628 = "「Đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、宝生元忠は一切の協力を求めなかった。個に拘り\n結果を出すのを拒むかのように、労力のみを費やした」
1295 = "「Nhưng Houshou Mototada không hề yêu cầu bất kỳ sự hợp tác nào. Ông ta cứ khư khư bám lấy cá nhân, như thể từ chối việc tạo ra kết quả, chỉ tiêu tốn công sức mà thôi.」"
# monologue
# JP: 真闇姉の答えは、無言。\nただ頷きがあるのみだ。
2313 = "Câu trả lời của chị Mayami là sự im lặng. Chị ấy chỉ gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜は変化を好まぬ町だ。宝生元忠はそれを知ってる。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致の話も当然、好まれぬものであろうとも」
1545 = "「Ohimitera là một thành phố không thích sự thay đổi. Houshou Mototada biết điều đó. Chuyện kêu gọi \\x%lエアクラ;#00ffc040;Aircra%l;#; tất nhiên cũng sẽ không được hoan nghênh.」"
# monologue
# JP: しかし、宝生元忠は、根気よく実績を積み重ね続けた。\n“地道な努力では復興できない”という、実績を。
1970 = "Thế nhưng, Houshou Mototada vẫn kiên nhẫn tích lũy thành tích. Thành tích chứng minh rằng “những nỗ lực thiết thực không thể mang lại sự phục hưng”."
# monologue
# JP: そうした下地が積み重ねられ、“その上”で、\n誘致やむなしと宝生元忠が判断したと見られるのなら――
2058 = "Nếu như những nền tảng đó được tích lũy, và “trên cơ sở đó”, người ta thấy rằng Houshou Mototada đã quyết định kêu gọi đầu tư như một biện pháp bất đắc dĩ thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「“他に手はない"と、思わせてしまうのは……\n変化を受け入れさせるには、極めて有効な手段だろうな」
1715 = "「Việc khiến mọi người nghĩ rằng “không còn cách nào khác”... chắc chắn là một phương pháp cực kỳ hữu hiệu để buộc họ chấp nhận sự thay đổi nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「さぁ？　人様のことはわからんけんねぇ」
1711 = "「Ai mà biết được? Chuyện của người khác thì chị không rõ đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだな。\nだが、おかげでいくつかのことは、わかった」
1774 = "「Chà, cũng đúng ha. Nhưng nhờ vậy mà em đã hiểu ra vài điều rồi.」"
# monologue
# JP: 宝生元忠の真意がどこにあったにせよ、その行動が、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致やむなしという空気を強化したのは確実だ。
1939 = "Bất kể ý định thực sự của Houshou Mototada là gì, hành động của ông ta chắc chắn đã củng cố bầu không khí cho rằng việc kêu gọi \\x%lエアクラ;#00ffc040;Aircra%l;#; là bất đắc dĩ."
# monologue
# JP: 市や商店会の協力を“得られず”、それでも頑張った。\nそうした姿は、共感を得ようものだから。が、だ――
1977 = "Dù “không nhận được” sự hợp tác từ thành phố hay hiệp hội thương mại, ông ta vẫn cố gắng. Hình ảnh đó rất dễ nhận được sự đồng cảm. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、反対に示せばいい。\n"他にも手がある”ということを、確たる結果とともに」
1778 = "「Nếu vậy, chỉ cần chứng minh điều ngược lại là được. Chứng minh rằng “vẫn còn cách khác” bằng một kết quả xác đáng.」"
# monologue
# JP: しかし……\n真闇姉が示してしまえば、角が立つ。
1972 = "Thế nhưng... Nếu chị Mayami đứng ra chứng minh thì sẽ gây mất lòng."
# monologue
# JP: 宝生元忠のメンツを潰し、彼の主張に賛同した者に、\n反感をもたれてしまうだろう。
1934 = "Việc đó sẽ làm mất mặt Houshou Mototada, và khiến những người tán thành chủ trương của ông ta nảy sinh ác cảm."
# 【双鉄】
# display as 雙鐵
# JP: 「それは外来者の役割だ。\n鉄道とハチロクと、そして僕とは、適任だ」
1782 = "「Đó là vai trò của những người ngoại đạo. Đường sắt, Hachiroku và em là những người phù hợp nhất.」"
# monologue
# JP: 役割を果たすことなら、慣れている。
2192 = "Nếu là hoàn thành vai trò thì tôi đã quen rồi."
# monologue
# JP: 無神経に旧来の価値観を壊す、変革者。\nその像が必要とされるなら、僕は必ず、そうあろう。
2104 = "Một nhà cải cách vô tâm phá vỡ những giá trị cũ. Nếu hình tượng đó là cần thiết, tôi nhất định sẽ trở thành như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「おかげで、やるべきが見えた気がする。\n話せてよかった。ありがとう」
1477 = "「Nhờ chị mà em cảm thấy mình đã thấy được những gì cần làm. Thật tốt vì đã nói chuyện với chị. Cảm ơn chị.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ！」
1503 = "「Sou-chan!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1801 = "「っ!!?」"
# monologue
# JP: 切羽詰まったような声。
2330 = "Một giọng nói như thể đang bị dồn vào chân tường."
# monologue
# JP: さりかけていた足を止め、何が起きたかと振り向いて――\nが、その先にいるのはいつもの、真闇姉だ。
2168 = "Tôi dừng bước chân đang định rời đi, quay lại xem có chuyện gì xảy ra—— Nhưng ở đó vẫn là chị Mayami như thường ngày."
# 【真闇】
# display as 真闇
# JP: 「……無理したり、平気なフリばしたら、いけんよ？\n手伝えることがあったら、おねえちゃんにいうんよ？」
1043 = "「......Không được cố quá hay giả vờ như không có chuyện gì đâu đấy nhé? Có gì cần giúp đỡ thì phải nói với chị, biết chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1656 = "「Vâng——」"
# monologue
# JP: 心配をしてもらってる。\n感じた瞬間、ふと気づく。
2397 = "Chị ấy đang lo lắng cho tôi. Ngay khoảnh khắc cảm nhận được điều đó, tôi chợt nhận ra."
# monologue
# JP: 工場誘致をされてしまうということは……\nこの人から、焼酎造りを奪ってしまうことにもなると。
2382 = "Việc nhà máy được kêu gọi đầu tư cũng có nghĩa là...... Sẽ cướp đi công việc nấu rượu shochu của người này."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。遠慮無く甘えさせてもらう。\nなりふりに構っていられる状況じゃないと、知ったから」
1449 = "「Vâng. Em sẽ không ngần ngại nhờ vả chị đâu. Vì em biết đây không phải là lúc để giữ kẽ nữa rồi.」"
# 【真闇】
# display as 真闇
# JP: 「そ？」
1599 = "「Thế à?」"
# monologue
# JP: 嬉しげな声。\nそして手が、静かに静かに、伸びてくる。
2079 = "Giọng nói vui vẻ. Và rồi, một bàn tay từ từ, lặng lẽ đưa ra."
# monologue
# JP: だから受け取り、握手し、驚く。
2174 = "Vì vậy, tôi nắm lấy, bắt tay và rồi kinh ngạc."
# monologue
# JP: （真闇姉の手は……\nこれほど小さく、これほど柔らかだったのか）
2452 = "（Bàn tay của chị Mayami...... Lại nhỏ bé và mềm mại đến thế này sao?）"
# monologue
# JP: この手に、僕は頼ってる。\n恥じ入る気持ちは、強い責任感へと変わる。
2175 = "Tôi đang dựa dẫm vào bàn tay này. Cảm giác xấu hổ chuyển thành một tinh thần trách nhiệm mạnh mẽ."
# monologue
# JP: ――もっと強く、もっと役立つ、僕にならねば。
973 = "——Tôi phải trở nên mạnh mẽ hơn, hữu ích hơn mới được."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nれいなからデータを貰い、表にまとめておきました」
1794 = "「Ngài Soutetsu. Em đã nhận được dữ liệu từ Reina và tổng hợp lại thành bảng rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。助かる」
1799 = "「Xin lỗi nhé. Giúp ích nhiều lắm.」"
# monologue
# JP: ポーレットに聞けば恐らく容易に答えは出ようが、\n余計な負担をかけたくないし、先入観を持ちたくもない。
2429 = "Nếu hỏi Paulette thì có lẽ sẽ dễ dàng có câu trả lời, nhưng tôi không muốn tạo thêm gánh nặng cho cô ấy, cũng không muốn có định kiến."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の方も、市役所で数字をもらってきた」
1554 = "「Phía tôi cũng đã lấy được số liệu từ tòa thị chính rồi.」"
# monologue
# JP: 年度別の、御一夜市の宿泊観光客数と、\n御一夜駅の利用者数と。
2227 = "Số lượng khách du lịch lưu trú tại thành phố Ohimitera theo từng năm, và số lượng người sử dụng ga Ohimitera."
# monologue
# JP: それを並べてグラフに起こせば、\nたちどころにして浮き上がってくる。
2096 = "Nếu xếp chúng cạnh nhau và vẽ thành biểu đồ, chúng sẽ lập tức nổi bật lên."
# 【双鉄】
# display as 雙鐵
# JP: 「……\\x%l大詔;#00ffc040;大詔%l;#;三十五年――\nつまり[しょうわ,1]正和[がんねん,1]元年は、敗戦の年だな」
1049 = "「......Năm \\x%l大詔;#00ffc040;Taisho%l;#; thứ 35—— tức là năm Showa thứ nhất, là năm chiến bại nhỉ.」"
# monologue
# JP: その年が、宿泊客数の激減の谷間の大きな底だ。
2419 = "Năm đó là đáy sâu nhất của thung lũng sụt giảm nghiêm trọng lượng khách lưu trú."
# monologue
# JP: 戦争を知るハチロクが、\n浮かぬ表情で相槌を打つ。
2348 = "Hachiroku, người biết về chiến tranh, gật đầu đồng tình với vẻ mặt u ám."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l大戦;#00ffc040;大戦%l;#;末期に近づくにつれ、\n観光どころではなくなってしまいましたから」
1468 = "「Bởi vì khi càng về cuối cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#;, thì người ta càng không còn tâm trí đâu mà đi du lịch nữa ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理からぬことだな。が――その期間にも、\n駅利用者数の落ち込みは比較的緩やかだ」
1445 = "「Cũng là chuyện đương nhiên thôi. Nhưng——trong khoảng thời gian đó, mức độ sụt giảm số lượng người sử dụng ga lại tương đối chậm.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、休まず走り続けましたので。\n戦時中も、敗戦の日も、その翌日からも、ずっと」
1466 = "「Bởi vì chúng em vẫn tiếp tục chạy không ngừng nghỉ. Trong thời chiến, ngày chiến bại, và cả những ngày sau đó, luôn luôn như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……輸送や移送の重要性は、\n戦前も戦中も戦後も、大きく変わりはしないのか」
1597 = "「Ra vậy......Tầm quan trọng của việc vận chuyển và di chuyển, dù là trước, trong hay sau chiến tranh cũng không thay đổi nhiều nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。\nそれだけに、戦時には苦労も多うございましたが」
1603 = "「Đúng là như vậy ạ. Chính vì thế mà trong thời chiến, chúng em cũng gặp rất nhiều vất vả.」"
# monologue
# JP: 誇りに凛と響く声。\nけれども、どこか辛そうな顔。
2078 = "Giọng nói vang lên đầy kiêu hãnh. Nhưng khuôn mặt lại có vẻ gì đó đau khổ."
# monologue
# JP: ギャップが疑問を呼び覚まし、\n疑問はすぐさま記憶に繋がる。
1978 = "Sự mâu thuẫn đó đánh thức những nghi vấn, và những nghi vấn ngay lập tức kết nối với ký ức."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――教科書かなにかで見たことがある。\n空襲では、鉄道も狙われたのだったか」
1429 = "「A——Tôi từng thấy trong sách giáo khoa hay ở đâu đó rồi. Trong các cuộc không kích, đường sắt cũng bị nhắm làm mục tiêu phải không?」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。どころか、海沿いの……[とうかいどう,2]東峡道本線などは、\n艦砲射撃でも狙われるだろうと言われておりました」
1607 = "「Đúng vậy ạ. Thậm chí, tuyến chính Tokaido...... chạy dọc bờ biển, còn được cho là sẽ bị nhắm bắn bởi hải pháo nữa cơ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、戦いだったのだな」
1074 = "「......Đúng là một cuộc chiến thực sự nhỉ.」"
# monologue
# JP: そんな時代を乗り越えて、御一夜駅利用者数も\n御一夜市への宿泊客数とともに堅調に復活し――
2273 = "Vượt qua thời đại đó, số lượng người sử dụng ga Ohimitera cùng với số lượng khách lưu trú tại thành phố Ohimitera đã phục hồi vững chắc——"
# monologue
# JP: しかし、\\x%l正和;#00ffc040;正和%l;#;八年を境に再びの下降線を描き始める。
1966 = "Thế nhưng, lấy năm \\x%l正和;#00ffc040;Showa%l;#; thứ 8 làm ranh giới, nó lại bắt đầu vẽ nên một đường đi xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「八から十と下り続け、\n十一年の激減は、これは……」
1535 = "「Tiếp tục giảm từ năm thứ 8 đến năm thứ 10, sự sụt giảm nghiêm trọng vào năm thứ 11, đây là......」"
# 【真闇】
# display as 真闇
# JP: 「十一年は、いわゆる\\x%lエアクラ;#00ffc040;エアクラ%l;#;法が施行された年とよ」
1354 = "「Năm thứ 11 là năm cái gọi là đạo luật \\x%lエアクラ;#00ffc040;Aircra%l;#; được ban hành đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば、その数年前からが、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展期にあたったわけか」
1401 = "「A——Nếu vậy thì, từ vài năm trước đó đã là thời kỳ phát triển của \\x%lエアクラ;#00ffc040;Aircra%l;#; rồi nhỉ.」"
# monologue
# JP: ……そこから先は、お手本のような右肩下がり。\nかろうじて持ち直しをみせるのは、何十年も経過した――
989 = "......Từ đó về sau là một sự sụt giảm tiêu chuẩn. Phải mất hàng chục năm mới cho thấy dấu hiệu phục hồi khó khăn——"
# 【双鉄】
# display as 雙鐵
# JP: 「この、\\x%l正和;#00ffc040;正和%l;#;五十年には、何が？」
1749 = "「Vào năm \\x%l正和;#00ffc040;Showa%l;#; thứ 50 này, có chuyện gì đã xảy ra vậy?」"
# 【真闇】
# display as 真闇
# JP: 「御一夜市長に[ひない,1]雛衣さん――\nポーちゃんのお父さんが就いた年よね」
1754 = "「Đó là năm mà ông Hinai—— Bố của Pau-chan nhậm chức Thị trưởng Ohimitera nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば恐らく、御一夜鉄道にポーレットや、\nひょっとするとれいなも関わり始めた年となるのか」
1404 = "「A——Nếu vậy thì có lẽ, đây là năm mà Paulette, và biết đâu cả Reina cũng bắt đầu tham gia vào Đường sắt Ohimitera nhỉ.」"
# monologue
# JP: 以降は、微々にではあるが、駅利用客は増加している。
2145 = "Kể từ đó, lượng khách sử dụng nhà ga đã tăng lên, dù chỉ là một chút."
# monologue
# JP: さすがポーレットと思いはするが――\nしかし宿泊観光客数は、ほとんど改善を見せていない。
2159 = "Tuy tôi nghĩ quả không hổ danh Paulette—— Nhưng số lượng khách du lịch lưu trú hầu như không cho thấy sự cải thiện nào."
# 【日々姫】
# display as 日日姬
# JP: 「この、\\x%l正和;#00ffc040;正和%l;#;四十二年には何があったと？\nカクンて、ここらもひどか谷ばい」
1750 = "「Năm \\x%l正和;#00ffc040;Showa%l;#; thứ 42 này đã có chuyện gì vậy? Nó tụt hẳn xuống, chỗ này cũng là một thung lũng thê thảm đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%l正和;#00ffc040;正和%l;#;四十二年は、\\x%l帝鉄;#00ffc040;帝鉄%l;#;解体の年です。ともない、恐らく、\n隈元でも、大廃線が一気に進んだのでしょう」
1621 = "「Năm \\x%l正和;#00ffc040;Showa%l;#; thứ 42 là năm \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; giải thể. Cùng với đó, có lẽ ở Kumamoto, đại bãi bỏ các tuyến đường sắt cũng đã diễn ra đồng loạt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと――確か、鉄道地図があったよな」
1387 = "「À——Hình như có bản đồ đường sắt nhỉ.」"
# monologue
# JP: 奥の間に行き探して見れば、\n記憶通りの場所に鉄道地図群を発見できる。
2169 = "Đi vào phòng trong tìm kiếm, tôi phát hiện ra một xấp bản đồ đường sắt đúng ở nơi mình nhớ."
# 【双鉄】
# display as 雙鐵
# JP: 「あった。\\x%l正和;#00ffc040;正和%l;#;三十七年のものがこれで、\n\\x%l正和;#00ffc040;正和%l;#;四十六年のものがこちらだ」
1610 = "「Có rồi. Của năm \\x%l正和;#00ffc040;Showa%l;#; thứ 37 là cái này, còn của năm \\x%l正和;#00ffc040;Showa%l;#; thứ 46 là cái này.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ……これは廃れるのも無理なかとー」
1380 = "「Oa......Thế này thì tàn tạ cũng phải thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1594 = "「Đúng vậy.」"
# monologue
# JP: 三十七年の\\x%l帝鉄;#00ffc040;帝鉄%l;#;路線は、九洲広くを網羅している。\n御一夜から、北は[やつしろ,2]八ツ城を超え[くまもと,1]隈元-[はかた,1]博太、その先へ。
1930 = "Tuyến đường sắt \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; năm 37 bao phủ rộng khắp Kyushu. Từ Ohimitera, hướng Bắc vượt qua Yatsushiro đến Kumamoto - Hakata, và xa hơn nữa."
# monologue
# JP: 南は[よしまつ,1]由松で分岐し、[はやと,1]早戸-[かごしま,2]鹿兒島方面と、\n[みやこのじょう,2]都之城-[みやざき,1]宮嵜方面とが走っている。
2002 = "Hướng Nam phân nhánh tại Yoshimatsu, chạy về phía Hayato - Kagoshima, và phía Miyakonojo - Miyazaki."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜まわりだけでもこれほど栄えていたものが……\n四十六年には、湯医線だけしか残らんとは」
1641 = "「Chỉ riêng khu vực quanh Ohimitera đã từng sầm uất đến thế này mà...... Đến năm 46, lại chỉ còn mỗi Tuyến Yui thôi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;は、\nかくも速やかに鉄道を駆逐していったのです」
1003 = "「\\x%lエアクラ;#00ffc040;Aircra%l;#; đã đào thải đường sắt một cách nhanh chóng như vậy đó ạ.」"
# monologue
# JP: データが、地図が、言葉が、理解を深めてくれた。
2226 = "Dữ liệu, bản đồ, và những lời nói đã giúp tôi hiểu sâu hơn."
# monologue
# JP: 御一夜の衰退は、鉄道中継点としての価値の喪失と一体だ。\nつまり――
2149 = "Sự suy thoái của Ohimitera gắn liền với việc mất đi giá trị của một điểm trung chuyển đường sắt. Nói cách khác——"
# 【真闇】
# display as 真闇
# JP: 「これ……御一夜は、ターミナル駅としての価値以上の、\n観光地としての価値ば持てんかったゆーことよねぇ」
1745 = "「Cái này......Có nghĩa là Ohimitera không có giá trị nào khác với tư cách là một địa điểm du lịch, ngoài giá trị của một \\x%lターミナル駅;#00ffc040;ga đầu mối%l;#; nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。単純に温泉地となれば人はやはり、\n[ゆふいん,2]湯富院なり[べっぷ,1]別部なり[いぶすき,1]燻宿なりに向かってしまう」
1593 = "「Đúng vậy. Nếu chỉ đơn thuần là một khu suối nước nóng thì người ta vẫn sẽ hướng đến Yufuin, Beppu hay Ibusuki thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;で簡単に行けるのも強かよね」
1672 = "「Việc có thể dễ dàng đi lại bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng là một lợi thế lớn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに御一夜はその面でも不利だ。エアクラを使っても、\nアクセスのよい大都市は八ツ城・隈元くらいしか無い」
1664 = "「Quả thực Ohimitera cũng bất lợi ở điểm đó. Dù có dùng Aircra, những thành phố lớn dễ tiếp cận cũng chỉ có Yatsushiro và Kumamoto.」"
# monologue
# JP: 湯医線を存続させた\\x%lエアクラ;#00ffc040;エアクラ%l;#;作動不能地帯が、\n観光地としての価値から見た場合には足枷となる。
2415 = "Khu vực \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động đã giúp Tuyến Yui tồn tại, nhưng nếu nhìn từ giá trị của một địa điểm du lịch thì nó lại trở thành xiềng xích."
# monologue
# JP: 湯量で負け。知名度で負け。砂風呂という名物に負け。\n更に交通の便でも負けては、温泉地としては勝ち目がない。
2264 = "Thua về lượng nước nóng. Thua về độ nổi tiếng. Thua về đặc sản tắm cát. Lại còn thua cả về sự tiện lợi giao thông, thì làm sao có cửa thắng với tư cách là một khu suối nước nóng."
# 【双鉄】
# display as 雙鐵
# JP: 「……他の温泉地に無く、僕らにある観光資源といえば、\n[ハチロクニイマル,3]8620と、焼酎だ」
1067 = "「......Nói đến tài nguyên du lịch mà các khu suối nước nóng khác không có, còn chúng ta thì có, đó là \\x%l8620;#00ffc040;8620%l;#; và rượu shochu.」"
# monologue
# JP: 整理するつもりで発した言葉が、\nそのままひとつの結論となる。
2195 = "Những lời tôi thốt ra với ý định sắp xếp lại mọi thứ, cứ thế trở thành một kết luận."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、焼酎を飲める\\x%l列車;#00ffc040;列車%l;#;を仕立ててはどうだろう」
1779 = "「Nếu vậy, chúng ta thiết kế một chuyến \\x%l列車;#00ffc040;tàu%l;#; có thể uống rượu shochu thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「蒸気焼酎のことなら」
1487 = "「Nếu là rượu shochu hơi nước thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、蒸気焼酎だけにこだわるのではなく。\n例えば、飲み比べをできるような――」
1303 = "「Không, không chỉ giới hạn ở rượu shochu hơi nước đâu. Ví dụ như, có thể uống thử để so sánh các loại——」"
# monologue
# JP: いや、違う。\nそれだけではまだ不足している。
1946 = "Không, không phải. Chỉ như vậy thì vẫn chưa đủ."
# monologue
# JP: “僕らの資源”は、もっと活かせる。\n余すところなく活用しきれる。
2385 = "“Tài nguyên của chúng ta” có thể được tận dụng nhiều hơn thế. Có thể khai thác một cách triệt để."
# 【双鉄】
# display as 雙鐵
# JP: 「……ここ何年も帝都では焼酎ブームでな。\nプレミアがついているものも少なくないんだ」
1063 = "「......Vài năm gần đây ở Đế đô đang rộ lên phong trào uống rượu shochu. Không ít loại đã trở thành hàng hiếm đắt đỏ đâu.」"
# 【真闇】
# display as 真闇
# JP: 「[もりのぞう,2]森ノ象さんの“森ノ象”。[しらたま,1]白霊さんの“[めいおう,1]冥王”。\n[くらき,1]蔵木さんの“[ひゃくねんのこどく,4]百年の蟲毒”あたりよね？」
1617 = "「“Morinozou” của nhà Morinozou. “Meiou” của nhà Shiratama. “Hyakunen no Kodoku” của nhà Kuraki phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。で。その辺の焼酎は帝都ではまず入手できないが、\nうち――右田の問屋の方では、普通に扱いがある」
1436 = "「Ừ. Và những loại shochu đó ở Đế đô gần như không thể mua được, nhưng ở nhà chúng ta——đại lý bán buôn Migita, thì vẫn có bán bình thường.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　なら、\nプレミア焼酎ば[の]飲みっ[くら]比できる\\x%l列車;#00ffc040;列車%l;#;にすると？」
1416 = "「A! Vậy thì, sẽ làm thành một chuyến \\x%l列車;#00ffc040;tàu%l;#; có thể uống thử các loại shochu hiếm sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうのはどうだろう。\n\\x%l列車;#00ffc040;列車%l;#;で酒を飲ませるというのがマズくなければ――」
1460 = "「Mọi người thấy thế nào. Nếu việc cho uống rượu trên \\x%l列車;#00ffc040;tàu%l;#; không có gì bất ổn thì——」"
# 【ハチロク】
# display as 八六
# JP: 「そこは、腕のいい客室乗務員を確保できれば、\n大丈夫ではないかと存じます」
1751 = "「Về điểm đó, nếu chúng ta có thể đảm bảo được những nhân viên phục vụ trên tàu giỏi, thì em nghĩ sẽ không sao đâu ạ.」"
# monologue
# JP: ハチロクの声は、明るく、強い。
1981 = "Giọng của Hachiroku rất tươi sáng và mạnh mẽ."
# 【ハチロク】
# display as 八六
# JP: 「[ビール,1]麦酒\\x%l列車;#00ffc040;列車%l;#;というものを走らせる私鉄は、\n鉄道全盛期には、決して珍しくはありませんでしたし」
1716 = "「Vào thời kỳ hoàng kim của đường sắt, những tuyến đường sắt tư nhân vận hành các chuyến \\x%l列車;#00ffc040;tàu%l;#; bia hoàn toàn không phải là chuyện hiếm đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1598 = "「Vậy sao.」"
# 【ハチロク】
# display as 八六
# JP: 「泥酔させない\\x%l車販;#00ffc040;車販%l;#;・サービスの体制をつくる。\nそれさえ出来れば、トラブルはほぼ回避できる筈です」
1696 = "「Xây dựng một hệ thống \\x%l車販;#00ffc040;bán hàng trên tàu%l;#; và dịch vụ không để khách say xỉn. Chỉ cần làm được điều đó, chắc chắn có thể tránh được hầu hết các rắc rối.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうした点は、ポーレットや赤井宮司に相談となるか\n――っと」
1747 = "「Những điểm đó thì chắc phải bàn bạc với Paulette và đền chủ Akai thôi nhỉ ——Á.」"
# monologue
# JP: 真闇姉が挙手をしている。\nなにかと問えば、申し訳無さそうな声で問われる。
2329 = "Chị Mayami đang giơ tay. Khi tôi hỏi có chuyện gì, chị ấy cất giọng đầy vẻ áy náy."
# 【真闇】
# display as 真闇
# JP: 「ね、双ちゃん。\nそん\\x%l列車;#00ffc040;列車%l;#;ば、どんだけ走らせっと？」
1504 = "「Này, Sou-chan. Chuyến \\x%l列車;#00ffc040;tàu%l;#; đó, em định cho chạy bao nhiêu chuyến?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1800 = "「！」" 
# monologue
# JP: 聞かれればすぐ、己の案の不足に気づく。
2374 = "Vừa được hỏi, tôi liền nhận ra sự thiếu sót trong kế hoạch của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――そのような\\x%l列車;#00ffc040;列車%l;#;にしてしまえば、\nみなが飲みたがるのは、プレミア焼酎に偏るよな」
1590 = "「Ra vậy——Nếu làm một chuyến \\x%l列車;#00ffc040;tàu%l;#; như thế, thì ai cũng sẽ đổ xô đi uống các loại shochu hiếm nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「確かに……でしょうね。その場合、飲めないことが、\nむしろトラブルに繋がってしまうかもしれません」
1663 = "「Chắc chắn là......vậy rồi. Trong trường hợp đó, việc không được uống có khi lại dẫn đến rắc rối cũng nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「となると……例えば一日一\\x%l編成;#00ffc040;編成%l;#;を走らせて、\n一人一種あたり二合に制限をしたとして……」
1756 = "「Vậy thì......Ví dụ như mỗi ngày chạy một \\x%l編成;#00ffc040;đoàn tàu%l;#;, và giới hạn mỗi người chỉ được uống hai go cho mỗi loại......」"
# 【ハチロク】
# display as 八六
# JP: 「17[メートル]m級[こうせい,1]鋼製\\x%l客車;#00ffc040;客車%l;#;で、余裕をもたせた座席とすると、\n定員は60名程度でしょうか」
1802 = "「Với \\x%l客車;#00ffc040;toa hành khách%l;#; bằng thép dài 17m, nếu bố trí chỗ ngồi rộng rãi một chút, thì sức chứa khoảng 60 người phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「60名だと、一日につき一種の酒が十二[しょう]升……」
1810 = "「60 người thì mỗi ngày một loại rượu sẽ tốn 12 sho......」"
# monologue
# JP: 日に十二升を三百六十五日間――\n今の取扱量では、到底まかなえるものではない。
2253 = "Mỗi ngày 12 sho trong suốt 365 ngày—— Với khối lượng xử lý hiện tại, chúng ta không thể nào đáp ứng nổi."
# 【双鉄】
# display as 雙鐵
# JP: 「すでにプレミアが付いているのだ。\n扱いを増やしてもらうのは――まず無理だろうな」
1676 = "「Vốn dĩ nó đã là hàng hiếm rồi. Việc yêu cầu tăng số lượng cung cấp——chắc chắn là không thể nào.」"
# 【ハチロク】
# display as 八六
# JP: 「では、飲み比べ\\x%l列車;#00ffc040;列車%l;#;は実現不可能となりますか」
1785 = "「Vậy là chuyến \\x%l列車;#00ffc040;tàu%l;#; uống thử so sánh không thể thực hiện được sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうなるか。残念だが」
1055 = "「......Chắc là vậy rồi. Tiếc thật.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね、待ってにぃに！」
1772 = "「Này, đợi đã anh hai!」"
# monologue
# JP: 日々姫が挙手をし、\nぐいと体を乗り出してくる。
2240 = "Hibiki giơ tay, và chồm người về phía trước."
# monologue
# JP: それぞれの地元でやれないか、と。
2087 = "Con bé nói, liệu có thể làm ở từng địa phương được không."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1411 = "「A!」"
# 【ハチロク】
# display as 八六
# JP: 「地元ごと……でございますか？」
1378 = "「Từng địa phương......sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ああ、無論、\nくわしくはポーレットに尋ねねばなのだが……」
1432 = "「Ừ. À, tất nhiên, chi tiết thì phải hỏi Paulette mới được......」"
# monologue
# JP: 森ノ象さんと白霊さんは鹿兒島、蔵木さんは宮嵜――
2249 = "Morinozou và Shiratama ở Kagoshima, Kuraki ở Miyazaki——"
# monologue
# JP: 他に例えば、プレミア化している麦焼酎、\n“[かめはち,1]亀八”を出している[よつめ,2]四ツ目さんは、[おおいた,1]大板にある。
1982 = "Ngoài ra ví dụ như, nhà Yotsume sản xuất loại shochu lúa mạch đang trở thành hàng hiếm “Kamehachi”, thì nằm ở Oita."
# 【双鉄】
# display as 雙鐵
# JP: 「もし、それぞれの県に。\nどんなに短いものでも鉄道路線が残っているなら――」
1285 = "「Nếu ở mỗi tỉnh, dù có ngắn đến đâu mà vẫn còn sót lại tuyến đường sắt thì——」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！　それが、“地元ごと”――それぞれの地元で、\nそれぞれの焼酎を飲める、焼酎\\x%l列車;#00ffc040;列車%l;#;を走らせる」
1414 = "「A! Vậy ra, “từng địa phương” là——chạy những chuyến \\x%l列車;#00ffc040;tàu%l;#; shochu để thưởng thức rượu shochu đặc trưng của từng địa phương.」"
# 【日々姫】
# display as 日日姬
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;でだったら、簡単にめぐれるばい。\nそれ、ツアーとして売りだせばよかとよ」
1638 = "「Nếu đi bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; thì có thể dễ dàng đi một vòng mà. Biến nó thành một tour du lịch rồi bán là được chứ gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「旅行企画としてか――悪くない。\nうん、実に良さそうに僕は思う」
1327 = "「Dưới dạng một tour du lịch sao——Cũng không tồi. Ừ, anh nghĩ thực sự rất có triển vọng đấy.」"
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;は自動運転だから、飲酒状態で乗ったところで、\n法の面でも安全性の面でも問題ない。
53 = "Vì \\x%lエアクラ;#00ffc040;Aircra%l;#; tự động lái, nên dù có lên tàu trong tình trạng say xỉn thì cũng không có vấn đề gì về mặt luật pháp hay an toàn."
# monologue
# JP: それに抵抗ある世代向けには、\nバスツアーを組んでもらうという手も考えられる。
2118 = "Đối với những thế hệ còn e ngại điều đó, cũng có thể nghĩ đến phương án tổ chức tour du lịch bằng xe buýt."
# 【ハチロク】
# display as 八六
# JP: 「良いですね――焼酎\\x%l列車;#00ffc040;列車%l;#;を各地に点在させて。\nそして、将来的には。いずれ、きっと」
1575 = "「Hay quá——Phân bố các chuyến \\x%l列車;#00ffc040;tàu%l;#; shochu rải rác khắp nơi. Và rồi, trong tương lai. Một ngày nào đó, chắc chắn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、そうだな、将来的には。もしも線路がつながれば、\n焼酎\\x%l列車;#00ffc040;列車%l;#;でぐるり九洲――とさえ出来るかもしれん」
1452 = "「Ừ, đúng vậy, trong tương lai. Nếu các tuyến đường sắt được kết nối, thậm chí chúng ta có thể đi một vòng Kyushu bằng \\x%l列車;#00ffc040;tàu%l;#; shochu cũng nên.」"
# monologue
# JP: 現時点でも、それぞれの地域の振興にもなるアイディアだ。\nこの話であれば、どの蔵にも自信を持って提案できる。
2120 = "Ngay cả ở thời điểm hiện tại, đây cũng là một ý tưởng giúp chấn hưng từng khu vực. Nếu là chuyện này, tôi có thể tự tin đề xuất với bất kỳ xưởng rượu nào."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉としてはどうだろう？　問題なければ、\nまずはポーレットにこの案を持って行きたい」
1652 = "「Ý chị Mayami thế nào? Nếu không có vấn đề gì, trước tiên em muốn mang kế hoạch này đến cho Paulette.」"
# monologue
# JP: 問えば、んんっ、と\n真闇姉の眉根が顰まってしまう。
2205 = "Khi tôi hỏi, chị Mayami ậm ừ, đôi mày nhíu lại."
# 【真闇】
# display as 真闇
# JP: 「良か案と思うよ。良か案やけどねぇ……今の段階では、\n御一夜が埋もれて、素通りされてしまいかねんね」
1335 = "「Chị nghĩ đó là một ý tưởng hay. Ý tưởng hay nhưng mà......ở giai đoạn này, Ohimitera có thể sẽ bị lu mờ và bị bỏ qua mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ」
1389 = "「Hừm.」"
# monologue
# JP: 確かに、だ。\n地元無双の“右田一”だが、全国的な知名度は低い。
2341 = "Quả thực là vậy. Dù “Migita Ichi” là độc nhất vô nhị ở địa phương, nhưng độ nổi tiếng trên toàn quốc lại thấp."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;に乗りたい方は、焼酎無しでも来てくれるだろうし\n……この案、肝心の御一夜への上積みがあまり望めない。
2152 = "Những người muốn đi \\x%l8620;#00ffc040;8620%l;#; thì dù không có shochu họ cũng sẽ đến thôi ......Kế hoạch này, không thể kỳ vọng nhiều vào việc mang lại lợi ích thiết thực cho Ohimitera."
# 【真闇】
# display as 真闇
# JP: 「やけん。ちょこっと――\n一晩だけ、考えさせてもらって良かと？」
1571 = "「Cho nên là. Một chút thôi—— Cho chị suy nghĩ một đêm có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。無論だ。\n僕もなにか、考えておく」
1423 = "「A, vâng. Tất nhiên rồi. Em cũng sẽ suy nghĩ thêm.」"
# 【真闇】
# display as 真闇
# JP: 「ん。で、ポーちゃんにも相談ばしておいて？」
1441 = "「Ừ. Vậy em cũng bàn bạc với Pau-chan trước đi nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは全く問題ないが……。っと」
1758 = "「Chuyện đó thì hoàn toàn không có vấn đề gì...... Á.」"
# monologue
# JP: いかん、時間だ。\nあっという間に過ぎてしまった。
1936 = "Không xong rồi, đến giờ rồi. Thời gian trôi qua nhanh như chớp."
# monologue
# JP: もう七時になる。\n真闇姉は蔵へ、僕らはレールショップへと向かわねば。
2131 = "Đã sắp 7 giờ rồi. Chị Mayami phải đến xưởng rượu, còn chúng tôi phải đến cửa hàng đường sắt."
# 【真闇】
# display as 真闇
# JP: 「一晩で良か案ば出せんようなら、\n現状案に、喜んで乗っからせてもらうけん」
1491 = "「Nếu sau một đêm mà chị không nghĩ ra được ý tưởng nào hay hơn, thì chị sẽ vui vẻ tham gia vào kế hoạch hiện tại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ」
# 1656 = "「知道了」" 
# monologue
# JP: ――ならばともかく、今はやるべきことをやろう。
978 = "——Dù sao thì, bây giờ hãy làm những việc cần làm đã."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;の修復も、\\x%l客車;#00ffc040;客車%l;#;の手配も手伝って、\n少しでもポーレットの負荷を減らそう。
2181 = "Giúp đỡ việc phục hồi \\x%l8620;#00ffc040;8620%l;#; và sắp xếp \\x%l客車;#00ffc040;toa hành khách%l;#;, để giảm bớt gánh nặng cho Paulette dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ、ハチロク」
1725 = "「Đi thôi, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
1462 = "「Vâng, ngài Soutetsu.」"
# monologue
# JP: 真闇姉が乗っかってくれるというのなら、\nその足場を、少しでも良いものとしておくために。
2353 = "Nếu chị Mayami đã đồng ý tham gia, thì tôi phải chuẩn bị một nền tảng tốt nhất có thể cho chị ấy."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん」
1502 = "「Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕だ」
1454 = "「Vâng. Là em đây.」"
# monologue
# JP: また居るだろうと思って訪ねて、居てくれた。\nすぐに、僕だとわかってくれた。
2184 = "Tôi ghé qua vì nghĩ chị ấy vẫn còn ở đây, và chị ấy đúng là ở đây thật. Chị ấy ngay lập tức nhận ra tôi."
# monologue
# JP: それだけのことが嬉しくて、\nまた少しだけ、酔ったような気持ちにさせられる。
2413 = "Chỉ bấy nhiêu thôi cũng khiến tôi vui sướng, và lại cảm thấy hơi lâng lâng như say."
# 【双鉄】
# display as 雙鐵
# JP: 「話したいと思ってきた。\nポーレットは、とても乗り気だった」
1568 = "「Em đến vì muốn nói chuyện với chị. Paulette rất hứng thú với kế hoạch này.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
# 1599 = "「是嗎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うん。[かごしま,2]鹿兒島にも[みやざき,1]宮嵜にも[おおいた,1]大板にも、\n鉄道は残り、走り続けてくれているそうだ」
1439 = "「Vâng. Nghe nói ở Kagoshima, Miyazaki và cả Oita, đường sắt vẫn còn tồn tại và tiếp tục hoạt động.」"
# 【真闇】
# display as 真闇
# JP: 「ああ……そんなら、きっと、\n話ば、上手く運ぶねぇ」
1410 = "「A......Vậy thì, chắc chắn mọi chuyện sẽ tiến triển tốt đẹp thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「運ばなくとも、運んでみせる。\nそのためになら、どんな努力も厭わぬつもりだ」
1506 = "「Dù không tiến triển, em cũng sẽ làm cho nó tiến triển. Vì mục đích đó, em sẽ không ngần ngại bất kỳ nỗ lực nào.」"
# monologue
# JP: 言いつつ近づき、ふと気づく。\n真闇姉が立っているのは――
2209 = "Vừa nói tôi vừa bước lại gần, rồi chợt nhận ra. Chỗ chị Mayami đang đứng là——"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……蒸気焼酎のタンクか」
1753 = "「Đây là......bồn chứa rượu shochu hơi nước sao?」"
# monologue
# JP: 問えばクンっ、と真闇姉が小鼻を鳴らす。
2206 = "Khi tôi hỏi, chị Mayami hừ mũi một cái."
# monologue
# JP: 酒の香を楽しんでいるようにも見えて、\n少し不満気な仕草とも見える。
2084 = "Trông như chị ấy đang thưởng thức hương rượu, nhưng cũng có vẻ như đang bất mãn điều gì đó."
# 【真闇】
# display as 真闇
# JP: 「“右田一”はもう完成している焼酎やけん。\nあの味は、変えられんよね」
1019 = "「“Migita Ichi” đã là một loại shochu hoàn thiện rồi. Hương vị đó không thể thay đổi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1442 = "「嗯」" 
# monologue
# JP: 蔵の名を冠する代表作で、\nガッシリとした固定ファンにより支えられてる。
2109 = "Đó là tác phẩm tiêu biểu mang tên xưởng rượu, được ủng hộ bởi một lượng fan trung thành vững chắc."
# monologue
# JP: 右田一の味を変えるというのは、\n地元に喧嘩を売るに等しい――ああ。
2379 = "Việc thay đổi hương vị của Migita Ichi chẳng khác nào gây chiến với người dân địa phương——A."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、蒸気焼酎を？」
1570 = "「Vậy nên, mới là shochu hơi nước sao?」"
# 【真闇】
# display as 真闇
# JP: 「もうちょっと――もう、うんと。質ば深めて、\n同じ勝負の土俵ば立てんもんかと」
1282 = "「Thêm một chút nữa——không, phải là rất nhiều. Chị muốn nâng cao chất lượng, để xem có thể đứng trên cùng một đấu trường với họ được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「勝負」
1496 = "「Đấu trường.」"
# monologue
# JP: “森ノ象”と、“冥王”と、\n“百年の蟲毒”と、“亀八”と。
2041 = "Với “Morinozou”, với “Meiou”, với “Hyakunen no Kodoku”, và với “Kamehachi”."
# monologue
# JP: それらの人気に乗るのではなく、\n真正面からぶつかりたいと、真闇姉はそう言っている。
2331 = "Chị Mayami đang nói rằng, không phải là ăn theo sự nổi tiếng của chúng, mà là muốn đối đầu trực diện."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、蒸気焼酎とて質の劣るものではなかろう。\nここから質を深めるためには――」
1297 = "「Nhưng shochu hơi nước cũng đâu phải loại kém chất lượng. Để nâng cao chất lượng từ mức này thì——」"
# 【真闇】
# display as 真闇
# JP: 「[じょうぞう,1]醸造管理。\n発酵状態の管理ば、徹底したデータ主義で行いたいんよ」
1532 = "「Quản lý ủ rượu. Chị muốn quản lý trạng thái lên men bằng chủ nghĩa dữ liệu triệt để.」"
# 【双鉄】
# display as 雙鐵
# JP: 「徹底……とは」
1548 = "「Triệt để......nghĩa là sao?」"
# 【真闇】
# display as 真闇
# JP: 「\\x%l杜氏;#00ffc040;[とうじ,1]杜氏%l;#;の勘や感覚に頼らん、\nデータだけで作る焼酎に仕上げたか」
1278 = "「Không dựa vào trực giác hay cảm giác của \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; nữa, mà tạo ra một loại shochu chỉ bằng dữ liệu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1800 = "「！」" 
# monologue
# JP: 質を深めるというよりも、根本的に質を変える――\nこれは、そういうアイディアだ、が……
2363 = "Đó không phải là nâng cao chất lượng, mà là thay đổi chất lượng từ gốc rễ—— Đây là một ý tưởng như vậy, nhưng......"
# monologue
# JP: 条件を完全に整えることが出来るなら、ゆらぎを消せる。\n最高品質を、コンスタントに出せるようになる。
2106 = "Nếu có thể thiết lập các điều kiện một cách hoàn hảo, thì có thể loại bỏ được sự dao động. Sẽ có thể liên tục cho ra chất lượng cao nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり……ハチロクに醸造管理を任せるということか」
1310 = "「Nói cách khác......Chị định giao việc quản lý ủ rượu cho Hachiroku sao?」"
# 【真闇】
# display as 真闇
# JP: 「もし、ハチロクちゃんに余力があれば……とやけど」
1350 = "「Nếu Hachiroku có thời gian rảnh rỗi......thì chị muốn nhờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「余力は、作れる」
1795 = "「Thời gian rảnh thì có thể tạo ra được.」"
# monologue
# JP: 間髪入れずに答えてる。\nこのアイディアは、推すべきだ。
2197 = "Tôi trả lời không chút do dự. Ý tưởng này rất đáng để thúc đẩy."
# monologue
# JP: より進化した蒸気焼酎、全く新しい酒を――\n飲んでみたいと、僕自身が強く感じているから。
2288 = "Bởi vì chính bản thân tôi cũng đang khao khát được nếm thử—— loại shochu hơi nước tiến hóa hơn, một loại rượu hoàn toàn mới."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクと僕とはコンビだからな。\n僕のフォローで、ハチロクの負荷は大きく減らせる」
1344 = "「Hachiroku và em là một cặp bài trùng mà. Có em hỗ trợ, gánh nặng của Hachiroku sẽ giảm đi rất nhiều.」"
# 【真闇】
# display as 真闇
# JP: 「けど、それだと、双ちゃんが」
1299 = "「Nhưng mà, nếu vậy thì Sou-chan sẽ」"
# 【双鉄】
# display as 雙鐵
# JP: 「やらせてほしい。たとえ間接的にでも――\n僕も、真闇姉の酒造りを手伝いたい」
1714 = "「Xin hãy để em làm. Dù chỉ là gián tiếp—— Em cũng muốn giúp đỡ công việc ủ rượu của chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「あ――」
# 1396 = "「啊——」" 
# monologue
# JP: 残念ながら、酒造りにおいては、僕は――\nどころか日々姫さえ、真闇姉の力になれない。
2438 = "Thật đáng tiếc, trong việc ủ rượu, tôi—— chứ đừng nói đến Hibiki, cũng không thể giúp ích gì được cho chị Mayami."
# monologue
# JP: が、ハチロクを手伝うことでそれが果たせるというのなら、\n仕事がどれほど増えようと、決して苦とは感じない。
1944 = "Nhưng nếu có thể đạt được điều đó bằng cách giúp đỡ Hachiroku, thì dù công việc có tăng lên bao nhiêu, tôi cũng tuyệt đối không cảm thấy vất vả."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫も、同じ気持ちでいると思う。\nだからこそ、蒸気焼酎のラベル絵はこころを打つのだ」
1563 = "「Em nghĩ Hibiki cũng có cùng cảm xúc đó. Chính vì vậy mà bức tranh nhãn hiệu của shochu hơi nước mới làm rung động lòng người.」"
# monologue
# JP: 出会ったころにはまるで理解が出来なかった、\n日々姫の屈折。
1997 = "Sự phức tạp của Hibiki, mà khi mới gặp tôi hoàn toàn không thể hiểu được."
# monologue
# JP: 今の僕は、それを恐らく、かなり近くに感じ取れてる。
2355 = "Bây giờ, có lẽ tôi đã có thể cảm nhận được điều đó một cách rất gần gũi."
# 【双鉄】
# display as 雙鐵
# JP: 「右田の家に――もっと深くに関わりたいから。\n一緒に、焼酎を作りたいんだ」
1467 = "「Bởi vì em muốn gắn bó sâu sắc hơn nữa——với nhà Migita. Em muốn cùng nhau làm ra rượu shochu.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん」
# 1502 = "「小雙」" 
# monologue
# JP: ふる、と真闇姉の体が震える。\nほんのわずかに、手が動く。
2324 = "Cơ thể chị Mayami khẽ run lên. Bàn tay khẽ cử động một chút."
# 【真闇】
# display as 真闇
# JP: 「……ありがと。双ちゃん」
1069 = "「......Cảm ơn em. Sou-chan.」"
# monologue
# JP: けれどその手は、小さく拳に握りこまれる。
1968 = "Nhưng bàn tay đó lại nắm lại thành một nắm đấm nhỏ."
# 【真闇】
# display as 真闇
# JP: 「そんなら、ハチロクちゃんとひーちゃんには」
1789 = "「Nếu vậy thì, với Hachiroku-chan và Hii-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉から直接頼んでやって欲しい。\nその方が、きっと、励みになるはずだ」
1713 = "「Em muốn chị Mayami trực tiếp nhờ vả hai người họ. Làm vậy chắc chắn sẽ là một nguồn động viên lớn đấy.」"
# monologue
# JP: ハチロクにとっても、ある程度の。\n日々姫にとっては、相当大きな。
2321 = "Đối với Hachiroku cũng có tác dụng ở một mức độ nào đó. Còn đối với Hibiki thì đó là một sự khích lệ vô cùng lớn."
# monologue
# JP: それをわかってくれてるのだろう。\n真闇姉はすぐ、そうして深く、頷いてくれる。
2312 = "Chắc chị ấy cũng hiểu được điều đó. Chị Mayami lập tức gật đầu thật sâu."
# 【真闇】
# display as 真闇
# JP: 「やったら。きっと、良かお酒ばしあがるねぇ」
1434 = "「Làm thôi. Chắc chắn sẽ làm ra được một loại rượu ngon đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――いや、しかし」
1386 = "「Ừm——Không, nhưng mà.」"
# monologue
# JP: 良かお酒……\nだけでは不足していることを、問屋としての僕は知ってる。
2060 = "Rượu ngon...... Chỉ vậy thôi thì chưa đủ, với tư cách là một đại lý bán buôn, tôi biết điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「良い酒というなら“右田一”とて相当だ。\n決してプレミア焼酎たちに劣るものではないと思う」
1702 = "「Nếu nói là rượu ngon thì “Migita Ichi” cũng rất tuyệt vời rồi. Em nghĩ nó tuyệt đối không hề thua kém các loại shochu cao cấp đâu.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんとしても、\n人気と知名度が段違いすぎるけん――ああ」
1368 = "「Dù là vậy, nhưng độ nổi tiếng và được yêu thích lại chênh lệch quá lớn——A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうなのだ。\nもう一つ、そこに超えるべき壁がある」
1456 = "「Vâng. Đúng là vậy. Ở đó vẫn còn một bức tường nữa cần phải vượt qua.」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が醸造管理し、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;と同じ石炭を熱源とする蒸気焼酎。
2282 = "Loại rượu shochu hơi nước do \\x%lレイルロオド;#00ffc040;Railord%l;#; quản lý quá trình ủ, và sử dụng cùng loại than với \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; làm nguồn nhiệt."
# monologue
# JP: 一部鉄道ファンには確かに受けそうではあるが、\nプレミア焼酎と同等の人気を得られるものとは思えない。
2053 = "Mặc dù có vẻ như sẽ được một bộ phận người hâm mộ đường sắt đón nhận, nhưng tôi không nghĩ nó có thể đạt được độ nổi tiếng ngang với các loại shochu cao cấp."
# 【双鉄】
# display as 雙鐵
# JP: 「……人気はコントロール出来るものではない。\nその手の工作は、長期的に見れば必ず悪影響となる」
1057 = "「......Độ nổi tiếng không phải là thứ có thể kiểm soát được. Những mánh khóe kiểu đó, về lâu dài chắc chắn sẽ gây ra ảnh hưởng xấu.」"
# 【真闇】
# display as 真闇
# JP: 「わかっとるよぉ、そぎゃんこつ」
1759 = "「Chị biết mà, mấy chuyện đó.」"
# monologue
# JP: 整頓のつもりで言った言葉に、\n思いもかけず、すねたような声が返される。
2267 = "Những lời tôi nói với ý định sắp xếp lại mọi thứ, không ngờ lại nhận được một giọng điệu hờn dỗi đáp lại."
# monologue
# JP: かわいらしいな、と思ってしまい、\n思ったことが、たまらないほどに気恥ずかしくなる。
2160 = "Tôi lỡ nghĩ rằng chị ấy thật đáng yêu, và rồi lại cảm thấy vô cùng xấu hổ vì chính suy nghĩ đó của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「――故に、努力を質へと向けることは正しい」
1010 = "「——Do đó, hướng nỗ lực vào chất lượng là đúng đắn.」"
# monologue
# JP: だから、言葉をそのまま続ける。\n思考で感情を埋めるのは、僕の得意とするところだ。
2420 = "Vì vậy, tôi tiếp tục nói. Dùng lý trí để che giấu cảm xúc là sở trường của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その質へ、客観的な評価を受けることが出来れば――\nああ、いや」
1489 = "「Nếu chất lượng đó có thể nhận được đánh giá khách quan thì—— A, không.」"
# 【真闇】
# display as 真闇
# JP: 「なんね？　双ちゃん」
1314 = "「Sao thế? Sou-chan.」"
# monologue
# JP: 滑らせかけた言葉を飲み込み、\n飲み込みきれずに、追求される。
2190 = "Tôi nuốt lại những lời lỡ buột miệng, nhưng vì chưa nuốt trôi hẳn nên bị gặng hỏi."
# monologue
# JP: 別に、隠すようなことでもないが――
2165 = "Cũng không phải chuyện gì đáng giấu giếm——"
# 【双鉄】
# display as 雙鐵
# JP: 「右田一のような老舗には向かんことを思っただけだ。\n例えば、コンテストという手もあると」
1555 = "「Em chỉ nghĩ đến một việc không phù hợp với một cửa hàng lâu đời như Migita Ichi thôi. Ví dụ như, cũng có cách tham gia các cuộc thi.」"
# 【真闇】
# display as 真闇
# JP: 「コンテスト」
1482 = "「Cuộc thi á?」"
# monologue
# JP: きょとんとしている。\n当然だろう。
2070 = "Chị ấy ngơ ngác. Cũng phải thôi."
# monologue
# JP: なにせ、この界隈のコンテストと来た日には――
2286 = "Dù sao thì, nhắc đến các cuộc thi trong khu vực này thì——"
# 【真闇】
# display as 真闇
# JP: 「帝都あたりだと、\nまっとうな焼酎のコンテストばやっとーと？」
1474 = "「Ở khu vực Đế đô, có tổ chức cuộc thi shochu nào đàng hoàng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。帝都でも名ばかりのコンテストばかりさ」
1277 = "「Không đâu. Ở Đế đô cũng toàn những cuộc thi hữu danh vô thực thôi.」"
# 【真闇】
# display as 真闇
# JP: 「あー……よねぇ」
1408 = "「A......Đúng nhỉ.」"
# monologue
# JP: 民間団体主導であれ、業界団体主導であれ。\nそうしたものの、主たる目的は“箔付け”だ。
1941 = "Dù là do các tổ chức dân sự hay các hiệp hội trong ngành khởi xướng. Mục đích chính của những sự kiện đó cũng chỉ là để “đánh bóng tên tuổi”."
# monologue
# JP: 身内が身内を審査して、身内に賞を与えるものを、\n“まっとう”などとは、とても呼べまい。
2360 = "Người trong nhà chấm điểm cho nhau, rồi trao giải cho nhau, thì không thể nào gọi là “đàng hoàng” được."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が言っているコンテストは、まるで違うのだ。\n焼酎は――つまりは、[スピリッツ,2]蒸留酒なわけだから」
1565 = "「Cuộc thi mà em nói đến hoàn toàn khác. Shochu——nói tóm lại là rượu chưng cất (Spirits) mà.」"
# 【真闇】
# display as 真闇
# JP: 「わけだから？」
1643 = "「Thì sao nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留酒のコンクールになら出られるか、と思ったのだ。\nＩＳＣ――International Spirits Competitionに」
1558 = "「Em nghĩ là chúng ta có thể tham gia cuộc thi rượu chưng cất. ISC——International Spirits Competition.」"
# 【真闇】
# display as 真闇
# JP: 「あー、なんか、聞いたこと……ある？\nんと……[めいこく,1]冥国で……やるやつと？」
1425 = "「A, hình như chị có......nghe nói rồi? Ừm......Cái tổ chức ở......Meikoku (Mỹ) ấy hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n世界で最も公平な酒のコンテストだとされている」
1438 = "「Vâng. Nó được coi là cuộc thi rượu công bằng nhất thế giới.」"
# monologue
# JP: 出展された全ての酒は、\n番号だけを貼られたグラスに注がれる。
1992 = "Tất cả các loại rượu dự thi sẽ được rót vào những chiếc ly chỉ dán số thứ tự."
# monologue
# JP: 審査員は何の情報も先入観も無く、\n飲んだグラスの番号ごとに、旨さの点をつけていく。
2271 = "Ban giám khảo không có bất kỳ thông tin hay định kiến nào, họ sẽ chấm điểm độ ngon cho từng ly rượu mang số thứ tự mà mình nếm thử."
# 【双鉄】
# display as 雙鐵
# JP: 「３００人の審査員の合計得点が最上位の酒が、優勝。\n世界最高のスピリッツの栄誉を得る」
1808 = "「Loại rượu có tổng điểm cao nhất từ 300 vị giám khảo sẽ giành chiến thắng. Nhận được vinh dự là rượu Spirits ngon nhất thế giới.」"
# 【真闇】
# display as 真闇
# JP: 「ふんふん」
1443 = "「Hừm hừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「世界各国の大使館は大概、優勝酒や受賞酒を採用する。\n酒飲みたちも、こぞって買い求めるようになる」
1307 = "「Đại sứ quán của các nước trên thế giới hầu hết đều sử dụng các loại rượu giành chiến thắng hoặc đoạt giải. Những người thích uống rượu cũng sẽ đổ xô đi mua.」"
# 【真闇】
# display as 真闇
# JP: 「なんね！」
1755 = "「Ra là vậy!」"
# monologue
# JP: ぱっと、真闇姉は笑顔を咲かせる。
2325 = "Chị Mayami bừng sáng nụ cười rạng rỡ."
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと良か話ばあるなら」
1582 = "「Nếu có chuyện tốt như vậy thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。良いだけではない、厳しい面もある。\n蒸留酒はすべて一線。焼酎も、特に別には扱われん」
1301 = "「Không đâu. Không chỉ có mặt tốt, mà cũng có mặt khắc nghiệt. Tất cả các loại rượu chưng cất đều được đánh giá chung. Shochu cũng không được đối xử đặc biệt.」"
# 【真闇】
# display as 真闇
# JP: 「なら――ウィスキーやらブランデーやらと、\n飲みっくらされると？」
1765 = "「Vậy là——Sẽ bị đem ra so sánh với whisky hay brandy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。そして審査員のほとんどは[めいこく,1]冥国人。\n[ひのもと,2]日ノ本人は、いても２～３人がせいぜいだろう」
1604 = "「Đúng vậy. Và hầu hết giám khảo là người Meikoku. Người Hinomoto, nếu có thì cũng chỉ khoảng 2-3 người là cùng.」"
# monologue
# JP: ふぅんと小さく唸る声。\n真闇姉の目が考え深そうに細まっていく。
2089 = "Một tiếng lẩm bẩm nhỏ. Đôi mắt chị Mayami nheo lại như đang suy nghĩ sâu xa."
# 【真闇】
# display as 真闇
# JP: 「次のコンテストば、いつ開かれっと？」
1274 = "「Cuộc thi tiếp theo sẽ được tổ chức khi nào vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「毎年の年頭に開催される。\n授賞式は、三月頭……聖ヨハネ・イ・デオの祝日だ」
1608 = "「Được tổ chức vào đầu mỗi năm. Lễ trao giải diễn ra vào đầu tháng 3......vào ngày lễ Thánh John of God.」"
# 【真闇】
# display as 真闇
# JP: 「ヨハネ・イ・デオゆーたら」
1484 = "「Thánh John of God là ai vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。アル中患者の守護聖人だ」
1391 = "「À. Là vị thánh bảo trợ cho những bệnh nhân nghiện rượu.」"
# 【真闇】
# display as 真闇
# JP: 「あらら、悪趣味」
1382 = "「Chà chà, sở thích tệ thật đấy.」"
# monologue
# JP: けらけら笑い、\n真闇姉はすぐ、その目を細め引き締める。
2071 = "Cười khanh khách, nhưng ngay sau đó, chị Mayami lại nheo mắt lại đầy nghiêm túc."
# 【真闇】
# display as 真闇
# JP: 「けど、年初なら……\n１から仕込んで――ギリギリ間に合う日程よね」
1298 = "「Nhưng mà, nếu là đầu năm thì...... Bắt đầu ủ từ con số 1——lịch trình cũng vừa khít luôn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「出るのか？」
1693 = "「Chị định tham gia sao?」"
# monologue
# JP: 問えば、すぐさま問い返される。
2207 = "Vừa hỏi xong, tôi liền bị hỏi ngược lại."
# 【真闇】
# display as 真闇
# JP: 「出ん理由ばあったら教えて欲しかとよ」
1704 = "「Nếu có lý do gì để không tham gia thì em nói cho chị nghe thử xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。\n杞憂とは思うのだが――」
1421 = "「À, vâng. Em nghĩ có lẽ chỉ là lo bò trắng răng thôi, nhưng——」"
# monologue
# JP: この流れだと、\n真闇姉も話を引っ込めづらくなってしまうかもしれない。
2219 = "Theo đà này, có lẽ chị Mayami cũng khó mà rút lại lời nói."
# monologue
# JP: 己の不明を痛感するが、\nさりとて、話さぬわけにもいかん。
2431 = "Tôi cảm nhận sâu sắc sự thiếu hiểu biết của bản thân, nhưng dù vậy, tôi cũng không thể không nói."
# 【双鉄】
# display as 雙鐵
# JP: 「得点は、全て公開される。過去には０点を取ってしまい、\n廃業に追い込まれた醸造所もある」
1574 = "「Điểm số sẽ được công khai toàn bộ. Trong quá khứ, từng có xưởng rượu bị điểm 0, và bị đẩy đến bước đường phá sản.」"
# 【真闇】
# display as 真闇
# JP: 「なんね双ちゃん、そぎゃんこつ」
1517 = "「Gì vậy Sou-chan, chỉ có chuyện đó thôi sao.」"
# monologue
# JP: からりと笑う。\nまったく飾るところなく。
2076 = "Chị ấy cười sảng khoái. Hoàn toàn không có chút giả tạo nào."
# 【真闇】
# display as 真闇
# JP: 「もし０点ばとっても、うちのお客さんやったら、\n『冥国の田舎もんは酒の味ば知らん』て笑うだけとよ」
1511 = "「Dù có bị điểm 0 đi nữa, thì khách hàng nhà mình cũng chỉ cười và nói rằng 『Mấy tên nhà quê ở Meikoku thì biết gì về mùi vị của rượu chứ』 thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1396 = "「啊——」" 
# monologue
# JP: まったく、僕は不明であった。\n御一夜はまさしくそういう町だ。
2290 = "Quả thực, tôi đã quá lo xa rồi. Ohimitera chính xác là một thị trấn như vậy."
# monologue
# JP: そして真闇姉こそは、御一夜とそこにある暮らしとを、\n誰より深く、きっと知っている人なのだ。
2357 = "Và chị Mayami, chính là người hiểu rõ về Ohimitera và cuộc sống nơi đây sâu sắc hơn bất kỳ ai."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば、教えてやろう、\n[めいこく,1]冥国の田舎者どもに、クマ焼酎という酒の旨さを」
1562 = "「Em hiểu rồi. Nếu vậy, hãy cho những kẻ nhà quê ở Meikoku biết, sự thơm ngon của rượu Kuma shochu là như thế nào.」"
# 【真闇】
# display as 真闇
# JP: 「そーね、双ちゃん！」
1752 = "「Đúng vậy, Sou-chan!」"
# monologue
# JP: 差し出した手を、受け止められる。
2086 = "Bàn tay tôi đưa ra đã được nắm lấy."
# monologue
# JP: （これが……二度目の握手だな）
2455 = "（Đây là......lần bắt tay thứ hai nhỉ.）"
# monologue
# JP: その手は変わらず、驚くほどに柔らかだけれど――
2417 = "Bàn tay ấy vẫn vậy, mềm mại đến đáng ngạc nhiên, nhưng——"
# monologue
# JP: 今度は少しも、\n小さなものとは、感じない。
2414 = "Lần này, tôi không hề cảm thấy nó nhỏ bé một chút nào."
