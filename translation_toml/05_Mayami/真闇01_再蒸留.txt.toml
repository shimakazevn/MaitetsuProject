2282 = "由\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;進行釀造管理，與\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;使用相同的煤炭為熱源的蒸汽燒酒。" 

# monologue
# JP: 一部鉄道ファンには確かに受けそうではあるが、\nプレミア焼酎と同等の人気を得られるものとは思えない。
2053 = "在一部分鐵路迷間肯定會大受好評，但是卻不可能和那些高檔燒酒一樣廣受歡迎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……人気はコントロール出来るものではない。\nその手の工作は、長期的に見れば必ず悪影響となる」
1057 = "「……是否受歡迎不是我們能控制的。這種手段從長期來看帶來的影響必然是負面的」" 

# 【真闇】
# display as 真闇
# JP: 「わかっとるよぉ、そぎゃんこつ」
1759 = "「這種事咱也知道啊」" 

# monologue
# JP: 整頓のつもりで言った言葉に、\n思いもかけず、すねたような声が返される。
2267 = "為了整理思緒而說的話，意料之外地獲得了鬧彆扭般的回應。" 

# monologue
# JP: かわいらしいな、と思ってしまい、\n思ったことが、たまらないほどに気恥ずかしくなる。
2160 = "我不禁覺得真闇姐好可愛，但又覺得這麼想太令人害羞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――故に、努力を質へと向けることは正しい」
1010 = "「——所以，努力提高品質這條路才是正確的」" 

# monologue
# JP: だから、言葉をそのまま続ける。\n思考で感情を埋めるのは、僕の得意とするところだ。
2420 = "那我就繼續說下去。用思考掩蓋感情正是我所擅長的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その質へ、客観的な評価を受けることが出来れば――\nああ、いや」
1489 = "「如果燒酒的品質能夠得到客觀公正評價的話——啊，不」" 

# 【真闇】
# display as 真闇
# JP: 「なんね？　双ちゃん」
1314 = "「什麼啊，小雙？」" 

# monologue
# JP: 滑らせかけた言葉を飲み込み、\n飲み込みきれずに、追求される。
2190 = "我把到嘴邊的話又咽了回去，就在意猶未盡的時候她如此追問。" 

# monologue
# JP: 別に、隠すようなことでもないが――
2165 = "我倒是沒有想隱瞞——" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田一のような老舗には向かんことを思っただけだ。\n例えば、コンテストという手もあると」
1555 = "「我只是覺得這方法不適合像右田一這樣的老店。比如說參加大賽這樣的」" 

# 【真闇】
# display as 真闇
# JP: 「コンテスト」
1482 = "「大賽」" 

# monologue
# JP: きょとんとしている。\n当然だろう。
2070 = "她吃了一驚。當然的事。" 

# monologue
# JP: なにせ、この界隈のコンテストと来た日には――
2286 = "畢竟，要說這隈元地區的大賽——" 

# 【真闇】
# display as 真闇
# JP: 「帝都あたりだと、\nまっとうな焼酎のコンテストばやっとーと？」
1474 = "「在帝都那邊，有比較正規的燒酒大賽嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。帝都でも名ばかりのコンテストばかりさ」
1277 = "「不。帝都那邊也儘是些賣噱頭的大賽」" 

# 【真闇】
# display as 真闇
# JP: 「あー……よねぇ」
1408 = "「啊……是唄」" 

# monologue
# JP: 民間団体主導であれ、業界団体主導であれ。\nそうしたものの、主たる目的は“箔付け”だ。
1941 = "不管是民間團體主辦還是業界團體主辦，那種大賽的主要目的都是“貼金”。" 

# monologue
# JP: 身内が身内を審査して、身内に賞を与えるものを、\n“まっとう”などとは、とても呼べまい。
2360 = "自己人評議自己人，再給自己人發獎，怎麼樣都說不上是“正規”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が言っているコンテストは、まるで違うのだ。\n焼酎は――つまりは、[スピリッツ,2]蒸留酒なわけだから」
1565 = "「我說的大賽可和這些完全不一樣。因為燒酒——就是蒸餾酒的緣故」" 

# 【真闇】
# display as 真闇
# JP: 「わけだから？」
1643 = "「的緣故？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸留酒のコンクールになら出られるか、と思ったのだ。\nＩＳＣ――International Spirits Competitionに」
1558 = "「我在想我們能不能出場參加蒸餾酒的品評會。參加ISC——International Spirits Competition」" 

# 【真闇】
# display as 真闇
# JP: 「あー、なんか、聞いたこと……ある？\nんと……[めいこく,1]冥国で……やるやつと？」
1425 = "「啊，我好像……聽過？唔，讓我想想……在美國辦的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n世界で最も公平な酒のコンテストだとされている」
1438 = "「嗯。現在這是世界上最公平的酒類大賽」" 

# monologue
# JP: 出展された全ての酒は、\n番号だけを貼られたグラスに注がれる。
1992 = "出展的全部的酒都會被倒入只貼著編號的玻璃酒杯裡。" 

# monologue
# JP: 審査員は何の情報も先入観も無く、\n飲んだグラスの番号ごとに、旨さの点をつけていく。
2271 = "然後由評委在全無預先了解和成見的狀態下，為每個玻璃杯中的酒打分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「３００人の審査員の合計得点が最上位の酒が、優勝。\n世界最高のスピリッツの栄誉を得る」
1808 = "「３００位評委的總計得分最高的酒就取得優勝，得到世界第一蒸餾酒的榮譽」" 

# 【真闇】
# display as 真闇
# JP: 「ふんふん」
1443 = "「嗯嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「世界各国の大使館は大概、優勝酒や受賞酒を採用する。\n酒飲みたちも、こぞって買い求めるようになる」
1307 = "「世界各國的大使館基本都會採購優勝酒或者是得獎酒。品酒行家們也會一窩蜂似地去購買」" 

# 【真闇】
# display as 真闇
# JP: 「なんね！」
1755 = "「這樣啊！」" 

# monologue
# JP: ぱっと、真闇姉は笑顔を咲かせる。
2325 = "真闇姐瞬間樂開了花。" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんと良か話ばあるなら」
1582 = "「既然有這麼好的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。良いだけではない、厳しい面もある。\n蒸留酒はすべて一線。焼酎も、特に別には扱われん」
1301 = "「不，不光有好的地方，也有嚴苛的地方。蒸餾酒都一律平等對待，燒酒也不會得到特殊對待的」" 

# 【真闇】
# display as 真闇
# JP: 「なら――ウィスキーやらブランデーやらと、\n飲みっくらされると？」
1765 = "「那——威士忌和白蘭地那些也都會參賽嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。そして審査員のほとんどは[めいこく,1]冥国人。\n[ひのもと,2]日ノ本人は、いても２～３人がせいぜいだろう」
1604 = "「是的。而且評委基本都是美國人。日本人最多也就兩三位吧」" 

# monologue
# JP: ふぅんと小さく唸る声。\n真闇姉の目が考え深そうに細まっていく。
2089 = "她輕輕哼了一聲。然後好像在深思什麼一樣眯細了眼睛。" 

# 【真闇】
# display as 真闇
# JP: 「次のコンテストば、いつ開かれっと？」
1274 = "「下次大賽什麼時候辦啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「毎年の年頭に開催される。\n授賞式は、三月頭……聖ヨハネ・イ・デオの祝日だ」
1608 = "「會在每年的年初舉辦。頒獎典禮是三月初……天賜·聖若望的紀念日」" 

# 【真闇】
# display as 真闇
# JP: 「ヨハネ・イ・デオゆーたら」
1484 = "「天賜·聖若望是誰」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。アル中患者の守護聖人だ」
1391 = "「唔，就是酒精中毒患者的守護聖人」" 

# 【真闇】
# display as 真闇
# JP: 「あらら、悪趣味」
1382 = "「哎呀，簡直惡俗」" 

# monologue
# JP: けらけら笑い、\n真闇姉はすぐ、その目を細め引き締める。
2071 = "她哈哈大笑道，但很快又眯細了眼睛。" 

# 【真闇】
# display as 真闇
# JP: 「けど、年初なら……\n１から仕込んで――ギリギリ間に合う日程よね」
1298 = "「不過，要是年初的話……現在開始釀也就剛好勉強趕得上呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「出るのか？」
1693 = "「要參加嗎？」" 

# monologue
# JP: 問えば、すぐさま問い返される。
2207 = "我這麼問道，隨即馬上被反問。" 

# 【真闇】
# display as 真闇
# JP: 「出ん理由ばあったら教えて欲しかとよ」
1704 = "「要麼你給咱個不參加的理由唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。\n杞憂とは思うのだが――」
1421 = "「啊，嗯。雖然我覺得可能是杞人憂天——」" 

# monologue
# JP: この流れだと、\n真闇姉も話を引っ込めづらくなってしまうかもしれない。
2219 = "按照這樣下去，真闇姐說不定就難以收回這想法了。" 

# monologue
# JP: 己の不明を痛感するが、\nさりとて、話さぬわけにもいかん。
2431 = "雖然我切身體會到自己的無能，但卻不能不說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「得点は、全て公開される。過去には０点を取ってしまい、\n廃業に追い込まれた醸造所もある」
1574 = "「所有的得分都會被公開。過去還有得了０分導致破產的釀酒廠」" 

# 【真闇】
# display as 真闇
# JP: 「なんね双ちゃん、そぎゃんこつ」
1517 = "「就這啊，小雙真會大驚小怪」" 

# monologue
# JP: からりと笑う。\nまったく飾るところなく。
2076 = "她毫無掩飾地嘿嘿一笑。" 

# 【真闇】
# display as 真闇
# JP: 「もし０点ばとっても、うちのお客さんやったら、\n『冥国の田舎もんは酒の味ば知らん』て笑うだけとよ」
1511 = "「就算得了０分，咱家的客人也只會笑著說“美國那種地方的鄉巴佬兒根本不懂酒”而已啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1396 = "「啊——」" 

# monologue
# JP: まったく、僕は不明であった。\n御一夜はまさしくそういう町だ。
2290 = "真是的，我簡直笨到家了。御一夜不就是這樣一座城市嗎。" 

# monologue
# JP: そして真闇姉こそは、御一夜とそこにある暮らしとを、\n誰より深く、きっと知っている人なのだ。
2357 = "而真闇姐也正是比任何人都清楚御一夜和這裡的生活的人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば、教えてやろう、\n[めいこく,1]冥国の田舎者どもに、クマ焼酎という酒の旨さを」
1562 = "「我知道了，那麼我們就去教一教美國的那些鄉巴佬們，隈燒酒是何等甘醇吧」" 

# 【真闇】
# display as 真闇
# JP: 「そーね、双ちゃん！」
1752 = "「這就對嘞，小雙！」" 

# monologue
# JP: 差し出した手を、受け止められる。
2086 = "她緊緊地握住了我伸出的手。" 

# monologue
# JP: （これが……二度目の握手だな）
2455 = "（這是……第二次握手了吧）" 

# monologue
# JP: その手は変わらず、驚くほどに柔らかだけれど――
2417 = "這隻手還是沒變，令人驚奇地柔軟——" 

# monologue
# JP: 今度は少しも、\n小さなものとは、感じない。
2414 = "這次卻絲毫感覺不到這隻手的“小”了。" 
