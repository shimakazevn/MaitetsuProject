[script]
# lines: 379 
# 【真闇】
# display as 真闇
# JP: 「もうひとつ。\n双ちゃんにお姉ちゃんから、選択肢をあげよーねぇ」
1492 = "「姐姐再來為小雙多提供一個選擇吧」" 

# monologue
# JP: 筆と墨、それから半紙。
2347 = "筆墨紙硯排在了面前。" 

# monologue
# JP: 流れるように用意を整え、\n真闇姉は、さらさらと何かを書きつける。
2310 = "真闇姐以行雲流水般的動作準備好這些，隨後開始揮毫潑墨。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんがここにサインをしたら、二億円、\nうちから双ちゃんに、無利子無担保で貸したげますけん」
1366 = "「只要小雙在這裡簽字，兩億日元就馬上借給小雙，無利息、無擔保」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――ぅ」
1385 = "「唔——」" 

# monologue
# JP: 幾度思い返してみても、\nやはり結論は変わらない。
2126 = "左思右想，最終得出的果然還是同一個結論。" 

# monologue
# JP: 真闇姉が差し伸べてくれた手を受け取る――\nそれこそ最善の方法だった。
2217 = "抓住真闇姐伸出的援手——這才是最好的方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、が」
1293 = "「不過」" 

# monologue
# JP: 甘えてしまった。\nまた、真闇姉の優しさに。
2171 = "我又一次依賴了真闇姐對我的溫柔。" 

# monologue
# JP: 僕を右田から追放させないでおく、そのために、\n真闇姉がどれほどの苦労をしたか、知っているのに。
2194 = "我明明知道真闇姐為了不讓我被趕出右田家，在背後下了多大的功夫。" 

# monologue
# JP: （頼れば必ず、真闇姉は僕に応えてくれる。\nそれがどれほど苦しい選択であろうとも――）
2448 = "（不管有多辛苦，只要一拜託真闇姐她就肯定有求必應——）" 

# monologue
# JP: だから、うかつには頼れない。\nよほどのことが無い限り、甘えたことを言ってはいけない。
2215 = "所以，我不會輕易依賴她。沒有特別大的事情，就絕不能開口向她撒嬌。" 

# monologue
# JP: それは重々承知しているつもりなのだが、\n今回ばかりは…………仕方、なかった。
2432 = "雖然我極其清楚這一點，但這次卻……真的沒有辦法了。" 

# monologue
# JP: （\x%lエアクラ;#00ffc040;エアクラ%l;#;工場が誘致されてしまえば、いつかは――\n右田一酒造元にも、致命的な悪影響が及ぶのだから）
2444 = "（一旦\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠最終落戶，總有一天——會連右田一釀酒廠都受到致命的影響）" 

# monologue
# JP: 理屈だけなら、“真闇姉にも利のあること”と、\n割り切ることも出来そうで。
2018 = "只從道理上來說的話，理解成“幫助我對真闇姐也有利”倒也並無不可。" 

# monologue
# JP: けれどどれほど考えてみても、\n心はすっきり整頓できない。
1974 = "但是不管我怎麼想，心裡都完全無法平靜下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……この時間なら、見回りか？」
1073 = "「……這個時間了，她現在在巡視吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「……すぅ…………すぅ」
1045 = "「……呼……呼」" 

# monologue
# JP: 足元の方の布団の中から、規則正しい音が聞こえる。\nハチロクは、どうやら完全に休んでる。
2199 = "我腳邊的棉被裡傳來了節奏整齊的呼吸聲。八六似乎完全睡著了。" 

# monologue
# JP: 起こさないようそっと抜け出し、\n明かりも点けずに階下へ――そして蔵へと向かう。
2156 = "我不想吵醒她，便悄悄地出門，連燈也沒開就摸黑下樓——然後走向酒窖。" 

# 【真闇】
# display as ？？？
# JP: 「誰？」
1712 = "「誰？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕だ。驚かせたなら済まなかった」
1601 = "「是我。嚇到你了，真對不起」" 

# monologue
# JP: 声をかければホっとした顔。\nその顔に、僕もなんだかホっとする。
2359 = "聽到來者是我後，她鬆了口氣。見此情形，我也不由得地鬆了口氣。" 

# monologue
# JP: 居なかったなら戻って寝ようと思っていたが……\n居てくれたならそれはそれで、邪魔にならぬか心配になる。
2208 = "我還想要是人不在的話就回去睡覺……可她在了又擔心會不會妨礙到她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その……だな…………」
1771 = "「那個……怎麼說呢……」" 

# 【真闇】
# display as 真闇
# JP: 「もぉ少しで済むとこやけん」
1763 = "「還差一點就整完了」" 

# monologue
# JP: 時間はあるかと聞いたなら、無理をしてでも時間を作る。\nそれが、真闇姉という人だ。
2425 = "開口問她有沒有時間的話，她哪怕沒有也肯定會硬擠時間出來。這就是真闇姐。" 

# monologue
# JP: だからためらい、生じさせてしまった沈黙さえも、\nごくさり気なく先回りして、うずめてくれる。
2056 = "在我的猶豫引出沉默之前，她若無其事地搶先開了口。" 

# 【真闇】
# display as 真闇
# JP: 「ちょこっとだけ待っとってくれる？」
1329 = "「你能先等一小會嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。よければ待たせて欲しい」
1642 = "「當然了。只要你不介意我就等」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら。しーーーっ」
1787 = "「那麼，噓——」" 

# monologue
# JP: いたずらっぽい目つきになって、人差し指を唇にあて、\n真闇姉は、小さな子を諭すが如く僕に沈黙を要求する。
2092 = "她露出惡作劇似的眼神用食指搭在唇邊，彷彿在提醒小孩子似地要求我保持沉默。" 

# monologue
# JP: なにかと思って口をつぐめば、\n沈黙の中、すぐさま理由が囁き始める。
2424 = "閉上嘴的我在想到底發生了什麼事。很快理由就在沉默之中開始囁嚅起來。" 

# monologue
# JP: （ふつ、ふつ――ぼこっ――ふつっ）
2449 = "（噗，嗤——噗，嗤——噗，嗤）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1396 = "「啊——」" 

# 【真闇】
# display as 真闇
# JP: 「……ね、双ちゃん。聞こゆるや？」
1047 = "「……哎，小雙，你能聽見嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。聞こえる。[こうじ]麹の発酵する音だな」
1457 = "「嗯，聽得見。這是酒麴發酵的聲音吧」" 

# 【真闇】
# display as 真闇
# JP: 「んー、ちょこっとのんびり歌いよるねぇ。\nま、今ん秋の出来も、平年並を超えれんかねぇ」
1393 = "「唔，這歌聲略顯悠閒啊。估計今年秋天的品質不會超過往年的水準吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「平年並、か」
1530 = "「往年的水準啊……」" 

# monologue
# JP: うちの酒蔵の看板酒である“右田一”は、\n市内からの予約だけで九割が売れる、地元密着の人気酒だ。
2164 = "我們酒窖的招牌酒“右田一”光是靠市內預約的份就能賣掉九成，是與當地密不可分的熱門酒。" 

# monologue
# JP: 平年並なら、十分すぎる旨さだろうが――\n真闇姉の声は不満気で、だから、つくづくと感じてしまう。
2043 = "和往年的水準一樣也已然十分香醇了——但真闇姐言辭中顯然有些不滿，也讓我更切身體會到了她的追求。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大変だな。\nより高みを目指す、ということも」
1668 = "「精益求精還真是辛苦啊」" 

# 【真闇】
# display as 真闇
# JP: 「大変でないお仕事なんて、きっとなかとよ？」
1383 = "「哪有不辛苦的工作啊，你說是嗎？」" 

# monologue
# JP: そう言いつつも、メモを書きつける真闇姉の横顔には、\n苦労より、充実の色が色濃く見えるような気がする。
2052 = "嘴上雖然這麼說，但記著筆記的真闇姐的側臉上顯現出的神色與其說是辛苦，倒不如說是充實。" 

# monologue
# JP: 美しいな、と素直に感じ、\n自分が仕事をしている顔は、さてどうかなと思ってしまう。
2187 = "我打從心底覺得這時的她真的很美。不知道我自己工作的時候是怎麼樣一種表情呢。" 

# 【真闇】
# display as 真闇
# JP: 「――よし、っと」
1007 = "「——好了」" 

# monologue
# JP: 一区切りついたのだろう、小気味良い声。\nほのかな酒の香。蔵の温もり。僕へと柔らかに移るまなざし。
1963 = "估計是工作告一段落了吧，她的聲音透出一絲歡快。悠悠的酒香，酒窖的溫暖，加上真闇姐溫柔地移到我身上的視線。" 

# monologue
# JP: 一滴も飲んでいないのに、かすかに酔ったような気になり、\nすっと、言葉を吐き出せる。
2241 = "明明一滴酒都沒有喝，我卻像是微醺一般毫無阻礙地吐出了想說的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に、聞きたいことがあって来たんだ」
1559 = "「我是有事情想問真闇姐才來的」" 

# 【真闇】
# display as 真闇
# JP: 「良かよ？　なんでん聞いておーせ」
1687 = "「行啊，想問什麼儘管問唄」" 

# monologue
# JP: 負担は、すでにかけてしまった。
2177 = "我已經給她造成負擔了。" 

# monologue
# JP: 二億、万一返済し損ねてしまうなら、\n真闇姉にも右田一酒蔵にも大きな打撃を与えることは明白だ。
2366 = "萬一沒能還清兩億，那會對真闇姐及右田一釀酒廠造成多大的打擊是顯而易見的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故、工場誘致反対運動の旗を、\n真闇姉が振らんのだ？」
1632 = "「為什麼真闇姐你不親自舉起反對工廠落戶運動的旗幟呢？」" 

# monologue
# JP: だから、尋ねる。そう出来る。\n甘えない――という格好つけを、かなぐり捨てる。
2213 = "所以我要尋根問底。獨立自強這種虛名，若無裨益，我便會棄如敝屣。" 

# monologue
# JP: 誘致撤回という未来を呼びこむそのために、\n出来る限りを尽くすことこそが、今の僕の務めと思う。
2186 = "我想我現在的任務就是竭盡全力，讓取消引進計劃從目標變為現實。" 

# 【真闇】
# display as 真闇
# JP: 「右田は、クマ焼酎の……\n御一夜に昔からあるもんの、いわば代表格よねぇ」
1376 = "「右田可是隈燒酒的……御一夜自古以來的一員，如今也算是代表了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1442 = "「嗯」" 

# 【真闇】
# display as 真闇
# JP: 「そん\x%l杜氏;#00ffc040;杜氏%l;#;が誘致反対の旗ば振ったら、\n反対運動が、否応なしに表立つけん」
1699 = "「要是\\x%l杜氏;#00ffc040;掌窖%l;#;都揮起了反對引進的旗幟，反對運動不就徹底被擺上檯面了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか」
1398 = "「啊——是這樣啊」" 

# monologue
# JP: 問えばあっさり返る答えに、自分の不明を知らされる。
2067 = "她不假思索的回答，讓我痛感自己目光何等短淺。" 

# monologue
# JP: フランク育ちの、いうなれば外来者であるポーレットが、\nひとつの極でいるのとは、まるで話が違ってくる。
2074 = "她所處的立場和生在法國——某種程度上說是外來人的波萊特可謂大相徑庭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉が旗を振れば――右田につくか、銀行につくか、\nそうした選択を強いる構図になってしまいかねんのか」
1655 = "「真闇姐要是舉起旗幟——那就會變成逼人們選邊站隊：跟隨右田家還是銀行」" 

# monologue
# JP: 静かな頷き。\n真闇姉の唇の端が、ほんの少しだけ歪んでしまう。
2337 = "真闇姐靜靜地點頭。她的嘴唇邊緣顯出了一絲扭曲。" 

# 【真闇】
# display as 真闇
# JP: 「表立っての対立は、遺恨ば生んで……\nそぎゃんとなったら、簡単には消えてくれんけん」
1497 = "「對立若是被擺上檯面，便會在心中留下芥蒂……而那種芥蒂是不會輕易消除的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「誘致撤回させたとしても、対立構造が残ってしまえば\n後の発展を、きっと長期的に阻害してしまう」
1515 = "「就算最後取消了引進，也會留下對立的形勢——而這會長期對今後的發展帶來負面影響」" 

# monologue
# JP: ん――\nと、小さな小さな息。
2050 = "嗯——真闇姐小小地嘆了口氣。" 

# monologue
# JP: 珍しく、\n少し困ったような口調。
2077 = "她的語氣少見地帶著些許為難。" 

# 【真闇】
# display as 真闇
# JP: 「……銀行さん、いうか、\n[もとただ,1]元忠さんには感謝ばしとる人も、多かけん」
1053 = "「……對銀行，或者說對元忠先生心懷感謝的人還是挺多的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「感謝……というのは、\n融資を受けさせてもらって、ということか？」
1551 = "「感謝……是指獲得了融資嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「そいもまあまああろーけど。\nそぎゃんこつだけじゃなかばってん」
1760 = "「這種情況雖然也是很多的，不過也不止是這個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「他に……一体、何があるのだ？」
1346 = "「其他……還有什麼？」" 

# 【真闇】
# display as 真闇
# JP: 「例えば……そーね、\n双ちゃん、覚えとぉ？」
1626 = "「比如說……對了，小雙，你還記得不？」" 

# monologue
# JP: 真闇姉の目に柔らかさが増す。
2319 = "真闇姐的眼神裡添了幾分溫柔。" 

# 【真闇】
# display as 真闇
# JP: 「駅前の通り、最初の信号ば越したところに、\nやにわにだごのお店ば、あったん」
1726 = "「車站前的道路，穿過第一個信號燈的地方，有個賣止餓糰子的店對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\n確か、おじいさんが一人でやっていたような……」
1406 = "「啊……唔，好像是個老爺爺一個人開的吧……」" 

# monologue
# JP: ぼんやりとだが、記憶している。
2430 = "雖然很模糊但確實有印象。" 

# monologue
# JP: 観光客相手のパッケージされたものではなく、\n地元相手の、一個いくらの、だごだった。
1961 = "他的糰子不是打包好賣給遊客，而是零賣給本地人的。" 

# 【真闇】
# display as 真闇
# JP: 「あそこば閉店して、長いことがらんどうだったんを、\n元忠さんが買い取って、安ぅにテナント募集したんよ」
1783 = "「那裡關店後空了很久，然後元忠先生把它買了下來，又便宜租了出去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「銀行が？　あるいは、宝生元忠が個人で？」
1792 = "「銀行嗎？還是寶生元忠個人？」" 

# 【真闇】
# display as 真闇
# JP: 「個人で。\n家賃、相場よりかなーり安ぅして」
1318 = "「他個人。房租比行情要便宜不老少」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ならば採算度外視か？　確かにそうした試みは、\n地域活性化にも繋がるかもしれんが――」
1034 = "「……不計成本？確實，這種嘗試說不定能讓地區經濟變得活躍起來——」" 

# monologue
# JP: これから商売にチャレンジするものがテナントに入るなら\n人材育成の役に立つ。
2100 = "如果有打算挑戰做生意的人租下來了也算是會對今後的人才培育有利。" 

# monologue
# JP: 既に実績のある店が市外から参入してくれるなら、\nそれももちろん、経済振興の役にたとう。
2097 = "如果是已經小有所成的店從市外加入進來了，當然也能有利於經濟振興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――実際には、どんな成果が？」
1009 = "「——實際出了什麼成果呢？」" 

# 【真闇】
# display as 真闇
# JP: 「なーんもよ」
1313 = "「什麼也沒有」" 

# monologue
# JP: ふるふると、真闇姉は脱力したように首を振る。
2318 = "真闇姐略顯無力般搖搖頭。" 

# 【真闇】
# display as 真闇
# JP: 「繁盛しても、根付かんで隈元へ出てっちゃったり……\n逆に隈元の有名店ば出店してきて、お客がつかんかったり」
1508 = "「就算做起來了，也沒在這裡扎根而是離開去了隈元……反過來隈元有名的店開到這邊生意也不怎樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……良くも悪しくも、古い町だからな、御一夜は」
1035 = "「……不論好壞，御一夜骨子裡還是個老城啊」" 

# monologue
# JP: 新しい芽が芽吹けたならば、\n古い土地に根付くより、新天地を目指すのは当然だろう。
2102 = "如果有新芽萌發，比起扎根在古老的土地上，選擇去新天地生長才是理所當然吧。" 

# monologue
# JP: 外から変革が訪れたなら、\n古い物とはどうしても、守りに入ってしまうだろうし――
2094 = "如果外部傳來了變革，老東西自然也會提高警惕，對其戒備——" 

# 【双鉄】
# display as 雙鐵
# JP: 「いかな宝生元忠といえど、\n個人レベルの試みで、そうした根本は変えられまい」
1513 = "「就算是寶生元忠，在個人層面的嘗試也是改變不了這種根本的東西的」" 

# 【真闇】
# display as 真闇
# JP: 「けどねぇ、他にもやってくれたんよ。いろいろと」
1294 = "「不過呢，他還做了挺多別的事情」" 

# monologue
# JP: 言って、真闇姉は指を折る。\nスポーツ大会の誘致に、夏祭りとロックフェスとの共催。
2335 = "真闇姐邊說邊掰著手指。比如同時申辦運動會、舉辦夏日祭典和搖滾音樂節等等。" 

# monologue
# JP: ゆるキャラなるものを作り総選挙へと出馬して、\n新名物となる料理のコンテストを行って――
2376 = "製作當地吉祥物然後讓它出馬參加總選舉，舉辦新特產美食大賽——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それを……全て個人でか？」
1748 = "「這些……全是以個人身份嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。個人で。\n私財ば叩いて、自分の人脈ば使ぉて」
1596 = "「是啊，個人身份。以私人財產運作，使用自己的人脈」" 

# monologue
# JP: 凄いことだ、と思いはするが。\n同時にどこか、虚しいようにも感じてしまう。
2433 = "雖然我覺得好厲害，但是同時又覺得有點空虛。" 

# monologue
# JP: それで本当に御一夜が変わると思っていたなら、\n宝生元忠――僕が思うよりよほど暗愚なのかもしれぬ。
2380 = "要是他覺得真靠這樣就能改變御一夜的話，寶生元忠——說不定就比我想的還要愚蠢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故個人でにこだわったのだ。市や市民、あるいは\n銀行を巻き込めば、成算も採算性も出てきたろうに」
1633 = "「為什麼要拘泥於個人呢。只要讓市政府與市民，或者讓銀行參與進來的話，就可以極大增加成功率和經濟性啊」" 

# 【真闇】
# display as 真闇
# JP: 「さぁねぇ。わからんよ。\nうちは、元忠さんじゃなかけん」
1395 = "「唔，那就不知道囉，咱又不是元忠先生肚裡的蛔蟲」" 

# monologue
# JP: 当たり前のことを当たり前に言い、\n真闇姉は肩を竦める。
2328 = "真闇姐聳了聳肩，理所當然地說出了理所當然的話。" 

# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんと小さか試みば、いくつもいくつも。\n元忠さんは、積極的に試しとったんよ。長ぁいこと」
1296 = "「不過，元忠先生他倒是在漫長的時間裡鍥而不捨地做過無數次這種小嘗試咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……その結果としての、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致なのか」
1060 = "「……最後的結果就是打算引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠嗎」" 

# 【真闇】
# display as 真闇
# JP: 「誘致運動自体は、前の前の市長の頃からあったけん。\n元忠さんが本格的に加わったんは、“その上”で、よね」
1471 = "「在前前任市長那時就已經有引進運動了。不過元忠先生正式加入是在做了那無數次嘗試之後咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1800 = "「！」" 

# monologue
# JP: ――繋がったような気がする。
975 = "——我感覺全都聯繫起來了。" 

# monologue
# JP: 真闇姉の少し困ったような口調と、\n教えてもらった事実群とが。
2316 = "真闇姐用略顯為難的語調告訴我的那些事實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本格的に誘致運動に参加する前というのなら――\n宝生元忠の振興運動への反対などはなかったのだよな？」
1470 = "「在他正式參加引進運動前——沒有人反對寶生元忠的振興運動吧？」" 

# 【真闇】
# display as 真闇
# JP: 「よねぇ」
1628 = "「沒有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、宝生元忠は一切の協力を求めなかった。個に拘り\n結果を出すのを拒むかのように、労力のみを費やした」
1295 = "「不過寶生元忠也沒有請求任何援助。他拘泥於扶持個體而費神費力，簡直就像拒絕拿出結果一樣」" 

# monologue
# JP: 真闇姉の答えは、無言。\nただ頷きがあるのみだ。
2313 = "真闇姐沒有回答，只是默默地點點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜は変化を好まぬ町だ。宝生元忠はそれを知ってる。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致の話も当然、好まれぬものであろうとも」
1545 = "「御一夜是個不喜歡變化的城市。寶生元忠深知這一點。而\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶自然也是被排斥的」" 

# monologue
# JP: しかし、宝生元忠は、根気よく実績を積み重ね続けた。\n“地道な努力では復興できない”という、実績を。
1970 = "但寶生元忠卻百褶不撓地積累著實際成果。這成果就是“紮實的努力帶來不了復興”這樣的觀念。" 

# monologue
# JP: そうした下地が積み重ねられ、“その上”で、\n誘致やむなしと宝生元忠が判断したと見られるのなら――
2058 = "在打實了基礎後，讓人們認為最後寶生元忠是迫不得已做出了引進工廠的判斷——" 

# 【双鉄】
# display as 雙鐵
# JP: 「“他に手はない"と、思わせてしまうのは……\n変化を受け入れさせるには、極めて有効な手段だろうな」\n1715 = "「讓人們認為“別無他法”……這是個讓人們接受變化的極其有效的手段啊」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「さぁ？　人様のことはわからんけんねぇ」\n1711 = "「誰知道呢？別人在想什麼可不好亂說」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まぁ、それはそうだな。\nだが、おかげでいくつかのことは、わかった」\n1774 = "「那倒也是。不過，這樣一來，我也弄清楚了好多事情」" \n\n# monologue\n# JP: 宝生元忠の真意がどこにあったにせよ、その行動が、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致やむなしという空気を強化したのは確実だ。\n1939 = "不管寶生元忠的真意為何，他的行動確確實實加深了“引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠是不得已而為之的”這一觀念。" \n\n# monologue\n# JP: 市や商店会の協力を“得られず”、それでも頑張った。\nそうした姿は、共感を得ようものだから。が、だ――\n1977 = "儘管“沒能獲得”市政府和商店協會的協助，他還是在努力。他的這一姿態很容易博得人們的共鳴。不過——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、反対に示せばいい。\n"他にも手がある”ということを、確たる結果とともに」
1778 = "「那我們就表示反対好了。用明確的結果来展示出“還有其他的方法”」" 

# monologue
# JP: しかし……\n真闇姉が示してしまえば、角が立つ。
1972 = "但是……如果真闇姐開口的話，就會引發矛盾。" 

# monologue
# JP: 宝生元忠のメンツを潰し、彼の主張に賛同した者に、\n反感をもたれてしまうだろう。
1934 = "不但會有損寶生元忠的面子，而且可能會引發贊同他主張的人的反感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは外来者の役割だ。\n鉄道とハチロクと、そして僕とは、適任だ」
1782 = "「那是我們外來者的任務。鐵路和八六還有我都正適合擔此重任」" 

# monologue
# JP: 役割を果たすことなら、慣れている。
2192 = "我早就習慣去完成自己的任務。" 

# monologue
# JP: 無神経に旧来の価値観を壊す、変革者。\nその像が必要とされるなら、僕は必ず、そうあろう。
2104 = "如果毫不在乎地打碎舊有價值觀的變革者需要有一個具體的形象的話，我肯定就是其中之一。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おかげで、やるべきが見えた気がする。\n話せてよかった。ありがとう」
1477 = "「多虧了你，我覺得我已經明白自己該做什麼了。謝謝你陪我聊天」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ！」
1503 = "「小雙！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1801 = "「！！？」" 

# monologue
# JP: 切羽詰まったような声。
2330 = "真闇姐語調中難掩急促。" 

# monologue
# JP: さりかけていた足を止め、何が起きたかと振り向いて――\nが、その先にいるのはいつもの、真闇姉だ。
2168 = "我停下剛要離開的腳步，回過頭去想知道發生了什麼事——但映入眼簾的卻是平常的真闇姐。" 

# 【真闇】
# display as 真闇
# JP: 「……無理したり、平気なフリばしたら、いけんよ？\n手伝えることがあったら、おねえちゃんにいうんよ？」
1043 = "「……可不能勉強自己然後裝沒事人哦？有什麼要幫忙的別忘了跟姐姐說啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1656 = "「知道了」" 

# monologue
# JP: 心配をしてもらってる。\n感じた瞬間、ふと気づく。
2397 = "讓她擔心了。我這麼覺得的瞬間突然注意到。" 

# monologue
# JP: 工場誘致をされてしまうということは……\nこの人から、焼酎造りを奪ってしまうことにもなると。
2382 = "要是讓工廠落戶成功了……就等於從這個人手裡奪走讓她釀造燒酒的權利。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。遠慮無く甘えさせてもらう。\nなりふりに構っていられる状況じゃないと、知ったから」
1449 = "「嗯，我會毫無顧慮地向你求助的。我也知道現在不是能死要面子的時候了」" 

# 【真闇】
# display as 真闇
# JP: 「そ？」
1599 = "「是嗎？」" 

# monologue
# JP: 嬉しげな声。\nそして手が、静かに静かに、伸びてくる。
2079 = "她的語調中洋溢著喜悅。然後她靜靜地向我伸出了手。" 

# monologue
# JP: だから受け取り、握手し、驚く。
2174 = "我在握住那手時，驚覺——" 

# monologue
# JP: （真闇姉の手は……\nこれほど小さく、これほど柔らかだったのか）
2452 = "（真闇姐的手……原來這麼小這麼柔軟啊）" 

# monologue
# JP: この手に、僕は頼ってる。\n恥じ入る気持ちは、強い責任感へと変わる。
2175 = "我就是依賴著她的這雙手——這份難為情的感受也化為了強烈的責任感。" 

# monologue
# JP: ――もっと強く、もっと役立つ、僕にならねば。
973 = "——我必須要變得更強、更派得上用場才行。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nれいなからデータを貰い、表にまとめておきました」
1794 = "「雙鐵少爺。我把從玲奈那裡拿到的數據整理成表格了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。助かる」
1799 = "「麻煩了。幫大忙了」" 

# monologue
# JP: ポーレットに聞けば恐らく容易に答えは出ようが、\n余計な負担をかけたくないし、先入観を持ちたくもない。
2429 = "雖然只要問一下波萊特估計就能輕鬆得出答案了，可我不想給她增添無謂的負擔，也不想被別人的觀點先入為主。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方も、市役所で数字をもらってきた」
1554 = "「我也從市政府那邊拿到了數據」" 

# monologue
# JP: 年度別の、御一夜市の宿泊観光客数と、\n御一夜駅の利用者数と。
2227 = "數據的內容是按年度匯總的御一夜市住宿遊客數和御一夜車站的客流量。" 

# monologue
# JP: それを並べてグラフに起こせば、\nたちどころにして浮き上がってくる。
2096 = "如果把它們放在一起做成圖表，結論很快就會出來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……\x%l大詔;#00ffc040;大詔%l;#;三十五年――\nつまり[しょうわ,1]正和[がんねん,1]元年は、敗戦の年だな」
1049 = "「……大正三十五年——也就是正和元年，戰敗的那一年啊」" 

# monologue
# JP: その年が、宿泊客数の激減の谷間の大きな底だ。
2419 = "那一年住宿遊客數跌到了谷底。" 

# monologue
# JP: 戦争を知るハチロクが、\n浮かぬ表情で相槌を打つ。
2348 = "經歷了戰爭的八六用一臉不高興的表情附和著。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l大戦;#00ffc040;大戦%l;#;末期に近づくにつれ、\n観光どころではなくなってしまいましたから」
1468 = "「因為越接近大戰末期，就越不可能有人來觀光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理からぬことだな。が――その期間にも、\n駅利用者数の落ち込みは比較的緩やかだ」
1445 = "「嗯，也有道理。不過——就算在那段時期，車站客流量的下降趨勢依舊相對平緩」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、休まず走り続けましたので。\n戦時中も、敗戦の日も、その翌日からも、ずっと」
1466 = "「因為我們都一直不間斷地在行駛。不管是戰時還是戰敗的那一天，還是第二天，風雨無阻」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……輸送や移送の重要性は、\n戦前も戦中も戦後も、大きく変わりはしないのか」
1597 = "「是嗎……貨運和客運的重要性，不管是戰前、戰中還是戰後都不會有什麼大的改變啊」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。\nそれだけに、戦時には苦労も多うございましたが」
1603 = "「是的。而且正是因為這樣，戰時我們也更辛苦」" 

# monologue
# JP: 誇りに凛と響く声。\nけれども、どこか辛そうな顔。
2078 = "她的語氣自豪而又凜然。但臉上卻寫滿了苦澀。" 

# monologue
# JP: ギャップが疑問を呼び覚まし、\n疑問はすぐさま記憶に繋がる。
1978 = "兩者之間的不一致勾起了我的疑問，疑問又很快喚起了記憶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――教科書かなにかで見たことがある。\n空襲では、鉄道も狙われたのだったか」
1429 = "「嗯——我在教科書還是什麼地方看到過。空襲的時候連鐵路也會被當作目標」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。どころか、海沿いの……[とうかいどう,2]東峡道本線などは、\n艦砲射撃でも狙われるだろうと言われておりました」
1607 = "「是的。還不止是這樣，沿海的……東海道幹線據說還是艦炮射擊的目標」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まさしく、戦いだったのだな」
1074 = "「……這就是戰爭啊」" 

# monologue
# JP: そんな時代を乗り越えて、御一夜駅利用者数も\n御一夜市への宿泊客数とともに堅調に復活し――
2273 = "熬過那個時代後，御一夜車站乘客數和住宿在御一夜的遊客數都堅挺地復活了——" 

# monologue
# JP: しかし、\x%l正和;#00ffc040;正和%l;#;八年を境に再びの下降線を描き始める。
1966 = "但以正和八年為界開始了新一輪的下跌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「八から十と下り続け、\n十一年の激減は、これは……」
1535 = "「從八年到十年一直下降，十一年劇減——這是……」" 

# 【真闇】
# display as 真闇
# JP: 「十一年は、いわゆる\x%lエアクラ;#00ffc040;エアクラ%l;#;法が施行された年とよ」
1354 = "「十一年也就是所謂\\x%lエアクラ;#00ffc040;空凝機%l;#;法施行的那一年」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば、その数年前からが、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展期にあたったわけか」
1401 = "「啊——那之前的數年前就是\\x%lエアクラ;#00ffc040;空凝機%l;#;的發展期吧」" 

# monologue
# JP: ……そこから先は、お手本のような右肩下がり。\nかろうじて持ち直しをみせるのは、何十年も経過した――
989 = "……然後就是像教科書般的下降線。幾十年之後才好不容易見到恢復好轉的趨勢——" 

# 【双鉄】
# display as 雙鐵
# JP: 「この、\x%l正和;#00ffc040;正和%l;#;五十年には、何が？」
1749 = "「這個，正和五十年發生了什麼事？」" 

# 【真闇】
# display as 真闇
# JP: 「御一夜市長に[ひない,1]雛衣さん――\nポーちゃんのお父さんが就いた年よね」
1754 = "「這是雛衣先生——小波父親就任御一夜市長的那一年」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば恐らく、御一夜鉄道にポーレットや、\nひょっとするとれいなも関わり始めた年となるのか」
1404 = "「啊——那恐怕就是波萊特，甚至是玲奈開始參與進御一夜鐵路的那一年吧」" 

# monologue
# JP: 以降は、微々にではあるが、駅利用客は増加している。
2145 = "從那以後，雖然很微小，不過車站的客流量在連年增加。" 

# monologue
# JP: さすがポーレットと思いはするが――\nしかし宿泊観光客数は、ほとんど改善を見せていない。
2159 = "我不禁想稱讚真不愧是波萊特——不過住宿遊客數卻基本沒看到改善。" 

# 【日々姫】
# display as 日日姬
# JP: 「この、\x%l正和;#00ffc040;正和%l;#;四十二年には何があったと？\nカクンて、ここらもひどか谷ばい」
1750 = "「這個，正和四十二年發生了什麼事啊？這裡也猛地有個大低谷咧」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l正和;#00ffc040;正和%l;#;四十二年は、\x%l帝鉄;#00ffc040;帝鉄%l;#;解体の年です。ともない、恐らく、\n隈元でも、大廃線が一気に進んだのでしょう」
1621 = "「正和四十二年是\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;解體的那一年。隨之而來的就是大廢線，恐怕隈元也一口氣廢了很多吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと――確か、鉄道地図があったよな」
1387 = "「唔——好像有鐵路地圖來著」" 

# monologue
# JP: 奥の間に行き探して見れば、\n記憶通りの場所に鉄道地図群を発見できる。
2169 = "我去裡面的房間搜索了一番，果然在我記憶中的地方找到了大量鐵路地圖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あった。\x%l正和;#00ffc040;正和%l;#;三十七年のものがこれで、\n\x%l正和;#00ffc040;正和%l;#;四十六年のものがこちらだ」
1610 = "「有了。這本是正和三十七年的，這本是正和四十六年的」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ……これは廃れるのも無理なかとー」
1380 = "「哇……這要不荒廢也不行啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1594 = "「是啊」" 

# monologue
# JP: 三十七年の\x%l帝鉄;#00ffc040;帝鉄%l;#;路線は、九洲広くを網羅している。\n御一夜から、北は[やつしろ,2]八ツ城を超え[くまもと,1]隈元-[はかた,1]博太、その先へ。
1930 = "三十七年的\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;線路幾乎包羅了整個廣袤的九州。從御一夜向北越過八代、隈元及博多，向更遠處延伸。" 

# monologue
# JP: 南は[よしまつ,1]由松で分岐し、[はやと,1]早戸-[かごしま,2]鹿兒島方面と、\n[みやこのじょう,2]都之城-[みやざき,1]宮嵜方面とが走っている。
2002 = "南方則在吉松分歧，往隼人、鹿兒島方向與都城、宮崎方向駛去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜まわりだけでもこれほど栄えていたものが……\n四十六年には、湯医線だけしか残らんとは」
1641 = "「當年光是御一夜周圍都這麼興盛……但四十六年卻只剩下湯醫線」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;は、\nかくも速やかに鉄道を駆逐していったのです」
1003 = "「\\x%lエアクラ;#00ffc040;空凝機%l;#;就是這麼迅速地驅逐著鐵路」" 

# monologue
# JP: データが、地図が、言葉が、理解を深めてくれた。
2226 = "數據、地圖、還有對話加深了我的理解。" 

# monologue
# JP: 御一夜の衰退は、鉄道中継点としての価値の喪失と一体だ。\nつまり――
2149 = "御一夜的衰退和作為鐵路中繼點的價值的喪失是一體的。也就是說——" 

# 【真闇】
# display as 真闇
# JP: 「これ……御一夜は、ターミナル駅としての価値以上の、\n観光地としての価値ば持てんかったゆーことよねぇ」
1745 = "「這……也就是說御一夜除擔負\\x%lターミナル駅;#00ffc040;總站%l;#;的價值以外，並沒有作為觀光地的價值咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。単純に温泉地となれば人はやはり、\n[ゆふいん,2]湯富院なり[べっぷ,1]別部なり[いぶすき,1]燻宿なりに向かってしまう」
1593 = "「是啊。單純要去溫泉地的話，人們還是會想去湯布院、別府、指宿這些地方的」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;で簡単に行けるのも強かよね」
1672 = "「而且乘\\x%lエアクラ;#00ffc040;空凝機%l;#;就能輕鬆抵達也很重要」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに御一夜はその面でも不利だ。エアクラを使っても、\nアクセスのよい大都市は八ツ城・隈元くらいしか無い」
1664 = "「確實，御一夜在這方面很不利。就算使用空凝機，方便去的大城市也只有八代和隈元而已」" 

# monologue
# JP: 湯医線を存続させた\x%lエアクラ;#00ffc040;エアクラ%l;#;作動不能地帯が、\n観光地としての価値から見た場合には足枷となる。
2415 = "這裡讓湯醫線得以存續的\\x%lエアクラ;#00ffc040;空凝機%l;#;無法使用的地帶，從觀光地價值的角度來看更是腳鐐。" 

# monologue
# JP: 湯量で負け。知名度で負け。砂風呂という名物に負け。\n更に交通の便でも負けては、温泉地としては勝ち目がない。
2264 = "溫泉數無法取勝。知名度無法取勝。沙浴這個特色無法取勝。連交通便利性也無法取勝，作為溫泉地可算一敗塗地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……他の温泉地に無く、僕らにある観光資源といえば、\n[ハチロクニイマル,3]8620と、焼酎だ」
1067 = "「……要說別的溫泉地沒有，我們才有的觀光資源的話，那也就是８６２０和燒酒了」" 

# monologue
# JP: 整理するつもりで発した言葉が、\nそのままひとつの結論となる。
2195 = "我為了整理要點而說出的話直接化為了一個結論。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、焼酎を飲める\x%l列車;#00ffc040;列車%l;#;を仕立ててはどうだろう」
1779 = "「那我們弄一輛可以喝燒酒的\\x%l列車;#00ffc040;列車%l;#;怎麼樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「蒸気焼酎のことなら」
1487 = "「如果是蒸汽燒酒——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、蒸気焼酎だけにこだわるのではなく。\n例えば、飲み比べをできるような――」
1303 = "「不，不用光拘泥於蒸汽燒酒。比如可以品酒的——」" 

# monologue
# JP: いや、違う。\nそれだけではまだ不足している。
1946 = "不，不對。光靠那樣的話還不夠。" 

# monologue
# JP: “僕らの資源”は、もっと活かせる。\n余すところなく活用しきれる。
2385 = "要更充分運用“我們的資源”。要更徹底地有效利用它們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ここ何年も帝都では焼酎ブームでな。\nプレミアがついているものも少なくないんだ」
1063 = "「……最近幾年燒酒在帝都相當流行。被炒起價格的牌子也不少」" 

# 【真闇】
# display as 真闇
# JP: 「[もりのぞう,2]森ノ象さんの“森ノ象”。[しらたま,1]白霊さんの“[めいおう,1]冥王”。\n[くらき,1]蔵木さんの“[ひゃくねんのこどく,4]百年の蟲毒”あたりよね？」
1617 = "「森伊藏的“森伊藏”，玉白的“冥王”，木黑的“百年孤獨”之類的吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。で。その辺の焼酎は帝都ではまず入手できないが、\nうち――右田の問屋の方では、普通に扱いがある」
1436 = "「嗯。然後，這一類的燒酒在帝都基本買不到，但我們右田酒行卻都有正常備貨」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　なら、\nプレミア焼酎ば[の]飲みっ[くら]比できる\x%l列車;#00ffc040;列車%l;#;にすると？」
1416 = "「啊！那就弄一輛可以品各種高級燒酒的\\x%l列車;#00ffc040;列車%l;#;？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうのはどうだろう。\n\x%l列車;#00ffc040;列車%l;#;で酒を飲ませるというのがマズくなければ――」
1460 = "「嗯，這樣怎麼樣呢。只要在\\x%l列車;#00ffc040;列車%l;#;上喝酒不會有什麼麻煩的話——」" 

# 【ハチロク】
# display as 八六
# JP: 「そこは、腕のいい客室乗務員を確保できれば、\n大丈夫ではないかと存じます」
1751 = "「這只要能僱傭到幾個能幹的車廂乘務員應該就不要緊了」" 

# monologue
# JP: ハチロクの声は、明るく、強い。
1981 = "八六的聲音顯得歡快而堅定。" 

# 【ハチロク】
# display as 八六
# JP: 「[ビール,1]麦酒\x%l列車;#00ffc040;列車%l;#;というものを走らせる私鉄は、\n鉄道全盛期には、決して珍しくはありませんでしたし」
1716 = "「讓啤酒\\x%l列車;#00ffc040;列車%l;#;上路行駛的私營鐵路在鐵路全盛期也絕不少見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1598 = "「是嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「泥酔させない\x%l車販;#00ffc040;車販%l;#;・サービスの体制をつくる。\nそれさえ出来れば、トラブルはほぼ回避できる筈です」
1696 = "「要建立不會讓乘客爛醉的\\x%l車販;#00ffc040;車售%l;#;服務體制。只要能做到的話，基本上就能迴避掉那些麻煩事了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした点は、ポーレットや赤井宮司に相談となるか\n――っと」
1747 = "「這一點到時候找波萊特和赤井宮司再商量一下吧——唔」" 

# monologue
# JP: 真闇姉が挙手をしている。\nなにかと問えば、申し訳無さそうな声で問われる。
2329 = "真闇姐舉起了手。我問她怎麼了，她用略帶抱歉的語調提問道：" 

# 【真闇】
# display as 真闇
# JP: 「ね、双ちゃん。\nそん\x%l列車;#00ffc040;列車%l;#;ば、どんだけ走らせっと？」
1504 = "「小雙，那種\\x%l列車;#00ffc040;列車%l;#;你估摸一天開幾趟啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1800 = "「！」" 

# monologue
# JP: 聞かれればすぐ、己の案の不足に気づく。
2374 = "被她一問我便意識到了這方案的不足之處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――そのような\x%l列車;#00ffc040;列車%l;#;にしてしまえば、\nみなが飲みたがるのは、プレミア焼酎に偏るよな」
1590 = "「是啊——要是弄出那種\\x%l列車;#00ffc040;列車%l;#;的話，大家肯定會偏向想喝高級燒酒啊」" 

# 【ハチロク】
# display as 八六
# JP: 「確かに……でしょうね。その場合、飲めないことが、\nむしろトラブルに繋がってしまうかもしれません」
1663 = "「確實……那種情況下，要是喝不到說不定反而會引來麻煩事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「となると……例えば一日一\x%l編成;#00ffc040;編成%l;#;を走らせて、\n一人一種あたり二合に制限をしたとして……」
1756 = "「這樣的話……比如說一天跑一個\\x%l編成;#00ffc040;編組%l;#;，一個人每種酒限制喝二合……」" 

# 【ハチロク】
# display as 八六
# JP: 「17[メートル]m級[こうせい,1]鋼製\x%l客車;#00ffc040;客車%l;#;で、余裕をもたせた座席とすると、\n定員は60名程度でしょうか」
1802 = "「１７公尺級的鋼結構\\x%l客車;#00ffc040;客運車廂%l;#;在保證一定空餘空間的前提下安排座席，估計能載６０人左右吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「60名だと、一日につき一種の酒が十二[しょう]升……」
1810 = "「６０人的話，每天每種酒就需要十二升……」" 

# monologue
# JP: 日に十二升を三百六十五日間――\n今の取扱量では、到底まかなえるものではない。
2253 = "每天十二升，三百六十五天——現在我們的備貨量根本滿足不了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すでにプレミアが付いているのだ。\n扱いを増やしてもらうのは――まず無理だろうな」
1676 = "「而且現在都已經炒價了。要增加備貨——基本上不可能啊」" 

# 【ハチロク】
# display as 八六
# JP: 「では、飲み比べ\x%l列車;#00ffc040;列車%l;#;は実現不可能となりますか」
1785 = "「那麼，品酒\\x%l列車;#00ffc040;列車%l;#;就無法實現了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうなるか。残念だが」
1055 = "「……恐怕是這樣的。很遺憾」" 

# 【日々姫】
# display as 日日姬
# JP: 「ね、待ってにぃに！」
1772 = "「那個，等一下阿哥！」" 

# monologue
# JP: 日々姫が挙手をし、\nぐいと体を乗り出してくる。
2240 = "日日姬舉起手，整個人向前探了過來。" 

# monologue
# JP: それぞれの地元でやれないか、と。
2087 = "她說各自在當地辦不就好了嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1411 = "「啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「地元ごと……でございますか？」
1378 = "「各自在當地辦……嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ああ、無論、\nくわしくはポーレットに尋ねねばなのだが……」
1432 = "「嗯。啊，當然，具體還是要問一下波萊特才行……」" 

# monologue
# JP: 森ノ象さんと白霊さんは鹿兒島、蔵木さんは宮嵜――
2249 = "森伊藏和玉白在鹿兒島，木黑在宮崎——" 

# monologue
# JP: 他に例えば、プレミア化している麦焼酎、\n“[かめはち,1]亀八”を出している[よつめ,2]四ツ目さんは、[おおいた,1]大板にある。
1982 = "其他再比如說現在炒著價的麥燒酒“兼八”，它的釀酒廠四谷則是在大分縣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もし、それぞれの県に。\nどんなに短いものでも鉄道路線が残っているなら――」
1285 = "「不管多短也好，如果在各自的縣裡還剩著一些鐵路線路的話——」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！　それが、“地元ごと”――それぞれの地元で、\nそれぞれの焼酎を飲める、焼酎\x%l列車;#00ffc040;列車%l;#;を走らせる」
1414 = "「啊！是這樣的“各自在當地辦”——在各自的產地，開行可以喝當地燒酒的\\x%l列車;#00ffc040;列車%l;#;啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;でだったら、簡単にめぐれるばい。\nそれ、ツアーとして売りだせばよかとよ」
1638 = "「用\\x%lエアクラ;#00ffc040;空凝機%l;#;就可以簡單地轉一圈咧。劃拉起來當旅行套餐賣不就行咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅行企画としてか――悪くない。\nうん、実に良さそうに僕は思う」
1327 = "「作為一個旅行企劃嗎——不錯。嗯，其實我覺得真得挺好的」" 

# monologue
