1145 = "「Không hỏng được đâu. Trừ khi ở trong môi trường quá tồi tệ.」"
# monologue
# JP: 羊水のことはくわしく知らんが、\n水の類がそうそう腐るものでないことは承知している。
1501 = "Dù không rành về nước ối,\nnhưng em biết các loại chất lỏng không dễ bị hỏng đến thế."
# 【双鉄H】
# display as 雙鐵
# JP: 「まして、真闇姉だ。最高の環境で育まれた最上の素材だ。\n真闇姉が重ねた年は、むしろ長期熟成として尊ぶべきだ」
1223 = "「Huống hồ lại là chị Mayami. Một nguyên liệu tuyệt hảo được nuôi dưỡng trong môi trường tốt nhất.\nTuổi tác của chị Mayami, đúng hơn là nên được tôn vinh như một quá trình ủ rượu lâu năm mới phải.」"
# 【真闇】
# display as 真闇
# JP: 「長期熟成」
1264 = "「Ủ rượu lâu năm.」"
# monologue
# JP: きょとん、とした声。\nやがてゆるゆる、真闇姉の顔が笑み崩れてく。
1458 = "Giọng nói đầy ngạc nhiên.\nRồi dần dần, gương mặt chị Mayami giãn ra thành một nụ cười rạng rỡ."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんがそぎゃんと思うてくれるなら、\n長期熟成、丁寧につづけてよかったのかなぁ」
1121 = "「Nếu Sou-chan nghĩ như vậy,\nthì có lẽ việc cẩn thận ủ rượu lâu năm cũng tốt nhỉ.」"
# monologue
# JP: （ぽとっ）
1813 = "（Tách）"
# monologue
# JP: 僕の唇のすぐわきに、\n真闇姉から零れた汗が落ちてくる。
1642 = "Ngay sát bên khóe môi em,\nmột giọt mồ hôi từ chị Mayami rơi xuống."
# monologue
# JP: 舐めれば、塩の味がする。\n同時に、ほのかな甘みと熱さ。
1745 = "Nếm thử, thấy có vị mặn.\nĐồng thời, có cả vị ngọt dịu và hơi ấm."
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
1085 = "「Ưm.」"
# monologue
# JP: その熱は体の奥に火を灯し、\nのぼせによってボヤけてた感覚を明確にしてくれる。
1718 = "Hơi ấm ấy thắp lên ngọn lửa từ sâu thẳm bên trong cơ thể em,\nlàm rõ nét lại những cảm giác đang mờ mịt vì cơn say sóng nhiệt."
# 【双鉄H】
# display as 雙鐵
