1734 = "頂出來的瞬間，就有真闇姐的嘴巴和舌頭嚴陣以待，吸、舔、啄、含，十八般武藝樣樣上陣――" 

# 【真闇】
# display as 真闇
# JP: 「ちゅるるっ――ちゅっ――れりゅっ――んちゅうっ」
1058 = "「啾嚕――啾――舔――嗯啾」" 

# 【双鉄H】
# display as 雙鐵
