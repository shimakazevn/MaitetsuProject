1564 = "為了得到頂級絹絲，餵養最好的飼料，放在箱子裡飼育的蠶。" 

# monologue
# JP: 真闇姉の肌もおっぱいも何もかも、\nそれと同じく、傷ひとつなく、大事に大事に育ってる。
1645 = "真闇姐的肌膚、胸部以及全身都一樣，保養得非常用心，一點傷痕都沒有。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これほど上質な肌を……僕は、勃起で――\nにじみ出る汁で、穢してる）
1835 = "（這麼好的肌膚……我勃起的陰莖――溢出的預射液要弄髒它了）" 

# monologue
# JP: それが嬉しい。
1466 = "好高興。" 

# monologue
# JP: 僕の熱を、匂いを、体液を、\nもっと濃く深く、真闇姉へと滲ませたくなる。
1510 = "我想讓真闇姐感受到我更濃更深的熱量、氣味以及體液。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……よだれ――よだれ、を……\n僕の、先端に……垂らして、くれる――か？」
1208 = "「真闇姐……可以――可以流點唾沫……在我的鬼頭頂……上面嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「んっ……よだれ……ね？――\nん～～っ――くちゅっ、くちゅっ、くちゅっ」
1069 = "「嗯……唾沫吧……？――嗯～～――咕啾、咕啾、咕啾」" 

# monologue
# JP: 音を立てながら口をもごもごうごかして、\n真闇姉はその口内へとよだれをためる。
1464 = "她醞釀了幾下，積累下了一口口水。" 

# monologue
# JP: そしてあかんべぇをするように、\n胸の谷間へと舌を伸ばして――
1566 = "然後對著胸部之間的位置，擺鬼臉般地吐了吐舌頭――" 

# 【真闇】
# display as 真闇
# JP: 「んっ……」
# 1068 = "「嗯……」" 

# monologue
