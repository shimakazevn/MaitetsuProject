1205 = "「真闇姐――好舒服啊――真的好舒服啊」" 

# monologue
# JP: それしか、言葉が出てこない。\nなにかに例えようもない、ただただ最高の快感だった。
1536 = "我能說的只有這個詞了。再也找不出別的例子，能感受到的就是最棒的快感。" 

# monologue
# JP: だけれど、だから――\n欲が膨らむ。
