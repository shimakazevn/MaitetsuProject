1819 = "（Hửm? ……Sao lại nóng đến mức này nhỉ?）"
# monologue
# JP: 思って、気づく。\nああそうだ。暑いではなく、はっきり熱い。
1416 = "Nghĩ vậy, rồi em chợt nhận ra.\nÀ đúng rồi. Không phải là nóng bức của thời tiết, mà rõ ràng là cơ thể đang phát sốt."
# monologue
# JP: 首の後ろが、搗きたての餅に張り付いているようで、\nなのに顔から胸板にかけては、とても涼しい。
1486 = "Sau gáy em có cảm giác như đang dính chặt vào miếng bánh mochi vừa mới giã xong,\nthế nhưng từ mặt xuống ngực lại rất mát mẻ."
# monologue
# JP: （ぱた――ぱた――ぱた――）
1811 = "（Phạch――phạch――phạch――）"
# monologue
# JP: ……このリズムなら知っている。\nこれは、つまりは――
821 = "……Nhịp điệu này thì em biết.\nNói cách khác, đây là――"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……」
1068 = "「Ưm……」"
# monologue
# JP: 目を開け、やはりそうかと思う。\nこれは、うちわのリズムだったと。
1665 = "Mở mắt ra, quả nhiên là vậy.\nĐây là nhịp điệu của chiếc quạt tròn."
# monologue
# JP: 真闇姉がゆったりと、僕を仰いでくれてる。\nその顔が、その胸が、僕の顔のすぐ真上にある。
1629 = "Chị Mayami đang thong thả quạt cho em.\nGương mặt ấy, vòng ngực ấy, đang ở ngay phía trên mặt em."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……これは――」
1213 = "「Chị Mayami……Thế này là――」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、知らんの？\nこれ、ひざまくら」
1131 = "「Sou-chan, em không biết sao?\nĐây gọi là gối đùi đó.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それは、知ってる。\nそうではなくて、何故僕は――」
1165 = "「Chuyện đó thì em biết.\nNhưng ý em là, tại sao em lại――」"
# 【真闇】
# display as 真闇
# JP: 「のぼせとったんよ？　双ちゃん、お風呂で」
1130 = "「Em bị say sóng nhiệt đó? Sou-chan, lúc đang tắm ấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……」
# 1068 = "「嗯……」" 
# monologue
