1651 = "Mỗi khi lưỡi chị Mayami chuyển động,\nmỗi khi lưỡi và khoang miệng bị liếm láp, cơ thể em lại càng nóng bừng lên."
# monologue
# JP: （ぐいっ）
1841 = "（Giật mạnh）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1272 = "「!」"
# monologue
# JP: もっと近づきたくなって、体を密着させ、気づく。\n僕の性器が、ガチガチに勃起してしまっている。
1519 = "Em muốn đến gần hơn nữa, ép sát cơ thể vào nhau, rồi nhận ra.\nDương vật của em đã cương cứng lên từ lúc nào."
# 【真闇】
# display as 真闇
# JP: 「ぷあっ――あっ……これっ」
1112 = "「Pua――a……cái này」"
# monologue
