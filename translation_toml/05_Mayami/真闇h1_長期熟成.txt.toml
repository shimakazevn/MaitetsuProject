1443 = "Đột nhiên, nhịp quạt trở nên nhanh hơn.\nTóc mái có hơi rối một chút, nhưng như thế này đầu óc lại mát mẻ và dễ chịu hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「が、僕は性的なことにはぼんやりとしか知識が無いから、\nどうしたものかと。――真闇姉に頼るにしても」
989 = "「Nhưng em chỉ có chút kiến thức mơ hồ về chuyện tình dục thôi,\nnên không biết phải làm sao.――Dù có nhờ cậy chị Mayami đi nữa thì」"
# 【真闇】
# display as 真闇
# JP: 「た、頼られても困るけん！　うち、だって、\n恋愛とか、今まで全然……その、経験……なか……もん」
1183 = "「B-Bị nhờ cậy thì chị cũng khó xử lắm! Bởi vì, chị,\ntừ trước đến giờ hoàn toàn không có……ờm, kinh nghiệm……yêu đương……mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん。そう聞かせてもらっていたから、余計に悩んだ。\nそれで思考が、どうどうめぐりしてしまって――」
1101 = "「Vâng. Vì đã nghe chị nói vậy nên em mới càng phiền não hơn.\nThế là dòng suy nghĩ cứ luẩn quẩn mãi――」"
# 【真闇】
# display as 真闇
