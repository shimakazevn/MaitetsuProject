1062 = "「嗚啊！」" 

# monologue
# JP: 猛然と腰を動かせば、一瞬だけは戸惑って。\nけれどもすぐに真闇姉は、僕のリズムを掴んでくれる。
1533 = "我的腰猛地抽動起來，讓真闇姐迷茫了一下。但她很快就抓住了我的節奏。" 

# monologue
# JP: （しにゅっ！　むりゅっ！　むいっ！　むりゅんっ！）
1826 = "（擠！　哧溜！　哧！　哧溜！）" 

# 【真闇】
# display as 真闇
