1512 = "Đầu lưỡi em vừa liếm lên môi chị ấy để nếm thử,\nđã bị chiếc lưỡi vươn ra từ khuôn miệng hé mở ấy quấn lấy đầy ngọt ngào."
# 【真闇】
# display as 真闇
# JP: 「ちゅっ――んっ……んちゅっ――れるっ――れろっ\n――ん……んふっ……ふっ」
