1623 = "Chị Mayami dường như cũng đã nhận ra điều đó."
# monologue
# JP: もじもじと体をよじるたび、\n甘くてゆるい快感が、僕の下腹部に蓄積していく。
1561 = "Mỗi lần chị ấy ngượng ngùng vặn vẹo cơ thể,\nmột khoái cảm ngọt ngào, lâng lâng lại tích tụ nơi bụng dưới của em."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……その――僕は、切ない」
1210 = "「Chị Mayami……chuyện là――em, thấy rất khó chịu.」"
# monologue
# JP: 気持ちいいのだが、焦れてしまう。\nもっと強くと望んでしまう。
1697 = "Dù rất sướng, nhưng lại khiến em bồn chồn.\nEm lại khao khát mãnh liệt hơn nữa."
# 【真闇】
# display as 真闇
