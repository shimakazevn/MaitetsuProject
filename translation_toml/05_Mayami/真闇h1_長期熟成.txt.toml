41 = "(Phạch――phạch――phạch)"
# monologue
# JP: 心地よい風が柔らかく吹く。\nほてった体を冷ましてくれる。
1728 = "Cơn gió dễ chịu nhè nhẹ thổi qua.\nLàm dịu đi cơ thể đang nóng hừng hực của em."
