1441 = "Ký ức bị lu mờ vì cơn sốt,\ncó vẻ như đã dần rõ nét lại nhờ câu nói đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……僕は、考えすぎてノボせてしまったのか」
1251 = "「Ra vậy……Em suy nghĩ nhiều quá nên bị say sóng nhiệt sao.」"
# 【真闇】
# display as 真闇
# JP: 「考えすぎと？」
1148 = "「Suy nghĩ nhiều quá á?」"
