1517 = "Theo hướng ánh mắt ngước lên của em,\nchị Mayami mang một vẻ mặt vô cùng áy náy."
# 【真闇】
# display as 真闇
# JP: 「ごめんねぇ、頼れんおねーちゃんで。\nいい年して、双ちゃんをリードもしてあげれんなんて」
1171 = "「Xin lỗi em nhé, chị đúng là một người chị không đáng tin cậy.\nĐã lớn chừng này tuổi rồi mà còn không thể dẫn dắt Sou-chan.」"
# 【双鉄H】
# display as 雙鐵
