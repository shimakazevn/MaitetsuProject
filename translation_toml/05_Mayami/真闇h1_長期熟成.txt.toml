1815 = "（啾――咻嚕）" 

# monologue
# JP: ぱくぱくひくつく膣口が、膣のまわりのピンクの肉が、\n僕の勃起に馴染もうと、甘えてすがりついてくる。
1363 = "一張一合一抽一縮的小穴口，小穴周圍的粉肉，都乖巧地貼了上來，想要習慣我勃起的肉棒。" 

# monologue
# JP: ただ、それだけで気持ちいい。\nおまんこの内側の肉さえも、真闇姉の肌触りは極上すぎる。
1386 = "僅此而已，我已經覺得非常舒服了。小穴內側的肉、真闇姐的肌膚都非常棒。" 

# 【真闇】
# display as 真闇
# JP: 「ん……おねえちゃんの、双ちゃんのための、\n長期熟成処女まんこ――」
1078 = "「嗯……姐姐專為小雙養出來的長期熟成處女小穴――」" 

# monologue
# JP: （ぬらっ――ぬる――んっ）
1804 = "（哧溜――哧溜――嗯）" 

# monologue
# JP: ようやく、くちりと。\n勃起の先端が、膣口のはざまに食い込まされる。
1675 = "終於聽到咕吱一聲。肉棒的頂端陷進了小穴口的縫隙中。" 

# monologue
# JP: 動かないのか、動けないのか、\n真闇姉はそこで止まってしまう。
1370 = "不知是不肯動還是動不了，真闇姐突然停了下來。" 

# 【真闇】
# display as 真闇
# JP: 「どうか――双ちゃんのものに、してください」
1242 = "「請――讓我變成你的人吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1085 = "「嗯」" 

# monologue
# JP: 真闇姉の腰に手をあてて、\nゆっくりと――真闇姉の体を引き寄せていく。
1531 = "我的手放在真闇姐的腰上，慢慢地――將真闇姐拉了過來。" 

# 【真闇】
# display as 真闇
# JP: 「ん……あっ――入って、くるっ――んんっ――\n双、ちゃんの――おちん、ちん――ふあっ」
1071 = "「嗯……啊――進來了――嗯嗯――小雙的――雞雞――嗚啊」" 

# monologue
# JP: （みちっ――く、ちっ）
1793 = "（呲――哧溜）" 

# monologue
# JP: 真闇姉の膣の内側は、すべすべしながら、\nきっちりみっちり僕の先端に巻き付いてくる。
1655 = "真闇姐的陰道內側很嫩滑，一毫不落地將我的頂端包裹了起來。" 

# monologue
# JP: 超極上のびろうどが隙なく勃起に張り付いてきて、\nそのままそわそわ、かすかに震え、奥へ奥へと誘ってくる。
1483 = "彷彿頂級的天鵝絨將肉棒完全包裹，還帶著顫動將肉棒向深處勾引。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真、闇……姉っ……いいか？　\nもっと――もっと、奥まで」
1192 = "「真闇……姐……可以嗎？我還可以插得更深嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「ゆーたよ？　双ちゃんのものだって。\nおねえちゃんのおまんこも、おっぱいもおへそも、全部」
1151 = "「我不是說了嗎，我已經是你的人了。姐姐的小穴、胸部、肚臍眼，都是你的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならっ！」
1259 = "「那我！」" 

# monologue
# JP: そんなことを言われたらもう止まれない。\n腰と腰とを、全部一気に密着させてっ！
1462 = "她這麼說我可怎麼停得下來。我一口氣將我們的腰貼到了一起！" 

# monologue
# JP: （みちいいいいいいいいいっっ！！）
1792 = "（吱嚕！！）" 

# 【真闇】
# display as 真闇
# JP: 「痛っ――～～～～～っ！！」
1181 = "「痛――～～～～～！！」" 

# monologue
# JP: 肉を割り入る、\n張り付くものを剥がす感覚。
1715 = "這是種往肉裡鑽探，將一切阻攔都撕掉的感覺。" 

# monologue
# JP: 勃起の全部が強烈に擦り上げられて、\n呼吸が一瞬止められて、目の裏側が眩んでしまう。
1550 = "整根肉棒都在強烈的摩擦下，我的呼吸都停止了一瞬間，眼睛直冒金星。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うぁ……はっ――あっ――」
1061 = "「嗚啊……哈――啊――」" 

# 【真闇】
# display as 真闇
# JP: 「ぜ、全部……そう、ちゃんっ……はいった、と？」
997 = "「全、全部……都……插進來了嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
# 1085 = "「嗯」" 

# monologue
# JP: 出血、してる。\n接合部から、真っ赤な血が流れ出している。
1699 = "血流了出來。從我們的結合部流出了鮮紅的血液。" 

# monologue
# JP: 僕の勃起を飲み込んだ膣口はぴっちり伸びて広がって、\n串刺し――と、そんな言葉が脳裏によぎる。
1479 = "小穴口被我的肉棒插入後被撐開，我不禁想到一個詞――串刺。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……血が」
1211 = "「真闇姐……流血了」" 

# 【真闇】
# display as 真闇
# JP: 「ん。証、とね。\nはじめてば、双ちゃんに捧げた、証」
1108 = "「嗯，這是證明呀。是我的純潔奉獻給你的證明」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「証の……血」
1234 = "「血的證明……」" 

# 【真闇】
# display as 真闇
# JP: 「そ、双ちゃんっ！？」
1133 = "「小，小雙！？」" 

# monologue
# JP: それが自然なことな気がして、\n指先で血を掬い舐めとってみる。
1535 = "我知道這是很自然的出血，用手指沾了一點舔了一舔。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「鉄の味がする――生温かいな」
1176 = "「有鐵的味道――溫溫的」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん」
1129 = "「小雙」" 

# monologue
# JP: （きゅんっ）
1817 = "（啾）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1095 = "「嗯！」" 

# monologue
# JP: 真闇姉の膣が、絞るようにして蠢きうねる。
1639 = "真闇姐的小穴繞著我的肉棒蠕動著。" 

# 【真闇】
# display as 真闇
# JP: 「中っ……おねえちゃんの[なか,1]膣内、で……一緒に、\nんっ――気持ち、よぉ――なろ？」
1241 = "「說好了……要在姐姐的小穴裡……和姐姐一起、嗯――舒服起來的吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇……姉っ――」
1190 = "「真闇……姐――」" 

# monologue
# JP: ゆるゆると、ごく慎重に――\n怖がってでもいるかのように、真闇姉が腰を持ち上げる。
1497 = "慢慢地，小心翼翼地――真闇姐抬起了腰，像是有點害怕。" 

# 【真闇】
# display as 真闇
# JP: 「んっ――くっ――」
1065 = "「嗯――唔――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「う――ぁッ――」
1032 = "「唔――啊――」" 

# monologue
# JP: （ぬる――――るっ――――るっ――）
1806 = "（哧溜――嚕――嚕――）" 

# monologue
# JP: ナメクジが這い進むようなスローさが、\n否応なしに感覚を、勃起に集中させていく。
1736 = "順滑到彷彿像蛞蝓在前進一般，讓我的注意力全都集中在了肉棒上。" 

# monologue
# JP: これは――すごい。\n体が全部、裏返りそうに気持ちいい。
1717 = "這真是――太厲害了。舒服到渾身都要叛變了似的。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉の、膣の……中……あっ――\nうねって―――ひだっ、これっ――くっ」
1214 = "「真闇姐的小穴……裡……啊――很蜿蜒――這是什麼――唔」" 

# monologue
# JP: びろうどのよう。つるつるしてる。その直感は、\n動かされればなんとも浅いものだったと知る。
1387 = "像天鵝絨一樣，滑滑嫩嫩的。她動起來我才能捕捉到這微弱的感覺。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……な、これは――ひだが、\nまとわりつい、ては――はが、れてっ」
1119 = "「好棒……這是什麼――褶皺纏了上來――又被剝開」" 

# monologue
# JP: びろうどのような肉ヒダは、多重構造になっている。
1449 = "天鵝絨一般的肉褶有很多層。" 

# monologue
# JP: ぴったりしてる感触が、動いてすれればめくれざわめき、\n勃起の先のくびれに張り付き、こすってくれる。
1676 = "緊貼的感觸，一動就會翻開的葉片感，或是貼在陰莖頂端的冠狀帶上磨蹭。" 

# 【真闇】
# display as 真闇
# JP: 「あ……ふっ――あっ」
1040 = "「啊……呼――啊」" 

# monologue
# JP: 勃起が膣から抜ける寸前、\nそこまで腰を持ち上げて――
1541 = "抬腰到陰莖要從小穴拔出的位置――" 

# monologue
# JP: （ぬろっ――ろっ――ろっ――）
1807 = "（哧溜――溜――溜――）" 

# monologue
# JP: ――ゆっくり、ゆっくり。\n真闇姉の膣は再び、僕の勃起を飲み込んでいく。
817 = "――慢慢地、慢慢地。真闇姐的小穴又一次將陰莖給吞了下去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――ふっ――」
1059 = "「嗚――呼――」" 

# monologue
# JP: おかしな声を出しそうになり、\n必死で鼻から息を抜く。
1526 = "我控制不住喉嚨裡奇怪的聲音，拚命壓抑著鼻子的進氣。" 

# monologue
# JP: 最初のときは、とにかく必死で突きこむだけで、\n味わうなどは、考える余裕もなかったが――
1364 = "一開始我只顧悶頭往裡面插，根本沒有工夫想著品味――" 

# 【真闇】
# display as 真闇
# JP: 「ん……双ちゃん――あっ――太っ――――んふっ」
1080 = "「嗯……小雙――啊――好粗――嗯唔」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「違う……真闇姉が――ここから――狭く――\nあっ――なって――いる、んだ――」
974 = "「不是的……真闇姐――這裡――很窄――啊――所以――才會――」" 

# 【真闇】
# display as 真闇
# JP: 「ひ――んっ――双ちゃんの――亀頭――あっ――\nこすれ、て――めくれっ――んううっ！」
1025 = "「咿――嗯――小雙的――龜頭――啊――磨蹭――翻――嗯嗚！」" 

# monologue
# JP: 声に甘さが混じってる。\nいつの間に、僕の腹にも蜜がべっとりしたたっている。
1681 = "聲音已經甜蜜了很多。我的肚子也沾上了蜜汁。" 

# monologue
# JP: 真闇姉も気持ちよくなってくれている。\nそれはただただ、圧倒的な幸福感だ。
1619 = "真闇姐一定也舒服起來了。感覺真是無比的幸福。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱい――おっぱいを、触っていいか？」
1159 = "「我可以――摸摸你的胸部嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「うん。うん。触って――んっ――\nおっぱいも、全部――全部、双ちゃんの好きに――して」
1055 = "「啊，嗯。摸摸吧――嗯――胸部也都――都任小雙玩吧――」" 

# monologue
# JP: （さすっ）
# 1827 = "（擦）" 

# 【真闇】
# display as 真闇
# JP: 「あふぅんっ」
1063 = "「嗚嗯」" 

# monologue
# JP: ゆっくりとしたペースに合わせ、\n手も乱暴には動かさない。
1724 = "配合著她緩慢的節奏，我的手也很輕柔。" 

# monologue
# JP: かすかに触れる――ただそれだけの指先で、\nこねこねくりくり、真闇姉の乳首を押してこねくる。
1430 = "只是碰一碰――用最溫柔的指尖，夾一夾、捏一捏，推一推真闇姐的乳頭。" 

# 【真闇】
# display as 真闇
# JP: 「や……あっ――気持ち、いい――の――っ、\nゆっくり――どろって――たまる、みたい、でっ――」
1011 = "「呀……啊――好舒服――慢慢地――軟軟的――有種積攢的感覺――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――だ――じわじわ、深く――沈殿してる」
1154 = "「我也――一點點地深下去――彷彿在沉澱」" 

# monologue
# JP: おっぱいではさみ舐めてもらったときの、\n駆け抜けるような快感じゃない。
1714 = "這不是乳交時那種奔流全身的快感。" 

# monologue
# JP: 遅効性の毒をとろとろと注ぎこまれているように、\n遅い動きとぬめりとが、僕の理性を腐らせていく。
1482 = "彷彿被一點點注入慢性毒藥一般，緩慢的動作、柔軟的觸感，讓我的理性越來越淡去。" 

# monologue
# JP: （ぬっ――るっ――るるっ――んっ――）
1832 = "（溜――溜――溜――嗯――）" 

# monologue
# JP: もう一度、入り口近くまで。\n真闇姉はまたほんのわずかに、角度を変える。
1420 = "又一次來到了入口處。真闇姐又稍微變了一下角度。" 

# monologue
# JP: （ぬっ――ぷっ――ず――――る――るっ――）
1831 = "（溜――唔――哧――溜――溜――）" 

# 【真闇】
# display as 真闇
# JP: 「やっ――これっ――深っ――あっ――奥っ――んっ」
1010 = "「呀――這個――好深――啊――裡面――嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――あっ――」
1033 = "「唔啊――啊――」" 

# monologue
# JP: （ぐいっ！）
1838 = "（鑽！）" 

# 【真闇】
# display as 真闇
# JP: 「んひゅっ！？」
1086 = "「嗯呀！？」" 

# monologue
# JP: もう少し、一番深くに押し入りたくて腰を跳ねれば、\n亀頭の先が、今までと感触が違う部分にキスされてっ――
1524 = "我振起腰，想插得更深一點、插到最深的地方，龜頭頂接觸到了一個感覺截然不同的部位――" 

# monologue
# JP: （きゅっ！　きゅんっ！　キュンんっ！）
1816 = "（啾！　啾！　啾嗯！）" 

# 【真闇】
# display as 真闇
# JP: 「んうぅっ――これっ――あたってっ――\n子宮っ――こつん、って――ふっ――あんっ！」
1091 = "「嗯嗚――這個――碰到了――子宮――頂到了――呼――啊嗯！」" 

# monologue
# JP: 勃起の全部が抱きつかれる。\n真闇姉の膣がべっとり張り付いてくる。
1685 = "肉棒全部被小穴懷抱。真闇姐的小穴黏在了肉棒上。" 

# monologue
# JP: そのままうねって、ひくついて、\n射精をしろと、甘く強烈に要求してくる。
1539 = "或是扭或是抖，用著它甜蜜又強烈的方式，求著我射精。" 

# 【真闇】
# display as 真闇
# JP: 「ひあっ――い、いくっ――双ちゃんっ――\nおねえちゃん――いっちゃうっ――子宮――キス、されて」
1027 = "「咿啊――去、去了――小雙――姐姐――要去了――子宮――親親它吧」" 

# monologue
# JP: （ぐりっ――グリュンっ！）
1840 = "（頂――吱溜！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉っ！」
# 1216 = "「真闇姐！」" 

# monologue
# JP: 真闇姉の腰がグラインドする。\n子宮の入り口であろう扉に僕の亀頭をなすりつけ。
1633 = "真闇姐扭起了腰。蹭了蹭貼在子宮入口上的龜頭。" 

# monologue
# JP: 射精する場所はここしかないと、\n肉に、脳髄に刻み込んでくる。
1705 = "讓我的身體和大腦都知道這裡就是射精的敵方。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん――双ちゃん――おねえちゃん、イクっ！」
1128 = "「小雙――小雙――姐姐要去了！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――僕もだ――真闇姉っ！」
1155 = "「我也是――我也要了――真闇姐！」" 

# monologue
# JP: （きゅううううううううっっ！！！）
# 1824 = "（壓！！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1062 = "「嗚啊！」" 

# monologue
# JP: （びゅくっ！　んびゅるっ！　びゅうっ！　びゅぶっ！）
1822 = "（噗嚕！　噗嚕！　噗！　咻噗！）" 

# 【真闇】
# display as 真闇
# JP: 「あっ――あっ――あひっ――ひゅっ――はっ――あっ、\nびゅって、びゅうって、精液――たたい、てっ――んっ」
1038 = "「啊――啊――啊咿――咿――哈――啊、射我、射我、精液――都射進來――嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ――あっ――あっ――ああっ――」
1036 = "「啊――啊――啊――啊啊――」" 

# 【真闇】
# display as 真闇
# JP: 「んんん～～～～～～～～っ！」
1092 = "「嗯嗯嗯～～～～～～～～！」" 

# monologue
# JP: 声にならない声を上げ、\n真闇姉が大きく大きく体をふるわせ――くたり、崩れる。
1515 = "我扯著不成調的嗓子喊著。真闇姐猛烈晃動著身體，然後啪嗒一下癱軟在地。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おっと」
1029 = "「哎呀」" 

# monologue
# JP: その柔らかでぬらつく体を抱きとめて。\nつながったまま――深くて熱いキスをする。
1527 = "我擁抱住她柔軟滑嫩的身體。維持著體位，給了她深沉而溫熱的吻。" 

# 【真闇】
# display as 真闇
# JP: 「ん……ちゅっ――んっ――そうひゃ――んっ――\nそうひゃ……らい……しゅきっ――んちゅっ」
1073 = "「嗯……啾――嗯――小雙――嗯――小雙……最……喜歡――嗯啾」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……ん――。僕も、大好きだ真闇姉」
826 = "「……嗯。我也最喜歡你了，真闇姐」" 

# monologue
# JP: 抱きしめたまま髪を撫ぜ。\nすべすべの首筋を、そして背中をゆっくり撫ぜる。
1521 = "我抱著她，摸了摸她的頭髮。摸著她光滑的脖頸，輕輕地撫摸她的後背。" 

# 【真闇】
# display as 真闇
# JP: 「ふや……んっ――きもち、い――」
1021 = "「呼……嗯――好舒服――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だな。とても心地いい」
1156 = "「我也覺得很舒服」" 

# monologue
# JP: ゆっくりと、じれったいほどの速度で重ねあった肌。\nそれが、はっきり教えてくれた。
1505 = "我們慢慢地躺在了一起。我才清楚地感受到。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「長期熟成は良いものだ。ゆっくりと深めなければ――\n僕たちは、決してこうなれなかった」
1267 = "「長期熟成真棒啊，如果不是慢慢地加深關係――我們不可能發展成這樣的」" 

# 【真闇】
# display as 真闇
# JP: 「ん。そーね。きっと」
# 1104 = "「嗯，是啊」" 

# monologue
# JP: もう一度、キス。\n甘えてもたれてくる真闇姉を、\nとにかくゆっくり、どこもここも無く撫でていく。
1504 = "我們再次接吻。真闇姐靠在了我身上，我便慢慢地撫摸著她。" 

# 【真闇】
# display as 真闇
# JP: 「だけん、ね？　双ちゃん。これからも、ずっと」
991 = "「你知道嗎？　小雙。以後永遠都要在一起」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。ずっと、ずうっと」
1106 = "「嗯，是啊，永遠永遠」" 

# monologue
# JP: 真闇姉と僕との、新しい家族の形を、関係を。\n焦ることなくゆっくりと、僕らは熟成させていこう。
1661 = "真闇姐與我形成的新家庭、新關係。我們不用焦急，慢慢地讓它熟成就好。" 

# 【真闇】
# display as 真闇
# JP: 「あっ」
# 1044 = "「啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、すまん。\n将来的には、子供が欲しいと考えたら、その」
1102 = "「嗯，抱歉。要是我說想生個孩子的話，不知道你怎麼想」" 

# 【真闇】
# display as 真闇
# JP: 「うん。作ろおねぇ」
1115 = "「好啊，一起造寶寶吧」" 

# monologue
# JP: 受け入れられて、嬉しくて。
1509 = "我很高興她願意接受。" 

# monologue
# JP: そして僕らはもう一度、\nゆっくりゆっくり、肌を重ねる。
1552 = "於是我們再一次慢慢地，貼在了一起。" 
