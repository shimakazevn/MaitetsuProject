1643 = "Chắc hẳn đã thấm thía đến tận xương tủy,\nnên giọng chị Mayami nghe nặng trĩu."
# 【真闇】
# display as 真闇
# JP: 「行き遅れとか、行かず後家とか、売れ残りとか……\nあげく、羊水が腐るのなんの言われよるけん」
1260 = "「Nào là ế chồng, bà cô già, hàng tồn kho……\nThậm chí còn bị nói là nước ối bị hỏng nữa cơ.」"
# 【双鉄H】
# display as 雙鐵
