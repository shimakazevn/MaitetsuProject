1428 = "口水沿著胸脯間緊密的那道縫淌下，滴落在了埋在那裡的、我的陰莖。" 

# monologue
# JP: 伝わってくる、真闇姉の口内の熱がぬらつきが、\n僕の勃起を激しく震わせ、腰が勝手に弾んでしまう。
1627 = "真闇姐嘴裡的熱度和黏滑讓我的陰莖激烈顫動，腰也不由自主地震動了起來。" 

# monologue
# JP: （ずりゅっ！！）
1794 = "（呲溜！！）" 

