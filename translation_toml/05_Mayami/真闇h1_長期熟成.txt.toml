1829 = "（是在……喝嗎――真闇姐――在喝我的精液嗎）" 

# monologue
# JP: おっぱいにみっちり固められ、\n先端を優しく咥えられ、吸われ――
1702 = "被胸部夾得緊緊的，頂端還被輕輕咬住，吮吸――" 

# monologue
# JP: （んびゅ！　びゅうっ！　びゅっ！　びゅるるっ！）
1803 = "（咻！　噗！　噗！　噗嚕！）" 

# monologue
# JP: 奔流のような射精をけれど、\n真闇姉は口を離さず、飲んでくれてる。
1673 = "精液汩汩流出，卻都被真闇姐不離不棄地含了下去。" 

# monologue
# JP: 右田の家を支えてる、誰より鋭敏な舌先で、\n僕の勃起の先端を、舐めて捕まえてくれている。
1546 = "支撐著右田家、比誰都要靈敏的舌頭，現在舔著我肉棒的頂端。" 

# 【真闇】
# display as 真闇
