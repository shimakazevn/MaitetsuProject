1653 = "Chỉ cần nghe một tiếng đó của chị Mayami thôi,\nsự khó chịu lại càng phình to thêm."
# 【双鉄H】
# display as 雙鐵
# JP: 「もっと、強く刺激して欲しい」
1167 = "「Tôi muốn được kích thích, mạnh hơn nữa.」"
# 【真闇】
# display as 真闇
# JP: 「強く……\nん――っと、ほんなら、ねぇ」
1140 = "「Mạnh hơn á……\nƯm――vậy thì, nè.」"
# monologue
# JP: （しゅるっ）
1787 = "（Tuột）"
# monologue
# JP: 真闇姉が、恥ずかしそうに服を下着を、\n脱ぎ捨てて床へと落としてく。
1658 = "Chị Mayami ngượng ngùng cởi bỏ quần áo và đồ lót,\nrồi thả rơi xuống sàn."
# 【双鉄H】
# display as 雙鐵
# JP: （おっぱい、だ――）
1830 = "（Là ngực――）"
# monologue
# JP: 真闇姉のおっぱい――引き取られてすぐのころ、\n一度だけ一緒にお風呂に入って……
1647 = "Bộ ngực của chị Mayami――hồi mới được nhận nuôi,\nchỉ có một lần duy nhất chúng tôi tắm chung……"
# 【双鉄H】
# display as 雙鐵
# JP: （あの頃から大きくて――恥ずかしくて一緒に風呂に\n入れなくなってしまったのだが……）
1837 = "（Từ hồi đó đã lớn rồi――Vì xấu hổ nên\ntôi không dám tắm chung nữa……）"
# monologue
# JP: これほどまでに大きく育つとは思わなかった。\n大きく、いかにも柔らかそうで、汗でしっとり濡れている。
1495 = "Không ngờ lại phát triển lớn đến mức này.\nTo lớn, trông có vẻ rất mềm mại, và đang ướt đẫm mồ hôi."
# 【真闇】
# display as 真闇
# JP: 「あん、ね？　双ちゃんの、おちんちんを――\nだから、おねえちゃんのおっぱいに――」
1052 = "「A, nè? Chim của Sou-chan――\nVậy nên, vào ngực của người chị này――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1085 = "「嗯」" 
# monologue
# JP: （むりゅんっ！！！！）
1808 = "（Trượt!!!!）"
# 【真闇】
# display as 真闇
# JP: 「あっ――いきなりっ――ん――熱っ――ふっ」
1034 = "「A――Đột nhiên――ưm――Nóng quá――phư.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「な――んだ――これ、はっ――」
1249 = "「Cái――gì――thế này――」"
# monologue
# JP: 僕の知ってる、肌じゃない。\n両側から手で、押さえつけられてるせいなのか――
1716 = "Đây không phải làn da mà tôi biết.\nCó phải vì bị hai tay ép chặt từ hai bên không――"
# monologue
# JP: 真闇姉の胸の合間は、もっちりしていてすべすべで、\n柔らかなのにみっちり詰まって、僕の勃起を刺激する。
1662 = "Khe ngực của chị Mayami mềm mại, trơn láng,\ntuy mềm nhưng lại ép sát chặt chẽ, kích thích sự cương cứng của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「肌触り……これ……\n気持ち――よすぎ、るっ――」
1225 = "「Cảm giác khi chạm vào……thế này……\nSướng――quá đi mất――」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら……良かった――んっ――肌、は……普段……日に、あたらんけん――自信、ある、と――あ、んっ！」
1256 = "「Vậy thì……tốt quá――ưm――Da dẻ, thì……bình thường……không phơi nắng――Nên chị, rất tự tin, đó――a, ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……この肌は、絹糸なんだ）
1810 = "（A a……Làn da này, hệt như sợi lụa vậy.）"
# monologue
# JP: 最高の絹糸を取り出すために、\n最高の物だけ食べて、文字通り箱入りで育つお蚕。
1564 = "Để lấy được sợi lụa tốt nhất,\ncon tằm chỉ ăn những thứ tốt nhất, và được nuôi dưỡng trong hộp theo đúng nghĩa đen."
# monologue
# JP: 真闇姉の肌もおっぱいも何もかも、\nそれと同じく、傷ひとつなく、大事に大事に育ってる。
1645 = "Làn da, bộ ngực, và tất cả mọi thứ của chị Mayami,\ncũng giống như vậy, không một vết xước, được chăm sóc và nuôi dưỡng vô cùng cẩn thận."
# 【双鉄H】
# display as 雙鐵
# JP: （これほど上質な肌を……僕は、勃起で――\nにじみ出る汁で、穢してる）
1835 = "（Làn da chất lượng cao đến nhường này……Tôi lại đang dùng dương vật――\nvà những giọt dịch rỉ ra, để làm vấy bẩn nó.）"
# monologue
# JP: それが嬉しい。
1466 = "Điều đó khiến tôi sung sướng."
# monologue
# JP: 僕の熱を、匂いを、体液を、\nもっと濃く深く、真闇姉へと滲ませたくなる。
1510 = "Tôi muốn hơi nóng, mùi hương, và thể dịch của mình,\nthấm sâu và đậm đặc hơn nữa vào người chị Mayami."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……よだれ――よだれ、を……\n僕の、先端に……垂らして、くれる――か？」
1208 = "「Chị Mayami……nước bọt――nước bọt, á……\nChị có thể……nhỏ xuống, phần đỉnh của tôi――được không?」"
# 【真闇】
# display as 真闇
# JP: 「んっ……よだれ……ね？――\nん～～っ――くちゅっ、くちゅっ、くちゅっ」
1069 = "「Ưm……nước bọt……hả?――\nƯm~~――chu chu chu.」"
# monologue
# JP: 音を立てながら口をもごもごうごかして、\n真闇姉はその口内へとよだれをためる。
1464 = "Chị Mayami nhóp nhép miệng tạo ra âm thanh,\nrồi tích tụ nước bọt trong khoang miệng."
# monologue
# JP: そしてあかんべぇをするように、\n胸の谷間へと舌を伸ばして――
1566 = "Và rồi như đang làm mặt xấu,\nchị thè lưỡi về phía khe ngực――"
# 【真闇】
# display as 真闇
# JP: 「んっ……」
# 1068 = "「嗯……」" 
# monologue
# JP: （とろおおおおおおおおおっ）
1833 = "（Nhỏ tong tỏng）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うっ――」
1031 = "「Ư――」"
# monologue
# JP: 密着している谷間のわずかな隙をつたって、\nそこに埋もれる僕の勃起によだれが触れる。
1428 = "Men theo khe hở nhỏ xíu giữa hai bầu ngực đang ép chặt,\nnước bọt chạm vào dương vật đang chôn vùi ở đó của tôi."
# monologue
# JP: 伝わってくる、真闇姉の口内の熱がぬらつきが、\n僕の勃起を激しく震わせ、腰が勝手に弾んでしまう。
1627 = "Hơi nóng và sự trơn ướt từ trong miệng chị Mayami truyền đến,\nkhiến dương vật của tôi run lên dữ dội, và hông tôi tự động nảy lên."
# monologue
# JP: （ずりゅっ！！）
1794 = "（Trượt!!）"
# 【真闇】
# display as 真闇
# JP: 「きゃっ！？」
1015 = "「Kya!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁうっ！？」
1049 = "「Au!?」"
# monologue
# JP: なんだ――今のは――\n先端に、濡れたやわらかな感触が――
1404 = "Gì thế――vừa rồi là――\nPhần đỉnh có cảm giác ướt át, mềm mại――"
# 【真闇】
# display as 真闇
# JP: 「……おねえちゃん、双ちゃんのおちんちんにも、\nキス……しちゃった」
828 = "「……Chị vừa, hôn lên chim của Sou-chan……\nmất rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「唇――そうか、今のは……」
1109 = "「Đôi môi――Ra vậy, vừa rồi là……」"
# 【真闇】
# display as 真闇
# JP: 「あ……\n双ちゃん、今の良かったと？」
1043 = "「A……\nSou-chan, lúc nãy có thích không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん。何がおきたかわからないほど、気持よかった」
1084 = "「Ừ. Sướng đến mức tôi chẳng biết chuyện gì vừa xảy ra nữa.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら。ねぇ？」
1178 = "「Vậy thì. Nè?」"
# monologue
# JP: （ぺろっ）
1790 = "（Liếm nhẹ）"
# monologue
# JP: 上目づかいで僕を見ながら、\n真闇姉は舌先をわずかに覗かせる。
1454 = "Vừa ngước mắt lên nhìn tôi,\nchị Mayami vừa hé đầu lưỡi ra một chút."
# 【真闇】
# display as 真闇
# JP: 「良かとよ？　おねえちゃんのお胸とおくちで、\nもっともーっと、気持ようなって」
1142 = "「Tuyệt lắm đúng không? Bằng ngực và miệng của chị,\nem hãy tận hưởng cảm giác sướng hơn, hơn nữa đi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉っ！」
1216 = "「Chị Mayami!」"
# 【真闇】
# display as 真闇
# JP: 「ひゃっ！！？」
1013 = "「Hya!!?」"
# monologue
# JP: （ずりゅんっ！　ぐいっ！　ぐにゅっ！　むにゅんっ！）
1797 = "（Trượt! Ép sát! Trơn tuột! Mềm nhũn!）"
# 【真闇】
# display as 真闇
# JP: 「んっ！　んぷ――ちゅ――んっ、ちゅる――ちゅむっ」
1094 = "「Ưm! Ưm――chụt――ưm, chụt――chụt.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅぁっ！」
1062 = "「Ua!」"
# monologue
# JP: 猛然と腰を動かせば、一瞬だけは戸惑って。\nけれどもすぐに真闇姉は、僕のリズムを掴んでくれる。
1533 = "Tôi bắt đầu đẩy hông dữ dội, khiến chị ấy bối rối trong thoáng chốc.\nNhưng ngay lập tức, chị Mayami đã bắt kịp nhịp độ của tôi."
# monologue
# JP: （しにゅっ！　むりゅっ！　むいっ！　むりゅんっ！）
1826 = "（Ép! Trượt! Cọ! Mềm nhũn!）"
# 【真闇】
# display as 真闇
# JP: 「はぷっ――ンッ――れるっ――ちゅうっ――れろんっ」
1048 = "「Hapu――ưm――rột――chu――rột.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……あっ――」
1047 = "「A a……a――」"
# monologue
# JP: 真闇姉のおっぱいはあまりに大きくて、\n僕の勃起の長さでは、先端だけしか突き出ていかない。
1648 = "Bộ ngực của chị Mayami quá lớn,\nvới độ dài dương vật của tôi, chỉ có phần đỉnh là nhô ra được."
# monologue
# JP: 突き出して行く瞬間を、真闇姉の口と舌とは待ち構え、\n吸いつき、舐めて、ついばみ、ねぶって――
1734 = "Chờ đón khoảnh khắc nó nhô ra, miệng và lưỡi của chị Mayami đã trực sẵn,\nmút lấy, liếm láp, cắn nhẹ, ngậm lấy――"
# 【真闇】
# display as 真闇
# JP: 「ちゅるるっ――ちゅっ――れりゅっ――んちゅうっ」
1058 = "「Chụt chụt――chụt――rột――ưm chụt.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ！　あっ！　真闇姉っ――真闇姉っ！！」
1053 = "「A! A! Chị Mayami――Chị Mayami!!」"
# monologue
# JP: 舌の動きが、吸い付く口が、こぼれるよだれが、\n押し付けてくるおっぱいが、僕の頭を真っ白にする。
1693 = "Chuyển động của lưỡi, khuôn miệng mút mát, dòng nước bọt tràn ra,\nbộ ngực ép sát vào, tất cả khiến đầu óc tôi trở nên trống rỗng."
# monologue
# JP: たまがぶわりと膨らむようで、\n猛烈すぎる圧力が、尿道をどっと逆流してくる。
1668 = "Hai hòn bi như sưng phồng lên,\náp lực quá đỗi mãnh liệt trào ngược ồ ạt qua niệu đạo."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉――出て、しまうっ――これっ――」
1206 = "「Chị Mayami――Tôi ra, mất――thế này thì――」"
# monologue
# JP: 胸を外してもらわなければ、綺麗な顔を汚してしまう。
1372 = "Nếu không rút khỏi ngực chị ấy, tôi sẽ làm bẩn khuôn mặt xinh đẹp đó mất."
# monologue
# JP: そうしたくって、したくなくって、\n焦りで言葉は、言葉にならない。
1400 = "Vừa muốn làm vậy, lại vừa không muốn,\nsự nôn nóng khiến tôi nói chẳng thành lời."
# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱいっ――早くっっ！」
1229 = "「Ngực――Mau lên!」"
# 【真闇】
# display as 真闇
# JP: 「良かとよ？　双ちゃん」
1117 = "「Được mà? Sou-chan.」"
# monologue
# JP: （きゅううううううううっ！！！）
1824 = "（Ép chặt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「なっ！？」
985 = "「Cái!?」"
# 【真闇】
# display as 真闇
# JP: 「ぱくっ！」
1113 = "「Ngoạm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んあっっ！！？」
1090 = "「Ưm a!!?」"
# monologue
# JP: （びゅぶっ！　どびゅっ！　びゅるるつ！　びゅぶっ！）
1801 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあっ――あっ――あっ――あっ――」
1060 = "「Ua――a――a――a――」"
# 【真闇】
# display as 真闇
# JP: 「んぶっ！？　んっ――ごくっ――ぷえっ――あっ――\nんっ――じゅるっ――ごくっ――ごくんっ――ごくっ」
1089 = "「Ưm!? Ưm――ực――phuha――a――\nưm――rột――ực――ực――ực.」"
# 【双鉄H】
# display as 雙鐵
# JP: （飲ん……でる、のか――真闇姉が――僕の、精液を）
1829 = "（Đang……uống sao――Chị Mayami――tinh dịch, của tôi.）"
# monologue
# JP: おっぱいにみっちり固められ、\n先端を優しく咥えられ、吸われ――
1702 = "Bị kẹp chặt giữa hai bầu ngực,\nphần đỉnh được ngậm lấy dịu dàng, và mút mát――"
# monologue
# JP: （んびゅ！　びゅうっ！　びゅっ！　びゅるるっ！）
1803 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 奔流のような射精をけれど、\n真闇姉は口を離さず、飲んでくれてる。
1673 = "Dù tinh dịch tuôn trào như dòng thác,\nnhưng chị Mayami vẫn không buông miệng ra mà nuốt lấy tất cả."
# monologue
# JP: 右田の家を支えてる、誰より鋭敏な舌先で、\n僕の勃起の先端を、舐めて捕まえてくれている。
1546 = "Bằng đầu lưỡi nhạy bén hơn bất kỳ ai, thứ đã chống đỡ cho nhà Migita,\nchị liếm láp và bắt trọn lấy phần đỉnh dương vật của tôi."
# 【真闇】
# display as 真闇
# JP: 「ん――ごくっ――ごくっ――ん……あ……ぷはっ――\nきゃっ！？」
1064 = "「Ưm――ực――ực――ưm……a……phuha――\nkya!?」"
# monologue
# JP: （びゅるんっ！）
1823 = "（Phụt!）"
# monologue
# JP: 唇を離されたその快感で、更にと溢れてしまった精が、\n真闇姉の顔を汚してしまう。
1731 = "Khoái cảm khi đôi môi rời đi khiến tinh dịch lại trào ra thêm,\nlàm vấy bẩn khuôn mặt chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「あっ……」
1039 = "「A……」"
# monologue
# JP: 胸の谷間へと垂れ滴ったその白濁を――
1384 = "Dòng chất lỏng đục ngầu nhỏ giọt xuống khe ngực ấy――"
# 【真闇】
# display as 真闇
# JP: 「んっ……じゅるんっ――こくっ」
1075 = "「Ưm……rột――ực.」"
# monologue
# JP: 真闇姉は、舌を伸ばして掬い啜って、\n余さず喉へと、収めてくれる。
1625 = "Chị Mayami vươn lưỡi ra hứng lấy và húp trọn,\nnuốt gọn gàng xuống cổ họng không sót một giọt nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉――気持ちよかった――\n気持ち、よかった」
1205 = "「Chị Mayami――sướng quá――\nthật sự, rất sướng.」"
# monologue
# JP: それしか、言葉が出てこない。\nなにかに例えようもない、ただただ最高の快感だった。
1536 = "Tôi chỉ có thể thốt ra những lời như vậy.\nKhông gì có thể sánh bằng, đó đơn giản là khoái cảm tuyệt vời nhất."
# monologue
# JP: だけれど、だから――\n欲が膨らむ。
1382 = "Nhưng, cũng chính vì thế――\nDục vọng lại càng bùng lên."
# 【双鉄H】
# display as 雙鐵
# JP: 「今度は、真闇姉に……\n僕は、気持ちよくなってもらいたい」
1162 = "「Lần này, tôi muốn……\nlàm cho chị Mayami được sướng.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ねぇ？　双ちゃん」
1258 = "「Vậy thì, nè? Sou-chan.」"
# monologue
# JP: （とんっ）
1799 = "（Bịch）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うわっ！？」
1028 = "「Uwa!?」"
# monologue
# JP: 射精直後でがくがく落ち着かぬ腰を押されて、\nころりと容易く、畳の上に転がってしまう。
1507 = "Bị đẩy ngay lúc hông còn đang run rẩy sau khi xuất tinh,\ntôi dễ dàng ngã lăn ra chiếu tatami."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉、なにを――っ！？」
1218 = "「Chị Mayami, làm gì――!?」"
# 【真闇】
# display as 真闇
# JP: 「ふたりで一緒に――気持ちよぉ、なろ？」
976 = "「Hai ta cùng nhau――sướng nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ……う、む」
# 1041 = "「啊……嗯」" 
# monologue
# JP: パンツだけを足に絡ませて、\n裸の真闇姉が僕にまたがってくる。
1397 = "Chị Mayami trong tình trạng khỏa thân,\nchỉ còn vướng lại chiếc quần lót ở chân, leo lên người tôi."
# 【真闇】
# display as 真闇
# JP: 「ん……ごめんね双ちゃん、重くなかと？」
1082 = "「Ưm……xin lỗi nha Sou-chan, có nặng không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「重くない。むしろ、気持ちいい」
977 = "「Không nặng đâu. Ngược lại còn thấy sướng nữa.」"
# monologue
# JP: 勃起が股間に押しつぶされてる――\nただそれだけで、射精しそうに気持ちいい。
1686 = "Dương vật bị ép chặt vào giữa háng chị ấy――\nChỉ vậy thôi cũng đủ sướng đến mức muốn xuất tinh rồi."
# monologue
# JP: 真闇姉の体重が、みっちりと乗ってくる尻の熱さが、\n僕の肌から骨までに、心地よい負荷をかけて刺激してくる。
1656 = "Sức nặng của chị Mayami, hơi nóng từ cặp mông đang đè chặt lên người tôi,\ntạo ra một sức ép dễ chịu kích thích từ làn da cho đến tận xương tủy."
# 【真闇】
# display as 真闇
# JP: 「ほんなら。\nもおっと気持ちよぉなるために――ねぇ？」
1173 = "「Vậy thì.\nĐể sướng hơn nữaaaa――nè?」"
# monologue
# JP: （くぱあっ）
1795 = "（Tách ra）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ」
1044 = "「A.」"
# monologue
# JP: 真闇姉が、自分の股間に指をあて、\n女性器を大きく広げてくれる。
1631 = "Chị Mayami đưa ngón tay xuống háng,\nvà mở rộng âm hộ của mình ra."
# monologue
# JP: それだけでたれた雫がぴちょりと、\n僕のお腹を濡らし広がる。
1553 = "Chỉ vậy thôi mà những giọt dâm thủy đã nhỏ tong tỏng,\nlàm ướt đẫm cả bụng tôi."
# 【真闇】
# display as 真闇
# JP: 「見ゆるや？　双ちゃん。\nおねえちゃんの、おまんこ」
1186 = "「Thấy không? Sou-chan.\nCái bướm, của chị nè.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん――見える。真闇姉の、おまんこ、が」
1066 = "「Ừm――thấy rồi. Cái bướm, của chị Mayami.」"
# monologue
# JP: 下品だと思い込んでた四文字が、\nこれほど甘く響くものだと、産まれて初めて思い知る。
1498 = "Bốn chữ mà tôi từng cho là thô tục ấy,\nlần đầu tiên trong đời tôi mới nhận ra nó lại vang lên ngọt ngào đến thế."
# 【真闇】
# display as 真闇
# JP: 「ここ、ね？　ん――」
1137 = "「Chỗ này, nha? Ưm――」"
# monologue
# JP: こんこんと蜜の枠穴を、\n真闇姉は中指の先端で押し示す。
1636 = "Chị Mayami dùng đầu ngón giữa,\nchỉ vào cái lỗ đang tuôn trào mật ngọt."
# 【真闇】
# display as 真闇
# JP: 「この、膣の入り口――膣口に、\n双ちゃんのおちんちんば、挿れるけん」
1250 = "「Ở lối vào âm đạo này――ngay cửa mình,\nchim của Sou-chan, sẽ đút vào đây đó.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1085 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「おねえちゃん、[はじめて,1]処女やけんね。\nうまいことできるか、自信なかけど」
1122 = "「Chị, là trinh nữ mà.\nNên không tự tin là có thể làm tốt đâu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「出来るさ。僕も一緒なのだから」
1179 = "「Sẽ làm được thôi. Vì có tôi cùng làm mà.」"
# 【真闇】
# display as 真闇
# JP: 「ん。そーね」
1104 = "「Ưm. Đúng ha.」"
# monologue
# JP: （ずるんっ）
1827 = "（Trượt）"
# monologue
# JP: わずかに腰を持ち上げて、\n僕の勃起を、真闇姉の指が尻の下から引き出してくれる。
1459 = "Hơi nhấc hông lên một chút,\nngón tay chị Mayami kéo dương vật của tôi ra từ dưới mông chị."
# monologue
# JP: （くちゅりっ）
1796 = "（Chụt）"
# 【真闇】
# display as 真闇
# JP: 「あんっ！」
1050 = "「A ưm!」"
# monologue
# JP: その先端を、おまんこのピンクの肉に這わせれるように、\n真闇姉はゆっくりゆっくり、そろそろと腰を動かしていく。
1735 = "Để phần đỉnh trượt dọc theo lớp thịt hồng hào của âm hộ,\nchị Mayami chầm chậm, từ từ di chuyển hông."
# monologue
# JP: （ぬチッ――ぬるんっ）
1815 = "（Chu――trượt）"
# monologue
# JP: ぱくぱくひくつく膣口が、膣のまわりのピンクの肉が、\n僕の勃起に馴染もうと、甘えてすがりついてくる。
1363 = "Cửa âm đạo co bóp liên hồi, lớp thịt hồng hào quanh âm đạo,\nnhư đang làm nũng, bám chặt lấy dương vật tôi để làm quen."
# monologue
# JP: ただ、それだけで気持ちいい。\nおまんこの内側の肉さえも、真闇姉の肌触りは極上すぎる。
1386 = "Chỉ vậy thôi cũng đã thấy sướng rồi.\nNgay cả lớp thịt bên trong âm đạo, cảm giác chạm vào da thịt chị Mayami cũng quá đỗi tuyệt vời."
# 【真闇】
# display as 真闇
# JP: 「ん……おねえちゃんの、双ちゃんのための、\n長期熟成処女まんこ――」
1078 = "「Ưm……Cái bướm trinh nữ ủ lâu năm của chị,\ndành riêng cho Sou-chan――」"
# monologue
# JP: （ぬらっ――ぬる――んっ）
1804 = "（Trượt――trượt――ưm）"
# monologue
# JP: ようやく、くちりと。\n勃起の先端が、膣口のはざまに食い込まされる。
1675 = "Cuối cùng, một tiếng chụt vang lên.\nPhần đỉnh dương vật cắm phập vào giữa khe cửa mình."
# monologue
# JP: 動かないのか、動けないのか、\n真闇姉はそこで止まってしまう。
1370 = "Không biết là không nhúc nhích, hay không thể nhúc nhích,\nchị Mayami khựng lại ở đó."
# 【真闇】
# display as 真闇
# JP: 「どうか――双ちゃんのものに、してください」
1242 = "「Xin hãy――biến chị thành của Sou-chan đi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1085 = "「嗯」" 
# monologue
# JP: 真闇姉の腰に手をあてて、\nゆっくりと――真闇姉の体を引き寄せていく。
1531 = "Tôi đặt tay lên eo chị Mayami,\nvà từ từ――kéo cơ thể chị sát lại gần."
# 【真闇】
# display as 真闇
# JP: 「ん……あっ――入って、くるっ――んんっ――\n双、ちゃんの――おちん、ちん――ふあっ」
1071 = "「Ưm……a――đang vào, này――ưm ưm――\nchim, của――Sou, chan――phua.」"
# monologue
# JP: （みちっ――く、ちっ）
1793 = "（Mút――chu, chụt）"
# monologue
# JP: 真闇姉の膣の内側は、すべすべしながら、\nきっちりみっちり僕の先端に巻き付いてくる。
1655 = "Lớp thịt bên trong âm đạo chị Mayami tuy trơn nhẵn,\nnhưng lại quấn chặt lấy phần đỉnh của tôi không một khe hở."
# monologue
# JP: 超極上のびろうどが隙なく勃起に張り付いてきて、\nそのままそわそわ、かすかに震え、奥へ奥へと誘ってくる。
1483 = "Lớp nhung lụa hảo hạng nhất bám sát lấy dương vật,\ncứ thế râm ran, khẽ run rẩy, dụ dỗ tôi tiến sâu vào bên trong."
# 【双鉄H】
# display as 雙鐵
# JP: 「真、闇……姉っ……いいか？　\nもっと――もっと、奥まで」
1192 = "「Chị, Mayami……được chứ?\nSâu――sâu hơn nữa nhé.」"
# 【真闇】
# display as 真闇
# JP: 「ゆーたよ？　双ちゃんのものだって。\nおねえちゃんのおまんこも、おっぱいもおへそも、全部」
1151 = "「Chị nói rồi mà? Chị là của Sou-chan.\nCái bướm, bộ ngực, cả cái rốn của chị nữa, tất cả.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならっ！」
1259 = "「Vậy thì!」"
# monologue
# JP: そんなことを言われたらもう止まれない。\n腰と腰とを、全部一気に密着させてっ！
1462 = "Nghe những lời đó, tôi không thể dừng lại được nữa.\nTôi ép sát hông mình vào hông chị trong một nhịp!"
# monologue
# JP: （みちいいいいいいいいいっっ！！）
1792 = "（Phậpppppp!!）"
# 【真闇】
# display as 真闇
# JP: 「痛っ――～～～～～っ！！」
1181 = "「Đau――~~~~~!!」"
# monologue
# JP: 肉を割り入る、\n張り付くものを剥がす感覚。
1715 = "Cảm giác như xé toạc da thịt,\nbóc tách lớp màng bám chặt."
# monologue
# JP: 勃起の全部が強烈に擦り上げられて、\n呼吸が一瞬止められて、目の裏側が眩んでしまう。
1550 = "Toàn bộ dương vật bị cọ xát dữ dội,\nhơi thở ngưng bặt trong tích tắc, hoa mắt chóng mặt."
# 【双鉄H】
# display as 雙鐵
# JP: 「うぁ……はっ――あっ――」
1061 = "「Ua……ha――a――」"
# 【真闇】
# display as 真闇
# JP: 「ぜ、全部……そう、ちゃんっ……はいった、と？」
997 = "「T-Toàn bộ……Sou, chan……vào hết rồi, đúng không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
# 1085 = "「嗯」" 
# monologue
# JP: 出血、してる。\n接合部から、真っ赤な血が流れ出している。
1699 = "Đang chảy máu.\nTừ chỗ kết nối, máu đỏ tươi đang rỉ ra."
# monologue
# JP: 僕の勃起を飲み込んだ膣口はぴっちり伸びて広がって、\n串刺し――と、そんな言葉が脳裏によぎる。
1479 = "Cửa mình nuốt trọn dương vật của tôi căng ra, nong rộng,\nxiên qua――một từ như thế xẹt qua tâm trí tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉……血が」
1211 = "「Chị Mayami……máu kìa.」"
# 【真闇】
# display as 真闇
# JP: 「ん。証、とね。\nはじめてば、双ちゃんに捧げた、証」
1108 = "「Ừm. Là minh chứng đó.\nMinh chứng cho việc, chị đã dâng hiến lần đầu tiên cho Sou-chan.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「証の……血」
1234 = "「Máu……của minh chứng.」"
# 【真闇】
# display as 真闇
# JP: 「そ、双ちゃんっ！？」
1133 = "「S-Sou-chan!?」"
# monologue
# JP: それが自然なことな気がして、\n指先で血を掬い舐めとってみる。
1535 = "Cảm thấy đó là một việc rất tự nhiên,\ntôi dùng đầu ngón tay quệt lấy máu rồi liếm thử."
# 【双鉄H】
# display as 雙鐵
# JP: 「鉄の味がする――生温かいな」
1176 = "「Có vị của sắt――hơi âm ấm.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん」
1129 = "「Sou-chan.」"
# monologue
# JP: （きゅんっ）
1817 = "（Thắt lại）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1095 = "「Ưm!」"
# monologue
# JP: 真闇姉の膣が、絞るようにして蠢きうねる。
1639 = "Âm đạo của chị Mayami uốn éo, co thắt lại như đang vắt kiệt."
# 【真闇】
# display as 真闇
# JP: 「中っ……おねえちゃんの[なか,1]膣内、で……一緒に、\nんっ――気持ち、よぉ――なろ？」
1241 = "「Bên trong……trong âm đạo, của chị……cùng nhau,\nưm――sướng, nha?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇……姉っ――」
1190 = "「Chị……Mayami――」"
# monologue
# JP: ゆるゆると、ごく慎重に――\n怖がってでもいるかのように、真闇姉が腰を持ち上げる。
1497 = "Từ từ, hết sức cẩn thận――\nnhư thể đang e sợ điều gì, chị Mayami nhấc hông lên."
# 【真闇】
# display as 真闇
# JP: 「んっ――くっ――」
1065 = "「Ưm――ư――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う――ぁッ――」
1032 = "「Ư――a――」"
# monologue
# JP: （ぬる――――るっ――――るっ――）
1806 = "（Trượt――――tuột――――tuột――）"
# monologue
# JP: ナメクジが這い進むようなスローさが、\n否応なしに感覚を、勃起に集中させていく。
1736 = "Tốc độ chậm chạp như sên bò,\nkhiến mọi cảm giác bất giác đều dồn hết vào dương vật."
# monologue
# JP: これは――すごい。\n体が全部、裏返りそうに気持ちいい。
1717 = "Cảm giác này――thật tuyệt vời.\nSướng đến mức cả cơ thể như muốn lộn ngược lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉の、膣の……中……あっ――\nうねって―――ひだっ、これっ――くっ」
1214 = "「Bên trong……âm đạo, của chị Mayami……a――\nuốn lượn――nếp gấp này, là sao――ư.」"
# monologue
# JP: びろうどのよう。つるつるしてる。その直感は、\n動かされればなんとも浅いものだったと知る。
1387 = "Giống như nhung lụa. Trơn tuột. Trực giác ấy,\nchỉ khi chuyển động mới biết nó nông cạn đến nhường nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……な、これは――ひだが、\nまとわりつい、ては――はが、れてっ」
1119 = "「Tuyệt thật……cái này――những nếp gấp,\ncứ bám riết lấy, rồi lại――tuột ra.」"
# monologue
# JP: びろうどのような肉ヒダは、多重構造になっている。
1449 = "Lớp nếp gấp thịt như nhung lụa ấy, được cấu tạo thành nhiều tầng."
# monologue
# JP: ぴったりしてる感触が、動いてすれればめくれざわめき、\n勃起の先のくびれに張り付き、こすってくれる。
1676 = "Cảm giác ôm khít, mỗi khi cọ xát lại lật mở râm ran,\nbám chặt lấy rãnh quy đầu, chà xát không ngừng."
# 【真闇】
# display as 真闇
# JP: 「あ……ふっ――あっ」
1040 = "「A……phư――a.」"
# monologue
# JP: 勃起が膣から抜ける寸前、\nそこまで腰を持ち上げて――
1541 = "Ngay khoảnh khắc dương vật sắp tuột khỏi âm đạo,\nchị nhấc hông lên đến đó rồi――"
# monologue
# JP: （ぬろっ――ろっ――ろっ――）
1807 = "（Trượt――trượt――trượt――）"
# monologue
# JP: ――ゆっくり、ゆっくり。\n真闇姉の膣は再び、僕の勃起を飲み込んでいく。
817 = "――Chầm chậm, từ từ.\nÂm đạo chị Mayami lại một lần nữa, nuốt trọn lấy dương vật của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――ふっ――」
1059 = "「Ư――phư――」"
# monologue
# JP: おかしな声を出しそうになり、\n必死で鼻から息を抜く。
1526 = "Suýt chút nữa thì phát ra tiếng kỳ quặc,\ntôi cố kìm nén bằng cách thở hắt ra bằng mũi."
# monologue
# JP: 最初のときは、とにかく必死で突きこむだけで、\n味わうなどは、考える余裕もなかったが――
1364 = "Lần đầu tiên, tôi chỉ biết cắm đầu đâm vào,\nchẳng còn tâm trí đâu mà nghĩ đến chuyện tận hưởng――"
# 【真闇】
# display as 真闇
# JP: 「ん……双ちゃん――あっ――太っ――――んふっ」
1080 = "「Ưm……Sou-chan――a――to quá――――ưm phư.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「違う……真闇姉が――ここから――狭く――\nあっ――なって――いる、んだ――」
974 = "「Không phải……Là do chị Mayami――từ đoạn này――đang hẹp――\na――lại――đó――」"
# 【真闇】
# display as 真闇
# JP: 「ひ――んっ――双ちゃんの――亀頭――あっ――\nこすれ、て――めくれっ――んううっ！」
1025 = "「Hii――ưm――Quy đầu――của Sou-chan――a――\nđang cọ xát――lật lên――ưm ư!」"
# monologue
# JP: 声に甘さが混じってる。\nいつの間に、僕の腹にも蜜がべっとりしたたっている。
1681 = "Giọng nói đã nhuốm vị ngọt ngào.\nTừ lúc nào, bụng tôi cũng dính đầy mật ngọt rỉ xuống."
# monologue
# JP: 真闇姉も気持ちよくなってくれている。\nそれはただただ、圧倒的な幸福感だ。
1619 = "Chị Mayami cũng đang cảm thấy sướng.\nĐiều đó mang lại một cảm giác hạnh phúc ngập tràn."
# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱい――おっぱいを、触っていいか？」
1159 = "「Ngực――Tôi chạm vào ngực chị, được không?」"
# 【真闇】
# display as 真闇
# JP: 「うん。うん。触って――んっ――\nおっぱいも、全部――全部、双ちゃんの好きに――して」
1055 = "「Ừm. Ừm. Chạm đi――ưm――\nCả ngực, tất cả――tất cả, Sou-chan cứ làm gì mình thích――đi.」"
# monologue
# JP: （さすっ）
# 1827 = "（擦）" 
# 【真闇】
# display as 真闇
# JP: 「あふぅんっ」
1063 = "「Aphuun.」"
# monologue
# JP: ゆっくりとしたペースに合わせ、\n手も乱暴には動かさない。
1724 = "Nương theo nhịp điệu chậm rãi,\ntay tôi cũng không cử động thô bạo."
# monologue
# JP: かすかに触れる――ただそれだけの指先で、\nこねこねくりくり、真闇姉の乳首を押してこねくる。
1430 = "Chạm thật khẽ――chỉ bằng đầu ngón tay,\ntôi mân mê xoa nắn, ấn nhẹ vào nhũ hoa của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「や……あっ――気持ち、いい――の――っ、\nゆっくり――どろって――たまる、みたい、でっ――」
1011 = "「A……a――Sướng, quá――\ntừ từ――như đang――tích tụ lại, vậy――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――だ――じわじわ、深く――沈殿してる」
1154 = "「Tôi cũng――vậy――đang chầm chậm, lắng đọng――thật sâu.」"
# monologue
# JP: おっぱいではさみ舐めてもらったときの、\n駆け抜けるような快感じゃない。
1714 = "Không giống như khoái cảm vụt qua,\nkhi được kẹp giữa hai bầu ngực và liếm láp."
# monologue
# JP: 遅効性の毒をとろとろと注ぎこまれているように、\n遅い動きとぬめりとが、僕の理性を腐らせていく。
1482 = "Như bị rót thứ độc dược phát tác chậm,\nchuyển động từ từ và sự trơn trượt đang dần ăn mòn lý trí của tôi."
# monologue
# JP: （ぬっ――るっ――るるっ――んっ――）
1832 = "（Trượt――trượt――trượt――ưm――）"
# monologue
# JP: もう一度、入り口近くまで。\n真闇姉はまたほんのわずかに、角度を変える。
1420 = "Một lần nữa, lại gần cửa mình.\nChị Mayami lại hơi thay đổi góc độ một chút."
# monologue
# JP: （ぬっ――ぷっ――ず――――る――るっ――）
1831 = "（Trượt――phập――tuột――――tuột――tuột――）"
# 【真闇】
# display as 真闇
# JP: 「やっ――これっ――深っ――あっ――奥っ――んっ」
1010 = "「A――cái này――sâu quá――a――bên trong――ưm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――あっ――」
1033 = "「Kua――a――」"
# monologue
# JP: （ぐいっ！）
1838 = "（Ép mạnh!）"
# 【真闇】
# display as 真闇
# JP: 「んひゅっ！？」
1086 = "「Ưm hyu!?」"
# monologue
# JP: もう少し、一番深くに押し入りたくて腰を跳ねれば、\n亀頭の先が、今までと感触が違う部分にキスされてっ――
1524 = "Muốn đâm sâu hơn chút nữa vào tận cùng, tôi nảy hông lên,\nđỉnh quy đầu liền hôn lấy một bộ phận có xúc cảm khác hẳn từ trước đến giờ――"
# monologue
# JP: （きゅっ！　きゅんっ！　キュンんっ！）
1816 = "（Thắt lại! Siết chặt! Co bóp!）"
# 【真闇】
# display as 真闇
# JP: 「んうぅっ――これっ――あたってっ――\n子宮っ――こつん、って――ふっ――あんっ！」
1091 = "「Ưm ư――cái này――chạm vào rồi――\nTử cung――cộc một cái――phư――a ưm!」"
# monologue
# JP: 勃起の全部が抱きつかれる。\n真闇姉の膣がべっとり張り付いてくる。
1685 = "Toàn bộ dương vật bị ôm chặt lấy.\nÂm đạo của chị Mayami bám rịt không buông."
# monologue
# JP: そのままうねって、ひくついて、\n射精をしろと、甘く強烈に要求してくる。
1539 = "Cứ thế uốn éo, co giật,\nđòi hỏi tôi xuất tinh một cách mãnh liệt và ngọt ngào."
# 【真闇】
# display as 真闇
# JP: 「ひあっ――い、いくっ――双ちゃんっ――\nおねえちゃん――いっちゃうっ――子宮――キス、されて」
1027 = "「Hia――r-ra mất――Sou-chan――\nChị――ra mất――tử cung――bị hôn rồi.」"
# monologue
# JP: （ぐりっ――グリュンっ！）
1840 = "（Ngoáy――Trượt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「真闇姉っ！」
# 1216 = "「真闇姐！」" 
# monologue
# JP: 真闇姉の腰がグラインドする。\n子宮の入り口であろう扉に僕の亀頭をなすりつけ。
1633 = "Hông chị Mayami bắt đầu uốn éo.\nChà xát quy đầu của tôi vào cánh cửa dường như là lối vào tử cung."
# monologue
# JP: 射精する場所はここしかないと、\n肉に、脳髄に刻み込んでくる。
1705 = "Khắc sâu vào da thịt, vào tâm trí tôi rằng,\nđây là nơi duy nhất để xuất tinh."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん――双ちゃん――おねえちゃん、イクっ！」
1128 = "「Sou-chan――Sou-chan――chị, ra mất!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――僕もだ――真闇姉っ！」
1155 = "「Tôi cũng――tôi cũng vậy――chị Mayami!」"
# monologue
# JP: （きゅううううううううっっ！！！）
# 1824 = "（壓！！！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1062 = "「嗚啊！」" 
# monologue
# JP: （びゅくっ！　んびゅるっ！　びゅうっ！　びゅぶっ！）
1822 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【真闇】
# display as 真闇
# JP: 「あっ――あっ――あひっ――ひゅっ――はっ――あっ、\nびゅって、びゅうって、精液――たたい、てっ――んっ」
1038 = "「A――a――ahi――hyu――ha――a,\nphụt đi, bắn đi, tinh dịch――đập vào đi――ưm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――あっ――あっ――ああっ――」
1036 = "「A――a――a――aa――」"
# 【真闇】
# display as 真闇
# JP: 「んんん～～～～～～～～っ！」
1092 = "「Ưm ưm ưm~~~~~~~~!」"
# monologue
# JP: 声にならない声を上げ、\n真闇姉が大きく大きく体をふるわせ――くたり、崩れる。
1515 = "Cất lên tiếng kêu không thành lời,\ncơ thể chị Mayami run lên bần bật――rồi rũ rượi, đổ gục xuống."
# 【双鉄H】
# display as 雙鐵
# JP: 「おっと」
1029 = "「Úi.」"
# monologue
# JP: その柔らかでぬらつく体を抱きとめて。\nつながったまま――深くて熱いキスをする。
1527 = "Tôi ôm lấy cơ thể mềm mại và ướt đẫm ấy.\nVẫn trong tư thế kết nối――tôi trao cho chị một nụ hôn thật sâu và nóng bỏng."
# 【真闇】
# display as 真闇
# JP: 「ん……ちゅっ――んっ――そうひゃ――んっ――\nそうひゃ……らい……しゅきっ――んちゅっ」
1073 = "「Ưm……chụt――ưm――Sou-chan――ưm――\nSou-chan……rất……thích――ưm chụt.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……ん――。僕も、大好きだ真闇姉」
826 = "「……Ưm――. Tôi cũng vậy, rất thích chị Mayami.」"
# monologue
# JP: 抱きしめたまま髪を撫ぜ。\nすべすべの首筋を、そして背中をゆっくり撫ぜる。
1521 = "Vẫn ôm chặt lấy chị, tôi vuốt ve mái tóc.\nTừ từ mơn trớn vùng gáy trơn láng, rồi đến tấm lưng trần."
# 【真闇】
# display as 真闇
# JP: 「ふや……んっ――きもち、い――」
1021 = "「Phu……ưm――sướng, quá――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だな。とても心地いい」
1156 = "「Đúng vậy. Vô cùng dễ chịu.」"
# monologue
# JP: ゆっくりと、じれったいほどの速度で重ねあった肌。\nそれが、はっきり教えてくれた。
1505 = "Làn da áp vào nhau chậm rãi đến mức sốt ruột.\nĐiều đó, đã cho tôi biết rõ."
# 【双鉄H】
# display as 雙鐵
# JP: 「長期熟成は良いものだ。ゆっくりと深めなければ――\n僕たちは、決してこうなれなかった」
1267 = "「Quá trình ủ lâu năm đúng là tuyệt thật. Nếu không từ từ khắc sâu――\nchúng ta, chắc chắn đã không thể được như thế này.」"
# 【真闇】
# display as 真闇
# JP: 「ん。そーね。きっと」
# 1104 = "「嗯，是啊」" 
# monologue
# JP: もう一度、キス。\n甘えてもたれてくる真闇姉を、\nとにかくゆっくり、どこもここも無く撫でていく。
1504 = "Một nụ hôn nữa.\nChị Mayami làm nũng ngả đầu vào tôi,\ntôi cứ thế chậm rãi vuốt ve chị, chẳng sót chỗ nào."
# 【真闇】
# display as 真闇
# JP: 「だけん、ね？　双ちゃん。これからも、ずっと」
991 = "「Nên là, nhé? Sou-chan. Từ nay về sau, mãi mãi nhé.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな。ずっと、ずうっと」
1106 = "「Ừ, đúng vậy. Mãi mãi, mãi mãi.」"
# monologue
# JP: 真闇姉と僕との、新しい家族の形を、関係を。\n焦ることなくゆっくりと、僕らは熟成させていこう。
1661 = "Hình thái gia đình mới, mối quan hệ mới giữa chị Mayami và tôi.\nKhông cần vội vã, chúng tôi sẽ từ từ để nó chín muồi."
# 【真闇】
# display as 真闇
# JP: 「あっ」
# 1044 = "「啊」" 
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、すまん。\n将来的には、子供が欲しいと考えたら、その」
1102 = "「À, xin lỗi.\nNếu nghĩ đến chuyện muốn có con trong tương lai, thì」"
# 【真闇】
# display as 真闇
# JP: 「うん。作ろおねぇ」
1115 = "「Ừm. Cùng làm nhé.」"
# monologue
# JP: 受け入れられて、嬉しくて。
1509 = "Được chị chấp nhận, tôi thấy thật vui."
# monologue
# JP: そして僕らはもう一度、\nゆっくりゆっくり、肌を重ねる。
1552 = "Và rồi chúng tôi lại một lần nữa,\nchầm chậm, từ từ, hòa quyện vào nhau."
