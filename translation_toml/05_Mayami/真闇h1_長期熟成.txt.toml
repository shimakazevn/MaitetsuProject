1417 = "Hóa ra nụ hôn lại đơn giản đến thế sao.\nLại có thể diễn ra tự nhiên đến thế sao."
# monologue
# JP: 安堵は、すぐさま欲に繋がる。\n真闇姉の唇を、もっともっとと味わいたくなる。
1469 = "Sự an tâm ngay lập tức chuyển hóa thành ham muốn.\nEm muốn được thưởng thức đôi môi của chị Mayami nhiều hơn, nhiều hơn nữa."
# 【真闇】
# display as 真闇
