1099 = "「Ừm. Em cứ mải nghĩ xem đêm nay, liệu có phải là phần tiếp theo của lúc ban ngày――\nhay không, thế nên……」"
# monologue
# JP: （パタパタパタパタっ）
1812 = "（Phạch phạch phạch phạch）"
# monologue
