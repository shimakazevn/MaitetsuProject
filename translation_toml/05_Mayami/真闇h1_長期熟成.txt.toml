1161 = "「Em,\nrất vui vì chị Mayami vẫn luôn giữ gìn bản thân trọn vẹn cho đến tận bây giờ.」"
# monologue
# JP: 真闇姉だって暑いのに、膝枕してずうっと僕だけ、\n優しく仰ぎ続けてくれた。
1660 = "Chị Mayami cũng đang rất nóng, vậy mà vẫn cho em gối đùi,\nvà dịu dàng quạt cho em suốt."
# monologue
# JP: 後ろ頭にこもった熱が、その下からただよう甘い匂いが、\nあれほど悩んでいたことを、とても単純にしてくれる。
1487 = "Hơi nóng tích tụ sau gáy, cùng mùi hương ngọt ngào thoang thoảng từ bên dưới,\nđã khiến những điều em từng phiền não trở nên vô cùng đơn giản."
# 【双鉄H】
# display as 雙鐵
# JP: 「だから僕は。真闇姉を味わってみたい」
1168 = "「Chính vì thế. Em muốn được thưởng thức chị Mayami.」"
# 【真闇】
# display as 真闇
