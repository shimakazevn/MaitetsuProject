1015 = "「呀！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぁうっ！？」
1049 = "「啊嗚！？」" 

# monologue
# JP: なんだ――今のは――\n先端に、濡れたやわらかな感触が――
1404 = "剛剛――是什麼啊――頂端有濕潤柔軟的感觸――" 

# 【真闇】
# display as 真闇
# JP: 「……おねえちゃん、双ちゃんのおちんちんにも、\nキス……しちゃった」
828 = "「……姐姐我剛才親了親小雙的……小雞雞」" 

# 【双鉄H】
