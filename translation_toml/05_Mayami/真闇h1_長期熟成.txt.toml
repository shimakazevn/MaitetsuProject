984 = "「Lớn chừng này tuổi gì chứ……\nChị chưa đến tuổi để nói những lời như vậy đâu.」"
# 【真闇】
# display as 真闇
# JP: 「慰めはいらんよ、双ちゃん。\n二十五過ぎた独身女は、なに言われても我慢やもん」
1001 = "「Không cần an ủi chị đâu, Sou-chan.\nPhụ nữ độc thân quá tuổi hai mươi lăm thì bị nói gì cũng phải chịu thôi.」"
# 【双鉄H】
# display as 雙鐵
