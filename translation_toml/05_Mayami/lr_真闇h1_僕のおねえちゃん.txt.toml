# display as 雙鐵
# JP: 「っ！！！！！」
1701 = "「!!!!!」"
# 【真闇】
# display as 真闇
# JP: 「きゃっ」
1405 = "「Á.」"
# monologue
# JP: 見た瞬間に、やりかけていた仕事の全てが吹き飛ばされる。\n下着と聞いたが、おっぱいもおまんこも見えてい――っ！
1915 = "Khoảnh khắc nhìn thấy, toàn bộ công việc đang làm dở đều bay biến sạch. Nghe nói là đồ lót, nhưng mà ngực và cả chỗ đó đều phơi bày hết ra rồi kìa——!"
# monologue
# JP: 脱ぎ捨てている、押し倒している、伸し掛かっている。\nそれこそが真闇姉の望みなのだと、確信するゆえ。
1990 = "Vứt bỏ quần áo, đẩy ngã, đè lên. Bởi vì tôi chắc chắn rằng, đó chính là điều chị Mayami mong muốn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、女性のファッションには――\nましてや下着の流行などには、詳しくないのだが」
1593 = "「Em thì, không rành về thời trang của phụ nữ—— huống hồ là xu hướng đồ lót.」"
# monologue
# JP: （くにっ）
2158 = "（Nắn）"
# 【真闇】
# display as 真闇
# JP: 「ふぁんっ」
1187 = "「Fan」"
# monologue
# JP: 部屋に入ってきたその瞬間から勃起していた乳首を押せば、\n真闇姉は発情しきったメス猫のような声を――ああ。
2029 = "Khi tôi ấn vào núm vú đã cương cứng từ khoảnh khắc bước vào phòng, chị Mayami phát ra tiếng kêu như một con mèo cái đang động dục——a."
# 【双鉄】
# display as 雙鐵
# JP: 「……この下着のモチーフは猫。黒猫か」
1186 = "「......Chủ đề của bộ đồ lót này là mèo. Mèo đen à.」"
# 【真闇】
# display as 真闇
# JP: 「…………ゃ――に――にゃぁ」
1173 = "「............ya——ni——nyaa」"
# 【双鉄】
# display as 雙鐵
