# 【真闇】
# display as 真闇
# JP: 「そんなん……」
1682 = "「Chuyện đó......」"
# monologue
# JP: ためらって大きく吐く息。\nそれさえおっぱいの皮膚を通じて僕の勃起を緩やかに擦る。
1818 = "Một tiếng thở dài ngập ngừng. Thậm chí cả điều đó cũng truyền qua lớp da ngực, nhẹ nhàng cọ xát vào dương vật tôi."
# 【真闇】
# display as 真闇
# JP: 「そんなん、おねえちゃん、言いたくなかとよ。\n言わせたみたいになっちゃたら……余計にさみしいけん」
1695 = "「Chuyện đó, chị không muốn nói đâu. Nếu giống như bắt ép em nói thì......càng thấy tủi thân hơn thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもそうか。では――ううむ――\nヒント……せめてなにか、ヒントを僕に与えてほしい」
1686 = "「Cũng đúng nhỉ. Vậy thì——ưm—— Gợi ý......ít nhất hãy cho em một chút gợi ý đi.」"
# 【真闇】
# display as 真闇
# JP: 「ヒン……ト」
1614 = "「Gợi......ý.」"
# monologue
# JP: 真闇姉の瞳が揺れる。\n落ち着く先を求めるように、ふらふらと泳ぎ回って――
1973 = "Ánh mắt chị Mayami dao động. Như đang tìm kiếm nơi dừng chân, ánh mắt chị ấy cứ đảo quanh——"
# 【真闇】
# display as 真闇
# JP: 「……」
1175 = "「......」"
