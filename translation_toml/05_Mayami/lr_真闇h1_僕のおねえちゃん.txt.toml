1527 = "「Nfufu. Chuyện gì cơ? Chị, hoàn toàn không hiểu gì cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1455 = "「Ưm.」"
# monologue
# JP: なるほど、これ以上ここに触れるのはヤボの極みか。\nならば、触れるべきは当然に――っ！？
1797 = "Ra vậy, nếu cứ tiếp tục nhắc đến chuyện này thì đúng là quá kém tinh tế. Nếu vậy, nơi nên chạm vào tất nhiên là——!?"
# monologue
# JP: （むきゅううううううううううっっっっっ）
2167 = "（Ép chặt!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！？」
1489 = "「Kua!?」"
# monologue
# JP: 乳首に触れようと伸ばしかけた手を、\n明確な意思を示すおっぱいに、勃起への圧に止められる。
1872 = "Bàn tay định vươn ra chạm vào núm vú, đã bị ngăn lại bởi bầu ngực thể hiện ý chí rõ ràng, bởi áp lực dồn lên dương vật."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉？」
1643 = "「Chị Mayami?」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ね？　今夜はおねーちゃんにぜぇんぶ任せて。とろっとろに、気持ちよぉしてあげるけん」
1578 = "「Sou-chan, này? Đêm nay cứ giao hết cho chị đi. Chị sẽ làm cho em sướng đến tan chảy luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1495 = "「!!!」"
# monologue
# JP: 頷いている。頭も心も勃起も迷わず、全力で。\nそして同時に、理解する。
1890 = "Tôi gật đầu. Bằng cả cái đầu, trái tim và dương vật, không chút do dự, bằng tất cả sức lực. Và đồng thời, tôi đã hiểu ra."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は――んっ――心底、かわいい、人――なの、\nだがっ――ただ――その、かわいさ、の――何万倍、も」
1642 = "「Chị Mayami là——ưm——một người, vô cùng đáng yêu—— nhưng mà——không chỉ vậy——gấp hàng vạn lần, sự đáng yêu, đó」"
# 【真闇】
# display as 真闇
# JP: 「ん……」
1510 = "「Ưm......」"
# monologue
# JP: （もにゅうっ！　むにゅっ！　もみゅっ！　ぢゅむっ！）
2155 = "（Nắn bóp! Nhào nặn! Xoa bóp! Chụt!）"
# monologue
# JP: もう一度、左右のおっぱいの動きをズラして揉んでくる。\n快感は更に磨かれている。体温と汗の量とが増したゆえ。
1819 = "Chị ấy lại một lần nữa di chuyển hai bầu ngực lệch nhau để xoa bóp. Khoái cảm càng được mài giũa sắc bén hơn. Bởi vì nhiệt độ cơ thể và lượng mồ hôi đã tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「美し、くっ――ァっ――聡明、で――女性らしさが――\n包容力が――めだって、しまって、いる――だけ――で」
1649 = "「Xinh đẹp——a——thông minh——sự nữ tính—— sự bao dung——quá, nổi bật——mà thôi」"
# monologue
# JP: （むにゅうっ！　ほにゅっ！　みゅむんっ！　にゅうう）
2153 = "（Nắn bóp! Nhào nặn! Mềm mại! Trơn tuột）"
