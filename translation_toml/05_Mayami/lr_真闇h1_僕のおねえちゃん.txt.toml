# display as 雙鐵
# JP: 「ぁ――ぁ――ぁ――ぁっ」
1459 = "「A——a——a——a」"
# monologue
# JP: 包容力が、まさに体現されている。僕の勃起は\nおっぱいの海に鎮められ、快感でもう窒息しそうで。
2028 = "Sự bao dung, đang được thể hiện rõ nét. Dương vật của tôi đang chìm đắm trong biển ngực, sắp nghẹt thở vì khoái cảm."
# 【真闇】
# display as 真闇
# JP: 「ん――っぁ――んっ……っ！！」
1503 = "「Ưm——a——ưm......!!」"
# monologue
