1612 = "（Nhào nặn!!!）"
# 【真闇】
# display as 真闇
# JP: 「きゃんっ！？　んっ――こぎゃんいきなりっ」
1407 = "「Kyan!? Ưm——sao tự nhiên lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「にゃあにゃあ鳴いてる子猫が――\nミルクを欲しがっているのではないかと思ってな」
1596 = "「Mèo con đang kêu meo meo—— Em nghĩ chắc là đang thèm sữa đấy.」"
# 【真闇】
# display as 真闇
# JP: 「っ！！」
1699 = "「!!」"
# monologue
