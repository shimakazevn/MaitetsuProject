# display as 雙鐵
# JP: 「うむ」
1522 = "「Ừm.」"
# monologue
# JP: (ぬっ――むっ――くっ――にむっ）
2151 = "(Nắn——bóp——siết——nhào）"
# monologue
# JP: 真闇姉の呼吸が荒い。もじもじ、ひどくはにかんでいる。\nその僅かずつの重なる刺激も、射精を強く促してくる。
1962 = "Hơi thở của chị Mayami trở nên gấp gáp. Chị ấy bồn chồn, vô cùng ngượng ngùng. Những kích thích chồng chất từng chút một đó, cũng thúc giục tôi xuất tinh mạnh mẽ."
