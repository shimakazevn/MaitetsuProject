1832 = "Một nụ cười rạng rỡ như hoa nở, ngập tràn hạnh phúc hiện rõ trên khuôn mặt. Nhìn thấy điều đó, a, tôi đã hiểu ra."
# 【双鉄】
# display as 雙鐵
# JP: 「脊髄反射で飛び出た言葉が――っ――\nどうやら――ぁ――正解、だった――よう、だなっ」
1603 = "「Những lời thốt ra như phản xạ không điều kiện—— Có vẻ như——a——đã là——câu trả lời chính xác——nhỉ.」"
# monologue
# JP: （もぬっ――もにっ――もにゅっ――むにゅっ）
2161 = "（Nắn——bóp——nhào——nặn）"
# monologue
# JP: 真闇姉が、左右のおっぱいをそれぞれズラして動かす。\n時間差で来る圧力変化に、勃起はたやすく翻弄される。
1964 = "Chị Mayami di chuyển bầu ngực trái phải lệch nhau. Sự thay đổi áp lực theo độ trễ thời gian dễ dàng đùa giỡn với dương vật đang cương cứng."
# 【真闇】
# display as 真闇
