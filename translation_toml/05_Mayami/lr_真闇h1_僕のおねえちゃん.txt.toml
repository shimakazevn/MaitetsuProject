1466 = "「啊啊啊啊啊啊啊啊啊啊啊啊！！！」" 

# monologue
# JP: （ぶぢゅっ！　ごぢゅっ！！　ずりゅっ！　ぶちゅん！）
2135 = "（噗啾！　啾！！呲溜！　噗啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「はっ――あっ！　あっ――あっ！」
1443 = "「哈——啊！　啊！——啊！" 

# monologue
# JP: 僕の勃起が真闇姉の中に全部呑まれては姿をあらわす。\n腰が大きく上下するたび、おっぱいがぶるぶる踊り揺れる。
1877 = "我的勃起全部被真闇姐吞噬的時候，就會現出形狀。每當她的腰部大幅度上下移動時，那胸部就會不停地晃動。" 

# 【真闇】
# display as 真闇
# JP: 「そうちゃん――ねっ――そうちゃん――どお、おっ――\nんっ――おまんこ――おねえちゃんの――おまんこ、ば」
1573 = "「小雙——我和——小雙——嗯——我的——小穴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちいい！　気持ちいい！　気持ちいい！！！」
1551 = "「好舒服！　好舒服！　好舒服！！！」" 

# monologue
# JP: 主導権も尊厳も、なにもかも全部投げ出す快感。\n僕の全てが真闇姉のおまんこのなかに包まれている。
1896 = "放棄主導權、尊嚴、所有的一切，這帶給了我至高的快感。我的一切都被真闇姐的小穴吞噬了。" 

# monologue
# JP: （じりゅ！　ばちゅんっ！　ずりゅう！　ぶちゅんっ！）
2130 = "（啾！　啪啾！　呲溜！　噗啾！）" 

# 【真闇】
# display as 真闇
# JP: 「はっ――あっ！　うれし、かっ！　んっ――はっ――\nおねえちゃん――双ちゃん、全部――食べ、ちゃってっ」
1445 = "「哈——啊！　好開心！　嗯——哈——姐姐——吃掉了，小雙的，全部」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おねえ――ちゃんっ」
1552 = "「姐——姐」" 

# monologue
# JP: （ずりゅう！　ごちゅっ！　ずりゅ！　ごちゅっ！！）
2109 = "（呲溜！　咕啾！　呲溜！　咕啾！！）" 

# 【真闇】
# display as 真闇
# JP: 「んふうううううっ！！！」
1531 = "「嗯嗚嗚嗚嗚嗚嗚！！！」" 

# monologue
# JP: こころも体もたましいも、全部を真闇姉に委ねてる。\n子宮の中に僕ごと全部がきゅんきゅん吸われ堕ちていく。
1881 = "我的心靈、身體和靈魂，全部都交給了真闇姐。她的子宮緊緊地吸入了我的全部，讓我毫無反抗地墮落進去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕――もう――僕っ――もうっ！！」
1586 = "「我——已經——我——已經！！」" 

# monologue
# JP: だから、我慢しない。無理をしない。\n溶け出すままに、精子を全部子宮へ注げばそれだけでいい。
1892 = "所以我不會忍耐，也不會勉強自己。我只要把身體溶化出的精子全部注入子宮就好。" 

# 【真闇】
# display as 真闇
# JP: 「うんっ！　うんっ！　よかよっ！　よかとよっ！！！\nいつでも――好きに――おね、ちゃんの――おまんこに」
1539 = "「嗯！　嗯！　好舒服！　好舒服！！！隨時隨地——都可以——給姐姐的——小穴」" 

# monologue
# JP: （ず！　ばちゅ！　りゅ！　ごちゅ！　ぬ！　ぶちゅ！）
2182 = "（滋！　啪啾！　啾！　咕啾！　噗！　噗啾！）" 

# monologue
# JP: 真闇姉も加速し加熱する。おっぱいが激しく踊るたび、\n汗粒が飛び、濃厚な女の匂いが脳まで染みる。
1958 = "真闇姐也在不斷地加速，不斷變熱。每當乳房激烈地舞動，汗珠就會飛濺，濃烈的女性氣息滲透進我的大腦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――あっ――あっ――あっ！」
1461 = "「啊——啊——啊——啊！」" 

# monologue
# JP: （ぬ！　ぶちゅ！　りゅ！　ばちゅ！　ず！　ごりゅ！）
2144 = "（噗！　噗啾！　啾！　啪啾！　滋！　滋溜！）" 

# 【真闇】
# display as 真闇
# JP: 「精子――精液っ――双ちゃんの――すきな、だけっ！\n出したい全部――おねえちゃんの――おまんこにっ！！」
1645 = "「精子——精液——小雙的——想射多少、都可以！全部射進——姐姐的——小穴！！」" 

# monologue
# JP: （きゅむっ！　きゅううんっ！）
2186 = "（緊繃！　緊繃！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！」
1488 = "「嗚啊！！！！」" 

# monologue
# JP: 勃起が膨れる、ガチガチよりもさらに膨れる。\n睾丸がフル稼働して、充填限界を超える精子を送り込む。
1791 = "勃起膨脹起來，已經硬邦邦的了，但還在繼續膨脹。睪丸全力運轉，為勃起輸送超過填充上限的精子。" 

# 【真闇】
# display as 真闇
# JP: 「射精！　びゅうびゅう！　射精、してっ！　子宮、ばっ、\n全部！　双ちゃんの、精子で――おぼれ、させてぇっ！」
1561 = "「射精！　噗滋噗滋地！　射精吧！　射進、整個、子宮！　用小雙的、精子——把我淹死！」" 

# monologue
# JP: （ずりゅううううううううううううううううううっ！！）
2108 = "（呲溜——————————！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1700 = "「！！！！」" 

# monologue
# JP: （びゅぶうううううううううっっっっっ！　ごちゅん！）
2145 = "（射出————————！　咕啾！）" 

# 【真闇】
# display as 真闇
# JP: 「きゅふううううううううううぅぅぅぅぅぅぅんっ！」
1492 = "「嗚嗚嗚嗚嗚嗚嗚嗚嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇――ねえっ――おねえちゃんっ！！！！」
1627 = "「真闇——姐——姐姐！！！！」" 

# 【真闇】
# display as 真闇
# JP: 「んゆっ！！！！」
1533 = "「嗯嗚！！！！」" 

# monologue
# JP: （びゅぶっ！　どびゅっ！！　びゅる！　びゅうぶっ！）
2113 = "（咻噗！　咻！噗溜！　嗶咻！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――あっ――あっ――ああっ！！」
1460 = "「啊——啊——啊——啊啊！」" 

# monologue
# JP: （びゅるっ！　びゅう！　びゅ！　ぶりゅうっ！！）
2118 = "（咻嚕！　咻！　咻！　噗溜！）" 

# 【真闇】
# display as 真闇
# JP: 「ファ――あっっ！　精子――びゅう、びゅう――んっ、\nのんで――のんでる――おまんこ――しきゅう――がっ」
1426 = "「呼——啊！　精子——咻，咻地——嗯、小穴——在喝——在喝精子」" 

# monologue
# JP: （びゅるっ！　びゅうっ！　ぢびゅっ！　どびゅう！）
2119 = "（咻嚕！　噗咻！　咻！　噗咻！）" 

# 【真闇】
# display as 真闇
# JP: 「ごく、ごく――のんで、る――精子――精液っ――\n双ちゃん、の――ふ、ぁ――うれし――うれし、かっ」
1436 = "「咕嘟、咕嘟地——喝、著——精子——精液——小雙、的——呼、啊——好開心——好開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉っ――\nおねえちゃん！　おねえちゃん！　おねえちゃんっ！」
1640 = "「真闇姐——姐姐！　姐姐！　姐姐！」" 

# monologue
# JP: （びゅるっ！　びゅぶっ！　びゅうう！　ぶびゅっっ！）
2121 = "（咻嚕！　噗！！　噗嗚！　噗滋）" 

# 【真闇】
# display as 真闇
# JP: 「う、ん……ふっ――ぁっ――んふふっ――双、ちゃん」
1457 = "「唔，嗯……呼——啊——嗯呼呼——小、雙」" 

# monologue
# JP: （びゅっ――りゅっ――びゅううぶっ――――ぴっ……）
2111 = "（咻——咻——咻噗——噗——……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ――はぁっ！　はぁっ！　はぁっ！！」
1167 = "「——嗯——哈！　哈！　蛤啊！」" 

# 【真闇】
# display as 真闇
# JP: 「よーがんばったねー、たくさん射精。\nいいこ、いいこ、いいこ、いいこっ」
1548 = "「好努力啊……射了這麼多。乖孩子、乖孩子、乖孩子、乖孩子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1458 = "「啊——」" 

# monologue
# JP: 勃起が抜かれる。真闇姉がべったり肌をすりつけてくる。\n頬摺りをする――キスをする。
1792 = "勃起被拔了出來。真闇姐緊緊地蹭著我的肌膚。貼著臉頰——接吻。" 

# 【真闇】
# display as 真闇
# JP: 「ちゅっ――ちゅむっ――ちゅうっ――れるっ――\nれろおっ、れりゅっ――ちゅう――ずっ――ぷあっ」
1477 = "「啾——啾嗯——啾——舔舔——舔舔，啾啾——啾啾，啾——呼啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ、はあっ、はぁっ――真闇、姉っ」
1659 = "「蛤啊、蛤啊、蛤啊——真闇、姐」" 

# 【真闇】
# display as 真闇
# JP: 「なぁに？　双ちゃん」
1583 = "「怎麼了？　小雙」" 

# monologue
# JP: 真闇姉の目をまっすぐ見つめる――見つめ合う。
1884 = "我直視著真闇姐的眼睛——我們互相凝視。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は恐らく、どこか現実感の無いことと捉えていた。\n心の隅で、真闇姉と対等以上になって初めてと思ってた」
1584 = "「恐怕我一直認為這是缺乏現實感的事。在我內心深處，頭一次感覺我和真闇姐達到了超越互相平等的關係」" 

# 【真闇】
# display as 真闇
# JP: 「あ」
# 1463 = "「啊」" 

# monologue
# JP: それだけでもう伝わっている。繋がっているのが嬉しくて。\nだからこそ申し訳なく――思いを呑んで、言葉をつなぐ。
1776 = "僅僅如此，我已經感受到聯繫在一起帶來的喜悅。正因如此，我才會把抱歉的思緒放在一邊，繼續說下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、今日あらためて真闇姉のかわいさを思い知らされて。\nその上で膣内射精をして。強く思った。そして、願った」
1385 = "「但是，今天我再次領悟到了真闇姐的可愛。而且在你的體內射精。讓我的感受更強烈了。然後，我許了願望」" 

# 【真闇】
# display as 真闇
# JP: 「…………」
1170 = "「…………」" 

# monologue
# JP: 汗と精液をいまだまぶした真闇姉の喉が大きく動く。\n唾を飲み込み――ゆっくり、ゆっくり、息が吐かれる。
1887 = "我能看到真闇姐仍然沾滿汗水和精液的喉嚨劇烈地顫動。她嚥下口水——慢慢地，慢慢地，呼氣。" 

# 【真闇】
# display as 真闇
# JP: 「なにを――\n双ちゃんは思うて――そうして、願うてくれたと？」
1574 = "「小雙——是怎麼想的——許的願望，又是什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉のこどもは――真闇姉と僕とのこどもは、\nどれほどかわいらしいことだろうかと、そう思い」
1591 = "「我在想，真闇姐的孩子——真闇姐和我生出的孩子，將會是多麼可愛」" 

# 【真闇】
# display as 真闇
# JP: 「あっ」
# 1473 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに願った。\nふたりのこどもを授かりたいと――作りたいと」
1610 = "「所以我許了願望。我想要兩個孩子——想讓你生兩個孩子」" 

# 【真闇】
# display as 真闇
# JP: 「う、んっ」
# 1522 = "「嗯」" 

# monologue
# JP: 真闇姉の瞳のふちに涙が浮かぶ。\n舌先でそっと口づけて、そのまま喉へと落とし込む。
1966 = "真闇姐的眼角浮現了淚水。我用舌尖輕輕吻了一下淚水，然後直接咽了下去。" 

# 【真闇】
# display as 真闇
# JP: 「……ありがと。双ちゃん。おねえちゃんもね？\nおんなじ気持ち。――ずっと、ずっと、ずうっと前から」
1183 = "「……謝謝。小雙。姐姐也是一樣的。跟你有一樣的心情。——從很久、很久、很久很久以前開始」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばっ」
1694 = "「那麼」" 

# 【真闇】
# display as 真闇
# JP: 「あんっ」
1471 = "「啊嗯」" 

# monologue
# JP: 真闇姉を強く抱きしめ、押し倒す。\n今度は僕が、真闇姉へとのしかかる。
1875 = "我用力抱住真闇姐，推倒她。這一次，我要向真闇姐主動發起攻擊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その確率を上げさせてくれ。\n今度は僕が――全部を、真闇姉にしてあげたい」
1673 = "「讓我來提高這個機率吧。這次，我要把我的一切——都給真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 1522 = "「嗯」" 

# monologue
# JP: 真闇姉が笑う。喜びにどこか余裕の混じる、\n実におねーちゃんな笑顔を浮かべる。
1976 = "真闇姐笑了。她臉上浮現出喜悅中夾雜著一絲輕鬆，非常有姐姐的感覺。" 

# 【真闇】
# display as 真闇
# JP: 「おねがいね？　双ちゃん」
1691 = "「那就拜託了，　小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 

# 【真闇】
# display as 真闇
# JP: 「あっ！」
# 1473 = "「啊！」" 

# monologue
# JP: ゆえに、思い切り搔き抱く。\n僕は弟なだけではないと――男で、夫だと示すため。
1894 = "所以，我用盡全力擁抱她。為了證明我不僅僅是她的弟弟——我還是她的男人、她的丈夫。" 
