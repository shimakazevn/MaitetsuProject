1827 = "Khuôn mặt đỏ bừng lan đến tận mang tai. Có lẽ vì nhớ lại tiếng bắt chước mèo vừa nãy, hoặc là do câu nói của tôi quá xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「ん！」
1540 = "「Ưm!」"
# monologue
# JP: （にゅっ――るっ――）
2183 = "（Trơn——trượt——）"
# monologue
# JP: 赤みを増した肌には汗も滲み出し、極上すぎる真闇姉の\nおっぱいの、もちもち感としっとり感とを更に増す。
1980 = "Làn da đỏ ửng rịn mồ hôi, càng làm tăng thêm sự mềm mại và ẩm ướt của bộ ngực tuyệt hảo của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「そ……双、ちゃん」
1564 = "「So......Sou-chan.」"
# monologue
