# 1522 = "「嗯」" 
# monologue
# JP: 真闇姉の瞳のふちに涙が浮かぶ。\n舌先でそっと口づけて、そのまま喉へと落とし込む。
1966 = "Nước mắt đọng trên khóe mi chị Mayami. Tôi dùng đầu lưỡi nhẹ nhàng hôn lên, rồi nuốt trọn giọt nước mắt ấy."
# 【真闇】
# display as 真闇
# JP: 「……ありがと。双ちゃん。おねえちゃんもね？\nおんなじ気持ち。――ずっと、ずっと、ずうっと前から」
1183 = "「......Cảm ơn em. Sou-chan. Chị cũng vậy đó, biết không? Chị cũng có chung cảm xúc ấy. ——Từ rất, rất, rất lâu rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばっ」
1694 = "「Vậy thì」"
# 【真闇】
# display as 真闇
# JP: 「あんっ」
1471 = "「A」"
# monologue
# JP: 真闇姉を強く抱きしめ、押し倒す。\n今度は僕が、真闇姉へとのしかかる。
1875 = "Tôi ôm chặt chị Mayami, đè chị xuống. Lần này, đến lượt tôi phủ lên người chị."
# 【双鉄】
# display as 雙鐵
# JP: 「その確率を上げさせてくれ。\n今度は僕が――全部を、真闇姉にしてあげたい」
1673 = "「Hãy để em tăng tỷ lệ đó lên nhé. Lần này em muốn——dành tất cả cho chị Mayami」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 1522 = "「嗯」" 
# monologue
# JP: 真闇姉が笑う。喜びにどこか余裕の混じる、\n実におねーちゃんな笑顔を浮かべる。
1976 = "Chị Mayami cười. Nụ cười ngập tràn niềm vui xen lẫn chút thong dong, đúng chuẩn nụ cười của một người chị lớn."
# 【真闇】
# display as 真闇
# JP: 「おねがいね？　双ちゃん」
1691 = "「Nhờ em nhé? Sou-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「あっ！」
# 1473 = "「啊！」" 
# monologue
# JP: ゆえに、思い切り搔き抱く。\n僕は弟なだけではないと――男で、夫だと示すため。
1894 = "Vì vậy, tôi ôm chặt lấy chị. Để chứng minh rằng tôi không chỉ là em trai——mà còn là một người đàn ông, là chồng của chị."
