1549 = "「Đáng yêu quá! Đáng yêu quá! Đáng yêu quá! Đáng yêu quá!!」"
# monologue
# JP: （ずりゅっ！　みゅぶっ！　にゅこっ！　もにゅっ！）
2179 = "（Trơn tuột! Nhào nặn! Trơn tuột! Nắn bóp!）"
# 【真闇】
# display as 真闇
