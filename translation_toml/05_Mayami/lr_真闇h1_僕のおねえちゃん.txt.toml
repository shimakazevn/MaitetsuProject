# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ちょこーっと時間よかと？\nおねーちゃん、新しか下着こうたけん、見て欲しくって」
1577 = "「Sou-chan, em có chút thời gian không? Chị mới mua đồ lót mới, muốn cho em xem thử.」"
# 【双鉄】
# display as 雙鐵
