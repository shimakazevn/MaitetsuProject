1451 = "「Ồ! Tất nhiên rồi, rất hoan nghênh.」"
# monologue
# JP: ペンを置く。\n確認作業の途中であるが、感想くらいお安いご用だ。
1870 = "Tôi đặt bút xuống. Dù đang dở việc kiểm tra, nhưng chỉ là cho ý kiến thì quá đơn giản."
# 【真闇】
# display as 真闇
# JP: 「ほんなら。うふふっ。\nお邪魔しまぁす」
