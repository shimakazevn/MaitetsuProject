# JP: 真闇姉ははずかしそうにいやいやをして、おっぱいが揺れ、\n勃起が擦られる――どうやら図星をついたらしい。
1955 = "Chị Mayami ngượng ngùng lắc đầu, bầu ngực đung đưa, cọ xát vào dương vật đang cương cứng——có vẻ như tôi đã nói trúng tim đen."
# 【真闇】
# display as 真闇
# JP: 「褒め足り無いいうわけじゃなくって。けど、その――\nたまには言われてみたかこと、ちょっとだけ、って」
1380 = "「Không phải là khen chưa đủ đâu. Nhưng mà, cái đó—— Có những lời chị thỉnh thoảng cũng muốn nghe, một chút thôi, ấy mà.」"
# 【双鉄】
# display as 雙鐵
