1776 = "Chỉ vậy thôi cũng đủ truyền đạt rồi. Hạnh phúc vì chúng tôi được kết nối. Chính vì vậy mà tôi cảm thấy có lỗi——nuốt lấy những suy nghĩ đó, tôi tiếp lời."
