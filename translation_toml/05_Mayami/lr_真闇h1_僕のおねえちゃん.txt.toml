1853 = "Tưởng tượng thụ tinh, bốn chữ đó hiện lên trong đầu với sự nhu động mạnh mẽ. Bên trong âm đạo đang cố nuốt trọn những tinh binh chưa được phóng ra không chừa một giọt."
