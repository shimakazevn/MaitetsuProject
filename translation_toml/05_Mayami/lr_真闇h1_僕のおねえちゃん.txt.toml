1494 = "「!! A——」"
# monologue
# JP: 視覚の刺激と驚きと、慣れ親しんだ柔肉の圧。\n三位一体の刺激に早くも射精欲求が膨れ上がって――
2016 = "Kích thích thị giác, sự bất ngờ, và áp lực từ da thịt mềm mại quen thuộc. Sự kích thích ba trong một khiến ham muốn xuất tinh nhanh chóng phồng lên——"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇、姉、はっ――」
1630 = "「Chị, Mayami, ha——」"
# monologue
# JP: （ぬっ――るっ――――むっ――みゅっ――）
2168 = "（Trơn——trượt――――nắn——bóp——）"
# monologue
# JP: このまま達してしまうなら、いくらなんでも早漏過ぎる。\n鎮めるために動きを緩め、頭を働かせ言葉を紡ぐ。
1836 = "Nếu cứ thế này mà ra thì đúng là quá xuất tinh sớm. Để kìm hãm lại, tôi giảm bớt chuyển động, bắt đầu suy nghĩ và lựa lời."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、このような――猫の、耳や、尻尾まである――\nくっ――普段とまるでちがった――下、着――を？」
1618 = "「Tại sao, lại mặc——đồ, lót——như thế này—— có cả tai, và đuôi mèo——khác hẳn bình thường thế này?」"
# 【真闇】
# display as 真闇
# JP: 「ぁっ」
1463 = "「A.」"
# monologue
# JP: 真闇姉が恥ずかしそうに目を伏せる。肌が一層熱くなる。\n密度の上に湿度も加わり、腰を動かせと要求してくる。
1977 = "Chị Mayami ngượng ngùng cụp mắt xuống. Làn da càng thêm nóng rực. Độ ẩm hòa cùng mật độ, đòi hỏi tôi phải chuyển động hông."
# 【真闇】
# display as 真闇
