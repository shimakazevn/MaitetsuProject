# monologue
# JP: 真っ赤になって、無理無理喉から、猫の鳴き声を絞り出す。\nらしくなさに、慣れてなさに、勃起が一気に硬度を増して。
1824 = "Đỏ bừng mặt, chị ấy cố gắng ép tiếng kêu của mèo ra khỏi cổ họng. Sự không giống chị ấy thường ngày, sự thiếu quen thuộc đó, khiến dương vật của tôi lập tức tăng thêm độ cứng."
# monologue
