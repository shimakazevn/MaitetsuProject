2137 = "（Nhào nặn!!!!）"
# 【真闇】
# display as 真闇
# JP: 「あっ！！！」
1474 = "「A!!!」"
# monologue
# JP: 腰が勝手に動き出してる。\n同時に喉は、心をそのまま吐き出している。
1883 = "Hông tôi tự động chuyển động. Đồng thời, cổ họng tôi tuôn ra những lời nói thẳng từ trái tim."
# 【双鉄】
# display as 雙鐵
