1765 = "Có lẽ sốt ruột với chuyển động chậm rãi của tôi, hoặc ngược lại là muốn ngăn lại, chị Mayami dùng hai tay ép chặt bầu ngực lại."
# monologue
# JP: （むにゅっ！　ぐにゅっ！　にゅるっ！　もみゅんっ！）
2162 = "（Nắn! Bóp! Trơn tuột! Nhào nặn!）"
# 【双鉄】
# display as 雙鐵
