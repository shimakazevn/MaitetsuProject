1868 = "Tiếng \"Hả\" suýt thốt ra, tôi may mắn dùng cuống lưỡi chặn lại được. Không, nhưng mà, nói vậy cũng hơi quá đáng——đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉ほど称賛を浴び続けている人物を僕は知らん。\nというか僕も、真闇姉を褒めない日の方が少なかろう」
1388 = "「Người luôn được nhận những lời khen ngợi như chị Mayami thì em chưa thấy ai bao giờ. Đúng hơn là em cũng vậy, số ngày em không khen chị chắc chỉ đếm trên đầu ngón tay.」"
# 【真闇】
# display as 真闇
# JP: 「そいば、そぎゃんよ。双ちゃんは\nいっつも褒めすぎなくらい、おねーちゃんのこと」
1683 = "「Cái đó thì, đúng là vậy. Sou-chan lúc nào cũng khen chị quá lời luôn ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「褒めすぎなどと。実際、真闇姉ほど聡明で美しく、\n女性らしさと気遣いと目配りとに満ちた人間は他に」
1453 = "「Làm gì có chuyện quá lời. Thực tế, một người thông minh, xinh đẹp, đầy nữ tính, chu đáo và tinh tế như chị Mayami thì làm gì có ai khác.」"
# 【真闇】
# display as 真闇
# JP: 「あ、ほら。いまも。\n褒めすぎなのに――その……」
1476 = "「A, thấy chưa. Bây giờ cũng vậy. Khen quá lời thế mà——cái đó......」"
# 【双鉄】
# display as 雙鐵
# JP: 「んん？？」
1543 = "「Hửm??」"
# monologue
# JP: 自分の言葉を振り返る。\nなにがなんだかさっぱりわからん。
1862 = "Tôi ngẫm lại những lời mình vừa nói. Hoàn toàn không hiểu chuyện gì đang xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「今も……褒め過ぎなのに――？\nあ、褒め足り無い部分があるのか？」
1397 = "「Bây giờ cũng......khen quá lời thế mà——? A, hay là có chỗ nào em khen chưa đủ sao?」"
# 【真闇】
# display as 真闇
# JP: 「はうっ！？」
1449 = "「Hau!?」"
# monologue
# JP: （ふりゅゅっ！　にゅむんっ！！）
