# monologue
# JP: それは与えられたものではなくて、\nこの焼酎が、自ら汲み出したものと感じる。
2418 = "Nó không phải là thứ được ban cho, mà tôi có cảm giác như chính loại shochu này, đã tự mình múc nó ra."
# 【双鉄】
# display as 雙鐵
# JP: 「……祝杯をあげたい気分だ」
1162 = "「......Em đang có tâm trạng muốn nâng ly chúc mừng đây.」"
# 【真闇】
# display as 真闇
# JP: 「やねぇ」
1563 = "「Đúng thế nhỉ.」"
# monologue
# JP: もう一つ。\n真闇姉はコップを取り出し、そこにひとしずくを注ぐ。
2576 = "Thêm một cái nữa. Chị Mayami lấy ra một cái cốc, và rót Hitoshizuku vào đó."
# 【真闇】
# display as 真闇
# JP: 「乾杯」
1471 = "「Cạn ly.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。乾杯」
1645 = "「Vâng. Cạn ly.」"
# monologue
# JP: キン、と涼やかな音がする。
1098 = "Keng, một âm thanh mát mẻ vang lên."
# monologue
# JP: もういっぱいを飲み干せば、\n御一夜の夏の焼けた風が、喉を抜けたと感じさえする。
2430 = "Uống cạn thêm một ly nữa, tôi thậm chí còn cảm thấy như cơn gió rát bỏng của mùa hè Ohimitera, vừa lướt qua cuống họng."
# 【双鉄】
# display as 雙鐵
# JP: 「で？」
2008 = "「Thế?」"
# 【真闇】
# display as 真闇
# JP: 「ん？」
1667 = "「Hửm?」"
# monologue
# JP: 酒が、唇をなめらかにする。
2717 = "Rượu, làm cho đôi môi trở nên trơn tru."
# monologue
# JP: 自覚するから言葉を絞り、\n余計なことは言わぬようにと気をつける。
2194 = "Vì tự nhận thức được điều đó nên tôi chắt lọc từ ngữ, cẩn thận để không nói ra những điều thừa thãi."
# 【双鉄】
# display as 雙鐵
# JP: 「この酒が理由の一つなら。\n他のは、何だ？」
1980 = "「Nếu loại rượu này là một trong những lý do. Vậy những lý do khác, là gì?」"
# 【真闇】
# display as 真闇
# JP: 「あー」
# 1602 = "「啊——」" 
# monologue
# JP: つまらんことを聞かれてしまった。\nそんな表情がありあり浮かぶ。
2343 = "Bị hỏi một chuyện chán ngắt rồi. Biểu cảm đó hiện rõ mồn một trên mặt chị."
# 【真闇】
# display as 真闇
# JP: 「ええと……ねぇ。\nゆーたら、そうね。おねえちゃんやけん」
1975 = "「Ờm...... thì. Nói sao nhỉ, đúng rồi. Vì chị là chị gái mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おねえちゃんだから？」
1682 = "「Vì là chị gái sao?」"
# 【真闇】
# display as 真闇
# JP: 「そ」
# 1658 = "「嗯」" 
# monologue
# JP: ぐいと、一気にコップの中身が空けられる。
2332 = "Ực một cái, thứ trong cốc được uống cạn sạch trong một hơi."
# monologue
# JP: 真闇姉ほどに強ければ、水を飲むのと変わらなかろうが\n――それでもどうにか、酔ってしまおうとするかのように。
2605 = "Nếu tửu lượng mạnh như chị Mayami, thì uống nó cũng chẳng khác gì uống nước ――Nhưng dù vậy, trông chị như thể đang cố gắng làm cách nào đó để được say."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんは、おねえちゃんやけん。\n妹の欲しがっとるもの、横取りしたらいけんでしょ？」
1681 = "「Chị gái, là chị gái mà. Đồ mà em gái đang muốn có, không được phép nẫng tay trên đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そういうものなのかな」
1610 = "「A...... là như vậy sao.」"
# monologue
# JP: 僕の知っている“おねえちゃん”は、\n真闇姉ただ一人しかいない。
2432 = "\"Chị gái\" mà tôi biết, chỉ có duy nhất một mình chị Mayami mà thôi."
# monologue
# JP: そうして真闇姉は確かに……\n日々姫のため、僕のため、多くを譲る人だから。
2633 = "Và quả thực chị Mayami...... là người luôn nhường nhịn rất nhiều thứ, vì Hibiki, vì tôi."
# 【真闇】
# display as 真闇
# JP: 「そぎゃんとよ。\n双ちゃんだってわかるでしょ？　おにーちゃんやし」
1725 = "「Là thế đó. Sou-chan cũng hiểu mà đúng không? Em cũng là anh trai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕か？　僕は――それほどには譲らなかったぞ？」
1755 = "「Em á? Em thì―― đâu có nhường nhịn đến mức đó đâu?」"
# 【真闇】
# display as 真闇
# JP: 「え？」
1593 = "「Hả?」"
# monologue
# JP: 日々姫には、確かにかなり譲っているかもしれん。
2440 = "Với Hibiki, quả thực có lẽ tôi đã nhường nhịn khá nhiều."
# monologue
# JP: それはやはり、義理の兄妹という遠慮もあるし、\n養子だという引け目もあるから。が、路子には――
2315 = "Đó là bởi, tôi vẫn có sự e dè của anh em nuôi, và cả sự tự ti vì mình là con nuôi nữa. Nhưng, với Michiko thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「どうでもいいものは譲ったが。\n本当に欲しいものなら、たとえ泣かれても譲らなかった」
1747 = "「Những thứ không quan trọng thì em nhường. Nhưng nếu là thứ em thực sự muốn, thì dù có bị khóc lóc em cũng không nhường đâu.」"
# 【真闇】
# display as 真闇
# JP: 「っ！！」
# 2060 = "「！！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「それでも、喧嘩にはならなかったな。\nそれが僕には必要なのだと、やがて、わかってもらえて」
1454 = "「Dù vậy, bọn em cũng không hề cãi vã. Vì em ấy sẽ nhanh chóng hiểu ra rằng, đó là thứ cần thiết đối với em.」"
# monologue
# JP: 路子と僕とはふたごだからかとぼんやり考え、\nそうではないなとすぐ否定する。
2391 = "Tôi lơ đãng nghĩ rằng liệu có phải vì Michiko và tôi là anh em sinh đôi không, nhưng rồi lại lập tức phủ nhận điều đó."
# monologue
# JP: 日々姫とでも、ハチロクとでも――\n思いが真摯であるのなら、必ずそれは伝わるはずだ。
2364 = "Dù là với Hibiki, hay với Hachiroku―― Chỉ cần tâm tư đủ chân thành, thì nhất định nó sẽ được truyền đạt."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんが……欲しがって、よかと？」
2009 = "「Chị gái...... cũng được phép muốn có, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然だろう。真闇姉とて、真闇姉である以前に、\n右田真闇というひとりの人間なのだから」
2023 = "「Đương nhiên rồi. Chị Mayami, trước khi là một người chị gái, thì cũng là một con người mang tên Migita Mayami mà.」"
# 【真闇】
# display as 真闇
# JP: 「ひとりの、人間」
1713 = "「Một, con người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「人間も、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。意思を持つものには必ず、\n望みを持ち、叶える権利があると、僕は信じる」
1742 = "「Dù là con người, hay \\x%lレイルロオド;#00ffc040;Railord%l;#;. Em tin rằng, bất cứ ai có ý chí, đều có quyền mang trong mình những ước muốn, và quyền được hiện thực hóa chúng.」"
# monologue
# JP: そうでなければ、僕は生きている意味を失う。
2352 = "Nếu không như vậy, tôi sẽ đánh mất đi ý nghĩa sống của mình."
# monologue
# JP: 望みをもってもらえなければ、その実現を助けられない。
2356 = "Nếu không ai có ước muốn, thì tôi chẳng thể giúp họ hiện thực hóa điều gì cả."
# 【真闇】
# display as 真闇
# JP: 「ほんなら」
1786 = "「Nếu vậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2061 = "「！？」" 
# monologue
# JP: グイと、真闇姉が寄ってくる。\n近い。近い。
2600 = "Rẹt một cái, chị Mayami xích lại gần. Gần quá. Gần quá."
# monologue
# JP: 近いからといって何だというわけもなく――\nけれどもひどく、どうしようもなく焦ってしまう。
2756 = "Dù có gần thì cũng chẳng có ý nghĩa gì đặc biệt―― Nhưng tôi lại trở nên bối rối một cách tồi tệ, không thể nào kiểm soát được."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんも、欲しがってよかとよね？」
1761 = "「Sou-chan cũng, được phép muốn có đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕、が――か？」
1741 = "「Em, á―― sao?」"
# monologue
# JP: それは……確かに、そうなのだろうが――
2215 = "Điều đó...... quả thực, là vậy nhưng――"
# monologue
# JP: 路子を失ったあの日以来、\nなにかを本当に欲しがることなど……
2378 = "Kể từ cái ngày mất đi Michiko đó, việc thực sự muốn có một thứ gì đó......"
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃんは、何ば欲しかと？」
1575 = "「Nè? Sou-chan, muốn có thứ gì nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕……僕は――」
1740 = "「Em...... em thì――」"
# monologue
# JP: 問われただけで、混乱している。\n無い、とはなぜか即答できない。
2451 = "Chỉ mới bị hỏi thôi, mà tôi đã thấy bối rối rồi. Chẳng hiểu sao, tôi lại không thể trả lời ngay là \"Không có\"."
# monologue
# JP: なにか求めるものがあるのに、\nそれを見つめることがひどく、怖い気がする。
2761 = "Rõ ràng là có thứ tôi đang mong cầu, nhưng tôi lại có cảm giác sợ hãi tột độ khi phải nhìn thẳng vào nó."
# 【双鉄】
# display as 雙鐵
# JP: 「……わからない、かな」
1168 = "「......Chắc là, em không biết.」"
# 【真闇】
# display as 真闇
# JP: 「よねぇ、わからんとよねぇ」
1824 = "「Đúng thế nhỉ, không biết được đâu nhỉ.」"
# monologue
# JP: ホっとした顔。
2598 = "Một khuôn mặt nhẹ nhõm."
# monologue
# JP: 真闇姉は身を翻し、\n長く、疲れたような息を吐く。
2347 = "Chị Mayami xoay người lại, và trút ra một tiếng thở dài, mệt mỏi."
# 【真闇】
# display as 真闇
# JP: 「ずーっと、我慢ばしとるもんねぇ。\n欲しがってよかっていわれても、戸惑うとよねぇ」
1497 = "「Suốt từ đó đến giờ, em vẫn luôn nhẫn nhịn mà nhỉ. Dù có được bảo là cứ muốn đi, thì em cũng sẽ bối rối thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。\nそうだな、まさしくそうだ」
1624 = "「A, vâng. Đúng vậy, chính xác là như vậy.」"
# monologue
# JP: 欲しがることを、誰に禁じられたわけじゃない。
2202 = "Chẳng có ai cấm đoán việc tôi muốn có thứ gì cả."
# monologue
# JP: けれど遺ってしまった僕には……それは罪深くも思え。\nだから、ずうっと望まぬように、きっとしてきた。
2218 = "Nhưng với một kẻ bị bỏ lại như tôi...... điều đó có vẻ thật tội lỗi. Vì thế, chắc chắn tôi đã luôn cố gắng để không mong muốn bất cứ điều gì."
# 【真闇】
# display as 真闇
# JP: 「でも、うん。そーね。\n本当に欲しかもんなら、欲しがって当然、良かとよね」
1491 = "「Nhưng mà, ừm. Đúng thế nhỉ. Nếu đó là thứ mình thực sự muốn, thì đương nhiên là được phép muốn có rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん……」
1642 = "「Vâng......」"
# monologue
# JP: 真闇姉へと話していたつもりの言葉がキン、と、\n僕自身にも跳ね返ってくる。
2468 = "Lời nói mà tôi định dành cho chị Mayami, lại như một tiếng keng, bật ngược trở lại chính bản thân tôi."
# monologue
# JP: （ああ……なんだ、鏡写しのようなものか）
2788 = "（A...... ra là vậy, giống như hình ảnh phản chiếu trong gương sao.）"
# monologue
# JP: 右田の\\x%l杜氏;#00ffc040;杜氏%l;#;と、事故被害者と。\n役割を、あるいは役目を。
2295 = "Một \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; của nhà Migita, và một nạn nhân của vụ tai nạn. Vai trò, hay có lẽ là bổn phận."
# monologue
# JP: ずっと上手に果たしてきたから、\nそれ以外には、どうしていいかわからない。
2720 = "Vì chúng tôi đã luôn hoàn thành nó quá tốt, nên ngoài điều đó ra, chúng tôi chẳng biết phải làm thế nào nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕だけではないのだな」
1157 = "「......Không chỉ có mình em nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「なにがと？」
1483 = "「Cái gì cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんというか……自分が例外だというか――\n自分にだけは許されぬものと思い込んでしまってたのが」
1739 = "「Nói sao nhỉ...... việc tự cho mình là ngoại lệ ấy―― Việc cứ đinh ninh rằng, chỉ có bản thân mình là không được phép.」"
# 【真闇】
# display as 真闇
# JP: 「あー。あるかもね、そういうの」
1604 = "「A. Có lẽ là có đấy, những chuyện như thế.」"
# monologue
# JP: 力みのまるで無い相槌。\n僕の心までほぐされる。
2334 = "Một tiếng hùa theo hoàn toàn không có chút gượng ép nào. Làm cõi lòng tôi cũng được nới lỏng ra."
# 【双鉄】
# display as 雙鐵
# JP: 「うん、あるよな」
1663 = "「Vâng, có nhỉ.」"
# monologue
# JP: あの頃は――自分をきつく縛り付けねば、\nきっと、立ってさえいられなかった。
2358 = "Hồi đó―― nếu không tự trói buộc bản thân thật chặt, chắc chắn tôi thậm chí còn chẳng thể đứng vững được."
# monologue
# JP: けれどもう、鎖はなくても大丈夫だろう。
2221 = "Nhưng giờ thì, không có xiềng xích cũng không sao rồi."
# monologue
# JP: （僕も、真闇姉も――ひとりでは、無いのだから）
2792 = "（Cả tôi, và chị Mayami―― đều không hề cô đơn mà.）"
# monologue
# JP: グっと狭まっていた視野が戻って――\n戻ればすぐに、なんだ、そうかと思いつく。
2264 = "Tầm nhìn vốn bị thu hẹp lại của tôi đã trở lại―― Và ngay khi nó trở lại, tôi chợt nhận ra, à, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あった。望みが。欲しいものが」
1808 = "「Có rồi. Mong muốn. Thứ em muốn có.」"
# 【真闇】
# display as 真闇
# JP: 「なになに、なんね？」
1482 = "「Gì thế gì thế, là gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「グランプリだ。最優秀賞だ。ＩＳＣの」
1749 = "「Giải Grand Prix. Giải thưởng cao nhất. Của ISC.」"
# 【真闇】
# display as 真闇
# JP: 「あ！　うん。\nそーね。そーよねぇ」
1621 = "「A! Ừm. Đúng thế. Đúng là thế nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜のためでも、右田のためでもなく。\n僕個人が、単純に勝ちたい。この酒で」
1973 = "「Không phải vì Ohimitera, cũng không phải vì nhà Migita. Mà với tư cách cá nhân, em đơn thuần chỉ muốn chiến thắng. Bằng loại rượu này.」"
# 【真闇】
# display as 真闇
# JP: 「うん。勝ちたかね。\nみんなで一緒に、勝ちたかね」
1647 = "「Ừm. Muốn chiến thắng nhỉ. Cùng với tất cả mọi người, chiến thắng nhỉ.」"
# monologue
# JP: うんうんと、ふたり向き合い、頷きあって、笑い合う。
2400 = "Ừm ừm, hai chúng tôi đối diện nhau, gật đầu, và cùng bật cười."
# 【真闇】
# display as 真闇
# JP: 「そしたら、次も――もっと、ずうっと欲しかったもんも、\nきっと手に入れてみせるけん」
1773 = "「Vậy thì, tiếp theo―― thứ mà em vẫn luôn muốn có, chắc chắn em cũng sẽ lấy được cho xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯」" 
# monologue
# JP: 今度は僕が、空のコップに、\nなみなみ、なみなみ、酒を満たす。
2713 = "Lần này đến lượt tôi, rót rượu, rót đầy ăm ắp vào chiếc cốc không."
# monologue
# JP: そして僕らは、ごく当然の乾杯をする。
2743 = "Và chúng tôi, nâng ly cạn chén như một lẽ đương nhiên."
# 【双鉄】
