# monologue
# JP: 欲しがることを、誰に禁じられたわけじゃない。
2202 = "並沒有誰來阻止我去追求自己渴望的事物。" 

# monologue
# JP: けれど遺ってしまった僕には……それは罪深くも思え。\nだから、ずうっと望まぬように、きっとしてきた。
2218 = "但是我一直認為……倖存下來的自己罪孽深重。所以我才一直不讓自己去有所渴望。" 

# 【真闇】
# display as 真闇
# JP: 「でも、うん。そーね。\n本当に欲しかもんなら、欲しがって当然、良かとよね」
1491 = "「但是……嗯，也對。如果真的渴望什麼東西，那也是理所當然的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん……」
1642 = "「嗯……」" 

# monologue
# JP: 真闇姉へと話していたつもりの言葉がキン、と、\n僕自身にも跳ね返ってくる。
2468 = "方才跟真闇姐說的話反倒在我的胸中迴響。" 

# monologue
# JP: （ああ……なんだ、鏡写しのようなものか）
2788 = "（啊……總感覺，我們就像鏡中影像一樣）" 

# monologue
# JP: 右田の\x%l杜氏;#00ffc040;杜氏%l;#;と、事故被害者と。\n役割を、あるいは役目を。
2295 = "右田的\\x%l杜氏;#00ffc040;掌窖%l;#;還有事故受害者，並無二致。" 

# monologue
# JP: ずっと上手に果たしてきたから、\nそれ以外には、どうしていいかわからない。
2720 = "都只是一心完成自己的任務，或者說是使命。而除此之外，卻都落得無所適從。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕だけではないのだな」
1157 = "「……看來這樣的不止是我自己啊」" 

# 【真闇】
# display as 真闇
# JP: 「なにがと？」
1483 = "「什麼樣咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんというか……自分が例外だというか――\n自分にだけは許されぬものと思い込んでしまってたのが」
1739 = "「怎麼說呢……我曾經堅信——只有我自己是例外，或者說只有我是那個不能被原諒的人」" 

# 【真闇】
# display as 真闇
# JP: 「あー。あるかもね、そういうの」
1604 = "「啊——可能確實會這麼想」" 

# monologue
# JP: 力みのまるで無い相槌。\n僕の心までほぐされる。
2334 = "她放鬆地附和道，就連我的情緒都隨之緩和。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、あるよな」
1663 = "「嗯，是啊」" 

# monologue
# JP: あの頃は――自分をきつく縛り付けねば、\nきっと、立ってさえいられなかった。
2358 = "如果那時——我沒有這樣約束自己的話，我肯定就沒辦法重新站起來。" 

# monologue
# JP: けれどもう、鎖はなくても大丈夫だろう。
2221 = "但是現在，我應該不再需要這些枷鎖了吧。" 

# monologue
# JP: （僕も、真闇姉も――ひとりでは、無いのだから）
2792 = "（因為——我和真闇姐都不再是孤身一人）" 

# monologue
# JP: グっと狭まっていた視野が戻って――\n戻ればすぐに、なんだ、そうかと思いつく。
2264 = "原本變得狹窄的視野終於恢復了正常——這時我馬上反應過來，原來我有想要的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あった。望みが。欲しいものが」
1808 = "「有了。我知道我想要什麼了」" 

# 【真闇】
# display as 真闇
# JP: 「なになに、なんね？」
1482 = "「什麼呀什麼呀，是什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「グランプリだ。最優秀賞だ。ＩＳＣの」
1749 = "「我要參加ＩＳＣ，而且要拔得頭籌」" 

# 【真闇】
# display as 真闇
# JP: 「あ！　うん。\nそーね。そーよねぇ」
1621 = "「啊！嗯，對呀。說得對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜のためでも、右田のためでもなく。\n僕個人が、単純に勝ちたい。この酒で」
1973 = "「這不是為了御一夜，也不是為了右田家。這只是我個人的意願，我想要用這酒來拿獎」" 

# 【真闇】
# display as 真闇
# JP: 「うん。勝ちたかね。\nみんなで一緒に、勝ちたかね」
1647 = "「嗯。咱也想拿獎。咱想和大家一起把它拿下」" 

# monologue
# JP: うんうんと、ふたり向き合い、頷きあって、笑い合う。
2400 = "我們相視一笑，互相點了點頭。" 

# 【真闇】
# display as 真闇
# JP: 「そしたら、次も――もっと、ずうっと欲しかったもんも、\nきっと手に入れてみせるけん」
1773 = "「拿獎以後——咱一定也可以，把握住咱一直想要的東西唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯」" 

# monologue
# JP: 今度は僕が、空のコップに、\nなみなみ、なみなみ、酒を満たす。
2713 = "這回輪到我往空酒杯中斟滿酒。" 

# monologue
# JP: そして僕らは、ごく当然の乾杯をする。
2743 = "隨後我們默契地舉杯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ＩＳＣのグランプリを願って」
1892 = "「祝我們在ＩＳＣ旗開得勝」" 

# 【真闇】
# display as 真闇
# JP: 「本当に欲しかもんだけは、\nきっと手にできるように、願って」
1729 = "「希望咱能得到咱真正想要的東西」" 

# 【真闇】
# display as 雙鐵＆真闇
# JP: 『「乾杯」\n「乾杯」』
2064 = "『「乾杯」\\n「乾杯」』" 

# monologue
# JP: 一気に、空ける。
2301 = "同時一飲而盡。" 

# monologue
# JP: 三度目になるひとしずくは、\n今まで飲んだどの酒よりも、爽やかに腹に染みていく。
2714 = "這是我們喝的第三杯凝露。而它比迄今為止我喝的任何酒都要清爽，沁人心脾。" 
