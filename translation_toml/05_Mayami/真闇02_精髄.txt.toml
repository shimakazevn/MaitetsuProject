2422 = "我慢慢將\\x%l自弁;#00ffc040;自剎%l;#;拉至\\x%l常用;#00ffc040;常用%l;#;位置。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、\x%l自弁;#00ffc040;自弁%l;#;ハンドルがあるのが\x%l常用;#00ffc040;常用%l;#;――\n普通に使う\x%lブレーキ;#00ffc040;ブレーキ%l;#;の位置だ」
1861 = "「現在我把\\x%l自弁;#00ffc040;自剎%l;#;杆調到了\\x%l常用;#00ffc040;常用%l;#;位置——也就是平常使用的\\x%lブレーキ;#00ffc040;剎車%l;#;位置」" 

# monologue
# JP: 言葉とともに、\x%l8620;#00ffc040;8620%l;#;は緩やかに減速していく。
2470 = "於是\\x%l8620;#00ffc040;８６２０%l;#;就隨著我的話語徐徐減速。" 

# monologue
# JP: 制限60――\n標識を確認すると同時に、ハチロクと僕の\x%l喚呼;#00ffc040;喚呼%l;#;が揃う。
2323 = "在我和八六看到了限速６０的標誌同時，異口同聲地進行了\\x%l喚呼;#00ffc040;復誦%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この位置だと、\x%lブレーキ;#00ffc040;ブレーキ%l;#;内の圧縮空気が、\n[れいてんよんきろへいほう,7]0.4kg/平方センチ、\x%l減圧;#00ffc040;減圧%l;#;される」
1933 = "「調到這個位置的話\\x%lブレーキ;#00ffc040;剎車%l;#;裡的壓縮空氣就會\\x%l減圧;#00ffc040;減壓%l;#;到０．４ｋｇ／平方公分」" 

# 【真闇】
# display as 真闇
# JP: 「\x%l減圧;#00ffc040;減圧%l;#;？　加圧じゃなかと？」
1119 = "「\\x%l減圧;#00ffc040;減壓%l;#;？不是加壓嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、\x%l減圧;#00ffc040;減圧%l;#;で正しいんだ」
1661 = "「嗯，是\\x%l減圧;#00ffc040;減壓%l;#;」" 

# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;を\x%l重なり位置;#00ffc040;重なり位置%l;#;へと戻し、\x%lブレーキ;#00ffc040;ブレーキ%l;#;力は保持しつつ、\n圧縮空気を込めなおす。
2412 = "我將\\x%l自弁;#00ffc040;自剎%l;#;調回\\x%l重なり位置;#00ffc040;保持位置%l;#;，一邊維持\\x%lブレーキ;#00ffc040;剎車%l;#;的力度一邊將壓縮空氣重新注入其中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l列車;#00ffc040;列車%l;#;の自動\x%lブレーキ;#00ffc040;ブレーキ%l;#;は、空気圧がかかり続けることで\n解除されてる。圧力を抜けば、\x%lブレーキ;#00ffc040;ブレーキ%l;#;がかかる構造だ」
1113 = "「\\x%l列車;#00ffc040;列車%l;#;的自動\\x%lブレーキ;#00ffc040;剎車%l;#;可以透過持續對空氣加壓來將其解除。在這個構造下如果將壓力降低\\x%lブレーキ;#00ffc040;剎車%l;#;就會起作用」" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、そぎゃんとややこしか構造しとーと？」
1850 = "「為什麼要把它的構造整的那麼複雜咧？」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lブレーキ;#00ffc040;ブレーキ%l;#;管の損傷や、\x%l客車;#00ffc040;客車%l;#;・\x%l貨車;#00ffc040;貨車%l;#;が分離してしまった\n場合に備えてです」
1844 = "「為了應對\\x%lブレーキ;#00ffc040;剎車%l;#;管受損以及\\x%l客車;#00ffc040;客運車廂%l;\\x%l貨車;#;#00ffc040;貨運車廂%l;#;與機車分離的情況」" 

# 【真闇】
# display as 真闇
# JP: 「わ！　すごか。よぅ考えてあっとねぇ」
1587 = "「哇！好厲害。還考慮到了這些情況呀」" 

# monologue
# JP: いや、すごいのは真闇姉だ。\n今の一言だけで理解するとは。
2197 = "不，其實真闇姐才厲害，居然靠我一句話就能理解了。" 

# monologue
# JP: 僕などは、なかなか構造を理解できずに、\n図までを書いてもらったものだが……
2539 = "當時我很難理解它的構造，以至於還讓八六幫我畫圖來解釋……" 

# 【双鉄】
# display as 雙鐵
# JP: 「圧縮空気で\x%lブレーキ;#00ffc040;ブレーキ%l;\x%l圧;#;#00ffc040;圧%l;#;をかける方式では、\n分離時の客貨車は、\x%lブレーキ;#00ffc040;ブレーキ%l;#;なしに暴走してしまう」
2003 = "「通過壓縮空氣使\\x%lブレーキ;#00ffc040;剎車%l;#;施加\\x%l圧;#00ffc040;壓力%l;#;的話，與機車分離時車廂無法\\x%lブレーキ;#00ffc040;剎車%l;#;就會失去控制」" 

# monologue
# JP: 蛇足極まる説明だとは思いつつ、\n\x%lブレーキ;#00ffc040;ブレーキ%l;#;と口を動かし続ける。
2751 = "雖然我覺得已是畫蛇添足，但是我還是一邊操作\\x%lブレーキ;#00ffc040;剎車%l;#;一邊說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、空気が抜けたとき\x%lブレーキ;#00ffc040;ブレーキ%l;#;がかかるようにして、\n安全性を、さらに向上させているのだ」
1762 = "「所以就設計成只要空氣不加壓就會使\\x%lブレーキ;#00ffc040;剎車%l;#;起作用，這樣一來就可以進一步提高安全性」" 

# 【真闇】
# display as 真闇
# JP: 「はぁぁ」
1585 = "「哇啊」" 

# monologue
# JP: 感心しきり。\nそんな、長くて熱のある息。
2597 = "真闇姐發出了長長一聲喘息，音色中聽得出她無比佩服的感情。" 

# 【真闇】
# display as 真闇
# JP: 「まっこと。\nよーできとるねぇ。面白かとねぇ！」
1868 = "「真的咧。設計得真巧妙。好有趣啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった。\nここから先は、車窓風景も面白くなるぞ？」
1504 = "「你覺得有趣就好。待會車窗外的風景也會很有趣哦」" 

# 【真闇】
# display as 真闇
# JP: 「え――わ！」
1589 = "「哎——哇！」" 

# monologue
# JP: カーブを抜ければ森も抜けきる。
2245 = "列車拐了個彎，駛出森林。" 

# monologue
# JP: 開けた視界の向こうには、なんとものどかな田園風景。\nしばらく行けば、川と鉄橋も待っている。
2747 = "隨著視野開闊映入眼簾的，是一片恬靜的田園風光。而在行駛路線前方不遠處，則是河流和鐵橋。" 

# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「制限、解除！　良しっ！」\n「制限、解除！　良しっ！」』
2072 = "『「限速解除！確認！」\\n「限速解除！正常！」』" 

# monologue
# JP: （ザクっ！　カパッ！　ザっ！）
2790 = "（喀嚓！喀啦！唰！）" 

# monologue
# JP: 声と同時に投げ込みの音。\n息を揃えて僕らはグン！　と加速していく。
2256 = "加煤的聲音和我們的聲音一同響起，列車隨之猛然加速前進！" 

# 【ポーレット】
# display as 波萊特
# JP: 「おかえりなさい。お疲れ様です」
1818 = "「歡迎回來。辛苦你們了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯」" 

# monologue
# JP: 試験運転を無事終えて御一夜駅へと降り立てば、\n満面の笑顔を浮かべたポーレットが僕らを迎えてくれる。
2538 = "當我們安全結束了試運營回到御一夜站下到站台的時候，等在那裡的波萊特便滿臉笑容地迎了上來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうでしたか？　[キャブ,2]運転台は」
1687 = "「坐駕駛台感覺怎麼樣啊？」" 

# 【真闇】
# display as 真闇
# JP: 「面白かった！\n実際乗ると、いろんなことがわかるとねぇ」
1735 = "「很有趣！親自來坐一程就了解到了很多東西呢」" 

# monologue
# JP: しみじみ言って、\n真闇姉の目が、いたずらっぽく僕を見る。
2583 = "真闇姐感慨萬分地說完，用帶著惡作劇神情的目光看向我。" 

# 【真闇】
# display as 真闇
