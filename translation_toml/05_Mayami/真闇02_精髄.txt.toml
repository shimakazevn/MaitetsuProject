1697 = "「奇怪了」" 

# monologue
# JP: 味が違う。
2709 = "這味道不對。" 

# monologue
# JP: 同じ酒米、同じ水、同じ酵母に同じ設備、\n蒸留法も全く同じであるというのに。
2495 = "明明使用了完全相同的酒米、水、酵母、設備、蒸餾方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが温度管理をしたものは雑味が多い。\nありてい言えば、うまくない」
1983 = "「這批八六負責管理溫度的酒中雜味要多些。說白了，就是不太好喝」" 

# monologue
# JP: 驚くほどにスッキリ感を欠いている。
2724 = "酒中的清爽感欠缺到令我覺得不可思議。" 

# monologue
# JP: いかにもクマ焼酎らしい、米の風味があるのはいいが、\nそれが強すぎ、いっそ濁りとなっている。
2716 = "這確實是隈燒酒的味道，酒中有米香倒是不錯……但這米香未免太強烈了，以至於讓味道難分主次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸留をしてなお、何故これほどに味が残るのだ？」
1848 = "「為什麼蒸餾過了還會留這麼多味道在裡面？」" 

# 【真闇】
# display as 真闇
# JP: 「何故って双ちゃん」
1720 = "「小雙你還問為什麼」" 

# monologue
# JP: ちょっと呆れたような顔。
2572 = "真闇姐一臉無奈的表情。" 

# 【真闇】
# display as 真闇
# JP: 「蒸留ばしておんなじ味になるよーなら、\n酒づくりに\x%l杜氏;#00ffc040;杜氏%l;#;なんていらんとよ」
1926 = "「要是酒蒸餾過後都能得到同樣的味道，那釀酒廠還要\\x%l杜氏;#00ffc040;掌窖%l;#;幹什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、それはそうなのだが――」
1630 = "「啊，話是這麼說沒錯——」" 

# monologue
# JP: ごく当然の指摘にけれど、戸惑わされる。
2342 = "她的指正合情合理，卻讓我越來越不解。" 

# monologue
# JP: 養子であるとて、僕も右田の一員だ。\n酒を作る手順なら、ひと通り教わっている筈なのに――
2753 = "雖然是養子，但我也是右田家的一員。照理說我已經學會了釀酒工藝的各個工序——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ？　味の違いは……\n素材や水は当然なのだが――その他だと」
1155 = "「……唔？味道不一樣的原因除了原料、水之外——還包括……」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんなら、ちょこっと考えればわかるけん。\n前の蒸気焼酎とこれと、違いは何ね？」
1721 = "「小雙這麼聰明，稍微想想就會明白咧。之前做的蒸汽燒酒和這次的有什麼不同呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違いは……だから、温度管理だけなのだよな。\n以前のは真闇姉が、これはハチロクが行っている」
1444 = "「不同……基本上只有溫度管理工序不同啊。以前是真闇姐你來做的，這回是八六」" 

# 【真闇】
# display as 真闇
# JP: 「何の、温度管理と？」
1930 = "「要管理什麼的溫度咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、[こうじ]麹――[こめこうじ,1]米麹と\x%lもろみ;#00ffc040;もろみ%l;#;とだ」
1799 = "「是酒麴——也就是米麴和\\x%lもろみ;#00ffc040;酒醪%l;#;」" 

# 【真闇】
# display as 真闇
# JP: 「[こめこうじ,1]米麹は、何から、どーやってつくっと？」
2025 = "「那麼米麴是用什麼做、怎麼做的咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[さかまい,1]酒米を蒸して、[たねこうじ,1]種麹を種付けて、それを保温して、\n切り返して寝かせる」
2053 = "「首先將酒米蒸熟，然後混入種麴，將其平鋪、保溫發酵」" 

# 【真闇】
# display as 真闇
# JP: 「うんうん」
1659 = "「嗯嗯」" 

# monologue
# JP: 相槌は、もっと考えろと促すようで。\nだから素直に、思考を言葉に落としこみつつ整頓していく。
2596 = "真闇姐用附和聲催促我繼續思考，於是我老老實實地一邊整理腦海中的思緒一邊將其說出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば麹菌が増える。この米麹に\n焼酎酵母と水とを加え、酵母を増やして\x%lもろみ;#00ffc040;もろみ%l;#;を作る」
1989 = "「這樣一來麴菌就會大量繁殖。往這些米麴中加入燒酒酵母和水，增大酵母的用量就可以做成\\x%lもろみ;#00ffc040;酒醪%l;#;」" 

# 【真闇】
# display as 真闇
# JP: 「なんで、酵母ば増やさんといけんね？」
1849 = "「為什麼要多加酵母咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「酵母とは、つまり発酵の母。これが足りんと、\n糖分をアルコールに分解できんからだ」
1684 = "「因為酵母就是催化發酵的根源。如果酵母的用量不足就會導致糖分無法充分分解為酒精」" 

# monologue
# JP: ん、と真闇姉の満足気な笑み。\nこの程度なら、僕とてきっちり理解している。
2590 = "真闇姐滿意地笑了。這些基礎知識我當然掌握得毫無疏漏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして作った一時\x%lもろみ;#00ffc040;もろみ%l;#;に、洗米して蒸した酒米と\n水とを加え、発酵させて、二次\x%lもろみ;#00ffc040;もろみ%l;#;を作る」
1774 = "「接下來往先前工序做成的粗\\x%lもろみ;#00ffc040;酒醪%l;#;中加入洗淨蒸熟的酒米和水，並且讓其發酵，以此做成精\\x%lもろみ;#00ffc040;酒醪%l;#;」" 

# monologue
# JP: 二次\x%lもろみ;#00ffc040;もろみ%l;#;の段階ではもう、\n糖分のほとんどがアルコールへと分解されてる。
2622 = "精\\x%lもろみ;#00ffc040;酒醪%l;#;做好之後，其中的糖分基本已經完全分解為酒精。" 

# monologue
# JP: いわば原初の酒であるのだが、\nこの状態では、不純物がいかにも多すぎる。
2244 = "其實這就是最初步製作成的酒，這些酒中還含有很多的雜質。" 

# 【真闇】
# display as 真闇
# JP: 「ほーたら、出来た二次\x%lもろみ;#00ffc040;もろみ%l;#;ば、どぎゃんすると？」
1782 = "「於是，製成的精\\x%lもろみ;#00ffc040;酒醪%l;#;應該怎麼樣處理咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸留だ。蒸気焼酎の場合は――\n石炭ボイラで焚いたスチームを使っての[じょうあつ,1]常圧蒸留だよな」
1920 = "「蒸餾。如果要製作蒸汽燒酒的話——就用煤炭鍋爐產生的蒸汽來進行常壓蒸餾」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。で、加熱されて気化したアルコールと水を、\n冷却器で冷やして戻せば、米焼酎の出来上がりばい」
1825 = "「沒錯。於是，在這個工序中汽化了的酒精和水經過冷卻器後冷卻回流，就製成了米燒酒咧」" 

# monologue
# JP: 真闇姉がまとめてくれて、ホっとする。\nここまでの僕の知識に、間違いなどは無かったようだ。
2579 = "真闇姐幫我進行了總結，不禁讓我鬆了口氣。看來我並沒有記錯到這一步為止的知識。" 

# monologue
# JP: ならこの先は――考えをさらに掘り下げればいい。
2542 = "看來問題出在之後的工序——我得仔細想想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「雑味と風味とは紙一重だ。風味を決めるのは、\n素材、酵母、発酵、熟成――ああ！」
2047 = "「雜味和風味只有一紙之隔。決定風味的要素有原料、酵母、發酵工藝和時間——啊！」" 

# monologue
# JP: 知識と事態が、やっと繋がる。
2441 = "我終於將知識和看到的表象聯繫了起來。" 

# monologue
# JP: 熟成をしてない状態で試飲して、\n素材も酵母も完全に同一なのだから――
2370 = "就算原料、酵母都完全一樣，但是我在發酵時間還不夠時就試喝了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「温度管理で増殖したり死滅したりが決まるのは……\n[こうじきん,1]麹菌や酵母だけではないのだな」
1564 = "「可以透過溫度管理來定向增殖或減少的……不僅僅只有麴菌和酵母啊」" 

# 【真闇】
# display as 真闇
# JP: 「そーねぇ」
1717 = "「對啦」" 

# monologue
# JP: 満足そうな深い頷き。\n真闇姉の顔には、合格点といわんばかりの笑顔が浮かぶ。
2591 = "真闇姐滿足地點了點頭，臉上的笑意已經說明我回答到點子上了。" 

# 【真闇】
# display as 真闇
# JP: 「\x%lもろみ;#00ffc040;もろみ%l;#;には、いろんな種類の乳酸菌やカビもおるけん。\n温度ひとつで、育つもんと死ぬもんとが決まるとよ」
1108 = "「\\x%lもろみ;#00ffc040;酒醪%l;#;裡面還有很多種乳酸菌和黴菌咧。只要溫度稍有變化就會造成這些微生物的繁殖或死亡哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして、その乳酸菌やカビの働きが、\n素材や水だけに由来せぬ、いわゆる風味を決めるのか」
1903 = "「而且這些乳酸菌和黴菌的活動就決定了與原料、水無關的“風味”啊」" 

# monologue
# JP: ……どんな作業を行うかならば、知っていた。\n知ってはいたが、わかってなかった。
1102 = "……我知道這具體應該怎麼做。但是也只是知道，並沒有深刻地理解。" 

# monologue
# JP: \x%l杜氏;#00ffc040;杜氏%l;#;が酒の味を決めるというのは、つまり――\n風味を決める要素を左右するということなのだ。
69 = "\\x%l杜氏;#00ffc040;掌窖%l;#;決定了酒的味道——也就是說她控制了決定酒的風味的要素。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、今まで積み重ねた経験によって、\n旨い酒を作る菌やカビやらを活かすことができる」
1882 = "「真闇姐根據一直以來積累的經驗，得以靈活運用那些能讓酒變得美味的細菌和黴菌」" 

# monologue
# JP: こくん、と頷き。\n真闇姉は僕の方へと手を伸ばす。
2608 = "真闇姐點點頭，然後朝我伸出了手。" 

# monologue
# JP: 求められてるものが何かわかったような気がして、\nまだ一口しか飲んでない試飲のグラスをその手に返す。
2394 = "我不知怎的好像意會到了她想要什麼，於是我把只嘗了一口的盛著試飲酒的玻璃杯遞到了她手上。" 

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんばおってくれたら、そいを理詰めで、\nもっと揺れなく。再現して、より突き詰めていけるけん」
1925 = "「要是八六在這裡的話就會毫不動搖地跟我說理囉。然後她就會重做一次，將其追究到底」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが真闇姉の目指す、新しい蒸気焼酎なのか」
2018 = "「那就是真闇姐你目標中的新蒸汽燒酒嗎」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんふうに考えると――」
1503 = "「你要是這麼想的話——」" 

# monologue
# JP: 試飲のコップにふわり温かな目を落とし、\n真闇姉はクイ、と半分ほど空ける。
2610 = "真闇溫柔地看了看手中的試飲杯，隨後將杯內一半的酒喝下。" 

# 【真闇】
# display as 真闇
# JP: 「こん雑味も、なかなか良かもんとよ。\n可能性の、たっぷり詰まった味やけん」
1530 = "「其實這些雜味也是個好東西，有很大潛力，假以調整就能變成風味咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1544 = "「原來如此」" 

# 【真闇】
# display as 真闇
# JP: 「あ」
1613 = "「啊」" 

# monologue
# JP: 真闇姉からコップを取って、\n残りを一気に空けてみる。
2415 = "我從真闇姐手中接過杯子，將裡面的酒一飲而盡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「可能性の味、か。ここからどれほど、旨い焼酎が、\nそして新しい未来が産まれるのかな」
1987 = "「這是有潛力的味道嗎。從現在開始究竟能做出多少美味的燒酒，又能走向怎樣新的未來呢」" 

# 【真闇】
# display as 真闇
# JP: 「新しい未来は、言い過ぎ。大げさすぎよぉ」
1103 = "「\"新的未來\"實在太誇張啦。你真是小題大做」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、全く大げさではない。それを試し――\n酒造りに\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が有用であると、証明できれば」
1459 = "「不，完全不誇張。我們要嘗試一下——如果能證明\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在釀酒廠也是一把好手的話」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;に追われての大廃線は日ノ本だけの現象ではない。
66 = "\\x%lエアクラ;#00ffc040;空凝機%l;#;普及導致的大廢線浪潮並不只是席捲了日本。" 

# monologue
# JP: 世界中にはまだ数多くの、\x%l列車;#00ffc040;列車%l;#;を無くした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nきっと生き延びている筈だ。
2319 = "在世界上肯定還留存著許多失去了\\x%l列車;#00ffc040;列車%l;#;的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その暁には人と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とに新しい関係が築かれる。\n人間の感覚という領域に、新たな扉が開かれるのだから」
1992 = "「這樣就可以構建人和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的新共存關係，並且為人類的感覺領域打開一道新的大門」" 

# 【真闇】
# display as 真闇
# JP: 「わ」
1584 = "「哇」" 

# monologue
# JP: 何故かぽかん、と真闇姉の口が開いてしまう。
2189 = "不知怎地真闇姐驚訝地張大了嘴。" 

# 【真闇】
# display as 真闇
# JP: 「――双ちゃん、すごかこと考えよるねぇ」
1124 = "「——小雙，你的想法真是了不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、これは真闇姉の考えだろう」
1595 = "「哪裡，這是真闇姐你的主意吧」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんとスケールの大きかこつ、考えもよらんばい。\nうちはただ、良か酒、新しか酒ば作りたいだけとよ」
1578 = "「咱才沒有過那麼宏大的想法咧。咱只是單純地想要釀出好喝的酒、新的酒而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1795 = "「是嗎？」" 

# monologue
# JP: 真闇姉に引っ張られ、自然と湧いた考えだったが……
2749 = "雖然我就是受真闇姐影響自然而然就萌生了這樣的想法……" 

# monologue
# JP: それが真闇姉に無い発想ならば、\n僕も少しはこの件で、貢献していけるのかもしれん。
2479 = "既然真闇姐從未這樣想過，那也許我還能給這樣的未來做些貢獻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、旨い酒ができたときには、\n僕のアイディアもその上に乗っからせて欲しい」
2013 = "「那到時候釀出了好喝的酒的時候，麻煩把我的主意也加進去咯」" 

# 【真闇】
# display as 真闇
# JP: 「大歓迎たい！」
1819 = "「求之不得咧！」" 

# monologue
# JP: 喜んでくれているのだろうか、\n真闇姉の頬は、いくらか赤らんでみえる。
2573 = "真闇姐也許是為我而感到高興，她的臉都紅潤了幾分。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんのアイディアば形にするためにも、\nもっと、頑張らんと――っと」
1843 = "「為了實現小雙的理想，咱要更加努力才行——啊」" 

# monologue
# JP: 言いかけた声が、苦笑に崩れる。
2345 = "她話剛說完，臉上浮現出了苦笑。" 

# 【真闇】
# display as 真闇
# JP: 「ま、実際にいっとう頑張ってもらわんといけんのは、\nハチロクちゃんになってしまいよるけどねぇ」
1456 = "「不過，其實說到底，目前最需要努力的是八六才對呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1793 = "「是啊——」" 

# monologue
# JP: そうだ、その点は確認せねば。
2515 = "沒錯，我必須要認清這一點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどうなのだ？\n酒造りを、楽しめているようか？」
1517 = "「八六現在怎麼樣了？她做這些釀酒的活開心嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「機嫌よぉ仕事してくれとるよ？\n合間合間に双ちゃんのこと、楽しげに聞かせてくれよる」
1703 = "「她工作的時候挺開心的喲？空閒的時候還每每跟咱開心地講關於小雙的事咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕のことを？」
2041 = "「關於我的事？」" 

# 【真闇】
# display as 真闇
# JP: 「双鉄様には\x%l機関士;#00ffc040;機関士%l;#;の才能がございます――とか、\nそんな感じで、ことあるたんびに大絶賛とよ」
1700 = "「她一有空就會跟我說“雙鐵少爺真的有做\\x%l機関士;#00ffc040;司機%l;#;的才能”之類的。總之就是對你讚不絕口喲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;の才……か？　どうかな？\nハチロクに言われるままに動いているだけなのだが」
1507 = "「做\\x%l機関士;#00ffc040;司機%l;#;的……才能？誰知道呢？我只是按照八六的指示來做罷了」" 

# 【真闇】
# display as 真闇
# JP: 「フォローばすごくしてくれとるから、酒造りの方、\n気持ちよぉ切り替えて取り組めるともゆうとったよ？」
1705 = "「她還說你幫了她很大的忙，讓她能放心地在釀酒廠埋頭工作喲？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「フォローは……無論、\n出来る限りはしているのだが――」
1981 = "「這倒不用說……我肯定會盡力幫她，不過——」" 

# monologue
# JP: しかし、ハチロクに代わりしていることの中身といえば、\n僕でも行える範囲の点検・整備がほぼ全て。
2276 = "可是，論我替八六做了什麼事的話，無非就是我力所能及的檢修與整備工作。" 

# monologue
# JP: 僕としては、むしろ\x%l庫内手;#00ffc040;庫内手%l;#;のスキルの方が、\nぐんぐん伸びていってる感覚さえもある。
2367 = "就我個人而言，總感覺我一直在提升\\x%l庫内手;#00ffc040;洗爐工%l;#;該有的技能。" 

# 【真闇】
# display as 真闇
# JP: 「あー。うん」
1605 = "「啊——嗯」" 

# monologue
# JP: そこらの事情を苦笑まじりに説明すれば、\n何故か真闇姉は、納得をした顔になる。
2449 = "我苦笑著跟真闇姐解釋了一番，不知為何她聽後露出了十分理解的表情。" 

# 【真闇】
# display as 真闇
# JP: 「ほんならあるとね、双ちゃんには。\nハチロクちゃんの言うとる、“\x%l機関士;#00ffc040;機関士%l;#;の才”」
1526 = "「其實呀，小雙你真的有八六口中所說的“做\\x%l機関士;#00ffc040;司機%l;#;的才能”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\n今の話で何故そう思う？」
1669 = "「嗯？為什麼你會得出這個結論？」" 

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんば活かすため、自分のことを後に回す。\nそぎゃん風にできるんは、間違いなく才の一つとよ」
1501 = "「你為了讓八六能大顯身手，把自己的事情都給推後了。能做到這一點就是才能的一種體現」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう言われれば……\nそう、なのかな」
1904 = "「聽你這麼一說……好像也有道理」" 

# monologue
# JP: ハチロクを活かすため、というよりも。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回の道をなんとしても開くため――
2646 = "與其說是要讓八六能大顯身手，不如說是我在極力設法阻止\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶計劃——" 

# monologue
# JP: 自分の目的を果たすため、\n最善手を選び動いているだけという気もするのだが……
2757 = "雖說這可能是我為了達成自己的目的而選取的最優方案……" 

# 【真闇】
# display as 真闇
# JP: 「間違いなかと。双ちゃんにはそぎゃんして、\n周りの人ばやる気にさせる才があるけん！」
1905 = "「肯定沒錯呀。小雙你有讓周圍的人鼓起幹勁的才能咧！」" 

# monologue
# JP: 断言される。
2585 = "真闇姐斬釘截鐵地說道。" 

# monologue
# JP: 僕を見る目も自信に満ちて、\n迷いを消してくれる気さえする。
2340 = "她用充滿自信的目光注視我，似乎想要打消我的迷惘。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n真闇姉がそういってくれるなら、そうだろうな」
1794 = "「是嗎。既然真闇姐都這麼說了，那應該就是這樣吧」" 

# 【真闇】
# display as 真闇
# JP: 「そうそう。でなきゃ、ハチロクちゃん。\nあぎゃんと嬉しそうに乗務の話ば聞かせてくれんよ」
1826 = "「沒錯沒錯。不然的話，八六怎麼會那樣高興地跟咱聊起乘務工作的話題」" 

# monologue
# JP: 初めて聞くほどはしゃいだ声。\nなのにふと、真闇姉の顔に淋しげな色が滲み出る。
2429 = "我是第一次聽到真闇姐這麼興奮的聲音。但是下個瞬間她的臉上就蒙上了一層寂寞的陰霾。" 

# 【真闇】
# display as 真闇
# JP: 「……良かねぇ。機関車ば楽しげで」
1160 = "「……真好呀，看你對機車那麼投入」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大変だが楽しいぞ。\n多分、それは真闇姉の酒づくりと同じだろう――っと」
1666 = "「嗯，雖然很累但真的非常有趣啊。可能差不多和真闇姐釀酒時一樣開心——啊」" 

# monologue
# JP: そうだ。\n酒造りについて知ることで、あらたな気づきを僕は得た。
2363 = "對了。多虧我了解到了更多關於釀酒的知識，得以讓我有了新的認識。" 

# monologue
# JP: ならば、真闇姉にも\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;について学んでもらえば、\nさらに新たな何かが産まれてくるかもしれん。
2472 = "既然如此，我讓真闇姐學習關於\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的知識的話，說不定她也會有一些新的發現。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうだろうか、真闇姉。忙しいことはわかっているが、\n一度、[ハチロクニイマル,3]8620に乗ってみないか？」
1888 = "「真闇姐，我有個提議。雖然你很忙，但是要不要乘坐一次８６２０試試？」" 

# 【真闇】
# display as 真闇
# JP: 「あ～……乗れたら嬉しかけどねぇ。\n\x%l客車;#00ffc040;客車%l;#;ば、まだ無かとでしょお？」
1632 = "「啊～要是能坐的話就好了。但是現在它還沒有\\x%l客車;#00ffc040;客運車廂%l;#;吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ポーレットは手応えを掴んでいるようだった。\n近日中にも、あるいは朗報を聞けるかもしれん」
1462 = "「不，看樣子現在波萊特已經有解決方案了。也許不用多久就能聽到好消息了」" 

# monologue
# JP: 言った瞬間、ぱ、と華やぐ。
2681 = "話音剛落，真闇姐便雀躍不已。" 

# 【真闇】
# display as 真闇
# JP: 「そりゃ良かとねぇ！　なら、そんときに」
2015 = "「那太好啦！到時候一定要告訴咱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、そうではなく、キャブ――\n\x%l運転台;#00ffc040;運転台%l;#;に、乗ってみてはどうかと思っているのだ」
1616 = "「啊不是那個意思。我的意思是，你想不想坐在駕駛室——也就是\\x%l運転台;#00ffc040;駕駛台%l;#;上呢」" 

# 【真闇】
# display as 真闇
# JP: 「\x%l運転台;#00ffc040;運転台%l;#;って……乗せてもらえるもんとや？」
1907 = "「能讓咱……坐在\\x%l運転台;#00ffc040;駕駛台%l;#;上嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉なら、\nハチロクもポーレットも喜んで許可をくれるだろう」
1515 = "「八六和波萊特應該非常願意讓真闇姐同行吧」" 

# monologue
# JP: 本来ならば見習い時代は、\n指導\x%l機関士;#00ffc040;機関士%l;#;も同乗すると聞かされた。
2637 = "聽說原本在新手學習期間就應該有老\\x%l機関士;#00ffc040;司機%l;#;同行傳幫帶的。" 

# monologue
# JP: キャブ内は確かに手狭な場所ではあるが、\n真闇姉一人増えたところで、運行には全く支障はない。
2235 = "儘管駕駛室裡空間並不寬裕，但是僅增加真闇姐一人也不至於影響我們駕駛列車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「焼酎\x%l列車;#00ffc040;列車%l;#;の案が更に深まるかもしれないし、\n僕としては、是非とも乗ってもらいたい」
1528 = "「其實我是很希望你能來列車上坐坐的，說不定這樣一來還可以最佳化燒酒\\x%l列車;#00ffc040;列車%l;#;方案」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、許可ばもらえたそんときには――」
1787 = "「既然這樣，那等得到許可的時候就——」" 

# monologue
# JP: 真闇姉が身を屈め、\n甘えたような上目遣いで、僕を見てくる。
2581 = "真闇姐彎下腰，用撒嬌似的眼神從下往上注視著我。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんのお仕事っぷり、\n見せてもらって、よかと？」
1453 = "「不過小雙不介意讓咱看到你工作的樣子？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「良かとだ真闇姉。大歓迎だ」
1863 = "「當然不介意，歡迎真闇姐來看」" 

# monologue
# JP: 見慣れぬしぐさに動揺し、\n喉が勝手に返した言葉に、心が遅れて理解する。
2330 = "她不尋常的舉動惹得我慌亂之中隨意答應了她，回過神才反應過來。" 

# monologue
# JP: （ああ――本当に大歓迎だ）
2786 = "（啊——我確實很想讓她來啊）" 

# monologue
# JP: 焼酎\x%l列車;#00ffc040;列車%l;#;のアイディアも、無論大事なことではあるが。\nそれ以前。
2535 = "燒酒\\x%l列車;#00ffc040;列車%l;#;方案毫無疑問很重要，但是在此之上……" 

# monologue
# JP: 僕は、きっと、真闇姉に。\n自分の仕事を――見て、気に入ってもらいたいのだ。
2446 = "我肯定更想讓真闇姐看到我工作時的模樣——希望她能喜歡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「制限、解除――よしっ！」
1557 = "「取消限速——正常！」" 

# monologue
# JP: 標識確認・\x%l喚呼;#00ffc040;喚呼%l;#;を終えれば、ハチロクの目がツと動く。\n……この先しばらくは、森の中。
2239 = "八六確認好標識、完成\\x%l喚呼;#00ffc040;復誦%l;#;之後，她便開始四下瞭望——接下來一段路是在森林裡穿行。" 

# monologue
# JP: 踏切もなく、信号も標識も途切れる区間だ。\n前方注視の解除はできんが、話すくらいの余裕は出来る。
2715 = "這段路段上既沒有道口，也沒有信號和標誌。雖然視線仍不能離開前方，但說幾句話的餘地還是有的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、どうだ？　キャブの乗り心地は」
1886 = "「真闇姐，怎麼樣？駕駛室裡還舒服嗎」" 

# 【真闇】
# display as 真闇
# JP: 「暑かね！　狭か！　\nなのに、とっても楽しかと！」
1708 = "「好熱啊！好窄！但是咱很開心！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはよかった」
2016 = "「那就好」" 

# monologue
# JP: 弾んだ声にホっとする。
2445 = "我聽到她開朗的聲音後鬆了一口氣。" 

# monologue
# JP: なんだか今日はいつもより、暑さがキツいような気がして、\n真闇姉が耐えられるかどうか、少し心配に感じていたから。
2190 = "不知怎的，我感覺今天駕駛室裡比以往還要熱，甚至擔心起真闇姐受不受得了這份悶熱。" 

# 【真闇】
# display as 真闇
# JP: 「それに、見てるの面白かとよ。\n双ちゃん、難しそうな機械ば、見事に操っとるんねぇ」
1899 = "「而且看你倆工作很有趣哦。小雙能這麼精確地操作這麼複雜的機械呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに見た目は難しそうだが――\n蒸気機関というのは、原理的には単純だ」
1865 = "「看起來確實挺複雜的——不過蒸汽引擎原理上其實挺單純的」" 

# 【真闇】
# display as 真闇
# JP: 「そーなん？」
# 1795 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まず、このキャブのすぐ後ろにあるテンダー……\n\x%l炭水車;#00ffc040;炭水車%l;#;の中には、水と石炭が積まれている」
1656 = "「嗯。首先在這個駕駛室後方有一節\\x%l炭水車;#00ffc040;煤水車%l;#;……在那裡面放著水和煤炭」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
1658 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこの給水バルブを捻れば、テンダーの中の水が、\nボイラへと送りこまれる」
1853 = "「然後打開那裡的供水閥的話，煤水車裡面的水就會輸送到鍋爐裡」" 

# 【日々姫】
# display as 日日姬
# JP: 「こん水面計が、ボイラ内の水の量ば示しとるけん。\n目盛り、80に保つのが大事かとこばい！」
1854 = "「然後這個水位計就顯示了鍋爐裡的水量。把數值維持在８０是很重要的咧！」" 

# 【真闇】
# display as 真闇
# JP: 「それば、ひーちゃんのお仕事？」
1978 = "「這個就是小日的工作？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうばい！　石炭投げ込むだけじゃなかとよー！」
1792 = "「是咧！我的工作可不只是加煤而已喲！」" 

# monologue
# JP: （ざっ）
2784 = "（唰）" 

# monologue
# JP: そうは言いつつやはり投げ込みも欠かせない。
2754 = "雖然這麼說著，但日日姬也沒有忘了自己的加煤任務。" 

# monologue
# JP: 日々姫は鮮やかにワンスコを操り、\n\x%l火室;#00ffc040;火室%l;#;の炎を維持しつづける。
2335 = "她熟練地使用公斤鍬加煤，維持著\\x%l火室;#00ffc040;燃燒室%l;#;裡的火焰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ボイラ内の水は、石炭が燃える熱により蒸気に変わる。\n生まれた蒸気は、この\x%l加減弁;#00ffc040;加減弁%l;#;テコ――」
2033 = "「鍋爐裡的水會被煤炭產生的熱量加熱汽化。使用這個\\x%l加減弁;#00ffc040;汽門%l;#;操作杆就可以使產生的蒸汽——」" 

# monologue
# JP: （ぐっ――クンっ！）
2789 = "（喀——哐！）" 

# 【真闇】
# display as 真闇
# JP: 「わ！？」
1588 = "「哇！？」" 

# monologue
# JP: かなり大きめに開いたせいで、加速に衝撃がともなった。
2544 = "看來我把閥門開太大了，帶來的加速衝擊也不是一點半點。" 

# monologue
# JP: ハチロクの顔に微妙な苦笑が浮いてしまうが、\n速度制限も無い区間――このくらいの方が説明に良い。
2242 = "八六臉上浮現出了一絲苦笑，不過這路段沒有限速——這樣的速度更方便我好好跟真闇姐說明。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――これを引き込むと弁が開かれ、\nシリンダーに流れ込む蒸気の量が増加する」
1122 = "「——只要拉動這個就能打開閥門增加流入汽缸的蒸汽量」" 

# 【ハチロク】
# display as 八六
# JP: 「シリンダの中にはピストンがございます。\nそのピストンの運動が、\x%l動輪;#00ffc040;動輪%l;#;の回転運動となるのです」
1822 = "「汽缸之中有活塞。活塞的運動就會帶動\\x%l動輪;#00ffc040;動輪%l;#;運轉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、シリンダーに送り込む蒸気の量が増えれば、\n\x%l動輪;#00ffc040;動輪%l;#;回転も速くなり、加速するのだ――っと」
1757 = "「所以只要增加流入汽缸的蒸汽量，就可以使\\x%l動輪;#00ffc040;動輪%l;#;的運轉速度提升，帶動列車加速——哎喲」" 

# monologue
# JP: （くっ――くいっ）
2793 = "（拉——拉）" 

# 【真闇】
# display as 真闇
# JP: 「今のは、なんばしよったと？」
1541 = "「剛才你做了什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「シリンダーから水を抜いたのだ。\nこのシリンダー排水弁を、開けて、閉じる」
1896 = "「給汽缸放水。也就是把這個汽缸排水閥打開以後馬上合上」" 

# 【真闇】
# display as 真闇
# JP: 「なんで、開けてすぐ閉めたとよ？」
1847 = "「為什麼打開後馬上又合上咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「シリンダー内に流れた蒸気のいくらかは、そこで冷えて、\n水に戻ってしまう。だから、弁を開けて外に捨てる」
1683 = "「因為流入汽缸內的蒸汽有一部分會在氣缸內冷凝為水。所以要打開閥門讓水排出去」" 

# 【ハチロク】
# display as 八六
# JP: 「しかしながら、\n開けっ放しでは蒸気も逃げてしまいますので――」
1567 = "「可是如果開著閥門不合起來，氣缸內的蒸汽會洩漏殆盡——」" 

# 【真闇】
# display as 真闇
# JP: 「あ！　だから一瞬で開け閉めば」
1623 = "「啊！所以只需要開閉一瞬間」" 

# monologue
# JP: ふんふんと、真闇姉が頷いているような気配を感じる。
2407 = "我可以感覺到真闇姐理解地點了點頭。" 

# monologue
# JP: キャブの狭い窓が切り取る車窓風景を見るよりも、\nむしろ蒸気機関の方を、熱心に見てくれてるようだ。
2543 = "看來她對狹小的駕駛室內車窗映出的風景不甚感興趣，反倒是好奇地在意起了蒸汽引擎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸気は、\n動かすだけでなく、止まるためにも役立ってくれる」
1901 = "「而且蒸汽不光能推動列車，還可以讓列車減速、停止」" 

# monologue
# JP: ならば、その期待に応えたい。
2481 = "既然這樣，那我可要好好回應她的好奇心才行。" 

# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;に常にかけている手を一瞬離して、\nこれが\x%lブレーキ;#00ffc040;ブレーキ%l;#;を作用させると動かし示す。
2437 = "我短暫地鬆開了一下一直拉著\\x%l自弁;#00ffc040;自剎%l;#;的手，向她示範如何\\x%lブレーキ;#00ffc040;剎車%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lブレーキ;#00ffc040;ブレーキ%l;#;を保つのは圧縮空気の働きで。\nそれを作る\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;の動力も、もちろん蒸気だからだ」
1938 = "「負責穩住\\x%lブレーキ;#00ffc040;剎車%l;#;的就是壓縮空氣。負責給\\x%l空気圧縮機;#00ffc040;空氣壓縮機%l;#;提供動力的當然也是蒸汽」" 

# monologue
# JP: 言いつつ、\x%l逆転機;#00ffc040;逆転機%l;#;を\x%lミッドギア;#00ffc040;ミッドギア%l;#;。\nわかりやすいよう、ゆっくり大きく操作する。
2454 = "我邊說邊把\\x%l逆転機;#00ffc040;回動機%l;#;調到\\x%lミッドギア;#00ffc040;中位檔%l;#;。我故意緩慢、大幅度地執行每一個動作，力求簡單易懂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この\x%l逆転機;#00ffc040;逆転機%l;#;は、自動車でいえばギアだ。\n前進、後進、\x%lミッドギア;#00ffc040;ミッドギア%l;#;――つまり[ニュートラル,1]中立に設定できる」
1974 = "「這個\\x%l逆転機;#00ffc040;回動機%l;#;可以理解為汽車上的變速箱。分別有前進檔、後退檔、\\x%lミッドギア;#00ffc040;中位檔%l;#;——也就是類似空檔的狀態」" 

# monologue
# JP: そして\x%l加減弁;#00ffc040;加減弁%l;#;をじわじわ閉じつつ、\n\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を開けてみせる。
2744 = "隨後我將\\x%l加減弁;#00ffc040;汽門%l;#;徐徐關閉，同時打開了\\x%lバイパス弁;#00ffc040;旁路閥%l;#;給她看。" 

# 【真闇】
# display as 真闇
# JP: 「今のは、何と？」
1986 = "「這是又做了什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず、\x%l加減弁;#00ffc040;加減弁%l;#;を閉じた」
1750 = "「我首先把\\x%l加減弁;#00ffc040;汽門%l;#;給關了」" 

# 【真闇】
# display as 真闇
# JP: 「そんテコを戻しこんだのが、それとね？」
1723 = "「就是你剛才把那個閥門拉回來的時候？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。結果、シリンダーへ蒸気は入らなくなった。\nこの状態を、\x%l絶気運転;#00ffc040;絶気運転%l;#;という」
1652 = "「嗯。最後將不會有蒸汽進到汽缸裡。我們稱這個狀態為\\x%l絶気運転;#00ffc040;無汽行駛%l;#;」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 1658 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、\x%l絶気運転;#00ffc040;絶気運転%l;#;中もシリンダー内のピストンは動き続ける。\nそうなると、ピストン内部の空気の逃げ場が失くなる」
1452 = "「不過\\x%l絶気運転;#00ffc040;無汽行駛%l;#;過程中汽缸內的活塞還是會繼續運作。這樣一來活塞內兩邊的空氣就無處可去了」" 

# 【ハチロク】
# display as 八六
# JP: 「注射器に空気を詰めて、その先端を塞いだままに、\n押し子を無理に動かしているような状態です」
1771 = "「打個比方的話就是在注射器裡抽進空氣，然後堵住出口，再強行推動活塞柄的感覺」" 

# 【真闇】
# display as 真闇
# JP: 「ああ」
1594 = "「哦——」" 

# monologue
# JP: 納得の声。\nハチロクの補足説明が、真闇姉の理解を促したようだ。
2593 = "真闇姐理解道。看來八六的補充讓真闇姐理解得更透徹了。" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんしたまま動かし続けたら、\nシリンダーば壊れてしまうと？」
1991 = "「這樣一直往復的話，汽缸不會壞掉嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「可能性はある。\nだからバイパス――空気の逃げ場を開く必要が出てくる」
1810 = "「有這個可能。所以必須要打開旁路閥——使空氣得以流動」" 

# monologue
# JP: 開放のままの\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を、\nとんとん、指先で叩いてしめす。
2426 = "我敲了敲打開了的\\x%lバイパス弁;#00ffc040;旁路閥%l;#;，讓真闇姐知道是哪裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これを開けば、空気の逃げ道を作れるのだ」
1561 = "「只要把它打開，空氣就有了流動的途徑」" 

# 【真闇】
# display as 真闇
# JP: 「はぁぁ……細かかとこまでよぅ出来とるねぇ」
1598 = "「唉……還做得這麼細緻啊」" 

# monologue
# JP: シリンダー排水弁を開いて閉じて、\n\x%l逆転機;#00ffc040;逆転機%l;#;をまた\x%l前進フルギア;#00ffc040;前進フルギア%l;#;、同時に\x%lバイパス弁;#00ffc040;バイパス弁%l;#;も閉じ――
2405 = "我又開閉了一次汽缸的排水閥，而後將\\x%l逆転機;#00ffc040;回動機%l;#;調至\\x%l前進フルギア;#00ffc040;滿檔前進%l;#;，同時關閉了\\x%lバイパス弁;#00ffc040;旁路閥%l;#;——" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、ここからは\x%lブレーキ;#00ffc040;ブレーキ%l;#;だ」
1709 = "「好，接下來就要\\x%lブレーキ;#00ffc040;剎車%l;#;了」" 

# monologue
