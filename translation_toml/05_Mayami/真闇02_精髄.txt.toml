[script]
# lines: 439 
# 【双鉄】
# display as 雙鐵
# JP: 「驚いたな」
1697 = "「Ngạc nhiên thật đấy.」"
# monologue
# JP: 味が違う。
2709 = "Hương vị khác hẳn."
# monologue
# JP: 同じ酒米、同じ水、同じ酵母に同じ設備、\n蒸留法も全く同じであるというのに。
2495 = "Cùng một loại gạo nấu rượu, cùng một loại nước, cùng một loại men, cùng một thiết bị, và phương pháp chưng cất cũng hoàn toàn giống nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが温度管理をしたものは雑味が多い。\nありてい言えば、うまくない」
1983 = "「Loại do Hachiroku quản lý nhiệt độ có rất nhiều tạp vị. Nói thẳng ra là, không ngon.」"
# monologue
# JP: 驚くほどにスッキリ感を欠いている。
2724 = "Nó thiếu đi sự thanh mát một cách đáng ngạc nhiên."
# monologue
# JP: いかにもクマ焼酎らしい、米の風味があるのはいいが、\nそれが強すぎ、いっそ濁りとなっている。
2716 = "Hương vị gạo đặc trưng của Kuma shochu thì tốt đấy, nhưng nó quá mạnh, đến mức trở nên vẩn đục."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留をしてなお、何故これほどに味が残るのだ？」
1848 = "「Tại sao sau khi chưng cất mà hương vị vẫn còn đọng lại nhiều đến vậy?」"
# 【真闇】
# display as 真闇
# JP: 「何故って双ちゃん」
1720 = "「Tại sao á, Sou-chan.」"
# monologue
# JP: ちょっと呆れたような顔。
2572 = "Một khuôn mặt có chút sững sờ."
# 【真闇】
# display as 真闇
# JP: 「蒸留ばしておんなじ味になるよーなら、\n酒づくりに\\x%l杜氏;#00ffc040;杜氏%l;#;なんていらんとよ」
1926 = "「Nếu chưng cất xong mà mùi vị nào cũng giống nhau, thì việc ủ rượu đâu cần đến \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; làm gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、それはそうなのだが――」
1630 = "「À không, đúng là vậy nhưng mà——」"
# monologue
# JP: ごく当然の指摘にけれど、戸惑わされる。
2342 = "Mặc dù đó là một lời chỉ trích hoàn toàn hiển nhiên, nhưng tôi vẫn cảm thấy bối rối."
# monologue
# JP: 養子であるとて、僕も右田の一員だ。\n酒を作る手順なら、ひと通り教わっている筈なのに――
2753 = "Dù là con nuôi, tôi cũng là một thành viên của nhà Migita. Quy trình làm rượu thì tôi cũng đã được học qua một lượt rồi cơ mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「……うむ？　味の違いは……\n素材や水は当然なのだが――その他だと」
1155 = "「......Ừm? Sự khác biệt về hương vị là do...... Nguyên liệu và nước thì đương nhiên rồi, nhưng——ngoài ra thì.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんなら、ちょこっと考えればわかるけん。\n前の蒸気焼酎とこれと、違いは何ね？」
1721 = "「Nếu là Sou-chan thì chỉ cần suy nghĩ một chút là hiểu ngay thôi. Shochu hơi nước trước đây và loại này, khác nhau ở điểm nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「違いは……だから、温度管理だけなのだよな。\n以前のは真闇姉が、これはハチロクが行っている」
1444 = "「Sự khác biệt là......chỉ ở khâu quản lý nhiệt độ thôi nhỉ. Loại trước đây là do chị Mayami làm, còn loại này là do Hachiroku làm.」"
# 【真闇】
# display as 真闇
# JP: 「何の、温度管理と？」
1930 = "「Quản lý nhiệt độ của cái gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、[こうじ]麹――[こめこうじ,1]米麹と\\x%lもろみ;#00ffc040;もろみ%l;#;とだ」
1799 = "「Đó là, men kōji——men kōji gạo và \\x%lもろみ;#00ffc040;cơm rượu%l;#;.」"
# 【真闇】
# display as 真闇
# JP: 「[こめこうじ,1]米麹は、何から、どーやってつくっと？」
2025 = "「Men kōji gạo được làm từ cái gì, và làm như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[さかまい,1]酒米を蒸して、[たねこうじ,1]種麹を種付けて、それを保温して、\n切り返して寝かせる」
2053 = "「Hấp gạo nấu rượu, rắc bào tử men kōji lên, giữ ấm, đảo đều và ủ.」"
# 【真闇】
# display as 真闇
# JP: 「うんうん」
1659 = "「Ừm ừm.」"
# monologue
# JP: 相槌は、もっと考えろと促すようで。\nだから素直に、思考を言葉に落としこみつつ整頓していく。
2596 = "Tiếng ậm ừ của chị ấy như đang thúc giục tôi suy nghĩ thêm. Vì vậy, tôi ngoan ngoãn diễn đạt suy nghĩ của mình thành lời và sắp xếp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば麹菌が増える。この米麹に\n焼酎酵母と水とを加え、酵母を増やして\\x%lもろみ;#00ffc040;もろみ%l;#;を作る」
1989 = "「Làm như vậy thì nấm men kōji sẽ sinh sôi. Thêm men shochu và nước vào men kōji gạo này, nhân giống nấm men lên để tạo thành \\x%lもろみ;#00ffc040;cơm rượu%l;#;.」"
# 【真闇】
# display as 真闇
# JP: 「なんで、酵母ば増やさんといけんね？」
1849 = "「Tại sao lại phải nhân giống nấm men?」"
# 【双鉄】
# display as 雙鐵
# JP: 「酵母とは、つまり発酵の母。これが足りんと、\n糖分をアルコールに分解できんからだ」
1684 = "「Nấm men, nói cách khác chính là nguồn gốc của quá trình lên men. Nếu thiếu cái này, thì không thể phân giải lượng đường thành cồn được.」"
# monologue
# JP: ん、と真闇姉の満足気な笑み。\nこの程度なら、僕とてきっちり理解している。
2590 = "Chị Mayami mỉm cười hài lòng. Mức độ này thì tôi hoàn toàn hiểu rõ."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして作った一時\\x%lもろみ;#00ffc040;もろみ%l;#;に、洗米して蒸した酒米と\n水とを加え、発酵させて、二次\\x%lもろみ;#00ffc040;もろみ%l;#;を作る」
1774 = "「Thêm gạo nấu rượu đã vo sạch và hấp chín cùng với nước vào \\x%lもろみ;#00ffc040;cơm rượu%l;#; lên men lần một đã làm ra đó, cho lên men để tạo thành \\x%lもろみ;#00ffc040;cơm rượu%l;#; lên men lần hai.」"
# monologue
# JP: 二次\\x%lもろみ;#00ffc040;もろみ%l;#;の段階ではもう、\n糖分のほとんどがアルコールへと分解されてる。
2622 = "Ở giai đoạn \\x%lもろみ;#00ffc040;cơm rượu%l;#; lên men lần hai, hầu hết lượng đường đã được phân giải thành cồn."
# monologue
# JP: いわば原初の酒であるのだが、\nこの状態では、不純物がいかにも多すぎる。
2244 = "Có thể nói đó là loại rượu nguyên thủy, nhưng ở trạng thái này, có quá nhiều tạp chất."
# 【真闇】
# display as 真闇
# JP: 「ほーたら、出来た二次\\x%lもろみ;#00ffc040;もろみ%l;#;ば、どぎゃんすると？」
1782 = "「Vậy thì, \\x%lもろみ;#00ffc040;cơm rượu%l;#; lên men lần hai sau khi làm xong sẽ được xử lý như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「蒸留だ。蒸気焼酎の場合は――\n石炭ボイラで焚いたスチームを使っての[じょうあつ,1]常圧蒸留だよな」
1920 = "「Chưng cất. Trong trường hợp của shochu hơi nước thì—— là chưng cất áp suất thường sử dụng hơi nước đun bằng lò hơi đốt than nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「そーね。で、加熱されて気化したアルコールと水を、\n冷却器で冷やして戻せば、米焼酎の出来上がりばい」
1825 = "「Đúng vậy. Sau đó, cồn và nước bốc hơi do bị đun nóng sẽ được làm lạnh bằng máy làm lạnh để ngưng tụ lại, thế là hoàn thành món shochu gạo.」"
# monologue
# JP: 真闇姉がまとめてくれて、ホっとする。\nここまでの僕の知識に、間違いなどは無かったようだ。
2579 = "Chị Mayami đã tóm tắt lại giúp tôi, khiến tôi thở phào nhẹ nhõm. Có vẻ như kiến thức của tôi cho đến nay không có gì sai sót."
# monologue
# JP: ならこの先は――考えをさらに掘り下げればいい。
2542 = "Vậy thì tiếp theo——tôi chỉ cần đào sâu suy nghĩ thêm nữa là được."
# 【双鉄】
# display as 雙鐵
# JP: 「雑味と風味とは紙一重だ。風味を決めるのは、\n素材、酵母、発酵、熟成――ああ！」
2047 = "「Tạp vị và hương vị chỉ cách nhau một ranh giới mỏng manh. Yếu tố quyết định hương vị là, nguyên liệu, men, quá trình lên men, quá trình ủ——A!」"
# monologue
# JP: 知識と事態が、やっと繋がる。
2441 = "Kiến thức và tình hình thực tế, cuối cùng cũng đã kết nối với nhau."
# monologue
# JP: 熟成をしてない状態で試飲して、\n素材も酵母も完全に同一なのだから――
2370 = "Nếm thử trong tình trạng chưa ủ, mà nguyên liệu và men lại hoàn toàn giống nhau, vậy thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「温度管理で増殖したり死滅したりが決まるのは……\n[こうじきん,1]麹菌や酵母だけではないのだな」
1564 = "「Việc sinh sôi hay chết đi do quản lý nhiệt độ quyết định...... không chỉ có nấm men kōji hay nấm men thôi đâu nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「そーねぇ」
1717 = "「Đúng vậy.」"
# monologue
# JP: 満足そうな深い頷き。\n真闇姉の顔には、合格点といわんばかりの笑顔が浮かぶ。
2591 = "Một cái gật đầu thật sâu đầy mãn nguyện. Trên khuôn mặt chị Mayami nở một nụ cười như muốn nói rằng tôi đã đạt điểm chuẩn."
# 【真闇】
# display as 真闇
# JP: 「\\x%lもろみ;#00ffc040;もろみ%l;#;には、いろんな種類の乳酸菌やカビもおるけん。\n温度ひとつで、育つもんと死ぬもんとが決まるとよ」
1108 = "「Trong \\x%lもろみ;#00ffc040;cơm rượu%l;#; còn có rất nhiều loại vi khuẩn axit lactic và nấm mốc khác nữa. Chỉ cần một thay đổi nhỏ về nhiệt độ cũng sẽ quyết định sự sống chết của chúng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そして、その乳酸菌やカビの働きが、\n素材や水だけに由来せぬ、いわゆる風味を決めるのか」
1903 = "「Và hoạt động của những vi khuẩn axit lactic hay nấm mốc đó, không chỉ bắt nguồn từ nguyên liệu hay nước, mà sẽ quyết định cái gọi là hương vị sao.」"
# monologue
# JP: ……どんな作業を行うかならば、知っていた。\n知ってはいたが、わかってなかった。
1102 = "......Nếu hỏi về việc thực hiện những công đoạn nào, thì tôi biết. Biết thì biết đấy, nhưng tôi lại không hiểu."
# monologue
# JP: \\x%l杜氏;#00ffc040;杜氏%l;#;が酒の味を決めるというのは、つまり――\n風味を決める要素を左右するということなのだ。
69 = "Việc \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; quyết định hương vị của rượu, nói cách khác là—— chi phối những yếu tố quyết định hương vị đó."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、今まで積み重ねた経験によって、\n旨い酒を作る菌やカビやらを活かすことができる」
1882 = "「Nhờ vào kinh nghiệm tích lũy từ trước đến nay, chị Mayami có thể tận dụng những loại vi khuẩn hay nấm mốc để tạo ra loại rượu ngon.」"
# monologue
# JP: こくん、と頷き。\n真闇姉は僕の方へと手を伸ばす。
2608 = "Gật đầu cái rụp. Chị Mayami đưa tay về phía tôi."
# monologue
# JP: 求められてるものが何かわかったような気がして、\nまだ一口しか飲んでない試飲のグラスをその手に返す。
2394 = "Cảm giác như đã hiểu được thứ chị ấy muốn, tôi trả lại chiếc ly nếm thử mới chỉ uống một ngụm vào tay chị ấy."
# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんばおってくれたら、そいを理詰めで、\nもっと揺れなく。再現して、より突き詰めていけるけん」
1925 = "「Nếu có Hachiroku-chan ở đây, em ấy sẽ dùng lý lẽ để giảm bớt sự dao động. Có thể tái hiện lại, và đào sâu hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが真闇姉の目指す、新しい蒸気焼酎なのか」
2018 = "「Đó có phải là loại shochu hơi nước mới mà chị Mayami đang hướng tới không?」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんふうに考えると――」
1503 = "「Nếu nghĩ theo hướng đó thì——」"
# monologue
# JP: 試飲のコップにふわり温かな目を落とし、\n真闇姉はクイ、と半分ほど空ける。
2610 = "Chị Mayami dịu dàng hướng ánh mắt ấm áp xuống chiếc ly nếm thử, rồi nốc cạn một nửa."
# 【真闇】
# display as 真闇
# JP: 「こん雑味も、なかなか良かもんとよ。\n可能性の、たっぷり詰まった味やけん」
1530 = "「Cái tạp vị này, cũng khá ngon đấy chứ. Là một hương vị chứa đầy tiềm năng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1544 = "「Ra là vậy.」"
# 【真闇】
# display as 真闇
# JP: 「あ」
1613 = "「A.」"
# monologue
# JP: 真闇姉からコップを取って、\n残りを一気に空けてみる。
2415 = "Tôi lấy lại chiếc ly từ chị Mayami, và nốc cạn phần còn lại trong một hơi."
# 【双鉄】
# display as 雙鐵
# JP: 「可能性の味、か。ここからどれほど、旨い焼酎が、\nそして新しい未来が産まれるのかな」
1987 = "「Hương vị của tiềm năng sao. Từ đây, sẽ có bao nhiêu loại shochu ngon, và một tương lai mới nào sẽ được sinh ra nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「新しい未来は、言い過ぎ。大げさすぎよぉ」
1103 = "「Tương lai mới thì nói quá rồi. Phóng đại quá đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、全く大げさではない。それを試し――\n酒造りに\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が有用であると、証明できれば」
1459 = "「Không đâu, hoàn toàn không phóng đại chút nào. Nếu thử nghiệm điều đó—— và chứng minh được rằng \\x%lレイルロオド;#00ffc040;Railord%l;#; rất hữu ích trong việc ủ rượu.」"
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;に追われての大廃線は日ノ本だけの現象ではない。
66 = "Sự kiện đại bãi bỏ các tuyến đường sắt do bị \\x%lエアクラ;#00ffc040;Aircra%l;#; chèn ép không chỉ là hiện tượng riêng ở Hinomoto."
# monologue
# JP: 世界中にはまだ数多くの、\\x%l列車;#00ffc040;列車%l;#;を無くした\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nきっと生き延びている筈だ。
2319 = "Trên thế giới chắc chắn vẫn còn rất nhiều \\x%lレイルロオド;#00ffc040;Railord%l;#; mất đi \\x%l列車;#00ffc040;đoàn tàu%l;#; của mình đang sống sót."
# 【双鉄】
# display as 雙鐵
# JP: 「その暁には人と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とに新しい関係が築かれる。\n人間の感覚という領域に、新たな扉が開かれるのだから」
1992 = "「Khi đó, một mối quan hệ mới giữa con người và \\x%lレイルロオド;#00ffc040;Railord%l;#; sẽ được thiết lập. Bởi vì một cánh cửa mới sẽ được mở ra trong lĩnh vực cảm giác của con người.」"
# 【真闇】
# display as 真闇
# JP: 「わ」
1584 = "「Oa.」"
# monologue
# JP: 何故かぽかん、と真闇姉の口が開いてしまう。
2189 = "Không hiểu sao chị Mayami lại há hốc mồm ngạc nhiên."
# 【真闇】
# display as 真闇
# JP: 「――双ちゃん、すごかこと考えよるねぇ」
1124 = "「——Sou-chan, em đang nghĩ đến một điều thật vĩ đại đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、これは真闇姉の考えだろう」
1595 = "「Không, đây là suy nghĩ của chị Mayami mà.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんとスケールの大きかこつ、考えもよらんばい。\nうちはただ、良か酒、新しか酒ば作りたいだけとよ」
1578 = "「Chị chưa từng nghĩ đến quy mô lớn như vậy đâu. Chị chỉ muốn làm ra loại rượu ngon, loại rượu mới thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1795 = "「Vậy sao?」"
# monologue
# JP: 真闇姉に引っ張られ、自然と湧いた考えだったが……
2749 = "Bị chị Mayami cuốn theo, nên suy nghĩ đó tự nhiên nảy sinh thôi nhưng......"
# monologue
# JP: それが真闇姉に無い発想ならば、\n僕も少しはこの件で、貢献していけるのかもしれん。
2479 = "Nếu đó là một ý tưởng mà chị Mayami không có, thì có lẽ tôi cũng có thể đóng góp chút ít vào chuyện này."
# 【双鉄】
# display as 雙鐵
# JP: 「では、旨い酒ができたときには、\n僕のアイディアもその上に乗っからせて欲しい」
2013 = "「Vậy thì, khi nào làm ra được loại rượu ngon, hãy cho em đóng góp thêm ý tưởng của mình vào đó nhé.」"
# 【真闇】
# display as 真闇
# JP: 「大歓迎たい！」
1819 = "「Vô cùng hoan nghênh!」"
# monologue
# JP: 喜んでくれているのだろうか、\n真闇姉の頬は、いくらか赤らんでみえる。
2573 = "Chắc hẳn chị ấy đang rất vui, hai má chị Mayami ửng hồng lên thấy rõ."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんのアイディアば形にするためにも、\nもっと、頑張らんと――っと」
1843 = "「Để biến ý tưởng của Sou-chan thành hiện thực, chị phải cố gắng nhiều hơn nữa mới được——Á.」"
# monologue
# JP: 言いかけた声が、苦笑に崩れる。
2345 = "Giọng nói đang dang dở bỗng vỡ òa thành một nụ cười gượng."
# 【真闇】
# display as 真闇
# JP: 「ま、実際にいっとう頑張ってもらわんといけんのは、\nハチロクちゃんになってしまいよるけどねぇ」
1456 = "「Mà, người thực sự phải cố gắng nhiều nhất, lại là Hachiroku-chan mất rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1793 = "「À——」"
# monologue
# JP: そうだ、その点は確認せねば。
2515 = "Đúng rồi, tôi phải xác nhận điểm đó mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどうなのだ？\n酒造りを、楽しめているようか？」
1517 = "「Hachiroku dạo này thế nào? Em ấy có vẻ thích thú với việc ủ rượu không?」"
# 【真闇】
# display as 真闇
# JP: 「機嫌よぉ仕事してくれとるよ？\n合間合間に双ちゃんのこと、楽しげに聞かせてくれよる」
1703 = "「Em ấy làm việc với tâm trạng rất tốt đấy? Thỉnh thoảng trong lúc nghỉ ngơi, em ấy lại vui vẻ kể cho chị nghe chuyện về Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕のことを？」
2041 = "「Chuyện về em sao?」"
# 【真闇】
# display as 真闇
# JP: 「双鉄様には\\x%l機関士;#00ffc040;機関士%l;#;の才能がございます――とか、\nそんな感じで、ことあるたんびに大絶賛とよ」
1700 = "「Ngài Soutetsu có tài năng của một \\x%l機関士;#00ffc040;lái tàu%l;#; đấy ạ——đại loại thế, cứ có dịp là em ấy lại hết lời khen ngợi em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l機関士;#00ffc040;機関士%l;#;の才……か？　どうかな？\nハチロクに言われるままに動いているだけなのだが」
1507 = "「Tài năng của một \\x%l機関士;#00ffc040;lái tàu%l;#;......sao? Ai biết được? Em chỉ làm theo những gì Hachiroku bảo thôi mà.」"
# 【真闇】
# display as 真闇
# JP: 「フォローばすごくしてくれとるから、酒造りの方、\n気持ちよぉ切り替えて取り組めるともゆうとったよ？」
1705 = "「Em ấy còn nói là nhờ em hỗ trợ rất nhiều, nên em ấy mới có thể thoải mái chuyển đổi tâm trạng để tập trung vào việc ủ rượu đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「フォローは……無論、\n出来る限りはしているのだが――」
1981 = "「Việc hỗ trợ thì......tất nhiên, em đang cố gắng hết sức có thể nhưng——」"
# monologue
# JP: しかし、ハチロクに代わりしていることの中身といえば、\n僕でも行える範囲の点検・整備がほぼ全て。
2276 = "Tuy nhiên, những việc tôi làm thay Hachiroku, hầu như chỉ là kiểm tra và bảo dưỡng trong phạm vi tôi có thể làm."
# monologue
# JP: 僕としては、むしろ\\x%l庫内手;#00ffc040;庫内手%l;#;のスキルの方が、\nぐんぐん伸びていってる感覚さえもある。
2367 = "Về phần mình, tôi thậm chí còn có cảm giác kỹ năng của một \\x%l庫内手;#00ffc040;máy rửa lò%l;#; đang tăng lên vùn vụt."
# 【真闇】
# display as 真闇
# JP: 「あー。うん」
1605 = "「A. Ừm.」"
# monologue
# JP: そこらの事情を苦笑まじりに説明すれば、\n何故か真闇姉は、納得をした顔になる。
2449 = "Khi tôi vừa cười gượng vừa giải thích những chuyện đó, không hiểu sao chị Mayami lại lộ vẻ mặt thấu hiểu."
# 【真闇】
# display as 真闇
# JP: 「ほんならあるとね、双ちゃんには。\nハチロクちゃんの言うとる、“\\x%l機関士;#00ffc040;機関士%l;#;の才”」
1526 = "「Vậy là Sou-chan có đấy. Cái gọi là “tài năng của một \\x%l機関士;#00ffc040;lái tàu%l;#;” mà Hachiroku-chan nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\n今の話で何故そう思う？」
1669 = "「Ừm? Qua câu chuyện vừa rồi, tại sao chị lại nghĩ vậy?」"
# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんば活かすため、自分のことを後に回す。\nそぎゃん風にできるんは、間違いなく才の一つとよ」
1501 = "「Để phát huy khả năng của Hachiroku-chan, em đã gác lại việc của mình. Việc có thể làm được như vậy, chắc chắn là một trong những tài năng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう言われれば……\nそう、なのかな」
1904 = "「Nếu chị đã nói vậy...... thì có lẽ, là thế nhỉ.」"
# monologue
# JP: ハチロクを活かすため、というよりも。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回の道をなんとしても開くため――
2646 = "Hơn là để phát huy khả năng của Hachiroku. Là để bằng mọi giá mở ra con đường rút lại quyết định kêu gọi đầu tư nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;——"
# monologue
# JP: 自分の目的を果たすため、\n最善手を選び動いているだけという気もするのだが……
2757 = "Tôi có cảm giác mình chỉ đang chọn và thực hiện nước đi tốt nhất để đạt được mục đích của bản thân mà thôi......"
# 【真闇】
# display as 真闇
# JP: 「間違いなかと。双ちゃんにはそぎゃんして、\n周りの人ばやる気にさせる才があるけん！」
1905 = "「Không sai đâu. Sou-chan có tài năng truyền động lực cho những người xung quanh bằng cách đó đấy!」"
# monologue
# JP: 断言される。
2585 = "Chị ấy khẳng định chắc nịch."
# monologue
# JP: 僕を見る目も自信に満ちて、\n迷いを消してくれる気さえする。
2340 = "Ánh mắt chị ấy nhìn tôi cũng tràn đầy tự tin, như thể muốn xóa tan đi mọi sự do dự trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n真闇姉がそういってくれるなら、そうだろうな」
1794 = "「Vậy sao. Nếu chị Mayami đã nói thế, thì chắc là vậy rồi.」"
# 【真闇】
# display as 真闇
# JP: 「そうそう。でなきゃ、ハチロクちゃん。\nあぎゃんと嬉しそうに乗務の話ば聞かせてくれんよ」
1826 = "「Đúng vậy đúng vậy. Nếu không thì, Hachiroku-chan đã chẳng vui vẻ kể cho chị nghe chuyện công việc trên tàu như thế đâu.」"
# monologue
# JP: 初めて聞くほどはしゃいだ声。\nなのにふと、真闇姉の顔に淋しげな色が滲み出る。
2429 = "Một giọng nói hào hứng mà tôi chưa từng nghe thấy. Nhưng chợt, trên khuôn mặt chị Mayami lại thoáng nét buồn bã."
# 【真闇】
# display as 真闇
# JP: 「……良かねぇ。機関車ば楽しげで」
1160 = "「......Thích thật đấy. Có vẻ vui vẻ với đầu máy xe lửa nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、大変だが楽しいぞ。\n多分、それは真闇姉の酒づくりと同じだろう――っと」
1666 = "「À, vất vả nhưng mà vui lắm. Có lẽ, nó cũng giống như công việc ủ rượu của chị Mayami thôi——Á.」"
# monologue
# JP: そうだ。\n酒造りについて知ることで、あらたな気づきを僕は得た。
2363 = "Đúng rồi. Nhờ tìm hiểu về việc ủ rượu, tôi đã có thêm một nhận thức mới."
# monologue
# JP: ならば、真闇姉にも\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;について学んでもらえば、\nさらに新たな何かが産まれてくるかもしれん。
2472 = "Nếu vậy, nếu để chị Mayami tìm hiểu về \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;, thì biết đâu sẽ lại có một điều gì đó mới mẻ được sinh ra."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだろうか、真闇姉。忙しいことはわかっているが、\n一度、[ハチロクニイマル,3]8620に乗ってみないか？」
1888 = "「Ý chị thế nào, chị Mayami. Em biết chị rất bận, nhưng chị có muốn thử ngồi lên chiếc \\x%l8620;#00ffc040;8620%l;#; một lần không?」"
# 【真闇】
# display as 真闇
# JP: 「あ～……乗れたら嬉しかけどねぇ。\n\\x%l客車;#00ffc040;客車%l;#;ば、まだ無かとでしょお？」
1632 = "「A~......Nếu được ngồi thì thích thật đấy. Nhưng mà, vẫn chưa có \\x%l客車;#00ffc040;toa hành khách%l;#; đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ポーレットは手応えを掴んでいるようだった。\n近日中にも、あるいは朗報を聞けるかもしれん」
1462 = "「Không đâu, có vẻ như Paulette đã nắm được manh mối rồi. Có thể trong vài ngày tới, chúng ta sẽ nghe được tin vui đấy.」"
# monologue
# JP: 言った瞬間、ぱ、と華やぐ。
2681 = "Ngay khoảnh khắc tôi vừa dứt lời, khuôn mặt chị ấy bừng sáng."
# 【真闇】
# display as 真闇
# JP: 「そりゃ良かとねぇ！　なら、そんときに」
2015 = "「Thế thì tuyệt quá! Vậy thì, đến lúc đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、そうではなく、キャブ――\n\\x%l運転台;#00ffc040;運転台%l;#;に、乗ってみてはどうかと思っているのだ」
1616 = "「À không, không phải thế, ý em là buồng lái—— chị có muốn thử ngồi lên \\x%l運転台;#00ffc040;buồng lái%l;#; không.」"
# 【真闇】
# display as 真闇
# JP: 「\\x%l運転台;#00ffc040;運転台%l;#;って……乗せてもらえるもんとや？」
1907 = "「\\x%l運転台;#00ffc040;Buồng lái%l;#; á......Có được cho lên ngồi không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉なら、\nハチロクもポーレットも喜んで許可をくれるだろう」
1515 = "「Nếu là chị Mayami, thì Hachiroku và Paulette chắc chắn sẽ vui vẻ đồng ý thôi.」"
# monologue
# JP: 本来ならば見習い時代は、\n指導\\x%l機関士;#00ffc040;機関士%l;#;も同乗すると聞かされた。
2637 = "Tôi nghe nói, vốn dĩ trong thời gian tập sự, \\x%l機関士;#00ffc040;lái tàu%l;#; hướng dẫn cũng sẽ đi cùng."
# monologue
# JP: キャブ内は確かに手狭な場所ではあるが、\n真闇姉一人増えたところで、運行には全く支障はない。
2235 = "Bên trong buồng lái quả thực là một nơi chật hẹp, nhưng thêm một mình chị Mayami thì cũng không ảnh hưởng gì đến việc vận hành."
# 【双鉄】
# display as 雙鐵
# JP: 「焼酎\\x%l列車;#00ffc040;列車%l;#;の案が更に深まるかもしれないし、\n僕としては、是非とも乗ってもらいたい」
1528 = "「Biết đâu ý tưởng về chuyến \\x%l列車;#00ffc040;tàu%l;#; shochu sẽ càng sâu sắc hơn, về phần em, em rất muốn chị thử lên ngồi.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、許可ばもらえたそんときには――」
1787 = "「Vậy thì, khi nào được cho phép thì——」"
# monologue
# JP: 真闇姉が身を屈め、\n甘えたような上目遣いで、僕を見てくる。
2581 = "Chị Mayami hơi cúi người, ngước mắt nhìn tôi với vẻ nũng nịu."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんのお仕事っぷり、\n見せてもらって、よかと？」
1453 = "「Chị xem Sou-chan làm việc có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「良かとだ真闇姉。大歓迎だ」
1863 = "「Được chứ chị Mayami. Vô cùng hoan nghênh luôn.」"
# monologue
# JP: 見慣れぬしぐさに動揺し、\n喉が勝手に返した言葉に、心が遅れて理解する。
2330 = "Bối rối trước cử chỉ không quen thuộc ấy, cổ họng tôi tự động buột ra những lời đó, rồi trái tim mới nhận ra muộn màng."
# monologue
# JP: （ああ――本当に大歓迎だ）
2786 = "（A——Mình thực sự rất hoan nghênh.）"
# monologue
# JP: 焼酎\\x%l列車;#00ffc040;列車%l;#;のアイディアも、無論大事なことではあるが。\nそれ以前。
2535 = "Tất nhiên, ý tưởng về chuyến \\x%l列車;#00ffc040;tàu%l;# shochu cũng rất quan trọng. Nhưng trước đó."
# monologue
# JP: 僕は、きっと、真闇姉に。\n自分の仕事を――見て、気に入ってもらいたいのだ。
2446 = "Chắc chắn tôi muốn chị Mayami. Nhìn thấy công việc của mình——và thích nó."
# 【双鉄】
# display as 雙鐵
# JP: 「制限、解除――よしっ！」
1557 = "「Hết hạn chế tốc độ——Rõ!」"
# monologue
# JP: 標識確認・\\x%l喚呼;#00ffc040;喚呼%l;#;を終えれば、ハチロクの目がツと動く。\n……この先しばらくは、森の中。
2239 = "Sau khi xác nhận biển báo và \\x%l喚呼;#00ffc040;hô xác nhận%l;# xong, mắt Hachiroku khẽ động. ......Phía trước một đoạn sẽ là khu vực trong rừng."
# monologue
# JP: 踏切もなく、信号も標識も途切れる区間だ。\n前方注視の解除はできんが、話すくらいの余裕は出来る。
2715 = "Là đoạn đường không có đường ngang, tín hiệu và biển báo cũng ngắt quãng. Dù không thể ngừng chú ý phía trước, nhưng vẫn có thời gian để nói chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、どうだ？　キャブの乗り心地は」
1886 = "「Chị Mayami thấy thế nào? Cảm giác ngồi trong buồng lái ra sao?」"
# 【真闇】
# display as 真闇
# JP: 「暑かね！　狭か！　\nなのに、とっても楽しかと！」
1708 = "「Nóng quá! Chật chội quá! Thế nhưng lại rất vui!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはよかった」
2016 = "「Vậy thì tốt quá.」"
# monologue
# JP: 弾んだ声にホっとする。
2445 = "Giọng nói hào hứng của chị khiến tôi thở phào nhẹ nhõm."
# monologue
# JP: なんだか今日はいつもより、暑さがキツいような気がして、\n真闇姉が耐えられるかどうか、少し心配に感じていたから。
2190 = "Không hiểu sao hôm nay tôi cảm thấy cái nóng có vẻ gay gắt hơn mọi khi, nên tôi hơi lo lắng không biết chị Mayami có chịu nổi không."
# 【真闇】
# display as 真闇
# JP: 「それに、見てるの面白かとよ。\n双ちゃん、難しそうな機械ば、見事に操っとるんねぇ」
1899 = "「Hơn nữa, nhìn hai người làm việc cũng thú vị lắm. Sou-chan có thể điều khiển những cỗ máy phức tạp thế này một cách thuần thục nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに見た目は難しそうだが――\n蒸気機関というのは、原理的には単純だ」
1865 = "「Nhìn bề ngoài thì có vẻ khó thật—— nhưng động cơ hơi nước, về nguyên lý thì khá đơn giản.」"
# 【真闇】
# display as 真闇
# JP: 「そーなん？」
# 1795 = "「是嗎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まず、このキャブのすぐ後ろにあるテンダー……\n\\x%l炭水車;#00ffc040;炭水車%l;#;の中には、水と石炭が積まれている」
1656 = "「Ừm. Đầu tiên, ở chiếc tender ngay phía sau buồng lái này...... bên trong \\x%l炭水車;#00ffc040;toa tiếp than nước%l;# có chứa nước và than.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
1658 = "「Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこの給水バルブを捻れば、テンダーの中の水が、\nボイラへと送りこまれる」
1853 = "「Chỉ cần vặn van cấp nước ở đó, nước trong tender sẽ được bơm vào lò hơi.」"
# 【日々姫】
# display as 日日姬
# JP: 「こん水面計が、ボイラ内の水の量ば示しとるけん。\n目盛り、80に保つのが大事かとこばい！」
1854 = "「Cái đồng hồ đo mực nước này hiển thị lượng nước trong lò hơi. Việc giữ vạch chỉ thị ở mức 80 là rất quan trọng đó!」"
# 【真闇】
# display as 真闇
# JP: 「それば、ひーちゃんのお仕事？」
1978 = "「Đó là công việc của Hii-chan sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうばい！　石炭投げ込むだけじゃなかとよー！」
1792 = "「Đúng vậy! Không phải chỉ có xúc than vào thôi đâu!」"
# monologue
# JP: （ざっ）
2784 = "（Xoạch!）"
# monologue
# JP: そうは言いつつやはり投げ込みも欠かせない。
2754 = "Nói thì nói vậy nhưng việc xúc than cũng không thể thiếu."
# monologue
# JP: 日々姫は鮮やかにワンスコを操り、\n\\x%l火室;#00ffc040;火室%l;#;の炎を維持しつづける。
2335 = "Hibiki điều khiển chiếc xẻng xúc than một cách điêu luyện, tiếp tục duy trì ngọn lửa trong \\x%l火室;#00ffc040;buồng đốt%l;#."
# 【双鉄】
# display as 雙鐵
# JP: 「ボイラ内の水は、石炭が燃える熱により蒸気に変わる。\n生まれた蒸気は、この\\x%l加減弁;#00ffc040;加減弁%l;#;テコ――」
2033 = "「Nước trong lò hơi sẽ chuyển thành hơi nước nhờ sức nóng của than cháy. Hơi nước sinh ra, thông qua tay gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;# này——」"
# monologue
# JP: （ぐっ――クンっ！）
2789 = "（Két——Khịch!）"
# 【真闇】
# display as 真闇
# JP: 「わ！？」
1588 = "「Oa!?」"
# monologue
# JP: かなり大きめに開いたせいで、加速に衝撃がともなった。
2544 = "Do tôi mở van khá lớn, nên việc tăng tốc kèm theo một cú sốc."
# monologue
# JP: ハチロクの顔に微妙な苦笑が浮いてしまうが、\n速度制限も無い区間――このくらいの方が説明に良い。
2242 = "Trên khuôn mặt Hachiroku thoáng hiện một nụ cười gượng gạo, nhưng đây là đoạn đường không có giới hạn tốc độ——thế này thì giải thích sẽ dễ hiểu hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「――これを引き込むと弁が開かれ、\nシリンダーに流れ込む蒸気の量が増加する」
1122 = "「——Khi kéo cái này lại, van sẽ mở ra, lượng hơi nước chảy vào xi-lanh sẽ tăng lên.」"
# 【ハチロク】
# display as 八六
# JP: 「シリンダの中にはピストンがございます。\nそのピストンの運動が、\\x%l動輪;#00ffc040;動輪%l;#;の回転運動となるのです」
1822 = "「Bên trong xi-lanh có piston. Chuyển động của piston đó sẽ biến thành chuyển động quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、シリンダーに送り込む蒸気の量が増えれば、\n\\x%l動輪;#00ffc040;動輪%l;#;回転も速くなり、加速するのだ――っと」
1757 = "「Vì vậy, nếu lượng hơi nước bơm vào xi-lanh tăng lên, tốc độ quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;# cũng sẽ nhanh hơn, và tàu sẽ tăng tốc——Á.」"
# monologue
# JP: （くっ――くいっ）
2793 = "（Phụt——Phụt）"
# 【真闇】
# display as 真闇
# JP: 「今のは、なんばしよったと？」
1541 = "「Vừa rồi em làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「シリンダーから水を抜いたのだ。\nこのシリンダー排水弁を、開けて、閉じる」
1896 = "「Em vừa xả nước khỏi xi-lanh. Mở van xả nước xi-lanh này ra, rồi đóng lại.」"
# 【真闇】
# display as 真闇
# JP: 「なんで、開けてすぐ閉めたとよ？」
1847 = "「Tại sao mở ra rồi lại đóng lại ngay?」"
# 【双鉄】
# display as 雙鐵
# JP: 「シリンダー内に流れた蒸気のいくらかは、そこで冷えて、\n水に戻ってしまう。だから、弁を開けて外に捨てる」
1683 = "「Một phần hơi nước chảy vào xi-lanh sẽ nguội đi ở đó, và biến trở lại thành nước. Vì vậy, phải mở van để xả nó ra ngoài.」"
# 【ハチロク】
# display as 八六
# JP: 「しかしながら、\n開けっ放しでは蒸気も逃げてしまいますので――」
1567 = "「Tuy nhiên, nếu cứ mở mãi thì hơi nước cũng sẽ thoát ra ngoài mất, nên——」"
# 【真闇】
# display as 真闇
# JP: 「あ！　だから一瞬で開け閉めば」
1623 = "「A! Nên mới phải đóng mở trong nháy mắt.」"
# monologue
# JP: ふんふんと、真闇姉が頷いているような気配を感じる。
2407 = "Tôi cảm nhận được chị Mayami đang gật gù ra chiều đã hiểu."
# monologue
# JP: キャブの狭い窓が切り取る車窓風景を見るよりも、\nむしろ蒸気機関の方を、熱心に見てくれてるようだ。
2543 = "Có vẻ như chị ấy đang chăm chú nhìn vào động cơ hơi nước, hơn là ngắm phong cảnh qua khung cửa sổ hẹp của buồng lái."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸気は、\n動かすだけでなく、止まるためにも役立ってくれる」
1901 = "「Hơi nước, không chỉ dùng để chạy, mà còn giúp ích cho việc dừng lại nữa.」"
# monologue
# JP: ならば、その期待に応えたい。
2481 = "Nếu vậy, tôi muốn đáp lại sự mong đợi đó."
# monologue
# JP: \\x%l自弁;#00ffc040;自弁%l;#;に常にかけている手を一瞬離して、\nこれが\\x%lブレーキ;#00ffc040;ブレーキ%l;#;を作用させると動かし示す。
2437 = "Tôi buông tay đang giữ \\x%l自弁;#00ffc040;van hãm tự động%l;# ra một thoáng, và làm động tác cho thấy đây là thứ điều khiển \\x%lブレーキ;#00ffc040;phanh%l;#."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lブレーキ;#00ffc040;ブレーキ%l;#;を保つのは圧縮空気の働きで。\nそれを作る\\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;の動力も、もちろん蒸気だからだ」
1938 = "「Việc duy trì \\x%lブレーキ;#00ffc040;phanh%l;# là nhờ hoạt động của khí nén. Và động lực của \\x%l空気圧縮機;#00ffc040;máy nén khí%l;# tạo ra nó, tất nhiên cũng là hơi nước.」"
# monologue
# JP: 言いつつ、\\x%l逆転機;#00ffc040;逆転機%l;#;を\\x%lミッドギア;#00ffc040;ミッドギア%l;#;。\nわかりやすいよう、ゆっくり大きく操作する。
2454 = "Vừa nói, tôi vừa gạt \\x%l逆転機;#00ffc040;cần đảo chiều%l;# về \\x%lミッドギア;#00ffc040;số trung tính%l;#. Tôi thao tác chậm rãi và rõ ràng để chị ấy dễ hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「この\\x%l逆転機;#00ffc040;逆転機%l;#;は、自動車でいえばギアだ。\n前進、後進、\\x%lミッドギア;#00ffc040;ミッドギア%l;#;――つまり[ニュートラル,1]中立に設定できる」
1974 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;# này, nếu so với ô tô thì giống như cần số vậy. Có thể cài đặt tiến, lùi, và \\x%lミッドギア;#00ffc040;số trung tính%l;#——tức là Neutral.」"
# monologue
# JP: そして\\x%l加減弁;#00ffc040;加減弁%l;#;をじわじわ閉じつつ、\n\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を開けてみせる。
2744 = "Rồi tôi từ từ đóng \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;# lại, và mở \\x%lバイパス弁;#00ffc040;van bypass%l;# cho chị ấy xem."
# 【真闇】
# display as 真闇
# JP: 「今のは、何と？」
1986 = "「Vừa rồi em làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まず、\\x%l加減弁;#00ffc040;加減弁%l;#;を閉じた」
1750 = "「Đầu tiên, em đóng \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;# lại.」"
# 【真闇】
# display as 真闇
# JP: 「そんテコを戻しこんだのが、それとね？」
1723 = "「Cái tay gạt em vừa kéo về đó hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。結果、シリンダーへ蒸気は入らなくなった。\nこの状態を、\\x%l絶気運転;#00ffc040;絶気運転%l;#;という」
1652 = "「Đúng vậy. Kết quả là hơi nước không vào xi-lanh nữa. Trạng thái này gọi là \\x%l絶気運転;#00ffc040;chạy cắt hơi%l;#.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 1658 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「が、\\x%l絶気運転;#00ffc040;絶気運転%l;#;中もシリンダー内のピストンは動き続ける。\nそうなると、ピストン内部の空気の逃げ場が失くなる」
1452 = "「Nhưng trong lúc \\x%l絶気運転;#00ffc040;chạy cắt hơi%l;#, piston trong xi-lanh vẫn tiếp tục chuyển động. Khi đó, không khí bên trong piston sẽ không có chỗ thoát.」"
# 【ハチロク】
# display as 八六
# JP: 「注射器に空気を詰めて、その先端を塞いだままに、\n押し子を無理に動かしているような状態です」
1771 = "「Giống như tình trạng bơm đầy không khí vào ống tiêm, bịt kín đầu lại, và cố gắng đẩy pít-tông vậy ạ.」"
# 【真闇】
# display as 真闇
# JP: 「ああ」
1594 = "「À.」"
# monologue
# JP: 納得の声。\nハチロクの補足説明が、真闇姉の理解を促したようだ。
2593 = "Một tiếng thốt lên tỏ vẻ đã hiểu. Có vẻ như lời giải thích bổ sung của Hachiroku đã giúp chị Mayami hiểu rõ hơn."
# 【真闇】
# display as 真闇
# JP: 「そぎゃんしたまま動かし続けたら、\nシリンダーば壊れてしまうと？」
1991 = "「Nếu cứ để nguyên như vậy mà tiếp tục chạy, thì xi-lanh sẽ bị hỏng mất sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「可能性はある。\nだからバイパス――空気の逃げ場を開く必要が出てくる」
1810 = "「Có khả năng đó. Vì vậy cần phải mở bypass——lối thoát cho không khí.」"
# monologue
# JP: 開放のままの\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を、\nとんとん、指先で叩いてしめす。
2426 = "Tôi gõ nhẹ ngón tay vào \\x%lバイパス弁;#00ffc040;van bypass%l;# đang mở để chỉ cho chị ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「これを開けば、空気の逃げ道を作れるのだ」
1561 = "「Mở cái này ra thì có thể tạo lối thoát cho không khí.」"
# 【真闇】
# display as 真闇
# JP: 「はぁぁ……細かかとこまでよぅ出来とるねぇ」
1598 = "「Hàà......Thiết kế tỉ mỉ đến từng chi tiết nhỉ.」"
# monologue
# JP: シリンダー排水弁を開いて閉じて、\n\\x%l逆転機;#00ffc040;逆転機%l;#;をまた\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;、同時に\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;も閉じ――
2405 = "Mở rồi đóng van xả nước xi-lanh, gạt \\x%l逆転機;#00ffc040;cần đảo chiều%l;# về \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;# một lần nữa, đồng thời đóng \\x%lバイパス弁;#00ffc040;van bypass%l;# lại——"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、ここからは\\x%lブレーキ;#00ffc040;ブレーキ%l;#;だ」
1709 = "「Nào, từ đây sẽ là \\x%lブレーキ;#00ffc040;phanh%l;#.」"
# monologue
# JP: \\x%l自弁;#00ffc040;自弁%l;#;をゆっくり、\\x%l常用;#00ffc040;常用%l;#;位置へと持っていく。
2422 = "Từ từ đưa \\x%l自弁;#00ffc040;van hãm tự động%l;# về vị trí \\x%l常用;#00ffc040;phanh thường%l;#."
# 【双鉄】
# display as 雙鐵
# JP: 「今、\\x%l自弁;#00ffc040;自弁%l;#;ハンドルがあるのが\\x%l常用;#00ffc040;常用%l;#;――\n普通に使う\\x%lブレーキ;#00ffc040;ブレーキ%l;#;の位置だ」
1861 = "「Bây giờ, tay gạt \\x%l自弁;#00ffc040;van hãm tự động%l;# đang ở vị trí \\x%l常用;#00ffc040;phanh thường%l;#—— là vị trí \\x%lブレーキ;#00ffc040;phanh%l;# sử dụng thông thường.」"
# monologue
# JP: 言葉とともに、\\x%l8620;#00ffc040;8620%l;#;は緩やかに減速していく。
2470 = "Cùng với lời nói, \\x%l8620;#00ffc040;8620%l;# từ từ giảm tốc độ."
# monologue
# JP: 制限60――\n標識を確認すると同時に、ハチロクと僕の\\x%l喚呼;#00ffc040;喚呼%l;#;が揃う。
2323 = "Giới hạn 60—— Ngay khi xác nhận biển báo, tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;# của tôi và Hachiroku vang lên đồng thanh."
# 【双鉄】
# display as 雙鐵
# JP: 「この位置だと、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;内の圧縮空気が、\n[れいてんよんきろへいほう,7]0.4kg/平方センチ、\\x%l減圧;#00ffc040;減圧%l;#;される」
1933 = "「Ở vị trí này, khí nén trong \\x%lブレーキ;#00ffc040;phanh%l;# sẽ được \\x%l減圧;#00ffc040;giảm áp%l;# 0.4kg/cm2.」"
# 【真闇】
# display as 真闇
# JP: 「\\x%l減圧;#00ffc040;減圧%l;#;？　加圧じゃなかと？」
1119 = "「\\x%l減圧;#00ffc040;Giảm áp%l;#? Không phải là tăng áp sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、\\x%l減圧;#00ffc040;減圧%l;#;で正しいんだ」
1661 = "「Vâng, là \\x%l減圧;#00ffc040;giảm áp%l;# mới đúng.」"
# monologue
# JP: \\x%l自弁;#00ffc040;自弁%l;#;を\\x%l重なり位置;#00ffc040;重なり位置%l;#;へと戻し、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;力は保持しつつ、\n圧縮空気を込めなおす。
2412 = "Đưa \\x%l自弁;#00ffc040;van hãm tự động%l;# về \\x%l重なり位置;#00ffc040;vị trí giữ phanh%l;#, vừa duy trì lực \\x%lブレーキ;#00ffc040;phanh%l;#, vừa nạp lại khí nén."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l列車;#00ffc040;列車%l;#;の自動\\x%lブレーキ;#00ffc040;ブレーキ%l;#;は、空気圧がかかり続けることで\n解除されてる。圧力を抜けば、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;がかかる構造だ」
1113 = "「\\x%lブレーキ;#00ffc040;Phanh%l;# tự động của \\x%l列車;#00ffc040;tàu%l;# được nhả ra bằng cách liên tục duy trì áp suất không khí. Cấu tạo của nó là khi xả áp suất thì \\x%lブレーキ;#00ffc040;phanh%l;# sẽ hoạt động.」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、そぎゃんとややこしか構造しとーと？」
1850 = "「Tại sao lại làm cấu tạo phức tạp đến vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lブレーキ;#00ffc040;ブレーキ%l;#;管の損傷や、\\x%l客車;#00ffc040;客車%l;#;・\\x%l貨車;#00ffc040;貨車%l;#;が分離してしまった\n場合に備えてです」
1844 = "「Là để phòng trường hợp ống \\x%lブレーキ;#00ffc040;phanh%l;# bị hỏng, hoặc \\x%l客車;#00ffc040;toa hành khách%l;#・\\x%l貨車;#00ffc040;toa chở hàng%l;# bị tách rời ạ.」"
# 【真闇】
# display as 真闇
# JP: 「わ！　すごか。よぅ考えてあっとねぇ」
1587 = "「Oa! Tuyệt thật. Tính toán kỹ lưỡng ghê.」"
# monologue
# JP: いや、すごいのは真闇姉だ。\n今の一言だけで理解するとは。
2197 = "Không, người tuyệt vời là chị Mayami mới đúng. Chỉ với một câu nói vừa rồi mà đã hiểu được."
# monologue
# JP: 僕などは、なかなか構造を理解できずに、\n図までを書いてもらったものだが……
2539 = "Cỡ như tôi thì mãi mới hiểu được cấu tạo của nó, thậm chí còn phải nhờ vẽ cả sơ đồ ra nữa cơ mà......"
# 【双鉄】
# display as 雙鐵
# JP: 「圧縮空気で\\x%lブレーキ;#00ffc040;ブレーキ%l;\\x%l圧;#;#00ffc040;圧%l;#;をかける方式では、\n分離時の客貨車は、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;なしに暴走してしまう」
2003 = "「Với phương pháp dùng khí nén để tạo \\x%l圧;#00ffc040;áp suất%l;# \\x%lブレーキ;#00ffc040;phanh%l;#, thì khi bị tách rời, toa khách và toa hàng sẽ mất kiểm soát vì không có \\x%lブレーキ;#00ffc040;phanh%l;#.」"
# monologue
# JP: 蛇足極まる説明だとは思いつつ、\n\\x%lブレーキ;#00ffc040;ブレーキ%l;#;と口を動かし続ける。
2751 = "Dù nghĩ rằng đây là một lời giải thích thừa thãi, nhưng tôi vẫn tiếp tục nói về \\x%lブレーキ;#00ffc040;phanh%l;#."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、空気が抜けたとき\\x%lブレーキ;#00ffc040;ブレーキ%l;#;がかかるようにして、\n安全性を、さらに向上させているのだ」
1762 = "「Vì vậy, việc thiết kế sao cho khi không khí thoát ra thì \\x%lブレーキ;#00ffc040;phanh%l;# sẽ hoạt động, là để nâng cao thêm tính an toàn.」"
# 【真闇】
# display as 真闇
# JP: 「はぁぁ」
1585 = "「Hààà.」"
# monologue
# JP: 感心しきり。\nそんな、長くて熱のある息。
2597 = "Vô cùng ngưỡng mộ. Một tiếng thở dài và đầy nhiệt huyết."
# 【真闇】
# display as 真闇
# JP: 「まっこと。\nよーできとるねぇ。面白かとねぇ！」
1868 = "「Thật sự đấy. Thiết kế quá tuyệt vời. Thú vị thật!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった。\nここから先は、車窓風景も面白くなるぞ？」
1504 = "「Vậy thì tốt quá. Từ đây trở đi, phong cảnh ngoài cửa sổ cũng sẽ thú vị lắm đấy?」"
# 【真闇】
# display as 真闇
# JP: 「え――わ！」
1589 = "「Hả——Oa!」"
# monologue
# JP: カーブを抜ければ森も抜けきる。
2245 = "Sau khi vượt qua khúc cua, chúng tôi cũng ra khỏi khu rừng."
# monologue
# JP: 開けた視界の向こうには、なんとものどかな田園風景。\nしばらく行けば、川と鉄橋も待っている。
2747 = "Bên kia tầm nhìn rộng mở là một khung cảnh đồng quê vô cùng thanh bình. Đi thêm một đoạn nữa, sẽ có một con sông và cây cầu sắt đang chờ đón."
# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「制限、解除！　良しっ！」\n「制限、解除！　良しっ！」』
2072 = "『「Hết hạn chế tốc độ! Rõ!」 「Hết hạn chế tốc độ! Rõ!」』"
# monologue
# JP: （ザクっ！　カパッ！　ザっ！）
2790 = "（Phập! Cạch! Phập!）"
# monologue
# JP: 声と同時に投げ込みの音。\n息を揃えて僕らはグン！　と加速していく。
2256 = "Cùng với giọng nói là tiếng xúc than. Chúng tôi đồng loạt lấy đà và vọt lên! Tàu bắt đầu tăng tốc."
# 【ポーレット】
# display as 波萊特
# JP: 「おかえりなさい。お疲れ様です」
1818 = "「Chào mừng mọi người đã về. Mọi người vất vả rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯」" 
# monologue
# JP: 試験運転を無事終えて御一夜駅へと降り立てば、\n満面の笑顔を浮かべたポーレットが僕らを迎えてくれる。
2538 = "Kết thúc chuyến chạy thử nghiệm suôn sẻ và bước xuống ga Ohimitera, Paulette đón chúng tôi với nụ cười rạng rỡ trên môi."
# 【ポーレット】
# display as 波萊特
# JP: 「どうでしたか？　[キャブ,2]運転台は」
1687 = "「Cảm giác thế nào ạ? Ở trên buồng lái ấy.」"
# 【真闇】
# display as 真闇
# JP: 「面白かった！\n実際乗ると、いろんなことがわかるとねぇ」
1735 = "「Thú vị lắm! Thực sự ngồi lên mới hiểu được nhiều điều.」"
# monologue
# JP: しみじみ言って、\n真闇姉の目が、いたずらっぽく僕を見る。
2583 = "Nói với vẻ thấm thía, chị Mayami tinh nghịch nhìn tôi."
# 【真闇】
# display as 真闇
# JP: 「おかげで、新しか蒸気焼酎のヒントも見えたとよ。\nポーちゃん、乗せてくれてありがとねぇ」
1692 = "「Nhờ vậy mà chị cũng tìm thấy manh mối cho loại shochu hơi nước mới rồi. Pau-chan, cảm ơn em đã cho chị đi nhờ nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ。わたしなんてなんにも」
1446 = "「Dạ không có gì đâu ạ. Em có làm gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉。\n蒸気焼酎のヒントというのは――」
1880 = "「Chị Mayami. Manh mối cho shochu hơi nước là——」"
# 【真闇】
# display as 真闇
# JP: 「そいば、こん先のお楽しみ。\n試してみてから話すけん」
1979 = "「Cái đó thì để sau hẵng hay. Để chị thử nghiệm xong rồi mới nói.」"
# monologue
# JP: そう言い切って体ごと、\n真闇姉はポーレットへと向いてしまう。
2682 = "Nói dứt khoát như vậy, chị Mayami quay hẳn người về phía Paulette."
# 【真闇】
# display as 真闇
# JP: 「まっこと、いたれりつくせりで。\n乗せてくれた上に、お出迎えまで」
1867 = "「Thật sự là chu đáo quá đi mất. Đã cho đi nhờ rồi mà còn ra tận nơi đón nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、出迎えの方は、報告もあってなんです。\nすごく、いいニュースが届いたので」
1628 = "「À, việc ra đón là vì em có chuyện muốn báo cáo ạ. Một tin tức vô cùng tốt lành vừa mới đến.」"
# 【ハチロク】
# display as 八六
# JP: 「いいニュース、でございますか？」
1706 = "「Tin tốt lành sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「ひょっとして、\\x%l客車;#00ffc040;客車%l;#;関係！？」
2048 = "「Không lẽ nào, liên quan đến \\x%l客車;#00ffc040;toa hành khách%l;#!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解です！」
1858 = "「Chính xác ạ!」"
# monologue
# JP: \\x%l整備体;#00ffc040;整備体%l;#;への換装を終えたハチロクと、日々姫も\nキャブから降りてくる。
2460 = "Hachiroku và Hibiki sau khi thay sang \\x%l整備体;#00ffc040;thân chính%l;# cũng bước xuống từ buồng lái."
# monologue
# JP: 喰いつくような問いに煽られ、\nポーレットの笑顔はますます輝く。
2520 = "Bị kích động bởi những câu hỏi dồn dập, nụ cười của Paulette càng thêm rạng rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l客車;#00ffc040;客車%l;#;、譲渡いただけることになったんです！\n\\x%l気動車;#00ffc040;気動車%l;#;改造の\\x%l客車;#00ffc040;客車%l;#;を、[すんたい,1]駿袋鉄道さんから」
2054 = "「Chúng ta đã được nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;# rồi! Là \\x%l客車;#00ffc040;toa hành khách%l;# được cải tạo từ \\x%l気動車;#00ffc040;toa xe tự hành%l;#, từ Đường sắt Suntai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「譲渡か、それは素晴らしいな」
1128 = "「Nhượng lại sao, tuyệt quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。御一夜と向こうさん、\nなんだか、土地同士の昔の縁もあるみたいなんです――」
1798 = "「Vâng. Giữa Ohimitera và bên đó, hình như có một mối duyên nợ xa xưa nào đó về đất đai thì phải——」"
# monologue
# JP: どんな\\x%l客車;#00ffc040;客車%l;#;を、どんな経緯で、譲渡を受けるにいたったか。
2376 = "Nhận được loại \\x%l客車;#00ffc040;toa hành khách%l;# nào, và quá trình được nhượng lại ra sao."
# monologue
# JP: 教えてくれるポーレットは、\n実になめらかで気分よさ気だ。
2362 = "Paulette kể cho chúng tôi nghe một cách vô cùng trôi chảy và đầy hào hứng."
# 【ポーレット】
# display as 波萊特
# JP: 「と、いうわけで、\n二週間後には\\x%l客車;#00ffc040;客車%l;#;、御一夜に到着します！」
1766 = "「Vậy nên, hai tuần nữa \\x%l客車;#00ffc040;toa hành khách%l;# sẽ đến Ohimitera!」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすがだ。\nやはり鉄道のことならポーレットだな」
1473 = "「Quả không hổ danh. Nhắc đến đường sắt thì đúng là phải nhờ Paulette rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えへへ、わたし、それしか能が無いですから」
1671 = "「Ehehe, em chỉ có mỗi tài năng đó thôi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「あら。\n市長さんがそのようなこと。よろしいのですか？」
1591 = "「Trời ạ. Thị trưởng mà lại nói như vậy sao. Có ổn không đó?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ！　えと、今のは、それじゃ、間違いで。\nあ――でも、政治はどうかな？　能あるのかなぁ」
1619 = "「A! Ưm, câu vừa rồi coi như em nói nhầm đi. A——Nhưng mà, về mặt chính trị thì sao nhỉ? Em có tài năng không ta?」"
# 【日々姫】
# display as 日日姬
# JP: 「そこはウソでも、\nあるって言わなきゃダメなとこばい！」
1495 = "「Chỗ đó dù là nói dối, thì cũng phải bảo là có chứ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね！　ありますっ！」
1627 = "「A, đúng vậy nhỉ! Có ạ!」"
# monologue
# JP: どっと、明るい笑いがあふれる。
2612 = "Một tràng cười rộn rã vang lên."
# monologue
# JP: 真闇姉もヒントを得たと話していたし、\nこの流れ、そのまま成果に繋げたい。
2477 = "Chị Mayami cũng nói là đã tìm thấy manh mối rồi, tôi muốn nhân đà này để đạt được thành quả luôn."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットには負担をかけてしまっているが――\nその件、引き続き頼めるか？」
1831 = "「Dù đã gây nhiều gánh nặng cho Paulette rồi nhưng—— chuyện đó, tiếp tục nhờ em được chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「任せてください。双鉄くんは、双鉄くんのお仕事を。\nわたしたち、チームなんですから」
1543 = "「Cứ giao cho em. Soutetsu-kun cứ lo phần việc của Soutetsu-kun đi. Chúng ta là một đội mà.」"
# 【真闇】
# display as 真闇
# JP: 「！」
2059 = "「!」"
# 【日々姫】
# display as 日日姬
# JP: 「チームいうなら私ばい！\n\\x%l機関士;#00ffc040;機関士%l;#;と\\x%l機関助士;#00ffc040;機関助士%l;#;は、コンビやけんねーっ！」
1999 = "「Nếu nói là đội thì phải là em chứ! \\x%l機関士;#00ffc040;Lái tàu%l;# và \\x%l機関助士;#00ffc040;phụ lái tàu%l;# là một cặp bài trùng mà!」"
# 【ハチロク】
# display as 八六
# JP: 「それを申すならわたくしこそです。\n\\x%l機関士;#00ffc040;機関士%l;#;と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、一心同体も同然ですから」
1994 = "「Nếu nói vậy thì phải là em mới đúng. \\x%l機関士;#00ffc040;Lái tàu%l;# và \\x%lレイルロオド;#00ffc040;Railord%l;# chẳng khác nào tuy hai mà một.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2061 = "「っ!?」"
# monologue
# JP: 争うように、日々姫とハチロクが口出ししてくる。
2492 = "Hibiki và Hachiroku chen vào như thể đang tranh giành."
# monologue
# JP: やる気があるのは結構だが、\n良い流れを、争い乱しては仕方ない。
2750 = "Có tinh thần là tốt, nhưng nếu vì tranh giành mà làm hỏng bầu không khí tốt đẹp thì cũng vô ích."
# 【双鉄】
# display as 雙鐵
# JP: 「チームだぞ？　全員揃ってこそではないか」
2024 = "「Là một đội mà? Phải có mặt tất cả mọi người chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは……左様でございます」
1643 = "「Điều đó thì......đúng là vậy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「むぅぅ」
1638 = "「Hừm.」"
# monologue
# JP: なぜかは知らねど不満気な\\x%l8620;#00ffc040;8620%l;#;チームをなんとか宥め、\n真闇姉へと振り返る。
2442 = "Dù không hiểu tại sao, tôi vẫn cố gắng xoa dịu đội \\x%l8620;#00ffc040;8620%l;# đang tỏ vẻ bất mãn, và quay lại nhìn chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだが。真闇姉から何か希望はあるか？\n焼酎\\x%l列車;#00ffc040;列車%l;#;としても運用できるよう」
1780 = "「Chuyện là vậy đó. Chị Mayami có nguyện vọng gì không? Để có thể vận hành như một chuyến \\x%l列車;#00ffc040;tàu%l;# shochu.」"
# 【真闇】
# display as 真闇
# JP: 「あ」
# 1613 = "「啊」" 
# monologue
# JP: 新しい蒸気焼酎に、もはや気持ちが行っていたのか――\n真闇姉は僕の言葉に、少し驚いたような顔をする。
2278 = "Có lẽ tâm trí chị ấy đã hướng về loại shochu hơi nước mới rồi—— Chị Mayami lộ vẻ hơi ngạc nhiên trước lời nói của tôi."
# 【真闇】
# display as 真闇
# JP: 「ううん。無か。\nそいば、そっちの良かようにして欲しかとよ」
