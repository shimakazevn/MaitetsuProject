[script]
# lines: 309 
# 【真闇】
# display as 真闇
# JP: 「どぎゃんしたと、双ちゃん？」
1264 = "「怎麼啦，小雙？」" 

# monologue
# JP: すぐ隣から、ふうわりとした真闇姉の声。\n幸せな考えごとから、幸せ極まる現実へと引き戻される。
1744 = "真闇姐綿軟的聲音從我身邊傳來，把我的思緒從幸福的思考中拉回到幸福至極的現實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん、\n起こしてしまったか？」
1159 = "「啊，抱歉。我把你吵醒了嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「ううん。\nまだ寝入らんで目ば閉じとっただけやったけん」
1332 = "「沒有，我還沒睡，只是閉上眼睛而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　それならば何故」
1190 = "「嗯？為什麼啊」" 

# 【真闇】
# display as 真闇
# JP: 「自分で気づいておらんかったと？\nふふって、双ちゃん笑ったの。思い出し笑いみたいに」
1040 = "「你自己沒發現嗎？你剛才笑了，像是想起了什麼有趣的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑っていたか。そんな自覚はなかったのだが――」
1292 = "「我笑了啊。我自己沒發現——」" 

# monologue
# JP: 身体が勝手に笑うほど、僕は幸せに満ち満ちている。\n実感すれば、顔がふたたび緩んでしまう。
1641 = "我已經幸福到了身體會不由自主地笑出來的程度。這麼一想，我的嘴角又揚了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「物思いにふけっていただけなのだ。\nこの部屋も、短い時間に何度も用途がかわったものだと」
1283 = "「我只是陷入了沉思而已。我想到了這房間在短時間內用途變化了好幾次」" 

# 【真闇】
# display as 真闇
# JP: 「あぁ」
1175 = "「嗯」" 

# monologue
# JP: 嬉しげな声。\n伝わったことで僕もまた嬉しくさせられる。
1736 = "真闇姐的聲音聽起來很開心。她的理解也讓我很欣喜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一番最初は汰斗さんの書庫だった。\nそれを僕の私室として使わせてもらって」
1446 = "「這裡最開始是汰斗先生的書房。之後用作我的房間」" 

# 【真闇】
# display as 真闇
# JP: 「はーちゃんがやってきて。\nはーちゃんはひーちゃんの部屋におひっこしして」
1344 = "「然後八六來了。八六又搬到了小日的房間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして今は、僕ら夫婦の寝室だ」
1399 = "「而現在，它是我們夫妻的臥室」" 

# monologue
# JP: ハチロクとの部屋だった頃にはかなり濃かった鉄分が、\nいまではほのかな麹の香りに変わった気もする。
1791 = "這裡用作我和八六的房間時充滿了鐵的氣息，而現在感覺變成了酒麴的香味。" 

# 【双鉄】
# display as 雙鐵
# JP: 「物であるハチロクが、確かな魂をもつように。\nあるいはこの部屋も、もしも魂をもつものならば」
1243 = "「就像八六作為物件卻有著靈魂，這房間或許也有靈魂」" 

# monologue
# JP: 口にしたなら世迷い言だと自分で感じてしまうけれども、\n真闇姉はうんうんと、楽しげに相槌を打ってくれてる。
1769 = "說出這句話後我自己也覺得莫名其妙，但是真闇姐卻愉快地附和著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この変遷が部屋にとっても幸せなものであって欲しいと。\nそのようなことを、なんともぼんやり考えていた」
1249 = "「希望這些變遷對於這房間來說也是一件幸福的事情。我剛才呆呆地想著這個」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
1119 = "「哎呀」" 

# monologue
# JP: 小さく笑って、真闇姉はそうっと僕の頬を撫ぜる。
1746 = "真闇姐輕笑一聲，撫摸著我的臉龐。" 

# 【真闇】
# display as 真闇
# JP: 「お家やらお部屋やらにもしも気持ちがあるんなら、\nそりゃあ幸せに決まっとるでしょお」
1214 = "「如果住宅和房間有感情的話，它們一定會感覺很幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「断言か。それはいったいどうした理由で」
1448 = "「這麼肯定嗎。為什麼這麼說？」" 

# 【真闇】
# display as 真闇
# JP: 「そんなん。[いえ]家ゆーもんは、おうちやけんね」
1365 = "「當然因為住宅就是家啊」" 

# monologue
# JP: 家と、うち。両者の差異を並べて言われてみて初めて、\n建築物と家庭の差異かと理解する。
1576 = "住宅和家。把這兩個詞放在一起，就能體會出建築物和家庭的差異。" 

# 【真闇】
# display as 真闇
# JP: 「家族あってのおうちやけん。\n栄えていくんは、願ったり叶ったりでしょお」
1324 = "「有家人才有家。住宅肯定也喜歡家庭興旺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにそうだな」
1447 = "「這麼一說是有道理」" 

# monologue
# JP: うなずいてふと不思議に思う。\nハチロクが加わって以降、家族の人数は増えてない。
1654 = "我點點頭，又覺得有點不對。自從八六來了以後，家庭成員就沒有再增加了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「栄えていく、か。\n姉弟が夫婦になれば、その可能性はふくらむな」
1227 = "「家庭興旺啊。姐弟結成夫妻之後，就有人丁興旺的可能性了」" 

# 【真闇】
# display as 真闇
# JP: 「あら」
# 1119 = "「哎呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1504 = "「！」" 

# monologue
# JP: 理屈だけだった僕の言葉が、艶めいた相槌ひとつで、\n生々しいまでの温度を帯びる。
1650 = "我說的話本來只是陳述事實，可是加上真闇姐一聲嬌艷的回應，它就有了非常現實的感覺了。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんが栄えさせてくれると？\nおねえちゃんと一緒に」
1039 = "「你會讓家庭興旺嗎？和姐姐一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、いつでも望むところだ」
1295 = "「我隨時願意」" 

# monologue
# JP: 真闇姉の匂いを不意に感じる。慣れきっていて、\nけれども意識をしたならば、危ういほどに甘い匂いを。
1732 = "真闇姐的味道飄進了我的鼻腔。我非常熟悉這個味道，但一旦往那方面想，這香甜的氣息就有些誘人衝動了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今夜は――というかしばらくは控えておきたい。\nなにせ、新婚旅行のための休暇が」
1071 = "「可是今晚——應該說最近一段時間還是不要了。畢竟我們還有新婚旅行的假期」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、ようやく、もうすぐよねぇ。\nごめんね？　おねえちゃんが待たせる形になっちゃって」
1194 = "「嘻嘻，終於快要到了。對不起啦，要讓你等一等了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互い様だ。\n僕もまったく、スケジュールの調整がきかなかった」
1271 = "「我也一樣。我也完全沒能調整好日程」" 

# monologue
# JP: それがぽこん、と一致した。\nゆえ、新婚旅行の準備はまだほとんど進んでいない。
1634 = "我們的日程正好撞到一起。所以我們還完全沒做新婚旅行的準備。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確実にふたり一緒に休みを取れるのは二日間。\n長期の旅行が無理な日程であることは確かだが」
1280 = "「我們能一起休兩天時間。這樣肯定就不能長期旅行了」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 1175 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕らにはナビもある。日ノ本国内であれば、\nどこへでもいける日程だとも考えられる」
1207 = "「好在我們還有Ｎａｖｉ。只要是在日本國內，哪裡都可以去」" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ、のんびり遊覧飛行も、\nそいばそいで、楽しか新婚旅行になりそおねぇ」
1084 = "「呵呵，悠哉的飛行遊覽也不錯，也會是一段快樂的新婚旅行」" 

# monologue
# JP: そういえば、真闇姉はまだナビに乗ったことがない。\n今回ぜひとも乗ってもらおうと思うが、それはそれとして。
1768 = "說來真闇姐還沒坐過Ｎａｖｉ。下次一定要讓她坐坐，這個先不說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのに、本当に『御一夜旅行』が希望でいいのか？\nもしも時間の都合だったら、僕はさらに先に伸ばしても」
1048 = "「光是“御一夜旅行”真的就行了嗎？如果是因為時間不夠的話，旅行再推遲一段時間我也沒關係」" 

# 【真闇】
# display as 真闇
# JP: 「ううん、双ちゃん。時間がもっとたっぷりあっても、\nおねえちゃん、必ず御一夜旅行ばお願いしてた」
1016 = "「不是的，小雙。就算時間再充裕一些，姐姐也想要來一次御一夜旅行」" 

# monologue
# JP: ふんわり。しかし決然と。\n迷いを一切感じない、いつもどおりの真闇姉の声。
1737 = "真闇姐的聲音軟綿綿的，其中卻帶著堅定的決心。她的聲音中沒有絲毫猶豫，就跟平時一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。であらば僕に否やはない。\nが――なぜ御一夜に？」
1209 = "「好的。既然如此我也不會有異議。但是為什麼選在御一夜？」" 

# 【真闇】
# display as 真闇
# JP: 「あんね？　双ちゃん。\n理由はとっても簡単なの」
1402 = "「聽我說，小雙。理由非常簡單」" 

# monologue
# JP: 夫と妻になったいまでも、\n真闇姉と僕の間の呼称はまったく変わらない。
1585 = "即使是結成了夫妻關係，真闇姐和我互相的稱呼也沒有發生任何改變。" 

# 【真闇】
# display as 真闇
# JP: 「いままで一度も旅したことない、大評判の観光地。\nやけん、『観光旅行』ばしてみたかとよ」
1257 = "「御一夜是備受好評的觀光地，我卻從來沒在那裡旅遊過。所以我想來一次觀光旅行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「観光旅行、か」
1417 = "「觀光旅行啊」" 

# monologue
# JP: 生家のあった小さな町をふと思い出す。\nあそこも一応、観光客の来る町だったが――
1649 = "我腦海裡浮現出我出生的那座小鎮。那裡的確是觀光客會去的地方——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。面白いものかもしれんな。生まれ育って、\n知り尽くした気さえする地元であるゆえ、かえって」
1059 = "「原來如此，想想確實很有意思。正因為是生在那裡長在那裡的故鄉，所以反而會更有趣」" 

# 【真闇】
# display as 真闇
# JP: 「うん。観光客になって訪ねてみたら、\nおねえちゃんがまだ知らん御一夜ば見れるかなぁって」
1170 = "「嗯。作為觀光客去感受的話，我想應該能看到另一種模樣的御一夜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。\nとなると、ガイド選びが重要になるな」
1285 = "「我明白了。那讓誰來做嚮導就很重要了」" 

# monologue
# JP: 言えばもぞりと、真闇姉が体を寄せてくる。
1770 = "說著，真闇姐湊了過來。" 

# 【真闇】
# display as 真闇
# JP: 「商工会とかのガイドさんはちょっと。\nおねえちゃん、きっと妙に気を使っちゃいそうやけん」
1422 = "「讓商工會來做嚮導不太好。我肯定會有些顧慮」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。せっかくの新婚旅行。\nリラックスして楽しめなければもったいないものな」
1026 = "「也是啊。寶貴的新婚旅行不好好放鬆一下就太浪費了」" 

# monologue
# JP: ならば……うむ。日々姫ハチロクを候補から外そう。\nふたりも一緒の家族旅行は、別の機会にするべきゆえ。
1792 = "這麼說的話……嗯。日日姬和八六也不作考慮了。帶著她們的家庭旅行等另外的機會再說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、ふかみあたりも……\n蔵の方との絡みもあるから気を使ってしまうだろうな」
1390 = "「稀咲和深美也不行……因為她們和酒藏有關係，會有所顧慮」" 

# 【真闇】
# display as 真闇
# JP: 「銀行さんの中見せてもらえるとかなら楽しそうばってん、\nそいば新婚旅行とは別の機会でよかとよね」
1415 = "「要是能參觀一下銀行裡面應該會很有趣，不過那等到新婚旅行之外的機會吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もそのように考えていた。\nとなると凪にも頼めんな。常連さん相手は気をつかう」
1273 = "「我也是這麼想的。那也不能拜託凪了，面對常客也會有顧慮」" 

# monologue
# JP: ……ポーレットはあまりに多忙すぎるし、\n頼んでしまえば無理をしてでも引き受けてくれそう――あ
669 = "……波萊特工作特別忙，要是拜託她的話她肯定會擠出時間接受。對了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉。右田一酒造元と一切の取引関係が無い中でなら、\nれいなにガイドを頼んでみるのはどうであろうか」
1376 = "「真闇姐。在右田一釀酒廠完全沒有生意來往的人裡，讓玲奈來做嚮導怎麼樣」" 

# 【真闇】
# display as 真闇
# JP: 「れーちゃん！\nうふふっ、かわゆかガイドさんしてくれそうね」
1241 = "「小玲！嘿嘿，她做嚮導一定很可愛」" 

# monologue
# JP: 聞いた瞬間、第一候補と確定するほど、\n実に楽しげにはずむ声。
1764 = "聽我這麼一說，真闇姐顯得興致勃勃，第一候補直接定下來了。" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、れーちゃんも忙しいんじゃなかと？\nもしも少しでも無理ばさせちゃうようだったら」
1073 = "「可是小玲也很忙吧？可能會讓她忙不過來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは安心してくれて構わない。\n少しでも無理があるなら、ポーレットが引受けさせない」
1490 = "「關於這個就放心吧。只要她稍微有點處理不來，波萊特就不會讓她接受」" 

# 【真闇】
# display as 真闇
# JP: 「ああ――うふふっ。そうね、絶対。\nぽーちゃん、過保護そうだものねぇ」
1144 = "「啊——呵呵。是啊，一定是這樣。畢竟波萊特很溺愛她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ、真闇姉のものいいを聞いていると、\n過保護がとても良いことに思える」
1116 = "「哈哈，聽你這麼一說，都讓人覺得溺愛是好事了」" 

# 【真闇】
# display as 真闇
# JP: 「もちろんとっても素敵なことよ。\n過保護も、親ばかも、子煩悩も」
1366 = "「當然是好事啊。不管是溺愛，過於疼愛小孩，還是一心只想著孩子都是好事」" 

# monologue
# JP: きっぱり。ふんわり。\nその断言にも、なんの力みもてらいも無い。
1778 = "軟綿綿的聲音中帶著堅定。她下這個結論的時候也像是理所當然一樣。" 

# 【真闇】
# display as 真闇
# JP: 「そーせんでよーなったら、どうしたって手ば離れるけん。\n手ぇつないでくれとる間は、過保護がよかよ」
1033 = "「以後孩子總會離開身邊。趁著孩子還在身邊的時候溺愛一下沒什麼不好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
700 = "「……這樣啊」" 

# monologue
# JP: 真闇姉には無論、子育ての経験なぞない。\nならばこれは、日々姫への思いなのかとふっと感じる。
1731 = "真闇姐當然沒有養育小孩的經驗。這應該是她和日日姬相處的感受吧。" 

# 【真闇】
# display as 真闇
# JP: 「それより、ね？　れーちゃんにもしガイドば頼めるなら。\n細かな打ち合わせには、おねーちゃんも参加してよか？」
1019 = "「不說這個啦，如果要讓小玲當嚮導的話，商量細節的時候也讓姐姐參加好嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。真闇姉の時間がとれるのであれば」
1364 = "「當然了。如果你有時間的話」" 

# 【真闇】
# display as 真闇
