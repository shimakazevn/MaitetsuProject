# monologue
# JP: ひそまっていた眉毛がゆるみ、\nそのままふうわり、笑みとなる。
1740 = "真闇姐皺著的眉頭鬆開了，取而代之的是溫暖的微笑。" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ。不思議ね。そーちゃんがこん家に来たころは、\nこぎゃん話聞けるとは、夢にも思うとらんかったと」
1079 = "「呵呵。真是奇妙啊，小雙剛來這裡的時候，完全想不到能聽你說這種事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当にだな」
1185 = "「嗯，還真是啊」" 

# 【れいな】
# display as 玲奈
# JP: 「！　そうてつさんのちっちゃいころって、\nどんな感じだったんですかぁ？」
1153 = "「啊！雙鐵先生小時候是什麼樣的？」" 

# monologue
# JP: 思わぬところにれいなが食いつく。\n真闇姉は待ってましたとばかりに――っ！
1657 = "沒想到玲奈對這個提起興趣了。真闇姐則是一副“就等這句話了”的表情——" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1087 = "「呼」" 

# monologue
# JP: 勢いこんだ真闇姉の手から\nずり落ちかかった紙包みを支えて、戻す。
1709 = "真闇姐一激動，紙包就從她手裡掉了下來，我托住紙包送回她手裡。" 

# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ。こいば持ってきとったんだった」
1121 = "「哎呀呀，忘了還拿著東西了」" 

# monologue
# JP: ガサゴソ紙づつみが……ほどかれ、て――
1794 = "隨著一陣沙沙聲，紙包被打開了——" 

# 【れいな】
# display as 玲奈
# JP: 「わああ！　カエルさん色のあまがっぱですぅ」
1102 = "「哇！是青蛙色的雨衣」" 

# monologue
# JP: 先程ほどよりも激しい食いつき。\n僕へ過去への興味なぞ、一瞬にして投げ捨てられる。
1673 = "玲奈對雨衣的興趣要比剛才濃厚多了，她一下子就把我的過去拋在腦後了。" 

# 【れいな】
# display as 玲奈
# JP: 「かわいいですねぇ。きれいですねぇ。\n借りちゃうの悪い気がしますぅ」
1369 = "「真可愛，真漂亮，都有點不好意思借了」" 

# 【真闇】
# display as 真闇
# JP: 「そんなん、気にせんと着倒しちゃって？\n多分、ちょうど――」
1018 = "「不用客氣，儘管穿吧。估計正好——」" 

# monologue
# JP: 真闇姉がかっぱをひろげ、れいなに軽くあてがってみる。
1722 = "真闇姐抖開了雨衣，在玲奈身上比了一下。" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　れいなにぴったりのサイズですぅ」
1099 = "「哇啊！大小正適合玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。\nと、いうことは、かなり古いものなのか？」
1449 = "「還真是啊。這件雨衣是很老的東西嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「うん、そぎゃんよ。\nかーなーり、古か雨合羽」
1178 = "「嗯，是呀。是特別老的一件雨衣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1077 = "「呃！」" 

# monologue
# JP: しまった、かなりは余計であった。\nリアクションする度胸はないゆえ、流すほか
1613 = "壞了，我這話說得太多餘了。我沒勇氣繼續搭話，只能矇混過去了。" 

# 【れいな】
# display as 玲奈
# JP: 「ええええ、そんなふうに全然見えないですよぉ。\nとっても綺麗で、新品みたいですぅ」
1133 = "「哎哎，完全不像舊的。雨衣這麼漂亮，就像全新的一樣」" 

# monologue
# JP: れいなの無邪気に救われる。\n今度は助け気動車だ。
1683 = "玲奈的天真救了我一命。這次是救援動車。" 

# 【真闇】
# display as 真闇
# JP: 「まぁ、完全未使用中古品ゆうやつやけん。おねえちゃん\nひーちゃんの好みにあわんの勝手に買うてきちゃって」
1182 = "「嗯，算是完全沒使用過的二手貨吧。姐姐沒有考慮到小日的喜好，擅自買的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1504 = "「！」" 

# monologue
# JP: ……良くある話であろうからこそ身につまされる。\nけれどれいなは気にとめない。
677 = "……這種事情常有發生，所以更讓我感同身受。玲奈則是沒有在意。" 

# 【れいな】
# display as 玲奈
# JP: 「そおだったんですねぇ。カエルさん色も、\n日々姫さんにきっと似合うってれいなも思うんですけど」
1440 = "「這樣啊。玲奈覺得青蛙的顏色也很適合日日姬小姐穿」" 

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそう思うとったと。ばってん、ね？」
1217 = "「姐姐也這麼覺得。可是呀」" 

# monologue
# JP: 真闇姉が座布団の上に腰を下ろすゆえ、\n僕らも素直にそれに従う。
1713 = "真闇姐坐在了坐墊上，我們也跟著一起坐下。" 

# 【真闇】
# display as 真闇
# JP: 「ちーちゃかころからひーちゃん、美意識の高かったけん。\nお洋服とか、ぜぇんぶ自分で選んどったし」
1235 = "「小日從小時候就很有美的意識。衣服她都是自己挑的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1175 = "「嗯」" 

# monologue
# JP: 不意に思い出す。真闇姉から預かったお金と、日々姫と。\nその両方を手放さないよう、必死になってた過去の自分を。
1638 = "我回想起了過去。那時候我小心翼翼地拿著真闇姐給我的錢，同時也看住了日日姬不讓她亂跑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにそうだったな。いつでも日々姫は、\nものすごい時間をかけてあれこれ服を選んでいた」
689 = "「……以前確實是這樣。日日姬總是會在挑選衣服上花很長時間」" 

# monologue
# JP: 思い出したまま言葉にすれば、\n真闇姉はふ、と微笑を浮かべる。
1644 = "我把回憶起來的事情說出來，真闇姐便莞爾一笑。" 

# 【真闇】
# display as 真闇
# JP: 「ありがとね、双ちゃん。あのころも今も――\nおねえちゃんの代わりに、ひーちゃんのこと見てくれて」
1421 = "「謝謝你，小雙。不管是過去還是現在，你都代替姐姐照顧著小日」" 

# monologue
# JP: 罪悪感を、言葉に混じる息に垣間見てしまった気がして。\nゆえ軽く。できる限りに軽く明るく返事する。
1639 = "我在她的話語中聽到了一絲罪惡感。所以我便儘量讓自己的回答輕鬆明快一些。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あのころは――あのころの僕ならば、うん。確かに\n"代わり”を義務として果たしていたかもしれんが……」\n1363 = "「當時——當時的我，確實可能做到了“代替”的職責……」" \n\n# monologue\n# JP: それでもなお、興味深い時間であったと記憶している。\n日々姫の無数の質問に返事するのは、路子とはない経験で。\n1606 = "回想起來，那段時光也是頗為有趣。回答日日姬無數的提問也是很寶貴的經驗。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今は代わりなど務めていない。日々姫も僕のいもうとだ、\n妻の妹という意味ではなくて、僕自身のいもうとだから」\n1360 = "「現在我也不是代替照顧她。日日姬是我的妹妹，不是我妻子妹妹的意思，而是我自己的妹妹」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うふふっ。うれしか。ありがとお」\n1191 = "「嘻嘻。真好啊，謝謝」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「？？？　日々姫さんがそうてつさんのいもうとさんなの、\nあたりまえのことじゃないんですかぁ？」\n1510 = "「？？？日日姬小姐是雙鐵先生的妹妹，這不是理所當然的事情嗎？」" \n\n# monologue\n# JP: きょとんと固まるれいなの鼻を、\n真闇姉が指を伸ばしてかるうくつつく。\n1668 = "玲奈不解地僵住了，真闇姐輕輕戳了戳她的鼻子。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「きゃあ♪」\n1076 = "「呀♪」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うん。あたりまえのこと。雨合羽ば懐かしすぎて、\nおねえちゃん、ちょっとセンチメンタルになっちゃった」\n1172 = "「嗯。就是理所當然的事情。這件雨衣實在太讓人懷念了，姐姐都有點感傷了」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そっかあ、せんちめんたるなんですねぇ」\n1442 = "「這樣啊，感傷了啊」" \n\n# monologue\n# JP: 100\%わかってない声。\nふふふっ、と。真闇姉がもらした微笑も楽しげだ。\n1675 = "玲奈明顯是不明白什麼意思。真闇姐臉上也掛著愉快的微笑。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃんね？　いっしょうけんめい伝えてくれたと\n『こいば着たら、全部がカエルになっちゃう』って」\n1234 = "「小日她啊，當時拚命地跟我解釋，說穿上這個整個人就變成青蛙了」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「全部がカエル！　ふわわ、ゆめみたいに素敵ですねぇ」\n1301 = "「整個人變成青蛙！哇哇，就像做夢一樣，好棒啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど、日々姫が一生懸命考えたおしゃれが、\n全部かっぱに塗りつぶされてしまうというわけか」\n1060 = "「原來如此，日日姬費盡心思搭配的打扮會被雨衣全改掉了」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そ」\n1231 = "「對」" \n\n# monologue\n# JP: 僕に/れいなに。真闇姉は同時に相槌を打つ。\n1711 = "真闇姐同時應和著我和玲奈兩個人。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「れーちゃんはそいば嬉しくて、ひーちゃんは悲しかった。\n好みの違いゆーたら、単にそれだけのことばってん」\n1359 = "「玲奈這麼喜歡，而小日卻不喜歡。要說是喜好各有不同，那就是這麼回事吧」" \n\n# monologue\n# JP: サバサバと。\n多分僕に気を使わせぬよう、真闇姉が意識してる声。\n1729 = "真闇姐爽朗地說道，應該是不想讓我有所顧慮。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねえちゃんもそのころはいっぱいいっぱいで、\n『いらんゆーなら捨てるけん』って声あらげちゃって」\n1221 = "「姐姐當時也顧不上想那麼多，大聲喊道“你不要就扔掉”」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ！\nまくらさんが怒ったらとってもこわそうですねぇ」\n1106 = "「哇！真暗小姐生起氣來一定很嚇人」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そぎゃんこつなかとよ？　ばってん……\nそんときはひーちゃん泣かせちゃって、もう自己嫌悪で」\n1298 = "「才沒有啦！可是……當時是把小日弄哭了，自己也很討厭自己」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……そんなことがあったのか」\n701 = "「……還發生過這種事啊」" \n\n# monologue\n# JP: 問えば、苦笑。\nなにより雄弁な返答だ。\n1787 = "這事情問起來只能讓人苦笑。這也是比任何言語都雄辯的答覆。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「返品交換するのもイヤで。ついついそのまま。\n別の雨合羽ば、後日、双ちゃんについてってもらって」\n1346 = "「然而也不想去換一件，所以就一直留了下來。後來讓小雙陪小日一起又買了一件雨衣」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 1175 = "「嗯」" \n\n# monologue\n# JP: 日々姫の雨合羽なら覚えている。僕も一緒に選んで買った。\nオレンジの入ったチェックの……いかにも日々姫好みの。\n1653 = "我還記得日日姬的那件雨衣，我也跟著一起挑選了。那是一件橙色的帶條紋的……非常符合日日姬喜好的雨衣。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃんの選んだとなら、もう似合うて似合うて、\nなるほどなぁって。ばってん、ね？」\n1237 = "「小日選的那件真的是非常適合她。當時就覺得原來該這麼選啊。可是呢」" \n\n# monologue\n# JP: しげしげと、懐かしそうに、真闇姉はかっぱを見つめる。\n1743 = "真闇姐盯著雨衣，陷入了懷舊之中。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねーちゃんも若かったけん。たまにはおねーちゃんの\n選んだもんば、ひーちゃんに着てほしかったと」\n1225 = "「姐姐那時候也年輕，想偶爾讓小日穿穿姐姐選的衣服」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そっかぁ。\nそれなら一緒にえらんだらよかったですねぇ」\n1441 = "「這樣啊。那應該兩人一起選啊」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あは！　まっことね。ほんなら、うん。\n次んときにはおねーちゃんそうする。で、こいば」\n1147 = "「啊哈！沒錯。這樣的話，嗯，下次姐姐就這麼做。給，拿著」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ」\n1090 = "「哇」" \n\n# monologue\n# JP: かっぱをはい、と、れいなに手渡す。\n1720 = "真闇姐把雨衣遞給了玲奈。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「もしよかったら、れーちゃんもらって？\nすごく気にいってくれたみたいやけん」\n1439 = "「這個就送給你吧。既然你這麼喜歡它」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ、わ、わ、いいんですかぁ！　すごいですぅ\nれいな、カエルさんになっちゃいますぅ」\n1089 = "「哇、哇、哇，真的可以嗎！好棒啊，玲奈要變成青蛙了嗎」" \n\n# monologue\n# JP: 深々。お礼。\nそうしてれいなが持ち上げ直す顔は全開に笑ってる。\n1678 = "玲奈深深地鞠躬致謝。然後她抬起臉來，喜笑顏開。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ガイドのときも雨がふったら、\nれいな、これ着ていきますねぇ」\n1043 = "「做嚮導的時候要是下雨了，玲奈會穿上這個」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは別の機会がいいかな。せっかくの新婚旅行。\nどうせだったら晴れてほしい」\n1473 = "「那還是等有機會再說吧。寶貴的新婚旅行還是希望能是晴天」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わわわ、そうでしたぁ」\n1094 = "「哇哇哇，也對啊」" \n\n# monologue\n# JP: とりけしとりけし、と言わんばかりにれいなが手を振る。\n1681 = "玲奈用力揮著手，表示撤回剛才說的話。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「それなられいな、かっぱのお礼に、\nてるてる坊主、たくさんたくさんつくりますねぇ！」\n1455 = "「那作為雨衣的回禮，玲奈會做好多好多晴天娃娃！」" \n