[script]
# lines: 309 
# 【真闇】
# display as 真闇
# JP: 「どぎゃんしたと、双ちゃん？」
1264 = "「怎麼啦，小雙？」" 
# monologue
# JP: すぐ隣から、ふうわりとした真闇姉の声。\n幸せな考えごとから、幸せ極まる現実へと引き戻される。
1744 = "「Sao thế, Sou-chan?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん、\n起こしてしまったか？」
1159 = "Giọng nói dịu dàng của chị Mayami vang lên ngay bên cạnh.\nKéo tôi từ những suy nghĩ hạnh phúc trở về với thực tại ngập tràn hạnh phúc."
# 【真闇】
# display as 真闇
# JP: 「ううん。\nまだ寝入らんで目ば閉じとっただけやったけん」
1332 = "「A, xin lỗi,\nem làm chị thức giấc à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　それならば何故」
1190 = "「Không đâu.\nChị vẫn chưa ngủ, chỉ nhắm mắt thôi」"
# 【真闇】
# display as 真闇
# JP: 「自分で気づいておらんかったと？\nふふって、双ちゃん笑ったの。思い出し笑いみたいに」
1040 = "「Hửm? Vậy tại sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「笑っていたか。そんな自覚はなかったのだが――」
1292 = "「Em không tự nhận ra sao?\nEm vừa cười khúc khích đấy, Sou-chan. Như đang nhớ lại chuyện gì vui vậy」"
# monologue
# JP: 身体が勝手に笑うほど、僕は幸せに満ち満ちている。\n実感すれば、顔がふたたび緩んでしまう。
1641 = "「Em cười sao. Em không nhận ra luôn đấy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「物思いにふけっていただけなのだ。\nこの部屋も、短い時間に何度も用途がかわったものだと」
1283 = "Cơ thể tôi ngập tràn hạnh phúc đến mức tự động bật cười.\nNhận ra điều đó, khuôn mặt tôi lại giãn ra."
# 【真闇】
# display as 真闇
# JP: 「あぁ」
1175 = "「Em chỉ đang mải suy nghĩ thôi.\nCăn phòng này, trong thời gian ngắn đã thay đổi công năng bao nhiêu lần rồi nhỉ」"
# monologue
# JP: 嬉しげな声。\n伝わったことで僕もまた嬉しくさせられる。
1736 = "「À」"
# 【双鉄】
# display as 雙鐵
# JP: 「一番最初は汰斗さんの書庫だった。\nそれを僕の私室として使わせてもらって」
1446 = "Giọng nói vui vẻ.\nViệc tâm tư được thấu hiểu khiến tôi cũng thấy vui lây."
# 【真闇】
# display as 真闇
# JP: 「はーちゃんがやってきて。\nはーちゃんはひーちゃんの部屋におひっこしして」
1344 = "「Đầu tiên là phòng sách của ông Taito.\nSau đó em được dùng làm phòng riêng」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうして今は、僕ら夫婦の寝室だ」
1399 = "「Rồi Haa-chan đến.\nSau đó Haa-chan lại chuyển sang phòng của Hii-chan」"
# monologue
# JP: ハチロクとの部屋だった頃にはかなり濃かった鉄分が、\nいまではほのかな麹の香りに変わった気もする。
1791 = "「Và bây giờ, nó là phòng ngủ của vợ chồng mình」"
# 【双鉄】
# display as 雙鐵
# JP: 「物であるハチロクが、確かな魂をもつように。\nあるいはこの部屋も、もしも魂をもつものならば」
1243 = "Khi còn là phòng của tôi và Hachiroku, mùi sắt khá nồng,\nnhưng giờ tôi cảm giác nó đã chuyển thành hương men kōji thoang thoảng."
# monologue
# JP: 口にしたなら世迷い言だと自分で感じてしまうけれども、\n真闇姉はうんうんと、楽しげに相槌を打ってくれてる。
1769 = "「Giống như Hachiroku, dù là đồ vật nhưng lại có linh hồn.\nCó lẽ căn phòng này, nếu nó cũng có linh hồn」"
# 【双鉄】
# display as 雙鐵
# JP: 「この変遷が部屋にとっても幸せなものであって欲しいと。\nそのようなことを、なんともぼんやり考えていた」
1249 = "Vừa nói ra tôi đã thấy mình như đang lảm nhảm,\nnhưng chị Mayami lại gật gù, vui vẻ hùa theo."
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
1119 = "「Em hy vọng sự biến đổi này cũng là một niềm hạnh phúc đối với căn phòng.\nEm cứ vẩn vơ suy nghĩ những điều như vậy」"
# monologue
# JP: 小さく笑って、真闇姉はそうっと僕の頬を撫ぜる。
1746 = "「Chà chà」"
# 【真闇】
# display as 真闇
# JP: 「お家やらお部屋やらにもしも気持ちがあるんなら、\nそりゃあ幸せに決まっとるでしょお」
1214 = "Chị Mayami cười khúc khích, nhẹ nhàng vuốt ve má tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「断言か。それはいったいどうした理由で」
1448 = "「Nếu nhà cửa hay phòng ốc mà có cảm xúc,\nthì chắc chắn chúng sẽ thấy hạnh phúc rồi」"
# 【真闇】
# display as 真闇
# JP: 「そんなん。[いえ]家ゆーもんは、おうちやけんね」
1365 = "「Chị khẳng định thế sao. Rốt cuộc là vì lý do gì」"
# monologue
# JP: 家と、うち。両者の差異を並べて言われてみて初めて、\n建築物と家庭の差異かと理解する。
1576 = "「Thì đó. Nhà, là tổ ấm mà」"
# 【真闇】
# display as 真闇
# JP: 「家族あってのおうちやけん。\n栄えていくんは、願ったり叶ったりでしょお」
1324 = "Nhà, và tổ ấm. Lần đầu tiên nghe hai từ này đặt cạnh nhau,\ntôi mới hiểu ra sự khác biệt giữa một công trình kiến trúc và một gia đình."
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにそうだな」
1447 = "「Có gia đình mới thành tổ ấm.\nSự hưng thịnh, chẳng phải là điều mà chúng hằng mong ước sao」"
# monologue
# JP: うなずいてふと不思議に思う。\nハチロクが加わって以降、家族の人数は増えてない。
1654 = "「Nghe chị nói vậy, đúng là thế thật」"
# 【双鉄】
# display as 雙鐵
# JP: 「栄えていく、か。\n姉弟が夫婦になれば、その可能性はふくらむな」
1227 = "Gật đầu rồi tôi chợt thấy kỳ lạ.\nTừ khi Hachiroku gia nhập, số lượng thành viên trong gia đình đâu có tăng thêm."
# 【真闇】
# display as 真闇
# JP: 「あら」
# 1119 = "「哎呀」" 
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1504 = "「Hưng thịnh, sao.\nChị em trở thành vợ chồng, khả năng đó sẽ lớn dần lên nhỉ」"
# monologue
# JP: 理屈だけだった僕の言葉が、艶めいた相槌ひとつで、\n生々しいまでの温度を帯びる。
1650 = "「!」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんが栄えさせてくれると？\nおねえちゃんと一緒に」
1039 = "Lời nói đầy lý trí của tôi, chỉ bằng một tiếng hùa theo đầy gợi cảm,\nđã mang theo hơi ấm sống động đến chân thực."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、いつでも望むところだ」
1295 = "「Sou-chan sẽ làm cho gia đình hưng thịnh sao?\nCùng với chị」"
# monologue
# JP: 真闇姉の匂いを不意に感じる。慣れきっていて、\nけれども意識をしたならば、危ういほどに甘い匂いを。
1732 = "「Tất nhiên, lúc nào em cũng sẵn sàng」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今夜は――というかしばらくは控えておきたい。\nなにせ、新婚旅行のための休暇が」
1071 = "Bất chợt, tôi ngửi thấy mùi hương của chị Mayami. Một mùi hương quá đỗi quen thuộc,\nnhưng một khi đã ý thức được, nó lại ngọt ngào đến mức nguy hiểm."
# 【真闇】
# display as 真闇
# JP: 「んふふっ、ようやく、もうすぐよねぇ。\nごめんね？　おねえちゃんが待たせる形になっちゃって」
1194 = "「Nhưng, đêm nay——hay nói đúng hơn là một thời gian tới, em muốn kiềm chế lại.\nDù sao thì, kỳ nghỉ cho tuần trăng mật cũng」"
# 【双鉄】
# display as 雙鐵
# JP: 「お互い様だ。\n僕もまったく、スケジュールの調整がきかなかった」
1271 = "「Ưm fufu, cuối cùng, cũng sắp đến rồi nhỉ.\nXin lỗi em nhé? Chị lại bắt em phải chờ đợi rồi」"
# monologue
# JP: それがぽこん、と一致した。\nゆえ、新婚旅行の準備はまだほとんど進んでいない。
1634 = "「Cả hai đều vậy mà.\nEm cũng hoàn toàn không thể sắp xếp được lịch trình」"
# 【双鉄】
# display as 雙鐵
# JP: 「確実にふたり一緒に休みを取れるのは二日間。\n長期の旅行が無理な日程であることは確かだが」
1280 = "Cuối cùng thì lịch trình của cả hai cũng khớp nhau.\nDo đó, việc chuẩn bị cho tuần trăng mật hầu như vẫn chưa tiến triển gì."
# 【真闇】
# display as 真闇
# JP: 「うん」
# 1175 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕らにはナビもある。日ノ本国内であれば、\nどこへでもいける日程だとも考えられる」
1207 = "「Chúng ta chỉ chắc chắn có thể cùng nhau nghỉ phép trong hai ngày.\nRõ ràng là không thể đi du lịch dài ngày được」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ、のんびり遊覧飛行も、\nそいばそいで、楽しか新婚旅行になりそおねぇ」
1084 = "「Nhưng, chúng ta có Navi. Nếu ở trong nội địa Hinomoto,\nthì lịch trình này đủ để đi bất cứ đâu」"
# monologue
# JP: そういえば、真闇姉はまだナビに乗ったことがない。\n今回ぜひとも乗ってもらおうと思うが、それはそれとして。
1768 = "「Ufufu, bay lượn ngắm cảnh thong dong,\nnhư vậy cũng sẽ là một tuần trăng mật vui vẻ nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのに、本当に『御一夜旅行』が希望でいいのか？\nもしも時間の都合だったら、僕はさらに先に伸ばしても」
1048 = "Nhắc mới nhớ, chị Mayami vẫn chưa từng ngồi Navi.\nLần này nhất định phải để chị ấy đi thử, nhưng chuyện đó tính sau."
# 【真闇】
# display as 真闇
# JP: 「ううん、双ちゃん。時間がもっとたっぷりあっても、\nおねえちゃん、必ず御一夜旅行ばお願いしてた」
1016 = "「Vậy mà, chị thực sự muốn đi 『Du lịch Ohimitera』 sao?\nNếu vì lý do thời gian, em có thể dời lại thêm nữa」"
# monologue
# JP: ふんわり。しかし決然と。\n迷いを一切感じない、いつもどおりの真闇姉の声。
1737 = "「Không đâu, Sou-chan. Dù có nhiều thời gian hơn nữa,\nchị cũng nhất định sẽ xin đi du lịch Ohimitera」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。であらば僕に否やはない。\nが――なぜ御一夜に？」
1209 = "Nhẹ nhàng. Nhưng đầy kiên quyết.\nGiọng nói của chị Mayami vẫn như mọi khi, không chút do dự."
# 【真闇】
# display as 真闇
# JP: 「あんね？　双ちゃん。\n理由はとっても簡単なの」
1402 = "「Em hiểu rồi. Nếu vậy em không có ý kiến gì.\nNhưng——tại sao lại là Ohimitera?」"
# monologue
# JP: 夫と妻になったいまでも、\n真闇姉と僕の間の呼称はまったく変わらない。
1585 = "「Biết không? Sou-chan.\nLý do rất đơn giản」"
# 【真闇】
# display as 真闇
# JP: 「いままで一度も旅したことない、大評判の観光地。\nやけん、『観光旅行』ばしてみたかとよ」
1257 = "Ngay cả khi đã trở thành vợ chồng,\ncách xưng hô giữa tôi và chị Mayami vẫn không hề thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「観光旅行、か」
1417 = "「Một địa điểm du lịch nổi tiếng mà chị chưa từng đến thăm bao giờ.\nNên, chị muốn thử đi 『Du lịch ngắm cảnh』 xem sao」"
# monologue
# JP: 生家のあった小さな町をふと思い出す。\nあそこも一応、観光客の来る町だったが――
1649 = "「Du lịch ngắm cảnh, sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。面白いものかもしれんな。生まれ育って、\n知り尽くした気さえする地元であるゆえ、かえって」
1059 = "Tôi chợt nhớ đến thị trấn nhỏ nơi tôi sinh ra.\nNơi đó cũng được coi là một thị trấn có khách du lịch đến thăm, nhưng——"
# 【真闇】
# display as 真闇
# JP: 「うん。観光客になって訪ねてみたら、\nおねえちゃんがまだ知らん御一夜ば見れるかなぁって」
1170 = "「Ra vậy. Có thể sẽ thú vị đấy. Vì là quê hương nơi mình sinh ra và lớn lên,\ntưởng chừng như đã biết rõ mọi ngóc ngách, nên ngược lại」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。\nとなると、ガイド選びが重要になるな」
1285 = "「Ừ. Nếu thử đóng vai du khách đến thăm,\nchị nghĩ mình sẽ thấy được một Ohimitera mà chị chưa từng biết」"
# monologue
# JP: 言えばもぞりと、真闇姉が体を寄せてくる。
1770 = "「Đã rõ.\nVậy thì, việc chọn hướng dẫn viên sẽ rất quan trọng đây」"
# 【真闇】
# display as 真闇
# JP: 「商工会とかのガイドさんはちょっと。\nおねえちゃん、きっと妙に気を使っちゃいそうやけん」
1422 = "Vừa dứt lời, chị Mayami cựa quậy nhích người lại gần."
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。せっかくの新婚旅行。\nリラックスして楽しめなければもったいないものな」
1026 = "「Hướng dẫn viên của Phòng Thương mại thì hơi...\nChị chắc chắn sẽ thấy gượng gạo lắm」"
# monologue
# JP: ならば……うむ。日々姫ハチロクを候補から外そう。\nふたりも一緒の家族旅行は、別の機会にするべきゆえ。
1792 = "「Đúng vậy. Đã cất công đi tuần trăng mật.\nNếu không thể thư giãn và tận hưởng thì thật lãng phí」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、ふかみあたりも……\n蔵の方との絡みもあるから気を使ってしまうだろうな」
1390 = "Nếu vậy thì……ừm. Loại Hibiki và Hachiroku khỏi danh sách ứng cử viên thôi.\nChuyến du lịch gia đình có cả hai người họ nên để dịp khác."
# 【真闇】
# display as 真闇
# JP: 「銀行さんの中見せてもらえるとかなら楽しそうばってん、\nそいば新婚旅行とは別の機会でよかとよね」
1415 = "「Cỡ Kisaki, hay Fukami thì……\ncũng có liên quan đến xưởng rượu nên chắc sẽ ngại ngùng nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もそのように考えていた。\nとなると凪にも頼めんな。常連さん相手は気をつかう」
1273 = "「Nếu được cho xem bên trong ngân hàng thì chắc sẽ vui lắm,\nnhưng chuyện đó để dịp khác ngoài tuần trăng mật cũng được nhỉ」"
# monologue
# JP: ……ポーレットはあまりに多忙すぎるし、\n頼んでしまえば無理をしてでも引き受けてくれそう――あ
669 = "「Em cũng nghĩ vậy.\nVậy thì cũng không thể nhờ Nagi được. Đối mặt với khách quen sẽ rất ngại」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉。右田一酒造元と一切の取引関係が無い中でなら、\nれいなにガイドを頼んでみるのはどうであろうか」
1376 = "……Paulette thì quá bận rộn,\nnếu nhờ vả, cô ấy có thể sẽ cố sức nhận lời——a"
# 【真闇】
# display as 真闇
# JP: 「れーちゃん！\nうふふっ、かわゆかガイドさんしてくれそうね」
1241 = "「Chị Mayami. Trong số những người không có bất kỳ mối quan hệ làm ăn nào với xưởng rượu Migita System,\nchúng ta thử nhờ Reina làm hướng dẫn viên thì sao?」"
# monologue
# JP: 聞いた瞬間、第一候補と確定するほど、\n実に楽しげにはずむ声。
1764 = "「Bé Reina!\nUfufu, chắc em ấy sẽ là một hướng dẫn viên đáng yêu lắm đây」"
# 【真闇】
# display as 真闇
# JP: 「ばってん、れーちゃんも忙しいんじゃなかと？\nもしも少しでも無理ばさせちゃうようだったら」
1073 = "Ngay khoảnh khắc nghe thấy, giọng nói vui vẻ reo lên,\nđủ để xác định luôn đây là ứng cử viên số một."
# 【双鉄】
# display as 雙鐵
# JP: 「そこは安心してくれて構わない。\n少しでも無理があるなら、ポーレットが引受けさせない」
1490 = "「Nhưng mà, bé Reina cũng bận lắm đúng không?\nNếu làm em ấy phải cố sức dù chỉ một chút」"
# 【真闇】
# display as 真闇
# JP: 「ああ――うふふっ。そうね、絶対。\nぽーちゃん、過保護そうだものねぇ」
1144 = "「Về chuyện đó chị cứ yên tâm.\nNếu có chút gì quá sức, Paulette sẽ không cho nhận đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ、真闇姉のものいいを聞いていると、\n過保護がとても良いことに思える」
1116 = "「A——ufufu. Đúng thế, chắc chắn rồi.\nPau-chan, có vẻ bao bọc quá mức nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「もちろんとっても素敵なことよ。\n過保護も、親ばかも、子煩悩も」
1366 = "「Fufu, nghe cách nói của chị Mayami,\nlại thấy việc bao bọc quá mức là một điều rất tốt」"
# monologue
# JP: きっぱり。ふんわり。\nその断言にも、なんの力みもてらいも無い。
1778 = "「Tất nhiên là một điều rất tuyệt vời rồi.\nDù là bao bọc quá mức, nuông chiều con cái, hay yêu thương con hết mực」"
# 【真闇】
# display as 真闇
# JP: 「そーせんでよーなったら、どうしたって手ば離れるけん。\n手ぇつないでくれとる間は、過保護がよかよ」
1033 = "Quả quyết. Nhẹ nhàng.\nLời khẳng định đó, không chút gượng gạo hay màu mè."
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
700 = "「Nếu không làm vậy nữa, thì kiểu gì cũng sẽ buông tay thôi.\nTrong lúc còn nắm tay nhau, bao bọc quá mức cũng tốt mà」"
# monologue
# JP: 真闇姉には無論、子育ての経験なぞない。\nならばこれは、日々姫への思いなのかとふっと感じる。
1731 = "「……Vậy sao」"
# 【真闇】
# display as 真闇
# JP: 「それより、ね？　れーちゃんにもしガイドば頼めるなら。\n細かな打ち合わせには、おねーちゃんも参加してよか？」
1019 = "Chị Mayami dĩ nhiên không có kinh nghiệm nuôi dạy con cái.\nVậy thì đây hẳn là những suy nghĩ dành cho Hibiki, tôi chợt nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。真闇姉の時間がとれるのであれば」
1364 = "「Hơn nữa, nè? Nếu có thể nhờ bé Reina làm hướng dẫn viên.\nChị cũng có thể tham gia vào buổi bàn bạc chi tiết được không?」"
# 【真闇】
# display as 真闇
# JP: 「30分やら1時間やらならどーとでもなるけん。\nほんなら、一緒ね。もし引き受けてもらえたら」
1007 = "「Tất nhiên rồi. Nếu chị Mayami có thời gian」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。が、確実に引き受けてもらえるとは限らん。\nダメだったときの第二候補はどうしよう」
1379 = "「30 phút hay 1 tiếng thì lúc nào cũng xoay sở được.\nVậy thì, cùng nhau nhé. Nếu em ấy nhận lời」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんこつは、断られてから考えればよかよ。\n抑えばあると、どこか気がぬけてしまうもんやけん」
1456 = "「Đã rõ. Nhưng, không chắc chắn là em ấy sẽ nhận lời đâu.\nNếu không được thì ứng cử viên thứ hai sẽ là ai đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。ではそうしよう」
1061 = "「Chuyện đó, đợi bị từ chối rồi hẵng nghĩ.\nNếu có phương án dự phòng, tự nhiên sẽ thấy chùn bước mà」"
# 【真闇】
# display as 真闇
# JP: 「ん……」
1164 = "「Ra vậy. Vậy cứ quyết định thế đi」"
# monologue
# JP: 相槌のようで、うわごとのような。\n眠たさが戻ってきたなと感じる声。
1616 = "「Ưm……」"
# 【双鉄】
# display as 雙鐵
# JP: 「思わぬ形で打ち合わせができてよかった。\nが、起こしてしまったのは本当にすまなかった」
1361 = "Giống như hùa theo, lại giống như nói mớ.\nGiọng nói cho thấy cơn buồn ngủ đã quay trở lại."
# 【真闇】
# display as 真闇
# JP: 「んーん、さっきも言うたよ？\nおねーちゃん、寝てなかったけん」
1331 = "「Thật tốt khi có thể bàn bạc theo một cách không ngờ tới.\nNhưng, thật sự xin lỗi vì đã đánh thức chị」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば今度こそ眠ろう。\nお互い、朝の早い仕事だ」
1443 = "「Không đâu, nãy chị cũng nói rồi mà?\nChị, vẫn chưa ngủ đâu」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1175 = "「嗯」" 
# monologue
# JP: 今度の声は、甘えとおねだり。\nそれに応えて、静かにおやすみのキスをする。
1790 = "「Vậy sao, vậy thì lần này ngủ thật nhé.\nCả hai ta, đều có công việc phải dậy sớm mà」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、乗り心地最高でぇす。\nさすが、そうてつさんごじまんのナビさんですねぇ」
1197 = "Giọng nói lần này, mang theo sự nũng nịu và vòi vĩnh.\nĐáp lại điều đó, tôi lặng lẽ trao một nụ hôn chúc ngủ ngon."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「真闇様のお膝の上は、当機の標準装備ではありません」
1372 = "「Ufufuu, cảm giác ngồi tuyệt vời quá đi ạ.\nĐúng là Navi mà anh Soutetsu luôn tự hào có khác nha」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ」
1080 = "「Trên đùi của phu nhân Mayami, không phải là trang bị tiêu chuẩn của cỗ máy này」"
# monologue
# JP: ナビの律儀な訂正は、真闇姉から暖かな笑みを引き出す。
1798 = "「Ufufu」"
# 【真闇】
# display as 真闇
# JP: 「そうよ、れーちゃん。\nおねえちゃんのお膝の上ば、今日はれーちゃんの特等席」
1335 = "Sự đính chính nghiêm túc của Navi, khiến chị Mayami nở nụ cười ấm áp."
# 【れいな】
# display as 玲奈
# JP: 「とくとうせき！」
1351 = "「Đúng rồi đó, bé Reina.\nTrên đùi chị, hôm nay là ghế đặc biệt của bé Reina đó」"
# monologue
# JP: その言葉になにか特別な想いでもあるのか、\nれいなのテンションが一段あがる。
1788 = "「Ghế đặc biệt!」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、さすが特等席は違いますねぇ。\nさいっこうにふかふかでふわふわでぇす」
1136 = "Lời nói đó có chứa đựng cảm xúc đặc biệt nào không,\nmà sự phấn khích của Reina lại tăng thêm một bậc."
# monologue
# JP: 超極上のヘッドレストがついているゆえ、当然だろう。\n思った瞬間、僅かな嫉妬を自覚し、笑ってしまう。
1619 = "「Ehehe, đúng là ghế đặc biệt có khác nha.\nCực kỳ êm ái và mềm mại luôn ạ」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、そうてつさんも楽しそう！\n楽しいですもんねぇ、お空。こぉんなに広いんですねぇ」
1196 = "Có tựa đầu siêu cao cấp thế kia, tất nhiên rồi.\nKhoảnh khắc nghĩ vậy, tôi tự nhận thức được sự ghen tị thoáng qua, rồi bật cười."
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1311 = "「Ufufuu, anh Soutetsu trông cũng vui quá kìa!\nVui lắm đúng không ạ, bầu trời. Rộng lớn đến nhường này cơ mà」"
# monologue
# JP: どちらかといえば自嘲めいていた笑みを、けれどれいなは\n実に前向きに捉えてくれた。ならば素直に乗っかろう。
1647 = "「Đúng vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「空もいいが、眼下の景色もすばらしいぞ。\nいつもの町も、地上から見るのとはまるで違う」
1203 = "Dù nụ cười của tôi có phần tự trào, nhưng Reina\nlại đón nhận nó một cách rất tích cực. Vậy thì cứ ngoan ngoãn hùa theo thôi."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「かしこまりました。旋回します」
1306 = "「Bầu trời cũng đẹp, nhưng cảnh sắc bên dưới cũng tuyệt vời lắm đấy.\nThị trấn quen thuộc, nhìn từ trên cao hoàn toàn khác biệt so với dưới mặt đất」"
# 【れいな】
# display as 玲奈
# JP: 「わああっ」
1097 = "「Đã rõ. Tiến hành xoay vòng」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
# 1119 = "「哎呀」" 
# monologue
# JP: 眼下を眺めやすいよう、\nナビは機体を、実になめらかに傾ける。
1800 = "「Waaa」"
# 【れいな】
# display as 玲奈
# JP: 「わあぁ！　すごいですぅ！\n御一夜の町が、とってもちっちゃくなってますぅ」
1101 = "Để dễ dàng ngắm nhìn cảnh sắc bên dưới,\nNavi nghiêng thân máy bay một cách vô cùng mượt mà."
# 【真闇】
# display as 真闇
# JP: 「うん、まっことすごかとねぇ。\nおねーちゃんも、こぎゃん景色は初めて見ると」
1181 = "「Waaa! Tuyệt quá đi ạ!\nThành phố Ohimitera, trở nên nhỏ xíu luôn ạ」"
# 【れいな】
# display as 玲奈
# JP: 「ね、ね。まくらさん。\nレールショップはどこですかぁ？」
1457 = "「Ừ, thật sự tuyệt vời quá nhỉ.\nChị cũng, lần đầu tiên nhìn thấy cảnh sắc như thế này đó」"
# 【真闇】
# display as 真闇
# JP: 「えっと、線路ば最初に見つけて」
1290 = "「Nè, nè. Chị Mayami.\nCửa hàng đường sắt ở đâu vậy ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「線路線路……あ！　あれですねぇ。\nそれならそれなら――あった！　レールショップぅ！！」
1487 = "「Để xem, trước tiên tìm đường ray đã」"
# 【真闇】
# display as 真闇
# JP: 「ってことは、隈銀があれやけん――\nああ、うちん蔵も見えた」
1474 = "「Đường ray đường ray……a! Kia rồi nha.\nVậy thì vậy thì——thấy rồi! Cửa hàng đường sắt!!」"
# 【れいな】
# display as 玲奈
# JP: 「わぁいわぁい！　聞こえますかぁ、ポーレットぉ！\nれいな、お空から呼んでるんですよぉ」
1096 = "「Nghĩa là, Kumagin ở đằng kia——\nA, thấy xưởng rượu nhà mình rồi」"
# 【真闇】
# display as 真闇
# JP: 「あら、よかねぇ。おねえちゃんも真似しちゃお。\nひーちゃん、はーちゃん、聞こゆるやー？」
1131 = "「Waai waai! Có nghe thấy không, chị Paulette!\nReina, đang gọi từ trên trời đó nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ。きっと聞こえていることだろう。\nポーレットにも、日々姫にもハチロクにも」
1114 = "「Ây da, hay quá nhỉ. Chị cũng bắt chước thử xem.\nHii-chan, Haa-chan, có nghe thấy không~?」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、だったらうれしいですぅ。\nあ！　そうだ、かとうすずめさーん！　きこえますかぁ」
1140 = "「Fufu. Chắc chắn là nghe thấy rồi.\nCả Paulette, Hibiki và Hachiroku nữa」"
# monologue
# JP: いきなりれいなの大きな声。\nほんの一瞬動揺したのが、僕だかナビだかわからぬほどの。
1685 = "「Ehehe, nếu vậy thì vui quá ạ.\nA! Đúng rồi, anh Kato Suzume~! Có nghe thấy không ạ」"
# 【真闇】
# display as 真闇
# JP: 「あらあられーちゃん、\nそぎゃん大きなお声ば、おねえちゃんびっくりしちゃう」
1125 = "Đột nhiên Reina hét lớn.\nSự bối rối trong chốc lát đó, không biết là do tôi hay Navi nữa."
# 【れいな】
# display as 玲奈
# JP: 「はぅ。ごめんなさぁい。れいな、ただ、\nかとうすずめさんとお空でお話できたらいいなぁって」
1149 = "「Ây da ây da bé Reina,\nhét to như vậy, làm chị giật cả mình đó」"
# 【真闇】
# display as 真闇
# JP: 「次から大きな出す時には、\nあらかじめいうてくれたらそれでよかけん」
1010 = "「Hau. Em xin lỗi ạ. Reina, chỉ là,\nnghĩ nếu có thể nói chuyện với anh Kato Suzume trên trời thì tốt biết mấy」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいな必ずそうしまぁす」
1213 = "「Lần sau muốn hét to,\nthì báo trước cho chị một tiếng là được rồi」"
# monologue
# JP: よい子のお返事。つづくワクワクした呼吸。\nけれどもそれが、少ししょぼんとした声になる。
1671 = "「Vâng ạ. Reina nhất định sẽ làm vậy ạ」"
# 【れいな】
# display as 玲奈
# JP: 「……れいなちょっと残念ですぅ。かとうすずめさんには、\n声、とどかなかったんですかねぇ」
692 = "Câu trả lời của một đứa trẻ ngoan. Tiếp đó là nhịp thở đầy háo hức.\nNhưng rồi, nó lại biến thành một giọng nói có chút xịu xuống."
# 【透】
# display as 透
# JP: 「ううむ……それは――」
1168 = "「……Reina hơi tiếc một chút ạ. Chắc là anh Kato Suzume,\nkhông nghe thấy tiếng rồi nhỉ」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「御一夜の町を一望できるこの高度では、\n飛翔している雀を見ることは全くありません」
1287 = "「Ưm……Chuyện đó thì——」"
# monologue
# JP: なんと時宜を得た助け舟――いや、助け飛行機だろうか。
1789 = "「Ở độ cao có thể bao quát toàn cảnh thành phố Ohimitera này,\nhoàn toàn không thể nhìn thấy chim sẻ đang bay đâu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「とのことだ。\n聞こえていても、この高さまでは飛んでこれんのだろう」
1247 = "Quả là một chiếc thuyền cứu sinh kịp thời——à không, máy bay cứu sinh mới đúng."
# 【れいな】
# display as 玲奈
# JP: 「わわわ！　れいな知らなくて！\nあの、まくらさん、れいな、大きな声だしますねぇ」
1092 = "「Là vậy đó.\nDù có nghe thấy, chắc anh ấy cũng không bay lên được độ cao này đâu」"
# 【真闇】
# display as 真闇
# JP: 「うん。よかよ」
1177 = "「Wawawa! Reina không biết luôn!\nÀ này, chị Mayami, Reina, sắp hét to nha」"
# 【れいな】
# display as 玲奈
# JP: 「むりして飛んでこなくていいですよー！\n後でパンくずあげるから、いい子で待ってて下さいねー」
1036 = "「Ừ. Được thôi」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ。れーちゃん優しかねぇ。\n優しくってかしこくって、とってもいいこ」
1083 = "「Ufufu. Bé Reina ngoan quá đi.\nVừa ngoan ngoãn lại thông minh, đúng là một đứa trẻ tốt」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい。れいな失敗しちゃったのに、\n褒めてもらえてうれしいですぅ」
1109 = "「Waai. Reina làm hỏng bét rồi mà,\nvẫn được khen nên vui quá đi ạ」"
# monologue
# JP: ……空にはしゃいでいるせいなのか、\nれいなは普段より幼く思える。実に和む。和むのだが――
671 = "……Chắc do đang phấn khích vì được bay trên trời,\nReina trông trẻ con hơn ngày thường. Thật sự rất ấm áp. Ấm áp là vậy, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ところで真闇姉、れいな」
1377 = "「Nhân tiện, chị Mayami, Reina này」"
# monologue
# JP: ――れいなも真闇姉も僕も、後ろの用事は詰まっている。\nいつまでも浸っていた空気だけれど、切り出さねばだ。
1667 = "——Cả Reina, chị Mayami và tôi đều có lịch trình sau đó.\nDù bầu không khí có vui vẻ đến mấy thì cũng phải vào việc chính thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「せっかく空の上にいるのだ。町を見ながら、\n新婚旅行のコースについてを考えたいのだが」
1281 = "「Nhân lúc đang ở trên không. Vừa ngắm nhìn thị trấn,\nem muốn bàn về lịch trình cho tuần trăng mật」"
# 【れいな】
# display as 玲奈
# JP: 「あ！　そうでしたぁ。れいなそのために\nナビさんに乗せてもらったんでしたっけ」
1152 = "「A! Đúng rồi ha. Reina vì chuyện đó\nmới được cho lên Navi ngồi mà nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「はじめてのお空、楽しかけんねぇ。\nおねえちゃんもすっかり忘れとったと」
1394 = "「Lần đầu lên trời vui quá mà.\nChị cũng quên béng mất luôn đó」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、そうなんですねぇ」
1134 = "「Ehehe, ra là vậy ạ」"
# monologue
# JP: 僕の耳にも聞こえるように、\nほんの少しだけ大きな声のヒソヒソ話が、れいなをほぐす。
1725 = "Lời thì thầm với âm lượng lớn hơn một chút\nđể tôi cũng có thể nghe thấy, đã giúp Reina thả lỏng hơn."
# 【れいな】
# display as 玲奈
# JP: 「ならなら、ここからがうちあわせですねぇ。\nれいなにガイド、頼んでくれてありがとうございまぁす」
1469 = "「Vậy thì vậy thì, từ bây giờ chúng ta bắt đầu bàn bạc nha.\nCảm ơn anh chị đã nhờ Reina làm hướng dẫn viên ạ」"
# 【真闇】
# display as 真闇
# JP: 「こちらこそ、引き受けてくれてありがとぉ」
1279 = "「Chị mới là người phải cảm ơn em vì đã nhận lời đó」"
# 【れいな】
# display as 玲奈
# JP: 「いえいえですぅ。れいな、とってもがんばりますねぇ！\nれいなの、新しいお仕事ですし」
1014 = "「Không có gì đâu ạ. Reina sẽ cố gắng hết sức nha!\nĐây cũng là công việc mới của Reina mà」"
# monologue
# JP: 真闇姉の強い希望で、れいなは業務でガイドを受けた。\n御一夜鉄道観光部への、正式な依頼受注という形で。
1610 = "Thể theo nguyện vọng mạnh mẽ của chị Mayami, Reina đã nhận công việc hướng dẫn viên.\nDưới hình thức là một đơn đặt hàng chính thức gửi đến Bộ phận Du lịch của Đường sắt Ohito."
# 【れいな】
# display as 玲奈
# JP: 「それでええとぉ。まず、どうしてもここは見学したい！\nっていうところを教えてくださぁい」
1477 = "「Vậy thì để xem. Đầu tiên, hãy cho Reina biết\nnhững nơi mà anh chị nhất định muốn đến tham quan nha」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃん的には、定番のクマ川くだりと\n包丁作り体験は外したくないかなぁ。双ちゃんは？」
1222 = "「Với chị thì, chắc chắn không thể bỏ qua trò xuôi dòng sông Kuma\nvà trải nghiệm rèn dao rồi. Còn Sou-chan thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その二箇所以外だと、8620牽引客車への乗車となるかな。\n湯医往復とはなってしまうが、投炭体験などもできる」
1494 = "「Ngoài hai nơi đó ra, chắc là đi tàu khách do 8620 kéo nhỉ.\nDù sẽ phải đi khứ hồi đến Yui, nhưng cũng có thể trải nghiệm xúc than dồn toa nữa」"
# 【真闇】
# display as 真闇
# JP: 「んふふっ、面白そう。ほんならガイドさん。\nいまゆーたん、ぜぇんぶコースにいれてもらえますか？」
1086 = "「Ưm fufu, nghe thú vị đấy. Vậy thì cô hướng dẫn viên ơi.\nCó thể cho hết mấy cái vừa nói vào lịch trình được không?」"
# 【れいな】
# display as 玲奈
# JP: 「……計算しましたぁ。ぜぇんぶばっちりまわって、\nお昼ごはんの時間もよゆうでとれちゃいますねぇ」
690 = "「……Tính xong rồi ạ. Đi hết tất cả những chỗ đó,\nvẫn còn dư dả thời gian để ăn trưa luôn nha」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、すごかねぇ」
1129 = "「Chà chà, giỏi quá ta」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、レイルロオドですからぁ。\n情報さえ事前にもらえてれば、計算するの簡単でぇす」
1355 = "「Vì Reina là Railord mà lị.\nChỉ cần có thông tin từ trước thì tính toán dễ ẹc à」"
# 【真闇】
# display as 真闇
# JP: 「それでもすごかと。\nおねーちゃんにはなかなかできんことやけん」
1453 = "「Thế cũng là giỏi lắm rồi.\nChị thì còn lâu mới làm được thế」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー、ありがとうございまぁす。\nあ、けどですね、もう少しほしい情報があって」
1137 = "「Ehehe, em cảm ơn ạ.\nA, nhưng mà, Reina cần thêm một chút thông tin nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　何だ」
1189 = "「Hửm? Gì thế」"
# 【れいな】
# display as 玲奈
# JP: 「晩ごはんの時間と、何時にお宿に戻りたいのかを。\nお宿は、ブルートレイン[たらぎ,1]鱈木さんでしたよねぇ」
1319 = "「Giờ ăn tối, và mấy giờ anh chị muốn về lại nhà trọ.\nNhà trọ là Blue Train Taragi đúng không ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああそうか。あの辺だと着水地点に困るのか。\n新婚旅行で川原を藪こぎするのはさすがに避けたいし」
1155 = "「À đúng rồi. Quanh đó khó tìm chỗ đáp máy bay nhỉ.\nĐang đi tuần trăng mật mà phải lội bãi cỏ lau ven sông thì cũng không hay lắm」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。その点、鉄道だったら、御一夜鉄道自慢の\nキハ07sが臨時停車で、らくらくつれていきますよぉ」
1245 = "「Đúng rồi ạ. Về điểm này, nếu đi tàu thì\nKiha 07S tự hào của Đường sắt Ohito sẽ dừng đỗ tạm thời, đưa anh chị đến nơi dễ dàng luôn nha」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ。ほんなら、ね？　双ちゃん」
1118 = "「Chà chà. Vậy thì, được chứ? Sou-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。宿には鉄道でアクセスしよう。\n当日はポーレットの単独乗務となるのか」
1307 = "「Được thôi. Đến nhà trọ bằng tàu đi.\nHôm đó Paulette sẽ lái tàu một mình à?」"
# 【れいな】
# display as 玲奈
# JP: 「ですよぉ。ポーレット、ひとり乗務もとっても上手で、\n安全安心快適だって思いまぁす」
1310 = "「Đúng vậy ạ. Chị Paulette lái một mình cũng siêu giỏi,\nReina đảm bảo là an toàn, an tâm và thoải mái luôn nha」"
# 【真闇】
# display as 真闇
# JP: 「ああ」
# 1175 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1175 = "「嗯」" 
# monologue
# JP: 真闇姉と、声が、そして恐らく、気持ちも重なる。\nそうか、れいなは――
1636 = "Giọng nói của tôi và chị Mayami, và có lẽ cả suy nghĩ, đã hòa làm một.\nRa vậy, Reina——"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、鉄道で確定しよう。ポーレットが単独乗務する\nキハ07sに、乗ってみたくも思うしな」
1460 = "「Vậy thì chốt đi tàu nhé. Em cũng muốn thử đi\nKiha 07S do Paulette lái một mình xem sao」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい！　それじゃあそうしましょうねぇ。\nだとだと、お宿に何時にはいるかで」
1401 = "「Waai! Vậy thì quyết định thế nha.\nVậy thì vậy thì, mấy giờ anh chị muốn về nhà trọ ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「どの列車に乗るかが自動決定されるわけだよな。\n候補としては――21D、23D、25Dあたりとなるか」
1470 = "「Tùy vào đó mà chuyến tàu sẽ tự động được quyết định nhỉ.\nCác lựa chọn sẽ là——khoảng 21D, 23D, 25D chăng」"
# 【真闇】
# display as 真闇
# JP: 「なぁにそれ？」
1465 = "「Cái gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、列車番号だ。\n御一夜発が奇数。湯医発が偶数になる」
1156 = "「À, số hiệu tàu đấy.\nXuất phát từ Ohimitera là số lẻ. Xuất phát từ Yui là số chẵn」"
# 【れいな】
# display as 玲奈
# JP: 「それぞれ17:27、18:34、19:41の御一夜駅発ですね。\n[たらぎはいえき,3]鱈木廃駅臨時停車が、18:04と19:11と20:18でぇす」
1053 = "「Lần lượt là 17:27, 18:34, 19:41 xuất phát từ ga Ohimitera ạ.\nDừng đỗ tạm thời tại ga bỏ hoang Taragi lúc 18:04, 19:11 và 20:18 nha」"
# 【真闇】
# display as 真闇
# JP: 「わ。さすがプロ……\nゆーか、もう一本遅か列車でも大丈夫？」
1108 = "「Oa. Đúng là dân chuyên nghiệp……\nMà này, đi chuyến muộn hơn một chuyến có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「27Dだと最終列車になるな。\n21:35御一夜温泉駅発で、鱈木廃駅臨時停車が22:09」
1505 = "「27D thì sẽ là chuyến tàu cuối cùng đấy.\nXuất phát từ ga Suối nước nóng Ohimitera lúc 21:35, dừng đỗ tạm thời tại ga bỏ hoang Taragi lúc 22:09」"
# monologue
# JP: ん、と真闇姉の小さな頷き。
1747 = "Ưm, chị Mayami khẽ gật đầu."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃん的には、お風呂もご飯も御一夜ですませて。\nお宿ばついたら、寝るのだけを堪能したいかなぁって」
1219 = "「Theo ý chị thì, cứ tắm rửa và ăn tối xong xuôi ở Ohimitera đi.\nĐến nhà trọ rồi thì chỉ muốn tận hưởng giấc ngủ thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「であれば、27Dが確かに最適解だろう。\nれいな、27Dに乗車までのガイドで頼めるか」
1479 = "「Nếu vậy, 27D chắc chắn là lựa chọn tối ưu nhất rồi.\nReina, anh nhờ em làm hướng dẫn viên cho đến khi lên tàu 27D được không?」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。ご飯とお風呂は、\nそれぞれ何分ずつみておけばいいですかぁ」
1303 = "「Reina hiểu rồi ạ. Bữa ăn và việc tắm rửa,\nmỗi cái cần dự trù bao nhiêu phút vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は無論、真闇姉のペースにあわせるが」
1289 = "「Anh thì dĩ nhiên là theo nhịp độ của chị Mayami rồi」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら……そうね。\nお昼も夜もお風呂も、それぞれ１時間ずつで」
1445 = "「Vậy thì……để xem.\nCả bữa trưa, bữa tối và tắm rửa, mỗi cái 1 tiếng nhé」"
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。それだと、あと一箇所くらいは\nどこかしっかり見学できそうになりますねぇ」
1382 = "「Reina hiểu rồi ạ. Vậy thì, có vẻ sẽ dư thời gian\nđể tham quan kỹ một nơi nào đó nữa nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。……どうだろう。\n僕は特には思いつかんが――」
1166 = "「Hừm. ……Làm sao đây.\nAnh thì không nghĩ ra chỗ nào đặc biệt cả——」"
# 【真闇】
# display as 真闇
# JP: 「じゃ、そこばガイドさんにおまかせで。\nガイドさんおすすめの、いっとう御一夜らしかとこ」
1462 = "「Vậy thì, chỗ đó giao cho cô hướng dẫn viên đấy.\nMột nơi đậm chất Ohimitera nhất mà hướng dẫn viên đề xuất」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　わかりましたぁ。\nれいな、がんばっておすすめ考えますねぇ！」
1211 = "「Vâng ạ! Reina hiểu rồi.\nReina sẽ cố gắng suy nghĩ chỗ nào hay nhất nha!」"
# monologue
# JP: れいなのとても元気な声に、\n不意に静かな声が重なる。
1609 = "Xen lẫn với giọng nói đầy năng lượng của Reina,\nlà một giọng nói trầm tĩnh bất chợt vang lên."
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様。お打ち合わせの最中に申し訳ございません。\n気圧が急速に低下しております」
1495 = "「Ngài Soutetsu. Xin lỗi vì đã cắt ngang cuộc họp của ngài.\nÁp suất không khí đang giảm mạnh」"
# 【双鉄】
# display as 雙鐵
# JP: 「雨になるのか？」
1413 = "「Sắp mưa sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。ナビは20分以内に降雨が発生すると予測します」
1316 = "「Vâng. Navi dự đoán sẽ có mưa trong vòng 20 phút nữa」"
# 【真闇】
# display as 真闇
# JP: 「ありゃま。雨ば降ったら町の様子も見れなくなるとね」
1126 = "「Ây da. Nếu trời mưa thì không ngắm cảnh thị trấn được nữa rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「というか、地上に戻るなら早い方がいい。\n上空で雨をやりすごすという選択肢もあるが」
1269 = "「Nói đúng hơn là, nếu muốn quay lại mặt đất thì nên làm sớm.\nDù cũng có lựa chọn bay trên cao đợi mưa tạnh」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「降雨は恐らく翌朝以降まで激しい勢いで続きます。\nナビはご帰宅をおすすめします」
1201 = "「Mưa có thể sẽ tiếp tục rơi rất lớn cho đến sáng mai.\nNavi khuyên ngài nên trở về nhà」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだ。\n今ならまだ、降られる前に帰宅できるかもしれん」
1205 = "「Là vậy đó.\nBây giờ về thì có thể vẫn kịp trước khi trời mưa」"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！\nれいな、傘もってくるのわすれちゃいましたぁ」
1104 = "「Oa!\nReina, quên mang theo ô mất rồi ạ」"
# 【真闇】
# display as 真闇
# JP: 「ほんならいったんうちの蔵によればよかとよ。\n傘でも長靴でも雨合羽でも貸したげるけん」
1458 = "「Vậy thì ghé qua xưởng nhà chị một lát đi.\nÔ, ủng hay áo mưa, chị đều cho mượn được hết」"
# 【れいな】
# display as 玲奈
# JP: 「あまがっぱ！」
1499 = "「Áo mưa!」"
# monologue
# JP: その一声ではっきりわかる。\nれいなの瞳は、いま最高にキラキラしていると。
1627 = "Chỉ một tiếng đó là đủ hiểu rõ.\nĐôi mắt của Reina lúc này, chắc chắn đang lấp lánh hết cỡ."
# 【れいな】
# display as 玲奈
# JP: 「れいな、あまがっぱ借りたいでぇす！！」
1357 = "「Reina, muốn mượn áo mưa ạ!!」"
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ、土砂降りになっちゃいましたねぇ。\nギリギリ間に合ってよかったですぅ」
1112 = "「Fuwaa, mưa xối xả luôn rồi kìa.\nMay mà về kịp sát nút nha」"
# monologue
# JP: 窓の外を眺めつつ、\nれいなが少し勝ち誇ったような声を出す。
1677 = "Vừa nhìn ra ngoài cửa sổ,\nReina vừa cất giọng có chút đắc ý."
# 【れいな】
# display as 玲奈
# JP: 「ナビさんのいうこと聞いてよかったですねぇ。\nみんなずぶ濡れになっちゃうとこでしたぁ」
1403 = "「Nghe lời chị Navi đúng là tốt quá ha.\nKhông là mọi người ướt sũng hết rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、想像以上の激しさだ。\nこれは乗務も大変だろう」
1314 = "「Đúng vậy, mưa lớn hơn tưởng tượng nhiều.\nThế này thì làm nhiệm vụ cũng vất vả lắm đây」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。とくに8620は大変でしょうねぇ」
1312 = "「Đúng vậy ạ. Đặc biệt là 8620 chắc sẽ vất vả lắm nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、日々姫凪にハチロク乗務だ。\n当然ながら、なんの問題もなかろうが」
1023 = "「Dù vậy, đội lái có Hibiki, Nagi và Hachiroku mà.\nTất nhiên là sẽ không có vấn đề gì đâu」"
# 【真闇】
# display as 真闇
# JP: 「あらあら、ふたりで何のお話しとったと？」
1123 = "「Ây da, hai người đang nói chuyện gì vậy?」"
# monologue
# JP: 紙包みをひとつ抱きかかえ、\n真闇姉が二階からおりてくる。
1724 = "Ôm một gói giấy trên tay,\nchị Mayami đi từ trên tầng hai xuống."
# 【れいな】
# display as 玲奈
# JP: 「鉄道のお話してましたぁ。\n急な土砂降りで8620は大変ですねぇ、って」
1278 = "「Bọn em đang nói chuyện về đường sắt ạ.\nBảo là mưa xối xả đột ngột thế này thì 8620 vất vả lắm」"
# 【真闇】
# display as 真闇
# JP: 「れーちゃんのキハ07sもたいへんでしょお。\nぽーちゃんひとりで」
1239 = "「Kiha 07S của bé Reina cũng vất vả mà nhỉ.\nChỉ có một mình Pau-chan」"
# 【れいな】
# display as 玲奈
# JP: 「キハ07sはディーゼルエンジン気動車だから、\n大変は大変でも、蒸気機関車ほどじゃないですぅ」
1512 = "「Kiha 07S là toa xe diesel tự hành mà,\nnên có vất vả thì cũng không bằng đầu máy hơi nước đâu ạ」"
# 【真闇】
# display as 真闇
# JP: 「んん？」
1186 = "「Hửm?」"
# monologue
# JP: 真闇姉には珍しい、完全に戸惑ってしまった声。\nならば喜んで解説しよう。
1715 = "Một giọng nói hoàn toàn bối rối, hiếm thấy ở chị Mayami.\nVậy thì tôi rất sẵn lòng giải thích."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸気機関は、レスポンスがひどく悪いのだ。\n湯を沸かして蒸気に換えて動力にするという特性ゆえに」
1411 = "「Động cơ hơi nước có phản hồi rất chậm.\nVì đặc tính là đun sôi nước thành hơi nước rồi mới tạo ra động lực」"
# 【真闇】
# display as 真闇
# JP: 「ああ、そりゃあそうよねぇ。おうちのヤカンひとつでも、\n沸くまでにそれなりに時間かかっちゃうけん」
1162 = "「À, đúng là vậy nhỉ. Cả cái ấm đun nước ở nhà,\ncũng phải mất một lúc mới sôi được mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「その通りだ。で、例えば急な上り坂を考えてみてくれ。\n上りきるには、平地よりずっと多くの蒸気が必要となる」
1334 = "「Chính xác. Vậy, hãy thử tưởng tượng một con dốc cao xem.\nĐể leo lên hết, sẽ cần lượng hơi nước nhiều hơn hẳn so với đường bằng」"
# 【真闇】
# display as 真闇
# JP: 「ふんふん」
1176 = "「Hừm hừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「必要となるたくさんの蒸気は、当然ながら、\n坂に差し掛かるより前に沸かしておかねば間に合わぬ」
1501 = "「Lượng hơi nước lớn cần thiết đó, tất nhiên,\nphải được đun sôi trước khi đến con dốc thì mới kịp」"
# 【真闇】
# display as 真闇
# JP: 「ああああ、そかそか。そぎゃん意味ね」
1161 = "「Aaaa, ra là vậy. Là ý đó nhỉ」"
# monologue
# JP: さすが理解が極めて早い。\nならば蛇足になるかもしれぬと思いつつ、言葉を継ぎ足す。
1570 = "Quả nhiên là hiểu rất nhanh.\nNghĩ rằng có thể sẽ là thừa thãi, nhưng tôi vẫn nói thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道は常に定点間を移動するものゆえ、どこでどれだけ\n蒸気を用意しておけばいいかは経験則でわかっているが」
1486 = "「Đường sắt luôn di chuyển giữa các điểm cố định, nên cần chuẩn bị bao nhiêu hơi nước\nvà ở đâu thì theo kinh nghiệm là biết được, nhưng」"
# 【れいな】
# display as 玲奈
# JP: 「雨の振り始めは、とくにレールがすべっちゃうんですぅ。\nだから、普段よりもっと力が必要になるんですよぉ」
1012 = "「Khi trời mới bắt đầu mưa, đường ray sẽ đặc biệt trơn trượt.\nNên sẽ cần nhiều sức mạnh hơn bình thường đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「その『もっと必要になる力』がどの程度かは状況次第。\nレイルロオドにも計算不能な分野となる」
1407 = "「Mức độ 『sức mạnh cần thêm』 đó phụ thuộc vào tình huống.\nĐó là một lĩnh vực mà cả Railord cũng không thể tính toán được」"
# 【れいな】
# display as 玲奈
# JP: 「だから運転士――蒸気機関車なら機関士さんと\nレイルロオドとで、このくらいかなぁってやるんです」
1296 = "「Thế nên lái tàu——nếu là đầu máy hơi nước thì lái tàu\nvà Railord sẽ cùng nhau ước lượng xem cần khoảng bao nhiêu ạ」"
# monologue
# JP: ん、と小さく、考えこむような息。
1718 = "Ưm, một tiếng thở nhẹ, như đang suy ngẫm."
# 【真闇】
# display as 真闇
# JP: 「……ほんなら蒸気ば単純に、いつもいくらか、\n余裕をもたせて用意しておけばいいんじゃなかと？」
703 = "「……Vậy thì đơn giản là, lúc nào cũng\nchuẩn bị dư ra một chút hơi nước là được mà nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「凄いな。それはもちろん大正解だ。が、理想をいうなら\n石炭は消耗品ゆえ、あまり無駄にはしたくなくもある」
1368 = "「Tuyệt quá. Đó tất nhiên là câu trả lời chính xác. Nhưng lý tưởng mà nói,\nthan đá là vật tư tiêu hao, nên cũng không muốn lãng phí quá nhiều」"
# 【真闇】
# display as 真闇
# JP: 「ああ」
1199 = "「À」"
# monologue
# JP: 特にハチロクは完璧主義の傾向が強いゆえ、\n無駄焚きすれば減点対象とされてしまう。が――
1663 = "Đặc biệt là Hachiroku có xu hướng cầu toàn rất mạnh,\nnên nếu đốt phí than sẽ bị coi là điểm trừ. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ上り坂で蒸気が足りなくなるより遥かにマシだ。\n鉄道の第一の使命は、常に安全であるゆえに」
1024 = "「Dù vậy thì vẫn tốt hơn nhiều so với việc thiếu hơi nước khi lên dốc.\nVì sứ mệnh hàng đầu của đường sắt, luôn là sự an toàn」"
# 【れいな】
# display as 玲奈
# JP: 「悩んだときは安全側に倒すんですよぉ。\nそうしないと、事故になっちゃいますから」
1353 = "「Khi phân vân thì phải chọn phương án an toàn nhất nha.\nNếu không thì sẽ xảy ra tai nạn đó ạ」"
# 【真闇】
# display as 真闇
# JP: 「事故」
1029 = "「Tai nạn」"
# monologue
# JP: 少し驚いたような声。\nそうか、そこは想像がつかんのか。
1728 = "Giọng nói có chút ngạc nhiên.\nRa vậy, chị ấy không thể tưởng tượng được điều đó sao."
# 【双鉄】
# display as 雙鐵
# JP: 「単純な話だ。上り坂の途中で蒸気――\nつまりは動力が足りなくなってしまったのなら」
1420 = "「Đơn giản thôi. Nếu giữa chừng lên dốc mà hơi nước——\ntức là động lực bị thiếu hụt thì」"
# 【れいな】
# display as 玲奈
# JP: 「いまのぼろうとしてた坂を、列車は滑り落ちちゃいます。\n客車列車なら、一番重いのが先頭の機関車ですから」
1055 = "「Tàu sẽ trượt ngược xuống con dốc đang cố leo lên.\nNếu là tàu khách, thì phần nặng nhất chính là đầu máy ở phía trước mà」"
# 【真闇】
# display as 真闇
# JP: 「あああ」
1145 = "「Aaa」"
# monologue
# JP: 真闇姉の眉根が潜まる。
1741 = "Chị Mayami cau mày."
# 【真闇】
# display as 真闇
# JP: 「そいば確かに事故になるとね。\nもしも後続の列車もあったら、大事故に」
1467 = "「Vậy thì chắc chắn sẽ thành tai nạn rồi.\nNếu có cả tàu chạy phía sau nữa thì sẽ là tai nạn lớn mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのだ。ゆえにこの急な土砂降りは気を使うなと、\nれいなと話していたのだが――」
1333 = "「Đúng vậy. Thế nên anh mới nói với Reina rằng\ncơn mưa xối xả đột ngột này sẽ rất mệt mỏi đấy——」"
# 【れいな】
# display as 玲奈
# JP: 「なんの心配もいらないですねぇって、\nふたりで確認してたんですよぉ」
1035 = "「Tụi em vừa mới xác nhận với nhau là,\nkhông cần phải lo lắng gì cả đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。凪のイケイケ、ハチロクの慎重。\nそこに日々姫のバランスが、実に見事に噛み合うゆえに」
1174 = "「Ừm. Sự hăng hái của Nagi, sự thận trọng của Hachiroku.\nThêm vào đó là sự cân bằng của Hibiki, thực sự kết hợp rất hoàn hảo」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？　ほんなら安心。うれしか」
1444 = "「Vậy sao? Vậy thì yên tâm rồi. Vui quá đi」"
# monologue
# JP: ひそまっていた眉毛がゆるみ、\nそのままふうわり、笑みとなる。
1740 = "Đôi lông mày đang nhíu lại dần giãn ra,\nrồi nhẹ nhàng chuyển thành một nụ cười."
# 【真闇】
# display as 真闇
# JP: 「うふふっ。不思議ね。そーちゃんがこん家に来たころは、\nこぎゃん話聞けるとは、夢にも思うとらんかったと」
1079 = "「Ufufu. Lạ thật đấy. Hồi Sou-chan mới đến nhà này,\nchị nằm mơ cũng không nghĩ là sẽ được nghe những chuyện thế này đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当にだな」
1185 = "「Ừ, đúng là vậy thật」"
# 【れいな】
# display as 玲奈
# JP: 「！　そうてつさんのちっちゃいころって、\nどんな感じだったんですかぁ？」
1153 = "「! Hồi nhỏ anh Soutetsu,\ntrông như thế nào vậy ạ?」"
# monologue
# JP: 思わぬところにれいなが食いつく。\n真闇姉は待ってましたとばかりに――っ！
1657 = "Reina lại hứng thú với một chủ đề không ngờ tới.\nChị Mayami như chỉ chờ có thế——!"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1087 = "「Ây da」"
# monologue
# JP: 勢いこんだ真闇姉の手から\nずり落ちかかった紙包みを支えて、戻す。
1709 = "Đỡ lấy gói giấy đang chực tuột khỏi tay chị Mayami\nđang vô cùng hăng hái, tôi đặt nó lại."
# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ。こいば持ってきとったんだった」
1121 = "「Ây da da. Quên mất là mình đang cầm cái này」"
# monologue
# JP: ガサゴソ紙づつみが……ほどかれ、て――
1794 = "Sột soạt, gói giấy……được mở ra, và——"
# 【れいな】
# display as 玲奈
# JP: 「わああ！　カエルさん色のあまがっぱですぅ」
1102 = "「Waaa! Là áo mưa màu bạn ếch ạ」"
# monologue
# JP: 先程ほどよりも激しい食いつき。\n僕へ過去への興味なぞ、一瞬にして投げ捨てられる。
1673 = "Sự hứng thú còn mãnh liệt hơn cả lúc nãy.\nSự quan tâm đến quá khứ của tôi, bị vứt bỏ trong chớp mắt."
# 【れいな】
# display as 玲奈
# JP: 「かわいいですねぇ。きれいですねぇ。\n借りちゃうの悪い気がしますぅ」
1369 = "「Dễ thương quá đi. Đẹp quá đi.\nMượn mặc thì ngại lắm ạ」"
# 【真闇】
# display as 真闇
# JP: 「そんなん、気にせんと着倒しちゃって？\n多分、ちょうど――」
1018 = "「Không sao đâu, em cứ mặc thoải mái đi?\nChắc là, vừa vặn——」"
# monologue
# JP: 真闇姉がかっぱをひろげ、れいなに軽くあてがってみる。
1722 = "Chị Mayami mở chiếc áo mưa ra, ướm thử lên người Reina."
# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　れいなにぴったりのサイズですぅ」
1099 = "「Fuwaaa! Kích cỡ vừa in với Reina luôn ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。\nと、いうことは、かなり古いものなのか？」
1449 = "「Đúng thật nhỉ.\nVậy có nghĩa là, nó khá cũ rồi sao?」"
# 【真闇】
# display as 真闇
# JP: 「うん、そぎゃんよ。\nかーなーり、古か雨合羽」
1178 = "「Ừ, đúng vậy đó.\nLà một chiếc áo mưa, khá là cũ rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1077 = "「!」"
# monologue
# JP: しまった、かなりは余計であった。\nリアクションする度胸はないゆえ、流すほか
1613 = "Chết tiệt, chữ \"khá\" đó thật thừa thãi.\nKhông có can đảm để phản ứng lại, nên đành lơ đi thôi"
# 【れいな】
# display as 玲奈
# JP: 「ええええ、そんなふうに全然見えないですよぉ。\nとっても綺麗で、新品みたいですぅ」
1133 = "「Eeeee, trông không giống thế chút nào đâu ạ.\nRất đẹp, cứ như đồ mới luôn ấy」"
# monologue
# JP: れいなの無邪気に救われる。\n今度は助け気動車だ。
1683 = "Sự ngây thơ của Reina đã cứu tôi.\nLần này là toa xe tự hành cứu sinh."
# 【真闇】
# display as 真闇
# JP: 「まぁ、完全未使用中古品ゆうやつやけん。おねえちゃん\nひーちゃんの好みにあわんの勝手に買うてきちゃって」
1182 = "「Thì, nó là đồ cũ nhưng hoàn toàn chưa qua sử dụng mà. Chị\nđã tự ý mua dù không hợp với sở thích của Hii-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1504 = "「！」" 
# monologue
# JP: ……良くある話であろうからこそ身につまされる。\nけれどれいなは気にとめない。
677 = "……Chính vì là chuyện thường tình nên mới thấy chạnh lòng.\nNhưng Reina thì không bận tâm."
# 【れいな】
# display as 玲奈
# JP: 「そおだったんですねぇ。カエルさん色も、\n日々姫さんにきっと似合うってれいなも思うんですけど」
1440 = "「Ra là vậy ạ. Màu bạn ếch,\nReina cũng nghĩ là sẽ rất hợp với chị Hibiki mà」"
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそう思うとったと。ばってん、ね？」
1217 = "「Chị cũng nghĩ vậy đó. Nhưng mà, biết sao không?」"
# monologue
# JP: 真闇姉が座布団の上に腰を下ろすゆえ、\n僕らも素直にそれに従う。
1713 = "Chị Mayami ngồi xuống tấm đệm,\nchúng tôi cũng ngoan ngoãn làm theo."
# 【真闇】
# display as 真闇
# JP: 「ちーちゃかころからひーちゃん、美意識の高かったけん。\nお洋服とか、ぜぇんぶ自分で選んどったし」
1235 = "「Từ hồi bé xíu Hii-chan đã có gu thẩm mỹ cao rồi.\nQuần áo hay gì đó, toàn tự mình chọn hết」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1175 = "「嗯」" 
# monologue
# JP: 不意に思い出す。真闇姉から預かったお金と、日々姫と。\nその両方を手放さないよう、必死になってた過去の自分を。
1638 = "Tôi chợt nhớ lại. Số tiền chị Mayami giao cho, và Hibiki.\nNhớ lại bản thân trong quá khứ đã tuyệt vọng thế nào để không tuột mất cả hai thứ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……確かにそうだったな。いつでも日々姫は、\nものすごい時間をかけてあれこれ服を選んでいた」
689 = "「……Đúng là vậy thật. Lúc nào Hibiki cũng\ndành rất nhiều thời gian để chọn lựa quần áo này nọ」"
# monologue
# JP: 思い出したまま言葉にすれば、\n真闇姉はふ、と微笑を浮かべる。
1644 = "Vừa nói ra những gì nhớ lại,\nchị Mayami khẽ nở nụ cười."
# 【真闇】
# display as 真闇
# JP: 「ありがとね、双ちゃん。あのころも今も――\nおねえちゃんの代わりに、ひーちゃんのこと見てくれて」
1421 = "「Cảm ơn em nhé, Sou-chan. Cả hồi đó và bây giờ——\nđã thay chị, chăm sóc cho Hii-chan」"
# monologue
# JP: 罪悪感を、言葉に混じる息に垣間見てしまった気がして。\nゆえ軽く。できる限りに軽く明るく返事する。
1639 = "Tôi có cảm giác như nhìn thấy sự tội lỗi lẩn khuất trong từng nhịp thở hòa lẫn với lời nói.\nNên tôi trả lời thật nhẹ nhàng. Nhẹ nhàng và tươi sáng nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「あのころは――あのころの僕ならば、うん。確かに\n"代わり”を義務として果たしていたかもしれんが……」
1363 = "「Hồi đó thì——nếu là em của hồi đó, ừm. Chắc chắn là\nem đã làm \"người thay thế\" như một nghĩa vụ, nhưng……」"
# monologue
# JP: それでもなお、興味深い時間であったと記憶している。\n日々姫の無数の質問に返事するのは、路子とはない経験で。
1606 = "Dù vậy, tôi vẫn nhớ đó là khoảng thời gian rất thú vị.\nTrả lời vô số câu hỏi của Hibiki, là trải nghiệm mà tôi chưa từng có với Michiko."
# 【双鉄】
# display as 雙鐵
# JP: 「今は代わりなど務めていない。日々姫も僕のいもうとだ、\n妻の妹という意味ではなくて、僕自身のいもうとだから」
1360 = "「Bây giờ em không làm người thay thế nữa. Hibiki cũng là em gái của em,\nkhông phải với tư cách là em gái của vợ, mà là em gái của chính em」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ。うれしか。ありがとお」
1191 = "「Ufufu. Vui quá. Cảm ơn em nha」"
# 【れいな】
# display as 玲奈
# JP: 「？？？　日々姫さんがそうてつさんのいもうとさんなの、\nあたりまえのことじゃないんですかぁ？」
1510 = "「??? Chị Hibiki là em gái của anh Soutetsu,\nchẳng phải là chuyện đương nhiên sao ạ?」"
# monologue
# JP: きょとんと固まるれいなの鼻を、\n真闇姉が指を伸ばしてかるうくつつく。
1668 = "Chị Mayami đưa tay ra gõ nhẹ\nvào chiếc mũi của Reina đang ngẩn tò te."
# 【れいな】
# display as 玲奈
# JP: 「きゃあ♪」
1076 = "「Kyaa♪」"
# 【真闇】
# display as 真闇
# JP: 「うん。あたりまえのこと。雨合羽ば懐かしすぎて、\nおねえちゃん、ちょっとセンチメンタルになっちゃった」
1172 = "「Ừ. Chuyện đương nhiên mà. Tại chiếc áo mưa này hoài niệm quá,\nnên chị hơi sến sẩm một chút thôi」"
# 【れいな】
# display as 玲奈
# JP: 「そっかあ、せんちめんたるなんですねぇ」
1442 = "「Ra là vậy, sến sẩm ha」"
# monologue
# JP: 100\%わかってない声。\nふふふっ、と。真闇姉がもらした微笑も楽しげだ。
1675 = "Một giọng nói nghe là biết không hiểu 100\\%.\nFufufu. Nụ cười của chị Mayami cũng thật vui vẻ."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんね？　いっしょうけんめい伝えてくれたと\n『こいば着たら、全部がカエルになっちゃう』って」
1234 = "「Hii-chan á? Đã cố gắng giải thích cho chị là\n『Nếu mặc cái này, tất cả sẽ biến thành ếch mất』 đó」"
# 【れいな】
# display as 玲奈
# JP: 「全部がカエル！　ふわわ、ゆめみたいに素敵ですねぇ」
1301 = "「Tất cả biến thành ếch! Fuwawa, tuyệt vời như một giấc mơ vậy nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、日々姫が一生懸命考えたおしゃれが、\n全部かっぱに塗りつぶされてしまうというわけか」
1060 = "「Ra vậy, bộ đồ thời trang mà Hibiki đã cất công nghĩ ra,\nsẽ bị chiếc áo mưa che khuất hết sao」"
# 【真闇】
# display as 真闇
# JP: 「そ」
1231 = "「Đúng vậy」"
# monologue
# JP: 僕に/れいなに。真闇姉は同時に相槌を打つ。
1711 = "Với tôi/với Reina. Chị Mayami đồng thời hùa theo."
# 【真闇】
# display as 真闇
# JP: 「れーちゃんはそいば嬉しくて、ひーちゃんは悲しかった。\n好みの違いゆーたら、単にそれだけのことばってん」
1359 = "「Bé Reina thì vui vì điều đó, còn Hii-chan thì lại buồn.\nNói là sở thích khác nhau, thì cũng chỉ đơn giản là vậy thôi」"
# monologue
# JP: サバサバと。\n多分僕に気を使わせぬよう、真闇姉が意識してる声。
1729 = "Thật sảng khoái.\nChắc là giọng nói mà chị Mayami cố tình dùng để tôi không phải bận tâm."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそのころはいっぱいいっぱいで、\n『いらんゆーなら捨てるけん』って声あらげちゃって」
1221 = "「Lúc đó chị cũng đang bù đầu bù cổ,\nnên đã lớn tiếng 『Không cần thì vứt đi』」"
# 【れいな】
# display as 玲奈
# JP: 「わ！\nまくらさんが怒ったらとってもこわそうですねぇ」
1106 = "「Oa!\nChị Mayami mà nổi giận thì chắc đáng sợ lắm nha」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんこつなかとよ？　ばってん……\nそんときはひーちゃん泣かせちゃって、もう自己嫌悪で」
1298 = "「Không có đâu? Nhưng mà……\nLúc đó làm Hii-chan khóc, chị tự ghét bản thân mình lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そんなことがあったのか」
701 = "「……Đã có chuyện như vậy sao」"
# monologue
# JP: 問えば、苦笑。\nなにより雄弁な返答だ。
1787 = "Khi được hỏi, chị chỉ cười gượng.\nMột câu trả lời hùng hồn hơn bất cứ điều gì."
# 【真闇】
# display as 真闇
# JP: 「返品交換するのもイヤで。ついついそのまま。\n別の雨合羽ば、後日、双ちゃんについてってもらって」
1346 = "「Cũng không muốn đem đi đổi trả. Cứ thế để đó luôn.\nSau đó, Sou-chan đã dẫn em ấy đi mua một chiếc áo mưa khác」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1175 = "「嗯」" 
# monologue
# JP: 日々姫の雨合羽なら覚えている。僕も一緒に選んで買った。\nオレンジの入ったチェックの……いかにも日々姫好みの。
1653 = "Áo mưa của Hibiki thì tôi nhớ. Tôi cũng đi cùng để chọn mua.\nMàu cam kẻ sọc……đúng kiểu Hibiki thích."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんの選んだとなら、もう似合うて似合うて、\nなるほどなぁって。ばってん、ね？」
1237 = "「Nếu là cái Hii-chan chọn, thì hợp ơi là hợp,\nchị mới vỡ lẽ ra. Nhưng mà, biết sao không?」"
# monologue
# JP: しげしげと、懐かしそうに、真闇姉はかっぱを見つめる。
1743 = "Chị Mayami nhìn chằm chằm vào chiếc áo mưa, đầy vẻ hoài niệm."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも若かったけん。たまにはおねーちゃんの\n選んだもんば、ひーちゃんに着てほしかったと」
1225 = "「Hồi đó chị cũng còn trẻ mà. Đôi khi cũng muốn\nHii-chan mặc đồ do chị chọn」"
# 【れいな】
# display as 玲奈
# JP: 「そっかぁ。\nそれなら一緒にえらんだらよかったですねぇ」
1441 = "「Ra là vậy.\nThế thì hai người cùng nhau chọn là được rồi mà」"
# 【真闇】
# display as 真闇
# JP: 「あは！　まっことね。ほんなら、うん。\n次んときにはおねーちゃんそうする。で、こいば」
1147 = "「Aha! Đúng vậy nhỉ. Vậy thì, ừm.\nLần sau chị sẽ làm thế. Vậy, cái này」"
# 【れいな】
# display as 玲奈
# JP: 「わ」
1090 = "「Oa」"
# monologue
# JP: かっぱをはい、と、れいなに手渡す。
1720 = "Chị Mayami đưa chiếc áo mưa cho Reina."
# 【真闇】
# display as 真闇
# JP: 「もしよかったら、れーちゃんもらって？\nすごく気にいってくれたみたいやけん」
1439 = "「Nếu được, bé Reina nhận lấy nhé?\nCó vẻ em rất thích nó mà」"
# 【れいな】
# display as 玲奈
# JP: 「わ、わ、わ、いいんですかぁ！　すごいですぅ\nれいな、カエルさんになっちゃいますぅ」
1089 = "「Wa, wa, wa, được thật ạ! Tuyệt quá đi\nReina, sắp biến thành bạn ếch rồi ạ」"
# monologue
# JP: 深々。お礼。\nそうしてれいなが持ち上げ直す顔は全開に笑ってる。
1678 = "Cúi gập người. Cảm ơn.\nSau đó Reina ngẩng mặt lên với nụ cười tươi rói."
# 【れいな】
# display as 玲奈
# JP: 「ガイドのときも雨がふったら、\nれいな、これ着ていきますねぇ」
1043 = "「Lúc làm hướng dẫn viên mà trời mưa,\nReina, sẽ mặc cái này đi nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは別の機会がいいかな。せっかくの新婚旅行。\nどうせだったら晴れてほしい」
1473 = "「Chắc để dịp khác thì tốt hơn. Đã cất công đi tuần trăng mật.\nDù sao thì cũng mong trời nắng」"
# 【れいな】
# display as 玲奈
# JP: 「わわわ、そうでしたぁ」
1094 = "「Wawawa, đúng rồi ha」"
# monologue
# JP: とりけしとりけし、と言わんばかりにれいなが手を振る。
1681 = "Reina xua tay như muốn nói \"Rút lại rút lại\"."
# 【れいな】
# display as 玲奈
# JP: 「それなられいな、かっぱのお礼に、\nてるてる坊主、たくさんたくさんつくりますねぇ！」
1455 = "「Vậy thì Reina, để cảm ơn chiếc áo mưa,\nsẽ làm thật nhiều thật nhiều búp bê cầu nắng nha!」"
