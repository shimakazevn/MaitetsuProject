# 【真闇】
# display as 真闇
# JP: 「ほんならいったんうちの蔵によればよかとよ。\n傘でも長靴でも雨合羽でも貸したげるけん」
1458 = "「Vậy thì ghé qua xưởng nhà chị một lát đi.\nÔ, ủng hay áo mưa, chị đều cho mượn được\nhết」"

# 【れいな】
# display as 玲奈
# JP: 「あまがっぱ！」
1499 = "「Áo mưa!」"

# monologue
# JP: その一声ではっきりわかる。\nれいなの瞳は、いま最高にキラキラしていると。
1627 = "Chỉ một tiếng đó là đủ hiểu rõ.\nĐôi mắt của Reina lúc này, chắc chắn đang\nlấp lánh hết cỡ."

# 【れいな】
# display as 玲奈
# JP: 「れいな、あまがっぱ借りたいでぇす！！」
1357 = "「Reina, muốn mượn áo mưa ạ!!」"

# 【れいな】
# display as 玲奈
# JP: 「ふわぁ、土砂降りになっちゃいましたねぇ。\nギリギリ間に合ってよかったですぅ」
1112 = "「Fuwaa, mưa xối xả luôn rồi kìa.\nMay mà về kịp sát nút nha」"

# monologue
# JP: 窓の外を眺めつつ、\nれいなが少し勝ち誇ったような声を出す。
1677 = "Vừa nhìn ra ngoài cửa sổ,\nReina vừa cất giọng có chút đắc ý."

# 【れいな】
# display as 玲奈
# JP: 「ナビさんのいうこと聞いてよかったですねぇ。\nみんなずぶ濡れになっちゃうとこでしたぁ」
1403 = "「Nghe lời chị Navi đúng là tốt quá ha.\nKhông là mọi người ướt sũng hết rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな、想像以上の激しさだ。\nこれは乗務も大変だろう」
1314 = "「Đúng vậy, mưa lớn hơn tưởng tượng nhiều.\nThế này thì làm nhiệm vụ cũng vất vả lắm\nđây」"

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。とくに8620は大変でしょうねぇ」
1312 = "「Đúng vậy ạ. Đặc biệt là 8620 chắc sẽ vất\nvả lắm nha」"

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、日々姫凪にハチロク乗務だ。\n当然ながら、なんの問題もなかろうが」
1023 = "「Dù vậy, đội lái có Hibiki, Nagi và\nHachiroku mà.\nTất nhiên là sẽ không có vấn đề gì đâu」"

# 【真闇】
# display as 真闇
# JP: 「あらあら、ふたりで何のお話しとったと？」
1123 = "「Ây da, hai người đang nói chuyện gì vậy?」"

# monologue
# JP: 紙包みをひとつ抱きかかえ、\n真闇姉が二階からおりてくる。
1724 = "Ôm một gói giấy trên tay,\nchị Mayami đi từ trên tầng hai xuống."

# 【れいな】
# display as 玲奈
# JP: 「鉄道のお話してましたぁ。\n急な土砂降りで8620は大変ですねぇ、って」
1278 = "「Bọn em đang nói chuyện về đường sắt ạ.\nBảo là mưa xối xả đột ngột thế này thì\n8620 vất vả lắm」"

# 【真闇】
# display as 真闇
# JP: 「れーちゃんのキハ07sもたいへんでしょお。\nぽーちゃんひとりで」
1239 = "「Kiha 07S của bé Reina cũng vất vả mà nhỉ.\nChỉ có một mình Pau-chan」"

# 【れいな】
# display as 玲奈
# JP: 「キハ07sはディーゼルエンジン気動車だから、\n大変は大変でも、蒸気機関車ほどじゃないですぅ」
1512 = "「Kiha 07S là toa xe diesel tự hành mà,\nnên có vất vả thì cũng không bằng đầu máy\nhơi nước đâu ạ」"

# 【真闇】
# display as 真闇
# JP: 「んん？」
1186 = "「Hửm?」"

# monologue
# JP: 真闇姉には珍しい、完全に戸惑ってしまった声。\nならば喜んで解説しよう。
1715 = "Một giọng nói hoàn toàn bối rối, hiếm thấy\nở chị Mayami.\nVậy thì tôi rất sẵn lòng giải thích."

# 【双鉄】
# display as 雙鐵
# JP: 「蒸気機関は、レスポンスがひどく悪いのだ。\n湯を沸かして蒸気に換えて動力にするという特性ゆえに」
1411 = "「Động cơ hơi nước có phản hồi rất chậm.\nVì đặc tính là đun sôi nước thành hơi nước\nrồi mới tạo ra động lực」"

# 【真闇】
# display as 真闇
# JP: 「ああ、そりゃあそうよねぇ。おうちのヤカンひとつでも、\n沸くまでにそれなりに時間かかっちゃうけん」
1162 = "「À, đúng là vậy nhỉ. Cả cái ấm đun nước ở\nnhà,\ncũng phải mất một lúc mới sôi được mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「その通りだ。で、例えば急な上り坂を考えてみてくれ。\n上りきるには、平地よりずっと多くの蒸気が必要となる」
1334 = "「Chính xác. Vậy, hãy thử tưởng tượng một\ncon dốc cao xem.\nĐể leo lên hết, sẽ cần lượng hơi nước\nnhiều hơn hẳn so với đường bằng」"

# 【真闇】
# display as 真闇
# JP: 「ふんふん」
1176 = "「Hừm hừm」"

# 【双鉄】
# display as 雙鐵
# JP: 「必要となるたくさんの蒸気は、当然ながら、\n坂に差し掛かるより前に沸かしておかねば間に合わぬ」
1501 = "「Lượng hơi nước lớn cần thiết đó, tất\nnhiên,\nphải được đun sôi trước khi đến con dốc\nthì mới kịp」"

# 【真闇】
# display as 真闇
# JP: 「ああああ、そかそか。そぎゃん意味ね」
1161 = "「Aaaa, ra là vậy. Là ý đó nhỉ」"

# monologue
# JP: さすが理解が極めて早い。\nならば蛇足になるかもしれぬと思いつつ、言葉を継ぎ足す。
1570 = "Quả nhiên là hiểu rất nhanh.\nNghĩ rằng có thể sẽ là thừa thãi, nhưng\ntôi vẫn nói thêm."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道は常に定点間を移動するものゆえ、どこでどれだけ\n蒸気を用意しておけばいいかは経験則でわかっているが」
1486 = "「Đường sắt luôn di chuyển giữa các điểm cố\nđịnh, nên cần chuẩn bị bao nhiêu hơi nước\nvà ở đâu thì theo kinh nghiệm là biết\nđược, nhưng」"

# 【れいな】
# display as 玲奈
# JP: 「雨の振り始めは、とくにレールがすべっちゃうんですぅ。\nだから、普段よりもっと力が必要になるんですよぉ」
1012 = "「Khi trời mới bắt đầu mưa, đường ray sẽ\nđặc biệt trơn trượt.\nNên sẽ cần nhiều sức mạnh hơn bình thường\nđó ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「その『もっと必要になる力』がどの程度かは状況次第。\nレイルロオドにも計算不能な分野となる」
1407 = "「Mức độ 『sức mạnh cần thêm』 đó phụ thuộc\nvào tình huống.\nĐó là một lĩnh vực mà cả Railord cũng\nkhông thể tính toán được」"

# 【れいな】
# display as 玲奈
# JP: 「だから運転士――蒸気機関車なら機関士さんと\nレイルロオドとで、このくらいかなぁってやるんです」
1296 = "「Thế nên lái tàu——nếu là đầu máy hơi nước\nthì lái tàu\nvà Railord sẽ cùng nhau ước lượng xem cần\nkhoảng bao nhiêu ạ」"

# monologue
# JP: ん、と小さく、考えこむような息。
1718 = "Ưm, một tiếng thở nhẹ, như đang suy ngẫm."

# 【真闇】
# display as 真闇
# JP: 「……ほんなら蒸気ば単純に、いつもいくらか、\n余裕をもたせて用意しておけばいいんじゃなかと？」
703 = "「……Vậy thì đơn giản là, lúc nào cũng\nchuẩn bị dư ra một chút hơi nước là được\nmà nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「凄いな。それはもちろん大正解だ。が、理想をいうなら\n石炭は消耗品ゆえ、あまり無駄にはしたくなくもある」
1368 = "「Tuyệt quá. Đó tất nhiên là câu trả lời\nchính xác. Nhưng lý tưởng mà nói,\nthan đá là vật tư tiêu hao, nên cũng không\nmuốn lãng phí quá nhiều」"

# 【真闇】
# display as 真闇
# JP: 「ああ」
1199 = "「À」"

# monologue
# JP: 特にハチロクは完璧主義の傾向が強いゆえ、\n無駄焚きすれば減点対象とされてしまう。が――
1663 = "Đặc biệt là Hachiroku có xu hướng cầu toàn\nrất mạnh,\nnên nếu đốt phí than sẽ bị coi là điểm\ntrừ. Nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ上り坂で蒸気が足りなくなるより遥かにマシだ。\n鉄道の第一の使命は、常に安全であるゆえに」
1024 = "「Dù vậy thì vẫn tốt hơn nhiều so với việc\nthiếu hơi nước khi lên dốc.\nVì sứ mệnh hàng đầu của đường sắt, luôn là\nsự an toàn」"

# 【れいな】
# display as 玲奈
# JP: 「悩んだときは安全側に倒すんですよぉ。\nそうしないと、事故になっちゃいますから」
1353 = "「Khi phân vân thì phải chọn phương án an\ntoàn nhất nha.\nNếu không thì sẽ xảy ra tai nạn đó ạ」"

# 【真闇】
# display as 真闇
# JP: 「事故」
1029 = "「Tai nạn」"

# monologue
# JP: 少し驚いたような声。\nそうか、そこは想像がつかんのか。
1728 = "Giọng nói có chút ngạc nhiên.\nRa vậy, chị ấy không thể tưởng tượng được\nđiều đó sao."

# 【双鉄】
# display as 雙鐵
# JP: 「単純な話だ。上り坂の途中で蒸気――\nつまりは動力が足りなくなってしまったのなら」
1420 = "「Đơn giản thôi. Nếu giữa chừng lên dốc mà\nhơi nước——\ntức là động lực bị thiếu hụt thì」"

# 【れいな】
# display as 玲奈
# JP: 「いまのぼろうとしてた坂を、列車は滑り落ちちゃいます。\n客車列車なら、一番重いのが先頭の機関車ですから」
1055 = "「Tàu sẽ trượt ngược xuống con dốc đang cố\nleo lên.\nNếu là tàu khách, thì phần nặng nhất chính\nlà đầu máy ở phía trước mà」"

# 【真闇】
# display as 真闇
# JP: 「あああ」
1145 = "「Aaa」"

# monologue
# JP: 真闇姉の眉根が潜まる。
1741 = "Chị Mayami cau mày."

# 【真闇】
# display as 真闇
# JP: 「そいば確かに事故になるとね。\nもしも後続の列車もあったら、大事故に」
1467 = "「Vậy thì chắc chắn sẽ thành tai nạn rồi.\nNếu có cả tàu chạy phía sau nữa thì sẽ là\ntai nạn lớn mất」"

# 【双鉄】
# display as 雙鐵
# JP: 「なのだ。ゆえにこの急な土砂降りは気を使うなと、\nれいなと話していたのだが――」
1333 = "「Đúng vậy. Thế nên anh mới nói với Reina\nrằng\ncơn mưa xối xả đột ngột này sẽ rất mệt mỏi\nđấy——」"

# 【れいな】
# display as 玲奈
# JP: 「なんの心配もいらないですねぇって、\nふたりで確認してたんですよぉ」
1035 = "「Tụi em vừa mới xác nhận với nhau là,\nkhông cần phải lo lắng gì cả đó ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。凪のイケイケ、ハチロクの慎重。\nそこに日々姫のバランスが、実に見事に噛み合うゆえに」
1174 = "「Ừm. Sự hăng hái của Nagi, sự thận trọng\ncủa Hachiroku.\nThêm vào đó là sự cân bằng của Hibiki,\nthực sự kết hợp rất hoàn hảo」"

# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？　ほんなら安心。うれしか」
1444 = "「Vậy sao? Vậy thì yên tâm rồi. Vui quá đi」"

# monologue
# JP: ひそまっていた眉毛がゆるみ、\nそのままふうわり、笑みとなる。
1740 = "Đôi lông mày đang nhíu lại dần giãn ra,\nrồi nhẹ nhàng chuyển thành một nụ cười."

# 【真闇】
# display as 真闇
# JP: 「うふふっ。不思議ね。そーちゃんがこん家に来たころは、\nこぎゃん話聞けるとは、夢にも思うとらんかったと」
1079 = "「Ufufu. Lạ thật đấy. Hồi Sou-chan mới đến\nnhà này,\nchị nằm mơ cũng không nghĩ là sẽ được nghe\nnhững chuyện thế này đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当にだな」
1185 = "「Ừ, đúng là vậy thật」"

# 【れいな】
# display as 玲奈
# JP: 「！　そうてつさんのちっちゃいころって、\nどんな感じだったんですかぁ？」
1153 = "「! Hồi nhỏ anh Soutetsu,\ntrông như thế nào vậy ạ?」"

# monologue
# JP: 思わぬところにれいなが食いつく。\n真闇姉は待ってましたとばかりに――っ！
1657 = "Reina lại hứng thú với một chủ đề không\nngờ tới.\nChị Mayami như chỉ chờ có thế——!"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1087 = "「Ây da」"

# monologue
# JP: 勢いこんだ真闇姉の手から\nずり落ちかかった紙包みを支えて、戻す。
1709 = "Đỡ lấy gói giấy đang chực tuột khỏi tay\nchị Mayami\nđang vô cùng hăng hái, tôi đặt nó lại."

# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ。こいば持ってきとったんだった」
1121 = "「Ây da da. Quên mất là mình đang cầm cái\nnày」"

# monologue
# JP: ガサゴソ紙づつみが……ほどかれ、て――
1794 = "Sột soạt, gói giấy……được mở ra, và——"

# 【れいな】
# display as 玲奈
# JP: 「わああ！　カエルさん色のあまがっぱですぅ」
1102 = "「Waaa! Là áo mưa màu bạn ếch ạ」"

# monologue
# JP: 先程ほどよりも激しい食いつき。\n僕へ過去への興味なぞ、一瞬にして投げ捨てられる。
1673 = "Sự hứng thú còn mãnh liệt hơn cả lúc nãy.\nSự quan tâm đến quá khứ của tôi, bị vứt bỏ\ntrong chớp mắt."

# 【れいな】
# display as 玲奈
# JP: 「かわいいですねぇ。きれいですねぇ。\n借りちゃうの悪い気がしますぅ」
1369 = "「Dễ thương quá đi. Đẹp quá đi.\nMượn mặc thì ngại lắm ạ」"

# 【真闇】
# display as 真闇
# JP: 「そんなん、気にせんと着倒しちゃって？\n多分、ちょうど――」
1018 = "「Không sao đâu, em cứ mặc thoải mái đi?\nChắc là, vừa vặn——」"

# monologue
# JP: 真闇姉がかっぱをひろげ、れいなに軽くあてがってみる。
1722 = "Chị Mayami mở chiếc áo mưa ra, ướm thử lên\nngười Reina."

# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　れいなにぴったりのサイズですぅ」
1099 = "「Fuwaaa! Kích cỡ vừa in với Reina luôn ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。\nと、いうことは、かなり古いものなのか？」
1449 = "「Đúng thật nhỉ.\nVậy có nghĩa là, nó khá cũ rồi sao?」"

# 【真闇】
# display as 真闇
# JP: 「うん、そぎゃんよ。\nかーなーり、古か雨合羽」
1178 = "「Ừ, đúng vậy đó.\nLà một chiếc áo mưa, khá là cũ rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1077 = "「!」"

# monologue
# JP: しまった、かなりは余計であった。\nリアクションする度胸はないゆえ、流すほか
1613 = "Chết tiệt, chữ \"khá\" đó thật thừa thãi.\nKhông có can đảm để phản ứng lại, nên đành\nlơ đi thôi"

# 【れいな】
# display as 玲奈
# JP: 「ええええ、そんなふうに全然見えないですよぉ。\nとっても綺麗で、新品みたいですぅ」
1133 = "「Eeeee, trông không giống thế chút nào đâu\nạ.\nRất đẹp, cứ như đồ mới luôn ấy」"

# monologue
# JP: れいなの無邪気に救われる。\n今度は助け気動車だ。
1683 = "Sự ngây thơ của Reina đã cứu tôi.\nLần này là toa xe tự hành cứu sinh."

# 【真闇】
# display as 真闇
# JP: 「まぁ、完全未使用中古品ゆうやつやけん。おねえちゃん\nひーちゃんの好みにあわんの勝手に買うてきちゃって」
1182 = "「Thì, nó là đồ cũ nhưng hoàn toàn chưa qua\nsử dụng mà. Chị\nđã tự ý mua dù không hợp với sở thích của\nHii-chan」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1504 = "「！」" 

# monologue
# JP: ……良くある話であろうからこそ身につまされる。\nけれどれいなは気にとめない。
677 = "……Chính vì là chuyện thường tình nên mới\nthấy chạnh lòng.\nNhưng Reina thì không bận tâm."

# 【れいな】
# display as 玲奈
# JP: 「そおだったんですねぇ。カエルさん色も、\n日々姫さんにきっと似合うってれいなも思うんですけど」
1440 = "「Ra là vậy ạ. Màu bạn ếch,\nReina cũng nghĩ là sẽ rất hợp với chị\nHibiki mà」"

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそう思うとったと。ばってん、ね？」
1217 = "「Chị cũng nghĩ vậy đó. Nhưng mà, biết sao\nkhông?」"

# monologue
# JP: 真闇姉が座布団の上に腰を下ろすゆえ、\n僕らも素直にそれに従う。
1713 = "Chị Mayami ngồi xuống tấm đệm,\nchúng tôi cũng ngoan ngoãn làm theo."

# 【真闇】
# display as 真闇
# JP: 「ちーちゃかころからひーちゃん、美意識の高かったけん。\nお洋服とか、ぜぇんぶ自分で選んどったし」
1235 = "「Từ hồi bé xíu Hii-chan đã có gu thẩm mỹ\ncao rồi.\nQuần áo hay gì đó, toàn tự mình chọn hết」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1175 = "「嗯」" 

# monologue
# JP: 不意に思い出す。真闇姉から預かったお金と、日々姫と。\nその両方を手放さないよう、必死になってた過去の自分を。
1638 = "Tôi chợt nhớ lại. Số tiền chị Mayami giao\ncho, và Hibiki.\nNhớ lại bản thân trong quá khứ đã tuyệt\nvọng thế nào để không tuột mất cả hai thứ\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにそうだったな。いつでも日々姫は、\nものすごい時間をかけてあれこれ服を選んでいた」
689 = "「……Đúng là vậy thật. Lúc nào Hibiki cũng\ndành rất nhiều thời gian để chọn lựa quần\náo này nọ」"

# monologue
# JP: 思い出したまま言葉にすれば、\n真闇姉はふ、と微笑を浮かべる。
1644 = "Vừa nói ra những gì nhớ lại,\nchị Mayami khẽ nở nụ cười."

# 【真闇】
# display as 真闇
# JP: 「ありがとね、双ちゃん。あのころも今も――\nおねえちゃんの代わりに、ひーちゃんのこと見てくれて」
1421 = "「Cảm ơn em nhé, Sou-chan. Cả hồi đó và bây\ngiờ——\nđã thay chị, chăm sóc cho Hii-chan」"

# monologue
# JP: 罪悪感を、言葉に混じる息に垣間見てしまった気がして。\nゆえ軽く。できる限りに軽く明るく返事する。
1639 = "Tôi có cảm giác như nhìn thấy sự tội lỗi\nlẩn khuất trong từng nhịp thở hòa lẫn với\nlời nói.\nNên tôi trả lời thật nhẹ nhàng. Nhẹ nhàng\nvà tươi sáng nhất có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「あのころは――あのころの僕ならば、うん。確かに\n"代わり”を義務として果たしていたかもしれんが……」\n1363 = "「當時——當時的我，確實可能做到了“代替”的職責……」" \n\n# monologue\n# JP: それでもなお、興味深い時間であったと記憶している。\n日々姫の無数の質問に返事するのは、路子とはない経験で。\n1606 = "回想起來，那段時光也是頗為有趣。回答日日姬無數的提問也是很寶貴的經驗。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今は代わりなど務めていない。日々姫も僕のいもうとだ、\n妻の妹という意味ではなくて、僕自身のいもうとだから」\n1360 = "「現在我也不是代替照顧她。日日姬是我的妹妹，不是我妻子妹妹的意思，而是我自己的妹妹」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うふふっ。うれしか。ありがとお」\n1191 = "「嘻嘻。真好啊，謝謝」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「？？？　日々姫さんがそうてつさんのいもうとさんなの、\nあたりまえのことじゃないんですかぁ？」\n1510 = "「？？？日日姬小姐是雙鐵先生的妹妹，這不是理所當然的事情嗎？」" \n\n# monologue\n# JP: きょとんと固まるれいなの鼻を、\n真闇姉が指を伸ばしてかるうくつつく。\n1668 = "玲奈不解地僵住了，真闇姐輕輕戳了戳她的鼻子。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「きゃあ♪」\n1076 = "「呀♪」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うん。あたりまえのこと。雨合羽ば懐かしすぎて、\nおねえちゃん、ちょっとセンチメンタルになっちゃった」\n1172 = "「嗯。就是理所當然的事情。這件雨衣實在太讓人懷念了，姐姐都有點感傷了」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そっかあ、せんちめんたるなんですねぇ」\n1442 = "「這樣啊，感傷了啊」" \n\n# monologue\n# JP: 100\%わかってない声。\nふふふっ、と。真闇姉がもらした微笑も楽しげだ。\n1675 = "玲奈明顯是不明白什麼意思。真闇姐臉上也掛著愉快的微笑。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃんね？　いっしょうけんめい伝えてくれたと\n『こいば着たら、全部がカエルになっちゃう』って」\n1234 = "「小日她啊，當時拚命地跟我解釋，說穿上這個整個人就變成青蛙了」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「全部がカエル！　ふわわ、ゆめみたいに素敵ですねぇ」\n1301 = "「整個人變成青蛙！哇哇，就像做夢一樣，好棒啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど、日々姫が一生懸命考えたおしゃれが、\n全部かっぱに塗りつぶされてしまうというわけか」\n1060 = "「原來如此，日日姬費盡心思搭配的打扮會被雨衣全改掉了」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そ」\n1231 = "「對」" \n\n# monologue\n# JP: 僕に/れいなに。真闇姉は同時に相槌を打つ。\n1711 = "真闇姐同時應和著我和玲奈兩個人。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「れーちゃんはそいば嬉しくて、ひーちゃんは悲しかった。\n好みの違いゆーたら、単にそれだけのことばってん」\n1359 = "「玲奈這麼喜歡，而小日卻不喜歡。要說是喜好各有不同，那就是這麼回事吧」" \n\n# monologue\n# JP: サバサバと。\n多分僕に気を使わせぬよう、真闇姉が意識してる声。\n1729 = "真闇姐爽朗地說道，應該是不想讓我有所顧慮。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねえちゃんもそのころはいっぱいいっぱいで、\n『いらんゆーなら捨てるけん』って声あらげちゃって」\n1221 = "「姐姐當時也顧不上想那麼多，大聲喊道“你不要就扔掉”」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ！\nまくらさんが怒ったらとってもこわそうですねぇ」\n1106 = "「哇！真暗小姐生起氣來一定很嚇人」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そぎゃんこつなかとよ？　ばってん……\nそんときはひーちゃん泣かせちゃって、もう自己嫌悪で」\n1298 = "「才沒有啦！可是……當時是把小日弄哭了，自己也很討厭自己」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……そんなことがあったのか」\n701 = "「……還發生過這種事啊」" \n\n# monologue\n# JP: 問えば、苦笑。\nなにより雄弁な返答だ。\n1787 = "這事情問起來只能讓人苦笑。這也是比任何言語都雄辯的答覆。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「返品交換するのもイヤで。ついついそのまま。\n別の雨合羽ば、後日、双ちゃんについてってもらって」\n1346 = "「然而也不想去換一件，所以就一直留了下來。後來讓小雙陪小日一起又買了一件雨衣」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 1175 = "「嗯」" \n\n# monologue\n# JP: 日々姫の雨合羽なら覚えている。僕も一緒に選んで買った。\nオレンジの入ったチェックの……いかにも日々姫好みの。\n1653 = "我還記得日日姬的那件雨衣，我也跟著一起挑選了。那是一件橙色的帶條紋的……非常符合日日姬喜好的雨衣。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃんの選んだとなら、もう似合うて似合うて、\nなるほどなぁって。ばってん、ね？」\n1237 = "「小日選的那件真的是非常適合她。當時就覺得原來該這麼選啊。可是呢」" \n\n# monologue\n# JP: しげしげと、懐かしそうに、真闇姉はかっぱを見つめる。\n1743 = "真闇姐盯著雨衣，陷入了懷舊之中。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねーちゃんも若かったけん。たまにはおねーちゃんの\n選んだもんば、ひーちゃんに着てほしかったと」\n1225 = "「姐姐那時候也年輕，想偶爾讓小日穿穿姐姐選的衣服」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そっかぁ。\nそれなら一緒にえらんだらよかったですねぇ」\n1441 = "「這樣啊。那應該兩人一起選啊」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あは！　まっことね。ほんなら、うん。\n次んときにはおねーちゃんそうする。で、こいば」\n1147 = "「啊哈！沒錯。這樣的話，嗯，下次姐姐就這麼做。給，拿著」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ」\n1090 = "「哇」" \n\n# monologue\n# JP: かっぱをはい、と、れいなに手渡す。\n1720 = "真闇姐把雨衣遞給了玲奈。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「もしよかったら、れーちゃんもらって？\nすごく気にいってくれたみたいやけん」\n1439 = "「這個就送給你吧。既然你這麼喜歡它」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ、わ、わ、いいんですかぁ！　すごいですぅ\nれいな、カエルさんになっちゃいますぅ」\n1089 = "「哇、哇、哇，真的可以嗎！好棒啊，玲奈要變成青蛙了嗎」" \n\n# monologue\n# JP: 深々。お礼。\nそうしてれいなが持ち上げ直す顔は全開に笑ってる。\n1678 = "玲奈深深地鞠躬致謝。然後她抬起臉來，喜笑顏開。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ガイドのときも雨がふったら、\nれいな、これ着ていきますねぇ」\n1043 = "「做嚮導的時候要是下雨了，玲奈會穿上這個」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは別の機会がいいかな。せっかくの新婚旅行。\nどうせだったら晴れてほしい」\n1473 = "「那還是等有機會再說吧。寶貴的新婚旅行還是希望能是晴天」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わわわ、そうでしたぁ」\n1094 = "「哇哇哇，也對啊」" \n\n# monologue\n# JP: とりけしとりけし、と言わんばかりにれいなが手を振る。\n1681 = "玲奈用力揮著手，表示撤回剛才說的話。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「それなられいな、かっぱのお礼に、\nてるてる坊主、たくさんたくさんつくりますねぇ！」\n1455 = "「那作為雨衣的回禮，玲奈會做好多好多晴天娃娃！」" \n