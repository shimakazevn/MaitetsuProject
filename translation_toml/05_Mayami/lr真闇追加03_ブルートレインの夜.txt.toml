# JP: 気持ちはわかる。\nポーレットのものも、れいなのものも。
1686 = "她們的心情我能理解。她們雙方都有各自的想法。" 

# 【れいな】
# display as 玲奈
# JP: 「それで『ちゃんとごはん食べなきゃダメですよぉ』って\nれいな、心配でイライラしちゃって」
1401 = "「然後玲奈就和她說“不好好吃飯可不行啊”，因為玲奈擔心得不行，搞得自己心煩氣躁的」" 

# 【真闇】
# display as 真闇
