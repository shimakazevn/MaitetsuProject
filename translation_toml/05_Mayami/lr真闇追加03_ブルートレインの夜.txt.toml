# JP: れいなの声が急にしおれる。\nこういう話題で軽口を叩くべきではなかったのかもしれん。
1799 = "玲奈的聲音忽然消沉下去，看來這種話題不該隨口亂說才是。" 

# 【れいな】
# display as 玲奈
# JP: 「こないだだって、れいな、ポーレットと……\nちょっとケンカみたいになっちゃいましたし……」
1280 = "「就在前一陣，玲奈，還和波萊特她……稍微吵了一架來的……」、" 

# 【真闇】
# display as 真闇
# JP: 「ありゃま」
1143 = "「哎呀」" 

# monologue
