1310 = "「怎麼可能會討厭她呢！就是因為喜歡她所以才擔心——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばそれは、むしろ優しく綺麗なこころのあらわれだ。\n汚れだなどと、とんでもない」
1489 = "「這樣說的話，更顯得你內心的溫柔和純淨。汙垢根本一丁點都沒有啊」" 

# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1158 = "「啊……」" 

# monologue
# JP: れいなの声は、けれどはっきり晴れてくれない。\n行き違いは、思ったより深いものなのかもしれん。
1792 = "然而，玲奈的聲音卻並沒有開朗起來。看來她倆的矛盾比我們想像得要更加深刻。" 

# 【れいな】
# display as 玲奈
# JP: 「……もしもそうなら、そうだって、\nポーレットにもわかってもらえたらいいんですけど」
731 = "「……雖然你們這麼說，但是，波萊特她可能並不這麼看啊」" 

# 【真闇】
# display as 真闇
# JP: 「『わかってもらえてないかも』って、\nどぎゃんして心配になっちゃっとるの？」
1394 = "「為什麼你會擔心“她可能並不這麼看”？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなのガイドが可能かどうかを訪ねたときなど、\nポーレットもれいなも、普段どおりに見えたものだが」
1330 = "「我在諮詢能否由玲奈做導遊的時候，你們兩個看起來不是和平時一樣嗎」" 

# 【れいな】
# display as 波萊特
# JP: 「ふだんどおりなんですよ！　れいな、がんばって、\n『ごはんちゃんと食べてください』ってゆったのに」
1284 = "「就是因為和平時一樣才有問題啊！明明玲奈才剛剛努力告訴她“希望你好好吃飯”」" 

# 【真闇】
# display as 真闇
# JP: 「あー」
1162 = "「啊ー」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、こんなに心配なのに、ポーレットはやっぱり\nゼリーみたいなごはんをこそこそ続けてて」
1353 = "「明明玲奈都這麼擔心了，波萊特她還是偷偷摸摸拿果凍之類的東西當飯吃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こそこそするのは、伝わっているからこそだろう。\n解っているけど改善できない、その申し訳無さゆえだ」
1283 = "「就是因為你的心意傳達到了她才偷偷摸摸啊。她明白你的擔心但又無力改變現狀，對你感到抱歉才這樣的」" 

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそぎゃん思うと。\nぽーちゃん、一生懸命普段どおりにしとるとよ」
1324 = "「我也是這麼想的。小波她也是拚盡全力想要裝得若無其事」" 

# 【れいな】
# display as 玲奈
# JP: 「いっしょうけんめい、なんですかぁ？」
1337 = "「拚盡全力？」" 

# 【真闇】
# display as 真闇
# JP: 「そ。ぎくしゃくでもしたら、\n余計にれーちゃんを悲しませてしまうけん」
1384 = "「沒錯，要是表現得生硬笨拙的話，不就更讓你難過了嗎」" 

# 【れいな】
# display as 玲奈
# JP: 「あ」
1161 = "「啊」" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、時間がのーて食生活は改善できない。\nやけん、そこんとこだけは触れられんように、こそこそ」
1223 = "「因為時間的關係實在沒辦法改善自己的飲食習慣，所以為了不讓你難過就只能偷偷摸摸吃那些東西」" 

# 【れいな】
# display as 玲奈
# JP: 「そっか……そうなんですねぇ」
1488 = "「這樣嗎……好像是啊」" 

# monologue
# JP: ほうっと、息。安堵が半分――\nけれど、やるせなさも半分といった感じに聞こえてしまう。
1684 = "她“呼”地鬆了一口氣，然而這口氣裡除了一半的安心，還剩了一半的寂寞。" 

# 【れいな】
# display as 玲奈
# JP: 「共感もないし、おはなししてもつたわらないし、\nポーレットのこと、わからないみたいになっちゃってて」
1327 = "「我們倆既不默契，也沒有共同語言。好像我變得一點都不了解波萊特了」" 

# 【真闇】
# display as 真闇
# JP: 「伝わってるようなフリばせんのは、誠実よ。\nそれだけぽーちゃん、れーちゃんのこと大事にしとる」
1045 = "「不會刻意裝出領會的樣子正說明了她的誠實。這說明小波她真的很看重你」" 

# monologue
# JP: 真闇姉は振り返らない。\nれいなに背中を預けたままに、ひとり語りのように話す。
1847 = "真闇姐沒有回頭。她繼續保持背對玲奈的姿勢，彷彿自言自語般繼續說著。" 

# 【真闇】
# display as 真闇
# JP: 「なにか伝えて。『わかった』ゆーてもろーて安心して。\n安心したのに裏切られるのは、もっと切なかけんね」
1250 = "「如果你和她說了什麼，對方為了讓你感到安心而說“我知道了”。但在你安心之後卻背叛你，才更讓人難受啊」" 

# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1158 = "「啊……」" 

# 【真闇】
# display as 真闇
# JP: 「やけん、ポーちゃんは空約束ばできんかったの」
1472 = "「說明小波她不會給人開空頭支票」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな。大事におもってもらえてるの、わかりました。\nけど、それでも――ごはんのことも大切だから」
1421 = "「現在玲奈知道自己很被她重視了。可是，好好吃飯還是很重要啊」" 

# 【真闇】
# display as 真闇
# JP: 「うん。それでもやっぱり伝えたいなら、\n何回だって工夫して、繰り返しお話する他なかとよね」
1191 = "「嗯，如果你無論如何都想表達自己心意的話，就只能想法設法地，反反覆覆提醒她了」" 

# 【れいな】
# display as 玲奈
# JP: 「くふう……\nお話のしかた、変えてみたりとかですかぁ？」
1313 = "「想方設法……是不是要試著改變一下提醒方式呢？」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんね。伝え方、伝えるタイミング。それ次第で、\n全然通じんかったもんが、すうっと伝わったりもする」
1382 = "「沒錯。比如提醒的方式、提醒的時機。就算她一直聽不進去，也要一直堅持下去」" 

# 【れいな】
# display as 玲奈
# JP: 「ん……っと」
1154 = "「唔……」" 

# monologue
# JP: れいなが珍しくいい淀む。\n真闇姉はなんにもいわず、ただただゆるりと続きを待つ。
1800 = "玲奈罕見地沉默了。真闇姐也保持著沉默，緩緩等著她開口。" 

# 【れいな】
# display as 玲奈
# JP: 「しつこいって思われちゃったら、\nれいな、イヤだなぁって」
1118 = "「可如果被人嫌煩怎麼辦，玲奈，不希望變成那樣」" 

# 【真闇】
# display as 真闇
# JP: 「それでも、伝えたいことなんでしょお？」
1290 = "「就算被嫌煩，你還是想把心意告訴她對不對？」" 

# monologue
# JP: こくん、と頷き。\n背中全部が動くほど、はっきりとした強い頷き。
1795 = "玲奈猛地點了個頭。這是一個連後背都被完全帶動的猛力點頭。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなポーレット大好きで、しつこいって\n思われたくなくて、だけどごはんのことだけは――」
1408 = "「玲奈好喜歡波萊特，雖然不想被她覺得煩，但玲奈真的希望她能好好吃飯——」" 

# monologue
# JP: 一途なまでの頑なさに、れいなの過去を不意に感じる。\nれいなは飢餓を――あるいは知っているのかもしれん。
1904 = "這不撞南牆不回頭的頑固，讓我隱約感受到了玲奈的過去。或許玲奈她——真實了解過飢餓的感覺。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、ね？　れーちゃんがもしよかったら」
1521 = "「那麼，既然這樣的話，如果小玲你願意的話」" 

# monologue
# JP: せっけんの香りにまじる、ふわりとした声。
1899 = "輕飄飄的、混合著肥皂香氣的嗓音。" 

# 【真闇】
# display as 真闇
# JP: 「おねえちゃん、お料理教えてあげようか」
1462 = "「要不要讓我來教你做菜？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1532 = "「！」" 

# 【れいな】
# display as 玲奈
# JP: 「お料理！　れいな、つくってみたいです！\nけどけど、れいな、レイルロオドで――」
1087 = "「做菜！玲奈想學！但是但是，玲奈是鐵路人偶——」" 

# 【真闇】
# display as 真闇
# JP: 「レイルロオドは、お料理せんと？」
1523 = "「鐵路人偶不能做菜嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいなの遠いイトコみたいなこ……\n旧[なんさつ,1]南颯鉄道の紅ちゃんとかは、お料理大得意ですよぉ」
1380 = "「沒有沒有，玲奈有個遠房表親……舊南颯鐵路有個叫小紅的，她做菜可厲害了」" 

# 【真闇】
# display as 真闇
# JP: 「ほんならきっと、れーちゃんも大得意になれるとよ」
1504 = "「那小玲你做菜的本事肯定也會變得很厲害的」" 

# 【れいな】
# display as 玲奈
# JP: 「ほんとですかぁ！\nならならお料理、教えてくださぁい」
1433 = "「真的嗎！那拜託你一定要教我做菜」" 

# monologue
# JP: 声が弾めば背中も弾む。
1701 = "她的後背隨著她的聲調一同躍動。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、お料理覚えたら、\nポーレットにごはんつくってあげられちゃいますねぇ」
1414 = "「玲奈要是學會了，就可以給波萊特做飯吃啦」" 

# 【真闇】
# display as 真闇
# JP: 「うんうん」
1185 = "「嗯嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「そしたらそしたらいそがしくっても、\nポーレット、ぜーったいたべてくれますねぇ」
1399 = "「然後呢然後呢，波萊特她不管多忙，都一定會吃的吧」" 

# 【真闇】
# display as 真闇
# JP: 「もちろん！　念には念で、\n簡単にパッと食べられるお料理教えてあげるけん」
1424 = "「當然了！為了確保這一點，我來教你做吃起來方便的菜吧」" 

# 【れいな】
# display as 玲奈
# JP: 「わあい！　ありがとうございまぁす！！」
1450 = "「耶！謝謝你！！」" 

# monologue
# JP: 声も背中もぱっと華やぐ。
1700 = "她的後背與聲音都一下子開朗起來。" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。お料理教えてもらうお礼に、\nもっとがんばって、お背中綺麗にしますねぇ」
1149 = "「哎嘿嘿，作為你教玲奈做菜的謝禮，玲奈要再加把勁把你的背擦得乾乾淨淨」" 

# monologue
# JP: ――弾む背中に、僕まで深く安堵をする。\n安堵をすれば改めて、その小ささをつくづく感じる。
656 = "——她歡快的後背讓我深深感到安心。在安心之後，我再一次意識到她後背的嬌小。" 

# monologue
# JP: （……懐かしいな）
1913 = "（……真令人懷念啊）" 

# monologue
# JP: 思った瞬間、理解する。\nさきほどまで胸に巣食ってた、ソワソワ感の正体を。
1678 = "在這一瞬間，我忽然理解了，剛才侵襲我胸口的那股焦躁感究竟是什麼。" 

# monologue
# JP: （ああ。そうか――幼いころには、僕も……\nけど、うん。路子の背中は、もっとずうっと小さかった）
1917 = "（啊，原來是這樣——在小時候，我也……不對，唔，路子的後背應該更小才對）" 

# 【れいな】
# display as 玲奈
# JP: 「うんしょ、よいしょ、うんしょ、よいしょっ」
1208 = "「嘿咻、嘿咻、嘿咻、嘿咻」" 

# 【双鉄】
# display as 雙鐵
# JP: 「張り切りすぎかもだ。少し背中の動きを抑えてくれると、\n僕としては大いに助かる」
1075 = "「你有點太激動了。如果你稍微能抑制一下背部動作的幅度，我就輕鬆多了」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　そうですねぇ。\nうんしょ、よいしょ、うんしょ、よいしょっ」
1139 = "「哇！是哦。嘿咻、嘿咻、嘿咻、嘿咻」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1123 = "「呵呵」" 

# monologue
# JP: ……声は明らかに小さくなるが、動きはさほど変わらない。\n思わず少し笑ってしまう。
682 = "……雖然她明顯壓低了聲音，但身體的動作幅度卻幾乎沒有變化。我不由得露出了微笑。" 

# 【真闇】
# display as 真闇
# JP: 「あらあら双ちゃん、どぎゃんしたと」
1145 = "「哎呀呀，小雙，怎麼了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、なんでも」
1050 = "「不，沒事」" 

# monologue
# JP: わかっているだろう問いかけと。\nゆえに敢えては返さぬ事実と。
1751 = "我用馬虎眼回應了她的明知故問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕らも夫婦になったものだな」
727 = "「……我們也是結為夫婦了啊」" 

# 【真闇】
# display as 真闇
# JP: 「っ！」
1120 = "「呃！」" 

# monologue
# JP: びくりと真闇姉の背が硬直し、肌がぽーっと赤くなる。\nいや、これは――うむ、照れられてしまうと照れくさい。
1670 = "嚇了一跳的真闇姐繃直了背，皮膚也騰的紅了起來。哎呀，這——嗯，這就是她羞澀難當的表現了。" 

# 【れいな】
# display as 玲奈
# JP: 「うっふふー、おふたり、新婚旅行中ですよぉ？\nあったりまえじゃないですかぁ」
1180 = "「嗯哼哼——兩位，還在新婚旅行途中哦。這不是明擺著的嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
1446 = "「確實」" 

# monologue
# JP: 穏やかな時間の一秒ごとに、強張っていた何かもボロボロ、\nゆっくりゆっくり温もって、自然と剥がれていくようで。
1906 = "過往的逞強和堅持，在平靜祥和的時間沖刷下，慢慢被溫暖，漸漸變得支離破碎，片片剝落。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………あたたかだな、とても」
704 = "「…………真的是，好溫暖啊」" 

# monologue
# JP: かつては僕も、こうした時間を過ごしていたと――\n閉ざしてしまった記憶がじんわり、言葉に染み出す。
1732 = "我也曾度過過這樣的時光啊——塵封的記憶漸漸地滲透到我的語言中。" 

# 【真闇】
# display as 真闇
# JP: 「……うん、まっこと」
725 = "「……嗯，是啊」" 

# monologue
# JP: なぜだろう、\n真闇姉の声にもどこか、しっとりとしたものを感じる。
1626 = "不知道是不是我的錯覺，真闇姐的聲線裡，帶著一些濕潤。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、もっとあたたかにしちゃいましょお！」
1183 = "「嗯哼哼，讓玲奈幫你弄得更溫暖些！」" 

# monologue
# JP: けれどもあえかな疑問符は、\nれいなにカラリと吹き飛ばされる。
1636 = "但這些許的疑問，被玲奈乾乾脆脆地吹飛了。" 

# 【れいな】
# display as 玲奈
# JP: 「みんなでぐるって反対むきましょうねぇ。\n今度はれいな、そうてつさんのお背中ながしまぁす！！」
1227 = "「大家一起咕嚕嚕轉到對面去哦。這次玲奈要幫雙鐵先生擦背了！！」" 

# 【真闇】
# display as 真闇
# JP: 「……よかねぇ。終列車の風情って」
728 = "「……真好啊，末班車的風情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1365 = "「是啊」" 

# monologue
# JP: 小声だ。僕も真闇姉も。\n車内にはほとんど他の乗客の姿もないのだけれど。
1628 = "不論是我還是真闇姐都壓低了聲音。儘管車內幾乎就只有我們幾個乘客。" 

# 【れいな】
# display as 玲奈
# JP: 「すぅ……すぅ……すぅ……すぅ」
1133 = "「呼……呼……呼……呼」" 

# 【真闇】
# display as 真闇
# JP: 「ふふっ」
# 1123 = "「呵呵」" 

# monologue
# JP: 真闇姉の手がゆっくりゆっくり、\n膝の上眠るれいなの髪をなでていく。
1855 = "真闇姐的手輕柔又和緩地，撫摸著枕著她大腿睡覺的玲奈的頭髮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あどけないな。\n眠っていると、まるきりこどもだ」
1429 = "「真是天真無邪啊，她睡著的樣子完完全全就像小孩子一樣」" 

# 【真闇】
# display as 真闇
# JP: 「きっと疲れちゃったとね。今日一日大張り切りで、\nがんばってガイドしてくれたけん」
1235 = "「她肯定累壞了吧。畢竟今天她卯足了勁認認真真給我們做了嚮導咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「張り切っていたし、はしゃいでもいたな。\n果たしてどんなガイドになるか、正直危ぶんでもいたが」
1043 = "「不僅幹勁十足，而且興奮無比。其實對她能成為一個怎樣的導遊，我原本還挺擔心的」" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんだった？　双ちゃんとしては」
1500 = "「那在你看來，她表現得怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ガイドの一番大事な部分が\n『お客に旅を楽しませる』であるのなら、大合格だ」
1252 = "「如果說導遊的核心目標是“讓客人享受旅程”的話，那她可太合格了」" 

# monologue
# JP: いえばふつふつ、笑いにも似た明るい気持ちが\n胸の奥からこみ上げてくる。
1703 = "她說起話來滔滔不絕，能讓人打從心底湧出有如笑容一般的開朗感受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕は楽しかった。\nれいなのおかげで、魅力を再確認させてもらえた」
1197 = "「嗯，我非常享受。多虧了她，我再次明白了旅途的魅力」" 

# 【真闇】
# display as 真闇
# JP: 「まっことねぇ。れーちゃんがそこにおると、\nきっとみんな少しずつ、もっとやさしくなるけんね」
1447 = "「確實啊，只要小玲在的話，大家一定也會漸漸變得溫柔起來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1365 = "「是啊」" 

# monologue
# JP: 言われてみるとそうかもしれん。クマ川下り、包丁づくり、\n投炭練習に酒造見学。どれも僕は経験済みだが――
1893 = "說起來可能真的是這樣。隈河漂流、菜刀製作、加煤練習以及參觀釀酒。雖然每一樣我都曾體驗過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。『れいなにとっての御一夜』は、\nまことひだまりのような場所なのだなぁと、僕も感じた」
1381 = "「沒錯。在我的感受中，“玲奈眼裡的御一夜”簡直就像沐浴在溫暖陽光的地方一樣」" 

# 【真闇】
# display as 真闇
# JP: 「愛されとるとね。このこはたくさん、きっとずーっと。\nやけん、やさしい。やさしいけん、やさしゅうされる」
1221 = "「因為她被人深愛著啊。她一定一直都被人深愛著。所以她才這麼溫柔。又因為這份溫柔，所以她又反過來被人溫柔以待」" 

# 【双鉄】
# display as 雙鐵
# JP: 「好循環だな。それゆえ、僕は――\n僕などは……」
1453 = "「良性循環啊。反倒是我——我這種人……」" 

# monologue
# JP: 入浴中の胸のざわつきを思い出す。この穏やかな雰囲気で、\n口に出すべきことではないかとも感じるが――
1740 = "我回想起入浴時胸口的躁動。儘管我覺得，在這樣平靜的氣氛下，不該把這種話宣諸於口——" 

# 【双鉄】
# display as 雙鐵
# JP: 「もっと優しくできればよかった……\nそんなことをふと、思ってしまったりもした」
1465 = "「要是當時能再溫柔些就好了……忽然之間，我產生了這樣的想法」" 

# monologue
# JP: けれど、この雰囲気で、真闇姉相手だからこそ。\n感じたことを、そのまま言葉にあらわしたくなる。
1638 = "但，正因為實在這種氣氛下，正因為對方是真闇姐，我才能原原本本地把我的想法化作語言傾吐出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなの背中が、あまりにも小さくなものと感じて。\n――けれども路子は、もっと小さな背中だったと」
1422 = "「當時我感受著玲奈的後背，覺得實在是過於嬌小——然而記憶中路子的後背，比玲奈的還要再小些」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 1178 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1161 = "「啊」" 

# monologue
# JP: なで、なで、なで。れいなを優しく撫ぜていた手が、\n今度は僕を――僕を穏やかに許してくれる。
1763 = "撫摸、撫摸、撫摸。原本溫柔撫摸著玲奈的手，如今撫摸著我——她正溫和地縱容著我。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんもね？　似たようなこと思うとったと。\nひーちゃんと、こぎゃん時間ば過ごしたかった、って」
1097 = "「其實，我也曾想過類似的事情。比如，我也曾渴望著和小日一起過這樣的日子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1362 = "「是啊……」" 

# monologue
# JP: 思い出す。幼い日々姫を風呂に入れるのは、\n引き取ってもらって以降、長いこと僕の役割だった。
1745 = "我想起來了。自從我被收養以來，和年幼的日日姬一起洗澡的任務就一直由我來負責。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、ずうっと忙しかったからなぁ」
1224 = "「因為真闇姐你一直都很忙啊」" 

# 【真闇】
# display as 真闇
# JP: 「それでも、お風呂なら一緒に入れた。\nおねえちゃんが誘いさえすれば、絶対に」
1091 = "「儘管如此，要一起洗澡的話還是可以的。只要我這麼說的話，肯定可以」" 

# monologue
# JP: 僕をなでてた手が止まり、\n膝の上、れいなの上にも戻りきらず――
1764 = "撫摸著我的手停了下來，卻也沒有回到腿上沉睡的玲奈頭上——" 

# 【真闇】
# display as 真闇
# JP: 「あ。……双ちゃん」
1160 = "「啊……小雙」" 

# monologue
# JP: ――行き場を失くしたように思えて、\nだからしっかり、僕自身の手でつかまえる。
657 = "——察覺到她似乎不知道該把手放在哪裡，所以，我主動伸出手抓住了她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたかったのに叶わなかったのなら。\n『しなかった』ではなく『できなかった』だ。絶対に」
1248 = "「如果一件事想做又沒能做到的話，就不是“沒有去做”而是“沒能做到”啊。肯定是這樣」" 

# 【真闇】
# display as 真闇
# JP: 「…………。そぎゃん、なのかなぁ」
702 = "「…………是這樣嗎」" 

# monologue
# JP: 真闇姉が力を抜いて、僕にもたれかかってくる。\n伝わってくるぬくもりに、小さな声が重なり響く。。
1840 = "真闇姐全身失去了力氣，無力地倚靠在我的身上。感受著她身上的溫暖的同時，她微弱的聲音在我耳邊響起。" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんにね？　蔵のこと……嫌いゆーか、\n怖いよーに思わせちゃったの、おねえちゃんなの」
1268 = "「小日啊，說是討厭家裡的作坊……其實更多的是害怕——讓她產生這種想法，都是我的緣故」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
705 = "「……」" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんね？　蔵が大好きだったけん、描いてくれて。\nそいば見たら――見ちゃったら。『ああ』ってなって」
1272 = "「小日她本來非常喜歡作坊的，還畫了畫給我看。當我看到那幅畫時——那時，我腦海裡轟的一聲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こころを動かされたのか」
1093 = "「內心被震動了嗎」" 

# 【真闇】
# display as 真闇
# JP: 「うん。で、ひーちゃんは蔵に生きたらいけんって……\n感動みたいな気持ちで、舞い上がったみたいになって」
1177 = "「嗯。然後我就認為，不能讓小日在作坊裡長大……一種類似於感動的情緒湧了上來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな。\n日々姫の才は、そういう才だと僕も感じる」
717 = "「……也是。我也覺得日日姬的才華確實出類拔萃」" 

# monologue
# JP: こころを閉ざしていた僕に、赤の赤さを焼き付けた。\n稀咲のような現実主義者さえ、日々姫の才に魅せられた。
1696 = "她畫中的鮮紅，在緊閉心扉的我的內心都烙下了痕跡。連稀咲這樣的現實主義者都為日日姬的才華所折服。" 

# 【真闇】
# display as 真闇
# JP: 「『そういう才』。まっこと、そぎゃんね。\nおねえちゃん、そんなんに触れたのはじめてで、つい」
697 = "「“出類拔萃”，確實是這樣啊。我還是有生以來第一次遇到那種情況，所以不由自主就……」" 

# monologue
# JP: 真闇姉の手が僕の手に包まれたまま動こうとする。\nそっと解けば、再び静かに、れいなの髪が撫ぜられる。
1854 = "真闇姐的手在我手掌的包裹下掙動著。我輕輕鬆開手，她又靜靜地用手撫上了玲奈的發端。" 

# 【真闇】
# display as 真闇
# JP: 「――蔵ばひーちゃんに向いてないって、\nひーちゃんの生きる場所じゃないって」
687 = "「——工坊不適合小日，工坊不該是小日應該生活的地方」" 

# monologue
# JP: 舞い上がって、つい口走ってしまったのであろうか。\n真闇姉の言葉の続きを、けれど促すこともできない。
1755 = "或許是激動的情緒使然，導致她不由自主地脫口而出。真闇姐繼續說著，而我也沒有催促。" 

# 【真闇】
# display as 真闇
# JP: 「……ばってん、すぐに後悔するようになったとよ。\nそいばおねえちゃんが押し付けちゃいけんかったって」
720 = "「……但是，我立刻就後悔了。因為那觀點並不是我可以強加給她的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
688 = "「——是啊」" 

# monologue
# JP: 誰もが認める仲良し姉妹。\nけれどもどこか、なにか一枚、挟まる、破れぬ薄紙は――
1631 = "任何人都認可的相親相愛的姐妹。然而在她們之間，卻隔著一層無法捅破的窗戶紙——" 

# 【双鉄】
# display as 雙鐵
# JP: 「その後悔が、真闇姉をずっと縛ってしまっていたのか」
1286 = "「就是那份後悔一直在束縛著你嗎」" 

# monologue
# JP: 気づかぬほどに小さな動き。\n真闇姉は、けれどはっきり頷いた。
1643 = "儘管動作小到微不可察，我依然意識到真闇姐堅定不移的頷首。" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんは、誰より高こぉまで飛べる鳥やけん」
1274 = "「小日會成為無人可以觸及的、高飛的鳥兒」" 

# monologue
# JP: 切なそうで、愛おしそうで。\n真闇姉と日々姫の絆を、逆説的に強く感じる。
1860 = "真闇姐看起來既難過又惹人憐惜。我從這裡再一次強烈感受到她和日日姬的姐妹情深。" 

# 【真闇】
# display as 真闇
# JP: 「蔵いう鳥籠ば入ってきても、入り口を塞がんどけば……\nただそれだけで、きっと勝手にまた飛んだのに――」
1288 = "「就算她掉進工坊這個牢籠裡，就算入口被人強行堵塞……就這點阻礙，她肯定可以靠自己的力量展翅高飛才對——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは確かにそうかもしれん。\nが、鳥籠から日々姫は飛び立たなかったかもとも感じる」
1526 = "「雖然確實有那個可能，但我感覺日日姬也可能無法從鳥籠中展翅高飛」" 

# 【真闇】
# display as 真闇
# JP: 「え？」
1152 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は極めて義理がたい。そのうえ一途だ。\n蔵での暮らしを覚えたのなら、自ら籠もったかもしれん」
1351 = "「日日姬非常重情義，而且還死腦筋。如果她習慣了工坊的生活，也可能會自己把自己關住」" 

# 【真闇】
# display as 真闇
# JP: 「…………」
699 = "「…………」" 

# monologue
# JP: れいなを撫ぜてる手が止まって。\nゆえに僕も言葉を止める。説得したいわけでもないので。
1690 = "她撫摸玲奈的手停了下來。於是我也閉口不言。因為我並沒有打算要強行說服她。" 

# 【真闇】
# display as 真闇
# JP: 「……うん。確かにそうなっちゃったかもしれんよね。\nばってん、そぎゃんならんかったかもしれん」
724 = "「……嗯，好像確實有這個可能。但是，也可能並不會這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「解らんよな。過去のことで、仮定の話だ。\n正解などは、例え日々姫本人に聞いても解るわけがない」
1486 = "「這事說不清楚的。過去的事情，沒有假如。就算去問日日姬本人，可能也沒辦法得出正確答案」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 1178 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今の日々姫のことならわかる。\n実に生き生き、仕事を日々を、楽しんでいる日々姫なら」
1069 = "「但是，現在的日日姬一定明白的。生龍活虎地每天享受工作的日日姬，一定能明白的」" 

# monologue
# JP: 真闇姉がふと瞳を閉じる。\nなにかを思い出すかのように。
1845 = "真闇姐忽地閉上了眼睛，彷彿想起了什麼一般。" 

# 【真闇】
# display as 真闇
# JP: 「――そぎゃんね。おねえちゃんも眩しいみたいに感じた。\nひーちゃんのこと、あの列車ばみて」
689 = "「——是啊，我都覺得有些耀眼了。現在的小日看起來，就好像那個火車站一樣 」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。眩しいな。今の日々姫は自由であるゆえ。\n望む通りに飛び回り、誰より強い翼を羽ばたかせている」
1201 = "「嗯，真是耀眼啊。現在的日日姬自由自在。她伸展著比任何人都堅韌的羽翼，按照自己的意願四處飛行」" 

# 【真闇】
# display as 真闇
# JP: 「ああ……うん。まっことそぎゃんね」
1364 = "「是啊……嗯，確實是這樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば全てが日々姫を幸せにするために寄与したのだ。\n寂しい思いも、孤独の辛さも、理解されない苦しさも」
1519 = "「那麼這一切就全都是為日日姬幸福所做出的努力。不論是寂寞的回憶、孤獨的艱辛，還是不被理解的痛苦」" 

# 【真闇】
# display as 真闇
# JP: 「…………」
# 699 = "「…………」" 

# monologue
# JP: ほうっと、息。\nため息、とまどい、あるいは安堵も混じったような。
1705 = "她長長呼出一口氣。彷彿包含著嘆息、躊躇、又或是安心。" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃん……かな。\nそぎゃんならおねーちゃん、救われるけど」
1359 = "「是……是這樣嗎。要真是這樣的話，我倒是得到了救贖」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わからん。僕は日々姫ではない。ただ僕自身の経験を、\n日々姫の上の投影してみているだけにすぎない」
1322 = "「我不清楚，因為我並不是日日姬本人。我只是把自己的經驗投射到日日姬身上得出了這個結論罷了」" 

# 【真闇】
# display as 真闇
# JP: 「あ」
# 1161 = "「啊」" 

# monologue
# JP: ……真闇姉は聡明だ。その上僕を愛してくれてる。\nもう完全に伝わったのだと、実感できる。
678 = "……真闇姐聰明伶俐，而且她還深愛著我。我能感覺到自己的心思已經完全傳達給她了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子にやさしくできなかったことも。事故のことも。\n全てを恨み、憎しみだけで自らを支えていたあの日々も」
683 = "「 不論是當時沒能對路子溫柔以待的事，還有那場事故，以及放任那些憎恨支配我身心的那些日子」" 

# monologue
# JP: それでも言わずにはいられない。\nどれほど自明であろうとも、言葉で伝えずにはいられない。
1644 = "儘管如此我還是必須說出口。不論我心裡有多清楚，有些事也必須透過語言表達出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すべてが今、真闇姉とこうしている時間のためには、\n必要不可欠だったのだと思う。ゆえに、僕はしあわせだ」
1499 = "「那些事，在現在看來，都是我如今和真闇姐共處所不可或缺的一部分。所以我可以說，我很幸福」" 

# monologue
# JP: その上で強く[こいねが]希う。\n他の誰より真闇姉が、ただしあわせであって欲しいと。
1777 = "正因如此我才真切地希望，希望我的真闇姐能夠獲得幸福。" 

# 【双鉄】
# display as 雙鐵
# JP: 「愛している、真闇姉。\nそうして、深く――深く深く深く感謝している」
1331 = "「我愛你，真闇姐。以及，我深切地——無比深切地感謝你」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
1275 = "「小雙……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言葉などではとても足りない。\n僕の時間の全てを捧げ、なお足り得るのかわからない」
1471 = "「語言無法表達我感謝之情的萬一。就算把我全部的時間都奉獻給你，都不知道夠不夠」" 

# 【れいな】
# display as 玲奈
# JP: 「ふにゃあ」
1173 = "「嗚喵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1121 = "「呃！！！！」" 

# monologue
# JP: れいなが軽く身じろぎし、世界がうわっと戻ってくる。\nああ、そうだ。ここは車内――公共の場所だったのだ。
1802 = "玲奈輕輕翻了個身，猛地把我的意識拉回到現實世界。對啊，這可是在車廂裡——這可是公共場所啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。場もわきまえず――\nつい、夢中になってしまって」
1262 = "「對不起，不分場合地——一不小心就忘乎所以了」" 

# 【真闇】
# display as 真闇
# JP: 「すまんなんてこと全然なかと。\nおねえちゃん――おねえちゃん、嬉しくて」
1077 = "「你根本用不著道歉的。我——我很高興的」" 

# monologue
# JP: ふっと、真闇姉の顔が寄せられる。
1721 = "忽然，真闇姐把臉湊了過來。" 

# 【真闇】
# display as 真闇
# JP: 「ここが列車じゃなかったら、\n双ちゃんをぎゅってしたいくらいに――嬉しかと」
1085 = "「假如這裡不是車廂裡的話，我一定緊緊把你抱在懷裡——我就是有這麼高興」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
1517 = "「那麼」" 

# monologue
# JP: 手を繋ぐ。優しく固く。\nれいなの眠りを邪魔せぬように、中空で。
1736 = "我們的手握在一起，溫柔又堅定。為了不打擾到玲奈的睡眠，我們把手懸在空中。" 

# 【れいな】
# display as 玲奈
# JP: 「んみゅ……ん……あ……\nふわあああああああぁ」
1157 = "「唔喵……唔……啊……呼啊啊啊啊啊」" 

# monologue
# JP: ぶるりと震えて、体が伸びる。\nレイルロオドは人のようだと、今更ながら感じてしまう。
1804 = "玲奈顫動著身子，伸起了懶腰。這不禁讓我再次感嘆，鐵路人偶真的和人類一模一樣啊。" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ！？　あ！？　わあ、れいな寝ちゃって！？\nごめんなさい、ガイド、れいな途中なのに」
1470 = "「話？！啊？！哇啊，玲奈是不是睡著了！？對不起，明明玲奈是在做嚮導」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、すばらしいガイドをしてくれた。\nれいなのおかげで、僕は魅力を再確認できた」
1379 = "「沒事，你已經做得非常好了。多虧了你的導遊，我再次感受到了這裡的魅力」" 

# monologue
# JP: もぞもぞと体を起こすれいなを待って、\n頭を下げて感謝する。
1870 = "等扭扭捏捏的玲奈起身後，我深深低頭表示感謝。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市の魅力はもちろん、真闇姉の魅力についても」
1044 = "「不只是御一夜市的魅力，也包括真闇姐的魅力」" 

# monologue
# JP: がたんごとんと列車は進む。\nれいなと別れ僕らの下りる鱈木廃駅は、もう間もなくだ。
1654 = "列車咣當咣當繼續前進著。我們別過玲奈後，列車即將到達我們的目的地——鱈木廢車站。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいながガイドしてくれたから、\n僕は、あらためて深く実感できたのだ」
1375 = "「正因為有玲奈給我們做導遊，我才有了更深刻的感悟」" 

# 【真闇】
# display as 真闇
# JP: 「わ！　二段ベッド」
1140 = "「哇！雙層床」" 

# monologue
# JP: 言うやいなやで真闇姉が下段ベッドに座るゆえ、\n僕も並んで腰掛ける。
1674 = "因為真闇姐不由分說地坐在了下層的床上，我也坐在了她的邊上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[かいほうがた,2]開放型B寝台というらしい。\n本来は四人まで宿泊可能だが、今日は僕らで独占だ」
1487 = "「這好像是叫開放型普通臥鋪來著。本來是可以容四個人休息，不過今天就讓我倆獨占啦」" 

# 【真闇】
# display as 真闇
# JP: 「んふふ、新婚旅行やもんねぇ」
1182 = "「嗯哼哼，畢竟是新婚旅行嘛」" 

# monologue
# JP: 一瞬ドキリとさせられるけれど、真闇姉の笑みは穏やかだ。
1645 = "儘管讓我一瞬間心跳加速，但真闇姐的笑容依然平靜溫和。" 

# 【真闇】
# display as 真闇
# JP: 「二段ベッド。うちにもあったと。\nむかしむかし。双ちゃんが来てくれるより、もっと前」
1527 = "「雙層床，我家也有哦。很久很久以前，甚至還在小雙你來我家之前」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。真闇姉と日々姫で使っていたのか？」
1214 = "「嚯，是你和日日姬用的嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「うん。ひーちゃんが珍しくおねだりしてね。\nマンガで見たかなんかで、憧れちゃって」
1192 = "「嗯，小日她罕見地使性子跟爸媽要來的。好像是看了漫畫什麼的，非常嚮往這個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほど小さなころから、\n日々姫はマンガ好きだったのか」
1239 = "「她那麼小的時候就開始喜歡漫畫了嗎」" 

# 【真闇】
# display as 真闇
# JP: 「マンガも絵本も、図鑑なんかも。\n絵ば描いてある本なら、なんでも好きよ。いまも」
1047 = "「不管漫畫、繪本還有圖鑑之類的，只要是有圖畫的書她都喜歡。現在也是」" 

# monologue
# JP: 断言だ。うれしくなる。\n姉妹の絆はやはり、僕などには計り知れぬ強さと感じ。
1692 = "她斬釘截鐵地說道。我不由高興起來。她們的姐妹情誼之深刻顯然不是我這局外人能夠揣測的。" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃん……そのころは甘え上手だったけん。\n父さんすぐに買うてくれてね」
1271 = "「小日她……那時候可會撒嬌了，父親一下就買了給她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どちらの部屋にだ？」
1342 = "「放在了誰的房間裡？」" 

# 【真闇】
# display as 真闇
# JP: 「そのころはまだひーちゃんのお部屋なかったの。\nおねえちゃんと一緒のこどもべや」
1515 = "「那時候小日還沒有自己的房間，還是和我一起住兒童間呢」" 

# monologue
# JP: ……どんな部屋だったか気になってくる。\n帰宅したら、アルバムを見せてもらうとしよう。
681 = "……這讓我不由得好奇起那究竟是怎樣的房間了。回去之後一定要讓我好好看看相冊。" 

# 【真闇】
# display as 真闇
# JP: 「そのころからひーちゃんはひーちゃんやけん、ベッド、\n『これがよか！』って、モダンなデザインの選んで」
1514 = "「那時候她就已經非常有個性了，選床鋪的時候大喊著“我要這個”然後就選了個非常時髦的造型」" 

# 【双鉄】
# display as 雙鐵
# JP: 「モダンときたか。\nいやはや、なんとも日々姫だな」
1340 = "「挑了個時髦的啊。怎麼說呢，真不愧是日日姬啊」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、そうね。あのこの趣味ばずーっと変わらん。\n日常そのものの顔して、ちょこっとだけおしゃれいうか」
1132 = "「呵呵，是啊。她的興趣一直都沒變。平時也是那副表情，就只會稍稍打扮一下」" 

# monologue
# JP: れいなと一緒にいたときも、なんども見せた表情だ。\nつつみこむようで、あまく、とてもやわらかな。
1688 = "她和玲奈在一起時，我也見過幾回。彷彿包容一切的表情，甜美又柔軟。" 

# 【真闇】
# display as 真闇
# JP: 「そんベッドでね？　最初の晩はひーちゃんが上で。\nすぐに『たかくてこわかー』って入れかわって」
1506 = "「那張雙層床，一開始是小日睡上面的。結果她馬上就說“太高了好怕”於是就和我換了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こどもらしいな」
1431 = "「真是孩子氣啊」" 

# 【真闇】
# display as 真闇
# JP: 「こどもやもん。やけんね？　馴染むのもすぐで、\nまたひーちゃんが上の段ば寝るようになって」
1061 = "「人家本來就是小孩子嘛。不過呢，她馬上就習慣了，然後就又變成她睡上面了」" 

# monologue
# JP: ぽかぽかしてくる。\n空調ではなく、真闇姉のむかしがたりの温もりで。
1747 = "我感到暖洋洋的。並非空調的效果，而是真闇姐回憶往昔所帶來的溫暖。" 

# 【真闇】
# display as 真闇
# JP: 「あの頃からもう、しゃっしゃ、かりかりって、\n上の段からよーお聞こえてきとったの」
1304 = "「從那時候起，我就經常聽到上面傳來的刷拉刷拉、沙沙沙的聲音」" 

# 【双鉄】
# display as 雙鐵
# JP: 「描いていたのか」
1233 = "「她是在畫畫嗎」" 

# 【真闇】
# display as 真闇
# JP: 「そ。ベッドから見えるお部屋の全部を。\nだけじゃなく……んふふっ、おねえちゃんの寝顔とかも」
1264 = "「對，從床上看到的屋內的全部景象。不僅如此……呵呵，還包括我的睡臉之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと。ぜひとも見てみたかったな」
1064 = "「什麼，這可一定得讓我看看啊」" 

# 【真闇】
# display as 真闇
# JP: 「よかよ？　おうちかえったら見せたげる。\nひーちゃんにナイショで、大事に大事にとってあるけん」
1116 = "「可以啊，回去之後就給你看。我瞞著小日，珍而重之地收藏著呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはうれしい」
1502 = "「那太好了」" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、そぎゃん時間ば、長くは続かんかったんよ」
1071 = "「但是，那段時光，並沒有持續很久」" 

# monologue
# JP: 真闇姉の声のトーンは、ほんの少しも変わらない。\nただただ懐かしいむかしがたりをのんびりしている。
1857 = "真闇姐的聲調沒有一絲一毫的變化，只是一臉懷念地緩慢又輕柔地敘述著往事。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、ひーちゃんを追い出しちゃたから」
1222 = "「因為我，把小日趕了出去」" 

# monologue
# JP: なのに、僕が焦ってしまう。
1790 = "然而，我卻焦躁起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、その話であれば」
1052 = "「不，話不能這麼說」" 

# 【真闇】
# display as 真闇
# JP: 「うん。わかっとー。そぎゃん時間も、全部がいまの、\n素敵なひーちゃんに繋がった」
1195 = "「嗯，我知道。那段時間也是造就現在優秀的小日的一部分」" 

# monologue
# JP: 伝わっている。きちんと受け止めてくれている。\n感じた瞬間、僕まで救われたような気持ちになる。
1693 = "她理解了。她終於接受了我的說法。感受到這一事實的瞬間，我感覺連自己也得到了救贖。" 

# 【真闇】
# display as 真闇
# JP: 「ありがと、双ちゃん。双ちゃんがいうてくれたから、\nおねーちゃん、気持ち本当に楽になったと」
1276 = "「小雙，謝謝你。正因為有你在我身邊，我才能得到真正的解脫」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
1081 = "「你能想開就好」" 

# monologue
# JP: 安心すれば、どっと疲れがわいてくる。\n僕らも今日は、一日動いて、ずっとはしゃいでいたゆえに。
1727 = "感到安心的瞬間，疲憊就湧了上來。因為我們今天一整天都在活動，一直都保持著高昂的情緒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、今の真闇姉は、どちらの寝台がお好みだ？」
1522 = "「那麼，現在的真闇姐，會選擇哪邊的床鋪呢？」" 

# monologue
# JP: ふたりくっついて寝たくもあるが、\nそうするにはあまりに狭すぎる。
1907 = "雖然我也想兩個人靠在一起睡，不過那樣也太擠了。" 

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんはどっちでも良かよ？\n双ちゃんに好きな方ば選んでもらえた方が嬉しか」
1320 = "「我上下都行哦，不過我更希望你幫我選」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。であれば僕は上段におさまろう」
1490 = "「這樣，那我睡上面吧」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、よかね。男の子って感じ」
1127 = "「呵呵，好啊。很有男子氣概」" 

# monologue
# JP: 声はどこまでもまろやかだ――いや、というか、\n真闇姉にも、眠気が混じって来ているのやもしれん。
1702 = "她的聲音依舊那麼圓潤溫和——不對，倒不如說真闇姐她可能也已經被睡意侵襲了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「疲れたろう。ぎゅうぎゅう詰めのスケジュールだったし、\nずっとれいなの面倒を見てくれていたしな」
1449 = "「累了吧。畢竟我們今天的日程緊巴巴的，你還一直要照顧玲奈」" 

# 【真闇】
# display as 真闇
# JP: 「面倒を見るだなんてとんでもなかとよ。\nおねえちゃん、たくさん遊んでもらっちゃったけん」
1312 = "「怎麼能說我照顧她呢，今天可多虧她一直帶著我到處遊玩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「遊んでもらったか、それはいいな」
1373 = "「有好好玩過了啊，那倒不錯」" 

# monologue
# JP: いってふと、\nあながちそれが冗談でないかもとも思ってしまう。
1891 = "話一出口，我忽然感覺她說的可能並不是玩笑話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、\n確かにれいなは、僕らよりずうっと年上だしな」
1056 = "「也對，說起來，玲奈確實年紀比我大很多」" 

# 【真闇】
# display as 真闇
# JP: 「あ、そぎゃんゆーときあるよね、たまに。\nれーちゃんのこと、双ちゃん、すっごく大人だって」
1169 = "「啊，說來確實——偶爾，我是說有時候，小玲會表現得比你還要成熟」" 

# 【双鉄】
# display as 雙鐵
# JP: 「時折りだがな。ハチロクよりも大人な面さえみせる。\nしかし、今日のれいなに限っていえば……」
1111 = "「只是很偶爾啦。有時候她甚至比八六還要成熟。不過，要說今天的玲奈的話……」" 

# monologue
# JP: 思い返せば思い返すほど、印象は一色にまとまっていく。
1742 = "我在腦海裡反覆回想，玲奈的印象漸漸統一。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あどけないと言いたくなるほどはしゃいでいたな。\nれいなも、真闇姉と――僕らと遊んでいたのかもだな」
1228 = "「她今天吵鬧得也太孩子氣了。可能玲奈她自己也一直想和真闇姐——也想和我們一起玩吧」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、れーちゃん、\nおねえちゃんにあわせてくれとったんかも」
1128 = "「呵呵，小玲她可能只是在配合我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはなかろう。あわせるのであれば、むしろきっちり、\nいわば型どおりのガイドをれいなのペースで務めた筈だ」
1311 = "「怎麼會。要說配合的話，才應該規規矩矩地、按照正常的程序用玲奈自己的節奏來給我們導遊才是」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
1368 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのへんはのんびりとだがきちんとこなせる。\nゆえ――あわせたというか……引きずられたのかもな」
1203 = "「嗯，那樣的話雖然會比較悠哉但可以處理得更井井有條。所以與其說她是在配合……不如說她是被迫展現了這一面」" 

# 【真闇】
# display as 真闇
# JP: 「引きずられたって、なにに？」
1460 = "「被迫？被誰？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、真闇姉にだ」
1516 = "「那當然是你啊」" 

# monologue
# JP: 言葉を出した瞬間に、\nそれでは足りぬと理解する。
1892 = "說出口的瞬間，我明白光是這樣說還不足以讓人理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「より正確には、真闇姉の母性にだろう」
1393 = "「準確來說，是因為你的母性」" 

# monologue
# JP: ふっと、息が飲まれる音。\n驚いたのか、照れたのだろうか。
1850 = "真闇姐猛地倒吸一口氣，不知是因為驚訝還是害羞。" 

# 【真闇】
# display as 真闇
# JP: 「母性。って、おねえちゃんにそぎゃんもの」
1378 = "「母性，這，我哪有……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるに決まっている。母性という言葉で過剰なら……\nそうだな、『おねえちゃんらしさ』とでも言えばいいか」
1425 = "「當然有了。說母性如果覺得太超過了的話……對了，那就說“姐姐風範”好了」" 

# 【真闇】
# display as 真闇
# JP: 「ああ、それやったらもちろん。\nおねえちゃん、おねえちゃんやけん」
1172 = "「啊，這當然有了。因為，我就是姐姐嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1361 = "「是吧」" 

# monologue
# JP: 日々姫の姉で、僕の義姉で――\nだけでなく、御一夜全体の姉であるような気さえする。
1768 = "既是日日姬的姐姐，也是我的義姐——不僅如此，我甚至覺得她還是御一夜全體人員的姐姐。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにおねえちゃんだ、真闇姉は。\nれいなも――どころかハチロクさえも、甘えるほどに」
1079 = "「你確實是個好姐姐啊，玲奈——甚至連八六都願意跟你撒嬌」" 

# 【真闇】
# display as 真闇
# JP: 「はーちゃんも家族やけんね。\n甘えてくれて――ゆーか、甘えあって同然でしょお」
1220 = "「因為八六也是家人嘛。她對我撒嬌——或者說，互相撒嬌也是很正常的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「家族、か」
1255 = "「家人啊」" 

# monologue
# JP: あらためてそう言われると、\n実に不思議な言葉というか、概念だなと感じてしまう。
1780 = "此刻再聽到這個詞，實在是一個讓人感到不可思議的詞語，或者說是概念。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなも家族だよな。\n血のつながりなどあろう筈もないけれど」
1392 = "「波萊特和玲奈也是家人對吧，儘管沒有任何血緣關係」" 

# 【真闇】
# display as 真闇
# JP: 「そうね。今日のお話きいとって、\nおねーちゃんもそぎゃん感じたと」
1383 = "「沒錯，今天聽了玲奈那麼說，我也有這種感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互いのことをおもいやりあい。\nおもいやりあうがゆえ、行き違ってしまう」
1231 = "「她們互相為對方著想。正因為互相為對方著想，才會發生矛盾」" 

# 【真闇】
# display as 真闇
# JP: 「行き違っても、怒っても、嫌いになんてなれっこない。\n一番底のふかいとこでは、どうやったって許してる」
1092 = "「儘管產生矛盾、生對方的氣，卻又不會因此討厭對方。在內心最深處，無論如何都會原諒對方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1178 = "「嗯」" 

# monologue
# JP: いまならようやく、僕も素直に頷ける。\n路子も父さんも母さんも、僕を許してくれていると。
1774 = "時至今日，我終於能發自內心地點頭承認。承認路子、父親、母親，他們都會原諒我這一事實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は一度、僕自身の愚かさゆえに家族を失い。\nけれど、家族を失うことで、新しい家族の一員となれた」
1333 = "「我曾一度因為自己的愚蠢而失去了家人。然而，正因我失去了原本的家人，卻讓我成了新家庭的一員」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 1178 = "「嗯」" 

# monologue
# JP: 真闇姉、日々姫、ハチロク、義父さん、義母さん。\n汰斗さんや、そこからつらなる数多の人たち。
1838 = "真闇姐、日日姬、八六、父親、母親。還有汰斗老先生以及許許多多的人們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「少しずつ少しずつ家族になって。\nその幸せな日々の中から、さらに大きな幸せを得た」
1135 = "「和大家一點點成為家人，在這幸福的每一天裡，我獲得了更大的幸福」" 

# monologue
# JP: じっと、真闇姉の顔を見る。\n幼いころから無意識に、憧れ続けてきた瞳を見つめる。
1754 = "我靜靜注視著真闇姐的臉龐，注視著這我從小時候起就無意中愛戀至今的雙眸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉と結ばれて、結婚できて。\nそうしたらまた、僕の『家族』はふわふわしてきた」
1302 = "「得以和真闇姐結為連理。就這樣，我又輕飄飄地獲得了新的“家人”」" 

# 【真闇】
# display as 真闇
# JP: 「ああ！　わかると、ふわふわ！\nうん――ふわふわね。まだ落ち着かんとこあるとよね」
1166 = "「啊！這個我理解，輕飄飄的！嗯——輕飄飄的啊。也就是還能完全安心對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。元の家族はそのまま変わっていないのに、\nけれども少し、関係性が変化した」
1367 = "「是啊，雖然原本就是家人，人員並沒有改變，但總覺得關係發生了變化」" 

# monologue
# JP: 例えばハチロクが、日々姫の部屋に引っ越して。\n日々姫が少し、真闇姉めいた姉らしさを発揮しはじめ。
1781 = "比如八六她搬到日日姬的房間之後，日日姬就稍微開始展現真闇姐一般的姐姐氣質。" 

# 【真闇】
# display as 真闇
# JP: 「変化ゆーか……成長よね？　きっと」
1474 = "「變化嗎……是成長吧，應該」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だなぁ。成長だ。まことに」
1189 = "「嗯，也是。確實是成長」" 

# monologue
# JP: 自身の部屋を思い出す。\nその変遷に、つかの間思いを馳せたことに。
1743 = "我想起了自己的房間。在腦海中瞬間閃過房間的變遷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「家族は変化し。変化して成長するのだな」
1256 = "「家人會產生變化，然後透過變化來成長」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんね、きっと」
1038 = "「一定是這樣的」" 

# monologue
# JP: 列車の中だと、旅の途中だと強く感じる。\nこのB寝台客車はもう、レールを走りはしないけれども。
1673 = "因為在車廂裡，所以能強烈感受到我們身在旅途這一事實。雖然這普通臥鋪的客車現在並沒有在軌道上飛馳。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの家族は、これからどうなっていくのかな」
1328 = "「我們這一家，以後會怎麼樣呢」" 

# 【真闇】
# display as 真闇
# JP: 「なっていくなんて、心細かと。\n双ちゃんのしたいように育ててくれんと」
1083 = "「你這樣問，讓我很不安啊。只要按你心中的樣子經營這個家就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕が――僕らが、\n僕らの家族を、僕らの家庭を育てていくのか」
1058 = "「也是，要由我——由我們，來經營這個小小的家庭啊」" 

# monologue
# JP: 一度失ったものゆえに、その尊さを、\n僕は恐らく、いくらかは理解できている。
1778 = "正因為曾經失去過，才更懂得它的珍貴。可能我終於對這句話有所理解了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「行きたい場所に。なりたい形に」
1104 = "「去想去的地方，讓它成為我們期望的樣子」" 

# 【真闇】
# display as 真闇
# JP: 「うん。双ちゃんとおねえちゃんと、みんなとで」
1199 = "「嗯，有你有我，還有大家」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫のレールもハチロクのレールも、\nいずれどこかのポイントで、分岐するのかもしれないが」
1348 = "「日日姬的軌道、以及八六的軌道，都可能會在某一天迎來分歧點」" 

# monologue
# JP: 手をにぎる。\nそのまま静かに――誓いの、祈りの――キスをする。
1750 = "我握緊真闇姐的手，然後靜靜地——在她的唇上留下誓約和祈禱的吻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「願わくば、僕の旅路の最後まで。\n真闇姉――一緒に旅をしてほしい」
1114 = "「只願，直到我旅途的終點，還能有你的陪伴」" 

# 【真闇】
# display as 真闇
# JP: 「うん。おねえちゃんの旅の最後まで。\n双ちゃん、一緒に歩いてね？」
1174 = "「嗯。也希望你能陪我一起走到我旅途的終點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1423 = "「當然」" 

# monologue
# JP: そうして僕らの列車は進む。
1735 = "我們的列車就這樣繼續前行。" 

# monologue
# JP: 終着駅は――\nきっとまだまだ、ずうっと先だ。
1909 = "離終點站——一定還有很長很長的路程。" 
