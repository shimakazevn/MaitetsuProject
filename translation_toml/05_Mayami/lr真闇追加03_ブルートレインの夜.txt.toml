1073 = "「你平時是讓小波幫你洗的頭嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、一人前のレイルロオドですからぁ。\nシャンプーハットがあれば、自分ひとりであらえまぁす」
1406 = "「玲奈可是能獨當一面的鐵路人偶，只要有浴帽，自己一個人就能洗啦」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、そぉなんねぇ」
1125 = "「呵呵，也對」" 

# monologue
# JP: ……ハチロクはシャンプーハットを使わない。\nあれはつまり、一人前を超えたレイルロイドなのだろう。
668 = "……八六洗頭不需要浴帽。也就是說，她已經超脫了獨當一面鐵路人偶的範疇是吧。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、お背中も流してあげんで平気？」
1520 = "「那麼，你可以自己搓背嗎？」" 

# 【れいな】
# display as 玲奈
