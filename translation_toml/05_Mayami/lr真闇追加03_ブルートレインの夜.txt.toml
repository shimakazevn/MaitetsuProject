1336 = "「我知道你只是單純的為她好。這根本不是吵架，只是一點點小矛盾啦」" 

# 【れいな】
# display as 玲奈
# JP: 「あ……」
1158 = "「啊……」" 

# 【真闇】
# display as 真闇
# JP: 「それが証拠に、れーちゃん、\nポーちゃんのこと少しも嫌いになっとらんでしょ？」
1473 = "「證據就是，小玲，你是不是依然一點都不討厭小波？」" 

# 【れいな】
# display as 玲奈
