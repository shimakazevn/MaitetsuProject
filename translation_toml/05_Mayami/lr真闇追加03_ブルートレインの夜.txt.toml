1843 = "真闇姐在最前面，玲奈在中間，我在最後面。我們一坐上椅子，玲奈就搓起了泡泡。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、まくらさんのお背中おっきいですねぇ」
1210 = "「嘿嘿，真闇小姐的後背好寬呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなの背中は小さいなぁ。\n一瞬で洗い終わってしまいそうだ」
1410 = "「玲奈的背好嬌小啊，感覺一下就能洗乾淨了」" 

# 【れいな】
# display as 玲奈
