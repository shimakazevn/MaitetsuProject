1130 = "「呵呵，明白。就麻煩你把我的後背洗得乾乾淨淨啦」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、よろしくされましたぁ。\nうんしょ、うんしょ。うんしょ、うんしょっ」
1412 = "「玲奈被人拜託啦。嘿咻，嘿咻，嘿咻，嘿咻」" 

