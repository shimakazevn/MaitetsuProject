# display as 玲奈
# JP: 「ですです。けどポーレット、忙しくなると、\nバーのとかゼリーのとかばっかり食べて」
1263 = "「對啊對啊，可是波萊特一忙起來，就光吃營養棒或者果凍這類的東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1153 = "「唉……」" 

