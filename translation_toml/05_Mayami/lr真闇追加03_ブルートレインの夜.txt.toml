1796 = "玲奈的嗓音清脆嘹亮。又有誰能夠忍心讓這麼明媚的聲音籠上陰霾呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。つまりはこういうことだな」
1357 = "「明白了，是這麼做沒錯吧」" 

