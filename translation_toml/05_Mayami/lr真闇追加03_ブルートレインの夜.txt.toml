1236 = "「她說“對不起啊玲奈，雖然我知道，但實在太忙了”。玲奈也知道她很忙，可是，再忙也要好好吃飯啊」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
1178 = "「嗯」" 

