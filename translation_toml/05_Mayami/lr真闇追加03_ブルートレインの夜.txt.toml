1155 = "「唔……感覺有點太輕了。要是再用點力就最好了」" 

# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ、もうちょっと強くですねぇ。\nうんしょ、よいしょっ――どうですかぁ？」
1355 = "「明白了，再加把勁對吧。嘿咻、嘿咻——現在呢？」" 

# 【真闇】
# display as 真闇
