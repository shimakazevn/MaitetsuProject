[script]
# lines: 348 
# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ」
722 = "\"「……Ưm.」\""
# monologue
# JP: いつもと同じ、貸切状態の登呂流湯。\n面子だけが、いつもにはない取り合わせだ。
1620 = "Vẫn là nhà tắm Tororyu-yu được bao trọn gói như mọi khi. Chỉ có những người tham gia là sự kết hợp chưa từng có."
# 【真闇】
# display as 真闇
# JP: 「はーい、れーちゃん。シャンプー流すけん、\nおめめしっかり閉じとってねぇ」
1247 = "\"「Được rồi, Rei-chan. Chị xả dầu gội nhé, nhắm chặt mắt lại nha~」\""
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ。ぎゅってしまあす」
1440 = "\"「Reina biết rồi ạ~. Nhắm chặt đây ạ~」\""
# monologue
# JP: 真闇姉とは夫婦ゆえ。れいなとは乗務後に鉢合わせた折。\nそれぞれ幾度も、一緒に風呂に入っている。
1738 = "Với chị Mayami thì vì là vợ chồng. Còn với Reina thì vì thỉnh thoảng chạm mặt sau giờ làm. Em đã tắm chung với mỗi người không biết bao nhiêu lần rồi."
# monologue
# JP: （であるというのに、なんだこのソワソワ感は）
1919 = "（Vậy mà, cái cảm giác bồn chồn này là sao chứ.）"
# monologue
# JP: 真闇姉とれいなののんびりとしたやりとりは、\nどこまでだって和やかで、むしろ落ち着こうものなのに。
1842 = "Cuộc trò chuyện nhàn nhã giữa chị Mayami và Reina rõ ràng là rất hòa thuận, đáng lẽ ra phải khiến em thấy bình tâm mới phải."
# 【真闇】
# display as 真闇
# JP: 「ほんなら流すと。さん、にぃ、いち。ざばぁ」
1511 = "\"「Vậy chị xả nhé. Ba, hai, một. Ào.」\""
# 【れいな】
# display as 玲奈
# JP: 「ぷあっ――えへへ、ざばぁ気持ちいいですねぇ。\nれいな、シャンプーハット忘れちゃってよかったでぇす」
1212 = "\"「Phù——ehehe, ào một cái sướng quá đi ạ~. Reina quên mang theo mũ gội đầu đúng là may quá nha~」\""
# 【真闇】
# display as 真闇
# JP: 「普段はポーちゃんに、髪あらってもらったりせんの？」
1073 = "\"「Bình thường em không nhờ Po-chan gội đầu cho à?」\""
# 【れいな】
# display as 玲奈
# JP: 「れいな、一人前のレイルロオドですからぁ。\nシャンプーハットがあれば、自分ひとりであらえまぁす」
1406 = "\"「Reina là một Railord trưởng thành rồi mà. Chỉ cần có mũ gội đầu là Reina có thể tự gội được luôn đó nha~」\""
# 【真闇】
# display as 真闇
# JP: 「んふふっ、そぉなんねぇ」
1125 = "\"「Ưm fufu, ra là vậy.」\""
# monologue
# JP: ……ハチロクはシャンプーハットを使わない。\nあれはつまり、一人前を超えたレイルロイドなのだろう。
668 = "……Hachiroku không dùng mũ gội đầu. Nói cách khác, em ấy hẳn là một Railord đã vượt qua mức trưởng thành rồi."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、お背中も流してあげんで平気？」
1520 = "\"「Vậy, chị không kỳ lưng cho em cũng được nhỉ?」\""
# 【れいな】
# display as 玲奈
# JP: 「いいええ。れいな、背中には手が届かないですから、\n流して欲しいですぅ――あっ！」
1049 = "\"「Không chịu đâu ạ~. Reina không với tới lưng được, nên muốn được chị kỳ lưng cho cơ——A!」\""
# monologue
# JP: うふふぅ、と、幸せに満ち満ちた笑い声。
1714 = "Ufufu~, một tiếng cười ngập tràn hạnh phúc vang lên."
# 【れいな】
# display as 玲奈
# JP: 「れいな、洗いっこがしたいです！\nまくらさんのお背中、れいなが洗ってもいいですかぁ？」
1416 = "\"「Reina muốn kỳ cọ cho nhau cơ! Lưng của chị Makura, để Reina kỳ cho được không ạ~?」\""
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、ありがと。もちろん大歓迎。\nね？　双ちゃんもどう？　洗いっこ」
1146 = "\"「Ôi chà, cảm ơn em. Tất nhiên là hoan nghênh rồi. Nè? Sou-chan thì sao? Có muốn kỳ cọ cho nhau không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　僕もか」
1204 = "\"「Hửm? Cả em nữa à?」\""
# 【れいな】
# display as 玲奈
# JP: 「わぁあ！\n三人だったら、れいなが真ん中になりますねぇ」
1137 = "\"「Oaaa! Nếu là ba người thì Reina sẽ ở giữa đó nha~」\""
# monologue
# JP: れいなのぱあっと華やいだ声。\nこれを曇らせてしまうなど、まさか出来ようはずもない。
1796 = "Giọng nói bừng sáng rạng rỡ của Reina. Làm sao em nỡ lòng nào dập tắt sự hào hứng đó được chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。つまりはこういうことだな」
1357 = "\"「Đã rõ. Tóm lại là như thế này nhỉ.」\""
# monologue
# JP: 先頭が真闇姉、真ん中がれいな、最後尾が僕。\n椅子を並べて腰掛けたなら、れいなは早速泡だて始める。
1843 = "Chị Mayami ngồi trước, Reina ở giữa, còn em ở cuối. Khi ba chiếc ghế đã được xếp ngay ngắn, Reina liền bắt đầu tạo bọt xà phòng."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、まくらさんのお背中おっきいですねぇ」
1210 = "\"「Ufufu~, lưng chị Makura to quá nha~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの背中は小さいなぁ。\n一瞬で洗い終わってしまいそうだ」
1410 = "\"「Lưng của Reina thì lại nhỏ xíu. Chắc vèo cái là kỳ xong rồi.」\""
# 【れいな】
# display as 玲奈
# JP: 「一瞬じゃやぁですよぉ。ゆっくりやってくださいねぇ。\nあ、けど、そうてつさんは右半分だけおねがいしまぁす」
1100 = "\"「Vèo cái là không chịu đâu ạ~. Anh phải kỳ từ từ thôi đó nha~. À, nhưng mà, anh Soutetsu chỉ kỳ nửa bên phải thôi nhé.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「右半分だけか。心得た」
1113 = "\"「Chỉ nửa bên phải thôi à. Đã rõ.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ、おねえちゃんわかったと。\nほんならあとで、左半分洗ってあげればよかとね？」
1167 = "\"「A, chị hiểu ý em rồi. Vậy lát nữa, chị sẽ kỳ nửa bên trái cho em nhé?」\""
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ！　大正解でぇす！」
1207 = "\"「Ufufu~! Chính xác luôn ạ~」\""
# monologue
# JP: 背中がにこにこ笑ってる。\nれいなのも、その肩越しにみる真闇姉のも。
1905 = "Những tấm lưng đang mỉm cười. Cả lưng của Reina, và cả tấm lưng của chị Mayami nhìn qua vai Reina nữa."
# 【れいな】
# display as 玲奈
# JP: 「それじゃあお背中ながしまぁす！\nれいな、がんばっちゃいますからねぇ」
1518 = "\"「Vậy Reina bắt đầu kỳ lưng đây ạ~! Reina sẽ cố gắng hết sức đó nha~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕もだ。\n弱すぎる強すぎるなどあったら知らせてくれ」
1509 = "\"「Vậy anh cũng bắt đầu đây. Nếu mạnh quá hay yếu quá thì nhớ bảo anh nhé.」\""
# 【れいな】
# display as 玲奈
# JP: 「はぁい。まくらさんも知らせてくださいねぇ」
1240 = "\"「Vâng ạ~. Chị Makura cũng nhớ nói cho Reina biết nhé.」\""
# 【真闇】
# display as 真闇
# JP: 「んふふっ、了解。\n背中綺麗に、よろしくね？」
1130 = "\"「Ưm fufu, đã rõ. Nhờ em kỳ cho lưng chị thật sạch nhé?」\""
# 【れいな】
# display as 玲奈
# JP: 「れいな、よろしくされましたぁ。\nうんしょ、うんしょ。うんしょ、うんしょっ」
1412 = "\"「Reina nhận lệnh rồi ạ~. Dô ta, dô tà. Dô ta, dô tà.」\""
# monologue
# JP: ……真闇姉の背中を一生懸命流すゆえ、\nれいなの背中全体が、ゆさゆさかなり大きく動く。
672 = "……Vì Reina đang ra sức kỳ lưng cho chị Mayami, nên toàn bộ tấm lưng của cô bé cứ lắc lư liên tục."
# 【れいな】
# display as 玲奈
# JP: 「まくらさん、どぉですかぁ？」
1437 = "\"「Chị Makura, thấy sao ạ~?」\""
# 【真闇】
# display as 真闇
# JP: 「ん……ちょっとだけゆるすぎるかも。\nもう少し強めてもらえたらうれしかと」
1155 = "\"「Ưm……hơi nhẹ quá thì phải. Em kỳ mạnh hơn chút xíu nữa thì tuyệt lắm.」\""
# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ、もうちょっと強くですねぇ。\nうんしょ、よいしょっ――どうですかぁ？」
1355 = "\"「Reina hiểu rồi ạ~, mạnh hơn chút xíu nhé. Dô ta, dô tà——Thế này được chưa ạ~?」\""
# 【真闇】
# display as 真闇
# JP: 「うんうん。ありがと。\nまっことよか塩梅」
1186 = "\"「Ừ ừ. Cảm ơn em.\nVừa vặn lắm rồi.」\""
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ、それじゃあ続けますねぇ」
1150 = "\"「Ehehe, vậy Reina tiếp tục nha~」\""
# monologue
# JP: 慣れてきたなられいなの動きのリズムがわかる。\nそれにあわせて、僕もアカスリをゆるゆる動かす。
1676 = "Khi đã quen, em có thể nắm bắt được nhịp điệu chuyển động của Reina. Nương theo đó, em cũng chầm chậm đưa miếng bọt biển."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなはどうだ？」
1417 = "\"「Reina thấy sao?」\""
# 【れいな】
# display as 玲奈
# JP: 「ちょうどよくって、すっごく気持ちいいでぇす。\nこころの汚れまで落ちてるみたいな感じがしますぅ」
1102 = "\"「Lực vừa vặn lắm, sướng cực kỳ luôn ạ~. Cảm giác như mọi vết nhơ trong lòng đều được gột rửa sạch sẽ vậy đó nha~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、\nれいなにこころの汚れなど、はなからあるまい」
1141 = "\"「Haha, Reina làm gì có vết nhơ nào trong lòng chứ.」\""
# 【れいな】
# display as 玲奈
# JP: 「あぅ……そんなことないですよぉ」
1164 = "\"「Au……Không phải vậy đâu ạ~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
905 = "\"「!」\""
# monologue
# JP: れいなの声が急にしおれる。\nこういう話題で軽口を叩くべきではなかったのかもしれん。
1799 = "Giọng Reina bỗng xìu xuống. Có lẽ em không nên đùa cợt về chủ đề này."
# 【れいな】
# display as 玲奈
# JP: 「こないだだって、れいな、ポーレットと……\nちょっとケンカみたいになっちゃいましたし……」
1280 = "\"「Như hôm bữa đó, Reina và Paulette…… đã hơi cãi nhau một chút……」\""
# 【真闇】
# display as 真闇
# JP: 「ありゃま」
1143 = "\"「Ôi chà.」\""
# monologue
# JP: あえてであろう、軽く明るい真闇姉の声。
1858 = "Chắc là cố ý, giọng chị Mayami nghe nhẹ nhàng và tươi sáng hẳn lên."
# 【真闇】
# display as 真闇
# JP: 「ね、おねえちゃん聞いてもよかと？\nどぎゃんこつでケンカみたいになっちゃったのか」
1420 = "\"「Nè, chị nghe được không? Chuyện gì mà hai người lại cãi nhau vậy?」\""
# 【れいな】
# display as 玲奈
# JP: 「れいな……ただ、\nポーレットにちゃんとごはん食べてほしくって」
1404 = "\"「Reina……chỉ là, muốn Paulette ăn uống đàng hoàng thôi ạ.」\""
# 【真闇】
# display as 真闇
# JP: 「ごはん。ちゃんと食べるの大切よねぇ」
1242 = "\"「Ăn uống. Ăn uống đàng hoàng quan trọng lắm đấy.」\""
# 【れいな】
# display as 玲奈
# JP: 「ですです。けどポーレット、忙しくなると、\nバーのとかゼリーのとかばっかり食べて」
1263 = "\"「Đúng vậy ạ. Nhưng mà Paulette cứ hễ bận rộn, là lại toàn ăn mấy cái thanh năng lượng hay thạch trái cây thôi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1153 = "\"「À……」\""
# monologue
# JP: 気持ちはわかる。\nポーレットのものも、れいなのものも。
1686 = "Em hiểu cảm giác đó. Cả của Paulette, và cả của Reina nữa."
# 【れいな】
# display as 玲奈
# JP: 「それで『ちゃんとごはん食べなきゃダメですよぉ』って\nれいな、心配でイライラしちゃって」
1401 = "\"「Nên Reina mới bảo là 『Không ăn uống đàng hoàng là không được đâu nha~』 Reina lo lắng quá nên đâm ra cáu gắt luôn.」\""
# 【真闇】
# display as 真闇
# JP: 「そうしたらポーちゃんは、なんて？」
1400 = "\"「Thế rồi Po-chan nói sao?」\""
# 【れいな】
# display as 玲奈
# JP: 「『ごめんね、れいな。わかってるけど忙しくって』って。\n忙しいのは、れいなもわかってて、だけど、それでも」
1236 = "\"「Chị ấy bảo 『Xin lỗi Reina. Chị biết rồi nhưng mà chị bận quá』. Reina cũng biết là chị ấy bận, nhưng mà, dù vậy thì.」\""
# 【真闇】
# display as 真闇
# JP: 「うん」
1178 = "\"「Ừm.」\""
# monologue
# JP: 背中を向けて洗われるまま、\nけれども声が、ふんわりれいなを包み込む。
1862 = "Dù vẫn đang quay lưng lại để được kỳ cọ, nhưng giọng nói của chị Mayami như đang dịu dàng ôm lấy Reina."
# 【真闇】
# display as 真闇
# JP: 「れーちゃんはポーちゃんを思いやっとるだけやけん。\nケンカじゃのーて、単なるちょっとした行き違い」
1336 = "\"「Đó là do Rei-chan quan tâm đến Po-chan thôi mà. Đâu phải cãi nhau, chỉ là hiểu lầm chút xíu thôi.」\""
# 【れいな】
# display as 玲奈
# JP: 「あ……」
1158 = "\"「A……」\""
# 【真闇】
# display as 真闇
# JP: 「それが証拠に、れーちゃん、\nポーちゃんのこと少しも嫌いになっとらんでしょ？」
1473 = "\"「Bằng chứng là, Rei-chan, em đâu có ghét Po-chan chút nào đâu đúng không?」\""
# 【れいな】
# display as 玲奈
# JP: 「キライになんてなりっこないですよぉ！\n大好きだから心配で――」
1310 = "\"「Làm sao mà Reina ghét chị ấy được chứ ạ! Vì cực kỳ yêu quý nên mới lo lắng——」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならばそれは、むしろ優しく綺麗なこころのあらわれだ。\n汚れだなどと、とんでもない」
1489 = "\"「Vậy thì đó là biểu hiện của một trái tim nhân hậu và thuần khiết đấy chứ. Vết nhơ cái gì, làm gì có chuyện đó.」\""
# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1158 = "「啊……」" 
# monologue
# JP: れいなの声は、けれどはっきり晴れてくれない。\n行き違いは、思ったより深いものなのかもしれん。
1792 = "Thế nhưng, giọng Reina vẫn chưa thực sự vui vẻ trở lại. Có lẽ sự hiểu lầm này sâu sắc hơn em tưởng."
# 【れいな】
# display as 玲奈
# JP: 「……もしもそうなら、そうだって、\nポーレットにもわかってもらえたらいいんですけど」
731 = "\"「……Nếu đúng là vậy, thì phải chi Paulette cũng hiểu được lòng Reina thì tốt biết mấy.」\""
# 【真闇】
# display as 真闇
# JP: 「『わかってもらえてないかも』って、\nどぎゃんして心配になっちゃっとるの？」
1394 = "\"「Sao em lại lo lắng là 『chắc chị ấy không hiểu đâu』 thế?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「れいなのガイドが可能かどうかを訪ねたときなど、\nポーレットもれいなも、普段どおりに見えたものだが」
1330 = "「Lúc anh hỏi xem Reina có thể làm hướng dẫn viên được không, cả Paulette và Reina trông vẫn như bình thường mà」"
# 【れいな】
# display as 波萊特
# JP: 「ふだんどおりなんですよ！　れいな、がんばって、\n『ごはんちゃんと食べてください』ってゆったのに」
1284 = "「Chính vì như bình thường nên mới nói đó ạ! Rõ ràng Reina đã cố gắng bảo chị ấy 『Chị phải ăn uống đàng hoàng mới được nha』 rồi mà」"
# 【真闇】
# display as 真闇
# JP: 「あー」
1162 = "「À——」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、こんなに心配なのに、ポーレットはやっぱり\nゼリーみたいなごはんをこそこそ続けてて」
1353 = "「Reina, lo lắng đến thế cơ mà, chị Paulette vẫn cứ lén lút ăn mấy thứ như thạch thay cơm」"
# 【双鉄】
# display as 雙鐵
# JP: 「こそこそするのは、伝わっているからこそだろう。\n解っているけど改善できない、その申し訳無さゆえだ」
1283 = "「Lén lút là vì chị ấy đã hiểu được tâm ý của em đó. Hiểu nhưng không thể sửa đổi được, nên mới thấy có lỗi」"
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんもそぎゃん思うと。\nぽーちゃん、一生懸命普段どおりにしとるとよ」
1324 = "「Chị cũng nghĩ vậy đó. Pau-chan, cũng đang cố gắng hết sức để tỏ ra như bình thường mà」"
# 【れいな】
# display as 玲奈
# JP: 「いっしょうけんめい、なんですかぁ？」
1337 = "「Cố gắng hết sức, là sao ạ?」"
# 【真闇】
# display as 真闇
# JP: 「そ。ぎくしゃくでもしたら、\n余計にれーちゃんを悲しませてしまうけん」
1384 = "「Đúng vậy. Nếu tỏ ra gượng gạo, thì chỉ càng làm bé Reina buồn thêm thôi」"
# 【れいな】
# display as 玲奈
# JP: 「あ」
1161 = "「A」"
# 【真闇】
# display as 真闇
# JP: 「ばってん、時間がのーて食生活は改善できない。\nやけん、そこんとこだけは触れられんように、こそこそ」
1223 = "「Nhưng mà, vì không có thời gian nên không thể cải thiện thói quen ăn uống được. Nên để không động chạm đến chuyện đó, mới phải lén lút」"
# 【れいな】
# display as 玲奈
# JP: 「そっか……そうなんですねぇ」
1488 = "「Ra là vậy……đúng là thế nhỉ」"
# monologue
# JP: ほうっと、息。安堵が半分――\nけれど、やるせなさも半分といった感じに聞こえてしまう。
1684 = "Phù, một tiếng thở hắt ra. Một nửa là an tâm—— Nhưng nửa còn lại nghe như mang theo sự chán nản."
# 【れいな】
# display as 玲奈
# JP: 「共感もないし、おはなししてもつたわらないし、\nポーレットのこと、わからないみたいになっちゃってて」
1327 = "「Chẳng có cộng cảm, nói chuyện cũng không hiểu nhau, cứ như thể Reina, không còn hiểu gì về chị Paulette nữa vậy」"
# 【真闇】
# display as 真闇
# JP: 「伝わってるようなフリばせんのは、誠実よ。\nそれだけぽーちゃん、れーちゃんのこと大事にしとる」
1045 = "「Không giả vờ như đã hiểu, đó là sự thành thật đấy. Chứng tỏ Pau-chan, rất trân trọng bé Reina」"
# monologue
# JP: 真闇姉は振り返らない。\nれいなに背中を預けたままに、ひとり語りのように話す。
1847 = "Chị Mayami không ngoảnh lại. Vẫn quay lưng về phía Reina, chị nói như đang tự lẩm bẩm."
# 【真闇】
# display as 真闇
# JP: 「なにか伝えて。『わかった』ゆーてもろーて安心して。\n安心したのに裏切られるのは、もっと切なかけんね」
1250 = "「Nếu em nói gì đó. Người ta bảo 『Chị hiểu rồi』 để em yên tâm. Nhưng sau khi an tâm rồi lại bị phản bội, thì còn đau lòng hơn nhiều」"
# 【れいな】
# display as 玲奈
# JP: 「あ……」
# 1158 = "「啊……」" 
# 【真闇】
# display as 真闇
# JP: 「やけん、ポーちゃんは空約束ばできんかったの」
1472 = "「Nên là, Pau-chan không thể hứa suông được」"
# 【れいな】
# display as 玲奈
# JP: 「れいな。大事におもってもらえてるの、わかりました。\nけど、それでも――ごはんのことも大切だから」
1421 = "「Reina. Đã hiểu là mình được trân trọng rồi ạ. Nhưng mà, dù vậy thì——chuyện ăn uống vẫn rất quan trọng mà」"
# 【真闇】
# display as 真闇
# JP: 「うん。それでもやっぱり伝えたいなら、\n何回だって工夫して、繰り返しお話する他なかとよね」
1191 = "「Ừ. Dù vậy nếu em vẫn muốn truyền đạt, thì chỉ còn cách tìm đủ mọi cách, lặp đi lặp lại nhiều lần thôi」"
# 【れいな】
# display as 玲奈
# JP: 「くふう……\nお話のしかた、変えてみたりとかですかぁ？」
1313 = "「Đủ mọi cách……\nLà thử thay đổi cách nói chuyện sao ạ?」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんね。伝え方、伝えるタイミング。それ次第で、\n全然通じんかったもんが、すうっと伝わったりもする」
1382 = "「Đúng vậy đó. Cách truyền đạt, thời điểm truyền đạt. Tùy vào những điều đó, có khi những thứ hoàn toàn không lọt tai, lại dễ dàng được thấu hiểu đấy」"
# 【れいな】
# display as 玲奈
# JP: 「ん……っと」
1154 = "「Ưm……để xem」"
# monologue
# JP: れいなが珍しくいい淀む。\n真闇姉はなんにもいわず、ただただゆるりと続きを待つ。
1800 = "Reina ngập ngừng một cách hiếm thấy. Chị Mayami không nói gì, chỉ chậm rãi chờ đợi cô bé nói tiếp."
# 【れいな】
# display as 玲奈
# JP: 「しつこいって思われちゃったら、\nれいな、イヤだなぁって」
1118 = "「Nếu bị nghĩ là phiền phức, thì Reina, không thích thế đâu ạ」"
# 【真闇】
# display as 真闇
# JP: 「それでも、伝えたいことなんでしょお？」
1290 = "「Dù vậy, em vẫn muốn truyền đạt đúng không?」"
# monologue
# JP: こくん、と頷き。\n背中全部が動くほど、はっきりとした強い頷き。
1795 = "Gật đầu cái rụp. Một cái gật đầu dứt khoát và mạnh mẽ đến mức cả tấm lưng cũng chuyển động theo."
# 【れいな】
# display as 玲奈
# JP: 「れいなポーレット大好きで、しつこいって\n思われたくなくて、だけどごはんのことだけは――」
1408 = "「Reina cực kỳ yêu quý chị Paulette, không muốn bị nghĩ là phiền phức, nhưng chỉ riêng chuyện ăn uống thì——」"
# monologue
# JP: 一途なまでの頑なさに、れいなの過去を不意に感じる。\nれいなは飢餓を――あるいは知っているのかもしれん。
1904 = "Sự cố chấp đến mức một lòng một dạ này, khiến tôi bất chợt cảm nhận được quá khứ của Reina. Có lẽ Reina——đã từng biết đến nạn đói."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ね？　れーちゃんがもしよかったら」
1521 = "「Vậy thì, nè? Nếu bé Reina muốn」"
# monologue
# JP: せっけんの香りにまじる、ふわりとした声。
1899 = "Một giọng nói dịu dàng, hòa lẫn với hương xà phòng."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃん、お料理教えてあげようか」
1462 = "「Chị, dạy em nấu ăn nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1532 = "「!」"
# 【れいな】
# display as 玲奈
# JP: 「お料理！　れいな、つくってみたいです！\nけどけど、れいな、レイルロオドで――」
1087 = "「Nấu ăn! Reina, muốn thử làm ạ! Nhưng mà nhưng mà, Reina, là Railord mà——」"
# 【真闇】
# display as 真闇
# JP: 「レイルロオドは、お料理せんと？」
1523 = "「Railord, thì không được nấu ăn sao?」"
# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいなの遠いイトコみたいなこ……\n旧[なんさつ,1]南颯鉄道の紅ちゃんとかは、お料理大得意ですよぉ」
1380 = "「Không đâu ạ, giống như người họ hàng xa của Reina…… Bé Kurenai của Tuyến đường sắt Nansatsu cũ, nấu ăn cực kỳ giỏi luôn nha」"
# 【真闇】
# display as 真闇
# JP: 「ほんならきっと、れーちゃんも大得意になれるとよ」
1504 = "「Vậy thì chắc chắn, bé Reina cũng sẽ trở nên cực kỳ giỏi thôi」"
# 【れいな】
# display as 玲奈
# JP: 「ほんとですかぁ！\nならならお料理、教えてくださぁい」
1433 = "「Thật sao ạ! Vậy thì vậy thì, hãy dạy Reina nấu ăn nha」"
# monologue
# JP: 声が弾めば背中も弾む。
1701 = "Giọng nói hân hoan, tấm lưng cũng rộn ràng."
# 【れいな】
# display as 玲奈
# JP: 「れいな、お料理覚えたら、\nポーレットにごはんつくってあげられちゃいますねぇ」
1414 = "「Reina, nếu học được cách nấu ăn, thì có thể nấu cơm cho chị Paulette ăn rồi nha」"
# 【真闇】
# display as 真闇
# JP: 「うんうん」
1185 = "「Ừ ừ」"
# 【れいな】
# display as 玲奈
# JP: 「そしたらそしたらいそがしくっても、\nポーレット、ぜーったいたべてくれますねぇ」
1399 = "「Vậy thì vậy thì dù có bận rộn đến mấy, chị Paulette, nhất~định sẽ ăn nha」"
# 【真闇】
# display as 真闇
# JP: 「もちろん！　念には念で、\n簡単にパッと食べられるお料理教えてあげるけん」
1424 = "「Tất nhiên rồi! Để chắc ăn hơn, chị sẽ dạy em những món có thể ăn nhanh gọn lẹ luôn」"
# 【れいな】
# display as 玲奈
# JP: 「わあい！　ありがとうございまぁす！！」
1450 = "「Waai! Em cảm ơn ạ!!」"
# monologue
# JP: 声も背中もぱっと華やぐ。
1700 = "Cả giọng nói và tấm lưng đều bừng sáng."
# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。お料理教えてもらうお礼に、\nもっとがんばって、お背中綺麗にしますねぇ」
1149 = "「Ehehe. Để cảm ơn chị đã dạy nấu ăn, Reina sẽ cố gắng hơn nữa, kỳ lưng cho chị thật sạch nha」"
# monologue
# JP: ――弾む背中に、僕まで深く安堵をする。\n安堵をすれば改めて、その小ささをつくづく感じる。
656 = "——Nhìn tấm lưng rộn ràng ấy, tôi cũng thấy an tâm sâu sắc. Sự an tâm ấy lại một lần nữa khiến tôi cảm nhận rõ rệt sự nhỏ bé của nó."
# monologue
# JP: （……懐かしいな）
1913 = "（……Hoài niệm thật đấy）"
# monologue
# JP: 思った瞬間、理解する。\nさきほどまで胸に巣食ってた、ソワソワ感の正体を。
1678 = "Khoảnh khắc nghĩ vậy, tôi chợt hiểu ra. Chân tướng của cảm giác bồn chồn cứ bám lấy tâm trí tôi từ nãy đến giờ."
# monologue
# JP: （ああ。そうか――幼いころには、僕も……\nけど、うん。路子の背中は、もっとずうっと小さかった）
1917 = "（À. Ra là vậy——Hồi còn nhỏ, tôi cũng…… Nhưng mà, ừm. Lưng của Michiko, còn nhỏ hơn thế này rất nhiều）"
# 【れいな】
# display as 玲奈
# JP: 「うんしょ、よいしょ、うんしょ、よいしょっ」
1208 = "「Dzo, dzo, dzo, dzo」"
# 【双鉄】
# display as 雙鐵
# JP: 「張り切りすぎかもだ。少し背中の動きを抑えてくれると、\n僕としては大いに助かる」
1075 = "「Có lẽ em đang hăng hái quá rồi. Nếu em bớt cử động lưng lại một chút, thì anh sẽ đỡ vất vả hơn nhiều đấy」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　そうですねぇ。\nうんしょ、よいしょ、うんしょ、よいしょっ」
1139 = "「Oa! Đúng vậy ha.\nDzo, dzo, dzo, dzo」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1123 = "「Fufu」"
# monologue
# JP: ……声は明らかに小さくなるが、動きはさほど変わらない。\n思わず少し笑ってしまう。
682 = "……Giọng nói rõ ràng đã nhỏ đi, nhưng chuyển động thì chẳng thay đổi mấy. Tôi bất giác bật cười."
# 【真闇】
# display as 真闇
# JP: 「あらあら双ちゃん、どぎゃんしたと」
1145 = "「Ây da ây da Sou-chan, sao thế」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、なんでも」
1050 = "「Không, không có gì」"
# monologue
# JP: わかっているだろう問いかけと。\nゆえに敢えては返さぬ事実と。
1751 = "Lời hỏi han mà có lẽ chị ấy đã biết rõ câu trả lời. Nên tôi cũng cố tình đáp lại bằng một sự thật lấp lửng."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕らも夫婦になったものだな」
727 = "「……Chúng ta cũng đã trở thành vợ chồng rồi nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「っ！」
1120 = "「!」"
# monologue
# JP: びくりと真闇姉の背が硬直し、肌がぽーっと赤くなる。\nいや、これは――うむ、照れられてしまうと照れくさい。
1670 = "Lưng chị Mayami giật thót cứng đơ, làn da đỏ ửng lên. Chà, đây là——ừm, bị chọc ghẹo thì sẽ ngượng ngùng thôi."
# 【れいな】
# display as 玲奈
# JP: 「うっふふー、おふたり、新婚旅行中ですよぉ？\nあったりまえじゃないですかぁ」
1180 = "「Ufufuu, hai anh chị, đang trong tuần trăng mật mà nha? Chuyện đó là đương nhiên rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
1446 = "「Đúng vậy」"
# monologue
# JP: 穏やかな時間の一秒ごとに、強張っていた何かもボロボロ、\nゆっくりゆっくり温もって、自然と剥がれていくようで。
1906 = "Mỗi giây phút êm đềm trôi qua, những thứ từng cứng nhắc cũng dần vỡ vụn, chầm chậm chầm chậm ấm lên, rồi tự nhiên bong tróc đi."
# 【双鉄】
# display as 雙鐵
# JP: 「…………あたたかだな、とても」
704 = "「…………Ấm áp thật đấy, rất ấm áp」"
# monologue
# JP: かつては僕も、こうした時間を過ごしていたと――\n閉ざしてしまった記憶がじんわり、言葉に染み出す。
1732 = "Trước kia tôi cũng từng trải qua những khoảng thời gian như thế này—— Ký ức bị đóng kín dần rịn ra, thấm vào từng lời nói."
# 【真闇】
# display as 真闇
# JP: 「……うん、まっこと」
725 = "「……Ừ, đúng vậy thật」"
# monologue
# JP: なぜだろう、\n真闇姉の声にもどこか、しっとりとしたものを感じる。
1626 = "Không hiểu sao, tôi cảm nhận được chút gì đó ướt át trong giọng nói của chị Mayami."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、もっとあたたかにしちゃいましょお！」
1183 = "「Ufufuu, hãy để nó trở nên ấm áp hơn nữa nha!」"
# monologue
# JP: けれどもあえかな疑問符は、\nれいなにカラリと吹き飛ばされる。
1636 = "Nhưng dấu chấm hỏi mỏng manh ấy, đã bị Reina thổi bay một cách nhẹ nhàng."
# 【れいな】
# display as 玲奈
# JP: 「みんなでぐるって反対むきましょうねぇ。\n今度はれいな、そうてつさんのお背中ながしまぁす！！」
1227 = "「Mọi người cùng quay ngoắt sang hướng ngược lại nha. Lần này Reina, sẽ kỳ lưng cho anh Soutetsu ạ!!」"
# 【真闇】
# display as 真闇
# JP: 「……よかねぇ。終列車の風情って」
728 = "「……Tuyệt thật nhỉ. Phong vị của chuyến tàu cuối cùng」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1365 = "「Đúng vậy」"
# monologue
# JP: 小声だ。僕も真闇姉も。\n車内にはほとんど他の乗客の姿もないのだけれど。
1628 = "Giọng nói nhỏ nhẹ. Cả tôi và chị Mayami. Dù trong toa xe hầu như không còn hành khách nào khác."
# 【れいな】
# display as 玲奈
# JP: 「すぅ……すぅ……すぅ……すぅ」
1133 = "「Khò……khò……khò……khò」"
# 【真闇】
# display as 真闇
# JP: 「ふふっ」
# 1123 = "「呵呵」" 
# monologue
# JP: 真闇姉の手がゆっくりゆっくり、\n膝の上眠るれいなの髪をなでていく。
1855 = "Bàn tay chị Mayami chậm rãi, chậm rãi, vuốt ve mái tóc của Reina đang ngủ say trên đùi chị."
# 【双鉄】
# display as 雙鐵
# JP: 「あどけないな。\n眠っていると、まるきりこどもだ」
1429 = "「Thật ngây thơ. Khi ngủ, trông con bé hoàn toàn giống một đứa trẻ」"
# 【真闇】
# display as 真闇
# JP: 「きっと疲れちゃったとね。今日一日大張り切りで、\nがんばってガイドしてくれたけん」
1235 = "「Chắc là em ấy mệt lắm rồi. Hôm nay đã căng sức cả ngày, cố gắng làm hướng dẫn viên cho chúng ta mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「張り切っていたし、はしゃいでもいたな。\n果たしてどんなガイドになるか、正直危ぶんでもいたが」
1043 = "「Đã căng sức, lại còn phấn khích nữa. Nói thật là anh cũng từng lo không biết em ấy sẽ làm hướng dẫn viên thế nào」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんだった？　双ちゃんとしては」
1500 = "「Thế nào? Theo ý Sou-chan thì sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ガイドの一番大事な部分が\n『お客に旅を楽しませる』であるのなら、大合格だ」
1252 = "「Nếu phần quan trọng nhất của một hướng dẫn viên là 『giúp khách hàng tận hưởng chuyến đi』, thì em ấy đã đậu điểm tuyệt đối rồi」"
# monologue
# JP: いえばふつふつ、笑いにも似た明るい気持ちが\n胸の奥からこみ上げてくる。
1703 = "Vừa nói ra, một cảm giác tươi sáng xen lẫn buồn cười đã trào dâng từ sâu thẳm trong ngực."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕は楽しかった。\nれいなのおかげで、魅力を再確認させてもらえた」
1197 = "「Ừ. Anh thấy rất vui. Nhờ có Reina, anh lại một lần nữa nhận ra sức hấp dẫn của nơi này」"
# 【真闇】
# display as 真闇
# JP: 「まっことねぇ。れーちゃんがそこにおると、\nきっとみんな少しずつ、もっとやさしくなるけんね」
1447 = "「Đúng thật nhỉ. Có bé Reina ở đó, chắc chắn mọi người cũng sẽ dần trở nên dịu dàng hơn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1365 = "「是啊」" 
# monologue
# JP: 言われてみるとそうかもしれん。クマ川下り、包丁づくり、\n投炭練習に酒造見学。どれも僕は経験済みだが――
1893 = "Nghe chị ấy nói vậy, có lẽ là thế thật. Xuôi dòng sông Kuma, rèn dao, tập xúc than dồn toa, tham quan xưởng rượu. Dù tất cả anh đều đã trải qua——"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。『れいなにとっての御一夜』は、\nまことひだまりのような場所なのだなぁと、僕も感じた」
1381 = "「Đúng vậy. Anh cũng cảm nhận được rằng, 『Ohimitera trong mắt Reina』, quả thực là một nơi ấm áp như ánh nắng mặt trời」"
# 【真闇】
# display as 真闇
# JP: 「愛されとるとね。このこはたくさん、きっとずーっと。\nやけん、やさしい。やさしいけん、やさしゅうされる」
1221 = "「Được yêu thương mà. Đứa trẻ này được yêu thương rất nhiều, và chắc chắn là mãi mãi. Nên mới dịu dàng. Vì dịu dàng, nên mới được đối xử dịu dàng」"
# 【双鉄】
# display as 雙鐵
# JP: 「好循環だな。それゆえ、僕は――\n僕などは……」
1453 = "「Một vòng tuần hoàn tốt đẹp. Vì thế, anh—— Người như anh thì……」"
# monologue
# JP: 入浴中の胸のざわつきを思い出す。この穏やかな雰囲気で、\n口に出すべきことではないかとも感じるが――
1740 = "Tôi nhớ lại sự xao động trong lồng ngực lúc đang tắm. Trong bầu không khí yên bình này, tôi cảm thấy đây không phải là điều nên nói ra, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「もっと優しくできればよかった……\nそんなことをふと、思ってしまったりもした」
1465 = "「Giá như anh có thể dịu dàng hơn…… Bất chợt, anh đã nghĩ như vậy」"
# monologue
# JP: けれど、この雰囲気で、真闇姉相手だからこそ。\n感じたことを、そのまま言葉にあらわしたくなる。
1638 = "Nhưng, chính vì trong bầu không khí này, và vì đối phương là chị Mayami. Nên tôi muốn bày tỏ những gì mình cảm nhận thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの背中が、あまりにも小さくなものと感じて。\n――けれども路子は、もっと小さな背中だったと」
1422 = "「Anh cảm thấy tấm lưng của Reina quá đỗi nhỏ bé. ——Nhưng tấm lưng của Michiko, còn nhỏ bé hơn thế nữa」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1178 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1161 = "「啊」" 
# monologue
# JP: なで、なで、なで。れいなを優しく撫ぜていた手が、\n今度は僕を――僕を穏やかに許してくれる。
1763 = "Xoa, xoa, xoa. Bàn tay nãy giờ vẫn dịu dàng vuốt ve Reina, giờ lại chuyển sang anh——ôn tồn bao dung lấy anh."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんもね？　似たようなこと思うとったと。\nひーちゃんと、こぎゃん時間ば過ごしたかった、って」
1097 = "「Chị cũng vậy đó, biết không? Chị cũng từng nghĩ đến những điều tương tự. Rằng, chị cũng muốn được dành thời gian như thế này cùng với Hii-chan」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1362 = "「À……」"
# monologue
# JP: 思い出す。幼い日々姫を風呂に入れるのは、\n引き取ってもらって以降、長いこと僕の役割だった。
1745 = "Tôi nhớ lại. Việc tắm cho Hibiki hồi nhỏ, từ sau khi tôi được nhận nuôi, đã trở thành nhiệm vụ của tôi suốt một thời gian dài."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、ずうっと忙しかったからなぁ」
1224 = "「Vì chị Mayami, lúc nào cũng bận rộn mà」"
# 【真闇】
# display as 真闇
# JP: 「それでも、お風呂なら一緒に入れた。\nおねえちゃんが誘いさえすれば、絶対に」
1091 = "「Dù vậy, nếu là tắm chung thì vẫn được mà. Chỉ cần chị mở lời rủ, thì chắc chắn là được」"
# monologue
# JP: 僕をなでてた手が止まり、\n膝の上、れいなの上にも戻りきらず――
1764 = "Bàn tay đang vuốt ve tôi dừng lại, cũng không quay về phía Reina đang ngủ trên đùi——"
# 【真闇】
# display as 真闇
# JP: 「あ。……双ちゃん」
1160 = "「A. ……Sou-chan」"
# monologue
# JP: ――行き場を失くしたように思えて、\nだからしっかり、僕自身の手でつかまえる。
657 = "——Cảm giác như bàn tay ấy đã mất đi nơi nương tựa, nên tôi nắm chặt lấy nó bằng chính đôi tay mình."
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたかったのに叶わなかったのなら。\n『しなかった』ではなく『できなかった』だ。絶対に」
1248 = "「Nếu chị muốn làm mà không thành hiện thực. Thì không phải là 『Không làm』 mà là 『Không thể làm』. Chắc chắn là vậy」"
# 【真闇】
# display as 真闇
# JP: 「…………。そぎゃん、なのかなぁ」
702 = "「…………Vậy, sao」"
# monologue
# JP: 真闇姉が力を抜いて、僕にもたれかかってくる。\n伝わってくるぬくもりに、小さな声が重なり響く。。
1840 = "Chị Mayami thả lỏng cơ thể, tựa hẳn vào người tôi. Hòa cùng hơi ấm truyền sang, một giọng nói nhỏ nhẹ vang lên."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんにね？　蔵のこと……嫌いゆーか、\n怖いよーに思わせちゃったの、おねえちゃんなの」
1268 = "「Hii-chan á? Việc con bé ghét xưởng rượu……hay đúng hơn là, việc con bé cảm thấy sợ hãi, đều là do chị cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
705 = "「……」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんね？　蔵が大好きだったけん、描いてくれて。\nそいば見たら――見ちゃったら。『ああ』ってなって」
1272 = "「Hii-chan nhé? Rất thích xưởng rượu, nên đã vẽ nó cho chị xem. Khi chị nhìn thấy nó——khi lỡ nhìn thấy nó. Chị đã 『À』 lên một tiếng」"
# 【双鉄】
# display as 雙鐵
# JP: 「こころを動かされたのか」
1093 = "「Bị lay động tâm can sao」"
# 【真闇】
# display as 真闇
# JP: 「うん。で、ひーちゃんは蔵に生きたらいけんって……\n感動みたいな気持ちで、舞い上がったみたいになって」
1177 = "「Ừ. Rồi, chị nghĩ không thể để Hii-chan sống mòn ở xưởng rượu được…… Một cảm xúc giống như sự cảm động, khiến chị như bay bổng lên」"
# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな。\n日々姫の才は、そういう才だと僕も感じる」
717 = "「……Chắc là vậy. Tài năng của Hibiki, anh cũng cảm thấy đó là một tài năng như vậy」"
# monologue
# JP: こころを閉ざしていた僕に、赤の赤さを焼き付けた。\n稀咲のような現実主義者さえ、日々姫の才に魅せられた。
1696 = "Khắc sâu màu đỏ rực rỡ vào trái tim đã khép kín của tôi. Ngay cả một người thực tế như Kisaki, cũng bị tài năng của Hibiki mê hoặc."
# 【真闇】
# display as 真闇
# JP: 「『そういう才』。まっこと、そぎゃんね。\nおねえちゃん、そんなんに触れたのはじめてで、つい」
697 = "「『Tài năng như vậy』. Thật sự, là vậy nhỉ. Chị, lần đầu tiên được tiếp xúc với thứ như thế, nên lỡ」"
# monologue
# JP: 真闇姉の手が僕の手に包まれたまま動こうとする。\nそっと解けば、再び静かに、れいなの髪が撫ぜられる。
1854 = "Bàn tay chị Mayami đang được tay tôi bao bọc chực cử động. Tôi nhẹ nhàng nới lỏng ra, bàn tay ấy lại lặng lẽ vuốt ve mái tóc Reina."
# 【真闇】
# display as 真闇
# JP: 「――蔵ばひーちゃんに向いてないって、\nひーちゃんの生きる場所じゃないって」
687 = "「——Rằng xưởng rượu không hợp với Hii-chan, đó không phải là nơi để Hii-chan sống」"
# monologue
# JP: 舞い上がって、つい口走ってしまったのであろうか。\n真闇姉の言葉の続きを、けれど促すこともできない。
1755 = "Có lẽ vì quá phấn khích, nên chị ấy đã lỡ buột miệng thốt ra. Nhưng tôi không thể hối thúc chị Mayami nói tiếp được."
# 【真闇】
# display as 真闇
# JP: 「……ばってん、すぐに後悔するようになったとよ。\nそいばおねえちゃんが押し付けちゃいけんかったって」
720 = "「……Nhưng mà, chị lập tức hối hận ngay. Rằng chị không được phép áp đặt điều đó lên con bé」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
688 = "「——Ừ」"
# monologue
# JP: 誰もが認める仲良し姉妹。\nけれどもどこか、なにか一枚、挟まる、破れぬ薄紙は――
1631 = "Hai chị em thân thiết ai cũng công nhận. Nhưng đâu đó, vẫn có một lớp giấy mỏng manh ngăn cách không thể xé rách——"
# 【双鉄】
# display as 雙鐵
# JP: 「その後悔が、真闇姉をずっと縛ってしまっていたのか」
1286 = "「Sự hối hận đó, đã trói buộc chị Mayami suốt thời gian qua sao」"
# monologue
# JP: 気づかぬほどに小さな動き。\n真闇姉は、けれどはっきり頷いた。
1643 = "Một cử động nhỏ đến mức khó nhận ra. Nhưng chị Mayami đã gật đầu một cách rõ ràng."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんは、誰より高こぉまで飛べる鳥やけん」
1274 = "「Hii-chan, là chú chim có thể bay cao hơn bất kỳ ai mà」"
# monologue
# JP: 切なそうで、愛おしそうで。\n真闇姉と日々姫の絆を、逆説的に強く感じる。
1860 = "Trông thật đau xót, lại đầy yêu thương. Một cách nghịch lý, tôi cảm nhận được mối liên kết bền chặt giữa chị Mayami và Hibiki."
# 【真闇】
# display as 真闇
# JP: 「蔵いう鳥籠ば入ってきても、入り口を塞がんどけば……\nただそれだけで、きっと勝手にまた飛んだのに――」
1288 = "「Dù có bước vào chiếc lồng chim mang tên xưởng rượu, thì nếu cứ bịt kín lối vào…… Chỉ cần vậy thôi, chắc chắn con bé sẽ tự mình bay đi mất——」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは確かにそうかもしれん。\nが、鳥籠から日々姫は飛び立たなかったかもとも感じる」
1526 = "「Điều đó đúng là có thể xảy ra. Nhưng, anh cũng cảm thấy Hibiki có thể đã không bay khỏi lồng chim」"
# 【真闇】
# display as 真闇
# JP: 「え？」
1152 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は極めて義理がたい。そのうえ一途だ。\n蔵での暮らしを覚えたのなら、自ら籠もったかもしれん」
1351 = "「Hibiki là người cực kỳ trọng tình nghĩa. Đã thế lại còn một lòng một dạ. Nếu đã quen với cuộc sống ở xưởng rượu, có khi em ấy sẽ tự nhốt mình lại cũng nên」"
# 【真闇】
# display as 真闇
# JP: 「…………」
699 = "「…………」"
# monologue
# JP: れいなを撫ぜてる手が止まって。\nゆえに僕も言葉を止める。説得したいわけでもないので。
1690 = "Bàn tay đang vuốt ve Reina dừng lại. Nên tôi cũng ngừng lời. Vì tôi cũng chẳng có ý định thuyết phục chị ấy."
# 【真闇】
# display as 真闇
# JP: 「……うん。確かにそうなっちゃったかもしれんよね。\nばってん、そぎゃんならんかったかもしれん」
724 = "「……Ừ. Đúng là có thể sẽ thành ra như vậy. Nhưng mà, cũng có thể sẽ không phải vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「解らんよな。過去のことで、仮定の話だ。\n正解などは、例え日々姫本人に聞いても解るわけがない」
1486 = "「Chịu thôi. Chuyện quá khứ mà, chỉ là giả định. Đáp án chính xác, dù có hỏi chính Hibiki thì em ấy cũng làm sao mà biết được」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 1178 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今の日々姫のことならわかる。\n実に生き生き、仕事を日々を、楽しんでいる日々姫なら」
1069 = "「Nhưng, Hibiki của hiện tại thì biết. Nếu là Hibiki đang sống rất sôi nổi, tận hưởng công việc mỗi ngày」"
# monologue
# JP: 真闇姉がふと瞳を閉じる。\nなにかを思い出すかのように。
1845 = "Chị Mayami khẽ nhắm mắt lại. Như thể đang nhớ lại điều gì đó."
# 【真闇】
# display as 真闇
# JP: 「――そぎゃんね。おねえちゃんも眩しいみたいに感じた。\nひーちゃんのこと、あの列車ばみて」
689 = "「——Đúng vậy nhỉ. Chị cũng cảm thấy chói lóa. Hii-chan, nhìn chuyến tàu đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。眩しいな。今の日々姫は自由であるゆえ。\n望む通りに飛び回り、誰より強い翼を羽ばたかせている」
1201 = "「Ừm. Chói lóa thật. Vì Hibiki của hiện tại rất tự do. Bay lượn theo ý muốn, vỗ đôi cánh mạnh mẽ hơn bất kỳ ai」"
# 【真闇】
# display as 真闇
# JP: 「ああ……うん。まっことそぎゃんね」
1364 = "「A……ừ. Đúng là vậy thật」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば全てが日々姫を幸せにするために寄与したのだ。\n寂しい思いも、孤独の辛さも、理解されない苦しさも」
1519 = "「Vậy thì tất cả đều đã góp phần mang lại hạnh phúc cho Hibiki. Cả những nỗi buồn, sự cay đắng của cô đơn, hay nỗi đau không được thấu hiểu」"
# 【真闇】
# display as 真闇
# JP: 「…………」
# 699 = "「…………」" 
# monologue
# JP: ほうっと、息。\nため息、とまどい、あるいは安堵も混じったような。
1705 = "Phù, một hơi thở hắt ra. Như thể lẫn lộn giữa tiếng thở dài, sự bối rối, hay cả sự an tâm."
# 【真闇】
# display as 真闇
# JP: 「そぎゃん……かな。\nそぎゃんならおねーちゃん、救われるけど」
1359 = "「Là vậy……sao. Nếu được vậy thì chị, cũng được cứu rỗi rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからん。僕は日々姫ではない。ただ僕自身の経験を、\n日々姫の上の投影してみているだけにすぎない」
1322 = "「Anh không biết. Anh không phải là Hibiki. Chỉ là anh đang thử phóng chiếu kinh nghiệm của chính mình lên Hibiki mà thôi」"
# 【真闇】
# display as 真闇
# JP: 「あ」
# 1161 = "「啊」" 
# monologue
# JP: ……真闇姉は聡明だ。その上僕を愛してくれてる。\nもう完全に伝わったのだと、実感できる。
678 = "……Chị Mayami rất thông minh. Hơn nữa chị ấy còn yêu tôi. Tôi có thể cảm nhận được rằng, điều đó đã hoàn toàn được truyền đạt."
# 【双鉄】
# display as 雙鐵
# JP: 「路子にやさしくできなかったことも。事故のことも。\n全てを恨み、憎しみだけで自らを支えていたあの日々も」
683 = "「Cả việc không thể dịu dàng với Michiko. Cả vụ tai nạn. Cả những ngày tháng ôm hận mọi thứ, chỉ dùng sự căm ghét để chống đỡ bản thân」"
# monologue
# JP: それでも言わずにはいられない。\nどれほど自明であろうとも、言葉で伝えずにはいられない。
1644 = "Dù vậy tôi vẫn không thể không nói ra. Dù có rõ ràng đến đâu, tôi cũng không thể không dùng lời nói để truyền đạt."
# 【双鉄】
# display as 雙鐵
# JP: 「すべてが今、真闇姉とこうしている時間のためには、\n必要不可欠だったのだと思う。ゆえに、僕はしあわせだ」
1499 = "「Tất cả những điều đó, đối với khoảng thời gian được ở bên chị Mayami lúc này, anh nghĩ là điều không thể thiếu. Vì vậy, anh đang rất hạnh phúc」"
# monologue
# JP: その上で強く[こいねが]希う。\n他の誰より真闇姉が、ただしあわせであって欲しいと。
1777 = "Hơn thế nữa, tôi khao khát mãnh liệt. Mong muốn chị Mayami được hạnh phúc hơn bất kỳ ai khác."
# 【双鉄】
# display as 雙鐵
# JP: 「愛している、真闇姉。\nそうして、深く――深く深く深く感謝している」
1331 = "「Anh yêu em, chị Mayami. Và, anh vô cùng——vô cùng vô cùng vô cùng biết ơn em」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
1275 = "「Sou-chan……」"
# 【双鉄】
# display as 雙鐵
# JP: 「言葉などではとても足りない。\n僕の時間の全てを捧げ、なお足り得るのかわからない」
1471 = "「Lời nói là không bao giờ đủ. Dù có dâng hiến toàn bộ thời gian của mình, anh cũng không biết có đủ hay không」"
# 【れいな】
# display as 玲奈
# JP: 「ふにゃあ」
1173 = "「Funyaa」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1121 = "「!!!!」"
# monologue
# JP: れいなが軽く身じろぎし、世界がうわっと戻ってくる。\nああ、そうだ。ここは車内――公共の場所だったのだ。
1802 = "Reina khẽ cựa mình, kéo thế giới ùa về thực tại. À, đúng rồi. Đây là trên tàu——một nơi công cộng cơ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。場もわきまえず――\nつい、夢中になってしまって」
1262 = "「Xin lỗi. Không phân biệt hoàn cảnh—— lại lỡ, say sưa quá mất rồi」"
# 【真闇】
# display as 真闇
# JP: 「すまんなんてこと全然なかと。\nおねえちゃん――おねえちゃん、嬉しくて」
1077 = "「Không có gì phải xin lỗi đâu.\nChị——chị, vui lắm」"
# monologue
# JP: ふっと、真闇姉の顔が寄せられる。
1721 = "Bất chợt, khuôn mặt chị Mayami ghé sát lại."
# 【真闇】
# display as 真闇
# JP: 「ここが列車じゃなかったら、\n双ちゃんをぎゅってしたいくらいに――嬉しかと」
1085 = "「Nếu đây không phải là trên tàu, chị đã ôm chầm lấy Sou-chan rồi——vui đến mức đó luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
1517 = "「Vậy thì」"
# monologue
# JP: 手を繋ぐ。優しく固く。\nれいなの眠りを邪魔せぬように、中空で。
1736 = "Nắm lấy tay nhau. Thật dịu dàng và chặt chẽ. Giữ lơ lửng giữa không trung, để không làm phiền giấc ngủ của Reina."
# 【れいな】
# display as 玲奈
# JP: 「んみゅ……ん……あ……\nふわあああああああぁ」
1157 = "「Nmyu……n……a……\nFuwaaaaaaaa」"
# monologue
# JP: ぶるりと震えて、体が伸びる。\nレイルロオドは人のようだと、今更ながら感じてしまう。
1804 = "Khẽ rùng mình, cơ thể vươn vai. Đến giờ tôi mới cảm nhận được, Railord quả thật rất giống con người."
# 【れいな】
# display as 玲奈
# JP: 「ふあっ！？　あ！？　わあ、れいな寝ちゃって！？\nごめんなさい、ガイド、れいな途中なのに」
1470 = "「Fua!? A!? Waa, Reina ngủ quên mất rồi!? Xin lỗi ạ, rõ ràng Reina đang làm hướng dẫn viên mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、すばらしいガイドをしてくれた。\nれいなのおかげで、僕は魅力を再確認できた」
1379 = "「Không đâu, em đã làm hướng dẫn viên rất tuyệt vời. Nhờ có Reina, anh đã có thể một lần nữa cảm nhận sâu sắc sức hấp dẫn đó」"
# monologue
# JP: もぞもぞと体を起こすれいなを待って、\n頭を下げて感謝する。
1870 = "Chờ Reina cựa quậy ngồi dậy,\ntôi cúi đầu cảm ơn."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市の魅力はもちろん、真闇姉の魅力についても」
1044 = "「Tất nhiên là sức hấp dẫn của thành phố Ohimitera, và cả sức hấp dẫn của chị Mayami nữa」"
# monologue
# JP: がたんごとんと列車は進む。\nれいなと別れ僕らの下りる鱈木廃駅は、もう間もなくだ。
1654 = "Chuyến tàu xình xịch tiến về phía trước. Chẳng mấy chốc nữa là đến ga bỏ hoang Taragi, nơi chúng tôi sẽ chia tay Reina và xuống tàu."
# 【双鉄】
# display as 雙鐵
# JP: 「れいながガイドしてくれたから、\n僕は、あらためて深く実感できたのだ」
1375 = "「Vì có Reina làm hướng dẫn viên, nên anh mới có thể cảm nhận sâu sắc đến vậy」"
# 【真闇】
# display as 真闇
# JP: 「わ！　二段ベッド」
1140 = "「Oa! Giường tầng」"
# monologue
# JP: 言うやいなやで真闇姉が下段ベッドに座るゆえ、\n僕も並んで腰掛ける。
1674 = "Nói đoạn, chị Mayami ngồi xuống giường dưới, nên tôi cũng ngồi xuống bên cạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「[かいほうがた,2]開放型B寝台というらしい。\n本来は四人まで宿泊可能だが、今日は僕らで独占だ」
1487 = "「Nghe nói là giường ngủ loại B mở. Vốn dĩ có thể chứa đến 4 người, nhưng hôm nay là của riêng chúng ta」"
# 【真闇】
# display as 真闇
# JP: 「んふふ、新婚旅行やもんねぇ」
1182 = "「Ưm fufu, là tuần trăng mật mà lị」"
# monologue
# JP: 一瞬ドキリとさせられるけれど、真闇姉の笑みは穏やかだ。
1645 = "Dù khiến tôi giật thót một phen, nhưng nụ cười của chị Mayami vẫn rất đỗi dịu dàng."
# 【真闇】
# display as 真闇
# JP: 「二段ベッド。うちにもあったと。\nむかしむかし。双ちゃんが来てくれるより、もっと前」
1527 = "「Giường tầng. Nhà mình cũng từng có đó. Ngày xửa ngày xưa. Từ trước cả khi Sou-chan đến nhà mình nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。真闇姉と日々姫で使っていたのか？」
1214 = "「Hô. Chị Mayami và Hibiki dùng sao?」"
# 【真闇】
# display as 真闇
# JP: 「うん。ひーちゃんが珍しくおねだりしてね。\nマンガで見たかなんかで、憧れちゃって」
1192 = "「Ừ. Hii-chan hiếm khi vòi vĩnh lắm nha. Chắc là xem trên truyện tranh hay gì đó, nên thích mê luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「それほど小さなころから、\n日々姫はマンガ好きだったのか」
1239 = "「Từ lúc nhỏ xíu thế, Hibiki đã thích truyện tranh rồi sao?」"
# 【真闇】
# display as 真闇
# JP: 「マンガも絵本も、図鑑なんかも。\n絵ば描いてある本なら、なんでも好きよ。いまも」
1047 = "「Cả truyện tranh, sách tranh, hay từ điển hình ảnh. Chỉ cần là sách có vẽ hình, thì cái gì cũng thích. Bây giờ cũng vậy」"
# monologue
# JP: 断言だ。うれしくなる。\n姉妹の絆はやはり、僕などには計り知れぬ強さと感じ。
1692 = "Lời khẳng định chắc nịch. Khiến tôi thấy vui lây. Mối liên kết của hai chị em quả nhiên, mạnh mẽ đến mức người như tôi không thể đong đếm được."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん……そのころは甘え上手だったけん。\n父さんすぐに買うてくれてね」
1271 = "「Hii-chan……hồi đó giỏi làm nũng lắm. Nên bố mua cho ngay lập tức」"
# 【双鉄】
# display as 雙鐵
# JP: 「どちらの部屋にだ？」
1342 = "「Đặt ở phòng nào vậy?」"
# 【真闇】
# display as 真闇
# JP: 「そのころはまだひーちゃんのお部屋なかったの。\nおねえちゃんと一緒のこどもべや」
1515 = "「Hồi đó Hii-chan vẫn chưa có phòng riêng. Ở chung phòng trẻ em với chị」"
# monologue
# JP: ……どんな部屋だったか気になってくる。\n帰宅したら、アルバムを見せてもらうとしよう。
681 = "……Bắt đầu tò mò không biết đó là căn phòng như thế nào rồi. Khi nào về nhà, phải xin xem album ảnh mới được."
# 【真闇】
# display as 真闇
# JP: 「そのころからひーちゃんはひーちゃんやけん、ベッド、\n『これがよか！』って、モダンなデザインの選んで」
1514 = "「Từ hồi đó Hii-chan đã là Hii-chan rồi, cái giường á, 『Cái này đẹp nè!』 con bé chọn một thiết kế rất hiện đại」"
# 【双鉄】
# display as 雙鐵
# JP: 「モダンときたか。\nいやはや、なんとも日々姫だな」
1340 = "「Hiện đại cơ à.\nChà chà, đúng là Hibiki thật đấy」"
# 【真闇】
# display as 真闇
# JP: 「んふふっ、そうね。あのこの趣味ばずーっと変わらん。\n日常そのものの顔して、ちょこっとだけおしゃれいうか」
1132 = "「Ưm fufu, đúng vậy. Sở thích của đứa trẻ đó không hề thay đổi. Khuôn mặt vẫn là của thường ngày, chỉ là thêm chút xíu điệu đà thôi」"
# monologue
# JP: れいなと一緒にいたときも、なんども見せた表情だ。\nつつみこむようで、あまく、とてもやわらかな。
1688 = "Khi ở cùng Reina, tôi cũng đã thấy biểu cảm này không biết bao nhiêu lần. Như đang bao bọc lấy, ngọt ngào, và vô cùng mềm mại."
# 【真闇】
# display as 真闇
# JP: 「そんベッドでね？　最初の晩はひーちゃんが上で。\nすぐに『たかくてこわかー』って入れかわって」
1506 = "「Cái giường đó nhé? Đêm đầu tiên Hii-chan nằm tầng trên. Nhưng ngay lập tức 『Cao quá sợ quá~』 thế là đổi chỗ」"
# 【双鉄】
# display as 雙鐵
# JP: 「こどもらしいな」
1431 = "「Đúng là trẻ con nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「こどもやもん。やけんね？　馴染むのもすぐで、\nまたひーちゃんが上の段ば寝るようになって」
1061 = "「Thì là trẻ con mà. Nhưng mà nhé? Cũng quen nhanh lắm, rồi Hii-chan lại lên tầng trên ngủ」"
# monologue
# JP: ぽかぽかしてくる。\n空調ではなく、真闇姉のむかしがたりの温もりで。
1747 = "Cảm giác ấm áp lan tỏa. Không phải do điều hòa, mà là hơi ấm từ câu chuyện ngày xưa của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「あの頃からもう、しゃっしゃ、かりかりって、\n上の段からよーお聞こえてきとったの」
1304 = "「Từ hồi đó là đã, sột soạt, sột soạt, nghe thấy tiếng vọng xuống từ tầng trên rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「描いていたのか」
1233 = "「Em ấy đang vẽ sao?」"
# 【真闇】
# display as 真闇
# JP: 「そ。ベッドから見えるお部屋の全部を。\nだけじゃなく……んふふっ、おねえちゃんの寝顔とかも」
1264 = "「Đúng. Toàn bộ căn phòng nhìn từ trên giường. Không chỉ thế đâu……ưm fufu, cả khuôn mặt lúc ngủ của chị nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。ぜひとも見てみたかったな」
1064 = "「Trời ạ. Nhất định anh phải xem mới được」"
# 【真闇】
# display as 真闇
# JP: 「よかよ？　おうちかえったら見せたげる。\nひーちゃんにナイショで、大事に大事にとってあるけん」
1116 = "「Được thôi? Về nhà chị sẽ cho xem. Chị giấu Hii-chan, cất giữ cẩn thận lắm đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはうれしい」
1502 = "「Thế thì vui quá」"
# 【真闇】
# display as 真闇
# JP: 「ばってん、そぎゃん時間ば、長くは続かんかったんよ」
1071 = "「Nhưng mà, khoảng thời gian đó, không kéo dài được lâu」"
# monologue
# JP: 真闇姉の声のトーンは、ほんの少しも変わらない。\nただただ懐かしいむかしがたりをのんびりしている。
1857 = "Tông giọng của chị Mayami không hề thay đổi một chút nào. Chỉ đơn thuần là đang thong thả kể lại một câu chuyện hoài niệm."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、ひーちゃんを追い出しちゃたから」
1222 = "「Bởi vì chị, đã đuổi Hii-chan đi mất rồi」"
# monologue
# JP: なのに、僕が焦ってしまう。
1790 = "Vậy mà, tôi lại thấy sốt ruột."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、その話であれば」
1052 = "「Không, nếu là chuyện đó thì」"
# 【真闇】
# display as 真闇
# JP: 「うん。わかっとー。そぎゃん時間も、全部がいまの、\n素敵なひーちゃんに繋がった」
1195 = "「Ừ. Chị biết mà. Khoảng thời gian đó, tất cả đã dẫn đến, Hii-chan tuyệt vời của hiện tại」"
# monologue
# JP: 伝わっている。きちんと受け止めてくれている。\n感じた瞬間、僕まで救われたような気持ちになる。
1693 = "Chị ấy đã hiểu. Chị ấy đã đón nhận nó một cách trọn vẹn. Khoảnh khắc cảm nhận được điều đó, tôi có cảm giác như chính mình cũng được cứu rỗi."
# 【真闇】
# display as 真闇
# JP: 「ありがと、双ちゃん。双ちゃんがいうてくれたから、\nおねーちゃん、気持ち本当に楽になったと」
1276 = "「Cảm ơn em, Sou-chan. Nhờ Sou-chan đã nói vậy, mà chị, thực sự cảm thấy nhẹ nhõm hơn rất nhiều」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
1081 = "\"「Vậy thì tốt quá.」\""
# monologue
# JP: 安心すれば、どっと疲れがわいてくる。\n僕らも今日は、一日動いて、ずっとはしゃいでいたゆえに。
1727 = "Vừa an tâm một cái là bao nhiêu mệt mỏi lập tức ùa về. Bọn em hôm nay cũng đã vận động cả ngày, lại còn liên tục đùa giỡn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「で、今の真闇姉は、どちらの寝台がお好みだ？」
1522 = "\"「Thế, chị Mayami bây giờ thích giường nào hơn?」\""
# monologue
# JP: ふたりくっついて寝たくもあるが、\nそうするにはあまりに狭すぎる。
1907 = "Em cũng muốn hai đứa nằm ngủ ôm nhau, nhưng giường này quá chật để làm thế."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんはどっちでも良かよ？\n双ちゃんに好きな方ば選んでもらえた方が嬉しか」
1320 = "\"「Chị nằm giường nào cũng được. Sou-chan chọn giường em thích thì chị sẽ vui hơn.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。であれば僕は上段におさまろう」
1490 = "\"「Vậy sao. Nếu vậy thì em sẽ nằm tầng trên.」\""
# 【真闇】
# display as 真闇
# JP: 「んふふっ、よかね。男の子って感じ」
1127 = "\"「Ưm fufu, được đấy. Đúng kiểu con trai nhỉ.」\""
# monologue
# JP: 声はどこまでもまろやかだ――いや、というか、\n真闇姉にも、眠気が混じって来ているのやもしれん。
1702 = "Giọng nói vô cùng êm ái——à không, nói đúng hơn là, có lẽ chị Mayami cũng đang buồn ngủ rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「疲れたろう。ぎゅうぎゅう詰めのスケジュールだったし、\nずっとれいなの面倒を見てくれていたしな」
1449 = "\"「Chị mệt rồi đúng không. Lịch trình hôm nay kín mít, lại còn phải chăm sóc Reina suốt nữa.」\""
# 【真闇】
# display as 真闇
# JP: 「面倒を見るだなんてとんでもなかとよ。\nおねえちゃん、たくさん遊んでもらっちゃったけん」
1312 = "\"「Chăm sóc gì đâu chứ. Chị đã được con bé chơi cùng rất nhiều mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「遊んでもらったか、それはいいな」
1373 = "\"「Được chơi cùng à, nghe hay đấy.」\""
# monologue
# JP: いってふと、\nあながちそれが冗談でないかもとも思ってしまう。
1891 = "Nói rồi em chợt nghĩ,\nchưa chắc đó đã là lời nói đùa."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、\n確かにれいなは、僕らよりずうっと年上だしな」
1056 = "\"「À không, đúng là Reina lớn tuổi hơn chúng ta rất nhiều mà.」\""
# 【真闇】
# display as 真闇
# JP: 「あ、そぎゃんゆーときあるよね、たまに。\nれーちゃんのこと、双ちゃん、すっごく大人だって」
1169 = "\"「A, thỉnh thoảng Sou-chan cũng nói thế nhỉ. Rằng Rei-chan rất người lớn.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「時折りだがな。ハチロクよりも大人な面さえみせる。\nしかし、今日のれいなに限っていえば……」
1111 = "\"「Chỉ thỉnh thoảng thôi. Thậm chí có những lúc em ấy còn tỏ ra người lớn hơn cả Hachiroku. Nhưng mà, nếu chỉ nói riêng Reina của ngày hôm nay thì……」\""
# monologue
# JP: 思い返せば思い返すほど、印象は一色にまとまっていく。
1742 = "Càng ngẫm nghĩ lại, ấn tượng của em càng gom lại thành một màu duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「あどけないと言いたくなるほどはしゃいでいたな。\nれいなも、真闇姉と――僕らと遊んでいたのかもだな」
1228 = "\"「Nhí nhảnh đến mức em muốn dùng từ ngây thơ để miêu tả luôn. Có lẽ Reina cũng đã chơi đùa cùng chị Mayami——cùng chúng ta đấy.」\""
# 【真闇】
# display as 真闇
# JP: 「んふふっ、れーちゃん、\nおねえちゃんにあわせてくれとったんかも」
1128 = "\"「Ưm fufu, có khi Rei-chan đã nương theo chị cũng nên.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「それはなかろう。あわせるのであれば、むしろきっちり、\nいわば型どおりのガイドをれいなのペースで務めた筈だ」
1311 = "\"「Không có chuyện đó đâu. Nếu là nương theo thì em ấy phải làm một hướng dẫn viên bài bản theo đúng nhịp độ của mình mới đúng.」\""
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
1368 = "\"「Vậy sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのへんはのんびりとだがきちんとこなせる。\nゆえ――あわせたというか……引きずられたのかもな」
1203 = "\"「Ừm. Mấy việc đó em ấy làm tuy thong thả nhưng rất chu toàn. Thế nên——nói là nương theo thì……có lẽ là bị cuốn theo mới đúng.」\""
# 【真闇】
# display as 真闇
# JP: 「引きずられたって、なにに？」
1460 = "\"「Bị cuốn theo á, bởi cái gì?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、真闇姉にだ」
1516 = "\"「Đương nhiên là bởi chị Mayami rồi.」\""
# monologue
# JP: 言葉を出した瞬間に、\nそれでは足りぬと理解する。
1892 = "Khoảnh khắc thốt ra những lời đó, em nhận ra như thế vẫn chưa đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「より正確には、真闇姉の母性にだろう」
1393 = "\"「Nói chính xác hơn là, bởi tình mẫu tử của chị Mayami.」\""
# monologue
# JP: ふっと、息が飲まれる音。\n驚いたのか、照れたのだろうか。
1850 = "Một tiếng nuốt nước bọt khẽ vang lên. Là do ngạc nhiên, hay do xấu hổ đây."
# 【真闇】
# display as 真闇
# JP: 「母性。って、おねえちゃんにそぎゃんもの」
1378 = "\"「Tình mẫu tử. Chị làm gì có thứ đó chứ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あるに決まっている。母性という言葉で過剰なら……\nそうだな、『おねえちゃんらしさ』とでも言えばいいか」
1425 = "\"「Chắc chắn là có. Nếu dùng từ tình mẫu tử nghe hơi quá thì…… Để xem nào, gọi là 『Sự ra dáng một người chị lớn』 cũng được.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ、それやったらもちろん。\nおねえちゃん、おねえちゃんやけん」
1172 = "\"「À, nếu là cái đó thì đương nhiên rồi. Vì chị, là chị mà lị.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1361 = "\"「Đúng vậy.」\""
# monologue
# JP: 日々姫の姉で、僕の義姉で――\nだけでなく、御一夜全体の姉であるような気さえする。
1768 = "Là chị gái của Hibiki, là chị nuôi của em—— Không chỉ vậy, em còn có cảm giác chị ấy như là chị lớn của cả Ohimitera này."
# 【双鉄】
# display as 雙鐵
# JP: 「確かにおねえちゃんだ、真闇姉は。\nれいなも――どころかハチロクさえも、甘えるほどに」
1079 = "\"「Chị Mayami quả thực là một người chị lớn. Đến mức Reina——thậm chí cả Hachiroku cũng muốn làm nũng.」\""
# 【真闇】
# display as 真闇
# JP: 「はーちゃんも家族やけんね。\n甘えてくれて――ゆーか、甘えあって同然でしょお」
1220 = "\"「Ha-chan cũng là gia đình mà. Việc con bé làm nũng——hay nói đúng hơn là làm nũng với nhau là chuyện đương nhiên mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「家族、か」
1255 = "\"「Gia đình, sao.」\""
# monologue
# JP: あらためてそう言われると、\n実に不思議な言葉というか、概念だなと感じてしまう。
1780 = "Được nghe lại từ đó, em chợt cảm thấy nó quả thực là một từ ngữ, hay đúng hơn là một khái niệm thật kỳ diệu."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなも家族だよな。\n血のつながりなどあろう筈もないけれど」
1392 = "\"「Paulette và Reina cũng là gia đình nhỉ. Dù giữa họ chẳng hề có chung huyết thống.」\""
# 【真闇】
# display as 真闇
# JP: 「そうね。今日のお話きいとって、\nおねーちゃんもそぎゃん感じたと」
1383 = "\"「Đúng vậy nhỉ. Nghe câu chuyện hôm nay, chị cũng cảm thấy như thế.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「お互いのことをおもいやりあい。\nおもいやりあうがゆえ、行き違ってしまう」
1231 = "\"「Hai người họ luôn quan tâm đến nhau. Nhưng cũng chính vì quan tâm nên mới sinh ra hiểu lầm.」\""
# 【真闇】
# display as 真闇
# JP: 「行き違っても、怒っても、嫌いになんてなれっこない。\n一番底のふかいとこでは、どうやったって許してる」
1092 = "\"「Dù có hiểu lầm, dù có tức giận, thì cũng không thể nào ghét nhau được. Từ tận sâu thẳm trong lòng, dù thế nào đi nữa họ cũng đã tha thứ cho nhau rồi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1178 = "「嗯」" 
# monologue
# JP: いまならようやく、僕も素直に頷ける。\n路子も父さんも母さんも、僕を許してくれていると。
1774 = "Đến bây giờ em mới có thể chân thành gật đầu đồng ý. Rằng Michiko, bố và mẹ, đều đã tha thứ cho em."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は一度、僕自身の愚かさゆえに家族を失い。\nけれど、家族を失うことで、新しい家族の一員となれた」
1333 = "\"「Em đã từng một lần đánh mất gia đình vì sự ngu ngốc của bản thân. Nhưng chính nhờ việc đánh mất gia đình đó, em mới trở thành một thành viên của gia đình mới.」\""
# 【真闇】
# display as 真闇
# JP: 「うん」
# 1178 = "「嗯」" 
# monologue
# JP: 真闇姉、日々姫、ハチロク、義父さん、義母さん。\n汰斗さんや、そこからつらなる数多の人たち。
1838 = "Chị Mayami, Hibiki, Hachiroku, bố nuôi, mẹ nuôi. Ông Taito, và vô số những người kết nối từ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「少しずつ少しずつ家族になって。\nその幸せな日々の中から、さらに大きな幸せを得た」
1135 = "\"「Từng chút, từng chút một trở thành gia đình. Từ trong những tháng ngày hạnh phúc đó, em lại có được một hạnh phúc to lớn hơn nữa.」\""
# monologue
# JP: じっと、真闇姉の顔を見る。\n幼いころから無意識に、憧れ続けてきた瞳を見つめる。
1754 = "Em nhìn chằm chằm vào khuôn mặt chị Mayami. Nhìn vào đôi mắt mà từ nhỏ em đã luôn khao khát một cách vô thức."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉と結ばれて、結婚できて。\nそうしたらまた、僕の『家族』はふわふわしてきた」
1302 = "\"「Được gắn kết với chị Mayami, được kết hôn với chị. Từ đó, 『Gia đình』 của em lại bắt đầu bồng bềnh lên.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ！　わかると、ふわふわ！\nうん――ふわふわね。まだ落ち着かんとこあるとよね」
1166 = "\"「A! Chị hiểu cảm giác đó, bồng bềnh! Ừm——bồng bềnh nhỉ. Vẫn còn chỗ nào đó chưa thực sự ổn định.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな。元の家族はそのまま変わっていないのに、\nけれども少し、関係性が変化した」
1367 = "\"「Đúng vậy. Dù những thành viên trong gia đình ban đầu không hề thay đổi, nhưng mối quan hệ giữa chúng ta đã có chút khác biệt.」\""
# monologue
# JP: 例えばハチロクが、日々姫の部屋に引っ越して。\n日々姫が少し、真闇姉めいた姉らしさを発揮しはじめ。
1781 = "Chẳng hạn như việc Hachiroku chuyển sang phòng Hibiki. Hibiki bắt đầu thể hiện sự ra dáng người chị lớn giống như chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「変化ゆーか……成長よね？　きっと」
1474 = "\"「Thay đổi sao……là trưởng thành mới đúng chứ? Chắc chắn là vậy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だなぁ。成長だ。まことに」
1189 = "\"「À, đúng rồi nhỉ. Là trưởng thành. Thực sự là vậy.」\""
# monologue
# JP: 自身の部屋を思い出す。\nその変遷に、つかの間思いを馳せたことに。
1743 = "Em nhớ lại căn phòng của chính mình. Và thoáng nghĩ về những thăng trầm của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「家族は変化し。変化して成長するのだな」
1256 = "\"「Gia đình luôn thay đổi. Và trưởng thành qua những thay đổi đó.」\""
# 【真闇】
# display as 真闇
# JP: 「そぎゃんね、きっと」
1038 = "\"「Chắc chắn là vậy rồi.」\""
# monologue
# JP: 列車の中だと、旅の途中だと強く感じる。\nこのB寝台客車はもう、レールを走りはしないけれども。
1673 = "Em cảm nhận sâu sắc rằng mình đang ở trên một chuyến tàu, đang trên một hành trình. Dù toa giường nằm hạng B này đã không còn lăn bánh trên đường ray nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの家族は、これからどうなっていくのかな」
1328 = "\"「Gia đình của chúng ta, từ nay sẽ trở nên như thế nào nhỉ.」\""
# 【真闇】
# display as 真闇
# JP: 「なっていくなんて、心細かと。\n双ちゃんのしたいように育ててくれんと」
1083 = "\"「Trở nên như thế nào á, nghe tủi thân thế. Phải nuôi dưỡng nó theo cách mà Sou-chan muốn chứ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕が――僕らが、\n僕らの家族を、僕らの家庭を育てていくのか」
1058 = "\"「Ra là vậy, em——chúng ta, sẽ nuôi dưỡng gia đình của chúng ta, tổ ấm của chúng ta sao.」\""
# monologue
# JP: 一度失ったものゆえに、その尊さを、\n僕は恐らく、いくらかは理解できている。
1778 = "Vì đã từng một lần đánh mất, nên em có lẽ cũng hiểu được phần nào sự quý giá của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「行きたい場所に。なりたい形に」
1104 = "\"「Đến nơi mà chúng ta muốn đến. Trở thành hình dáng mà chúng ta mong muốn.」\""
# 【真闇】
# display as 真闇
# JP: 「うん。双ちゃんとおねえちゃんと、みんなとで」
1199 = "\"「Ừm. Sou-chan, chị và mọi người cùng nhau làm điều đó.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫のレールもハチロクのレールも、\nいずれどこかのポイントで、分岐するのかもしれないが」
1348 = "\"「Dù đường ray của Hibiki hay đường ray của Hachiroku, biết đâu đến một lúc nào đó sẽ phải rẽ sang một hướng khác.」\""
# monologue
# JP: 手をにぎる。\nそのまま静かに――誓いの、祈りの――キスをする。
1750 = "Em nắm lấy tay chị. Cứ thế lặng lẽ——trao một nụ hôn của lời thề, của sự cầu nguyện."
# 【双鉄】
# display as 雙鐵
# JP: 「願わくば、僕の旅路の最後まで。\n真闇姉――一緒に旅をしてほしい」
1114 = "\"「Chỉ mong rằng, cho đến tận cuối hành trình của em. Chị Mayami——hãy cùng em đi hết chuyến đi này.」\""
# 【真闇】
# display as 真闇
# JP: 「うん。おねえちゃんの旅の最後まで。\n双ちゃん、一緒に歩いてね？」
1174 = "\"「Ừm. Cho đến tận cuối hành trình của chị. Sou-chan, hãy cùng chị bước tiếp nhé?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1423 = "\"「Đương nhiên rồi.」\""
# monologue
# JP: そうして僕らの列車は進む。
1735 = "Và thế là, chuyến tàu của chúng em tiếp tục lăn bánh."
# monologue
# JP: 終着駅は――\nきっとまだまだ、ずうっと先だ。
1909 = "Ga cuối cùng—— chắc chắn vẫn còn ở một nơi rất xa, rất xa nữa."
