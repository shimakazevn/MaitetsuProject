1049 = "「不行，玲奈的手搆不到後面，所以希望你幫玲奈洗——啊！」" 

# monologue
# JP: うふふぅ、と、幸せに満ち満ちた笑い声。
1714 = "從邊上傳來和呵呵呵這樣的滿溢幸福的笑聲。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、洗いっこがしたいです！\nまくらさんのお背中、れいなが洗ってもいいですかぁ？」
1416 = "「玲奈，想和人互相擦背！真闇小姐的後背，可以讓玲奈幫忙洗嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ、ありがと。もちろん大歓迎。\nね？　双ちゃんもどう？　洗いっこ」
1146 = "「哎呀，謝謝你，當然可以了。小雙，你呢？要一起互相擦背嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　僕もか」
1204 = "「嗯？我也來？」" 

# 【れいな】
# display as 玲奈
