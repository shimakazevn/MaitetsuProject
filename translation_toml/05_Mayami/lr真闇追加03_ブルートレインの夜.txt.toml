1842 = "真闇姐和玲奈的互動，卻一直都是悠閒又和緩的，甚至可以說讓人心境平和。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら流すと。さん、にぃ、いち。ざばぁ」
1511 = "「那我要衝了，三、二、一。嘩啦」" 

