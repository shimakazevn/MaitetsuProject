1420 = "「玲奈，願意和姐姐說說嗎？為什麼你和她吵架了呀」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな……ただ、\nポーレットにちゃんとごはん食べてほしくって」
1404 = "「玲奈只是……只是希望波萊特她好好吃飯而已」" 

# 【真闇】
# display as 真闇
