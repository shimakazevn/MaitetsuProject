[script]
# lines: 553 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3574 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1537 = "\"「——À.」\""
# monologue
# JP: ……ゆっくり、目覚める。\n目覚めた先が、夢の中だとわかった上で。
1529 = "......Chậm rãi, thức giấc.\nTrong khi vẫn biết rõ nơi mình vừa thức giấc, là ở trong một giấc mơ."
# monologue
# JP: この音だけは、いつでも確かだ。\n路子の夢に、僕はまた、帰ってこれたと教えてくれる。
3096 = "Chỉ có âm thanh này là luôn chân thực.\nNó báo cho anh biết rằng, anh lại một lần nữa, trở về trong giấc mơ của Michiko."
# 【路子】
# display as 路子
# JP: 「そーちゃん、起きた？」
2462 = "\"「Sou-chan, anh dậy rồi à?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん。おはよう、路子。\nなんだか、とても久しぶりなような気がするな」
2307 = "\"「Ừm. Chào buổi sáng, Michiko.\nCảm giác như đã lâu lắm rồi ấy nhỉ.」\""
# 【路子】
# display as 路子
# JP: 「そうかな？　そうかも。みち、わかんない。\nこのれっ車、だって、いっつも同じだから」
2587 = "\"「Vậy sao? Chắc là vậy. Michi, không biết nữa.\nVì chuyến tàu này, lúc nào cũng giống nhau mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのか」
2604 = "\"「Vậy......sao.」\""
# monologue
# JP: ならば、父さんと母さんはまだ、\nこの列車を見つけ出すことができずに、探している。
3536 = "Nếu vậy thì, bố và mẹ vẫn\nđang tìm kiếm, vẫn chưa thể tìm thấy chuyến tàu này."
# monologue
# JP: ――後東氏の経営参加により、『日ノ本鉄路』は、\nこの上ない滑り出しを見せ、盛んに報道されたというのに。
3326 = "——Sự tham gia quản lý của ông Gotou đã giúp cho 『Đường sắt Hinomoto』\ncó một khởi đầu không thể tuyệt vời hơn, và được báo chí đưa tin rầm rộ cơ mà."
# monologue
# JP: （いや……幽霊なり亡霊なり、は――\n報道などを、確かめることができないものか？）
3569 = "（Không......ma quỷ hay vong hồn thì——\nlàm sao có thể xem được tin tức báo chí chứ?）"
# monologue
# JP: あるいは全てが、僕の深層心理の単なる働きであるのなら。\n『まだ足りない』と、どこかで思ってしまっているか――
3032 = "Hoặc nếu tất cả những điều này chỉ đơn thuần là hoạt động trong tiềm thức của anh.\nThì có lẽ ở đâu đó, anh vẫn nghĩ rằng 『Như vậy vẫn chưa đủ』 chăng——"
# 【路子】
# display as 路子
# JP: 「平気だよ？　そうちゃん」
2465 = "\"「Không sao đâu? Sou-chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なにがだ？」
2334 = "\"「Hửm? Gì cơ?」\""
# 【路子】
# display as 路子
# JP: 「そんなに、しんぱいそうな顔しなくても。\nれっ車の中は同じでも、まどから外を見てたら――」
2109 = "\"「Anh không cần phải làm vẻ mặt lo lắng thế đâu.\nDù bên trong tàu lúc nào cũng giống nhau, nhưng nếu nhìn ra ngoài cửa sổ——」\""
# monologue
# JP: 言って路子は、その目を車窓へと向ける。
3490 = "Nói rồi Michiko hướng mắt nhìn ra ngoài cửa sổ."
# monologue
# JP: 僕の瞳には何も映らぬ――\nただ灰色が、塗り重ねられているような車窓へと。
3229 = "Trong mắt anh chẳng phản chiếu thứ gì cả——\nNgoài khung cửa sổ kia, dường như chỉ có một màu xám xịt đang chồng chất lên nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「……この車窓から見える景色に、\nなにか、変化があったりするのか？」
1597 = "\"「......Khung cảnh nhìn từ cửa sổ tàu này,\ncó gì thay đổi sao?」\""
# 【路子】
# display as 路子
# JP: 「うん。おじさんとあたらしいお人形さんが見えたよ。\nすごいよね！　[はちろくにーまる,3]8620も、キハ[れーなな,1]07？　も運転してて」
2305 = "\"「Vâng. Em thấy một chú và một cô búp bê mới.\nTuyệt lắm nhé! Lái cả 8620, cả KiHa 07? nữa.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、赤井宮司――赤井\\x%l運転士;#00ffc040;運転士%l;#;とニイロクか。\n確かに、あのコンビから学ぶことは、とても多いな」
2276 = "\"「À, thầy cúng Akai——\\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#; Akai và Niiroku sao.\nQuả thực, có rất nhiều điều để học hỏi từ bộ đôi đó.」\""
# monologue
# JP: 帝鉄再興の希望を一身に託された、\n最新鋭特急形\\x%l電車;#00ffc040;電車%l;#;――\\x%lクハ26;#00ffc040;クハ26%l;#;形試作、\\x%lクハ26;#00ffc040;クハ26%l;#;-000\\x%l編成;#00ffc040;編成%l;#;。
3443 = "Được gửi gắm toàn bộ hy vọng phục hưng Đường sắt Hoàng gia,\n\\x%l電車;#00ffc040;tàu điện%l;#; tốc hành tối tân nhất——nguyên mẫu \\x%lクハ26;#00ffc040;Kuha 26%l;#;, \\x%l編成;#00ffc040;đoàn tàu%l;#; \\x%lクハ26;#00ffc040;Kuha 26%l;#;-000."
# monologue
# JP: その試験運転を委ねられるという凄まじさの意味を、\n僕はまったく――まるきり理解していなかった。
3454 = "Ý nghĩa của việc được giao phó chạy thử nghiệm con tàu đó,\nanh hoàn toàn——hoàn toàn không hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸機でも\\x%l気動車;#00ffc040;気動車%l;#;でも、運転技術は超一流。\nその上、乗務後の報告が――内容の質が圧倒的だ」
2094 = "\"「Dù là đầu máy hơi nước hay \\x%l気動車;#00ffc040;toa xe tự hành%l;#;, kỹ thuật lái của họ đều ở mức thượng thừa.\nHơn nữa, báo cáo sau chuyến đi——chất lượng nội dung thật sự áp đảo.」\""
# monologue
# JP: 僕らがまったく気付き得なかった問題点を見つけ出し、\n同時に極めて適切な改善案をも示してくれる。
3037 = "Họ chỉ ra những vấn đề mà chúng ta hoàn toàn không nhận ra,\nđồng thời đưa ra những phương án cải thiện vô cùng thích hợp."
# 【双鉄】
# display as 雙鐵
# JP: 「赤井さんたちの加入で、全般、大きな余裕が生じた。\nとはいえ――まだまだ人手も金も、何もかも足りんが」
2756 = "\"「Sự tham gia của chú Akai đã tạo ra một khoảng trống lớn về mọi mặt.\nTuy nhiên——vẫn còn thiếu nhân lực, tiền bạc, thiếu đủ thứ.」\""
# 【路子】
# display as 路子
# JP: 「人手っていうんなら、あのこたちが――」
2735 = "\"「Nếu nói về nhân lực thì, mấy đứa nhỏ đó——」\""
# monologue
# JP: いった途端に、\n路子がくすくす笑い出す。
3486 = "Vừa dứt lời,\nMichiko bỗng cười khúc khích."
# 【路子】
# display as 路子
# JP: 「えへへ、みちってばうっかり！　だよね、時間、たってるよね。\nあのこたちだって、おねーさんになってるんだし」
2458 = "\"「Ehehe, Michi vô ý quá! Đúng rồi nhỉ, thời gian đã trôi qua mà.\nMấy đứa nhỏ đó, giờ cũng đã thành các chị lớn rồi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あのこたち――」
2377 = "\"「Mấy đứa nhỏ đó——」\""
# monologue
# JP: 路子が車窓に見るものならば、\nそれは鉄道風景だ。
3514 = "Nếu đó là những gì Michiko nhìn thấy từ cửa sổ tàu,\nthì đó hẳn là phong cảnh đường sắt."
# monologue
# JP: 路子が認識できるほど、その光景に現れて、\nかつ、外見的成長を果たした者となるならば――
3337 = "Những người xuất hiện trong quang cảnh đó đủ nhiều để Michiko nhận ra,\nvà đã có sự trưởng thành về ngoại hình thì——"
# 【路子】
# display as 路子
# JP: 「凪ちゃんと、おともだちのおどおどちゃん」
2441 = "\"「Bé Nagi, và cô bé rụt rè bạn của Nagi.」\""
# monologue
# JP: 僕が推理を披瀝するよりわずかに早く、\n路子が答えを口にする。
3510 = "Nhanh hơn một chút so với lúc anh kịp đưa ra suy luận,\nMichiko đã nói ra câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「おどおどちゃんではない。ふかみだ」
2042 = "\"「Không phải cô bé rụt rè. Là Fukami.」\""
# 【路子】
# display as 路子
# JP: 「あ！　そう。ふかみちゃん。ふかみちゃんだね。\n最近はもう、そんなにおどおどもしてないもんね」
2266 = "\"「A! Đúng rồi. Bé Fukami. Là bé Fukami nhỉ.\nDạo này, em ấy cũng không còn rụt rè như trước nữa rồi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
2572 = "\"「Đúng vậy.」\""
# monologue
# JP: 言われてみれば、まさしくそうだ。\nふかみは――もちろん凪もだが、顕著な成長を見せている。
3173 = "Nghe em ấy nói vậy, quả đúng là thế.\nFukami——và tất nhiên cả Nagi nữa, đều đang cho thấy sự trưởng thành rõ rệt."
# 【双鉄】
# display as 雙鐵
# JP: 「ようやく御一夜が一丸となれた効果が出てきている。\n若い世代には、特に大きな刺激となったのかもしれんな」
2482 = "\"「Cuối cùng thì hiệu quả từ việc Ohimitera đoàn kết thành một khối cũng đã xuất hiện.\nĐặc biệt đối với thế hệ trẻ, có lẽ đây là một sự khích lệ rất lớn.」\""
# 【路子】
# display as 路子
# JP: 「こうかって？」
2548 = "\"「Hiệu quả á?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「『レイル・ロマネスク湯医線』。湯医線全線で、\n正和初期の――かつての懐かしい鉄道風景を再現する」
1549 = "\"「『Đường sắt lãng mạn tuyến Yui』. Tái hiện lại phong cảnh đường sắt hoài niệm thuở xưa——\ncủa thời kỳ đầu Showa trên toàn tuyến Yui.」\""
# monologue
# JP: エアクラ工場誘致撤回が確定し、御一夜市民も、\n沿線他の自治体も、そのコンセプトで一丸となりつつある。
3426 = "Việc rút lại quyết định mời gọi nhà máy Aircra đã được xác định, người dân Ohimitera\nvà các chính quyền địa phương dọc tuyến đường cũng đang dần đoàn kết lại dưới ý tưởng đó."
# monologue
# JP: 歴史ある地域全体が、その文化遺産をフルに活用しての、\n『壮大なごっこ遊び』には、確かな魅力と楽しさがある。
3293 = "Cả một khu vực giàu truyền thống lịch sử cùng tận dụng tối đa di sản văn hóa của mình,\n『Trò chơi đóng vai hoành tráng』 này quả thực có sức hấp dẫn và niềm vui rất riêng."
# 【双鉄】
# display as 雙鐵
# JP: 「8620もキハ07sも、ずばりとハマる車両だからな。\n観光客は順調に増加し、クマ川くだりも復調してきた」
2869 = "\"「Cả 8620 và KiHa 07S đều là những toa xe cực kỳ phù hợp mà.\nLượng khách du lịch đang tăng lên đều đặn, dịch vụ thuyền xuôi dòng Kuma cũng đã phục hồi.」\""
# 【路子】
# display as 路子
# JP: 「うん」
2310 = "\"「Vâng.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「人員も増え、ふかみも自分の時間を持てるようになり。\n今は、\\x%l車掌;#00ffc040;車掌%l;#;資格を取るために、駅員からの勉強中だ」
2084 = "\"「Nhân sự cũng tăng lên, Fukami đã có thời gian cho riêng mình.\nHiện tại, em ấy đang học việc từ vị trí nhân viên nhà ga để lấy chứng chỉ \\x%l車掌;#00ffc040;trưởng tàu%l;#;.」\""
# 【路子】
# display as 路子
# JP: 「そうなんだぁ。\n成長するって、すごいねぇ」
2605 = "\"「Ra là vậy.\nTrưởng thành, tuyệt thật đấy nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「……だな」
1603 = "\"「......Đúng vậy.」\""
# monologue
# JP: 路子は、ずっと成長できない。\nこの列車に閉じ込められている、今のままでは。
3098 = "Michiko, sẽ không bao giờ có thể trưởng thành được.\nCứ mãi bị nhốt trong chuyến tàu này, nếu cứ giữ nguyên như hiện tại."
# monologue
# JP: だから。なんとか。\nずっと、そう願って動きつづけているのだが――
3278 = "Vì thế. Phải làm cách nào đó.\nAnh đã luôn khao khát và không ngừng hành động vì điều đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2258 = "\"「À.」\""
# 【路子】
# display as 路子
# JP: 「どうしたの？　そうちゃん」
2464 = "\"「Sao vậy? Sou-chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ふと思いついたのだ。\nまた父さんと母さんの墓参りに行くのも、悪くないかと」
2052 = "\"「Không, anh chợt nghĩ ra thôi.\nLại đi viếng mộ bố mẹ một chuyến cũng không tồi.」\""
# 【路子】
# display as 路子
# JP: 「わ！」
2231 = "\"「Oa!」\""
# monologue
# JP: 路子の顔が、ぱあっと輝く。
3512 = "Khuôn mặt Michiko bừng sáng rạng rỡ."
# 【路子】
# display as 路子
# JP: 「いいね！　それ、とってもいい！\nみち、大さんせい！！」
2385 = "\"「Hay quá! Ý kiến đó hay lắm!\nMichi, hoàn toàn tán thành!!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、直近のバタバタが落ち着き次第に、\nお参りしてこよう」
2589 = "\"「Vậy sao. Nếu thế, ngay khi mấy việc bận rộn gần đây ổn thỏa,\nanh sẽ đi viếng mộ.」\""
# 【路子】
# display as 路子
# JP: 「うん！　みちね？　ひびきちゃんとハチロクちゃんと、\nまくらおねーさんとそうちゃんでいくといいと思うの」
2311 = "\"「Vâng! Michi nghĩ nhé? Anh Sou-chan nên đi cùng\nchị Hibiki, chị Hachiroku và chị Makura nữa.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉たちと一緒にか――」
2220 = "\"「Đi cùng chị Mayami và mọi người sao——」\""
# monologue
# JP: 確かに日々姫と、\n次のときにはきっと一緒にと約束をした。が……
3407 = "Đúng là anh đã hứa với Hibiki rằng,\nlần tới nhất định sẽ đi cùng nhau. Nhưng......"
# 【路子】
# display as 路子
# JP: 「どうしたの？　そうちゃん、ふしぎそうな顔～」
2461 = "\"「Sao vậy? Sou-chan, mặt anh trông kỳ lạ thế~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「不思議……ああ、うん。少しだけ意外に感じたのだ。\n路子が、そのように勧めてくれたことが」
2374 = "\"「Kỳ lạ......à, ừm. Anh cảm thấy hơi bất ngờ một chút.\nViệc Michiko lại khuyên anh như vậy.」\""
# monologue
# JP: 新しい家族を、亡くなった家族の墓前に紹介する。
3146 = "Giới thiệu gia đình mới trước mộ phần của gia đình đã khuất."
# monologue
# JP: そこには少し、僕としては、申し訳無さのような……\n心理的な抵抗に近いなにかを覚えるのだが――
3186 = "Đối với anh, việc đó có chút gì đó như là sự áy náy......\nAnh cảm thấy một sự phản kháng vô hình trong tâm lý——"
# 【路子】
# display as 路子
# JP: 「どうして、それがいがいなの？」
2113 = "\"「Sao anh lại thấy bất ngờ?」\""
# monologue
# JP: 僕の言葉に、\n今度は路子が、きょとん、ふしぎそうな顔になる。
3439 = "Nghe anh nói vậy,\nlần này đến lượt Michiko ngẩn tò te, lộ vẻ khó hiểu."
# 【路子】
# display as 路子
# JP: 「ぱぱもままも。ぜったいにお礼、いいたいよ。\nだって、そーちゃんのこと、助けてくれた人たちだもん」
2660 = "\"「Cả bố và mẹ. Chắc chắn đều muốn nói lời cảm ơn đấy.\nVì đó là những người đã giúp đỡ Sou-chan mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2250 = "\"「À——」\""
# monologue
# JP: ……何か、とても大事なことが、朝の光に溶けていく。\nきっと、僕はこの夢のことを忘れてしまう。
1518 = "......Một điều gì đó, rất quan trọng, đang dần tan biến vào ánh sáng ban mai.\nChắc chắn, em sẽ quên mất giấc mơ này."
# monologue
# JP: そうわかるから、必死に願う。\n溶けてしまった何かが、たとえほんの一欠片でも――
3352 = "Vì biết như vậy, nên em tha thiết cầu nguyện.\nMong sao những gì đã tan biến, dù chỉ là một mảnh vỡ nhỏ nhoi——"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……む――」
2293 = "\"「Ưm......hự——」\""
# monologue
# JP: 目覚めれば、一人。\nああ――そうか。今日は、しばらくぶりの休みか。
3537 = "Khi tỉnh giấc, chỉ có một mình.\nÀ——đúng rồi. Hôm nay là ngày nghỉ hiếm hoi sau một thời gian dài."
# monologue
# JP: ……ハチロクは、既に乗務に向かったようだ。\n部屋の空気が、どこか寂しい。
1496 = "......Hachiroku có vẻ đã đi làm nhiệm vụ rồi.\nKhông khí trong phòng có chút gì đó trống trải."
# 【双鉄】
# display as 雙鐵
# JP: 「休みと思えば、熟睡してしまうものだなぁ」
2617 = "\"「Cứ nghĩ là ngày nghỉ thì lại ngủ say như chết ấy nhỉ.」\""
# monologue
# JP: 体が軽い。それに、心も。\nいつもの眠りとの違いなら、アラームの有無だけなのに。
3515 = "Cơ thể thật nhẹ nhõm. Cả tâm trí cũng vậy.\nĐiểm khác biệt duy nhất so với giấc ngủ thường ngày chỉ là có đặt báo thức hay không thôi mà."
# 【双鉄】
# display as 雙鐵
# JP: 「熟睡すれば、こうも違うか」
2657 = "\"「Ngủ say một giấc mà khác biệt đến thế này sao.」\""
# monologue
# JP: ポーレットが休め休めと何度も勧めてくれたことへの、\n感謝の念が湧いてくる。
3349 = "Lòng biết ơn trào dâng\ntrước việc Paulette đã nhiều lần khuyên em nên nghỉ ngơi."
# monologue
# JP: そして同時に、普段の自分自身に対する、反省も。
3031 = "Và đồng thời, em cũng tự kiểm điểm lại bản thân mình thường ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「ひと月――は厳しいにしても、ふた月に一度くらいは、\n意識して全休をとるべきかもしれんな」
2022 = "\"「Một tháng——thì hơi khó, nhưng có lẽ khoảng hai tháng một lần,\nmình nên chủ động xin nghỉ phép trọn vẹn một ngày.」\""
# monologue
# JP: その方が、長期的にみた仕事効率も向上しそうだ。
3199 = "Như vậy, hiệu quả công việc về lâu dài có lẽ cũng sẽ được cải thiện."
# monologue
# JP: 布団をあげて着替えを済ませ、\n居間へと向かう――と。
3253 = "Gấp chăn đệm, thay quần áo xong xuôi,\nem hướng ra phòng khách——thì."
# 【日々姫】
# display as 日日姬
# JP: 「案～、案～、案～」
2059 = "\"「Ý tưởng~, ý tưởng~, ý tưởng~」\""
# monologue
# JP: 居間の机に突っ伏して、日々姫が案案、呻いている。
3319 = "Hibiki đang gục mặt xuống bàn phòng khách, miệng cứ rên rỉ đòi ý tưởng."
# monologue
# JP: 見捨てて置くのも気の毒ゆえに、\n唸る日々姫の前を素通りし、台所へと赴いて――
3291 = "Thấy bỏ mặc em ấy thì cũng tội nghiệp,\nnên em đi ngang qua Hibiki đang rên rỉ, tiến vào bếp——"
# 【双鉄】
# display as 雙鐵
# JP: 「ほれ、日々姫。\nお目当てのものだぞ」
2123 = "\"「Đây, Hibiki.\nThứ em đang tìm đây.」\""
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃうっ！？　にぃにっ！？　え？　なにっ！？\nいつからおったと！！？」
2218 = "\"「Pyau!? Anh hai!? Hả? Gì cơ!?\nAnh ở đây từ bao giờ thế!!?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ついさっきだ。\nほら、遠慮なく食べていいぞ」
2515 = "\"「Mới lúc nãy thôi.\nĐây, cứ tự nhiên ăn đi.」\""
# 【日々姫】
# display as 日日姬
# JP: 「遠慮なくって――あ！　これ、にわみさんの長饅頭。\nにぃに、お茶淹れてくれたんだ」
2087 = "\"「Tự nhiên á——A! Đây là bánh nướng dài của tiệm Niwami mà.\nAnh hai pha trà cho em à.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「餡を欲しがっているようだったからな」
2105 = "\"「Vì thấy em có vẻ đang thèm nhân đậu đỏ (An) mà.」\""
# monologue
# JP: 言えば日々姫は再びベタっと、\n机にその身を伏せてしまう。
3441 = "Nghe em nói vậy, Hibiki lại bẹp một cái,\ngục mặt xuống bàn."
# 【日々姫】
# display as 日日姬
# JP: 「やめて～　よして～　にぃにがオヤジギャグだとか！」
2159 = "\"「Dừng lại đi~ Thôi đi mà~ Anh hai mà cũng chơi trò chơi chữ nhạt nhẽo của mấy ông chú á!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「オヤジ――\nいや、気の利いた言葉遊びのつもりだったが」
2370 = "\"「Mấy ông chú——\nKhông, anh định chơi chữ cho nó duyên dáng tí thôi mà.」\""
# 【日々姫】
# display as 日日姬
# JP: 「いまのはアウト！　100％のオヤジギャグ！\nそこらのおっさんが言いそうな――あむっ！？」
2161 = "\"「Vừa nãy là vi phạm luật rồi! 100% là trò đùa của mấy ông chú!\nGiống hệt mấy lời mấy ông chú hay nói——Amu!?」\""
# monologue
# JP: 言われてみればそうかとどんどん思えてくるゆえ、\nひとまずは、長饅頭で日々姫を黙らす。
3266 = "Càng nghe em ấy nói, em càng thấy đúng là vậy,\nnên trước mắt cứ dùng bánh nướng dài để khóa miệng Hibiki lại đã."
# monologue
# JP: もむもむと、日々姫もおとなしく咀嚼をはじめ。\nやがてごくんと飲み込んで、安心したような息を吐く。
3320 = "Hibiki cũng ngoan ngoãn nhai nhóp nhép.\nRồi nuốt cái ực, thở ra một hơi như thể đã an tâm."
# 【日々姫】
# display as 日日姬
# JP: 「なんか気がぬけた。ってか、力んでたとね、私。\n考えっぱなし、こもりっぱなしはいけんね！　やっぱり」
2497 = "\"「Tự dưng thấy nhẹ cả người. Mà này, nãy giờ em cứ gồng mình lên ấy.\nCứ suy nghĩ mãi, ru rú mãi trong nhà thì không ổn đâu nhỉ! Quả nhiên là vậy.」\""
# monologue
# JP: 言葉と同時、立ち上がる。\nすっくと、凛と、美しく。
3175 = "Vừa dứt lời, em ấy liền đứng bật dậy.\nĐứng thẳng tắp, uy nghi và xinh đẹp."
# monologue
# JP: いつの間に、日々姫も成長していたのだなと、\nなんだか眩しいように感じる。
3311 = "Từ bao giờ, Hibiki cũng đã trưởng thành như vậy rồi,\nem bỗng cảm thấy có chút chói lọi."
# 【双鉄】
# display as 雙鐵
# JP: 「出かけるのか？」
2118 = "\"「Em định đi đâu à?」\""
# 【日々姫】
# display as 日日姬
# JP: 「ん。術仙いって、修理で入ってるこ、描いてくる。\nそしたら何か、アイディア浮かんでくるかもしれないし」
2322 = "\"「Vâng. Em định đến Jussen, vẽ lại chiếc xe đang được đưa vào sửa chữa.\nBiết đâu lúc đó sẽ nảy ra ý tưởng gì đó.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2585 = "\"「Vậy sao.」\""
# monologue
# JP: 僕の同行を求めることなく、\n"描いてくる"ときっぱり言い切って。
3160 = "Không hề yêu cầu em đi cùng,\nem ấy khẳng định chắc nịch rằng \"sẽ đi vẽ\"."
# monologue
# JP: 恐らくは、僕を休ませるため――\n日々姫はひとり、さっさと身支度を整える。
3273 = "Có lẽ là để cho em được nghỉ ngơi——\nHibiki một mình nhanh chóng chuẩn bị đồ đạc."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕の方でもアイディアを出すべく努めよう。\n過去から未来―その先のコンセプトを纏められるよう」
2842 = "\"「Nếu vậy, anh cũng sẽ cố gắng nghĩ ra ý tưởng.\nĐể có thể tóm gọn được ý tưởng cốt lõi từ quá khứ đến tương lai—và cả sau này nữa.」\""
# 【日々姫】
# display as 日日姬
# JP: 「そいば、いっつもしてるでしょお。休むときには\n休んだほうが、きっとよかアイディア出るとよ？」
2115 = "\"「Việc đó, lúc nào anh chẳng làm. Những lúc được nghỉ ngơi\nthì cứ nghỉ ngơi đi, chắc chắn sẽ nảy ra ý tưởng hay hơn đấy?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2532 = "\"「Có lẽ vậy.」\""
# 【日々姫】
# display as 日日姬
# JP: 「もちろんにぃにの休みやけんね！\nにぃにの好きにしたら良かけど！」
2674 = "\"「Đương nhiên đây là ngày nghỉ của anh hai mà!\nAnh hai cứ làm theo ý mình là được rồi!」\""
# monologue
# JP: 言って笑って、日々姫が出て行く。
3489 = "Nói rồi mỉm cười, Hibiki bước ra ngoài."
# 【双鉄】
# display as 雙鐵
# JP: 「……本当に、大人になったな」
1585 = "\"「......Thực sự, đã lớn rồi nhỉ.」\""
# monologue
# JP: ほんの少しだけ寂しく感じ、その何倍も嬉しく思う。
3543 = "Em cảm thấy có chút cô đơn, nhưng niềm vui thì lại lớn hơn gấp bội."
# 【双鉄】
# display as 雙鐵
# JP: 「成長、か」
2500 = "\"「Trưởng thành, sao.」\""
# monologue
# JP: その素晴らしさを実感すれば、\n改めて、心が定まり、強くなる。
3241 = "Khi cảm nhận được sự tuyệt vời đó,\nlòng em lại càng thêm kiên định và mạnh mẽ."
# monologue
# JP: 路子を、閉じた時間から――\nなにをしたって、解放してやらねばならないと。
3354 = "Rằng bằng mọi giá——\nphải giải thoát Michiko khỏi khoảng thời gian bị khép kín ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……過去から、未来へ。\nその流れの中、九洲全てを繋ぐ列車」
1598 = "\"「......Từ quá khứ, đến tương lai.\nTrong dòng chảy đó, chuyến tàu kết nối toàn bộ Kyushu.」\""
# monologue
# JP: 理念であるなら、揺らぐこと無く一貫している。
3357 = "Nếu đó là lý tưởng, thì nó vẫn luôn nhất quán không hề lay chuyển."
# monologue
# JP: けれど形が、その理想形が、\nどうしても僕らには描き出せない。
3044 = "Thế nhưng hình dáng, cái hình dáng lý tưởng ấy,\nbọn em vẫn chưa thể nào phác họa ra được."
# 【双鉄】
# display as 雙鐵
# JP: 「ただ単に線路を繋ぐだけでは、繋がらん。\nその上に、なにか――なにかが必要なのだ」
2182 = "\"「Nếu chỉ đơn thuần là kết nối các tuyến đường sắt thì không thể gọi là kết nối được.\nTrên đó, cần phải có một thứ gì đó——một thứ gì đó.」\""
# monologue
# JP: わかっているのに、みつけられない。\n理想の答えは必ずあると、感じるからこそもどかしい。
3328 = "Dù biết rõ điều đó, nhưng lại không thể tìm ra.\nChính vì cảm nhận được rằng chắc chắn có một câu trả lời lý tưởng, nên mới càng thêm bứt rứt."
# 【双鉄】
# display as 雙鐵
# JP: 「列車自体を、繋がりの象徴にしていくこと。\n人と人とを繋げること。それが何より、大切なことだ」
2431 = "\"「Phải biến bản thân chuyến tàu thành biểu tượng của sự kết nối.\nKết nối con người với con người. Đó mới là điều quan trọng hơn cả.」\""
# monologue
# JP: そうできなければ、鉄道は真には復活できない。
3115 = "Nếu không làm được điều đó, đường sắt sẽ không bao giờ thực sự hồi sinh."
# monologue
# JP: こころとこころを繋げなければ、交通手段に留まるのなら、\nいずれ再び、より進化したエアクラに駆逐されよう。
3448 = "Nếu không thể kết nối những trái tim, nếu chỉ dừng lại ở mức là một phương tiện giao thông,\nthì sớm muộn gì cũng sẽ lại bị những chiếc Aircra tiên tiến hơn đánh bại."
# 【双鉄】
# display as 雙鐵
# JP: 「…………ううむ」
1559 = "\"「............Ưm.」\""
# 【真闇】
# display as 真闇
# JP: 「双ちゃん。いま、ちょこっとよかと？」
2466 = "\"「Sou-chan. Bây giờ, em rảnh một chút không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2310 = "「嗯」" 
# monologue
# JP: 声をかけられ、ほっとする。
3440 = "Nghe tiếng gọi, em thở phào nhẹ nhõm."
# monologue
# JP: いつもと変わらぬ堂々巡りに、\nこのままいたら、僕は陥っていただろうから。
3450 = "Vì nếu cứ để mặc như vậy, chắc chắn em sẽ lại rơi vào\ncái vòng luẩn quẩn không lối thoát như mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉――もちろん、"よか"だ」
2684 = "\"「Chị Mayami——tất nhiên là, \"rảnh\" rồi.」\""
# 【真闇】
# display as 真闇
# JP: 「ほんならよかった」
2837 = "\"「Vậy thì tốt quá.」\""
# monologue
# JP: （む）
3575 = "（Hửm.）"
# monologue
# JP: なにか、いいことがあったのだろう。\n真闇姉の頬の一番高いところと鼻とが、ピンクだ。
3100 = "Chắc hẳn đã có chuyện gì đó vui vẻ xảy ra.\nPhần gò má cao nhất và chóp mũi của chị Mayami ửng hồng."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、今日はおやすみってゆーとったよね？」
2460 = "\"「Sou-chan, em bảo hôm nay em được nghỉ đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん。やすみだ。\nなにかあるなら、丸一日でも手伝えるぞ？」
2324 = "\"「Ừm. Em được nghỉ.\nNếu chị cần gì, em có thể giúp cả ngày luôn cũng được.」\""
# 【真闇】
# display as 真闇
# JP: 「うふふ。そぎゃん言われたらおねーちゃん、\n双ちゃんのこと、ほんとに丸一日こき使ぉてしまうよ？」
2340 = "\"「Ufufu. Em nói thế là chị\nsẽ bắt Sou-chan làm việc quần quật cả ngày thật đấy nhé?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ。\n――あ」
2641 = "\"「Đó chính là điều em mong muốn.\n——A.」\""
# monologue
# JP: 答えて、すぐにそうかと気付く。\n真闇姉は、いつでも僕を守り続けてくれているのに――
3134 = "Vừa trả lời xong, em liền nhận ra điều đó.\nChị Mayami lúc nào cũng bảo vệ em, vậy mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は……御一夜に戻ってきてからこちら、ただの一度も、\nろくに手伝いらしい手伝いもしてなかったのだな」
2503 = "\"「Em......từ lúc trở về Ohimitera đến giờ, chưa một lần nào,\nthực sự giúp đỡ chị được một việc cho ra hồn cả.」\""
# 【真闇】
# display as 真闇
# JP: 「そんなん！　エアクラ工場誘致ば撤回させてくれた、\nそんことが、なにより一番の助けになったけん」
2117 = "\"「Làm gì có chuyện đó! Việc em khiến họ rút lại dự án xây nhà máy Aircra,\nđó mới là sự giúp đỡ lớn lao nhất đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら嬉しいが――\n本当にそうだとしても、違うのだ」
2521 = "\"「Nếu được vậy thì em rất vui, nhưng——\nDù sự thật là thế, thì vẫn không phải vậy.」\""
# 【真闇】
# display as 真闇
# JP: 「違うって。なにが？」
2821 = "\"「Không phải á. Là sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「結果ではなく、過程で、僕は手伝いたい。\nもっと直接的に、具体的に。僕のこの手で、真闇姉を」
2504 = "\"「Em muốn giúp đỡ trong quá trình, chứ không phải ở kết quả.\nMột cách trực tiếp hơn, cụ thể hơn. Bằng chính đôi tay này, em muốn giúp chị Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの手で？」
2668 = "\"「Bằng đôi tay của Sou-chan á?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん。つまり、僕は単純に――」
2296 = "\"「Ừm. Tóm lại là, em chỉ đơn giản là——」\""
# monologue
# JP: 言葉がいきなり、喉にひっかかり重くなる。\n疑いの交じる余地もなく、本当の気持ちに違いないのに。
3485 = "Lời nói bỗng dưng nghẹn lại nơi cổ họng, trở nên nặng nề.\nDù đó chắc chắn là cảm xúc thật lòng, không hề có chút giả dối nào."
# 【真闇】
# display as 真闇
# JP: 「単純に？」
2180 = "\"「Đơn giản là?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2249 = "\"「!」\""
# monologue
# JP: 問い返されたそれだけで、胸がドキリと跳ね上がる。\n頬が――遅れて、顔全体が熱くなる。
3172 = "Chỉ bị hỏi lại thôi mà tim em đã đập thình thịch.\nHai má——rồi cả khuôn mặt nóng bừng lên."
# monologue
# JP: ああ――なんだ。\nつまりこれは……僕は、要するに照れているのか。
3129 = "À——ra là vậy.\nNói tóm lại là......em đang cảm thấy xấu hổ sao."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり僕は、単純に」
2073 = "\"「Tóm lại là, em chỉ đơn giản là」\""
# monologue
# JP: 感情を自覚できれば、制御できる。\nずうっと僕は、そうして来たから。
3300 = "Một khi đã nhận thức được cảm xúc, thì có thể kiểm soát được nó.\nTừ trước đến nay em vẫn luôn làm như vậy mà."
# 【双鉄】
# display as 雙鐵
# JP: 「――真闇姉に、恩返しをしたいのだ」
1538 = "\"「——Muốn báo đáp công ơn của chị Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「おんがえし」
2363 = "\"「Báo đáp công ơn.」\""
# monologue
# JP: 真闇姉の表情が変わる。\n嬉しげな、なのに少しだけ困ったようにも見える笑顔に。
3399 = "Biểu cảm của chị Mayami thay đổi.\nMột nụ cười có vẻ vui sướng, nhưng lại xen lẫn chút bối rối."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんからしたら、\nむしろ双ちゃんに恩返しせんといけんって思うとけど」
2404 = "\"「Đối với chị mà nói,\nchị mới là người phải báo đáp công ơn của Sou-chan mới đúng.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「まさか」
2493 = "\"「Làm gì có chuyện đó.」\""
# 【真闇】
# display as 真闇
# JP: 「そ？　ほんなら、\nおねーちゃんからの恩返しは、また今度にして」
2588 = "\"「Thế à? Vậy thì,\nchuyện chị báo đáp công ơn, để lần sau nhé.」\""
# monologue
# JP: 真闇姉の顔のピンクが、少し濃くなる。
3397 = "Sắc hồng trên khuôn mặt chị Mayami đậm thêm một chút."
# monologue
# JP: かわいらしいと――ほとんど反射で思ってしまい、\nなぜだか再び慌ててしまう。
3265 = "Đáng yêu quá——em gần như nghĩ vậy theo phản xạ,\nrồi chẳng hiểu sao lại cuống cuồng cả lên."
# 【真闇】
# display as 真闇
# JP: 「今日は、おねーちゃん。双ちゃんにたーっぷり恩返し、\nしてもらっても、よかと？」
2823 = "\"「Hôm nay, chị sẽ để Sou-chan báo đáp công ơn thật nhiều,\nthật nhiều luôn, được chứ?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2310 = "「嗯」" 
# monologue
# JP: 手伝いという言葉であっても、\n恩返しという言葉であっても、僕の答えは変わらない。
3026 = "Dù là dùng từ giúp đỡ,\nhay là dùng từ báo đáp, thì câu trả lời của em vẫn không hề thay đổi."
# monologue
# JP: なにせ真闇姉が、僕に頼んでくれているのだ。
3359 = "Dù sao thì cũng là chị Mayami đang nhờ vả em mà."
# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが――\nそれこそまさしく、望むところだ」
2514 = "\"「Như em đã nói lúc nãy——\nĐó chính là điều em hằng mong muốn.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「さすが――としか言いようがないな」
2516 = "\"「Quả không hổ danh——chỉ có thể nói như vậy thôi.」\""
# monologue
# JP: 真闇姉への恩返しが、まさか朝酒とは思わなかった。\nが、今日は休みだ。いくら酔っても構わない。
3250 = "Em không ngờ việc báo đáp chị Mayami lại là uống rượu vào buổi sáng.\nNhưng hôm nay là ngày nghỉ. Có say xỉn đến đâu cũng chẳng sao."
# monologue
# JP: （くいっ）
3573 = "（Ực）"
# 【双鉄】
# display as 雙鐵
# JP: 「……なんと澄みきった味だ。\n"右田一"と同じ酒造で生まれた焼酎とは思えない」
1605 = "\"「......Hương vị thật trong trẻo làm sao.\nKhông thể tin được đây lại là loại rượu shochu được sinh ra từ cùng một xưởng với \"Migitakazu\".」\""
# monologue
# JP: ――そのうえ重なる旨さ故、コップを空にしてしまう。\n大して呑める体質ではないと自覚して、なお。
1463 = "——Hơn nữa, vì vị ngon hòa quyện ấy, em đã uống cạn cả ly.\nDù tự biết tửu lượng của mình chẳng khá khẩm gì cho cam."
# 【双鉄】
# display as 雙鐵
# JP: 「右田一の複雑な深みとはまるで違った味わいの、\n都会的な――けれども、実に旨い酒だ」
2728 = "\"「Một hương vị hoàn toàn khác biệt so với sự sâu sắc phức tạp của Migitakazu,\nmang hơi hướng hiện đại——nhưng lại là một loại rượu thực sự rất ngon.」\""
# 【真闇】
# display as 真闇
# JP: 「そ？」
2586 = "\"「Vậy sao?」\""
# monologue
# JP: 真闇姉が嬉しげに笑う。\n目と目があって――言葉が、急に出てこなくなる。
3401 = "Chị Mayami cười vui vẻ.\nÁnh mắt chạm nhau——bỗng dưng em chẳng thốt nên lời nào nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――うむ」
2251 = "\"「À——ừm.」\""
# 【真闇】
# display as 真闇
# JP: 「そっか……そっかぁ」
2591 = "\"「Vậy sao......vậy sao.」\""
# monologue
# JP: 実に嬉しげに微笑んで、真闇姉は瞳を閉じてしまう。\nとても優しい沈黙が、酒造の中に満ちていく。
3400 = "Mỉm cười rạng rỡ, chị Mayami khép đôi mi lại.\nMột sự im lặng vô cùng dịu dàng lan tỏa khắp xưởng rượu."
# monologue
# JP: ……ふつ、ふつと。\n\\x%l麹;#00ffc040;麹%l;#;たちの歌う音だけが、かすかに聞こえる。
1520 = "......Lách tách, lách tách.\nChỉ nghe thấy âm thanh ca hát khe khẽ của \\x%l麹;#00ffc040;men kōji%l;#;."
# 【真闇】
# display as 真闇
# JP: 「あ！」
2262 = "\"「A!」\""
# monologue
# JP: その声に何かを感じたのだろう。\nゆる、ゆると、真闇姉は、優しく優しく[かいい,1]櫂入れをする。
3274 = "Có lẽ chị ấy đã cảm nhận được điều gì đó từ âm thanh kia.\nChầm chậm, chầm chậm, chị Mayami dịu dàng, dịu dàng khuấy đều hỗn hợp."
# monologue
# JP: ……時間さえもが、\n真闇姉の手にあわせてゆっくり流れていくようだ。
1505 = "......Ngay cả thời gian,\ndường như cũng trôi chậm lại theo nhịp tay của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「これね？　実は、あん焼酎なんよ」
2790 = "\"「Loại này ấy à? Thực ra, chính là loại rượu shochu đó đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 2262 = "「啊！」" 
# monologue
# JP: 言われて、慌ててもう一口。\n……であるのならば、この味わいも納得行くが――。
3174 = "Nghe vậy, em vội vàng uống thêm một ngụm nữa.\n......Nếu đúng là vậy, thì hương vị này cũng dễ hiểu thôi, nhưng——."
# 【双鉄】
# display as 雙鐵
# JP: 「本当にこれが、真闇姉の言っていた――\n『\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のみによって醸造管理した酒』なのか？」
2799 = "\"「Đây thực sự là thứ mà chị Mayami đã nhắc đến——\n『Loại rượu được quản lý ủ men hoàn toàn bởi \\x%lレイルロオド;#00ffc040;Railord%l;#;』 sao?」\""
# 【真闇】
# display as 真闇
# JP: 「そ。\\x%l杜氏;#00ffc040;杜氏%l;#;の勘やら何やらを完全に排除した、\n完全データ管理主義の、結晶」
2434 = "\"「Đúng vậy. Hoàn toàn loại bỏ những linh cảm hay kinh nghiệm của \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#;,\nđây là kết tinh của chủ nghĩa quản lý hoàn toàn bằng dữ liệu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2248 = "\"「Hừm.」\""
# monologue
# JP: コップを渡し、もう一杯を満たしてもらう。
3246 = "Em đưa ly cho chị, nhờ chị rót thêm một ly nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「これほどの酒が、これほどあっけなく誕生するのか」
2804 = "\"「Một loại rượu tuyệt vời như thế này, lại được sinh ra một cách dễ dàng như vậy sao.」\""
# monologue
# JP: ――澄み切っていて、けれども無論、無味ではない。\nクマの水の、クマの米の、甘さがひっそり、舌に残る。
1464 = "——Trong vắt, nhưng dĩ nhiên không hề vô vị.\nVị ngọt của nước sông Kuma, của gạo Kuma, lặng lẽ đọng lại trên đầu lưỡi."
# 【双鉄】
# display as 雙鐵
# JP: 「言われてもにわかに信じられんな。\n優しさ……あるいは暖かささえ感じる味だ」
2247 = "\"「Dù chị nói vậy nhưng em vẫn khó lòng tin được.\nMột hương vị mang đến cảm giác dịu dàng......thậm chí là ấm áp.」\""
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
2239 = "\"「Ôi chà.」\""
# monologue
# JP: 思わずこぼした一言は、真闇姉の呆れた顔を呼んでしまう。
3252 = "Lời lỡ buột miệng của em lại khiến chị Mayami lộ vẻ ngạc nhiên pha chút ngán ngẩm."
# 【真闇】
# display as 真闇
# JP: 「『\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にはこころがある』――\nそぎゃんと教えてくれたのは、双ちゃんでしょおに」
1546 = "\"「『\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có trái tim』——\nNgười đã dạy chị điều đó, chẳng phải là Sou-chan sao.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。まさしく、そのとおりだ」
2325 = "\"「À, đúng rồi. Chính xác là vậy.」\""
# monologue
# JP: 引退をした\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のほとんどは、\n再活用を検討されることもないまま、廃用される。
3521 = "Hầu hết các \\x%lレイルロオド;#00ffc040;Railord%l;#; sau khi nghỉ hưu,\nđều bị vứt bỏ mà không hề được xem xét tái sử dụng."
# monologue
# JP: そう知って『それならうちで』と言い出した真闇姉に、\n一番最初に伝えたことは、それだった。
3393 = "Khi biết điều đó, chị Mayami đã nói 『Nếu vậy thì hãy để xưởng nhà mình tiếp nhận』,\nvà đó là điều đầu tiên em đã nói với chị ấy."
# monologue
# JP: （\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にはこころがある。\nプライドも、意地も――悲しみも）
3558 = "（\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có trái tim.\nCó lòng tự trọng, có sự kiên cường——và cả nỗi buồn.）"
# monologue
# JP: そうと改めて噛み締め直し、もう一口。
3230 = "Nhẩm lại điều đó một lần nữa, em uống thêm một ngụm."
# monologue
# JP: ……やはり、旨い。\n透明感は、ほんのわずかも、濁らない。
1517 = "......Quả nhiên, rất ngon.\nSự trong trẻo ấy, không hề vẩn đục dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「――完全データ管理主義での醸造をして。\nそれでもやはり、こころは宿るか」
1541 = "\"「——Dù được ủ theo chủ nghĩa quản lý hoàn toàn bằng dữ liệu.\nNhưng quả nhiên, trái tim vẫn luôn hiện hữu trong đó nhỉ.」\""
# 【真闇】
# display as 真闇
# JP: 「かもしれんねぇ。\nみーちゃん、優しかこやけんねぇ」
2531 = "\"「Có lẽ vậy.\nVì Mi-chan là một cô bé rất dịu dàng mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「みーちゃん、か」
2453 = "\"「Mi-chan, sao.」\""
# monologue
# JP: 旧帝鉄\\x%l9600;#00ffc040;9600%l;#;形\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、39685号機\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\n"みやこ"。
3082 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; dòng \\x%l9600;#00ffc040;9600%l;#; Đường sắt Hoàng gia cũ, số hiệu 39685,\n\"Miyako\"."
# monologue
# JP: 鉄道の町、旺宮の役所敷地で保存され――\nけれどもそれが災いとなった、悲運の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
3458 = "Được bảo tồn trong khuôn viên tòa thị chính của thị trấn đường sắt Omiya——\nnhưng điều đó lại trở thành tai họa, một \\x%lレイルロオド;#00ffc040;Railord%l;#; bất hạnh."
# monologue
# JP: （鉄道歴史館に近いゆえ、保存機自体が珍しくなく。\nさりとて収蔵されるほどの特徴の無かった、39685――）
3579 = "（Vì nằm gần Bảo tàng Lịch sử Đường sắt nên việc bảo tồn đầu máy không phải là hiếm.\nThế nhưng 39685 lại không có điểm gì đặc sắc đến mức được đưa vào bộ sưu tập——）"
# monologue
# JP: ゆえに解体の話が出たとき、地元では、\n反対運動に賛同してくれる人が極めて少なかったと聞く。
3142 = "Vì vậy, khi có thông tin về việc tháo dỡ, nghe nói ở địa phương\ncó rất ít người đồng tình với phong trào phản đối."
# monologue
# JP: 遥か九洲の僕らにさえも、解体反対を必死で叫ぶ\nみやこの声が、届いてきたにも関わらず。
3124 = "Mặc dù tiếng kêu gào phản đối tháo dỡ tuyệt vọng của Miyako\nđã vọng đến tận Kyushu xa xôi, đến tận tai bọn em."
# 【双鉄】
# display as 雙鐵
# JP: 「自分の機関車を解体されてなお……\n優しいこで、いつづけていてくれるのか」
2164 = "\"「Dù đầu máy của mình đã bị tháo dỡ......\nEm ấy vẫn luôn là một cô bé dịu dàng sao.」\""
# 【真闇】
# display as 真闇
# JP: 「ん。優しすぎるほど、優しかこ」
2303 = "\"「Ừm. Một cô bé dịu dàng đến mức quá đáng.」\""
# monologue
# JP: 『もう鉄道には関わりたくない』――\n面接を受けに来たときの、第一声がそれだと聞いた。
3442 = "『Em không muốn dính dáng gì đến đường sắt nữa』——\nNghe nói đó là câu nói đầu tiên của em ấy khi đến phỏng vấn."
# monologue
# JP: ゆえに僕もハチロクも日々姫も、\nみやことは、ほとんど接触したことがない。
3138 = "Thế nên cả em, Hachiroku và Hibiki,\nhầu như chưa bao giờ tiếp xúc với Miyako."
# monologue
# JP: （実際、今日も姿を隠してしまっている――\nいや、真闇姉が、あるいはどこかに逃したのかもな）
3571 = "（Thực tế là hôm nay em ấy cũng trốn biệt tăm——\nÀ không, có lẽ chị Mayami đã để em ấy lánh đi đâu đó rồi cũng nên.）"
# monologue
# JP: 真闇姉なら、そのくらいのことは当然しよう。\nみやこの傷は、であるなら。未だにそれほど、深いのだ。
3389 = "Nếu là chị Mayami thì chắc chắn sẽ làm thế.\nVết thương lòng của Miyako, nếu đúng là vậy, thì vẫn còn rất sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕の感想であると知れれば、\nみやこはそれだけで、頑なになってしまうかもしれん」
1592 = "\"「......Nếu biết đây là cảm nhận của em,\ncó khi chỉ vì thế mà Miyako sẽ trở nên cố chấp cũng nên.」\""
# 【真闇】
# display as 真闇
# JP: 「ありゃま。みーちゃんと喧嘩でもした？」
2236 = "\"「Ôi chà. Em cãi nhau với Mi-chan à?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　いや、喧嘩などはせぬが――」
2332 = "\"「Hửm? Không, em đâu có cãi nhau——」\""
# 【真闇】
# display as 真闇
# JP: 「よねぇ」
2078 = "\"「Đúng vậy nhỉ.」\""
# monologue
# JP: 第一、それほどの接点もない。
3555 = "Thứ nhất, bọn em cũng chẳng có mấy điểm chung."
# monologue
# JP: ゆえにあるいは……\n僕の心配しすぎであるのかもしれないが。
3281 = "Thế nên có lẽ......\nchỉ là em đang lo lắng thái quá thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の感想ということで、受け取り方が変わりそうなら。\n『酒問屋の営業さん』の、感想として伝えて欲しい」
2400 = "\"「Nếu biết đây là cảm nhận của em mà cách đón nhận của em ấy thay đổi.\nThì mong chị hãy truyền đạt lại đây là cảm nhận của một 『Nhân viên kinh doanh của đại lý rượu』.」\""
# monologue
# JP: ……まったく、嘘をついてはいない。\n僕の身分の一部は未だ、右田一酒店の平営業ゆえ。
1506 = "......Hoàn toàn không phải là nói dối.\nVì một phần thân phận của em hiện tại vẫn là nhân viên kinh doanh quèn của tiệm rượu Migitakazu."
# 【真闇】
# display as 真闇
# JP: 「どぎゃんと、伝えてあげればよかと？」
2526 = "\"「Vậy, chị nên truyền đạt lại thế nào đây?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「これは、紛れもなく旨い酒だ。と。\nこの酒は、きっと広くで呑まれる酒だと」
2803 = "\"「Rằng đây chắc chắn là một loại rượu ngon.\nRằng loại rượu này chắc chắn sẽ được nhiều người thưởng thức.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ」
# 2310 = "「嗯」" 
# monologue
# JP: 真闇姉に目で促され、コップを渡す。\n真闇姉もまた、同じ焼酎を一息に呑む。
3243 = "Được chị Mayami ra hiệu bằng mắt, em đưa ly cho chị.\nChị Mayami cũng một hơi cạn sạch ly shochu đó."
# 【真闇】
# display as 真闇
# JP: 「まっこと。言われてみたらこんクセの無さと切れの良さ。\n御一夜よりも、よそでの方が、うけるかもしれんねぇ」
2815 = "\"「Đúng vậy thật. Nghe em nói mới thấy, loại rượu không kén người uống và vị sắc sảo này.\nCó khi lại được ưa chuộng ở những nơi khác hơn là Ohimitera cũng nên.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「と、僕は思う」
2507 = "\"「Em nghĩ là vậy.」\""
# monologue
# JP: にいいっ――と、真闇姉が目で笑う。
3391 = "Chị Mayami mỉm cười bằng ánh mắt."
# 【真闇】
# display as 真闇
# JP: 「ほんなら双ちゃん。どぎゃんしたら、こん焼酎ば、\nたくさんの人に飲んでもらえるようになるかねぇ」
2832 = "\"「Vậy thì Sou-chan. Làm thế nào để loại rượu shochu này,\nđược nhiều người biết đến và thưởng thức hơn đây nhỉ?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな」
1610 = "\"「......Để xem nào.」\""
# monologue
# JP: 広告宣伝のことは専門ではないが、\n日々姫の営業を兼務するうち、多くを学んだ。
3542 = "Quảng cáo tuyên truyền không phải chuyên môn của em,\nnhưng trong quá trình kiêm nhiệm công việc kinh doanh cùng Hibiki, em đã học được rất nhiều điều."
# monologue
# JP: 基本に添うなら、強調すべきは他との差異。\nその差異を、最大限に活かせる形で売り出せばいい。
3149 = "Theo nguyên tắc cơ bản, cần nhấn mạnh sự khác biệt so với những sản phẩm khác.\nChỉ cần tung ra thị trường bằng cách tận dụng tối đa sự khác biệt đó là được."
# 【双鉄】
# display as 雙鐵
# JP: 「この新しい焼酎の最大のセールスポイントは無論、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;による完全データ管理醸造ということだ」
2801 = "\"「Điểm bán hàng lớn nhất của loại rượu shochu mới này dĩ nhiên là,\nviệc được quản lý ủ men hoàn toàn bằng dữ liệu bởi \\x%lレイルロオド;#00ffc040;Railord%l;#;.」\""
# 【真闇】
# display as 真闇
# JP: 「うん」
# 2310 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、そこを最大限に強調するため……。\n例えばそうだな。まずは観光列車の車販で――いや」
2358 = "\"「Thế nên, để nhấn mạnh điều đó ở mức tối đa......\nVí dụ như. Trước tiên là bán trên xe đẩy của các chuyến tàu du lịch——à không.」\""
# 【真闇】
# display as 真闇
# JP: 「……双ちゃん？」
1596 = "\"「......Sou-chan?」\""
# monologue
# JP: 顔に、出てしまったのだろう。
3272 = "Chắc hẳn biểu cảm của em đã lộ rõ trên khuôn mặt."
# monologue
# JP: 真闇姉に心配させてしまった気がして、\nあわてて理由を説明する。
3181 = "Cảm thấy như đã làm chị Mayami lo lắng,\nem vội vàng giải thích lý do."
# 【双鉄】
# display as 雙鐵
# JP: 「それは難しい。あるいは無神経かと思ったのだ。\nみやこの気持ちを考えると」
2792 = "\"「Việc đó e là hơi khó. Hoặc có lẽ là vô tâm.\nNếu nghĩ đến cảm nhận của Miyako.」\""
# 【真闇】
# display as 真闇
# JP: 「みーちゃんの気持ち？」
2454 = "\"「Cảm nhận của Mi-chan?」\""
# monologue
# JP: きょとん、と真闇姉の目が丸くなる。\n驚かせてしまったらしいということに、僕が驚く。
3402 = "Chị Mayami tròn xoe mắt ngơ ngác.\nViệc làm chị ấy ngạc nhiên lại khiến chính em ngạc nhiên."
# monologue
# JP: ……いや、そういえばさっきから……\nそこのところが、微妙に噛み合っていなかったような――
1491 = "......À không, nhắc mới nhớ, từ nãy đến giờ......\nCó vẻ như chúng em đã không thực sự hiểu ý nhau ở điểm đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれたではないか。面接のとき、みやこが、\n『二度と鉄道にはかかわりたくない』と、話していたと」
2106 = "\"「Chẳng phải chị đã kể cho em nghe sao. Lúc phỏng vấn, Miyako đã nói,\n『Không bao giờ muốn dính dáng đến đường sắt nữa』.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ！　そんなん」
2263 = "\"「À! Chuyện đó á.」\""
# monologue
# JP: 何を今更――言わんばかりに、真闇姉が笑い出す。\n笑ったその目が次の瞬間、いたずらっぽいアーチを描く。
3394 = "Chị Mayami bật cười, như muốn nói \"Giờ này mà còn nhắc lại chuyện đó làm gì\".\nÁnh mắt đang cười ấy ngay giây tiếp theo bỗng vẽ nên một đường cong đầy tinh nghịch."
# 【真闇】
# display as 真闇
# JP: 「そんなん。ゆーたら。\n双ちゃんだって、長いこと思うとったことでしょお」
2738 = "\"「Chuyện đó ấy à. Nói ra thì.\nSou-chan cũng đã từng nghĩ như vậy trong một thời gian dài mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2258 = "「啊」" 
# monologue
# JP: 頷くしかない。
3235 = "Em chỉ còn biết gật đầu."
# monologue
# JP: 僕は確かに、鉄道を憎み、\n遠ざけたいと――心の底から、願っていた。
3262 = "Đúng là em đã từng căm ghét đường sắt,\nvà khao khát được tránh xa nó——từ tận đáy lòng."
# 【真闇】
# display as 真闇
# JP: 「こころばあるけん、変われるんよ。\nあ。みーちゃんの場合は――“戻れる”？」
2635 = "\"「Vì có trái tim, nên mới có thể thay đổi.\nA. Trong trường hợp của Mi-chan thì——“có thể quay lại” chăng?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな。なにせ、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ」
1601 = "\"「......Chắc là vậy rồi. Dù sao thì, em ấy cũng là \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」\""
# monologue
# JP: 最初から鉄道を嫌う\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、\nこの世界のどこを探しても、きっと存在しないだろう。
3125 = "Một \\x%lレイルロオド;#00ffc040;Railord%l;#; ghét đường sắt ngay từ đầu,\nchắc chắn không hề tồn tại ở bất cứ đâu trên thế giới này."
# 【真闇】
# display as 真闇
# JP: 「元から大好きだったもんに裏切られて、\n傷つけられて、嫌ったような気持ちになって」
2732 = "\"「Bị chính thứ mình từng rất yêu quý phản bội,\nlàm tổn thương, nên mới sinh ra cảm giác như là căm ghét.」\""
# monologue
# JP: ……みやこのことを言われているとわかっていても、\nかつての自分を語られるような、わずかな面映さを感じる。
1528 = "......Dù biết chị đang nói về Miyako,\nnhưng em vẫn cảm thấy chút bối rối như thể chị đang nói về chính bản thân em ngày xưa vậy."
# monologue
# JP: そうして、小さかった日々姫を思う。\nなるほど僕らは、その点で共感しあえていたのかもしれん。
3233 = "Và rồi, em nghĩ về Hibiki thuở nhỏ.\nRa là vậy, có lẽ chúng em đã thấu hiểu nhau ở điểm đó."
# 【真闇】
# display as 真闇
# JP: 「それでも、やっぱり好きなんよねぇ。\n『日ノ本鉄路』のニュース。みーちゃん、大喜びして」
2100 = "\"「Nhưng dù vậy, vẫn là rất thích nhỉ.\nTin tức về 『Đường sắt Hinomoto』. Mi-chan vui lắm luôn đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうなのか」
2342 = "\"「À——ra là vậy sao.」\""
# monologue
# JP: ならば、嬉しい。
3176 = "Nếu vậy thì, em rất vui."
# monologue
# JP: 僕らが積み上げてきた成果が、みやこのこころを、\nなぐさめ、喜ばせたというのなら。
3528 = "Nếu những thành quả mà chúng em đã dày công vun đắp,\ncó thể xoa dịu và mang lại niềm vui cho trái tim của Miyako."
# 【真闇】
# display as 真闇
# JP: 「ほんでね？　貨物列車のことやらなんやら、\nたくさんたくさん、みーちゃん、うちに聞かせてくれて」
2418 = "\"「Thế rồi nhé? Chuyện về tàu chở hàng này nọ,\nMi-chan đã kể cho chị nghe rất nhiều, rất nhiều luôn.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。どんなことをだ？」
2343 = "\"「Hô. Chuyện gì vậy?」\""
# 【真闇】
# display as 真闇
# JP: 「冷蔵車？　やらいう最新の、電気冷蔵庫がついとお\n\\x%l貨車;#00ffc040;貨車%l;#;ば、ひいたことあるとか、そぎゃんおはなし」
2380 = "\"「Xe đông lạnh? Loại \\x%l貨車;#00ffc040;toa chở hàng%l;#; tối tân nhất có gắn tủ lạnh điện ấy,\nem ấy kể là từng kéo loại đó rồi, đại loại thế.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「冷蔵車――大廃線前に、そんな車両があったのか」
2128 = "\"「Xe đông lạnh——trước thời kỳ Đại bãi bỏ, đã có loại toa xe như vậy rồi sao.」\""
# 【真闇】
# display as 真闇
# JP: 「そ。そん車両なら、どぎゃん遠くにも鮮度ばっちりで\n貨物ば運んでいけるって。うふふ。」
2437 = "\"「Đúng vậy. Nếu là loại toa xe đó, thì dù có đi xa đến đâu cũng có thể\nvận chuyển hàng hóa mà vẫn giữ được độ tươi ngon. Ufufu.」\""
# monologue
# JP: 言ってくすくす、笑い声。
3488 = "Nói rồi chị lại cười khúc khích."
# 【真闇】
# display as 真闇
# JP: 「焼酎ば、常温保存で十分なのに、みーちゃんね？\n冷蔵車で日ノ本に運ばれる焼酎をいつか作りたい、って」
2561 = "\"「Rượu shochu thì bảo quản ở nhiệt độ thường là đủ rồi, thế mà Mi-chan nhé?\nEm ấy bảo một ngày nào đó muốn làm ra loại rượu shochu được vận chuyển khắp Hinomoto bằng xe đông lạnh cơ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや。日ノ本中に運ぶというなら、\n冷蔵車の方が確かにいいな」
2029 = "\"「Không đâu. Nếu vận chuyển khắp Hinomoto,\nthì dùng xe đông lạnh chắc chắn sẽ tốt hơn.」\""
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
2794 = "\"「Vậy sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。れいなに聞いたことがある。夏場の\\x%l貨車;#00ffc040;貨車%l;#;の車内は、\n50度を遥かに超える、蒸し風呂状態になることもあると」
2319 = "\"「À. Em từng nghe Reina kể rồi. Vào mùa hè, bên trong \\x%l貨車;#00ffc040;toa chở hàng%l;#;\ncó thể lên tới hơn 50 độ, hầm hập như phòng tắm hơi vậy.」\""
# 【真闇】
# display as 真闇
# JP: 「ありゃま。蒸し風呂。\nそぎゃん中では、さすがに変質が怖かとねぇ――あ！」
2234 = "\"「Ôi chà. Phòng tắm hơi cơ á.\nNóng cỡ đó thì sợ rượu bị biến chất mất thôi——A!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2330 = "\"「Hửm?」\""
# 【真闇】
# display as 真闇
# JP: 「ほんなら逆に、\\x%l客車;#00ffc040;客車%l;#;に冷蔵庫をつけるのとかは？\nその方が、観光列車らしいでしょお」
2797 = "\"「Thế thì ngược lại, gắn tủ lạnh lên \\x%l客車;#00ffc040;toa hành khách%l;#; thì sao?\nNhư thế sẽ giống tàu du lịch hơn đúng không.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ありかもしれんな。\n電力は、電源車をつけ供給してもらうこととして」
2791 = "\"「Cũng có thể lắm.\nNguồn điện thì sẽ nối thêm toa phát điện để cung cấp.」\""
# 【真闇】
# display as 真闇
# JP: 「電源車。そぎゃんものもあると？」
2677 = "\"「Toa phát điện. Có cả loại đó nữa à?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「やはり帝鉄最末期に登場したものだそうだ。\n残念ながら活躍の前に帝鉄が倒れてしまったが」
2407 = "\"「Nghe nói nó xuất hiện vào thời kỳ cuối cùng của Đường sắt Hoàng gia.\nĐáng tiếc là Đường sắt Hoàng gia đã sụp đổ trước khi nó kịp phát huy tác dụng.」\""
# 【真闇】
# display as 真闇
# JP: 「もったいなかとねー！　そぎゃんとがあって空調やら\nなんやらできたら、列車の旅も全然違ぉたろーにねぇ」
2368 = "\"「Tiếc thật đấy! Nếu có thứ đó để chạy điều hòa\nhay gì đó, thì những chuyến du lịch bằng tàu hỏa đã khác hoàn toàn rồi nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな。いっそ豪華に、\n電源車と冷蔵車をともに\\x%l編成;#00ffc040;編成%l;#;し――っ！！」
2579 = "\"「Đúng vậy. Hay là làm cho hoành tráng luôn,\n\\x%l編成;#00ffc040;ghép%l;#; cả toa phát điện và xe đông lạnh vào——!!」\""
# monologue
# JP: パチンと、ハマる。\n繋がり始める。全てが、すごい勢いで。
3433 = "Bốp một cái, mọi thứ khớp vào nhau.\nBắt đầu kết nối lại. Tất cả mọi thứ, với một tốc độ chóng mặt."
# monologue
# JP: 頭が加熱してると感じる。\n興奮ではなく――脳が、全力で回転している。
3153 = "Em cảm thấy đầu mình đang nóng lên.\nKhông phải vì hưng phấn——mà là não bộ đang hoạt động hết công suất."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん？」
2467 = "\"「Sou-chan?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……酒だ。焼酎だ――\nいや、そこに留まる必要はない」
2438 = "\"「Ra là vậy......Rượu. Rượu shochu——\nKhông, không cần phải dừng lại ở đó.」\""
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、なにが留まらんと？」
2459 = "\"「Sou-chan, không dừng lại ở đó là sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「繋がりがだ。九洲を繋げる手段がだ。\nなにかが足りぬと――ずうっと僕は悩んでいたが」
2057 = "\"「Sự kết nối. Phương tiện để kết nối Kyushu.\nMột thứ gì đó còn thiếu——em đã luôn trăn trở về điều đó.」\""
# monologue
# JP: 案は百出――いや、千さえ優に超えただろう。\nその中には、素晴らしい輝きを放つ物も、少なくなかった。
3296 = "Đã có hàng trăm ý tưởng được đưa ra——không, có khi phải hơn cả ngàn.\nTrong số đó, không ít ý tưởng tỏa sáng rực rỡ."
# monologue
# JP: けれどもそれでも頷けなかった――\nもう少しだけ待って欲しいと粘った理由を、いま理解した。
3041 = "Nhưng dù vậy em vẫn không thể gật đầu đồng ý——\nGiờ thì em đã hiểu lý do tại sao mình lại cố chấp xin mọi người chờ thêm một chút nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「『オール御一夜体制』では、それでもまだまだ――\n全然、足りていなかったのだ」
2469 = "\"「『Thể chế toàn Ohimitera』 vẫn là chưa đủ——\nHoàn toàn, chưa đủ.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ！！」
2269 = "\"「A!!」\""
# monologue
# JP: 言った瞬間、真闇姉は頷いてくれる。
3487 = "Ngay khi em vừa thốt lên, chị Mayami liền gật đầu."
# monologue
# JP: もう全力で頷いて、\nそうして少し慌てたように、スマホを取り出す。
3165 = "Gật đầu một cách mạnh mẽ,\nrồi chị hơi luống cuống lấy điện thoại ra."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ひーちゃん、どこにおると？」
2463 = "\"「Sou-chan, Hi-chan đang ở đâu vậy?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は確か――そうだ、術仙に向かうといっていた」
2559 = "\"「Hình như Hibiki——à đúng rồi, em ấy bảo sẽ đến Jussen.」\""
# 【真闇】
# display as 真闇
# JP: 「やったら」
2816 = "\"「Nếu vậy thì.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「レールショップで合流するよう話してみてくれ。\n僕も、みんなに連絡してみる」
2757 = "\"「Chị gọi bảo em ấy đến cửa hàng đường sắt hội quân nhé.\nEm cũng sẽ liên lạc với mọi người.」\""
# 【真闇】
# display as 真闇
# JP: 「ん」
# 2310 = "「嗯」" 
# monologue
# JP: 真闇姉が電話をかけはじめる。\n僕もすぐさま、家電で。
3388 = "Chị Mayami bắt đầu gọi điện thoại.\nEm cũng lập tức dùng điện thoại bàn."
# monologue
# JP: （Trrrrr……Trrrrr――）
3577 = "（Reng rreng......Reng rreng——）"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。こちら、御一夜鉄道レールショップですよぉ」
2287 = "\"「Vâng ạ~. Đây là cửa hàng đường sắt của Đường sắt Ohito nha~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、すまん。ポーレットはいるか。\n緊急会議の開催をおねがいしたいのだ」
2663 = "\"「Reina, xin lỗi em. Paulette có đó không.\nAnh muốn nhờ tổ chức một cuộc họp khẩn cấp.」\""
# 【れいな】
# display as 玲奈
# JP: 「わわわ！　きんきゅうですかぁ！\nすぐポーレットをよびますねぇ！　ポーレットぉ」
2224 = "\"「Oa oa oa! Khẩn cấp ạ~!\nReina gọi Paulette ngay đây nha~! Paulette ơi~」\""
# 【ポーレット】
# display as 波萊特
# JP: 「はいはい、れいな。お電話誰から？」
2122 = "\"「Chị nghe đây, Reina. Ai gọi thế?」\""
# 【れいな】
# display as 玲奈
# JP: 「そうてつさんからですよぉ？\nきんきゅうのお話でぇす」
2606 = "\"「Anh Soutetsu gọi đó nha~?\nBảo là có chuyện khẩn cấp ạ~」\""
# 【ポーレット】
# display as 波萊特
# JP: 「え？　双鉄くんっ！！？\n――って、えええ！　緊急！！？」
2241 = "\"「Hả? Anh Soutetsu!?\n——Khoan, ể! Khẩn cấp á!?」\""
# monologue
# JP: バタバタ、足音。
3263 = "Tiếng bước chân vội vã."
# 【ポーレット】
# display as 波萊特
# JP: 「もしもし、双鉄くん？　わたし、ポーレットです」
2285 = "\"「Alo, anh Soutetsu? Em Paulette đây.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「何時でもいい。レールショップを使わせて欲しい」
2522 = "\"「Mấy giờ cũng được. Cho anh mượn cửa hàng đường sắt nhé.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「はい。それはもちろん――\nけど、どうしたんです？　いったいなにが？」
2329 = "\"「Vâng. Tất nhiên là được rồi——\nNhưng có chuyện gì vậy anh? Rốt cuộc là chuyện gì?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「見出したように思うのだ。\n未来へのレールを繋げるための、その[すべ]術を」
2519 = "\"「Anh nghĩ là anh đã tìm ra rồi.\nPhương pháp để kết nối đường ray dẫn tới tương lai.」\""
# monologue
# JP: ――ハチロク、日々姫。ポーレット、れいな。凪。ふかみ。\n真闇姉、稀咲、そして、上空にはもちろんナビ。
1460 = "——Hachiroku, Hibiki. Paulette, Reina. Nagi. Fukami.\nChị Mayami, Kisaki, và tất nhiên là cả Navi trên bầu trời nữa."
# monologue
# JP: 嬉しく思う。緊急極まる会議招集であったにも関わらず、\n最初期からのメンバーは、残らず、顔を揃えてくれた。
3248 = "Thật đáng mừng. Dù đây là một cuộc họp khẩn cấp,\nnhưng tất cả các thành viên từ những ngày đầu tiên đều đã có mặt đông đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「オール九洲をつくるのだ」
2511 = "\"「Chúng ta sẽ tạo ra một Thể chế toàn Kyushu.」\""
# monologue
# JP: ゆえに、前置き無く結論を。\nだが反応は、思ったほどには芳しくない。
3140 = "Thế nên, em vào thẳng kết luận mà không cần rào trước đón sau.\nNhưng phản ứng của mọi người lại không được như mong đợi."
# monologue
# JP: 誰もがぽかんとした顔をして、互いに視線を交わし始める。\n――その沈黙を、ハチロクの声が静かに壊す。
3285 = "Ai nấy đều ngẩn tò te, đưa mắt nhìn nhau.\n——Sự im lặng đó bị phá vỡ bởi giọng nói nhẹ nhàng của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「……オール九洲、とは、\nどのようなものでございましょうか？」
1557 = "\"「......Thể chế toàn Kyushu, là\nthứ như thế nào vậy ạ?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「今、僕達がその力強さを実感している、オール御一夜、\nオール湯医線の連帯感。これを、九洲全土に広げる」
2664 = "\"「Chính là sự đoàn kết của Thể chế toàn Ohimitera, Thể chế toàn tuyến Yui\nmà hiện tại chúng ta đang cảm nhận rõ sức mạnh của nó. Chúng ta sẽ mở rộng điều đó ra toàn bộ Kyushu.」\""
# 【稀咲】
# display as 稀咲
# JP: 「理想論。馬鹿げた話。それができれば苦労はない。\n――双鉄を知る前だったら、そう一笑に付していたけど」
2706 = "\"「Chỉ là lý thuyết suông. Thật nực cười. Nếu làm được thế thì đã chẳng phải khổ.\n——Nếu là trước khi quen biết Soutetsu, tôi đã cười nhạo như vậy rồi.」\""
# monologue
# JP: それがおそらく、みなの第一印象であったのだろう。\n稀咲の率直な指摘は、ほっとしたような空気を生む。
3526 = "Đó có lẽ cũng là ấn tượng đầu tiên của mọi người.\nLời nhận xét thẳng thắn của Kisaki đã tạo ra một bầu không khí nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「今ならわかる。その夢物語を叶えるための――\n双鉄、キミは、具体的な方法を思いついたんだね？」
2102 = "\"「Nhưng giờ thì tôi hiểu. Để biến câu chuyện viển vông đó thành hiện thực——\nSoutetsu, cậu đã nghĩ ra phương pháp cụ thể rồi đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「無論、列車だ。観光列車。僕らの未来行き列車を、\n九洲全ての人達に、『自分の列車』と思ってもらう」
2676 = "\"「Đương nhiên là bằng tàu hỏa rồi. Tàu du lịch. Chúng ta sẽ khiến cho tất cả người dân Kyushu\ncoi chuyến tàu đi tới tương lai của chúng ta là 『Chuyến tàu của chính mình』.」\""
# 【凪】
# display as 凪
# JP: 「わおわお！　そりゃ良かとねー！！」
2230 = "\"「Oa oa oa! Thế thì tuyệt quá!!」\""
# 【ふかみ】
# display as 深美
# JP: 「いいけど、凪ちゃん。まだこれ、\n全然具体的な方法じゃないよ？」
2795 = "\"「Tuyệt thì tuyệt thật, nhưng mà Nagi à. Thế này\nvẫn chưa phải là phương pháp cụ thể đâu?」\""
# 【凪】
# display as 凪
# JP: 「ああ、言われりゃそうばい」
2279 = "\"「A, cậu nói mới để ý.」\""
# monologue
# JP: ……ふたりでいれば、凪とふかみは変わらない。
1499 = "......Cứ ở cạnh nhau là Nagi và Fukami lại thế."
# monologue
# JP: いつものコンビネーションで、\n会議を心地よくかき混ぜてくれる。
3069 = "Bằng sự kết hợp ăn ý như mọi khi,\nhai đứa đã khuấy động cuộc họp một cách thật dễ chịu."
# 【ポーレット】
# display as 波萊特
# JP: 「どうやって、『自分の列車』って、\n九洲全ての人達に、思ってもらえるようにするんです？」
2492 = "\"「Làm thế nào để tất cả người dân Kyushu\ncoi đó là 『Chuyến tàu của chính mình』 được?」\""
# 【れいな】
# display as 玲奈
# JP: 「九洲は、ひろおいですよぉ！　れいな、それって、\nとってもむつかしいと思いますぅ」
2060 = "\"「Kyushu rộng lắm đó nha~! Reina nghĩ chuyện đó\nkhó lắm luôn ấy ạ~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。れいなの言うとおりだ。九洲は広く、多様だ。\n地域同士のライバル心も、決して弱いものとはいえない」
2439 = "\"「Đúng vậy. Reina nói đúng. Kyushu rất rộng lớn và đa dạng.\nSự cạnh tranh giữa các khu vực cũng không hề nhỏ chút nào.」\""
# 【稀咲】
# display as 稀咲
# JP: 「だよね。そこには、隈銀も大いに苦労させられている」
2570 = "\"「Đúng thế. Ngân hàng Kumagin cũng đang phải điêu đứng vì chuyện đó đây.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「問題が大きく複雑にすぎるとき、\nまず最初に試みるべきは――」
2672 = "\"「Khi vấn đề quá lớn và phức tạp,\nđiều đầu tiên chúng ta nên thử là——」\""
# 【日々姫】
# display as 日日姬
# JP: 「あ？　分解？　小分けにすると？」
2281 = "\"「A? Chia nhỏ ra? Chia thành từng phần nhỏ á?」\""
# monologue
# JP: さすが日々姫は、僕のやり方を熟知している。\n頷きを返すまでもなく、自ら考えはじめてくれる。
3021 = "Quả nhiên Hibiki rất hiểu cách làm việc của em.\nChẳng cần em phải gật đầu, em ấy đã tự mình suy nghĩ."
# 【日々姫】
# display as 日日姬
# JP: 「九洲を分解すると――まずは、県とね。隈元、福丘、\n左賀、永崎、大板、宮嵜、鹿兒島」
2733 = "\"「Chia nhỏ Kyushu ra——trước tiên là các tỉnh nhỉ. Kumamoto, Fukuoka,\nSaga, Nagasaki, Oita, Miyazaki, Kagoshima.」\""
# 【凪】
# display as 凪
# JP: 「ん？　七つしかなかとよ？　隠岐縄を数えても八つばい！\n一つ、どこに置き忘れたと？」
2187 = "\"「Hửm? Mới có bảy thôi mà? Tính cả Okinawa thì mới là tám!\nCòn một cái để quên ở đâu rồi?」\""
# 【ふかみ】
# display as 深美
# JP: 「違うよ凪ちゃん。九洲が九つなのは、旧国名でのこと。\n聞いたことあるでしょ？　肥御とか、颯馬とか」
2040 = "\"「Không phải đâu Nagi. Kyushu có chín phần là tính theo tên các vùng quốc gia cũ cơ.\nCậu từng nghe rồi đúng không? Higo hay Satsuma ấy.」\""
# 【凪】
# display as 凪
# JP: 「ああ！　あれなら九つあると？」
2268 = "\"「A! Nếu là cái đó thì đủ chín hả?」\""
# 【真闇】
# display as 真闇
# JP: 「[ひぜん,1]肥善、[ひご,1]肥御。[ぶぜん,1]豊善、[ぶんご,1]豊御。[ちくぜん,1]筑善、[ちくご,1]筑御。\n[ひゅうが,1]日牙、[おおすみ,1]大角――それから[さつま,1]颯馬で、はい、九つ」
2724 = "\"「Hizen, Higo. Buzen, Bungo. Chikuzen, Chikugo.\nHyuga, Osumi——và cuối cùng là Satsuma, đấy, đủ chín vùng rồi nhé.」\""
# 【凪】
# display as 凪
# JP: 「わおわお！　九洲そろったばーい！」
2225 = "\"「Oa oa oa! Đủ cả Kyushu rồi!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「その九洲を、九つの客室にする。\n寝台\\x%l客車;#00ffc040;客車%l;#;三輌に、三室ずつで」
2429 = "\"「Chúng ta sẽ biến chín vùng Kyushu đó thành chín khoang hành khách.\nTrên ba \\x%l客車;#00ffc040;toa hành khách%l;#; giường nằm, mỗi toa ba khoang.」\""
# monologue
# JP: （がたっ！）
3576 = "（Cạch!）"
# monologue
# JP: 日々姫が、そしてポーレットが、\n思わずだろう、立ち上がる。
3322 = "Hibiki, và cả Paulette,\nbất giác đứng bật dậy."
# monologue
# JP: ふたりともすぐに座り直して――\n日々姫は猛然、スケッチブックに鉛筆を走らせ始める。
3070 = "Cả hai lập tức ngồi xuống lại——\nHibiki hăm hở lia bút chì trên cuốn sổ phác thảo."
# 【稀咲】
# display as 稀咲
# JP: 「例えば、隈元――[ひご,1]肥御なら肥御のものだけで統一した。\nひとつひとつを、そうした客室に作り上げる？」
2636 = "\"「Ví dụ như Kumamoto——Higo thì sẽ trang trí toàn bộ bằng những thứ của Higo.\nÝ cậu là tạo ra từng khoang hành khách mang đặc trưng riêng như vậy sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ[ひご,1]肥御なら、御一夜の木工家具。八ツ城のい草の畳。\n[あまくさ,1]雨草の焼物。[やまが,1]山家の灯籠――そうした物で調度を揃える」
2314 = "\"「Đúng vậy, nếu là Higo thì sẽ dùng đồ gỗ nội thất của Ohimitera. Chiếu cói của Yatsushiro.\nGốm sứ của Amakusa. Đèn lồng của Yamaga——chúng ta sẽ trang bị nội thất bằng những thứ đó.」\""
# 【ふかみ】
# display as 深美
# JP: 「それ……絶対、嬉しいです。自分の土地で作られた物が、\nどんなに小さいひとつでも、観光列車の中にあったら」
2785 = "\"「Chuyện đó......chắc chắn mọi người sẽ rất vui. Những món đồ được làm ra trên chính mảnh đất quê hương mình,\ndù chỉ là một món nhỏ xíu, lại xuất hiện trên chuyến tàu du lịch.」\""
# monologue
# JP: 強く頷く。\n――誰からも異論はでてこない。
3164 = "Em gật đầu mạnh mẽ.\n——Không một ai có ý kiến phản đối."
# monologue
# JP: ならば、ここを共通認識として、深めていこう。
3535 = "Nếu vậy, hãy lấy đây làm nhận thức chung và cùng đào sâu thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「客室に置きたいものや、客室を統一するコンセプトは、\nそれぞれの地域で、公募したいと考えている」
2859 = "\"「Những món đồ muốn đặt trong khoang hành khách, hay ý tưởng thống nhất cho từng khoang,\nanh dự định sẽ tổ chức kêu gọi ý kiến từ chính người dân ở các khu vực đó.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「それ！　すごくいいと思います！！　広報にもなるし、\n参加することで『自分の列車』って思ってもらえる」
2524 = "\"「Ý tưởng đó! Em thấy tuyệt lắm luôn!! Vừa mang tính quảng bá,\nlại vừa khiến người tham gia cảm thấy đây là 『Chuyến tàu của chính mình』.」\""
# 【稀咲】
# display as 稀咲
# JP: 「その上、政治的な圧力も回避できるね。\n選考も投票にして、その過程を完全に可視化するなら」
2717 = "\"「Hơn nữa, còn có thể tránh được áp lực chính trị.\nNếu việc tuyển chọn cũng được quyết định bằng cách bỏ phiếu và công khai toàn bộ quá trình.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか、そうした懸念も発生するか」
2243 = "\"「À——ra là vậy, cũng có thể phát sinh những lo ngại đó nhỉ.」\""
# 【真闇】
# display as 真闇
# JP: 「……圧力ばかけてくるような団体は、\n組織票、かならず動員してくるとよ？」
1589 = "\"「......Những tổ chức hay gây áp lực ấy,\nkiểu gì họ cũng sẽ huy động phiếu bầu theo tổ chức cho mà xem.」\""
# 【稀咲】
# display as 稀咲
# JP: 「あ」
# 2258 = "「啊」" 
# 【ふかみ】
# display as 深美
# JP: 「そこは投票の仕組みづくりでなんとかできると思います。\n日ノ本観光業組合さんが、その辺のこと、お詳しいです」
2860 = "\"「Chuyện đó em nghĩ có thể giải quyết bằng cách thiết lập cơ chế bỏ phiếu.\nHiệp hội Du lịch Hinomoto rất rành về mấy khoản này ạ.」\""
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、そこでお話教えてもらえると？」
2455 = "\"「Fukami, cậu có thể nhờ họ tư vấn được không?」\""
# 【ふかみ】
# display as 深美
# JP: 「うん。できると思う。\nっていうか、うん！　聞いてくる！」
2316 = "\"「Ừm. Tớ nghĩ là được.\nÀ không, ừm! Tớ sẽ đi hỏi họ!」\""
# monologue
# JP: なんと嬉しいことだろう。なんとこころ強いことだろう。\nこれならば、ああ――僕は、レールでいるだけでいい。
3167 = "Thật đáng mừng biết bao. Thật vững tâm biết bao.\nNếu được thế này, à——em chỉ cần làm đường ray là đủ rồi."
# monologue
# JP: 僕がレールを示すなら、\\x%l保線;#00ffc040;保線%l;#;を、信号を、運転を、司令を。\nみながそれぞれ、見事に務めてくれるのだから。
3236 = "Chỉ cần em vạch ra đường ray, thì \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, tín hiệu, vận hành, chỉ huy.\nMỗi người đều sẽ hoàn thành xuất sắc nhiệm vụ của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、客室だけではまったく足りない。ゆえ、物販や、車内サービスの品でも、同様に各地特産品を揃える」
2675 = "\"「Tất nhiên, chỉ mỗi khoang hành khách thôi thì chưa đủ. Thế nên, đồ lưu niệm hay các sản phẩm phục vụ trên tàu cũng sẽ được trang bị đặc sản của các vùng tương tự như vậy.」\""
# 【れいな】
# display as 玲奈
# JP: 「それってでもでも、\nものすごい量になっちゃいますよぉ？」
2203 = "\"「Nhưng mà nhưng mà, như thế thì\nsố lượng sẽ khổng lồ lắm đó nha~?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな。故に、各地の金看板、例えば福丘の明太子や、\n隈元の馬刺し等だけを、常設のものと位置づける」
2568 = "\"「Đúng vậy. Vì thế, chúng ta sẽ chỉ chọn những đặc sản trứ danh của các vùng làm mặt hàng cố định, ví dụ như Mentaiko của Fukuoka,\nhay Basashi của Kumamoto.」\""
# 【凪】
# display as 凪
# JP: 「寝台なら長丁場になるでしょお。\n馬刺しやら、痛んじゃうんじゃなかと？」
2552 = "\"「Nếu là tàu giường nằm thì chuyến đi sẽ dài lắm.\nMấy thứ như Basashi không sợ bị hỏng sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そこは、冷蔵車を復元新造して対応する。\n冷蔵車とは、走る冷蔵・冷凍庫のようなものだ」
2510 = "\"「Chuyện đó, chúng ta sẽ giải quyết bằng cách phục dựng và đóng mới xe đông lạnh.\nXe đông lạnh giống như một chiếc tủ lạnh, tủ đông di động vậy.」\""
# 【凪】
# display as 凪
# JP: 「わおわお！　すごかと！！　そしたらそしたら、\n九洲各地のアイスクリームも食べれちゃうばい！！」
2228 = "\"「Oa oa oa! Tuyệt quá!! Nếu vậy, nếu vậy thì,\nchúng ta còn có thể ăn cả kem của khắp các vùng Kyushu nữa!!」\""
# 【ふかみ】
# display as 深美
# JP: 「それだけじゃなくて、ジュースとか！\nあ！！　そうか、お酒、焼酎とかも」
2032 = "\"「Không chỉ thế đâu, cả nước ép trái cây nữa!\nA!! Đúng rồi, cả rượu, rượu shochu nữa.」\""
# 【真闇】
# display as 真闇
# JP: 「焼酎・お酒なら、おねえちゃんも役にたてると。\n九洲各地の酒造さんに、話ばできるけん」
2658 = "\"「Nếu là rượu shochu hay rượu các loại, chị cũng có thể giúp được đấy.\nChị có thể nói chuyện với các xưởng rượu ở khắp Kyushu mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎だ。九洲各地、それぞれ自慢の焼酎や酒を客室で。――か、可能であればビュッフェ等で」
2830 = "\"「Hoan nghênh quá đi chứ. Khách hàng có thể thưởng thức những loại rượu shochu, rượu vang hảo hạng của khắp các vùng Kyushu ngay trong khoang hành khách.——Hoặc, nếu có thể thì phục vụ ở quầy buffet.」\""
# 【日々姫】
# display as 日日姬
# JP: 「ビュッフェじゃだめ。食堂車じゃないと。\nだってこれ、時間を楽しみにして売る列車でしょ？」
2184 = "\"「Quầy buffet thì không được. Phải là toa ăn mới được.\nVì chuyến tàu này bán niềm vui của thời gian mà, đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「確かにそうだ。\nなら、食堂車を\\x%l編成;#00ffc040;編成%l;#;に加えるべきか」
2696 = "\"「Đúng là vậy.\nThế thì, có nên thêm toa ăn vào \\x%l編成;#00ffc040;đoàn tàu%l;#; không nhỉ.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「けどこれ――九洲全土を周遊しますよね？　将来的に。\nそうできなくっちゃ、意味が無い」
2194 = "\"「Nhưng mà cái này——sẽ đi vòng quanh toàn bộ Kyushu đúng không? Trong tương lai ấy.\nNếu không làm được vậy thì chẳng có ý nghĩa gì cả.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2572 = "「是啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「だとすると\\x%l編成;#00ffc040;編成%l;#;。長く大きくなりすぎると、\n列車交換、できない路線がでてきちゃうかもです」
2192 = "\"「Nếu vậy thì \\x%l編成;#00ffc040;đoàn tàu%l;#;. Nếu quá dài và quá lớn,\ncó thể sẽ có những tuyến đường không thể thực hiện tránh tàu được.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2330 = "「嗯？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「だって、今いってるだけでも、機関車、\\x%l客車;#00ffc040;客車%l;#;三輌、\n冷蔵車、食堂車。で、電源車も必要になりますよね？」
2359 = "\"「Bởi vì, chỉ tính những thứ vừa kể thôi đã có đầu máy, ba \\x%l客車;#00ffc040;toa hành khách%l;#;,\nxe đông lạnh, toa ăn. Rồi còn cần cả toa phát điện nữa đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そう考えると、今の時点で七輌か」
2584 = "\"「Đúng vậy. Tính ra thì hiện tại đã là bảy toa rồi.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「本務機が8620になるなら、\\x%l炭水車;#00ffc040;炭水車%l;#;の分もあわせて、\n実質的には八輌長」
2622 = "\"「Nếu đầu máy chính là 8620, tính thêm cả phần \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;,\nthì thực chất chiều dài sẽ tương đương tám toa.」\""
# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2288 = "\"「À——」\""
# monologue
# JP: ハチロクが沈んだ声を出す。\nつまりは僕は……何かを見落としてしまっているのか。
3073 = "Hachiroku cất giọng trầm buồn.\nNói cách khác là em......đã bỏ sót điều gì đó sao."
# 【双鉄】
# display as 雙鐵
# JP: 「その長さだと、問題があるのか？」
2793 = "\"「Độ dài đó có vấn đề gì sao?」\""
# 【ポーレット】
# display as 波萊特
# JP: 「はい。九洲の線路は、\\x%l単線;#00ffc040;単線%l;#;で、普段の運用が１、２輌。\n長くても四輌とかそういうところ、珍しくないですから」
2592 = "\"「Vâng. Các tuyến đường sắt ở Kyushu thường là \\x%l単線;#00ffc040;đường đơn%l;#;, bình thường chỉ chạy 1, 2 toa.\nNhững nơi dài nhất cũng chỉ chạy khoảng 4 toa là không hiếm đâu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2330 = "「嗯？」" 
# 【ハチロク】
# display as 八六
# JP: 「長くて四輌を想定して作られている\\x%l待避線;#00ffc040;待避線%l;#;に、\n八輌編成の列車を無理やり押し込もうとしても」
2398 = "\"「Những \\x%l待避線;#00ffc040;đường tránh tàu%l;#; được thiết kế để chứa tối đa 4 toa,\nmà cố nhét một đoàn tàu 8 toa vào thì...」\""
# 【れいな】
# display as 玲奈
# JP: 「わわわ！　はみだしちゃいますよぉ！\nそうしたら、列車、すれちがいできないですぅ」
2221 = "\"「Oa oa oa! Sẽ bị dư ra ngoài đó nha~!\nNếu vậy thì các đoàn tàu không thể tránh nhau được đâu ạ~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 2262 = "「啊！」" 
# monologue
# JP: そこは、まさしく盲点だった。
3525 = "Đó quả thực là một điểm mù."
# monologue
# JP: 線路の強度――耐えられる重さについては、\n考慮せねばと思っていたが――
3227 = "Độ bền của đường ray——về tải trọng chịu đựng,\nem đã nghĩ là cần phải xem xét, nhưng——"
# 【稀咲】
# display as 稀咲
# JP: 「そこは、ボクに。\nというか、日ノ本鉄路に任せて欲しい」
2786 = "\"「Chuyện đó, cứ để tôi.\nHay nói đúng hơn là, hãy giao cho Đường sắt Hinomoto.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2701 = "\"「Kisaki.」\""
# 【稀咲】
# display as 稀咲
# JP: 「無いものだったら、作ればいいのさ」
2396 = "\"「Nếu không có, thì tạo ra là được chứ gì.」\""
# monologue
# JP: 稀咲の軽い一言に、\nポーレットが眉根を[ひそ]顰めてしまう。
3422 = "Câu nói nhẹ bẫng của Kisaki\nkhiến Paulette phải nhíu mày."
# 【ポーレット】
# display as 波萊特
# JP: 「そう簡単にいうけど、稀咲。身の丈にあまる設備は、\n固定負担をいたずらに増やすだけだから」
2337 = "\"「Cậu nói nghe dễ thế, Kisaki. Những trang thiết bị vượt quá khả năng\nchỉ làm tăng thêm gánh nặng chi phí cố định một cách vô ích thôi.」\""
# 【稀咲】
# display as 稀咲
# JP: 「『行き違いのためだけの\\x%l待避線;#00ffc040;待避線%l;#;』で考えるなら、\n確かに、ポーレットの指摘通りになるだろうね」
2392 = "\"「Nếu chỉ nghĩ nó là 『\\x%l待避線;#00ffc040;đường tránh tàu%l;#; chỉ dùng để tránh tàu』,\nthì đúng như lời Paulette nói.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「……行き違いのためだけの\\x%l待避線;#00ffc040;待避線%l;#;じゃない――\nなら？」
1574 = "\"「......Không phải \\x%l待避線;#00ffc040;đường tránh tàu%l;#; chỉ dùng để tránh tàu——\nVậy thì?」\""
# 【稀咲】
# display as 稀咲
# JP: 「鉄道駅を、今度は観光の拠点として、再び、都市計画の\n中心に据える。復線や既存設備の改良を、そうして行う」
2432 = "\"「Lần này, chúng ta sẽ biến các nhà ga đường sắt thành trung tâm du lịch, đưa chúng trở lại\nvị trí trung tâm của quy hoạch đô thị. Việc làm lại đường ray đôi hay cải tạo thiết bị hiện có sẽ được tiến hành theo hướng đó.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「都市計画……」
2852 = "\"「Quy hoạch đô thị......」\""
# 【稀咲】
# display as 稀咲
# JP: 「『レイル・ロマネスク湯医線』――\nあれを、全ての路線でやればいいっていうお話さ」
1548 = "\"「『Đường sắt lãng mạn tuyến Yui』——\nÝ tôi là, chỉ cần áp dụng mô hình đó cho tất cả các tuyến đường là được.」\""
# monologue
# JP: ごくあっさりと言い切って、\n稀咲はニヤリと笑ってみせる。
3421 = "Khẳng định một cách hết sức nhẹ nhàng,\nKisaki nở một nụ cười nhếch mép."
# 【稀咲】
# display as 稀咲
# JP: 「"鉄道路線を、それぞれの街の、駅の、カタログに"。\nそれは、双鉄の基本アイディアだったじゃないか」
1552 = "\"「\"Biến các tuyến đường sắt thành danh mục giới thiệu của từng thành phố, từng nhà ga\".\nĐó chẳng phải là ý tưởng cơ bản của Soutetsu sao.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「けど！　鉄道会社はそれぞれだから。\n全部が全部、そこに賛成してくれるとは思えないし」
2208 = "\"「Nhưng mà! Mỗi công ty đường sắt đều hoạt động độc lập.\nTôi không nghĩ tất cả bọn họ đều sẽ đồng ý với ý tưởng đó đâu.」\""
# 【稀咲】
# display as 稀咲
# JP: 「そこは、泥臭い説得しかない。それでももしも、\nどうしても同意を得られないのなら」
2789 = "\"「Cái đó thì chỉ còn cách kiên trì thuyết phục thôi. Nhưng nếu,\ndù có làm cách nào cũng không nhận được sự đồng ý thì.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「得られないなら？」
2494 = "\"「Nếu không được thì sao?」\""
# 【稀咲】
# display as 稀咲
# JP: 「外せばいいさ。そうして、別途、新路線を作る。\nなにせこれは、観光インフラの創出っていう話だから」
2539 = "\"「Thì loại họ ra là xong. Rồi sau đó, chúng ta sẽ xây dựng tuyến đường mới riêng.\nDù sao thì đây cũng là câu chuyện tạo ra cơ sở hạ tầng du lịch mà.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2258 = "「啊」" 
# monologue
# JP: こっくり、どこかあどけないような仕草で、\nポーレットが頷く。
3348 = "Paulette gật gù, với một điệu bộ có chút gì đó ngây thơ."
# 【ポーレット】
# display as 波萊特
# JP: 「……三セクだったら、自治体を説得すればいいし。\n完全独立経営だったら、逆に、自治体の協力を得て――」
1587 = "\"「......Nếu là công ty công tư hợp doanh thì chỉ cần thuyết phục chính quyền địa phương là được.\nCòn nếu là công ty tư nhân độc lập hoàn toàn, thì ngược lại, nhờ chính quyền địa phương hợp tác——」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや、外すのはまずい」
2047 = "\"「Không, loại ra thì không ổn đâu.」\""
# monologue
# JP: 稀咲が出来るといっている。\n難色を示したポーレットも、実現可能性を検討し始めた。
3419 = "Kisaki nói là có thể làm được.\nPaulette, người vừa tỏ vẻ e ngại, cũng đã bắt đầu xem xét tính khả thi của nó."
# monologue
# JP: ならば実際できようし、\n恐らくは、成功率も低くなかろう。が――
3533 = "Nếu vậy thì thực tế chắc chắn sẽ làm được,\nvà có lẽ tỷ lệ thành công cũng không hề thấp. Nhưng——"
# 【稀咲】
# display as 稀咲
# JP: 「どうしてさ？\nボクとしては、これこそが、最適解だって思うけど？」
2644 = "\"「Tại sao chứ?\nTôi thì lại nghĩ đây chính là giải pháp tối ưu đấy?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の計算に異論はない。ないのだが――\nこの解は、最適であるにせよ、最善ではない」
2705 = "\"「Tôi không phản đối tính toán của Kisaki. Nhưng mà——\nGiải pháp này, dù là tối ưu, nhưng không phải là tốt nhất.」\""
# 【稀咲】
# display as 稀咲
# JP: 「最善？　――善、か。\nなるほどね、つまり、双鉄は」
2610 = "\"「Tốt nhất? ——Tốt, sao.\nRa là vậy, ý cậu là, Soutetsu.」\""
# 【れいな】
# display as 玲奈
# JP: 「なかまはずれをつくっちゃったら、\nみんながなかよくなれないですよぉ」
2395 = "\"「Nếu tạo ra kẻ bị bỏ rơi,\nthì mọi người sẽ không thể thân thiết với nhau được đâu ạ~」\""
# 【凪】
# display as 凪
# JP: 「そうばい！　にーさんは最初から、\nオール九洲っていうとるばい！！」
2578 = "\"「Đúng thế! Ngay từ đầu anh hai\nđã nói là Thể chế toàn Kyushu rồi mà!!」\""
# 【ふかみ】
# display as 深美
# JP: 「ですです。仲間はずれをつくると、外れたところが\n派閥作って。泥沼になるって、わたし、思います。です」
2574 = "\"「Đúng vậy đúng vậy. Nếu tạo ra kẻ bị bỏ rơi, những nơi bị loại ra\nsẽ kết bè kết phái. Em nghĩ mọi chuyện sẽ trở thành một mớ bòng bong mất.」\""
# 【稀咲】
# display as 稀咲
# JP: 「ああ……うん。\nそれはそうだね。なるほど、ボクの案は撤回しよう」
2257 = "\"「À......ừm.\nĐúng là vậy nhỉ. Hiểu rồi, tôi sẽ rút lại phương án của mình.」\""
# monologue
# JP: 稀咲はすぐさま納得してくれる。\n納得をしたその上で、あらためて整頓してくれる。
3418 = "Kisaki lập tức đồng tình.\nSau khi đồng tình, cô ấy lại một lần nữa sắp xếp lại vấn đề."
# 【稀咲】
# display as 稀咲
# JP: 「けど、そうすると。\n問題は問題として残り続ける」
2202 = "\"「Nhưng nếu làm vậy.\nVấn đề vẫn sẽ tiếp tục tồn tại.」\""
# 【ハチロク】
# display as 八六
# JP: 「……わたくし、九洲の線路について、\n湯医線しか、ほとんど存じ上げないのですが」
1594 = "\"「......Em thì, về các tuyến đường sắt ở Kyushu,\nhầu như chỉ biết mỗi tuyến Yui thôi.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「うん。なぁに？」
2336 = "\"「Ừm. Sao thế em?」\""
# 【ハチロク】
# display as 八六
# JP: 「さすがに、四輌でさえ退避できない――\nそこまでの路線は、ございませんよね？」
2044 = "\"「Nhưng chắc không đến mức, ngay cả 4 toa cũng không thể tránh tàu——\nLàm gì có tuyến đường nào như vậy đúng không ạ?」\""
# 【ポーレット】
# display as 波萊特
# JP: 「それは……さすがに無いと思います。\nもしもあっても、その程度の改修なら簡単ですし」
2787 = "\"「Cái đó......chắc là không có đâu.\nMà dù có đi nữa, thì việc cải tạo ở mức độ đó cũng đơn giản thôi.」\""
# 【ハチロク】
# display as 八六
# JP: 「でしたら、その区間では\\x%l編成;#00ffc040;編成%l;#;を二分割しましょう。\n機関車は、タンク式なり、\\x%lDL;#00ffc040;DL%l;#;なりで」
2850 = "\"「Nếu vậy, ở những đoạn đường đó, chúng ta hãy chia đôi \\x%l編成;#00ffc040;đoàn tàu%l;#; ra.\nĐầu máy thì dùng loại thùng chứa nước, hoặc \\x%lDL;#00ffc040;đầu máy diesel%l;#; cũng được.」\""
# 【日々姫】
# display as 日日姬
# JP: 「ああ！！」
2261 = "\"「A!!」\""
# monologue
# JP: 日々姫がスケッチブックの端に、\nぱぱぱとメモを書きつける。
3314 = "Hibiki nhanh chóng ghi chú lại\nlên mép cuốn sổ phác thảo."
# monologue
# JP: ＜機－客－客－客＞\n＜\\x%l補機;#00ffc040;補機%l;#;－食－冷－電＞
3589 = "＜Đầu máy - Khách - Khách - Khách＞\n＜\\x%l補機;#00ffc040;Đầu máy phụ%l;#; - Ăn - Lạnh - Điện＞"
# 【日々姫】
# display as 日日姬
# JP: 「こぎゃんとしたら！　確かに！\nA駅B駅、二箇所で行き違えばよかだけの話になると！」
2700 = "\"「Nếu làm thế này! Đúng thật!\nChỉ cần tránh tàu ở hai ga A và B là giải quyết được vấn đề rồi!」\""
# 【ハチロク】
# display as 八六
# JP: 「はい。客車列車が先発し、拠点駅でお客様に下車観光\nいただく。その間に、貨物列車があとからおいつく」
2600 = "\"「Vâng. Tàu chở khách sẽ xuất phát trước, để hành khách xuống tham quan\ntại ga trung tâm. Trong thời gian đó, tàu chở hàng sẽ đuổi theo sau.」\""
# 【日々姫】
# display as 日日姬
# JP: 「それと――冷蔵車って、冷蔵庫やけん電気使うでしょ？\nしたらそれ自体を、電源車兼務にできんと？」
2812 = "\"「Với lại——xe đông lạnh thì giống tủ lạnh nên phải dùng điện đúng không?\nVậy sao không biến nó thành xe đông lạnh kiêm luôn toa phát điện?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 2262 = "「啊！」" 
# monologue
# JP: ハチロクを見る。\n驚いたような顔をしながら――やがて、慎重に頷き返す。
3256 = "Em nhìn Hachiroku.\nEm ấy lộ vẻ ngạc nhiên——rồi từ từ, thận trọng gật đầu đáp lại."
# 【ハチロク】
# display as 八六
# JP: 「可能であるかもしれません。昨今では発電機性能なども、\n大廃線末期とは比較にならぬ進歩を遂げていましょうし」
2530 = "\"「Cũng có thể làm được đấy ạ. Ngày nay, hiệu suất của máy phát điện và các thiết bị khác,\nchắc chắn đã có những bước tiến vượt bậc so với thời kỳ cuối của Đại bãi bỏ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その方向で術仙側ともつめていこう。\n可能であれば、さらに余裕を大きなものとできようしな」
2848 = "\"「Vậy thì, chúng ta sẽ bàn bạc với phía Jussen theo hướng đó.\nNếu có thể, chúng ta sẽ càng có thêm nhiều không gian hơn.」\""
# monologue
# JP: 僕の言葉に、みなが頷く。\nただひとり――真闇姉だけを例外に。
3438 = "Mọi người đều gật đầu đồng tình với lời em nói.\nChỉ có một người duy nhất——ngoại trừ chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、反対なのか？」
2686 = "\"「Chị Mayami phản đối sao?」\""
# 【真闇】
# display as 真闇
# JP: 「あ、ううん！？　冷蔵車やら電源車やらは、\nおねーちゃんもよかアイディアって思うけど」
2273 = "\"「A, không!? Chuyện xe đông lạnh hay toa phát điện,\nchị cũng nghĩ đó là ý tưởng hay.」\""
# monologue
# JP: ほっと、日々姫の頬が赤くなる。\n日々姫の案への称賛自体は、もちろん極めて喜ばしいが。
3317 = "Đôi má Hibiki bỗng ửng hồng.\nViệc ý tưởng của Hibiki được khen ngợi, dĩ nhiên là một điều vô cùng đáng mừng. Nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その他に気がかりな点が？」
2849 = "\"「Vậy, chị còn điều gì bận tâm sao?」\""
# 【真闇】
# display as 真闇
# JP: 「うん――お客さんは、ハチロクちゃんの8620に、\n\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;に引いてもらいたくて、乗るんじゃなかと？」
2290 = "\"「Ừm——Chẳng phải khách hàng lên tàu là vì muốn được 8620 của Ha-chan,\nđược \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; kéo đi sao?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2028 = "\"「Không——」\""
# monologue
# JP: そうか、御一夜鉄道との関わりが――\nというか、鉄道との関わり自体が薄いゆえ。
3185 = "Ra là vậy, vì chị ấy ít liên quan đến Đường sắt Ohito——\nhay nói đúng hơn là ít liên quan đến đường sắt nói chung."
# monologue
# JP: 真闇姉には、そこからの説明をする必要があったのか。
3136 = "Nên em cần phải giải thích cho chị Mayami hiểu từ điểm đó."
# 【双鉄】
# display as 雙鐵
# JP: 「九洲全線を、8620だけで牽引するというのは、\n最初から不可能な話なのだ」
2136 = "\"「Việc dùng một mình 8620 để kéo tàu đi khắp toàn tuyến Kyushu,\nngay từ đầu đã là chuyện không tưởng rồi.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ――そぎゃんとね。うん。\n言われてみたら、あったりまえの話よね」
2255 = "\"「À——ra là vậy. Ừm.\nNghe em nói mới thấy, đó là chuyện hiển nhiên nhỉ.」\""
# monologue
# JP: どれだけの時間をかけて走破するかは、\nここから詰めていく話だが――
3464 = "Sẽ mất bao nhiêu thời gian để chạy hết chặng đường,\nđó là chuyện cần phải bàn bạc kỹ lưỡng từ giờ trở đi——"
# monologue
# JP: 仮に、丸二昼夜を走り続けるというだけのことでも、\n8620は、ガタガタに疲弊してしまうだろう。
3028 = "Nhưng giả sử chỉ cần chạy liên tục hai ngày hai đêm thôi,\nthì 8620 cũng sẽ rã rời và kiệt sức mất."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、機関車は交換する。できることなら、蒸機から\nディーゼル、ディーゼルから電機というように」
2354 = "\"「Thế nên, chúng ta sẽ thay đổi đầu máy. Nếu có thể, từ đầu máy hơi nước\nsang diesel, từ diesel sang đầu máy điện chẳng hạn.」\""
# 【真闇】
# display as 真闇
# JP: 「ああ――やけん、『未来行き列車』」
2253 = "\"「À——ra vậy, 『Chuyến tàu đi tới tương lai』.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。可能であれば電化復活区間では、\\x%l電車;#00ffc040;電車%l;#;で\n客車群を挟み込む――そんな\\x%l編成;#00ffc040;編成%l;#;でも走らせたい」
2298 = "\"「Ừm. Nếu có thể, ở những đoạn đường đã được điện khí hóa trở lại, anh muốn cho \\x%l電車;#00ffc040;tàu điện%l;#;\nkẹp lấy nhóm toa hành khách——anh muốn cho chạy một \\x%l編成;#00ffc040;đoàn tàu%l;#; như vậy đấy.」\""
# 【真闇】
# display as 真闇
# JP: 「おもしろかとねぇ。機関車やら\\x%l電車;#00ffc040;電車%l;#;やらで。\nお客さんたちを、過去から未来に、リレーするんね」
2721 = "\"「Thú vị thật đấy. Dùng cả đầu máy lẫn \\x%l電車;#00ffc040;tàu điện%l;#;.\nTiếp sức đưa hành khách đi từ quá khứ đến tương lai nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 2250 = "「啊——」" 
# monologue
# JP: リレー、する。\nその一言が、思考をリレーされていく。
3289 = "Tiếp sức.\nChỉ một từ đó thôi đã tiếp sức cho dòng suy nghĩ của em."
# 【双鉄】
# display as 雙鐵
# JP: 「リレートレイン・ナインスターズ。\n九洲九国を、九つの客室で周遊する観光列車」
2546 = "\"「Relay Train Nine Stars (Chuyến tàu tiếp sức Chín Ngôi Sao).\nChuyến tàu du lịch dạo quanh chín vùng Kyushu với chín khoang hành khách.」\""
# monologue
# JP: 一瞬。\n水を打ったような沈黙。
3122 = "Trong một khoảnh khắc.\nMột sự im lặng bao trùm như thể có ai hắt nước vào."
# 【凪】
# display as 凪
# JP: 「ナインスターズ！　かっこよかばい！！」
2065 = "\"「Nine Stars! Ngầu quá đi!!」\""
# 【ふかみ】
# display as 深美
# JP: 「だよね！　凪ちゃん！\nすごく、すっごくぴったりくる！」
2575 = "\"「Đúng không! Nagi!\nRất, rất là hợp luôn!」\""
# 【れいな】
# display as 玲奈
# JP: 「スターズは、お星様ですよねぇ。\nうふふぅ、ここのつのお星様」
2062 = "\"「Stars là những vì sao đúng không ạ~.\nUfufu~, chín vì sao.」\""
# 【ハチロク】
# display as 八六
# JP: 「豪華さがあり、けれども気取らず。\nまことに、素敵な名前であると、わたくしも感じます」
2373 = "\"「Vừa mang vẻ sang trọng, nhưng lại không hề phô trương.\nQuả thực, em cũng cảm thấy đây là một cái tên rất tuyệt vời.」\""
# 【稀咲】
# display as 稀咲
# JP: 「いいね。わかりやすさは大切だ。\n誰にでもイメージしやすいものは、プレゼンにも強い」
2478 = "\"「Hay đấy. Dễ hiểu là một yếu tố rất quan trọng.\nMột cái tên dễ hình dung với bất kỳ ai sẽ là một điểm mạnh khi thuyết trình.」\""
# 【真闇】
# display as 真闇
# JP: 「よかね。よか。素敵なお名前。\nおねーちゃんでも、ちょっと、乗ってみたくなっちゃう」
2045 = "\"「Được đấy. Rất được. Một cái tên tuyệt vời.\nNgay cả chị nghe xong cũng muốn thử lên ngồi một chuyến rồi.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「完璧だって思います。[いにしえ]古のブルートレインも思わせて。\n鉄道ファンにも、響く名前って思います」
2527 = "\"「Em nghĩ nó quá hoàn hảo. Khiến người ta liên tưởng đến những chuyến tàu Blue Train thời xa xưa.\nMột cái tên có thể gây được tiếng vang với cả những người hâm mộ đường sắt.」\""
# monologue
# JP: ……日々姫はものもいわないで、\nスケッチブックの次のページに、ロゴを描きはじめている。
1513 = "......Hibiki không nói một lời,\nem ấy đã bắt đầu vẽ logo lên trang tiếp theo của cuốn sổ phác thảo."
# monologue
# JP: つまりは、この上ない大絶賛だ。
3527 = "Nói cách khác, đó là một sự tán thưởng không gì sánh bằng."
# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズは、九洲九国を九日間かけ、\nゆったりと贅沢に周遊していく」
2545 = "\"「Nine Stars sẽ dành chín ngày để dạo quanh chín vùng Kyushu,\nmột chuyến du ngoạn thong thả và xa hoa.」\""
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。つまり、\nプレミアムクラスの観光列車にしたてるんだね？」
2165 = "\"「Ra là vậy. Tóm lại là,\ncậu định biến nó thành một chuyến tàu du lịch hạng cao cấp đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや。僕が当初から願っているのは、この列車を、\n家族旅行ができる列車にしたいということだ」
2051 = "\"「Không. Điều tôi mong muốn ngay từ đầu là biến chuyến tàu này\nthành một chuyến tàu dành cho những chuyến du lịch gia đình.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2310 = "「嗯」" 
# monologue
# JP: なぜだろう？\nポーレットの頷きはやけに、力強く深い。
3350 = "Tại sao nhỉ?\nPaulette gật đầu một cách vô cùng mạnh mẽ và sâu sắc."
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。そこは、最初からずっと」
2436 = "\"「Đúng vậy. Điều đó, đã luôn được giữ vững ngay từ đầu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、切符は、客室単位で売りたい。\n一人いくら、ではなく、一室いくらで」
2357 = "\"「Thế nên, tôi muốn bán vé theo đơn vị khoang hành khách.\nKhông phải là bao nhiêu tiền một người, mà là bao nhiêu tiền một khoang.」\""
# 【日々姫】
# display as 日日姬
# JP: 「20メートル級鋼製客車なら、一輌三室の一室につき、\nダブルベット二つ。エクストラも二人分はいけると」
2867 = "\"「Nếu là toa hành khách bằng thép dài 20 mét, một toa ba khoang, mỗi khoang\nsẽ có hai giường đôi. Có thể thêm hai giường phụ nữa.」\""
# 【ハチロク】
# display as 八六
# JP: 「すると、一客室に六人が眠れることとなりますか」
2076 = "\"「Vậy là, một khoang có thể ngủ được sáu người sao.」\""
# 【れいな】
# display as 玲奈
# JP: 「四人家族と、\nおじいちゃんおばあちゃんも乗れますねぇ」
2345 = "\"「Gia đình bốn người, và\ncả ông bà nữa cũng lên được luôn đó nha~」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん。無論、そこを贅沢に一人でや、\nカップルふたりでお乗りいただくのでもかまわない」
2309 = "\"「Ừm. Tất nhiên, khách hàng muốn xa xỉ thuê nguyên khoang cho một người,\nhay cho một cặp đôi thì cũng chẳng sao cả.」\""
# 【稀咲】
# display as 稀咲
# JP: 「一室、いくらで考えてるんだい？」
2026 = "\"「Cậu định giá bao nhiêu một khoang?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「食事を別料金として、一日あたり、\n九万九千九百九十九円だ」
2024 = "\"「Tiền ăn tính riêng, mỗi ngày\nsẽ là chín vạn chín ngàn chín trăm chín mươi chín yên.」\""
# 【凪】
# display as 凪
# JP: 「覚えやすかと！　お値段もナインスターズばい！！」
2678 = "\"「Dễ nhớ quá! Giá cả cũng mang đậm chất Nine Stars luôn!!」\""
# 【稀咲】
# display as 稀咲
# JP: 「六人フルに乗るのなら、交通と宿泊で一人頭\n一万六千円強――うん。家族向きともいえる値段だね」
2391 = "\"「Nếu đi đủ sáu người, thì chi phí đi lại và ăn ở mỗi người\nchỉ hơn một vạn sáu ngàn yên một chút——ừm. Cũng có thể coi là mức giá phù hợp cho gia đình.」\""
# 【ポーレット】
# display as 波萊特
# JP: 「っていうことは、\n一日・一区間単位できっぷを売るんですね？」
2072 = "\"「Có nghĩa là,\nchúng ta sẽ bán vé theo đơn vị từng ngày, từng chặng đúng không?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。九日間の長期休暇など、\nなかなかとれるものではない」
2294 = "\"「Đúng vậy. Kỳ nghỉ dài chín ngày,\nkhông phải ai cũng dễ dàng xin nghỉ được.」\""
# monologue
# JP: 一斉に。おかしいほどに一斉に、全員が頷く。
3282 = "Đồng loạt. Một cách đồng loạt đến buồn cười, tất cả mọi người đều gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、一日で一区間を九回にわけ。\nあるいは三区間ずつ三回でなど、楽しめるようにしたい」
2351 = "\"「Thế nên, tôi muốn chia thành chín chặng, mỗi chặng một ngày.\nHoặc là chia thành ba lần, mỗi lần ba chặng, để hành khách có thể tận hưởng chuyến đi.」\""
# 【凪】
# display as 凪
# JP: 「そりゃよかばい！！　凪さま、一日ずつで、\n九洲のぜぇんぶの部屋、のってみたかと！！」
2788 = "\"「Tuyệt quá đi!! Nagi-sama muốn thử đi mỗi ngày một khoang,\nđể trải nghiệm hết tất cả các khoang của Kyushu luôn!!」\""
# 【ふかみ】
# display as 深美
# JP: 「わぁ、それ素敵！！　颯馬を旅するときに颯馬部屋なら、\n旅の楽しさ、倍増しそう！」
2233 = "\"「Oa, tuyệt thật đấy!! Nếu đi du lịch Satsuma mà được ở khoang Satsuma,\nthì niềm vui của chuyến đi chắc chắn sẽ tăng lên gấp bội!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そこは……部屋割りは、希望先着順か、\nあるいは完全抽選ということになろうな」
2199 = "\"「Nhưng mà, chỗ đó......việc phân phòng, chắc sẽ phải theo thứ tự ưu tiên đăng ký trước,\nhoặc là bốc thăm hoàn toàn thôi.」\""
# 【稀咲】
# display as 稀咲
# JP: 「ならさ、双鉄。そこにはプレミアムを乗せよう。\n九日全行程を、一括で乗車される場合には――」
2550 = "\"「Vậy thì, Soutetsu. Chúng ta hãy thêm ưu đãi cao cấp vào đó đi.\nTrường hợp khách hàng mua vé trọn gói cho toàn bộ hành trình chín ngày thì——」\""
# 【ポーレット】
# display as 波萊特
# JP: 「その方は、全ての日に、自由に客室を選択できる。\n地域合わせでも、動くのが面倒なら一室固定でも」
2825 = "\"「Họ sẽ được tự do chọn khoang hành khách cho tất cả các ngày.\nCó thể chọn khoang theo vùng đang đi, hoặc nếu ngại di chuyển thì cố định một khoang cũng được.」\""
# 【稀咲】
# display as 稀咲
# JP: 「そこに、豪華なおみやげや記念品なんかもくわえて、\n通しチケットは、九十九万九千九百九十九円で」
2146 = "\"「Thêm vào đó những món quà lưu niệm, đồ kỷ niệm sang trọng,\nrồi bán vé trọn gói với giá chín mươi chín vạn chín ngàn chín trăm chín mươi chín yên.」\""
# 【真闇】
# display as 真闇
# JP: 「プレミアムフィーが約十万。高かとねぇ\nばってん――そんクラスの旅ばする人なら、出す？」
2751 = "\"「Phí ưu đãi cao cấp là khoảng mười vạn. Đắt thật đấy.\nNhưng mà——những người đi du lịch hạng đó thì họ sẽ sẵn sàng chi trả sao?」\""
# 【ポーレット】
# display as 波萊特
# JP: 「出します。絶対。\\x%l乗り鉄;#00ffc040;乗り鉄%l;#;的には、全線一気に乗車。\nそれ以外、意味はないって感じますから」
2709 = "\"「Họ sẽ trả. Chắc chắn luôn. Với những \\x%l乗り鉄;#00ffc040;người thích đi tàu%l;#;, việc đi một lèo hết toàn tuyến mới là điều quan trọng.\nNgoài ra thì chẳng còn ý nghĩa gì nữa.」\""
# 【ハチロク】
# display as 八六
# JP: 「それだけの長丁場となりますと、お食事代別料金も\nよろしいですね。ずっと食堂車では飽きますし」
2811 = "\"「Nếu là một chuyến đi dài như vậy, thì việc tính riêng tiền ăn\ncũng hợp lý ạ. Ăn mãi ở toa ăn cũng chán.」\""
# 【れいな】
# display as 玲奈
# JP: 「拠点駅での観光停車をながーくとるんですねぇ。\nお食事できたり、観光したりができちゃうように」
2828 = "\"「Chúng ta sẽ dừng lại tham quan ở các ga trung tâm thật là lâu đúng không ạ~.\nĐể hành khách có thể ăn uống và đi dạo quanh đó.」\""
# 【稀咲】
# display as 稀咲
# JP: 「御一夜温泉駅にも、箱物を一つ欲しいよね。\nナインスターズの始発駅であることを示すような施設が」
2486 = "\"「Ga suối nước nóng Ohimitera cũng cần có một công trình gì đó nhỉ.\nMột cơ sở vật chất cho thấy đây là ga xuất phát của Nine Stars.」\""
# 【日々姫】
# display as 日日姬
# JP: 「それなら！　アイディア！\nわたし、アイディアたくさんあります！！」
2847 = "\"「Nếu là cái đó! Ý tưởng!\nEm có rất nhiều ý tưởng luôn!!」\""
# monologue
# JP: ……名前を示した、それだけで。\n細部が、どんどん積み上がっていく。
1508 = "......Chỉ cần đưa ra một cái tên thôi.\nNhững chi tiết cứ thế dần dần được bồi đắp."
# monologue
# JP: 精査は無論、これから行うこととなるが――\nこれならいける。と。その実感も、積み上がってくる。
3541 = "Tất nhiên, việc kiểm tra kỹ lưỡng sẽ được tiến hành sau——\nNhưng em cảm nhận ngày càng rõ rệt rằng: Cách này chắc chắn thành công."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、この方針で詰めていこう。\n今の段階で、目に見える問題があれば教えて欲しい」
2836 = "\"「Vậy thì, chúng ta sẽ tiếp tục bàn bạc theo hướng này.\nỞ giai đoạn hiện tại, nếu có vấn đề gì dễ nhận thấy thì mọi người cứ nói nhé.」\""
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。ひとつだけよろしいでしょうか」
2861 = "\"「Ngài Soutetsu. Em có một ý kiến được không ạ?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2673 = "\"「Đương nhiên rồi.」\""
# 【ハチロク】
# display as 八六
# JP: 「ナインスターズが走り出せば、8620は、肥颯線――\n屋岳越えで、早戸へと向かうこととなるかと存じます」
2387 = "\"「Khi Nine Stars bắt đầu lăn bánh, 8620 sẽ chạy trên tuyến Hisatsu——\nvượt qua Yatake để hướng tới Hayato đúng không ạ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
# 2572 = "「是啊」" 
# 【ハチロク】
# display as 八六
# JP: 「その場合、重い車輌、冷蔵・電源車等を含む六輌を牽き、\n8620単機で走行をするというのは――」
2362 = "\"「Trong trường hợp đó, việc phải kéo sáu toa xe nặng nề, bao gồm cả xe đông lạnh và toa phát điện,\nmà chỉ dùng một đầu máy 8620 để chạy thì——」\""
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、極めて厳しいな。\nとなると、\\x%l補機;#00ffc040;補機%l;#;が必要か」
2166 = "\"「Ra là vậy, sẽ cực kỳ khó khăn nhỉ.\nNói vậy thì, cần phải có \\x%l補機;#00ffc040;đầu máy phụ%l;#; sao.」\""
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。できれば、貨物機。\n\\x%l動輪;#00ffc040;動輪%l;#;４軸の機関車であれば最適かとは存じます」
2596 = "\"「Đúng vậy ạ. Nếu được thì nên dùng đầu máy chở hàng.\nMột chiếc đầu máy có 4 trục \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; sẽ là lựa chọn tối ưu nhất.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2310 = "「嗯」" 
# monologue
# JP: ポーレットを見る。\n困ったような顔をしている。
3258 = "Em nhìn Paulette.\nCô ấy đang làm vẻ mặt có vẻ bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「実は、みかん鉄道さんで、\\x%l入換機;#00ffc040;入換機%l;#;に使ってた機関車と、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が余剰しそう、って話はあるんです」
2143 = "\"「Thực ra, bên Đường sắt Mikan có nói là\nđầu máy và \\x%lレイルロオド;#00ffc040;Railord%l;#; từng dùng làm \\x%l入換機;#00ffc040;đầu máy dồn toa%l;#; có vẻ đang bị dư thừa.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2245 = "\"「Ồ!」\""
# 【ポーレット】
# display as 波萊特
# JP: 「けど、そのこはほんとにちいちゃくて非力だから。\n寝台列車の\\x%l補機;#00ffc040;補機%l;#;とかは、とても無理だと思います」
2204 = "\"「Nhưng mà, cô bé đó thực sự rất nhỏ bé và yếu ớt.\nLàm \\x%l補機;#00ffc040;đầu máy phụ%l;#; cho tàu giường nằm thì chắc chắn là không nổi đâu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2796 = "\"「Vậy sao.」\""
# monologue
# JP: ……この計画が進捗すれば、九洲各社もこぞって\nまいてつを迎え入れ、機関車確保に走るだろう。
1525 = "......Nếu kế hoạch này tiến triển tốt, các công ty ở Kyushu chắc chắn\nsẽ đồng loạt chào đón Maitetsu và đổ xô đi tìm kiếm đầu máy."
# monologue
# JP: 電車姫様のコネでどうにかなるものか――\nうむ？
3548 = "Liệu mối quan hệ của Denshahime-sama có giúp được gì không nhỉ——\nHửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした日々姫？　何か、いいたいことがあるなら」
2112 = "\"「Sao thế Hibiki? Nếu em có chuyện gì muốn nói thì cứ nói đi.」\""
# 【日々姫】
# display as 日日姬
# JP: 「うん。あのね？　デザインで知り合っただけやけん――\n全然、まだわからない話なんだけど」
2327 = "\"「Vâng. Chuyện là vầy nhé? Bọn em chỉ mới quen nhau qua công việc thiết kế thôi——\nnên em cũng chưa biết chắc chắn thế nào đâu.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2310 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「ボロボロだけど、今の術仙でなら改修できるかもな\nデゴイチと……\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、一応、こころあたりは」
2611 = "\"「Có một chiếc D51 tơi tả, nhưng nếu là Jussen hiện tại thì có thể sửa được.\nVà......về \\x%lレイルロオド;#00ffc040;Railord%l;#;, em cũng có quen biết một người.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。素晴らしい話ではないか。その\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n当該のデゴイチの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か？」
2813 = "\"「Thật sao. Chuyện tuyệt vời thế còn gì. \\x%lレイルロオド;#00ffc040;Railord%l;#; đó,\ncó phải là \\x%lレイルロオド;#00ffc040;Railord%l;#; của chiếc D51 kia không?」\""
# 【日々姫】
# display as 日日姬
# JP: 「ううん、全然違う。[おおむた,2]雄武田のこで――自分の車両は、\n部品取りに備えて、もう走らせないって決めてるこ」
2048 = "\"「Không, hoàn toàn khác. Là một người ở Omuta——cô ấy đã quyết định\nkhông cho đầu máy của mình chạy nữa, để dành làm phụ tùng thay thế.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そのこは、デゴイチに乗務可能なのか？」
2379 = "\"「Cô bé đó, có thể làm nhiệm vụ trên D51 không?」\""
# 【日々姫】
# display as 日日姬
# JP: 「だから全然まだわからないって！\nけど――」
2536 = "\"「Thì em đã bảo là vẫn chưa biết chắc chắn mà!\nNhưng mà——」\""
# monologue
# JP: なぜだかじっと。\n日々姫はハチロクのことを見つめる。
3024 = "Chẳng hiểu sao, Hibiki cứ chằm chằm\nnhìn Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「『そのために』だし。うん。可能性はあると思う。\n御一夜鉄道で、きっと、働きたがるって思う」
2671 = "\"「Là 『Vì mục đích đó』 mà. Ừm. Em nghĩ là có khả năng đấy.\nChắc chắn cô ấy sẽ muốn làm việc ở Đường sắt Ohito.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その線をあたってみてくれ――」
2841 = "\"「Vậy thì, em thử dò hỏi xem sao nhé——」\""
# monologue
# JP: 凪だ。\n自信満々を絵に描いたような顔をして、挙手している。
3330 = "Là Nagi.\nEm ấy đang giơ tay với một khuôn mặt tự tin như thể được vẽ ra vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、凪」
2491 = "\"「Sao vậy, Nagi.」\""
# 【凪】
# display as 凪
# JP: 「凪さま、腕利きの\\x%l機関士;#00ffc040;機関士%l;#;にこころあたりあるばい」
2624 = "\"「Nagi-sama có quen biết một \\x%l機関士;#00ffc040;lái tàu%l;#; cực kỳ giỏi đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、凪にか――ああ、いや」
2642 = "\"「Không ngờ, Nagi lại——à, không.」\""
# monologue
# JP: 動物子供老人同性等々に、凪は、でたらめな人気者だ。
3144 = "Từ động vật, trẻ em, người già cho đến người cùng giới, Nagi đều được yêu mến một cách kỳ lạ."
# monologue
# JP: まして\\x%l機関士;#00ffc040;機関士%l;#;・\\x%l機関助士;#00ffc040;機関助士%l;#;としても、\nバカにならない経験を積んできている。
3331 = "Huống hồ gì với tư cách là một \\x%l機関士;#00ffc040;lái tàu%l;#; hay \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;,\nem ấy cũng đã tích lũy được một lượng kinh nghiệm không thể xem thường."
# 【双鉄】
# display as 雙鐵
# JP: 「そのこころあたりは、御一夜鉄道に？」
2120 = "\"「Người mà em quen biết đó, có muốn đến Đường sắt Ohito không?」\""
# 【凪】
# display as 凪
# JP: 「さそえばきっと来てくれるばい！\n自分の汽車と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、ほしがっとるけん」
2190 = "\"「Chỉ cần mời là chắc chắn sẽ đến thôi!\nNgười đó đang rất muốn có đầu máy và \\x%lレイルロオド;#00ffc040;Railord%l;#; của riêng mình mà.」\""
# 【ふかみ】
# display as 深美
# JP: 「って！？　まさか[ちかげ,1]千景ちゃん！！？」
2271 = "\"「Hả!? Đừng nói là bé Chikage nha!!?」\""
# 【凪】
# display as 凪
# JP: 「そうばい？」
# 2572 = "「是啊」" 
# 【ふかみ】
# display as 深美
# JP: 「あわわわわ、千景ちゃんが御一夜に来ちゃったら、\n来ちゃったらぁ」
2259 = "\"「Awa wa wa wa, nếu bé Chikage mà đến Ohimitera,\nmà đến đây thì.」\""
# monologue
# JP: ……久々に見た。\nふかみの妄想、暴走モード。
1502 = "......Lâu lắm rồi mới thấy.\nChế độ hoang tưởng, mất kiểm soát của Fukami."
# monologue
# JP: ライバル増加。とんびにあぶらげ。存在感を示さないと。\n――なにやらぶつぶつ、繰り返している。
3158 = "Thêm tình địch. Diều hâu cắp miếng đậu rán. Phải thể hiện sự tồn tại của mình mới được.\n——Em ấy cứ lầm bầm lặp đi lặp lại mấy câu gì đó."
# 【ふかみ】
# display as 深美
# JP: 「あの……\\x%l車掌;#00ffc040;車掌%l;#;」
2745 = "\"「Dạ......\\x%l車掌;#00ffc040;trưởng tàu%l;#; ạ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2330 = "「嗯？」" 
# 【ふかみ】
# display as 深美
# JP: 「それだけの長丁場の列車なら、\\x%l車掌;#00ffc040;車掌%l;#;。\nものすごく重要になりますよね？」
2555 = "\"「Nếu là một chuyến tàu dài như vậy, thì \\x%l車掌;#00ffc040;trưởng tàu%l;#;.\nSẽ trở nên vô cùng quan trọng đúng không ạ?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2572 = "「是啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「確かに、\\x%l車掌;#00ffc040;車掌%l;#;の顔はお客さまの安心感につながります。\n可能なら一人は、通し乗務の専務車掌が欲しいかもです」
2698 = "\"「Đúng vậy, khuôn mặt của \\x%l車掌;#00ffc040;trưởng tàu%l;#; sẽ mang lại cảm giác an tâm cho hành khách.\nNếu có thể, em muốn có một trưởng tàu chuyên trách đi theo suốt hành trình.」\""
# 【ふかみ】
# display as 深美
# JP: 「だったら、わたし！　それ目指します！！！\n具体的に何を準備すればいいか、おしえてください」
2844 = "\"「Nếu vậy thì, em! Em sẽ nhắm tới vị trí đó!!!\nXin hãy chỉ cho em biết cụ thể cần phải chuẩn bị những gì.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「それは本当にこころづよい。\nどうだ、ポーレット。そちらの指導も、頼めるか？」
2669 = "\"「Thế thì thật sự rất đáng tin cậy.\nSao hả Paulette. Em có thể hướng dẫn cho Fukami được không?」\""
# 【ポーレット】
# display as 波萊特
# JP: 「そのレベルだと、わたしじゃ指導できませんから……\n外部研修――うん。大丈夫。心当たりあります」
2433 = "\"「Ở mức độ đó thì em không đủ khả năng hướng dẫn đâu ạ......\nĐào tạo bên ngoài——ừm. Không sao. Em có biết một nơi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように――」
2833 = "\"「Nếu vậy thì, cứ thế mà làm——」\""
# monologue
# JP: 真闇姉を見る。\n真闇姉は、大きく、大きく頷いてくれる。
3260 = "Em nhìn chị Mayami.\nChị Mayami gật đầu thật mạnh, thật mạnh."
# monologue
# JP: 合格点をいただいた。\nであるのなら、何をためらう必要もない。
3154 = "Em đã nhận được điểm đỗ.\nNếu vậy thì chẳng có lý do gì phải do dự nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように動き出そう！！」
2839 = "\"「Nếu vậy thì, chúng ta bắt đầu hành động thôi!!」\""
# 【ハチロク】
# display as 全員
# JP: 「おー！」
2244 = "\"「Ồ!」\""
# monologue
# JP: そして、全員が動き始める。
3297 = "Và thế là, tất cả mọi người đều bắt đầu hành động."
# monologue
# JP: その片隅で、ぽつんと留まる真闇姉へと身を寄せる。
3271 = "Trong một góc phòng, em tiến lại gần chị Mayami đang đứng lặng lẽ một mình."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。こんな一日になってしまって。\n真闇姉の恩返しのためだけに使いたかったのだが」
2036 = "\"「Xin lỗi chị. Tự nhiên lại thành ra một ngày thế này.\nEm vốn muốn dành trọn ngày hôm nay chỉ để báo đáp công ơn của chị Mayami thôi.」\""
# monologue
# JP: 言えばアハっと、真闇姉が笑う。\nさもおかしそうに、軽やかに。
3268 = "Nghe em nói vậy, chị Mayami bật cười \"Aha\".\nMột nụ cười nhẹ nhàng, như thể chuyện đó buồn cười lắm vậy."
# 【真闇】
# display as 真闇
# JP: 「ううん？　もらったと。こぎゃんと素敵な、\nさいっこーの恩返し」
2033 = "\"「Không đâu? Chị nhận được rồi mà. Một sự báo đáp\ntuyệt vời nhất, xịn xò nhất luôn.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえるのはとてもうれしい。\nしかし、それでは僕の気持ちが」
2720 = "\"「Nghe chị nói vậy em vui lắm.\nNhưng mà, như thế thì lòng em vẫn chưa...」\""
# 【真闇】
# display as 真闇
# JP: 「気持ちが？　うふふっ。\nほんなら、ね？　双ちゃん」
2805 = "\"「Lòng em chưa sao? Ufufu.\nVậy thì, nhé? Sou-chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2249 = "「唔！」" 
# monologue
# JP: ほんの一瞬、蝶の羽根よりなお軽く、\n真闇姉の指先が、僕の唇に触れて、離れる。
3019 = "Chỉ trong một khoảnh khắc, còn nhẹ hơn cả cánh bướm,\nđầu ngón tay của chị Mayami chạm vào môi em, rồi rời ra."
# monologue
# JP: ただそれだけで、僕の言葉は堰き止められる。
3157 = "Chỉ vậy thôi cũng đủ chặn đứng những lời em định nói."
# 【真闇】
# display as 真闇
# JP: 「恩返しば、また今度。こん列車――\nナインスターズが走り出したら、そんときに」
2364 = "\"「Việc báo đáp, để lần sau nhé. Chuyến tàu này——\nĐợi đến khi Nine Stars bắt đầu lăn bánh, lúc đó hẵng hay.」\""
