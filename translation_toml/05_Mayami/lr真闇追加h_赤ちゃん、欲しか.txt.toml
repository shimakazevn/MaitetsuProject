# monologue
# JP: （くりっ――くりゅっ――なぜっ――さすっ）
1838 = "（揉來揉去）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふ――ん……っ――んうっ」
1095 = "「呼……啊——嗯」" 

# monologue
# JP: 亀頭をすりすり撫でてる指が、\nやんわり包皮から竿へと下がる。
1466 = "在龜頭上揉搓的手指緩緩貼著包皮摸到了肉竿。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、まだミルクだしてあげられんけん。\nそんかわり、ね？　こっちのミルクば」
1204 = "「姐姐現在還不能給你餵奶。作為替代呢，就讓這邊的奶……」" 

# monologue
# JP: （しゅこっ！！）
# 1829 = "（套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！！」
1171 = "「嗯！！！」" 

# 【真闇】
# display as 真闇
# JP: 「たくさん、たぁくさん、揉んでシゴいてあっためて、\nぎゅってぎゅーって、濃縮してあげるけんねぇ」
1243 = "「我會不停給你搓啊搓啊，讓這裡的奶都濃縮起來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1328 = "「！？」" 

# monologue
# JP: 濃縮、と今聞こえた気がした。\n僕はてっきり、絞ってもらえるものだとばかり――っ！
1542 = "我好像聽到了她說“濃縮”。我還以為她會給我榨出來——！" 

# monologue
# JP: （くにっ――くくっ――むにゅっ）
1841 = "（揉捏）" 

# 【真闇】
# display as 真闇
# JP: 「先っちょのとこの裏側ば、こんな感じになっとるとねぇ。\nおねえちゃん、ちょっとも知らなかったと」
1054 = "「前端的背面原來是這樣的啊，姐姐都不知道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ――うっ――」
1139 = "「嗚——啊——」" 

# monologue
# JP: なにか言わねばと思うが口は、乳首と乳房に塞がれている。
1550 = "我想開口說話，可是整張嘴卻被乳頭和乳房填滿了。" 

# monologue
# JP: （くにっ――くぱっ）
1837 = "（掰開）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んむぅ」
1165 = "「嗯啊」" 

# 【真闇】
# display as 真闇
# JP: 「あはっ、先っちょの割れ目ば、つまんでひろげると、\n女の子みたいにくぱぁ、くぱぁってなりよるとねぇ」
1123 = "「啊哈，把前面的這個縫隙揪著掰開的話，就跟女孩子下面一樣，一張一合的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1128 = "「啊！！！」" 

# monologue
# JP: 恥ずかしい――その感覚がぞわりと強い快感に\nすぐさま変化していくことが、よりいっそうに恥ずかしい。
1512 = "強烈的羞恥感——但是它馬上變成了快感，這樣更是助長了我的羞恥心。" 

# 【真闇】
# display as 真闇
# JP: 「上側の合わせ目から……\nこの先っちょの割れ目をつうって――」
1222 = "「從上側接縫的這個位置……滑到前端的裂縫上」" 

# monologue
# JP: （くっ――ククッ――くに）
1840 = "（揉捏滑動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！　うっ！　ふうっ！！」
1140 = "「嗚！唔！呼！！」" 

# 【真闇】
# display as 真闇
# JP: 「ああ、やっぱりこいば気持ちよかとね。ほんなら――\nんふふ、おねえちゃん、もーっとしつこくしたげるけん」
1132 = "「啊，果然這樣會很舒服啊。嘻嘻，姐姐再多給你揉揉」" 

# monologue
# JP: （くくっ――くにっ――つううううううっ）
# 1840 = "（揉捏滑動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ふっ」
1142 = "「嗯——唔——呼」" 

# 【真闇】
# display as 真闇
# JP: 「あらあら、そぎゃんよかと？　ほんなら……んっ――\n…………ぷあ。よだればたっぷり、たっぷり絡めて」
1112 = "「哎呀哎呀，讓你很舒服嗎？既然這樣……嗯…………噗啊。淋上好多好多口水」" 

# monologue
# JP: （ぬチュッ――つううううううううっっ――つりゅん！）
1858 = "（潤滑）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んむっ――フッ――むっ――ふうっ」
1166 = "「嗯嗚——呼——唔——呼」" 

# monologue
# JP: じれったい、もどかしい、亀頭だけしか弄ってもらえない。\n不満を言葉にしたいのにっ――
1490 = "好折磨，好難耐，只有龜頭被刺激到了。我很想開口表達自己的不滿——" 

# monologue
# JP: （もにゅっ――むにゅっ――ふにゅっ――くにっ）
1800 = "（一片柔軟）" 

# 【双鉄】
# display as 雙鐵
# JP: 「く……ふっ――あっ」
1094 = "「呼……呼——啊」" 

# monologue
# JP: すっかり固くなってる乳首と柔らかすぎる乳房とを、\n僕は口から離せずにいる。
1506 = "已經硬到極點的乳頭和柔軟至極的乳房依然塞在我的口中。" 

# monologue
# JP: （ちゅっ――ちゅうっ――れるっ――ちゅむっ）
1861 = "（用力吸吮）" 

# 【真闇】
# display as 真闇
# JP: 「ふあっ――ん、もうっ……まっこと、双ちゃん、\nエッチな吸い方――ばっかりで」
1098 = "「呼啊——嗯，真是的……真拿你沒辦法，吸的時候這麼色」" 

# monologue
# JP: というか、無理だ。この乳房を乳首を、舐め回しもせず\n無心に吸い続けるなどは、それこそ赤子にも無理だろう。
1558 = "我根本無法抵抗。面對如此美妙的乳房和乳頭，就算是真正的嬰兒也會忍不住去吸吮。" 

# monologue
# JP: （れるっ――ちゅぶっ――ちゅううっ――れりゅうっ）
# 1877 = "（舔來舔去）" 

# monologue
# JP: 出ない母乳を、どうしても飲みたくなるのは本能だ。\nゆえ、様々に工夫を凝らし、刺激せずにはいられないのだ。
1412 = "人類的本能讓我非常渴望根本就不會分泌出來的母乳。所以我只能用上各種手段，施加刺激。" 

# 【真闇】
# display as 真闇
# JP: 「そーちゃんが、ずーっとそぎゃんつもりなら、\nおねーちゃんも」
1220 = "「小雙，你要是打算一直這樣的話，姐姐也……」" 

# monologue
# JP: （くりゅっ――つりゅっ――ちぷっ――くりゅん）
1814 = "（反覆揉搓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んむっ――ちゅっ――れるっ――れるうっっ」
1162 = "「嗯唔——啾——啾嚕——啾嚕」" 

# 【真闇】
# display as 真闇
# JP: 「あんっっ」
1124 = "「啊嗯」" 

# monologue
# JP: にちにちと、ちゅぷちゅぷと、室内に満ちる水音は、\nその粘度と湿度を一秒ごとに増していく。のに――
1611 = "淫靡的水聲在室內迴響著。黏度和濕度都越來越高了。可是——" 

# 【真闇】
# display as 真闇
# JP: 「いいこ、いいこ。なでなで、くりくり。\nんふふっ、びくびく、気持ちよかとねー」
1283 = "「真乖，真乖。摸一摸，搓一搓。呵呵，一抖一抖的，很舒服吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ちゅむっ――ちゅっ――ンッ――はっ――ちゅううっ」
1136 = "「啾嚕——啾——嗯——呼——啾」" 

# monologue
# JP: ――決定的な刺激がこない。亀頭とカリ首、その２点だけ。\n真闇姉は宣言どおり、精液をひたすらに濃く凝縮していく。
805 = "——然而還是沒有決定性的刺激。只有龜頭和冠狀溝這兩處收到了刺激。正如真闇姐剛才說的一樣，精液正在不停地被濃縮。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。したかと？　射精。\nぴゅっぴゅっぴゅーって、たくさんたぁくさん」
1234 = "「我問你，小雙，你想射了嗎？咻咻地射出好多來吧」" 

# monologue
# JP: （きゅっ！）
# 1821 = "（吸吮）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んむっ！！」
# 1170 = "「嗯！！」" 

# 【真闇】
# display as 真闇
# JP: 「きゃんっ！」
1076 = "「呀！」" 

# monologue
# JP: 頷くかわりに乳首を吸ってべろりとねぶる。\n親指と人差し指で、ようやく締めてくれた輪は――
1540 = "我嘬一口乳頭並舔弄一下權當回應。真闇姐的拇指和食指終於套成了一個環——" 

# monologue
# JP: （しにゅっ――しこっ――そこっ――シュルッ――）
1804 = "（上下套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ンンッ――むううっ」
1143 = "「嗯——唔——嗯——唔」" 

# monologue
# JP: ひどく、ゆるくしかシゴいてくれない。\nあれほど望んだ直接刺激が、けれど拷問になっている。
1473 = "她只是很緩慢地給我套弄。這的確是我期待已久的直接刺激，但力度這麼小簡直是一種拷問。" 

# monologue
# JP: （しゅるっ――しこっ――シコッ――シニュッ――）
1866 = "（緩慢套弄）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ンッ――むっ――ンンッ――ううっ」
# 1143 = "「嗯——唔——嗯——唔」" 

# 【真闇】
# display as 真闇
# JP: 「わかっとぉ。そーちゃん」
1252 = "「我知道了，小雙」" 

# monologue
# JP: （ゆりゅう――しゅこっ――シコッ――そわああっっ）
# 1866 = "（緩慢套弄）" 

# monologue
# JP: わかっているといいつつ刺激は強くならない。\n腰が勝手に暴れるけれど、ゆるすぎる指は反応しない。
1486 = "她雖然說知道了，但是刺激還是沒有變強。我的腰不由地挺動起來，但是沒用多少力的手指還是沒有反應。" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、ね？　待って。もーちょっとだけ」
1022 = "「不過呢，你先等一下，就等一會」" 

# monologue
# JP: （ふわっ）
# 1845 = "（撫摸）" 

# monologue
# JP: 囁き。そうして指は残酷に、僕の竿から離されて――
1480 = "她在我耳邊低語。然後手指非常殘酷地鬆開了肉棒——" 

# monologue
# JP: （もにゅっ――さすうっ）
1844 = "（撫摸揉搓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んうううっっ」
1164 = "「嗯唔啊」" 

# monologue
# JP: タマから肛門。両者の間を四本指が、\nわさわさ蠢く。弄くりまわす。
1638 = "真闇姐的四根手指動來動去，撫摸著睪丸到肛門之間的位置。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの精子ば、ぎゅうぎゅうみちみちに濃くなって、\nおねえちゃんの卵子、間違いなく受精させてくれるまで」
1296 = "「等到你的精子越來越濃，可以毫無疑問地讓姐姐的卵子受精的時候」" 

# monologue
# JP: （さすっ――さわっ――ムニュッ――もみゅっ）
1812 = "（反覆愛撫）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んフッ――んっ――ふっ――むっ――んっ」
1160 = "「嗯呼——嗯——呼——唔——嗯」" 

# monologue
# JP: 熱くなってる。僕だけじゃなく、真闇姉も。\n乳首にずっと甘えていたい、その欲望に勝るほど――！！
1390 = "不僅是我在血脈僨張，真闇姐也興奮起來了。這股欲望甚至超過了想要一直吸吮乳頭的念頭！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
1186 = "「噗啊！」" 

# monologue
# JP: （むにゅうううっ！！）
1827 = "（大力揉搓！！）" 

# 【真闇】
# display as 真闇
# JP: 「きゃふっ！！！！」
1073 = "「呀啊！！！！」" 

# monologue
# JP: 耐えていた分、揉みしだく。両手をつかってやわらかに、\n揉めば揉むほど指の隙間から溢れる乳房を
1516 = "忍耐得多難受，我揉得就多用力。我用兩手大力揉著柔軟的乳房，讓乳肉從我的指縫間溢出。" 

# monologue
# JP: （もにゅっ――もミュッ――むにっ――ぐにゅんっ）
# 1838 = "（揉來揉去）" 

# 【真闇】
# display as 真闇
# JP: 「そうちゃ――双、ちゃんっ――んっ――あっ――\n赤ちゃんば――そぎゃん、エッチな――もみもみっ」
1215 = "「小雙——小雙——嗯——啊——小寶寶——不會揉得這麼色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しないよな。するわけがない。\nこれは男の、雄の――僕の、愛撫だ」
1264 = "「是不會這麼揉，當然不會。這是作為男人，作為雄性的——我的愛撫」" 

# monologue
# JP: （もみゅっ――くにゅっ――こりゅっ――もにゅうっ）
# 1838 = "（揉來揉去）" 

# monologue
# JP: 指の間から乳首を零して挟む。\nたっぷりとした重み自体に、指を埋めさせぐにぐに弄る。
1562 = "我用手指縫夾住從中露出來的乳頭，同時也用手指深深扣著這對豐滿沉重的果實。" 

# 【真闇】
# display as 真闇
# JP: 「ん……ァ――はっ――双ちゃん、双ちゃぁん」
1151 = "「嗯……啊——哈——小雙、小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「精液はもう、煮えたぎってる。\n真闇姉の準備がもしも整ってるなら――」
1249 = "「我的精液已經沸騰了。如果你準備好了的話——」" 

# monologue
# JP: ぷっくり膨らみきってる乳首。全身の汗、濃い匂い。\nわかりきってる答えだけれども、声で聞きたい。
1428 = "勃起的乳頭、遍布全身的汗水、濃濃的味道。我已經知道答案是什麼，但我還是想聽她親口說出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつでも、僕は種付けできる。真闇姉の一番奥に、\nどろっどろに粘っこい精子を、いくらだって射精する」
1259 = "「我隨時都能播種。在你的身體最深處，要我射出多少黏稠的精子都可以」" 

# 【真闇】
# display as 真闇
# JP: 「準備――ん……っふ、あ――\nおね、ちゃんの――からだも――こころ、も――」
1276 = "「準備——嗯——呼、啊——姐姐的——身體——內心——都準備好了」" 

# monologue
# JP: のろのろと真闇姉が姿勢を変える。\nおっぱいが僕から離れてしまい。その代わり――
1649 = "真闇姐緩緩改變了姿勢。乳房離我而去，取而代之來到面前的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1327 = "「！」" 

# 【真闇】
# display as 真闇
# JP: 「見ゆるや？　ね？　双ちゃん……」
1300 = "「能看見嗎，我說，小雙……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……見える。\n――くっきり、はっきり見えている」
1153 = "「嗯……能看見。每個細節我都看得清清楚楚」" 

# monologue
# JP: 枕を背中の下に敷き、そこから皿に腰を高くへ――\n真闇姉は股間を掲げて、僕の眼前に差し出している。
1632 = "真闇姐把枕頭墊在後背下面，把腰抬高——她抬起了胯部，展現在我眼前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すごいな……\nまったく触っていなかったのに、とろとろだ」
1190 = "「好濕啊……剛才完全沒有摸過這裡，卻已經是洪水泛濫了」" 

# 【真闇】
# display as 真闇
# JP: 「そんなん！　双ちゃんがあぎゃんエッチに\nおっぱいちゅうちゅうもみもみするけん」
1020 = "「不要這麼說！你剛才可是那麼煽情地吸著揉著胸部」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あぎゃんというのは」
1302 = "「要說什麼叫煽情」" 

# monologue
# JP: ひくつきとろける性器に鼻先を近づける。\nむわりと感じる雌臭さは、勃起をさらに固くさせる。
1573 = "我的鼻尖湊近了顫動著的濕潤花園。濃厚的女人氣息讓我的分身更加堅挺了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こぎゃん、だったか」
1228 = "「應該是這樣的」" 

# monologue
# JP: （ぺちゅっ）
1876 = "（舔上）" 

# 【真闇】
# display as 真闇
# JP: 「ひゃうんっ！　ちょ、双ちゃんっ！？」
1075 = "「呀嗯！喂，小雙！？」" 

# monologue
# JP: 乳房に乳首にそうしたように、\nまぁるくあけた口でぺっとり、陰核周辺を包み込む。
1492 = "如同剛才含住乳房和乳頭一樣，我把嘴張大，一口含住了陰核周圍。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　待って、いまは、おねえちゃん――\nいま、おねえちゃんぺろぺろされたらっ」
1320 = "「那個，等等，現在姐姐——你要是現在舔姐姐的話——」" 

# monologue
# JP: （ぺろっ――ちゅうううううううううっっっっ）
# 1877 = "（舔來舔去）" 

# 【真闇】
# display as 真闇
# JP: 「ふぁ！！――あっ！　あっ――んっ――ふ、あっ――\nそ、ちゃんっ――ン――おね、ちゃんの、くり、とりす」
1106 = "「呼啊！！——啊！啊――嗯――呼、啊――小雙——嗯——姐姐的、陰蒂」" 

# monologue
