[script]
# lines: 352 
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、真闇姉」
1255 = "\"「Này, chị Mayami.」\""
# monologue
# JP: 新婚旅行を終えてもどった、夫婦の寝室。\nご近所とはいえ旅は旅、帰ってっきたと強く感じる。
1594 = "Phòng ngủ của hai vợ chồng sau khi kết thúc tuần trăng mật. Dù chỉ là đi du lịch ở gần đây, nhưng chuyến đi vẫn là chuyến đi, em cảm nhận rõ rệt cảm giác trở về nhà."
# 【真闇】
# display as 真闇
# JP: 「なぁに、双ちゃん」
1028 = "\"「Sao vậy, Sou-chan.」\""
# monologue
# JP: いつもながらにまろやかな真闇姉の声。\nけれども今夜混じっているのは、まどろみではなく潤いだ。
1646 = "Giọng nói của chị Mayami vẫn êm ái như mọi khi. Nhưng đêm nay, pha lẫn trong đó không phải là sự ngái ngủ, mà là sự ướt át."
# 【双鉄】
# display as 雙鐵
# JP: 「新婚旅行を通じて、つくづく強く思ったのだが」
1316 = "\"「Qua chuyến tuần trăng mật này, em đã suy nghĩ rất nhiều.」\""
# monologue
# JP: 同じ気持ちと感じてる。\nゆえ、布団の中で思いっきりに身を寄せていく。
1478 = "Em cảm nhận được chúng em đang có cùng chung một tâm trạng. Vì thế, em nép sát người vào chị trong lớp chăn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、欲しい。真闇姉と僕とのこどもが」
1239 = "\"「Em, muốn có. Một đứa con của em và chị Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「ぁ……」
1119 = "\"「A......」\""
# monologue
# JP: 言葉の代わり。\nぎゅっと、ぎゅうっと、真闇姉が僕を抱きしめる。
1648 = "Thay cho lời nói. Chị Mayami ôm chầm lấy em thật chặt, thật chặt."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉……」
1293 = "\"「Chị Mayami......」\""
# 【真闇】
# display as 真闇
# JP: 「うちも、ほしかと。\n双ちゃんとおねえちゃんの赤ちゃん」
1232 = "\"「Chị cũng, muốn có. Em bé của Sou-chan và chị.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
1305 = "\"「Cảm ơn chị.」\""
# monologue
# JP: 感謝とともに、熱い血が、どっと股間に流れ込む。\nガチガチになった勃起を真闇姉のおまんこに押し付ける。
1462 = "Cùng với sự biết ơn, dòng máu nóng rực cuồn cuộn dồn xuống đũng quần. Em áp dương vật đã cương cứng vào âm đạo của chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、真闇姉と一緒に親になりたい。\nそうして、僕らの家族を、もう一段階成長させたい」
1238 = "\"「Em muốn cùng chị Mayami trở thành cha mẹ. Và muốn gia đình của chúng ta, phát triển thêm một bậc nữa.」\""
# 【真闇】
# display as 真闇
# JP: 「ん」
1155 = "\"「Ưm.」\""
# monologue
# JP: 伝わってくる。鼓動も。熱も。切なる願いも。\n潰れる胸のやわらかさから、トクトクと流れ込んでくる。
1580 = "Em cảm nhận được. Nhịp đập. Hơi nóng. Cả niềm mong mỏi tha thiết. Từ sự mềm mại của bộ ngực đang bị ép chặt, những cảm xúc ấy tuôn trào mạnh mẽ."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、ね？　双ちゃん」
1321 = "\"「Nếu vậy thì, nhé? Sou-chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1125 = "\"「!」\""
# monologue
# JP: 布団の中で、真闇姉の指が静かに動く。\nそうっと僕の勃起を取り出し、くびれに指を滑らせる。
1642 = "Trong chăn, những ngón tay của chị Mayami khẽ khàng chuyển động. Chị nhẹ nhàng lấy dương vật đang cương cứng của em ra, rồi trượt ngón tay dọc theo rãnh quy đầu."
# 【真闇】
# display as 真闇
# JP: 「して？　おねえちゃんのこと。\n双ちゃんとおねえちゃんの赤ちゃんの、おかあさんに」
1038 = "\"「Biến chị thành nhé? Thành mẹ của em bé của Sou-chan và chị.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1155 = "「嗯」" 
# monologue
# JP: 頷きながら、つまらぬ嫉妬を感じてしまう。\n密着しあう体と体が、あまりにやわらかく温もるゆえに。
1587 = "Vừa gật đầu, em lại vừa cảm thấy một sự ghen tị vô cớ. Bởi vì hai cơ thể đang dán sát vào nhau này quá đỗi mềm mại và ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「……」
814 = "\"「......」\""
# monologue
# JP: この豊かすぎるおっぱいを、いずれ独占できなくなる。\n未来の自分の子供相手になにを、と思う気持ちもあるが
1701 = "Đôi gò bồng đảo quá đỗi đẫy đà này, rồi sẽ có ngày em không còn được độc chiếm nữa. Dù tự nhủ rằng sao lại đi ghen tị với chính đứa con tương lai của mình chứ, nhưng mà"
# 【真闇】
# display as 真闇
# JP: 「？　どぎゃんしたと？」
1178 = "\"「? Em sao vậy?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「いや、その……」
1080 = "\"「Không, chuyện là......」\""
# monologue
# JP: あまりにもくだらぬ独占欲だ。\nとても口には出せないが、さりとて嘘もつきたくな――！
1704 = "Một tính chiếm hữu quá sức vớ vẩn. Em không thể nào nói ra được, nhưng cũng chẳng muốn nói dối——!"
# 【真闇】
# display as 真闇
# JP: 「よかとよ？　双ちゃん」
1314 = "\"「Không sao đâu? Sou-chan.」\""
# monologue
# JP: 真闇姉が僕を包んでくれる。\nおっぱいで、こえで、ぬくもりで。
1634 = "Chị Mayami ôm trọn lấy em. Bằng bộ ngực, bằng giọng nói, bằng hơi ấm của chị."
# 【真闇】
# display as 真闇
# JP: 「教えて？　どぎゃんことば、気になっちゃったか。\nおねえちゃん、なぁんでも聞いてあげるけん」
1081 = "\"「Nói chị nghe đi? Em đang bận tâm chuyện gì vậy. Chuyện gì chị cũng sẽ lắng nghe em mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1155 = "「嗯」" 
# monologue
# JP: ――真闇姉にはかなわない。\nこの状況で格好つけても、背伸びをしても仕方なかろう。
803 = "——Em không thể nào giấu được chị Mayami. Trong tình huống này, có cố ra vẻ hay cố gồng mình lên cũng chẳng ích gì."
# 【双鉄】
# display as 雙鐵
# JP: 「今は僕だけが独占している真闇姉のおっぱいを、\nいずれ僕らの赤ちゃんと共有するのかと思って少し……」
1282 = "\"「Đôi gò bồng đảo của chị Mayami mà hiện tại chỉ mình em được độc chiếm, rồi sẽ có lúc phải chia sẻ với em bé của chúng ta, nghĩ đến đó em có chút......」\""
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、ほんなら」
1115 = "\"「Ôi chà, nếu vậy thì.」\""
# monologue
# JP: （しゅるっ）
1857 = "（Tuột）"
# monologue
# JP: みなまで言わず、真闇姉は豊かな乳房を晒してくれる。\nそうして僕を膝枕して横たわらせて……
1692 = "Chưa kịp nói hết câu, chị Mayami đã phơi bày bầu ngực đẫy đà của mình ra. Rồi chị để em gối đầu lên đùi và nằm xuống......"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんが飽きちゃうまで好きにしてよかとよ？\nおねえちゃんの、おっぱい」
1035 = "\"「Cho đến khi Sou-chan chán thì em cứ tùy ý làm gì cũng được nhé? Ngực của chị ấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「飽きるなどということはありえん。が――\nもし本当に、完全に好きにしてもかまわんのなら」
1245 = "\"「Không bao giờ có chuyện em chán đâu. Nhưng mà—— Nếu thực sự em có thể hoàn toàn tùy ý làm gì cũng được.」\""
# 【真闇】
# display as 真闇
# JP: 「うん」
# 1155 = "「嗯」" 
# monologue
# JP: 柔らかな声。小さな頷き。\nふるりとふるえた乳房が優しく、僕の顔面を擦ってくれる。
1635 = "Giọng nói dịu dàng. Một cái gật đầu khẽ. Bầu ngực rung rinh nhẹ nhàng cọ vào mặt em."
# 【双鉄】
# display as 雙鐵
# JP: 「……飲んでみたい。飲みたい。\n真闇姉のおっぱい……母乳を」
817 = "\"「......Em muốn uống thử. Em muốn uống. Sữa mẹ......từ ngực của chị Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「母乳……ん――\nおねえちゃん、今はまだ出せんばってん」
1275 = "\"「Sữa mẹ......ưm—— Bây giờ chị vẫn chưa có sữa đâu.」\""
# monologue
# JP: 声がもう、しっとり潤い僕を湿らす。
1645 = "Giọng nói của chị ấy đã đượm vẻ ướt át, làm ướt sũng cả người em."
# 【真闇】
# display as 真闇
# JP: 「赤ちゃんに飲ませるときの練習ば、\nちょっと、今のうちからしておきたいかも」
1040 = "\"「Nhưng mà, luyện tập trước cho lúc cho em bé bú, chắc là từ bây giờ cũng nên làm dần đi nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ならば存分に練習してくれ。\n僕も喜んで練習台にならせてもらう」
1322 = "\"「Vậy thì chị cứ thỏa sức luyện tập đi. Em rất sẵn lòng làm vật thí nghiệm cho chị.」\""
# 【真闇】
# display as 真闇
# JP: 「はぁい。んふふっ。ほんなら、どーぞ」
1187 = "\"「Vâng ạ. Ưm fufu. Vậy thì, xin mời.」\""
# monologue
# JP: （むにゅっ）
1885 = "（Mềm）"
# monologue
# JP: まだ柔らかな乳首が唇に押し付けられる。途端――
1600 = "Đầu ngực hãy còn mềm mại áp vào môi em. Ngay lập tức——"
# monologue
# JP: （チュッ――ちゅむっ――ちゅうっ――ちゅぷっ）
1821 = "（Chụt——chùn chụt——chụt——chụp）"
# monologue
# JP: 唇が、喉が、思考するより早く反応してしまっている。\n本能的なものなのだろう――ならば、それに全てを任せる。
1460 = "Môi và cổ họng em đã phản ứng nhanh hơn cả suy nghĩ. Chắc hẳn là do bản năng——nếu vậy, em sẽ phó mặc tất cả cho nó."
# monologue
# JP: （ちゅうっ――ちゅぱっ――ちゅむっ――ちゅううっ）
# 1821 = "（吸吮）" 
# 【真闇】
# display as 真闇
# JP: 「ん……ふっ――はぁっ」
1148 = "\"「Ưm......phù——ha.」\""
# monologue
# JP: 熱くしっとり湿る息。\nほんのわずかに、亀頭にかかりくすぐったくなる。
1644 = "Hơi thở nóng hổi và ẩm ướt. Phả nhẹ vào quy đầu khiến em cảm thấy nhồn nhột."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、おくち……ん……\nまぁるく、もっとまあるく開いて」
1219 = "\"「Sou-chan, miệng em......ưm...... Mở tròn ra, mở tròn ra thêm chút nữa đi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1155 = "「嗯」" 
# monologue
# JP: 言われて気づく。夢中になってむしゃぶりついていたが故、\n真闇姉の乳房を、乳首を、斜めに咥えてしまっていたと。
1705 = "Nghe chị nói em mới nhận ra. Vì quá say sưa mút mát, mà em đã ngậm chéo bầu ngực, ngậm chéo đầu ngực của chị Mayami mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1120 = "\"「A.」\""
# monologue
# JP: いわれたとおりに口を大きく丸く開けば、\n頭を支える左手が、ゆするようにして導いてくれる。
1551 = "Em há to miệng tròn vo theo lời chị nói, bàn tay trái đang đỡ đầu em khẽ đung đưa dẫn lối."
# 【双鉄】
# display as 雙鐵
# JP: 「（はむっ）」
1330 = "\"「（Ngoạm）」\""
# monologue
# JP: 今度はまっすぐ、そうして、深く。\n乳首から乳輪全部を、口内まるごとおさめるように。
1702 = "Lần này là ngậm thẳng, và ngậm thật sâu. Như thể thu trọn toàn bộ từ đầu ngực cho đến quầng vú vào trong khoang miệng."
# 【真闇】
# display as 真闇
# JP: 「ん。いいこ、いいこ。\n双ちゃんいいこ、かわゆかこ」
1175 = "\"「Ưm. Ngoan lắm, ngoan lắm. Sou-chan ngoan lắm, bé ngoan dễ thương.」\""
# monologue
# JP: 舌の上、自然に乳首がのっかっている。\n再び勝手に、唇が喉が吸引しだす。
1402 = "Đầu ngực nằm gọn gàng trên lưỡi em một cách tự nhiên. Một lần nữa, môi và cổ họng em lại tự động mút mát."
# monologue
# JP: （チュッ――ちゅうっ――ちゅむっ――ちゅっ）
1820 = "（Chụt——chùn chụt——chụt——chụt）"
# 【真闇】
# display as 真闇
# JP: 「んふふっ、いいこ、まっこといいこ。\nかわいいかわいい、おねーちゃんの赤ちゃん」
1181 = "\"「Ưm fufu, ngoan lắm, thực sự rất ngoan. Đáng yêu quá, em bé đáng yêu của chị.」\""
# monologue
# JP: ……だけれども、吸えば吸うほど乾き飢えてきてしまう。\n僕の母乳がおっぱいが、いつまで経っても出てこないゆえ。
812 = "......Nhưng mà, càng mút em lại càng thấy khát khao hơn. Vì sữa mẹ của em, ngực của em, dù có mút bao lâu cũng chẳng thấy tiết ra giọt nào."
# monologue
# JP: （れるっ）
1879 = "（Liếm）"
# 【真闇】
# display as 真闇
# JP: 「きゃっ」
1070 = "\"「Á.」\""
# monologue
# JP: （れろっ――ちゅっ――ちゅうっ――れるうううっっ）
1877 = "（Liếm——chụt——chùn chụt——liếm liếm）"
# 【真闇】
# display as 真闇
# JP: 「ん……ふっ――」
1149 = "\"「Ưm......phù——」\""
# monologue
# JP: 舌が勝手に動いてしまう。求める母乳は出て来ぬし、\n汗の味しかしないけれども、耳から甘味が流れ込んでくる。
1569 = "Lưỡi em tự động cử động. Sữa mẹ em mong muốn chẳng thấy đâu, chỉ thấy toàn vị mồ hôi, nhưng vị ngọt ngào lại chảy vào từ đôi tai em."
# monologue
# JP: （れるう――にゅるうっ――ちゅぶっ――ちゅぱっっ）
# 1877 = "（舔來舔去）" 
# 【真闇】
# display as 真闇
# JP: 「いけん、よ――双、ちゃんっ――っ――\nそぎゃん――えっちな――いたずら、した、ら――っ！」
1016 = "\"「Không được, đâu——Sou, chan—— Trêu chọc——hư hỏng——như thế, là——!」\""
# monologue
# JP: （む。くっ――ぷりっ！　む。――くっ――ぷりゅん！）
1805 = "（Mút. Hự——nhả! Mút.——Hự——bật ra!）"
# monologue
# JP: 乳首が固く凝ってきたゆえ、歯を唇で包んだうえで、\nかるぅく噛みつき、自然と離れる強さで引っ張る。
1401 = "Đầu ngực đã bắt đầu cương cứng lại, em bọc răng bằng môi, cắn nhẹ một cái, rồi kéo với lực vừa đủ để nó tự nhiên tuột ra."
# 【真闇】
# display as 真闇
# JP: 「ちょっ、そうちゃん。ん……ふっ――めぇ、よ？\nおねえちゃんの、おっぱいで……あそん、じゃ」
1138 = "\"「Khoan đã, Sou-chan. Ưm......phù——không được, đâu? Chơi đùa......với ngực của, chị.」\""
# monologue
# JP: 叱る口調と裏腹に、声音は色を帯びている。\n母乳を飲みたい欲求に、不純な欲が混ぜられる。
1485 = "Trái ngược với giọng điệu quở trách, âm sắc của chị lại nhuốm màu dục vọng. Khao khát được uống sữa mẹ bị pha lẫn với những ham muốn không trong sáng."
# monologue
# JP: （ん――ちゅぶっ――れるっ――れるれるれるれるっ）
1818 = "（Ưm——chụt——liếm——liếm liếm liếm liếm）"
# 【真闇】
# display as 真闇
# JP: 「んうっっ――ふっ――あっ」
1167 = "\"「Ưm——phù——a.」\""
# monologue
# JP: ゆえ、吸い付きながら高速で舌を動かせば、\n真闇姉から甘やかな声が、息が漏れ出す。
1529 = "Vì thế, em vừa mút vừa đảo lưỡi ở tốc độ cao, khiến những âm thanh ngọt ngào và hơi thở của chị Mayami bật ra."
# 【真闇】
# display as 真闇
# JP: 「んもう」
1284 = "\"「Thật tình.」\""
# monologue
# JP: （しゅこっ）
1829 = "（Tuốt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1141 = "\"「!!!!」\""
# monologue
# JP: ごくごくゆるい一シゴキ。\nただそれだけで、精液がグっとこみ上げてくる。
1475 = "Một cú tuốt cực kỳ nhẹ nhàng. Chỉ vậy thôi mà tinh dịch đã cuồn cuộn dâng lên."
# 【真闇】
# display as 真闇
# JP: 「エッチないたずら、いいかげんにせんと、\nおねえちゃん、怒っちゃうけんね？」
1037 = "\"「Nếu em không dừng mấy trò trêu chọc hư hỏng này lại, chị sẽ giận đấy nhé?」\""
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1327 = "\"「!」\""
# 【真闇】
# display as 真闇
# JP: 「きゃっ！？」
1077 = "\"「Á!?」\""
# monologue
# JP: 叱られて、勃起が大きく震えてしまう。\nどくん、どくんと脈動だけを強く感じる。
1663 = "Bị mắng, dương vật đang cương cứng của em khẽ run lên. Em chỉ cảm nhận rõ từng nhịp đập thình thịch, thình thịch."
# 【真闇】
# display as 真闇
# JP: 「……こっちの方もいたずらっこ。いけんね。\nそぎゃぁん悪か暴れん坊には――んっ――」
819 = "\"「......Bạn nhỏ bên này cũng hư đốn quá. Không được đâu nhé. Với một cậu nhóc quậy phá thế này thì——ưm——」\""
# monologue
# JP: 真闇姉が指を咥える。咥えた先から溢れる唾液が、\nおっぱいの丸みにそってとろりと流れる。
1629 = "Chị Mayami ngậm ngón tay vào miệng. Nước bọt trào ra từ ngón tay chị ngậm, chảy ròng ròng dọc theo độ cong của bầu ngực."
# 【双鉄】
# display as 雙鐵
# JP: 「ん――ちゅっ――ちゅむっ――ちゅるううっっ」
1147 = "\"「Ưm——chụt——chùn chụt——chụt chụt」\""
# monologue
# JP: 乾いているゆえ、欲しくなる。\n垂れる唾液を舐め取りたくて、必死になって吸い付いて
1544 = "Vì khát, nên em càng thèm muốn hơn. Muốn liếm sạch những giọt nước bọt đang nhỏ giọt kia, em điên cuồng mút mát."
# monologue
# JP: （にゅるっ！）
1845 = "（Trơn tuột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んうっ！！」
1170 = "\"「Ưm!!」\""
# monologue
# JP: 亀頭を、ちゅるんと撫ぜられる。\n唾液にまみれた真闇姉の指先が――
1718 = "Quy đầu của em bị vuốt ve một cách trơn tuột. Bằng những ngón tay ướt đẫm nước bọt của chị Mayami——"
# 【真闇】
# display as 真闇
# JP: 「んふふっ、今度はとっても素直。\n気持ちよかとねー。いいこ、いいこ」
1183 = "\"「Ưm fufu, lần này thì ngoan ngoãn lắm. Sướng lắm đúng không. Ngoan lắm, ngoan lắm.」\""
# monologue
# JP: （くりっ――くりゅっ――なぜっ――さすっ）
1838 = "（Miết——miết——vuốt——xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふ――ん……っ――んうっ」
1095 = "\"「Phù——ưm......——ưm.」\""
# monologue
# JP: 亀頭をすりすり撫でてる指が、\nやんわり包皮から竿へと下がる。
1466 = "Ngón tay đang mơn trớn quy đầu, nhẹ nhàng trượt từ bao quy đầu xuống dọc thân dương vật."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、まだミルクだしてあげられんけん。\nそんかわり、ね？　こっちのミルクば」
1204 = "\"「Chị vẫn chưa có sữa cho em bú được. Thay vào đó, nhé? Sữa bên này của em.」\""
# monologue
# JP: （しゅこっ！！）
# 1829 = "（套弄）" 
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！！」
1171 = "\"「Ưm!!!」\""
# 【真闇】
# display as 真闇
# JP: 「たくさん、たぁくさん、揉んでシゴいてあっためて、\nぎゅってぎゅーって、濃縮してあげるけんねぇ」
1243 = "\"「Chị sẽ nắn bóp, tuốt lột, ủ ấm thật nhiều, thật nhiều, rồi vắt thật chặt, thật chặt, cô đặc nó lại cho em nhé.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1328 = "\"「!?」\""
# monologue
# JP: 濃縮、と今聞こえた気がした。\n僕はてっきり、絞ってもらえるものだとばかり――っ！
1542 = "Cô đặc, hình như em vừa nghe thấy từ đó. Em cứ tưởng là sẽ được vắt kiệt chứ——!"
# monologue
# JP: （くにっ――くくっ――むにゅっ）
1841 = "（Nắn——bóp——nhào）"
# 【真闇】
# display as 真闇
# JP: 「先っちょのとこの裏側ば、こんな感じになっとるとねぇ。\nおねえちゃん、ちょっとも知らなかったと」
1054 = "\"「Mặt dưới của phần đỉnh nó trông như thế này nhỉ. Chị chẳng biết gì luôn đấy.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「むっ――うっ――」
1139 = "\"「Ưm——hự——」\""
# monologue
# JP: なにか言わねばと思うが口は、乳首と乳房に塞がれている。
1550 = "Em định nói gì đó nhưng miệng đã bị đầu ngực và bầu ngực chặn lại mất rồi."
# monologue
# JP: （くにっ――くぱっ）
1837 = "（Nắn——vạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「んむぅ」
1165 = "\"「Ưm.」\""
# 【真闇】
# display as 真闇
# JP: 「あはっ、先っちょの割れ目ば、つまんでひろげると、\n女の子みたいにくぱぁ、くぱぁってなりよるとねぇ」
1123 = "\"「Aha, rãnh ở phần đỉnh này, nếu bóp rồi vạch ra, thì nó cũng mở ra mở vào y y như của con gái ấy nhỉ.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1128 = "\"「!!!」\""
# monologue
# JP: 恥ずかしい――その感覚がぞわりと強い快感に\nすぐさま変化していくことが、よりいっそうに恥ずかしい。
1512 = "Xấu hổ quá——cảm giác đó lập tức chuyển hóa thành một khoái cảm mãnh liệt, điều đó lại càng khiến em thấy xấu hổ hơn nữa."
# 【真闇】
# display as 真闇
# JP: 「上側の合わせ目から……\nこの先っちょの割れ目をつうって――」
1222 = "\"「Từ rãnh nối phía trên...... Trượt qua cái rãnh ở phần đỉnh này——」\""
# monologue
# JP: （くっ――ククッ――くに）
1840 = "（Bóp——nắn——xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ！　うっ！　ふうっ！！」
1140 = "\"「Ưm! Hự! Phù!!」\""
# 【真闇】
# display as 真闇
# JP: 「ああ、やっぱりこいば気持ちよかとね。ほんなら――\nんふふ、おねえちゃん、もーっとしつこくしたげるけん」
1132 = "\"「A, quả nhiên làm thế này thì sướng lắm nhỉ. Vậy thì—— Ưm fufu, chị sẽ làm dai dẳng hơn nữa cho em nhé.」\""
# monologue
# JP: （くくっ――くにっ――つううううううっ）
# 1840 = "（揉捏滑動）" 
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ふっ」
1142 = "\"「Ưm——hự——phù.」\""
# 【真闇】
# display as 真闇
# JP: 「あらあら、そぎゃんよかと？　ほんなら……んっ――\n…………ぷあ。よだればたっぷり、たっぷり絡めて」
1112 = "\"「Ôi chà, sướng đến thế cơ à? Vậy thì......ưm—— ............Phù. Bôi thật nhiều, thật nhiều nước bọt vào nhé.」\""
# monologue
# JP: （ぬチュッ――つううううううううっっ――つりゅん！）
1858 = "（Nhóp nhép——trượt dàiiiiiiiii——trơn tuột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んむっ――フッ――むっ――ふうっ」
1166 = "\"「Ưm——phù——hự——phù.」\""
# monologue
# JP: じれったい、もどかしい、亀頭だけしか弄ってもらえない。\n不満を言葉にしたいのにっ――
1490 = "Thật bứt rứt, thật khó chịu, chị ấy chỉ mơn trớn mỗi quy đầu. Em muốn thốt lên sự bất mãn này——"
# monologue
# JP: （もにゅっ――むにゅっ――ふにゅっ――くにっ）
1800 = "（Nắn nắn——bóp bóp——xoa xoa——nhào nhào）"
# 【双鉄】
# display as 雙鐵
# JP: 「く……ふっ――あっ」
1094 = "\"「Ư......phù——a.」\""
# monologue
# JP: すっかり固くなってる乳首と柔らかすぎる乳房とを、\n僕は口から離せずにいる。
1506 = "Đầu ngực đã trở nên cứng ngắc và bầu ngực thì quá đỗi mềm mại, khiến em không thể nào rời môi ra được."
# monologue
# JP: （ちゅっ――ちゅうっ――れるっ――ちゅむっ）
1861 = "（Chụt——chùn chụt——liếm——chụt）"
# 【真闇】
# display as 真闇
# JP: 「ふあっ――ん、もうっ……まっこと、双ちゃん、\nエッチな吸い方――ばっかりで」
1098 = "\"「Phù——ưm, thật tình......Sou-chan, toàn mút kiểu hư hỏng——không à.」\""
# monologue
# JP: というか、無理だ。この乳房を乳首を、舐め回しもせず\n無心に吸い続けるなどは、それこそ赤子にも無理だろう。
1558 = "Hay nói đúng hơn là, không thể nào. Không liếm láp bầu ngực và đầu ngực này mà cứ vô tư mút mãi, thì đến trẻ con cũng chẳng làm được."
# monologue
# JP: （れるっ――ちゅぶっ――ちゅううっ――れりゅうっ）
# 1877 = "（舔來舔去）" 
# monologue
# JP: 出ない母乳を、どうしても飲みたくなるのは本能だ。\nゆえ、様々に工夫を凝らし、刺激せずにはいられないのだ。
1412 = "Dù sữa không ra, nhưng bản năng vẫn khao khát được uống. Thế nên, em không thể không dùng đủ mọi cách để kích thích nó."
# 【真闇】
# display as 真闇
# JP: 「そーちゃんが、ずーっとそぎゃんつもりなら、\nおねーちゃんも」
1220 = "\"「Nếu Sou-chan cứ định làm thế mãi, thì chị cũng...」\""
# monologue
# JP: （くりゅっ――つりゅっ――ちぷっ――くりゅん）
1814 = "（Miết——trượt——chụt——xoay）"
# 【双鉄】
# display as 雙鐵
# JP: 「んむっ――ちゅっ――れるっ――れるうっっ」
1162 = "\"「Ưm——chụt——liếm——liếm liếm.」\""
# 【真闇】
# display as 真闇
# JP: 「あんっっ」
1124 = "\"「A.」\""
# monologue
# JP: にちにちと、ちゅぷちゅぷと、室内に満ちる水音は、\nその粘度と湿度を一秒ごとに増していく。のに――
1611 = "Tiếng nhóp nhép, chùn chụt của nước vang dội khắp căn phòng, độ nhớt và độ ẩm cứ tăng lên theo từng giây. Thế mà——"
# 【真闇】
# display as 真闇
# JP: 「いいこ、いいこ。なでなで、くりくり。\nんふふっ、びくびく、気持ちよかとねー」
1283 = "\"「Ngoan lắm, ngoan lắm. Vuốt vuốt, xoa xoa. Ưm fufu, giật giật rồi kìa, sướng lắm đúng không.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ちゅむっ――ちゅっ――ンッ――はっ――ちゅううっ」
1136 = "\"「Chụt——chụt——ưm——ha——chùn chụt.」\""
# monologue
# JP: ――決定的な刺激がこない。亀頭とカリ首、その２点だけ。\n真闇姉は宣言どおり、精液をひたすらに濃く凝縮していく。
805 = "——Kích thích quyết định vẫn chưa đến. Chỉ có quy đầu và rãnh quy đầu, hai điểm đó thôi. Đúng như lời đã tuyên bố, chị Mayami chỉ mải miết cô đặc tinh dịch của em lại."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。したかと？　射精。\nぴゅっぴゅっぴゅーって、たくさんたぁくさん」
1234 = "\"「Nè? Sou-chan. Em muốn làm không? Bắn tinh ấy. Bắn thật nhiều, thật nhiều ra.」\""
# monologue
# JP: （きゅっ！）
# 1821 = "（吸吮）" 
# 【双鉄】
# display as 雙鐵
# JP: 「んむっ！！」
# 1170 = "「嗯！！」" 
# 【真闇】
# display as 真闇
# JP: 「きゃんっ！」
1076 = "\"「Á!」\""
# monologue
# JP: 頷くかわりに乳首を吸ってべろりとねぶる。\n親指と人差し指で、ようやく締めてくれた輪は――
1540 = "Thay cho cái gật đầu, em mút lấy đầu ngực rồi liếm một vòng. Cuối cùng thì vòng tròn được tạo bởi ngón cái và ngón trỏ của chị cũng siết lại——"
# monologue
# JP: （しにゅっ――しこっ――そこっ――シュルッ――）
1804 = "（Tuốt——tuốt——chà——tuột——）"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ンンッ――むううっ」
1143 = "\"「Ưm——hự——ưm——ưm.」\""
# monologue
# JP: ひどく、ゆるくしかシゴいてくれない。\nあれほど望んだ直接刺激が、けれど拷問になっている。
1473 = "Chị ấy chỉ tuốt lột một cách cực kỳ hờ hững. Kích thích trực tiếp mà em khao khát đến thế, giờ đây lại trở thành một cực hình."
# monologue
# JP: （しゅるっ――しこっ――シコッ――シニュッ――）
1866 = "（Tuột——tuốt——tuốt——tuốt——）"
# 【双鉄】
# display as 雙鐵
# JP: 「ンッ――むっ――ンンッ――ううっ」
# 1143 = "「嗯——唔——嗯——唔」" 
# 【真闇】
# display as 真闇
# JP: 「わかっとぉ。そーちゃん」
1252 = "\"「Chị biết mà. Sou-chan.」\""
# monologue
# JP: （ゆりゅう――しゅこっ――シコッ――そわああっっ）
# 1866 = "（緩慢套弄）" 
# monologue
# JP: わかっているといいつつ刺激は強くならない。\n腰が勝手に暴れるけれど、ゆるすぎる指は反応しない。
1486 = "Miệng thì bảo biết, nhưng kích thích vẫn chẳng mạnh lên chút nào. Hông em tự động nảy lên dữ dội, nhưng những ngón tay quá đỗi hời hợt kia chẳng hề đáp lại."
# 【真闇】
# display as 真闇
# JP: 「ばってん、ね？　待って。もーちょっとだけ」
1022 = "\"「Nhưng mà, nhé? Đợi đã. Chờ thêm chút xíu nữa thôi.」\""
# monologue
# JP: （ふわっ）
# 1845 = "（撫摸）" 
# monologue
# JP: 囁き。そうして指は残酷に、僕の竿から離されて――
1480 = "Tiếng thì thầm. Rồi những ngón tay tàn nhẫn rời khỏi dương vật của em——"
# monologue
# JP: （もにゅっ――さすうっ）
1844 = "（Nắn nắn——xoa xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「んうううっっ」
1164 = "\"「Ưm.」\""
# monologue
# JP: タマから肛門。両者の間を四本指が、\nわさわさ蠢く。弄くりまわす。
1638 = "Từ tinh hoàn đến hậu môn. Bốn ngón tay nhung nhúc luồn lách giữa hai nơi đó. Trêu đùa vần vò."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの精子ば、ぎゅうぎゅうみちみちに濃くなって、\nおねえちゃんの卵子、間違いなく受精させてくれるまで」
1296 = "\"「Cho đến khi tinh trùng của Sou-chan trở nên đặc sệt chật ních, và chắc chắn sẽ thụ tinh cho trứng của chị mới thôi.」\""
# monologue
# JP: （さすっ――さわっ――ムニュッ――もみゅっ）
1812 = "（Xoa——chạm——nắn——bóp）"
# 【双鉄】
# display as 雙鐵
# JP: 「んフッ――んっ――ふっ――むっ――んっ」
1160 = "\"「Ưm——ưm——phù——hự——ưm.」\""
# monologue
# JP: 熱くなってる。僕だけじゃなく、真闇姉も。\n乳首にずっと甘えていたい、その欲望に勝るほど――！！
1390 = "Nóng quá. Không chỉ mình em, mà cả chị Mayami cũng vậy. Đến mức vượt qua cả khao khát muốn làm nũng mãi với đầu ngực của chị——!!"
# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
1186 = "\"「Phù!」\""
# monologue
# JP: （むにゅうううっ！！）
1827 = "（Nhào nặn!!）"
# 【真闇】
# display as 真闇
# JP: 「きゃふっ！！！！」
1073 = "\"「Kya!!」\""
# monologue
# JP: 耐えていた分、揉みしだく。両手をつかってやわらかに、\n揉めば揉むほど指の隙間から溢れる乳房を
1516 = "Bù đắp cho khoảng thời gian nhẫn nhịn, em ra sức nắn bóp. Dùng cả hai tay nhào nặn thật mềm mại, càng bóp, bầu ngực càng trào ra qua kẽ tay."
# monologue
# JP: （もにゅっ――もミュッ――むにっ――ぐにゅんっ）
# 1838 = "（揉來揉去）" 
# 【真闇】
# display as 真闇
# JP: 「そうちゃ――双、ちゃんっ――んっ――あっ――\n赤ちゃんば――そぎゃん、エッチな――もみもみっ」
1215 = "\"「Sou-cha——Sou, chan——ưm——a—— Em bé——hư hỏng quá——bóp bóp.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「しないよな。するわけがない。\nこれは男の、雄の――僕の、愛撫だ」
1264 = "\"「Sẽ không làm thế đâu nhỉ. Làm sao mà làm thế được. Đây là màn dạo đầu của một người đàn ông, của một giống đực——của anh.」\""
# monologue
# JP: （もみゅっ――くにゅっ――こりゅっ――もにゅうっ）
# 1838 = "（揉來揉去）" 
# monologue
# JP: 指の間から乳首を零して挟む。\nたっぷりとした重み自体に、指を埋めさせぐにぐに弄る。
1562 = "Để đầu ngực lọt qua kẽ tay rồi kẹp chặt lại. Chôn vùi những ngón tay vào sức nặng đẫy đà ấy mà nắn bóp liên tục."
# 【真闇】
# display as 真闇
# JP: 「ん……ァ――はっ――双ちゃん、双ちゃぁん」
1151 = "\"「Ưm......a——ha——Sou-chan, Sou-chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「精液はもう、煮えたぎってる。\n真闇姉の準備がもしも整ってるなら――」
1249 = "\"「Tinh dịch đã sôi sùng sục cả lên rồi. Nếu chị Mayami đã chuẩn bị xong xuôi——」\""
# monologue
# JP: ぷっくり膨らみきってる乳首。全身の汗、濃い匂い。\nわかりきってる答えだけれども、声で聞きたい。
1428 = "Đầu ngực đã sưng phồng lên hết cỡ. Mồ hôi ướt đẫm toàn thân, mùi hương nồng nặc. Một câu trả lời đã quá rõ ràng, nhưng em vẫn muốn được nghe chính miệng chị nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「いつでも、僕は種付けできる。真闇姉の一番奥に、\nどろっどろに粘っこい精子を、いくらだって射精する」
1259 = "\"「Bất cứ lúc nào, anh cũng có thể gieo giống được. Vào tận nơi sâu nhất của chị Mayami, anh sẽ bắn ra bao nhiêu tinh trùng đặc sệt và nhớp nháp cũng được.」\""
# 【真闇】
# display as 真闇
# JP: 「準備――ん……っふ、あ――\nおね、ちゃんの――からだも――こころ、も――」
1276 = "\"「Chuẩn bị——ưm......phù, a—— Cơ thể——của chị——cả trái tim, nữa——」\""
# monologue
# JP: のろのろと真闇姉が姿勢を変える。\nおっぱいが僕から離れてしまい。その代わり――
1649 = "Chị Mayami chậm chạp thay đổi tư thế. Bầu ngực rời khỏi em. Thay vào đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1327 = "「！」" 
# 【真闇】
# display as 真闇
# JP: 「見ゆるや？　ね？　双ちゃん……」
1300 = "\"「Nhìn thấy không? Nè? Sou-chan......」\""
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……見える。\n――くっきり、はっきり見えている」
1153 = "\"「À......thấy rồi. ——Nhìn thấy rất rõ, rất rành mạch.」\""
# monologue
# JP: 枕を背中の下に敷き、そこから皿に腰を高くへ――\n真闇姉は股間を掲げて、僕の眼前に差し出している。
1632 = "Kê gối dưới lưng, từ đó nâng hông lên cao hơn nữa—— Chị Mayami nâng cao hạ bộ, phơi bày ra ngay trước mắt em."
# 【双鉄】
# display as 雙鐵
# JP: 「すごいな……\nまったく触っていなかったのに、とろとろだ」
1190 = "\"「Tuyệt quá...... Anh chưa hề chạm vào, thế mà đã ướt sũng rồi.」\""
# 【真闇】
# display as 真闇
# JP: 「そんなん！　双ちゃんがあぎゃんエッチに\nおっぱいちゅうちゅうもみもみするけん」
1020 = "\"「Còn không phải tại! Sou-chan cứ mút mát nắn bóp ngực chị một cách hư hỏng như thế.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「あぎゃんというのは」
1302 = "\"「Như thế là sao cơ.」\""
# monologue
# JP: ひくつきとろける性器に鼻先を近づける。\nむわりと感じる雌臭さは、勃起をさらに固くさせる。
1573 = "Em kề mũi lại gần bộ phận sinh dục đang co giật và ướt đẫm. Mùi hương ngai ngái phả vào mũi càng làm dương vật của em thêm cương cứng."
# 【双鉄】
# display as 雙鐵
# JP: 「こぎゃん、だったか」
1228 = "\"「Là thế này, phải không.」\""
# monologue
# JP: （ぺちゅっ）
1876 = "（Chụt）"
# 【真闇】
# display as 真闇
# JP: 「ひゃうんっ！　ちょ、双ちゃんっ！？」
1075 = "\"「Hyaun! Khoan, Sou-chan!?」\""
# monologue
# JP: 乳房に乳首にそうしたように、\nまぁるくあけた口でぺっとり、陰核周辺を包み込む。
1492 = "Giống như những gì đã làm với bầu ngực và đầu ngực, em há to miệng tròn vo rồi mút trọn lấy vùng xung quanh âm vật."
# 【真闇】
# display as 真闇
# JP: 「ね？　待って、いまは、おねえちゃん――\nいま、おねえちゃんぺろぺろされたらっ」
1320 = "\"「Nè? Đợi đã, bây giờ, chị—— Bây giờ, nếu bị liếm láp thế này thì.」\""
# monologue
# JP: （ぺろっ――ちゅうううううううううっっっっ）
# 1877 = "（舔來舔去）" 
# 【真闇】
# display as 真闇
# JP: 「ふぁ！！――あっ！　あっ――んっ――ふ、あっ――\nそ、ちゃんっ――ン――おね、ちゃんの、くり、とりす」
1106 = "\"「Phù!!——A! A——ưm——phù, a—— Sou, chan——ưm——âm, vật, của, chị.」\""
# monologue
# JP: （れるっ――れろっ――にゅるうっ――ぬじゅるっっ）
1817 = "（Liếm——liếm——nhóp nhép——nhóp nhép）"
# 【真闇】
# display as 真闇
# JP: 「やっ――らめっ――そう、ちゃんっ――ッッ――\nもう、おね、ちゃん――できあがっとる――けんっっ」
1067 = "\"「A——không được——Sou, chan—— Chị——đã sẵn sàng——lắm rồi——」\""
# monologue
# JP: （ねぶっ！　ちゅううっ！！　れるれるれろれろっっ）
# 1877 = "（舔來舔去）" 
# 【真闇】
# display as 真闇
# JP: 「だめっ――やっ、めっ――イっちゃうの――やあっ！\nおねえ、ちゃん――双ちゃんっ――双ちゃんとぉぉ！」
1013 = "\"「Không được——dừng, lại——ra mất——á! Chị——Sou-chan——cùng với Sou-chan cơ!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1108 = "\"「!!」\""
# monologue
# JP: 精液を濃縮しているその間、真闇姉もずっと我慢していた。\n理解はすぐさまこころへ身体へ伝わっていく。
1465 = "Trong lúc cô đặc tinh dịch của em, chị Mayami cũng đã luôn cố gắng nhẫn nhịn. Sự thấu hiểu đó lập tức truyền đến cả trái tim và cơ thể em."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉」
1294 = "\"「Chị Mayami.」\""
# monologue
# JP: 絶対、真闇姉を妊娠させる。\n改めて強く意識をすれば、意識が次なる理解を招く。
1526 = "Nhất định, sẽ làm cho chị Mayami mang thai. Khi ý thức mãnh liệt điều đó một lần nữa, nó lại dẫn đến một sự thấu hiểu tiếp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「こんなに\n高くいやらしく股間をもちあげてくれているのは」
1024 = "\"「Việc chị nâng hạ bộ lên cao và khiêu gợi đến thế này là.」\""
# monologue
# JP: （ぴとっ）
1890 = "（Chạm）"
# 【真闇】
# display as 真闇
# JP: 「はっ――あっ」
1109 = "\"「Ha——a.」\""
# monologue
# JP: ぐしょ濡れの膣口に亀頭を接触させて、けれど、挿れない。\n大陰唇の割れ目に添わせ、長さいっぱいに遅く擦る。
1564 = "Áp quy đầu vào cửa mình ướt sũng, nhưng em không đút vào. Em trượt dọc theo rãnh môi lớn, cọ xát thật chậm rãi hết chiều dài của nó."
# monologue
# JP: （ズッ――りゅっ――）
1856 = "（Trượt——miết——）"
# 【真闇】
# display as 真闇
# JP: 「や……あぁ――焦らしちゃ、やぁ」
1068 = "\"「A......aa——đừng trêu chọc chị nữa, mà.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「この角度なら、精液が極めて逆流しづらい。\nそう考えてくれてのことか」
1270 = "\"「Với góc độ này, tinh dịch sẽ rất khó bị chảy ngược ra ngoài. Là chị đã nghĩ như vậy sao.」\""
# monologue
# JP: （りゅうううううっ――――くっ――ぶぢゅっ）
# 1856 = "（滑動摩擦）" 
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと！　――だって、だって、おねえちゃん」
1266 = "\"「Đúng thế đấy! ——Tại vì, tại vì, chị.」\""
# monologue
# JP: 行き道をそのまま戻り、膣口へ僅かに食い込ませた亀頭に、\n真闇姉の震えが、期待が伝わってくる。
1584 = "Trượt ngược lại đường cũ, khi quy đầu vừa hơi lún vào cửa mình, em cảm nhận được sự run rẩy, sự mong đợi của chị Mayami truyền đến."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃん――赤ちゃん、欲しか。\n双ちゃんとおねえちゃんの赤ちゃん――欲しいけん」
1200 = "\"「Chị——muốn có, em bé. Em bé của Sou-chan và chị——chị muốn có.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「僕も全く、同じ気持ちだ」
1230 = "\"「Anh cũng, hoàn toàn có cùng suy nghĩ đó.」\""
# monologue
# JP: じわ、じわと。勃起が膣に呑み込まれていく。\n真闇姉の膣のわななきが、僕を招いてくれている。
1666 = "Chầm chậm, chầm chậm. Dương vật cương cứng đang dần bị âm đạo nuốt chửng. Sự co bóp của âm đạo chị Mayami đang mời gọi em."
# monologue
# JP: （ずっ――りゅっ――くっ――むにゅっっ）
1843 = "（Lún——trượt——hự——mềm）"
# 【真闇】
# display as 真闇
# JP: 「はっ――あっ――そう、ちゃっっ――あっ――\nフッ――あっ――やけ、るっ――やけ、ちゃうっっ」
1091 = "\"「Ha——a——Sou, chan——a—— Phù——a——nóng, quá——nóng, chảy mất.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉も、だっ――くっ――はっ――\nじゅくじゅくで、どろ、どろ、で――」
1292 = "\"「Chị Mayami cũng, vậy——hự——ha—— Ướt sũng, nhầy, nhụa, rồi——」\""
# monologue
# JP: すでに堪えてる射精の代わりというように、\n汗がぶわぶわ、毛穴という毛穴から吹き出してくる。
1607 = "Như để thay thế cho tinh dịch đang bị kìm nén, mồ hôi túa ra đầm đìa từ từng lỗ chân lông."
# 【双鉄】
# display as 雙鐵
# JP: 「熱い――暑い……ものすごく――いつもどおりの、\nじゅくじゅくで、どろどろの膣内なのに――」
1194 = "\"「Nóng——nóng quá......vô cùng——Bên trong âm đạo ướt sũng và nhầy nhụa như mọi khi, thế mà——」\""
# monologue
# JP: 同時にぎゅうぎゅう絞られている。発熱をしたナメクジが、\n密集しすぎて逃げ出す先を求めてうねっているような――
1665 = "Đồng thời em cũng bị siết chặt. Cảm giác như những con sên đang phát sốt vì quá đông đúc mà quằn quại tìm đường thoát thân vậy——"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1125 = "「啊！」" 
# monologue
# JP: 油断をすればすぐさま精を絞られる。\nけれどもまさか、こんなに早く、浅くでイケない。
1392 = "Chỉ cần lơ là một chút là tinh dịch sẽ bị vắt kiệt ngay lập tức. Nhưng không thể nào, không thể ra nhanh và nông thế này được."
# 【真闇】
# display as 真闇
# JP: 「はっ――あっ――双ちゃん、双ちゃんっ――ンッ――\nはっ――焦らさ、ないでっ――もっと、奥っ――までっ」
1092 = "\"「Ha——a——Sou-chan, Sou-chan——ưm—— Ha——đừng, trêu chọc nữa——vào, sâu——hơn nữa đi.」\""
# monologue
# JP: （そうしたいのは、やまやま、なのだがっ――）
1831 = "（Anh cũng, muốn thế, lắm chứ——）"
# monologue
# JP: 声を出せない。歯を食いしばってしまってる。\n腰ではなくて尻の穴。そこを意識し、引き締める。
1583 = "Không thể thốt nên lời. Em đang phải cắn chặt răng. Không phải hông mà là lỗ hậu môn. Em tập trung ý thức vào đó và siết chặt lại."
# monologue
# JP: （にゅるっ――にゅぶうううっ――ぬるっ――ぢゅぬっ）
1868 = "（Trơn tuột——lún sâubuuuu——trơn——nhóp nhép）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふっ――きうっ――」
1087 = "\"「Phù——hự——」\""
# monologue
# JP: 膣のわななきにいざなわれるまま一ミリ一ミリ進むごと、\n吐きそうな程強い射精感がこみ上げてくる。
1577 = "Mỗi một milimet tiến vào theo sự mời gọi của âm đạo đang co bóp, cảm giác muốn bắn tinh lại trào dâng mãnh liệt đến mức buồn nôn."
# monologue
# JP: （ずっ――――りゅっ――――じゅ――――ぐちゅっ）
1884 = "（Lún――――trượt――――nhóp――――nhép）"
# 【真闇】
# display as 真闇
# JP: 「そ、ちゃっ――フッ――はっ――あっ――んグッ――\nおね、ちゃ――っ――いっぱい――――すぎ、てっっ」
1214 = "\"「Sou, chan——phù——ha——a——ưm hự—— Chị——đầy――――quá, rồi.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「っ――ぅっ――――」
1116 = "\"「Hự——ư——」\""
# monologue
# JP: それでも、ようやく、陰毛の先は真闇姉へと触れてくれる。\nここまでくれば、本当にあと僅か――なの、だがっ――
1571 = "Dù vậy, cuối cùng, lông mu của em cũng chạm vào chị Mayami. Đến mức này rồi, thực sự chỉ còn một chút nữa thôi——nhưng mà——"
# monologue
# JP: （ぐっ――――――――ちっ――――――――――）
# 1884 = "（艱難插入）" 
# 【真闇】
# display as 真闇
# JP: 「じらさっ――ないっ――でっ――ねっ――おねがっ――\nそ、ちゃっ――ん。ぐっ――おかしく、なるっ――けん」
1018 = "\"「Đừng——trêu chọc——nữa——nhé——xin, em—— Sou, chan——ưm. Hự——chị phát, điên mất——thôi.」\""
# monologue
# JP: 僕もとっくにおかしくなってる。神経全部が勃起にいって、\n頭がちかちかくらんでしまい、呼吸も浅くしかできない。
1553 = "Anh cũng phát điên từ lâu rồi. Toàn bộ dây thần kinh đều dồn vào dương vật, đầu óc choáng váng, chỉ có thể thở những nhịp ngắn."
# 【双鉄】
# display as 雙鐵
# JP: 「ふっ――はっ――あっ――っ――」
1086 = "\"「Phù——ha——a——」\""
# monologue
# JP: （くっっ――――――――――――――くちゅんっ！）
# 1868 = "（繼續插入）" 
# 【真闇】
# display as 真闇
# JP: 「んきゅっっ！！！！！」
1156 = "\"「Ưm hự!!!!!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！！！！」
1185 = "\"「Hự!!!!!!」\""
# monologue
# JP: 受け入れられる。膣の最奥、子宮口。\n途端、まるでそこに、認証装置があったかのように――
1669 = "Được tiếp nhận. Nơi sâu nhất của âm đạo, cổ tử cung. Ngay lập tức, như thể ở đó có một thiết bị xác thực vậy——"
# monologue
# JP: （ずりゅううううううううっ――ごちゅんんっ！！！）
1863 = "（Trượt dàiiiiiiiii——bập!!!）"
# 【真闇】
# display as 真闇
# JP: 「はあっ！　んっ！　ひゅっ――んあっ！！\nきたっ！　きたっ！　きたっ！　きたあっ！！！！」
1103 = "\"「Ha! Ưm! Hyu——ưm a!! Đến rồi! Đến rồi! Đến rồi! Đến rồi!!!!」\""
# monologue
# JP: 一気に馴染む。勃起と性器が一つに溶け合う。\n密集しすぎていた膣内が、潤うことでやわらぎを得て！
