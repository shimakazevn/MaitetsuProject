1665 = "肉棒同時還在被壓榨著，感覺就像許多發熱的蛞蝓擠在一起為了尋找出口在扭來扭去——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1125 = "「啊！」" 

# monologue
