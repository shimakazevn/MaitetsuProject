1571 = "我的陰毛終於碰到了真闇姐的陰阜。已經深入到這裡的話，就真的只差一點了。然而——" 

# monologue
# JP: （ぐっ――――――――ちっ――――――――――）
# 1884 = "（艱難插入）" 

# 【真闇】
# display as 真闇
