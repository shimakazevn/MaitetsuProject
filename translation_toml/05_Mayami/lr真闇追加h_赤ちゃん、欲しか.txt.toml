1564 = "我用龜頭抵上了濕潤的陰道口，但是沒有插入進去。我讓肉棒貼在大陰唇的縫隙中，用整根肉棒緩緩滑動。" 

# monologue
# JP: （ズッ――りゅっ――）
1856 = "（滑動摩擦）" 

# 【真闇】
# display as 真闇
