# monologue
# JP: 義姉ではなく、妻でもなく、母でさえなく。\n真闇という名の、ただのおんなに。僕の、おんなに。
1472 = "她不是義姐，不是妻子，也不是母親。而是名為真闇的女人，只屬於我的女人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もっ――してくれっ――\n真闇のっ――男にっっ！！！！」
1025 = "「也讓我——變成真闇——你的男人！！！！」" 

# 【真闇】
# display as 真闇
# JP: 「っ！！！！！！！！！！！！」
1130 = "「啊！！！！！！！！！！！！」" 

# monologue
# JP: （きゅううううううううううううううううっっ！！！）
1824 = "（咬緊）" 

# monologue
# JP: いきなり、強烈すぎる締め付けっ！\n射精を堪えられたのが、自分自身でも信じられない。
1710 = "陰道忽然猛地咬緊了！連我自己都不敢相信自己能忍住沒有射出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
1078 = "「呃啊！」" 

# monologue
# JP: （ずろおおおおおおおおおおおおおおおおおおっっ）
1883 = "（艱難拔出）" 

# monologue
# JP: あまりの衝動をほんの僅かでも鎮めたくって、\n亀頭ギリギリまでを引き抜き――
1511 = "強烈的快感衝擊讓我想緩口氣，於是拔出到龜頭快要脫出的位置——" 

# 【真闇】
# display as 真闇
# JP: 「そん……なんっ、最初、から――やけん――んっ――\n双ちゃん、ばっ――おねーちゃんの――たったひとりの」
1224 = "「怎麼……這麼說嘛，從最開始——嗯——小雙就是——姐姐唯一的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
# 1129 = "「啊！！！！！」" 

# monologue
# JP: （ぶヂュううううううううううううっせ――ごちゅっ！）
1803 = "（一鼓作氣）" 

# 【真闇】
# display as 真闇
# JP: 「んひゅっっっ！！！！！！」
1168 = "「嗯嗚！！！！！！」" 

# monologue
# JP: 愛おしすぎてなにかが爆ぜる、止まらなくなるっ！
1628 = "真闇姐實在是太可愛，我感覺好像有什麼東西炸開了一樣，已經無法停下衝刺！" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇っ！　真闇っ！　真闇っ！　真闇っ！！！」
1295 = "「真闇！真闇！真闇！真闇！！！」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ！　そうちゃんっ――んっ――ふっ――あっ\nしゅきっ――好きっ――好きっ――好きぃっ！！！！」
1218 = "「小雙！小雙——嗯——呼——啊——我喜歡你——喜歡你——喜歡你！！！！」" 

# monologue
# JP: （ぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！\nぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！）
1875 = "（肉體碰撞）" 

# monologue
# JP: 胸をもみ、腰を動かすだけしか出来ない。\n身体も心も脳内も、性欲と独占欲で埋め尽くされてる。
1538 = "我只能用力揉胸，挺腰抽插。身體、心靈、大腦，全部都被性慾和獨占欲填滿了。" 

# monologue
# JP: （ぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！\nぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！）
1874 = "（肉體碰撞！）" 

# 【真闇】
# display as 真闇
# JP: 「あっ――あっ――そうちゃ――双ちゃんっ――\nおね、ちゃんっ――おねえちゃんっ――もうっ――！」
1118 = "「啊——啊——小雙——小雙——姐姐——姐姐——已經要！」" 

# monologue
# JP: 単調に、ただ単調に、真闇の一番好きなリズムと速さとで。\nけれどもこの先、ここから先はっ――
1567 = "我的動作非常單調，不能比這更單調了。我就用著真闇最喜歡的節奏和速度。然而在這之後便是——" 

# monologue
# JP: （すりゅううううっ――ごっ――ぐりゅりゅりゅりゅ！\nぬぢゅうううっ！――ごいっ――ごりゅりゅりゅりゅ！）
# 1863 = "（直搗黃龍）" 

# 【真闇】
# display as 真闇
# JP: 「はああっ！　奥っ――そこっ――そこにっ――\n射精っっ――んっ――ふっ――うっ――一番奥、にっ」
1102 = "「呼啊啊！深處——在那裡——在那裡——射精——嗯——呼——在最深處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふっ――くっ――！！！」
1093 = "「呼——啊——！！！」" 

# monologue
# JP: （すりゅうううううっ！　ごんっ！　ぐりゅりゅりゅ！\nぐちゅうううううっ！　ずびゅっ！　ごりゅりゅうっ！）
1850 = "（水聲四起）" 

# 【真闇】
# display as 真闇
# JP: 「そうちゃっ――ねっ！　ねえっ！　おね、ちゃっ――ん、\nイっちゃっ――あっ――もう、イッちゃう――からぁ！」
1213 = "「小雙——來了！要來了！姐姐——嗯、要丟了——啊——要丟了！」" 

# monologue
# JP: （ずりゅおおおおおっ！　ごりゅ！　ぐちゅううぅっ！\nぬぢゅうううううっ！　ごちゅっ！　ぐりゅりゅうっ！）
1860 = "（猛烈抽插）" 

# monologue
# JP: 迫り上がってくる。ぐつぐつに煮えた精子が猛然と――\n真闇姉の子宮の入り口、そこにびったり亀頭を押し付けっ
1613 = "滾燙的精子一下子就湧上來了。我把龜頭頂在真闇姐子宮的入口上——" 

# monologue
# JP: （ぐりゅんんっっっっ！！！！！！！）
1865 = "（緊貼）" 

# 【真闇】
# display as 真闇
# JP: 「ぅゃああああああああああああああああああっ！！！」
1071 = "「呀啊啊啊啊啊啊啊啊啊啊！！！」" 

# monologue
# JP: （きゅうううううううううううううううっっっっ！！！）
# 1824 = "（咬緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！！」
# 1129 = "「啊！！！！！」" 

# monologue
# JP: （びゅううう！　どびゅっ！　ぶびゅっ　びゅるるっ！）
1826 = "（噴湧而出）" 

# 【真闇】
# display as 真闇
# JP: 「はっ！　きたっ！　きてるっ！　精子っ！　精液っ！\nおなかっ――子宮っ――おねえちゃんの、子宮、にっ」
1110 = "「哈！來了！來了！精子！精液！到了肚子裡——子宮——姐姐的子宮裡」" 

# monologue
# JP: （びゅっ！　どびゅっ！　びゅるるうっ！　びゅっ！！）
1867 = "（繼續射精）" 

# 【真闇】
# display as 真闇
# JP: 「あっつか――ふっ――あっ――濃かっ――おもかっ――\nおねえちゃんのっ――なかっ――どろっっ――ねばって」
1193 = "「好燙——呼——啊——好濃——分量好足——姐姐的——肚子裡——黏黏的——稠稠的——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はっ――あっ――あっ――あっ――」
1088 = "「呼——啊——啊——啊——」" 

# monologue
# JP: 尿道内を、べたべたの糊が一連なりで抜けてく快感。\n気をそらさねば、頭がおかしくなりそうでっ――
1717 = "黏稠的漿糊從尿道中射出帶來了巨大的快感。要是不轉移注意力的話，我恐怕要精神異常了——" 

# monologue
# JP: （びゅっ！　ぶびゅっ！　ぶりゅっ！　どびゅっ！！）
# 1867 = "（繼續射精）" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ――双ちゃん――双ちゃんっ――双ちゃん」
1216 = "「小雙——小雙——小雙——小雙」" 

# monologue
# JP: 名前を呼びたい、けれども今は声などだせない。\nだからひたすら、全部の想いを指先に込めっ――
1548 = "我想叫她的名字，可是我現在發不出聲音來。所以我就把愛意全放在指尖上——" 

# monologue
# JP: （むにゅんっ！！！！！！！）
1832 = "（抓握）" 

# 【真闇】
# display as 真闇
# JP: 「んきゅううううううううんっっ！！！！」
1163 = "「嗯唔唔唔唔唔唔唔唔唔！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かはっ！！」
1184 = "「噗哈！！」" 

# monologue
# JP: （ぶびゅるううううっっ！！　んびゅっ！　どびゅっ！）
# 1867 = "（繼續射精）" 

# monologue
# JP: 凶悪すぎるもう一絞り。\nけれどもようやく――ようやく、それ、でっ――
1709 = "陰道又狠狠地榨了一下。但是差不多終於——這樣就——" 

# monologue
# JP: （びゅっっ――ぶりゅっ――……びゅう…………ぴっ）
1847 = "（最後幾下）" 

# 【真闇】
# display as 真闇
# JP: 「はあっ――はあっ――はあっ――はあっ――」
# 1096 = "「呼啊——呼啊——呼啊——呼啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ――んっっ――んくっ――く――はっ」
1097 = "「呼啊——嗯——嗯——呼——啊」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん……ね――っ――は、あっ――そう、ちゃん」
1217 = "「小雙……嗯——呼啊——小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇……」
1285 = "「真闇……」" 

# monologue
# JP: 重なりあってキスをする。
1535 = "我們擁吻在一起。" 

# 【真闇】
# display as 真闇
# JP: 「んっ――チュッ――ちゅううっ――ちゅぶっ――\nはっ――ンッ――ちゅるっ――れろっ――ちゅるっ」
1145 = "「嗯——啾——啾——啾噗——呼——嗯——啾嚕——啾噗——啾嚕」" 

# monologue
# JP: 舌と舌とを絡め合い、唾液を呼吸を交換しまう。
1536 = "我們的舌頭纏在一起，交換著唾液和氣息。" 

# 【真闇】
# display as 真闇
# JP: 「れりゅううっ――ちゅっ――ちゅずずっ――（ごくっ）\nん……ちゅっ――ちゅううっ――れるっ――れりゅうう」
1135 = "「啾嚕——啾——啾噗——咕嚕——嗯……啾——啾——啾嚕——啾噗」" 

# monologue
# JP: 快感が徐々に落ち着けば、愛おしさだけが膨らんでいく。\n真闇姉の温もりが、匂いが僕に染み込んでくる。
1520 = "快感漸漸衰減下去，心中的愛意卻在不停地膨脹。真闇姐的體溫和味道滲到了我的身體裡。" 

# 【真闇】
# display as 真闇
# JP: 「ん……ぷあっ――チュッ――ちゅううっ――チュッ――\nちゅうっ――チュッ――ちゅっ――ちゅっ」
1152 = "「嗯……噗哈——啾——啾——啾——啾——啾——啾——啾」" 

# monologue
# JP: 舌を解いて、小鳥のような愛情だけを与えてくるキス。\n同じ動きで僕も応えて――ふっと、視線が絡み合う。
1684 = "舌頭分開之後，她又開始飽含愛意地輕吻，就像小鳥輕啄一樣。我也跟著她的動作——忽然我們四目相對。" 

# 【真闇】
# display as 真闇
# JP: 「ふふっ」
1179 = "「嘻嘻」" 

# monologue
# JP: 幸せな笑み。僕の全部を包んでくれる、真闇姉の笑み。
1488 = "好幸福的笑臉。真闇姐的笑容能包容我的一切。" 

# 【真闇】
# display as 真闇
# JP: 「さずかったとね。きっと。今日」
1032 = "「今天一定能懷上吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな、僕もそう感じている」
1268 = "「是啊，我也有這種感覺」" 

# monologue
# JP: 初めてセックスしたときよりも、結婚式のそのときよりも\n――“男になった”と、僕の奥底が感じてる。
1703 = "這次比第一次做愛的時候，比結婚典禮的時候，都更讓我有一種“成為了男人”的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「愛している――」
1240 = "「我愛你——」" 

# monologue
# JP: 照れを感じる。抵抗も。\nけれども父となるのなら、義弟のままでいてはいけない。
1556 = "我有些不好意思，也有些牴觸。但是要成為父親的話，我就不能一直當一個義弟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「愛している。真闇」
1241 = "「我愛你，真闇」" 

# 【真闇】
# display as 真闇
# JP: 「うん。うちも」
1172 = "「嗯，我也愛你」" 

# monologue
# JP: べとりと張り付くようなキス。\nそうして静かな言葉が流れる。
1483 = "她貼過來給我一個吻。然後輕啟朱唇——" 

# 【真闇】
# display as 真闇
# JP: 「愛しています。双鉄さん」
1242 = "「我愛你，雙鐵」" 
