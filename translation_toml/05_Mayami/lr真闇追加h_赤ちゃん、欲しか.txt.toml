1092 = "「呼——啊——小雙、小雙——嗯——哈——不要再讓我等了——再到——更深的地方」" 

# monologue
# JP: （そうしたいのは、やまやま、なのだがっ――）
1831 = "（我當然非常想深入——）" 

# monologue
# JP: 声を出せない。歯を食いしばってしまってる。\n腰ではなくて尻の穴。そこを意識し、引き締める。
1583 = "我說不出話來，因為牙關已經咬緊。我繃緊的地方不是腰部，而是屁眼。我集中精神收縮著肌肉。" 

# monologue
