1068 = "「呀……啊——不要讓我再等啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この角度なら、精液が極めて逆流しづらい。\nそう考えてくれてのことか」
1270 = "「是因為這個角度的話精液不容易逆流出來，是考慮到了這個原因啊」" 

# monologue
# JP: （りゅうううううっ――――くっ――ぶぢゅっ）
# 1856 = "（滑動摩擦）" 

# 【真闇】
# display as 真闇
