# 【真闇】
# display as 真闇
# JP: 「んきゅううううううううんっっ！！！！」
1163 = "\"「Nkyuuuuuuuuuuuuu!!!!」\""
# 【双鉄】
# display as 雙鐵
# JP: 「かはっ！！」
1184 = "\"「Hự!!」\""
# monologue
# JP: （ぶびゅるううううっっ！！　んびゅっ！　どびゅっ！）
# 1867 = "（繼續射精）" 
# monologue
# JP: 凶悪すぎるもう一絞り。\nけれどもようやく――ようやく、それ、でっ――
1709 = "Một cú siết chặt quá đỗi tàn bạo. Nhưng cuối cùng thì——cuối cùng, nhờ nó, mà——"
# monologue
# JP: （びゅっっ――ぶりゅっ――……びゅう…………ぴっ）
1847 = "（Phụt——phụt——......phụt............phụt）"
# 【真闇】
# display as 真闇
# JP: 「はあっ――はあっ――はあっ――はあっ――」
# 1096 = "「呼啊——呼啊——呼啊——呼啊——」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ――んっっ――んくっ――く――はっ」
1097 = "\"「Phù——ưm——hự——ư——ha.」\""
# 【真闇】
# display as 真闇
# JP: 「双ちゃん……ね――っ――は、あっ――そう、ちゃん」
1217 = "\"「Sou-chan......nè——ha, a——Sou, chan.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「真闇……」
1285 = "\"「Mayami......」\""
# monologue
# JP: 重なりあってキスをする。
1535 = "Hòa quyện vào nhau và trao nhau nụ hôn."
# 【真闇】
# display as 真闇
# JP: 「んっ――チュッ――ちゅううっ――ちゅぶっ――\nはっ――ンッ――ちゅるっ――れろっ――ちゅるっ」
1145 = "\"「Ưm——chụt——chùn chụt——chụt—— Ha——ưm——chụt——liếm——chụt.」\""
# monologue
# JP: 舌と舌とを絡め合い、唾液を呼吸を交換しまう。
1536 = "Hai chiếc lưỡi quấn quýt lấy nhau, trao đổi nước bọt và hơi thở."
# 【真闇】
# display as 真闇
# JP: 「れりゅううっ――ちゅっ――ちゅずずっ――（ごくっ）\nん……ちゅっ――ちゅううっ――れるっ――れりゅうう」
1135 = "\"「Liếm liếm——chụt——chùn chụt——（Ực） Ưm......chụt——chùn chụt——liếm——liếm liếm.」\""
# monologue
# JP: 快感が徐々に落ち着けば、愛おしさだけが膨らんでいく。\n真闇姉の温もりが、匂いが僕に染み込んでくる。
1520 = "Khi khoái cảm dần lắng xuống, chỉ còn lại sự yêu thương dâng trào. Hơi ấm, mùi hương của chị Mayami thấm đẫm vào người em."
# 【真闇】
# display as 真闇
# JP: 「ん……ぷあっ――チュッ――ちゅううっ――チュッ――\nちゅうっ――チュッ――ちゅっ――ちゅっ」
1152 = "\"「Ưm......phù——chụt——chùn chụt——chụt—— Chùn chụt——chụt——chụt——chụt.」\""
# monologue
# JP: 舌を解いて、小鳥のような愛情だけを与えてくるキス。\n同じ動きで僕も応えて――ふっと、視線が絡み合う。
1684 = "Buông lơi đầu lưỡi, những nụ hôn mổ nhẹ như chim non mang đầy tình yêu thương. Em cũng đáp lại bằng những nụ hôn tương tự——rồi chợt, ánh mắt hai người chạm nhau."
# 【真闇】
# display as 真闇
# JP: 「ふふっ」
1179 = "\"「Fufu.」\""
# monologue
# JP: 幸せな笑み。僕の全部を包んでくれる、真闇姉の笑み。
1488 = "Một nụ cười hạnh phúc. Nụ cười của chị Mayami, bao bọc lấy toàn bộ con người em."
# 【真闇】
# display as 真闇
# JP: 「さずかったとね。きっと。今日」
1032 = "\"「Chắc chắn là, đã đậu thai rồi. Hôm nay.」\""
# 【双鉄】
# display as 雙鐵
# JP: 「だな、僕もそう感じている」
1268 = "\"「Đúng vậy, anh cũng cảm thấy thế.」\""
# monologue
# JP: 初めてセックスしたときよりも、結婚式のそのときよりも\n――“男になった”と、僕の奥底が感じてる。
1703 = "Hơn cả lần đầu tiên làm tình, hơn cả khoảnh khắc trong lễ cưới ——Tận sâu thẳm trong lòng, em cảm nhận được mình đã \"trở thành một người đàn ông\"."
# 【双鉄】
# display as 雙鐵
# JP: 「愛している――」
1240 = "\"「Anh yêu em——」\""
# monologue
# JP: 照れを感じる。抵抗も。\nけれども父となるのなら、義弟のままでいてはいけない。
1556 = "Cảm thấy xấu hổ. Cũng có chút kháng cự. Nhưng nếu sắp trở thành một người cha, em không thể cứ mãi làm một đứa em trai nuôi được."
# 【双鉄】
# display as 雙鐵
# JP: 「愛している。真闇」
1241 = "\"「Anh yêu em. Mayami.」\""
# 【真闇】
# display as 真闇
# JP: 「うん。うちも」
1172 = "\"「Ừm. Em cũng vậy.」\""
# monologue
# JP: べとりと張り付くようなキス。\nそうして静かな言葉が流れる。
1483 = "Một nụ hôn dính chặt lấy nhau. Và rồi những lời nói êm đềm cất lên."
# 【真闇】
# display as 真闇
# JP: 「愛しています。双鉄さん」
1242 = "\"「Em yêu anh. Anh Soutetsu.」\""
