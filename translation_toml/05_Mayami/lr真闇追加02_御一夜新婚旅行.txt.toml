1749 = "像清水一樣美麗的隈燒酒，從一升瓶裡倒進了小小的試飲杯。" 

# 【れいな】
# display as 玲奈
# JP: 「ふゎああ、素敵な香りですねぇ。\nほんのりやさしいみたいですぅ」
1353 = "「嗯，味道好好聞。帶著點溫柔的感覺」" 

# 【真闇】
# display as 真闇
# JP: 「んふふ、ありがと。\nね？　ひーちゃん、双ちゃん。れーちゃんも」
1223 = "「呵呵，謝謝。乾杯吧，小日，小雙。還有小玲」" 

