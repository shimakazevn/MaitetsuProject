1230 = "「咦，阿姐！？阿哥！？你們的新婚旅行，已經結束了！？難道是一日遊！？」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃまぁひーちゃん」
1262 = "「哎呀呀，小日」" 

# monologue
# JP: 日々姫だ。なっぱ服はもう着替えているが、\n半切り缶を片手にさげて、乗務あがりとはっきりわかる。
