1479 = "「我懂！我懂！因為怕麻煩別人，就算有興趣也沒辦法參觀自家的酒窖」" 

# 【真闇】
# display as 真闇
# JP: 「ゆーか、ひーちゃん」
1600 = "「話說，小日」" 

