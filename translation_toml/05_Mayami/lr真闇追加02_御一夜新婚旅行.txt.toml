[script]
# lines: 362 
# 【れいな】
# display as 玲奈
# JP: 「うっふふー、ガイドさんって、\nとーってもたのしいお仕事ですねぇ」
1370 = "「嘿嘿嘿，導遊真是個特別有趣的工作」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ。れーちゃんが楽しんでくれて、\nおねえちゃんもうれしか」
1217 = "「Ufufu, làm hướng dẫn viên,\nlà một công việc cực kỳ thú vị luôn nha」"

# monologue
# JP: 真闇姉があまりに甘やかすものだから、\nれいなは完全にエンジョイモードに入っている。
1942 = "Vì chị Mayami quá đỗi chiều chuộng,\nnên Reina đã hoàn toàn bước vào chế độ tận\nhưởng."

# 【れいな】
# display as 玲奈
# JP: 「クマ川くだりも、包丁づくり体験も、\nれいな、はじめてだったからドキドキしちゃいましたぁ」
1564 = "「Cả xuôi dòng sông Kuma, và trải nghiệm\nrèn dao,\nReina, đều là lần đầu tiên nên hồi hộp lắm\nạ」"

# 【真闇】
# display as 真闇
# JP: 「手付きの鮮やかだったけん。\nとてもはじめてとは思えんかったと」
1163 = "「Cả xuôi dòng sông Kuma, và trải nghiệm\nrèn dao,\nReina, đều là lần đầu tiên nên hồi hộp lắm\nạ」"

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、蓑笠さんとまくらさんのおかげですぅ。\nまくらさんのアドバイス、すっごくわかりやすくて」
1376 = "「Thao tác của em rất điêu luyện mà.\nKhông hề giống làm lần đầu chút nào」"

# monologue
# JP: れいなの言葉に、心底から深く頷いている。\nガイドが誰か。他の人が見たなら完全に誤解しただろう。
1816 = "Tôi gật đầu đồng tình sâu sắc với lời của\nReina.\nAi là hướng dẫn viên đây. Người ngoài nhìn\nvào chắc chắn sẽ hiểu lầm hoàn toàn."

# 【真闇】
# display as 真闇
# JP: 「ほんなん、自分でやってつっかかって教わったとこ。\n[たまたま,1]偶々れーちゃんも苦労しとったから言えただけやけん」
1475 = "「Cái đó, là lúc chị tự làm rồi bị vướng\nnên được dạy cho.\nTình cờ bé Reina cũng gặp khó khăn ở chỗ\nđó nên chị mới nói được thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、実際蓑笠さんも大いに関心されていたではないか。\n『そぎゃん伝え方ならわかりやすかとですねぇ』と」
1133 = "「Cái đó, là lúc chị tự làm rồi bị vướng\nnên được dạy cho.\nTình cờ bé Reina cũng gặp khó khăn ở chỗ\nđó nên chị mới nói được thôi」"

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。ことばで教えてもらってれいなはじめて、\n『こういうことかぁ』ってわかりましたからぁ」
1498 = "「Không đâu, thực tế ông Minokasa cũng rất\nấn tượng mà.\n『Cách truyền đạt như vậy thì dễ hiểu quá\nnhỉ』 ông ấy bảo thế」"

# monologue
# JP: 蓑笠さんは職人だけに、見せてることにより教えてくれる。\nだがれいなには、それがしっくりハマらなかった。
1982 = "Vì ông Minokasa là thợ thủ công, nên ông\ndạy bằng cách làm mẫu cho xem.\nNhưng với Reina, cách đó không mấy hiệu\nquả."

# 【双鉄】
# display as 雙鐵
# JP: 「熟練すれば熟練するほど、言語化は難しくなるのかも\nしれんな。無意識にできてしまっているようなら、尚更」
1205 = "「Càng thành thạo thì việc diễn đạt bằng\nlời càng khó chăng.\nĐặc biệt là khi đã làm một cách vô thức」"

# 【真闇】
# display as 真闇
# JP: 「あらまぁ、それじゃ双ちゃんも\n案外と説明下手だったりすると？」
1271 = "「Càng thành thạo thì việc diễn đạt bằng\nlời càng khó chăng.\nĐặc biệt là khi đã làm một cách vô thức」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、僕などいまだに考え考えやっている。\nゆえ恐らくは上手に説明できるんじゃないか――と思う」
1120 = "「Ây da, vậy thì Sou-chan\nkhông chừng cũng giải thích kém lắm nhỉ?」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅどうなんですかねぇ、\nれいなもとーっても楽しみでぇす」
1220 = "「Không không, em thì vẫn vừa làm vừa suy\nnghĩ.\nNên có lẽ em có thể giải thích tốt đấy——em\nnghĩ vậy」"

# monologue
# JP: ガイドの仕事を完全に放擲したようなことをいいつつ、\nれいなはとことこ、僕らを投炭練習場へと案内する。
1896 = "Vừa nói những lời như thể đã hoàn toàn vứt\nbỏ công việc hướng dẫn viên,\nReina vừa lạch bạch dẫn chúng tôi đến bãi\ntập xúc than dồn toa."

# 【れいな】
# display as 玲奈
# JP: 「はぁい。ここが御一夜鉄道ご自慢の投炭練習場でぇす。\n機関士さんたちも、ここで本当に練習するんですよぉ」
1428 = "「Vâng ạ. Đây là bãi tập xúc than dồn toa\ntự hào của Đường sắt Ohito nha.\nCác bác lái tàu, cũng thực sự tập luyện ở\nđây đó ạ」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら、\n双ちゃんもひーちゃんもなーちゃんもここで？」
1632 = "「Vâng ạ. Đây là bãi tập xúc than dồn toa\ntự hào của Đường sắt Ohito nha.\nCác bác lái tàu, cũng thực sự tập luyện ở\nđây đó ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。整備体のハチロクが投炭練習することもある。\n定期的にやらんと、やはり鈍ってしまうとのことだ」
1503 = "「Vậy thì,\nSou-chan, Hii-chan và Na-chan cũng tập ở\nđây sao?」"

# 【真闇】
# display as 真闇
# JP: 「へぇえ――\nあ、こんスコップば使ってやると？」
1228 = "「Đúng vậy. Có lúc thân chính của Hachiroku\ncũng tập xúc than dồn toa ở đây.\nNếu không làm thường xuyên, tay nghề sẽ bị\nmai một」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ワンスコという。\n一杯ちょうど1kgを掬えるスコップだ」
1355 = "「Hêê——\nA, dùng cái xẻng này để tập sao?」"

# monologue
# JP: 練習用の石炭の山にワンスコを突っ込み、掬ってみせる。
1831 = "Tôi cắm xẻng wansuko vào đống than đá dùng\nđể tập luyện, rồi xúc thử cho xem."

# 【双鉄】
# display as 雙鐵
# JP: 「この分量が、丁度１キログラムだ」
1625 = "「Lượng này, vừa đúng 1 kilogram」"

# 【真闇】
# display as 真闇
# JP: 「丁度って、そぎゃん無造作に掬ったとに？」
1183 = "「Lượng này, vừa đúng 1 kilogram」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1346 = "「Vừa đúng á, dù em chỉ xúc đại thôi sao?」"

# monologue
# JP: 観光客に見せるため、バケツをおいて0kgに設定してある\n[はかり]秤にざらり、掬った石炭を流し入れる。
1888 = "\"Để du khách dễ dàng quan sát, chiếc xô đã\nđược đặt lên bàn cân và chỉnh về 0kg,\ntôi xúc một xẻng than rồi đổ rào rào vào\nđó.\""

# 【真闇】
# display as 真闇
# JP: 「あらまぁ！　1006グラム！」
1263 = "\"「Ôi chà! 1006 gram!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そのくらいの誤差は勘弁してくれ。\nこの１キロの投炭を乗務中は何百度となく繰り返す」
1633 = "\"「Sai số ngần ấy thì chị thông cảm cho em\nđi.\nTrong lúc làm nhiệm vụ, việc xúc 1kg than\nnày phải lặp đi lặp lại hàng trăm lần\nđấy.」\""

# 【真闇】
# display as 真闇
# JP: 「何百度って――何百キロも！？」
1466 = "\"「Hàng trăm lần ư——tức là hàng trăm ký\nluôn á!?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「湯医線は約25キロと短い上に平坦だからな。\n僕の場合、片道であれば550杯程度ですむ事が多い」
1545 = "\"「Tuyến Yui dài khoảng 25km, vừa ngắn lại\nvừa bằng phẳng mà.\nĐối với em, một chiều đi thường chỉ tốn\nkhoảng 550 xẻng là cùng.」\""

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの場合って――\n人によってそぎゃん違うものと？」
1457 = "\"「Đối với Sou-chan á——\nMỗi người lại khác nhau đến thế cơ à?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「いまでは誤差程度だが、\n慣れぬころはかなり個人差があったなぁ」
1182 = "\"「Bây giờ thì chỉ chênh lệch chút xíu\nthôi,\nnhưng hồi chưa quen thì sự khác biệt giữa\nmỗi người là khá lớn đấy.」\""

# monologue
# JP: 言えばくすり、と楽しげな笑み。
1837 = "Nói xong, chị ấy nở nụ cười khúc khích vui\nvẻ."

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんが一番少なかとでしょお。\n真ん中が双ちゃんで、多かとがなーちゃん」
1451 = "\"「Hi-chan chắc chắn là ít nhất rồi nhỉ.\nỞ giữa là Sou-chan, còn nhiều nhất là\nNa-chan.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「驚いたな。大正解だ」
1571 = "\"「Bất ngờ thật đấy. Chị đoán chuẩn luôn.」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、性格よねぇ」
1222 = "\"「Ưm fufu, do tính cách cả mà.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな。こういうことにも性格は出る。かなり如実に」
1508 = "\"「Đúng vậy. Tính cách cũng bộc lộ qua\nnhững việc thế này đấy. Khá là rõ ràng\nluôn.」\""

# monologue
# JP: 言った途端に、れいながはい！　と手をあげる。
1821 = "Vừa dứt lời, Reina đã \"Dạ!\" rồi giơ tay\nlên."

# 【れいな】
# display as 玲奈
# JP: 「それならそれなら、投炭占いとか投炭診断みたいなの、\nもしかしたらできちゃうかもですねぇ」
1656 = "\"「Nếu vậy, nếu vậy thì, mấy trò như bói\nxúc than hay chẩn đoán tính cách qua cách\nxúc than,\ncó khi cũng làm được luôn đó nha~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「おお、それは面白いな。\nせっかくだし、ひとつ試してみるか」
1316 = "\"「Ồ, nghe thú vị đấy.\nNhân tiện đây, chúng ta thử một lần xem\nsao nhé?」\""

# 【れいな】
# display as 玲奈
# JP: 「わああ！　れいなやってみたい――じゃなくて、\nまくらさんからですねぇ、れいな、ガイドですから」
1240 = "\"「Oaaa! Reina cũng muốn thử——à không phải,\ntừ chị Makura trước mới đúng ạ, Reina là\nhướng dẫn viên mà~」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、ありがと、れーちゃん」
1224 = "\"「Ưm fufu, cảm ơn em nha, Rei-chan.」\""

# 【れいな】
# display as 玲奈
# JP: 「ひゃう」
1213 = "\"「Hyau.」\""

# monologue
# JP: 帽子の上から頭を撫でられ、\nれいなは一瞬目をまるくして、すぐに細める。
1957 = "Bị xoa đầu qua lớp mũ,\nReina tròn xoe mắt trong thoáng chốc, rồi\nlập tức nheo lại tận hưởng."

# 【真闇】
# display as 真闇
# JP: 「じゃ、おねーちゃんがんばっちゃおっかな。\n双ちゃん、どぎゃんしたらよかと？」
1644 = "\"「Vậy, chị cũng phải cố gắng thôi nhỉ.\nSou-chan, chị phải làm thế nào đây?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「石炭を掬う流れで鎖を引いて焚き口をあけ、\nワンスコ一杯石炭を投げ込み、鎖を戻し焚き口を閉じる」
1393 = "\"「Theo đà xúc than, chị kéo dây xích để mở\ncửa buồng lửa,\nném một xẻng than đầy vào trong, sau đó\nthả xích ra để đóng cửa lại.」\""

# monologue
# JP: 言いながらゆっくりと実演してみせる。\n食い入るように見つめられれば、さすがに多少照れくさい。
1813 = "Vừa nói, em vừa chậm rãi làm mẫu.\nBị nhìn chằm chằm như muốn ăn tươi nuốt\nsống thế này, quả thực cũng có chút ngại\nngùng."

# 【双鉄】
# display as 雙鐵
# JP: 「一番最初に気をつけるべきは２点。\n鎖を引き過ぎぬことと、焚き口を長くあけすぎぬことだ」
1672 = "\"「Hai điểm cần lưu ý nhất khi mới bắt đầu.\nĐó là không được kéo xích quá mạnh và\nkhông được mở cửa buồng lửa quá lâu.」\""

# 【真闇】
# display as 真闇
# JP: 「ふぅん？」
1361 = "\"「Hừm?」\""

# monologue
# JP: 真闇姉が練習機の前にやってくる。\n僕の動作をゆっくり真似して――深く頷く。
1936 = "Chị Mayami bước đến trước cỗ máy tập\nluyện.\nChị chậm rãi bắt chước động tác của\nem——rồi gật đầu thật sâu."

# 【真闇】
# display as 真闇
# JP: 「なるほどね。\nすぐに閉じんと、焚き口？　から熱気ば逃げちゃうのか」
1191 = "\"「Ra là vậy.\nNếu không đóng lại ngay thì hơi nóng sẽ\nthoát ra từ cửa buồng lửa đúng không?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1678 = "\"「!」\""

# monologue
# JP: 驚いた。投炭練習で実機をそこまでイメージする――\nできるというのは、間違いの無い資質であろう。
1823 = "Em ngạc nhiên thật sự. Trong lúc tập xúc\nthan mà có thể hình dung thực tế đến mức\nđó——\nKhả năng này chắc chắn là một tố chất\nkhông thể bàn cãi."

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくそのとおりだ。とはいえ焦るのも禁物だ。\n何処か一箇所だけ早くしようと考えたなら、仕損じるぞ」
1529 = "\"「Chính xác là vậy. Nhưng mà cũng không\nđược nôn nóng đâu đấy.\nNếu chỉ chăm chăm muốn làm nhanh ở một\nkhâu nào đó, thì sẽ làm hỏng bét hết cả.」\""

# 【真闇】
# display as 真闇
# JP: 「一箇所だけじゃなかとなら、\n全体のスピードをおんなじくらいにまとめる感じ？」
1127 = "\"「Nếu không phải chỉ một khâu,\nthì tức là phải điều chỉnh tốc độ của toàn\nbộ quá trình cho đồng đều với nhau đúng\nkhông?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そのイメージだ。最初は全てをゆっくりでいい。\nなれるに従い、一連の流れそのものを徐々に速める」
1461 = "\"「Đúng ý đó rồi đấy. Lúc đầu cứ làm mọi\nthứ thật chậm rãi cũng được.\nKhi đã quen dần, chị mới bắt đầu tăng tốc\ntoàn bộ chuỗi động tác lên.」\""

# 【真闇】
# display as 真闇
# JP: 「ああ、うん。頭ではわかったような気がすると。\nばってん、おねえちゃん運動最近まるでしとらんけん」
1307 = "\"「À, ừm. Chị cảm giác như trong đầu thì\nhiểu rồi đấy.\nNhưng mà dạo này chị chả vận động gì\nsất.」\""

# 【れいな】
# display as 玲奈
# JP: 「れいなが応援してるから、きっと上手にできますよぉ」
1558 = "\"「Có Reina cổ vũ rồi, chắc chắn chị sẽ làm\ntốt thôi ạ~」\""

# 【真闇】
# display as 真闇
# JP: 「あらまぁ。ほんなら失敗できんとね。\nおねーちゃん、絶対がんばらんよ」
1259 = "\"「Ôi chà. Vậy thì không được thất bại rồi.\nChị nhất định sẽ cố gắng hết sức.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「力みも敵だ。一番最初はあくまでゆっくり。\n投げ入れるではなく流し込むイメエジでやってみてくれ」
1413 = "\"「Dùng sức quá cũng không tốt đâu. Lúc đầu\ncứ làm thật chậm thôi.\nĐừng ném vào, mà hãy tưởng tượng như mình\nđang đổ than vào ấy, thử xem sao.」\""

# 【真闇】
# display as 真闇
# JP: 「イメエジ」
1665 = "\"「Tưởng tượng.」\""

# monologue
# JP: オウム返しにされ、気づく。\n僕の言葉もハチロクに叩き込まれたままのオウム返しと。
1976 = "Bị lặp lại y hệt, em mới chợt nhận ra.\nNhững lời em vừa nói cũng chỉ là lặp lại y\nchang những gì Hachiroku đã nhồi nhét vào\nđầu em mà thôi."

# 【真闇】
# display as 真闇
# JP: 「わかったと。さっきの双ちゃんの動きばイメエジして、\nまずはゆっくり、やってみるけん。やけん、教えて？」
1483 = "\"「Chị hiểu rồi. Chị sẽ tưởng tượng lại\nđộng tác lúc nãy của Sou-chan,\ntrước tiên cứ làm thử từ từ đã. Nên là,\nchỉ cho chị với nhé?」\""

# monologue
# JP: これこそまさしく性格だ。\n真闇姉はワンスコの持ち方から確認してくる。
2017 = "Đây chính xác là tính cách của chị ấy.\nChị Mayami bắt đầu xác nhận lại từ cách\ncầm xẻng than."

# 【真闇】
# display as 真闇
# JP: 「ん……ああ、たしかにこぎゃんして持った方が、\n手首ば自由に動くとね」
1325 = "\"「Ưm……À, đúng là cầm thế này thì\ncổ tay mới cử động linh hoạt được nhỉ.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「しかし最初は、固定してくれ。\nまっすぐ差し込み真っ直ぐ流す。それだけでいい」
1156 = "\"「Nhưng lúc đầu, chị cứ giữ cố định đi.\nĐưa thẳng vào rồi đổ thẳng xuống. Chỉ cần\nvậy thôi.」\""

# 【真闇】
# display as 真闇
# JP: 「固定して――まっすぐさしこみ――鎖ば引いて」
1388 = "\"「Giữ cố định——đưa thẳng vào——rồi kéo\nxích.」\""

# monologue
# JP: （ざくっ）
2045 = "（Phập）"

# 【れいな】
# display as 玲奈
# JP: 「わああ、とっても綺麗ですぅ」
1246 = "\"「Oaaa, đẹp lắm luôn đó ạ~」\""

# 【真闇】
# display as 真闇
# JP: 「空いたところにそのまままっすぐ流しこ」
1569 = "\"「Cứ thế đổ thẳng vào chỗ trống」\""

# monologue
# JP: （がちんっ！！！）
2041 = "（Keng!!!）"

# 【真闇】
# display as 真闇
# JP: 「ありゃ」
1261 = "\"「Ây da.」\""

# 【れいな】
# display as 玲奈
# JP: 「わ、焚き口にぶつけちゃいましたねぇ」
1250 = "\"「Oa, chị đập trúng cửa buồng lửa mất rồi\nạ~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「今のはすまん、僕のミスだ。\nまっすぐという言葉が悪かった」
1446 = "\"「Vừa rồi là lỗi của em, xin lỗi chị.\nTừ 'thẳng' của em dùng chưa chuẩn.」\""

# monologue
# JP: 真闇姉の体の動きは、まさしく僕の指示通りだった。\nごくさりげなく文武両道――日々姫と同じ血を強く感じる。
1949 = "Chuyển động cơ thể của chị Mayami hoàn\ntoàn đúng như những gì em chỉ dẫn.\nVăn võ song toàn một cách rất tự nhiên——Em\ncảm nhận rõ ràng dòng máu giống hệt Hibiki\nđang chảy trong chị."

# 【双鉄】
# display as 雙鐵
# JP: 「まっすぐではなく、『スナップを効かせず固定して』\n『斜めに差し込み軽く持ち上げ斜めに流し込む』」
1122 = "\"「Không phải là thẳng, mà là 『giữ cố định\nkhông dùng lực cổ tay』\n『đưa chéo vào, hơi nâng lên rồi đổ chéo\nxuống』.」\""

# 【真闇】
# display as 真闇
# JP: 「ん……っと――自分の体のわきのところば頂点にして、\n石炭と焚き口とで二等辺三角形描く感じ？」
1322 = "\"「Ưm……để xem——Lấy phần hông của mình làm\nđỉnh,\nrồi tạo thành một tam giác cân với than và\ncửa buồng lửa đúng không?」\""

# 【れいな】
# display as 玲奈
# JP: 「ふわわわ！　包丁づくり体験のときとおんなじですぅ。\n説明、すっっごくわかりやすくなりましたぁ」
1232 = "\"「Oaaaa! Giống hệt lúc trải nghiệm làm dao\nbếp luôn ạ.\nGiải thích dễ hiểu cực kỳ luôn đó nha~」\""

# monologue
# JP: まさしくだ。\n僕が覚えた感慨を、恐らくは蓑笠さんも感じたのだろう。
1882 = "Chính xác là vậy.\nCảm xúc mà em đang trải qua lúc này, có lẽ\nông Minokasa cũng đã từng cảm nhận được."

# 【双鉄】
# display as 雙鐵
# JP: 「その解釈で間違いない。やってみてくれ」
1165 = "\"「Chị hiểu đúng rồi đấy. Thử làm xem\nnào.」\""

# 【真闇】
# display as 真闇
# JP: 「ん――っと――あっ」
1320 = "\"「Ưm——để xem——A.」\""

# 【れいな】
# display as 玲奈
# JP: 「わああ！　とっても綺麗にできましたねぇ」
1236 = "\"「Oaaa! Chị làm đẹp lắm luôn đó ạ~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1509 = "\"「Đúng vậy.」\""

# monologue
# JP: 『流れていません。22点です、真闇様』\n脳内に勝手に浮かんで来る声を、今は意識して塗りつぶす。
731 = "\"『Chưa đổ được than vào rồi. 22 điểm, thưa\nchị Mayami』\nGiọng nói tự dưng hiện lên trong đầu em\nlúc này đã bị em cố tình gạt đi.\""

# 【双鉄】
# display as 雙鐵
# JP: 「そのまま5杯ほどくりかえしてみよう。\n速度はあげずともかまわない」
1175 = "\"「Cứ thế lặp lại khoảng 5 xẻng xem sao.\nKhông cần phải tăng tốc độ đâu.」\""

# 【真闇】
# display as 真闇
# JP: 「ん……ん、っしょ――」
1326 = "\"「Ưm……ưm, dô——」\""

# 【れいな】
# display as 玲奈
# JP: 「……ちょっとずつなめらかになってますねぇ。\nすごいですぅ」
755 = "\"「……Chị làm mượt mà hơn từng chút một rồi\nđấy ạ.\nTuyệt quá nha~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。実にスジがいいな。\n酒造のことがもしもなければ」
1588 = "\"「Đúng thật. Chị có năng khiếu đấy.\nNếu không vì chuyện nấu rượu thì...」\""

# 【真闇】
# display as 真闇
# JP: 「あははっ、ありがと。ばってん、酒造んこと\nもしもなくても、おねーちゃん、こいばとても無理」
1298 = "\"「Ahaha, cảm ơn em. Nhưng mà, dù không có\nchuyện nấu rượu đi chăng nữa,\nthì chị cũng chịu thua cái trò này thôi.」\""

# monologue
# JP: たったの５杯。\nただそれだけで、真闇姉はいかにもダルそうに腕を振る。
1747 = "Chỉ mới 5 xẻng.\nChỉ vậy thôi mà chị Mayami đã vung vẩy\ncánh tay trông có vẻ rã rời lắm rồi."

# 【真闇】
# display as 真闇
# JP: 「１キロっていっても、繰り返してるとキツかねぇ。\n姿勢も中腰になるけん、腰も重くて」
1279 = "\"「Dù chỉ là 1kg, nhưng cứ lặp đi lặp lại\nthì cũng mệt thật đấy.\nTư thế lại còn phải khom lưng nữa, mỏi eo\nghê.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、無理はいかん。\nならば、投炭練習はここまでにしておこう」
1351 = "\"「Đúng vậy, không nên cố quá.\nVậy thì chúng ta dừng tập xúc than ở đây\nnhé.」\""

# 【真闇】
# display as 真闇
# JP: 「だって。ほんなら、はぁい、\nれーちゃん、バトンタッチ」
1414 = "\"「Nghe chưa kìa. Vậy thì, được rồi,\nRei-chan, trao cờ cho em đấy.」\""

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　いまの見てたし、れいな力持ちだから、\nきっと上手にできちゃいますよぉ！！」
1425 = "\"「Dạ vâng ạ! Nãy giờ Reina có xem rồi, với\nlại Reina cũng khỏe lắm,\nchắc chắn sẽ làm giỏi luôn đó nha!!」\""

# monologue
# JP: いうやいなやで、がっぱがっぱとれいなは投炭し始める。\nなるほど、これは――かなり形になっている。
2003 = "Nói xong, Reina liền hăm hở bắt đầu xúc\nthan.\nRa là vậy, thế này thì——khá là ra dáng đấy\nchứ."

# 【双鉄】
# display as 雙鐵
# JP: 「いいな。もう少し速度を落としていいので、\n石炭をこぼさぬことを意識してくれ」
1130 = "\"「Tốt lắm. Em có thể làm chậm lại một\nchút,\nnhưng hãy chú ý đừng làm rơi vãi than\nnhé.」\""

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1421 = "\"「Vâng ạ~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「左右のブレが石炭こぼしの原因だ。\n体をひねるとき、ワンスコを傾けぬことを意識するんだ」
1610 = "\"「Lắc lư sang hai bên là nguyên nhân làm\nrơi than đấy.\nKhi vặn người, em nhớ chú ý đừng để xẻng\nthan bị nghiêng nhé.」\""

# 【れいな】
# display as 玲奈
# JP: 「やってみまぁす！　よいしょ、うんしょ」
1565 = "\"「Reina làm thử đây ạ! Dô ta, dô tà.」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、れーちゃん、上手ねぇ」
1283 = "\"「Ưm fufu, Rei-chan làm giỏi quá ta.」\""

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ――あっ」
1364 = "\"「Ehehe——A.」\""

# monologue
# JP: 褒められて調子に乗った途端にガチん！\nスコップを焚き口にあて、れいながシビれた様子を見せる。
1905 = "Vừa được khen xong đắc ý cái là keng một\nphát!\nXẻng đập vào cửa buồng lửa, Reina lộ vẻ tê\nrần cả tay."

# 【れいな】
# display as 玲奈
# JP: 「ふわわ、失敗ですねぇ。\nれいな、びっくりしちゃいましたぁ」
1233 = "\"「Oa, thất bại mất rồi ạ.\nLàm Reina giật cả mình nha~」\""

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんが余計なこといっちゃったけん」
1657 = "\"「Tại chị nói leo vào đấy.」\""

# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいなの失敗でぇす。\n乗務中は、なにがあっても動揺したらダメですからぁ」
1536 = "\"「Không đâu ạ, là lỗi của Reina mà.\nTrong lúc làm nhiệm vụ, dù có chuyện gì\nxảy ra cũng không được phép dao động đâu\nạ~」\""

# monologue
# JP: そこはさすがのプロ意識を見せ、\nれいなはもう一度、ゆっくりゆっくりから仕切り直す。
1899 = "Quả không hổ danh là ý thức chuyên nghiệp,\nReina lại bắt đầu lại từ đầu, chầm chậm\ntừng chút một."

# 【真闇】
# display as 真闇
# JP: 「うんうん、その調子その調子。\nがんばれれーちゃん、がんばれがんばれ」
1537 = "\"「Ừ ừ, đúng rồi, cứ thế nhé.\nCố lên Rei-chan, cố lên cố lên.」\""

# 【れいな】
# display as 玲奈
# JP: 「はぁい！　れいながんばりまぁす」
1426 = "\"「Vâng ạ! Reina sẽ cố gắng hết sức nha~」\""

# monologue
# JP: ……ガイドの仕事が、顧客を喜ばせることにあるなら、\n今日のれいなは最高のガイドなのだと思い直す。
737 = "……Nếu công việc của một hướng dẫn viên là\nlàm cho khách hàng vui vẻ,\nthì em phải công nhận Reina hôm nay chính\nlà hướng dẫn viên tuyệt vời nhất."

# monologue
# JP: （真闇姉の、なんとしあわせそうなことだ）
2043 = "（Trông chị Mayami mới hạnh phúc làm sao.）"

# monologue
# JP: 頬がぽんやり赤らんで、ふとすると、\n幼い少女のようにさえ見え――
1793 = "Hai má ửng hồng mơn mởn, thoạt nhìn,\nchị ấy trông cứ như một thiếu nữ bé bỏng\nvậy——"

# 【真闇】
# display as 真闇
# JP: 「ありがと、双ちゃん。\nめずらしかこと体験できて、楽しかったと」
1601 = "\"「Cảm ơn em nha, Sou-chan.\nĐược trải nghiệm một việc mới mẻ thế này,\nchị vui lắm.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるならばなによりだ」
1643 = "\"「Chị thấy vui là tốt rồi.」\""

# 【真闇】
# display as 真闇
# JP: 「それに……ね。\nこぎゃんこと毎日毎日、事故無くばっちりしとるなんて」
1636 = "\"「Hơn nữa... nhé.\nNgày nào cũng làm những việc thế này một\ncách hoàn hảo mà không hề xảy ra tai nạn\nnào...」\""

# monologue
# JP: 真闇姉の目が改めて、投炭練習機へと向けられる。
1950 = "Ánh mắt chị Mayami lại một lần nữa hướng\nvề phía cỗ máy tập xúc than."

# 【真闇】
# display as 真闇
# JP: 「そーちゃんもなーちゃんもひーちゃんも、\nまっこと凄くて、かっこよかとねぇって、思うたと」
1487 = "\"「Sou-chan, Na-chan và cả Hi-chan nữa,\nchị thấy mọi người thực sự rất tuyệt vời\nvà ngầu lắm luôn ấy.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「光栄だ。というかよければ、日々姫と凪にも\n直接伝えてやってくれ。ちょうどほどなく、駅に8620が」
1476 = "\"「Thật vinh hạnh. Mà nếu được, chị hãy nói\ntrực tiếp\nvới Hibiki và Nagi nhé. Tàu 8620 cũng sắp\nvề đến ga rồi đấy.」\""

# 【真闇】
# display as 真闇
# JP: 「いけんいけん！　そんなんダメよ。遠慮する。\nひーちゃんのお仕事の邪魔、絶対にしとうないけん」
1129 = "\"「Không được không được! Thế thì không\nđược đâu. Chị xin kiếu.\nChị tuyệt đối không muốn làm phiền công\nviệc của Hi-chan đâu.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1514 = "\"「Vậy sao?」\""

# monologue
# JP: ……日々姫は決して邪魔などとは思うまい。\nそうと確信できるのだけれど、真闇姉を否定もしたくない。
743 = "……Hibiki chắc chắn sẽ không bao giờ nghĩ\nlà bị làm phiền đâu.\nEm dám chắc chắn như vậy, nhưng em cũng\nkhông muốn phủ nhận ý kiến của chị Mayami."

# 【真闇】
# display as 真闇
# JP: 「遠くから見て応援するとか――\nそんな感じが、今のおねーちゃんの精一杯やけん」
1469 = "\"「Đứng nhìn và cổ vũ từ xa——\nChỉ như vậy thôi là chị đã mãn nguyện lắm\nrồi.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ならば、れいな！　――おおおっ！？」
1481 = "\"「Ra là vậy. Nếu thế thì, Reina! ——Ô ồ!?」\""

# monologue
# JP: 練習機の炭庫の石炭が、目に見えて量を減らしている。\nほんの少し目を離していただけのつもりなのだが――
1971 = "Lượng than trong khoang chứa của cỗ máy\ntập luyện đã giảm đi trông thấy.\nEm chỉ mới rời mắt đi một chút thôi mà——"

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいな、がんばっちゃいましたぁ。\n性格診断はどうですかぁ？」
1380 = "\"「Ehehe, Reina đã cố gắng hết sức rồi ạ.\nChẩn đoán tính cách thế nào rồi ạ~?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、うむ。そうだったな」
1363 = "\"「Hửm? À, ừm. Đúng rồi nhỉ.」\""

# monologue
# JP: 練習機の裏側の石炭を見る。指導しなかったゆえ当然だが、\nかなり豪快な散らばり具合だ。
1833 = "Em nhìn vào đống than phía sau cỗ máy tập\nluyện. Vì không có ai hướng dẫn nên đương\nnhiên là,\nthan vương vãi khắp nơi trông khá là hoành\ntráng."

# 【双鉄】
# display as 雙鐵
# JP: 「『一生懸命で、物事に夢中になれる素敵な性格』\n――こんな感じと僕には見えるが」
747 = "\"「『Một tính cách tuyệt vời, luôn hết mình\nvà say sưa với mọi việc』\n——Đó là những gì em thấy được.」\""

# 【れいな】
# display as 玲奈
# JP: 「わあ！　あたりでぇす！　ポーレットも、\nれいなは一生懸命ねって、よく褒めてくれるんですよぉ」
1239 = "\"「Oa! Trúng phóc luôn ạ! Paulette cũng hay\nkhen\nReina là lúc nào cũng cố gắng hết mình đó\nnha~」\""

# 【真闇】
# display as 真闇
# JP: 「あらま、すごかね。大当たり！\nね？　双ちゃん、ほんなら、お姉ちゃんの性格は？」
1266 = "\"「Ôi chà, tuyệt quá nhỉ. Trúng phóc luôn!\nNè? Sou-chan, vậy còn tính cách của chị\nthì sao?」\""

# monologue
# JP: 真闇姉の投炭結果は、れいなのそれに埋もれている。\nけれど、迷わず返答できる。
1939 = "Kết quả xúc than của chị Mayami đã bị chôn\nvùi dưới đống than của Reina.\nNhưng em vẫn có thể trả lời mà không chút\ndo dự."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。真闇姉の性格は――」
1337 = "\"「Để xem nào. Tính cách của chị Mayami\nlà——」\""

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんがわがままいったばっかりに、\nごめんね？　急に行程ば増やしてもろうて」
1433 = "\"「Tại chị cứ đòi hỏi ích kỷ,\nxin lỗi em nhé? Tự dưng lại bắt em thêm\nlịch trình thế này.」\""

# 【れいな】
# display as 玲奈
# JP: 「ごめんなんてこと、なんにも一個もないですよぉ？」
1437 = "\"「Không có gì phải xin lỗi đâu ạ, một chút\ncũng không luôn đó nha~?」\""

# monologue
# JP: れいなは小さく首を傾げてけれどもすぐに、\nきょとんとしていた表情を、嬉しげな笑顔に塗り替える。
1903 = "Reina hơi nghiêng đầu, nhưng ngay sau đó,\nvẻ mặt ngơ ngác đã được thay thế bằng một\nnụ cười rạng rỡ."

# 【れいな】
# display as 玲奈
# JP: 「うっふふー、そうてつさんの投炭性格診断、\nおおあたりですねぇ」
1215 = "\"「Ưfufu, chẩn đoán tính cách qua cách xúc\nthan của anh Soutetsu,\ntrúng phóc luôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「！　あらまぁ、ふふふっ、まっことねぇ」
1680 = "\"「! Ôi chà, fufu, đúng là vậy nhỉ.」\""

# 【れいな】
# display as 玲奈
# JP: 「『あらゆることに柔軟なのに、\n自分の欲を前に出すことだけは下手』でしたよねぇ」
746 = "\"「『Tuy rất linh hoạt trong mọi việc,\nnhưng lại cực kỳ kém trong việc thể hiện\nmong muốn của bản thân』 đúng không ạ~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かにそう言った。\nれいなは良く覚えていたなぁ」
1336 = "\"「Ừm. Đúng là anh đã nói vậy.\nReina nhớ giỏi thật đấy.」\""

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、あたってるような気がしたからでぇす」
1365 = "\"「Ehehe, tại vì Reina cảm thấy nó đúng lắm\nluôn đó ạ~」\""

# monologue
# JP: 無邪気な答えに、真闇姉の笑みがさらにやわらぐ。\nならば恐らく真闇姉自身にもこころあたりがあるのだろう。
1784 = "Câu trả lời ngây thơ của Reina khiến nụ\ncười của chị Mayami càng thêm dịu dàng.\nNếu vậy, có lẽ chính bản thân chị ấy cũng\ncảm thấy đúng như thế."

# 【双鉄】
# display as 雙鐵
# JP: 「あたっていようがなかろうが、どうか遠慮しないでくれ。\n新婚旅行の主役は常に、花嫁である真闇姉なのだから」
1125 = "\"「Dù đúng hay sai thì chị cũng đừng khách\nsáo nhé.\nNhân vật chính của tuần trăng mật luôn là\ncô dâu Mayami mà.」\""

# 【れいな】
# display as 玲奈
# JP: 「ですですぅ！　花嫁さんと花婿さんのご希望を、\nれいな、しっかりガイドして叶えちゃいますからぁ」
1511 = "\"「Đúng vậy đúng vậy ạ! Mong muốn của cô\ndâu và chú rể,\nReina sẽ hướng dẫn tận tình và biến chúng\nthành hiện thực luôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「うん。ありがと。ここまででもね？\nまっことたくさん、きもちよー叶えてもらとるけん」
1338 = "\"「Ừm. Cảm ơn em. Chỉ đến đây thôi á?\nChị đã được hai người thực hiện cho rất\nrất nhiều mong muốn rồi đấy.」\""

# monologue
# JP: 真闇姉がれいなの頭を優しく撫でる。\nそうしてぐるり、少しまぶしげにあたりを見回す。
1947 = "Chị Mayami dịu dàng xoa đầu Reina.\nSau đó chị quay một vòng, hơi nheo mắt\nnhìn ngó xung quanh."

# 【真闇】
# display as 真闇
# JP: 「こん橋、\nクマ川第四橋梁なんて、立派な名前がついとったんねぇ」
1626 = "\"「Cây cầu này,\nđược đặt một cái tên thật oai phong nhỉ,\nCầu sắt số 4 sông Kuma cơ đấy.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。立派な名に少しも恥じぬ名橋だ。\n乗務中に上から見ても、こうして横から眺めても」
1343 = "\"「Ừm. Một cây cầu danh tiếng không hề hổ\nthẹn với cái tên oai phong đó.\nDù là nhìn từ trên xuống lúc đang làm\nnhiệm vụ, hay ngắm nghía từ bên hông thế\nnày.」\""

# 【真闇】
# display as 真闇
# JP: 「こん上を、ひーちゃんが運転する8620が駆けていく」
1452 = "\"「Trên cây cầu này, chiếc 8620 do Hi-chan\nlái sẽ chạy ngang qua.」\""

# monologue
# JP: ふっと、吐かれた息はとても短い。
1798 = "Một tiếng thở hắt ra thật khẽ."

# 【真闇】
# display as 真闇
# JP: 「ありがと、双ちゃん、れーちゃん。\nおねーちゃんの見たかもの、見せてくれて」
1602 = "\"「Cảm ơn Sou-chan, Rei-chan.\nĐã cho chị thấy những thứ mà chị muốn\nthấy.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「お安いご用だ。というか、僕も見てみたかった。\nここからこうして眺める機会など、ほとんど無いしな」
1189 = "\"「Chuyện nhỏ thôi mà. Hơn nữa, chính em\ncũng muốn xem thử.\nCơ hội được ngắm nhìn từ góc này hiếm\nlắm.」\""

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。\n写真でならよく見るんですけどねぇ」
1556 = "\"「Reina cũng vậy ạ~.\nDù là qua ảnh thì Reina xem suốt rồi.」\""

# 【真闇】
# display as 真闇
# JP: 「あ、見たことあるかも。\n[おんてつ,1]御鉄さんのカレンダーとかに載ってなかと？　そん写真」
1350 = "\"「A, hình như chị cũng từng thấy rồi.\nBức ảnh đó có in trên lịch của Đường sắt\nOhito đúng không?」\""

# 【れいな】
# display as 玲奈
# JP: 「大正解ですぅ、毎年必ずのってまぁす」
1411 = "\"「Chính xác luôn ạ, năm nào cũng có in đó\nnha~」\""

# monologue
# JP: 毎年必ず――確かにだ。\n少なくとも僕が御一夜鉄道の世話になって以降は、ずっと。
1881 = "Năm nào cũng có——đúng là vậy thật.\nÍt nhất là từ khi em bắt đầu làm việc cho\nĐường sắt Ohito, năm nào cũng vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ここはいわゆる『定番スポット』だからな。\n乗務しているときにしばしば、撮り鉄たちの姿を見る」
1631 = "\"「Vì đây là một 'địa điểm quen thuộc' mà.\nTrong lúc làm nhiệm vụ, em vẫn thường thấy\nbóng dáng của mấy tay thích chụp ảnh tàu ở\nđây.」\""

# 【真闇】
# display as 真闇
# JP: 「あらまぁ、ほんならここも御一夜名所」
1268 = "\"「Ôi chà, vậy ra đây cũng là một danh lam\nthắng cảnh của Ohimitera.」\""

# 【れいな】
# display as 玲奈
# JP: 「ですねぇ。ポーレットや赤井宮司さんも、\nときどき撮りにきてますよぉ」
1500 = "\"「Đúng vậy ạ~. Cả Paulette và thầy cúng\nAkai\nthỉnh thoảng cũng đến đây chụp ảnh đó\nnha~」\""

# 【真闇】
# display as 真闇
# JP: 「ポーちゃんに宮司さんまで！」
1456 = "\"「Cả Po-chan và thầy cúng nữa cơ á!」\""

# monologue
# JP: 一瞬まんまるくなった真闇姉の目が、\nあらためてしげしげと僕を見つめる。
1960 = "Đôi mắt chị Mayami thoáng chốc tròn xoe,\nrồi lại chăm chú nhìn em."

# 【真闇】
# display as 真闇
# JP: 「鉄道写真ば撮るのって、そぎゃん面白かこと？」
1491 = "\"「Chụp ảnh đường sắt thú vị đến thế cơ\nà?」\""

# 【れいな】
# display as 玲奈
# JP: 「ポーレットは楽しんでますよぉ。そういえば、\nそうてつさんはちょっと教わってませんでしたっけ」
1542 = "\"「Paulette thích lắm đó nha~. Mà nhắc mới\nnhớ,\nanh Soutetsu cũng từng được học một chút\nrồi đúng không ạ?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「多少は、という程度だが――うむ。真闇姉とれいなが\n撮りたいというのなら、アドバイスくらいは可能だ」
1200 = "\"「Cũng chỉ là một chút thôi——ừm. Nếu chị\nMayami và Reina\nmuốn chụp thì em có thể hướng dẫn vài mẹo\ncơ bản.」\""

# 【れいな】
# display as 玲奈
# JP: 「わ、わ！\nそれなられいな、せっかくだし撮ってみたいですぅ」
1248 = "\"「Oa, oa!\nNếu vậy thì Reina cũng muốn thử chụp một\ntấm cho biết ạ~」\""

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、そういうことならせっかくやけん。\nばってん、カメラなんてもってなかとよ？」
1628 = "\"「Nếu vậy thì chị cũng muốn thử cho biết.\nNhưng mà, chị có mang theo máy ảnh đâu?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふたりとも持っている。\nそれも、かなり使い慣れているものを」
1135 = "\"「Không đâu, cả hai người đều đang cầm\nđấy.\nLại còn là thứ rất quen thuộc nữa cơ.」\""

# 【れいな】
# display as 玲奈
# JP: 「えええ？　れいな、カメラだなんて」
1272 = "\"「Ể? Reina làm gì có máy ảnh nào...」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ。わかった。れーちゃん？　はい、チーズ」
1218 = "\"「Ưm fufu. Chị hiểu rồi. Rei-chan? Nào,\ncười lên.」\""

# 【れいな】
# display as 玲奈
# JP: 「え？　ひゃっ！」
1314 = "\"「Dạ? Á!」\""

# monologue
# JP: (ぱしゃっ）
2037 = "（Tách）"

# monologue
# JP: 写真に撮られたびっくり顔が笑顔にかわる。\nれいなもいそいそ、自分のスマホを取り出し構える。
1894 = "Khuôn mặt giật mình trong bức ảnh nhanh\nchóng chuyển thành nụ cười.\nReina cũng vội vàng lấy điện thoại của\nmình ra và giơ lên."

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいなも記念写真とっちゃいますねぇ。\nおふたりぴったりくっついて――はい、けーゆ」
1372 = "\"「Ehehe, Reina cũng chụp một bức ảnh kỷ\nniệm đây ạ~.\nHai người đứng sát vào nhau nào——Nào, dầu\ndiesel.」\""

# 【真闇】
# display as 真闇
# JP: 「軽油って」
1525 = "\"「Dầu diesel á.」\""

# monologue
# JP: あまりの掛け声に吹き出した、その瞬間のシャッター音。\nこれは恐らく、自然な笑顔が写っていよう。
1825 = "Ngay khoảnh khắc bật cười vì câu khẩu lệnh\nkỳ quặc ấy, tiếng màn trập vang lên.\nBức ảnh này chắc chắn đã bắt được một nụ\ncười rất tự nhiên."

# 【真闇】
# display as 真闇
# JP: 「ほんなら、三人の記念写真も」
1638 = "\"「Vậy thì, chụp một tấm kỷ niệm ba người\nluôn đi.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「実にいいな。が、少しだけ先延ばしにしよう。\n列車が来る前に準備を整えてしまいたい」
1416 = "\"「Tuyệt quá. Nhưng cứ từ từ đã.\nEm muốn chuẩn bị xong xuôi trước khi tàu\nđến.」\""

# 【真闇】
# display as 真闇
# JP: 「あ、うん！　ええと――\n鉄道写真ば撮るコツみたいなのってあったら、教えて？」
1306 = "\"「À, ừ! Để xem——\nCó mẹo nào để chụp ảnh đường sắt đẹp\nkhông, chỉ chị với?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1346 = "「嗯」" 

# monologue
# JP: 笑顔が一気に引き締まってる。\n日々姫乗務の8620――綺麗に収めてやりたいのだろう。
1789 = "Nụ cười bỗng chốc trở nên nghiêm túc.\nChiếc 8620 do Hibiki điều khiển——chắc hẳn\nchị ấy muốn chụp lại thật đẹp."

# 【双鉄】
# display as 雙鐵
# JP: 「この遠さでスマホカメラなので、凝ったことはできん。\nまず、橋全体が丁度画角に収まるようにズーム調整して」
1392 = "\"「Với khoảng cách này mà dùng camera điện\nthoại thì không thể chụp cầu kỳ được đâu.\nTrước tiên, chị chỉnh zoom sao cho toàn bộ\ncây cầu vừa vặn nằm trong khung hình đi.」\""

# 【真闇】
# display as 真闇
# JP: 「ん……っと――うん。こぎゃん感じかな」
1328 = "\"「Ưm……để xem——Ừ. Cỡ này được chưa?」\""

# 【れいな】
# display as 玲奈
# JP: 「れいなもできましたぁ」
1554 = "\"「Reina cũng xong rồi ạ~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたらスマホを両手で構えて、脇をぎゅっと締める。\n脇が締まれば安定するゆえ、手ブレの発生を軽減できる」
1549 = "\"「Tiếp theo, hai người cầm điện thoại bằng\nhai tay, kẹp chặt nách lại.\nKẹp chặt nách sẽ giúp cố định tư thế, giảm\nthiểu tình trạng rung tay.」\""

# 【真闇】
# display as 真闇
# JP: 「りょうてで構えて脇を――こぎゃん、感じ？」
1173 = "\"「Cầm bằng hai tay rồi kẹp chặt nách——như\nthế này hả?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、良いと思う」
1359 = "\"「Ừm, tốt lắm.」\""

# monologue
# JP: たわわな胸がより強調され、一瞬目と気を奪われかける。\nけれどもこれは大事な写真。すぐに自らを引き締めなおす。
1785 = "Bộ ngực căng đầy càng thêm nổi bật, khiến\nem thoáng chốc mất tập trung.\nNhưng đây là một bức ảnh quan trọng. Em\nlập tức xốc lại tinh thần."

# 【双鉄】
# display as 雙鐵
# JP: 「あとは、機関車の先頭がどこにきたら撮るかを決めて、\nその瞬間にシャッターを切ればいいだけだ」
1548 = "\"「Sau đó, chỉ cần canh xem đầu máy chạy\nđến đâu thì bấm máy,\nrồi chớp lấy khoảnh khắc đó là được.」\""

# 【真闇】
# display as 真闇
# JP: 「どこにきたら……とか言われても。\nおねーちゃん、とんと検討もつかんけん」
1157 = "\"「Canh đến đâu á……em nói thế thì.\nChị chẳng biết đường nào mà lần đâu.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1323 = "\"「À——」\""

# monologue
# JP: 進行方向、一番対岸よりの橋脚に機関車先頭が差し掛かる\nタイミングでどんぴしゃりかと思う……の、だ、が……
1886 = "Em nghĩ thời điểm hoàn hảo nhất là khi đầu\nmáy vừa chạm đến\ntrụ cầu sát bờ đối diện theo hướng di\nchuyển……nhưng mà……"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば動画撮影でどうだろう。\nその方が確実に良いものが撮れそうだ」
1651 = "\"「Nếu vậy thì quay video luôn đi.\nNhư thế chắc chắn sẽ ghi lại được những\nkhoảnh khắc đẹp.」\""

# 【真闇】
# display as 真闇
# JP: 「あ！　そぎゃんしてもらえるとうれしか。\nほんならね？　写真は双ちゃんが担当で」
1302 = "\"「A! Nếu được thế thì tốt quá.\nVậy thì nhé? Sou-chan sẽ phụ trách chụp\nảnh.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。注意すべきは、絶対にカメラを動かさないこと。\n映す景色は固定して、その中に機関車を走らせるのだ」
1493 = "\"「Đã rõ. Lưu ý là tuyệt đối không được di\nchuyển máy ảnh nhé.\nCứ giữ cố định khung cảnh, rồi để đầu máy\nchạy vào trong đó.」\""

# 【真闇】
# display as 真闇
# JP: 「そぎゃんする。おねえちゃんがカメラば動かしたら、\nブレブレになっちゃいそうやけん」
1641 = "\"「Chị sẽ làm vậy. Nếu chị mà di chuyển máy\nảnh,\nchắc hình sẽ rung bần bật mất.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな――そろそろくるぞ。\nん？」
1501 = "\"「Đúng vậy——sắp đến rồi đấy.\nHửm?」\""

# monologue
# JP: ふと見れば、れいなはスマホをしまってしまった。
1743 = "Nhìn sang, em thấy Reina đã cất điện thoại\nđi rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは撮らんでいいのか？」
1553 = "\"「Reina không chụp à?」\""

# 【れいな】
# display as 玲奈
# JP: 「今度ポーレットにつれてきてもらってとりまぁす。\nいまはれいな、ガイドさんのお仕事ですから」
1117 = "\"「Để lần sau Paulette dẫn Reina đến rồi\nchụp cũng được ạ~.\nBây giờ Reina đang làm nhiệm vụ hướng dẫn\nviên mà.」\""

# monologue
# JP: （ぽっ！！）
2039 = "（Tu!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「来るぞ」
1167 = "\"「Đến rồi kìa.」\""

# monologue
# JP: 橋梁にさしかかる前の合図の汽笛。\nもうおしゃべりする時間もない。
1756 = "Tiếng còi báo hiệu trước khi lên cầu sắt.\nKhông còn thời gian để trò chuyện nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉！　脇を締めて固定だ！　動くなよ」
1578 = "\"「Chị Mayami! Kẹp chặt nách cố định lại!\nĐừng cử động nhé.」\""

# 【真闇】
# display as 真闇
# JP: 「うん――あっ！」
1319 = "\"「Ừ——A!」\""

# monologue
# JP: （ぽーーーーーーーーーーーーーーーーーーーっ！！！）
2038 = "（Tuúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúú!!!）"

# monologue
# JP: 大サービスの長汽笛。\n汽笛に押された如くたなびく、見事なまでの長白煙。
1966 = "Một tiếng còi hơi nước kéo dài hết sức hào\nphóng.\nCột khói trắng dài tuyệt đẹp cuồn cuộn\ntuôn ra như bị tiếng còi đẩy lên."

# 【真闇】
# display as 真闇
# JP: 「ああ……こいば……」
1294 = "\"「A……Cái này……」\""

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ」
1431 = "\"「Tốt lắm.」\""

# monologue
# JP: ベストなタイミングでシャッターを切れた。\n真闇姉はと見てみれば、スマホはしかと構えたまま――
1827 = "Em đã bấm máy vào đúng khoảnh khắc hoàn\nhảo nhất.\nNhìn sang chị Mayami, thấy chị ấy vẫn giữ\nkhư khư chiếc điện thoại——"

# 【真闇】
# display as 真闇
# JP: 「……あぎゃん綺麗で見事な列車を、ひーちゃんが」
760 = "\"「……Một đoàn tàu đẹp đẽ và lộng lẫy đến\nvậy, do chính Hi-chan lái.」\""

# monologue
# JP: 8620が走り去っていった方へと、首が、視線が向いている。\nなぜだかそれが、とても嬉しい。
1794 = "Đầu và ánh mắt của chị hướng về phía chiếc\n8620 vừa chạy khuất.\nChẳng hiểu sao, điều đó lại khiến em cảm\nthấy vô cùng hạnh phúc."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。これも日々姫の仕事だ。車両デザインだけでなく、\n機関士としても、もう完全に一人前だ」
1342 = "\"「Vâng. Đó cũng là công việc của Hibiki.\nKhông chỉ thiết kế toa xe,\nmà với tư cách là một lái tàu, em ấy cũng\nđã hoàn toàn trưởng thành rồi.」\""

# 【真闇】
# display as 真闇
# JP: 「すごか――すごかとねぇ！\nひーちゃんがあぎゃん立派な汽車ば！」
1409 = "\"「Tuyệt quá——tuyệt vời quá đi mất!\nHi-chan mà lại lái được một chuyến tàu\nhoành tráng đến thế!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ぜひとも直接伝えてやってくれ。今のひとこと、\n日々姫もハチロクも大いに喜ぶに違いない」
1161 = "\"「Chị nhất định phải nói trực tiếp với em\nấy nhé. Nghe được những lời này,\nchắc chắn cả Hibiki và Hachiroku sẽ rất\nvui đấy.」\""

# monologue
# JP: 言った途端に、ああ、と気づいて言葉を継ぎ足す。
2002 = "Vừa dứt lời, em chợt nhận ra điều gì đó và\nvội nói thêm."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも、さぞや評価を気にしているだろうしな。\n真闇姉にまさに今、仕事ぶりを見てもらえたわけだから」
1591 = "\"「Cả hai người họ chắc hẳn đang rất quan\ntâm đến đánh giá của mọi người.\nĐặc biệt là khi chị Mayami vừa được tận\nmắt chứng kiến công việc của họ.」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、冗談。\nそんなん、気がつくわけないでしょお」
1280 = "\"「Ưm fufu, em đùa à.\nLàm sao mà hai đứa nó nhận ra chị được\nchứ.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　そうとも限らんのだ。ほら」
1512 = "\"「Chưa chắc đâu? Không hẳn là vậy đâu.\nNhìn kìa.」\""

# monologue
# JP: 真闇姉を促しながられいなを見れば、\n丁度帽子を被りなおしているところだ。
1819 = "Vừa giục chị Mayami, em vừa nhìn sang\nReina,\nđúng lúc cô bé đang đội lại chiếc mũ."

# 【双鉄】
# display as 雙鐵
# JP: 「定番スポットは、乗務中なんとなく見るものなのだ。\nまして、帽子を振って合図しているものがいるのなら」
1141 = "\"「Những địa điểm quen thuộc thì trong lúc\nlàm nhiệm vụ người ta vẫn hay để ý mà.\nHuống hồ lại còn có người đang vẫy mũ ra\nhiệu nữa chứ.」\""

# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。れいなには共感もありますからねぇ。\n[ちょうきてき,2]長汽笛、綺麗なの鳴らしてもらえちゃいましたぁ」
1275 = "\"「Ehehe. Reina còn có cộng cảm nữa mà.\nĐược nghe tiếng còi hơi nước kéo dài hay\ntuyệt cú mèo luôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「ありゃ。そしたらおねーちゃんがお仕事参観したの、\nひーちゃんも……」
1258 = "\"「Ôi chà. Vậy là việc chị đến xem mọi\nngười làm việc,\nHi-chan cũng...」\""

# monologue
# JP: 珍しい。真闇姉の百面相だ。\n照れて困ってはにかんで――
1909 = "Thật hiếm thấy. Khuôn mặt chị Mayami thay\nđổi liên tục.\nTừ xấu hổ, bối rối cho đến e thẹn——"

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、連れて来てくれて！\nれーちゃん、さいっこーのガイドば！」
1458 = "\"「Sou-chan, cảm ơn em đã dẫn chị đến đây!\nRei-chan, em là hướng dẫn viên tuyệt vời\nnhất đấy!」\""

# monologue
# JP: そうしてぱっと、大きな笑顔に花開く。
1892 = "Và rồi, một nụ cười rạng rỡ nở rộ trên môi\nchị."

# 【真闇】
# display as 真闇
# JP: 「まっこと！　まっことありがとぉ！！」
1574 = "\"「Thật sự! Thật sự cảm ơn hai người rất\nnhiều!!」\""

# 【れいな】
# display as 玲奈
# JP: 「つきましたぁ！」
1181 = "\"「Đến nơi rồi ạ~」\""

# monologue
# JP: 風呂とご飯とキハ07ｓへの乗車と。\nそれらを残すだけとなった、御一夜観光の締めくくり。
1884 = "\"Tắm rửa, ăn uống và lên chuyến tàu Kiha\n07S.\nChuyến tham quan Ohimitera chỉ còn lại\nnhững việc đó để khép lại.\""

# 【れいな】
# display as 玲奈
# JP: 「れいなのおすすめスポット、ここにしちゃいましたぁ！\n『右田一酒造元』さんでぇす！」
1562 = "\"「Địa điểm Reina muốn giới thiệu là ở đây\nạ~!\nChính là xưởng rượu Migitakazu đó nha~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1346 = "「嗯」" 

# monologue
# JP: 案内される道中ずっとまさかまさかと思っていたが、\nまことにそのものズバリでくるとは――
1901 = "Suốt quãng đường được dẫn đi, em đã cứ\nnghĩ là không thể nào đâu, không thể nào\nđâu,\nnhưng không ngờ lại đúng chóc thế này——"

# 【真闇】
# display as 真闇
# JP: 「あらまぁ。れーちゃん、\nどぎゃんしてここばおすすめしてくれたと？」
1256 = "\"「Ôi chà. Rei-chan,\nsao em lại giới thiệu chỗ này thế?」\""

# monologue
# JP: なるほど、さすがは真闇姉だ。\nリアクションに困って硬直していた僕なぞと、器が違う。
1763 = "Ra là vậy, quả không hổ danh chị Mayami.\nĐẳng cấp hoàn toàn khác biệt với đứa đang\nđứng hình không biết phản ứng sao như em."

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。れいなが御一夜観光するなら、絶対絶対\nレールショップみてみたいって思ったからでぇす」
1368 = "\"「Ufufu~. Vì Reina nghĩ nếu đi tham quan\nOhimitera, thì nhất định nhất định\nphải ghé xem cửa hàng đường sắt một lần đó\nnha~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはわかるな」
1309 = "\"「À, điều đó thì anh hiểu.」\""

# monologue
# JP: れいながレールショップを観光するのは、実に和もう。\nが、真闇姉が右田一酒造元を見学するのは……
1829 = "Việc Reina đi tham quan cửa hàng đường sắt\nthì quả thực rất thú vị.\nNhưng việc chị Mayami đi tham quan xưởng\nrượu Migitakazu thì……"

# 【真闇】
# display as 真闇
# JP: 「面白そうやけん。\n見学、うちもしてみたかばってん……」
1594 = "\"「Nghe có vẻ thú vị nhỉ.\nChị cũng muốn thử tham quan một chút,\nnhưng mà……」\""

# 【れいな】
# display as 玲奈
# JP: 「わぁい。それなら！」
1430 = "\"「Oa. Nếu vậy thì!」\""

# 【真闇】
# display as 真闇
# JP: 「あ、ちょっと待ってれーちゃん、うちがいったら、\n視察いうか、抜き打ち検査みたいに思われちゃいそうで」
1313 = "\"「A, khoan đã Rei-chan, nếu chị mà đến đó,\nngười ta lại tưởng là đi thị sát hay kiểm\ntra đột xuất mất.」\""

# 【れいな】
# display as 玲奈
# JP: 「あー、そっかぁ、れいな、\nそこまでは考えてませんでしたぁ」
1311 = "\"「A, ra là vậy, Reina\nchưa nghĩ đến chuyện đó ạ~」\""

# monologue
# JP: 言って、れいなは文字通りに頭をひねる。\nひねってひねって――ぽん、と両手があわされる。
2005 = "Nói rồi, Reina đúng nghĩa vò đầu bứt tai.\nVò qua vò lại——Bốp, cô bé vỗ hai tay vào\nnhau."

# 【れいな】
# display as 玲奈
# JP: 「れいな！　いいことかんがえましたぁ。\nそれならそれなら、変装しちゃうのどうですかぁ！」
1560 = "\"「Reina! Nghĩ ra cách hay rồi ạ~.\nNếu vậy, nếu vậy thì, chúng ta cải trang\nthì sao ạ~?」\""

# 【真闇】
# display as 真闇
# JP: 「変装！」
1318 = "\"「Cải trang á!」\""

# monologue
# JP: 突拍子もないアイディアに、真闇姉が吹き出してしまう。
2015 = "Ý tưởng bất ngờ đó khiến chị Mayami bật\ncười thành tiếng."

# 【真闇】
# display as 真闇
# JP: 「変装はよかとねぇ。ね、れーちゃん。\nみんなそれぞれ、どぎゃん変装がよかろうもんね」
1317 = "\"「Cải trang cũng được đấy nhỉ. Nè,\nRei-chan.\nMỗi người nên cải trang thành gì thì hợp\nnhỉ?」\""

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはお顔が綺麗だから、\n女の子の格好したらきっと似合うって思いまぁす」
1662 = "\"「Anh Soutetsu có khuôn mặt đẹp,\nnên nếu mặc đồ con gái chắc chắn sẽ hợp\nlắm đó nha~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「なんと。女装か。\n女性としてはかなり長身となりそうだが」
1145 = "\"「Cái gì cơ. Giả gái á.\nThế thì sẽ thành một cô gái khá là cao kều\nđấy.」\""

# 【真闇】
# display as 真闇
# JP: 「やけん、モデルさんみたいになるんじゃなかと？\nおねーちゃん、一度見てみたいかも」
1111 = "\"「Vậy thì sẽ giống người mẫu lắm đúng\nkhông?\nChị cũng muốn xem thử một lần xem sao.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「う……うむ。真闇姉の要望であるというなら、\n前向きに善処する方向での検討をさせていただこう」
1286 = "\"「Ư……ừm. Nếu là yêu cầu của chị Mayami,\nthì em sẽ xem xét giải quyết theo hướng\ntích cực vậy.」\""

# monologue
# JP: この話、長々ひっぱってしまえば危うい。\n直感するゆえ、中ば強引に断ち切っていく。
2016 = "Chủ đề này mà kéo dài thêm thì nguy hiểm\nlắm.\nLinh tính mách bảo thế, nên em phải nửa ép\nbuộc cắt ngang."

# 【双鉄】
# display as 雙鐵
# JP: 「では、真闇姉はどうだ？　どんな仮装が――」
1653 = "\"「Vậy, còn chị Mayami thì sao? Nên cải\ntrang thành——」\""

# 【れいな】
# display as 玲奈
# JP: 「まくらさんはシスターさんがいいですよぉ。\nお顔も隠せるし、雰囲気もぴったりですぅ」
1580 = "\"「Chị Makura thì đóng giả ma sơ là tuyệt\nnhất ạ~.\nVừa giấu được mặt, mà khí chất cũng hợp vô\ncùng luôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「シスター！　あらまぁ、\nおねえちゃんに似合うかしらん」
1169 = "\"「Ma sơ! Ôi chà,\nkhông biết chị mặc có hợp không nhỉ.」\""

# monologue
# JP: シスターとは、これまた意外なところが来たが――
1800 = "Ma sơ á, lại là một ý tưởng khá bất ngờ\nđây——"

# 【双鉄】
# display as 雙鐵
# JP: 「似合うに決まっている。なかなか――いや、実にいいな。\n面白い。修道服はまったく思い浮かんでなかった」
1568 = "\"「Chắc chắn là hợp rồi. Khá là——không,\nthực sự rất tuyệt đấy.\nThú vị thật. Em hoàn toàn chưa nghĩ đến\ntrang phục tu sĩ luôn.」\""

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、こないだポーレットとみた映画に\nシスターさんが出てきて、とっても素敵だったんですぅ」
1374 = "\"「Ehehe, hôm bữa Reina xem phim với\nPaulette,\ncó ma sơ xuất hiện trong đó, tuyệt vời lắm\nluôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、それじゃあれーちゃんは何に変装すると？」
1285 = "\"「Ưm fufu, vậy thì Rei-chan sẽ cải trang\nthành gì nào?」\""

# 【れいな】
# display as 玲奈
# JP: 「おんなじ映画にでてきた、靴磨きの男の子でぇす！\nポーレットが、れいなにとっても似合いそうって」
1208 = "\"「Là cậu bé đánh giày trong bộ phim đó ạ~!\nPaulette bảo là Reina đóng vai đó chắc hợp\nlắm.」\""

# 【真闇】
# display as 真闇
# JP: 「あらまぁかわゆか！　そいもぴたっとハマるとねぇ」
1296 = "\"「Ôi chà dễ thương quá! Thế thì hợp quá\ncòn gì.」\""

# monologue
# JP: うむ。実にいい。れいなが見た映画が何かは知らねど、\nかなり明確なイメージが、自然と脳裏に浮かんでくる。
1777 = "Ừm. Tuyệt thật. Dù không biết Reina đã xem\nphim gì,\nnhưng một hình ảnh khá rõ ràng đang tự\nnhiên hiện lên trong tâm trí em."

# 【双鉄】
# display as 雙鐵
# JP: 「面白いな。変装というより仮装となってしまいそうだが\n……いや、あるいはそうした列車を走らせてもいいか」
1517 = "\"「Thú vị thật. Cảm giác giống hóa trang\nhơn là cải trang rồi\n……Nhưng mà, có khi cho chạy một chuyến tàu\nnhư thế cũng hay đấy.」\""

# 【れいな】
# display as 玲奈
# JP: 「わわわ！　とってもおもしろそうですぅ」
1244 = "\"「Oa oa oa! Nghe có vẻ thú vị lắm đó\nnha~」\""

# 【真闇】
# display as 真闇
# JP: 「そうした列車って、どぎゃん列車？」
1627 = "\"「Chuyến tàu như thế, là chuyến tàu như\nthế nào?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「仮装列車、コスプレトレインだ。例えば『西部劇列車』\nとお題を定め、乗員乗客内装等、全てを統一する的な」
1187 = "\"「Tàu hóa trang, Cosplay Train ấy. Ví dụ\nlấy chủ đề là 『Tàu viễn tây』\nrồi thống nhất toàn bộ từ nhân viên, hành\nkhách cho đến nội thất.」\""

# 【真闇】
# display as 真闇
# JP: 「あらまぁまっこと面白そう！」
1269 = "\"「Ôi chà, nghe thú vị thật đấy!」\""

# 【日々姫】
# display as 日日姬
# JP: 「って、ねぇね！？　にぃに！？\n新婚旅行、もう終わったと！？　まさかの日帰り！？」
1230 = "\"「Ơ, chị hai!? Anh hai!?\nTuần trăng mật kết thúc rồi á!? Đừng nói\nlà đi về trong ngày nha!?」\""

# 【真闇】
# display as 真闇
# JP: 「ありゃまぁひーちゃん」
1262 = "\"「Ôi chà, Hi-chan.」\""

# monologue
# JP: 日々姫だ。なっぱ服はもう着替えているが、\n半切り缶を片手にさげて、乗務あがりとはっきりわかる。
1871 = "Là Hibiki. Em ấy đã thay đồng phục rồi,\nnhưng tay vẫn xách theo chiếc hộp thiếc\nnửa vầng trăng, nhìn là biết vừa xong\nnhiệm vụ."

# 【双鉄】
# display as 雙鐵
# JP: 「お疲れ様だ。見ていたぞ。いい乗務だったな」
1612 = "\"「Vất vả cho em rồi. Bọn anh có xem đấy.\nChuyến đi tuyệt lắm.」\""

# 【日々姫】
# display as 日日姬
# JP: 「あ！　やっぱりあれ\nねえねとにぃにとれいなちゃんだったとね」
1304 = "\"「A! Quả nhiên lúc nãy\nlà chị hai, anh hai và bé Reina mà.」\""

# 【真闇】
# display as 真闇
# JP: 「見えてたと？」
1166 = "\"「Em thấy à?」\""

# 【日々姫】
# display as 日日姬
# JP: 「横目で一瞬。誰かが手ぇふってるの見えたけん。\nハチロクは妙ににやにやしてるし、そうかなぁって」
1520 = "\"「Liếc ngang một cái là thấy ngay. Em thấy\ncó ai đó đang vẫy tay.\nHachiroku thì cứ cười tủm tỉm kỳ lạ, nên\nem mới đoán vậy.」\""

# monologue
# JP: うんうん、とにこにこ柔らかに頷いて。\nその笑顔のまま、真闇姉が静かな声を出す。
1779 = "Chị Mayami cười mỉm, dịu dàng gật đầu.\nVẫn giữ nguyên nụ cười đó, chị cất giọng\nnhẹ nhàng."

# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、かっこよかったと」
1454 = "\"「Hi-chan, em ngầu lắm.」\""

# 【日々姫】
# display as 日日姬
# JP: 「！」
# 1678 = "「！」" 

# monologue
# JP: 束の間驚いた顔をして、日々姫は――\nうむ？　妙にはにかみ、言葉がなかなか出てこんようだ。
1868 = "Hibiki thoáng lộ vẻ ngạc nhiên, rồi——\nỪm? Em ấy bỗng dưng bẽn lẽn lạ thường, mãi\nkhông thốt nên lời."

# 【双鉄】
# display as 雙鐵
# JP: 「実際よかった。煙も綺麗な白煙で、長汽笛も高らかで。\n[かま]罐を上手く整えているなと、目でも耳でも感じられた」
1573 = "\"「Thực sự rất tuyệt. Khói trắng muốt,\ntiếng còi hơi nước cũng vang vọng.\nCả mắt và tai đều có thể cảm nhận được em\nđang điều chỉnh lò hơi rất tốt.」\""

# 【日々姫】
# display as 日日姬
# JP: 「えへへ、ありがと。ゆーか、それよか、新婚旅行。\n……中断、とかじゃなかとよね？」
1381 = "\"「Ehehe, cảm ơn anh. Mà, quan trọng hơn là\ntuần trăng mật.\n……Không phải là bị gián đoạn đấy chứ?」\""

# 【真闇】
# display as 真闇
# JP: 「中断だなんてとんでもない。\nばってん、酒造見学、どぎゃんしようかって」
1535 = "\"「Làm gì có chuyện gián đoạn.\nNhưng mà, vụ tham quan xưởng rượu, đang\nkhông biết phải làm sao đây.」\""

# monologue
# JP: 真闇姉が事情を説明すれば、\n日々姫はあーーー、と深くうなずく。
1944 = "Nghe chị Mayami giải thích tình hình,\nHibiki \"À——\" lên một tiếng rồi gật gù thấu\nhiểu."

# 【日々姫】
# display as 日日姬
# JP: 「わかる！　わかると！！　気ぃ使わせちゃいそうで、\n興味あってもできんよね、うちん蔵の見学」
1479 = "\"「Em hiểu! Em hiểu mà!! Sợ người ta phải\nbận tâm,\nnên dù có hứng thú cũng không dám đi tham\nquan xưởng rượu nhà mình nhỉ.」\""

# 【真闇】
# display as 真闇
# JP: 「ゆーか、ひーちゃん」
1600 = "\"「Mà này, Hi-chan.」\""

# monologue
# JP: 真闇姉の声に、わずかな緊張の色を感じる。\nごくさりげなく、自然に話そうとはしているが――
1828 = "Trong giọng nói của chị Mayami có thoảng\nchút căng thẳng.\nDù chị đang cố gắng nói chuyện một cách tự\nnhiên nhất có thể——"

# 【真闇】
# display as 真闇
# JP: 「興味あるなら、酒造見学してみると？\nおねーちゃん、ひーちゃんのこと案内したいけん」
1518 = "\"「Nếu em có hứng thú, hay là thử đi tham\nquan xưởng rượu xem sao?\nChị muốn làm hướng dẫn viên cho Hi-chan\nlắm.」\""

# 【日々姫】
# display as 日日姬
# JP: 「！　してみたか！！」
1681 = "\"「! Em muốn đi!!」\""

# monologue
# JP: 弾けるように口にして。\nその口を、日々姫はあわてて両手で覆う。
1797 = "Em ấy thốt lên như reo mừng.\nRồi vội vàng lấy hai tay bịt miệng lại."

# 【日々姫】
# display as 日日姬
# JP: 「あうっ。ねぇねの案内で見学とってもうれしかばってん。\n今じゃなくても。新婚旅行のお邪魔しちゃったら」
1300 = "\"「Á. Được chị hai hướng dẫn thì em vui\nlắm.\nNhưng không phải bây giờ. Nhỡ làm phiền\ntuần trăng mật của hai người thì sao.」\""

# 【真闇】
# display as 真闇
# JP: 「お邪魔になんてなるわけなかと」
1473 = "\"「Làm gì có chuyện phiền hà chứ.」\""

# monologue
# JP: やわらいだ、けれど迷いなく言い切った声。\n無論、僕も全力で頷いている。
1791 = "Giọng nói dịu dàng, nhưng vô cùng dứt\nkhoát.\nĐương nhiên, em cũng gật đầu đồng ý nhiệt\nliệt."

# 【真闇】
# display as 真闇
# JP: 「それに、おねーちゃんも、自分の仕事見てもらいたか。\nひーちゃんの見事なお仕事、今日、見せてもろうたけん」
1592 = "\"「Với lại, chị cũng muốn cho em xem công\nviệc của chị.\nHôm nay chị đã được chiêm ngưỡng công việc\ntuyệt vời của Hi-chan rồi mà.」\""

# 【日々姫】
# display as 日日姬
# JP: 「あ……。\n――うん！　そぎゃんことなら、見学したかと」
1290 = "\"「A…….\n——Vâng! Nếu vậy thì, em muốn đi tham quan\nạ.」\""

# 【真闇】
# display as 真闇
# JP: 「オッケ。それじゃあ皆さん見学どうぞ。\nおねえちゃんすぐ支度して――五分も待たせんけん」
1418 = "\"「Ok. Vậy mời mọi người vào tham quan nhé.\nChị đi chuẩn bị ngay đây——sẽ không để mọi\nngười đợi quá năm phút đâu.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1484 = "\"「Đã rõ.」\""

# 【れいな】
# display as 玲奈
# JP: 「わぁい！　まくらさんに案内してもらえるの、\nれいな、とってもうれしいですよぉ」
1243 = "\"「Oa! Được chị Makura hướng dẫn,\nReina vui lắm luôn đó nha~」\""

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ、私もまっこと嬉しか！\nゆーか、今日はどこを回ってきたと？」
1378 = "\"「Ehehe, em cũng vui lắm luôn!\nMà hôm nay mọi người đã đi những đâu\nvậy?」\""

# 【れいな】
# display as 玲奈
# JP: 「ええとですねぇ。まずはクマ川くだりにいってぇ」
1288 = "\"「Để xem nào. Đầu tiên là tụi em đi thuyền\nxuôi dòng Kuma này~」\""

# monologue
# JP: ……なんだかんだと話していれば、\n五分など一瞬して過ぎ去ってる。
740 = "……Mải nói chuyện này nọ,\nnăm phút đã trôi qua trong chớp mắt."

# 【真闇】
# display as 真闇
# JP: 「はーい！　見学のみなさん、おまたせしましたぁ」
1423 = "\"「Vâng! Xin lỗi đã để đoàn tham quan phải\nchờ lâu ạ~」\""

# 【れいな】
# display as 玲奈
# JP: 「……ふわぁあ。とっても勉強になりましたぁ」
757 = "\"「……Oaaaa. Học hỏi được bao nhiêu thứ luôn\nđó nha~」\""

# monologue
# JP: れいなの声に、日々姫も僕も頷いている。
1861 = "Nghe Reina nói vậy, cả em và Hibiki đều\ngật gù đồng tình."

# 【日々姫】
# display as 日日姬
# JP: 「知っとるつもりのことでも、知らんかったと。\n……焼酎、こぎゃんして作っとったんねぇ」
1419 = "\"「Có những chuyện tưởng chừng như đã biết\nmà hóa ra lại chẳng biết gì.\n……Rượu shochu, hóa ra được làm ra như thế\nnày nhỉ.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1509 = "「是啊」" 

# monologue
# JP: 門前の小僧習わぬ経を――というレベルの知識は、\n僕にもあったし、日々姫であれば尚更だろう。が――
2014 = "Cái gọi là \"Trẻ con trước cổng chùa không\nhọc cũng thuộc kinh\"——kiến thức ở mức độ\nđó,\nem cũng có, mà Hibiki thì lại càng rành\nhơn. Nhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「麹が生きているのと同じく、蔵そのものも生きている。\n僕ははじめて、そうと実感……体感できた気がするよ」
1190 = "\"「Cũng giống như men koji đang sống, bản\nthân xưởng rượu này cũng đang sống.\nLần đầu tiên anh cảm nhận được... trải\nnghiệm được điều đó.」\""

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1346 = "「嗯」" 

# monologue
# JP: 日々姫の視線がまっすぐ真闇姉を向く。\nそうして深く、頭がさがる。
1866 = "Ánh mắt Hibiki hướng thẳng về phía chị\nMayami.\nSau đó, em ấy cúi đầu thật sâu."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇね、ありがと。ねぇねのお仕事ば見せてくれて。\nジャンルは全然違うけど、私、勉強させてもらった」
1603 = "\"「Chị hai, cảm ơn chị. Cảm ơn chị đã cho\nem xem công việc của chị.\nDù lĩnh vực hoàn toàn khác nhau, nhưng em\nđã học hỏi được rất nhiều điều.」\""

# 【真闇】
# display as 真闇
# JP: 「まだよ、ひーちゃん」
1637 = "\"「Vẫn chưa xong đâu, Hi-chan.」\""

# monologue
# JP: 真闇姉がふんわり日々姫の言葉を止める。\nそうしてその手は、ラベルの貼られぬ一升瓶を持ち上げる。
1952 = "Chị Mayami nhẹ nhàng ngắt lời Hibiki.\nRồi tay chị nhấc lên một chai rượu Issho\nchưa dán nhãn."

# 【真闇】
# display as 真闇
# JP: 「ほんのひとくち味わってみて？\nおねーちゃんの仕事ば評価するのは、そんあとで」
1385 = "\"「Nếm thử một ngụm nhỏ đi?\nRồi hẵng đánh giá công việc của chị sau\nnhé.」\""

# 【日々姫】
# display as 日日姬
# JP: 「うん。飲みたい。今日はもう、お仕事おわっとるし」
1333 = "\"「Vâng. Em muốn uống. Hôm nay em cũng xong\nviệc rồi.」\""

# 【真闇】
# display as 真闇
# JP: 「ん。ね？\nよかったらどう？　双ちゃんもれーちゃんも」
1330 = "\"「Ừm. Nè?\nHai người có muốn thử không? Cả Sou-chan\nvà Rei-chan nữa.」\""

# monologue
# JP: 新婚旅行の途中だが、花嫁自らの誘いでもあるし、\nこれは――ある種の祝杯だろうし。
2022 = "Dù đang trong tuần trăng mật, nhưng đây là\nlời mời từ chính cô dâu,\nvới lại——cũng coi như là một chén rượu\nmừng."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕も一口だけ。ぜひ相伴に預からせてくれ」
1646 = "\"「Nếu vậy thì em cũng xin một ngụm. Cho em\nuống cùng với nhé.」\""

# 【れいな】
# display as 玲奈
# JP: 「アルコールは異常燃焼の原因になっちゃうかもだから、\nれいなは、匂いだけ飲ませてもらうんでもいいですかぁ」
1659 = "\"「Cồn có thể là nguyên nhân gây ra cháy\nbất thường,\nnên Reina chỉ xin ngửi mùi thôi được không\nạ~」\""

# 【真闇】
# display as 真闇
# JP: 「もちろんよかよ。\n嬉しか。粋ね。匂いでのご相伴」
1567 = "\"「Tất nhiên là được rồi.\nChị vui lắm. Thanh tao thật đấy. Uống cùng\nbằng mùi hương cơ à.」\""

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、れいな、ほめられちゃいましたぁ」
1277 = "\"「Ehehe, Reina được khen rồi đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「ほんなら」
1642 = "\"「Vậy thì」\""

# monologue
# JP: 一升瓶から、試飲用の小さなプラカップへと、\n真水のように美しいクマ焼酎が注がれていく。
1749 = "Từ chai rượu Issho, loại rượu shochu Kuma\ntrong vắt như nước suối\nđược rót ra những chiếc cốc nhựa nhỏ dùng\nđể uống thử."

# 【れいな】
# display as 玲奈
# JP: 「ふゎああ、素敵な香りですねぇ。\nほんのりやさしいみたいですぅ」
1353 = "\"「Oaaa, mùi hương tuyệt quá đi ạ~.\nThoang thoảng dịu nhẹ lắm luôn đó nha~」\""

# 【真闇】
# display as 真闇
# JP: 「んふふ、ありがと。\nね？　ひーちゃん、双ちゃん。れーちゃんも」
1223 = "\"「Ưm fufu, cảm ơn em.\nNào? Hi-chan, Sou-chan. Cả Rei-chan nữa.」\""

# monologue
# JP: 真闇姉は、自分の分のプラカップも用意している。\nならば音頭は、新婦の僕がとるべきだろう。
1955 = "Chị Mayami cũng đã chuẩn bị sẵn một cốc\nnhựa cho mình.\nVậy thì, người bắt nhịp nâng ly nên là chú\nrể như em mới phải."

# 【双鉄】
# display as 雙鐵
# JP: 「僕だけ何にもしていないので恐縮だが――\n真闇姉と日々姫とれいなの、今日の素晴らしい仕事に」
1202 = "\"「Chỉ có em là chẳng làm gì nên cũng hơi\nngại, nhưng mà——\nNâng ly vì công việc tuyệt vời hôm nay của\nchị Mayami, Hibiki và Reina nào.」\""

# monologue
# JP: 飲む前からもう、嬉しい酒に酔いそうだ。
1810 = "Chưa kịp uống mà em đã thấy say men hạnh\nphúc rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「乾杯」
1142 = "\"「Cạn ly.」\""

# 【真闇】
# display as 真闇
# JP: 「乾杯」
# 1142 = "「乾杯」" 

# 【日々姫】
# display as 日日姬
# JP: 「乾杯」
# 1142 = "「乾杯」" 

# 【れいな】
# display as 玲奈
# JP: 「かんぱーい」
1143 = "\"「Cạn ly ạ~」\""

# monologue
# JP: 捧げたカップを、そのまま口へと――っ！！
1835 = "Nâng chiếc cốc lên, đưa thẳng vào\nmiệng——!!"

# 【日々姫】
# display as 日日姬
# JP: 「うわ、これ――――こいば、今までにない味とよね。\n右田一とも、ひとしずくとも全然違う……」
1252 = "\"「Oa, cái này――――Hương vị chưa từng có từ\ntrước đến nay.\nKhác hoàn toàn với Migitakazu, cũng chẳng\ngiống Hitoshizuku chút nào...」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな。キリリとしているのに、甘い。\n米のほのかな甘みというか」
1506 = "\"「Đúng vậy. Rất sắc sảo nhưng lại ngọt\nngào.\nCảm giác như vị ngọt thanh của gạo ấy.」\""

# monologue
# JP: もう一口。\nああ、やはり――
1750 = "Thêm một ngụm nữa.\nÀ, quả nhiên là——"

# 【日々姫】
# display as 日日姬
# JP: 「キリってしとってすっきりしとるのに、\n後味がふんわりやさしい甘さで……」
1661 = "\"「Sắc sảo và thanh mát,\nnhưng hậu vị lại là vị ngọt dịu êm nhẹ\nnhàng...」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。淡麗辛口という言葉はあるが……\nこれは、淡麗甘口とでもいいたくなってしまう味だ」
1203 = "\"「Đúng vậy nhỉ. Có từ 'thanh mát cay nồng'\n(Tanrei Karakuchi) để miêu tả rượu,\nnhưng...\nHương vị này khiến người ta muốn gọi là\n'thanh mát ngọt ngào' (Tanrei Amakuchi)\nmất thôi.」\""

# monologue
# JP: 日々姫もカップを傾けて、\n数秒じっくり味わってから――喉を動かす。
1859 = "Hibiki cũng nghiêng cốc,\nnhấm nháp thật chậm trong vài giây——rồi\nmới nuốt xuống."

# 【日々姫】
# display as 日日姬
# JP: 「……うん。旨か」
758 = "\"「……Ưm. Ngon tuyệt.」\""

# 【真闇】
# display as 真闇
# JP: 「んふふっ、ありがと！　そいば最高の褒めことば！！」
1382 = "\"「Ưm fufu, cảm ơn em! Đó là lời khen tuyệt\nvời nhất đấy!!」\""

# 【れいな】
# display as 玲奈
# JP: 「はぅう～れいなも飲んでみたかったですぅ」
1254 = "\"「Hauuu~ Reina cũng muốn uống thử quá đi\nmất~」\""

# 【真闇】
# display as 真闇
# JP: 「そいもまっこと嬉しかと！」
1648 = "\"「Nghe vậy chị cũng vui lắm!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「というか、もしもよかったらでいいのだが――\nこれは、いつもと何が違うのだ？　水か、米か」
1599 = "\"「Mà này, nếu chị không phiền thì cho em\nhỏi——\nLoại rượu này có gì khác so với bình\nthường vậy? Do nước hay do gạo?」\""

# 【真闇】
# display as 真闇
# JP: 「水はいっつもと変わらん、クマ川源流水。\nやけん、かわったのは、米」
1533 = "\"「Nước thì vẫn vậy, vẫn là nước nguồn sông\nKuma.\nThế nên, thứ thay đổi là gạo.」\""

# 【日々姫】
# display as 日日姬
# JP: 「クマ米じゃなかと？」
1123 = "\"「Không phải gạo Kuma ạ?」\""

# monologue
# JP: 日々姫の素朴な質問は、\n真闇姉からさらに嬉しげな顔を引き出す。
1865 = "Câu hỏi ngây ngô của Hibiki\ncàng làm cho khuôn mặt chị Mayami thêm\nphần rạng rỡ."

# 【真闇】
# display as 真闇
# JP: 「もともとはクマ米。\nばってんね？　里帰りしてきたお米なの」
1521 = "\"「Vốn dĩ là gạo Kuma.\nNhưng mà nhé? Đây là loại gạo đã đi xa rồi\nmới trở về quê hương đấy.」\""

# 【れいな】
# display as 玲奈
# JP: 「お米が里帰り……ならならそのお米って、\n旅をしてきたお米なんですかぁ？」
1407 = "\"「Gạo về thăm quê hương... vậy, vậy gạo đó\nđã đi du lịch về hả chị~?」\""

# 【真闇】
# display as 真闇
# JP: 「うん。[びこく,1]琵国って、れーちゃんわかると？」
1331 = "\"「Ừm. Nước Bikoku, Rei-chan có biết\nkhông?」\""

# 【れいな】
# display as 玲奈
# JP: 「わかりますぅ、『琵国の竪琴』って映画でみましたぁ。\n『あおしまー！　いっしょに日ノ本に帰ろう』でぇす」
1485 = "\"「Reina biết ạ~, Reina xem trong phim 『Cây\nđàn hạc của Bikoku』 rồi.\n『Aoshima ơi! Cùng nhau về Hinomoto nào』 đó\nnha~」\""

# 【真闇】
# display as 真闇
# JP: 「大正解。こん[さかまい,1]酒米はね？　琵国への経済支援の一環で、\nあっちで実験的に栽培された、元クマ米なんだって」
1664 = "\"「Chính xác. Loại gạo nấu rượu này ấy à?\nLà một phần trong chương trình hỗ trợ kinh\ntế cho Bikoku,\nđược trồng thử nghiệm bên đó, vốn dĩ là\ngạo Kuma đấy.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……聞いた覚えがあるぞ。\nそれ、義父さん絡みの案件だな？」
1291 = "\"「À……em nhớ là có nghe nói rồi.\nVụ đó có liên quan đến bố nuôi đúng\nkhông?」\""

# 【真闇】
# display as 真闇
# JP: 「うん、そっちも大正解。やけん、\nうちで買い取って、試しのつもりで仕込んでみたら」
1358 = "\"「Ừm, cũng chính xác luôn. Thế nên,\nxưởng mình mới mua lại, định ủ thử xem\nsao.」\""

# 【日々姫】
# display as 日日姬
# JP: 「ほんならこれ、もともとはウチで使ぉとるクマ米と？\n風味はたしかに……ばってん、味ば全然ちごうて」
1655 = "\"「Vậy ra đây vốn dĩ là gạo Kuma nhà mình\nhay dùng sao?\nHương vị thì đúng là……nhưng mà, mùi vị lại\nkhác hoàn toàn.」\""

# 【真闇】
# display as 真闇
# JP: 「外の世界を旅したことで。知らない土に馴染んだことで。\n今までの良さはそのまま、まったく違う旨味も得た」
1390 = "\"「Vì đã đi du lịch thế giới bên ngoài. Vì\nđã làm quen với vùng đất lạ.\nGiữ nguyên được những ưu điểm vốn có, lại\nthu được thêm những hương vị hoàn toàn\nmới.」\""

# monologue
# JP: いって、真闇姉もカップの中身を綺麗に干す。
2004 = "Nói rồi, chị Mayami cũng uống cạn sạch cốc\nrượu của mình."

# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、今日ひーちゃんの仕事ば見て。\nこん酒米、ひーちゃんみたいだなって、思うた」
1434 = "\"「Hôm nay, khi nhìn thấy công việc của\nHi-chan.\nChị chợt nghĩ, loại gạo nấu rượu này, thật\ngiống với Hi-chan.」\""

# 【日々姫】
# display as 日日姬
# JP: 「！！」
1683 = "\"「!!」\""

# 【真闇】
# display as 真闇
# JP: 「やけん、ね？　ひーちゃん」
1496 = "\"「Thế nên, nhé? Hi-chan.」\""

# monologue
# JP: 真闇姉がもう一度、\nラベルの貼られていない酒瓶を持ち上げる。
1938 = "Chị Mayami lại một lần nữa\nnhấc chai rượu chưa dán nhãn lên."

# 【真闇】
# display as 真闇
# JP: 「こん焼酎のラベルデザイン。\nひーちゃんにぜひお願いしたいって思うとやけど」
1630 = "\"「Thiết kế nhãn mác cho chai rượu shochu\nnày.\nChị rất muốn nhờ Hi-chan làm giúp.」\""

# 【日々姫】
# display as 日日姬
# JP: 「やる！　もちろん！！\n絶対にやるけん――絶対、最高のデザインあげるけん！」
1348 = "\"「Em làm! Tất nhiên rồi!!\nNhất định em sẽ làm——nhất định sẽ tạo ra\nmột thiết kế tuyệt vời nhất!」\""

# monologue
# JP: 半切り缶からスケッチブックが飛び出してくる。
1796 = "Từ trong hộp thiếc, một cuốn sổ phác thảo\nbay vọt ra."

# 【日々姫】
# display as 日日姬
# JP: 「名前！　こん焼酎の名前ば、まずは教えて」
1210 = "\"「Tên! Trước tiên, hãy cho em biết tên của\nchai rượu này.」\""

# 【真闇】
# display as 真闇
# JP: 「うん。あのね？」
1344 = "\"「Ừm. Chuyện là vầy nhé?」\""

# monologue
# JP: 勢い込んでる日々姫も、おっとり受け止める真闇姉も。\nああ、なんと……なんとしあわせそうなことだろう。
1863 = "Một Hibiki đang hừng hực khí thế, một chị\nMayami đang từ tốn đón nhận.\nA, thật là……trông họ mới hạnh phúc làm\nsao."

# 【真闇】
# display as 真闇
# JP: 「こん焼酎のお名前は――」
1629 = "\"「Tên của chai rượu shochu này là——」\""
