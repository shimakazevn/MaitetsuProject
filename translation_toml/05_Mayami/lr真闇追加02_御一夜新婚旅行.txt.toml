# 【双鉄】
# display as 雙鐵
# JP: 「乾杯」
1142 = "「乾杯」" 

# 【真闇】
# display as 真闇
# JP: 「乾杯」
# 1142 = "「乾杯」" 

# 【日々姫】
# display as 日日姬
# JP: 「乾杯」
# 1142 = "「乾杯」" 

# 【れいな】
# display as 玲奈
# JP: 「かんぱーい」
1143 = "「乾杯～」" 

# monologue
