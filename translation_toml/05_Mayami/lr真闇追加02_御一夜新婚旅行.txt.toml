# JP: 「もちろんよかよ。\n嬉しか。粋ね。匂いでのご相伴」
1567 = "「當然了。姐姐很高興。真的。你就聞聞味，當是乾杯了吧」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、れいな、ほめられちゃいましたぁ」
1277 = "「哎嘿嘿，玲奈被誇了」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら」
1642 = "「那好」" 

