1568 = "「當然合適了。不錯——真不錯。很有意思。我根本沒想到還可以有修道服」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、こないだポーレットとみた映画に\nシスターさんが出てきて、とっても素敵だったんですぅ」
1374 = "「嘿嘿，上次和波萊特一起看的那部電影裡面有修女出場，真是太棒了」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、それじゃあれーちゃんは何に変装すると？」
1285 = "「哼哼，那麼小玲要喬裝成什麼人？」" 

# 【れいな】
# display as 玲奈
# JP: 「おんなじ映画にでてきた、靴磨きの男の子でぇす！\nポーレットが、れいなにとっても似合いそうって」
