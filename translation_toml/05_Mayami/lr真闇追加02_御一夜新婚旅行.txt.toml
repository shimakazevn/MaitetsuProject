1573 = "「真的很棒。煙霧是美麗的白煙，長汽笛又那麼高亢。我的眼睛和耳朵都能感覺到，你把鍋爐維持在很好的狀態」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへ、ありがと。ゆーか、それよか、新婚旅行。\n……中断、とかじゃなかとよね？」
1381 = "「嘿嘿，謝謝你。話說回來，你們的新婚旅行……應該沒有中斷之類的吧？」" 

