1286 = "「唔……嗯。如果是真闇姐的要求，那我也可以加以考慮」" 

# monologue
# JP: この話、長々ひっぱってしまえば危うい。\n直感するゆえ、中ば強引に断ち切っていく。
2016 = "這個話題拖得太久的話，對我來說太危險了。所以我依照直覺，硬是中途打斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、真闇姉はどうだ？　どんな仮装が――」
1653 = "「那真闇姐呢？要打扮成什麼樣的——」" 

# 【れいな】
# display as 玲奈
