# 【れいな】
# display as 玲奈
# JP: 「わわわ！　とってもおもしろそうですぅ」
1244 = "「哇！聽起來很有意思」" 

# 【真闇】
# display as 真闇
# JP: 「そうした列車って、どぎゃん列車？」
1627 = "「這樣的火車，是什麼火車？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仮装列車、コスプレトレインだ。例えば『西部劇列車』\nとお題を定め、乗員乗客内装等、全てを統一する的な」
1187 = "「化裝列車，角色扮演。比如“西部片列車”，工作人員、乘客、內飾，都統一成一個主題」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁまっこと面白そう！」
1269 = "「哎呀，聽起來真有意思！」" 

# 【日々姫】
# display as 日日姬
