1418 = "「好啊。那就大家一起參觀吧。姐姐這就準備好——不會讓你等上五分鐘的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1484 = "「我知道了」" 

# 【れいな】
