# 【日々姫】
# display as 日日姬
# JP: 「うわ、これ――――こいば、今までにない味とよね。\n右田一とも、ひとしずくとも全然違う……」
1252 = "「哇，這是————這是從來都沒嚐過的味道。和右田一的酒，根本截然不同……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。キリリとしているのに、甘い。\n米のほのかな甘みというか」
1506 = "「是啊。明明口感很清爽，但卻又有甜味。可能是米的清甜吧」" 

# monologue
# JP: もう一口。\nああ、やはり――
1750 = "再來一口。啊，真的——" 

# 【日々姫】
# display as 日日姬
# JP: 「キリってしとってすっきりしとるのに、\n後味がふんわりやさしい甘さで……」
1661 = "「雖然口感很乾淨又清爽，但卻回味柔和甘甜……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。淡麗辛口という言葉はあるが……\nこれは、淡麗甘口とでもいいたくなってしまう味だ」
1203 = "「可能吧……我記得清酒的口味有淡麗辛口這個說法……這種味道，可以說是淡麗甘口了吧」" 

# monologue
# JP: 日々姫もカップを傾けて、\n数秒じっくり味わってから――喉を動かす。
1859 = "日日姬也舉杯喝下，仔細品嘗了幾秒鐘後——喉嚨咕嘟一聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「……うん。旨か」
758 = "「……嗯。好喝」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、ありがと！　そいば最高の褒めことば！！」
1382 = "「嘿嘿，謝謝！這是最棒的誇獎！！」" 

# 【れいな】
# display as 玲奈
# JP: 「はぅう～れいなも飲んでみたかったですぅ」
1254 = "「哈嗚～玲奈也想喝一杯」" 

# 【真闇】
# display as 真闇
# JP: 「そいもまっこと嬉しかと！」
1648 = "「那我也很高興！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「というか、もしもよかったらでいいのだが――\nこれは、いつもと何が違うのだ？　水か、米か」
1599 = "「話說，如果你願意回答的話——我想問問這酒和平常的有什麼不同？是水還是米？」" 

# 【真闇】
# display as 真闇
# JP: 「水はいっつもと変わらん、クマ川源流水。\nやけん、かわったのは、米」
1533 = "「水還是隈河上游的泉水。米換了」" 

# 【日々姫】
# display as 日日姬
# JP: 「クマ米じゃなかと？」
1123 = "「不是隈米？」" 

# monologue
# JP: 日々姫の素朴な質問は、\n真闇姉からさらに嬉しげな顔を引き出す。
1865 = "日日姬樸素的問題，讓真闇姐露出更開心的表情。" 

# 【真闇】
# display as 真闇
# JP: 「もともとはクマ米。\nばってんね？　里帰りしてきたお米なの」
1521 = "「本來是隈米。不過呢，是回了老家的大米」" 

# 【れいな】
# display as 玲奈
# JP: 「お米が里帰り……ならならそのお米って、\n旅をしてきたお米なんですかぁ？」
1407 = "「大米會回老家……那這種大米是去旅行過的米？」" 

# 【真闇】
# display as 真闇
# JP: 「うん。[びこく,1]琵国って、れーちゃんわかると？」
1331 = "「嗯。小玲知道緬甸嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「わかりますぅ、『琵国の竪琴』って映画でみましたぁ。\n『あおしまー！　いっしょに日ノ本に帰ろう』でぇす」
1485 = "「我知道，我在《緬甸的豎琴》這部電影裡看過。“水島啊！一起回日本吧”」" 

# 【真闇】
# display as 真闇
# JP: 「大正解。こん[さかまい,1]酒米はね？　琵国への経済支援の一環で、\nあっちで実験的に栽培された、元クマ米なんだって」
1664 = "「非常正確。這些酒米呢，就是向緬甸提供的經濟援助的一部分，是隈米的品種在那邊試驗種植的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……聞いた覚えがあるぞ。\nそれ、義父さん絡みの案件だな？」
1291 = "「啊……我記得好像聽說過。那個項目和父親有關，對吧」" 

# 【真闇】
# display as 真闇
# JP: 「うん、そっちも大正解。やけん、\nうちで買い取って、試しのつもりで仕込んでみたら」
1358 = "「嗯，完全正確。所以，咱們家就買了那些米，實驗性地用它們釀了酒」" 

# 【日々姫】
# display as 日日姬
# JP: 「ほんならこれ、もともとはウチで使ぉとるクマ米と？\n風味はたしかに……ばってん、味ば全然ちごうて」
1655 = "「那這麼一說，這原來是咱們這的隈米？風味的確是……不對，味道一點都不像」" 

# 【真闇】
# display as 真闇
# JP: 「外の世界を旅したことで。知らない土に馴染んだことで。\n今までの良さはそのまま、まったく違う旨味も得た」
1390 = "「在外面的世界旅行，熟悉了陌生的土地，過去的優點保持了下來，還得到了完全不同的鮮味」" 

# monologue
# JP: いって、真闇姉もカップの中身を綺麗に干す。
2004 = "說完，真闇也喝乾了酒。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、今日ひーちゃんの仕事ば見て。\nこん酒米、ひーちゃんみたいだなって、思うた」
1434 = "「姐姐，看到今天小日的工作，就覺得這個酒米，好像小日一樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「！！」
1683 = "「！！」" 

# 【真闇】
# display as 真闇
# JP: 「やけん、ね？　ひーちゃん」
1496 = "「是吧？小日」" 

# monologue
# JP: 真闇姉がもう一度、\nラベルの貼られていない酒瓶を持ち上げる。
1938 = "真闇姐再一次舉起沒有標籤的酒瓶。" 

# 【真闇】
# display as 真闇
# JP: 「こん焼酎のラベルデザイン。\nひーちゃんにぜひお願いしたいって思うとやけど」
1630 = "「這燒酒的標籤設計。我非常希望能讓小日來擔任」" 

# 【日々姫】
# display as 日日姬
# JP: 「やる！　もちろん！！\n絶対にやるけん――絶対、最高のデザインあげるけん！」
1348 = "「嗯！當然可以啦！！我一定會做的——一定會做出最好的設計！」" 

# monologue
# JP: 半切り缶からスケッチブックが飛び出してくる。
1796 = "她立刻從桶裡掏出素描簿。" 

# 【日々姫】
# display as 日日姬
# JP: 「名前！　こん焼酎の名前ば、まずは教えて」
1210 = "「名字！先告訴我這種燒酒的名字」" 

# 【真闇】
# display as 真闇
# JP: 「うん。あのね？」
1344 = "「嗯。那我說了哦？」" 

# monologue
# JP: 勢い込んでる日々姫も、おっとり受け止める真闇姉も。\nああ、なんと……なんとしあわせそうなことだろう。
1863 = "日日姬幹勁十足，真闇姐則穩重地回應。啊……這是多麼幸福的景象啊。" 

# 【真闇】
# display as 真闇
# JP: 「こん焼酎のお名前は――」
1629 = "「這燒酒的名字是——」" 
