# JP: 「鉄道写真ば撮るのって、そぎゃん面白かこと？」
1491 = "「拍鐵路照片，是不是很有意思？」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットは楽しんでますよぉ。そういえば、\nそうてつさんはちょっと教わってませんでしたっけ」
1542 = "「波萊特很喜歡。說到這個，雙鐵先生沒有教過你嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多少は、という程度だが――うむ。真闇姉とれいなが\n撮りたいというのなら、アドバイスくらいは可能だ」
1200 = "「只是多少有一點而已——唔。如果真闇姐和玲奈想拍的話，我至少可以給點建議」" 

# 【れいな】
# display as 玲奈
# JP: 「わ、わ！\nそれなられいな、せっかくだし撮ってみたいですぅ」
1248 = "「哇，哇啊！那機會難得，玲奈很想拍一拍」" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、そういうことならせっかくやけん。\nばってん、カメラなんてもってなかとよ？」
1628 = "「這樣的話，姐姐也不客氣了。但咱們手裡好像沒有相機吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ふたりとも持っている。\nそれも、かなり使い慣れているものを」
1135 = "「不，我們都有。而且，還經常用呢」" 

# 【れいな】
# display as 玲奈
# JP: 「えええ？　れいな、カメラだなんて」
1272 = "「哎哎？玲奈沒有用過相機啊」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ。わかった。れーちゃん？　はい、チーズ」
1218 = "「呵呵。我知道了。小玲，茄子」" 

# 【れいな】
# display as 玲奈
# JP: 「え？　ひゃっ！」
1314 = "「啊？呀！」" 

# monologue
# JP: (ぱしゃっ）
2037 = "（喀嚓）" 

# monologue
# JP: 写真に撮られたびっくり顔が笑顔にかわる。\nれいなもいそいそ、自分のスマホを取り出し構える。
1894 = "照片上的驚訝表情變成了微笑。玲奈也興奮地拿出自己的手機擺好架勢。" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー、れいなも記念写真とっちゃいますねぇ。\nおふたりぴったりくっついて――はい、けーゆ」
1372 = "「嘿嘿嘿，玲奈也拍張紀念照吧。你們兩個緊緊地靠在一起——好，說柴油」" 

# 【真闇】
# display as 真闇
# JP: 「軽油って」
1525 = "「柴油？」" 

# monologue
# JP: あまりの掛け声に吹き出した、その瞬間のシャッター音。\nこれは恐らく、自然な笑顔が写っていよう。
1825 = "我因為她說的口號而噴了出來，那一刻響起了快門聲。恐怕，那時候的微笑最自然了。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、三人の記念写真も」
1638 = "「還要拍我們三個的紀念照」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実にいいな。が、少しだけ先延ばしにしよう。\n列車が来る前に準備を整えてしまいたい」
1416 = "「好啊。但等過一會再說吧。我想在火車來之前先做好準備」" 

# 【真闇】
# display as 真闇
# JP: 「あ、うん！　ええと――\n鉄道写真ば撮るコツみたいなのってあったら、教えて？」
1306 = "「啊，嗯！呃——如果有什麼拍鐵路照片的小竅門，就告訴我吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1346 = "「嗯」" 

# monologue
# JP: 笑顔が一気に引き締まってる。\n日々姫乗務の8620――綺麗に収めてやりたいのだろう。
1789 = "她的笑容一下子繃緊了。她大概很想好好拍下日日姬負責乘務的８６２０吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この遠さでスマホカメラなので、凝ったことはできん。\nまず、橋全体が丁度画角に収まるようにズーム調整して」
1392 = "「在這麼遠的距離，用智慧型手機拍照，應該沒辦法拍得太精緻。首先，放大鏡頭，使整座橋正好收在畫面之內」" 

# 【真闇】
# display as 真闇
# JP: 「ん……っと――うん。こぎゃん感じかな」
1328 = "「嗯……好。就這樣吧」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもできましたぁ」
1554 = "「玲奈也完成了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたらスマホを両手で構えて、脇をぎゅっと締める。\n脇が締まれば安定するゆえ、手ブレの発生を軽減できる」
1549 = "「然後雙手舉起手機，緊緊夾住腋窩。只要夾緊腋窩，手就穩定了，可以減少抖動」" 

# 【真闇】
# display as 真闇
# JP: 「りょうてで構えて脇を――こぎゃん、感じ？」
1173 = "「先舉起來，再夾緊胳肢窩——像這樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、良いと思う」
1359 = "「嗯，我覺得很好」" 

# monologue
# JP: たわわな胸がより強調され、一瞬目と気を奪われかける。\nけれどもこれは大事な写真。すぐに自らを引き締めなおす。
1785 = "她柔軟的胸部顯得更加突出，瞬間分散了我的注意力。但這是張照片對她們非常重要。我立刻讓自己重新集中精神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あとは、機関車の先頭がどこにきたら撮るかを決めて、\nその瞬間にシャッターを切ればいいだけだ」
1548 = "「然後決定好拍攝時火車頭所在的位置，在那一刻按下快門就好」" 

# 【真闇】
# display as 真闇
# JP: 「どこにきたら……とか言われても。\nおねーちゃん、とんと検討もつかんけん」
1157 = "「位置……話是這麼說，姐姐根本不知道什麼時候拍啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1323 = "「嗯……」" 

# monologue
# JP: 進行方向、一番対岸よりの橋脚に機関車先頭が差し掛かる\nタイミングでどんぴしゃりかと思う……の、だ、が……
1886 = "火車頭抵達前進方向，最靠近對岸的橋墩時，那個時機恰到好處，我是這麼認為的……" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば動画撮影でどうだろう。\nその方が確実に良いものが撮れそうだ」
1651 = "「那我們拍攝影片怎麼樣。這樣肯定能拍出更好的」" 

# 【真闇】
# display as 真闇
# JP: 「あ！　そぎゃんしてもらえるとうれしか。\nほんならね？　写真は双ちゃんが担当で」
1302 = "「啊！那挺好的。那小雙就負責拍照」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。注意すべきは、絶対にカメラを動かさないこと。\n映す景色は固定して、その中に機関車を走らせるのだ」
1493 = "「明白了。要注意的是，絕對不要移動攝影機。鏡頭要固定，讓火車頭在裡面行駛」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんする。おねえちゃんがカメラば動かしたら、\nブレブレになっちゃいそうやけん」
1641 = "「那好。要是姐姐動了鏡頭，畫面就晃來晃去的了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな――そろそろくるぞ。\nん？」
1501 = "「是啊——差不多要來了。嗯？」" 

# monologue
# JP: ふと見れば、れいなはスマホをしまってしまった。
1743 = "不經意間，玲奈已經把手機收起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは撮らんでいいのか？」
1553 = "「玲奈不打算拍嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「今度ポーレットにつれてきてもらってとりまぁす。\nいまはれいな、ガイドさんのお仕事ですから」
1117 = "「下次讓波萊特帶玲奈來這裡。現在，玲奈要負責當導遊」" 

# monologue
# JP: （ぽっ！！）
2039 = "（嗡！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「来るぞ」
1167 = "「來了」" 

# monologue
# JP: 橋梁にさしかかる前の合図の汽笛。\nもうおしゃべりする時間もない。
1756 = "列車到達橋梁前的信號汽笛響起。我們沒時間聊天了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉！　脇を締めて固定だ！　動くなよ」
1578 = "「真闇姐！夾緊腋下固定住手機！不要動！」" 

# 【真闇】
# display as 真闇
# JP: 「うん――あっ！」
1319 = "「嗯——啊！」" 

# monologue
# JP: （ぽーーーーーーーーーーーーーーーーーーーっ！！！）
2038 = "（嗡———————————————————！！！）" 

# monologue
# JP: 大サービスの長汽笛。\n汽笛に押された如くたなびく、見事なまでの長白煙。
1966 = "給我們的特殊服務，長長的汽笛聲。彷彿被汽笛推動一般，煙囪拉出了漂亮的長長白煙。" 

# 【真闇】
# display as 真闇
# JP: 「ああ……こいば……」
1294 = "「啊……這是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ」
1431 = "「好！」" 

# monologue
# JP: ベストなタイミングでシャッターを切れた。\n真闇姉はと見てみれば、スマホはしかと構えたまま――
1827 = "我在最佳時機按下了快門。看了一眼真闇姐，發現她牢牢地握住了手機——" 

# 【真闇】
# display as 真闇
# JP: 「……あぎゃん綺麗で見事な列車を、ひーちゃんが」
760 = "「……小日開火車居然開得這麼出色」" 

# monologue
# JP: 8620が走り去っていった方へと、首が、視線が向いている。\nなぜだかそれが、とても嬉しい。
1794 = "她的頭，她的視線，都轉向了８６２０飛馳而去的方向。不知為何，我感覺很高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。これも日々姫の仕事だ。車両デザインだけでなく、\n機関士としても、もう完全に一人前だ」
1342 = "「嗯。這也是日日姬每天的工作。她不僅僅擔任車輛設計，而且還是一名獨當一面的司機」" 

# 【真闇】
# display as 真闇
# JP: 「すごか――すごかとねぇ！\nひーちゃんがあぎゃん立派な汽車ば！」
1409 = "「太厲害了——太厲害了！小日居然設計出了那麼漂亮的火車！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぜひとも直接伝えてやってくれ。今のひとこと、\n日々姫もハチロクも大いに喜ぶに違いない」
1161 = "「你一定要親自告訴她。聽到剛才的那句話，日日姬和八六都會非常高興的」" 

# monologue
# JP: 言った途端に、ああ、と気づいて言葉を継ぎ足す。
2002 = "話音剛落，我突然想到了什麼，便補充了一句。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも、さぞや評価を気にしているだろうしな。\n真闇姉にまさに今、仕事ぶりを見てもらえたわけだから」
1591 = "「而且她們兩個應該都很想聽到你的評價吧。真闇姐剛剛正好看到了她們的工作」" 

# 【真闇】
# display as 真闇
# JP: 「んふふっ、冗談。\nそんなん、気がつくわけないでしょお」
1280 = "「哼哼，別逗我了。她倆怎麼可能會看到我呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　そうとも限らんのだ。ほら」
1512 = "「是嗎？那可不一定。你看」" 

# monologue
# JP: 真闇姉を促しながられいなを見れば、\n丁度帽子を被りなおしているところだ。
1819 = "我催促著真闇姐，同時看向玲奈，發現她正在重新戴上帽子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「定番スポットは、乗務中なんとなく見るものなのだ。\nまして、帽子を振って合図しているものがいるのなら」
1141 = "「乘務期間，會自然而然地看到經典景點。更別說有人在揮舞帽子發出信號了」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへぇ。れいなには共感もありますからねぇ。\n[ちょうきてき,2]長汽笛、綺麗なの鳴らしてもらえちゃいましたぁ」
1275 = "「哎嘿嘿。而且也會跟玲奈有共鳴啊。剛剛她們發出了漂亮的長汽笛聲」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃ。そしたらおねーちゃんがお仕事参観したの、\nひーちゃんも……」
1258 = "「哎呀。所以姐姐參觀工作的對象，又多了一個小日……」" 

# monologue
# JP: 珍しい。真闇姉の百面相だ。\n照れて困ってはにかんで――
1909 = "真稀奇。真闇姐的表情迅速變化。害羞，困惑，難為情——" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、連れて来てくれて！\nれーちゃん、さいっこーのガイドば！」
1458 = "「小雙，你能帶我來！小玲能帶我導遊這麼棒的地方！」" 

# monologue
# JP: そうしてぱっと、大きな笑顔に花開く。
1892 = "然後她突然綻放出大大的笑容。" 

# 【真闇】
# display as 真闇
# JP: 「まっこと！　まっことありがとぉ！！」
1574 = "「真的！真的太謝謝了！！」" 

# 【れいな】
# display as 玲奈
# JP: 「つきましたぁ！」
1181 = "「到了！」" 

# monologue
# JP: 風呂とご飯とキハ07ｓへの乗車と。\nそれらを残すだけとなった、御一夜観光の締めくくり。
1884 = "洗澡，吃飯，乘坐Ｋｉｈａ０７ｓ。做完這些後，這次御一夜旅行就結束了。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなのおすすめスポット、ここにしちゃいましたぁ！\n『右田一酒造元』さんでぇす！」
1562 = "「玲奈推薦的景點就是這裡了！這裡是右田一釀酒廠！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1346 = "「嗯」" 

# monologue
# JP: 案内される道中ずっとまさかまさかと思っていたが、\nまことにそのものズバリでくるとは――
1901 = "玲奈帶我們來的路上，我一直在想難不成是這裡，沒想到被我猜中了——" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ。れーちゃん、\nどぎゃんしてここばおすすめしてくれたと？」
1256 = "「哎呀。小玲，為什麼推薦這裡？」" 

# monologue
# JP: なるほど、さすがは真闇姉だ。\nリアクションに困って硬直していた僕なぞと、器が違う。
1763 = "原來如此，不愧是真闇姐。和不知如何反應，僵硬的我大不相同。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。れいなが御一夜観光するなら、絶対絶対\nレールショップみてみたいって思ったからでぇす」
1368 = "「嘿嘿。因為如果玲奈要觀光御一夜，絕對會想去看看鐵路商店的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはわかるな」
1309 = "「啊，我懂我懂」" 

# monologue
# JP: れいながレールショップを観光するのは、実に和もう。\nが、真闇姉が右田一酒造元を見学するのは……
1829 = "我想像了一下玲奈去鐵路商店觀光的畫面，真是和諧啊。但是，真闇姐參觀右田一釀酒廠……" 

# 【真闇】
# display as 真闇
# JP: 「面白そうやけん。\n見学、うちもしてみたかばってん……」
1594 = "「聽起來很有意思。我也想參觀參觀……」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁい。それなら！」
1430 = "「好耶。那麼！」" 

# 【真闇】
# display as 真闇
# JP: 「あ、ちょっと待ってれーちゃん、うちがいったら、\n視察いうか、抜き打ち検査みたいに思われちゃいそうで」
1313 = "「啊，等一下小玲，我過去的話，員工會覺得這是視察，或者是突擊檢查吧」" 

# 【れいな】
# display as 玲奈
# JP: 「あー、そっかぁ、れいな、\nそこまでは考えてませんでしたぁ」
1311 = "「啊，是這樣嗎，玲奈沒想到這一點」" 

# monologue
# JP: 言って、れいなは文字通りに頭をひねる。\nひねってひねって――ぽん、と両手があわされる。
2005 = "說著，玲奈真的扭起了頭。扭著扭著——她啪的一聲，雙手合十。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな！　いいことかんがえましたぁ。\nそれならそれなら、変装しちゃうのどうですかぁ！」
1560 = "「玲奈想到一個好主意！既然這樣既然這樣，為什麼不喬裝一下呢！」" 

# 【真闇】
# display as 真闇
# JP: 「変装！」
1318 = "「喬裝！」" 

# monologue
# JP: 突拍子もないアイディアに、真闇姉が吹き出してしまう。
2015 = "這個突然蹦出的想法讓真闇姐笑噴了。" 

# 【真闇】
# display as 真闇
# JP: 「変装はよかとねぇ。ね、れーちゃん。\nみんなそれぞれ、どぎゃん変装がよかろうもんね」
1317 = "「喬裝好啊。小玲。大家都喬裝一下吧」" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんはお顔が綺麗だから、\n女の子の格好したらきっと似合うって思いまぁす」
1662 = "「雙鐵先生有張漂亮的臉，穿成女孩子的樣子一定很好看」" 

