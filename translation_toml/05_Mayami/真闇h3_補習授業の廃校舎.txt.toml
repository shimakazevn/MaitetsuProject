# 【双鉄】
# display as 雙鐵
# JP: 「案外、ニーズがあるのかもしれんな。\n『学園生活をもう一度やりなおせる』そんな空間は」
2573 = "「我覺得這樣可能挺有趣的。創造一個“可以重返校園體驗上學”的空間」" 

# 【真闇】
# display as 真闇
# JP: 「やったら……うん。\nうちらはそん目で、視察、がんばってみよ？」
2872 = "「那麼……嗯。咱們就好好考察，然後一起努力吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2442 = "「好啊」" 

# 【真闇】
# display as 真闇
# JP: 「で……あのね？　おねーちゃん、\n着替えば、もってきとるとやけど――」
2844 = "「那……你知道嗎？　姐姐其實帶了衣服過來呢――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、どうりで大荷物だと」
2304 = "「喔，難怪要那麼大的行李」" 

# 【真闇】
# display as 真闇
# JP: 「ありがとね。持ってくれて」
2804 = "「謝謝你幫我扛了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「礼など、水臭い。恋人の手荷物くらい持たんで、\nなにが男かという話だ」
2136 = "「別這麼客氣，不幫女朋友拿行李，算什麼男子漢啊」" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ」
# 2194 = "「呵呵」" 

# monologue
# JP: 真闇姉が、照れてくれる。はにかんでくれる。\nこころが、ふわりとあたたかくなる。
3755 = "真闇姐臉紅了，她害羞了。感覺心裡暖洋洋的。" 

# 【真闇】
# display as 真闇
# JP: 「で、今度は学園、校舎内でしょ？　視察方針も\nあるけん――できたら、着替えたいかなって」
2874 = "「那麼，接下來要到學校裡、進教學樓裡面對吧？就算考察不是這個方向，有機會還是變個裝更有融入感」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本格的にロールプレイをするのだな。了解だ。\n廃校舎は本館全ての、安全確認が取れているそうだ」
2723 = "「真的要玩角色扮演啊，我知道了。反正廢教學樓整幢樓都已經檢查過安全了」" 

# 【真闇】
# display as 真闇
# JP: 「あ、ほんなら」
2871 = "「那麼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「空き教室でも、更衣室でも好きに使ってくれ。\nああ、ヘルメットももう外しても大丈夫だ」
2103 = "「你隨便找空教室或者更衣間用吧。對了，頭盔可以取下來啦」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 

# monologue
# JP: 頷いて、けれども真闇姉はまだ外さない。\nなるほど――これも乙女心か。
3757 = "真闇姐點了點頭，但依然沒有摘下頭盔。是少女心的影響吧。" 

# monologue
# JP: 着替えるときに、あわせ髪型を直すつもりで……\nゆえ、僕の目の前では外さんのだろう。
3824 = "肯定是換衣服的時候要整理下頭髮……所以才不在我面前摘下來吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よければ、向かおう。が――古い建築物なのは\n確かだ。その点は失念せず、くれぐれも安全第一で」
2097 = "「你好了我就過去，但是――這幢樓已經很古舊了，千萬要注意安全啊」" 

# 【真闇】
# display as 真闇
# JP: 「安全第一」
2458 = "「安全第一」" 

# monologue
# JP: 真闇姉の指が、ちょん、ちょん、ちょん、と、\n頭上のヘルメットを指し示す。
3723 = "真闇姐的手指戳了戳頭上戴著的頭盔。" 

# 【真闇】
# display as 真闇
# JP: 「安全が第一の使命。\n双ちゃんが、口癖みたいにいうとることよね」
2457 = "「安全是第一使命。小雙總把這句話掛嘴邊呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、まさしくだ。\n安全が第一の使命で、決して無理なく行動しよう」
2393 = "「嗯，沒錯。安全是第一使命，絕對不要勉強自己啊」" 

# 【真闇】
# display as 真闇
# JP: 「無理なく。楽しく。良か視察を、ね？」
2111 = "「做安全、快樂、出色的考察，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2674 = "「沒錯」" 

# monologue
# JP: （ぴとっ）
4022 = "（啪）" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2892 = "「！？」" 

# monologue
# JP: 真闇姉の人差し指が、僕のくちびるにあてられる。
3741 = "真闇姐的食指貼在了我嘴唇上。" 

# monologue
# JP: 考え事をするときに、\nいつでも真闇姉のくちびるに添えられている長い指が。
3699 = "真闇姐思考問題的時候，總是會修長的食指豎在嘴唇上。" 

# 【真闇】
# display as 真闇
# JP: 「視察ばおわって、かえったら。\nたーっぷりご褒美上げるけん」
2763 = "「考察完畢回去後，我一定好好獎勵你」" 

# monologue
# JP: ドキン、と大きく、胸が高鳴る。\n禁欲を重ね、溜めてる股間が、ずくりとざわめく。
3450 = "我的心重重地一跳。禁慾多時，積蓄甚多的股間瞬間就不安分了。" 

# monologue
# JP: たったこれだけのスキンシップが、\n遠足気分を、いっきに吹き飛ばしてしまう。
3319 = "就這麼點身體接觸，就將我快樂郊遊的心情吹到了天邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみだ」
1545 = "「――我會期待的」" 

# 【真闇】
# display as 真闇
