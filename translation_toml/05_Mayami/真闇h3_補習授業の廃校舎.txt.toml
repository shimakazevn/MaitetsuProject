[script]
# lines: 761 
# 【真闇】
# display as 真闇
# JP: 「へぇーえ、ポーちゃんが」
2425 = "「嚯，小波她……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2345 = "「嗯」" 

# monologue
# JP: お盆におせんべいとお茶を乗せ、\n真闇姉が腰を下ろす。
3201 = "在托盤上擺好仙貝和茶水後，真闇姐才坐了下來。" 

# monologue
# JP: 僕の隣に、\n恋人同士の寄り添う距離で。
3235 = "她坐在我身邊，一個戀人之間可以相互依偎的距離。" 

# 【真闇】
# display as 真闇
# JP: 「[じゅつせん,1]術仙廃炭鉱の文化・観光遺産としての再活用」
2778 = "「術仙廢煤礦改建為文化、旅遊遺產」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲も賛同してくれている話らしい。\n頭取――宝生元忠も巻き込めそうだと」
2469 = "「寶生稀咲好像也贊成了。她還要把行長――寶生元忠也給拉進來呢」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ、あの[もとただ,1]元忠さんが」
2233 = "「哎呀，是那位元忠先生啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「千内のエアクラ工場も順調に建設されていると聞く。\n誘致云々の対立は、もはや過去の話だ」
2766 = "「聽說千內的空凝機工廠建設得也很順利。由於引進等事導致的對立已經都過去了」" 

# 【真闇】
# display as 真闇
# JP: 「そーね」
2616 = "「是啊」" 

# monologue
# JP: ほうっと、嬉しげな息を吐き、\n真闇姉はゆるゆるお茶を飲む。
3283 = "她開心地喘了口氣，輕輕地喝了口茶。" 

# 【真闇】
# display as 真闇
# JP: 「前より、ずーっと良か形に落ち着いてくれたけん」
2757 = "「結果比以前要好多了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ずっと良くなった。\n[うち,5]右田一酒蔵元だけを見てもそうだが――」
2624 = "「是啊，真的好多了。單看[我家,5]右田一釀酒廠就已經能感覺出來了――」" 

# monologue
# JP: 計ったように、蔵から声が響いてくる。\nF・スコッティ。詠国産まれのレイルロオドだ。
3529 = "正巧此時倉庫傳來了聲音。飛·蘇格闌，是詠國產的鐵路人偶。" 

# monologue
# JP: 醸造管理の方針で、今日も今日とてハチロクと、\n仲良くけんかしているらしい。
3223 = "她今天又在為釀造管理的方向問題，和八六你一句我一句地辯起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――御一夜全体の活気も増し、観光客も増えている。\nこの流れを、より活性化させたいという計画だろうな」
1543 = "「――御一夜整體活力大增，遊客也增加了。而這個計劃，是為了讓這裡變得更有生氣吧」" 

# 【真闇】
# display as 真闇
# JP: 「発想の流れはわかるばってん、術仙廃炭鉱は……\n万が一の事故でもあったら、良か流れも水の泡とよ？」
2539 = "「想法我能理解啦，但是術仙廢煤礦……要是出什麼事故，多好的想法都會化為泡影的喔？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その点、ポーレットと宝生稀咲だ。考慮している」
2684 = "「波萊特和寶生稀咲一定也想到這點了」" 

# monologue
# JP: 真闇姉になら、読んでもらった方が早いし、確実だ。\n資料を渡せば真闇姉は、いったん座卓においてから、
3112 = "先給真闇姐看看，她能更快更準確地把握內容。所以我把資料給了真闇姐。她一坐下來就對我說。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん？　はい、あーん」
2497 = "「小雙，來，張嘴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　むぐっ」
2419 = "「嗯？　啊嗚」" 

# monologue
# JP: あーんにつられて口をあければ、\n何かがそっと押し当てられる。
3422 = "我張開了嘴。她就往我嘴裡塞了什麼東西。" 

# monologue
# JP: 途端、ひろがる醤油味。\nああ……これは上等のおせんべいだ。
3940 = "醬油的味道在嘴裡漫開來。啊啊……是相當高級的仙貝。" 

# 【真闇】
# display as 真闇
# JP: 「ふむふむ……\nああ……なるほどねぇ」
2356 = "「嗯嗯……啊啊……我懂了」" 

# monologue
# JP: 真闇姉はもう、資料を読み進めに入ってる。
3697 = "真闇姐已經開始讀資料了。" 

# monologue
# JP: ここは静かに邪魔せぬことが\n結局は、ふたりの時間の節約になる。
3574 = "現在先安靜地不要打擾她，可以節約兩個人的時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひははひはふ」
2199 = "「呼，呼，呼」" 

# 【真闇】
# display as 真闇
# JP: 「はぁい、めしあがれ。\nあ、遠慮ばせんで、音、立ててよかよ」
2107 = "「來，吃吧。嘎嘣嘎嘣響也沒事，我不介意的」" 

# monologue
# JP: まさに遠慮をしようとしていた。
3439 = "我正考慮著不想打擾她呢。" 

# monologue
# JP: 細やかな目配りに驚かされつつ、\nならばとバリボリいかせてもらう。
3361 = "想不到她觀察得這麼仔細，於是我依言高興地咬了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「（ごくっ）」
2897 = "「（咬）」" 

# 【真闇】
# display as 真闇
# JP: 「……候補地は、専門家が安全性を保証したとこだけ。\nで、そこをどぎゃん活用するかの、視察とレビュー」
1567 = "「……候選地必須是專家確保安全的地方。為了能完美用好那裡，還需要視察和評估」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、そうなのだ」
2390 = "「嗯，是這樣」" 

# monologue
# JP: 嚥下を待っての問いかけだから、\n僕もすらすら答えられる。
3267 = "她耐心地等我嚥下之後才發言，所以我才能流利地回答她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、廃校舎をレビューしてほしいと頼まれている」
2852 = "「那些人也拜託我給廢教學樓做評價呢」" 

# 【真闇】
# display as 真闇
# JP: 「廃校舎……ああ、あの規模の町ならもちろん、\n学園もあったとよねえ」
2513 = "「廢教學樓……對哦，那麼大的小鎮肯定有過學校的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、術仙学園という名であったらしい。\nそこを、『もしよかったら見てきてほしい』と」
2342 = "「嗯。好像是叫術仙學園。對方讓我“有空就過去幫他們看看”」" 

# 【真闇】
# display as 真闇
# JP: 「もしよかったら――なら、業務じゃなかと？」
2166 = "「只是有空去看看啊――所以不是業務嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、業務外だ。本格調査前の下見的なものだろう。\nもし行くのであれば、途中でおろしてくれるとも」
2366 = "「嗯，不是業務，只是幫之後的正式調查做踩點吧。如果真的要去，對方還會破例讓我在半路下車呢」" 

# 【真闇】
# display as 真闇
# JP: 「ふむふむ」
2627 = "「是嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市と御一夜鉄道とのさらなる発展に繋がる\n可能性のあることだからな。無論、快諾した」
2524 = "「御一夜市和御一夜鐵道都可能因此有進一步的發展，所以我答應了」" 

# 【真闇】
# display as 真闇
# JP: 「さらなる発展……\n学園の、廃校舎」
2841 = "「進一步的發展……學校的廢教學樓」" 

# monologue
# JP: 真闇姉が小首をかしげ、人差し指を唇にあてる。
3708 = "真闇姐歪了歪腦袋，手指貼在嘴唇上。" 

# monologue
# JP: 考え込む――その何気ない仕草からさえ、\n花の香のような色香がこぼれる。
3109 = "儘管她是在思考――但這自然而然的動作，都有種花香一般的媚意。" 

# 【真闇】
# display as 真闇
# JP: 「古か学園……需要、ある程度は見込めるかもねぇ。\n映画やドラマの撮影にとか、宿泊施設にするとか」
2761 = "「老學校啊……我看還是有一定需求的。比如拍電影電視劇，或者用來建旅館」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。やはり真闇姉に話してよかった。\n僕には全く、そうしたイメージがわかなかった」
2408 = "「嗯，跟真闇姐聊過之後果然受益匪淺啊。我就完全沒有頭緒」" 

# 【真闇】
# display as 真闇
# JP: 「全く？」
2459 = "「完全？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆえに、視察・レビューと言われても、\nどうしていいものか、いささか途方にくれていた」
2614 = "「是啊。所以讓我做考察評估，我也不太清楚該怎麼做」" 

# 【真闇】
# display as 真闇
# JP: 「やったら、その――」
2869 = "「那麼――」" 

# monologue
# JP: 真闇姉が、軽く姿勢を整え直す。\nそわっ、と音が聞こえてきそうな、少女じみた仕草。
3749 = "真闇姐稍稍換了個姿勢。帶著滿滿的少女活力，彷彿還能聽到略帶興奮的聲音。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、真闇姉に頼みたいと思っている。\n良ければ、僕と一緒に廃校舎の視察をしてほしい」
2586 = "「所以我想請真闇姐幫忙。有空和我一起考察下廢教學樓嗎」" 

# 【真闇】
# display as 真闇
# JP: 「もちろんよかとよ。\n他ならぬそーちゃんの頼みやけん」
2709 = "「當然可以。這可是小雙的委託」" 

# monologue
# JP: 即答だ。いつもながらの包みこみような笑顔を浮かべ。\n――けれども頬は、僅かな薔薇色を覗かせている。
3263 = "她答得很爽快，帶著我最熟悉的含蓄笑容。――但是臉上已經飄起了淡淡的紅霞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい」
2802 = "「謝謝」" 

# 【真闇】
# display as 真闇
# JP: 「あさっての午後でどう？　十四時以降とか」
2520 = "「後天下午可以嗎？　十四點以後」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、その時間ならば問題ない」
2392 = "「嗯，沒問題」" 

# 【真闇】
# display as 真闇
# JP: 「着替えの時間はあると？」
2635 = "「有換衣服的時間嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん。せっかくの真闇姉とのデートなのだし、\n煤を落として、きちんと身だしなみを整え直すさ」
2396 = "「嗯，畢竟也是和你出門約會，肯定要一掃煤灰，整理好儀容啊」" 

# 【真闇】
# display as 真闇
# JP: 「うふふ、デート。あ、ほんなら」
2195 = "「呵呵，約會啊。那麼」" 

# monologue
# JP: ぽおんと両手があわせられる。\n穏やかな目が、いたずらっぽくわずかに細まる。
3284 = "她雙手一合。平靜的眼睛眯了起來，似乎有幾分調笑的神色。" 

# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。\n学園生っぽい服、用意できると？」
2498 = "「小雙，可以準備一件學生會穿的衣服嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　……白ワイシャツに黒いスラックス――\nといった程度で問題なければ」
2416 = "「嗯？　……白襯衫和黑色西褲――這樣的可以嗎」" 

# 【真闇】
# display as 真闇
# JP: 「うん。そいで十分。せっかくやけん、\nおねーちゃん、双ちゃんに教えてあげたかけん」
2404 = "「嗯，足夠了。姐姐想用這個機會，教小雙一點東西呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「教える？　とは――」
2605 = "「教我什麼？」" 

# 【真闇】
# display as 真闇
# JP: 「『イメージがまったくわかん』のは、\n学園時代の思い出が無いから――と、違う？」
2100 = "「你說“完全沒有頭緒”，是因為沒有學生時代的回憶吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そういわれれば、その通りかと思う」
2410 = "「嗯，這麼說來的確是的」" 

# monologue
# JP: 学園時代も、帝都に引っ越し帝大に進学してのちも、\n指示されたことをただこなしていただけだった。
3299 = "學生時代啊，搬去帝都上帝大啊，我都是聽命行事而已。" 

# monologue
# JP: 自分から望んで、こころを、体を動かさなければ、\n思い出は残らぬものだと――今ならわかる。
3293 = "如果不是主動的期望，主動去用心體會的話，就不會留下任何回憶。這個道理我現在明白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ、こなすべきことはこなしてきたゆえ、\n今の僕がある訳だから、それはそれでよいかとも思う」
2085 = "「但是也因為經歷了這些，才有了現在的我，我覺得也不錯」" 

# 【真闇】
# display as 真闇
# JP: 「まっことね。双ちゃんが学園時代を楽しんどったら、\nおねーちゃん、今こうして双ちゃんの側におれんし」
2379 = "「嗯，小雙要是享受了上學時光的話，姐姐現在就不能像現在這樣陪在小雙身邊了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そんなことは無いだろう」
2053 = "「不，這可不會吧」" 

# 【真闇】
# display as 真闇
# JP: 「ざーんねん。あります。そぎゃんこつ」
2172 = "「可惜會的！就是會的」" 

# monologue
# JP: ふざけた口調。\nが、何故だろう。どこか悲しげに聞こえてしまう。
3271 = "她語帶詼諧地說。但是聽起來又有幾分傷心。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、普通に男の子しとったらモテモテやけん。\nおねーちゃんのことなんて、絶対に相手になんて」
2494 = "「小雙如果是個普通的男孩，一定是萬人迷啦。怎麼還會輪得上姐姐呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「していた――いや、そうできていたかはわからんが。\n恋人にしたいと望んで、努力したことは確実だろう」
2563 = "「我早就――不對，我不知道自己會不會跟你走到一起。但是我肯定會為了和你走到一起，付出很多努力啊」" 

# 【真闇】
# display as 真闇
# JP: 「ええ！！？　そぎゃんリップサービス。\nうれしかけど。うれしかけど、その……」
2236 = "「哎！！？　太客氣了啦。我聽起來很高興啦，但是……」" 

# monologue
# JP: ごにょごにょと、語尾が珍しく濁ってしまう。\nそこでようやく、思い当たる。
3947 = "難得真闇姐會齟齬。我才終於明白過來。" 

# monologue
# JP: 恋愛経験がなかったことを、\n真闇姉は、意外と気にしているのかもしれん。
3550 = "沒有戀愛經驗，讓真闇姐實際上挺在乎這種事的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「リップサービスなどではないさ。\n単なる事実からの推測だ」
2044 = "「不是客套啦，我只是根據事實做推測」" 

# monologue
# JP: そうであるなら、気持ちを全部言葉に直そう。
3471 = "我還是將自己的心情全部變成話告訴她吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――生きていながら、死んでいた。\n義務としてしか、生きてなかった、あの頃ですら」
1539 = "「――以前我雖然活著，心卻死了。就在我自己都把活下去當做義務的那時候」" 

# 【真闇】
# display as 真闇
# JP: 「…………うん」
1552 = "「…………嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、無意識に意識していた。真闇姉だけは。\nだから、甘えてはいかんと思い、背伸びをしていた」
2548 = "「我也冥冥中把真闇姐放在很重要的位置。所以才會不肯向你撒嬌，一直努力長高」" 

# monologue
# JP: 自覚はなかった。\n恋して初めて、そうだったのだと理解した。
3390 = "我一直沒有發覺。跟真闇姐談戀愛後，才發覺自己行為的意義。" 

# monologue
# JP: 心を閉ざしていてもなお――真闇姉だけは特別だった。
3303 = "封閉了自己的內心，但真闇姐依然有著特殊的地位。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから仮に僕が、平常の学園生活を送れていたら、\nまっさきに真闇姉に恋をして、焦がれていたさ」
2585 = "「所以即便我度過了平凡的上學時光，我也早就愛上了真闇姐，想和真闇姐走到一起了」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
2491 = "「小雙……」" 

# monologue
# JP: 真闇姉の瞳が揺れている。
3731 = "真闇姐的眼神動搖了。" 

# monologue
# JP: たくさんの言葉と沈黙。不安と安心。\nきっと全てを、瞳の中に閉じ込めている。
3257 = "她的眼睛裡，彷彿有無數的話要說，又彷彿只有沉默。彷彿有著無比的不安，又彷彿只有安心。" 

# monologue
# JP: （ちゅっ）
4028 = "（啾）" 

# 【真闇】
# display as 真闇
# JP: 「あ――」
2247 = "「啊――」" 

# monologue
# JP: だからキスする。目蓋に、目尻に。
3475 = "所以我吻了她，在她的眼皮、眼角上。" 

# monologue
# JP: 少し待ち。真闇姉が目を開けるのを見て、\n舌先を軽く尖らせる。
3781 = "等了等，真闇姐睜開了眼睛，我稍稍伸出了點舌頭。" 

# 【真闇】
# display as 真闇
# JP: 「ん……よかよ？」
2338 = "「嗯……沒事的」" 

# monologue
# JP: 真闇姉は瞳を閉じない。\nそのまま涙を――見えない涙を拭い取る。
3709 = "真闇姐沒有閉上眼睛。而是默默將淚水、看不見的淚水都抹去了。" 

# monologue
# JP: 真闇姉が流さず我慢してきた涙を、\n眼球を舐め、ゆっくり、ゆっくり舐め取っていく。
3924 = "這些是真闇姐一直藏在心底的淚花，我輕輕地、慢慢地，將它們一點點都舔去。" 

# 【真闇】
# display as 真闇
# JP: 「ん……ふっ――」
2324 = "「嗯……呼――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……。大好きだ。真闇姉」
1578 = "「……我喜歡你，真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「うちも、好いとお。\n双ちゃんのこと――こん[くら]蔵よりも、誰よりも」
2201 = "「咱也喜歡你呀。比這個酒窖、比誰都要更喜歡你呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2345 = "「嗯」" 

# monologue
# JP: その告白を、おおげさなものとは思わない。
3395 = "我不覺得她的話是誇張。" 

# monologue
# JP: 真闇姉がそう選択して――僕を選んでくれたから、\n僕らは、こうして寄り添いあえているのだから。
3527 = "正因為真闇姐選擇了我，我們才能這樣相互依偎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そう考えれば惜しくなる。\n真闇姉との学園生活。確かに、堪能してみたかった」
2080 = "「但是……想想感覺還挺可惜的。我還挺想和真闇姐一起度過上學時光的」" 

# 【真闇】
# display as 真闇
# JP: 「やけん。してみよ？\n視察しながら、レビューのために」
2859 = "「那就來試試唄？就在考察的時候，之後也好做評估啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ごっこ遊びを――いや、おままごと……\nでもないな」
2861 = "「那就是玩扮演遊戲嗎――還是說扮家家酒……好像也不是」" 

# 【真闇】
# display as 真闇
# JP: 「ロールプレイ」
2793 = "「角色扮演」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　その言葉だな。ロールプレイ」
2360 = "「嗯！　沒錯，就是角色扮演」" 

# monologue
# JP: 示された状況下で、与えられた役割を演じることで、\n当該状況への対処方法などを学習する。
3202 = "在給定的狀況下，扮演給定的角色，學習這種狀況下該如何應對。" 

# monologue
# JP: そうした手段のことではあるが、\nレジャーにも、なるほど、活用できそうだ。
3311 = "對啊，這樣的方法之後也能有助於做評估。" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際の廃校舎を使っての、学園生活ロールプレイ。\n確かに、ニーズがあるかもしれん」
2705 = "「用真實的廢教學樓玩校園生活ＲＰＧ。的確是有需求空間的」" 

# monologue
# JP: 思えば、発想は連鎖する。
3363 = "想像很快就串成了一條。" 

# monologue
# JP: 僕も確かに経験している――\nしかし、何の思い出も残っていない、学園イベント。
3400 = "我也有過經驗――但是我對那段學校活動沒有任何回憶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「文化祭やら、体育祭やら……例えば、御一夜鉄道の\nメンツでそれを行えるのなら、楽しそうだ」
2608 = "「文化節啊、體育節啊……要是能帶上御一夜鐵道的人一起辦這些活動，會很有趣的」" 

# 【真闇】
# display as 真闇
# JP: 「よかね、まっこと。そいば、実際に出来そうか。\nまずは、おねえちゃんと試してみよ？」
2720 = "「真的很不錯，感覺應該能辦得起來。首先和姐姐試一試吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2345 = "「嗯」" 

# monologue
# JP: なにゆえ僕に、と正直戸惑った依頼だったが、\nやる気が一気に高まってくる。
3154 = "原本這份委託讓我不知所措，現在卻幹勁十足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっそく、ポーレットに返事をしてこよう。\n乗務の前にも、打ち合わせなどできるかもしれん」
2819 = "「趕緊給波萊特回復吧。說不定乘務工作開始前，還能跟她討論下」" 

# 【真闇】
# display as 真闇
# JP: 「あ！　双ちゃん」
2280 = "「啊！　小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2422 = "「嗯？」" 

# monologue
# JP: 大きな声に振り返りみれば、\n真闇姉は、どこかスネたような顔をしている。
3813 = "聽到真闇姐的叫聲，我轉過頭。真闇姐似乎是在鬧彆扭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにか……あったか？」
2532 = "「怎麼……了嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「なにも無かとよ？\n何も無かけん――無かけん……ね？　その……」
2672 = "「沒有啊？沒什麼――真的沒什麼……好嗎？那個……」" 

# monologue
# JP: 真闇姉はよほど落ち着かないのか、\nしきりに瞬きを繰り返す。
3690 = "真闇姐似乎非常靜不下心來，她頻頻眨巴著眼睛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？――目にゴミでも入ったのか？」
2413 = "「嗯？――眼睛裡進了什麼東西嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「入って無かとよ？　双ちゃんが、たーっぷり\n濡らしてくれたけん。……うちん、目だけを」
2671 = "「沒有啊？　是小雙舔濕的呀……但是你只碰了眼睛耶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2300 = "「喔」" 

# monologue
# JP: 確かに、目だけで済ませてしまっていた。
3453 = "我的確只舔了她的眼睛。" 

# monologue
# JP: 真闇姉ほど魅力的な女性を――\nまして恋人を目の前にして、これほどの失礼も無い。
3588 = "畢竟是真闇姐這樣有魅力的女性――更別說她還是我的女友，怎麼能這樣沒禮貌呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「忘れ物に、気づかせてもらえて助かった」
2805 = "「謝謝你提醒我忘記了什麼」" 

# monologue
# JP: （ちゅっ）
# 4028 = "（啾）" 

# 【真闇】
# display as 真闇
# JP: 「んふふ――おかえし。（ちゅっ！）」
2352 = "「嗯唔――回你一個。（啾！）」" 

# monologue
# JP: かわいい。かわいい。\nおかえしの、おかえしをせずにはいられない。
3597 = "真可愛，太可愛了。我一定要為她的回禮再回一個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……真闇姉」
1585 = "「……真闇姐」" 

# 【真闇】
# display as 真闇
# JP: 「んっ！？　あ……んっ――ふっ――んっ、ちゅっ――」
2364 = "「嗯！？　啊……嗯――呼――嗯、啾――」" 

# monologue
# JP: 抱き締める。\n豊かな胸が、僕の胸板で形を変える。
3513 = "擁抱她。我的胸板擠壓著她豐滿的胸。" 

# monologue
# JP: 真闇姉の匂いが立ち上る。\n成熟しきった、けれども青い、女の匂い。
3726 = "真闇姐的氣味散了開來。是非常成熟，但又青澀無比的女香。" 

# 【真闇】
# display as 真闇
# JP: 「んっ！？　ふっ――あむっ――れろっ――ちゅるっ、\nちゅっ――れるっ――じゅむっ――ちゅ、ちゅううっ」
2363 = "「嗯！？　呼――啊嗚――舔――啾、啾――舔――啾――啾、啾」" 

# monologue
# JP: それに煽られ、唇を割り舌を絡める。\n温度が、密度が高まっていく。
3196 = "在她的誘惑下，我伸出舌頭與她舌吻。溫度和密度都越來越高。" 

# 【真闇】
# display as 真闇
# JP: 「ん……は、ぁ……いけん、よ？　双ちゃん。ね？\nあっ！？　ちゅっ――ちゅむっ――ちゅう……れるっ」
2330 = "「嗯……哈、啊……不行喔？　小雙。好嗎？啊！？　啾――啾唔――啾……舔」" 

# monologue
# JP: 焦らすように唇を離されて、\nだからすぐさま、また追い求める。
3261 = "她移開了嘴唇，卻刺激了我的欲望，於是我立刻第二次吻了上去。" 

# 【真闇】
# display as 真闇
# JP: 「んふっ――んっ――はぁっ――ん――ちゅうっ――\nれるっ、れろおっ――ちゅ、ちゅむ――（かりっ！）」
2348 = "「嗯唔――嗯――哈――嗯――啾――舔、舔――啾、啾――（咬！）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2891 = "「！！？」" 

# monologue
# JP: 夢中になって這い回っていた舌先を、\nほんの僅かに噛まれてようやく――正気に返る。
3525 = "樂不思蜀地探索著真闇姐嘴巴的舌頭，被非常輕地咬了一下，我終於回過了神來。" 

# monologue
# JP: 濃密すぎるおんなの――いいや、雌の匂いに煽られて、\n僕も完全に一匹の、単なる雄になっていた。
3461 = "我被濃密的女人香，更進一步說，是雌性的氣味感染成了一個純粹的雄性野獸。" 

# 【真闇】
# display as 真闇
# JP: 「ごめんね？　双ちゃん。\nけど、まだ昼間で――居間やけん」
2595 = "「抱歉，小雙。但是現在還是白天――還是客廳呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。僕こそ悪かった。\n軽いキスで、鮮やかに立ち去るつもりだったのだが」
2063 = "「也對，是我不好。我本來是想輕吻一下就離開的」" 

# 【真闇】
# display as 真闇
# JP: 「ゆーても、うちから誘っておいて……ねぇ」
2051 = "「不過也是咱有點勾引到你了吧……」" 

# monologue
# JP: （つうううっ）
4016 = "（呲）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 2345 = "「嗯」" 

# monologue
# JP: 触れられ、初めて自覚する。\n気づかぬままに、全身全霊で勃起していた。
3247 = "她摸了摸我才有感覺到。自己不知不覺已經勃起得不得了了。" 

# 【真闇】
# display as 真闇
# JP: 「……こぎゃんと張り詰めて、苦しくなかと？\nその――少しだけ、おねえちゃんのお部屋ばいって」
1580 = "「……擠成這樣不難受嗎？要不要――來姐姐的房間裡一會啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいのはやまやまだが――\nそうしてしまえば、僕は間違いなく遅刻する」
2571 = "「我真的很想啦――但那樣絕對會遲到的」" 

# 【真闇】
# display as 真闇
# JP: 「あー」
# 2247 = "「啊――」" 

# monologue
# JP: 納得される。\n所定の出勤時刻まで、ゆうに一時間はあるというのに。
3241 = "她懂了。其實離上班時間還早得很。" 

# monologue
# JP: いささか恥ずかしい気もするが、\nその恥ずかしささえも、どこか嬉しい。
3596 = "看著她有點難為情，但是難為情也讓我覺得很有趣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗務に穴はあけられんし――久々のデート前だ。\nせっかくだから、溜めておきたいような気もする」
2060 = "「乘務工作不能出差錯――而且久違的約會就在眼前了。我想為約會保留一下」" 

# 【真闇】
# display as 真闇
# JP: 「た、溜める！！？\nって、そのっ――」
2108 = "「保、保留！！？你是說――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくはご想像どおりのものを、だ。\nあさっての、視察・デート後に迎える夜まで」
2663 = "「正如你所想的那樣。我這是為後天考察、約會後的那一夜而保留」" 

# 【真闇】
# display as 真闇
# JP: 「ぁっ」
2265 = "「啊」" 

# monologue
# JP: 戸惑ったように漏れ出た声は、\nけれども熱を帯びている。
3272 = "她語帶迷茫的啊聲，竟然還帶著熱量。" 

# monologue
# JP: 発情している。今の時点で。ふたりとも。\nゆえに、それをできるだけ熟成させたい。
3923 = "這一刻我們一定都發情了。所以我才想為了後天的重頭戲而好好熟化這份情感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、真闇姉。いってくる。\nあさってを楽しみに、がんばってくる」
2741 = "「真闇姐，那我先上班去了。我會期待後天的」" 

# 【真闇】
# display as 真闇
# JP: 「うん。がんばって！　双ちゃん」
2372 = "「嗯，加油啊！　小雙」" 

# monologue
# JP: 玄関先まで見送って、\nカチカチ、火打ち石を鳴らしてくれる。
3281 = "她送我到門口，敲了敲打火石。" 

# monologue
# JP: そんな仕草は、もう完全に普段通りの真闇姉だ。\nだからこそ。溜めたその先への期待も膨らむ。
3897 = "跟平時的真闇姐沒有任何不同。所以我更期待後天釋放的美妙了。" 

# 【真闇】
# display as 真闇
# JP: 「いってらっしゃい、気をつけて」
2825 = "「路上小心，一路走好」" 

# 【真闇】
# display as 真闇
# JP: 「んー！」
2320 = "「嗯――！」" 

# monologue
# JP: 臨時停車のキハ07sを見送り、駅舎を出る。\n途端、真闇姉は大きく大きく伸びをする。
3917 = "送走臨時停靠的Ｋｉｈａ０７Ｓ，我離開車站。就看見真闇姐伸了個大大的懶腰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗り疲れたか？」
2434 = "「坐車坐累了嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「乗り疲れるほどの距離じゃなかとよ。\nばってん、んーーーー、んっ！」
2840 = "「這點距離還談不上累啦。但是，嗯――――嗯！」" 

# monologue
# JP: 心地よさげに、もう一度、伸び。
3225 = "她又伸了一個，似乎很享受。" 

# monologue
# JP: そのまま大きく両手を広げ、\nこどものように、ぐるり、大きくあたりを見渡す。
3285 = "她雙臂大大張開，像小孩子一樣望了望周圍一圈。" 

# 【真闇】
# display as 真闇
# JP: 「何年ぶりかなー。\n前来たときと、ぜぇんぜん景色が違うて見ゆるー」
2875 = "「都多少年了啊――看起來和以前的景色完全不同――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「長くても数年だろうに……\nそれほどに荒廃のペースが速いのか？」
2518 = "「往久的說也就幾年吧……荒廢的速度有你想的那麼快嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「ううん、双ちゃん。\n違うとるんは、景色じゃなくて、見え方」
2046 = "「不是的，小雙。改變的只是看景色的角度而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2422 = "「嗯？」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんといっしょやけんね。\n全部、綺麗に。少ぉしずつ増して、綺麗に見ゆると」
2698 = "「現在是和小雙在一起呀。感覺一切都好漂亮，一切都變得漂亮起來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2889 = "「！」" 

# monologue
# JP: これは――これは――これはいかん。\n照れくさい、などという言葉では到底足りん。
3922 = "這――這個――不好了。光是害羞還不足以形容我的心情。" 

# monologue
# JP: 抑えようとしても顔がニヤける、\n頬が染まるのを自覚する。
3123 = "再怎麼壓抑都壓抑不住，臉會不自覺地笑起來。我能感覺到自己的臉紅了。" 

# 【真闇】
# display as 真闇
# JP: 「いこ？　双ちゃん、廃校舎まで。\n時間はまだまだたっぷりあるけん、ゆうるりと」
2817 = "「走吧？　小雙，一起去廢教學樓。時間還有的是，慢慢地走吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
2286 = "「啊，嗯」" 

# monologue
# JP: 差し伸べられた手を受け取る。\n熱い。真闇姉のてのひらも、いつもより。
3433 = "我握住她伸出來的手。很熱，真闇姐的手心比平時熱很多。" 

# monologue
# JP: それが嬉しくて、ほっとして、\nようやく自分のリズムに戻れる。
3426 = "我很高興也很安心，終於能回到自己的節奏了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、廃宿舎の方から抜けていこう。\nあそこも、一部の安全性は確認されてるそうだしな」
2521 = "「從廢宿舍那邊穿過去吧。那裡有一部分的安全性已經得到過檢查了」" 

# 【真闇】
# display as 真闇
# JP: 「よかよ」
2442 = "「好啊」" 

# monologue
# JP: 手を繋いだまま、歩き出す。
3491 = "手牽著手走了出去。" 

# monologue
# JP: 歩幅を合わせる必要がない。\n自分のペースで歩けばそれは、真闇姉のペースだ。
3580 = "甚至不需要配合步幅。因為我只要自然地走，真闇姐就會跟上我的速度。" 

# 【真闇】
# display as 真闇
# JP: 「ああ……」
2270 = "「啊啊……」" 

# monologue
# JP: 懐かしげな声。\nそういえば真闇姉は、確か……
3289 = "好懷念的聲音。我記得真闇姐她……" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前に来たのは、学園の、\n遠足かなにかでという話だったか？」
2575 = "「我記得你以前來是因為學校組織郊遊來著？」" 

# 【真闇】
# display as 真闇
# JP: 「うん。そ。少等部でも仲等部でも。\n広等部でも、一回ずつ」
2381 = "「嗯，少等部、仲等部和廣等部各有一次」" 

# 【双鉄】
# display as 雙鐵
# JP: 「計三回も来ているのか。\nそれぞれ、見どころが違うとか？」
2105 = "「來過三次嗎。每次風景有不一樣嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「んー？　見どころ？」
2420 = "「嗯？　風景？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――つまり、少等部のときは廃宿舎を見て、\n仲等部では坑道を見る、など」
2318 = "「嗯――比方說少等部看廢宿舍，仲等部看坑道之類的」" 

# 【真闇】
# display as 真闇
# JP: 「んーん。そぎゃん工夫はさっぱりなかとよ？\n第一、安全性の確認だって――」
2242 = "「哪有啦，這怎麼可能呢？首先安全性就沒有保障――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。この話が出て、それから初めて\n調査したとのことだものな。む？　ならば――」
2064 = "「也對，都是出了這次的計劃，才第一次做過安全調查呢。嗯？　那麼――」" 

# 【真闇】
# display as 真闇
# JP: 「山とかに行く遠足と同じよ？\nたーだ歩いて、おべんとさん食べて、帰るだけ」
2822 = "「跟去山上郊遊是差不多的。走走路，吃吃便當，就回去了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2243 = "「唔」" 

# monologue
# JP: 何をしたのだ？　と聞くより早くの答えにけれど、\nしばし、言葉をなくしてしまう。
3470 = "我還想問她做了什麼，她就提前告訴我了。讓我一下子想不到話說了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんというか……\nそれは――時間がもったいないような気がするな」
2534 = "「怎麼說呢……感覺――時間有點浪費啊」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんこつなかとよ？\n楽しかけんねー」
2856 = "「那可不對喔？可有趣了呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しい？」
2638 = "「有趣？」" 

# monologue
# JP: 解せん。
3392 = "我不明白。" 

# monologue
# JP: 建物や坑道内の見学もできず、ただ歩き回ることに、\n一体、どれほどの楽しみがあるというのか。
3933 = "連建築和坑道都不能參觀的話，四處漫步能有什麼意思呢。" 

# 【真闇】
# display as 真闇
# JP: 「あー」
# 2265 = "「啊」" 

# monologue
# JP: 解せぬ気持ちが、どうやら顔に出たらしい。
3448 = "我的不理解估計是表露在臉上了。" 

# monologue
# JP: 真闇姉の目が、ふっと柔らかに――\nあるいは少し、さみしげになる。
3729 = "真闇姐的眼睛突然變得很溫柔――或者是蒙上了一層寂寞。" 

# 【真闇】
# display as 真闇
# JP: 「やったら、ちょこっとだけでも遠足、してみよ？\nこれも、視察のひとつになるけん」
2867 = "「那要不要來郊遊一會試試呢？這也是一種考察呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「視察対象は、廃校舎内だが」
2091 = "「但是考察對象是廢教學樓內啊」" 

# 【真闇】
# display as 真闇
# JP: 「移動経路もレビューばせんといけんでしょお。\nそれに、校舎の中だけが学園生活の舞台じゃなかとよ」
2758 = "「總不能只評論道路吧，而且校園生活一定是在教學樓裡發生的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ロールプレイの話ともつながるか」
2405 = "「嗯，跟你說的角色扮演也有關嗎」" 

# monologue
# JP: ――遠足のロールプレイと言われても、\nいまひとつ、なにをどうしていいのかわからない。
1530 = "――不過角色扮演跟郊遊串在一起，我也不知道該怎麼做才好。" 

# monologue
# JP: とはいえ、真闇姉の提案だ。\nわからぬことであるからこそ、まずは素直に従おう。
3094 = "但這是真闇姐的提案。先按她說的做吧，不懂的問題以後再說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、遠足だ。\n真闇姉、一緒に頼む」
2798 = "「該郊遊了。真闇姐，跟我一起吧」" 

# 【真闇】
# display as 真闇
# JP: 「もちろん。ほーたら、ね？　歩こ？」
2707 = "「當然了。來，一起走吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2345 = "「嗯」" 

# monologue
# JP: 手をつないだまま、のんびり歩く。
3407 = "我們牽著手慢慢地走起來。" 

# monologue
# JP: 廃宿舎まわりをただブラつけば、\n景色もゆるゆる、変化していく。
3199 = "在廢宿舍一帶走來走去，就能看到風景在眼前一點點地變化。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、あれ。\nあの深緑のカーテンのお部屋」
2496 = "「小雙，你看，那個有深綠色窗簾的房間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、カーテンを残したままに引っ越したのか。\n捨てるのを面倒がったか、あるいは――」
2388 = "「嗯，搬走的時候沒有把窗簾帶走吧。可能是嫌丟掉麻煩，或者――」" 

# 【真闇】
# display as 真闇
# JP: 「窓から、ちょこぉっと覗いて見んと？\n中には、一歩も入らんけん」
2785 = "「要不要隔著窗戶看看？裡面是進不去了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「構わんが、ヘルメットだけは着用してくれ。\n外壁等の落下があるかもしれない」
2170 = "「可以啊，但一定要帶上頭盔。就怕外牆之類的會掉下來」" 

# 【真闇】
# display as 真闇
# JP: 「はぁい」
2449 = "「好的」" 

# monologue
# JP: 視察用にと持ってきていたヘルメットを渡す。
3432 = "我把考察時要戴的頭盔遞給了她。" 

# monologue
# JP: さすがは、真闇姉。\n言わずともあご紐までをしっかり締める。
3702 = "真闇姐懂的太多了。不用我教她，連下巴的扣子都扣得很好。" 

# 【真闇】
# display as 真闇
# JP: 「あら、双ちゃんおとこまえ」
2232 = "「哎呀，小雙真帥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだかんだでかぶるものだからなぁ。\n鉄道会社の現職ならば。と、……いうか」
2706 = "「畢竟做什麼事都得戴啊。我可是在鐵道公司工作的……不過」" 

# 【真闇】
# display as 真闇
# JP: 「うん？」
# 2422 = "「嗯？」" 

# monologue
# JP: 美人は得だと、つくづく思う。\nヘルメットなど、被ったこともほぼなかろうに――
3943 = "長得漂亮可真有優勢啊。她明明沒怎麼戴過頭盔的――" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても良く似合っている。かぶりこなす？　\nというと妙だが……まるでベテランのようにみえるぞ」
2582 = "「戴你頭上真好看啊，戴得很完美？可能說法奇怪了點……但感覺一戴上就很有行家的感覺」" 

# 【真闇】
# display as 真闇
# JP: 「ベテランって！\nそんなん、褒められとる感じせんけど」
2069 = "「什麼行家呀！雖然我沒聽出來是在誇獎我啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「手放しで褒めている。\n叶うのならば、モデルになって欲しいくらいだ」
2578 = "「我這是最直接的讚美了。我甚至有種讓你當模特兒的衝動呢」" 

# 【真闇】
# display as 真闇
# JP: 「モデル」
2659 = "「模特兒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。女子はどうにも、\nヘルメットの着用を渋る傾向にあってな」
2344 = "「嗯。畢竟女性大多都很不樂意戴頭盔呀」" 

# monologue
# JP: 慣れているはずのポーレットやハチロクでさえも、\n例外ではない。
3934 = "連波萊特、八六這些習慣戴頭盔的人也是不喜歡戴的。" 

# monologue
# JP: 着用時や外したときなど、目に見えて神経質になる。\n例外といえば――
3539 = "每當戴上脫下的時候，她們會露出明顯不快的神情。要說例外的話――" 

# 【真闇】
# display as 真闇
# JP: 「あ……\n渋らんのは、なーちゃんとれーちゃんくらい？」
2264 = "「啊……樂意的人是小凪和小玲嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かに凪やれいなはまったく嫌がらんが――\nなぜ、そんなことまでわかるのだ？」
2370 = "「嗯，凪和玲奈的確沒有不樂意的感覺――但你怎麼知道的？」" 

# 【真闇】
# display as 真闇
# JP: 「ん……」
2321 = "「嗯……」" 

# monologue
# JP: 言葉を探しているのだろうか。
3239 = "她想了又想。" 

# monologue
# JP: 真闇姉はその長い指を唇にあて、\n少しの間、だまりこむ。
3691 = "真闇姐修長的手指搭在嘴唇上，她沉默了一下。" 

# 【真闇】
# display as 真闇
# JP: 「……ひーちゃんを見てたらわかるでしょお。\nポニーテールば、どれだけ時間かけて整えとるか」
1583 = "「……看過小日就知道了吧。馬尾得花多少時間才能紮好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ！　そういうことか。\n髪型を乱したくないのだな」
2314 = "「嗯――哦！　原來如此。女孩子是怕髮型亂掉啊」" 

# 【真闇】
# display as 真闇
# JP: 「そ。女の子やけん、どぎゃんしてもねー」
2475 = "「對啊，畢竟是女孩子，肯定在意的」" 

# monologue
# JP: 納得だ。凪やれいなは性差だなんだを、\n恐らくは、ほとんど意識してないのだろうし。
3151 = "原來如此，凪和玲奈不怎麼在乎男女之別，所以基本上不在乎頭髮亂不亂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、そうなると疑問だな。真闇姉は、\n僕が知る限りもっとも女性らしい女性であるのに」
2089 = "「但是我有個問題。真闇姐，我覺得你是個非常有女人味的女性啊」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃーんと？」
2886 = "「非常嗎？」" 

# monologue
# JP: 余裕のフリで、髪を手で払い、照れ隠し。\nそんなところにも、どうしようもなく女性を感じる。
3246 = "她抬手撩了撩頭髮，看起來很從容，實際上是在隱藏自己的害羞。就連這個動作也充滿女性魅力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そぎゃんとだ。で、あるのにもかかわらず、\nなぜ、何の躊躇もなくヘルメットを――」
2412 = "「嗯，非常的。但是你卻毫不介意，為什麼會這麼從容地戴上頭盔呢――」" 

# 【真闇】
# display as 真闇
# JP: 「そんなんは、『知っとるから』」
2431 = "「因為我懂啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知っとる、とは何をだ？」
2541 = "「懂什麼？」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんのこと」
2561 = "「我懂你啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕を？」
2580 = "「我？」" 

# 【真闇】
# display as 真闇
# JP: 「そ。双ちゃんなら、ウチがどれほどぺしゃんこな\n髪型になったとしても、少しも変わらんいうことを」
2620 = "「是啊，無論咱的髮型多麼扁，小雙都不會改變對咱的態度啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2268 = "「啊啊――」" 

# monologue
# JP: じんわり、嬉しい。\n愛されてる、信頼されてると実感できる。
3188 = "喜悅漸漸湧上心頭。我能感覺到她的愛與信任。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえて光栄だ。\n本当に、とても」
2806 = "「謝謝你這麼說，真的很謝謝你」" 

# monologue
# JP: どれほどの無様を晒しても、\n為さねば為らぬことは、ある。
3122 = "再怎麼丟臉，我也有必須做的事情。" 

# monologue
# JP: 真闇姉はそれを知っている。\n真闇姉ほどではなかろうが、僕も多少は、知っている。
3747 = "真闇姐知道是什麼。雖然不及真闇姐，但我也略知一二。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……髪型ひとつ、姿ひとつに、影響されんさ。\nこれほど僕は、真闇姉に惹かれているのだから」
1592 = "「……髮型和樣子都不會影響你對我的魅力啊」" 

# 【真闇】
# display as 真闇
# JP: 「……双ちゃん」
1574 = "「……小雙」" 

# monologue
# JP: 安心しきって無様を晒せる。\n安心しきって無様を晒して、相手が、そばにいる。
3167 = "只有對最放心的人，才能露出最難看的樣子。只有最放心的人在身邊，才肯給她看最難看的樣子。" 

# monologue
# JP: それがどれほどの幸せか――\n今の僕になら、しみじみわかる。
3928 = "這該有多麼幸福――現在的我漸漸能夠理解了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、真闇姉」
2397 = "「嗯，真闇姐」" 

# monologue
# JP: 惹かれあってる。どうしようもなく。\nだから、自然と唇が――
3416 = "我和她互相吸引，無比的吸引。所以嘴唇自然而然靠在了一起――" 

# monologue
# JP: （こつん）
4052 = "（當）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2345 = "「嗯」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃ」
2228 = "「哎呀」" 

# monologue
# JP: 触れ合うより先、\nヘルメット同士があたってしまう。
3163 = "只可惜頭盔先我們一步，靠在了一起。" 

# 【真闇】
# display as 真闇
# JP: 「先、こされちゃったねぇ。\nうふふ、お熱いお熱い」
2665 = "「比我們還快一步啊。呵呵，真親熱真親熱」" 

# monologue
# JP: 軽やかに身を翻し、\n真闇姉は、また僕の手を引き、先程の窓へ歩み寄る。
3279 = "她輕輕轉了個身，又拉起我的手，走到剛剛找到的窗邊。" 

# 【真闇】
# display as 真闇
# JP: 「あーー」
# 2247 = "「啊――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「暮らしを、そのまま置いていったのか」
2702 = "「生活用品都丟在原處了嗎」" 

# 【真闇】
# display as 真闇
# JP: 「戻ってくる――つもりだったんかねぇ」
2771 = "「肯定是原本打算回來的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2173 = "「可能吧」" 

# monologue
# JP: カーテンの質などわからんが、\n古びてもなお、重厚さとしなやかさを感じさせる。
3394 = "我不知道窗簾的材質，儘管很舊了，也能看出它的厚實與柔軟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「テーブルに、タンスに、テレビまで。\nどれもこれも、大荷物といえば大荷物だが」
2637 = "「有桌子，有衣櫃，還有電視機。看起來都是相當大的東西啊」" 

# 【真闇】
# display as 真闇
# JP: 「テレビ。昔は今よりずーっと高級品やもんね。\n置いていくには、もったいなかとよね」
2077 = "「以前電視機比現在要貴重很多吧，丟下來肯定很可惜吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのだろうな」
# 2616 = "「是啊」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんは……\nちっちゃかころ、どぎゃんテレビ番組見とったと？」
2492 = "「小雙……你小時候很經常看電視嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「小さいころに、か」
2489 = "「小時候啊」" 

# monologue
# JP: 言われて、瞬間、体が震える。\n思い出が、あまりに鮮明に蘇ってきて。
3903 = "身體突然顫抖了一下。回憶在腦海裡浮現出鮮明的形象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見ていたな。確かに。夢中だった。\n路子と、テレビのチャンネルを奪い合っていた」
2569 = "「我看了很多電視，非常沉迷。經常和路子搶著換自己想看的頻道」" 

# 【真闇】
# display as 真闇
# JP: 「あら、ふたごちゃんでも、そぎゃんこつあると？」
2824 = "「跟妹妹也會搶來搶去嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるある。ああ、一卵性のふたごは違うのかも\nしれんが――僕らは、男女の双子だったからな」
2710 = "「當然啦，雖然同卵雙胞胎可能不一樣――但我們可是哥哥妹妹啊」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、興味はわかれたさ。日曜などは\n特撮からの女の子むけの流れで平和だったのだが」
2775 = "「興趣是既然不同的。不過週日總是先放特攝片，然後才是少女向節目，那天就會很和平」" 

# 【真闇】
# display as 真闇
# JP: 「平日はいけんかったと？」
2093 = "「但非週末就不和平了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「帝営放送の五分アニメを路子が見たがるのだ。\nが、僕はロボットアニメなどを最後までみたい」
2826 = "「路子想看帝營放送的五分鐘動畫，但我就想把自己喜歡的機器人動畫看完」" 

# 【真闇】
# display as 真闇
# JP: 「あ！　あるある短いの。そっか、あれって――\n他の見てたら、ちょうどクライマックスのときとか？」
2284 = "「啊！　是有那種泡麵片，這樣啊――要是切了台，就會正好錯過最高潮的部分，這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は最後までみたいのだが、路子は最初から見たい。\nその上、僕にはそこまで見ていた弱みもあったから」
2572 = "「我總是想看到最後，路子想從頭開始看。而我往往已經看了很久，這方面我又占不到理」" 

# 【真闇】
# display as 真闇
# JP: 「『おにーちゃんなんだから』」
1549 = "「“哥哥真是的”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさにだ」
2439 = "「她就這麼說的」" 

# monologue
# JP: 大きく頷き、その瞬間にそうかと思う。
3472 = "我點了點頭，然後就突然明白了過來。" 

# monologue
# JP: 真闇姉も、おねーちゃんで。\nその上、真闇姉ほどに優秀ならば……
3688 = "真闇姐也是做姐姐的。而真闇姐這麼優秀的人……" 

# 【双鉄】
# display as 雙鐵
# JP: 「……大変だよな。きょうだいの、上というのは」
1568 = "「……做哥哥姐姐的，可真是辛苦啊」" 

# 【真闇】
# display as 真闇
# JP: 「まっことねぇ」
# 2616 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大変だった。\n妹なんていらないと、何度も何度も思ったが――」
2453 = "「好辛苦啊。我甚至想過很多次，要是沒有妹妹就好了――」" 

# monologue
# JP: ふいに、泣きそうになってしまう。
3088 = "但我的眼淚水卻不爭氣得想流出來。" 

# monologue
# JP: “楽しかった”“しあわせだった”と、\n密度の凄い塊が、胸の奥からこみあげてきて。
1536 = "“真是快樂”“真是幸福”……這些濃重的情感，卻從我的心底裡湧了上來。" 

# 【真闇】
# display as 真闇
# JP: 「よかよ？」
2668 = "「沒事的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……何がだ？」
1576 = "「……怎麼了？」" 

# monologue
# JP: わかってくれて、許されている。\n泣いてもいいと誘ってくれて――だから、とぼける。
3242 = "她懂我，她原諒我。她勸我想哭就哭出來，所以我才會變成這麼丟臉的自己。" 

# monologue
# JP: 見栄を張ることも、ある種甘えのうちなのだろうが、\n真闇姉の前ではやはり、僕は背伸びをしていたい。
3291 = "好面子可能也是一種撒嬌的表現，但我在真闇姐的面前，卻總覺得自己不夠高大。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の弟とはいえ、僕は日々姫の兄でもあるのだ。\n上の兄弟の大変さを、振り返るにはまだまだ早いさ」
2567 = "「我是真闇姐的弟弟了，但也是日日姬的哥哥。現在開始感嘆做哥哥姐姐的苦衷，還太早了點」" 

# 【真闇】
# display as 真闇
# JP: 「あー。\nうん！　そぎゃんとね」
2246 = "「啊――。嗯！　是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「話しこんでしまったな。そろそろ行こう」
2765 = "「聊太久了，我們走吧」" 

# 【真闇】
# display as 真闇
# JP: 「はぁい」
2441 = "「好呀」" 

# monologue
# JP: 手を引き、歩く。\n今度は僕がリードして。
3409 = "我們牽起手走了起來。這次我帶頭。" 

# monologue
# JP: 言葉が、歩みに連れてでてくる。\nなにか、つかえが取れたみたいに。
3889 = "走著走著，就有很多話想說。感覺心裡的鬱悶都散開了。" 

# 【真闇】
# display as 真闇
# JP: 「へぇえ、双ちゃんにも好き嫌いあったと」
2146 = "「原來小雙也挑食啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今はもうなくなったがな。\n昔は、ピーマンが大嫌いだった。苦いしな」
2697 = "「現在不挑啦，以前可討厭青椒了，我嫌那東西太苦」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ、おこさま」
2234 = "「哎呀，真是小孩子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際におこさまだったからな。だが――不思議だ。\n我慢して食べていたら、旨く感じるようになっていた」
2639 = "「本來就是小孩子啊，但不可思議的是，忍著吃下去了卻覺得相當可口」" 

# 【真闇】
# display as 真闇
# JP: 「それはほら。おねーちゃんの腕のおかげ？」
2429 = "「因為姐姐手藝很好吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのだと思う。感謝している」
2542 = "「應該是的，謝謝姐姐」" 

# 【真闇】
# display as 真闇
# JP: 「そんな！　じょーだん！\nそぎゃん真正面から返されちゃったら、照れるけん」
2719 = "「真是的！　你又開玩笑！講得這麼直接，人家很害羞的呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし実際、右田の家に迎えてもらい、\nあの頃の僕ですら、水と料理との旨さには――おや」
2087 = "「但是右田家接我走的時候，那時候的我根本不知道水和飯菜可以有多美味――啊」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ、残念。」
2230 = "「哎呀，可惜了。」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
2313 = "「嗯――」" 

# monologue
# JP: 少し、驚く。\n宿舎群のはずれまで、全く時間を感じなかった。
3438 = "我有點吃驚。走完整片宿舍區，我都沒感覺到時間的流逝。" 

# 【真闇】
# display as 真闇
# JP: 「ここから、廃校舎まではもーすぐとよね？」
2839 = "「這裡離廢教學樓很近了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ものの五分もかかるまい」
2367 = "「嗯，五分鐘的路程都沒有」" 

# 【真闇】
# display as 真闇
# JP: 「宿舎ば出て、五分で学校。この辺の子ば、\nちょこーっと、通学路、短すぎかなー」
2882 = "「離開宿舍，五分鐘就到學校。這附近的孩子上學的路是不是太短了點啊」" 

# monologue
# JP: 解せぬ。とはもう思わない。
3419 = "我已經不會再有不理解的想法了。" 

# monologue
# JP: 通学途中のおしゃべりが、\nどれほど素敵なものであるかを、僕も体験できたから。
3068 = "上學路上聊聊天真是美妙極了，剛剛我就與真闇姐體驗了這個過程。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まったくだな」
2717 = "「真是一點沒錯」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ！」
2229 = "「哎呀！」" 

# monologue
# JP: 言った途端に、笑ってくれる。\nまぶしいほどに明るい顔で。
3132 = "剛說完，她就笑開了花。燦爛到讓我覺得耀眼。" 

# 【真闇】
# display as 真闇
# JP: 「なら、わかったと？　坑道にも、建物内にも、\n例え、一歩も入れんでも――」
2854 = "「那你明白了嗎？　就算坑道和建築都一步也進不去――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。遠足は楽しいものだな。\nただ、歩き。そうしながら話すというだけで、十分に」
2565 = "「我明白了，郊遊真是快樂的事。走走路，聊聊天，就足夠快樂了」" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ」
2194 = "「呵呵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に――時間が飛ぶようにすぎていった。\nただ、真闇姉とすごし、話す。それだけのことで」
2631 = "「時間真的眨眼間就不見了。明明只是和真闇姐聊了聊天而已」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、嬉しか。\n双ちゃんと、学園生活ば共有できて」
2554 = "「我很高興能和小雙有一段上學的體驗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うむ」
2269 = "「啊啊――嗯」" 

# monologue
# JP: そうか。\nまともな学園生活とはこういうものであったのか。
3927 = "這樣啊。這才是真正的上學嗎。" 

# monologue
# JP: 目的などは関係なしに、恋人と、友人と――\nただただ同じ時間をすごして、語らって。
3074 = "不用追求什麼目的，和戀人、和朋友――一起相處、一起交流，僅此而已。" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃん顔せんと、双ちゃん」
2135 = "「別把什麼都寫在臉上呀，小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 

# monologue
# JP: どぎゃん顔をいま、僕はしてしまっていたのだろう。
3412 = "我剛剛的表情一定幸福極了。" 

# monologue
# JP: 真闇姉の声があんまり優しくて――\nかえって、不安になってしまう。
3734 = "真闇姐的聲音是那麼溫柔――讓我心裡都有點不安。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんが望んでくれるなら。おねーちゃん。\n何度だって、双ちゃんの学園生活に付き合うけん」
2168 = "「只要小雙希望，姐姐都會陪小雙來上學的。無論多少次喔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい話だ」
2803 = "「謝謝你」" 

# monologue
# JP: 即座に答えが喉からでてきて、ならば、と思う。
