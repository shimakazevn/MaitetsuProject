2776 = "「蛤啊――喜歡――喜歡你，小雙――姐姐、姐姐――一開始就喜歡你――嗚啊！」" 

# monologue
# JP: いいこいいこもしてあげる。\n頭ではなくクリトリスへと。
3464 = "我輕柔地撫摸著她，但撫摸的不是腦袋，是陰核。" 

# 【真闇】
# display as 真闇
# JP: 「ひゃあああん――とけ、ちゃうっ――からだ――\nおねえ、ちゃんっ――おにく――どろって、しちゃう」
2184 = "「呀嗯――身體――彷彿要融化了――姐姐――的肉――要融化了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「してくれ。存分。\n僕が全部を、すするから」
2104 = "「來吧，盡情來吧。我會全部舔掉的」" 

# monologue
# JP: 耳元へキス。後ろ髪にも。\n鼻先を使い髪を割り、髪ごとうなじをぞろリと舐める。
3860 = "親親她的耳畔還有頭髮。利用鼻子分開頭髮，然後連著頭髮舔她的脖頸。" 

# 【真闇】
# display as 真闇
# JP: 「は――あっ――双ちゃん――そうちゃあぁんっ」
2211 = "「哈――啊――小雙――小雙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2345 = "「嗯」" 

# monologue
# JP: （ずりゅうううううううう――――ばぢゅんっ！！）
4014 = "（呲溜――啵啾！！）" 

# 【真闇】
# display as 真闇
# JP: 「んひゅううううううううううっっ！！！！」
2346 = "「嗯呀！！！！」" 

# monologue
# JP: （じゅぶっ！　ずぢゅっ！　じゅばっ！　ごちゅっ！）
4025 = "（啾噗！　呲啾！　啾叭！　咕啾！）" 

# 【真闇】
# display as 真闇
# JP: 「か――はっ――あっ――ふあっ！　おくっ、ん、\nおくっ――きてる――子宮、に――子宮にぃっ！！」
2249 = "「啊――哈――啊――嗚啊！　深處、深處――來了――子宮――子宮！！」" 

# monologue
# JP: （ばぢゅっ！　ずばっ！　じゅぶっ！　ごりゅんっ！）
4024 = "（啵啾！　呲啪！　啾噗！　咕嚕嗯！）" 

# 【真闇】
# display as 真闇
# JP: 「はっ――んっ――おまん、こ――ひあっ――あっ、\nなか――これ――えぐれ、てっ――ぜんぶ――んっ」
2216 = "「哈――嗯――小穴――咿啊――啊、裡面――被挖開了――全都――嗯」" 

# monologue
# JP: （じゅっ！　ばぢゅっ！　ごりゅっ！　じゅぼっ！）
4027 = "（啾！　啵啾！　咕嚕！　啾啵！）" 

# 【真闇】
# display as 真闇
# JP: 「熱かと――っ――すごい、のっ――ふあ、あっ――\nあっ――おちん、ちん――おなか――ぜんぶうっ！」
2694 = "「熱量――哇――嗚啊、啊――啊――雞雞――肚子裡――全部！」" 

# monologue
# JP: （ずばっ！　じゅばっ！　ぶちゅっ！　ごしゅっ！）
4010 = "（呲啪！　啾叭！　噗啾！　咕咻！）" 

# 【真闇】
# display as 真闇
# JP: 「ふあっ！　あっ！　あっ！　あっ！　\nあっ！　あっ！　んんっ！　あああっ！！」
2312 = "「嗚啊！　啊！　啊！　啊！啊！　啊！　嗯嗯！　啊啊啊！！」" 

# monologue
# JP: 真闇姉の息が切れ切れになる。\nきゅんきゅんしてる。膣内が。
3727 = "真闇姐的氣息都變得斷斷續續。小穴裡吱吱作響。" 

# monologue
# JP: （ずぶっ！　じゅばっ！　じゅぼっ！　じゅちゅっ！）
4011 = "（呲噗！　啾叭！　啾啵！　啾啾！）" 

# monologue
# JP: 肉厚の襞が指となり、\nぽてぽてぎゅうぎゅう僕の勃起を乳搾りする。
3150 = "厚實的褶皺彷彿手指按壓著我的肉棒，想要榨出我的精液。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、双ちゃん！　おね、おねっちゃん！\nもうっ――ふ、あっ！　あっ！　もうっ、ねっ！？」
2493 = "「小雙、小雙！　姐、姐姐！已經――呼、啊！　啊！　不行了！」" 

# monologue
# JP: 精液が、内から勃起を膨らませてる。\n密着感が凄すぎて、勃起と膣との境界線が判らない。
3788 = "精液將我的肉棒撐得碩大。肉棒把小穴塞得水洩不通，我快分辨不出它們的邊界了。" 

# monologue
# JP: （ずりゅっ――ぬぐっ――こしゅんっ――ぐいっ！)
4012 = "（呲溜――呶噗――揉嗯――鑽！)" 

# 【真闇】
# display as 真闇
# JP: 「あああっ！　そこっ――ゆっくり、いけん、のっ！\nいま、いまっ、おまんこ――いっぱい、やけんっ！」
2274 = "「啊啊啊！　那裡――慢慢地，嗯！快、快，射滿我的――小穴！」" 

# monologue
# JP: （きゅうううううんんっ！！）
4042 = "（壓嗯！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！？」
2245 = "「唔啊！？」" 

# 【真闇】
# display as 真闇
# JP: 「来てっ！　双ちゃんんっ！　おね、ちゃんっ、\nもう―イク――イっちゃう――けんっ――ふあっ！！」
2472 = "「射吧！　小雙！　姐姐，要高潮――高潮了――嗯――嗚啊！！」" 

# monologue
# JP: （ばじゅ！　ぐりゅっっ！　ごちゅっ！　じゅぬ！）
4008 = "（叭啾！　頂！　咕啾！　啾咻！）" 

# 【真闇】
# display as 真闇
# JP: 「ひあっ！？　イクって――ゆってる――のにっ、\nんっ！　ぐりりゅって、そこ、も、子宮、も、ふあっ」
2204 = "「咿啊！？　姐姐――要高潮――了啊，嗯！　轉、那裡、也、子宮、也、嗚啊」" 

# monologue
# JP: 僕じゃない。真闇姉の腰が回ってる。\n貪欲に快感を貪って、僕の勃起と呼応している。
3441 = "我沒在動，是真闇姐的腰在轉。她貪圖著快感，與我的勃起一應一合。" 

# 【双鉄】
# display as 雙鐵
# JP: 「く――ううっ！」
2305 = "「嗚――嗚嗚！」" 

# monologue
# JP: もう止まらない。体液全部が精子になってる。\n限界だ――ならば――ただただ、一番奥の深くへと！
3371 = "感覺已經無法停止了，體液彷彿已經全部化成了精液。到極限了――那就――一鼓作氣往最深的地方插！" 

# monologue
# JP: （ずにゅうううううっっ――――）
# 4015 = "（呲溜――）" 

# 【真闇】
# display as 真闇
# JP: 「はぁっ！　はあっ！　はあっ！　ひあっ！！？」
2225 = "「哈！　蛤啊！　蛤啊！　咿啊！！？」" 

# monologue
# JP: （ぐうううっ！　ごちゅうううううううううっん！！）
4019 = "（咕！　咕啾！！）" 

# 【真闇】
# display as 真闇
# JP: 「あっ！　んくゅうぅぅぅぅぅぅぅぅぅぅんっ！！！」
2278 = "「啊！　嗯、咕溜、嗯！！！」" 

# monologue
# JP: （きゅううううううううっ！）
4043 = "（壓！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2244 = "「唔啊！」" 

# monologue
# JP: （びゅっ！　ぶびゅっ！　びゅるっ！　びゅううっ！）
4038 = "（噗！　噗噗！　噗嚕！　噗！）" 

# monologue
# JP: 一度目より濃い。粘ってる。\nその感触が尿道口をドロリと抜けて、脳を焼く。
3541 = "比第一次還要濃厚、還要黏稠。這種感覺穿過尿道口，大腦都要燒掉了。" 

# 【真闇】
# display as 真闇
# JP: 「ふあっ！　あっ――ああああああっ！　んうううっ」
2311 = "「嗚啊！　啊――啊啊啊啊啊啊！　嗯嗚」" 

# monologue
# JP: （びゅるっ！　びゅっ！　びゅぶっ！　びゅくっ！）
4034 = "（噗嚕！　噗！　咻噗！　噗嚕！）" 

# monologue
# JP: 真闇姉の奥に当たってる。\n子宮をどんどん、僕の精子が埋めている。
3950 = "頂到了真闇姐的最裡面。子宮被我的精子瘋狂填塞。" 

# 【真闇】
# display as 真闇
# JP: 「あ――精子――精子――きてる――あついのっ――\n双ちゃん、双ちゃんの、精子、たくさんっ」
2258 = "「啊――精子――精子――來了――熱熱的――小雙、小雙地、精子、好多」" 

# monologue
# JP: （びゅうっ！　びゅっ！　ぶびゅっ！　びゅるるっ！）
4041 = "（噗！　噗！　噗噗！　噗嚕！）" 

# 【真闇】
# display as 真闇
# JP: 「直接、子宮、に――精液、どんど、んっ、赤ちゃん、\n赤ちゃん――うちの――卵子、に、精液、きて、るっ」
2878 = "「都射進子宮裡――精液、好多、嗯、小寶寶、小寶寶――和咱的――卵子、融合，精液、進來、了」" 

# monologue
# JP: 卵子。精液。\nその声に、精液が勢いを取り戻す。
3145 = "卵子、精液。她的這一聲讓我的精液又恢復了澎湃的活力。" 

# monologue
# JP: （びゅるっ！　びゅううっ！　びゅっ――びゅるっ）
4035 = "（噗嚕！　噗！　噗――噗嚕）" 

# 【真闇】
# display as 真闇
# JP: 「ふああああああああんんんっっっっ」
2310 = "「嗚啊啊啊啊啊啊嗯嗯嗯」" 

# monologue
# JP: 大きく、震え。\nくたりと、真闇姉の体から力が抜ける。
3957 = "顫抖得好厲害。真闇姐終於渾身都沒了力氣。" 

# monologue
# JP: 僕も、全てを射精しきった。\n鼓動と、体温。いまはそれしか感じない。
3398 = "我也射完了全部的精液。心跳、體溫，我現在能感受到的只有這些。" 

# 【真闇】
# display as 真闇
# JP: 「ふあっ――あっ――あっ――\n双ちゃん……双ちゃぁん」
2306 = "「嗚啊――啊――啊――小雙……小雙」" 

# monologue
# JP: 求められるまま体をずらし、キスをする。
3406 = "我們互相依偎，扭了扭身子接了個吻。" 

# 【真闇】
# display as 真闇
# JP: 「んっ――ちゅっ――チュむっ――ちゅうっ――んっ\nれるっ――ちゅうっ――ちゅぱっ――ちゅ、むっ――」
2316 = "「嗯――啾――啾――啾――嗯舔――啾――啾啪――啾、唔――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉」
# 2736 = "「真闇姐」" 

# monologue
# JP: キスを解いて。ようやく。気づく。\n気づけぬほどに、僕も、真闇姉も熱くなってた。
3191 = "嘴唇相離，我才終於發現。我和真闇姐都渾身發熱，熱到自己都快注意不到了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ガラス窓だ。危なかったな」
1586 = "「……窗戶是玻璃的，多危險啊」" 

# 【真闇】
# display as 真闇
# JP: 「え！？　あ、まっこと！　やだっ！\nこぎゃんと、誰かに見られとったら」
2240 = "「哎！？　啊，是啊！　天啊！要是給人看到剛才的事的話……」" 

# monologue
# JP: ガラス破損の危険を僕は思っていたが――\nなるほど確かに。その意味でも危険はあったか。
3118 = "其實我擔心的是玻璃碎了啊――不過那種情況也是種危險啦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰もこれんさ。その点は安心してかまわない」
2047 = "「不會有人來的，你放心吧」" 

# 【真闇】
# display as 真闇
# JP: 「理屈の上ではわかっとおけど――」
2842 = "「道理我懂啦，只是――」" 

# monologue
# JP: ぷくっと、真闇姉の頬がふくれる。\nそれが、嬉しい。愛らしい。
3736 = "真闇姐的臉嘟了起來。這副樣子讓我非常喜愛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕とて、こんなに綺麗な真闇姉を、\n他の誰にも見せたくはない。独り占めしたい」
2545 = "「我也不想讓任何人看到這麼漂亮的真闇姐，我想獨占你呢」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
# 2491 = "「小雙……」" 

# monologue
# JP: 素直になれてる。\n性の興奮が去った今でも。
3462 = "我誠實地說。即便性高潮已經過去了。" 

# monologue
# JP: だから、自然と声がでる。
3879 = "誠實也成了我最自然的表現。" 

# 【双鉄】
# display as 雙鐵
# JP: 「最高の補習授業だった。ありがとう」
2838 = "「這是我上過最棒的補習，謝謝」" 

# 【真闇】
# display as 真闇
# JP: 「ふえっ！？　え？　あの――えと――\nえっちなおねえちゃん先生で、なんか、ごめんねぇ」
2238 = "「哎！？　哎？　這個――那個――姐姐這個當老師的好色啊，好對不起你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　大歓迎だったさ。\n本当に、その意味でも最高の授業だった」
2667 = "「沒事啊，我很享受的。其實拿性愛來說，也是最棒的一課啦」" 

# monologue
# JP: が――しかし。\nこれは……ヤる。
3090 = "但是――。有件事……還是得做的。" 

# monologue
# JP: 大の大人が、もう一度の学園生活を楽しんだなら、\nかならず、セックスに繋がるだろう。
3216 = "大人要再體驗一次上學的話，最後一定會落腳在性愛上吧。" 

# 【真闇】
# display as 真闇
# JP: 「いっそ、貸し切りにしたほうがよかとかねぇ？\n高級リゾート的な感じで、一日一組限定で」
2783 = "「要不要辦成完全獨享的那種？就像那種超高級度假勝地，一天僅限一組客人的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　富裕層を狙うというのは思いつかなかった。\nそれだな、うん。趣味的な面でもマッチしそうだ」
2301 = "「喔！　我沒想過以有錢人為目標。我想想，嗯，應該挺符合他們的興趣的」" 

# monologue
# JP: レトロ、骨董――\nそうした趣味を持つ層は、経済的にも余裕があろう。
3387 = "懷舊、古董――有著這種興趣的客戶層，手頭肯定都很闊綽。" 

# monologue
# JP: 一日一組の貸し切りならば、\n治安や教育的見地の問題も、自動で最小に制限できる。
3061 = "一日僅限一組包場的話，也可以將治安、教育影響的問題控制在最小程度。" 

# 【真闇】
# display as 真闇
# JP: 「よね。いわゆる、客層。\nそこを絞れば、治安低下とかにもつながらんだろうし」
2382 = "「嗯，就是說瞄準客戶層吧。只盯准這些客戶，也不會有治安底下的問題了」" 

# monologue
# JP: 同じことを考えていた嬉しさと、\nそこから導く真闇姉の解の、鮮やかさ。
3365 = "想著同一件事是多麼快樂，真闇姐對此給出的她的解釋是多麼新鮮。" 

# monologue
# JP: セックスに疲れていた心身に、\n爽やかな風が吹くようだ。
3883 = "讓疲於性愛的心靈和身體都拂過一陣舒爽的新風。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう。交通困難区域であるのが幸いするぞ。\n陸の孤島の廃炭鉱。一日まるごと一組限定貸し切りだ」
2500 = "「就這麼辦，地處偏僻地帶倒是個幸運呢。一個陸地上的孤島，廢煤礦，一日一組包場呢」" 

# 【真闇】
# display as 真闇
# JP: 「炭鉱町全部を！？　あ……あははっ！\nやっぱり双ちゃん、考えよることがでっかかねぇ！」
2143 = "「包整個廢礦鎮嗎！？　啊……啊哈哈！小雙做計劃還真龐大啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、考えたのは真闇姉」
2836 = "「這主意是真闇姐想到的啊」" 

# 【真闇】
# display as 真闇
# JP: 「うちは、こん廃校舎を宿にして――\nって思うとっただけ」
2203 = "「咱只是想著把這座廢教學樓――辦成旅館而已呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
# 2627 = "「是嗎」" 

# monologue
# JP: 理解できれば、嬉しさが増す。\n僕らは、本当に呼応するのだ。
3518 = "有了理解，喜悅也會增加。我們真的是夫唱婦隨啊。" 

# monologue
# JP: 弱いところも欲望も全部重なりあって――\nだからこそ、足りない部分を補いあえる。
3347 = "弱點、欲望，全部都是一樣的――所以我們也能相互彌補對方的不足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、帰ろう。真闇姉。\n帰って一緒に、レビューを作ろう」
2551 = "「我們回去吧，真闇姐。回去一起寫評估」" 

# 【真闇】
# display as 真闇
# JP: 「そーね、双ちゃん」
2446 = "「好啊，小雙」" 

# monologue
# JP: 手をつなぐ。\nふたり同時に、差し出し合って。
3408 = "我們牽起手來。還是同時伸出的手。" 

# monologue
# JP: 踏み出す一歩も、おんなじだ。\n並んで――どちらもリードをせずに。
3887 = "走出的一步也是同樣的步幅。我們肩並肩，沒有一個人搶在前面。" 

# 【真闇】
# display as 真闇
# JP: 「かえろ、おうちに」
2552 = "「我們回家吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 

# monologue
# JP: そうして僕は、真闇姉と初めて過ごす放課後を、\n手を取り合って――終わらせる。
3517 = "於是我和真闇姐的第一次一同放學，我們手牽手的放學路上，畫上了圓滿的句號。" 
