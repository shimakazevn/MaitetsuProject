[script]
# lines: 761 
# 【真闇】
# display as 真闇
# JP: 「へぇーえ、ポーちゃんが」
2425 = "「Hêê, Pau-chan sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2345 = "「Ừm.」"
# monologue
# JP: お盆におせんべいとお茶を乗せ、\n真闇姉が腰を下ろす。
3201 = "Đặt khay bánh gạo và trà xuống, chị Mayami ngồi xuống."
# monologue
# JP: 僕の隣に、\n恋人同士の寄り添う距離で。
3235 = "Ngay bên cạnh tôi, ở một khoảng cách kề vai sát cánh của những người đang yêu."
# 【真闇】
# display as 真闇
# JP: 「[じゅつせん,1]術仙廃炭鉱の文化・観光遺産としての再活用」
2778 = "「Tái sử dụng mỏ than Jutsusen bỏ hoang làm di sản văn hóa và du lịch à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲も賛同してくれている話らしい。\n頭取――宝生元忠も巻き込めそうだと」
2469 = "「Nghe nói Houshou Kisaki cũng tán thành chuyện này. Có vẻ như sẽ lôi kéo được cả Giám đốc――Houshou Mototada vào nữa.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、あの[もとただ,1]元忠さんが」
2233 = "「Trời ạ, ông Mototada đó sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「千内のエアクラ工場も順調に建設されていると聞く。\n誘致云々の対立は、もはや過去の話だ」
2766 = "「Nghe nói nhà máy Aircra ở Sendai cũng đang được xây dựng thuận lợi. Những mâu thuẫn về việc thu hút đầu tư giờ đã là chuyện quá khứ rồi.」"
# 【真闇】
# display as 真闇
# JP: 「そーね」
2616 = "「Đúng vậy ha.」"
# monologue
# JP: ほうっと、嬉しげな息を吐き、\n真闇姉はゆるゆるお茶を飲む。
3283 = "Chị Mayami thở ra một hơi đầy vui vẻ, rồi từ từ nhấp một ngụm trà."
# 【真闇】
# display as 真闇
# JP: 「前より、ずーっと良か形に落ち着いてくれたけん」
2757 = "「Mọi chuyện đã đi vào quỹ đạo tốt hơn trước rất nhiều rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ずっと良くなった。\n[うち,5]右田一酒蔵元だけを見てもそうだが――」
2624 = "「Đúng vậy. Tốt hơn rất nhiều. Chỉ nhìn vào xưởng rượu Migita Ichi nhà mình thôi cũng thấy vậy rồi――」"
# monologue
# JP: 計ったように、蔵から声が響いてくる。\nF・スコッティ。詠国産まれのレイルロオドだ。
3529 = "Như đã hẹn trước, từ trong xưởng rượu vang lên một giọng nói. F. Scotty. Một Railord sinh ra ở Anh quốc."
# monologue
# JP: 醸造管理の方針で、今日も今日とてハチロクと、\n仲良くけんかしているらしい。
3223 = "Có vẻ như hôm nay cô ấy lại đang cãi nhau thân thiện với Hachiroku về phương châm quản lý quá trình ủ rượu."
# 【双鉄】
# display as 雙鐵
# JP: 「――御一夜全体の活気も増し、観光客も増えている。\nこの流れを、より活性化させたいという計画だろうな」
1543 = "「――Sức sống của toàn bộ Ohimitera cũng tăng lên, lượng khách du lịch cũng tăng theo. Chắc hẳn đây là kế hoạch nhằm thúc đẩy luồng sinh khí này thêm phần sôi động.」"
# 【真闇】
# display as 真闇
# JP: 「発想の流れはわかるばってん、術仙廃炭鉱は……\n万が一の事故でもあったら、良か流れも水の泡とよ？」
2539 = "「Ý tưởng thì chị hiểu, nhưng mà mỏ than Jutsusen bỏ hoang thì...... Ngộ nhỡ có tai nạn gì xảy ra, luồng sinh khí tốt đẹp này cũng đổ sông đổ bể hết đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その点、ポーレットと宝生稀咲だ。考慮している」
2684 = "「Về điểm đó thì, có Paulette và Houshou Kisaki mà. Họ đã cân nhắc kỹ rồi.」"
# monologue
# JP: 真闇姉になら、読んでもらった方が早いし、確実だ。\n資料を渡せば真闇姉は、いったん座卓においてから、
3112 = "Nếu là chị Mayami, để chị ấy đọc sẽ nhanh và chắc chắn hơn. Khi tôi đưa tài liệu, chị Mayami đặt tạm lên bàn trà, rồi,"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん？　はい、あーん」
2497 = "「Sou-chan? Nào, a nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　むぐっ」
2419 = "「Hửm? Mugu.」"
# monologue
# JP: あーんにつられて口をあければ、\n何かがそっと押し当てられる。
3422 = "Bị tiếng 'a' dụ dỗ mà há miệng ra, chị ấy liền nhét nhẹ một thứ gì đó vào miệng tôi."
# monologue
# JP: 途端、ひろがる醤油味。\nああ……これは上等のおせんべいだ。
3940 = "Ngay lập tức, vị nước tương lan tỏa. À......đây là loại bánh gạo thượng hạng."
# 【真闇】
# display as 真闇
# JP: 「ふむふむ……\nああ……なるほどねぇ」
2356 = "「Hừm hừm...... À......Ra là vậy.」"
# monologue
# JP: 真闇姉はもう、資料を読み進めに入ってる。
3697 = "Chị Mayami đã bắt đầu đọc tài liệu."
# monologue
# JP: ここは静かに邪魔せぬことが\n結局は、ふたりの時間の節約になる。
3574 = "Lúc này giữ im lặng, không làm phiền chị ấy, rốt cuộc lại là cách tiết kiệm thời gian cho cả hai."
# 【双鉄】
# display as 雙鐵
# JP: 「ひははひはふ」
2199 = "「Hihahihafu.」"
# 【真闇】
# display as 真闇
# JP: 「はぁい、めしあがれ。\nあ、遠慮ばせんで、音、立ててよかよ」
2107 = "「Được rồi, ăn đi. À, không cần ngại đâu, cứ nhai thành tiếng cũng được.」"
# monologue
# JP: まさに遠慮をしようとしていた。
3439 = "Tôi đang định giữ ý tứ."
# monologue
# JP: 細やかな目配りに驚かされつつ、\nならばとバリボリいかせてもらう。
3361 = "Vừa ngạc nhiên trước sự tinh tế của chị, tôi vừa nhai rồm rộp không khách sáo nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「（ごくっ）」
2897 = "「(Ực)」"
# 【真闇】
# display as 真闇
# JP: 「……候補地は、専門家が安全性を保証したとこだけ。\nで、そこをどぎゃん活用するかの、視察とレビュー」
1567 = "「......Địa điểm đề xuất chỉ là những nơi đã được chuyên gia đảm bảo an toàn. Vậy nên, việc đi khảo sát và đánh giá xem sẽ tận dụng nơi đó như thế nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、そうなのだ」
2390 = "「Ừm, là vậy đó.」"
# monologue
# JP: 嚥下を待っての問いかけだから、\n僕もすらすら答えられる。
3267 = "Vì chị đợi tôi nuốt xong mới hỏi, nên tôi cũng có thể trả lời trôi chảy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、廃校舎をレビューしてほしいと頼まれている」
2852 = "「Tôi cũng được nhờ đánh giá khu trường học bỏ hoang.」"
# 【真闇】
# display as 真闇
# JP: 「廃校舎……ああ、あの規模の町ならもちろん、\n学園もあったとよねえ」
2513 = "「Trường học bỏ hoang......À, với quy mô thị trấn như vậy thì dĩ nhiên là phải có trường học rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、術仙学園という名であったらしい。\nそこを、『もしよかったら見てきてほしい』と」
2342 = "「Ừm, hình như tên là trường Jutsusen. Họ bảo 'Nếu được thì mong cậu đến xem thử'.」"
# 【真闇】
# display as 真闇
# JP: 「もしよかったら――なら、業務じゃなかと？」
2166 = "「Nếu được thì――vậy, không phải là công việc sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、業務外だ。本格調査前の下見的なものだろう。\nもし行くのであれば、途中でおろしてくれるとも」
2366 = "「Ừ, ngoài công việc. Chắc kiểu như đi tiền trạm trước khi khảo sát chính thức. Họ bảo nếu đi thì sẽ cho tôi xuống giữa chừng.」"
# 【真闇】
# display as 真闇
# JP: 「ふむふむ」
2627 = "「Hừm hừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市と御一夜鉄道とのさらなる発展に繋がる\n可能性のあることだからな。無論、快諾した」
2524 = "「Bởi vì chuyện này có khả năng dẫn đến sự phát triển xa hơn nữa của thành phố Ohimitera và Đường sắt Ohito mà. Tất nhiên là tôi đã vui vẻ nhận lời.」"
# 【真闇】
# display as 真闇
# JP: 「さらなる発展……\n学園の、廃校舎」
2841 = "「Sự phát triển xa hơn nữa...... Khu trường học bỏ hoang.」"
# monologue
# JP: 真闇姉が小首をかしげ、人差し指を唇にあてる。
3708 = "Chị Mayami hơi nghiêng đầu, đặt ngón trỏ lên môi."
# monologue
# JP: 考え込む――その何気ない仕草からさえ、\n花の香のような色香がこぼれる。
3109 = "Đang chìm trong suy nghĩ――nhưng ngay cả cử chỉ vô tình đó, cũng toát lên vẻ quyến rũ như hương hoa."
# 【真闇】
# display as 真闇
# JP: 「古か学園……需要、ある程度は見込めるかもねぇ。\n映画やドラマの撮影にとか、宿泊施設にするとか」
2761 = "「Trường học cũ à......Có lẽ cũng có thể kỳ vọng vào một mức độ nhu cầu nhất định đấy. Ví dụ như làm bối cảnh quay phim, phim truyền hình, hay làm cơ sở lưu trú chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。やはり真闇姉に話してよかった。\n僕には全く、そうしたイメージがわかなかった」
2408 = "「Ra là vậy. Quả nhiên nói chuyện với chị Mayami là đúng đắn. Tôi hoàn toàn không thể tưởng tượng ra những thứ như vậy.」"
# 【真闇】
# display as 真闇
# JP: 「全く？」
2459 = "「Hoàn toàn không á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆえに、視察・レビューと言われても、\nどうしていいものか、いささか途方にくれていた」
2614 = "「Ừm. Do đó, dù có bị bảo đi khảo sát hay đánh giá, tôi cũng hơi lúng túng không biết phải làm sao.」"
# 【真闇】
# display as 真闇
# JP: 「やったら、その――」
2869 = "「Vậy thì, chuyện đó――」"
# monologue
# JP: 真闇姉が、軽く姿勢を整え直す。\nそわっ、と音が聞こえてきそうな、少女じみた仕草。
3749 = "Chị Mayami nhẹ nhàng sửa lại tư thế. Một cử chỉ hệt như thiếu nữ, đến mức dường như có thể nghe thấy cả tiếng xào xạc háo hức."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、真闇姉に頼みたいと思っている。\n良ければ、僕と一緒に廃校舎の視察をしてほしい」
2586 = "「Thế nên, tôi muốn nhờ chị Mayami. Nếu được, mong chị hãy cùng tôi đi khảo sát khu trường học bỏ hoang đó.」"
# 【真闇】
# display as 真闇
# JP: 「もちろんよかとよ。\n他ならぬそーちゃんの頼みやけん」
2709 = "「Tất nhiên là được rồi. Là lời nhờ vả của Sou-chan cơ mà.」"
# monologue
# JP: 即答だ。いつもながらの包みこみような笑顔を浮かべ。\n――けれども頬は、僅かな薔薇色を覗かせている。
3263 = "Trả lời ngay lập tức. Cùng với nụ cười bao dung như mọi khi. ――Nhưng đôi gò má lại thoáng ửng lên sắc hồng."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい」
2802 = "「Cảm ơn chị.」"
# 【真闇】
# display as 真闇
# JP: 「あさっての午後でどう？　十四時以降とか」
2520 = "「Chiều ngày mốt thì sao? Khoảng sau 14 giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、その時間ならば問題ない」
2392 = "「Ừm, giờ đó thì không vấn đề gì.」"
# 【真闇】
# display as 真闇
# JP: 「着替えの時間はあると？」
2635 = "「Có thời gian thay đồ không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん。せっかくの真闇姉とのデートなのだし、\n煤を落として、きちんと身だしなみを整え直すさ」
2396 = "「Tất nhiên rồi. Hiếm lắm mới có dịp hẹn hò với chị Mayami mà, phải rửa sạch bồ hóng, chỉnh đốn lại diện mạo đàng hoàng chứ.」"
# 【真闇】
# display as 真闇
# JP: 「うふふ、デート。あ、ほんなら」
2195 = "「Ufufu, hẹn hò. A, nếu vậy thì.」"
# monologue
# JP: ぽおんと両手があわせられる。\n穏やかな目が、いたずらっぽくわずかに細まる。
3284 = "Chị chắp hai tay lại với nhau đánh bộp một cái. Đôi mắt hiền hòa hơi nheo lại một cách đầy tinh nghịch."
# 【真闇】
# display as 真闇
# JP: 「ね？　双ちゃん。\n学園生っぽい服、用意できると？」
2498 = "「Nè? Sou-chan. Em có chuẩn bị được bộ quần áo nào giống học sinh không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　……白ワイシャツに黒いスラックス――\nといった程度で問題なければ」
2416 = "「Hửm? ......Áo sơ mi trắng với quần âu đen―― Cỡ đó thì không vấn đề gì.」"
# 【真闇】
# display as 真闇
# JP: 「うん。そいで十分。せっかくやけん、\nおねーちゃん、双ちゃんに教えてあげたかけん」
2404 = "「Ừm. Vậy là đủ rồi. Nhân dịp này, người chị này sẽ dạy cho Sou-chan vài điều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「教える？　とは――」
2605 = "「Dạy á? Là sao――」"
# 【真闇】
# display as 真闇
# JP: 「『イメージがまったくわかん』のは、\n学園時代の思い出が無いから――と、違う？」
2100 = "「Cái chuyện 'Hoàn toàn không thể tưởng tượng ra' ấy, là do em không có kỷ niệm gì về thời đi học――đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そういわれれば、その通りかと思う」
2410 = "「Ra là vậy. Nghe chị nói thế, tôi nghĩ cũng đúng.」"
# monologue
# JP: 学園時代も、帝都に引っ越し帝大に進学してのちも、\n指示されたことをただこなしていただけだった。
3299 = "Dù là thời còn đi học, hay sau khi chuyển đến Đế Đô học Đại học Hoàng gia, tôi cũng chỉ biết làm theo những gì được bảo."
# monologue
# JP: 自分から望んで、こころを、体を動かさなければ、\n思い出は残らぬものだと――今ならわかる。
3293 = "Nếu không tự mình mong muốn, không để tâm trí và cơ thể cùng vận động, thì sẽ chẳng đọng lại được kỷ niệm nào cả――Bây giờ thì tôi đã hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ、こなすべきことはこなしてきたゆえ、\n今の僕がある訳だから、それはそれでよいかとも思う」
2085 = "「Nhưng mà, nhờ hoàn thành những việc cần làm, mới có tôi của ngày hôm nay, nên tôi nghĩ như vậy cũng tốt.」"
# 【真闇】
# display as 真闇
# JP: 「まっことね。双ちゃんが学園時代を楽しんどったら、\nおねーちゃん、今こうして双ちゃんの側におれんし」
2379 = "「Đúng vậy nhỉ. Nếu Sou-chan mà tận hưởng thời học sinh, thì người chị này đã chẳng thể ở bên cạnh Sou-chan như bây giờ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そんなことは無いだろう」
2053 = "「Không, làm gì có chuyện đó.」"
# 【真闇】
# display as 真闇
# JP: 「ざーんねん。あります。そぎゃんこつ」
2172 = "「Rất tiếc. Là có đó. Có chuyện đó đó.」"
# monologue
# JP: ふざけた口調。\nが、何故だろう。どこか悲しげに聞こえてしまう。
3271 = "Giọng điệu đùa cợt. Nhưng, tại sao nhỉ. Nghe lại có vẻ buồn bã đến lạ."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、普通に男の子しとったらモテモテやけん。\nおねーちゃんのことなんて、絶対に相手になんて」
2494 = "「Sou-chan, nếu là một chàng trai bình thường thì chắc chắn sẽ đào hoa lắm. Làm gì đến lượt người chị này, chắc chắn là không thèm ngó ngàng tới đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「していた――いや、そうできていたかはわからんが。\n恋人にしたいと望んで、努力したことは確実だろう」
2563 = "「Sẽ ngó ngàng tới chứ――không, tôi không biết mình có làm được vậy không. Nhưng chắc chắn tôi sẽ nỗ lực vì mong muốn được làm người yêu của chị.」"
# 【真闇】
# display as 真闇
# JP: 「ええ！！？　そぎゃんリップサービス。\nうれしかけど。うれしかけど、その……」
2236 = "「Hả!!? Lời nói chót lưỡi đầu môi đó. Chị vui lắm. Vui thì vui thật, nhưng mà......」"
# monologue
# JP: ごにょごにょと、語尾が珍しく濁ってしまう。\nそこでようやく、思い当たる。
3947 = "Lúng búng, đuôi câu mờ đi một cách hiếm thấy. Đến lúc đó, tôi mới sực nhận ra."
# monologue
# JP: 恋愛経験がなかったことを、\n真闇姉は、意外と気にしているのかもしれん。
3550 = "Việc chưa từng có kinh nghiệm yêu đương, có lẽ chị Mayami lại bận tâm hơn tôi nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「リップサービスなどではないさ。\n単なる事実からの推測だ」
2044 = "「Không phải chót lưỡi đầu môi đâu. Chỉ là suy luận từ thực tế thôi.」"
# monologue
# JP: そうであるなら、気持ちを全部言葉に直そう。
3471 = "Nếu đã vậy, hãy chuyển hết những cảm xúc này thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「――生きていながら、死んでいた。\n義務としてしか、生きてなかった、あの頃ですら」
1539 = "「――Sống, mà như đã chết. Ngay cả cái thời chỉ sống như một nghĩa vụ ấy.」"
# 【真闇】
# display as 真闇
# JP: 「…………うん」
1552 = "「............Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、無意識に意識していた。真闇姉だけは。\nだから、甘えてはいかんと思い、背伸びをしていた」
2548 = "「Tôi đã luôn để tâm một cách vô thức. Chỉ duy nhất chị Mayami. Thế nên, tôi mới nghĩ mình không được phép làm nũng, và luôn cố gồng mình lên.」"
# monologue
# JP: 自覚はなかった。\n恋して初めて、そうだったのだと理解した。
3390 = "Tôi không hề tự nhận thức được điều đó. Chỉ khi yêu, tôi mới hiểu ra mọi chuyện là như vậy."
# monologue
# JP: 心を閉ざしていてもなお――真闇姉だけは特別だった。
3303 = "Dù đã khép chặt trái tim――chỉ riêng chị Mayami là ngoại lệ."
# 【双鉄】
# display as 雙鐵
# JP: 「だから仮に僕が、平常の学園生活を送れていたら、\nまっさきに真闇姉に恋をして、焦がれていたさ」
2585 = "「Vì vậy, giả sử tôi có một cuộc sống học đường bình thường, thì người đầu tiên tôi đem lòng yêu và nhung nhớ, chắc chắn là chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
2491 = "「Sou-chan......」"
# monologue
# JP: 真闇姉の瞳が揺れている。
3731 = "Đôi mắt chị Mayami khẽ rung động."
# monologue
# JP: たくさんの言葉と沈黙。不安と安心。\nきっと全てを、瞳の中に閉じ込めている。
3257 = "Rất nhiều ngôn từ và cả sự im lặng. Nỗi bất an và sự an lòng. Chắc hẳn tất cả đều được gói gọn trong ánh mắt ấy."
# monologue
# JP: （ちゅっ）
4028 = "（Chụt）"
# 【真闇】
# display as 真闇
# JP: 「あ――」
2247 = "「A――」"
# monologue
# JP: だからキスする。目蓋に、目尻に。
3475 = "Vì thế, tôi đặt nụ hôn. Lên mí mắt, lên khóe mắt chị."
# monologue
# JP: 少し待ち。真闇姉が目を開けるのを見て、\n舌先を軽く尖らせる。
3781 = "Đợi một chút. Thấy chị Mayami mở mắt, tôi hơi thè đầu lưỡi ra."
# 【真闇】
# display as 真闇
# JP: 「ん……よかよ？」
2338 = "「Ưm......được đó?」"
# monologue
# JP: 真闇姉は瞳を閉じない。\nそのまま涙を――見えない涙を拭い取る。
3709 = "Chị Mayami không nhắm mắt lại. Cứ thế lau đi những giọt nước mắt――những giọt nước mắt vô hình."
# monologue
# JP: 真闇姉が流さず我慢してきた涙を、\n眼球を舐め、ゆっくり、ゆっくり舐め取っていく。
3924 = "Những giọt nước mắt mà chị Mayami đã cố kìm nén không rơi, tôi liếm lên nhãn cầu, từ từ, từ từ liếm sạch chúng."
# 【真闇】
# display as 真闇
# JP: 「ん……ふっ――」
2324 = "「Ưm......phư――」"
# 【双鉄】
# display as 雙鐵
# JP: 「……。大好きだ。真闇姉」
1578 = "「....... Rất yêu chị. Chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「うちも、好いとお。\n双ちゃんのこと――こん[くら]蔵よりも、誰よりも」
2201 = "「Chị cũng, rất thích. Sou-chan――hơn cả xưởng rượu này, hơn bất kỳ ai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2345 = "「嗯」" 
# monologue
# JP: その告白を、おおげさなものとは思わない。
3395 = "Lời tỏ tình ấy, tôi không nghĩ là nói quá."
# monologue
# JP: 真闇姉がそう選択して――僕を選んでくれたから、\n僕らは、こうして寄り添いあえているのだから。
3527 = "Bởi vì chị Mayami đã lựa chọn như vậy――đã chọn tôi, nên chúng tôi mới có thể ở bên nhau như thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そう考えれば惜しくなる。\n真闇姉との学園生活。確かに、堪能してみたかった」
2080 = "「Nhưng mà......nghĩ lại thì thấy tiếc thật. Cuộc sống học đường với chị Mayami. Quả thực, tôi rất muốn được tận hưởng nó.」"
# 【真闇】
# display as 真闇
# JP: 「やけん。してみよ？\n視察しながら、レビューのために」
2859 = "「Nên là. Thử xem sao nhé? Vừa khảo sát, vừa để đánh giá luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ごっこ遊びを――いや、おままごと……\nでもないな」
2861 = "「Ra vậy. Chơi trò đóng vai――không, trò gia đình...... cũng không phải nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「ロールプレイ」
2793 = "「Roleplay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　その言葉だな。ロールプレイ」
2360 = "「A! Là từ đó nhỉ. Roleplay.」"
# monologue
# JP: 示された状況下で、与えられた役割を演じることで、\n当該状況への対処方法などを学習する。
3202 = "Bằng cách đóng vai được giao trong một tình huống cụ thể, để học cách xử lý tình huống đó."
# monologue
# JP: そうした手段のことではあるが、\nレジャーにも、なるほど、活用できそうだ。
3311 = "Dù là một phương pháp học tập, nhưng đúng là có vẻ cũng áp dụng được cho giải trí."
# 【双鉄】
# display as 雙鐵
# JP: 「実際の廃校舎を使っての、学園生活ロールプレイ。\n確かに、ニーズがあるかもしれん」
2705 = "「Sử dụng khu trường học bỏ hoang thực sự để roleplay cuộc sống học đường. Quả thật, có thể sẽ có nhu cầu.」"
# monologue
# JP: 思えば、発想は連鎖する。
3363 = "Nghĩ lại thì, các ý tưởng cứ thế nối tiếp nhau."
# monologue
# JP: 僕も確かに経験している――\nしかし、何の思い出も残っていない、学園イベント。
3400 = "Tôi chắc chắn cũng đã từng trải qua―― nhưng lại chẳng đọng lại chút ký ức nào về các sự kiện ở trường."
# 【双鉄】
# display as 雙鐵
# JP: 「文化祭やら、体育祭やら……例えば、御一夜鉄道の\nメンツでそれを行えるのなら、楽しそうだ」
2608 = "「Nào là lễ hội văn hóa, đại hội thể thao......Ví dụ như, nếu có thể tổ chức cùng những thành viên của Đường sắt Ohito, thì chắc sẽ vui lắm.」"
# 【真闇】
# display as 真闇
# JP: 「よかね、まっこと。そいば、実際に出来そうか。\nまずは、おねえちゃんと試してみよ？」
2720 = "「Tuyệt quá ha, thật sự đấy. Nếu vậy, có vẻ như có thể làm được thật. Trước mắt, cứ thử với chị xem sao nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2345 = "「嗯」" 
# monologue
# JP: なにゆえ僕に、と正直戸惑った依頼だったが、\nやる気が一気に高まってくる。
3154 = "Thành thật mà nói, lúc đầu tôi còn bối rối không hiểu sao họ lại nhờ mình, nhưng giờ thì động lực đã tăng lên vùn vụt."
# 【双鉄】
# display as 雙鐵
# JP: 「さっそく、ポーレットに返事をしてこよう。\n乗務の前にも、打ち合わせなどできるかもしれん」
2819 = "「Tôi sẽ trả lời Paulette ngay đây. Có khi còn có thể họp bàn trước khi lên tàu nữa.」"
# 【真闇】
# display as 真闇
# JP: 「あ！　双ちゃん」
2280 = "「A! Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2422 = "「Hửm?」"
# monologue
# JP: 大きな声に振り返りみれば、\n真闇姉は、どこかスネたような顔をしている。
3813 = "Quay lại vì tiếng gọi lớn, tôi thấy chị Mayami đang làm vẻ mặt có chút hờn dỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「なにか……あったか？」
2532 = "「Có chuyện......gì sao?」"
# 【真闇】
# display as 真闇
# JP: 「なにも無かとよ？\n何も無かけん――無かけん……ね？　その……」
2672 = "「Đâu có gì đâu? Không có gì mà――không có gì đâu......nè? Chuyện đó......」"
# monologue
# JP: 真闇姉はよほど落ち着かないのか、\nしきりに瞬きを繰り返す。
3690 = "Có vẻ chị Mayami đang rất bồn chồn, chị chớp mắt liên tục."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？――目にゴミでも入ったのか？」
2413 = "「Hửm?――Bụi bay vào mắt à?」"
# 【真闇】
# display as 真闇
# JP: 「入って無かとよ？　双ちゃんが、たーっぷり\n濡らしてくれたけん。……うちん、目だけを」
2671 = "「Đâu có đâu? Sou-chan đã làm ướt sũng đôi mắt của chị rồi mà. ......Chỉ có, đôi mắt thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2300 = "「A.」"
# monologue
# JP: 確かに、目だけで済ませてしまっていた。
3453 = "Quả thực, tôi mới chỉ hôn lên mắt thôi."
# monologue
# JP: 真闇姉ほど魅力的な女性を――\nまして恋人を目の前にして、これほどの失礼も無い。
3588 = "Đứng trước một người phụ nữ quyến rũ như chị Mayami―― huống hồ lại là người yêu, thì không còn sự thất lễ nào lớn hơn thế."
# 【双鉄】
# display as 雙鐵
# JP: 「忘れ物に、気づかせてもらえて助かった」
2805 = "「May mà chị nhắc tôi nhớ ra món đồ bỏ quên đấy.」"
# monologue
# JP: （ちゅっ）
# 4028 = "（啾）" 
# 【真闇】
# display as 真闇
# JP: 「んふふ――おかえし。（ちゅっ！）」
2352 = "「Ufufu――trả lại nè. (Chụt!)」"
# monologue
# JP: かわいい。かわいい。\nおかえしの、おかえしをせずにはいられない。
3597 = "Dễ thương quá. Đáng yêu quá. Không thể không đáp lại cái đáp lại này được."
# 【双鉄】
# display as 雙鐵
# JP: 「……真闇姉」
1585 = "「......Chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「んっ！？　あ……んっ――ふっ――んっ、ちゅっ――」
2364 = "「Ưm!? A......ưm――phư――ưm, chụt――」"
# monologue
# JP: 抱き締める。\n豊かな胸が、僕の胸板で形を変える。
3513 = "Tôi ôm chặt lấy chị. Bầu ngực căng đầy biến dạng khi ép sát vào vòm ngực tôi."
# monologue
# JP: 真闇姉の匂いが立ち上る。\n成熟しきった、けれども青い、女の匂い。
3726 = "Mùi hương của chị Mayami bốc lên. Mùi hương của một người phụ nữ trưởng thành, nhưng vẫn còn đôi chút thanh xuân."
# 【真闇】
# display as 真闇
# JP: 「んっ！？　ふっ――あむっ――れろっ――ちゅるっ、\nちゅっ――れるっ――じゅむっ――ちゅ、ちゅううっ」
2363 = "「Ưm!? Phư――amu――rột――chụt, chụt――rột――jumu――chu, chuuu.」"
# monologue
# JP: それに煽られ、唇を割り舌を絡める。\n温度が、密度が高まっていく。
3196 = "Bị kích thích bởi điều đó, tôi hé môi và đan lưỡi vào nhau. Nhiệt độ và cường độ ngày càng tăng cao."
# 【真闇】
# display as 真闇
# JP: 「ん……は、ぁ……いけん、よ？　双ちゃん。ね？\nあっ！？　ちゅっ――ちゅむっ――ちゅう……れるっ」
2330 = "「Ưm......ha, a......không được, đâu? Sou-chan. Nè? A!? Chụt――chumu――chu......rột.」"
# monologue
# JP: 焦らすように唇を離されて、\nだからすぐさま、また追い求める。
3261 = "Bị dứt môi ra như thể đang trêu ngươi, thế nên tôi lập tức đuổi theo."
# 【真闇】
# display as 真闇
# JP: 「んふっ――んっ――はぁっ――ん――ちゅうっ――\nれるっ、れろおっ――ちゅ、ちゅむ――（かりっ！）」
2348 = "「Ưm phư――ưm――haa――ưm――chu―― rột, rero――chu, chumu――(Cắn!)」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2891 = "「!!?」"
# monologue
# JP: 夢中になって這い回っていた舌先を、\nほんの僅かに噛まれてようやく――正気に返る。
3525 = "Đầu lưỡi đang say sưa trườn đi, bị cắn nhẹ một cái, cuối cùng tôi cũng――tỉnh táo lại."
# monologue
# JP: 濃密すぎるおんなの――いいや、雌の匂いに煽られて、\n僕も完全に一匹の、単なる雄になっていた。
3461 = "Bị kích động bởi mùi hương phụ nữ――không, là mùi hương của con cái quá đỗi nồng nàn, tôi cũng hoàn toàn biến thành một con đực thuần túy."
# 【真闇】
# display as 真闇
# JP: 「ごめんね？　双ちゃん。\nけど、まだ昼間で――居間やけん」
2595 = "「Xin lỗi nhé? Sou-chan. Nhưng mà, vẫn đang là ban ngày――lại còn ở phòng khách nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。僕こそ悪かった。\n軽いキスで、鮮やかに立ち去るつもりだったのだが」
2063 = "「À, không. Là lỗi của tôi. Đáng lẽ tôi chỉ định hôn nhẹ một cái rồi rời đi thật ngầu cơ.」"
# 【真闇】
# display as 真闇
# JP: 「ゆーても、うちから誘っておいて……ねぇ」
2051 = "「Nói thế chứ, là do chị chủ động quyến rũ em trước mà......nhỉ.」"
# monologue
# JP: （つうううっ）
4016 = "（Trượt）"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 2345 = "「嗯」" 
# monologue
# JP: 触れられ、初めて自覚する。\n気づかぬままに、全身全霊で勃起していた。
3247 = "Bị chạm vào, tôi mới lần đầu nhận ra. Trong lúc không hay biết, tôi đã cương cứng hết mức có thể."
# 【真闇】
# display as 真闇
# JP: 「……こぎゃんと張り詰めて、苦しくなかと？\nその――少しだけ、おねえちゃんのお部屋ばいって」
1580 = "「......Căng cứng thế này, không khó chịu sao? Hai đứa mình――vào phòng chị một lát đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいのはやまやまだが――\nそうしてしまえば、僕は間違いなく遅刻する」
2571 = "「Tôi cũng muốn lắm chứ―― Nhưng nếu làm vậy, chắc chắn tôi sẽ bị muộn mất.」"
# 【真闇】
# display as 真闇
# JP: 「あー」
# 2247 = "「啊――」" 
# monologue
# JP: 納得される。\n所定の出勤時刻まで、ゆうに一時間はあるというのに。
3241 = "Chị ấy gật đầu đồng ý. Mặc dù vẫn còn dư dả một tiếng đồng hồ nữa mới đến giờ đi làm."
# monologue
# JP: いささか恥ずかしい気もするが、\nその恥ずかしささえも、どこか嬉しい。
3596 = "Tuy có chút xấu hổ, nhưng ngay cả sự xấu hổ đó cũng khiến tôi cảm thấy vui vui."
# 【双鉄】
# display as 雙鐵
# JP: 「乗務に穴はあけられんし――久々のデート前だ。\nせっかくだから、溜めておきたいような気もする」
2060 = "「Không thể để lỡ chuyến trực được――hơn nữa sắp đến buổi hẹn hò sau bao lâu chờ đợi rồi. Nhân cơ hội này, tôi cũng muốn để dành thêm một chút.」"
# 【真闇】
# display as 真闇
# JP: 「た、溜める！！？\nって、そのっ――」
2108 = "「Đ-Để dành!!? Là, cái đó――」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくはご想像どおりのものを、だ。\nあさっての、視察・デート後に迎える夜まで」
2663 = "「Chắc là thứ giống như chị đang nghĩ đấy. Cho đến đêm ngày mốt, sau chuyến khảo sát kiêm hẹn hò.」"
# 【真闇】
# display as 真闇
# JP: 「ぁっ」
2265 = "「A.」"
# monologue
# JP: 戸惑ったように漏れ出た声は、\nけれども熱を帯びている。
3272 = "Tiếng thốt ra như có vẻ bối rối, nhưng lại mang theo sự nóng bỏng."
# monologue
# JP: 発情している。今の時点で。ふたりとも。\nゆえに、それをできるだけ熟成させたい。
3923 = "Đang phát tình. Ngay lúc này. Cả hai chúng tôi. Thế nên, tôi muốn ủ nó chín muồi hết mức có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、真闇姉。いってくる。\nあさってを楽しみに、がんばってくる」
2741 = "「Vậy thì, chị Mayami. Tôi đi đây. Tôi sẽ cố gắng làm việc và mong chờ đến ngày mốt.」"
# 【真闇】
# display as 真闇
# JP: 「うん。がんばって！　双ちゃん」
2372 = "「Ừm. Cố lên nha! Sou-chan.」"
# monologue
# JP: 玄関先まで見送って、\nカチカチ、火打ち石を鳴らしてくれる。
3281 = "Tiễn tôi ra tận cửa, chị đánh đá lửa lách cách cầu may cho tôi."
# monologue
# JP: そんな仕草は、もう完全に普段通りの真闇姉だ。\nだからこそ。溜めたその先への期待も膨らむ。
3897 = "Cử chỉ đó, hoàn toàn là chị Mayami như thường ngày. Chính vì vậy. Sự mong đợi về những gì được tích tụ lại càng phình to hơn."
# 【真闇】
# display as 真闇
# JP: 「いってらっしゃい、気をつけて」
2825 = "「Đi đường cẩn thận nha.」"
# 【真闇】
# display as 真闇
# JP: 「んー！」
2320 = "「Ưm!」"
# monologue
# JP: 臨時停車のキハ07sを見送り、駅舎を出る。\n途端、真闇姉は大きく大きく伸びをする。
3917 = "Tiễn chiếc Kiha 07S dừng đỗ tạm thời đi, chúng tôi rời khỏi nhà ga. Ngay lúc đó, chị Mayami vươn vai thật dài."
# 【双鉄】
# display as 雙鐵
# JP: 「乗り疲れたか？」
2434 = "「Đi tàu mệt rồi à?」"
# 【真闇】
# display as 真闇
# JP: 「乗り疲れるほどの距離じゃなかとよ。\nばってん、んーーーー、んっ！」
2840 = "「Khoảng cách này chưa đủ để mệt đâu. Nhưng mà, ưmmmm, ưm!」"
# monologue
# JP: 心地よさげに、もう一度、伸び。
3225 = "Chị vươn vai thêm một lần nữa, trông có vẻ rất dễ chịu."
# monologue
# JP: そのまま大きく両手を広げ、\nこどものように、ぐるり、大きくあたりを見渡す。
3285 = "Cứ thế dang rộng hai tay, chị đảo mắt nhìn quanh một vòng hệt như một đứa trẻ."
# 【真闇】
# display as 真闇
# JP: 「何年ぶりかなー。\n前来たときと、ぜぇんぜん景色が違うて見ゆるー」
2875 = "「Mấy năm rồi nhỉ. So với lần trước đến đây, cảnh sắc trông khác hẳn luôn á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「長くても数年だろうに……\nそれほどに荒廃のペースが速いのか？」
2518 = "「Dù lâu thì cũng chỉ vài năm thôi mà...... Tốc độ hoang tàn nhanh đến thế sao?」"
# 【真闇】
# display as 真闇
# JP: 「ううん、双ちゃん。\n違うとるんは、景色じゃなくて、見え方」
2046 = "「Không phải đâu, Sou-chan. Thứ khác đi không phải là cảnh sắc, mà là cách nhìn cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2422 = "「嗯？」" 
# 【真闇】
# display as 真闇
# JP: 「双ちゃんといっしょやけんね。\n全部、綺麗に。少ぉしずつ増して、綺麗に見ゆると」
2698 = "「Vì có Sou-chan đi cùng mà. Tất cả đều đẹp đẽ. Cứ mỗi lúc lại thấy đẹp hơn một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2889 = "「!」"
# monologue
# JP: これは――これは――これはいかん。\n照れくさい、などという言葉では到底足りん。
3922 = "Cái này――cái này――thế này thì không được rồi. Những từ như 'xấu hổ' hoàn toàn không đủ để diễn tả."
# monologue
# JP: 抑えようとしても顔がニヤける、\n頬が染まるのを自覚する。
3123 = "Dù cố kiềm chế nhưng mặt tôi vẫn cứ cười toe toét, tôi tự nhận thức được hai má mình đang ửng đỏ."
# 【真闇】
# display as 真闇
# JP: 「いこ？　双ちゃん、廃校舎まで。\n時間はまだまだたっぷりあるけん、ゆうるりと」
2817 = "「Đi thôi? Sou-chan, đến khu trường học bỏ hoang. Thời gian vẫn còn dư dả lắm, cứ thong thả thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
2286 = "「Ừ, ừm.」"
# monologue
# JP: 差し伸べられた手を受け取る。\n熱い。真闇姉のてのひらも、いつもより。
3433 = "Tôi đón lấy bàn tay đang chìa ra. Nóng quá. Lòng bàn tay chị Mayami cũng nóng hơn mọi khi."
# monologue
# JP: それが嬉しくて、ほっとして、\nようやく自分のリズムに戻れる。
3426 = "Điều đó khiến tôi vui sướng, nhẹ nhõm, và cuối cùng cũng lấy lại được nhịp độ của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、廃宿舎の方から抜けていこう。\nあそこも、一部の安全性は確認されてるそうだしな」
2521 = "「Vậy thì, chúng ta đi xuyên qua khu ký túc xá bỏ hoang nhé. Nghe nói một phần khu vực đó cũng đã được xác nhận là an toàn rồi.」"
# 【真闇】
# display as 真闇
# JP: 「よかよ」
2442 = "「Được đó.」"
# monologue
# JP: 手を繋いだまま、歩き出す。
3491 = "Vẫn nắm chặt tay nhau, chúng tôi bắt đầu rảo bước."
# monologue
# JP: 歩幅を合わせる必要がない。\n自分のペースで歩けばそれは、真闇姉のペースだ。
3580 = "Không cần phải điều chỉnh bước chân. Chỉ cần bước theo nhịp độ của mình, thì đó cũng chính là nhịp độ của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「ああ……」
2270 = "「A a......」"
# monologue
# JP: 懐かしげな声。\nそういえば真闇姉は、確か……
3289 = "Giọng nói đầy hoài niệm. Nhắc mới nhớ, hình như chị Mayami......"
# 【双鉄】
# display as 雙鐵
# JP: 「以前に来たのは、学園の、\n遠足かなにかでという話だったか？」
2575 = "「Lần trước chị đến đây, là đi dã ngoại của trường hay gì đó phải không?」"
# 【真闇】
# display as 真闇
# JP: 「うん。そ。少等部でも仲等部でも。\n広等部でも、一回ずつ」
2381 = "「Ừm. Đúng rồi. Ở Sơ đẳng bộ hay Trung đẳng bộ. Cả Cao đẳng bộ nữa, mỗi nơi một lần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「計三回も来ているのか。\nそれぞれ、見どころが違うとか？」
2105 = "「Tổng cộng đến tận ba lần cơ à. Mỗi lần có điểm tham quan khác nhau sao?」"
# 【真闇】
# display as 真闇
# JP: 「んー？　見どころ？」
2420 = "「Hửm? Điểm tham quan á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――つまり、少等部のときは廃宿舎を見て、\n仲等部では坑道を見る、など」
2318 = "「À――ý tôi là, ví dụ như lúc ở Sơ đẳng bộ thì xem khu ký túc xá bỏ hoang, đến Trung đẳng bộ thì xem hầm mỏ chẳng hạn.」"
# 【真闇】
# display as 真闇
# JP: 「んーん。そぎゃん工夫はさっぱりなかとよ？\n第一、安全性の確認だって――」
2242 = "「Không đâu. Hoàn toàn không có chuyện bày vẽ như vậy đâu. Thứ nhất, việc xác nhận an toàn cũng――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。この話が出て、それから初めて\n調査したとのことだものな。む？　ならば――」
2064 = "「À, ra vậy. Từ khi có đề xuất này, người ta mới bắt đầu đi khảo sát mà nhỉ. Hửm? Vậy thì――」"
# 【真闇】
# display as 真闇
# JP: 「山とかに行く遠足と同じよ？\nたーだ歩いて、おべんとさん食べて、帰るだけ」
2822 = "「Cũng giống như đi dã ngoại trên núi thôi mà? Chỉ đi bộ, ăn bento, rồi về thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2243 = "「Hừm.」"
# monologue
# JP: 何をしたのだ？　と聞くより早くの答えにけれど、\nしばし、言葉をなくしてしまう。
3470 = "Chưa kịp hỏi 'Vậy mọi người đã làm gì?', tôi đã có câu trả lời, nhưng nó khiến tôi cạn lời trong chốc lát."
# 【双鉄】
# display as 雙鐵
# JP: 「なんというか……\nそれは――時間がもったいないような気がするな」
2534 = "「Nói sao nhỉ...... Như thế――có vẻ hơi lãng phí thời gian thì phải.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんこつなかとよ？\n楽しかけんねー」
2856 = "「Đâu có chuyện đó? Vui lắm đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しい？」
2638 = "「Vui á?」"
# monologue
# JP: 解せん。
3392 = "Khó hiểu thật."
# monologue
# JP: 建物や坑道内の見学もできず、ただ歩き回ることに、\n一体、どれほどの楽しみがあるというのか。
3933 = "Không được tham quan bên trong tòa nhà hay hầm mỏ, chỉ đi dạo vòng quanh, thì rốt cuộc có gì vui cơ chứ."
# 【真闇】
# display as 真闇
# JP: 「あー」
# 2265 = "「啊」" 
# monologue
# JP: 解せぬ気持ちが、どうやら顔に出たらしい。
3448 = "Có vẻ như sự khó hiểu đã hiện rõ trên mặt tôi."
# monologue
# JP: 真闇姉の目が、ふっと柔らかに――\nあるいは少し、さみしげになる。
3729 = "Ánh mắt chị Mayami bỗng trở nên dịu dàng―― hay nói đúng hơn là có chút đượm buồn."
# 【真闇】
# display as 真闇
# JP: 「やったら、ちょこっとだけでも遠足、してみよ？\nこれも、視察のひとつになるけん」
2867 = "「Nếu vậy, thử đi dã ngoại một chút xem sao nhé? Đây cũng là một phần của chuyến khảo sát mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「視察対象は、廃校舎内だが」
2091 = "「Đối tượng khảo sát là bên trong khu trường học bỏ hoang cơ mà.」"
# 【真闇】
# display as 真闇
# JP: 「移動経路もレビューばせんといけんでしょお。\nそれに、校舎の中だけが学園生活の舞台じゃなかとよ」
2758 = "「Cũng phải đánh giá cả tuyến đường di chuyển nữa chứ. Hơn nữa, sân khấu của cuộc sống học đường đâu chỉ nằm gọn bên trong trường học đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ロールプレイの話ともつながるか」
2405 = "「À, cũng liên quan đến chuyện roleplay nữa nhỉ.」"
# monologue
# JP: ――遠足のロールプレイと言われても、\nいまひとつ、なにをどうしていいのかわからない。
1530 = "――Dù nói là roleplay dã ngoại, tôi vẫn chưa hình dung ra mình phải làm gì và làm như thế nào."
# monologue
# JP: とはいえ、真闇姉の提案だ。\nわからぬことであるからこそ、まずは素直に従おう。
3094 = "Dù sao thì, đây cũng là đề xuất của chị Mayami. Chính vì không hiểu, nên trước mắt cứ ngoan ngoãn nghe theo vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「では、遠足だ。\n真闇姉、一緒に頼む」
2798 = "「Vậy thì, dã ngoại thôi. Chị Mayami, nhờ chị đi cùng nhé.」"
# 【真闇】
# display as 真闇
# JP: 「もちろん。ほーたら、ね？　歩こ？」
2707 = "「Tất nhiên rồi. Vậy thì, nha? Đi thôi nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2345 = "「嗯」" 
# monologue
# JP: 手をつないだまま、のんびり歩く。
3407 = "Vẫn nắm tay nhau, chúng tôi thong thả rảo bước."
# monologue
# JP: 廃宿舎まわりをただブラつけば、\n景色もゆるゆる、変化していく。
3199 = "Cứ đi dạo quanh khu ký túc xá bỏ hoang, cảnh sắc cũng chầm chậm thay đổi."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、あれ。\nあの深緑のカーテンのお部屋」
2496 = "「Sou-chan, nhìn kìa. Căn phòng có rèm cửa màu xanh lá đậm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、カーテンを残したままに引っ越したのか。\n捨てるのを面倒がったか、あるいは――」
2388 = "「À, họ chuyển đi mà vẫn để lại rèm cửa sao. Chắc là ngại vứt đi, hoặc là――」"
# 【真闇】
# display as 真闇
# JP: 「窓から、ちょこぉっと覗いて見んと？\n中には、一歩も入らんけん」
2785 = "「Có muốn thử ngó qua cửa sổ một chút không? Chúng ta sẽ không bước vào trong dù chỉ một bước đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わんが、ヘルメットだけは着用してくれ。\n外壁等の落下があるかもしれない」
2170 = "「Cũng được, nhưng nhớ đội mũ bảo hiểm vào. Biết đâu gạch ốp tường lại rơi xuống.」"
# 【真闇】
# display as 真闇
# JP: 「はぁい」
2449 = "「Vâng~」"
# monologue
# JP: 視察用にと持ってきていたヘルメットを渡す。
3432 = "Tôi đưa cho chị chiếc mũ bảo hiểm mang theo để dùng cho việc khảo sát."
# monologue
# JP: さすがは、真闇姉。\n言わずともあご紐までをしっかり締める。
3702 = "Quả không hổ danh là chị Mayami. Không cần nhắc cũng tự cài chặt quai hàm."
# 【真闇】
# display as 真闇
# JP: 「あら、双ちゃんおとこまえ」
2232 = "「Chà, Sou-chan bảnh trai quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだかんだでかぶるものだからなぁ。\n鉄道会社の現職ならば。と、……いうか」
2706 = "「Dù sao thì cũng phải đội suốt mà. Đã làm trong công ty đường sắt thì. Cơ mà......」"
# 【真闇】
# display as 真闇
# JP: 「うん？」
# 2422 = "「嗯？」" 
# monologue
# JP: 美人は得だと、つくづく思う。\nヘルメットなど、被ったこともほぼなかろうに――
3943 = "Người đẹp đúng là có lợi thế thật. Chắc chị ấy hầu như chưa từng đội mũ bảo hiểm bao giờ――"
# 【双鉄】
# display as 雙鐵
# JP: 「とても良く似合っている。かぶりこなす？　\nというと妙だが……まるでベテランのようにみえるぞ」
2582 = "「Chị đội hợp lắm đấy. Đội sành điệu? Nói vậy thì hơi lạ......nhưng trông chị hệt như một chuyên gia thực thụ vậy.」"
# 【真闇】
# display as 真闇
# JP: 「ベテランって！\nそんなん、褒められとる感じせんけど」
2069 = "「Chuyên gia gì chứ! Chị chẳng thấy giống như đang được khen chút nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「手放しで褒めている。\n叶うのならば、モデルになって欲しいくらいだ」
2578 = "「Tôi đang khen hết lời luôn đó. Nếu được, tôi còn muốn nhờ chị làm người mẫu nữa cơ.」"
# 【真闇】
# display as 真闇
# JP: 「モデル」
2659 = "「Người mẫu á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。女子はどうにも、\nヘルメットの着用を渋る傾向にあってな」
2344 = "「Ừm. Con gái thường có xu hướng, không thích đội mũ bảo hiểm cho lắm.」"
# monologue
# JP: 慣れているはずのポーレットやハチロクでさえも、\n例外ではない。
3934 = "Ngay cả những người đáng lẽ đã quen như Paulette hay Hachiroku, cũng không phải là ngoại lệ."
# monologue
# JP: 着用時や外したときなど、目に見えて神経質になる。\n例外といえば――
3539 = "Mỗi khi đội vào hay cởi ra, họ đều lộ rõ vẻ khó chịu. Nếu nói đến ngoại lệ thì――"
# 【真闇】
# display as 真闇
# JP: 「あ……\n渋らんのは、なーちゃんとれーちゃんくらい？」
2264 = "「A...... Người không ngần ngại chắc chỉ có Na-chan với Re-chan thôi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かに凪やれいなはまったく嫌がらんが――\nなぜ、そんなことまでわかるのだ？」
2370 = "「Ừm. Quả thực Nagi và Reina hoàn toàn không ghét chuyện đó―― Nhưng sao chị lại biết được cả chuyện đó vậy?」"
# 【真闇】
# display as 真闇
# JP: 「ん……」
2321 = "「Ưm......」"
# monologue
# JP: 言葉を探しているのだろうか。
3239 = "Có lẽ chị đang tìm từ ngữ thích hợp chăng."
# monologue
# JP: 真闇姉はその長い指を唇にあて、\n少しの間、だまりこむ。
3691 = "Chị Mayami đặt những ngón tay thon dài lên môi, im lặng trong giây lát."
# 【真闇】
# display as 真闇
# JP: 「……ひーちゃんを見てたらわかるでしょお。\nポニーテールば、どれだけ時間かけて整えとるか」
1583 = "「......Nhìn Hii-chan là biết ngay mà. Con bé đã mất bao nhiêu thời gian để chải chuốt cho kiểu tóc đuôi ngựa đó chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ！　そういうことか。\n髪型を乱したくないのだな」
2314 = "「Ừm――A! Ra là vậy. Họ không muốn làm hỏng kiểu tóc của mình.」"
# 【真闇】
# display as 真闇
# JP: 「そ。女の子やけん、どぎゃんしてもねー」
2475 = "「Đúng rồi. Con gái mà, dù thế nào cũng sẽ để ý thôi.」"
# monologue
# JP: 納得だ。凪やれいなは性差だなんだを、\n恐らくは、ほとんど意識してないのだろうし。
3151 = "Ra là vậy. Nagi và Reina có lẽ, hầu như không để tâm đến những khác biệt giới tính đó."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、そうなると疑問だな。真闇姉は、\n僕が知る限りもっとも女性らしい女性であるのに」
2089 = "「Nhưng, thế thì lại có một thắc mắc. Chị Mayami, theo tôi biết là người phụ nữ nữ tính nhất mà tôi từng gặp, vậy mà.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃーんと？」
2886 = "「Thế á?」"
# monologue
# JP: 余裕のフリで、髪を手で払い、照れ隠し。\nそんなところにも、どうしようもなく女性を感じる。
3246 = "Tỏ vẻ thong dong, chị đưa tay vuốt tóc để che giấu sự bối rối. Ngay cả những hành động như vậy, cũng khiến tôi cảm nhận được nét nữ tính không thể chối từ."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そぎゃんとだ。で、あるのにもかかわらず、\nなぜ、何の躊躇もなくヘルメットを――」
2412 = "「Đúng vậy, là thế đó. Vậy mà, tại sao chị lại không hề do dự khi đội mũ bảo hiểm――」"
# 【真闇】
# display as 真闇
# JP: 「そんなんは、『知っとるから』」
2431 = "「Cái đó là vì, 'Chị biết rõ' mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知っとる、とは何をだ？」
2541 = "「Biết rõ, là biết cái gì?」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんのこと」
2561 = "「Về Sou-chan đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕を？」
2580 = "「Tôi á?」"
# 【真闇】
# display as 真闇
# JP: 「そ。双ちゃんなら、ウチがどれほどぺしゃんこな\n髪型になったとしても、少しも変わらんいうことを」
2620 = "「Ừ. Nếu là Sou-chan, thì dù tóc chị có xẹp lép đến mức nào, thái độ của em đối với chị cũng sẽ không hề thay đổi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2268 = "「A――」"
# monologue
# JP: じんわり、嬉しい。\n愛されてる、信頼されてると実感できる。
3188 = "Niềm vui, khẽ lan tỏa. Tôi thực sự cảm nhận được mình đang được yêu thương, được tin tưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえて光栄だ。\n本当に、とても」
2806 = "「Thật vinh hạnh khi được nghe chị nói vậy. Thật sự, rất vinh hạnh.」"
# monologue
# JP: どれほどの無様を晒しても、\n為さねば為らぬことは、ある。
3122 = "Cho dù có phơi bày bộ dạng thảm hại đến đâu, cũng có những việc bắt buộc phải làm."
# monologue
# JP: 真闇姉はそれを知っている。\n真闇姉ほどではなかろうが、僕も多少は、知っている。
3747 = "Chị Mayami biết điều đó. Tuy không bằng chị, nhưng tôi ít nhiều cũng hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「……髪型ひとつ、姿ひとつに、影響されんさ。\nこれほど僕は、真闇姉に惹かれているのだから」
1592 = "「......Một kiểu tóc, hay một dáng vẻ, chẳng ảnh hưởng gì đâu. Bởi vì tôi đã bị chị Mayami thu hút đến nhường này cơ mà.」"
# 【真闇】
# display as 真闇
# JP: 「……双ちゃん」
1574 = "「......Sou-chan.」"
# monologue
# JP: 安心しきって無様を晒せる。\n安心しきって無様を晒して、相手が、そばにいる。
3167 = "Hoàn toàn an tâm để phơi bày sự thảm hại của mình. Có một người ở bên cạnh để ta có thể hoàn toàn an tâm phơi bày sự thảm hại đó."
# monologue
# JP: それがどれほどの幸せか――\n今の僕になら、しみじみわかる。
3928 = "Điều đó hạnh phúc đến nhường nào―― Với tôi của hiện tại, đã thấu hiểu sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「うん、真闇姉」
2397 = "「Ừm, chị Mayami.」"
# monologue
# JP: 惹かれあってる。どうしようもなく。\nだから、自然と唇が――
3416 = "Chúng tôi đang thu hút lẫn nhau. Một cách không thể cưỡng lại. Thế nên, đôi môi tự nhiên xích lại――"
# monologue
# JP: （こつん）
4052 = "（Cộc）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2345 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「ありゃ」
2228 = "「Ây da.」"
# monologue
# JP: 触れ合うより先、\nヘルメット同士があたってしまう。
3163 = "Chỉ tiếc là trước khi chạm vào nhau, hai chiếc mũ bảo hiểm đã đụng nhau mất rồi."
# 【真闇】
# display as 真闇
# JP: 「先、こされちゃったねぇ。\nうふふ、お熱いお熱い」
2665 = "「Bị hớt tay trên mất rồi nhỉ. Ưfufu, nồng nhiệt quá đi thôi.」"
# monologue
# JP: 軽やかに身を翻し、\n真闇姉は、また僕の手を引き、先程の窓へ歩み寄る。
3279 = "Chị Mayami nhẹ nhàng xoay người, lại kéo tay tôi, bước tới bên cửa sổ ban nãy."
# 【真闇】
# display as 真闇
# JP: 「あーー」
# 2247 = "「啊――」" 
# 【双鉄】
# display as 雙鐵
# JP: 「暮らしを、そのまま置いていったのか」
2702 = "「Đồ đạc sinh hoạt cứ thế để lại luôn sao.」"
# 【真闇】
# display as 真闇
# JP: 「戻ってくる――つもりだったんかねぇ」
2771 = "「Chắc là――họ từng định sẽ quay lại nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2173 = "「Có lẽ vậy.」"
# monologue
# JP: カーテンの質などわからんが、\n古びてもなお、重厚さとしなやかさを感じさせる。
3394 = "Dù không rõ chất liệu rèm cửa, nhưng dẫu đã cũ kỹ, nó vẫn mang lại cảm giác dày dặn và mềm mại."
# 【双鉄】
# display as 雙鐵
# JP: 「テーブルに、タンスに、テレビまで。\nどれもこれも、大荷物といえば大荷物だが」
2637 = "「Từ bàn, tủ, cho đến cả tivi. Cái nào cái nấy đều là đồ đạc cồng kềnh cả.」"
# 【真闇】
# display as 真闇
# JP: 「テレビ。昔は今よりずーっと高級品やもんね。\n置いていくには、もったいなかとよね」
2077 = "「Tivi à. Ngày xưa nó là món đồ xa xỉ hơn bây giờ nhiều. Bỏ lại thì phí quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのだろうな」
# 2616 = "「是啊」" 
# 【真闇】
# display as 真闇
# JP: 「双ちゃんは……\nちっちゃかころ、どぎゃんテレビ番組見とったと？」
2492 = "「Sou-chan...... Hồi nhỏ em hay xem chương trình tivi gì thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「小さいころに、か」
2489 = "「Hồi nhỏ sao.」"
# monologue
# JP: 言われて、瞬間、体が震える。\n思い出が、あまりに鮮明に蘇ってきて。
3903 = "Nghe hỏi vậy, trong thoáng chốc, cơ thể tôi khẽ run lên. Ký ức ùa về quá đỗi sống động."
# 【双鉄】
# display as 雙鐵
# JP: 「見ていたな。確かに。夢中だった。\n路子と、テレビのチャンネルを奪い合っていた」
2569 = "「Có xem. Chắc chắn rồi. Say mê là đằng khác. Tôi từng tranh giành kênh tivi với Michiko.」"
# 【真闇】
# display as 真闇
# JP: 「あら、ふたごちゃんでも、そぎゃんこつあると？」
2824 = "「Ô, sinh đôi mà cũng có chuyện như vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるある。ああ、一卵性のふたごは違うのかも\nしれんが――僕らは、男女の双子だったからな」
2710 = "「Có chứ. À, sinh đôi cùng trứng thì có thể khác―― nhưng chúng tôi là sinh đôi một nam một nữ mà.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、興味はわかれたさ。日曜などは\n特撮からの女の子むけの流れで平和だったのだが」
2775 = "「Quả nhiên sở thích cũng khác nhau. Vào Chủ nhật thì chiếu phim siêu nhân rồi đến phim cho bé gái nên rất hòa bình.」"
# 【真闇】
# display as 真闇
# JP: 「平日はいけんかったと？」
2093 = "「Thế ngày thường thì không được à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「帝営放送の五分アニメを路子が見たがるのだ。\nが、僕はロボットアニメなどを最後までみたい」
2826 = "「Michiko muốn xem hoạt hình năm phút của Đài truyền hình Đế quốc. Nhưng tôi lại muốn xem hoạt hình robot cho đến tận cuối.」"
# 【真闇】
# display as 真闇
# JP: 「あ！　あるある短いの。そっか、あれって――\n他の見てたら、ちょうどクライマックスのときとか？」
2284 = "「A! Có mấy phim ngắn như thế. Ra vậy, cái đó―― nếu đang xem phim khác thì lại đúng lúc cao trào sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は最後までみたいのだが、路子は最初から見たい。\nその上、僕にはそこまで見ていた弱みもあったから」
2572 = "「Tôi muốn xem đến cuối, nhưng Michiko lại muốn xem từ đầu. Hơn nữa, tôi cũng yếu thế vì đã được xem nãy giờ rồi.」"
# 【真闇】
# display as 真闇
# JP: 「『おにーちゃんなんだから』」
1549 = "「『Vì anh là anh trai cơ mà.』」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさにだ」
2439 = "「Chính xác là vậy.」"
# monologue
# JP: 大きく頷き、その瞬間にそうかと思う。
3472 = "Tôi gật đầu mạnh, và ngay khoảnh khắc đó bỗng chợt nhận ra."
# monologue
# JP: 真闇姉も、おねーちゃんで。\nその上、真闇姉ほどに優秀ならば……
3688 = "Chị Mayami cũng là một người chị. Hơn nữa, nếu xuất sắc như chị Mayami thì......"
# 【双鉄】
# display as 雙鐵
# JP: 「……大変だよな。きょうだいの、上というのは」
1568 = "「......Làm anh chị lớn trong nhà, vất vả thật đấy.」"
# 【真闇】
# display as 真闇
# JP: 「まっことねぇ」
# 2616 = "「是啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「大変だった。\n妹なんていらないと、何度も何度も思ったが――」
2453 = "「Vất vả lắm chứ. Đã bao lần tôi nghĩ giá như không có em gái thì tốt biết mấy――」"
# monologue
# JP: ふいに、泣きそうになってしまう。
3088 = "Đột nhiên, tôi chực trào nước mắt."
# monologue
# JP: “楽しかった”“しあわせだった”と、\n密度の凄い塊が、胸の奥からこみあげてきて。
1536 = "Những cảm xúc mãnh liệt như “thật vui vẻ”, “thật hạnh phúc” tuôn trào từ tận sâu trong lồng ngực."
# 【真闇】
# display as 真闇
# JP: 「よかよ？」
2668 = "「Không sao đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……何がだ？」
1576 = "「......Sao cơ?」"
# monologue
# JP: わかってくれて、許されている。\n泣いてもいいと誘ってくれて――だから、とぼける。
3242 = "Chị ấy thấu hiểu và bao dung cho tôi. Chị bảo tôi cứ khóc cũng không sao――thế nên, tôi mới giả vờ ngơ ngác."
# monologue
# JP: 見栄を張ることも、ある種甘えのうちなのだろうが、\n真闇姉の前ではやはり、僕は背伸びをしていたい。
3291 = "Có lẽ sĩ diện cũng là một kiểu làm nũng, nhưng trước mặt chị Mayami, tôi vẫn muốn tỏ ra chín chắn hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の弟とはいえ、僕は日々姫の兄でもあるのだ。\n上の兄弟の大変さを、振り返るにはまだまだ早いさ」
2567 = "「Dù là em trai của chị Mayami, nhưng tôi cũng là anh trai của Hibiki. Vẫn còn quá sớm để nhìn lại nỗi vất vả của người làm anh chị lớn.」"
# 【真闇】
# display as 真闇
# JP: 「あー。\nうん！　そぎゃんとね」
2246 = "「Aー. Ừm! Là vậy đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「話しこんでしまったな。そろそろ行こう」
2765 = "「Mải nói chuyện quá. Chuẩn bị đi thôi.」"
# 【真闇】
# display as 真闇
# JP: 「はぁい」
2441 = "「Vâng ạ.」"
# monologue
# JP: 手を引き、歩く。\n今度は僕がリードして。
3409 = "Nắm tay và bước đi. Lần này tôi là người dẫn đường."
# monologue
# JP: 言葉が、歩みに連れてでてくる。\nなにか、つかえが取れたみたいに。
3889 = "Lời nói cứ thế tuôn ra theo từng bước chân. Giống như có thứ gì đó nghẹn lại vừa được gỡ bỏ."
# 【真闇】
# display as 真闇
# JP: 「へぇえ、双ちゃんにも好き嫌いあったと」
2146 = "「Hêê, Sou-chan cũng có đồ ăn ghét với thích cơ à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今はもうなくなったがな。\n昔は、ピーマンが大嫌いだった。苦いしな」
2697 = "「Bây giờ thì hết rồi. Ngày xưa, tôi cực kỳ ghét ớt chuông. Vì nó đắng.」"
# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ、おこさま」
2234 = "「Ây da, đúng là trẻ con.」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際におこさまだったからな。だが――不思議だ。\n我慢して食べていたら、旨く感じるようになっていた」
2639 = "「Vì thực sự lúc đó là trẻ con mà. Nhưng――kỳ lạ thật. Cố nhịn ăn thử thì lại thấy ngon.」"
# 【真闇】
# display as 真闇
# JP: 「それはほら。おねーちゃんの腕のおかげ？」
2429 = "「Đó là nhờ. Tay nghề của chị đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのだと思う。感謝している」
2542 = "「Tôi cũng nghĩ vậy. Cảm ơn chị nhiều.」"
# 【真闇】
# display as 真闇
# JP: 「そんな！　じょーだん！\nそぎゃん真正面から返されちゃったら、照れるけん」
2719 = "「Làm gì có! Đùa thôi mà! Em cứ đáp lại thẳng thừng thế, chị ngại chết mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし実際、右田の家に迎えてもらい、\nあの頃の僕ですら、水と料理との旨さには――おや」
2087 = "「Không, nhưng thực tế, khi được nhà Migita đón về, ngay cả tôi hồi đó cũng phải bất ngờ trước độ ngon của nước và đồ ăn――ô kìa.」"
# 【真闇】
# display as 真闇
# JP: 「ありゃりゃ、残念。」
2230 = "「Ây da, tiếc thật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
2313 = "「Ưm――」"
# monologue
# JP: 少し、驚く。\n宿舎群のはずれまで、全く時間を感じなかった。
3438 = "Tôi hơi ngạc nhiên. Đi đến tận rìa khu ký túc xá mà hoàn toàn không cảm nhận được thời gian trôi qua."
# 【真闇】
# display as 真闇
# JP: 「ここから、廃校舎まではもーすぐとよね？」
2839 = "「Từ đây đến dãy phòng học cũ sắp tới rồi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ものの五分もかかるまい」
2367 = "「Ừ. Chắc chưa tới năm phút đâu.」"
# 【真闇】
# display as 真闇
# JP: 「宿舎ば出て、五分で学校。この辺の子ば、\nちょこーっと、通学路、短すぎかなー」
2882 = "「Ra khỏi ký túc xá, năm phút là đến trường. Bọn trẻ quanh đây, đường đến trường có hơi quá ngắn không nhỉー.」"
# monologue
# JP: 解せぬ。とはもう思わない。
3419 = "Tôi không còn nghĩ là khó hiểu nữa."
# monologue
# JP: 通学途中のおしゃべりが、\nどれほど素敵なものであるかを、僕も体験できたから。
3068 = "Bởi vì tôi cũng đã được trải nghiệm những cuộc trò chuyện trên đường đến trường tuyệt vời đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「まったくだな」
2717 = "「Quả thật là vậy.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ！」
2229 = "「Ái chà!」"
# monologue
# JP: 言った途端に、笑ってくれる。\nまぶしいほどに明るい顔で。
3132 = "Vừa dứt lời, chị ấy liền mỉm cười. Bằng một gương mặt rạng rỡ đến chói lóa."
# 【真闇】
# display as 真闇
# JP: 「なら、わかったと？　坑道にも、建物内にも、\n例え、一歩も入れんでも――」
2854 = "「Vậy, em hiểu rồi chứ? Dù là hầm mỏ, hay bên trong tòa nhà, cho dù không thể bước vào dù chỉ một bước――」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。遠足は楽しいものだな。\nただ、歩き。そうしながら話すというだけで、十分に」
2565 = "「Tôi hiểu rồi. Dã ngoại thật sự rất vui. Chỉ cần đi bộ. Vừa đi vừa trò chuyện như vậy, cũng đã quá đủ rồi.」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ」
2194 = "「Ưfufu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当に――時間が飛ぶようにすぎていった。\nただ、真闇姉とすごし、話す。それだけのことで」
2631 = "「Thật sự――thời gian trôi qua như bay vậy. Chỉ cần ở bên chị Mayami và trò chuyện. Chỉ vậy thôi.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、嬉しか。\n双ちゃんと、学園生活ば共有できて」
2554 = "「Vậy thì, chị vui lắm. Được chia sẻ cuộc sống học đường cùng Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うむ」
2269 = "「A――ừm.」"
# monologue
# JP: そうか。\nまともな学園生活とはこういうものであったのか。
3927 = "Ra vậy. Cuộc sống học đường bình thường là như thế này sao."
# monologue
# JP: 目的などは関係なしに、恋人と、友人と――\nただただ同じ時間をすごして、語らって。
3074 = "Chẳng màng đến mục đích, cùng người yêu, cùng bạn bè―― chỉ đơn giản là trải qua khoảng thời gian bên nhau, cùng nhau trò chuyện."
# 【真闇】
# display as 真闇
# JP: 「そぎゃん顔せんと、双ちゃん」
2135 = "「Đừng làm vẻ mặt đó chứ, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 
# monologue
# JP: どぎゃん顔をいま、僕はしてしまっていたのだろう。
3412 = "Lúc nãy tôi đã làm ra vẻ mặt như thế nào vậy nhỉ."
# monologue
# JP: 真闇姉の声があんまり優しくて――\nかえって、不安になってしまう。
3734 = "Giọng nói của chị Mayami quá đỗi dịu dàng―― ngược lại, khiến tôi cảm thấy bất an."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんが望んでくれるなら。おねーちゃん。\n何度だって、双ちゃんの学園生活に付き合うけん」
2168 = "「Nếu Sou-chan muốn. Chị đây. Sẽ đồng hành cùng cuộc sống học đường của Sou-chan bao nhiêu lần cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがたい話だ」
2803 = "「Thật đáng quý.」"
# monologue
# JP: 即座に答えが喉からでてきて、ならば、と思う。
3457 = "Câu trả lời lập tức bật ra khỏi cổ họng, nếu vậy thì, tôi nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「案外、ニーズがあるのかもしれんな。\n『学園生活をもう一度やりなおせる』そんな空間は」
2573 = "「Không chừng lại có nhu cầu bất ngờ đấy. Một không gian có thể 『làm lại cuộc sống học đường một lần nữa』 như thế.」"
# 【真闇】
# display as 真闇
# JP: 「やったら……うん。\nうちらはそん目で、視察、がんばってみよ？」
2872 = "「Nếu vậy thì......ừm. Chúng ta hãy thử cố gắng khảo sát với góc nhìn đó xem sao nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2442 = "「好啊」" 
# 【真闇】
# display as 真闇
# JP: 「で……あのね？　おねーちゃん、\n着替えば、もってきとるとやけど――」
2844 = "「Và......này? Chị có mang theo đồ để thay đó――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、どうりで大荷物だと」
2304 = "「A, thảo nào hành lý lại cồng kềnh thế.」"
# 【真闇】
# display as 真闇
# JP: 「ありがとね。持ってくれて」
2804 = "「Cảm ơn em nhé. Đã xách giúp chị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「礼など、水臭い。恋人の手荷物くらい持たんで、\nなにが男かという話だ」
2136 = "「Khách sáo quá. Không xách nổi hành lý cho người yêu, thì còn mặt mũi nào làm đàn ông nữa.」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ」
# 2194 = "「呵呵」" 
# monologue
# JP: 真闇姉が、照れてくれる。はにかんでくれる。\nこころが、ふわりとあたたかくなる。
3755 = "Chị Mayami ngại ngùng. Chị ấy thẹn thùng. Trái tim tôi chợt ấm áp lạ thường."
# 【真闇】
# display as 真闇
# JP: 「で、今度は学園、校舎内でしょ？　視察方針も\nあるけん――できたら、着替えたいかなって」
2874 = "「Thế, lần này là trong trường, trong phòng học nhỉ? Cũng có phương hướng khảo sát rồi――nên nếu được, chị muốn thay đồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本格的にロールプレイをするのだな。了解だ。\n廃校舎は本館全ての、安全確認が取れているそうだ」
2723 = "「Hóa ra là nhập vai bài bản luôn à. Đã rõ. Nghe nói toàn bộ khu nhà chính của dãy phòng học cũ đã được xác nhận an toàn rồi.」"
# 【真闇】
# display as 真闇
# JP: 「あ、ほんなら」
2871 = "「A, nếu vậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「空き教室でも、更衣室でも好きに使ってくれ。\nああ、ヘルメットももう外しても大丈夫だ」
2103 = "「Cứ thoải mái dùng phòng học trống hay phòng thay đồ đi. À, cởi mũ bảo hiểm ra cũng không sao đâu.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 
# monologue
# JP: 頷いて、けれども真闇姉はまだ外さない。\nなるほど――これも乙女心か。
3757 = "Gật đầu, nhưng chị Mayami vẫn chưa cởi ra. Ra vậy――đây cũng là tâm tư thiếu nữ sao."
# monologue
# JP: 着替えるときに、あわせ髪型を直すつもりで……\nゆえ、僕の目の前では外さんのだろう。
3824 = "Chắc là định sửa lại kiểu tóc lúc thay đồ luôn...... nên mới không tháo ra trước mặt tôi đây mà."
# 【双鉄】
# display as 雙鐵
# JP: 「よければ、向かおう。が――古い建築物なのは\n確かだ。その点は失念せず、くれぐれも安全第一で」
2097 = "「Nếu được thì đi thôi. Nhưng――đây đúng là một công trình cũ. Đừng quên điều đó, và tuyệt đối phải đặt an toàn lên hàng đầu.」"
# 【真闇】
# display as 真闇
# JP: 「安全第一」
2458 = "「An toàn là trên hết.」"
# monologue
# JP: 真闇姉の指が、ちょん、ちょん、ちょん、と、\n頭上のヘルメットを指し示す。
3723 = "Ngón tay chị Mayami chọc chọc vào chiếc mũ bảo hiểm trên đầu."
# 【真闇】
# display as 真闇
# JP: 「安全が第一の使命。\n双ちゃんが、口癖みたいにいうとることよね」
2457 = "「An toàn là sứ mệnh hàng đầu. Câu cửa miệng của Sou-chan mà nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、まさしくだ。\n安全が第一の使命で、決して無理なく行動しよう」
2393 = "「Ừm, chính xác. An toàn là sứ mệnh hàng đầu, tuyệt đối không được hành động quá sức.」"
# 【真闇】
# display as 真闇
# JP: 「無理なく。楽しく。良か視察を、ね？」
2111 = "「Không quá sức. Vui vẻ. Một chuyến khảo sát tốt đẹp, nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2674 = "「Ừ.」"
# monologue
# JP: （ぴとっ）
4022 = "（Chạm nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2892 = "「!?」"
# monologue
# JP: 真闇姉の人差し指が、僕のくちびるにあてられる。
3741 = "Ngón trỏ của chị Mayami chạm vào môi tôi."
# monologue
# JP: 考え事をするときに、\nいつでも真闇姉のくちびるに添えられている長い指が。
3699 = "Ngón tay thon dài lúc nào cũng kề bên môi chị Mayami mỗi khi chị ấy suy nghĩ."
# 【真闇】
# display as 真闇
# JP: 「視察ばおわって、かえったら。\nたーっぷりご褒美上げるけん」
2763 = "「Khảo sát xong xuôi, lúc về. Chị sẽ thưởng cho em thật~ nhiều luôn.」"
# monologue
# JP: ドキン、と大きく、胸が高鳴る。\n禁欲を重ね、溜めてる股間が、ずくりとざわめく。
3450 = "Thịch, tim tôi đập rộn ràng. Nơi hạ bộ dồn nén dục vọng bấy lâu nay bỗng nhói lên rạo rực."
# monologue
# JP: たったこれだけのスキンシップが、\n遠足気分を、いっきに吹き飛ばしてしまう。
3319 = "Chỉ một chút tiếp xúc cơ thể thế này, đã thổi bay tâm trạng dã ngoại trong phút chốc."
# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみだ」
1545 = "「――Tôi rất mong chờ đấy.」"
# 【真闇】
# display as 真闇
# JP: 「うん。良かお顔。で、双ちゃん。\n廃校舎内を見る順番……ルートとか決めてると？」
2399 = "「Ừm. Gương mặt đẹp lắm. Thế, Sou-chan. Thứ tự xem bên trong phòng học cũ......em đã quyết định lộ trình chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。下見程度で、もしも気づいたことがあれば\nという話だったので、特には」
2673 = "「Chưa. Vì chỉ mới xem qua, nếu có phát hiện gì thì tính tiếp, nên tôi cũng không đặc biệt lên kế hoạch.」"
# 【真闇】
# display as 真闇
# JP: 「あえてのノープラン？」
2601 = "「Cố tình không lên kế hoạch à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。予断を持たず、素人の目で気付きがあれば、\nそれを素直に報告すればいいかと思っている」
2618 = "「Đúng vậy. Không phán đoán trước, nếu phát hiện được gì bằng con mắt nghiệp dư, thì cứ thế báo cáo lại là được.」"
# 【真闇】
# display as 真闇
# JP: 「了解。\nじゃ、おねーちゃんもおんなじ感じで見てみると」
2745 = "「Đã rõ. Vậy, chị cũng sẽ xem thử với cảm giác giống vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それで頼む。同じ意識で見てみても、\n僕と真闇姉とでは、やはり見えるものが違おうからな」
2888 = "「Nhờ chị vậy. Dù cùng một cách nhìn, nhưng những gì tôi và chị Mayami thấy chắc chắn sẽ khác nhau.」"
# 【真闇】
# display as 真闇
# JP: 「ん」
# 2345 = "「嗯」" 
# monologue
# JP: 真闇姉が小さく頷く。\nその横顔に、ハっとする。
3756 = "Chị Mayami khẽ gật đầu. Góc nghiêng ấy khiến tôi bất chợt sững sờ."
# monologue
# JP: 凛と締まった――蔵での顔になっている。
3949 = "Nét mặt điềm tĩnh, uy nghiêm――giống hệt như khi ở nhà xưởng ủ rượu."
# 【真闇】
# display as 真闇
# JP: 「そんなら、双ちゃん」
2873 = "「Nếu vậy thì, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 
# monologue
# JP: そうして僕らは、ごっこ遊びの――\nロールプレイの学園生活へと、一歩踏み出す。
3516 = "Và thế là chúng tôi―― bước một bước vào trò chơi nhập vai cuộc sống học đường."
# 【双鉄】
# display as 雙鐵
# JP: 「……ご褒美が一転、補習授業か」
1581 = "「......Phần thưởng thoắt cái biến thành lớp học bổ túc sao.」"
# monologue
# JP: 視察自体は、大成功したといえよう。
3806 = "Bản thân chuyến khảo sát có thể nói là thành công rực rỡ."
# monologue
# JP: 真闇姉とふたりでいることの効果は極めて大きく、\nレビューの素材を有り余るほどに収集できた。
3185 = "Hiệu quả khi ở cùng chị Mayami là vô cùng lớn, tôi đã thu thập được dư thừa tư liệu đánh giá."
# 【双鉄】
# display as 雙鐵
# JP: 「が……まさかなぁ。\nあれほどに、ロールプレイをこなせぬものとは」
2082 = "「Nhưng......không ngờ đấy. Lại không thể hoàn thành tốt trò nhập vai đến mức đó.」"
# monologue
# JP: 真闇姉は完璧に、学園制服に着替えまでして、\n『優しい先輩』を演じてくれた。
3751 = "Chị Mayami đã thay đồng phục học sinh một cách hoàn hảo, và vào vai một 『tiền bối dịu dàng』."
# monologue
# JP: 学園に入ってきたばかりの無愛想な僕を、\n親切に案内してくれた。
3268 = "Chị ấy đã ân cần hướng dẫn một kẻ khó gần vừa mới bước chân vào trường như tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「転校生という設定で、学園内を見てまわる。\n観光用に使うのならば、即座に転用できそうな案だが」
2078 = "「Đi tham quan quanh trường với bối cảnh là học sinh chuyển trường. Nếu dùng cho mục đích du lịch thì đây là phương án có thể áp dụng ngay, nhưng.」"
# monologue
# JP: なれど、あまりに僕が不出来であった。
3092 = "Tuy nhiên, tôi lại thể hiện quá tệ."
# monologue
# JP: まったく役に入り込めずに戸惑って、\n真闇姉に気をつかわせ、余計な手数をかけてしまった。
3374 = "Hoàn toàn không thể nhập vai, tôi cứ lúng túng, khiến chị Mayami phải bận tâm và tốn công vô ích."
# 【双鉄】
# display as 雙鐵
# JP: 「それがかえって多くを気づくきっかけになったと、\n真闇姉はフォローしてくれたが――」
2126 = "「Chị Mayami đã an ủi rằng chính điều đó lại là cơ hội để nhận ra nhiều thứ――」"
# monologue
# JP: 演じよう、と思えば思うほど力んでしまう。
3892 = "Càng muốn diễn, lại càng gượng gạo."
# monologue
# JP: 自分自身のことさえ満足に理解できていない僕が、\n他の誰かを演じるなどは、無理だったのかもしれん。
3469 = "Một kẻ ngay cả bản thân mình còn chưa hiểu rõ như tôi, việc đóng vai một ai khác có lẽ là điều không tưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、遅いな」
1588 = "「......Nhưng mà, lâu quá nhỉ.」"
# monologue
# JP: もういっかい着替えてくる。と、待たされている。
3273 = "Chị ấy bảo đi thay đồ lại một lần nữa, và bắt tôi phải chờ."
# monologue
# JP: 確かに学園制服のままでは、\n帰途に人目を引いてしまおうが――
3772 = "Quả thực nếu cứ mặc nguyên đồng phục học sinh, lúc về sẽ rất thu hút sự chú ý――"
# 【真闇】
# display as 真闇
# JP: 「右田君。\nいいつけ通り、きちんと残っていたようね」
2176 = "「Migita-kun. Làm đúng như lời dặn, ngoan ngoãn ở lại rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
# 2891 = "「！！？」" 
# monologue
# JP: 真闇姉――の声ではあるが、流れるような標準語だ。\nどう反応を返せばいいか――
3685 = "Chị Mayami――giọng thì đúng là của chị ấy, nhưng lại là tiếng phổ thông trôi chảy. Tôi nên phản ứng thế nào đây――"
# 【真闇】
# display as 真闇
# JP: 「右田君。起立は？」
2179 = "「Migita-kun. Đứng lên thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――はい。『起立！』」
2253 = "「A――vâng. 『Đứng lên!』」"
# monologue
# JP: 命令されれば、体は自動で動いてくれる。\n自分自身に号令をかけ、立ち上がる。
3812 = "Khi bị ra lệnh, cơ thể tự động di chuyển. Tự hô khẩu lệnh cho bản thân, tôi đứng bật dậy."
# monologue
# JP: 同時に、苦笑が湧いてくる。\nああ、これこそが僕の学園時代だったと。
3570 = "Đồng thời, một nụ cười gượng gạo hiện lên. A, đây mới chính là thời đi học của tôi."
# monologue
# JP: （ガラッ）
4029 = "（Cạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉！？……というか、その――」
2739 = "「Chị Mayami!?......Ý tôi là, ừm――」"
# monologue
# JP: 女教師だ。\nその言葉しか、でてこない。
3220 = "Nữ giáo viên. Chỉ có từ đó là bật ra được."
# 【真闇】
# display as 真闇
# JP: 「教室内では、『先生』でしょ？」
2432 = "「Trong lớp học thì phải gọi là 『Cô giáo』 chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2889 = "「！」" 
# monologue
# JP: ロールプレイの、これは、補習か。
3925 = "Đây là lớp học bổ túc, của trò chơi nhập vai sao."
# monologue
# JP: そう思う間にも、真闇姉は僕へと\nつかつか寄ってきて――
3705 = "Trong lúc tôi còn đang nghĩ vậy, chị Mayami đã xăm xăm tiến lại gần――"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
2070 = "「Cái!?」"
# monologue
# JP: しゃがみこむ。\n僕の股間の、目の前に。
3277 = "Ngồi xổm xuống. Ngay trước hạ bộ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ま、真闇姉っ！？」
2715 = "「Chị, chị Mayami!?」"
# 【真闇】
# display as 真闇
# JP: 「難しいこと、双ちゃんはいつも、\n考えすぎてしまうけん」
2495 = "「Sou-chan lúc nào cũng, nghĩ ngợi những chuyện phức tạp quá nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……」
2260 = "「A......」"
# 【真闇】
# display as 真闇
# JP: 「やけん。こいば――素直になるため。\n双ちゃんが、自分をさらけ出すための、補習授業」
2858 = "「Thế nên. Đây là――để em trở nên thành thật hơn. Một lớp học bổ túc để Sou-chan bộc lộ bản thân mình.」"
# monologue
# JP: 補習授業が、現実で。\n真闇姉が先生、僕が生徒だ。
3600 = "Lớp học bổ túc, ở ngay hiện thực. Chị Mayami là cô giáo, tôi là học sinh."
# monologue
# JP: ならば演じる必要などはない。\nただただ素直に、状況を追認すればいい。
3937 = "Nếu vậy thì không cần phải diễn nữa. Chỉ cần thành thật, chấp nhận tình huống này là được."
# 【双鉄】
# display as 雙鐵
# JP: 「はい、先生」
2630 = "「Vâng, thưa cô.」"
# 【真闇】
# display as 真闇
# JP: 「ん、いいお返事」
2374 = "「Ưm, trả lời ngoan lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2889 = "「！」" 
# monologue
# JP: くすりと、笑う。\nその息が、僕の股間をくすぐってくる。
3249 = "Khẽ cười khúc khích. Hơi thở ấy cù lét hạ bộ của tôi."
# monologue
# JP: それを感じてしまうほど――\nいつの間に、僕は完全に……勃起、している。
3152 = "Đến mức có thể cảm nhận được điều đó―― Từ lúc nào, tôi đã hoàn toàn......cương cứng."
# 【真闇】
# display as 真闇
# JP: 「そしたら、ね？　最初の補習。\n右田君は、最初に、何をさらけだしたい？」
2864 = "「Vậy thì, nhé? Buổi học bổ túc đầu tiên. Migita-kun, đầu tiên, em muốn bộc lộ điều gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――最初に……」
2579 = "「Em――đầu tiên......」"
# monologue
# JP: 生唾がわく。慌てて飲み込む。\nさっきの醜態が頭をよぎる。
3893 = "Nước bọt tứa ra. Vội vàng nuốt xuống. Bộ dạng khó coi lúc nãy thoáng qua trong đầu."
# 【真闇】
# display as 真闇
# JP: 「これは授業だから。素直に、素直に。\n思ったことを、ただそのまま言えばいいから」
2837 = "「Vì đây là lớp học mà. Thành thật, thành thật nào. Nghĩ gì, cứ nói y như vậy là được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 
# monologue
# JP: 支えてもらえる。\nこれは授業で、先生の指導だ。
3287 = "Được hỗ trợ. Đây là lớp học, là sự chỉ bảo của cô giáo."
# monologue
# JP: 誤答をしても、必ず正解を教えてもらえる。\n――安心感が、喉の緊張をほぐしてくれる。
3782 = "Dù trả lời sai, chắc chắn sẽ được dạy cho đáp án đúng. ――Cảm giác an tâm, đã xua tan sự căng thẳng nơi cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「おっぱいを、さらけ出したいです」
2560 = "「Em muốn bộc lộ, ngực ạ.」"
# 【真闇】
# display as 真闇
# JP: 「おっぱい。誰の？」
2800 = "「Ngực sao. Của ai nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の――先生のおっぱいを、\n僕は、最初にさらけ出したい――です」
2735 = "「Ngực của chị Mayami――của cô giáo, đầu tiên, em muốn được bộc lộ――ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うん。よかよ？」
2377 = "「Ừm. Được chứ?」"
# monologue
# JP: 笑いもせず、驚きもせず、怒りもせず、迷いもせず。\n僕の欲を、真闇姉はただそのままに受け止めてくれる。
3070 = "Không cười cợt, không ngạc nhiên, không tức giận, không do dự. Chị Mayami cứ thế đón nhận dục vọng của tôi."
# 【真闇】
# display as 真闇
# JP: 「ん……」
# 2321 = "「嗯……」" 
# monologue
# JP: 前のボタンが外される。\n露出した赤いブラジャーを――
3130 = "Hàng cúc trước ngực được tháo ra. Chiếc áo lót màu đỏ lộ ra――"
# 【真闇】
# display as 真闇
# JP: 「ん……しょ」
2337 = "「Ưm......xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 
# monologue
# JP: 外さず、無理やりにずりあげる。\n持ち上げられた胸がぶるん、と、震え放れる。
3250 = "Không tháo ra mà miễn cưỡng kéo ngược lên. Bầu ngực bị nâng lên rung bần bật, rồi tuột ra."
# 【双鉄】
# display as 雙鐵
# JP: 「……っ」
1554 = "「......っ」"
# monologue
# JP: 息を、飲む。言葉にできない。\nなんという豊かさ――美しさだろう。
3187 = "Nín thở. Không thốt nên lời. Thật là đầy đặn――đẹp đẽ biết bao."
# monologue
# JP: これほど大きく、けれども垂れぬ。\nなんと見事な張りだろう。
3929 = "To đến thế này, vậy mà không hề chảy xệ. Độ căng tròn mới tuyệt mỹ làm sao."
# 【真闇】
# display as 真闇
# JP: 「はぁい。おっぱい。\nね？　右田君。次は、なにをさらけ出したい？」
2106 = "「Vâng. Ngực đây. Thấy sao? Migita-kun. Tiếp theo, em muốn bộc lộ điều gì?」"
# monologue
# JP: さらけ出すより、触りたい。\nけれども、今は授業中。
3119 = "Thay vì bộc lộ, tôi muốn chạm vào hơn. Nhưng, bây giờ đang trong giờ học."
# monologue
# JP: さらけ出したいもの、であるなら――
3602 = "Nếu là thứ muốn bộc lộ――"
# 【双鉄】
# display as 雙鐵
# JP: 「勃起。です。僕は、勃起をさらけ出したい。\n先生に、さらけ出させてほしいです」
2767 = "「Cương cứng. Ạ. Em muốn bộc lộ sự cương cứng. Em muốn được cô giáo, làm cho bộc lộ ra ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うん。よく言えました」
2401 = "「Ừm. Nói giỏi lắm.」"
# monologue
# JP: （さすっ）
4050 = "（Vuốt nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 2247 = "「啊――」" 
# monologue
# JP: いいこいいこを、されている。\nズボンの上から、僕の亀頭へ、的確に。
3584 = "Đang được dỗ dành như trẻ ngoan. Chính xác từ bên ngoài quần, vuốt ve quy đầu của tôi."
# monologue
# JP: 真闇姉のふっくらとした手触りの、\n温度の高い手のひらが、亀頭をいいこと、撫でている。
3512 = "Lòng bàn tay mềm mại, ấm áp của chị Mayami đang âu yếm vuốt ve quy đầu như dỗ dành trẻ nhỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「早、く――直接。さらけ出して」
2528 = "「Nhanh, lên――trực tiếp. Bộc lộ ra đi.」"
# 【真闇】
# display as 真闇
# JP: 「あ！　ごめんねぇ。\n焦らしたつもりじゃなかったばってん」
2281 = "「A! Xin lỗi nha. Chị không định trêu em đâu.」"
# monologue
# JP: （かちゃ、カチャっ）
4051 = "（Lách cách, lách cách）"
# monologue
# JP: 丁寧にベルトを外し、ズボンの前を大きく開ける。
3270 = "Cẩn thận tháo thắt lưng, mở toang phần trước quần."
# 【真闇】
# display as 真闇
# JP: 「全部……脱がす、と？」
2786 = "「Cởi......hết ra, luôn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。それで、お願いしたいです」
2386 = "「Vâng. Vậy nên, xin nhờ cô ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うん。わかった」
2398 = "「Ừm. Cô hiểu rồi.」"
# monologue
# JP: （ずるんっ）
# 4050 = "（擦）" 
# 【真闇】
# display as 真闇
# JP: 「ひゃんっ！？」
2185 = "「Hyan!?」"
# monologue
# JP: さっきのおっぱいと正反対だ。\n僕の勃起は、押し下げられて跳ね上がった。
3895 = "Hoàn toàn trái ngược với bộ ngực ban nãy. Sự cương cứng của tôi bị đè xuống rồi bật tung lên."
# 【真闇】
# display as 真闇
# JP: 「あ――あ……おっき」
2252 = "「A――a......to quá.」"
# monologue
# JP: うわずった声。\nとろんと潤んでいる瞳。
3316 = "Giọng nói lanh lảnh. Đôi mắt long lanh ướt át."
# monologue
# JP: 真闇姉は、僕に発情してくれている。\n『先生』であることを、つかの間忘れてしまうほど。
3713 = "Chị Mayami đang phát tình vì tôi. Đến mức thoáng chốc quên mất mình là 『cô giáo』."
# 【双鉄】
# display as 雙鐵
# JP: 「まくらねぇ」
2736 = "「Chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「あ」
# 2265 = "「啊」" 
# monologue
# JP: だから。言う。自分の言葉で、感じたままに。\n先生は同時に真闇姉で。生徒は同時に僕なのだから。
3476 = "Vì vậy. Tôi nói. Bằng chính ngôn từ của mình, đúng như những gì tôi cảm nhận. Vì cô giáo đồng thời cũng là chị Mayami. Còn học sinh đồng thời cũng là tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「さらけ出すのもいいが――触れたい。\n真闇姉のおっぱいを、僕はこの手で揉みしだきたい」
2797 = "「Bộc lộ cũng tốt nhưng――tôi muốn chạm vào. Tôi muốn dùng đôi tay này để nhào nặn bầu ngực của chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「うん。うちも」
2373 = "「Ừm. Chị cũng muốn.」"
# monologue
# JP: 真闇姉の手が動く。\n僕の手を、優しく優しく導いてくれる。
3694 = "Tay chị Mayami chuyển động. Dịu dàng, ân cần dẫn dắt tay tôi."
# monologue
# JP: （ぷにゅっ）
4049 = "（Nắn bóp）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅあ」
2208 = "「Ưa.」"
# monologue
# JP: 感動のあまり、声がでる。\nやはり――最高のおっぱいだ。
3430 = "Quá đỗi cảm động, tôi thốt lên thành tiếng. Quả nhiên――bầu ngực tuyệt vời nhất."
# monologue
# JP: 蕩ける柔らさかと張りと、勃起した乳首の手触りと。\n手のひらが、幸せすぎて煮崩れそうだ。
3926 = "Sự mềm mại như tan chảy cùng độ căng tròn, và cảm giác khi chạm vào núm vú đang cương cứng. Lòng bàn tay tôi như muốn tan nhừ vì quá đỗi hạnh phúc."
# monologue
# JP: （むにっ――もみっ――さわっ――さすっ――）
4047 = "（Nắn bóp――xoa nắn――sờ nhẹ――vuốt nhẹ――）"
# 【真闇】
# display as 真闇
# JP: 「ん……うちも、おっぱい……ん――双ちゃんに、\nたくさん、たくさん――揉んで、ほしかと」
2326 = "「Ưm......chị cũng, ngực......ưm――muốn Sou-chan, nhào nặn――thật nhiều, thật nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 
# monologue
# JP: 頼まれずとも、揉む。ひたすらに。
3071 = "Không cần nhờ, tôi vẫn sẽ xoa bóp. Một cách say sưa."
# 【真闇】
# display as 真闇
# JP: 「ん……や……ちくび――ンッ――くに、くに――\nそぎゃん、と――しつこく、され、たら――」
2323 = "「Ưm......á......núm vú――ưn――cứ, cứ―― bị trêu chọc――dai dẳng, như thế――」"
# monologue
# JP: ならばと、乳輪をこねるようにし、\nじわじわ、揉み上げる範囲を広げる。
3936 = "Thấy vậy, tôi bắt đầu nhào nặn quầng vú, từ từ mở rộng phạm vi xoa bóp lên trên."
# 【真闇】
# display as 真闇
# JP: 「ん……はっ――ん……双ちゃん……て……\nやらし……んっ――ねっとり、して、てっ」
2328 = "「Ưm......há――ưm......tay của......Sou-chan...... dâm đãng quá......ưn――dính, nhớp nháp, quá.」"
# monologue
# JP: ねっとりと――\nその言葉を意識したなら、指の動きは緩慢になる。
3964 = "Nhớp nháp―― Khi ý thức được từ đó, chuyển động của ngón tay trở nên chậm chạp."
# monologue
# JP: ゆるく、軽く、焦らすようにして触れ、撫でる。\n刺激のたびに、ピクン、ピクンと真闇姉の肌が喜ぶ。
3379 = "Chạm vào, vuốt ve một cách hờ hững, nhẹ nhàng như trêu chọc. Mỗi lần bị kích thích, làn da của chị Mayami lại giật nảy lên sung sướng."
# 【真闇】
# display as 真闇
# JP: 「あ……きもち……おっぱい、おっぱい……\nん――フッ――双ちゃん、に――ちゅうって――あ」
2263 = "「A......sướng quá......ngực, ngực...... ưm――phù――như được, Sou-chan――hôn vậy――a.」"
# monologue
# JP: 瞬間、真闇姉の表情が驚いたようになる。\nとろけきってた瞳がふたたび、僕へ向く。
3733 = "Trong khoảnh khắc, vẻ mặt chị Mayami lộ vẻ ngạc nhiên. Đôi mắt đang đờ đẫn lại hướng về phía tôi."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃんだけ、気持ちよくしてもらっちゃって」
2533 = "「Chỉ có mình chị, được sướng thôi sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。僕もしあわせだ」
2670 = "「Không sao. Tôi cũng đang hạnh phúc mà.」"
# 【真闇】
# display as 真闇
# JP: 「ばってん、双ちゃんにも――\n双ちゃんも、もっと、さらけ出したかとよね？」
2049 = "「Nhưng mà, cả Sou-chan nữa―― Sou-chan cũng, muốn bộc lộ, nhiều hơn đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2708 = "「Tất nhiên rồi.」"
# monologue
# JP: 真闇姉のおっぱいの手触りが。
3753 = "Xúc cảm từ bầu ngực của chị Mayami."
# monologue
# JP: 汗が、匂いが、言葉が、全てが、\n僕をギリギリに尖らせている。
3549 = "Mồ hôi, mùi hương, lời nói, tất cả mọi thứ, đều đang kích thích tôi đến tột độ."
# 【双鉄】
# display as 雙鐵
# JP: 「次は、精液をさらけ出したい。\n真闇姉の口で、優しく、さらけ出させてほしい」
2039 = "「Tiếp theo, tôi muốn bộc lộ tinh dịch. Tôi muốn được cái miệng của chị Mayami, nhẹ nhàng, làm cho bộc lộ ra.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 
# monologue
# JP: 手は、休めない。\n真闇姉は、僕におっぱいを揉まれるままに――
3488 = "Tay, không thể dừng lại. Chị Mayami, cứ để mặc tôi nhào nặn bầu ngực――"
# monologue
# JP: (くにっ）
37 = "(Bóp nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2892 = "「！？」" 
# monologue
# JP: 勃起に、鼻先が押し当てられる。
3744 = "Chóp mũi ép sát vào sự cương cứng."
# 【真闇】
# display as 真闇
# JP: 「は……あ――双ちゃんの、匂い……\n双ちゃんの、いっとう、いっとう、濃か匂い――」
2221 = "「Há......a――mùi của, Sou-chan...... mùi, đậm đặc nhất, đậm đặc nhất, của Sou-chan――」"
# monologue
# JP: （すりっ）
4053 = "（Cọ cọ）"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 
# monologue
# JP: 今度は、頬ずり。
3227 = "Lần này, là cọ má."
# monologue
# JP: 真闇姉の真っ白な肌を、柔らかでもっちりした頬を、\n亀頭の先から溢れた汁が、ベタベタにして汚してく。
3717 = "Làn da trắng ngần, gò má mềm mại căng mọng của chị Mayami, đang bị thứ dịch rỉ ra từ đầu quy đầu làm cho bẩn và dính nhớp nháp."
# 【真闇】
# display as 真闇
# JP: 「おっきか――熱か――ほっぺば、焼けてしまいそお」
2448 = "「To quá――nóng quá――má chị, sắp cháy đến nơi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まくら……ねぇ」
2724 = "「Chị......Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「うん。わかっとお」
2384 = "「Ừm. Chị biết rồi.」"
# monologue
# JP: （もみゅっ）
4048 = "（Xoa nắn）"
# monologue
# JP: 指が、ようやく、\n触ってくれるが、睾丸だ――っ！？。
3264 = "Cuối cùng, ngón tay, cũng chịu chạm vào, nhưng lại là tinh hoàn――!?"
# 【真闇】
# display as 真闇
# JP: 「ぺろっ――れろおおおっ――ぺろっ、ぺちゅっ。\nチュルッ――ちゅっ――れろおおおおっ――れるっ」
2198 = "「Pero――rero o o o――pero, pechu. Churu――chu――rero o o o o――reru.」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 2345 = "「嗯」" 
# monologue
# JP: 持ち上げられて、舐められる。\nゆるゆる、ゆるゆる、ゆるゆると。
3763 = "Được nâng lên, và liếm láp. Thật chậm rãi, thật chậm rãi, thật chậm rãi."
# monologue
# JP: 舌に持ち上げられる度、自分の睾丸の圧を感じる。\nやはり、どうしようもなく溜まっているのだ。
3538 = "Mỗi lần được nâng lên bằng lưỡi, tôi lại cảm nhận được áp lực từ tinh hoàn của chính mình. Quả nhiên, nó đã tích tụ đến mức không thể kiềm chế nổi nữa."
# 【真闇】
# display as 真闇
# JP: 「ちゅっっ――れるっ――れろ――ちゅる、る――\nん……すごか……ずっしり……ずっしり重かと」
2292 = "「Chu――reru――rero――churu, ru―― ưm......kinh quá......nặng trĩu......nặng trịch luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「全部、真闇姉のための精液だ」
2779 = "「Tất cả, đều là tinh dịch dành cho chị Mayami đấy.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？　嬉しかぁ。\nほんなら――このまま食べちゃお！　あむっ！」
2628 = "「Vậy sao? Chị vui lắm. Thế thì――cứ vậy ăn luôn nhé! Amu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2890 = "「!!」"
# monologue
# JP: 睾丸が、片方ちゅるんと呑まれてしまう。
3053 = "Một bên tinh hoàn bị nuốt chửng cái chụt."
# 【真闇】
# display as 真闇
# JP: 「はむっ――ちゅっ――ちゅるっ――ころっ――\nん……ちゅるっ――れろっ、ころっっ――こりゅ」
2276 = "「Hamu――chu――churu――koro―― ưm......churu――rero, koro――koryu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あ――」
2250 = "「A――a――」"
# monologue
# JP: 逆側の玉は、やさしく揉まれる。\nふっくらあたたかな指先が、精液だまりを弄ぶ。
3161 = "Hòn ngọc bên kia, được xoa bóp nhẹ nhàng. Đầu ngón tay mềm mại ấm áp, đang đùa giỡn với bầu chứa tinh dịch."
# 【真闇】
# display as 真闇
# JP: 「ちゅうっ――ちゅっ――はむっ、あむっ――んっ\nちゅろおっ、ちゅろ、ころっ――ちゅうううううっ」
2288 = "「Chuu――chu――hamu, amu――ưm churoo, churo, koro――chuuuuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2889 = "「！」" 
# monologue
# JP: 優しく優しく舐められて、玉を舌先で転がされ、\nあげく――強く、痛いくらいに強く吸われる。
3195 = "Được liếm láp thật dịu dàng, hòn ngọc bị lăn qua lăn lại trên đầu lưỡi, cuối cùng――bị mút mạnh, mạnh đến mức phát đau."
# monologue
# JP: 一挙動ごとに精液が、\n出番はまだかと、イカせてくれと悲鳴を上げる。
3535 = "Mỗi một cử động, tinh dịch lại gào thét, như muốn hỏi đã đến lượt chưa, hãy cho nó xuất ra đi."
# 【双鉄】
# display as 雙鐵
# JP: 「竿――を、真闇姉。\n射精を――おねがいだ、させてくれ」
2769 = "「Cán――chị Mayami. Xin chị――hãy cho tôi, xuất tinh đi.」"
# 【真闇】
# display as 真闇
# JP: 「うん。よかよ？\nおちんちん、ビクビクしとるねぇ――ん……はむっ」
2376 = "「Ừm. Được chứ? Dương vật, đang giật giật kìa――ưm......hamu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あああ」
2271 = "「A a a.」"
# monologue
# JP: 亀頭の先端。それだけを唇でホールドされる。\nぺとりと舌が、裏筋側にくっついてくる。
3168 = "Đỉnh quy đầu. Chỉ riêng chỗ đó bị giữ chặt bởi đôi môi. Lưỡi áp sát vào, liếm dọc theo phần dây chằng."
# 【真闇】
# display as 真闇
# JP: 「ん……チュッ――ずろっ――ちゅる、るう、るっ」
2336 = "「Ưm......chu――zuro――churu, ruu, ru.」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあ、あ――あっ――」
2309 = "「Kua, a――á――」"
# monologue
# JP: 真闇姉の舌がレールになってる。
3738 = "Lưỡi của chị Mayami đã trở thành đường ray."
# monologue
# JP: その上を、勃起がゆるゆる――\nゼロノッチ――惰性走行で呑み込まれていく。
3809 = "Sự cương cứng từ từ lướt trên đó―― Không tay ga――đang bị nuốt chửng bằng đà chạy quán tính."
# 【真闇】
# display as 真闇
# JP: 「ちゅっ――れ、るっ――ちゅうっ――ちゅっ、ちゅむ\nちゅるうっ――ちゅるっ――れろっ――れるううっ」
2290 = "「Chu――re, ru――chuu――chu, chumu churuu――churu――rero――reruuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はっ――はっ――はっ――はぁっ」
2209 = "「Há――há――há――haa.」"
# monologue
# JP: 緩い、弛い。勃起が呑まれる速度は余りに遅すぎて、\n神経全部が、唇と舌と、触れ合う部分に集中していく。
3350 = "Chậm chạp, lỏng lẻo. Tốc độ sự cương cứng bị nuốt vào quá chậm, khiến toàn bộ dây thần kinh đều tập trung vào phần tiếp xúc với môi và lưỡi."
# 【真闇】
# display as 真闇
# JP: 「んぷっ――んっ――れろっ――れろ、ずっ――じゅ、\nちゅっ――ちゅるう――ちゅ、れろっ――れるうっ」
2350 = "「Ưmpu――ưm――rero――rero, zu――ju, chu――churuu――chu, rero――reruu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ――あっ」
2251 = "「A――á――á.」"
# monologue
# JP: 亀頭全部を呑んで貰えて、それでも速度は上がらない。\nじわじわ、ずるずる、真闇姉の口へ埋没し――っ！？
3965 = "Toàn bộ quy đầu đã được nuốt trọn, nhưng tốc độ vẫn không tăng lên. Cứ từ từ, chầm chậm, chìm dần vào trong miệng chị Mayami――!?"
# 【真闇】
# display as 真闇
# JP: 「んっ！　ちゅずっ！　ぢゅぼっ！　ぼちゅっ！！\nじゅぽっ！　じゅぼっ！　じゅっ！　じゅばっ！！」
2357 = "「Ưm! Chuzu! Jubo! Bochu!! Jupo! Jubo! Ju! Juba!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁあああっ！！？」
2273 = "「A a a a a á!!?」"
# monologue
# JP: 急に、来る。\n真闇姉は激しく口を前後に動かしっ！
3776 = "Đột ngột, ập đến. Chị Mayami bắt đầu di chuyển miệng tới lui một cách mãnh liệt!"
# 【真闇】
# display as 真闇
# JP: 「じゅううっ！　じゅぼっ！　じゅるる～～にゅぼっ！\nじゅるううっ――れるううっ――じゅぼ！　がぼっ！」
2299 = "「Juuu! Jubo! Jururu~~nyubo! Juruuu――reruuu――jubo! Gabo!」"
# monologue
# JP: 来たかと思えば緩急がつく。\n舌の動きが、頭の動作と呼応する。
3179 = "Tưởng chừng như đã đến giới hạn thì nhịp điệu lại thay đổi. Chuyển động của lưỡi hô ứng nhịp nhàng với chuyển động của đầu."
# 【真闇】
# display as 真闇
# JP: 「んむっ――れろっ――ぴちゃ、ぺちゃっ――ずちゅ、\nちゅうううっ――ずっ！　ずちゅっ！　じゅぼっ！！」
2353 = "「Ưnmu――rero――picha, pecha――zuchu, chuuuu――zu! Zuchu! Jubo!!」"
# monologue
# JP: フェラチオ。されてる。\n口唇で、僕の勃起を支配されてる。
3233 = "Blowjob. Đang được làm. Sự cương cứng của tôi đang bị chi phối bởi đôi môi ấy."
# monologue
# JP: 腰から下が白くなってる。\nあまりに強い快感に、完全にしびれて麻痺してる。
3372 = "Từ thắt lưng trở xuống trở nên trắng xóa. Khoái cảm quá mãnh liệt khiến tôi hoàn toàn tê dại và tê liệt."
# 【真闇】
# display as 真闇
# JP: 「ぴちょ、ぺちょ――ちゅうっ――ぺろろろっ！」
2424 = "「Picho, pecho――chuu――perororo!」"
# monologue
# JP: 頭の動きをぴたりととめて、\n代わりに素早く舌が蠢き、亀頭を責める。
3259 = "Chuyển động của đầu đột ngột dừng lại, thay vào đó là chiếc lưỡi luồn lách nhanh nhẹn, tấn công quy đầu."
# monologue
# JP: ぶくりと、はっきり、膨らんでいる――\n僕の先端の状態を、確かめてでもいるかのように。
3819 = "Phình to, rõ ràng, đang sưng lên―― Như thể đang xác nhận trạng thái phần đỉnh của tôi vậy."
# 【真闇】
# display as 真闇
# JP: 「へーんふ、ほふひひはひへ、ひょはよよ？」
2898 = "「Hén fư, hô fư hi hi ha hi hê, hyô ha yo yo?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 
# monologue
# JP: ぶんぶん、全力で頷いている。\n全部を。お口に。真闇姉の。その誘惑に抗えない。
3447 = "Tôi gật đầu liên tục, bằng tất cả sức lực. Toàn bộ. Vào trong miệng. Của chị Mayami. Tôi không thể cưỡng lại sự cám dỗ đó."
# 【真闇】
# display as 真闇
# JP: 「じゅぼっ！　ぼぢゅっ！　じゅぼっ！　じゅばっ！\nじゅ！　ちゅぼっ！　じゅぼっ！　じゅるっ！！」
2294 = "「Jubo! Boju! Jubo! Juba! Ju! Chubo! Jubo! Juru!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「はっ！　あっ！　あっ！」
2224 = "「Há! Á! Á!」"
# 【真闇】
# display as 真闇
# JP: 「じゅるっ！　じゅばっ！　じゅぼっ！　じゅぼっ！\nじゅぶっ！　じゅっ！　じゅばっ！　じゅちゅっ！」
2297 = "「Juru! Juba! Jubo! Jubo! Jubu! Ju! Juba! Juchu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「まくら――ねえっ！！」
2737 = "「Chị――Mayami!!」"
# monologue
# JP: 単純すぎる前後動き。\n単純がゆえに、気持ちいい。
3165 = "Chuyển động tới lui quá đỗi đơn giản. Nhưng chính vì đơn giản, nên mới sướng."
# monologue
# JP: 腰が、ふくれる。\n体全部が、精液でパンパンになっている。
3373 = "Hông, căng phồng lên. Toàn bộ cơ thể như đang căng cứng vì tinh dịch."
# 【真闇】
# display as 真闇
# JP: 「じゅぼっ！　じゅぶっ！　じゅっ！　じゅぶぶっ！\nじゅぼっ！　ちゅううううっ！　じゅ！　じゅばっ！」
2295 = "「Jubo! Jubu! Ju! Jububu! Jubo! Chuuuu! Ju! Juba!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああああああああっっっ！！！」
2272 = "「A a a a a a a á!!!」"
# monologue
# JP: （びゅぶっ！　びゅぐんっ！　びゅぶっ！　びゅる！）
4021 = "（Byubu! Byugun! Byubu! Byuru!）"
# 【真闇】
# display as 真闇
# JP: 「んぶっ！？　んっ――（ごくっ――ごくっっ！）」
2354 = "「Ưmbu!? Ưm――（Ực――ực!）」"
# monologue
# JP: （びゅるうっ！　びゅっ！　びゅるるっ！　びゅぶっ！）
4036 = "（Byuruu! Byu! Byururu! Byubu!）"
# 【真闇】
# display as 真闇
# JP: 「（ごくっ、ごく）――んっ！？　ん――ぷえっ！？」
2896 = "「（Ực, ực）――ưm!? Ưm――pue!?」"
# monologue
# JP: （びゅううっ！　ぴゅっ！　びゅびゅっ！　――びゅ」
4039 = "（Byuuu! Pyu! Byubyu! ――byu」"
# 【真闇】
# display as 真闇
# JP: 「はうっ！？　あつっ――んっ――んんっ――あっ」
2227 = "「Haư!? Nóng――ưm――ưm ưm――á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うぁ――あっ――あああ――あっ――」
2307 = "「Ưa――á――a a a――á――」"
# monologue
# JP: 萎えてる。\nあれほど溜めていたのに。
3844 = "Xìu xuống rồi. Dù đã tích tụ nhiều đến thế."
# monologue
# JP: 精液全部を、真闇姉に呑んでもらえ――っ！？
3114 = "Toàn bộ tinh dịch, đều đã được chị Mayami nuốt trọn――!?"
# 【真闇】
# display as 真闇
# JP: 「うあ……どろっ、どろ――んっ――（すんっ、すん）\nふぁ……双ちゃんの……おとこの……ひとの……匂い」
2308 = "「Ưa......nhớt, nhớp nháp――ưm――（khịt, khịt） Fua......mùi của......đàn ông......của......Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 2890 = "「！！」" 
# monologue
# JP: 飲みきれなかった精液が、真闇姉を染め、汚してる。\nそれを指先で拭っては――
3533 = "Tinh dịch không thể nuốt hết, đã vấy bẩn, làm dơ chị Mayami. Dùng đầu ngón tay lau đi thì――"
# 【真闇】
# display as 真闇
# JP: 「ん……ちゅっ――んんっ――ぷあっ――\nおいしくは、なかけど――ん――ちゅるっ（ごくっ）」
2334 = "「Ưm......chu――ưm ưm――pua―― Dù không, ngon lắm――ưm――churu（ực）」"
# monologue
# JP: 舐め取り、呑んでくれている。\nその淫猥な光景に、萎えてた欲がすぐ立ち戻る。
3148 = "Chị ấy đang liếm sạch, rồi nuốt xuống. Trước cảnh tượng dâm đãng đó, dục vọng vừa xìu xuống ngay lập tức trỗi dậy."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉――」
2733 = "「Chị Mayami――」"
# monologue
# JP: 射精前より、強い欲。\n針より尖った欲望が、僕の喉から溢れ出ていく。
3445 = "Dục vọng còn mãnh liệt hơn cả trước khi xuất tinh. Khao khát nhọn hơn cả kim châm, đang trào dâng khỏi cổ họng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、真闇姉に甘えたい。同時に、真闇姉の前では、\nせいいっぱいに格好をつけた男でいたい」
2557 = "「Tôi muốn làm nũng với chị Mayami. Đồng thời, trước mặt chị Mayami, tôi cũng muốn trở thành một người đàn ông ra dáng nhất có thể.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「それは、真闇姉が好きだからだ。好きだから、\nどうしようもなく色々な感情が沸き起こってくる」
2430 = "「Đó là vì, tôi thích chị Mayami. Vì thích, nên vô vàn cảm xúc cứ thế tuôn trào không sao kiềm chế được.」"
# monologue
# JP: ふわんと、笑う。\n精液で汚れた顔に――聖なるものを感じさえする。
3459 = "Khẽ mỉm cười. Trên gương mặt vấy bẩn tinh dịch ấy――tôi thậm chí còn cảm nhận được sự thánh thiện."
# 【真闇】
# display as 真闇
# JP: 「よかよ？　ぜぇんぶ、ぶつけてくれて」
2444 = "「Được chứ? Cứ va chạm hết vào chị đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2268 = "「啊啊――」" 
# monologue
# JP: 真闇姉は、本当に最高の先生だ。\nだからこそ、僕はここまで、自分を出せる。
3704 = "Chị Mayami, thực sự là một người cô giáo tuyệt vời nhất. Chính vì thế, tôi mới có thể bộc lộ bản thân đến mức này."
# 【双鉄】
# display as 雙鐵
# JP: 「甘え、導かれるセックスだけでは――\nもう、物足りない」
2599 = "「Chỉ làm nũng, và được dẫn dắt trong tình dục thì―― đã không còn đủ thỏa mãn nữa rồi.」"
# 【真闇】
# display as 真闇
# JP: 「あっ」
# 2265 = "「啊」" 
# monologue
# JP: 真闇姉の表情がふいに固くなる。\n余裕の笑みが掻き消える。
3740 = "Biểu cảm của chị Mayami chợt cứng đờ. Nụ cười thong dong vụt tắt."
# monologue
# JP: ドラマのワンシーンのようだと思う。\nまるきり僕は――先生に告白してる、生徒だと。
3348 = "Cứ như một cảnh phim truyền hình vậy. Tôi hoàn toàn giống như――một học sinh, đang tỏ tình với cô giáo."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――真闇姉を――いいや、右田真闇を、\n僕、右田双鉄の、おんなにしたい」
2559 = "「Tôi muốn――biến chị Mayami――không, Migita Mayami, thành người phụ nữ của tôi, Migita Soutetsu.」"
# 【真闇】
# display as 真闇
# JP: 「うん。\n――うん！」
2340 = "「Ừm. ――Ừm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 2890 = "「！！」" 
# monologue
# JP: キス。
3859 = "Hôn."
# monologue
# JP: 真闇姉の唇からは、僕の精液の匂いが漂う。\nそれごと、味も、ねばつきも何もかも拭い取る。
3720 = "Từ đôi môi chị Mayami, phảng phất mùi tinh dịch của tôi. Tôi lau sạch tất cả, cả hương vị, cả sự nhớp nháp."
# 【真闇】
# display as 真闇
# JP: 「ん……ちゅっ――んちゅ――ちゅっ――ちゅうっ、\nちゅっ――ちゅ、むっ――んっ――れる――ぷあっ」
2332 = "「Ưm......chu――ưm chu――chu――chuu, chu――chu, mu――ưm――reru――pua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇」
2725 = "「Mayami.」"
# monologue
# JP: キスをほどいて。\n呼び捨てる。
3962 = "Dứt nụ hôn. Gọi trống không tên chị ấy."
# monologue
# JP: これから、僕のおんなにすると――\n僕が主導権を取るのだと、強く願って。
3423 = "Từ giờ, tôi sẽ biến chị thành người phụ nữ của tôi―― Với mong muốn mãnh liệt rằng mình sẽ nắm thế chủ đạo."
# 【真闇】
# display as 真闇
# JP: 「はい、双鉄さん」
2451 = "「Vâng, anh Soutetsu.」"
# monologue
# JP: 名を呼ばれる。そうだけでくらくらしてしまう。\nこれが男の本懐か――そんなことすら思ってしまう。
3230 = "Được gọi tên. Chỉ vậy thôi cũng đủ làm tôi chếnh choáng. Đây là khao khát lớn nhất của đàn ông sao――tôi thậm chí đã nghĩ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「手を、つくんだ。\nそうして、尻を――僕へと向けろ」
2590 = "「Chống tay xuống. Sau đó, hướng mông――về phía tôi.」"
# 【真闇】
# display as 真闇
# JP: 「ん――は、い……」
2317 = "「Ưm――vâng......」"
# monologue
# JP: ほんのつかの間のためらいは、\n抵抗感ではなく恥じらいから。
3253 = "Sự do dự trong thoáng chốc ấy, không phải vì phản kháng mà là vì xấu hổ."
# monologue
# JP: そうと感じる証拠なら、\n僕の眼下に示されている。
3587 = "Bằng chứng cho cảm giác đó, đang hiện ra ngay dưới tầm mắt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「足を、もっと開くんだ」
2774 = "「Mở rộng chân ra thêm chút nữa.」"
# 【真闇】
# display as 真闇
# JP: 「は……ぁ……」
2440 = "「Vâng......」"
# monologue
# JP: スカートを思い切りまくりあげ、待つ。\nゆるゆるとしか、真闇姉の足はひらかない。
3418 = "Tôi vén tung váy lên và chờ đợi. Chân chị Mayami chỉ hé mở từng chút một."
# monologue
# JP: ぽとりと、雫が床へと落ちる。\n二滴、三適。ぽたり、ぽとりと。
3063 = "Tí tách, những giọt nước rơi xuống sàn. Hai giọt, ba giọt. Tí tách, tí tách."
# 【双鉄】
# display as 雙鐵
# JP: 「ストッキングが、邪魔だな」
2781 = "「Quần tất, vướng víu quá nhỉ.」"
# monologue
# JP: 股間の部分を、思い切りよく――
3310 = "Nắm lấy phần đũng quần, kéo thật mạnh――"
# 【双鉄】
# display as 雙鐵
# JP: 「む？　あれ？」
2417 = "「Hử? Ủa?」"
# monologue
# JP: 伸びる。分厚い、破けない。
3854 = "Nó giãn ra. Dày quá, không rách được."
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ――むっ――このっ！」
2686 = "「Ư――ưm――cái này!」"
# monologue
# JP: 焦ってしまう指先に、\nふわり、温かさが触れてくる。
3568 = "Nơi đầu ngón tay đang nôn nóng, chợt chạm vào một hơi ấm mềm mại."
# 【真闇】
# display as 真闇
# JP: 「平気、ね？　\nちょこっと、穴ばあけたら、すぐ」
2669 = "「Không sao, nhỉ? Chỉ cần chọc một lỗ nhỏ là được ngay thôi.」"
# monologue
# JP: （ぴりっ）
# 4016 = "（呲）" 
# monologue
# JP: 真闇姉の爪が小さな穴を穿ってくれる。\nならば、ここを手がかりにすれば――
3715 = "Móng tay chị Mayami chọc thủng một lỗ nhỏ. Nếu vậy, chỉ cần men theo chỗ này――"
# monologue
# JP: （びりり――びりりいりっ――）
4030 = "（Xoẹt――xoẹt roạt――）"
# 【真闇】
# display as 真闇
# JP: 「あっ」
# 2265 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「すごいな……完全にぐぢゅぐぢゅだ」
2207 = "「Kinh thật......hoàn toàn ướt nhẹp rồi.」"
# monologue
# JP: 股間の布を大きくずらす。\n真闇姉のおまんこを、僕の視線に、外気に晒す。
3309 = "Kéo lệch mảng vải ở đũng quần sang một bên. Phơi bày âm hộ của chị Mayami trước ánh mắt tôi, và không khí bên ngoài."
# 【真闇】
# display as 真闇
# JP: 「ね、双ちゃんっ――」
2490 = "「Này, Sou-chan――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2268 = "「啊啊――」" 
# monologue
# JP: 双ちゃんに、これほどすぐに戻ってしまった。
3389 = "Lại quay về làm Sou-chan nhanh đến thế này sao."
# monologue
# JP: 真闇姉をリードするには、\nまだまだ僕の器では足りてないらしい。が――
3593 = "Để có thể dẫn dắt chị Mayami, có vẻ bản lĩnh của tôi vẫn chưa đủ. Nhưng――"
# monologue
# JP: （ずりゅっ――）
4015 = "（Phập――）"
# 【真闇】
# display as 真闇
# JP: 「あっ！」
2285 = "「A!」"
# monologue
# JP: 勃起を思い切り擦り付け、揺らす。\nせめてセックスは主導したいと、願って揺らす。
3817 = "Cọ xát sự cương cứng thật mạnh và lắc lư. Với mong muốn ít nhất có thể chủ đạo trong tình dục, tôi không ngừng lắc lư."
# 【真闇】
# display as 真闇
# JP: 「あっ――双ちゃんの――まっこと――熱かぁ」
2257 = "「A――của Sou-chan――thật sự――nóng quá.」"
# monologue
# JP: 何度も何度も愚直に揺すり、もう蕩けてるおまんこを、\nしつこくしつこく愛撫していく。
3900 = "Tôi ngây ngô cọ xát hết lần này đến lần khác, dai dẳng ái ân cái âm hộ vốn đã ướt đẫm nhầy nhụa kia."
# 【真闇】
# display as 真闇
# JP: 「あっ――双ちゃん……んっ――それっ――\nおねえちゃん――好きっ――んっ――ふっ――あ」
2256 = "「A――Sou-chan......ưm――cái đó―― chị――thích lắm――ưm――phù――a.」"
# monologue
# JP: 揺すりつつ、上への動きを加えてく。\n真闇姉のおまんこを、ごしごしごしと押し上げていく。
3065 = "Vừa cọ xát, vừa đẩy ngược lên trên. Chà xát mạnh bạo, ép sát vào âm hộ của chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「はっ――ん――ふっ――あっ――おねえ、ちゃんっ、\nふぁうっ――ふあっ――そこ、ば――押されたらっ」
2215 = "「Há――ưm――phù――á――chị, á, faư――fua――chỗ đó――bị ép vào thì.」"
# monologue
# JP: 弱い部分ならわかっている。\n手を動かしてクリトリス、その上の包皮のコリコリを。
3455 = "Điểm nhạy cảm thì tôi biết rõ. Tôi di chuyển tay, xoa nắn âm vật và lớp bao quy đầu sần sật phía trên nó."
# monologue
# JP: （こりゅっ）
4018 = "（Sần sật）"
# 【真闇】
# display as 真闇
# JP: 「ひあうっ！！？」
2182 = "「Hiaư!?」"
# monologue
# JP: 甲高い。\n余裕もなにも感じられない、裏返った声。雌の声。
3238 = "Cao vút. Một giọng nói lạc đi, không còn chút thong dong nào. Tiếng kêu của con cái."
# monologue
# JP: （こりゅっ――こりゅっ――ごしゅっ――ぐにゅっ）
4017 = "（Sần sật――sần sật――nắn nắn――bóp bóp）"
# monologue
# JP: 指を動かし、腰を動かす。\n真闇姉の反応をみつつ、ゆっくり、焦らず。
3414 = "Ngón tay chuyển động, hông cũng chuyển động theo. Vừa quan sát phản ứng của chị Mayami, vừa từ từ, không vội vã."
# 【真闇】
# display as 真闇
# JP: 「そ、双ちゃん――んっ――はっ――あっ――\nだめっ――そんなのっ――んっ――おねえ、ちゃんっ」
2477 = "「S, Sou-chan――ưm――há――á―― không được――thế này――ưm――chị, á.」"
# monologue
# JP: （ぐいっ！　ずりゅっ！　こしゅっ――こりゅん）
4054 = "（Giật! Trượt! Vuốt――sần sật）"
# 【真闇】
# display as 真闇
# JP: 「そんなの――され、たら――続け、られ、たらっ！\nおねえちゃ、ひとり――で――イっちゃう、けんっ」
2866 = "「Cứ bị――làm thế――nếu cứ tiếp tục――thế này! Chị sẽ, tự mình――lên đỉnh, mất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一人では――イキたくない？」
2042 = "「Không muốn――lên đỉnh một mình sao?」"
# 【真闇】
# display as 真闇
# JP: 「うん！　うん！　一緒、双ちゃんと――\n双ちゃんと一緒じゃなくっちゃ、いややけん」
2359 = "「Ưm! Ưm! Cùng nhau, với Sou-chan―― Nếu không phải cùng Sou-chan thì, không chịu đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――さらけ出してくれ。\n真闇姉が、真闇姉自身の――欲望を」
2870 = "「Nếu vậy――hãy bộc lộ ra đi. Chị Mayami, dục vọng của chính――chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「…………」
1550 = "「............」"
# monologue
# JP: 真闇姉は一瞬、ためらい――
3696 = "Chị Mayami thoáng chốc, do dự――"
# 【真闇】
# display as 真闇
# JP: 「挿れてほしかとっ！　おちんちん、双ちゃんの\nおちんちん、おねえちゃんのおまんこの、一番奥にっ！」
2801 = "「Mau cho vào đi! Dương vật, dương vật của Sou-chan, vào tận sâu nhất trong âm hộ của chị!」"
# monologue
# JP: 言葉と同時、勃起がずりずりこすられる。\n真闇姉の腰が蠢き、必死になっておねだりしてる。
3256 = "Cùng lúc với lời nói, sự cương cứng bị cọ xát liên tục. Hông chị Mayami uốn éo, tuyệt vọng cầu xin."
# 【真闇】
# display as 真闇
# JP: 「ぴゅぴゅってして、いいこいいこして、\nかわいいって、好きってたくさんいうて欲しかと！」
2474 = "「Hãy bắn vào đi, hãy dỗ dành chị đi, hãy nói chị dễ thương, nói thích chị thật nhiều vào!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2268 = "「啊啊――」" 
# monologue
# JP: 求めあってる。体だけでなく、こころも等しく。
3410 = "Cùng khao khát nhau. Không chỉ thể xác, mà cả tâm hồn cũng vậy."
# monologue
# JP: 甘えたいし、甘えさせたい。\nそれが僕らの、一番釣り合う気持ちだと知る。
3428 = "Muốn làm nũng, và cũng muốn được làm nũng. Tôi nhận ra đó là thứ tình cảm tương xứng nhất của chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、同じだ」
2544 = "「Tôi cũng, vậy.」"
# monologue
# JP: 力みが、抜ける。\nただただ自然に、体が動く。
3436 = "Buông lỏng sức lực. Cơ thể chuyển động một cách tự nhiên."
# monologue
# JP: （っ――プッ――）
3967 = "（Phập――）"
# 【真闇】
# display as 真闇
# JP: 「んうううううううぅぅぅぅっ！！！」
2355 = "「Ưn ư ư ư ư ư ư ư ư ư ư!!!」"
# monologue
# JP: ほんの僅かを進んだ途端、真闇姉の、甘い声。\n勃起から背骨を抜けて、脳をガンガン揺らす声。
3131 = "Vừa tiến vào một chút, giọng nói ngọt ngào của chị Mayami vang lên. Âm thanh truyền từ dương vật dọc theo sống lưng, làm rung chuyển cả não bộ."
# 【真闇】
# display as 真闇
# JP: 「はぁっ――きて、来てる――双ちゃんの――\nあつい、の――おちん、ちん――ふ、あっ――」
2218 = "「Há――vào, vào rồi――của Sou-chan―― nóng, quá――dương, vật――fua, á――」"
# monologue
# JP: ゆっくり、進む。腰を押し下げるようにして、\nクリトリスの裏、そこに勃起を当てていく。
3382 = "Chậm rãi, tiến vào. Như thể ép hông xuống, để sự cương cứng chạm vào mặt sau của âm vật."
# 【真闇】
# display as 真闇
# JP: 「はっ――あ、あっ、あああ――んっ――そこ、\nば、され、たら――ふっ――あ――ぞわ、って」
2212 = "「Há――a, á, a a a――ưm――chỗ đó, bị, chạm, vào――phù――a――rùng mình, mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とてもかわいいぞ、真闇姉」
2098 = "「Dễ thương lắm, chị Mayami.」"
# 【真闇】
# display as 真闇
# JP: 「はうっ」
2277 = "「Haư.」"
# monologue
# JP: 真闇姉の温度が上がる。
3743 = "Nhiệt độ của chị Mayami tăng lên."
# monologue
# JP: ただでさえみっちりとした肉感たっぷりの膣壁が、\nきゅううっと、一気に締めてくる。
3520 = "Vách âm đạo vốn đã chật chội và đầy đặn, bỗng chốc siết chặt lại."
# 【真闇】
# display as 真闇
# JP: 「はぁぁ――すきっ――好き、双ちゃんっ――\nおねえちゃん、おねえちゃん――最初から――ふあっ！」
2776 = "「Haa――thích――thích lắm, Sou-chan―― chị, chị――ngay từ đầu đã――fua!」"
# monologue
# JP: いいこいいこもしてあげる。\n頭ではなくクリトリスへと。
3464 = "Tôi dỗ dành chị ấy. Không phải xoa đầu, mà là xoa âm vật."
# 【真闇】
# display as 真闇
# JP: 「ひゃあああん――とけ、ちゃうっ――からだ――\nおねえ、ちゃんっ――おにく――どろって、しちゃう」
2184 = "「Hyaaa――tan, chảy mất――cơ thể―― chị, á――thịt――sắp nhão ra, mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「してくれ。存分。\n僕が全部を、すするから」
2104 = "「Cứ tan chảy đi. Thỏa thích. Tôi sẽ hút cạn tất cả.」"
# monologue
# JP: 耳元へキス。後ろ髪にも。\n鼻先を使い髪を割り、髪ごとうなじをぞろリと舐める。
3860 = "Hôn lên tai. Lên cả mái tóc phía sau. Dùng chóp mũi rẽ tóc ra, liếm láp gáy cùng với những lọn tóc."
# 【真闇】
# display as 真闇
# JP: 「は――あっ――双ちゃん――そうちゃあぁんっ」
2211 = "「Há――á――Sou-chan――Sou-chaaaan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2345 = "「嗯」" 
# monologue
# JP: （ずりゅうううううううう――――ばぢゅんっ！！）
4014 = "（Phập――――bạch!!）"
# 【真闇】
# display as 真闇
# JP: 「んひゅううううううううううっっ！！！！」
2346 = "「Nhyư ư ư ư ư ư ư ư ư ư ư!!!!」"
# monologue
# JP: （じゅぶっ！　ずぢゅっ！　じゅばっ！　ごちゅっ！）
4025 = "（Sục! Phập! Bạch! Phịch!）"
# 【真闇】
# display as 真闇
# JP: 「か――はっ――あっ――ふあっ！　おくっ、ん、\nおくっ――きてる――子宮、に――子宮にぃっ！！」
2249 = "「A――há――á――fua! Sâu quá, ưm, sâu quá――đến rồi――tử cung, vào――tử cung rồi!!」"
# monologue
# JP: （ばぢゅっ！　ずばっ！　じゅぶっ！　ごりゅんっ！）
4024 = "（Bạch! Phập! Sục! Sần sật!）"
# 【真闇】
# display as 真闇
# JP: 「はっ――んっ――おまん、こ――ひあっ――あっ、\nなか――これ――えぐれ、てっ――ぜんぶ――んっ」
2216 = "「Há――ưm――âm, hộ――hia――á, bên trong――thế này――bị khoét, mất――toàn bộ――ưm.」"
# monologue
# JP: （じゅっ！　ばぢゅっ！　ごりゅっ！　じゅぼっ！）
4027 = "（Sục! Bạch! Sần sật! Phập!）"
# 【真闇】
# display as 真闇
# JP: 「熱かと――っ――すごい、のっ――ふあ、あっ――\nあっ――おちん、ちん――おなか――ぜんぶうっ！」
2694 = "「Nóng quá――っ――tuyệt, quá――fua, á―― á――dương, vật――trong bụng――toàn bộ!」"
# monologue
# JP: （ずばっ！　じゅばっ！　ぶちゅっ！　ごしゅっ！）
4010 = "（Phập! Bạch! Phịch! Phịch!）"
# 【真闇】
# display as 真闇
# JP: 「ふあっ！　あっ！　あっ！　あっ！　\nあっ！　あっ！　んんっ！　あああっ！！」
2312 = "「Fua! Á! Á! Á! Á! Á! Ưm! A a a!!」"
# monologue
# JP: 真闇姉の息が切れ切れになる。\nきゅんきゅんしてる。膣内が。
3727 = "Hơi thở của chị Mayami đứt quãng. Bên trong âm đạo đang co thắt liên hồi."
# monologue
# JP: （ずぶっ！　じゅばっ！　じゅぼっ！　じゅちゅっ！）
4011 = "（Phập! Bạch! Phập! Sục!）"
# monologue
# JP: 肉厚の襞が指となり、\nぽてぽてぎゅうぎゅう僕の勃起を乳搾りする。
3150 = "Những nếp gấp dày cộm hóa thành những ngón tay, liên tục vắt kiệt sự cương cứng của tôi."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、双ちゃん！　おね、おねっちゃん！\nもうっ――ふ、あっ！　あっ！　もうっ、ねっ！？」
2493 = "「Sou-chan, Sou-chan! Chị, chị! Sắp――fua, á! Á! Sắp, rồi!?」"
# monologue
# JP: 精液が、内から勃起を膨らませてる。\n密着感が凄すぎて、勃起と膣との境界線が判らない。
3788 = "Tinh dịch làm dương vật sưng tấy từ bên trong. Cảm giác khít khao đến mức không phân biệt được ranh giới giữa dương vật và âm đạo."
# monologue
# JP: （ずりゅっ――ぬぐっ――こしゅんっ――ぐいっ！)
4012 = "（Phập――sục――phịch――hự!)"
# 【真闇】
# display as 真闇
# JP: 「あああっ！　そこっ――ゆっくり、いけん、のっ！\nいま、いまっ、おまんこ――いっぱい、やけんっ！」
2274 = "「A a a! Chỗ đó――chậm lại, không được, đâu! Bây giờ, bây giờ, âm hộ――sắp đầy, mất rồi!」"
# monologue
# JP: （きゅうううううんんっ！！）
4042 = "（Siết chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！？」
2245 = "「Kua!?」"
# 【真闇】
# display as 真闇
# JP: 「来てっ！　双ちゃんんっ！　おね、ちゃんっ、\nもう―イク――イっちゃう――けんっ――ふあっ！！」
2472 = "「Đến đi! Sou-chan! Chị, chị, sắp―ra――ra mất――rồi――fua!!」"
# monologue
# JP: （ばじゅ！　ぐりゅっっ！　ごちゅっ！　じゅぬ！）
4008 = "（Bạch! Phập! Phịch! Sục!）"
# 【真闇】
# display as 真闇
# JP: 「ひあっ！？　イクって――ゆってる――のにっ、\nんっ！　ぐりりゅって、そこ、も、子宮、も、ふあっ」
2204 = "「Hia!? Chị bảo――sắp ra――rồi mà, ưm! Ngoáy mạnh quá, chỗ đó, cũng, tử cung, cũng, fua.」"
# monologue
# JP: 僕じゃない。真闇姉の腰が回ってる。\n貪欲に快感を貪って、僕の勃起と呼応している。
3441 = "Không phải tôi. Mà là hông chị Mayami đang xoay tròn. Tham lam tận hưởng khoái cảm, hòa nhịp cùng sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「く――ううっ！」
2305 = "「Kư――ư ư!」"
# monologue
# JP: もう止まらない。体液全部が精子になってる。\n限界だ――ならば――ただただ、一番奥の深くへと！
3371 = "Không thể dừng lại nữa. Toàn bộ dịch thể đều biến thành tinh trùng. Đến giới hạn rồi――vậy thì――chỉ việc đâm vào tận nơi sâu nhất!"
# monologue
# JP: （ずにゅうううううっっ――――）
# 4015 = "（呲溜――）" 
# 【真闇】
# display as 真闇
# JP: 「はぁっ！　はあっ！　はあっ！　ひあっ！！？」
2225 = "「Há! Há! Há! Hia!?」"
# monologue
# JP: （ぐうううっ！　ごちゅうううううううううっん！！）
4019 = "（Gư ư ư! Phập!!）"
# 【真闇】
# display as 真闇
# JP: 「あっ！　んくゅうぅぅぅぅぅぅぅぅぅぅんっ！！！」
2278 = "「Á! Ưn kư ư ư ư ư ư ư ư ư ư ưn!!!」"
# monologue
# JP: （きゅううううううううっ！）
4043 = "（Siết chặt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2244 = "「Kua!」"
# monologue
# JP: （びゅっ！　ぶびゅっ！　びゅるっ！　びゅううっ！）
4038 = "（Byu! Bubyu! Byuru! Byuuu!）"
# monologue
# JP: 一度目より濃い。粘ってる。\nその感触が尿道口をドロリと抜けて、脳を焼く。
3541 = "Đậm đặc hơn lần đầu. Nhầy nhụa hơn. Cảm giác ấy sền sệt trào ra khỏi lỗ niệu đạo, thiêu đốt cả não bộ."
# 【真闇】
# display as 真闇
# JP: 「ふあっ！　あっ――ああああああっ！　んうううっ」
2311 = "「Fua! Á――a a a a a á! Ưn ư ư ư」"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅぶっ！　びゅくっ！）
4034 = "（Byuru! Byu! Byubu! Byuku!）"
# monologue
# JP: 真闇姉の奥に当たってる。\n子宮をどんどん、僕の精子が埋めている。
3950 = "Chạm đến tận sâu bên trong chị Mayami. Tinh trùng của tôi đang không ngừng lấp đầy tử cung."
# 【真闇】
# display as 真闇
# JP: 「あ――精子――精子――きてる――あついのっ――\n双ちゃん、双ちゃんの、精子、たくさんっ」
2258 = "「A――tinh trùng――tinh trùng――đang vào――nóng quá―― Sou-chan, tinh trùng của, Sou-chan, nhiều quá.」"
# monologue
# JP: （びゅうっ！　びゅっ！　ぶびゅっ！　びゅるるっ！）
4041 = "（Byuu! Byu! Bubyu! Byururu!）"
# 【真闇】
# display as 真闇
# JP: 「直接、子宮、に――精液、どんど、んっ、赤ちゃん、\n赤ちゃん――うちの――卵子、に、精液、きて、るっ」
2878 = "「Trực tiếp, vào tử cung――tinh dịch, ồ ạt, ưm, em bé, em bé――tinh dịch, đang tiến vào, trứng――của chị, rồi.」"
# monologue
# JP: 卵子。精液。\nその声に、精液が勢いを取り戻す。
3145 = "Trứng. Tinh dịch. Những từ ấy khiến tinh dịch lại tuôn trào mãnh liệt."
# monologue
# JP: （びゅるっ！　びゅううっ！　びゅっ――びゅるっ）
4035 = "（Byuru! Byuuu! Byu――byuru）"
# 【真闇】
# display as 真闇
# JP: 「ふああああああああんんんっっっっ」
2310 = "「Fua a a a a a a a a ưm ưm ưm」"
# monologue
# JP: 大きく、震え。\nくたりと、真闇姉の体から力が抜ける。
3957 = "Rung lên bần bật. Cơ thể chị Mayami mềm nhũn, mất hết sức lực."
# monologue
# JP: 僕も、全てを射精しきった。\n鼓動と、体温。いまはそれしか感じない。
3398 = "Tôi cũng đã xuất tinh đến cạn kiệt. Nhịp đập và nhiệt độ cơ thể. Giờ đây tôi chỉ cảm nhận được những thứ đó."
# 【真闇】
# display as 真闇
# JP: 「ふあっ――あっ――あっ――\n双ちゃん……双ちゃぁん」
2306 = "「Fua――á――á―― Sou-chan......Sou-chaaan.」"
# monologue
# JP: 求められるまま体をずらし、キスをする。
3406 = "Thuận theo khao khát của chị ấy, tôi khẽ nhích người và trao một nụ hôn."
# 【真闇】
# display as 真闇
# JP: 「んっ――ちゅっ――チュむっ――ちゅうっ――んっ\nれるっ――ちゅうっ――ちゅぱっ――ちゅ、むっ――」
2316 = "「Ưm――chu――chumu――chuu――ưm reru――chuu――chupa――chu, mu――」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉」
# 2736 = "「真闇姐」" 
# monologue
# JP: キスを解いて。ようやく。気づく。\n気づけぬほどに、僕も、真闇姉も熱くなってた。
3191 = "Dứt nụ hôn. Cuối cùng. Tôi cũng nhận ra. Tôi và chị Mayami đã nóng bừng lên đến mức không hề hay biết."
# 【双鉄】
# display as 雙鐵
# JP: 「……ガラス窓だ。危なかったな」
1586 = "「......Cửa sổ bằng kính đấy. Suýt thì nguy.」"
# 【真闇】
# display as 真闇
# JP: 「え！？　あ、まっこと！　やだっ！\nこぎゃんと、誰かに見られとったら」
2240 = "「Hả!? A, thật kìa! Thôi chết! Lỡ như bị ai đó nhìn thấy cảnh này thì.」"
# monologue
# JP: ガラス破損の危険を僕は思っていたが――\nなるほど確かに。その意味でも危険はあったか。
3118 = "Tôi vốn đang nghĩ đến nguy cơ vỡ kính cơ―― Ra vậy. Nguy hiểm theo nghĩa đó cũng có nữa à."
# 【双鉄】
# display as 雙鐵
# JP: 「誰もこれんさ。その点は安心してかまわない」
2047 = "「Sẽ không có ai đến đâu. Về điểm đó thì cứ yên tâm.」"
# 【真闇】
# display as 真闇
# JP: 「理屈の上ではわかっとおけど――」
2842 = "「Về lý thuyết thì chị biết vậy, nhưng――」"
# monologue
# JP: ぷくっと、真闇姉の頬がふくれる。\nそれが、嬉しい。愛らしい。
3736 = "Hai má chị Mayami phồng lên. Điều đó khiến tôi thấy vui. Thật đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「僕とて、こんなに綺麗な真闇姉を、\n他の誰にも見せたくはない。独り占めしたい」
2545 = "「Ngay cả tôi cũng không muốn cho ai khác nhìn thấy một chị Mayami xinh đẹp thế này đâu. Tôi muốn độc chiếm chị.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん……」
# 2491 = "「小雙……」" 
# monologue
# JP: 素直になれてる。\n性の興奮が去った今でも。
3462 = "Tôi đã có thể thành thật với lòng mình. Ngay cả khi sự hưng phấn tình dục đã qua đi."
# monologue
# JP: だから、自然と声がでる。
3879 = "Thế nên, những lời ấy bật ra thật tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「最高の補習授業だった。ありがとう」
2838 = "「Đó là buổi học bổ túc tuyệt vời nhất. Cảm ơn chị.」"
# 【真闇】
# display as 真闇
# JP: 「ふえっ！？　え？　あの――えと――\nえっちなおねえちゃん先生で、なんか、ごめんねぇ」
2238 = "「Hả!? Ể? À――ừm―― Xin lỗi nhé, cô giáo của em lại là một người chị dâm đãng thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　大歓迎だったさ。\n本当に、その意味でも最高の授業だった」
2667 = "「Đâu có? Tôi cực kỳ hoan nghênh là đằng khác. Thực sự, theo nghĩa đó thì đây cũng là một tiết học tuyệt vời nhất.」"
# monologue
# JP: が――しかし。\nこれは……ヤる。
3090 = "Nhưng―― Cái này......có thể làm được."
# monologue
# JP: 大の大人が、もう一度の学園生活を楽しんだなら、\nかならず、セックスに繋がるだろう。
3216 = "Nếu những người trưởng thành muốn tận hưởng lại cuộc sống học đường một lần nữa, thì chắc chắn, nó sẽ dẫn đến tình dục."
# 【真闇】
# display as 真闇
# JP: 「いっそ、貸し切りにしたほうがよかとかねぇ？\n高級リゾート的な感じで、一日一組限定で」
2783 = "「Hay là, cho thuê trọn gói luôn thì sao nhỉ? Giống như khu nghỉ dưỡng cao cấp ấy, mỗi ngày chỉ giới hạn một nhóm thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　富裕層を狙うというのは思いつかなかった。\nそれだな、うん。趣味的な面でもマッチしそうだ」
2301 = "「A! Việc nhắm đến tầng lớp thượng lưu thì tôi chưa nghĩ tới. Đúng là nó đấy, ừm. Về mặt sở thích cũng có vẻ phù hợp.」"
# monologue
# JP: レトロ、骨董――\nそうした趣味を持つ層は、経済的にも余裕があろう。
3387 = "Hoài cổ, đồ cổ―― Những tầng lớp có sở thích như vậy, hẳn là có dư dả về mặt kinh tế."
# monologue
# JP: 一日一組の貸し切りならば、\n治安や教育的見地の問題も、自動で最小に制限できる。
3061 = "Nếu cho thuê trọn gói mỗi ngày một nhóm, thì các vấn đề về trị an hay góc độ giáo dục cũng tự động được hạn chế ở mức tối thiểu."
# 【真闇】
# display as 真闇
# JP: 「よね。いわゆる、客層。\nそこを絞れば、治安低下とかにもつながらんだろうし」
2382 = "「Đúng vậy. Gọi là, phân khúc khách hàng. Nếu thu hẹp lại, thì cũng không dẫn đến tình trạng mất an ninh trật tự đâu.」"
# monologue
# JP: 同じことを考えていた嬉しさと、\nそこから導く真闇姉の解の、鮮やかさ。
3365 = "Niềm vui khi có cùng chung suy nghĩ, và sự nhạy bén trong giải pháp mà chị Mayami rút ra từ đó."
# monologue
# JP: セックスに疲れていた心身に、\n爽やかな風が吹くようだ。
3883 = "Như có một làn gió mát lành thổi qua tâm trí và cơ thể đang rã rời sau cuộc ân ái."
# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう。交通困難区域であるのが幸いするぞ。\n陸の孤島の廃炭鉱。一日まるごと一組限定貸し切りだ」
2500 = "「Cứ quyết định vậy đi. Nằm trong khu vực giao thông khó khăn lại hóa ra may mắn đấy. Một mỏ than bỏ hoang như ốc đảo trên cạn. Cho thuê trọn gói nguyên một ngày, giới hạn chỉ một nhóm.」"
# 【真闇】
# display as 真闇
# JP: 「炭鉱町全部を！？　あ……あははっ！\nやっぱり双ちゃん、考えよることがでっかかねぇ！」
2143 = "「Toàn bộ thị trấn mỏ than luôn á!? A......ahaha! Quả nhiên Sou-chan, nghĩ lớn thật đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、考えたのは真闇姉」
2836 = "「Không, người nghĩ ra là chị Mayami mà.」"
# 【真闇】
# display as 真闇
# JP: 「うちは、こん廃校舎を宿にして――\nって思うとっただけ」
2203 = "「Chị chỉ nghĩ đến việc―― biến dãy phòng học cũ này thành nhà trọ thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
# 2627 = "「是嗎」" 
# monologue
# JP: 理解できれば、嬉しさが増す。\n僕らは、本当に呼応するのだ。
3518 = "Thấu hiểu được nhau, niềm vui lại càng nhân lên. Chúng tôi, thực sự rất đồng điệu."
# monologue
# JP: 弱いところも欲望も全部重なりあって――\nだからこそ、足りない部分を補いあえる。
3347 = "Cả điểm yếu lẫn dục vọng đều hòa quyện vào nhau―― Chính vì vậy, chúng tôi mới có thể bù đắp những phần còn thiếu cho nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、帰ろう。真闇姉。\n帰って一緒に、レビューを作ろう」
2551 = "「Vậy thì, về thôi. Chị Mayami. Về rồi cùng nhau làm bản đánh giá nào.」"
# 【真闇】
# display as 真闇
# JP: 「そーね、双ちゃん」
2446 = "「Ừ nhỉ, Sou-chan.」"
# monologue
# JP: 手をつなぐ。\nふたり同時に、差し出し合って。
3408 = "Nắm tay nhau. Cả hai cùng lúc đưa tay ra."
# monologue
# JP: 踏み出す一歩も、おんなじだ。\n並んで――どちらもリードをせずに。
3887 = "Bước chân đầu tiên, cũng giống hệt nhau. Sóng vai――không ai dẫn trước ai."
# 【真闇】
# display as 真闇
# JP: 「かえろ、おうちに」
2552 = "「Về thôi, về nhà nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 
# monologue
# JP: そうして僕は、真闇姉と初めて過ごす放課後を、\n手を取り合って――終わらせる。
3517 = "Cứ như vậy, tôi và chị Mayami tay trong tay―― khép lại buổi chiều tan học đầu tiên bên nhau."
