3926 = "這果凍一般的軟度、緊緻度，硬乳頭的手感。手心真是幸福極了，感覺要撐不住了。" 

# monologue
# JP: （むにっ――もみっ――さわっ――さすっ――）
4047 = "（揉――揉――撫摸――擦――）" 

# 【真闇】
# display as 真闇
# JP: 「ん……うちも、おっぱい……ん――双ちゃんに、\nたくさん、たくさん――揉んで、ほしかと」
2326 = "「嗯……咱也很希望……嗯――小雙好好地好好地――揉咱的胸呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2345 = "「嗯」" 

# monologue
# JP: 頼まれずとも、揉む。ひたすらに。
3071 = "不用你說，我都會全心全意揉個遍的。" 

# 【真闇】
# display as 真闇
# JP: 「ん……や……ちくび――ンッ――くに、くに――\nそぎゃん、と――しつこく、され、たら――」
2323 = "「嗯……呀……乳頭――嗯――擠、擠――別那麼――一直揉啊揉的――」" 

# monologue
# JP: ならばと、乳輪をこねるようにし、\nじわじわ、揉み上げる範囲を広げる。
3936 = "那我就從捏捏乳輪開始，一點點地擴大揉捏的範圍吧。" 

# 【真闇】
# display as 真闇
# JP: 「ん……はっ――ん……双ちゃん……て……\nやらし……んっ――ねっとり、して、てっ」
2328 = "「嗯……哈――嗯……小雙……手……好下流……嗯――黏糊糊的」" 

# monologue
# JP: ねっとりと――\nその言葉を意識したなら、指の動きは緩慢になる。
3964 = "黏糊糊的――聽到這個詞，我手指的活動放慢了點。" 

# monologue
# JP: ゆるく、軽く、焦らすようにして触れ、撫でる。\n刺激のたびに、ピクン、ピクンと真闇姉の肌が喜ぶ。
3379 = "慢慢地、輕輕地觸碰與撫摸，來刺激她的性感帶。每次刺激，真闇姐的皮膚都會顫抖下，來表示她的喜悅。" 

# 【真闇】
# display as 真闇
# JP: 「あ……きもち……おっぱい、おっぱい……\nん――フッ――双ちゃん、に――ちゅうって――あ」
2263 = "「啊……好舒服……胸部、胸部……嗯――嗚――彷彿被小雙――親吻一樣――啊」" 

# monologue
# JP: 瞬間、真闇姉の表情が驚いたようになる。\nとろけきってた瞳がふたたび、僕へ向く。
3733 = "真闇姐的神情突然露出了驚訝。濕潤的眼睛又一次看向了我。" 

# 【真闇】
# display as 真闇
# JP: 「おねえちゃんだけ、気持ちよくしてもらっちゃって」
2533 = "「怎麼能只有姐姐舒服呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。僕もしあわせだ」
2670 = "「沒事，我也很幸福啊」" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、双ちゃんにも――\n双ちゃんも、もっと、さらけ出したかとよね？」
2049 = "「不行，小雙――小雙也想多袒露一點出來吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2708 = "「當然了」" 

# monologue
# JP: 真闇姉のおっぱいの手触りが。
3753 = "真闇姐胸部的觸感。" 

# monologue
# JP: 汗が、匂いが、言葉が、全てが、\n僕をギリギリに尖らせている。
3549 = "汗水、氣味、話語等等一切，都刺激著我的興奮飛上極點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「次は、精液をさらけ出したい。\n真闇姉の口で、優しく、さらけ出させてほしい」
2039 = "「下面袒露出精液吧。我想溫柔地袒露在真闇姐的嘴巴裡」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 2345 = "「嗯」" 

# monologue
# JP: 手は、休めない。\n真闇姉は、僕におっぱいを揉まれるままに――
3488 = "手是停不下來的。我依然揉捏著真闇姐的胸部――" 

# monologue
# JP: (くにっ）
37 = "(捏）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2892 = "「！？」" 

# monologue
# JP: 勃起に、鼻先が押し当てられる。
3744 = "真闇姐的鼻子貼在了肉棒上。" 

# 【真闇】
# display as 真闇
# JP: 「は……あ――双ちゃんの、匂い……\n双ちゃんの、いっとう、いっとう、濃か匂い――」
2221 = "「哈……啊――小雙的味道……小雙的肉棒上，染上了濃濃的氣味――」" 

# monologue
# JP: （すりっ）
4053 = "（蹭）" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2889 = "「！」" 

# monologue
# JP: 今度は、頬ずり。
3227 = "她又用臉蹭起了肉棒。" 

# monologue
# JP: 真闇姉の真っ白な肌を、柔らかでもっちりした頬を、\n亀頭の先から溢れた汁が、ベタベタにして汚してく。
3717 = "真闇姐白淨的肌膚、柔軟緊緻的面頰，被龜頭頂溢出的預射液弄得黏糊糊的。" 

# 【真闇】
# display as 真闇
# JP: 「おっきか――熱か――ほっぺば、焼けてしまいそお」
2448 = "「好大――好熱――感覺臉頰要燒掉了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まくら……ねぇ」
2724 = "「真闇……姐」" 

# 【真闇】
# display as 真闇
# JP: 「うん。わかっとお」
2384 = "「嗯，我懂的」" 

# monologue
# JP: （もみゅっ）
4048 = "（揉）" 

# monologue
# JP: 指が、ようやく、\n触ってくれるが、睾丸だ――っ！？。
3264 = "她終於動起手指，摸到的卻是睪丸――！？。" 

# 【真闇】
# display as 真闇
# JP: 「ぺろっ――れろおおおっ――ぺろっ、ぺちゅっ。\nチュルッ――ちゅっ――れろおおおおっ――れるっ」
2198 = "「呸嘍――呸嘍――呸囉、呸啾。啾嚕――啾――呸嘍――舔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ」
# 2345 = "「嗯」" 

# monologue
# JP: 持ち上げられて、舐められる。\nゆるゆる、ゆるゆる、ゆるゆると。
3763 = "睪丸被她握起來舔了。她的動作很輕很輕、很輕很輕。" 

